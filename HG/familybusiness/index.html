work your way back up, but right now it is clear that you cannot be trusted with this sacred responsibility.\"\n\n\t\t\t\t\t\t\tWhat do you say?\n\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#\"You're right. I can't, and I'm sorry. I'll work harder.\"\n\t\t\t\t\t\t\t\t\t\"We will see,\" says Second Aunt. \"You will have plenty of time to work.\"\n\t\t\t\t\t\t\t\t#\"I don't care about that. I just care about making sure those demons get punished.\"\n\t\t\t\t\t\t\t\t\t\"That is exactly where you have failed.\" Second Aunt declares. \"And where we have failed. If we had taught you better, perhaps you would have learned better.\"\n\t\t\t\t\t\t\t\t#\"Please don't tell Eldest Uncle?\"\n\t\t\t\t\t\t\t\t\t\"Do you truly think that I would keep anything from him?\" Second Aunt shoots back. \"It [i]may[/i] say something good about your character that you do not want to cause him any more pain when he is already injured, or that you feel enough shame that you do not want him to know of your disgrace. But, no, there is no way that he will not hear about this.\"\n\t\t\t\t\t\t\t*comment endif\n\n\t\t\t\t\t\t\tFirecracker puts her hand on your shoulder and turns you away from the rest of the family. \"Go away,\" she says flatly. \"Now. We'll call you when we want to talk to you again.\"\n\n\t\t\t\t\t\t\tYou walk out of the broken dining hall, past the cold stares of your family and of the people who used to be your roommates.\n\n\t\t\t\t\t\t\tYou leave alone.\n\t\t\t\t\t\t\t*finish\n\n\t\t\t\t\t\t#No! I won't stop.\n\t\t\t\t\t\t\t*set castout true\n\t\t\t\t\t\t\t*set leaving true\n\t\t\t\t\t\t\tAll of your anger - at your roommates, at your family, at every demon in the world - pours through you. You push back against Firecracker, struggling to break away so that you can strike at the demons again.\n\n\t\t\t\t\t\t\tThat's when Lin charges into the fight.\n\n\t\t\t\t\t\t\tYou might have had a chance against one or the other, but not both together: your cousins are older and much better-trained than you are. It only takes a few seconds for you to be disarmed and backed against a wall.\n\n\t\t\t\t\t\t\tWhich leaves room for Second Aunt to surge in, looming angrily in front of you. \"Wang Su, you are a disgrace beyond anything I could imagine!\" Second Aunt's voice shakes with fury and grief. \"Attacking a demon that has already surrendered? Attacking your [i]family[/i]? You shame us all! This is the last night that you fight alongside the rest of the Wang family.\" Second Aunt draws herself up straighter and intones, \"Wang Su. You are cast out. You are no longer permitted to join in our sacred fight.\"\n\n\t\t\t\t\t\t\tWhat do you say?\n\n\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t#\"You're right. I was wrong.\"\n\t\t\t\t\t\t\t\t\tSecond Aunt sniffs. \"May that be the first of many apologies that you give.\"\n\t\t\t\t\t\t\t\t#\"I don't care about that. I just care about making sure those demons get punished.\"\n\t\t\t\t\t\t\t\t\t\"That is exactly where you have failed.\" Second Aunt declares. \"And where we have failed. If we had taught you better, perhaps you would have learned better.\"\n\t\t\t\t\t\t\t\t#\"Please don't tell Eldest Uncle?\"\n\t\t\t\t\t\t\t\t\t\"Do you truly think that I would keep anything from him?\" Second Aunt shoots back. \"It [i]may[/i] say something good about your character that you do not want to cause him any more pain when he is already injured, or that you feel enough shame that you do not want him to know of your disgrace. But, no, there is no way that he will not hear about this.\"\n\t\t\t\t\t\t\t*comment endif\n\n\t\t\t\t\t\t\tFirecracker puts her hand on your shoulder and turns you away from the rest of the family. \"Go away,\" she says flatly. \"Now. We'll call you when we want to talk to you again.\"\n\n\t\t\t\t\t\t\tYou walk out of the broken dining hall, past the cold stares of your family and of the people who used to be your roommates.\n\n\t\t\t\t\t\t\tYou leave alone.\n\t\t\t\t\t\t\t*finish\n\n\t\t\t\t#I'm going to leave. I can't stand to watch.\n\t\t\t\t\t*set interdependence %-20\n\t\t\t\t\t*set filial %-15\n\t\t\t\t\tAfter everything you've been through, how can you just stand there and watch your family forgive the people who hurt and betrayed you?\n\n\t\t\t\t\tYou can't.\n\n\t\t\t\t\tYou turn your back on your family and start to walk out of the dining hall. \"Where are you going?\" Firecracker calls after you. \n\n\t\t\t\t\tWhat do you say?\n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I'm sorry. I can't watch this.\"\n\t\t\t\t\t\t\t*goto firecrackerthinks \n\t\t\t\t\t\t#\"I don't feel well.\"\n\t\t\t\t\t\t\t*label firecrackerthinks\n\t\t\t\t\t\t\tFirecracker's mouth twists in sympathy. \"I understand,\" she says quietly.\n\n\t\t\t\t\t\t\tYou don't think she does. She probably thinks that you're just upset because your roommates were revealed to be demons - which is part of the truth, but not all of it. But how can you explain to her that you think that your roommates are lying?\n\n\t\t\t\t\t\t\tYou can't. So you don't. You just keep walking out.\n\n\t\t\t\t\t\t\tYou go back to your empty dorm room, and spend the night alone, trying not to think about what's just happened.\n\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t#\"They don't mean it. I can't watch them lie like this.\"\n\t\t\t\t\t\t\tSecond Aunt breaks in, her voice thick with disapproval. \"That is not for you to decide! If we offer them enlightenment and they accept, we must treat them as if they speak the truth. If they are later found to be deceiving us, then we will punish them for it.\"\n\n\t\t\t\t\t\t\tDo you want to press further?\n\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#No. I'll just leave.\n\t\t\t\t\t\t\t\t\t*set filial %-10\n\t\t\t\t\t\t\t\t\tYou shake your head. There's nothing more to say - there's no way to make them understand!\n\n\t\t\t\t\t\t\t\t\tSo you don't say anything. You just turn around and walk out.\n\n\t\t\t\t\t\t\t\t\t\"Wang Su!\" Second Aunt's voice echoes angrily behind you, but you keep on walking.\n\n\t\t\t\t\t\t\t\t\tYou go back to your empty dorm room, and spend the night alone, trying not to think about what's just happened. You've won the fight, but you've lost your roommates, and you've lost some of your family's trust in you.\n\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\t#No. I'll apologize, and I'll mean it.\n\t\t\t\t\t\t\t\t\t*set filial %+10\n\t\t\t\t\t\t\t\t\t\"I'm sorry,\" you mutter. \"You're right. I shouldn't have contradicted you.\" You really do mean it. It was horribly disrespectful of you to talk back to Second Aunt - not just disrespectful towards her, but disrespectful towards your entire family.\n\n\t\t\t\t\t\t\t\t\tSecond Aunt sniffs. \"This proves that you still have a great deal to learn, Wang Su.\"\n\n\t\t\t\t\t\t\t\t\t\"They were ${Nickname}'s roommates,\" Tian points out quietly.\n\n\t\t\t\t\t\t\t\t\t\"Which may explain some of your behavior,\" Second Aunt continues, still looking directly at you. \"But it does not excuse it. You must learn to do your duty no matter what the circumstances. Now, go. We will discuss this more tomorrow.\"\n\n\t\t\t\t\t\t\t\t\tYou trudge back to your empty dorm room, miserable and very alone. You've won the fight, but you've lost your roommates, and you've lost some of your family's trust in you.\n\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\t#No. I'll apologize, but I won't mean it.\n\t\t\t\t\t\t\t\t\t*set filial %-10\n\t\t\t\t\t\t\t\t\t\"I'm sorry,\" you mutter. \n\n\t\t\t\t\t\t\t\t\tSecond Aunt sniffs. \"This proves that you still have a great deal to learn, Wang Su.\"\n\n\t\t\t\t\t\t\t\t\t\"They were ${Nickname}'s roommates,\" Tian points out quietly.\n\n\t\t\t\t\t\t\t\t\t\"Which may explain some of your behavior,\" Second Aunt continues, still looking directly at you. \"But it does not excuse it. You must learn to do your duty no matter what the circumstances. Now, go. We will discuss this more tomorrow.\"\n\n\t\t\t\t\t\t\t\t\tYou turn your back on your relatives, knowing that they'll never understand you, and there's no use trying. \n\n\t\t\t\t\t\t\t\t\tYou trudge back to your empty dorm room, miserable and very alone. You've won the fight, but you've lost your roommates, and you've lost some of your trust in your family.\n\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t\t#Yes. I want to make Second Aunt understand, even if it means making her angry.\n\t\t\t\t\t\t\t\t\t*set filial %-15\n\t\t\t\t\t\t\t\t\t*set disgraced true\n\t\t\t\t\t\t\t\t\t*set leaving true\n\t\t\t\t\t\t\t\t\t*goto angrytalk\n\n\n\t\t\t\t#I'm going to try to make Second Aunt understand. I don't think she'll listen, but I have to try.\n\t\t\t\t\t*set filial %-20\n\t\t\t\t\t*set disgraced true\n\t\t\t\t\t*set leaving true\n\t\t\t\t\t\"Wait!\" you shout.\n\n\t\t\t\t\tAll eyes turn to you.\n\n\t\t\t\t\t\"Wang Su!\" Lin hisses. \"What are you doing?\"\n\n\t\t\t\t\t*label angrytalk\n\n\t\t\t\t\t\"How can you possibly think that they're telling the truth?\" you retort. \"They nearly killed Eldest Uncle! They've been lying to me all year! They'll never surrender! They'll never seek enlightenment, no matter what they say. Demons lie! You know that!\"\n\n\t\t\t\t\t\"Wang Su!\" When Second Aunt says your name it's much louder, and much angrier. \"You will stop this at once! How dare you defy me - how dare you defy our family's duty? Have we taught you nothing?\n\t\t\t\t\t*goto endrant\n\n*elseif finalsuccess >=3\n\tThe demons rear up, letting out frustrated hisses as they writhe back and forth, trying to break free of the potions' hold - but to no effect. After a moment, their green serpentine forms shimmer and shift, and when the world settles again, you see only two ${yan_gender}s. \n\n\tYour roommates.\n\n\t\"Surrender!\" you shout. If anyone has a chance of making them listen, it's you. You've lived with them, shared meals and study sessions and [i]life[/i]. You've got a connection with them, and you can use that to get through.\n\n\tMaybe.\n\t*page_break\n\n\t\"I'm sorry,\" Little One gasps, shrinking back in fear. $!{hua_his} eyes dart around the circle, too anxious to rest in one place for more than a second. \"I'm sorry.\"\n\n\t${Grandma} isn't. \"We were so close! We were living with one of the famous Wangs, and we almost got away with it!\n\t*gosub secretsplit\n\n\t*if ((rel_yan > 70) and (rel_hua > 70))\n\t\t*set bothsurrender true\n\t\t\"Were you just laughing at me the whole time? Was any of our friendship real?\" you shout…\n\n\t\t*fake_choice\n\t\t\t#…furiously.\n\t\t\t#…painfully.\n\t\t\t#…sorrowfully.\n\t\t\t#…disbelievingly.\n\n\t\tYour roommates glance at each other, a flicker of emotion passing over their faces. Maybe some of your friendship [i]was[/i] real, and maybe they're feeling some kind of regret.\n\n\t\t\"It was real,\" Little One whispers. \n\n\t\tDespite ${Grandma}'s boasting a moment earlier, ${yan_he} nods in agreement, and gives you something almost like ${yan_his} old smile. \"We had a good time, ${Roommatenick}.\"\n\t\t*goto askforsurrender\n\n\t*elseif (rel_yan) >= (rel_hua)\n\t\t*set yansurrender true\n\t\t*set notsurrendered \"Little One\"\n\t\t*if yan_he = \"he\"\n\t\t\t*set surrendered \"Grandpa\"\n\t\t\t*goto yansurrendertext\n\t\t*else\n\t\t\t*set surrendered \"Grandma\"\n\t\t\t*goto yansurrendertext\n\t\t*label yansurrendertext\n\t\t*achieve halfway\n\t\t${Grandma}'s grin spikes up, fierce and angular, and for a second, you can see a glimpse of your friend's bright enthusiasm behind the demon's smile. \"It was a good fight, ${Roommatenick}.\" Then the smile fades into a sigh, and ${Grandma} shakes ${yan_his} head. \"And you won. It's over.\"\n\n\t\t\"I'm sorry,\" Little One whispers one last time. \"I won't. Not to you, Wang Su. We're not friends, and I can't pretend anymore that we are. I won't surrender. Not to you or any Wang.\" Whatever friendship you had with your roommates was strong enough to sway ${Grandma}, but not Little One.\n\n\t\tSecond Aunt doesn't make you say the next part. \"Then for you, Xu Hua,\" she says to ${Grandma}, there is no mercy. You have chosen to turn away from the balance of the universe and towards destruction.\" Lin steps forward, her hand raising to give the final blow.\n\n\t\tFirecracker turns you away with a hand on your shoulder. \"You don't have to watch.\" Her voice is gentler than you've ever heard it. \"Come on.\" \n\n\t\tShe leads you away into the quiet night, leaving the demons who used to be your roommates behind.\n\t\t*page_break\n\n\t\t*label sleeping\n\n\t\tYou're exhausted, but it's hard to sleep that night.\n\n\t\tIt's still strange to be alone in your room - which is even stranger when you think how quickly you've gotten used to sharing a room after never having done that before you came to university. But now you miss Little One and ${Grandma} immensely. \n\n\t\tAnd you'll never see ${notsurrendered} again.\n\n\t\tWhat do you do?\n\n\t\t*fake_choice\n\t\t\t#Cry.\n\t\t\t\tIt's understandable. After a night like this, anyone would cry.\n\t\t\t#Go down to the weapons practice room and hit things.\n\t\t\t\tIt's understandable. After a night like this, anyone would be angry. You pound away at practice dummies until your hands are blistered and sore.\n\t\t\t#Just lie there and try to sleep. I'm confident that we did the right thing.\n\n\t\tYou know that this is the way of things, that it's your family's sacred duty to destroy demons who refuse enlightenment. But that doesn't make it hurt any less.\n\n\t\tStill, at least ${Surrendered} is doing the right thing. Maybe you can keep ${yan_him} in your life.\n\n\t\t*finish\n\n\t*else\n\t\t*set huasurrender true\n\t\t*set surrendered \"Little One\"\n\t\t*if yan_he = \"he\"\n\t\t\t*set notsurrendered \"Grandpa\"\n\t\t\t*goto huasurrendertext\n\t\t*else\n\t\t\t*set notsurrendered \"Grandma\"\n\t\t\t*goto huasurrendertext\n\t\t*label huasurrendertext\n\t\t*achieve halfway\n\t\tLittle One shakes ${hua_his} head. \"I hated deceiving you,\" ${hua_he} whispers. \"Even though it was in my nature…it bothered me to do it to [i]you[/i]. You're my friend, ${Roommatenick}.\" $!{hua_he} almost sounds like ${hua_him}self. \"Please.\"\n\n\t\t${Grandma} hisses contemptuously at Little One, the sound somehow even more hideous coming from a human mouth. \"[i]You[/i] can grovel and plead and pretend you're friends with the Wangs. I never will!\" Whatever friendship you had with your roommates was strong enough to sway Little One, but not ${Grandma}.\n\n\t\tSecond Aunt doesn't make you say the next part. \"Then for you, Sun Yan,\" she says to ${Grandma}, there is no mercy. You have chosen to turn away from the balance of the universe and towards destruction.\" Lin steps forward, her hand raising to give the final blow.\n\n\t\tFirecracker turns you away with a hand on your shoulder. \"You don't have to watch.\" Her voice is gentler than you've ever heard it. \"Come on.\" \n\n\t\tShe leads you away into the quiet night, leaving the demons who used to be your roommates behind.\n\t\t*page_break\n\t\t*goto sleeping\n*else\n\t*comment total failure! Your worst stat determines which way you fail\n\t*set bigfail true\n\t*if secretcounter >= 3\n\t\tIt's as if the demons have anticipated your every action. Could they really have known what you were planning? If you had been better at keeping secrets, would you have had a chance?\n\t*comment endif\n\t*if ((rel_yan \u003c 50) and (rel_hua \u003c 50))\n\t\t*set bothdead true\n\t\tThe demons rear up, letting out frustrated hisses as they writhe back and forth, trying to break free of the potions' hold - but to no effect. After a moment, their green serpentine forms shimmer and shift, and when the world settles again, you see only two ${yan_gender}s. \n\n\t\tYour roommates.\n\n\t\t*page_break\n\n\t\tThey may be transformed, but they're not defeated yet. They keep lunging forward, human teeth bared and human mouths making hissing sounds that seem even more hideous than they did coming out of the serpent forms. Even Lin and Firecracker, with all their fighters' strength, have to work hard to hold back the raging demons.\n\n\t\tWhatever you've done, it wasn't enough.\n\n\t\t\"Do you seek enlightenment?\" Second Aunt shouts over the turmoil of hisses.\n\n\t\t\"Never!\" ${Grandma} hisses back.\n\n\t\t\"No,\" Little One echoes, with an anger in ${hua_his} quiet voice that you've never heard before. \"We're not friends, Wang Su. I can't pretend anymore. I don't want enlightenment.\"\n\n\t\tSecond Aunt doesn't make you say the next part. \"Then for you,\" she intones as she stares down at your fallen roommates, \"there is no mercy. You have chosen to turn away from the balance of the universe and towards destruction.\" Tian steps forward, hand raising to give the final blows.\n\n\t\tFirecracker turns you away with a hand on your shoulder. \"You don't have to watch.\" Her voice is gentler than you've ever heard it. \"Come on.\" \n\n\t\tShe leads you away into the quiet night, leaving the demons who used to be your roommates behind.\n\n\t\t*page_break\n\t\t*achieve defeated\n\t\tYou're exhausted, but it's hard to sleep that night.\n\n\t\tIt's still strange to be alone in your room - which is even stranger when you think how quickly you've gotten used to sharing a room after never having done that before you came to university. But now you miss Little One and ${Grandma} immensely. \n\n\t\tAnd you'll never see them again.\n\n\t\tWhat do you do?\n\n\t\t*fake_choice\n\t\t\t#Cry.\n\t\t\t\tIt's understandable. After a night like this, anyone would cry.\n\t\t\t#Go down to the weapons practice room and hit things.\n\t\t\t\tIt's understandable. After a night like this, anyone would be angry. You pound away at practice dummies until your hands are blistered and sore.\n\t\t\t#Just lie there and try to sleep. I'm confident that we did the right thing.\n\n\t\tYou know that that's the way of things, that it's your family's sacred duty to destroy demons who refuse enlightenment. But that doesn't make it hurt any less.\n\n\t\tIt is a long lonely night.\n\n\t\t*finish\n\n\t*elseif ((filial \u003c 35) or (balance \u003c 35))\n\t\t*set castout true\n\t\t*set leaving true\n\t\t*gosub losingthefight\n\n\t\t*page_break\n\n\t\tEverywhere you turn, you see the glares of your relatives. Some, like Tian, are sad; others, like Firecracker, are furious. But none of them hold any warmth or approval.\n\n\t\t\"It is your failure that has brought us to this, Wang Su!\" Second Aunt rages. \"You bring shame upon us all, and upon the ancient name of Wang! This is the last night that you fight alongside our family. You will be cast out!\"\n\n\t\tWhat do you say?\n\n\t\t*fake_choice\n\t\t\t#\"I'm sorry. I feel ashamed of my failure. Isn't there anything that I can do?\"\n\t\t\t\tSecond Aunt sniffs. \"The fact that you feel shame at all gives me hope that someday you may learn. But right now there is nothing that you can do.\"\n\t\t\t#\"I don't care about that. Now I'm free from all of this!\"\n\t\t\t\t\"That is exactly where you have failed.\" Second Aunt declares. \"And where we have failed. If we had taught you better, perhaps you would have learned better.\"\n\t\t\t#\"Please don't tell Eldest Uncle?\"\n\t\t\t\t\"Do you truly think that I would keep anything from him?\" Second Aunt shoots back. \"It [i]may[/i] say something good about your character that you do not want to cause him any more pain when he is already injured, or that you feel enough shame that you do not want him to know of your disgrace. But, no, there is no way that he will not hear about this.\"\n\t\t*comment endif\n\n\t\tFirecracker puts her hand on your shoulder and turns you away from the rest of the family. \"Go away,\" she says flatly. \"Now. We'll call you when we want to talk to you again.\"\n\n\t\tYou walk out of the broken dining hall, past the cold stares of your family.\n\n\t\tYou leave alone.\n\t\t*finish\n\t*elseif ((filial \u003c 50) or (balance \u003c 50))\n\t\t*set disgraced true\n\t\t*set leaving true\n\t\t*gosub losingthefight\n\n\t\t*page_break\n\n\t\tEverywhere you turn, you see the glares of your relatives. Some, like Tian, are more sad; others, like Firecracker, are more furious. But none of them hold any warmth or approval.\n\n\t\t\"It is your failure that has brought us to this, Wang Su!\" Second Aunt says coldly. \"You are a disgrace to the ancient name of Wang. Someday, you may fight in our sacred circle once more. But you will need to work for a very very long time before that can happen.\"\n\n\t\tWhat do you say?\n\n\t\t*fake_choice\n\t\t\t#\"I'm sorry. I feel ashamed of my failure. Isn't there anything that I can do?\"\n\t\t\t\tSecond Aunt sniffs. \"The fact that you feel shame at all gives me hope that someday you may learn. But you have a very long way to go.\"\n\t\t\t#\"I don't care about that. Now I'm free from all of this!\"\n\t\t\t\t\"That is exactly where you have failed.\" Second Aunt declares. \"And where we have failed. If we had taught you better, perhaps you would have learned better.\"\n\t\t\t#\"Please don't tell Eldest Uncle?\"\n\t\t\t\t\"Do you truly think that I would keep anything from him?\" Second Aunt shoots back. \"It [i]may[/i] say something good about your character that you do not want to cause him any more pain when he is already injured, or that you feel enough shame that you do not want him to know of your disgrace. But, no, there is no way that he will not hear about this.\"\n\t\t\t*comment endif\n\n\t\tFirecracker puts her hand on your shoulder and turns you away from the rest of the family. \"Go away,\" she says flatly. \"Now. We'll call you when we want to talk to you again.\"\n\n\t\tYou walk out of the broken dining hall, past the cold stares of your family, and go back to your empty dorm room, where you spend the night surrounded by your roommates' abandoned belongings, feeling very very alone.\n\t\t*finish\n\n\t*else\n\t\t*gosub losingthefight\n\n\t\t\"They got away!\" Firecracker shouts. \"How could this happen?\" She paces furiously around the broken room, sword slashing at empty air. It's probably only her years of discipline and training that keep her from throwing her sword, or running off after the demons on her own.\n\n\t\tSecond Aunt's mouth presses into a thin line as she struggles to hold back her anger and frustration. \"Sometimes, we do not succeed. That means that we try again. And we will try again and again until we get them.\"\n\n\t\t\"I'm sorry, ${Nickname},\" Tian says quietly, putting a hand on your shoulder. \"Are you all right?\" \n\n\t\t*fake_choice\n\t\t\t#\"I'm fine. This is our family's duty. It doesn't matter who the demons are; we still have to fight them.\"\n\t\t\t#\"Not really. But I'll manage.\"\n\t\t\t#\"I feel awful. I thought they were my friends.\"\n\t\t\t#I feel awful, but I don't want to say so to Tian. I just nod.\n\t\tTian nods. \"Come on. I'll walk home with you.\"\n\n\t\tYou and your cousin walk back to your dorm in silence. You spend the night in your empty room surrounded by your roommates' abandoned belongings, feeling very very alone.\n\t\t*finish\n\n*comment subroutines start here\n\n*label secretsplit\n*if secretcounter >= 3\n\tAnd you were terrible at keeping secrets!\" ${Grandma} taunts. \"I'm surprised the whole campus hasn't heard about your demon-hunting by now.\"\n\t*return\n*elseif secretcounter > 0\n\tIt took us a while to figure out whether you were following the family tradition. I have to admit,\" ${Grandma} says grudgingly, \"you're pretty good at keeping secrets.\"\n\t*return\n*else\n\t\"\n\t*return\n\n*label losingthefight\nAfter that, there's chaos.\n*page_break\n\nThe demons rage forward with renewed strength, spitting sparks and venom in all directions. Your family scatters back, their tight formation breaking under the furious wave of serpentine anger.\n\nYou've never been good at sensing connections between things and people, but even you can tell that the world is out of balance right now. Everything feels wrong. It's as if the air itself were rotten with the demons' corruption.\n\nYou try your hardest - you all do - but it's not enough. \n\nThe demons who used to be your roommates charge past you to crash through the wall and slither out into the night.\n\nYou've failed.\n*return\n", "11-endgame-old": "\n*page_break\n[b]Chapter 11: End Game[/b]\n\nThe next morning, you all gather in Eldest Uncle's office. Bright sun streams in through the windows as you wait for the rest of your family to arrive.\n\nIt's Eldest Uncle! He's pale and shaky, and leaning heavily on Cousin Tian's arm, but he's [i]there[/i], and the world feels like it's finally regaining some of its order.\n\nEldest Uncle settles himself carefully in his chair, and all eyes turn to him while he prepares to speak.\n\n*page_break\n\n\"We have finally eliminated the threat from the two demons that were menacing the dining hall.\" Eldest Uncle's voice is a little thinner and less resonant than usual, but his tone is still perfectly calm, even when he's speaking of the demons who attacked him. \"This campus will be safer because of it.\" Then his gaze turns towards you, and there is sympathy in his eyes. \"This struggle was especially hard for you,\" he tells you gently. \"You have done well. It shows that you have more than proven yourself worthy of full membership in our order.\"\n\nYour heart leaps.\n\n\"Your studies are not complete,\" he adds.\n*if holistic \u003c 50\n\tEldest Uncle frowns briefly. \"You still need to refine your thinking about the balance of the universe.\"\n\t*comment endif\n\n*if filial \u003c 50\n\tSecond Aunt sniffs. \"You must work on showing greater respect for your elders.\"\n\t*comment endif\n\n\"But you will learn more over time,\" Eldest Uncle finishes. \"We all do.\" He takes a deep breath, gathering his strength, and pushes himself to his feet. \"Let us gather in the sacred circle,\" he intones, \"and bring our newest member fully into our group.\"\n\nPride rises up to fill your entire being as you move forward to stand in the circle of your family, hands joined together.\n*page_break\n\n\"Together we find strength,\" Eldest Uncle begins, and the rest of you join in. \"Together we find balance. Together we find harmony.\" You repeat the chant seven times. Seven people chanting seven times: seven is the number that symbolizes togetherness, rising, and the essence of the entire universe.\n\nYou are not in the center, even though you are the one for whom this ceremony is being performed - you are in the circle, one of the parts that makes up the whole. \n\n*page_break\nWhen you look up again, Eldest Uncle is smiling. \"Welcome, Wang Su,\" he says. He's using your full name, but this time it doesn't sound angry; it sounds formal. Official. Real. \"Now you are truly one of us.\" Your heart fills with pride, so full that you think you'll never stop smiling. \"And now that you are a full member of the group, you have an assignment of your own.\"\n\n\"What is it?\" you ask.\n\n\"Your roommate,\" he replies. \"The demon Xu Hua. $!{Hua_he} claims to be seeking enlightenment, and it's our obligation to help ${hua_him}. Since ${hua_he} already trusts you, ${hua_he} will be in your charge. You can guide ${hua_him} along the path and teach ${hua_him} what ${hua_he} will need to know.\"\n\nHow do you respond?\n\n*choice\n\t#\"It's a big task, but if you think I'm ready, then I'll do it.\"\n\t\t*set modest %+20\n\t\t*set filial %+20\n\t\tYour uncle smiles down at you. \"I do think you're ready. You've proven that you are. Go get some rest - you can start working with Xu Hua tomorrow.\"\n\n\t\t*page_break\n\t\t*goto exhausted\n\n\t#\"Thank you. I'd been hoping that I'd be able to help Little One - I mean, Xu Hua. I feel responsible for ${hua_him}.\"\n\t\t*set interdependence %+20\n\t\t*set holistic %+20\n\t\t\"Good,\" your uncle says, his smile warm with approval. \"You didn't say anything directly, but I thought you might feel that way, from the way you talked about ${hua_him}. $!{hua_he}'s your roommate, after all. Go get some rest - you can start working with Xu Hua tomorrow.\"\n\n\t\t*page_break\n\n\t\t*label exhausted\n\n\t\tYou're exhausted, but it's hard to sleep that night.\n\n\t\tIt's still strange to be alone in your room - which is even stranger when you think how quickly you've gotten used to sharing a room, considering that you had your own room all your life until you came to university. But now you miss Little One and ${Grandma} immensely. Things can never be exactly the way they were before, but at least you can keep Little One in your life. \n\n\t\tEldest Uncle was right: just as he's always said, there is no absolute rule about what is good and what is evil; it all depends on the situation. Right now, the situation is that Little One wants help, and it's your responsibility to give that to ${hua_him}.\n\n\t\tThe next day you go out to meet Little One.\n\t\t*goto nextday\n\n\t#\"What? $!{hua_he} lied to me! I don't want to have anything to do with ${hua_him}.\"\n\t\t*set holistic %-20\n\t\t*set filial %-20\n\t\tYour uncle's expression darkens. \"Wang Su!\" he says sharply. \"Have you learned nothing? This is our sacred obligation! Go think about this, and come back tomorrow ready to do your duty.\" Consumed with shame, you slink off under the angry glares of your family.\n\n\t\tYou're exhausted, but it's hard to sleep that night.\n\n\t\tYou're being kept awake by shame, but it's still strange to be alone in your room - which is even stranger when you think how quickly you've gotten used to sharing a room, considering that you had your own room all your life until you came to university.\n\n\t\tIt reminds you of how much you miss Little One and ${Grandma} - how much their betrayal hurt you, but also how much you wish you could have your happy friendship back. Which makes you realize that Eldest Uncle was right: just as he's always said, there is no absolute rule about what is good and what is evil; it all depends on the situation. \n\n\t\tRight now, the situation is that Little One wants help, and it's your responsibility to give that to ${hua_him}. Maybe things can never be exactly the way they were before, but at least you can try to repair your friendship with Little One.\n\t\t*goto nextday\n\n\t\t\n*label nextday\n\nLittle One is waiting for you outside the dorm that you used to share. $!{hua_he}'s always been shy, but today she hardly meets your eyes.  \"Thank you, Wang Su,\" ${hua_he} whispers. \"I'm glad that you're the one who's going to help me.\"\n\n\"You're welcome.\" You take Little One's hand and lead ${hua_him} over to the bench where the two of you always used to study together. \"Come on. Let's talk about where you're going to go.\"\n\nWhat do you tell Little One about how ${hua_he} should behave if ${hua_he} truly wants to act in a virtuous way?\n\n*input_text journal11\n\nAnd so you and Little One sit together and talk: roommates together again, as you do your duty to your family, and ${hua_he} moves towards enlightenment.\n\n*page_break End\nWe hope you've enjoyed playing the educational version of [i]First Year Demons.[/i]\n\n*feedback\n\nChoice of Games releases new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "11-endgame": "[b]Chapter 11: The Morning After[/b]\n\n*if bothsurrender\n\t*goto bigwinstart\n\n*elseif ((huasurrender) or (yansurrender))\n\t*goto bigwinstart\n\n*else\n\t*goto openingsplit\n\n*label openingsplit\n*if (disgraced)\n\tThe next morning, you wake up alone in your dorm room. Second Aunt's words from last night still ring in your ears:\n\n\t[i]\"It is your failure that has brought us to this. You are a disgrace to the ancient name of Wang.\"[/i]\n\n\tYour failure. Your fault. Your disgrace.\n\n\tIf you're ever going to get a chance to fight demons again, or even to be trusted by your relatives, you're going to have to work very hard for a very long time.\n\n\tYou feel…\n\n\t*fake_choice\n\t\t#…ashamed. I've let my whole family down.\n\t\t\t*set filial %+10\n\t\t#…angry. It's not my fault, and Second Aunt shouldn't blame me.\n\t\t\t*set interdependence %-10\n\t\t#…determined. I'm going to win their trust back, no matter how long it takes.\n\t\t\t*set interdependence %+10\n\n\tAs you get out of bed, you notice the note slipped under your door.\n\n\t[i]Come to the chemistry department immediately,[/i] it reads. The pen strokes are shaky, but it's unmistakably Eldest Uncle's handwriting. \n\n\tEldest Uncle! He's back! And he wants to see you.\n\n\tHow can you possibly refuse instructions like that?\n\n\t*choice\n\t\t#I could never refuse! This is my chance to start working my way back up.\n\t\t\t*set interdependence %+10\n\t\t\t*goto disgracedoffice\n\t\t#I can't. I want to apologize to Eldest Uncle for what I've done.\n\t\t\t*set filial %+10\n\t\t\t*goto disgracedoffice\n\t\t#I wish I could refuse, but I can't. I'll go because it's expected of me.\n\t\t\t*set filial %+5\n\t\t\t*goto disgracedoffice\n\t\t#I can refuse pretty easily, actually.\n\t\t\tWell, you can. But if you do, you may not get a second chance to win back your family's trust. You'll probably even have to leave the university.\n\n\t\t\t*choice\n\t\t\t\t#I don't care. I'm done.\n\t\t\t\t\t*set filial %-25\n\t\t\t\t\t*set leaving true\n\t\t\t\t\tYou've learned a lot over the last few months - how to fight, how to cast spells, how to talk to a captive demon. But now you realize the most important thing you've learned: you don't fit with the rest of your family. \n\n\t\t\t\t\tYou can't do what they do. You don't agree with anything they think, and you can't obey their instructions. \n\n\t\t\t\t\tAnd you won't pretend anymore.\n\t\t\t\t\t*goto castoutleaving\n\t\t\t\t#All right, then I'll go see him. But I won't be happy about it.\n\t\t\t\t\t*set filial %-10\n\t\t\t\t\t*goto disgracedoffice\n\n\t*label disgracedoffice\n\n\tWhen you arrive in Eldest Uncle's office, he is already there, sitting at his desk. He's pale and shaky, and the deep lines of pain on his face make him look ten years older, but he's there.\n\n\tSo is Second Aunt. She hovers protectively behind him, her expression set in stern disapproval. \"Wang Su,\" she greets you.\n\n\t\"What do you have to say for yourself?\" Eldest Uncle asks, fixing you with a sober gaze.\n\n\t*fake_choice\n\t\t#\"I'm ashamed that I let the family down.\"\n\t\t\tSecond Aunt nods. \"You should be.\"\n\t\t#\"I'm glad that you're better, Eldest Uncle!\"\n\t\t\tHe softens just a little as he says, \"Thank you. But we must speak about what you have done.\"\n\t\t#\"I don't know what I can say.\"\n\t\t\tSecond Aunt sniffs. \"True. There is not much that can be said.\"\n\t\t#Anything I say would just make them more angry at me. I'll stay quiet.\n\t\t\tYou press your mouth shut. \n\n\t\t\tThe silence in the room deepens as long moments pass. Your aunt and uncle stare at you implacably, waiting for you to speak.\n\n\t\t\tYou don't.\n\n\t\t\tFinally, they do.\n\t*comment endif\n\n\t\"Your behavior is a disgrace to you and to our entire family,\" Eldest Uncle intones. \"It will take many years before you can prove yourself worthy enough to stand among us again. This kind of failure is not one that can be forgotten off easily.\" Eldest Uncle leans forward, his keen eyes fixing even more firmly on you. \"Can you do this, Wang Su?\"\n\n\t*choice\n\t\t#\"Yes. I'll do whatever it takes.\"\n\t\t\t\"Good,\" Eldest Uncle says, and a glimmer of warmth shows in his eyes behind the severity and disappointment.\n\n\t\t\t\"There may be hope for you,\" Second Aunt mutters.\n\t\t\t*goto disgracedworking\n\t\t#\"I'm not sure I can, but I'll try.\"\n\t\t\t\"It is good that you are being honest,\" Second Aunt says grudgingly. \"And also good that you have no illusions about how difficult this will be.\"\n\n\t\t\t*label disgracedworking\n\t\t\t*achieve disgraced\n\n\t\t\tEldest Uncle nods. \"You will have to work hard, $!{niece}. But if you are willing to work, then so are we.\"\n\n\t\t\tIt might be years before you're allowed to take your place among your family again. Between now and then, there will be long nights of patrolling, long days of practicing, and many many months of acknowledging the shame that you've brought on your family and yourself.\n\n\t\t\tBut if you work hard and persist, then someday you might be able to share your family's sacred duty again. \n\n\t\t\tSomeday, you might be able to help uphold the balance of the universe.\n\t\t\t*goto ending\n\t\t#\"No. I won't.\"\n\t\t\t*set leaving true\n\t\t\t\"You're…refusing?\" Second Aunt sounds as if she hardly knows the definition of the word. She can't have heard it much from anyone, let alone from a very junior member of her own family.\n\n\t\t\tEldest Uncle shakes his head. He looks even older than he did a few minutes ago. \"We cannot force you. But there is no going back. If you refuse, then you will no longer have a place in this family.\n\t\t\t*achieve castout\n\t\t\t*goto castoutleaving\n\n*elseif (castout)\n\tYou wake up the next morning alone, in the cold echoing emptiness of your dorm room. There used to be happiness and friendship here, but now there is only silence, and the knowledge that your roommates betrayed you.\n\n\tAnd the memory of your family's anger. You've been cast out.\n\n\tAs you slowly drag yourself out of bed, you see that a note has been slipped under your door. The pen strokes are shaky, but it's clearly Eldest Uncle's handwriting.\n\n\t[i]Come to the chemistry department before you leave,[/i] it reads.\n\n\tIt seems that he wants to see you one last time. But will you go to see him?\n\n\t*choice\n\t\t#Yes. I can't get him to undo what's been done, but I want to show him that there's still good in me.\n\t\t\tYou know enough about your family's traditions to know that once someone has been cast out, the decision is final. You can't change that. But if you can make Eldest Uncle's last memory of you a better one, then maybe you can make this goodbye a little less painful.\n\t\t\t*goto castoutoffice\n\t\t#Yes. I want to say goodbye.\n\t\t\tYou know enough about your family's traditions to know that once someone has been cast out, the decision is final. You can't change that.\n\n\t\t\tBut at least you can say goodbye.\n\t\t\t*goto castoutoffice\n\t\t#No. I'm too ashamed to face him.\n\t\t\tYour shame is already so strong that it's almost a physical weight bearing down on you. How much worse would it be to face Eldest Uncle directly after what you've done?\n\n\t\t\tYou just can't do it.\n\t\t\t*goto castoutleaving\n\t\t#No. I don't care what he thinks and I don't want to see him.\n\t\t\tYou have nothing else to say to Eldest Uncle, or to any of your family. You share nothing with them - you know that now. The best thing that you can possibly do is to leave.\n\t\t\t*goto castoutleaving\n\t*label castoutoffice\n\n\tWhen you arrive in Eldest Uncle's office, he is already there, sitting at his desk. He's pale and shaky, and the deep lines of pain on his face make him look ten years older, but he's there.\n\n\tSo is Second Aunt. She hovers protectively behind him, her expression set in stern disapproval. \"Wang Su,\" she greets you.\n\n\t\"There is nothing that you can say that will change what we have decided,\" Eldest Uncle intones. \"Too much has happened for that. But…\" He pauses, and in that moment you can see the traces of emotional pain in his eyes alongside the physical pain. \"But I did not want you to leave without having a chance to speak. What do you have to say for yourself?\" he asks, fixing you with a sober gaze.\n\n\t*fake_choice\n\t\t#\"I'm ashamed that I let the family down.\"\n\t\t\tSecond Aunt nods. \"You should be.\"\n\t\t#\"I'm glad that you're better, Eldest Uncle!\"\n\t\t\tHe softens just a little as he says, \"Thank you. But we must speak about what you have done.\"\n\t\t#\"I don't know what I can say.\"\n\t\t\tSecond Aunt sniffs. \"True. There is not much that can be said.\"\n\t\t#Anything I say would just make them more angry at me. I'll stay quiet.\n\t\t\tYou press your mouth shut. \n\n\t\t\tThe silence in the room deepens as long moments pass. Your aunt and uncle stare at you implacably, waiting for you to speak.\n\n\t\t\tYou don't.\n\n\t\t\tFinally, they do.\n\t*comment endif\n\n\t\"You have acted in a manner more disgraceful than any Wang in ten generations,\" Eldest Uncle declares. \"You have proven yourself incapable of upholding our sacred duty.\" Slowly, he pulls himself to his feet and moves around to the front of the desk. \n\n\tSecond Aunt comes to join him, standing in stiff disapproval as they both face you.\n\n\tIn unison, they speak: \"We cast you out of the Wang family.\"\n\n\t*page_break\n\t*achieve castout\n\n\t\"You have no connection to us anymore,\" Eldest Uncle continues. Both he and Second Aunt look at you with eyes that fall deeper into grief with every word he speaks. \"We will not call on you to aid in our duty, and you will get no help from us either. You are alone.\"\n\n\tThe word rings in your ears. \n\n\tAlone.\n\t*page_break\n\n\t*label castoutleaving\n\tThat's the end of it. \n\n\tYou pack up as much of your belongings as you can carry with you, trying not to look at the books and clothes that your roommates left behind, and prepare to go.\n\n\t*gosub shenyisplit\n\t*page_break\n\n\tYou head to the bus station, suitcase in hand, and wait for the next bus to leave. Even in the middle of the crowds of chattering students and busy commuters that fill the station, you feel alone. For the first time in your life, you don't have to think about how your family will react to what you're doing, or whether you need to check in with them.\n\n\tIt feels…\n\n\t*choice\n\t\t#…liberating.\n\t\t\tFor the first time ever, you're [i]free[/i]. Free to decide what to do without thinking of how it will affect your family; free to go anywhere and do anything. You don't have to think about any ancient duties or about the balance of the universe.\n\n\t\t\tYour heart actually lifts up a little as you approach the ticket counter. You don't know where you're going, but the world is full of possibilities, just for you.\n\t\t\t*goto ending\n\t\t#…devastating.\n\t\t\tAs you wait in line at the bus station, your hand reaches for your cellphone half a dozen times, and half a dozen times you stop yourself. The instinct to call your relatives is still strong, but you know that you can never talk to them again.\n\n\t\t\tWhat will you do without your family? How can you ever overcome the shame of being cast out? The emptiness in your heart is overwhelming. Even if you go somewhere far away and change your name - which you'll almost certainly have to do - that won't erase what you've done, because you'll always know it happened.\n\n\t\t\tYou're full of sorrow as you approach the ticket counter, knowing that you'll never be able to get away from your grief, no matter how far you travel.\n\t\t\t*goto ending\n\t\t#…terrifying.\n\t\t\tIt feels as if the earth under your feet had suddenly turned to quicksand, or as if you'd been transported to another planet. Maybe the world [i]looks[/i] the same, but the knowledge that you don't have a family anymore makes everything feel strange and different and wrong.\n\n\t\t\tYou've dealt with betrayal and faced down demons, but nothing is as terrifying as the knowledge that your family won't be there to support you.\n\n\t\t\tYou step up to the ticket counter and buy a ticket almost at random. You're not sure where you're going, and you're not sure it matters.\n\n\t\t\t*goto ending\n\t\t#…confusing.\n\t\t\tIt feels as if the earth under your feet had suddenly turned to quicksand, or as if you'd been transported to another planet. Maybe the world [i]looks[/i] the same, but the knowledge that you don't have a family anymore makes everything feel strange and different and wrong.\n\n\t\t\tNothing makes sense right now. Maybe nothing ever will.\n\n\t\t\tYou step up to the ticket counter and buy a ticket almost at random. You're not sure where you're going, and you're not sure it matters.\n\n\t\t\t*goto ending\n\n*elseif (bothdead)\n\tWhen you first wake up the next morning, you don't remember.\n\n\tAnd then you do.\n\n\tYour roommates are dead.\n\t*page_break\n\tYour roommates were demons, and now they're dead.\n\n\tAs you huddle alone in your room, you feel…\n\n\t*fake_choice\n\t\t#…overwhelming sorrow.\n\t\t\tThey were your friends! They shared your room, your classes, your [i]life[/i]. And then they betrayed you, and then they died because they wouldn't seek enlightenment. You've never felt such crushing grief.\n\t\t#…dizzying confusion.\n\t\t\tHow can you possibly make sense of what's happened? Everything that you thought was true is false. Your roommates' friendship wasn't sincere; your belief in their goodness was completely misplaced. \n\n\t\t\tYou keep feeling that any minute the door will open and your roommates will walk in, and it's a bewildering shock every time you remember why they don't.\n\t\t#…blazing anger.\n\t\t\tHow could they have deceived you like that? How could they have sat there for months laughing at you while they caused chaos all around the university? You're positive that only the deepest kind of malice would make someone act the way your roommates did, and only the deepest kind of anger can answer that.\n\t*comment endif\n\n\tWhen you finally drag yourself out of bed, you see a note slipped under your door. The pen strokes are shaky, but it's unmistakably Eldest Uncle's writing. [i]Come see me when you're ready. I'll be in my office.[/i]\n\n\t*page_break\n\n\tThe sun streams in through the window of Eldest Uncle's office, as obnoxiously bright as if it were taunting you on purpose. \n\n\tBut there's also the light soothing scent of tea, the steadying presence of Second Aunt - and, best of all, Eldest Uncle himself.  He's pale and weak, and he looks ten years older than he did last week, but he's [i]there[/i]. Just seeing him makes the world feel a little better, a little more right, even when everything else is horribly wrong.\n\n\tHis eyes hold deep sorrow along with the physical pain. \"$!{Niece}. Come sit down,\" he says gently. \"I grieve with you for what happened, but we should talk about it.\"\n\n\t\"Do you think there was anything that you could have done differently?\"\n\n\t*choice\n\t\t#\"No. They were the ones who chose their path.\"\n\t\t\t\"That is true,\" Second Aunt replies with a precise nod. \"We simply offer the choice; it is up to the demons to decide whether they will accept our offer.\"\n\n\t\t\tYou nod along with her. Your roommates could have surrendered and sought enlightenment, but they didn't. The guilt is theirs, not yours.\n\t\t\t*goto meeting2\n\t\t#\"Even if I had done something differently, it wouldn't have changed anything.\"\n\t\t\tSecond Aunt tilts her head, curious at your phrasing. \"Why not?\"\n\n\t\t\t*fake_choice\n\t\t\t\t#\"Because we all share responsibility for what happens.\"\n\t\t\t\t\t\"It would be arrogant of me to think that my actions alone could change anything,\" you continue. \n\t\t\t\t#\"Because the choice of whether or not to seek enlightenment was theirs.\"\n\t\t\t\t\t\"That is true,\" Second Aunt replies with a precise nod. \"We simply offer the choice; it is up to the demons to decide whether they will accept our offer.\"\n\n\t\t\t\t\tYou nod along with her. Your roommates could have surrendered and sought enlightenment, but they didn't. The guilt is theirs, not yours.\n\t\t\t*comment endif\n\t\t\t*goto meeting2\n\t\t#\"Yes. I don't know what, but there must have been something!\"\n\t\t\tYou lived with them for months! There must have been something that you missed; something that you could have done!\n\n\t\t\tSecond Aunt shakes her head, and her voice is surprisingly gentle when she says, \"The fault is not entirely yours, $!{Niece}.\"\n\n\t\t\t*if (tolddemon = \"nobody\")\n\t\t\t\t\"You made a mistake in not telling anyone that you suspected your roommates were demons,\" Eldest Uncle concedes. \"But we understand that you wanted to wait until you were certain, and that was not the only factor in their defeat.\"\n\t\t\t\t*goto meeting2\n\n\t\t\t*else\n\t\t\t\t\"You shared your suspicions about your roommates' true identity as soon as you suspected,\" Eldest Uncle points out, equally gentle. \"You tried your hardest.\"\n\t\t\t\t*goto meeting2\n\n\t*label meeting2\n\n\tEldest Uncle regards you with that sad, sympathetic gaze. \"What do you want to do now?\"\n\n\t*fake_choice\n\t\t#\"I'll work harder to become a stronger member of this family.\"\n\t\t#\"I'll keep trying to figure out what I did wrong.\"\n\t\t#\"I won't take on any missions of my own for a long time.\"\n\n\tEldest Uncle and Second Aunt both nod in response to your words, and the world feels a little brighter than it did a moment before. \n\n\tYou don't know if that will work, and you don't know if that will help you feel any better about your roommates' deaths. But you do know that you're determined to do it, and you hope that someday, it will lead you to a greater understanding of the balance of the universe.\n\n\t*goto ending\n\n*elseif (bigfail)\n\tYou awake from a fitful sleep to the echo of your empty dorm room, and to the memory of your defeat from the night before. You feel...\n\n\t*fake_choice\n\t\t#…sorrow.\n\t\t\tThey were your friends! They shared your room, your classes, your [i]life[/i]. And then they betrayed you. \n\n\t\t\tYou've never felt such crushing grief.\n\t\t#…confusion.\n\t\t\tHow can you possibly make sense of what's happened? Everything that you thought was true is false. Your roommates' friendship wasn't sincere; your belief in their goodness was completely misplaced. \n\n\t\t\tYou keep feeling that any minute the door will open and your roommates will walk in, and it shakes your sense of certainty every time you remember why they don't.\n\n\t\t#…anger.\n\t\t\tHow could they have deceived you like that? How could they have sat there for months laughing at you while they caused chaos all around the university? You're positive that only the deepest kind of malice would make someone act the way your roommates did, and only the deepest kind of anger can answer that.\n\t\t#…guilt.\n\t\t\tYour mind spins with questions. How could you have let them go? What could you have done differently? \n\n\t\t\tAnd, most of all: was this your fault?\n\n\t\t\tYou have a terrible suspicion that the answer to that last one is 'yes.'\n\t*comment endif\n\n\tWhen you finally drag yourself out of bed, you see a note slipped under your door. The pen strokes are shaky, but it's unmistakably Eldest Uncle's writing. [i]Come see me when you're ready. I'll be in my office.[/i]\n\n\t*page_break\n\n\tThe sun streams in through the window of Eldest Uncle's office, as obnoxiously bright as if it were taunting you on purpose. \n\n\tBut there's also the light soothing scent of tea, the steadying presence of Second Aunt - and, best of all, Eldest Uncle himself.  He's pale and weak, and he looks ten years older than he did last week, but he's [i]there[/i]. Just seeing him makes the world feel a little better, a little more right, even when everything else is horribly wrong.\n\n\tWhat do you say to him?\n\n\t*choice\n\t\t#\"I'm sorry. This is all my fault.\"\n\t\t\tEldest Uncle shakes his head. \"Not entirely.\"\n\n\t\t\t\"We were all there,\" Second Aunt agrees. \"We all took part in the fight.\"\n\n\t\t\t*if (tolddemon = \"nobody\")\n\t\t\t\t\"You did make a mistake in not telling anyone that you suspected your roommates were demons,\" Eldest Uncle concedes. \"But we understand that you wanted to wait until you were certain. And at any rate, that was not the only factor in our conflict with them.\n\t\t\t\t*goto failmeeting2\n\n\t\t\t*else\n\t\t\t\t\"You shared your suspicions about your roommates' true identity as soon as you suspected,\" Eldest Uncle points out, equally gentle. \"You tried your hardest.\n\t\t\t\t*goto failmeeting2\n\t\t#\"I'm so happy to see you!\"\n\t\t\tEldest Uncle's expression creases into a gentle smile. \"And I am happy to see you, $!{Niece}.\" He reaches out to clasp your hand, and even if his grasp isn't as strong as it usually is, it's still reassuringly steady and warm. \"But we need to speak about what happened last night.\n\t\t\t*goto failmeeting2\n\n\t\t#\"When are we going to go after those demons again?\"\n\t\t\tSecond Aunt gives you a nod of grim approval. For a moment, she looks almost as fierce as Firecracker. \"Soon,\" she declares. \n\t\t\t*goto failmeeting2\n\n\t*label failmeeting2\n\n\t\"It is not safe for those two demons to be on the loose,\" Eldest Uncle says. \"We will need to send some people to track them down.\" The looks that your aunt and uncle give you are so expectant that they don't even need to ask the question.\n\n\tWill you go along with them?\n\n\t*choice\n\t\t#\"Absolutely!\"\n\t\t\t*label fightingend\n\t\t\t\"Then we leave tomorrow,\" says Second Aunt, with a sharply determined smile. \n\n\t\t\tEldest Uncle nods, and offers a gentler smile. \"I am confident that you will find those demons. Together, our family will set right what went wrong. I am certain of it.\"\n\n\t\t\tWhen your uncle says it like that, you feel certain, too. You'll find the demons who used to be your roommates, and you'll see that the balance of the universe is upheld.\n\t\t\t*goto ending\n\n\t\t#\"Only if you think I'm ready for it.\"\n\t\t\t*if balance > 60\n\t\t\t\t\"We do,\" Second Aunt replies. \"Regardless of what happened in the fight with the demons last night, you have shown that you have a strong understanding of the balance of the universe.\"\n\n\t\t\t\t\"You are ready for this, $!{Niece},\" Eldest Uncle adds. \"Truly, you are.\"\n\t\t\t\t*goto fightingend\n\n\t\t\t*else\n\t\t\t\tSecond Aunt and Eldest Uncle exchange glances. \"If you do not hold a secure sense of your own balance,\" Second Aunt says slowly, \"then perhaps it would be better to wait a while before sending you out on a mission like this.\"\n\t\t\t\t*goto workingend\n\n\t\t#\"I failed once. I don't want to fail again.\"\n\t\t\t*label workingend\n\n\t\t\tEldest Uncle nods. \"Then you will stay here and keep working. You still have a sacred duty, and you must keep studying so that you can uphold it.\"\n\n\t\t\tSome parts of your world have changed beyond your recognition.  Your roommates are gone; your sense of truth has been shaken deeply. But your family is still the same, and so is your duty to uphold the balance of the universe. You'll hold onto that as you move forward in the world.\n\n\t\t\t*goto ending\n\n*else\n\t*bug Pretty sure this is a bug.\n\n\n*label bigwinstart\nThe next morning, you all gather in Eldest Uncle's office. Bright sun streams in through the windows as you wait for the rest of your family to arrive.\n\nIt's Eldest Uncle! He's pale and shaky, and leaning heavily on Cousin Tian's arm, but he's [i]there[/i], and the world feels like it's finally regaining some of its order.\n\n*fake_choice\n\t#I run to hug him. (Carefully!)\n\t\tEldest Uncle gives a little start, surprised at your sudden outburst of affection. But then he softens, and pats your back gently.\n\t#I smile across the room at him.\n\t\tEldest Uncle catches your eye and gives you a warm fond smile in return.\n\t#I say, \"Eldest Uncle! I'm so happy to see you.\"\n\t\tHe smiles back. \"It is good to be back, ${Nickname}.\"\n\t#I look away. I still feel guilty that he got hurt.\n\t\tWhile the rest of your family murmurs their greetings, you stay where you are, apart and alone in your shame.\n\nEldest Uncle settles himself carefully in his chair, and all eyes turn to him while he prepares to speak.\n\n\"We have finally eliminated the threat from the two demons that were menacing the dining hall.\" Eldest Uncle's voice is a little thinner and less resonant than usual, but his tone is still perfectly calm, even when he's speaking of the demons who attacked him. \"This campus will be safer because of it.\" Then his gaze turns towards you, and there is sympathy in his eyes. \"This struggle was especially hard on our youngest member,\" he says gently. \n*if (bothsurrender)\n\t\"Even though it ended well, we know that it was difficult for you while it lasted.\n\t*goto bigwinmiddle\n*else\n\t\"The choice was theirs. We don't blame you for the fact that one of them turned away from enlightenment.\n\t*goto bigwinmiddle\n*label bigwinmiddle\nAnd in the end, you did well. It shows that you have more than proven yourself worthy of full membership in our order.\"\n\nYour heart leaps.\n\n\"Your studies are not complete,\" he adds.\n*gosub filialconvo\n*gosub classrankconvo\n*gosub balanceconvo\n*gosub secrecyconvo\n\n\"But you will learn more over time,\" Eldest Uncle finishes. \"We all do.\" He takes a deep breath, gathering his strength, and pushes himself to his feet. \"Let us gather in the sacred circle,\" he intones, \"and bring our newest member fully into our group.\"\n\nPride rises up to fill your entire being as you move forward to stand in the circle of your family, hands joined together. You are not in the center, even though you are the one for whom this ceremony is being performed - you are in the circle, one of the parts that makes up the whole. \n\nWhen you look up again, Eldest Uncle is smiling. \"Welcome, Wang Su,\" he says. He's using your full name, but this time it doesn't sound angry; it sounds formal. Official. Real. \"Now you are truly one of us.\" Your heart fills with pride, so full that you think you'll never stop smiling. \"And now that you are a full member of the group, you have an assignment of your own.\"\n\n\"What is it?\" you ask.\n*page_break\n*achieve teacher\n\n*if (bothsurrender)\n\t\"Your roommates,\" he replies, as you thought he might. \"The demons Xu Hua and Sun Yan. They claim to be seeking enlightenment, and it's our obligation to help them. Ordinarily, we would not assign two demons to such a new member of our order, but you've already proven your ability, and they've already shown that they trust you to some degree. You can guide them along the path and teach them what they will need to know.\n\t*goto nextday\n\n*else\n\t\"Your roommate,\" he replies, as you thought he might. \"The demon that you call ${Surrendered}. $!{hua_he} claims to be seeking enlightenment, and it's our obligation to help ${hua_him}. Since ${hua_he} already trusts you, ${hua_he} will be in your charge. You can guide ${hua_him} along the path and teach ${hua_him} what ${hua_he} will need to know.\"\n\t*goto nextday\n\n*label nextday\n*page_break\nThe next morning, you step outside, ready to face the task ahead of you.\n\n*if bothsurrender\n\tYour former roommates are already there, waiting for you outside the dorm that you used to share. Little One has always been shy, but today ${hua_he} doesn't even meet your eyes. All of ${Grandma}'s confidence is gone, too, leaving ${yan_his} head bowed and shoulders slumped. ${Grandma} is still the one who talks for both of them, though. \"Thank you, Wang Su,\" ${yan_he} says quietly. \"We know that you didn't have to help us, and we're grateful that you did.\"\n\n\t*fake_choice\n\t\t#\"Call me ${Roommatenick}.\"\n\t\t\tThe offer of informality brings a genuine smile to Little One's face, and ${hua_he} actually looks up to meet your gaze. \"Thank you, ${Roommatenick},\" ${hua_he} says sincerely.\n\t\t#\"I'm glad that I can help you too.\"\n\t\t\tLittle One's eyes flicker up to meet yours, and ${hua_he} ventures a small smile. \"It's going to be hard, but we want to do it.\"\n\t\t#\"I'm not sure if this is going to work, but I have to try.\"\n\t\t\tLittle One droops a little more, and ${Grandma} nods. \"We understand,\" ${Grandma} sighs. \"I wouldn't trust us either, if I were you. But we won't let you down. I promise.\" Little One nods ${hua_his} wordless agreement.\n\t*comment endif\n\n\tYou nod, and reach out to lead your former roommates over to sit on the bench where you all used to study together. \"Come on,\" you say. \"Let's talk about where you're going to go.\"\n\t\n\t*goto ending\n\n*elseif huasurrender\n\tLittle One is already there, waiting for you outside the dorm that you used to share. $!{hua_he}'s always been shy, but today ${hua_he} doesn't even meet your eyes.  \"Thank you, Wang Su,\" ${hua_he} whisper to the ground. \"I'm glad that you're the one who's going to help me.\"\n\n\t*fake_choice\n\t\t#\"Call me ${Roommatenick}.\"\n\t\t\tThe offer of informality brings a genuine smile to Little One's face. \"Thank you, ${Roommatenick},\" ${hua_he} says sincerely.\n\t\t#\"I'm glad that I can help you too.\"\n\t\t\tLittle One's eyes flicker up to meet yours, and ${hua_he} ventures a small smile. \"It's going to be hard, but I want to do it.\"\n\t\t#\"I'm not sure if this is going to work, but I have to try.\"\n\t\t\tLittle One droops a little more, but ${hua_he} nods. \"I understand,\" ${hua_he} sighs. \"It will be hard for you to trust me. But I won't let you down. I promise.\"\n\t*comment endif\n\n\tYou nod, and reach out to lead Little One over to the bench where the two of you always used to study together. \"Come on,\" you say. \"Let's talk about where you're going to go.\"\n\n\t*goto ending\n\n*else\n\t${Grandma} is already there, waiting for you outside the dorm that you used to share. All of ${yan_his} usual confidence is gone: ${yan_he} doesn't even meet your eyes when ${yan_he} greets you. \"Thank you, Wang Su,\" ${yan_he} says quietly. \"I'm glad that you're the one who's going to help me.\"\n\n\t*fake_choice\n\t\t#\"Call me ${Roommatenick}.\"\n\t\t\t${Grandma} looks up swiftly, and gives you a genuine smile in return for your offer of informality. \"Thank you, ${Roommatenick},\" ${hua_he} says sincerely. \"For that, and for everything. I probably wouldn't have surrendered if it weren't for you.\"\n\t\t#\"I'm glad that I can help you too.\"\n\t\t\t${Grandma} ventures a small smile, and looks up to meet your eyes. \"I know you'll be honest with me. I probably wouldn't have surrendered if it weren't for you.\"\n\t\t#\"I'm not sure if this is going to work, but I have to try.\"\n\t\t\t${Grandma} sighs, and offers a wry, crooked smile. \"I guess I can understand that. I wouldn't believe me either, after what I've done. But I'm going to change. I'll show you.\"\n\t\t*comment endif\n\n\tYou nod, and reach out to lead ${Grandma} over to the bench where the two of you always used to study together. \"Come on,\" you say. \"Let's talk about where you're going to go.\"\n\n\t*goto ending\n\n*comment subroutines start here\n\n*label filialconvo\n*if filial > 70\n\t*achieve filial\n\t\"Still, you have been a remarkably filial ${niece},\" Second Aunt puts in. It feels good to hear her praise, but you wish she didn't sound so surprised. \"If you continue on this path, ${Nickname}, you will undoubtedly do well.\"\n\t*return\n\n*elseif filial > 50\n\t\"You must work on your filial duties,\" Second Aunt puts in, with her usual disapproving sniff. \"Make certain that you act in a more respectful manner towards your elders.\"\n\t*return\n\n*else\n\t\"You must work much harder on your filial duties,\" Second Aunt puts in. You might think that it's just her high standards and traditional attitude that make her sound so disapproving, but she's not the only one giving you a severe look. Even Eldest Uncle's expression has become unhappy. \"It is very fortunate that your disrespect did not make matters worse,\" Second Aunt continues. \"If you are to uphold our family's traditions, Wang Su, you must do better.\"\n\t*return\n\n*label balanceconvo\n*if balance > 70\n\t\"Your understanding of the universe's balance is exceptional,\" Eldest Uncle continues with a smile. \"You have learned well, and I hope that you continue to use that knowledge as you move forward.\n\t*return\n\n*elseif balance > 50\n\t\"You are beginning to understand the universe's balance,\" Eldest Uncle continues. \"But only [i]just[/i] beginning. You must keep working hard if you are to continue guiding demons towards enlightenment.\n\t*return\n\n*else\n\t\"You do not understand the universe's balance,\" Eldest Uncle continues, a frown darkening his expression. \"How will you help others understand it if you do not understand it yourself? You must work harder, or you will never fully be able to fulfill our family's sacred duties.\n\t*return\n\n*label classrankconvo\n*if classrank \u003c 20\n\t\"You are doing very well in your studies,\" Tian says, looking impressed. \"It is not easy to keep up with schoolwork when you have so many other duties pressing on you.\"\n\t*return\n\n*elseif classrank \u003c 50\n\t\"You need to give more time to your studies,\" Tian says, his mild expression showing faint disappointment. \"It is not easy to keep up with schoolwork when you have so many other duties pressing on you, but your schoolwork [i]is[/i] part of our family's sacred obligation. You must not let it slide.\"\n\t*return\n\n*else\n\t\"Your grades have been disappointing,\" Tian sighs, shaking his head. \"Your schoolwork is part of our family's sacred obligation. How are you going to learn to make the potions that we need? You must study harder.\"\n\t*return\n\n*label secrecyconvo\n*if secretcounter >= 3\n\t\"You must learn to be more discreet about our family's mission,\" Lin advises. \"It would be disastrous if other people were to panic because they think there are demons about - or, even worse, if the demons learned of our plans. You need to be better at keeping secrets.\"\n\t*return\n*elseif secretcounter > 0\n\t\"Keeping secrets is hard,\" Lin begins, \"and we know that you're working on it, but you must try harder. You cannot even hint at our family's mission to any outsiders.\"\n\t*return \n*else\n\t*achieve secrecy\n\t\"You're doing very well at keeping our missions secret,\" Lin says approvingly. \"Keep up the good work. Secrecy will matter even more as you gain greater responsibility in the family.\"\n\t*return\n\n*label shenyisplit\n*comment Conversations with Shen Yi\n\n*if shenyidate\n\t*if leaving\n\t\tAre you going to say goodbye to Shen Yi before you go?\n\n\t\t*choice\n\t\t\t#Yes. I wouldn't feel right if I left without saying goodbye.\n\t\t\t\t*goto datinggoodbye\n\t\t\t#Yes. I care a lot about ${yi_him} and want to see ${yi_him}.\n\t\t\t\t*label datinggoodbye\n\t\t\t\tWhen you text Shen Yi to ask ${yi_him} to meet you at the campus coffeeshop, ${yi_he} agrees almost at once.\n\n\t\t\t\tHow are you going to approach this conversation?\n\n\t\t\t\t*choice\n\t\t\t\t\t#Indirectly. Shen Yi is polite, and it will make ${yi_him} feel better if I am too.\n\t\t\t\t\t\t\"I remember you said once that you liked the ocean,\" you begin. \"I've always wanted to go, too. But most of my relatives here aren't as interested in going as I am. Would you like me to send you a postcard?\"\n\n\t\t\t\t\t\tYou see the wheels turning in Shen Yi's mind as ${yi_he} processes what you're saying.\n\t\t\t\t\t\t*if indirect > 60\n\t\t\t\t\t\t\tSurprise registers first, and then sadness: ${yi_he} understands that something is wrong between you and your family, and you have to leave.\n\n\t\t\t\t\t\t\t\"Yes. Please send a postcard,\" Shen Yi says quietly. \"And please call when you can.\n\t\t\t\t\t\t\t*label shenyiokay\n\t\t\t\t\t\t\tGoodbye, Wang Su. I'll miss you, but I'm glad that we've gotten the chance to know each other.\"\n\n\t\t\t\t\t\t\tIt eases the pain of leaving a little to know that you've built a good relationship while you were here.\n\n\t\t\t\t\t\t\tA little.\n\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"Wait.\" Shen Yi shakes ${yi_his} head in confusion. \"You're leaving?\" $!{yi_he}'s startled into directness. \"What's going on? There's something that you're not telling me, isn't there?\"\n\n\t\t\t\t\t\t\t$!{yi_he}'s right; there is. But you can't tell ${yi_him}.\n\n\t\t\t\t\t\t\t*label shenyihurt\n\t\t\t\t\t\t\t\"Goodbye, Wang Su,\" Shen Yi says quietly, and turns away, leaving you alone.\n\n\t\t\t\t\t\t\tIt hurts even more to leave now that you know that you're hurting Shen Yi, too.\n\n\t\t\t\t\t\t\t*return\n\t\t\t\t\t#Gently. My leaving will hurt both of us enough already, and I want to try to avoid any more pain.\n\t\t\t\t\t\t\"I'm very sorry,\" you begin gently, \"but I'm going to have to go away for a while. It's...a family problem. I'll miss you, and I hope I'll see you again.\"\n\t\t\t\t\t\t*if ((weapons \u003c 50) or (indirect > 50))\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSurprise registers first, and then sadness. \"I understand. After what happened to your uncle...\" Shen Yi, tactful as always, leaves the rest unsaid, and just shakes ${yi_his} head. \"I'm sorry, and I hope that everything will be all right.\n\t\t\t\t\t\t\t*goto shenyiokay\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tBut you're not used to speaking gently: your words come out sounding forceful instead, and you see Shen Yi flinch a little. \"You're going away?\"\n\t\t\t\t\t\t\t*goto shenyihurt\n\t\t\t\t\t#Quickly. I don't want it to last any longer than it has to.\n\t\t\t\t\t\t\"I'm leaving,\" you say. \"I can't stay at East Mountain University anymore. I wish I could, but I can't. It makes me sad to leave you, but I just can't stay.\"\n\n\t\t\t\t\t\tShen Yi blinks back in surprise. $!{yi_he}'s so used to being polite and indirect that ${yi_he} almost doesn't know what to do when you don't follow suit.\n\t\t\t\t\t\t*if interdependence \u003c 50\n\t\t\t\t\t\t\tBut ${yi_he} understands that you're a very independent person, and that means that sometimes you do things differently.\n\n\t\t\t\t\t\t\t\"I know you,\" ${yi_he} begins slowly, \"and I know you must have a good reason for it.\n\t\t\t\t\t\t\t*goto shenyiokay\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"This is...very sudden,\" ${yi_he} manages. There's much more that Shen Yi looks like ${yi_he} wishes that ${yi_he} could say - questions about why, and how - but ${yi_his} reticence takes over, and ${yi_he} just gives you a pained look.\n\t\t\t\t\t\t\t*goto shenyihurt\n\n\t\t\t#No. It would be too painful to face ${yi_him} right now.\n\t\t\t\t*label nogoodbye\n\t\t\t\tThe one person that you wish you could talk to is the one person that you just can't talk to. \n\n\t\t\t\tHow can you tell Shen Yi that you're leaving? How can you tell ${yi_him} [i]why[/i] you're leaving? It would mean breaking the secrecy that the Wangs have upheld for generations. Plus, ${yi_he}'s incredibly devoted to ${yi_his} family, so there's no way that ${yi_he} would understand that you're breaking away from yours?\n\n\t\t\t\tYour hand keeps going towards your phone to call Shen Yi, but you stop yourself every time.\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t\t\t#No. I just don't want to talk to ${yi_him}.\n\t\t\t\t*label saynothing\n\t\t\t\tSo you don't.\n\n\t\t\t\tShen Yi texts you later that day, just to say hi. You don't answer.\n\t\t\t\t*return\n\n\t*else\n\t\t*return\n\n*elseif rel_shen > 55\n\t*if leaving\n\t\tAre you going to say goodbye to Shen Yi before you go?\n\t\t*choice\n\t\t\t#Yes. I wouldn't feel right if I left without saying goodbye.\n\t\t\t\t*goto friendgoodbye\n\t\t\t#Yes. I care a lot about ${yi_him} and want to see ${yi_him}.\n\t\t\t\t*label friendgoodbye\n\t\t\t\tYour chemistry lab group is meeting later today, and Shen Yi agrees to meet you for tea beforehand.\n\n\t\t\t\tHow are you going to approach this conversation?\n\n\t\t\t\t*choice\n\t\t\t\t\t#Indirectly. Shen Yi is polite, and it will make ${yi_him} feel better if I am too.\n\t\t\t\t\t\t\"I remember you said once that you liked the ocean,\" you begin. \"I've always wanted to go, too. But most of my relatives here aren't as interested in going as I am. Would you like me to send you a postcard?\"\n\n\t\t\t\t\t\tYou see the wheels turning in Shen Yi's mind as ${yi_he} processes what you're saying.\n\t\t\t\t\t\t*if indirect > 60\n\t\t\t\t\t\t\tSurprise registers first, and then sadness: ${yi_he} understands that something is wrong between you and your family, and you have to leave.\n\n\t\t\t\t\t\t\t\"Yes. Please send a postcard,\" Shen Yi says quietly. \"I hope you're all right.\n\t\t\t\t\t\t\t*label shenyifriendokay\n\t\t\t\t\t\t\tGoodbye, Wang Su. I'll miss you, but I'm glad that we've gotten the chance to know each other.\"\n\n\t\t\t\t\t\t\tIt eases the pain of leaving a little to know that you had a good friend like Shen Yi while you were here.\n\n\t\t\t\t\t\t\tA little.\n\t\t\t\t\t\t\t*return\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"Wait.\" Shen Yi shakes ${yi_his} head in confusion. \"You're leaving?\" $!{yi_he}'s startled into directness. \"What's going on? There's something that you're not telling me, isn't there?\"\n\n\t\t\t\t\t\t\t$!{yi_he}'s right; there is. But you can't tell ${yi_him}.\n\n\t\t\t\t\t\t\t*label shenyifriendhurt\n\t\t\t\t\t\t\t\"Goodbye, Wang Su,\" Shen Yi says quietly, and turns away, leaving you alone.\n\n\t\t\t\t\t\t\tFirst your roommates, and now Shen Yi: you're not leaving any friends behind. You thought that might have made it easier, but it doesn't. It makes it much much worse.\n\n\t\t\t\t\t\t\t*return\n\t\t\t\t\t#Gently. My leaving will hurt both of us enough already, and I want to try to avoid any more pain.\n\t\t\t\t\t\t\"I'm very sorry,\" you begin gently, \"but I'm going to have to go away for a while. It's…a family problem. I just wanted to say goodbye before I left.\"\n\t\t\t\t\t\t*if ((weapons \u003c 50) or (indirect > 50))\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSurprise registers first, and then sadness. \"I understand. After what happened to your uncle…\" Shen Yi, tactful as always, leaves the rest unsaid, and just shakes ${yi_his} head. \"I'm sorry, and I hope that everything will be all right.\n\t\t\t\t\t\t\t*goto shenyifriendokay\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tBut you're not used to speaking gently: your words come out sounding forceful instead, and you see Shen Yi flinch a little. \"You're going away?\"\n\t\t\t\t\t\t\t*goto shenyifriendhurt\n\t\t\t\t\t#Quickly. I don't want it to last any longer than it has to.\n\t\t\t\t\t\t\"I'm leaving,\" you say. \"I can't stay at East Mountain University anymore. I wish I could, but I can't. I just wanted to say goodbye.\"\n\n\t\t\t\t\t\tShen Yi blinks back in surprise. $!{yi_he}'s so used to being polite and indirect that ${yi_he} almost doesn't know what to do when you don't follow suit.\n\t\t\t\t\t\t*if interdependence \u003c 55\n\t\t\t\t\t\t\tBut ${yi_he} understands that you're a very independent person, and that means that sometimes you do things differently.\n\n\t\t\t\t\t\t\t\"I know you,\" ${yi_he} begins slowly, \"and I know you must have a good reason for it.\n\t\t\t\t\t\t\t*goto shenyifriendokay\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"This is…very sudden,\" ${yi_he} manages. There's much more that Shen Yi looks like ${yi_he} wishes that ${yi_he} could say - questions about why, and how - but ${yi_his} reticence takes over, and ${yi_he} doesn't ask any of them.\n\t\t\t\t\t\t\t*goto shenyifriendhurt\n\t\t\t#No. It would be too painful to face ${yi_him} right now.\n\t\t\t\t*goto nogoodbye\n\t\t\t#No. I just don't want to talk to ${yi_him}.\n\t\t\t\t*goto saynothing\n\t*else\n\t\t*return\n\n*else\n\t*if leaving\n\t\tDo you want to say goodbye to any of your friends before you leave?\n\n\t\t*choice\n\t\t\t#Yes. I wouldn't feel right if I left without talking to them.\n\t\t\t\tYour chemistry lab group is meeting today to study for an exam, and even though you won't be here to take the exam, you know that you'll find your friends all in the same place.\n\n\t\t\t\tThey're all clustered around the table when you walk in: Shen Yi, ${yi_his} roommate Zhu Yang, and all the rest. \"Oh, Wang Su, I'm glad you're here,\" says Shen Yi as you enter. $!{yi_his} smile turns to confusion when ${yi_he} sees that you're alone. \"Xu Hua isn't with you?\" \n\n\t\t\t\tYou wince inwardly. No, Little One isn't with you, but there's no way that you can possibly say why ${hua_he} isn't. All you say is, \"No. And I can't stay, actually. I just wanted to say goodbye. I'm leaving East Mountain University.\"\n\n\t\t\t\tHalf a dozen expressions of surprise look back at you.\n\n\t\t\t\t\"Leaving?\" Shen Yi repeats in surprise.\n\n\t\t\t\t\"Are you all right?\" Zhu Yang asks worriedly. \n\n\t\t\t\t*choice\n\t\t\t\t\t#I'll lie to them. \"I need to help take care of my uncle.\"\n\t\t\t\t\t\tAs soon as you mention your family, your whole lab group nods in knowing sympathy. Nobody outside the family knows exactly what happened to Eldest Uncle, but everybody knows that [i]something[/i] is wrong with Dean Wang. \n\n\t\t\t\t\t\t\"You're a good ${niece},\" Shen Yi says sincerely. $!{yi_he} is very close to ${yi_his} family, and admires anyone who is close to theirs, too.\n\n\t\t\t\t\t\tYou're not close to your family anymore, but of course you don't say that. \"Thank you. Goodbye,\" is all you say.\n\n\t\t\t\t\t\tAnd so you leave, letting your friends think that you're still filial, and that you're not disgraced at all.\n\t\t\t\t\t\t*return\n\t\t\t\t\t#I'll tell them as much of the truth as I can. \"There's been a family problem and I can't stay here.\"\n\t\t\t\t\t\tAs soon as you mention your family, your whole lab group nods in knowing sympathy. Nobody outside the family knows exactly what happened to Eldest Uncle, but everybody knows that [i]something[/i] is wrong with Dean Wang. \n\n\t\t\t\t\t\tThey probably assume that the \"problem\" means that your uncle has been hurt and you have to take care of him. You can't tell them anything else.\n\t\t\t\t\t\t*goto labgroupgoodbye\n\t\t\t\t\t#I'll hide everything. \"I'm fine. I just have to leave.\"\n\t\t\t\t\t\tThey can tell that there's more that you're not saying, but they don't ask: they probably assume that if you could have told them, you would have, so there must be a very good reason why you're not telling them.\n\n\t\t\t\t\t\t*label labgroupgoodbye\n\n\t\t\t\t\t\t\"Goodbye, then,\" Shen Yi says slowly. \"We'll miss you.\" The rest of your lab group nods their sad agreement as they say their own farewells.\n\n\t\t\t\t\t\tIt eases the pain of leaving a little to know that you had good friends while you were here.\n\n\t\t\t\t\t\tA little.\n\t\t\t\t\t\t*return\n\n\n\t\t\t#No. It would be too painful to face them right now.\n\t\t\t\tHow can you tell your friends that you're leaving? How can you tell your friends [i]why[/i] you're leaving? It would mean breaking the secrecy that the Wangs have upheld for generations - not to mention, telling your friends about the failure that's brought shame onto you and your whole family.\n\n\t\t\t\t*label nofriendgoodbye\n\t\t\t\tYou know that your chemistry lab group is meeting today, and they're going to wonder where you are. But you don't go to see them, and you don't tell them why you're not there.\n\n\t\t\t\tYour phone buzzes with worried texts from Shen Yi and Zhu Yang when you don't show up, but you don't answer.\n\t\t\t\t*page_break\n\t\t\t\t*return\n\t\t\t#No. There isn't anyone I want to talk to now that my roommates are gone.\n\t\t\t\t*goto nofriendgoodbye\n\n\t*else\n\t\t*return\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]First Year Demons.[/i]\n\n*feedback\n\nChoice of Games releases new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "2-classchoice-old": "*page_break\n[b]Chapter 2: Class Choice[/b]\n\nBefore you even start school, you need to sign up for a major. That will determine your schedule for the next four years: every major at East Mountain University has a set series of classes that all of its students have to follow. Every major is demanding - no matter what you study, you know that you'll have to work very hard. \n\nYou'd assumed that you would be majoring in chemistry - that's what you'd discussed with your parents and Eldest Uncle after you were accepted at East
