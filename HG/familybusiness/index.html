<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First Year Demons — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "familybusiness", "title": "First Year Demons", "scenes": {"1-opening-old": "*set secondgame false\n\nWelcome to 'First Year Demons,' a story that explores traditional Chinese cultural values. In this story, you take on the role of the main character, making the decisions and having the conversations that the main character would have.\n\nAt various points during the story, you'll be asked to write a brief journal entry. Answer these questions in a few sentences - about 50-75 words - as if you were the main character, saying what you think s/he would say. These journal entries won't be stored anywhere; they're just an opportunity for you to reflect on your experiences.\n\n\n[i]Supported by the Intelligence Advanced Research Projects Activity (IARPA) via Department of Interior, Interior Business Center, contract number D13PC00246.  The U.S. government is authorized to reproduce and distribute reprints for Governmental purposes notwithstanding any copyright annotation thereon.  Disclaimer:  The views and conclusions contained herein are those of the authors and should not be interpreted as necessarily representing the official policies or endorsements, either expressed or implied, of IARPA, DOI/IBC, or the U.S. Government.[/i]\n\n*page_break\n\nBefore we begin, we need to ask a few questions about you, the participant. \n\nDo you identify as male or female?\n\n*choice\n\t#Female\n\t\tThank you. Your choice has been registered.\n\t\t*set niece \"Niece\"\n\t\t*set yan_gender \"girl\"\n\t\t*set yan_he \"she\"\n\t\t*set yan_him \"her\"\n\t\t*set yan_his \"her\"\n\t\t*set hua_gender \"girl\"\n\t\t*set hua_he \"she\"\n\t\t*set hua_him \"her\"\n\t\t*set hua_his \"her\"\n\t\t*set yi_gender \"boy\"\n\t\t*set yi_he \"he\"\n\t\t*set yi_him \"him\"\n\t\t*set yi_his \"his\"\n\t\t*set grandma \"Grandma\"\n\t\t*goto title\n\t#Male\n\t\tThank you. Your choice has been registered.\n\t\t*set niece \"Nephew\"\n\t\t*set yan_gender \"boy\"\n\t\t*set yan_he \"he\"\n\t\t*set yan_him \"him\"\n\t\t*set yan_his \"his\"\n\t\t*set hua_gender \"boy\"\n\t\t*set hua_he \"he\"\n\t\t*set hua_him \"him\"\n\t\t*set hua_his \"his\"\n\t\t*set yi_gender \"girl\"\n\t\t*set yi_he \"she\"\n\t\t*set yi_him \"her\"\n\t\t*set yi_his \"her\"\n\t\t*set grandma \"Grandpa\"\n\t\t*goto title\n\t\n*label title\n*page_break\n[b]Chapter 1: The Fight[/b]\n\nFire flashes from the mouth of the demon, a flare so bright in the darkness of night that it nearly blinds you.\n\n“Su!” your cousin Mei shouts. “Behind you!”\n\nYou whirl around, eyes still dazzled, hands flying out to strike. The demon's breath glows hot on your face - even though you can't see it clearly, you know that it's directly in front of you.\n\n\"Over here!\" Mei calls from somewhere to your left. \"Together, we can get it!\"\n\nYou only have a second before the demon is upon you. What do you do?\n\n*choice\n\t#I trust my own instincts - I'll strike directly in front of me.\n\t\t*set modest %-10\n\t\t*set interdependence %-15\n\t\tYou duck down under the hot flare of demon-breath and slam your hand into the scaly snakelike side. A harsh unearthly cry of pain rises up from it, and you grin in triumph.\n\n\t\tBut then you feel the demon surging forward again. \n\n\t\tWhen you’re fighting with your family, you feel almost as if the six of you are a single body, all moving in perfect harmony with each other. You couldn’t imagine fighting on your own any more than you can imagine your hand going off to fight without the rest of your body attached.\n\n\t\tBut this time you [i]have[/i] gone off on your own, and you're not having any more success than if your hand had left your body.\n\n\t\tIt's Mei who darts in to save you, with Eldest Uncle at her side. The two of them strike in the same instant, and the force of their hands together sends the demon thumping to the ground.\n\n\t\tAs soon as the demon is down, Mei whirls on you. \"What was that?\" she asks, furious and disdainful. \n\n\t\tEldest Uncle's eyes hold no anger, just disappointment, as he offers you a hand up. \"${Niece}. You must remember your duty to the family,\" he advises quietly. \"We must all fight together if we are to restore balance to the world.\"\n\t\t*goto family\n\n\t\t\n\t#I trust my cousin - I'll follow the sound of Mei's voice so that I can attack with her.\n\t\t*set filial %+15\n\t\t*set interdependence %+15\n\t\tYou don't need to see her to know where Mei is. It's more than just following her voice - sometimes when you're fighting, you can [i]feel[/i] where everyone else in your family is. \n\n\t\tWhen you’re fighting with your family, you feel almost as if the six of you are a single body, all moving in perfect harmony with each other. You couldn’t imagine fighting on your own any more than you can imagine your hand going off to fight without the rest of your body attached.\n\n\t\tYou dodge to the left, ducking under another hot rush of demon-breath, and strike out. Your hand hits at the same time as Mei's - again, you don't need to see it. You can feel it. It feels [i]right[/i].\n\n\t\tThe demon shrieks, a harsh unearthly cry of pain, and thumps to the ground.\n\t\t*page_break\n\n\t\t\"Ha!\" Mei shouts in triumph, as the rest of the family starts to gather around.\n\n\t\tEldest Uncle's expression is as stoic as always, but pride shines quietly in his eyes as he looks down at you and Mei. \"We must all fight together if we are to restore balance to the world.\"\n\t\t*goto family\n\n\n\t#I trust my own discretion. The demon is too big for me to handle! I'm getting out of its way.\n\t\t*set modest %+10\n\t\t*set filial %-10\n\t\tYour skills are no match for the rest of your family! Maybe it's best to let them handle this one.\n\n\t\tWhen you’re fighting with your family, you feel almost as if the six of you are a single body, all moving in perfect harmony with each other. You couldn’t imagine fighting on your own any more than you can imagine your hand going off to fight without the rest of your body attached.\n\n\t\tYou duck and roll out of the way, dodging another hot rush of demon-breath as you escape into the darkness. You hear Mei's shout of anger as she charges in to attack the demon, and your vision clears enough to see that Eldest Uncle is right by her side. The two of them strike in the same instant, and the force of their hands together sends the demon thumping to the ground with a pained whimper.\n\n\t\tMei whirls on you. \"What was that?\" she asks, furious and disdainful. \n\n\t\tEldest Uncle's eyes hold no anger, just disappointment, as he offers you a hand up. \"${Niece}. You must remember your duty to the family,\" he advises you quietly. \"We must all fight together if we are to restore balance to the world.\"\n\t\t*goto family\n\n*label family\n\n*page_break\n\nYou are Wang Su, the youngest member of the ancient Wang family. For centuries, your family has maintained the balance between heaven and hell. You and your relatives seek out demons and take whatever steps are needed to protect other people from them. Some demons seek enlightenment – if you find one of those, then you have an obligation to steer it further along on the path. But if you find a demon that refuses to seek enlightenment, then you must send it back to hell. It’s the only way to maintain harmony here on earth.\n\nIt’s a pretty big duty, isn’t it?\n\n*choice\n\t#Yes, and I’m terrified that I won’t be up to the challenge. \n\t\t*set modest %+15\n\t\tYou do have a lot to learn, and it's good that you're taking your obligations seriously. Fortunately, you have the rest of your family to support you.\n\t\t*goto nickname\n\t#Yes, but it’s my family’s destiny. I don’t have any other choice.\n\t\t*set filial %+10\n\t\t*set holistic %+15\n\t\tThis is what being in the Wang family means. Your obligation to them means more than your personal feelings.\n\t\t*goto nickname\n\t#Maybe, but my duty isn’t nearly as big as my uncle’s. He’s the one who makes the decisions; I’m just a junior member of the family.\n\t\t*set filial %+10\n\t\t*set modest %+10\n\t\t*set interdependence %+10\n\t\t*set hierarchy %+10\n\t\tThat's true. Eldest Uncle is the leader, and his decisions affect everyone in the family.\n\t\t*goto nickname\n\n*label nickname\n\nAll your life, you've known that someday, you would take your place among your relatives as a full-fledged demon hunter. It's meant that you've had to struggle with some difficult ideas about the nature of balance and harmony.\n\n\"Aren't demons evil?\" you asked Eldest Uncle, when you were small. You lived with your parents, of course, and as their only child you received a lot of their attention, but Eldest Uncle visited your apartment often. \"Why don't we just kill them? Or send them someplace far away so they can't hurt anyone?\"\n\n\"It isn't a question of good or evil,\" he explained. \"It's about balance. Demons can't be called good or evil; they're just seeking harmony or not seeking harmony. Our duty as demon hunters is to sort them out and guide them.\"\n\n\"Guide them?\" you repeated. \"Do you mean, help them? Why should we help them when they've hurt people?\"\n\nIt wasn't right for you to talk back to Eldest Uncle! But when he answered, you knew he wasn't angry, because he called you by your nickname. Only your closest friends and family call you…\n\n*choice\n\t#…Piggy, because I was born in the Year of the Pig.\n\t\t*set nickname \"Piggy\"\n\t\t*goto closer\n\t#…Cat, because I screeched a lot when I was a baby.\n\t\t*set nickname \"Cat\"\n\t\t*goto closer\n\t#…Tiny, because I was a very small baby.\n\t\t*set nickname \"Tiny\"\n\t\t*goto closer\n\t#…Chubby, because I was a chubby baby.\n\t\t*set nickname \"Chubby\"\n\t\t*goto closer\n\n*label closer\n\"${Nickname}, you need to learn more before you can answer questions like that. There is no single rule for every situation, and no creature is all bad or all good. Everything depends on context. Go study, and someday you'll understand.\"\n\nYou've been studying and working ever since.\n\nNext week, you're going to take a big step forward in your studies: you're going off to university! Your family will still be with you, though. The reason you're going to this particular university is that Eldest Uncle is the dean of the chemistry department. He'll be supervising both parts of your studies: the academic and the supernatural. Your cousin Mei (her nickname is Firecracker, because of her temper) is a senior, so you'll be spending a lot of time with her, too.\n\nIt will be comforting to have your family nearby, especially since you won't be able to see your parents for a few months - they're off to Yunnan Province to deal with a demon infestation there. You've never lived away from home before, and it's going to be a big change for you.\n\nOf all the challenges facing you this year - academic, personal, and supernatural - what do you think will be the most difficult, and why?\n*input_text journal1\n\nBut that's far from your mind right now. Now, you're entirely focused on the demon in front of you.\n\n*label demoncircle\nAs the family circles around the demon, its body shimmers and shifts like a river flowing over a waterfall. In a moment or two, it looks like a human again: a man, about 25 years old. Until an hour ago, when you realized he was a demon, you thought he [i]was[/i] an ordinary man – a neighbor named Yu Tao. \n\n“Which path do you choose?” Eldest Uncle’s deep voice rumbles out, and his eyes pierce through the darkness to look down at the demon. “What do you seek?”\n\n“Uncle!” Mei hisses. “Be careful! It might attack you!”\n\nYu Tao says quietly, “Forgive me. Please. For years, I have wanted to seek enlightenment, but I have never been strong enough to find the path. Please let me try.\"\n\nMei scowls down at Yu Tao. “Don’t try that with us!” she tells the demon. “We know how demons can trick people’s minds!”\n\nDo you trust Yu Tao?\n\n*choice\n\t#I trust Mei much more than I trust Yu Tao. I’ll follow her example.\n\t\t*set filial %+10\n\t\t*set hierarchy %+10\n\t\t*set modest %+10\n\t\t*set holistic %+10\n\t\t*set interdependence %+10\n\t\t\"That's right!\" you chime in, nodding to Mei before you glare down at Yu Tao. \"How do we know you're not tricking us?\"\n\n\t\t\"Children.\" Eldest Uncle steps between you, your cousin, and the demon. His forceful gaze is on you now, and you can see the disapproval in his eyes. \"It is not your decision. Remember your duty to learn from your elders, and to follow their example.\" \n\n\t\t*goto uncletalks\n\n\t#Eldest Uncle is the leader. I'll follow his example.\n\t\t*set filial %+20\n\t\t*set hierarchy %+20\n\t\t*set modest %+10\n\t\t*set interdependence %+10\n\t\tYou stay quiet, not interrupting your elder relatives, but you step away from Mei and go to stand closer to Eldest Uncle. \n\t\t*page_break\n\n\t\tYour uncle's serious expression shifts just enough to show you a hint of approving warmth. \"Well done, ${Nickname}.\" \n\n\t\tBut Mei doesn't receive any of Eldest Uncle's favor. \"Mei,\" he says, his voice low but forceful. \"It is not your decision. Remember your duty to learn from your elders, and to follow their example.\" Mei scowls, but steps back, and stays quiet.\n\t\t*goto uncletalks\n\n\t#If Yu Tao is truly seeking enlightenment, then we have to help him. That’s what our tradition says.\n\t\t*set holistic %+20\n\t\t\"No,\" you tell Mei quietly. \"If he wants to find balance, then we have to help him do that.\"\n\n\t\tYour uncle's serious expression shifts just enough to show you a hint of approving warmth. \"Well done, ${Nickname}. Mei, you should listen to your cousin.\" Mei scowls, but steps back, and stays quiet.\n\n\t\t*goto uncletalks\n\n\t#I’ll poke the demon again. If it attacks me, then it’s clearly lying.\n\t\t*set harmony %-10\n\t\t*set indirect %-10\n\t\t*set holistic %-10\n\t\t*set interdependence %-10\n\t\tYou snap your foot out to kick Yu Tao sharply in the side. The demon groans and curls into a miserable ball.\n\n\t\t\"Wang Su!\" Eldest Uncle snaps sharply. \"He is defeated and he seeks enlightenment. You cannot attack him again! You may be new at this, but you will need to learn quickly if you are going to uphold the traditions of the family!\"\n\n\t\tYou shrink back, shame starting to fill you. Even Mei looks shocked at what you've done. \n\n\t\t*goto uncletalks\n\n*label uncletalks\nEldest Uncle steps forward to look down at Yu Tao. \"You say that you seek balance,\" Eldest Uncle rumbles. \"If that is true, then swear it. Swear that you will do no more harm, and that you will seek enlightenment.\"\n\nYu Tao writhes with guilt under Eldest Uncle's steady gaze. Slowly, he raises his right hand. \"I swear,\" he says. \"May lightning strike me if I break this vow.\"\n\nEldest Uncle regards him for one long moment more, then gives a single nod. \"Very well.\" He lifts his eyes from the demon and looks around. His gaze falls on Cousin Tian, the oldest of the cousins in your group. \"Nephew,\" Eldest Uncle tells Tian. \"This creature is in your charge. You will guide him on the path that he seeks to follow, and in doing so, you will help restore balance to the world.\"\n\nCousin Tian nods, his eyes very serious behind his glasses. \n\nYu Tao peels himself off of the ground and staggers away.\n\n*page_break\n\nThe seven of you - Eldest Uncle, Second Aunt, Cousin Mei, your three other cousins, and you - gather into a circle. You've watched your parents do this countless times, but this is one of the first few times that you've been included in the sacred circle.\n\n\"Together we find strength,\" Eldest Uncle begins, and the rest of you join in. \"Together we find balance. Together we find harmony.\" You repeat the chant seven times. Seven people chanting seven times: seven is the number that symbolizes togetherness, rising, and the essence of the entire universe.\n\n\nAs you chant, it feels as if you are one person instead of seven. Members of the Wang family have done this exact same ritual for centuries, and as you chant, you feel connected to every Wang who has ever lived. Your hands join with the hands of your family, and you feel whole.\n\n*set apprenticeship +5\n\n*goto_scene 2-classchoice-old", "1-opening": "*set secondgame true\n\n[b]Chapter 1: The Fight[/b]\n\nFire flashes from the mouth of the demon, a flare so bright in the nighttime darkness that it nearly blinds you.\n\n“Su!” your cousin Mei shouts. “Behind you!”\n\nYou whirl around, eyes still dazzled, hands flying out to strike. The demon's breath glows hot on your face - even though you can't see it clearly, you know that it's directly in front of you.\n\n\"Over here!\" Mei calls from somewhere to your left. \"Together, we can get it!\"\n\nYou only have a second before the demon is upon you. What do you do?\n\n*choice\n\t#I attack alone, striking out with my sword. My talent with weapons is my greatest asset.\n\t\t*set interdependence %-20\n\t\t*set weapons %+20\n\t\t*set firstbest \"weapons\"\n\t\tYou duck down under the hot flare of demon-breath and slam your sword into the scaly snakelike hide. A harsh unearthly cry of pain rises up from the demon, and you grin in triumph.\n\n\t\tBut then you feel the demon surging forward again. \n\n\t\tWhen you’re fighting with your family, you feel almost as if the seven of you are a single body, all moving in perfect harmony with each other. You couldn’t imagine fighting on your own any more than you can imagine your hand going off to fight without the rest of your body attached.\n\n\t\tBut this time you [i]have[/i] gone off on your own, and you're not having any more success than if your hand had left your body.\n\n\t\tIt's Mei who darts in to save you, with Eldest Uncle at her side. The two of them strike in the same instant, and the force of their hands together sends the demon thumping to the ground.\n\t\t*page_break\n\n\t\tAs soon as the demon is down, Mei whirls on you. \"What was that?\" she asks, furious and disdainful. \n\n\t\tEldest Uncle's eyes hold no anger, just disappointment, as he offers you a hand up. \"You must remember your duty to the family,\" he advises you quietly. \"We must all fight together if we are to maintain the balance of the world.\"\n\t\t*goto family\n\t#I attack alone, using my hands and the force of my mind. I am perfectly in tune with the universe.\n\t\t*set interdependence %-20\n\t\t*set magic %+20\n\t\t*set firstbest \"magic\"\n\t\tYou duck down under the hot flare of demon-breath and slam your hand into the scaly snakelike hide. A harsh unearthly cry of pain rises up from the demon, and you grin in triumph.\n\n\t\tBut then you feel the demon surging forward again. \n\n\t\tWhen you’re fighting with your family, you feel almost as if the seven of you are a single body, all moving in perfect harmony with each other. You couldn’t imagine fighting on your own any more than you can imagine your hand going off to fight without the rest of your body attached.\n\n\t\tBut this time you [i]have[/i] gone off on your own, and you're not having any more success than if your hand had left your body.\n\n\t\tIt's Mei who darts in to save you, with Eldest Uncle at her side. The two of them strike in the same instant, and the force of their hands together sends the demon thumping to the ground.\n\t\t*page_break\n\n\t\tAs soon as the demon is down, Mei whirls on you. \"What was that?\" she asks, furious and disdainful. \n\n\t\tEldest Uncle's eyes hold no anger, just disappointment, as he offers you a hand up. \"You must remember that you will never be as powerful alone as you are when we work as a family,\" he advises you quietly. \"We must all fight together if we are to maintain the balance of the world.\"\n\t\t*goto family\n\n\t#I follow the sound of Mei's voice and use my sword to support her attack. We're stronger together.\n\t\t*set interdependence %+20\n\t\t*set weapons %+20\n\t\t*set indirect %+10\n\t\t*set firstbest \"weapons\"\n\t\tYou don't need to see her to know where Mei is. It's more than just following her voice - sometimes when you're fighting, you can [i]feel[/i] where everyone else in your family is. \n\n\t\tWhen you’re fighting with your family, you feel almost as if the seven of you are a single body, all moving in perfect harmony with each other. You couldn’t imagine fighting on your own any more than you can imagine your hand going off to fight without the rest of your body attached.\n\n\t\tYou dodge to the left, ducking under another hot rush of demon-breath, and strike out. Your sword hits at the same time as Mei's - again, you don't need to see it. You can feel it. It feels [i]right[/i].\n\n\t\tThe demon shrieks, a harsh unearthly cry of pain, and thumps to the ground.\n\t\t*page_break\n\n\t\t\"Ha!\" Mei shouts in triumph, as the rest of the family starts to gather around.\n\n\t\tEldest Uncle's expression is as stoic as always, but pride shines quietly in his eyes as he looks down at you and Mei. \"We must all fight together if we are to restore balance to the world.\"\n\t\t*goto family\n\n\t#I follow the sound of Mei's voice and join my will to hers in a powerful magical attack. Our balance supports each other.\n\t\t*set interdependence %+20\n\t\t*set magic %+20\n\t\t*set indirect %+10\n\t\t*set firstbest \"magic\"\n\t\tYou don't need to see her to know where Mei is. It's more than just following her voice - sometimes when you're fighting, you can [i]feel[/i] where everyone else in your family is. \n\n\t\tWhen you’re fighting with your family, you feel almost as if the seven of you are a single body, all moving in perfect harmony with each other. You couldn’t imagine fighting on your own any more than you can imagine your hand going off to fight without the rest of your body attached.\n\n\t\tYou dodge to the left, ducking under another hot rush of demon-breath, and strike out. Your hand hits at the same time as Mei's - again, you don't need to see it. You can feel it. It feels [i]right[/i].\n\n\t\tThe demon shrieks, a harsh unearthly cry of pain, and thumps to the ground.\n\t\t*page_break\n\n\t\t\"Ha!\" Mei shouts in triumph, as the rest of the family starts to gather around.\n\n\t\tEldest Uncle's expression is as stoic as always, but pride shines quietly in his eyes as he looks down at you and Mei. \"We must all fight together if we are to restore balance to the world.\"\n\t\t*goto family\n\n*label family\n\n*page_break\n\nThis is how you spend most of your evenings. It isn't how most other teenagers in China spend their time, but your family isn't like other families.\n\nYou are Wang Su, the youngest member of the ancient Wang family. For centuries, your family has maintained the balance between heaven and hell. You and your relatives seek out demons and take whatever steps are needed to protect other people from them. Some demons seek enlightenment – if you find one of those, then you have an obligation to steer it further along on the path. But if you find a demon that refuses to seek enlightenment, then you must send it back to hell. It’s the only way to maintain harmony here on earth.\n\nYou are your parents' only...\n\n*choice\n\t#...daughter.\n\t\t*set niece \"niece\"\n\t\t*set self_he \"she\"\n\t\t*set yan_gender \"girl\"\n\t\t*set yan_he \"she\"\n\t\t*set yan_him \"her\"\n\t\t*set yan_his \"her\"\n\t\t*set hua_gender \"girl\"\n\t\t*set hua_he \"she\"\n\t\t*set hua_him \"her\"\n\t\t*set hua_his \"her\"\n\t\t*set grandma \"Grandma\"\n\t\t*goto bigduty\n\t#...son.\n\t\t*set niece \"nephew\"\n\t\t*set self_he \"he\"\n\t\t*set yan_gender \"boy\"\n\t\t*set yan_he \"he\"\n\t\t*set yan_him \"him\"\n\t\t*set yan_his \"his\"\n\t\t*set hua_gender \"boy\"\n\t\t*set hua_he \"he\"\n\t\t*set hua_him \"him\"\n\t\t*set hua_his \"his\"\n\t\t*set grandma \"Grandpa\"\n\t\t*goto bigduty\n\n*label bigduty\nFor as long as you can remember, you have been raised to know that one day you will take your place among the other demon hunters of your family. When you were in primary school, your friends took violin lessons or spent time with tutors improving their academic performance, but you learned swordfighting from Cousin Lin, studied ancient calligraphied scrolls with Second Aunt, and spent hours in meditation with Eldest Uncle learning how to focus your will into magical effects.\n\n\"Martial arts lessons,\" you said when your friends asked where you went after school. Or sometimes, \"My family needs me to help out at home.\" Either was believable - and mostly true, even. \n\nBut you could never tell them the whole truth. \"Most people do not know about our sacred duty,\" Eldest Uncle explained. \"They would not understand. If they thought of demons as anything other than a legend from their grandmothers' stories, they would be consumed with fear. We must keep them safe, but they must never know.\"\n\n*page_break\n\n*if firstbest = \"magic\"\n\tYour favorite part of training was learning magic. Your cousin Mei found it difficult to sit still through the long meditation exercises, but you had no trouble at all. Your mind naturally found its way to the place of calm where you could draw on magic. \n\t*goto struggle\n\n*else\n\tYour favorite part of training was learning how to use weapons. Mental discipline was important - it was how you developed your magical abilities - but you found sword training much easier, and much more fun. You loved the physical action of swinging a sword, and the feeling that you could affect demons directly.\n\t*goto struggle\n\n*label struggle\n\nBut not all lessons were easy.\n\n\"Aren't demons evil?\" you asked Eldest Uncle when you were about ten. \"Why don't we just kill them? Or send them someplace far away so they can't hurt anyone?\"\n\n\"It isn't a question of good or evil,\" he explained. \"It's about balance. Demons can't be called good or evil; they're just seeking harmony or not seeking harmony. Our duty as demon hunters is to sort them out and guide them.\"\n\n\"Guide them?\" you repeated. \"Do you mean, help them? Why should we help them when they've hurt people?\"\n\nIt wasn't right for you to talk back to Eldest Uncle, and you knew it! You owe your elder relatives a great deal of respect: filial piety is a very important principle, and Eldest Uncle is the head of your family. But when Eldest Uncle answered, you knew he wasn't angry, because he called you by your nickname. Only your closest friends and family call you…\n\n*choice\n\t#…Bunny, because I was born in the Year of the Rabbit.\n\t\t*set nickname \"Bunny\"\n\t\t*goto closer\n\t#…Cat, because I screeched a lot when I was a baby.\n\t\t*set nickname \"Cat\"\n\t\t*goto closer\n\t#…Flea, because I was a very small baby.\n\t\t*set nickname \"Flea\"\n\t\t*goto closer\n\t#…Chubby, because I was a chubby baby.\n\t\t*set nickname \"Chubby\"\n\t\t*goto closer\n\n*label closer\n\"${Nickname}, you need to learn more before you can answer questions like that. There is no single rule for every situation, and no creature is all bad or all good. Everything depends on context. Go study, and someday you'll understand.\"\n\nYou found this response…\n\n*choice\n\t#…easy to understand. I have always had an intuitive grasp of the way the universe's balance, and I respected Eldest Uncle's words.\n\t\t*set balance %+20\n\t\t*set filial %+20\n\t\t*set magic %+10\n\t\t*set interdependence %+10\n\t\tYour family is much more traditional than most: while many people in China are becoming more flexible about older customs and modes of conduct, the Wang family's duty as demon hunters means that you need to stick even closer to traditional ways. You must show respect for your elder relatives, you must show proper tact by communicating indirectly, you must place group harmony above individual advancement, and you must always pay attention to the balance of the universe.\n\n\t\tYou accept all of that, and you take it seriously. You always obey your elders, and you always make sure that you act in accordance with their ideas of how the universe is balanced. So when Eldest Uncle told you to go study, you did. The answers to your questions aren't always straightforward, but you trust Eldest Uncle to set you on the right path.\n\t\t\n\t\t*goto nextweek\n\t#…sensible, but I didn't like being told what to do. It's always been hard for me to obey my elders.\n\t\t*set balance %+20\n\t\t*set filial %-20\n\t\t*set interdependence %-10\n\t\t*set magic %+10\n\t\tYour family is much more traditional than most: while many people in China are becoming more flexible about older customs and modes of conduct, the Wang family's duty as demon hunters means that you need to stick even closer to traditional ways. You must show respect for your elder relatives, you must show proper tact by communicating indirectly, you must place group harmony above individual advancement, and you must always pay attention to the balance of the universe.\n\n\t\tSome of those things come more easily to you than others. You were always in tune with the balance of the universe, and you understood the idea that some demons could be brought to enlightenment. But you always wanted to be the one to make that decision for yourself. After all, if you understand it, why shouldn't you be the one to decide?\n\n\t\tYou pushed back against Eldest Uncle's lessons, and sometimes that meant that your parents punished you. It's still a struggle to be the obedient and filial child that your elders expect you to be.\n\n\t\t*goto nextweek\n\t#…unsatisfying. It didn't make sense, and I didn't care what Eldest Uncle thought. I wanted to follow my own path in life.\n\t\t*set balance %-20\n\t\t*set filial %-20\n\t\t*set weapons %+10\n\t\t*set interdependence %-10\n\t\tYour family is much more traditional than most: while many people in China are becoming more flexible about older customs and modes of conduct, the Wang family's duty as demon hunters means that you need to stick even closer to traditional ways. You must show respect for your elder relatives, you must show proper tact by communicating indirectly, you must place group harmony above individual advancement, and you must always pay attention to the balance of the universe.\n\n\t\tAt least, that's what you've always been told. It's never sat right with you. [i]Why[/i] do you have to obey your elders? What does that have to do with demons? And what does Eldest Uncle mean, no creature is all bad or all good? Demons must be bad - why else would your family be dedicated to hunting them?\n\n\t\tYou pushed back against every one of Eldest Uncle's lessons, questioning and rebelling and arguing. Your parents punished you every time for your reckless disobedience, but you just kept on pushing. It's still a struggle to be the obedient and filial child that your elders expect you to be.\n\n\t\t*goto nextweek\n\t#…difficult. I have always struggled with the idea of balance. But I accepted Eldest Uncle's words because I respected him.\n\t\t*set balance %-20\n\t\t*set filial %+20\n\t\t*set weapons %+10\n\t\t*set interdependence %+10\n\t\tYour family is much more traditional than most: while many people in China are becoming more flexible about older customs and modes of conduct, the Wang family's duty as demon hunters means that you need to stick even closer to traditional ways. You must show respect for your elder relatives, you must show proper tact by communicating indirectly, you must place group harmony above individual advancement, and you must always pay attention to the balance of the universe.\n\n\t\tSome parts of that traditional mode of life are easier for you than others. You still can't grasp the idea that some demons can be good. But you do understand the need to follow your elder relatives' example. You love and respect Eldest Uncle, and know that you need to stand with your family to fulfill your duty.\n\n\t\tSo you nodded and accepted what he told you, and kept on wrestling within yourself to figure out how to live a more balanced life.\n\t\t*goto nextweek\n\n*label nextweek\n*page_break\n\nNext week, you're going to take a big step forward in your studies: you're going off to university! Your family will still be with you, though. The reason you're going to East Mountain University is that Eldest Uncle is the dean of the chemistry department. He'll be supervising both parts of your studies: the academic and the supernatural. Your cousin Mei (her nickname is Firecracker, because of her temper) is a senior, so you'll be spending a lot of time with her, too.\n\nIt will be comforting to have your family nearby, especially since you won't be able to see your parents for a few months - they're off to Yunnan Province to deal with a demon infestation there. Even though East Mountain University is close enough to your hometown that you and your relatives can easily visit back and forth, you've never lived away from home before, and it's going to be a big change for you.\n\nBut that's far from your mind right now. Now, you're entirely focused on the demon in front of you.\n*page_break\n\nThe demon, trapped inside the circle that your family has made around it, shimmers and shifts like a river flowing over a waterfall. Soon it looks like a human again: a man, about 25 years old. Until an hour ago, when you realized he was a demon, you thought he [i]was[/i] an ordinary man – a neighbor named Yu Tao. \n\n“Which path do you choose?” Eldest Uncle’s deep voice rumbles out, and his eyes pierce through the darkness to look down at the demon. “What do you seek?”\n\n“Uncle!” Mei hisses. “Be careful! It might attack you!”\n\nYu Tao says quietly, “Forgive me. Please. For years, I have wanted to seek enlightenment, but I have never been strong enough to find the path. Please let me try.\"\n\nMei scowls down at Yu Tao. “Don’t try that with us!” she tells the demon. “We know how demons can trick people’s minds!”\n\nDo you trust Yu Tao?\n\n*choice\n\t#I trust Mei much more than I trust Yu Tao. I’ll follow her example.\n\t\t*set filial %+10\n\t\t*set balance %+10\n\t\t*set interdependence %+10\n\t\t\"That's right!\" you chime in, nodding to Mei before you glare down at Yu Tao. \"How do we know you're not tricking us?\"\n\n\t\t\"Children.\" Eldest Uncle steps between you, your cousin, and the demon. His forceful gaze is on you now, and you can see the disapproval in his eyes. \"It is not your decision. Remember your duty to learn from your elders, and to follow their example.\" \n\t\t*goto uncletalks\n\n\t#Eldest Uncle is the leader. I'll follow his example.\n\t\t*set filial %+20\n\t\t*set interdependence %+10\n\t\t*set indirect %+10\n\t\tYou stay quiet, not interrupting your elder relatives, but you step away from Mei and go to stand closer to Eldest Uncle. \n\n\t\tYour uncle's serious expression shifts just enough to show you a hint of approving warmth. \"Well done, ${Nickname}.\" \n\n\t\tBut Mei doesn't receive any of Eldest Uncle's favor. \"Mei,\" he says, his voice low but forceful. \"It is not your decision. Remember your duty to learn from your elders, and to follow their example.\" Mei scowls, but steps back, and stays quiet.\n\t\t*goto uncletalks\n\n\t#If Yu Tao is truly seeking enlightenment, then we have to help him. That’s what our tradition says.\n\t\t*set balance %+20\n\t\t\"No,\" you tell Mei quietly. \"If he wants to find balance, then we have to help him do that.\"\n\n\t\tYour uncle's serious expression shifts just enough to show you a hint of approving warmth. \"Well done, ${Nickname}. Mei, you should listen to your cousin.\" Mei scowls, but steps back, and stays quiet.\n\t\t*goto uncletalks\n\n\t#I’ll hit the demon again. If it attacks me, then it’s clearly lying.\n\t\t*set indirect %-10\n\t\t*set balance %-10\n\t\t*set interdependence %-10\n\t\tYou snap your foot out to kick Yu Tao sharply in the side. The demon groans and curls into a miserable ball.\n\n\t\t\"Wang Su!\" Eldest Uncle snaps sharply. \"He is defeated and he seeks enlightenment. You cannot attack him again! You may be new at this, but you will need to learn quickly if you are going to uphold the traditions of the family!\"\n\n\t\tYou shrink back, shame starting to fill you. Even Mei looks shocked at what you've done. \n\t\t*goto uncletalks\n\n*label uncletalks\n\nEldest Uncle steps forward to look down at Yu Tao. \"You say that you seek balance,\" Eldest Uncle rumbles. \"If that is true, then swear it. Swear that you will do no more harm, and that you will seek enlightenment.\"\n\nYu Tao writhes with guilt under Eldest Uncle's steady gaze. Slowly, he raises his right hand. \"I swear,\" he says. \"May lightning strike me if I break this vow.\"\n\nEldest Uncle regards him for one long moment more, then gives a single nod. \"Very well.\" He lifts his eyes from the demon and looks around. His gaze falls on Cousin Tian, the oldest of the cousins in your group. \"Nephew,\" Eldest Uncle tells Tian. \"This creature is in your charge. You will guide him on the path that he seeks to follow, and in doing so, you will help restore balance to the world.\"\n\nCousin Tian nods, his eyes very serious behind his glasses. \n\nYu Tao peels himself off of the ground and staggers away.\n\n*page_break\n\nThe seven of you - Eldest Uncle, Second Aunt, Cousin Mei, your three other cousins, and you - gather into a circle. You've watched your parents do this countless times, but this is one of the first times that you've been included in the sacred circle.\n\n\"Together we find strength,\" Eldest Uncle begins, and the rest of you join in. \"Together we find balance. Together we find harmony.\" You repeat the chant seven times. Seven people chanting seven times: seven is the number that symbolizes togetherness, rising, and the essence of the entire universe.\n\nAs you chant, it feels as if you are one person instead of seven. Members of the Wang family have done this exact same ritual for centuries, and as you chant, you feel connected to every Wang who has ever lived. Your hands join with the hands of your family, and you feel whole.\n\n*finish", "10-revelations-old": "*page_break\n[b]Chapter 10: Revelations and Confrontations[/b]\n\nBy the time you leave the family meeting, you have a plan to trap the demons who called themselves ${Grandma} and Little One.\n\nYou know that by their nature, demons cause chaos and want to prove themselves superior to those around them. You also know that they've been focusing their recent mischief on the dining hall: that's where you caught them last night, after all. You're pretty sure that they'll want to come back to finish what they started, and that you can find a way to make them even more interested in returning to the dining hall.\n\n*page_break\n\nSecond Aunt makes a few phone calls, dropping Eldest Uncle's name to get the university administration to speed up the repairs on the dining hall and restock the pantry. Next, Tian and the other cousins make sure that the building materials are stacked very very neatly right outside the hole that the demons made in the dining hall wall. \n\nMeanwhile, you and Firecracker talk to the student dining-hall workers, and offer your help unloading the new shipment of food to replace the supplies that the demons spoiled the night before. You line up the rows of crates, with fresh fruits and vegetables on the outside where the demons will be able to see them the most easily. You even sort the vegetables by color. The demons will never be able to resist disrupting such a conspicuous display of order, especially when it's been done to repair the damage that the demons did the night before.\n\nAnd then you all wait.\n\n*page_break\n\nSure enough, as soon as evening falls, you hear the familiar hiss and sense the familiar spark of demons approaching.\n\nThere they are. One big demon with a slight bruise on its side; one little one with a missing fang in its gaping angry mouth.\n\nYou tense up, every muscle in your body poised to strike. You have a potion in your hand ready to throw, as do all of your relatives. All you're waiting for is Second Aunt's signal.\n\nWhat are you doing while you wait?\n\n*choice\n\t#I'm watching the demons to see if I can tell anything about their demeanor. Could either of them be seeking enlightenment?\n\t\t*set holistic %+20\n\t\tThis is what Eldest Uncle has been teaching you ever since you arrived at university - what he's been teaching you all your life, really. When you find a demon, how do you know what to do with it? It is always possible that a demon might be trying to turn aside from its troublemaking ways.\n\n\t\tWhat about these two?\n\n\t\tThe big one is hissing enthusiastically, spitting green sparks all over the vegetables and lashing out with its tail. But the little one...it seems to be lagging behind. Is it more reluctant to do harm than the big one? You can only hope.\n\t\t*goto slither\n\n\t#I'm watching the demons to find the best angle for me to attack. How can I hurt them the most?\n\t\t*set holistic %-20\n\t\tEven as you think it, you know that Eldest Uncle wouldn't approve, and that knowledge makes guilt twist inside you. \"Your first priority must never be to do harm,\" he always says; \"it must be to seek balance.\" \n\n\t\tBut your anger and pain are still raw enough that you can't help thinking about ways to hurt the demons.\n\n\t\tSo you watch them. You notice how the big one still tries to hunch away from the side where it was injured last night; how the little one holds back as if it didn't even want to be here. When it's time to strike, you'll be ready.\n\t\t*goto slither\n\n\t#I'm watching my relatives so that I can coordinate my actions with theirs. We need to act together.\n\t\t*set interdependence %+20\n\t\tYou don't know when you'll strike, or what will happen when you do, but you are absolutely certain that your relatives will be with you, and that you will have to strike at precisely the same time for the plan to work.\n\n\t\tYou glance around the circle, your eyes meeting the eyes of every one of your relatives in turn. You know that every member of your family will support you, and that you will support them; that when the time comes, you will be together.\n\n\t\tThat certainty gives you a feeling that's closer to peace than you've felt all day.\n\t\t*goto slither\n\n*label slither\n*page_break\nThe demons slither closer, hissing and spitting as their sinuous snakelike bodies curl around the neatly-stacked crates of food and building materials. Under their corrupting breath, vegetables wither and fruit shrivels; neat piles of lumber clatter into chaos.\n\n\"Now!\" Second Aunt shouts.\n\nIn perfect unison, the six of you step forward. Six hands raise to throw six potions; six bottles smash on the floor to release fumes that freeze the demons in place.\n\n*page_break\n\nThe demons rear up, letting out frustrated hisses as they writhe back and forth, trying to break free of the potions' hold - but to no effect. After a moment, their green serpentine forms shimmer and shift, and when the world settles again, you see only two ${yan_gender}s. \n\nYour roommates.\n\n\"I'm sorry,\" Little One gasps, shrinking back in fear. $!{hua_his} eyes dart around the circle, too anxious to rest in one place for more than a second. \"I'm sorry.\"\n\n${Grandma} isn't. \"We were so close!\" ${Grandma} taunts. The confidence you've always admired in ${yan_him} is nothing but arrogance - you can see that now. \"We were living with one of the famous Wangs, and we almost got away with it!\"\n\n\"Were you just laughing at me the whole time?\" Your voice nearly breaks - you're ashamed even as it's happening, but you just push back the emotion and keep going. \"Was any of our friendship real?\"\n\n${Grandma} laughs. \"What do you think?\"\n\nWhat [i]do[/i] you think?\n\n*fake_choice\n\t#They were both deceiving me.\n\t#${Grandma} was deceiving me, but I think Little One was really my friend.\n\t#Little One was deceiving me, but I think ${Grandma} was really my friend.\n\t#They were truly my friends. Both of them.\n\n${Grandma} doesn't even wait for your answer. $!{Yan_he} starts to shimmer again, threatening to turn back into ${yan_his} snake form. \n\nSecond Aunt, Firecracker, and the other cousins are there to stop ${yan_him}: their hands strike out in a mystic gesture, and ${Grandma} rears back, hissing in frustration through ${yan_his} still-human mouth.\n\n\"Wang Su.\" Second Aunt addresses you formally. She turns her head slightly, but keeps her eyes on the demons. \"These demons are yours. You know what needs to be done.\"\n\nWhat do you do?\n\n*choice\n\t#Ask them both whether they're seeking enlightenment. It's our tradition and our obligation.\n\t\t*set holistic %+20\n\t\tIt may be the hardest thing you've ever done, but you do it.\n\n\t\tYou step up to face the two ${yan_gender}s you've lived with for months, who you thought were your friends, who shared your secrets and your lives. Who deceived you, laughed at you, nearly killed one of your dearest relatives. \n\n\t\tAnd you forgive them enough to ask: \"Do you seek enlightenment? Speak the truth.\"\n\t\t*goto answers\n\n\t#Ask Little One whether ${hua_he}'s seeking enlightenment, but don't give ${Grandma} any choice. Little One can still be saved, but ${Grandma} hurt Eldest Uncle!\n\t\t*set holistic %+5\n\t\t\"You get a second chance,\" you tell Little One, and then turn angry eyes towards ${Grandma} as you add, \"Not you!\"\n\n\t\t\"Wang Su!\" snaps Second Aunt. \"That is not how it works. You know better!\" She lifts her chin and looks straight at the two demons. \"Both of you,\" she says, with firm emphasis. \"Do you seek enlightenment? Speak the truth.\"\n\t\t*goto answers\n\n\t#No mercy for either of them! They deceived me and hurt Eldest Uncle - they don't deserve it!\n\t\t*set holistic %-20\n\t\tYou narrow your eyes at ${Grandma} and Little One.\n\n\t\tAnd then you charge.\n\t\t*page_break\n\n\t\t\"Stop!\" Firecracker's strong hands clamp down on your shoulders, wrestling you back. \"What are you doing?\"\n\n\t\t\"Do you seek enlightenment?\" It's Second Aunt who asks the question, while Firecracker drags you away from your former roommates. \"Speak the truth.\"\n\n\t\t*label answers\n\t\t${Grandma} spits. \"Never!\"\n\n\t\tAnd then there is silence, and into the silence falls a small voice. \"Yes,\" says Little One. $!{hua_he} almost sounds like ${hua_him}self. \"Please.\"\n\n\t\tSecond Aunt doesn't make you say the next part. \"Then for you, Sun Yan,\" she says to ${Grandma}, there is no mercy. You have chosen to turn away from the balance of the universe and towards destruction.\" Tian steps forward, his hand raising to give the final blow.\n\n\t\tFirecracker turns you away with a hand on your shoulder. \"You don't have to watch.\" Her voice is gentler than you've ever heard it. \"Come on.\" \n\n\t\tShe leads you away into the quiet night, leaving the demons who used to be your roommates behind.\n\t\t*set apprenticeship 100\n\t\t*goto_scene 11-endgame-old", "10-revelations": "\n*if secretcounter >= 3\n\t*set finalsuccess -1\n\t*goto balancecounter\n*elseif secretcounter >=1\n\t*goto balancecounter\n*else\n\t*set finalsuccess +1\n\t*goto balancecounter\n\n*label balancecounter\n*if balance > 60\n\t*set finalsuccess +1\n\t*goto beginning\n*else\n\t*goto beginning\n\n*label beginning\n*temp extrabreak false\n[b]Chapter 10: Revelations and Confrontations[/b]\n\nYou spend that night on Firecracker's floor - there's no way you can go back to your own room - and when you wake up, you're ready to start planning.\n\nYou know that by their nature, demons cause chaos and want to prove themselves superior to those around them. You also know that they've been focusing their recent mischief on the dining hall: that's where you caught them last night, after all. You're pretty sure that they'll want to come back to finish what they started - or that if you try to repair what they destroyed, they'll come back to make sure that the destruction gets even worse.\n\nWhat do you think will have the best chance of making the demons want to come back to the dining hall?\n\n*choice\n\t#I'll suggest to Second Aunt that we drop Eldest Uncle's name to the administration to get the repairs done faster. \n\t\t*if filial > 60\n\t\t\t*set finalsuccess +1\n\t\t\tSecond Aunt nods to your suggestion. \"Yes, that would work. We don't have to mention why he wants it done. Or why he's not asking for it himself.\" She tries to keep the worry out of her voice when she says that, but doesn't entirely succeed. \"Let me make a few phone calls.\"\n\n\t\t\tYou've convinced Second Aunt, and she convinces the administration. By the middle of the afternoon, the dining hall is full of workers hammering, tiling, and plastering. The demons will never be able to resist breaking up those fresh new repairs.\n\t\t\t*goto eveningfalls\n\n\t\t*else\n\t\t\tSecond Aunt gives you one of her disapproving looks. (These days, she rarely seems to have any other kind.) \"I don't think so. That would just call attention to his absence.\n\n\t\t\tYou just don't have the kind of relationship with Second Aunt that would make her receptive to your ideas - she's just too accustomed to thinking of you as rebellious.\n\t\t\t*goto eveningfalls\n\n\t#I'll talk to my friends among the student dining hall workers.\n\t\t*if ((rel_yan > 50) or (rel_hua > 50)) or (interdependence > 60)\n\t\t\tYou're friends with a lot of people in your dorm, and you know exactly who to ask: Zheng Wei. She's a second-year student who's worked in the dining hall ever since she arrived at East Mountain University. You speed through your lunch, and easily find her near the tray-return area.\n\n\t\t\t\"Hi, Wang Su,\" she says, greeting you with a smile. \"How are you?\" \n\n\t\t\t*goto zhengweiconvo\n\n\t\t*elseif ((rel_shen > 50) or (shenyidate))\n\t\t\tYou don't know many of the student dining hall workers yourself, but you know who does: Shen Yi.\n\n\t\t\t\"Of course!\" ${yi_he} says when you approach ${yi_him}. \"My friend Zheng Wei works in the dining hall. I'll introduce you to her.\"\n\t\t\t*if shenyiknows\n\t\t\t\t$!{yi_he} lowers ${yi_his} voice and looks around carefully before adding, \"Is this about…you know? What you told me last night?\"\n\n\t\t\t\tYou nod. \"It will help a lot. Thank you.\"\n\t\t\t*comment endif\n\n\t\t\tWhen you find Zheng Wei at the end of lunch, she's busy with her work, but still gives you both a smile. \"Hi, Shen Yi.\"\n\n\t\t\t\"Hi,\" Shen Yi replies. \"This is my friend Wang Su.\"\n\n\t\t\t*if shenyidate\n\t\t\t\tShen Yi gives the word 'friend' a little extra emphasis, and Zheng Wei grins knowingly.\n\t\t\t\"Nice to meet you,\" says Zheng Wei. \n\n\t\t\t*label zhengweiconvo\n\t\t\t*set finalsuccess +1\n\t\t\t\"Can I ask you a favor?\" you ask. \"I need to get into the supply closets at the back of the dining hall.\"\n\n\t\t\tZheng Wei doesn't look like she's going to say no, but she's still a little confused. \"Why do you need to do that?\"\n\n\t\t\t*fake_choice\n\t\t\t\t#\"It's for my organic chemistry class. We're analyzing the chemical composition of different foods.\"\n\t\t\t\t\tZheng Wei accepts that without hesitation. \"Of course!\"\n\t\t\t\t#\"My uncle's sick, and I wanted to get him something special to eat.\"\n\t\t\t\t\tThe mention of your uncle works its magic, as it always does. \"You mean Dean Wang?\" Zheng Wei asks, clearly impressed. \"Of course! Anything to help him out. I hope he feels better soon.\"\n\n\t\t\t\t\t\"Thank you,\" you tell her, and add honestly, \"So do I.\"\n\t\t\t\t#\"I'm sorry, I can't tell you. But it's very important.\"\n\t\t\t\t\tNow Zheng Wei does look hesitant, but she still nods. \"All right,\" she says slowly. \"I trust you.\"\n\t\t\t\t#\"I need to set a trap for some demons.\"\n\t\t\t\t\t*set secretcounter +1\n\t\t\t\t\tZheng Wei gasps. \"For [i]what[/i]?\"\n\n\t\t\t\t\t\"I need to set a trap for some demons,\" you repeat. \"It's very important.\"\n\n\t\t\t\t\t\"All right…\" Zheng Wei says slowly. \"It sounds far-fetched, but I don't think you're the kind of person who would tell a lie.\"\n\t\t\t*page_break\n\n\t\t\tYou spend the rest of the afternoon making sure that everything is arranged in the way that will make it the most tempting target for the demons. The building supplies are stacked in neat piles; the freshest produce is placed at the front where it can be easily seen. You even sort the fruits and vegetables by color. The demons will never be able to resist disrupting such a conspicuous display of order, especially when it's been done to repair the damage that the demons did the night before.\n\t\t\t*goto eveningfalls\n\n\t\t*else\n\t\t\tYou speed through your lunch with half your attention on the white-aproned student workers who circulate through the crowded cafeteria. It takes almost half an hour for you to find one who even looks a little bit familiar: Zheng Wei is in your dorm, although you've never really talked to her.\n\n\t\t\tAnd when you try to talk to her now, that becomes painfully clear. \"Oh, hi!\" she says, with the kind of blank smile that shows that she's desperately trying to remember who you are. \"Wang Su, right?\"\n\n\t\t\tIf she barely knows your name, there's no way she's going to be willing to bend the rules for you.\n\t\t\t*page_break\n\n\t\t\tWithout the help of any student workers, you and your family can't get into the dining hall until dinner is over, and you don't have a lot of time to prepare. You do the best you can, making neat stacks of food so that the demons will be extra tempted to destroy them. But you worry that it won't be enough.\n\t\t\t*goto eveningfalls\n\n\t#I'll ask Yu Tao for suggestions. It might be difficult to get him to talk, but I have to try.\n\t\tHe's a demon himself, after all; he should know how other demons think.\n\t\t*if balance > 60\n\t\t\t*comment harder challenge for higher reward\n\t\t\t*set extrabreak true\n\t\t\t*set finalsuccess +2\n\n\t\t\t\"That's a good idea,\" says Lin, and she leads you down to Yu Tao's room to talk to him.\n\n\t\t\tHe's a little reluctant at first, but Lin wins him over. \"You want to help other demons get the chance to seek enlightenment the way you have,\" she urges. \"Right?\"\n\n\t\t\tFinally, Yu Tao gives in. \"Arrange things in sets of eight.\" he suggests. \"Demons can't stand the number eight because it's so lucky for humans.\" Yu Tao suppresses a faint shudder - he's on the way to enlightenment, but the thought of the number eight is apparently still distasteful to him. \"Anything in a set of eight, they'll try to break up into sets of four.\" Four is one of the least lucky numbers, because the word for 'four' sounds so much like the word for 'death.' You're not surprised that demons like it.\n\n\t\t\tYou find eight crates of vegetables and arrange them in a neat row. If Yu Tao's information is correct, the demons will charge straight at the middle, trying to break up the set of eight into two sets of four - so that's where you and Tian set up a cluster of potion bottles, triggered to break and spill as soon as the demons go over it.\n\n\t\t\tYou're as ready as you can be.\n\t\t\t*goto eveningfalls\n\n\t\t*else\n\t\t\tLin shakes her head. \"I'm sorry, ${Nickname}, but I don't think it would be a good idea to let you near him. You've been struggling so much with your balance lately - it might put you even more at risk if you talked to him.\"\n\n\t\t\tYou do your best on your own, then: you try to arrange the stacks of food and building materials neatly so that the demons will be tempted to destroy them. But you worry that it won't be enough.\n\t\t\t*goto eveningfalls\n\n\n*label eveningfalls\n\nAnd then you wait.\n*page_break\n\nSure enough, as soon as evening falls, you hear the familiar hiss and sense the familiar spark of demons approaching.\n\nThere they are. One big demon with a slight bruise on its side; one little one with a missing fang in its gaping angry mouth.\n\nYou tense up, every muscle in your body poised to strike. You have a potion in your hand ready to throw, as do all of your relatives. All you're waiting for is Second Aunt's signal.\n\nWhat are you doing while you wait?\n\n*choice\n\t#I'm watching the demons to see if I can tell anything about their demeanor. Could either of them be seeking enlightenment?\n\t\tThis is what Eldest Uncle has been teaching you ever since you arrived at university - what he's been teaching you all your life, really. When you find a demon, how do you know what to do with it? It is always possible that a demon might be trying to turn aside from its troublemaking ways.\n\n\t\tWhat about these two?\n\t\t*page_break\n\n\t\t*if balance > 55\n\t\t\t*set finalsuccess +1\n\t\t\tThe big one is hissing enthusiastically, spitting green sparks all over the vegetables and lashing out with its tail. But the little one...it seems to be lagging behind. Is it more reluctant to do harm than the big one? You can only hope.\n\t\t\t*goto slither\n\t\t*else\n\t\t\tYou just can't tell.\n\n\t\t\tYou try to calm your thoughts, but you're too agitated to be able to sense the balance of the universe. How can anything be balanced when your own roommates have turned against you? \n\n\t\t\t*goto slither\n\n\t#I'm watching the demons to find the most subtle angle for me to attack. How can I approach so that they won't see me?\n\t\tSlowly, carefully, you creep forward, trying to keep yourself hidden while you measure out distances and angles with your eyes. How far do the shadows extend? How far forward can you go before you're within the demons' reach? \n\n\t\tBeing subtle and indirect is a good thing - that's what your parents have always told you. Now it's even more essential than ever.\n\t\t*page_break\n\n\t\t*if indirect > 60\n\t\t\t*set finalsuccess +1\n\t\t\tInch by inch you edge yourself around the corner of the pile of crates, drawing ever closer to the demons. You're so close that you can almost hear them breathing - and they haven't spotted you.\n\t\t\t*goto slither\n\n\t\t*else\n\t\t\tYou've been spotted!\n\n\t\t\tTwo scaly heads swivel around; two sets of beady eyes flash in your direction; two sets of green sparks spray over the room as the demons let out vicious hisses. There's no way that you'll be able to hide from them.\n\t\t\t*goto slither\n\n\n\t#I'm watching my relatives so that I can coordinate my actions with theirs. We need to act together.\n\t\tYou edge forward, trying to position yourself so that you can see your whole family at once.\n\t\t*if interdependence > 60\n\t\t\t*set finalsuccess +1\n\t\t\tFirecracker's weapons, Tian's potions, Second Aunt's determination - you check off each relative's strength in your mind as you look around the room. You've been working at this kind of interdependence for months, and now it's paying off. You know that every member of your family will support you, and that you will support them; that when the time comes, you will be together.\n\n\t\t\tThat certainty gives you a feeling that's closer to peace than you've felt all day.\n\t\t\t*goto slither\n\n\t\t*else\n\t\t\tBut it's hard to keep track of so many other people at the same time. This is why you're better at doing things on your own! It's so much easier, and you only have to worry about yourself.\n\n\t\t\t*goto slither\n\n*label slither\n*page_break\nThe demons slither closer, hissing and spitting as their sinuous snakelike bodies curl around the neatly-stacked crates of food and building materials. Under their corrupting breath, vegetables wither and fruit shrivels; neat piles of lumber clatter into chaos.\n\n*if secretcounter > 3\n\tTheir gazes look even sharper and more alert than usual, as if they're looking for something in particular. Could they be expecting you? You haven't always been discreet about your family's mission - maybe the demons know that you're coming for them.\n*page_break\n\n*if extrabreak\n\tThe extra potion bottles shatter as the demons hit the spot that Yu Tao told you they'd be aiming for.\n*comment endif\n\n\"Now!\" shouts Second Aunt.\n\nQuick! What do you do?\n\n*choice\n\t#Another potion! That's my best weapon.\n\t\tYou reach into your pocket and fling another bottle towards the two demons. It shatters with a satisfying crash -\n\n\t\t*if (classrank \u003c 20) or (extrapotions)\n\t\t\t- and the demons cringe back, hissing and writhing as the potion's harsh chemicals singe their scaly hides.\n\n\t\t\tAll those hours of study and practice - this is what it was for. You know your potions are strong enough to fend off any demon.\n\t\t\t*set finalsuccess +1\n\t\t\t*goto success_split\n\t\t*else\n\t\t\t- and nothing happens. \n\n\t\t\tLiquid splashes harmlessly over the demons' scaly forms as your potion - not as well-made as you thought it was - drips down to the ground.\n\t\t\t*goto lastattackfail\n\t#I go in for a solo strike. My sword and myself - that's all I need.\n\t\tYou charge forward, sword swinging in a sharp downward motion.\n\t\t*if (weapons > 55) or (interdependence \u003c 50)\n\t\t\tYou've made this strike a hundred times, and it's just as precise this time as it was then.\n\n\t\t\tOne neat slash cuts through the scales of both demons, shedding green sparks in its wake as they hiss and shriek in pain.\n\t\t\t*set finalsuccess +1\n\t\t\t*goto success_split\n\t\t*else\n\t\t\tBut the sword goes wide of its mark. The demons hiss triumphantly and surge forward once more.\n\n\t\t\t*goto lastattackfail\n\t#I need magic for this. I draw on the balance of the universe to aid in my spell.\n\t\t*if (magic > 60) or (balance > 60)\n\t\t\tIn the middle of chaos, you find quiet.\n\n\t\t\tDeep within you, a tiny bead of focus takes shape. It grows to encompass your entire mind, filling you with calm. Balance. Magic.\n\n\t\t\tYour hands fly out, propelling a wave of force towards the two demons to fling them backwards.\n\t\t\t*set finalsuccess +1\n\t\t\t*goto success_split\n\t\t*else\n\t\t\tThere is chaos all around you - glass breaking, wood shattering, demons hissing, your family shouting. You desperately try to reach the balance that you need to cast the spell, but it is nowhere to be found. \n\n\t\t\t*label lastattackfail\n\n\t\t\tThe rest of your family charges in, their attack making up for the one that you couldn't do.\n\t\t\t*goto success_split\n\n*label success_split\n\n*if finalsuccess >=6\n\t*set bothsurrender true\n\t*achieve victory\n\t*set surrendered \"your roommates\"\n\tThe demons collapse into a scaly, sparking, writhing heap, utterly defeated. \n\n\tAll of your preparation and hard work have paid off; every long night spent in training and study now feels worth it. Green serpentine forms shimmer and shift, and when the world settles again, you see only two ${yan_gender}s before you: Your roommates.\n\n\t\"I'm sorry,\" Little One gasps, shrinking back in fear. $!{hua_his} eyes dart around the circle, too anxious to rest in one place for more than a second. \"I'm sorry.\"\n\n\t${Grandma} isn't. \"We were so close! We were living with one of the famous Wangs, and we almost got away with it!\n\t*gosub secretsplit\n\n\t*label askforsurrender\n\n\tSecond Aunt steps forward, glaring down at your roommates with cold eyes as she asks the traditional question. \"Do you seek enlightenment?\"\n\n\tFor a long moment, your roommates huddle together in silent defeat. Then, slowly, they both nod.\n\n\tDo you think they're sincere? Do you accept their surrender?\n\n\t*choice\n\t\t#Yes. I believe them, and I want to help them.\n\t\t\t*set balance %+20\n\t\t\t\"Then we'll guide you,\" you say quietly. \"That's what we've promised to do.\" \n\n\t\t\tSecond Aunt gives you a tiny smile of approval. \"You have learned well,\" she murmurs. \"Lin. Tian. Take these two down to their new rooms.\" By which she means, other cells like the one where Yu Tao is living. \n\n\t\t\t*label acceptsurrender\n\n\t\t\tYour cousins step forward, each taking the arm of one of your former roommates, and they start to guide them away.\n\n\t\t\t\"Are you all right?\" Firecracker asks you quietly.\n\n\t\t\t*fake_choice\n\t\t\t\t#\"I'm fine. This is our family's duty. It doesn't matter who the demons are; we still have to fight them.\"\n\t\t\t\t#\"Not really. But I'll manage.\"\n\t\t\t\t#\"I feel awful. I thought they were my friends.\"\n\t\t\t\t#I feel awful, but I don't want to say so to Firecracker. I just nod.\n\t\t\tFirecracker nods. \"Come on. I'll walk home with you.\"\n\n\t\t\t*page_break\n\n\t\t\tYou're exhausted, but it's hard to sleep that night.\n\n\t\t\tIt's still strange to be alone in your room - which is even stranger when you think how quickly you've gotten used to sharing a room, considering that you had your own room all your life until you came to university. But now you miss Little One and ${Grandma} immensely. Things can never be exactly the way they were before, but at least you can keep ${Surrendered} in your life. \n\n\t\t\t*finish\n\n\t\t#Yes. I don't want to, but our tradition says that we have to help them if they ask.\n\t\t\t*set balance %-10\n\t\t\t*set filial %+10\n\t\t\tYou stay quiet, not trusting yourself to sound sincere just now. So it's Second Aunt who accepts their surrender with a formal nod. \"Lin. Tian. Take these two down to their new rooms.\" By which she means, other cells like the one where Yu Tao is living.\n\t\t\t*goto acceptsurrender\n\n\t\t#No. They're lying demons, and I won't believe a word they say.\n\t\t\t*set balance %-25\n\t\t\tYou've worked hard. You've studied. You've done everything that your family has said. \n\n\t\t\tAnd for what? Your roommates have betrayed you - lied to you! And your family [i]doesn't care[/i]. They actually believe that those  demons can change. \n\n\t\t\tWell, you don't. You've had enough of this.\n\n\t\t\tSo what are you going to do about it?\n\n\t\t\t*choice\n\t\t\t\t#I'm going to attack them again!\n\t\t\t\t\tYou charge forward, sword in hand. \"You're liars!\" you shout.\n\n\t\t\t\t\tThe demons cringe back, scrambling frantically away from your furious strike as chaos erupts all around. Tian dodges in to shield Second Aunt, pushing her out of the way. Lin's hand flies to her sword as she shouts, \"Wang Su! What are you doing?\"\n\n\t\t\t\t\tBut it's Firecracker who gets there first. \n\n\t\t\t\t\tMetal clangs on metal as Firecracker blocks your sword in a swift, sure gesture. \"${Nickname}.\" She speaks with heavy effort - not from pushing back your sword; that's easily within her strength; but from the pain of having to fight against you. \"I don't want to have to do this. Please. Stand down. It's not too late.\"\n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#She's right - I shouldn't be doing this. I'll stand down.\n\t\t\t\t\t\t\t*set disgraced true\n\t\t\t\t\t\t\t*set leaving true\n\t\t\t\t\t\t\tYou might disagree with your family, but actually attacking them? No, that crosses a line. \n\n\t\t\t\t\t\t\tSlowly, you ease back on your sword, and lower your weapon. Firecracker lets out a puffing breath of relief and steps back.\n\n\t\t\t\t\t\t\tWhich leaves room for Second Aunt to surge in, looming angrily in front of you. \"Wang Su, you are disgraceful.\" Second Aunt's voice shakes with fury and grief. \"The fact that you stopped your uncontrolled, unbalanced, un-filial attack is the only thing keeping me from casting you out this instant! \n\t\t\t\t\t\t\t*if filial > 50\n\t\t\t\t\t\t\t\tIt is utterly unlike you! I would never have expected you to do something so dishonorable as this!\n\t\t\t\t\t\t\t\t*goto endrant\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou have not always been the most filial of ${niece}s, but this is beyond anything I would have thought you would do!\n\t\t\t\t\t\t\t\t*goto endrant\n\t\t\t\t\t\t\t*label endrant\n\t\t\t\t\t\t\tYour actions shame us all. Your training ceases now, and you will not have anything to do with this family's efforts for a very very long time. Perhaps in time you will be able to
