Mountain University a few months ago. Now that you've actually seen the course catalogue, though, you're starting to have other ideas.\n\n*page_break\n\nYou've read almost the entire course catalogue, and you keep coming back to the pages that list classes in the Sociology department. Every single course looks interesting! Urban Studies! Sociology and the Law! Development of Chinese Social Thought!\n\nBy dinnertime, you have all four years planned out: every requirement for the sociology major and then some. You feel great about having a plan, and even better when you think about all of the new things you'll learn in your classes. \n\nYou're scheduled to meet with Eldest Uncle after dinner, and you can't wait to show him all of your plans.\n\n*page_break\n\n\n*label department\nThe chemistry department is one of the first buildings whose location you learned when you arrived on campus, and you easily find your way there after leaving your roommates behind. Eldest Uncle's office is on the eighth floor - a very lucky number, but a long climb when you're taking the stairs! You're a little out of breath by the time you reach the top. \n\nThe heavy wooden door to Eldest Uncle's office is slightly open when you arrive, and you can hear him talking to Second Aunt as you come in. Second Aunt is his younger sister, the second most senior member of the family here. She's very traditional - more traditional than Eldest Uncle, even.\n\n\"${Nickname}!\" Eldest Uncle says with a smile. \"Come in, sit down.\" Second Aunt pours you a cup of tea as you settle down on the comfortable couch. \"So, have you had a chance to look at the course catalogue yet?\"\n\nYou nod. \"I've read almost the entire thing!\"\n\nEldest Uncle smiles at your enthusiasm. \"There are many classes that could be useful to your duties, aren't there?\"\n\nFrom the way he phrased that question, you're pretty sure that Eldest Uncle already has some ideas about what classes he thinks you should take. What do you reply?\n\n*choice\n\t#I'll say something indirect, hoping that it will draw him out. \"Yes, there are. I found a course in almost every department that could be helpful.\"\n\t\t*set harmony %+10\n\t\t*set indirect %+20\n\t\t\"You're right,\" Eldest Uncle replies, still smiling. \"Almost anything [i]could[/i] be applied to our work. But knowledge of chemistry is what the family needs the most right now. Firecracker will be moving away after she graduates, and we'll need someone else who can make potions.\"\n\t\t*goto heartsinks\n\t#I'll say something enthusiastic, because I'm so excited about what I've read. \"I liked sociology the best. I really want to take Sociology and the Law.\"\n\t\t*set harmony %-10\n\t\t*set hierarchy %-10\n\t\t*set indirect %-15\n\t\t*set filial %-10\n\t\tSecond Aunt sniffs disapprovingly at your directness, and Eldest Uncle shakes his head. \"I'm sure you do, ${Nickname},\" he says gently. \"But knowledge of chemistry is what the family needs the most right now. Firecracker will be moving away after she graduates, and we'll need someone else who can make potions.\"\n\t\t*goto heartsinks\n\t#I'll say something deferential, because I want to hear what he thinks. \"You would know that better than I would, Eldest Uncle.\"\n\t\t*set filial %+10\n\t\t*set indirect %+10\n\t\t*set interdependence %+10\n\t\t*set hierarchy %+10\n\t\tSecond Aunt gives you a small grudging smile for your respectful tone, and leans forward to pour you more tea. \n\n\t\tEldest Uncle says, \"Knowledge of chemistry is what the family needs the most right now. Firecracker will be moving away after she graduates, and we'll need someone else who can make potions.\"\n\t\t*goto heartsinks\n\n*label heartsinks\n\nChemistry?\n\nYour heart sinks. Chemistry isn't bad, and you'd figured that Eldest Uncle's position as dean would mean that you'd have to take a few courses in chemistry no matter what. But sociology is so much more exciting! Everything you read about it made you happy and excited about learning.\n\nHow can you say this to Eldest Uncle and Second Aunt?\n\n*choice\n\t#I'll show them how enthusiastic I am. \"Majoring in sociology would make me much happier than chemistry, and that means that I'll study harder.\"\n\t\t*set indirect %-10\n\t\t*set hierarchy %-10\n\t\t*set interdependence %-10\n\t\t*set filial %-10\n\t\t*set harmony %-10\n\t\t*goto sniff\n\t#I'll show them how organized I am. \"But I've already planned everything out. See, I have a list of courses I'd take if I majored in sociology.\"\n\t\t*set indirect %-10\n\t\t*set hierarchy %-10\n\t\t*set interdependence %-10\n\t\t*set filial %-10\n\t\t*set modest %-10\n\t\t*goto sniff\n\t#I'll show them how much I respect their ideas, but try to put in some of my own. \"You're right; chemistry is important. But sociology would help us track and identify demons.\"\n\t\t*set indirect %-10\n\t\t*set modest %-10\n\t\t*set harmony %+10\n\t\t*set hierarchy %+10\n\t\t*set interdependence %+10\n\t\t*goto sniff\n\t#I can't say anything. I shouldn't contradict them.\n\t\t*set indirect %+10\n\t\t*set modest %+10\n\t\t*set hierarchy %+10\n\t\t*set filial %+10\n\t\tYou lower your head, nodding silently to your aunt and uncle, and try not to let the sadness show on your face.\n\t\t*goto veryfirm\n\n*label sniff\nSecond Aunt sniffs disapprovingly. \"Sociology? What kind of major is that for a Wang?\"\n\n*label veryfirm\nEldest Uncle is gentle - he's clearly seen your disappointment - but very firm. \"You need to major in chemistry, ${Nickname}. It is for the good of the family. We need people who know how to make potions.\" He leans over to hand you a list of courses that he's written out. \"Here is the plan you should follow for this semester. You can take one Sociology class,\" he adds, crossing out the last course on the list, \"but the rest should be according to this list. These classes will set you on the right path for a chemistry major.\"\n\nNot only has Eldest Uncle decided on your major for you, he's actually chosen all of your classes!\n\nIf you major in chemistry, you'll help your family, but you'll be horribly bored. If you major in sociology, you'll go against your family's wishes, but you'll be enormously happy.\n\nWhat do you do?\n\n*choice\n\t#I'll follow their instructions. Only one sociology class, and the rest will go towards the chemistry major.\n\t\t*set filial %+20\n\t\t*set hierarchy %+20\n\t\t*set modest %+20\n\t\tIt makes you sad just to fill in the numbers on the standardized forms, but you know that what you're doing is for the good of the family.\n\n\t\tThe next evening when you get back to your dorm room, Little One looks up from ${hua_his} work to say, \"Your cousin stopped by. She left you a package.\"\n\n\t\tIt's a box of your favorite cookies, with a note attached that reads: \"Welcome to the Chemistry Major, from Firecracker.\"\n\n\t\tMaybe chemistry isn't what you wanted to do most, but it's what will help your family the most, and that makes you happy in its own way.\n\t\t*goto journal\n\n\t#I'm going to sign up for the classes I [i]really[/i] want.\n\t\t*set filial %-20\n\t\t*set hierarchy %-20\n\t\t*set modest %-20\n\t\tYou nod obediently. \"Thank you for your advice. I'll consider it.\"\n\n\t\tThen you go back to your room and fill out your schedule. \n\n\t\tSOCIOLOGY 102: Introduction to Sociology.\n\t\t*line_break\n\t\tSOCIOLOGY 108: Introduction to Urban Studies. \n\t\t*line_break\n\t\tSOCIOLOGY 115: Development of Chinese Social Thought. \n\t\t*line_break\n\t\tSOCIOLOGY 123: Sociology and the Law. \n\t\t*line_break\n\t\tMATH 130: Statistics for Sociology Majors.\n\n\t\tYou've never been so excited to start classes in your life.\n\n\t\t*page_break\n\n\t\tThe next day you receive a copy of your schedule in your mailbox:\n\n\t\t-CHEMISTRY 113: Comprehensive General Chemistry\n\t\t*line_break\n\t\t-CHEMISTRY 114: Comprehensive General Chemistry-Lab\n\t\t*line_break\n\t\t-CHEMISTRY 120: Organic Chemistry\n\t\t*line_break\n\t\t-MATH 108: Calculus for Chemistry Majors\n\t\t*line_break\n\t\t-SOCIOLOGY 102: Introduction to Sociology\n\n\t\tThere's also an envelope from the dean's office, with a note inside that simply reads 'See me.'\n\n\t\tUh-oh.\n\n\t\t*page_break\n\n\t\tWhen you get to Eldest Uncle's office, he is sitting behind his desk. \n\n\t\t\"Wang Su.\" Oh no. If he's not calling you by your nickname, that means he's angry. \"There seems to have been a mistake on your course registration form. Several mistakes.\" You sink further down in your chair with every one of his words. \"Fortunately, I was able to correct the errors.\" He leans forward slightly, seeking out your eyes with his. \"I trust that there will not be any mistakes like this again.\" \n\n\t\t\"Yes, Uncle,\" you say in a small voice.\n\t\t*goto journal\n\n*label journal\n\nWhy was it important for you to listen to Eldest Uncle's advice about classes?\n\n*input_text journal3\n\n*gosub trial_end\n*if false\n\t*label trial_end\n\t*check_purchase adfree\n\t*if choice_purchased_adfree or not(choice_purchase_supported)\n\t\t*label purchased\n\t\t*return\n\tRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n\t[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t*abort\n*goto_scene 3-roommates-old", "2-classchoice": "\n*temp failed false\n*temp doublefail false\n*temp wantchemistry false\n\n[b]Chapter 2: Learning Lessons[/b]\n\nBefore you even start school, you need to sign up for a major. That will determine your schedule for the next four years: every major at East Mountain University has a set series of classes that all of its students have to follow. Every major is demanding, and no matter what you study, you know that you'll have to work very hard. \n\nYou'd assumed that you would be majoring in chemistry. That's what you'd discussed with your parents and Eldest Uncle after you were accepted at East Mountain University a few months ago, because you need to learn chemistry so that you can make the potions that help you and your family combat demons. But now that you've actually seen the course catalogue, you might feel a bit differently. East Mountain University has a very good sociology department, and the names of the courses sound fascinating: Urban Studies, Sociology and the Law, Development of Chinese Social Thought.\n\nWhat do you think about your class choices?\n\n*choice\n\t#I think that chemistry is really interesting.\n\t\t*set wantchemistry true\n\t\tDemon hunting is the real family business, but chemistry is close behind. Looking over the course catalogue reminds you of why you were excited to come to East Mountain University\n\n\t\tIt's always a good thing when your family's plans for you match up with your own wishes. You're looking forward to your conversation with Eldest Uncle.\n\t\t*goto firstlesson\n\t#Sociology looks much more interesting than chemistry, and I want to see if I can major in that instead.\n\t\tBy dinnertime, you have all four years planned out: every requirement for the sociology major and then some. You feel great about having a plan, and even better when you think about all of the new things you'll learn in your classes. \n\n\t\tYou're scheduled to meet with Eldest Uncle later this evening, and you can't wait to show him all of your plans.\n\t\t*goto firstlesson\n\t#I'd much rather study sociology than chemistry, but I'll do what my family needs me to do.\n\t\tYour duty is to your family first; your parents and other relatives have told you that all your life. But sociology just seems like it would be so much more fulfilling than chemistry.\n\n\t\tYou don't want to disobey your family, but the question keeps nagging at you. You hope you'll be able to figure out something with Eldest Uncle.\n\t\t*goto firstlesson\n\n*label firstlesson\n*page_break\nBut first, you have a lesson with Cousin Tian and Cousin Lin. \n\nThey're twins, about ten years older than you. Lin is athletic: she was on the soccer team when she was at university, and she gave you some of your first sword lessons. Tian is more intellectual, and a skilled potion maker. Both are very serious about their work.\n\nRight now, that work is dealing with Yu Tao, the demon you captured last week. Eldest Uncle assigned Tian to guide Yu Tao towards enlightenment, and Lin is helping.\n\nHow are you feeling about Yu Tao?\n\n*choice\n\t#I'm angry. He was hurting people, and he shouldn't have been allowed to get away with it.\n\t\t*set balance %-10\n\t\t*set weapons %+10\n\t\tYour uncle has told you that it's your duty to help demons seek enlightenment, that it's part of the way that the Wangs uphold the balance of the universe, but it's often very hard to bring yourself to carry out that duty. How can you just turn your back on all of the bad things that Yu Tao did? It's going to be really unpleasant to spend time near him, and you wish that your family weren't obligated to teach him. \n\t\t*goto yourturn\n\t#I feel determined to help him as much as I can. If he wants to seek enlightenment, it's my duty to get him there.\n\t\t*set balance %+10\n\t\t*set filial %+10\n\t\tYou understand how Yu Tao's new commitment to enlightenment fits in with the balance of the universe. It might not be easy to help him stay on that path, but Eldest Uncle always says that working through that difficulty is part of your duty, too. You'll have to find a way to do it.\n\t\t*goto yourturn\n\t#I feel sorry for him. If he really wants to get on the right path, then he must feel very bad about what he did before.\n\t\t*set balance %+10\n\t\t*set interdependence %+10\n\t\tIf Yu Tao really is seeking enlightenment, then he must already be starting to feel shame for what he's done. Eldest Uncle always says that we should listen to our shame: it tells us what we've done wrong. You hope that your cousins are helping Yu Tao listen to his shame so that he can learn how to do the right thing in the future.\n\t\t*goto yourturn\n\t#I'm afraid of him. What if he's not really seeking enlightenment? What if he hurts us?\n\t\t*set balance %-10\n\t\t*set interdependence %+15\n\t\tDemons lie; you know that. What if Yu Tao is lying now? What if your cousins are in danger because of that? You'll have to stay close to them and try to protect them from the demon in their midst.\n\t\t*goto yourturn\n\n*label yourturn\n*page_break\n\nYou arrive at East Mountain University with plenty of time to spare and head over to the chemistry building. That's where most of the Wang family's demon-fighting activities take place: Eldest Uncle is the dean of the chemistry department, and he's claimed the whole basement for \"special laboratories.\" One of the rooms actually is a laboratory: it's where Tian makes his potions. The others are weapons practice rooms, demon containment cells, meditation chambers, and other spaces connected to your family business.\n\nLin and Tian greet you in one of the basement meeting rooms. \"It's good to see you, ${Nickname},\" Lin says. \"We've got a different kind of lesson for you today.\"\n\nTian picks up the explanation as he starts to lead the way down the hall: \"Eldest Uncle wants you to start learning how to interact with demons, so we're going to have you ask Yu Tao some questions.\"\n\n\"Don't worry!\" Lin adds. \"We'll be right here with you if you need help. But we want to see if you can get him to tell you about some of the trouble he caused.\"\n\n\"Because we'll need to go set it right,\" Tian finishes.\n\n*page_break\n\nWith your cousins right behind you, you head towards the cell where Yu Tao is staying. If you didn't already know that he was a demon, you wouldn't be able to tell: he's in his human form, and he's sitting very quietly on the bed reading a book.\n\nTian knocks on the window, and Yu Tao calmly lifts his head. \"Yes?\"\n\n\"You remember Wang Su,\" Tian tells Yu Tao. \"$!{Self_he} is going to ask you a few questions.\"\n\nYu Tao nods. \"All right,\" he says, in the same calm voice.\n\n\"Go ahead,\" Lin prompts you in a whisper. \n\nIt's in your hands now. How are you going to get Yu Tao to talk to you?\n\n*choice\n\t#I'll say something indirect to try to draw him out.\n\t\t\"Have you lived in this town for very long?\" you begin.\n\n\t\tYu Tao's mild expression shows a little surprise - that clearly wasn't what he was expecting you to ask. \"Yes…\" he replies slowly.\n\n\t\t\"You must feel very connected to it,\" you continue. \"And you must have had a big effect on it.\" \n\n\t\t*if indirect > 60\n\t\t\tAs you speak, you can see the realization coming into Yu Tao's eyes. He's used to this indirect, polite way of speaking, and he understands what you're getting at. \"Yes, I have lived here for years,\" he offers hesitantly. \"There are many things that I have done.\"\n\n\t\t\tYou nod in confirmation, and behind you, Tian murmurs, \"Well done.\"\n\t\t\t*goto confession\n\t\t*else\n\t\t\tYu Tao's expression doesn't change, except perhaps to grow a little more confused. \"Yes?\" he says again.\n\n\t\t\tYou're not used to speaking in this polite indirect manner. You had hoped that your questions would subtly draw him out, but instead they were just unclear.\n\t\t\t*goto taunting\n\t#I'll try to intimidate him into talking.\n\t\tYou lean forward and crowd yourself against the window of the cell, baring your teeth in what you hope is a fierce grimace. \"We want some information,\" you say menacingly. \"You need to tell us what you've done. We know it was something bad.\"\n\t\t*if weapons > 55\n\t\t\tYu Tao shrinks back, cringing away from the window in fear.\n\n\t\t\tIt's working! You press forward, lowering your voice to an intimidating growl. \"You need to tell us!\"\n\n\t\t\tBehind you, you can hear Tian murmuring in anxious uncertainty - this isn't the way that thing are usually done! But it's working, so you keep on going.\n\t\t\t*goto confession\n\n\t\t*else\n\t\t\tYu Tao looks back at you in mild confusion. \"Yes. I did some things that I am ashamed of now. But I'm done with that. I told your relatives that I was done.\"\n\n\t\t\tThat wasn't at all the reaction that you'd been hoping for. Apparently you weren't as intimidating as you thought you were - but then again, you're not very good at fighting, and you don't often resort to making physical threats.\n\t\t\t*goto taunting\n\t#I'll play on Eldest Uncle's reputation.\n\t\tYou look straight back at Yu Tao. \"You know the head of our family is, don't you?\"\n\n\t\tHe nods. \"Dean Wang.\"\n\n\t\t\"That's right,\" you say. \"He's the most experienced and most powerful demon hunter in China. He's going to make sure that you find the right path, but you need to help him out in return.\"\n\n\t\t\"What do you mean?\" Yu Tao asks.\n\n\t\t\"He needs information about what you've done.\" Maybe your reputation isn't that great, but Eldest Uncle's certainly is, and he has a lot more authority than you do.\n\t\t*if filial > 55\n\t\t\tYu Tao looks like he knows that too. He nods in emphatic agreement, shoulders bowing in a show of respect. \"I'll help him. What do you need?\"\n\n\t\t\t\"Tell us what you did, so that we can set it right.\"\n\t\t\t*goto confession\n\t\t*else\n\t\t\tYu Tao frowns slightly. \"Do you really mean that?\" he asks. Oh no. Being obedient to your elder relatives is sometimes a struggle for you, and that must have shown in your voice. Yu Tao isn't convinced at all. \"You should, you know,\" he continues sincerely. \"Your uncle is a great man, and you should show him more respect.\"\n\n\t\t\tA demon is telling you that you should be more filial? You must have sounded [i]really[/i] unconvincing.\n\t\t\t*goto taunting\n\n*label confession\n*set balance %+10\n\"The market!\" Yu Tao finally says. \"The one that had to close last week because all of the fish and meat was spoiled. That was my fault.\"\n\n\"I thought as much,\" Lin mutters. \"Demons are always spoiling food and contaminating water.\"\n\n\"I'll make sure that we set it right,\" Tian tells Yu Tao. \"You can work for the market to repay them.\"\n\n\"Good job, ${Nickname},\" Lin says. \"Now, this next part of the lesson is going to be a bit different.\"\n\n*goto seeingsparks\n\n*label taunting\n*set balance %-10\n*set failed true\n*page_break\n\"Was that all?\" Yu Tao asks. \"I'm very busy with my studies.\" He turns his back on the window - and on you - and goes back to his book.\n\nLin sighs. \n\n\"It's all right,\" Tian murmurs. \"Sometimes it takes a while for people to learn this part.\" He's trying to sound encouraging, but you can hear the disappointment in his voice. \"You just need to find the method that fits you.\"\n\n\"Well, at least we don't need him to talk for this next exercise,\" Lin says. \"Because it looks like he isn't going to be talking.\"\n\n*label seeingsparks\n\"What do I do next?\" you ask.\n\n\"You need to learn how to detect demons,\" Lin explains. \"Once you're fully trained, you'll be able to see them all the time without even trying. But for now, you'll need to develop your focus, concentration, and balance. And,\" she adds with a little smile and a tip of her head towards Yu Tao's cell, \"right now we already know where a demon is. So all you need to do is concentrate. If you're doing it right, you'll see green sparks.\"\n\nYou close your eyes and try to slow your breath, just like you do in the meditation exercises with Eldest Uncle. You know that there's a whole unseen universe just beyond the edges of your perception, and if you can align yourself with the balance of the universe, you'll be able to sense it.\n*page_break\n*gosub trial_end\n\n*if balance > 50\n\tWhen you open your eyes, a flurry of green sparks dances in front of you.\n\n\t\"Oh...\" you breathe.\n\n\tLin gives you one of her very rare smiles. \"You see it,\" she declares. \"Well done. That means that you're balanced. Keep it up. Make sure that all of your actions maintain your balance, and don't disrupt it.\"\n\t*if (failed)\n\t\tThe approval in her eyes almost cancels out the disappoinment that she had when you failed before.\n\t*goto cousingoodbye\n*else\n\tYou open your eyes, and…everything looks exactly the same.\n\n\tLin sighs. \"You can't see it, can you?\" She's trying hard to be patient and sympathetic, but you can still hear the exasperation in her voice.\n\t*if (failed)\n\t\t*set doublefail true\n\t\tYou probably shouldn't be surprised that Lin is unhappy - this is the second task you've failed at in this lesson. \n\t\t*goto failed2\n\t*else\n\t\t*set failed true\n\t\t*goto failed2\n\t*label failed2\n\t\"You need to work on your balance,\" Lin continues in that same deliberately patient tone. \"I know that it takes some people longer to get there than others. But you need to focus, and you need to make sure that your actions help maintain balance, not disrupt it.\"\n\t*goto cousingoodbye\n\n*label cousingoodbye\n*page_break\n*if doublefail\n\tTian's smile and voice are a little strained as he says his goodbyes. \"Some things are harder for people than others.\" He's indirect and polite as always, but you know exactly what he means: you didn't do very well at this lesson. \n\n\tLin isn't quite as good at acting encouraging when she isn't feeling it, but she smiles at you too when she says, \"We'll work on this at our lesson tomorrow.\"\n\n\t*goto department\n*elseif failed\n\tTian gives you an encouraging smile as you go. This wasn't the best lesson you've ever had, but at least it wasn't a total failure. \"See you next tomorrow,\" he and Lin say in unison.\n\t*goto department\n\n*else\n\t*achieve learninglessons\n\t\"Good work today!\" Tian says with an encouraging smile.\n\n\tLin nods her agreement. \"Eldest Uncle will be proud.\"\n\n\t\"See you tomorrow!\" Tian finishes.\n\t*goto department\n\n*label department\n\nAnd with that promise in mind, you head off to see Eldest Uncle.\n*page_break\n\nHis office is on the eighth floor: a very lucky number, but a long climb when you're taking the stairs from the basement.\n\nThe heavy wooden door to Eldest Uncle's office is slightly open when you arrive, and you can hear him talking to Second Aunt as you come in. Second Aunt is his younger sister, the second most senior member of the family here. She's very traditional, more so than Eldest Uncle, even.\n\n\"${Nickname}!\" Eldest Uncle says with a smile. \"Come in, sit down.\" Second Aunt pours you a cup of tea as you settle down on the comfortable couch. \"So, have you had a chance to look at the course catalogue yet?\"\n\nYou nod. \"I've read almost the entire thing!\"\n\nEldest Uncle smiles at your enthusiasm. \"There are many classes that could be useful to your duties, aren't there?\"\n\n*if (wantchemistry)\n\tWhich probably means that he's hoping that you'll major in chemistry, and you're in total agreement. \"Absolutely!\"\n\n\tSecond Aunt gives you a firm nod of approval. \"Good. It is only right for a Wang to study chemistry. After all, when Firecracker graduates, we will need someone to take her place in helping Tian make potions.\"\n\t*goto chemistrychoice\n\t\n*else\n\tFrom the way he phrased that question, you're pretty sure that Eldest Uncle already has some ideas about what classes he thinks you should take, and they're probably not the same ones that you want to take. How do you answer him?\n\t*goto sociologychoice\n\n*label chemistrychoice\n\n\"You know,\" Eldest Uncle continues, \"if you're really that interested in chemistry, you can take an extra class or two. The faster you learn, the faster you'll be able to make complex potions.\"\n\nExtra classes? That will take extra time, which means that you might not do as well in your other classes. But it will definitely make Eldest Uncle and Second Aunt happy, and it might help you in hunting demons. \n\nWhat do you tell them?\n\n*choice\n\t#I definitely want to take extra classes, and I'll say so: \"I'd love to.\"\n\t\t*set extrapotions true\n\t\t*set classrank %-5\n\t\t\"Excellent,\" Second Aunt declares. She's actually almost smiling, and that never happens. \"You are a very dedicated member of the family. You will uphold our traditions very well.\"\n\n\t\tThe next evening when you come to the chemistry department for your lesson with Cousin Lin, you find a package waiting for you. It's a box of your favorite cookies, with a note attached that reads: \"Welcome to the Chemistry Major, from Firecracker.\"\n\n\t\tIt's going to be a lot of work to keep up with your extra classes, but you're looking forward to being able to use those more advanced potions.\n\t\t*finish\n\t#I'll tell them indirectly that I don't want to do it: \"I'm looking forward to taking the basic classes in the chemistry major.\"\n\t\t*set indirect %+10\n\t\t*set classrank %+5\n\t\tSecond Aunt and Eldest Uncle exchange a brief glance, and then Eldest Uncle nods. \"Of course,\" he says. \"It's your first year at university, and you will have a great deal of work to do. You will help the family no matter what. We'll get you signed up for the basic chemistry courses.\"\n\n\t\tThe next evening when you come to the chemistry department for your lesson with Cousin Lin, you find a package waiting for you. It's a box of your favorite cookies, with a note attached that reads: \"Welcome to the Chemistry Major, from Firecracker.\"\n\n\t\tYou're satisfied that you're doing the right thing: you're in the major that's right for both you and your family, and you'll be able to dedicate as much time as possible to both of your obligations.\n\t\t*finish\n\t#I'll tell them straight out that I don't want to do it: \"I don't think so.\"\n\t\t*set indirect %-10\n\t\t*set classrank %+5\n\t\tSecond Aunt's expression puckers into a disapproving frown. \"You must learn to be more tactful,\" she murmurs.\n\n\t\tEldest Uncle nods his agreement, but he softens the reproach by saying, \"It may be a better idea to take fewer classes. It's only your first year at university, and you will have a great deal of work to do. Let's get you signed up for the basic chemistry courses.\"\n\n\t\tThe next evening when you come to the chemistry department for your lesson with Cousin Lin, you find a package waiting for you. It's a box of your favorite cookies, with a note attached that reads: \"Welcome to the Chemistry Major, from Firecracker.\"\n\n\t\tYou're satisfied that you're doing the right thing: you're in the major that's right for both you and your family, and you'll be able to dedicate as much time as possible to both of your obligations.\n\t\t*finish\n\n*label sociologychoice\n\n*choice\n\t#I'll say something indirect, hoping that it will draw him out. \"Yes, there are. I found a course in almost every department that could be helpful.\"\n\t\t*set indirect %+20\n\t\t\"You're right,\" Eldest Uncle replies, still smiling. \"Almost anything [i]could[/i] be applied to our work. But knowledge of chemistry is what the family needs the most right now. Firecracker will be moving away after she graduates, and we'll need someone else who can make potions.\"\n\t\t*goto heartsinks\n\t#I'll say something enthusiastic, because I'm so excited about what I've read. \"I liked sociology the best. I really want to take Sociology and the Law.\"\n\t\t*set indirect %-15\n\t\t*set filial %-10\n\t\tSecond Aunt sniffs disapprovingly at your directness, and Eldest Uncle shakes his head. \"I'm sure you do, ${Nickname},\" he says gently. \"But knowledge of chemistry is what the family needs the most right now. Firecracker will be moving away after she graduates, and we'll need someone else who can make potions.\"\n\t\t*goto heartsinks\n\t#I'll say something deferential, because I want to hear what he thinks. \"You would know that better than I would, Eldest Uncle.\"\n\t\t*set filial %+10\n\t\t*set indirect %+10\n\t\t*set interdependence %+10\n\t\tSecond Aunt gives you a small grudging smile for your respectful tone, and leans forward to pour you more tea. \n\n\t\tEldest Uncle says, \"Knowledge of chemistry is what the family needs the most right now. Firecracker will be moving away after she graduates, and we'll need someone else who can make potions.\"\n\t\t*goto heartsinks\n\n*label heartsinks\nYour heart sinks. This is exactly what you'd been afraid of.\n\nYou figured that Eldest Uncle's position as dean would mean that you'd have to take a few courses in chemistry no matter what. But sociology is so much more exciting! Everything you read about it made you happy and excited about learning.\n\nHow can you say this to Eldest Uncle and Second Aunt?\n\n*choice\n\t#I'll show them how enthusiastic I am. \"Majoring in sociology would make me much happier than chemistry, and that means that I'll study harder.\"\n\t\t*set indirect %-10\n\t\t*set interdependence %-10\n\t\t*set filial %-10\n\t\t*goto sniff\n\t#I'll show them how organized I am. \"But I've already planned everything out. See, I have a list of courses I'd take if I majored in sociology.\"\n\t\t*set indirect %-10\n\t\t*set interdependence %-10\n\t\t*set filial %-10\n\t\t*goto sniff\n\t#I'll show them how much I respect their ideas, but try to put in some of my own. \"You're right; chemistry is important. But sociology would help us track and identify demons.\"\n\t\t*set indirect %-10\n\t\t*set interdependence %+10\n\t\t*goto sniff\n\t#I can't say anything. I shouldn't contradict them.\n\t\t*set indirect %+10\n\t\t*set filial %+10\n\t\tYou lower your head, nodding silently to your aunt and uncle, and try not to let the sadness show on your face.\n\t\t*goto veryfirm\n\n*label sniff\nSecond Aunt sniffs disapprovingly. \"Sociology? What kind of major is that for a Wang?\"\n\n*label veryfirm\nEldest Uncle is gentle - he's clearly seen your disappointment - but very firm. \"You need to major in chemistry, ${Nickname}. It is for the good of the family. We need people who know how to make potions.\" He leans over to hand you a list of courses that he's written out. \"Here is the plan you should follow for this semester. You can take one Sociology class,\" he adds, crossing out the last course on the list, \"but the rest should be according to this list. These classes will set you on the right path for a chemistry major.\"\n\nNot only has Eldest Uncle decided on your major for you, he's actually chosen all of your classes!\n\nIf you major in chemistry, you'll help your family, but you'll be horribly bored. If you major in sociology, you'll go against your family's wishes, but you'll be enormously happy.\n\nWhat do you do?\n\n*choice\n\t#I'll follow their instructions. Only one sociology class, and the rest will go towards the chemistry major.\n\t\t*set filial %+20\n\t\t*set classrank %-5\n\t\tIt makes you sad just to fill in the numbers on the standardized forms, but you know that what you're doing is for the good of the family.\n\n\t\tThe next evening when you come to the chemistry department for your lesson with Cousin Lin, you find a package waiting for you. It's a box of your favorite cookies, with a note attached that reads: \"Welcome to the Chemistry Major, from Firecracker.\"\n\n\t\tMaybe chemistry isn't what you wanted to do most, but it's what will help your family the most, and that makes you happy in its own way.\n\t\t*finish\n\t#I'll sign up for the chemistry major, but I'll study sociology in secret.\n\t\t*set filial %-10\n\t\t*set classrank %+10\n\t\t*set balance %+15\n\t\tYou fill in the numbers on the standardized form, feeling only a little uncomfortable when Second Aunt praises your obedience. You [i]are[/i] being obedient, after all! They never said that you couldn't study sociology on your own time, just that you had to major in chemistry.\n\n\t\tThe next evening when you come to the chemistry department for your lesson with Cousin Lin, you find a package waiting for you. It's a box of your favorite cookies, with a note attached that reads: \"Welcome to the Chemistry Major, from Firecracker.\"\n\n\t\tThen you go to the university bookstore and buy two sets of books: one for chemistry and one for sociology. You have twice as much work as everyone else - and that's not even counting the time that you'll have to give to your demon-hunting duties! - and you know that you'll be exhausted trying to keep up. But studying sociology makes you enormously happy, and that's worth it. Even Cousin Lin notices: when you arrive for your last lesson before moving into the dorms, she compliments you on how balanced and peaceful you seem.\n\n\t\tIt's going to be hard doing the work for both the sociology and chemistry majors, but you think it might be worth it.\n\t\t*finish\n\n\t#I'm going to sign up for the classes I [i]really[/i] want.\n\t\t*set filial %-20\n\t\tYou nod obediently. \"Thank you for your advice. I'll consider it.\"\n\n\t\tThen you go back to your room and fill out your schedule. Sociology 102: Introduction to Sociology. Sociology 108: Introduction to Urban Studies. Sociology 115: Development of Chinese Social Thought. Sociology 123: Sociology and the Law. Math 130: Statistics for Sociology Majors.\n\n\t\tYou've never been so excited to start classes in your life.\n\n\t\t*page_break\n\n\t\tThe next day you receive a copy of your schedule in your mailbox:\n\n\t\t-CHEMISTRY 113: Comprehensive General Chemistry\n\n\t\t-CHEMISTRY 114: Comprehensive General Chemistry-Lab\n\n\t\t-CHEMISTRY 120: Organic Chemistry\n\n\t\t-MATH 108: Calculus for Chemistry Majors\n\n\t\t-SOCIOLOGY 102: Introduction to Sociology\n\n\t\tThere's also an envelope from the dean's office, with a note inside that simply reads 'See me.'\n\n\t\tUh-oh.\n\n\t\t*page_break\n\n\t\tWhen you get to Eldest Uncle's office, he is sitting behind his desk. \n\n\t\t\"Wang Su.\" Oh no. If he's not calling you by your nickname, that means he's angry. \"There seems to have been a mistake on your course registration form. Several mistakes.\" You sink further down in your chair with every one of his words. \"Fortunately, I was able to correct the errors.\" He leans forward slightly, seeking out your eyes with his. \"I trust that there will not be any mistakes like this again.\" \n\n\t\t\"Yes, Uncle,\" you say in a small voice.\n\t\t*finish\n\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n*abort", "3-roommates-old": "*temp yanmad\n*set yanmad false\n\n*page_break\n[b]Chapter 3: Roommates[/b]\n\nA week later, you move into the dorms. \n\nSo do thousands of other first-year students. The entire campus of East Mountain University is buzzing with activity: people lugging boxes and suitcases, upper-year students waving flyers and trying to recruit newcomers into their clubs, old friends greeting each other with shouts and waves. It's chaos! \n\nHow do you feel about the noise and crowds?\n\n*fake_choice\n\t#This is great! Everything is exciting and new. I can't wait to meet people!\n\t#This is uncomfortable. I'd much rather be alone.\n\t#This is exactly the kind of place where demons can hide. I'd better be on my guard.\n\t#This is kind of scary. I want to get away from the noise.\n\nFortunately, you manage to find your dorm without too much trouble.\n\n*if yan_gender = \"girl\"\n\tWhen you get to your dorm room, there are two other girls already there: a small thin girl, shyly curled up reading on one of the bottom bunks, and a taller one perched on the top bunk, painting her toenails. \n\t*goto topbunk\n\n*else\n\tWhen you get to your dorm room, there are two other boys there already: a small thin boy, shyly curled up reading on one of the bottom bunks, and a taller one perched on the top bunk, trying to aim balls of crumpled paper into the wastebasket on the other side of the room.\n\t*goto topbunk\n\n*label topbunk\n\nIt’s the ${yan_gender} on the top bunk who looks up at you and grins as you enter. “You must be our third roommate,\" ${yan_he} declares, already confident that ${yan_he} knows the answer. \"I'm Sun Yan, and this is Xu Hua.\" $!{yan_he} nods to the small ${hua_gender}, who gives you a shy smile. \"But I'm calling ${hua_him} Little One,\" Sun Yan continues, with a much bolder grin, \"because ${hua_he}'s a whole year younger than I am.\"\n\nYou can't help grinning back at the good-natured teasing. \"Maybe we should call you ${Grandma}, then, if you're so much older?\"\n\nSun Yan laughs. \"${Grandma}! I like that.\" $!{yan_he} jumps lightly off the top bunk down to the ground. \"So what's your name?\"\n*page_break\n\n“I’m Wang Su,\" you reply. \"Although you may have a nickname for me too, soon.\" Giving you a nickname would mean that they feel you're a close friend.\n\nYou take the last unclaimed bed, and start to unpack.\n\n*page_break\n\nSince you're the last person to arrive, there isn't a lot of space left. Little One's books are already on the shelves. You notice that they're mainly chemistry textbooks: you've seen almost all of them in Cousin Mei's room. Little One's are older and more battered than Cousin Mei's, though; ${hua_he} must have bought them used, or maybe borrowed them from an older relative. \n\nMeanwhile, ${Grandma} is trying to rearrange ${yan_his} books to make room for yours. Despite ${yan_his} effort, it looks like there isn't going to be enough room for your books, and you're only expecting to get more books once classes start. \n\n*label shrink\nAs you watch the empty space shrink with each new book you unload, you wonder: what can you do to solve this problem? It would be horribly rude and selfish to just ask ${Grandma} to move ${yan_his} things, but you do need more space. What do you do
