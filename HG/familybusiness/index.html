worse than it was before. You really have to do something. \n\nBut what?\n\n*choice\n\t#I'm going to blame ${Grandma}. $!{Yan_he} shouldn't take Little One's things without asking.\n\t\tYou clear your throat. \"Look. There's something I'd like to say.\" Both Little One and ${Grandma} look over at you, and for once their expressions match: they're both surprised and expectant.\n\n\t\t\"Things have been a bit tense around here lately,\" you begin. \"And, ${Grandma}, I think there's a lot that you could do to help make that better.\" ${Grandma} stares at you, so astonished that ${yan_he} nearly drops ${yan_his} tea. Little One is so surprised that ${hua_he} actually looks straight at you, shy eyes filled with hope. \n\t\t*if indirect \u003c 55\n\t\t\t*set rel_hua %+15\n\t\t\t*set rel_yan %-15\n\t\t\t\"You know how protective Little One is of ${hua_his} belongings. We should all be respectful of that.\"\n\n\t\t\tFor another long moment, ${Grandma} just stares at you, resentment gathering in ${yan_his} eyes. $!{Yan_he} is clearly unhappy that you're blaming ${yan_him} for everything. Then ${yan_he} looks over at Little One, then back at you, and finally nods. \"All right,\" ${Grandma} says grudgingly. \"I'm sorry.\"\n\n\t\t\tLittle One's tension melts into a small grateful smile. \"Thank you,\" ${hua_he} says, partly to ${Grandma} for the apology, but partly to you for drawing it out. You've definitely won Little One's friendship.\n\n\t\t\t*goto sitback\n\n\t\t*else\n\t\t\t*set rel_yan %-10\n\t\t\t*set rel_hua %-10\n\t\t\t\"We all need to be considerate and respectful,\" you finish.\n\n\t\t\t\"All right…\" ${Grandma} prompts, confused.\n\n\t\t\t\"Yes,\" you confirm. \"We do.\"\n\n\t\t\tLittle One deflates with a disappointed sigh. $!{hua_he} had thought that you were going to make some forceful statement on ${hua_his} behalf, but you've just been vague. You're so used to speaking tactfully and indirectly that when you try to say something straight out, it doesn't always come out sounding the way you wanted it to.\n\n\t\t\t${Grandma}'s confusion shades into exasperation. \"Is that all that you wanted to say? Because I have homework to do.\"\n\n\t\t\tThe rest of the evening passes in tense, unhappy silence. ${Grandma} is annoyed with you, and Little One sinks even deeper into unhappiness. \n\n\t\t\t*goto meditation\n\n\t\t\n\t#I'm going to blame Little One. $!{hua_he} should stand up for ${hua_him}self.\n\t\t\tYou clear your throat. \"Look. There's something I'd like to say.\" Both Little One and ${Grandma} look over at you, and for once their expressions match: they're both surprised and expectant.\n\n\t\t\t\"Things have been a bit tense around here lately,\" you begin. \"And, Little One, I think there's a lot that you could do to help make that better.\" Little One draws back in open surprise, hurt and betrayal showing in ${hua_his} eyes. \"When things happen that upset us, we all need to be better about communicating our feelings.\"\n\n\t\t*if indirect \u003c 55\n\t\t\t*set rel_hua %-15\n\t\t\t*set rel_yan %+15\n\t\t\tIt takes a moment for Little One to work up the courage to speak, and when ${hua_he} finally does, it is in a very small voice. \"I'm sorry,\" ${hua_he} says.\n\n\t\t\tA tiny satisfied smile is curls up ${Grandma}'s lips. You've taken ${yan_his} side, and ${yan_he} won't forget that.\n\t\t\t*goto sitback\n\n\t\t*else\n\t\t\t*set rel_hua %-10\n\t\t\t*set rel_yan %-10\n\n\t\t\tLittle One stares at you with eyes full of hurt and betrayal. \"[i]All[/i] of us?\"\n\n\t\t\t${Grandma} isn't angry, just confused. \"Wait, what did Little One do? $!{hua_he} hasn't done anything wrong!\"\n\n\t\t\tThe good news is that you seem to have gotten your roommates to agree with each other. The bad news is that what they agree on is that they're unhappy with you. You're so used to speaking tactfully and indirectly that when you try to say something straight out, it doesn't always come out sounding the way you wanted it to.\n\n\t\t\tThe rest of the evening passes in tense, unhappy silence. You all try to get some homework done, but nobody is very productive.\n\n\t\t\t*goto meditation\n\t#I'm going to try to mediate between them.\n\t\t*comment harder test, bigger reward\n\t\tYou clear your throat. \"Look. There's something I'd like to say.\" Both Little One and ${Grandma} look over at you, and for once their expressions match: they're both surprised and expectant.\n\t\t\n\t\t\"This has been a great year so far. I really love being roommates with both of you,\" you begin. You're greeted with matching surprised smiles from both Little One and ${Grandma} - it's probably the first time they've agreed on anything in the last two weeks. \"But lately it's been hard, because I can tell that everyone's been unhappy.\" \n\n\t\t*if indirect > 60\n\t\t\t*achieve mediation\n\t\t\tBoth roommates are nodding in agreement with your words: it looks like your tactful approach is working.\n\n\t\t\t\"I think I know how to fix it,\" you continue, \"but we all need to make some changes. It's hard to share a room, so we need to be respectful of each other's belongings. Right, ${Grandma}?\" You shoot a pointed look over at Little One's jacket.\n\n\t\t\t${Grandma} blinks. \"Oh. Yes. We do need to respect each other's belongings,\" ${yan_he} agrees, looking at Little One's shoes.\n\n\t\t\t\"And we also need to be better at speaking up when something's bothering us,\" you continue. This time, your pointed look is straight at Little One. \n\n\t\t\t\"Oh,\" Little One says, in an even smaller voice than usual. \"I guess we do.\"\n\t\t\t*set rel_hua %+20\n\t\t\t*set rel_yan %+20\n\n\t\t\t*goto sitback\n\t\t*else\n\t\t\tThe instant that you start to turn the conversation towards the conflict between your roommates, their smiles turn to scowls. \n\n\t\t\tBut you push ahead anyway - you can't stop now. \"Somebody has to do something to make things better in this room, right?\"\n\n\t\t\t\"Maybe [i]someone[/i] could be more generous,\" ${Grandma} mutters, shooting a sideways glare at Little One.\n\n\t\t\tLittle One shrinks down even further into ${hua_him}self, and whispers in a small, hurt voice, \"Or maybe someone could be more respectful?\"\n\n\t\t\tOh, this is going really badly! You probably could have been more tactful about the way you went about it, but you're just not good at the indirect kind of communication that's needed for situations like this.\n\n\t\t\t\"Wouldn't it help everyone if we were all more respectful?\" you venture, taking one last stab at mediating.\n\n\t\t\t${Grandma} rolls ${yan_his} eyes. \"Right now it would help if I were somewhere else.\" ${Grandma} grabs ${yan_his} jacket - ${yan_his} own, this time, at least! - and storms out of the room.\n\n\t\t\tFor a second, Little One just looks at you unhappily, then whispers, \"I should go too.\"\n\n\t\t\tYou're left alone in an empty echoing room. Your roommates don't come back until it's nearly time for bed.\n\t\t\t*set rel_hua %-15\n\t\t\t*set rel_yan %-15\n\t\t\t*goto meditation\n\n\t#I'm going to let them sort it out between themselves. It's not my problem.\n\t\tYou turn your back and try to focus on your work.\n\n\t\tLittle One picks up ${hua_his} jacket and very carefully smooths it out...and hangs it up so that it blocks the light from ${Grandma}'s desk lamp.\n\n\t\t${Grandma} rolls ${yan_his} eyes and spreads out ${yan_his} library books on the floor right next to Little One's bed.\n\n\t\tLittle One pushes back ${hua_his} desk chair with a loud scrape, and leans back into ${Grandma}'s space.\n\n\t\tThis is getting even more uncomfortable than before.\n\t\t*page_break \n\n\t\t*if balance > 55\n\t\t\tFortunately, you've had a lot of practice at keeping your focus in difficult situations. Having your roommates arguing with each other isn't fun, but it's nothing compared to facing down a raging demon. \n\n\t\t\tYou call on your inner sense of balance and let the rest of the world fade away. Studying is no problem at all after that.\n\t\t\t*set classrank %-10\n\t\t\t*page_break\n\t\t\t*goto meditation\n\t\t*else\n\t\t\tYou try to run through the exercises that Eldest Uncle taught you to help you focus, but they're not working. All you can see is the glares going back and forth between your roommates, and all you can hear is the scrape of desk chairs as ${Grandma} and Little One jockey for position.\n\n\t\t\tYou can't get any studying done at all.\n\t\t\t*set classrank %+10\n\t\t\t*page_break\n\t\t\t*goto meditation\n\n\n*label sitback\n*page_break\n\nYou sit back on your bed, satisfied that you've relieved some of the tension in your room. The rest of the evening is peaceful and productive, and you all get a lot of homework done. \n\n*label meditation\nFinally, when your roommates are almost ready to turn out the lights, you settle down to practice your mediation.\n\nThis is an important part of your training: when you get more advanced, the concentration techniques that you learn in your meditation sessions will help you detect demons.\n\nIt's also the only part of your demon-hunting training that you'd even remotely consider trying in front of anyone else: to the outside world, it just looks like you're closing your eyes. ${Grandma} noticed once, and ${yan_he} teased you for falling asleep, but that's it.\n\n*page_break\n\nYou close your eyes and concentrate. Your breathing slows, and you can feel yourself relaxing, just the way that Eldest Uncle always says that you should. The rest of your thoughts fade away, and all that you can hear is the inner stillness of your mind, and the chant that you say silently to yourself. \n\n[i]Together we find strength. Together we find balance. Together we find harmony.[/i]\n\n*page_break\n\nWhen you open your eyes, you can see sparks all around you. Every living thing has a spark within it - through the window you can see the lights from the trees and grass, and even a person walking by. When you're looking at the world like this, you can see that everything in the universe shares something in common. You can only see these sparks for a few seconds at a time, but you treasure every moment that you have them.\n\nIt's beautiful. \n\nJust out of the corner of your eye, you see another spark. Bright, harsh, green, different from the others. \n\nA demon!\n\n*page_break\n\n- but when you whip your head around to see it, it's gone. The sparks fade from your eyes like the flare of a firework fizzling into darkness, and the real world fades into focus.\n\nAll you see on that side of the room is ${Grandma}, looking back quizzically back at you.\n\nYou can't actually think that ${Grandma} is a demon! $!{Yan_he} may have been a little inconsiderate, but that doesn't mean that ${yan_he}'s a demon. You must have been mistaken...\n\n...right?\n\n*finish\n\n*comment Subroutines start here\n*label extrapotionlessons\nAnd that's not even counting the hours you spend with Cousin Tian on making more advanced potions.\n*return", "6-remembering-old": "*temp both\n*set both false\n\n*page_break\n[b]Chapter 6: Remembering Great-Grandmother[/b]\n\nYou wake up the next morning with your mind still racing. You've got a full day of classes ahead of you, but you have an even more important question to think about. What are you going to do about ${Grandma}? Is it really possible that ${yan_he}'s a demon?\n\n\n*choice\n\t#I'm going to ask Eldest Uncle what to do. I want his advice.\n\t\t*set filial %+20\n\t\t*set hierarchy %+20\n\t\t*set modest %+10\n\t\t*set tolddemon \"uncle\"\n\t\tBefore your first class of the day, you stop in at Eldest Uncle's office. You feel better just being there, even before he greets you. \"Good morning, ${Nickname}.\" He's clearly happy to see you, but the slight narrowing of his eyes shows that he realizes how unusual your visit is, and is already wondering whether there's something wrong. \"Did you have a question that couldn't wait until tonight's family meeting?\"\n\n\t\tYou explain what happened the night before, and the thoughtful furrows in his forehead deepen even further. \"I see,\" he says, after a long moment's thought. \"I can understand why you wanted advice on this matter. It must have been very unsettling to see that.\"\n\n\t\t*page_break\n\n\t\t\"So what do you think I should do?\" you ask.\n\n\t\tEldest Uncle leans back, folding his hands across his stomach. \"Well, first of all, you don't know for certain whether ${yan_he} is a demon. Even if ${yan_he} is, you would still need to take all of ${yan_his} behavior into account before you decide how to react. You need more information. Pay careful attention to your roommate. Watch for deception, bad luck, things going wrong - all of the signs that there might be a demon about.\"\n\n\t\tYou nod, feeling your smile return a little. \"Thank you.\"\n\n\t\t\"You did well to come to me,\" Eldest Uncle says, his smile glowing gently. \"This is too serious a question to answer on your own.\"\n\t\t*page_break\n\t\t*goto tagalong\n\n\t#I'm going to ask Firecracker what to do. I want her advice.\n\t\t*set filial %+10\n\t\t*set hierarchy %+10\n\t\t*set modest %+10\n\t\t*set holistic %-20\n\t\t*set tolddemon \"firecracker\"\n\t\tBefore your first class of the day, you head over to Firecracker's dorm. \"Can we talk?\" you ask, glancing nervously around while crowds of other students rush through the corridors on their way to their classes. \"Alone? About…family things?\" you add, with a significant look.\n\n\t\tUnderstanding dawns in Firecracker's eyes. She nods quickly. \"My roommates are out. We can talk in my room.\"\n\n\t\t*page_break\n\n\t\tAs soon as the door closes behind you, you tell Firecracker the whole story. Her expressive face shows exactly what she's thinking: she mirrors your surprise and uncertainty. \"I don't blame you for wanting help on this one,\" she says at the end. \"The first demon you've spotted on your own! That's big. And I'm flattered that you'd come to me for help, instead of going to Eldest Uncle.\"\n\n\t\t\"[i]Maybe[/i] my first demon!\" you correct her quickly. \n\n\t\t\"Right,\" she agrees. \"Well, I'd say that you need to act quickly. If your roommate really is a demon, then you're not safe at all!\" She rummages in the top drawer of her desk and pulls out a few sticks of incense. \"Here. Burn these in your room tonight. It will help.\"\n\n\t\tYou're not sure that quick action is the right way to go, but you do feel better now that you've talked to one of the more senior members of your family.\n\t\t*page_break\n\n\t\tThat evening, you follow Firecracker's advice and light the incense. As soon as the smoke starts to rise, you can understand why demons would be repelled by it. It smells [i]terrible[/i]. After a few minutes, ${Grandma} flees the room to study in the library, but so does Little One, and you can't blame them. You put out the stinky incense and flee to the library yourself.\n\t\t*page_break\n\t\t*goto anniversary\n\n\t#I'm going to watch ${Grandma} carefully. I want to look at the bigger pattern of ${yan_his} behavior.\n\t\t*set holistic %+20\n\t\t*set indirect %+10\n\t\t*set tolddemon \"nobody\"\n\t\tYou remember all of your lessons with Eldest Uncle, and all of the times that you've been told to look at the big picture: even when you have definitely identified a demon, you need to take all of its behavior into account before you decide what to do with it.\n\n\t\t*label tagalong\n\t\tFor the rest of the day, you tag along with ${Grandma} to the dining hall for every meal, paying extra careful attention to how ${yan_he} moves and speaks. And…nothing is different. ${Grandma} is acting just the same way that ${yan_he} always has. You hope that means that everything is all right, but you know that you'll have to keep watching.\n\t\t*goto anniversary\n\n*label anniversary\n\nThat evening, the whole family gathers in Eldest Uncle's office for your weekly meeting.\n\n\"Next week is the anniversary of Great-Grandmother's death,\" Eldest Uncle begins. \"We must discuss the offering that we are going to give.\"\n\nThe anniversary of an ancestor's death is a major event for the rest of the family. Everyone comes together at the ancestor's tomb or memorial stone to share memories, talk to them, and give offerings so that their spirit will be honored and well-provided for. You never met Great-Grandmother - she's actually your three-times-great-grandmother, so she died long before you were born. But she was one of the most distinguished members of the Wang family, so the anniversary of her death is still very important.\n\nSecond Aunt speaks up first - and of course she begins, \"It is traditional…\" You catch Firecracker's eye across the circle, and you both suppress smiles. Second Aunt [i]always[/i] talks about what's traditional. \"It is traditional,\" she continues, \"for us to make an offering of our actions instead of objects. We must seek out a demon, and slay it in memory of Great-Grandmother.\"\n\nThe look that Firecracker gives you is beyond skeptical now. You can tell what she's thinking: there has to be a better way to do this.\n\n*page_break\n\n\"We will gather again tomorrow to speak of this more,\" says Eldest Uncle.\n\n\"${Nickname}!\" Firecracker calls. \"Let's walk back to our dorms together.\"\n\nAs soon as you're out of earshot of the rest, Firecracker bursts out, \"Killing a demon! Does she really expect us to do that? Everyone else just makes offerings of paper goods.\" She's right: most families give paper replicas of things that their relatives enjoyed while they were alive, and burn the replicas so that their relatives can enjoy them in the spirit world. \"My roommate just got back from her grandfather's memorial ceremony, and they burned a paper iPhone as an offering.\"\n\n\"Do you think that Great-Grandmother would like an iPhone?\" you object. \"They hadn't even been invented yet when she died.\"\n\nFirecracker laughs. \"Of course she would! Who wouldn't? We don't want her to be left out, when all of the other ancestors are getting them?\"\n\n*label tell\nWhat do you tell Firecracker?\n\n*choice\n\t#\"You're right. I'd much rather just give her an iPhone instead.\"\n\t\t*label yesphone\t\n\t\t*set harmony %+10\n\t\t*set filial %-10\n\t\t*set hierarchy %+5\n\t\t*label yesphone2\n\t\tFirecracker laughs. \"I thought so. We'll always have demons to hunt,\" she adds, turning serious for a moment, \"but for Great-Grandmother, we shouldn't put ourselves in unnecessary danger, and we should keep up with the times.\"\n\n\t\t\"So how are we going to convince Second Aunt to go along with it?\" you ask.\n\n\t\t\"I was hoping you'd have some ideas about that,\" Firecracker replies ruefully. \"It would be really disrespectful for us to contradict her directly.\"\n\n\t\t\"That's true,\" you agree. \"Maybe Eldest Uncle could talk to her for us?\"\n\t\t*page_break\n\n\t\t*goto uncletalk\n\n\t#\"We can do both, can't we?\"\n\t\t*set harmony %+15\n\t\t*set interdependence %+15\n\t\t*set filial %+10\n\t\t*set holistic %+10\n\t\tFirecracker cocks her head. \"Do you mean, kill a demon and give a paper iPhone, both? I don't see why not. But do you really think we need to go through the trouble and danger of killing a demon too?\"\n\n\t\t*choice\n\t\t\t#\"You're right. I'd much rather just give her an iPhone.\"\n\t\t\t\t*goto yesphone2\n\t\t\t#\"It's important to Second Aunt, and it's tradition. We should respect that.\"\n\t\t\t\t*set filial %+20\n\t\t\t\t*set hierarchy %+20\n\t\t\t\t*set both true\n\t\t\t\tFirecracker rolls her eyes, but she's still grinning. \"You're starting to sound like Second Aunt yourself, talking about tradition like that! Well, I guess I can see your point. We can do both.\"\n\n\t\t\t\t\"Good,\" you reply, smiling back. \"So how are we going to convince Second Aunt to go along with it?\"\n\n\t\t\t\t\"I was hoping you'd have some ideas,\" Firecracker replies ruefully. \"It would be pretty disrespectful to contradict her directly.\"\n\n\t\t\t\tYou think for a moment, and then suggest, \"Let's talk to Eldest Uncle about it. We can't talk to her directly, but he could.\"\n\n\t\t\t\t*page_break\n\t\t\t\t*goto uncletalk\n\n*label uncletalk\n\nYou and Firecracker head over to Eldest Uncle's office, and take your usual seats on the comfortable couch while his secretary gets you tea, then closes the door behind her so that you can discuss family matters in private.\n\n\"We wanted to talk to you about the memorial for Great-Grandmother,\" Firecracker begins, the instant the door closes.\n\n\"We thought it would be better to offer her something more modern,\" you explain.\n\n\"Like an iPhone!\" Firecracker puts in. \"You know, one of the paper ones.\"\n\n*if (both)\n\t\"We could slay a demon, too,\" you add. \"It's traditional.\"\n\t*comment endif\n\n*label laugh\nEldest Uncle's laugh is a quiet, affectionate rumble. \"And why did you think that an iPhone would be better?\"\n\n\"That's the kind of thing that everyone gives their ancestors now,\" Firecracker explains. \"It doesn't feel right to have a different kind of offering, even if the Wangs are a different kind of family.\"\n\nThen Eldest Uncle turns to you. What do you say?\n\n*choice\n\t#\"We really think that Great-Grandmother would like this better.\"\n\t\t*set filial %+20\n\t\t*set hierarchy %+20\n\t\t\"Everyone gives their ancestors the latest gadgets,\" you explain. \"Phones, computers, that kind of thing. One of my friends from high school even burned a paper car for his grandfather. We won't feel that we've done the right thing unless we give her something modern.\"\n\n\t\tFirecracker nods her agreement. \"We don't want Great-Grandmother to feel left behind.\"\n\n\t\tEldest Uncle considers for a moment, then nods again. \"Well. We wouldn't like our ancestors to feel disrespected. I'll speak to your aunt and see if I can bring her around.\"\n\t\t*page_break\n\t\t*goto nextday\n\t#\"The offering should be something that we all agree on.\"\n\t\t*set holistic %+20\n\t\t*set interdependence %+20\n\t\tFirecracker nods her agreement. \"We really think that this would be better.\"\n\n\t\tEldest Uncle raises his eyebrows as he looks at you both. \"And you don't think that you could all agree on the traditional offering of a demon?\" The amused twinkle is still in his eyes, but the question is serious.\n\n\t\t*if (both)\n\t\t\t\"We do want to honor Great-Grandmother by slaying a demon,\" you say. \"But we won't feel that we've done the right thing unless we also give her something modern. Everyone gives their ancestors the latest gadgets. Phones, computers, that kind of thing. One of my friends from high school even burned a paper car for his grandfather.\"\n\n\t\t\tFirecracker nods her agreement. \"We don't want Great-Grandmother to feel left behind.\"\n\t\t\t*goto allright\n\t\t*else\n\t\t\tYou shake your head. \"We won't feel that we've done the right thing unless we give her something modern. Everyone gives their ancestors the latest gadgets,\" you explain. \"Phones, computers, that kind of thing. One of my friends from high school even burned a paper car for his grandfather.\"\n\n\t\t\tFirecracker nods her agreement. \"We don't want Great-Grandmother to feel left behind.\"\n\t\t\t*goto allright\n\n\t\t*label allright\n\n\t\t\"All right,\" Eldest Uncle says. \"I'll talk to your aunt and see if I can bring her around.\"\n\t\t*page_break\n\t\t*goto nextday\n\n*label nextday\n\nThe next day, all seven members of the Wang family gather at Great-Grandmother's memorial stone to enact the ritual.\n\n*if (both)\n\t*set slaydemon true\n\tSecond Aunt has been preparing for this for weeks, and she's figured out a likely place where a demon has been causing mischief. The fish have been dying in one of the ponds near the edge of town, and no matter how many times they test the water, nobody has been able to figure out why. It's a pretty clear sign of demon interference.\n\n\tThe seven of you head out to the edge of town, walking in perfect step with each other - even though it's so dark that you can hardly see where you're going, you know exactly where every one of your relatives is, every step of the way. \n\n\tSure enough, there's the demon, right by the fence. This one could never be mistaken for a human: it's ten feet long, scaly and snakelike, with green eyes and huge fangs.\n\n\tTime to fight.\n\t*page_break\n\n\tEvery time you fight at their side, it feels easier and more natural. Second Aunt and Cousin Tian move in unison; you and Firecracker strike out with your coordinated kicks at exactly the right moment for Eldest Uncle to throw a potion that makes the demon recoil.\n\n\t*label cornered\n\tYou've got it cornered! It hisses and writhes, sending off green sparks from its furious eyes. You're in front: what do you do?\n\n\t*choice\n\t\t#I go in for the kill! This is what we're here for.\n\t\t\t*set holistic %-20\n\t\t\tWith one sharp strike, you slam the demon back into the fence. It lets out a shriek of furious pain and surges back up, fangs snapping towards you.\n\n\t\t\tFirecracker pushes you behind her to safety, and Eldest Uncle shouts breathlessly, \"Do you seek enlightenment?\"\n\n\t\t\tYou do have to ask, even if you're pretty sure that the answer will be no.\n\t\t\t*page_break\n\n\t\t\tJust as you'd thought, the demon doesn't change its course at all - it just keeps snapping and hissing. \n\n\t\t\t\"Now!\" shouts Eldest Uncle.\n\n\t\t\tEvery Wang's hand strikes the demon at once. It lets out a single cry of fury, then collapses onto the ground.\n\n\t\t\tIt's a solid victory, but Eldest Uncle isn't entirely happy. \"Wang Su!\" he snaps as he turns towards you. \"You [i]must[/i] ask their intentions! You must never strike first. Have you learned nothing?\" Your family's disapproving glares bore into you, and you shrink back in shame.\n\t\t\t*goto stepup\n\n\n\t\t#I give it a choice: does it seek enlightenment?\n\t\t\t*set holistic %+20\n\t\t\t\"Do you seek enlightenment?\" you shout, as sparks fly around you.\n\n\t\t\tThe demon's only response is a hissing snap. You're pretty sure that means no.\n\n\t\t\tEvery Wang's hand strikes the demon at once. It lets out a single cry of fury, then collapses onto the ground.\n\n\t\t\t\"Well done, ${Nickname},\" Eldest Uncle says, breathless but warmly approving. \"You are learning well.\"\n\n\t\t\t*label stepup\n\n\t\t\tSecond Aunt steps up to the demon's corpse and intones, \"Great-Grandmother, please accept this deed as our offering to you. The Wang family has done this together, honoring your memory with our actions.\" \n\n\t\t\tThe first part of your offering is complete; now it's time for the second part.\n\t\t\t*page_break\n\n\t\t\t*goto iphone\n\n*else\n\t*label iphone\n\tYou gather at Great-Grandmother's memorial stone, all seven of you forming a half-circle around it. Fragrant incense smoke floats around you, and candles send a gentle flickering light over your relatives' faces.\n\n\tFirecracker steps up, her hands full of red paper cutouts. She's got the paper iPhone that she wanted to give, but also a set of headphones to go with it, a car, and some bottles. \"Great-Grandmother would like some potions, too,\" she explains, as she hands the bottle-shaped pieces of paper to Second Aunt. Second Aunt's smile is still slightly grudging, but she glances over at Eldest Uncle, then back to Firecracker, and nods.\n\n\tEldest Uncle steps forward and touches a match to the red paper cutouts. Flames leap up, brightening the night and sending another plume of smoke up to join the incense clouds. \"Great-Grandmother, please accept our offerings to you,\" he says. \"The Wang family has done this together. We want you to be well provided for in the spirit world, and we honor your memory with our gifts.\"\n\n\t*page_break\n\n\tNow it's time for the final part of the ritual. Each member of the family speaks for a few minutes to Great-Grandmother, telling her about the most important events of the last year.\n\n\tWhat do you say, when it's your turn to speak to her?\n\n\t*input_text journal6\n\t*goto_scene 7-profmistake-old\n\n", "6-remembering": "*temp both false\n*temp slaying false\n\n[b]Chapter 6: Remembering Great-Grandmother[/b]\n\n*label beginning\nYou wake up the next morning with your mind still racing. You've got a full day of classes ahead of you, but you have an even more important question to think about. What are you going to do about ${Grandma}? Is it really possible that ${yan_he}'s a demon?\n\n*choice\n\t#I'm going to ask Eldest Uncle what to do. I want his advice.\n\t\t*set filial %+20\n\t\t*set tolddemon \"uncle\"\n\t\tBefore your first class of the day, you stop in at Eldest Uncle's office. You feel better just being there, even before he greets you. \"Good morning, ${Nickname}.\" He's clearly happy to see you, but the slight narrowing of his eyes shows that he realizes how unusual your visit is, and is already wondering whether there's something wrong. \"Did you have a question that couldn't wait until tonight's family meeting?\"\n\n\t\tYou explain what happened the night before, and the thoughtful furrows in his forehead deepen even further. \"I see,\" he says, after a long moment's thought. \"I can understand why you wanted advice on this matter. It must have been very unsettling to see that.\"\n\n\t\t*page_break\n\n\t\t\"So what do you think I should do?\" you ask.\n\n\t\tEldest Uncle leans back, folding his hands across his stomach. \"Well, first of all, you don't know for certain whether ${yan_he} is a demon. Even if ${yan_he} is, you would still need to take all of ${yan_his} behavior into account before you decide how to react. You need more information. Pay careful attention to your roommate. Watch for deception, bad luck, things going wrong - all of the signs that there might be a demon about.\"\n\n\t\tYou nod, feeling your smile return a little. \"Thank you.\"\n\n\t\t\"You did well to come to me,\" Eldest Uncle says, his smile glowing gently. \"This is too serious a question to answer on your own.\"\n\t\t*page_break\n\t\t*goto tagalong\n\n\t#I'm going to ask Firecracker what to do. I want her advice.\n\t\t*set filial %+10\n\t\t*set balance %-10\n\t\t*set tolddemon \"firecracker\"\n\t\tBefore your first class of the day, you head over to Firecracker's dorm. \"Can we talk?\" you ask, glancing nervously around while crowds of other students rush through the corridors on their way to their classes. \"Alone? About…family things?\" you add, with a significant look.\n\n\t\tUnderstanding dawns in Firecracker's eyes. She nods quickly. \"My roommates are out. We can talk in my room.\"\n\n\t\t*page_break\n\n\t\tAs soon as the door closes behind you, you tell Firecracker the whole story. Her expressive face shows exactly what she's thinking: she mirrors your surprise and uncertainty. \"I don't blame you for wanting help on this one,\" she says at the end. \"The first demon you've spotted on your own! That's big. And I'm flattered that you'd come to me for help, instead of going to Eldest Uncle.\"\n\n\t\t\"[i]Maybe[/i] my first demon!\" you correct her quickly. \n\n\t\t\"Right,\" she agrees. \"Well, I'd say that you need to act quickly. If your roommate really is a demon, then you're not safe at all!\" She rummages in the top drawer of her desk and pulls out a few sticks of incense. \"Here. Burn these in your room tonight. It will help.\"\n\n\t\tYou're not sure that quick action is the right way to go, but you do feel better now that you've talked to one of the more senior members of your family.\n\t\t*page_break\n\n\t\tThat evening, when both of your roommates are at the library, you follow Firecracker's advice and light the incense. \n\n\t\tAs soon as the smoke starts to rise, you can understand why demons would be repelled by it. It smells [i]terrible[/i]. \n\n\t\tA few hours later, ${Grandma} and Little One come back in - and both of them immediately turn around and head back out. \"I - er - think I left my book behind,\" ${Grandma} says between coughs, and Little One nods hastily in agreement. You're not sure what that means. It might be just that they can't stand the smell of the incense. Honestly, you can't blame them.\n\t\t*page_break\n\t\t*goto anniversary\n\n\t#I'm going to watch ${Grandma} carefully. I want to look at the bigger pattern of ${yan_his} behavior.\n\t\t*set balance %+20\n\t\t*set indirect %+10\n\t\t*set tolddemon \"nobody\"\n\t\tYou remember all of your lessons with Eldest Uncle, and all of the times that you've been told to look at the big picture: even when you have definitely identified a demon, you need to take all of its behavior into account before you decide what to do with it.\n\n\t\t*label tagalong\n\t\tFor the rest of the day, you tag along with ${Grandma} to the dining hall for every meal, paying extra careful attention to how ${yan_he} moves and speaks. And…nothing is different. ${Grandma} is acting just the same way that ${yan_he} always has. You hope that means that everything is all right, but you know that you'll have to keep watching.\n\t\t*goto anniversary\n\n*label anniversary\n\nThat evening, the whole family gathers in Eldest Uncle's office for your weekly meeting.\n\n\"Next week is the anniversary of Great-Grandmother's death,\" Eldest Uncle begins. \"We must discuss the offering that we are going to give.\"\n\nThe anniversary of an ancestor's death is a major event for the rest of the family. Everyone comes together at the ancestor's tomb or memorial stone to share memories, talk to them, and give offerings so that their spirit will be honored and well-provided for. You never met Great-Grandmother - she's actually your three-times-great-grandmother, so she died long before you were born. But she was one of the most distinguished members of the Wang family, so the anniversary of her death is still very important.\n\nSecond Aunt speaks up first - and of course she begins, \"It is traditional…\" You catch Firecracker's eye across the circle, and you both suppress smiles. Second Aunt [i]always[/i] talks about what's traditional. \"It is traditional,\" she continues, \"for us to make an offering of our actions instead of objects. We must seek out a demon, and slay it in memory of Great-Grandmother.\"\n\nThe look that Firecracker gives you is beyond skeptical. You can tell what she's thinking: there has to be a better way to do this.\n\n*page_break\n\n\"We will gather again tomorrow to speak of this more,\" says Eldest Uncle.\n\n\"${Nickname}!\" Firecracker calls. \"Let's walk back to our dorms together.\"\n\nAs soon as you're out of earshot of the rest, Firecracker bursts out, \"Killing a demon! Does she really expect us to do that? Everyone else just makes offerings of paper goods.\" She's right: most families' memorial offerings are paper replicas of things that their relatives enjoyed while they were alive. They burn the replicas so that their relatives can enjoy them in the spirit world. \"My roommate just got back from her grandfather's memorial ceremony, and they burned a paper smartphone as an offering.\"\n\n\"Do you really think that Great-Grandmother would like a smartphone?\" you object. \"They hadn't even been invented yet when she died.\"\n\nFirecracker laughs. \"Of course she would! Who wouldn't? We don't want her to be left out, when all of the other ancestors are getting them.\"\n\nShe does have a point. It's important to treat your ancestors with the greatest respect possible, and it might be disrespectful to give an offering that isn't as good the ones that other ancestors are receiving. On the other hand, it might also be disrespectful to give Great-Grandmother an offering that she wouldn't like, and you don't know if she'd like a smartphone. But it's also important for the whole family to agree on what kind of offering they're giving.\n\nSo what do you tell Firecracker?\n\n*choice\n\t#\"I think we should stick to the original plan. Let's kill a demon.\"\n\t\t*set filial %+20\n\t\t*set interdependence %-10\n\t\t*set slaying true\n\t\tFirecracker rolls her eyes. \"Fine. Go along with what's traditional. I just hope Great-Grandmother likes it.\" \n\t\t*goto nextday\n\t#\"You're right. I'd much rather just give her a smartphone instead.\"\n\t\t*set filial %-10\n\t\t*set interdependence %-10\n\t\tFirecracker laughs. \"I thought so. We'll always have demons to hunt,\" she adds, turning serious for a moment, \"but for Great-Grandmother, we shouldn't put ourselves in unnecessary danger, and we should keep up with the times.\"\n\n\t\t\"So how are we going to convince Second Aunt to go along with it?\" you ask.\n\n\t\t\"I was hoping you'd have some ideas about that,\" Firecracker replies ruefully. \"It would be really disrespectful for us to contradict her directly.\"\n\n\t\t\"That's true,\" you agree. \"Maybe Eldest Uncle could talk to her for us?\"\n\t\t*goto uncletalk\n\n\t#\"We can do both, can't we?\"\n\t\t*set interdependence %+15\n\t\t*set filial %+10\n\t\t*set balance %+10\n\t\t*set slaying true\n\t\t*set both true\n\t\tFirecracker cocks her head. \"Do you mean, kill a demon and give a paper smartphone, both? I don't see why not. But do you really think we need to go through the trouble and danger of killing a demon too?\"\n\t\t\n\t\t\"It's important to Second Aunt, and it's tradition. We should respect that.\"\n\t\t\n\t\tFirecracker rolls her eyes, but she's still grinning. \"You're starting to sound like Second Aunt yourself, talking about tradition like that! Well, I guess I can see your point. We can do both.\"\n\n\t\t\"Good,\" you reply, smiling back. \"So how are we going to convince Second Aunt to go along with it?\"\n\n\t\t\"I was hoping you'd have some ideas,\" Firecracker replies ruefully. \"It would be pretty disrespectful to contradict her directly.\"\n\n\t\tYou think for a moment, and then suggest, \"Let's talk to Eldest Uncle about it. We can't talk to her directly, but he could.\"\n\t\t*goto uncletalk\n\n*label uncletalk\n*page_break\n\nYou and Firecracker head over to Eldest Uncle's office, and take your usual seats on the comfortable couch while his secretary gets you tea, then closes the door behind her so that you can discuss family matters in private.\n\n\"We wanted to talk to you about the memorial for Great-Grandmother,\" Firecracker begins, the instant the door closes.\n\n\"We thought it would be better to offer her something more modern,\" you explain.\n\n\"Like a smartphone!\" Firecracker puts in. \"You know, one of the paper ones.\"\n\n*if (both)\n\t\"We could slay a demon, too,\" you add. \"It's traditional.\"\n\t*comment endif\n\nEldest Uncle's laugh is a quiet, affectionate rumble. \"And why did you think that a phone would be better?\"\n\n\"That's the kind of thing that everyone gives their ancestors now,\" Firecracker explains. \"It doesn't feel right to have a different kind of offering, even if the Wangs are a different kind of family.\"\n\nThen Eldest Uncle turns to you. What do you say?\n\n*choice\n\t#\"We really think that Great-Grandmother would like this better.\"\n\t\t*set filial %+20\n\t\t\"Everyone gives their ancestors the latest gadgets,\" you explain. \"Phones, computers, that kind of thing. One of my friends even burned a paper car for his grandfather. We won't feel that we've done the right thing unless we give her something modern.\"\n\n\t\tFirecracker nods her agreement. \"We don't want Great-Grandmother to feel left behind.\"\n\n\t\tEldest Uncle considers for a moment, then nods again. \"Well. We wouldn't like our ancestors to feel disrespected. I'll speak to your aunt and see if I can bring her around.\"\n\t\t*goto nextday\n\t#\"The offering should be something that we all agree on.\"\n\t\t*set interdependence %+20\n\t\tFirecracker nods her agreement. \"We really think that this would be better.\"\n\n\t\tEldest Uncle raises his eyebrows as he looks at you both. \"And you don't think that you could all agree on the traditional offering of es is, every step of the way. You are perfectly in balance with the universe, and so are they.\n\n\t\t\"${Nickname},\" Cousin Tian whispers. \"Help us find the demon. It will be good practice for you.\"\n\n\t\tYou pause to sharpen your focus a little more, just as Eldest Uncle taught you in his meditation lessons. You close your eyes and turn your mind inward - and when you open your eyes again, you see the telltale green spark that says that a demon is near. \"Over there,\" you whisper, pointing towards the west.\n\n\t\tEldest Uncle's voice rumbles behind you. \"Well done.\" Your family gathers around you once more, and you head off to confront the demon.\n\t\t*goto slaying2a\n\t*else\n\t\tYou bring up the rear as the seven of you head out to the edge of town: your steps are a little out of rhythm with the others', and you just can't seem to muster up the sense of connection that you know you should have. This is the moment when you should be feeling the balance of the universe, but you can't get your mind to focus.\n\n\t\tOf course, just when you're feeling the least focused is when Cousin Tian says, \"${Nickname},\" Cousin Tian whispers. \"Help us find the demon. It will be good practice for you.\"\n\n\t\tYou close your eyes, trying to concentrate in the way that Eldest Uncle taught you in his meditation lessons. You can feel your family around you, their hopeful anticipation rising with every second that passes. But it's no use. You just can't focus enough to be able to sense where the demon is.\n\n\t\t\"I'm sorry,\" you whisper, shaking your head to Tian. \n\n\t\tHe gives you a patient smile, but it's Eldest Uncle who speaks. \"Next time. You will work harder, ${Niece}, and next time you will succeed.\"\n\n\t\tYou hope he's right.\n\t\t*goto slaying2b\n\n\t*label slaying2a\n\t*page_break\n\tAs you draw nearer to the pond, the green sparks grow brighter, crackling fierce and sharp in the dark night. \n\n\tSure enough, there's the demon, right by the fence. This
