f the building's two towers, and you follow her, ducking up a servants' stair here and through a hidden door there, and passing a grim-faced $!{patrickname} and a trouser-clad $!{matildaname} along the way.\n\t\t\t\n\t\t\tSoon you find yourself climbing stairs—and more and more stairs. Before long you're in the open air high above everything. \n\t\t\t\n\t\t\tA gleaming army of automatons awaits you on the plain below, lined up in a perfect square. Hundreds of glowing eyes are lifted to the fort, and your faith in the colonial army is shaken. They're few in number and resources, and pitting stone against metal feels like lunacy.\n\t\t\t\n\t\t\tAs you look, a large quantity of varnished black silk flops down in front of you, blocking your view.\n\t\t\t\n\t\t\t\"Ah,\" says $!{emmelinename}. \"Just in time.\"\n\t\t\t*page_break\n\t\t\tShe leads you up more and more stairs until you reach the upper edge of the enormous pile of silk—and then it all starts to make sense. There is an enormous wicker basket wedged sideways into the scaffolding, and the folded silk is already billowing and bulging as it fills with air. You've seen a basket just like this one at a fair. It's part of a hot air balloon, with an envelope of black silk. The open-sided tower is specifically designed to assist in the process of inflation. \n\t\t\t\n\t\t\t$!{emmelinename} tugs at the huge pile of fabric until she find an array of pockets sewn into the silk. Opening a compartment bolted onto the tower's frame, she takes out several large panels of aluminum and adds them to the balloon's pockets, neutralizing its weight. You stare at the stupendous riches in shock.\n\t\t\t\n\t\t\tWhen the opening at the balloon's base is positioned correctly, $!{emmelinename} turns on an engine attached to the basket's frame and sends jets of fire into the open silk envelope until the entire balloon stands upright. She unhooks the basket, keeping it tied to the tower with a single rope, and helps you inside.\n\t\t\t\n\t\t\t\"Ready?\" she asks.\n\t\t\t\n\t\t\tYou take a breath, realizing there's nothing but wicker under your feet, and nothing but air and magic holding you up. The steam engine chugging between you looks awfully heavy. \"Ready.\"\n\t\t\t\n\t\t\t$!{emmelinename} unhooks the rope with a grin, and you drift out over the battlefield.\n\t\t\t\n\t\t\t\"Would you like to man the balloon or the signal flags?\" she asks. \"From here we'll be able to confirm when $!{patrickname} has blown up the back of the caves—protecting the rear of the fort. That will be essential in this fight.\"\n\t\t\t\n\t\t\tShe teaches you the signals quickly as the balloon sails out over the clockwork men towards the caves.\n\t\t\t*goto choices\n\t\t#Can I blow something up?\n\t\t\t*set mechanical +5\n\t\t\t\"You know me so well,\" grins $!{emmelinename}. \"$!{patrickname} would be glad of your assistance.\"\n\t\t\t\n\t\t\tShe races towards the taller of the building's two towers, and you follow her, ducking up a servants' stair here and through a hidden door there, and soon finding a grim-faced $!{patrickname} who gladly accepts your help. He's carrying a large rat in each hand, but you notice at once that they have little engines in their backs venting puffs of steam.\n\t\t\t\n\t\t\t\"Better'n matches,\" he says, and leads you down flight after flight of stairs until you're unhooking a lantern from a dirt wall and walking down a seemingly endless tunnel.\n\t\t\t\n\t\t\tIt's a long walk, but neither of you speaks more than a few words. At last he holds up a hand to stop you, and climbs up an apparent rockfall to peer through a lit opening.\n\t\t\t\n\t\t\t\"It's all right,\" he says. \"They haven't come this way yet.\"\n\t\t\t*page_break\n\t\t\tThe pair of you cawl through a hidden opening, sealing it behind you—except for a tiny hole for the rats, who bing quietly at the excitement.\n\t\t\t\n\t\t\tYou're inside the limestone caves now, surrounded by creamy deposits of stone that glimmer golden in the lanternlight. Someone has nominated this section of the caves as an armory, judging by the long row of rifles. $!{patrickname} smiles at the sight. \n\t\t\t\n\t\t\t\"You may have noticed our rear defenses at the fort are pretty shoddy. That's no accident. It seems our friends took the bait, planning on coming through here to surprise us. But we'll be blowing up this whole section of the cave—and $!{matildaname} will be blocking the river route out of the valley. That bridge you saw is packed full of dynamite. The troopers will be trapped here in $!{emmelinename}'s clutches until she's destroys them.\"\n\t\t\t\n\t\t\tTogether you walk through the natural caves until you can hear voices ahead. $!{patrickname} instructs the rats to light the fuse and retreat, and the two of you shelter in a natural basin.\n\t\t\t*page_break\n\t\t\tThe cave expodes with light and sound and fury, and you find yourself sprawled on the ground with your ears ringing. $!{patrickname} helps you up, checks you have your blade, and stands beside you as you prepare to fight through an entire British batallion in order to get back outside. \n\t\t\t\n\t\t\tBefore you have to fight, however, there is a second distant boom from outside, and the soldiers run off towards the valley entrance, unwittingly letting you follow them safely all the way back into the valley. \n\t\t\t*goto choices\n\t\t#I might not be smart, but I'm not afraid of anything.\n\t\t\t*set courage +5\n\t\t\t\"Good for you,\" grins $!{emmelinename}. \"$!{matildaname} would be glad of your assistance.\"\n\t\t\t\n\t\t\tShe races towards the taller of the building's two towers, and you follow her, ducking up a servants' stair here and through a hidden door there, and soon passing a grim-faced $!{patrickname} before you run into a trouser-clad $!{matildaname} leading several others.\n\t\t\t\n\t\t\t\"A volunteer for your squad,\" says $!{emmelinename}.\n\t\t\t\n\t\t\t\"Yes'm,\" says $!{matildaname}. \"I'll try to keep us both alive.\"\n\t\t\t\n\t\t\t$!{emmelinename} gives a sharp nod and hurries away, but not before you see the tears in her eyes.\n\t\t\t\n\t\t\t$!{matildaname} leads you to a third-floor window that juts out over the cliff. \"This is the fastest way,\" she says, and uses a pulley to rapidly lower a much larger man on a wicker chair. She winds the chair back up and straps you in.\n\t\t\t*page_break\n\t\t\tBefore you can have second thoughts, you're plummeting down the cliffside. The first man grabs you from the air and unstraps you, giving you a hand as you stagger to your feet. He waves for $!{matildaname} to take the chair back.\n\t\t\t\n\t\t\tBy the time $!{matildaname} reaches you, your breath has steadied and you've had a chance to appreciate the fact that hundreds of clockwork soldiers are lined up in a perfect square immediately in front of you—their eyes wide and glowing.\n\t\t\t\n\t\t\t\"Well,\" says $!{matildaname}. \"If in doubt, walk forwards.\"\n\t\t\t\n\t\t\tLeaving the river between your squad and the automatons, you walk towards the mouth of the valley where the large stone bridge spans the water. \"It's packed with explosives inside the stones,\" $!{matildaname} explains quietly. \"$!{patrickname} will be off blocking the back entrance to the limestone caves, so between our two groups we'll trap the British inside this valley—and protect the fort's weaker side.\"\n\t\t\t\n\t\t\tThe clockwork soldiers don't even turn their heads to watch your passing, and you reach the bridge easily, sheltering behind it so humans are less likely to see you. $!{matildaname} produces a gently-smoking but clearly live rat from her pocket, and quietly gives it instructions on how to light the fuse.\n\t\t\t\n\t\t\tThere is an enormous boom and dust plumes from the mouth of the tunnel. \n\t\t\t\n\t\t\t\"That's our signal,\" says $!{matildaname}, and lets go of the rat. It scampers inside the bridge and the three of you move away—fast.\n\t\t\t\n\t\t\tThe bridge explodes like an unblocked drain, hurling whole bricks and boulders high into the air. A few pieces narrowly miss you, but when the dust clears you can see that the path is now blocked—and so is the river. The incendiary rat scampers by, binging with what appears to be delight.\n\t\t\t\n\t\t\t*goto choices\n\t\t\t\n*if probritish\n\tA sweaty-looking fellow in iron-tipped boots runs past and then stops, spotting $!{emmelinename}.\n\t\n\t\"Thank you, Beresford,\" says $!{emmelinename}. \"I need you to escort $!{first_name} to the caves. Through the main tunnel, if you please. And close it after yourself.\" \n\t\n\t\"Very good ma\"am,\" he says, but gives you a dirty look. \n\t\n\t\"I assigned my best women to be sure you and $!{siblingname} were kept safe if things started early,\" says $!{emmelinename}. \"They must have just missed you. Keep an eye out for $!{siblingname}, won't you?\"\n\t\n\t\"Of course. Stay safe.\"\n\t\n\tHer eyes fill with tears, but she blinks them away fiercely. \"You too. I'll see you when this is done—one way or another.\"\n\t\n\tWith little choice, you follow Beresford on a lantern-lit journey deep underneath the hillside. The one thing you have in common is a desire for speed, so there's little conversation—which suits you fine. \n\t\n\tAt last you turn a corner and find yourself blinking in shock as you stumble into a mass of troopers.\n\t\n\tThey lower their bayonets at you.\n\t\n\tYour guide is nowhere to be seen, and there is a rumble as he collapses the tunnel that brought you. Moments later, a large section of the cave falls in so close by that the dust of the explosion stings your eyes. It seems the caves do lead back to the undefended rear of the fort—or they used to. Beresford blew them up. How very efficient of $!{emmelinename}.\n\t*page_break\n\t\"I'm on your side!\" you yelp. \"For Britain! Ask Private Barker and Private Siau—they know.\"\n\t\n\tA commanding officer comes and looks you over. \"Very well, $!{last_name}. We've been expecting you. What can you offer?\"\n\t*choice\n\t\t#I'm not bad with mechanics—shall I check over those automatons for you?\n\t\t\t*set mechanical +5\n\t\t\t\"Certainly,\" he says. \"They're outside, ready to go.\"\n\t\t\t\n\t\t\tYou give him an attempt at a military salute and head in the direction he points. As you walk past hundreds of soldiers checking pistols and tightening sword-straps, you hear another explosion outside. You're already heading that way, so you keep going. \n\t\t\t*goto choices\n\t\t#I have a bad feeling about that tunnel—shall I check for more explosives?\n\t\t\t*set science %-10\n\t\t\tHe shakes his head. \"If they've blown up one tunnel, I'm sure they'll have blocked off any others. It's too obvious a weak point. Report to Colonel Garn at the valley entrance.\"\n\t\t\t\n\t\t\tYou give him an attempt at a military salute and head in the direction he points. As you walk past hundreds of soldiers checking pistols and tightening sword-straps, you hear a second explosion outside. You're already heading outside, so you keep going. \n\t\t\t*goto choices\n\t\t#I want to fight.\n\t\t\t*set courage +5\n\t\t\t\"Very well,\" he says. \"Report to Colonel Garn at the valley entrance.\"\n\t\t\t\n\t\t\tYou give him an attempt at a military salute and head in the direction he points. As you walk past hundreds of soldiers checking pistols and tightening sword-straps, you hear an explosion in the cave behind you—and then another outside. You're already heading outside, so you keep going. \n\t\t\t*goto choices\n*else\n\t\"I instructed my best women to take $!{siblingname} safely to the caves if things happened quickly. We must have just missed them.\" The pair of you shiver with horror at what the day might bring. But right now everyone's life is on the line—and you need to move quickly.  \n\t\n\t\"We've set up the cabin as a hospital,\" $!{emmelinename} says. \"It's stronger than it looks, and should be separated from the main action. Can you get there on your own?\"\n\t\n\tYou're briefly tempted to insist she needs to take you there herself. It's infuriating to be separated so quickly after all this time. \"I'll make my own way. Stay safe, won't you?\"\n\t*page_break\n\tHer eyes fill with tears, but she blinks them away fiercely. \"You too. I'll see you when this is done—one way or another.\"\n\t*goto healer\n\t\n*label choices\nYou look at the opening of the cave, and see soldiers emerging. $!{siblingname} is clearly visible among them, as \n*if pcismale\n\ther iron corset flashes in the first light of dawn streaming over the Eastern mountains.\n\t\n\tA small party of rebels is already approaching the redcoats, and you see the largest deliberately break away from the crowd and charge right at $!{siblingname}! Judging by the flogging scars running all the way down to his bare calves, he was a convict—and had to be heavily punished even after his imprisonment. He pulls a wrapped package from his jacket, and you realize it's a bomb.\n\n\tYou get as close as you can, and then take your life in your hands and leap to save your sister. \n\t*goto iron\n*else\n\this iron vest flashes in the first light of dawn streaming over the Eastern mountains.\n\n\tA small party of rebels is already going to meet the troopers, and you see the largest deliberately break away from the crowd and charge right at $!{siblingname}! Judging by the flogging scars running all the way down his bare calves, he was a convict—and had to be heavily punished even after his conviction. He pulls a wrapped package from his jacket, and you realize it's a bomb.\n\n\tYou get as close as you can, and then take your life in your hands and leap to save your brother. \n*label iron\n*choice\n\t#Try to kill the convict. \n\t\t*set contentment %-10\n\t\t*if siblingbrain\n\t\t\t*set siblingbrain false\n\t\t\t*achieve siblingsaved\n\t\t\t*set happiness +9\n\t\t\t*goto boogawooga\n\t\t*else\n\t\t*label boogawooga\n\t\t*if (kindness \u003c80) and ((brass) or (iron))\n\t\t\tYou race up behind nd\n\t\t*elseif (kindness \u003c80) or ((brass) or (iron))\n\t\t\tYou race up behind the convict and as he lifts his arm to throw the bomb at $!{siblingname} you shove him forwards. He falls half on top of the bomb as it explodes and is thrown clear, apparently unconscious.\n\t\t\t\n\t\t\t\"Thank you,\" $!{siblingname} says to you, wide-eyed. \"And also… ouch.\" \n\t\t\t\n\t\t\tYou snap out of your horror and see $!{siblingname} has brass and silver shrapnel lodged in one leg. It looks awful, but the blood is minimal. You use your knife to tear off a strip of crinoline fabric and roughly bind it.\n\t\t\t\n\t\t\tYou say, \"Don't remove all the metal pieces—trust me. Magic can be terribly handy.\"\n\t\t\t\n\t\t\t\"Okay.\" $!{siblingname} grimaces. \"Well, it looks like that's it for me. There's a neutral hospital set up at the cabin. I'll go there. Stay alive for me?\"\n\t\t\t\n\t\t\t\"I promise.\"\n\t\t\t\n\t\t\t$!{siblingname} gives you a smile and \n\t\t\t*goto end\n\t\t*else\n\t\t\tYou run at the convict but he turns your blow aside with ease, throwing you to the ground and running on.\n\n\t\t\t$!{siblingname} kicks the bomb straight at the man who threw it. It explodes before he has time to react, killing him instantly. \n\t\t\t\t\t\n\t\t\t\"Thanks for the attempt at rescue,\" $!{siblingname} says to you, and \n\t\t\t*goto end\n\t#Try to knock out the convict. \n\t\t*set kindness %+10\n\t\t*if siblingbrain\n\t\t\t*set siblingbrain false\n\t\t\t*achieve siblingsaved\n\t\t\t*set happiness +9\n\t\t\t*goto boogawooga\n\t\t*if (siblingbond \u003c70) and ((gold)or (iron))\n\t\t\tYou race up behind the convict and as he lifts his arm to throw the bomb at $!{siblingname} you shove him forwards. He falls half on top of the bomb as it explodes and is thrown clear, apparently unconscious.\n\t\t\t\n\t\t\t\"Thank you,\" $!{siblingname} says to you, wide-eyed. \"And also… ouch.\" \n\t\t\t\n\t\t\tYou snap out of your horror and see $!{siblingname} has brass and silver shrapnel  use your knife to tear off a strip of crinoline fabric and roughly bind it.\n\t\t\t\n\t\t\tYou say, \"Don't remove all the metal pieces—trust me. Magic can be terribly handy.\"\n\t\t\t\n\t\t\t\"Okay.\" $!{siblingname} grimaces. \"Well, it looks like that's it for me. There's a neutral hospital set up at the cabin. I'll go there. Stay alive for me?\"\n\t\t\t\n\t\t\t\"I promise.\"\n\t\t\t\n\t\t\t$!{siblingname} gives you a smile and \n\t\t\t*goto end\n\t\t*else\n\t\t\tYou run at the convict but he turns your blow aside with ease, throwing you to the ground.\n\n\t\t\t$!{siblingname} kicks the bomb straight at the man who threw it. It explodes right in his face, killing him instantly. \n\t\t\t\t\t\n\t\t\t\"Thanks for the attempt at rescue,\" $!{siblingname} says to you, and \n\t\t\t*goto end\n\t#Grab $!{siblingname} and run. \n\t\t*set courage -10\n\t\t*if (siblingbond \u003c70) and ((aluminum) or (iron))\n\t\t\tYou run past the convict and grab $!{siblingname}, pulling\n\t\t\t*if pcismale\n\t\t\t\ther to safety.\n\t\t\t\t*goto but1\n\t\t\t*else\n\t\t\t\thim to safely.\n\t\t\t\t*label but1\n\t\t\n\t\t\t\t\"Thanks for the rescue,\" $!{siblingname} says to you, and\n\t\t\t*goto end\n\t\t*elseif ((aluminum) and (aluminium1))\n\t\t\tYou run past the convict and grab $!{siblingname}, meaning to pull \n\t\t\t*if pcismale\n\t\t\t\ther to safety, but she\n\t\t\t\t*goto but\n\t\t\t*else\n\t\t\t\thim to safely, but he\n\t\t\t\t*label but\n\t\t\t\twriggles from your grasp and kicks the bomb straight at the man who threw it. It explodes right in his face, killing him instantly. \n\t\t\t\t\t\n\t\t\t\t\"Thanks for the attempt at rescue,\" $!{siblingname} says to you, and\n\t\t\t*goto end\n\t\t*elseif (siblingbond \u003c70) or ((aluminum) or (iron))\n\t\t\tYou run past the convict and grab $!{siblingname}, meaning to pull \n\t\t\t*if pcismale\n\t\t\t\ther to safety, but she\n\t\t\t\t*goto butter\n\t\t\t*else\n\t\t\t\thim to safely, but he\n\t\t\t\t*label butter\n\t\t\t\twriggles from your grasp and kicks the bomb straight at the man who threw it. It explodes right in his face, killing him instantly. \n\t\t\t\t\t\n\t\t\t\t\"Thanks for the attempt at rescue,\" $!{siblingname} says to you, and\n\t\t\t*goto end\n\t\t*else\n\t\t\tYou run past the convict and grab $!{siblingname}, meaning to pull \n\t\t\t*if pcismale\n\t\t\t\ther to safety, but she\n\t\t\t\t*goto butta\n\t\t\t*else\n\t\t\t\thim to safely, but he\n\t\t\t\t*label butta\n\t\t\t\twriggles from your grasp and kicks the bomb straight at the man who threw it. It explodes right in his face, killing him instantly. \n\t\t\t\t\t\n\t\t\t\t\"Thanks for the attempt at rescue,\" $!{siblingname} says to you, and\n*label end\nleaves.\n*finish Next\n*label healer\nAfter a few false starts—one of the perils of having stayed overnight in a five-storey mansion—you finally find your way outside onto the plateau between the fort and several more utilitarian outbuildings. Looking down, you see hundreds of mechanical soldiers standing in perfect ranks in the valley below. Their eyes glow, reflecting off one another's metal skin with an eerie false life. They are not yet attacking, and although the fort responded rapidly to their advance, both sides have so far kept their human forces out of sight. From the lip of the steep ravine beside the fort, you can see where the easily defensible cliff softens at the rear, and you have no idea if you hope $!{emmelinename} has noticed it or not. Although the British forces appear superior, the fort and landscape give the colonials an advantage. Perhaps it would be better for $!{siblingname} and the British to win, and quickly. \n\nWhatever happens, the cabin will soon be brimming with wounded. It is easily visible from where you stand—but the ravine blocks your path. You could walk down the slope of the rear hill and then back into the valley and up the hill of the cabin, but that would be a long walk that would take you within range of the weapons of each side. It's faster and safer to cross the ravine directly. You glance down and see the river churning around boulders far below. Taking a deep breath, you make your decision. \n*choice\n\t#There are two ropes slung across the gap. I'll swing across hand over hand.\n\t\t*set courage +5\n\t\tIt's terrifying to swing wildly over the abyss, but you make it. You hurry to the cabin to set up ready for the inevitable wounded.\n\t\t*goto hospital\n\t#I bet I can rig something to get me across.\n\t\t*set mechanical +5\n\t\tYou look around for makeshift tools and quickly notice the pulleys at each end of the two ropes stretched across the ravine, and the wicker chair attached to the rope on your side of the cliff. You strap yourself in and haul on the opposite rope until you're safely across. The opposite chair passes you on the way. You hurry to the cabin to set up ready for the inevitable wounded.\n\t\t*goto hospital\n\t#I bet I can find something to get me across. \n\t\t*set science %+10\n\t\tYou examine the scene and quickly notice the pulleys at each end of the two ropes stretched across the ravine, and the wicker chair attached to the rope on your side of the cliff. You strap yourself in and haul on the opposite rope until you're safely across. The opposite chair passes you on the way. You hurry to the cabin to set up ready for the inevitable wounded.\n*label hospital\nAs you draw closer, you begin to realize the cabin is far larger than it looks from the valley floor. It has two large doors almost exactly next to each other. You try the first, and see a stone-lined room filled with stretcher beds and a large supply of bandages, scalpels, willowbark, and frighteningly large needles and thread. Beside the usual medical supplies there are thin strips of brass and silver, with portable burners and an array of crucibles, pliers, and other tools. $!{emmelinename}'s influence is immediately obvious, and your heart skips a beat when you notice the multiple sets of brass goggles hung in a row on the wall in case some light welding is required. It's just a little bit like home.\n\nGathering yourself, you step back outside and try the other door. Beds; medical supplies; mechanical supplies. It's identical—except for the young man emerging from the floor beneath the far stretcher. \n\n\"Oh! Hello,\" you say, not at all certain about the correct etiquette when a moustachioed stranger pops out of the floor. \n\n\"$!{first_name} $!{last_name}?\" he says. \"I was meant to be here before you. Don't tell Miss $!{last_name} you saw the tunnel entrance, will you?\"\n\nYou promise not to tell if you can take a peek, and he willingly shows you a perfectly square tunnel heading directly downwards, with a ladder bolted to the side. There is a lantern and matches on an alcove just inside, but the natural light from above barely cuts into the darkness. Just as you're realizing it must go all the way down below the river—and then, presumably, back up into the fort—you hear a reverberating explosion and you jump back, letting go of the wooden lid. \n\nBefore you can even ask what it was, there is a second explosion from outside.\n*page_break\n\"That's that then,\" says the man. \"We've blown up the back of the caves and the other end of the river. People are stuck here now. Which room would you like? Miss $!{last_name} said we might do a bit better if we kept the wounded separate.\"\n\nHow thoughtful of $!{emmelinename}—and how sad she knew it would come to this. \"I'll take the one without the secret entrance, then—I imagine any British wounded will feel better with me, and that tunnel might be useful to you.\"\n\n\"Good luck,\" he says softly, and you leave him to his surgery.\n\nYou go to the door, and already see the first wounded crawling or being carried up the hill. A black balloon drifts over the battlefield, signalling instructions to the troops below. In the split second before you run to meet your first patient, you see the valley below erupting into noisy bloodletting and you can only hope your\n*if pcismale\n\tsisters\n\t*goto sisters\n*else\n\tsiblings\n*label sisters\nare safe. \n\nYour first patient is younger than you, and you quickly look away from the tears on his face and instead pay attention to the stump where he used to have a foot. It's clear from the jagged edges that one of the mechanical men attacked him with its twin blades. He's dead before you reach the hospital, but you put him on a bed anyway—his friends are watching.\n\nAfter that you face a girl with a stab wound through her arm. You bind it as well as possible and advise her to rest—but she's already heading back outside to rejoin the fight. Time passes in an endless stream of blood and moaning, and you stop noticing if your patients are young or old, male or female—all you see is what needs fixing.\n\n*finish Next\n", "9b": "*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n\n*if probritish\n\tRebels start shooting from the fort, and more fight hand to hand on the valley floor. You catch glimpses of Siau and William, but can't reach them. Your British allies recover from the cave's collapse and quickly restore order to their ranks—but even they falter as an enormous mechanical spider crawls out of some inner courtyard of the fort and down the cliff. It is easily as tall as the mansion, and each of its jointed legs ends in a savage blade. The first thing it does is stamp on the British cannons, protecting the rebel's scouting balloon. You can clearly see the distinctive red mark on the glossy mound of its back indicating that it was modeled on one of the deadliest local creatures.\n\t\n\tThe British commander shouts the order to attack, and redcoated troopers salute—but he wasn't talking to them. He was talking to the army of clockwork men. They snap to attention and the air is rent by the sound of hundreds of inbuilt blades sharpening one another. Even with the automata on your side, you can't suppress a shiver of revulsion. Something's gone awry, though, and they move sluggishly. Many march sideways or in circles instead of forwards. \n\t\n\tIt's the spider. $!{emmelinename} plated it with an enormous amount of real gold, and somehow managed to activate the magic so the gold has its usual hypnotic effect—but magnified many times over due to the spider's enormous size. The clockwork men are especially vulnerable to metallic magic, and they're thrown into confusion. Disaster!\n\t\n\tBut then one of the independents charges at you with a rusty longsword and you forget everything in the more immediate concern for your life. You win your first swordfight but there's no time to feel triumphant as more enemies are coming at you. The waves of anger and hate are relentless.\n\t\n\tYou're swarmed by an array of strange mechanisms: rats that are part-organic and part-mechanical but obviously thriving, fist-sized bombs on legs, and that awful redback spider.\n\t\n\tThe battle is chaos. You slash and parry and hear yourself screaming. The rats bite and burn you, and you pick a bomb off your leg and throw it back at the colonials only to see it blow up one of your own clockwork soldiers. People fall, and yell, and hit you, and there are broken blades and rats and people all mixed up on the ground, leaking oil and blood.\n\t\n\t\"$!{first_name}!\" \n\t*page_break\n\tYou focus suddenly, and blink the sweat from your eyes. Standing before you, half in and half out of the river, matching a blunted and bloody blade with yours, \n\t*if matildalove\n\t\tis $!{matildaname}.\n\t\t*set matildabond %-10\n\t\t*goto fightwithfemale\n\t*if patricklove\n\t\tis $!{patrickname}.\n\t\t*set patrickbond %-10\n\t\t*goto fightwithmale\n\t*elseif ((novellinkarabella) or (novellinkjeremy))\n\t\tis $!{matildaname}.\n\t\t*set matildabond %-10\n\t\t*goto fightwithfemale\n\t*else\n\t\tis $!{patrickname}.\n\t\t*set patrickbond %-10\n\t\t*goto fightwithmale\n\n\n*elseif procolonial\n\tYour fellow rebels start shooting from the fort, and more fight hand to hand on the valley floor. You catch glimpses of $!{matildaname} and $!{patrickname}, but can't reach them. The British recover from the cave's collapse and quickly restore order to their ranks—but even they falter as an enormous mechanical spider crawls out of some inner courtyard of the fort and down the cliff. It is easily as tall as the mansion, and each of its jointed legs ends in a savage blade. The first thing it does is stamp on the British cannons, protecting the rebel's scouting balloon. You can clearly see the distinctive red mark on the glossy mound of its back indicating that it was modeled on one of the deadliest local creatures.\n\t\n\tThe British commander shouts the order to attack, and redcoated troopers salute—but he wasn't talking to them. He was talking to the army of clockwork men. They snap to attention and the air is rent by the sound of hundreds of twinned blades sharpening one another. Even after all this time, you can't suppress a shiver of revulsion. Something's gone awry, though, and they move sluggishly. Many march sideways or in circles instead of forwards. \n\t\n\tIt's the spider. $!{emmelinename} plated it with an enormous amount of real gold, and somehow managed to activate the magic so the gold has its usual hypnotic effect—but magnified many times over due to the spider's enormous size. The clockwork men are especially vulnerable to metallic magic, and they're thrown into confusion. Fantastic!\n\t\n\tBut then one of the human troopers charges at you with an upraised blade and you forget everything in the more immediate concern of your life. You win your first swordfight but there's no time to feel triumphant as more enemies are coming at you. The waves of anger and hate are relentless.\n\t\n\tIt seems impossible for the independents to triumph, but then the British are swarmed by an array of strange mechanisms: rats that are part-organic and part-mechanical but obviously thriving, fist-sized bombs on legs, and that gargantuan redback spider. $!{emmelinename} has been busy.\n\t\n\tThe battle is chaos. You slash and parry and hear yourself screaming. A clockwork soldier slashes at you, and comes so close to taking off your head that you see a lock of your hair drifting away on the wind. Someone else knocks it over with a club and you leave it face-down in the dirt. People fall, and yell, and hit you, and there are broken soldiers and spiders and rats and people all mixed up on the ground, leaking oil and blood.\n\t\n\t\"$!{first_name}!\" \n\t\n\tYou focus suddenly, and blink the sweat from your eyes. Standing before you, half in and half out of the river, matching a blunted and bloody blade with yours, is \n\t*if siaulove\n\t\tSiau.\n\t\t*set siaubond %-10\n\t\t*goto fightwithfemale\n\t*elseif williamlove\n\t\tWilliam.\n\t\t*set williambond %-10\n\t\t*goto fightwithmale\n\t*elseif siblingmarriage\n\t\t*if (novellinkarabella) or (novellinkjeremy)\n\t\t\tWilliam.\n\t\t\t*set williambond %-10\n\t\t\t*goto fightwithmale\n\t\t*else\n\t\t\tSiau.\n\t\t\t*set siaubond %-10\n\t\t\t*goto fightwithfemale\n\t*elseif siaubond>williambond\n\t\tSiau.\n\t\t*set siaubond %-10\n\t\t*goto fightwithfemale\n\t*else\n\t\tWilliam.\n\t\t*set williambond %-10\n\t\t*goto fightwithmale\n\n*else\n\tYour face is dripping, and you realize it's not sweat—it's blood. No-one cares any more if the unconscious body beside them is British or colonial. So many injured and dying people surround you that the stench is unbearable, and the air in the cabin is so close you didn't even notice a huge amount of blood somehow getting into your face and hair. You rub at it inneffectually with a bloody hand, and someone passes you a relatively-clean cloth.\n\t\n\tAfter you roughly wash your face and arms you thank the person who handed you the cloth and see William looking at you. He's upright and largely unharmed—even smiling.\n\t\n\t\"How can I help?\" you ask, unable to see what's wrong with him.\n\t\n\t\"More than you know,\" he says. \"Since you're not making yourself useful on the battlefield I'm afraid I'm going to take you hostage.\"\n\t\n\t\"What! Why?\"\n\t\n\t\"To stop your sister. She's in a cursed hot air balloon, sending signals. I need her out of the sky, and for that I need you. Willingly or otherwise.\"\n\t*set williambond %-20\n\t*choice\n\t\t#I agree with his cause, but not his methods. If he lets me, I'll fight for Britain.\n\t\t\t*set probritish true\n\t\t\t\"Let me fight for you.\"\n\t\t\t\n\t\t\t\"Very well. There's plenty of fighting outside. Now if you'll excuse me, I see another $!{last_name}.\"\n\t\t\t\n\t\t\t\"You are certainly not taking $!{siblingname} hostage!\"\n\t\t\t\n\t\t\t\"How do you plan to stop me?\"\n\t\t\t\n\t\t\tYour blade is still strapped to your side so you draw it to fight, nodding to William to follow you outside.\n\t\t\t*set probritish true\n\t\t\t*goto fightwithmaleinhospital\n\t\t#So much for British honor. Finally I understand. I'm going to fight for the rebels.\n\t\t\t*set contentment %-10\n\t\t\t*set courage +5\n\t\t\tYou find your blade still strapped to your side, and draw it to fight, nodding to William to follow you outside.\n\t\t\t*set procolonial true\n\t\t\t*goto fightwithmaleinhospital\n\t\t#Lie to him that you'll fight for Britain if he just lets you go.\n\t\t\t\"Very well. Now if you'll excuse me, I see another $!{last_name}.\"\n\t\t\t\n\t\t\t\"You are certainly not taking $!{siblingname} hostage!\"\n\t\t\t\n\t\t\t\"How do you plan to stop me?\"\n\t\t\t\n\t\t\tYour blade is still strapped to your side so you draw it to fight, nodding to William to follow you outside.\n\t\t\t*goto fightwithmaleinhospital\n\n*label fightwithfemale\nYou try to…  \n*choice\n\t#Kill her.\n\t\t*if (contentment\u003c80) and ((brass) or (brass1))\n\t\t\tYou can see that her right arm is badly hurt. Her fingers are crooked on the hilt, and it looks like one is broken. If that's true, she'll have no real force in her blows. \n\t\t\t\n\t\t\tWhen she lunges at you, you don't bother blocking her strike but instead lift your own blade and steady your stance. She hurls herself right onto your weapon as her own blow slides harmlessly off the iron panel on that side of your chest. \n\t\t\t\n\t\t\tYour knife slices through the side of her neck, spraying you with her lifeblood. She collapses at once, landing face-down in the water.\n\t\t\t\n\t\t\tYou automatically kneel to pick her up before stopping yourself. She is still struggling, but her blood is turning the brown water red. Saving her from drowning will only prolong her death—so you let her die.\n\n\t\t\t*set courage +5\n\t\t\t*if (matildalove) and (probritish)\n\t\t\t\t*set matildalove false\n\t\t\t\tSo much for true love.\n\t\t\t\t*set matildabond 0\n\t\t\t\t*goto end\n\t\t\t*if (siaulove) and (procolonial)\n\t\t\t\t*set siaulove false\n\t\t\t\t*set siaubond 0\n\t\t\t\tSo much for true love.\n\t\t\t\t*goto end\n\t\t\t*else\n\t\t\t\t*goto end\n\t\t*elseif contentment\u003c70\n\t\t\tYou can see that her right arm is badly hurt. Her fingers are crooked on the hilt, and it looks like one is broken. If that's true, she'll have no real force in her blows. \n\t\t\t\n\t\t\tWhen she lunges at you, you don't bother blocking her strike but instead lift your own blade and steady your stance. She hurls herself right onto your weapon as her own blow slides harmlessly off the iron panel on that side of your chest. \n\t\t\t\n\t\t\tAt the last moment, you falter and only cut her neck instead of giving her a mortal wound. She rears back, hitting your hand and cutting you badly. \n\t\t\t\n\t\t\tThe pair of you freeze, realizing you're well-matched. She gives you a tiny smile and deliberately steps out of your way, choosing someone else to fight. You let her go, and hope you get the chance to thank her someday for not forcing you to choose between your own life and hers.\n\t\t\t*set courage +5\n\t\t\t*set wounded true\n\t\t\t*goto end\n\t\t*else\n\t\t\tYou can see that her right arm is badly hurt. Her fingers are crooked on the hilt, and it looks like one is broken. If that's true, she'll have no real force in her blows. \n\t\t\t\n\t\t\tWhen she lunges at you, you don't bother blocking her strike but instead lift your own blade and steady your stance. She hurls herself right onto your weapon as her own blow slides harmlessly off the iron panel on that side of your chest. \n\t\t\t\n\t\t\tAt the last moment, you falter and completely miss her. She rears back, hitting your hand and cutting you badly. \n\t\t\t\n\t\t\tShe gives you a tiny smile and deliberately steps out of your way, choosing someone else to fight. You let her go, and hope you get the chance to thank her someday for not forcing you to choose between your own life and hers.\n\t\t\t*set wounded true\n\t\t\t*goto end\n\t#Knock her out.\n\t\t*if (mechanical>80) and ((aluminum) or (aluminium1))\n\t\t\tInstead of striking her with your blade, you step into her range and hit her with the hilt. Her own blow is mercifully weak and your aim is perfect. She slumps in your arms, and you lay her gently on the ground with her head out of the water. Hopefully no-one will harm her further, but you've done all you can.\n\t\t\t*set courage +5\n\t\t\t*goto end\n\t\t*elseif science\u003c70\n\t\t\tWhen she lunges at you, you don't bother blocking her blow but instead step forwards, hitting her with the hilt—but not hard enough. She rears back, slashing your hand. \n\t\t\t\n\t\t\tThe pair of you freeze, realizing you're well-matched. She gives you a tiny smile and deliberately steps out of your way, choosing someone else to fight. You let her go, and hope you get the chance to thank her someday for not forcing you to choose between your own life and hers.\n\t\t\t*set courage +5\n\t\t\t*set wounded true\n\t\t\t*goto end\n\t\t*else\n\t\t\tWhen she lunges at you, you don't bother blocking her blow but instead step forwards, meaning to hit her with the hilt—but she sees what you're doing and rears back, slashing your hand. \n\t\t\t\n\t\t\tShe gives you a tiny smile and deliberately steps out of your way, choosing someone else to fight. You let her go, and hope you get the chance to thank her someday for not forcing you to choose between your own life and hers.\n\t\t\t*set wounded true\n\t\t\t*goto end\n\n\t#Avoid her.\n\t\t*if (kindness\u003c80) and ((gold) or (gold1))\n\t\t\tYou raise your hands and stay still, hoping desperately that she'll respect your decision. She gives you a tiny smile and deliberately steps out of your way, choosing someone else to fight. You let her go, and hope you get the chance to thank her someday for not forcing you to choose between your own life and hers.\n\t\t\t*goto end\n\t\t*elseif kindness\u003c70\n\t\t\tYou raise your hands and stay still, hoping desperately that she'll respect your decision. She lunges and you're forced to respond. She slices open your hand, and you cut her deeply on the forearm. \n\t\t\t\n\t\t\tClutching her arm, she gives you a tiny smile and deliberately steps out of your way, choosing someone else to fight. You let her go, and hope you get the chance to thank her someday for sparing your life.\n\t\t\t*set wounded true\n\t\t\t*goto end\n\t\t*else\n\t\t\tYou raise your hands and stay still, hoping desperately that she'll respect your decision. She lunges and knocks your knife from your hand, leaving you helpless. You stand utterly still.\n\t\t\t\n\t\t\tShe gives you a tiny smile and deliberately steps out of your way, choosing someone else to fight. You let her go, and hope you get the chance to thank her someday for not forcing you to choose between your own life and hers.\n\t\t\t*set wounded true\n\t\t\t*goto end\n\n*label fightwithmale\nYou try to…  \n*choice\n\t#Kill him.\n\t\t*if (contentment\u003c80) and ((brass) or (brass1))\n\t\t\tYou can see that his right arm is badly hurt. His fingers are crooked on the hilt, and it looks like one is broken. If that's true, he'll have no real force in his blows. \n\t\t\t\n\t\t\tWhen he lunges at you, you don't bother blocking his strike but instead lift your own blade and steady your stance. He hurls himself right onto your weapon as his own blow slides harmlessly off the iron panel on that side of your chest. \n\t\t\t\n\t\t\tYour knife slices through the side of his neck, spraying you with his lifeblood. He collapses at once, landing face-down in the water.\n\t\t\t\n\t\t\tYou automatically kneel to pick him up before stopping yourself. He is still struggling, but his blood is turning the brown water red. Saving him from drowning will only prolong his death—so you let him die.\n\n\t\t\t*set courage +5\n\t\t\t*if (patricklove) and (probritish)\n\t\t\t\t*set patricklove false\n\t\t\t\tSo much for true love.\n\t\t\t\t*set patrickbond 0\n\t\t\t\t*goto end\n\t\t\t*elseif (williamlove) and (procolonial)\n\t\t\t\t*set williamlove false\n\t\t\t\tSo much for true love.\n\t\t\t\t*set williambond 0\n\t\t\t\t*goto end\n\t\t\t*else\n\t\t\t\t*goto end\n\t\t*elseif contentment\u003c70\n\t\t\tYou can see that his right arm is badly hurt. His fingers are crooked on the hilt, and it looks like one is broken. If that's true, he'll have no real force in his blows. \n\t\t\t\n\t\t\tWhen he lunges at you, you don't bother blocking his strike but instead lift your own blade and steady your stance. He hurls himself right onto your weapon as his own blow slides harmlessly off the iron panel on that side of your chest. \n\t\t\t\n\t\t\tAt the last moment, you falter and only cut his neck instead of giving him a mortal wound. He rears back, hitting your hand and cutting you badly. nce to thank him someday for sparing your life.\n\t\t\t*set wounded true\n\t\t\t*goto end\n\n\n*label fightwithmaleinhospital\nYou try to…  \n*choice\n\t#Kill him.\n\t\t*if (contentment\u003c80) and ((brass) or (brass1))\n\t\t\tHe doesn't truly want to hurt you, so his blows will lack conviction.\n\t\t\t\n\t\t\tWhen he lunges at you, you don't bother blocking his strike but instead lift your own blade and steady your stance. He hurls himself right onto your weapon as his own blow slides harmlessly off the iron panel on that side of your chest. \n\t\t\t\n\t\t\tYour knife slices through the side of his neck, spraying you with his lifeblood. He collapses at once, landing face-down on the wet and bloody ground.\n\t\t\t\n\t\t\tYou automatically kneel to pick him up before stopping yourself. He is still struggling, but helping him will only prolong his death—so you let him die.\n\t\t\t\n\t\t\tSo much for honor.\n\t\t\t*set williambond 0\n\t\t\t*if williamlove\n\t\t\t\t*set williamlove false\n\t\t\t\t*goto end\n\t\t\t*else\n\t\t\t\t*goto end\n\t\t*elsif contentment \u003c70\n\t\t\tHe doesn't truly want to hurt you, so his blows will lack conviction.\n\t\t\t\n\t\t\tWhen he lunges at you, you don't bother blocking his blow but instead lift your own blade and steady your stance. He hurls himself right onto your weapon as his own blow slides harmlessly off the iron panel on that side of your chest. \n\t\t\t\n\t\t\tAt the last moment, you falter and only cut his neck instead of giving him a mortal wound. He rears back, hitting your hand and cutting you badly. \n\t\t\t\n\t\t\tThe pair of you freeze, realizing you're well-matched. He gives you a tiny bow and deliberately steps out of your way, choosing to return to the battle. \n\t\t\t*set wounded true\n\t\t\t*goto end\n\t\t*else\n\t\t\tHe doesn't truly want to hurt you, so his blows will lack conviction.\n\t\t\t\n\t\t\tWhen he lunges at you, you don't bother blocking his strike but instead lift your own blade and steady your stance. He hurls herself right onto your weapon as his own blow slides harmlessly off the iron panel on that side of your chest. \n\t\t\t\n\t\t\tAt the last moment, you falter and completely miss him. He rears back, hitting your hand and cutting you badly. \n\t\t\t\n\t\t\tHe gives you a tiny bow and deliberately steps out of your way, choosing to return to the battle rather than injuring you further. You let him go.\n\t\t\t*goto end\n\t#Knock him out.\n\t\t*if (mechanical>80) and ((aluminum) or (aluminium1))\n\t\t\tHe doesn't truly want to hurt you, so his blows will lack conviction.\n\t\t\n\t\t\tInstead of striking him with your blade, you step into his range and hit him with the hilt. His own blow is mercifully weak and your aim is perfect. He slumps in your arms, and you lay him gently on the ground, taking his sword. \n\t\t\t\n\t\t\tSo much for honor.\n\t\t\t*set courage +5\n\t\t\t*finish Next\n\t\t*elseif science\u003c70\n\t\t\tHe doesn't truly want to hurt you, so his blows will lack conviction.\n\t\t\t\n\t\t\tWhen he lunges at you, you don't bother blocking his strike but instead step forwards, hitting him with the hilt—but not hard enough. He rears back, slashing your hand. \n\t\t\t\n\t\t\tThe pair of you freeze, realizing you're well-matched. He gives you a tiny bow and deliberately steps out of your way, choosing to return to the battle. \n\t\t\t*set wounded true\n\t\t\t*finish Next\n\t\t*else\n\t\t\tHe doesn't truly want to hurt you, so he'll have no real force in his blows. \n\t\t\t\n\t\t\tWhen he lunges at you, you don't bother blocking his strike but instead step forwards, meaning to hit him with the hilt—but he sees what you're doing and rears back, slashing your hand. \n\t\t\t\n\t\t\tHe gives you a tiny bow and chooses to return to the battle rather than injuring you further.\n\t\t\t*set wounded true\n\t\t\t*finish Next\n\n\t#Avoid him.\n\t\t*if (kindness\u003c80) and ((gold) or (gold1))\n\t\t\tYou go to $!{siblingname}'s small patch of space among the moderately wounded and block William's path with your own blade, hoping desperately that he'll respect your decision. He gives you a tiny bow and returns to the battle.\n\t\t\t*goto end\n\t\t*elseif kindness\u003c70\n\t\t\tYou go to $!{siblingname}'s small patch of space among the moderately wounded and block William's path with your own blade, hoping desperately that he'll respect your decision. He lunges and you're forced to respond. He slices open your hand, and you cut him deeply on the forearm. \n\t\t\t\n\t\t\tClutching his arm, he gives you a tiny bow and returns to the battle.\n\t\t\t*set wounded true\n\t\t\t*goto end\n\t\t*else\n\t\t\tYou go to $!{siblingname}'s small patch of space among the moderately wounded and block William's path with your own blade, hoping desperately that he'll respect your decision. He lunges and slices open your hand. You don't move.\n\t\t\t\t\t\t\n\t\t\tHe gives you a tiny bow and returns to the battle rather than injuring you further. \n\t\t\t*set wounded true\n*label end\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a11\n\t*else\n*label a11\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a33\n*else\n*label a33\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a44\n*else\n*label a44\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a55\n*else\n*label a55\n*finish\n", "9c": "*if probritish\n\tYour blade is lost, and you're not even sure how it happened.\n\t\n\tThere's a strange lull beside the river, like the eye of a storm. You look around for the first time in what feels like hours. Several clockwork soldiers have been dragged into the water and left to rust. The golden spider has been stopped and it stands dormant, surrounded by a pile of corpses. In front of you, one of your fellow soldiers howls with grief over another. The dead lover is still clutching her bayonet. Beyond them, the battle rages on.\n\t\n\tThose colonial savages are holding their ground! If you don't do something, the British may lose. You… \n\t*choice\n\t\t#Reprogram a soldier to attack the hot air balloon they're using the scout the entire battle.\n\t\t\t*if ((brass) or (tin)) or ((brass1) or (silver))\n\t\t\t\t*if (mechanical >70)\n\t\t\t\t\t*if wounded\n\t\t\t\t\t\t*if (aluminum) or (Aluminium1)\n\t\t\t\t\t\t\tFather is somewhere in this battle, and controlling the soldiers. Somehow, even though you're not in uniform, none of them have attacked you. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe closest automaton is fighting a barefooted rebel with blood dripping from his beard. You shove the human aside and address the soldier. \"Do you recognize me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Bing,\" it says, and salutes.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Can you throw?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Bing.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Take down that hot air balloon. Use your own weapons and those of other soldiers until the balloon falls. Disregard all previous orders until the balloon is down. Go!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tIt clanks and whirrs and an arrowhead pops out of the palm of its hand. Without speaking again, it aims for the balloon and shoots the arrow so fast you don't see its path—but you see the black balloon quiver as it hits. He shoots again, and again, and you enlist more soldiers until their arrows finally rip the balloon so badly that it lists to one side and plummets to the ground like a wounded crow.\n\t\t\t\t\t\t\t*set emdeath true\n\t\t\t\t\t\t\t*set britishwin true\n\t\t\t\t\t\t\t*goto britishwin\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tFather is somewhere in this battle, and controlling the soldiers. Somehow, even though you're not in uniform, none of them have attacked you. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe closest automaton is fighting a barefooted rebel with blood dripping from his beard. You shove the human aside and address the soldier. \"Do you recognize me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Bing,\" it says, and salutes.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Can you throw?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Bing.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Take down that hot air balloon. Use your own weapons and those of other soldiers until the balloon falls. Disregard all previous orders until the balloon is down. Go!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tIt clanks and whirrs and an arrowhead pops out of the palm of its hand. Without speaking again, it aims for the balloon and shoots the arrow so fast you don't see its path—but you see the black balloon quiver as it hits. He shoots again, and again, and you realize you need to enlist more soldiers. You move to do so, but find the world listing to one side. Your vision turns black, and your legs fold under you. When you open your mouth to speak, nothing comes out. You're too wounded. The balloon continues to fly as you watch helplessly.\n\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t*else\n\t\t\t\t\t\tFather is somewhere in this battle, and controlling the soldiers. Somehow, even though you're not in uniform, none of them have attacked you. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\tThe closest automaton is fighting a barefooted rebel with blood dripping from his beard. You shove the human aside and address the soldier. \"Do you recognize me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Bing,\" it says, and salutes.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Can you throw?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Bing.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Take down that hot air balloon. Use your own weapons and those of other soldiers until the balloon falls. Disregard all previous orders until the balloon is down. Go!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tIt clanks and whirrs and an arrowhead pops out of the palm of its hand. Without speaking again, it aims for the balloon and shoots the arrow so fast you don't see its path—but you see the black balloon quiver as it hits. He shoots again, and again, and you enlist more soldie othing comes out. You're too wounded. The balloon continues to fly as you see a clockwork soldier running to shoot more arrows. It doesn't see your muddied and bloodied face under its foot. The last thing you see is the sky blotted out as the automaton crushes you, and runs on.\t\t\n\t\t\t\t\t*if (gold) or (gold1)\n\t\t\t\t\t\t*set martyr true\n\t\t\t\t\t\t*set britishwin true\n\t\t\t\t\t\t*goto_scene deathending\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t*goto_scene deathending\n\t\t\t\t*else\n\t\t\t\t\tFather is somewhere in this battle, and controlling the soldiers. Somehow, even though you're not in uniform, none of them have attacked you. \n\t\t\t\t\t\t\t\n\t\t\t\t\tThe closest automaton is fighting a barefooted rebel with blood dripping from his beard. You shove the human aside and address the soldier. \"Do you recognize me?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Bing,\" it says, and salutes.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Can you throw?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Bing.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Take down that hot air balloon. Use your own weapons and those of other soldiers until the balloon falls. Disregard all previous orders until the balloon is down. Go!\"\n\t\t\t\t\t\n\t\t\t\t\tIt clanks and whirrs and an arrowhead protrudes from the palm of its hand. Without speaking again, it aims for the balloon and shoots the arrow so fast you don't see its path—but you see the black balloon quiver as it hits. He shoots again, and again, and you realize you need to enlist more soldiers. You move to do so, but find the world listing to one side. Your vision turns black, and your legs fold under you. When you open your mouth to speak, nothing comes out. You're too wounded. The balloon continues to fly as you watch helplessly.\t\t\n\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t*goto colonialwin\n\t\t\t\t\n\t\t#Convince the soldier to let you have their dead lover’s weapon then lead a charge with true British pluck! \n\t\t\t*if ((gold) or (gold1)) or ((iron) or (silver))\n\t\t\t\t*if courage >70\n\t\t\t\t\t*if wounded\n\t\t\t\t\t\t*if (aluminum) or (Aluminium1)\n\t\t\t\t\t\t\tYou circle around the soldiers so the living man can see you coming. He notices you after a moment and lifts a tear-stained face. \"Are we losing?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Not if I can take that bayonet.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I don't care,\" he says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou take it as permission and kneel to uncurl the cold fingers of his dead lover from the bayonet that failed to save her. It's not easy, but you gain the weapon, and find at least twoscore more soldiers by the river—almost all of them still able to stand.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Queen's men!\" you shout. \"Will you fall here like rats in a trap? Or will you fight with me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWithout waiting for a response, you turn and run as fast as you can to the thickest concentration of rebels.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tBeyind you there is a roar of agreement, and as you race to the fight you're overtaken by your red-clad companions.\n\t\t\t\t\t\t\t*set britishwin true\n\t\t\t\t\t\t\t*goto britishwin\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou circle around the soldiers so the living man can see you coming. He notices you after a moment and lifts a tear-stained face. \"Are we losing?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Not if I can take that bayonet.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I don't care,\" he says. \"What does it matter now?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tExhausted from your own wounds, you leave him to mourn in peace. You search for a new weapon elsewhere. \t\t\t\t\t\n\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou circle around the soldiers so the living man can see you coming. He notices you after a moment and lifts a tear-stained face. \"Are we losing?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Not if I can take that bayonet.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"I don't care,\" he says.\n\t\t t bayonet.\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"I don't care,\" he says. \"What does it matter now?\"\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou kneel to take the weapon, and he suddenly moves, stabbing you through the heart. The last thing you see is his face, stained with tears and blood.\n\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t*set martyr true\n\t\t\t\t\t\t*goto_scene deathending\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou circle around the soldier so the living man can see you coming. He notices you after a moment and lifts a tear-stained face. \"Are we losing?\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tIt's not a British accent, and you feel your lip curl in distaste. \"Not if I can take that bayonet.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"I don't care,\" he says. \"What does it matter now?\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou kneel to take the weapon, and he suddenly moves, stabbing you through the heart. The last thing you see is his face, stained with tears and blood.\n\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t*goto_scene deathending\n\t\t\t\t*else\n\t\t\t\t\tYou circle around the soldiers so the living man can see you coming. He notices you after a moment and lifts a tear-stained face. \"Are we losing?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\"Not if I can take that bayonet.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\"I don't care,\" he says. \"What does it matter now?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\tYou leave him to mourn in peace, and search for a new weapon elsewhere. \t\n\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t*goto colonialwin\n\t\t#Climb up the corpse-covered spider robot to get a better view of the battle. \n\t\t\t*if ((aluminum) or (aluminium1)) or ((iron) or (tin))\n\t\t\t\t*if courage >70\n\t\t\t\t\t*if wounded\n\t\t\t\t\t\t*if (aluminum) and (Aluminium1)\n\t\t\t\t\t\t\tYou grit your teeth and move away from the nice safe river to the horror-show spider creature, trying your best not to notice that you're not walking on ground—you're half-walking, half-climbing over the dead. When you slip, it's blood underfoot.  The horrors beneath your feet are so much worse than the creepy spider that it's a relief to swing onto the leg and climb it. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWhen you reach the top of the spider's leg you suddenly realize exactly why the colonials are winning: they're popping out of the ground. Those blasted tunnels are everywhere, concealed by the few stunted trees and clever use of the confusion of battle. You count three, and take careful note of where they are. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tOn the way to the first, you force yourself to look at the bodies under your feet and find a servicable weapon. You gather stragglers with you and attack the guards on the first tunnel, leaving a small number to attack any new rebels while you take care of the other two tunnels. \n\t\t\t\t\t\t\t*set britishwin true\n\t\t\t\t\t\t\t*goto britishwin\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou grit your teeth and move away from the nice safe river to the horror-show spider creature, trying your best not to notice that you're not walking on ground—you're half-walking, half-climbing over the dead. When you slip, it's blood underfoot.  The horrors beneath your feet are so much worse than the creepy spider that it's a relief to swing onto the leg and climb it. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWhen you reach the top of the spider's leg you suddenly realize exactly why the colonials are winning: they're popping out of the ground. Those blasted tunnels are everywhere, concealed by the few stunted trees and clever use of the confusion of battle. You count three, and take careful note of where they are. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tOn the way to the first, you force yourself to look at the bodies under your feet and find a servicable weapon, but you're engaged in a fight too soon to make a difference with your crucial information. Your wounds made you look like an easy target.\n\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou grit your teeth and move away from the nice safe river to the horror-show spider creature, trying your best not to notice that you're not walking on ground—you're half-walking, half-climbing over the dead. When you slip, it's blood underfoot.  The horrors beneath your feet are so much worse than the creepy spider that it's a relief to swing onto the leg and climb it. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\tWhen you reach the top of the spider's leg you suddenly realize exactly why the colonials are winning: they're popping out of the ground. Those blasted tunnels are everywhere, concealed by the few stunted trees and clever use of the confusion of battle. You count three, and take careful note of where they are. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\tOn the way to the first, you force yourself to look at the bodies under your feet and find a servicable weapon. You gather stragglers with you and attack the guards on the first tunnel, leaving a small number to attack any new rebels while you take care of the other two tunnels. \n\t\t\t\t\t\t*set britishwin true\n\t\t\t\t\t\t*goto britishwin\n\t\t\t\t*else\n\t\t\t\t\tYou grit your teeth and move away from the nice safe river to the horror-show spider creature, trying your best not to notice that you're not walking on ground—you're half-walking, half-climbing over the dead. When you slip, it's blood underfoot.  The horrors beneath your feet are so much worse than the creepy spider that it's a relief to swing onto the leg and climb it. \n\t\t\t\t\t\t\t\n\t\t\t\t\tWhen you reach the top of the spider's leg you suddenly realize exactly why the colonials are winning: they're popping out of the ground. Those blasted tunnels are everywhere, concealed by the few stunted trees and clever use of the confusion of battle. You count three, and take careful note of where they are. \n\t\t\t\t\t\t\t\n\t\t\t\t\tOn the way to the first, you force yourself to look at the bodies under your feet and find a servicable weapon, but you're engaged in a fight too soon to make a difference with your crucial information.\n\t\t\t\t\t*goto end\n\t\t\t*elseif courage >70\n\t\t\t\tYou grit your teeth and move away from the nice safe river to the horror-show spider creature, trying your best not to notice that you're not walking on ground—you're half-walking, half-climbing over the dead. When you slip, it's blood underfoot.  The horrors beneath your feet are so much worse than the creepy spider that it's a relief to swing onto the leg and climb it. \n\t\t\t\t\t\t\t\n\t\t\t\tWhen you reach the top of the spider's leg you suddenly realize exactly why the colonials are winning: they're popping out of the ground. Those blasted tunnels are everywhere, concealed by the few stunted trees and clever use of the confusion of battle. You count three, and take careful note of where they are. \n\t\t\t\t\t\t\t\n\t\t\t\tOn the way to the first, you force yourself to look at the bodies under your feet and find a servicable weapon, but you're engaged in a fight too soon to make a difference with your crucial information.\n\t\t\t\t*goto end\n\t\t\t*else\n\t\t\t\tYou grit your teeth and move away from the nice safe river to the horror-show spider creature, trying your best not to notice that you're not walking on ground—you're half-walking, half-climbing over the dead. When you slip, it's blood underfoot.  The horrors beneath your feet are so much worse than the creepy spider that it's a relief to swing onto the leg and climb it. \n\t\t\t\t\t\t\t\n\t\t\t\tWhen you reach the top of the spider's leg you suddenly realize exactly why the colonials are winning: they're popping out of the ground. Those blasted tunnels are everywhere, concealed by the few stunted trees and clever use of the confusion of battle. You count three, and take careful note of where they are. \n\t\t\t\t\t\t\t\n\t\t\t\tOn the way to the first, you force yourself to look at the bodies under your feet and find a servicable weapon, but you're engaged in a fight too soon to make a difference with your crucial information.\n\t\t\t\t*set colonialwin true\n\t\t\t\t*if weak_stomach\n\t\t\t\t\tYou lose your footing and fall amongst the dead, face to face with the glassy eyes of a girl no older than fourteen. Before you can raise your weapon your stomach clenches and you throw up. You're still throwing up when your opponent stabs you. \n\t\t\t\t\t*if (gold) or (gold1)\n\t\t\t\t\t\t*set martyr true\n\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t*goto_scene deathending\n\t\t\t\t\t*else\n\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t*goto_scene deathending\n\t\t\t\t*else\n\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t*goto colonialwin\n\n\t\n*if procolonial\n\tYour blade is lost, and you're not even sure how it happened.\n\t\n\tThere's a strange lull beside the river, like the eye of a storm. You look around for the first time in what feels like hours. Several clockwork soldiers have been dragged into the water and left to rust. The rebels' golden spider has been stopped and it stands dormant, surrounded by a pile of corpses. In front of you, one of your fellow rebels howls with grief over another. The dead man is still clutching his pistol. Beyond them, the battle rages on.\n\t\n\tThose freedom-hating British are holding their ground! If you don't do something, the colonials may lose. You… \n\t*choice\n\t\t#Reprogram the clockwork soldiers so they all walk into the river.\n\t\t\t*if ((brass) or (tin)) or ((brass1) or (silver))\n\t\t\t\t*if (mechanical >70)\n\t\t\t\t\t*if wounded\n\t\t\t\t\t\t*if (aluminum) or (Aluminium1)\n\t\t\t\t\t\t\tFather is somewhere in this battle, and he designed the soldiers. You realize none of them have attacked you. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe closest automaton is fighting beside a stubbled soldier with black mud marring the red of his uniform. You shove the human aside and address the clockwork man. \"Do you recognize me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Bing,\" it says, and salutes.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Are you designed to obey my orders?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Bing.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Go and stand in the river until I tell you to get out.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tIt immediately does so, ignoring those in its path who attempt to fight it. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou turn to the next clockwork soldier, and the next.\n\t\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t\t*goto colonialwin\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tFather is somewhere in this battle, and he designed the soldiers. You realize none of them have attacked you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThe closest is fighting beside a stubbled soldier with black mud marring the red of his uniform. You shove the human aside and address the clockwork man. \"Do you recognize me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Bing,\" it says, and salutes.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Are you designed to obey my orders?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Bing.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Go and stand in the river until I tell you to get out.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tIt immediately does so, ignoring those in its path who attempt to fight it. But your wounds slow you down, and the human soldier turns on you, knocking you down even as you search for another clockwork man to remove from the battle. \n\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t*else\n\t\t\t\t\t\tFather is somewhere in this battle, and he designed the soldiers. You realize none of them have attacked you.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tThe closest automaton is fighting beside a stubbled soldier with black mud marring the red of his uniform. You shove the human aside and address the clockwork man. \"Do you recognize me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Bing,\" it says, and salutes.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Are you designed to obey my orders?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Bing.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Go and stand in the river until I tell you to get out.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tIt immediately does so, ignorin ead a charge with true colonial fire! \n\t\t\t*if ((gold) or (gold1)) or ((iron) or (silver))\n\t\t\t\t*if courage >70\n\t\t\t\t\t*if wounded\n\t\t\t\t\t\t*if (aluminum) or (Aluminium1)\n\t\t\t\t\t\t\tYou circle around the grieving rebel so he can see you coming. Kneeling, you gently take his dead friend's weapon. He turns a tear-stained face towards you, but says nothing. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Rebels!\" you shout. \"Will you fall here like rats in a trap? Or will you fight with me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWithout waiting for a response, you turn and run as fast as you can to the thickest concentration of soldiers.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tBeyind you there is a roar of agreement, and as you race to the fight you're overtaken by your companions.\n\t\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t\t*goto colonialwin\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou circle around the grieving rebel so he can see you coming. Kneeling, you take his dead friend's weapon, hampered by your wounds. He turns a tear-stained face towards you, and lifts a pistol. You drop the weapon and back away to search elsewhere. \t\n\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou circle around the grieving rebel so he can see you coming. Kneeling, you gently take his dead friend's weapon. He turns a tear-stained face towards you, but says nothing. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Rebels!\" you shout. \"Will you fall here like rats in a trap? Or will you fight with me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tWithout waiting for a response, you turn and run as fast as you can to the thickest concentration of soldiers.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tBeyind you there is a roar of agreement, and as you race to the fight you're overtaken by your companions.\n\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t*goto colonialwin\n\t\t\t\t*else\n\t\t\t\t\tYou circle around the grieving rebel so he can see you coming. Kneeling, you gently take his dead friend's weapon. He turns a tear-stained e slaughtered one by one as they arrive. You take careful note of where they are. \n\t\t\t\t\t\t\t\n\t\t\t\t\tOn the way to the first, you force yourself to look at the bodies under your feet and find a servicable weapon, but you're engaged in a fight too soon to make a difference with your crucial information.\n\t\t\t\t\t*goto end\n\t\t\t*elseif courage >70\n\t\t\t\tYou grit your teeth and move away from the nice safe river to $!{emmelinename}'s spider creature, trying your best not to notice that you're not walking on ground—you're half-walking, half-climbing over the dead. When you slip, it's blood underfoot.  The horrors beneath your feet are so much worse than the creepy spider that it's a relief to swing onto the leg and climb it. \n\t\t\t\t\t\t\t\n\t\t\t\tWhen you reach the top of the spider's leg you suddenly realize exactly why the colonials were doing so well: they're popping out of the ground. There are tunnels everywhere, concealed by the few stunted trees and clever use of the confusion of battle. But although the colonials clearly dug the tunnels, two of the three have been taken over by the British, and the fresh rebels are slaughtered one by one as they arrive. You take careful note of where they are. \n\t\t\t\t\t\t\t\n\t\t\t\tOn the way to the first, you force yourself to look at the bodies under your feet and find a servicable weapon, but you're engaged in a fight too soon to make a difference with your crucial information.\n\t\t\t\t*goto end\n\t\t\t*else\n\t\t\t\tYou grit your teeth and move away from the nice safe river to $!{emmelinename}'s spider creature, trying your best not to notice that you're not walking on ground—you're half-walking, half-climbing over the dead. When you slip, it's blood underfoot.  The horrors beneath your feet are so much worse than the creepy spider that it's a relief to swing onto the leg and climb it. \n\t\t\t\t\t\t\t\n\t\t\t\tWhen you reach the top of the spider's leg you suddenly realize exactly why the colonials
