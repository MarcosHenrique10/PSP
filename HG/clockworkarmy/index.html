ce %+10\n\t\t*set contentment %+10\n\t\t*set happiness +10\n\t\t*set singlebychoice true\n\t\t*finish\n\t#$!{matildaname} is breathtaking. Nothing ever gets her down, and her wit is sharp as a blade.\n\t\t*set contentment %-10\n\t\t*if (novellinkarabella) or (novellinkjeremy)\n\t\t\tShe sees you looking at her, and says, \"$!{emmelinename} is the love of my life. I'll be sure to tell her how much the pair of you still have in common.\"\n\t\t\t*set matildabond %-10\n\t\t\t*set emmelinebond %-10\n\t\t\t\n\t\t\t*goto tryagain\n\t\t*else\n\t\t\t*set matildabond %+10\n\t\t\t*if xenophobia\n\t\t\t\t*set xenophobia false\n\t\t\t\t*achieve overcomeflaw\n\t\t\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t\t\t*goto charm\n\t\t\t*else\n\t\t\t\t*label charm\n\t\t\t\tHow do you attempt to charm her?\n\t\t\t\t*choice\t\t\t\t\n\t\t\t\t\t#Take her hand in yours.\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you sit beside her and gently take her hand. She looks at your hand before she looks at your face—and smiles.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub mfaith\n\t\t\t\t\t\t*set matildalove true\n\t\t\t\t\t\t*gosub matildakiss\n\t\t\t\t\t\t*goto lead\n\t\t\t\t\t#Give her a gift.\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you sit beside her and offer her the penny you shaped into the likeness of your ship during the long hours on board. \n\t\t\t\t\t\t*if (gold1) or (gold)\n\t\t\t\t\t\t\tShe takes it from your hand and traces the curved line of the bow with obvious delight. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*gosub mfaith\n\t\t\t\t\t\t\t*set matildalove true\n\t\t\t\t\t\t\t*gosub matildakiss\n\t\t\t\t\t\t\t*goto lead\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tShe gently closes your fist. \"I cannot accept that, since I'm not inclined to accept the sentiment behind it.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*goto tryagain\n\t\t\t\t\t#Compliment her.\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you approach her and say, \"I've never met a girl as sharp as you—or as beautiful.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe smiles at you, delighted. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub mfaith\n\t\t\t\t\t\t*set matildalove true\n\t\t\t\t\t\t*gosub matildakiss\n\t\t\t\t\t\t*goto lead\n\t\t\t\t\t#Oil and polish her favorite mechanical horse.\n\t\t\t\t\t\tYou get to work, hoping she understands the message your actions are telling her. When the horse gleams like silver rather than tin, you let yourself stand back to admire your work—and she is standing beside you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub mfaith\n\t\t\t\t\t\t*set matildalove true\n\t\t\t\t\t\t*gosub matildakiss\n\t\t\t\t\t\t*goto lead\n\t#Siau's dark eyes are the first to see what others miss, and she is kind-hearted.\n\t\t*set kindness %+10\n\t\t*if xenophobia\n\t\t\t*set xenophobia false\n\t\t\t*achieve overcomeflaw\n\t\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t\t*goto charman\n\t\t*else\n\t\t\t*label charman\n\t\t\t*if ((novellinkarabella) or (novellinkjeremy))\n\t\t\t\tHow do you attempt to charm her?\n\t\t\t\t*choice\t\t\t\t\n\t\t\t\t\t#Take her hand in yours.\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you sit beside her and gently take her hand. She looks at your hand before she looks at your face—and smiles.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub sfaith\n\t\t\t\t\t\t*set siaulove true\n\t\t\t\t\t\t*gosub siaukiss\n\t\t\t\t\t\t*goto lead\n\t\t\t\t\t#Give her a gift.\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you sit beside her and offer her the penny you shaped into the likeness of your ship during the long hours on board. \n\t\t\t\t\t\t\n\t\t\t\t\t\tShe takes it from your hand and traces the curved line of the bow with obvious delight. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub sfaith\n\t\t\t\t\t\t*set siaulove true\n\t\t\t\t\t\t*gosub siaukiss\n\t\t\t\t\t\t*goto lead\n\t\t\t\t\t#Compliment her.\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you approach her and say, \"I've never met a girl as kind as you—or as beautiful.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe smiles at you, delighted. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub sfaith\n\t\t\t\t\t\t*set siaulove true\n\t\t\t\t\t\t*gosub siaukiss\n\t\t\t\t\t\t*goto lead\n\t\t\t\t\t#Oil and polish her favorite mechanical horse.\n\t\t\t\t\t\tYou get to work, hoping she understands the message your actions are telling her. When the horse gleams like silver rather than tin, you let yourself stand back to admire your work—and she is standing beside you.\n\t\t\t\t\t\n\t\t\t\t\t\t*if (gold1) or (gold)\n\t\t\t\t\t\t\t\"Beautifully done,\" she says. \n\t\t\t\t\t\t\t*gosub sfaith\n\t\t\t\t\t\t\t*set siaulove true\n\t\t\t\t\t\t\t*gosub siaukiss\n\t\t\t\t\t\t\t*goto lead\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"Thank you,\" she says. \"If you fit my pattern of a romantic partner, I would kiss you for that!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou can take a hint.\n\t\t\t\t\t\t\t*goto tryagain\n\t\t\t*elseif siblingmarriage\n\t\t\t\tShe sees you looking at her and says, \"I believe $!{siblingname} is the love of my life. Like you, I would never betray that bond.\"\n\t\t\t\t*set siaubond %-10\n\t\t\t\t*set siblingbond %-10\n\t\t\t\t*goto tryagain\n\t\t\t*else\n\t\t\t\tHow do you attempt to charm her?\n\t\t\t\t*choice\t\t\t\t\n\t\t\t\t\t#Take her hand in yours.\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you sit beside her and gently take her hand. She looks at your hand before she looks at your face—and smiles.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub sfaith\n\t\t\t\t\t\t*set siaulove true\n\t\t\t\t\t\t*gosub siaukiss\n\t\t\t\t\t\t*goto lead\n\t\t\t\t\t#Give her a gift.\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you sit beside her and offer her the penny you shaped into the likeness of your ship during the long hours on board. \n\t\t\t\t\t\t\n\t\t\t\t\t\tShe takes it from your hand and traces the curved line of the bow with obvious delight. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub sfaith\n\t\t\t\t\t\t*set siaulove true\n\t\t\t\t\t\t*gosub siaukiss\n\t\t\t\t\t\t*goto lead\n\t\t\t\t\t#Compliment her.\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you approach her and say, \"I've never met a girl as kind as you—or as beautiful.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe smiles at you, delighted. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*gosub sfaith\n\t\t\t\t\t\t*set siaulove true\n\t\t\t\t\t\t*gosub siaukiss\n\t\t\t\t\t\t*goto lead\n\t\t\t\t\t#Oil and polish her favorite mechanical horse.\n\t\t\t\t\t\tYou get to work, hoping she understands the message your actions are telling her. When the horse gleams like silver rather than tin, you let yourself stand back to admire your work—and she is standing beside you.\n\t\t\t\t\t\n\t\t\t\t\t\t*if (gold1) or (gold)\n\t\t\t\t\t\t\t\"Beautifully done,\" she says. \n\t\t\t\t\t\t\t*gosub sfaith\n\t\t\t\t\t\t\t*set siaulove true\n\t\t\t\t\t\t\t*gosub siaukiss\n\t\t\t\t\t\t\t*goto lead\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\"Thank you,\" she says. \"If you fit my pattern of a romantic partner, I would kiss you for that!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou can take a hint.\n\t\t\t\t\t\t\t*goto tryagain\n\t#William is a man of honor—and I have a weakness for a well-pressed uniform. \n\t\t*set discretion %-10\n\t\t*if siblingmarriage\n\t\t\t*if ((novellinkarabella) or (novellinkjeremy))\n\t\t\t\tHe sees you looking at him, and says, \"I believe $!{siblingname} is the love of my life. Like you, I would never betray that bond.\"\n\t\t\t\t*set williambond %-10\n\t\t\t\t*set siblingbond %-10\n\t\t\t\t*goto tryagain\n\t\t\t*else\n\t\t\t\t*goto nextbit\n\t\t*else\n\t\t*label nextbit\n\t\tHow do you attempt to charm him?\n\t\t*choice\n\t\t\t#Take his hand in yours.\n\t\t\t\tWhen you have your moment of relative privacy, you sit beside him and gently take his hand. He looks at your hand before he looks at your face—and smiles.\n\t\t\t\t\t\t\t\n\t\t\t\t*gosub williamkiss\n\t\t\t\t*set williamlove true\n\t\t\t\t*goto lead\t\t\t\t\n\t\t\t#Give him a gift.\n\t\t\t\tWhen you have your moment of relative privacy, you sit beside him and offer him the penny you shaped into the likeness of your ship during the long hours on board. He takes it from your hand and traces the curved line of the bow with obvious delight. \n\t\t\t\t\t\t\t\t\n\t\t\t\t*gosub williamkiss\n\t\t\t\t*set williamlove true\n\t\t\t\t*goto lead\n\t\t\t#Compliment him.\n\t\t\t\tWhen you have your moment of relative privacy, you approach him and say, \"I've never met a man as truly good as you—or as handsome.\"\n\t\t\t\t*if (gold1) or (gold)\n\t\t\t\t\n\t\t\t\t\tHe smiles at you, delighted. \n\t\t\t\t\t\t\n\t\t\t\t\t*gosub williamkiss\n\t\t\t\t\t*set williamlove true\n\t\t\t\t\t*goto lead\n\t\t\t\t*else\n\t\t\t\t\n\t\t\t\t\t\"You're very kind,.\" he says awkwardly. \"I'm sure your future partner will be twice as good and three times as handsome.\"\n\t\t\t\t\t*goto tryagain\n\t\t\t#Oil and polish his favorite mechanical horse.\n\t\t\t\tYou get to work, hoping he understands the message your actions are telling him. When the horse gleams like silver rather than tin, you let yourself stand back to admire your work—and he is standing beside you.\n\t\t\t\t\t\t\n\t\t\t\t*gosub williamkiss\n\t\t\t\t*set williamlove true\n\t\t\t\t*goto lead\n\t#$!{patrickname} is roughly handsome, and his few words are well worth hearing. He's so peaceful.\n\t\t*set contentment %+10\n\t\t*if xenophobia\n\t\t\t*set xenophobia false\n\t\t\t*achieve overcomeflaw\n\t\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t\t*goto charming\n\t\t*else\n\t\t*label charming\n\t\t*if (novellinkarabella) or (novellinkjeremy)\n\t\t\tHow do you attempt to charm him?\n\t\t\t*choice\n\t\t\t\t#Take his hand in yours.\n\t\t\t\t\t*if (gold1) or (gold)\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you sit beside him and gently take his hand. He looks at your hand before he looks at your face—and smiles.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*set patricklove true\n\t\t\t\t\t\t*gosub patrickkiss\n\t\t\t\t\t\t*goto lead\n\t\t\t\t\t*else\n\t\t\t\t\t\tWhen you have your moment of relative privacy, you sit beside him and gently take his hand. He looks at your hand before he looks at your face—and gently pulls away.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto tryagain\t\t\t\t\t\n\t\t\t\t#Give him a gift.\n\t\t\t\t\tWhen you have your moment of relative privacy, you sit beside him and offer him the penny you shaped into the likeness of your ship during the long hours on board. He takes it from your hand and traces the curved line of the bow with obvious delight. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t*gosub pfaith\n\t\t\t\t\t*gosub patrickkiss\n\t\t\t\t\t*set patricklove true\n\t\t\t\t\t*goto lead\n\t\t\t\t#Compliment him.\n\t\t\t\t\tWhen you have your moment of relative privacy, you approach him and say, \"I've never met a man as truly good as you—or as handsome.\"\n\t\t\t\t\t\t\n\t\t\t\t\tHe smiles at you, delighted. \n\t\t\t\t\t\n\t\t\t\t\t*gosub pfaith\n\t\t\t\t\t*gosub patrickkiss\n\t\t\t\t\t*set patricklove true\n\t\t\t\t\t*goto lead\n\t\t\t\t#Oil and polish his favorite mechanical horse.\n\t\t\t\t\tYou get to work, hoping he understands the message your actions are telling him. When the horse gleams like silver rather than tin, you let yourself stand back to admire your work—and he is standing beside you.\n\t\t\t\t\t\t\n\t\t\t\t\t*gosub pfaith\n\t\t\t\t\t*gosub patrickkiss\n\t\t\t\t\t*set patricklove true\n\t\t\t\t\t*goto lead\n\t\t*else\n\t\t\tHe sees you looking at him, and says, \"$!{emmelinename} is the love of my life. Don't say something we'll both regret.\"\n\t\t\t*set patrickbond %-10\n\t\t\t*set emmelinebond %-10\n\t\t\t*goto tryagain\n\t\t\t\t\n*label patrickkiss\n\"I confess I've always admired you,\" he says, and you're surprised to find you suddenly like his accent. \n\nYou feel dizzy, and it's not just the Australian heat. \"May I?\"\n\t\t\t\t\t\t\nThere's no hint of a joke in his eyes. \"Please do,\" he says.\n\t\t\t\t\t\t\nYou brush back a loose strand of his hair, and that small touch makes him shiver. He meets your lips with his own, and the rest of the world drops away as he pulls you closer still. \t\n\n*return\n*label williamkiss\n\"Do you know how remarkable you are?\" he says. \"I've never met someone with half as much heart and hope and courage as you.\" \n\nYou feel dizzy, and it's not just the Australian heat. \n\n\"$!{first_name} $!{last_name},\" he says, \"May I kiss you?\"\n\t\t\t\t\t\t\n\"Permission granted, Private Barker,\" you say, your heart in your throat.\n\t\t\t\t\t\t\nYou meet his lips with your own, and the rest of the world drops away as he pulls you closer still. \t\n\n*return\n*label matildakiss\n\"I've always admired you,\" she says. \"Although if you have feelings for me I'll have to rethink my estimate of your intelligence. In the meantime—\" she takes off her hat, looking curiously vulnerable without it, and leans close to you. You feel dizzy, and it's not just the Australian heat. \n\n\"May I?\" she says. There's no hint of a joke in her eyes. \n\n\"Please do,\" you say, your heart in your throat.\n\t\t\t\t\t\t\nShe brushes back a loose strand of your hair, and that small touch makes you shiver. You meet her lips with your own, and the rest of the world drops away as she pulls you closer still. \t\n\n*return\n*label siaukiss\n\"I've loved you since the day I saw you trying to save $!{siblingname} in that awful storm,\" she says shyly. \n\n\"When I'm with you, I feel like I'm at home,\" you tell her.\n\n\"As do I,\" she says, lifting her hand to trace the line of your lips. \"May I?\"\n\nYou feel dizzy, and it's not just the Australian heat. \"Please do,\" you say, your heart in your throat.\n\t\t\t\t\t\t\nYou meet her lips with your own, and the rest of the world drops away as she pulls you closer still. \t\n\n*return\n*label pfaith\n*return\n*label mfaith\n*return\n*label sfaith\n*return\n*label lead\n*if ((lead) and ((matildalove) or (patricklove))) or (lead and ((siaulove) or (williamlove)))\n\tYou return to the world, but it's changed. Every grain of dust and whispering tree shines with reflections of love. You touch your mother's lead heart in the pocket where you always keep it, but instead of sorrow all you feel is more love. Life is good!\n\t*set happiness +5\n\t*goto endy\n*else\n*label endy\n*if matildalove\n\t*set matildabond %+20\n\t*set happiness +5\n\t*goto end\n*elseif patricklove\n\t*set patrickbond %+10\n\t*set happiness +5\n\t*goto end\n*elseif siaulove\n\t*set siaubond %+10\n\t*set happiness +5\n\t*goto end\n*elseif williamlove\n\t*set williambond %+10\n\t*set happiness +5\n\t*label end\n\t\n\tYou hope the increasing tension between British and independent forces doesn't destroy this one glimmer of beauty in the harsh landscape.\n\t*goto endnow\n*else\n\n\tGlancing across at $!{siblingname}, you're reminded how much your \n\t*if pcismale\n\t\tsisters mean to you. You hope they don't get hurt in the coming fight.\n\t\t*goto endnow\n\t*else\n\t\tsiblings mean to you. You hope they don't get hurt in the coming fight.\n*label endnow\n\nThe red dust of the storm coats everyone's skin and hair, looking for a moment like blood.\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n\n*finish", "6a": "You wake in the middle of the night, and realize after a moment that it was the silence that woke you. The dust storm has finally passed. \n\nSuddenly you're desperate to see the sky. You get up and dress quietly, surprised to feel cool for the first time in this hot land. When you walk outside you stand for a long time staring at the brilliant, foreign stars. Australia is not an easy land to love, but it's growing on you.\n\nAs you're tugging the enormous canvas off the three tents, something howls in the darkness! \n*page_break\nIt sounds like a wolf, and it's so loud it could be standing next to you. The hairs stand up on the back of your neck. Then you hear another howl, and another. There are at least three hungry dingoes approaching your camp, and the call of the hunt is unmistakable. In this arid land, your supplies are powerful bait! \n\nThe first wild dog stands a stone's throw from your camp, making a dark silhouette against the sky before he howls again, and is immediately answered by his pack. His teeth glint strangely in the starlight, and you hear clinking and whirring as he lopes towards you. He bares his teeth in a predator's grin and your blood runs cold. These are no ordinary creatures, bent only on survival. These are something else. You draw your blade with just enough time to be grateful that $!{siblingname}'s tent is now shrouded in many layers of canvas, keeping\n*if pcismale\n\ther sealed away from the fight—for the moment.\n\t*goto canvasbaby\n*else\n\thim sealed away from the fight—for the moment.\n*label canvasbaby\n\nHow do you react to the dingo attack? \n*choice\n\t#Wake the troopers first—they're trained to fight. \n\t\t*set colonialanger +10\n\t\t*set discretion %+10\n\t\t*set siaubond %+10\n\t\t*set williambond %+10\n\t\t*if courage \u003c80\t\t\t\t\n\t\t\t*gosub siaugun\n\t\t\t*gosub williamyell\n\t\t\t*goto wounded\n\t\t*else\n\t\t\t*gosub siaugun\n\t\t\t*gosub williamyell\n\t\t\t*goto next\n\t#Wake the men first—they both sleep within reach of their guns.\n\t\t*set colonialanger +10\n\t\t*set britishanger +10\n\t\t*set science %+10\n\t\t*set williambond %+10\n\t\t*set patrickbond %+10\n\t\t*if courage \u003c80\n\t\t\t*gosub patrickgun\n\t\t\t*gosub williamyell\n\t\t\t*goto wounded\n\t\t*else\n\t\t\t*gosub patrickgun\n\t\t\t*gosub williamyell\n\t\t\t*goto next\n\t#Wake $!{patrickname} and $!{matildaname} first—they'll know instinctively how to stop native animals. \n\t\t*set britishanger +10\n\t\t*set science %-10\n\t\t*set patrickbond %+10\n\t\t*set matildabond %+10\n\t\t*if courage \u003c80\n\t\t\t*gosub patrickgun\n\t\t\t*gosub matildayell\n\t\t\t*goto wounded\n\t\t*else\n\t\t\t*gosub patrickgun\n\t\t\t*gosub matildayell\n\t\t\t*goto next\n\t#Wake the women first—they're fierce fighters.\n\t\t*set britishanger +10\n\t\t*set colonialanger +10\n\t\t*set contentment %-10\n\t\t*set matildabond %+10\n\t\t*set siaubond %+10\n\t\t*if courage \u003c80\n\t\t\t*gosub siaugun\n\t\t\t*gosub matildayell\n\t\t\t*goto wounded\n\t\t*else\n\t\t\t*gosub siaugun\n\t\t\t*gosub matildayell\n\t\t\t*goto next\n\t#Use the clockwork soldier to fight.\n\t\t*set britishanger +10\n\t\t*set colonialanger +10\n\t\t*set mechanical +5\n\t\t*set courage +5\n\t\t*set wounded true\n\t\tYou run to the soldier's crate, and pry it open with your blade. \"Did your sender wind you up already?\" you say.\n\t\t\n\t\t\"Bing.\"\n\t\t\n\t\t\"We're under attack by wild dogs. Will you stop them?\"\n\t\t\n\t\t\"Bing.\"\n\t\t\n\t\t\"Great.\" Metal doesn't lie. You put your hands under its armpits and heave, but it's far too heavy. Swearing just a little as you see three—four—five dogs saunter into camp, you reach lower and pull harder. It's no use. \n\t\t\n\t\t\"Arg, you stupid machine. Get up!\"\n\t\t\n\t\tIt immediately stands, shocking you with the rapidity of the movement. For too long you simply stare at its glowing eyes—then you realize the sword on its arm grazed yours in passing, and you're bleeding.\n\t\t\n\t\tYou swear again, and gather your wits. There are at least fifteen dingoes in the pack—and that's just the ones you can see. Their howls are so soft the others haven't woken up!\n\t\t\n\t\t\"Stop those dingoes!\" you say.\n\t\t*page_break\n\t\tThe soldier grasps the sides of the crate and leaps out as gracefully as a dancer despite its enormous weight. It lands in a crouch and sprints like a racer among the tents, killing dingoes here and there as quickly and noiselessly as a child catching snow. Many of the dingoes don't even make a sound. Others yelp as they fall, dying moments later. Just one escapes, fleeing for the hills with its tail between its legs. \n\n\t\tDingoes lie dead or dying all over your campsite. Their blood is black on the ground, and you can see similar stains sprayed across tent-cloth and tree-trunks here and there. You stand in stunned shock, knowing perfectly well that the speed and deadliness of such a weapon would be more devastating to a human army than you could possibly imagine.\n\t\t*if distracted\n\t\t\tIt springs away at a movement, and you see $!{siblingname} emerging bleary-eyed and underdressed from the pile of canvas. The soldier races to the kill.\n\t\t\t\t\n\t\t\t$!{siblingname} looks up just in time to see the clockwork soldier approaching at a sprint faster than any human, raising its bloodied blades for one last kill.\n\t\t\t\t\n\t\t\t\"Stop!\" you scream. \"Stop right now! Don't move!\"\n\n\t\t\tThe soldier halts so quickly it drags furrows in the ground. It slowly turns its head to you, and its eyes glow like lightning bugs in the starlight.\n\n\t\t\tSlowly, it stands to its feet. \"Bing,\" it says—but you could swear it sounds reluctant. \n\t\t\t*goto else\n\t\t*else\n\t\t\t*label else\n\t\t\t\"Stop fighting,\" you say, very carefully. \"Get back in your crate and don't do anything until you're given new instructions.\"\n\t\t\t\t\n\t\t\t\"Bing,\" it says.\n\t\t\t\t\n\t\t\tYou bandage your arm and wake everyone.\n\t\t\t*goto next\n*label next \n\nThe entire company gathers around a bloodied dingo body with a solemn air. $!{patrickname} lights several torches and a candle so you can see a little better. The flames only add to the shadows, and highlight the jaggedness of the dingo's wounds—most of which were inflicted when its mechanical parts were added to its living body. Its teeth are iron with no silver to bond the organic and metal parts. No wonder it suffered so much. Soldiers and outback dwellers alike are shaken by the sight. $!{matildaname} kneels for a closer look, checking for the slightest trace of breath with the polished side of her brass mug. She checks its throat for hidden mechanisms, making sure it can't revive magically—and finally shakes her head in relief.\n*page_break\nThe dingo's mouth is a bloody ruin of sharp iron teeth. From the pattern of cuts along its lips, it's clear the blood is its own. $!{matildaname} draws a knife and slices through heavy black stitching on its leg, peeling back the flesh to reveal where its bones have had a silver alloy bolted on—presumably designed to add to its speed, strength, or both. \n\n\"This isn't right,\" she says flatly, looking at William and Siau.\n\nSiau looks like she's going to be sick, but William says, \"The crown does what it must to keep its citizens safe.\"\n\n\"What's safe about this abomination!\" $!{patrickname} explodes, and you take a step back. He's never raised his voice before. \"$!{matildaname}'s right. There's no excuse for this—let alone your moldy queen's lust for more power!\"\n\nSiau draws her pistol—and you know it's freshly loaded. \"Take that back,\" she snarls.\n*choice\n\t#As a British citizen, I take the lead and stop the argument escalating.\n\t\t*set colonialanger +10\n\t\t*set socialcurrency +1\n\t\t*goto stop\n\t#As $!{emmelinename}'s family member, I take the lead and stop the argument escalating.\n\t\t*set britishanger +10\n\t\t*set socialcurrency +1\n\t\t*goto stop\n\t#I say anything to make them calm down.\n\t\t*set contentment %+10\n\t\t*set kindness %-10\n*label stop\n\"Stop!\" you say, and find everyone looking at you. \"Please, this is not the time to fight. We all know that time is coming soon enough—let's keep ourselves to ourselves until we're safely arrived at $!{emmelinename}'s house. Then you can all go to your commanders and… do what you have to do.\"\n\n$!{matildaname} straightens. \"If that lot can keep their guns in their pants, I won't break the peace.\"\n\nSiau holsters her gun, and the company separates—trooper with trooper, independent with independent, and you with $!{siblingname}. You feel friendships shattering around you, and you're more grateful for family loyalty than ever. It's the one thing you can count on.\n\n\"Did you see them?\" $!{siblingname} asks you quietly. \"The cogs had a raised centre with a hexagonal centre—just like the ones in the clockwork soldier. It's as good as a signature.\"\n\n\"I was too busy looking at the blood and teeth,\" you admit. \"Thank you for pointing that out.\"\n\nAfter the fight and the strange revelations from the dingo corpse, you need to talk to someone to try and figure things out. You take\n*if matildalove\n\t$!{matildaname}\n\t*goto talk\n*elseif patricklove\n\t$!{patrickname}\n\t*goto talk\n*elseif siaulove\n\tSiau\n\t*goto talk\n*elseif williamlove\n\tWilliam\n\t*goto talk\n*else\n\t$!{siblingname}\n*label talk\naside - grateful to finally have personal space again.\n\n\"Those dingoes were made by the same inventor as the clockwork soldier,\" you say. \"The cogs on its shoulder were distinctive.\"\n\n\"What were the dingoes for? All they'd do is attack travellers.\"\n\n\"That's it then,\" you say, seeing the truth clearly now. \"They looked experimental to me—the inventor is still at work—but they were released for a purpose. Rebels travel in smaller groups, and would be more vulnerable to attack. That pack may only kill one or two people, but they'll spread fear like wildfire.\"\n\n\"And yet, somebody at the palace sent $!{emmelinename} a weapon.\"\n*page_break\n\"You're right,\" you say, pacing nervously as you attempt to figure out the inventor's actions. \"Everything else makes sense—they deliberately stopped her mail, so she wasn't able to recruit help from London. They kept spies on her—so they knew all about $!{matildaname} before her ship even docked. But why give her a weapon? One soldier is unlikely to turn the tide, so if it was sent by a traitor within the palace then he or she will be sorely disappointed at the results.\"\n\n\"Perhaps it's not about winning or losing Australia's independence. Perhaps it's more personal—something about $!{emmelinename} herself.\"\n\n\"But what does it mean?\" you say, half talking to yourself. \"Is it meant to save her, or to convince her to give up?\"\n*if courage >60\n\t\t\n\tYou can tell your courage in the fight has not gone unnoticed. Soon it will be tested again—and you may not survive that battle.\n\t*set socialcurrency +1\n\t*if matildalove\n\t\t*set matildabond %+10\n\t\t*goto anger\n\t*elseif patricklove\n\t\t*set patrickbond %+10\n\t\t*goto anger\n\t*elseif siaulove\n\t\t*set siaubond %+10\n\t\t*goto anger\n\t*elseif williamlove\n\t\t*set williambond %+10\n\t\t*goto anger\n\t*else\n\t\t*set siblingbond %+10\n\t\t*goto anger\n*else\n\n\tYou can tell your blinding terror during the fight has not gone unnoticed. Soon your courage will be tested again—and you may not survive that battle.\n\t*set socialcurrency -1\n\t*if matildalove\n\t\t*set matildabond %-10\n\t\t*goto anger\n\t*elseif patricklove\n\t\t*set patrickbond %-10\n\t\t*goto anger\n\t*elseif siaulove\n\t\t*set siaubond %-10\n\t\t*goto anger\n\t*elseif williamlove\n\t\t*set williambond %-10\n\t\t*goto anger\n\t*else\n\t\t*set siblingbond %-10\n\t\t*goto anger\n*label anger\n*finish\n\n*label wounded\n*set wounded true\n*page_break\nYou shiver and fold your arms over your chest, grateful the others were there to save you. \n\nThe lead dingo remains close by. It shakes itself and darts forward to attack you. \nWhat do you do?\n*choice\n\t#Scream and stab it.\n\t\t*set courage +5\n\t\t*goto slash\n\t#Shout for help.\n\t\tYou yell at the top of your lungs, but the others are too far away to help you. \n\t\t*goto slash\n\t#Run away.\n\t\tIn the darkness you trip and fall, and the sure-footed beast is right behind you!\n*label slash\n\nYou scream and slash wildly, but your blade slips out of your sweat-slick fingers, clattering to the ground. With no weapon left, you kick the dingo in the snout. Your foot connects with its face, slicing open on serrated metal sharper than any natural teeth. As you scream in renewed terror, the dingo startles back—but doesn't retreat. Someone shoots a gun nearby but they miss the dingo and now it's too late—your blood coats the dingo's bloodied mouth and it no longer flinches at a loud noise. It snarls and opens its jaws for another bite.\n\n[i]Thwack![/i]\n\n$!{siblingname} hits the dog's bloodied snout with the butt of a still-smoking rifle. The dingo snarls, but it backs away.\n\nYour foot is bleeding heavily. Furious, frightened, and unable to think intelligently, you yell as loud as you can, \"Bad dog!\"\n\nThe dingo gives you one last hungry look and lopes away.\n\nYou sit down heavily on the hard ground, and look up at $!{siblingname}. For the first time, you realize neither of you is a child any longer. \n\n\"Thank you,\" you say. \"You just saved my life.\"\n\n\"Well,\"\n*if pcismale\n\tshe says, kneeling to tend to your foot, \"it was my turn.\"\n\t*page_break\n\t*goto next\n*else\n\the says, kneeling to tend to your foot, \"it was my turn.\"\n\t*page_break\n\t*goto next\n\n*label siaugun\nSiau runs towards you looking like a ghost in her half-fastened and flapping uniform. She has her gun, and she kneels to fire it as steadily as possible at the closest dingo. Out of the corner of your eye, you see the lead dingo abandon his casual act and spring forwards with terrifying speed—right at you. \n\n\"Siau!\" you scream. \"Shoot!\"\n\nShe bites her lip and gives a tiny shake of her head. You're in the way; she can't shoot it. But she shoots all the same, and your dingo flinches at the noise, pausing to evaluate the threat. It's so close now you can see that its mouth is cut and bleeding, and there are enormous black stitches running down each leg from the shoulder to the ground—visible even in the semidarkness.\n\nAnother dingo you hadn't even seen lies on the ground, whining in pain and fear. Siau didn't waste her shot.\n\nYou take a step backwards, raising your own weapon ready to fight. Your dingo crouches to leap. Its eyes are on your throat.\n\n*return\n*label williamyell\n*page_break\n\"No!\" roars William, waving his own gun. \"Get back!\"\n\nTo your surprise, you see the lead dingo once again stop in its tracks because of a loud noise. \n\n\"Yarrrr!\" William yells. \"Get lost, you mangy cur!\" \n\nYou shout at the wild dog and shake your fist at it. It looks in confusion from you to William and back again. In the background, you hear a gun getting re-loaded—but there's no time. You yell again, and find yourself backed by a rowdy chorus. Everyone is awake now, and they've realized how to run off the entire pack of dingoes.\n\nYou scream and yell until you're hoarse, and beat your blade against the nearest tin horse to make a deafening clamor. Someone shoots again—twice—but doesn't hit anything. One by one, the dingoes slink away.\n*return\n*label patrickgun\n$!{patrickname} runs towards you looking like a madman in his unfastened iron vest with a gun clutched in the hand that isn't attempting to continue getting dressed. He gives up on his clothes and kneels to shoot as steadily as possible at the closest dingo. Out of the corner of your eye, you see the lead dingo abandon his casual act and spring forwards with terrifying speed—right at you. \n\n\"$!{patrickname}!\" you scream. \"Shoot!\"\n\nHe bites his lip and gives a tiny shake of his head. You're in the way; he can't shoot it. But he shoots all the same, and your dingo flinches at the noise, pausing to evaluate the threat. It's so close now you can see that its mouth is cut and bleeding, and there are enormous black stitches running down each leg from the shoulder to the ground—visible even in the semidarkness.\n\nAnother dingo you hadn't even seen lies on the ground, whining in pain and fear. $!{patrickname} didn't waste his shot.\n\nYou take a step backwards, itching for your own weapon. Your dingo crouches to leap. Its eyes are on your throat.\n\n*return\n\n*label matildayell\n\"No!\" roars $!{matildaname}, waving her own gun. \"Get back!\"\n\nTo your surprise, you see the lead dingo once again stop in its tracks because of a loud noise. \n\n\"Yarrrr!\" $!{matildaname} yells. \"Get lost, you mangy cur!\" \n\nYou shout at the wild dog and shake your fist at it. It looks in confusion from you to $!{matildaname} and back again. In the background, you hear a gun getting re-loaded—but there's no time. You yell again, and find yourself backed by a rowdy chorus. Everyone is awake now, and they've realized how to run off the entire pack of dingoes.\n\nYou scream and yell until you're hoarse, and beat your blade against the nearest tin horse to make a deafening clamor. Someone shoots again—twice—but doesn't hit anything. One by one, the dingoes slink away.\n*return", "6b": "*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n\nMore long days pass. As you walk farther from Melbourne's cloud-herding machines, you see more and more hints of the land that used to flourish. It even rains a few times. You find yourself walking farther and sleeping better, and sometimes you can forget for a little while that your group of companions is doomed to part ways.\n\n*if britishanger>colonialanger\n\tOne morning, the drumming of real living hooves on hard ground wakes you before dawn, and you stumble out of your tent to see a full squad of redcoats in pressed uniforms and gleaming buttons staring down at you. Their leader sneers at you and snaps out orders to his men. Two of the troopers leap from their horses and push past you, strapping your hard-earned water to the panniers on their mounts.\n\n\t\"What do you think you're doing?\" you say.\n\n\tThe sneering trooper deigns to glance at you. \"Confiscating your supplies for the war effort,\" he says, already wheeling about to leave as more of his troops dismount to rifle through your personal effects.\n\t\n\t\"What war effort?\" you say. \"The war hasn't started yet.\"\n\t\n\t\"Give it a week,\" he says.\n\n\t\"We need that water to live. And leave my things alone!\"\n\n\t\"If you need water,\" he says, with a sly glance across to a seething $!{patrickname}, \"you shouldn't have consorted with a man who bears an uncanny resemblance to a local bushranger.\"\n\t\n\t\"Ex-bushranger,\" $!{matildaname} corrects him.\n\n\tA particularly sweaty trooper heads for your tent with a greasy smile.\n\n\tThose entitled thieves!\n\t*goto doh\n*else\n\tOne morning, the drumming of real living hooves on hard ground wakes you before dawn, and you stumble out of your tent to see a full pack of rebels in enormous plates of home-made armour staring down at you. Their leader sneers at you and snaps out orders to his men. Two of the outlaws leap from their horses and push past you, going directly to your hard-earned water. Without acknowledging you, they attach your water containers to the panniers on their mounts.\n\n\t\"What do you think you're doing?\" you say.\n\n\tThe sneering leader deigns to glance at you. \"Confiscating your supplies for the war effort,\" he says, already wheeling about to leave as more of his troops dismount to rifle through your personal effects.\n\n\t\"What war effort?\" you say. \"The war hasn't started yet.\"\n\t\n\t\"Give it a week,\" he says.\n\n\t\"We need that water to live. And leave my things alone!\"\n\n\t\"If you need water,\" he says, with a sly glance across to a seething William, \"you shouldn't have consorted with redcoats.\"\n\n\tA particularly sweaty rebel heads for your tent with a greasy smile.\n\n\tThose lawless savages!\n*label doh\n\t\nWhat do you do?\n*choice\n\t#Fight them.\n\t\tYou dive in front of the sweaty thief and raise your knife. He's not smiling any more—he's levelling a loaded pistol between your eyes. You lower your blade and stand by as he sorts through your belongings, taking everything of value as you watch helplessly. It's clear from looking at the men laughing at your frustration that only the worst sort of people find themselves in Australia.\n\t\t*set contentment %-10\n\t\t*set courage +5\n\t\t*if britishanger>colonialanger\n\t\t\t*set siaubond %-10\n\t\t\t*set williambond %-10\n\t\t\t*goto ok\n\t\t*else\n\t\t\t*set matildabond %-10\n\t\t\t*set patrickbond %-10\n\t\t\t*goto ok\n\t#Appeal to your friends to stop them.\n\t\t$!{matildaname} and Siau are awake and scowling. \n\t\t\n\t\t\"They're your people!\" you cry \n\t\t*if britishanger>colonialanger\n\t\t\tto Siau across the dead fire. \"Stop them!\"\n\t\t\t*goto bah\n\t\t*else\n\t\t\tto $!{matildaname} across the dead fire. \"Stop them!\"\n\t\t*label bah\n\t\t\n\t\tYour so-called companion shakes her head. \"It's the war,\" she says. \"They have the right to do what they must to win.\"\n\t\t\n\t\t\"This certainly shows your character—and theirs!\"\n\t\t\n\t\t\"Nevertheless,\" she says, and lets a hint of a growl into her voice. \n\t\t\n\t\tFrom that moment, you are no longer travelling together. Although your company still aims to reach $!{emmelinename}'s house—somehow—the enmity that manners kept at bay has now been loosed. \n\t\t*set discretion %-10\n\t\t*if britishanger>colonialanger\n\t\t\t*set siaubond %-10\n\t\t\t*set williambond %-10\n\t\t\t*goto ok\n\t\t*else\n\t\t\t*set matildabond %-10\n\t\t\t*set patrickbond %-10\t\t\n\t\t\t*goto ok\n\t#Hide my supplies.\n\t\tYou dive into your tent and frantically try to assess what is most valuable to you. Seconds later, your moment of peace is shattered as the sweaty enemy invades your space and gleefully tears your belongings apart. \n\t\t\n\t\tThe only thing you manage to hide is your \n\t\t*if tin\n\t\t\ttin snuffbox that $!{siblingname} made for you as a child.\n\t\t\t*goto next\n\t\t*elseif iron\n\t\t\tiron spanner.\n\t\t\t*goto next\n\t\t*elseif brass\n\t\t\tbrass goggles.\n\t\t\t*goto next\n\t\t*elseif lead\n\t\t\tmother's lead heart.\n\t\t\t*goto next\n\t\t*elseif silver\n\t\t\tlittle silver chalice.\n\t\t\t*goto next\n\t\t*elseif gold\n\t\t\tmother's gold wedding ring.\n\t\t\t*goto next\n\t\t*elseif aluminum\n\t\t\ttiny sliver of real aluminum.\n\t\t\t*goto next\n\t\t*else\n\t\t\thalf-empty personal water bottle.\n\t\n\t\n*label next\nThat won't keep you alive until you get to $!{emmelinename}'s house. Nor will it stop your companions wanting to kill each other.\n*label ok\nYou are furious and frightened, watching helplessly as your food and water rides away.\n*page_break\nYour party of decent people turns into a battle in miniature as $!{matildaname} and $!{patrickname} face off against Siau and William. Slowly but surely, every hand lands on a weapon.\n\n\"Stop!\" you yell. \"We have to work together to survive until $!{emmelinename}'s house. Whatever it takes. Does anyone have anything useful left they can share with the rest of us?\"\n\n$!{patrickname} slumps as if he's been punched in the gut. \"I do.\"\n\n$!{matildaname} lays her hand on his shoulder. \"No, $!{patrickname}! There has to be another way.\"\n\n\"Oh yes?\" he says. \"And what would that be?\" \n\nWilliam deliberately takes his hand off his gun. \"You have something,\" he says flatly. \"Because you were a bushranger before you were ever a hotelier, and you've long since broken the conditions of your pardon.\"\n\n$!{patrickname} very nearly cracks a smile. \"It appears you're not as dumb as you look.\"\n\n\"Consider yourself under arrest.\"\n\n\"Oh yes?\" says $!{patrickname}. \"Will you keep me tied up here, or shall I save your miserable British skin first?\"\n\n$!{matildaname} grips his arm like a vice. \"Please do save us, $!{patrickname}. There isn't any other way to get through this. \"\n\nWilliam gives a tight nod of agreement. \n\n\"And,\" says $!{matildaname}, \"we need to figure out what to do with $!{emmelinename}'s crate.\"\n*choice\n\t#Use the remaining tin horses to carry it—$!{emmelinename} needs to see it as soon as possible.\n\t\tYou strap the crate onto two tin horses, leaving behind all your clothes and tools.\n\t\t*set contentment %-10\n\t\t*goto wait\n\t#Let the soldier out and have it walk.\n\t\tYou open the crate despite William's objections, and instruct the soldier to walk with you. It silently obeys. You tell it to stop and wait, then follow when you break camp. It bings to confirm that it understands, and eventually closes its glowing eyes.\n\t\t*set discretion %-10\n\t\t*set mechanical +5\n*label wait\n\n$!{patrickname} turns a half-circle, getting his bearings. \"You five can rest here. I'll be back soon enough.\"\n\n$!{siblingname} gives you a desperate glance and the pair of you retreat from the staring duel between $!{matildaname} and the troopers. You sit in your over-heated tent and pretend you can't hear the insults flying outside.\n*if wounded\n\t$!{siblingname} checks your wound and rebandages it.\n\t*goto footyfoot\n*else\n*label footyfoot\n\nAll you can do is hope no-one gets killed before you reach $!{emmelinename}'s house and the others can join their respective armies. You'll find a place for yourself when that time comes. \n\nBefore you left London, it was clear that the independence movement was a pack of misguided savages. But clearly something in Australia changed $!{emmelinename}'s mind—and she's no savage. You've learned a great deal about the true situation here. Now you know what you really think of this conflict, and you can only hope you don't lose friends when they discover what path you've chosen.\n\nThrough the open door of the tent, you watch the stars wink out one by one as a new day begins.\n\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a11\n\t*else\n*label a11\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a33\n*else\n*label a33\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a44\n*else\n*label a44\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a55\n*else\n*label a55\n*finish", "7": "$!{patrickname} returns at nightfall leading six flesh-and-blood horses. He's brought barely enough water for a single person, but everyone has a few swallows. Everyone is still thirsty. \n*choice\n\t#I vote to ride a little while, then sleep and continue tomorrow. We're in bad shape physically and emotionally.\n\t\t*set kindness %+10\n\t\t*set science %+10\n\t\tNo-one sleeps well, but the horses look better despite their obvious thirst. You canter for a short while, then let the horses walk. \n\t\t\n\t\tThe sun rises higher, and the hot air feels like it's boiling against your dry skin. You stop sweating. A tiny spark of optimism in the back of your mind points out that no-one has the energy to fight any more. It's a nightmarish journey.\n\t\t*goto morning\n\t#I have a feeling we should ride through the night, pushing the horses and ourselves as hard as possible.\n\t\t*set contentment %-10\n\t\t*set science %-10\n\t\tLeaving everything nonessential behind, you and your companions ride through the night, coaxing the horses to a trot once or twice but otherwise giving them breaks whenever possible by dismounting and walking on your own aching and blistered feet. It's a nightmarish journey filled with half-naps that almost toss you from your horse, and weird hallucinations of mechanically-adjusted creatures snapping iron teeth and staring at you with glowing eyes.\n\t\t*goto morning\n\t#I vote to return to where the horses came from and get water—better to arrive healthy than not at all.\n\t\t*set contentment %+10\n\t\t*set science %+10\n\t\tEveryone rides back to the edge of an adbandoned settlement where a friend of $!{patrickname} had been keeping the \"borrowed\" horses. One by one you drink your fill and store a little more water in the few usable containers you have left. It's already night, so you attempt to sleep. \n\t\t\n\t\tNo-one sleeps well, but the horses look better. Once again, everyone drinks their fill. No-one says anything, but you know you'll be retracing your steps for most of the day. You canter for a short while, then let the horses walk. \n\t\t\n\t\tThe sun rises higher, and the hot air feels like it's boiling against your dry skin. You stop sweating. A tiny spark of optimism in the back of your mind points out that no-one has the energy to fight any more. You don't have the energy to care. Night falls, and you rest, then ride again at dawn. It's a nightmarish journey.\n*label morning\n\nFinally Siau says, \"Is that what I think it is?\"\n\n\"Yes,\" says $!{patrickname}, dismounting to lead his horse. For your benefit, he points across the cracked ground to a low ridge blocking your way. There's a glimmer of light at the base. \"$!{emmelinename}'s river. We follow it through those hills and we'll be able to see her house.\"\n\nYou trudge across the plain and bury your whole face in the cool water, drinking until you feel sick. Everyone else—including the horses but excluding those made of metal—is doing the same. You shelter from the hot sun under an arched bridge made of cream-coloured limestone blocks. The entire arch is solid, so there's not much room beneath it, but the shade is welcome.\n\n\"I helped make that,\" $!{matildaname} says with a smile. \n\nShe's the only one smiling as everyone is anticipating the awkward and dangerous day ahead. $!{patrickname} and $!{matildaname} are escorting two armed enemies into their stronghold, and Siau and William are escorting a weapon safely into the clutches of their enemy. Each person is honor-bound to finish the journey, but must be wondering about the honor of their companions.\n\nAfter a rest, your stomach growls and you're eager to move on. It's finally time to see $!{emmelinename}—and food.\n*page_break\nTogether you follow the river downstream through a steep gorge that's as good as a road through the mountains, although it's so narrow your route lies entirely in shadow. When you see sunlight shining on the water ahead, you're not ashamed to find yourself walking faster than you've moved in days. As you break free of the cliffs you find yourself in a wide valley, sheltered by tall hills all around, with the river slicing it in two, cutting through the mountains as it enters and leaves the valley. It looks like a paradise, and straight ahead there's a log cabin perched on the opposite ridge. $!{emmelinename}'s found herself a simple life with beautiful views not just of the valley itself but of the enormous mansion on the plateau above. \n\nYou point at the cabin. \"Did you help build that too?\"\n\n\"Yep,\" says $!{matildaname}. \"But that's not where we're heading.\"\n\nYou re-examine the valley in confusion, and finally notice the deeper shadows at the base of the hills on the Eastern side. \"Does $!{emmelinename} own the caves?\"\n\n\"Yes,\" said $!{matildaname}. \"And the hut. And the valley—including the river, the spring, and the mountains. And that fort.\" She points at the very top of the half-finished main tower of the mansion, where a tiny figure is just visible, and waving. \n\nYour sister is here, right in front of your eyes—and she's rich.\n*page_break\n\"Oh look,\" $!{matildaname} continues with a cheeky smile. \"She's seen us. Shall we?\"\n\nIt's hard to believe that tiny figure is the sister whose laughter and teasing filled the first half of your childhood, right up until… \n\nWith an effort, you choose not to think about that awful time. It really is over now.\n\nYou squint up at the golden limestone of the mansion, noticing its two square towers—one finished, and one twice as tall but built mainly of scaffolding with enormous gaps between floors. The fort looks very like a castle. And there, waving so hard she looks ready to fly away, is your big sister. \n\nShe's really there.\n*set emmelinebond %+10\n*choice\n\t#I yell, \"Cooooeeeee!\" so $!{emmelinename} knows I've settled in to Australian life.\n\t\t*set matildabond %+10\n\t\t*set patrickbond %+10\n\t\t*goto house\n\t#I give her an exuberant wave so she knows I've seen her.\n\t\t*set emmelinebond %+10\n\t\t*set happiness +5\n\t\t*set contentment %-10\n\t\t*goto house\n\t#I hug $!{siblingname}. This is an emotional moment for us.\n\t\t*set contentment %-10\n\t\t*set siblingbond %+10\n*label house\n\nYou start walking across the valley basin and when you're about halfway across you see $!{emmelinename}'s tiny figure descending the steep path down the cliffs in front of the mansion. As she reaches the ground, she's blocked from your view by a stand of eucalyptus trees, but in moments she bursts from the trees at a full run towards you. What do you do?\n*choice\n\t#Run to meet her.\n\t\t*set emmelinebond %+10\n\t\t*set contentment %-10\n\t\tLeaving everything behind, you race for the sister you mourned. Your stomach aches with hunger and your legs shake under you, but all you can see is her slight figure crying and sprinting across the scrubby grass. You're a full head taller than her, and still growing. When you throw your arms around her it's like hugging a child. But she's not a child—and neither are you.\n\t\t*if ((novellinkarabella) or (novellinkjeremy))\n\t\t\tA jet of steam almost scalds your hand as her brass and silver heart briefly vents some excess pressure at the emotional meeting.\n\t\t\t*goto soldier\n\t\t*else\n\t\t\tThe joints of her brass and silver hand catch the ends of your hair, and you both laugh jerkily as you pull apart.\n\t\t\t*goto soldier\n\t#Burst into tears.\n\t\t*set contentment %-10\n\t\t*set emmelinebond %+10\n\t\tThrough your tears, you watch your sister pelt across the hard ground with tears running down her face. You're a full head taller than her, and still growing. When you throw your arms around her it's like hugging a child. But she's not a child—and neither are you.\n\t\t*if ((novellinkarabella) or (novellinkjeremy))\n\t\t\tA jet of steam almost scalds your hand as her brass and silver heart briefly vents some of her excess pressure at the emotional meeting.\n\t\t\t*goto soldier\n\t\t*else\n\t\t\tThe joints of her brass and silver hand catch the ends of your hair, and you both laugh jerkily as you pull apart.\n\t\t\t*goto soldier\n\t#Watch her as she comes to me.\n\t\t*set contentment %+10\n\t\t*set science %+10\n\t\tYou watch your sister pelt across the hard ground with tears running down her face. You're a full head taller than her, and still growing. When you throw your arms around her it's like hugging a child. But she's not a child—and neither are you.\n\t\t*if ((novellinkarabella) or (novellinkjeremy))\n\t\t\tA jet of steam almost scalds your hand as her brass and silver heart briefly vents some of her excess pressure at the emotional meeting.\n\t\t\t*goto soldier\n\t\t*else\n\t\t\tThe joints of her brass and silver hand catch the ends of your hair, and you both laugh jerkily as you pull apart.\n*label soldier\n$!{emmelinename} and $!{siblingname} embrace, and you feel a physical pressure in your chest release now that the two members of your family are here together.\n\nIt's so strange to think of your big sister—who is so very little—apparently running a guerilla rebellion. But you look up and see a long line of people standing at attention all along the roof of her mansion, and a score more silently lining the hillside beside the log cabin. This is her army awaiting her command.\n\nBut when you look at her face all you see is her big eyes staring at you—the exact same\n*if ((novellinkarabella) or (novellinkjeremy))\n\tblue\n\t*goto eyes\n*else\n\tbrown\n*label eyes\nas $!{siblingname}'s.\n*choice\n\t#It's been years since I felt such perfect happiness.\n\t\t*set happiness +5\n\t\t*set contentment %-10\n\t\tYou can't stop crying tears of joy. $!{emmelinename} produces a handkerchief and gently wipes your eyes.\n\t\t*goto clock\n\t#I'm furious for all the pain she caused us by not telling us she was alive.\n\t\t*set contentment %-10\n\t\t\"You left us!\" you scream, shocked at the noise of your own voice. \"They told us you were dead and you didn't even let us know! How dare you? Do you have any idea what you've done to us all these years?\"\n\t\t\n\t\tShe lowers her gaze in shame. \"I'm so, so sorry. It was meant to keep you safe.\"\n\t\t\n\t\t\"How would losing your life help us?\"\n\t\t\n\t\t\"Your reputation,\" she whispers. \"I didn't want people to know you had a convict for a sister.\"\n\t\t\n\t\tIn an instant you're thrown back to the days of pickpocketing and disguises. That all seems such a long time ago, back when your wealthy reputation was all you had. You force yourself to speak. \"All right. I… understand.\"\n\t\t*goto clock\n\t#I have to tell her about the soldier right away.\n\t\t*set kindness %-10\n\t\t\"$!{emmelinename},\" you say, gently taking her arms and pushing her away. \"There's something you need to know at once.\"\n*label clock\n\nShe stares over your shoulder. \"What is that thing!?!\"\n\nSomeone has ordered the clockwork soldier to stand fully upright. So much for secrecy. Its glowing eyes are fixed on $!{emmelinename}. $!{matildaname} draws her gun and carefully cocks it immediately behind the soldier—just in case it attacks $!{emmelinename} and she has to shoot it. \n\nConfident that $!{matildaname} will protect $!{emmelinename} if the soldier is designed to attack, you tell the machine, \"This is $!{emmelinename} $!{last_name}.\"\n\nThe soldier immediately drops to one knee, bowing its head in submission.\n\n\"Bing,\" it says. \"Bing, bing, bing, bing, bing.\"\n*page_break\n$!{emmelinename} walks slowly to the soldier. \"Stand up,\" she says.\n\nThe soldier stands.\n\n\"Am I your… owner?\" she asks.\n\n\"Bing.\"\n\n\"You'll do everything I ask?\"\n\n\"Bing.\"\n\n\"If someone else commands you, will you obey them?\"\n\n\"Parp.\"\n\n\"Okay.\" She reaches forwards calmly and traces the engraving on its chest. When she touches the spiral, she gasps and jerks backwards.\n*page_break\n\"What is it?\" you ask her urgently. \"What's wrong? Is it a threat?\"\n\nShe stares at you, and her eyes take a moment to focus. \"$!{first_name},\" she says. \"And $!{siblingname}. Oh. Good. Everyone's here.\"\n\n\"What does the spiral carving mean?\" asks $!{siblingname} impatiently.\n\n$!{emmelinename} gives you both a crooked smile. \"It means Father is alive. He made this.\" She waves at the automaton. \"It's a warning—or a threat. Or both. He hoped I would see it and surrender.\" Her gaze turns distant. \"He never was good at reality, and he must have been so sure of himself he managed to convince his superiors I'd simply give up at the sight of it. If he hadn't, the soldier would never have made it all the way to me.\"\n\nYou reflexively shake your head, but you can tell she remembers your father all too well. If it wasn't for the fact that you were the one to find Mother's body the day she died, you'd think your entire family had come back from the grave. In his own twisted way, Father is still attempting to protect you—as he invents war machines to suppress a continent's bid for independence.\n\nMemories of Father threaten to overwhelm you: telling nightmare-inducing stories; giving coal-scented hugs; and always, always, the tinkering in his basement lab. He used to let you clean the grease from cogs when you were no taller than his waist.\n\nHow do you get $!{emmelinename} to tell you more of what she knows?\n*choice\n\t#I say, \"I can tell something’s wrong. Are you all right?\"\n\t\t*if kindness >70\n\t\t\t$!{emmelinename} gathers herself. \"I suppose I'm not the only member of our family that was declared dead by a court of law. I've heard rumors for a while now that Prince Albert has a secret laboratory under Buckingham Palace. Father's early experiments were terribly illegal—she unconsciously touches her own brass skin—but brilliant. For a scientist like Prince Albert, he must have been too good to waste .\" \n\t\t\t\n\t\t\t\"He's here,\" you say. \"In Australia. We saw some of his… creations. They were fresh.\"\n\n\t\t\tShe glances towards the nearby darkness of the limestone caves. \"He knows I'm here, and alive. I wonder if this was intended as a warning or a threat.\"\n\t\t\t\n\t\t\tThe soldier's eyes close.\n\t\t\t\n\t\t\t\"Well,\" she says briskly, \"I happen to know how to take care of myself—and I know a thing or two about reverse engineering, too. Shall we go to the fort?\"\n\t\t\t*set emmelinebond %+10\n\t\t\t*set siblingbond %+10\n\t\t\t*set mechanical +5\n\t\t\t*goto takesides\n\t\t*elseif kindness >60\n\t\t\t$!{emmelinename} gathers herself. \"I suppose I'm not the only member of our family that was declared dead by a court of law. I've heard rumors for a while now that Prince Albert has a secret laboratory under Buckingham Palace. Father's experiments were terribly illegal—she unconsciously touches her own brass skin—but brilliant. For a scientist like Prince Albert, he must have been too good to waste .\" \n\t\t\t\n\t\t\t\"He's here,\" you say. \"In Australia. We saw some of his… creations. They were fresh.\"\n\n\t\t\t\"Ah,\" she says. \"Shall we go to the fort?\"\n\t\t\t*set emmelinebond %+10\n\t\t\t*set mechanical +5\n\t\t\t*goto takesides\n\t\t*else\n\t\t\t\"Well,\" says $!{emmelinename} briskly, \"I happen to know a thing or two about reverse engineering. Shall we go to the fort?\"\n\t\t\t*goto takesides\n\t#I crouch to see what she’s seen – that spiral on the automaton's chest. \n\t\t*if science >70\n\t\t\t$!{emmelinename} gathers herself. \"I suppose I'm not the only member of our family that was declared dead by a court of law. I've heard rumors for a while now that Prince Albert has a secret laboratory under Buckingham Palace. Father's experiments were terribly illegal—she unconsciously touches her own brass skin—but brilliant. For a scientist like Prince Albert, he must have been too good to waste .\" \n\t\t\t\n\t\t\t\"He's here,\" you say. \"In Australia. We saw some of his… creations. They were fresh.\"\n\n\t\t\tShe glances towards the nearby darkness of the limestone caves. \"He knows I'm here, and alive. I wonder if this was intended as a warning or a threat.\"\n\t\t\t\n\t\t\tThe soldier's eyes close.\n\t\t\t\n\t\t\t\"Well,\" she says briskly, \"I happen to know how to take care of myself—and I know a thing or two about reverse engineering. Shall we go to the fort?\"\n\t\t\t*set emmelinebond %+10\n\t\t\t*set siblingbond %+10\n\t\t\t*set mechanical +5\n\t\t\t*goto takesides\n\t\t*elseif science >60\n\t\t\t$!{emmelinename} gathers herself. \"I suppose I'm not the only member of our family that was declared dead by a court of law. I've heard rumors for a while now that Prince Albert has a secret laboratory under Buckingham Palace. Father's experiments were terribly illegal—she unconsciously touches her own brass skin—but brilliant. For a scientist like Prince Albert, he must have been too good to waste .\" \n\t\t\t\n\t\t\t\"He's here,\" you say. \"In Australia. We saw some of his… creations. They were fresh.\"\n\n\t\t\t\"Ah,\" she says. \"Shall we go to the fort?\"\n\t\t\t*set emmelinebond %+10\n\t\t\t*set mechanical +5\n\t\t\t*goto takesides\n\t\t*else\n\t\t\tYou trace the spiral engraving with one finger, but it doesn't inspire any more family memories.\n\t\t\t\n\t\t\t\"Well,\" says $!{emmelinename} briskly, \"I happen to know a thing or two about reverse engineering. Shall we go to the fort?\"\n\t\t\t*goto takesides\n\t#I examine the soldier with new eyes.\n\t\t*if contentment >70\n\t\t\t$!{emmelinename} gathers herself. \"I suppose I'm not the only member of our family that was declared dead by a court of law. I've heard rumors for a while now that Prince Albert has a secret laboratory under Buckingham Palace. Father's experiments were terribly illegal—she unconsciously touches her own brass skin—but brilliant. For a scientist like Prince Albert, he must have been too good to waste .\" \n\t\t\t\n\t\t\t\"He's here,\" you say. \"In Australia. We saw some of his… creations. They were fresh.\"\n\n\t\t\tShe glances towards the nearby darkness of the limestone caves. \"He knows I'm here, and alive. I wonder if this was intended as a warning or a threat.\"\n\t\t\t\n\t\t\tThe soldier's eyes close.\n\t\t\t\n\t\t\t\"Well,\" she says briskly, \"I happen to know how to take care of myself—and I know a thing or two about reverse engineering. Shall we go to the fort?\"\n\t\t\t*set emmelinebond %+10\n\t\t\t*set siblingbond %+10\n\t\t\t*set mechanical +5\n\t\t\t*goto takesides\n\t\t*elseif contentment >60\n\t\t\t$!{emmelinename} gathers herself. \"I suppose I'm not the only member of our family that was declared dead by a court of law. I've heard rumors for a while now that Prince Albert has a secret laboratory under Buckingham Palace. Father's experiments were terribly illegal—she unconsciously touches her own brass skin—but brilliant. For a scientist like Prince Albert, he must have been too good to waste.\" \n\t\t\t\n\t\t\t\"He's here,\" you say. \"In Australia. We saw some of his… creations. They were fresh.\"\n\n\t\t\t\"Ah,\" she says. \"Shall we go to the fort?\"\n\t\t\t*set emmelinebond %+10\n\t\t\t*set mechanical +5\n\t\t\t*goto takesides\n\t\t*else\n\t\t\tYou trace the spiral engraving with one finger, but it doesn't inspire any more family memories.\n\t\t\t\n\t\t\t\"Well,\" says $!{emmelinename} briskly. \"I happen to know a thing or two about reverse engineering. Shall we go to the fort?\"\n*label takesides\n\nWilliam coughs. \"I imagine that invitation doesn't extend to my companion and I, since we are, after all, your enemies.\"\n\n$!{emmelinename} steps forwards and shakes his hand. \"Thank you for accompanying my brother and sister on a difficult journey. You are welcome to join us for a meal, or you may join your fellows at once if you prefer.\" She gives him a brittle smile. \"I believe they have enough food and water for the moment—they're hiding in my caves just over there. My people have been watching them sneak in at night for weeks now.\"\n\n$!{siblingname} speaks up. \"$!{emmelinename}… I intend to join them. We are British, are we not?\"\n\nThe bottom drops out of your world as you realize two of your siblings will shortly become mortal enemies. \n\n*page_break\n$!{emmelinename} tries hard not to show her shock. \"I thought… once you were here, you would see the way things are.\"\n\n\"You're starting a war!\" says $!{siblingname}. \"Maybe there are a few bad eggs among the redcoats, but you can't truly think it's worth risking so many lives!\"\n\n$!{emmelinename} bites her lip. \"I do. It is—worth my life, I mean, and the risk of those who choose to join me. I should have realized you'd need more time to make the right decision.\"\n\n\"It is the right decision,\" $!{siblingname} says. \"Your people are the aggressors here. What has happened to you?\"\n\n\"I grew up,\" says $!{emmelinename} softly, visibly gathering her thoughts. \"When I realized none of my letters were reaching you, I thought the palace saw you as a threat to British rule, so I sent $!{matildaname} to—to rescue you. I thought that if you were here, I could protect you. But it's not up to me to protect you any more. I can't force you to see sense, but there is one thing I can do for you without hurting my own cause.\" She flicks a defiant glance at William before turning back to $!{siblingname}. \"I have a good grasp of when the battle will start. It won't be long, but it won't be this afternoon. Please join me as my family for this one remaining moment of peace, and I'll see you're delivered safely to your friends when the time comes.\"\n\nThey both turn and look at you expectantly, and suddenly the penny drops. You have to choose what you believe is worth fighting for—the time for talking is over, and your loyalties must be prioritized right now.\n*fake_choice\n\t\t#I'll fight for Britain’s peaceful rule.\n\t\t\t*set emmelinebond %-10\n\t\t\t*set siblingbond %+10\n\t\t\t*set matildabond %-20\n\t\t\t*set patrickbond %-10\n\t\t\t*set siaubond %+10\n\t\t\t*set williambond %+10\n\t\t\t*set probritish true\n\t\t#I'll fight for Australia’s independence.\n\t\t\t*set emmelinebond %+10\n\t\t\t*set siblingbond %-10\n\t\t\t*set matildabond %+10\n\t\t\t*set patrickbond %+10\n\t\t\t*set siaubond %-10\n\t\t\t*set williambond %-20\n\t\t\t*set procolonial true\n\t\t#I’m not going to fight; I’ll set up a safe place for the wounded. \n\t\t\t*set matildabond %-10\n\t\t\t*set patrickbond %-10\n\t\t\t*set siaubond %+10\n\t\t\t*set williambond %-20\n\t\t\t*set contentment %+10\n\t\t\t*set discretion %-10\n\t\t\t*set kindness %+10\n*if probritish\n\t$!{emmelinename} understands but $!{matildaname} is furious.\n\t*if (matildalove) and (matildabond \u003c50)\n\t\t\"I thought you actually respected me,\" she says to you. With that, your relationship is over.\n\t\t*set matildalove false\n\t\t*set happiness -20\n\t\t*goto end\n\t*else\n\t\t*goto end\n*elseif procolonial\n\t$!{siblingname} understands, but William is furious.\t\n\t*if (williamlove) and (williambond \u003c50)\n\t\t\"I thought you actually respected me,\" he says to you. With that, your relationship is over.\n\t\t*set happiness -20\n\t\t*set williamlove false\n\t\t*goto end\n\t*else\n\t\t*goto end\n*else\n\tWilliam and $!{matildaname} are furious.\n\t*if (williamlove) and (williambond \u003c50)\n\t\t\"I thought you actually respected me,\" William says to you. With that, your relationship is over.\n\t\t*set williamlove false\n\t\t*set happiness -20\n\t\t*goto end\n\t*elseif (matildalove) and (matildabond \u003c50)\n\t\t\"I thought you actually respected me,\" $!{matildaname} says to you. With that, your relationship is over.\n\t\t*set matildalove false\n\t\t*set happiness -20\n\t\t*goto end\n\t*else\n*label end\nYou refuse to listen to their arguments, but try to be as polite as possible. \n\nSiau and William get down from their stolen horses and say a carefully emotionless farewell before walking towards the caves. \n*if ((siaulove) or (williamlove))\n\tYour heart breaks at the parting.\n\t*goto therest\n*else\n*label therest\n\nThe rest of you follow the river across the valley floor and through the gorge splitting the fort's plateau from the log cabin's ridge. The horses constantly wander back into the stream to drink, and you let them. After your journey, the sight of so much fresh water is dazzling.\n\nAt the back of the fort, the steep cliffs change into a gentle slope. You can't help noticing it's the weak point in the fort's natural defenses. If the British can somehow avoid the dangerous bottleneck of the gorge beside the fort, they will have an excellent chance of overrunning the entire building. You wonder if the Eastern caves go all the way through the mountains—if so, the fort is not nearly as safe as it looks.\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n*finish", "8": "$!{emmelinename} puts on an elaborate feast for you—roasted lamb with rosemary, baked cod, freshly-baked bread with dripping, and an endless supply of sweet black tea. She begs you for news of Belgravia, and regales you with tales of her new life as an Australian. You could talk to her forever, but the constant whispered interruptions by her commanders are a reminder that everything is about to change. It doesn't help that $!{siblingname} has a nervous habit of drumming on the wooden table with\n*if pcismale\n\ther hands.\n\t*goto drumm\n*else\n\this hands.\n*label drumm\n\nAt last $!{emmelinename} and \n*if ((novellinkarabella) or (novellinkjeremy))\n\t$!{matildaname}\n\t*goto getaroom\n*else\n\t$!{patrickname}\n*label getaroom\nexcuse themselves, and it's clear they have a more intimate reunion planned. It's terribly improper, but the way they look at each other makes you happy for your sister. $!{emmelinename} is happy, and whatever happens next that's one good thing.\n\nIt's strange to fall asleep on a bed once more, but your eyes close at once.\n*page_break\nYou wake sometime after midnight, confused by your unfamiliar surroundings. When you remember the painful fact that your freshly-reunited family is already divided you are unable to go back to sleep. \n\nAfter pacing back and forth, you decide to do something useful. Now that you know Father is the creator of the clockwork soldier, you may see something you missed before. Taking your blade with you, you go to examine it.\n\nYou know it was left quiescent in an alcove not far from the dining room, so you find it easily enough.\n\n\"Hello?\" you say to it. \"I know my sister is your master, but will you also obey me?\"\n\nThe eyes snap open. \"Parp!\" It yells, and twinned blades slot into battle positions on its arms. \"Parp! Parp! Parp!\"\n\nIt steps out of the alcove and lifts its weapons. $!{emmelinename} must have set it to self-defend against interference! It's going to kill you!\n\nHow do you fight the soldier?\n*choice\n\t\t#I have to disable it somehow! \n\t\t\t*set mechanical +5\n\t\t\t*if ((tin) or (silver)) and (mechanical>70)\n\t\t\t\tYou know it has to have tin parts somewhere—but where?\n\t\t\t\t\n\t\t\t\tTerrified of those blades, you force yourself to stand still and truly look at the soldier—and you find what you were looking for: tin joints on the knees. As the soldier swings a blade down at you, you drop your own and grab its arm, pushing it down farther so the harder sword slices right into the soldier's own weak point—and it sticks!\n\t\t\t\t\n\t\t\t\tBent awkwardly, the soldier parps at you and raises the other blade. The trick isn't going to work twice, and you stumble backwards into a wall. You get tangled in a velvet curtain and trip over.\n\t\t\t\t\n\t\t\t\t\"Bing,\" says the soldier viciously, and shuffles towards you.\n\t\t\t\t*page_break\n\t\t\t\t*set courage +5\n\t\t\t\t*goto a\n\t\t\t*elseif ((tin) or (silver)) or (mechanical>70)\n\t\t\t\tYou know it has to have tin parts somewhere—but where?\n\t\t\t\t\n\t\t\t\tTerrified of those blades, you force yourself to stand still and truly look at the soldier—and you find what you were looking for: tin joints on the knees. As the soldier swings a blade down at you, you drop your own and grab its arm, pushing it down farther so the harder sword slices right into the soldier's own weak point—and it sticks! \n\t\t\t\t\n\t\t\t\tBent awkwardly, the soldier parps at you and raises the other blade. The trick isn't going to work twice, and you stumble backwards into a wall. You get tangled in a velvet curtain and trip over.\n\t\t\t\t\n\t\t\t\t\"Bing,\" says the soldier viciously, and shuffles towards you.\n\t\t\t\t*page_break\n\t\t\t\t*set courage +5\n\t\t\t\t*goto a\n\t\t\t*else\n\t\t\t\tYou can see its knees have weaker tin in them, but there's absolutely nothing you can do about it.\n\t\t\t\t\n\t\t\t\tTerrified, you stumble backwards into a wall. You get tangled in a velvet curtain and trip over.\n\t\t\t\t\n\t\t\t\t\"Bing,\" says the soldier viciously, and shuffles towards you. Unable to retreat, all you can do is cover your head with your arms and lift your blade as a shield. The soldier hits you once, and blood flows down your arm. You have a horrible feeling it's playing with you, like a cat with a wounded mouse.\n\t\t\t\t*page_break\n\t\t\t\t*set wounded true\n\t\t\t\t*goto a\n\t\t#I run—and scream for $!{emmelinename} to help!\n\t\t\tYou bolt down a hallway, yelling for help. The soldier gives chase! \n\t\t\t\n\t\t\tYou run up a stairway, but that's no obstacle. When you see a door standing ajar, you race inside and slam it after you—but the soldier slices through the wood like butter. You call for $!{emmelinename} again, and lift your blade to fight. The soldier steps through the shattered door.\n\t\t\t\t\n\t\t\tTerrified, you stumble backwards into a wall. You get tangled in a velvet curtain and trip over.\n\t\t\t\t\n\t\t\t\"Bing,\" says the soldier viciously, and shuffles towards you. Unable to retreat, all you can do is cover your head with your arms, lifting your blade as a shield. The soldier hits you once, and blood flows down your arm. You have a horrible feeling it's playing with you, like a cat with a wounded mouse.\n\t\t\t*set wounded true\n\t\t\t*page_break\n\t\t\t*goto a\n\t\t#I have to find its weakness—now!\n\t\t\t*set mechanical +5\n\t\t\t*if ((brass) or (iron)) and ((courage>70) or (brass1))\n\t\t\t\tIf its knees break, it won't be able to walk.\n\t\t\t\t\n\t\t\t\tAs the soldier swings a blade down at you, you drop your own weapon and grab its arm, pushing it down farther so the harder sword slices right into the soldier's own weak point—and it sticks!\n\t\t\t\t\n\t\t\t\tBent awkwardly, the soldier parps at you and raises the other blade. The trick isn't going to work twice, and you stumble backwards into a wall. You get tangled in a velvet curtain and trip over.\n\t\t\t\t\n\t\t\t\t\"Bing,\" says the soldier viciously, and shuffles towards you.\n\t\t\t\t*set courage +5\n\t\t\t\t*page_break\n\t\t\t\t*goto a\n\t\t\t*elseif ((brass) or (iron)) or (courage>70)\n\t\t\t\tIf its knees break, it won't be able to walk.\n\t\t\t\t\n\t\t\t\tAs the soldier swings a blade down at you, you drop your own weapon and grab its arm, pushing it down farther so the harder sword slices right into the soldier's own weak point—and it sticks! Your own hand is dripping blood, and you realize you touched the blade.\n\t\t\t\t\n\t\t\t\tBent awkwardly, the soldier parps at you and raises the other blade. The trick isn't going to work twice, and you stumble backwards into a wall. You get tangled in a velvet curtain and trip over.\n\t\t\t\t\n\t\t\t\t\"Bing,\" says the soldier viciously, and shuffles towards you.\n\t\t\t\t*set courage +5\n\t\t\t\t*set wounded true\n\t\t\t\t*page_break\n\t\t\t\t*goto a\n\t\t\t*else\n\t\t\t\tIf its knees break, it won't be able to walk—but you can't possibly get close enough to hit it.\n\t\t\t\t\n\t\t\t\tTerrified, you stumble backwards into a wall. You get tangled in a velvet curtain and trip over.\n\t\t\t\t\n\t\t\t\t\"Bing,\" says the soldier viciously, and shuffles towards you. Unable to retreat, all you can do is cover your head with one arm, lifting your blade as a shield. The soldier hits you once, and blood flows down your arm. You have a horrible feeling it's playing with you, like a cat with a wounded mouse.\n\t\t\t\t*page_break\n\t\t\t\t*set wounded true\n*label a\n\n\"Stop!\" $!{emmelinename} cries. \"Don't move, soldier!\"\n\t\t\t\t\nThe soldier stops dead.\n\t\t\t\t\nYou manage to get up and take several steps away from those swords. \"$!{emmelinename}!\" Your heart is beating fit to burst, but you pull yourself together. \"I confess I'm terribly glad to see you.\"\n\t\t\t\t\n\"Good morning,\" she says shakily. \"Are you all right?\"\n\t\t\t\t\n\"More or less.\"\n\t\t\t\t\nShe stares at the soldier, and back at you. \"It's comforting to know you're still the little brat who goes through my stuff when I'm not looking.\"\n\t\t\t\t\n\"I… um…\"\n\t\t\t\t\nShe grins, and starts laughing so hard she ends up collapsed on the floor.\n\t\t\t\t\n\"You're not angry?\" you ask\n*if wounded\n\t, more concerned now about your sister than your own aching body. She shakes her head, and pulls medical supplies from a cupboard to patch you up. \n\t\n\t\"Is it going to attack me again?\"\n\t*goto hahaha\n*else\n\t.\n*label hahaha\n\t\t\t\t\nShe shakes her head, abruptly sober. \"I'm the fool who set it to self-defend and nearly—\" She stops, and cocks her head. \"Do you hear that?\"\n\t\t\t\t\nYou listen, and for a moment you hear nothing. Then you hear it—the rhythmic march of hundreds of feet. Hundreds of metal feet.\n\t\t\t\t\nThe clockwork army is here.\n\t\t\t\t\n*if probritish\n\t*set britishanger 97\n\t*set colonialanger 96\n\t*finish\n*else\n\t*set britishanger 96\n\t*set colonialanger 97\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n*finish\n", "9a": "*set colonialanger 100\n*set britishanger 100\n$!{emmelinename} steps around you and pulls on a string behind the curtain. Moments later, bells start ringing in all directions, and you hear shouts of alarm and running feet. \n\nYou run back to your room with $!{emmelinename} and retrieve your\n*if pcismale\n\tsword cane, \n\t*goto knife\n*else\n\tparasol knife, \n*label knife\nsuddenly feeling a pang of regret that you don't happen to own a brace of pistols. Although they're time-consuming to reload and useless at close quarters, it would make you feel better. \n\nYou unsheath your blade, knowing the few moments it takes to release could mean the difference between life and death. It feels so wrong to run around with a naked blade; it's just not safe. You almost laugh at your own naiveté. This is a battle for the fate of a nation. Whatever happens, people will get hurt.\n\n\"Are you sure you want to do this?\" $!{emmelinename} says.\n*fake_choice\n\t#I'm determined to fight for the British.\n\t\t*set procolonial false\n\t\t*set probritish true\n\t#I'm determined to fight for the independents.\n\t\t*set probritish false\n\t\t*set procolonial true\n\t#I'm determined not to fight.\n\t\t*set probritish false\n\t\t*set procolonial false\n*if distracted\n\t*set contentment %-20\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto givethemashot\n\t*else\n\t\t*goto givethemashot\n*else\n*label givethemashot\n\"I'm glad you're sure,\" she says, but you see the worry in her eyes.\n\nLooking into $!{siblingname}'s room, you see nothing but a rumpled bed. \n\n$!{emmelinename} squeezes your hand in sympathy. \n\n\"I wish I could have said goodbye. What if—\"\n\n\"Don't even say it!\"\n\nYou swallow hard.\n*page_break\n\"It's strange,\" she says. \"My spies reported another two days' wait, at least. It's almost as if the British were waiting for you to arrive.\"\n\n\"Or the clockwork soldier,\" you say absently.\n\n\"Yes,\" she says. \"That's exactly it. Poor Father must have hoped I would see his message and surrender at once. He's—sweet, in his way.\" She shakes herself out of a mixture of feelings far too complicated for the day. \n\n*if procolonial\n\t\"I instructed my best women to take $!{siblingname} safely to the caves if things happened quickly. We must have just missed them.\" The pair of you shiver with horror at what the day might bring. But right now everyone's life is on the line—and you need to move quickly.  \n\t\n\tWhere do you want to fight?\n\t*choice\n\t\t#I'm best suited to observing the scene and relaying information.\n\t\t\t*set science %+10\n\t\t\t\"Great,\" says $!{emmelinename} with a grin. \"You're with me.\"\n\t\t\t\n\t\t\tShe races towards the taller o
