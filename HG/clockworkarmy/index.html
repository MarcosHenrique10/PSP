oto moving\n*elsif siblinghurt\n\t$!{siblingname}'s hand slowly heals, although you often hear moans of pain through your door at night. When the bandages finally come off, they reveal a tortured claw where a hand used to be.\n\t*goto moving\n*elsif siblingbrain\n\t$!{siblingname} continues to insist that getting knocked unconscious hasn't had any permanent effect, but you can tell the injury has taken a toll on \n\t*if pcismale\n\t\ther\n\t\t*goto gender\n\t*else\n\t\this\n\t\t*label gender\n\t\tmemory and concentration.\n\t\t*goto moving\n*else\n*label moving\nHow do you cope with the trauma of the storm?\n*choice\n\t#Think about something else.\n\t\t*set kindness %-10\n\t\t*set contentment %+10\n\t\tSick of wondering if you could have done something differently, you force your mind to gnaw on something else. \n\t\t*goto sibdone\n\t#What trauma? I'm glad it wasn't worse.\n\t\t*set contentment %+10\n\t\t*set happiness +5\n\t\t*goto sibdone\n\t*hide_reuse #Talk it out with $!{siblingname}.\n\t\t*set kindness %+10\n\t\t*set siblingbond %+10\n\t\t$!{siblingname} is different—\n\t\t*if siblingbrain\n\t\t\tthe sharp wit that always outsmarted you is gone. $!{siblingname}'s mind was damaged somehow, and the effects may be permanent.\t\t\t\t\n\t\t\t*goto moving\t\n\t\t*elseif siblinghurt\n\t\t\tquite clearly pretending not to be in constant pain.\n\t\t\t*goto moving\n\t\t*elseif siblingscar\n\t\t\tconstantly trying to cover the scarred side of\n\t\t\t*if pcismale\n\t\t\t\ther cheek.\n\t\t\t\t*goto moving\n\t\t\t*else\n\t\t\t\this cheek.\n\t\t\t\t*goto moving\n\t\t*else\n\t\t\tmore confident. This really is an adventure!\n\t\t\t*achieve siblingsaved\n\t\t\t*goto moving\n*label sibdone\n\nYou start thinking about the enormous crate the palace ordered $!{matildaname} to deliver to $!{emmelinename}. Surely her talk of some kind of conspiracy between the palace and the police is ridiculous… but it's true that none of $!{emmelinename}'s letters ever reached you. Unless $!{matildaname} is lying. At last you can't stand it any longer. You take $!{siblingname} aside and quietly ask if a night-time jaunt might perhaps be in order.\n\n\"Absolutely! I knew there was a reason I was sticking with you,\" \n*if pcismale\n\tshe grins.\n\t*goto hhhhh\n*else\n\the grins.\n*label hhhhh\n\n\"Other than being stuck on a ship in the middle of the Indian Ocean?\"\n\n\"Exactly.\"\n\nYou remember you're the only person left to improve \n*if pcismale\n\ther manners. \n\t*goto manners\n*else\n\this manners.\n*label manners\n\"Sarcasm isn't becoming, you know.\"\n\n\"Whatever you say, oh Wise One.\"\n\n$!{matildaname} spends most of the day in her suite, so you decide to break into her outer room when she's asleep. That night you wait until two hours after she has retired, then tie a makeshift toolkit onto your leg and have $!{siblingname} keep watch for passers-by while you work on the lock to $!{matildaname}'s room. As it turns out, the door is not even locked. \n\n$!{siblingname} glides back to you with a grin that makes you think criminal instincts must run in the family. Did it start with $!{emmelinename}, or with the illegal experiments that led to Father's execution? Or does it go generations farther back? You just hope there's an element of $!{last_name} luck to accompany the inevitable crimes as the pair of you step quietly into $!{matildaname}'s outer room, locking the door behind you.\n\nThe mysterious crate lies waiting for you.\n\n*page_break\nOne by one, you pry loose the nails holding the lid of the crate closed. $!{siblingname} puts them into a pocket for safekeeping. At last you're able to softly open the wooden lid and push aside some of the sawdust inside. You gasp as your fingers touch cold metal.\n\nYou and $!{siblingname} lean over the side of the crate and together silently scoop the sawdust away. Without speaking, your movements slow as you both realize what it is you're revealing: a face made of iron and silver, with gleaming eyelids closed as if in sleep. \n\n\"Hello?\" $!{siblingname} whispers. \"Can you hear me?\"\n\nYou raise your eyebrows at such silliness, but the metal eyes snap open!\n\n*page_break\nThe metal person faces you, and you instinctively freeze, willing it to be quiet\n*fake_choice\n\t#I have a bad feeling about this thing!\n\t\t*set science %-10\n\t#I step in front of $!{siblingname}, in case it's dangerous.\n\t\t*set siblingbond %+10\n\t#I look carefully for clues about its purpose.\n\t\t*set science %+10\n\n\"Bing,\" it says—tin's way of saying \"Yes\". Its voice is mercifully soft compared to the usual blaring \"Bing\" and \"Parp\" tin is known for. Perhaps its creator added tin parts in order to make maintenance easier, since tin can answer yes or no questions about what is wrong. \n\nSeconds later, the eyes close once more. \n\nYou and $!{siblingname} heap a large quantity of sawdust neatly onto a outspread blanket from one of $!{matildaname}'s cupboards. At last the entire artifact is revealed: a metal automaton taller than the average man, sitting with its knees drawn up to its chest. It is so lifelike you have to resist the urge to ask if it's okay. The torso is full of intricate clockwork and weaponry, and although it has hands like any human it also has a pistol on one arm and a series of deadly blades on the other. An engraving has been carved into its chest:\n\n[i]To $!{emmelinename} $!{last_name};[/i]\n*line_break\n[i]I have enclosed a new weapon of the British Army.[/i]\n\nUnderneath the message is a spiral, but no name.\n\n\"No signature,\" says $!{siblingname}. \"Where's it from?\"\n\nYou point to the royal mark on the crate, and watch $!{siblingname}'s confusion grow. \n\n\"Perhaps,\" you say slowly, \"$!{emmelinename} is working to quash the independence movement in Australia, and the throne is sending her aid.\"\n\n\"But this is only one soldier, and there's an entire colony of people itching for war.\" \n\nYou notice two small nicks in the left side of the chest, and trace around the closest cog with your finger. \"This panel was hung as it cooled. No inventor would let their prototype risk minor harm that could force them to start from the beginning.\"\n\n\"So if it's not a prototype…\"\n\n\"It's one of many. Britain has made itself a mechanical army.\"\n\n\"Why send just one to $!{emmelinename}?\" $!{siblingname} asks.\n\n\"I don't know. None of it makes sense.\"\n\nWhat do you do next? \n*choice\n\t#Look for a way to remove some of the fighting apparatus.\n\t\t*if weak_stomach\n\t\t\tNo machine should have a pistol arm. You grab your hidden screwdriver to remove it, but your attempt to focus on a complicated task brings back your seasickness tenfold, and you have to rush to the nearest porthole to empty your stomach—again.\n\t\t\t*goto kk\n\t\t*elsif science >60\n\t\t\t*set mechanical +5\n\t\t\tNo machine should have a pistol arm. You grab your hidden screwdriver and remove it, throwing it out the porthole into the ocean. There's something eerily familiar about the workmanship—the cogs have a raised centre similar to the star-marked cogs $!{emmelinename} used to make—but these are marked with a hexagon. And something about that spiral is oddly familiar. You've seen it before.\n\t\t\t*goto kk\n\t\t*elsif science >50\n\t\t\t*set mechanical +5\n\t\t\tNo machine should have a pistol arm. You grab your hidden screwdriver and remove it, throwing it out the porthole into the ocean. There's something eerily familiar about the workmanship—the cogs have a raised centre similar to the star-marked cogs $!{emmelinename} used to make—but these are marked with a hexagon. \n\t\t\t*goto kk\n\t\t*else \n\t\t\tNo machine should have a pistol arm. You grab your hidden screwdriver to remove it, but you've brought the wrong one. \n\t\t\t*if iron\n\t\t\t\tLuckily your spanner has an adjustable arm, and with the aid of its magical enhancement of your strength, you're still able to remove the pistol arm and throw it out the porthole into the ocean.\n\t\t\t\t*goto kk\n\t\t\t*else\n\t\t\t\t*goto kk\n\t#Question the soldier as if it's a person.\n\t\t*if distracted\n\t\t\tYou'll need to think of a series of yes-or-no questions that give you plenty of information without triggering any inbuilt defences. There's something eerily familiar about the workmanship—the cogs have a raised centre similar to the star-marked cogs $!{emmelinename} used to make—but these are marked with a hexagon. You miss $!{emmelinename} terribly, and you wonder if you miss her because of who she is or the way she used to carry the burden of family responsibility. $!{siblingname} is smart, but \n\t\t\t*if pcismale\n\t\t\t\tyou're the man of the house.\n\t\t\t\t*goto ahem\n\t\t\t*else \n\t\t\t\tyou're the oldest.\n\t\t\t\t*label ahem\n\t\t\t\t\t\t\n\t\t\t\tThere's a tap—tap—tapping sound coming from behind you, and you turn to see $!{siblingname}'s foot beating out a rhythm as you waste time thinking instead of acting—again. \n\t\t\t\t*goto kk\n\t\t*elsif kindness \u003c40\n\t\t\tThere's something eerily familiar about the workmanship—the cogs have a raised centre similar to the star-marked cogs $!{emmelinename} used to make—but these are marked with a hexagon. \n\t\t\t\"Did $!{emmelinename} $!{last_name}? create you?\"\n\t\t\t\n\t\t\tThe eyes grind open again. \"Parp.\"\n\t\t\t\n\t\t\t\"All right. So she didn't make you. Are you going to harm her?\"\n\t\t\t\n\t\t\t\"Parp—parp—parp—parp—parp!\"\n\t\t\t*set mechanical +5\n\t\t\t*goto kk\n\t\t*elsif kindness \u003c50\n\t\t\tThere's something eerily familiar about the workmanship—the cogs have a raised centre similar to the star-marked cogs $!{emmelinename} used to make—but these are marked with a hexagon. \"Did $!{emmelinename} $!{last_name} create you?\"\n\t\t\t\n\t\t\tThe eyes grind open again. \"Parp.\"\n\t\t\t\n\t\t\tYou and $!{siblingname} exchange a glance. If $!{emmelinename} didn't create the soldier, who did?\n\t\t\t*goto kk\n\t\t*else\n\t\t\tThe soldier utilises iron, brass, tin, and silver with the subtlety of genius. You wish you had the observational skills to understand it better. \"Who made you?\"\n\t\t\t\n\t\t\tThe eyes grind open, but the soldier doesn't speak.\n\t\t\t*goto kk\n\t#Ask $!{matildaname} about it.\n\t\tYou knock on the adjoining door and $!{matildaname} emerges wrapped in a robe. Just as you realize she's wearing nothing at all underneath, she gives you an innocent smile. \"Yes?\"\n\t\t\n\t\t\"What do you know about that crate you're taking to $!{emmelinename}?\"\n\t\t*if (xenophobia) or (discretion >50)\n\t\t\tHer gaze drifts beyond you to the crate, still standing open. \n\t\t\t\n\t\t\t\"Less than you,\" she says. \"I'm not in the habit of reading $!{emmelinename}'s mail. Perhaps because I was born in Australia, where people are apparently more civilised than those born in London.\n\t\t\t\n\t\t\tShe smiles again, but this time it's ice cold. With that, she closes the door.\n\t\t\t*set matildabond %-10\n\t\t\t*goto kk\n\t\t*elsif discretion \u003c50\n\t\t\t*label success\n\t\t\tHer gaze drifts beyond you to the crate, still standing open. \n\t\t\t\t\n\t\t\t\"Less than you,\" she says. \"Shall we?\" She goes to the crate—you stifle a gasp as her rather nice ankle is revealed—and immediately points at the chest inscription. \"What does that spiral mean?\"\n\t\t\t\t\n\t\t\t\"Why do you think I know?\"\n\t\t\t\t\n\t\t\tShe shakes her head slowly. \"How about you, $!{siblingname}?\"\n\t\t\t\t\n\t\t\t\"What are you getting at?\" you ask.\n\t\t\t\t\n\t\t\t\"Some of $!{emmelinename}'s things have that spiral on them, but she doesn't use it in her own work. I wondered if you'd seen it before.\"\n\t\t\t\t\n\t\t\tShe smiles at you again and goes back to bed.\n\t\t\t*set matildabond %+10\n\t\t\t*goto kk\n\t\t*elseif discretion \u003c40\n\t\t\t*goto success\n*label kk\n\nAs you try to figure out what the clockwork soldier means, you hear the unmistakable tread of trooper boots on the wood outside, and the rattle of an official key in the lock. You're about to get caught examining a secret weapon originating from Buckingham Palace! In seconds, you and $!{siblingname} replace the mechanical man and his sawdust in the crate, hoping $!{matildaname} doesn't suddenly emerge and make things even more awkward. Then you…\n*choice\n\t#Hide in the crate with the soldier. \n\t\t*gosub end_trial\n\t\t*if ((aluminium1) or (aluminum)) and (contentment >50)\n\t\t\tYou wriggle into place and manage to fit $!{siblingname} around your feet, slotting the lid back into place and hoping the troopers don't notice the holes where the nails should be. The troopers poke around for a long time, and you carefully regulate your breathing. Private Meng approaches to examine the crate, but Private Barker tells her not to touch Her Majesty's mail. With that, the pair leave.\n\t\t\t*set courage +5\n\t\t\t*goto theend\n\t\t*elsif contentment >50\n\t\t\tYou wriggle into place and slot the lid back on, hoping the troopers don't notice the holes where the nails should be. $!{siblingname} curses you and creeps into $!{matildaname}'s room. The troopers poke around for a long time, and you carefully regulate your breathing. Private Meng approaches to examine the crate, but Private Barker tells her not to touch Her Majesty's mail. With that, the pair leave. $!{matildaname} doesn't emerge to expose you, but $!{siblingname} is furious.\n\t\t\t*set siblingbond %-10\n\t\t\t*goto theend\n\t\t*else\n\t\t\tYou wriggle into place and slot the lid back on, hoping the troopers don't notice the holes where the nails should be. $!{siblingname} curses you and creeps into $!{matildaname}'s room. The troopers poke around for a long time, and you carefully regulate your breathing. Private Meng approaches to examine the crate, but Private Barker tells her not to touch Her Majesty's mail. With that, the pair leave. $!{matildaname} doesn't emerge to expose you, but the fear of discovery leaves you shaking. $!{siblingname} is furious.\n\t\t\t*set siblingbond %-10\n\t\t\t*set courage -10\n\t\t\t*goto theend\n\t#Hide $!{siblingname} in the crate with the soldier and look for another hiding spot.\n\t\t*gosub end_trial\n\t\t*if ((brass1) or (brass)) and (discretion \u003c50)\n\t\t\tYou help $!{siblingname} wriggle into place and hope $!{matildaname} sleeps deeply as you creep into her bedroom, feeling your brass magic helping you not to knock anything over. You crouch to look back into the outer room. The troopers poke around for a long time, and you carefully regulate your breathing. Private Meng approaches to examine the crate, but Private Barker tells her not to touch Her Majesty's mail. With that, the pair leave. $!{matildaname}'s back is to you, and she doesn't move. You can only hope that means she's asleep.\n\t\t\t*set courage +5\n\t\t\t*goto theend\n\t\t*elsif science >50\n\t\t\tYou help $!{siblingname} wriggle into place and quickly sit against the wall to $!{matildaname}'s bedroom. The troopers startle when they see you there.\n\t\t\t\t\n\t\t\t\"Hello officers,\" you say. \"I was just waiting for $!{matildaname} to wake up so we could breakfast together.\"\n\t\t\t\t\n\t\t\tThey let you stay, but it's clear they don't believe you.\n\t\t\t*set siaubond %-10\n\t\t\t*goto theend\n\t\t*else\n\t\t\tYou help $!{siblingname} wriggle into place and quickly sit against the wall to $!{matildaname}'s bedroom. The troopers startle when they see you there.\n\t\t\t\t\n\t\t\t\"Hello officers,\" you say. \"I was just waiting for $!{matildaname} to wake up so we could breakfast together.\"\n\t\t\t\t\n\t\t\tThey let you stay, but it's clear they don't believe you. Your hands are shaking in terror as they leave.\n\t\t\t*set siaubond %-10\n\t\t\t*set williambond %-10\n\t\t\t*goto theend\n\t#Grab a pack of cards and pretend to play.\n\t\t*gosub end_trial\n\t\t*if ((gold1) or (gold)) and (kindness \u003c50)\n\t\t\tThe troopers startle when they see you there.\n\t\t\t\t\t\n\t\t\t\"Hello officers,\" you say. \"We were just waiting for $!{matildaname} to wake up so we could breakfast together.\"\n\t\t\t\t\t\n\t\t\tThey wish you well and decline your cheery offer to join the game.\n\t\t\t\t\n\t\t\t\"Huh,\" says $!{siblingname}. \"And I had a royal flush, too.\"\n\t\t\t*set siaubond %+10\n\t\t\t*goto theend\n\t\t*elsif kindness \u003c50\n\t\t\tThe troopers startle when they see you there.\n\t\t\t\t\t\n\t\t\t\"Hello officers,\" you say. \"We were just waiting for $!{matildaname} to wake up so we could breakfast together.\"\n\t\t\t\t\t\n\t\t\tThey leave, but it's clear they don't believe you.\n\t\t\t\t\n\t\t\t\"Huh,\" says $!{siblingname}. \"And I had a royal flush, too.\"\n\t\t\t*set williambond %-10\n\t\t\t*goto theend\n\t\t*else\n\t\t\tThe troopers startle when they see you there.\n\t\t\t\t\t\t\n\t\t\t\"Hello officers,\" you say. \"We were just waiting for $!{matildaname} to wake up so we could breakfast together.\"\n\t\t\t\t\t\t\n\t\t\tThey leave, but it's clear they don't believe you. You're shaking so badly your cards fall from your fingers and scatter on the floor.\n\t\t\t\t\t\n\t\t\t\"Huh,\" says $!{siblingname}. \"And I had a royal flush, too.\"\n\t\t\t*set siaubond %-10\n\t\t\t*set williambond %-10\n*label theend\n\nYou shiver as if the shadow of Newgate Prison stretches all the way to your steamer. That was a close call.\n*set britishanger +10\n*set colonialanger +10\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n*finish\n\n*label end_trial\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n*purchase adfree $3.99 purchased\n*abort", "3": "More weeks pass by on the endless ocean. You get to know both the soldiers and the other passengers—including several free settlers. The soldiers and settlers studiously avoid one another, since the settlers are hoping Australia achieves independence while the soldiers will soon be risking their lives to keep Australia under Her Majesty's control. It doesn't make for a pleasant game of cards. You find yourself placed uncomfortably between two camps, and often hear arguments for either side. The news stories you tutted over in your drawing-room have come to bloody life, and you hope the coming battle takes place far away from you and yours. Having met British nationals who want a fresh start in an independent Australia, your own perspective isn't quite as black and white as it once was.\n\nAustralia's contested shores draw ever closer. \n\n\"Wake up! Wake up!\"\n\nYou open bleary eyes to the sight of a grinning $!{siblingname}. \"What do you want?\"\n\n\"Come up!\"\n\nAs you're left alone, a monarch butterfly flutters inside your room. You stare at it in wonder.\n*choice\n\t#I try to go back to sleep.\n\t\tYou turn over and close your eyes but curiosity niggles at you. At last you give in and get up. \n\t\t*set contentment %+10\n\t\t*goto up\n\t#I follow the butterfly up on deck.\n\t\tLaughing at your own foolishness, you grab an armful of clothes and follow the creature's circling path upwards.\n\t\t*set discretion -10\n\t\t*goto up\n\t#I get dressed properly, then go up on deck.\n\t\t*set discretion %+10\n*label up\nYou get dressed, making the sentimental choice of a brass \n*if pcismale\n\tvest\n\t*goto next\n*else\n\tcorset\n\t*label next\nbecause that's $!{emmelinename}'s favourite metal. \n\nAs you climb you smell an intriguing mixture of coalsmoke and flowers: land!\n\nYou're shocked at the sight of Melbourne. Few of its buildings are as tall as those in London, but the city is definitely broader. Stone and metal colors spread like ripples of Western civilisation across the land. The city is laced with the sparkling streaks of new railway lines criss-crossing the city centre and stretching out into the dying landscape beyond. That landscape is oddly flat, bare of trees and almost bare of grass in the baking sun. It is marred by enormous rust-colored patches of earth. You ignore the ominous barrenness of the countryside with a conscious effort and drink in the shining city until it fills your view. It is strewn liberally with metal structures flashing like enormous jewels in the sunlight streaming from the blue sky. Train carriages race to and from the docks in clouds of steam as if their locomotives were magicians playing tricks. \n\nThe most metallic section of the city has a sheltering cloud directly overhead, while the rest of the sky is clear. Apparently the booming steam industry has been diverting nature itself in order to keep its machines running smoothly. \n\n$!{matildaname} stands beside you. \"This part of Australia used to be very different. It was a great deal like England, in fact—mild temperatures and lots of rain. Everything grew and flourished here. I thought it would be like that forever, but now even the clouds are herded like cattle—and slaughtered like them too.\"\n\nAs your steamer promenades into its own place among scores of lesser vessels, you see countless technological marvels parading by. Gentlemen wear self-doffing top hats, servants lead mechanical horses to market, and smudge-faced urchins flash from place to place on wheeled shoes.\n\n$!{matildaname} stands beside you. \"We'll need supplies before heading across the country to $!{emmelinename}'s house. I'll show you where.\"\n*page_break\nSeveral hours pass in a whirlwind of hiring transport and gathering food for the journey. Here in metal-obsessed Australia, mass-produced tin horses are cheaper than their living counterparts. They are made of jointed segments of tin perched on impossibly thin legs. When activated they whir into life with an awkward screeching gait. $!{matildaname} assures you they're necessary, so you pick some that look marginally less rusty and move on. They can't be ridden, but will make better pack-horses than their flesh-and-blood equivalents—all the more so now most rivers have been piped away into the mining towns to keep their steam engines running. $!{matildaname} pays for everything, and you feel a pang for the days when you knew you could buy anything you saw.\n\nYou spot a stand of fresh fruit and your mouth waters—but before you can suggest a break a woman in trousers, boots, and a battered top hat accosts your party!\n\n\"Welcome to Melbourne,\" she says with a sneer, putting her hands on her hips where they rest on the butts of a matched pair of revolvers. \"I'll be taking your money and jewels now.\"\n*page_break\n$!{matildaname} draws a pistol in one smooth motion and points it at the terrifying lady bushranger. \"Hello, Jenny.\"\n\n\"Ah, $!{matildaname}! It's been too long since my gang last robbed you.\" She whistles a signal, and the street changes as quickly as a cardboard backdrop on a stage. In seconds the crowd of pedestrians has become a delighted audience, and your way is blocked on both sides by armed ruffians under Jenny's control! It is clear the onlookers are not going to come to your aid. So much for civilization in the colonies.\n\n$!{matildaname} sighs as if she's merely exasperated. \"I don't know whether to kiss you or kill you, Jenny Mason.\"\n\nThe bushranger laughs at her. \"You've robbed me often enough. Don't spoil the game now.\"\n*choice\n\t#You whip out your concealed blade and attack! \n\t\t*if ((aluminium1) or (aluminum)) and (kindness \u003c40)\n\t\t\t*set siaubond %+10\n\t\t\t*set williambond %+10\n\t\t\t*set matildabond %+10\n\t\t\t*set siblingbond %+10\n\t\t\t*set socialcurrency +1\n\t\t\t*set courage +5\n\t\t\t*if pcismale\n\t\t\t\tYou draw your sword cane and stand guard over the supplies, hoping no-one can tell you've never fought for your life before—even if you had  plenty of fencing lessons as a child. $!{siblingname} yanks a knife from her parasol and yells her defiance, sounding desperate to your ears. Jenny laughs and draws her own sword from her belt. She's clearly mad, but it looks like you won't be shot—so that's some good news. \n\t\t\t\t\n\t\t\t\t$!{matildaname} tucks away her own pistol only to produce a blade from somewhere equally mysterious and brandish it far more convincingly than you. Some of the ruffians blanch and flee, but the majority produce their own weapons and a variety of incomprehensible local insults. \n\t\t\t\t\n\t\t\t\t\"Bunyip's gonna getcha!\"\n\t\t\t\t\n\t\t\t\t\"Currency's got more gold than sterling!\"\n\t\t\t\t\n\t\t\t\t\"Have a go ya galah!\"\n\t\t\t\t\n\t\t\t\tStaying close to $!{siblingname} you parry a blow from a bonneted man—or perhaps a trouser-wearing lady—and flick the top of your blade at his cheap tin vest, clanging an unmistakable warning. He snarls and lunges for you, but you step neatly aside and hit his outstretched arm with the flat of your blade, causing him to drop his sword and clutch at his sleeve in pain. You take your chance and flick the point of your blade at his side, neatly slicing through the lacing of his vest so it dangles half off his skinny frame. He clutches at his chest, pressing the molded tin back into place, and runs away down the rutted street. When you look around for your next target, you see more of the vagabonds fleeing, and your shipmates Meng and Barker just sheathing their own dress swords as $!{matildaname} shouts for Jenny to return for a second free fencing lesson. \n\t\t\t\t\n\t\t\t\tThe villainous ringleader does not take up $!{matildaname}'s offer. The crowd of onlookers jeer and lose interest. $!{siblingname} is shaking but triumphant, and your entire company exchanges grins as Private Barker thanks her for their inadvertent summons. \"We heard your shout and came to join the fun,\" he says.\n\t\t\t\t*goto patrick\n\t\t\t*else\n\t\t\t\tYou draw the concealed knife from your parasol and stand guard over the supplies, hoping no-one can tell you've never fought for your life before—even though you had plenty of fencing lessons as a child. $!{siblingname} yanks a knife from his cane and yells his defiance, sounding desperate to your ears. Jenny laughs and draws her own sword from her belt. She's clearly mad, but it looks like you won't be shot—so that's some good news. \n\t\t\t\t\n\t\t\t\t$!{matildaname} tucks away her own pistol only to produce a blade from somewhere equally mysterious and brandish it far more convincingly than you. Some of the ruffians blanch and flee, but the majority produce their own weapons and a variety of incomprehensible local insults. \n\t\t\t\t\n\t\t\t\t\"Bunyip's gonna getcha!\"\n\t\t\t\t\n\t\t\t\t\"Currency's got more gold than sterling!\"\n\t\t\t\t\n\t\t\t\t\"Have a go ya galah!\"\n\t\t\t\t*page_break\n\t\t\t\t\n\t\t\t\tStaying close to $!{siblingname} you parry a blow from a bonneted man—or perhaps a trouser-wearing lady—and flick the top of your blade at his cheap tin vest, clanging an unmistakable warning. He snarls and lunges for you, but you step neatly aside and hit his outstretched arm with the flat of your blade, causing him to drop his sword and clutch at his sleeve in pain. You take your chance and flick the point of your blade at his side, neatly slicing through the lacing of his vest so it dangles half off his skinny frame. He clutches at his chest, pressing the molded tin back into place, and runs away down the rutted street. When you look around for your next target, you see more of the vagabonds fleeing, and your shipmates Meng and Barker just sheathing their own dress swords as $!{matildaname} shouts for Jenny lse\n\t\t\t\tYou draw your concealed parasol knife and stand guard over the supplies, hoping no-one can tell you've never fought for your life before—although you had plenty of fencing lessons as a child. $!{siblingname} yanks a sword from his cane and yells his defiance, sounding desperate to your ears. Jenny laughs and draws her own sword from her belt. She's clearly mad, but it looks like you won't be shot—so that's some good news. \n\t\t\t\t\n\t\t\t\t$!{matildaname} tucks away her own pistol only to produce a blade from somewhere equally mysterious and brandish it far more convincingly than you. Some of the ruffians blanch and flee, but the majority produce their own weapons and a variety of incomprehensible local insults. \n\t\t\t\t\n\t\t\t\t\"Bunyip's gonna getcha!\"\n\t\t\t\t\n\t\t\t\t\"Currency's got more gold than sterling!\"\n\t\t\t\t\n\t\t\t\t\"Have a go ya galah!\"\n\t\t\t\t*page_break\n\t\t\t\tStaying close to $!{siblingname} you've barely lifted your weapon when something strikes the back of your head and you feel yourself falling. When you wake up the ruffians are gone—and so is your purse. Your trooper shipmates have appeared on the scene, but they are too late to recover your things. Fortunately the clockwork soldier's crate was too heavy for the gang to steal. \n\t\t\t\t*set courage +5\n\t\t\t\t*goto patrick\n\t#You shout, \"Take what you like! We won’t fight you!\"\n\t\t*if ((gold) or (gold1)) and (discretion \u003c60)\n\t\t\tJenny takes her hands off her guns and $!{matildaname} surrenders hers to a crop-haired boy who can't possibly be older than ten. \n\t\t\t\t\n\t\t\tJust as Jenny walks up to you, her hand outstretched for your purse, your shipmates Private Barker and Private Siau appear around the corner.\n\t\t\t\t\n\t\t\t\"If you're so willing to part with your things, they aren't worth jack,\" says Jenny with a wink at Barker. \"See you around.\"\n\t\t\t*set siaubond %+10\n\t\t\t*set williambond %+10\n\t\t\t*set matildabond %+10\n\t\t\t*set siblingbond %+10\n\t\t\t*set socialcurrency +1\n\t\t\t*goto patrick\n\t\t*elseif discretion \u003c50\n\t\t\tJenny takes her hands off her guns and $!{matildaname} surrenders hers to a crop-haired boy who can't possibly be older than ten. Another child collects your purse with a smirk.\n\t\t\t\t\n\t\t\tWhen the pint-sized treasurer gets near $!{matildaname}'s crate, she says, \"Hello little man. Are you that desperate for extra corsets?\"\n\t\t\t\t\n\t\t\tHis companions laugh at him and he punches the closest. Jenny raps him smartly and the crew heads off down the road. Your trooper shipmates appear on the scene in response to the uproar, but they are too late to recover your things.\n\t\t\t*set siblingbond %+10\n\t\t\t*set matildabond %+10\n\t\t\t*set pov true\n\t\t\t*goto patrick\n\t\t*else\n\t\t\tJenny takes her hands off her guns and $!{matildaname} surrenders hers to a crop-haired boy who can't possibly be older than ten. Another child collects your purse with a smirk.\n\t\t\t\t\n\t\t\tWhen the pint-sized treasurer gets near $!{matildaname}'s crate, she says, \"Hello little man. Are you that desperate for extra corsets?\"\n\t\t\t\t\n\t\t\tHis companions laugh at him and he punches the closest. Jenny raps him smartly and the crew heads off down the road. Your trooper shipmates appear on the scene in response to the uproar, but they are too late to recover your things.\n\t\t\t*set pov true\n\t\t\t*goto patrick\n\t#You hurl a handful of coins into the air so they scatter, distracting Jenny's gang.\n\t\t*if ((brass) or (brass1)) and (discretion >60)\n\t\t\tThe spectators and ruffians alike dive for the small coins, and your supplies are saved. Your trooper shipmates appear on the scene in response to the uproar, but they are too late to recover the contents of your purse. Fortunately the clockwork soldier's crate was too heavy to steal. \n\t\t\t*set siaubond %+10\n\t\t\t*set williambond %+10\n\t\t\t*set matildabond %+10\n\t\t\t*set socialcurrency +1\n\t\t\t*goto patrick\n\t\t*elseif discretion >60\n\t\t\tThe spectators and ruffians alike dive for the small coins, and your supplies are saved. Your trooper shipmates appear on the scene in response to the uproar, but they are too late to recover the contents of your purse. Fortunately the clockwork soldier's crate was too heavy to steal. \n\t\t\t*set siaubond %+10\n\t\t\t*set williambond %+10\n\t\t\t*set matildabond %+10\n\t\t\t*goto patrick\n\t\t*else\n\t\t\tThe spectators and ruffians alike dive for the small coins, but Jenny steps around them and comes right for you. \"And your real purse, if you don't mind,\" she says, tightening one hand on the revolver decorating her left hip.\n\t\t\t\n\t\t\tYou give her all you have without a word. She gives you a smile in return, and walks away. Your trooper shipmates appear on the scene in response to the uproar, but they are too late to recover the contents of your purse. Fortunately the clockwork soldier's crate was too heavy to steal. \n\t\t\t*set pov true\t\t\t\t\n*label patrick\n\nIt is a strange sensation to be on the other side of theft. You don't care for it. When you glance down, you notice a single coin has come to rest beside your right foot. In the confusion, you crouch and slip it back into your empty purse. It's all the money you have left. \n*if (novellinkjeremy) or (novellinkarabella)\n\t*set patrickname \"Patrick\"\n\t*goto what\n*else\n\t*set patrickname \"Mark\"\n*label what\n\t\nWhat do you do next?\n*fake_choice\n\t#Report the ruffians to the local police station. \n\t\t*set colonialanger +20\n\t\t*if discretion >60\n\t\t\tBarker and Meng accompany you to the local police office and assist you in making your report. They remain to make their own. \n\t\t\t\n\t\t\t\"Don't worry about anything tonight,\" says $!{matildaname}. \"My brother owns a hotel. He'll let us stay there.\"\n\t\t\t*set siaubond %+10\n\t\t\t*set williambond %+10\n\t\t\t*goto fin\n\t\t*elseif discretion >50\n\t\t\tBarker and Meng accompany you to the local police office and assist you in making your report.\n\t\t\t\n\t\t\t\"Don't worry about anything tonight,\" says $!{matildaname}. \"My brother owns a hotel. He'll let us stay there.\"\n\t\t\t*set siaubond %+10\n\t\t\t*set williambond %+10\n\t\t\t*goto fin\n\t\t*else\n\t\t\t*set happiness -10\n\t\t\tThe officer at the desk flatly refuses to take your report, telling you that the city is crawling with cut-throats and thieves and there's nothing anyone can do.\n\t\t\t\n\t\t\t\"Don't worry about anything tonight,\" says $!{matildaname}. \"My brother owns a hotel. He'll let us stay there.\"\n\t\t\t*goto fin\n\t#Attempt to befriend the thieves.\n\t\t*set britishanger +20\n\t\t*if (kindness \u003c40) or ((gold) or (gold1))\n\t\t\tYou can just see Jenny at the end of the street, and you yell after her, \"If you're taking my purse, shouldn't you at least buy my friends a drink with it?\"\n\t\t\t\n\t\t\tBarker and Meng excuse themselves graciously as Jenny pauses. When they are out of sight, she walks back to you with a delighted smile, linking arms with you and $!{matildaname}. \"I might even have the funds to buy you a proper meal,\" she says, and leads you to the kind of restaurant you only dimly recall from more fortunate days. \n\t\t\t\n\t\t\tThe staff bow and scrape as if you are all dressed in perfect finery, and you eat an entire rack of lamb with an almost delirious joy. $!{matildaname} and Jenny rehash the afternoon's confrontation with every appearance of delight, and after the meal you find yourself reluctant to let the moment pass. \n\t\t\t\n\t\t\tJenny feels the same, leading you to a cozy pub where she buys drinks for everyone, even $!{siblingname}. \n\t\t\t*if siblinghurt\n\t\t\t\tIn fact, $!{siblingname} drinks more than you do. You notice, but don't say anything.\n\t\t\t\t*goto hx\n\t\t\t*else\n\t\t\t\t*label hx\n\t\t\t\n\t\t\t\"$!{patrickname}!\" $!{matildaname} cries, spotting someone across the room. \"Of all the larrikins to run into!\"\n\t\t\t\n\t\t\tHer brother joins your company at once, and insists on using first names from the start. When the night finally turns your eyes heavy, you and $!{siblingname} and $!{matildaname} are made welcome in the hotel he owns.\n\t\t\t*set patrickbond %+10\n\t\t\t*set matildabond %+10\n\t\t\t*set happiness +5\n\t\t\t*goto fin\n\t\t*elseif kindness \u003c 50\n\t\t\tYou can just see Jenny at the end of the street, and you yell after her, \"If you're taking my purse, shouldn't you at least buy my friends a drink with it?\"\n\t\t\t\n\t\t\tBarker and Meng excuse themselves graciously as Jenny pauses. When they are out of sight, she walks back to you with a delighted smile, linking arms with you and $!{matildaname}. \"I might even have the funds to buy you a proper meal,\" she says, and leads you to the kind of restaurant you only dimly recall from more fortunate days. \n\t\t\t\n\t\t\tThe staff bow and scrape as if you are all dressed in perfect finery, and you eat an entire rack of lamb with an almost delirious joy. $!{matildaname} and Jenny rehash the afternoon's confrontation with every appearance of delight and after the meal you find yourself reluctant to let the moment pass. \n\t\t\t\n\t\t\tJenny feels the same, leading you to a cozy pub where she buys drinks for everyone, even $!{siblingname}. \n\t\t\t*if siblinghurt\n\t\t\t\tIn fact, $!{siblingname} drinks more than you do.\n\t\t\t\t*goto h\n\t\t\t*else\n\t\t\t\t*label h\n\t\t\t\t\n\t\t\t\"$!{patrickname}!\" $!{matildaname} cries. \"Of all the larrikins to run into!\"\n\t\t\t\n\t\t\tHer brother joins your company at once, and insists on using first names at once. When the night finally turns your eyes heavy, you and $!{siblingname} and $!{matildaname} are made welcome in the hotel he owns.\n\t\t\t*set patrickbond %+10\n\t\t\t*set matildabond %+10\n\t\t\t*goto fin\n\t\t*else\n\t\t\tShe laughs delightedly and waves an exuberant farewell. \n\t\t\t\n\t\t\t\"Don't worry,\" says $!{matildaname}. \"My brother owns a hotel. He'll let us stay there.\"\n\t\t\t*set happiness -10\n\t\t\t*goto fin\n\t#Let them go.\n\t\tJenny pauses just before turning a corner to give you a wave farewell. She walks away laughing.\n\t\t\n\t\t\"Don't worry,\" says $!{matildaname}. \"My brother owns a hotel. He'll let us stay there.\"\n\t\t*set contentment %+10\n*label fin\n\nYou settle into your room at the hotel and take out the coin you picked up in the street. It is a single gold sovereign, still shining with newness. You could survive on it for several days, but what would you do after that?\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n*finish", "4a": "$!{patrickname} himself joins you for a sumptuous breakfast of pancakes, eggs, bacon, and smoked rabbit. When you realize it's already mid-morning, you and $!{siblingname} scramble to pack all your supplies.\n\nPrivate Barker and Private Meng arrive with their own well-loaded tin horses. Meng explains that when they discussed yesterday's attack with their superior, he officially ordered them to accompany you on your journey to $!{emmelinename}'s house. \"There are ruffians about,\" she says.\n\nYou know from experience that both soldiers are useful in a crisis, but it seems odd for them to be commanded to look after a pair of freshly-arrived travelers. Perhaps there's more to their offer than meets the eye.\n\n$!{matildaname} loudly announces that her brother is coming too, making it abundantly clear that she'd feel better if the soldiers weren't coming at all. \"The desert is crawling with thieving redcoats,\" she says.\n\n$!{patrickname} raises one eyebrow, but doesn't say a word. He immediately begins winding his own mechanical horse. \n*if (novellinkjeremy) or (novellinkarabella)\n\tSince he's clearly Irish, unlike $!{matildaname}, one or both of them must have been adopted.\n\t*goto abc\n*else\n*label abc\n\nPrivate Meng ignores $!{matildaname}'s rudeness and talks to $!{patrickname} about weather conditions. You haven't seen a natural cloud since you arrived, and $!{patrickname} advises a dramatic increase in water rations despite the fact that local water is now very expensive. When you ask about water prices, $!{patrickname} explains that all available water is now diverted into the industrial sector, so even the Yarra River is no longer flowing. Clouds are herded using silver iodide to the same location you observed upon your arrival, leaving the rest of the region dry. Your heart sinks at the thought of expensive water, and you think bitterly that your reputation here doesn't even have the fragile shield of over-priced flowers and apparent wealth to shield you from social ruin. Unless your fate changes very soon, you will be no better than beggars.\n\n$!{matildaname} loads $!{emmelinename}'s crate onto the backs of two tin horses, and carefully instructs them to stay in step if they don't want to become scrap metal. They bing back at her to indicate their understanding.\n\nPrivate Barker re-checks the luggage straps around two more tin horses. He gives you a bow as you approach, and begs your leave to use first names, since you will all be traveling as one party.\n\nFate hasn't let you choose your travelling companions, but you can choose graciousness—or not.\n*choice\n\t#Accept the trooper's armed assistance and $!{patrickname}'s guidance with equally genuine thanks. \n\t\t*set williambond %+10\n\t\t*set siaubond %+10\n\t\t*set patrickbond %+10\n\t\t*set matildabond %+10\n\t\t*set socialcurrency -1\n\t\tYou address the whole group.\n\t\t*goto name\n\t#Accept the troopers but give $!{patrickname} the cold shoulder\n\t\t*set williambond %+10\n\t\t*set siaubond %+10\n\t\t*set patrickbond %-10\n\t\t*set matildabond %-10\n\t\t*set colonialanger +10\n\t\t*goto name\n\t#Accept $!{patrickname} and $!{matildaname} but give the troopers the cold shoulder.\n\t\t*set williambond %-10\n\t\t*set siaubond %-10\n\t\t*set patrickbond %+10\n\t\t*set matildabond %+10\n\t\t*set britishanger +10\n\n*label name\n*set britishanger +1\n\"Please do call me $!{first_name}.\"\n\nThe sun is already uncomfortably hot when your party of six sets off from the edge of Melbourne. Behind you, the city clatters and clangs with industry. Before you, there is only the susurration of yellow grass and the sullen whisper of the native eucalyptus leaves. Most of the railways end and dirt tracks take over.\n\nBeneath your feet the ground is packed hard. Dust swirls with every step, stinging your eyes and clinging to the sweat on your skin. By lunch time your mouth is clogged with dust. Your group rests under a hunched gathering of gum trees. They cast a thin shade pierced with light, and you wish it wasn't too hot to sleep. $!{matildaname}'s tin horses parp their displeasure at carrying the enormous crate of the clockwork soldier, so she sprays them with lubricating oil and winds them until they stop their racket. \n*page_break\nConvinced that all your companions are trustworthy, you wonder whether you should ask for advice about the clockwork soldier. You look around the disparate circle and when $!{siblingname} flicks a glance at the soldier's crate and gives you a nod you understand that you have permission to disclose the secret to the others.\n\nPrivate Siau is sharpening the edge of her dress sword. She flicks her own dark eyes at the soldier's crate and gives you a tiny smile. You hadn't realized how observant she was. Not many women become troopers, especially in the rough-and-ready colonies. You saw her physical strength in the storm at sea, and her tiny figure hasn't faltered once in the dry heat of the day. Her accent suggests she was raised in China, and she takes pride in her duties as a British soldier. \n\nPrivate William is standing a little apart from the others, checking his things are in order and scanning the empty land around your imperfect oasis. You're impressed by his self-discipline so far away from any commanding officers. He casts a professional eye over the supplies of the general party, but gives the soldier's crate a wide berth—all but tipping his hat at the royal sign marking the wood.\n\n$!{patrickname} is relaxing with his wide-brimmed hat over his eyes, and for a moment you think he's asleep. Then he sits up, sensing your gaze. He's leading your expedition through the trackless wasteland as confidently as some men walk a busy street. His calm manner hides a great deal of knowledge and, you suspect, a passionate heart. Like $!{matildaname}, he is clearly at home in the Australian landscape. \n\n$!{matildaname} is cheerfully eating the last piece of mutton pie, washing it down with tea from a brass mug that looks like something $!{emmelinename} might have made. Your suspicion is confirmed when she sets down the mug and it hops up on six small legs to tip over and empty its own dregs before it needs to be packed back into her bag. With a shock, you realize $!{matildaname} bent her torso slightly as she moved. She's wearing a leather corset instead of metal now that Melbourne is behind you. That's practically naked!\n\nIt's likely everyone will overhear the conversation, but who do you choose to ask about the clockwork man's crate?\n*choice\n\t#Private Siau Meng. \n\t\t*set siaubond %+20\n\t\t*set troopertalking true\n\t\tYou smile back at her and walk off a little way, as if checking something in the distance. She stands beside you, but doesn't make a noise. When you're just about to give up and pretend you have nothing to talk about she lightly touches your arm. That reassurance makes all the difference. Her eyes linger on yours with more than simple companionship, and you remember her timely help when $!{siblingname} was injured at sea.\n\t\t\n\t\t\"I know what's in the box,\" you say.\n\t\t\n\t\t\"A weapon.\" \n\t\t\n\t\tYou stare at her. \"How did you know?\"\n\t\t\n\t\t\"I didn't,\" she says. \"But we're going to $!{emmelinename}'s base of operations, so it was bound to be something military.\"\n\t\t\n\t\t*gosub convo\n\n\t\tShe automatically reaches for her weapon for comfort, but it remains with the supplies—apparently she trusts you. \"I can't pretend I'm sad to hear the independents will be quashed, and quickly. Perhaps that weapon's existence will be enough to end the coming battle before it begins.\"\n\n\t\t\"It's not,\" says $!{matildaname} loudly, making you jump. So much for your private conversation. \"We'll fight, regardless of the odds against us. That's what we do.\"\n\n\t\tSiau stiffens, and her voice grows louder. \"This continent is wealthy and at peace. Why throw all that away?\"\n\n\t\t$!{matildaname} grins. Her teeth flash in her dark face. \"You don't have to fight us if you're so scared of a little blood. You can go back to Britain, and take your maggot-ridden army with you. The less invaders in our land the better.\"\n\t\t\n\t\t\"My instinct is to avoid such unnatural weaponry, even if it could gain us our freedom,\" $!{patrickname} adds quietly.\n\t\t\n\t\t\"I thought we had nothing in common,\" William says to him, since it's now clear the conversation includes everyone. \"But now I understand you. I hope we can avoid meeting in battle. No part of me likes killing a decent man.\"\n\t\t*goto lastbit\n\t#Private William Barker.\n\t\t*set williambond %+20\n\t\t*set troopertalking true\n\t\tYou walk up beside him and he smiles at you in greeting, waiting patiently for you to speak. His eyes linger on yours with more than simple companionship, and you remember his timely help when $!{siblingname} was injured at sea.\n\t\t\n\t\t\"Do you want to know what's in the box?\" you say.\n\t\t\n\t\t\"Certainly not! It's not my place.\"\n\t\t\n\t\t\"I know what it is,\" you say, \"and I'm concerned about the safety of innocent citizens.\"\n\t\t\n\t\tHe frowns as he judges the implications of what you have said. \"My job is to protect this colony from harm. If you truly think this knowledge will help Australia, I will listen. I presume it's some new weapon.\"\n\n\t\tYou stare at him. \"How did you know?\"\n\t\t\n\t\t\"I didn't,\" he says. \"But our destination is $!{emmelinename}'s base of operations, so it was bound to be something military.\"\n\t\t\n\t\t*gosub convom\n\t\t\n\t\t\"I'm not entirely sure it's honorable to fight with such unnatural weapons, even to keep the peace.\"\n\t\t\n\t\t$!{patrickname} approaches to check the water supplies, and William falls silent as he realizes your conversation wasn't private after all.\n\t\t\n\t\t\"I thought we had nothing in common,\" $!{patrickname} says to William. \"But now I understand you. I hope we can avoid meeting in battle.\"\n\t\t\n\t\t\"As do I,\" says William, meeting $!{patrickname}'s eye with open respect.\n\t\t\n\t\t\"Do your worst,\" says $!{matildaname} loudly, ignoring the quiet moment. \"You British have already stolen our clouds and rivers. What more can you do to us?\"\n\t\t\n\t\tPrivate Siau stretches like a cat—slow, elegant, and deadly—and you make a note to take more care next time you attempt to talk about a sensitive topic. \"We'll soon see how the battle ends,\" she says, letting her eyes slide over $!{matildaname} as if the colonial doesn't exist. \"But I hope no harm comes to anyone here.\"\n\t\t*goto lastbit\n\t#$!{patrickname}. \n\t\t*set patrickbond %+20\n\t\tYou move to sit close beside him, and he tips his hat farther back on his head by way of acknowledgment. He's a man of few words, but not averse to your company.\n\n\t\t*if ((novellinkarabella) or (novellinkjeremy))\n\t\t\t\"I've been meaning to speak to you,\" he says. \"$!{matildaname} tells me all our mail was intercepted before it got to you—in which case you might not know that she and $!{emmelinename} are in love.\"\n\t\t\t\n\t\t\t\"Oh!\" You look at him with new eyes. \"Thank you for letting me know. I'm afraid I need to speak with you as well—though the topic is less pleasant. \n\t\t\t*goto notdating\n\t\t*else\n\t\t\t\"I've been meaning to speak to you,\" he says. \"$!{matildaname} tells me all our mail was intercepted before it got to you—in which case you won't know that I plan to marry your $!{emmelinename} when Australia becomes independent.\"\n\t\t\t\n\t\t\t\"Oh!\" You look at him with new eyes. \"Congratulations. I'm afraid I need to speak with you as well—though the topic is less pleasant. \n\t\t\t*label notdating\n\t\t\n\t\t\tDo you want to know what's in the box?\"\n\t\t\t\n\t\t\t\"Thought you'd never ask,\" he says, with a self-deprecating smile. \"I presume it's some new weapon.\"\n\n\t\t\tYou stare at him. \"How did you know?\"\n\t\t\t\n\t\t\t\"I didn't,\" he says. \"But our destination is $!{emmelinename}'s base of operations, so it was bound to be something military.\"\n\t\t\t\n\t\t\t*gosub convom\n\t\t\t\n\t\t\t\"I'm not entirely sure it's honorable to fight with such unnatural weapons, even to gain freedom.\"\n\t\t\t\n\t\t\tWilliam returns to camp after checking his supplies, and $!{patrickname} falls silent, realizing the conversation isn't private after all. \n\t\t\t\n\t\t\t\"I thought we had nothing in common,\" William says to $!{patrickname}. \"But now I understand you. I hope we can avoid meeting in battle.\"\n\t\t\t\n\t\t\t*if (novellinkjeremy) or (novellinkarabella)\n\t\t\t\t\"God willing,\" says $!{patrickname}, meeting his eye with open respect.\n\t\t\t\t*goto lasbit\n\t\t\t*else\n\t\t\t\t\"As do I,\" says $!{patrickname}, meeting his eye with open respect.\n\t\t\t\t*label lasbit\n\t\t\t\t\"Do your worst,\" $!{matildaname} breaks in, addressing William. \"You British have already stolen our clouds and rivers. What more can you do to us?\"\n\t\t\t\n\t\t\t\tPrivate Siau stretches like a cat—slow, elegant, and deadly—and you make a note to take more care next time you attempt to talk about a sensitive topic.  \"We'll soon see how the battle ends,\" she says, letting her eyes slide over $!{matildaname} as if the colonial doesn't exist. \"But I hope no harm comes to anyone here.\"\n\t\t\t\t*goto lastbit\n\t#$!{matildaname}.\n\t\t*set matildabond %+20\n\t\tYou sit beside her but before you can ask her about the crate she says,\n\t\t*if ((novellinkarabella) or (novellinkjeremy))\n\t\t\t\"I've been meaning to speak to you. Since all our mail was intercepted before it got to you, you won't know that $!{emmelinename} and I are in love.\"\n\t\t\t\n\t\t\t\"Oh!\" You look at her with new eyes. \"Thank you for letting me know. I'm afraid I need to speak with you as well—though the topic is less pleasant. \n\t\t\t*goto notdatingm\n\t\t*else\n\t\t\t\"I've been meaning to speak to you. Since all our mail was intercepted before it got to you, you won't know that $!{emmelinename} and $!{patrickname} are in love.\"\n\t\t\t\t\n\t\t\t\"Oh!\" You look at her with new eyes. \"Thank you for letting me know. I'm afraid I need to speak with you as well—though the topic is less pleasant. \n\t\t\t*label notdatingm\n\t\t\tWe need to talk about that crate you're being forced to take to $!{emmelinename}?\"\n\t\t\t\n\t\t\t$!{matildaname} shrugs, but for once you see something in her eyes other than indefatigable cheerfulness. Evidently she has her secret worries and pain, just like everyone else. \"I knew the second they gave it to me that it was a weapon. $!{emmelinename} is well known for such things.\"\n\t\t\t\n\t\t\t*gosub convo\n\t\t\t\n\t\t\t\"Let them try,\" she says, and picks up her mug. The legs whir and fold into the base. \"You British have already stolen our clouds and rivers. What more can you do to us?\"\n\t\t\t\n\t\t\tPrivate Siau stretches like a cat—slow, elegant, and deadly—and you make a note to take more care next time you attempt to talk about a sensitive topic. \"We'll soon see how the battle ends,\" she says, letting her eyes slide over $!{matildaname} as if the colonial doesn't exist. \"But I hope no harm comes to anyone here.\"\n\t\t\t\t\n\t\t\t\"My instinct is to avoid such unnatural weaponry, even if it could gain us our freedom,\" $!{patrickname} adds quietly, since the conversation is clearly no longer private.\n\t\t\t\n\t\t\t\"I thought we had nothing in common,\" William says to him. \"But now I understand you. I hope we can avoid meeting in battle. No part of me likes killing a decent man.\"\n*label lastbit\n\t\t\t\nWho do you agree with most?\n*fake_choice\n\t#Private Siau.\n\t\tShe lifts her eyes to yours, and you know she feels your respect.\n\t\t*set siaubond %+10\n\t#$!{matildaname}.\n\t\tShe lifts her eyes to yours, and you know she feels your respect.\n\t\t*set matildabond %+10\n\t#Private William.\n\t\tHe lifts his eyes to yours, and you know he feels your respect.\n\t\t*set williambond %+10\n\t#$!{patrickname}.\n\t\tHe lifts his eyes to yours, and you know he feels your respect. \n\t\t*set patrickbond %+10\n*finish Next\n*label convo\n\"Sorry what?!\"\n\t\t\n*page_break\nYou take a deep breath, wondering where to start. \"What does $!{emmelinename} have to do with the military?\"\n\n\"Opposing Great Britain, mainly,\" she says. \"She's a leader of the rebels here.\"\n\nYou've forgotten to breathe, so you remind yourself to start again. \n*if troopertalking\n\t\"So that's the real reason you were sent to accompany us. You realized the infamous $!{emmelinename} $!{last_name} is my sister, and came along as spies in our midst!\"\n\n\t\"That's true enough,\" says Siau. \"It was that or arrest you. We had to talk fast to keep you free—and you're welcome for that. But we have to escort you all the way to her base to make sure you don't commit any sabotage along the way.\"\n\t*goto a\n*else\n*label a\n\n\"You're sure $!{emmelinename}'s on the side of the colonials?\"\n\n\"Absolutely,\" she says. \"They rely completely on her funds, and on her inventions. How is it that you didn't know that about your own sister?\"\n\nYou remember the smudged and dripping letter delivered to you back in Belgravia, and $!{matildaname}'s claim that someone has been intercepting $!{emmelinename}'s mail for years. Putting aside the revelations about $!{emmelinename} for the moment, you say, \"Do you think the contents of the crate will help $!{emmelinename}—or harm her?\"\n\n\"Whatever it is, whoever sent it believes it will make a difference in the coming war.\"\n*page_break\n\n*return\n*label convom\n\"Sorry what?!\"\n\t\t\n*page_break\nYou take a deep breath, wondering where to start. \"What does $!{emmelinename} have to do with the military?\"\n\n\"Opposing Great Britain, mainly,\" he says. \"She's a leader of the rebels here.\"\n\nYou've forgotten to breathe, so you remind yourself to start again. \n*if troopertalking\n\t\"So that's the real reason you were sent to accompany us. You realized the infamous $!{emmelinename} $!{last_name} is my sister, and came along as spies in our midst!\"\n\n\t\"That's true enough,\" William admits. \"It was that or arrest you. We had to talk fast to keep you free—and you're welcome for that. But we have to escort you all the way to her base to make sure you don't commit any sabotage along the way.\"\n\t*goto abcd\n*else\n*label abcd\n\n\"You're sure $!{emmelinename}'s on the side of the colonials?\"\n\n\"Absolutely,\" he says. \"They rely completely on her funds, and on her inventions. How is it that you didn't know that about your own sister?\"\n\nYou remember the smudged and dripping letter delivered to you back in Belgravia, and $!{matildaname}'s claim that someone has been intercepting $!{emmelinename}'s mail for years. Putting aside the revelations about $!{emmelinename} for the moment, you say, \"Do you think the contents of the crate will help $!{emmelinename}—or harm her?\"\n\n\"Whatever it is, whoever sent it believes it will make a difference in the coming war.\"\n*page_break\n\n*return", "4b": "*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n\nWhen you make camp in the late afternoon, you discover one of your water containers is damaged and has been steadily leaking for some time. Next to it is a note from ${siblingname}:\n\n[i]I've taken the good container with me to scout for water. Back soon.[/i]\n\nYou're not sure whether to feel proud or furious that $!{siblingname} has wandered off alone rather than asking for help. One of the segmented tin horses is missing as well, so presumably it's meant to carry the water—if there is any. You join $!{patrickname} as he prepares to cook for everyone, and he's pleased to hear $!{siblingname} is searching the area for resources. The pair of you build up a roaring fire while waiting for $!{siblingname}'s return. Then you hear it:\n\n\"Parp! Parp!\"\n\nIt's coming from behind a nearby ridge. You stand, meal forgotten, and go at once to investigate the noise of mechanical distress. \n\nPrivate Siau asks, \"What is it?\" \n\n\"$!{siblingname}'s horse,\" you say, \"and something's wrong.\"\n*page_break\nThe horse clanks into view, moving even more awkwardly than usual. You run to meet it. Its metal joints are encrusted with red dust and one of its legs is no longer able to bend. More dust swirls inside the water container, which is still attached to its side.\n\n\"Where's $!{siblingname}?\" you ask, knowing it can't possibly tell you. \"What happened?\"\n\n\"Parp,\" it says dolefully. \"Parp, parp, parp.\"\n\nYour mind, drilled in magical metals like every other child, translates the tin-speak into its spectrum of meaning: [i]No. Bad. Trouble. Pain. Uh Oh. Death. Negative. Needs Repairs. Help![/i]\n\n$!{siblingname} is lost in the drought-ravaged countryside, and may be injured or lost, or already dead. Your company will search in all directions, but which group will you join?\n*choice\n\t\t#I join $!{patrickname} and $!{matildaname}—they're brother and sister so they'll be as determined as I am.\n\t\t\t*set britishanger +10\n\t\t\t*set patrickbond %+10\n\t\t\t*set matildabond %+10\n\t\t\t*set contentment %-10\n\t\t\t*set socialcurrency -1\n\t\t\tThe three of you take some water and a length of rope and set off on foot, calling out, \"$!{siblingname}! $!{siblingname}!\" and the eerie Australian call, \"Cooooeeeee!\"\n\t\t\t\n\t\t\tEven in the relative cool of evening the day is hot and each step is exhausting. $!{patrickname} takes you straight up the closest hill and from there you see an unbroken vista of red earth and scrub stretching to the burning horizon. The sun is setting, and you don't have much time before darkness descends.\n\t\t\t\n\t\t\t\"There!\" says $!{matildaname}. \"The lip of that gully is disturbed. Perhaps $!{siblingname} was hurt when the embankment collapsed.\"\n\t\t\t\n\t\t\tYou hurry down the hill, trying not to think of how badly $!{siblingname} might be wounded this time. The others match your pace without complaining, although sweat is pouring down your face and your undershirt is wet through. When you look down into the ravine you see a trickle of water but no sign of $!{siblingname}. \n\t\t\t*page_break\n\t\t\t$!{matildaname} exhales in relief, and you turn to her in confusion. \"$!{siblingname} was here,\" she says. \"See?\" She points to a new furrow beside the stream, where the dirt changes colour from ochre to black. \"And the tracks are nice and clear, so that means no concussion and no major injury. The horse barely made it back up the side of the ravine on four legs, so $!{siblingname} was trapped.\"\n\t\t\t\n\t\t\t\"Tracks?\" you say, looking where she's pointing and seeing no sign of $!{siblingname}'s passing.\n\t\t\t\n\t\t\t\"Clear as an Australian sky,\" she says cheekily, and sets off along the ridge, still calling for $!{siblingname}.\n\t\t\t\n\t\t\tIt's not long before you hear an answering shout and $!{siblingname} comes back towards you along the ravine floor. With three people hauling on a rope, the rescue is completed in moments. $!{siblingname} is perfectly fine, albeit covered with sweat and dirt from the fall into the gully.\n\t\t\t\n\t\t\t*page_break\n\t\t\t\"Thanks for saving us some scouting,\" $!{patrickname} says to $!{siblingname}. \"You've earned your meal.\"\n\t\t\t*goto next\n\t\t#I'll go with the troopers—they have better resources.\n\t\t\t*set colonialanger +10\n\t\t\t*set siaubond %+10\n\t\t\t*set williambond %+10\n\t\t\t*set discretion %+10\n\t\t\t*set socialcurrency -1\n\t\t\tThe three of you take some water and a length of rope and set off on foot, calling out, \"$!{siblingname}! $!{siblingname}!\" \n\t\t\t\n\t\t\tEven in the relative cool of evening the day is hot and each step is exhausting. William takes you straight up the closest hill and from there you see an unbroken vista of red earth and scrub stretching to the burning horizon. The sun is setting, and you don't have much time before darkness descends.\n\t\t\t\n\t\t\t\"There!\" says Siau. \"The lip of that gully is disturbed. Perhaps $!{siblingname} was hurt when the embankment collapsed.\"\n\t\t\t\n\t\t\tYou hurry down the hill, trying not to think of how badly $!{siblingname} might be wounded this time. The others match your pace without complaining, although sweat is pouring down your face and your undershirt is wet through. When you look down into the ravine you see a trickle of water but no sign of $!{siblingname}. \n\t\t\t*page_break\n\t\t\tSiau exhales in relief, and you turn to her in confusion. \"$!{siblingname} was here,\" she says. \ urry down the hill, trying not to think of how badly $!{siblingname} might be wounded this time. Sweat pours down your face and your undershirt is wet through. When you look down into the ravine you see a trickle of water but no sign of $!{siblingname}. \n\t\t\t*page_break\n\t\t\t*if siblingbrain\n\t\t\t\t*set socialcurrency -1\n\t\t\t\t*set siblingbond %-10\n\t\t\t\tYou turn in a desperate circle, wondering what to do. Logically, you realize $!{siblingname} would automatically head downhill, where the ravine's edges appear slightly lower. But the injury from the storm has changed\n\t\t\t\t*if pcismale\n\t\t\t\t\ther. She\n\t\t\t\t\t*goto pa\n\t\t\t\t*else\n\t\t\t\t\thim. He\n\t\t\t\t*label pa\n\t\t\t\tlacks focus and concentration, and sometimes seems lost and confused about ordinary things. With a sinking feeling, you realize that $!{siblingname} is truly changed, and you never admitted it until now—when it might be too late.\n\t\t\t\t\t\t\n\t\t\t\t$!{patrickname} is already approaching you from the camp, so you wave in acknowledgment. When he reaches you, you explain what has happened. He glances into the ravine and exhales in relief. \"$!{siblingname} was here,\" he says. \"See?\" He points to a new furrow beside the stream, where the dirt changes colour from ochre to black. \"And the tracks are nice and clear, so that means no concussion and no major injury. The horse barely made it back up the side of the ravine on four legs, so $!{siblingname} was trapped.\"\n\t\t\t\n\t\t\t\t\"Tracks?\" you say, looking where he's pointing and seeing no sign of $!{siblingname}'s passing.\n\t\t\t\n\t\t\t\t\"The water is muddier than way,\" he says, and sets off along the ridge, calling for $!{siblingname}.\n\t\t\t\n\t\t\t\tIt's not long before you hear an answering shout and $!{siblingname} comes back towards you. With both of you hauling on a rope from the ravine's edge, the rescue is completed in moments. $!{siblingname} is perfectly fine, albeit covered with sweat and dirt from the fall into the gully.\n\t\t\t\t\n\t\t\t\tIt's awkward, but between the three of you the water container is filled. \"Thanks for saving us some scouting,\" $!{patrickname} says to $!{siblingname}. \"You've earned your meal.\"\t\t\n\t\t\t\t*goto next\n\t\t\t*else\n\t\t\t\t*set siblingbond %+10\n\t\t\t\tYou have a feeling $!{siblingname} would have headed downstream so you walk that way, hoping for the best and calling out every few steps. \n\t\t\t\t\n\t\t\t\t$!{patrickname} is already approaching you from the camp, so you wave in acknowledgment. When he reaches you, you explain what has happened. He glances into the ravine and exhales in relief. \"$!{siblingname} was here,\" he says. \"See?\" He points to a new furrow beside the stream, where the dirt changes colour from ochre to black. \"And the tracks are nice and clear, so that means no concussion and no major injury. The horse barely made it back up the side of the ravine on four legs, so $!{siblingname} was trapped.\"\n\t\t\t\n\t\t\t\t\"Tracks?\" you say, looking where he's pointing and seeing no sign of $!{siblingname}'s passing.\n\t\t\t\n\t\t\t\t\"The water is muddier than way,\" he says, and sets off along the ridge, calling for $!{siblingname}.\n\t\t\t\t\n\t\t\t\tIt's not long before you hear an answering shout and $!{siblingname} comes back towards you. With both of you hauling on a rope from the ravine's edge, the rescue is completed in moments. $!{siblingname} is perfectly fine, albeit covered with sweat and dirt from the fall into the gully.\n\t\t\t\t\n\t\t\t\t\"Are you all right?\"\n\t\t\t\t\n\t\t\t\t\"Glad to see you! Are you thirsty?\"\n\t\t\t\t\n\t\t\t\t\"Very.\"\n\t\t\t\t\n\t\t\t\tIt's awkward, but between the three of you the water container is filled. You head back to camp. $!{patrickname} thanks you for scouting out a water supply and declares the meal ready.\n*label next\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a12\n\t*else\n*label a12\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a33\n*else\n*label a33\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a44\n*else\n*label a44\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a55\n*else\n*label a55\n\nThe search for water wasn't a disaster after all.\nYou…\n*choice\n\t#Compliment $!{siblingname} on finding water.\n\t\t*set siblingbond +10\n\t\t\"I just wanted to be useful,\"\n\t\t*if pcismale\n\t\t\tshe says. \n\t\t\t\n\t\t\tYou eat a meal of wild rabbit stew seasoned with old tea leaves, and talk about other things.\n\t\t\t*finish\n\t\t*else\n\t\t\the says. \n\t\t\t\n\t\t\tYou eat a meal of wild rabbit stew seasoned with old tea leaves, and talk about other things.\n\t\t\t*finish\n\t#Reprimand $!{siblingname} for wandering off alone.\n\t\t*set siblingbond -10\n\t\t\"I just wanted to be useful,\"\n\t\t*if pcismale\n\t\t\tshe says. \n\t\t\t\n\t\t\tYou eat a meal of wild rabbit stew seasoned with old tea leaves, and talk about other things.\n\t\t\t*finish\n\t\t*else\n\t\t\the says. \n\t\t\t\n\t\t\tYou eat a meal of wild rabbit stew seasoned with old tea leaves, and talk about other things.\n\t\t\t*finish\n\t#Say nothing to $!{siblingname} about the misadventure.\n\t\t*set contentment %+10\n\t\t\n\t\tYou eat a meal of wild rabbit stew seasoned with old tea leaves, and talk about other things.\n\t\t*finish\n", "5a": "Long days pass with few clouds and no rain. You are impatient to reach $!{emmelinename}, but $!{patrickname} insists on travelling at a gentle pace, conserving water and energy as much as possible, and taking a long detour in order to pass an abandoned military camp. The camp has a brook that sometimes still flows, and a pump for when it doesn't. But as you walk towards it, you see an eerie wall of red dust moving towards you. \n\n\"Dust storm!\" $!{matildaname} yells, and frantically unrolls an enormous canvas as $!{patrickname} pulls the horses into two groups and makes everyone sit between them with their backs to the storm. He and $!{matildaname} hurl the canvas over everyone, and then duck underneath. The storm reaches you with seconds to spare, beating on the canvas with a sound like heavy rain and instantly blotting out the light. Inside your shelter, everyone piles dirt onto the dragging edges of the canvas to make it as secure as possible, but after a period of frantic activity there is nothing to do but wait. The tent is imperfect, and the fine dust and grit coats your skin and wedges into your fingernails. Your eyes water, and everyone's face bears streaks of grime.\n\nIt soon becomes clear the storm could last for days. You're so close to water, but it might as well not exist.\n*fake_choice\n\t#Ah well. My legs could probably use a break.\n\t\t*set contentment %+10\n\t#The frustration is driving me insane!\n\t\t*set contentment %-10\n\t#I wish I could tell $!{emmelinename} we're close by.\n\t\t*set emmelinebond %+10\n\nIt's awkward but possible to erect your tents under the canvas, and is well worth a slight improvement in the clarity of the air. You think it'll be impossible to sleep, but you're wrong. Unfortunately, you wake to the same red-tinged darkness as before. $!{matildaname} points out that before the British settled in Australia, there were no dust storms in the area at all. She talks for an uncomfortably long time about cloud seeding and reverse irrigation, and by the end you begin to wonder if perhaps the price of Australia's booming industry really is too high. Still the storm rages on. If it wasn't for $!{patrickname}'s assurance, you would doubt it was morning.  \n\nAt last you draw straws to decide who should venture into the storm to attempt to find the pump. You lose. $!{patrickname} ties the end of the rope around your wrist, and you drink the last of the water at his urging. The others load one of the horses with panniers, and beg you to be careful. At the same time, you're quietly desperate to leave the claustrophobic shelter. Taking one last deep breath of the relatively clear air inside the shelter, you step out into the dark.\n\n\"$!{first_name}! $!{first_name}! Wait!\"\n\nIt's $!{siblingname} calling you from somewhere close by—yet invisible. You follow your rope back to the lee side of the shelter.\n\n\"What's so important that you risked opening the flap a second time?\" you say.\n*page_break\n\"$!{emmelinename}'s goggles, of course.\" The cool brass circles pressed into your hand feel like home. You put them on at once, grateful for $!{siblingname}'s good sense. \n*if brass1\n\t*goto magic\n*else\n\tYou very nearly packed them into the trunk yourself back in London.\n\t*label magic\n\nThe magic activates and you're immediately able to see better—the tent looks like fabric, rather than an enormous shadow against the red. At the same time, your eyes are protected from harm. \"Thank you.\"\n\n*if (novellinkarabella) or (novellinkjeremy)\n\t\"$!{patrickname} was praying and then he suddenly stopped and asked if anyone had a spare set of goggles. You should thank him.\"\n\t*goto faithmoment\n*else\n\t\"$!{matildaname} was praying and then she suddenly stopped and asked if anyone had a spare set of goggles. You should thank her.\"\n\t*label faithmoment\n\t*if faith\n\t\n\t\t\"And God, it seems.\"\n\t\t*goto sib\n\t*else\n\t\n\t\t\"And anyone else who knows when to stop praying and start being useful.\"\n\t\t*label sib\n\t\t\n\t\t$!{siblingname} squeezes your hand and follows the rope back into shelter. \n\t\t\n*label start\nYou check the knot on your wrist, then…\n*choice\n\t*disable_reuse #Head out blindly, reminding yourself it's a matter of life or death.\n\t\t*if contentment \u003c60\n\t\t\tAnyone drilling for water knows not to place it too close to a rubbish heap or a latrine, so you aim for an empty spot halfway between your memory of those two locations. In moments, you run into something solid. You squint at it and grope with your hands until you're sure: You've found the pump. \n\t\t\t\n\t\t\tYou drink as much as your stomach can handle, and fill all the water containers, loading up your pack-horse and ignoring its parps of displeasure at the heavy load. Then you follow your rope back to camp.\n\t\t\t*set courage +5\n\t\t\t*set mechanical +5\n\t\t\t*goto end\n\t\t*elseif (contentment \u003c50) or (contentment =50)\n\t\t\tAnyone drilling for water knows not to place it too close to a rubbish heap or a latrine, so you aim for an empty spot halfway between your memory of those two locations. In moments, you find yourself on a steep downward slope—and then you step into water. You squint at it and grope with your hands until you're sure: You've found the dust-clogged brook. It's a whole lot better than nothing. \n\t\t\t\n\t\t\tYou drink as much as your stomach can handle, and fill all the water containers, loading up your pack-horse and ignoring its parps of displeasure at the heavy load. Then you follow your rope back to camp.\n\t\t\t*goto end\n\t\t*else\n\t\t\tYou find yourself back at the tent.\n\t\t\t*goto start\n\t*disable_reuse #Take the time to walk back and forth, back and forth in an orderly manner.\n\t\t*if contentment >60\n\t\t\tAfter walking for what feels like hours, you run into something solid. You squint at it and grope with your hands until you're sure: You've found the pump. \n\t\t\t\n\t\t\tYou drink as much as your stomach can handle, and fill all the water containers, loading up your pack-horse and ignoring its parps of displeasure at the heavy load. Then you follow your rope back to camp.\n\t\t\t*set courage +5\n\t\t\t*set mechanical +5\n\t\t\t*goto end\n\t\t*elseif contentment >50\n\t\t\tAfter walking for what feels like hours, you run into something solid. You squint at it and grope with your hands until you're sure: You've found the dust-clogged brook. It's a whole lot better than nothing. \n\t\t\t\n\t\t\tYou drink as much as your stomach can handle, and fill all the water containers, loading up your pack-horse and ignoring its parps of displeasure at the heavy load. Then you follow your rope back to camp.\n\t\t\t*set mechanical +5\n\t\t\t*goto end\n\t\t*else\n\t\t\tYou find yourself back at the tent.\n\t\t\t*goto start\n\t*disable_reuse #Grin and head straight into the teeth of the storm.\n\t\t*if happiness >65\n\t\t\tYou shield your mouth with your free hand and sing an old marching song as you walk blindly into the storm. The wind howls around you, and the grains of sand sting every fragment of bare skin. But then you hear something new, and head towards it. To your surprise, it's more singing. An Aboriginal woman you've never seen before looms into view, still singing, and she takes your arm and guides you right to the pump. \n\t\t\t\n\t\t\t\"Thank you,\" you say, although you're certain she speaks no English. She grins and walks away, still singing.\n\t\t\t\n\t\t\tYou drink as much as your stomach can handle, and fill all the water containers, loading up your pack-horse and ignoring its parps of displeasure at the heavy load. Then you follow your rope back to camp.\n\t\t\t*set courage +5\n\t\t\t*set mechanical +5\n\t\t\t*goto end\n\t\t*elseif happiness >55\n\t\t\tYou shield your mouth with your free hand and whistle an old marching song as you walk blindly into the storm. The wind howls around you, and the grains of sand sting every fragment of bare skin. But then you hear something new, and head towards it. To your surprise, it's more whistling. An Aboriginal man you've never seen before looms into view, still whistling, and he takes your arm and guides you right to the brook. It's muddy, but it's a whole lot better than nothing. \n\t\t\t\n\t\t\t\"Thank you,\" you say, although you're certain he speaks no English. He grins and walks away, still whistling.\n\t\t\t\n\t\t\tYou drink as much as your stomach can handle, and fill all the water containers, loading up your pack-horse and ignoring its parps of displeasure at the heavy load. Then you follow your rope back to camp.\n\t\t\t*goto end\n\t\t*else\n\t\t\tYou find yourself back at the tent.\n\t\t\t*goto start\n*label end\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n*finish Next\n", "5b": "*disable_reuse\n\nUnable to break camp and well supplied with water, $!{siblingname} decides it's the perfect time to tease you about potential romantic interests. You decide it’s time to either swear off love… or chase it down. $!{siblingname} advises that \n*if ((novellinkarabella) or (novellinkjeremy))\n\t$!{matildaname}'s already in a relationship with $!{emmelinename}. \n\t*if siblingmarriage\n\t\t*if pcismale\n\t\t\tShe and William are in love too.\n\t\t\t*goto tryagain\n\t\t*else\n\t\t\tHe and William are in love too. \n\t\t\t*goto tryagain\n\t*else\n\t\t*goto tryagain\n*else\n\t$!{patrickname}'s already in a relationship with $!{emmelinename}. \n\t*if siblingmarriage\n\t\t*if pcismale\n\t\t\tShe and Siau are in love too. \n\t\t\t*goto tryagain\n\t\t*else\n\t\t\tHe and Siau are in love too.\n\t\t\t*goto tryagain\n\t*else\n\t*label tryagain\n*page_break\nThe others are reading, talking quietly, or checking the supplies and weapons. $!{siblingname} sees where your eye has fallen and draws the rest away on the pretext of examining yet another rip in your tent.\n*choice\n\t#Pfft. Romance. Not for me thanks; I’ve seen too much unhappiness.\n\t\t$!{siblingname} thinks you're a fool, but you know you're made the right choice—especially when it's clear the tension between British and colonial forces is coming to a head.\n\t\t*set scien
