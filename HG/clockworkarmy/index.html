<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attack of the Clockwork Army — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "clockworkarmy", "title": "Attack of the Clockwork Army", "scenes": {"1a": "They call it The Great Stink.\n\nThe Thames is so full of sewage and tannery waste it barely flows. People all over London are dying of cholera. The curtains of the Houses of Parliament are soaked in lime chloride in an effort to stem the deadly miasma. You are glad for an excuse— however nefarious or brief—to walk away from the river, even in the stifling heat. It barely makes you blink when a carriage-horse's piss makes a new river flow along the street in front of you.\n\nThe steaming urine runs downhill through a neat cobblestone maze. It narrowly misses the wide skirts of a red-headed gentlewoman, and finally laps against the wrinkled trouser-leg of a drunken sot who's wandered into Notting Hill by accident and passed out. It puddles against his shin, still steaming, enriching the bustling street with its saffron color and invigorating scent. Compared to the air by the river, it's ambrosia.\n\nThe drunk doesn't stir, although the Scottish gentlewoman takes three steps backwards as she notices her narrow escape. Rich necklaces clink against her silver corset, and the hidden wheels steadying her many underskirts rattle against the ground. Your eyes follow the fading urine trail back to the horse and the carriage behind it—just in time to see the quirk of the carriage-driver's mouth as he delights in his perfect aim. He gives his iron vest a superstitious tap with the steel tip of his whip handle, and it rings like a bell. It's impossible to tell if he chose iron for his vest today because it looks good, or because of its strengthening magic. \n\nYour own posture is enhanced with custom-shaped tin segments laced together—not for tin's rather annoying magic of emitting noises to indicate positive or negative stimuli, but because tin is the cheapest metal around. The gentlewoman definitely chose silver for its looks, since silver's biomechanical magics can only be legally used by surgeons. If Father hadn't been so fond of forbidden magics he wouldn't have been executed so long ago, and you wouldn't have to continue taking so many risks to keep the family respectable.\n*page_break\nYou resist the urge to scratch the cheap hessian clothing disguising your true station, and wish—not for the first time—that being rich didn't cost so much. But you refuse to destroy the future prospects of your one remaining family member by giving up now. If you can keep the family name respectable a little longer, one of you can marry well and then you'll both be saved. Besides, you have a career of sorts—a job that has kept up your Belgravia home's respectable façade for months now, and has thus far not ended in a hanging. \n\nSometimes you dream of a simpler life—one that didn't involve so much deception. But you're the breadwinner now, and you have no intention of going hungry again tonight. Not when there's hundreds of pounds simply parading by in front of you. You hang your head to fit your disguise, but you've already decided on the perfect target for today's theft.\n*choice\n\t#That Scotswoman is simply dripping with jewellery.\n\t\tYou wander closer as if by accident, squeezing between a sudden crush of passers-by in voluminous skirts then twisting sideways as a gentleman lashes out at you with his cane. The first time someone believed your disguise thoroughly enough to treat you like a flea-bitten dog it was an enormous shock and you very nearly shouted for the bobbies to assist you. Now it's all part of one more social dance: Dodge, cower, wriggle, disappear. Over time you learned how to appear poor enough to become invisible without looking poor enough to draw attention. The blows connect sometimes, but that just adds to your invisibility. As long as you can keep the bruises hidden at home, everything's fine. Step, step, shuffle, dodge. And now you're close enough to touch the red-headed woman. Time to consider how best to steal the diamond-studded gold bracelet from her wrist. \n\t\t*set kindness %-10\n\t\t*choice\n\t\t\t#I smile and chat with her. Even in disguise, I've found I can charm anyone. It's literally magical.\n\t\t\t\t*set metal \"Gold\"\n\t\t\t\t*set gold1 true\n\t\t\t\t\"Pardon me Madam,\" you say, adjusting your posture to immediately become a little closer to her class, \"but I were about to ask you for a few pennies before I saw you proper and felt rich just for the looking. Have a very nice day, and thank you.\"\n\t\t\t\t\n\t\t\t\t\"Oh!\" she says, half-lifting her hand in an incomplete gesture of generosity—it's the wrong hand, but it holds several bracelets of lesser value. \"How perfectly sweet of you. What a shame I'm only taking some air and didn't bring a farthing!\"\n\t\t\t\t\n\t\t\t\tYou make a dismissive gesture, knocking her arm and apologising profusely for your clumsiness as you slip the bracelet into a hidden pocket—the most secure part of your well-worn attire. She apologises as profusely as you do, and you keep a straight face with an effort. You give her one last meek smile and step backwards into the dance of the crowded street to make your indirect way home to Belgravia. \n\t\t\t\t\n\t\t\t\tJust as you feel your shoulders relax, her eyes narrow and her other hand drifts towards the space on her wrist. She's about to realize what you've done, and you're far from safe. Your magical skill could get you out of this, but only if you find a way to use it. \n\t\t\t\t*set pov true\n\t\t\t\t*set socialcurrency -1\n\t\t\t\t*choice\n\t\t\t\t\t#I use my unnatural grace to flee before she gets too close a look at my face!\n\t\t\t\t\t\tYou step right onto the busy road, narrowly missing a costermonger's apple wagon, and then duck around an approaching horse. Before you can panic and lose your way, you remind yourself that running will save you because\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Her crinolines are too heavy to let her follow.\n\t\t\t\t\t\t\t\t*set science %+10\n\t\t\t\t\t\t\t\t*goto run\n\t\t\t\t\t\t\t#No-one of that status would risk the spectacle of chasing an urchin.\n\t\t\t\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t\t\t\t*goto run\n\t\t\t\t\t\t\t#I've studied these streets in case I needed to flee from a crime.\n\t\t\t\t\t\t\t\t*set discretion %+10\n\t\t\t\t\t\t\t\t*label run\n\t\t\t\t\t\t\t\tThe horse rolls its eyes and kicks at you with its back leg. You leap out of the way, copping a graze, and stumble on the cobbles. Still, no-one sounds a hue and cry. You run onwards until you're steaming with sweat and your legs are shaking—with fear or exhaustion, you can't tell. After all that, you suspect she'll remember your face—but once you've had a quick trip to the pawnbroker you have money in your pocket. \n\t\t\t\t\t\t\t\t*gosub goldgiftbackstory\n\t\t\t\t\t\t\t\t*label end\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tOnce you're absolutely sure you're out of sight, it's time to switch from one disguise to another. Sometimes you wonder which disguise is closer to your true self, but today you're too pleased with your success to care. Rich or poor, everyone likes money.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou complete your journey by carriage in order to keep up the appearance of wealth. Every time you use a carriage, you wish there was some other way to travel elegantly, since\t\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Even the slightest movement makes me feel ill.\n\t\t\t\t\t\t\t\t\t\t*set flaw \"Weak Stomach\"\n\t\t\t\t\t\t\t\t\t\t*set weak_stomach true\n\t\t\t\t\t\t\t\t\t\t*goto endy\n\t\t\t\t\t\t\t\t\t#So many carriage drivers weren't born on British soil, like me. Can I really trust them?\n\t\t\t\t\t\t\t\t\t\t*set flaw \"Xenophobia\"\n\t\t\t\t\t\t\t\t\t\t*set xenophobia true\n\t\t\t\t\t\t\t\t\t\t*goto endy\n\t\t\t\t\t\t\t\t\t#I inevitably get distracted by the scenery and don't switch disguises smoothly.\n\t\t\t\t\t\t\t\t\t\t*set flaw \"Easily distracte—Ooh! Shiny!\"\n\t\t\t\t\t\t\t\t\t\t*set distracted true\n\t\t\t\t\t\t\t\t\t\t*label endy\n\t\t\t\t\t\t\t\t\t\tAt last you're home, and not a moment too soon—it's raining. You alight from the carriage with your ragamuffin disguise bundled up under one arm and a bland smile for the driver. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYour house is beautiful: a modern Victorian marvel of white columns and red roses, with window-boxes of hothouse flowers proclaiming your extravagant wealth to anyone who cares to look. They're a perfect disguise for your desperate situation. Your mouth waters at the thought of how many meals you could eat if you'd never bought the flowers. But the wild colors would have made Mother smile, and that's almost worth it.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou walk up the pristine stairs to the door, blissfully ignorant that those three footsteps mark the death-knell for your respectable Belgravia life.\n\t\t\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t#I've only got one chance—talk fast! Magical charisma will save me. \n\t\t\t\t\t\t\tAs you talk, you watch her attention waver. Before you can panic and say something stupid, you remind yourself that talking will get you out of this mess because\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Instinct tells me it's the right thing to do in this situation.\n\t\t\t\t\t\t\t\t\t*set science %-10\n\t\t\t\t\t\t\t\t\t*goto talk\n\t\t\t\t\t\t\t\t#Surely if she truly sees me she won't want me hanged.\n\t\t\t\t\t\t\t\t\t*set discretion %-10\n\t\t\t\t\t\t\t\t\t*goto talk\n\t\t\t\t\t\t\t\t#Everyone has a weakness. If I can say the right thing, I'll be golden.\n\t\t\t\t\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t\t\t\t\t*label talk\n\t\t\t\t\t\t\t\t\tAs you talk, you can see all thought of her bracelet vanish. You leave her longing for you to stay, and she looks so thoroughly dazed you know she'll never blame you when she realizes the bracelet is gone. After a quick trip to the pawnbroker, you have money in your pocket too. \n\t\t\t\t\t\t\t\t\t*gosub goldgiftbackstory\n\t\t\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t#I look around, hoping to notice something with my magical senses that I can use.\n\t\t\t\t\t\t\tAs you stand like an idiot waiting for a flash of inspiration, you remind yourself not to panic. This is the best thing to do because\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I'm good at reading people.\n\t\t\t\t\t\t\t\t\t*set kindness %+10\n\t\t\t\t\t\t\t\t\t*goto idiot\n\t\t\t\t\t\t\t\t#Surely she won't really want me hanged.\n\t\t\t\t\t\t\t\t\t*set discretion %-10\n\t\t\t\t\t\t\t\t\t*goto idiot\n\t\t\t\t\t\t\t\t#I have a feeling hanging isn't my fate.\n\t\t\t\t\t\t\t\t\t*set science %-10\n\t\t\t\t\t\t\t\t\t*label idiot\n\t\t\t\t\t\t\t\t\tHer face hardens and she grabs your arm, peering into your face intently before you can shake her off and run. You know she'll remember you clearly. On the up side, after a trip to the pawnbroker you have money in your pocket.\n\t\t\t\t\t\t\t\t\t*set police false\n\t\t\t\t\t\t\t\t\t*gosub goldgiftbackstory\n\t\t\t\t\t\t\t\t\t*goto end\n\t\t\t#I pretend to stumble and slip off the bracelet when I do. It'll be a difficult angle, but my magic helps me manage complicated movements on the first go.\n\t\t\t\t*set metal \"Aluminum\"\n\t\t\t\t*set aluminium1 true\n\t\t\t\tYou flip the clasp and slip off the bracelet in one smooth motion that she didn't even notice. It has a promising weight in your hand. Just as you feel your shoulders relax, her eyes narrow and her hand drifts towards the space on her wrist. She's about to realize what you've done, and you're far from safe. Your magical skill could get you out of this, but only if you find a way to use it.\n\t\t\t\t*set socialcurrency -1\n\t\t\t\t*choice\n\t\t\t\t\t#I use my unnatural grace to flee before she gets too close a look at my face!\n\t\t\t\t\t\tYou step right onto the busy road, narrowly missing a costermonger's wagon, and then duck around an approaching horse. Before you can panic and lose your way, you remind yourself that running is the right choice because\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Her crinolines are too heavy to let her follow.\n\t\t\t\t\t\t\t\t*set science %+10\n\t\t\t\t\t\t\t\t*goto run2\n\t\t\t\t\t\t\t#No-one of that status would risk the spectacle of chasing an urchin.\n\t\t\t\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t\t\t\t*goto run2\n\t\t\t\t\t\t\t#I've studied these streets in case I needed to flee from a crime.\n\t\t\t\t\t\t\t\t*set discretion %+10\n\t\t\t\t\t\t\t\t*label run2\n\t\t\t\t\t\t\t\tThe horse rolls its eyes and kicks out with its back leg. You leap out of the way and run onwards until you're steaming with sweat and your legs are shaking—with fear or exhaustion, you can't tell. After all that, you suspect she'll remember your face—but at least after a quick trip to the pawnbroker you have money in your pocket. \n\t\t\t\t\t\t\t\t*gosub aluminiumgiftbackstory\n\t\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t#I've only got one chance—talk fast! Magical charisma will save me.\n\t\t\t\t\t\t\tAs you talk, she looks increasingly thoughtful. Before you can panic and say something stupid, you remind yourself that talking will get you out of this mess because\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Instinct tells me it's the right thing to do in this situation.\n\t\t\t\t\t\t\t\t\t*set science %-10\n\t\t\t\t\t\t\t\t\t*goto talk2\n\t\t\t\t\t\t\t\t#Surely if she truly sees me she won't want me hanged.\n\t\t\t\t\t\t\t\t\t*set discretion %-10\n\t\t\t\t\t\t\t\t\t*goto talk2\n\t\t\t\t\t\t\t\t#Everyone has a weakness. If I can say the right thing, I'll be golden.\n\t\t\t\t\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t\t\t\t\t*label talk2\n\t\t\t\t\t\t\t\t\tYou babble helplessly, and eventually realize she's using your nonsense to memorize your face. You excuse yourself and leave, knowing she'll be able to describe you accurately to police. After a quick trip to the pawnbroker, you have money in your pocket.\n\t\t\t\t\t\t\t\t\t*set police false\n\t\t\t\t\t\t\t\t\t*set happiness -10\n\t\t\t\t\t\t\t\t\t*gosub aluminiumgiftbacksto anged.\n\t\t\t\t\t\t\t\t\t*set discretion %-10\n\t\t\t\t\t\t\t\t\t*goto talk3\n\t\t\t\t\t\t\t\t#Everyone has a weakness. If I can say the right thing, I'll be golden.\n\t\t\t\t\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t\t\t\t\t*label talk3\n\t\t\t\t\t\t\t\t\tYou babble helplessly, but quickly realize she's using your nonsense to memorize your face. You excuse yourself and leave, hoping she didn't have enough time to be too accurate. After a quick trip to the pawnbroker, you have money in your pocket.\n\t\t\t\t\t\t\t\t\t*gosub brassgiftbackstory\n\t\t\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t#I look around, hoping to notice something with my magical senses that I can use.\n\t\t\t\t\t\t\tAs you stand like an idiot waiting for a flash of inspiration, you remind yourself not to panic. This is the best thing to do because\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I'm good at reading people.\n\t\t\t\t\t\t\t\t\t*set kindness %+10\n\t\t\t\t\t\t\t\t\t*goto idiot3\n\t\t\t\t\t\t\t\t#Surely she won't really want me hanged.\n\t\t\t\t\t\t\t\t\t*set discretion %-10\n\t\t\t\t\t\t\t\t\t*goto idiot3\n\t\t\t\t\t\t\t\t#I have a feeling hanging isn't my fate.\n\t\t\t\t\t\t\t\t\t*set science %-10\n\t\t\t\t\t\t\t\t\t*label idiot3\n\t\t\t\t\t\t\t\t\tYour fingers run along the precious stones of the necklace, feeling the perfect smoothness of the lines and the delicacy of the fitting. There's something engraved on the inside of the metal—initials, and a date.\n\n\t\t\t\t\t\t\t\t\tRealising the necklace has some kind of sentimental value, you immediately give it back to her, saying, \"My apologies Miss. It seems you dropped this.\" Her eyes fill with tears as she clings to the necklace, unconsciously running her finger over the engraving within. She thanks you and immediately slips off the diamond bracelet and gives it to you as a reward. You thank her in a daze and leave. Once you've been to the pawnbroker and gained real money in your pocket, you feel a little steadier.\n\t\t\t\t\t\t\t\t\t*gosub brassgiftbackstory\n\t\t\t\t\t\t\t\t\t*goto end\n\t#That drunken sot doesn't look particularly sharp.\n\t\t*set science %+10\n\t\tYou wander closer as if by accident, squeezing between a sudden crush of passers-by in voluminous skirts then twisting sideways as a gentleman lashes out at you with his cane. The first time someone believed your disguise thoroughly enough to treat you like a flea-bitten dog it was an enormous shock and you very nearly shouted for the Bobbies to assist you. Now it's all part of one more social dance: Dodge, cower, wriggle, disappear. Over time you learned how to appear poor enough to become invisible without looking poor enough to draw attention. The blows connect sometimes, but that just adds to your invisibility. As long as you can keep the bruises hidden at home, everything's fine. Step, step, shuffle, dodge.  And now you're close enough to touch the drunken man. Time to consider how best to steal the purse dangling from his waist.\n\t\t\n\t\tHe blinks and attempts to sit up.\n\t\t*choice\n\t\t\t#I smile and chat with him. Even in disguise, I've found I can charm anyone. It's literally magical.\n\t\t\t\t*set metal \"Gold\"\n\t\t\t\t*set gold1 true\n\t\t\t\tHe's so enthralled in your small talk he doesn't realize his leg is marinating in horse piss for some minutes. When he finally sniffs the air and glances down, you lean forwards sympathetically and pat him on the shoulder, lifting his purse as you straighten. It's surprisingly heavy. You make your farewells and feel your shoulders relax. But his eyes are clearing and his hand is drifting towards the empty loop on his belt. He's about to realize what you've done, and you're far from safe. Your magical skill could get you out of this, but only if you find a way to use it.\n\t\t\t\t*set socialcurrency -1\n\t\t\t\t*goto goldenuhohmale\n\t\t\t#I pretend to stumble and untie the purse when I do. It'll be a difficult angle, but my magic means I always manage complicated movements on the first go.\n\t\t\t\t*set metal \"Aluminum\"\n\t\t\t\t*set aluminium1 true\n\t\t\t\tYou smack your toe audibly against a cobblestone and topple forwards, right into his lap—neatly avoiding the puddle of horse urine as you do.\n\t\t\t\t\n\t\t\t\t\"Gerroff!\" he yells, swatting at you. He misses you, of course—but the purse is heavier than you expected and his arm connects with it, spilling coins everywhere and leaving you with less in the bag. His eyes clear and his free arm drifts towards the empty loop on his belt. He's about to realize what you've done, and you're far from safe. Your magical skill could get you out of this, but only if you find a way to use it.\n\t\t\t\t*set pov true\n\t\t\t\t*set socialcurrency -1\n\t\t\t\t*goto aluminiumuhohmale\t\t\n\t\t\t#I walk towards him openly, trusting my magically-enhanced senses will pick up something handy.\n\t\t\t\t*set metal \"Brass\"\n\t\t\t\t*set brass1 true\n\t\t\t\t*set socialcurrency -1\n\t\t\t\tHe takes one look at you and dismisses your presence, as so many do. His eyes drop to the road and he curses at the puddle of horse piss still soaking into his leg. He moves as if to stand up, but you have all too much experience with drunks these days and you know he can't do it alone. You wait for just the right moment, and when he starts to topple you step in, steadying him and lifting his surprisingly heavy purse off his belt at the same time. He gives you a smile of gratitude and you smile back—perfectly aware your small kindness has been well compensated.\n\t\t\t\t\n\t\t\t\tBut his eyes are clearing and one hand drifts towards the empty loop on his belt. He's about to realize what you've done, and you're far from safe. Your magical skill could get you out of this, but only if you find a way to use it.\n\t\t\t\t*set socialcurrency -1\n\t\t\t\t*choice\n\t\t\t\t\t#I use my unnatural grace to flee before he gets too close a look at my face!\n\t\t\t\t\t\tYou step right onto the busy road, narrowly missing a costermonger's wagon, and then duck around an approaching horse. Before you can panic and lose your way, you remind yourself that running is the right choice because\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#His legs are too unsteady for him to follow.\n\t\t\t\t\t\t\t\t*set science %+10\n\t\t\t\t\t\t\t\t*goto run6\n\t\t\t\t\t\t\t#No-one of that status would risk the spectacle of chasing an urchin.\n\t\t\t\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t\t\t\t*goto run6\n\t\t\t\t\t\t\t#I've studied these streets in case I needed to flee from a crime.\n\t\t\t\t\t\t\t\t*set discretion %+10\n\t\t\t\t\t\t\t\t*label run6\n\t\t\t\t\t\t\t\tThe horse rolls its eyes and kicks out with its back leg. You leap out of the way, copping a graze, and stumble on the cobbles. He definitely got a clear look at your face. You run onwards until you're streaming with sweat and your legs are shaking—with fear or exhaustion, you can't tell. \n\t\t\t\t\t\t\t\t*set police false\n\t\t\t\t\t\t\t\t*set happiness -10\n\t\t\t\t\t\t\t\t*gosub brassgiftbackstory\n\t\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t#I've only got one chance—talk fast! Magical charisma will save me.\n\t\t\t\t\t\t\tAs you talk, he looks increasingly thoughtful. Before you can panic and say something stupid, you remind yourself that talking will get you out of this mess because\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Instinct tells me it's the right thing to do in this situation.\n\t\t\t\t\t\t\t\t\t*set science %-10\n\t\t\t\t\t\t\t\t\t*goto talk6\n\t\t\t\t\t\t\t\t#Surely if he truly sees me he won't want me hanged.\n\t\t\t\t\t\t\t\t\t*set discretion %-10\n\t\t\t\t\t\t\t\t\t*goto talk6\n\t\t\t\t\t\t\t\t#Everyone has a weakness. If I can say the right thing, I'll be golden.\n\t\t\t\t\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t\t\t\t\t*label talk6\n\t\t\t\t\t\t\t\t\tYou babble helplessly, and when you realize he's using your nonsense to memorize your face you excuse yourself and leave, walking stiffly away into the crowd. \n\t\t\t\t\t\t\t\t\t*gosub brassgiftbackstory\n\t\t\t times, but that just adds to your invisibility. As long as you can keep the bruises hidden at home, everything's fine. Step, step, shuffle, dodge. And now you're close enough to touch the driver. Time to consider how best to steal the cash-box he's foolishly left with its key in the lock. \n\t\t*choice\n\t\t\t#I smile and chat with him. Even in disguise, I've found I can charm anyone. It's literally magical.\n\t\t\t\t*set metal \"Gold\"\n\t\t\t\t*set gold1 true\n\t\t\t\t\"Pardon me for saying so Sir, but you have a rare talent for… er, aiming your horse.\"\n\t\t\t\t\n\t\t\t\tHe scowls at you reflexively, but in a moment his face clears and he grants a modest smile. \n\t\t\t\t\n\t\t\t\t\"He's a beauty,\" you say. \"The horse is, Sir, I mean.\"\n\t\t\t\t\n\t\t\t\tThe driver glances at his horse and offers dubious agreement as you slip the cash-box from his seat, holding it carefully out of sight.\n\t\t\t\t\n\t\t\t\tYou farewell him smoothly and begin to relax, but his eyes sharpen and his hand drifts towards the empty space beside him. He's about to realize what you've done, and you're far from safe. Your magical skill could get you out of this, but only if you find a way to use it.\n\t\t\t\t*set socialcurrency -1\n\t\t\t\t*goto goldenuhohmale\n\t\t\t#I pretend to stumble and grab the cash-box when I do. It'll be a difficult angle, but my magic means I always manage complicated movements on the first go.\n\t\t\t\t*set metal \"Aluminum\"\n\t\t\t\t*set aluminium1 true\n\t\t\t\tYou deliberately trip on the gutter and half-fall into the carriage driver's lap. As you get a nice grip on the box he raps you on the head with the iron tip on his whip, momentarily blurring your vision even as you straighten up with cash-box in hand. It's surprisingly heavy, so you don't mind. But he looks up at you and one of his hands moves towards the empty space beside him. He's about to realize what you've done, and you're far from safe. Your magical skill could get you out of this, but only if you find a way to use it.\n\t\t\t\t*goto aluminiumuhohmale\t\t\t\t\t\t\n\t\t\t#I walk towards him openly, trusting my magically-enhanced senses will pick up something handy.\n\t\t\t\t*set metal \"Brass\"\n\t\t\t\t*set brass1 true\n\t\t\t\t*set socialcurrency -1\n\t\t\t\tThe street is a symphony: smells of talcum powder, sweat, and soap from the people; the shimmer and twinkle of apples and fish on the closest wagons; the rattle of wheels and the huffing of horses passing by. Amongst it all you smell horse piss again, and know instantly it's the carriage-driver's second horse. Of course this second salvo is drawing all his attention, so it's easy as pie to lift the box from the seat beside him—too easy, in fact: in your haste the lid pops open, spilling coins. You snap it closed on the rest of your prize and take a step back ready to disappear. But the horse is done and the driver turns to face forwards once again. One of his hands instinctively drifts to the empty place beside him. He's about to realize what you've done, and you're far from safe. Your magical skill could get you out of this, but only if you find a way to use it.\n\t\t\t\t*set pov true\n\t\t\t\t*set socialcurrency -1\n\t\t\t\t*choice\n\t\t\t\t\t#I use my unnatural grace to flee before he gets too close a look at my face!\n\t\t\t\t\t\tYou step right onto the busy road, narrowly missing a costermonger's wagon, and then duck around an approaching horse. Before you can panic and lose your way, you remind yourself that running is the right choice because\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#His legs are too tangled in reins for him to follow.\n\t\t\t\t\t\t\t\t*set science %+10\n\t\t\t\t\t\t\t\t*goto run9\n\t\t\t\t\t\t\t#No-one of that status would risk the spectacle of chasing an urchin.\n\t\t\t\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t\t\t\t*goto run9\n\t\t\t\t\t\t\t#I've studied these streets in case I needed to flee from a crime.\n\t\t\t\t\t\t\t\t*set discretion %+10\n\t\t\t\t\t\t\t\t*label run9\n\t\t\t\t\t\t\t\tThe horse rolls its eyes and kicks out with its back leg. You leap out of the way, copping a graze, and stumble on the cobbles. He definitely got a clear look at your face. You run onwards until you're steaming with sweat and your legs are shaking—with fear or exhaustion, you can't tell. \n\t\t\t\t\t\t\t\t*set police false\n\t\t\t\t\t\t\t\t*set happiness -10\n\t\t\t\t\t\t\t\t*gosub brassgiftbackstory\n\t\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t#I've only got one chance—talk fast! Magical charisma will save me.\n\t\t\t\t\t\t\tAs you talk, he looks increasingly thoughtful. Before you can panic and say something stupid, you remind yourself that talking will get you out of this mess because\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Instinct tells me it's the right thing to do in this situation.\n\t\t\t\t\t\t\t\t\t*set science %-10\n\t\t\t\t\t\t\t\t\t*goto talk9\n\t\t\t\t\t\t\t\t#Surely if he truly sees me he won't want me hanged.\n\t\t\t\t\t\t\t\t\t*set discretion %-10\n\t\t\t\t\t\t\t\t\t*goto talk9\n\t\t\t\t\t\t\t\t#Everyone has a weakness. If I can say the right thing, I'll be golden.\n\t\t\t\t\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t\t\t\t\t*label talk9\n\t\t\t\t\t\t\t\t\tYou babble helplessly, and when you realize he's using your nonsense to memorize your face you excuse yourself and leave, walking stiffly away into the crowd. \n\t\t\t\t\t\t\t\t\t*gosub brassgiftbackstory\n\t\t\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t#I look around, hoping to notice something with my magical senses that I can use.\n\t\t\t\t\t\t\tAs you stand like an idiot waiting for a flash of inspiration, you remind yourself not to panic. This is the best thing to do because\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I'm good at reading people.\n\t\t\t\t\t\t\t\t\t*set kindness %+10\n\t\t\t\t\t\t\t\t\t*goto idiot9\n\t\t\t\t\t\t\t\t#Surely he won't really want me hanged.\n\t\t\t\t\t\t\t\t\t*set discretion %-10\n\t\t\t\t\t\t\t\t\t*goto idiot9\n\t\t\t\t\t\t\t\t#I have a feeling hanging isn't my fate.\n\ t\t\t*set police false\n\t\t\t\t\t\t\t\t\t*set happiness -10\n\t\t\t\t\t\t\t\t\t*gosub aluminiumgiftbackstory\n\t\t\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t#I stop to pay attention to my surroundings. Maybe I can find a way out of this if I'm smart about it.\n\t\t\t\t\t\t\tAs you stand like an idiot waiting for a flash of inspiration, you remind yourself not to panic. This is the best thing to do because\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#I'm good at reading people.\n\t\t\t\t\t\t\t\t\t*set kindness %+10\n\t\t\t\t\t\t\t\t\t*goto idiot5\n\t\t\t\t\t\t\t\t#Surely he won't really want me hanged.\n\t\t\t\t\t\t\t\t\t*set discretion %-10\n\t\t\t\t\t\t\t\t\t*goto idiot5\n\t\t\t\t\t\t\t\t#I have a feeling hanging isn't my fate.\n\t\t\t\t\t\t\t\t\t*set science %-10\n\t\t\t\t\t\t\t\t\t*label idiot5\n\t\t\t\t\t\t\t\t\tHis face hardens and he makes a grab for your arm. You barely dodge away in time, and can only hope he didn't have time to accurately memorize your face.\n\t\t\t\t\t\t\t\t\t*gosub aluminiumgiftbackstory\n\t\t\t\t\t\t\t\t\t*goto end\t\t\t\t\t\n\n*label goldgiftbackstory\n\nYou walk away offering a silent thank-you to your father's ghost. When an experiment in his basement laboratory went spectacularly awry, a piece of gold shrapnel sliced into your leg and wedged in the bone there. Father insisted on leaving it where it was rather than having it removed. Your innate charm can be traced back to that decision. The excitement of the explosion activated the gold's innate magic, and you've never been the same.\n*page_break\n*return\n*label brassgiftbackstory\n\nYou walk away offering a silent thank-you to your father's ghost. When an experiment in his basement laboratory went spectacularly awry, a piece of brass shrapnel sliced into your leg and wedged in the bone there. Father insisted on leaving it where it was rather than having it removed. Your increased sensory ability can be traced back to that decision. The excitement of the explosion activated the innate magic of the brass, and you've never been the same.\n*page_break\n*return\n*label aluminiumgiftbackstory\n\nYou walk onwards offering a silent thank-you to your father's ghost. When an experiment in his basement laboratory went spectacularly awry, a piece of aluminum shrapnel sliced into your leg and wedged in the bone there. Father insisted on leaving it where it was rather than having it removed. Your unusual coordination can be traced back to that decision. The excitement of the explosion activated the aluminum's innate magic, and you've never been the same.\n*page_break\n*return\n", "1b": "\"Pardon me,\" says a heavily-accented voice from somewhere in the region of your feet.\nYou see him then, crouched on your doorstep: a Jewish-looking child dressed in patchwork clothes, with eyes as big and luminous as gold sovereigns.\n\nYou give him a shiny brass farthing, knowing all too well what real poverty feels like.\n\n\"Cor, thanks,\" he says, and you wonder who attempted to infuse his speech with Cockney flair. He's holding up a scrunched and soggy envelope, and doing his best to pretend to read the name above your address. You wonder what has happened to the regular postal service. \"Master… Miss… ?\"\n\nYou put him out of his misery. The writing is too smudged to tell anyway.\n*choice\n\t#\"Master—it's for me.\"\n\t\t*set pcismale true\n\t\tHe glances up at you in despair and attempts to make out the letters of your name by sheer willpower.\n\t\t\n\t\tBeneath the water stains, the letter does indeed say your full name. \"I'm…\"\n\t\t*choice\n\t\t\t#Jeremy Muchamore.\n\t\t\t\t*set first_name \"Jeremy\"\n\t\t\t\t*set last_name \"Muchamore\"\n\t\t\t\t*set novellinkjeremy true\n\t\t\t\t*goto next\n\t\t\t#James Bhai.\n\t\t\t\t*set first_name \"James\"\n\t\t\t\t*set last_name \"Bhai\"\n\t\t\t\t*set siblingname \"Anastasia\"\n\t\t\t\t*goto next\n\t\t\t#Henry Xiniwe.\n\t\t\t\t*set first_name \"Henry\"\n\t\t\t\t*set last_name \"Xiniwe\"\n\t\t\t\t*set siblingname \"Sarah\"\n\t\t\t\t*goto next\n\t\t\t#None of the above.\n\t\t\t\t*set siblingname \"Anna\"\n\t\t\t\t*input_text first_name\n\t\t\t\tYour surname is…\n\t\t\t\t*input_text last_name\n\t\t\t\t*goto next\n\t#\"Miss—it's for me.\"\n\t\tHe glances up at you in despair and attempts to make out the letters of your name by sheer willpower.\n\n\t\tBeneath the smudges, the letter does indeed say your full name. \"I'm…\"\n\t\t*choice\n\t\t\t#Arabella Muchamore.\n\t\t\t\t*set first_name \"Arabella\"\n\t\t\t\t*set last_name \"Muchamore\"\n\t\t\t\t*set novellinkarabella true\n\t\t\t\t*goto next\n\t\t\t#Anastasia Bhai.\n\t\t\t\t*set first_name \"Anastasia\"\n\t\t\t\t*set last_name \"Bhai\"\n\t\t\t\t*set siblingname \"James\"\n\t\t\t\t*goto next\n\t\t\t#Sarah Xiniwe.\n\t\t\t\t*set first_name \"Sarah\"\n\t\t\t\t*set last_name \"Xiniwe\"\n\t\t\t\t*set siblingname \"Henry\"\n\t\t\t\t*goto next\n\t\t\t#None of the above.\t\n\t\t\t\tYour first name is…\n\t\t\t\t*input_text first_name\n\t\t\t\tYour surname is…\n\t\t\t\t*input_text last_name\n\t\t\t\t*set siblingname \"James\"\n\t\t\t\t*label next\n*set name (\"${first_name}\"&\" \")&\"${last_name}\"\n*if novellinkjeremy\n\t*set siblingname \"Arabella\"\n\t*set emmelinename \"Emmeline\"\n\t*goto done\n*elsif novellinkarabella\n\t*set siblingname \"Jeremy\"\n\t*set emmelinename \"Emmeline\"\n\t*goto done\n*else\n\t*set emmelinename \"Eleanor\"\n*label done\nThe child surrenders the letter gladly, and you glance at it with mild curiosity. You lift your hand for the bell, hoping as always that your neighbors don't notice your lack of a doorman. The sender's name on the envelope stops your breath. You halt with one arm still raised, no longer caring a jot what your neighbors might observe of your household's lack of propriety. Despite the ragged condition of the letter the handwriting of the address is instantly recognizable, confirming the eerie truth. \n\nYou clutch the envelope like a lifeline, staring at the name written there and reading it over and over until the letters dance before your eyes. Trembling with shock, you force yourself to look away before reading it one last time, noting as you do that the unfaded ink means it was certainly not penned five years ago.\n\n[i]$!{emmelinename} $!{last_name}.[/i]\t\t\t\n\t\t\t\t\nYour dead sister is alive.\n*page_break\nYou stumble against your own doorway, shocked beyond words. How did $!{emmelinename} escape her fate? Where is she? Why didn't she write sooner? Who is this child and why were they charged with delivering the letter instead of someone official?\n\nBefore you ring the bell, you…\n*choice\n\t#Tear open the letter and examine it closely.\n\t\t*if (brass1) and (science>50)\n\t\t\tThe only legible words are \"help\" and the single undamaged line, \"Bring the whole family to Australia.\" But it's clearly been handled by someone other than this child—someone who unfolded and refolded it over and over, apparently bearing it by hand all the way from Australia, and often crushing it with the force of their grip. So who was it?\n\t\t\n\t\t\tYou follow the frightened gaze of the child and see a dark-haired woman in the street just ducking out of sight. She must have carried the letter—and felt strongly about its contents. You've never seen her before.\n\t\t\t*goto onward\n\t\t*elsif (science >50) or (brass1)\n\t\t\tThe only legible words are \"help\" and the single undamaged line, \"Bring the whole family to Australia.\" But it's clearly been handled by someone other than this child—someone who unfolded and refolded it over and over, apparently bearing it by hand all the way from Australia, and often crushing it with the force of their grip. So who was it?\n\t\t\t*goto onward\n\t\t*else\n\t\t\tThe only legible words are \"help\" and the single undamaged line, \"Bring the whole family to Australia.\"\n\t\t\t*label onward\n\t\t\n\t\tThe boy scampers away, clutching the farthing you gave him. \n\t\t*page_break\n\t\t*goto last\n\t#Question the child.\n\t\t*if (discretion \u003c50) and (aluminium1)\n\t\t\tIn amongst a flood of mangled Cockney slang, you make out the name \"Melbourne\".\n\t\t\t\n\t\t\t\"Melbourne, Australia?\"\n\t\t\t\n\t\t\tHe gives a shrug that appears to be agreement.\n\t\t\t\n\t\t\tWhat on earth is $!{emmelinename} doing in Australia?\n\t\t\t\n\t\t\tAs your attention wavers, the boy darts away. You reflexively grab him, and you see where he's looking—across the road to a dark-haired woman just ducking out of sight. Who is she, and what does she have to do with your family?\n\t\t\t*goto onward\n\t\t*elsif (discretion \u003c50) or (aluminium1)\n\t\t\tIn amongst a flood of mangled Cockney slang, you make out the name \"Melbourne\".\n\t\t\t\n\t\t\t\"Melbourne, Australia?\"\n\t\t\t\n\t\t\tHe gives a shrug that appears to be agreement.\n\t\t\t\n\t\t\tWhat on earth is $!{emmelinename} doing in Australia?\n\t\t\t*goto onward\n\t\t*else\n\t\t\tHe dissolves into Cockney phrases so mangled there's no hope of understanding him. You sigh in frustration, but it's clear you can't keep him with you. \n\t\t\t*goto onward\n\t#Look back at the street. \n\t\t*if (kindness \u003c50) and (gold1)\n\t\t\tYou see a dark-skinned woman staring at you, frowning as if she is struggling to make up her mind about what she sees. That makes two of you. Who is she, and what does she have to do with your family?\n\n\t\t\tJudging by the urchin's consternation, this woman paid him to deliver $!{emmelinename}'s letter.\n\t\t\t*goto onward\n\t\t*elsif (gold1) or (kindness\u003c50)\n\t\t\tYou see a dark-skinned woman staring at you, frowning as if she is struggling to make up her mind. That makes two of you. Who is she, and what does she have to do with your family?\n\t\t\t*goto onward\n\t\t*else\n\t\t\tPassers-by look back at you, and you realize you're making a scene.\n\t\t\t*goto onward\n*label last\n\nYour \n*if pcismale\n\tsister \n\t*goto sibling\n*else\n\tbrother\n*label sibling\n${siblingname} ushers you inside with a guilty glance towards your neighbors' windows. You almost laugh, since you'd completely forgotten—for a moment—the threat of gossip and social ruin. When you realize there are three remaining siblings in the $!{last_name} family rather than two, joy hits you like a runaway train. You laugh so hard you can't breathe and your eyes fill with tears. Dead or alive, it seems $!{emmelinename} is fated to make you weep.\n\n\"What's wrong?\" says $!{siblingname}, appalled at your display. \"Shut your sauce-box before you break it. You're scaring me.\"\n\n\"$!{siblingname}… $!{emmelinename}'s alive.\"\n \n*page_break\n\"No she's not,\" $!{siblingname} says flatly.\n\nBy way of answer you hold up the envelope, with the sender's name clearly visible. $!{siblingname} snatches it from you, and for once ill manners don't matter. \n\nThe entryway tiles are cool under your hand, and you suppress a second emotional outburst by removing your glove and pressing your palm against the stone. You look up in time to see $!{siblingname} fall to the floor beside you, eagerly drawing forth the letter.\n\n\"But—it's too damaged to read! Except… Australia?\"\n\nIt's your turn to be calm. \"I gather she was transported for her theft—not executed.\"\n\n\"What horrors she must have seen! Will she be terribly altered? Why didn't she write sooner?\"\n\nYou shake your head, too overwhelmed to speak further. Transportation is as permanent as a death sentence, and evidently $!{emmelinename}'s judge was one of those who simply recorded transported convicts as legally dead. You tremble with rage before you get ahold of yourself once more. \n\nOf all the colonies, she had to go to Australia! That awful place had been in the papers for months. Apparently the colonials wanted to be independent from their true home, and they were willing to kill good British souls to get their way. \n\nWhy would anyone want to leave the British Empire?\n\n\"We're going, of course,\" says $!{siblingname}. \"Aren't we?\"\n\nYou take a deep breath and keep your hand flat against the cool floor. \"So it would appear.\" It won't be an easy journey, but…\n*choice\n\t#$!{siblingname} hasn't looked so happy in a long time.\n\t\t*set kindness %+10\n\t\t*set siblingbond %+10\n\t\t*goto endish\n\t#Stealing is getting more and more hazardous.\n\t\t*set science %+10\n\t\t*set discretion %+10\n\t\t*goto endish\n\t#It'll be an adventure.\n\t\t*set contentment %-10\t\n\t\t*set discretion %-10\n\t\t*label endish\n\t\tUnfortunately you simply don't have enough money for a voyage to the other side of the world. You have no choice but to sell the house, leaving your Belgravia life behind forever. As you write the instructions for your lawyer, you feel like you're dreaming. It's so odd to be giving up the physical manifestation of your social standing with a simple note. As you sign it, you hope you haven't just destroyed one sibling's respectable life for the sake of a blurred note from the other. \n\n\t\tThe $!{last_name} family's future is a blank page now: equal parts exhilarating and terrifying. If you fail, $!{siblingname} fails with you—and now so does $!{emmelinename}. Suddenly you have twice as much to lose.\n\t\t\n\t\tYou and $!{siblingname} give all you can spare to your one remaining servant with instructions to clean and close the house. Tom is the most discreet servant you've ever had—you wouldn't have kept him otherwise—so you take the liberty of asking him to actively spread the word that you and $!{siblingname} have decided to head to the Australian goldfields \"for a lark.\" It's a weak excuse, but perhaps your youth will make it plausible. You don't want to burn any bridges that might bring you safely back to London some day. Although your few relatives aren't close enough to help you maintain your reputation, they might take you in if you returned destitute from overseas. You shudder at the thought.\n\t\t\n\t\tOnce you've packed clothing, some tools, and everything you and $!{siblingname} can fit into a large steamer-trunk, you double-check that your \n\t\t*if pcismale\n\t\t\tsword cane still draws smoothly, and allow yourself the luxury of choosing a single small item to take with you.\t\n\t\t\t*goto knife\n\t\t*else\n\t\t\tconcealed parasol knife still draws smoothly, and allow yourself the luxury of choosing a single small item to take with you.\n*label knife\n*page_break\nA sentimental item made of metal will already be attuned to you, activating its magic if you keep it close by. That makes it practical as well as precious. Tin and Silver improve mechanical skill; Iron increases physical strength; Brass fine-tunes one's senses; Lead heightens emotions; Gold makes it easier to charm others; and Aluminum will subtly improve your coordination by neutralizing your weight.\n*if police\n\t*choice\n\t\t#I choose the tin snuff box $!{siblingname} made for me as a child. \n\t\t\t$!{siblingname}'s snuff box was poorly made from cheap tin, but it was made for you. Besides, the tin can communicate with you—a little. \n\t\t\t*set tin true\n\t\t\t*set siblingbond %+10\n\t\t\t*set mechanical +10\n\t\t\t*goto pocket\n\t\t#I choose the iron spanner $!{emmelinename} gave to me as a child. \n\t\t\t$!{emmelinename}'s spanner is shiny with age and barely usable, but it was the first proper tool you owned. Also, the iron will strengthen you—a little. \n\t\t\t*set iron true\n\t\t\t*set emmelinebond %+10\n\t\t\t*goto pocket\n\t\t#I choose the brass goggles $!{emmelinename} used to wear during her experiments. \n\t\t\t$!{emmelinename}will probably want her brass goggles back when you see her—but enhanced senses will be useful in the meantime.\n\t\t\t*set brass true\n\t\t\t*set emmelinebond %+10\n\t\t\t*if weak_stomach\n\t\t\t\t*set weak_stomach false\n\t\t\t\t*achieve overcomeflaw\n\t\t\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t\t\t*goto pocket\n\t\t\t*else\n\t\t\t\t*goto pocket\n\t\t#I choose Mother's leaden heart—still resting on the dresser in her room where she left it.\n\t\t\tYou find yourself walking into the abandoned master bedroom, pulling the dust-cover from the dressing table and taking the small heart-shaped piece of lead from the place where Mother's jewellery box used to be. It warms at the clasp of your hand, and you remember the way Mother always smelled of oil paints and of wildflowers. She liked to hold the lead heart as she painted, letting it intensify the deepest emotions she felt. It's unlikely to be of any practical use, but the sweet torture of grief is all you have left of her. As you replace the cover, you are careful not to disturb the heart-shaped gap in the dust where it lay.\n\t\t\t*set lead true\n\t\t\t*set emmelinebond %+10\n\t\t\t*set siblingbond %+10\n\t\t\t*goto pocket\n\t\t#I choose the little silver chalice $!{siblingname}'s always liked.\n\t\t\tIt's foolish, but there's exactly one piece of real silver left in the house: a tiny cup no bigger than your thumb. You would have sold it, but $!{siblingname} said it might be handy if the Faerie Queen ever visited. Silver is such a proud metal you couldn't resist keeping it in case your fortunes really did turn once more. It's the only metal that can bond to organic material—something proper society forbids, but your family can't seem to resist—and having silver nearby gives mechanics a sixth sense about how to do their work.\n\t\t\t*set silver true\n\t\t\t*set siblingbond %+10\n\t\t\t*set mechanical +10\n\t\t\t*goto pocket\n\t\t#I choose Mother's golden wedding ring, still hoping $!{siblingname} will use it some day.\n\t\t\tCarrying Mother's wedding band will make you more charming to everyone you meet—especially those of the opposite sex—which will surely smooth your way.\n\t\t\t*set gold true\n\t\t\t*set siblingbond %+10\n\t\t\t*goto pocket\n\t\t#I choose the family's single tiny sliver of precious aluminum.\n\t\t\tAs you draw the aluminum from its hiding place you feel it neutralising your weight, making you feel lighter and more coordinated in an instant. $!{emmelinename} loves metals; she'll enjoy knowing the $!{last_name} family owns aluminium—even such a tiny piece. \n\t\t\t*set aluminum true\n\t\t\t*set emmelinebond %+10\n\t\t\t*label pocket\n\t\t\t\n\t\t\tYou slip it into an inner pocket, and whisper a goodbye to the home you fought so hard to keep. Best not to think about whether the decisions you've made until this point were right or wrong: It's too late now.\n\t\t\t*goto huh\n*else\n\t$!{siblingname} startles you as you're standing transfixed by the browned gilt of the wallpaper. \"Why are the Bow Street Runners here?\"\n\t\t\n\tA part of you is impressed at the efficiency of the law in apprehending thieves like you. Snapping out of your reverie, you run for your trunk and let $!{siblingname} scramble to follow. \"Long story! The short of it is we need to go—now!\"\n\t\n\t\"But—my things! I'm not ready!\"\n\t\t\n\t\"There's no time,\" you say, feeling a stab of grief at leaving every single beautiful or sentimental part of your old life behind. As you hurry out the back door, you have just enough time to grab the little silver cup you kept after selling all the rest of the household silver. Silver is such a proud metal you couldn't resist keeping it in case your fortunes really did turn once more. It's the only metal that can bond to organic material—something proper society forbids, but your family can't seem to resist—and having silver nearby gives mechanics a sixth sense about how to do their work. Who knows? Perhaps it will come in handy someday.\n\t*set silver true\n\t*set siblingbond %+10\n\t*set mechanical +10\n\t\t\n\tYou slip it into your pocket and rip apart your own fence in order to escape. It's been a long time since you became a thief, but you've never felt real fear of the law until now.\n*label huh\n*page_break\nWhen you reach the street, you force yourself to take slow breaths to avoid attention. All at once, a carriage draws up beside you and a dark-haired woman leans out. She was on the street when $!{emmelinename}'s letter was delivered! Her skin is brown as cocoa, but she doesn't look African or Indian. She's something else entirely—and even better dressed than you are. Something tells you she might just be an Australian Aborigine. Her green satin skirts shimmer with newness, and she wears a polished brass corset carved with a design of slender trees. The perfectly-fitted segments are laced together with real gold thread. \n\n\"Get in,\" she says, with no trace of an accent. \"Quickly now, if you please.\"\n*fake_choice\n\t#I take a step back—this woman is acting very suspicious.\n\t\t*set discretion %+10\n\t\t*set matildabond %-10\n\t#I take a step forwards—this woman is obviously connected to $!{emmelinename} somehow.\n\t\t*set discretion %-10\n\t\t*set emmelinebond %+10\n\t#I hesitate, wanting more information before I put $!{siblingname} in any more danger.\n\t\t*set science %+10\n\t\t*set siblingbond %+10\n*page_break\n\"But—\" you sputter, \"We're just about to take ship.\"\n\n\"To Australia,\" she says. \"I know. $!{emmelinename} sent me to keep an eye on you—and it's a good thing too. She was beginning to suspect all her letters were being stopped, and I gather that's precisely what happened. I carried her latest letter by hand, and even hired a child to deliver it directly to you. $!{emmelinename} told me to keep my distance at first to let you make up your own mind, but now the police are after you! So… shall we?\"\n\nWith little choice, you climb into the carriage with the stranger and rattle away to the docks.\n*if novellinkjeremy\n\t*set matildaname \"Matilda\"\n\t*goto k\n*elsif novellinkarabella\n\t*set matildaname \"Matilda\"\n\t*goto k\n*else\n\t*set matildaname \"Mary\"\n*label k\n\n\"Call me $!{matildaname},\" she says. \n\n\"I'm—\"\n\n\"$!{name}. And $!{siblingname}. We might as well skip the formalities, since we're about to become ship-mates.\"\n\n\"Oh,\" you say weakly, grateful for her help as the last patchwork fragments of your respectable Belgravia façade fall to rags around you. \"How nice.\"\n\n*set socialcurrency -1\n*set britishanger +10\n*set colonialanger +10\n*finish", "2a": "With every jolt and clatter of the carriage wheels you expect to be stopped and dragged away to Newgate Prison. \n*choice\n\t#I count the rivets on the scuffed floor to calm myself. \n\t\t*set mechanical +5\n\t\t$!{matildaname}'s shoes peek out from beneath her green overskirt, revealing the distinctive pointed toe of the adjustable-height footwear $!{emmelinename} invented so long ago. This pair is set to the maximum height, even though $!{matildaname}'s already tall. Evidently she likes to tower over others. Since the shoes fit her perfectly, $!{emmelinename} must have made them especially for her. That proves she really is close to your sister, and you relax—a little.\n\t\t*goto page\n\t#I talk to $!{siblingname}. Perhaps I can avoid questions about why the police are after me.\n\t\t*set kindness %-10\n\t\t$!{siblingname}'s bright face and calming words only serve as a reminder that you may have already ruined everything that matters in life. It's perfectly clear your thieving was no secret \n\t\t*if pcismale\n\t\t\tfrom her\n\t\t\t*goto blarg\n\t\t*else\n\t\t\tfrom him\n\t\t*label blarg\n\t\tafter all, and you feel a proper fool. The conversation falters, and you look at the floor in shame.\n\t\t\n\t\t$!{matildaname}'s shoes peek out from beneath her green overskirt, revealing the distinctive pointed toe of the adjustable-height footwear $!{emmelinename} invented so long ago. This pair is set to the maximum height, even though $!{matildaname}'s already tall. Evidently she likes to tower over others. Since the shoes fit her perfectly, $!{emmelinename} must have made them especially for her. That proves she really is close to your sister, and you relax—a little.\n\t\t*goto page\n\t#I accept what fate is about to bring.\n\t\t*set contentment %+10\n\t\t$!{matildaname}'s shoes peek out from beneath her green overskirt, revealing the distinctive pointed toe of the adjustable-height footwear $!{emmelinename} invented so long ago. This pair is set to the maximum height, even though $!{matildaname}'s already tall. Evidently she likes to tower over others. Since the shoes fit her perfectly, $!{emmelinename} must have made them especially for her. That proves she really is close to your sister, and you relax—a little.\n\t\t*label page\n*if xenophobia\n\tOn the other hand, she clearly has the funds to live in London, and has chosen not to. That shows poor judgement, at the very least.\n\t*goto postx\n*else\n\t*label postx\n*page_break\nAn eternity later, the foetid stink of the Thames gives way to the tarry, fishy smell of the docks. \n\nThe harbor is a hive of activity, and you instinctively move closer to $!{siblingname} as you're surrounded by sallow-faced dock workers in threadbare and stained clothing. \n\n\"My brother would hate this place,\" $!{matildaname} says wistfully. \"I was right to leave without him.\"\n\nPacks of half-feral children scale an enormous pile of timber nearby, bouncing from outstretched planks like monkeys. One of them slips and tumbles from one part of the pile to another, cutting a deep gash into her leg. Without crying, she swings down to ground level to swipe a handful of fresh tar from a bucket and smear it on her wound to stem the bleeding. She smiles at her gruesome handywork, revealing rotted gaps between her remaining teeth. Then she scales the pile of planks once more to join her friends far above pedestrians like you—higher than the topmost masts of the tall ships lined up in a neat row all along the closest dock. Her companions shout with laughter at a joke no-one else could possibly hear.\n*fake_choice\n\t#I'm reminded to fight for my station in life—at all costs.\n\t\t*set contentment %-10\n\t#Those teeth look painful. I hold up a coin so she can go to the dentist.\n\t\t*set kindness %+10\n\t\tShe swings down, grabs the coin, and clambers back up like a monkey. You wonder what you'd have become if you were born into such poverty.\n\t#I check my purse is secure. Those kids are far better thieves than I am.\n\t\t*set discretion %+10\n\nThe three of you alight from the carriage and have a porter load your trunk onto his cart. You see an enormous wooden crate lashed onto the back of the carriage, marked with $!{emmelinename}'s initials and an address in Australia. When you see the sender's mark, you blurt out, \"Is that really from the palace?\"\n\n\"Certainly,\" says $!{matildaname}. \"I wouldn't have accepted it otherwise. It's terribly inconvenient to carry around—much heavier than it looks.\"\n\n\"Buckingham Palace?\" you say, touching the indentation in the wood with a single finger before $!{matildaname}'s porter can get to it.\n\n\"You didn't know?\" she says. \"Did you think it was coincidence the police caught up to you today, of all days? I was \"invited\" to the palace by name the second I stepped ashore. Something peculiar connects Her Majesty to your family, and I only hope $!{emmelinename} can figure it out. Luckily for you, I happen to have a knack for backup plans.\"\n\n\"I have absolutely no connection to the palace!\" you protest, but she ignores you.\n*page_break\n\"That's our ship,\" says $!{matildaname}, pointing beyond the tall ships to a row of smoke-blackened steamers three docks farther along, gathered in the closest possible proximity to a coal warehouse on shore. \"[i]The Iron Maiden[/i]. Whoever named her was more poet than historian—but it'll get us out of London quickly. The down side is that if we've made it this far I can't help feeling like your friend at the palace has deliberately let us go.\"\n\nThe three of you walk to the ship, where $!{matildaname} orders two suites: one for herself and one for you and $!{siblingname}. \n\nThe Captain hesitates. \"Begging your pardon, Miss. The starboard suite is already booked, and each suite costs a hundred guineas.\"\n\n$!{siblingname} stifles a gasp at the exorbitant price, but $!{matildaname} doesn't bat an eye. You're almost certain she knows you can't afford a suite without her aid. She's testing you.\n*choice\n\t#I put on my rich-person show and say, \"The starboard guest is not here, and we are.\" \n\t\t*set matildabond %+10\n\t\t*set kindness %-10\n\t\t*goto inevitable\n\t#\"Don't put yourself into difficulties on our account,\" I say. \"We'll take the next best room.\"\n\t\t*set kindness %+10\n\t\t*set contentment %+10\n\t\tYou settle into a cramped room that still carries the scent of seasickness from a previous resident. \n\t\t*goto bit\n\t#I almost choke on the words but I humbly say, \"What can I get for twenty guineas?\"\n\t\t*set contentment %+10\n\t\t*set discretion %-10\n\t\t*set matildabond %+10\n\t\tYou settle into a cramped room that still carries the scent of seasickness from a previous resident. $!{siblingname} puts a brave face on it, but you still feel awful. \n\t\t*label bit\n\t\tShortly after the ship clanks and shudders into motion, someone knocks at your door. \n\t\t\n\t\t\"We appreciate your flexibility,\" says the Captain, touching his hat. \"The guest who booked the starboard suite never showed up. Their suite is yours now—at no additional cost. Enjoy your voyage.\"\n\t\t*label inevitable\n\t\t\n\t\tAfter settling into your surprisingly well-appointed rooms you and $!{siblingname} make your way up on deck where London is already receding from view. From this distance, it looks perfectly serene: a watercolour miniature Mother might once have worn around her neck. With a little nostalgia, even the smoke-stacks appear to simply add more clouds to the silver fog hanging above the terraces.\n\t\t\n*if weak_stomach\n\tA near-imperceptible swell lifts the steamer slightly. Your stomach churns, and you resign yourself to the misery you know is coming.\n\t*goto done\n*else\n*label done\n\nThe sea twinkles up at you with the brushed perfection of polished aluminum. You steal one last glance back at London's smog-laced homeliness and turn to the view outwards. A pair of redcoats introduce themselves to you as you stand side by side at the railing, and you meet an entire family traveling to Australia to make their fortune. The settlers and soldiers are careful not to speak to one another, making the conflict on the other side of the world is painfully real.\n\nThe vast blue plain of the North Sea brings thoughts of faith to your mind. You are… \n*set siauname \"Private Siau Meng\"\n*set williamname \"Private William Barker\"\n*choice\n\t#a member of the Church of England.\n\t\t*set faithname \"Church of England\"\n\t\t*set faith true\n\t\t*goto monotheistic\n\t#a Catholic.\n\t\t*set faithname \"Catholic\"\n\t\t*set faith true\n\t\t*goto monotheistic\n\t#a Spiritualist.\n\t\t*set faith true\n\t\t*set faithname \"Spiritualist\"\n\t\tAs you look at the swirling seas, you feel the loving presence of those who have left their mortal life. Your parents never truly left you.\n\t\t*goto afterfaith\n\t#a Hindu.\n\t\t*set faithname \"Hindu\"\n\t\t*set faith true\n\t\t*goto other\n\t#a Muslim.\n\t\t*set faithname \"Muslim\"\n\t\t*set faith true\n\t\t*goto monotheistic\n\t#a Buddhist.\n\t\t*set faithname \"Buddhist\"\n\t\t*set faith true\n\t\t*goto other\n\t#an Atheist, but you understand the instinct to thank someone for nature's beauty.\n\t\t*set faithname \"Atheist\"\n\t\t*goto other\n\t#Agnostic, but you understand the instinct to thank someone for nature's beauty.\n\t\t*set faithname \"Agnostic\"\n\t\t*goto other\n\t#Other\n\t\tYour religion is\n\t\t*input_text faithname \n\t\t*set faith true\n\t\t*label other\n\t\tAs you look at the swirling seas, you feel the thrill of an encounter with unspoiled nature.\n\t\t*goto afterfaith\n*label monotheistic\nAs you look at the swirling seas, you feel the loving presence of your God.\n*label afterfaith\n\nOver the coming weeks you see many of the ocean's contradictory faces, but it is some time before you encounter its fury. \n\nIn the middle of a restless sleep you're tossed from your bed, smashing painfully into your chest of drawers before your eyes have time to open. You hear a man scream somewhere above you, but even that sound is quickly drowned out by a crash of thunder. A moment later, your entire room is lit up as if on stage when lightning strikes, sending sharp light through the porthole to divide the shadows. \n\nYou jump to your feet and go to check $!{siblingname} is all right—but \n*if PCismale\n\tshe isn't in her bed. She could be anywhere, but you have a bad feeling you know exactly where she is. You fumble into your clothing, cursing as the laces joining the sections of your iron vest tangle up, costing you precious minutes.\n\t*goto spar\n*else \n\the isn't in his bed. He could be anywhere, but you have a bad feeling you know exactly where he is. You fumble into your clothing, cursing as the laces joining the sections of your iron corset tangle up, costing you precious minutes.\n*label spar\n\nThe engine clatters and whines as the captain attempts to find a way clear of the storm. Beneath your feet, the ship shudders in pain. All the ship's tin components shriek aloud in distress, and the eerie noise is picked up by every other piece of tin on board. There's no sign of $!{siblingname}, so you decide to search the exposed deck. \n*page_break\nAs you climb the ladder you feel a wave hit the steamer, making it reel and twist in a nauseating fashion. Water dashes your face from above, making you gasp. You shake it off and climb higher, gripping the nearest railing as you enter the gale. \n\nThe sky is black and streaked with bruised purple. Rain pours down in blinding sheets, and hail stings your exposed arms as you attempt to shield your face.\n\nA supporting strut the height of your old house snaps off the closest funnel and plummets towards the deck, trailing the long wires that were meant to hold it in place. You track its path and your heart stops as you finally find the person you were looking for: $!{siblingname} is clinging to a ratline, utterly drenched and laughing for joy at the full onslaught of nature. \n\n*if pcismale\n\tThe strut is about to hit her! She'll be killed!\n\t*goto nextbit\n*else\n\tThe strut is about to hit him! He'll be killed!\n\t*label nextbit\n*choice\n\t#You scream out a warning. \n\t\t*set siblingscar true\n\t\t*set siblingbond %+10\n\t\t*set siaubond %+10\n\t\t*set williambond %+10\n\t\t*set happiness -10\n\t\t*set kindness %-10\n\t\t*if pcismale\n\t\t\tShe hears your frantic cry and looks up. You are the only two non-sailors on deck, so you are the only person watching as she dives desperately out of the way. The strut smashes on the deck, bending like cloth. Tears of relief spring to your eyes as you run forwards to help her up. \n\t\t\t\n\t\t\tBefore you've taken two steps, one of the loose wires snaps across in the wind and slices into her face. You hear her scream before the wind whips away the sound. She clutches her face, and blood pours out from between her fingers.\n\t\t\t\n\t\t\tWhat do you do?\n\t\t\t*choice\n\t\t\t\t#I scream for a surgeon, certain the injury is serious.\n\t\t\t\t\t*set science %-10\n\t\t\t\t\tNo-one hears your cry for help. \n\t\t\t\t\t*goto troopermo\n\t\t\t\t#I hold on tightly where I am so I don't risk injury to myself as well.\n\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t$!{siblingname} crawls towards you across the slick deck.\n\t\t\t\t\t*goto troopermo\n\t\t\t\t#I run to help. \n\t\t\t\t\t*set courage +5\n\t\t\t\t\t$!{siblingname} crawls towards you across the slick deck and you run to help her, pulling her in painful jerks back to the ladder belowdecks. \n\t\t\t\t\t*goto troopermo\n\t\t*else\n\t\t\tHe hears your frantic cry and looks up. You are the only two non-sailors on deck, so you are the only person watching as he dives desperately out of the way. The strut smashes on the deck, bending like cloth. Tears of relief spring to your eyes as you run forwards to help him up. \n\t\t\t\n\t\t\tBefore you've taken two steps, one of the loose wires snaps across in the wind and slices into his face. You hear him scream before the wind whips away the sound. He clutches his face, and blood pours out from between his fingers.\n\t\t\t\n\t\t\tWhat do you do?\n\t\t\t*choice\n\t\t\t\t#I scream for a surgeon, certain the injury is serious.\n\t\t\t\t\t*set science %-10\n\t\t\t\t\tNo-one hears your cry for help. \n\t\t\t\t\t*goto troopersm\n\t\t\t\t#I hold on tightly where I am so I don't risk injury to myself as well.\n\t\t\t\t\t*set kindness %-10\n\t\t\t\t\t$!{siblingname} crawls towards you across the slick deck.\n\t\t\t\t\t*goto troopersm\n\t\t\t\t#I run to help. \n\t\t\t\t\t*set courage +5\n\t\t\t\t\t$!{siblingname} crawls towards you across the slick deck and you run to help him, pulling him in painful jerks back to the ladder belowdecks. \n\t\t*label troopersm\n\t\tTwo redcoated troopers—Private Siau Meng and Private William Barker—are just coming up on deck. Barker turns pale as he spots your brother's crumpled form. He pushes you aside gently and picks him up, signalling for Meng to go back down the ladder. She salutes her understanding and jumps to the next deck, reaching up her hands as Barker passes $!{siblingname} down to her. Meng takes $!{siblingname} in her arms without giving any sign that the weight is an effort, and immediately heads aft for the galley.\n\n\t\tBarker lets you pass, and you clamber down the ladder and follow Meng's petite Asian silhouette.\n\t\t\n\t\t*page_break\n\t\tMeng enters the galley and lays $!{siblingname} on a table, shoving aside the hard loaves standing upright in the central depression, and slipping her own jacket under $!{siblingname}'s head. \n\t\t\n\t\tA giant man with bare, bloodstained arms and a silver vest proclaiming his status as a surgeon threads a needle with twine and focuses bloodshot eyes on you. \"Best you get out,\" he says. \n\t\t*gosub stay\n\n\t\tPrivate Barker takes your elbow to gently steer you away, but he lets you shake him off. He and Meng exchange a look, and they arrange themselves on either side of the table, bracing their elbows on $!{siblingname}'s shoulders and cupping their hands around his skull. \n\t\t\n\t\tThe doctor grunts his thanks, grabs a handful of willow bark from his pocket, and puts it in $!{siblingname}'s mouth. He spits it out and the doctor calmly replaces it. \"Chew,\" he tells him, and takes a swig from a brown bottle. \"Ready?\" he asks.\n\t\t\n\t\t\"Ready,\" says Private Meng.\n\t\t\n\t\tHe pours the bottle out onto $!{siblingname}'s wound, ignoring his screams and desperately thrashing legs. You race forwards and lay across his knees, hoping he passes out soon. He screws shut his eyes and chews the bitter bark as if his life depends on it. \n\t\t\n\t\tPrivate Barker is whispering a prayer. Meng looks up from your brother just long enough to roll her eyes at him.\n\t\t\n\t\tThe doctor grits his teeth and threads the needle through your brother's face. He quivers in pain, but doesn't make a sound. You realize you're sobbing and try to stop, but two stitches later you \n\t\t*if weak_stomach\n\t\t\tthrow up and then\n\t\t\t*goto faint\n\t\t*else\n\t\t\t*label faint\n\t\t\tpass out.\n\t\t\t*goto poststorm\n\t\t\n\t\t*label troopermo\n\t\t\n\t\tTwo redcoated troopers—Private Siau Meng and Private William Barker—are just coming up on deck. Barker turns pale as he spots $!{siblingname}. He pushes you aside gently and picks her up, signalling for Meng to go back down the ladder. She salutes her understanding and jumps to the next deck, reaching up her hands as Barker passes your sister down to her. Meng takes $!{siblingname} in her arms without giving any sign that the weight is an effort, and immediately heads aft for the galley.\n\n\t\tBarker lets you pass, and you clamber down the ladder and follow Meng's petite Asian silhouette.\n\t\t*page_break\n\t\tMeng enters the
