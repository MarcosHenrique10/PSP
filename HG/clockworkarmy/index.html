 and silver are a part of her, metals seem to simply like $!{emmelinename}. You grab a strip of silver and use it to wrap her wrist—one of many places she is bleeding heavily. In a few moments, the blood responds to the silver and flows more slowly. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWith a sigh of relief, you bind her wounds with more traditional bandages. You're shocked when she opens her eyes. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I have to get back,\" she says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You almost died!\" \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Exactly. Will you help me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Will you stay if I don't?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"No.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"All right.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou half-carry her outside where she stands silhouetted against the sky and waves cheerily to her followers. They yell in delighted surprise, and everything changes before your eyes.\n\t\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t\t*goto colonialwin\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tBecause brass and silver are a part of her, metals seem to simply like $!{emmelinename}. You're moving slowly due to your own wounds, but you grab a strip of silver, and use it to wrap her wrist—one of many places she is bleeding heavily.  In a few moments, the blood responds to the silver and flows more slowly. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tWith a sigh of relief, you bind her wounds with more traditional bandages, and let her rest.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tOverwhelmed, you walk outside for some air, and see the battle laid out below. \n\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t*else\n\t\t\t\t\t\tBecause brass and silver are a part of her, metals seem to simply like $!{emmelinename}. You grab a strip of silver and use it to wrap her wrist—one of many places she is bleeding heavily. In a few moments, the blood responds to the silver and flows more slowly. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\tWith a sigh of relief, you bind her wounds with more traditional bandages. You're shocked when she opens her eyes. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"I have to get back,\" she says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"You almost died!\" \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Exactly. Will you help me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Will you stay if I don't?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"No.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"All right.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou half-carry her outside where she stands silhouetted against the sky and waves cheerily to her followers. They yell in delighted surprise, and everything changes before your eyes.\n\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t*goto colonialwin\n\t\t\t\t*else\n\t\t\t\t\tBecause brass and silver are a part of her, metals seem to simply like $!{emmelinename}. You grab a strip of silver and use it to wrap her wrist—one of many places she is bleeding heavily. In a few moments, the blood responds to the silver and flows more slowly. \n\t\t\t\t\t\t\t\n\t\t\t\t\tWith a sigh of relief, you bind her wounds with more traditional bandages, and let her rest.\n\t\t\t\t\t\n\t\t\t\t\tOverwhelmed, you walk outside for some air. \n\t\t\t\t\t*goto end\n\t\t\t*elseif mechanical >70\n\t\t\t\tBecause brass and silver are a part of her, metals seem to simply like $!{emmelinename}. You grab a strip of silver and use it to wrap her wrist—one of many places she is bleeding heavily. In a few moments, the blood responds to the silver and flows more slowly. \n\t\t\t\t\t\t\t\n\t\t\t\tWith a sigh of relief, you bind her wounds with more traditional bandages, and let her rest.\n\t\t\t\t\n\t\t\t\tOverwhelmed, you walk outside for some air. \n\t\t\t\t*goto end\n\t\t\t*else\n\t\t\t\t*if distracted\n\t\t\t\t\tBecause brass and silver are a part of her, metals seem to simply like $!{emmelinename}. You choose the most pliable strip of silver and use it to wrap her wrist—one of many places she is bleeding heavily.  It slows her bleeding, but not enough. You watch helplessly as your long-lost sister dies, and you lose her a second time.\n\t\t\t\t\t\t\n\t\t\t\t\tOverwhelmed with grief, you walk outside.\n\t\t\t\t\t*set britishwin true\n\t\t\t\t\t*set emdeath true\n\t\t\t\t\t*goto britishwin\n\t\t\t\t*else\n\t\t\t\t\tBecause brass and silver are a part of her, metals seem to simply like $!{emmelinename}. You grab a strip of silver and use it to wrap her wrist—one of many places she is bleeding heavily. In a few moments, the blood responds to the silver and flows more slowly. \n\t\t\t\t\t\t\t\n\t\t\t\t\tWith a sigh of relief, you bind her wounds with more traditional bandages, and let her rest.\n\t\t\t\t\n\t\t\t\t\tOverwhelmed, you walk outside for some air. \n\t\t\t\t\t*set britishwin true\n\t\t\t\t\t*goto britishwin\n\t\t\t\t\t\n\t\t\t\t\n\t\t#She's pale and shivering despite the heat, which suggests blood loss. I run my blood directly into her veins.\n\t\t\t*if ((gold) or (gold1)) or ((iron) or (silver))\n\t\t\t\t*if science >70\n\t\t\t\t\t*if wounded\n\t\t\t\t\t\t*if (aluminum) or (Aluminium1)\n\t\t\t\t\t\t\tA wounded American sees you carefully injecting a needle into your own hand and uses his good hand to help you, ignoring the mangled ruin of his other arm. He has some activated silver, which he uses to guide both needles so their clever organic magic can make up for your lack of medical skill. When he realizes the fresh blood is leaking from her many injuries, he calls for help and others bandage $!{emmelinename}'s wounds. There are no chairs and no room to sit, so he helps you lean against him as your life flows into your sister.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tColor visibly gathers in her cheeks, and she opens her eyes. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I have to get back,\" she says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You almost died!\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Exactly. Will you help me?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Will you stay if I don't?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"No.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"All right.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou disengage the tubes binding you together and half-carry her outside where she stands silhouetted against the sky and waves cheerily to her followers. They yell in delighted surprise, and everything changes before your eyes.\n\t\t\t\t\t\t\t*set emmelinebond %+20\n\t\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t\t*goto colonialwin\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tA wounded American sees you carefully injecting a needle into your own hand and uses his good hand to help you, ignoring the mangled ruin of his other arm. He has some activated silver, which he uses to guide both needles so their clever organic magic can make up for your lack of medical skill. When he realizes the fresh blood is leaking from her many injuries, he calls for help and others bandage $!{emmelinename}'s wounds. There are no chairs and no room to sit, so he helps you lean against him as your life flows into your sister.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tColor visibly gathers in her cheeks. Mindful of your own pre-existing injuries, you disengage the tubes binding you together and let her rest.\n\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t*else\n\t\t\t\t\t\tA wounded American sees you carefully injecting a needle into your own hand and uses his good hand to help you, ignoring the mangled ruin of his other arm. He has some activated silver, which he uses to guide both needles so their clever organic magic can make up for your lack of medical skill. When he realizes the fresh blood is leaking from her many injuries, he calls for help and others bandage $!{emmelinename}'s wounds. There are no chairs and no room to sit, so he helps you lean against him as your life flows into your sister.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tColor visibly gathers in her cheeks, and she opens her eyes. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"I have to get back,\" she says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"You almost died!\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Exactly. Will you help me?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Will you stay if I don't?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"No.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"All right.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou disengage the tubes binding you together and half-carry her outside where she stands silhouetted against the sky and waves cheerily to her followers. They yell in delighted surprise, and everything changes before your eyes.\n\t\t\t\t\t\t*set emmelinebond %+20\n\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t*goto colonialwin\n\t\t\t\t*else\n\t\t\t\t\tA wounded American sees you carefully injecting a needle into your own hand and uses his good hand to help you, ignoring the mangled ruin of his other arm. He has some activated silver, which he uses to guide both needles so their clever organic magic can make up for your lack of medical skill. When he realizes the fresh blood is leaking from her many injuries, he calls for help and others bandage $!{emmelinename}'s wounds. There are no chairs and no room to sit, so he helps you lean against him as your life flows into your sister.\n\t\t\t\t\t\t\t\n\t\t\t\t\tColor visibly gathers in her cheeks, and she opens her eyes. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\"I have to get back,\" she says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\"You almost died!\" \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Exactly. Will you help me?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"Will you stay if I don't?\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"No.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\"All right.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\tYou disengage the tube binding you together and half-carry her outside where she stands silhouetted against the sky and waves cheerily to her followers. They yell in delighted surprise, and everything changes before your eyes.\n\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t*goto colonialwin\n\t\t\t*elseif science >70\n\t\t\t\tA wounded American sees you carefully injecting a needle into your own hand and uses his good hand to help you, ignoring the mangled ruin of his other arm. He has some activated silver, which he uses to guide both needles so their clever organic magic can make up for your lack of medical skill. When he realizes the fresh blood is leaking from her many injuries, he calls for help and others bandage $!{emmelinename}'s wounds. There are no chairs and no room to sit, so he helps you lean against him as your life flows into your sister.\n\t\t\t\t\t\t\t\n\t\t\t\tColor visibly gathers in her cheeks. You disengage the tubes binding you together and let her rest.\n\t\t\t\t*goto end\n\t\t\t*else\n\t\t\t\t*if xenophobia\n\t\t\t\t\tA wounded American sees you carefully injecting a needle into your own hand and offers his assistance, but you refuse. Foreigners aren't trustworthy. Your fresh blood continues to leak from her many injuries, so you widen the valves to make your blood flow faster, ignoring the black spots dancing before you eyes.\n\t\t\t\t\t\n\t\t\t\t\tIt's no use. Your legs collapse under you, and you realize too late that you're now too weak to call for help. The last thing you see is your blood and $!{emmelinename}'s pooling together uselessly on the filthy floor.\n\t\t\t\t\t*set emdeath true\n\t\t\t\t\t*set britishwin true\n\t\t\t\t\t*goto_scene deathending\n\t\t\t\t*else\n\t\t\t\t\tA wounded American sees you carefully injecting a needle into your own hand and uses his good hand to help you, ignoring the mangled ruin of his other arm. He has some activated silver, which he uses to guide both needles so their clever organic magic can make up for your lack of medical skill. When he realizes the fresh blood is leaking from her many injuries, he calls for help and others bandage $!{emmelinename}'s wounds. There are no chairs and no room to sit, so he helps you lean against him as your life flows into your sister.\n\t\t\t\t\t\t\t\n\t\t\t\t\tColor visibly gathers in her cheeks. You disengage the tubes binding you together and let her rest.\n\t\t\t\t\t\n\t\t\t\t\tOverwhelmed, you step outside for some air. You can clearly see the battle unfolding below. \n\t\t\t\t\t*set britishwin true\n\t\t\t\t\t*goto britishwin\n\t\t\t\t\n\t\t#Look her over to see which wound will kill her first. \n\t\t\t*if ((aluminum) or (aluminium1)) or ((iron) or (tin))\n\t\t\t\t*if science \u003c30\n\t\t\t\t\t*if wounded\n\t\t\t\t\t\t*if (aluminum) and (Aluminium1)\n\t\t\t\t\t\t\tShe's bleeding from everywhere at once, but when you roll her on her side you see that her deepest and bloodiest wound is in her back. You bind that first, then the rest—working carefully from most to least serious. It's not easy to keep your own tears at bay. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou are shocked when she opens her eyes. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I have to get back,\" she says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"You almost died!\" \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Exactly. Will you help me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Will you stay if I don't?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"No.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"All right.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou half-carry her outside where she stands silhouetted against the sky and waves cheerily to her followers. They yell in delighted surprise, and everything changes before your eyes.\n\t\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t\t*goto colonialwin\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tShe's bleeding from everywhere at once, but when you roll her on her side you see that her deepest and bloodiest wound is in her back. You bind that first, then the rest—working carefully from most to least serious. It's not easy to keep your own tears at bay, and your pre-existing injuries slow your movements.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAt last you see a little colour return to her cheeks, and you know she'll survive. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tOverwhelmed, you walk outside for some air.\n\t\t\t\t\t\t\t*goto end\n\t\t\t\t\t*else\n\t\t\t\t\t\tShe's bleeding from everywhere at once, but when you roll her on her side you see that her deepest and bloodiest wound is in her back. You bind that first, then the rest—working carefully from most to least serious. It's not easy to keep your own tears at bay. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou are shocked when she opens her eyes. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"I have to get back,\" she says.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"You almost died!\" \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Exactly. Will you help me?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"Will you stay if I don't?\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"No.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\"All right.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tYou half-carry her outside where she stands silhouetted against the sky and waves cheerily to her followers. They yell in delighted surprise, and everything changes before your eyes.\n\t\t\t\t\t\t*set colonialwin true\n\t\t\t\t\t\t*goto colonialwin\n\t\t\t\t*else\n\t\t\t\t\tShe's bleeding from everywhere at once, but when you roll her on her side you see that her deepest and bloodiest wound is in her back. You bind that first, then the rest—working carefully from most to least serious. It's not easy to keep your own tears at bay. \n\t\t\t\t\t\t\t\n\t\t\t\t\tAt last you see a little colour return to her cheeks, and you know she'll survive. \n\t\t\t\t\t\t\t\n\t\t\t\t\tOverwhelmed, you walk outside for some air.\n\t\t\t\t\t*goto end\n\t\t\t*elseif science \u003c30\n\t\t\t\tShe's bleeding from everywhere at once, but when you roll her on her side you see that her deepest and bloodiest wound is in her back. You bind that first, then the rest—working carefully from most to least serious. It's not easy to keep your own tears at bay. \n\t\t\t\t\t\t\t\n\t\t\t\tAt last you see a little colour return to her cheeks, and you know she'll survive. \n\t\t\t\t\t\t\t\n\t\t\t\tOverwhelmed, you walk outside for some air.\n\t\t\t\t*goto end\n\t\t\t*else\n\t\t\t\t*if weak_stomach\n\t\t\t\t\tShe's bleeding from everywhere at once, but when you roll her on her side you see that her deepest and bloodiest wound is in her back. You bind that first, then the rest—working carefully from most to least serious, stopping to vomit when the gore is too much to take. \n\t\t\t\t\t\n\t\t\t\t\tIt's no use. Your long-lost sister dies for the second time, but this time she dies in your arms.\n\t\t\t\t\t\n\t\t\t\t\tOverwhelmed with grief, you walk outside.\n\t\t\t\t\t*set emdeath true\n\t\t\t\t\t*set britishwin true\n\t\t\t\t\t*goto britishwin\n\t\t\t\t*else\n\t\t\t\t\tShe's bleeding from everywhere at once, but when you roll her on her side you see that her deepest and bloodiest wound is in her back. You bind that first, then the rest—working carefully from most to least serious. It's not easy to keep your own tears at bay. \n\t\t\t\t\t\t\t\n\t\t\t\t\tAt last you see a little colour return to her cheeks, and you know she'll survive. \n\t\t\t\t\t\t\t\n\t\t\t\t\tOverwhelmed, you walk outside for some air. You can clearly see the battle unfolding below.\n\t\t\t\t\t*set britishwin true\n\n*label britishwin\n\n*set britishwin true\nThe British take heart and shake off their wounds and exhaustion. They pour over the rebels like a red and silver tide of men and machines, and in minutes the colonials raise their hands in universal surrender. Volunteers bring enormous lengths of velvet curtain from the fort and begin the long task of wrapping and burying the dead. \n\nThe wounded are sent to the improvised hospital, and the living retreat to opposite ends of the valley as the leaders draw up official papers marking the decisive victory.\n*if emdeath\n\t$!{emmelinename}'s representative gives up her fort so readily it's clear she has plenty of resources elsewhere.\n\t*goto hola4\n*else\n\t$!{emmelinename} gives up her fort so readily it's clear she has plenty of resources elsewhere.\n*label hola4\n\nAustralia's peace is restored. \n*finish Epilogue\n*label colonialwin\n\nThe rebels take heart and shake off their wounds and exhaustion. They pour over the soldiers in a roaring wave of men and machines, and in minutes the British raise their hands in universal surrender. Volunteers bring enormous lengths of velvet curtain from the fort and begin the long task of wrapping and burying the dead. \n\nThe wounded are sent to the improvised hospital, and the living retreat to opposite ends of the valley as the leaders draw up official papers marking the decisive victory.\n\nAustralia's freedom is won.\n*finish Epilogue\n*label end\n*if britishwin\n\t*goto label\n*if colonialwin\n\t*goto label\n*else\n\nWith every passing moment, the battle gets more chaotic and more bloody. Every man and woman is covered in a slurry of mud and sweat and blood, and it's no longer easy to tell friend from foe. You wade in amongst them, knowing you need to do something but not knowing what will help. The clockwork men start malfunctioning, attacking anything that moves, and the mechanical rats panic and set patches of grass on fire.\n\nYou find yourself between a drenched soldier and a bleeding rebel, both of them wearing equal parts red and brown clothing, and both ignoring the battle to stamp out the deadly brush fires. More and more people ignore their so-called enemies to unite against the threat of a fire that could easily kill everyone. Both sides are trapped inside the deadly circle of mountains. \n\nWhen the fires are all extinguished, the automatons have all been herded into the river, and the hot air balloon has long since been shot down, it is clear that someone has to surrender, but if no-one speaks up sheer stubbornness will force both sides to fight on. \n\nA man's voice rings out with brass-enhanced volume, and both sides turn to hear what he says.\n\n\"My name is George $!{last_name},\" he says, and you hear your own last name repeated in whispers of mingled fear and hate all around. \"Three of my children are out there, and—\" his voice chokes off before he clears his throat and goes on—\"\n*if emdeath\n\ttwo of them are still alive.\n\t*goto stalebit\n*else\n\tI hope they are all still alive.\n*label stalebit\nIf even one of my children lives, regardless of who they fought for, I will sign papers granting Australia's independence from my Queen—but only if my children are delivered to me with no further harm.\"\n\nThe nation hangs in the balance once more. Do you stop him, or help him? \n*choice\n\t#Stop him, and be loyal to Britain.\n\t\t*set probritish true\n\t\t*set siaubond %+20\n\t\t*set williambond %+20\n\t\t*set siblingbond %+20\n\t\t*if ((kindness\u003c80) or (contentment\u003c80)) or (discretion\u003c80) \n\t\t\t*set britishwin true\n\t\t\t*set britishanger 0\n\t\t\t\"No!\" you cry out. \"I will not be the coin that sells Her Majesty's colony to those rebels!\"\n\t\t\t\n\t\t\tSeeing your sacrifice, the troopers are revived. They shake off their wounds and exhaustion, pouring over the independent forces like a red and silver tide of men and machines, and in minutes the colonials raise their hands in universal surrender. Volunteers bring enormous lengths of velvet curtain from the fort and begin the long task of wrapping and burying the dead. \n\n\t\t\tThe wounded are sent to the hospital, and the living retreat to opposite ends of the valley as the leaders draw up official papers marking the decisive victory. You see Father quietly back away from the discussion, knowing he has lost any authority he might have had.\n\t\t\t*if emdeath\n\t\t\t\t$!{emmelinename}'s representative gives up her fort so readily it's clear she has plenty of resources elsewhere.\n\t\t\t\t*goto hola2\n\t\t\t*else\n\t\t\t\t$!{emmelinename} gives up her fort so readily it's clear she has plenty of resources elsewhere.\n\t\t\t*label hola2\n\t\t\t\n\t\t\tAustralia's peace is restored. \n\t\t\t*goto nexta\n\t\t*elseif (gold) or (gold1)\n\t\t\t*set britishwin true\n\t\t\t*set britishanger 0\n\t\t\t\"No!\" you cry out. \"I will not be the coin that sells Her Majesty's colony to those rebels!\"\n\t\t\t\n\t\t\tSeeing your sacrifice, the troopers are revived. They shake off their wounds and exhaustion, pouring over the independent forces like a red and silver tide of men and machines, and in minutes the colonials raise their hands in universal surrender. Volunteers bring enormous lengths of velvet curtain from the fort and begin the long task of wrapping and burying the dead. \n\n\t\t\tThe wounded are sent to the hospital, and the living retreat to opposite ends of the valley as the leaders draw up official papers marking the decisive victory. You see Father quietly back away from the discussion, knowing he has lost any authority he might have had.\n\t\t\t*if emdeath\n\t\t\t\t$!{emmelinename}'s representative gives up her fort so readily it's clear she has plenty of resources elsewhere.\n\t\t\t\t*goto holahola\n\t\t\t*else\n\t\t\t\t$!{emmelinename} gives up her fort so readily it's clear she has plenty of resources elsewhere.\n\t\t\t*label holahola\n\t\t\t\n\t\t\tAustralia's peace is restored. \n\t\t\t*goto nexta\n\t\t*else\n\t\t\t*set colonialwin true\n\t\t\t*set colonialanger 0\n\t\t\t\"No!\" you cry out. \"I will not be the coin that sells Her Majesty's colony to those rebels!\"\n\t\t\t\n\t\t\tThe rebels revive, refusing to let you ruin your father's offer. They pour over the soldiers in a roaring wave of men and machines, and in minutes the British raise their hands in universal surrender. Volunteers bring enormous lengths of velvet curtain from the fort and begin the long task of wrapping and burying the dead. \n\n\t\t\tThe wounded are sent to the hospital, and the living retreat to opposite ends of the valley as the leaders draw up official papers marking the decisive victory. You see Father quietly back away from the discussion, knowing he has lost any authority he might have had.\n\n\t\t\tAustralia's freedom is won.\n\t\t\t*goto nexta\n\t#Help him, because Australia deserves to be free.\n\t\t*set emmelinebond %+20\n\t\t*set patrickbond %+20\n\t\t*set matildabond %+20\n\t\t*set procolonial true\n\t\t*if ((kindness>80) or (contentment>80)) or (discretion>80) \n\t\t\tYou present yourself, and a messenger arrives to say $!{siblingname} is sleeping in the hospital. \n\t\t\t\n\t\t\tThe rebels revive, shaking off their wounds and exhaustion to declare victory. Volunteers bring enormous lengths of velvet curtain from the fort and begin the long task of wrapping and burying the dead. \n\t\t\t\n\t\t\tThe wounded are sent to the hospital, and the living retreat to opposite ends of the valley as the leaders draw up official papers marking the decisive victory. You see Father turning his words into a legally binding document, and you are glad.\n\n\t\t\tAustralia's freedom is won.\n\t\t\t*set colonialwin true\n\t\t\t*set colonialanger 0\n\t\t\t*goto nexta\n\t\t*elseif (gold) or gold1\n\t\t\t*set colonialwin true\n\t\t\t*set colonialanger 0\n\t\t\tThe rebels revive, shaking off their injuries and exhaustion to declare victory. Volunteers bring enormous lengths of velvet curtain from the fort and begin the long task of wrapping and burying the dead. \n\t\t\t\n\t\t\tThe wounded are sent to the hospital, and the living retreat to opposite ends of the valley as the leaders draw up official papers marking the decisive victory. You see Father turning his words into a legally binding document, and you are glad.\n\n\t\t\tAustralia's freedom is won.\n\t\t\t*goto nexta\n\t\t*else\n\t\t\t*set britishwin true\n\t\t\t*set britishanger 0\n\t\t\tYou present yourself, and a messenger arrives to say $!{siblingname} is sleeping in the hospital. \n\t\t\t\n\t\t\tDespite your efforts, the British take heart and shake off their wounds and exhaustion. They pour over the rebels like a red and silver tide of men and machines, and in minutes the colonials raise their hands in universal surrender. \n\n\t\t\tThe wounded are sent to the hospital, and the living retreat to opposite ends of the valley as the leaders draw up official papers marking the decisive victory. You see Father quietly back away from the discussion, knowing he has lost any authority he might have had.\n\t\t\t*if emdeath\n\t\t\t\t$!{emmelinename}'s representative gives up her fort so readily it's clear she has plenty of resources elsewhere.\n\t\t\t\t*goto hola\n\t\t\t*else\n\t\t\t\t$!{emmelinename} gives up her fort so readily it's clear she has plenty of resources elsewhere.\n\t\t\t*label hola\n\t\t\t\n\t\t\tAustralia's peace is restored. \n\t\t\t*label nexta\n\n*label label\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if ((britishwin) and (probritish)) or ((colonialwin) and (procolonial))\n\t*achieve battlewon\n\t*goto a2\n*else\n*label a2\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n*finish Epilogue\n\n", "choicescript_description": "Win the Steam-Powered Fight for a Nation!\n\n[i]Attack of the Clockwork Army[/i] is a 65,000-word interactive novel by Felicity Banks. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nWhen the battle for Australia begins, will you join Her Majesty’s new clockwork army to keep Australia peacefully British once and for all—or will you cast your lot with a ragged crowd of ex-convicts?\n\nWill you be a deadly fighter, or torn between the conflicting loyalties of those you love? Can you overcome your fatal flaw before it’s too late?\n\nAre you ready to turn the tide of history? Play to find out!", "choicescript_stats": "*label stats\nName: $!{name}\n*line_break\nFaith: $!{faithname}\n*line_break\nActivated Metals: ${metal}\n*if tin\n\tand Tin\n\n*if iron\n\tand Iron\n\n*if brass \n\tand Brass\n\n*if lead\n\tand Lead\n\n*if silver\n\tand Silver\n\n*if gold\n\tand Gold\n\n*if aluminum\n\tand Aluminum\n*line_break\t\nFatal Flaw: $!{flaw}\n*line_break\n$!{overcomeflaw}\n*stat_chart\n\topposed_pair science \n\t\tScience\n\t\tGut\n\topposed_pair kindness \n\t\tKindness\n\t\tWittiness\n\topposed_pair discretion\n\t\tDiscretion\n\t\tInnocence\n\topposed_pair contentment\n\t\tContentment\n\t\tPassion\n\n*stat_chart\n\tpercent mechanical Mechanical Skill\n\tpercent courage Courage\n\tpercent happiness Happiness\n\n*line_break\nWho are you close to?\n*stat_chart\n\tpercent siblingbond $!{siblingname} $!{last_name}\n\tpercent emmelinebond $!{emmelinename} $!{last_name}\n\tpercent matildabond $!{matildaname}\n\tpercent williambond $!{williamname}\n\tpercent siaubond $!{siauname}   \n\tpercent patrickbond $!{patrickname}\n\n\n\t\n\n*page_break\n\n[b]Activated Metals[/b]\n\nThe magical properties of metal objects can be activated by various means, the most common of which is prolonged use by the owner or a close relative.\n\nAll metals have magical potential, but these are the best understood (arranged from cheapest to most expensive):\n\n[b]Tin[/b]: Can perform rudimentary communication.\n\n[b]Brass[/b]: Enhances the five senses. It is considered the most \"intelligent\" of the metals, since (unlike its cousin Copper) it chooses which details to enhance depending on the situation.\n\n[b]Lead[/b]: Enhances emotion. The companion of artists and lovers.\n\n[b]Iron[/b]: Enhances physical strength.\n\n[b]Silver[/b]: Can bond with organic material to improve a living creature—but of course that kind of usage is strictly theoretical. It is favored by mechanics and surgeons.\n\n[b]Gold[/b]: Enhances charm and/or physical attractiveness.\n\n[b]Aluminum[/b]: Neutralizes weight, creating extraordinarily graceful movements and increasing both fine and gross motor skills.\n*page_break\n*goto stats\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 3 through 9[/b]\n  \n  Unlock chapters 3 through 9, including the thrilling conclusion!\n  \n  *purchase adfree $3.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 3 through 9[/b]\n  \n  You've paid to unlock chapters 3 through 9.\n", "deathending": "$!{siblingname}\n*if emdeath\n\t*if matildalove \n\t\tand $!{matildaname} \n\t\t*goto nextd\n\t*elseif patricklove \n\t\tand $!{patrickname} \n\t\t*goto nextd\n\t*elseif siaulove\n\t\tand Siau \n\t\t*goto nextd\n\t*elseif williamlove\n\t\tand William \n\t\t*label nextd\n\t\tare devastated.\n\t\t*goto conclusion\n\t*else\t\n\t\tis devastated.\n\t\t*goto conclusion\n*else\n\tand\n\t*if matildalove \n\t\t$!{matildaname} \n\t\t*goto next\n\t*elseif patricklove \n\t\t$!{patrickname} \n\t\t*goto next\n\t*elseif siaulove\n\t\tSiau \n\t\t*goto next\n\t*elseif williamlove\n\t\tWilliam \n\t\t*goto next\n\t*else\n\t\tyour friends\n*label next\nare devastated, and so is $!{emmelinename}.\n\n*label conclusion\n*if martyr\n\tYour sacrifice was not in vain, since the battle was won.\n\t*goto andon\n*else\n\tYour sacrifice was all in vain, since the battle was lost.\n*label andon\n\t\t\n*if britishwin\n\t*set colonialanger -10\n\n\t*if distracted\n\t\t*if contentment \u003c30\n\t\t\t*achieve overcomeflaw\n\t\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t\t*set distracted false\n\t\t\t*goto a1\n\t\t*else\n*label a1\n*if ((britishwin) and (probritish)) or ((colonialwin) and (procolonial))\n\t*achieve battlewon\n\t*goto a2\n*else\n*label a2\n*if courage =100\n\t*achieve extraordinarycourage\n\t*goto a3\n*else\n*label a3\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n\nOver time, Australia settles into a new era of peace. For better or worse, your family has changed history. \n\n*page_break\nWe hope you've enjoyed playing [i]Attack of the Clockwork Army.[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "epilogue": "You and $!{siblingname} are by no means the only people with friends on the other side of the battle. As a result, even the leaders agree not to pursue acts of vengeance towards the losing side. Several small grassfires are putting everyone in danger, so both sides work together to put them out. The rebels calm their mechanical rats and the redcoated soldiers move all their guns into the caves in order to prevent gunpowder-related sparks.\n\nAfter a panicked search, you find $!{siblingname} calmly assisting one of $!{emmelinename}'s doctors in the makeshift hospital. \n*if pcismale\n\tShe drops an entire armful of soiled linens when she spots you, and steps right over it to embrace you. \"You're really all right?\"\n\t\n\t\"I am. You?\"\n\t\n\t\"Alive and well.\"\n\t\n\t\"$!{emmelinename}?\" she asks.\n\t\n\t*if emdeath\n\t\tYour throat closes and you can't speak. \n\t\t*if ((novellinkarabella) or (novellinkjeremy))\n\t\t\t$!{matildaname}\n\t\t\t*goto tookherplace\n\t\t*else\n\t\t\t$!{patrickname}\n\t\t*label tookherplace\n\t\ttook her place in the negotiations. \n\t\t\n\t\t$!{siblingname}'s face falls. \"Should I have fought with her?\"\n\t\t\n\t\t\"If you were with her, you might have died too. And I couldn't bear that.\"\n\t\t\n\t\tShe bites her lip, but nods. \"I'd better get back to work.\"\n\t\t\n\t\tThe next few days are hard. There are scores of dead and wounded, and one side of the valley is blocked off, cutting the flow of the water. After seemingly endless hours of work the river is restored, the dead are buried, and the broken machines are disassembled. The new normal begins.\n\t\t*goto pagebreak\n\t*else\n\t\t\"I saw her signing the papers. She's fine.\"\n\t\t\n\t\t$!{siblingname}'s face slumps in relief. \"I'd better get back to work.\"\n\t\t\n\t\tThe next few days are hard. There are scores of dead and wounded, and one side of the valley is blocked off, cutting the flow of the water. After seemingly endless hours of work the river is restored, the dead are buried, and the broken machines are disassembled. The new normal begins.\n\t\t*goto pagebreak\n*else\n\tHe drops an entire armful of soiled linens when he spots you, and steps right over it to embrace you. \"You're really all right?\"\n\t\n\t\"I am. You?\"\n\t\n\t\"Alive and well.\"\n\t\n\t\"$!{emmelinename}?\" he asks.\n\t\n\t*if emdeath\n\t\tYour throat closes and you can't speak. \n\t\t*if ((novellinkarabella) or (novellinkjeremy))\n\t\t\t$!{matildaname}\n\t\t\t*goto tookherplace1\n\t\t*else\n\t\t\t$!{patrickname}\n\t\t*label tookherplace1\n\t\ttook her place in the negotiations. \n\t\t\n\t\t$!{siblingname}'s face falls. \"Should I have fought with her?\"\n\t\t\n\t\t\"If you were with her, you might have died too. And I couldn't bear that.\"\n\t\t\n\t\tHe bites his lip, but nods. \"I'd better get back to work.\"\n\t\t\n\t\tThe next few days are hard. There are scores of dead and wounded, and one side of the valley is blocked off, cutting the flow of the water. After seemingly endless hours of work the river is restored, the dead are buried, and the broken machines are disassembled. The new normal begins.\n\t\t*goto pagebreak\n\t*else\n\t\t\"I saw her signing the papers. She's fine.\"\n\t\t\n\t\t$!{siblingname}'s face slumps in relief. \"I'd better get back to work.\"\n\t\t\n\t\tThe next few days are hard. There are scores of dead and wounded, and one side of the valley is blocked off, cutting the flow of the water. After seemingly endless hours of work the river is restored, the dead are buried, and the broken machines are disassembled. The new normal begins.\n*label pagebreak\n*page_break\nThe laws of Australia are swiftly changed to regulate cloud herding in order to let the land recover its former fertility. $!{siblingname} has a hand in writing the legislation, and adds a clause allowing experimentation with silver alloys for healing purposes, but only under humane conditions.\n\nAfter all that's happened, it seems you have a Father again—whether you want him or not. He clearly hopes to stay connected to you despite his disregard for the lives of all other creatures. For some days you refuse to speak to him or see him, but ultimately $!{siblingname} reminds you that you are no orphan, and that Father was imprisoned against his will for years. Perhaps after a similar ordeal, your own morals would be similarly compromised.\n\n*if (emdeath) and (britishwin)\n\tYou are horrified when you learn that $!{emmelinename} was shot down and killed inside her hot air balloon. Father is a sick man, but you feel just as guilty of the worst horrors of the battle.\n\t*goto ghg\n*else\n*label ghg\n\nOver time, you $!{last_name}s adjust to one another and make a fragile new life for yourselves. Some families cook together. Some like to travel. Yours creates biomechanical limbs—a lucrative endeavor since the battle. It gives you a great deal of satisfaction to see your family's talents used for good.\n*page_break\n*if britishwin\n\t*set colonialanger -10\n\t*goto a\n*elseif colonialwin\n\t*set britishanger -10\n\t*label a\n\t\nYou discover that the reason $!{emmelinename} wrote to you was that she wanted to share her enormous wealth. Her giant house in Melbourne has plenty of room for you, or if you prefer she can assist you to return to London in style. She assures you that with enough money, your past acts of theft can be forgotten.\n\t\t\t\n*if ((probritish) and (britishwin)) or ((procolonial) and (colonialwin))\n\tYou make a new life in Australia with your family, and eventually forge true friendships—even with those you fought.\n\t*goto nextc\n*else\n\t*if weak_stomach\n\t\tYou stay in Australia, unable to face the sea journey home to proper civilization due to your weak stomach. But at least you're rich.\n\t\t*set happiness -10\n\t\t*goto nextc\n\t*else\n\t\t*set happiness -10\n\t\tYou return to Britain with $!{siblingname}, promising $!{emmelinename} to write to her daily\n\t\t*if patricklove or matildalove\n\t\t\t, but breaking up with your colonial lover.\n\t\t\t*set patricklove false\n\t\t\t*set matildalove false\n\t\t\t*goto nextc\n\t\t*else\n\t\t\t.\n*label nextc\n\n*if britishwin\n\t*set colonialanger -10\n\t$!{patrickname} is jailed for five years, but he is released on good behavior after one year.\n\t*if patricklove\n\t\t*set happiness -10\n\t\t*set patrickbond -20\n\t\t*goto c\n\t*else\n\t\t*goto c\n*elseif colonialwin\n\t$!{patrickname}'s criminal past—and present—is expunged thanks to his contribution to the battle.\n\t*set britishanger -10\n*label c\n\n*if ((gold) or (gold1)) and (happiness >85)\n\t*if matildalove \n\t\t*set matildabond %+20\n\t\t*goto nextd\n\t*elseif patricklove \n\t\t*set patrickbond %+20\n\t\t*goto nextd\n\t*elseif siaulove\n\t\t*set siaubond %+20\n\t\t*goto nextd\n\t*elseif williamlove\n\t\t*set williambond %+20\n\t\t*goto nextd\n\t*else\n\t\t*goto nextd\n*elseif ((gold) or (gold1)) or (happiness >85)\n\t*if matildalove \n\t\t*set matildabond %+10\n\t\t*goto nextd\n\t*elseif patricklove \n\t\t*set patrickbond %+10\n\t\t*goto nextd\n\t*elseif siaulove\n\t\t*set siaubond %+10\n\t\t*goto nextd\n\t*elseif williamlove\n\t\t*set williambond %+10\n\t\t*goto nextd\n\t*else\n*label nextd\n\n*if brass\n\t*set emmelinebond %+10\n\t$!{emmelinename} says to keep the goggles. You and $!{emmelinename} become closer than ever.\n\t*goto nexte\n*else\n*label nexte\n*if distracted\n\t*if matildalove \n\t\t*set matildabond %-10\n\t\t*goto nextf\n\t*elseif patricklove \n\t\t*set patrickbond %-10\n\t\t*goto nextf\n\t*elseif siaulove\n\t\t*set siaubond %-10\n\t\t*goto nextf\n\t*elseif williamlove\n\t\t*set williambond %-10\n\t\t*goto nextf\n\t*else\n\t\t*goto nextf\n*elseif xenophobia\n\t*set matildabond %-10\n\t*set patrickbond %-10\n\t*set siaubond %-10\n\t*goto nextf\n*elseif weak_stomach\n\t*set siaubond %-10\n\t*set siblingbond %-10\n*label nextf\n\n*if (matildalove) and (matildabond \u003c50)\n\tYou and $!{matildaname} drift apart over time. There's simply too little you have in common.\n\t*set matildalove false\n\t*set happiness -20\n\t*goto nextg\n*elseif (patricklove) and (patrickbond \u003c50)\n\tYou and $!{patrickname} drift apart over time. There's simply too little you have in common.\n\t*set patricklove false\n\t*set happiness -20\n\t*goto nextg\n*elseif (siaulove) and (siaubond \u003c50)\n\tYou and Siau drift apart over time. There's simply too little you have in common.\n\t*set siaulove false\n\t*set happiness -20\n\t*goto nextg\n*elseif (williamlove) and (williambond \u003c50)\n\tYou and William drift apart over time. There's simply too little you have in common.\n\t*set williamlove false\n\t*set happiness -20\n*label nextg\n\t\t\n*if (matildalove) \n\t*set happiness +5\n\t*if (matildabond >80)\n\t\t*set happiness +5\n\t\tYou and $!{matildaname}\n\t\t*if pcismale\n\t\t\thave kids. They have their mother's love of chaos and nearly kill you with stress as they produce an array of injuries on a weekly basis. You soon realize that $!{matildaname} dislikes cities, but is just as uncomfortable living like the Aboriginal side of her family. She is happiest on the move, so your family is constantly traveling from one side of Victoria to another. You have friends everywhere.\n\t\t\t*goto nexth\n\t\t*else\n\t\t\tadopt kids. They have their mother's love of chaos and nearly kill you with stress as they produce an array of injuries on a weekly basis. You soon realize that $!{matildaname} dislikes cities, but is just as uncomfortable living like the Aboriginal side of her family. She is happiest on the move, so your family is constantly traveling from one side of Victoria to another. You have friends everywhere.\n\t\t\t*goto nexth\n\t*else\n\t\tYou and $!{matildaname} are very happy together. In time you realize that $!{matildaname} dislikes cities, but is just as uncomfortable living like the Aboriginal side of her family. She is happiest on the move, so your family is constantly traveling from one side of Victoria to another. You have friends everywhere.\n\t\t*goto nexth\n*elseif (patricklove)\n\t*set happiness +5\n\t*if patrickbond >80\n\t\t*set happiness +5\n\t\tYou and $!{patrickname}\n\t\t*if pcismale\n\t\t\tadopt kids. Your three daughters are utterly spoiled, since $!{patrickname} is incapable of refusing any request they make. Luckily you also have three sons, who work hard to keep your sheep farm running while trusted friends take over the day-to-day running of $!{patrickname}'s Melbourne hotel. You visit the city often, but your real home is on the land. Every morning all eight of you wake at dawn to feed the chickens, reset the rabbit traps, and pick vegetables from the garden. Every night you fall into your beds with satisfied exhaustion. It's a relentless life, and you wouldn't want it any other way.\n\t\t\t*goto nexth\n\t\t*else\n\t\t\thave kids. Your three daughters are utterly spoiled, since $!{patrickname} is incapable of refusing any request they make. Luckily you also have three sons, who work hard to keep your sheep farm running while trusted friends take over the day-to-day running of $!{patrickname}'s Melbourne hotel. You visit the city often, but your real home is on the land. Every morning all eight of you wake at dawn to feed the chickens, reset the rabbit traps, and pick vegetables from the garden. Every night you fall into your beds with satisfied exhaustion. It's a relentless life, and you wouldn't want it any other way.\n\t\t\t*goto nexth\n\t*else\n\t\tYou and $!{patrickname} are very happy together. Together you work hard to keep your sheep farm running while trusted friends take over the day-to-day running of $!{patrickname}'s Melbourne hotel. You visit the city often, but your real home is on the land. Every morning you wake at dawn to feed the chickens, reset the rabbit traps, and pick vegetables from the garden. Every night you fall into your bed with satisfied exhaustion and the love of your life at your side. It's a relentless life, and you wouldn't want it any other way.\n\t\t*goto nexth\n*elseif (williamlove)\n\t*set happiness +5\n\t*if williambond >80\n\t\t*set happiness +5\n\t\tYou and William \n\t\t*if pcismale\n\t\t\tadopt kids. They travel with you by train, steamer, or carriage wherever William's duties take him. You even show them your old home in Belgravia. It's strange how little you miss it now you have a family of your own.\n\t\t\t*goto nexth\n\t\t*else\n\t\t\thave kids. They travel with you by train, steamer, or carriage wherever William's duties take him. You even show them your old home in Belgravia. It's strange how little you miss it now you have a family of your own.\n\t\t\t*goto nexth\n\t*else\n\t\tYou and William are very happy together. The pair of you travel by train, steamer, or carriage wherever William's duties take him. You even show him your old home in Belgravia. It's strange how little you miss it now you are grown up and at peace with your past.\n\t\t*goto nexth\n*elseif (siaulove) and (siaubond>80)\n\t*set happiness +10\n\tYou decide to eventually move to Hong Kong with\n\t*if siblingbond>80\n\t\tSiau and $!{siblingname}—once your\n\t\t*if pcismale\n\t\t\tkids are grown up. In the meantime, Siau is often posted in Asia, and your children grow up speaking English and Cantonese with equal fluency. Siau is both soldier and translator, and your life together is always an adventure.\n\t\t\t*if siblingmarriage\n\t\t\t\tYou and $!{siblingname} are both deeply in love with your partners—and can complain about them to each other with true familial understanding.\n\t\t\t\t*goto nexth\n\t\t\t*else\n\t\t\t\t*goto nexth\n\t\t*else\n\t\t\tadopted kids are grown up. In the meantime, Siau is often posted in Asia, and your children grow up speaking English and Cantonese with equal fluency. Siau is both soldier and translator, and your life together is always an adventure.\n\t\t\t*if siblingmarriage\n\t\t\t\tYou and $!{siblingname} are both deeply in love with your partners—and can complain about them to each other with true familial understanding.\n\t\t\t\t*goto nexth\n\t\t\t*else\n\t\t\t\t*goto nexth\n\t*else\n\t\tSiau—once your\n\t\t*if pcismale\n\t\t\tkids are grown up. In the meantime, Siau is often posted in Asia, and your children grow up speaking English and Cantonese with equal fluency. Siau is both soldier and translator, and your life together is always an adventure.\n\t\t\t*goto nexth\n\t\t*else\n\t\t\tadopted kids are grown up. In the meantime, Siau is often posted in Asia, and your children grow up speaking English and Cantonese with equal fluency. Siau is both soldier and translator, and your life together is always an adventure.\n\t\t\t*goto nexth\n*elseif siaulove\n\tYou and Siau are very happy together. She is often posted in Asia since she is both soldier and translator. As a result, your life together is always an adventure.\n\t*set happiness +5\n\t*goto nexth\n*else\n\tYou remain happily single your whole life, understanding romantic relationships aren't for you.\n\t*if (mechanical >80) and (singlebychoice)\n\t\tNothing compares to the satisfaction of working on machines at all hours of the day or night.\n\t\t*set happiness +10\n\t\t*goto nexth\n\t*else\n*label nexth\n\n*if siblingscar\n\t$!{siblingname} remains insecure about\n\t*if pcismale\n\t\ther\n\t\t*goto facial\n\t*else\n\t\this\n\t*label facial\n\tfacial scar from the storm, and chooses to live with you rather than marry. \n\t*goto nexti\n*if siblinghurt\n\t$!{siblingname}'s hand never stops hurting. \n\t*if mechanical >90\n\t\t*achieve siblingsaved\n\t\tOne day you have the idea of replacing it with a functioning clockwork hand. It's a risky operation, but it works. $!{siblingname} starts drawing instead of drinking, and has inherited Mother's talent for art.\n\t\t*set siblinghurt false\n\t\t*set happiness +10\n\t\t*goto nexti\n\t*elseif (siblingbond >80) or (emmelinebond>80)\n\t\t*if emdeath\n\t\t\tWhen you realize why your alcohol supplies always run out so quickly, you are devastated. You continue to live together. Hopefully someday $!{siblingname} will find a better way to cope with the pain.\n\t\t\t*goto nexti\n\t\t*else\n\t\t\t*achieve siblingsaved\n\t\t\tEventually, $!{emmelinename} operates, turning it into a functioning clockwork hand. $!{siblingname} starts drawing instead of drinking, and has inherited Mother's talent for art.\n\t\t\t*set siblinghurt false\n\t\t\t*set happiness +10\n\t\t\t*goto nexti\n\t*else\n\t\tWhen you realize why your alcohol supplies always run out so quickly, you are devastated. You continue to live together. Hopefully someday $!{siblingname} will find a better way to cope with the pain.\n\t\t*goto nexti\n*if siblingbrain\n\tIt is clear $!{siblingname} has significant problems remembering simple details, such as your home address, so you continue to live together.\n\t*goto nexti\n*else\n\t$!{siblingname} has fully recovered from the injury sustained in the storm. \n\t*set happiness +1\n*comment not an error. Designed so can't get perfect happiness achievement from killing someone.\n*label nexti\n\nYou are well known for your\n*if kindness>80\n\tkind nature, and you become a\n\t*if pcismale\n\t\ttutor to seven children.\n\t\t*goto job\n\t*else\n\t\tgoverness to seven children.\n\t\t*goto job\n*elseif kindness\u003c20\n\tsharp wit, and you become an orator.\n\t*goto job\n*elseif science >80\n\tscientific rigor, and you become a researcher. A few days after a neighborhood child manages to unlock your lab, you discover penicillin. \n\t*goto job\n*elseif science\u003c20\n\tgood decision-making, and you become an explorer—a lot like Burke and Wills, but without the stupidity or tragedy.\n\t*goto job\n*elseif discretion>80\n\tdiscretion, and you gather others and found the Australian Secret Intelligence Organization - instructing your staff to keep the organization's existence a secret (even from the government) until you've long since died of old age.\n\t*goto job\n*elseif discretion\u003c20\n\thonesty, and you become a diplomat, working on smoothing relations between the colonies and the colonial powers.\n\t*goto job\n*elseif contentment>80\n\tcalm nature, and you become a \n\t*if pcismale\n\t\tgentleman of leisure.\n\t\t*goto job\n\t*else\n\t\tgentlewoman of leisure.\n\t\t*goto job\n*elseif contentment \u003c20\n\tfiery beliefs, and you become a leading politician.\n\t*goto job\n*elseif courage>90\n\tbravery, and you become a police officer.\n\t*goto job\n*elseif mechanical>90\n\tskill with all kinds of metal and machinery, and you become an\n\t*if science>50\n\t\texpert mechanic.\n\t\t*goto job\n\t*else\n\t\tinventor.\n\t\t*goto job\n*elseif happiness>90\n\tcheerful personality, and you become Melbourne's most tourist-oriented \n\t*if pcismale\n\t\tGovernor, talking about the city you love wherever you go.\n\t\t*goto job\n\t*else\n\t\tGovernor, talking about the city you love wherever you go.\n\t\t*goto job\n*else\t\n\twell-balanced nature, and you become a jack of all trades.\n*label job\n\n*if probritish and britishwin\n\t*set socialcurrency +2\n\t*goto sc\n*elseif procolonial and colonialwin\n\t*set socialcurrency +2\n\t*goto sc\n*else\n\t*set socialcurrency +1\n*label sc\n\nYou settle into your new home and\n*if silver\n\tplace your tiny silver chalice in pride of place on the mantelpiece. It's come with you all the way from your childhood home.\n\t*goto ghlaghee\n*elseif tin\n\tplace your tin snuff box in pride of place on the mantelpiece. It's come with you all the way from your childhood home.\n\t*goto ghlaghee\n*elseif lead\n\tplace Mother's lead heart in pride of place on the mantelpiece. It's come with you all the way from your childhood home.\n\t*goto ghlaghee\n*elseif brass\n\tplace $!{emmelinename}'s brass goggles in pride of place on the mantelpiece. They've come with you all the way from your childhood home.\n\t*goto ghlaghee\n*elseif gold\n\tplace Mother's gold ring in pride of place on the mantelpiece. It's come with you all the way from your childhood home.\n\t*if siblingmarriage\n\t\t$!{siblingname} chose\n\t\t*if pcismale\n\t\t\ther own ring when she married.\n\t\t\t*goto ghlaghee\n\t\t*else\n\t\t\this own ring when he married.\n\t\t\t*goto ghlaghee\n\t*else\n\t\t*goto ghlaghee\n*elsif aluminum\n\tplace your tiny piece of aluminum in pride of place on the mantelpiece. It's come with you all the way from your childhood home.\n\t*goto ghlaghee\n*elseif iron\n\tplace your iron spanner in pride of place on the mantelpiece. It's come with you all the way from your childhood home.\n*label ghlaghee\n\n*if colonialwin\n\tOver time, a new peace settles into place in the free nation. For better or worse, your family has changed history. \n\t*goto seriously\n*if britishwin\n\tOver time, a new peace settles into place in Australia. For better or worse, your family has changed history. \n*label seriously\n\n\n*set colonialanger 0\n*set britishanger 0\n\n*if distracted\n\t*if contentment \u003c30\n\t\t*achieve overcomeflaw\n\t\t*set overcomeflaw \"You have overcome your fatal flaw.\"\n\t\t*set distracted false\n\t\t*goto a1\n\t*else\n*label a1\n*if happiness =100\n\t*achieve extraordinaryhappiness\n\t*goto a4\n*else\n*label a4\n*if mechanical =100\n\t*achieve extraordinaryskill \n\t*goto a5\n*else\n*label a5\n*page_break End\nWe hope you've enjoyed playing [i]Attack of the Clockwork Army.[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Arabella Muchamore\"\n*set faithname \"Atheist\"\n*set metal \"Gold and Silver\"\n*set flaw \"Weak Stomach\"\n*set overcomeflaw \"It is possible to overcome your fatal flaw.\"\n*set science 54\n*set kindness 42\n*set discretion 59\n*set contentment 59\n*set mechanical 65\n*set courage 50\n*set happiness 60\n*set siblingbond 73\n*set emmelinebond 64\n*set matildabond 50\n*set williambond 50\n*set siaubond 50\n*set patrickbond 50\n*set emmelinename \"Emmeline Muchamore\"\n*set siblingname \"Jeremy Muchamore\"\n*set matildaname \"Matilda\"\n*set williamname \"Private William Barker\"\n*set siauname \"Private Siau Meng\"\n*set patrickname \"Patrick\"\n\n\nA carriage pulls up beside you and a woman leans precariously out the window. Her skin is brown as cocoa, but she's not African or Indian. An Australian Aboriginal, perhaps? Her green satin skirts are set off by a polished brass corset carved with a design of slender trees. The perfectly-fitted segments are laced together with top-quality golden thread. \n\n\"Get in,\" she says, with no trace of an accent. \"Quickly now, if you please.\"\n*fake_choice\n\t#I take a step back—this woman is acting very peculiar.\n\t#I take a step forwards—this woman is obviously connected to Emmeline somehow.\n\t#I hesitate, wanting more information before I put Jeremy in any more danger.\n\t\t\n\t\t\n*script changeBackgroundColor(\"black\")\n*set name \"Henry Xiniwe\"\n*set faithname \"Church of England\"\n*set metal \"Brass and Silver\"\n*set flaw \"Easily Distracte—Ooh! Shiny!\"\n*set overcomeflaw \"It is possible to overcome your fatal flaw.\"\n*set science 36\n*set kindness 45\n*set discretion 50\n*set contentment 43\n*set mechanical 55\n*set courage 60\n*set happiness 45\n*set siblingbond 60\n*set emmelinebond 70\n*set matildabond 58\n*set williambond 50\n*set siaubond 50\n*set patrickbond 50\n*set emmelinename \"Eleanor Xiniwe\"\n*set siblingname \"Sarah Xiniwe\"\n*set matildaname \"Mary\"\n*set williamname \"Private William Barker\"\n*set siauname \"Private Siau Meng\"\n*set patrickname \"Mark\"\t\t\n\t\t\nAn eternity later, the foetid stink of the Thames gives way to the tarry, fishy smell of the docks. \n\nThe harbor is a hive of activity, and you instinctively move closer to Sarah as you're surrounded by sallow-faced dock workers in threadbare and stained clothing. Packs of half-feral children scale an enormous pile of timber nearby, bouncing from _choice\n\t#You whip out your concealed blade and attack.\n\t#You say, \"Take what you like. We won’t fight you.\"\n\t#You hurl a handful of coins into the air so they scatter, distracting Jenny's gang.\n\t\n\t\n\t\n\t\n\t\n\t\n\t\n*set name \"Griffin Krusnitski\"\n*set faithname \"Muslim\"\n*set metal \"Aluminum and Tin\"\n*set flaw \"Xenophobia\"\n*set overcomeflaw \"It is possible to overcome your fatal flaw.\"\n*set science 63\n*set kindness 42\n*set discretion 32\n*set contentment 59\n*set mechanical 65\n*set courage 70\n*set happiness 66\n*set siblingbond 73\n*set emmelinebond 64\n*set matildabond 66\n*set williambond 70\n*set siaubond 55\n*set patrickbond 42\n*set emmelinename \"Eleanor Krusnitski\"\n*set siblingname \"Anna Krusnitski\"\n*set matildaname \"Mary\"\n*set williamname \"Private William Barker\"\n*set siauname \"Private Siau Meng\"\n*set patrickname \"Mark\"\t\n\t\n\t\n\t\nThe others are reading, talking quietly, or checking the supplies and weapons. Anna guesses what you're thinking and draws the rest away on the pretext of examining yet another rip in your tent.\n*fake_choice\n\t#Pfft. Romance. Not for me thanks; I’ve seen too much unhappiness.\n\t#Mary is breathtaking. Nothing ever gets her down, and her wit is sharp as a blade.\n\t#Siau's dark eyes are the first to see what others miss, and she's kind-hearted.\n\t#William is a man of honor—and I have a weakness for a well-pressed uniform. \n\t#Mark is roughly handsome, and his few words are well worth hearing. \n\t\n\t\n\t\n\t\n\t\n\t\n*set name \"Jeremy Muchamore\"\n*set faithname \"Jewish\"\n*set metal \"Brass and Silver\"\n*set flaw \"Easily Distracte—Ooh! Shiny!\"\n*set overcomeflaw \"You have overcome your fatal flaw.\"\n*set science 59\n*set kindness 48\n*set discretion 51\n*set contentment 59\n*set mechanical 65\n*set courage 58\n*set happiness 73\n*set siblingbond 73\n*set emmelinebond 64\n*set matildabond 55\n*set williambond 45\n*set siaubond 50\n*set patrickbond 74\n*set emmelinenam
