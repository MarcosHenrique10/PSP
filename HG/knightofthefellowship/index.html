sick and couldn't work and how he actually robbed his neighbor in order to be able to afford the health potion.\n\t\t\n\t\tThe story is so sad that you feel relieved when he turns into a stone statue again.\n\t\t*goto statues_r3\n\t\t\n\t#You are ready to deliver judgement\n\t\t\"What is it about those statues? Are those people really turned into stone?\" you ask.\n\t\t\n\t\tThe Guardian shakes his head. \"No, they are just aspects of the people, who are very real. They are safe and sound.\"\n\t\t\n\t\t\"Will my judgement affect them in any way? Who would deliver the verdict?\" you inquire.\n\t\t\n\t\tThe floating knight laughs. \"Believe it or not, you are the one being judged, by whether or not you decide to find somebody guilty or not.\"\n\t\t\n\t\tYou take some time to let what he just said sink in. \n\t\t\n\t\t\"Now, if you are ready, whom will you hold responsible for the assassination attempt?\"\n\t\t*choice\n\t\t\t#The noble caste \n\t\t\t\t\"You choose to blame it on the ones who designed the corrupt system and I have to say that I agree with you,\" says the Guardian. \"The only \n\t\t\t\treason why they are allowed to perpetuates their crimes against anybody else is that the people themselves seem to accept being part of the system, playing by the \n\t\t\t\trules, obeying them. Their crushed will is to be honored. However, your decision gives me hope to see a better future for all. A revolution is near. Now, you are free to go, and for aligning\n\t\t\t\tmy heart with faith, you can count on me helping you in the grand battle ahead of you.\"\n\n\t\t\t\tYou want to ask more about it, but the Guardian is adamant at remaining silent.\n\t\t\t\t*set guardian true \n\t\t\t\t*goto temple_crossroads\n\t\t\t\t\n\t\t\t\n\t\t\t#The criminal mastermind \n\t\t\t\t\"You choose to blame it on the middlemen in the corrupt chain of perpetrators. This is an interesting decision. I can hardly agree with it, but my acceptance is not required. You have \n\t\t\t\tmy sincerest thanks and my best wishes for the big battle ahead of you.\"\n\t\t\t\t\n\t\t\t\tYou want to ask more about it, but the Guardian is adamant at remaining silent.\n\t\t\t\t*goto temple_crossroads\n\t\t\t\n\t\t\t#Aya \n\t\t\t\t\"You choose to blame it on one of the final links in the corrupt chain of perpetrators. This is an interesting decision. I can hardly agree with it, but my acceptance is not required. You have \n\t\t\t\tmy sincerest thanks and my best wishes for the big battle ahead of you.\"\n\t\t\t\t\n\t\t\t\tYou want to ask more about it, but the Guardian is adamant at remaining silent.\n\t\t\t\t*goto temple_crossroads\n\t\t\t\n\t\t\t#The commoners \n\t\t\t\t\"You choose to blame it on the victims in the corrupt chain. This is an interesting decision. I can hardly agree with it, but my acceptance is not required. You have \n\t\t\t\tmy sincerest thanks and my best wishes for the big battle ahead of you.\"\n\t\t\t\t\n\t\t\t\tYou want to ask more about it, but the Guardian is adamant at remaining silent.\n\t\t\t\t\n\t\t\t\tHis heavy word, however echo on your consciousness\n\t\t\t\t*set imp -1 \n\t\t\t\t\n\t\t\t\t(Imbalance+)\n\t\t\t\t\n\t\t\t\t*goto temple_crossroads\n\t\t\t\t\n\t\t\t#None of them \n\t\t\t\t\"Your ability to forgive them all is amazing. I agree that it is very hard to put the blame on any one being in the corrupt chain of \n\t\t\t\tperpetrators. Each of them has their own excuses, although some of them sound a bit pathetic. You are free to go, and for aligning\n\t\t\t\tmy heart with faith, you can count on me helping you in the grand battle ahead of you.\"\n\n\t\t\t\tYou want to ask more about it, but the Guardian is adamant at remaining silent.\n\t\t\t\t*set guardian true \n\t\t\t\t*goto temple_crossroads\n\t\t\t\t\n*label hatchery \nBy now, you have already established that the reptilian species this temple is all about tend to be quite negative in nature. This is why you are quite surprised when you find out that the place where there are hundreds of \nbig eggs covered in leathery sacks and scales, is a scene that brings you a lot of peace. Your subconsciousness tells you that this is a place where life starts in all the sacredness you know.\n\nAmy looks at them with wide open eyes and a faint smile, most likely thinking the same.\n\n\"Have you come to send your best intentions to the ones who are about to hatch?\" you hear a voice coming from the sides. You see a tall feminine reptilian figure in blue robes. It is hard to tell, but it seems she is actually smiling, and \nshe radiates such peace and joy that it is hard not to feel comfortable in her presence, despite her threatening features. \n\nHow do you reply?\n*choice \n\t#Yes \n\t\t\"Thank you for that. The little ones will appreciate that. Now, please put your hands on any egg of your choice and just think of the whelp inside with love.\"\n\t\t\n\t\tAmy looks at you for reassurance. You nod and do as she says. It actually brings you peace.\n\t\t*set nrg +2\n\t\t*set xp +2\n\t\t\n\t\t(Energy++, Expereince++)\n\t\t*goto hatchery_end\n\t\t\n\t#Ask her to take a few pieces of egg shells from one that has hatched\n\t\t\"Sure, I know they are used for important rituals. I just hope they serve you for a just cause.\"\n\t\t\n\t\tYou take a few pieces.\n\t\t*set egg_shells true \n\t\t*set reagents +1\n\t\t*goto hatchery_end\n\t\t\n\t#Attempt to destroy the eggs \n\t\tYou realize that no matter how peaceful the scene is, those whelps will hatch and become an army that will most likely serve to conquer humanity as you know it. You raise your sword and thrust it into the one closest to you.\n\t\t\n\t\tA green liquid splashes you, and burns your flesh like acid.\n\t\t*set hp -1\n\t\t\n\t\t(Health-)\n\t\t\n\t\tThe reptilian lady just laughs. \"The way of violence is not accepted in these chambers.\" Then she hisses, \"You are not welcome here any more.\"\n\t\t*goto hatchery_end\n\t\t\n\t#Just leave \n\t\t*goto hatchery_end\n\t\t\n*label hatchery_end\n*page_break\nWhere do you go now?\n*choice\n\t#To the altar room \n\t\t*goto altar_r\n\t\t\n\t#To the inderdimensional chambers \n\t\t*goto inter_d\n\t\t\n*label altar_r\nIt is a chamber covered in marble, and you are not sure why, but it has the energies you would associate with a slaughterhouse. A few stairs down lead to an altar.\n*if angel \n\t*goto altar_r1\n\n*else \n\t*goto altar_r2\n\t\n*label altar_r1\nYou are surprised to see Deacon Walter there.\n\n\"Congratulations on reaching the core of the Temple of Reptilians,\" he says. \"Do you have the reagents I asked you to collect?\" \n*if (reagents>2) \n\t\"This is great, I knew I could trust you. Now, please, give them to me,\" he orders you with a tone you are not sure you like.\n\t\t\n\t\"Trust me... with what?\" You squint your eyes.\n\t\t\n\t\"To make the world a better place.\"\n\t\t\n\tYou can swear there is madness in his eyes.\n\t\t\n\tWould you give him the reagents?\n\t*choice \n\t\t#Yes \n\t\t\tHe takes them and puts them on the portal. It starts to glow in red.\n\t\t\t\t\n\t\t\t\"What is happening?\" You demand answers.\n\t\t\t\t\n\t\t\t\"You were the soul chosen as an outsider to seal the fate of this temple. And you made your choice,\" he says without turning around.\n\t\t\t\t\n\t\t\t\"I chose nothing,\" you argue. \"I just gave a brother from the Fellowship what he asked me for. It is a service to the organization we belong to.\"\n\t\t\t\t\n\t\t\t\"You have no idea about my true loyalty. Do you think I really could not find these reagents? The matter is that I needed you to act in support of what I do.\" He turns. There is a maniacal expression\n\t\t\ton his face.\n\t\t\t\n\t\t\t\"I did agree to nothing. And what is it that you do?\"\n\t\t\t\t\n\t\t\t\"You will see, very soon.\"\n\t\t\t*page_break\n\t\t\tIt is very hard for your consciousness to deal with the scenes of horror you behold in the next two days. Your mind distances from the world around you, refusing to access memories accumulated meanwhile.\n\t\t\tBut you know that you are walking through the ruins of the town, and most of the people who you know are either dead, killed by the reptilians, or enslaved by them. Only a few, like Walter, remain relatively free. The same seems to be \n\t\t\ttrue about you, as the one they say set the circumstances of the invasion of the surface. You don't know what they are talking about, refusing to take any responsibility for the mayhem you see projected around you.\n\t\t\t*achieve ap \n\t\t\t*if attr_male\n\t\t\t\tWalter remains a close friend, allowing you the opportunity to actually talk to a human being. He remains the only thread to sanity you have in this world of doom.\n\t\t\t\t\t\n\t\t\t\tWould you like him to be something more than a friend?\n\t\t\t\t*choice \n\t\t\t\t\t#Yes \n\t\t\t\t\t\tOne day, he approaches your chambers with a very sad expression on his face. You know why. The scaly ones he tried to serve lack the warmth many of the humans you know exhibit.\n\n\t\t\t\t\t\t\"I want to be there for you the way you have been for me,\" you say holding his hands. \"And more,\" you add as your hands crawl behind his back and pull him closer.\n\n\t\t\t\t\t\tHe doesn't stop you from kissing him.\n\t\t\t\t\t\t*achieve romance_walter \n\t\t\t\t\t\t*goto story\n\t\t\t\t\t\t\t\n\t\t\t\t\t#No \n\t\t\t\t\t\tYou decide that your shattered soul would not be capable of feeling love as you know it, so you decide it is not worth trying at all.\n\t\t\t\t\t\t*achieve alone \n\t\t\t\t\t\t*goto story\n\t\t\t\t\t\t\n\t\t\t*else \n\t\t\t\t*goto story\n\t\t#No \n\t\t\t\"It is a pity, I had such high hopes in you,\" he says and vanishes into thin air.\n\t\t\n\t\t\tYou are not sure you understand why he was here, why he wanted those reagents and why he disappeared, but you don't have time to meditate over those questions.\n\t\t\t*goto altar_r2\n\n*else\n\t\"No,\" you admit \n\t\t\n\t\"It is a pity, I had such high hopes in you,\" he says and vanishes into thin air.\n\t\t\n\tYou are not sure you understand why he was here, why he wanted those reagents and why he disappeared, but you don't have time to meditate over those questions.\n\t*goto altar_r2\n\t\t\n*label altar_r2\nThe altar comes to life, dancing and twisting as if it was a burning fire. It grows bigger, taking the shape of a reptilian. The smell of sulphur permeates the air.\n\n\"Bow before Surguras, the reptilian god of fire, weaklings,\" he order and suddenly your knees feel as if they are about to fold.\n\n\"Never!\" Amy shouts, pulling strength from the faith in the Light she never lost. \"The only way we are going down is if there is little life left in our bodies.\"\n\nYou feel the influence over your will go away, but you are not sure Amy's words project a very positive picture.\n\n\"Soon,\" he roars.\n\n*if prayer \n\t\"You will not stand alone in the fight against this demon, dear ones!\" A soothing whisper reaches your ears, as the angel who promised to help appears in the room, his sword of glowing ice threatening to \n\tdouse the fires of the hell spawn.\n\t\n\tThe two immortals clash in a mighty explosion that makes you shut your eyes. When it ends, you behold that the angel has been banished, and the reptilian demon badly hurt.\n\t*set damage 3\n\t*goto altar_r3\n\t\n*else \n\t*goto altar_r3\n\t\n*label altar_r3\n*page_break\n*if thomas_promise\n\t\"I am afraid for Thomas,\" Amy says, knowing that her lover will fulfill his promise and come to fight by your side.\n\t\n\tIt doesn't take long for the apparition to show his ghostly form standing bravely in front of the reptilian.\n\t\n\t\"More food?\" he asks and launches his jaws at Thomas.\n\t\n\tHe falls on his knees, while taking out his sword and pointing it at the threat like a spear. The speed at which he does it is beyond anything you can comprehend.\n\tSurguras roars with pain and retreats.\n\t\n\tThomas looks Amy in the eyes. \"I am sorry, Amy, I am not allowed to stay any longer. Please, take my blessing and carry my love with you. We will be together again when the time comes.\"\n\t\n\t\"I love you too,\" the militia woman replies, tears in her eyes.\n\t*set damage +2\n\t*goto altar_r4\n\t\n*else \n\t*goto altar_r4\n\t\n*label altar_r4\n*page_break\n*if misery_released_from_debt\n\t*goto altar_r5\n\t\n*else \n\t\"Now I realize why I was so anxious to have me released from the debt to you,\" says Misery, appearing through the door, but staying at the threshold.\n\t\"I don't want to face this monster, but I can't leave without lending you a hand. I carry the name for a reason, as misery is what I am best at causing,\" she says \n\tand throw a potion at Surguras, making him whine and curse in pain.\n\t*set damage +2 \n\t*goto altar_r5\n\t\n*label altar_r5\n*page_break\n\nIt is now Amy and you against the reptilian demon!\n\n*if mithril\n\tThe first few attacks of the demon that end in your mithril breastplate do no damage to you. I takes him some time to realise he needs to change something if he is to be able \n\tto defeat you, and he does, changing the color of his flames from red to yellow, but you use his lack of focus to deal a heavy wound to him.\n\t*set damage +2 \n\t*goto altar_r6\n\n*else\n\t*goto altar_r6\n\t\n*label altar_r6\n*page_break\n*if guardian \n\t\"May you fight with the ferociousness of a lion, and the wisdom of a turtle,\" you hear the voice of the Guardian in your head. Suddenly, your movements become quicker and more \n\tprecise, allowing you to deliver several powerful blows to the enemy.\n\t*set damage +3\n\t*goto altar_r7\n\t\n*else \n\t*goto altar_r7\n\t\n*label altar_r7\n*page_break\n*if edge_of_darkness and broken_dagger\n\tThe two daggers you obtained through your exploits of the temple start vibrating in their places, stuck in your belt, almost making you fail to dodge a bite from the reptilian god.\n\t\n\tBut the weapons make up for it by launching themselves at him and making him flinch in pain.\n\t*set damage +3\n\t*goto altar_r8\n\t\n*else \n\t*goto altar_r8\n\t\n*label altar_r8\n*page_break\n*if (reagents>2)\n\n\t\"Those reagents Walter asked you about...\" Amy shouts at you while parrying a lethal blow. \"Do you think they may be helpful?\"\n\n\t\"Most likely,\" you reply while taking cover behind her and mixing them. Then you throw them at Surguras with a deadly intention on your mind. \n\n\tHis flames no longer glow that strongly.\n\t*set damage +3\n\t*goto altar_r9\n\n*else\n\t*goto altar_r9\n\t\n*label altar_r9\n*page_break\n*if (sword_type=\"Greatsword\")\n\n\tAs you swing your blade and deliver a few successful blows, you realize that the heaviness of the blade allows you to cut deeper, and that more than makes up for the slower movements.\n\t*set damage +1 \n\t*goto altar_r10\n\n*else \n\t*goto altar_r10\n\t\n*label altar_r10\n*page_break\n*if (sword_power=\"Dragon_Slayer\") or (sword_power=\"Exorcist\")\n\tThe special power profile of the sword (${sword_power}) makes you, at times, think that it is the wielder, and you are just an instrument of the passions of the blade that seem to be \n\tbuzzing with power and hatred for the type of the enemy you are facing.\n\t*set damage +1 \n\t*goto altar_r11\n\t\n*else \n\t*goto altar_r11\n\t\n*label altar_r11\n*page_break\n*if amy_exhausted\n\tAmy does her best to keep up to the fight, but it seems she is too exhausted from the experiences you have had up to this point. A well executed punch delivered by the reptilian god brings knocks her out.\n\t\n\tYou shout her name and hurry to check if she is alive. You touch the artery on her neck. She is still alive.\n\t*if sword_power=\"Healer\"\n\t\tYour sword starts radiating bright light that bathes Amy's body. She opens her eyes, although it seems it is hard for her to focus.\n\t\t\n\t\tSurguras roars with anger. It seems proximity to the healing light is causing him pain.\n\t\t*set damage +1\n\t\t*goto altar_r12\n\t\t\n\t*else\n\t\tRealising there is nothing you can do for her right now, you pray she will be able to recover and return to the fight.\n\t\t*goto altar_r12\n\t\t\n*else \n\t*goto altar_r12\n\t\n*label altar_r12\n*page_break\n*if hp>2\n\tEven though you manage to dodge or parry most of the attacks of the reptilian, you take quite a few hits. However, your resistance is remarkable. The longer the fight goes, \n\tthe greater the certainty that he would be the one to be destroyed.\n\t*set damage +2\n\t*goto altar_r13\n\t\n*elseif hp>0\n\tEven though you manage to dodge or parry most of the attacks of the reptilian, you take quite a few hits. Your resistance is remarkable, but you had wounds before entering that battle and they are beginning to show up. Still, you believe the odds are in your  \n\tfavor.\n\t*set damage +1\n\t*goto altar_r13\n\n*else \n\tEven though you manage to dodge or parry most of the attacks of the reptilian, you take quite a few hits. The wounds you had before entering that battle and are beginning to show up. You know you can't take \n\tmuch more punishment, so you are looking for an opportunity to end the fight quickly.\n\t*set damage -2\n\t*goto altar_r13\n\t\n*label altar_r13\t\n*page_break\n*if nrg>1\n\tYou have preserved quite a bit of energy and you use all of it to give you an advantage in this clash of power. A flash dodge and a lighting quick stab make a big difference.\n\t*set damage +2\n\t*goto altar_r14\n\t\n*elseif nrg=1\n\tYou have preserved a bit of energy and you use it to give you an advantage in this clash of power. A lighting quick stab executed at the right time is what you choose to do.\n\t*set damage +1\n\t*goto altar_r14\n\n*else\n\tYou have no energy left, so you can't use your special powers, which makes you feel uncomfortable.\n\t*set damage -1\n\t*goto altar_r14\n\t\n*label altar_r14\n*if damage>14\n\t*achieve damage_dealer\n\t*goto altar_r15\n\t\n*else \n\t*goto altar_r15\n\t\n*label altar_r15\n*page_break\n*if damage \u003c10\n\tYou try everything within your capabilities to defeat the reptilian god, but he is by far the mightiest enemy you have encountered. Having tried every trick up your sleeve\n\t, you are still nowhere near winning the battle.\n\t\n\tA quick series of heavy blows makes you sink in a lake of pain and succumb to your wounds \n\t*goto_scene death \n\t\n*else \n\tYour blade enters his chest and gets stuck there. Your twist it, breaking ribs and pull it out.\n\n\tSurguras falls on the floor. He is still moving, but you know the fight is over. You have won!\n\t*achieve surguras\n\t\n\tAru enters the altar room. \"You fulfilled the prophecy, dear one. The mighty reptilian god made so strong by the thousands of prayers by loyal followers \n\tnow lies broken at your feet. Now, what is it that you want to do? Slaying him would cause the destruction of the temple, because he is the main pillar causing it to bing to the \n\treality you know. I won't deny that this is what I want to see, because it will be the end of the threat of reptilian invasion spreading over the surface world. Or, would you spare his life and \n\tgive him a chance to reconsider his deeds. The future of the temple would be a bit more uncertain. He would be alive, but still he would be unable to serve the important role that he plays now. It is possible that \n\tthe templars will experience a shift towards benevolence. Did Amaranth and the others you met here make you believe it is possible?\"\n\t\n\tYou try to catch your breath while making the decision.\n\t*choice\n\t\t#Slay Surguras\n\t\t\t\"Is there a way to guarantee he won't come back more powerful and vicious, and even more of a threat to innocence?\" you ask Aru.\n\t\t\t\n\t\t\tHe shakes his head.\n\t\t\t\n\t\t\tAnd you raise your sword once more. After you are done, the world around you fades to white... into what you remember from the time before you came back to this density.\n\t\t\t*page_break\n\t\t\tYour soul mentor is with you. It seems the white dress she is wearing is covered in small peaces of mirror, or maybe it is your eyes trying to adjust to what you used to call home.\n\t\t\t\n\t\t\t\"Commander!\" you greet her and she smiles back.\n\t\t\t\n\t\t\t\"I want to congratulate you for bringing your mission to an honorary end. Because of your actions, the reptilian invasion does not happen in any of the timelines that stem from the one you were part of. Because \n\t\t\tof you, a lot of beautiful seeds of love manage to grow in the unspoiled soil on the surface. Now, would you like to join me, or would you like to continue living in the \n\t\t\tbody that was given to you? Maybe there is some love you want to pursue?\"\n\t\t\t\n\t\t\t*achieve destruction \n\t\t\t*set destruction true \n\t\t\t*choice \n\t\t\t\t#\"No, I am ready to go home.\"\n\t\t\t\t\tShe nods and offers you her hand, a necessary prerequisite to ensure that once she teleports to what you call home, she will take you with her.\n\t\t\t\t\t*goto story \n\t\t\t\n\t\t\t\t#\"Yes, please.\"\n\t\t\t\t\t\"Alright, I will leave you alone to deal with the matters of your heart, but I and many others will be waiting for you to come back,\" the Commander says.\n\t\t\t\t\t*goto romance \n\t\t\n\t\t#Spare him \n\t\t\t\"Enemies who have dropped their swords, are no longer enemies,\" you quote some half forgotten piece of warrior code.\n\t\t\t\n\t\t\t\"This one never had one to begin with,\" Aru jokes, but in a friendly way. \"I see nobility in you, something the warriors of the temple mostly lack, but who knows, maybe they will learn from your example.\n\t\t\tMaybe there is loving future in front of them.\"\n\t\t\tthe world around you fades to white... into what you remember from the time before you came back to this density.\n\t\t\t*page_break\n\t\t\tYour soul mentor is with you. It seems the white dress she is wearing is covered in small peaces of mirror, or maybe it is your eyes trying to adjust to what you used to call home.\n\t\t\t\n\t\t\t\"Commander!\" you greet her and she smiles back.\n\t\t\t\n\t\t\t\"I want to congratulate you for bringing your mission to an honorary end. Because of your actions, the reptilian invasion does not happen in any of the timelines that stem from the one you were part of, except for one. Because \n\t\t\tof you, a lot of beautiful seeds of love manage to grow in the spoiled soul below the temple. Now, would you like to join me, or would you like to continue living in the \n\t\t\tbody that was given to you? Maybe there is some love you want to pursue?\"\n\t\t\t\n\t\t\t*achieve creation  \n\t\t\t*set creation true \n\t\t\t*choice \n\t\t\t\t#\"No, I am ready to go home.\"\n\t\t\t\t\tShe nods and offers you her hand, a necessary prerequisite to ensure that once she teleports to what you call home, she will take you with her.\n\t\t\t\t\t*goto story \n\t\t\t\n\t\t\t\t#\"Yes, please.\"\n\t\t\t\t\t\"Alright, I will leave you alone to deal with the matters of your heart, but I and many others will be waiting for you to come back,\" the Commander says.\n\t\t\t\t\t*goto romance \n\t\t\t\t\t\n*label romance \n*page_break\n\nWho would you like to romance?\n*choice \n\t*selectable_if (attr_fem) #Fresca \n\t\t*if (partner=\"Fresca\")\n\t\t\tYou come back to the infirmary, all blooded and battered. Fresca rolls her eyes, but when they are set on you, you feel them full of love. Without saying a word, she raises her hands and crosses them behind your \n\t\t\tneck and gives you a warm kiss.\n\t\t\t*page_break\n\t\t\tIn the days that follow, you manage to recover completely under the constant care of the medic. You have the feeling that her love is even more affective than any of the salves or infusions she prepares for you.\n\t\t\n\t\t\tYou live a very calm and happy life. You will never forget the spark in her eyes when you ask her to teach you to be a healer too. This way you get to spend even more unforgettable time with her.\n\t\t\t*achieve romance_fresca \n\t\t\t*goto story \n\t\t\n\t\t*else \n\t\t\t[i]Unfortunately, you don't meet the requirement for this romance, which is kissing Fresca in the scene where she massages your shoulders. You are free to pursue another romance, though. [/i]\n\t\t\t*goto romance \n\n\t*selectable_if (attr_fem) #Aya \n\t\t*if (rel_arch>8) and (sceptic\u003c1)\n\t\t\tIt is a windy day and there is nobody else at the shooting range. And yet, you are here, hoping to meet Amy. Hardly has the thought about her coming here passed through your mind when you actually see her coming, a vision of deadly grace.\n\t\t\n\t\t\t\"I have been dreaming about you,\" she says without greeting you. Instead, she keeps on getting closer and closer, and then kisses you with unrestrained passion, hardly \n\t\t\tgiving you the chance to breathe. At one point, you feel her lips extend into a smile. \"I am so glad I didn't kill you.\"\n\t\t\t*page_break\n\t\t\tEver since that day, you are inseparable. You manage to find out a lot about living on the street, at the mercy of the gangs and the two of you spend a lot of time making a difference for the little guys. \n\t\t\tUnder her love and guidance, you manage to bring even more goodness to the town.\n\t\t\t*achieve romance_archer\n\t\t\t*goto story \n\t\t\n\t\t*else \n\t\t\t[i]Unfortunately, you don't meet the requirements for this romance, which are a high relations score with Aya and Scepticism score of less than 1. You are free to pursue another romance, though. [/i]\n\t\t\t*goto romance \n\n\t*selectable_if (attr_fem) #Amy \n\t\t*if (rel_amy>7) and (amy_available)\n\t\t\tYou meet Amy outside the Church of Light.\n\t\t\n\t\t\t\"Have you been praying?\" you ask her.\n\t\t\n\t\t\tShe nods. \"Yes, I needed some guidance from my Higher Self about a matter of the heart.\"\n\t\t\n\t\t\tYou feel yours start beating faster.\n\t\t\n\t\t\t\"What is it, dear one?\" you ask. \n\t\t\n\t\t\tShe looks you in the eye. \"It was about you, ${name}. We have been through a lot down there and this is why I developed some gentle affection for you, something I feared to call love, but love it is nevertheless.\n\t\t\tI must be open to you and say that I will never love you the way I do with Thomas, but still... I hope you manage to understand what I fail to put into words.\"\n\t\t\n\t\t\tYou chuckle and embrace her. \"I do, dear one. You are not the only one who is aware of some presence beyond the veil of oblivion. But we can create something beautiful for the time of our lives. Would \n\t\t\tyou like us to do that?\"\n\t\t\n\t\t\tShe nods.\n\t\t\n\t\t\tYou kiss her forehead and hold her even more tightly.\n\t\t\t*achieve romance_amy\n\t\t\t*goto story \n\t\t\n\t\t*else \n\t\t\t[i]Unfortunately, you don't meet the requirements for this romance, which are a high relations score with Amy, and convincing her to listen to Thomas and open her heart again. You are free to pursue another romance, though. [/i]\n\t\t\t*goto romance \n\n\t*selectable_if (attr_fem) #Misery \n\t\t*if (rel_misery>20) and (imp>2)\n\t\t\tYou are reading a book in the light shed by a candle, when you realize you are not alone. The dark figure startles you and makes you scream. \n\t\n\t\t\t\"You are so sweet when you are scared,\" says Misery. \"Don't you like the way it adds to the excitement?\"\n\n\t\t\tYou do and this is why it is hard for you to catch your breath when she reaches out with her pale slender hand to catch your shirt and bring you closer for a kiss. You have been dreaming \n\t\t\tabout this moment for quite a while and the performance she delivers surpasses your expectations.\n\t\t\t*page_break\n\t\t\tMisery never stops being the interesting soul that you like to get lost into, exploring layer upon layer of sheer weirdness. You also know that she has a beautiful soul that shines \n\t\t\tbrightly nevertheless. It brings you a lot of pleasure to see how the traumas are healed by the power of your love and she is able to show the world a brighter and more compassionate side of the \n\t\t\tmagnificent being that she is.\n\t\t\t*achieve romance_misery\n\t\t\t*goto story\n\n\t\t*else \n\t\t\t[i]Unfortunately, you don't meet the requirements for this romance, which are a high relations score with Misery, and an Imbalance score of over 2. You are free to pursue another romance, though. [/i]\n\t\t\t*goto romance \n\t\n\t*selectable_if (attr_male) #Amaranth\n\t\t*if (amaranth) and (creation)\n\t\t\tYou decide to honor Amaranth's invitation to visit him at the temple. The energy of the place is so different, it is almost like entering an entirely different place.\n\t\t\n\t\t\tHe greets you with a warm hug. His toned body feels quite hard. \"It is nice to see you again, dear one. I have been very busy participating in the events that are shaking the society \n\t\t\tthat lives below the temple in a very benevolent way. But I missed you very much.\" He takes a goblet full of sweet juice and gives it to you, than takes another, and the look he gives you before taking a sip makes you flush and melt.\n\t\t\n\t\t\t\"I still have a lot of work to do, and so I will, but I don't want to walk this path on my own. You are the one who allowed my people and the reptilians to escape death and live free. You are the one I adore... and love...\"\n\t\t\n\t\t\tYou can't wait for him to finish. The juice tastes very good on his lips.\n\t\t\t*achieve romance_amaranth\n\t\t\t*goto story \n\t\t\n\t\t*else \n\t\t\t[i]Unfortunately, you don't meet the requirements for this romance, which are him winning the arena battle and you deciding to spare Surguras. You are free to pursue another romance, though. [/i]\n\t\t\t*goto romance \n\n\t*selectable_if (attr_male) #Aru \n\t\t*if (destruction) and (wit>2)\n\t\t\tAru appears in your dreams. There is an air of relief about him.\n\n\t\t\t\"I came to thank you for the great job that you did. You lifted a burden off my shoulders. Now, I can allow myself to go home,\" he says.\n\t\t\n\t\t\t\"I want you to take me with you. I... want to be with you,\" you say quickly.\n\t\t\n\t\t\tAru laughs. \"It has been quite I while since I was with an earth human for the last time. And, you are special. There is something inside my soul tingling me to agree. Know \n\t\t\tthat you are embarking on a trip of exploration of infinite possibilities and powers far beyond what you might be accustomed to, at least in your earthly form. All I could ask of you is to use it for benevolent purposes.\n\t\t\tDo you still want to do it?\"\n\t\t\n\t\t\t\"Yes!\" You confirm \n\t\t\t*achieve romance_aru \n\t\t\t*goto story\n\t\t\n\t\t*else \n\t\t\t[i]Unfortunately, you don't meet the requirements for this romance, which is having the temple destroyed and a Wit score of over 2. You are free to pursue another romance, though. [/i]\n\t\t\t*goto romance \n\t\n\t*selectable_if (attr_male) #Master Yan \n\t\t*if (rel_yan>2) and (imp\u003c2)\n\t\t\t\"There must be some matter tormenting you inside,\" says Yan after the meditation is over. \"You have been coming here more often than anybody else and been so diligent. What is it, dear one?\"\n\t\t\n\t\t\tYou take a deep breath. \"I have not been coming here only to meditate, but also spend time with you, which I desperately need in the bottom of my heart.\"\n\t\t\n\t\t\tYan laughs. \"Is it what bothers you? Let me bring some balance to that.\" He gently hugs you and starts kissing your cheek and neck.\n\t\t\n\t\t\tAnd so, you embark on a journey of peace... and a bit of passion.\n\t\t\t*achieve romance_yan\n\t\t\t*goto story \n\t\t*else \n\t\t\t[i]Unfortunately, you don't meet the requirements for this romance, which are a high relations score with Yan, and an Imbalance score of no more than 1. You are free to pursue another romance, though. [/i]\n\t\t\t*goto romance \n\n\t#You changed your mind, or you don't meet the requirements of any of the options.\n\t\t*achieve alone \n\t\t*goto story \n\t\n*label story \n*page_break\n*if (xp>18)\n\t*achieve experienced \n\t*goto story2\n\t\n*else \n\t*goto story2\n\t\n*label story2\nNow that the adventure is over, would you like to read a short story that takes place shortly after the end of another incantation of your character? It is not interactive\nand written from their perspective.\n*choice \n\t#Yes\n\t\t*goto_scene story \n\t\t\n\t#No \n\t\t*goto_scene ending", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Max\"\n*set gender \"Male\"\n*set hp 12\n*set nrg 6\n*set imp 2\n*set wit 1\n*set sceptic 0 \n*set xp 2\t\n*set rel_arch 2 \n*set rel_fr 3\n*set rel_yan 2\n*set rel_misery 5 \n*set rel_amy 1 \n\n\"I want that body,\" you say determined. \"The knight died, but my soul can cling to the physical even if much greater wounds have been done to the body.\"\n\nYour soul mentor closes her eyes, concentrating. \"Death status confirmed. My quick analysis suggest that you are compatible.\"\n\nWhat would you say?\n*fake_choice\n\t#\"Very good, I am moving in.\"\n\n\t#\"Please, ask the spirit of this warrior for permission to use the body.\"\n\t\n*script changeBackgroundColor(\"black\")\n*set name \"Monique\"\n*set gender \"Female\"\n*set hp 9\n*set nrg 3\n*set imp 3\n*set wit 1\n*set sceptic 0 \n*set xp 5\t\n*set rel_arch 3 \n*set rel_fr 3\n*set rel_yan 2\n*set rel_misery 2 \n*set rel_amy 1 \n\n\"So you are the one chosen by my lord. What is the sacrifice you would require of me?\"\n\nYour jaw drops in awe. Inside, you laugh because it is probably the last thing you would expect to hear, especially from a total stranger. However, you decide \nto try to suppress the reaction for the time being.\n\nHow would you reply?\n*fake_choice\n\t#Contact your Exorcist sword\n\t\n\t#Contact your Clairvoyant sword\n\t\t\n\t#Admit that she must be mistaken\n\t\t\t\t\t\t\n\t#Tell her that she is probably looking for somebody from the Temple\n\t\n\t#Ask her about her lord\n\t\t\t\t\n\t#Nothing, just continue on your way\n\t\n*script changeBackgroundColor(\"sepia\")\n*set name \"Igvar\"\n*set gender \"Male\"\n*set hp 8\n*set nrg 4\n*set imp 1\n*set wit 3\n*set sceptic 1 \n*set xp 7\t\n*set rel_arch 1 \n*set rel_fr 4\n*set rel_yan 3\n*set rel_misery 9 \n*set rel_amy 3 \n\nAn ice-blue demonic creature comes from behind one of the more distant pillars. It seems to be 8 or 9 feet tall\tand is covered in spikes. And, it seems to be male.\n\n\"An intruder! How dare you defile the sanctity of this place?\"\n\nHow would you reply?\n*fake_choice\n\t#\"Actually, I was just leaving. Would you please show me the egress?\"\n\t\t\n\t#\"I think it is defiled already.\"\n\t\n\t#\"Mind your language, demon.\"\n\t\n*set name \"Caleb\"\n*set gender \"Male\"\n*set hp 5\n*set nrg 2\n*set imp 3\n*set wit 1\n*set sceptic 0 \n*set xp 9\t\n*set rel_arch 0 \n*set rel_fr 1\n*set rel_yan 2\n*set rel_misery 12 \n*set rel_amy 4\t\n\t\n\t\n\"I spoke with the commander and I almost got into a quarrel because of his sending you on the night patrol.\"\n\nHow would you reply?\n*fake_choice\n\t#\"You should be careful with the Commander. I don't want you to get into trouble because of me.\"\n\t\t\n\t#\"The Commander asked me if I was ready for that. I volunteered, he didn't make me do it.\"\n\t\t\n\t\t\n\t#\"I don't think it is good to quarrel with a superior.\"\n\t\t\n*if choice_is_ios_app\n\t*finish\n*set name \"Victoria\"\n*set gender \"Female\"\n*set hp 7\n*set nrg 5\n*set imp 5\n*set wit 3\n*set sceptic 2 \n*set xp 8\t\n*set rel_arch 5 \n*set rel_fr 3\n*set rel_yan 4\n*set rel_misery 15 \n*set rel_amy 5\n\nShe is wearing a black dress with laces that reveals toned shoulders and arms. You find yourself wondering whether she is feeling cold.\n\nHer cherry-red eyes examine you with interest. Several bats fly above your head and then back to her, probably trying to answer the silent question asked by their mistress.\n\nShe moves to the center of the tunnel, making sure you just don't rush past her before her curiosity has been satisfied.\n\nWhat do you do?\n*fake_choice\n\t#Threaten her with the broken dagger\n \n\t#Wrap the bat skin around her shoulders\n\t\t\n\t#Use the amulet to mind control her", "slayer": "Wind barely touches the rims of your cloak as you stand on top of the cliff overlooking the village. You are in spirit form, barely there at all, slightly denser than a ghost,\nand yet you can feel the energies of this land. They are much darker than what you are used to enjoying in your homeworld.\n\n\"What is it that you are seeing, dear one?\" says a familiar female voice right behind you. You have no idea when she appeared, but her presence is always welcome.\n\n\"I see a brave knight ambushed in a barn. The prowess in battle would not be enough to prevail against three ruffians with daggers and an archer shooting from the second floor.\" You sigh.\n\n\"That task of being a watcher of this falling world has been taxing on you, has it not?\" your soul mentor and Commander asks.\n\nYou nod. \"I know it was an exercise to help me deal with my anger and impatience, but I think it has been going for too long. I want to get down here and fight \nfor a better world with more love...\"\n\n\"... by wielding a sword.\" She interrupts you with a smile.\n\nMeanwhile, the knight manages to slay one of the ruffians, but an arrow finds a weak spot in the armour. The warrior falls to the ground, the hand losing the grip \nof the blade.\n\n\"I want that body,\" you say determined. \"The knight died, but my soul can cling to the physical even if much greater wounds have been done to the body.\"\n\nYour soul mentor closes her eyes, concentrating. \"Death status confirmed. My quick analysis suggest that you are compatible.\"\n\nWhat would you say?\n*choice\n\t#\"Very good, I am moving in.\"\n\n\t\t\"I wouldn't be as hasty,\" she suggests. \"Aren't you skipping the part in which permission must be sought before taking the advantage of the body. \n\t\tYou are not telling me you are going to act like those pesky necromancers, right?\"\n\n\t\tYou realize she is right. \"I am sorry, it seems my impatience is still something affecting me badly. Please, ask the warrior's soul.\"\n\n\t\t(Imbalance +)\n\t\t*set imp +1\n\t\t*goto 2\n\n\n\t#\"Please, ask the spirit of this warrior for permission to use the body.\"\n\t\t\"I am delighted that you are following the protocol,\" she says.\n\t\t\n\t\t(Expereince +)\n\t\t*set xp +1\n\t\t*goto 2\n\n\n*label 2\n*page_break\n\"The knight asks if you are going to use his body to continue his service to the Fellowhip of the Sword, in bringing more light to their realm of operations.\"\n\nYou nod.\n\n\"I have met this guy in a distant world… He asks me if I am sure of your motives and I answer that I would guarantee for your actions with the wholeness of my heart. The spirit agrees.\"\n\n\"Thank you, dear one,\" you mutter, preparing to connect with the injured body of the knight.\n\n\"Be careful… there will be a lot of pain,\" she warns you.\n\n\"There is always pain in this world,\" you reply and wave goodbye.\n*page_break\nThere is a sense of being very heavy and trapped as you enter the body of the knight and become one with it. A part of you feels sorry for having to come back to the physical, but you remember that it has been\nlike that every time.\n\nYou also don't have much time to think about it because just after the realization comes the pain. The arrow is still stuck next to your shoulder.\n\nWould you like to take it away?\n*choice\n\t#Yes\n\t\tYou grit your teeth and pull it out. Luckily, the bandits are not looking at you, too busy celebrating their coward victory.\n\n\t\tUnfortunately, those actions increase the loss of blood.\n\n\t\t(Health-)\n\t\t*set hp -1\n\t\t*goto 3\n\t\n\t#No\n\t\tYou know that as uncomfortable you feel having an arrow stuck in your body, removing it could increase the blood loss, so you decide against it. \n\n\t\tMentally thanking fate for it not being on the side of your main hand, you prepare for battle.\n\t\t*goto 3\n\n*label 3\n*page_break\nAs you try to stand up, you feel even more pain. You feel sharp pain in your back, probably a wound you didn't see being inflicted.\n\nWould you like to block the pain using your mental abilities?\n*choice\n\t#Yes \n\t\t*set nrg -1\n\t\t[i] There is no pain [/i], you say to yourself and try to change your vibrations to one in which your body feels healthy. You know that it is only an illusion,\n\t\tbut right now you need your new body to cooperate if you are to survive, and that entails blocking some of its mechanisms.\n\n\t\tYou stand up, though less gracefully than what you are used to. The two ruffians look at you in horror as you put your sword up. It is too late for one of them, his body hits the floor.\n\t\t*goto 4 \t\n\t#No\n\t\tYou stand up, mobilizing the strongest part of your will. The two ruffians look at you in horror as you put your sword up. You attack the one to your left, but excruciating pain on your back makes it too slow. The \n\t\tbandit dodges and stabs your arm, before falling victim to your weapon in return.\n\t\t*set hp -1\n\n\t\t(Health-)\n\t\t*goto 4\n\n*label 4\nNow only two remain. One dagger wielder just in front of you, and the archer on the second floor. The arrow is already loaded and the blue eyes of the young woman sparkle with determination.\t\n\nA few ideas regarding how to continue the fight come to your mind. The melee fighter is close to you. Maybe you should deal with him first, hoping that you will be able to do so before the archer sets the arrow free, or that \nshe will miss.\n\nAnother option would be to leap at the archer, but that would require you to spend some of your energy.\n\nThe trickiest one would be to dodge the attacks of the melee fighter until the archer shoots and you and then make sure the arrow connects with him. \n\nWhat do you do?\n*choice\n\t#Attack the dagger wielder\n\t\tThe ruffian is very careful after seeing a couple of his comrades fall. Your inability to quickly take him out allows the archer to make her shot.\n\n\t\tUnfortunately, her marksmanship is greater than the ability of your broken body to dodge. The tip of the arrow scratches the outside of your thigh.\n\t\t*set hp -1\n\n\t\t(Health-)\n\n\t\tYou see her preparing another arrow, while the ruffian seems to be going back on the offensive, seeing an opportunity.\n\t\t\n\t\tWhat do you do?\n\t\t*choice\n\t\t\t#Leap at the archer \n\t\t\t\t*goto 4x1\n\t\n\t\t\t#Use the dagger wielder as a shield \t\t\t\n\t\t\t\t*goto 4x2\n\n\t\n\t#Leap at the archer \n\t\t*goto 4x1\n\t\n\t#Use the dagger wielder as a shield \t\t\t\n\t\t*goto 4x2\n \n*label 4x1\n*set nrg -1\nYou connect with your spirit energy and draw a bit of it up, asking it to help you make the heroic jump. Suddenly, your body feels very light, as if you are in spiritual form, but\nyou know that it is just a side effect.\n\nThe eyes of the woman widen in horror as she sees you flying in her direction, with a sword ready for a swipe. Her decision is to jump down. She wails when her foot meets the floor, \nprobably spraining or breaking it.\n\nSeeing that he is the only one still capable of fighting, the ruffian dashes out of the barn.\n\nWithout taking your eyes off the woman (since you suspect she can still be dangerous), you carefully use the ladder to go down.\n*goto 5\t\n\n*label 4x2\nIt takes a lot of concentration on your side to both be able to keep an eye on the ruffian and the archer. A second of looking up allows the dagger wielder to stab your hand.\n*set hp -1\n\n(Health-)\n\nHowever, when the archer finally shoots you manage to kick the bandit so that the arrow sinks into his back.\n\nThe archer looks at you with eyes filled with terror, realizing that she is the only one of the attackers left. Her decision is to jump down. She wails when her foot meets the floor, \nprobably spraining or breaking it.\n*goto 5\n\n*label 5\n*page_break\nThe smell of burning hay hits your nostrils. Looking up, you see that the roof of the barn is on fire. It seems that whoever organized the ambush wanted to make sure the knight does not come out \nalive even if it means the sacrifice of the attackers.\n\nYou believe you have a little bit of time before the burning roof collapses on you. It can be used to search the bodies of the dead ruffians next to you. The value of their possessions is hardly of interest \nto you, but you may find clues pointing you in the direction of finding what this ambush is all about.\n\nAnother option is to help the archer. She doesn't seem dangerous any more and you clearly don't see an enemy in her. You believe that she can crawl out of the barn on her own, and yet there is a desire in you to help her.\n\nOf course, you can just leave the place. Your body is injured and tending to your wounds is a highly recommended.\n*choice\n\t#Search the bodies\n\t\tYou quickly search the ruffian body closest to you and find a pendant in the pocket. Without wasting time to study it closely, you hide it in your own pocket.\n\t\t\n\t\tThe fire above you starts to rage. With your periphery vision you see the archer starting to crawl out.\n\t\t*set pendant true\n\t\t\n\t\tWhat would you do?\n\t\t*choice\n\t\t\t#Search another body\n\t\t\t\tYou find a stained map in the cloak of the second ruffian.\n\t\t\t\t*set map true\n\t\t\t\t\n\t\t\t\tSuddenly, a burning piece of the ceiling falls over you, adding to your injuries.\n\t\t\t\t\n\t\t\t\t(Health-)\n\t\t\t\t*set hp -1\n\t\t\t\t\n\t\t\t\tDeciding it would be too risky to continue to search the next body, you leave the building.\n\t\t\t\t*goto 6\n\t\t\t\t\n\t\t\t#Help the archer\n\t\t\t\t*goto 5x1\n\t\t\t\t\n\t\t\t#Leave the burning building\n\t\t\t\t*goto 6\n\t#Help the archer\n\t\t*goto 5x1\n\t\n\t#Just leave \n\t\tYou decide that you don't have the nerve to stay here any more.\n\n\t\t(Imbalance+)\n\t\t*set imp +1\n\t\t*goto 6\n\n*label 5x1\n*set rel_arch +3\nShe flinches as you approach her.\n\n\"Don't be afraid, I will not harm you. I just want to help you out because the roof is burning,\" you try to explain with the calmest tone you are capable of.\n\nShe nods and extends her hand.\n\n\"Please, remove the dagger,\" you tell her.\n\nShe hesitates for a second and then she produces a dagger out of her boot and leaves it on the floor.\n\n\"What about the other?\" you insist.\n\nThis time her hand disappears under her shirt and another blade comes out. Soon it joins its twin on the floor with a ding.\n\n\"How did you know I had daggers?\" she asks you after you pull her up and put her hand around your shoulder so that you can support her.\n\n\"I didn't,\" you admit. \"I was just bluffing. But it was safe to assume that you had at least one based on the weapons of your comrades. Are you able to step on that foot?\"\n\n\"Yes.\" She ouches. \"I am not sure how much of comrades they were.\"\n\nYou go outside. The sun is about to set and the flames produce lengthening shadows. Suddenly, she pushes you with the whole of her weight and you fall down. A dagger \nswishes above you and thrusts into the cherry tree near you.\n\n\"What was that?\" you ask confused.\n\n\"I bet it was the arsonist. He is from the gang. He is a real bastard, but very good at stealth. Even if you know what you are looking for, it would be very hard to spot him,\" she explains.\n\n\"What if he is still around and tries to attack again?\" you ask.\n\n\"No way, he is a coward. Otherwise he would have been in the barn with us. I am sure he is running for his life right now.\"\n\nYou nod and stand up, looking around. There seems to be no threat around, as far as you are concerned, so you lend her a hand again.\n\n\"Where are we going?\" she asks you.\n\nYou search through the memories of the knight. \"My horse is supposed to be around the corner. I can take you to wherever you need,\" you tell her.\n\nShe gives you a wide smile. \"That is very nice of you. Just leave me in the suburbs. I can handle it from there. I think my foot is much better.\"\n\nThe beige horse seems to be a bit perplexed, clearly sensing the change \"you\" went through, but you pet him a lot to calm him down before getting on\nhis back and allowing the archer to take a seat behind you.\n*page_break\nAs soon as you enter the town she asks you to let her go. You help her get off the mount and wish her a quick recovery.\n*goto 7\n\n*label 6\n*page_break\nThe sun is about to set and the flames produce lengthening shadows. Trying to access the memories that are not exactly yours makes you a bit dizzy but you manage to remember that your horse is tied behind a tree not far away.\n\nYou wonder who started the fire and why they would risk harming their own people.\n\nThe answer comes in the form of a dagger that sinks into your calf. You scream and raise your sword, ready to defend yourself, but all you can see is a silhouette running away and into the tall grass. \n\n(Health-)\n*set hp -1\n\nYou take the dagger out and angrily throw it away. The wound is superficial, but still quite unpleasant.\n\nThe beige horse seems to be a bit perplexed, clearly sensing the change \"you\" went through, but you pet him a lot to calm him down before getting on\nhis back. Then, you gently coax him into galloping towards town. At first you enjoy the ride, but after you enter the settlement dizziness takes the best of you. \n*goto 7\n\n*label 7\n*page_break\nYou grow so weak that it is very hard to keep yourself conscious, let alone to access the memories that are not truly your own regarding the way to the training grounds of the Fellowship of the Sword. \nLuckily, the horse has no problem recalling that. The vague knowledge that you are safe is the last thing that you are aware of before you pass out.\n*page_break\nYou hear an angry female voice calling your name...\n*choice\n\t#Marcus\n\t\t*set name \"Marcus\"\n\t\t*set gender \"male\"\n\t\t*goto 8\n\n\t#Igvar\n\t\t*set name \"Igvar\"\n\t\t*set gender \"male\"\n\t\t*goto 8\n\t#Caleb\n\t\t*set name \"Caleb\"\n\t\t*set gender \"male\"\n\t\t*goto 8\n\t#Linda\n\t\t*set name \"Linda\"\n\t\t*set gender \"female\"\n\t\t*goto 8\n\t#Miriam\n\t\t*set name \"Miriam\"\n\t\t*set gender \"female\"\n\t\t*goto 8\n\t#Paula\n\t\t*set name \"Paula\"\n\t\t*set gender \"female\"\n\t\t*goto 8\n\t#other male name\n\t\t*input_text name\n\t\t*set gender \"male\"\n\t\t*goto 8\n\t#other female name\n\t\t*input_text name\n\t\t*set gender \"female\"\n\t\t*goto 8\t\n\n*label 8\n\"${name}, you have no idea how much I want to kill you.\"\n\nYou open your eyes and gladly note that you are lying on a soft bed and in clean sheets smelling of lavender. Your almost naked body has been taken care of. The wounds are clean and \nthe pain is almost completely gone.\n\nAnd there is a pretty lady dressed in padded armor. Her light skin seems red around the cheeks, probably because she is furious. \n\nShe shakes her head and the jet black pony tail lashes in the air. Fresca, you recall, the chief healer of the Fellowship of the Sword.\n\n\"Nice to see you too,\" you say still struggling to keep your eyes open. You feel so weak.\n\n\"You are totally irresponsible,\" she shouts. \"How dare you get yourself to such a terrible condition. Don't you have any self-respect?\"\n\n\"I was ambushed, it was not really my fault,\" you murmur.\n\n\"This is what I am talking about. You should use your head a bit more. It is not just a decoration, you know.\"\n\n\"There is wisdom is what you say,\" you reply.\n\n\"The problem is that you appeared here half dead. I could not heal you on my own, so I had to ask for Brother Florence from the Church of Light to come and visit me. And he is so pesky.\nWhen he invited me for dinner, I had to momentarily fight my desire to slay him. I am happy all those self control lessons by Master Yan were useful.\"\n\n(Health++)\n*set hp +2\n\nWhat would you reply?\n*choice\n\t#\"Please, shut up!\"\n\t\t\"Oh, you are abominable,\" she shouts and leaves the room.\n\n\t\tAt least it gets quieter.\n\t\t*set rel_fr -1\n\t\t*goto 9\n\n\t#\"I have heard that he is a good cook.\"\n\t\tFresca looks at you with bewilderment and raises her hand to mark the beginning of another lecture (you guess), but then decides it is not worth it and just leaves\n\t\tyou alone.\n\t\t*set wit +1\n\n\t\t(Wit+)\n\t\t*goto 9\n\t\n\t#\"I am sorry for what you went through and thank you for what you did.\"\n\t\t\"Oh, really,\" Fresca's eyes widen. \"So you can be kind at times? I am impressed.\"\n\n\t\t\"Do you want to say that I am usually rude?\" you ask her, trying to find out more about the warrior you stepped into the shoes of.\n\n\t\t\"I wouldn't say that, but you know, sometimes you can be harsh and demanding. I know that everybody wants to return to full health immediately, but it \n\t\tsometimes it takes a lot of time. Like when you sprained your knee and insisted on participating in the tournament.\"\n\n\t\t\"Oh, I see. I must apologize for that one too.\"\n\n\t\t\"You leave me speechless,\" Fresca admits. \"Wait a minute.\" She disappears into the room next to yours and returns with a small bottle. \"It is a healing\n\t\tpotion, I keep them for special occasions. Now I leave you to rest,\" she says and goes out.\n\n\t\tYou open the bottle and smell it. It turns out the smell of raspberry does not give you a fair idea about the taste, however, it does make you feel better. It \n\t\talso calms you down and you fall asleep again.\n\t\t*set rel_fr +1\n\t\t*set hp +1\n\n\t\t(Health+)\n\t\t*goto 9\n\n*label 9\n*page_break\nYour dreams are nightmares caused by the traumas of the injuries this body has taken and the discomfort your spirit feels being connected to a physical being that \nit is not used to. But when you open your eyes you do feel a lot better.\n\n(Health+)\n*set hp +1\n\nYou have a good chance to reflect on your body. It has sculptured muscles that would make you very attractive to those whose tastes are in accordance with your gender. \nThe thought that Fresca probably had to check you out in order to determine how severe your injuries were makes you blush.\n*choice\n\t#You find Fresca hot\n\t\t*set rel_fr +1\n\t\t*set attr_fem true\n\t\tYou know that your eyes say it all when you look at her and it is sad that your wounds are the reason for you two to spend more time together, but you are hopeful that something \n\t\tgood may come out of it\n\n\t\tHow do you feel about men?\n\t\t*choice \n\t\t\t#In general, you like men too\n\t\t\t\t*set attr_male true\n\t\t\t\t*goto 10\n\t\t\t\t\n\t\t\t#You appreciate the handsomeness of your fellow brothers in arms, but not in that way\n\t\t\t\t*goto 10\n\t\t\t\t\n\t#You are attracted to females, but the archer you met earlier suited your tastes more\n\t\t*set rel_arch +1\n\t\t*set attr_fem true\n\t\t\n\t\tYour thoughts go back to the beautiful eyes of the woman who almost killed you. A part of you wishes to see her again. Your self-preservation instinct \n\t\tscreams against it.\n\t\t\n\t\tHow do you feel about men?\n\t\t*choice \n\t\t\t#In general, you like men too\n\t\t\t\t*set attr_male true\n\t\t\t\t*goto 10\n\t\t\t\t\n\t\t\t#You appreciate the handsomeness of your fellow brothers in arms, but not in that way\n\t\t\t\t*goto 10\n\t\t\t\t\n\t#You are attracted to females, but neither Fresca nor the archer are your type\n\t\tThat comes a bit unexpected as both of them happen to be quite beautiful. Could it be that you are quite picky?\n\t\t\n\t\tHow do you feel about men?\n\t\t*choice \n\t\t\t#In general, you like men too\n\t\t\t\t*set attr_male true\n\t\t\t\t*goto 10\n\t\t\t\t\n\t\t\t#You appreciate the handsomeness of your fellow brothers in arms, but not in that way\n\t\t\t\t*goto 10\n\t\t\t\t\n\t#You are not attracted to women\n\t\tDo you prefer men?\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\t*set attr_male true\n\t\t\t\t*goto 10\n\t\t\t\t\n\t\t\t#You appreciate the handsomeness of your fellow brothers in arms, but not in that way\n\t\t\t\t*goto 10\n\t\t\t\t\n*label 10\n*page_break\nYour sword lies in the corner of the room. You can barely recognize it because it looks corroded. It seems in the few hours since the last battle it aged dramatically.\nNext to it is the helmet. The design is simple, the emphasis falling on functionality. There are two slots for the eyes that mark potential weak spots in the oval shape.\n\nThe breastplate is engraved with the symbol of the Fellowship of the Sword. Somebody must have polished it while you were unconscious because it shines as it reflects the sunlight falling on it. \nA clean and carefully folded pair of pants and a shirt are put next to them.\n\nYou carefully stand up and take the clothes. They smell of daisies and you are very happy to feel the delicate cloth on your skin.\n\nAs soon as you take the sword in order to examine it closely, the steal crumble on the floor, making you swear at the trickery you are observing.\n\nAt this point, Fresca comes in and asks you to go back to bed because you need to rest.\n\nWhat do you do?\n*choice\n\t#Fulfill her instructions\n\t\t\"So be it, I am going to be a good patient,\" you smile and return to bed.\n\n\t\tAt first you feel a bit bored to just lay down while you feel able to walk, but soon you drift off again. When you wake up, you feel stronger.\n\t\t*set hp +1\n\n\t\t(Health+)\n\t\t*set rel_fr +2\n\t\t*goto 11\n\t\n\t#Gently explain to her that you feel fine, but don't refuse if she insists\n\t\t\"I really don't need that,\" you tell her.\n\n\t\t\"I am the medic and as soon as you enter the infirmary and are wounded, I am the boss. Understood?\"\n\n\t\tYou sigh and return to bed. At first you feel a bit boring to just lie down while you feel able to walk, but soon you drift off again. When you wake up, you feel stronger.\n\t\t*set hp +1\n\n\t\t(Health+)\n\t\t*goto 11\n\n\t#Refuse \t\n\t\t\"I don't wish to do it,\" you state firmly.\n\n\t\t\"I am the medic and as soon as you enter the infirmary and are wounded, I am the boss. Understood?\"\n\n\t\t\"I am the master of my fate!\" you insist.\n\n\t\tFresca takes you by the shirt and throws you on the bed with a precision that inspires awe.\n\n\t\t\"Understood?\" she asks with flaming eyes.\n\n\t\tYou nod. However, you are determined not to go to sleep. After she goes back out you stand up and sneak towards the entrance. Poking outside, \n\t\tyou make sure she is not nearby and only then go out.\n\t\t*set rel_fr -1\n\t\t*goto 11\n\n*label 11\n*page_break\nAnd so, the training grounds of the Fellowship of the Sword are yours to explore. There are several ideas that come to your mind. You definitely need a new sword, so visiting the blacksmith is a must.\n\nThe Chamber of Meditations would be a good place to visit in order to align your spirit and hear the guidance of Master Yan.\n\nThe Halls of Initiation would be great for learning more about the Fellowship and what it stands for.\n\nThe Temple of the Mystics is recommended if you have an artifact you want to learn more about.\n\nAlso, maybe it is a good idea to meet the Commander in order to receive tasks.\n*goto 12\n\n*label 12\n*page_break\nWhich building do you plan to visit now?\n*choice\n\t*hide_reuse #The blacksmith's\n\t\t*goto bs\n\n\t*hide_reuse #The chamber of Meditations\n\t\t*goto meditations\n\n\t*hide_reuse #The Halls of Initiation\n\t\t*set halls true\n\t\t*goto halls\n\n\t*hide_reuse #The Temple of Mystics\n\t\t*goto temple\n\n\t*hide_reuse #The Commander's Office\n\t\t*goto commander\n\n\t#Done with the day\n\t\t*goto 13\n\n*label bs\nUpon entering the Blacksmith's, you decide that the master of weapon production must be some sort of a super human. It is scorching inside. The noise of the hammer hitting a semi-molten blade is deafening.\nTo make matters worse, he puts it in a bucket full of water. The result is a cloud of steam that makes breathing even worse.\n\nAll of it seems to make little impression to the burly blacksmith (his name is Bunth, you remember). To make matters worse, he has a long beard and hair, as if trying to prove that he is immune to heat.\n\nHis chiselled arms wield a pair of pliers and a heavy hammer with which he hits again and again (spraying sweat everywhere).\n\nCatching sight of you he stops and greets you. \"What is it that you seek, ${name}. I haven't seen you in a while.\"\n\n\"My sword just crumbled to pieces,\" you explain. \"I am going to need a new one.\"\n\nBunth scratches his beard. \"Strange. That usually happens when a warrior dies. But I've heard curses can do that too. I am sorry for your loss. What kind of a sword do you require?\"\n\nWhat would you answer?\n*choice\n\t#A great sword capable of doing enormous damage\n\t\t\"I have exactly what you need,\" says the blacksmith and leads you to the room in the back. There, among many other blades, you see an embodiment of your dream weapon.\n\n\t\tIts heaviness suggests of might. The reach gives you a lot of peace, and the grip makes you comfortably wield it even with one hand.\n\n\t\t*set sword_type \"Greatsword\"\n\n\t\t(Sometimes your sword will deal extra damage to enemies)\n\t\t*goto bs2\n\t\n\t#A swift sword to quickly reach the enemy\n\t\t\"I have exactly what you need,\" says the blacksmith and leads you to the room in the back. There, among many other blades, you see an embodiment of your dream weapon.\n\n\t\tAs soon as your hand touches the grip, it feels as if the sword is a natural extension of your body. Despite being long enough to provide you with a considerable reach,\n\t\tit is also very light. Its blade swishes and bends slightly as you swipe in the air.\n\t\t*set sword_type \"Katana\"\n\n\t\t(Sometimes making swift blows will not cost energy when wielding this sword)\n\t\t*goto bs2\t\n\n\t#A sword suitable for piercing armor \n\t\t\"I have exactly what you need,\" says the blacksmith and leads you to the room in the back. There, among many other blades, you see an embodiment of your dream weapon.\n\n\t\tIts blade is long and narrow, looking more like a wedge that has been sharpened to the sides in order to be able to effectively inflict cutting damage. But the thought behind its \n\t\tcreation is obviously negating heavy armor.\n\n\t\t*set sword_type \"Armorbane\"\n\t\t*goto bs2\n\t\t\n*label bs2\t\nAnd now the other very important question, what personality would you like the sword to have. The Fellowship believes that every blade has a consciousness on its own, even though \nit may take a fine tuning of the heart to be able to listen to it sometimes. Though, even without it, it is hard to deny the effect a sword can have on the environment around it.\n*goto bs3\n\n*label bs3\nYour sword is a... \n*choice\n\t#healer\n\t\tIt is true that a weapon is hardly a tool of healing and a sword in general can not be very effective in it. Moreover, nobody in the Fellowship has been able to realize when \n\t\texactly such a sword would decide to engage in an act of healing. Some argue that it would be left for the time when it is required the most. Others would point out that usually the \n\t\tchosen target would be other than the wielder. Nobody, however, argues against having a weapon of this type in their scabbards.\n\t\t\n\t\tIs that your choice?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set sword_power \"Healer\"\n\t\t\t\t*goto bs4\n\t\t\t\t\n\t\t\t#No, I want to check out the other options\n\t\t\t\t*goto bs3\n\t\t\t\t\n\t#diplomat\n\t\tTo an outsider, some of the members of the Fellowship would appear as very charismatic. What was hard for them to realize that the aura of exuberant patience and respect comes from the type of sword resting in the \n\t\tsheath.\n\t\t\n\t\tIf you choose this type of sword, others would often times feel an urge to trust you, to open their hearts to you, or to just confess what may otherwise remain shrouded in silence.\n\t\t\n\t\tIs that your choice?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set sword_power \"Diplomat\"\n\t\t\t\t*goto bs4\n\t\t\t\t\n\t\t\t#No, I want to check out the other options\n\t\t\t\t*goto bs3\n\t\t\t\t\n\t#dragon slayer\n\t\tThe first accounts of the existence of this type of blades are written in the annals of ancient legends. Recently, there have been disputes regarding why humans and reptilians had to \n\t\tengage in warfare and whether the people really had the moral right to do some of the things they did.\n\t\t\n\t\tHistory aside, these weapons have proved their expertise on the battlefield against reptilians.\n\t\t\n\t\tIs that your choice?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set sword_power \"Dragon Slayer\"\n\t\t\t\t*goto bs4\n\t\t\t\t\n\t\t\t#No, I want to check out the other options\n\t\t\t\t*goto bs3\n\t\t\t\t\n\t#exorcist\n\t\tDemons have proved to be some of the toughest enemies humanity has faced throughout its history. Able to shift in and out of the physical plain gives them an advantage that is\n\t\thard to counter.\n\t\t\n\t\tOn top of that, they are sometimes able to seed corruption in the souls of their victims, the most extreme form of it being the act of possession.\n\t\t\n\t\tWhatever it is that an Exorcist sword has as its essence, it is very good at detecting and dealing damage to demons. It has even shown a history of being very effective when \n\t\tfreeing the possessed.\n\t\t\n\t\tIs that your choice?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set sword_power \"Exorcist\"\n\t\t\t\t*goto bs4\n\t\t\t\t\n\t\t\t#No, I want to check out the other options\n\t\t\t\t*goto bs3\n\t\t\t\t\n\t#clairvoyant \n\t\tThe history of the Fellowship of the Sword remembers cases in which intuition proved to be the most valuable weapon. While it is widely believed to be a gift common to all\n\t\thumans, not all of them have the ability to access it at all times. This is the function of the Clairvoyant brand. It can help you reconnect with the natural understanding of what to do when uncertainty arises, giving you precious hints. \n\t\n\t\tIs that your choice?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set sword_power \"Clairvoyant\"\n\t\t\t\t*goto bs4\n\t\t\t\t\n\t\t\t#No, I want to check out the other options\n\t\t\t\t*goto bs3\n\t\n\t#energetic transmitter\n\t\tAs you probably already figured out, many of the special abilities of the warriors from the Fellowship use energy as a resource. The energetic \n\t\ttransmitter brand stores a bit of it in itself, ready to help when its wielder needs it.\n\n\t\tIs that your choice?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set sword_power \"Energy transmitter\"\n\t\t\t\t*set nrg +2\n\n\t\t\t\t(Energy++)\n\t\t\t\t*goto bs4\n\t\t\t\t\n\t\t\t#No, I want to check out the other options\n\t\t\t\t*goto bs3\n\n\t#resistance booster\n\t\tThe resistance booster is the natural choice for knights who like to be in the front lines of combat. While the sword makes it so that it is a bit \n\t\tmore difficult for the wielder to be hurt, the true power of it is the aptitude to prevent elemental damage (such as fire or ice).\n\n\t\tIs that your choice?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set sword_power \"Resistance booster\"\n\t\t\t\t*set hp +1\n\n\t\t\t\t(Health+)\n\t\t\t\t*goto bs4\n\t\t\t\t\n\t\t\t#No, I want to check out the other options\n\t\t\t\t*goto bs3 \n\t#regular sword\n\t\tLegends speak of heroes who decide to abandon the powers of the swords offered to them and take a regular blade. Some of them managed to achieve epic deeds nevertheless.\n\n\t\tIs that your choice?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set sword_power \"Regular\"\n\t\t\t\t*achieve regular\n\t\t\t\t*goto bs4\n\t\t\t\t\n\t\t\t#No, I want to check out the other options\n\t\t\t\t*goto bs3\n\t\t\t\t\n*label bs4\n*goto 12 \n\n*label halls\nThere is a big statue of the founder of the Fellowship of the Sword in front of the Initiation Halls. His name is shrouded in mystery. The image depicted by the statue\nreveals little too - just a man with a very athletic build. His posture is set straight, revealing an air of pride and nobility. The helmet indicates nothing of his facial features, but it was \nthe basis for the design of all of the ones the members of the Fellowship are wearing. He is only wearing a breast plate, probably not wanting to sacrifice mobility in order to gain protection.\n\nHis sword is resting peacefully in a sheath attached to his belt, but his hand is on the grip, indicating that he needs a split second to make it deadly.\n\nThere are three slates next to the statue engraved with texts outlining the principles of the Fellowship, known as the Core, the Sword and the Refrains.\n\nWould you like to read any of them?\n*goto halls2\n\n*label halls2\n*choice\n\t#Yes, the one in front of the statue (the Core)\n\t\t[i]The Fellowship is an organization established with the ideal of being in service to the highest attainment of the human mind, heart and soul. It brings together people of\n\t\tconcordant heart-space with each other, seeking to experience a significant degree of oneness in the name of preserving the light contained in every living and breathing being.\n\n\t\tWe come to answer the call of those pure beings whose sanity and existence is threatened by the tides of darkness. We are not afraid to answer the acts of violence with violence,\n\t\tif that is the way to ensure the physical survival of those that need to be protected.\n\n\t\tOur prowess comes from our ability to wield weapons, but our true strength is one of our souls carrying the love of a lovely Source and our connection with it is unblemished.[/i]\n\t\t\n\t\tWould you like to read any other slate?\n\t\t*goto halls2\n\t\t\n\t#Yes, the one on the side of his main hand (the Sword)\n\t\t[i]To a Knight, The Sword is much more than meets the eye. It is not just an instrument of bringing justice to the world. It is an extension of the soul of the warrior, just like the physical body it is in charge of.\n\n\t\tTreat it well, with the respect you would harbour towards any of your brethren within the Fellowship.\n\n\t\tEvery Sword has a consciousness of its own and means to empower its wielder in unique ways. It is a blessing to be cherished and be grateful for.[/i]\n\t\t*goto halls2 \n\t#Yes, the slate on the side of the off-hand (the Refrains)\n\t\t[i]The Knights of the Fellowship are not restricted in the ways of serving the principles of love and light.\n\t\t\n\t\tMay force be only used when all the other means of achieving the goal are ineffective.\n\n\t\tThe negative experience of the founding members of the Fellowship called for the need to formulate two restrains to serve as guidance.\n\n\t\tThe first one is never to let the Sword be out of hand-reach, even if that creates inconvenience.\n\n\t\tThe second one is to never allow alcoholic beverages to enter your body, or any other substance that can cloud the judgement.[/i]\n\n\t\tWould you like to read any other slate?\n\t\t*goto halls2\n\t#No\n\t\t*goto halls3\n\n*label meditations \nThe Chamber of Meditations has a peaceful interior with large windows allowing lots of light to come in and several flowery plants adding a bit of a sweet aroma in the air.\n\nA small magic-infused fountain creates a soothing ripple and a good target to concentrate on while drifting away in a meditation.\n\nMaster Yan is the only one in the Chamber now. His head is shaved as always, which he compensates for with a long beard that underscores his navy blue eyes. He is wearing comfortable-looking bright yellow clothes\nand a big smile to match.\n\n\"Good day, ${name}. It is nice to see you again. It has been a while.\" Then the expression on his face changes. \"I sense a big change in you. Has anything happened to you, my friend?\"\n\nYou are sitting on the fence. On one hand, you believe that his guidance might be helpful in getting in the integration process you are undergoing. On the other, you are not sure if you want that fact to be known by anybody.\n\nWhat do you do?\n*choice\n\t#Tell him that you are the same ${name} he knows\n\t\t\"No, nothing in particular has happened to me recently, except for being ambushed by a group of ruffians who almost killed me. But I am recovering quickly with the help of Fresca,\" you tell him.\n\n\t\tYou can swear that he can detect that you are not telling him the whole truth, but he can't put his finger what exactly.\n\t\t*goto chamber2\n\n\t#Tell him the truth\n\t\t\"Your senses don't lie to you, dear brother. The one you know as ${name} died in an ambush, attacked by a group of ruffians. At that point, my spirit felt a desire to come to the physical and to \n\t\ttry to bring the body to life in order to continue the work of a knight from the Fellowship. What happened was not without the consent of the one this body truly belongs to. What I did was not an act of possession\n\t\tand it stemmed from the fact that the body was too injured for his spirit to remain attached to it.\"\n\n\t\tMaster Yan looks you in the eye. \"I don't hear such stories every day and this is actually the first walk-in I speak to. My intuition tells me that your intentions are pure, but know that the one \n\t\twho everybody will associate with you was very diligent and his acts were guided by the thought of well being of others. It may be a challenge to stand in comparison.\"\n\t\t*set rel_yan +2\n\t\tHow would you reply?\n\t\t*choice\n\t\t\t#Say that you are offended\n\t\t\t\tMaster Yan sighs. \"This is exactly what I had in mind. The real ${name} would not find my statement as an insult but rather as words of wisdom.\"\n\t\t\t\t*set rel_yan -1\n\n\t\t\t\tThere is little you can add to that.\n\t\t\t\t*goto chamber2 \n\n\t\t\t#Claim that it would be an honor to stand up to the challenge\n\t\t\t\t\"Your words and ambitions speak much of you, unknown warrior. Thank you for sharing your secret with me and for wanting to continue the service of a brave heart.\"\n\t\t\t\t*set rel_yan +2\n\t\t\t\t*goto chamber2\n\n*label chamber2\n*page_break\nWhat would you like to ask master Yan?\n*choice\n\t*hide_reuse #Ask why he doesn't have a sword\n\t\t\"I have never been drawn to weapons, let alone bulky ones like most swords are. I don't see the need for anything other than my body to serve as an extension of my soul. But the rules are rules and I was asked to carry one while working on \n\t\tthe training grounds so as not to give a negative example to other members. A few days ago, however, I asked the Commander to be exempt from wearing it. It was not the first time we were having this conversation and I was surprised that she actually \n\t\trelented to my request.\" He smiles widely.\n\n\t\tWould you like to comment on that?\n\t\t*choice\n\t\t\t#No\n\t\t\t\t*goto chamber2\t\n\n\t\t\t#Yes—say that you are happy he got what he wanted\n\t\t\t\t\"Me too,\" he gives you an even wider smile.\n\t\t\t\t*set rel_yan +1\n\t\t\t\t*goto chamber2\n\n\t\t\t#Yes—say that you don't approve of the Commander's decision \n\t\t\t\t\"Rules are rules for everybody and I believe that it was not right of the Commander to make an exception.\"\n\n\t\t\t\tMaster Yan sighs. \"You have heard that when somebody judges, they define themselves as needing to judge?\"\n\t\t\t\t*set rel_yan -1\n\n\t\t\t\tYou make a pause to make that statement sink in.\n\t\t\t\t*goto chamber2\n\t\t\t\t\n\t*hide_reuse #Ask him to tell you again about the path of rage\n\t\tMaster Yan nods. \"It is one of the more difficult topics because it does not involve a concept that is either positive or negative, but something that is in between.\n\t\tIt would be even save to say that it is clay that can be moulded to the benefit of the user. And yet, anger is something more likely to actually affect the person controlling it, to take away the soberness of a mind that should \n\t\tstay clear in assessing the situation.\"\n\n\t\t\"What would be the benefits of anger?\" you ask.\n\t\t\n\t\t\"It can be used as a fuel for achieving what you want, and yet you are likely to burn yourself, spreading flames in all directions and ending up having to deal with guilt, which\n\t\twould be the wounds of what you have done to yourself.\"\n\t\t\n\t\t\"You talk as if you don't approve of that,\" you note.\n\t\t\n\t\tMaster Yan shakes his head. \"I am definitely against it. I think that the dangers outweigh the benefits by far. And yet you are the one to make decisions and the one\n\t\tto keep it at bay if you want to.\"\n\t\t\n\t\tYou thank him for the explanation.\n\t\t*goto chamber2\n\t\t\n\t*hide_reuse #Ask him to help you meditate\n\t\t\"Gladly.\"\n\n\t\tHe invites you to sit next to him in the lotus posture and close your eyes. Then he emphasises on you taking slow and deep breaths and relax while \n\t\tconcentrating on the ripple of the fountain so that you can unlock your subconsciousness. The feeling is very pleasant as you feel as if bathing in a pool of \n\t\tserenity and positive energy\n\t\t*set imp -1\n\t\t*set nrg +1\n\t\t\n\t\t(Imbalance+;Energy+)\n\t\t*goto chamber2\n\t\t\n\t#Bid master Yan farewell\n\t\t*goto 12\n\t\t\n*label halls3\nThrough the open window of the Halls of Initiation you see the chief recruiter murmuring something to a fair-haired woman. The distance does not allow you \nto see her very well, but you have the feeling that there is something rather familiar about her.\n\nThe recruiter, Alorso, sees you too and repositions his glasses before waving for you to come to him. You wonder what is it that he is going to request of you while you make your \nway in.\n*page_break\nYou gasp when you recognize the archer from the ambush.\n\n\"${name}, I am pleased to introduce you to the newest member of the Fellowship, Aya,\" says recruiter Alorso.\n\nThe young woman blushes as she offers her hand for a handshake.\n\n\"Aya is going to undertake a full coarse of training, mainly in the spiritual disciplines as what she showed seems to suggest she has at least a basic ability to wield weapons. She will have her instructor, but I would like to ask you to be her mentor. Hey, why is that uneasiness, do you two know each other?\"\n\nWhat would you reply?\n*choice\n\t#\"Sure, we went to a party together.\" You wink at Aya.\n\t\t*set wit +1\n\t\t(Wit+)\n\t\t*if rel_arch>0\n\t\t\tAya already thinks much of you and your light-hearted joke makes her feel even more comfortable in your presence.\n\t\t\t*set rel_arch +1\n\t\t\t*goto halls4\n\n\t\t*else\n\t\t\tAya doesn't know what to expect from you and your joking approach raises even more questions. What you see written on her face is and expression of confusion.\n\t\t\t*goto halls4\n\n\t#\"I don't know her very well.\"\n\t\t*set xp +1\n\t\t(Expereince +1)\n\t\t\n\t\tYour reply is absolutely genuine and correct while providing no details about what experiences you had together.\n\t\t*goto halls4\n\t\n\t#\"No.\"\n\t\t\"Have I told you that you are a very bad liar?\" Alorso asks you.\n\t\t\n\t\t\"Yes,\" you admit.\n\t\t*goto halls4\n\n*label halls4\nDo you think you can trust her?\n*choice\n\t*selectable_if (sword_power=\"Clairvoyant\") #Listen to the voice of your sword\n\t\tThe swords starts humming gently, inviting you you put your hand on the grip. As you do so, you feel connecting to its consciousness. There are no words coming to yours, only feelings. You sense that you need some more practice to be better \n\t\table to perceive its messages. But, what you undoubtedly understand is that the sword believes in the goodness of that young woman who did what she had to because she happened to be at wrong time in a very very wrong place.\n\n\t\tYou thank the sword for sharing that information and feel its gratitude.\n\t\t*goto halls5\n\t\t\n\t#No, it would be silly to forget about her participation in the ambush\n\t\tThere is wisdom in using that negative experience to prevent having a similar one in future. However, deep inside you are asking yourself just how traumatic that assault must have been for you not to be able to let go of it.\n\t\t\n\t\t*set sceptic +1\n\t\t\n\t\t(Scepticism+)\n\t\t*goto halls5\n\t\t\n\t#More information is needed in order to make any conclusion\n\t\t*set xp +1\n\t\t(Expereince+)\n\t\t\n\t\tYou have been through a lot and what you have lear
