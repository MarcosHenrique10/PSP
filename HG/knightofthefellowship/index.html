ned is that things, especially dramatic ones, are rarely what they seem at first glance. So, you plan to keep your eyes and ears open \n\t\tto learn more about the ambush.\n\t\t*goto halls5\n\t\t\n\t#Probably yes, but caution is advised\n\t\t*set xp +1\n\t\t*set sceptic -1\n\t\t(Experience+;Scepticism-)\n\t\t\n\t\tThe fact that she is here speaks much about the direction her life may have taken. And yet, it is good not to forget that she can be dangerous.\n\t\t*goto halls5\n\t\t\n\t#Yes, completely\n\t\t*set sceptic -3\n\t\t(Scepticism---)\n\t\tThe fact that she is here speaks much about the direction her life have taken. Her past choices do not matter, only the future ones. Those were the lessons \n\t\tof one spiritual teacher you held very dear.\n\t\t*goto halls5 \n\t\t\n*label halls5\n*page_break\nAs a knight of the Fellowship, your free will is sovereign and you can agree to be the Aya's mentor or to refuse. Generally, you don't want to let the recruiter down, so if you really don't want to be near Aya, you can ask him to appoint you as the mentor of another recruit.\n\nWhat is your choice?\n*choice \n\t#Agree to be Aya's mentor\n\t\tAya gives you a wide smile and her eyes sparkle.\n\t\t*set rel_arch +2\n\t\t\n\t\t\"It will be a great honor for me,\" she says.\n\t\t\n\t\t\"If you really want to know what it means to be a knight of the Fellowship, I believe I can teach you. And, it will be an honor for me to \n\t\tsee one embracing the way of the Light Warrior.\"\n\t\t*set mentor 2\n\t\t*goto halls6 \n\t\t\n\t#Do not agree to be Aya's mentor but offer to be the mentor of another recruit \n\t\t\"I am sorry, Alorso, I can't so that.\" \n\t\t\n\t\tThe recruiter looks at you with disappointment.\n\n\t\t\"It is not what you think,\" you continue. \"I am not running away from the responsibility and honor of being a mentor. I would gladly perform that role for somebody else of your choice.\"\n\t\t\n\t\t\"Thank you, ${name}. I know you will be a very good mentor. I will not put my nose in your personal matters, I would only allow myself to remind you that personal conflicts \n\t\tare not encouraged.\"\n\t\t\n\t\t\"It is fine,\" Aya says. \"He has a reason for turning down.\"\n\t\t\n\t\tYou can swear there are tears in those blue eyes.\n\t\t*set rel_arch -2\n\t\t*set mentor 1\n\t\t*goto halls6\n\t\t\n\t#Do not agree to be involved in mentoring \n\t\t\"It is your choice, I am not happy with that because I believe you would be a fine mentor,\" says Alorso. \"I do, however, understand that you may serve in other beneficial ways.\"\n\t\t\n\t\tAya looks at you, not very sure if you turn her down because of the ambush or just because you don't want to be a mentor.\n\t\t*page_break\n\t\t[i]Declining the mentoring task leaves you with more time to rest and recover energy.[/i]\n\t\t*set nrg +2\n\t\t\n\t\t(Energy++)\n\t\t\n\t\t*goto halls6\n\t\t\n*label halls6\n*page_break\nAya and you come out of the Halls. You stand next to each other in silence that seems awkward.\n\n\"Do you want me to explain it to you… I think I owe you that.\" Her tone betrays that it is not easy for her to actually offer this.\n\nWhat do you reply?\n*choice\n\t#\"I don't care. I won't listen to you.\"\n\t\tShe just stares at you. \n\t\t*set imp +1\n\t\n\t\t(Imbalance+)\n\t\n\t\t\"Your personal dramas and past decisions matter no more. I could say that you are very lucky to have done so because right now you are exempt from what may come \n\t\tafter the investigation of the ambush is finished. And your brethren, they may be brought to justice so that we can prevent them from staining humanity any more.\"\n\t\n\t\t\"They are not my brethren any more,\" she says.\n\t\n\t\t\"As I said, I don't care. And I have no time to listen to you.\"\n\t\n\t\tYou turn your back and walk away. You can almost feel her eyes on your back as you do so.\n\t\t*set rel_arch -2\n\t\t*goto 12\n\t\n\t#\"You don't owe me an explanation. Now you are a knight of the Fellowship and you are not to be judged for any past actions.\"\n\t\t\"This is one of the strangest concepts I have had to wrap my mind around,\" Aya says.\n\t\t*choice\n\t\t\t#Joke that it is going to work well for her\n\t\t\t\t\"I have the feeling it is going to work in your favor, so it was a nice move of yours,\" you smile.\n\t\t\t\n\t\t\t\tShe blushes lightly and smiles back.\n\t\t\t\t*set wit +1\n\t\t\t\n\t\t\t\t(Wit+)\n\t\t\t\n\t\t\t\t*goto halls61\n\t\t\t\n\t\t\t#Say that you are surprised it was not what she was after\n\t\t\t\tShe shakes her head.\n\t\t\t\n\t\t\t\t*goto halls61\n\t\t\t\n\t#\"I think you really do.\"\n\t\tYour harsh tone makes her flinch back, but you both know that she deserves that for what she did.\n\t\t*set rel_arch -1\n\t\t*goto halls62\n\t\n\t#Just nod\n\t\tYou can see that she regards your reaction as a warm welcome.\n\t\t*set rel_arch +1\n\t\t*goto halls62\n\t\n*label halls61\n*set rel_arch +2\n\"What if I want to tell you because I think I owe it to myself?\" she asks.\n\nWhat would you reply?\n*choice\n\t#\"Then you are free to do so.\"\n\t\t*goto halls62\n\t\n\t#\"No, I don't want to listen to you. I could use my time more wisely.\"\n\t\t\n\t\t\"I guess I deserve your indifference. So be it, ${name}.\" She frowns.\n\t\tYou turn your back and walk away. You can almost feel her eyes on your back as you do so.\n\t\t*set rel_arch -2\n\t\t*goto 12\n\t\t\n*label halls62 \n*page_break\n*set rel_arch +2\n*set knowledge true\n\n\"I grew up in an orphanage,\" she begins.\n\n\"The one of Matron Susie?\" you interrupt her.\n\nShe nods.\n\n\"I have heard very good feedback about it. I am happy that the Town Council agreed to provide the means of continuing her service to society. And it is an honor for me to have \nanother of her protegees in our ranks.\"\n\n\"You mean there are others? I didn't know.\"\n\n\"The knights of the Fellowship generally don't like talking of their past as our minds are set in bringing about a brighter future. But we don't deny our past either, \nso I am a bit surprised that you haven't seen anybody visiting the Matron. Or, maybe when I think again, I should not make that assumption having in mind the secretive nature of the man I am thinking about.\"\n\n\"Can you introduce me to him?\" Aya asks.\n\n\"Sure. I am sure he could help you become a better knight. But I think we are getting off topic,\" you note.\n*page_break\n\"Yes, we are. What you say is true, Mother Susie has a very big heart and I was provided for all my needs as a child. She really is a guardian angel.\nBut she could not prevent some of the children from falling to the corruption of the street gangs, although she felt really hurt when she found out about it.\"\n\n\"What gang do you refer to?\" you inquire.\n\n\"The Lifebringers. Do you know about them? Maybe you have some information that I haven't heard.\"\n\nWhat do you reply?\n*choice \n\t#\"Yes, I will tell you.\"\n\t\t\"Rumours say that it all started with an alchemist who found a recipe for a healing potion. The nobility wanted to have all potions for themselves \n\t\tas means of securing their power through boosting their troops. They made him a Lord and built him a mansion in the suburbs. Although there were many attempts to do so,\n\t\tthe recipe still remains a secret. Few outside the servants of the Lords had the chance to see one, before greed got the better of Lord Sanic and he gathered a group of scoundrels to \n\t\tdistribute them outside the circle of the Lords and Ladies for ridiculous prices.\"\n\t\t\n\t\t\"This is exactly what I know too.\"\n\t\t*goto halls63\n\t\t\n\n\t#\"Yes, but I think that the whole town knows the basics, I don't want to go over that.\n\t\t\"Yeah, we all know the story of the alchemist Sanic who found the formula for a very effective healing potion and used the Lifebringers' gang to \n\t\tdistribute them at ridiculous prices.\"\n\t\t*set imp +1\n\t\t\n\t\t(Imbalance+)\n\t\t*goto halls63\n\t\t\n*label halls63\n*page_break\n\"So you got involved with the gang?\" you ask.\n\n\"Not really. It was not me but my brother Luis. He had this dream of having a big house on his own and a classy girlfriend whom to marry and have children. You know,\nto have the money to have the family that was denied to him as a child. Selling the potions for the Lifebringers was the means to do it until he accidentally broke one potion he was \ncarrying for a very influential client. He had to pay double or else...\"\n\n\"Is it where you come in the story?\"\n\nShe nods. \"The scoundrel knew that I was good with the bow because I used to spend a lot of time at the militia's quarters. The guards allowed me to train with them, probably hoping that I join them. And it is a pity \nI used my training to try to assassinate you. This was the price I had to pay so that he could be free. I am terribly sorry for what I did.\"\n\nWhat would you do?\n*choice\n\t#Forgive her and hug her\n\t\t\"We all make mistakes. There is a saying that it is human to err, but divine to forgive. Luckily for me, I can forgive you and free my mind from the \n\t\texperience of pain in regard to what you did to the warrior standing before you,\" you say.\n\t\t\n\t\tAya opens her mouth, wanting to say something but can't find the words. \n\t\t\n\t\t\"You don't need to say anything.\" You smile while getting close to her and embracing her in your arms. Her hair smells of forest flowers.\n\n\t\tShe sighs in surprise, but then hugs you back.\n\t\t\t\t\n\t\t\"Did they tell you where to go to assign a room?\" you ask while breaking from her embrace.\n\t\t\n\t\tShe nods. \n\t\t*set rel_arch +3\n\t\t\n\t\t\"Alright, then you can settle in and we can speak later,\" you say and walk away.\n\t\t*goto 12\n\t\n\t#Forgive her (without hugging her)\n\t\t\"We all make mistakes. There is a saying that it is human to err, but divine to forgive. Luckily for me, I am not hurt enough to not be able to free my mind from the \n\t\texperience of pain in regard to what in you participated in, the assault of the warrior standing before you,\" you say.\n\t\t\n\t\tAya opens her mouth, wanting to say something but can't find the words. \n\t\t\n\t\t\"You don't need to say anything.\" You smile. \"Did they tell you where to go to assign a room?\"\n\t\t\n\t\tShe nods. \n\t\t*set rel_arch +2\n\t\t\"Alright, then you can settle in and we can speak later,\" you say and walk away.\n\t\t*goto 12\n\t\t\n\t#Say that as a knight her actions against one of their own is forgiven but you personally don't \n\t\tYou are surprised at your own tone as you personally condemn her for the assault of the warrior standing before her. In the end, you have the \n\t\tfeeling she is about to start crying.\n\t\t\n\t\tNot wanting to experience that, you turn your back at her and walk away.\n\t\t*set rel_arch -3\n\t\t*goto 12\n\t\t\n*label temple\nThe Temple of Mystics may appear a bit sinister to a passer-by unacquainted with the characteristicts of this group of knights withing the Fellowship.\n\nIn the middle, there is a big cauldron full of a boiling mixture that resembles lava. A hooded man diligently stirs the mixture with an oar. Occasionally, the popping bubbles\nbring bones to the surface, but you know that whatever the animal was, it died of natural causes.\n\n\"Ignasius, don't tell me you forgot the tomb cucumber this time,\" you hear a voice from behind.\n\n\"No way,\" the one stirring the mixture chuckles.\n\nYou turn back and see the High Priest of the Temple.\n\n\"I am glad to see you, ${name}. You don't come here very often so I learn more about your deeds from others than from you. What can I do to help you?\"\n\nDeacon Walter is dressed in a red cloak covered in runes. His beard makes him look a bit older than he really is because of the occasional silver in it.\nThe sword version preferred by the mystics rests on his waist. It looks more like a dagger to you and they mostly use those blades for ritual purposes.\n*choice\n\t*selectable_if (pendant) #Show him the pendant you obtained from the dead ruffian\n\t\t\"Interesting,\" he exclaims as he takes it and carries it away to the altar. You follow his steps.\n\t\t\n\t\tAfter he puts it on the glowing slate, he starts chanting and you patiently wait for him to finish.\n\t\t\n\t\t\"It is some kind of a key, there are magical elements sticking out of it that would make no sense otherwise.\"\n\t\t\n\t\t\"Any clues regarding what keyhole to search for?\" you ask.\n\t\t\n\t\t\"It is hard to say but I think it opens a secret passage hidden behind a brick wall.\"\n\t\t\n\t\t\"Thank you very much,\" you say as you take the pendant back.\n\t\t*choice\n\t\t\t*selectable_if (map) #Give him the map too\n\t\t\t\t*goto map\n\t\t\t\t\n\t\t\t#Do not give him the map\n\t\t\t\t*goto nothing \n\t*selectable_if (map) #Show him the map you found on the other ruffian\n\t\t*goto map\n\t\n\t#There is nothing (else) to show him\n\t\t*goto nothing \n\n*label commander\t\nYou come across Commander Braiden just outside his quarters.\n\n\"${name}, I have been worried about you,\" he says. \"I heard you had an accident.\"\n\n\"Yes, I did, and I feel better,\" you say.\n\n\"What happened?\" he asks with a worried expression on his face.\n\n\"I was attacked by a group of ruffians. I still don't know why.\"\n\n\"It is not often that a knight of the Fellowship is attacked. I thought that we have made the message to the criminal masses that we are a force to be reckoned with.\"\n\nYou can see that he is taking the matter personally and you understand why. The knights share a great degree of oneness and an attack against one can be regarded as an attack against everyone.\n\nYou wish you could recall anything that could be a valid reason for you to be attacked.\n\nWould you like to say anything to the Commander?\n*choice\n\t\t#\"I just hope that what happened would not be an excuse for bloodshed to escalate.\"\n\t\t\t\"I know that several other commanders have been tempted to choose the way of vengeance and I know how dangerous it can be, so I will be extra careful.\"\n\t\t\t\n\t\t\tYou nod, having a fear cast aside.\n\t\t\t*goto commander2\n\t\t\t\n\t\t*selectable_if (halls) #\"One of the attackers just joined our ranks.\"\n\t\t\t\"Oh, really? That is quite unexpected, isn't it?\" he exclaims.\n\t\t\t\n\t\t\t\"It is indeed.\"\n\t\t\t\n\t\t\t\"Maybe she will give us valuable information?\" he suggests.\n\n\t\t\tYou shrug. \"Probably not. She is running from the same people and she hardly knows them. Or so she says.\"\n\t\t\t*goto commander2\n\t\t\t\n\t\t#\"I am okay, there is nothing to worry about.\"\n\t\t\tCommander Braiden laughs. \"I can understand why you would want to belittle what you went through and yet there is no need for that. What if they try again?\" he inquires.\n\t\t\t\n\t\t\t\"They paid a very serious price. I left three of their people lying cold on the ground.\"\n\t\t\t\n\t\t\t\"And you could easily have joined them, right?\" the Commander argues.\n\t\t\t\n\t\t\t[i]The warrior who participated in the battle kind of did[/i], you think.\n\t\t\t*goto commander2\n\t\t\t\n*label commander2\n*page_break\n\"I presume you would like to take a few days of rest,\" Commander Braiden changes the subject.\n\n\"Not at all.\" You shake your head. \"I want to be back to serving.\"\n\nThe Commander seems surprised by your determination. \"Are sure? Well, so be it. The militia asked us to increase our support of their work again. Apparently, many of their members are sick and the remaining are not enough to keep \ncriminal activities under control.\"\n\nOne of the duties of the Fellowship is helping the town guards, and it would be a pity if you didn't. Some of them are good fighters, but the majority have no clue how to dance with a weapon.\n\n\"Is it too late to sing in for tonight?\" you ask.\n\n\"Not at all. Please, be at the town guard barracks before dusk.\"\n\nYou wish the Commander a good day and see what else you can do before the day is over.\n*goto 12\n\n*label nothing \n*page_break\n\"Anyway, it is good to have you here. I am sorry I can't spend more time with you but I need to work on the armor polishing potion. Apparently, the one \nwe have recipes for is too corrosive.\"\n\t\t\nYou bid him goodbye.\n*goto 12\n\n*label map \nDeacon Walter repeats the same process but this time his frowning face reveals that he found nothing of value.\n\n\"This is a normal map, there is nothing enchanted in it. All I can say is that it seems only part of what is drawn exists in our dimension.\"\n\nYou take the map back, thank him and bid him goodbye. \n*goto 12 \n\n*label 13\nThe sun is not far from setting, so you prepare to leave the training grounds of the Fellowship. You put on the chainmail pants to protect your thighs. Wondering whether to \nput the helmet on, you decide to leave it for later. Until you reach the barracks, you are going to carry it in your hands.\n*page_break\nShortly after the training grounds are behind you, an emaciated woman intercepts you. She is wearing a lacy black dress that makes her unnaturally pale skin even lighter. Her hair looks as if it has not seen a comb for quite a while.\n\n\"So you are the one chosen by my lord. What is the sacrifice you would require of me?\"\n\nYour jaw drops in awe. Inside, you laugh because it is probably the last thing you would expect to hear, especially from a total stranger. However, you decide \nto try to suppress the reaction for the time being.\n\nHow would you reply?\n*goto 13.1\n\n*label 13.1\n*page_break\n*choice\n\t*selectable_if (sword_power=\"Exorcist\") #Contact your Exorcist sword\n\t\tYou put your hand on the hilt and immediately sense its tension. The Exorcist is ready to fight, sensing something demonic in her presence.\n\t\t\n\t\tActually, its reaction sparks more curiosity than fear.\n\t\t*goto 13.1\n\t\t\n\t*selectable_if (sword_power=\"Clairvoyant\") #Contact your Clairvoyant sword\n\t\tYou put your hand on the hilt and immediately sense its curiosity. Whatever this woman has to tell you, it seems to be more that the rattling of the mad.\n\t\t*goto 13.1\n\t\t\n\t#Admit that she must be mistaken\n\t\t\"I am sorry, there must be some mistake. I am no chosen one, just a knight of the Fellowship\"\n\t\t\n\t\tShe shakes her head. \"My intuition never lies to me. I can never be mistaken about the soul print my lord showed to me. Yes, you are the one, but maybe you are not ready.\"\n\t\t\n\t\tSo she is speaking to you as the soul you are and not the body of the knight you currently operate with. That is interesting. \n\t\t\n\t\tWould you like to ask her who her lord is?\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\t*goto lord\n\t\t\t\t\n\t\t\t#No\n\t\t\t\t*goto 14\n\t\n\t#Joke that you are indeed the chosen, but you want no sacrifices\n\t\t*set wit +1\n\t\t(Wit+)\n\t\t\n\t\tShe stares at you with an empty look, unable to appreciate your joke.\n\t\t\n\t\t\"But my lord needs to make it up to you and this is the way I can serve him.\"\n\t\t\n\t\t\"Did he really use the word sacrifice?\" you enquire.\n\t\t\n\t\tShe shakes her head. \"No, but this is what he usually asks.\"\n\t\t\n\t\tWould you like to ask her who her lord is?\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\t*goto lord\n\t\t\t\t\n\t\t\t#No\n\t\t\t\t*goto 14\n\t\t\t\t\n\t#Tell her that she is probably looking for somebody from the Temple\n\t\t*set xp +1\n\t\t(Experience+)\n\t\t\n\t\tThat seems to be a sound assumption.\n\t\t\n\t\t\"I know most of the knights sering there and I can assure you it is none of them. Besides, my intuition never lies to me. I can never be mistaken about the soul print my lord showed to me. Yes, you are the one, but maybe you are not ready.\"\n\t\t\n\t\tSo she is speaking to you as the soul you are and not the body of the knight you currently operate with. That is interesting. \n\t\t\n\t\tWould you like to ask her who her lord is?\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\t*goto lord\n\t\t\t\t\n\t\t\t#No\n\t\t\t\t*goto 14\n\t#Ask her about her lord\n\t\t*goto lord\n\t\t\n\t#Nothing, just continue on your way\n\t\tShe says nothing as you walk past her.\n\t\t*goto 15\n\t\t\n*label lord\n\"He likes operating from the shadows, rarely showing his face. But I have seen it and it was beautiful beyond the telling,\" she smiles in bliss, her face obtaining a more human hue.\n\n\"Where does he know me from?\" you ask.\n\n\"I am afraid I was found unworthy of that information. I am not often given explanations for the things I must do for my lord, but he provides me with everything I need.\"\n\nLooking at the skinny figure of hers, you can deduce that he is not a very caring master, contrary to what she is saying. Unfortunately, what she tells you does not help you find out who this lord is.\nDemonic entities do not usually count among the ones wishing to help you.\n*goto 14\n\n*label 14\n*page_break\n\"The time for the sacrifice has not come yet, I will leave you alone,\" she says and walks away.\n\nYou notice that where she was standing there is a small puddle of blood and small drops make a trail as she increases the distance.\n\nWould you like to go after her?\n*choice\n\t#Yes\n\t\t*goto follow\n\t\t\n\t#No\n\t\t*goto 15\n\t\t\n*label follow\nYou start walking quickly after her but she remains far away. You even shout after her, asking her to stop, but she wouldn't listen. \n\nYou run but still she vanishes in a dark corner.\n\nYou follow her but reach a dead end and she is nowhere to be found.\n\n*if pendant\n\tSuddenly, the pendant attached to your belt starts glowing and projecting energy towards the end of the street, forming what seems to be a portal.\n\n\tWould you like to use the portal?\n\t*choice\n\t\t#Yes\n\t\t\t*goto portal\n\t\t\t\n\t\t#No\n\t\t\tNot wanting to risk, you decide to continue your journey to the barracks.\n\t\t\t*goto 15\n\t\t\t\n*else\n\tAfter spending some time examining the dead-end of the street, you come to the conclusion that you can not possibly figure out where the woman went. So, \n\tyou decide to continue your journey to the barracks.\n\t*goto 15\n\t\n*label portal\nThe portal leads you to a chamber with weird red lights make you feel slightly dizzy. Or maybe it is the corrupted energy of the place.\n\nThere are four pillars that shiver from time to time, or sway gently as if being alive. Their surface is not smooth, but the patterns observed can hardly pass as decoration, unless\ncreated by a sick mind.\n\nAn ice-blue demonic creature comes from behind one of the more distant pillars. It seems to be 8 or 9 feet tall\tand is covered in spikes. And, it seems to be male.\n\n\"An intruder! How dare you defile the sanctity of this place?\"\n\nHow would you reply?\n*choice\n\t#\"Actually, I was just leaving. Would you please show me the egress?\"\n\t\t*set wit +1\n\t\t\n\t\t(Wit+)\n\t\t\n\t\t\"No, the sentence for trespassing is death,\" the demon roars and trows a bolt of blue energy at you, which you dodge while taking cover.\n\t\t\n\t\t\"Anybody I can appeal to? I don't like the portal service here.\" You pop your head just to see that he is making small steps in your direction.\n\t\t*goto portal2\n\t\n\t#\"I think it is defiled already.\"\n\t\t\"Sacrilege!\" the demon roars and trows a bolt of blue energy at you, which you dodge.\n\t\t*goto portal2\n\t\n\t#\"Mind your language, demon.\"\n\t\tYou allow your disrespect of the demonic to take over, and you spit the words out with contempt.\n\t\t*set imp +1\n\t\t\n\t\t(Imbalance+)\n\t\n\t\tthe demon roars and trows a bolt of blue energy at you, which you dodge.\n\t\t*goto portal2\n\t\t\n*label portal2\n*page_break\nIt seems that you can't avoid the fight, although you have no fear. You take out your sword, mentally preparing to slay the demon.\n\nWhat would you do?\n*choice\n\t#Charge (Jump at him, hoping to slice him into two with the first blow)\n\t\tYour battlecry echoes in the hall as you leap at the demon. However, things don't turn out as expected. He steps ahead and crouches, blocks your sword with his forearm\n\t\t(much to your horror), and you end up impaled on his spikes (which leave dents in your armor and wounds beneath).\n\t\t\n\t\tWith a swiping motion, he sends you away from him, giving you a few precious seconds to think.\n\t\t*set nrg -1\n\t\t*set hp -1\n\t\t\n\t\t(Energy-;Health-)\n\t\t*goto portal3\n\t\t\n\t#Approach him cautiously \n\t\tYou don't want to take unnecessary risk, knowing nothing about the abilities of the demon. When you get close to each other, you try a few very powerful blows but they end up being blocked by his forearms, \n\t\tmuch to your horror. After the second series makes him retreat a step, you advance in the other direction, giving yourself a few seconds to think.\n\t\t\n\t\t*goto portal3\n\t\t\n\t#Hide behind the pillars, trying to surprise him by reappearing behind his back\n\t\tWhile you are behind the pillar, you try to imagine where he is, but his steps are too quiet. Losing your nerve, you pop from behind the corner... and receive a mighty blow from the demon that sends you flying backwards.\n\t\t*set hp -1\n\t\t\n\t\t(Health-)\n\t\t*goto portal3\n\t\t\n*label portal3\nWhat do you do now?\n*choice\n\t#Attack again\n\t\tYou show all the feints and finishing blows that you have trained but to no avail. You have the feeling that he knows what you would do in advance, always \n\t\tmanaging to block. A second of hesitation allows him to hit you again, sending you flying in the air.\n\t\t*set hp -1\n\t\t\n\t\t(Health-)\n\t\tIt takes you a couple of seconds to get over the shock, after which you hide behind the pillar, desperate for some time to hopefully think of how you can defeat him.\n\t\t*goto portal4\n\t\t\n\t#Back away while keeping him at sight\n\t\tYou don't want the demon to escape your vision, but you don't want to be next to him either. \n\t\t\n\t\tUnfortunately, the demon has a very effective range attack. He fills the air with energy beams. You succeed at diverting most of them, but a couple hit your breastplate, \n\t\tsending shock waves all over your body.\n\t\t*set hp -1\n\t\t\n\t\t(Health-)\n\t\t\n\t\tAcknowledging that this strategy is not working well, you hide behind one of the pillars.\n\t\t*goto portal4 \n\t#Hide behind a pillar\n\t\t*goto portal4\n\t\t\n*label portal4\n*page_break\nYou try to catch your breath, letting the tip of the sword touch the floor.\n\n\"You may as well throw it away. It is useless just like you,\" roars the demon.\n\nAnd then it dawns on you. The pillars! They are his senses!\n\nWasting no time you slice the one next to you in half. It sprays a sticky green substance and wails in what seems to be agony, even though it is deafened by the cry of the demon himself. He seems rather furious too, raising his \nhand.\n\nThe good news is that you found the weak point of the infernal enemy. The bad is that you just destroyed your cover.\n\nThe undamaged pillar closest to you seems to be the next destination. Would you run to it or leap?\n*choice \n\t#Run\n\t\tYou don't want to waste your energy as you don't know how long the battle will take to finish.\n\t\t\n\t\tHowever, this way you are not quick enough to hide behind the pillar before a bolt of energy strikes you.\n\t\t*set hp -1\n\t\t\n\t\t(Health-)\n\t\t*goto portal5\n\t\n\t#Leap (requires 1 point of energy)\n\t\t*set nrg -1\n\t\t*set xp +1\n\t\t\n\t\t(Energy-;Expereince+)\n\t\t\n\t\tThe leap allows you to take cover behind the pillar just in time before the bolts reach you. Instead, they make a mess on the wall behind you.\n\t\t*goto portal5\n\t\t\n*label portal5\n*page_break\nYou slay the second pillar and this time the cry of the demon is somehow weaker and he falls to the ground. Seeing your chance to get to the next pillar, you quickly seize it and \nyour blade sinks into it.\n\nThe demon just flinches and crawls to the last remaining column. You realize that this time it may be a bit more difficult for you because he knows where you are going and is positioned just \nin front of it.\n\nYou raise your sword and make tentative steps ahead, hoping that the demon is too wounded to be dangerous any more. So you are surprised when he presses his claws together, gathering all his \nremaining energy in a huge ball that flies in your direction.\n\nWhat would you do?\n*choice\n\t#Dodge\n\t\tYou plunge to the side, but the ball is too big and fast. It touches your feet. The powerful energetic charge shakes you for a few seconds.\n\t\t*set hp -2\n\t\t\n\t\t(Health--)\n\t\t*goto portal6\n\t\t\n\t#Try to reflect and divert it with your sword\n\t\tYou realize there just is not enough time for you to escape from the energy ball, so you rotate the blade so that it can shield you partially. The next few questions \n\t\tseem rather long as you are engulfed in an energetic storm. The sword somehow manages to divide it into two parts that mostly pass around you. You even manage to reflect some of the \n\t\tleftovers back at the demon. And...some of the energy reaches you.\n\t\t*set hp -1\n\t\t*set xp +1\n\t\t(Health-;Experience+)\n\t\t*goto portal6 \n\t\t\n*label portal6\n*page_break\nThe demon lies on the ground, barely able to move. Through his translucent skin you can see his beating heart. It is twisted and dark red, almost black but it is still a reminder that he is \na sentient being.\n\nWhen he sees you approaching, his eyes reveal fear just before he turns around and starts crawling, trying to hide behind the last pillar.\n\nWould you like to kill him?\n*choice\n\t#Yes, the world will be a better place without him \n\t\t*set imp +1\n\t\t*set xp +1\n\t\t(Imbalance+;Experience+)\n\t\t\n\t\tWithout hesitation, you execute the demon. There is a part of you that hurts while hearing his last wails, but you try to convince yourself that you are saving many others from a \n\t\tgrave danger. And yet, that pain remains inside you, immune to the logic of the mind.\n\t\t\n\t\tThen, suddenly the woman you were after materializes next to you. She puts her hand on her mouth. \"Oh, my dear. You killed one of the minions of my lord. Why did you do that?\"\n\t\t\n\t\t\"He attacked me,\" you explain calmly.\n\t\t\n\t\t\"And you managed to defeat him single-handedly?\" Her eyebrows raise in disbelief.\n\t\t\n\t\t\"Obviously.\" You look into her gray eyes and see respect in them.\n\t\t\n\t\t\"I know I should expect no less from the one my lord owes a favor, and yet I am impressed you managed to defeat the guardian.\"\n\t\t*set rel_misery +2\n\t\t*goto portal7\n\t\t\n\t#No, a defenseless enemy is not an enemy \n\t\t*set imp -1\n\t\t\n\t\t(Imbalance-)\n\t\t\n\t\tYour mind realized that allowing this foul creature to exist may endanger the lives and well-being of many, but your heart does not want to carry the burden of slaying a helpless foe. And you \n\t\tcan't help but feel good about listening to it.\n\t\t\n\t\tThe demon passes by an oil lamp and moves it away with his hand, without noticing it, his mind concentrated on getting away from you as quickly as possible.\n\n\t\tMuch to your dismay, the lamp starts sucking him in. He is too weak to resist and his cursing helps little to avoid the metal prison.\n\t\t\n\t\tYou consider the idea of taking the lamp with you, supposing that your brethren from the temple may be interested in him. Maybe they will manage to return him to the light?\n\t\t\n\t\tWould you do so?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set lamp true \n\t\t\t\t\n\t\t\t\tYou take the lamp, cautious about feeling negative energy but it radiates none. Your hands only feel the cold touch of metal but you are very much used to it.\n\n\t\t\t\tYou try to attach it to your belt and fail, so you will have to carry it in your hand.\n\t\t\t\t*goto portal65\n\t\t\t\t\n\t\t\t#No\t\n\t\t\t\t*goto portal65\n\t\t\t\t\n*label portal65 \nThen, suddenly the woman you were after materializes next to you. \"Where is the guardian?\" she asks looking around. \n\nYou point at the oil lamp.\n\n\"Did he willingly get there? He doesn't usually do so and never in the presence of a trespasser.\"\n\n\"I think I damaged him pretty badly.\" You look around at the pillars to explain your point better but they have regenerated. But, you have a reason to thank luck that the demon \ngot into the lamp, otherwise maybe he would have healed and be very dangerous.\n\n\"You are not saying that just to impress me, right?\"\n\nHow would you reply?\n*choice\n\t#\"You don't look like somebody easy to impress.\"\n\t\t*set rel_misery +2\n\t\t\n\t\t\"I will take that as a compliment, mind you?\" she smiles.\n\t\t\n\t\t\"Sure,\" you say with an air of uncertainty.\n\t\t*goto portal7 \n\t\t\n\t#\"No, I am just explaining things as they are.\"\n\t\t\"My intuition tells me you are right. And, yes, you managed to do that even if you didn't try.\" She gives you a big smile.\n\t\t*set rel_misery +1\n\t\t*goto portal7\n\n*label portal7\n\n\"And what are you doing here?\" she inquires.\n\t\t\n\"I was just trying to find you. You seemed to be bleeding and I was worried about you.\"\n\n\"Oh, nothing like that, it seems that the vial of one of my potions goto broken. Part of me wishes it was blood because it is easier to clean that. Now my other cloak is \nruined.\"\n\nTaking a look at her, you realize that she is wearing a different one, although of the same color and similar design.\n\n\"Do you brew potions yourself?\" you ask.\n\nShe nods. \"I tend to use recipes of benevolent witches and use my link to the dark art in order to create interesting results. I can show you some time but I think you should leave soon. Unlike me, you \nare on an enemy territory.\"\n\n\"Hey, I didn't even get the chance to hear your name.\"\n\n\"My name lost its meaning when I pledged allegiance to my lord in exchange of the powers I now wield. But those around me like calling me Misery and I wouldn't mind if you did the same.\"\n\n\"My name is...\"\n\n\"I don't care,\" she interrupts you. \"All I need to know is that you are the one chosen for a favor by my lord.\"\n\n\"It is ${name}, just in case you need it,\" you mumble under your breath.\n*goto portal8\n\n*label portal8\n\nWould you like to ask her anything before you go?\n*choice\n\t*disable_reuse #\"What kind of potions do you prepare?\"\n\t\tHer lips twist in a wicked smile. \"Almost anything you can think of and beyond. Potions that can make your fears grow so big as to threaten your sanity. Substances to make \n\t\tEven the tiniest scratch feel like cutting off a limb. Drinks to make genuine affection turn into fuel for a desire to serve and obey.\"\n\t\t\n\t\t\"What do you reply?\"\n\t\t*choice\n\t\t\t#\"You must hate yourself!\"\n\t\t\t\t\"I do,\" she sighs. \"But I have little choice. I asked for power and now I am paying the price together with many others who are just victims.\"\n\t\t\t\t\n\t\t\t\t\"There is always a choice, as long as you live and breathe,\" you argue.\n\t\t\t\t\n\t\t\t\t\"It is not as simple as you put it, but I like your choice of words. Yes, there are creatures that seem to be living but don't breathe. But we could \n\t\t\t\tbe arguing about soul contracts till tomorrow and time is ticking away.\"\n\t\t\t\t*goto portal8\n\t\n\t\t\t#\"Those can be really valuable if used correctly by the good guys.\"\n\t\t\t\t\"Really?\" she raises her eyebrows.\n\t\t\t\t\n\t\t\t\t\"Yes. A tiny amount of the fear and pain potions can be used to teach a warrior how to deal with those issues. The same can be true about the serving potion.\n\t\t\t\tI know that there are entities who can cast a similar spell on you and one should know the symptoms and be prepared.\"\n\t\t\t\t\n\t\t\t\t\"You really manage to see the good in things, don't you? Now, this is impressive.\"\n\t\t\t\t*set rel_misery +1\n\t\t\t\t*goto portal8\n\t\t\t\n\t\t\t#\"You just deserve more love.\"\n\t\t\t\tShe seems struck by your comment. \"Sometimes I have that fantasy of somebody loving me for what I am and not judging me for what I have done and still do. And then I cry a lot.\n\t\t\t\tI may be a powerful acolyte but I realize I am hardly worth loving. I see a bit of what I need in you, but it is too early to sat and the last thing I want is to have my hopes shattered.\"\n\t\t\t\t*set rel_misery +3\n\t\t\t\t*goto portal8\n\t\t\t\t\n\t*disable_reuse #\"Are you affiliated with the Lifegivers.\"\n\t\t\"If I didn't know you, I would take that as an insult. Those pesky jerks are nowhere near my mastery of brewing potions. They are serving a role much needed by the nobility by giving them something they want to keep \n\t\tthem content so that they don't revolt and kick them out. Very few of the lords deserve their place there. But the Lifesavers are not better than us.\"\n\t\t\n\t\t\"Can you also make healing potions?\"\n\t\t\n\t\t\"Yes, but I am not very good at that. You see, I have a recipe that is probably almost as good as theirs, but I am not very good at attaching things to the Light. Such a potion would also heal, but not as much.\n\t\tBy the way, why do you ask me about them?\"\n\t\t*choice\n\t\t\t#\"I was recently ambushed and I was told they were behind it.\"\n\t\t\t\t\"Then I can say that we have a common enemy. That makes me feel closer to you.\"\n\t\t\t\t\n\t\t\t\tYou can't help but blush a bit.\n\t\t\t\t*set rel_misery +1\n\t\t\t\t*goto portal8\n\t\t\t\t\n\t\t\t#\"I just ask out of curiosity.\"\n\t\t\t\tShe looks at you with a set of eyes that say that they know you are hiding something. Misery, however, says nothing, probably leaving her questions for when there is more time.\n\t\t\t\t*goto portal8\n\t\t\t\t\n\t*disable_reuse #\"Can I see your lord?\"\n\t\t\"I don't think it is a good idea right now, not after what happened to the guardian. He tends not to take things like that easily, but later on calms down. I promise that \n\t\tnext time I speak to him, I will try to find out more about why he thinks he owes you a favor. I didn't require more information because I was quite uneasy making such a statement to somebody I didn't know.\n\t\tI thought it would sound a bit indecent. This is why I wanted to get it over and away with quickly, without thinking too much.\"\n\t\t\n\t\t\"But I am a knight of the Fellowship. We are all decent men and women.\"\n\t\n\t\t\"I don't know many of you.\" She shrugs.\n\t\t*goto portal8\n\t\n\t*disable_reuse #\"Will I see you again?\"\n\t\t\"The short answer to that is yes, you will see me again because I still haven't had the chance to carry our my lord's request. But is it something more you want to imply?\"\n\t\t\n\t\tWhat would you reply?\n\t\t*choice\n\t\t\t#\"I am looking forward to seeing you again.\"\n\t\t\t\t*set rel_misery +2\n\t\t\t\t\n\t\t\t\t\"That is sweet,\" she comments.\n\t\t\t\t*goto portal8\n\t\t\t\t\n\t\t\t#\"You are a very interesting person and I wish to know you better.\"\n\t\t\t\t*set rel_misery +1\n\t\t\t\t\n\t\t\t\t\"The feeling is mutual,\" she replies.\n\t\t\t\t*goto portal8 \n\t\t\t#\"I actually hoped that we would not.\"\n\t\t\t\t*set rel_misery -2\n\t\t\t\t\n\t\t\t\t\"I am used to crushing hopes. It really depends on my lord.\" She tries to hide her feelings, but yet you can tell she is hurt by your words.\n\t\t\t\t*goto portal8\n\t\t\t\t\n\t#That is all for now\n\t\t*goto portal9\n\t\t\t\n*label portal9\n*if lamp \n\t\"What are you going to do with that lamp?\" she inquires.\n\t\n\t\"I planned to give it to my brethren from the temple to see if he can be switched to the light.\"\n\t\n\t\"That is very brave of you, my dear. I presume you won't mind if I take it instead.\"\n\t\n\tWhat would you answer?\n\t*choice\n\t\t#\"Sure, here it is.\"\n\t\t\t*set rel_misery +3\n\t\t\t\n\t\t\t\"Thank you very much, I am starting to like you very much,\" she says as she takes the lamp. \"It can be dangerous and I enjoy that.\"\n\t\t\t*set lamp false\n\t\t\t*goto portal10\n\t\t\t\n\t\t#\"What are you going to do with it?\"\n\t\t\tShe laughs. \"I am sure if I tell you, you would never agree. So let's just presume I didn't ask you anything.\"\n\t\t\t*goto portal10\n\t\t\t\n\t\t#\"In fact, I do. I really want to give this demon a chance.\"\n\t\t\t\"How noble of you,\" she chuckles.\n\t\t\t*goto portal10\n\t\t\t\n*else\n\t*goto portal10\n\t\n*label portal10\n*page_break\nYou bid Misery farewell. She helps you find the secret door that hides a portal after you admit you are clueless to how to get back.\n\nOnce in the street, you head for the barracks.\n*goto 15\n\n*label 15\n*page_break\nWhen you get to the barrack, somebody is already waiting for you. When she sees you, she removes her helmet and extends her hand for a handshake.\n\n\"My name is Sergeant Amy.\" The red-haired beauty introduces herself with a smile.\n\n\"You can call me ${name}.\" Her grip is quite strong, probably a result of a lot of training with the longsword resting at her waist. She wears a long chainmail dress with a tabard which bears the \nemblem of the town militia.\n\n\n\"Hm, I think I know you from somewhere,\" she states.\n\nYou look at her eyes, trying to recall her, but failing.\n\nWhat do you reply?\n*choice\n\t#\"I thought it was a pick-up line only men used.\"\n\t\t*set wit +1\n\t\t*set rel_amy +2\n\t\t(Wit+)\n\t\t\n\t\tIt takes us a second to think over what you are saying and then bursts into laughter. \"I didn't want to sound like that. But you are funny. And, believe me, if I was picking you up, I wouldn't use such a cliche phrase. Now, seriously, I have seen you before. I hope to be able to remember where and under what circumstances.\"\n\t\t*goto 16\n\t\t\n\t#\"I would have remembered seeing you, trust me.\"\n\t\t*set rel_amy +1\n\t\t\n\t\tShe smiles and thanks you, for the compliment. \"No, seriously, I have seen you before. I hope to be able to remember where and under what circumstances.\"\n\t\t*goto 16\n\t\t\n\t#\"No, I am sorry, I think not.\"\n\t\t\"It is okay, maybe I should feel bad about not recalling more. I hope to be able to remember where and under what circumstances.\"\n\t\t*goto 16\n\t\t\n*label 16\n*page_break\nShe puts her helmet back on and you follow her example.\n\n\"Where are we going?\" you ask her.\n\n\"We have to patrol the eastern suburbs of the city.\"\n\nIt is an area with a lot of small shops and workshops of craftsmen. Such places where money changes hands may be attractive for bandits. The militia often times \nasks them to close early, but many remain open until quite late because this is the time when many customers show up, after finishing their daily work.\n\nThere is a short walk to that area.\n*choice\n\t#Use the opportunity to learn more about Amy \n\t\t*set rel_amy +2\n\t\t\n\t\t\"I spent several years at the Great Clearing as a member of the Church of Light there. I was a zealot, the term they use for their warriors, so I was never a typical priest \n\t\twith healing and exorcising powers. And, I am not sure how well I manage to deal with people, but I had an administrative position there.\"\n\t\t\n\t\t\"I have heard that it was a region with a lot of strife going on.\"\n\t\t\n\t\t\"It was. There was a big conflict between the woodcutting industry and the people living in the woods who were eager to protect them at all costs. But things got better when the \n\t\tnew Abbot came and befriended the Ambassador of the people from the forest. Their love brought a lot of peace and understanding.\"\n\t\t\n\t\t\"And what brought you here?\" you ask.\n\t\t\n\t\tAmy clears her throat and sighs. \"Together with the new Abbot came a man that I fell in love with. He was several years older than me but was the first real man I've met in my life.\n\t\tI am happy that the Light intertwined our paths, even if it was only for a few years. He died in combat, outnumbered, like a real hero. After that I just could not remain there.\n\t\tevery stone there reminded me of the time we were together. I knew I had to leave and start my life anew if I was not to enter the abyss myself.\"\n\t\t\n\t\t\"Oh, I am sorry for that experience.\"\n\t\t\n\t\t\"It is alright.\" She wipes out the few tears that came out. \"His death is what every warrior would dream of, is it not?\"\n\t\t\n\t\t\"It is as you say, Amy. I—being a knight myself—I could understand that.\"\n\t\t\n\t\t\"Before that, he used to tell me that I should go on even if he was no longer there for me. He probably sensed something. I have been trying to do that but it is not so easy.\n\t\tI am sorry for getting so emotional, ${name}. I don't often do. Maybe it is something in your aura. I guess you would be an excellent confessor if you were a priest.\"\n\t\t\n\t\t\"There is no problem. It is me who asked to hear your story and you just carried out my request, for which I am grateful. There was a time when I considered joining the Church of Light, but I am very happy where \n\t\tI stand now. Actually, I am kind of surprised that you have not decided to join the Fellowship. I believe that with your history, you would be a valuable asset to our organization.\"\n\t\t\n\t\t\"Thank you but I want to lead a simple life and to be part of a benevolent organization without such high expectations of its members. Besides, I have a few friends in the militia who helped me a lot in healing \n\t\tthe wounds of the heart. Besides, what would be the difference, I would still be doing the same tonight.\"\n\t\t\n\t\tYou are relieved to hear her laughter that seems to seal the negative reverberations from the past.\n\t\t*goto 17\n\t\n\t#Remain silent, just enjoying the peaceful walk \n\t\tYou enjoy the silence and Amy makes no effort to stand in your way.\n\t\t*set nrg +1\n\t\t\n\t\t(Energy+)\n\t\t*goto 17\n\t\t\n*label 17\n*page_break\nYou pass by a trader's street when you hear the noise of a door shattering into pieces. The street light lets you see the High Priest of the Temple of Reptiles \nlying a couple of feet away from the remains of the door, obviously thrown away from the inside. Amy and you run towards him, your armour dinging in the process.\n\nA monster comes out of the shop. He may have been human months ago, before dying. The rotting corpse moves very quickly, challenging the general opinion about the speed of those undead creatures.\n\nAmy looks up, probably hinted by her intuition. She keeps her eyes there while running forward, which makes you think she saw something important. You follow her example and see a couple of zombies on top. They hold barrels above their heads, obviously\nready to throw them at the priest and seal his fate.\n\nThere is little time to consider what to do. On one hand, the closest danger for the Priest is the zombie on the ground. In fact it is so close that you doubt you will be able to get to him before he reaches \nhis target, unless you use your energy for a leaping charge.\n\nOn the other hand, the barrels may pose an even greater danger than the zombie. The Priest may suffer some damage from the zombie if you decide to leap to the top of the building instead of\ndealing with the zombie on the ground, but it will probably be nothing compared to the barrels hitting his head.\n\nWhat would you do?\n*choice\n\t#Run towards the zombie on the ground\n\t\tJust as you expected, you do not reach him in time. The zombie delivered a bite at the arms of the priest, who keeps screaming, probably firmly believing that he will be soon dead.\n\t\t*set priest_wounds +1\n\t\t\n\t\tA couple of sword swipes later there is so little whole remaining from the zombie that it can no longer continue its unnatural living.\n\t\t*goto barrels\n\t\t\n\t#Charge the zombie on the ground \n\t\t*set nrg -1\n\t\tDeciding there is no time to waste you launch yourself forward. Just before hitting the zombie, you slice it into two, and then you cut him into even smaller bits to make sure his unnatural \n\t\texistence is finished. \n\t\t\n\t\tMeanwhile, the clanking behind you stops, letting you know that Amy has arrived too.\n\t\t*goto barrels\n\t\t\n\t#Leap to the roof of the shop to fight the zombies carrying the barrels \n\t\t*set hp -2\n\t\t*set priest_wounds +2\n\t\tThe precision of your leaping abilities are honorable and you manage to land in between the zombies. One of them drops the barrels and it falls to the ground, without harming anybody. The second zombie, however, successfully throws the barrel.\n\t\t\n\t\tUnfortunately, the first zombie does harm to you, by clawing you at the delicate space between the helmet and the breastplate. After setting her hands free, the second zombie launches at your back.\n\t\t\n\t\tIt is not a very pleasant situation to be so close and personal with the undead, but still you turn the fight in your favor. Suffice it to say that one zombie ended up slashed into pieces, while the other was thrown to the \n\t\tground below with such a force that her bones shatter, ending her unnatural existence among the mortals.\n\t\t\n\t\tYou take a look below to see that Amy has managed to slay the zombie. However, she is kneeling to the ground, recovering from being hit in the head by the barrel. You are \n\t\tthankful that she followed protection protocol and wore a helmet, unlike many of her militia brothers and sisters who you've seen patrolling without one.\n\n\t\tWhile she has suffered some damage, it seems the Priest's condition is slightly worse, because he both had his hand bitten and hit after the barrel ricochets from Amy.\n\n\t\tYou look around to find a means to go downstairs and find a ladder. Careful, you descend.\n\t\t*goto endbattle\n\t\t\n\t#Leap to the roof of the shop to fight the zombies carrying the barrels and make an instant whirl-winding swipe with your sword (2 points of energy) \n\t\t*set nrg -2\n\t\t*set xp+2\n\t\t(Energy--;Experience++)\n\t\t\n\t\tThe precision of your leaping abilities are honorable and you manage to land in between the zombies. Your sword already in your hand, you rotate as quick as a lightning, cutting the two zombies into several pieces and ending their unnatural \n\t\texistence among the living. The barrels fall on the ground below and are shattered to pieces by the fall, harming nobody.\n\t\t\n\t\tYou take a look below to see that Amy has managed to slay the zombie and is offering her hand to the Priest, helping him get on his feet. Unfortunately for him, it seems he has received a bite from the zombie.\n\t\t*set priest_wounds +1\n\t\t\n\t\tYou look around to find a means to go downstairs and find a ladder. Careful, you descend.\n\t\t*goto endbattle\n\t\t\n*label barrels \n*page_break\nYou turn slightly to the side and your periphery vision catches a glimpse of a barrel flying in your direction. Not having much time before the impact you...\n*choice\n\t*selectable_if (sword_type=\"Katana\") #...use the speed of your Katana to quickly slash the barrel\n\t\tThe sword swishes through the air and breaks the barrel into pieces.\n\t\t*goto endbattle0\n\t\n\t#...try to turn around and hit the barrel as quickly as possible without spending energy\n\t\tYou are not quick enough and the barrel hit you right in the head as you are turning back and knocks you down. You are lucky to wear a helmet. Cursing under your nose, you get up.\n\t\t*set hp -1\n\t\t\n\t\t(Health-)\n\t\t*goto endbattle0\n\t\t\n\t#... make a lightning-quick lash, making sure that you deal with the barrel before it reaches you\n\t\t*set nrg -1\n\t\t(Energy-)\n\t\t\n\t\tPowered by the flow of accumulated energy, the sword swishes through the air and breaks the barrel into pieces.\n\t\t*goto endbattle0\n\t\t\n*label endbattle0\n*page_break\nAmy has dealt with the barrel thrown by the other zombie, which means that the Priest is safe, for now.\n\nWhile you are wondering how to deal with the zombies on the roof, they suddenly stop moving and fall. One of them, a woman, even drops down to the ground with a thud of the break of countless bones.\n*goto endbattle\n\n*label endbattle\n*page_break\nAmy helps the Priest get up. He seems to be covered in sweat all over and pale as a ghost under the yellow mantle made of reptile skins. You are about to ask him a few questions when a figure of a man emerges \nfrom the shop.\n\n\"You should have kept out of this,\" the stranger says in a calm voice. He looks creepy, even paler that the Priest, with dramatic make-up on his face. \n\n\"I am Sergeant Amy Wallace from the town militia. If you are the one behind the attack, you will be charged with necromancy and a murder attempt.\"\n\nYou have to admit that you enjoy the fire in her voice. However, the stranger seems unaffected.\n\n\"Yes, I am a practitioner of the dark arts and I really tried to get rid of that clown of a snake. My name is Moonshadow and I am trying to serve in the best interests of this town. Just like you.\"\n*goto endbattle2\n\n*label endbattle2\nWould you like to ask the necromancer a question?\n*choice\n\t#\"What is the Priest guilty of?\"\n\t\t\"There are rarely any easy answers. It may sound a bit cheap, but the best way to learn is to have your mind unaffected by opinions and find out for yourselves. I see a couple of energetic \n\t\tyoung people. I doubt it would be hard for you to find out what goes on in the hidden area below the Temple of Reptilians.\"\n\t\t\n\t\t\"That is a sacred area! Only Priests can enter!\" shouts the figure behind your back.\n\t\t\n\t\tMoonshadow sighs. \"This is why I find this guy pathetic. I've been there and I can guarantee that I am not and I will never be associated with this temple.\"\n\t\t\n\t\t\"Wouldn't it be easier if you just exposed your point of view?\" Amy asks.\n\t\t\n\t\tThe necromancer shakes his head.\n\t\t\n\t\t\"But you are not helping us this way,\" she adds.\n\t\t\n\t\t\"I have helped you enough and I may do so in the future. But the thing is that I doubt you need it. You managed to do very well with the ambush on the Priest. If I knew you'd come, I'd send \n\t\thordes of zombies instead of those three.\" He chuckles. \"I am kidding, I don't want to hurt anybody from the militia or the Fellowship. I respect your organization, even though you tend to be sceptical of the means of our kind.\"\n\t\t\n\t\t\"Necromancy is forbidden by law. Do I need to say that again?\" Amy says.\n\t\t*goto endbattle2\n\t\n\t#\"Why didn't you come to us with the information about how dangerous he is?\"\n\t\t\"Look, I am proud with what your organizations are doing to protect the citizens of this town, but I doubt you have the resources to deal with something of that scale. As much as the militia wants to believe that they are \n\t\tthe ones to enforce the law, there are times when those blessed with more power should act for the good of all.\"\n\t\t\n\t\t\"We haven't seen much of your powers,\" the woman from the militia challenges him with sparkling eyes.\n\t\t\n\t\t\"Then you can thank me for that,\" the necromancer says with an arrogant smile.\n\t\t*goto endbattle2\n\t\n\t#\"Would you come with us to the militia barracks?\"\n\t\t\"I think I was crystal clear about that. I have important work to do and I won't be hampered by your bureaucracy.\"\n\t\t\n\t\t\"And how are you going to stop us?\" Amy instinctively puts her hand on the grip of her sword.\n\t\t\n\t\t\"Go ahead, dear? Can you take your sword out?\"\n\t\t\n\t\tThe expression on her face says it all.\n\t\t\n\t\t\"Now, I told you if I was coming and also explained why you can't make me. Now, you can move, girl. I don't want you to get numb.\"\n\t\t*goto endbattle2\n\t\n\t#\"If you are so powerful why did the attack fail?\"\n\t\t\"It is very simple. I know that zombies are not the most powerful foes I could summon. There are other ways to assassinate the Priest. However, I know that it is a great fear of his \n\t\tever since he was trying to mummify one of his superiors and she just came to life just to take a couple of his friends with her to the afterlife. Sometimes cruelty is a weakness, I should say.\"\n\t\t*goto endbattle2\n\t\t\n\t#\"Could you teach me some of the things you do?\"\n\t\tThe necromancer is surprised by your question. \"I may consider it, although I would want to know more about your reasons. I believe we shall meet again and then we can discuss it.\"\n\t\t*set necr true\n\t\t\n\t\tAmy gives you a look that can kill you and slice you into pieces.\n\t\t*set rel_amy -2\n\t\t*goto endbattle2\n\t\t\n\t#Finished with the questions\n\t\t\"That is all I would ask of you,\" you say and look at Amy for confirmation. You take her lack of reaction for an silent statement that she has nothing to add.\n\t\t\n\t\t\"Then I will leave you alone and wish you a pleasant night.\" Moonshadow chuckles and slowly walks away.\n\t\t\n\t\tThe High Priest appears to be in shock. Trying to get him to talk appears to be futile, so Amy and you just escort him to the Temple.\n\t\t*page_break\n\t\t\"What do you think about all of it?\" Amy asks you later that night, when you enjoy the walk around the streets of the town.\n\t\t\n\t\t\"You mean the necromancer, the zombies and the High Priest?\" you enquire.\n\t\t\n\t\tShe nods.\n\t\t\n\t\tWhat do you reply?\n\t\t*choice\n\t\t\t#\"We are just small pawns in a bigger game.\"\n\t\t\t\t\"Well, this is how I feel too, to be honest,\" she says. \"Except that I don't feel that small. You see, we did a very good job tonight and I am very happy I was not alone.\"\n\t\t\t\t\n\t\t\t\t\"It is a great honor to hear that from a warrior like you.\" You smile.\n\t\t\t\t\n\t\t\t\t\"You are quite kind. Hey, you know what, I think we should really investigate what is going on below the temple.\"\n\t\t\t\t\n\t\t\t\t\"It would be difficult,\" you remind her.\n\t\t\t\t\n\t\t\t\t\"Yeah, but I am positive that we can do it.\"\n\t\t\t\t*goto 18\n\t\t\t\t\n\t\t\t#\"We are on the brink of discovering something big.\"\n\t\t\t\t*set xp +1\n\t\t\t\t\n\t\t\t\t(Experience+)\n\t\t\t\t\n\t\t\t\t\"Tonight we did a great job but it was just the tip of the iceberg. I am sure the clues the necromancer gave us will lead us \n\t\t\t\tto something of immense importance. What would you say.\"\n\t\t\t\t\n\t\t\t\t\"I agree and think that we should investigate.\"\n\t\t\t\t\n\t\t\t\t\"It would be difficult,\" you remind her.\n\t\t\t\t\n\t\t\t\t\"Yeah, but I am positive that we can do it.\"\n\t\t\t\t*goto 18\n\t\t\t\t\n\t\t\t#\"You were amazing tonight!\"\n\t\t\t\t*set rel_amy +1\n\t\t\t\t\n\t\t\t\t\"Thank you very much.\" She gently touches your forearm. \"I did what I could but it was you who shone more brightly in the battle.\" \t\n\t\t\t\t\n\t\t\t\t\"It is a great honor to hear that from a warrior like you.\" You smile.\n\t\t\t\t\n\t\t\t\t\"You are quite kind. Hey, you know what, I think we should really investigate what is going on below the temple.\"\n\t\t\t\t\n\t\t\t\t\"It would be difficult,\" you remind her.\n\t\t\t\t\n\t\t\t\t\"Yeah, but I am positive that we can do it.\"\n\t\t\t\t*goto 18\n\n*label 18 \n*page_break\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*goto_scene part2\nRemember earlier how we told you that the first part of the game is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2017-08-25 $3.99 $2.99 purchased\n*abort", "startup": "*title Knight of the Fellowship\n*author Ivailo Daskalov\n\n*scene_list\n\tstartup\n\tslayer\n\t$ part2\n\t$ story\n\tdeath\n\n\t\n\n*create rel_arch 0\n*create rel_fr 0\n*create rel_yan 0\n*create rel_misery 0\n*create rel_amy 0\n*create lamp false\n\n\n\n*create name \"\"\n*create gender \"\"\n*create sword_type \"\"\n*create sword_power \"\"\n*create hp 12\n*create nrg 6\n*create imp 0\n*create wit 0\n*create sceptic 0\n*create xp 0\n\n*create pendant false\n*create map false \n*create attr_fem false\n*create attr_male false \n*create halls false \n*create mentor 0\n*create knowledge false \n*create priest_wounds 0\n*create necr false \n*create partner \"\"\n*create demon_prisoned false \n*create prophecy false \n*create rescue false \n*create betrayer false \n*create prayer false \n*create no_armor false \n*create amy_exhausted false \n*create amy_available false \n*create thomas_promise false\n*create edge_of_darkness false \n*create misery_released_from_debt false \n*create amy_friend false\n*create misery_friend false \n*create mithril false\n*create broken_dagger false \n*create bat_skin false \n*create amulet false \n*create amaranth false\n*create guardian false\n*create egg_shells false \n*create damage 0\n*create destruction false \n*create creation false \n*create arcane_dust false \n*create reagents 0\n*create angel false \n*create anaconda_fangs false \n\n\n*achievement demon_banisher visible 50 Demon banisher\n\tBanish a demon.\n\tYou banished a demon!\n\n\n*achievement demon_trainer visible 50 Demon trainer\n\tBecome a demon trainer.\n\tYou bacame a demon trainer!\n\n\n*achievement reader visible 50 Reader\n\tUnlock and read the bonus story.\n\tYou unlocked and read the bonus story! \n\n\n*achievement experienced visible 50 Experiences\n\tReach a happy ending with a high experience score.\n\tYou reached a happy ending with a high experience score!\n\n\n*achievement regular visible 50 Just the basic one\n\tChoose a regular sword.\n\tYou chose a regular sword!\n\n\n*achievement ap visible 50 Apocalypse today\n\tCause the apocalypse.\n\tYou caused the apocalypse!\n\n\n*achievement romance_walter visible 50 Love of the betrayer\n\tRomance Walter.\n\tYou romanced walter!\n\n\n*achievement alone visible 50 Stillness of heart\n\tDo not engage in a romance.\n\tYou did not engage in a romance!\n\n\n*achievement surguras visible 50 Like a boss\n\tDefeat the final boss.\n\tYou defeated the final boss!\n\n\n*achievement destruction visible 50 All things must come to an end\n\tDestroy the temple.\n\tYou destroyed the temple!\n\n\n*achievement creation visible 50 Another chance\n\tGive the bad guys a chance to change.\n\tYou gave the bad guys a chance to change!\n\n\n*achievement romance_fresca visible 50 Where does it hurt?\n\tRomance Fresca.\n\tYou romanced Fresca!\n\n*achievement romance_archer visible 50 An arrow in the heart\n\tRomance Aya.\n\tYou romanced Aya!\n\n*achievement romance_amy visible 50 Somebody wants to be the second best\n\tRomance Amy.\n\tYou romanced Amy!\n\n*achievement romance_misery visible 50 Tainted love\n\tRomance Misery.\n\tYou romanced Misery!\n\n*achievement romance_amaranth visible 50 We are the champions!\n\tRomance Amaranth.\n\tYou romanced Amaranth!\n\n*achievement romance_yan visible 50 Yin and yang\n\tRomance Master Yan.\n\tYou romanced master Yan!\n\n*achievement romance_aru visible 50 Meet your maker\n\tRomance Aru.\n\tYou romanced Aru!\n\n*achievement damage_dealer visible 50 DPS\n\tDo a ton of damage to the final boss.\n\tYou did a ton of damage to the final boss!\n\n*achievement love_bites visible 50 Love bites\n\tHelp Lauren in her quest.\n\tYou helped Lauren finish her quest.\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tMaster the art of dancing with a weapon and unearth the secret of the temple, bringing love and carnage to the world. “Survive” an assassination attempt. Learn about the warrior’s honor of the Knights of the Temple. Allow those who tread the line between Light and Darkness show you their beauty. Embark on a night patrol mission with a militia officer that will lead you to the depths where the seeds of doom are growing. Finish your quest with honor and explore what your heart desires before going back to where you belong.\n\n\t[i]Knight of the Fellowship[/i] is a 50,000 word interactive fantasy novel by Ivailo Daskalov, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\t• Play as a man or woman, gay or straight.[n/]\n\t• Master the techniques of lightning-quick blows and dodges, heroic leap charges and blade whirlwinds.[n/]\n\t• Learn about the honor of the Knight of the Fellowship.[n/]\n\t• Allow a dark lady to show you her beautiful side.[n/]\n\t• Choose between eight optional romances, or end up alone.\n\n\n\t*if choice_prerelease\n\t\t[i]You can play the first part of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first part of the game for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first part of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2017-08-17 $3.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n", "story": "\nPart 1: Fields\n\nI am standing next to the field of corn, not knowing what this place is, why I am here, or even who I am. Memories have been stripped off me, but still I feel safe. The wind is playing a peaceful song with the corn plants which are gently swaying in rhythm.\n\nA purple glow appears in front of me and a woman comes out, as if through a door, a portal. She is blond and beautiful, with piercing black eyes. I find the clothes she is wearing to be strange and yet somehow familiar. They assure easiness of physical movement and yet they are covered by armor plates.\n\nShe smiles at me and I feel a projection of love. As she comes closer, she greets me. I decide it is appropriate to hold her hands and give her a kiss.\n\n\"No, I am not your lover,\" she gently says with a smile.\n\nI step back, overwhelmed by confusion. Did I just insult this lady?\n\n\"No, there is no need to feel ashamed, dear one, please, be easy on yourself. My signature sometimes does that to those coming from the earth. It has to do with the scarcity of love and the particular stress on romantic relationships. I understand and not judge you. You still carry a lot of the energies and social conditions of Earth and I want to wish you a sweet path to remembering who you are and where you come from.\"\n\nI finally dare in look in her eyes again.\n\n\"And since you subconsciously asked for your loved one, your soul twin, here is a view of her.\" The woman looks to my right and I see something like the portal she came through. It is the image of a female with wavy brown hair. Every feature that I can behold is perfect beyond the telling.\n\n\"Can this be really my partner?\" I ask, afraid to believe.\n\n\"Yes, her name is Vrea. She has been very patient in allowing us to prepare the field for you and giving you some time to go through the initial recovery phase before her appearing on your horizon. It can be quite a strong feeling.\"\n\nI imagine her being close to me. It must be true.\n\n\"Alright, we established who you are not, maybe it is time to tell me who you are,\" I say with a joker smile.\n\n\"You know me as a trusted friend, a member of your star family, an elder sister, a soul guide, or as you like to call me, your soul mentor. I serve as a Commander of the inter-star organization that our people belong to.\"\n\n\"A Commander?\" I ask and my fears of not being able to act according to the etiquette that I don't remember returns.\n\nShe laughs. \"Yes, and if you ever write a story about your adventures here, not wanting to reveal my name to the readers, you can call me this way. And, again I should remind you not to worry about insulting me in any way. I know you much better than you know yourself right now. I know what to expect. As a telepathic being, I can read every thought of yours. But this is not a super power only I possess, all our people are like that, I am just a bit better trained with that. I have also had some experiences with you in other lives, in places so far away from here. I know you have a big heart.\"\n\n\"Well... thank you.\" I feel slightly embarrassed, so I decide to change the topic. \"What is this place?\"\n\n\"It is a mental projection of a place you associate with emotional comfort.\"\n\n\"A corn field?\" I chuckle. \"Most people would probably go for an exotic island or a luxurious house near the beach.\"\n\n\"I was also surprised by your choice of a safe haven, but don't you agree that it makes you feel somewhat whole despite being stuck in a place of non-remembrance?\"\n\n\"I do, dear one. Thank you for all you and your people did for me.\"\n\n\"The most proper way to thank us would be to recover completely from what you went through, but let it be a subject of another conversation. But, know that we are your people, we belong together, bound by the love of a world we come home that lives in our hearts and souls.\" She looks me in the eye, as if in fear that she has said too much.\n\n\"Didn't we lose our homeworld, or something like that?\" I ask her after a flash of memory.\n\nThe Commander sighs. \"That memory is so strong, it always manages to come out, although this time it seems it was my choice of words that provoked it. I ask you not to connect to it right now. You know that we were able to travel far away and were offered another world as our home and we were able to recreate what we had lost with the loving help of our hosts.\"\n\n\"Yes, I have that vague feeling too.\"\n\n\"I am required to be in another place, so I will leave you with my blessings,\" says the Commander. \"Please, take the time to meditate. If you feel hunger, you may try the corn, it is supposed to be very sweet, and there must be a well over there. I bid you peace.\"\n\nI wave her goodbye as she turns around and disappears through the portal.\n*page_break\nPart 2: Reunited\nI do as I was recommended. Retrieving some memories of how people meditate, I am sitting in the lotus posture and humming something, thinking how just listening to the song of the wind works better, when I hear steps behind me.\n\nI turn around to see that the Commander has just walked through the portal... and then Vrea comes out too. I could only watch speechless as this divine jewel creation walks closer to me. Words feel void to describe how I feel when she offers me her embrace. It is a mixture of being happy to be with her again, the agony of having been separated from her speckled with the pain of not being even consciously aware of her existence for so long, all spiced up with the frustration of not being able to fully apprehend the love we share even now.\n\nIn short, I just cry on and on as a puppy, realizing I am making her soft hair wet. She is holding me tightly, probably sensing how soft my knees are. And, not only the knees, I feel as if I am made of gum.\n\n\"I am sorry, Vrea, I should have acted sooner,\" the Commander says softly.\n\n\"There is no need to feel sorry. You have my sincerest thanks for what you did. You deserve praise,\" Vrea assures her.\n\nThe Commander seems satisfied with this answer. \"Until he is fully recovered, you will not be suggested any new work to take up. Your projects will be assigned to a crew member of your choice and with whom you agree.\" \n\nShe then disappears.\n\nVrea and I spend the night lying on the ground, counting stars. I listen to her stories about experiences we've had. I am thinking that I have no way of knowing about them, since they were from other incarnations, and yet they sounded so familiar. Hypnotized by her laughter, I felt asleep, my hand never leaving the embrace of hers.\n*page_break\nPart 3: Aboard\nAs soon as I started waking up, Vrea gives me a kiss on the cheek. \"Awaken, my love, and embrace the glory that is your birthright!\"\n\n\"Good morning to you too, my love,\" I reply. \"That line, isn't it from one of my most favourite games?\"\n\n\"Yes. It is so much fun to be able to access your memories, to learn what you loved in that incarnation you just came out of. Oh, do you mind? You don't usually do, but the protocol requires me to ask.\"\n\n\"Not at all, my divinity.\" I hug her reassuringly. \"What is on the agenda today?\"\n\n\"I think you are ready to leave the field. We are actually on a mothership in the solar system, and as the Commander may have explained, the reality we see projected around us is just a recreation lovingly made by spiritual technology. Now, we can step out of it and see the ship as I usually do. Are you up to this?\"\n\n\"Sure, my love, you know I like making things together with you.\"\n\nShe forms the portal. This time, it is wider so that we can use it simultaneously.\n\nWe pass through long and wide corridors covered by red carpets. People smile and greet us. I have the feeling that many of them know me personally, but I don't remember them. Others probably just sense that I am the one Vrea loves so much and they are happy to see us reunited. My partner herself is beaming and it gives me such a pleasure to watch the smile on her face that I almost bump into a wall.\n\n\"Here is my room, and now it is yours too.\" She invites me in.\n\nIt seems quite simplistic, and yet quite cozy.\n\n\"It seems the ship consciousness realized I needed a bigger bed and now I have it,\" she says. \"Well, maybe it is a bit too big. I would like to be closer to you. But that is still an option, I believe.\" She winks at me. Then, she takes a small device from the closet and gives it to me.\n\n\"This little trinket will be your guide to the main places of interest on the mother ship. I would love to be with you when you explore, and I will certainly be, but right now I have to make a few meetings with the guys who will take over the projects I am involved in, and I don't want you to feel bored. Know that on this ship you are perfectly safe and surrounded by friends.\"\n\n\"Oh, don't worry about me, my love. I wish you good luck with your endeavors,\" I say while getting accustomed to the device. It is amazing how familiar it is right away.\n*page_break\nPart 4: Commander\n\nI meet the Commander during my exploits of the ship. She gives me a warm smile, trying to hide exhaustion that is almost palpable.\n\n\"It is very nice to see that Vrea decided that you are ready to come back to the ship and to be left alone. My senses tell me the same. Would you like to have a little talk, I am currently off duty.\"\n\n\"Sure, thank you.\" I nod and she leads me to a room full of tables. There is also a fountain nearby and its ripple is ornamented by birdsongs. We sit.\n\n\"I notice that you do a lot of work yourself, apart from the things you do as a manager,\" I remark.\n\nIt seems she finds the term funny. \"It is because of the other things that I do that I was appointed as a Commander. There is a requirement that I do a certain percentage of those while I am serving at this position so that I maintain who I am,\" she explains.\n\n\"I understand that you saved me from a dire situation. I asked Vrea, but she gave me the notion that I needed to speak with you, maybe in her presence too.\"\n\n\"She is so caring about you. Well, if you ask me, you are ready to face the truth, and she is always with you in spirit, hopefully you are more aware of it now.\"\n\nI nod.\n\n\"Do you have any memories of what happened?\" she asks gently.\n\n\"I was stuck in a dark place full of negative entities who were telling me how unworthy I was, how badly I failed in my last incarnation and how I needed to go back and clean some mess I presumably created.\"\n\n\"This is a good description. Right after the end of an incarnation there is a certain weakness that some want to exploit, to make sure one is not reconnected to Source or their star family. This serves two purposes. If allowed out, the soul may decide never to come back to Earth and feed the negative ones with the vibration of any low emotions, which is their pursuit, what makes people like us important to them. Also, in the reincarnation trap, the soul aspect is not allowed to recover completely, and it seems often times traumas are instilled too. Do you remember me stepping in?\"\n\nI close my eyes, trying to concentrate. \"I remember you cutting the darkness with a burning sword, telling the negatives that they captured somebody they shouldn't have. They apologized and told you to take me as you leave, letting them have the other. You say there are no others, swiping again, breaking the whole structure.\"\n\nThe Commander laughs. \"That was a joke, meaning that they are all souls sharing a great degree of oneness, and the magic and beauty of being human. The truth is that I was not really allowed to intervene, but as I did, I wanted to make sure I do as much service to Source as I could with the energy I spent during the fight. Now, I have the responsibility to make sure these souls do not end up thinking they were saved by an angel, who is serving a god that deems them unworthy. Those religious constructs can serve such a role, which of course is ridiculous. The true entity that people would refer to as god is one of love only. And the fact that people can connect to source through religion serves as an example of how amazing humans are.\"\n\n\"How did I end up there in the first place?\" I ask.\n\n\"It was partly your mistake, and partly the clever design of the trap. For your part, I would dare say that it was somewhat irresponsible of you. The energy used for your freeing could have been used to help in a more efficient way, not to mention that it could work against the growth of the person being released. But I feel that the principle of non-intervention is somehow beyond the scope of what we are discussing.\"\n\n\"You seem to reproach me, but that doesn't make me feel hurt, or bad in any other way,\" I conclude.\n\n\"There is no need for those feeling. Any criticism on my side comes from a place of love. Now, back to the subject, you felt some curiosity towards the trap, subconsciously knowing that it is something others experience. Also, in that incarnation your vibration was lowered too much by the absence of love that you could feel in your daily life. It is true that we, Vrea and the others, are always by your side, but it was so hard for you to feel it. This illusion of separation, coupled with your desire to bring something positive to any place you are present in, was used by your captures to torture you and try to force you into the system again.\"\n\n\"Thank you very much for those explanations and all that you have done for me.\"\n\n\"Did you start remembering some of the things you personally did for me too? We are one family, we stand for each other and the link is very strong, I bet you could feel that.\"\n\n\"I do.\"\n\n\"It seems I am required elsewhere. I am glad we could talk and that you have made such a big progress in your recovery. I will meet you again soon, dear one.\"\n*page_break\nPart 5: Return\nI eventually pick up enough courage to talk with the Commander about what Vrea and I decided. She answers my request and we agree on a room with a screen projecting a beautiful image of the Earth.\n\n\"Vrea and I want to go in for another reincarnation there. Just one,\" I say, part of me fearing the response.\n\n\"I would like to hear more about it, but know that my recommendation would be against that,\" she says with the usual love vibrating in every word she says.\n\n\"We know that those will be special times, it is a great opportunity to gather experience that would be difficult to have elsewhere.\"\n\n\"It is true, and I think you will be able to bring a little push in the events that are planned. They would lead to the happy end of our mission here that has taken long eons of time. It is brav
