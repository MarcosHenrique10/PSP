t rel_misery +3\n\t\t*set misery_released_from_debt true \n\t\t*goto slaves_q2\n\t\t\n*label slaves_q2\n*page_break\n\"I will ask you one more time, are you sure you want me to release your assassin?\" Misery asks.\n\n\"Yes, you heard me well, set her free,\" you confirm.\n\n\"So be it. Goodbye, beautiful!\" Misery waves her bony hand and Aya disappears in a dense fog that quickly dissipates.\n\n\"Where did she go?\" you ask her, not fully trusting her.\n\n\"Wherever she came from when I summoned her, somewhere in the training quarters of your knights, I believe. I must admit that your affection for her intrigues me.\"\n\nYou sigh. \"I prefer to talk about your lord. I want to know why I keep bumping into you and why he thinks he owes me something.\"\n\n\"And why is that?\" Misery asks with a wicked smile on her face.\n\nWhat do you reply?\n*choice \n\t#\"Because I want to get it over and away with.\"\n\t\t*set rel_misery -2\n\t\t\"Such harsh words spoken by a knight. If I was a bit younger and less used to being treated badly, I'd take that as an insult,\" she chuckles.\n\t\t*goto slaves_q3\n\t\n\t#\"Because this is what intrigues me.\"\n\t\t*set rel_misery +2\n\t\t\"My lord is indeed intriguing and mysterious,\" she smiles in reverence.\n\t\t*goto slaves_q3\n\t\t\n\t#\"Because I am intrigued about the lord of a creature like you.\"\n\t\t*set rel_misery +3\n\t\t\"You know how to make a woman walking the dark path feel like a lady. I haven't felt that in a lot of time,\" she smiles and you can see a beautiful soul behind it.\n\t\t*goto slaves_q3\n\t\t\n*label slaves_q3\n*page_break\nLight footsteps echo in the amphitheater and a cloaked figure approaches you.\n\n\"My lord!\" Misery courtesies and the dark one responds by raising his hand.\n\n\"Blessings to you, sister of the twilight. I see that you have some nice company. I can tell that you have some questions for me.\"\n\nHe is right?\n*goto slaves_q3.1\n\n*label slaves_q3.1\n*page_break\nWhat would you ask him?\n*choice\n\t*hide_reuse #Who are you?\n\t\t\"It would be very hard for any human to properly pronounce my name. This is why I am often times referred to as the Nameless One. Believe it or not, I started my journey in the highest heavens and led \n\t\tby desire to learn about the darkness, I boldly stepped into it and turned into what I am now.\"\n\t\t*goto slaves_q3.1\n\n\t*hide_reuse #What are he and Misery doing here?\n\t\t\"There was a time when there was a lot of tension between the High Priest at the time and the mayor of the town. The Temple was quickly losing its popularity and it was in imminent danger of \n\t\tbeing attacked by the angry citizens who were fed up with the dark practices of the priests that achieved little to alleviate the hardships of the working people. I was order to help and I just couldn't refuse \n\t\tbecause I was bound by a karmic bond that I needed to release.\n\t\t\n\t\t\"The reason I was chosen is that I was able to carry some light inside me, so I could meet the citizens and calm them down, to soothe their fears and give them hope. As an additional reward, I was given \n\t\teternal access to the so called slaves quarters. That was the last day when there were any slaves here. Ever since then, this is a sanctuary for me and those who love me to delve into the depths of magic or recreation.\"\n\t\t*goto slaves_q3.1\n\t\t\n\t*hide_reuse #Is he going to help you in your mission?\n\t\t\"Intervention in the affairs of mortals is not something I can easily do, since I only have a watcher permission to be here. The only exclusion could be indirect help, through \n\t\tmy lovely follower that stands before you. I already asked her to do so, which means that I have done what I could.\"\n\t\t*goto slaves_q3.1\n\t#Why Misery says he owes you a favor.\n\t\tThe hooded figure takes a deep breath. \"It is a story that very few know about since the annals commemorating it were destroyed in an attempt to make the world forget about me. It took place in another small town, much like this one, but far, far away from here.\n\t\tIt was a stage on which all of us who have gathered here played a very important role, in different incarnations.\n\t\t\n\t\t\"The one who you know as Amy was a devoted priestess whose piety was an example for everybody associated with the light to follow, and people rightfully referred to her as Angelica. A curse fell on the town and mayhem reigned. Unknown diseases \n\t\ttormented the citizens and the prayers of the priests were met with silence. The heat was scorching the land, foreboding famine. Monsters straight out of hell were ravaging the streets, leaving only the bones of whomever they could find. It was then that \n\t\tAmy-Angelica started to lose hope and trust of the link she had with the light, and this echoes until the present day, is it not, beautiful warrior?\"\n\t\t\n\t\tAmy nods, her cheeks red, and her smile silently telling that what the lord was telling could very well be true.\n\t\t*page_break\n\t\t\"You, ${name}, were the feudal ruler of the city and carried the greatest burden of finding the solution to all that was turning out to be a daylight nightmare. And yet, you were \n\t\tas helpless as the Church of Light in providing any comfort. In your desperation, you were forced to turn to somebody who at least believed in a solution, one called Malady, a name \n\t\tshe had chosen for herself to best reflect the nature of her studies.\"\n\t\t*choice\n\t\t\t#You were happy to see her since you grew up together\n\t\t\t\t\"It was a pleasant encounter that somehow managed to take your thoughts away from the problems of the town even if for less than an hour, before you had to return to the grim topics.\"\n\t\t\t\t*set rel_misery +1\n\t\t\t\t*set misery_friend true\n\t\t\t\t*goto slaves_q4\n\t\t\t\t\n\t\t\t#You were quite reserved, being influenced by your very good friend Angelica \n\t\t\t\t\"Before the sad events, you trusted Angelica as much as she trusted the light, such was the chemistry between the two of you. When her methods started failing, you \n\t\t\t\twere never the one to point at finger at her. Instead, you provided her with all the support you could give her.\n\t\t\t\t\n\t\t\t\t\"This is why, when Malady, a character so dramatically different from all Angelica stood for, you really wanted to turn her away. But you know you shouldn't do it.\"\n\t\t\t\t*set rel_amy +1\n\t\t\t\t*set amy_friend true \n\t\t\t\t*goto slaves_q4\n\t\t\t\t\n*label slaves_q4\n*page_break\n\"Malady told you that her exploits led her to an ancient book that depicted a similar picture and told how the ancient ones manage to deal with it. The solution was to summon an entity willing and able to lift \nthe curse, a creature some would call a demon. She told you about me.\"\n*choice\n\t#\"You agreed because you had no choice.\"\n\t\t\"Malady just nodded in confirmation and left the castle, anxious to prepare for the summoning spell, while Angelica just cried a tear of helplessness. She didn't like your decision, but she knew you had no choice since it was her that failed to \n\t\tprotect the citizens.\"\n\t\t*goto slaves_q5\n\t\n\t#\"You agreed because you trusted Malady.\"\n\t\t*set rel_misery +2\n\t\t*set rel_amy -1\n\t\t\"What Malady spoke of seemed daring but the power in her voice assured you she knew what she was doing. She left the castle, anxious to prepare for the spell, while Angelica was trying to kill you with the expression on her face. She \n\t\tcouldn't believe you had fallen for the dark charms of Malady, but her own failure to protect the citizens did not allow her to openly criticise you.\"\n\t\t*goto slaves_q5\n\t\t\n\t#\"You forbade Malady from summoning the demon.\"\n\t\t\"Your harsh words pierced the heart of Malady, she saw the benevolent fire of her request being doused by your ignorance. She wanted to explain more, to talk you into changing your decision but you were adamant. She left the castle frustrated, while \n\t\tAngelica felt assured that at least you were not losing your mind.\"\n\t\t*set rel_misery -2\n\t\t*set rel_amy +1\n\t\t*goto slaves_q5\n\t\t\n\t#\"You tried to talk Malady out of summoning the demon.\"\n\t\t\"You tried to explain that you didn't trust Malady's plan, but your tone never got harsh and you showed no disrespect for Malady. Of course, she was not happy with the opposition she faced and left the castle visibly upset, but Angelica was content that at least you were not losing your mind.\"\n\t\t*set rel_misery -1\n\t\t*set rel_amy +1\n\t\t*goto slaves_q5\n\t\t\n*label slaves_q5\n*page_break\n\"The next night, an unlikely assassin appeared in your bedroom. The monsters were getting bolder and bolder and that one, a cross between a lizard and a bear, dared to attack you in your personal quarters. Your sword was near and you were as good at dancing with it as you are now. You \neven managed to shout for help, but before you managed to bring the beast down, you suffered a grave wound.\"\n*choice \n\t#\"You asked Angelica to heal you.\"\n\t\t*if amy_friend\n\t\t\t\"Your good friend did her best to heal the wound, but you were recovering very slowly.\"\n\t\t\t*goto slaves_q6 \n\t\t\t\n\t\t*else \n\t\t\t\"Malady understood that she was away for quite a long time and meanwhile Angelica had earned your trust, this is why she didn't object to the priestess of the light taking care of you, but when it was \n\t\t\tclear it was taking too much time, she offered you her services.\"\n\t\t\t*goto slaves_q6 \n\t\t\t\n\t#\"You trusted Malady with that.\"\n\t\t*if amy_friend\n\t\t\t\"Your wound healed quickly, but it was hard to say the same about the emotional one of your old friend Angelica, who felt rejected and broken.\"\n\t\t\t*set rel_amy -3\n\t\t\t*goto slaves_q6\n\t\t\t\n\t\t*else \n\t\t\t\"Your wound healed quickly under the loving care of your old friend Malady and you got even closer in the time you spent together.\"\n\t\t\t*set rel_misery +2\n\t\t\t*goto slaves_q6\n\n*label slaves_q6\n*page_break\n\"At the night of the next full moon Malady linked the core of her soul to me, granting me access to this realm. Tainted by the promises I made, she was chained to me for incarnations to come, including the one you know now. Unlike others who your race call demons, there was no desire in me to corrupt her, to make her something worse that the power I bestowed to her \nwould make her alone. And, I can swear to this day that her desire to serve in the best interest of the people of the town was as pure as the first snow that fell in the month of the solstice. It was the force with which awarded her for giving me access to this realm that put an end to the curse that threatened to destroy the town.\n\n\"Her ritual dagger slew dozens of monsters in the knights when the energies seething in her veins could not let her sleep and when the first rays of sunlight illuminated her blood stained robes, she would got to the infirmary to lay hands on the wicked. At noon, she will return to her room, which was my shrine and pray to me, a silent whisper \nfor more of my strength. Day after day, I was paving the way for my eventual coming to this realm and in the night of the following full moon, I set foot on the damp soil.\n\n\"It was not as I expected, as the dark enemies of this world hit me and wanted me to feast on the blood of the citizens.\n\n\"Angelica rushed into Maladies quarters, mouthing charges and threats to the woman in black.\"\n*choice\n\t#You asked Angelica to mind her language when speaking with the savior of the town\n\t\t*set rel_amy -2\n\t\t*set rel_misery +2\n\t\t\"Angelica looked at you with eyes quickly filling with tears. She screamed that she didn't know who you were any more, her high-pitched voice quickly reduced to a mere whisper. Meanwhile, Malady felt trusted as never before, a feeling she would later \n\t\tidentify as love.\n\t\t\n\t\t\"It is because of the support you gave to my link, my portal to this world that I owed you a favor.\"\n\t\t\n\t\t\"And what happened to the demon raging in town?\" you ask.\n\t\t\n\t\tThe lord chuckles. \"My blood lust was quickly sated and I must say that I repaid my victims a hundred times when I came to my senses, and I left before Angelica's \n\t\tforces reached me.\"\n\t\t*goto slaves_q7\n\t\t\n\t\t\n\t#You gently asked Malady to try to control me \n\t\t*set rel_amy -1 \n\t\t*set rel_misery +1\n\t\t\"Angelica didn't like the meek tone with which you were talking to Malady, but the lady in the black dress felt trusted like never before, a feeling she would later identify as love. And it is because of your kindness to my link, my portal to this world that I owed you a favor.\n\t\t\n\t\t\"Fueled by her benevolence and your kindness, she reached to me, asking me to stop the bloodshed, begging me to connect to who I was in my heart. And so it happened. I must say that I repaid my victims a hundred times when I came to my senses.\"\n\t\t*goto slaves_q7\n\t\t\n\t#You left the ladies alone and went outside, willing to battle me alone\n\t\t\"In that night, fueled by the fire of your duty to preserve your citizens, you ran in the cold darkness outside, without any thought of self-preservation, forgetting that it was me who saved the town from imminent doom. \n\t\tSuch was the fear of what I could do coupled with the distrust of the interdimensional entity that I am.\n\t\t\n\t\t\"You faced me in battle with a fury that I could only dream of and slew me as you could do with any walking in this realm. And I am thankful to you to this very day, because you stopped me from committing acts of atrocity that I would later regret.\n\t\tAngelica came to the combat scene wearing a smile as if she had seen the gardens of high heavens, while Malady was crying, failing to understand what went wrong.\"\n\t\t*set rel_amy +2\n\t\t*set rel_misery -1\n\t\t*set xp +1\n\t\t(Experience+)\n\t\t*goto slaves_q7\n\t\t\n*label slaves_q7\n*page_break\n\"And so, dear one, this is the story that I wanted to share with you. You and the ladies around you may be different people in this incarnation, but I am sure that the decisions you took back then still echo in the hearts of the ladies. Now, if you would, please excuse me, I have spent too much time in this realm and need to retreat.\"\n\nYou take a minute in silence to contemplate on what the demon explained.\n*goto slaves_q8\n\n*label slaves_q8\n*choice\n\t#You ask Misery about the kind of soul link she has to the demon\n\t\t\"I call him my lord,\" she corrects you. \"The word demon infers malevolence which I have seen him display very rarely and, as in the story, because of issues he just can't control. I can say that the link is very deep, as is any stemming from the level of the soul.\"\n\t\t\n\t\t\"Are there many links like you?\" you ask.\n\t\t\n\t\tShe shakes her head. \"Not to this world that I know of.\"\n\t\t\n\t\t\"Do you think that you could pull away from him if you wanted?\" Amy asks, putting on the vestige of the one called Angelica.\n\t\t\n\t\tMisery fidgets. \"I don't know, I don't think I ever tried... and I don't understand why I would want to...\"\n\t\t\n\t\t\"In other words, you can't,\" Amy states boldly.\n\t\t\n\t\tMisery shrugs. \"I suppose I can say so.\"\n\t\t*if (misery_released_from_debt)\n\t\t\t*goto slaves_q8\n\t\t\t\n\t\t*else \n\t\t\tA thought occurs to you... What if you decide for the favor the lord owes to you to be repaid by giving Misery her freedom back?\n\t\t\t\n\t\t\tWould you like to do that?\n\t\t\t*choice \n\t\t\t\t#Yes \n\t\t\t\t\t*set misery_released_from_debt true \n\t\t\t\t\tMisery raises her eyebrows in surprise. \"Is it really what you ask of my lord?\"\n\t\t\t\t\t\n\t\t\t\t\tYou nod and smile. \"Based on what I just heard, it was a sacrifice of yours in order to save the people of that town, was it not?\"\n\t\t\t\t\t\n\t\t\t\t\tShe shrugs. \"As much as I remember, I never thought about what it would cost me. I only wanted to help those people. And, I must say that I am quite lucky that my lord turned out to be much more \n\t\t\t\t\tbenevolent that most of the entities described in that book. I would dare say that I even enjoy it most of the time.\"\n\t\t\t\t\t\n\t\t\t\t\t\"So would you refuse?\"\n\t\t\t\t\t\n\t\t\t\t\tShe shakes her head. \"No, you already made your choice and it is sacred. I just can't promise you that I won't revere my lord as much as before. But it seems it was a choice I no longer had. I must say that I should thank you. It is rare \n\t\t\t\t\tto meet a soul that would not be driven by personal interest but by mercy.\"\n\t\t\t\t\t*set rel_misery +5\n\t\t\t\t\t\n\t\t\t\t\tYou bid her goodbye and leave the slaves quarters.\n\t\t\t\t\t*goto temple_crossroads\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t#No, it is better to be able to rely on her power later on  \n\t\t\t\t\tYou bid Misery goodbye and leave the slaves quarters.\n\t\t\t\t\t*goto temple_crossroads\n\t\t\t\t\t\n\t#Ask her what is going on with the temple \n\t\tShe sighs. \"I have always tried not to pay attention to what happens here, but still I can feel it. There is an immense struggle between humans and reptilians with hybrids staying in the middle, making the \n\t\tsituation even more difficult. It is true that the true reptilians are a threat to the very existence of our race. It does not apply to all, but the ones residing in the undergrounds of the temple are among the most dangerous type. Whatever you do, please be careful, you \n\t\tare threading where no human, save for a few corrupted priests, have walked and remained alive for long.\"\n\t\t\n\t\tMisery's answer leaves you speechless.\n\t\t*goto slaves_q8\n\t\t\n\t#You have no more questions \n\t\tYou bid Misery goodbye and leave the slaves quarters.\n\t\t*goto temple_crossroads\n\t\t\n*label priests_q\n\"Are you sure it is a good idea to come here? What if the priests just throw us out? I don't suppose them to be friendly,\" Amy says as you approach the door.\n\nIt is hard to deny her logic. \"But we are here to explore, aren't we?\" You try.\n\n\"That is true but we won't be able to do that for long if we get caught, right?\"\n\nYou nod. \"I will just peek inside.\"\n\n\"Just be careful.\"\n*page_break\nYou do so and you are dismayed by the large number of people in that chamber. Very few of them are in the yellow robes of the priests.\n\n\"What do you see?\" Amy whispers impatiently in your year.\n\n\"Look for yourself.\" You make room for her.\n\n\"Wow, I see a few of the lords ruling the town and some of the wealthiest merchants, as well as many people I have never met, I thing we will be able to mix well here. And look at that!\"\n\nYou open the door wider and fulfill her request. \"The figure in a red hood sitting in the corner, hunched?\"\n\n\"Yes.\"\n\n\"Why did you decide to pick up her out of all the ones?\"\n\n\"Just my intuition. Let's go.\"\n\n\"I thought you were the risk avoiding type,\" you try to protest.\n*page_break\nYou follow her in the room that is so full of noise that you have the feeling you are in a hive. Amy approaches the hooded person and greets them.\n\nA red eyed woman looks up. \"Greetings. I can see the mark of Aru, you must have spoken to him and have his grace. So I should consider you friends.\"\n*goto priests_q2\n\n*label priests_q2\nWhat would you like to ask the mysterious woman?\n*choice \n\t*hide_reuse #\"Who are you?\"\n\t\t\"My name is Lauren and I suppose Aru must have mentioned my name. I am a dark ritualist of a benevolent nature. My specialty is research on pocket realms. Some of the spells I use are \n\t\tindeed dark in nature, but I am always guided by the internal desire to do good. I know that there is something dark brewing in this temple, although I can't put my finger on it, but the energies here allow me to \n\t\tdo my work better that anywhere else. I am not a priestess of that fallen religion and I am sure that the only reason why they put up with me wondering around is that I have Aru's favor.\"\n\t\t*goto priests_q2\n\t\t\n\t*hide_reuse #\"Why are you so sad?\"\n\t\t\"Last night, I was exploring a pocket realm I call the labyrinth with a very close friend of mine. He couldn't get out. I am not sure what went wrong but he is still stuck there. I can't just leave him there, my heart is bleeding for him. Unfortunately,\n\t\tit is a realm that is beyond the powers of Aru, it has been specifically designed to keep him and the likes of him outside. Without the possibility of receiving my mentor's aid, I feel quite helpless.\"\n\t\t*goto priests_q2\n\t*hide_reuse #\"What is your relationship with Aru?\"\n\t\t\"I met Aru several years ago when my studies led me to him. There was immediate feeling of mutual respect and he took me under his wing, teaching me much of the vast knowledge he had accumulated during his long life. \n\t\tWell, at least as much as I was ready to grasp. I will be forever grateful for what he did for me.\"\n\t\t*goto priests_q2\n\t*hide_reuse #\"What is wrong with your eyes and teeth?\"\n\t\t\"Oh, so you noticed!\" The woman looks down ashamed. \"I am sorry, I didn't mean to scare you. It was a long time ago that my studies led me to a place where darkness was abound. I couldn't resist and became a vampire. My friend helped me \n\t\tregain control of my body and Aru made sure that I would always be like that, untainted. However, I still have some of the features related to vampires.\"\n\t\t*goto priests_q2\n\t#Finished with the questions\n\t\t*goto priests_q3\n\t\t\n*label priests_q3\n*page_break\n\"So, what do you say, are you going to help me?\"\n*choice\n\t#Yes \n\t\tLauren smiles. \"I knew fate has sent you to help me.\"\n\t\t\n\t\tHow would you reply?\n\t\t*choice \n\t\t\t#\"Yeah, she drops in at my place from time to time.\"\n\t\t\t\tLauren giggles. \"You are funny.\"\n\t\t\t\t*set wit +1\n\t\t\t\t\n\t\t\t\t(Wit+)\n\t\t\t\t*goto labyrinth\n\t\t\t\t\n\t\t\t#\"I am just glad to be able to do that.\"\n\t\t\t\t\"You are too kind,\" Lauren responds.\n\t\t\t\t*goto labyrinth\n\t\t\t\t\n\t\t\t#Nothing, just nod.\n\t\t\t\t*goto labyrinth\n\t\t\t\t\n\t#Ask her if she could help you with some provisions\n\t\t\"Oh, sure, I am sorry I didn't think about it myself.\" She opens the handbag next to her and produces a couple of potions in small glass bottles. \"As you \n\t\tmay expect, the red one would help you recover from a physical trauma, while the blue one will rejuvenate you.\"\n\t\t\n\t\tAmy looks at you, expecting you to decide which of the two you would like to get.\n\t\t*choice\n\t\t\t#The red one \n\t\t\t\tYou open the bottle and smell a sweet aroma of forest berries. It tastes even better.\n\t\t\t\t*set hp +1 \n\t\t\t\t\n\t\t\t\t(Health+)\n\t\t\t\t\n\t\t\t\tAmy seems quite satisfied with blue one too.\n\t\t\t\t*set amy_exhausted false \n\t\t\t\t*goto labyrinth\n\t\t\t\n\t\t\t#The blue one \n\t\t\t\tYou open the bottle and smell a sweet aroma of blueberries. It tastes even better.\n\t\t\t\t*set nrg +1 \n\t\t\t\t\n\t\t\t\t(Energy+)\n\t\t\t\t\n\t\t\t\tAmy seems quite satisfied with blue one too.\n\t\t\t\t*set amy_exhausted false \n\t\t\t\t*goto labyrinth\n\t\t\t\n\t\t\t#Allow Amy to choose first \n\t\t\t\tShe thanks you for making her feel like a lady and picks up the blue one.\n\t\t\t\t*set rel_amy +1\n\t\t\t\tYou open the bottle and smell a sweet aroma of forest berries. It tastes even better.\n\t\t\t\t*set hp +1 \n\t\t\t\t\n\t\t\t\t(Health+)\n\t\t\t\t\n\t\t\t\tAmy seems quite satisfied with blue one too.\n\t\t\t\t*set amy_exhausted false \n\t\t\t\t*goto labyrinth\n\t\t\t\t\n\t\t\t#Refuse any of them in a sudden spell of distrust \n\t\t\t\t[i]Actually, if you really don't trust the dark ritualist, maybe it would be better to not to embark on the journey inside the pocket realm at all.[/i]\n\t\t\t\t\n\t\t\t\tWould you like to do that?\n\t\t\t\t*choice\n\t\t\t\t\t#Yes\n\t\t\t\t\t\tYou apologize to Lauren and ignore Amy's reaction as you take her hand and drag her out of the priests quarters.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What is wrong with you?\" she brushes her hand away from you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I am sorry, Amy, I just had the feeling we were making a big mistake by helping her, that is all.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe militia woman shrugs. \"I guess it is better to be safe than sorry.\"\n\t\t\t\t\t\t*goto temple_crossroads\n\t\t\t\t\t\t\n\t\t\t\t\t#No\n\t\t\t\t\t\tIt seems that Amy doesn't share your premonitions and gives the blue potion a go, and the expression on her face says that she enjoyed the taste of it.\n\t\t\t\t\t\t*set amy_exhausted false \n\t\t\t\t\t\t*goto labyrinth\n\n*label labyrinth\n*page_break\n\"Alright, we don't have time to lose!\" Lauren puts her hand in the bag and sprays you with the contents of another small bottle. The world spins around you for much longer that \nyou would want to.\n*page_break\n\"What the hell was that?\" you ask as soon as you are able to.\n\n\"Hush, please. You don't have to disturb the energies here. But you are quite right, this place is very close to what you would call hell,\" Lauren whispers.\n\n\"Please, next time you are going to do something, at least give us a fair warning.\" You really try to speak down. Looking at Amy, she seems to be a bit off as well.\n\n\"Point taken, but it is usually easier not to get frightened this way,\" the dark ritualist tries to defend her point.\n*page_break\nYou look around. As Lauren told you, you are inside of a hedge labyrinth, however, this one is quite creepier than the ones you've seen before. The bushes move as if swayed by a wind \nyou can't feel and the sound resembles speech… or moans.\n\n\"Walk behind me and try to stay in the middle, away from the leaves and all will be good,\" she says with a tone that suggest uneasiness, even though she sets of as if she is a fish swimming in home waters.\n\nYou let Amy walk just in front of you so that you can really keep some distance from the hedge.\n*page_break\nLauren swerves around the corner and her screams dominate the noise of the hedge. You rush ahead and see her entangled in branches and roots. A leaf-covered tentacle goes for her throat.\n\nWhat do you do?\n*choice \n\t#Just as she told you, you stay away and let her deal with it\n\t\t*set xp -1\n\t\t(Experience-)\n\t\t\n\t\tLauren seems to be absolutely helpless. Amy, who had waited for your decision, takes her sword out, ready to intervene.\n\t\t\n\t\tIt is time to act.\n\t\t*choice\n\t\t\t#Try to set her free using your sword\n\t\t\t\t*goto sword\n\t\n\t\t\t#Try to disentangle her with your hands \n\t\t\t\t*goto hands \n\t\n\t#Try to set her free using your sword\n\t\t*goto sword \n\t\t\n\t#Try to disentangle her with your hands \n\t\t*goto hands \n\n*label sword\n*set xp +1\n(Experience+) \nYou decide that this critical situation calls for more radical measures. It is true that Lauren asked you not to cause disturbance, but it seems it has already started and she needs your help.\n\nYour sword swishes the air before landing on the predatory branches. It is amazing how hard they feel, as if they are covered by armor. And yet, they stand no chance.\n\nAmy cuts the roots binding Lauren's feet. Whatever the juices of that plant, they smell rancid.\n\nLauren's cloak is tattered, but at least she manages to pull away, mostly unharmed.\n*goto labyrinth3\n\n*label hands\n*set xp -1\n(Experience-)\n\nYour attempts to deal with the branches with your bare hands come to fruition as the predatory plant seems to be too strong. Its leaf-covered tentacles entangle you as well.\n\nLuckily, Amy shows no remorse and her sword sets you free in a rain of rancid juices.  \t\n\nLauren's cloak is tattered.\n\n*if no_armor\n\tYou wish you could say the same, but the lack of armor allowed the plant to tear deep into your flesh in a few places and the liquid causes inflammation.\n\t*set hp -2\n\t\n\t(Health--)\n\t*goto labyrinth3\n\t\n*else \n\tYou can say the same about yourself, you have just a few scratches that itch from the contact with the rancid juice.\n\t*set hp -1\n\t\n\t(Health-)\n\t*goto labyrinth3\n\t\n*label labyrinth3\n\"We came out of the labyrinth quite quickly,\" you note as you leave the hedge madness.\n\n\"Well, I have been here a number of times, but I was never attacked by a plant. This realm seems to be getting darker by the day. If you want to imply that the quest is near its end, this is not \nexactly true. We need to get up there.\" She points at something glowing.\n\nThe mist does not allow you to see much, but you stride forwards until you reach a giant web.\n\n\"You are not going to tell me that it has been spinned by a real spider, are you?\" Amy asks in horror.\n\n\"Do you have arachnophobia?\" Lauren asks.\n\n\"Yeah.\" Amy is already turning pale.\n\n\"Then just stay behind and follow us. Who knows, it may be a good time to get over that fear of yours.\"\n\n\"Oh, gosh, what did I get into!\" the militia woman mumbles.\n*page_break\nThe climb is not very easy, as the web is too elastic and sticky. You find yourself panting and your muscles burning.\n\nAnd another problem appears. A large group of spiderlings crawls in your direction. Each of them is as big as a melon. Lauren takes the one nearest to her and entangles it into the web. You have no doubt that\nit will be able to free itself, hopefully after you finish climbing.\n\nMeanwhile, Lauren starts screaming as half a dozen of those not so tiny baby spiders approach her.\n\nWhat do you do?\n*choice \n\t#Follow Lauren's example \n\t\tYou try to be as quick and nimble as possible, but still the spiderlings manage to bite you a few times with their strong and sharp jaws.\n\t\tStill, Lauren and you succeed at packaging all of them, and Amy displays the strength of her will by not fainting.\n\t\t\n\t\t\"Look at your hands,\" Lauren says. \n\t\t\n\t\tThey sparkle.\n\t\t\n\t\t\"This is arcane dust,\" she explains. \"Those little ones are pure magic.\"\n\t\t*set arcane_dust true \n\t\t*set reagents +1\n\t\t*goto knight \n\t\t\n\t#Take out your sword and slay them\n\t\tAs soon as you pierce the chitinous  cover of the first spider, it produces a howling that makes your blood run cold. \n\n\t\t\"No, it cannot be!\" Lauren whispers.\n\t\t\n\t\tThe web shakes violently as something as big as an ox approaches you. The spiderlings retreat... to make room for their mother. She is pitch black with \n\t\ta lot of hair on her pack. Her jaws crackle and a streak of saliva comes out, and it seems that you look the most delicious. She moves very quickly towards you and you \n\t\trealize you are in a mortal danger. \n\t\t\n\t\tWhat do you do?\n\t\t*choice \n\t\t\t#Try to jump on her back \n\t\t\t\tThe shaky and sticky web make the jump very difficult and you end up almost entering her mouth. She delivers a ferocious bite at your torso\n\t\t\t\t*if no_armor\n\t\t\t\t\t. The pain almost makes you lose consciousness, and the hit makes you fall on your back and end up totally stuck in web.\n\t\t\t\t\t*set hp -3\n\t\t\t\t\t(Health---)\n\t\t\t\t\t*goto lfightspider\n\t\t\t\t\t\n\t\t\t\t*else\n\t\t\t\t\t.The armor reduces much of the impact, but still the tips of the jaws manage to penetrate it. The hit makes you fall on your back and end up totally stuck in web.\n\t\t\t\t\t*set hp -1\n\t\t\t\t\t(Health-)\n\t\t\t\t\t*goto lfightspider  \n\t\t\t\n\t\t\t#Try to jump on her back with an energy boost\n\t\t\t\tThe shaky and sticky web make the jump very difficult but the energy surges in your vein and you somehow manage to catapult yourself on her back.\n\t\t\t\t*set nrg -1\n\t\t\t\t(Energy-)\n\t\t\t\t\n\t\t\t\tThere you are surprised by the fact that the hairs are actually very hard and sharp.\n\t\t\t\t\n\t\t\t\t*set hp -1\n\t\t\t\t(Health-)\n\t\t\t\t\n\t\t\t\tHowever, once you are there, the spider is helpless. You stick your sword to the hilt in the monster and soon she collapses.\n\t\t\t\t\n\t\t\t\tLauren seems quite impressed by your feat, while Amy doesn't even want to look at the enormous corpse.\n\t\t\t\t*goto knight \n\t\t\t\t\n\t\t\t#Wait until she is about to bite you and strike her  \n\t\t\t\tThe plan is great, since it doesn't include risky acrobatics, but it takes a lot of nerves to perform a cold-blooded execution. Unfortunately, you are \n\t\t\t\ta little bit late and one of the fangs leaves a long but superficial wound on your main hand.\n\t\t\t\t\n\t\t\t\t*set hp -1\n\t\t\t\t(Health-)\n\n\t\t\t\tYet, your sword sinks deeply into the skull of the monster, instantly killing her. The enormous body falls on you and you really need the help of Lauren to set you free. \n\t\t\t\tShe is quite impressed by your feat, while Amy doesn't even want to look at the corpse.\n\t\t\t\t*goto knight \n\t\t\t\t\n\t\t\t#Wait until she is about to bite you and strike her and apply an energy speed burst  \n\t\t\t\tThe plan is great, since it doesn't include risky acrobatics, but it takes a lot of nerves to perform a cold-blooded execution. The energy surge allows you to achieve \n\t\t\t\tthe speed and precision to sink your sword deep into the spider's skull while keeping safe from the dangerous jaws, instantly killing her.\n\t\t\t\t\n\t\t\t\t*set nrg -1\n\t\t\t\t(Energy-)\n\n\t\t\t\tThe enormous body falls on you and you really need the help of Lauren to set you free. \n\t\t\t\tShe is quite impressed by your feat, while Amy doesn't even want to look at the corpse.\n\t\t\t\t*goto knight \n*label lfightspider\nYou can only watch as Lauren continues the fight. She seems to be speaking all the time while trying to dodge the mother spider's fangs and drawing something \nin the air with her hands. \n\t\t\t\t\t\nThe spider starts disintegrating and ends up in the form of dust swept away be the wind.\n\t\t\t\t\t\n\"I thought I was going to die,\" you admit as the two ladies approach you and set you free.\n\n\"I think you were not very far away from that point, but the good news is that the time you bought me allowed me to cast that complex spell. So, thank you for that,\" she smiles. \n\n\"You are very welcome,\" you moan while getting up.\n*goto knight\n\n*label knight\n*page_break\nYou climb the web and reach a platform made of some translucent blue crystal. Looking around to see something supporting it, but you fail. It seems it just floats there, defying the laws of gravity. \n\n\"Here he is.\" Lauren clears her throat and steps ahead. A very tall and heavily armored knight appears out of thin air. \"Come with me, dear one, let's go home together.\"\n\n\"Come on, have you seen somebody wearing a full platemail and a tower shield? That is ridiculous!\" Amy whispers.\n\n\"Yeah, it doesn't make much sense.\" You shrug and concentrate on the dialogue between the metal-covered man and the dark ritualist.\n\n\"I can't do... My karma has not been cleared,\" says the knight, his voice echoing in the helmet.\n\n\"What should I do to clear it?\" Lauren asks and puts her hand on her heart.\n\n\"I need to be challenged to be defeated... and I can't hold back from using any of the powers that I have. I may kill you or your friends.\"\n\n\"We are not here for a walk in the park, we know there are risks... Would you like it to be a duel?\"\n\n\"I would prefer so. In this way I may be able to fight at least a bit fairly.\"\n\n\"I think it would be quite easy,\" Amy says. \"I am sure he will be too slow to show any resistance.\"\n\nYou look in her eyes, seeking for a sign of madness or sacrificial wiles. \"But he probably can kill you with a single blow of that great sword!\"\n\n\"Do not underestimate me!\" she says in a cold voice that still suggests that you are going to make the decision.\n\nWhat would it be?\n*choice\n\t#Allow Amy to challenge the knight\n\t\t\"I will fight him,\" Amy roars, full of determination.\n\n\t\t\"Be careful, he is not as slow as he appears,\" Lauren warns her.\n\n\t\tThe militia woman nods and the knight salutes her with a heavily raised sword.\n\t\t\n\t\tIn the beginning, she circles around him, hoping to see an opening in his defence, but it appears to be very difficult. He always manages to point the massive shield or the tip of his sword \n\t\tin her direction. A couple of heavy blows of his suggest that if any of them lands on his opponent, that would be the end of hers.\n\n\t\tDeciding that she should be more aggressive, Amy rolls around his shield, using it to cover her exact position, from where she leaps at his back.\n\t\t*if amy_exhausted\n\t\t\tHer speed, however, is not sufficient to surprise him. He turns around and bashes her with his shield and knocking her out. The knight makes no attempts to do any more harm to her.\n\n\t\t\tMeanwhile, you and Lauren rush to see how badly she is injured. Luckily, there doesn't seem to be much damage done. She is still in shock, but a potion the dark ritualist offers her \n\t\t\tbrings her back to her senses.\n\t\t\t*goto loss \n\t\t\t\n\t\t*else\n\t\t\tShe is quick enough to reach his back and a vicious blow on his helmet makes him succumb to the ground.\n\t\t\t\n\t\t\tAmy gives out a satisfied war cry while you and Lauren come closer to check if the knight is still alive.\n\t\t\t*goto win \n\t\t\t\n\t#You challenge the knight\n\t\t\"That is very honorable of you,\" says Balemar and raises his shield to the left while pointing his massive sword in your direction.\n\t\t\n\t\tHow would you attack him? He is a formidable opponent, so all the options are energy costing attacks.\n\t\t*choice \n\t\t\t#Charge \n\t\t\t\t*set nrg -1\n\t\t\t\t*set hp -2\n\t\t\t\t\n\t\t\t\tYour charge ends in his shield after a quick bash immaculately performed by him. The metal plate hits your head and you drop on the floor\n\t\t\t\tsemi-conscious.\n\t\t\t\t\n\t\t\t\t(Health--; Energy-)\n\t\t\t\t*goto loss \n\t\t\t\n\t\t\t#Leap behind him \n\t\t\t\tIt is very difficult to jump over such a tall enemy. He also appears to to be unexpectedly quick for somebody wielding such a massive blade.\n\t\t\t\tWhat works in your favor is that he doesn't expect that move from you and the first swing of his sword is not upwards.\n\t\t\t\t\n\t\t\t\tNevertheless, he raises it just as you fly above him and its tip connects with your heap, leaving a bloody trail behind you.\n\t\t\t\t\n\t\t\t\tYou grit your teeth trying to suppress the pain and immediately launch at his back and reach him as he turns to face you... and receive a heavy blow of your \n\t\t\t\tsword right at his helmet. He collapses on the ground a couple of seconds later.\n\t\t\t\t*set nrg -1\n\t\t\t\t*set hp -1\n\t\t\t\t(Health-:Energy-)\n\t\t\t\t*goto win \n\t\t\t\t\n\t\t\t#Circle around his left side \n\t\t\t\tNo matter how quick you are, trying to get around him from the shield wielding side is a bad idea, especially having in mind that it covers half of his massive body.\n\t\t\t\t\n\t\t\t\tHe keeps pivoting around and you attempt to move behind his back again. Meanwhile, the flat side of his blade connects with the back of your neck and thrusts you on the hard floor, \n\t\t\t\thead first.\n\t\t\t\t\n\t\t\t\tAt this point, you can't continue the fight.\n\t\t\t\t*set nrg -1\n\t\t\t\t*set hp -2\n\t\t\t\t\n\t\t\t\t(Energy-;Health--)\n\t\t\t\t*goto loss \n\t\t\t\t\n\t\t\t#Circle around his right side\n\t\t\t\tIt was very wise to use the sword wielding side. In this way, the shield actually hampers his movement.\n\t\t\t\t\n\t\t\t\tFast as lighting, your shoulders line with his and without even slowing down, you strike the back of his helmet.\n\t\t\t\t\n\t\t\t\tHe collapses on the ground a couple of seconds later.\n\t\t\t\t*set nrg -1\n\t\t\t\t\n\t\t\t\t(Energy-)\n\t\t\t\t*goto win \n\t\t\t\t\n\t\t\t*selectable_if (sword_type=\"armorbane\") #Pierce through his armor \n\t\t\t\tYou can feel the tingle on the hand carrying the sword, as if it is eager to penetrate the armor. In your mind, you promise it that \n\t\t\t\tit will be rewarded with the opportunity to do so.\n\t\t\t\t\n\t\t\t\tA couple of feints make him move the tower shield to block a blow and exposes his torso. Quick as a lightning, you strike. The sword's tip sinks into the \n\t\t\t\tfull plate and the knight collapses on the ground.\n\t\t\t\t*set nrg -1\n\t\t\t\t\n\t\t\t\t(Energy-)\n\t\t\t\t*goto win \n\t\t\t\n\n\t#You decide that it is better not to duel him but attack him as a group\n\t\t\"Charge forward!\" you roar and take your sword out. Amy does the same. Only Lauren shows a bit of hesitation, but even she puts her hand in the back, making you hope \n\t\tthat she can find something useful in there.\n\t\t\n\t\t\"Your fate is sealed,\" says the knight and throws his tower shield. \n\t\t\n\t\tIt hits Amy in the head first, then it bumps into your abdomen, taking the air out of your lungs and pinning you to the ground. Lauren is also not saved from the \n\t\tfury of the magic shield.\n\t\t\n\t\tHis steps echo as he approaches you. His great sword raised above, you realize you may be living your last second.\n\t\t\n\t\tAnd then Lauren makes the whirlpool engulf you and take you away…\n\t\t*page_break\n\t\tIt catches you off-guard again and you can hear your scream of horror even after it spits you back to the temple.\n\n\t\tThe dark ritualist starts crying uncontrollably, despite the efforts of both you and Amy to console her. You have no other choice but continue your \n\t\texploration of the temple.\n\t\t*goto temple_crossroads\n\n*label loss \n*page_break\nAs soon as you come to your senses, you see Lauren's sad face.\n\n\"Thank you for trying… It is all lost now.\"\n\nThe whirlpool catches you off-guard again and you can hear your scream of horror even after it spits you back to the temple.\n\nThe dark ritualist starts crying uncontrollably, despite the efforts of both you and Amy to console her. You have no other choice but continue your \nexploration of the temple.\n*goto temple_crossroads\n \t\n*label win\n*page_break\n\"Balemar!\" Lauren cries as she gently removes his helmet, showing a handsome face with piercing blue eyes and blond hair.\n \n\"I am done, dear Loren. I can't feel my body. My fate has been sealed, I will remain in this pocket realm forever,\" he whispers and a bit of blood comes out of his mouth.\n\n\"No, I won't let that happen.\" She pets his sweaty hair.\n\nHe tries to smile. \"Is it not what always happens once you are into the karmic wheel? There is only one way and it is in it. I knew it all the time but wanted to lie to myself, opening my heart to foolish hope.\"\n\n\"There is nothing foolish in the hope that you have held. While it is true that the karmic cycle has been corrupted, I am not going to stand still and watch as it destroys you.\"\n\n\"My dear Lauren, always ready to fight the inevitable. What are you going to do?\"\n\n\"The unthinkable, my love. I pray that you forgive me.\"\n*page_break\nBalemar's eyes open wide as she descends her lips. You quickly realize it is not a kiss, but a bite. Her canines find her way into his neck and she takes a couple of gulps deafened by his scream of shock.\n\nShe pulls away from her, a streak of blood rolling down her chin. \"That was it, I will hurt you no more.\"\n\n\"Why did you do this?\" he asks in a hazy voice.\n\n\"My research on this pocked world showed me that it is designed to be a prison for a man, and very soon you will no longer be one.\"\n\n\"But what kind of a life will I be living?\" he mumbles.\n\n\"One in which you will no longer be deprived of the love you need. I know how to control the side effects like the hunger. Trust me, will you?\"\n\n\"I trust you Lauren, I have always done it and I always will.\"\n\nThe sides of her lips curl. \"I knew that very well and this is why I decided to act without asking you for permission. I didn't want you to feel the fear.\"\n\n\"That was very kind of you, I should say, although I think you underestimate me a little. By the way, you mentioned forgiveness, right?\"\n\n\"Yes, I did.\" She nods.\n\n\"I am giving you mine.\"\n\n\"Thank you. I didn't actually expect it that quickly… Do you feel the transformation already taking place?\"\n\n\"Yes, I am starting to feel much more powerful and joyful.\" He stands up with ease. \"In fact, I don't need that any more.\" He unstraps his armor and throws it on the \ncrystal ground.\n\nThe sound of it falling suggests that it is much lighter than its look suggests. In fact, you hardly hear anything. Urged by curiosity, you take it to examine it. It is as light as thin leather.\n\n\"You can keep it, brave warrior.\" Balemar says. \"This will be my way to thank you two for coming with the lovely Lauren to help her save me.\n*set mithril true \n\nHis features are already starting to change but there is nothing in his actions that suggests even a hint of predatory aggression.\n\nAs if reading your thoughts, Lauren says: \"No, not all vampires are merciless monsters, just the majority.\" She chuckles. \"Now, let's waste no more \ntime in this cursed place and go back to the temple.\"\n*page_break\nThis time, the trip back is slightly more pleasant. Either you are getting used to it, or Lauren's magic has just become kinder.\n\nYou still need to take some time to recover from the shock and when you do, you bid Lauren and Balemar farewell and continue with the exploration of the temple.\n*achieve love_bites\n*set xp +3\n\n(Experience+++)\n*goto temple_crossroads\n\n*label barracks\nAs soon as you open the door, the world around you just dissipates into darkness and then rearranges itself, leaving your hearts racing as you realize you are no longer in a place you could call safe.\n\nYou find yourself in a wide street between a couple of huge and ugly buildings. The air is heavy with the scent of primitive dark energies, and not far from you there are three embodiments of it.\n\nThey are tall and muscular and the helmets that hide most of their faces might leave you with the impression that they are human figures, but as long as they start walking towards you, it is clear they are not. Their \nknees do not bend backwards as the ones of humans do. And there are scales covering the exposed parts of their bodies. One of them is a bit bigger and wears a white tunic, unlike its two comrades who are dressed in blue. You guess that the \nformer is the leader.\n\n\"Stay there!\" he orders with a tone that obliges you to obey. \n\nYour first thought is that it might be better to escape. They have the slight advantage with the numbers and there is something in them that the experienced warrior in you reads as a strong message to \navoid in all costs. But they are too quick. You don't stand a chance. Pulling out your sword, you prepare for a hard battle. \n*page_break\nSuddenly, a scantly clad man appears from the building near you and intercepts their way. He has the body that even warriors can be jealous of and his long black hair gives him a primely attractive look that matches the great axe he is holding.\n\n\"Amaranthe, stay out of our way. I will tolerate no more disrespect from you. Have you not learned your place?\" The leader on the non-humans barks.\n\n\"And I will tolerate no more of your nonsense. You call me a slave, but you are only masters of your own demise.\"\n\nThe monsters roar and charge. Amy and you rush to aid him, each of you facing one of the enemies in blue.\n\nYou quickly realize that you can only be a match to your own rival if you use energy to keep up to the speed of the reptilian. His sword is aimed at your torso. Blocking it is the first thought that comes to your mind. Alternatively, you can deliver a slight blow at his sword so that you can \njust swerve it, allowing you the opportunity to strike his undefended body. Also, you can try to swipe him before you get hit, if you are brave enough.\n*choice\n\t#Block \n\t\t*set nrg -1 \n\t\t(Energy-)\n\n\t\tYour block is successful, even though the strike force is so great that you almost drop your weapon.\n\n\t\tHowever, the reptilian keeps striking and inflicts several small wounds. \n\t\t\n\t\t(Health-)\n\t\t*set hp -1\n\t\t\n\t\tThe real surprise comes when your heads collide. The shock leaves you helpless on the ground.\n\t\t*goto barracks2\n\t\t\n\t#Deflect and hit \n\t\t*set nrg -1 \n\t\t(Energy-)\n\n\t\tThe precision of your movements demonstrates your sword wielding proficiency at its finest. Your swords meet, a kiss of betrayal that allows you to plunge yours between the ribs of your opponent. If he was human, that would be the end of him.\n\t\t\n\t\t\n\t\tThe real surprise comes when your heads collide. The shock leaves you helpless on the ground.\n\t\t*goto barracks2\n\t\n\t#Strike directly \n\t\n\t\t*set nrg -1 \n\t\t(Energy-)\n\n\t\tThe fact that you are able to strike him before his blade reaches you speaks much about your ability to dance with a sword. However, he doesn't even flinch while you feel the suffering \n\t\tof your torn flesh.\n\t\t\n\t\t(Health-_)\n\t\t*set hp -2\n\t\t\n\t\tThe real surprise comes when your heads collide. The shock leaves you helpless on the ground.\n\t\t*goto barracks2\n\n*label barracks2\n*page_break\n\"I am sorry, they took her.\"\n\nYou hear a voice that is somewhat familiar, but you can't immediately recognize it. Struggling, you manage to focus your sight. The two images finally find their place on top of each other, providing you \nwith a clear view of Amaranth. \n\n\"Amy?\" you ask.\n\n\"Yes. I was stunned too. Those hybrids are too strong.\"\n\nYou get up cautiously, careful not to push yourself too much. \"Why?\"\n\n\"We can't discuss that here. Let's hide before more of those guards appear.\"\n\nYou hurry after him, following his journey through narrow winding streets. You help him remove a manhole and disappear in the canals.\n*page_break\n\"Where are we going?\" you ask.\n\n\"To the arena.\" Amaranth says hastily. \"I believe she was taken there to find the ones of pure bloodlines. They like facing exotic warriors with small chances of winning.\"\n\n\"But why are you helping us?\"\n\nHe chuckles. \"It is the other way round, you are the ones helping me. If what I believe in is right, you are the only chance of a peaceful resolution to the situation down here, the only option for me and \nmy brethren to survive and the mayhem in the world up there to be avoided.\"\n\n\"How come?\" You realize the headache is returning to you as you try to make sense of what he is talking about. \n\n\"I have seen you two in a dream. You were talking to Aru. I know he considers you important for the events to unfold.\"\n\n\"I think I should thank you,\" you say humbly.\n\n\"I am just following my path, and it happens so that we can make the next few steps together. I also have my reasons to benefit from reaching the arena and the path to it is something \nI have been researching for a while.\"\n\nYou wait for him to continue his explanation, but it never comes. It seems you have to switch to asking questions in order to be able to learn more.\n*goto barracks3\n\n*label barracks3 \n*page_break\nWhat would you ask Amaranth?\n*choice\n\t*hide_reuse #About his relationship with Aru \n\t\t\"It is hard to say for sure how I feel about him. On one hand, he has been among the ones who brought the pure bloods to our plain of existence and even participated in the hybridization, of which I am also a result.\"\n\t\t\n\t\t\"Oh, really? But you don't look different from a normal human.\" \n\t\t\n\t\t\"It is true that I don't, but I also I know that it is correct. For example, it is a bit easier for me to maintain a strong and fit body, just as it is harder for me to feel the sacred human emotions of love and compassion. But back on the topic of Aru, I know \n\t\tthat he regrets all that has come to be and wishes for the destruction of all the pure bloodlines and hybrids. It would be the end of me and quite a few I hold dear. Please, do not get me wrong, I understand his point of view very well, and it would be very hard for me \n\t\tnot to agree with it. Many of the others you can see here are terrible creatures living only to harm life and if that force is unleashed upon the world above it will be a calamity unlike any it has witnessed. But I also want to live and to prove that hybrids like us are able to follow the path of love.\"\n\t\t*goto barracks3\n\t\t\n\t*hide_reuse #About the guards and the true bloodlines \n\t\t\"You saw the guards in battle, right? They are very quick and strong. It is very hard for a human to be a match to them on the battlefield. The true bloodlines are even quicker and tougher. But, you will see for yourself.\"\n\t\t*goto barracks3\n\t\t\n\t*hide_reuse #About the arena \n\t\t\"The arena is the facility where the best fighters among the true bloodlines play their bloody sports under the supervision of others like them. Only they are allowed to be spectators too, even though \n\t\tevery now and then a hybrid manages to take a peek and start a rumor. It is because of those rumors that I know a path to get us there. Another important point about the arena is that whoever defeats the current champion can have a \n\t\twish of theirs granted by the generals of the pure bloods. It has been the dream of many humans and hybrids who were forced to fight on the arena as a means of entertaining the pure bloodlines\n\t\tby falling easy preys.\"\n\t\t*goto barracks3\n\t\t\n\t*hide_reuse #About his personal agenda \n\t\tAmaranth looks into your eyes, trying to figure out if he can trust you or not. \"Please, forgive me my insecurity. It has been a plan I have been forging for quite a while preparing for it. I know it may sound a bit arrogant or even stupid, but I think I know how to defeat the champion of the arena and secure the award of the wish of the victor. \n\t\tMy dreams spoke to me of the way to do it. They also told me right now, with the rise of consciousness of hybrids, my choice can set the wheels of fate in a dramatic direction. I hope I am ready for that. I wish I would wait and prepare for it a bit more, but I can't. My sister Emerald was captured and will be spilling blood in the arena tonight. I have to save her. It would \n\t\thave been much easier if the true bloods had chosen me instead of hers, but they are afraid, I was told.\"\n\t\t*goto barracks3\n\t*hide_reuse #About the path ahead \n\t\t\"There is no easy path to where we are going, but I believe I know a manageable one. It passes through the lairs of two of the champions of the arena who rarely fight and have chosen an existence away from the hustle. The first one we would have to meet is the Lady \n\t\tof Dark Whispers. She is a human-batling hybrid and is always surrounded by a group of myriads of bats who act as her servants and protectors. She has never been witnessed to use her voice, but her whispers are said to be able to make the blood of anybody run cold, hence her name.\n\t\t\n\t\t\"The other one is a lizard woman who of the pure bloodline. She is rumored to currently hold the longest win streak in the arena but after disabling her partner in a fight, she decided to embrace loneliness. Some say she is taking care of a few eggs that \n\t\thave been her retirement gift from the arena organizers for the years she's entertained spectators.\"\n\t\t*goto barracks3\n\t\t\n\t#Nothing more (finished with the questions)\n\t\t*goto barracks4 \n\t\t\n*label barracks4 \nThe canals lead you to catacombs full of stone sarcophagi. You express your fear that the skeletons can come to life, but Amaranth just laughs, saying that you two are under the headquarters of the military establishment of the temple, not the necromancy one.\n\n\"Are there necromancers in this temple too?\" you ask.\n\n\"Not that I know of.\" Amaranth's answer does not sound very assuring.\n*page_break\n\"Here is the cavern where the Lady lives. It seems she is not here now.It would be the perfect opportunity to go in and see if we can find anything that can be of help to us.\"\n\nThe scantly clad warrior bravely enters the cave and you follow him.\n\nThe interior looks much too simple for a residence of a lady. There are a few blankets on the floor that probably serve as a bed. A dagger with a broken blade rests thrown away in the corner. The skin of what looks like a bat the size of a pig is hanged on the wall,and there is an amulet attached to the stalagmite below it.\n\n\"So the stories I have heard are true!\" Amaranth gasps in awe.\n\nYou are not sure you share his enthusiasm.\n*goto barracks5\n\n*label barracks5\n\nWhich item do you want to examine?\n*choice \n\t#The broken dagger \n\t\tYou take it and examine it closely. Its coldness is unlike any you have felt. There is some palpable darkness attached to it.\n\t\t\n\t\t\"According to the lore I know, the weapon broke when she was stabbed. Apparently, it broke when it was supposed to go through her breast bone. She managed to escape down here and find a new home here.\"\n\t\t\n\t\tWould you like to take the broken dagger?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\tYou use a napkin to wrap around the dagger, and then attach it to your belt.\n\t\t\t\t*set broken_dagger true \n\t\t\t\t*goto barracks5\n\t\t\t\t\n\t\t\t#No \n\t\t\t\t*goto barracks5\n\t\t\t\t\n\t#The bat skin\n\t\t\"Oh, this must be the skin of Luna, the matriarch of the bats who accepted the lady seeking refuge in the territory they inhabited. Luna welcomed her with open wings, allowing her to use the \n\t\tcave we are in. Unfortunately, she died a couple of months later and the new matriarch allowed the Lady to keep her skin, as a reminder of the love she shared with the one that was no longer among the living.\"\n\t\t\n\t\tWould you like to take the bat skin?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\t*set bat_skin true \n\t\t\t\t\n\t\t\t\tYou suggest Amaranth to put it around his heck and shoulders. He replies that it is indeed a bit chilly down there and follows your recommendation.\n\t\t\t\t*goto barracks5\n\t\t\t\t\n\t\t\t#No \n\t\t\t\t*goto barracks5\n\t\t\t\t\n\t#The amulet \n\t\t\"The legend says that this is an instrument of dark magic. It is supposed to give its owner the ability to impose their will on others... to enslave them. The Lady rarely needed that in order to make \n\t\tthe bats follow her desires, but there were a few rebels that may have experienced the might of the trinket first hand. Also, it is said to allow for better telepathic communication. Honestly, I would \n\t\tkeep my hands off this kind of things, but the decision is yours.\"\n\t\t\n\t\tWould you like to take the amulet ?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\tYou consider putting it on your neck, but then decide against wearing something related to dark energy so close to your heart and attach it to your belt.\n\t\t\t\t*set amulet true \n\t\t\t\t\n\t\t\t\t*goto barracks5\n\t\t\t\t\n\t#Leave the cave \n\t\t*goto barracks6\n\t\t\n*label barracks6\nAs soon as you exit the cave, you come across a beautiful lady with long black hair. It is obvious that it hasn't been brushed for a while, but it is still very beautiful.\n\nShe is wearing a black dress with laces that reveals toned shoulders and arms. You find yourself wondering whether she is feeling cold.\n\nHer cherry-red eyes examine you with interest. Several bats fly above your head and then back to her, probably trying to answer the silent question asked by their mistress.\n\nShe moves to the center of the tunnel, making sure you just don't rush past her before her curiosity has been satisfied.\n\nWhat do you do?\n*choice\n\t*selectable_if (broken_dagger) #Threaten her with the broken dagger\n\t\tHer eyes flash with anger and pain and you realize you have made a grave mistake touching a mental wound of a dangerous foe. She whispers something that you barely hear.\n\t\tBats attack you from all sides, biting and scratching you deep under the skin on the exposed areas. You try to protect yourself with your sword, but it is in vain.\n\n\t\tAmaranth's position is even worse as he has more exposed flesh.\n\n\t\tIt seems the agony lasts forever. Luckily, the Lady of Dark whispers show mercy, ordering the bats to cease the attack.\n\n\t\tYou don't wait for a second invitation to walk away.\n\t\t*set hp -2\n\n\t\t(Health--)\n\t\t*goto barracksx\n \n\t*selectable_if (bat_skin) #Wrap the bat skin around her shoulders\n\t\t\"Amaranth, please, give me the skin,\" you order. \"Quickly!\"\n\n\t\t\"What are you going to do?\" he asks you while untying it and giving it to you.\n\n\t\t\"You will see.\"\n\n\t\tYou don't break eye contact with the Lady of Dark Whispers as you step closer to her, holding the skin up. Then you wrap it around your shoulders and she gives you a faint smile, and you \n\t\tcan imagine that a long forgotten emotion is coming back to her as her cheeks redden. \n\n\t\tWaving her goodbye, you walk past her, making sure you don't make any quick movements.\n\t\t*goto barracksx\n \n\t*selectable_if (amulet) #Use the amulet to mind control her\n\t\tYou take the amulet out and put it around your neck and try to focus on making the Lady of Dark Whispers and the bats let you go. Your actions are met with a sisnister smile by the woman, whose \n\t\teyes flash wildly.\n\n\t\tThen you remember Amaranth's words that the amulet bestows powers to its owner. She may not be the one carrying it, but it seems the trinket still recognizes her as its mistress.\n\n\t\tYou quickly realize that you can't move your limbs... and then the fury of the bats unleashes upon you. They attack you from all sides, biting and scratching you deep under the skin on the exposed areas. You can do nothing to protect yourself.\n\n\t\tAmaranth's position is even worse as he has more exposed flesh.\n\n\t\tIt seems the agony lasts forever. Luckily, the Lady of Dark whispers show mercy, allowing you to retake control of your body and ordering the bats to cease the attack.\n\n\t\tYou don't wait for a second invitation to walk away.\n\t\t*set hp -3\n\n\t\t(Health---)\n\t\t*goto barracksx\n\t\n\t#Attack her with a blade whirlwind aiming at both the Lady of Dark Whispers and the bats\n\t\tYour attack catches the Lady of Dark Whispers by surprise. She flinches with pain every time your blade slices a bat. However, your advantage doesn't last long as \n\t\tbats attack you from all sides, biting and scratching you deep under the skin on the exposed areas. You try to protect yourself with your sword, but it is in vain.\n\n\t\tAmaranth's position is even worse as he has more exposed flesh.\n\n\t\tIt seems the agony lasts forever. Luckily, the Lady of Dark whispers show mercy, ordering the bats to cease the attack.\n\n\t\tYou don't wait for a second invitation to walk away.\n\t\t*set hp -1\n\t\t*set nrg -1\n\n\t\t(Health-;Energy-)\n\t\t*goto barracksx\n\t\n\t#Attack the Lady of Dark Whispers\n\t\tYour attack catches the Lady of Dark Whispers by surprise, but not the bats. \n\t\tThey attack you from all sides, biting and scratching you deep under the skin on the exposed areas. You try to protect yourself with your sword, but it is in vain.\n\n\t\tAmaranth's position is even worse as he has more exposed flesh.\n\n\t\tIt seems the agony lasts forever. Luckily, the Lady of Dark whispers show mercy, ordering the bats to cease the attack.\n\n\t\tYou don't wait for a second invitation to walk away.\n\t\t*set hp -1\n\n\t\t(Health-)\n\t\t*goto barracksx\n\n*label barracksx\n*page_break\nThe tunnel ends in a wide cavern. The abyss to the side makes you cringe and step back, fearing that an accidental slip may lead to a very unpleasant end to your adventure. \n\nThe glow of the mushrooms is not sufficient to illuminate the vast space in the way it could in the tunnel. You squeeze your eyes and try to focus.\n\nIn the twilight, you see the arena champion standing in all of her glory among a few eggs and little hatchlings. She must be at least 8 feet tall with well defined muscles covered by glimmering dark scales. Her split tongue lashes in and \nout of her mouth.\n\nWhile you may have expected any other reaction from her, you got none. She knows that you need to approach her if you are to reach your destination.\n\nYou look at Amaranth for guidance, but he just shrugs and walks ahead.\n*page_break\nThe reptilian lady watches you with interest reminding you of a predator tasting prey with their eyes. You have little doubt that she will try to attack you at some point. This is why \nyou consider acting preemptively, which may potentially give you some advantage. \n\nAnother idea that occurs to you is to point your sword at one of the eggs, making a clear message that you would destroy it if she attempts something unwise.\n\nWith your periphery vision, you see a hatchling that is about to fall into the abyss. You can leap and grab it before it is too late.\n\nWhat would you do?\n*choice \n\t#Just walk ahead, ignoring the potential danger \n\t\tThe reptilian seems amused by your behavior and decides to have a little bit more fun with it. Quicker than a blink of an eye, she plunges towards you and kicks you in the back, taking your breath away and \n\t\tmaking you fly several feet forward. You groan with pain.\n\t\t\n\t\tAmaranth, who appears to have suffered the same fate tries to coax you. \"At least she didn't decide to use us like food.\"\n\t\t\n\t\tAs soon as you are able, you continue your way.\n\t\t*set hp -1\n\t\t\n\t\t(Health-)\n\t\t*goto barracksy\n\t\t\n\t#Preemptively attack the reptilian\n\t\tIt doesn't go along as planned. It seems the reptilian knows very well exactly what you want to do, so she just leaps to the other side and and then lashes on you with her \n\t\tformidable claws. She then kicks you in the chest, taking your breath away and \n\t\tmaking you fly several feet backward. You groan with pain.\n\t\t\n\t\tAmaranth, who appears to have suffered the same fate tries to coax you. \"At least she didn't decide to use us like food.\"\n\t\t\n\t\tAs soon as you are able, you continue your way.\n\t\t*set hp -2\n\t\t\n\t\t(Health--)\n\t\t*goto barracksy\n\t\n\t#Threaten to destroy an egg\n\t\tThe reptilian watches your actions with a smirk, pretty confident that the situation is under control. You soon understand why. A couple of whelps come out of it and \n\t\ttheir sharp fangs sink in your ankles. Their mom lashes on you with her \n\t\tformidable claws. She then kicks you in the chest, taking your breath away and \n\t\tmaking you fly several feet backward. You groan with pain.\n\t\t\n\t\tAmaranth, who appears to have suffered the same fate tries to coax you. \"At least she didn't decide to use us like food.\"\n\t\t\n\t\tAs soon as you are able, you continue your way.\n\t\t*set hp -3\n\t\t\n\t\t(Health---)\n\t\t*goto barracksy\n\t#Leap to save the hatchling \n\t\tThe mother reptilian follows your leap with her eyes as you perch on the verge of the abyss and carefully take the whelp. It squeaks and tries to bite you but comes across a piece \n\t\tof the cloth of your shirt.\n\t\t\n\t\tYou quickly return it to its mother. Her gratitude is silent, the message being more of \"you earned your right to live\" rather than \"thank you\". But still, she removes her \n\t\tnecklace of fangs and gives it to you with a gesture that almost makes you step back in fear, but you take it, not wanting to offend her.\n\t\t*set anaconda_fangs true \n\t\t*set reagents +1 \n\t\t\n\t\tAnyway, you manage to walk away unharmed.\n\t\t*set xp +3\n\t\t*set nrg -1\n\t\t\n\t\t(Experience+++;Energy-)\n\t\t*goto barracksy\n\t\t\n*label barracksy\n*page_break\n\"We are getting close to the arena,\" Amaranth announces and goes to the left at the crossing of tunnels ahead.\n\nSeveral minutes later you reach an enormous amphitheatre that seems to be serving as an arena for battles.\n\n\"How can such an enormous building exist underground?\" you ask.\n\n\"The barracks are not underground, just the portal to here is,\" he explain. \"Right now, we are in one of the corridors used by the participants to reach the battleground. And it seems the main \nevent is about to begin.\"\n\nYou make your way to the end of the corridor and take a peep outside. There must be hundreds of reptilian monsters sitting in the lodges high above. One that looks especially ugly takes his place on a pedestal.\n\n\"And now, dear brethren of pure lineage, it is time for our champion Skullsplitter to fill our hearts with gore and agony. His price would be to fight and annihilate a human who dedicated her life to preserve the order of the ones\nliving on the surface, a meek one called Amy. May this fight stand for how we will dominate all those who dare defy our might when we claim their world by force.\"\n\nThe spectators roar with excitement.\n\nYou see Amy coming out from another corridor. Her shoulders are hunched and she looks dirty and beaten down. You have the feeling she was not treated very nicely. \n\nThe militia woman limps as she walks towards the center of the arena, not daring to even look at the champion towering a couple of feet over than her. It was never expected to be a real fight, but an execution.\n\nAmaranth nods at you and rushes into the arena. \"You shall not stand alone, human sister!\" he roars. You follow him, unsheathing your sword.\n\n\"It seems we have a surprise,\" says the announcer. \"We are going to have a team battle. And, in order to keep the fight fair, Skullsplitter will be accompanied \nby Bloodskin and Heartripper!\"\n\nThe monsters that appear in front of you make it certain that this fight is going to be anything but fair. Amaranth, however, seems very confident, looking up at the monsters beholding him like a wolf watches sheep and not even flinching. He knees and says a few words of praise and hope.\n\nHis opponent doesn't waste a second and charges. The same does Skullsplitter, who seems about to crush poor Amy. You are lucky that the reptilian who is your opponent decides to remain \npassive for the time being, carefully examining the other battles, his eyes shifting quickly between Amaranth and Amy.\n\nIt seems you have the chance to help one of your comrades. Who will they be?\n*choice \n\t#Amaranth\n\t\tYou manage to reach Amaranth just in time to deflect the claws threatening to rip his throat.\n\t\t\n\t\tThe fellow warrior stands up. Your eyes meet for a second and you read a silent thank you in them.\n\t\t\n\t\tHe then faces the monster and extends his unarmed hand towards him, and as he clenches it into a fist, the head of the reptilian implodes in \n\t\ta copious blood spay.\n\t\t\n\t\tThe audience gasp.\n\t\t\n\t\tThe other two reptilians leap at Amaranth, knowing that unless they bring him down quickly, their fates are sealed.\n\t\t\n\t\tThe man drops down his sword so that he can clench both fists and deal with both opponents.\n\t\t\n\t\tAs their blooded corpses hit the ground, the audience rises to their feet.\n\t\t\n\t\t\"The unthinkable has happened!\" proclaims the announcer. \"The human looking one defeated our best fighters. Now, stranger, tell us what reward do you want to have? Is it power or wealth that you are after, or does your heart yell for revenge?\"\n\t\t\n\t\tAmaranth takes a deep breath. \"Listen to me well, scaly ones. I would take nothing of what you enumerated. The examples you gave mean you understand nothing about what it means to be human, because it is what I am at my core, despite wearing some codes that are common with yours.\"\n\t\t\n\t\tThe crowd becomes restless.\n\t\t\n\t\t\"I would gladly claim another gift, and this is the freedom of my beloved sister Emerald who is a prisoner and doomed to fight a battle she cannot win.\"\n\t\t\n\t\t\"Nothing like that has ever been requested by a champion of ours...\" the announcer struggles.\n\t\t\n\t\t\"Are you going to deny the wish of a champion? Are you really going to blatantly disrespect the tradition?\" Amaranth roars with zeal.\n\t\t\n\t\t\"I didn't say that... champion. Thy will be done.\"\n\t\t\n\t\tAmaranth raises his hand and receive the salutes of the spectators.\n\t\t\n\t\tSuddenly, the world spins around you...\n\t\t*set amaranth true \n\t\t*page_break\n\t\t...and you find yourself in the room where you met Aru. Amy is next to you.\n\t\t\n\t\tThe tall entity has a very enthusiastic expression on his face.\n\t\t\n\t\t\"You made history today, dear ones!\" he exclaim.\n\t\t\n\t\t\"How come?\" you ask in surprise, still being a bit dizzy from the unexpected teleportation. \n\t\t\n\t\t\"By helping Amaranth win the tournament and save his sister. You might think that his choice of reward was natural. What can a loving brother want more than the freedom of his sister who is doomed for \n\t\ta spectacular execution? The answer is natural to you, because you are human. Reptilians, especially from the true bloodlines, have been taught that love is a sign of weakness. However, they \n\t\tare not creatures immune to the fire of compassion, and by the choice of the champion reward, Amaranth planted the seeds of a revolution. I can see a much more benevolent future for all residents of the temple.\"\n\t\t\n\t\tYou raise your eye brows in disbelief.\n\t\t\n\t\t\"Now, I know that even if the temple is not destroyed, the outcome won't be the disaster I feared. But that decision will probably rest on your shoulder. Now, please, take the time you might \n\t\tneed to rest and then continue the explorations of the temple.\"\n\t\t\n\t\tAru sits at the desk and starts examining an ancient looking scroll, not paying attention to you any more.\n\t\t*goto temple_crossroads\n\t#Amy \n\t\t*set hp -2\n\t\tYou manage to reach Amy just in time to deflect the claws threatening to rip her throat.\n\t\t\n\t\tMeanwhile, you hear the last cry of Amaranth, who falls on the ground... dismembered.\n\n\t\tBefore you can realize what is going on, a ferocious tail swipe takes your consciousness away.\n\t\t\n\t\t(Health--)\n\t\t*page_break\n\t\tYou wake up in the room where you met Aru. The tall being stands next to you with a worried expression on his face.\n\t\t\n\t\t\"What happened?\" you ask, realizing that Amy is next to you and she is still alive and kicking.\n\t\t\n\t\t\"I had to intervene,\" Aru explains. \"As soon as Amaranth fell, you had no chance in hell of winning the battle. Of course, you are much more \n\t\timportant than to end up as reptilian food. Now, take as much rest as you need and please, return to your explorations.\"\n\t\t\n\t\tAru sits at the desk and starts examining an ancient looking scroll, not paying attention to you any more.\n\t\t*goto temple_crossroads\n\t\t\n*label statues_r\nYou open the door cautiously and take a peak inside.\n\n\"Do you think we can end up like petrified?\" Amy asks as she observes the lifelike statues in the room. \n\n\"There is nothing to fear of being turned into stone,\" a low-pitched voice answers from inside. \"But only enter if you are willing to play a game of morals that can only be of benefit to you and \nfulfilling the quest you are on. Be warned, however, that your judgment on personal matters will be required, knight of the Fellowship.\"\n\nAre you willing to enter?\n*choice\n\t#Yes \n\t\t*goto statues_r2\n\t\t\n\t#No\n\t\t*goto temple_crossroads\n\t\t\n*label statues_r2\nYou get in and see the one the voice belongs to - a knight in full plate who levitates a foot above the ground.\n\n\"I know who you are, dear ones. My name has been lost in time, but I am better known as the Guardian of Justice. I have been cursed with the thankless task of \ndelivering verdicts to those incarnated in flesh, a burden capable of corrupting even the fairest of souls. But I did not invite you in to tell you about my troubles.\n\n\"Every now and then, I ask an incarnate to make a judgement instead of me, thus telling me if my guidelines still represent the level of consciousness of the current era. Now, please, take a look at the \nstatues. What do you see?\"\n\nThe first one strikes you immediately. \"This is Aya!\" you remark.\n\n\"This is correct,\" says the Guardian. \"The subject of today's case will be your own assassination attempt. I understand that you are a walk-in, and for you it was more of an \nopportunity to come to this world to be of service, but as the one who continues the legacy of the knight from the Fellowship, I find that you are entitled to make \nthis judgement as much as the soul originally bound to the body you inhabit.\"\n\n\"That would be interesting... I don't recognize any of the other 3 statues I see here.\"\n\n\"I will help you,\" says the Guardian. \"The one in the expensive dress and jewels is a member of the loyalty. She is here because maybe her actions were indirectly responsible. Next to her, \nyou see the mastermind of the assassination. The knight of the Fellowship had clues that could lead him to being imprisoned. As you can see, the link here is much more direct.\nFinally, you have an ordinary citizen, who is the final consumer of the health potions. You may interrogate them in any order. When you are finished and decide who is to be \nblamed, please let me know.\"\n*goto statues_r3\n\n*label statues_r3\nWho do you interrogate?\n*choice \n\t#The noble lady\n\t\tAs the statue comes to life, the noble lady assumes a naughty pose. \"Just be quick about it, I am too busy ruling this town, I can't afford to waste too much time.\"\n\t\t\n\t\t\"Tell me about the health potions that you distribute at ridiculously high prices to those in need,\" you nail the question.\n\t\t\n\t\t\"You have no idea how hard it is to maintain control of the population. So many people, so different are their agendas. And it is up to us, the noble, to \n\t\tbring order to the system, to keep it from collapsing. We are as important for the townsfolk as the air they breathe. We are the most decent of all and our \n\t\tactions are justified because they serve a higher purpose.\"\n\t\t\n\t\t\"Where some people see order, others perceive slavery,\" you note.\n\t\t\n\t\t\"This is true, and it can hardly be denied that some freedoms can be more devastating than slavery combined with careful tending to the needs of the oppressed, as \n\t\tin the case of the potions we provide for them.\"\n\t\t\n\t\tYou decide you have heard enough. The statue comes back to stone.\n\t\t*goto statues_r3\n\t\t\n\t#The gang leader \n\t\t\"It is now time to face justice,\" you tell the statue of the criminal mastermind and it comes to life.\n\t\t\n\t\t\"There is much in common between the two of us,\" he says. \"If you see an enemy with a sword in hand, ready to stab you, would you not defend yourself?\n\t\tThis is all I did. I had to act quickly, otherwise I'd go to jail. I am surprised that I am still being judged, maybe I didn't do something right to cover my trail.\"\n\t\t\n\t\t\"This is not the court you know from the physical world,\" the Guardian explains.\n\t\t\n\t\t\"But what would I be responsible for? I am just a cog in the corrupt system maintained by the nobles. They are the ones who made the healing potions \n\t\tillegal to distribute so that they could control the placement and charge higher prices. On the other hand, we are the ones who are actually helping the regular guys get what they need.\"\n\t\t\n\t\t\"I can see that you have a skill for bringing up arguments and I presume they have helped you become a gang boss. I have heard enough.\"\n\t\t\n\t\tThe man turns into a stone again.\n\t\t*goto statues_r3\n\t\t\n\t#Aya\n\t\t\"Oh, it is you again, nice to see you.\" She smiles. \"I guess you are here to judge me for what I attempted to do.\" She quickly becomes serious.\n\t\t\n\t\tYou just nod.\n\t\t\n\t\t\"Well, I can't deny my responsibility. What I can only say in my defence is that I was acting out of the need to survive and out of the love for my brother, but this \n\t\tcan be no justification for the heinous act I participated in. I plead guilty.\"\n\t\t\n\t\tShe rolls a few tears that turn to stone... together with her.\n\t\t*goto statues_r3\n\t\t\n\t#The common citizen \n\t\tThe common guy tells you a teary tale of how his wife got
