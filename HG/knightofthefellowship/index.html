<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Knight of the Fellowship — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "knightofthefellowship", "title": "Knight of the Fellowship", "scenes": {"choicescript_description": "Master the art of dancing with a weapon and unearth the secret of the temple, bringing love and carnage to the world. “Survive” an assassination attempt. Learn about the warrior’s honor of the Knights of the Temple. Allow those who tread the line between Light and Darkness show you their beauty. Embark on a night patrol mission with a militia officer that will lead you to the depths where the seeds of doom are growing. Finish your quest with honor and explore what your heart desires before going back to where you belong.\n\n[i]Knight of the Fellowship[/i] is a 50,000 word interactive fantasy novel by Ivailo Daskalov, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Play as a man or woman, gay or straight.[n/]\n• Master the techniques of lightning-quick blows and dodges, heroic leap charges and blade whirlwinds.[n/]\n• Learn about the honor of the Knight of the Fellowship.[n/]\n• Allow a dark lady to show you her beautiful side.[n/]\n• Choose between eight optional romances, or end up alone.\n\n", "choicescript_stats": "*stat_chart\n\ttext name Name\n\ttext gender Gender\n\n\ttext hp Health\n\ttext nrg Energy\n\ttext imp Imbalance\n\ttext wit Wit\n\ttext sceptic Scepticism\n\ttext xp Experience\t\n\n\ttext rel_arch Relations with Aya\n\ttext rel_fr Relations with Fresca\n\ttext rel_yan Relations with Master Yan\n\ttext rel_misery Relations with Misery\n\ttext rel_amy Relations with Amy \n\t\n*line_break\n\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $3.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "death": "*allow_reuse\nYou came to a sad end of your adventure\n*ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Knight of the Fellowship.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "part2": "Dawn is approaching and you are near the training grounds of the Fellowship.\n\n\"Maybe you should go and take some rest,\" Amy suggests.\n\nShe is technically right, it was not an easy duty, and you still don't feel fully rested after the ambush. On the other hand, the patrol starts from the barracks and is supposed to end there.\n\nWhat would you reply?\n*choice\n\t#\"You are right, thank you, I will go.\"\n\t\t\"It was a pleasure to be on duty with you. I believe we will meet soon because I am eager to check out what is going on below the temple.\"\n\t\t\n\t\t\"Goodbye, Amy. Take care.\"\n\t\t*goto 19\n\t\t\n\t#\"No, we should go to the barracks before I am free.\"\n\t\t\"The knights of the Fellowship are famous for strictly adhering to rules. I am not sure why I would expect you to go and rest before me,\" Amy says.\n\t\t\n\t\t\"There is something else,\" you argue. \"What if you get attacked on your way back? That would be the ideal opportunity.\"\n\t\t\n\t\tShe laughs. \"You are right, but I think it is highly unlikely.\"\n\t\t\n\t\tYou swing around the corner and head for the barracks. When you reach it, you bid Amy goodbye and wish her a nice rest. She replies that she will contact you soon regarding the investigation of the temple.\n\t\t*goto 19\n\n*label 19\n*page_break\nAs soon as you go into your quarters and hit the pillow, you fall asleep.\n\nThe dream takes you to a place of eternal peace, a beautiful temple with multicolor glass roof. Your soul mentor is there in her dress of many folds and ribbons, her platinum blond hair loosely touching her \nshoulders. Her inquisitive dark eyes meet yours.\n\n\"I expected you earlier, warrior,\" she says. \"I was worried that you may have been in trouble.\"\n\n\"I am sorry, dear one,\" you reply. \"I was patrolling the streets of the town.\"\n\nShe sighs. \"Should I remind you that as strong as your soul is, the body that you are currently occupying is not. You must not push its boundaries.\"\n\nYou nod. \"There is wisdom in what you say. Speaking of which, how is the original owner of the body?\"\n\nYour soul mentor closes her eyes, probably establishing a telepathic link, and smiles. \"He is feeling well and so far proud of what you have accomplished. It seems you are on the verge \nof making a big revelation. If I didn't know you well enough, I would say that I am impressed. But I have known you forever and I am used to it.\"\n\n\"You can look into timelines. What is it that you see lying in front of me?\"\n\nShe closes her beautiful eyes again. \"A few tough battles to fight and friendships of pure hearts to cherish. Now, I will let you rest, dear one,\nas this is what you need the most right now.\"\n*page_break\n\"Hey, wake up, warrior,\" you hear and a gentle tap on your shoulder puts your sleep to an end. \n\nYou open your eyes and see that there is a lot of light. Your guess is that it is close to noon. And Fresca has come to bug you... or just check out how you are doing.\n\n\"I was worried about you, ${name}. Yesterday morning you were still very injured and still you enrolled for a nigh patrolling shift. I have seen knights looking even tougher than you fall like \nleaves because of internal wounds I was not able to diagnose.\"\n\nWhat would you do?\n*choice\n\t#Assure her that you are alright\n\t\t\"I am so happy about it. I know that many warriors would try to sound much better than how they actually feel, but I trust you.\"\n\t\t*goto 20\n\t\t\n\t#Joke that it was her fault that she had been able to diagnose those\n\t\t*set rel_fr -1\n\t\t\n\t\tShe frowns. \"That is not even remotely funny. I am doing my best but I am human and I make mistakes too. Sometimes I wonder why I am wasting my time and energy on you.\"\n\t\t\n\t\tYou feel bad about killing her mood and apologize, which seems to have some effect on her.\n\t\t*goto 20\n\t#Simulate a physical problem \n\t\t*set wit +1\n\t\t*set rel_fr +1\n\t\t(Wit+)\n\t\t\n\t\tYou start saying something and then dramatically put both your hands on your chest and start wriggling. \n\t\t\n\t\tFresca falls for it for a second but the serious expression on her face makes it very hard for you to continue that theatrical scene and you give out a laud laugh.\n\t\t\n\t\tThe healer follows your example and laughs to tears while threatening to kill you.\n\t\t*goto 20\n\n*label 20\n*page_break\nFresca changes your bandages and uses some ointment to make them heal quicker. The aroma is actually very nice and the feeling of it soothes the remains of your cuts.\n*set hp +2\n\n(Health++)\n\n\"How did you find out where I was last night?\" you ask.\n\n\"I spoke with the commander and I almost got into a quarrel because of his sending you on the night patrol.\"\n\nHow would you reply?\n*choice\n\t#\"You should be careful with the Commander. I don't want you to get into trouble because of me.\"\n\t\t*set rel_fr +1\n\n\t\t\"Aw, do you need to be that charming and caring?\" She smiles and what you see in her eyes is a wave of emotions.\n\t\t\n\t\t\"It is hard not to care about you, Fresca, you've helped me so much with my wounds,\" you explain while telltale warmth spreads around your cheeks.\n\t\t*goto 21\n\t\t\n\t#\"The Commander asked me if I was ready for that. I volunteered, he didn't make me do it.\"\n\t\tShe sighs. \"Yes, this is what he explained too, and still I told him that he should have asked for my opinion before letting you go. I know that technically \n\t\tit is not required and now I think that I overreacted. But, you know, sometimes I tend to accumulate a lot of fire in me. But thanks for explaining that, I really wanted to hear a confirmation.\"\n\t\t\n\t\t\"You don't trust the commander?\" you ask.\n\t\t\n\t\t\"I tend to have trust issues from time to time, it is nothing personal against him,\" she explains.\n\t\t*goto 21\n\t\t\n\t#\"I don't think it is good to quarrel with a superior.\"\n\t\t*set rel_fr -1\n\t\t\n\t\t\"Do you think I don't know that?\" She gives you a cold look. \"What's done is done, I can only hope that next time I won't be as firy with him.\"\n\t\t*goto 21\n\t\t\n*label 21\n*if (rel_fr>3)\n\tFresca sits on the bed behind you and starts massaging your shoulders and back. You can swear that there is some magic she is doing with her hands. They feel so \n\tgentle and smooth and yet they manage to make your muscles dance under the skin.\n\t*set hp +1\n\n\tAnd then she moves her hands to your forearm, gently petting them. It seems that her massage is taking an unexpected direction and she confirms that with a kiss on the back of your neck.\n\t*page_break\n\t*if attr_fem\n\t\tYou can't deny that Fresca is a beautiful woman and she has her way of making you feel comfortable, but would you like to let her go on, or rather not get involved with her?\n\t\t*choice\n\t\t\t#Go with the flow\n\t\t\t\tYou sigh with pleasure, encouraging her to go on and after she gives you three more kisses on your back and shoulders you turn around and push her down into a more comfortable \n\t\t\t\tposition in the bed.\n\t\t\t\t\n\t\t\t\t\"Now let's see how well you feel,\" she laughs as you come down and kiss her while your hands slide down her body.\n\t\t\t\t\n\t\t\t\t*set partner \"Fresca\" \n\t\t\t\t*page_break\n\t\t\t\tHalf an hour later she gets up and tries to sort her hairstyle and get dressed. \"The medical examination showed that you are in great shape but I would rather check more often, you know\n\t\t\t\tjust trying to be professional.\" She smiles.\n\t\t\t\t\n\t\t\t\t\"Do you often conduct such examinations?\" you ask her.\n\t\t\t\t\n\t\t\t\t\"Don't be ridiculous. I can barely stand anybody when it comes to romance. However, I've had my eyes set on you for a long time. I've dreams of having that experience \n\t\t\t\twith you and only you for nights on end.\"\n\t\t\t\n\t\t\t\tShe winks at you and blows you a kiss as she leaves your room.\n\t\t\t\t\n\t\t\t\tAnd then you realize how seriously she is taking what happened between you.\n\t\t\t\t*goto 22\n\t\t\t\t\n\t\t\t#Ask her to stop \n\t\t\t\t\"Wait, Fresca, I can't do it,\" you say.\n\t\t\t\t\n\t\t\t\tShe moves in front of you and looks you in the eye. \"Why, am I not good enough for you?\" Her teary eyes betray a sad story.\n\t\t\t\t\n\t\t\t\t\"It is not like that, you are a very attractive woman and it would be a great honor for anybody to be with you, but right now I can't open \n\t\t\t\tmy heart to you, or any other whatsoever.\"\n\t\t\t\t\n\t\t\t\tShe gets up and wipes her tears. \"I knew I shouldn't have done this but I just desire you very much. But it is okay, I knew we never stood a chance, so please excuse me.\"\n\n\t\t\t\tBefore you manage to utter a word, she gets out of your room.\n\t\t\t\t*goto 22\n\t\t\t\t\n\t*else\t\t\n\t\t\"Wait, Fresca, I can't do it,\" you say.\n\t\t\t\t\n\t\tShe moves in front of you and looks you in the eye. \"Why, am I not good enough for you?\" Her teary eyes betray a sad story.\n\t\t\t\t\n\t\t\"It is not like that, you are a very attractive woman and it would be a great honor for anybody to be with you, but I am not attracted to females, and you happen to be \n\t\tvery feminine. It is not your fault... it is really me.\"\n\t\t\t\t\n\t\tShe gets up and wipes her tears. \"I knew I shouldn't have done this but I just desire you very much. And, I hoped that you were not only into men. But it is okay, I knew we never stood a chance, so please excuse me.\"\n\n\t\tBefore you manage to utter a word, she gets out of your room.\t\t\t\t\n\t\t*goto 22\n*else\n\tFresca says that she is happy that you are feeling better and adds that there are other patients to attend to, so she wishes you a good day and leaves your room.\n\t*goto 22\n\t\n*label 22\n*page_break\nYou expect Amy to come and talk to you later today about the investigation of the Temple of Reptilians, so you probably have some time to settle other matters, or even prepare.\nVisiting the temple within the Fellowship and talking to Deacon Walter may be a good idea. You are also thinking of contacting Moonshadow. The only way you could think of is visiting the Hall of Meditations and \nasking Master Yan to help you with an out-of-body experience. And, you may also have a reason to talk to Recruiter Alorso.\n*goto 23\n\n*label 23\n*page_break\nWhere do you go now?\n*choice\n\t\t*hide_reuse #To the Temple of Mystics\n\t\t\t*goto 24\n\t\t\t\n\t\t*hide_reuse #To the Meditation Chambers\n\t\t\t*goto 25\n\t\t\t\n\t\t*hide_reuse #To the Recruiter \n\t\t\t*goto 26\n\t\t\t\n\t\t#Finished with the explorations\n\t\t\t*goto 27\n\t\t\t\n*label 24\nYou find Deacon Walter next to the Altar with a paintbrush in hand, drawing some runes on it. You don't have any idea regarding what they mean, but the \nserious expression on his face tells him that it is probably something important.\n\nYou greet him and he turns to meet your eyes, a big smile on his face as always. \"I am happy to see you again, ${name}. I think I am getting to a mind block with the riddle I am \ntrying to solve. I think it would be nice to be distracted with something.\"\n\n\"I hope I am not interrupting anything important,\" you say out of politeness.\n\n\"Not at all. How are you doing?\"\n*goto 241\n\n*label 241\n*page_break\nWhat would you do?\n*choice \n\t*selectable_if (lamp) #Show him the lamp with the captured demon\n\t\tThe Deacon's eyes widen when he sees the lamp. \"Don't tell me there is a demon inside.\"\n\t\t\n\t\tYou just nod.\n\t\t\n\t\t\"What would you want me to do with it?\" he asks.\n\n\t\tYou wonder for a second. It would be nice to have that creature reformed and able to live according to the principles of love and light, but the question is whether you can really trust that creature.\n\t\tMaybe it would be easier to just ask the Deacon to banish it so that it causes no trouble in this realm. \n\t\t\n\t\t\"Whatever it is, I would appreciate that you can contribute with a a bit of your energy,\" the Deacon says and this is the moment where you come up with the third option - to just ask him to keep it in a safe place.\n\t\t*choice\n\t\t\t#Ask him to banish it (costs 1 energy)\n\t\t\t\t\"That seems to be the safest decision. It is too bad the demon is most likely to go to a place where harm can be done, but still it will be a contribution to this realm.\"\n\t\t\t\t\n\t\t\t\tHe puts the lamp on the altar, draws some runes and sings and incantation. Then, the Deacon asks you to put your hands on the altar for just a second. As you do you feel unpleasant \n\t\t\t\tcoldness creeping up your arm.\n\t\t\t\t*set nrg -1\n\t\t\t\t*set xp +1\n\t\t\t\t*set lamp false\n\t\t\t\t*achieve demon_banisher\n\t\t\t\t\n\t\t\t\t(Energy-; Experience+)\n\t\t\t\t*goto 241 \n\t\t\t#Ask him to reform it (costs 2 energy)\n\t\t\t\t\"That will consume a bit more energy. The demon will be assigned to a disciple of ours.\" He makes a sign to a young woman to come and briefly explains her the task at hand. Then, he asks you to touch her fingers.\n\t\t\t\tAs you do you feel unpleasant \n\t\t\t\tcoldness creeping up your arm.\n\t\t\t\t*set nrg -2\n\t\t\t\t*set xp +2\n\t\t\t\t*set lamp false \n\t\t\t\t*achieve demon_trainer\n\t\t\t\t\n\t\t\t\t(Energy--; Experience++)\n\t\t\t\t*goto 241 \n\t\t\t\t\n\t\t\t#Ask him to keep it in a safe place\n\t\t\t\t\"It is not the decision I would recommend because you never know who will be after this creature, you know, trying to set it free. But, I know that you may have better uses for your energy \n\t\t\t\tand I don't want to spend any of mine or the one belonging to the disciples here because of the work we need to concentrate now. However, I can promise you to take good care of it.\"\n\t\t\t\t\n\t\t\t\tYou thank him very much.\n\t\t\t\t*set lamp false \n\t\t\t\t*set demon_prisoned true \n\t\t\t\t*goto 241 \n\t\t\t\t\n\t#Tell him about your last night's adventures and wanting to examine the underground level of the Temple of Reptilians\n\t\t\"I have never been keen on that Temple. Many times I've met with their priest but I always get their cold radiance that feels repugnant. I also dislike their \n\t\tarrogance and how they want to keep some of the most valuable reagents for themselves. So, if you go there and manage to borrow some stuff, I would be very happy. Did you manage \n\t\tto see the cauldron? I wouldn't want to get into details but we are after something big and we are not very likely to have it unless we add arcane dust, reptilian egg shells and the fangs of a holy anaconda.\"\n\t\t\n\t\t\"Do you want me to steal those?\" You decide to use straight language.\n\t\t\n\t\t\"Well, to be honest, yes. I know it is not the most noble feat but I can assure you they will be used for good purpose, in accordance with the principles we serve.\"\n\t\t\n\t\tWhat would you reply?\n\t\t*choice\n\t\t\t#\"Sure, I would be glad to help.\"\n\t\t\t\t*set angel true \n\t\t\t\t\"Thank you in advance.\" the Deacon smiles.\n\t\t\t\t\n\t\t\t\tAnd yet there are traces of uneasiness inside you...\n\t\t\t\t*set imp +1\n\t\t\t\t\n\t\t\t\t(Imbalance+)\n\t\t\t\t*goto 241\n\t\t\t\t\n\t\t\t#\"No way, I am not a thief.\"\n\t\t\t\t\"Well, I kind of expected to hear that, but I really had to try.\"\n\t\t\t\t\n\t\t\t\tYou have no reason not to trust Deacon Walter and you have enough experience to know that sometimes the aim is worth the means, but there is a small part of you that \n\t\t\t\tfeels better about not involving in a shady business.\n\t\t\t\t*set imp -1\n\t\t\t\t\n\t\t\t\t(Imbalance-)\n\t\t\t\t*goto 241 \n\t\t\t\t\n\t#Ask him about what he is doing\n\t\t\"I am trying to uncover a prophecy. You know, I am using my intuition to draw runes and get clues on how to interpret the words of a prophecy. \n\t\tThis one is particularly hard to uncover because some of the text is missing because the parchment has not been well-preserved and it is in a language that \n\t\tvery ancient and I don't understand very well. What I get is that it is not as important as a doomsday prophecy but is related to the current times.\"\n\t\t\n\t\t\"What is it about?\" you enquire.\n\t\t\n\t\t\"It talks about a possession of a kind, but not in the malevolent sense in which a dark magician would do it, more like a benevolent dance between on who \n\t\tcan no longer remain here and a spirit that wishes to come to the physical here in order to do work. I also get the image of a lady in a white dress mentoring that\n\t\tperson.\"\n\t\t\n\t\tYou feel that your pulse quickens, he must be talking about you.\n\t\t\n\t\t\"What is the message of the prophecy,\" you ask.\n\t\t\n\t\t\"That person should be helped because they have important feats to accomplish.\"\n\t\t\n\t\tWould you like to tell him that you are the one the prophecy talks about?\n\t\t*choice\n\t\t\t#Yes\n\t\t\t\t\"Can we talk somewhere in private, please?\" you ask the Deacon.\n\t\t\t\t\n\t\t\t\t\"Sure.\" He leads you to the practice room where there is nobody right now.\n\t\t\t\t\n\t\t\t\tYou explain the story of yours since you became a walk-in. He seems amazed.\n\t\t\t\t\n\t\t\t\t\"I knew that there was something about you that I just couldn't put my finger on. And, I am happy that the prophecy I was intuitively led to actually \n\t\t\t\tled me to the one it talks about. Please, take this.\" He removes the pendant from his neck and gives it to you. \"According to the prophecy, you should wear the \n\t\t\t\tmedallion of the one in charge of the Temple of Mystics, and that should refer to mine.\"\n\t\t\t\t\n\t\t\t\t\"Thank you very much, it is a great honor,\" you say while putting the ornament around your neck.\n\t\t\t\t\n\t\t\t\t\"No, don't mention it. I will continue with the prophecy to see in what other ways I should assist you.\"\n\t\t\t\t*set prophecy true\n\t\t\t\t*set pendant true\n\t\t\t\t*goto 241\n\t\t\t\t\n\t\t\t#No\n\t\t\t\t\"That is interesting, I wish you good luck with finishing decoding the message,\" you say with a smile that probably doesn't say it all.\n\t\t\t\t*goto 241\n\t\t\t\n\t#Bid him farewell\n\t\t*goto 23\n\t\t\n*label 25\nYou go to the Meditation Chamber and find Master Yan meditating in a lotus form. He listens to your story attentively but the idea of contacting a negative entity does not appeal to him very much.\n\n*if rel_yan>1\n\tHe scratches his chin. \"I wouldn't normally do it but I will make an exception for you. Please sit down.\"\n\t\n\tYou do and as Master Yan guides you into a meditation, you drift away.\n\t*page_break\n\tYou find yourself in a dungeon. You are sure that your body is still with the Master and it is your spirit only that is having the experiences.\n\t\n\tMoonshadow enters the room full of various torture devices. \"I don't remember inviting you here,\" he says in a calm voice that yet manages to give you the creeps.\n\n\tYeah, maybe he doesn't need to have other emotions, as he probably is the master of this unholy place and his powers must be even greater, your intuition says.\n\t\n\t\"What is it that you seek, knight?\" he asks.\n\t\n\t\"I am ready to start the investigation of the Temple of Reptilians. However, I don't feel prepared. I want to ask you for help. Information, power, anything that can be of use to me down there.\"\n\t\n\tHe chuckles. \"I obtained the power I have through sacrificing most of my soul. Of course, you are of the Light, so that would not be an option to you. Maybe it is time for me \n\tto reclaim some of what I lost by helping you. And yet, I can't help you much until you obtain the two ritual daggers, the Shard of Blood and the Edge of Darkness. Those \n\tancient artifacts originally belonged to the necromancers and I would love to get them back. There lies the truth about our kind. Now, go with peace before any of my jailers finds you.\"\n\t\n\tAnd so you go back to your body.\n\t*page_break\n\tYou thank Master Yan very much for the help and leave the chamber.\n\t*goto 23\n\t\n*else\n\t\"I am sorry, my friend, I can't really do it. I hope you forgive me.\"\n\t\n\tYou thank him anyway, hardly able to hide your frustration.\n\t*goto 23\n\n*label 26\nThe recruiter greets you, giving you a questioning look above his glasses.\n*if (mentor=2)\n\t\"I bet you want to spend some time with Aya. I am sure you could find her at the shooting range. She trains a lot and some of the knights \n\tsay that she is very good.\"\n\t\n\tWhat would you reply?\n\t*choice\n\t\t#\"Yes, I will go and see her.\"\n\t\t\t\"This is very good. I wish you a good day!\" The recruiter smiles and writes something down in a book.\n\t\t\t*goto 261\n\t\t\t\n\t\t#\"Actually, I don't have time for that now.\"\n\t\t\t\"Then get off my sight,\" says the Recruiter and writes something down in a book.\n\t\t\t*goto 23\n\t\t\n*elseif (mentor=1)\n\t\"I bet you would like to spend some time with the apprentice I chose for you to mentor. His name is Nick and he is most likely to be found \n\tnear the training dummies. I think he is very good with the sword, for a beginner that is.\"\n\t\t\n\tWhat would you reply?\n\t*choice\n\t\t#\"Yes, I will go and see him.\"\n\t\t\t\"This is very good. I wish you a good day!\" The recruiter smiles and writes something down in a book.\n\t\t\t*goto 262\n\t\t\t\n\t\t#\"Actually, I don't have time for that now.\"\n\t\t\t\"Then get off my sight,\" says the Recruiter and writes something down in a book.\n\t\t\t*goto 23\t\n\n*else\n\t\"You haven't changed your decision about the mentoring program, have you?\" he asks you directly.\n\t\n\t\"Well, not exactly...\" you mutter.\n\t\"Then get off my sight,\" says the Recruiter and writes something down in a book.\n\t*goto 23\n\t\n*label 261\n*set rel_arch +1\n*set xp +1\n(Experience+)\n\nThe wind covers the noise of your steps and you manage to get close to her without hearing you. She shoots an arrow that travels a strange path before being carried by the air current right into the \nmiddle of the target.\n\n\"That was a great shot,\" you say.\n\nAya drops down the bow. \"Hello, ${name}. I didn't expect to see you today. I heard you spent the night patrolling around town and thought you would rest today.\"\n\n\"Well, as your mentor, I could at least check how you are doing,\" you reply.\n\n\"It is great, I love it. The knights seem to accept me as one of their own, without prejudice. It is very different from how the criminals treat newcomers.\"\n\n\"Well, this is maybe because the knights are very different from the goons,\" you say and enjoy her laughter. \"I see that you are a master of marksmanship, but what about your \nskills with the sword? I see that you have received one.\" You take a look at her waist.\n\n\"Yes, I went to the quartermaster. He helped me a lot in choosing the right blade for me. And there is such a variety.\"\n\n\"Very well, let's see how well you can wield it, mind you?\"\n\n\"Not at all, I think it would be fun.\"\n\nYou spend a bit over an hour teaching her techniques. It seems that she doesn't have much experience, but is a keen student. While you are dancing with the swords, the thought of you asking her more about the gang that ambushed you passes through \nyour mind, but you decide not to bring up the topic. You are about to engulf in another story, one that seems to be more important.\n\nWhen the lesson is over, you wish her a nice day and walk away.\n*goto 23\n\n*label 262\n*set xp +1\n\n(Experience+)\n\nYou go to the swords fighting arena and ask who Nick is. You are quickly appointed to a young well-built man wielding the blade with proficiency rarely seen among people his age.\n\n\"My name is ${name} and I was appointed to be your mentor. Where did you learn to fight like that?\"\n\n\"The pleasure is mine,\" he bows. \"I grew up in the camp of the Fellowship in the city of Fold and since an early age I've been trying to master this skill. I met my current wife \nwhile I was fighting in a tournament. She is from this town, so I asked to be transferred here. Her name is Macy and she works at the bakery.\"\n\n\"This is very good, boy, I am happy you have found love,\" you remark with a smile.\n\n\"Thank you. I think that you have made a good choice to mentor me over that indecent woman that now stains the Fellowship.\"\n\n\"Do you know her?\" you ask.\n\n\"No no and I am happy I don't. But I've heard enough about her. She was involved in an attack against you, right?\"\n\nYou sigh,\"I really don't want to discuss that, Nick. However, I see in you a lot of aggression that may be your weakness. Please, take it into consideration.\" \n\n\"Thank you. I will have it in mind.\"\n\n\"Now I need to go. I am sorry I can't pay more attention to you right now, but I see that you are doing fine on your own.\"\n\nYou bid him farewell and walk away.\n*goto 23 \n\n*label 27\n*page_break\nAs you walk away, you hear the noise of children running and screaming. A little girl passes just in front of you, almost stepping inside a paddle right next to the well. And then a boy follows her, almost \ntreading on you, only to run right into the water, sliding and falling right in. The splash reaches your pants.\n\nHow would you react?\n*choice\n\t#Help the boy get up\n\t\t\"Easy boy, you should be more careful.\" You grab him by the shoulders and raise him. \"You don't want to accidentally fall into the well, so you.\"\n\t\t\n\t\tHe shakes his head, thanks you and continues the chase.\n\t\t\n\t\tYou sigh and walk on as well.\n\t\t*set imp -1\n\t\t\n\t\t(Imbalance-)\n\t\t*goto 28\n\t\t\n\t#Do nothing\n\t\tYou just watch as the boy stands up and continues the chase as if nothing happened.\n\t\t*goto 28\n\t\n\t#Reproach him\n\t\tHe looks at you with his big eyes and apologizes, then continues the chase.\n\t\t\n\t\tIt is hard to explain why, but you feel bad about reproaching an act of juvenile freedom.\n\t\t*set imp +1\n\t\t\n\t\t(Imbalance+)\n\t\t*goto 28\n\t\t\n*label 28\n*page_break\nAmy turns out, just as you expected.\n\n\"Hello, militia warrior. You look refreshed,\" you note.\n\n\"Greetings, knight. Are you ready to start the investigation at the Temple of Reptilians?\" she asks you directly.\n\n\"I bet it will be easier said than done,\" you reply. \"I have the feeling that they won't let us go in if we get there.\"\n\nShe nods. \"The High Priest was pretty explicit about it. Maybe we should have let the necromancer have him.\"\n\n\"I am not sure. It seems he doesn't want to intervene too much. All seems to rest on us.\"\n\nAmy scratches her chin. \"That makes sense. A necromancer can be expected to seek personal vengeance but not to be in service to the whole city.\"\n\n\"Well, I wouldn't turn off any help he could give us, but that doesn't seem to be very likely.\" You remark. \"Okay, if we don't just knock on the door of the temple, what would be the other options? Maybe ask the Militia Chief about a legal permission? Or our Commander for assistance?\"\n\n\"I doubt, ${name}. The temple is too influential and guards its secrets too aggressively. Without a clue, I doubt any of them would like to intervene.\"\n\nYou think for a moment. \"I don't know, maybe we should at least tell them where we are going in case we get captured.\"\n\n\"Nice, but if any of them is on good terms with the Temple, he could let the cat out, so that also entails risks. I would be cautious when it comes to a corrupted mongrel as the Militia Chief, but we are \ntogether into it and if you insist, you can do it.\"\n\nYou nod. \"And the only other remaining option seems to be to to try to sneak in without being noticed, right?\"\n\nAmy sighs. \"I bet neither of us is an expert in sneaking, but I bet there are secret entries and we just have to find one of them.\"\n*goto 29\n\n*label 29\n*page_break\nWhat do you do?\n*choice\n\t*hide_reuse #Talk with the Commander of the Fellowship\n\t\tThe Commander listens to your story carefully without showing any emotion. Then, he says: \"I can't intervene in the secret matters of the Temple. If they don't want to let you in, that is their choice.\n\t\tNow, I can't directly forbid you to stick your nose where you probably don't have to, because it is not the role of the leader of this organization to tell its members how to serve the light. I also don't want to involve \n\t\tother knights... unless I have a reason to think that you are in danger, which I will have to assume provided that you don't show here until tomorrow morning. And then I will seek responsibility for your \n\t\tdisappearance with all means I have.\"\n\t\t\n\t\tYou thank the Commander.\n\t\t*goto 29\n\t\t\n\t*hide_reuse #Talk with the Militia Chief\n\t\tIt is very difficult to get to the Chief because there seem to be a lot of people eager to talk to him. Many of them appear to be wealthy traders who seem to enter his office with full bags and leave with emptier ones.\n\n\t\tThere is a feeling inside you, telling you that you probably should not speak to him.\n\t\t*choice\n\t\t\t#Listen to it\n\t\t\t\tJust as your turn to enter comes, you claim that you have forgotten about an important meeting, ask to be excused and walk away.\n\t\t\t\t\n\t\t\t\t\"You've made the right choice,\" Amy whispers as you leave the building.\n\t\t\t\t*goto 29\n\t\t\t\t\n\t\t\t#Ignore it and speak with the Militia Chief\n\t\t\t\t*set xp -1\n\t\t\t\t(Expereince-)\n\t\t\t\tThe Chief seems to pay little attention to your story, while playing with a chaplet. When you are finished, he gives you a long speech about how important the Temple of Reptilians has been \n\t\t\t\tthroughout the history of the town and how he suspects nothing unusual or malevolent in their activities.\n\t\t\t\t\n\t\t\t\tHe also forbids Amy from sticking her nose into the matters of the Temple. She just nods.\n\t\t\t\t\n\t\t\t\tWhen you leave the Militia Headquarters, you ask her if you are left alone on the mission.\n\t\t\t\t\n\t\t\t\t\"Don't be ridiculous,\" she snaps back. \"If I listened to him every time I would be able to do nothing good for the town. I actually hope that we will find something incriminating him and he \n\t\t\t\twill leave his position in favor of somebody who is more decent.\"\n\t\t\t\t*goto 29 \n\t\n\t#Go to the temple \n\t\t*goto temple_rep \n\n*label temple_rep\n*page_break\nAmy and you stand before the temple, a tall pyramid towering all the buildings in the town. You can't help but feel like an ant in front of a powerful enemy. You \nlook at the eyes of the militia woman and can almost tell that she is thinking the same.\n\n\"Have you been inside?\" you ask her.\n\nShe shakes her head. \"It is not my religion. Have you?\"\n\n\"Nope. But what do we do now? It sounds stupid to just go in there and talk with the High Priest. Even if he doesn't let us conduct our investigation, we may still learn something?\"\n\n\"And what if this is just a death sentence?\" she asks. \"I don't trust those priests, I can sense dark energy steaming from this damned building. I can't imagine working in such a place. It has nothing to do with the \nholy place I used to inhabit.\"\n\n\"I would love to hear more about it later,\" you say. \"Now… what other options do we have?\"\n\n\"I would suggest trying to find a secret entrance.\"\n\n\"How do you know there is any?\" you inquire.\n\n\"I don't,\" she shrugs. \"It just makes sense for a secretive cult like this.\"\n\nYou have to admit what she says makes some sense. \"And how do we find it?\"\n\n\"I don't know, maybe just hide in the bushes and watch. Or, I can try to do something that I haven't done for such a long time—pray to the Light.\"\n\nWhat would you decide?\n*choice\n\t#Enter the temple through the main entrance\n\t\tYou walk up the stairs to the entrance of the temple trying to hide your nervousness that is aggravated by the two muscular temple guards in front of it. They have helmets \n\t\tthat seem to be made of heads of giant snakes. You wonder if they are real, or just very good imitations.\n\n\t\tAs you approach they cross their long spears, barring your way.\n\t\t\n\t\t\"Isn't the temple open to… followers?\" you ask.\n\t\t\n\t\t\"You are no followers. Whatever business you have, you should just turn your back and walk away!\" His eyes show determination that you don't want to test.\n\t\t\n\t\tHowever, you can't deny that a Knight of the Fellowship and a Militia Officer would hardly make good temple patrons.\n\t\t\n\t\t\"We want to speak with the High Priest,\" Amy hisses.\n\t\t\n\t\t\"He is busy,\" says the other guard.\n\t\t\n\t\t\"Do you know that we saved his life last night? Were it not for us, you'd have to elect a new one because the one you refer to now would be eaten alive by the undead.\"\n\t\t\n\t\tThe guards look at each other and order you to follow them.\n\t\t\n\t\tAmy smiles behind their backs.\n\t\t*page_break\n\t\tYou are amazed at how spacious the temple looks from inside. The walls are painted in murals depicting battles and scenes of horror involving snakes and reptilian humanoids. You \n\t\thave the feeling that it is a very bad place and the first shades of fear start crawling under your skin. \n\t\t\n\t\tThe guards take you to a chamber and let you go in. Amy thanks them, to which they don't respond.\n\t\t*page_break\n\t\tThe High Priest sits on a throne on a pedestal in the center of the chamber, eating a red apple. When he sees you, he growls and throws it on the ground. An iguana the size of a pig \n\t\truns from behind the throne and eats the leftovers while watching you curiously with one eye.\n\t\t\n\t\t\"What do you want? Your very presence desecrates this holy temple!\"\n\t\t\n\t\t\"Is it how you greet your saviors?\" Amy snaps back.\n\t\t\n\t\t\"Speak quickly, I have no time for you rattling,\" he warns you.\n\t\t\n\t\t\"We want to check out the underground part of the temple. I know that you told us you wouldn't let us do that but we thought you would reconsider.\"\n\t\t\n\t\tThe High Priest laughs maniacally. \"There are no underground parts.\"\n\t\t\n\t\t\"But last night...\" Amy says.\n\t\t\n\t\tThe man on the throne shrugs. \"I guess I was just too stressed, for which I wish to be excused.\"\n\t\t\n\t\tAs if waiting for his signal, the guards come in and escort you outside.\n\t\t*page_break\n\t\t\"I think that visit was in vain,\" says Amy. \"Did you feel the grasp of darkness in your chest as we exited the room of the High Priest?\"\n\t\t\n\t\tYou shake your head. \n\t\t\n\t\t\"I hope I am imagining things, but I think it was some kind of a curse.\"\n\t\t\n\t\tShe looks very pale. \"What do we do now?\"\n\t\t*set amy_exhausted true \n\t\t*choice\n\t\t\t#Hide in the bushes \n\t\t\t\t*goto bushes \n\t\t\n\t\t\t*selectable_if (sword_power=\"Clairvoyant\") #Use the Clairvoyant power of your sword\n\t\t\t\t*goto vision \n\t\t\t#Ask Amy to cast a prayer\n\t\t\t\t*goto prayer \n\t\n\t#Hide in the bushes \n\t\t*goto bushes \n\t\t\n\t*selectable_if (sword_power=\"Clairvoyant\") #Use the Clairvoyant power of your sword\n\t\t*goto vision \n\t\n\t#Ask Amy to cast a prayer\n\t\t*goto prayer \n\n*label prayer\n*set prayer true\nAmy doesn't want to attract the attention of the passers-by, so she asks you to hide in the bushes. You follow her and you see her put her hand on her heart \nand start whispering something you don't quite understand. To your amazement, she starts glowing, but that is only the beginning. The light becomes stronger and a sword-wielding \nangels appears next to you.\n\n\"It is nice to hear from you again, Amy,\" says the angel, a tall dark-skinned figure dressed in a long white robe.\n\n\"Forgive me, Uzuriel...\" she whispers, tears rolling down her cheeks.\n\nHe laughs. \"There is nothing to forgive you for, dear one. I can see that your soul is as clean as ever, and I know that you left the Church of Light trying to escape the pain of heartbreak. All this time, I was watching you behind the thin veil, trying to send you love in the hard moments and even appearing in dreams you can't remember. Instead of forgiving you, I would only ask that you never forget that you are loved at all times.\"\n\nAmy wipes her tears and glows with a big smile.\n\n\"I know that you are on an important mission, so I won't waste more of your time. The secret passage can be found if you jump over the wall behind the temple, then push the \n13th stone on the third row. But before I go, I will tell you that inside you will find the peace your heart has been seeking all those years. I bid you two peace and strength.\"\n\nBefore you manage to thank him, he disappears.\n\n\"Well, you have impressive friends,\" you joke.\n*goto jump\n\n*label vision \nYou grasp the grip of the sword firmly and connect with its consciousness while trying to envision Amy and you getting in the undergrounds of the temple.\n\nThe reply is immediate, although it is hard for you to get the details. You only get that you should jump over the wall behind the temple and search there.\n*goto jump\n\n*label bushes\nAlthough you are not very optimistic about this option, you still decide to try it. Time passes rather slowly and you are about to give up when you see a man dressed in the robe of the temple \njump down from the wall behind the temple.\n\n\"Did you see that too?\" you ask Amy.\n\nShe nods and as soon as the templar is out of sight, you get out of your cache and approach the wall.\n*goto jump\n\n*label jump\n*page_break\nThe wall appears to be quite high. Not too high for your trained body to conquer if you didn't have the armor, but you have your doubts you will be able to do that wearing the breastplate\nand helm.\n\nThe way Amy looks at you suggests she is thinking the same.\n\n\"Maybe we should hide our armor in the bushes, what do you think?\" she suggests.\n\n\"I don't like the idea. I guess we can do that well enough so that we could disregard the risk of somebody finding it. However, I would feel naked and I expect a lot of \ndangers down there,\" you reply.\n\n\"But maybe it will be easier that way. If we have to sneak undetected, it would be much easier without all the clanking that accompanies our every move.\"\n\nYou scratch your chin and realize you must admit that what she says makes sense.\n\nWould you remove and hide your armor?\n*choice\n\t#Yes \n\t\t\"Please, look away!\" Amy jokes while removing the chainmail dress. The comfy trousers and shirt beneath show nothing.\n\n\t\tYou chuckle. \"No way.\" You put your breastplate off and put it next to her armor near the roots of a low and wide tree.\n\t\t\n\t\tJumping over the wall is peace of cake without the weight.\n\t\t*set no_armor true \n\t\t*goto jump2\n\t\t\n\t#No\t\n\t\t\"I just can't do it,\" you say.\n\t\t\n\t\t\"So be it,\" she sighs. \"I guess if you are going to make noise with every move, it would be better for me to at least have the extra protection of my \n\t\tchainmail dress.\"\n\t\t\n\t\tYou nod and help her reach the top of the wall. She offers you a hand, but you refuse it. The last thing you need is bringing her down, especially on the side that you don't want to be.\n\t\t\n\t\tWould you like to use some energy to power your jump?\n\t\t*choice\n\t\t\t#Yes \n\t\t\t\t*set nrg -1\n\t\t\t\t(Energy-)\n\t\t\t\t\n\t\t\t\tThe energy charge launches you in the air, you stop on top of the wall next to Amy, wait for a moment and then descend on the other side.\n\t\t\t\t*goto jump2\n\t\t\t\t\n\t\t\t#No \n\t\t\t\t*set hp -1 \n\t\t\t\tWhile you are pulling yourself up to the top of the wall, you feel as heavy as a metal statue. By the time you get there, your muscles are trembling \n\t\t\t\twith the strain. Maybe this is why you have trouble maintaining your position on top and actually fall on the other side with a loud thud.\n\t\t\t\t\n\t\t\t\t(Health-)\n\t\t\t\t\n\t\t\t\t\"Are you alright?\" Amy asks, not sure whether to laugh or be concerned about you.\n\t\t\t\t\n\t\t\t\tYou nod in reassurance. She descends gracefully and offers you a hand to help you stand up.\n\t\t\t\t*goto jump2 \n*label jump2\n*page_break\n*if prayer\n\tYou remember the instructions of the angel and push the tales as he told you. A ladder descends to a corridor leading underground. \n\t*goto in_temple \n\t\n*else \n\tIt takes you some time to figure out where that templer must have come from. You start pushing the tales of the wall and a couple of the give way, opening and revealing \n\ta adder descends to a corridor leading underground.\n\t*goto in_temple\n\t\n*label in_temple\n*page_break\nThe corridor leads to another one, much wider and lit by torches. \n\nA figure appears from the corner. It is a tall man with some sort of mechanical wings coming from his back. As much as this provokes an association with an angel, his wrinkled face\nbears little resemblance to anything heavenly. His weary eyes hint that he has seen a lot and the spark of benevolence is not completely lost.\n\n\"You are not supposed to be here,\" he says. \"Wait... It can not be... You must be the ones the prophecy spoke of. Please, follow me, I must speak with you.\"\n\nHe passes by and disappears behind a small door.\n\nWould you follow him? \n*choice\n\t#Yes\n\t\t*set xp +1\n\t\t(Expereince+)\n\t\t\n\t\tWhatever this man is, he sounds as if he can help you, or probably has some agenda that does not entail raising an alarm and having you captured. You open the door and follow \n\t\thim.\n\t\t*goto in_temple2\n\t\t\n\t#No\n\t\tAmy senses your hesitation and decides to act on instinct by following the man. You doubt it is a good idea but decide not to let her be alone with him.\n\t\t*goto in_temple2\n\t\t\n*label in_temple2\n*page_break\nThe room is small and looks like an alchemist's lab. You guess that he is doing some private research that needs to be hidden from the eyes of the other templars. \n\n\"You are the knight and the guard, right, the warrior of source and the one of faith? That line never made any sense to me,\" he shrugs. \n\n\"It makes perfect sense when it comes to us,\" says Amy who seems to be feeling more at ease in his presence.\n\nYou start to feel nervous. You are here to find out what evil is being conducted here and instead you are giving explanations to somebody who may very well be \none of the perpetrators.\n\nWhat do you do?\n*choice \n\t#Tell him that you have no time for his rattling \n\t\t*set imp +1\n\t\t(Imbalance+)\n\t\t\n\t\tThe man finds your reaction amusing. \"Now you are proving another line of the prophecy, saying that the knight would be forged by purifying fire. Just be \n\t\tcareful, dear one, that fire can be a dangerous power to play with.\"\n\t\t\n\t\tHis soothing tone affects you and you decide to pay attention to what he says.\n\t\t*goto in_temple3\n\t\t\n\t#Gently explain that you are in a hurry\n\t\t\"I can guarantee you that I will make your time spent with me well worth it. However, if you need to go, I can understand that too.\"\n\t\t\n\t\tYou decide that it is better to listen to him.\n\t\t*goto in_temple3\n\t\t\n*label in_temple3\n*page_break\n\"My name is Aru and I am of a race related to humans, but not quite. I have spent eons of time in this temple, more than anybody else currently alive. I have seen \nmortal humans come and go, the ritual clothes of the High Priest been carried by a dozen of priests.\"\n\n\"Can you tell us more about what is going on in the temple now and where to go?\"\n\nHe sighs. \"There are many directions is which our research of the occult and codes of flesh has gone and I can talk about it all day, but I know what you are exactly after.\nI am really tempted to give you the answer straight away, but that would be to deny you the emotions of finding out for yourself. Moreover, in order to save it, you will need \nto gather evidence to present to the Fellowship and the Mayor. The more you gather, the higher the chance of an official investigation that will pave the way to the end of what started as an \nexpression of our power to create and ended up in pure madness. Or maybe you will seal the fate of this temple? I actually think this option is more likely.\"\n\n\"What is it?\" Amy asks.\n\n\"Your highest concern should be finding about the warriors that can't be stopped. That project has a sad story that I will help you understand as you progress.\"\n*page_break\n\"Where do we start?\" you ask Aru.\n\n\"I hope that you will be brave enough to enter each of the seven chambers, although skipping some may increase your chances of survival. I think it will be good to tell you more about them.\n\n\"On this side is the external ring. You can find the Slaves Quarters to the North, the Human Templar's Quarters to the East, the Room with the Statues to the South and the Barracks to the West. The internal ring consists of only two rooms \nbut they are some of the most important - the Hatchery and the Interdimensional Zone. You need to pass through any of those to reach the center one, the Altar room. This is the nexus of all the energies \nthat fuel the operations of this temple.\"\n\nYou have so many questions in your mind that you don't know which to begin with.\n*goto in_temple4\n\n*label in_temple4\n*page_break\nWhat would you ask now? \n*choice\n\t*hide_reuse #\"Who are you?\"\n\t\t\"I am somebody who left his trails in some of what the human race as you know it is. There were many like me who found the human race here still in its cradle, so gentle, so malleable.\n\t\tOur people have many sins to pay for, but I know that I will be forgiven because my work has always been related to keeping the link to source, the love that is all that is. Often times that remained \n\t\thidden from my compatriots.\"\n\t\t\n\t\t\"What were you actually doing?\" you ask.\n\t\t\n\t\t\"I can't carry the burden of revealing that, it is not my task. I can assure you that it was not painful and was only performed to willing individuals who craved for power more than anything else.\n\t\tIf you have spent some time with the templars, you will know what I am talking about. Devoid of emotions, ruthless in their belief in supremacy and zealous worship of a dark god. It is a sad story to tell.\"\n\t\t\n\t\t\"Where are the others of your kind?\" you ask.\n\t\t\n\t\tAru chuckles. \"Do I sense the warrior in you who wants to stop a threat by making sure the perpetrators never have a chance to do that again? If that is what you feel, I can understand it. They left to where we came from with the \n\t\tsatisfaction of getting what they came for and caring little for what they left behind.\"\n\t\t\n\t\t\"And why did you decide to stay?\" Amy asks.\n\t\t\n\t\t\"Because I wanted to see the end of this temple with my eyes, to make sure that most of the damage we did has been cleansed from this world. It is only then that I can find peace. Only then will I remove the burden from my shoulders.\"\n\t\t*goto in_temple4\n\t\n\t#\"Can I ask you more about those chambers?\"\n\t\t*goto in_temple_chambers\n\t\t\n\t#Finished with the questions\n\t\t\"I wish you the best of luck and may you fulfill your role with honor and bravery,\" says Aru.\n\t\t\n\t\tYou just nod and go back into the corridor.\n\t\t*goto temple_crossroads\n\t\t\n*label in_temple_chambers\nWhich chamber would you ask about?\n*choice\n\t*hide_reuse #The hatchery\n\t\t\"Eggs,\" he answers dully... as if it is not obvious.\n\t\t\n\t\t\"What kind of eggs?\" you ask.\n\t\t\n\t\t\"Don't you see, this is the question that brought you here. I won't give you the answer, I may not even have all of it.\"\n\t\t\n\t\tYou sigh.\n\t\t*goto in_temple4\n\t\n\t*hide_reuse #The barracks\n\t\t\"I am sure warriors like you would appreciate that part of the temple. To me, fighting has never been of great importance and I see swords and spears as\n\t\tmere toys that are worthless when compared to the vast powers of the mind... some minds, that is. I guess you may find an ally there called by the name of Amaranth. I don't \n\t\tpersonally like him, we were never able to see eye to eye with him. He is of the ones whom I've been involved in the creation of, and yet there is something in him \n\t\tthat is divine and transcends the failed experiment.\"\n\t\t\n\t\tYou raise your eyebrows questioningly, but it seems the man will tell you nothing more about it.\n\t\t*goto in_temple4\n\t\t\n\t*hide_reuse #The altar room \n\t\t\"There is ancient power lurking inside, a latent force that can both create and destroy. My hopes are that you will be able and willing to destroy the temple and set me free. I wish that I could do this, but I can't. There \n\t\twere certain others who made sure I would never be able to use the altar. I wouldn't like to ask you to do this because I don't want to influence your decision. You are the chosen ones, not me.\"\n\t\t*goto in_temple4\n\t\t\n\t*hide_reuse #The slaves quarters \n\t\t\"The name might be a bit deceptive, there are no slaves there now, but there used to be. Those memories fill me with sadness, they are echoes of time much injustice was done. Even now, there are students of the Dark using the residues of time-lost \n\t\tpain and shattered hope in order to master their skills. I wouldn't like to say that there is much danger for you to get there, though, just don't stray away from the light inside your hearts.\"\n\t\t*goto in_temple4\n\t\t\n\t*hide_reuse #The room with the statues \n\t\tHe sighs. \"It is hard to tell you much about it because I never felt that whatever those statues are is of any concern to me and what I do. Some say that they belong to petrified people. Others swear that they were the masterpieces \n\t\tof a heartbroken sculptor. I know you are not here to uncover this mystery, but I presume you can do that too.\"\n\t\t*goto in_temple4\n\t*hide_reuse #The quarters of the human priests \n\t\t\"This is where most of the priests like the ones you've met spend most of their time when they are not on the surface.\"\n\t\t\n\t\t\"Are they all bastards?\" Amy asks.\n\t\t\n\t\tThe man chuckles. \"I can see why you don't like them, dear one. However, in order to honestly answer your question, I should say no. If you need to talk to somebody or to ask for help, I would turn to \n\t\tLauren the dark ritualist. Even if I had a human daughter, I doubt she would be as close to me as this earthly flower. By the way, she already knows about you because of the telepathic link that we share.\"\n\t\t*goto in_temple4\n\t\t\n\t*hide_reuse #The interdimensional zone\n\t\t\"This is the place of surprises. What dwells inside depends mainly on who enters. I have the feeling that this time it may have more to with the militia lady, but I may be wrong.\"\n\t\t*goto in_temple4\n\t#Ask something else \n\t\t*goto in_temple4\n\n*label temple_crossroads\n*page_break\n[i]It is highly advisable that you explore the chambers of the outer circle before you get into the hatchery or the inderdimensional zone.[/i]\n\nWhere would you like to go?\n*choice \n\t*hide_reuse #The hatchery\n\t\t*goto hatchery\n\t*hide_reuse #The barracks\n\t\t*goto barracks\n\t\t\n\t*hide_reuse #The altar room\n\t\t*goto altar_r\n\t\t\n\t*hide_reuse #The slaves quarters\n\t\t*goto slaves_q\n\t\t\n\t*hide_reuse #The room with the statues\n\t\t*goto statues_r\n\t\t\n\t*hide_reuse #The quarters of the human priests\n\t\t*goto priests_q\n\t\t\n\t*hide_reuse #The interdimensional zone\n\t\t*goto inter_d \n\t\t\n*label inter_d\nYou enter a dimly lit room with weird fog slowly spreading on the floor. Your body feels somewhat lighter and you are about to ask Amy if her senses tell her the same when you realize she \nwouldn't answer.\n\nHer eyes open wide and the pupils get large, engulfing the blue irises. \"Thomas, how can it be?\" she says with a coarse voice.\n\nYou look at the centre of the room where the fog has receded. There is a well-built man with a moustache that carries seasoned handsomeness. His arms and torso seem to be \ntied with ropes, but you can't see to what, they just end in the nothingness. And yet they seem to hinder him, as he struggles to take a step in your direction, probably to \nget closer to Amy. \n\nYou also notice the remains of a white tabard and the emblem of the Church of Light on it. It is battered and bloodied.\n\nStreaks of tears roll down Amy's cheeks. \"I never thought I'd see you alive, my love.\"\n\nSomething inside you screams and you bet it is an aspect that has seen and fallen into many traps, as what you see before you indeed may as well be one.\n\nWhat would you do?\n*choice \n\t#Tell Amy to stay away from the center of the room\n\t\tShe looks at you with her watery eyes, unable to understand.\n\t\t\n\t\t\"It could be a trap,\" you explain.\n\t\t\n\t\t\"Oh, I am sorry, I allowed my emotions to cloud my judgement. You may be right. Let me see.\"\n\t\t\n\t\tShe concentrates on the image of her beloved, massaging her temples, then shakes her head. \"My eyes may be deceived, but not my heart. This is Thomas, my love.\"\n\t\t\n\t\tYou shrug and decide to allow her to know better than you.\n\t\t*set xp +1\n\t\t*set rel_amy +1\n\t\t*set sceptic +1\n\t\t\n\t\t(Experience+;Scepticism+)\n\t\t*goto inter_d2\n\t\t\n\t#Ask Amy to stay away while you check if it is a trap \n\t\tShe looks at you with her watery eyes, unable to understand.\n\t\t\n\t\t\"It could be a trap,\" you explain.\n\t\t\n\t\t\"But if it is a trap, you could fall into it as well,\" she says.\n\t\t\n\t\t\"Well, if there was a trap, it was not made to lure me, right?\"\n\t\t\n\t\t\"You have a point. I am sorry, I allowed my emotions to cloud my judgement.\"\n\t\t\n\t\t\"That is okay, I understand,\" you reply while taking tentative steps towards the center of the room. Nothing happens.\n\t\t\n\t\t\"I don't think it is a trap, ${name}. My eyes may be deceived, but not my heart. This is Thomas, my love.\"\n\t\t*set xp +2\n\t\t*set rel_amy +2\n\t\t*set sceptic +1\n\t\t\n\t\t(Experience++)\n\t\t*goto inter_d2\n\t\t\n\t#Try to silence that aspect of yours\n\t\t*set sceptic -1\n\t\t*goto inter_d2\n\t\n*label inter_d2\n*page_break\n\"Come closer, my love and know that nothing bad will happen to you and your friend while you are in this room. It is true that this temple is a dangerous place,\nbut you are no longer in it,\" says Thomas.\n\n\"How can it be, my love?\" Amy whispers while fulfilling his request, her strides revealing that her knees are much softer than usual. \"Did you not die that day?\"\n\n\"Indeed I did, sweet Amy. I was torn from you by death. But just as you know, it is not the end, as it is only like shedding of clothes that can no longer contain what is eternal. There\non the other side, there is knowledge, the power to look into timelines...\"\n\n\"You can't move...\" She interrupts him, examining the place where the ropes just vanish.\n\n\"Although this place is not in the temple, it would still be very difficult for me to remain with you, the living. This is why I had to tie myself to the reality you are now. You see, I knew you were going to come here.\"\n\n\"How is it possible?\" the lady asks.\n\n\"You don't remember it as one of the rules regarding being human in this world is the one of oblivion while sleep, but we spoke about it in many of your dreams in which I was able to \ncontact your subconsciousness, but that was not good enough, I wanted to speak to you while you are fully awake, I didn't want my message to be forgotten as soon as your beautiful eyes see the dawning of the new day again.\"\n\n\"I am all ears.\" Amy puts her arms around his and a slight tremble betrays of the emotions storming inside her.\n\nThomas has to turn away to concentrate. \"I want you to keep on living... It is very hard for me to watch you dying a little bit inside every day. When I was killed, it was just a moment of pain, and yours has been going on for years.\"\n\n\"What is this exactly that you ask of me?\"\n\nThe man sighs. \"I want you to bring back the joys of life, to love again.\"\n\n\"No way!\" Amy steps back as if burnt. \"I can't do that, I would never want to betray our love.\"\n\nThomas shakes his head. \"I don't ask that of you. See, it is not a coincidence that we met in the Monastery. It was arranged, we have been doing that for... ever. On the soul level, we are what \nwe would call eternal partners... I just want you to be a bit happier until the time has come for us to be together.\"\n\nAmy's expressions tells that she has no idea what to say. She is absolutely confused and overwhelmed.\n\nWould you like to say something?\n*choice \n\t#No\n\t\t\"You can ask anything of me, my love. Anything but this.\"\n\t\t\n\t\tThomas signs. \"I know, my sweet panther. But I had to try. Know that even now, I sense echoes of your feelings.\"\n\t\t\n\t\t\"Then I am sorry for the sadness and pain you sense through me, but this is what reminds me of you, this is what makes me feel alive.\"\n\t\t\n\t\t\"I understand,\" he says.\n\t\t*goto thomas_free\n\t\t\n\t#Tell Amy that what Thomas asks of her is an expression of a true love\n\t\t\"I don't doubt his feelings,\" Amy replies. \"Just the concrete emanation of them.\"\n\t\t\n\t\t\"Even now, my connection to you is as strong as ever. I can sense echoes of your feelings.\"\n\t\t\n\t\t\"Then I am sorry for the sadness and pain you sense through me, but this is what reminds me of you... But I remember what you were telling me when you were still alive, that pain is rarely needed and really the \n\t\tlast thing that should come to be. This is why you respected healers so much. I understand that you want me to heal too and I treasure that.\" She sighs. \"I can't promise you anything, my love, but I will carry your advice in my heart.\"\n\t\t\n\t\t\"It is good to know that the lengths I went through to come here were worth it,\" says the undying warrior. \n\t\t\n\t\t\"Oh, yeah?\" Amy smiles. \"I have an idea what will make it even more worthwhile.\"\n\t\t\n\t\tShe steps closer and hugs him. You look away just as they start to kiss, not wanting to breach their privacy. \n\t\t*set amy_available true \n\t\t*goto thomas_free\n\t#Tell Thomas that you don't know Amy for long, but you can see why she would be against it\n\t\t\"I know her well,\" Thomas replies. \"And to be honest, I think your guess is right.\"\n\t\t\n\t\tAmy nods. \"Can I just ask you to remain silent,\" she whispers and steps closer to him, hugging him. You look away just as they start to kiss, not wanting to breach their privacy.  \n\t\t*goto thomas_free \n\t\n\t#Ask Thomas to help you in your quest \n\t\t*set xp +1\n\t\t(Experience+)\n\t\t\n\t\t\"I am sorry to take away that precious moment of yours or otherwise disrespect the love that you share, but we are on an important and dangerous quest and it would be nice if you could help us.\"\n\t\t\n\t\tYou look at Amy for confirmation of your request. She nods. \"It would be a great honor and pleasure to fight by your side once more, my love.\"\n\t\t\n\t\tThomas smiles. \"That will be a lot of fun for sure and I would like to help too, except for I am not supposed to intervene. Well, I have never played by the rules anyway. The problem is that, however, it would be very hard to do so.\n\t\tI would need to have a physical artifact in your possession as well as a portable interdimensional device. If you have both of those, just call me when the action begins and I will be there for you.\"\n\t\t\n\t\tAmy smiles and hugs him. You look away just as they start to kiss, not wanting to breach their privacy. \n\t\t*set thomas_promise true\n\t\t*goto inter_d_exit\n\t\t\n*label thomas_free\n*page_break\n\"Should you go now?\" Amy asks him.\n\n\"I would never want you to let me go, but I know you have work to do and I guess I should do that too.\"\n\nShe nods. \"What should I do?\"\n\n\"Do you see that dagger in my belt. Please, take it and cut the ropes.\"\n\nThe militia woman does so with fidgeting fingers. \"See you on the other side, my eternal love,\" she whispers, her voice muted by a burst of tears.\n\n\"Just don't rush to get there. I will be waiting for you in the out-of-time,\" he says as he disappears as if sucked into an invisible whirlpool.\n\n\"Amy, you still have the dagger,\" you observe.\n\nShe passes it to you. \n\n\"I don't assume it is the legendary Edge of Darkness?\" you ask.\n\n\"Yes, this is how he used to call it. I think it was given to him by an old crone he helped when he was a teen. You may keep it. I don't like anything related to Darkness.\" She shivers.\n*set edge_of_darkness true\n*goto inter_d_exit\n\n*label inter_d_exit\n*page_break\nYou decide to exit the room and it is only then that you realize that the door you came from does not exist any more. There are, however, a couple of those who lead out. You start thinking where they \nmight lead you too and the walls get transluscent for a moment. To the left you see giant eggs, while to the right you catch a glimpse of an altar.\n\nWhere do you go?\n*choice\n\t#The hatchery\n\t\t*goto hatchery\n\t\t\n\t#The altar room \n\t\t*goto altar_r\n\t\t\n*label slaves_q\n*page_break\nYou enter and see a huge amphitheater in front of you, wondering if it was an arena for gladiator fights, you get closer to the ring and much to your amazement, you behold \na couple of familiar faces.\n\nMisery is one of them, the black dress showcasing her skinny figure. You can virtually count the bones of her bare back, which is facing you.\n\nThe other one is Aya, sitting on the ground inside a pentagram with a burning colorful candle in each corner. She looks quite... miserable until she sees you and her eyes glisten with hope.\n\n\"Oh, it is you, ${name}. I hoped to see you. Look who I have here.\" She turns around and points at Aya.\n\n\"Misery, what have you done to her?\" you inquire.\n\n\"So far nothing. I just summoned her. But it will be up to you to tell me what to do with her.\"\n\nYou put your palm on your face. \"Misery, is this some kind of a game?\"\n\nShe sighs. \"I just wanted to help. You know, I am still obliged to aid you because it is the will of my lord. I am still not sure what you would like to ask of me, so I decided to summon an enemy of yours and \ngive them. I wanted to be proactive.\"\n\n\"And so, Aya appeared?\" you ask just to give yourself some more time to let the crazy story Misery is telling you sink in.\n\n\"Does she not fit into the category of an enemy? my spirits told me she tried to assassinate you. I think that makes her an enemy, right?\"\n\n\"Misery, do you see the armor she is wearing?\"\n\nAya looks away, not wanting her eyes to lock in with Misery's.\n\n\"It is the same design as yours,\" she concludes. \"Maybe she is just pretending so that she can get closer to you and put an end to your existence. It makes sense, doesn't it?\"\n\nYou sigh. Of course, you can't let anything bad happen to Aya since she is now a knight of your order. However, this does not mean that you can't make a show of the situation to teach her a lesson by making her fearful.\nOn the other hand, you could try to play the role of the knight in shining armor trying to save a damsel in distress by taking your sword out and threatening Misery.\n\nAlso, instead of asking her to release Aya, you could say that the favor she owes you would be settled if she does so. Maybe this will give the woman in the dark dress the peace she needs, and that might mean more \npeace for you too.\n\nSo, what do you do?\n*choice\n\t#Discuss preparing a soup out of Aya\n\t\t*set wit +1\n\t\t(Wit+)\n\t\t\n\t\tYou try not to look at Ava because you are sure that you will burst into laughter.\n\t\t\n\t\tMisery's eyes widen with dismay. \"Gosh, you seem to be more fearsome than my lord. Is this really what you ask of me?\"\n\t\t\n\t\tYou take a deep breath and scratch your chin, hoping that Ava will not die of fear while listening to you. \"No, just release her.\"\n\t\t*set rel_arch -3\n\t\t*goto slaves_q2\n\t\t\n\t#Humbly ask Misery to set Aya free \n\t\t*goto slaves_q2\n\t\t\n\t#Take out your sword and threaten Misery\n\t\t\"I demand that you set the knight free.\" You slowly point the tip of your sword at Misery's neck. \n\t\t\n\t\tShe just smiles. \"I have been waiting for this moment for a while and I am going to enjoy it.\"\n\t\t\n\t\tHer eyes change color and suddenly you are not able to move. In horror, you observe her stepping closer and bashing your neck with her black manicure.\n\t\tThen she beams, as if a vampiric spell allowed her to gain some of the energy of your pain.\n\t\t\n\t\tAmy takes out her sword too, but Misery raises her hand to stop her. \"Easy, militia woman, I don't want any problems. He just pointed a blade at me and I had the right to retaliate.\"\n\t\t\n\t\tYou regain control of your muscles and check your neck.\n\t\t\n\t\t\"Are you alright,\" Amy asks.\n\t\t\n\t\t\"Yes, I am, it is just a scratch. If she had wanted to do some real damage to me, she could have done so.\"\n\t\t\n\t\t\"You said it very well, my dear,\" Misery chuckles. \"So what do I do with the girl?\"\n\t\t\n\t\t\"Let's get it over and away with, set her free, please.\"\n\t\t*set rel_arch +1\n\t\t*goto slaves_q2\n\t\t\n\t#Tell Misery the favor she owes you would be settled if she lets Aya go\n\t\tShe opens her eyes widely. \"Out of all the things you could have chosen, you want that?\"\n\t\t\n\t\t\"Well, I don't remember you giving me a list to choose from,\" you joke.\n\t\t\n\t\tShe looks uneasy for a moment, probably thinking of some of the stuff that would not be pleasant for her. But then gives you a wide smile that actually makes her face look quite pretty.\n\t\t\n\t\t\"I see what you are doing, dear one. You want to release the burden that I was given by my lord. For this, you have my sincerest gratitude.\"\n\t\t*se
