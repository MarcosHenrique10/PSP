on_description\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*if (dive_situation > 1)\n\t\t\tPavi is running out of energy! Her exhaustion causes significant harm!\n\t\t\t*set Crew1_Harm +60\n\t\t*if (dive_situation = 1)\n\t\t\tPavi is working hard! Her exhaustion causes her harm.\n\t\t\t*set Crew1_Harm +40\n\t\t*if (dive_situation \u003c= 0)\n\t\t\tPavi's exhaustion causes her some harm.\n\t\t\t*set Crew1_Harm +20\n\t\t\n\t\t*stat_chart\n\t\t\tpercent Crew1_Harm Harm\n\t\t*goto ascend_main\n\t*comment -- Not harmed\n\tPavi pushes through her exhaustion.\n*goto ascend_main\n\n\n\n*comment -- Seal cracks --\n*label ascend_seal_Action\n*gosub ascend_Tinker_SetStat\n\"Fixes everything? That's the claim, let's put it to the test,\" says Pavi as she takes a tube labeled 'Binding Oil' from her bag.\n\nShe liberally applies the oil to the leaking porthole. If used right, the alchemical substance should fuse the crack shut.\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set sub_escape +25\n\tThe binding oil is working! This buys them more time for the submarine to finish its slow ascent.\n\t\n*if not (this_action_success)\n\tThe binding oil does not hold. Pavi uses all she has, and the leaking water just washes it away.\n\t\n\tThe water level in the submarine is getting alarmingly high…\n\t\n*page_break\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 1\n*if (this_action_consequence)\n\tFiddling with the glue, Pavi drops her bag! She will loose everything in it (all her access to [i]load[/i])!\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set Crew1_Load 100\n\t\tWith a splash, the bag hits the water. Its contents spill and are ruined.\n\t\t*stat_chart\n\t\t\tpercent Crew1_Load Pavi's Load\n\t*if not (this_action_consequence)\n\t\tWith frantic effort, Pavi grabs her bag before it is lost.\n*goto ascend_main\n\n*comment -- Attune with Noggs --\n*label ascend_Attune_Action\n*gosub ascend_Attune_SetStat\nPavi puts her hand on the porthole. Noggs' crazed eyes meet hers. They are face to face, separated only by glass.\n\n\"What is happening to you?\" she asks, \"Whose body did you find?\"\n\n*gosub_scene display_chance_results\nThrough the glass, Pavi sees Noggs open his mouth. The sound through the speaking tube is muffled and incomprehensible.\n\n*if (this_action_success)\n\t*set fortune_Noggs_Lives +25\n\tPavi focuses and hears a voice in her mind. It's not Noggs' voice, but that of a woman with a Serverosian accent. The haunting words match the movement of Noggs' lips.\n\t\n\t\"I am a student like you,\" she says, \"I'm going to school. I'll make it, whatever it takes!\"\n\t\n\tThe voice gives Pavi an intense sense of déjà vu. It reminds her of a friend she had last year. \"Dhallah?\" she asks Noggs.\n\t\n\tThrough the glass, Noggs' eyes show a flash of recognition.\n\t\n\tThe moment passes and he is returns to thrashing mania. The submarine's hull reverberates with the sound of his pounding fists.\n\t\n*if not (this_action_success)\n\tPavi feels like there is a voice in the back of her mind, but she can't understand what it is trying to say.\n\t\n*page_break\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 0\n*if (this_action_consequence)\n\tNoggs is gripped with convulsions. His will is pit against a violent and possessive spirit. His eyes clear for a moment, and he looks at Pavi pleadingly before he starts shaking again.\n\t\n\tHow bad could it be?\n\t\n\t*gosub dive_situation_description\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*if (dive_situation > 1)\n\t\t\t*set fortune_Ghost_Rampage +60\n\t\t*if (dive_situation > 1)\n\t\t\t*set fortune_Ghost_Rampage +40\n\t\t*if (dive_situation > 1)\n\t\t\t*set fortune_Ghost_Rampage +20\n\t\tPavi watches in horror as Noggs slips deeper and deeper into mania.\n\t\t*stat_chart\n\t\t\tpercent fortune_Ghost_Rampage Ghost Rampage\n\t\t*page_break\n*goto ascend_main\n\n\n*comment -- Calm the crew --\n*label ascend_calm_crew_Action\n*gosub ascend_Consort_SetStat\n\"We got this,\" Pavi bravely tells Dylan. She tries to put a positive spin on being trapped in a submarine together. \"I've seen things like this in my years at the Morlan Hall of Unnatural Philosophy. This is a great experience for you!\"\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set dive_situation -1\n\tDylan is actually open to Pavi's encouragement.\n\t\n\t\"I've heard stories about what goes on in Morlan Hall, of course,\" Dylan says thoughtfully. A fierce expression washes over her face and she gleefully adds, \"I thought I'd have to wait until I was a sophomore to see a dead body!\"\n\t\n\tThey redouble their focus on keeping the submarine in working order.\n\t\n*if not (this_action_success)\n\tDylan is not buying this.\n*goto ascend_Consquence_Capsize\n\n*comment -- Sub takes damage --\n*label ascend_Consquence_Capsize\n*page_break\nSomething bangs against the outside of the submarine. A fresh leak begins oozing water.\n\n*temp capsize_up 60\n\n*if (dive_situation > 1)\n\t*set capsize_up +40\n*if (dive_situation > 1)\n\t*set capsize_up +20\n\n[i]The submarine will be ${capsize_up}% closer to capsizing![/i]\n*stat_chart\n\tpercent sub_capsize Sub Capsizes and Dylan Drowns\n\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 1\n*if (this_action_consequence)\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set sub_capsize +capsize_up\n\t\t\n\t\tThey can't stop the leaking!\n\t\t\n\t\t*stat_chart\n\t\t\tpercent sub_capsize Capsize\n\t\t*page_break\n*goto ascend_main\n\n*comment -- Sub capsizes! --\n*label end_Capsize\n*set sub_capsize 100\n*page_break\n\n*achieve bail\n\nThe banging on the hull, the leaks, the rising water filling the leaking vessel… It sinks into Pavi how truly trapped she is. She finally succumbs to panic. She snaps.\n\nPavi dashes to the submarine's top hatch. She takes a deep break, holds it, grips the handle and turns. \"Wait!\" calls out Dylan, \"I can't…!\"\n\nHer words are washed away as the hatch opens and the dark water rushes in.\n\n*if (sub_escape \u003c 100)\n\tPavi loses track of time and space as blackness envelops her.\n\t*finish\n\n*comment -- Did escape --\nThe glow of the surface is so close. Pavi swims up and up.\n\nNo matter how much she struggles, she never reaches the water's surface.\n\nHand outstretched upwards, she gives into the demands of her burning lungs. Her logical brain screams NO, but she opens her mouth to breathe.\n\nHer lungs fill with water…\n*finish\n\n*comment -- Escape! --\n*label end_Escape\n*page_break\nWith a great splash, the battered submarine lunges from the black water.\n\nPavi slams on the brakes. The submarine comes to a stop with a screech. Electronics pop and the vessel's lights go out.\n\nIt's no matter to Pavi and Dylan, as they have finally returned to laboratory. They climb from the top hatch and down into the light of scattered lamps. They breathe fresh air with relief.\n\nAshlyn runs up to the submarine. She calls up, \"Pavi! Where is Noggs?\"\n*finish\n\n*comment -- How is the situation? --\n*label dive_situation_description\n*if (dive_situation = 0)\n\tRight now, in spite of the danger, Pavi and Dylan are level headed and careful. The situation is [i]controlled.[/i]\n*if (dive_situation = 1)\n\tThe danger is rising. Pavi and Dylan are struggling to keep the sub in working condition. The situation is [i]risky.[/i] Expect serious consequences.\n*if (dive_situation > 1)\n\tThe danger is taking its toll on the students. Pavi and Dylan are fighting to keep the submarine moving. The situation is [i]desperate![/i] Expect horrible consequences!\n*return\n", "chapter5": "*set this_character 2\n*set intro_finished true\n\n[b]Chapter 5: Raid[/b]\n\n*achieve complete_chapter4\n\nWallace is outside the tower while Ashlyn and Pavi work inside.\n\nHe sits at the edge of the dock. His eyes have adjusted to the light coming distantly from the city on the riverbank. There is a slight reflection illuminating the water and the stone wall on the opposite bank.\n\nThe night is filled with the smell of the river, the old dock and the moss on the ancient tower.\n\n\"I hate this river,\" he mumbles to himself, \"It's cold, it's dark, and it's too damn lonely.\"\n\n*page_break\n\nThe rhythmic sound of the river water lapping against the tower has lulled Wallace into a trance-like state. Time has lost meaning.\n\nSomething stirs Wallace. The lapping sound against the water is getting louder. Actually, could that be the sound of oars striking the water? Is that the sound of rowboats?\n\nWallace stops mulling when he sees lamplight on the water before him. The light washes over the dock briefly, then disappears. \"Damn, who is it?\" says Wallace as he jumps to his feet.\n\nSuddenly the lamplight is shining directly at Wallace. He is blinded. As he covers his face with his arms he hears the sound of an approaching rowboat. A voice calls out, \"Stay where you are! You are under suspicion for trespassing! You are being arrested and we are searching the premises!\"\n\n*page_break\n\n\"It's the Bluecoats!\" snarls Wallace.\n\nHe charges forward as the first Bluecoat pulls himself onto the dock. He shoves the woman back into the boat she came from. She lands on her fellows, almost overturning the small boat. They are shouting with indignation and anger. Wallace shouts over them, \"You have no jurisdiction here! This is Morlan Hall property, and I'm a Morlan Hall student!\"\n\n*page_break\n\nThe Bluecoats are intent on raiding the tower and Wallace won't let them. They are climbing up from their rowboats using the dock's short ladders. Wallace has a defensive position, but the Bluecoats have numbers.\n\nThe situation boils down to how interested and prepared the Bluecoats are when it comes bringing violence tonight.\n\n*comment -- Do the bluecoats interfere? --\n*temp bluecoats 0\n*rand bluecoats 1 100\n\n*stat_chart\n\tpercent fortune_Bluecoats_Interfere Bluecoats Interfere\nThis is a bad fortune! Rolling above this number is good.\n\n*page_break\n\n[b]You rolled a ${bluecoats}[/b]\n*stat_chart\n\tpercent fortune_Bluecoats_Interfere Bluecoats Interfere\n\n*temp raid_leader false\n*temp raid_leader_open false\n*temp raid_weapon 0\n*temp raid_effect 0\n*temp raid_scare false\n*temp raid_win false\n*temp raid_situation 1\n*if (fortune_Bluecoats_Interfere > bluecoats)\n\t*set raid_situation +1\n\tThe Bluecoats are coming hard and fast! They are determined to break something, and Wallace is daring to stand in their way!\n\n*if (raid_situation \u003c 2)\n\tThe Bluecoats are storming the dock, but they didn't expect Wallace's determined resistance. His ferocious expression in the lamplight keeps them back. He's at risk but it's not yet desperate.\n\n*page_break\n\n*label raid_main\n*page_break\n*if (raid_win)\n\t*goto raid_end_win\n*if (Crew2_Stress >= 100)\n\t*stat_chart\n\t\tpercent Crew2_Harm Wallace's Stress\n\t\t\n\tWallace has pushed himself to the absolute end of his endurance.\n\t\n\tHe cannot fight any longer. He takes his final option.\n\t*page_break\n\t*goto raid_end_fail\n*gosub raid_situation_description\n\n*gosub raid_Study_SetStat\n*gosub raid_Skirmish_SetStat\n*gosub raid_Command_SetStat\n*gosub raid_Attune_SetStat\n\n*hide_reuse\n*choice\n\t#STUDY the Bluecoats to identify their leader (${raid_Study_GetStat})\n\t\t*goto raid_Leader_Study\n\t*if (raid_leader) #SKIRMISH to defeat the leader's bodyguard (${raid_Skirmish_GetStat})\n\t\t*goto raid_Leader_Bodyguard\n\t*if (raid_leader_open) #SKIRMISH to defeat the leader's and win the fight! (${raid_Skirmish_GetStat})\n\t\t*goto raid_Leader_Fight\n\t*selectable_if (Crew2_Load \u003c 60) #COMMAND the Bluecoats to leave by threatening them with a captive spirit (${raid_Command_GetStat}[i], takes 40 load[/i])\n\t\t*set Crew2_Load +40\n\t\t*goto raid_Spirit_Command\n\t*if (raid_scare) #ATTUNE to the captive spirit to scare off the Bluecoats (${raid_Attune_GetStat})\n\t\t*goto raid_Spirit_Attune\n\t*selectable_if (Crew2_Load \u003c 80) #Equip a fine weapon ([i]takes 20 Load[/i])\n\t\t*set Crew2_Load +20\n\t\t*set raid_weapon 1\n\t\tWallace quickly steps back and sets down his backpack in front of him. He plunges his hands inside.\n\t\t\n\t\tBefore the Bluecoats can step forward, Wallace stands with both his hands encased in spiked metal and leather wraps.\n\t\t\n\t\tWallace bashes his gauntlets together. The sound of the heavy metal striking metal rings loud in the night air. \"Come on,\" he tells the Bluecoats, \"not afraid of getting hurt, now are ya?\"\n\t\t*goto raid_main\n\t#DEVIL'S BARGAIN: Unleash Wallace's captive spirit, immediately driving away the Bluecoats... But also triggering a ghost rampage!\n\t\t*goto raid_end_fail\n\n*label raid_Study_SetStat\n*set this_stat Crew2_Study\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp raid_Study_GetStat this_chance\n*return\n\n*label raid_Skirmish_SetStat\n*set this_stat Crew2_Skirmish\n*set this_stat_mod raid_weapon\n*gosub_scene display_chance\n*temp raid_Skirmish_GetStat this_chance\n*return\n\n*label raid_Command_SetStat\n*set this_stat Crew2_Command\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp raid_Command_GetStat this_chance\n*return\n\n*label raid_Attune_SetStat\n*set this_stat Crew2_Attune\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp raid_Attune_GetStat this_chance\n*return\n\n\n*comment -- Threaten with ghost --\n*label raid_Spirit_Command\n*gosub raid_Command_SetStat\n\"You see this, you know what it is?\" shouts Wallace as he pulls a glowing cylinder from his backpack. The Bluecoats do not need their lamps to recognize it. The haunting blue luminescence makes it immediately obvious.\n\nThe Bluecoats can't help but take a step back. \"Yeah that's right,\" Wallace tells them, \"This is no plasm battery. This has a spirit in it. A real mean one. She's a specter of the worst sort. A killer. I know this because I captured her myself.\"\n\nA Bluecoat points and says, \"Possession of spirits is illegal!\"\n\nWallace thrusts the glowing bottle towards pointing officer, who recoils. \"All right then, why don't you come and take her then?\" he goads the thug with a fiendish smirk.\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set raid_scare true\n\tAll the Bluecoats take a wary step back.\n\t\n\tWallace's grin widens. \"You're listening? Good. Smartest thing you lot have done all day.\"\n\t\n\tThe Bluecoats are still ready to fight, but they are now seriously considering that this boy may be far more trouble than he's worth.\n\t\n*if not (this_action_success)\n\tThe Bluecoat bats the spirit bottle with his billy club. The glowing container is knocked into the air. Wallace fumbles for a moment but catches it.\n\t\n\tThe Bluecoat points his baton at Wallace and declares, \"Whatever your tricks, you're not fooling! A brat like you, threatening us with a specter? One you caught yourself? You must be daft!\" He laughs and the other Bluecoats join in.\n\t\n\tWallace doesn't bother to check to see if the bottle is cracked. He knows that the ghost inside is a truly violent specter. If there was the slightest break in the seal then it would already be wreaking havoc.\n\t\n\t\"I guess you won't listen to reason,\" says Wallace sadly.\n\n*page_break\n*if (this_action_consequence)\n\t*if (raid_situation \u003c 2)\n\t\t*goto raid_consequence_situation\n\t*goto raid_consequence_harm\n*goto raid_main\n\n\n*comment -- Scare Bluecoats with ghost --\n*label raid_Spirit_Attune\n*gosub raid_Attune_SetStat\nWallace releases a small latch on the spirit bottle. It stays sealed shut, but a layer of its insulation swings open. The pulsing blue light within spills out more brightly and unfiltered. The BLuecoats are dazzled as they are caught in the light.\n\nThe student concentrates on the spirit bottle in his hands. \"Come on, old girl,\" he says, \"I'm considering giving you a shorter sentence in exchange for some labor. Go on, have fun. Give them a taste of what you can do.\"\n\nWallace wills the specter to lash out at the Bluecoats.\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set raid_win true\n\tWallace feels the captive specter respond. He gets the sense of a cold and unnatural wind rushing around him. But that gusting feeling comes from the ghost field. To his eyes, everything seems to become still. The water stops lapping against the dock. The sounds of the city, already distant, now fade completely. It is as if the world is holding its breath while it waits for something dreadful.\n\t\n\tThe ethereal wind reaches the Bluecoats. The ripple in the ghost field does not rustle their coats, but their lamps flicker and die. Only the eerie blue glow of the spirit bottle still lights the dock.\n\t\n\tThe ghostly light lengthens the shadows and puts the faces of the Bluecoats into stark relief. Their expressions change from disbelief to horror. \"Do you feel that?\" says one. Another replies with rising alarm, \"By the gods, the brat wasn't kidding. I see her in the bottle. I feel her cold breath on my face! She's reaching for me!\"\n\t\n\tThey are visibly shivering now. They cover their faces from the blue light as if they were being pelted by hail in a terrible storm.\n\t\n\t*page_break\n\t\n\tMortal terror sinks into their souls. \t\"Leave this crazy kid to the Spirit Wardens! I'm out of here!\" shouts a Bluecoat as she jumps down to the nearest boat. Then they are routed. In moments only Wallace still stands on the dock.\n\t\n\t\"Not bad, Volette,\" Wallace tells the specter in the bottle, \"Vacation's over. Back in your cell.\" Before Volette can turn her wrath on him, he reseals the bottle and locks in every layer of protective plating.\n\t\n\tThe sounds of the city return. As he replaces the bottle in his backpack, his eyes can see the light of stars reflected on the river. The paddling of the retreating Bluecoats can be heard distantly, then it is gone.\n\t\n*if not (this_action_success)\n\tThe Bluecoat bats the spirit bottle with his billy club. The glowing container is knocked into the air. Wallace fumbles for a moment but catches it.\n\t\n\tThe Bluecoat points his baton at Wallace and declares, \"Whatever your tricks, you're not fooling! A brat like you, threatening us with a specter? One you caught yourself? You must be daft!\" He laughs and the other Bluecoats join in.\n\t\n\tWallace doesn't bother to check to see if the bottle is cracked. He knows that the ghost inside is a truly violent specter. If there was the slightest break in the seal then it would already be wreaking havoc.\n\t\n\t\"I guess you won't listen to reason,\" says Wallace sadly.\n\t\n*comment -- Bluecoats retaliate with a gas bomb --\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 0\n*page_break\n*if (this_action_consequence)\n\t*if (this_action_success)\n\t\tWallace turns to leave, but he belatedly notices something that the Bluecoats left.\n\t\n\t*if not (this_action_success)\n\t\tOne of the scoffing Bluecoats says, \"This will shut the boy up.\" He tosses something to the ground. It rolls to Wallace's feet.\n\t\n\tIt is about the size and shape of a can of shaving cream. It's ticking. \"A tear gas bomb!\" Wallace shouts with realization.\n\t\n\tDid Wallace realize in time to avoid the poison gas?\n\n\t*if (raid_situation \u003c 2)\n\t\t[i]The gas will deal 25% harm.[/i]\n\t\t*stat_chart\n\t\t\tpercent Crew2_Harm Wallace's Harm\n\n\t\t*gosub_scene display_resist_complication\n\t\t*if (this_action_consequence)\n\t\t\t*set Crew2_Harm +25\n\t\t\t*goto raid_gassed\t\t\n\t\t*goto raid_gas_avoided\n\t[i]The gas will deal 75% harm.[/i]\n\t*stat_chart\n\t\tpercent Crew2_Harm Wallace's Harm\n\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set Crew2_Harm +75\n\t\t*goto raid_gassed\t\t\n\t*goto raid_gas_avoided\n*goto raid_main\n\n*comment -- Gets gassed --\n*label raid_gassed\nThe bomb explodes into a cloud of gas. Wallace has no time to react. He is no stranger to pain and remains standing even as the gas burns his throat and makes him cough. He waves away the fumes. Moments later the air is clear again, but the damage has been done.\n\n*stat_chart\n\tpercent Crew2_Harm Wallace's Harm\n\n*goto raid_main\n\n*comment -- Avoids gas --\n*label raid_gas_avoided\nWallace reacts just in time. He swiftly kicks the bomb off the dock. It hits the water the same moment it explodes. The poison gas spills across the river and dissipates harmlessly.\n\n*goto raid_main\n\n\n*comment -- Try to find the leader --\n*label raid_Leader_Study\n*gosub raid_Study_SetStat\nWallace knows that Bluecoats like to talk big about honor and duty. From personal experience, he knows that Bluecoats share this trait with the other street gangs: They only put up a fight if their boss is goading them onward.\n\nWithout dropping his guard, Wallace scans the approaching throng of cloaked men and women. Which of them is calling the shots?\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set raid_leader true\n\tWallace is surprised to see the leader is at the front. She carries her billy club with mean conviction. If any of the other Bluecoats falter for a moment, she gets them back in line with a hard look and a loud slap of the club against her hand.\n\t\n\t\"She's beaten more Bluecoats than anyone else,\" Wallace tells himself.\n\t\n\tThe Bluecoat leader can tell Wallace has singled her out. \"I'm Captain Spur,\" she tells him haughtily. She has wild, unkempt black hair and a bloodthirsty grin.\n\t\n\tA man moves up in front of her and draws a long dagger. \"This is my second, Officer Sevoy.\" His delicate features and deliberate movements make Wallace think of an assassin.\n\t\n\t\"Whatever you're thinking, don't try it,\" Spur tells Wallace, \"Sevoy has special punishments for extraordinary crimes.\"\n\n*if not (this_action_success)\n\tWallace hates to admit it, but all Bluecoats look the same to him.\n\t\n*page_break\n*if (this_action_consequence)\n\t*if (raid_situation \u003c 2)\n\t\t*goto raid_consequence_situation\n\t*goto raid_consequence_harm\n*goto raid_main\n\n\n*comment -- Defeat Bodyguard --\n*label raid_Leader_Bodyguard\n*gosub raid_Skirmish_SetStat\nWallace can stop the raid if he can take out the Bluecoats leader, the bloodthirsty Captain Spur. But Wallace first has to deal with her skilled bodyguard, Officer Sevoy.\n\nWhen the next Bluecoat thug swings at Wallace, he grabs and throws the her into the other Bluecoats who are trying to surround him. Her tumbling weight bowls them over. One falls in the water with a great splash. You can hear him desperate tread water and try to reach one of their rowboats before the weight of his heavy coat drags him underwater.\n\nWallace uses the moment's distraction to strike at Officer Sevoy. The man is nonplussed. He sidestepped the thrown thug and makes no attempt to help his comrade in the water. His eyes stay fixed on the Wallace. The officer is clearly not underestimating the red-headed boy.\n\nOfficer Sevoy leaves no opening. Wallace can find no weakness to exploit. Wallace leaps at the bodyguard with the simple goal of overpowering him.\n\n*gosub_scene display_chance_results\n\nWallace comes down on the officer with the ferocity of a leaping lion.\n\n*if (this_action_success)\n\t*set raid_leader_open true\n\t\n\t*if (raid_weapon > 0)\n\t\tOfficer Sevoy attempts to use his dagger to fend away Wallace, but Wallace knocks the weapon from the bodyguard's hand with a double fisted downward strike of his gauntlets.\n\t\n\tWallace boots Sevoy hard in the chest. \tSevoy's graceful style is undone in an instant. There is another splash as the bodyguard hits the water.\n\t\n\tBut, to Wallace's amazement, Sevoy is back up the dock ladder in an instant. The man is a truly tough fighter. Still, the officer is now exhausted and heavily weighed down by his water-soaked clothing.\n\t\n\tThough Sevoy still a threat, Wallace is sure he can now get past the bodyguard and deal with the Bluecoat leader directly. \n\n*if not (this_action_success)\n\tHowever, Sevoy is too graceful a fighter. The officer just barely manages to sidestep Wallace's pounce.\n\t\n\tDagger flashing, Officer Sevoy forces Wallace back. The boy has to admit that there's not way he is going to fight his way to the Bluecoat leader.\n\t\n*page_break\n*if (this_action_consequence)\n\t*if (raid_situation \u003c 2)\n\t\t*goto raid_consequence_situation\n\t*goto raid_consequence_harm\n*goto raid_main\n\n\n*comment -- Defeat Leader --\n*label raid_Leader_Fight\n*gosub raid_Skirmish_SetStat\nWith a incredible feat of strength, Wallace picks up a thick wood piling from the dock. He heaves it into the air. It crashes down onto the Bluecoat thugs. They shout and flail in confusion. The Bluecoat cronies are temporarily pinned!\n\nWallace turns to their leader. This is it, the direct confrontation with Captain Spur.\n\n\"Aren't you the spunky little brat,\" Captain Spur snarls at him. She smacks her gloved hand with her oversized truncheon. \"There's only one thing that can teach a kid like you. That's a good beating!\"\n\n\"Pfft,\" spits Wallace, \" Then there's nothing I will learn from you.\"\n\nCaptain Spar blinks, thinks, and turns pale as she realizes Wallace's wit. The boy grins back at her. Enraged, she charges with her billy club held high!\n\n*gosub_scene display_chance_results\n\n*if (this_action_success)\n\t*set raid_win true\n\tAs Wallace strikes Captain Spur, he gets a sense that she once did her own fighting. He sees her tense as his fist connects with her chin. She tries to roll with the hit. Maybe, if she had more practice, he would have never landed such a devastating blow.\n\t\n\tBut clearly the her promotion had made her soft and out of practice. Beating only on the helpless had made her slow and soft. Wallace's uppercut was an obvious fighting move, easily avoided. The fact that Spur charged straight into Wallace's fist was proof that she was no more than a bully.\n\t\n\tThe Captain crumpled to the ground. Upon seeing their leader fall, the Bluecoat thugs immediately turned and ran to their boats. Wallace called after them, \"Don't you dare stick your nose into Morlan Hall's business again!\"\n\t\n*if not (this_action_success)\n\tWallace steps forward to deliver a knockout blow to the charging captain. To his complete surprise, she is much faster than he guessed. As he punches at her face, she stops just out of his reach and strikes low with her billy club.\n\t\n\tHer stab catches Wallace under the ribs. It knocks the wind out of him. He reflexively steps back, gasping for air, defensively holding his arms to his sides.\n\t\n\tThe brief delay costs Wallace his potential advantage. The other Bluecoats free themselves and surround their leader. They are now wary and careful of Wallace's tricks. There's no way that Wallace can again directly face Captain Spur.\n\t\n*page_break\n*if (this_action_consequence)\n\t*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n\t*set this_action_attribute 2\n\t*if (this_action_success)\n\t\tWallace sees the Captain struggle up onto one elbow.\n\t\t\n\tSpur pulls something out of her heavy coat. Wallace realizes the danger when the moonlight glints from its metal barrel. She's drawing a pistol!\n\t\n\tThere's nowhere to hide on the exposed dock. Instead, Wallace looks Captain Spur straight in the eyes. There is a brief contest of wills as she decides if she will pull the trigger.\n\t\n\t*if (raid_situation \u003c 2)\n\t\tShe aims at Wallace's leg. It would be a painful wound!\n\t\t\n\t\t[i]Wallace is about to take 25% harm. Wallace is out of action if he reaches 100% harm.[/i]\n\t\t*stat_chart\n\t\t\tpercent Crew2_Harm Wallace's Harm\n\n\t\t*gosub_scene display_resist_complication\n\t\t*if (this_action_consequence)\n\t\t\t*comment -- Shot in the leg --\n\t\t\t*set Crew2_Harm +25\n\t\t\tWallace grits his teeth. The sound, the flash, and the pain happen all at once. He grips his leg where the bullet grazed him. His pants are ripped and stained with his fresh blood.\n\t\t\t\n\t\t\t\"Aw hell, this uniform is ruined.\" he mutters, \"Didn't even last a day.\"\n\t\t\t*goto raid_main\t\t\n\t\t*goto raid_resist_pistol\n\t\t\n\tShe aims for Wallace's chest! This shot could kill him!\n\n\t[i]Wallace is about to take 75% harm. Wallace is out of action if he reaches 100% harm![/i]\n\t*stat_chart\n\t\tpercent Crew2_Harm Wallace's Harm\n\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*comment -- Shot in the chest! --\n\t\t*set Crew2_Harm +75\n\t\tWallace grits his teeth. The sound, the flash, and the pain happen all at once. He grips his chest where the bullet grazed him. His coat and shirt are are ripped and stained with his fresh blood.\n\n\t\t\"Aw hell, my uniform's ruined.\" he mutters, \"Didn't even last a day.\"\n\t\t*goto raid_main\n\t*goto raid_resist_pistol\n*goto raid_main\n\n*comment -- Starred down the captain --\n*label raid_resist_pistol\nWallace stares down the captain. She lowers her pistol.\n\n\"Smart,\" he tells her, \"You know what we do at Morlan Hall. If a pistol stopped me, then I wouldn't have made it past Demons 101.\"\n*goto raid_main\n\n\n*comment -- Situation consequence --\n*label raid_consequence_situation\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 0\nWallace took care to not open himself to attack while he studied the enemy. However, they are taking the opportunity to surround him.\n\n*gosub_scene display_resist_complication\n*if (this_action_consequence)\n\t*comment -- Situation gets worse --\n\t*set raid_situation +1\n\tWallace realizes some Bluecoats have moved around the edges of the dock to attack him from more sides!\n\t*goto raid_main\nWallace jumps back in the nick of time. If he had stayed where he was another instant then he would have been more surrounded by thuggish Bluecoats.\n*goto raid_main\t\t\t\n\n\n*comment -- Harm consequence --\n*label raid_consequence_harm\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 1\n*if (raid_situation > 1)\n\t*comment -- Desperate harm! --\n\t*if not (raid_leader)\n\t\tA Bluecoat with a knife lunges at Wallace, aiming for a crippling strike!\n\t*if (raid_leader)\n\t\tOfficer Sevoy lunges at Wallace, stabbing forward, seeking to end the fight with a crippling cut!\n\n\t[i]Wallace is about to take 75% harm! Wallace loses if he reaches 100% harm![/i]\n\t*stat_chart\n\t\tpercent Crew2_Harm Wallace's Harm\n\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*comment -- Very harmed! --\n\t\t*set Crew2_Harm +75\n\t\tWallace feels the knife cut deep into him. The Bluecoat steps back. The man raises the knife to the air. The other thugs hoot and jeer as the moonlight illuminates the blood dripping from the blade.\n\t\t*goto raid_main\n\n\t*comment -- Avoided harm --\n\t*if (raid_weapon > 0)\n\t\tWallace grabs the assassin's knife in a gauntleted hand. They lock eyes for a moment, their faces barely an inch apart, before the man twists his knife free of Wallace's grip and then retreats.\n\t\t*goto raid_main\n\tWallace deftly sidesteps the knife thrust. This isn't his first time facing a thug with a knife.\n\t*goto raid_main\t\t\t\n*goto raid_main\n\n\n*comment -- Slight harm --\nA Bluecoat slips behind Wallace. He swings his billy club down to bash Wallace painfully on the head!\n\n[i]Wallace is about to take 20% harm. Wallace loses if he reaches 100% harm.[/i]\n*stat_chart\n\tpercent Crew2_Harm Wallace's Harm\n\n*gosub_scene display_resist_complication\n*if (this_action_consequence)\n\t*comment -- Harmed --\n\t*set Crew2_Harm +20\n\tThe sharp crack of the billy club makes Wallace's head ring with pain.\n\t\n\tReflexively, Wallace spins and counterattacks. He punches the Bluecoat solidly in the jaw, driving him back temporarily.\n\t\n\tThe other Bluecoats step forward, eager to join in the beating.\n\t*goto raid_main\n\n*comment -- Avoided harm --\nWallace dodges into the Bluecoat's swing. He avoids the strike and twists the Bluecoat's arm in one motion. The woman screams as her joint is pulled out of its socket. She lets go of her billy club. Wallace catches it with his other hand.\n\nShe backs up to the line of other Bluecoats. Wallace lazily tosses her billy club at her as she retreats. \"Sorry, did you drop this?\" he taunts.\n*goto raid_main\n\n\n*comment -- How is the situation? --\n*label raid_situation_description\n*if (raid_situation = 0)\n\tWallace has driven the Bluecoats back to the edge of the dock. The situation is [i]controlled.[/i]\n*if (raid_situation = 1)\n\tThe Bluecoats are pushing up the dock and trying to surround Wallace.\n\t\n\tThe situation is [i]risky.[/i] Expect serious consequences.\n*if (raid_situation > 1)\n\tWallace is surrounded by Bluecoats. He is fighting them back, but it is only a matter of time before he is beaten down by their billy clubs!\n\t\n\tThe situation is [i]desperate![/i] Expect serious consequences!\n*return\n\n\n*comment -- Failed --\n*label raid_end_fail\nIt tears at Wallace's heart to open the spirit bottle in his backpack. The agony creases his young face. He holds out the glowing bottle as far as he can, closing his eyes and turning his head away. \"It's come to this,\" he moans, \"I worked so hard to trap you here, and now you're just going to be let loose again.\"\n\t\t\nRaising his voice, Wallace shouts to the Bluecoats, \"Maybe you're not afraid of me, but I know you will be afraid of her. Say hello to Volette!\"\n\nThe bottle is opens with a click. Wallace drops it and runs.\n\n*page_break\n\nGhosts do not speak like the living do. Air does not transmit what they say. Yet everyone on the dock hears the mocking laughter as Volette emerges from the bottle.\n\nShe first appears as a blue ectoplasmic mist that spills from the bottle. As the mist rolls across the dock it takes form. Thin bony fingers appear. The hands claw their way to the nearest Bluecoat with such speed that he has no time to react. His legs fail him and he falls to the deck. The cold grip of death washes across him as he screams.\n\nThe Bluecoats are scattering. They paddle away in their boats with all their strength.\n\nWallace hurries inside the tower. He shuts its great metal door. He can no longer hear the shouts of the retreating Bluecoats.\n\nYet Volette's laughter still rings in his mind…\n\n*set fortune_Ghost_Rampage 100\n*stat_chart\n\tpercent fortune_Ghost_Rampage Ghost Rampage\n\n*finish\n\n\n*comment -- Successfully defended --\n*label raid_end_win\nWallace proudly looks out from the dock. \n*if (Crew2_Harm > 0)\n\tHis aches and pains actually improve his mood. \"Hell, it might be better to show up at Morlan Hall with blood on my uniform. Shows initiative,\" he says as he takes a rip in his uniform and pulls, tearing the cloth free to make a bandage.\n\t\n*if ((Crew2_Harm >= 100) or (Crew2_Stress >= 100))\n\tStill, the victory came at a great cost. Wallace can barely walk. He feels completely spent.\n\t\n\"I wonder how are the others are doing,\" Wallace asks the empty river. He turns, opens the large metal door, and re-enters the sunken tower.\n", "chapter6": "*set this_character 2\n*set intro_finished true\n\n[b]Chapter 6: Emergence[/b]\n\n*achieve complete_chapter5\n\nWallace crosses the tower's main floor. \n*if (Crew2_Harm >= 50) or (Crew2_Stress >= 50)\n\tHe has a dreadful limp from his exhaustion. But he moves with purpose.\n\t\nThe pale glow of the moon comes in through the expansive glass roof. The silhouette of an ancient lightning tower can be seen. Its rusty metal frame rests on the river bank. Though unused for centuries, it rises high above the sunken tower, a monolith to the terrors that it repelled from the city from in ancient times.\n\nWallace looks for the other members of the Society. Walking into the tower, he steps around the piles of crates and laboratory equipment. The stuff is stacked over his head, making it hard to see across the tower's cavernous interior. The room is illuminated by lamps that the students had found, lit and left on whatever flat surface was nearby.\n\nHe can hear someone talking on the other side of the tower…\n\n*comment *choice\n\t*comment #Skip to first roll\n\t\t*comment *goto roll_rampage\n\t*comment #Continue with chapter\n\t\t*comment *goto intro_cont\n\t*comment #Force capsize\n\t\t*comment *set sub_capsize 100\n\t\t*comment *goto intro_cont\n\n*page_break\n*label intro_cont\n\n\"Ashlyn?\" Wallace calls out, \"Did the others make it back yet? Did the dive go well? Did Pavi find the Society's special signet? Are we un-expelled yet?\"\n\nHe rounds a substantial electrical transformer and can now see where the laboratory floor ends. He looks out at the inky black water that is enclosed by the tower's curved stone walls.\n\nHe steps out and can see where the ramp down into the depths meets with the tower floor. His fingers are crossed. If anything went right, then the submarine and other students should be there…\n\n*page_break\n\n\n*comment -- What happened with the submarine? --\n\n\n*if (sub_capsize \u003c 100)\n\t*comment -- Submarine survived --\n\tThe submarine is there. Wallace lets out a sigh of relief.\n\t\n\tHe sees dark-haired Pavi climbing down from the hatch. The senior student seems shaken. Dylan follows down the handholds on the submarine's hull. Her complexion is even more ruddy and flushed that usual.\n\t\n\t*page_break\n\tWallace moves up behind to Ashlyn at the bottom of the submarine.\n\t\n\t*set this_character 1\n\tPavi brightly greets her fellow students, \"We're back!\"\n\t\n\t*if (Crew1_Stress >= 100)\n\t\t*goto post_heal\n\t\n\tWith an official air, Pavi adds, \"Need any first aid?\"\n\t\n\t*stat_chart\n\t\tpercent Crew0_Harm Ashlyn's Harm\n\t\tpercent Crew2_Harm Wallace's Harm\n\t\n\t*if ((Crew0_Harm \u003c 50) and (Crew2_Harm \u003c 50))\n\t\tPavi looks her two fellow scoundrels up and down. \"Guess not! You both seem fine, mostly!\" she laughs.\n\t\t*goto post_heal\n\t\n\n\t*set this_stat Crew1_Tinker\n\t*set this_stat_mod 0\n\t*gosub_scene display_chance\n\t*temp firstaid_plus0 this_chance\n\t*temp firstaid_plus1 this_chance_plus1\n\n\t*choice\n\t\t*selectable_if (Crew0_Harm >= 50) #TINKER to heal 50 harm from Ashlyn (${firstaid_plus0})\n\t\t\t\"Ashlyn, let me take a look at you,\" Pavi says.\n\t\t\t\n\t\t\t*gosub_scene display_chance_results\n\t\t\t*if (this_action_success)\n\t\t\t\tPavi applies some makeshift treatment and Ashlyn feels better.\n\n\t\t\t\t*set Crew0_Harm -50\n\t\t\t\t*stat_chart\n\t\t\t\t\tpercent Crew0_Harm Ashlyn's Harm\n\t\t\t\t\t\n\t\t\t*if not (this_action_success)\n\t\t\t\tPavi can't find a good way to treat Ashlyn, to their mutual disappointment.\n\t\t\t\t\n\t\t\t*goto firstaid_consequence\n\n\t\t\t\n\t\t*selectable_if ((Crew0_Harm >= 50) and (Crew1_Load \u003c= 70)) #TINKER to treat 50 harm from Ashlyn (${firstaid_plus1}[i], costs 30 load[/i])\n\t\t\t*set Crew1_Load +30\n\t\t\t*set this_stat_mod 1\n\t\t\t\"Ashlyn, take some of this,\" Pavi says while handing her a sparkling glass bottle labeled [i]Spark.[/i]\n\t\t\t\n\t\t\t*gosub_scene display_chance_results\n\t\t\t*if (this_action_success)\n\t\t\t\tAshlyn's eyes pop open. \"Wow! That's great stuff! I feel more alive!\"\n\n\t\t\t\t*set Crew0_Harm -30\n\t\t\t\t*stat_chart\n\t\t\t\t\tpercent Crew0_Harm Ashlyn's Harm\n\t\t\t\t\t\n\t\t\t*if not (this_action_success)\n\t\t\t\tAshlyn takes a look at the questionable drug, then looks at Pavi's face. Pavi is doing her best attempt at a bedside manner. But this time, Pavi's own doubts leak through her forced smile.\n\t\t\t\t\n\t\t\t\t\"No thanks,\" Ashlyn says and hands the bottle back.\n\t\t\t\t\n\t\t\t*goto firstaid_consequence\n\t\t\n\t\t\n\t\t*selectable_if (Crew2_Harm >= 50) #TINKER to heal 50 harm from  (${firstaid_plus0})\n\t\t\t\"Wallace, let me take a look at you,\" Pavi says.\n\t\t\t\n\t\t\t*gosub_scene display_chance_results\n\t\t\t*if (this_action_success)\n\t\t\t\tPavi applies some makeshift treatment and Wallace feels better.\n\n\t\t\t\t*set Crew2_Harm -50\n\t\t\t\t*stat_chart\n\t\t\t\t\tpercent Crew2_Harm Wallace's Harm\n\t\t\t\t\t\n\t\t\t*if not (this_action_success)\n\t\t\t\tPavi can't find a good way to treat Wallace, to their mutual disappointment.\n\t\t\t\t\n\t\t\t*goto firstaid_consequence\n\t\t\n\t\t\n\t\t*selectable_if (Crew0_Harm >= 50) #TINKER to heal 50 harm from Ashlyn (${firstaid_plus1}[i], costs 30 load[/i])\n\t\t\t*set Crew1_Load +30\n\t\t\t*set this_stat_mod 1\n\t\t\t\"Wallace, take some of this,\" Pavi says while handing her a sparkling glass bottle labeled [i]Spark.[/i]\n\t\t\t\n\t\t\t*gosub_scene display_chance_results\n\t\t\t*if (this_action_success)\n\t\t\t\tWallace's eyes pop open. \"Wow! That's great stuff! I feel more alive!\"\n\n\t\t\t\t*set Crew2_Harm -30\n\t\t\t\t*stat_chart\n\t\t\t\t\tpercent Crew2_Harm Wallace's Harm\n\t\t\t\t\t\n\t\t\t*if not (this_action_success)\n\t\t\t\tWallace takes a look at the questionable drug, then looks at Pavi's face. Pavi is doing her best attempt at a bedside manner. But this time, Pavi's own doubts leak through her forced smile.\n\t\t\t\t\n\t\t\t\t\"No thanks,\" Wallace says and hands the bottle back.\n\t\t\t\t\n\t\t\t*goto firstaid_consequence\n\t*goto firstaid_consequence\n\t\n\t\n\t*comment -- Pavi first aid exhaustion --\t\n\t*label firstaid_consequence\n\t*page_break\n\t*if not (this_action_consequence)\n\t\t*goto post_heal\n\t\n\tAttempting doctoring after midnight is straining Pavi's fortitude…\n\t\n\t[i]Pavi is about to take 25% Harm…[/i]\n\t\n\t*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n\t*set this_action_attribute 2\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set Crew1_Harm +25\n\t\t\"I would be crazy if I wasn't tired,\" Pavi quietly assures herself.\n\t\t*goto post_heal\n\t\n\tPavi shakes off her tiredness with a force of will.\n\t*goto post_heal\n\t\n\t*label post_heal\n\t*page_break\n\t\n\tAshlyn seems to be boiling over with contained worry. Unable to contain herself a moment longer, she blurts, \"Where is Noggs?\"\n\t\n\tPavi and Dylan look at each other. They don't say anything.\n\t\n\tLooking past them, Wallace points to a tube running from the submarine and into the water. \"Isn't that his air hose? Is his diving suit still down there?\"\n\t\n\tPavi clears her throat, \"He was there,\" she says evasively.\n\t\n\tAshlyn cuts her off, \"Well then, I'll just ask him. The hose is moving. He's coming up.\"\n\t\n\tThe other two women look shocked. They whirl around and stare at the now-rippling water.\n\t\n*if (sub_capsize >= 100)\n\t*comment -- No submarine! --\n\tWallace stops. He takes a deep breath and lets it out with a hiss. The submarine isn't there.\n\t\n\tAshlyn is knelt down at the edge of the water. She's bent over… A body? He suddenly recognizes Pavi's black hair, puddled around her, absolutely drenched.\n\t\n\tShe's not moving! \"Pavi!\" shouts Wallace as he hurries over as quickly as he can, \"By the gods, is she dead?\"\n\t\n\t*page_break\n\t\n\tPavi suddenly coughs and spits up water. Wallace sighs with relief as the senior student struggles up to a sitting position.\n\t\n\tAshlyn shows no relief at Pavi's small recovery. She narrows her piercing blue eyes. \"What happened, Pavi? Where is Dylan?\" Where's Noggs?\"\n\t\n\tPavi is still gasping for breath. She points to the inky black water behind her.\n\t\n\tAs Ashlyn and Wallace turn to look, the water begins to ripple.\n\n*comment -- It's Noggs! --\n*page_break\nThe black water rises as a large shape rises.\n\n\"What the hell is that?\" exclaims Wallace.\n*page_break\nWhat emerges from the black water is Noggs' diving suit. It takes slow, heavy steps up the ramp.\n\n\"Ah, good,\" says Wallace with relief, \"I was getting worried there for a second.\"\n\n*if (sub_capsize \u003c 100)\n\tPavi and Dylan look at each other with shock.\n\nPavi says slowly, \"It's… Not Noggs. Not entirely. Not anymore.\"\n\n\"Oh,\" says Ashlyn. She watches the lumbering figure step onto the laboratory floor. Her fair complexion turns a shade more pale. \"Lovely.\"\n\n*page_break\n\n\n*comment -- Last chance to save Dylan --\n*if (sub_capsize \u003c 100)\n\t*goto Noggs_Has_Signet\n\n*set fortune_Dylan_Drowns true\n*set this_character 1\nNoggs, or whatever is in the dive suit, drags something with it from the water. It's a young woman in a Morlan Hall uniform.\n\n\"Dhalleh?\" whispers Pavi, \"No, it can't be, she was eaten by the fish…\"\n\n\"Dylan!\" shouts Ashlyn, recognizing the ruddy face even when bloated with water. She bravely runs forward. The Noggs-thing lets go of the body and makes no move to stop the small girl. Ashlyn takes Dylan and drags her back to Pavi and Wallace.\n\nWallace is overcome with despair. \"There's nothing we can do…\" he moans, \"She's drowned!\"\n\n*page_break\n\nAshlyn looks at Pavi. \"Pavi, didn't you say that your major is in doctoring?\"\n\nDoes Pavi have the strength still to save Dylan?\n\n*set this_stat Crew1_Tinker\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp resuscitate_0 this_chance\n\n*set this_stat_mod 1\n*gosub_scene display_chance\n*temp resuscitate_1 this_chance\n\n*choice\n\t#No, Pavi is spent\n\t\t*gosub Dylan_Does_Die\n\t\t*goto Noggs_Has_Signet\n\t*selectable_if ((Crew1_Harm \u003c 100) and (Crew1_Stress \u003c 100)) #TINKER to resuscitate Dylan (${resuscitate_0})\n\t\t*set this_stat_mod 0\n\t\t*goto Dylan_Resuscitate_Attempt\n\t*selectable_if (((Crew1_Harm \u003c 100) and (Crew1_Stress \u003c 100)) and (Crew1_Load \u003c= 70)) #TINKER to resuscitate Dylan by administering the Spark drug (${resuscitate_1}[i], takes 30 load[/i])\n\t\t*set this_stat_mod 1\n\t\tPavi quickly rolls over Dylan so river water pour out of her open mouth.\n\t\t\n\t\tMiraculously, Pavi held onto her medical bag. She pulls out a bottle of Spark. \"At little like bottled lightning,\" she says as she pulls out the stopper and pours the contents into Dylan's mouth. Dylan's body spasms like it was zapped with electricity.\n\t\t\n\t\t*goto Dylan_Resuscitate_Attempt\n\n\n*label Dylan_Resuscitate_Attempt\n*gosub_scene display_chance\nPavi desperately sets to work. She presses down hard on Dylan's chest, trying to force Dylan's lungs and heart to restart. No-one else moves. It is a fierce struggle by Pavi against the cold grip of death.\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set fortune_Dylan_Drowns false\n\tDylan suddenly springs up. She gasps and vomits water.\n\t\n\tPavi sits back and smiles at the others. Wallace and Ashlyn look back at her with a mix of shock and admiration.\n\t\n\t*achieve resuscitate\n\n*if not (this_action_success)\n\t*gosub Dylan_Does_Die\n\n*page_break\n*if (this_action_consequence)\n\t*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n\t*set this_action_attribute 2\n\n\tPavi's desperate work has drained her.\n\t\n\t[i]Pavi will take 25% harm from exhaustion.[/i]\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set Crew1_Harm +25\n\t\tExhaustion seeps into Pavi.\n\t\t\n\t\tShe has been confident and cheerful for so long. How much longer can she keep it up?\n\t\t*goto Noggs_Has_Signet\n\tPavi shakes off the exhaustion with her force of will.\n\t*goto Noggs_Has_Signet\n*goto Noggs_Has_Signet\n\n*label Dylan_Does_Die\n*set fortune_Dylan_Drowns true\nPavi can't manage the effort to save Dylan. What happened underwater has drained her strength and conviction.\n\nShe looks at the still form of Dylan and just shakes her head. \"Only the Spirit Wardens can take care of Dylan now.\"\n*return\n\n\n*comment -- Noggs is getting away with the signet! --\n*label Noggs_Has_Signet\n*page_break\nAshlyn, Pavi and Wallace all jump at the sound of a heavy boot. Noggs is moving again. He labors to walk on land in his heavy diving suit.\n\nThe speaking tube strains then snaps from his helmet. The other students can hear that he is speaking.\n\n\"I'm going… To class…\" he says in a strained voice, \"I'm going… To graduate… I have… A whole life ahead of me…\"\n\nAshlyn looks to Pavi with rising alarm. \"I only just met him, but… That doesn't sound like Noggs' voice,\" says the freshman to the senior student.\n\nPavi nods.\n\nWallace says through clenched teeth, \"Could something down there have possessed him? Could it be… What we are hearing… Is the voice of a ghost?\"\n\nPavi frowns grimly and nods again.\n\n*page_break\n\n\"Wait,\" says Ashlyn, \"If he's talking about school… Then could he have the signet?\"\n\nAll their eyes are drawn to Noggs' hands. They are encased in heavy dive gloves.\n\nOne of the gauntlets is clenched shut, as if it is holding something precious…!\n\nThe other students look to each other. \"That must be the signet in Noggs' hand!\" Pavi says with immense excitement.\n\n*page_break\n*label roll_rampage\n\nBut before anyone can act, Ashlyn raises a warning hand. \"Shh! Do you hear the spirits?\"\n\nHer eyes dart around the room. They all feel an otherworldly chill…\n\n*temp ghost_rampage_happens 0\n*rand ghost_rampage_happens 1 100\n*stat_chart\n\tpercent fortune_Ghost_Rampage Ghost Rampage\n[i]This is a bad fortune! You want to roll above this number.[i]\n\n*page_break\n\n[b]You rolled a ${ghost_rampage_happens}.[b]\n*stat_chart\n\tpercent fortune_Ghost_Rampage Ghost Rampage\n\n*temp rampage_desperate false\n*if (ghost_rampage_happens \u003c= fortune_Ghost_Rampage)\n\t*temp rampage_desperate true\n\t\n\t*achieve ghost\n\t\n\tBlue fog comes rolling into the tower from every crevice. The students feel the chill of the grave in their souls. In their minds, they hear the cackling of dead specters. Though the undead tend to avoid the water, this is clearly an exception.\n\t\n\t\"Oh no,\" moans Wallace, \"I hate it when this happens!\"\n\t*goto action_signet\n*else\n\tBut the ghostly feeling fades.\n\t\n\t\"Close one,\" says Wallace, \"Things are already bad enough. We don't need more ghosts…\"\n\t\n\tLooking at Wallace, he adds, \"Whatever is inside Noggs will be plenty enough to deal with.\n\t*goto action_signet\n\n*comment -- Get the signet! --\n*label action_signet\n*page_break\nWho will attempt to wrest the signet from the possessed boy in a diving suit?\n\n[i]This is make or break! On the line is the success of the heist… And a chance for Noggs to live.[/i]\n\n*gosub Noggs_vs_Ashlyn_SetStat\n*gosub Noggs_vs_Pavi_SetStat\n*gosub Noggs_vs_Wallace_SetStat\n*goto signet_action\n\n*label Noggs_vs_Ashlyn_SetStat\n*set this_character 0\n*set this_stat Crew0_Attune\n*set this_stat_mod 1\n*gosub_scene display_chance\n*temp Noggs_vs_Ashlyn_GetStat this_chance\n*return\n\n*label Noggs_vs_Pavi_SetStat\n*set this_character 1\n*set this_stat Crew1_Sway\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp Noggs_vs_Pavi_GetStat this_chance\n*return\n\n*label Noggs_vs_Wallace_SetStat\n*set this_character 2\n*set this_stat Crew2_Skirmish\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp Noggs_vs_Skirmish_GetStat this_chance\n*return\n\n\n*label signet_action\n*choice\n\t*selectable_if ((Crew0_Stress \u003c 100) and (Crew0_Load \u003c= 50)) #Ashlyn will ATTUNE to capture the possessing ghost with a lightning hook (${Noggs_vs_Ashlyn_GetStat}[i], costs 50 load[/i])\n\t\t*goto Noggs_vs_Ashlyn\n\t*selectable_if (Crew1_Stress \u003c 100) #Pavi will SWAY Noggs to let go (${Noggs_vs_Pavi_GetStat})\n\t\t*goto Noggs_vs_Pavi\n\t*selectable_if (Crew2_Stress \u003c 100) #Wallace will WRECK the ghost with his demon hunting power  (${Noggs_vs_Skirmish_GetStat})\n\t\t*goto Noggs_vs_Wallace\n\t#DEVIL'S BARGAIN: Just let Noggs go... The only consequences are the loss of the signet... And his life.\n\t\t*goto Noggs_Dies\n\n\n*label Noggs_vs_Ashlyn\n*gosub Noggs_vs_Ashlyn_SetStat\n*set Crew0_Load +50\nAshlyn adjusts her glasses and takes a good look at the diving suit. Then she closes her eyes.\n\n\"With my inner sight,\" Ashlyn tells the others, \"I see the wispy form of a ghost! And I have a tool just for that.\"\n\nAshlyn reaches into her purse and pulls out a substantial coil of wire. With a flick of her wrist, hinged joints along wire all snap into a locked position. The resulting contraption is the length of her arm, but also light and elegant.\n\nWallace whistles. \"Wow, that's a high quality lightning hook,\" he compliments, \"How does a little girl like you get ghost hunting equipment like that?\"\n\nAshlyn scowls in response. \"You know what this is, but do you know how it works?\" she challenges Wallace. With her other hand, Ashlyn pulls from her purse a spirit bottle made of glass and silver. She plugs the end of lightning hook's wire coil into the bottle.\n*page_break\n\n\"I guess that's something we have in common,\" Wallace nods with a new appreciation of what Ashlyn is capable of. Looking to the Noggs, Wallace adds, \"Be careful, that suit is non-conductive. You'll need to tune it just right.\"\n\n\"Just watch,\" Ashlyn boasts. She turns a dial and the lightning hook crackles with blue sparking electricity.\n\nAshlyn smiles with glee as she feels the ionic charge rising in the air around her. She holds out the lightning hook with one hand as adjusts dials with her other.\n\t\nThe electric hum of the device rises in volume and pitch. The sound gains a certain melodic resonance as thin strands bolts of electricity arc to nearby lab equipment. Ashlyn's hair lifts up. Electricity arcs across the frame of her glasses.\n\n*page_break\n\nThe thing in the dive suit stops and turns. The arcing electricity flashes across the glass of its faceplate. It advances on Ashlyn, reaching out for her…\n\nAshlyn thrusts forward the lightning hook defiantly and shouts, \"You're mine!\"\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tThe lightning hook discharges like a crack of thunder. Everyone is momentarily blinded by the blue flash that arcs between Ashlyn and Noggs.\n\t\n\tWhen their vision clears, they see Ashlyn proudly collapsing her lightning hook and putting it back in her purse… with a now glowing spirit bottle.\n\t\n\t*gosub got_signet\n\n*if not (this_action_success)\n\tAshlyn did not finish the lightning rod's attunement in time. It has no effect on the possessed Noggs.\n\t\n\tThe creature in the diving suit swats the lightning rod from Ashlyn's hand. The wire rips out of the spirit bottle's socket. The contraption falls to the ground, bent and broken.\n\t\n\t*set fortune_Noggs_Lives 0\n\t*stat_chart\n\t\tpercent fortune_Noggs_Lives Noggs Survives\n\n*goto ghostly_consequence\n\n\n*comment -- Can Pavi beat Noggs? --\n*label Noggs_vs_Pavi\n*gosub Noggs_vs_Pavi_SetStat\nPavi steps in front of the hulking suit. It comes to a shambling, graceless halt.\n\n\"Noggs, can you hear me?\" Pavi pleads.\n\nThe senior student looks through the diving suit's glass. It is heavily fogged. She can just make out Noggs' face inside. He is breathing heavily. He looks very pale, exhausted, like he is freezing to death. His greasy hair is matted to his skin. His eyes are fixed open and unblinking.\n\n\"Please, Noggs,\" she puts a hand on the stretched leather armor of the diving suit, \"You have to stop this. Remember, you want to go to class. With us. Together!\"\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tThe fog on the diving helmet glass slowly clears. Noggs stops panting. He blinks and looks at Pavi for the first time in a while.\n\t\n\tNoggs falls to his knees. He whines, \"Make her stop! She is telling me what to do! I can't get her out of my head!\"\n\t\n\tPavi kneels before Noggs and takes off his diving helmet. Cradling his head in her arms, she assures him, \"Don't worry. We can fix this.\"\n\t\n\tNoggs lets out a long sigh before he falls flat to the floor.\n\t\n\t*gosub got_signet\n\n*if not (this_action_success)\n\tPavi watches with despair as her words only enrage Noggs… Or whatever is possessing him. His nostrils flare. His breathing becomes so harsh and heavy that the diving helmet fogs over completely.\n\t\n\t\"No!\" he cries in a strange and twisted voice, \"I'm going! You left me! You don't deserve the signet! It is mine!\"\n\t\n\t*set fortune_Noggs_Lives 0\n\t*stat_chart\n\t\tpercent fortune_Noggs_Lives Noggs Survives\n\n*goto ghostly_consequence\n\n\n*comment -- Can Wallace beat Noggs? --\n*label Noggs_vs_Wallace\n*gosub Noggs_vs_Wallace_SetStat\n\"Sorry, mate,\" Wallace apologizes as he steps up to the shambling dive suit, \"This will hurt.\"\n\nIn a flash, Wallace summons his supernatural power. His ancestors would not have survived had they not been ready to fight demons at any moment. He simply strikes the open palm of one hand with his other fist, and his arms are lit with an unnatural red fire!\n\nHe lunges at the diving suit. As it turns to face Wallace, the boy hammers it with a flurry of punches. The effect is not merely physical - the heavy leather and metal of the suit would stop any normal fist. But the creature within is sent reeling by the maelstrom of whipping red energy that Wallace unleashes upon it.\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tThe diving suit crumples to the floor. Wallace shakes out his arms and the red flames disappear. \"Another one bites the dust,\" he says, satisfied.\n\t\n\tWallace steps up to the prone form. He wipes water away from the diving helmet's glass. \"Noggs, you in there?\" he asks, \"I was aiming for the ghost, but, you know, mistakes happen…\"\n\t\n\tFrom inside the suit, Noggs turns his head to look up at Wallace. He blinks. With great effort, he moans, \"You knocked the wind out of me!\"\n\t\n\tWallace laughs and smiles back.\n\t\n\t*gosub got_signet\n\n*if not (this_action_success)\n\tWallace's attack is interrupted by a sudden backhanded strike from the suit. The heavy glove hits Wallace with far more force than naturally possible.\n\t\n\tWallace is thrown back. He smashes through a wooden crate. Moments later he climbs free, unscathed but his red flames are extinguished.\n\t\n\t\"Nice hit,\" he says as he dusts himself off, \"I guess this round goes to you, specter…\"\n\t\n\t*set fortune_Noggs_Lives 0\n\t*stat_chart\n\t\tpercent fortune_Noggs_Lives Noggs Survives\n\n*goto ghostly_consequence\n\n\n*comment -- Yes, they got the signet! --\n*label got_signet\n*page_break\n*set fortune_signet true\nNoggs has collapsed to the ground. Something has fallen from his hand. It bounces and spins across the laboratory floor.\n\t\n${this_character_name} picks it up the small item inspects it. With a huge grin they announce, \"It's the signet! We got it! The Leviathan Society is back!\"\n\nPavi and Wallace cheer with in unison!\n\n[b]Success! The scoundrel students have heisted the signet![/b]\n\n*achieve success_signet\n\n*return\n\n\n*comment -- Ghostly consequences --\n*label ghostly_consequence\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 2\n*page_break\n*if (this_action_consequence)\n\tNot finished yet, the malevolent specters in the tower surge towards ${this_character_name}!\n\t\n\t*if (rampage_desperate)\n\t\t[i]${this_character_name} is about to be possessed by a malicious ghost![/i]\n\t\t*gosub_scene display_resist_complication\n\t\t\n\t\tThe ghostly blue mist vanishes as suddenly as it appeared.\n\t\t\n\t\t*if (this_action_consequence)\n\t\t\t*set fortune_Possessed this_character\n\t\t\t${this_character_name} has frozen still. The other students question if they are ok.\n\t\t\t\n\t\t\tSlowly, ${this_character_name} nods, then smiles.\n\t\t\t\n\t\t\t\"Let's get out of here.\"\t\t\t\n\t\t\t*goto noggs_ending\n\n\t\t\n\t\t${this_character_name} has resisted the buffeting howl of ghostly energy through sheer force of will! The spirits have no hold on them.\n\t\t*goto noggs_ending\n\t\n\t*comment -- Rampage not desperate --\n\t\n\t[i]${this_character_name} is about to take 25% Harm from ghostly talons![/i]\n\t*gosub_scene display_resist_complication\n\t\t\n\tThe ghostly blue mist vanishes as suddenly as it appeared.\n\t\t\n\t*if (this_action_consequence)\n\t\t*if (this_character = 0)\n\t\t\t*set Crew0_Harm +25\n\t\t*if (this_character = 1)\n\t\t\t*set Crew1_Harm +25\n\t\t*if (this_character = 2)\n\t\t\t*set Crew2_Harm +25\n\n\t\t${this_character_name} clutches their arms and cries out, \"They got me!\"\n\t\t\n\t\tThe other students rush over. The uniform is torn as if raked by claws. Blue lines like frostbite are the scars of the undead's retaliation.\n\t\t*goto noggs_ending\n\t\n\tIn the battle against the undead, strength of will is tough as any armor. ${this_character_name} is unscathed by this horrifying attack.\n\t*goto noggs_ending\n\t\n*goto noggs_ending\n\n*comment -- Time for Noggs' fate! --\n*label noggs_ending\n*page_break\nIt is time for Noggs' fate to be decided. Does he survive the night?\n\n*temp fortune_noggs_roll 0\n*rand fortune_noggs_roll 1 100\n*temp noggs_dies 100-fortune_Noggs_Lives\n\n*stat_chart\n\topposed_pair noggs_dies\n\t\tDies\n\t\tLives\n\n*page_break\n\n*temp dieroll_reverse 0\n*set dieroll_reverse 100-fortune_noggs_roll\n[b]You rolled a ${dieroll_reverse}.[/b]\n*stat_chart\n\topposed_pair noggs_dies\n\t\tDies\n\t\tLives\n\n*if (fortune_noggs_roll \u003c=  fortune_Noggs_Lives)\n\t*set fortune_Noggs_Lives 100\n\t\n\tNoggs shudders then sighs. There is a sign of visible relief. His diving helmet removed, the students see his face relax. He goes limp.\n\t\n\t\"Get him out of there,\" orders Pavi. His fellow students drag Noggs from the diving suit.\n\t\n\t*if not (fortune_Dylan_Drowns)\n\t\tSmiling at Dylan, Pavi adds, \"We're all getting out of here!\"\n\t\t\n\t\n*if (fortune_noggs_roll >  fortune_Noggs_Lives)\n\t*label Noggs_Dies\n\t*set fortune_Noggs_Lives 0\n\t\n\tNoggs suddenly lurches to his feet. He moves with impossible speed, considering the bulk of his diving suit. \"I'm going! I'm going to class! I'm going to graduate and LIVE!\" he shouts.\n\t\n\tBefore anyone can react, the boy throws open the large doors to the tower. Moonlight spills inside. For a moment, he stands with his arms outstretched, silhouetted in the portal.\n\t\n\t*page_break\n\t\n\tNo-one expects the crash of lightning. The sound and light fills the tower.\n\t\n\tThe students are all blinded and deafened. Pavi is the first to recover from the discharge. Blinking, she says, \"What was that? It was infinitely more powerful than any electrical device in the laboratory…\"\n\t\n\t\"Noggs!\" shouts Wallace as his eyes clear.\n\t\n\tWhere the boy had been standing before, there now was a burnt and smoking body on the ground…\n\t\n\t\"Oh no!\" screams Pavi, \"Noggs! No! What happened?\"\n\t\n\t*achieve zap\n\n\n*comment -- devil_situation --\n\n*page_break\nBefore the students can take another step, Wallace raises a hand. \"What's that? That doesn't sound good. What is going on now?\"\n\nThey hear the sound of waves lapping against the edge of the laboratory floor. They turn to look at where the ramp leads down into the submerged lower part of the tower.\n\nSomething is disturbing the water. The inky blackness begins to roil and slap hard against the stone walls.\n\n\"Oh no, it's coming up!\" shouts Pavi.\n\n*page_break\n\nAshlyn snaps, \"What? What did you find down there, Pavi?\" Pavi looks to Ashlyn with a blank expression, finding herself at a loss for words to describe the monster.\n\nThe water fountains upward as a mass of tentacles springs up from the water. Each tentacle is the length of an oar and made of tough muscle. The writhing limbs smack down onto the metal grates of the laboratory floor. Then the source of the tentacles emerges. It is a long trunk that bends in the middle. It appears more bony. Another mass of tentacles erupts from the water and grabs the laboratory floor, pulling up a matching trunk. Every inch of the thing's skin is covered with glistening black scales.\n\n\"Are those.. Fingers? Arms?\" asks Ashlyn in stunned awe.\n\n\"It's a sea demon!\" cries Wallace.\n\nThe demon's arm-like appendages use their finger-tentacles to pull up out of the water. They come together in a thick torso. The creature's huge bulk fills the far side of the tower's cavernous laboratory, and it has not yet even fully emerged from the water. It raises an 'arm' and reaches out, grabbing the grated floor with its 'finger' tentacles and pulling itself further into the room.\n\n*page_break\n\nIt is close enough now for the lamplight to reveal what is at the top of the creature's torso. Where there should have been a head, there is only torn flesh and dully glowing red, old cauterized blood at the creature's neck.\n\n\"Someone beheaded a sea demon and left it in a student laboratory?\" asked Pavi, not believing her eyes.\n\nThe monster is coming towards the students. In fact, it is moving faster and faster!\n\n\"Oh Gods,\" shouts Wallace, \"Undead sea demon! Run! Everyone run!\"\n\n*page_break\n*comment -- What if everyone is knocked out? --\n*if (Crew0_Stress >= 100)\n\t*if (Crew1_Stress >= 100)\n\t\t*if (Crew2_Stress >= 100)\n\t\t\t*goto cannot_flee\n\t\n*label flee_select\n*page_break\nThe crew is fleeing the tower to escape the horrible headless sea demon! They must [b]SKIRMISH[b] as a group action to escape!\n\n[b]The crew will all take the best result.[/b]\n\nHowever, [b]the action leader will take 20 stress for every failure rolled.[/b]\n\nWho will lead the group action?\n\n*temp lead_character 0\n*temp lead_character_name Crew0_Name\n*temp lead_success false\n*temp lead_consequence true\n\n*stat_chart\n\tpercent Crew0_Stress Ashlyn's Stress\n\tpercent Crew1_Stress Pavi's Stress\n\tpercent Crew2_Stress Wallace's Stress\n\n*choice\n\t*selectable_if (Crew0_Stress \u003c 100) #Ashlyn will lead\n\t\t*set lead_character 0\n\t\t*goto flee_checks\n\t*selectable_if (Crew1_Stress \u003c 100) #Pavi will lead\n\t\t*set lead_character 1\n\t\t*goto flee_checks\n\t*selectable_if (Crew2_Stress \u003c 100) #Wallace will lead\n\t\t*set lead_character 2\n\t\t*goto flee_checks\n\n*comment -- Actual flee rolls start! --\n*label flee_checks\n*set this_character lead_character\n*gosub_scene display_chance\n*set lead_character_name this_character_name\n\n\"Follow me!\" shouts ${this_character_name}, frantically waving for the others to run to the tower's exit door. \"Keep with me and away from those tentacles!\"\n\nThe demon reaches down, knocking over lab equipment and piles of boxes. A deadly obstacle course separates them from escape. ${this_character_name} leaps on a table and points the way of apparent greatest safety between the blindly flailing tentacles.\n\nDo they escape? Only one of the crew needs to succeed and they will escape together!\n\n\n*comment -- Ashlyn attempts to flee --\n*page_break\n*set this_character 0\n*set this_stat Crew0_Skirmish\n*set this_stat_mod 0\n*gosub_scene display_chance\n\n*comment -- Too traumatized to attempt? --\n*if (Crew0_Stress > 100)\n\t*set this_action_success false\n\t*set this_action_consequence true\n\t*stat_chart\n\t\tpercent Crew0_Stress Ashlyn's Stress\n\t\t\n\tAshlyn is already traumatized by the events tonight and cannot help escape.\n\t\n\t*if not (lead_character = this_character)\n\t\tThe small girl is completely reliant on ${lead_character_name} to avoid the demon's grasp…\n\t\n\t*gosub group_leader_stress_increase\n\t*goto flee_action_Pavi\n\n*comment -- Ashlyn skirmishes --\n\nA reaching tentacle is writhing towards the students. \"Over here!\" she bravely shouts at the headless demon while throwing a book at it's closest tentacle.\n\nThe distraction works and it comes for her! Ashlyn uses her small size to her advantage. She dives under a cluster of desks as the tentacles reach it. They attempt to slither after her as she kicks and squirms away.\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tAshlyn scrambles clear of the desks and runs to the door! The tentacles crush the desks behind her in a writhing rage.\n\t\n\t*goto flee_action_Pavi\n\n*if not (this_action_success)\n\tAshlyn isn't fast enough. She screams as she feels the tip of a tentacle wrap around her shoe.\n\t\n\t*if not (lead_character = this_character)\n\t\tShe screams again as something else grabs her outstretched hand!\n\t\n\t\t\"I got you!\" shouts ${lead_character_name}. Ashlyn realizes it's not the demon holding her hand, but ${lead_character_name}! They pull her away from the demon!\n\t\n\tAshlyn frantically twists her leg and her shoe comes free.\n\t\n\tShe scrambles out from under the desk as the tentacles drag her shoe into darkness. She is only safe for the moment. Quickly adjusting her glasses, she looks around and sees they are no closer to the exit…\n\t\n\t*gosub group_leader_stress_increase\n\t\n*goto flee_action_Pavi\n\n*comment -- Update group action --\n*label flee_action_Pavi\n*page_break\n*if (this_action_success)\n\tAshlyn's success has paved the way for the crew to escape! \n\t*set lead_success true\n*if not (this_action_consequence)\n\t… And free of consequences! Other than the stress and trauma ${lead_character_name} may suffer for other's failures…\n\t*set lead_consequence false\n\n*comment -- Too traumatized to attempt? --\n*set this_character 1\n*set this_stat Crew1_Skirmish\n*set this_stat_mod 0\n*gosub_scene display_chance\n\n*page_break\n*set this_character 1\n*if (Crew1_Stress > 100)\n\t*set this_action_success false\n\t*set this_action_consequence true\n\t*stat_chart\n\t\tpercent Crew1_Stress Pavi's Stress\n\t\t\n\tPavi is already traumatized by the events tonight and cannot help escape. \"Physicker, heal thyself\" she weakly chuckles, amused at her own helplessness.\n\t\n\t*if not (lead_character = this_character)\n\t\tShe is completely reliant on ${lead_character_name} to avoid the demon's grasp…\n\t\n\t*gosub group_leader_stress_increase\n\t*goto flee_action_Wallace\n\n\n*comment -- Pavi attempts to flee --\nOne of the sea demon's thick scaly 'arms' smashes a transformer that was powering the submersible. Cables spring free of the machinery. They dance and spark with electricity.\n\nPavi nimbly snatches two of the electrified cables. \"It's documented that sea demons are weak to electricity,\" says Pavi. Her face is split by a maniacal grin when it is lit by arcing electricity. \"Time for a field test!\"\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tPavi ducks a swing of the demon's arm and thrusts the electric cables into its flesh. There is an immediate flash of blue light and smell of burning fish. The headless demon wrenches its arm back in voiceless anguish.\n\t\n\t\"That's a conclusive test!\" laughs Pavi.\n\t\n\t*goto flee_action_Wallace\n\n*if not (this_action_success)\n\tPavi isn't able to wrestle the frayed cables into an effective weapon. She can't find a way to use their electric charge in time to block the sea demon's arm sweeping towards her.\n\t\n\t*if not (lead_character = this_character)\n\t\t\"Get down!\" shouts ${lead_character_name}. Pavi finds herself pulled to the ground.\n\t\n\t*if (lead_character = this_character)\n\t\tPavi drops to the ground a moment before the arm swings towards her.\n\n\tThe demon's black-scaled limb passes overhead, so close that Pavi feels a fetid breeze that smells of rotting fish.\n\t\n\t*gosub group_leader_stress_increase\n\n*comment -- Update group action --\n*label flee_action_Wallace\n*set this_character 2\n*set this_stat Crew2_Skirmish\n*set this_stat_mod 0\n*gosub_scene display_chance\n\n*page_break\n*if (this_action_success)\n\tSo far, the crew's success has paved the way for the them to escape! \n\t*set lead_success true\n*if not (this_action_consequence)\n\t… And free of consequences! Other than the stress and trauma ${lead_character_name} may suffer if Wallace fails now…\n\t*set lead_consequence false\n\n*comment -- Too traumatized to attempt? --\n*page_break\n*if (Crew2_Stress > 100)\n\t*set this_action_success false\n\t*set this_action_consequence true\n\t*stat_chart\n\t\tpercent Crew2_Stress Wallace's Stress\n\t\t\n\tWallace is already traumatized by the events tonight and cannot help escape. He is covering his head and screaming, the horrors happening now echoing loudly against his past trauma with demons.\n\t\n\t*if not (lead_character = this_character)\n\t\tHe is completely reliant on ${lead_character_name} to avoid the demon's grasp…\n\t\n\t*gosub group_leader_stress_increase\n\t*goto flee_end\n\nThe headless sea demon has hauled itself from the water. It s body looms over the student. Its slick black scales can be heard brushing against the high roof of the laboratory ceiling.\n\nThe demon's long arms curl around the edges of the room. They meet together at the one door that exits the tower. It's 'fingers' are interlocked, forming a squirming fence of tentacles that threaten to block escape.\n\n\"You're not stopping us!\" shouts Wallace. He strikes his right fist into this left palm. Both of his arms are instantly lit with an ethereal red flame.\n*page_break\n\nWallace grabs onto the writing tentacles with his bare hands. They reach back towards him, but then recoil at the touch of his flames. The flames do not harm Wallace, but they burn the demon, filling the air with the hissing sound of smoldering flesh.\n\n\"Out… Of… The… WAY!\" screams Wallace as he wrestles a demon that is one hundred times his size. Somehow, he looks like he may win.\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tImpossibly, Wallace's flame-coated fists are wounding the thick hide of the sea demon. The scaly skin hisses and breaks from his strikes. He grips two tentacles and pulls them apart. They writhe in pain at his touch and shrink from him.\n\t\n\tHe's fought back the demon. There is a gap between its \"fingers\" where they can escape.\n\t\n\t\"Go, go!\" the Demon Hunter shouts to the other students. They run out the door!\n\t\n\t*set lead_success true\n\t*goto flee_end\n\n*if not (this_action_success)\n\tThe demon is too much for Wallace to wrestle on his own. \"This is… My limit!\" he grunts with immense strain.\n\t\n\t*if (lead_success)\n\t\t*if not (lead_character = this_character)\n\t\t\t\"Here!\" shouts ${lead_character}. They rush up to Wallace, rolling a wheeled cabinet of lab supplies. It is sturdy enough to hold back the demon's entwined \"fingers\".\n\t\t\n\t*gosub group_leader_stress_increase\n\n\n*comment -- Did they escape? --\n*label flee_end\n*page_break\n[b]The heist is over![/b]\n\nDid the Society for Leviathan Studies escape the haunted tower?\n\n*if (this_action_success or lead_success)\n\t[b]Yes![/b]\n\t\n\tAt least one of the crew succeeded at the group action.\n\t\n\t[b]They are out![/b]\n\t*goto flee_consequence\n\n[b]No…[/b] Not one of the crew succeeded at the group action…\n\n[b]They cannot escape…[/b]\n*goto cannot_flee\n\n*comment -- Any consequences? --\n*label flee_consequence\n*page_break\nDid any of the crew manage to avoid the final consequence while escaping?\n\n*comment -- Avoided consequence --\n*if (lead_consequence = false) or (this_action_consequence = false)\n\t[b]Yes![/b]\n\t\n\tThe crew is free and clear of the tower.\n\t*goto escape_success\n\n[b]No….[/b]\n\nAs the students run from the tower, the sea demon pursues them with unnatural speed! Its tentacles reach for them!\n\n*temp demon_damage 25\n*if (devil_situation > 0)\n\t*set demon_damage 75\n\t\n[i]The sea demon is about to strike all the students for ${demon_damage} Harm![/i]\n\n*if (fortune_Noggs_Lives >= 100) \n\t*page_break\n\t*if not (fortune_Dylan_Drowns)\n\t\tBut at the last moment, Dylan and Noggs push the tower's great steel door closed on the demon's tentacles!\n\t\t*goto saved_by_companions\n\t\t\n\tBut at the last moment, Noggs pushes the tower's great steel door closed on the demon's tentacles!\n\t*goto saved_by_companions\n\n*if not (fortune_Dylan_Drowns)\n\tBut at the last moment, Dylan pushes the tower's great steel door closed on the demon's tentacles!\n\t*goto saved_by_companions\n\n*comment -- Gotta suffer the consequence... --\n*set this_character lead_character\n*gosub_scene display_chance\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 1\n*gosub_scene display_resist_complication\n*if (this_action_consequence)\n\t*set Crew0_Harm +demon_damage\n\t*set Crew1_Harm +demon_damage\n\t*set Crew2_Harm +demon_damage\n\tThe tentacles lash the students! It is a bloodbath. The dock is litterd with scraps of torn uniforms and flesh.\n\t\n\tThe students are lucky to stumble away from this with their lives…\n\t*goto escape_success\n\n*comment -- Avoided final consequence --\nAt the last moment, ${this_character_name} pushes the tower's great steel door closed on the demon's tentacles!\n\n*comment -- Companion averts consequence --\n*label saved_by_companions\nIt slows the monster just long enough for the crew to escape without further harm.\n\t\n*goto escape_success\n\n\n*comment -- What happens when they get out? --\n*label escape_success\n*page_break\nThe tower's heavy door is slammed wide open as the sea demon forces its way out from the tower.\n\nAs the surviving students flee down the dock, the demon thrusts out one of its thick 'arms'. Its headless torso emerges. Wood splinters and stone cracks as the monster forces its body out into the moonlight.\n\nThere is nowhere to run. The river stretches out from the submerged tower in every direction…\n*page_break\n\nBut the students realize they are not alone. The dock is circled by small river boats. On each boat stands one person. They are plainly and practically dressed. Each person holds an oar in one hand and a lantern in the other.\n\n\"The Gondoliers!\" shouts Wallace in joy, \"After they dropped us off here, they must have come back to help!\"\n\n\"Yes, but only because I warned them,\" says a strange-looking figure standing on the centermost boat.\n\nThe students gasp as they recognize the figure's plague doctor mask and blue-trimmed cloak. \"Professor Warden?\" says Pavi in astonishment.\n*page_break\n\n\"You better get off the dock,\" replies Professor Warden, and the students cannot agree more. They all jump into boats as the sea demon frees its other arm from the tower. The hulking monster's countless black scales gleam in the moonlight as it emerges from the tower.\n\nTo the students' surprise, the Gondoliers do not take their oars and push away from the horrible creature. Instead, they all raise their hands and hold their lanterns high. They join together in a song. It is a magical chorus that sounds familiar, but the words and structure of the lyrics are too ancient for the young students to comprehend.\n\nThe sea demon pulls one leg free of the tower. Its thick body twists upwards like a giant snake. It is moments from being free.\n*page_break\n\nThe Gondoliers' singing rises to a crescendo. Professor Warden raises a jeweled scepter over their head. A crow cries out in the night sky.\n\nFar above them on the distant shore, the long-abandoned Lightning Tower powers up. Electric light flashes from one giant coil to the next. \"Impossible,\" says Ashlyn, \"That tower hasn't been powered in centuries!\"\n\n*if (fortune_Noggs_Lives \u003c 100)\n\tWallace adds, \"Could that be what zapped Noggs?\"\n\n*page_break\n\nProfessor Warden points their scepter at the demon.\n\nFor the briefest instant, the world is filled with light.  Electricity leaps from the tower. The headless demon is blasted by thousands of volts of power. Its muscles spasm and flail. Its tentacles curl in excruciating pain. The air reeks of flash-burnt flesh.\n\n*page_break\n\nWhen the blinding light receeds from the students' eyes, they can see a trail of glowing red blood. The trail lead
