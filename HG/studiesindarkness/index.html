<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studies in Darkness — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "studiesindarkness", "title": "Studies in Darkness", "scenes": {"chapter1": "*temp door_risky false\n\n[b]Chapter 1: Breaking In[/b]\n*achieve complete_startup\n\nOf the five students on the dock, three step forward. They are blocked by a large locked door. It is the only entrance to the ancient stone tower. They eye the heavy steel and its substantial padlock.\n\n*comment *choice\n\t*comment #Continue\n\t\t*comment *goto door_intro\n\t*comment #Skip to Chapter2\n\t\t*comment *finish\n\n*label door_intro\n\"This is it,\" states Ashlyn Farros as she looks up at the stone tower.\n\nHer pale complexion and blond hair are glowing the lamplight. Her blue eyes are framed behind elegant glasses. Her whole appearance strongly suggests she is of noble Akorosi lineage. She is the youngest and smallest of the group, but her eyes shine with fierce determination.\n\nAshlyn spreads her arms wide, as if she could take the tower in a possessive embrace. \"This is the student laboratory for the Society of Leviathan Studies. I do not say 'was', because though it was abandoned, we are here to reclaim it!\"\n\nShe adjusts her glasses. Looking up to the woman beside her, Ashlyn asks, \"You said this place has what we need, Pavi?\"\n\n*page_break\n\nPavi Talwar is a striking contrast to Ashlyn. Unlike Ashlyn's petite frame and fair complexion, Pavi is tall and dark skinned woman who hails from a distant land south of Doskvol called Iruvia. She appears mature, slightly older than the teenage freshmen on the dock.\n\nOne hand rests on a physicker's bag slung from shoulder to hip. As a physicker in training, Pavi studies the emerging field of doctoring. She is one of the few in Doskvol with some scientific understanding of bodily humors and maladies.\n\nHer profession's experimentation on humans is widely regarded with both awe and alarm.\n\nPerhaps to assuage these fears, Pavi always maintains a physicker's cheerful 'bedside manner'. Pavi is pleasant conversationalist and precise speaker. She replies to Ashlyn in a bright tone that is full of confidence, \"Yes, Ashlyn, I was here when the disaster happened. Here is where the Society's official signet was lost. This is where we will get the signet back, and restore the Society.\"\n\n*page_break\n\nStanding beside (but slightly behind) the two women is a young Skovlan man with curly red hair and a depressed expression. He is bent over by the weight of his large backpack, but seems unbothered by the burden. His focus is on keeping his hands in his coat pockets and not drawing attention.\n\nBut he shifts his weight constantly with visible agitation. Though he is trying to hide it, Pavi notices his smoldering ire. \"What is it, Wallace?\" she asks him.\n\nWallace Walton shoots a glare and he spits out, \"Pavi, I'm mad because we're effectively already expelled! The Morlan Hall Administrator said the Society is dissolved! And all Morlan Hall students must be in a Society, no exceptions, and it's too late for us to join another one.\"\n\nLooking up at the night sky, Wallace continues to air his grievances, \"School starts in a few hours! The only thing that will change the Administrator's mind is if we get that damn signet. So the stakes are: Get the signet by dawn or we're all expelled. I don't know about you, but the College is my one chance to keep my life out of the gutter.\"\n\n\"And that's why we are here, alone in the dark and cold, when it's just hours before the first day of class starts,\" Wallace looks at Ashlyn and Pavi, \"Right?\"\n\n*page_break\n\nAshlyn and Pavi nod in grim agreement. \"Yes, Wallace, our future at the College is at stake,\" says Pavi.\n\nThen Ashlyn's face breaks into a cunning grin. She declares, \"They thought they would get rid of us. But history will show that tonight was when the Leviathan Studies began its rise to the most fearsome Society of Morlan Hall!\"\n\n*label door_main\n\n*page_break\n*comment -- Did we succeed in the last thing tried? --\n*if (this_action_success)\n\t*goto door_success\n\nThe moonlight illuminates the steel door before the three daring students. The door is locked.\n\n*if not (door_risky)\n\tRight now, the crew are in a [i]controlled[/i] situation. But if do not succeed quickly, the situation will become [i]risky[/i] as sinister forces draw closer.\n\t*goto who_will_open\n*else\n\tIt is taking time to get inside. The crew is in a [i]risky[/i] situation.\n\t*goto who_will_open\n\n*label who_will_open\n\nWho will try to open the door?\n\n*comment -- Give the option for each character once, but Ashlyn can be redone - have to always have one option or will cause an error --\n*choice\n\t#Ashlyn, who is looking up at the night sky\n\t\t*goto door_Ashlyn\n\t*hide_reuse #Pavi, who is intensely studying the lock mechanism\n\t\t*goto door_Pavi\n\t*hide_reuse #Wallace, who looks nervous\n\t\t*goto door_Wallace\n\n*comment -- Force going to the flashback\nStruggling with the door triggers a flashback for Ashlyn…\n*page_break\n*set Crew0_Stress +20\n*goto door_Ashlyn_Flashback\n\n*label door_Ashlyn\n*set this_character 0\nAshlyn has a hard time taking her eyes from the crow that circles the night sky. She can see when it crosses the bright full moon. It has circled low and close enough that its feathers are sometimes lit by light reflecting from the metal of the old lightning tower on the ancient wall.\n\nShe senses the bird's supernatural aura. She has little doubt it is a Deathseeker.\n\nShe forces her attention to the door. \"I brought you here,\" she tells the others, \"and I'm not going to let anything stand in our path.\"\n\nWhat does Ashlyn do next?\n\n*gosub tip_character\n\n*set this_stat Crew0_Attune\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp door_Ashlyn_Attune_GetStat this_chance\n\n*choice\n\t*hide_reuse #ATTUNE to force a ghost to open the door (${door_Ashlyn_Attune_GetStat})\n\t\tAshlyn puts her hand on the door and closes her eyes. She looks through the material world with her inner sight. There is a presence at the door. Its human shape causes swirls in the ghost field, which is very strong at this tower.\n\t\n\t\t\"Let me in,\" she says softly. Then her eyes snap open and she shouts at the door, \"I COMPEL YOU! [b]LET ME IN![/b]\"\n\t\t*goto door_Ashlyn_Attune_Action\n\t#FLASHBACK to when Ashlyn found the laboratory key [i](costs 20 stress)[/i]\n\t\t*set Crew0_Stress +20\n\t\t*goto door_Ashlyn_Flashback\n\n*comment -- Ashlyn has a flashback --\n*label door_Ashlyn_Flashback\n*gosub_scene chapter_ashlyn_flashback\n*page_break\n\nAshlyn's memory fades away. She pulls out the key. Looking at it, she blinks away tears. \"My older sister left me many gifts,\" she says softly.\n\nAshlyn looks back at the other students. In the darkness, the silhouettes have a striking similarity to the cloaked figures that started that fire.\n\nAshlyn shakes her head. \"I will not fear them. They will fear me.\" She steps forward and unlocks the door.\n\n*comment -- Straight to success! --\n*goto door_success\n\n\n*comment -- Ashlyn commands a ghost --\n*label door_Ashlyn_Attune_Action\n*comment -- Do not need to set the stats again, there was only one action option --\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tWith her inner sight, Ashlyn sees the material world touch the swirling mists of the ghost field. It turns the latch on the other side of the door.\n\t\n\tImpatiently, Ashlyn takes the door handle and throws the door open. The swirling mist dissipates.\n*if not (this_action_success)\n\tThere is no response from the ghost field.\n\t\n\tAshlyn tries to not show her embarrassment.\n\n*if (this_action_consequence)\n\t*gosub door_ghost\n\t\n*goto door_main\n\n*comment -- Ashlyn consequence --\n*label door_ghost\n*if not (door_risky)\n\t*if (this_action_success)\t\t\n\t\tLuckily, the crew moved quickly and can leave the dock before more serious complications happen here.\n\t\t\n\t\t*goto door_main \n\t\n\t*comment -- Not a success... --\n\tThis is taking a long time. With authorities closing in, the situation is becoming more risky…\n\t*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n\t*set this_action_attribute 1\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\t\n\t\t*set door_risky true\n\t\tPrecious time passes. The crew is now in a [i]risky[/i] situation and may suffer more serious consequences.\n\t\t*return\n\tThe crew put in some hustle!\n*if (door_risky)\n\t${this_character_name} senses something undead is drawing closer. There is an Increased chance of a ghost rampage.\n\t*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n\t*set this_action_attribute 2\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set fortune_Ghost_Rampage +15\n\t\tSomewhere, a malevolent undead draws closer...\n\t\t*return\n\tThe ghost senses the strong will that ${this_character_name} exudes. It retreats.\n*return\n\n*comment -- Pavi vs door --\n*label door_Pavi\n*Set this_character 1\n\n\"Don't worry,\" Pavi assures the others, \"After a few years at Morlan Hall, you will know a hundred ways to break into a lab.\"\n\nShe smiles disarmingly, \"Not that I, personally, have ever done something like this before, of course!\"\n\n*gosub tip_character\n\n*gosub door_Pavi_Finesse_SetStat\n*gosub door_Pavi_Consort_SetStat\n\n*choice\n\t#CONSORT with other, less brave students, asking them to help break down the door (${door_Pavi_Consort_GetStat})\n\t\tPavi takes a few steps back to the huddle of other students.\n\t\n\t\t\"Come on, let's all pull on that old door together. Dylan, put your back into it! Noggs, you can help too! We can do it as a team!\" she encourages them.\n\t\t*goto door_Pavi_Consort_Action\n\t*if (Crew1_Load \u003c 100)\n\t\t#FINESSE the door with thieves' tools (${door_Pavi_Finesse_GetStat}, takes 20 load)\n\t\t\tPavi takes a small back stachel out of her doctor's bag. She unwraps it and reveals an extremely fine and delicate set of lockpicks.\n\t\t\t*set Crew1_Load +20\n\t\t\t*goto door_Pavi_Finesse_Action\n\t\t\n*label door_Pavi_Consort_SetStat\n*set this_stat Crew1_Consort\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp door_Pavi_Consort_GetStat this_chance\n*return\n\n*label door_Pavi_Finesse_SetStat\n*set this_stat Crew1_Finesse\n*set this_stat_mod 1\n*gosub_scene display_chance\n*temp door_Pavi_Finesse_GetStat this_chance\n*return\n\n\n*comment -- Pavi talks other students into working --\n*label door_Pavi_Consort_Action\n*gosub door_Pavi_Consort_SetStat\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tPavi's words manage to squeeze some more energy out of the tired students.\n\t\n\tThey gather around the door and take hold of anything that looks loose.\n\t\n\tPavi calls out, \"Heave! Heave! HEAVE!\" and the door swings open. The students laugh, hug and clap each other on the backs.\n*if not (this_action_success)\n\tNoggs and Dylan look at each other. \"It's like this, Pavi,\" says Noggs, \"We don't want to get expelled either, of course. But…\"\n\t\n\tDylan finishes the sentence, \"You all seem to know what to do. We're just freshmen. Show us how it's done!\"\n\t\n\tThey refuse to budge.\n*gosub door_consequence\n*goto door_main\n\n\n*comment -- Pavi finesses the door --\n*label door_Pavi_Finesse_Action\n*gosub door_Pavi_Finesse_SetStat\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tPavi motions for lamps to be brought closer to the door's keyhole. Pavi inserts her small tools into the lock.\n\t\n\tA few deft twists of the lockpicks and the door springs open. Pavi carefully tucks her tools back in their hidden pocket.\n*if not (this_action_success)\n\tPavi gives up after a while. \"Well, that lock is too well made for me to manage,\" she says as she hides her thieves'  tools back in her bag.\n*gosub door_consequence\n*goto door_main\n\n*comment -- Wallace vs door --\n*label door_Wallace\n*set this_character 2\n“I’ll give it a go,” says Wallace. He steps forward. He is hunched under his heavy fall coat and large backpack. His hands are in his pockets and he eyes the door suspiciously.\n\nHonestly, Wallace would rather not enter the old tower. But he really wants to get off of the exposed dock. He looks back at the two less brave, but equally desperate, students that wait on the dock.\n\nOne of the students looks Wallace straight in the eyes. Wallace remembers meeting him earlier this night. Noggs was the name…\n\nWallace turns back to the door and sighs, \"There's nothing for it. I can do it.\"\n\nWhat does Wallace do next?\n*gosub door_Wallace_Study_SetStat\n*gosub door_Wallace_Wreck_SetStat\n\n*gosub tip_character\n\n*choice\n\t#WRECK the door his bare hands (${door_Wallace_Wreck_GetStat})\n\t\tWithout any further hesitation, Wallace grips the door handles and pulls hard. The loose old bolts strain against his violence.\n\t\t*goto door_Wallace_Wreck_Action\n\t*if (Crew2_Load \u003c 100)\n\t\t#STUDY the door to find the right tool to open it (${door_Wallace_Study_GetStat}, costs 20 inventory)\n\t\t\tWallace takes off his backpack and rummages through it. Soon a number of crowbars, pliers and other instruments are at the ready. But will any of them break open this door?\n\t\t\t*set Crew2_Load +20\n\t\t\t*goto door_Wallace_Study_Action\n\t*if not (fortune_Noggs_Wallace)\n\t\t#FLASHBACK to when Wallace met Noggs (take 10 stress)\n\t\t\t*set Crew2_Stress +10\n\t\t\t*gosub_scene chapter_flashback_noggs_wallace\n\t\t\tAn hour later, at the dock outside the laboratory, Noggs turns back to the other students. Wallace turns back to the door.\n\t\t\t*goto door_main\n\n*label door_Wallace_Study_SetStat\n*set this_stat Crew2_Study\n*set this_stat_mod 1\n*gosub_scene display_chance\n*temp door_Wallace_Study_GetStat this_chance\n*return\n\n*label door_Wallace_Wreck_SetStat\n*set this_stat Crew2_Wreck\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp door_Wallace_Wreck_GetStat this_chance\n*return\n\n\n*comment -- Study the door --\n*label door_Wallace_Study_Action\n*gosub door_Wallace_Study_SetStat\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tIn the end, Wallace's trusty yellow crowbar was exactly the right tool for the job.\n\t\n\tThe lock snaps off with a bang and the door swings open.\n*if not (this_action_success)\n\tWallace tries several of his tools with no luck. He gives up.\n*gosub door_consequence\n*goto door_main\n\n\n*comment -- Wreck the door --\n*label door_Wallace_Wreck_Action\n*gosub door_Wallace_Wreck_SetStat\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tWallace tears open the doors. He wrings his hurting hands, but smiles with an impish glee.\n*if not (this_action_success)\n\tWallace strikes the door with great force, but it is built to resist forced entry.\n*gosub door_consequence\n*goto door_main\n\n\n*comment -- Set what happens if there is a consequence with the door --\n*label door_consequence\n*comment -- Maybe nothing is wrong! --\n*if not (this_action_consequence)\n\t*return\n\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 2\n\n${this_character_name} is trying to focus, but this is taking a long time.\n*if not (door_risky)\n\t*if (this_action_success)\n\t\tRegardless, the crew has moved swiftly enough to avoid any consequences for now!\t\n\t\t*return\n\t*comment -- Not a success --\n\tThe situation is becoming [i]risky[/i].\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t${this_character_name} could not focus. With authorities approaching, the situation is now [i]risky[/i].\n\t\t*return\n\t*comment -- Avoided consequence --\n\t${this_character_name} realizes they are taking too long, and steps back for someone to take another shot.\n\t*return\n\n*comment -- The door was risky! --\n${this_character_name} senses that authorities are drawing closer. There is an increased chance of Bluecoats interfering with their heist…\n*gosub_scene display_resist_complication\n*if (this_action_consequence)\n\t*set fortune_Bluecoats_Interfere +25\n\tSomewhere, a Bluecoat patrol draws closer...\n\t*stat_chart\n\t\tpercent fortune_Bluecoats_Interfere Bluecoats Interfere\n\t*return\n\n${this_character_name} picks up the pace! Not too much time was lost.\n*return\n\n\n*comment -- Successfully opened the door --\n*label door_success\n*page_break\nMoonlight spills through the open door, revealing only the stone floor within. ${this_character_name} lights a lantern and shines the beam inside. The expansive interior of the tower is revealed.\n\nAll of the tower that is above water is revealed to be a single cavernous room. The floor is a newly installed metal grating, but the walls and ceiling are old stone. It smells dank and and neglected.\n\nA thick layer of dust is covering the laboratory equipment which fills the room. Looming over it all is a spark-craft submersible.\n\nThe laboratory may contain yet unknown dangers, but the students are glad to leave the exposed dock.\n\nEveryone hurries inside…\n\n*finish\n\n*label tip_character\n[i][b]Tip:[/b]\nAt any time you can click \"Show Stats\" at the top to learn more about your active character and the skill system.[/i]\n*set intro_finished true\n*return\n", "chapter2": "*set this_character 2\n*set intro_finished true\n\n[b]Chapter 2: Sealed[/b]\n\n*achieve complete_chapter1\n\nAn hour later and the students have the laboratory in running condition.\n\nLamps have been lit on the walls and tables. There there was not too much debris from the accident that shut down the laboratory months ago. The charred and broken lab equipment was swept aside.\n\nLuckily, the lab had a stock of backup equipment. Many crates have been opened, their contents poured out and sorted through.\n\nThe result of their efforts is a functioning submersible.\n\n*comment *choice\n\t*comment #Continue\n\t\t*comment *goto sub_intro\n\t*comment #Skip to Chapter 3\n\t\t*comment *finish\n\n*page_break\n\n*label sub_intro\nOut of the water, the submersible stands far over the heads of the students. Its lacquered wooden hull is a hollow round cylinder.\n\nOne of the other freshmen who came along is a young girl named Dylan. She is working inside, visible through the submarine's thick porthole glass. She is a blond like Ashlyn. But unlike the Akorosian's light blond hair and pale features, Dylan's hair and complexion is much more ruddy. Combined with Dylan's significant height and strength, it is easy to assume this rugged girl hails from the Dagger Isles.\n\nDylan crouches in the submarine. Though the submarine itself is large, its thick hull (to resist the pressure of deep dives) leaves little space inside for the crew. Many other students would have found it straining to move in a relatively small space. Dylan has no hint of tiredness while she is busy with final checks of instruments and motors.\n\n*page_break\n\nThe submersible has no propeller or ballast tanks. It can only move by driving its large electric-powered wagon wheels along its bottom. It is designed to traverse the river floor - or in this case, to descend the tower's ramp to its lowest floor, somewhere far below, deep under the water's surface, far beyond where the laboratory's lights can reach.\n\nThick cables snake across the laboratory's metal grated floor to a console that Pavi is working on. Wires criss-cross above her, meshing together in a powerful transformer. With a nod, she throws a heavy switch. The electricity comes on with a flash and a bang. Pumps and turbines come to life around Pavi.\n\n\"We're live!\" she shouts and runs to the submersible. She climbs the ladder to its one porthole at the top.\n\n*page_break\n\nThe laboratory floor only covers half of the tower's interior. The other half is completely calm, black river water. The water is encircled by the tower's walls.\n\nWallace's imagination has been going wild. Besides the signet, Pavi and Ashlyn had refused to describe what could be down there, submerged in the water, trapped by the ancient tower walls…\n\nAshlyn has been quietly staring into the water for a long time. There is some splintered wooden wreckage where the laboratory floor meets the water. She has been repeatedly running her hands over the wreckage, like she is feeling for something hidden. The other students have stayed well out of her way.\n\n*page_break\n\nWallace calls up from the tower floor to Pavi on the submarine, \"You really think you're going to find the signet down there?\" \n\nPavi gives him a thumbs-up. \"I know it,\" she says, \"There is a ramp that goes all the way down. I'll drive the submarine down there, and then…\"\n\nShe turns and gives another thumbs-up. Her encouragement is targeted at a unhappy looking student in a bulky dive suit. He is seated on a small iron bench that is bolted to the side of the submersible. He has nothing to steady himself on the slick hull besides a few protruding ladder rungs. His helmet is off so they all can see his frightened eyes under his long greasy hair.\n\n\"There is only one man who will be able to actually pick up the signet in the water. That will be our diver… Noggs!\" Pavi tells the greasy teen, \"The submarine gets power and air from the laboratory equipment up here. And the diver gets his air from the submarine. It really is a technical achievement. You should be honored to take part!\"\n\nWith a broad smile, Pavi asks Noggs, \"Ready to get locked in?\" Before he can respond, she's tightening his restraints and sealing his suit.\n\n*page_break\n\nNoggs is making small shaking motions with his head as Pavi double checks his air hose and speaking tube.\n\nNoggs looks down at Wallace desperately.\n\n*label seal_SetStat\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 2\n*set this_stat Crew2_Command\n*set this_stat_mod 0\n*gosub_scene display_chance\n*comment -- Normally there would be a return here, but we're going straight into the choice now\n\n[b]Noggs' current chance of survival[/b]\n*stat_chart\n\tpercent fortune_Noggs_Lives Noggs Survives\n\n*choice\n\t*if not (fortune_Noggs_Wallace)\n\t\t#FLASHBACK to when Wallace met Noggs (take 10 stress)\n\t\t\t*set Crew2_Stress +10\n\t\t\t*gosub_scene chapter_flashback_noggs_wallace\n\t\t\t*goto after_flashback\n\t#COMMAND Wallace to focus (${this_chance})\n\t\tWallace reaches down for some motivation he can give Noggs. Sure, Wallace also thinks this will end in failure. But Wallace has been in many desperate fights.\n\t\t\n\t\t\"Chin up, lad,\" Wallace tells Noggs sternly. He does his best impersonation of the men who taught him how to fight. Wallace puts fire in his tone as commands Noggs, \"We need your best right now!\"\n\t\t*goto seal_resolve\n\t*if (Crew1_Stress \u003c 100)\n\t\t#COMMAND Wallace to focus, with Pavi's help (${this_chance_plus1}, and Pavi takes 20 stress)\n\t\t\tWallace tells Noggs, \"I expect your best down there. Pavi will be working hard to make sure you will be able to get that signet. Isn't that right, Pavi?\"\n\t\t\t\n\t\t\tPicking up on the cue, Pavi takes a serious tone, \"It won't be easy for us to navigate in that inky black water. But I'm going to get you to that signet. And then you're going to finish the job. We are a team, Noggs.\"\n\t\t\t*set Crew1_Stress +20\n\t\t\t*set this_stat_mod 1\n\t\t\t*goto seal_resolve\n\n*label after_flashback\nIt is now two hours after they met in the cafe. They are inside the tower and Noggs is being sealed in the diving suit.\n\n*if (this_action_success)\n\tNoggs meets Wallace's eyes. Together, they remember the moment of camaraderie in the cafe.\n\t\n\tNoggs stops shaking. He seems much calmer.\n*if not (this_action_success)\n\tNoggs looks away from Wallace. He's shaking harder than before. Even Pavi is having trouble hiding her concern for him.\n*goto seal_SetStat\n\n*label seal_resolve\n*gosub_scene display_chance_results\t\t\n\n*if (this_action_success)\n\tThe pep talk does make Noggs more aware. He has an air of grim determination.\n\t\n\t*set fortune_Noggs_Lives +25\n\t*stat_chart\n\t\tpercent fortune_Noggs_Lives Noggs Survives\n\n*page_break\n\n*if (this_action_consequence)\n\t${this_character_name} sees Noggs is already starting to panic. The dive can be [i]risky[/i] from the very start.\n\t\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set dive_situation +1\n\t\tThey fail in their attempts to help Noggs keep his focus. He is quietly panicking and the dive will be [i]risky.[/i]\n\t\n\t*if not (this_action_consequence)\n\t\t\"Hey, Noggs, steady there,\" Wallace shouts up at Noggs. Pavi puts a calming hand on the boy's shoulder.\n\t\t\n\t\tThey succeed in pulling Noggs out of his vicious cycle of depression. \"I'm fine!\" he shouts back to Wallace. Then he takes a deep breath and repeats more earnestly, \"Really, I'm fine.\"\n\n*page_break\n\nThere's no more preparation to be done. Pavi lowers the dive helm over Noggs' head and seals it shut. Then she climbs into the top hatch on the submarine. With a clank the final seal is made.\n\nThe sound of electric motors winds up. The submarine's wheels begin to turn. It drives forward, down the ramp and into the water.\n\n*finish\n", "chapter3": "*set this_character 0\n*set intro_finished true\n*temp mask_mod 0\n\n[b]Chapter 3: Haunted[/b]\n\n*achieve complete_chapter2\n\nAshlyn is standing where the center of the tower, where edge of laboratory floor meets the inky black water. She watches as Pavi pilots the submarine into the black depths. Waves kicked up by the submarine's entrance rebound off the walls of the tower. Nothing to worry about - the area enclosed by the tower is so large that even the submarine's large bulk does not visibly raise the water level.\n\nSome of the waves slosh up onto the laboratory floor. Ashlyn looks down as the black liquid runs around the heels of her boots. As the water recedes through steel grates, she smiles. \"There you are,\" she says and kneels.\n\n*comment *choice\n\t*comment #Continue\n\t\t*comment *goto investigate_intro\n\t*comment #Skip to Chapter 4\n\t\t*comment *finish\n\n*label investigate_intro\nAt her feet are speckles of red. She hadn't noticed before in the lamplight, but the rippling water brought her attention down to see them. The red substance had been partly washed away by the waves but some was still congealed to the top of the grating.\n\nShe runs her finger along it. It sticks. She holds it up to her eyes and adjusts her glasses. She smells it. \"Blood,\" she says reverently, \"Fresh. Not even two hours old.\"\n\nFrom somewhere, Ashlyn hears the faint cry of a crow.\n\nThe submarine sinks below the water and disappears.\n\n*page_break\n\nAshlyn does not notice Wallace watching her. \"Watch out, Wallace. Ashlyn is doing a Whisper,\" he says to himself, \"She's good. Weirdly good. Of course, that helps explain how she got admitted to Morlan Hall…\"\n\nAshlyn rubs her fingers together, spreading the blood between them. The effect is like blood is turned into tinder and catches fire. It sparks blue and begins to smoke. The blood on the floor also starts to smolder with blue flame.\n\nThe rising smoke billows out and takes a hazy form around her. The shredded wood and metal seem reconstructed by the haze. Wallace watches the smoke rise, and shapes from the past spring into his mind. He sees that Ashlyn is at the base of what was once a platform and a crane.\n\n*page_break\n\nWallace slowly moves up close behind Ashlyn. He crouches next to the small girl and asks, \"The ghost field is made of the recent past, right? You're, um,\" he nervously gulps, \"Conjuring up what was here… Here when, when…\"\n\n\"When they died,\" Ashlyn finishes his sentence. She smiles, blue smoke coiling around her glasses.\n\nWallace bolts to his feet. \"I knew it!\" he gasps, \"That bird we saw outside! That's a Deathseeker crow… A servant of the Spirit Wardens! The Wardens send a crow to find the dead before their ghost materializes! The body must be still here somewhere!\"\n\n*page_break\n\nAshlyn stands and sighs at the boy, \"Yes, yes, everyone knows that. Be no stranger to death, Wallace.\"\n\nWallace stares and starts to retort, but Ashlyn continues, \"We are members of the Society of Leviathan Studies. Like how Pavi is retrieving the signet, we will all fight to protect our Society, here and now.\"\n\nLooking out over the water, she tells Wallace, \"I will find out who broke in here before us. And how they died.\" Looking at him with fierce eyes, she demands, \"Do not let anyone come in here! I don't care who it is, even if it is Professor Warden himself!\"\n\nThe mist billows away from Ashlyn. She turns to face the water and closes her eyes. Wallace sees the fog move as if Ashlyn is stepping forward through it, but her body is now completely motionless and still.\n\n\"Well, good luck, where-ever you are,\" Wallace mutters to Ashlyn and he turns to the tower door.\n\n*label investigate_main\n*page_break\nAshlyn sees the ghost field as a greyscale world of fog. The physical world of \"now\" has faded into the background. The lamplight is dim in her vision. She sees the recent past in glowing structures of solid vapor.\n\n*if (Ashlyn_mask)\n\tThe effect of Ashlyn's spirit mask makes the ghost field appear much more distinct to her inner eye.\n\t*set  mask_mod 1\n\n\"No sign yet of the ghost, or their murderer,\" she mutters, \"I have to draw them out. My sister studied here… I must find out what's happening.\"\n\n*if (not (Ashlyn_mask) and (Crew0_Load > 60))\n\tAshlyn did not bring her spirit mask. She had brought other equipment instead.\n\nThe situation is [i]risky.[/i] If Ashlyn doesn't solve this mystery, then the students are much less likely to leave this place unharmed…\n\n[b]Chance of solving the murder mystery:[/b]\n*stat_chart\n\tpercent fortune_See_the_Past See the Past\n\n*gosub investigate_Attune_SetStat\n*gosub investigate_Study_SetStat\n*gosub investigate_Hunt_SetStat\n*gosub investigate_Survey_SetStat\n*gosub investigate_Command_SetStat\n\nTo gather clues, her options are…\n*choice\n\t*hide_reuse #ATTUNE to the ghost field (${investigate_Attune_GetStat}) \n\t\t*goto investigate_Attune_Action\n\t*hide_reuse #STUDY the echo of the broken crane (${investigate_Study_GetStat})\n\t\t*goto investigate_Study_Action\n\t*hide_reuse #HUNT for any ghosts (${investigate_Hunt_GetStat})\n\t\t*goto investigate_Hunt_Action\n\t*hide_reuse #SURVEY the floor for signs of struggle (${investigate_Survey_GetStat})\n\t\t*goto investigate_Survey_Action\n\t*hide_reuse #COMMAND the murdered ghost to appear (${investigate_Command_GetStat})\n\t\t*goto investigate_Command_Action\n\t*if ((fortune_Ashlyn_Flashback = false) and (Crew0_Stress \u003c 100))\n\t\t#FLASHBACK to when Ashlyn found her sister's secret cache (costs 20% stress)\n\t\t\t*set Crew0_Stress +20\n\t\t\t*gosub_scene chapter_ashlyn_flashback\n\t\t\t*goto investigate_main\n\t*if (fortune_Ashlyn_Flashback)\n\t\t*hide_reuse #Examine Lauria's key\n\t\t\t*goto investigate_key\n\t*if (not (Ashlyn_mask) and (Crew0_Load \u003c 61))\n\t\t#Put on Ashlyn's spirit mask (takes 40% of Ashlyn's load)\n\t\t\t*gosub_scene chapter_ashlyn_mask\n\t\t\t*goto investigate_main\n\t#End investigation and attempt to see the past (${fortune_See_the_Past}% chance based on other successes)\n\t\t*goto investigate_End\n\n*label investigate_Attune_SetStat\n*set this_stat Crew0_Attune\n*set this_stat_mod mask_mod\n*gosub_scene display_chance\n*temp investigate_Attune_GetStat this_chance\n*return\n\n*label investigate_Study_SetStat\n*set this_stat Crew0_Study\n*set this_stat_mod mask_mod\n*gosub_scene display_chance\n*temp investigate_Study_GetStat this_chance\n*return\n\n*label investigate_Hunt_SetStat\n*set this_stat Crew0_Hunt\n*set this_stat_mod mask_mod\n*gosub_scene display_chance\n*temp investigate_Hunt_GetStat this_chance\n*return\n\n*label investigate_Survey_SetStat\n*set this_stat Crew0_Survey\n*set this_stat_mod mask_mod\n*gosub_scene display_chance\n*temp investigate_Survey_GetStat this_chance\n*return\n\n*label investigate_Command_SetStat\n*set this_stat Crew0_Command\n*set this_stat_mod mask_mod\n*gosub_scene display_chance\n*temp investigate_Command_GetStat this_chance\n*return\n\n*comment -- Actions --\n*label investigate_key\n*set fortune_See_the_Past +20\nAshlyn takes her sister's key from her pocket. \"This is the key to this laboratory,\" she murmurs\n\nShe turns the key in her hands. It is a large iron key with a round ring for a handle. Tied to the handle by a piece of twine is a small paper tag.\"\n\nAshlyn adjusts her glasses and reads the tag. \"Dhalleh's lab key. She doesn't know I copied this, and you're not going to tell her!\" The note is signed with a cute cartoon of Lauria winking.\n\nAshlyn smiles fondly. \"One day, I hope I can slide through the Societies half as well as you did, sis,\" Ashlyn says to herself.\n\n*page_break\n\nPocketing the key and its note, Ashlyn says, \"I wonder what Dhalleh did here before the accident… And after. It's been months since.\"\n*goto investigate_main\n\n*comment -- Attune --\n*label investigate_Attune_Action\n*gosub investigate_Attune_SetStat\nAshlyn further focuses her senses on the ghost field. She opens her inner eye wide and looks for spirits.\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set fortune_See_the_Past +20\n\tWhen she looks back at the laboratory, she is surprised to see the wispy forms of many students standing in the lab.\n\t\n\tShe gasps. \"What where they all doing here?\" Looking more closely, Ashlyn murmurs, \"They are just traces of life essence. They are neither murder, nor murdered. Then why…\"\n*if not (this_action_success)\n\tAshlyn looks around her. The passing wispy clouds of the ghost field do not reveal any new secrets, no matter how much she focuses.\n\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 0\n*if (this_action_consequence)\n\tAshlyn feels a chill go down her spine. She senses a rising rage in a nearby ghost.\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set fortune_Ghost_Rampage +15\n\t\tShe set out to find ghosts, but they are finding her…\n\t\t*stat_chart\n\t\t\tpercent fortune_Ghost_Rampage Ghost Rampage\n\t*if not (this_action_consequence)\n\t\t*comment -- No rampage --\n\t\tAshlyn's force of will and incredible sense of the supernatural allows her to avoid the ghost's attention.\n*page_break\n*goto investigate_main\n\n*comment -- Study --\n*label investigate_Study_Action\n*gosub investigate_Study_SetStat\nAshlyn steps closer to where the crane once stood. She puts out her hands. The fog feels like wood and steel on her fingers. She smells oil and ozone.\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set fortune_See_the_Past +20\n\tAshlyn's eyes trace the visual echo of the crane. It appears to her as it must have stood just a few hours ago. To her inner eye, it goes up far past her head and out past the laboratory floor. A cable runs the length of the arm and hangs down towards the water.\n\t\n\tAt the end of cable is a large metal object, large enough to fit someone inside. Ashlyn recognizes it from her sister's stories. \"A diving bell?\" she wonders out loud.\n*if not (this_action_success)\n\tAshlyn attempts to look up at what the crane was holding, but she cannot see that far. She tries taking off her glasses, cleaning them, and putting them back on. No luck.\n*gosub investigate_too_long\n*goto investigate_main\n\n*comment -- Hunt --\n*label investigate_Hunt_Action\n*gosub investigate_Hunt_SetStat\nAshlyn kneels down at the floor's edge. She leans over the inky black water. With her inner eye, she sees something sparkling down there…\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set fortune_See_the_Past +20\n\t\"Come out,\" she whispers down to the water, \"Come out…\"\n\t\n\tThe ction_consequence)\n\t*return\n\nAshlyn may not realize that her investigation can cause the tower to glow an errie blue. Authorities outside may be drawn to investigate.\n*stat_chart\n\t\t\tpercent fortune_Bluecoats_Interfere Bluecoats Interfere\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 1\n*if (this_action_consequence)\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set fortune_Bluecoats_Interfere +25\n\t\tSomeone else is coming to investigate…\n\t\t*stat_chart\n\t\t\tpercent fortune_Bluecoats_Interfere Bluecoats Interfere\n\t*if not (this_action_consequence)\n\t\tIt strains Ashlyn to hurry while in the timeless mist of the ghost field. She pushes herself to move quickly and without raising unwanted notice.\n\t\t\n*page_break\n*return\n\n*label investigate_End\nAshlyn stands straight and raises her arms. Her hands trace circles in the mist rising from the magically smoldering blood.\n\n*if (mask_mod > 0)\n\tAshlyn turns her head left and right. She wiggles the pink pig nose of her spirit mask. She snorts, drawing the fumes of the ghost field in through its nostrils. She smells the dead.\n\n\"It is there! I sense its imprint on the ghost field! I hear the echo of death. I will see… The murder!\" Ashlyn whispers with great intensity. Her blue eyes sparkle, reflecting the ghostly glow that surrounds her.\n\n—\n\nWill Ashlyn solve the mystery?\n*page_break \n*gosub trial_end\n\nBased on the success of her investigation, she may attune to the spirit field so precisely that she will relive the murder. This is her chance of good fortune…\n\n*temp fortune_See_the_Past_reversed 0\n*set fortune_See_the_Past_reversed 100-fortune_See_the_Past\n\n*stat_chart\n\topposed_pair fortune_See_the_Past_reversed\n\t\tFail\n\t\tSee the Past\n\n*temp dieroll_see_the_past 0\n*rand dieroll_see_the_past 0 99\n\n*comment -- Show result --\n*page_break\nBased on the success of her investigation, this is her chance of good fortune…\n*stat_chart\n\topposed_pair fortune_See_the_Past_reversed\n\t\tFail\n\t\tSee the Past\n\n[b]You roll a ${dieroll_see_the_past}[/b]\n\n—\n\nAshlyn concentrates and brings every fiber of her being into attunement with the ghost field.\n\n*if (dieroll_see_the_past >= fortune_See_the_Past_reversed)\n\t*comment -- Success! --\n\tIt reacts to her energy. Ashlyn feels a wrenching feeling, like she is plummeting off a cliff, as time rolls backwards.\n\t\n\tTo Ashlyn, the feeling is absolutely exhilarating.\n\t*page_break\n\t*goto what_happened\n*if (dieroll_see_the_past \u003c fortune_See_the_Past_reversed)\n\t*comment -- Failure --\n\tTo her utter disappointment, the ghost field fades from her sight. \"No!\" Ashlyn cries, \"Don't go! How did you die? Is the murderer still here?\"\n\t\n\tJust before the mist disappears, Ashlyn does get a sense of great power in the water below. In her mind's eye, she sees thousands of shimmering scales.\n\t\n\tThen the mundane world returns. Ashlyn finds no comfort as her eyes come to see the lamplight again. She feels incredibly alone.\n\t\n\t*if (mask_mod > 0)\n\t\tAshlyn takes off her mask and faces the Society members in the laboratory.\n\n\tAshlyn says, \"There's something in the water under us.\"\n\t\n\tShe looks down into the inky blackness. \"Pavi, Noggs, and the rest are in great danger. We all are. I don't know what that thing is, but it has killed before, and it will kill again.\"\n\t\n\t*comment -- Fighting the devil will be more dangerous now --\n\t*set devil_situation +1\n\t*finish\n\t\n*label what_happened\nLike an electrode touching a live wire, the potential energy in the ghost field suddenly explodes into color and light. This is far more real to Ashlyn than the hazy visions before.\n\nAshlyn notices the heavy layers of dust and neglect have reappeared on the furniture in the room. \"This really was just a few hours ago, it looked like this when we came in,\" Ashlyn whispers. She cannot hear herself says this, because to her ears the words have not yet been said.\n\nThe crane is whole. Pulleys along the crane guide a wet cable that comes up and up out of the black water. Students in Morlan Hall uniform are cranking a huge winch to lift something from the depths.\n\n*if (mask_mod > 0)\n\tThrough the mask, Ashlyn smells the student's sweat and fear.\n\n*page_break\n\nAt the edge of the water stands a tall figure in bulky robes. Their robes are lined with the Charterhall professor's blue trim. Their face is covered by the long hooked beak of a plague doctor's mask.\n\nWhile the person's features may be completely concealed, their identity was unmistakable.\n\n\"Professor Warden,\" Ashlyn whispers, \"What are they doing here? Am I too late? Am I seeing what happened after the murder? Spirit Wardens are only supposed to arrive [i]after[/i] someone dies…\"\n\n*page_break\n\nA diving bell emerges from the water. It hangs over the water before Professor Warden at the end of the cable.\n\nA hatch is thrown open and a woman scrambles out in a great hurry. She is now clutching the outside shell of the diving bell that is suspended over the inky black water.\n\nHer skin and hair is far darker than Ashlyn's typical Akorosi complexion. Tribal tattoos peeking from under the woman's school uniform. She looks about as old as Pavi, so probably a senior at Charterhall.\n\nShe is frantic to escape the diving bell. She looks at the water below, then to the spirit warden, She extends a hand, \"Help, Professor Warden!\" she shouts, \"Get me out!\" She seems terrified of falling from the diving bell and into the black water below.\n\nAshlyn whispers to herself, \"The woman is Serverosi. She is from the Deathlands. What could make her afraid…?\"\n\n*page_break\n\nProfessor Warden does not move. \"Do you have the signet, Dhalleh?\" asks the professor. Their voice is echoing and inhuman from inside the metal mask.\n\n\"Dhalleh? Lauria's friend?\" Ashlyn suddenly recognizes the woman from her sister's letters.\n\nThe image of Dhalleh continues to replay the events of the recent past. \"Damn the signet,\" Dhalleh shrieks at Professor Warden, \"You lied! It's not dead!\"\n\nThe water below Dhalleh erupts.\n\n*page_break\n\nDhalleh life is over in a flash. The diving bell is wrenched from the cable. Water and blood spray the laboratory. The sound of crunching bones punctuate Dhalleh's horrible scream.\n\nIn all the violence, there is moment where Ashlyn can see what happened. Dhalleh's body is broken and twisted in the grip of a massive hand. Its skin glistens with black shark-like scales.\n\nThen the hand pulls Dhalleh down to her drowning death.\n\n*page_break\n\nThe past and the present begin to blur together to Ashlyn. She fights to regain her sense of time.\n\nFlailing her arms, Ashlyn dissipates the mist of the ghost field. She realizes this laboratory was and is a place of horrible death.\n\n*if (mask_mod >0)\n\tShe rips off her spirit mask.\n\nAshlyn opens her mouth and echoes the screams of the students who witnessed the murder hours before.\n\n[b]\"Demon! There is a demon in here!\"[/b]\n\n*achieve success_mystery\n\n*finish\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2022-01-20 $2.99 $1.99 purchased\n*abort\n", "chapter4": "*set this_character 1\n*set intro_finished true\n*temp tinkering_mod 0\n\n[b]Chapter 4: Drowned[/b]\n\n*achieve complete_chapter3\n\nUnaware of what is happening above the water, Pavi drives her submarine deeper and deeper down the curving ramp.\n\nThe sub's electric lamps illuminate the submerged tower walls and ramp. The light did not reach far in the inky black water. Pavi imagined that if she could reach out of the submarine's thick glass porthole, she would not be able to see the hand at the end of her arm.\n\nIf that does not seem claustrophobic enough, also take into account that Dylan could stretch out her arms and touch both walls of the submarine. The sub's cylindrical interior is not even tall enough to stand up in.\n\nSharing this cramped space with Pavi is Dylan Griffiths. The freshman monitors instruments that measure electrical power to the motors, pumps and lanterns. She also watches for leaks. So far the wooden hull was holding, but every moment they descend means more water pressing down on them.\n\nPavi takes care to show no worry. She is the oldest student here, and the only senior. She takes it upon herself to lead by calm example.\n\nShe really does not want the others to know how worried she is about Noggs.\n\n*page_break\n\n*label intro\nSuddenly the ramp ended. The lamplight revealed the stone floor at the bottom of the submerged tower. Pavi adjusted the submarine's controls. Its wagon wheels slowed. It went from its top speed (a walking pace) down to a crawl. Once the sub was fully off the ramp she brought the machine to a stop.\n\nPavi leaned over to the speaking tube at her side. \"Noggs,\" she asked the diver, \"still hanging in there?\"\n\nOut a side porthole, Pavi could see Noggs turn and look into the submarine. The interior lighting was just bright enough to see the boy's sweating face. Long strands of his black hair was matted to his face. Pavi could see him try to wipe his face, only to awkwardly remember that his head was sealed in a bulky diving helmet.\n\n\"Yeah,\" Noggs said through the speaking tube. His voice was wavering. \"I… I didn't expect it would be so hot in the diving suit!\"\n\nPavi gave him a thumbs up and pointed towards the tower's center. \"Just stay calm,\" she said soothingly, \"Climb off the sub, and head in that direction. You'll have the signet and we'll be out of here in no time!\"\n\n*page_break\n\n\"If you say so,\" replied Noggs unsteadily. He took an electric lantern from a hook next to his seat on the outside of the sub. Pavi could see him start to climb down, then stop. Panic came through the speaking tube, \"I'm stuck!\"\n\n*gosub dive_situation_description\n*gosub dive_Pavi_Command_SetStat\n*gosub dive_Pavi_Tinker_SetStat\n\n*choice\n\t#COMMAND the diver to be careful (${dive_Pavi_Command_GetStat})\n\t\t*goto dive_noggs_command\n\t*if (Crew1_Load \u003c 100)\n\t\t#TINKER to force a sedative through Noggs' air hose (${dive_Pavi_Tinker_GetStat}, takes 30 load)\n\t\t\t*set Crew1_Load +30\n\t\t\t*goto dive_noggs_tinker\n\n*label dive_Pavi_Command_SetStat\n*set this_stat Crew1_Command\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp dive_Pavi_Command_GetStat this_chance\n*return\n\n*label dive_Pavi_Tinker_SetStat\n*set this_stat Crew1_Tinker\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp dive_Pavi_Tinker_GetStat this_chance\n*return\n\n*comment -- Pavi commands Noggs --\n*label dive_noggs_command\n*gosub dive_Pavi_Command_SetStat\n\"Keep it together!\" Pavi commands Noggs through the speaking tube, \"Check your air hose! It's caught on something\"\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tNoggs snaps back to reality. \"Sorry, sorry, I got see the problem now.\" He fixes his air hose and climbs down the side of the submarine.\n\t\n\t*set fortune_Noggs_Lives +25\n*if not (this_action_success)\n\tNoggs isn't listening. Eventually, Pavi gets Noggs to untangle the hose and climb down, but he still is terribly distracted.\n\t\n[b]Noggs' current chance of survival[/b]\n*stat_chart\n\tpercent fortune_Noggs_Lives Noggs Survives\n*page_break\n*if (this_action_consequence)\n\t*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n\t*set this_action_attribute 0\n\tIn spite of Pavi's coaching, Noggs' panic is reaching new levels, and putting everyone at risk.\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*set dive_situation +1\n\t\tThe more Pavi talks, the more distant Noggs seems… Pavi's sure the risk of this dive has gone up.\n\t*if not (this_action_consequence)\n\t\tPavi catches herself before her tendency to make speeches actually makes things worse. Noggs already has enough on his mind.\n*goto dive_setup\n\n*comment -- Pavi drugs Noggs --\n*label dive_noggs_tinker\n*gosub dive_Pavi_Tinker_SetStat\n\"Calm down, there's nothing to worry about,\" Pavi says soothingly into the speaking tube, \"Your air hose is caught on something, that's all!\"\n\nMeanwhile, she is reaching into her doctor's bag. She draws out a vial labeled -Trance Powder-.\n\n\"You'll feel calmer in a moment!\" Pavi says into the speaking tube. Then she pours some powder into the speaking tube, puts her mouth around the tube's end and blows the powder into Noggs' helmet.\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\tPavi's The unconventional sedation is successful. Noggs takes a few breaths, each slower and calmer. \"Sorry, I'm listening. What do I do?\" asks Noggs. Pavi directs him to fix his hoses, and he is on his way across the tower floor.\n\t\n\t*set fortune_Noggs_Lives +25\n*if not (this_action_success)\n\tThe sedative doesn't work as Pavi hoped. Eventually, Pavi gets Noggs to untangle the hose and climb down, but he still is terribly distracted. \n\n[b]Noggs' current chance of survival[/b]\n*stat_chart\n\tpercent fortune_Noggs_Lives Noggs Survives\n*if (this_action_consequence)\n\t*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n\t*page_break\n\t*set this_action_attribute 0\n\t*if (\tdive_situation = 0)\n\t\tIf the drug was not given carefully, Noggs could become terribly woozy and susceptible to attack...\n\t\t*gosub_scene display_resist_complication\n\t\t*if (this_action_consequence)\n\t\t\tSomething in the water is calling to Noggs…\n\t\t\t*set fortune_Ghost_Rampage +25\n\t\t\t*stat_chart\n\t\t\t\tpercent fortune_Ghost_Rampage Ghost Rampage\n\t\t\t*goto dive_setup\n\t*if (\tdive_situation > 0)\n\t\tSide effects of the drug may kick in. Complications include wooziness and reduced resistance to supernatural influence...\n\t\t*gosub_scene display_resist_complication\n\t\t*if (this_action_consequence)\n\t\t\tPavi must have inhaled some of the drug, she doesn't feel well.\n\t\t\t*set Crew1_Harm +20\n\t\t\t*stat_chart\n\t\t\t\tpercent Crew1_Harm Pavi's Harm\n\t\t\t\n\t\t\tOutside, something in the water is calling to Noggs…\n\t\t\t*set fortune_Ghost_Rampage +25\n\t\t\t*stat_chart\n\t\t\t\tpercent fortune_Ghost_Rampage Ghost Rampage\n\t\t\t*goto dive_setup\n\t*comment -- Applies to both consequences\n\t*if not (this_action_consequence)\n\t\tPavi focuses and stops herself before causing an overdose.\n*goto dive_setup\n\n*comment -- Noggs finds the danger --\n*label dive_setup\n*page_break\nPavi and Dylan watch nervously through thick glass portholes as Noggs walks into the darkness. After a few steps, his diving suit is gone from the light of the submarine's electric lanterns. The only sign that he is still moving is the fading glow of the lamp he carries and trail of hoses that drag behind him.\n\nBy the light of Noggs' diving lamp, Pavi sees him thread his way around some wreckage. \"A diving bell?\" Dylan asks Pavi, recognizing the other submersible.\n\n\"Yes,\" replies Pavi thoughtfully, \"Besides this submarine, that diving bell was the other way we explored the river bottom. It has been crushed somehow. And not by water pressure…\"\n\n*page_break\n\nNoggs seems to stop. Pavi puts her ear to the speaking tube, but it is very hard to make out anything that Noggs may be saying at this distance.\n\nShe thinks she hears Noggs say,\n\"…fish…\"\n\"…scales…\"\n\"…body…\"\n\"…got it…\"\n\"…wait for me…\"\n\n*page_break\n\nPavi shakes her head. Noggs sounds strange, even through the muffling effect of the speaking tube. His Tycherosi accent is different somehow.\n\nBut she is very excited to see Noggs coming back. The glow of his lantern brightens. Dylan cheers and claps.\n\nThe cheers die out as they notice Noggs is acting strangely. He's coming slower than he left. As his diving suit starts to come into view, they can see he is hunched over and facing away from the sub, walking backwards.\n\n*page_break\n\n\"Noggs,\" Pavi calls into the speaking tube, \"What are you doing?\"\n\nPavi can't make out his response. The only sound coming from the tube is heavy, labored breathing.\n\nNoggs is mostly in the submarine's lamplight now, but he is obscured by a swirling school of fish. This is very odd to Pavi, as they never saw any fish in the water until now. She can tell that Noggs is dragging something across the floor.\n\nThen something else moves at the edge of the lamplight, past Noggs. It glistens like fish scales. It seems terribly wrong to Pavi.\n\n*page_break\n\nNoggs reaches the submarine. He straightens from his crouch. He is so close to the submarine that Pavi can hear the metal on his dive suit bump against the submarine's wooden hull.\n\nHe turns and looks into the porthole. His face is no longer flushed and sweating. He looks deathly cold.\n\nThe scaly thing in the distance moves again.\n\nPavi urgently says into the speaking tube, \"We've got to go, Noggs. We have got to go!\"\n\n*page_break\n\nNoggs' eyes open wide. Pavi hears him shout, \"Liar! You left me here to die!\"\n\nWith an effort, he heaves up to the porthole what he had been dragging. It is a half-eaten corpse of a woman. Even as he holds the body. the school of fish still tores at her shriveled flesh.\n\nEven though it was waterlogged and tattered, Pavi can tell the corpse is wearing a Charterhall student uniform.\n\nThe clinical part of Pavi's mind tells her that the body must not have been in the water for more than a few hours. The rest of her screams. Dylan screams with her.\n\n*page_break\n\nPavi throws the submarine's drivetrain into gear. The electric motors hum to life. The submarine's wheels begin turning and the vehicle starts its slow climb up the ramp to the surface.\n\n*label ascend_main\n\n*comment -- Check for escape, capsize --\n*if ((sub_capsize >= 100) or (Crew1_Harm >= 100)) or (Crew1_Stress >= 100)\n\t*goto end_Capsize\n*if (sub_escape >= 100)\n\t*goto end_Escape\n\n*page_break\n\n*if (sub_escape \u003c 25)\n\tNoggs hangs onto the outside of submarine. His eyes are wild with murderous rage. Glimmers of the scaly flesh can be seen moving at the edge of the submarine's lamplight. Whatever it is, the huge thing is now following them up the ramp.\n\t*goto ascend_choice\n*elseif (sub_escape \u003c 50)\n\tNoggs has gotten a wrench from the dive suit's belt. Fighting the drag of the water, he smashes it into the porthole. Cracks form in the glass. Water begins trickling in…\n\t*goto ascend_choice\n*elseif (sub_escape \u003c 75)\n\tThe scaly thing must be moving faster than the submarine. In the submarine's lamplight, more of its glistening flesh is in view. It looks like… A hand?!?\n\t\n\tThat monstrous hand is so large that it could wrap its scaly fingers around the entire submarine! Its arm disappears into the darkness. How big is the rest of it?\n\t*goto ascend_choice\n*else\n\tFor the first time in what feels like an eternity, Pavi can see a faint coming down from above. The surface is coming within view!\n\t\n\tThe giant scaly hand slithers from view. Pavi is about to breathe a sigh of relief when there is a boom and the submarine shudders.\n\t\n\t\"It got ahead of us!\" shrieks Dylan.\n\t\n\tPavi looks forward and sees the monstrous hand trying to pull itself onto the ramp! Its tentacle-like fingers wriggle as it tries to grip the stone. The thing is trying to block their path!\n\t*goto ascend_choice\n\n*label ascend_choice\n*stat_chart\n\tpercent sub_escape Escape\n\tpercent sub_capsize Capsize\n\n*gosub ascend_Consort_SetStat\n*gosub ascend_Tinker_SetStat\n*gosub ascend_Attune_SetStat\n*gosub ascend_Finesse_SetStat\n*gosub ascend_Wreck_SetStat\n*gosub ascend_Command_SetStat\n\n*gosub dive_situation_description\n*choice\n\t*hide_reuse #FINESSE the controls to better navigate the ramp (${ascend_Finesse_GetStat})\n\t\t*goto ascend_Finesse_Action\n\t*hide_reuse #TINKER with the motor to gain more speed (${ascend_Tinker_GetStat})\n\t\t*goto ascend_motor_Action\n\t*hide_reuse \t\t*if (((sub_escape > 0) and (sub_escape \u003c 75)) and (Crew1_Load \u003c 100)) \t\t\t#TINKER to seal leaks in the submarine (${ascend_Tinker_GetStat}[i], uses 35 load)[/i]\n\t\t*goto ascend_seal_Action\n\t*hide_reuse *if (sub_escape \u003c 75) #ATTUNE to find out what is wrong with Noggs (${ascend_Attune_GetStat})\n\t\t*goto ascend_Attune_Action\t\n\t*hide_reuse *if (sub_escape > 50) #WRECK the hand by ramming it with the submarine (${ascend_Wreck_GetStat})\n\t\t*goto ascend_Wreck_Action\n\t*hide_reuse #COMMAND Dylan to assist (${ascend_Command_GetStat})\n\t\t*goto ascend_Command_Action\n\t*hide_reuse *selectable_if (Crew1_Load \u003c 65) \t\t#Take out fine tinkering tools ([i]costs 35 load[/i])\n\t\t\t*set Crew1_Load +35\n\t\t\tPavi quickly pulls a compact toolkit from her bag. This will surely help with any tinkering she does next.\n\t\t\t*set tinkering_mod +1\n\t\t\t*goto ascend_main\n\t*hide_reuse *selectable_if ((dive_situation > 0) and (sub_escape \u003c75)) #CONSORT to calm the submarine crew (${ascend_Consort_GetStat})\n\t\t*goto ascend_calm_crew_Action\n\t#DEVIL'S BARGAIN: Save yourself, but Dylan will drown!\n\t\t\tPavi is hopelessly out of options. She has one last, terrible idea, and she takes it…\n\t\t\t\n\t\t\t*goto end_Capsize\n\n*label ascend_Consort_SetStat\n*set this_stat Crew1_Consort\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp ascend_Consort_GetStat this_chance\n*return\n\n*label ascend_Finesse_SetStat\n*set this_stat Crew1_Finesse\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp ascend_Finesse_GetStat this_chance\n*return\n\n*label ascend_Tinker_SetStat\n*set this_stat Crew1_Tinker\n*set this_stat_mod tinkering_mod\n*gosub_scene display_chance\n*temp ascend_Tinker_GetStat this_chance\n*return\n\n*label ascend_Attune_SetStat\n*set this_stat Crew1_Attune\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp ascend_Attune_GetStat this_chance\n*return\n\n*label ascend_Wreck_SetStat\n*set this_stat Crew1_Wreck\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp ascend_Wreck_GetStat this_chance\n*return\n\n*label ascend_Command_SetStat\n*set this_stat Crew1_Command\n*set this_stat_mod 0\n*gosub_scene display_chance\n*temp ascend_Command_GetStat this_chance\n*return\n\n\n*comment -- Command Dylan --\n*label ascend_Command_Action\n*gosub ascend_Command_SetStat\n\"Dylan!\" Pavi snaps. Turning on her frightened crewmate, she orders, \"You should be watching the capacitors! Replace them quick, or we are going to slow down!\"\n\nDylan blinks and shrinks back at the sudden order. She glances at the bank of high voltage capacitors. The motor is running at full power, and the capacitors spark dangerously.\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set sub_escape +25\n\t\"There!\" Pavi points to the switches above the capacitors, \"That's the safety. Turn them off before pulling them out.\"\n\t\n\t\"Oh, of course!\" Dylan says with sudden comprehension. She gets to work. Soon, the submarine is moving at full speed again.\n\n*if not (this_action_success)\n\t\"What are you waiting for?\" Pavi demands Dylan.\n\t\n\tDylan shakes her head. \"I don't know what to do!\" she admits.\n\t\n\tPavi decides to waste no more time and goes back to the submarine's controls.\n\n*page_break\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 0\n*if (this_action_consequence)\n\t*comment -- Situation gets worse --\n\tDylan moves to change one of the capacitors. In her rush, she grabs for a capacitor that is under full voltage.\n\t\n\tDoes Pavi see the danger with enough time to warn Dylan?\n\t\n\t*gosub dive_situation_description\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*comment -- Situation consequence --\n\t\t*if ((dive_situation \u003c 2) and (sub_escape \u003c 75))\n\t\t\t*set dive_situation +1\n\t\t\tIt happens too quickly. Before Pavi knows it, Dylan is thrown back with a blast of electricity.\n\t\t\n\t\t\tShe stumbles to her feet. She doesn't look herself. Her large, strong frame is sagging with pain. \"I'm ok,\" she murmurs weakly.\n\t\t\n\t\t\tDylan's injury makes the situation more desperate.\n\t\t\t*goto ascend_main\t\t\t\n\t\t\n\t\t*if (dive_situation > 1)\n\t\t\t*set fortune_Ghost_Rampage +60\n\t\t*if (dive_situation = 1)\n\t\t\t*set fortune_Ghost_Rampage +40\n\t\t*if (dive_situation \u003c 1)\n\t\t\t*set fortune_Ghost_Rampage +20\n\t\t\"Stop! You idiot, you're going to kill yourself!\" shouts Pavi. In the moment, Pavi is far more harsh than she means to be.\n\t\t\n\t\t\"What? What did I do?\" Dylan says. She recoils from Pavi.\n\t\t\n\t\t\"Liar!\" says a voice in Pavi's head. She looks around. It repeats, \"Liar! Liar! Left to die!\"\n\t\t\n\t\tPavi turns and sees Noggs grinning through the porthole. His eyes are open painfully wide and sparkling an unnatural blue.\n\t\t\n\t\t*stat_chart\n\t\t\tpercent fortune_Ghost_Rampage Ghost Rampage\n\t\t*goto ascend_main\t\t\t\n\t*comment -- Not harmed\n\t\"Stop!\" Pavi shouts. Dylan catches herself a moment before touching the hot wire.\n\t\n\t\"What?\" says Dylan bewildered. Realizing how close she was to being electrocuted, she says, \"Woah, thanks!\" and is briefly happy just to be alive.\n*goto ascend_main\n\n\n*comment -- Ram hand --\n*label ascend_Wreck_Action\n*gosub ascend_Wreck_SetStat\nPavi guns the electric motors! Can she wreck the monster's hand without wrecking her submarine?\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set sub_escape +25\n\tThe monster's long fingers are crushed under the submarine's iron wheels.\n\t\n\tPavi and Dylan cheer as they writhing limbs pass under and behind their vessel.\n\n*if not (this_action_success)\n\tPavi tries to force all the power the submarine has into ramming the hand. The unearthly creature is far stronger than her little wooden submarine.\n\t\n\tThe submarine comes to a shuddering halt as the monster's fingers catch it.\n\t\n\tThinking fast, Pavi reverses the submarine before her vehicle is entwined in black tentacles. She is blocked, but she is not yet captured.\n\n*page_break\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 1\n*if (this_action_consequence)\n\tThe submarine was not built for such brutish measures. Wood creaks, fresh leaks spring from new cracks between the boards!\n\t\n\tHow bad could it be?\n\t\n\t*gosub dive_situation_description\n\t\n\t*stat_chart\n\t\tpercent sub_capsize Capsize\n\t\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*if (dive_situation > 1)\n\t\t\tThe hull splinters! Water is pouring in!\n\t\t\t*set sub_capsize +60\n\t\t*if (dive_situation = 1)\n\t\t\tThe hull groans like a tree caught in a windstorm. Instruments are breaking all around Pavi.\n\t\t\t*set sub_capsize +40\n\t\t*if (dive_situation \u003c= 0)\n\t\t\tGiven that this submarine is an academic tool being used as a weapon against the supernatural, it held up surprisingly well.\n\t\t\t*set sub_capsize +20\n\t\t\n\t\t*stat_chart\n\t\t\tpercent sub_capsize Capsize\n\t\t\n\t\t*goto ascend_main\n\t*comment -- Not damaged --\n\tWith some truly inspired driving, Pavi prevents the striking tentacles from causing any real damage.\n*goto ascend_main\n\n\n\n*comment -- Tinker with motor --\n*label ascend_motor_Action\n*gosub ascend_Tinker_SetStat\nPavi turns her attention to the submarine's motor. \"Rewiring a running electric motor while underwater,\" she tells herself, \"What could go wrong?\"\n\n*if (tinkering_mod > 0)\n\tShe readies her tinkering tools.\n\t\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set sub_escape +25\n\tThe motor hums with power. Pavi closes the access lid with satisfaction.\n\t\n\tDylan checks the instruments and tells Pavi happily, \"It worked! We're moving faster now!\"\n\n*if not (this_action_success)\n\tIf Pavi had some more time she could surely have done something with the motor. But by the time she starts to figure out the wiring, there is a crashing sound and the submarine shakes.\n\t\n\t\"Oh no, I better get back to the controls!\" Pavi says as she jumps up.\n\n*page_break\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 1\n*if (this_action_consequence)\n\t*comment -- Situation gets worse --\n\tAs Pavi moves away from the motor, she accidentally brushes against live wires. Electricity arcs to her body!\n\t\n\tHow bad could it be?\n\t\n\t*gosub dive_situation_description\n\t*gosub_scene display_resist_complication\n\t*if (this_action_consequence)\n\t\t*if (dive_situation > 1)\n\t\t\tThe extreme high voltage scars Pavi with horrific burns!\n\t\t\t*set Crew1_Harm +60\n\t\t*if (dive_situation = 1)\n\t\t\tJolts of electricity make Pavi's muscles spasm!\n\t\t\t*set Crew1_Harm +40\n\t\t*if (dive_situation \u003c= 0)\n\t\t\tPavi is painfully singed. It could have been much worse.\n\t\t\t*set Crew1_Harm +20\n\t\t\n\t\tDylan knocks Pavi away from the sparking wires. With an effort, Pavi struggles back to her feet.\n\t\t\n\t\t*stat_chart\n\t\t\tpercent Crew1_Harm Harm\n\t\t*goto ascend_main\n\t*comment -- Not harmed\n\tThankfully, Pavi thought to electrically isolate herself before she started working. She is unharmed by the incident.\n*goto ascend_main\n\n\n\n*comment -- Drive carefully --\n*label ascend_Finesse_Action\n*gosub ascend_Finesse_SetStat\nThe submarine has some capability to guide itself up the ramp. Pavi sits at the controls and tries to steer the submarine.\n\n*if (sub_escape \u003c 75)\n\tHer goal is to go faster by keeping the submarine from rubbing against the tower wall, the guiding rail or other obstacles that cause friction.\n*if (sub_escape >= 75)\n\tThe monstrous hand reaches for the submarine! Pavi grips the controls and throws everything she has into dodging!\n\n*gosub_scene display_chance_results\n*if (this_action_success)\n\t*set sub_escape +25\n\tNice driving!\n\t\n\t*if (sub_escape \u003c 75)\n\t\tPavi has made significant progress towards the surface.\n\t*if (sub_escape >= 75)\n\t\tAmazingly, Pavi manages to keep the lumbering submarine out of the monster hand's grasp.\n\t\n*if not (this_action_success)\n\tThe submarine controls are too unwieldy for Pavi to finesse.\n\t\n\t*if (sub_escape \u003c 75)\n\t\tNo extra progress was made.\n\t*if (sub_escape >= 75)\n\t\tThough Pavi eludes the entwining grasp of the monstrous hand, its writhing fingers get enough grip to halt the submarine from reaching the surface.\n\t\t\n\t\tDylan screams as the black fleshy scales beat against the submarine's portholes.\n\t\t\n\t\tThrough the speaking tube, Pavi can hear Noggs screaming too.\n\t\n*page_break\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 1\n*if (this_action_consequence)\n\t*comment -- Situation gets worse --\n\t*if (dive_situation \u003c 2) and (sub_escape \u003c 100)\n\t\tWhile working the controls, Pavi accidentally pulls the wrong lever. Gears are grinding against each other. The submarine starts shaking itself apart.\n\t\t\n\t\tThe situation is getting more desperate!\n\t\t*gosub_scene display_resist_complication\n\t\t*if (this_action_consequence)\n\t\t\t*set dive_situation +1\n\t\t\tThe situation is definitely worse… Expect more punishing consequences.\n\t\t\t*goto ascend_main\n\t\t*comment -- Consequence avoided --\n\t\tWith some quick thinking, Pavi pulls the right sequence of levers to undo the mechanical problem.\n\t\t*goto ascend_main\n\t*comment -- Ow! --\n\tThis is sweaty, exhausting work. Pavi is feeling harmed…\n\t\n\tHow bad could it be?\n\t\n\t*gosub dive_situati
