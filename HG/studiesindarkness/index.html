s to the dim glint of scales receeding into the tower.\n\nProfessor Warden steps onto the dock and closes the tower door. The Gondoliers are quiet.\n\nThe Spirit Warden holds out one arm. A crow lands there, its talons digging into the heavy robe. The Deathseeker shakes its feathers and settles down.\n\nThe beak-like mask of of Professor Warden turns to face the students. \"Do you have questions?\"\n\nThe students mutely nod.\n\nThe professor nods back and says, \"Then it is time… For class.\"\n\n*comment -- End after fleeing --\n*finish\n\n\n*comment -- Can't get away! --\n*label cannot_flee\nThey try to run. But every single member of the crew is completely exhausted. Mentally and physically, they can do no more, not even with their lives on the line.\n\nThey only manage a few steps before they are swept up in the monster's tentacles…\n*set Crew0_Harm 100\n*set Crew1_Harm 100\n*set Crew2_Harm 100\n\n*page_break\nSometime later that night, after an experience they can only remember as nightmarish and painful, the students find themselves on a gondola.\n\nTheir senses return as the gondolier pushes his oar away from the tower. They realize that Professor Warden is on the boat with them.\n\nThe infamous person, who is both professor and an anonymous Spirit Warden, looks at them through their metal mask in the shape of a bird's skull. Their blue-trimmed heavy cloak is splashed with glowing red demon blood.\n\n\"You required rescue before even your first day at Morlan Hall?\" says the muffled voice from behind the mask, \"You have much to learn if you hope to graduate from the College of Unnatural Studies.\"\n\n*finish\n\n\n*comment -- Who takes stress for a group failure? --\n*label group_leader_stress_increase\n*if (lead_character = 0)\n\t*set Crew0_Stress +20\n\t*stat_chart\n\t\tpercent Crew0_Stress Ashlyn's Stress\n*if (lead_character = 1)\n\t*set Crew1_Stress +20\n\t*stat_chart\n\t\tpercent Crew1_Stress Pavi's Stress\n*if (lead_character = 2)\n\t*set Crew2_Stress +20\n\t*stat_chart\n\t\tpercent Crew2_Stress Wallace's Stress\n\t\n[i]${lead_character_name} has taken 20 stress because of ${this_character_name}'s effective failure.[/i]\n\n*return\n", "chapter_ashlyn_flashback": "*set fortune_Ashlyn_Flashback true\n\nAshlyn remembers. It was the same full moon the night they burned down her sister's house.\n\n\"No!\" she had screamed as she tore herself away from her mother. She ran towards the flames that were consuming the small house on the edge of Six Towers.\n\n\"Ashlyn, come back here!\" commanded her mother. Ashlyn looked back. Her mom was now indistinguishable from the other hooded adults who were watching the fire. They seemed aloof and alien. Filled with a thrill of rebellion, Ashlyn turned on her mother and burst through the front door into the burning house.\n\n\"Lauria!\" cried Ashlyn into the burning house. Sprinting through the hall, she called again and again, \"Lauria! Lauria!\"\n\nAshlyn was stopped when a bookshelf suddenly caught fire. It burst into flames beside her, raining hot ash onto her cloak. She covered her face, coughed in the billowing smoke, and fell to her knees.\n\n*page_break\n\nA loud thunk made Ashlyn look up. Sitting in front of her was a small ornate chest, untouched by the raging fire. It had her family crest set in bronze: the fat pig. Fascinated, she picked up the chest and tucked it under one arm.\n\nAshlyn regained an awareness of her surroundings. Fire had collapsed both ways out of the hall. There was no way out. Her eyes filled with fearful tears.\n\n*page_break\n\n\"Mistress!\" she heard and whirled around to see a small bronze piglet. It hopped with aggitation on legs of springs and cogs. \"Mistress Ashlyn, I've found you!\" it exclaimed again and let out a mechanical squeal.\n\n\"Rounder, I'm so glad to see you!\" Ashlyn exclaimed as she scooped up the tiny spark-crafted creature in her other arm. Hopefully, she asked, \"If you're here, does that mean Abattoir is here too?\"\n\nThe roof gave way. She screamed as flaming timber fell around her.\n\n*page_break\n\nRealizing she was unhurt, she looked up to see two candle eyes looking down at her, shining behind glass plates. They were the eyes of a massive spark-crafted mechanism that now loomed over the house. It was lit from the fire below and the full moon behind its giant head. It reached with a iron hand and clawed away the rest of the burning roof. It lowered another metal hand before Ashlyn.\n\n\"Oh thank you, Abattoir! You're the best!\" shouted Ashlyn up to the looming face. Without hesitation she climbed one the machine's metal palm. There was the sound of working pistons and clanking gears as it lifted her up and out of the fire.\n\nThe girl said to face with candle eyes, \"Take me home.\"\n\n*page_break\n\nWith a lurch Abattoir climbed on an abandoned elevated rail line. It crouched on the rails and engaged its train wheels. The machine picked up speed and left Six Towers behind.\n\n\"That was too close!\" wimpered Rounder, \"I thought I was going to die again.\"\n\n\"Shush, Rounder,\" scolded Ashlyn, \"and bring your light over here.\"\n\nRounder obediently opened its brass mouth. Blue ethereal light spilled from its core and lit the chest that Ashlyn rescued from the fire. She lifted the lid.\n\nThere were many treasures inside. On top of them all… Was a key.\n\n*achieve flashback_ashlyn\n\n*return\n", "chapter_ashlyn_mask": "*set Ashlyn_mask true\n\nAshlyn reaches into the purse at her hip. She draws from it a mask of tanned pink leather. As she puts it on, it covers only her nose and the bottom half of her face, leaving room for her glasses.\n\nThe mask takes the form of a pig's snout. The leather has been cut and pounded to give a wide chin, a round nose and flaring nostrils. Large stitches join together the mask's top and bottom jaw. The stitches give the appearance of rows grinning teeth.\n\nAshlyn brushes back her shoulder-length blond hair so she can bring the mask's thick leather straps around her head. Small, sharp hooks interlock the seal the mask tightly.\n\nAshlyn takes a deep breath through the mask. She snorts and whispers, \"I'll smell them out. I'll root them out. Past the human waste, through the cadavers, I will find my treasure.\"\n\nBehind her glasses, Ashlyn's eyes glow with a fierce delight.\n\n*return", "chapter_flashback_noggs_wallace": "*label noggs_wallace_start\n\n*comment -- Make sure we tracked this\n*set fortune_Noggs_Wallace true\n\n*achieve flashback_noggs\n\nAn hour before they were on the docks, Wallace walked across a coffee shop to join a lonely student.\n\nThe boy was a stranger to him. But Wallace felt he had to say something. This student looked so sad, sitting in the corner with his arms folded against his chest. He wouldn't talk to the four other Society members who had come tonight.\n\nWallace sympathized. He knew what it was like to feel alone in a crowd.\n\n*page_break\n\nWallace paused, summoned his social courage, then asked, “Mind if I sit here?”\n\n“What? Oh, sure,” exclaimed the other boy in surprise, shaken out of his miserable thoughts by Wallace’s appearance. Remembering some social graces, he continued, “They call me Noggs by the way.”\n\n“Nice to meet you, Noggs! My name is Wallace,” said the redhead as he took off his backpack, pulled out a chair and sat down.\n\nThe two of them looked at Pavi, Ashlyn and Dylan. The three young women were sitting at another table in the otherwise empty coffee shop, talking gamely.\n\nWallace took a sip of his coffee and told Noggs, “Pavi makes friends so easily. You wouldn’t think she met Ashlyn only hours ago. I’m not like her. I don’t usually get along with people much. I know how you feel.”\n\n“Yeah,” agreed Noggs vaguely. He looked down at his coffee with renewed sadness and tucked his arms tighter around his chest.\n\n*page_break\n\n“Come on, coffee always gets me through it. It’ll do the same for you,” Wallace encouraged Noggs earnestly.\n\n“Oh, well, maybe… Well, the problem is,” began Noggs hesitantly, “I never drank coffee before.”\n\nNoggs absently reaches out and picks up the coffee cup. He lifts it to his nose and sniffs it suspiciously.\n\nWallace’s eyes briefly widen as sees Noggs’ hands for the first time. The backs of his fingers are lined with fine glistening black scales.\n\nNoggs… Is a Tycherosi. He has demonic heritage. There is no other explanation of the inhuman scales on his hands.\n\nNoggs saw Wallace react to his scaled hands. The Tycherosi's face hardens. \"What, never met a Stranger before?\" Noggs challenges Wallace, spitting out the derogatory term for a Tycherosi.\n\n\"Woah, calm down mate,\" Wallace recovers his composure and softens. Pointing to the curls coming from under his cap, he explains, \"See my red hair? I'm Skovlan. You and I share at least one thing in common: We weren't born of Akorosi blood, so living in Doskvol is going to be hard for both of us.\"\n\n*page_break\n\nNoggs is only half convinced. He changes topics like a train jumping the rails. “Nope, coffee is not for me,” he states, putting down the cup and hiding his hands hastily.\n\nBut the exhaustion of the day is taking a toll on him. He admits to Wallace, “I don’t care if I end up expelled. I can’t do this anymore. I just want to rest.”\n\nNoggs won’t have a chance of surviving the night if he is exhausted.\n\n*stat_chart\n\tpercent fortune_Noggs_Lives Noggs Survives\n\nWill Wallace...\n\n*set this_stat Crew2_Command\n*set this_stat_mod 0\n*gosub_scene display_chance\n\n*choice\n\t#COMMAND Noggs to drink coffee (${this_chance})\n\t\t\"Drink it,\" Wallace tells Noggs sternly, \"You're not going to last a night of college without coffee, let alone a year.\"\n\t\t*goto resolve\n\t\n\t*if (Crew2_Load \u003c 100)\n\t\t#COMMAND Noggs to drink, but also give him gloves (${this_chance_plus1}, costs 20 load)\n\t\t\t*set Crew2_Load +20\n\t\t\t*set this_stat_mod 1\n\t\t\t\"Look, here's something that makes me more comfortable,\" Wallace takes his spare gloves out of his backpack and hold them out to Noggs.\n\t\t\t\n\t\t\tThe Tycherosi is shocked and angry at Wallace's bold move. \"Want me to cover my hands? What about them?\" snarls the greasy teenager as he curls into a defensive ball on the chair. He glares at Wallace, obviously expecting some racist remark.\n\t\t\t\n\t\t\tWallace tells him honestly, \"I worry about my hands too. I always bring gloves. Believe me, it's really cold out on the canals.\"\n\t\t\t\n\t\t\tNoggs eyes Wallace suspiciously, \"Is that it? You're not all high and mighty, taking pity on a Stranger?\"\n\t\t\t\n\t\t\tWallace shakes his head and remembers all the times he told Pavi that diplomacy wasn't his strong suit. \"I want you to have them,\" he tells Noggs, \"Take the gloves, drink the coffee, and we will go get the signet. That's how we are getting through this night…. And then we are going to class in the morning. Together.\"\n\t\t\t*goto resolve\n\n*label resolve\n\n*gosub_scene display_chance_results\t\t\t\n*if (this_action_success)\n\t\"Ok, ok,\" says Noggs as he accepts what Wallace offers.\n\t\n\tWallace smiles as Noggs takes his first drink of coffee. Noggs puts down the cup quickly and screws up his face. \"Bleh! That's bitter!\"\n\t\n\t\"Yep,\" says Noggs as his face broadens into a grin, \"You'll like it when you get a taste for it. To do that, you got to finish this cup. Go on.\"\n\t\n\tAs Noggs takes a bolder drink, Wallace notices Pavi out of the corner of his eye. Under her table, she's covertly giving him a thumbs up.\n\n\tNoggs is much more likely to last through tonight.\n\t\n\t*set fortune_Noggs_Lives +25\n\t*stat_chart\n\t\tpercent fortune_Noggs_Lives Noggs Survives\n\n*if not (this_action_success)\n\t\"Nope, not for me,\" says Noggs briskly as he pushes away what Wallace offers.\n\t\n\tNoggs gets up and walks out of the coffee house. He tiredly stumbles into the darkness.\n\n*page_break\n\n*if (this_action_consequence)\t\n\tIt may be no fault of Noggs, but his Tycherosi blood may make him especially susceptible to supernatural influence...\n\t*gosub_scene display_resist_complication\n\t\n\t*comment -- There is a consequence --\n\t*if (this_action_consequence)\n\t\tRegardless of his physical fortitude, Noggs' spirit is failing. Arguing with Wallace has sapped his will further.\n\t\t\n\t\t*set fortune_Ghost_Rampage +20\n\t\t\n\t\tThe chance of a ghost rampage has increased by 20%\n\t\t\n\t\t*stat_chart\n\t\t\tpercent fortune_Ghost_Rampage Ghost Rampage\n\t\t*page_break\n\t\t*return\n\t\n\t*comment -- Resisted consequence --\n\tWallace puts his hand on Noggs' shoulder. The unexpected camaraderie shocks Noggs to alertness.\n\t\n\tAfter a long moment, Noggs brushes Wallace's hand away. \"I'm fine, really,\" he says with a bit more confidence than Wallace heard before.\n\n*comment -- Go back to where this story started --\n*page_break\n*return\n\n*comment -- Even earlier story start --\nWalking from the university to the river in the cold and dark with a group of strangers was a kind of misery he was used to. Even the idea of being expelled at dawn was not a surprise. He never really thought he could pull off this whole “education” thing. It was sort of a relief to have college be over so quickly.\n\nBut what really had his spirits up… Was coffee!\n\nThe warmth of the coffee reached the other students too. Wallace wasn’t one to socialize, but he smiled to see the other Society members chatting as they drank. But from his outside perspective, he noticed another student that wasn’t socializing. He looked miserable in fact.\n\nWhen Ashlyn went to hire gondoliers to take them to the lab, she left the other students at a riverside coffee shop. And she told the barista that she was picking up the tab. Wallace had not heard of the Farros family, but they clearly had money.\n", "choicescript_description": "Your submarine is gripped by giant tentacles! You are in a battle of wills with a murdered classmate! You play as every scoundrel in this fantasy heist. Steal a dark power… Escape with your soul!\n\n[i]Studies in Darkness[/i] is an adventurous 30,000 word interactive dark fantasy novel by Nathaniel Johnson, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\nIn the haunted gothic city of Doskvol, you control the last surviving members of a secret society. Restore your infamous reputation by heisting treasure from an abandoned laboratory. Use ectoplasm-powered steampunk technology to dive deep underwater for a unique and precious artifact.\n\nBeware, you are breaking into the Morlan Hall of Unnatural Philosophy. You will face the result of centuries of experiments with the occult and the undead. But you are prepared! Unleash the power of alchemy, electricity, and each scoundrel’s unique supernatural abilities!\n\n• Play as a heist crew of five young men and women.[n/]\n• Experience the award-winning Blades in the Dark system, where your every choice is significant and may bring both success AND terrible consequences![n/]\n• Jump between the students’ perspectives in each chapter![n/]\n• Solve a murder mystery by stepping into the realm of the undead![n/]\n• Fight off the corrupt cops that are raiding your school![n/]\n• “Flashback” to key events in the past, revealing hidden stories and special advantages![n/]\n• Tap into your “Stress” resource to overcome impossible odds. Beware, too much stress will drive you mad![n/]\n\nThe pressure is rising. Your future has been stolen from you. Steal it back!\n", "choicescript_stats": "*if not (intro_finished)\n\tFinish the prologue to unlock stats and more.\n*if (intro_finished)\n\t*gosub_scene display_stats", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 7[/b]\n  \n  Unlock chapters 4 through 7, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2022-01-20 $2.99 $1.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 7[/b]\n  \n  You've paid to unlock chapters 4 through 7.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "display_chance": "*if (this_character = 0)\n\t*set this_character_name Crew0_Name\n\t*set this_character_stress Crew0_Stress\n\t*set this_character_harm Crew0_Harm\n*if (this_character = 1)\n\t*set this_character_name Crew1_Name\n\t*set this_character_stress Crew1_Stress\n\t*set this_character_harm Crew1_Harm\n*if (this_character = 2)\n\t*set this_character_name Crew2_Name\n\t*set this_character_stress Crew2_Stress\n\t*set this_character_harm Crew2_Harm\n\n*set this_stat_final (this_stat + this_stat_mod)\n\n*if (this_character_harm >= 50)\n\t*set this_stat_final -1\t\n\t*check_achievements\n\t*if not(choice_achieved_harmed)\n\t\t*achieve harmed\n\n*if (this_stat_final \u003c= 0)\n\t*set this_chance \"[i]poor chance[/i]\"\n\t*set this_chance_plus1 \"[i]good chance[/i]\"\n*if (this_stat_final = 1)\n\t*set this_chance \"[i]fair chance[/i]\"\n\t*set this_chance_plus1 \"[i]good chance[/i]\"\n*if (this_stat_final = 2)\n\t*set this_chance \"[i]good chance[/i]\"\n\t*set this_chance_plus1 \"[i]great chance[/i]\"\n*if (this_stat_final > 2)\n\t*set this_chance \"[i]great chance[/i]\"\n\t*set this_chance_plus1 \"[i]great chance[/i]\"\n\n*if (this_character_harm >= 50)\n\t*set this_chance this_chance&\"[i], now reduced by Harm[/i]\"\n\t*set this_chance_plus1 this_chance_plus1&\"[i], now reduced by Harm[/i]\"\n\n*if (this_character_harm >= 100)\n\t*set this_chance this_chance&\"[i], and must pay 20 Stress to act[/i]\"\n\t*set this_chance_plus1 this_chance_plus1&\"[i], and must pay 20 Stress to act[/i]\"\n\t*check_achievements\n\t*if not(choice_achieved_downed)\n\t\t*achieve downed\n\n*if (this_character_stress >= 50)\n\t*check_achievements\n\t*if not(choice_achieved_stressed)\n\t\t*achieve stressed\n\n*if (this_character_stress >= 100)\n\t*set this_chance \"[i]NO chance - too Stressed![/i]\"\n\t*set this_chance_plus1 \"[i]NO chance - too Stressed![/i]\"\n\n\n\n\n*return\n", "display_chance_results": "*comment -- Reset state --\n*set this_action_success false\n*set this_action_consequence false\n\n*comment -- We have to put the roll on a separate page or it can be re-rolled by refreshing the page (like from Show Stats!)\n*temp dieroll 0\n*rand dieroll 0 99\n\n*gosub_scene display_chance\n\n*if (this_character_stress >= 100)\n\t${this_character_name} is so extremely mentally stressed that they have no chance of success! They fail completely.\n\t*set this_action_success false\n\t*set this_action_consequence true\n\t*page_break\n\t*return\n\n*if (this_character_harm >= 100)\n\t${this_character_name} is so badly harmed that they must push themselves to perform this action. [i]Take 20 stress.[/i]\n\n${this_character_name} has a ${this_chance} of success.\n\n*gosub calc_chance\n\n*temp fail 0\n*set fail 100-chance_success\n\n*stat_chart\n\topposed_pair fail\n\t\tFail\n\t\tSuccess\n*if (this_character_harm > 50)\n\t[i]Reduced chance due to being very Harmed.[/i]\n\n*if (chance_success > 75)\n\tYou have the best possible chance of success!\n\t*choice\n\t\t#Take the ${this_chance}.\n\t\t\t*goto chance_roll\n\n*choice\n\t#Take the ${this_chance}\n\t\t*goto chance_roll\n\t*selectable_if (this_character_harm \u003c 100) #Take 20 stress to push for a ${this_chance_plus1} [i](${this_character_name} now has ${this_character_stress}% Stress)[/i]\n\t\t*if (this_character = 0)\n\t\t\t*set Crew0_Stress +20\n\t\t*if (this_character = 1)\n\t\t\t*set Crew1_Stress +20\n\t\t*if (this_character = 2)\n\t\t\t*set Crew2_Stress +20\n\t\t*set this_stat_mod +1\n\t\t*goto chance_roll\n\n*label chance_roll\n*comment -- Double check you are displaying the correct chance\n*gosub_scene display_chance\n*gosub calc_chance\n*set fail 100-chance_success\n\n${this_character_name} had a ${this_chance} of success.\n*stat_chart\n\topposed_pair fail\n\t\tFail\n\t\tSuccess\n\t\t\n*temp dieroll_reverse 0\n*set dieroll_reverse 100-dieroll\n\n[b][i]You rolled a[/i] ${dieroll_reverse}[/b]\n\n*if (dieroll \u003c= chance_perfect)\n\t*set this_action_success true\n\t*set this_action_consequence false\n\t[b]${this_character_name} has accomplished a [i]perfect success[/i][/b], with no complications!\n\t\n\t—\n\t\n\t*return\n*elseif (dieroll \u003c chance_success)\n\t*set this_action_success true\n\t*set this_action_consequence true\n\t[b]${this_character_name} succeeds![/b] with a complication...\n\n\t—\n\t\n\t*return\n*else\n\t*set this_action_success false\n\t*set this_action_consequence true\n\t[b]${this_character_name} fails[/b] with a complication...\n\t\n\t—\n\t\n\t*return\n\n*comment -- Recalculate chance of success --\n*label calc_chance\n\n*temp chance_success 25\n*temp chance_perfect 1\n*if (this_stat_final = 1)\n\t*set chance_success 50\n\t*set chance_perfect 15\n*if (this_stat_final = 2)\n\t*set chance_success 75\n\t*set chance_perfect 30\n*if (this_stat_final > 2)\n\t*set chance_success 90\n\t*set chance_perfect 40\n*return\n", "display_resist_complication": "*comment -- Brought here by accident? No complication, no need to resist? --\n*if not (this_action_consequence)\n\t*return\n\n*comment -- We have to put the roll on a separate page or it can be re-rolled by refreshing the page (like from Show Stats!)\n*temp dieroll_1 0\n*temp dieroll_2 0\n*temp dieroll_3 0\n*rand dieroll_1 0 50\n*rand dieroll_2 0 50\n*rand dieroll_3 0 50\n\n*comment -- Start with a description of what happened --\n*comment ${this_action_consequence_text}\n*comment -- This used to be put in here, now it's written directly in the story --\n*line_break\n—\n*line_break\n\n*comment -- Is there no choice but to suffer this? --\n*if (this_character_stress >= 100)\n\t${this_character_name} cannot take any more stress and must suffer this consequence.\n\t*page_break\n\t*return\n\n*comment -- There is a choice --\n${this_character_name} may push themselves to avoid this consequence.\n\n*temp this_attribute_name \"Insight\"\n*if (this_action_attribute = 1)\n\t*set this_attribute_name \"Prowess\"\n*if (this_action_attribute = 2)\n\t*set this_attribute_name \"Resolve\"\n\n*temp this_attribute 0\n*if (this_character = 0)\n\t*stat_chart\n\t\tpercent Crew0_Stress Stress\n\t*if (this_action_attribute = 0)\n\t\t*set this_attribute Crew0_Insight\n\t*if (this_action_attribute = 1)\n\t\t*set this_attribute Crew0_Prowess\n\t*if (this_action_attribute = 2)\n\t\t*set this_attribute Crew0_Resolve\n*if (this_character = 1)\n\t*stat_chart\n\t\tpercent Crew1_Stress Stress\n\t*if (this_action_attribute = 0)\n\t\t*set this_attribute Crew1_Insight\n\t*if (this_action_attribute = 1)\n\t\t*set this_attribute Crew1_Prowess\n\t*if (this_action_attribute = 2)\n\t\t*set this_attribute Crew1_Resolve\n*if (this_character = 2)\n\t*stat_chart\n\t\tpercent Crew2_Stress Stress\n\t*if (this_action_attribute = 0)\n\t\t*set this_attribute Crew2_Insight\n\t*if (this_action_attribute = 1)\n\t\t*set this_attribute Crew2_Prowess\n\t*if (this_action_attribute = 2)\n\t\t*set this_attribute Crew2_Resolve\n\n*temp resist_chance 35\n*if (this_attribute = 1)\n\t*set resist_chance 25\n*if (this_attribute = 2)\n\t*set resist_chance 20\n*if (this_attribute > 2)\n\t*set resist_chance 15\n\n${this_character_name} can avoid the consequence with their [b]${this_attribute_name}[/b] of [b]${this_attribute}[/b]. If they do so, chances are they would take ${resist_chance} stress (out of a maximum possible of 50).\n\n*if (this_character_stress > 50)\n\t[i]Remember, your scoundrel is out of action if their Stress reaches 100%![/i]\n\n*choice\n\t#Take the consequence\n\t\t*return\n\t#Take the stress to avoid the consequence\n\t\t*goto take_resist\n\n*label take_resist\n\nThe random roll is a number between 0 and 50.\n\n*if (this_attribute \u003c=0)\n\tWith an attribute of 0, you take the [i]highest[/i] of two random rolls.\n\t\n\tYou roll a ${dieroll_1}…\n\n\tYou roll a ${dieroll_2}…\n\n\t*if (dieroll_1 \u003c dieroll_2)\n\t\t*set dieroll_1 dieroll_2\n*if (this_attribute = 1)\n\tWith an attribute of 1, you take the result of one roll.\n\n\tYou roll a ${dieroll_1}…\n\n*if (this_attribute = 2)\n\tWith an attribute of 2, you take the [i]lowest[/i] result of two rolls.\n\t\n\tYou roll a ${dieroll_1}…\n\n\tYou roll a ${dieroll_2}…\n\t\n\t*if (dieroll_1 > dieroll_2)\n\t\t*set dieroll_1 dieroll_2\n*if (this_attribute > 2)\n\tWith an attribute greater than 2, you take the [i]lowest[/i] result of three rolls!\n\t\n\tYou roll a ${dieroll_1}…\n\t\n\tYou roll a ${dieroll_2}…\n\t\n\tYou roll a ${dieroll_3}…\n\t*if (dieroll_1 > dieroll_2)\n\t\t*set dieroll_1 dieroll_2\n\t*if (dieroll_1 > dieroll_3)\n\t\t*set dieroll_1 dieroll_3\n\n[b]${this_character_name} takes ${dieroll_1} stress[/b] and avoids the consequence.\n\n*if (this_character = 0)\n\t*set Crew0_Stress +dieroll_1\n\t*stat_chart\n\t\tpercent Crew0_Stress Stress\n*if (this_character = 1)\n\t*set Crew1_Stress +dieroll_1\n\t*stat_chart\n\t\tpercent Crew1_Stress Stress\n*if (this_character = 2)\n\t*set Crew2_Stress +dieroll_1\n\t*stat_chart\n\t\tpercent Crew2_Stress Stress\n\n*set this_action_consequence false\n*line_break\n—\n*line_break\n\n*return", "display_stats": "*goto skip_dash\n*label display_main_options\n—\n\n*label skip_dash\nYou are now playing as: \n*if (this_character = 0)\n\t[b]Ashlyn Farros[/b], the Summoner.\n*if (this_character = 1)\n\t[b]Pavi Talwar[/b], the Pathologist.\n*if (this_character = 2)\n\t[b]Wallace Walton[/b], the Devil Hunter.\n\nHas the crew yet retrieved the Official Signet of the Society for Leviathan Studies, thus preventing their expulsion?\n\n*if (fortune_signet)\n\t[b]Yes![/b] All that remains is to escape!\n*if not (fortune_signet)\n\t[b]No…[/b] Scoring this prize is hugely important to the future of these students.\n\n*comment Update any data just in case\n*gosub_scene display_chance\n\n[b]Crew Stress[/b]\n*stat_chart\n\tpercent Crew0_Stress Ashlyn's Stress\n\tpercent Crew1_Stress Pavi's Stress\n\tpercent Crew2_Stress Wallace's Stress\n[i]If a scoundrel's stress reaches 100%, they are Traumatized and cannot act.[/i]\n\nWhere next? If finished, click \"Return to Game\" above.\n*choice\n\t#Show [b]${this_character_name}'s Actions and Attributes[/b]\n\t\t*goto display_stat_character\n\t#Show [b]Fortunes[/b]\n\t\t*goto display_stat_fortunes\n\t#What are Fortunes?\n\t\t*goto explain_fortunes\n\t#What is the crew and what is the objective?\n\t\t*goto explain_crew\n\t#What are Flashbacks?\n\t\t*goto explain_flashbacks\n\t#What is Stress, Harm and Load?\n\t\t*goto explain_stress_harm_load\n\t#How do Actions work?\n\t\t*goto explain_actions\n\t#What are consequences, and how do Attributes affect avoiding them?\n\t\t*goto explain_attributes\n\t#More about Forged in the Dark\n\t\t*goto attribution\n\t\t\n*label display_stat_character\nCharacter information:\n\n*if (this_character = 0)\n\t[b]Ashlyn Farros[/b], the Summoner\n\n\t*stat_chart\n\t\tpercent Crew0_Stress Stress\n\t\tpercent Crew0_Harm Harm\n\t\tpercent Crew0_Load Load\n\n\t[i]COMPEL[/i] - May ATTUNE to the ghost field and make a ghost follow an order. Does not suffer supernatural fear caused by their summoned ghost. \n\n\t[i]Action skills (and [b]Attributes[/b]):[/i]\n\t*stat_chart\n\t\ttext Crew0_Insight [b]Insight[/b]\n\t\ttext Crew0_Hunt Hunt\n\t\ttext Crew0_Study Study\n\t\ttext Crew0_Survey Survey\n\t\ttext Crew0_Tinker Tinker\n\t\t\n\t*stat_chart\n\t\ttext Crew0_Prowess [b]Prowess[/b]\n\t\ttext Crew0_Finesse Finesse\n\t\ttext Crew0_Prowl Prowl\n\t\ttext Crew0_Skirmish Skirmish\n\t\ttext Crew0_Wreck Wreck\n\t\t\n\t*stat_chart\n\t\ttext Crew0_Resolve [b]Resolve[/b]\n\t\ttext Crew0_Attune Attune\n\t\ttext Crew0_Consort Consort\n\t\ttext Crew0_Command Command\n\t\ttext Crew0_Sway Sway\n\n*if (this_character = 1)\n\t[b]Pavi Talwar[/b], the Pathologist\n\n\t*stat_chart\n\t\tpercent Crew1_Stress Stress\n\t\tpercent Crew1_Harm Harm\n\t\tpercent Crew1_Load Load\n\n\t[i]PHYSICKER[/i] - May TINKER with bones and blood to heal. May STUDY a malady or corpse.\n\n\t[i]Action skills (and [b]Attributes[/b]):[/i]\n\t*stat_chart\n\t\ttext Crew1_Insight [b]Insight[/b]\n\t\ttext Crew1_Hunt Hunt\n\t\ttext Crew1_Study Study\n\t\ttext Crew1_Survey Survey\n\t\ttext Crew1_Tinker Tinker\n\n\t*stat_chart\n\t\ttext Crew1_Prowess [b]Prowess[/b]\n\t\ttext Crew1_Finesse Finesse\n\t\ttext Crew1_Prowl Prowl\n\t\ttext Crew1_Skirmish Skirmish\n\t\ttext Crew1_Wreck Wreck\n\n\t*stat_chart\n\t\ttext Crew1_Resolve [b]Resolve[/b]\n\t\ttext Crew1_Attune Attune\n\t\ttext Crew1_Consort Consort\n\t\ttext Crew1_Command Command\n\t\ttext Crew1_Sway Sway\n\n*if (this_character = 2)\n\t[b]Wallace Walton[/b], the Devil Hunter\n\n\t*stat_chart\n\t\tpercent Crew2_Stress Stress\n\t\tpercent Crew2_Harm Harm\n\t\tpercent Crew2_Load Load\n\n\t[i]GHOST FIGHTER[/i] - Gains POTENCY in melee or hand-to-hand combat vs. the supernatural, improving the effect. May grapple ghosts.\n\n\t[i]Action skills (and [b]Attributes[/b]):[/i]\n\t*stat_chart\n\t\ttext Crew2_Insight [b]Insight[/b]\n\t\ttext Crew2_Hunt Hunt\n\t\ttext Crew2_Study Study\n\t\ttext Crew2_Survey Survey\n\t\ttext Crew2_Tinker Tinker\n\n\t*stat_chart\n\t\ttext Crew2_Prowess [b]Prowess[/b]\n\t\ttext Crew2_Finesse Finesse\n\t\ttext Crew2_Prowl Prowl\n\t\ttext Crew2_Skirmish Skirmish\n\t\ttext Crew2_Wreck Wreck\n\n\t*stat_chart\n\t\ttext Crew2_Resolve [b]Resolve[/b]\n\t\ttext Crew2_Attune Attune\n\t\ttext Crew2_Consort Consort\n\t\ttext Crew2_Command Command\n\t\ttext Crew2_Sway Sway\n\n*goto display_main_options\n\n*label display_stat_fortunes\n[b]FORTUNES[/b]\n\nSome say fate is inescapable. But fortune favors the bold...\n\n*stat_chart\n\tpercent fortune_Noggs_Lives Noggs Survives\n\tpercent fortune_Bluecoats_Interfere Bluecoats Interfere\n\tpercent fortune_Ghost_Rampage Ghost Rampage\n\t\n*goto display_main_options\n\n*label explain_crew\nThe crew is the band of scoundrels that are in your control. They all have important roles to play in completing the heist.\n\nIn this heist, your scoundrels are Ashlyn, Pavi and Wallace. Their goal is to reclaim the lost signet of the Society of Leviathan Studies. If they fail then they will be expelled from Charterhall University.\n\nThese three scoundrels are risking everything to stay as students at the Morlan Hall of Unnatural Philosophy!\n\nHeists are dangerous! Some of the crew may be taken out of action by the horrors they encounter. Consider the stakes when you have a choice of actions.\n\n*goto display_main_options\n\n*label explain_stress_harm_load\n[b]Stress, Harm and Load[/b] are three key statistics that your characters always have.\n\n[b]Stress[/b] is a crucial resource to all scoundrels. Stress represents their inner reserve to fight the odds and escape any peril. Stress lets scoundrels achieve many incredible things, especially by pushing themselves for better odds and resisting dangerous consequences.\n\nChoose carefully when to take stress. If your character reaches 100% stress, they are in [b]Trauma[/b] and their part in this heist is over!\n\nAlso, Trauma leaves a permanent scar on the scoundrel's soul. Their personality is changed forever. So why take the risk? Why stress and push and resist? Scoundrels know that the only way to get ahead in Doskvol is to steal it. Scars are a small price to pay for a real chance to win a better life.\n\n[b]Harm[/b] also can slow or stop a scoundrel. Being at or above 50% harm will inflict a penalty to their action rolls. A scoundrel can't act if they reach 100% harm unless they receive first aid or [i]push[/i] themselves (which costs Stress).\n\n[b]Load[/b] is the equipment and items that the scoundrel brought for this heist. It represents their preparation. Spending load means your scoundrel saw this coming and brought the right tool for the job. Nice!\n\nUsing all your load has no penalty. They are simply out of tools!\n\n*goto display_main_options\n\n*label explain_flashbacks\nWhen you play Forged in the Dark, your are dropped right into the action. But that doesn't mean your crew i unprepared.\n\n[b]Flashbacks[/b] are a way to represent that a scoundrel did something special in the past that is significant to this present moment. Like using the Load resource, Flashbacks are another way that you \"plan backwards\" in Forged in the Dark.\n\nYou have a choice to not perform a flashback that carries a cost or potential complication. The flashback may simply have a stress cost if you are guaranteed to benefit. Also, the flashback may require a roll to see how much the past action is going to affect the present situation.\n\nFlashbacks are almost always worth it. If nothing else, you get to see a special bit of story!\n\n*goto display_main_options\n\n*label explain_attributes\nWhen you take an Action, there is a small chance that it will be flawless and have no negative [b]consequences[/b]…\n\nBut for a scoundrel, life is full of consequences, many of which are truly horrible!\n\nThe severity of consequences depend on the situation: [i]controlled, risky or desperate.[/i] Controlled situations have mild consequences, but desperate situations have consequences that will wipe out a wounded scoundrel! If you can't escape a situation quickly, look for options that will help control the situation.\n\nScoundrels can tap into their Stress resource to avoid consequences. How much stress they take is dependent on their [b]Attributes[/b].\n\nAttributes are the sum of all related skills that have a score above 0. You can see how the attributes are grouped on your character's stats page.\n\nWhen a consequence occurs, you will be told how much stress you are likely to take. Weigh that against the consequence. Remember that reaching 100% stress causes [b]Trauma[/b], so some consequences are worth taking.\n\n*goto display_main_options\n\n*label explain_actions\nSuccessful [b]Actions[/b] are how a crew of scoundrels complete a heist! Consider your situation, then choose the appropriate actions.\n\nDifferent scoundrels have varying skill in actions they can take. Increased skill gives an increased chance of success, and a small increase in the chance of a perfect success with no negative [b]consequences[/b].\n\nWhen given options, consider first attempting what your character is best skilled at!\n\nThe scoundrel may also take some [b]Stress[/b] to push for a better chance. Weigh this option against the other uses of stress. Also, taking too much stress puts a scoundrel into [b]Trauma[/b] and out of the action!\n\n*goto display_main_options\n\n*label explain_fortunes\nTo understand [b]Fortunes[/b]: Imagine a line of clocks that are each ticking towards an extraordinary event. The final event may be good or bad. Thus these clocks tick up when there occurs certain relative successes or consequences.\n\nWill your scoundrels run out of time? Can they outrun fate? When the moment comes then a final die will be cast. If your crew beats the current number on the fortune, good. Otherwise… Expect disaster.\n\n*goto display_main_options\n\n*label attribution\nCopyright 2021 Nathaniel Johnson. \n\nThis work is based on Blades in the Dark (found at http://www.bladesinthedark.com/), product of One Seven Design, developed and authored by John Harper, and licensed for our use under the Creative Commons Attribution 3.0 Unported license (http://creativecommons.org/licenses/by/3.0/).\n\n*goto display_main_options", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Studies in Darkness.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "epilogue": "*set intro_finished true\n\n[b]Epilogue[/b]\n\n*achieve complete_chapter6 \n\n*comment -- Double check for any missing achievements --\n*gosub_scene display_chance\n\nThe Administrator of Morlan Hall closes his tally book with a heavy thud. He stands proudly at his podium at the grand entrance to the college. He is lit from all angles by hundreds of lamps. These lamps are energized by every fuel source imaginable. Surely, the blue flame of some lanterns are sourced by plasm, and some plasm comes human souls…\n\nThat is embodies the motto of the College of Unnatural Philosophy. To paraphrase: \"True knowledge comes from exploring the forbidden.\"\n\n*page_break\nCompleting the light show is the faint glow of morning that is creeping in over the rooftops.\n\nThe industry of Doskvol is awakening. Chimneys begin to spew ashy residue of coal and plasm. As it does every morning in Doskvol, a wet and heavy sulfurous fog is starting to roll in.\n\n\"Just about time for the Blind Hour,\" says the Administrator to himself, \"All the students we want have arrived. No reason to stay out here any longer.\"\n\n*page_break\n\nWith great satisfaction, the Administrator waves for the waiting Bluecoats to leave. \"Take those pretend students to their just punishment,\" he tells them. The watchmen move to close the paddy wagon doors on heartbroken children who tried but failed to fake their way into the college.\n\nBut then the Administrator raises a hand. \"Hold!\" he barks. The Bluecoats pause.\n\nThey all watch as a group of figures emerge from the billowing fog.\n\n*comment -- How many students remain? --\n*page_break\n\n*temp remaining_students 3\n*if not (fortune_Dylan_Drowns)\n\t*set remaining_students +1\n*if (fortune_Noggs_Lives >= 100)\n\t*set remaining_students +1\n\t\n${remaining_students} young people walk out of the mist. All are wearing in Morlan Hall uniforms. They look exhausted… But defiant.\n\nThe Administrator narrows his eyes. \"Do you claim to be students? Class is about to start. You're late… If you should even be here at all.\" He flips open his tally book to the Blacklist chapter.\n\n*comment -- Pavi outro --\n*page_break\nThe Administrator recognizes one of the older students. \"Pavi Talwar,\" he demands, \"What is the meaning of this? Have you been getting into trouble again?\"\n\n*if (Crew1_Harm \u003c 50)\n\tThe slender Iruvian woman flashes a charming smile to the Administrator.\n*if (Crew1_Harm >= 50)\n\tThe slender Iruvian woman flashes a charming but tired smile to the Administrator. Her hair was wet and some perfume was attempting to cover up a strong smell of ozone and chemicals.\n\"These are my new friends. We are terribly sorry for the inconvenience.\"\n\n*if (Crew1_Stress >= 100)\n\tThe Administrator looks at Pavi in shock. She was as well spoken he remembered, but there was a sinister twist to her words. The pleasantry came across as a biting insult. Never had he heard her speak so viciously.\n\t\n\tHe opened his mouth to retort, but was silenced by a her sudden sharp glare.\n\t\n\t[i]Pavi has suffered Trauma and become Vicious… This heist has scarred her soul the rest of his life.[/i]\n\t\n\t*achieve trauma_pavi\n\n*if (Crew1_Stress \u003c 100)\n\tThe Administrator could not help but relax and look fondly at Pavi. Her diplomatic personality was as strong as ever.\n\t\n\t[i]Pavi did not suffer Trauma from excessive Stress. Well done![/i]\n\n\n*comment -- Wallace outro --\n*page_break\nClearing her throat, a Bluecoat steps up to the podium. \"If I may,\" she says sternly, \"We received a report last night of a break-in. The suspects were dressed as Morlan Hall students.\"\n\nShe takes a long look at the ${remaining_students} standing before the podium. \"This group matches the descriptions.\"\n\nThe Administrator frowns. He looks to to the group and sees that a red-headed Skovlan boy looks particularly upset at the accusation.\n*if (Crew2_Harm >= 50)\n\tFurthermore, the fiery boy was battered and bruised. He had clearly has just come from a fight. He hadn't even bothered changing out of some of his torn uniform.\n\n\"William Walton,\" states the Administrator, \"You are a usual suspect.\"\n\nWilliam stomps down hard on the paving stones with his boot. \"You know what, last night I protected some Morlan Hall property from a raiding gang of thugs. I'm a bit tired, so I can't quite remember what they looked like. But I'm sure I would recognize them if I took a close look.\"\n*page_break\n\n*if (Crew2_Stress >= 100)\n\tThen the boy steps forward and shoves the Bluecoat hard. She falls backwards and hit the stone road with a hard thud. When she scrambles back to her feet, she stares at William with astonishment at the blatant act. William thrusts his hands in his pockets and challenges her with a reckless grin.\n\t\n\t[i]William has suffered Trauma and become Reckless… This heist has scarred his soul the rest of his life.[/i]\n\t\n\t*achieve trauma_wallace\n\n*page_break\n\nThe Administrator clears his throat and says, \"William has has a strong record of protecting Morlan Hall.\" He gives the Bluecoat a look that tells her the discussion is over, and she backs down.\n\nThe Bluecoats may claim the whole of Doskvol as their turf, but they do not so openly cross the Morlan Hall of Unnatural Philosophy. The College's retribution is always both cruel and unusual.\n\n*if (Crew2_Stress \u003c 100)\n\t\n\t[i]Wallace did not suffer Trauma from excessive Stress. Well done![/i]\n\n*comment -- Ashlyn outro --\n*page_break\n\"But you,\" says the Administrator as he leans forward over the podium and looks down, \"I don't know you, little lady.\"\n\nThe short blond Akorosi pushes her glasses up her nose and thrusts out her chin defiantly \"I'm Ashlyn Farros and I head the Society of Leviathan Studies.\"\n\n*if (Crew0_Harm >= 50)\n\tThe strutting cost her. Ashlyn suddenly staggered, her legs failing her. She recovered an instant later and forced herself straight. She looked the Administrator in the eyes again. In spite of her willpower, he saw her fair complexion had become even more pale and drawn.\n\n*if (Crew0_Stress \u003c 100)\n\tBut Ashlyn remained resolute under the Administrator's judgmental gaze.\n\t\n*if (Crew0_Stress >= 100)\n\tThe Administrator noted how coldly Ashlyn made her statement. He would expect to hear more ambition in the voice of such a young self-proclaimed leader. Yet this girl seemed hollowed, mechanical, going through the motions and nothing more.\n\t\n\t[i]Ashlyn has suffered Trauma and become Cold… This heist has scarred her soul the rest of her life.[/i]\n\t\n\t*achieve trauma_ashlyn\n\n\n\n*comment -- Did you protect the students --\n*page_break\nThe Administrator surveys the group.\n\n*if (((Crew0_Harm \u003c 50) and (Crew1_Harm \u003c 50)) and (Crew2_Harm \u003c 50))\n\t\n\t*achieve unharmed\n\t\n\tThough they are exhausted, he approves of the strength of the students and the care they have taken in their presentation. They stand tall as good examples of the Morlan Hall ideal.\n\t\n\t[i]None of the students have been seriously injured! Good job![/i]\n\t*goto student_stress\n*else\n\tTo the Administrator's disapproval, one or more of the students show the weakness of injury.\n\t\n\t[i]Some of the crew have taken more than 50% Harm.[/i]\n\t*goto student_stress\n\n\n*label student_stress\n*page_break\n*if (((Crew0_Stress \u003c 100) and (Crew1_Stress \u003c 100)) and (Crew2_Stress \u003c 100))\n\n\t*achieve sane\n\n\tThe Administrator notes that this crew appears very steady and strong of mind.\n\t\n\t[i]You have saved your scoundrels from suffering Trauma from excessive Stress! Superb![/i]\n\t\n\t*goto end_survivors\n*else\n\tThe Administrator notes that some of these potential students do not seem… Sane. Even by Morlan Hall standards.\n\t\n\t[i]Some of the crew have been Traumatized by extreme Stress.[/i]\n\t*goto end_survivors\n\n\n*comment -- Other survivors? --\n*label end_survivors\n*page_break\nThe Administrator raised an eyebrow at Ashlyn. \"Any other Society members to declare?\"\n\n*if (remaining_students \u003c 4)\n\tAshlyn takes a sharp breath. \"No.\"\n\t\n\t[i]Noggs and Dylan did not survive.[/i]\n\t*goto end_signet\n\n*if not (fortune_Dylan_Drowns)\n\t\"Dylan Griffiths! I'm back for more!\" says a strongly built and ruddy-haired woman. This earns her a look from Pavi, and they laugh together.\n\t\n\t*achieve save_dylan\n\n*if (fortune_Noggs_Lives >= 100)\n\tA boy with greasy black hair adds weakly, \"Norwich Nogging, sir.\"\n\t\n\t*achieve save_noggs\n\n*if (remaining_students \u003c 5)\n\tThe Administrator pauses. \"Anyone else?\"\n\t\n\tAshlyn shakes her head.\n\n*if (fortune_Dylan_Drowns)\n\t[i]Dylan did not survive.[/i]\n\n*if (fortune_Noggs_Lives \u003c 100)\n\t[i]Noggs did not survive.[/i]\n\n*if (remaining_students > 4)\n\t[i]You kept all the crew's cohorts alive! Well done![/i]\n\n\n*comment -- Signet --\n*label end_signet\n*page_break\nThe Administrator takes a more threatening tone as he thumbs back through the pages of the tally book. \"Ashlyn Farros… Freshman. And already the leader of a Morlan Hall Society… A Society which no longer exists.\"\n\nLooking down from his podium, the Administrator tells the group, \"I'm sorry, but you have only came here to be expelled.\"\n\nLeaning forward, he adds with relish, \"But I'm sure you will learn a lot from some years in the Penitentiary.\"\n\n*page_break\n*if (fortune_signet)\n\t*comment -- Got the signet --\n\tAshlyn arrogantly smiles back at the Administrator. \"No sir, everything is in order. We have the official signet. The Society of Leviathan Studies is back!\"\n\t\n\tThe girl produces the signet from her uniform pocket. The Administrator gasps in surprise. He mutely flips the tally book back to the Approved page and produces ink. With great ceremony, Ashlyn wets the signet with ink and stamps the page.\n\t\n\t[i]Your heist was successful! Congratulations![/i]\n\n*if not (fortune_signet)\n\t\"No,\" says a metallic voice from behind the Administrator, \"the Society of Leviathan Studies is back.\"\n\t\n\tThe Administrator whirls around to see a Spirit Warden standing directly behind him. There is no way to determine who is under the beak-shaped mask and blue-trimmed cloak, but their identity was unmistakable. \"Professor Warden!\" cries out the Administrator, \"I… I wasn't expecting you!\"\n\t\n\tProfessor Warden steps to the podium. \"The Society is under my command. So are its members. I have the official signet.\"\n\t\n\tThe professor produces the signet from under their cloak. The Administrator mutely flips the tally book back to the Approved page and produces ink. With a flair of their long cloak sleeves, Professor Warden wets the signet with ink and stamps the page. They then step back into Morlan Hall's grand entrace.\n\t\n\t[i]The signet is not yours. You failed the heist.[/i]\n\n*page_break\nThe Administrator inspects the signet's impression against the original mark. \"It is genuine,\" he declares.\n\nHe closes the tally book with a bang. Looking disappointed, the Bluecoats close the paddy wagon and leave, disappearing into the morning fog.\n\nThe Administrator looks to the ${remaining_students} young people in the Society of Leviathan Studies and sourly states, \"I mark you as students of the Morlan Hall of Unnatural Philosophy… Now you must get to class. You are late.\"\n*page_break\n\nThe ${remaining_students} scoundrels cheer and run into the grand entrance of Morlan Hall!\n\nAs they enter, they pass the imposing imposing form of Professor Warden. Two sets of eyes follow each of the students in turn: Professor Warden's eyes behind the metal mask, and also the Deathseeker Crow on a perch beside them.\n\n*if (fortune_Noggs_Lives >=100)\n\tThe crow gives a long stare as the black-haired Tycherosi boy passes, but it does not speak.\n\n*if (fortune_Possessed \u003c 0)\n\tThe crew passes the warden's inspection with no further incident.\n\t\n\t[i]None of your crew are Possessed. That's a relief![/i]\n\t\n*if (fortune_Possessed >= 0)\n\tThe crow stirs as one particular student passes.\n\t\n\t*if (fortune_Possessed = 0)\n\t\t*set this_character 0\n\t\tThe crow senses something in Ashlyn. She meets its beady eyes and her complexion turns ghostly pale.\n\t\t\n\t\t\"I'm going to school,\" Ashlyn says defiantly. But there's something different about her voice…\n\n\t*if (fortune_Possessed = 1)\n\t\t*set this_character 1\t\t\n\t\tThe crow senses something in Pavi. She meets its beady eyes and knows immediately that it knows.\n\t\t\n\t\t\"It's ok,\" Pavi tells the bird mysteriously, \"We're friends. We're going to school together.\"\n\t\t\n\t*if (fortune_Possessed = 2)\n\t\t*set this_character 2\t\n\t\tThe crow senses something in Wallace.\n\t\t\n\t\tHe sneers at the bird, \"I'm going to school!\" But there is something different about his voice…\n\t\n\t*gosub_scene display_chance\n\t*page_break\n\tThe Deathseeker opens its beak to shriek an alarm. But its cry is muffled by the firm gloved grip of Professor Warden over its head.\n\t\n\tProfessor Warden give ${this_character_name} a piercing look from behind the metal mask. \"We must have a discussion… Later.\"\n\t\n\tWith their other hand, the Professor waves the remaining students inside. Only after they are all gone does the warden release the Deathseeker.\n\t\n\t[i]${this_character_name} is Possessed by a ghost…![/i]\n\n*comment -- Final final outro --\n*label end_crow\n*page_break\nProfessor Warden takes the Deathseeker from its perch and places it in a covered cage. The crow is now in comfortable darkness. Even its supernatural senses are calmed. \n\nWhat the Deathseeker sought has been found. The work of the night is done. Now it is daytime and the domain of the living. Now it is time for learning and growth, which are things of no interest to this bird.\n\nSo it settles down, tucks its head, and falls asleep.\n\n*comment -- \n*label end_of_ends\n*page_break\n[b]The end![/b]\n\n*achieve complete_epilogue\n\nThank you for reading!\n\nWhat did you learn from this exposure to Unnatural Philosophy? I encourage you to play again and to see how things could have gone differently.\n\nWhat did you think of this adventure of scoundrel students? I would love to have your feedback!\n\nYou can reach me at https://twitter.com/HooliganLabs\n\nor Discord: Hooligan Labs#3270\n\n*goto_scene ending\n", "screenshots": "*comment Screenshot for \"Studies in Darkness\"\n\n*comment Beginning scene\n*script changeBackgroundColor(\"sepia\")\n\nAshlyn and Pavi nod in grim agreement. \"Yes, Wallace, our future at the College is at stake,\" says Pavi.\n\nThen Ashlyn's face breaks into a cunning grin. She declares, \"They thought they would get rid of us. But history will show that tonight was when the Leviathan Studies began its rise to the most fearsome Society of Morlan Hall!\"\n\nThe moonlight illuminates the steel door before the three daring students. The door is locked.\n\nRight now, the crew are in a [i]controlled[/i] situation. But if do not succeed quickly, the situation will become [i]risky[/i] as sinister forces draw closer.\n\nWho will try to open the door?\n\n*fake_choice\n\t#Ashlyn, who is looking up at the night sky\n\t#Pavi, who is intensely studying the lock mechanism\n\t#Wallace, who looks nervous\n\t\t\n\t\t\n*comment First entering the submarine\n\n*set this_character 2\n*script changeBackgroundColor(\"black\")\n\n\"There is only one man who will be able to actually pick up the signet in the water. That will be our diver… Noggs!\" Pavi tells the greasy teen, \"The submarine gets power and air from the laboratory equipment up here. And the diver gets his air from the submarine. It really is a technical achievement. You should be honored to take part!\"\n\nWith a broad smile, Pavi asks Noggs, \"Ready to get locked in?\" Before he can respond, she's tightening his restraints and sealing his suit.\n\nNoggs is making small shaking motions with his head as Pavi double checks his air hose and speaking tube.\n\nNoggs looks down at Wallace desperately.\n\n*label seal_SetStat\n*comment 0 = Insight, 1 = Prowess, 2 = Resolve\n*set this_action_attribute 2\n*set this_stat Crew2_Command\n*set this_stat_mod 0\n*gosub_scene display_chance\n*comment -- Normally there would be a return here, but we're going straight into the choice now\n\n[b]Noggs' current chance of survival[/b]\n*stat_chart\n\tpercent fortune_Noggs_Lives Noggs Survives\n\n*fake_choice\n\t#FLASHBACK to when Wallace met Noggs (take 10 stress)\n\t#COMMAND Wallace to focus (${this_chance})\n\t#COMMAND Wallace to focus, with Pavi's help (${this_chance_plus1}, and Pavi takes 20 stress)\n\t\t\n\n*comment Ashlyn enters the ghost field\n\n*set this_character 0\n*script changeBackgroundColor(\"sepia\")\n\nAshlyn sees the ghost field as a greyscale world of fog. The physical world of \"now\" has faded into the background. The lamplight is dim in her vision. She sees the recent past in glowing structures of solid vapor.\n\n\"No sign yet of the ghost, or their murderer,\" she mutters, \"I have to draw them out. My sister studied here… I must find out what's happening.\"\n\nThe situation is [i]risky.[/i] If Ashlyn doesn't solve this mystery, then the students are much less likely to leave this place unharmed…\n\n[b]Chance of solving the murder mystery:[/b]\n*stat_chart\n\tpercent fortune_See_the_Past See the Past\n\n\nTo gather clues, her options are…\n*fake_choice\n\t#ATTUNE to the ghost field \n\t#STUDY the echo of the broken crane \n\t#HUNT for any ghosts \n\t#SURVEY the floor for signs of struggle \n\t#COMMAND the murdered ghost to appear \n\t#FLASHBACK to when Ashlyn found her sister's secret cache (costs 20% stress)\n\t\t\t*set Crew0_Stress +20\n\t#Examine Lauria's key\n\t#Put on Ashlyn's spirit mask (takes 40% of Ashlyn's load)\n\t#End investigation and attempt to see the past \n\t\t\n\n*comment Pavi in the submarine\n\n*set this_character 1\n\n\nNoggs hangs onto the outside of submarine. His eyes are wild with murderous rage. Glimmers of the scaly flesh can be seen moving at the edge of the submarine's lamplight. Whatever it is, the huge thing is now following them up the ramp.\n\n*label ascend_choice\n*stat_chart\n\tpercent sub_escape Escape\n\tpercent sub_capsize Capsize\n\n*fake_choice\n\t#FINESSE the controls to better navigate the ramp \n\t#TINKER with the motor to gain more speed \n\t#ATTUNE to find out what is wrong with Noggs \n\t#Take out fine tinkering tools ([i]costs 35 load[/i])\n\t#COMMAND Dylan to assist \n\t#DEVIL'S BARGAIN: Save yourself, but Dylan will drown!\n\n\n*comment Wallace fights\n\n*set this_character 2\n\n*temp raid_leader false\n*temp raid_leader_open false\n*temp raid_weapon 0\n*temp raid_effect 0\n*temp raid_scare false\n*temp raid_win false\n*temp raid_situation 1\n\nThe Bluecoats are coming hard and fast! They are determined to break something, and Wallace is daring to stand in their way!\n\n*fake_choice\n\t#STUDY the Bluecoats to identify their leader \n\t#COMMAND the Bluecoats to leave by threatening them with a captive spirit\n\t#Equip a fine weapon ([i]takes 20 Load[/i])\n\t#DEVIL'S BARGAIN: Unleash Wallace's captive spirit, immediately driving away the Bluecoats... But also triggering a ghost rampage!\n\n", "startup": "*title Studies in Darkness\n*author Nate Johnson (aka Hooligan Labs)\n*scene_list\n\tstartup\n\tchapter1\n\tchapter2\n\tchapter3\n\t$ chapter4\n\t$ chapter5\n\t$ chapter6\n\t$ epilogue\n\tending\n\n*comment -- Assigned achievements --\n\n*achievement complete_startup visible 10 As the crow flies\n\tComplete the prologue.\n*achievement complete_chapter1 visible 10 Breaking In\n\tComplete Chapter 1.\n*achievement complete_chapter2 visible 15 Sealed\n\tComplete Chapter 2.\n*achievement complete_chapter3 visible 20 Haunted\n\tComplete Chapter 3.\n*achievement complete_chapter4 visible 25 Drowned\n\tComplete Chapter 4.\n*achievement complete_chapter5 visible 30 Raid\n\tComplete Chapter 5.\n*achievement complete_chapter6 visible 35 Emergence\n\tComplete Chapter 6.\n*achievement complete_epilogue visible 40 Epilogue\n\tComplete the Epilogue.\n\n*achievement flashback_ashlyn visible 40 Run into the fire\n\tView Ashlyn's flashback.\n*achievement flashback_noggs visible 40 All nighter\n\tView Wallace's flashback.\n\n*achievement save_dylan visible 30 Dylan's day\n\tDylan survives.\n*achievement save_noggs visible 30 Noggs' night.\n\tNoggs survives.\n\n*achievement success_signet visible 100 It was all worth it!\n\tSuccessfully heist the signet.\n\n*achievement success_mystery visible 40 Dead men tell no tales... But they whisper truths.\n\tSolve the ghostly murder mystery.\n*achievement resuscitate visible 60 Lungs full of air\n\tResuscitate a drowned crew member.\n\t\n*achievement stressed visible 10 I'm stressed out on the first day!\n\tTake 50% Stress on a scoundrel.\n*achievement trauma_ashlyn visible 30 Cold as the dead\n\tAshlyn suffers Trauma.\n*achievement trauma_pavi visible 30 Cuts like a scalpel\n\tPavi suffers Trauma.\n*achievement trauma_wallace visible 30 Loose cannon\n\tWallace suffers Trauma.\n\n*achievement zap visible 60 Thousands of volts\n\tOne of the crew is killed by electricity. \n*achievement ghost visible 30 It's a ghost!\n\tTrigger a ghost rampage.\n*achievement bail visible 30 Bail\n\tLeave your friend to drown.\n\n*achievement harmed visible 10 My uniform is ruined!\n\tTake 50% Harm on a scoundrel.\n*achievement downed visible 30 Is that my blood?\n\tTake 100% Harm on a scoundrel.\n\n*achievement unharmed visible 70 Looking ready for class!\n\tFinish the heist with all scoundrels at less than 50% Harm.\n*achievement sane visible 70 Surprisingly sane\n\tFinish the heist with all scoundrels at less than 50% Stress.\n\n\n*comment -- Stats --\n\n*create this_stat 0\n*create this_stat_mod 0\n*create this_stat_final 0\n*create this_chance \"\"\n*create this_chance_plus1 \"\"\n*create this_character 0\n*create this_character_name \"\"\n*create this_character_stress 0\n*create this_character_harm 0\n\n*create this_action_success false\n*create this_action_consequence false\n*create this_action_attribute 0\n*comment -- No longer used: create this_action_consequence_text \"\"\n\n*create Crew0_Name \"Ashlyn\"\n\n*create Crew0_Stress 0\n*create Crew0_Harm 0\n*create Crew0_Load 0\n\n*create Crew0_Insight 0\n*create Crew0_Hunt 0\n*create Crew0_Study 2\n*create Crew0_Survey 2\n*create Crew0_Tinker 0\n\n*create Crew0_Prowess 0\n*create Crew0_Finesse 0\n*create Crew0_Prowl 0\n*create Crew0_Skirmish 0\n*create Crew0_Wreck 0\n\n*create Crew0_Resolve 0\n*create Crew0_Attune 2\n*create Crew0_Command 1\n*create Crew0_Consort 0\n*create Crew0_Sway 0\n\n*create Crew1_Name \"Pavi\"\n\n*create Crew1_Stress 0\n*create Crew1_Harm 0\n*create Crew1_Load 0\n\n*create Crew1_Insight 0\n*create Crew1_Hunt 0\n*create Crew1_Study 2\n*create Crew1_Survey 0\n*create Crew1_Tinker 2\n\n*create Crew1_Prowess 0\n*create Crew1_Finesse 1\n*create Crew1_Prowl 0\n*create Crew1_Skirmish 0\n*create Crew1_Wreck 1\n\n*create Crew1_Resolve 0\n*create Crew1_Attune 0\n*create Crew1_Command 0\n*create Crew1_Consort 1\n*create Crew1_Sway 0\n\n*create Crew2_Name \"Wallace\"\n\n*create Crew2_Stress 0\n*create Crew2_Harm 0\n*create Crew2_Load 0\n\n*create Crew2_Insight 0\n*create Crew2_Hunt 1\n*create Crew2_Study 1\n*create Crew2_Survey 0\n*create Crew2_Tinker 0\n\n*create Crew2_Prowess 0\n*create Crew2_Finesse 0\n*create Crew2_P  Crew1_Resolve +1\n\n*if (Crew2_Hunt > 0)\n\t*set Crew2_Insight +1\n*if (Crew2_Study > 0)\n\t*set Crew2_Insight +1\n*if (Crew2_Survey > 0)\n\t*set Crew2_Insight +1\n*if (Crew2_Tinker > 0)\n\t*set Crew2_Insight +1\n\n*if (Crew2_Finesse > 0)\n\t*set Crew2_Prowess +1\n*if (Crew2_Prowl > 0)\n\t*set Crew2_Prowess +1\n*if (Crew2_Skirmish > 0)\n\t*set Crew2_Prowess +1\n*if (Crew2_Wreck > 0)\n\t*set Crew2_Prowess +1\n\n*if (Crew2_Attune > 0)\n\t*set Crew2_Resolve +1\n*if (Crew2_Command > 0)\n\t*set Crew2_Resolve +1\n*if (Crew2_Consort > 0)\n\t*set Crew2_Resolve +1\n*if (Crew2_Sway > 0)\n\t*set Crew2_Resolve +1\n\n\n*if choice_is_omnibus_app\n\t*comment skip description\n\n\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tYour submarine is gripped by giant tentacles! You are in a battle of wills with a murdered classmate! You play as every scoundrel in this fantasy heist. Steal a dark power… Escape with your soul!\n\n\t[i]Studies in Darkness[/i] is an adventurous 30,000 word interactive dark fantasy novel by Nathaniel Johnson, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\tIn the haunted gothic city of Doskvol, you control the last surviving members of a secret society. Restore your infamous reputation by heisting treasure from an abandoned laboratory. Use ectoplasm-powered steampunk technology to dive deep underwater for a unique and precious artifact.\n\n\tBeware, you are breaking into the Morlan Hall of Unnatural Philosophy. You will face the result of centuries of experiments with the occult and the undead. But you are prepared! Unleash the power of alchemy, electricity, and each scoundrel’s unique supernatural abilities!\n\n\t• Play as a heist crew of five young men and women.[n/]\n\t• Experience the award-winning Blades in the Dark system, where your every choice is significant and may bring both success AND terrible consequences![n/]\n\t• Jump between the students’ perspectives in each chapter![n/]\n\t• Solve a murder mystery by stepping into the realm of the undead![n/]\n\t• Fight off the corrupt cops that are raiding your school![n/]\n\t• “Flashback” to key events in the past, revealing hidden stories and special advantages![n/]\n\t• Tap into your “Stress” resource to overcome impossible odds. Beware, too much stress will drive you mad![n/]\n\t\n\tThe pressure is rising. Your future has been stolen from you. Steal it back!\n\n\n\t*if choice_prerelease and not(choice_is_ios_app)\n\t\t[i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first three chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2022-01-20 $2.99 $1.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n*if choice_is_omnibus_app\n\t\n\t*page_break\n\n\n*comment -- Start story! --\n\nThis work is based on the \"Blades in the Dark\" tabletop role-playing game.\n\nI have tailored the system to bring a band of (student) scoundrels under your control.\n\nBeware… This is a high-stakes heist. To succeed, the crew must take actions with potentially serious consequences. But these students are not to be underestimated.\n\nWith your good choices and some luck, your scoundrels can turn the tables and steal success from the jaws of fate.\n\n*page_break\n\nYou are about to enter a city of perpetual night.\n\nHow will you begin?\n\n*choice\n\t#Read full introduction to Doskvol\n\t\t*goto flying_high\n\t#Dive in to Charterhall\n\t\tYou are a crow.\t You are flying over the gothic city of Doskvol.\n\t\t\n\t\t*goto fly_Charterhall\n\n*label flying_high\n\n[b]Prologue[/b]\n\nYou are a crow flying high over a coastal city at night. This city is Doskvol. Its great industrial might has maintained this stronghold of humanity in the thousand years since the catastrophe that destroyed the sun.\n\nThe great ironworks, coal stacks and steamboats make Doskvol the most advanced civilization in the world. From your high vantage over the city, you can see many billowing smokestacks. Countless homes and factories are thickly stained with coal soot. This has long been the only way to make warmth and light.\n\nHowever, every time you take flight, you see an ever growing number of pinpricks of blue light emanating from streetlamps and windows. This is the benefit of newly discovered electrical technology.\n\nEven more bright are the lightning towers which encircle the city. Your instincts warn you away from bright flashes of static discharge, but your instincts also tell you that certain death lies beyond the protection of the lightning towers. There is no safety outside the city.\n\n*page_break\n\nYou beat your crow wings and circle down towards the heart of Doskvol. The densely packed urban landscape is split into island districts by wide rivers.\n\nTo the south is the commercial sprawl of Nightmarket that surrounds the single electro-rail station which connects Doskvol to the few other human strongholds. To the west are the criminal havens of Crow’s Foot and Silkshore.\n\nTo the north are the rich districts of Brightstone and Whitecrow. Adjacent are the Docks which bring in the precious fuel that is necessary to the city’s industry and very survival.\n\nAnd to the east are the ruins of Six Towers. But as bad off as Six Towers may be, it is infinitely more hospitable than the Deathlands outside the lightning tower perimeter.\n\nYou fly lower towards the heart of the city…\n*page_break\n*goto flying_low\n\n*label flying_low\n\nFlying lower still, your crow eyes now can see the details at the center of the city. This is Charterhall, the hub which the city revolves around. The cobblestone streets still are busy even this late at night.\n\nMerchants cross paths with clerks and politicians. Though the sun is gone, there still are a semblance of yearly seasons, and the weather will soon be bitingly cold. Pedestrians hurry to get back inside and away from the chilly autumn weather. Foot traffic makes way for the regular passage of stagecoaches. The richest citizens here may even have spark-crafted electric coaches which drive themselves with no assistance.\n\nYou fly lower and circle Charterhall University…\n*page_break\n*goto fly_Charterhall\n\n*label fly_Charterhall\n\nYou are now above Charterhall University. This ancient and honored university has supplied most of the brightest minds in Doskvol's distinguished history.\n\nThe large dormitories sat empty during the summer but tonight are filled with hundreds of students, some returning, some who will be first-year freshmen. The clock tower strikes the hour of midnight. Yesterday was orientation and the first day of class is about to begin.\n\n*label crow_sense\n\nYour supernatural senses stir. You are not a normal crow… You cannot rest until you have found a very certain something.\n\n*choice\n\t*hide_reuse #Fly to the Jayan Hall of Alchemy\n\t\tThis trade school provides skilled laborers. City institutions and merchant guilds control admission. You do not sense anything amiss at this time and place.\n\t\t*goto crow_sense\n\n\t*hide_reuse #Fly to the Houses of Jurisprudence\n\t\tLess a school, more a group of houses and taverns. The bickering between teaching magisters here means that you sometimes find your special something here. But not tonight.\n\t\t*goto crow_sense\n\n\t*hide_reuse #Fly to the Sparkwright Tower\n\t\tYou love and loathe this place. Its massive experimental turbines are terrifying to any animal. But often this place has what you crave.\n\t\t\n\t\tNot tonight though. The turbines are quiet and the laboratories are empty.\n\t\t*goto crow_sense\n\n\t#Fly to the Morlan Hall of Unnatural Philosophy\n\t\tYou know you are now on the right trail.\n\t\t\n\t\tThese buildings are steeped in otherworldly energies. The weird sciences studied here have permeated into every stone of its walls.\n\t\t*goto crow_finish\n\n*label crow_finish\n\nBut you are not distracted. Your keen senses can pick up exactly what you are searching for. Tonight, it is not in the Hall's main buildings. You turn your magical eyes away from the Hall's kaleidoscope of simmering unearthly energies. You tighten your searching circle towards the north, past most of the university grounds, and towards the east-west river which divides Charterhall through its center.\n\nYou feel a thrill from your beak to your talons. You are so close!\n\n*page_break\n\nIs what you seek at the old walls on the north river bank? No, those ruins are vacant of any souls.\n\nIt can’t be at the south bank, you passed that on the way from Morlan Hall. You would have known if you had flown near it.\n\nA few more exploratory circles and you have found it. It is right in the center of the river. There, inside that old stone tower that has sunken almost to its top. A dock leads to its one above-water door.\n\nYou circle closer…\n\n*page_break\n\nGathered on the dock is a huddle of five students. They are cold and scared, but determined. They have hooded their hand lamps. They are clearly afraid of being discovered.\n\nThree of the students stand apart, hearts beating fast, preparing to move inside the tower. And inside… Is what you were searching for!\n\nYour supernatural senses tell you that inside the tower…\n\nAre things that move…\n\nBut are not alive.\n\n*page_break\n\nThe students are about to enter.\n\n[b]You are now taking control of these scoundrel students.[/b]\n\n[i]The odds are stacked against them. But if you make the right choices, then perhaps they will find a way to defy fate…[/i]\n\n*finish\n\n*page_break\n\n\nThe silence hangs in the crowded basement room under Morlan Hall.\n\n\nAnxiety is dripping off the quiet throng of students. They sit on dusty chairs or between stacks of books on the tables. They stand in small huddles at the edge of the room’s atheric lamplight. No whisper is louder than the electric hum of the lanterns.\n\n\nIn the center is one student. She is the youngest of them all, and also the most despairing. She lifts her head and passes a shaking hand over her pale face to draw back her long black strands of stray hair. She slowly rises from her chair and speaks with all the courage she can still muster.\n\n\n“Explain it to me… One more time, Professor Clelland. Please...” the young student asks the man before her, “Why are we being expelled?”\n\n\n*page_break\n\n\nThe professor wears his long life as he wears his ceremonial blue-trimmed robes. As heavy fabric weighs down on his shoulders, his firm grip on his jeweled scepter keeps him steady. His wrinkled skin and thin hair show no signs of being seduced by the honeyed promises of vitality-restoring elixir dealers on every street corner.\n\n\nWith a shuffle of his long sleeves, Professor Clelland taps a stack of parchment between them. “All of you, your signatures here, they mean,” he shakes his head, “Nothing. Without the official stamp, it does not exist.” Looking up at her, he snaps, “Miss Ashlyn Farros, there is no such thing as your…” he re-reads the header of the top paper, “Society of Leviathan Study.”\n\n\n“But Professor,” Ashlyn begs, “you were the Society’s advisor last year! Won’t you stamp our papers?”\n\n\nDrawing back from her, Clelland says harshly, “The stamp was lost when the Society’s aquatic laboratory was destroyed.”\n\n\n“This same… Accident... Also led to every member of the Society to be expelled as well.” Eyes flashing, he shouts, “Every single one!”\n\n\nIn a whirl of blue robes, Professor Clelland rushes from the room while his shout still echoes in the ears of the gathered students. All of them are stunned except for one young man waiting by the door. He puts his hands in his coat pockets, ducks his head until his cap shields his eyes, and follows the professor.\n\n\n*page_break\n\n\nOne step outside of the room, the young man almost bumps into the back of Professor Clelland. Looking up, he sees that the old man has stopped dead at the sight of another robed professor in the hallway. A heartbeat passes, then Clelland is again rushing away, turning a corner and gone from sight. The sounds of his boots and scepter striking the floor fade a moment later.\n\n\nBacking out of the other professor’s sight, the young man hears the professor resume a conversation with someone in the hallway.\n\n\n“As I was saying, you must end this nonsense about joining another Society. If you must leave the Society of Foreign Spectrality, then I will immediately induct you into another of my Societies. Ectoplasmic Harmonics would be an easy way to conclude your studies. Or how about Deathseeker Physiology? I know you love animals.”\n\n\nThe professor’s voice has a muted ringing to it, like he was talking through a slit in an iron door.\n\n\n“Thank you kindly,” responds a woman’s voice, “I will think about it, Professor Warden.”\n\n\n“Do not think for too long, Miss Talwar,” cautions Professor Warden, “Do you hear that?” The sound of the Charterhall’s clocktower bell can be heard even in the basement. “The clock just struck midnight. That means you have only six hours until the first class. You know the rules. Anyone who misses class is expelled, and anyone without stamped Society papers… Is expelled.”\n\n\nThe sound of heavy footsteps tells the young man that Professor Warden has left. He looks out the door to see a familiar face. “Pavi,” he calls quietly to her, “Come here! I need your help.”\n\n\nPavi Talwar breaks into a smile. “Wallace Walton,” she tells her friend, “I have a feeling that we will be in the same boat.”\n\n\n*page_break\n\n\nAshlyn looks up to see two other students walk up to her desk. “This is Pavi Talwar,” says one, “And I’m Wallace Walton. Pavi is starting her senior year at Charterhall. I think you should hear what she has to say.”\n\n\nAshlyn puts on her glasses to take a better look. The two of them are strikingly different. Pavi is a tall and dark-skinned Iruvian, Wallace is a freckled red-headed Skovlan. And while Pavi has a beautiful serenity about her, Wallace’s lanky frame is taunt with nervous energy.\n\n\nAshlyn has the light build that is common among those of Imperial descent in Doskvol, with evident noble breeding in her soft but angular features. She groans at Wallance’s introduction, and opens her mouth to tell them off, but finds herself interrupted by Pavi. “I know, you all need the official stamp of the Leviathan Study Society.”\n\n\nAshlyn glances at Wallace, who shrugs. Pavi’s face splits into a wide grin. “I know exactly where the stamp is. Let’s go get it.”\n"}};
