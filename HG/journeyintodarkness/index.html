ceresult}\n*rand zombiediceresult 1 dicesides\n*line_break\nThe Zombies rolled ${zombiediceresult}\n*set diceresult +skill\n*set zombiediceresult +zombieskill\n*line_break\nYour total: ${diceresult} Zombies total: ${zombiediceresult}\n*if (diceresult > zombiediceresult)\n\t*line_break\n\tYou hack at the shambling horde\n\t*set zombiehp -2\n*if (diceresult \u003c zombiediceresult)\n\t*line_break\n\tThe zombies maul you\n\t*set stamina -2\n*if (diceresult = zombiediceresult)\n\t*line_break\n\tYou push them back for now\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Zombies have ${zombiehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (zombiehp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\t\n\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set zombiehp - bullet_damage\nThe Zombies have ${zombiehp} stamina remaining\n*if (zombiehp \u003c 1)\n\t*goto win1\n*else\n\t*goto zombie_fight\n\n\t\n*label roll_dice_loopk1\n*temp zombiediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand zombiediceresult 1 dicesides\n*line_break\nThe Zombies rolled ${zombiediceresult}\n*set diceresult +skill\n*set zombiediceresult +zombieskill\n*line_break\nYour total: ${diceresult} Zombies total: ${zombiediceresult}\n*if (diceresult > zombiediceresult)\n\t*line_break\n\tYour punch sends the horde flying\n\t*set zombiehp -3\n*if (diceresult \u003c zombiediceresult)\n\t*line_break\n\tThe zombies maul you\n\t*set stamina -2\n*if (diceresult = zombiediceresult)\n\t*line_break\n\tYou push them back for now\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe zombies have ${zombiehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (zombiehp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\t\n*label click1\nThe zombies line up perfectly and you take your shot. The gun clicks.\n\n*if (male = true)\n\t\"Interesting plan Jack,\" says Sir Malcolm.\n*if (female = true)\n\t\"Interesting plan Jill,\" says Sir Malcolm.\n\nThe zombies attack.\n*goto roll_dice_loop1\n\n*label winshot1\nThe zombies line up perfectly and you take your shot. The bullet drills through the aligned heads and they fall.\n*goto win1\n\n\n\n*label win1\n\nKnowing what they once were you sadly survey the fallen. Sir Malcolm places his hand on your shoulder.\n*if (male = true)\n\t\"Better them than us Jack.\"\n*if (female = true)\n\t\"Better them than us Jill.\"\n*if (stamina = max_stamina)\n\t*goto afterbetter\n*elseif (provisions = false)\n\t*goto afterbetter\n*else\n\t*goto choice2\n*label choice2\n\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto afterbetter\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto afterbetter\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto afterbetter\n\t*if (provisions = false) #Onwards\n\t\t*goto afterbetter\n*label afterbetter\n*choice\n\t#Investigate the hut\n\t\tNumerous stone jars are stacked around the edges of the hut. Glowing coals heat a pot in the middle of the floor and the smell of soup fills the air. There is no sign of the old man and nothing catches your attention. You move on.\n\t\t*goto nightiscoming\n\t#Move on\n\t\t*goto nightiscoming\n\t\n\t\n*label set_bullet_damage2\nWasting no time you draw your gun as fast as you can and shoot.\n\nThe witchdoctor uses their rattle like a bat and swipes it through the air. You feel a searing pain in your stomach. It is as if they have batted the bullet right out of the air and back at you!\n*goto set_bullet_damage3\n\n*label winshot3\nThe pain in your stomach is intense and you collapse. The bullet has hit something vital.\n*goto_scene youdied\n\n\n*label set_bullet_damage3\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot3\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set stamina - bullet_damage\nYou have ${stamina} stamina remaining\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*else\n\t*goto shesgone\n\n\n*label shesgone\nWhen you focus again the witchdoctor is gone\n*goto afterbetter\n\n*label click2\nWasting no time you draw your gun as fast as you can. The gun clicks uselessly.\n\n*if (male = true)\n\t\"Looks like they got you rattled Jack,\" says Sir Malcolm.\n*if (female = true)\n\t\"Looks like they got you rattled Jill,\" says Sir Malcolm.\n\n*goto splits\n\n", "kolfboyproper": "*temp bullet_roll 0\n*temp bullet_damage 0\n*temp toadbullet_roll 0\n\nSir Malcolm leans in to you:\n*if (knowaboutkolf = true)\n\t\"This is obviously where the drums and the Kolf Boy are,\" he says.\n*if (knowaboutkolf = false)\n\t\"This is obviously where the drums have been coming from,\" he says.\n\nThe path leads you right to them but there is a smaller path through the jungle that would take you around, avoiding them.\n*choice\n\t#Go around\n\t\tThe path takes you away from the torches and whatever horrors they illuminate. The bright moon acts like a spotlight and the sounds of the jungle turn to the whistling and chirping of nocturnal insects. A bat flits across the sky in front of you, silhouetted by the moonlight. Among the many noises you can hear croaking and it intensifies as you progress. \n\t\t\n\t\tThe path gives way to a lake. Croaking fills the air as well as the occasional soft splash of toads jumping into the still black waters. The moon is reflected perfectly in it’s nearly flat surface. Huge lilly pads are dotted on the surface, they are easily ten feet in diameter. Massive white petals surround a bright yellow middle. There is no way around the lake. \n\t\t*if (zombieten = true)\n\t\t\t*goto toadzombie\n\t\t*if (zombiefive = true)\n\t\t\t*goto toadzombie\n\t\t*else\n\t\t\t*goto nozombie\n\t\t\n\t#Go to the torches\n\t\t*goto_scene torches\n\t\t\n\t\t\n\t\t\n\n*label nozombie\nWhilst you ponder this amazing sight the middle of the lake begins to froth and bubble. A grotesque behemoth emerges from the water. It is an enormous toad that pulls itself saggily onto one of the pads. It squats upright and opens it’s wide toothless mouth, pink tongue rolled like a slimy carpet. It flicks it’s tongue in your direction with surprising speed, narrowly missing you.\n*goto toad_fightx\n\n\n\n\n*label toadzombie\nWhilst you ponder this amazing sight the middle of the lake begins to froth and bubble. A grotesque behemoth emerges from the water. It is an enormous toad that pulls itself saggily onto one of the pads. It squats upright and opens it’s wide toothless mouth, pink tongue rolled like a slimy carpet. It flicks it’s tongue in your direction with surprising speed and one of your zombie army is pulled into it’s mouth. \n*choice\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0)\n\t\t\t*goto set_bullet_damagex\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click\n\t\t*else \n\t\t\t*goto toad_fight\n\n\t#Distract the toad with your zombies\n\t\tWith a cry of \"Touye, touye, touye,\" your zombie entourage wade slowly into the water towards the toad. It greedily pulls them into it's maw, consuming them as quickly as it can.\n\t\t\n\t\tWhile it is distracted you hop from pad to pad until you are the other side of the lake and on your way. \n\t\t*goto_scene cliff\n\t\t\n\t#Fight\n\t\tThe tongue shoots forward again and another of your zombie entourage is pulled into it's maw.\n\t\t\t\t\t\n\t\t*label toad_fightx\n\t\tYou must fight the:\n\t\t\n\t\t[b]Giant Toad[/b]\n\t\t\n\t\t[b]Skill 8, Stamina 8[/b]\n\t\t\n\t\t*label toad_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto roll_dice_loopx\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damagex\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"This will teach you to poke your tongue out at me\"\n\t\t\t\t*goto roll_dice_loopk\n\t\t\t\t\n\t\t\t\n*label roll_dice_loopx\n*if (male = true)\n\n\t\"We have to take the fight to it Jack!\" says Sir Malcolm and you leap onto the pads so you can get the toad into the range of your machetes. \n*if (female = true)\n\n\t\"We have to take the fight to it Jill!\" says Sir Malcolm and you leap onto the pads so you can get the toad into the range of your machetes. \n*goto roll_dice_loop\n\n*label roll_dice_loop\n*temp toaddiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand toaddiceresult 1 dicesides\n*line_break\nThe Giant Toad rolled ${toaddiceresult}\n*set diceresult +skill\n*set toaddiceresult +toadskill\n*line_break\nYour total: ${diceresult} Giant Toads total: ${toaddiceresult}\n*if (diceresult > toaddiceresult)\n\t*line_break\n\tYou slice the toad with your machetes\n\t*set toadhp -2\n*if (diceresult \u003c toaddiceresult)\n\t*line_break\n\tThe toads tongue wraps around you and squeezes\n\t*set stamina -2\n*if (diceresult = toaddiceresult)\n\t*line_break\n\tThe toads tongue whistles past you\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Giant Toad has ${toadhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (toadhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n\t\n*label set_bullet_damagex\nAs you crouch down to aim the toad's pink tongue flies just over your head, missing you by inches. \n\n[i]You are in a shoot out with the toad. If it rolls a 6 it's tongue has caught you.[/i]\n\n*goto set_bullet_damage\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n\n*set toadhp - bullet_damage\nThe Giant Toad has ${toadhp} stamina remaining\n*if (toadhp \u003c 1) \n\t*goto win\n*else \n\t*goto toadgo\n*label toadgo\n*rand toadbullet_roll 1 6\n\nThe Giant Toad rolled a ${toadbullet_roll}\n*line_break\n*if (toadbullet_roll = 6)\n\t*goto toadwinshot\n*else\nThe Toad's tongue misses you\n*goto toad_fight\n\n\t\t\t\n*label click\nAs you crouch down to aim the toad's pink tongue flies just over your head, missing you by inches. \n\nYou line up the sights and pull the trigger. The gun clicks.\n\n\"We had better close the distance,\" says Lady Jane. \"We are sitting ducks out here.\"\n*goto roll_dice_loopx\n\n*label toadwinshot\nThe toads tongue wraps around your midriff and it pulls you into its mouth.\n*goto_scene youdied\n\n*label winshot\nYour shot hits the Giant Toad in the eye. It's long pink tongue trails in the water.\n\n*goto hideous\n\n*label hideous\n\nThe hideous toad flops into the lake and floats belly up. You hop across the lily pads to the other side.\n\n*if (zombieten = true) \n\tThe remaining zombies mill about uselessly on the other side of the lake. \n\n\t\"We didn't think to ask what the command for 'hop across lily-pads' was,\" says Sir Malcolm somewhat unhelpfully.\n\n\t\"Leave them be,\" says Lady Jane.\n\n*if (zombiefive = true) \n\tThe remaining zombies mill about uselessly on the other side of the lake. \n\n\t\"We didn't think to ask what the command for 'hop across lily-pads' was,\" says Sir Malcolm somewhat unhelpfully.\n\n\t\"Leave them be,\" says Lady Jane.\n\n\n*if (stamina = max_stamina)\n\t*goto_scene cliff\n*elseif (provisions = false)\n\t*goto_scene cliff\n*else\n\t*goto choice1\n*label choice1\n\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto_scene cliff\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto_scene cliff\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto_scene cliff\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto_scene cliff\n\n \n*label roll_dice_loopk\n*temp toaddiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand toaddiceresult 1 dicesides\n*line_break\nThe Giant Toad rolled ${toaddiceresult}\n*set diceresult +skill\n*set toaddiceresult +toadskill\n*line_break\nYour total: ${diceresult} Giant Toads total: ${toaddiceresult}\n*if (diceresult > toaddiceresult)\n\t*line_break\n\tYou punch the rubbery toad and shock waves ripple across its skin\n\t*set toadhp -3\n*if (diceresult \u003c toaddiceresult)\n\t*line_break\n\tThe toads tongue wraps around you and squeezes\n\t*set stamina -2\n*if (diceresult = toaddiceresult)\n\t*line_break\n\tThe toads tongue whistles past you\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Giant Toad has ${toadhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (toadhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\n*label win\n*goto hideous\n\t\t\t\t\t\t\n\n", "lecture": "*temp museum false\n*temp shop false\n*temp painting false\nThe stage of the lecture hall is quite small with seating that rises high above. A sign on the stage reads: \n\n\"Tonight’s Lecture: Yetis and Meteorites in the Himalayas by Professor St. John Smyth-Fortesque.\"\n\nYou take your normal seat. The hall is rapidly filling up and soon it is at capacity. The burbling of hushed conversation quietens when a figure walks on to the stage.\n\n\"Good Evening my fellow adventurers, tonight we welcome to the stage to speak on his recent expedition Professor St. John Smyth-Fortesque.\"\n\nA tall man in tails marches onto the stage and soon you and the audience are enthralled by the fantastic story that unfolds. It is a thrilling tale of daring and adventure and it holds you spellbound. The tale draws to a close as follows:\n\n\"And so you can see Ladies and Gentlemen both how lucky and unlucky we were not to have captured that Yeti! But, the most thrilling find of all is the possibility that one of the other meteorites could be the fabled colour from space and it would be placed somewhere around…here:\"\n\nWith that he points on his map to an area in Tanzania. The chance to find this legendary and mysterious gem is too tempting to pass up and you decide there and then to track it down! And after all, it’s cold in London at this time of year. A ripple of excitement passes through the crowd with news of a possible location for the fabled stone and animated conversations start up between the seated attendees.\n\nYour attention is drawn to four gentlemen hurriedly leaving their seats. One is very broad and squat in a jacket with yellow embroidery on the back, one is of average height and bald and he wears a silver bracelet, one is well built with blond hair and the other is tall with a pencil moustache and an elegant black and silver cane. You get the feeling you aren’t the only one interested in getting their hands on the jewel. The professor leaves the stage but before he can exit through a side door a small crowd of adventurers are asking him questions. \n\nThe gentlemen on your right rises quickly, rubs his hands and says, \"Righto, time for a drink!\"\n*choice\n\t#Go to the bar\n\t\t*label bar\n\t\tThe bar is swamped and the crush to get a drink is at least five deep. You start to make your way in and turn to the side to make space. You are knocked into from behind and someone grabs your arm, spinning you round to face them. \n\t\t*if (male = true)\n\t\t\tIt is a young man with closely shaved hair. He sticks his red face inches away from yours:\n\t\t\t\n\t\t\t\"You spilled my drink you idiot! Watch where you are going you damned fool!\"\n\t\t*if (male = false)\n\t\t\tIt is a young woman with curly red hair. She sticks her face inches away from yours:\n\t\t\t\n\t\t\t\"You spilled my drink you dalcop! Watch where you are going you damned molly!\"\n\t\t*choice\n\t\t\t*if (boxing = false) #Apologise\n\t\t\t\tYou raise your hands with the palms out to show that you meant no harm and start to apologise. \n\t\t\t\t*if (male = true)\n\t\t\t\t\tHe punches you straight in the mouth, rocking you back. You wipe away a trickle of blood with your sleeve. Suddenly your arms are grabbed from behind and you are lifted off of the floor. \n\t\t\t\t*if (male = false)\n\t\t\t\t\tShe pushes you suddenly with great strength, rocking you back. Before you can recover your arms are grabbed from behind and you are lifted off of the floor. \n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"Sorry Jack, you know the rules. No fighting.\"\n\t\t\t\t*if (male = false)\n\t\t\t\t\t\"Sorry Jill, you know the rules. No fighting.\"\n\t\t\t\t\n\t\t\t\tThe doorman carries you through the bar and down the stairs, pushing you out of the staff exit door and into the alley behind the club. \n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\tYou can hear him say \"No hard feelings Jack,\" from the other side. \n\t\t\t\t*if (male = false)\n\t\t\t\t\tYou can hear him say \"No hard feelings Jill,\" from the other side. \n\t\t\t\t*goto_scene alleynobox\n\t\t\t*if (boxing = true) #Apologise\n\t\t\t\tYou raise your hands with the palms out to show that you meant no harm and start to apologise. \n\t\t\t\t*if (male = true)\n\t\t\t\t\tHe punches you straight in the mouth, rocking you back. You wipe away a trickle of blood with your sleeve. Suddenly your arms are grabbed from behind and you are lifted off of the floor. \n\t\t\t\t*if (male = false)\n\t\t\t\t\tShe pushes you suddenly with great strength, rocking you back. Before you can recover your arms are grabbed from behind and you are lifted off of the floor. \t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"Sorry Jack, you know the rules. No fighting.\"\n\t\t\t\t*if (male = false)\n\t\t\t\t\t\"Sorry Jill, you know the rules. No fighting.\"\n\t\t\t\t\n\t\t\t\tThe doorman carries you through the bar and down the stairs, pushing you out of the staff exit door and into the alley behind the club. \n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\tYou can hear him say \"No hard feelings Jack,\" from the other side. \n\t\t\t\t*if (male = false)\n\t\t\t\t\tYou can hear him say \"No hard feelings Jill,\" from the other side. \n\t\t\t\t*goto_scene alleybox\n\t\t\t*if (boxing = false) #Punch them\n\t\t\t\t*if (male = true)\n\t\t\t\t\tYou punch him on the jaw and he is propelled backward with his arms out wide. The crowd catch him and hold him up, he’s out for the count. Suddenly your arms are grabbed from behind and you are lifted off of the floor. \n\t\t\t\t*if (male = false)\n\t\t\t\t\tYou punch her on the jaw and she is propelled backward with her arms out wide. The crowd catch her and hold her up, she’s out for the count. Suddenly your arms are grabbed from behind and you are lifted off of the floor. \n\t\t\t\t*if (male = true)\n\t\t\t\t\t“Sorry Jack, you know the rules. No fighting.” \n\t\t\t\t*if (male = false)\n\t\t\t\t\t“Sorry Jill, you know the rules. No fighting.” \n\t\t\t\t\n\t\t\t\tThe doorman carries you through the bar and down the stairs, pushing you out of the staff exit door and into the alley behind the club. \n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\tYou can hear him say \"No hard feelings Jack,\" from the other side. \n\t\t\t\t*if (male = false)\n\t\t\t\t\tYou can hear him say \"No hard feelings Jill,\" from the other side. \n\t\t\t\t*goto_scene alleynobox\n\t\t\t*if (boxing = true) #Punch them\n\t\t\t\t*if (male = true)\n\t\t\t\t\tYou punch him on the jaw and he is propelled backward with his arms out wide. The crowd catch him and hold him up, he’s out for the count. Suddenly your arms are grabbed from behind and you are lifted off of the floor. \n\t\t\t\t*if (male = false)\n\t\t\t\t\tYou punch her on the jaw and she is propelled backward with her arms out wide. The crowd catch her and hold her up, she’s out for the count. Suddenly your arms are grabbed from behind and you are lifted off of the floor. \t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t“Sorry Jack, you know the rules. No fighting.” \n\t\t\t\t*if (male = false)\n\t\t\t\t\t“Sorry Jill, you know the rules. No fighting.” \n\t\t\t\t\n\t\t\t\tThe doorman carries you through the bar and down the stairs, pushing you out of the staff exit door and into the alley behind the club. \n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\tYou can hear him say \"No hard feelings Jack,\" from the other side. \n\t\t\t\t*if (male = false)\n\t\t\t\t\tYou can hear him say \"No hard feelings Jill,\" from the other side. \n\t\t\t\t*goto_scene alleybox\n\t#Ask lecturer a question\n\t\tYou push your way to the front of the crowd and the professor agrees to take one more question before he leaves.\n\t\t\n\t\t\"You mentioned that the Tanzanian location may have been explored previously?\"\n\t\t\n\t\t\"Yes indeed, Randolph Marsh was the inspiration for our Himalayan quest and he did subsequently travel also to Tanzania.\"\n\t\t*choice\n\t\t\t#Go to the bar\n\t\t\t\t*goto bar\n\t\t\t#Go upstairs\n\t\t\t\tAt the top of the stairs is a statue of Pixiu, a lions head with a dragons body. You stroke it’s head down to the tail for luck. To the left is the club’s museum and to the right the shop. It’s shutter is up and it is open for business.\n\t\t\t\t*choice\n\t\t\t\t\t#Museum\t\n\t\t\t\t\t\t*set museum true\n\t\t\t\t\t\tThe adventurers museum is utterly chaotic. Stuffed birds, flying animals and various mobiles hang from the ceiling. The walls are covered in maps, charts, paintings and photographs and everywhere are glass cases and shelves loaded with discoveries and equipment. It is a tribute and a treasure trove, albeit in need of a good dusting and proper cataloguing. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou rapidly scan the cases and soon you find one labelled Randolph Marsh. In the case is a blowgun and dart, a pith helmet with an arrow sticking out of it and what looks like a dried apple of some kind.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Examine blowgun\n\t\t\t\t\t\t\t\t*set map true\n\t\t\t\t\t\t\t\t*set empty_inventory false\n\t\t\t\t\t\t\t\tThe blow gun has been decorated beautifully with intricate patterns of butterflies and flowering vines. Holding it up to inspect the bore you are surprised to see that there is a roll of paper inside! With a puff the rolled up paper is shot from the gun and you retrieve it. On unravelling it you can see that it is a map! In a spidery script is written \"The Forbidden City\". Before you can take in any detail you can hear someone coming up the stairs. You quickly put the map in your inside pocket and stand in front of the case with your back to the stairs, hoping this covers your movements as you put the blowgun back. A bell rings. The club will be closing soon.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Shop\n\t\t\t\t\t\t\t\t\t\t*goto shop\n\t\t\t\t\t\t\t#Examine apple\n\t\t\t\t\t\t\t\tThe apple has a leathery feel and is pleasantly squashy. As you turn it in your fingers you feel some rough stitches. You look closer and a small face looks back at you, the eyes and lips of the shrunken head sewn shut. You return him to the case and make a note to wash your hands as soon as possible. A bell rings. The club will be closing soon.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Shop\n\t\t\t\t\t\t\t\t\t\t*goto shop\n\t\t\t\t\t\t\t#Examine helmet\n\t\t\t\t\t\t\t\tYou turn the pith helmet upside down and look inside. The tip of the arrow has just pierced through. Undoubtedly this helmet saved the life of the wearer. A bell rings. The club will be closing soon.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Shop\n\t\t\t\t\t\t\t\t\t\t*goto shop\n\t\t\t\t\t#Shop\n\t\t\t\t\t\t*goto shop\n\t\t\t#Downstairs\n\t\t\t\t*goto downstairs\n\t#Follow the four\n\t\tAs the adventurers in the audience crowd to leave the auditorium it is easy to follow the yellow embroidered jacket and large frame of its owner. As you pass through the doors, pressed on all sides someone turns around and speaks to you. \n\t\t\n\t\t*if (male = true)\n\t\t\t\"Jack! Good to see you again, we must catch up!\"\n\t\t*if (male = false)\n\t\t\t\"Jill! Good to see you again, we must catch up!\"\n\n\t\tHe appears to know you but you have no recollection at all as to who he is and his bland face offers no clues at all. You make some excuse and push past him but there is no sign of the group.\n\t\t*choice\n\t\t\t#Go to bar\n\t\t\t\t*goto bar\n\t\t\t#Upstairs\n\t\t\t\t*goto upstairs\n\t\t\t#Downstairs\n\t\t\t\t*goto downstairs\n\t#Upstairs\n\t\t*label upstairs\n\t\tAt the top of the stairs is a statue of Pixiu, a lions head with a dragons body. You stroke it’s head down to the tail for luck. To the left is the club’s museum and to the right the shop. It’s shutter is up and it is open for business.\n\t\t*choice\n\t\t\t#Museum\n\t\t\t\t*label museum\n\t\t\t\t*set museum true\n\t\t\t\tThe adventurers museum is utterly chaotic. Stuffed birds, flying animals and various mobiles hang from the ceiling. The walls are covered in maps, charts, paintings and photographs and everywhere are glass cases and shelves loaded with discoveries and equipment. It is a tribute and a treasure trove, albeit in need of a good dusting and proper cataloguing. \n\t\t\t\t\n\t\t\t\tYou rapidly scan the museum. Of note among the chaos is a large map of Tanzania, a case with a figure in it labelled Yeti and a drawer of stones labelled meteorites. The map is largely the same as the one from the lecture, a large river of spidery complexity that leads to where the lecturer pointed to. The case labelled Yeti contains an animal skin of some kind badly draped over a mannequin. The drawer of stones has about a dozen stones under glass that look exactly like every other stone you have seen. \n\t\t\t\t\n\t\t\t\tSomething is glinting on the floor. One of the cases has been smashed and the contents taken. All that is left is a brass name plate on the edge of the case \"Randolph Marsh\".\n\t\t\t\t*choice\n\t\t\t\t\t*if (shop = false) #Shop\n\t\t\t\t\t\t*goto shop\n\t\t\t\t\t*if (shop = true) #Leave the museum\n\t\t\t\t\t\t*label downstairs_end\n\t\t\t\t\t\tThe club is silent. You walk downstairs to the main doors and find they are locked securely. It is strange that Bill is not around. The door to the bar has a closed sign hanging on it and there is a small red rope blocking off the lecture hall.\n\t\t\t\t\t\t*Choice\n\t\t\t\t\t\t\t#Downstairs\n\t\t\t\t\t\t\t\tTo the right is the door to the kitchen and to the left is a door marked staff exit.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Kitchen door\n\t\t\t\t\t\t\t\t\t\tThe door is locked.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*if (boxing = true) #Staff exit\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene alleybox\n\t\t\t\t\t\t\t\t\t\t\t*if (boxing = false) #Staff exit\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene alleynobox\n\t\t\t\t\t\t\t\t\t*if (boxing = true) #Staff Exit\n\t\t\t\t\t\t\t\t\t\t*goto_scene alleybox\n\t\t\t\t\t\t\t\t\t*if (boxing = false) #Staff Exit\n\t\t\t\t\t\t\t\t\t\t*goto_scene alleynobox\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t#Shop\n\t\t\t\t*goto shop\n\t#Downstairs\n\t\t*label downstairs\n\t\tThe club is silent. You walk downstairs to the main doors and find they are locked securely. It is strange that Bill is not around. The door to the bar has a closed sign hanging on it and there is a small red rope blocking off the lecture hall.\n\t\t\n\t\tYou take the steps down. There are two doors at the foot of the stairs, one on your left reads Staff Exit and the one on the right has the porthole window of a traditional kitchen door.\n\t\t*choice\n\t\t\t#Kitchen\n\t\t\t\tShelves and shelves of shiny copper pans line the walls around a wooden table in the middle of the kitchen floor. A massive black stove occupies the wall opposite you, it emits a pleasant warmth. Some chef whites are neatly folded on the table.\n\t\t\t\t*choice\n\t\t\t\t\t#Take chef whites\n\t\t\t\t\t\tWith the guilty thrill that comes with taking something that isn’t yours you steal the Chef’s working clothes.\n\t\t\t\t\t\t*set empty_inventory false\n\t\t\t\t\t\t*set chefwhite true\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (boxing = true) #Use the staff exit door\n\t\t\t\t\t\t\t\t*goto_scene alleybox\n\t\t\t\t\t\t\t*if (boxing = false) #Use the staff exit door\n\t\t\t\t\t\t\t\t*goto_scene alleynobox\n\t\t\t\t\t*if (boxing = true) #Use the staff exit door\n\t\t\t\t\t\t*goto_scene alleybox\n\t\t\t\t\t*if (boxing = false) #Use the staff exit door\n\t\t\t\t\t\t*goto_scene alleynobox\n\t\t\t*if (boxing = true) #Staff exit\n\t\t\t\t*goto_scene alleybox\n\t\t\t*if (boxing = false) #Staff exit\n\t\t\t\t*goto_scene alleynobox\n\t\t\t\t\n*label shop\n*set shop true\nThe hatch to the shop is rolled up and a well groomed older gentlemen in a white shopkeepers apron, blue bow tie and fez stands attentively in front of shelves stacked with various items.\n\nA list is pinned to the countertop:\n*label top\n\nDynamite - 15 Gold Coins\n*line_break\nGun and 6 bullets - 10 Gold Coins, in ordinary combat a successful attack yields 1 d 6 of damage, a 6 is an instant kill.\n*line_break\nClip of 6 bullets - 5 Gold Coins per clip\n*line_break\nKnuckle Duster - 5 Gold Coins, adds +1 damage to every successful attack\n*line_break\nProvisions - 5 Gold Coins per pack, adds +5 to stamina\n*line_break\nBook on treating poisons - 5 Gold Coins\n*line_break\nTranslation book - 5 Gold Coins\n*line_break\nLarge framed painting of Queen Victoria - 100 Gold Coins\n*line_break\n*choice \n\t*if (dynamite = false)\n\t\t*selectable_if (gold >= 15) #Dynamite please\n\t\t\n\t\t\t\"An excellent choice. No adventure is complete without blowing something up,\" says the shopkeeper, his manicured hands folded neatly over his stomach.\n\t\t\t*set empty_inventory false\n\t\t\t*set dynamite true\n\t\t\t*set gold -15\n\t\t\t*goto top\n\t*if (gun = false) \n\t\t*selectable_if (gold >= 10) #I'd like to buy the Gun\n\t\t\n\t\t\t\"A Mark 1 Enfield revolver. This packs a punch even Sir Malcolm would be jealous of,\" says the shopkeeper, his placid eyes twinkling a little.\n\t\t\t*set empty_inventory false\n\t\t\t*set gun true\n\t\t\t*set bullets true\n\t\t\t*set bullets_number +6\n\t\t\t*set gold -10\n\t\t\t*goto top\n\t*selectable_if (gold >= 5) #I'd like to buy clip of bullets\n\t\n\t\t\"Yes, if you are going to shoot things it’s worth going for it,\" says the shopkeeper.\n\t\t*set empty_inventory false\n\t\t*set bullets true\n\t\t*set bullets_number +6\n\t\t*set gold -5\n\t\t*goto top\n\t*if (knuckle = false)\n\t\t*selectable_if (gold >= 5) #Knuckle duster please\n\t\t\n\t\t\t\"You could knock out an elephant with this,\" says the shopkeeper. \"I know... I’ve done it,\" he says conspiratorially as he slides it across the counter to you.\n\t\t\t*set empty_inventory false\n\t\t\t*set knuckle true\n\t\t\t*set gold -5\n\t\t\t*goto top\n\t*selectable_if (gold >= 5) #Those provisions look tasty\n\t\n\t\t\"These will fix you up. The mint cake is especially good,\" says the shopkeeper.\n\t\t*set empty_inventory false\n\t\t*set provisions true\n\t\t*set provisions_number +1\n\t\t*set gold -5\n\t\t*goto top\n\t*if (poisons = false)\n\t\t*selectable_if (gold >= 5) #That book on poisoning looks useful\n\t\t\n\t\t\t\"How oft when men are at the point of death have they been merry, which their keepers call a lightning before death! Oh, how may I call this a lightning? O my love, my wife! Death, that hath sucked the honey of thy breath, hath had no power yet upon thy beauty. Thou art not conquered. Beauty’s ensign yetIs crimson in thy lips and in thy cheeks, and death’s pale flag is not advanced there. Tybalt, liest thou there in thy bloody sheet? O, what more favor can I do to thee, than with that hand that cut thy youth in twain to sunder his that was thine enemy?\"\n\t\t\t\n\t\t\t\"Ahem. Anyway, a useful book.\"\n\t\t\t*set empty_inventory false\n\t\t\t*set poisons true\n\t\t\t*set gold -5\n\t\t\t*goto top\n\t*if (translation = false)\n\t\t*selectable_if (gold >= 5) #That translation book looks useful\n\t\t\n\t\t\t\"I think someone once said that to learn another language is to offer the hand of friendship,\" says the shopkeeper.\n\t\t\t*set empty_inventory false\n\t\t\t*set translation true\n\t\t\t*set gold -5\n\t\t\t*goto top\n\t*if (painting = false) #It is my patriotic duty to buy the painting\n\t\t\n\t\tThe shopkeeper salutes the picture and starts to reach up to it carefully whilst humming the national anthem. He pretends to lift the painting from the wall and mimes wrapping the invisible picture. He mimics handing you the picture. \n\t\t\t\n\t\t\"That will be 100 invisible coins for the invisible painting please.\"\n\t\t*set painting true\n\t\t*goto top\n\t\n\t*if (museum = false) #Museum\n\t\t*goto museum\n\t*if (museum = true) #Leave the club\n\t\t*goto downstairs\n\t\t\n\t\n\n\t\t\t\t\n", "leftpath": "*temp bullet_roll 0\n*temp bullet_damage 0\n*image fish.jpg\nThe sparkling blue water twinkles and gurgles pleasantly in the sunshine. The river is wide here, with golden sandy banks either side and vivid flowers. A shoal of fish are swimming alongside the boat, leaping in and out of the water in unison. \n\nSomeone up ahead is on the river bank waving frantically and shouting. It is a tall, well built man in khaki with high leather boots. They are wearing a pith helmet and their face is quite obscured by a long unkempt beard and mustache. Judging by their dusty attire and facial hair they have been in the jungle without amenities for some time.\n*choice\n\t#Pick them up\n\t\tYou bring the HMS Rustbucket over to the bank and the adventurer boards. He grins broadly, takes off his hat and holds it under one arm whilst reaching out with the other for introductory handshakes and profuse thanks.\n\t\n\t\t\"Sydney Lapsley at your service. Can’t thank you enough for the rescue. Fine ship you have here!\"\n\t\n\t\tHe continues to chat effusively with Sir Malcolm and Lady Jane but before you can join in you notice an object ahead in the river. It is a barrel with the word \"Explosive\" stenciled in white on the side.\t\n\t\t*label barrelsydney\n\t\t*choice\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t*goto set_bullet_damagesydney\n\t\t\t\t*else\n\t\t\t\t\t*goto clicksydney\n\t\t\t#Ram the barrel\n\t\t\t\t*goto ram\n\t\t\t#Go around the barrel\n\t\t\t\tYou take the HMS Rustbucket around the barrel, giving it as wide a berth as possible. As you come closer to the edge of the river you hear shouting from the bank. People are clambering aboard! They are dressed colorfully but their clothes are shabby and dirty. Tricorn hats emblazoned with a skull and crossbones adorn their heads. Four pirates have boarded! They wave their cutlasses menacingly and advance towards you. \n\t\n\t\t\t\tSydney rushes at them immediately and fights like a one man army. You are caught up in the melee immediately.\n\t\t\t\tYou must fight the:\n\t\n\t\t\t\t[b]Pirates[/b]\n\t\n\t\t\t\t[b]Skill 8 Stamina 10[/b]\n\t\n\t\t\t\t*label pirate_fightsydney\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto pirate_fight2\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto winsydney\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"It feels special every time.\"\n\t\t\t\t\t\t*goto pirate_fightk2\n\t#Ignore them\n\t\tYou give the stranded adventurer a wide berth in case he tries to swim to you. His pleas as you chug slowly by throw a pall over the beautiful surroundings. After much travel along the river the sun starts to set, casting long black shadows and turning the water red. A chorus of croaking frogs provides accompaniment to dinner, with speculation about the lonely adventurer being the main topic of conversation. \n\t\n\t\tYou sleep in shifts and before long the nocturnal noises of the jungle are replaced by diurnal noises. The jungle is not the place to go for silence, you think to yourself. \n\t\n\t\tWith the rising morning sun, the engine fired up and everyone equipped with a cup of tea you are travelling again.\n\t\n\t\tYou notice an object ahead in the river. It is a barrel with the word Explosive stencilled in white on the side.\n\t\t*label barrel\n\t\t*choice\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t*else\n\t\t\t\t\t*goto click\n\t\t\t#Ram the barrel\n\t\t\t\t*label ram\n\t\t\t\t\"Here we go!\" you shout \"Ramming speed!\" and with that you set the controls to full ahead. \n\t\n\t\t\t\tThe HMS Rustbucket gathers speed and you let a long blast out on the ships steam whistle. You hit the barrel and there is an enormous explosion. You are aware only of a bright flash and then nothing as the HMS Rustbucket and all on board are blown into thousands of pieces. \n\t\t\t\t*goto_scene youdied\n\t\t\t#Go around the barrel\n\t\t\t\tYou take the HMS Rustbucket around the barrel, giving it as wide a berth as possible. As you come closer to the edge of the river you hear shouting from the bank. People are clambering aboard! They are dressed colourfully but their clothes are shabby and dirty. Tricorn hats emblazoned with a skull and crossbones adorn their heads. Four pirates have boarded! They wave their cutlsses menacingly and advance towards you.\n\t\n\t\t\t\tYou must fight the:\n\n\t\t\t\t[b]Pirates[/b]\n\t\n\t\t\t\t[b]Skill 8, Stamina 10[/b]\n\t\n\t\t\t\t*label pirate_fight\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto pirate_fight1\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click1\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"It feels special every time\"\n\t\t\t\t\t\t*goto pirate_fightk\n\t\n*label click\nYou line up the barrel in your sights and pull the trigger. The gun clicks.\n\n*if (male = true)\n\t\"Pretending to shoot the barrel eh Jack?\" says Sir Malcolm. \"I think we have rather more pressing matters to attend to!\"\n*if (female = true)\n\t\"Pretending to shoot the barrel eh Jill?\" says Sir Malcolm. \"I think we have rather more pressing matters to attend to!\"\n*goto barrel\n\n*label clicksydney\nYou line up the barrel in your sights and pull the trigger. The gun clicks.\n\n*if (male = true)\n\t\"Pretending to shoot the barrel eh Jack?\" says Sir Malcolm. \"I think we have rather more pressing matters to attend to!\"\n*if (female = true)\n\t\"Pretending to shoot the barrel eh Jill?\" says Sir Malcolm. \"I think we have rather more pressing matters to attend to!\"\n*goto barrelsydney\n\n*label click1\nYou line up the Pirates in your sights and pull the trigger. The gun clicks.\n\nThe Pirates laugh and rush at you.\n*goto pirate_fight1\n\n*label click2\nYou line up the figures in your sights and pull the trigger. The gun clicks. The figures get closer.\n\n*if (male = true)\n\t\"Tut tut Jack,\" says Lady Jane. \"Probably best to check this kind of thing first isn't it?\"\n*if (female = true)\n\t\"Tut tut Jill,\" says Lady Jane. \"Probably best to check this kind of thing first isn't it?\"\n\nThe Parasite Hosts attack \n*goto parasite_fight1\n\n*label click3\n*if (male = true)\n\t\"Seriously Jack?!\"\n*if (female = true)\n\t\"Seriously Jill?!\"\n*goto sydneyfight1\n\n*label click4\n\"How inopportune\"\n*goto malcolmfight1\n\n\n\n*label set_bullet_damage\n[i]This is a tricky shot so you will need to roll a 3 or less.[/i]\n*rand bullet_roll 1 6\n*set bullets_number - 1\n*line_break\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll \u003c= 3)\n\t*goto winshot\n*if (bullet_roll >= 4)\n\t*goto notwinshot\n\n*label set_bullet_damagesydney\n[i]This is a tricky shot so you will need to roll a 3 or less.[/i]\n*rand bullet_roll 1 6\n*set bullets_number - 1\n*line_break\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll \u003c= 3)\n\t*goto winshotsydney\n*if (bullet_roll >= 4)\n\t*goto notwinshot\n\t\n*label winshotsydney\nThe barrel explodes and you all duck as pieces of shrapnel ping over your head and into the side of the boat.\n\nWhen your ears have stopped ringing you think you can hear angry shouting from the jungle on the right of the river but it soon fades as you continue along the crystal waters and your companions chat happily.\n\n*label nightfalls\nNight falls and you anchor the Rustbucket for the evening.\n\n\"It’s no problem for me to sleep on deck,\" says Sydney. \"Luxury compared to what I am used to!\"\n\n*label furious\nYou are woken in the morning by furious arguing. Sir Malcolm and Sydney are standing toe to toe and shouting directly into each other’s face whilst they push and prod each other in the chest. At your arrival Sir Malcolm speaks:\n\n\"It’s Lady Jane! She has disappeared! It has to be his fault!\"\n\n\"I swear I had nothing to do with it!\" says Sydney. \"Please you must believe me!\"\n*choice\n\t#Throw him off the boat\n\t\tAs you advance towards him he rolls up his sleeves and gets ready to fight. He is unbelievably fast and strong.\n\t\t*goto sydneyfight\n\t#Kill him\n\t\tAs you advance towards him he rolls up his sleeves and gets ready to fight. He is unbelievably fast and strong.\n\t\t*goto sydneyfight\n\t#Believe him\n\t\t\"Wait Malcolm, I believe him.\"\n\t\n\t\tSir Malcolm looks at you aghast but he backs away from Sydney.\n\t\t*choice\n\t\t\t#Search for Lady Jane\n\t\t\t\tYou agree that the most ground can be covered by splitting up and to return to the Rustbucket as evening falls.\n\t\n\t\t\t\tYou search up and down the edge of the river for any sign of tracks. There are none. With increasing desperation you push further into the bulrushes and beyond. You shout her name and once or twice your heart races at a reply but it is just the sound of your companions calling. Hope and light fade and you return to the Rustbucket. \n\t\n\t\t\t\tSoon you are joined by Sydney and Sir Malcolm. You do not need words to know that their search has also been fruitless and with a heavy heart you retire for the evening. \n\t\n\t\t\t\t\"I am going to leave a light on,\" says Sir Malcolm and in a choked voice he adds quietly, \"She may see it, in the night.\"\n\t\t\t\t*goto fightingsounds\n\t\t\t\t\n\t\t\t#Carry on\n\t\t\t\tYou agree that it is for the best to carry on down the river.\n\t\n\t\t\t\tSir Malcolm looks totally defeated by the situation and he retires to his cabin a broken man.\n\t\n\t\t\t\tSydney stands on one side of the boat looking out at the jungle as you continue navigating down the river. The surrounding beauty takes on a surreal aspect in the circumstances and eventually night starts to fall. You retire, placing your feet towards the cabin door in case it is opened in the night. \n\t\t\t\t*goto fightingsounds\n*label winshot\nThe barrel explodes and you all duck as pieces of shrapnel ping over your head and into the side of the boat.\n\nWhen your ears have stopped ringing you think you can hear angry shouting from the jungle on the right of the river but it soon fades as you continue along the crystal waters and your companions chat happily.\n\n*label adventureragain\nUp ahead is the adventurer again, waving with both arms and calling again for rescue.\n*choice\n\t#Ignore them\n\t\tYou all shake your heads slowly and sadly.\n\t\n\t\tAs you pass the adventurer you see that he looks very frail, his face is thin and his eyes are dark and sunken. He barely has the energy to plead with you and his voice hardly carries over the noise of the boat and jungle.\n\t\n\t\tOn seeing you pass by again he winces as if punched and teeters unsteadily back into the jungle and out of sight.\n\t\n\t\tEventually night falls. The sight of the adventurer alone makes you more glad than ever for the companionship of your friends and fellow travelers. \n\t\n\t\tMorning comes and you set off again. \n\t\n\t\tThe river is flowing faster and soon you only need enough engine power to steer the accelerating HMS Rustbucket. On the river bank on the left is the crumpled and unmoving body of the adventurer. Sir Malcolm puts a reassuring hand on your shoulder.\n\t\n\t\t*if (male = true)\n\t\t\t\"There’s nothing we can do Jack, you know that.\"\n\t\t*if (female = true)\n\t\t\t\"There’s nothing we can do Jill, you know that.\"\n\t\n\t\tYou nod. The HMS Rustbucket accelerates again and concern creeps in. The water around the bow of the boat is white and foamy and the scenery is positively zipping by. The prow starts to lift up out of the water and then slap down again. You are holding the wheel steady with all your strength and Lady Jane and Sir Malcolm are holding on the the rail tightly, braced against the bucking ship. There is white water ahead. You are going over a waterfall!\n\t\n\t\tThe HMS Rustbucket drops off the edge of the cascade but mercifully the drop is only a matter of feet. With an almighty slap she stays upright. The water here is flat and calm. You are in a lagoon of some kind, in the distance white cliffs stretch upwards and cut off all routes forward with the waterfall behind you now being the only exit. A mass of boats of all types and ages float silently around you. \n\t\n\t\t*if (male = true)\n\t\t\t\"It’s like a boat graveyard here Jack,\" says Lady Jane. \n\t\t*if (female = true)\n\t\t\t\"It’s like a boat graveyard here Jill,\" says Lady Jane. \n\t\n\t\tYou pass slowly by a barge.\n\t\t*choice\n\t\t\t#Board Barge\n\t\t\t\tThe condition of the steamer makes you feel more upbeat about the HMS Rustbucket as you board her. Your footsteps echo emptily as you investigate and you feel in constant danger of falling right through the rusted deck. Lady Jane descends some steps leading inside and then starts shouting for you to join her.\n\t\n\t\t\t\tIn the hold of the ship are four figures sleeping under tattered blankets. With just their faces showing they look painfully thin and they don’t appear to be breathing. As you get nearer to look more closely they suddenly open their eyes! You jump back in shock as the figures rise unsteadily to their feet. They are terribly thin and frail. Lady Jane gasps in horror.\n\t\n\t\t\t\t\"My God, look at it’s back,\" she shrieks.\n\t\n\t\t\t\tAttached between the shoulder blades of one of the rising skeletal figures is a pulsing and writhing yellow tendril!\n\t\n\t\t\t\tYou must fight the:\n\n\t\t\t\t[b]Parasite Hosts[/b]\n\t\n\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\n\t\t\t\t*label parasite_fight\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto parasite_fight1\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t\t\t*goto set_bullet_damage2\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto click2\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win1\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"Let's make this quick.\"\n\t\t\t\t\t\t*goto parasite_fightk\n\t\n\t\t\t#Continue On\n\t\t\t\t*label continueon\n\t\t\t\tYou sail past hulks and vessels of all types. Some of the boats have decayed beyond all recognition and several times the hull scrapes on what you suspect are sunken wrecks.\n\t\n\t\t\t\tA fog covers the water and muffles the gentle putting of your ships engine. \n\t\n\t\t\t\tYou pass a bewildering number of ships before you reach what must be the other side of the lagoon. A dam has been created from tree trunks. \n\t\n\t\t\t\t\"It looks like a beaver dam but the scale is too big for this to have been created by beavers, it has to be man made,\" says Lady Jane.\n\t\n\t\t\t\tAs you ponder your next move a low moan carries across the water to you. It increases in intensity and is joined by many others. Turning back to look at the wrecks you see skeletal figures clambering out of portholes, along gangways and through holes and breaches. \n\t\n\t\t\t\tBodies flop into the water and others clamber from wreck to wreck in their ungainly eagerness to reach you.\t\t\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Defend yourselves\n\t\t\t\t\t\tThe skeletal horde is unending and unrelenting. Soon you are swamped.\n\t\t\t\t\t\t*goto_scene youdied\n\t\t\n\t\t\t\t\t*if (dynamite = true) #Blow up the dam with dynamite\n\t\t\t\t\t\tThe first of the corpse-like figures are a fingertip away from the bow of the Rustbucket when a huge shockwave hits, knocking you onto the deck. \n\t\t\n\t\t\t\t\t\tA massive hole has been blown in the dam and the Rustbucket is pushed out like a cork flying from a champagne bottle. \n\t\t\n\t\t\t\t\t\tYou hurtle along the Mjaa Nto, flat to the deck and holding on for dear life until the Rustbucket hits something and comes to a violent stop. You are on the edge of a marsh. The hull of the Rustbucket has been torn open from bow to stern. She will not sail again.\n\t\t\n\t\t\t\t\t\t\"Can I suggest a small ceremony?\" says Sir Malcolm.\n\t\t\n\t\t\t\t\t\tYou gather around and salute.\n\t\t\n\t\t\t\t\t\tLady Jane speaks: \"Here he lies where he long’d to be. Home is the sailor, home from the sea.\"\n\t\t\n\t\t\t\t\t\tYou leave the Rustbucket and head into the marshes.\n\t\t\t\t\t\t*page_break The Marsh\n\t\t\t\t\t\t*goto_scene marsh\n\t\t\n\t\n\t#Pick them up\n\t\tYou bring the HMS Rustbucket over to the bank and the adventurer boards. He looks dreadfully tired and thin and you cannot believe it is the same man from only one day ago.\n\t\n\t\tHe weakly introduces himself as Sydney Lapsely and then collapses into a heap on the deck. He is unconscious and he cannot be roused so you cover him with a blanket. \n\t\n\t\tWhen night falls you try again to rouse him for dinner but he is totally unresponsive. \n\t\t*goto furious\n\t\n\n\n*label notwinshot\nThe barrel doesn't explode as expected. Instead, it seems as though the bullet has hit the rope tether holding it in place. It floats down the river towards you.\n\nYou are only aware of a bright flash and then nothing as the HMS Rustbucket and all on board are blown into thousands of pieces.\n*goto_scene youdied\n\t\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set pirateshp - bullet_damage\nThe pirates have ${pirateshp} stamina remaining\n*if (pirateshp \u003c 1)\n\t*goto win\n*else\n\t*goto pirate_fight\n\n\t\n*label set_bullet_damage2\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot2\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set parasitehp - bullet_damage\nThe parasite hosts have ${parasitehp} stamina remaining\n*if (parasitehp \u003c 1)\n\t*goto win1\n*else\n\t*goto parasite_fight1\n\n\n*label set_bullet_damage3\nYou have one shot before he reaches you\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshotsydney1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set sydneyhp - bullet_damage\nSydney has ${sydneyhp} stamina remaining\n*if (sydneyhp \u003c 1)\n\t*goto winsydney2\n*else\n\t*goto sydneyfight1\n\n\n*label set_bullet_damage4\nYou have one shot before he reaches you\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshotmalcolm\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set malcolmhp - bullet_damage\nSir Malcolm has ${malcolmhp} stamina remaining\n*if (malcolmhp \u003c 1)\n\t*goto winmalcolm\n*else\n\t*goto malcolmfight1\n\n\t\n\n\n*label win\n\nSir Malcolm and Lady Jane finish throwing the pirates over board while you navigate on. You can hear them saying \"yo hoho\" and \"shiver me timbers\" and you wonder how long they will be talking like pirates for. \n\nWhat looks like a log on the river bank slips into the water and you realise it was a crocodile. You spot a few more on the other side, sunbathing with toothy smiles.\n*if (stamina = max_stamina)\n\t*goto adventureragain\n*elseif (provisions = false)\n\t*goto adventureragain\n*else\n\t*goto choice8\n*label choice8\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto adventureragain\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto adventureragain\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto adventureragain\n\t*if (provisions = false) #Onwards\n\t\t*goto adventureragain\n\n*label winsydney\n\nSir Malcolm, Lady Jane and Sydney throw the pirates overboard. Crocodiles sunbathing on the bank start to slip into the water.\n*if (stamina = max_stamina)\n\t*goto nightfalls\n*elseif (provisions = false)\n\t*goto nightfalls\n*else\n\t*goto choice9\n*label choice9\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto nightfalls\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto nightfalls\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto nightfalls\n\t*if (provisions = false) #Onwards\n\t\t*goto nightfalls\n\n*label winsydney2\n\nHe collapses to the deck. \n\"I am sorry,\" he whispers.\n*if (stamina = max_stamina)\n\t*goto sydneyeyeshot\n*elseif (provisions = false)\n\t*goto sydneyeyeshot\n*else\n\t*goto choice6\n*label choice6\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto sydneyeyeshot\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto sydneyeyeshot\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto sydneyeyeshot\n\t*if (provisions = false) #Onwards\n\t\t*goto sydneyeyeshot\n\n\n*label sydneyeyeshot\nThere is movement under the back of his shirt. Something is now violently thrashing around and starting to tear through the material. \n\n\"Good God!\" says Sir Malcolm as a yellow snake-like creature flies up from the body and latches onto Sir Malcolm’s arm. \"Get it off! Get it off!\"  he cries.\n\nThe creature worms its way around and into his back. With a yell of anguish he throws himself overboard and is gone.\n\nBereft you navigate further up the river. There are sights and sounds all around but everything has an air of unreality. You travel on in a timeless state until it is too dark to continue. You anchor the HMS Rustbucket and retire to your cabin. Sleep does not come. \n\nIn the middle of the night you hear a sound on the deck and investigate. Peering out of the doorway you see a figure creeping towards your cabin. You light a lamp and it spotlights a familiar face. It is Sir Malcolm! Overjoyed you rush out onto the deck. \n\n\"Malcolm! You don’t know how happy I am to see you again old friend!\"\n\n*if (male = true)\n\t\"I am sorry Jack. So Hungry. So Sorry.\"\n*if (female = true)\n\t\"I am sorry Jill. So Hungry. So Sorry.\"\n\nHe raises his arms and comes towards you to fight, red eyes glowing.\n\nYou must fight:\n\n[b]Sir Malcolm Penrose[/b]\n\n[b]Skill 12, Stamina 12[/b]\n\n*label malcolmfight\n*choice\n\t#Fight\n\t\t*goto malcolmfight1\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0) \n\t\t\t*goto set_bullet_damage4\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click4\n\t*if (instant_win = true) #Insta Win\n\t\t*goto winmalcolm\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\"We are going to enjoy this\"\n\t\t*goto malcolmfightk\n\t\n\t\n\n*label win1\n\nYou cover the bodies with their blankets. As you do so you notice that something has been scrawled on the cabin wall:\n\n[i]\"The key is in three and this is not the way.\"[/i]\n\nLow moans are coming from outside the barge.\n\n\"I think we may have outstayed our welcome,\" says Sir Malcolm and you rush back to the Rustbucket.\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto continueon\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto continueon\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto continueon\n\t*if (provisions = false) #Onwards\n\t\t*goto continueon\n\n\n\n*label winshot2\n\nYour bullet passes through the four skeletal figures and they drop to the floor. You cover the bodies with their blankets. Low moans are coming from outside the barge.\n\n\"I think we may have outstayed our welcome,\" says Sir Malcolm and you rush back to the Rustbucket.\n*goto continueon\n\n\n\n\n\n*label winshot1\n\nFor a very brief moment the four pirates line up perfectly. Your bullet passes through them all and they topple in the pleasing order of left, right, left and finally right.\n\n*if (male = true)\n\t\"Remind me to take you to the FairGround the next time they are in town Jack,\" says Lady Jane.\n*if (female = true)\n\t\"Remind me to take you to the FairGround the next time they are in town Jill,\" says Lady Jane.\n*goto win\n\n*label winshotsydney1\n*line_break\nYour bullet hits right into one of Sydneys glowing eyes. He clasps at it and falls.\n*goto sydneyeyeshot\n\n*label pirate_fight1\n*temp piratesdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand piratesdiceresult 1 dicesides\n*line_break\nThe pirates rolled ${piratesdiceresult}\n*set diceresult +skill\n*set piratesdiceresult +piratesskill\n*line_break\nYour total: ${diceresult} Pirates total: ${piratesdiceresult}\n*if (diceresult > piratesdiceresult)\n\t*line_break\n\tYou charge into the pirates as a group and send them scattering\n\t*set pirateshp -2\n*if (diceresult \u003c piratesdiceresult)\n\t*line_break\n\tThe pirates slice you with t stamina left\n*line_break\nSydney has ${sydneyhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (sydneyhp \u003c 1)\n\t*goto winsydney2\n*else\n\t*goto sydneyfight1\n\n*label sydneyfightk\n*temp sydneydiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand sydneydiceresult 1 dicesides\n*line_break\nSydney rolled ${sydneydiceresult}\n*set diceresult +skill\n*set sydneydiceresult +sydneyskill\n*line_break\nYour total: ${diceresult} Sydney's total: ${sydneydiceresult}\n*if (diceresult > sydneydiceresult)\n\t*line_break\n\tYour knuckle duster strikes home and Sydney grunts\n\t*set sydneyhp -3\n*if (diceresult \u003c sydneydiceresult)\n\t*line_break\n\tSydney knocks you both aside effortlessly\n\t*set stamina -2\n*if (diceresult = sydneydiceresult)\n\t*line_break\n\tSydney grins at you as you get your breath\n\t*goto sydneyfightk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nSydney has ${sydneyhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (sydneyhp \u003c 1)\n\t*goto winsydney2\n*else\n\t*goto sydneyfightk\n\t\n*label malcolmfight1\n*temp malcolmdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand malcolmdiceresult 1 dicesides\n*line_break\nSir Malcolm rolled ${malcolmdiceresult}\n*set diceresult +skill\n*set malcolmdiceresult +malcolmskill\n*line_break\nYour total: ${diceresult} Sir Malcolm's total: ${malcolmdiceresult}\n*if (diceresult > malcolmdiceresult)\n\t*line_break\n\tYou hit Sir Malcolm with all that you have got\n\t*set malcolmhp -2\n*if (diceresult \u003c malcolmdiceresult)\n\t*line_break\n\tSir Malcolm hits you and you see stars\n\t*set stamina -2\n*if (diceresult = malcolmdiceresult)\n\t*line_break\n\tYou break apart and get ready to go again\n\t*goto malcolmfight1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nSir Malcolm has ${malcolmhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (malcolmhp \u003c 1)\n\t*goto winmalcolm\n*else\n\t*goto malcolmfight1\n\t\n*label malcolmfightk\n*temp malcolmdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand malcolmdiceresult 1 dicesides\n*line_break\nSir Malcolm rolled ${malcolmdiceresult}\n*set diceresult +skill\n*set malcolmdiceresult +malcolmskill\n*line_break\nYour total: ${diceresult} Sir Malcolm's total: ${malcolmdiceresult}\n*if (diceresult > malcolmdiceresult)\n\t*line_break\n\tYour knuckle duster strikes home and Sir Malcolm grunts\n\t*set malcolmhp -2\n*if (diceresult \u003c malcolmdiceresult)\n\t*line_break\n\tSir Malcolm hits you and you see stars\n\t*set stamina -2\n*if (diceresult = malcolmdiceresult)\n\t*line_break\n\tYou break apart and get ready to go again\n\t*goto malcolmfightk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nSir Malcolm has ${malcolmhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (malcolmhp \u003c 1)\n\t*goto winmalcolm\n*else\n\t*goto malcolmfightk\n\t\n*label winshotmalcolm\nYour bullet hits Sir Malcolm in the forehead and he falls backwards, his arms outstretched and eyes staring upwards.\n\nYou bend over him and close them.\n\n\"Goodbye old friend.\"\n\nSomething wriggles out from under his body and wraps itself around your arm. You desperately try to shake it off but to no avail. The parasite burrows into your back.\n\nYou are now the host for the parasite. You feel a gnawing hunger and look down at Sir Malcolm's body.\n*goto_scene youdied\n\n*label winmalcolm\n\nAs you struggle together you can feel Sir Malcolm weakening. He starts to sag and grabs you in a clinch. The fight is turning your way! You hit Sir Malcolm with an uppercut and he goes down.\n\nSomething wriggles out from under his body and darts towards your leg. It snakes upwards and around your arm. You desperately try to shake it off but to no avail. The parasite burrows into your back.\n\nYou are now the host for the parasite. You feel a gnawing hunger and look down at Sir Malcolm's body.\n*goto_scene youdied\n\n*label fightingsounds\nYou are awoken from a fitful sleep by the sounds of fighting on the deck.\n\t\nIn the moonlight you can see Sir Malcolm wrestling with Sydney. Sydney turns in your direction and to your horror his eyes are a glowing red. \n\t\nSir Malcolm pushes him away and you rush to help in the fight against Sydney.\n*label sydneyfight\nYou must fight:\n\t\n[b]Sydney Lapsley[/b]\n\t\n[b]Skill 12, Stamina 12[/b]\n\t\n*choice\n\t#Fight\n\t\t*goto sydneyfight1\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0) \n\t\t\t*goto set_bullet_damage3\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click3\n\t*if (instant_win = true) #Insta Win\n\t\t*goto winsydney2\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\"We are going to enjoy this\"\n\t\t*goto sydneyfightk\n\n\n\n\n", "luckygosub": "*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\n\n\t\n\t", "marsh": "*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 false\n\t\t\t*set chapter4 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto thesoft\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*else\n\t\t\t\t*goto thesoft\n\t\t#No\n\t\t\t*goto thesoft\n*label thesoft\nThe soft, stinking marsh makes progress slow and tiring. Rows of tall swaying bulrushes make it feel like a maze. The path goes North, Northwest and Northeast.\n*temp bullet_roll 0\n*temp bullet_damage 0\n*choice\n\t#North\n\t\tA cloud of stinging gnats rises from the stagnant water at your passing. They cover you and you close your mouth and eyes, waving your arms furiously to disperse them. \n\t\t\n\t\tEventually they are gone, leaving you feeling itchy and in need of a bath.\n\t\t\n\t\t[i]Lose 1 stamina[/i]\n\t\t*set stamina -1\n\t\t*if (stamina \u003c 1)\n\t\t\t*goto_scene youdied\n\t\t*choice\n\t\t\t#Northwest\n\t\t\t\t*goto hut\n\t\t\t#North\n\t\t\t\t*label rowboat\n\t\t\t\tA small rowing boat is just about visible protruding from the surface of the marsh. It is nearly all rotted away. Smoke gently rises ahead at the edge of the marsh and you see the glow of a campfire. \n\t\t\t\t*choice\n\t\t\t\t\t#Go around\n\t\t\t\t\t\tYou give the campfire a wide berth and the ground gets firmer. You are relieved to be out of the stinking marsh.\n\t\t\t\t\t\t*goto_scene junglepath\n\t\t\t\t\t#Go to the campfire\n\t\t\t\t\t\tFour figures are seated around a campfire, cooking various skewered meats. At your arrival they grab their spears and prepare to fight.\n\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Marsh Warriors[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label marshwarriors_fight1\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto roll_dice_loop1\n\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t*goto click1\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto win1\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\"It's clobbering time!\"\n\t\t\t\t\t\t\t\t*goto roll_dice_loopk1\n\t\t\t\n\t\t\n\t#Northwest\n\t\tA thick cloud of flies rises, disturbed by your presence. Then they settle back down again on a dead cow half submerged in the marsh.\n\t\t\n\t\t\"Not exactly an ideal picnic spot,\" says Lady Jane.\n\t\t \n\t\t\"Unless you are a fly,\" adds Sir Malcolm.\n\t\t*choice\n\t\t\t#North\n\t\t\t\t*label hut\n\t\t\t\tA broken down hut on stilts is in the process of slowly sinking into the marsh. Through a hole in the side you can see that it is empty. Smoke gently rises ahead at the edge of the marsh and you see the glow of a campfire. \n\t\t\t\t*choice\n\t\t\t\t\t#Go around\n\t\t\t\t\t\tYou give the campfire a wide berth and the ground gets firmer. You are relieved to be out of the stinking marsh.\n\t\t\t\t\t\t*goto_scene junglepath\n\t\t\t\t\t#Go to the campfire\n\t\t\t\t\t\t*label campfirefight\n\t\t\t\t\t\tFour figures are seated around a campfire, cooking various skewered meats. At your arrival they grab their spears and prepare to fight.\n\t\t\t\t\t\t*goto marshwarriors_fight1\n\t\t\t#Northeast\n\t\t\t\t*goto rowboat\n\t#Northeast\n\t\tThe brackish water rises higher as you push on, reaching above your knees before eventually subsiding. Fat leeches cling to your legs. Sir Malcolm lights a cigar and assists in burning them off of you all.\n\t\t\n\t\t\"I had been saving this for a special occasion,\" he says.\n\t\t*choice\n\t\t\t#North\n\t\t\t\tA bone horn is hung from a pole. \n\t\t\t\t\n\t\t\t\t\"What an unusual thing,\" says Lady Jane.\n\t\t\t\t*choice\n\t\t\t\t\t#Blow Horn\n\t\t\t\t\t\tThe note is deep and clear and it reverberates around the marsh. It is answered by another horn.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Wait by the pole\n\t\t\t\t\t\t\t\tIncredibly tall figures start to materialise from the mist that hangs over the swamp. As they get closer you see four armed figures on stilts. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]As the marsh makes movement difficult your skill is reduced by 2[/i]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*set skill -2\n\t\t\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[b]Marsh Warriors[/b]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label marshwarriors_fight\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loop\n\t\t\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t\t\t*goto click\n\t\t\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t\t\t*goto win\n\t\t\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\t\t\"It's clobbering time!\"\n\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loopk\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Hide\n\t\t\t\t\t\t\t\tYou crouch down in the reeds, fighting back the urge to choke as you breath in the stinking marsh gas.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs {lucktest}\n\t\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\t\tFour incredibly tall figures emerge from the mist. As they get closer you can see that they are armed figures on stilts. \t\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tThe figures inspect the horn scan around. You remain unseen and soon they move past you in silence, swallowed by the mists.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tLight from a campfire can be seen on the horizon.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Go to campfire\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tMeat of some kind roasts on a spit over a campfire. It smells delicious. A horn sounds from far away in the marsh.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Eat the meat\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t[i]The swamp rat is tender and juicy, add 2 stamina points.[/i]\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set stamina +2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*gosub limit_stats\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene junglepath\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Ignore the meat\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene junglepath\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Go around\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou give the campfire a wide berth and the ground gets firmer. You are relieved to be out of the stinking marsh.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene junglepath\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\t\tDespite your best efforts a small cough escapes you and the four figures turn rapidly in your direction.\t\n\t\t\t\t\t\t\t\t\t\t\t\t*goto marshwarriors_fight\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t#Move On\n\t\t\t\t\t\tSmoke gently rises ahead at the edge of the marsh and you see the glow of a campfire.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Go to the campfire\n\t\t\t\t\t\t\t\t*goto campfirefight\n\t\t\t\t\t\t\t#Go around\n\t\t\t\t\t\t\t\tYou give the campfire a wide berth and the ground gets firmer. You are relieved to be out of the stinking marsh.\n\t\t\t\t\t\t\t\t*goto_scene junglepath\n\t\t\t#Northwest\n\t\t\t\t*goto rowboat\n\t\t\n\t\t\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\t\n*label roll_dice_loop\n*temp marshwarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand marshwarriordiceresult 1 dicesides\n*line_break\nThe Marsh Warriors rolled ${marshwarriordiceresult}\n*set diceresult +skill\n*set marshwarriordiceresult +marshwarriorskill\n*line_break\nYour total: ${diceresult} Marsh Warrior total: ${marshwarriordiceresult}\n*if (diceresult > marshwarriordiceresult)\n\t*line_break\n\tYou hit the Marsh Warriors and they stagger.\n\t*set marshwarriorhp -2\n*if (diceresult \u003c marshwarriordiceresult)\n\t*line_break\n\tThe Marsh Warriors strike you with their spears.\n\t*set stamina -2\n*if (diceresult = marshwarriordiceresult)\n\t*line_break\n\tThe Marsh Warriors step aside from your attack.\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Marsh Warriors have ${marshwarriorhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (marshwarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n*label click\nYou line the lead Marsh Warrior up in your sights and pull the trigger. Click!\n\n\"You should get one with a flag that says Bang next!\" says Sir Malcolm\n\n*goto roll_dice_loop\n\n*label click1\nThe Marsh Warriors look at you with surprise.\n\n\"Taste lead you stilt walking swamp dwellers!\" you shout and pull the trigger. The gun clicks uselessly.\n\nThe Marsh Warriors shake their heads and your companions roll their eyes.\n*goto marshwarriors_fight1\n\n*label winshot1\nYour bullet kills the first Marsh Warrior instantly and he topple backwards into the campfire, bursting into flames. On seeing this his companion pulls him out and the flames leap onto him, setting him ablaze. He runs around in panic and in doing so sets his companions also on fire. The three Marsh Warriors soon fall.\n*goto wastemeal\n\n*label winshot\n*set skill +2\nYour bullet kills the first Marsh Warrior instantly and he topples backwards into his companions. They fall like dominoes into the swamp and encumbered by their stilts they flounder hopelessly. \n\n*goto legs\n\t\n*label win\n*set skill +2\n\nThe last of the Marsh Warriors falls.\n*if (stamina = max_stamina)\n\t*goto legs\n*elseif (provisions = false)\n\t*goto legs\n*else\n\t*goto choice1\n*label choice1\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto legs\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto legs\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto legs\n\t*if (provisions = false) #Onwards\n\t\t*goto legs\n\n\n*label legs\n\n\"My legs are killing me!\" says Sir Malcolm.\n\n\"Yes,\" agrees Lady Jane. \"It is like walking through treacle.\"\n\nSmoke gently rises ahead at the edge of the marsh and you see the glow of a campfire.\n*choice\n\t#Go to the campfire\n\t\tMeat of some kind roasts on a spit over a campfire. It smells delicious.\n\t\t*choice\n\t\t\t#Eat the meat\n\t\t\t\t[i]The swamp rat is tender and juicy, add 2 stamina points.[/i]\n\t\t\t\t*set stamina +2\n\t\t\t\t*gosub limit_stats\n\t\t\t\t*goto_scene junglepath\n\t\t\t#Ignore the meat\n\t\t\t\t*goto_scene junglepath\n\t\t\n\t\t\n\t\t\n\t#Go around\n\t\tYou give the campfire a wide berth and the ground gets firmer. You are relieved to be out of the stinking marsh.\n\t\t*goto_scene junglepath\n\n\n*label limit_stats\n*if stamina > max_stamina\n\t*set stamina max_stamina\n*return\n\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set marshwarriorhp - bullet_damage\nThe Marsh Warriors have ${marshwarriorhp} stamina remaining\n*if (marshwarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto marshwarriors_fight\n\n\t\n*label roll_dice_loopk\n*temp marshwarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand marshwarriordiceresult 1 dicesides\n*line_break\nThe Marsh Warriors rolled ${marshwarriordiceresult}\n*set diceresult +skill\n*set marshwarriordiceresult +marshwarriorskill\n*line_break\nYour total: ${diceresult} Marsh Warrior total: ${marshwarriordiceresult}\n*if (diceresult > marshwarriordiceresult)\n\t*line_break\n\tThe power of your attack shocks the Marsh Warriors\n\t*set marshwarriorhp -3\n*if (diceresult \u003c marshwarriordiceresult)\n\t*line_break\n\tThe Marsh Warriors strike you with their spears\n\t*set stamina -2\n*if (diceresult = marshwarriordiceresult)\n\t*line_break\n\tThe Marsh Warriors step aside from your attack\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Marsh Warriors have ${marshwarriorhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (marshwarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n\n*label roll_dice_loop1\n*temp marshwarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand marshwarriordiceresult 1 dicesides\n*line_break\nThe Marsh Warriors rolled ${marshwarriordiceresult}\n*set diceresult +skill\n*set marshwarriordiceresult +marshwarriorskill\n*line_break\nYour total: ${diceresult} Marsh Warrior total: ${marshwarriordiceresult}\n*if (diceresult > marshwarriordiceresult)\n\t*line_break\n\tYou hit the Marsh Warriors and they stagger.\n\t*set marshwarriorhp -2\n*if (diceresult \u003c marshwarriordiceresult)\n\t*line_break\n\tThe Marsh Warriors strike you with their spears.\n\t*set stamina -2\n*if (diceresult = marshwarriordiceresult)\n\t*line_break\n\tThe Marsh Warriors step aside from your attack.\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Marsh Warriors have ${marshwarriorhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (marshwarriorhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\t\n*label win1\n\nThe last of the Marsh Warriors falls.\n\n*label legs1\n\"My legs are killing me!\" says Sir Malcolm.\n\n\"Yes,\" agrees Lady Jane. \"That was like walking through treacle\".\n\n*label wastemeal\n\"Seems a shame to waste the meal,\" says Sir Malcolm, helping himself. \n\nYou eat on the move, unwilling to sit by the fire among the fallen.\n\n[i]Add 2 stamina[/i]\n\n*set stamina +2\n*gosub limit_stats\n*goto_scene junglepath\n\n*label roll_dice_loopk1\n*temp marshwarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand marshwarriordiceresult 1 dicesides\n*line_break\nThe Marsh Warriors rolled ${marshwarriordiceresult}\n*set diceresult +skill\n*set marshwarriordiceresult +marshwarriorskill\n*line_break\nYour total: ${diceresult} Marsh Warrior total: ${marshwarriordiceresult}\n*if (diceresult > marshwarriordiceresult)\n\t*line_break\n\tThe power of your attack shocks the Marsh Warriors\n\t*set marshwarriorhp -3\n*if (diceresult \u003c marshwarriordiceresult)\n\t*line_break\n\tThe Marsh Warriors strike you with their spears\n\t*set stamina -2\n*if (diceresult = marshwarriordiceresult)\n\t*line_break\n\tThe Marsh Warriors step aside from your attack\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Marsh Warriors have ${marshwarriorhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (marshwarriorhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\t\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set marshwarriorhp - bullet_damage\nThe Marsh Warriors have ${marshwarriorhp} stamina remaining\n*if (marshwarriorhp \u003c 1)\n\t*goto win1\n*else\n\t*goto marshwarriors_fight1\n\n\n\n\t\t", "mazeescape": "*temp lucktest 0\n*temp tar false\nWith arms outstretched for balance you cross the pit as fast as you dare. The roaring sounds horribly close behind you. You reach the other side with gratitude.\n*choice\n\t#Push the beam into the pit\n\t\tYou turn back to the direction of your pursuer and grasp the end of the tree so that you can tip it into the pit.\n\n\t\tLooking up for a moment you see what is chasing you. It is a lizard of roughly your size! It stands on two powerfully muscled legs that taper down to vicious curved claws. Its arms are thin and short and its head is somewhat canine like. It stands in the opening and snorts in your direction, revealing white rows of razor like teeth. It sniffs the air, roars once more and starts running towards you. It is fr
