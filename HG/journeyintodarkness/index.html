mple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Examine the tablet\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set tablet true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs you remove the foliage from the stone you can see carving underneath. An alphabet of characters is revealed in a long paragraph of text. Below that inscription is another paragraph in a completely different script.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Goodness me!\" says Lady Jane. \"This bottom part here is ancient Sumerian. It seems like a translation of the text above, but that is nothing I have ever seen before. I must take notes.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs Lady Jane starts her translation a ghastly whooping starts from the jungle.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tSir Malcolm shrugs his shoulders and sighs. \"Here we go again, more bloody monkeys!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"You have to give me time!\" says Lady Jane\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (kerosene = true) #Use kerosene\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou circle wide around the stone tablet pouring fuel as quickly as you can. Meanwhile the whooping has become almost deafening. As the last drops of fuel complete your perimeter countless monkeys pour from the surrounding jungle. Standing back you flick a lit match onto the ground and a wall of flame leaps into the air. You can see the apes shimmering on the other side, gibbering and capering agitatedly.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou cough politely: \"Lady Jane, if I may please inquire as to the possibility of an early cessation of your dialect transcription? Only the natives are getting restless.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Nearly done,\" she replies.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAround you, the flames grow noticeably less bright and the monkeys get closer, reaching forward in anticipation.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Done!\" says lady Jane, tucking her notebook away. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set monkeytablet true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith that the flames flicker and die.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break The Temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (dynamite = true) #Use dynamite\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set tablet true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAmidst deafening whooping you light the fuse and throw the dynamite into the jungle. There is an enormous boom followed by a ringing in your ears. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tApes quickly start to appear again from the edge of the jungle. You light another match and hold it up reaching into your backpack as if to get more dynamite.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOn seeing this they retreat. It is only after a few repeats that the ruse no longer works. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Done!\" says lady Jane, tucking her notebook away. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set monkeytablet true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break The Temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto tabletgun\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto tabletgunno\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Fight them off\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou and Sir Malcolm square up to the oncoming horde.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tTurning to Lady Jane you say: \"We will hold them off as long as we can.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe nods and turns back to the stone, pencil and notebook in hand. You and Sir Malcolm are instantly overrun.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Well we look like a right couple of Cnuts now!\" shouts Sir Malcolm.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break The Temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Go around\n\t\t\t\t\t\t\t\t*goto chasm\n\t\t\t\t\t\t\n\t\t\t\t\t#Right\n\t\t\t\t\t\tThe sheer white cliff face goes on and on, the river running through the valley below is just visible and occasionally obscured by clouds. The sensation of looking down onto clouds is quite odd. As you follow the path you can see up ahead an outcropping in the face of the cliff. There is a naturally formed ledge that leads into an opening on the cliff face. The path continues into the jungle.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Investigate\n\t\t\t\t\t\t\t\tYou tie a rope around yourself and your partners lower you to the ledge. You crouch down to get into the opening. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tInside is a small cave, little bigger than a drawing room. Slumped against the wall on the right is a skeleton. It is covered in cobwebs and scraps of indistinguishable cloth. It’s right hand is clenched around an old fashioned flintlock pistol. The grinning skull is looking right at you, a small hole in the temple makes it easy to piece together the rest. The rest of the cave is draped in dust and cobwebs. Large spiders crawl about in the recesses. You can feel a tugging on your waist. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tReturning to the ledge you look up and can’t believe your eyes. Sir Malcolm and Lady Jane are fighting a giant bird of some kind. It is huge with reptilian skin and a long triangular beak. It swoops down on them mercilessly and there is nothing you can do to help!\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\t\tThe terrible flying lizard swoops and harasses your companions until it is soon joined by another. To your surprise and relief they begin to fight over their prey, raking and biting at each other in mid air. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tWhile they are distracted Sir Malcolm and Lady Jane hurriedly haul you to safety and you escape into the jungle while you can.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto pressingon\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\t\tYou watch helplessly as your companions lose their fight with the terrible flying lizard. It swoops down onto their bodies and picks one up in each claw. As it flies away you feel the rope around you tighten and you are lifted off your feet and up into the air. You swing around vertiginously until exhausted by the extra weight the pterodactyl drops you and Sir Malcolm into the void. You are mercifully unconscious by the time you hit the river so far below.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Carry on into the jungle\n\t\t\t\t\t\t\t\t*goto pressingon\n\t\t\t\t\t#Ahead\n\t\t\t\t\t\t*goto pressingon\n\t\n\t\n*label monkeygun\n*set bullets_number -1\nYou fire a shot into the jungle and for a very brief moment there is silence. Then the horde starts up again, louder than ever.\n*choice\n\t#Run across the bridge\n\t\t*goto runbridge\n\t#Stay and fight\n\t\t*goto stayandfight\n\t#Take the warriors claws\n\t\t*goto claws\n\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\t\n\n\n*label roll_dice_loop2\n*temp pterodactyldiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand pterodactyldiceresult 1 dicesides\n*line_break\nThe Pterodactyl rolled ${pterodactyldiceresult}\n*set diceresult +skill\n*set pterodactyldiceresult +pterodactylskill\n*line_break\nYour total: ${diceresult} Pterodactyl total: ${pterodactyldiceresult}\n*if (diceresult > pterodactyldiceresult)\n\t*line_break\n\tYour machete cuts the Pterodactyl\n\t*set pterodactylhp -2\n*if (diceresult \u003c pterodactyldiceresult)\n\t*line_break\n\tThe Pterodactyl pokes you with its beak\n\t*set stamina -2\n*if (diceresult = pterodactyldiceresult)\n\t*line_break\n\tYou swing out of the way\n\t*goto roll_dice_loop2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Pterodactyl has ${pterodactylhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (pterodactylhp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loop2\n\t\n*label set_bullet_damage2\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot2\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set pterodactylhp - bullet_damage\nThe Pterodactyl has ${pterodactylhp} stamina remaining\n*if (pterodactylhp \u003c 1)\n\t*goto win2\n*else\n\t*goto pterodactyl_fight\n\n\t\n*label roll_dice_loopk2\n*temp pterodactyldiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand pterodactyldiceresult 1 dicesides\n*line_break\nThe Pterodactyl rolled ${pterodactyldiceresult}\n*set diceresult +skill\n*set pterodactyldiceresult +pterodactylskill\n*line_break\nYour total: ${diceresult} Pterodactyl total: ${pterodactyldiceresult}\n*if (diceresult > pterodactyldiceresult)\n\t*line_break\n\tYour punch sends the Pterodactyl reeling\n\t*set pterodactylhp -3\n*if (diceresult \u003c pterodactyldiceresult)\n\t*line_break\n\tThe Pterodactyl pokes you with its beak\n\t*set stamina -2\n*if (diceresult = pterodactyldiceresult)\n\t*line_break\n\tYou swing out of the way\n\t*goto roll_dice_loopk2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Pterodactyl has ${pterodactylhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (pterodactylhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk2\n\t\n*label click2\nIt is hard to aim as you swing around on the rope. When you get a clear shot you pull the trigger. The gun clicks.\n\n\"You can test that later,\" shouts Sir Malcolm from above.\n*goto roll_dice_loop2\n\n*label click3\nThe Pterodactyl flaps and pecks. When you get a clear shot you pull the trigger. The gun clicks.\n\n\"You can test that later,\" says Sir Malcolm\n*goto roll_dice_loop3\n\n*label winshot3\nYour bullet hits the Pterodactyl in the eye. \n*goto win3\n\n*label winshot2\nYour bullet hits the Pterodactyl in the eye. \n\n*goto win2\n\n*label win2\n\nIt drops from the sky, fluttering downwards to the river below.\n*if (stamina = max_stamina)\n\t*goto pullbackup\n*elseif (provisions = false)\n\t*goto pullbackup\n*else\n\t*goto choice14\n*label choice14\n\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto pullbackup\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto pullbackup\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto pullbackup\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto pullbackup\n\t\t\n*label pullbackup\nSir Malcolm and Lady Jane pull you back up and you continue on.\n*goto chasm\n\n*label win3\n*if (stamina = max_stamina)\n\t*goto nowayacrosschasm\n*elseif (provisions = false)\n\t*goto nowayacrosschasm\n*else\n\t*goto choice18\n*label choice18\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto nowayacrosschasm\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto nowayacrosschasm\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto nowayacrosschasm\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto nowayacrosschasm\n*label nowayacrosschasm\n\nThere is no way across the chasm.\n*goto pressingon\n\n\n\n*label roll_dice_loop3\n*temp pterodactyldiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand pterodactyldiceresult 1 dicesides\n*line_break\nThe Pterodactyl rolled ${pterodactyldiceresult}\n*set diceresult +skill\n*set pterodactyldiceresult +pterodactylskill\n*line_break\nYour total: ${diceresult} Pterodactyl total: ${pterodactyldiceresult}\n*if (diceresult > pterodactyldiceresult)\n\t*line_break\n\tYou hack at the Pterodactyl\n\t*set pterodactylhp -2\n*if (diceresult \u003c pterodactyldiceresult)\n\t*line_break\n\tThe Pterodactyl strikes with its beak\n\t*set stamina -2\n*if (diceresult = pterodactyldiceresult)\n\t*line_break\n\tYou dodge the striking beak\n\t*goto roll_dice_loop3\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Pterodactyl has ${pterodactylhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (pterodactylhp \u003c 1)\n\t*goto win3\n*else\n\t*goto roll_dice_loop3\n\n*label roll_dice_loopk3\n*temp pterodactyldiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand pterodactyldiceresult 1 dicesides\n*line_break\nThe Pterodactyl rolled ${pterodactyldiceresult}\n*set diceresult +skill\n*set pterodactyldiceresult +pterodactylskill\n*line_break\nYour total: ${diceresult} Pterodactyl total: ${pterodactyldiceresult}\n*if (diceresult > pterodactyldiceresult)\n\t*line_break\n\tYour punch sends the Pterodactyl reeling\n\t*set pterodactylhp -3\n*if (diceresult \u003c pterodactyldiceresult)\n\t*line_break\n\tThe Pterodactyl strikes with its beak\n\t*set stamina -2\n*if (diceresult = pterodactyldiceresult)\n\t*line_break\n\tYou dodge the striking beak\n\t*goto roll_dice_loopk3\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Pterodactyl has ${pterodactylhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (pterodactylhp \u003c 1)\n\t*goto win3\n*else\n\t*goto roll_dice_loopk3\n\n*label set_bullet_damage3\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot3\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set pterodactylhp - bullet_damage\nThe Pterodactyl has ${pterodactylhp} stamina remaining\n*if (pterodactylhp \u003c 1)\n\t*goto win3\n*else\n\t*goto pterodactyl_fight1\n\n\n*label tabletgunno\nYou take aim as a furry face emerges from the rustling undergrowth and the screeching intensifies.\n\nYour gun clicks uselessly.\n\nYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n*page_break The Temple\n*goto_scene temple\n\n\n*label tabletgun\nYou take aim as a furry face emerges from the rustling undergrowth and the screeching intensifies.\n*if (bullets_number > 4)\n\t*goto bulletsfour\n*if (bullets_number = 4)\n\t*goto bulletsnotfour\n*else\t\n\t*goto bulletsnotfour\n\t\n*label bulletsnotfour\n*set bullets_number 0\nMore faces appear from the leaves and a lone monkey runs towards you on all fours, teeth bared. Your shot rings out and it rolls forward, dead at your feet. The faces disappear momentarily but soon reappear in greater numbers. \n\nYou shout back to Lady Jane: \"How much longer do I need to keep this target practice up for?\"\n\n\"Nearly done!\" comes the reply and you resume firing. \n\nAfter a few more lone attackers have been dispatched the horde attacks in one go, an overwhelming onslaught. \n\n*if (male = true)\n\t\"Dammit Jack, I needed more time!\" says Lady Jane.\n*if (female = true)\n\t\"Dammit Jill, I needed more time!\" says Lady Jane.\n\nYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n*page_break The Temple\n*goto_scene temple\n\n\n\t\n*label bulletsfour\n*set bullets_number -4\n*set tablet true\nMore faces appear from the leaves and a lone monkey runs towards you on all fours, teeth bared. Your shot rings out and it rolls forward, dead at your feet. The faces disappear momentarily but soon reappear in greater numbers. \n\nYou shout back to Lady Jane: \"How much longer do I need to keep this target practice up for?\"\n\n\"Nearly done!\" comes the reply and you resume firing. \n\nAfter a few more lone attackers have been dispatched the horde attacks in one go, an overwhelming onslaught. \n\n*set monkeytablet true\n\"Done!\" says Lady Jane, tucking her notebook away just as the wave is on you all.You are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n*goto_scene temple\n\n*label stayandfight\nYou square up to the horde of horrible hominoids but you are overwhelmed instantly. \n\t\t\n*label engulfed\nYou are engulfed in a sea of simians. They hold you aloft and carry you through the jungle then into an area of crumbling stone ruins. You glimpse statues and a tablet of some kind before you are rushed into a temple.\n\t\t\n\"I recognise some of the writing on that tablet!\" shouts Lady Jane.\n*page_break The Temple\n*goto_scene temple\n\t\n\t\n*label claws\nThey are tied to his hands by complex knots. Getting them undone in time is going to be tight.\n*choice\n\t#Test your luck\n\t\t*gosub lucktestgosub\n\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t*set luck -1\n\t\t*choice\n\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t*set claws true\n\t\t\t\tYou untie the knots and prise the claws from the fallen warriors hands. You run across the bridge as fast as you can whilst holding a set of claws in one hand and using the other to steady yourself. The caterwauling from behind reaches deafening levels. Turning your head you can see a swarm of monkeys pouring out from the forest and capering towards the rope bridge, their lips pulled back creating a sea of malicious grins that rushes towards you.\n\t\t\t\t*goto runbridge\n\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\tYou struggle to untie the knots until finally they come loose. Before you can shout in triumph you are engulfed in a sea of simians. They hold you aloft and carry you through the jungle then into an area of crumbling stone ruins. You glimpse statues and a tablet of some kind before you are rushed into a temple.\n\t\t\t\t*page_break The Temple\n\t\t\t\t*goto_scene temple\n", "clifftwo": "*temp bullet_damage 0\n*temp bullet_roll 0\n*temp luckyegg false\n*temp lucktest 0\nTo the East you can faintly see a rope bridge stretched across the chasm.\n*choice\n\t#East\n\t\t*label east\n\t\tYou can see a bridge in the distance. On the other side of the chasm the cliff edge eventually gives way to more jungle. Large birds dive from the opposite cliff face, gliding to the river so far below. The path along the cliff feels almost coastal. \n\t\t\n\t\tDistressed sounds from the jungles edge intensify as you get nearer and Lady Jane disappears into the jungle to investigate, instantly calling for you to help. A monkey has been caught in a trap. It swings helplessly inside a net suspended from a tree branch. Along the branch slithers a bright green snake, working it’s way quickly to the helpless primate. As the ape struggles you see it’s distinctive chest fur and realise it is the same gibbon that threw a banana at you!\n\t\t*choice\n\t\t\t#Help \n\t\t\t\tYou hold the rope with one hand and use your machete in the other to cut through it. You slowly lower the net and struggling gibbon to the ground. On seeing that it’s prey is out of reach the snake disappears into the branches. You untie the net and step back. The gibbon leaps out and runs to the edge of some thick under-brush, where it stops and looks at you. It is again holding a banana, presumably used to lure it into the trap. You salute him and in return he lifts his arm, making a throwing motion. Flinching slightly in anticipation of being hit by a banana again you realise that he was faking it. He stands there with a mouthful of fruit while your companions collapse in fits of laughter.\n\t\t\t\t\n\t\t\t\t*set gibbonfree true\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"That’s the second time he’s made a monkey out of you Jack!\" says Sir Malcolm.\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"That’s the second time he’s made a monkey out of you Jill!\" says Sir Malcolm.\n\t\t\t\t\n\t\t\t\tYou shake your fist at the gibbon in mock anger and he disappears into the jungle, whooping.\n\t\t\t\t\n\t\t\t\t*label refreshing\n\t\t\t\tThere is a refreshing light breeze as you walk along the cliff towards the bridge. Birds wheel and call in the sky and you look down on slight, wispy clouds in the valley below. You near the rope bridge. It is not very wide but it looks sturdy enough, at least what you can see of it does. \n\t\t\t\t\n\t\t\t\tYou open your mouth to speak to your companions but are interrupted. A figure emerges from the trees and stands at the mouth of the bridge. He is lean and muscular, wearing a loincloth and a jaguar mask. In his hands are iron claws, long and sharp. He drops into a fighting stance.\n\t\t\t\t*choice\n\t\t\t\t\t*if (jaguar = true) #Fight\n\t\t\t\t\t\t*goto jaguarfight\n\t\t\t\t\t*if (jaguar = false) #Fight\n\t\t\t\t\t\t*goto nojaguarfight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Don't help\n\t\t\t\tRecognising the gibbon you speak to your companions:\n\t\t\t\t\n\t\t\t\t\"I’ll handle this, can you go back to the path and keep an eye out? I think we were being followed earlier.\"\n\t\t\t\t\n\t\t\t\t*set gibbonfree false\n\t\t\t\tLady Jane and Sir Malcolm look slightly bemused but they do as you say. You make eye contact with the trembling gibbon and rub your hands, relishing sweet revenge. The snake reaches the net and strikes through, sinking it’s fangs into the shrieking gibbon. The gibbon contorts and spasms, sending the net spinning wildly. It soon becomes still, breathing shallowly and then not at all. You salute ironically and return to your companions. \n\t\t\t\t*goto refreshing\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t \n\t\t\t\t \n\t\t\n\t\n\t\t\n\t\t\n*label jaguarfight\nA shadowy form slinks out from the trees. It is the jaguar! They both look ready to spring forward and fight.\nYou must fight the:\n\n[b]Jaguar Warrior and Jaguar[/b]\n\n[b]Skill 10, Stamina 10[/b]\n\n*label jaguar_fight\n*choice\n\t#Fight\n\t\t*goto roll_dice_loop\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0)\n\t\t\t*goto set_bullet_damage\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click\n\t*if (instant_win = true) #Insta Win\n\t\t*goto win\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\"Time for a cat nap\"\n\t\t*goto roll_dice_loopk\n\n*label roll_dice_loop\n*temp jaguarwarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand jaguarwarriordiceresult 1 dicesides\n*line_break\nThe Jaguar Warrior and Jaguar rolled ${jaguarwarriordiceresult}\n*set diceresult +skill\n*set jaguarwarriordiceresult +jaguarwarriorskill\n*line_break\nYour total: ${diceresult} Jaguar Warrior and Jaguar total: ${jaguarwarriordiceresult}\n*if (diceresult > jaguarwarriordiceresult)\n\t*line_break\n\tYou fight as one and hurt the warrior and his beast\n\t*set jaguarwarriorhp -2\n*if (diceresult \u003c jaguarwarriordiceresult)\n\t*line_break\n\tThe warrior and his jaguar claw you \n\t*set stamina -2\n*if (diceresult = jaguarwarriordiceresult)\n\t*line_break\n\tYou circle, looking for an opening\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Jaguar Warrior and Jaguar have ${jaguarwarriorhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (jaguarwarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n\t\n*label roll_dice_loopk\n*temp jaguarwarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand jaguarwarriordiceresult 1 dicesides\n*line_break\nThe Jaguar Warrior and Jaguar rolled ${jaguarwarriordiceresult}\n*set diceresult +skill\n*set jaguarwarriordiceresult +jaguarwarriorskill\n*line_break\nYour total: ${diceresult} Jaguar Warrior and Jaguar total: ${jaguarwarriordiceresult}\n*if (diceresult > jaguarwarriordiceresult)\n\t*line_break\n\tYour punch sends the warrior and his beast flying\n\t*set jaguarwarriorhp -3\n*if (diceresult \u003c jaguarwarriordiceresult)\n\t*line_break\n\tThe warrior and his jaguar claw you \n\t*set stamina -2\n*if (diceresult = jaguarwarriordiceresult)\n\t*line_break\n\tYou circle, looking for an opening\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Jaguar Warrior and Jaguar have ${jaguarwarriorhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (jaguarwarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n\t\n*label nojaguarfight\nYou must fight the:\n\n[b]Jaguar Warrior[/b]\n\n[b]Skill 8, Stamina 8[/b]\n\n*label nojaguar_fight\n*choice\n\t#Fight\n\t\t*goto roll_dice_loop1\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0)\n\t\t\t*goto set_bullet_damage1\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click1\n\t*if (instant_win = true) #Insta Win\n\t\t*goto win1\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\"Time for a cat nap\"\n\t\t*goto roll_dice_loopk1\t\n\t\t\n*label roll_dice_loop1\n*temp jagwarriornojagdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand jagwarriornojagdiceresult 1 dicesides\n*line_break\nThe Jaguar Warrior rolled ${jagwarriornojagdiceresult}\n*set diceresult +skill\n*set jagwarriornojagdiceresult +jagwarriornojagskill\n*line_break\nYour total: ${diceresult} Jaguar Warrior total: ${jagwarriornojagdiceresult}\n*if (diceresult > jagwarriornojagdiceresult)\n\t*line_break\n\tYou fight as one and hurt the warrior\n\t*set jagwarriornojaghp -2\n*if (diceresult \u003c jagwarriornojagdiceresult)\n\t*line_break\n\tThe warrior claws you\n\t*set stamina -2\n*if (diceresult = jagwarriornojagdiceresult)\n\t*line_break\n\tYou circle, looking for an opening\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Jaguar Warrior has ${jagwarriornojaghp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (jagwarriornojaghp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\t\n*label roll_dice_loopk1\n*temp jagwarriornojagdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand jagwarriornojagdiceresult 1 dicesides\n*line_break\nThe Jaguar Warrior rolled ${jagwarriornojagdiceresult}\n*set diceresult +skill\n*set jagwarriornojagdiceresult +jagwarriornojagskill\n*line_break\nYour total: ${diceresult} Jaguar Warrior total: ${jagwarriornojagdiceresult}\n*if (diceresult > jagwarriornojagdiceresult)\n\t*line_break\n\tYour punch sends the warrior flying\n\t*set jagwarriornojaghp -3\n*if (diceresult \u003c jagwarriornojagdiceresult)\n\t*line_break\n\tThe warrior claws you\n\t*set stamina -2\n*if (diceresult = jagwarriornojagdiceresult)\n\t*line_break\n\tYou circle, looking for an opening\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Jaguar Warrior has ${jagwarriornojaghp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (jagwarriornojaghp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\n*label winshot\nYou aim at the warrior and pull the trigger. The bullet drills through his mask and leaves a perfect hole right between the eyes.\n*goto win\n\t\n*label winshot1\nYou aim at the warrior and pull the trigger. The bullet drills through his mask and leaves a perfect hole right between the eyes.\n*goto win1\n\t\n*label click\nYou aim at the warrior and pull the trigger. The gun clicks.\n\nThe warrior beckons you on with his claws.\n*goto roll_dice_loop\n\n*label click1\nYou aim at the warrior and pull the trigger. The gun clicks.\n\nThe warrior beckons you on with his claws.\n*goto roll_dice_loop1\n\n*label win1\n\nThe warrior falls and lies still on the ground. \n*if (stamina = max_stamina)\n\t*goto bridge\n*elseif (provisions = false)\n\t*goto bridge\n*else\n\t*goto choice10\n*label choice10\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto bridge\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto bridge\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto bridge\n\t*if (provisions = false) #Investigate the bridge\n\t\t*goto bridge\n\n\n*label win\n\nThe warrior falls and lies still on the ground. \n\nThe jaguar sniffs the body and then bounds away into the jungle.\n*if (stamina = max_stamina)\n\t*goto bridge\n*elseif (provisions = false)\n\t*goto bridge\n*else\n\t*goto choice11\n*label choice11\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto bridge\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto bridge\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto bridge\n\t*if (provisions = false) #Investigate the bridge\n\t\t*goto bridge\n\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set jaguarwarriorhp - bullet_damage\nThe Jaguar Warrior and Jaguar have ${jaguarwarriorhp} stamina remaining\n*if (jaguarwarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto jaguar_fight\n\n\n\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set jagwarriornojaghp - bullet_damage\nThe Jaguar Warrior has ${jagwarriornojaghp} stamina remaining\n*if (jagwarriornojaghp \u003c 1)\n\t*goto win1\n*else\n\t*goto nojaguar_fight\n\n*label bridge\nBefore you can turn your attention once again to the bridge the jungle erupts with the sounds of whooping and gibbering. It is unmistakably the sound of monkeys but you have never heard it on this scale before. The jungle behind you rustles violently as the monkey horde rapidly approaches.\n*choice\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0)\n\t\t\t*goto monkeygun\n\t\t*if (bullets_number = 0)\n\t\t\t*goto monkeyclick\n\t\t*else\n\t\t\t*goto bridge\n\t#Run across the bridge\n\t\t*goto runbridge\n\t#Stay and fight\n\t\t*label stayandfight\n\t\tYou square up to the horde of horrible hominoids but you are overwhelmed instantly. \n\t\t\n\t\t*label engulfed\n\t\tYou are engulfed in a sea of simians. They hold you aloft and carry you through the jungle then into an area of crumbling stone ruins. You glimpse statues and a tablet of some kind before you are rushed into a temple.\n\t\t\n\t\t\"I recognise some of the writing on that tablet!\" shouts Lady Jane.\n\t\t\n\t\t*goto_scene temple\n\t#Take the warriors claws\n\t\t*goto claws\n\t\n*label monkeyclick\nYou aim into the jungle and pull the trigger. The gun clicks, barely audible over the noise.\n\n*if (male = true)\n\t\"This isn't a great time to be checking that Jack,\" says Sir Malcolm.\n*if (female = true)\n\t\"This isn't a great time to be checking that Jill,\" says Sir Malcolm.\n*choice\n\t#Take the warriors claws\n\t\t*goto claws\n\t#Stay and fight\n\t\t*goto stayandfight\n\t#Run across the bridge\n\t\t*label runbridge\n\t\tYou run across the wildly swaying bridge as fast as you can. The caterwauling from behind reaches deafening levels. Turning your head you can see a swarm of monkeys pouring out from the forest and capering towards the rope bridge, their lips pulled back creating a sea of malicious grins that rushes towards you. With much relief you reach the other side.\n\t\t*choice\n\t\t\t#Carry on running\n\t\t\t\tThe aggressive anthropoids are far too quick. They scamper effortlessly along the bridge and reach you with ease.\n\t\t\t\t*goto engulfed\n\t\t\t\t\n\t\t\t\t\n\t\t\t#Hack the ropes\n\t\t\t\tYou all hack desperately at the ropes as the sea of steaming simians pours towards you. With an almighty twang the first of the ropes gives way. The bridge topples to one side and hordes of angry apes are flung off spinning into the void. The other rope follows a second later and the bridge falls away taking the manic monkeys with it. Breathlessly you look at the two wooden support pillars, all that remain of the bridge and your only way back. \n\t\t\t\t*choice\n\t\t\t\t\t#Left\n\t\t\t\t\t\tThe height of the cliff is quite dizzying and way below you can see the winding blue thread of the river running beneath. Screeching bird-call is carried on the gentle cooling wind.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"This reminds me somewhat of Beachy Head,\" says Lady Jane\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I agree,\" says Sir Malcolm. \"I wish I had packed a deck chair, but I think it might be harder to get an ice cream here!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tUp ahead there is a bird swooping down into the river and returning to what must be it’s nest on the cliff face. As you get closer you can see that it is significantly bigger than any of the other birds. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Investigate\n\t\t\t\t\t\t\t\tYou cautiously get closer and lie in the grass that grows on the edge of the cliff path. As the creature flies back to return to it’s nest on the cliff face you are able to get a closer look. It is not feathered at all! Instead it has scaly greenish skin like a reptile, stretched taut over an enormous wingspan of at least thirty five feet. A cruel triangular beak is mirrored by a bony growth extending out of the back of it’s head. It’s sharp eyes dart around keenly. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (triceratops = false)\n\t\t\t\t\t\t\t\t\t*goto incredible\n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t*goto seenit\n\t\t\t\t\t\t\t\t*label incredible\n\t\t\t\t\t\t\t\t\"Incredible!\" whispers Lady Jane. \"This shouldn’t be! I think we are looking at a pterodactyl just as described in the findings of Professor Marsh!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Can we have that in English please?\" whispers Sir Malcolm.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tLady Jane purses her lips and then answers very quietly. \"The last time these were on the planet was… sixty five million years ago.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Give or take a million years,\" replies Sir Malcolm and Lady Jane sighs.\n\t\t\t\t\t\t\t\t*goto pterodactyl\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label seenit\n\t\t\t\t\t\t\t\t\"More dinosaurs!\" gasps Lady Jane. \"This is a pterodactyl, a flying reptile!\"\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto pterodactyl\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label pterodactyl\n\t\t\t\t\t\t\t\tThe pterodactyl swoops down again into the clouds below and you can see it’s nest. A large white egg sits in the middle. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Get the egg\n\t\t\t\t\t\t\t\t\t\tYou tie a rope around your waist and start to descend the cliff face. Sir Malcolm and Lady Jane feed you the rope. Soon you are right beside the nest and within reaching distance of the egg.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set luckyegg true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou grab the egg and carefully put it in your backpack. It is even heavier than you anticipated. Your companions help pull you safely back up to the path. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Amazing!\" says Lady Jane\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"I agree,\" says Sir Malcolm. \"You could make the world’s biggest omelette with that thing!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto chasm\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour attempts to steal her egg have been spotted by the pterodactyl. She swoops down towards you just as you have it in your hands. The sudden attack makes you drop it and the egg falls away into the distance. The furious pterodactyl attacks as you swing precariously on the rope held by Sir Malcolm and Lady Jane.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou must fight the\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t[b]Pterodactyl[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t[b]Skill 6, Stamina 8[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label pterodactyl_fight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loop2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto set_bullet_damage2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto click2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto win2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Let's finish this\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loopk2\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#Leave it and continue\n\t\t\t\t\t\t\t\t\t\t*label chasm\n\t\t\t\t\t\t\t\t\t\tAfter a while the path ends at a huge chasm. The cliff continues along as far as the eye can see on the other side but there is no way across. The path turns here into the jungle.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Go into the jungle\n\t\t\t\t\t\t\t\t\t\t\t\t*goto pressingon\n\t\t\t\t\t\t\t\t\t\t\t*if (luckyegg = true) #Investigate chasm\n\t\t\t\t\t\t\t\t\t\t\t\tAs you ponder the mysteries of the chasm your thoughts are interrupted by a furious screeching from above. The pterodactyl mother swoops down. \n\t\t\t\t\t\t\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t[b]Pterodactyl[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t[b]Skill 6, Stamina 8[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*label pterodactyl_fight1\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loop3\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto set_bullet_damage3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto click3\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto win3\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Let's finish this\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loopk3\n\t\t\t\t\t\t\t\t\t\t\t*if (luckyegg = false) #Investigate chasm\n\t\t\t\t\t\t\t\t\t\t\t\tYou study the chasm more deeply.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Eventually Sir Malcolm speaks \"Looks like a chasm Jack.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Eventually Sir Malcolm speaks \"Looks like a chasm Jill.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"No way across,\" says Lady Jane.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"Yes, sorry was lost in thought then. Back to the jungle we go!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*label pressingon\n\t\t\t\t\t\t\t\t\t\t\t\tPressing on through the jungle is hard work. Little light is getting through the thick foliage and the vines are staring to resemble steel cables. Up ahead there seems to be more light and with a final effort you break through the dense green. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tA large clearing gives you welcome relief from the cramped jungle and your eyes adjust to the sudden brightness. A ruined stone temple is ahead. Steps lead upwards to the interior and are flanked either side by stone guardians. The statue on the right has fallen over and is unrecognisable rubble, the statue on the left is of a four armed female figure wearing a necklace. The statue’s head is missing, having been broken off at the neck. Ivy and other creepers almost cover the temple. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tA large stone tablet that is at least seven foot tall stands in the grounds, covered with green. Text has been carved into the stone, partially visible under the foliage.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"This tablet looks important Jack,\" says Lady Jane, opening her notebook.\n\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"This tablet looks important Jill,\" says Lady Jane, opening her notebook.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"I'd like to get away from those monkeys as soon as possible,\" says Sir Malcolm.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Enter the temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Examine the tablet\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set tablet true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs you remove the foliage from the stone you can see carving underneath. An alphabet of characters is revealed in a long paragraph of text. Below that inscription is another paragraph in a completely different script.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Goodness me,\" says Lady Jane. \"This bottom part here is ancient Sumerian. It seems like a translation of the text above, but that is nothing I have ever seen before. I must take notes.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs Lady Jane starts her translation a ghastly whooping starts from the jungle.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tSir Malcolm shrugs his shoulders and sighs. \"Here we go again, more bloody monkeys.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Gentlemen you have to give me time,\" says Lady Jane.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (kerosene = true) #Use kerosene\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou circle wide around the stone tablet pouring fuel as quickly as you can. Meanwhile the whooping has become almost deafening. As the last drops of fuel complete your perimeter countless monkeys pour from the surrounding jungle. Standing back you flick a lit match onto the ground and a wall of flame leaps into the air. You can see the apes shimmering on the other side, gibbering and capering agitatedly.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou cough politely: \"Lady Jane, if I may please inquire as to the possibility of an early cessation of your dialect transcription? Only the natives are getting restless.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Nearly done,\" she replies.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAround you, the flames grow noticeably less bright and the monkeys get closer, reaching forward in anticipation.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Done!\" says lady Jane, tucking her notebook away. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith that the flames flicker and die.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set monkeytablet true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (dynamite = true) #Use dynamite\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAmidst deafening whooping you light the fuse and throw the dynamite into the jungle. There is an enormous boom followed by a ringing in your ears. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tApes quickly start to appear again from the edge of the jungle. You light another match and hold it up reaching into your backpack as if to get more dynamite.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOn seeing this they retreat. It is only after a few repeats that the ruse no longer works. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Done!\" says lady Jane, tucking her notebook away. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set monkeytablet true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto tabletgun\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto tabletgunno\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Fight them off\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou and Sir Malcolm square up to the oncoming horde.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tTurning to Lady Jane you say: \"We will hold them off as long as we can.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShe nods and turns back to the stone, pencil and notebook in hand. You and Sir Malcolm are instantly overrun.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Well we look like a right couple of Cnuts now!\" shouts Sir Malcolm.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Go around\n\t\t\t\t\t\t\t\t*goto chasm\n\t\t\t\t\t\t\n\t\t\t\t\t#Right\n\t\t\t\t\t\tThe sheer white cliff face goes on and on, the river running through the valley below is just visible and occasionally obscured by clouds. The sensation of looking down onto clouds is quite odd. As you follow the path you can see up ahead an outcropping in the face of the cliff. There is a naturally formed ledge that leads into an opening on the cliff face. The path continues into the jungle.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Investigate\n\t\t\t\t\t\t\t\tYou tie a rope around yourself and your partners lower you to the ledge. You crouch down to get into the opening. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tInside is a small cave, little bigger than a drawing room. Slumped against the wall on the right is a skeleton. It is covered in cobwebs and scraps of indistinguishable cloth. It’s right hand is clenched around an old fashioned flintlock pistol. The grinning skull is looking right at you, a small hole in the temple makes it easy to piece together the rest. The rest of the cave is draped in dust and cobwebs. Large spiders crawl about in the recesses. You can feel a tugging on your waist. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tReturning to the ledge you look up and can’t believe your eyes. Sir Malcolm and Lady Jane are fighting a giant bird of some kind. It is huge with reptilian skin and a long triangular beak. It swoops down on them mercilessly and there is nothing you can do to help!\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\t\tThe terrible flying lizard swoops and harasses your companions until it is soon joined by another. To your surprise and relief they begin to fight over their prey, raking and biting at each other in mid air. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tWhile they are distracted Sir Malcolm and Lady Jane hurriedly haul you to safety and you escape into the jungle while you can.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto pressingon\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\t\tYou watch helplessly as your companions lose their fight with the terrible flying lizard. It swoops down onto their bodies and picks one up in each claw. As it flies away you feel the rope around you tighten and you are lifted off your feet and up into the air. You swing around vertiginously until exhausted by the extra weight the pterodactyl drops you and Sir Malcolm into the void. You are mercifully unconscious by the time you hit the river so far below.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Carry on into the jungle\n\t\t\t\t\t\t\t\t*goto pressingon\n\t\t\t\t\t#Ahead\n\t\t\t\t\t\t*goto pressingon\t\t\n\n\t\n*label monkeygun\n*set bullets_number -1\nYou fire a shot into the jungle and for a very brief moment there is silence. Then the horde starts up again, louder than ever.\n*choice\n\t#Run across the bridge\n\t\t*goto runbridge\n\t#Stay and fight\n\t\t*goto stayandfight\n\t#Take the warriors claws\n\t\t*goto claws\n\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\t\n\n\n*label roll_dice_loop2\n*temp pterodactyldiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand pterodactyldiceresult 1 dicesides\n*line_break\nThe Pterodactyl rolled ${pterodactyldiceresult}\n*set diceresult +skill\n*set pterodactyldiceresult +pterodactylskill\n*line_break\nYour total: ${diceresult} Pterodactyl total: ${pterodactyldiceresult}\n*if (diceresult > pterodactyldiceresult)\n\t*line_break\n\tYour machete cuts the Pterodactyl\n\t*set pterodactylhp -2\n*if (diceresult \u003c pterodactyldiceresult)\n\t*line_break\n\tThe Pterodactyl pokes you with its beak\n\t*set stamina -2\n*if (diceresult = pterodactyldiceresult)\n\t*line_break\n\tYou swing out of the way\n\t*goto roll_dice_loop2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Pterodactyl has ${pterodactylhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (pterodactylhp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loop2\n\t\n*label set_bullet_damage2\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot2\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set pterodactylhp - bullet_damage\nThe Pterodactyl has ${pterodactylhp} stamina remaining\n*if (pterodactylhp \u003c 1)\n\t*goto win2\n*else\n\t*goto pterodactyl_fight\n\n\t\n*label roll_dice_loopk2\n*temp pterodactyldiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand pterodactyldiceresult 1 dicesides\n*line_break\nThe Pterodactyl rolled ${pterodactyldiceresult}\n*set diceresult +skill\n*set pterodactyldiceresult +pterodactylskill\n*line_break\nYour total: ${diceresult} Pterodactyl total: ${pterodactyldiceresult}\n*if (diceresult > pterodactyldiceresult)\n\t*line_break\n\tYour punch sends the Pterodactyl reeling\n\t*set pterodactylhp -3\n*if (diceresult \u003c pterodactyldiceresult)\n\t*line_break\n\tThe Pterodactyl pokes you with its beak\n\t*set stamina -2\n*if (diceresult = pterodactyldiceresult)\n\t*line_break\n\tYou swing out of the way\n\t*goto roll_dice_loopk2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Pterodactyl has ${pterodactylhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (pterodactylhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk2\n\t\n*label click2\nIt is hard to aim as you swing around on the rope. When you get a clear shot you pull the trigger. The gun clicks.\n\n\"You can test that later,\" shouts Sir Malcolm from above.\n*goto roll_dice_loop2\n\n*label click3\nThe Pterodactyl flaps and pecks. When you get a clear shot you pull the trigger. The gun clicks.\n\n\"You can test that later,\" says Sir Malcolm.\n*goto roll_dice_loop3\n\n*label winshot3\nYour bullet hits the Pterodactyl in the eye. \n*goto win3\n\n*label winshot2\nYour bullet hits the Pterodactyl in the eye. \n\n*goto win2\n\n*label win2\nIt drops from the sky, fluttering downwards to the river below.\n*if (stamina = max_stamina)\n\t*goto pullbackup\n*elseif (provisions = false)\n\t*goto pullbackup\n*else\n\t*goto choice14\n*label choice14\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto pullbackup\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto pullbackup\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto pullbackup\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto pullbackup\n\t\t\n*label pullbackup\nSir Malcolm and Lady Jane pull you back up and you continue on.\n*goto chasm\n\n*label win3\n*if (stamina = max_stamina)\n\t*goto nowayacrosschasm\n*elseif (provisions = false)\n\t*goto nowayacrosschasm\n*else\n\t*goto choice18\n*label choice18\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto nowayacrosschasm\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto nowayacrosschasm\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto nowayacrosschasm\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto nowayacrosschasm\n*label nowayacrosschasm\nThere is no way across the chasm.\n*goto pressingon\n\n\n\n*label roll_dice_loop3\n*temp pterodactyldiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand pterodactyldiceresult 1 dicesides\n*line_break\nThe Pterodactyl rolled ${pterodactyldiceresult}\n*set diceresult +skill\n*set pterodactyldiceresult +pterodactylskill\n*line_break\nYour total: ${diceresult} Pterodactyl total: ${pterodactyldiceresult}\n*if (diceresult > pterodactyldiceresult)\n\t*line_break\n\tYou hack at the Pterodactyl\n\t*set pterodactylhp -2\n*if (diceresult \u003c pterodactyldiceresult)\n\t*line_break\n\tThe Pterodactyl strikes with its beak\n\t*set stamina -2\n*if (diceresult = pterodactyldiceresult)\n\t*line_break\n\tYou dodge the striking beak\n\t*goto roll_dice_loop3\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Pterodactyl has ${pterodactylhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (pterodactylhp \u003c 1)\n\t*goto win3\n*else\n\t*goto roll_dice_loop3\n\n*label roll_dice_loopk3\n*temp pterodactyldiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand pterodactyldiceresult 1 dicesides\n*line_break\nThe Pterodactyl rolled ${pterodactyldiceresult}\n*set diceresult +skill\n*set pterodactyldiceresult +pterodactylskill\n*line_break\nYour total: ${diceresult} Pterodactyl total: ${pterodactyldiceresult}\n*if (diceresult > pterodactyldiceresult)\n\t*line_break\n\tYour punch sends the Pterodactyl reeling\n\t*set pterodactylhp -3\n*if (diceresult \u003c pterodactyldiceresult)\n\t*line_break\n\tThe Pterodactyl strikes with its beak\n\t*set stamina -2\n*if (diceresult = pterodactyldiceresult)\n\t*line_break\n\tYou dodge the striking beak\n\t*goto roll_dice_loopk3\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Pterodactyl has ${pterodactylhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (pterodactylhp \u003c 1)\n\t*goto win3\n*else\n\t*goto roll_dice_loopk3\n\n*label set_bullet_damage3\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot3\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set pterodactylhp - bullet_damage\nThe Pterodactyl has ${pterodactylhp} stamina remaining\n*if (pterodactylhp \u003c 1)\n\t*goto win3\n*else\n\t*goto pterodactyl_fight1\n\n\n*label tabletgunno\nYou take aim as a furry face emerges from the rustling undergrowth and the screeching intensifies.\n\nYour gun clicks uselessly.\n\nYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n*goto_scene temple\n\n\n*label tabletgun\nYou take aim as a furry face emerges from the rustling undergrowth and the screeching intensifies.\n*if (bullets_number > 4)\n\t*goto bulletsfour\n*if (bullets_number = 4)\n\t*goto bulletsnotfour\n*else\t\n\t*goto bulletsnotfour\n\t\n*label bulletsnotfour\n*set bullets_number 0\nMore faces appear from the leaves and a lone monkey runs towards you on all fours, teeth bared. Your shot rings out and it rolls forward, dead at your feet. The faces disappear momentarily but soon reappear in greater numbers. \n\nYou shout back to Lady Jane: \"How much longer do I need to keep this target practice up for?\"\n\n\"Nearly done!\" comes the reply and you resume firing. \n\nAfter a few more lone attackers have been dispatched the horde attacks in one go, an overwhelming onslaught. \n\n*if (male = true)\n\t\"Dammit Jack, I needed more time!\" says Lady Jane.\n*if (female = true)\n\t\"Dammit Jill, I needed more time!\" says Lady Jane.\n\nYou are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n*goto_scene temple\n\n\n\t\n*label bulletsfour\n*set bullets_number -4\n*set tablet true\nMore faces appear from the leaves and a lone monkey runs towards you on all fours, teeth bared. Your shot rings out and it rolls forward, dead at your feet. The faces disappear momentarily but soon reappear in greater numbers. \n\nYou shout back to Lady Jane:\"How much longer do I need to keep this target practice up for?\"\n\n\"Nearly done!\" comes the reply and you resume firing. \n\nAfter a few more lone attackers have been dispatched the horde attacks in one go, an overwhelming onslaught. \n\n*set monkeytablet true\n\"Done!\" says Lady Jane, tucking her notebook away just as the wave is on you all.You are engulfed in a sea of simians. They hold you aloft and carry you into the temple.\n*goto_scene temple\n\n*label claws\nThey are tied to his hands by complex knots. Getting them undone in time is going to be tight.\n*choice\n\t#Test your luck\n\t\t*gosub lucktestgosub\n\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t*set luck -1\n\t\t*choice\n\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t*set claws true\n\t\t\t\tYou untie the knots and prise the claws from the fallen warriors hands. You run across the bridge as fast as you can whilst holding a set of claws in one hand and using the other to steady yourself. The caterwauling from behind reaches deafening levels. Turning your head you can see a swarm of monkeys pouring out from the forest and capering towards the rope bridge, their lips pulled back creating a sea of malicious grins that rushes towards you.\n\t\t\t\t*goto runbridge\n\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\tYou struggle to untie the knots until finally they come loose. Before you can shout in triumph you are engulfed in a sea of simians. They hold you aloft and carry you through the jungle then into an area of crumbling stone ruins. You glimpse statues and a tablet of some kind before you are rushed into a temple.\n\t\t\t\t*goto_scene temple\n\t\n", "club2": "*image cover.jpg\n*temp snuck_stairs 0\n*temp safaris false\n*temp threemen 0\n*temp sirmalcolmw 0\n*temp ladyjane 0\n*temp lucktest 0\nFog swirls in the darkness outside the windows of your carriage as it hurtles along the cobbled streets of London. Gas lamps provide an occasional spotlight for its lonely dance, bringing to mind ghostly ballerinas before the increasingly spirited ride jolts you from your poetic line of thought.\nA “whoa there” from the driver is accompanied by a lurching stop. \n*if (male = true)\n\tYou adjust your tie and tailcoat as the carriage door opens. A quick check of your pocket watch tells you it is a few minutes to Eight.\n*if (male = false)\n\tYou adjust your bodice as the carriage door opens. A quick check of your pocket watch tells you it is a few minutes to Eight.\n\n*if (male = true) \n\t\"I told you I would get you here on time Sir.\"\n\t*goto thatyoudid\n*else \n\t\"I told you I would get you here on time Ma'am.\"\n\t*goto thatyoudid\n\n*label thatyoudid\n\n\"That you did driver, that you did. Here’s the sixpence I owe you.\"\n\n*if (male = true)\n\tHe winks as you pass the coin into his hand. Lightly touching the brim of his top hat he bids you farewell and his carriage slowly draws away. Adjusting your cuffs you take in the scene.\n\t*goto adoorman\n*else\n\tHe bows slightly as you pass the coin into his hand. Lightly touching the brim of his top hat he bids you farewell and his carriage slowly draws away. Removing your gloves you take in the scene.\n\t*goto adoorman\n\n*label adoorman\nA doorman stands in front of a heavy black door with an ornate brass lion knocker. \n\nA sign above the door in fading gold lettering reads \"The Anglo Indian Adventurers Club\". \n\nA newspaper board nearby bears the headline \"Egyptian death mask stolen!\"\n*choice\n\t#Enter Club \n\t\t*label bill\n\t\t*image door.jpg\n\t\tYou greet the doorman.\n\t\t\n\t\t\"Good Evening Bill, looking well!\"\n\t\t\n\t\t*if (male = true)\n\t\t\t\"Mr Sinclair, Good Evening, just in time for the talk.\"\n\t\t\t*goto whatsnew\n\t\t*else\n\t\t\t\"Ms Sinclair, Good Evening, just in time for the talk.\"\n\t\t\t*goto whatsnew\n\t\t*label whatsnew\n\t\t\n\t\t\"What's new?\"\n\t\t\n\t\t\"Well, apart from Smyth-Fortesque back from the Himalayas, there is still a lot of talk about missing artefacts.\"\t\n\t\t\n\t\tThe doorman pulls open the heavy door for you and you step inside the Adventurers Club. A plush red carpet runs the length of the corridor to some closed double doors at the end. To your left is a staircase. Portraits of adventurers past line the wall to upstairs. They stare out from their frames as if they are not used to being constrained. A small sign shows that upstairs is the Adventurer Museum and Shop and downstairs is for Staff Only. A plush rope blocks the way, a closed sign hanging off of it. \n\t\t\n\t\tIt reads \"Museum and Shop closed until after tonight's lecture.\"\n\t\t\n\t\tTo your right is a door marked \"Bar.\" Laughter, loud voices and cigar smoke fight to escape. A handwritten note is pinned to a noticeboard: \n\t\t\n\t\t\"We remind all members that due to the international nature of the Adventurers Club only gold coins are acceptable currency whilst conducting business on the premises.\"\n\t\t\n\t\tIn the corridor three formally dressed gentlemen are engrossed in conversation. \n\t\t\n\t\tStanding alone to one side is a man dressed as if in the middle of a safari, making a stark contrast to the formal setting. He looks like someone who is used to being alone and happier for it.\n\t\t*choice\n\t\t\t#Enter Bar\n\t\t\t\t*label bar\n\t\t\t\tEntering the bar of the adventurers club is an assault on the senses. It is more chaotic than any Turkish souk you have ever visited, noisier than an Arabian cattle auction and full of more colourful characters than the most louche after-dinner club in Dresden. In trying to take it all in you wonder why travel at all when there is so much to see and so many stories to hear right here in London!\n\t\t\t\t\n\t\t\t\tA bar runs down the left hand side of the room and a barman in a blue waistcoat and red bow tie is doing a good job of keeping up with the clamouring demand, sliding frothy pints along the bar-top. Various groups of colourful people are talking among themselves, some sitting at tables and some standing.\n\n\t\t\t\tOn the far right hand side of the room a boxing ring has drawn a large crowd and to your immediate right a game of cards has also drawn in a number of interested onlookers. A small but animated group are throwing dice against the wall near the far end of the bar. A cloud of cigar smoke hovers over the room like a nicotine rain cloud.\n\t\t\t\t*choice \n\t\t\t\t\t#Boxing\t\t\t\t\n\t\t\t\t\t\t*set boxing true\n\t\t\t\t\t\tYou make your way into the throng gathered around the ring. In the left corner stands the heavily muscled frame of a man you recognise as Sir Malcolm Penrose. His military bearing comes across clearly and his bald head, six foot and two inch frame and immaculate handlebar moustache make him very easy to spot whatever the situation.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou have arrived just as his last opponent is being carried out of the ring. Their head lolls about as they are carried through the parting crowd with their arms over the shoulders of two companions. Sir Malcolm bangs his gloves together encouragingly.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"OK lads, don’t be scared, there’s plenty more where that came from! Come and have a go there’s my good boys, I’ve not even started yet!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt seems Sir Malcolm has possibly missed his calling as a carny showman. A roar of encouragement erupts from the crowd and out of the commotion steps a man mountain. A great beast of a man with a barrel chest and arms like steam pistons is striding towards the ring, taking off his top as he goes with surprisingly deft fingers considering he has fists like giant hams. You glance at Sir Malcolm and his eyes are twinkling excitedly.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Take your bets, place your bets.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Just Watch\t\n\t\t\t\t\t\t\t\t*goto jwb1\n\t\t\t\t\t\t\t\t*label mabb1\n\t\t\t\t\t\t\t\tYou navigate your way through the jostling crowd to the bookie who is laying off bets thick and fast. On a board are the odds written in chalk. \n\t\t\t\t\t\t\t\t*line_break \n\t\t\t\t\t\t\t\tSir Malcolm is two to one and the maximum bet is 5 gold coins.\n\t\t\t\t\t\t\t\t*line_break \n\t\t\t\t\t\t\t\tThe Sasquatch is evens and the maximum bet is 10 gold coins.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Bet Sir Malcolm\n\t\t\t\t\t\t\t\t\t\t*label boxbeta\n\t\t\t\t\t\t\t\t\t\t*temp goldbet 0\n\t\t\t\t\t\t\t\t\t\t*input_number goldbet 1 5\n\t\t\t\t\t\t\t\t\t\t*set gold - goldbet\n\t\t\t\t\t\t\t\t\t\tThe bookie hands you a slip, your bet of ${goldbet} coins is scrawled on it. As you fight your way back to the ring you see the bookie shaking his head and smiling from the corner of your eye.\n\t\t\t\t\t\t\t\t\t\t*set sirmalcolmw + 1\n\t\t\t\t\t\t\t\t\t\t*set gold + (2*goldbet)\n\t\t\t\t\t\t\t\t\t\t*set gold + (goldbet)\n\t\t\t\t\t\t\t\t\t\t*goto malcolms\n\t\t\t\t\t\t\t\t\t#Bet Sasquatch\n\t\t\t\t\t\t\t\t\t\t*label boxbetb\n\t\t\t\t\t\t\t\t\t\t*temp goldbet 0\n\t\t\t\t\t\t\t\t\t\t*input_number goldbet 1 10\n\t\t\t\t\t\t\t\t\t\t*set gold - goldbet\n\t\t\t\t\t\t\t\t\t\tThe bookie hands you a slip, your bet of ${goldbet} coins is scrawled on it. You fight your way back to the ring. \n\t\t\t\t\t\t\t\t\t\t*goto malcolms\n\t\t\t\t\t\t\t#Make a bet\n\t\t\t\t\t\t\t\t*goto mabb1\n\t\t\t\t\t\t\t\t*label jwb1\n\t\t\t\t\t\t\t\tSir Malcolm stands eagerly in his corner and the behemoth clambers the ropes and deposits himself in the other. The ring looks smaller with him in it. As a second helps him with gloves, the MC announces:\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Ladies and gentlemen, in the left corner Malcolm Puuuuuuuugilisst Penrose. In the right corner …\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Stevens. John Stevens,\" grunts the missing link.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t“In the right corner, John the Sasssquatch Stevens!”\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe bell rings and the fight begins. Stevens lumbers towards Sir Malcolm and throws a great looping right hand. Sir Malcolm deftly ducks under the slow swinging sledgehammer and plants two straight left jabs onto the giant’s chin, rocking him back. A right cross finishes him and he collapses onto the floor of the ring just as if he had fallen from the top of a beanstalk. The crowd erupts, non-winning tickets thrown into the air create a brief ticker tape parade and Sir Malcolm strides confidently back to his corner.\n\t\t\t\t\t\t\t\t*goto mcspeak\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label mcspeak\n\t\t\t\t\t\t\t\tThe mc is speaking again:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Ladies and gentlemen, we have another contender!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tFrom out of the crowd steps a tiny figure. After a few words with the flustered cornerman they stand ready. All they have done is remove their topcoat, no boxing gloves and still wearing their formal shirt! The crowd are going wild and once again the bookie is drowning in bets.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Ladies and gentlemen, introducing David versus Goliath, Sir Malcolm vs Lady Jannnnne Joseph!\"\t\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Just watch\n\t\t\t\t\t\t\t\t\t\tThe bell rings and Sir Malcolm strides from his corner. He touches gloves with Lady Jane but looks deeply uncomfortable at the prospect of striking a woman. Lady Jane stands calmly. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tSir Malcolm makes a very gentle left jab towards his opponent but she can see it will not connect and does not move. He strikes again with more accuracy but no power, this time his blow is palmed away as if it were an annoying fly at a picnic. The crowd are silent, not knowing what to make of this spectacle. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou notice an East Asian gentlemen in the crowd staring on impassively, he is wearing a dark blazer that has a yellow pattern of some kind decorating it.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tSir Malcolm smiles and relaxes slightly. He tries a gentle hook. As soon as Sir Malcolm has dropped his shoulder to throw the punch Lady Jane lunges forward with both arms. The punch is stopped by her left arm and with her right she administers a punishing blow to Sir Malcolm’s midriff. He winces noticeably despite his best efforts not to show it.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe crowd start to get excited.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tSir Malcolm gathers himself and starts to take things seriously. He tries again with a jab, this time there is some feeling in it. Lady Jane counters the blow and with a deft flick Sir Malcolm is flying through the air and is swiftly flat on his back in the ring! The noise in the bar is deafening and all attention is now on the two fighters in the ring. Groggily Sir Malcolm gets to his feet. A lightning fast two fingered jab from his opponent catches him in the right shoulder. Another jab, this time to the left shoulder and now both his arms hang uselessly! He is powerless to defend himself as he is on the receiving end of a spinning move that sends him once again to the canvas! The referee does a ten count but the crowd are so loud it is inaudible.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe referees waving hands confirm that Sir Malcolm won’t be getting up in time. Lady Jane bends down to Sir Malcolm and with some mysterious taps movement is returned to him. The fight is over. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tShe helps him up and Sir Malcolm takes her hand and raises it. Lady Jane is the victor! With a bow to her opponent and the crowd, the mysterious Lady Jane returns to her corner to deafening applause and another snowstorm of tickets. You glance at Sir Malcolm. He doesn’t look defeated, he looks positively energised.\n\t\t\t\t\t\t\t\t\t\t*goto gong\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*label gong\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tA gong sounds and the bar door is opened. Bill the doorman from outside stands in the doorway.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Adventurers, please make your way to the auditorium as tonight's lecture is about to commence.\"\n\t\t\t\t\t\t\t\t\t\t*page_break Attend Lecture\n\t\t\t\t\t\t\t\t\t\t*goto lecture\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#Make a bet\n\t\t\t\t\t\t\t\t\t\tYou make your way through the boisterous adventurers to the bookie.The odds on the board are Lady Jane at two to one and the maximum bet is 5 gold pieces. Sir Malcolm is evens and the maximum bet is 10 gold coins.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Bet Lady Jane\n\t\t\t\t\t\t\t\t\t\t\t\t*label boxbetc\n\t\t\t\t\t\t\t\t\t\t\t\t*temp goldbet 0\n\t\t\t\t\t\t\t\t\t\t\t\t*input_number goldbet 1 5\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*set gold - goldbet\n\t\t\t\t\t\t\t\t\t\t\t\tThe bookie hands you a slip with your bet of ${goldbet} coins scrawled on it and you make your way back to ringside. \n\t\t\t\t\t\t\t\t\t\t\t\t*set ladyjane + 1\n\t\t\t\t\t\t\t\t\t\t\t\t*set gold + (2*goldbet)\n\t\t\t\t\t\t\t\t\t\t\t\t*set gold + (goldbet)\n\t\t\t\t\t\t\t\t\t\t\t\t*goto ladyj\n\t\t\t\t\t\t\t\t\t\t\t#Bet Sir Malcolm\n\t\t\t\t\t\t\t\t\t\t\t\t*label boxbetd\n\t\t\t\t\t\t\t\t\t\t\t\t*temp goldbet 0\n\t\t\t\t\t\t\t\t\t\t\t\t*input_number goldbet 1 10\n\t\t\t\t\t\t\t\t\t\t\t\t*set gold - goldbet\n\t\t\t\t\t\t\t\t\t\t\t\tThe bookie hands you a slip with your bet of ${goldbet} coins scrawled on it and you make your way back to ringside. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto ladyj\n\t\t\t\t\t#Cards\n\t\t\t\t\t\tA bald man sits at a card table, dealing to three seated players. There is a spare seat and the dealer shrugs at you as if to say sit down or move on. You sit in between a well built man with curly blonde hair on your left and a fat man with a smart suit and watch chain on your right. They greet you with a smile and a nod. The dealer speaks.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The game is 21, the maximum bet is 10 gold coins. So if you bet 5 and win, you get back 10, bet 10 and win and you get back 20. Got it?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe silver bracelet he is wearing flashes as he deals the cards.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Just watch\n\t\t\t\t\t\t\t\tThe dealer has an ace of spades and his other card is face down. The fat man starts at 14, takes another card and is busted. \n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tThe blonde man has 16. He taps the table for another card and gets a 5. He smiles broadly.\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\tThe dealer turns his other card and it is a 7. He takes another and is busted.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Come to papa.\" says the blonde man, scooping the coins into a pile. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe dealer shuffles the deck and starts dealing again.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Just Watch\n\t\t\t\t\t\t\t\t\t\t*goto justwatchcards1\n\t\t\t\t\t\t\t\t\t\t*label bcards1\n\t\t\t\t\t\t\t\t\t\t\"How much do you want to bet?\" he says, licking his lips slightly.\n\t\t\t\t\t\t\t\t\t\t*temp goldbet 0\n\t\t\t\t\t\t\t\t\t\t*input_number goldbet 1 10\n\t\t\t\t\t\t\t\t\t\t*set gold - goldbet\n\t\t\t\t\t\t\t\t\t\tYou are dealt a 2 of diamonds and a 2 of clubs. \n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\tThe dealer has a king of diamonds and the other card is face down. \n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\tThe fat man starts at 13, takes another card and is busted. \n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\tThe blonde man has an ace of hearts and a king of hearts. \n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\tHe grins annoyingly.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Stick\n\t\t\t\t\t\t\t\t\t\t\t\tYou wave your hand to pass up on another card. \n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\tThe dealer turns his other card, it is a queen of diamonds. He takes another and it is a 9 of hearts. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tThe blonde scoops up the coins again, his ruddy cheeks and blonde curly hair make you think of a pig wearing a wig. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tA gong sounds and the bar door is opened. Bill the doorman from outside stands in the doorway.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"Adventurers, please make your way to the auditorium as tonight's lecture is about to commence.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*page_break Attend Lecture\n\t\t\t\t\t\t\t\t\t\t\t\t*goto lecture\n\t\t\t\t\t\t\t\t\t\t\t#Take another card\n\t\t\t\t\t\t\t\t\t\t\t\tIt is a king of spades so you are busted. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tThe dealer turns his other card, it is a queen of diamonds. He takes another and it is a 9 of hearts.\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\tThe blonde scoops up the coins again, his ruddy cheeks and blonde curly hair make you think of a pig wearing a wig.\ t\t\"Oh, before you ask, if we both roll the same then I win. That’s the house advantage.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Just Watch\n\t\t\t\t\t\t\t\t*goto jwcr1\n\t\t\t\t\t\t\t\t*label bcr1\n\t\t\t\t\t\t\t\t*gosub goldtest\n\t\t\t\t\t\t\t\t*goto wyltb\n\t\t\t\t\t\t\t#Bet\n\t\t\t\t\t\t\t\t*goto bcr1\n\t\t\t\t\t\t\t\t*label jwcr1\n\t\t\t\t\t\t\t\tA squat man with a flat nose bets 10 gold coins. He rolls a total of 7. The blonde lady rolls and she also gets 7. The crowd cheer and someone pats the loser on the shoulder good-naturedly.\n\t\t\t\t\t\t\t\t*label wyltb\n\t\t\t\t\t\t\t\t\"Would you like to bet?\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Just Watch\n\t\t\t\t\t\t\t\t\t\t*goto tall\n\t\t\t\t\t\t\t\t\t\t*label bcr2\n\t\t\t\t\t\t\t\t\t\t*gosub goldtest\n\t\t\t\t\t\t\t\t\t\t*goto gong\n\t\t\t\t\t\t\t\t\t#Bet\n\t\t\t\t\t\t\t\t\t\t*goto bcr2\n\t\t\t\t\t\t\t\t\t\t*label tall\n\t\t\t\t\t\t\t\t\t\tA tall woman with a streak of white in her hair bets 10 gold coins. She rolls 11 and the crowd react appreciatively. The blonde lady whispers to the dice and rolls. She gets a 10 and bows a little to the winner. A gong sounds and the bar door is opened. Bill the doorman from outside stands in the doorway. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Adventurers, please make your way to the auditorium as tonight's lecture is about to commence.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*page_break Attend Lecture\n\t\t\t\t\t\t\t\t\t\t*goto lecture\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t*selectable_if (safaris = false) #Talk to the man in the safari suit\n\t\t\t\t*set safaris true\n\t\t\t\t*label safari\n\t\t\t\tYou stride up to the adventurer. He is slightly shorter than you with a shock of red hair and magnificent maroon muttonchops. With an outstretched hand you say:\n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"Hi, I am Jack. Pleased to meet you.\"\n\t\t\t\t\t*goto heshakesyour\n\t\t\t\t*else\n\t\t
