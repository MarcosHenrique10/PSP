\t\t\t\"Hi, I am Jill. Pleased to meet you.\"\n\t\t\t\t\t*goto heshakesyour\n\t\t\t\t\n\t\t\t\t*label heshakesyour\n\t\t\t\tHe shakes your hand. His grip is vice-like as he tells you his name:\n\t\t\t\t\n\t\t\t\t\"Carruthers. Montague S. Carruthers, a pleasure.\"\n\t\t\t\t\n\t\t\t\t\"It doesn’t look like you have long returned to England?\" \n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"Africa old boy. Been on the hunt for the famous Two Headed Tiger of Timbuktu. We searched high and low for that damn thing.\"\n\t\t\t\t\t*goto atthishe\n\t\t\t\t*else\n\t\t\t\t\t\"Africa old girl. Been on the hunt for the famous Two Headed Tiger of Timbuktu. We searched high and low for that damn thing.\"\n\t\t\t\t\t*goto atthishe\n\t\t\t\t\t\n\t\t\t\t*label atthishe\n\t\t\t\tAt this he suddenly seems sad, troubled by some memory.\n\t\t\t\t\n\t\t\t\t\"My companion O’Brien and I had tracked the beast to the foothills of Mount Phoenix. We needed to travel light and fast so we set off at dawn, just the two of us. Further and further up the mountain we climbed and them blast it all O’Brien got bitten by some damned mountain snake. By the time I had got him back to our camp he was too far gone to save. If only there was something I could have done.\"\n\t\t\t\t\n\t\t\t\tHe looks lost in thought and memories and you pat him on the back to comfort him. The three men are no longer in the hallway, presumably they have entered the bar.\n\t\t\t\t*choice\n\t\t\t\t\t#Enter bar\n\t\t\t\t\t\t*goto bar\n\t\t\t\t\t*selectable_if (snuck_stairs \u003c 1) #Sneak Upstairs\n\t\t\t\t\t\t*goto sneakup\n\t\t\t\t\t*selectable_if (snuck_stairs \u003c 1) #Sneak Downstairs\n\t\t\t\t\t\t*goto sneakd\n\t\t\t*selectable_if (threemen \u003c 1) #Talk to the three gents\n\t\t\t\t*set threemen +1\n\t\t\t\t*label three\n\t\t\t\tYou stride up to the three men:\n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"Gentlemen, sorry to interrupt. Jack. Jack Sinclair.\"\n\t\t\t\t\t*goto youholdout\n\t\t\t\t*else\n\t\t\t\t\t\"Gentlemen, sorry to interrupt. Jill. Jill Sinclair.\"\n\t\t\t\t\t\n\t\t\t\t\t*goto youholdout\n\t\t\t\t\n\t\t\t\t*label youholdout\n\t\t\t\tYou hold out your hand and they shake it enthusiastically in turn, introducing themselves as Smit Rigaud, Mal Schey and Marti Horsley. All three of them look young and fresh faced, full of the vigour of youth.\n\t\t\t\t\n\t\t\t\t\"We were just discussing all these missing artefacts. I think it is a disgrace. We have so much to learn from ancient civilisations. The real value is in treasuring the past,\" says Smit.\n\t\t\t\t\n\t\t\t\t\"I agree with you Smit, but a living has to be made you know,\" says Mal. \"I can think of worse ways to get by than travelling the world and finding treasure.\"\n\t\t\t\t\n\t\t\t\t\"Sometimes I think we are meddling with forces we don’t understand,\" says Marti. \"Take that haunted ruby I was talking about recently…\"\n\t\t\t\t\n\t\t\t\tSmit and Mal roll their eyes and look at you in exasperation before their animated conversation takes off again.\n\t\t\t\t\n\t\t\t\tThe man dressed in the safari suit is no longer in the corridor, presumably he has entered the bar.\n\t\t\t\t*choice\n\t\t\t\t\t#Enter bar\n\t\t\t\t\t\t*goto bar\n\t\t\t\t\t*selectable_if (snuck_stairs \u003c 1) #Sneak Upstairs\n\t\t\t\t\t\t*goto sneakup\n\t\t\t\t\t*selectable_if (snuck_stairs \u003c 1) #Sneak Downstairs\n\t\t\t\t\t\t*goto sneakd\n\t\t\t#Sneak upstairs\n\t\t\t\t*label sneakup\n\t\t\t\t*set snuck_stairs +1\n\t\t\t\t*choice\n\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\tYou loiter around until Bill is distracted. When an adventurer arrives and starts to show him something you grab your chance and sneak quickly and quietly upstairs.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe adventurers museum is utterly chaotic. Stuffed birds, flying animals and various mobiles hang from the ceiling. The walls are covered in maps, charts, paintings and photographs and everywhere are glass cases and shelves loaded with discoveries and equipment. It is a tribute and a treasure trove, albeit in need of a good dusting and proper cataloguing. There are enough curiosities to keep an inquiring mind entertained for years, possibly more. In fascination you move from case to case and display to display. Everywhere you turn is another intriguing object. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tA bell rings downstairs and you can hear that the lecture is beginning. As you turn to leave you look behind you and a two headed monkey looks back from within a display case.\n\t\t\t\t\t\t\t\t*page_break Attend Lecture\n\t\t\t\t\t\t\t\t*goto lecture\n\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t*label unlucky\n\t\t\t\t\t\t\t\tA hand grabs your shoulder gently.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\"Sorry Jack, that area is closed at the moment. That’s why there is a rope there. Also a closed sign.\"\n\t\t\t\t\t\t\t\t\t*goto sorryjack\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\"Sorry Jill, that area is closed at the moment. That’s why there is a rope there. Also a closed sign.\"\n\t\t\t\t\t\t\t\t\t*goto sorryjack\n\t\t\t\t\t\t\t\t*label sorryjack\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Bar\n\t\t\t\t\t\t\t\t\t\t*goto bar\n\t\t\t\t\t\t\t\t\t*if ((safaris = false) and (threemen \u003c1)) #Talk to the man in the safari suit\n\t\t\t\t\t\t\t\t\t\t*goto safari\n\t\t\t\t\t\t\t\t\t*if ((threemen \u003c 1) and (safaris = false)) #Talk to the three men\n\t\t\t\t\t\t\t\t\t\t*goto three\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t#Sneak downstairs\n\t\t\t\t*label sneakd\n\t\t\t\t*set snuck_stairs +1\n\t\t\t\t*choice\n\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\tYou loiter around until Bill is distracted. When an adventurer arrives and starts to show him something you grab your chance and sneak quickly and quietly downstairs. At the bottom of the stairs on the left is a door marked Staff Exit and to the right a kitchen swing door with a porthole window. It opens and a chef emerges in a cloud of steam and cooking smells.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I don’t think you should be here,\" he says, \"but now you are, you can act as a taster for this new soup recipe I am working on.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe ushers you into the kitchen. Shelves of shiny copper pans line the walls around a wooden table in the middle of the kitchen floor. There is a soup tureen on the table and he hands you a tasting spoon for you to try as he watches you expectantly.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t“So, how is it?” he asks.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t#Delicious\n\t\t\t\t\t\t\t\t\t\t\"It’s delicious!\" The chef smiles widely and you continue:\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"A symphony of flavour that sends waves of delight crashing over my tongue!\" \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tHe shakes your hand enthusiastically.\n\n\t\t\t\t\t\t\t\t\t\tA bell rings upstairs to signal that the lecture is beginning.\n\t\t\t\t\t\t\t\t\t\t*page_break Attend Lecture\n\t\t\t\t\t\t\t\t\t\t*goto lecture\n\t\t\t\t\t\t\t\t\t#Average \n\t\t\t\t\t\t\t\t\t\t\"It tastes like a Wednesday afternoon. It’s neither here nor there.\"\n\n\t\t\t\t\t\t\t\t\t\t\"It probably needs more salt then,\" says the chef, looking unconvinced as he returns to the kitchen.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tA bell rings upstairs to signal that the lecture is beginning.\n\t\t\t\t\t\t\t\t\t\t*page_break Attend Lecture\n\t\t\t\t\t\t\t\t\t\t*goto lecture\n\t\t\t\t\t\t\t\t\t#Awful\n\t\t\t\t\t\t\t\t\t\t\"It tastes like distilled sadness and my tongue wants to commit suicide.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe chef balls his fists and strides back into the kitchen with a red face. Pots and pans crash and various shouted phrases in French ring out from behind the door.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tA bell rings upstairs to signal that the lecture is beginning.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*page_break Attend Lecture\n\t\t\t\t\t\t\t\t\t\t*goto lecture\n\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\tA hand grabs your shoulder gently. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\"Sorry Jack, that area is closed at the moment. That’s why there is a rope there. Also a closed sign.\"\n\t\t\t\t\t\t\t\t\t*goto sorrjack1\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\"Sorry Jill, that area is closed at the moment. That’s why there is a rope there. Also a closed sign.\"\n\t\t\t\t\t\t\t\t\t*goto sorrjack1\n\t\t\t\t\t\t\t\t*label sorrjack1\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Bar\n\t\t\t\t\t\t\t\t\t\t*goto bar\n\t\t\t\t\t\t\t\t\t*if ((safaris = false) and (threemen \u003c1)) #Talk to the man in the safari suit\n\t\t\t\t\t\t\t\t\t\t*goto safari\n\t\t\t\t\t\t\t\t\t*if ((threemen \u003c 1) and (safaris = false)) #Talk to the three men\n\t\t\t\t\t\t\t\t\t\t*goto three\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t#Look at the board\n\t\tLondon Times, March 17th 1897\n\t\t\n\t\tEgyptian Death Mask stolen!\n\t\t\n\t\tPolice are still baffled as to the overnight disappearance of the fabulous death mask of Amun-Ra from the British Museum last night. Inspector Lestrade of Scotland Yard commented that:\n\t\t\n\t\t\"There are a number of leads we are following up on and rest assured we will soon have the perpetrator of this heinous crime safely locked away.\"\n\t\t\n\t\tSources from the museum confirmed to this reporter that there were no signs of forced entry of any kind and it should have been impossible for such a crime to be committed. The two guards responsible for guarding the precious artefact overnight are also yet to be found. The Egyptian scholar Aziz Pasha Ezzat has issued a warning to those involved in the theft:\n\t\t\n\t\t\"Those who would profane the peace of Amun Ra be afeared, his shadow is long and dark death will come to those who disturb his eternal slumber.\"\n\t\t\n\t\tReaders of the London Times will know that this is just one in a number of high profile thefts in recent years. The fabled Tongan Crown of Pearls, the Jade Dragon of Cowloon and the Stauette of Tears are all still missing under similar circumstances.\n\t\t*choice\n\t\t\t#Enter Club\n\t\t\t\t*goto bill\n\t\t\t\n\t\t\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\t\n\n*label malcolms\nSir Malcolm stands eagerly in his corner and the behemoth clambers the ropes and deposits himself in the other. The ring looks smaller with him in it. As a second helps him with gloves, the MC announces:\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\"Ladies and gentlemen, in the left corner Malcolm Puuuuuuuugilisst Penrose. In the right corner...\"\n\n\"Stevens. John Stevens,\" grunts the missing link.\n\n\"In the right corner, John the Sasssquatch Stevens!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\nThe bell rings and the fight begins. Stevens lumbers towards Sir Malcolm and throws a great looping right hand. Sir Malcolm deftly ducks under the slow swinging sledgehammer and plants two straight left jabs onto the giant’s chin, rocking him back. A right cross finishes him and he collapses onto the floor of the ring just as if he had fallen from the top of a beanstalk. The crowd erupts, non-winning tickets thrown into the air create a brief ticker tape parade and Sir Malcolm strides confidently back to his corner.\n*choice\n\t*if (sirmalcolmw >=1) #Collect winnings\n\t\tYou push through to the bookie. You are the only one returning with a winning ticket and he hands you the winnings with a newly found sense of respect.\n\t\t*goto mcspeak\n\t*if (sirmalcolmw \u003c1) #Scrunch ticket\n\t\t\t\t\t\t\t\t\t\t\n\t\t*goto mcspeak\n\t\t\n*label ladyj\nThe bell rings and Sir Malcolm strides from his corner. He touches gloves with Lady Jane but looks deeply uncomfortable at the prospect of striking a woman.\n\nLady Jane stands calmly. \n\t\t\t\t\t\t\t\t\t\t\nSir Malcolm makes a very gentle left jab towards his opponent but she can see it will not connect and does not move. He strikes again with more accuracy but no power, this time his blow is palmed away as if it were an annoying fly at a picnic. The crowd are silent, not knowing what to make of this spectacle. \n\nYou notice an oriental gentlemen in the crowd staring on impassively, he is wearing a dark blazer that has a yellow pattern of some kind decorating it.\n\t\t\t\t\t\t\t\t\t\t\nSir Malcolm smiles and relaxes slightly. He tries a gentle hook. As soon as Sir Malcolm has dropped his shoulder to throw the punch Lady Jane lunges forward with both arms. The punch is stopped by her left arm and with her right she administers a punishing blow to Sir Malcolm’s midriff. He winces noticeably despite his best efforts not to show it.\n\t\t\t\t\t\t\t\t\t\t\nThe crowd start to get excited.\n\t\t\t\t\t\t\t\t\t\t\nSir Malcolm gathers himself and starts to take things seriously. He tries again with a jab, this time there is some feeling in it. Lady Jane counters the blow and with a deft flick Sir Malcolm is flying through the air and is swiftly flat on his back in the ring! The noise in the bar is deafening and all attention is now on the two fighters in the ring. Groggily Sir Malcolm gets to his feet. A lightning fast two fingered jab from his opponent catches him in the right shoulder. Another jab, this time to the left shoulder and now both his arms hang uselessly! He is powerless to defend himself as he is on the receiving end of a spinning move that sends him once again to the canvas! The referee does a ten count but the crowd are so loud it is inaudible.\n\t\t\t\t\t\t\t\t\t\t\nThe referees waving hands confirm that Sir Malcolm won’t be getting up in time. Lady Jane bends down to Sir Malcolm and with some mysterious taps movement is returned to him. The fight is over. \n\t\t\t\t\t\t\t\t\t\t\nShe helps him up and Sir Malcolm takes her hand and raises it. Lady Jane is the victor! With a bow to her opponent and the crowd, the mysterious Lady Jane returns to her corner to deafening applause and another snowstorm of tickets. You glance at Sir Malcolm. He doesn’t look defeated, he looks positively energised.\n*choice\n\t*if (ladyjane >=1) #Collect winnings\n\t\tFighting through the impossible noise and slowly dissipating mass of fight fans you finally get to the bookie and hand over your ticket. You think you can see the back of the Asian gentlemen from before, the reverse of his blazer has a fabulous yellow dragon embroidered onto it and his long hair is in a pony tail. \n\t\t\n\t\t\"It’s been a great day for both of us today!\" says the bookie cheerfully.\n\t\t*goto gong\n\t*if (ladyjane \u003c1) #Scrunch ticket\n\t\t*goto gong\n\t\t\n*label goldtest\n*temp goldbet 0\n*temp dicerolla\n*temp dicerollb\n*if (male = true)\n\t\"So how much will you bet handsome?\"\n*if (male = false)\n\t\"So how much will you bet gorgeous?\"\n*line_break\n*input_number goldbet 1 10\n*set gold - goldbet\n\"OK you have bet ${goldbet} gold.\"\n*rand dicerolla 2 12\n\nYou roll the dice, the score is ${dicerolla}.\n*line_break\n\n*rand dicerollb 2 12\nThe blonde blows a kiss on the dice and rolls them, her score is ${dicerollb}.\n*line_break\n*if dicerolla > dicerollb\n\t*set gold + (2*goldbet)\n\t*goto craps_win\n\t*label craps_win\n\t*line_break\n\tThe crowd cheer as you collect your winnings.\n*if dicerolla \u003c= dicerollb\n\t*goto craps_lose\n\t*label craps_lose\n\t*line_break\n\tThe crowd cheers as the blonde collects her winnings.\n*return\n\n*label lecture\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*goto_scene lecture\nRemember earlier how we told you that the first few chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2020-05-28 $4.99 $2.99 purchased\n*abort\n", "creature": "*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 false\n\t\t\t*set chapter4 false\n\t\t\t*set chapter5 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto itfeelsgood\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*if (chapter4 = true)\n\t\t\t\t*goto_scene marsh thesoft\n\t\t\t*else\n\t\t\t\t*goto itfeelsgood\n\t\t#No\n\t\t\t*goto itfeelsgood\n*label itfeelsgood\nIt feels good to be moving along the river again.\n*temp bullet_roll 0\n*temp bullet_damage 0 \n\n*image frog.jpg\n\nA familiar croaking sound over the putting engine makes you scan along the river's edge for frogs but to your surprise it is coming from high up in the tree line. Soon you spot the orange bill and black and white plumage of a toucan. You smile to yourself. \n\nEventually the sun starts to sink and you have to confess your heart also. Anticipation of those damn jungle drums is casting a pall over the adventure. You decide to anchor right in the middle of the river. After today’s attack this may help defend against unexpected visitors. \n\nYour thoughts of dinner as you throw the anchor overboard are interrupted by a loud scream from Lady Jane’s cabin! \n\nRunning aft you find Sir Malcolm lying unconscious on the deck. A huge figure with green scaly skin and webbed hands has hoisted Lady Jane onto it’s shoulder and is perched on the railings ready to jump into the river. Lady Jane is beating her fists on it’s back and kicking wildly but this has no effect!\n*choice\n\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t*goto set_bullet_creature\n\t\t\t\t*else\n\t\t\t\t\t*goto clickcreature\n\t#Grab the beast\n\t\tYou rush towards them but the creature is much too quick. It jumps over the side and they vanish from view.\n\t\t*goto splashmalcolm\n\t#Wake Sir Malcolm\n\t\tThe monster jumps off the boat with Lady Jane and is gone.\n\t\t*goto splashmalcolm\n\t\n\t\n\t\n\t\n*label set_bullet_creature\n[i]It is difficult to get a clear shot of the creature[/i]\n*rand bullet_roll 1 6\n*set bullets_number - 1\n*line_break\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll \u003c= 2)\n\t*goto creatureshot1\n*if (bullet_roll >= 4)\n\t*goto creatureshot2\n*if (bullet_roll = 5)\n\t*goto creatureshot3\n*elseif (bullet_roll = 6)\n\t*goto creatureshot3\n\t\n*label creatureshot1\nThe creature jumps as you fire and the bullet embeds itself in the ships rail. The creature and Lady Jane have vanished over the side. \n*goto splashmalcolm\n\n*label creatureshot2\nThe bullet hits Lady Jane and she screams in pain. The creature jumps over the side and they vanish from view.\n*goto splashmalcolm\n\n*label creatureshot3\nThe bullet hits the creature in the back and ricochets off. The creature jumps over the side and they vanish from view.\n*goto splashmalcolm\n\n*label clickcreature\nThe creature is poised to jump as you pull the trigger. A clicking sound confirms you have no bullets in the gun. Lady Jane cries out as the creature jumps over the side and they vanish from view.\n*goto splashmalcolm\n\n*label splashmalcolm\nSplashing water on Sir Malcolm’s face brings him to. \n\n\"That blasted green giant got the drop on me,\" he says, shaking his head slowly. \"Let’s get after them, the thought of its slimy fins on Lady Jane turns my stomach.\"\n*choice\n\t*if (necklace = true) #Follow them\n\t\tA flower from Lady Jane's necklace lies on the jungle floor halfway up a curving path that goes left. From another path to the right comes a cry in her voice. \n\t\t*if (male = true)\n\t\t\t\"Jack!\" it calls.\n\t\t*if (female = true)\n\t\t\t\"Jill!\" it calls.\n\t\t*choice\n\t\t\t#Follow the voice\n\t\t\t\t*goto claustrophobic\n\t\t\t#Follow the flowers\n\t\t\t\tThe path splits again. Another flower lies crushed on the left hand path. A cry comes from the right: \"It caught me!\"\n\t\t\t\t*choice\n\t\t\t\t\t#Follow the voice\n\t\t\t\t\t\t*goto claustrophobic\n\t\t\t\t\t#Follow the flowers\n\t\t\t\t\t\tIgnoring the cries for help takes all your resolve. The path widens out into a small dell in the dense and oppressive jungle. Vines and creepers hang all around. A flower from Lady Jane's necklace lies in the middle of the clearing. There is no other trace of her or the creature.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn desperation you start to hack at the edges of the clearing, cutting down the foliage for any clue as the where they have disappeared to.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\"Jack, look at this!\"\n\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\"Jill, look at this!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tSir Malcolm is standing at the mouth of a cave. It had been completely camouflaged by the simple act of gathering jungle foliage over the entrance. You both look into the darkness below and steel yourselves to enter.\t\t\t\t\n\t\t\t\t\t\t*image cave.jpg\n\t\t\t\t\t\t*page_break Enter the cave\n\t\t\t\t\t\t*goto crouch\n\t*if (necklace = false) #Follow them\n\t\tThere are no further footprints to follow and numerous paths lead off into the jungle. \n\t\t*if (male = true)\n\t\t\tFrom the right comes a cry \"Jack!\" in Lady Jane's voice\n\t\t*if (female = true)\n\t\t\tFrom the right comes a cry \"Jill!\" in Lady Jane's voice\n\t\t*choice\n\t\t\t#Right path\n\t\t\t\t*label claustrophobic\n\t\t\t\tThe claustrophobic jungle presses in on you as you twist and turn through the maze of tight passages. A tiny glade allows you to take your bearings. The path has split again. \n\t\t\t\t\n\t\t\t\tTurning to speak to Sir Malcolm you are shocked to see that he isn't behind you!\n\t\t\t\t\n\t\t\t\tFrom behind you comes a cry of \"blasted green giant!\" in his voice. To the right Lady Jane is shouting \"it caught me!\"\n\t\t\t\t*choice\n\t\t\t\t\t#Go back\n\t\t\t\t\t\t*label snakes\n\t\t\t\t\t\tSomething snakes around your ankle and you trip forward. Instinctively you throw your hands forward to break the fall but to your surprise you don't hit the jungle floor. Instead you are suspended by more and more tendrils that curl around you. \n\t\t\t\t\t\t\n\t\t\t\t\t\tWrapped and suspended they pull you through the jungle. \n\t\t\t\t\t\t\n\t\t\t\t\t\tAhead are the jaws of an enormous venus fly trap! The tendrils greedily gather you in and the jaws close around you. A muffled cry of \"it caught me!\" is the last thing you hear.\n\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t#Go right\n\t\t\t\t\t\tThe path gets narrower and you have to push your way through increasingly thick tendrils.\n\t\t\t\t\t\t*goto snakes\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t#Carry on\n\t\t\t\t\t\tThe path gets narrower and you have to push your way through increasingly thick tendrils.\n\t\t\t\t\t\t*goto snakes\n\t\t\t#Ahead\n\t\t\t\t*goto claustrophobic\n\t\t\t#Left path\n\t\t\t\t*goto claustrophobic\n\t\n\n*label crouch\nYou have to crouch to get into the cave but soon the passageway opens up into a gently winding tunnel. The air is cold and dank, a welcome respite from the clammy jungle heat. Sounds of dripping and the occasional screech of a bat echo around you as you descend further into the cave. \n\nA huge stalagmite splits the tunnel into a left and right path. A glow comes from the path on the left. A boot lies on the floor of the right hand path. It looks new. \n*choice\n\t#Left\n\t\tThe source of the glowing soon becomes obvious. The tunnel wall is covered entirely on one side in bio-luminescent fungi, bathing the walls in green light. On the other side is a crude cave painting, illuminated eerily by the glow. It depicts a tall figure holding aloft a jewel with smaller figures on their hands and knees in worship. Beams of light emit from the gem and are focused towards a body lying on a crude stone tablet. Before you can ponder it’s meaning any further a scream echoes off the tunnel walls sending a cloud of bats flapping over your heads. Lady Jane!\n\t\t\n\t\t*label scream\n\t\t\n\t\tYou race to the source of the scream. The tunnel opens to a huge cavern. A waterfall cascades down a rock formation into a crystal clear pool of great size. Lush green jungle fronds hang down from the cavern roof, entwined with stalagmites. Here and there sunlight is beaming through and reflecting brilliantly off the surface of the pool.\n\t\t\n\t\tLady Jane lies still on a small island of rock in the middle of the lake. Standing at the waters edge, between you and lady Jane is something utterly monstrous and completely outside of anything you have seen in all your adventures! A tall green man with webbed hands and feet is staring back at you with shining yellow eyes. Scales cover his body and his thin, cruel lips are pulled back to reveal small sharp teeth. His nose is flat and without nostrils and where his ears should be there are instead gills, pulsing grotesquely.\n\t\t\n\t\tThe creature extends an arm and beckons you on with its hand, then raises his arms to a boxing stance. \n\t\t\n\t\t*if (male = true)\n\t\t\t\"My God Jack, he wants to fight you!\" says Sir Malcolm.\n\t\t*if (female = true)\n\t\t\t\"My God Jill, he wants to fight you!\" says Sir Malcolm.\n\t\tYou must fight the:\n\t\t\n\t\t[b]Fish Man[/b]\n\t\t\n\t\t[b]Skill 8, Stamina 8[/b]\n\t\t\n\t\t*label creature_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto roll_dice_loop1\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click2\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win2\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"This fish is going to get battered!\"\n\t\t\t\t*goto roll_dice_loopk1\n\t\t\n\t#Right\n\t\tThe boot is attached to a body lying on the floor with it’s feet towards you. Startlingly it begins to move as you get closer and you see that this is because a large dog-sized lizard is grasping the body by the head. On your arrival the lizard drops it’s meal and hisses at you, baring rows of long, serrated teeth. It attacks.\n\t\tYou must fight the:\n\t\t\n\t\t[b]Lizard[/b]\n\t\t\n\t\t[b]Skill 6, Stamina 6[/b]\n\t\t\n\t\t*label lizard_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto roll_dice_loop\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click1\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"Prepare to be a handbag\"\n\t\t\t\t*goto roll_dice_loopk\n\t\t\t\t\n\t\t\t\t\n\t\t\n\t\n\t\n\n\n*label roll_dice_loop\n*temp lizarddiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand lizarddiceresult 1 dicesides\n*line_break\nThe Lizard rolled ${lizarddiceresult}\n*set diceresult +skill\n*set lizarddiceresult +lizardskill\n*line_break\nYour total: ${diceresult} Lizards total: ${lizarddiceresult}\n*if (diceresult > lizarddiceresult)\n\t*line_break\n\tYour attack sends the lizard backwards\n\t*set lizardhp -2\n*if (diceresult \u003c lizarddiceresult)\n\t*line_break\n\tThe lizard bites you\n\t*set stamina -2\n*if (diceresult = lizarddiceresult)\n\t*line_break\n\tThe lizard hisses at you\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe lizard has ${lizardhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (lizardhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n*label win\n*if (stamina = max_stamina)\n\t*goto afterlizard\n*elseif (provisions = false)\n\t*goto afterlizard\n*else\n\t*goto choice8\n*label choice8\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto afterlizard\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto afterlizard\n\t*if (provisions = false) #Move past\n\t\t*goto afterlizard\n\t\n\t\t\n\t\t\n*label afterlizard\n\nYou push the dead lizard as far away from the body as you can with your foot.\n*choice\n\t#Carry on\n\t\tA scream echoes off the tunnel walls sending a cloud of bats flapping over your heads. Lady Jane!\n\t\t*goto scream\n\t#Examine the body\n\t\tYou turn the body over, wincing at its mutilated face. In the pockets you find a compass, a handkerchief monogrammed with the initials JRC, a pocket watch inscribed “To J Love A” and a small notebook. You flick through this and find it is full of sketches of flora and fauna. One of them is of a webbed footprint with notes and measurements that have been extrapolated into another drawing of a scaly humanoid figure accompanied by some measurements. \n\t\t\n\t\tYou place the handkerchief over the body's ravaged face and Sir Malcolm mutters some words under his breath that you cannot hear.\n\t\t\n\t\tYour reverence is interrupted by a scream that echoes off the tunnel walls sending a cloud of bats flapping over your heads. Lady Jane!\n\t\t*goto scream\n\t\t\n\n\n\n*label winshot\nYour shot kills the lizard instantly.\n*goto win\n\n*label click1\nYour gun clicks uselessly.\n\n*if (male = true)\n\t\"That's nice Jack,\" says Sir Malcolm.\n*if (female = true)\n\t\"That's nice Jill,\" says Sir Malcolm.\n\nThe lizard attacks.\n*goto roll_dice_loop\n\n*label roll_dice_loopk\n*temp lizarddiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand lizarddiceresult 1 dicesides\n*line_break\nThe Lizard rolled ${lizarddiceresult}\n*set diceresult +skill\n*set lizarddiceresult +lizardskill\n*line_break\nYour total: ${diceresult} Lizards total: ${lizarddiceresult}\n*if (diceresult > lizarddiceresult)\n\t*line_break\n\tYour attack hurts the lizard badly\n\t*set lizardhp -3\n*if (diceresult \u003c lizarddiceresult)\n\t*line_break\n\tThe lizard bites you\n\t*set stamina -2\n*if (diceresult = lizarddiceresult)\n\t*line_break\n\tThe lizard hisses at you\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe lizard has ${lizardhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (lizardhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n*label set_bullet_damage1\n\nThe creature is preparing to fight and looks in every way like a boxer warming up.\n\nYou draw your gun and shoot.\n\nThe creature clasps it's belly in agony.\n\n\"I wasn't going to get my hands dirty on that...fish!\" you utter contemptuously.\n\nThe creature holds it's stomach and staggers to the pool. It collapses face down at the edge and is still.\n\nSir Malcolm is staring at you, his mouth hanging open in shock. Silently he wades into the pool and returns with Lady Jane in his arms. Her eyes flutter open and when she sees the creatures body a look passes between her and Sir Malcolm. You return the way you came. \n*goto backonboard\n\n*label click2\nThe creature is preparing to fight and looks in every way like a boxer warming up.\n\nYou draw your gun and shout \"Die you, you ...fish!\"\n\nThe gun makes a clicking sound. \n\nThe creature spits onto the ground in disgust and you fight.\n*goto roll_dice_loop1\n\n*label win2\n\nYou knock the creature to the ground with a punishing right hook. He doesn't make it for the ten count.\n\nThe creature lies at your feet, beaten. Slowly he pushes himself up and wobbles towards the water.\n\nThe creature wades into the pool and slides beneath the surface, leaving barely a ripple. It emerges on the island and gently lifts Lady Jane. They return to the shore, the creature swimming with her on its chest. It places her gently on the ground and stands back respectfully.\n\nLady Jane starts to come to with a groan. Looking into the beaten creatures eyes you feel you can see guilt and compassion.\n*if (stamina = max_stamina)\n\t*goto creaturepoints\n*elseif (provisions = false)\n\t*goto creaturepoints\n*else\n\t*goto choice11\n*label choice11\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto creaturepoints\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto creaturepoints\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto creaturepoints\n\t*if (provisions = false) #Leave\n\t\t*goto creaturepoints\n\n*label creaturepoints\nAs you start to leave the creature points to a tunnel, gesturing for you to follow that path. \n*choice\n\t#Follow the tunnel path\n\t\tGlowing mushrooms cover the walls of the tunnel in clumps, lighting the way with a weird glow. Up ahead, an alcove has been carved into the wall fronted by a small stone table. The recess has a mural on it and the table has a few objects laid out neatly on it. Looking more closely you see objects like a comb, a pair of glasses, a fountain pen and so on. Each has been placed carefully, almost reverentially. \n\t\t\n\t\tThe mural is crudely but effectively drawn. It shows a tall figure standing between two tables. They are holding aloft a jewel. One one table is a person who has been restrained and on the other table it looks like some kind of container. All the detail from the other table has been rubbed away. \n\t\t\n\t\t*set poemone true\n\t\tAround the outside of the picture is written: [b]\"The light from space will do as bid.\"[/b]\n\t\t\n\t\t*label backonboard\n\t\tYou are back on board the Rustbucket as the light starts to fade. Exhausted you eat a meal in silence and as soon as possible everyone retires to bed. \n\t\t\n\t\t[i]Add 2 stamina points[/i]\n\t\t\n\t\t*set stamina +2\n\t\t*gosub limit_stats\n\t\t*if (stamina = max_stamina)\n\t\t\t*goto darknessfalls\n\t\t*elseif (provisions = false)\n\t\t\t*goto darknessfalls\n\t\t*else\n\t\t\t*goto choice999\n\t\t*label choice999\n\t\t*choice\n\t\t\t*if (provisions = true) #Eat Provisions\n\t\t\t\t*if (provisions_number > 0)\n\t\t\t\t\t*gosub_scene eatprovisions\n\t\t\t\t\t*goto darknessfalls\n\t\t\t\t*if (provisions_number = 0) \n\t\t\t\t\t*gosub_scene noprovisions\n\t\t\t\t\t*goto darknessfalls\n\t\t\t*if (provisions = true) #Don't eat provisions\n\t\t\t\t*goto darknessfalls\n\t\t\t*if (provisions = false) #Retire\n\t\t\t\t*goto darknessfalls\n\t\t*label darknessfalls\n\t\tAs darkness falls, the drums begin. You roll your eyes but nothing short of sustained cannon fire is going to keep you awake tonight.\n\t\t*page_break Next Morning\n\t\t*goto_scene anaconda\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t#Go back the way you came\n\t\t*goto backonboard\n\t\t\n\n*label roll_dice_loop1\n*temp creaturediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand creaturediceresult 1 dicesides\n*line_break\nThe Creature rolled ${creaturediceresult}\n*set diceresult +skill\n*set creaturediceresult +creatureskill\n*line_break\nYour total: ${diceresult} Creatures total: ${creaturediceresult}\n*if (diceresult > creaturediceresult)\n\t*line_break\n\tYou hit the creature with a sharp jab and right hook\n\t*set creaturehp -2\n*if (diceresult \u003c creaturediceresult)\n\t*line_break\n\tThe creature knocks your head back with a powerful uppercut\n\t*set stamina -2\n*if (diceresult = creaturediceresult)\n\t*line_break\n\tYou circle each other\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Creature has ${creaturehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (creaturehp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loop1\n\t\n*label roll_dice_loopk1\n*temp creaturediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand creaturediceresult 1 dicesides\n*line_break\nThe Creature rolled ${creaturediceresult}\n*set diceresult +skill\n*set creaturediceresult +creatureskill\n*line_break\nYour total: ${diceresult} Creatures total: ${creaturediceresult}\n*if (diceresult > creaturediceresult)\n\t*line_break\n\tYou hit the creature with a sharp jab and a devastating right hook\n\t*set creaturehp -3\n*if (diceresult \u003c creaturediceresult)\n\t*line_break\n\tThe creature knocks your head back with a powerful uppercut\n\t*set stamina -2\n*if (diceresult = creaturediceresult)\n\t*line_break\n\tYou circle each other\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Creature has ${creaturehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (creaturehp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loopk1\n\t\n\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set lizardhp - bullet_damage\nThe Lizard has ${lizardhp} stamina remaining\n*if (lizardhp \u003c 1)\n\t*goto win\n*else\n\t*goto lizard_fight\n\n*label limit_stats\n*if stamina > max_stamina\n\t*set stamina max_stamina\n*return\n\n\n\n\n", "eatprovisions": "*label eat_provisions\n*set stamina + 5\n\"A little basic but they do the trick,\" you say, licking the crumbs from your lips.\n\n*set provisions_number -1\n*if (provisions_number =0)\n\t*set provisions false\n*gosub limit_stats\n\n*label limit_stats\n*if stamina > max_stamina\n\t*set stamina max_stamina\n*return\n\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Journey into Darkness[/i].\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "gamesave": "*label save\n*set savegame_save savegame\n*set max_stamina_save max_stamina\n*set max_luck_save max_luck\n*set max_skill_save max_skill\n*set stamina_save stamina\n*set skill_save skill\n*set luck_save luck\n*set bullets_save bullets\n*set bullets_number_save bullets_number\n*set bulletclip_save bulletclip\n*set male_save male\n*set female_save female\n*set gm_save gm\n*set gf_save gf\n*set sm_save sm\n*set sf_save sf\n*set gold_save gold\n*set empty_inventory_save empty_inventory\n*set translation_save translation\n*set dynamite_save dynamite\n*set gun_save gun\n*set knuckle_save knuckle\n*set provisions_save provisions\n*set provisions_number_save provisions_number\n*set poisons_save poisons\n*set map_save map\n*set boxing_save boxing\n*set instant_win_save instant_win\n*set machete_save machete\n*set backpack_save backpack\n*set rope_save rope\n*set matches_save matches\n*set suit_save suit\n*set hook_save hook\n*set rabbitsfoot_save rabbitsfoot\n*set chefwhite_save chefwhite\n*set redcloth_save redcloth\n*set neckerchief_save neckerchief\n*set necklace_save necklace\n*set wax_save wax\n*set poemone_save poemone\n*set poemtwo_save poemtwo\n*set poemthree_save poemthree\n*set poemthree1_save poemthree1\n*set greenbad_save greenbad\n*set redbad_save redbad\n*set machete1_save machete1\n*set crown_save crown\n*set boar_save boar\n*set jaguar_save jaguar\n*set spot_save spot\n*set zombieten_save zombieten\n*set zombiefive_save zombiefive\n*set zombies_save zombies\n*set doll_save doll\n*set pill_save pill\n*set gibbonfree_save gibbonfree\n*set triceratops_save triceratops\n*set kerosene_save kerosene\n*set tablet_save tablet\n*set monkeytablet_save monkeytablet\n*set stick_save stick\n*set bone_save bone\n*set armourykey_save armourykey\n*set portcullisupstick_save portcullisupstick\n*set portcullisupbone_save portcullisupbone\n*set ladyjanedead_save ladyjanedead\n*set sirmalcolmdead_save sirmalcolmdead\n*set aliengun_save aliengun\n*set aliencannister_save aliencannister\n*set alienhelmet_save alienhelmet\n*set headjar_save headjar\n*set percivalheadinjar_save percivalheadinjar\n*set envelope_save envelope\n*set acidjar_save acidjar\n*set arrivedbyflight_save arrivedbyflight\n*set aliengunfiredonce_save aliengunfiredonce\n*set spidergem_save spidergem\n*set knowaboutkolf_save knowaboutkolf\n*set colourgem_save colourgem\n*set claws_save claws\n*return\n\n*label load\n*set savegame savegame_save\n*set max_stamina max_stamina_save\n*set max_luck max_luck_save\n*set max_skill max_skill_save\n*set stamina stamina_save\n*set luck luck_save\n*set skill skill_save\n*set bullets bullets_save\n*set bullets_number bullets_number_save\n*set bulletclip bulletclip_save\n*set male male_save\n*set female female_save\n*set gm gm_save\n*set gf gf_save\n*set sm sm_save\n*set sf sf_save\n*set gold gold_save\n*set empty_inventory empty_inventory_save\n*set translation translation_save\n*set dynamite dynamite_save\n*set gun gun_save\n*set knuckle knuckle_save\n*set provisions provisions_save\n*set provisions_number provisions_number_save\n*set poisons poisons_save\n*set map map_save\n*set boxing boxing_save\n*set instant_win instant_win_save\n*set machete machete_save\n*set backpack backpack_save\n*set rope rope_save\n*set matches matches_save\n*set suit suit_save\n*set hook hook_save\n*set rabbitsfoot rabbitsfoot_save\n*set chefwhite chefwhite_save\n*set redcloth redcloth_save\n*set neckerchief neckerchief_save\n*set necklace necklace_save\n*set wax wax_save\n*set poemone poemone_save\n*set poemtwo poemtwo_save\n*set poemthree poemthree_save\n*set poemthree1 poemthree1_save\n*set greenbad greenbad_save\n*set redbad redbad_save\n*set machete1 machete1_save\n*set crown crown_save\n*set boar boar_save\n*set jaguar jaguar_save\n*set spot spot_save\n*set zombieten zombieten_save\n*set zombiefive zombiefive_save\n*set zombies zombies_save\n*set doll doll_save\n*set pill pill_save\n*set gibbonfree gibbonfree_save\n*set triceratops triceratops_save\n*set kerosene kerosene_save\n*set tablet tablet_save\n*set monkeytablet monkeytablet_save\n*set stick stick_save\n*set bone bone_save\n*set armourykey armourykey_save\n*set portcullisupstick portcullisupstick_save\n*set portcullisupbone portcullisupbone_save\n*set ladyjanedead ladyjanedead_save\n*set sirmalcolmdead sirmalcolmdead_save\n*set aliengun aliengun_save\n*set aliencannister aliencannister_save\n*set alienhelmet alienhelmet_save\n*set headjar headjar_save\n*set percivalheadinjar percivalheadinjar_save\n*set envelope envelope_save\n*set acidjar acidjar_save\n*set arrivedbyflight arrivedbyflight_save\n*set aliengunfiredonce aliengunfiredonce_save\n*set spidergem spidergem_save\n*set knowaboutkolf knowaboutkolf_save\n*set colourgem colourgem_save\n*set claws claws_save\n*return\n\n", "intro": "[b]Preface[/b]\n\nThis is an adventure in a traditional game book style. There is only one path to completing the game and a wrong turn can result in failure. This is why I used to play them with one finger on the last page I looked at, in case I decided to change my mind! \n\nIt will take many tries to learn the path!\n\nOn the next page you will be provided with three character statistics. These are luck, skill and stamina and you can increase one or more slightly. \n\nTesting your luck involves simulating rolling two 6 sided dice. If the total is equal to or lower than your luck statistic then congratulations you have been lucky this time. However, each time your luck is tested it goes down by one point so the more you ride your luck the more likely it is to run out eventually!\n\nSkill is an important statistic when fighting in the game. Your skill score is added to a roll of two 6 sided dice. If this total is more than that of the enemy you are fighting then you have hit them and they take damage. If not, they have hit you! \n\nYour stamina is reduced by 2 every time you are successfully hit by an enemy or you take damage from some other source. If it reaches zero then you are dead!\n\nNot everyone enjoys this aspect of the game, particularly if you have come a long way and died through some unlucky dice rolls. For this reason I have added an option to have an instant win whereby you can win any fight immediately [i]provided it is winnable by fighting in the first place.[/i]\n\nI have also added the option to save the game. This is as close as I can get to a \"turn back the page\" option!\n\n*page_break Allow me to introduce myself\n\nI am:\n*choice\n\t#Jill Sinclair\n\t\t*set female true\n\t\t*goto letsgo1\n\t#Jack Sinclair\n\t\t*set male true\n\t\t*goto letsgo1\n\t\t\n*label letsgo1\n*choice\n\t*if (female = true) #A true Lady never gets her hands dirty (Insta Win)\n\t\t*set instant_win true\n\t\tI am INVINCIBLE!\n\t\t*goto letsgo2\n\t*if (male = true) #A true gentleman never gets his hands dirty (Insta Win)\n\t\t*set instant_win true\n\t\tI am INVINCIBLE!\n\t\t*goto letsgo2\n\t*if (female = true) #I never cheat (Old Skool)\n\t\t*set instant_win false\n\t\tLuck be a gent tonight!\n\t\t*goto letsgo2\n\t*if (male = true) #I never cheat (Old Skool)\n\t\t*set instant_win false\n\t\tLuck be a lady tonight!\n\t\t*goto letsgo2\n*label letsgo2\n*choice\n\t#I want to be able to save my progress \n\t\t*set savegame true\n\t\t*goto letsgo\n\t#I do not want to save my progress\n\t\t*set savegame false\n\t\t*goto letsgo\n\t\t\t\n\n*label letsgo\t\t\n*page_break Well this is character building\n*goto_scene newchoosestats\n\n\n\n", "junglepath": "*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 false\n\t\t\t*set chapter4 false\n\t\t\t*set chapter5 false\n\t\t\t*set chapter6 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto youfollowa\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*if (chapter4 = true)\n\t\t\t\t*goto_scene marsh thesoft\n\t\t\t*if (chapter5 = true)\n\t\t\t\t*goto_scene creature itfeelsgood\n\t\t\t*else\n\t\t\t\t*goto youfollowa\n\t\t#No\n\t\t\t*goto youfollowa\n\n*label youfollowa\nYou follow a path through the jungle. It seems oppressive compared to the open river and you feel as if it could swallow you up at any moment. Your movement along the path disturbs something unseen that flees through the undergrowth on your approach. Turning a corner in the path you spot something that makes you freeze on the spot. \n*temp clown false\n*temp bullet_roll 0\n*temp bullet_damage 0\n\nA jaguar stares back at you impassively. Nobody moves. You see that it has been caught in a trap, a jungle vine fashioned into a noose around it’s neck has it trapped.\n*choice\n\t#Leave it\n\t\tVery carefully and slowly you walk around the jaguar. It doesn’t move as you approach and you find it’s stillness disconcerting. It looks at you all the while.\n\t\t*goto pathsplits\n\t#Free it\n\t\t*set jaguar true\n\t\tVery carefully and slowly you walk towards the jaguar. It doesn’t move as you approach and you find it’s stillness disconcerting. Gently you remove the noose and the jaguar walks slowly away. As it reaches the end of the path it turns and looks back at you once more before disappearing into the jungle.\n\t\t\n\t\t*label pathsplits\n\t\t*image heads.jpg\n\t\tThe path ahead splits\n\t\t*choice\n\t\t\t#Left\n\t\t\t\tThe jungle presses in on you from either side and forces you into walking single file down the path. The jungle canopy above makes it feel almost as if you are walking down a tunnel. In front of you is a large white toadstool with red spots. It is the size of a large chair. \n\t\t\t\t\n\t\t\t\t\"It seems the hookah smoking caterpillar is having a day off,\" says Sir Malcolm.\n\t\t\t\t*line_break\n\t\t\t\t*if (poisons = true)\n\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\n\t\t\t\t\t\t\"I'd give it a wide berth if I were you Jack,\" says Lady Jane. \"It's listed in the book as causing unconsciousness.\"\n\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\n\t\t\t\t\t\t\"I'd give it a wide berth if I were you Jill,\" says Lady Jane. \"It's listed in the book as causing unconsciousness.\"\n\t\t\t\t\t\n\t\t\t\t*choice\n\t\t\t\t\t#Walk around it\n\t\t\t\t\t\n\t\t\t\t\t\t\"Red cap means stay away,\" you say to yourself as you steer around the giant mushroom.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (jaguar = true)\n\t\t\t\t\t\t\t*goto dead\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto notclown\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#Kick it\n\t\t\t\t\t\t“Watch this!” you shout and kick the puffball with all your might. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*set clown true\n\t\t\t\t\t\tInstantly an enormous cloud of brown spores explodes from the mushroom and covers you all in a thick cloud of choking dust. It becomes extremely hard to breathe and you feel your head swimming until you lose consciousness.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou wake up with a headache and a dry throat. Looking around your companions are still sleeping so you wake them. You shake the snoring Sir Malcolm on the shoulder and he turns round to look at you groggily. With shock you can see that his face has been painted blue and his nose a bright red! His reaction to your face confirms that you have both been similarly decorated.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\"This is a big problem Jack,\" says Sir Malcolm.\n\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\"This is a big problem Jill,\" says Sir Malcolm.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I know. Who the hell is going to tell Lady Jane!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (jaguar = true)\n\t\t\t\t\t\t\t*goto dead\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto notdead1\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Right\n\t\t\t\tThe long grass that borders the path starts rustling ahead of you. It parts and a group of four small, loin clothed men stand in front. They do not appear friendly. This is confirmed when a spear thrown by the group whistles past your ear and you observe their war paint and the shrunken heads that hang from their necks like jewellery.\n\t\t\t\tYou must fight the:\n\t\t\t\t\n\t\t\t\t[b]Head Hunters[/b]\n\t\t\t\t\n\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\n\t\t\t\t*label headhunter_fight\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto roll_dice_loop\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"Let's see if two heads really are better than one\"\n\t\t\t\t\t\t*goto roll_dice_loopk\n\t\t\t\t\n\t\t\t\t\n\t\n\t\t\n\n*label dead\nAs you turn a corner in the path you see a body on the ground. From the black clothes and the crucifix held in his outstretched hand you guess this was a missionary priest. As you get closer to the body you can see that he has been badly mauled and clawed. You close his eyes and move on, saying a silent prayer.\n*goto north\n\n\n\n\t\n*label notclown\nAs you turn a corner in the path you almost bump into someone coming the opposite way. The missionary is dressed in black with a gold crucifix hanging from his neck. He speaks to you:\n\n\"Good day! Good day! How nice to meet other people!\"\n\nHe shakes everyone’s hand enthusiastically. He appears to be going to speak once more and then something catches his attention. \n\n\"My goodness, do you hear that? It is the Church Bells! I had quite forgotten the time, I must rush because the sermon can’t very well start without me can it?\" \n\nThe confused looks that pass between you and Lady Jane confirms that only the missionary appears to be able to hear these bells. As he rushes down the path and away from you he calls back:\n\n\"Some words of advice if I may travelers? Remember Isaiah. Blessed are those that stop their ears against hearing of Evil.\"\n\nWith that he is gone.\n*goto north\n\n\n*label clown\nAs you turn a corner in the path you almost bump into someone coming the opposite way. The missionary is dressed in black with a gold crucifix hanging from his neck. He speaks to you:\n\n\"Well, bless my soul! Good Day to you all. Is the Circus in town? I am not sure that this is the best place to set up a tent to be honest. For one thing they will have seen animals far more interesting than lions and tigers that’s for sure! Here, get yourselves cleaned up.\"\n\nHe hands you a handkerchief so you can wipe off the makeup.\n\n\"One more thing before I go,\" he says. \"Remember Isaiah. Blessed are those that stop their ears against hearing of Evil.\"\n\nWith that he is gone.\n*goto north\n*label north\nA single path leads North. You can see from the trampled ground that it has been frequently walked on. To your right is an enormous tree of immense height, the top of which is way out of sight. A ladder has been carved into it, winding up until it too goes out of sight.\n*choice\n\t#Climb the ladder\n\t\t*page_break The Tree People\n\t\t*goto_scene treepeople\n\t#Follow the path North\n\t\t*goto_scene kolfboy\n\n\n*label roll_dice_loop\n*temp headhunterdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand headhunterdiceresult 1 dicesides\n*line_break\nThe Head Hunters rolled ${headhunterdiceresult}\n*set diceresult +skill\n*set headhunterdiceresult +headhunterskill\n*line_break\nYour total: ${diceresult} Head Hunters total: ${headhunterdiceresult}\n*if (diceresult > headhunterdiceresult)\n\t*line_break\n\tThe head hunters scatter from your attack\n\t*set headhunterhp -2\n*if (diceresult \u003c headhunterdiceresult)\n\t*line_break\n\tThe head hunters attack you with their spears\n\t*set stamina -2\n*if (diceresult = headhunterdiceresult)\n\t*line_break\n\tYou regroup\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Head Hunters have ${headhunterhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (headhunterhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n*label roll_dice_loopk\n*temp headhunterdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand headhunterdiceresult 1 dicesides\n*line_break\nThe Head Hunters rolled ${headhunterdiceresult}\n*set diceresult +skill\n*set headhunterdiceresult +headhunterskill\n*line_break\nYour total: ${diceresult} Head Hunters total: ${headhunterdiceresult}\n*if (diceresult > headhunterdiceresult)\n\t*line_break\n\tYour punch sends the head hunters flying\n\t*set headhunterhp -3\n*if (diceresult \u003c headhunterdiceresult)\n\t*line_break\n\tThe head hunters hit you with their spears\n\t*set stamina -2\n*if (diceresult = headhunterdiceresult)\n\t*line_break\n\tYou regroup\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Head Hunters have ${headhunterhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (headhunterhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set headhunterhp - bullet_damage\nThe head hunters have ${headhunterhp} stamina remaining\n*if (headhunterhp \u003c 1)\n\t*goto win\n*else\n\t*goto headhunter_fight\n\n\t\n*label win\n\nYou close the eyes of the warriors respectfully. One of them is wearing a silver locket. Inside is the unsmiling photograph of a young lady. You look again at the shrunken heads adorning the fallen warriors and wonder.\n*if (stamina = max_stamina)\n\t*goto honey\n*elseif (provisions = false)\n\t*goto honey\n*else\n\t*goto choice9\n*label choice9\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto honey\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto honey\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto honey\n\t*if (provisions = false) #Move on\n\t\t*goto honey\n\n*label honey\n\nAs you move on the air fills with an intensely sweet smell from the bright purple flowers that are growing all around. It makes you think of honey pancakes and your mouth waters. There is a tree stump standing alone, covered in thick green moss. There are many holes in the stump but you cannot see inside. As you look more closely you can hear something moving around inside.\n*choice\n\t#Ignore the stump\n\t\tAs you pass the stump you can hear something scuttling around inside.\n\t\t\n\t\t*if (jaguar = true)\n\t\t\t*goto dead\n\t\t*else\n\t\t\t*goto notdead1\n\n\t#Put your hand inside\n\t\tYou reach into the hole and feel around.\n\t\t*choice\n\t\t\t#Test your luck\n\t\t\t\t*gosub lucktestgosub\n\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t*set luck -1\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\tYour hand grasps around what feels like a bone handle of some kind. Pulling your arm free you recoil at what you have pulled from the stump. It is a spider-like creature about the size of a dinner plate, with legs like hairy chopsticks that jitter about in the air. You have grasped it by the tail, narrowly avoiding its large stinger. On its back is a white patch that stands out starkly from the black body. Sir Malcolm speaks quietly:\n\t\t\t\t\t\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\"Hold him carefully as you are, Jack, I know what to do.\"\n\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\"Hold him carefully as you are, Jill, I know what to do.\"\n\t\t\t\t\t\n\t\t\t\t\t\tSlowly and carefully Sir Malcolm reaches into his pocket and pulls out a champagne cork. \n\t\t\t\t\t\n\t\t\t\t\t\t\"This cork has been with me since I celebrated beating Clubber McGee.\"\n\t\t\t\t\t\n\t\t\t\t\t\tYou all hold your breath as he places the cork on the end of the creatures stinger and you let out a collective sigh when the job is done. \n\t\t\t\t\t\n\t\t\t\t\t\t\"Nearly done!\" he says cheerfully as he ties a small noose around the neck of the odious and twitching insect. “C'mon boy, walkies!” he says laughing as he places the creature on the ground and gently pulls on his improvised lead. The creature scuttles along behind.\n\t\t\t\t\t\n\t\t\t\t\t\t\"I think I will call him Fido,\" says Sir Malcolm.\n\t\t\t\t\t\n\t\t\t\t\t\t\"Surely Spot would be better?\" says Lady Jane.\n\t\t\t\t\t\n\t\t\t\t\t\t\"Oh yes! Quite right,\" replies Sir Malcolm and you continue along the path.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set spot true\n\t\t\t\t\t\t*if (jaguar = true)\n\t\t\t\t\t\t\t*goto dead\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto notdead1\n\t\t\t\t\t\n\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\tYou reach into the hole and feel around. You touch some dried leaves with your finger tips but there is nothing to grasp. As you start to pull your arm back out of the stump you feel a sharp prick followed by a wave of horrendous pain. Something has stung you! You roll around in agony holding your arm.\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Lose 4 stamina points[/i]\n\t\t\t\t\t\t*set stamina -4\n\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*goto pain\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\n\t\n\n*label winshot\nYour shot hits the leader in the head, killing him instantly. The remaining head hunters look at each other and flee back into the jungle.\n\n*if (male = true)\n\t\"I guess they didn't fancy their chances against your sharpshooting Jack!\" chuckles Sir Malcolm.\n*if (female = true)\n\t\"I guess they didn't fancy their chances against your sharpshooting Jill!\" chuckles Sir Malcolm.\n*goto honey\n\n*label click\nYou line up your shot and pull the trigger. The gun clicks uselessly.\n\nThe head hunters respond by making a gun shape with their fingers and mimic pulling the trigger whilst making clicking noises with their tongues.\n*goto roll_dice_loop\n\n*label notdead1\n*if (spot = true)\n\t*goto spot\n*if (clown = true)\n\t*goto clown\n*if (spot = false)\n\t*goto notclown\n\t\n*label spot\n\nAs you turn a corner in the path you almost bump into someone coming the opposite way. The missionary is dressed in black with a gold crucifix hanging from his neck. On seeing the scuttling monstrosity he nervously flattens himself to the side of the path and extends his crucifix towards you. Facing you at all times he slowly manoeuvrers himself past you until he is some way off. He ignores your greetings and attempts to speak to him until he is far enough away, then he calls back down the path to you: \n\n\"Some words of advice if I may travellers? Remember Isaiah. Blessed are those that stop their ears against hearing of Evil. Further Blessed are those that do not cavort with Evil lest one night Evil shall break free and scuttle up their trousers while they sleep.\"\n\nYou exchange amused glances with each other, no one willing to say they don’t exactly recognise the last quote. \n\nWith that he is gone.\n*goto north\n\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\t\n*label pain\nSir Malcolm and Lady Jane move from a state of great concern to eventual exasperation until finally the pain has subsided enough for you to continue on.\n\n\"Are you going to try again with the other arm?\" asks Sir Malcolm with a straight face whilst Lady Jane turns away and pretends to be preoccupied with some flora, her shoulders shaking in silent laughter. \n\n*if (jaguar = true)\n\t*goto dead\n*else \n\t*goto notdead1\n\n\n", "kolfboy": "*temp bullet_roll 0\n*temp bullet_damage 0\n*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 false\n\t\t\t*set chapter4 false\n\t\t\t*set chapter5 false\n\t\t\t*set chapter6 false\n\t\t\t*set chapter7 false\n\t\t\t*set chapter8 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto upaheadis\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*if (chapter4 = true)\n\t\t\t\t*goto_scene marsh thesoft\n\t\t\t*if (chapter5 = true)\n\t\t\t\t*goto_scene creature itfeelsgood\n\t\t\t*if (chapter6 = true)\n\t\t\t\t*goto_scene junglepath youfollowa\n\t\t\t*if (chapter7 = true)\n\t\t\t\t*goto_scene treepeople theladder\n\t\t\t*else\n\t\t\t\t*goto upaheadis\n\t\t#No\n\t\t\t*goto upaheadis\n\n*temp bullet_roll 0\n*temp bullet_damage 0\n*label upaheadis\nUp ahead is a sign. As you get closer you see it is a withered hand that has been nailed to a post in the ground. It points North towards a small path that winds through the jungle. A leathery pouch has been tied to the hand. The path also goes East and West. Many charms made from sticks hang in the trees on the Western path, spinning slowly. \n*temp bullet_roll 0\n*temp bullet_damage 0\n\nLady Jane nudges you in the ribs and points to the Eastern path. A thick line of white powder runs across it. She dabs some on her tongue.\n\n\"It's salt.\"\n*choice\n\t#West\n\t\tYou brush past jungle fronds that line the path on either side. Disturbing the leaves sprinkles you with cooling drops of moisture. You push through growth that threatens to take over the path completely and break through to a shallow rocky pool of crystal clear water. Flat rocks around the pool make a path to a cave entrance. \n\t\t\n\t\tOnce inside smooth stone steps lead down to a cavern illuminated by a flickering blue light. Some steps on the other side of the cavern lead upwards. The cavern floor is littered with bones. In the middle of the floor lies the body of a young woman wearing a simple white robe. Her arms are crossed over her chest and her face is one of calm repose as if sleeping.\n\t\t\n\t\t*if (male = true)\n\t\t\t\"Does it need me to say this is a strange place for a nap Jack?\" says Sir Malcolm.\n\t\t*if (female = true)\n\t\t\t\"Does it need me to say this is a strange place for a nap Jill?\" says Sir Malcolm.\n\t\t\n\t\tThe light dims then flares then dims again. The lady’s eyes flick open. She looks at you and screams. With horrible contortions her head detaches from her body and starts to fly around the cavern, entrails still attached! Lady Jane gags and you stare in disbelief. The head swoops towards you with wide eyes and mouth.\n\t\tYou must fight the:\n\t\t\n\t\t[b]Penanggalan[/b]\n\t\t\n\t\t[b]Skill 8, Stamina 8[/b]\n\t\t\n\t\t*label penanggalan_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto roll_dice_loop\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"I'm going to knock your block off...again\"\n\t\t\t\t*goto roll_dice_loopk\n\t#North\n\t\t*label garish\n\t\t\n\t\tA garishly painted wooden hut with a straw roof stands in the middle of a clearing. All manner of charms and trinkets hang from the thatch. As you approach a figure runs out of the hut towards you. The masked figure races towards you shrieking! In one hand they hold a rattle covered in feathers and bells and they are gesticulating wildly with their other hand. Their wooden mask is painted to resemble a demon with long fangs.\n\t\t*choice\n\t\t\t#Wait to see what happens next\n\t\t\t\t*label wait\n\t\t\t\tThe witchdoctor dances around you a bit more and then stops, gesturing for you to enter her hut.\n\t\t\t\t\n\t\t\t\tA pot hangs over a fire in the middle of the cabin. The witchdoctor removes her mask, showing a kind face that is wise and deeply lined from the sun. She takes some herbs from a pouch around her neck and sprinkles them into the cauldron. A pungent smell fills the hut as she stirs and fusses over the brew.\n\t\t\t\t\n\t\t\t\t\"I see great danger ahead. The Kolf boy. See no evil, hear no evil, speak no evil.\t\n\t\t\t\t*set knowaboutkolf true\n\t\t\t\t*if (redcloth = true)\n\t\t\t\t\t*goto thiswillhelp\n\t\t\t\t*else \n\t\t\t\t\t*goto youhavenothing\n\t\t\t\t*label thiswillhelp\n\t\t\t\tGive me that scrap of red cloth you hold.\"\n\t\t\t\t\n\t\t\t\tHanding over the cloth the witchdoctor reaches to one of the many charms hanging inside the hut. She ties the cloth to a small straw doll and whispers to it in her cupped hands. Handing it back to you she says: \n\t\t\t\t\n\t\t\t\t\"This will help.\"\n\t\t\t\t\n\t\t\t\t*set doll true\n\t\t\t\t*goto timetogo\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*label youhavenothing\n\t\t\t\tYou have nothing I can use.\"\n\t\t\t\t\n\t\t\t\tShe seems troubled as she reaches to one of the many charms hanging inside the hut. She hands you each a green pill.\n\t\t\t\t\n\t\t\t\t*set pill true\t\t\t\t\n\t\t\t\t\"If you meet the Kolf-Boy Demon, eat this,\" she says sadly. \n\t\t\t\t\n\t\t\t\t*label timetogo\n\t\t\t\t\"It is time to go now,\" she says. \"Good luck.\"\n\t\t\t\t\n\t\t\t\t*if (spot)\n\t\t\t\t\t*goto leavethatwithme\n\t\t\t\t*else \n\t\t\t\t\t*goto nightiscoming\n\t\t\t\t*label leavethatwithme\n\t\t\t\t\"One more thing - you had better leave that with me,\" says the witchdoctor and she takes Spot's lead.\n\t\t\t\t*set spot false\n\t\t\t\t*goto nightiscoming\n\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t\n\t\t\t\t\n\t\t\t#Fight\n\t\t\t\t*label splits\n\t\t\t\tAs you prepare to fight the witchdoctor waves the rattle in the air. Before your eyes the withdoctor splits into two, then four then eight and in an instant there are scores of witchdoctors around you. You strike at the nearest figure but your fist passes straight through. Laughter fills the air and the figures start to dissipate. As quickly as they came they have now departed and you are alone.\n\t\t\t\t*choice\n\t\t\t\t\t#Investigate the hut\n\t\t\t\t\t\tA pot hangs over a fire in the middle of the hut. Charms of all kinds hang everywhere but you have no clue as to their purpose or uses. You leave.\n\t\t\t\t\t\t*goto nightiscoming\n\t\t\t\t\t#Carry on\n\t\t\t\t\t\t*goto nightiscoming\n\t\t\t\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damage2\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click2\n\t\t\t\t*else \n\t\t\t\t\t*goto wait\n\t\t\t\t\n\t\t\t\t\n\t\t\n\t#East\n\t\tYou all step carefully over the salt.\n\t\t\n\t\tA black bird with a white beak is perched on a tree branch, looking down the path towards you. As you get closer it flies away, it’s tail trailing behind like black ribbons on a kite.\n\t\t\n\t\tAt the end of the path is a hut in a large clearing. Numerous graves have been dug all around, marked crudely with sticks and stones. Some are freshly dug. Native gardeners are engaged in various tasks around the hut. They move slowly and clumsily.\n\t\t\n\t\t\"These guys look like they are being paid by the hour,\" says Sir Malcolm. \n\t\t\n\t\tLady Jane looks pensive. The hut door opens and a figure in black shuffles forward. They are leaning heavily on a stick that has been ornately carved. The black bird is perched on their shoulder. The hunched figure speaks:\n\t\t\n\t\t\"Welcome strangers. You are just in time for… well, what would you call it? A resurrection? A birth?\"\n\t\t\n\t\tHe stands over one of the freshly dug graves and begins mumbling whilst scattering some powder. The slow moving gardeners continue their work obliviously.\n\t\t*choice\n\t\t\t#Wait to see what happens\n\t\t\t\t*set knowaboutkolf true\n\t\t\t\tYou watch with fascination as something starts to break through the surface of the freshly dug earth. \n\t\t\t\t\n\t\t\t\t\"What are those? Worms?\" asks Sir Malcolm.\n\t\t\t\t\n\t\t\t\t\"I’m afraid not,\" replies Lady Jane. \"They are fingers.\"\n\t\t\t\t\n\t\t\t\tA body claws it’s way out of the grave while the black clad figure chuckles. Eventually it stands upright, eyes milky and opaque. \n\t\t\t\t\n\t\t\t\t*label comeinside\n\t\t\t\t\"Come inside won’t you? I have a proposal,\" says the robed figure.\n\t\t\t\t\n\t\t\t\tA native woman uncomprehendingly stirs a pot that hangs over gently glowing coals. There are stone jars on the floor and bunches of herbs hanging from the roof. The black bird flies off of the old man’s shoulder and alights on a perch in the corner. The smell of the soup fills the air but it does not make you feel hungry. It seems out of place and reminds you of visiting a hospital. The necromancer speaks:\n\t\t\t\t\n\t\t\t\t\"You are going to meet the Kolf Boy. This I have seen. I can provide you with warriors, for a price.\n\t\t\t\t*if (spot = true)\n\t\t\t\t\t*goto samaki\n\t\t\t\t*elseif (gold > 0)\n\t\t\t\t\t*goto five\n\t\t\t\t*else\n\t\t\t\t\t*goto sneers\n\t\t\t\t\t*label samaki\n\t\t\t\t\t\n\t\t\t\t\tI see you have a Samaki. I will give you all ten of my warriors for that,\" he says, looking at Spot.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Deal\n\t\t\t\t\t\t\t*set spot false\n\t\t\t\t\t\t\t*set zombieten true\n\t\t\t\t\t\t\t*set zombies true\n\t\t\t\t\t\t\t\"Excellent, excellent. Take this\" \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t*label pouch\n\t\t\t\t\t\t\tHe hands you a small leather pouch and tethers spot in the corner of the hut. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"My boys will follow you so long as you have this pouch. When you reach the Kolf Boy you can order them to attack by telling them to touye, touye, touye. Now go.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou leave the hut with your shuffling army behind you and share uneasy glances between your companions.\n\t\t\t\t\t\t\t*goto nightiscoming\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t#No Deal\n\t\t\t\t\t\t\t*label nodeal\n\t\t\t\t\t\t\tThe old man’s eyes flash momentarily with anger. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Then you will die,\" he hisses. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\tRegaining his composure he grasps Sir Malcolm's bicep and smiles. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"I am sure you can still be of some use, perhaps I will see you again. Now leave me.\"\n\t\t\t\t\t\t\t*goto nightiscoming\n\t\t\t\t\n\t\t\t\t\t*label five\n\t\t\t\t\tI will provide five warriors for all your gold.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Deal\n\t\t\t\t\t\t\t*set gold 0\n\t\t\t\t\t\t\t*set zombies true\n\t\t\t\t\t\t\t\"Excellent, excellent. Take this\" \n\t\t\t\t\t\t\t*set zombiefive true\n\t\t\t\t\t\t\t*goto pouch\n\t\t\t\t\t\t\n\t\t\t\t\t\t#No Deal\n\t\t\t\t\t\t\t*goto nodeal\n\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\t*label sneers\n\t\t\t\t\tHe looks you over and sneers.\n\t\t\t\t\t\n\t\t\t\t\t\"You have nothing of use to me,\" he says contemptuously.\n\t\t\t\t\t\n\t\t\t\t\tRegaining his composure he grasps Sir Malcolm's bicep and smiles.\n\t\t\t\t\t\n\t\t\t\t\t\"I am sure you can still be of some use, perhaps I will see you again. Now leave me\".\n\t\t\t\t\t*goto nightiscoming\n\t\t\t\t\t\n\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t#Speak to one of the workers\n\t\t\t\tYou approach one of the workers who is watering a plant. He doesn’t react to your presence in any way. After several unsuccessful attempts to speak to him you grab him by the shoulders and spin him to face you. His eyes are milky white and his expression blank. As soon as you relax your grip he returns to his task.\n\t\t\t\t\n\t\t\t\t*goto comeinside\n\t\t\t#Fight him\n\t\t\t\tAs soon as you launch your attack the old man reaches into his cloak with surprising speed and throws something to the ground. A blinding flash is followed by thick black smoke. When it clears the man has gone and the slow moving gardeners now face you, tools lifted as weapons. \n\t\t\t\t*label zombiefight\n\t\t\t\tYou must fight the:\n\t\t\t\t\n\t\t\t\t[b]Zombies[/b]\n\t\t\t\t\n\t\t\t\t[b]Skill 5, Stamina 12[/b]\n\t\t\t\t\n\t\t\t\t*label zombie_fight\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto roll_dice_loop1\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click1\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win1\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"Let's see if this wakes you up a bit\"\n\t\t\t\t\t\t*goto roll_dice_loopk1\n\t\t\t\t\n\t\t\t#Grab his stick\n\t\t\t\tYou lunge forward and pull the stick out of the old mans hands. He lets go immediately and you rock backwards a little. You hold the stick up above your head in triumph but you can feel it bending down towards you! The stick twists and writhes in your hands and you throw it to the ground. It has transformed into a tree snake! It rears up and fixes you with it’s mean red eyes, swaying slightly and hissing. Clear venom drips down it’s oversized fangs and you freeze. \n\t\t\t\t\n\t\t\t\tThe old man slowly walks inside and closes the door of the hut. As soon as he has gone the snake slithers away into the undergrowth. The slow moving gardeners stop their work and slowly turn towards you, raising their tools as weapons. They lurch towards you.\n\t\t\t\t*goto zombiefight\n\t\t\t\n\n*label win\n\nThe head lies near to her body, staring upwards. You close her eyes and make the body as whole again as you can.\n\n\"I hope she is at peace now,\" says Lady Jane.\n*if (stamina = max_stamina)\n\t*goto garish1\n*elseif (provisions = false)\n\t*goto garish1\n*else\n\t*goto choice1\n*label choice1\n\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto garish1\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto garish1\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto garish1\n\t*if (provisions = false) #Leave the cave\n\t\t*goto garish1\n*label garish1\nYou take the stairs leading out of the cave and return gratefully to the sunlight. \n*goto garish\n\n\n*label winshot\nYour shot hits the Penanggalan right between the eyes and it drops from the air like a stone.\n\n*goto win\n\n*label click\nYou get a bead on the bobbing head and pull the trigger. Click.\n\nThe Penanggalan emits and ear splitting scream.\n\n\"Could not have put that better myself,\" says Sir Malcolm.\n*goto roll_dice_loop\n\n*label roll_dice_loop\n*temp penanggalandiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand penanggalandiceresult 1 dicesides\n*line_break\nThe Penanggalan rolled ${penanggalandiceresult}\n*set diceresult +skill\n*set penanggalandiceresult +penanggalanskill\n*line_break\nYour total: ${diceresult} Penanggalan total: ${penanggalandiceresult}\n*if (diceresult > penanggalandiceresult)\n\t*line_break\n\tYou punch the Penanggalan and it bobs like a balloon\n\t*set penanggalanhp -2\n*if (diceresult \u003c penanggalandiceresult)\n\t*line_break\n\tThe Penanggalan cuts you with her tongue\n\t*set stamina -2\n*if (diceresult = penanggalandiceresult)\n\t*line_break\n\tThe Penanggalan floats around menacingly\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe penanggalan has ${penanggalanhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (penanggalanhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set penanggalanhp - bullet_damage\nThe Penanggalan has ${penanggalanhp} stamina remaining\n*if (penanggalanhp \u003c 1)\n\t*goto win\n*else\n\t*goto penanggalan_fight\n\n\t\n\t\n*label roll_dice_loopk\n*temp penanggalandiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand penanggalandiceresult 1 dicesides\n*line_break\nThe Penanggalan rolled ${penanggalandiceresult}\n*set diceresult +skill\n*set penanggalandiceresult +penanggalanskill\n*line_break\nYour total: ${diceresult} Penanggalan total: ${penanggalandiceresult}\n*if (diceresult > penanggalandiceresult)\n\t*line_break\n\tYour punch sends the Penanggalan soaring upwards\n\t*set penanggalanhp -3\n*if (diceresult \u003c penanggalandiceresult)\n\t*line_break\n\tThe Penanggalan cuts you with her tongue\n\t*set stamina -2\n*if (diceresult = penanggalandiceresult)\n\t*line_break\n\tThe Penanggalan floats around menacingly\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe penanggalan has ${penanggalanhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (penanggalanhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n\t\n*label nightiscoming\n\nNight is coming. Bright torches dance in the jungle ahead.\n*page_break The Kolf Boy\n*goto_scene kolfboyproper\n\n\n\n*label roll_dice_loop1\n*temp zombiediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${di
