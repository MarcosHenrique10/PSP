he river\n\t\t\t\t\t\t\t\t\t\t\t\t*goto jump\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if (dynamite = true) #Wait until they are at the village and booby trap their tribute with the dynamite\n\t\t\t\t\t\t\t\t*set dynamite false\n\t\t\t\t\t\t\t\tYou discuss your plan with the elder and conceal the dynamite beneath a growing pile of tribute that has been gathered by the villagers. After yesterdays offering and the evening feast you can see that this is all they have left. Sir Malcolm hides nearby, ready. It takes until nearly morning for everything to be ready and soon you see the first rays of dawn arrive almost immediately accompanied by roosters crowing in the village behind you. With the elder and her guards by your side a horn in the distance signifies the imminent arrival of the Shetani tribe. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tOn the horizon you see the ordered ranks of the Shetani with their chieftain at the head. He is riding a scythed chariot, the swords flashing as they catch the sun. Strings of heads are tied to the side and they bounce along energetically, a final indignity. The chieftain hurtles into the village in a cloud of dust and leaps from his chariot furiously. He is older than you had guessed, thin and wiry. His teeth have been filed down to sharp points and his bald head and pointed ears give him a bat like appearance. Two warriors stand by his side, each armed with a sword that looks ridiculously oversized to you. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tHe remonstrates with the elder and repeatedly gestures to the pile of tribute, picking up various items and throwing them back contemptuously. Outside the gates his army stand in ranks. You look to where Sir Malcolm is concealed and wink briefly. Sir Malcolm lights the fuse and you slowly edge back a little from the pile. The elder does the same, holding her hands up apologetically and backing slowly away. The chieftain continues his rant and once more returns to the offering pile where he reaches down to grab a weedy looking banana. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAs he bends down his face briefly registers confusion before a massive blast consumes him and his bodyguard. There is a moment of silence before the exploded offerings (and other less inviting fare) starts to cascade down onto the village. The army outside are stunned but soon they rouse themselves into action and march towards the village, shields raised. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Run\n\t\t\t\t\t\t\t\t\t\t*goto runaway\n\t\t\t\t\t\t\t\t\t#Stay and fight\n\t\t\t\t\t\t\t\t\t\t*goto stayandfight\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if (gun = true) #Hide in the village and shoot their leader\n\t\t\t\t\t\t\t\tYou discuss your plan with the elder and conceal yourself in a hit that overlooks a growing pile of tribute that has been gathered by the villagers. After yesterdays offering and the evening feast you can see that this is all they have left. It takes until nearly morning for everything to be ready and soon you see the first rays of dawn arrive almost immediately accompanied by roosters crowing in the village behind you. With the elder and her guards by your side a horn in the distance signifies the imminent arrival of the Shetani tribe. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tOn the horizon you see their ordered ranks with the chieftain at the head. He is riding a scythed chariot, the swords flashing as they catch the sun. Strings of heads are tied to the side and they bounce along energetically, a final indignity. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe chieftain hurtles into the village in a cloud of dust and leaps from his chariot furiously. He is older than you had guessed, thin and wiry. His teeth have been filed down to sharp points and his bald head and pointed ears give him a bat like appearance. Two warriors stand by his side, each armed with a sword that looks ridiculously oversized to you. He remonstrates with the elder and repeatedly gestures to the pile of tribute, picking up various items and throwing them back contemptuously. Outside the gates his army stand in ranks. When his back is turned you get him into your sights.\n\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto click\n\t\t\t\t\t\t\t#Block them in the valley with a man-made avalanche at both ends and attack from above\n\t\t\t\t\t\t\t\tYou discuss your plan with the elder. When night falls every able bodied person goes to the valley to prepare. The night is clear and surprisingly chilly. The valley is tight and winding with sheer sides that stretch up at least a hundred foot. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWith Lady Jane interpreting you divide the villagers into two groups. Sir Malcolm takes his group to the valley entrance and you stay with the other half where the valley leads out to the village. Under the moonlight the villagers make piles of rocks and place levers under boulders in preparation for the morning. Hiding in the rocks above the valley you hear the distant crowing of roosters from the village, heralding dawn. The sounds of crashing rocks reverberates down the valley towards you, confirming that Sir Malcolm’s group have blocked the valley entrance at the passing of the Shetani. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSounds of shouted orders, running and horses increase in volume and soon you can see the Shetani army rushing down the valley towards the village. You give the signal and the villagers emerge from hiding and begin pushing and levering boulders down the slopes into the valley. The warrior chieftain's chariot races round a bend in the valley and comes to a skidding halt in front of the landslide that now blocks their exit. Behind him are warriors on horseback followed by foot soldiers. He looks up to the ridge and you can see from his expression he has grasped the plan. The villagers begin barraging the Shetani with rocks from above.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label nowheretogo\n\t\t\t\t\t\t\t\tWith nowhere to go the Shetani are soon totally destroyed.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe jubilant elder rewards you with a large supply of provisions.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]3 packs of provisions added to inventory[/i]\n\t\t\t\t\t\t\t\t*set provisions true\n\t\t\t\t\t\t\t\t*set provisions_number +3\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tBefore you leave the elder speaks to Lady Jane who once again translates:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"There is a stone key, too heavy to lift and yet it can open the way.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou ride out of the village in triumph, the cheers of the Amani carrying on the wind long after you are out of sight.\n\t\t\t\t\t\t\t\t*goto soonyoufind\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Block their retreat from the valley with a man-made avalanche and drive the triceratops into them\n\t\t\t\t\t\t\t\tYou discuss your plan with the elder. When night falls every able bodied person goes to the valley to prepare. The night is clear and surprisingly chilly. The valley is tight and winding with sheer sides that stretch up at least a hundred foot. With Lady Jane interpreting you direct the villagers to the far side of the valley where they prepare for the ambush, using branches as levers to topple the largest boulders. Lady Jane stays with them and you return to the village with the elder, her guards and Sir Malcolm. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I'm not sure how we are going to complete the second part of the plan?\" you ask Sir Malcolm.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\"Leave that to me old boy, I know exactly what to do.\"\n\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\"Leave that to me old girl, I know exactly what to do.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSir Malcolm gathers the young and old villagers and through sign language and a hands-on approach he manages to create two lines of villagers with hands linked.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I am going to use them as a funnel!\" he says, pointing towards the valley entrance. \"Now for the fun bit!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSir Malcolm enters the paddock with the triceratops. He goes right to the back and calls out:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Ready when you are!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tOn receiving a signal passed down from the valley Sir Malcolm slaps the nearest Triceratops on it's rump and it snorts with disgruntlement. Through a combination of shouting and arm waving he has soon started a stampede.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe Triceratops hurtle into the valley, sweeping all before them. \n\t\t\t\t\t\t\t\t*goto nowheretogo\n\t\t\t\t\t\t\t#Pretend you will help then run away\n\t\t\t\t\t\t\t\tYou draw up complicated battle plans and arrange the Amani into various formations. Whenever you are asked for clarification you explain through complicated diagrams connected with arrows.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tBy the time morning arrives the Amani are tired and confused. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSounds of the approaching Shetani army come from the valley and soon they have arrived. Outside the village they start forming into units, shields raised. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe chieftain looks to you for guidance just in time to see you turning and fleeing. Shock fills her face.\n\t\t\t\t\t\t\t\t*goto spurring\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t#Refuse\n\t\t\t\t\t\tThe elder looks at you in disbelief and then angrily gestures for you to leave. From her reaction and the faces of the tribe you do not delay and you leave in a hurry.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label winrun\n\t\t\t\t\t\tYou find yourselves alongside a wide and fast flowing river. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"This must be what carried us to the village,\" says Sir Malcolm. \"We can follow this to its source and get back on track.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tSomething white by the rivers edge catches your attention. It is the skeleton of a horse. There is not a scrap of flesh on it anywhere. You pass the skeleton and find more, including the remains of a rider. Only metal and bone have been left behind. \n\t\t\t\t\t\t\n\t\t\t\t\t\tComing down the path towards you is a torrent of black, coating everything in it’s path. Suddenly the  bones make sense \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Ants!\" shouts lady Jane\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Stay\n\t\t\t\t\t\t\t\t*label stay\n\t\t\t\t\t\t\t\tThe black tide of ants is spilling towards you at an alarming rate. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Don't move!\" you shout. \"They can't see us if we stay perfectly still!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWithin moments the ants have reached you and everywhere you look is a shimmering sea of black. You start to scream but before you can make a sound the ants pour in.\n\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t#Jump into the river\n\t\t\t\t\t\t\t\t*goto jump\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t#Ask to leave\n\t\t\t\tThrough Lady Jane you make it clear that you want to leave immediately. To everyone's obvious embarrassment the elder agrees and you are provided with some lit torches to guide the way. \n\t\t\t\t\n\t\t\t\t*label torchlight\n\t\t\t\tYou find yourselves alongside a wide and fast flowing river. Your torches are reflected in the rippling water. The torchlight reveals something white by the rivers edge. It is the skeleton of a horse. Further up are the remains of it's rider. \n\t\t\t\t\n\t\t\t\t*label erased\n\t\t\t\tStrangely the rider's skeleton starts to disappear into the dark, as if it is being erased! When it is completely gone you realise that it has been submerged under a torrent of ants!\n\t\t\t\t*choice\n\t\t\t\t\t#Jump into the river\n\t\t\t\t\t\t*label jump\n\t\t\t\t\t\tThe black tide of ants is spilling towards you at an alarming rate. “Jump!” you shout and the three of you leap into the white water of the river. The cold water hits you like a punch to the stomach and you fight for breath while the current propels you. You are eventually washed up on the river's edge.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe ground here is soft and spongy and as you progress you find yourselves entering a marsh. The air is fetid and clammy.\n\t\t\t\t\t\t*page_break The Marsh\n\t\t\t\t\t\t*goto_scene marsh\n\t\t\t\t\t#Stay on the path\n\t\t\t\t\t\tThe black tide of ants is spilling towards you at an alarming rate. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Don't move!\" you shout. \"They can't see us in the dark!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWithin moments the ants have reached you and everywhere you look is a shimmering sea of black. You start to scream but before you can make a sound the ants pour in.\n\t\t\t\t\t\t*goto_scene youdied\n\t\t\n\t#Try to communicate\n\t\tYou speak slowly and loudly to the riders who stare at you blankly:\n\t\t\n\t\t\"We mean you no harm!\" you shout. \"Take us to your leader!\"\n\t\t\n\t\tThe riders indicate with their spears that they want you to raise your hands and surrender. \n\t\t*choice \n\t\t\t#Run\n\t\t\t\t*goto run\n\t\t\t#Fight\n\t\t\t\t*goto fight\n\t\t\t#Surrender\n\t\t\t\tYou raise your hands and the riders escort you back to their village, the points of their spears in your back a pressing reminder not to try anything. Soon you enter their village and are tied to a fence that forms part of an enclosure for a herd of the Triceratops. There must be at least fifty grazing calmly. There are ten white huts, some of which hold curious faces in the doorways. The riders that captured you are talking to a village elder and occasionally waving their arms back in your direction. All of your kit is taken into the hut.\n\t\t\t\t*comment set inventory all to zero\n\t\t\t\t*goto youngboy\n\t\t\t\t\n*label youngboy\nA young boy passes by eating a large fruit of some kind, purple juice dribbling down his chin. He looks at you quizically.\n*choice\n\t#Make a face\n\t\tYou make faces at the boy and he frowns at you. You carry on and he retaliates by throwing the fruit in your face! Thick syrupy juice drips down and the world takes on a purple tinge as your ears fill with the sounds of Lady Jane and Sir Malcolm laughing. \n\t\t\n\t\tThe fruit drops down your front and you drag it towards you with your feet. After much careful maneuvering you are able to drag it towards your bound hands and rub it all over the rope that ties your hands. It is not long before one of the beasts behind you is happily munching on the rope. By nightfall your hands are free. There is a faint glow coming from the elder's hut.\n\t\t*choice\n\t\t\t#Leave the village\n\t\t\t\tIn the dead of night you quietly creep out of the village. As you leave through the main gate you take a couple of torches to show the way. The light from your torches illuminates three backpacks, awaiting your collection! You take them silently, mouthing \"no idea\" at each other.\n\t\t\t\t\n\t\t\t\tYou find yourselves alongside a wide and fast flowing river. Your torches are reflected in the rippling water. The torchlight also reveals something white by the rivers edge. It is the skeleton of a horse. Further up are the remains of it's rider. \n\t\t\t\t*goto erased\t\t\t\t\n\t\t\t#Get your backpacks\n\t\t\t\tSticking to the shadows you creep towards the Elder's hut and slowly open the door. \n\t\t\t\t\n\t\t\t\tMany faces turn towards you and you can see that the Elder is conferring with the heads of the tribe, studying a map rolled out on a table.\n\t\t\t\t\n\t\t\t\tShe signals you impatiently to take your backpacks and leave. No one seems surprised or interested at your escape.\n\t\t\t\t\n\t\t\t\tAs you leave through the main gate you take a couple of torches to show the way. \n\t\t\t\t\n\t\t\t\t\"You know,\" says Lady Jane, \"I have absolutely no idea what just happened.\"\n\t\t\t\t\n\t\t\t\t\"Agreed,\" reply you and Sir Malcolm simultaneously, shaking your heads as you move on.\n\t\t\t\t*goto torchlight\n\t\t\t\t\n\t#Ask for help\n\t\tYou ask for help but he doesn’t understand you. He looks at you curiously for a while and is then distracted by something else. Day turns to night.\n\t\t\n\t\t*label firstrays\n\t\t*line_break\n\t\tWith the first rays of sun you are taken bleary eyed into the centre of the village. The elder is there, flanked by her three guards. Many straw baskets are filled with vegetables and cured meats. A horn sounds somewhere in the distance and four riders come through the entrance to the village shortly afterwards. Three warriors armed with bow and arrows ride sleek black horses and a fourth rider is driving a simplistic looking wagon. The warriors dismount and the leader strides towards the village elder whilst his companions load the carriage. You watch as the warrior shouts and waves his arms around, pointing at the food and prodding the elder in her chest. She points in your direction and the warrior glances over then resumes his ranting. When the food has been loaded he makes one final aggressive gesture and they ride out at speed, kicking up dust. \n\t\t\n\t\tAfter they have gone the elder speaks to her guards and returns to her hut with them. Shortly after the guards emerge with your backpacks. They put them at your feet while one unties you. Then they signal for you to pick up your belongings and leave. \n\t\t\n\t\t\"You know,\" says Lady Jane \"I have absolutely no idea what just happened.\"\n\t\t\n\t\t\"Agreed,\" reply you and Sir Malcolm simultaneously, shaking your heads as you move on.\n\t\t\n\t\tYou find yourselves alongside a wide and fast flowing river. \n\t\t\n\t\t\"This must be what carried us to the village,\" says Sir Malcolm. \"We can follow this to its source and get back on track.\"\n\t\t*goto scrap\n\t\t\n\t#Threaten him\n\t\tYou curse and shout at the boy. He stares at you, fascinated. After a while he starts to repeat your words back to you, enjoying the game. Realising it is pointless you give up and eventually he gets distracted and wanders off. Day turns to night. \n\t\t*goto firstrays\n*label set_bullet_damage\n*line_break\n[i]This is a tricky shot so you will need to roll a 3 or less.[/i]\n*rand bullet_roll 1 6\n*set bullets_number - 1\n*line_break\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll \u003c= 3)\n\t*goto winshot\n*if (bullet_roll >= 4)\n\t*goto notwinshot\n\n\n*label winshot\nYou squeeze the trigger and the Shetani chieftain flinches. He reaches round to his back and looks at his blood smeared hand before falling dead into the offering pile. His bodyguards run from the village signalling to the army gathered outside. With shields raised the Shetani march towards the village.\n*choice\n\t#Stay and fight\n\t\t*goto stayandfight\n\t#Run\n\t\t*label notwinrun\n\t\tThe Shetani warriors outside the village gates start to form into units, shields raised. Looking around at the ill equipped villagers you realise it is hopeless. \n\t\t\n\t\t\"The jig is up I’m afraid,\" you say and your companions nod in agreement. \n\t\t\n\t\tYou run out of the village gates and veer away from the massing army. A single arrow zips past your ear. As you turn you see the advancing army enter the village gates. You don’t look back again and follow the path out of the village.\n\t\t*goto winrun\n\n*label notwinshot\nYou squeeze the trigger but at the last moment the chieftain kneels down to look more closely at the pile of tribute. Your shot whizzes over his head and everyone spins in your direction. The bodyguards stand around their chieftain and he places his fingers to his mouth. A loud whistle escapes and his army lurch into action, marching towards the village with shields raised.\n*choice\n\t#Stay and fight\n\t\t*goto stayandfight\n\t#Run\n\t\t*goto notwinrun\n\n*label click\nYou squeeze the trigger.\n*line_break\nClick. \n*line_break\nEveryone spins in your direction. The bodyguards stand around their chieftain and he places his fingers to his mouth. A loud whistle escapes and his army lurch into action, marching towards the village with shields raised.\n*choice\n\t#Stay and fight\n\t\t*goto stayandfight\n\t#Run\n\t\t*goto notwinrun\n\t\t\n\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n", "youdied": "*temp hint 0\n*image youdied.jpg\nDo you want a hint?\n*choice\t\n\t#Yes\n\t\t*gosub hint\n\t\t*goto savegamesavegame\n\t#No\n\t\t*goto savegamesavegame\n\n*label savegamesavegame\n*if (savegame = true)\n\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*if (chapter4 = true)\n\t\t\t\t*goto_scene marsh thesoft\n\t\t\t*if (chapter5 = true)\n\t\t\t\t*goto_scene creature itfeelsgood\n\t\t\t*if (chapter6 = true)\n\t\t\t\t*goto_scene junglepath youfollowa\n\t\t\t*if (chapter7 = true)\n\t\t\t\t*goto_scene treepeople theladder\n\t\t\t*if (chapter8 = true)\n\t\t\t\t*goto_scene kolfboy upaheadis\n\t\t\t*if (chapter9 = true)\n\t\t\t\t*goto_scene cliff themorningsun\n\t\t\t*if (chapter10 = true)\n\t\t\t\t*goto_scene temple theinsideis\n\t\t\t*if (chapter11 = true)\n\t\t\t\t*goto_scene cityproper thecityis\n\t\t\t*if (chapter12 = true)\n\t\t\t\t*goto_scene centralbuilding youpassthrough\n\t\t\t*else \n\t\t\t\t*goto ending\n\t\t#No\n\t\t\t*goto ending\n*label ending\n*goto_scene ending\n\n*label hint\n*rand hint 1 8\n*if (hint = 1)\n\tYou spin down a tunnel of light and find yourself back in the lecture hall of the Adventurers Club. On the stage is Alfred Nobel, explaining his theories for making dynamite.\n\t\n\t\"If you thought black powder could open anything wait until you see what this can do!\" he says, looking right at you.\n\t\n\tThen everything spins again.\n*if (hint = 2)\n\tYou are pushed to the ground and the hard surface of the school playground stings your palms. As you get back to your feet children surround you in a circle, chanting, pointing and pushing.\n\t\n\tYou cover your ears to block out their cruel taunts. They open their mouths widely and bees swarm out from within. \n\n\tDarkness descends.\n*if (hint = 3)\n\tYou awake at the top of a mountain looking out to a glorious vista of snow topped peaks gently shrouded in clouds.\n\n\tA man is cradling you in his arms and sobbing:\n\n\t\"I’m so sorry O’Brien, I just don’t know what to do to get the poison out,\" he repeats.\n\n\tYou tell him it’s all right and that everything is so beautiful and close your eyes.\n*if (hint = 4)\n\t\"Pay attention!\" shouts your school teacher and you jerk your head up from the desk. \"Stand up and read the poem\".\n\n\t\"The wrinkled sea beneath him crawls; He watches from his mountain walls, And like a thunderbolt he falls.\"\n\n\t\"That’s better\", he says. \"All the best poems have three lines. All of them. All of them.\"\n*if (hint = 5)\n\t\"Time to go now\", says Nanny and you collect your toy sailing boat from the lake.\n\n\t\"It looks like some rain is coming in. Rain is like trouble, when it comes you have to tackle it head on. No point running from it or ignoring it is there?\".\n*if (hint =6)\n\tThe Victoria and Albert museum bustles and you marvel at the statue of Theseus and the Minotaur by Antonio Canova.\n\t\n\t\"Outwitted by love and a ball of string,\" says your companion.\n\t\n\t\"That's the importance of making a map!\" you reply.\n*if (hint = 7)\n\tYou recall a drink shared with Harry Kellar in the bar of the Club.\n\t\n\t\"Voodoo is quite real you know,\" says Harry with a cognac in one hand and a cigar in the other.\n\t\n\t\"I could control you now if I chose to, simply by taking something personal from you! However, I will spare you that if you buy me another drink!\" he says with a wink.\n\t\n\tYou agree and look forward to continued conversation on your return from the bar.\t\n*if (hint = 8)\n\tLondon Times, June 6th 1849\n\t\n\tZoological Gardens Reptile House Opens!\n\t\n\tThis reporter was lucky enough to be present at the Grand Opening and to witness the feeding of the great snakes - both grim and fascinating in equal measure.\n\t\n\tMost notable was the extreme focus of the snake on it's prey.\n\t\n\t\"Once the snake has fixed on its meal it is totally single minded in its pursuit,\" advises Head Keeper Henry Thornwright.\n\t\n\t\"Unless something easier comes along at the right moment!\" he adds. \t\n\t\n*return"}};
