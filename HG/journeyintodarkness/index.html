ighteningly fast!\n\t\t\n\t\t*set tar true\n\t\tAs soon as it has stepped onto the beam you push your end into the pit. It falls into the tar, legs flailing and bellowing in rage. \n\t\t\n\t\tThe portcullis is North and the double doors to the East.\n\t\t*choice\n\t\t\t#Rush through the doors\n\t\t\t\tYou push on the doors with all your strength but they will not open this way. The roaring of the crowd mixes with the roaring of the terrible beast that is now behind you. You hope it will be quick.\n\t\t\t\t*goto_scene youdied\n\t\t\t#Run to the portcullis\n\t\t\t\t*label runningaway\n\t\t\t\t*if (portcullisupbone = true)\n\t\t\t\t\tYou sprint under the raised portcullis and grab the bone that was holding the winch. The portcullis drops behind you with a resounding clang. The crowd start to cheer and for a brief moment you wonder if you have won them over. A roar from behind you confirms that is not the case.\n\t\t\t\t\t\n\t\t\t\t\t*if (tar = true)\n\t\t\t\t\t\tLooking through the portcullis you see your pursuer. Dripping in tar you can see the anger in it’s eyes as it runs towards you. Sharp, white teeth and claws contrast with the black of the tar. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe portcullis doesn’t seem as sturdy as it did before. \n\t\t\t\t\t\t*goto chaseproper\n\t\t\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\tLooking through the portcullis you see your pursuer. It is a lizard of roughly your size! It stands on two powerfully muscled legs that taper down to vicious curved claws. Its arms are thin and short and its head is somewhat canine like. It snorts in your direction, revealing white rows of razor like teeth. It sniffs the air, roars once more and starts running towards you. It is frighteningly fast!\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe portcullis doesn’t seem as sturdy as it did before. \n\t\t\t\t\t\t*goto chaseproper\n\t\t\t\t\t\n\t\t\t\t*if (portcullisupstick = true)\n\t\t\t\t\tYou sprint under the raised portcullis and grab the stick that was holding the winch. \n\t\t\t\t\t\n\t\t\t\t\t*label portcullisflee\n\t\t\t\t\tThe portcullis drops behind you with a resounding clang. The crowd start to cheer and for a brief moment you wonder if you have won them over. A roar from behind you confirms that is not the case.\n\t\t\t\t\t\n\t\t\t\t\t*if (tar = true)\n\t\t\t\t\t\tLooking through the portcullis you see your pursuer. Dripping in tar you can see the anger in it’s eyes as it runs towards you. Sharp, white teeth and claws contrast with the black of the tar. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe portcullis doesn’t seem as sturdy as it did before. \n\t\t\t\t\t\t*goto chaseproper\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*else\n\t\t\t\t\t\tLooking through the portcullis you see your pursuer. It is a lizard of roughly your size! It stands on two powerfully muscled legs that taper down to vicious curved claws. Its arms are thin and short and its head is somewhat canine like. It snorts in your direction, revealing white rows of razor like teeth. It sniffs the air, roars once more and starts running towards you. It is frighteningly fast!\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe portcullis doesn’t seem as sturdy as it did before. \n\t\t\t\t\t\t*goto chaseproper\n\t\t\t\t\t\n\t\t\t\t*else \n\t\t\t\t\tYou connect the handle into the square hole as quickly as you can and start turning. The portcullis rises with every turn. You wonder how far behind you the creature is and an enraged roaring tells you it is not far. This is going to be close! \n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\tYou roll under the portcullis and the snapping jaw of the beast closes inches away from you. \n\t\t\t\t\t\t\t\t\t*goto portcullisflee\n\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\tYou roll under the portcullis but the beast is too quick. It sinks its fangs into you and drags you back. You hope it will be quick.\n\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\n\t#There's no time for that!\n\t\tYou don't want to waste any time.\n\t\t*choice\n\t\t\t#Rush through the doors\n\t\t\t\tThe doors are an arms length away!\n\t\t\t\t*choice\t\n\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\tAs you run to the double doors you hear a roar and splash from the pit and you allow yourself a glance. Whatever was chasing you has fallen off the beam in it's hurry to reach you and is now thrashing around in the tar.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tPushing on the double doors you are horrified to find that they do not open. Turning back you see that the beast is there. A lizard-like creature, upright on two powerful legs. It drips with tar, then opens it's mouth. Razor sharp white teeth contrast with the dripping black. There is no escape.\n\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\tThe crowd roar and you hear fast footfall behind you. Whatever is chasing you has raced across the beam.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAn agonising pain shoots through you as teeth bite down into your back from behind. You are thrown to the ground. As you lie face down it takes another bite.\n\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t#Run to the portcullis\n\t\t\t\t*set tar true\n\t\t\t\tAs you run to the portcullis you hear a roar and splash from the pit and you allow yourself a glance. Whatever was chasing you has fallen off the beam in it's hurry to reach you and is now thrashing around in the tar.\n\t\t\t\t*goto runningaway\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\t\n*label chaseproper\nYou run North until the path turns sharply East. You run East until the path splits. It continues East and another path goes South. There is a lot of fresh sawdust marking the path to the South. You see the marks in the wooden wall again and now know the cause.\n\nA metallic thump tells you that the portcullis has fallen. \n\nA roar from the crowd tells you that trouble is close behind.\n*choice\n\t#East\n\t\tThe path continues and you reach some weeds growing under the wall. It carries on to the East and South.\n\t\t*choice\n\t\t\t#East\n\t\t\t\tThe path continues and then ends in a dead end. The maze wall has been repaired here, fresh boards nailed over the older. A low growl comes from behind you and you turn slowly to see the beast looking at you triumphantly. The crowd roar delightedly as he closes in. There is no escape.\n\t\t\t\t*goto_scene youdied\n\t\t\t#South\n\t\t\t\t*if (bone = false)\n\t\t\t\t\tThe path abruptly ends and turns West. Propped up in the corner is what looks like a thigh bone. The ground here has a layer of fresh sawdust on it.\n\t\t\t\t\t*goto pelt\n\t\t\t\t*else\n\t\t\t\t\tThe path abruptly ends and turns West. The ground here has a layer of fresh sawdust on it. \n\t\t\t\t\t*goto pelt\n\t\t\t\t\t\n\t\t\t\t\t*label pelt\n\t\t\t\t\tYou pelt along Westwards ever conscious of what is behind you. You reach a crossroads and the path leads West, North and South. One of the wooden maze walls is badly stained here with a dark rusty colour.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#West\n\t\t\t\t\t\t\tYou reach a pair of double doors. You push on them but they do not open. Turning back you see that the beast is there, blocking your path. It walks slowly towards you and the crowd chant triumphantly. \n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t#North\n\t\t\t\t\t\t\tYou run down the path North and find that wire blocks any further progress. In desperation you dig at the ground with your hands hoping to go under the wire but it has been dug in to a great depth. The crowd start clapping in time and you turn to see that the beast has caught up with you. You continue to scrabble at the ground while the noise of the crowd fills your head until you feel hot breath on your neck.\n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t#South\n\t\t\t\t\t\t\tYou run South until the path splits, heading East and West. An arrow is embedded high up in the maze wall.\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#East\n\t\t\t\t\t\t\t\t\tYou follow the path East until another path opens to the South. Various symbols scrawled in chalk mark the walls.\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#Carry on East\n\t\t\t\t\t\t\t\t\t\t\tYou follow the path to a dead end. From here you can see King Imperius with Lady Jane and Sir Malcolm by his side. He smiles and waggles his fingers at you ironically. The distraught looks on your companions faces tell you all you need to know. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou turn to see that the beast has blocked your escape route. You mouth \"goodbye\" to your companions. \n\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t#South\n\t\t\t\t\t\t\t\t\t\t\tThe exit is ahead!\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tAs soon as you run through the doors they are banged shut behind you and a group of monkeys hurriedly place the bar back across them. Frustrated roars and sounds of clawing on the other side let you know how close you came. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tKing Imperius walks down the gallery steps to meet you, your relieved looking companions escorted close behind.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\"Well done Jack, most entertaining,\" says King Imperius and he places his hand on your shoulder. Despite his size and strength it is surprisingly gentle.\n\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\"Well done Jill, most entertaining,\" Says King Imperius and he places his hand on your shoulder. Despite his size and strength it is surprisingly gentle.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tHe leads you and your companions back into the temple and through a doorway behind his throne. You are ushered out.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\"Safe travels, the city lies ahead,\" he says, closing the door.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tYou look out to open plains.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t*if (crown = true)\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"All hail King Jack,\" says Sir Malcolm, bowing. \n\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"All hail Queen Jill,\" says Sir Malcolm, bowing.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tLady Jane stifles a laugh.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto walktocity\n\t\t\t\t\t\t\t\t\t\t\t*if (machete1 = true) \n\t\t\t\t\t\t\t\t\t\t\t\tYou examine the machete. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Well done Jack, now you have two machetes,\" says Sir Malcolm sarcastically.\n\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Well done Jill, now you have two machetes,\" says Sir Malcolm sarcastically.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto walktocity\n\t\t\t\t\t\t\t\t\t\t\t*if (redbad = true)\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou untie the red ribbon and unfurl the scroll, revealing a crudely drawn crayon drawing of a monkey waving it's hand. \"GuD bY JAk, Gud LUk x\" is written at the bottom.\n\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou untie the red ribbon and unfurl the scroll, revealing a crudely drawn crayon drawing of a monkey waving it's hand. \"GuD bY JIl, Gud LUk x\" is written at the bottom.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto walktocity\n\t\t\t\t\t\t\t\t\t\t\t*if (greenbad = true)\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou untie the red ribbon and unfurl the scroll, revealing a crudely drawn crayon drawing of a monkey waving it's hand. \"GuD bY JAk, Gud LUk x\" is written at the bottom.\n\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou untie the red ribbon and unfurl the scroll, revealing a crudely drawn crayon drawing of a monkey waving it's hand. \"GuD bY JIl, Gud LUk x\" is written at the bottom.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto walktocity\n\t\t\t\t\t\t\t\t\t\t\t*if (poemthree = true)\n\t\t\t\t\t\t\t\t\t\t\t\tYou untie the green ribbon and unfurl the scroll. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tThe artwork is highly detailed and clearly the work of an exceptional artist. It shows various scenes of vivisection and experimentation on apes and other primates, although the perpetrators are not depicted. Most of the equipment is highly unusual and unrecognisable. It is a horrible scene and you try to force it from your memory.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*set poemthree1 true\n\t\t\t\t\t\t\t\t\t\t\t\tIn beautiful, flowing script is written [b]\"Too late some things should ere remain hid\".[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t*goto walktocity\n\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t*goto walktocity\n\t\t\t\t\t\t\t\t\t\t\t \n\t\t\t\t\t\t\t\t#West\n\t\t\t\t\t\t\t\t\tYou reach a dead end. In frustration and terror you pound on the wall. The crowd roars. Then the beast roars. You close your eyes.\n\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t#South\n\t\tYou run down the path to the South. It is blocked by thick wire. Turning back your escape route is blocked by the beast. It slows on seeing you and walks confidently towards you, knowing you are trapped. The crowd start chanting and you prepare yourself.\n\t\t*goto_scene youdied\n\t\t\n\t\t\n*label walktocity\n\nThe green plain stretches before you and there on the horizon is a wall reaching up into the clear blue sky. You can see from how it curves away that it is circular but the height is impossible to gauge from this distance.\n\nYou walk across the empty plains together in a comfortable silence. It takes many hours of walking to reach the city wall.\n\nYou stand at the base of the wall looking up. It is sixty foot high and made from blocks of stone. The face is smooth and without footholds. Sir Malcolm looks up at the wall and whistles.\n\n\"You know, there’s something about this wall that makes me curious. It’s almost as if it was built to keep people in rather than out,\" he says.\n\nLady Jane also looks troubled. \"It’s very odd, this plain shouldn’t be here. Look - the Jungle is all around us and then just stops at the perimeter about a mile short of the wall.\"\n\n*choice\n\t#Climb the wall\n\t\t*label climbthewall\n\t\tSir Malcolm ties everyone's rope together.\n\t\t\t\t\n\t\t\"Even using all our ropes this is going to be touch and go,\" he says.\n\t\t\t\n\t\tSir Malcolm spins the grappling iron above his head and flings it to the top of the wall. It disappears over the edge and he pulls the rope back. The iron has caught on something and with some hard tugs he nods that it is safe to climb.\n\t\t\t\t\n\t\t\"I think we had better do this one at a time,\" says Lady Jane. \"The three of us and our backpacks is a lot of weight. Well, ladies first!\"\n\t\t\t\t\n\t\tWith that Lady Jane starts the climb while you watch on nervously.\n\t\t\t\t\n\t\t\"I'm not sure what is worse, doing the climbing or watching it!\" says Sir Malcolm and you agree.\n\t\t\t\t\n\t\tSoon enough Lady Jane is at the top and perched on the edge of the wall. She calls down for the next climber.\n\t\t\t\t\n\t\t*if (male = true)\n\t\t\t\"Me next old boy\" says Sir Malcolm. \"You can have my mint cake if I don't make it!\"\n\t\t*if (female = true)\n\t\t\t\"Me next old girl,\" says Sir Malcolm. \"You can have my mint cake if I don't make it!\"\n\t\t\t\t\n\t\tLaughing, he climbs the rope. You pace at the foot of the wall, glancing occasionaly at the edge of the jungle and the empty space in between.\n\t\t\t\t\n\t\t*if (male = true)\n\t\t\t\"Toodle-oo Jack, do join us won't you?\"\n\t\t*if (female = true)\n\t\t\t\"Toodle-oo Jill, do join us won't you?\"\n\t\t\t\t\n\t\tSir Malcolm and Lady Jane are waving from the top. Here goes nothing you think to yourself and start climbing. \n\t\t\n\t\tSoon you are all together again and looking down from the wall to what lies below.\n\t\t\t\t\n\t\tThere is another wall encircling a city of some kind. The buildings and wall are almost entirely covered in green. An enormous gate has been built into this wall, it must be at least fifty foot tall and nearly as wide. A huge wooden beam across the gate holds it shut. At the top is an ornate stone carving of writhing tentacles holding a jewel. Silence hangs over the city. With a collective sigh you prepare for the descent.\n\t\t\t\t\n\t\tYou stand at the foot of the inner wall and the gate towers above you. \n\t\t\t\t\n\t\t\"Well we got this far,\" says Lady Jane. \"Welcome to the City of the Dead.\"\n\t\t\t\t\n\t\t\"You know,\" says Sir Malcolm, \"I really do not want to imagine what requires a gate of that magnitude.\"\n\t\t*choice\n\t\t\t*if (dynamite = false) #\"We have no dynamite\"\n\t\t\t\t\"There is no way we can get through this gate without dynamite,\" says Sir Malcolm. \n\t\t\t\t\t\t\n\t\t\t\t\"We have no choice but to look for another way in,\" agrees Lady Jane.\n\t\t\t\t*goto walltowers\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t*if (dynamite = true) #Use the dynamite\n\t\t\t\tYou place the explosives at the base of the gate and run the fuse as far away as possible. Sir Malcolm and Lady Jane are in the distance, crouching down with their hands over their ears. You touch a lit match to the fuse and it starts to fizz towards the dynamite. You run back to them and hunker down. \n\t\t\t\t\t\t\n\t\t\t\t“Knock Knock!” shouts Sir Malcolm before a massive boom blasts through the air followed by small chunks of raining debris. As the smoke clears it reveals that the beam holding the gate closed has been blown in half. The gate swings slowly open. \n\t\t\t\t\t\t\n\t\t\t\t\"We should leave the ropes in place,\" says Lady Jane. \"We may need to leave in a hurry.\"\n\t\t\t\t*page_break The City Of The Dead\n\t\t\t\t*goto_scene cityproper\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t#Look for another way in\n\t\t\t\t*label walltowers\n\t\t\t\t\t\t\n\t\t\t\tThe wall towers above you, covered in thick vines. A skeleton is entwined among them halfway up, staring out blankly with empty sockets. \n\t\t\t\t*choice\n\t\t\t\t\t#Climb the inner wall\n\t\t\t\t\t\tThe vines make it easy to climb and soon you have made much progress and are halfway up the wall. With the hot sun beating down on your back you pause for a moment. The vine you are holding onto twists under your grip and you feel something snake around your ankle. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\tTo the side, Sir Malcolm and Lady Jane are crying out in frustration as they too start to become entangled in the moving vines. With nowhere to go you are all soon fully trapped. You await the end and see in your minds eye the wall with three new skeletons adorning it.\n\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t#Continue to look for another way in\n\t\t\t\t\t\tThere is seemingly no break in the vines covering the inner wall. As you walk around the outside you are mocked occasionally by the odd grinning skull in the foliage. Finally there is a part of the wall that is not covered by the ubiquitous vines. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Climb the clear part of the wall\n\t\t\t\t\t\t\t\tThere are plenty of places to get a grip on the wall and it isn’t long before you are halfway up. You stop for a rest, the hot sun beating down on your shoulders. You look down to where you climbed from and to your horror that gap is now entirely covered with vines! Looking up, you can see them moving across to cut off your progress. With nowhere to go, they start towards you hungrily. \n\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t#Continue walking around\n\t\t\t\t\t\t\t\tHour after hour you trudge round the perimeter. There is no break in the vines and no other sign of an entrance. The sun starts to set and long after tiredness has set in you find yourselves back to where you started from. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tLady Jane cries out, pointing up to the outer wall. Looking up you see that the ropes you used to descend have been cut, leaving only a few feet at the top to show they were ever there. There is no way back and night is coming. Behind you, the vines rustle hungrily. \n\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t#Explore the perimeter\n\t\tThe slog around the perimeter feels endless and after many hours you agree that there is no way in except climbing.\n\t\t*goto climbthewall\n\n", "mine": "*temp bullet_roll 0\n*temp bullet_damage 0\nYou follow a small path along the cliff face and arrive at a camp of some sort. A single tent sits in front of a campfire that has long since gone out. The tent is tattered and torn and has obviously not been occupied for some time. Nearby is the entrance to a mine. \n*choice\n\t#Investigate the tent\n\t\tInside the tent is a camp-bed and a small folding table with a candle on it. The candle has melted right down to a nub. A notebook is also on the table. \n\t\t*choice\n\t\t\t#Read the notebook\n\t\t\t\tThe front of the notebook reads \"The Diary of Henry Matthews Pembleton.\"\n\t\t\t\t\n\t\t\t\tFlicking though the pages you read of a tragedy that befell him in England, his exploits in setting up a diamond mine using equipment of his own design and his desire to be \"as far from so-called civilisation as he could get.\" \n\t\t\t\t\n\t\t\t\tThe writing becomes more disjointed and scrawled towards the end and the last page reads:\n\t\t\t\t\n\t\t\t\t\"I can hear Eleanor calling to me every night from the mine. There is only one more chamber to penetrate and then we can be reunited. I can hear her on the other side, scrabbling, calling, scrabbling, calling.\"\n\t\t\t\t\n\t\t\t\tYou return the notebook and leave the tent.\n\t\t\t\t*choice\n\t\t\t\t\t#Investigate the mine\n\t\t\t\t\t\t*goto investigate\n\t\t\t\t\t#Return East\n\t\t\t\t\t\t*goto_scene clifftwo\n\t\t\t\t\t\t\t\t\n\t\t\t#Leave the tent\n\t\t\t\tYou decide it would not be good manners to read someone else's diary.\n\t\t\t\t*choice \n\t\t\t\t\t#Investigate the mine\n\t\t\t\t\t\t*goto investigate\n\t\t\t\t\t#Return East\n\t\t\t\t\t\t*goto_scene clifftwo\n\t#Investigate the mine\n\t\t*label investigate\n\t\tJust inside the mine opening there is a helmet with a lamp on the front. It is powered by the method of winding a small handle - an ingenious invention! A ladder leads ever downwards into the pitch black mine. \n\t\t\n\t\tAt the bottom of the ladder the mine opens out and your eyes adjust to the darkness. A small amount of light carries down the shaft, enough to just illuminate a large machine with a drill on the front. It is designed to seat one person and you can see into the vehicle through a glass screen at the front. An empty pilots seat is in front of a bank of dials and levers. It is a miraculous piece of engineering that makes you think of a giant metal mole. A can labelled \"kerosene\" sits nearby as well as another couple of helmets.\n\t\t*choice\n\t\t\t#Take the helmets and explore the mine\n\t\t\t\tYou wind up the helmets and test they are working before setting off down the tunnel. You can stand upright in the tunnel and the smooth face of the rock is a testament to the amazing drilling machine. The path slopes downwards and continues on as far as the light from your helmets will penetrate. On the right is a stone archway, outlined with crude bricks. You can hear movement coming from within.\n\t\t\t\t*choice\n\t\t\t\t\t#Carry on\n\t\t\t\t\t\t*label pathdown\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe path continues downwards. Your footsteps echo and the air becomes colder. It is hard to shake off a feeling of claustrophobia and being trapped. The light from your torches flickers and dims and then they start to go out! No matter how many times you wind them, they do not work. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou are in total darkness!\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Seems his workmanship wasn’t as impressive as we first thought,\" says Sir Malcolm. \n\t\t\t\t\t\t\n\t\t\t\t\t\tFrom behind you comes a hissing sound. \n\t\t\t\t\t\t\n\t\t\t\t\t\tLady Jane grabs your hand and speaks: \"Everyone, group so that we have our backs to each other. This is the best chance we have to fight them off.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tIn total darkness you wait for the attack. The sound of your companions anxious breathing is soon joined by the excited, shallow breathing of the ghouls. They attack and you hack blindly.\n\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Ghouls[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label ghouls_fight\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto roll_dice_loop\n\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage666\n\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t*goto click\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto win\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\"Let's dance\"\n\t\t\t\t\t\t\t\t*goto roll_dice_loopk\n\t\t\t\t\t\t\n\t\t\t\t\t#Enter the archway\n\t\t\t\t\t\tStanding in the doorway your helmets illuminate four figures hunched over something on the floor. The twisted and skeletal figures turn as one and hiss at you, the pupils of their large green eyes contracting in the light as they advance.\n\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Ghouls[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 5, Stamina 8[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label ghouls_fight1\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto roll_dice_loop1\n\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t*goto click1\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto win1\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\"I was always told not to hit ghouls\"\n\t\t\t\t\t\t\t\t*goto roll_dice_loopk1\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t*label win1\n\t\t\t\t\t\t*if (stamina = max_stamina)\n\t\t\t\t\t\t\t*goto gnawedbones\n\t\t\t\t\t\t*elseif (provisions = false)\n\t\t\t\t\t\t\t*goto gnawedbones\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto choice14\n\t\t\t\t\t\t*label choice14\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (provisions = true) #Eat Provisions\n\t\t\t\t\t\t\t\t*if (provisions_number > 0) \n\t\t\t\t\t\t\t\t\t*gosub_scene eatprovisions\n\t\t\t\t\t\t\t\t\t*goto gnawedbones\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*gosub_scene noprovisions\n\t\t\t\t\t\t\t\t\t*goto gnawedbones\n\t\t\t\t\t\t\t*if (provisions = true) #Don't eat provisions\n\t\t\t\t\t\t\t\t*goto gnawedbones\n\t\t\t\t\t\t\t*if (provisions = false) #To the Wayfarer!\n\t\t\t\t\t\t\t\t*goto gnawedbones\n\t\t\t\t\t\t*label gnawedbones\n\t\t\t\t\t\t\n\t\t\t\t\t\tThere are numerous gnawed bones scattered about and the body of a miner lies on the floor. The source of the ghouls most recent feast becomes clear. You leave the horrible chamber.\n\t\t\t\t\t\t*goto pathdown\n\t\t\t\t\n\t\t\t\t\n\t\t\t#Take the kerosene and leave\n\t\t\t\t\"I don't have a good feeling about this place. The kerosene looks useful so let's take that and go.\"\n\t\t\t\t\n\t\t\t\t*set kerosene true\n\t\t\t\t\n\t\t\t\tYou climb back up the ladder, glad to be out of the claustrophobic mine.\n\t\t\t\t*goto_scene clifftwo\n\t\t\t#Use the machine\n\t\t\t\tThe control panel is fairly self explanatory and the machine powers into life when you start the motor. A powerful light shines from the front and the enormous drill starts whirring. You set off down the gently sloping tunnel. Up ahead there is an archway on the right.\n\t\t\t\t*choice\n\t\t\t\t\t#Stop the machine and enter the archway\n\t\t\t\t\t\tStanding in the doorway your helmet illuminates four figures hunched over something on the floor. The twisted and skeletal figures turn as one and hiss at you, the pupils of their large green eyes contracting in the light as they advance. \n\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Ghouls[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 5, Stamina 8[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label ghouls_fight2\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto roll_dice_loop2\n\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage2\n\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t*goto click2\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto win2\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\"I was always told not to hit ghouls\"\n\t\t\t\t\t\t\t\t*goto roll_dice_loopk2\n\t\t\t\t\t\t\n\t\t\t\t\t#Carry on\n\t\t\t\t\t\t*goto carryon\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t*label carryon\n\t\t\t\tYou follow the tunnel for a while until up ahead it ends, sealed by a large stone wall. \n\t\t\t\t*choice\t\n\t\t\t\t\t#Reverse back up the tunnel\n\t\t\t\t\t\tNot wishing to find out what lies behind the wall you put the machine in reverse and backup along the tunnel to the ladder.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\"What's down there Jack?\" asks Lady Jane.\n\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\"What's down there Jill?\" asks Lady Jane.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set kerosene true\n\t\t\t\t\t\t\"I don't want to know\" you reply. \n\t\t\t\t\t\t\n\t\t\t\t\t\tTaking the kerosene you ascend the ladder and into fresh air and sunlight.\n\t\t\t\t\t\t*goto_scene clifftwo \n\t\t\t\t\t#Smash through the wall\n\t\t\t\t\t\tThe drill smashes through the wall easily. The bright light of the machine illuminates a massive catacomb of some kind. Hunched Figures scatter and cower from the light, skulking into the darkness. Graves, tombs and vaults in various states of disrepair and vandalism cast long shadows. The light from the machine starts to fade and twisted figures encroach into the darkness it leaves behind. \n\t\t\t\t\t\t\n\t\t\t\t\t\tCursing the drilling machine you put it into reverse and drive backwards down the tunnel towards the mine entrance. A mass of capering ghouls follow you, barely illuminated by the fading light of the drill. With enormous relief you reach the mine entrance and leap out of the vehicle. Sir Malcolm and Lady Jane are waiting.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"There’s no time to lose!\" you shout. \"They are coming!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tLooking back down the mine you see scores of shining eyes looking back at you like stars in the night sky.\n\t\t\t\t\t\t*goto noway\n\t\t\t\t\t\t\n\t\t\n\t\t\n\n*label win\n*if (male = true)\n\n\t\"That seems to be the last of them Jack,\" says Sir Malcolm.\n*if (female = true)\n\n\t\"That seems to be the last of them Jill,\" says Sir Malcolm.\n*if (stamina = max_stamina)\n\t*goto handslinked\n*elseif (provisions = false)\n\t*goto handslinked\n*else\n\t*goto choice10\n*label choice10\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto handslinked\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto handslinked\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto handslinked\n\t*if (provisions = false) #Onwards\n\t\t*goto handslinked\n\n*label handslinked\nHands linked together Lady Jane leads you towards the ladder, using her spare hand to feel along the passageway wall.\n\nFrom behind, you hear more hissing.\n\n\"Oh thank God!\" exclaims Lady Jane and ahead you can see a brilliant shaft of light beaming down. The way out is near.\n\nAs you reach the bottom of the ladder you look back down the mine. Scores of shining eyes look back at you, like stars in the night sky. \n\n*label noway\nThere is no way that you can climb the ladder before they reach you.\n*choice\n\t*if (kerosene = true) #Use the kerosene to hold them off\n\t\t*set kerosene false\n\t\t\"Run! Get out quickly!\" you shout. \"I will hold them off!\"\n\t\t\n\t\tLady Jane and Sir Malcolm run to the ladder and start to climb. You turn to face the hissing tide and liberally douse the ground and walls of the tunnel in front of you with the kerosene. You strike a match and throw it down the tunnel. The kerosene goes up with a satisfying woof and you are hit by a blast of heat and light. You can see the ghouls holding their arms over their faces and cowering from the flames. As you ascend the ladder their screams of frustration carry past you. \n\t\t*goto_scene clifftwo\n\t*if (dynamite = true) #Use the dynamite to hold them off\n\t\t*set dynamite false\n\t\t\"Run! Get out quickly!\" you shout. \"I will hold them off!\"\n\t\t\n\t\tLady Jane and Sir Malcolm run to the ladder and start to climb. You turn to face the hissing tide and light the dynamites fuse. You throw it down the tunnel and then crouch low with your hands over your ears. For a few seconds that feel like an eternity there is nothing and then an enormous explosion. Your ears ring clouds of dust and debris blast past you. Looking down the tunnel you can see that it is now completely blocked with tonnes of rubble. Further shudders as you ascend the ladder make you think that the mine is collapsing in on itself. \n\t\t\n\t\t*set kerosene true\n\t\tYou take the kerosene and climb the ladder, glad to be in the air and sunlight. You feel another tremor underground through the soles of your boots.\n\t\t*goto_scene clifftwo\n\t#Run! I will hold them off!\n\t\tLady Jane and Sir Malcolm turn and run towards the ladder out of the mine. \n\t\t\n\t\tWhen you see that they will reach safety you run to follow them. The hissing tide are right behind you.\n\t\t\n\t\tIn desperation you reach the ladder but have only gone up a few rungs before you feel hands pulling you back. You are pulled off of the ladder and catch a glance of Sir Malcolm and Lady Jane shouting down from above before you are consumed by the horde.\n\t\t*goto_scene youdied\n\t\n\t\t\n\t\t\n*label roll_dice_loop\n*temp ghoulsdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand ghoulsdiceresult 1 dicesides\n*line_break\nThe Ghouls rolled ${ghoulsdiceresult}\n*set diceresult +skill\n*set ghoulsdiceresult +ghoulsskill\n*line_break\nYour total: ${diceresult} Ghouls total: ${ghoulsdiceresult}\n*if (diceresult > ghoulsdiceresult)\n\t*line_break\n\tYou hack blindly and hit a ghoul.\n\t*set ghoulshp -2\n*if (diceresult \u003c ghoulsdiceresult)\n\t*line_break\n\tThe ghouls bite you from the darkness.\n\t*set stamina -2\n*if (diceresult = ghoulsdiceresult)\n\t*line_break\n\tThe air is filled with the sounds of breathing.\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Ghouls have ${ghoulshp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (ghoulshp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n\n\n\t\t\n\n*label roll_dice_loopk\n*temp ghoulsdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand ghoulsdiceresult 1 dicesides\n*line_break\nThe Ghouls rolled ${ghoulsdiceresult}\n*set diceresult +skill\n*set ghoulsdiceresult +ghoulsskill\n*line_break\nYour total: ${diceresult} Ghouls total: ${ghoulsdiceresult}\n*if (diceresult > ghoulsdiceresult)\n\t*line_break\n\tYou punch into darkness and your punch connects satisfyingly.\n\t*set ghoulshp -3\n*if (diceresult \u003c ghoulsdiceresult)\n\t*line_break\n\tThe ghouls bite you from the darkness.\n\t*set stamina -2\n*if (diceresult = ghoulsdiceresult)\n\t*line_break\n\tThe air is filled with the sounds of breathing.\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Ghouls have ${ghoulshp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (ghoulshp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n*label click\n\"Get ready, I'm going to fire blindly,\" you say to your companions.\n\nYou aim your gun at the source of the sounds and pull the trigger. It clicks.\n\n\"Brilliant,\" says Sir Malcolm.\n*goto ghouls_fight\n\n*label click1\nYou aim at the ghouls, spotlighted by your torches. You pull the trigger and the gun clicks. The ghouls hiss at you in union.\n\n\"I think we have lost the element of surprise,\" says Sir Malcolm.\n*goto ghouls_fight1\n\n*label click2\nYou aim at the ghouls, spotlighted by your torches. You pull the trigger and the gun clicks. The ghouls hiss at you in union.\n*goto ghouls_fight2\n\n\n\n\n*label winshot\n\"Get ready, I'm going to fire blindly,\" you say to your companions.\n\nYou aim your gun at the source of the sounds and pull the trigger. The flash from the gun briefly illuminates the hideous ghouls before all is black again. You hear the bullet ricochet around the mine accompanied by various soft thuds. All is silent.\n*goto win\n\n*label winshot1\nYou aim at the ghouls, spotlighted by your torches. You pull the trigger and your bullet passes through the first ghoul, ricocheting off the cave wall. The bullet continues to ping around the cave until the ghouls lie dead.\n\n\"Nearly as good as I could do it,\" laughs Lady Jane.\n*goto win1\n\n\n\t\t\n*label roll_dice_loop1\n*temp ghoulsdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand ghoulsdiceresult 1 dicesides\n*line_break\nThe Ghouls rolled ${ghoulsdiceresult}\n*set diceresult +skill\n*set ghoulsdiceresult +ghoulsskill\n*line_break\nYour total: ${diceresult} Ghouls total: ${ghoulsdiceresult}\n*if (diceresult > ghoulsdiceresult)\n\t*line_break\n\tYou hack at the ghouls.\n\t*set ghoulsonehp -2\n*if (diceresult \u003c ghoulsdiceresult)\n\t*line_break\n\tThe ghouls bite you.\n\t*set stamina -2\n*if (diceresult = ghoulsdiceresult)\n\t*line_break\n\tThe ghouls caper around and regroup.\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Ghouls have ${ghoulsonehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (ghoulsonehp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\t\n*label roll_dice_loopk1\n*temp ghoulsdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand ghoulsdiceresult 1 dicesides\n*line_break\nThe Ghouls rolled ${ghoulsdiceresult}\n*set diceresult +skill\n*set ghoulsdiceresult +ghoulsskill\n*line_break\nYour total: ${diceresult} Ghouls total: ${ghoulsdiceresult}\n*if (diceresult > ghoulsdiceresult)\n\t*line_break\n\tYou punch the ghouls and they howl.\n\t*set ghoulsonehp -3\n*if (diceresult \u003c ghoulsdiceresult)\n\t*line_break\n\tThe ghouls bite you.\n\t*set stamina -2\n*if (diceresult = ghoulsdiceresult)\n\t*line_break\n\tThe ghouls caper around and regroup.\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Ghouls have ${ghoulsonehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (ghoulsonehp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set ghoulsonehp - bullet_damage\nThe Ghouls have ${ghoulsonehp} stamina remaining\n*if (ghoulsonehp \u003c 1)\n\t*goto win1\n*else\n\t*goto ghouls_fight1\n\n\t\n\t\n*label roll_dice_loop2\n*temp ghoulsdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand ghoulsdiceresult 1 dicesides\n*line_break\nThe Ghouls rolled ${ghoulsdiceresult}\n*set diceresult +skill\n*set ghoulsdiceresult +ghoulsskill\n*line_break\nYour total: ${diceresult} Ghouls total: ${ghoulsdiceresult}\n*if (diceresult > ghoulsdiceresult)\n\t*line_break\n\tYou hack at the ghouls.\n\t*set ghoulstwohp -2\n*if (diceresult \u003c ghoulsdiceresult)\n\t*line_break\n\tThe ghouls bite you.\n\t*set stamina -2\n*if (diceresult = ghoulsdiceresult)\n\t*line_break\n\tThe ghouls caper around and regroup.\n\t*goto roll_dice_loop2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Ghouls have ${ghoulstwohp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (ghoulstwohp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loop2\n\t\t\n\t\t\n*label set_bullet_damage2\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot2\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set ghoulstwohp - bullet_damage\nThe Ghouls have ${ghoulstwohp} stamina remaining\n*if (ghoulstwohp \u003c 1)\n\t*goto win2\n*else\n\t*goto ghouls_fight2\n\n*label roll_dice_loopk2\n*temp ghoulsdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand ghoulsdiceresult 1 dicesides\n*line_break\nThe Ghouls rolled ${ghoulsdiceresult}\n*set diceresult +skill\n*set ghoulsdiceresult +ghoulsskill\n*line_break\nYour total: ${diceresult} Ghouls total: ${ghoulsdiceresult}\n*if (diceresult > ghoulsdiceresult)\n\t*line_break\n\tYou punch the ghouls and they howl.\n\t*set ghoulstwohp -3\n*if (diceresult \u003c ghoulsdiceresult)\n\t*line_break\n\tThe ghouls bite you.\n\t*set stamina -2\n*if (diceresult = ghoulsdiceresult)\n\t*line_break\n\tThe ghouls caper around and regroup.\n\t*goto roll_dice_loopk2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Ghouls have ${ghoulstwohp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (ghoulstwohp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loopk2\n\n*label winshot2\nYou aim at the ghouls, illuminated in the light spilling from the machine. You pull the trigger and your bullet passes through the first ghoul, ricocheting off the cave wall. The bullet continues to ping around the cave until the ghouls lie dead.\n*goto win2\n\t\n*label win2\n\nThere are numerous gnawed bones scattered about. The body of a miner lies on the floor and the source of the ghouls most recent feast becomes clear. With relief, you get back into the drilling machine.\n*goto carryon\n\n\n\n*label set_bullet_damage666\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set ghoulshp - bullet_damage\nThe Ghouls have ${ghoulshp} stamina remaining\n*if (ghoulshp \u003c 1)\n\t*goto win\n*else\n\t*goto ghouls_fight\n\n", "mjaanto": "*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto yousailthe\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\t\n\t\t\t*else\n\t\t\t\t*goto yousailthe\n\t\t#No\n\t\t\t*goto yousailthe\n\n*label yousailthe\n*temp bullet_roll 0\n*temp bullet_damage 0\nYou sail the HMS Rustbucket out of the marina and start down the Mjaa Nto. The sun is low behind you and as you turn a bend in the river and leave the marina you give the ships horn a long blast that echoes through the jungle. From far away, thunder echoes the cry. \n\nLady Jane says, \"Seeing all this reminds me of something I heard back at the club. We must not think of the things we could do with, but only of the things that we can't do without.\"  \n\nYou and Sir Malcolm nod in appreciative agreement. The rhythmic ticking of the ships engine is quite relaxing and the gently contoured river makes navigation very easy. The jungle foliage is impenetrably thick on either side and alive with the sounds of insects and various shrieks. The sun is setting behind you and the river takes on a blood red glow. Soon night falls and the river is a black mirror. The moon is bright in the night sky. \n*choice\n\t#Tether boat for the night\n\t\t*label tether\n\t\tThe Rustbucket is anchored and you prepare for the night. It feels good to be on an adventure again and you soon drift off into a peaceful sleep, the boat rocking gently. You awake with a start. Moonlight shines in through the window of the cabin and for a moment you are confused as to your alarm. It is totally silent. The sounds of the forest have completely stopped! You start to prepare yourself for action and strain to hear what is going on in the jungle outside. All you can hear is the sound of water gently lapping against the sides of the boat. Then the drumming starts. Jungle drums. Sir Malcolm knocks on your cabin door. \n\t\t\n\t\tHe says \"looks like we will be sleeping in shifts then,\" and you nod.\n\t\t\n\t\tThe dawn sun brings with it a raucous discord of noises from the jungle. You light a fire in the steam engine, put on a kettle for a cup of tea and start off again slowly down the river while the kettle boils. Your fellow adventurers arrive just before the kettle starts to whistle. It occurs to you that knowing when there is tea is a key attribute of any good adventurer. Lady Jane nurses her mug with both hands and looks tired.  \n\t\t\n\t\t*if (male = true)\n\t\t\t\"Thanks Jack, this should help me wake up,\" she says.\n\t\t*if (female = true)\n\t\t\t\"Thanks Jill, this should help me wake up,\" she says.\n\t\t\n\t\tThe screech of an ape comes from a nearby tree. Hanging upside from a branch is a gibbon, with its distinctive long limbs. This one has a white marking on it’s chest. It is eating a banana and watching your progress along the river. You salute it as the Rustbucket goes past. The half-eaten banana flies through the air and hits you in the face! The ape swings back up onto the branch and jumps up and down, screeching excitedly. Your companions laugh. \n\t\t\n\t\t\"Everyone's a critic!\" you say.\n\t\t\n\t\tUp ahead the river splits into three streams. The stream to the left is bright in the sun and the water is clear. Ahead the river continues with rich foliage on either side. To the right the jungle growth has created a canopy that is reminiscent of a tunnel.\n\t\t*choice\n\t\t\t#Left path\n\t\t\t\t*goto_scene leftpath\t\t\t\t\t\t\n\t\t\t#Ahead\n\t\t\t\t*goto_scene aheadpath\n\t\t\t#Right path\n\t\t\t\t*goto_scene rightpath\n\t\t\t\n\t#Press on\n\t\tThe boat lamp casts weak light onto what lies immediately ahead in the river and the bright moon acts as another spotlight. However, it is incredibly slow going. After a few minutes the light starts to lure flying insects. Pretty soon there are thick clouds swarming the boat and blocking what little light the lamp sends out. You are on the verge of giving up when the buzzing intensifies dramatically and a bird-like shape flies down onto the boat. \n\t\t\n\t\tYou must fight the:\n\t\t\n\t\t[b]Giant Mosquito[/b]\n\t\t\n\t\t[b]Skill 7 Stamina 7[/b]\n\t\t\n\t\t*label mosquito_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto mosquito_fight1\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"Get ready to taste my fly-swat\"\n\t\t\t\t*goto mosquito_fightk\n\t\t\n\t\t\t\n*label click\nYou hear a click as you pull the trigger.\n\n\"Probably one of those old fashioned guns that need bullets,\" says Sir Malcolm.\n\n\"Looks like we are going to do this the traditional way,\" adds Lady Jane.\n*goto mosquito_fight1\n\n*label mosquito_fight1\n*temp mosquitodiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand mosquitodiceresult 1 dicesides\n*line_break\nThe mosquito rolled ${mosquitodiceresult}\n*set diceresult +skill\n*set mosquitodiceresult +mosquitoskill\n*line_break\nYour total: ${diceresult} Mosquito total: ${mosquitodiceresult}\n*if (diceresult > mosquitodiceresult)\n\t*line_break\n\tThe mosquito swoops on you and you hack at it with your machetes, wounding it and driving it back\n\t*set mosquitohp -2\n*if (diceresult \u003c mosquitodiceresult)\n\t*line_break\n\tThe mosquito gets among you and stabs with its proboscis\n\t*set stamina -2\n*if (diceresult = mosquitodiceresult)\n\t*line_break\n\tThe mosquito circles above looking for an opening\n\t*goto mosquito_fight1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe mosquito has ${mosquitohp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (mosquitohp \u003c 1)\n\t*goto win\n*else\n\t*goto mosquito_fight1\n\t\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set mosquitohp - bullet_damage\n*line_break\nThe mosquito has ${mosquitohp} stamina remaining\n*if (mosquitohp \u003c 1)\n\t*goto win\n*else\n\t*goto mosquito_fight\n\n\t\n*label winshot\nThe mosquito's eyes are like two sunflowers and your bullet hits right between them. It flies around in diminishing circles like a released ballon until splashing into the water and floating away.\n\n\"Well I guess I got him to buzz off!\" you say in a moment of inspiration.\n\n\"Probably best to leave the one-liners to us,\" says Sir Malcolm kind heartedly.\n*goto winimagine\n\n*label mosquito_fightk\n*temp mosquitodiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand mosquitodiceresult 1 dicesides\n*line_break\nThe mosquito rolled ${mosquitodiceresult}\n*set diceresult +skill\n*set mosquitodiceresult +mosquitoskill\n*line_break\nYour total: ${diceresult} Mosquito total: ${mosquitodiceresult}\n*if (diceresult > mosquitodiceresult)\n\t*line_break\n\tThe mosquito swoops and you punch into it's body, fracturing the exoskeleton\n\t*set mosquitohp -3\n*if (diceresult \u003c mosquitodiceresult)\n\t*line_break\n\tThe mosquito gets among you and stabs with its proboscis\n\t*set stamina -2\n*if (diceresult = mosquitodiceresult)\n\t*line_break\n\tThe mosquito circles above looking for an opening\n\t*goto mosquito_fightk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe mosquito has ${mosquitohp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (mosquitohp \u003c 1)\n\t*goto win\n*else\n\t*goto mosquito_fightk\n\t\n*label win\n\nThe mosquito flies around randomly before dropping into the water and slowly floating away.\n*label winimagine\n\n\"Imagine how much blood that thing would need to live,\" says Lady Jane.\n\n\"I'd rather not,\" replies Sir Malcolm.\n\nYou decide to abandon pressing ahead this time.\n*if (stamina = max_stamina)\n\t*goto tether\n*elseif (provisions = false)\n\t*goto tether\n*else\n\t*goto choice8\n*label choice8\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto tether\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto tether\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto tether\n\t*if (provisions = false) #Tether\n\t\t*goto tether\n\n", "newchoosestats": "*label init \n*set ap 6\n*temp skill_limit 4 \n*temp stamina_limit 6 \n*temp luck_limit 4 \n*temp skillset false\n*temp luckset false\n*temp staminaset false\n*label choose_stats \nYou have ${ap} extra points left to spend to increase your stats. Which stat do you want to increase?\n*choice \n\t*selectable_if (skillset = false) #Skill\n\t\tHow many points will you spend to increase skill? (1 - ${skill_limit}) \n\t\t*input_number stat1 1 skill_limit \n\t\t*set skill +stat1 \n\t\t*set skillset true\n\t\t*goto adjust_ap\n\t*selectable_if (staminaset = false) #Stamina\n\t\tHow many points will you spend to increase stamina? (1 - ${stamina_limit}) \n\t\t*input_number stat1 1 stamina_limit \n\t\t*set stamina +stat1\n\t\t*set staminaset true\n\t\t*goto adjust_ap \n\t*selectable_if (luckset = false) #Luck\n\t\tHow many points will you spend to increase luck? (1 - ${luck_limit})\n\t\t*input_number stat1 1 luck_limit \n\t\t*set luck +stat1\n\t\t*set luckset true\n\t\t*goto adjust_ap \n\t#I'm finished spending extra points\n\t\t*goto done\n\t#Reset stats and extra points\n\t\t*set stamina 17\n\t\t*set luck 8\n\t\t*set skill 8\n\t\t*goto init \n*label adjust_ap \n*set ap -stat1 \n*if ap \u003c 1 \n\t*goto done\n*if skill_limit > ap\n\t*set skill_limit ap\n*if stamina_limit > ap \n\t*set stamina_limit ap\n*if luck_limit > ap\n\t*set luck_limit ap \n*goto choose_stats \n*label done \n*set max_stamina stamina\n*set max_luck luck\n*set max_skill skill\n*page_break The Journey Begins...\n*goto_scene club2\n\n\n", "noprovisions": "*label no_provisions\n\"Empty already. They were tastier than I thought they would be,\" you say hungrily.\n\n*set provisions false\n*return", "racetoballoon": "You feel huge relief as you pass through the door and into the fresh air outside. Vines coil and uncoil on either side of you as you rush along the flag-stoned path towards the dynamited gate. An unearthly howling comes from behind. \n\nYou run through the ruins of the gate, acutely aware of the breach. Mercifully your rope is still hanging in place. \n\n*if ((ladyjanedead = true) and (sirmalcolmdead = true)) \n\t\"Thank God for that!\" you exclaim.\n\t*goto moangate\n*elseif ((ladyjanedead = true) and (sirmalcolmdead = false)) \n\t\"Thank God for that!\" you exclaim.\n\t\n\t\"Seconded!\" says Sir Malcolm\n\t*goto moangate\n*elseif ((ladyjanedead = false) and (sirmalcolmdead = true))\n\t\"Thank God for that!\" you exclaim.\n\t\n\t\"Seconded!\" says Lady Jane\n\t*goto moangate\n*else \n\t\"Thank God for that!\" you exclaim.\n\t\n\t\"Seconded!\" says Sir Malcolm\n\t\n\t\"Thirded!\" adds Lady Jane\n\t*goto moangate\n\n*label moangate\nA tortured moan comes from the gate. The shambling horror staggers into view.\n*choice\n\t*if ((aliengun = true) and (aliengunfiredonce = true)) #Use the jewel gun \n\t\t*if ((ladyjanedead = true) and (sirmalcolmdead = true))\n\t\t\tAs the creature draws level with the gate you fire again. The beam hits and the figure staggers. With a pang of fear you realise the beam is not as powerful as before. \n\t\t\t\n\t\t\tWith no time to lose you start your climb. Your heart pounds and your muscles are on fire as you climb the rope as fast as you can.\n\t\t\t*goto ropeclimb\n\t\t*elseif ((ladyjanedead = true) and (sirmalcolmdead = false))\n\t\t\t\"Climb! I'll hold it off,\" you shout to Sir Malcolm.\n\t\t\t\n\t\t\tAs the creature draws level with the gate you fire again. The beam hits and the figure staggers. With a pang of fear you realise the beam is not as powerful as before. \n\t\t\t\n\t\t\tWith no time to lose you start your climb. Your heart pounds and your muscles are on fire as you climb the rope as fast as you can.\n\t\t\t*goto ropeclimb\n\t\t*elseif ((ladyjanedead = false) and (sirmalcolmdead = true))\n\t\t\t\"Climb! I'll hold it off,\" you shout to Lady Jane.\n\t\t\t\n\t\t\tAs the creature draws level with the gate you fire again. The beam hits and the figure staggers. With a pang of fear you realise the beam is not as powerful as before. \n\t\t\t\n\t\t\tWith no time to lose you start your climb. Your heart pounds and your muscles are on fire as you climb the rope as fast as you can.\n\t\t\t*goto ropeclimb\n\t\t*else\n\t\t\t\"Climb! I'll hold it off,\" you shout to Sir Malcolm and Lady Jane.\n\t\t\t\n\t\t\tAs the creature draws level with the gate you fire again. The beam hits and the figure staggers. With a pang of fear you realise the beam is not as powerful as before. \n\t\t\t\n\t\t\tWith no time to lose you start your climb. Your heart pounds and your muscles are on fire as you climb the rope as fast as you can.\n\t\t\t*goto ropeclimb\n\t\t\t\n\t*if ((aliengun = true) and (aliengunfiredonce = false)) #Use the jewel with the gun\n\t\t*if ((ladyjanedead = true) and (sirmalcolmdead = true))\n\t\t\tAs the creature draws level with the gate you fire. The beam hits and the figure slides neatly in two. The jewel dims noticeably.\n\t\t\t\n\t\t\tWith no time to lose you start your climb. Your heart pounds and your muscles are on fire as you climb the rope as fast as you can.\n\t\t\t*goto ropeclimb\n\t\t*elseif ((ladyjanedead = true) and (sirmalcolmdead = false))\n\t\t\t\"Climb! I'll hold it off,\" you shout to Sir Malcolm.\n\t\t\t\n\t\t\tAs the creature draws level with the gate you fire. The beam hits and the figure slides neatly in two. The jewel dims noticeably. \n\t\t\t\n\t\t\tWith no time to lose you start your climb. Your heart pounds and your muscles are on fire as you climb the rope as fast as you can.\n\t\t\t*goto ropeclimb\n\t\t*elseif ((ladyjanedead = false) and (sirmalcolmdead = true))\n\t\t\t\"Climb! I'll hold it off,\" you shout to Lady Jane.\n\t\t\t\n\t\t\tAs the creature draws level with the gate you fire. The beam hits and the figure slides neatly in two. The jewel dims noticeably.\n\t\t\t\n\t\t\tWith no time to lose you start your climb. Your heart pounds and your muscles are on fire as you climb the rope as fast as you can.\n\t\t\t*goto ropeclimb\n\t\t*else\n\t\t\t\"Climb! I'll hold it off,\" you shout to Sir Malcolm and Lady Jane.\n\t\t\t\n\t\t\tAs the creature draws level with the gate you fire. The beam hits and the figure slides neatly in two. The jewel dims noticeably.\n\t\t\t\n\t\t\tWith no time to lose you start your climb. Your heart pounds and your muscles are on fire as you climb the rope as fast as you can.\n\t\t\t*goto ropeclimb\n\t#Climb the rope\n\t\tWith no time to lose you start your climb. Your heart pounds and your muscles are on fire as you clamber up the rope as fast as you can.\n\t\t*goto ropeclimb\n\t\t\n*label ropeclimb\n*if ((ladyjanedead = true) and (sirmalcolmdead = true)) \n\tFinally you pull yourself to the top of the wall.\n\t*goto ropeclimb1\n*elseif ((ladyjanedead = true) and (sirmalcolmdead = false)) \n\tAs you near the top Sir Malcolm shouts anxiously:\n\t\n\t*if (male = true)\t\n\t\t\"Be quick Jack, its nearly at the wall!\"\n\t*if (female = true)\n\t\t\"Be quick Jill, its nearly at the wall!\"\n\t\n\tFinally you reach the summit and he pulls you to the ledge.\t\n\t*goto ropeclimb1\n*elseif ((ladyjanedead = false) and (sirmalcolmdead = true))\n\tAs you near the top Lady Jane shouts anxiously:\n\t\n\t*if (male = true)\n\t\t\"Be quick Jack, its nearly at the wall!\"\n\t*if (female = true)\n\t\t\"Be quick Jill, its nearly at the wall!\"\n\t\n\tFinally you reach the summit and she pulls you to the ledge.\n\t*goto ropeclimb1\n*else \n\tAs you near the top Sir Malcolm and Lady Jane shout anxiously:\n\t\n\t*if (male = true)\t\n\t\t\"Be quick Jack, its nearly at the wall!\"\n\t*if (female = true)\t\n\t\t\"Be quick Jill, its nearly at the wall!\"\n\t*if (male = true)\n\t\t\"Don't cut it too fine there's a good chap!\"\n\t*if (female = true)\n\t\t\"Don't cut it too fine there's a good chapess!\"\n\t\n\tFinally you reach the summit and they pull you to the ledge.\n\t*goto ropeclimb1\n\n*label ropeclimb1\n*if ((ladyjanedead = true) and (sirmalcolmdead = true)) \n\tImmediately you start reeling in the rope. Looking down you can see the figure at the base of the wall. It looks upwards and screams. Something shifts inside it. \n\t\n\tAs you lower the rope to scale down the other side of the wall and away from the city it begins to climb hand over hand up the wall towards you.\n\t*goto ropeclimb2\n*elseif ((ladyjanedead = true) and (sirmalcolmdead = false)) \n\tImmediately he begins reeling in the rope. Looking down you can see the figure at the base of the wall. It looks upwards and screams. Something shifts inside it. \n\t\n\tAs Sir Malcolm lowers the rope to scale down the other side of the wall and away from the city it begins to climb hand over hand up the wall towards you.\n\t*goto ropeclimb2\n*elseif ((ladyjanedead = false) and (sirmalcolmdead = true))\n\tImmediately she begins reeling in the rope. Looking down you can see the figure at the base of the wall. It looks upwards and screams. Something shifts inside it. \n\t\n\tAs Lady Jane lowers the rope to scale down the other side of the wall and away from the city it begins to climb hand over hand up the wall towards you.\n\t*goto ropeclimb2\n*else \n\tImmediately they begin reeling in the rope. Looking down you can see the figure at the base of the wall. It looks upwards and screams. Something shifts inside it. \n\t\n\tAs Sir Malcolm and Lady Jane lower the rope to scale down the other side of the wall and away from the city it begins to climb hand over hand up the wall towards you.\n\t*goto ropeclimb2\n\n\n*label ropeclimb2\n*if ((ladyjanedead = true) and (sirmalcolmdead = true)) \n\tThe second you reach the base of the wall you begin running across the grass plain towards the jungle outline. \n\t\n\tA cry from behind makes you turn. At the top of the wall a white figure is starting it’s descent. \n\n\tIn the sky ahead a hot air balloon is descending rapidly, a rope ladder swinging below. From behind, the cries grow louder.\n\t*goto balloon\n*elseif ((ladyjanedead = true) and (sirmalcolmdead = false)) \n\tThe second you reach the base of the wall you and Sir Malcolm begin running across the grass plain towards the jungle outline. \n\t\n\tA cry from behind makes you turn. At the top of the wall a white figure is starting it's descent. A firm hand on your shoulder makes you jump.\n\t\n\t*if (male = true)\n\t\t\"Look there Jack!\" says Sir Malcolm, pointing.\t\n\t*if (female = true)\n\t\t\"Look there Jill!\" says Sir Malcolm, pointing.\t\n\t\n\tIn the sky ahead a hot air balloon is descending rapidly, a rope ladder swinging below. From behind, the cries grow louder.\t\n\t*goto balloon\n*elseif ((ladyjanedead = false) and (sirmalcolmdead = true))\n\tThe second you reach the base of the wall you and Lady Jane begin running across the grass plain towards the jungle outline. \n\t\n\tA cry from behind makes you turn. At the top of the wall a white figure is starting it's descent. A gentle hand on your shoulder makes you jump.\n\t\n\t*if (male = true)\n\t\t\"Look there Jack!\" says Lady Jane, pointing.\t\n\t*if (female = true)\n\t\t\"Look there Jill!\" says Lady Jane, pointing.\t\n\t\n\tIn the sky ahead a hot air balloon is descending rapidly, a rope ladder swinging below. From behind, the cries grow louder.\t\n\t*goto balloon\n*else \n\tThe second you reach the base of the wall the three of you begin running across the grass plain towards the jungle outline. \n\t\n\tA cry from behind makes you turn. At the top of the wall a white figure is starting it's descent. A gentle hand on your shoulder makes you jump.\n\t\n\t*if (male = true)\n\t\t\"Look there Jack!\" says Lady Jane, pointing.\n\t*if (female = true)\n\t\t\"Look there Jill!\" says Lady Jane, pointing.\n\t\n\tIn the sky ahead a hot air balloon is descending rapidly, a rope ladder swinging below. From behind, the cries grow louder.\t\n\t\n\t\"This is going to be tight!\" shouts Sir Malcolm.\n\t*goto balloon\n\t\n*label balloon\n*if ((ladyjanedead = true) and (sirmalcolmdead = true)) \n\tThe balloon bobs like a giant fishing float and the ladder careers about wildly. Trying to get your hands on it is like trying to catch a wild animal.\n\t\n\tAs soon as you have both hands on the rope ladder the pilot of the balloon pulls a handle on the burner flame and with a whoosh of hot air the balloon careens skyward. You dangle on the ladder below as the ground falls away. \n\t\n\tYou climb up the swinging ladder and a hand helps you into the basket.\n\t*page_break The Balloon\n\t*goto balloon1\n*elseif ((ladyjanedead = true) and (sirmalcolmdead = false)) \n\tThe balloon bobs like a giant fishing float and the ladder careers about wildly. Trying to get your hands on it is like trying to catch a wild animal.\n\t\n\tThe ladder whizzes past Sir Malcolm and he grabs it, pulling himself up and into the basket. \n\t\n\tAs soon as you have both hands on the rope ladder the pilot of the balloon pulls a handle on the burner flame and with a whoosh of hot air the balloon careens skyward. You dangle on the ladder below as the ground falls away. \n\t\n\t*if (male = true)\n\t\t\"Don’t look down Jack!\" shouts Sir Malcolm, somewhat needlessly, as you climb up the swinging ladder.\n\t*if (female = true)\n\t\t\"Don’t look down Jill!\" shouts Sir Malcolm, somewhat needlessly, as you climb up the swinging ladder.\n\t\n\tA hand helps you into the basket.\n\t*page_break The Balloon\n\t*goto balloon1\n*elseif ((ladyjanedead = false) and (sirmalcolmdead = true))\n\tThe balloon bobs like a giant fishing float and the ladder careers about wildly. Trying to get your hands on it is like trying to catch a wild animal.\n\t\n\tThe ladder whizzes past Lady Jane and she grabs it, pulling herself up and into the basket. \n\t\n\tAs soon as you have both hands on the rope ladder the pilot of the balloon pulls a handle on the burner flame and with a whoosh of hot air the balloon careens skyward. You dangle on the ladder below as the ground falls away. \n\t\n\t*if (male = true)\n\t\t\"Don’t look down Jack!\" shouts Lady Jane, somewhat needlessly, as you climb up the swinging ladder.\n\t*if (female = true)\n\t\t\"Don’t look down Jill!\" shouts Lady Jane, somewhat needlessly, as you climb up the swinging ladder.\n\t\n\tA hand helps you into the basket.\n\t*page_break The Balloon\n\t*goto balloon1\n*else \n\tThe balloon bobs like a giant fishing float and the ladder careers about wildly. Trying to get your hands on it is like trying to catch a wild animal.\n\t\n\tThe ladder whizzes past Sir Malcolm and he grabs it, pulling himself up and into the basket. Lady Jane soon follows suit.\n\t\n\tAs soon as you have both hands on the rope ladder the pilot of the balloon pulls a handle on the burner flame and with a whoosh of hot air the balloon careens skyward. You dangle on the ladder below as the ground falls away. \n\t\n\t*if (male = true)\t\n\t\t\"Don’t look down Jack!\" shouts Sir Malcolm, somewhat needlessly, as you climb up the swinging ladder.\n\t*if (female = true)\n\t\t\"Don’t look down Jill!\" shouts Sir Malcolm, somewhat needlessly, as you climb up the swinging ladder.\n\t\n\tLady Jane peers over the side, trying not to look horrified.\n\t\n\tA hand helps you into the basket.\n\t*page_break The Balloon\n\t*goto balloon1\n\t\n*label balloon1\n*image balloon.jpg\n*if ((ladyjanedead = true) and (sirmalcolmdead = true)) \n\tIn the basket at last you look over the side as the city and plains slip from view. The pilot reaches into a picnic basket at his feet and hands you a champagne glass.\n\t\n\t“Were you expecting me or something?” you ask.\n\n\tThe pilot looks confused.\n\t\n\t\"This is where I was told to be,\" he replies. \"Pick up four passengers at this time and this location.\"\n\t\n\tHe opens a bottle of champagne and the popping cork sails over the side of the basket and down towards the winding Mjaa Nto. You picture it’s journey and imagine it bobbing along the river, oblivious to the horrors surrounding it. \n\t\n\t\"I can see it is just you,\" says the pilot \"but this wouldn't be the first time I have had to pick up... how shall I say this... less passengers than anticipated.\"\n\t\n\t*if (percivalheadinjar = true) \n\t\tYou wonder whether to introduce Sir Percival and decide against it.\n\t\t*goto drop\n\t*else\n\t\t*goto drop\n\t\t\t\n\t\t\n\t*label drop\t\t\n\tYou drop your glass of champagne over the side and slump into the corner of the basket. The loss of your companions is unbearable. The gem weighs heavy in your pocket and heavier in your heart.\n\t\t\t\n\t*if (envelope = true) \n\t\tYou remember the envelope and open it\n\t\t*goto envelope\n\t*else\n\t\t*goto_scene ending\n\t\t\n\t\t\n\t \n\t \n\t\n*elseif ((ladyjanedead = true) and (sirmalcolmdead = false)) \n\tIn the basket at last you look over the side as the city and plains slip from view. The pilot reaches into a picnic basket at his feet and hands you a champagne glass.\n\t\n\t\"Were you expecting us or something?\" you ask.\n\t\n\tThe pilot looks confused.\n\t\n\t\"This is where I was told to be,\" he replies. “Pick up four passengers at this time and this location.” \n\t\n\tHe opens a bottle of champagne and the popping cork sails over the side of the basket and down towards the winding Mjaa Nto. You picture it’s journey and imagine it bobbing along the river, oblivious to the horrors surrounding it. \n\t\n\t\"I can see it is just the two of you,\" says the pilot \"but this wouldn't be the first time I have had to pick up... how shall I say this... less passengers than anticipated.\"\n\t\n\t*if (percivalheadinjar = true) \n\t\tYou wonder whether to introduce Sir Percival and decide against it.\n\t\t*goto drop1\n\t*else\n\t\t*goto drop1\n\n\t*label drop1\n\tYou take a sip of your champagne but it tastes of nothing and you pour it over the side.\n\n\tSir Malcolm is staring over the edge of the basket. You put your hand on his shoulder and he turns to you, eyes red.\n\n\t*if (male = true)\n\t\t\"I am going to miss her very much Jack,\" he says.\n\t*if (female = true)\n\t\t\"I am going to miss her very much Jill,\" he says.\n\n\t\"Me too, me too\" you reply.\n\n\tThe gem feels heavy in your pocket but your heart feels heavier.\n\t*if (envelope = true) \n\t\tYou remember the envelope and open it\n\t\t*goto envelope\n\t*else\n\t\t*goto_scene ending\n\n\t\t\n\n\t\n\t \n*elseif ((ladyjanedead = false) and (sirmalcolmdead = true))\n\tIn the basket at last you look over the side as the city and plains slip from view. The pilot reaches into a picnic basket at his feet and hands you a champagne glass.\n\t\n\t\"Were you expecting us or something?\" you ask.\n\t\n\tThe pilot looks confused.\n\t\n\t\"This is where I was told to be,\" he replies. \"Pick up four passengers at this time and this location.\" \n\t\n\tHe opens a bottle of champagne and the popping cork sails over the side of the basket and down towards the winding Mjaa Nto. You picture it’s journey and imagine it bobbing along the river, oblivious to the horrors surrounding it. \n\t\n\t\"I can see it is just the two of you,\" says the pilot \"but this wouldn't be the first time I have had to pick up... how shall I say this... less passengers than anticipated.\"\n\t\n\t*if (percivalheadinjar = true) \n\t\tYou wonder whether to introduce Sir Percival and decide against it.\n\t\t*goto drop2\n\t*else\n\t\t*goto drop2\n\n\t*label drop2\n\tYou take a sip of your champagne but it tastes of nothing and you pour it over the side.\n\n\tLady Jane is staring over the edge of the basket. You put your hand on her shoulder and she turns to you, eyes red.\n\n\t*if (male = true)\n\t\t\"I am going to miss him very much Jack,\" she says.\n\t*if (female = true)\n\t\t\"I am going to miss him very much Jill,\" she says.\n\n\t\"Me too, me too\" you reply.\n\n\tThe gem feels heavy in your pocket but your heart feels heavier.\n\t*if (envelope = true) \n\t\tYou remember the envelope and open it\n\t\t*goto envelope\n\t*else\n\t\t*goto_scene ending\n\t\n*else \n\tIn the basket at last you look over the side as the city and plains slip from view. The pilot reaches into a picnic basket at his feet and hands you a champagne glass.\n\t\n\t\"Were you expecting us or something?\" you ask.\n\t\n\tThe pilot looks confused.\n\t\n\t\"This is where I was told to be,\" he replies. \"Pick up four passengers at this time and this location.\" \n\t\n\tHe opens a bottle of champagne and the popping cork sails over the side of the basket and down towards the winding Mjaa Nto. You picture it’s journey and imagine it bobbing along the river, oblivious to the horrors surrounding it. \n\t\n\t\"I can see it is just the three of you,\" says the pilot, \"but this wouldn't be the first time I have had to pick up... how shall I say this... less passengers than anticipated.\"\n\t\n\t*if (percivalheadinjar = true) \n\t\tYou wonder whether to introduce Sir Percival and decide against it.\n\t\t*goto drop3\n\t*else\n\t\t*goto drop3\n\n\t*label drop3\n\t*if (gf = true)\n\t\t\"Well Jill,\" says Sir Malcolm, \"one thing is for certain. This story is going to take some beating at the Adventures club! Cheers!”\n\n\t\tWith a clink of glasses you toast your success and the balloon sails over the majestic scenery below.\n\n\t\tLady Jane leans forward and pecks your cheek with a kiss and the sun burns your face hotly.\n\t\t*goto envelopeend\n\t*if (sm = true)\n\t\t\"Well Jack,\" says Sir Malcolm, \"one thing is for certain. This story is going to take some beating at the Adventures club! Cheers!”\n\n\t\tWith a clink of glasses you toast your success and the balloon sails over the majestic scenery below.\n\n\t\tLady Jane leans forward and pecks your cheek with a kiss and the sun burns your face hotly.\n\t\t*goto envelopeend\n\t*if (gm = true)\n\t\t\"Well Jack,\" says Lady Jane, \"one thing is for certain. This story is going to take some beating at the Adventures club! Cheers!”\n\n\t\tWith a clink of glasses you toast your success and the balloon sails over the majestic scenery below.\n\n\t\tSir Malcolm leans forward and pecks your cheek with a kiss and the sun burns your face hotly.\n\t\t*goto envelopeend\n\t*if (sf = true)\n\t\t\"Well Jill,\" says Lady Jane, \"one thing is for certain. This story is going to take some beating at the Adventures club! Cheers!”\n\n\t\tWith a clink of glasses you toast your success and the balloon sails over the majestic scenery below.\n\n\t\tSir Malcolm leans forward and pecks your cheek with a kiss and the sun burns your face hotly.\n\t\t*goto envelopeend\n\t*else\n\t\t*if (male = true)\n\t\t\t\"Well Jack,\" says Lady Jane, \"one thing is for certain. This story is going to take some beating at the Adventures club! Cheers!”\n\t\t*if (female = true)\n\t\t\t\"Well Jill,\" says Lady Jane, \"one thing is for certain. This story is going to take some beating at the Adventures club! Cheers!”\n\n\t\tWith a clink of glasses you toast your success and the balloon sails over the majestic scenery below.\n\t\t*goto envelopeend\n\t*label envelopeend\n\t*if (envelope = true) \n\t\tYou remember the envelope and open it\n\t\t*goto envelope\n\t*if (envelope = false)\n\t\t*goto_scene ending\n\t\n\t\n\n*label envelope\n\n[i]Dear Reader,[/i]\n\n[i]If you have this letter then it means that you probably also have the jewel we know as the colour from space. It has been known by many other names through history that give more of a clue as to it’s true nature. [/i]\n\n[i]Before you proceed in unleashing it into the world, ask yourself what you know of mankind and what they will do with this power. This unearned power.[/i]\n\n[i]Some part of you must know that this jewel wanted to be found. Dark forces are at play, shadowy tentacles manipulating us as part of a much bigger and more horrific scheme than we can imagine. [/i]\n\n[i]Fellow adventurer, I urge you: leave this jewel and this place or risk awakening ancient evil and the darkness in all of our hearts. [/i]\n\n[i]Yours Randolph Marsh, June 10th 1839 [/i]\n*goto_scene ending\n\n\n", "reddoors": "*temp bullet_roll 0\n*temp bullet_damage 0\n*temp zombiearmoury false\n*temp examinejars false\n*temp examineequipment false\n\n\nThe double doors swing open. The corridor extends in front of you and to the right. On the right is a large glass panel that looks into a white room filled with jars and other strange equipment. At the end of the long corridor is a solid looking metal door with a single key hole and a simple handle.\n*choice\n\t#White room\n\t\t*label whiteroom\n\t\tMany shelves are on the wall of the white room, holding various types of odd-looking equipment and apparatus as well as glass jars. \n\t\t\n\t\t*if (zombiearmoury = false)\n\t\t\tA gurney in the middle of the floor has a white sheet over it, covering something.\n\t\t\t*choice\n\t\t\t\t#Examine the gurney\n\t\t\t\t\tYou slowly pull the sheet back to reveal a face that you recognise! Before you can speak it’s eyes flick open and you jump back with a start.\n\t\t\n\t\t\t\t\tIt is the corpse of Lord Percival’s Japanese henchman. An incision has been made from each shoulder all the way down his chest forming a Y shape. The loose stitches reveal that there is nothing in the body cavity. \n\t\t\t\t\t*goto zombiewhite\n\t\t\t\t#Examine the jars\n\t\t\t\t\tThe glass jars are filled with various organs. They are fascinating and repulsive in equal measure. One of the jars contains a heart floating in a liquid that has a purplish tinge to it. To your amazement it is still beating! A very large jar next to it is also filled with the clear purple liquid, this jar has no specimen in it.\n\t\t\t\t\n\t\t\t\t\t*label aboutto\n\t\t\t\t\tYou are about to share your findings with your companions when shouting breaks out behind you.\n\t\t\t\t\n\t\t\t\t\t\"Dear God!\" cries Sir Malcolm and you spin round to see what is causing the commotion.\n\t\t\t\t\n\t\t\t\t\tThe body on the gurney is now sitting upright!\n\t\t\t\t\n\t\t\t\t\tThe sheet slips off and it reveals the corpse of Lord Percival’s Japanese henchman. He turns slowly towards you and with a collective gasp you see that an incision has been made from each shoulder all the way down his chest forming a Y shape. The loose stitches reveal that there is nothing in the body cavity. His bare feet touch the floor and he slowly stands upright, arms outstretched he begins shambling towards you. His eyes are cold and hungry. \n\t\t\t\t\t*goto zombiewhite\n\t\t\t\t#Examine the equipment\n\t\t\t\t\tThe equipment is obviously surgical in nature and you recognise some of the objects as being scalpels and forceps. There are other \tobjects that you can only guess as to the purpose for. They make you feel uneasy and anxious. \n\t\t\t\t\t*goto aboutto\n\t\t\t\t\n\t\t\t\t\n\t\t*else\n\t\tThere is an empty gurney in the middle of the floor.\n\t\t*choice\n\t\t\t#Examine the jars\n\t\t\t\tThe glass jars are filled with various organs. They are fascinating and repulsive in equal measure. One of the jars contains a heart floating in a clear liquid that has a purplish tinge to it. To your amazement it is still beating! A very large jar next to it is also filled with the liquid, this jar has no specimen in it. \n\t\t\t\t*goto sharefindings\n\t\t\t#Examine the equipment\n\t\t\t\tThe equipment is obviously surgical in nature and you recognise some of the objects as being scalpels and forceps. There are other objects that you can only guess as to the purpose for. They make you feel uneasy and anxious. \n\t\t\t\t*goto sharefindings\n\t\t\t#Examine the gurney\n\t\t\t\tThere is a very small amount of clear liquid on the surface.\n\t\t\t\t\n\t\t\t\t*label sharefindings\n\t\t\t\tYou are about to share your findings with your companions when shouting breaks out behind you.\n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"He's back Jack!\" shouts Sir Malcolm.\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"He's back Jill!\" shouts Sir Malcolm.\n\t\t\t\t\n\t\t\t\tThe cadaver of the henchman is at the window, it's face pressed against the glass staring in with milky eyes.\n\t\t\t\t\n\t\t\t\t
