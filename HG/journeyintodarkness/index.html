nto flaccid white dough that greedily absorbs and spreads. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Take the envelope\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou bend down to take the envelope, wincing at the sound of Sir Malcolm’s screams bouncing off the walls. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Its...eatinmyg...my...soul...Jack!” he whimpers, each word getting quieter and harder to say. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t“Its...eating...my...soul...Jill!” he whimpers, each word getting quieter and harder to say. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (ladyjanedead = false)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith the envelope in hand you and Lady Jane run for the doors and don't look back.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto irondoor\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith the envelope in hand you run for the doors and don’t look back.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto irondoor\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label irondoor\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set envelope true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe iron door ahead is wide open and you fervently race to be through it and out of this godforsaken place as soon as possible. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe pool is bubbling violently now. Above, the constellations shift and realign. A frenzied banging comes from the red double doors, thankfully holding back whoever or whatever is on the other side.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break Escape\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene racetoballoon\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Ignore it\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou run as Sir Malcolm lets out a final scream.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe iron door ahead is wide open and you fervently race to be through it and out of this godforsaken place as soon as possible. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe pool is bubbling violently now. Above, the constellations shift and realign. A frenzied banging comes from the red double doors, thankfully holding back whoever or whatever is on the other side.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break Escape\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene racetoballoon\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (acidjar = false) #Force the mechanism\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIn frustration and panic you try to force the mechanism to release but it is hopeless.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe match goes out and it is dark again.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t*if (monkeytablet = false) #Unfortunately I couldn't complete my notes\"\n\t\t\t\t\t\t*goto erm\n\t\t\t\t\t\t\n\t\t\t*if (tablet = false) #\"I agree\" says Lady Jane\n\t\t\t\t*goto erm\n\t\t\t\t\n\t\t\t\t\n*label bulletsnotwork\n\nThe bullet passes right through the centre mass of the nightmare and for a brief moment you can see a hole drilled right through it. This soon closes up. Your bullets have no effect!\n*if (sirmalcolmdead = true)\n\t*goto rundead\n*if (sirmalcolmdead = false)\n\t*goto runnotdead\n\n*label nobullets\n\nYour gun clicks uselessly as the nightmare approaches.\n*if (sirmalcolmdead = true)\n\t*goto rundead\n*if (sirmalcolmdead = false)\n\t*goto runnotdead\n\t\n*label smheadjar\n*choice\n\t*if (headjar = true) #Put his head in the jar\n\t\t*set percivalheadinjar true\n\t\tYou pick up Lord Percival's head by the hair and gently place it in the jar. Excess fluid spills down the sides and you screw the top back on tightly. Inside the jar the head blinks wildly and mouths a silent scream. You hurriedly add it to your backpack, glad to have it out of sight. \n\t\t*goto stepsforward\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t*if (headjar = true) #Don't put his head in the jar\n\t\tLord Percival's head stares up at you and you experience a brief but intense sensation that he is begging for you to take him with you.\n\t\t*goto stepsforward\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t", "choicescript_description": "Embark on a Victorian adventure that begins in the heart of London and takes you across the world in a race to obtain a fabled jewel with mysterious powers. Navigate the deadly river Mjaa Nto and twisted jungle paths where danger lurks beneath the surface and around every corner.\n\nJourney into Darkness is a challenging 50,000 word interactive fantasy novel by Jonathan Clark, where your choices control the story. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nThere are eight full-size color lino-cut illustrations and six smaller handmade stamp illustrations within this text adventure.\n\nWill you beat your rivals to the prize? Can you fight off the dangers along the way? Will you find the right path and the knowledge you need to succeed or will you succumb to the darkness?\n\n• Play as male or female.[n/]\n• Travel to exotic locations.[n/]\n• Solve the puzzle of the one true path.[n/]\n• Fight monsters and other horrors.[n/]\n• Endure the sarcasm of your traveling companions.[n/]\n• Awaken an ancient cosmic horror.[n/]", "choicescript_stats": "*stat_chart\n\ttext Skill\n\ttext Stamina\n\ttext Luck\n\ttext Gold\n\t\n*if poemone\n\t[b]\"The light from space will do as bid.\"[/b]\n\t\n*if poemtwo\n\t[b]\"Of death’s dark shadow we will be rid.\"[/b]\n\t\n*if poemthree1\n\t[b]\"Too late some things should ere remain hid\".[/b]\n\t\t\n*if bullets_number !=0\n\tBullets: ${bullets_number}\n*if provisions_number !=0\n\tProvisions: ${provisions_number}\n*temp inventory \"\"\n*temp comma false\n*if (empty_inventory)\n\t*set comma true\n\t*set inventory &\"You are carrying nothing\"\n*if (translation)\n\t*set comma true\n\t*set inventory &\"Translation Book\"\n*if (dynamite)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Dynamite\"\n*if (gun)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Gun\"\n*if (bulletclip)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Clip of 6 bullets\"\n*if (knuckle)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Knuckle Duster\"\n*if (provisions)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Provisions\"\n*if (poisons)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Book on poisons\"\n*if (map)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Map\"\n*if (machete)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Machete\"\n*if (backpack)\n\t*if comma\n\t\t*set  inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Backpack\"\n*if (rope)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Rope\"\n*if (matches)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Matches\"\n*if (suit)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Safari Suit\"\n*if (hook)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Grappling Hook\"\n*if (rabbitsfoot)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Rabbits Foot\"\n*if (chefwhite)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Chef's whites\"\n*if (wax)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Wax\"\n*if (boar)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Wild Boar\"\n*if (kerosene)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Kerosene\"\n*if (greenbad)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Green Parchment\"\n*if (poemthree)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Green Parchment\"\n*if (crown)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Crown\"\n*if (redbad)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Red Parchment\"\n*if (armourykey)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Armoury Key\"\n*if (spidergem)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Spider Gem\"\n*if (acidjar)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Jar of Acid\"\n*if (envelope)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Envelope\"\n*if (percivalheadinjar)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Lord Percival's head in a jar\"\n*if (headjar)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Jar of Purple\"\n*if (alienhelmet)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Helmet-like object\"\n*if (aliencannister)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Cannister-like object\"\n*if (aliengun)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Gun-like object\"\n*if (pill)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Witch Doctor pill\"\n*if (doll)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Kolf boy voodoo doll\"\n*if (spot)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"Spot\"\n*if (colourgem)\n\t*if comma\n\t\t*set inventory &\", \"\n\t*set comma true\n\t*set inventory &\"The Colour from Outer Space\"\n\n\n\t\n\t\nInventory: ${inventory}\n*line_break\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase_discount adfree 2020-05-28 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.", "city": "You descend downwards at dizzying speed and then swoop up, gliding magnificently with the jungle and river Mjaa Nto below.\n\nAfter a while the river flows over the edge of a ravine, creating a magnificent waterfall. Lady Jane keeps Princess flying in the same direction over more jungle that eventually thins to empty plains. Up ahead is a city within two walls. \n*choice\n\t#Land inside the city\n\t\tYou look down onto the city from above. The streets and buildings are overgrown with vines and flowers. The paths, small buildings and courtyards combine to form a complex maze. There is a larger central building that stands out from the others. Lady Jane is pointing and shouting:\n\t\t\n\t\t\"We will land there,\" she says and you descend into the city. You alight in front of the building, happy to be on solid ground.\n\t\t\n\t\tSweeping steps lead up to the central building. An arch is flanked by pillars, the cornices intricately carved with entwining tentacles. A stone guardian sits guard outside at the foot of the steps. It is a four legged beast, vaguely leonine but with an octopoid head. The black iron door in the arch is slightly ajar. Your ride flaps its wings uneasily. \n\t\t\n\t\tLady Jane tethers Princess to the stone guardian. \n\t\t\n\t\t*set arrivedbyflight true\n\t\t\"See you when we get back,\" she says and pats it's neck reassuringly. \n\t\t*goto_scene centralbuilding\n\t\t\n\t\t\n\t\t\n\t\t\n\t#Land outside the city\n\t\tLady Jane tethers Princess to a nearby rock. \n\t\t\n\t\t\"See you when we get back,\" she says and pats its neck reassuringly.\n\t\t\n\t\tEventually you stand at the base of the wall looking up. It is at least sixty foot high and made from blocks of stone. The face of the wall is smooth and without footholds. Sir Malcolm looks up and whistles:\n\t\t\n\t\t\"You know, there’s something about this wall that makes me curious. It’s almost as if it was built to keep people in rather than out,\" he says.\n\t\t\n\t\tLady Jane also looks troubled. \"It’s very odd, this plain shouldn’t be here. Look - the Jungle is all around us and then just stops at the perimeter about a mile short of the wall.\"\n\t\t*choice\n\t\t\t#Climb the wall\n\t\t\t\t*label climbthewall\n\t\t\t\tSir Malcolm ties everyone's rope together.\n\t\t\t\t\n\t\t\t\t\"Even using all our ropes this is going to be touch and go,\" he says.\n\t\t\t\n\t\t\t\tSir Malcolm spins the grappling iron above his head and flings it to the top of the wall. It disappears over the edge and he pulls the rope back. The iron has caught on something and with some hard tugs he nods that it is safe to climb.\n\t\t\t\t\n\t\t\t\t\"I think we had better do this one at a time,\" says Lady Jane. \"The three of us and our backpacks is a lot of weight. Well, ladies first!\"\n\t\t\t\t\n\t\t\t\tWith that Lady Jane starts the climb while you watch on nervously.\n\t\t\t\t\n\t\t\t\t\"I'm not sure what is worse, doing the climbing or watching it!\" says Sir Malcolm and you agree.\n\t\t\t\t\n\t\t\t\tSoon enough Lady Jane is at the top and perched on the edge of the wall. She calls down for the next climber.\n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"Me next old boy,\" says Sir Malcolm. \"You can have my mint cake if I don't make it!\"\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"Me next old girl,\" says Sir Malcolm. \"You can have my mint cake if I don't make it!\"\n\t\t\t\t\n\t\t\t\tLaughing, he climbs the rope. You pace at the foot of the wall, glancing occasionaly at the edge of the jungle and the empty space in between.\n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"Toodle-oo Jack, do join us won't you?\"\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"Toodle-oo Jack, do join us won't you?\"\n\t\t\t\t\n\t\t\t\tSir Malcolm and Lady Jane are waving from the top. Here goes nothing you think to yourself and start climbing. \n\t\t\t\t\n\t\t\t\tSoon you are all together again and looking down from the wall to what lies below.\n\t\t\t\t\n\t\t\t\tThere is another wall encircling a city of some kind. The buildings and wall are almost entirely covered in green. An enormous gate has been built into this wall, it must be at least fifty foot tall and nearly as wide. A huge wooden beam across the gate holds it shut. At the top is an ornate stone carving of writhing tentacles holding a jewel. Silence hangs over the city. With a collective sigh you prepare for the descent.\n\t\t\t\t\n\t\t\t\tYou stand at the foot of the inner wall and the gate towers above you. \n\t\t\t\t\n\t\t\t\t\"Well we got this far,\" says Lady Jane. \"Welcome to the City of the Dead.\"\n\t\t\t\t\n\t\t\t\t\"You know,\" says Sir Malcolm, \"I really do not want to imagine what requires a gate of that magnitude.\"\n\t\t\t\t*choice\n\t\t\t\t\t*if (dynamite = false) #\"We have no dynamite\"\n\t\t\t\t\t\t\"There is no way we can get through this gate without dynamite,\" says Sir Malcolm. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"We have no choice but to look for another way in,\" agrees Lady Jane.\n\t\t\t\t\t\t*goto walltowers\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t*if (dynamite = true) #Use the dynamite\n\t\t\t\t\t\tYou place the explosives at the base of the gate and run the fuse as far away as possible. Sir Malcolm and Lady Jane are in the distance, crouching down with their hands over their ears. You touch a lit match to the fuse and it starts to fizz towards the dynamite. You run back to them and hunker down. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Knock Knock!\" shouts Sir Malcolm before a massive boom blasts through the air followed by small chunks of raining debris. As the smoke clears it reveals that the beam holding the gate closed has been blown in half. The gate swings slowly open. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"We should leave the ropes in place,\" says Lady Jane. \"We may need to leave in a hurry.\"\n\t\t\t\t\t\t*goto_scene cityproper\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#Look for another way in\n\t\t\t\t\t\t*label walltowers\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe wall towers above you, covered in thick vines. A skeleton is entwined among them halfway up, staring out blankly with empty sockets. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Climb the inner wall\n\t\t\t\t\t\t\t\tThe vines make it easy to climb and soon you have made much progress and are halfway up the wall. With the hot sun beating down on your back you pause for a moment. The vine you are holding onto twists under your grip and you feel something snake around your ankle. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tTo the side, Sir Malcolm and Lady Jane are crying out in frustration as they too start to become entangled in the moving vines. With nowhere to go you are all soon fully trapped. You await the end and see in your minds eye the wall with three new skeletons adorning it.\n\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t#Continue to look for another way in\n\t\t\t\t\t\t\t\tThere is seemingly no break in the vines covering the inner wall. As you walk around the outside you are mocked occasionally by the odd grinning skull in the foliage. Finally there is a part of the wall that is not covered by the ubiquitous vines. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Climb the clear part of the wall\n\t\t\t\t\t\t\t\t\t\tThere are plenty of places to get a grip on the wall and it isn’t long before you are halfway up. You stop for a rest, the hot sun beating down on your shoulders. You look down to where you climbed from and to your horror that gap is now entirely covered with vines! Looking up, you can see them moving across to cut off your progress. With nowhere to go, they start towards you hungrily. \n\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t#Continue walking around\n\t\t\t\t\t\t\t\t\t\tHour after hour you trudge round the perimeter. There is no break in the vines and no other sign of an entrance. The sun starts to set and long after tiredness has set in you find yourselves back to where you started from. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tLady Jane cries out, pointing up to the outer wall. Looking up you see that the ropes you used to descend have been cut, leaving only a few feet at the top to show they were ever there. There is no way back and night is coming. Behind you, the vines rustle hungrily. \n\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t#Explore the perimeter\n\t\t\t\tThe slog around the perimeter feels endless and after many hours you agree that there is no way in except climbing.\n\t\t\t\t*goto climbthewall\n\t\t\n\t\t\n\t\t", "cityproper": "*temp bullet_roll 0\n*temp bullet_damage 0\n*temp lucktest 0\n*temp white false\n*temp purple false\n*temp flowers false\n*temp purplelily false\n*temp yellowflower false\n*temp pinkflower false\n*temp blackrose false\n*temp redrose false\n*temp north1 false\n*temp north2 false\n*temp north3 false\n*temp west1 false\n*temp west2 false\n*temp south1 false\n*temp south2 false\n*temp east1 false\n*temp east2 false\n*temp crossroads2 false\n*temp cry 0\n*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 false\n\t\t\t*set chapter4 false\n\t\t\t*set chapter5 false\n\t\t\t*set chapter6 false\n\t\t\t*set chapter7 false\n\t\t\t*set chapter8 false\n\t\t\t*set chapter9 false\n\t\t\t*set chapter10 false\n\t\t\t*set chapter11 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto thecityis\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*if (chapter4 = true)\n\t\t\t\t*goto_scene marsh thesoft\n\t\t\t*if (chapter5 = true)\n\t\t\t\t*goto_scene creature itfeelsgood\n\t\t\t*if (chapter6 = true)\n\t\t\t\t*goto_scene junglepath youfollowa\n\t\t\t*if (chapter7 = true)\n\t\t\t\t*goto_scene treepeople theladder\n\t\t\t*if (chapter8 = true)\n\t\t\t\t*goto_scene kolfboy upaheadis\n\t\t\t*if (chapter9 = true)\n\t\t\t\t*goto_scene cliff themorningsun\n\t\t\t*if (chapter10 = true)\n\t\t\t\t*goto_scene temple theinsideis\n\t\t\t*else\n\t\t\t\t*goto thecityis\n\t\t#No\n\t\t\t*goto thecityis\n\n*label thecityis\nThe city is silent. The buildings around you are covered in vegetation, beautiful orchid-like flowers of purple and yellow burst out randomly and catch your eye.\n*temp bullet_roll 0\n*temp bullet_damage 0\n*temp lucktest 0\n*temp white false\n*temp purple false\n*temp flowers false\n*temp purplelily false\n*temp yellowflower false\n*temp pinkflower false\n*temp blackrose false\n*temp redrose false\n*temp north1 false\n*temp north2 false\n*temp north3 false\n*temp west1 false\n*temp west2 false\n*temp south1 false\n*temp south2 false\n*temp east1 false\n*temp east2 false\n*temp crossroads2 false\n*temp cry 0\n*image gekko.jpg\n\nThe path extends in front of you for a while and then breaks off into different directions. There is a low building on your right, covered like all the others. \n\n*if (male = true)\n\t\"Jack, Jane - look!\"\n*if (female = true)\n\t\"Jill, Jane - look!\"\n\nSir Malcolm is pointing at what look like three strange topiary bushes near the building. \n\n\"They look like... people!\"\n\nBefore you can shout a warning Sir Malcolm reaches out to one of the figures to examine it more closely. To your horror the figure lurches forward and places it’s palm onto his shoulder. He drops gasping to the floor, grabbing his shoulder in agony. The three figures lurch towards you.\nYou must fight the:\n\n[b]Plant People[/b]\n\n[b]Skill 7, Stamina 8[/b]\n\n*label plantpeople_fight\n*choice\n\t#Fight\n\t\t*goto roll_dice_loop\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0)\n\t\t\t*goto set_bullet_damage\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click\n\t*if (instant_win = true) #Insta Win\n\t\t*goto win\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\"Let's get composting\"\n\t\t*goto roll_dice_loopk\n\n\n*label roll_dice_loop\n*temp plantpeoplediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand plantpeoplediceresult 1 dicesides\n*line_break\nThe Plant People rolled ${plantpeoplediceresult}\n*set diceresult +skill\n*set plantpeoplediceresult +plantpeopleskill\n*line_break\nYour total: ${diceresult} Plant People total: ${plantpeoplediceresult}\n*if (diceresult > plantpeoplediceresult)\n\t*line_break\n\tYou hit them with all that you've got\n\t*set plantpeoplehp -2\n*if (diceresult \u003c plantpeoplediceresult)\n\t*line_break\n\tThe Plant People attack with surprising speed\n\t*set stamina -2\n*if (diceresult = plantpeoplediceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Plant People have ${plantpeoplehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (plantpeoplehp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n\t\n*label roll_dice_loopk\n*temp plantpeoplediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand plantpeoplediceresult 1 dicesides\n*line_break\nThe Plant People rolled ${plantpeoplediceresult}\n*set diceresult +skill\n*set plantpeoplediceresult +plantpeopleskill\n*line_break\nYour total: ${diceresult} Plant People total: ${plantpeoplediceresult}\n*if (diceresult > plantpeoplediceresult)\n\t*line_break\n\tYour punch lands and something in the Plant Person snaps satisfyingly\n\t*set plantpeoplehp -3\n*if (diceresult \u003c plantpeoplediceresult)\n\t*line_break\n\tThe Plant People attack with surprising speed\n\t*set stamina -2\n*if (diceresult = plantpeoplediceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Plant People have ${plantpeoplehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (plantpeoplehp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set plantpeoplehp - bullet_damage\nThe Plant People have ${plantpeoplehp} stamina remaining\n*if (plantpeoplehp \u003c 1)\n\t*goto win\n*else\n\t*goto plantpeople_fight\n\n\t\n*label click\nTrying not to allow anger to interfere with your aim you draw your gun and pull the trigger. There is a clicking sound.\n\n\"This was personal anyway,\" says Lady Jane.\n*goto roll_dice_loop\n\n*label winshot\nTrying not to allow anger to interfere with your aim you draw your gun and pull the trigger. The Plant People are lined up and the bullet passes through them all. They topple to the floor.\n*goto win\n\n*label win\n*if (stamina = max_stamina)\n\t*goto yourushto\n*elseif (provisions = false)\n\t*goto yourushto\n*else\n\t*goto choice8\n*label choice8\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto yourushto\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto yourushto\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto yourushto\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto yourushto\n\n*label yourushto\n\nYou rush to the prone figure of Sir Malcolm. His breathing is weak and shallow and he looks slightly grey. Lady Jane looks nearly as bad.\n\n*if (male = true)\n\t\"What are we going to do Jack?\"\n*if (female = true)\n\t\"What are we going to do Jill?\"\n*choice\n\t*if (poisons = true) #Use the book on poisoning\n\t\tYou quickly scan through the book. There is no mention of this type of poisoning but there is a page on dealing with unknown poisons in Africa. \n\t\t\n\t\tThe book says: \"For poisoning by agents unknown, combine two parts purple lily of the valley with one part yellow flowers of rubiaceae tree as a liquid suspension.\"\n\t\t\n\t\t\"Jane, stay here and guard Malcolm. I am going to find the antidote.\"\n\t\t*goto citymaze\n\t#Look for an antidote\n\t\t\"Jane, stay here and guard Malcolm. I am going to find the antidote.\"\n\t\t*goto citymaze\n\t#\"I don't know\"\n\t\t*if (male = true)\n\t\t\t\"There must be some kind of cure Jack!\" says Lady Jane in desperation. \"Have a look round and see what you can find.\"\n\t\t*if (female = true)\n\t\t\t\"There must be some kind of cure Jill!\" says Lady Jane in desperation. \"Have a look round and see what you can find.\"\n\t\t\n\t\tYou nod in agreement and leave her cradling Sir Malcolm.\n\t\t*goto citymaze\n\t\t\n\t\t\n\t\t\n*label citymaze\n\nThe flag-stoned path leads to a cross roads. A rustling sound behind you make you turn. The path South is now blocked by vines! It is extremely disconcerting and you wonder at what invisible forces command them.\n\n*label crossroads1\n\nThe path extends in front of you where in the distance to the North you can see a very large building that dominates all others. A white cross has been drawn on the ground in chalk. It looks fresh.\n*gosub crygosub\n\n*if (crossroads2 = true)\n\tThe vines blocking the path South are gone!\n*choice\n\t*selectable_if (crossroads2 = true) #South\n\t\tJane is cradling Malcolm in her arms. He is as grey as a statue now and his breathing is extremely faint. \n\t\t*goto ladyjanepoison\n\t*selectable_if (west1 = false) #West\n\t\t*set west1 true\n\t\t*goto crossroads2\n\t*selectable_if (north1 = false) #North\n\t\t*set north1 true\n\t\tSweeping steps lead up to the central building. An arch is flanked by pillars, the cornices intricately carved with entwining tentacles. A stone guardian sits guard outside at the foot of the steps. It is a four legged beast, vaguely leonine but with an octopoid head. The black iron door in the arch is firmly closed. There is no way into the eerie building so you return South.\n\t\t\n\t\t\n\t\tAs soon as you are back at the crossroads vines rush across the path and block it off!\n\t\t*goto crossroads1\n\t*selectable_if (east1 = false) #East\n\t\t*set east1 true\n\t\t*label crossroads3\n\t\t\n\t\tYou have arrived at a crossroads. There is another white cross here, the number three is scrawled next to it.\n\t\t\n\t\tTo the East is a courtyard with a statue in it. A trail of very small yellow flowers lie on the flag-stones to the South. There is also a path to the North but it is not possible to see from here where it leads. \n\t\t*gosub crygosub\n\t\t*choice\n\t\t\t#West\n\t\t\t\tAt your departure vines snake across the path and form an impenetrable barrier.\n\t\t\t\t*goto crossroads1\n\t\t\t*selectable_if (north3 = false) #North\n\t\t\t\t*set north3 true\n\t\t\t\tYou reach a circular courtyard. There is a pool in the middle surrounded by a low raised wall. Water cascades down from a statue in the centre. The sculpture is of a robed man holding his hands to his face, the water pours out from between his fingers. Purple and white lilies float in the water.\n\t\t\t\t*gosub crygosub\n\t\t\t\t*choice\n\t\t\t\t\t#Return South\n\t\t\t\t\t\tAs you leave vines rush to cover the path.\n\t\t\t\t\t\t*goto crossroads3\n\t\t\t\t\t#Take a white lily\n\t\t\t\t\t\t*label white\n\t\t\t\t\t\t*set white true\n\t\t\t\t\t\tYou take hold of the lily and pull gently. To your surprise it doesn't move. Pulling hard this time you are shocked to find that it resists you easily.\n\t\t\t\t\t\t\n\t\t\t\t\t\tBefore you can let go you feel something wrap around your wrist. A translucent tendril from the lilies base has gripped you and is pulling you into the pool! Other white lilies start to float towards you. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou are pulled violently towards the water and you brace yourself against the wall with your other arm to stop yourself being pulled in. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\tYou pull back with all your strength and land on your back, pulling the lily with you.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe tendril around your arm starts to steam in the sunlight and you pull it off with disgust. The plant quickly turns to powder and a light breeze disperses it completely.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Return South\n\t\t\t\t\t\t\t\t\t\t\t\tAs you leave vines rush to cover the path.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto crossroads3\n\t\t\t\t\t\t\t\t\t\t\t*if (purple = false) #Take a purple lily\n\t\t\t\t\t\t\t\t\t\t\t\t*goto purple\n\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\tYou pull back with all your strength but at the last moment the lily pulls harder and you are pulled violently into the pool. Tendrils grab at you greedily and hold you under.\n\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t#Take a purple lily\n\t\t\t\t\t\t*label purple\n\t\t\t\t\t\t*set purple true\n\t\t\t\t\t\t*set purplelily true\n\t\t\t\t\t\t*set flowers true\n\t\t\t\t\t\tThe lily is delicate and beautiful with a heady perfume. Some of the pollen stains your fingers purple.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Return South\n\t\t\t\t\t\t\t\tAs you leave vines rush to cover the path.\n\t\t\t\t\t\t\t\t*goto crossroads3\n\t\t\t\t\t\t\t*if (white = false) #Take a white lily\n\t\t\t\t\t\t\t\t*goto white\n\t\t\t*selectable_if (south2 = false) #South\n\t\t\t\t*set south2 true\n\t\t\t\tThe smattering of tiny yellow flowers soon becomes a carpet. The path ends in a wall. At least you assume it is a wall because the structure is entirely covered in yellow flowers. Most are tiny but there are some much larger ones at head height. \n\t\t\t\t*gosub crygosub\n\t\t\t\t*choice\n\t\t\t\t\t#Take a yellow flower\n\t\t\t\t\t\t*set yellowflower true\n\t\t\t\t\t\t*set flowers true\n\t\t\t\t\t\tThey remind you of buttercups. You return North to the crossroads.\n\t\t\t\t\t\t*goto crossroads3\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t#Return North\n\t\t\t\t\t\tAs you leave vines rush to cover the path\n\t\t\t\t\t\t*goto crossroads3\n\t\t\t*selectable_if (east2 = false) #East\n\t\t\t\t*set east2 true\n\t\t\t\tThe statue is of a hand with the palm outstretched. It is beautifully detailed despite being at least eight feet tall. In the centre of the palm a giant eye stares unblinkingly outward. \n\t\t\t\t\n\t\t\t\tSome movement behind the statue distracts you. A figure ambles towards you. They have been completely taken over by the green.\n\t\t\t\t*gosub crygosub\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\tAs the figure comes closer you see that they are completely covered in moss. One solitary mushroom is growing on the top of their head giving the effect of a tiny hat.\n\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Moss Man[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label mossman_fight\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto roll_dice_loop3\n\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage3\n\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t*goto click3\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto win3\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\"Moss Man meet the Boss Man\"\n\t\t\t\t\t\t\t\t*goto roll_dice_loopk3\n\t\t\t\t\t#Return West\n\t\t\t\t\t\tAs you leave the vines rush to cover the path.\n\t\t\t\t\t\t*goto crossroads3\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\n\t\t\n\t\t\t\t\n\t\t\n*label crossroads2\n\n*set crossroads2 true\nYou have arrived at a crossroads. There is another white cross here, the number two is scrawled next to it.\n*gosub crygosub\nThe path meanders North before turning a corner. To the South you can see that the path leads to a small building of some kind. \n*choice\n\t*selectable_if (north2 = false) #North\n\t\t*set north2 true\n\t\tTurning the corner brings you into a courtyard. There is a structure of some kind in the centre of the courtyard but it is completely covered in red and pink flowers. \n\t\t\t\n\t\tThe flowers rustle and move on your approach and a figure emerges from the foliage. Pink and red flowers cover it completely, like rosettes. \n\t\t*choice\n\t\t\t#Fight\n\t\t\t\tThe air fills with a cloying scent as the figure gets closer.\n\t\t\t\t\n\t\t\t\tYou must fight the:\n\t\t\t\t\n\t\t\t\t[b]Plant Person[/b]\n\t\t\t\t\n\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\n\t\t\t\t*label plantperson_fight\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto roll_dice_loop1\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click888\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win1\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"Time to clear the air\"\n\t\t\t\t\t\t*goto roll_dice_loopk1\n\t\t\t\t\n\t\t\t#Go back\n\t\t\t\t\"I wouldn't have a vase big enough for you anyway,\" you say as return.\n\t\t\t\t\t\n\t\t\t\tVines cover your retreat and ensure you are not followed.\n\t\t\t\t*goto crossroads2\n\t*selectable_if (west2 = false) #West \n\t\t*set west2 true\n\t\t*if (cry \u003c 3)\n\t\t\tThere is a figure ahead, hunched over with their back turned towards you. As you get nearer you can hear them moaning. You wonder whether to call to them but before you can decide they turn around and face you. They are nursing their arm that has swollen massively. Vicious cactus-like spines protrude and more have burst through their clothing. \n\t\t\t\n\t\t\tYou recognise their blond hair and clear blue eyes from the club! They are one of Lord Percival’s gang!\n\t\t\t\n\t\t\t\"Please, help me!\" they beg.\n\t\t\t*choice\n\t\t\t\t#Help them\n\t\t\t\t\t\"Let me help you Old Chap,\" you say, stepping forward.\n\t\t\t\t\t\n\t\t\t\t\tHe thanks you profusely but then falls to his knees in agony.\n\t\t\t\t\t\n\t\t\t\t\t\"It's...too...late,\" he gasps. \"Have...this.\"\n\t\t\t\t\t\n\t\t\t\t\tWith his left hand he reaches for a key hanging around his neck which he throws to you. With a groan he slumps to the floor and is silent. More spikes puncture through his clothing and the green consumes him. You leave quickly.\n\t\t\t\t\t*set armourykey true\n\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t\n\t\t\t\t#Don't help them\n\t\t\t\t\tYou shake your head.\n\t\t\t\t\t\n\t\t\t\t\t\"Sorry Old Bean, I recognise you from the club. It seems you have got your comeuppance at last.\"\n\t\t\t\t\t\n\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\"God..damn..you..Jack!\" he gasps, starting towards you. \n\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\"God..damn..you..Jill!\" he gasps, starting towards you. \n\t\t\t\t\t\n\t\t\t\t\tAfter a few steps he cries out in pain and sinks to his knees. His left hand clasps at a key hanging from his neck and then he slumps to the ground. More spikes puncture through his clothes and the green consumes him. \n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Take the key\n\t\t\t\t\t\t\tYou carefully bend down and start to pries open his clenched hand, bending back his green and swollen fingers. \n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\tYou grasp the key and start to stand but the fingers clasp back reflexively around the chain! You pull hard while the body swells alarmingly. Finally the key breaks loose and you hurriedly put as much distance as you can between yourself and the body.\n\t\t\t\t\t\t\t\t\t\t\t*set armourykey true\n\t\t\t\t\t\t\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\tYou grasp the key and start to stand but the fingers clasp reflexively around the chain! You pull hard while the body swells alarmingly. \n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThe key breaks loose to an accompanying popping sound. The air is thick with spores and your fate is sealed. Everything takes on a green tinge...\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t#Leave\n\t\t\t\t\t\t\tAs you leave vines cover the path. It is impossible to go back.\n\t\t\t\t\t\t\t*goto crossroads2\n\t\t*elseif (cry >= 3)\n\t\t\tThere is a figure ahead, hunched over with their back turned towards you. As you get nearer you can hear them moaning. You wonder whether to call to them but before you can decide they turn around and face you. They are nursing their arm that has swollen massively. Vicious cactus-like spines protrude and more have burst through their clothing.\n\t\t\t\n\t\t\tClear blue eyes fix on you balefully, looking out from a mask of green corruption. Arm raised like a club it staggers towards you. \n\t\t\tYou must fight the:\n\t\t\t\n\t\t\t[b]Cactus Man[/b]\n\t\t\t\n\t\t\t[b]Skill 7, Stamina 8 [/b]\n\t\t\t\n\t\t\t*label cactusman_fight\n\t\t\t*choice\n\t\t\t\t#Fight\n\t\t\t\t\t*goto roll_dice_loop2\n\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t*goto set_bullet_damage2\n\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t*goto click2\n\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t*goto win2\n\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\"I've dealt with pricklier customers than you\"\n\t\t\t\t\t*goto roll_dice_loopk2\n\t\t\n\t\t\n\t*selectable_if (south1 = false) #South\n\t\t*set south1 true\n\t\tThe path is lined with black roses. They have a cloying perfume. \n\t\t*choice\n\t\t\t#Pick a black rose\n\t\t\t\t*set blackrose true\n\t\t\t\t*set flowers true\n\t\t\t\tYou pluck a black rose. As you break it from the stem a thick red liquid escapes and the air smells of copper.\n\t\t\t\t\n\t\t\t\t*label squarecolumn\n\t\t\t\tThe flag stoned path leads to a courtyard with a structure in the centre. It is a square column, about twelve feet in height. The four faces are about three foot wide. The column is very plain and utilitarian except for a spider shaped indent on the front. You trace your fingers over the pattern, the stone feels cold despite the heat of the day.\n\t\t\t\t*if (spidergem = true)\n\t\t\t\t\tYou feel a vibration against your chest. The gem!\n\t\t\t\t\t\n\t\t\t\t\tYou remove the gem from your pocket and inspect it. It is no longer vibrating but the inside is cloudy. The mist clears before your eyes and reveals a pin sharp image of the giant spider within. There is a high pitched whining in your ears and the spider speaks to you in a voice that sounds like the lonely sigh of a grieving bride:\n\t\t\t\t\t\n\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\"Jack, thank you for the feast. I won't be hungry for some time. When I am I will call.\"\n\t\t\t\t\t\t*choice\t\n\t\t\t\t\t\t\t#Throw the gem away in disgust\n\t\t\t\t\t\t\t\t*set spidergem false\n\t\t\t\t\t\t\t\tThe gem sails over the vines and lands somewhere out of sight.\n\t\t\t\t\t\t\t\t*goto setsomeway\n\t\t\t\t\t\t\t#Keep it\n\t\t\t\t\t\t\t\tYou slide the gem back into your inside pocket.\n\t\t\t\t\t\t\t\t*goto setsomeway\n\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\"Jill, thank you for the feast. I won't be hungry for some time. When I am I will call.\"\n\t\t\t\t\t\t*choice\t\n\t\t\t\t\t\t\t#Throw the gem away in disgust\n\t\t\t\t\t\t\t\t*set spidergem false\n\t\t\t\t\t\t\t\tThe gem sails over the vines and lands somewhere out of sight.\n\t\t\t\t\t\t\t\t*goto setsomeway\n\t\t\t\t\t\t\t#Keep it\n\t\t\t\t\t\t\t\tYou slide the gem back into your inside pocket.\n\t\t\t\t\t\t\t\t*goto setsomeway\t\t\t\t\t\t\t\n\t\t\t\t*if (spidergem = false)\n\t\t\t\t\t*goto setsomeway\n\t\t\t\t\n\t\t\t\t*label setsomeway\n\t\t\t\tSet some way back behind the column is an upturned stone hand. A single golden rose rises from the palm. It is a work of incredible sophistication and beauty.\n\t\t\t\t*choice\n\t\t\t\t\t#Leave\n\t\t\t\t\t\tVines entwine across the path behind you like interlocked fingers preventing your return.\n\t\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t#Investigate the rose\n\t\t\t\t\t\tLooking more closely you are amazed to see that the rose is real! \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou touch it's petals and it starts to sway gently. Caution causes you to step back just in time as it strikes at you! A circle of teeth in the centre of the flower are revealed and it becomes more animated. \n\t\t\t\t\t\t\n\t\t\t\t\t\tUnsure if it is useful you debate whether to try to catch it as it strikes.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Leave\n\t\t\t\t\t\t\t\tVines entwine across the path like interlocked fingers preventing your return.\n\t\t\t\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t\t\t#Grab the rose\n\t\t\t\t\t\t\t\tYou prepare to grab the swaying rose.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\t\tYou dodge the rose's strike at exactly the right time and grab the stem before it can retract. As soon as you snap the stem the golden colour dissipates and you are left holding a normal red rose.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*set redrose true\n\t\t\t\t\t\t\t\t\t\t\t\t*set flowers true\n\t\t\t\t\t\t\t\t\t\t\t\tYou return North.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\t\tThe rose strikes and misses. As it recoils you try to grab it but you are too slow. It wraps itself around your arm and burrows it's sharp teeth into the flesh. It sucks your blood greedily.\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\t[i]Lose 2 stamina[/i]\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\t*set stamina -2\n\t\t\t\t\t\t\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t\t\tYou pull the rose off of your arm in disgust and return North.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t#Ignore them\n\t\t\t\t*goto squarecolumn\n\t#East\n\t\tAt your departure vines snake across the path and form an impenetrable barrier.\n\t\t*goto crossroads1\n\t\n\n\t\t\n*label crygosub\n*if (cry = 0) \n\n\tA cry comes from the West.\n\t*set cry +1\n\t\n\t*return\n*if (cry = 1) \n\n\tThe cries from the West are much louder now.\n\t*set cry +1\n\t\n\t*return\n*if (cry = 2)\n\n\tThe cries from the West have stopped.\n\t*set cry +1\n\t*return\n*elseif (cry > 2)\n\t*return\n\n\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\n\n*label roll_dice_loop1\n*temp plantpersondiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand plantpersondiceresult 1 dicesides\n*line_break\nThe Plant Person rolled ${plantpersondiceresult}\n*set diceresult +skill\n*set plantpersondiceresult +plantpersonskill\n*line_break\nYour total: ${diceresult} Plant Person total: ${plantpersondiceresult}\n*if (diceresult > plantpersondiceresult)\n\t*line_break\n\tYour machete strikes and the air fills with perfume\n\t*set plantpersonhp -2\n*if (diceresult \u003c plantpersondiceresult)\n\t*line_break\n\tThe Plant Person attacks with surprising speed\n\t*set stamina -2\n*if (diceresult = plantpersondiceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Plant Person has ${plantpersonhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (plantpersonhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\t\n\t\n*label roll_dice_loopk1\n*temp plantpersondiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand plantpersondiceresult 1 dicesides\n*line_break\nThe Plant Person rolled ${plantpersondiceresult}\n*set diceresult +skill\n*set plantpersondiceresult +plantpersonskill\n*line_break\nYour total: ${diceresult} Plant People total: ${plantpersondiceresult}\n*if (diceresult > plantpersondiceresult)\n\t*line_break\n\tYour punch lands and a huge cloud of pollen bursts out\n\t*set plantpersonhp -3\n*if (diceresult \u003c plantpersondiceresult)\n\t*line_break\n\tThe Plant person attacks with surprising speed\n\t*set stamina -2\n*if (diceresult = plantpersondiceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Plant Person has ${plantpersonhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (plantpersonhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\t\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set plantpersonhp - bullet_damage\nThe Plant Person has ${plantpersonhp} stamina remaining\n*if (plantpersonhp \u003c 1)\n\t*goto win1\n*else\n\t*goto plantperson_fight\n\n\t\n*label click888\nYou aim carefully and pull the trigger. The gun clicks.\n\n\"Thank God Sir Malcolm wasn't here to see that,\" you say to yourself\n*goto roll_dice_loop1\n\n*label winshot1\nYou aim carefully and pull the trigger. The bullet passes right through the head of the Plant Person. It reaches up with it's hands as if to check before collapsing to the floor.\n*goto win1\n\n*label win1\n\nThe flowers on the fallen body begin to fade and close immediately. Only one large pink flower remains and you pick it.\n*if (stamina = max_stamina)\n\t*goto asyouleave\n*elseif (provisions = false)\n\t*goto asyouleave\n*else\n\t*goto choice9\n*label choice9\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto asyouleave\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto asyouleave\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto asyouleave\n\t*if (provisions = false) #Onwards\n\t\t*goto asyouleave\n\n*label asyouleave\n*set pinkflower true\n*set flowers true\nAs you leave the courtyard rustling vines snake across, forming an impenetrable barrier\n*goto crossroads2\n\n\n*label roll_dice_loop2\n*temp cactusmandiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand cactusmandiceresult 1 dicesides\n*line_break\nThe cactus Man rolled ${cactusmandiceresult}\n*set diceresult +skill\n*set cactusmandiceresult +cactusmanskill\n*line_break\nYour total: ${diceresult} cactus Man total: ${cactusmandiceresult}\n*if (diceresult > cactusmandiceresult)\n\t*line_break\n\tYour machete strikes and clear fluid leaks from the wound\n\t*set cactusmanhp -2\n*if (diceresult \u003c cactusmandiceresult)\n\t*line_break\n\tThe Cactus Man clubs you\n\t*set stamina -2\n*if (diceresult = cactusmandiceresult)\n\t*line_break\n\tYou dodge under his swinging blow\n\t*goto roll_dice_loop2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe cactus Man has ${cactusmanhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (cactusmanhp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loop2\n\t\n\t\n*label roll_dice_loopk2\n*temp cactusmandiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand cactusmandiceresult 1 dicesides\n*line_break\nThe cactus Man rolled ${cactusmandiceresult}\n*set diceresult +skill\n*set cactusmandiceresult +cactusmanskill\n*line_break\nYour total: ${diceresult} cactus Man total: ${cactusmandiceresult}\n*if (diceresult > cactusmandiceresult)\n\t*line_break\n\tYour punch lands and clear fluid explodes from the wound\n\t*set cactusmanhp -3\n*if (diceresult \u003c cactusmandiceresult)\n\t*line_break\n\tThe Cactus Man clubs you\n\t*set stamina -2\n*if (diceresult = cactusmandiceresult)\n\t*line_break\n\tYou dodge under his swinging blow\n\t*goto roll_dice_loopk2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe cactus Man has ${cactusmanhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (cactusmanhp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loopk2\n\n*label set_bullet_damage2\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot2\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set cactusmanhp - bullet_damage\nThe cactus Man has ${cactusmanhp} stamina remaining\n*if (cactusmanhp \u003c 1)\n\t*goto win2\n*else\n\t*goto cactusman_fight\n\n\t\n*label win2\n*set armourykey true\n\nThe cactus Man falls and a plain looking key rolls away from the body. As you pick it up a tremor passes through the prone figure and you decide it is time to leave.\n*if (stamina = max_stamina)\n\t*goto crossroads2\n*elseif (provisions = false)\n\t*goto crossroads2\n*else\n\t*goto choice10\n*label choice10\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto crossroads2\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto crossroads2\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto crossroads2\n\t*if (provisions = false) #Onwards\n\t\t*goto crossroads2\n\n\n*label winshot2\nYou aim carefully and pull the trigger. Your bullet hits the Cactus Man right between the eyes.\n*goto win2\n\n*label click2\nYou aim carefully and pull the trigger. The gun clicks and the Cactus Man groans in disappointment.\n*goto cactusman_fight\n\n*label roll_dice_loop3\n*temp mossmandiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand mossmandiceresult 1 dicesides\n*line_break\nThe Moss Man rolled ${mossmandiceresult}\n*set diceresult +skill\n*set mossmandiceresult +mossmanskill\n*line_break\nYour total: ${diceresult} Moss Man total: ${mossmandiceresult}\n*if (diceresult > mossmandiceresult)\n\t*line_break\n\tYour machete strikes and the air fills with the smell of cut grass\n\t*set mossmanhp -2\n*if (diceresult \u003c mossmandiceresult)\n\t*line_break\n\tThe Moss Man strikes a heavy blow\n\t*set stamina -2\n*if (diceresult = mossmandiceresult)\n\t*line_break\n\tYou dodge under his swinging blow\n\t*goto roll_dice_loop3\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Moss Man has ${mossmanhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (mossmanhp \u003c 1)\n\t*goto win3\n*else\n\t*goto roll_dice_loop3\n\t\n*label roll_dice_loopk3\n*temp mossmandiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand mossmandiceresult 1 dicesides\n*line_break\nThe Moss Man rolled ${mossmandiceresult}\n*set diceresult +skill\n*set mossmandiceresult +mossmanskill\n*line_break\nYour total: ${diceresult} Moss Man total: ${mossmandiceresult}\n*if (diceresult > mossmandiceresult)\n\t*line_break\n\tYour punch lands and the air fills with the smell of cut grass\n\t*set mossmanhp -3\n*if (diceresult \u003c mossmandiceresult)\n\t*line_break\n\tThe Moss Man strikes a heavy blow\n\t*set stamina -2\n*if (diceresult = mossmandiceresult)\n\t*line_break\n\tYou dodge under his swinging blow\n\t*goto roll_dice_loopk3\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Moss Man has ${mossmanhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (mossmanhp \u003c 1)\n\t*goto win3\n*else\n\t*goto roll_dice_loopk3\n\n*label set_bullet_damage3\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot3\n*if (bullet_roll \u003c 6)\n\t*rand bu he black rose\n\t\t\t\t\t\t\t\t\t\tYou crush your pile of flowers together on the top of a flat stone with the pommel of your machete and scrape the juice into your canteen. \n\t\t\t\t\t\t\t\t\t\t*goto ladyjanedies\n\t\t\t\t\t\t\t\t\t#Nothing\n\t\t\t\t\t\t\t\t\t\t\"I am going to miss this step.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*goto ladyjanedies\n\t\t\t\t\t#Nothing\n\t\t\t\t\t\t\"I am going to miss this step.\"\n\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (yellowflower = true) #You have the yellow flowers\n\t\t\t\t\t\t\t\tYou crush your pile of flowers together on the top of a flat stone with the pommel of your machete and scrape the juice into your canteen. \n\t\t\t\t\t\t\t\t*goto ladyjanedies\n\t\t\t\t\t\t\t*if (pinkflower = true) #Use pink flowers\n\t\t\t\t\t\t\t\tYou crush your pile of flowers together on the top of a flat stone with the pommel of your machete and scrape the juice into your canteen. \n\t\t\t\t\t\t\t\t*goto ladyjanedies\n\t\t\t\t\t\t\t*if (redrose = true) #Use the red rose\n\t\t\t\t\t\t\t\tYou crush your pile of flowers together on the top of a flat stone with the pommel of your machete and scrape the juice into your canteen. \n\t\t\t\t\t\t\t\t*goto ladyjanedies\n\t\t\t\t\t\t\t*if (blackrose = true) #Use the black rose\n\t\t\t\t\t\t\t\tYou crush your pile of flowers together on the top of a flat stone with the pommel of your machete and scrape the juice into your canteen. \n\t\t\t\t\t\t\t\t*goto ladyjanedies\n\t\t\t\t\t\t\t#Nothing\n\t\t\t\t\t\t\t\t\"I am going to miss this step.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto ladyjanedies\n\t\t\t\t\t\n*label ladyjanedies\nJane is cradling Malcolm in her arms. He is as grey as a statue now and his breathing is extremely faint. She lifts his head gently so he can drink and you pour a little of the antidote into his mouth. His eyes close and his breathing stops completely. \n\nYou look at each other aghast, then with a sudden intake of breath Malcolm sits up! To your delight his eyes flicker open. Before you can speak his eyes grow wider and your looks of relief turn once again to anguish as his face swells dramatically. His skin is stretched grotesquely like a terrible balloon as his whole body expands. Buttons pop from his safari suit before it starts to rip apart. With a loud pop Sir Malcolm is no more and a green mist swirls all around, covering you and the area in a blanket of droplets. Your skin itches intensely and you know that the infection has started. It will not be long before you are reunited in whatever comes next.\n*goto_scene youdied\n\n*label ladyjanedieswater\nJane is cradling Malcolm in her arms. He is as grey as a statue now and his breathing is extremely faint. She lifts his head gently so he can drink and you pour a little of the water from your canteen into his mouth. His eyes close and his breathing stops completely. \n\nYou look at each other aghast, then with a sudden intake of breath Malcolm sits up! To your delight his eyes flicker open. Before you can speak his eyes grow wider and your looks of relief turn once again to anguish as his face swells dramatically. His skin is stretched grotesquely like a terrible balloon as his whole body expands. Buttons pop from his safari suit before it starts to rip apart. With a loud pop Sir Malcolm is no more and a green mist swirls all around, covering you and the area in a blanket of droplets. Your skin itches intensely and you know that the infection has started. It will not be long before you are reunited in whatever comes next.\n*goto_scene youdied", "cliff": "*temp bullet_damage 0\n*temp bullet_roll 0\n*temp luckyegg false\n*temp lucktest 0\n*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 false\n\t\t\t*set chapter4 false\n\t\t\t*set chapter5 false\n\t\t\t*set chapter6 false\n\t\t\t*set chapter7 false\n\t\t\t*set chapter8 false\n\t\t\t*set chapter9 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto themorningsun\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*if (chapter4 = true)\n\t\t\t\t*goto_scene marsh thesoft\n\t\t\t*if (chapter5 = true)\n\t\t\t\t*goto_scene creature itfeelsgood\n\t\t\t*if (chapter6 = true)\n\t\t\t\t*goto_scene junglepath youfollowa\n\t\t\t*if (chapter7 = true)\n\t\t\t\t*goto_scene treepeople theladder\n\t\t\t*if (chapter8 = true)\n\t\t\t\t*goto_scene kolfboy upaheadis\n\t\t\t*else\n\t\t\t\t*goto themorningsun\n\t\t#No\n\t\t\t*goto themorningsun\n*label themorningsun\nThe morning sun starts to rise. You follow a track that meanders gently. The foliage around you starts to thin out a bit and as you turn the path a fantastic vista opens up in front of you. You are near the edge of a cliff. The ground drops away dizzyingly to a river running through the valley below, a thin blue line so far below it is as if you are looking at a blue cotton thread.\n*temp bullet_damage 0\n*temp bullet_roll 0\n*temp luckyegg false\n*temp lucktest 0\n\nHundreds of feet away on the other side is more dense jungle. The cliff-face continues as far as you can see to the West and the East. To the East you can faintly see a rope bridge stretched across the chasm.\n*choice\n\t#East\n\t\t*label east\n\t\tYou can see a bridge in the distance. On the other side of the chasm the cliff edge eventually gives way to more jungle. Large birds dive from the opposite cliff face, gliding to the river so far below. The path along the cliff feels almost coastal. \n\t\t\n\t\tDistressed sounds from the jungles edge intensify as you get nearer and Lady Jane disappears into the jungle to investigate, instantly calling for you to help. A monkey has been caught in a trap. It swings helplessly inside a net suspended from a tree branch. Along the branch slithers a bright green snake, working it’s way quickly to the helpless primate. As the ape struggles you see it’s distinctive chest fur and realise it is the same gibbon that threw a banana at you!\n\t\t*choice\n\t\t\t#Help \n\t\t\t\tYou hold the rope with one hand and use your machete in the other to cut through it. You slowly lower the net and struggling gibbon to the ground. On seeing that it’s prey is out of reach the snake disappears into the branches. You untie the net and step back. The gibbon leaps out and runs to the edge of some thick under-brush, where it stops and looks at you. It is again holding a banana, presumably used to lure it into the trap. You salute him and in return he lifts his arm, making a throwing motion. Flinching slightly in anticipation of being hit by a banana again you realise that he was faking it. He stands there with a mouthful of fruit while your companions collapse in fits of laughter.\n\t\t\t\t\n\t\t\t\t*set gibbonfree true\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"That’s the second time he’s made a monkey out of you Jack!\" says Sir Malcolm.\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"That’s the second time he’s made a monkey out of you Jill!\" says Sir Malcolm.\n\t\t\t\t\n\t\t\t\tYou shake your fist at the gibbon in mock anger and he disappears into the jungle, whooping.\n\t\t\t\t\n\t\t\t\t*label refreshing\n\t\t\t\tThere is a refreshing light breeze as you walk along the cliff towards the bridge. Birds wheel and call in the sky and you look down on slight, wispy clouds in the valley below. You near the rope bridge. It is not very wide but it looks sturdy enough, at least what you can see of it does. \n\t\t\t\t\n\t\t\t\tYou open your mouth to speak to your companions but are interrupted. A figure emerges from the trees and stands at the mouth of the bridge. He is lean and muscular, wearing a loincloth and a jaguar mask. In his hands are iron claws, long and sharp. He drops into a fighting stance.\n\t\t\t\t*choice\n\t\t\t\t\t*if (jaguar = true) #Fight\n\t\t\t\t\t\t*goto jaguarfight\n\t\t\t\t\t*if (jaguar = false) #Fight\n\t\t\t\t\t\t*goto nojaguarfight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t#Don't help\n\t\t\t\tRecognising the gibbon you speak to your companions:\n\t\t\t\t\n\t\t\t\t\"I’ll handle this, can you go back to the path and keep an eye out? I think we were being followed earlier.\"\n\t\t\t\t\n\t\t\t\t*set gibbonfree false\n\t\t\t\tLady Jane and Sir Malcolm look slightly bemused but they do as you say. You make eye contact with the trembling gibbon and rub your hands, relishing sweet revenge. The snake reaches the net and strikes through, sinking it’s fangs into the shrieking gibbon. The gibbon contorts and spasms, sending the net spinning wildly. It soon becomes still, breathing shallowly and then not at all. You salute ironically and return to your companions. \n\t\t\t\t*goto refreshing\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t \n\t\t\t\t \n\t\t\n\t#West\n\t\t*page_break The Mine\n\t\t*goto_scene mine\n\t\t\n\t\t\n*label jaguarfight\nA shadowy form slinks out from the trees. It is the jaguar! They both look ready to spring forward and fight.\nYou must fight the:\n\n[b]Jaguar Warrior and Jaguar[/b]\n\n[b]Skill 10, Stamina 10[/b]\n\n*label jaguar_fight\n*choice\n\t#Fight\n\t\t*goto roll_dice_loop\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0)\n\t\t\t*goto set_bullet_damage\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click\n\t*if (instant_win = true) #Insta Win\n\t\t*goto win\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\"Time for a cat nap\"\n\t\t*goto roll_dice_loopk\n\n*label roll_dice_loop\n*temp jaguarwarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand jaguarwarriordiceresult 1 dicesides\n*line_break\nThe Jaguar Warrior and Jaguar rolled ${jaguarwarriordiceresult}\n*set diceresult +skill\n*set jaguarwarriordiceresult +jaguarwarriorsk oking for an opening\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Jaguar Warrior has ${jagwarriornojaghp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (jagwarriornojaghp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\n*label winshot\nYou aim at the warrior and pull the trigger. The bullet drills through his mask and leaves a perfect hole right between the eyes.\n*goto win\n\t\n*label winshot1\nYou aim at the warrior and pull the trigger. The bullet drills through his mask and leaves a perfect hole right between the eyes.\n*goto win1\n\t\n*label click\nYou aim at the warrior and pull the trigger. The gun clicks.\n\nThe warrior beckons you on with his claws.\n*goto roll_dice_loop\n\n*label click1\nYou aim at the warrior and pull the trigger. The gun clicks.\n\nThe warrior beckons you on with his claws.\n*goto roll_dice_loop1\n\n*label win1\n\nThe warrior falls and lies still on the ground. \n*if (stamina = max_stamina)\n\t*goto bridge\n*elseif (provisions = false)\n\t*goto bridge\n*else\n\t*goto choice10\n*label choice10\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto bridge\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto bridge\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto bridge\n\t*if (provisions = false) #Investigate the bridge\n\t\t*goto bridge\n\n\n*label win\n\nThe warrior falls and lies still on the ground. \n\nThe jaguar sniffs the body and then bounds away into the jungle.\n*if (stamina = max_stamina)\n\t*goto bridge\n*elseif (provisions = false)\n\t*goto bridge\n*else\n\t*goto choice11\n*label choice11\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto bridge\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto bridge\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto bridge\n\t*if (provisions = false) #Investigate the bridge\n\t\t*goto bridge\n\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set jaguarwarriorhp - bullet_damage\nThe Jaguar Warrior and Jaguar have ${jaguarwarriorhp} stamina remaining\n*if (jaguarwarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto jaguar_fight\n\n\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set jagwarriornojaghp - bullet_damage\nThe Jaguar Warrior has ${jagwarriornojaghp} stamina remaining\n*if (jagwarriornojaghp \u003c 1)\n\t*goto win1\n*else\n\t*goto nojaguar_fight\n\n*label bridge\nBefore you can turn your attention once again to the bridge the jungle erupts with the sounds of whooping and gibbering. It is unmistakably the sound of monkeys but you have never heard it on this scale before. The jungle behind you rustles violently as the monkey horde rapidly approaches.\n*choice\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0)\n\t\t\t*goto monkeygun\n\t\t*if (bullets_number = 0)\n\t\t\t*goto monkeyclick\n\t\t*else\n\t\t\t*goto bridge\n\t#Run across the bridge\n\t\t*goto runbridge\n\t#Stay and fight\n\t\t*goto stayandfight\n\t#Take the warriors claws\n\t\t*goto claws\n\t\n*label monkeyclick\nYou aim into the jungle and pull the trigger. The gun clicks, barely audible over the noise.\n\n*if (male = true)\n\t\"This isn't a great time to be checking that Jack,\" says Sir Malcolm\n*if (female = true)\n\t\"This isn't a great time to be checking that Jill,\" says Sir Malcolm\n*choice\n\t#Stay and fight\n\t\t*goto stayandfight\n\t#Take the warriors claws\n\t\t*goto claws\n\t#Run across the bridge\n\t\t*label runbridge\n\t\tYou run across the wildly swaying bridge as fast as you can. The caterwauling from behind reaches deafening levels. Turning your head you can see a swarm of monkeys pouring out from the forest and capering towards the rope bridge, their lips pulled back creating a sea of malicious grins that rushes towards you. With much relief you reach the other side.\n\t\t*choice\n\t\t\t#Carry on running\n\t\t\t\tThe aggressive anthropoids are far too quick. They scamper effortlessly along the bridge and reach you with ease.\n\t\t\t\t*goto engulfed\n\t\t\t#Hack the ropes\n\t\t\t\tYou all hack desperately at the ropes as the sea of steaming simians pours towards you. With an almighty twang the first of the ropes gives way. The bridge topples to one side and hordes of angry apes are flung off spinning into the void. The other rope follows a second later and the bridge falls away taking the manic monkeys with it. Breathlessly you look at the two wooden support pillars, all that remain of the bridge and your only way back. \n\t\t\t\t*choice\n\t\t\t\t\t#Left\n\t\t\t\t\t\tThe height of the cliff is quite dizzying and way below you can see the winding blue thread of the river running beneath. Screeching bird-call is carried on the gentle cooling wind.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"This reminds me somewhat of Beachy Head,\" says Lady Jane\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"I agree,\" says Sir Malcolm. \"I wish I had packed a deck chair, but I think it might be harder to get an ice cream here!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tUp ahead there is a bird swooping down into the river and returning to what must be it’s nest on the cliff face. As you get closer you can see that it is significantly bigger than any of the other birds. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Investigate\n\t\t\t\t\t\t\t\tYou cautiously get closer and lie in the grass that grows on the edge of the cliff path. As the creature flies back to return to it’s nest on the cliff face you are able to get a closer look. It is not feathered at all! Instead it has scaly greenish skin like a reptile, stretched taut over an enormous wingspan of at least thirty five feet. A cruel triangular beak is mirrored by a bony growth extending out of the back of it’s head. It’s sharp eyes dart around keenly. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (triceratops = false)\n\t\t\t\t\t\t\t\t\t*goto incredible\n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t*goto seenit\n\t\t\t\t\t\t\t\t*label incredible\n\t\t\t\t\t\t\t\t\"Incredible!\" whispers Lady Jane. \"This shouldn’t be! I think we are looking at a pterodactyl just as described in the findings of Professor Marsh!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Can we have that in English please?\" whispers Sir Malcolm.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tLady Jane purses her lips and then answers very quietly. \"The last time these were on the planet was… sixty five million years ago.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Give or take a million years,\" replies Sir Malcolm and Lady Jane sighs.\n\t\t\t\t\t\t\t\t*goto pterodactyl\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label seenit\n\t\t\t\t\t\t\t\t\"More dinosaurs!\" gasps Lady Jane. \"This is a pterodactyl, a flying reptile!\"\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto pterodactyl\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label pterodactyl\n\t\t\t\t\t\t\t\tThe pterodactyl swoops down again into the clouds below and you can see it’s nest. A large white egg sits in the middle. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Get the egg\n\t\t\t\t\t\t\t\t\t\tYou tie a rope around your waist and start to descend the cliff face. Sir Malcolm and Lady Jane feed you the rope. Soon you are right beside the nest and within reaching distance of the egg.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set luckyegg true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou grab the egg and carefully put it in your backpack. It is even heavier than you anticipated. Your companions help pull you safely back up to the path. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Amazing!\" says Lady Jane\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"I agree,\" says Sir Malcolm. \"You could make the world’s biggest omelette with that thing!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto chasm\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYour attempts to steal her egg have been spotted by the pterodactyl. She swoops down towards you just as you have it in your hands. The sudden attack makes you drop it and the egg falls away into the distance. The furious pterodactyl attacks as you swing precariously on the rope held by Sir Malcolm and Lady Jane.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t[b]Pterodactyl[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t[b]Skill 6, Stamina 8[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label pterodactyl_fight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loop2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto set_bullet_damage2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto click2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto win2\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Let's finish this\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loopk2\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#Leave it and continue\n\t\t\t\t\t\t\t\t\t\t*label chasm\n\t\t\t\t\t\t\t\t\t\tAfter a while the path ends at a huge chasm. The cliff continues along as far as the eye can see on the other side but there is no way across. The path turns here into the jungle.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Go into the jungle\n\t\t\t\t\t\t\t\t\t\t\t\t*goto pressingon\n\t\t\t\t\t\t\t\t\t\t\t*if (luckyegg = true) #Investigate chasm\n\t\t\t\t\t\t\t\t\t\t\t\tAs you ponder the mysteries of the chasm your thoughts are interrupted by a furious screeching from above. The pterodactyl mother swoops down. \n\t\t\t\t\t\t\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t[b]Pterodactyl[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t[b]Skill 6, Stamina 8[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*label pterodactyl_fight1\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loop3\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto set_bullet_damage3\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto click3\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto win3\n\t\t\t\t\t\t\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Let's finish this\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loopk3\n\t\t\t\t\t\t\t\t\t\t\t*if (luckyegg = false) #Investigate chasm\n\t\t\t\t\t\t\t\t\t\t\t\tYou study the chasm more deeply.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\tEventually Sir Malcolm speaks \"Looks like a chasm Jack.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\tEventually Sir Malcolm speaks \"Looks like a chasm Jill.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"No way across,\" says Lady Jane.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"Yes, sorry was lost in thought then. Back to the jungle we go!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*label pressingon\n\t\t\t\t\t\t\t\t\t\t\t\tPressing on through the jungle is hard work. Little light is getting through the thick foliage and the vines are staring to resemble steel cables. Up ahead there seems to be more light and with a final effort you break through the dense green. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tA large clearing gives you welcome relief from the cramped jungle and your eyes adjust to the sudden brightness. A ruined stone temple is ahead. Steps lead upwards to the interior and are flanked either side by stone guardians. The statue on the right has fallen over and is unrecognisable rubble, the statue on the left is of a four armed female figure wearing a necklace. The statue’s head is missing, having been broken off at the neck. Ivy and other creepers almost cover the temple. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tA large stone tablet that is at least seven foot tall stands in the grounds, covered with green. Text has been carved into the stone, partially visible under the foliage.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"This tablet looks important Jack,\" says Lady Jane, opening her notebook.\n\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"This tablet looks important Jill,\" says Lady Jane, opening her notebook.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\"I'd like to get away from those monkeys as soon as possible,\" says Sir Malcolm.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Enter the temple\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break The Te
