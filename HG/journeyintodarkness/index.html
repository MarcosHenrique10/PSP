dmittedly very nicely gilded cage.\n\nThe HMS Wayfarer has finally reached the Gulf of Guinea and you are now mere days away from disembarking to adventure proper. In the meantime there is dinner to contend with. With these last weeks of rich food you are glad you will be off the boat soon whilst you can still fit into your clothes!\n\n*page_break\n*image boat.jpg\n*choice \n\t*if (map = true) #Put map in safe before dinner\n\t\t*set mapsafe true\n\t\t*goto dinner\n\t*if (map = true) #Put map in your pocket before dinner\n\t\t*set mappocket true\n\t\t*goto dinner\n\t*if (map = false) #Go to dinner\n\t\t*set nomap true\n\t\t*goto dinner\n*label dinner\nAs you walk to dinner you are struck again by the beauty of the ship. The passageway is lined with artwork and you admire one painting in particular of a narwhal leaping over a small boat filled with surprised sailors.\n\nJust then a man walking in the opposite direction bumps into you.\n*set map false\n\n*if (male = true)\n\t\"Terribly sorry dear chap, I wasn’t looking where I was going.\"\n*if (male = false)\n\t\"Terribly sorry Miss, I wasn’t looking where I was going.\"\n\nYou exchange pleasantries and make your way along the extravagant corridors to dinner.\n\nThe Jacobean dining saloon is vast and you guess there are at least four hundred people seated. A string quartet is playing on a small stage at the head of the saloon, competing with the sounds of amiable dinner chatter and the rattle of cutlery.\n\nWaving from a nearby table are Sir Malcolm and Lady Jane and you join them. Waiters are serving food on trolleys, kept hot under large metal cloches. Lady Jane is wearing a striking black and red dress and it brings to your mind an image of a beautiful yet deadly spider. As you sit down you see a man staring at you from the opposite table. He is seated alone, wearing a dark suit and wearing dark glasses.\n\nYou start to read the menu when a commotion near the stage takes everyone’s attention, including yours. A man in a safari suit is frantically waving his arms about and gesturing towards the band that have now stopped playing. At first it looks as if a child is jumping around on stage but you see that it is in fact a monkey! It leaps from the stage, violin in hand and starts jumping from table to table like a frog jumping between lily pads. Shouts of outrage and screams of fright have replaced Beethoven.\n*choice\n\t#Grab banana from fruit tray\n\t\tYou have the banana in your hand and the monkey looks in your direction. It starts capering towards you as diners rush to get out of it’s way.\n\t\t*choice\n\t\t\t#Throw banana out of porthole\n\t\t\t\t*set porthole true\n\t\t\t\tYou wave the banana enticingly at the monkey and manoeuvre towards a porthole. You open it with one hand while you continue to coax with the other. The transfixed monkey moves ever closer and at the last minute you throw the banana out of the porthole. The monkey leaps to follow and seconds later a splashing sound confirms that he has fallen into the icy waters. \n\t\t\t\t\n\t\t\t\tSome of the occupants of the dining room frown and turn away, others boo and you can hear cries of “For shame”. The band ironically play a few bars of the funeral march. The man in the safari suit looks disconsolate. The man in black continues to stare at you, a faint smile on his lips.\n\t\t\t\t\n\t\t\t\t*label violinist\n\t\t\t\tThe violinist is reunited with his instrument and the band play on. The man in dark glasses continues to stare fixedly at you throughout. \n\t\t\t\t\n\t\t\t\tAfter coffee has been served at the end of the meal some space is made for dancing. Something draws your attention to the far side of the dining room. You notice the bald headed man from the lecture hurriedly leaving through a door. A flash of silver from his wrist confirms to you that it is the same man!\n\t\t\t\t*choice\n\t\t\t\t\t*if (monkeyfight = true) #Ask Sir Malcolm to dance\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t*set gm true\n\t\t\t\t\t\t\t\"I'm sorry Jack but watching you beat that monkey senseless in the middle of the dancefloor hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. We think we are better than the animals, but I wonder if we aren't worse?\"\n\t\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\t*set sf true\n\t\t\t\t\t\t\t\"I'm sorry Jill but watching you beat that monkey senseless in the middle of the dancefloor hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. We think we are better than the animals, but I wonder if we aren't worse?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou apologise. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (nomap = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinnormal\n\t\t\t\t\t\t\t*if (mapsafe = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinransacked\n\t\t\t\t\t\t\t*if (mappocket = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinpocket\n\t\t\t\t\t*if (monkeyfight = true) #Ask Lady Jane to dance\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t*set sm true\n\t\t\t\t\t\t\t\"I'm sorry Jack but watching you beat that monkey senseless in the middle of the dancefloor hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. We think we are better than the animals, but I wonder if we aren't worse?\"\n\t\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\t*set gf true\n\t\t\t\t\t\t\t\"I'm sorry Jill but watching you beat that monkey senseless in the middle of the dancefloor hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. We think we are better than the animals, but I wonder if we aren't worse?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou apologise. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (nomap = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinnormal\n\t\t\t\t\t\t\t*if (mapsafe = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinransacked\n\t\t\t\t\t\t\t*if (mappocket = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinpocket\n\t\t\t\t\t*if (porthole = true) #Ask Sir Malcolm to dance\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t*set gm true\n\t\t\t\t\t\t\t\"I'm sorry Jack but watching that monkey fall to it's lonely death in cold, dark waters hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. The dangers of fixating on something and how that can blind us to other dangers and opportunities.\"\n\t\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\t*set sf true\n\t\t\t\t\t\t\t\"I'm sorry Jill but watching that monkey fall to it's lonely death in cold, dark waters hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. The dangers of fixating on something and how that can blind us to other dangers and opportunities.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou apologise. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (nomap = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinnormal\n\t\t\t\t\t\t\t*if (mapsafe = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinransacked\n\t\t\t\t\t\t\t*if (mappocket = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinpocket\n\t\t\t\t\t*if (porthole = true) #Ask Lady Jane to dance\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t*set sm true\n\t\t\t\t\t\t\t\"I'm sorry Jack but watching that monkey fall to it's lonely death in cold, dark waters hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. The dangers of fixating on something and how that can blind us to other dangers and opportunities.\"\n\t\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\t*set gf true\n\t\t\t\t\t\t\t\"I'm sorry Jill but watching that monkey fall to it's lonely death in cold, dark waters hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. The dangers of fixating on something and how that can blind us to other dangers and opportunities.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou apologise. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (nomap = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinnormal\n\t\t\t\t\t\t\t*if (mapsafe = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinransacked\n\t\t\t\t\t\t\t*if (mappocket = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinpocket\n\t\t\t\t\t*if (monkeybrain = true) #Ask Sir Malcolm to dance\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t*set gm true\n\t\t\t\t\t\t\t\"I'm sorry Jack but watching you blow that monkeys brains out hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. Would we fare any better if a more advanced race took us prisoner and transported us into an alien environment we couldn't possibly understand or be equipped for?\"\n\t\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\t*set sf true\n\t\t\t\t\t\t\t\"I'm sorry Jill but watching you blow that monkeys brains out hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. Would we fare any better if a more advanced race took us prisoner and transported us into an alien environment we couldn't possibly understand or be equipped for?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou apologise. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (nomap = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinnormal\n\t\t\t\t\t\t\t*if (mapsafe = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinransacked\n\t\t\t\t\t\t\t*if (mappocket = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinpocket\n\t\t\t\t\t*if (monkeybrain = true) #Ask Lady Jane to dance\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t*set sm true\n\t\t\t\t\t\t\t\"I'm sorry Jack but watching you blow that monkeys brains out hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. Would we fare any better if a more advanced race took us prisoner and transported us into an alien environment we couldn't possibly understand or be equipped for?\"\n\t\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\t*set gf true\n\t\t\t\t\t\t\t\"I'm sorry Jill but watching you blow that monkeys brains out hasn't really put me in the mood for a dance. I guess it's a lesson for us all really. Would we fare any better if a more advanced race took us prisoner and transported us into an alien environment we couldn't possibly understand or be equipped for?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou apologise. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (nomap = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinnormal\n\t\t\t\t\t\t\t*if (mapsafe = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinransacked\n\t\t\t\t\t\t\t*if (mappocket = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinpocket\n\t\t\t\t\t*if (cloche = true) #Ask Sir Malcolm to dance\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t*set gm true\n\t\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\t*set sf true\n\t\t\t\t\t\tYou take Sir Malcolm’s hand and he escorts you to the dance floor. The feel of his hand in yours is not dissimilar to the feeling you get when a rare treasure is in your palm. The gentle swell of the ship and of the music transports you and all too soon the evening is at an end. \n\t\t\t\t\t\t\n\t\t\t\t\t\tLightheaded you make your way back along the swanky hallways, occasionally breaking into dance when you are sure the path is clear.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (nomap = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinnormal\n\t\t\t\t\t\t\t*if (mapsafe = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinransacked\n\t\t\t\t\t\t\t*if (mappocket = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinpocket\n\t\t\t\t\t*if (cloche = true) #Ask Lady Jane to dance\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t*set sm true\n\t\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\t*set gf true\n\t\t\t\t\t\tYou take Lady Jane’s hand and escort her to the dance floor. The feel of her hand in yours is not dissimilar to the feeling you get when a rare treasure is in your palm. The gentle swell of the ship and of the music transports you and all too soon the evening is at an end. As you leave the dancefloor you catch sight of a small yellow tattoo on Lady Jane’s right shoulder. It looks like a dragon.\n\t\t\t\t\t\t\n\t\t\t\t\t\tLightheaded you make your way back along the swanky hallways, occasionally breaking into dance when you are sure the path is clear.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (nomap = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinnormal\n\t\t\t\t\t\t\t*if (mapsafe = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinransacked\n\t\t\t\t\t\t\t*if (mappocket = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinpocket\n\t\t\t\t\t#Intimidate the man in dark glasses\n\t\t\t\t\t\tYou pull up a seat opposite the man in black. He continues to stare forward. You lean in and start to speak. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Now listen here, you have stared at me all evening. Don’t think I am intimidated by you because I am not. I don’t know what kind of game you think you are playing but it wont work on me.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tJabbing a finger in his chest for emphasis you end with:\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Do\" (jab) \"You\" (jab) \"Understand?\" (jab) \n\t\t\t\t\t\t\n\t\t\t\t\t\tHe opens his mouth to reply but before he speaks a figure behind him gently places a hand on his shoulder. A young lady carefully takes his arm and helps him up. She then bends down and picks up his cane from the seat of the chair next to him. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Did you have a nice evening Grandfather?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tA tear runs down his cheek and she dabs it away with her handkerchief. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"There, there PopPop we all miss Grandmama,\" she says and leads the blind man away.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYour ears fill with a whistling sound and your face burns with shame. You rush from the dining room and along the hallways to your room.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (nomap = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinnormal\n\t\t\t\t\t\t\t*if (mapsafe = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinransacked\n\t\t\t\t\t\t\t*if (mappocket = true) #Return to cabin\n\t\t\t\t\t\t\t\t*goto cabinpocket\n\t\t\t\t\t#Chase after the bald man\n\t\t\t\t\t\tThe dance floor is starting to fill as you wind your way to the other side of the dining room past tables of diners drinking coffee and couples making their way to the dance floor. \n\t\t\t\t\t\t\n\t\t\t\t\t\tFinally you reach the door on the other side and go through. The door swings open to a quite narrow promenade deck with a white safety railing. The sea air is cold and bracing, the wide black sea stretching out forever. You hear the muffled sounds of the band striking up inside. Two masked figures dressed in black emerge from their concealment in the shadows behind you. One jams the door shut with a wedge and the other taps a sap back and forth into his hand. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"We wouldn’t want to be disturbed now would we?\" says the figure with the sap before swinging at you.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Hired Goons[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 5, Stamina 7[/b]\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto goon_fight\n\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto click1\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto goonwin\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle Duster\n\t\t\t\t\t\t\t\t\"It's you and me together again Charlene\" you whisper to the knuckle duster\n\t\t\t\t\t\t\t\t*goto goon_fight1\n\t\t\t#Use banana with cloche\n\t\t\t\t*set cloche true\n\t\t\t\tYou grab a dining cart from a nearby waiter on his way back to the kitchen. He has become transfixed by the unfolding horror. Taking the huge metal domed plate cloche in one hand, you place the banana on the cart and push it gently towards the gibbering simian. Keeping your distance you watch as the monkey cautiously climbs onto the cart and grabs the banana. Sitting happily on the trolley he peels it slowly and you creep round so you are behind him. The entire dinning saloon holds its breath as you get close enough to slam down the cloche. A clang proclaims your success as the annoying anthropoid is trapped under the dome!\n\t\t\t\t\n\t\t\t\tWith one hand on the lid and the other on the trolley you wheel the ape entree over to the keeper. When he has safely taken over the lid and the trolley you relinquish your grip. The flustered keeper thanks you profusely and gives you a lucky rabbits foot as thanks.\n\t\t\t\t*set empty_inventory false\n\t\t\t\t*set rabbitsfoot true\n\t\t\t\t*set luck+1\n\t\t\t\t[i]Your luck is increased by 1.[/i]\n\t\t\t\t*if (luck > 12)\n\t\t\t\t\t*set luck 12\n\t\t\t\t\t*goto asyoureturn\n\t\t\t\t*else \n\t\t\t\t\t*goto asyoureturn\n\t\t\t\t\n\t\t\t\t*label asyoureturn\n\t\t\t\t\n\t\t\t\tAs you return to your table the keeper realises his predicament as to how exactly he is going to progress from here. Fortunately that isn’t really your problem. You return to your table to the sound of clapping and the warm smiles of your companions. \n\t\t\t\t*goto violinist\n\t\t\t#Throw banana at monkey\n\t\t\t\tThe banana lands at the monkeys feet. He picks it up and eats it calmly and then looks at you for more. With none forthcoming he capers towards you through fleeing diners until eventually leaping on you in a rage. \n\t\t\t\t*choice\n\t\t\t\t\t*if (instant_win = true) #Instant Win\n\t\t\t\t\t\t*goto win\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto monkey_fight\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle Duster\n\t\t\t\t\t\t\"It's time to go to work old friend\"\n\t\t\t\t\t\t*goto monkey_fightk\n\t\t\t#Wave banana enticingly\n\t\t\t\tYou wave the banana at the monkey in a beckoning fashion. It leaps onto you in a rage. \n\t\t\t\t*choice\n\t\t\t\t\t*if (instant_win = true) #Instant Win\n\t\t\t\t\t\t*goto win\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto monkey_fight\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle Duster\n\t\t\t\t\t\t\"It's time to go to work old friend\"\n\t\t\t\t\t\t*goto monkey_fightk\t\n\t*if (gun = true) #Shoot the monkey\n\t\t*if (bullets_number > 0) \n\t\t\t*goto monkey_gun\n\t\t*else\n\t\t\t*goto click\t\t\n\t#Grab the monkey\n\t\tSeizing the initiative you leap from your chair and rush towards the monkey. He rushes towards you and two primates lock together in battle.\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto monkey_fight\n\t\t\t*if (instant_win = true) #Instant Win\n\t\t\t\t*goto win\t\n\t\t\t*if (knuckle = true) #Use Knuckle Duster\n\t\t\t\t\"It's time to go to work old friend\"\n\t\t\t\t*goto monkey_fightk\n\t#Do nothing\n\t\tAs you are deciding what to do you mistakenly catch the monkey's eye. You look away but you know it is too late. The enraged monkey bounds towards you, leaping tables and cowering diners until it is on you. \n\t\t*choice\n\t\t\t*if (instant_win = true) #Instant Win\n\t\t\t\t*goto win\n\t\t\t#Fight\n\t\t\t\t*goto monkey_fight\n\t\t\t*if (knuckle = true) #Use Knuckle Duster\n\t\t\t\t\"It's time to go to work old friend\"\n\t\t\t\t*goto monkey_fightk\n*label monkey_fight\n*line_break\nYou are in a fight with:\n\n[b]Mr Bubbles[/b]\n\n[b]Skill 6, Stamina 6[/b]\n\n*label monkey_fight1\n*set monkeyfight true\n*temp monkeydiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand monkeydiceresult 1 dicesides\n*line_break\nThe monkey rolled ${monkeydiceresult}\n*set diceresult +skill\n*set monkeydiceresult +monkeyskill\n*line_break\nYour total: ${diceresult} Mr Bubbles total: ${monkeydiceresult}\n*if (diceresult > monkeydiceresult)\n\t*line_break\n\tYou beat the monkey furiously\n\t*set monkeyhp -2\n*if (diceresult \u003c monkeydiceresult)\n\t*line_break\n\tThe monkey bites and claws you\n\t*set stamina -2\n*if (diceresult = monkeydiceresult)\n\t*line_break\n\tYou circle each other warily\n\t*goto monkey_fight1\n*line_break\nYou have ${stamina} stamina \n*line_break\nThe monkey has ${monkeyhp} stamina left\n*line_break\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (monkeyhp \u003c 1)\n\t*goto win\n*else\n\t*goto monkey_fight1\n\n*label win\n*set monkeyfight true\n\nThe man in the safari suit cradles the monkeys broken body in his arms and leaves the scene, head bowed and sobbing.\n*if (stamina = max_stamina)\n\t*goto violinist\n*elseif (provisions = false)\n\t*goto violinist\n*else\n\t*goto choice8\n*label choice8\n\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*goto eat_provisions1\n\t*if (provisions_number = 0) #Eat Provisions\n\t\t*goto no_provisions1\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto violinist\n\t*if (provisions = false) #Man triumphs\n\t\t*goto violinist\n\n*label monkey_gun\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll \u003c= 3)\n\t*goto fightshot\n*if (bullet_roll >= 4)\n\t*goto killshot\n*label fightshot\nThe bullet whizzes past the monkey's ear, hits something metallic behind him and then drills through the third violinist's sheet music. The enraged monkey bounds towards you, leaping tables and cowering diners until it is on you.\n*goto monkey_fight\n*label killshot\n*set monkeybrain true\nSuccess! You hit the monkey through it’s right eye. The back of it’s head balloons out and a splash of brains and blood flicks onto the crisp white jacket of the conductor. You hear the sound of several people gagging, a lot of booing and cries of \"poor show\". \n\nThe monkey lies still, an incongruous reminder of the permanence of death. The man in the safari suit weeps and a steward covers the body with a sheet. \n\n*goto violinist\n*label click\nYou hear a click as you pull the trigger.\n\n\"Probably one of those old fashioned guns that need bullets,\" says Sir Malcolm.\n\n\"Looks like you are going to do this the old fashioned way,\" adds Lady Jane.\n*goto monkey_fight\n\n*label cabinnormal\nIt has been an eventful day and you are ready for bed.\n\nYou dream of a hideous and stiffly animated toy monkey banging on a drum. The noise of the drumming grows louder and louder until you awake to the sound of heavy knocking on your cabin door. Dressing rapidly you answer the door to Sir Malcolm and Lady Jane.\n\n*if (male = true)\n\t\"Jack it seems like there’s some kind of trouble,\" says Sir Malcolm. \"The engines have stopped.\"\n*if (male= false)\n\t\"Jill it seems like there’s some kind of trouble,\" says Sir Malcolm. \"The engines have stopped.\"\n\n\"And there is a lifeboat missing,\" adds Lady Jane. \n\n\"Oh yes, there's a storm coming too!\" says Sir Malcolm.\n*page_break A storm at sea\n*goto_scene boatstorm\n\n*label cabinpocket\n*set map false\nIt has been an eventful day and you are ready for bed. Taking off your jacket you check the inside pocket.\n\nThe map has gone!\n\nCursing your luck you retire for the evening.\n\nYou dream of a hideous and stiffly animated toy monkey banging on a drum. The noise of the drumming grows louder and louder until you awake to the sound of heavy knocking on your cabin door. Dressing rapidly you answer the door to Sir Malcolm and Lady Jane.\n\n*if (male = true)\n\t\"Jack it seems like there’s some kind of trouble,\" says Sir Malcolm. \"The engines have stopped\"\n*if (male= false)\n\t\"Jack it seems like there’s some kind of trouble,\" says Sir Malcolm. \"The engines have stopped\"\n\n\"And there is a lifeboat missing,\" adds Lady Jane. \n\n\"Oh yes, there's a storm coming too\" says Sir Malcolm.\n*page_break A storm at sea\n*goto_scene boatstorm\n\n*label cabinransacked\n*set map false\nWhen you enter your room you find it has been ransacked! The safe door is open and the map is gone!\n\nCursing your luck you retire for the evening.\n\nYou dream of a hideous and stiffly animated toy monkey banging on a drum. The noise of the drumming grows louder and louder until you awake to the sound of heavy knocking on your cabin door. Dressing rapidly you answer the door to Sir Malcolm and Lady Jane.\n\n*if (male = true)\n\t\"Jack it seems like there’s some kind of trouble,\" says Sir Malcolm. \"The engines have stopped.\"\n*if (male = false)\n\t\"Jill it seems like there’s some kind of trouble,\" says Sir Malcolm. \"The engines have stopped.\"\n\n“And there is a lifeboat missing” adds Lady Jane. \n\n\"Oh yes, there's a storm coming too\" says Sir Malcolm\n*page_break A storm at sea\n*goto_scene boatstorm\n\n\n\n\n\n\n\n*label goon_fight\n*temp goondiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand goondiceresult 1 dicesides\n*line_break\nThe goons rolled ${goondiceresult}\n*set diceresult +skill\n*set goondiceresult +goonskill\n*line_break\nYour total: ${diceresult} Goons total: ${goondiceresult}\n*if (diceresult > goondiceresult)\n\t*line_break \n\tYou punch a goon squarely on the jaw\n\t*set goonhp -2\n*if (diceresult \u003c goondiceresult)\n\t*line_break\n\tThe goons hit you with a low blow\n\t*set stamina -2\n*if (diceresult = goondiceresult)\n\tYou sidestep their attack\n\t*goto goon_fight\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe goons have ${goonhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (goonhp \u003c 1)\n\t*goto goonwin\n*else\n\t*goto goon_fight\n\n*label goonwin\n\nYour final blow sends one thug backwards and over the railing. The other is nowhere to be seen. \n*if (stamina = max_stamina)\n\t*goto bald_man\n*elseif (provisions = false)\n\t*goto bald_man\n*else\n\t*goto choice9\n*label choice9\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*goto eat_provisions\n\t\t*if (provisions_number = 0)\n\t\t\t*goto no_provisions\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto bald_man\n\t*if (provisions = false) #That takes care of that\n\t\t*goto bald_man\n*label bald_man\nThe bald man is long gone and you return to your cabin.\n*choice\n\t*if (nomap = true) #Return to cabin\n\t\t*goto cabinnormal\n\t*if (mapsafe = true) #Return to cabin\n\t\t*goto cabinransacked\n\t*if (mappocket = true) #Return to cabin\n\t\t*goto cabinpocket\n\t\n\n*label click1\nYou hear a click as you pull the trigger.\n\n\"Looks like I am going to have to do this the old fashioned way.\"\n*goto goon_fight\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set goonhp - bullet_damage\nThe goons have ${goonhp} stamina remaining\n*if (goonhp \u003c 1)\n\t*goto winshot\n*else\n\nThe goons have closed the distance and you must now fight hand to hand.\n\n*goto goon_fight\n\n\t\n*label winshot\nThe goon draws back his arm to swing at you but your bullet hits him in the chest. He staggers backwards into his companion and they both fall over the railing into the darkness below.\n*if (stamina = max_stamina)\n\t*goto thebaldmanislonggone\n*elseif (provisions = false)\n\t*goto thebaldmanislonggone\n*else\n\t*goto choicebald\n*label choicebald\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto thebaldmanislonggone\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto thebaldmanislonggone\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto thebaldmanislonggone\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto thebaldmanislonggone\n\n*label thebaldmanislonggone\nThe bald man is long gone and you return to your cabin.\n*choice\n\t*if (nomap = true) #Return to cabin\n\t\t*goto cabinnormal\t\n\t*if (mapsafe = true) #Return to cabin\n\t\t*goto cabinransacked\n\t*if (mappocket = true) #Return to cabin\n\t\t*goto cabinpocket\n\n*label eat_provisions\n\"Not bad!\"\n*line_break\n*set stamina +5\n*set provisions_number -1\n*gosub limit_stats\n*goto bald_man\n\n*label no_provisions\n\"I can't believe I have run out already!\"\n*line_break\n*set provisions false\n*goto bald_man\n\n\n*label limit_stats\n*if stamina > max_stamina\n\t*set stamina max_stamina\n*return\n\n*label eat_provisions1\n\"Not bad!\"\n*line_break\n*set stamina +5\n*set provisions_number -1\n*gosub limit_stats\n*goto violinist\n\n*label no_provisions1\n\"I can't believe I have run out already!\"\n*line_break\n*set provisions false\n*goto violinist\n\n*label monkey_fightk\n*set monkeyfight true\n*temp monkeydiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand monkeydiceresult 1 dicesides\n*line_break\nThe monkey rolled ${monkeydiceresult}\n*set diceresult +skill\n*set monkeydiceresult +monkeyskill\n*line_break\nYour total: ${diceresult} Mr Bubbles total: ${monkeydiceresult}\n*if (diceresult > monkeydiceresult)\n\t*line_break\n\tYour knuckle duster clangs dully on the coconut-like head of the monkey\n\t*set monkeyhp -3\n*if (diceresult \u003c monkeydiceresult)\n\t*line_break\n\tThe monkey bites and claws you\n\t*set stamina -2\n*if (diceresult = monkeydiceresult)\n\t*line_break\n\tYou circle each other warily\n\t*goto monkey_fight1\n*line_break\nYou have ${stamina} stamina \n*line_break\nThe monkey has ${monkeyhp} stamina left\n*line_break\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (monkeyhp \u003c 1)\n\t*goto win\n*else\n\t*goto monkey_fightk\n\t\n*label goon_fight1\n*temp goondiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand goondiceresult 1 dicesides\n*line_break\nThe goons rolled ${goondiceresult}\n*set diceresult +skill\n*set goondiceresult +goonskill\n*line_break\nYour total: ${diceresult} Goons total: ${goondiceresult}\n*if (diceresult > goondiceresult)\n\t*line_break \n\tYou punch a goon squarely on the jaw with a tooth-loosening overhander\n\t*set goonhp -3\n*if (diceresult \u003c goondiceresult)\n\t*line_break\n\tThe goons hit you with a low blow\n\t*set stamina -2\n*if (diceresult = goondiceresult)\n\tYou sidestep their attack\n\t*goto goon_fight\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe goons have ${goonhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (goonhp \u003c 1)\n\t*goto goonwin\n*else\n\t*goto goon_fight1\n\n\n", "boatstorm": "*if (male = true) \n\t\"What should we do Jack?\"\n*if (male = false) \n\t\"What should we do Jill?\"\n*choice\n\t#Go to engine room\n\t\tYou race down into the bowels of the ship to the engine room. The ship continues to list dangerously and several times you are thrown from one side to the next. \n\t\t\n\t\tFinally you arrive at a solid green steel door. A stenciled sign in white reads \n\t\t\n\t\t\"Engine Room, Authorised Personnel Only\"\n\t\t*choice\n\t\t\t#Open Door\n\t\t\t\tThe door is locked and there is no way you can break it down.\n\t\t\t\t*choice\n\t\t\t\t\t#Take a lifeboat\n\t\t\t\t\t\t*goto lifeboat\n\t\t\t\t\t#Go to the bridge\n\t\t\t\t\t\tRacing down the luxurious passageways you run towards the front of the ship. \n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tWhen you are back at the passenger deck a huge wave hits the ship and you are thrown into the air. You land heavily. \n\t\t\t\t\n\t\t\t\t\t\t[i]Lose 2 stamina[/i]\n\t\t\t\t\t\t*set stamina -2\n\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tFinally you reach a large set of double doors marked \"Bridge, Crew Only.\"\n\t\t\t\t\t\t*goto wheelhouse\n\t#Take a lifeboat\n\t\t*label lifeboat\n\t\t\"It seems our rivals are trying to steal a march on us. Well, two can play at that game,\" you say.\n\t\t\n\t\t*label lifeboat2\n\t\tYou launch a lifeboat and begin to row away from the Wayfarer in the direction of the Cabinda port. The sun is rising as you put distance between yourself and the ship. On the horizon you can see a storm is about to hit the Wayfarer.\n\t\t\n\t\tFrom your lifeboat you watch as the ship is tossed around casually by the mighty storm. Soon it has capsized and begins to sink. It is probably your imagination that makes you think you can hear screams over the sound of the howling wind. You row in silence, unwilling to look at your companions. The storm turns your way and you know that in the tiny lifeboat your adventure is over.\n\t\t*goto_scene youdied\n\t#Go to bridge\n\t\tRacing down the luxurious passageways you run towards the front of the ship.\n\t\t\n\t\tFinally you reach a large set of double doors marked \"Bridge, Crew Only.\"\n\t\t*goto wheelhouse\n\t\t\n*label wheelhouse\nYou burst through the door into the wheel house. The ships wheel stands in front of the bridge window and beyond that the choppy seas. The Captain is lying on the floor. He has been gagged and tied hand and foot, his furious struggles create the impression of a very angry human sized caterpillar. The wheel spins on it’s own as the ship now sails at the whim of the elements. \n\n\"Thank God you freed me when you did, we are right on course for a hurricane and I have to get us out of the way right now!\" \n\nGrabbing the ships wheel the captain spins it furiously clockwise. To his right is a handle for the selection of various engine settings. Selecting full the captain curses then turns to face you:\n\n\"My God, we have no engines! Without power we going to be hit full on!\"\n*choice\n\t#Flee in a lifeboat\n\t\tYou scream \"No!\" and grab Sir Malcolm by the shoulders. \"We have to get out of here now!\"\n\t\t\n\t\tThe boat rocks perilously as you race to the lifeboat deck.\n\t\t\n\t\t*goto lifeboat2\n\t#Go to the engine room\n\t\t\"Wait, you will need a key\" says the Captain.\n\t\t\n\t\tHe reaches into his jacket.\n\t\t\n\t\t\"Damn and blast, they must have taken my key when I was knocked out. There is a spare though. Here...\"\n\t\t\n\t\tThe Captain reaches under the mat he has been standing on and hands over the key.\n\t\t\n\t\tThe race back to the engine room is exhausting and dangerous. The nearing storm is hitting the ship with increasing strength and at times you are practically running on the walls as the ship lists more and more. Finally you reach the engine room.\n\t\t\n\t\tA solid green steel door with a stencilled sign in white reads \"Engine Room, Authorised Personnel Only\"\n\t\t*choice\n\t\t\t#Use key\n\t\t\t\tThe heavy door is well oiled and opens silently. You are hit by a distinctive blast of wet heat and the glorious smell of engines. There are two massive contraptions here, one on the left and one on the right. They are covered in dials and valves with huge pistons sprouting everywhere like gigantic metal spider legs. A series of walkways and ladders and wheels and cogs conspire to create a scene of enormous complexity. On the floor in front of you between the two vast engines are three engineers that have been gagged and tied together.\n\t\t\t\t\n\t\t\t\tAs soon as you have freed the first engineer he rushes to the engine on the right and opens an inspection panel. Groaning loudly he repeats the same action on the other engine. Looking into the inner workings of the huge device now the panel has been opened you can see that the intricate workings inside have been violently smashed. After sucking his teeth the engineer says:\n\t\t\t\t\n\t\t\t\t\"It’s bad, very bad. I can get a tiny bit of power but we are going to be limping along to Zanzibar now.\"\n\t\t\t\t\n\t\t\t\tStepping away from the engineers you discuss what to do next. \n\t\t\t\t*choice\n\t\t\t\t\t#Take a lifeboat\n\t\t\t\t\t\t\"This ship is doomed and everyone on it is going to die!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe boat rocks perilously as you race to the lifeboat deck.\n\t\t\t\t\t\t*goto lifeboat2\n\t\t\t\t\t#Ride out the storm\n\t\t\t\t\t\tThe ship rocks as it passes close to the hurricane. You exchange concerned glances with each other but each subsequent wave is less powerful and soon all is calm again. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Well we may as well have a drink and toast the Captain,\" says Sir Malcolm and with that you retire to the bar. \n\t\t\t\t\t\t*page_break Cabinda\n\t\t\t\t\t\t*goto_scene cabinda\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t \n\t\t \n\t\t", "cabinda": "*temp bullet_roll 0\n*temp bullet_damage 0\n*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto theroughseas\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*else\n\t\t\t\t*goto theroughseas\n\t\t#No\n\t\t\t*goto theroughseas\n*label theroughseas\n*temp bullet_roll 0\n*temp bullet_damage 0\nThe rough seas of last night and possibly one too many in the bar find you standing on the deck for fresh air as the HMS Wayfarer limps into the port of Cabinda on the coast of Angola. \n*line_break\nOn the port side of the ship a long jetty runs from the coast into the sea. Starboard is a sheer cliff with a fortification on top. The fort’s cannon is well positioned for defence. The port itself is rammed with buildings of all kinds, some well built and established and some makeshift and ramshackle.  A pleasant sea breeze provides some respite from the sweltering sun. \n\nAs you begin to descend the gangplank to the jetty you are overwhelmed by the sights and smells of Cabinda port. Delicious aromas of exotic spices and foods fill the air. The sounds of street sellers and entertainers mix in a cacophony of music, singing and shouting. As soon as you have set foot on the jetty you are surrounded. Happy children are holding out their hands in the hope of receiving some gift or money. Peddlers of all descriptions are waving around all manner of bizarre goods. Some are shouting \"Cheers!\" and \"Good Day!\" in an attempt to get your attention. \n\nA sign in the shape of a boat has been nailed to the railing of the pier , it says \"Boat Hire 10 gold pieces.\"\n\nOne young boy in brightly coloured tribal clothing suddenly jumps up at you. He has stolen your neckerchief! He runs off down the jetty! \n*choice\n\t#Chase him\n\t\tYou push your way through the crowds and make your way as fast as you can along the jetty. It is very hard to get up to speed as there are so many people. Up ahead you see the bright red and yellow of the young boy as he reaches the end of the pier and turns left. You reach the end of the pier. The main street runs ahead of you and the coastal sprawl is to the right. He has run down a narrow side alley.\n\t\t*choice\n\t\t\t#Give up\n\t\t\t\t*goto notchase\n\t\t\t#Follow him into the alley\n\t\t\t\tThe alley takes a turn to the right. It is blocked up ahead by a makeshift fence. You can see the young boy, he is climbing through a small gap in the bottom that only a child could get through. Your neckerchief is still gripped in his right hand. \n\t\t\t\t*choice\n\t\t\t\t\t#Grab neckerchief\n\t\t\t\t\t\tYou grab the neckerchief and yank it from the boy’s hand as he crawls through the gap. He stands on the other side of the fence and turns to look at you. His hateful expression is not that of a child. After quietly holding your gaze, he slowly turns his back and walks away. Despite the sun, you feel cold. \n\t\t\t\t\t\t*set neckerchief true\n\t\t\t\t\t\t\n\t\t\t\t\t\tA small piece of red material from his clothing is caught on the fence. You take it. \n\t\t\t\t\t\t*set redcloth true\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label alleythug\n\t\t\t\t\t\tYou walk back down the alley to the port, deep in thought over what has just happened. As you near the port two shadows are cast on the path ahead. A couple of thugs step out, blocking your path. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What is it with thugs and alleys?\" you mutter to yourself as you raise your fists to fight.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Cabinda Alley Thugs[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 6, Stamina 6[/b]\n\t\t\t\t\t\t*label alleythug2\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto roll_dice_loop\n\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t*goto click\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto win\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle Duster\n\t\t\t\t\t\t\t\tThe cold brass is pleasantly heavy in your fist\n\t\t\t\t\t\t\t\t*goto roll_dice_loop1\n\t\t\t\t\t#Grab boy\n\t\t\t\t\t\tYou grab his wrist before he can pull his arm through the gap. \n\t\t\t\t\t\t\n\t\t\t\t\t\tIt is like grabbing a red hot coal and you let go immediately in agony and shock!\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]you lose 2 stamina points[/i]\n\t\t\t\t\t\t*set stamina -2\n\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs you nurse your hand he stands on the other side of the fence and turns to look at you. His hateful expression is not that of a child. After quitely holding your gaze, he slowly turns his back and walks away.\n\t\t\t\t\t\t\n\t\t\t\t\t\tA small piece of red material from his clothing is caught on the fence. You take it. \n\t\t\t\t\t\t*set redcloth true\n\t\t\t\t\t\t*goto alleythug\n\t#Ignore him\n\t\t*label notchase\n\t\t\"It's too hot to be chasing around. Anyway, according to Smyth-Fortesque we should be searching in the region of the Mpulungu, which is only reachable by travelling down the Njaa Mto river. So, I guess we need a boat.\"\n\t\t\n\t\t*label sellnecklace\n\t\t\n\t\tJust then a little girl grabs your hand. She is selling necklaces made from flowers. \n\t\t\n\t\t*if (male = true) \n\t\t\t\"Please mister, necklaces, good luck necklaces for your journey. Only one gold coin.\"\n\t\t*if (male = false) \n\t\t\t\"Please miss, necklaces, good luck necklaces for your journey. Only one gold coin.\"\n\t\t*choice\n\t\t\t*selectable_if (gold >= 1) #Buy necklaces\n\t\t\t\t*set necklace true\n\t\t\t\t*set gold -1\n\t\t\t\t*if (gm = true)\n\t\t\t\t\tThe girl looks pleased and you ruffle her hair before she runs off happily into the crowd. Turning to Sir Malcolm you bow slightly \"My Lord.\" He lowers his head and you put the necklace on him. He bows in an exaggerated way and thanks you. It is probably the heat because you feel slightly dizzy. You and Lady Jane don your necklaces.\n\t\t\t\t\t\n\t\t\t\t\t\"We all look very dapper,\" she says.\n\t\t\t\t\t*goto marinachoice\n\t\t\t\t*if (gf = true)\n\t\t\t\t\tThe girl looks pleased and you ruffle her hair before she runs off happily into the crowd. Turning to Lady Jane you bow slightly \"My Lady.\" She lowers her head and you put the necklace on her. She curtsies in an exaggerated way and thanks you. It is probably the heat because you feel slightly dizzy. You and Sir Malcolm don your necklaces.\n\t\t\t\t\t\n\t\t\t\t\t\"We all look very dapper,\" he says.\n\t\t\t\t\t*goto marinachoice\n\t\t\t\t*if (sm = true)\n\t\t\t\t\tThe girl looks pleased and you ruffle her hair before she runs off happily into the crowd. Turning to Lady Jane you bow slightly \"My Lady.\" She lowers her head and you put the necklace on her. She curtsies in an exaggerated way and thanks you. It is probably the heat because you feel slightly dizzy. You and Sir Malcolm don your necklaces.\n\t\t\t\t\t\n\t\t\t\t\t\"We all look very dapper,\" he says.\n\t\t\t\t\t*goto marinachoice\n\t\t\t\t*if (sf = true)\n\t\t\t\t\tThe girl looks pleased and you ruffle her hair before she runs off happily into the crowd. Turning to Sir Malcolm you bow slightly \"My Lord.\" He lowers his head and you put the necklace on him. He bows in an exaggerated way and thanks you. It is probably the heat because you feel slightly dizzy. You and Lady Jane don your necklaces.\n\t\t\t\t\t\n\t\t\t\t\t\"We all look very dapper,\" she says.\n\t\t\t\t\t*goto marinachoice\n\t\t\t\t*else\n\t\t\t\t\tThe girl looks pleased and you ruffle her hair before she runs off happily into the crowd. Sir Malcolm briefly studies the construction of the necklace before putting it into his backpack. You and Lady Jane don your necklaces.\n\t\t\t\t\t\n\t\t\t\t\t\"We both look very dapper,\" she says.\n\t\t\t\t\t*goto marinachoice\n\t\t\t\t*label marinachoice\n\t\t\t\t*choice\n\t\t\t\t\t#Head for the marina\n\t\t\t\t\t\t*goto gotomarina\n\t\t\t\t\t#Explore Cabinda port\n\t\t\t\t\t\t*label cabindaport\n\t\t\t\t\t\t*image feathers.jpg\n\t\t\t\t\t\tCabinda Port is a deluge of sights, sounds and smells. Wonderful cooking aromas mix with heady perfumes and tobacco smoke. Voices of  different dialects compete with the sales pitches of the stall vendors. People of all shapes and sizes press against you. A woman with a peacock headdress passes closely by and one of the feathers tickles your nose. \n\t\t\t\t\t\t\n\t\t\t\t\t\tNearby there is a food stall selling bowls of stew from a large cauldron suspended over glowing coals. Next to them a fortune teller is throwing bones and making divinations outside of a tent. A small crowd has gathered to listen to some music being played, you can’t see the musician but the haunting, flute-like sound is captivating.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Try the stew\n\t\t\t\t\t\t\t\tYou ask for some of the delicious smelling stew. The chef ladles a generous portion into a bowl and passes it to you. Judging by his belly he is no stranger to partaking of the odd bowl or three himself. You start to look for a coin to pay him but he waves his hand and signals for you to eat. As you gulp down the stew a few people stop to watch. Very soon the bowl is empty and you pass it back to the happy chef, licking your fingers. The small crowd murmur appreciatively.\n\t\t\t\t\t\t\t\t[i]Add 2 stamina points.[/i]\n\t\t\t\t\t\t\t\t*set stamina +2\n\t\t\t\t\t\t\t\t*gosub limit_stats\n\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\"Did you enjoy that Jack?\" asks Sir Malcolm. \n\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\"Did you enjoy that Jill?\" asks Sir Malcolm.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Yes, it was very good. Not quite sure why I have a small audience though?” you reply. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\"I think I can answer that Jack,\" says Lady Jane. \"I have been listening to their conversation and can translate it. They say they have never seen a foreigner eat crocodile testicle stew with such relish before!\"\n\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\"I think I can answer that Jill,\" says Lady Jane. \"I have been listening to their conversation and can translate it. They say they have never seen a foreigner eat crocodile testicle stew with such relish before!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tLady Jane and Sir Malcolm laugh uproariously and soon the small crowd are laughing too. When they have stopped laughing you reply:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Well, they probably aren’t used to the food in the adventurers club!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSir Malcolm slaps you on the back and laughter breaks out again.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tOne of the people in the crowd points to the sky and you see the beginnings of a thunderstorm. The stalls start to close and pack up.\n\t\t\t\t\t\t\t\t*goto gotomarina\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Listen to the music\n\t\t\t\t\t\t\t\tA young lady in green is playing an ocarina. It has been designed to look like a brightly painted turtle. The music is gentle and transcendentally beautiful. It transports you on a peaceful journey into the lush green jungle, alive with life and hope and possibilities.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[i]Add 1 luck point.[/i]\n\t\t\t\t\t\t\t\t*set luck +1\n\t\t\t\t\t\t\t\t*if (luck > 12)\n\t\t\t\t\t\t\t\t\t*set luck 12\n\t\t\t\t\t\t\t\t\t*goto alltoosoon\n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t*goto alltoosoon\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label alltoosoon\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAll too soon the tune is over. One of the people in the crowd points to the sky and you see the beginnings of a thunderstorm. The stalls start to close and pack up. \n\t\t\t\t\t\t\t\t*goto gotomarina\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Visit the fortune teller\n\t\t\t\t\t\t\t\tThe fortune teller sits under a red hood. You can see her piercing blue eyes, a golden headdress of some kind and not much else. What you assume is a crystal ball is under a red cloth on a small table.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tShe reaches out her hand in the universal signal that says \"I require payment upfront.\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t*selectable_if (gold >= 1) #Pay 1 gold coin\n\t\t\t\t\t\t\t\t\t\tYou place the coin in her palm, which she closes and then opens again. The coin has disappeared. She removes the cloth from the crystal ball and beckons you to look into it. To your astonishment the ball fills with smoke. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tWhen this clears you see three figures in a boat. You recognise them as yourself, Lady Jane and Sir Malcolm. The boat sails along a river that looks red and white at first glance but when you look closer you see that it is sailing along a river comprised of disembodied mouths! One of the mouths ahead opens enormously wide until the boat sails into the darkness within and the mouth closes. You look down on the river of mouths from higher and higher until you are looking down onto the planet itself. The earth too is consumed and then stars and galaxies, each mouth consuming the other in a never ending circle of consumption until your head spins and you cannot take anymore. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou shut your eyes and shake your head to rid yourself of the horrible vision. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou know you will not easily shake off this experience, but you are steeled for the journey ahead. \n\t\t\t\t\t\t\t\t\t\t[i]Add 1 skill point. [/i]\n\t\t\t\t\t\t\t\t\t\t*set skill +1\t\n\t\t\t\t\t\t\t\t\t\t*if (skill > 12)\n\t\t\t\t\t\t\t\t\t\t\t*set skill 12\n\t\t\t\t\t\t\t\t\t\t\t*goto whenyouopen\n\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t*goto whenyouopen\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*label whenyouopen\n\t\t\t\t\t\t\t\t\t\tWhen you open them again the fortune teller has gone and Sir Malcolm is shaking you by the shoulder to rouse you.\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\"We’d better get going old boy,\" he says. \"Looks like there is a storm coming.\" \t\n\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\"We’d better get going old girl,\" he says. \"Looks like there is a storm coming.\" \n\t\t\t\t\t\t\t\t\t\t*goto gotomarina\n\t\t\t\t\t\t\t\t\t#Don't pay 1 gold coin\n\t\t\t\t\t\t\t\t\t\tShe flicks her hand for you to get lost.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\"We’d better get going old boy,\" says Sir Malcolm. \"Looks like there is a storm coming.\"\n\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\"We’d better get going old girl,\" says Sir Malcolm. \"Looks like there is a storm coming.\"\n\t\t\t\t\t\t\t\t\t\t*goto gotomarina\n\t\t\t#Don't buy necklaces\n\t\t\t\tYou shake your head with a smile and politely decline. The girl looks crestfallen and she runs off into the crowd.\n\t\t\t\t\n\t\t\t\tAs she does so some flowers drop from her collection of necklaces, leaving a trail. It reminds you of the story of Hansel and Gretel with petals instead of breadcrumbs.\n\t\t\t\t*choice\n\t\t\t\t\t#Explore Cabinda port\n\t\t\t\t\t\t*goto cabindaport\n\t\t\t\t\t#Head for the marina\n\t\t\t\t\t\t*label gotomarina\n\t\t\t\t\t\tLeaving the coast behind you walk inland, following a dirt path to the mouth of the Mjaa Nto. The sheer white cliff is not far away on your right and to your left seas of grass sway gently in the light breeze. You can smell something burning and light grey smoke is rising in the sky from the direction of the marina. The smell intensifies as you get closer, irritating the back of your throat.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe marina is a large stagnant pool and you can see the river stretching over the horizon. A decrepit looking ship stands alone amidst a number of burnt out and smoldering wrecks, tied to a precarious jetty.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt is made of riveted sheet iron with a large boiler in the middle. There are two small cabins aft and one at the front for the helm. It is bewildering to you how it stays afloat. The prospect of actually sailing it anywhere is even more horrifying. There are the remains of a burnt out shack by the edge of the marina, smoking gently.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Seems strange that this boat has been left alone,\" says Sir Malcolm.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Perhaps it was out sailing the river when whoever did this was here,\" says Lady Jane. \"Then it returned to find...this.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Take the boat\n\t\t\t\t\t\t\t\t*label theboat\n\t\t\t\t\t\t\t\t\"Well, beggars can't be choosers and I don't fancy swimming all the way,\" says Sir Malcolm.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Quite agree,\" replies Lady Jane.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou tentatively board the boat. When you are on deck Lady Jane pats the engine and says:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"I name this ship the HMS Rustbucket, may God bless her and all who sail in her.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou sail the HMS Rustbucket out of the marina and start down the Mjaa Nto. The sun is low behind you. As you turn a bend in the river and leave the marina you give the ships horn a long blast that echoes through the jungle. From far away, thunder echoes the cry. \n\t\t\t\t\t\t\t\t*page_break The Mjaanto\n\t\t\t\t\t\t\t\t*goto_scene mjaanto\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Explore further\n\t\t\t\t\t\t\t\tThere are numerous footprints in the soft mud that show at least four men have passed through here. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe embers of what looks like it was once a small shack are still hot and smoking gently. You kick them around and underneath one of the planks is a framed family photo in a silver frame. It is scorched around the edges but the proudly smiling parents and their two children are easily recognisable.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThere is nothing more to see here and you board the boat. \n\t\t\t\t\t\t\t\t*page_break The Mjaanto\n\t\t\t\t\t\t\t\t*goto_scene mjaanto\n\n*label click\nYou hear a click as you pull the trigger.\n\n\"I really should check these things at a more opportune time,\" you say to yourself. \n*line_break\n\"Looks like I will be doing this the old fashioned way.\"\n*goto roll_dice_loop\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set thughp - bullet_damage\nThe thugs have ${thughp} stamina remaining\n*if (thughp \u003c 1)\n\t*goto win\n*else\n\t*goto alleythug2\n\n\t\n*label win\n\nAs the last thug falls a few gold coins roll out of his pocket and you take them for your trouble.\n\n[i] You pick up 3 gold coins. [/i]\n*set gold +3\n\nReturning to the end of the jetty you are reunited with with Sir Malcolm and Lady Jane. \n*if (stamina = max_stamina)\n\t*goto smythf\n*elseif (provisions = false)\n\t*goto smythf\n*else\n\t*goto choice8\n*label choice8\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto smythf\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto smythf\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto smythf\n\t*if (provisions = false) #Sorry for that distraction\n\t\t*goto smythf\n*label smythf\n\"According to Smyth-Fortesque we should be searching in the region of Mpulungu, which is only reachable by traveling down the Njaa Mto river. So, I guess next we need a boat,\" says Lady Jane.\n*goto sellnecklace\n\n\n\n*label roll_dice_loop\n*temp alleythugdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand alleythugdiceresult 1 dicesides\n*line_break\nThe alley thugs rolled ${alleythugdiceresult}\n*set diceresult +skill\n*set alleythugdiceresult +alleythugskill\n*if (diceresult > alleythugdiceresult)\n\t*line_break\n\tYour jab sends the thug's head rocking back\n\t*set alleythughp -2\n*line_break\nThe alley thugs have ${alleythughp} stamina left\n*if (diceresult \u003c alleythugdiceresult)\n\t*line_break\n\tYou wince as a thug's blow gets past your guard\n\t*set stamina -2\n*line_break\nYou have ${stamina} stamina left\n*if (diceresult = alleythugdiceresult)\n\t*line_break\n\tYou break apart looking for an opening\n\t*goto roll_dice_loop\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (alleythughp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n*label winshot\n\nYour bullet whizzes past the ear of the first thug and hits the wall behind him. It ricochets off of the alley walls several times more before passing through the head of the first thug, into a wall again and then into his companion.\n*goto win\n\n\n*label limit_stats\n*if stamina > max_stamina\n\t*set stamina max_stamina\n*return\n\t\t\n*label roll_dice_loop1\n*temp alleythugdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand alleythugdiceresult 1 dicesides\n*line_break\nThe alley thugs rolled ${alleythugdiceresult}\n*set diceresult +skill\n*set alleythugdiceresult +alleythugskill\n*if (diceresult > alleythugdiceresult)\n\t*line_break\n\tYour punch sinks into the thug like a wrecking ball\n\t*set alleythughp -3\n*line_break\nThe alley thugs have ${alleythughp} stamina left\n*if (diceresult \u003c alleythugdiceresult)\n\t*line_break\n\tYou wince as a thug's blow gets past your guard\n\t*set stamina -2\n*line_break\nYou have ${stamina} stamina left\n*if (diceresult = alleythugdiceresult)\n\t*line_break\n\tYou break apart looking for an opening\n\t*goto roll_dice_loop1\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (alleythughp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop1\n\t\n\n\n\n\n", "centralbuilding": "*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 false\n\t\t\t*set chapter4 false\n\t\t\t*set chapter5 false\n\t\t\t*set chapter6 false\n\t\t\t*set chapter7 false\n\t\t\t*set chapter8 false\n\t\t\t*set chapter9 false\n\t\t\t*set chapter10 false\n\t\t\t*set chapter11 false\n\t\t\t*set chapter12 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto youpassthrough\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*if (chapter4 = true)\n\t\t\t\t*goto_scene marsh thesoft\n\t\t\t*if (chapter5 = true)\n\t\t\t\t*goto_scene creature itfeelsgood\n\t\t\t*if (chapter6 = true)\n\t\t\t\t*goto_scene junglepath youfollowa\n\t\t\t*if (chapter7 = true)\n\t\t\t\t*goto_scene treepeople theladder\n\t\t\t*if (chapter8 = true)\n\t\t\t\t*goto_scene kolfboy upaheadis\n\t\t\t*if (chapter9 = true)\n\t\t\t\t*goto_scene cliff themorningsun\n\t\t\t*if (chapter10 = true)\n\t\t\t\t*goto_scene temple theinsideis\n\t\t\t*else\n\t\t\t\t*goto youpassthrough\n\t\t#No\n\t\t\t*goto youpassthrough\n*label youpassthrough\nYou pass through the door into a huge open space. The ceiling high above you is decorated with constellations that you don’t recognise. The marble floor shines and glints with streaks of gold. At the far end of the hall is a circular stone construction that looks rather like a very large archery target. A pair of dark red double doors is to the right. A circular pool with a raised golden edge sits in the middle of the hall, it’s surface reflecting the stars above. Silence hangs in the air like a cloud and you feel like an unwelcome visitor at a solemn church ceremony. \n\nAs you look around you feel a growing sense of unease, as if there is some tension in the air that is building with your presence.\n\n\"I don’t like this,\" says Sir Malcolm. \"I don’t think we should spend any more time in here than necessary.\" \n\n\"I agree that something doesn't feel right,\" says Lady Jane. \"But there could be something useful through the red doors.\"\n\nAs you decide, the pool starts to bubble gently.\n*choice\n\t*if (arrivedbyflight = false) #Red doors\n\t\t*goto_scene reddoors\n\t\n\t*if (arrivedbyflight = true) #Red doors\n\t\tYou push the doors but they are locked. \n\t\t\n\t\tSuddenly a horrendous scream comes from the other side! It is abruptly choked off. \n\t\t\n\t\tThere is nothing you can do so you return to the main chamber.\n\t\t\n\t\tThe pool has stopped bubbling. A trail of footprints leads away from it.\n\t\t*goto mainevent\n\t#Circular Stone\n\t\t*label mainevent\n\t\t\"Well let's get on with the main event shall we?\" says Sir Malcolm. \n\t\t\n\t\tYou gather at the mysterious stone barrier.\n\t\t\n\t\tThe door is comprised of three concentric circles. Text is carved into them in a continuous loop. Above the door is a closed stone eye.\n\t\t\n\t\t\"This is no script I recognise,\" says Sir Malcolm.\n\t\t*choice\n\t\t\t*if (tablet = true) #\"Wait!\" says Lady Jane\n\t\t\t\t\"I have seen this text once before, on the stone tablet outside the temple.\"\n\t\t\t\t*choice\n\t\t\t\t\t*if (monkeytablet = true) #\"Fortunately I was able to complete my notes\"\n\t\t\t\t\t\t\"Which means I can translate this into ancient Sumerian and from there into English!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith that Lady Jane gets out her notebook and points at the first wheel.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"The wheels contain lines from a poem. They can be aligned here,\" Lady Jane points to a star shape at the top of the circle. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"So for the outside wheel I can see light, space, bid, hid, rid and obey.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (poemone = false) #\"Erm?\"\n\t\t\t\t\t\t\t\t*label erm\n\t\t\t\t\t\t\t\tYou look at each other with confusion.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Discuss what to do\n\t\t\t\t\t\t\t\t\t\tYou turn to your companions and speak:\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"I think we have only a few options. We can either arrange them and see if we can get in through dumb luck or we can try and force our way in. Otherwise we have a long walk back through the jungle to see what we missed.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe stone eyelid above the door opens, revealing a swivelling eye. It looks organic and it fixes on you. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou look to Lady Jane for her thoughts but she is transfixed on the eye. She starts to point to it and speak but instead disappears into vapour right before you! You look up at the eye and see that it is focusing on you and then...\n\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t#Fiddle with the circles\n\t\t\t\t\t\t\t\t\t\tThe three of you start arranging the concentric circles in the hope that some clues will be revealed. You hear a distinct clicking sound and feel something has shifted beneath your fingers. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tYou turn to lady Jane to speak. She is looking quizzically upwards at the eye before she disappears in a cloud of vapour right before you! You jolt back and look up to see that is focussing on you now.\n\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if (poemone = true) #\"I've got it!\" you exclaim\n\t\t\t\t\t\t\t\t\"The light from space shall do as bid!\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Of course!\" says Jane. \"This wheel must be aligned like so - help me move it.\"\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe three of you rotate the stone wheel into place, it grinds resentfully into position.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"Next wheel,\" says Jane. \"I can see death, dark, shadow, darkness, oblivion, emptiness, freedom.\"\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t*if (poemtwo = false) #\"Erm?\"\n\t\t\t\t\t\t\t\t\t\t*goto erm\n\t\t\t\t\t\t\t\t\t*if (poemtwo = true) #\"Easy!\" says Sir Malcolm\n\t\t\t\t\t\t\t\t\t\t\"Of deaths dark shadow we will be rid.\"\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tThe second wheel is rotated into place.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Last line now,\" says Lady Jane. \"I can see too late, hid, from, beyond, unquiet.\"\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*if (poemthree = false) #\"Erm?\"\n\t\t\t\t\t\t\t\t\t\t\t\t*goto erm\n\t\t\t\t\t\t\t\t\t\t\t*if (poemthree = true) #\"I've got this one!\" says Lady Jane\n\t\t\t\t\t\t\t\t\t\t\t\t\"Too late some things should ere remain hid.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tWith the last wheel in place there is a gentle clicking sound and the door swings open.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tThe jewel is sitting in the middle of a small room on a plinth. Waves of rippling colours pulse outwards. It is held aloft by a squat statue of about three foot in height. The statue has an octopus-like head on a flabby, corpulent body. Small and ineffectual looking wings adorn it’s back and it’s short legs end in stubby claws. The vile appearance of the icon contrasts with the clean beauty of the jewel.\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*image cthulhu.jpg\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"This is it old boy,\" says Sir Malcolm. \"Time to wrap this up.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"This is it old girl,\" says Sir Malcolm. \"Time to wrap this up.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou reach out for the jewel and lift it in your hand. It is very heavy and very cold. An unmistakable click sounds behind your right ear. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"I'll take that,\" says an unfamiliar voice. \"Pass it back to me there’s a good fellow.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*if (male = false)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"I'll take that,\" says an unfamiliar voice. \"Pass it back to me there’s a good toffer.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Hand over the jewel\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou hand the jewel slowly back over your shoulder. Your suspicions are confirmed as you pass the jewel into the gloved hand of Lord Percival Thistlethwaite. With your arms up you turn slowly around as Lord Percival backs out of the door, covering you all with his pistol. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Thank you Jack,\" he sneers from the entrance to the chamber. \"A pleasure doing business with you. I’ll toast you all back at the club.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Thank you Jill,\" he sneers from the entrance to the chamber. \"A pleasure doing business with you. I’ll toast you all back at the club.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith his shoulder he pushes the circular door shut and you are in total darkness.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto vault\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Refuse\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou shake your head slightly and speak without turning:\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"[i]Lord[/i] Percival Thistlethwaite I presume,\" you say sarcastically. “I don’t think so. We have come too far for me to simply hand over the prize like that!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tThere is a loud bang from just behind your ear and the sound of a scream that is not your own. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tLady Jane crumples to the ground and doesn’t move. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Ladies first,\" says Lord Percival. \"I don't believe chivalry is dead...unlike Lady Jane.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set ladyjanedead true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tSir Malcolm runs to her and cradles her lifeless body. For the first time he looks helpless and in his grief you suffer two losses. Lord Percival speaks again:\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"How about now?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Hand over the jewel\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou hand the jewel slowly back over your shoulder.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"You won't get away with this you monster. I'll make sure of that!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Oh Jack!\" replies Lord Percival, \"if I had a shilling every time I heard that I wouldn't be stealing precious artefacts and selling them on the black market.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Oh Jack!\" replies Lord Percival, \"if I had a shilling every time I heard that I wouldn't be stealing precious artefacts and selling them on the black market.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe waves you into the vault and with his shoulder he pushes the circular door shut. You are in darkness.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto vault\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Refuse\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou growl back at Lord Percival, your voice choked with anger and grief.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"You inhuman monster! I will never give you what you want!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAnother shot from behind makes you flinch and Sir Malcolm falls backwards. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"So he wasn't bullet proof after all, despite all the rumours from the Crimea.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set sirmalcolmdead true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"How about now?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Refuse\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tLord Percival sighs:\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Bullets cost money you know Jack. Fortunately I think I can recoup my costs from this little expedition. Now what was it that your goon said again? Ah yes - let's wrap this up. Well, in for a penny in for a pound\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Bullets cost money you know Jill. Fortunately I think I can recoup my costs from this little expedition. Now what was it that your goon said again? Ah yes - let's wrap this up. Well, in for a penny in for a pound\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou hear the gun being cocked again. It is the last thing you hear.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Hand over the jewel\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"There, that wasn't so hard was it. Now, in you go.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith his shoulder he pushes the circular door shut and you are in darkness.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label vault\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou light a match and are instantly grateful for the relief it provides from the utter darkness. From inside the vault you can see the other side of the circular door. A complex series of bolts are slotted into place and they can only be moved from the other side! \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (acidjar = true) #Use the acid\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou take the jar from your pack and carefully remove the lid. Covering your face you throw the acid onto the bars and turn away as fast as you can.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAcrid smoke starts to fill the vault as the bars fizz and pop. Your eyes start streaming and everyone erupts into coughing fits. It becomes hard to see as the room is now almost completely filled with the noxious fumes. As your head starts to swim a chink of light from the door widens as it slowly swings open. Relief and fresh air pour in with equal measure and you burst out of your makeshift prison into the main hall.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tShots are ringing out and ricocheting bullets zing through the air nearby. Lord Percival is standing in the middle of the hall shooting towards the main doorway. Something is standing between him and the exit.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tA tall white figure stumbles towards Lord Percival. It stutters and sways and unknown things writhe and wriggle beneath its skin. It reaches out once as if in need of help, then staggers forward again. Its face slips and shifts, features melting and then coalescing. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tLord Percival shouts unintelligibly and reloads his pistol. He laughs as he fires round after round into the unnameable horror. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHis manic laughing threatens to drown out the click, click, click of his empty pistol.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSomething blurs from the creature and Lord Percival's head slips from his neck and falls to the floor. His body drops backwards and the jewel and his head roll toward you. With a greasy moan the horror moves ever forward.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set colourgem true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe jewel rests against your boot and you pick it up. Lord Percival's fixed eyes appear accusatory. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label choices\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (aliengun = true) #Use the jewel with the gun shaped device\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe jewel fits perfectly. You point it towards the shambling monstrosity and pull the trigger. A wave of bright light shoots forward and into the monster. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set aliengunfiredonce true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt slides into two, each half bubbling and frothing on the ground. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (sirmalcolmdead = false)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"That should buy us some time Jack,\" says Sir Malcolm.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"That should buy us some time Jill,\" says Sir Malcolm.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (ladyjanedead = false)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"We are going to need it,\" adds Lady Jane. \"The damn thing is putting itself back together again!\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe jewel inside the gun dims. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOn the floor, the white mass starts to coalesce.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tLord Percival's head is at your feet.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (headjar = true) #Put his head in the jar and run\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set percivalheadinjar true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou pick up Lord Percival's head by the hair and gently place it in the jar. Excess fluid spills down the sides and you screw the top back on tightly. Inside the jar the head blinks wildly and mouths a silent scream. You hurriedly add it to your backpack, glad to have it out of sight. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if ((ladyjanedead = true) and (sirmalcolmdead = false))\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou and Sir Malcolm run towards the exit, giving a wide berth to the steaming corruption that is still wriggling and rejoining on the floor.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto asyoupass\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*elseif ((sirmalcolmdead = true) and (ladyjanedead = true))\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou run towards
