It enters.\n\t\t\t\t*label zombiewhite\n\t\t\t\tYou must fight the:\n\t\t\t\t\n\t\t\t\t[b]Henchman Zombie[/b]\n\t\t\t\t\n\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\n\t\t\t\t*label henchmanzombie_fight1\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto roll_dice_loop1\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click1\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win1\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"Let's see you get up from this\"\n\t\t\t\t\t\t*goto roll_dice_loopk1\n\t\t\t\t\t\t\n\t#Metal door\n\t\t*label metaldoor\n\t\tThe door is incredibly solid and reminds you of a safe.\n\t\t*choice\n\t\t\t*if (armourykey = true) #Use the key\n\t\t\t\tThe key turns in the lock with a satisfying click. The handle moves easily and you pull the heavy door open. A rush of stale air escapes and as you step inside the room some lights flicker on. \n\t\t\t\t\n\t\t\t\tThe room is entirely utilitarian and overwhelmingly grey. Metal shelves hold various objects, none of which you can identify or that appear to serve any purpose whatsoever.\n\t\t\t\t\n\t\t\t\tThree items catch your eye. One is clearly in the shape of a gun with an identifiable trigger and a space of some kind near the hilt, presumably for ammunition. The other is a helmet-like object, it is very delicate with spidery wire filaments. The top of the helmet also has a space to hold something. The final object is a glass canister with the now familiar recess. All along the canister are collars that can be rotated. \n\t\t\t\t*choice\n\t\t\t\t\t#Take the gun and leave\n\t\t\t\t\t\t*set aliengun true\n\t\t\t\t\t\t*goto zombiecorridor\n\t\t\t\t\t#Take the helmet and leave\n\t\t\t\t\t\t*set alienhelmet true\n\t\t\t\t\t\t*goto zombiecorridor\n\t\t\t\t\t#Take the cannister and leave\n\t\t\t\t\t\t*set aliencannister true\n\t\t\t\t\t\t*goto zombiecorridor\n\t\t\t\t\t#Take all three and leave\n\t\t\t\t\t\t*set aliengun true\n\t\t\t\t\t\t*set alienhelmet true\n\t\t\t\t\t\t*set aliencannister true\n\t\t\t\t\t\t*goto zombiecorridor\n\t\t\t\t\t#Leave\n\t\t\t\t\t\t*goto zombiecorridor\n\t\t\t*if (armourykey = false) #Try the door\n\t\t\t\t\"I don't think we are going to make any headway without a key,\" says Lady Jane.\n\t\t\t\t\n\t\t\t\t*label zombiecorridor\n\t\t\t\t*set zombiearmoury true\n\t\t\t\tA groan comes from the other end of the corridor and a figure comes into view.\n\t\t\t\t\n\t\t\t\t\"Oh my God!\" cries Lady Jane. \"That's the Japanese henchman from Lord Percival's gang!\"\n\t\t\t\t\n\t\t\t\tA white sheet hangs loosely over his outstretched arms and as he walks towards you it slips off, revealing an incision from each shoulder all the way down his chest. The cuts have been loosely stitched together.\n\t\t\t\t\n\t\t\t\t\"That is the kind of cut you would use for an autopsy dissection!\" gasps Lady Jane.\n\t\t\t\t\n\t\t\t\tHe is much closer now, his eyes are cold and hungry. \n\t\t\t\tYou must fight the:\n\t\t\t\t\n\t\t\t\t[b]Henchman Zombie[/b]\n\t\t\t\t\n\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\n\t\t\t\t*label henchmanzombie_fight\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto roll_dice_loop\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"Let's see you get up from this\"\n\t\t\t\t\t\t*goto roll_dice_loopk\n\t\t\t\t\t\t\n*label roll_dice_loop\n*temp henchmanzombiediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand henchmanzombiediceresult 1 dicesides\n*line_break\nThe Henchman Zombie rolled ${henchmanzombiediceresult}\n*set diceresult +skill\n*set henchmanzombiediceresult +henchmanzombieskill\n*line_break\nYour total: ${diceresult} Henchman Zombie total: ${henchmanzombiediceresult}\n*if (diceresult > henchmanzombiediceresult)\n\t*line_break\n\tThe zombie staggers under your attack\n\t*set henchmanzombiehp -2\n*if (diceresult \u003c henchmanzombiediceresult)\n\t*line_break\n\tThe zombie claws at you\n\t*set stamina -2\n*if (diceresult = henchmanzombiediceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Henchman Zombie has ${henchmanzombiehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (henchmanzombiehp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n\n*label roll_dice_loopk\n*temp henchmanzombiediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand henchmanzombiediceresult 1 dicesides\n*line_break\nThe Henchman Zombie rolled ${henchmanzombiediceresult}\n*set diceresult +skill\n*set henchmanzombiediceresult +henchmanzombieskill\n*line_break\nYour total: ${diceresult} Henchman Zombie total: ${henchmanzombiediceresult}\n*if (diceresult > henchmanzombiediceresult)\n\t*line_break\n\tThe zombie staggers backwards as if kicked by a mule\n\t*set henchmanzombiehp -3\n*if (diceresult \u003c henchmanzombiediceresult)\n\t*line_break\n\tThe zombie claws at you\n\t*set stamina -2\n*if (diceresult = henchmanzombiediceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Henchman Zombie has ${henchmanzombiehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (henchmanzombiehp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set henchmanzombiehp - bullet_damage\nThe Henchman Zombie has ${henchmanzombiehp} stamina remaining\n*if (henchmanzombiehp \u003c 1)\n\t*goto win\n*else\n\t*goto henchmanzombie_fight\n\n*label win\n\nThe reanimated corpse falls to the floor.  \n*if (stamina = max_stamina)\n\t*goto respect\n*elseif (provisions = false)\n\t*goto respect\n*else\n\t*goto choice11\n*label choice11\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto respect\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto respect\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto respect\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto respect\n*label respect\nLady Jane respectfully covers the body with the white sheet and says some quiet words in a language that is unfamiliar to you.\n*choice\n\t#Go to the white room\n\t\t*goto whiteroom\n\t#Return to the main chamber\n\t\t*goto_scene centralbuilding mainevent\n\t\t\n*label winshot\nYour shot hits the henchman in the forehead and he falls to the floor.\n*goto respect\n\n*label click\nYou line up your shot and pull the trigger. The gun clicks uselessly.\n\n*if (male = true)\n\t\"Don't worry Jack, you will get the hang of it one day I'm sure,\" says Lady Jane.\n*if (female = true)\n\t\"Don't worry Jill, you will get the hang of it one day I'm sure,\" says Lady Jane.\n*goto henchmanzombie_fight\n\t\t\t\t\n\t\t\t\t\n*label roll_dice_loop1\n*temp henchmanzombie1diceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand henchmanzombie1diceresult 1 dicesides\n*line_break\nThe Henchman Zombie rolled ${henchmanzombie1diceresult}\n*set diceresult +skill\n*set henchmanzombie1diceresult +henchmanzombie1skill\n*line_break\nYour total: ${diceresult} Henchman Zombie total: ${henchmanzombie1diceresult}\n*if (diceresult > henchmanzombie1diceresult)\n\t*line_break\n\tThe zombie staggers under your attack\n\t*set henchmanzombie1hp -2\n*if (diceresult \u003c henchmanzombie1diceresult)\n\t*line_break\n\tThe zombie claws at you\n\t*set stamina -2\n*if (diceresult = henchmanzombie1diceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Henchman Zombie has ${henchmanzombie1hp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (henchmanzombie1hp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\t\n\n*label roll_dice_loopk1\n*temp henchmanzombie1diceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand henchmanzombie1diceresult 1 dicesides\n*line_break\nThe Henchman Zombie rolled ${henchmanzombie1diceresult}\n*set diceresult +skill\n*set henchmanzombie1diceresult +henchmanzombie1skill\n*line_break\nYour total: ${diceresult} Henchman Zombie total: ${henchmanzombie1diceresult}\n*if (diceresult > henchmanzombie1diceresult)\n\t*line_break\n\tThe zombie staggers backwards as if kicked by a mule\n\t*set henchmanzombie1hp -3\n*if (diceresult \u003c henchmanzombie1diceresult)\n\t*line_break\n\tThe zombie claws at you\n\t*set stamina -2\n*if (diceresult = henchmanzombie1diceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Henchman Zombie has ${henchmanzombie1hp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (henchmanzombie1hp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\t\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set henchmanzombie1hp - bullet_damage\nThe Zombie Henchman has ${henchmanzombie1hp} stamina remaining\n*if (henchmanzombie1hp \u003c 1)\n\t*goto win1\n*else\n\t*goto henchmanzombie_fight1\n\n\t\n*label win1\n\nThe reanimated corpse falls backwards under your heavy blows, striking the wall before sliding down the into an upright sitting position. \n\n*label ontheshelf\nOn the shelf above, a jar teeters precariously. With a groan the corpse stirs again. At the same time, the jar falls from above and smashes onto the body below, covering the gruesome zombie in a clear liquid. Smoke starts pouring from the cadaver as the acid eats into it, melting it like a waxwork and revealing a grinning skull that is then also consumed. \n\n\"Well that was…\" begins Lady Jane.\n\n\"Disgusting?\" suggests Sir Malcolm and the three of you agree. \n*if (stamina = max_stamina)\n\t*goto anotherjarofacid\n*elseif (provisions = false)\n\t*goto anotherjarofacid\n*else\n\t*goto choice12\n*label choice12\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto anotherjarofacid\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto anotherjarofacid\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto anotherjarofacid\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto anotherjarofacid\n\n*label anotherjarofacid\nOn the shelf above the steaming remains is another jar of acid.\n*choice\n\t#Take the jar of acid\n\t\t*set acidjar true\n\t\t\"Anything that can do that has to be useful,\" says Lady Jane and you take the jar. Carefully. \n\t\t*goto jarsjarsetc\n\t#Leave the jar of acid\n\t\t\"I don't want to risk that stuff leaking onto my equipment. Or me!\"\n\t\t*goto jarsjarsetc\n\t\t\n*label jarsjarsetc\n\nMany shelves are on the wall of the white room, holding various types of odd-looking equipment and apparatus as well as glass jars. There is a gurney in the middle of the floor, a small pool of clear liquid on the surface.\n\nThe zombie puddle expands slowly across the pristine floor.\n*choice\n\t*selectable_if (examinejars = false) #Examine the other jars\n\t\t*set examinejars true\n\t\tThe glass jars are filled with various organs. They are fascinating and repulsive in equal measure. One of the jars contains a heart floating in a liquid that has a purplish tinge to it. To your amazement it is still beating! A very large jar next to it is also filled with the clear purple liquid, this jar has no specimen in it.\n\t\t*choice\n\t\t\t#Take the purple jar\n\t\t\t\t*set headjar true\n\t\t\t\tA liquid that can sustain the life of an individual organ is extraordinary and you carefully add it to your backpack.\n\t\t\t\t*goto jarsjarsetc\n\t\t\t#Leave the purple jar\n\t\t\t\t*goto jarsjarsetc\n\t*selectable_if (examineequipment = false) #Examine the equipment\n\t\t*set examineequipment true\n\t\tThe equipment is obviously surgical in nature and you recognise some of the objects as being scalpels and forceps. There are other objects that you can only guess as to the purpose for. They make you feel uneasy and anxious. \n\t\t*goto jarsjarsetc\n\t*if (zombiearmoury = true) #Return to the main chamber\n\t\t*goto_scene centralbuilding mainevent\n\t*if (zombiearmoury = false) #Return to the main chamber\n\t\t*goto_scene centralbuilding mainevent\n\t*if (zombiearmoury = false) #Go to the metal door\n\t\t*goto metaldoor1\n\t\n*label winshot1\nYour shot hits the henchman between the eyes.\n\nThe reanimated corpse falls backwards, striking the wall before sliding down the into an upright sitting position. \n*goto ontheshelf\n\n*label click1\nYou line up your shot and pull the trigger. The gun clicks uselessly.\n\n\"It's a shame they don't come with instructions,\" says Sir Malcolm.\n*goto henchmanzombie_fight1\n\n*label metaldoor1\nThe door is incredibly solid and reminds you of a safe.\n*choice\n\t*if (armourykey = true) #Use the key\n\t\tThe key turns in the lock with a satisfying click. The handle moves easily and you pull the heavy door open. A rush of stale air escapes and as you step inside the room some lights flicker on. \n\t\t\t\t\n\t\tThe room is entirely utilitarian and overwhelmingly grey. Metal shelves hold various objects, none of which you can identify or that appear to serve any purpose whatsoever.\n\t\t\t\t\n\t\tThree items catch your eye. One is clearly in the shape of a gun with an identifiable trigger and a space of some kind near the hilt, presumably for ammunition. The other is a helmet-like object, it is very delicate with spidery wire filaments. The top of the helmet also has a space to hold something. The final object is a glass canister with the now familiar recess. All along the canister are collars that can be rotated. \n\t\t*choice\n\t\t\t#Take the gun and leave\n\t\t\t\t*set aliengun true\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"We've seen all there is to see here Jack, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"We've seen all there is to see here Jill, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*choice\n\t\t\t\t\t#Return to the main chamber\n\t\t\t\t\t\t*goto_scene centralbuilding mainevent\n\t\t\t#Take the helmet and leave\n\t\t\t\t*set alienhelmet true\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"We've seen all there is to see here Jack, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"We've seen all there is to see here Jill, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*choice\n\t\t\t\t\t#Return to the main chamber\n\t\t\t\t\t\t*goto_scene centralbuilding mainevent\n\t\t\t#Take the cannister and leave\n\t\t\t\t*set aliencannister true\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"We've seen all there is to see here Jack, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"We've seen all there is to see here Jill, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*choice\n\t\t\t\t\t#Return to the main chamber\n\t\t\t\t\t\t*goto_scene centralbuilding mainevent\n\t\t\t#Take all three and leave\n\t\t\t\t*set aliengun true\n\t\t\t\t*set alienhelmet true\n\t\t\t\t*set aliencannister true\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"We've seen all there is to see here Jack, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"We've seen all there is to see here Jill, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*choice\n\t\t\t\t\t#Return to the main chamber\n\t\t\t\t\t\t*goto_scene centralbuilding mainevent\n\t\t\t#Leave\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"We've seen all there is to see here Jack, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"We've seen all there is to see here Jill, let's get this show on the road,\" says Sir Malcolm.\n\t\t\t\t*choice\n\t\t\t\t\t#Return to the main chamber\n\t\t\t\t\t\t*goto_scene centralbuilding mainevent\n\t*if (armourykey = false) #Try the door\n\t\t\"I don't think we are going to make any headway without a key,\" says Lady Jane.\n\t\t\n\t\t*if (male = true)\n\t\t\t\"We've seen all there is to see here Jack, let's get this show on the road,\" says Sir Malcolm.\n\t\t*if (female = true)\n\t\t\t\"We've seen all there is to see here Jill, let's get this show on the road,\" says Sir Malcolm.\n\t\t*choice\n\t\t\t#Return to the main chamber\n\t\t\t\t*goto_scene centralbuilding mainevent\n\n\t\t", "rightpath": "*temp bullet_roll 0\n*temp bullet_damage 0\n*temp key false\n*temp lucktest 0\nThe jungle canopy extends all the way over the river, blocking the light. You travel along the gloomy tunnel with the sound of the ship’s engine and the water slapping at the sides of the boat coming back at you. After a while the HMS Rustbucket emerges again into weak sunlight. The river water is dirty and slow moving. The trees on the rivers edge are twisted and dry. Up ahead the river splits into two. \n*choice\n\t#Left\n\t\tThe HMS Rustbucket pushes through the runny black slime below. The disturbed sludge releases a foul smell. As you turn a small bend in the river you see some crude poles stuck into the bank of the river. Weathered skulls in various states of decay stare back at you blankly, impaled on the spears. \n\t\t\n\t\t*if (male = true)\n\t\t\t\"Well, I have to say Jack - you do take us to the nicest of places!\" says Lady Jane.\n\t\t*if (female = true)\n\t\t\t\"Well, I have to say Jill - you do take us to the nicest of places!\" says Lady Jane.\n\t\t\n\t\tYou laugh but it sounds out of place and tense. You pass the skulls in silence, glad to get them out of your sight. \n\t\t \n\t\tUp ahead on the opposite bank is the wreck of a boat. It is partially sunk into the mud and has clearly been there for some time. It’s wooden hull is rotting and the metal cabin is now brown and green with rust and lichen.\n\t\t \n\t\t\"Oh my!\" says Lady Jane. \"I think we may have just witnessed the impossible. It seems there is a boat on this river in worse shape than this one!\"\n\t\t \n\t\tSir Malcolm laughs and pats the guardrail of the Rustbucket. \n\t\t \n\t\t\"She didn’t mean it old girl!”\n\t\t*choice\n\t\t\t#Investigate\n\t\t\t\tYou bring the HMS Rustbucket up to the wreck and pull it alongside with a boat hook. You drop anchor and make sure that all is secured before you clamber on board. The last thing you want is to be stranded on this wreck! The deck groans and creaks and the ruin shifts a little then settles again. At the bow of the boat is a small cabin for the wheel and a larger structure at the stern which must be general quarters. The door to the wheelhouse hangs open and creaks slightly in the breeze.\n\t\t\t\t*choice \n\t\t\t\t\t#Investigate wheelhouse\n\t\t\t\t\t\tThe wooden ships wheel stands in front of a smashed cockpit window. One of the spokes has been broken off. A few sheets of paper are stuck to the floor, they look like maps but they are so damaged by the elements they are useless. A small metal box lies on the floor.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Investigate general quarters\n\t\t\t\t\t\t\t\t*goto general\n\t\t\t\t\t\t\t#Open box\n\t\t\t\t\t\t\t\tThe box is filled with personal effects. There are rings, several watches, various letters and photographs. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tMost of the photographs are family portraits, obviously taken in England as keepsakes. Scanning through the various letters you see they have been received en-route and you note the postmarks of France, Spain, Morocco, Guinea and more. After sifting through a sheaf of letters that all seem to begin with “My Darling” you find a note that stands out from the others. Unusually this is a letter addressed to England that was never sent. It reads as follows:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t“My Darling Agatha, \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAfter reaching Cabinda port I have traveled down the Mjaa Nto in search of the fabled Amphibian Man. Even as I am surrounded by jungle that is both dark in body and spirit I still scoff at those superstitious fools back home who believe him to be some kind of monster or apparition. I have as much time for those idiots as I do the skeptics who do not believe in his existence at all! Quite clearly he represents the missing link I have long hypothesised between fish and man.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tAs I embarked down the river a storm hit of such epic proportions I quite wished that I too were blessed with fish-like characteristics! Fortunately I know that in such circumstances one should always sail into the storm itself. Without this knowledge I doubt that I would have survived. God knows where I would have ended up!\n\t\t\t\t\t\t\t\tI have found a series of unique footprints that lead to a cave and it is here that I believe I will come face to face with Amphibian Man! \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tCuriously my native guide believes him to be the guardian of \"important words that can unlock great power\". \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tI have no idea what he is blathering on about most of the time but I thought you would be amused none the less.\n\t\t\t\t\t\t\t\tDo not worry about me, we will be reunited soon. Every night I look up to the moon and it comforts me to know that it is the same orb that you too gaze upon. Forever the moth to your flame…\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tJonathan”\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Take box\n\t\t\t\t\t\t\t\t\t\tThere is nothing else to see so you investigate the general quarters\n\t\t\t\t\t\t\t\t\t\t*goto general\n\t\t\t\t\t\t\t\t\t#Leave box\n\t\t\t\t\t\t\t\t\t\tYou put it back respectfully. There is nothing else to see so you investigate the general quarters.\n\t\t\t\t\t\t\t\t\t\t*goto general\n\t\t\t\t\t#Investigate general quarters\n\t\t\t\t\t\t*label general\n\t\t\t\t\t\tThere is a large hole in the cabin wall and the elements have scoured the interior. Moss, rust and overpowering damp have taken over. There are a couple of rusted bed frames but no bedding or other signs of the previous occupants. A chain with a collar has been securely attached to one wall, it is now so rusted that it at first looked like a coil of rope. On the far wall someone has scrawled “Hungry”.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\tThe deck is rotted and cracked, it creaks and groans at every step. Despite this a large dark stain is still visible. Something is glinting from down between rotting beams of the deck.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Leave\n\t\t\t\t\t\t\t\t*goto skeletal\n\t\t\t\t\t\t\t#Investigate further\n\t\t\t\t\t\t\t\tYou reach down to the object and the rotting deck starts to snap. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\t\tYou grab the object and leap back out of the cabin as quickly as you can. It is a lucky penny. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto skeletal\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\t\tThe deck beam snaps and you fall headfirst into the hull.\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\t[i]lose 2 stamina[/i]\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\t*set stamina -2\n\t\t\t\t\t\t\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto whatever\n\t\t\t\t\t\t\t\t\t\n\t\t\t#Ignore it\n\t\t\t\t*label skeletal\n\t\t\t\tYou continue on through black water, slowly passing skeletal trees. After a while the engine of the Rustbucket starts to struggle, the river water seems to be getting thicker and more sludge-like. Soon the Rustbucket can go no further, it is stuck fast in the gloop. A spit of land leads into the dark jungle. \n\t\t\t\t\n\t\t\t\t\"I can't wait to see where this leads us,\" says Sir Malcolm cheerily. The irony is not lost on you.\n\t\t\t\t\n\t\t\t\tThe path leads to a group of mud huts that are arranged in a semi circle, they all face to the centre where there are the remains of a large fire. The grey ash smoulders gently. The huts have been painted grey also and combined with the scorched and cracked earth the overall impression is one of extreme drabness.\n\t\t\t\t\n\t\t\t\tAsh covered figures emerge from the huts. They are armed with crude but effective looking weapons. They run towards you, weapons raised. \n\t\t\t\tYou must fight the: \n\t\t\t\t\n\t\t\t\t[b]Grey Warriors[/b]\n\t\t\t\t\n\t\t\t\t[b]Skill 8, Stamina 8[/b]\n\t\t\t\t\n\t\t\t\t*label greywarrior_fight\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto roll_dice_loop\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"Time for your medicine\"\n\t\t\t\t\t\t*goto roll_dice_loopk\n\t\t \n\t#Right\n\t\tThe HMS Rustbucket chugs through the foul black slime. The river bends and turns tightly. Dead and twisted trees line the bank, their limbs contorted. The river straightens and you can see some way ahead. A skeleton hangs from a tree branch, suspended over the middle of the river. As you pass underneath its feet scrape along the cabin roof. \n\t\t\n\t\t\"Seems like the damn thing is doing a tap dance,\" says Sir Malcolm. \n\t\t\n\t\tEveryone smiles grimly.\n\t\t\n\t\tUp ahead, a muddy suitcase lies on the river bank.\n\t\t*choice\n\t\t\t#Grab the suitcase\n\t\t\t\tYou pull the suitcase onto the deck with a boathook and open it.\n\t\t\t\t\n\t\t\t\tA snake coiled inside strikes at you!\n\t\t\t\t*choice\n\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\tThe snake misses you and slithers off into the river.\n\t\t\t\t\t\t\t\t*label suitcase\n\t\t\t\t\t\t\t\tThe suitcase just contains folded clothes, all ruined by the river.\n\t\t\t\t\t\t\t\t*goto skeletal\n\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\tThe snake sinks its fangs into your forearm and then slithers off the boat into the river.\n\t\t\t\t\t\t\t\t[i]lose 2 stamina[/i]\n\t\t\t\t\t\t\t\t*set stamina -2\n\t\t\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t\t\t*goto suitcase\n\t\t\t\t\n\t\t\t#Ignore it\n\t\t\t\t*goto skeletal\n\t\n\t\n\t\n*label roll_dice_loop\n*temp greywarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand greywarriordiceresult 1 dicesides\n*line_break\nThe grey warriors rolled ${greywarriordiceresult}\n*set diceresult +skill\n*set greywarriordiceresult +greywarriorskill\n*line_break\nYour total: ${diceresult} Grey Warrior total: ${greywarriordiceresult}\n*if (diceresult > greywarriordiceresult)\n\t*line_break\n\tYour attack knocks the grey warriors back\n\t*set greywarriorhp -2\n*if (diceresult \u003c greywarriordiceresult)\n\t*line_break\n\tThe grey warriors fight brutally\n\t*set stamina -2\n*if (diceresult = greywarriordiceresult)\n\t*line_break\n\tYou regroup\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Grey Warriors have ${thughp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (greywarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set greywarriorhp - bullet_damage\nThe Grey Warriors have ${greywarriorhp} stamina remaining\n*if (greywarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto greywarrior_fight\n\n\t\n*label click\nYou hear a click as you pull the trigger.\n\n\"I don't think that is going to scare them Jack,\" says Lady Jane\n*goto roll_dice_loop\n\n*label click1\nYou hear a click as you pull the trigger.\n\nSir Malcolm is on you.\n*goto roll_dice_loop1\n\n*label roll_dice_loopk\n*temp greywarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand greywarriordiceresult 1 dicesides\n*line_break\nThe grey warriors rolled ${greywarriordiceresult}\n*set diceresult +skill\n*set greywarriordiceresult +greywarriorskill\n*line_break\nYour total: ${diceresult} Grey Warrior total: ${greywarriordiceresult}\n*if (diceresult > greywarriordiceresult)\n\t*line_break\n\tYou send them reeling\n\t*set greywarriorhp -3\n*if (diceresult \u003c greywarriordiceresult)\n\t*line_break\n\tThe grey warriors fight brutally.\n\t*set stamina -2\n*if (diceresult = greywarriordiceresult)\n\t*line_break\n\tYou regroup\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Grey Warriors have ${greywarriorhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (greywarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\n*label winshot\nYour shot hits the leading grey warrior, sending him spinning. As he spins his club hits the warrior behind him, knocked out he falls forward to the ground. The warrior behind him trips on his body and falls forward, landing on his upturned dagger.\n\n*if (male = true)\n\t\"You certainly get a lot of mileage per bullet Jack,\" says Sir Malcolm.\n*if (female = true)\n\t\"You certainly get a lot of mileage per bullet Jill,\" says Sir Malcolm.\n*line_break\n*goto greywin\n\n*label winshot1\nThe bullet hits Sir Malcolm right between the eyes.\n*label win1\n\nYou stand over the body of your friend and fellow adventurer. Gently, you close his eyes. Your attention is drawn to the idol on his chest. It calls to you. It fills your mind and you cannot fight it. You don’t want to fight it. You take it eagerly and put it around your neck. Then you turn to Lady Jane…\n*goto_scene youdied\n\n\t\n*label win\n\nThe last of the grey attackers falls. \n*if (stamina = max_stamina)\n\t*goto greywin\n*elseif (provisions = false)\n\t*goto greywin\n*else\n\t*goto choice8\n*label choice8\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto greywin\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto greywin\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto greywin\n\t*if (provisions = false) #Victorious\n\t\t*goto greywin\n*label greywin\nChecking on your comrades, you notice Sir Malcolm is bent over the body of his attacker. Curiously, he appears to take something from the clenched hand of his fallen foe. A narrow path leads away from the huts and deeper into the jungle. \n*choice\n\t#Investigate Huts\n\t\tThe huts are grey and utilitarian. There are no decorations, no personal effects and no beds.\n\t\t\n\t\tIn one of the huts there is a round stone hanging from the wall. One side is flat with an eye on it. The eye is made from some kind of semi precious stone and it is quite realistic, reminding you of a prosthetic albeit in a garish yellow colour. The other side of the stone has five carved stone fingers. \n\t\t*choice \n\t\t\t#Take Stone\n\t\t\t\t*set key true\n\t\t\t\tThe stone has a pleasant weight. The eye stares unblinkingly at you throughout. \n\t\t\t\t\n\t\t\t\tThere is nothing else to see in the barren huts so you follow the path.\n\t\t\t\t*goto path\n\t\t\t#Follow Path\n\t\t\t\t*label path\n\t\t\t\tThe small path twists and turns its way uphill. The oppressive jungle gives way to arid scrub and buzzing insects. The path leads to a stone temple at the top of the hill. The pyramid shaped structure is flat at the top with a low rectangular construction topping it off. The base of the temple is about three hundred foot by two hundred foot. Wide steps lead to the summit, at least two hundred feet up. You become aware that Sir Malcolm is muttering to himself quietly. \n\t\t\t\t*choice\n\t\t\t\t\t#Climb Steps\n\t\t\t\t\t\t*label ascend\n\t\t\t\t\t\tYou ascend the stone steps. The sun is blinding and the heat intense, it starts to feel as if you are walking into the sun itself. As you near the top Lady Jane grabs your elbow and speaks quietly into your ear.\t\t\t\t\t\t\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\"Jack, I think there is something really wrong with Sir Malcolm.\"\n\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\"Jill, I think there is something really wrong with Sir Malcolm.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou glance back to Sir Malcolm. He is talking to himself, more loudly than before. His eyes are darting and wild. His face twitches. \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou call back to him, \"Malcolm, let’s get to the top and have a well earned rest. What do you say?\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tHe doesn’t seem to hear. You and Lady Jane exchange a worried look.\n\t\t\t\t\t\t\n\t\t\t\t\t\tAt the top of the pyrmaid is a stone slab on a plinth. There is a small bowl like recess at one end. The plinth is carved all around with various symbols. Lady Jane starts to examine them and you turn to check on Sir Malcolm. At first he is nowhere to be seen but then suddenly he appears at the summit. He is red faced and furious looking. His eyes bulge and swivel and he is frothing from the mouth. On seeing you he cries out and attacks! Around his neck hangs a small, gray stone idol. \n\t\t\t\t\t\tYou must fight:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Sir Malcolm[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 12, Stamina 12[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto roll_dice_loop1\n\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0) \n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t*goto click1\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto win1\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\"Don't fail me now\"\n\t\t\t\t\t\t\t\t*goto roll_dice_loopk1\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#Examine Base\n\t\t\t\t\t\tThe base of the pyramid is decorated all around with a relief sculpture carved into the ancient stone. Some of the finer detail has been sadly lost to the elements but it is still easy to follow the illustrations. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe scenes show figures in feather head-dresses studying the stars and the capture of other tribes. The captives are sacrificed atop the pyramid, seemingly in accordance with a celestial calendar of some kind. Small dots of light are depicted escaping from the unfortunate victims and gravitating towards another, much larger figure who gathers them in a jar of some kind. The images continue all around the base of the pyramid. There is a small recess that forms the shape of a door here. At shoulder height there is a space carved in the shape of a hand with an eye in the palm.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (key = true) #Use the hand-eye stone\n\t\t\t\t\t\t\t\tThe stone key fits perfectly. There is the sound of something large and mechanical behind the door and then it swings inward. Rushing air makes a sighing sound. A stone slide leads to the darkness below. There is a commotion from behind you and Lady Jane goes tumbling past, sliding away screaming into the darkness! \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou turn to see Sir Malcolm apoplectic with rage and realise with horror and anger that he has pushed her without warning into whatever lies below! A small grey stone figurine is hanging around his neck. He lunges at you! \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\t\tYou duck at the right moment and Sir Malcolm falls over you and careers flailing and shouting down the side. At your feet is the stone talisman that was around his neck. It fills your mind and you cannot fight it. You don’t want to fight it. You take it eagerly and put it around your neck. Then there is darkness.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\t\tSir Malcolm pushes you with all of his strength and you fall onto the slide. He also loses his footing and you both career down into the blackness. The slide ends and you are pitched falling into space, enveloped in total darkness. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\tYou land heavily on what feels like a pile of sticks that crack under your weight. You lose consciousness. After an unknown amount of time you awake. You think your eyes are open but it is so dark it is impossible to tell. A sliver of light appears in front of you. It grows bigger like a sunrise. Your joy turns to horror as the enormous eye opens fully and fixes on you. Something takes your ankle and you wish for the darkness again. \n\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Climb Steps\n\t\t\t\t\t\t\t\t*goto ascend\n\t\t\t\t\t\t\n\t\n\t#Follow Path\n\t\t*goto path\n\n*label roll_dice_loop1\n*temp malcolmdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand malcolmdiceresult 1 dicesides\n*line_break\nThe Sir Malcolm rolled ${malcolmdiceresult}\n*set diceresult +skill\n*set malcolmdiceresult +malcolmskill\n*line_break\nYour total: ${diceresult} Sir Malcolm total: ${malcolmdiceresult}\n*if (diceresult > malcolmdiceresult)\n\t*line_break\n\tSir Malcolm hardly registers your attack\n\t*set malcolmhp -2\n*if (diceresult \u003c malcolmdiceresult)\n\t*line_break\n\tSir Malcolm hits you with the strength of ten men\n\t*set stamina -2\n*if (diceresult = malcolmdiceresult)\n\t*line_break\n\tYou break apart\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nSir Malcolm has ${malcolmhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (malcolmhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop1\n\t\n\t\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou have one shot before he reaches you\n*line_break\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set malcolmhp - bullet_damage\nSir Malcolm has ${malcolmhp} stamina remaining\n*if (malcolmhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\n\t\n*label roll_dice_loopk1\n*temp malcolmdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand malcolmdiceresult 1 dicesides\n*line_break\nThe Sir Malcolm rolled ${malcolmdiceresult}\n*set diceresult +skill\n*set malcolmdiceresult +malcolmskill\n*line_break\nYour total: ${diceresult} Sir Malcolm total: ${malcolmdiceresult}\n*if (diceresult > malcolmdiceresult)\n\t*line_break\n\tSir Malcolm hardly registers your attack\n\t*set malcolmhp -3\n*if (diceresult \u003c malcolmdiceresult)\n\t*line_break\n\tSir Malcolm hits you with the strength of ten men\n\t*set stamina -2\n*if (diceresult = malcolmdiceresult)\n\t*line_break\n\tYou break apart\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nSir Malcolm has ${malcolmhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (malcolmhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\t\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\n*label whatever\nWhatever was glinting is lost in the darkness. The wreck shifts again violently, it is starting to sink! You scramble back onto the HMS Rustbucket.\n*goto skeletal", "screenshots": "*comment screenshot0\n*set stamina 17\n*set luck 8\n*set skill 8\n\nLondon Times, March 17th 1897\n\t\t\nEgyptian Death Mask stolen!\n\t\t\nPolice are still baffled as to the overnight disappearance of the fabulous death mask of Amun-Ra from the British Museum last night. \n\nReaders of the London Times will know that this is just one in a number of high profile thefts in recent years. The fabled Tongan Crown of Pearls, the Jade Dragon of Cowloon and the Stauette of Tears are all still missing under similar circumstances.\n*fake_choice\n\t#Read More\n\t#Enter the Adventurers Club\n\n\n*comment screenshot1\n*set stamina 17\n*set luck 8\n*set skill 8\nThe bell rings and the fight begins. Stevens lumbers towards Sir Malcolm and throws a great looping right hand. Sir Malcolm deftly ducks under the slow swinging sledgehammer and plants two straight left jabs onto the giant’s chin, rocking him back. A right cross finishes him and he collapses onto the floor of the ring just as if he had fallen from the top of a beanstalk. The crowd erupts, non-winning tickets thrown into the air create a brief ticker tape parade and Sir Malcolm strides confidently back to his corner. The mc is speaking again:\n\n\"Ladies and gentlemen, we have another contender!\" \n*fake_choice\n\t#Place a bet on Lady Jane\n\t#Place a bet on Sir Malcolm\n\t#Just watch\n\t\n*comment screenshot2\n*set stamina 12\n*set luck 10\n*set skill 10\n*set empty_inventory false\n*set map true\n*set gun true\n*set bullets true\n*set bullets_number 6\n*set dynamite true\n*set rope true\nYou dream of a hideous and stiffly animated toy monkey banging on a drum. The noise of the drumming grows louder and louder until you awake to the sound of heavy knocking on your cabin door. Dressing rapidly you answer the door to Sir Malcolm and Lady Jane.\n\n\"Jill it seems like there’s some kind of trouble,\" says Sir Malcolm. \"The engines have stopped.\"\n\n\"And there is a lifeboat missing,\" adds Lady Jane. \n\n\"Oh yes, there's a storm coming too!\" says Sir Malcolm.\n*fake_choice\n\t#Escape in a lifeboat\n\t#Race to the bridge\n\t#Run to the engine room\n\t\n*comment screenshot3\n*set empty_inventory false\n*set stamina 10\n*set luck 5\n*set skill 8\n*set gold 5\n*set machete true\n*set poisons true\n*set translation true\n*set backpack true\n\nAs you begin to descend the gangplank to the jetty you are overwhelmed by the sights and smells of Cabinda port. Delicious aromas of exotic spices and foods fill the air. The sounds of street sellers and entertainers mix in a cacophony of music, singing and shouting. As soon as you have set foot on the jetty you are surrounded. Happy children are holding out their hands in the hope of receiving some gift or money. Peddlers of all descriptions are waving around all manner of bizarre goods. Some are shouting \"Cheers!\" and \"Good Day!\" in an attempt to get your attention. \n\nOne young boy in brightly coloured tribal clothing suddenly jumps up at you. He has stolen your neckerchief! He runs off down the jetty!\n*fake_choice\n\t#Chase after him\n\t#Let him go\n\t\n\t\n*comment screenshot5\n*set empty_inventory false\n*set stamina 12\n*set luck 6\n*set skill 10\n*set gold 8\n*set spidergem true\n*set bone true\n*set knuckle true\n*set gun true\n*set bullets true\n*set bullets_number 4\n\nSomething bumps under the boat, making it jerk forward a little. The sound of a heavy object falling onto the deck makes you turn. A thick green tentacle is feeling it’s way across the boats surface! Soon it is followed by another and then another. The boat lists dangerously over to one side. \n\nYou must fight the:\n\t\t\n[b]Tentacles[/b]\n\t\t\n[b]Skill 6, Stamina 6[/b]\n*fake_choice\n\t#Fight\n\t#Use your knuckle duster\n\t#Use the gun\n\t#Instant-Win\n\n\n\n\n\t\n\n", "shop": "*label shop\nThe hatch to the shop is rolled up and a well groomed older gentlemen in a white shopkeepers apron, blue bow tie and fez stands attentively in front of shelves stacked with various items.\n\nA list is pinned to the countertop:\n*label top\n*line_break\nDynamite - 15 Gold Coins\n*line_break\nGun and 6 bullets - 10 Gold Coins, in ordinary combat a successful attack yields 1 d 6 of damage, a 6 is an instant kill.\n*line_break\nClip of 6 bullets - 5 Gold Coins per clip\n*line_break\nKnuckle Duster - 5 Gold Coins, adds +1 damage to every successful attack\n*line_break\nProvisions - 5 Gold Coins per pack, adds +5 to stamina\n*line_break\nBook on treating poisons - 5 Gold Coins\n*line_break\nTranslation book - 5 Gold Coins\n*line_break\nLarge framed painting of Queen Victoria - 100 Gold Coins\n*line_break\n*choice \n\t*if (dynamite = false)\n\t\t*selectable_if (gold >= 15) #Dynamite please\n\t\t\t“An excellent choice. No adventure is complete without blowing something up” says the shopkeeper, his manicured hands folded neatly over his stomach.\n\t\t\t*set empty_inventory false\n\t\t\t*set dynamite true\n\t\t\t*set gold -15\n\t\t\t*goto top\n\t*if (gun = false) \n\t\t*selectable_if (gold >= 10) #I'd like to buy the Gun\n\t\t\t“A Mark 1 Enfield revolver. This packs a punch even Sir Malcolm would be jealous of” says the shopkeeper, his placid eyes twinkling a little.\n\t\t\t*set empty_inventory false\n\t\t\t*set gun true\n\t\t\t*set gold -10\n\t\t\t*goto top\n\t*selectable_if (gold >= 5) #I'd like to buy clip of bullets\n\t\t“Yes, if you are going to shoot things it’s worth going for it” says the shopkeeper.\n\t\t*set empty_inventory false\n\t\t*set bullets true\n\t\t*set gold -5\n\t\t*goto top\n\t*if (knuckle = false)\n\t\t*selectable_if (gold >= 5) #Knuckle duster please\n\t\t\t“You could knock out an elephant with this” says the shopkeeper. “I know... I’ve done it” he says conspiratorially as he slides it across the counter to you.\n\t\t\t*set empty_inventory false\n\t\t\t*set knuckle true\n\t\t\t*set gold -5\n\t\t\t*goto top\n\t*selectable_if (gold >= 5) #Those provisions look tasty\n\t\t“These will fix you up. The mint cake is especially good” says the shopkeeper.\n\t\t*set empty_inventory false\n\t\t*set provisions true\n\t\t*set gold -5\n\t\t*goto top\n\t*if (poisons = false)\n\t\t*selectable_if (gold >= 5) #That book on poisoning looks useful\n\t\t\t“How oft when men are at the point of death have they been merry, which their keepers call a lightning before death! Oh, how may I call this a lightning? O my love, my wife! Death, that hath sucked the honey of thy breath, hath had no power yet upon thy beauty. Thou art not conquered. Beauty’s ensign yetIs crimson in thy lips and in thy cheeks, and death’s pale flag is not advanced there. Tybalt, liest thou there in thy bloody sheet? O, what more favor can I do to thee, than with that hand that cut thy youth in twain to sunder his that was thine enemy?.”\n\t\t\t“Ahem. Anyway, a useful book.”\n\t\t\t*set empty_inventory false\n\t\t\t*set poisons true\n\t\t\t*set gold -5\n\t\t\t*goto top\n\t*if (translation = false)\n\t\t*selectable_if (gold >= 5) #That translation book looks useful\n\t\t\t“I think someone once said that to learn another language is to offer the hand of friendship” says the shopkeeper.\n\t\t\t*set empty_inventory false\n\t\t\t*set translation true\n\t\t\t*set gold -5\n\t\t\t*goto top\n\t\t#It is my patriotic duty to buy the painting\n\t\t\tThe shopkeeper salutes the picture and starts to reach up to it carefully whilst humming the national anthem. He pretends to lift the painting from the wall and mimes wrapping the invisible picture.He mimics handing you the picture. “That will be 100 invisible coins for the invisible painting please”\n\t\t\t*goto top\n\t*selectable_if (gold = 0) #I am out of money\n\t\t*goto_scene club2\n\t\n", "spider": "*temp bullet_roll 0\n*temp bullet_damage 0\n*temp counter 7\n\nAs the Rustbucket gets closer to the edge you can see that a net has been stretched over the mouth of the waterfall. The boat is caught in it at the last moment and figures emerging from the edge of the river start to shout at you. Some of them throw grappling hooks to the boat and gradually the Rustbucket is pulled to the rivers edge. \n\nYou gratefully step onto firm ground and are met by a ragtag group of men and women dressed in a collection of odd and mismatched clothes and all armed with a variety of weapons.\n\n\"Looks like an explosion in a costume factory,\" says Sir Malcolm under his breath.\n\nA woman steps forward from the group and starts to speak to you. Some of the group begin taking items from the Rustbucket and others pull at your backpacks. \n*choice\n\t*if (translation = true) #Use the translation book\n\t\tThe woman waves her arms about animatedly as she speaks and Lady Jane furiously flicks through the translation book. Before long Lady Jane is conversing with the group’s leader. By the time Lady Jane is ready to explain the situation all of your provisions have been taken by the rag tag bunch and the Rustbucket is being stripped to the hull.\n\t\t\n\t\t\"So, hold onto your hats, this is what’s going on,\" says Lady Jane. \"As you may have gathered, this group scavenge from the river. They come from all over, washed up here just like us. Recently one of the group found some kind of artifact in a nearby cave and since then people have been disappearing. They know what is causing it too.\"\n\t\t \n\t\tLady Jane pauses. \"And?\" exclaim you and Sir Malcolm at the same time.\n\t\t\n\t\t\"It’s a spider. A giant one. It’s…taking them,\" replies Lady Jane. \"They want us to go and kill it, in return we get our equipment back. Otherwise we can go on our way, but our kit stays with them.\"\n\t\t*choice \n\t\t\t#Accept\n\t\t\t\t*goto accept\n\t\t\t#Refuse\n\t\t\t\t*goto refuse\n\t#Fight them all!\n\t\tYou are vastly outnumbered and easily overwhelmed. \n\t\t*goto_scene youdied\n\t#Try to communicate\n\t\tThe woman waves her arms about animatedly as she speaks but it eventually becomes obvious that you don’t understand a word she is saying. Meanwhile the rest of the group have started stripping the Rustbucket and taking your food and equipment. \n\t\t\n\t\tWith obvious exasperation the woman starts to explain again, this time through a series of pictures she draws in the soft mud at the rivers edge.\n\t\t\n\t\tShe draws a group of figures by the net at the waterfall then a path that leads to a cave. Inside the cave she draws a spider. Lastly, she draws your three backpacks. Then she uses her fingers to show walking to the cave where she draws a line through the spider in the mud followed by a return to the waterfall. Finally she imitates you receiving back your possessions. \n\t\t\n\t\t\"Seems straight foward enough,\" says Sir Malcolm. \"Go to the cave, kill the spider, get our stuff back.\" \n\t\t*choice\n\t\t\t#Refuse\n\t\t\t\t*goto refuse\n\t\t\t#Accept\n\t\t\t\t*label accept\n\t\t\t\tYou agree to the deal and she smiles widely. Turning to the group she speaks and they react with happiness. With a new found sense of comradeship you are reunited with your equipment and provided with some torches. You are pointed to a path that will lead you to the cave and you set off.\n\t\t\t\t\n\t\t\t\tYou haven’t traveled down the path very far before you notice the weird quietness, very unlike the normally raucous jungle. Some of the foliage on the side of the path is draped with whispery cobwebs and these become thicker and more prevalent until everything around you is grey. The entrance to the cave is unmistakable, a black hole at the epicenter of the depressing webs. You light your torches and enter. The tunnels are circular and you have to crouch slightly to proceed. The walls are smooth, it seems as if they have been bored into the ground. The tunnel splits into three.\n\t\t\t\t*choice\n\t\t\t\t\t#North\n\t\t\t\t\t\tThe passage is just big enough for you to walk down without crouching but the wispy cobwebs cling to your clothes and stick to your hair. Every so often you stop to pull the webbing off of you in disgust. You notice that there is a mural of some kind on the passage wall ahead, just visible under the ever present covering of choking web. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Investigate\n\t\t\t\t\t\t\t\tThe webbing sticks everywhere so it takes some while to remove it. The mural is etched into the stone with incredibly fine detail, it looks more like a technical blueprint than a piece of art. It depicts a nightmare world of arachnids and their human food source. Sickened you turn away.\n\t\t\t\t\t\t\t\t*goto drytunnel\n\t\t\t\t\t\t\t#Ignore\n\t\t\t\t\t\t\t\t*label drytunnel\n\t\t\t\t\t\t\t\tYou continue down the dry tunnel until you reach a cobweb that blocks progress. As you are thinking about how to proceed Lady Jane steps forward and touches her torch to the gossamer mesh. The flames consume it greedily and within a moment the way forward is clear.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou step into a large underground cavern. Webbing covers every wall like soft white drapes. Shapes hang from the ceiling, gently swaying stalactites. In the middle of the cavern sits an immense black spider. It’s eight red eyes twinkle like rubies. You shift your foot slightly and the spider adjusts itself fractionally. Then it moves towards you confidently.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"It's more scared of us than we are of it!\" says Sir Malcolm.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou are amused but not convinced.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[b]Giant Spider[/b]\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[b]Skill 8, Stamina 10[/b]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*label giantspider_fight\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loop1\n\t\t\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t\t\t*goto click1\n\t\t\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t\t\t*goto win1\n\t\t\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\t\t\"Time to send you back up the drainpipe!\"\n\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loopk1\n\t\t\t\t\t#Northwest\n\t\t\t\t\t\tThe passage gets narrower and you crouch more and more. Just as you start to think about turning back the passage widens again and opens out into small chamber. The air is dry and dusty and you feel as if the atmosphere is sucking all the moisture out of you. Something is moving in the shadows. A dark shape scuttles towards you. The spiders body is the size of a dinner plate and it’s long legs click on the ground repellently.\n\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Somewhat Giant Spider[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 7, Stamina 6[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label spider_fight\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto roll_dice_loop\n\t\t\t\t\t\t\t*if (gun = true) # Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t*goto click\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto win\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\"This is a step up from a rolled newspaper!\"\n\t\t\t\t\t\t\t\t*goto roll_dice_loopk\n\t\t\t\t\t#Northeast\n\t\t\t\t\t\tYou follow the passage for a while, the constant stooping makes your back ache. The walls of the tunnel are covered in white webs that billow out and caress you as you walk past. \n\t\t\t\t\t\t\n\t\t\t\t\t\t\"These things remind me of shrouds,\" says Sir Malcolm, unhelpfully. \n\t\t\t\t\t\t\n\t\t\t\t\t\tThe tunnel widens out a little and there is an alcove on the right. In the alcove is a figure, they are covered in webbing like a mummy. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Investigate\n\t\t\t\t\t\t\t\tYou pull the webbing from the figure and it comes away reluctantly in sticky clumps revealing a grey, sallow face underneath. There are two puncture wounds in his neck. As you examine the wound his eyelids flutter but he does not awake. Lady Jane places her fingers gently on his neck and then places her ear to his mouth \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\"He’s alive, but barely. I don’t think there is anything we can do for him.\"\n\t\t\t\t\t\t\t\t*goto drytunnel\n\t\t\t\t\t\t\t#Ignore\n\t\t\t\t\t\t\t\t*goto drytunnel\t\t\t\t\t\t\t\t\t\t\n\t\t\t\n\n\t\t\t\t\n*label roll_dice_loop\n*temp spiderdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand spiderdiceresult 1 dicesides\n*line_break\nThe spider rolled ${spiderdiceresult}\n*set diceresult +skill\n*set spiderdiceresult +spiderskill\n*line_break\nYour total: ${diceresult} Spider total: ${spiderdiceresult}\n*if (diceresult > spiderdiceresult)\n\t*line_break\n\tYou hack at the spider, chitin cracks.\n\t*set spiderhp -2\n*if (diceresult \u003c spiderdiceresult)\n\t*line_break\n\tThe spider bites.\n\t*set stamina -2\n*if (diceresult = spiderdiceresult)\n\t*line_break\n\tThe spider scuttles around\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe spider has ${spiderhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (spiderhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set spiderhp - bullet_damage\nThe spider has ${spiderhp} stamina remaining\n*if (spiderhp \u003c 1)\n\t*goto win\n*else\n\t*goto spider_fight\n\n\t\n*label roll_dice_loopk\n*temp spiderdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand spiderdiceresult 1 dicesides\n*line_break\nThe spider rolled ${spiderdiceresult}\n*set diceresult +skill\n*set spiderdiceresult +spiderskill\n*line_break\nYour total: ${diceresult} Spider total: ${spiderdiceresult}\n*if (diceresult > spiderdiceresult)\n\t*line_break\n\tYou punch the spider into the air\n\t*set spiderhp -3\n*if (diceresult \u003c spiderdiceresult)\n\t*line_break\n\tThe spider bites\n\t*set stamina -2\n*if (diceresult = spiderdiceresult)\n\t*line_break\n\tThe spider scuttles around\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe spider has ${spiderhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (spiderhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set giantspiderhp - bullet_damage\nThe Giant Spider has ${giantspiderhp} stamina remaining\n*if (giantspiderhp \u003c 1)\n\t*goto win1\n*else\n\t*goto giantspider_fight\n\n\t\n\t\n\n*label roll_dice_loop1\n*temp giantspiderdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand giantspiderdiceresult 1 dicesides\n*line_break\nThe spider rolled ${giantspiderdiceresult}\n*set diceresult +skill\n*set giantspiderdiceresult +giantspiderskill\n*line_break\nYour total: ${diceresult} Giant Spider total: ${giantspiderdiceresult}\n*if (diceresult > giantspiderdiceresult)\n\t*line_break\n\tYou hack at the spider's legs, chitin cracks and goo oozes\n\t*set giantspiderhp -2\n*if (diceresult \u003c giantspiderdiceresult)\n\t*line_break\n\tThe spider swipes and you fall\n\t*set stamina -2\n*if (diceresult = giantspiderdiceresult)\n\t*line_break\n\tThe spider jitters about\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Giant Spider has ${giantspiderhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (giantspiderhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\t\n*label roll_dice_loopk1\n*temp giantspiderdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand giantspiderdiceresult 1 dicesides\n*line_break\nThe Giant Spider rolled ${giantspiderdiceresult}\n*set diceresult +skill\n*set giantspiderdiceresult +giantspiderskill\n*line_break\nYour total: ${diceresult} Giant Spider total: ${giantspiderdiceresult}\n*if (diceresult > giantspiderdiceresult)\n\t*line_break\n\tYou punch the spider, chitin cracks and goo oozes\n\t*set giantspiderhp -3\n*if (diceresult \u003c giantspiderdiceresult)\n\t*line_break\n\tThe spider swipes and you fall\n\t*set stamina -2\n*if (diceresult = giantspiderdiceresult)\n\t*line_break\n\tThe spider jitters about\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Giant Spider has ${giantspiderhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (giantspiderhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\t\n*label roll_dice_loop2\n*temp mechanicalspiderdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand mechanicalspiderdiceresult 1 dicesides\n*line_break\nThe mechanical spider rolled ${mechanicalspiderdiceresult}\n*set diceresult +skill\n*set mechanicalspiderdiceresult +mechanicalspiderskill\n*line_break\nYour total: ${diceresult} mechanical spider total: ${mechanicalspiderdiceresult}\n*if (diceresult > mechanicalspiderdiceresult)\n\t*line_break\n\tYour machetes clang on the exterior of the spider\n\t*set mechanicalspiderhp -2\n*if (diceresult \u003c mechanicalspiderdiceresult)\n\t*line_break\n\tThe mechanical spider attacks with great speed\n\t*set stamina -2\n*if (diceresult = mechanicalspiderdiceresult)\n\t*line_break\n\tThe spider lurches about\n\t*goto roll_dice_loop2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe mechanical spider has ${mechanicalspiderhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (mechanicalspiderhp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loop2\n\t\n*label set_bullet_damage2\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot2\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set mechanicalspiderhp - bullet_damage\nThe mechanical spider has ${mechanicalspiderhp} stamina remaining\n*if (mechanicalspiderhp \u003c 1)\n\t*goto win2\n*else\n\t*goto mechanicalspider_fight\n\n*label roll_dice_loopk2\n*temp mechanicalspiderdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand mechanicalspiderdiceresult 1 dicesides\n*line_break\nThe mechanical spider rolled ${mechanicalspiderdiceresult}\n*set diceresult +skill\n*set mechanicalspiderdiceresult +mechanicalspiderskill\n*line_break\nYour total: ${diceresult} mechanical spider total: ${mechanicalspiderdiceresult}\n*if (diceresult > mechanicalspiderdiceresult)\n\t*line_break\n\tYou dent the mechanical spider \n\t*set mechanicalspiderhp -3\n*if (diceresult \u003c mechanicalspiderdiceresult)\n\t*line_break\n\tThe mechanical spider attacks with great speed\n\t*set stamina -2\n*if (diceresult = mechanicalspiderdiceresult)\n\t*line_break\n\tThe spider lurches about\n\t*goto roll_dice_loopk2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe mechanical spider has ${mechanicalspiderhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (mechanicalspiderhp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loopk2\n\n*label click\nWith the spider in your sights you pull the trigger. Click.\n\n\"Oh great!\" says Lady Jane. \"Now we are going to have to get up close to that atrocious arachnid!\"\n*goto roll_dice_loop\n\n*label click1\nWith the spider in your sights you pull the trigger. Click.\n\n*if (male = true)\n\t\"That's a shame Jack,\" says Sir Malcolm. \"He would have been too big to miss!\"\n*if (female = true)\n\t\"That's a shame Jill,\" says Sir Malcolm. \"He would have been too big to miss!\"\n*goto roll_dice_loop1\n\n*label win\n\nThe spider rolls onto its back and its legs fold in on itself. You push it to one side with your boot and everyone steps past it gingerly.\n*if (stamina = max_stamina)\n\t*goto drytunnel\n*elseif (provisions = false)\n\t*goto drytunnel\n*else\n\t*goto choice8\n*label choice8\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto drytunnel\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto drytunnel\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto drytunnel\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto drytunnel\n\n\n*label win2\n\nTiny springs burst from the spider as it falls into two halves. It is beautifully intricate and you wonder at the excitement it would cause if you took it to a London watchmaker.\n\nThe gem rolls to your feet and you pick it up. It is disconcertingly warm.\n*choice\n\t#Throw it away in disgust\n\t\tIt lands somewhere in the undergrowth and you dust your hands.\n\t\t*goto layaround\n\t#Keep it\n\t\t*set spidergem true\n\t\tIt fits neatly into your inside pocket.\n\t\t*goto layaround\n\t\t\n*label layaround\nThe villagers lay around, pale and unmoving. They are beyond your help and you press on.\n*if (stamina = max_stamina)\n\t*goto lushgreen\n*elseif (provisions = false)\n\t*goto lushgreen\n*else\n\t*goto choice19\n*label choice19\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto lushgreen\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto lushgreen\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto lushgreen\n\t*if (provisions = false) #Leave the cave\n\t\t*goto lushgreen\n\n\n\n*label winshot\nThe spider rears up at the last moment and your shot enters its abdomen.\n*goto win\n\n*label winshot1\nYour bullet hits one of the spiders red eyes and it screams.\n*goto win1\n\n*label winshot2\nYour bullet hits the gem in the back of the spider. It emits a loud buzzing sound as it races around on the ground in ever decreasing circles.\n*goto win2\n\n*label click2 \nWith the spider in your sights you pull the trigger. Click.\n\n*if (male = true)\n\t\"Can you help us with this mechanical spider in a minute please Jack?\" says Lady Jane.\n*if (female = true)\n\t\"Can you help us with this mechanical spider in a minute please Jill?\" says Lady Jane.\n*goto roll_dice_loop2\n\n\n*label win1\n\nThe spider disengages and scuttles to the far end of the cave. You hear a high pitched whine that becomes ear splitting. Then you hear a voice in your head, it sounds like cold wind blowing through a broken window pane. \n\n*if (male = true)\n\t\"Hear me Jack,\" whispers the voice. \"I can give you something of great power to aid you in your quest. Spare me and it is yours.\"\n*if (female = true)\n\t\"Hear me Jill,\" whispers the voice. \"I can give you something of great power to aid you in your quest. Spare me and it is yours.\"\n*choice\n\t#Spare it\n\t\tYou nod in agreement and from the far end of the cave the spider throws an object towards you. It lands by your feet, protected from impact by the ever present webbing. It is an ornate golden spider, slightly bigger than your hand. It is articulated and mechanical with a red gem in its back that can be pushed like a button.\n\t\t*choice\n\t\t\t#Press the gem\n\t\t\t\tYou push the gem in and it clicks into place. The spider’s legs twitch reflexively. Like lightning it clasps onto your arm and a sharp sting is followed by a numbing sensation that runs down your arm and into your chest. Your surroundings start to spin, the cobwebs look like clouds and you float away.\n\t\t\t\t*goto_scene youdied\n\t\t\t#Leave\n\t\t\t\t*if (stamina = max_stamina)\n\t\t\t\t\t*goto ragtagcamp\n\t\t\t\t*elseif (provisions = false)\n\t\t\t\t\t*goto ragtagcamp\n\t\t\t\t*else\n\t\t\t\t\t*goto choice88\n\t\t\t\t*label choice88\n\t\t\t\t*choice\n\t\t\t\t\t*if (provisions = true) #Eat Provisions\n\t\t\t\t\t\t*if (provisions_number > 0)\n\t\t\t\t\t\t\t*gosub_scene eatprovisions\n\t\t\t\t\t\t\t*goto ragtagcamp\n\t\t\t\t\t\t*if (provisions_number = 0)\n\t\t\t\t\t\t\t*gosub_scene noprovisions\n\t\t\t\t\t\t\t*goto ragtagcamp\n\t\t\t\t\t*if (provisions = true) #Don't eat provisions\n\t\t\t\t\t\t*goto ragtagcamp\n\t\t\t\t\t*if (provisions = false) #Leave the cave\n\t\t\t\t\t\t*goto ragtagcamp\n\t\t\t\t\n\t\t\t\t*label ragtagcamp\n\t\t\t\tAs you get near to the ragtag camp a shout goes up from their spotter. When you enter the entire camp has gathered, with their leader at the front. There is evident confusion as the camp tries to judge whether you have killed their nemesis or not. The leader comes forward to you and starts to speak.\n\t\t\t\t\n\t\t\t\tAt this the golden spider leaps from your backpack and onto the ground. Panic and cries of alarm come from the tribe and they start to run in all directions. The leader is transfixed with horror when she sees the spider and before she can tear her eyes off of it the spider has sprung upwards and latched itself onto her throat, just long enough to bite her before jumping off again and seeking it’s next victim.\n\t\t\t\t\n\t\t\t\tThe spider continues to jump from victim to victim as chaos ensues, more and more villgers are falling to the ground around you.\n\t\t\t\t*choice\n\t\t\t\t\t#Fight the mechanical spider\n\t\t\t\t\t\tThe spider blurs between victims and soon the villagers have fallen. You wonder if they are dead or in some kind of deep sleep, waiting for later collection. The spider leaps towards you.\n\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Mechanical Spider[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t[b]Skill 8, Stamina 10[/b]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*label mechanicalspider_fight\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t*goto roll_dice_loop2\n\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t*goto set_bullet_damage2\n\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t*goto click2\n\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t*goto win2\n\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\"Time for the super charged rolled up newspaper\"\n\t\t\t\t\t\t\t\t*goto roll_dice_loopk2\n\t\t\t\t\t#Run\n\t\t\t\t\t\tYou run and don't look back. A final scream follows you before it is suddenly choked off.\n\t\t\t\t\t\t*goto lushgreen\n\t\t\t\t\n\t\t\t\t\n\t#Finish it\n\t\tYou push the spider’s voice out of your head and press the attack. It has no more fight left and soon it lies dead at your feet. \n\t\t\n\t\t*if (male = true)\n\t\t\t\"There’s just one problem here Jack,\" says Sir Malcolm. \"We are going to have to provide some proof we killed it aren’t we?\" \n\t\t*if (female = true)\n\t\t\t\"There’s just one problem here Jill,\" says Sir Malcolm. \"We are going to have to provide some proof we killed it aren’t we?\" \n\t\t\n\t\tWith a reluctant sigh you ready your machete.\n\t\t\n\t\t\"Ok stand back, this might get messy.\"\n\t\t\n\t\tWith the gruesome task complete you begin your return to the ragtag camp with the spider's head being dragged behind on an improvised stretcher.\n\t\t\n\t\t\"That thing was truly repellent,\" says Lady Jane. \"Imagine being able to read the thoughts of its victims as they struggled in its web.\"\n\t\t\n\t\tYou all shudder in unison.\n\t\t\n\t\tAs you get near to the camp a shout goes up from their spotter. When you enter the entire camp has gathered, with their leader at the front. On seeing that their nemesis has been killed there is jubilation. You are quickly reunited with your equipment as well as being hugged and patted on the back so much the experience is nearly as tiring as your fight with the spider. Soon a feast is being prepared and you are invited to partake. \n\t\t\n\t\t[i]The feast adds 5 stamina points[/i]\n\t\t*set stamina + 5\n\t\t*gosub limit_stats\n\t\t*line_break\n\t\t\n\t\tYou arise long after the sun has come up and with a fuzzy head you prepare to leave.\n\t\t\n\t\t*if (translation = true)\n\t\t\tThe group's leader speaks to you. Lady Jane steps up to help with translation. She seems a bit worse for wear. Whilst holding a couple of fingers to her temple she says:\n\t\t\t\n\t\t\t\"There is a path to lead us back. However, it does get flooded with the tides so we need to be quick in crossing it.\"\n\t\t\t\n\t\t\tAs you prepare to leave the leader puts her hand on Lady Jane's shoulder and speaks again:\n\t\t\t\n\t\t\t\"The key to what you seek is broken into three.\"\n\t\t\t\n\t\t\tPuzzled, you leave the village and turn and wave one last goodbye before they are out of sight.\n\t\t\t*goto lushgreen\n\t\t*if (translation = false)\n\t\t\tThe group's leader speaks to you. Lady Jane steps up to help with translation. She seems a bit worse for wear. \n\t\t\t\n\t\t\tYou gather round for another frustrating translation exercise, made infinitely worse by your pounding heads. Through simple pictures drawn in the mud with a stick and accompanying gestures you learn that there is a path that leads to a river. \n\t\t\t\n\t\t\tAs you prepare to leave the leader puts her hand on Lady Jane's shoulder and speaks again. This time the drawing is of a square in which there are three squiggly lines from left to right separated horizontally. Next she draws the same square but this time it is broken and each line is on its own.\n\t\t\t\n\t\t\tNonplussed you leave the village and turn and wave one last goodbye before they are out of sight. \n\t\t\t*goto lushgreen\n\t\t\t\n\t\t\n\t\t\n*label roll_dice_loop3\n*temp crabdiceresult\n*set counter -1\n*rand diceresult 1 dicesides\nYou rolled ${diceresult}\n*rand crabdiceresult 1 dicesides\n*line_break\nThe crab rolled ${crabdiceresult}\n*set diceresult +skill\n*set crabdiceresult +crabskill\n*line_break\nYour total: ${diceresult} Crab total: ${crabdiceresult}\n*if (diceresult > crabdiceresult)\n\t*line_break\n\tYou hack at the crab with your machetes.\n\t*set crabhp -2\n*if (diceresult \u003c crabdiceresult)\n\t*line_break\n\tThe crab pinches you with its claws\n\t*set stamina -2\n*if (diceresult = crabdiceresult)\n\t*line_break\n\tThe crab scampers sideways\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe crab has ${crabhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*elseif (crabhp \u003c 1)\n\t*goto win3\n*elseif (counter \u003c 1)\n\t*goto counterdeath\n*else\n\t*if (male = true)\n\t\t\"The water is rising Jack! We can only fight another ${counter} @{(counter = 1) round|rounds}\"\n\t*if (female = true)\n\t\t\"The water is rising Jill! We can only fight another ${counter} @{(counter = 1) round|rounds}\"\n\t\n\t*goto roll_dice_loop3\n\t\n\t\t\n\n*label set_bullet_damage3\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot3\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set crabhp - bullet_damage\nThe crab has ${crabhp} stamina remaining\n*if (crabhp \u003c 1)\n\t*goto win3\n*else\n\t*goto crab_fight\n\n\t\n*label roll_dice_loopk3\n*temp crabdiceresult\n*set counter -1\n*rand diceresult 1 dicesides\nYou rolled ${diceresult}\n*rand crabdiceresult 1 dicesides\n*line_break\nThe crab rolled ${crabdiceresult}\n*set diceresult +skill\n*set crabdiceresult +crabskill\n*line_break\nYour total: ${diceresult} Crab total: ${crabdiceresult}\n*if (diceresult > crabdiceresult)\n\t*line_break\n\tYour attack causes the crab maximum damage\n\t*line_break\n\t*set crabhp -3\n*if (diceresult \u003c crabdiceresult)\n\t*line_break\n\tThe crab pinches you with its claws\n\t*line_break\n\t*set stamina -2\n*if (diceresult = crabdiceresult)\n\t*line_break\n\tThe crab scampers sideways\n\t*line_break\nYou have ${stamina} stamina left\n*line_break\nThe crab has ${crabhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*elseif (crabhp \u003c 1)\n\t*goto win3\n*elseif (counter \u003c 1)\n\t*goto counterdeath\n*else\n\t*if (male = true)\n\t\t\"The water is rising Jack! We can only fight another ${counter} @{(counter = 1) round|rounds}\"\n\t*if (female = true)\n\t\t\"The water is rising Jill! We can only fight another ${counter} @{(counter = 1) round|rounds}\"\n\t\n\t*goto roll_dice_loopk3\n\n\t\t \n*label counterdeath\n\nThe water rises higher and higher as you fight the giant crab and several times you find your feet are being lifted off the river bed by the strong current. It is well above your knees when a large wave washes over you and you are swept away by the current. You bob helplessly as the unstoppable force propels you onwards. \n\nPulled under the water you fight to the surface gasping, only to hear a deafening roar. The waterfall sends you hurtling into the void and this time there is no net to save you.\n*goto_scene youdied\n\n*label winshot3\nYour bullet is deflected by the crabs claw and it hits a rock that is half submerged in the river. The bullet ricochets off the rock and into the underbelly of the giant enemy crab causing massive damage. \n*goto win3\n\n\n*label win3\n\nOn seeing the crab fall you rush to the other side of the river. As soon as you are across a wall of fast moving water pushes past and the river becomes uncrossable.\n*if (stamina = max_stamina)\n\t*goto thegroundhere\n*elseif (provisions = false)\n\t*goto thegroundhere\n*else\n\t*goto choice100\n*label choice100\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto thegroundhere\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto thegroundhere\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto thegroundhere\n\t*if (provisions = false) #Leave the cave\n\t\t*goto thegroundhere\n\n*label thegroundhere\nThe ground here is soft and spongy and as you progress you find yourselves entering a marsh. The air is fetid and clammy.\n*page_break The Marsh\n*goto_scene marsh\n\n*label click3\nYou line up to shoot the crab in it's twitching mandibles. You pull the trigger and hear a click. The giant crab clicks back at you and raises its claws.\n\n*if (male = true)\n\t\"I don't think we are going to win it over by chatting to it Jack,\" says Lady Jane.\n*if (female = true)\n\t\"I don't think we are going to win it over by chatting to it Jill,\" says Lady Jane.\n*goto roll_dice_loop3\n\n*label limit_stats\n*if stamina > max_stamina\n\t*set stamina max_stamina\n*return\n\n*label lushgreen1\nInsects buzz and a brightly coloured dragonfly hovers for a moment before zipping off. Past the grass, giant ferns mark the edge of the dark and mysterious jungle. The path starts to widen out and the ground becomes softer. You
