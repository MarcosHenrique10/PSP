 reach a wide, shallow ford that runs across your path. Gently flowing water runs over sleek flat stones. The other side is about one thousand yards away. Sir Malcolm starts to take his boots off.\n\t\t\t\t\n\"No need to get my boots wet,\" he says and with the laces tied together he hangs them round his neck. \n\t\t\t\t\nThis seems like a good idea so you and Lady Jane follow suit and start crossing. The cool, bubbling water caresses your tired feet wonderfully. When you are halfway across the riverbed starts to shift in front of you. Arising under a a shower of mud and rocks a giant crab towers above you, its claws snapping in anticipation! It advances. The water rises.\nYou must fight the:\n\t\t\t\t\n[b]Giant Crab[/b]\n\t\t\t\t\n[b]Skill 6, Stamina 8[/b]\n\t\t\t\t\n*label crab_fight\n*choice\n\t#Fight\n\t\t*goto roll_dice_loop3\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0)\n\t\t\t*goto set_bullet_damage3\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click3\n\t*if (instant_win = true) #Insta Win\n\t\t*goto win3\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\"Time for the lobster claws\"\n\t\t*goto roll_dice_loopk3\n\n*label choice1\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto lushgreen1\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto lushgreen1\n\t*if (provisions = true) #Don't Eat Provisions\n\t\t*goto lushgreen1\n\t*if (provisions = false) #Follow the track\n\t\t*goto lushgreen1\t\t\n\t\t\t\n*label refuse\nYou refuse the deal and she frowns deeply. Turning to the group she speaks and they react sadly. Your equipment and inventory is returned, except any provisions you may have.\n*set provisions false\n*set provisions_number 0\n\t\t\t\t\nShe points to a path leading away from their settlement.\n\t\t\t\t\n*label lushgreen\nYou follow a track through lush green grass that sways gently in the breeze.\n*if (stamina = max_stamina)\n\t*goto escription\n\n\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tEmbark on a Victorian adventure that begins in the heart of London and takes you across the world in a race to obtain a fabled jewel with mysterious powers. Navigate the deadly river Mjaa Nto and twisted jungle paths where danger lurks beneath the surface and around every corner.\n\n\tJourney into Darkness is a challenging 50,000 word interactive fantasy novel by Jonathan Clark, where your choices control the story. It’s entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n\tThere are eight full-size color lino-cut illustrations and six smaller handmade stamp illustrations within this text adventure.\n\n\tWill you beat your rivals to the prize? Can you fight off the dangers along the way? Will you find the right path and the knowledge you need to succeed or will you succumb to the darkness?\n\n\t• Play as male or female.[n/]\n\t• Travel to exotic locations.[n/]\n\t• Solve the puzzle of the one true path.[n/]\n\t• Fight monsters and other horrors.[n/]\n\t• Endure the sarcasm of your traveling companions.[n/]\n\t• Awaken an ancient cosmic horror.[n/]\n\n\n\t*if choice_prerelease and not(choice_is_ios_app)\n\t\t[i]You can play the first few chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first few chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first few chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2020-05-28 $4.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "temple": "*temp taunt false\n*temp lucktest 0\n*temp east1 false\n*temp east3 false\n*temp west2 false\n*temp west3 false\n*temp north2 false\n*temp south1 false\n*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 false\n\t\t\t*set chapter4 false\n\t\t\t*set chapter5 false\n\t\t\t*set chapter6 false\n\t\t\t*set chapter7 false\n\t\t\t*set chapter8 false\n\t\t\t*set chapter9 false\n\t\t\t*set chapter10 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto theinsideis\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*if (chapter4 = true)\n\t\t\t\t*goto_scene marsh thesoft\n\t\t\t*if (chapter5 = true)\n\t\t\t\t*goto_scene creature itfeelsgood\n\t\t\t*if (chapter6 = true)\n\t\t\t\t*goto_scene junglepath youfollowa\n\t\t\t*if (chapter7 = true)\n\t\t\t\t*goto_scene treepeople theladder\n\t\t\t*if (chapter8 = true)\n\t\t\t\t*goto_scene kolfboy upaheadis\n\t\t\t*if (chapter9 = true)\n\t\t\t\t*goto_scene cliff themorningsun\n\t\t\t*else\n\t\t\t\t*goto theinsideis\n\t\t#No\n\t\t\t*goto theinsideis\n*label theinsideis\nThe inside is bright from the light of burning torches on the wall. The monkeys place you down with surprising gentleness and gather round you, watching silently. In the centre of the temple on a throne made of stone sits an enormous gorilla. He is upright and his eyes shine brightly. You notice some unusual metal nodules on his head. To your great surprise, he speaks:\n*temp taunt false\n*temp lucktest 0\n*temp east1 false\n*temp east3 false\n*temp west2 false\n*temp west3 false\n*temp north2 false\n*temp south1 false\n\n\"Welcome to my kingdom. I am King Imperius.\"\n\nHis monkey subjects jump and call enthusiastically on hearing his name.\n\n\"Kneel before me!\"\n*choice\n\t#Kneel\n\t\tYou start to kneel and signal your companions to do so too.\n\t\t*goto whykill\n\t#Refuse to kneel\n\t\tOn seeing that you will not kneel a number of the monkeys force you violently to the ground. One of them bites your ear, the pain is intense. Sir Malcolm and Lady Jane cry out in pain and you assume they have been given similar treatment. As you are held down, King Imperius speaks:\n\t\t\n\t\t*label whykill\n\t\t*if (male = true)\n\t\t\t\"I have a question for you Jack. Why do you kill?\"\n\t\t*if (female = true)\n\t\t\t\"I have a question for you Jill. Why do you kill?\"\n\t\t*choice\n\t\t\t#To protect myself\n\t\t\t\tHe shakes his head slightly. He sighs and is clearly done with you.\n\t\t\t\t*goto entertain\n\t\t\t#Because I like it\n\t\t\t\tHe shakes his head slightly. He sighs and is clearly done with you.\n\t\t\t\t*goto entertain\n\t\t\t#To further a greater cause\n\t\t\t\tHe shakes his head slightly. He sighs and is clearly done with you.\n\t\t\t\t*goto entertain\n\t\t\t#When I have no choice\n\t\t\t\tHe shakes his head slightly. He sighs and is clearly done with you.\n\t\t\t\t*goto entertain\n\t\t\t#I don't answer to you\n\t\t\t\tHe shakes his head slightly. He sighs and is clearly done with you.\n\t\t\t\t*goto entertain\n\t\t\t\t\n*label entertain\nThe gorilla stands. \n\t\n\"Time for some entertainment!\"\n\t\nHe claps his hands and to his right a set of doors is pulled open by a couple of monkey courtiers. You are ushered through with Sir Malcolm and Lady Jane not far behind you. Through the door, stone steps lead up to a balcony. You can see that it extends all the way around, like the upper circle of the Royal Standard Theatre. In front of you at ground level is a tall wooden gate with a bar across it. The gorilla speaks again:\n\t\n\"A simple maze awaits, with a prize at the end. Your companions and I will watch your progress from above. Who knows, we may even cheer you on.\"\n\t\n*if (male = true)\n\tKing Imperius draws you to him and he whispers in your ear: \"I know what you did Jack. Green is a lucky colour for you I think\".\n*if (female = true)\n\tKing Imperius draws you to him and he whispers in your ear: \"I know what you did Jill. Green is a lucky colour for you I think\".\n\t\nWith that the gorilla ascends the steps and your companions reluctantly follow, jostled and pushed all the way. Lady Jane struggles free for a moment and throws you her notebook.\n\n\"You had better make a map,\" she shouts before being bundled away.\n\nMonkeys take the bar from the door and push you through into the maze.\n\t\nThe walls are roughly sawn wood and at least ten feet high. The maze has been designed so you can’t see whether the path ends in a dead end or not, you will have to examine the hard way. You start up the path Northwards until you reach a wall.\n\t\n*label crossroads1\t\nThe path goes West and East. Various symbols scrawled in chalk mark the walls.\n*choice\n\t*selectable_if (east1 = false) #East\n\t\t*set east1 true\n\t\tThe path goes East for a while and then stops at a dead end. Your arrival at the dead end is met with mocking whoops from the simian onlookers and a hail of peanuts and banana skins rain down on you. From here you can see King Imperius sitting in the centre of the gallery above. Lady Jane and Sir Malcolm are by his side.\n\t\t*choice\n\t\t\t#Go back West\n\t\t\t\t*goto crossroads1\n\t\t\t#Taunt the crowd\n\t\t\t\t*set stick true\n\t\t\t\t*set taunt true\n\t\t\t\tThe hail of peanuts slows and then stops. You fix your eyes on the crowd above and raise two fingers high in the air in defiance. The monkey gallery goes crazy again and you catch sight of Sir Malcolm smirking before you are once more pelted. A hefty stick lands nearby among the downfall. You take it.\n\t\t\t\t*choice\n\t\t\t\t\t#Go back West\n\t\t\t\t\t\t*goto crossroads1\n\t\t\t\t\t#Taunt again\n\t\t\t\t\t\tYou put your hands under your armpits and bend your legs then begin to bounce from side to side whilst shouting \"Oook! Oook!\" The crowd become furious and once again projectiles start to hurtle down. \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\tSomehow you are not hit in the rain of largely fruit based detritus. A coconut sails an inch past your head and puts a dent into the wall behind you.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Go back West\n\t\t\t\t\t\t\t\t\t\t\t\t*goto crossroads1\n\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\tThe air fills with improvised missiles. A well aimed coconut hits you directly in the forehead and you see stars. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t[i]Lose 2 stamina points[/i]\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t*set stamina -2\n\t\t\t\t\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t*goto appreciation\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*label appreciation\n\t\t\t\t\t\t\t\t\t\tThe crowd goes wild with deafening appreciation.\n\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t#Go back West\n\t\t\t\t\t\t\t\t\t\t\t\t*goto crossroads1\n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t#West\n\t\t*label crossroads2\n\t\tThe path West takes you to a junction. The path carries on to the West and also North. An arrow is embedded high up in the maze wall.\n\t\t*choice\n\t\t\t#North\n\t\t\t\t*label crossroads3\n\t\t\t\tThe path goes North for a while. At the end of the path is a cross roads. The path continues North and also goes West and East. One of the wooden maze walls is badly stained here with a dark rusty colour.\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (west3 = false) #West\n\t\t\t\t\t\t*set west3 true\n\t\t\t\t\t\tThe path West leads to a set of double doors made from the same roughly sawn wood as the rest of the maze. They are ever so slightly ajar.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Go through the doors\n\t\t\t\t\t\t\t\tYou push open the double doors and walk through. They swing shut behind you and as they close there is a loud click. You find that they do not open the other way. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe path leads North and South. To the North is a portcullis that blocks the path. You can see a winch on the other side but from here there is no way to reach it or open the barrier.  \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tA square hole on this side of the portcullis shows that the corresponding handle has been removed.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t*goto pathsouth\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t#Go back\n\t\t\t\t\t\t\t\t*goto crossroads3\n\t\t\t\t\t#East\n\t\t\t\t\t\tThe path carries on East for a little while and then abruptly ends, turning North at a ninety degree angle. Propped up in the corner is what looks like a thigh bone. The ground here has a layer fresh sawdust on it.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Take the bone\n\t\t\t\t\t\t\t\t*set bone true\n\t\t\t\t\t\t\t\tYou try not to dwell on the origins of the bone.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#North\n\t\t\t\t\t\t\t\t\t\t*goto northweeds\n\t\t\t\t\t\t\t#Go North\n\t\t\t\t\t\t\t\tYou follow the path Northwards. It ends and the path goes East and West.\n\t\t\t\t\t\t\t\t*label northweeds\n\t\t\t\t\t\t\t\tThere are some weeds growing under the maze wall here.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#West\n\t\t\t\t\t\t\t\t\t\t*label crossroads4\n\t\t\t\t\t\t\t\t\t\tYou follow the path West. After a while another path leads South. At the entrance to the South path is a large amount of fresh sawdust scattered on the ground. Three long marks have been gouged into the wall here. They could possibly have been made by a sword.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#West\n\t\t\t\t\t\t\t\t\t\t\t\tYou continue West and the path abruptly ends, turning South at a ninety degree angle. You follow the path South and it leads to a portcullis of some kind that blocks the way. \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*label handle\n\t\t\t\t\t\t\t\t\t\t\t\tThere is a handle in the maze wall. \n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Turn the handle\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs you turn the handle the portcullis rises until it it is well above head height and will go no further.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (stick = true) #Jam the handle with the stick\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou poke the stick through one of the gears and release the handle. As soon as you do so the gears move a little and jam against it. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set portcullisupstick true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe portcullis stays up as you go through.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto otherside\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (bone = true) #Jam the handle with the bone\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou poke the bone through one of the gears and release the handle. As soon as you do so the gears move a little and jam against it. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set portcullisupbone true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe portcullis stays up as you go through.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto otherside\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Go through\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe portcullis slowly descends as you go through. It closes behind you.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label otherside\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tOn this side of the portcullis is a square hole where you would expect the corresponding handle to be.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label pathsouth\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAhead you see that the path South ends at what looks like a large opening into the stone temple that has been blocked by a metal grill. The thickness of the metal suggests it has been designed for a heavyweight purpose. In front, a long pit has been dug into the ground with a log over the top like a balancing beam allowing you to cross. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSome objects hang from the grill at the end of the path, one is glinting and shining.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tTo the East are double doors. They are closed.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Examine the doors\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tNo matter how desperately you try there is no way to open the doors from this side. The only option is onward.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto pit\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Cross the pit\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label pit\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe pit reaches to the sides of the maze so there is no way to simply walk around it. A tree trunk has been stripped of its branches and worked on so it is smooth and evenly round. It lies across the hole and is at least twenty feet long. Sticky black tar fills the trench to an unknown depth.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tWith arms outstretched you carefully work your way along the balancing beam until you are safely on the other side. On the floor is a handle to fit a square hole and you pick it up.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThere are four items hanging on the grill. One is a rolled up tube of parchment that has been tied with green ribbon. Another parchment is tied with red ribbon. A machete has been loosely tied to the grill. Lastly a fabulous golden crown, inlaid with numerous precious gems. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (gibbonfree = true) #Take the green parchment\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set poemthree true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs soon as you have taken the parchment a horn sounds and the grill starts to rise. A roar blasts out of the opening and the congregation of clamorous chimps goes silent. King Imperious shouts down from above:\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"That would be your cue to run Jack.\" \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"That would be your cue to run Jill.\" \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThis is followed by another roar and the grill is now fully open. You rush back to the tree that lies across the pit.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*page_break Escape The Maze\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene mazeescape\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (gibbonfree = false) #Take the green parchment\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set greenbad true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tAs soon as you have taken the parchment a horn sounds and the grill starts to rise. A roar blasts out of the opening and the congregation of clamorous chimps goes silent. King Imperious shouts down from above:\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"That would be your cue to run Jack. \t\t\t\tThe path carries on West for a while and then stops at a dead end. The monkey gallery jeer and shriek while the air around you fills with banana skins and peanuts thrown by the mocking monkeys. \n\t\t\t\t*choice\n\t\t\t\t\t#Go Back East\n\t\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t*if (taunt = true) #Taunt again\n\t\t\t\t\t\t*goto tauntagain1\n\t\t\t\t\t*if (taunt = false) #Taunt the crowd\n\t\t\t\t\t\t*set stick true\n\t\t\t\t\t\t*set taunt true\n\t\t\t\t\t\tThe hail of peanuts slows and then stops. You fix your eyes on the crowd above and raise two fingers high in the air in defiance. The monkey gallery goes crazy again and you catch sight of Sir Malcolm smirking before you are once more pelted. A hefty stick lands nearby among the downfall. You take it.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#East\n\t\t\t\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t\t\t*if (taunt = true) #Taunt again\n\t\t\t\t\t\t\t\t*label tauntagain1\n\t\t\t\t\t\t\t\tYou put your hands under your armpits and bend your legs then begin to bounce from side to side whilst shouting “Oook! Oook!” The crowd become furious and once again projectiles start to hurtle down. \n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\t\t\t\t\tSomehow you are not hit in the rain of largely fruit based detritus. A coconut sails an inch past your head and puts a dent into the wall behind you.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#Go back East\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\t\t\t\t\tThe air fills with improvised missiles. A well aimed coconut hits you directly in the forehead and you see stars. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t[i]Lose 2 stamina points[/i]\n\t\t\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\t\t*set stamina -2\n\t\t\t\t\t\t\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto appreciation1\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\t*label appreciation1\n\t\t\t\t\t\t\t\t\t\t\t\tThe crowd goes wild with deafening appreciation.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice \n\t\t\t\t\t\t\t\t\t\t\t\t\t#Go back East\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto crossroads2\n\t\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n\t\t\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\t\n\t", "torches": "*temp bullet_roll 0\n*temp bullet_damage 0\n*temp needle_roll 0\n\n\nYou follow the path towards the torches. As you get closer to the lights you can see that torches have been arranged in a circle around a clearing in the jungle and a large fire has been set in the centre. Hiding in the shadows you take in the scene. \n\nFurthest from where you are hiding stand three figures. One is an enormously tall and muscled man, his face painted to look like a skull. White bones are painted on his arms and legs. The other figure is dressed in leopards skin and looks like a tribal elder. The third figure is one you recognise, the little boy from the port! He is wearing a bright orange dashiki top. \n\nTo your right are a group of drummers with brightly coloured djembe drums. One of the drums has a silver bracelet hanging from it, the same bracelet worn by Sir Percival’s man at the club! Looking at some skin drying nearby you wonder what else the band are using to make their instruments and shudder. A group of villagers stand on the left. The elder extends his arms and lifts them to the heavens and the band starts to play. The flames of the fire leap and caper as if dancing to the music.\n\n*image kolf.jpg\n\nCrouching in the darkness your eyes are drawn to the bright, dancing fire. The unceasing drums pound into your head, calling you to come out from the shadows.\n*choice\n\t*if (dynamite = true) #Use dynamite\n\t\t\"I've had enough of this nonsense!\" you shout.\n\t\t\n\t\t*set dynamite false\n\t\tWith a cry of \"Have some of that!\" you throw the dynamite onto the fire and flatten yourself to the ground.\n\t\t\n\t\tThere is just enough time to see the Kolf Boys eyes widen before you have pressed your nose into the dirt. \n\t\t\n\t\tAlmost instantly there is an enormous explosion. A shockwave of scalding air blasts over you and red hot coals rain down all around.\n\t\t\n\t\tAs soon as you dare you survey the damage. The elder and the muscled man lie dead alongside a number of villagers. Those that survived the blast are shaking their heads and coming to, as if waking from a long dream. A piece of paper flutters burning in the air. There is no sign of the Kolf Boy and the villagers start to wail and moan. \n\t\t\n\t\tYou leave the awful spectacle.\n\t\t*page_break The Cliff\n\t\t*goto_scene cliff\n\t\t\n\t\t\n\t*if (wax = true) #Use wax\n\t\tYou plug your ears with wax. Frustration shows on the face of the boy. Clearly this is preventing his spell from working!\n\t\t*choice\n\t\t\t*if (neckerchief = true) and (zombies = false) \n\t\t\t\t#Stay Hidden\n\t\t\t\t\t*label stayhiddenneckerchief\n\t\t\t\t\tThe band plays feverishly and the villagers dance uncontrollably. The boy begins a series of complex gestures, all the while looking in your direction.\n\t\t\t\t\n\t\t\t\t\tSoon the sky grows darker, the light from the torches can no longer penetrate it. As the band and dancers reach fever pitch you become aware of a small green light hovering above the fire. It looks at first like a firefly but it rapidly increases in size until a pool of green light hangs in the air. Abruptly the band stops playing and the dancers freeze in place. The boy beckons to one of the dancers and they walk stiffly towards the light. You are transfixed with horror as they walk into the light and disappear! All the while the boy stares on, smirking.\n\t\t\t\t\n\t\t\t\t\tThe light shrinks back to a small dot and then blinks out, the torches provide welcome brightness again. The boy smiles at you, bows slightly and walks away into the jungle. The dancers and the musicians wander off drowsily in various directions. The fire smoulders in the clearing as dawn starts to break.\n\t\t\t\t\t*page_break The Cliff\n\t\t\t\t\t*goto_scene cliff\n\t\t\t*if (neckerchief = true) and (zombies = false)\n\t\t\t\t#Confront Him\n\t\t\t\t\t*label confrontneckerchief\n\t\t\t\t\tYou stride into the clearing and the boy claps his hands once. The villagers under his control form a semi circle around the perimeter. Faces blank they stand motionless. He gestures to the skull faced giant and the elder and they step into the clearing. The boy begins a series of complex gestures and you watch transfixed as the bodies of the elder and the giant merge! The boy’s face is lit with delight as the hideous transformation takes place.\n\n\t\t\t\t\tWhen complete you are reminded of a totem pole, the elders face looking out from the centre mass as the skull face towers above. Four arms seek your embrace. The boy's eyes are closed and his lips move as he controls the freakish atrocity.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t*goto eldermonster\n\t\t\t\t\t\t*if (doll = true) #Throw the doll into the fire\n\t\t\t\t\t\t\tThere is a moment of silence and the jungle seems to hold its breath. The flames of the fire turn green and an ungodly keening takes your attention to the boy. He is writhing on the floor in agony and you fight the urge to rush to the aid of a child. He is on all fours now. Black wings burst out of his back and a slick and tar-like imp pulls itself out! It is sloughing the child’s skin like a snake! It flaps up into the sky until it is high above you. Fixing it’s red eyes on yours it screams at you in pure hate and then flies away into the night.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set doll false\n\t\t\t\t\t\t\tGreen smoke rises from the ground under the feet of the teetering abomination. As it starts to clear the bodies mercifully separate, no longer under the control of the Kolf boy.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAll around you the tribe are shaking their heads, as if waking up from a long and terrible nightmare. The elder walks towards you smiling. He is speaking and you take the wax out of your ears. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Sorry, can you say that again? I had wax in my ears.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe hugs you and all around you the tribe are embracing each other, reunited at last.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Thank you for freeing us of that demon, we are in your debt. Please, take this,\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set poemtwo true\n\t\t\t\t\t\t\tHe hands you a rolled up parchment. Unravelling it reveals a brightly coloured tribal painting. A group of figures are dancing around an altar at night, stars dot the sky. An object on the altar is shining incredibly brightly and they shield their eyes. Behind them, out of their sight something crawls from a small hole in the night sky. At the bottom of the picture is written [b]\"Of death’s dark shadow we will be rid.\"[/b]\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou start to leave.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\"Wait,\" says the elder. \"Stay the night and recover. We have food and drink and music.\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAgreeing you shake his hand and reply: \"One request though please - not too much drumming!\"\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t[i]Add 5 stamina points [/i]\n\t\t\t\t\t\t\t*set stamina +5\n\t\t\t\t\t\t\t*gosub limit_stats\n\t\t\t\t\t\t\tRefreshed you leave the camp.\n\t\t\t\t\t\t\t*page_break The Cliff\n\t\t\t\t\t\t\t*goto_scene cliff\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t*if (neckerchief = false) and (zombies = false)\n\t\t\t\t#Stay Hidden\n\t\t\t\t\t*label stayhiddennoneckerchief\n\t\t\t\t\tThe band play feverishly and the villagers dance uncontrollably. After a while the elder turns to the boy and speaks in his ear. The boy nods and waves for the band to be silent. He steps forward and holds something aloft. It is a small doll, wrapped in your neckerchief! He is speaking but you can’t hear anything. The boy holds the doll high with one hand and with the other hand he moves the doll’s legs back and forth. Despite all your efforts you find yourself rising and walking into the clearing! The boy takes a pin from behind his ear and holds it to the belly of the doll. \n\t\t\t\t\t*label gameover\n\t\t\t\t\t*choice\n\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\tAs soon as you start to raise the gun the boy sticks the pin into the doll. You drop to your feet in agony. Someone grabs your arm but as you turn there is no one there! Looking up you see the boy twisting the arm of the doll and there is a snap. \n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t*if (doll = true) #Use the doll\n\t\t\t\t\t\t\tYou raise your arm to throw the doll on the fire but the boy is too quick. A sharp stabbing pain bursts through your body and you fall to your knees, dropping your doll. He stabs the voodoo doll of you over and over.\n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t*if (pill = true) #Eat the pill\n\t\t\t\t\t\t\tYou hold up the pill triumphantly so the boy can see, throw your head back and gulp it down.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAlmost instantly your stomach cramps violently and you collapse to your knees. Your head is swimming and the sound of the boy's laughter fills your ears. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tAs you lose consciousnesses you realise that a quick death was all the witchdoctor could offer you in protection against the Kolf Boy's cruelty. \n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t#Do nothing\n\t\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\t\"What’s the matter Jack, too scared to move?\" says the boy. \n\t\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\t\"What’s the matter Jill, too scared to move?\" says the boy. \n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tHe sinks the needle into the belly of the doll and you fall to your knees in agony. He stabs the doll again and again.\n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t#Rush him\n\t\t\t\t\t\t\tAs soon as you step forward a searing pain tears through your leg and you fall.\n\n\t\t\t\t\t\t\t\"Crawl worm!\" laughs the boy.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou hear him directly in your head now. He stabs into the doll again, paralysing your other leg. He stabs the doll again and again.\n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\n\t\t\t\t#Confront Him\n\t\t\t\t\t*label confronthimnoneckerchief\n\t\t\t\t\tYou stride into the clearing and the boy steps forward. You face each other. Before you can speak the boy puts a finger to his lips and holds something aloft. It is a small doll, wrapped in your neckerchief! He whispers to it then takes a pin from behind his ear and holds it to the belly of the doll. \n\t\t\t\t\t*goto gameover\n\t\t\t\t\t\t\t\n\t\t\t*if (zombiefive = true) #Use your zombies\n\t\t\t\tYou shout \"Touye, touye, touye\" and direct the zombies to attack.\n\t\t\t\t\n\t\t\t\tYour small force walks slowly into the clearing as you hide in the shadows. The boy is gesturing towards them and speaking but to no avail. They slowly advance towards him and he becomes more animated. He turns towards the tall muscled figure and issues a command. At this the cavorting villagers and the skull costumed giant rush to meet your small force. Outnumbered, you watch helplessly as the attack fails. \n\t\t\t\t*choice\n\t\t\t\t\t*if (neckerchief = false) #Stay Hidden\n\t\t\t\t\t\t*goto stayhiddennoneckerchief\n\t\t\t\t\t*if (neckerchief = true) #Stay Hidden\n\t\t\t\t\t\t*goto stayhiddenneckerchief\n\t\t\t\t\t*if (neckerchief = false) #Confront Him\n\t\t\t\t\t\t*goto confronthimnoneckerchief\n\t\t\t\t\t*if (neckerchief = true) #Confront Him\n\t\t\t\t\t\t*goto confrontneckerchief\n\t\t\t\t\t\t\n\t\t\t*if (zombieten = true) #Use your zombies\n\t\t\t\tYou shout \"Touye, touye, touye\" and direct the zombies to attack.\n\t\t\t\t\n\t\t\t\tYour large force walks slowly into the clearing as you hide in the shadows. The boy is gesturing towards them and speaking but to no avail. They slowly advance towards him and he becomes more animated. He turns towards the tall muscled figure and issues a command. At this the cavorting villagers and the skull costumed giant rush to meet your invading force. Your army of warriors are slow and dreamlike but they feel no pain or fear. Slowly and methodically the battle turns their way.\n\t\t\t\t*if (neckerchief = true)\n\t\t\t\t\t*goto largezombiewinning\n\t\t\t\t*else\n\t\t\t\t\t*goto largezombielosing\n\t\t\t\t\n\t\t\t\t*label largezombielosing\n\t\t\t\tThe boy starts to get pressed back by your zombies and as he backs away he reaches into his dashiki and pulls out a small doll. He holds it up high and you can see it is wearing your neckerchief! In his other hand is a long needle and he stabs it into the dolls side. You instantly feel an agonising pain rip through you and you fall to your knees.\n\t\t\t\t*goto needledamage\n\t\t\t\t\t\n\t\t\t\t*label needledamage\n\t\t\t\t*rand needle_roll 1 6\n\t\t\t\tYou lose ${needle_roll} stamina from the attack\n\t\t\t\t*set stamina - needle_roll\n\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t*goto_scene youdied\n\t\t\t\t*else \n\t\t\t\t\t*goto afterneedledamage\n\t\t\t\t\t\t\n\t\t\t\t*label afterneedledamage\n\t\t\t\tHe laughs joyously and stabs the doll again.\n\t\t\t\t*goto needledamage1\n\t\t\t\t\t\n\t\t\t\t*label needledamage1\n\t\t\t\t*rand needle_roll 1 6\n\t\t\t\tYou lose ${needle_roll} stamina from the attack\n\t\t\t\t*set stamina - needle_roll\n\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t*goto_scene youdied\n\t\t\t\t*else \n\t\t\t\t\t*goto afterneedledamage1\n\t\t\t\t\t\t\n\t\t\t\t*label afterneedledamage1\n\t\t\t\tIn a mocking, sing song voice he calls out:\n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"I am going to kill you Jack, Jack, Jack. Not you or your friends will be going back, back, back.\"\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"I am going to kill you Jill, Jill, Jill. Watching you die is such a thrill, thrill, thrill.\"\n\t\t\t\t\t\n\t\t\t\tHe is so fixated on the doll that he does not notice until too late that he is surrounded by zombies.\n\t\t\t\t*goto closein\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t*label largezombiewinning\n\t\t\t\tWith chaos all around the boy sits on the ground cross legged and starts to mutter under his breath. Nearby, a body on the ground starts to twitch. His chanting increases in fervour and the body begins to sit. \n\t\t\t\t\t\n\t\t\t\t\"He's trying to fight fire with fire!\" shouts Lady Jane.\n\t\t\t\t\t\n\t\t\t\t\"He isn't going to have enough time!\" replies Sir Malcolm.\n\t\t\t\t\t\n\t\t\t\tThe boy opens his eyes and his look of triumph quickly turns to anger. He has been surrounded by your zombie army. \n\t\t\t\t\t\n\t\t\t\t*label closein\n\t\t\t\tThey close in and he is held by two warriors while a third walks slowly towards him with machete in hand. The boy writhes and struggles and then to your horror his skin starts splitting and black wings emerge from his back! A slimy, tar like imp squirms free and flaps into the sky, screaming. It flies off into the night, leaving you to behold the scene of devastation before you. \n\t\t\t\t\t\n\t\t\t\tThe elder and the muscled man lie dead alongside a number of villagers. Those that survived the attack are shaking their heads and coming to, as if waking from a long dream. On seeing the scene of devastation before them you can only wonder if they have awoken from one nightmare into another. Your zombie warriors start to gather up bodies and slowly make their way back to the necromancer’s hut.\n\t\t\t\t\t\n\t\t\t\tThere is a scroll in the hand of the elder. His hand has closed tightly around it and you slowly and grimly pull back his fingers to release it.\n\t\t\t\t\t\n\t\t\t\t*set poemtwo true\n\t\t\t\tUnravelling it reveals a brightly coloured tribal painting. A group of figures are dancing around an altar at night, stars dot the sky. Something on the altar is shining incredibly brightly and they shield their eyes. Behind them, out of their sight something crawls from a small hole in the night sky. At the bottom of the picture is written [b]“Of death’s dark shadow we will be rid”.[/b]\n\t\t\t\t\t\n\t\t\t\tYou take the wax from your ears and hurry to put this dreadful place behind you.\n\t\t\t\t*if (stamina = max_stamina)\n\t\t\t\t\t*page_break The Cliff\n\t\t\t\t\t*goto_scene cliff\n\t\t\t\t*elseif (provisions = false)\n\t\t\t\t\t*page_break The Cliff\n\t\t\t\t\t*goto_scene cliff\n\t\t\t\t*else\n\t\t\t\t\t*goto choice10\n\t\t\t\t*label choice10\n\t\t\t\t*choice\n\t\t\t\t\t*if (provisions = true) #Eat Provisions\n\t\t\t\t\t\t*if (provisions_number > 0) \n\t\t\t\t\t\t\t*gosub_scene eatprovisions\n\t\t\t\t\t\t\t*page_break The Cliff\n\t\t\t\t\t\t\t*goto_scene cliff\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub_scene noprovisions\n\t\t\t\t\t\t\t*page_break The Cliff\n\t\t\t\t\t\t\t*goto_scene cliff\n\t\t\t\t\t*if (provisions = true) #Don't eat provisions\n\t\t\t\t\t\t*page_break The Cliff\n\t\t\t\t\t\t*goto_scene cliff\n\t\t\t\t\t*if (provisions = false) #To the Cliff!\n\t\t\t\t\t\t*page_break The Cliff\n\t\t\t\t\t\t*goto_scene cliff\n\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\n\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t*if (wax = false) #\"We have nothing to block our ears\"\n\t\tThe calling becomes irresistible and despite all your efforts you rise and walk into the clearing. The little boy smiles slightly. You can hear his voice in your head, quietly but clearly despite the pounding of the drums.\n\n\t\t*if (male = true)\n\t\t\t\"Good of you to join us Jack, I was in need of some entertainment. I am going to make you fight your friends now, then you can join the band. Do well enough and you can be a player rather than… well you have gathered the rest.\"\n\t\t*if (female = true)\n\t\t\t\"Good of you to join us Jill, I was in need of some entertainment. I am going to make you fight your friends now, then you can join the band. Do well enough and you can be a player rather than… well you have gathered the rest.\"\n\t\t*goto_scene youdied\n\t\t\n\t\n\t\n\t\n\t\n\t\n*label eldermonster\nThe nightmare creature ambles towards you, it’s four arms reaching out to take you in it’s embrace. It responds to every movement made by the puppet master behind, the boy’s arms moving in unison with the abomination.\nYou must fight the:\n\n[b]Elder Monster[/b]\n\n[b]Skill 10, Stamina 10[/b]\n\n*label eldermonster_fight\n*choice\n\t#Fight\n\t\t*goto roll_dice_loop\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0)\n\t\t\t*goto set_bullet_damage\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click\n\t*if (instant_win = true) #Insta Win\n\t\t*goto win\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\"Time to cut those strings\"\n\t\t*goto roll_dice_loopk\n\n\n*label limit_stats\n*if stamina > max_stamina\n\t*set stamina max_stamina\n*return\n\n*label roll_dice_loop\n*temp eldermonsterdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand eldermonsterdiceresult 1 dicesides\n*line_break\nThe Elder Monster rolled ${eldermonsterdiceresult}\n*set diceresult +skill\n*set eldermonsterdiceresult +eldermonsterskill\n*line_break\nYour total: ${diceresult} Elder Monster total: ${eldermonsterdiceresult}\n*if (diceresult > eldermonsterdiceresult)\n\t*line_break\n\tYou set about the Elder Monster together\n\t*set eldermonsterhp -2\n*if (diceresult \u003c eldermonsterdiceresult)\n\t*line_break\n\tThe Elder Monster crushes you\n\t*set stamina -2\n*if (diceresult = eldermonsterdiceresult)\n\t*line_break\n\tYou circle each other\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Elder Monster has ${eldermonsterhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (eldermonsterhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set eldermonsterhp - bullet_damage\nThe Elder Monster has ${eldermonsterhp} stamina remaining\n*if (eldermonsterhp \u003c 1)\n\t*goto win\n*else\n\t*goto eldermonster_fight\n\n\t\n*label roll_dice_loopk\n*temp eldermonsterdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand eldermonsterdiceresult 1 dicesides\n*line_break\nThe Elder Monster rolled ${eldermonsterdiceresult}\n*set diceresult +skill\n*set eldermonsterdiceresult +eldermonsterskill\n*line_break\nYour total: ${diceresult} Elder Monster total: ${eldermonsterdiceresult}\n*if (diceresult > eldermonsterdiceresult)\n\t*line_break\n\tYour punch rocks the Elder Monster on its heels\n\t*set eldermonsterhp -3\n*if (diceresult \u003c eldermonsterdiceresult)\n\t*line_break\n\tThe Elder Monster crushes you\n\t*set stamina -2\n*if (diceresult = eldermonsterdiceresult)\n\t*line_break\n\tYou circle each other\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Elder Monster has ${eldermonsterhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (eldermonsterhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n*label click\nYou take aim, hoping to hit the monsters face in the centre. You pull the trigger and the gun clicks.\n\n*if (male = true)\n\t\"There is nothing like being prepared Jack,\" says Sir Malcolm.\n*if (female= true)\n\t\"There is nothing like being prepared Jill,\" says Sir Malcolm.\n\n\"And that was nothing like being prepared,\" adds Lady Jane.\n*goto roll_dice_loop\n\n*label winshot\nYou take aim, hoping to hit the monsters face in the centre. Your shot hits home. The Elders eyes roll back and the monster staggers around before collapsing.\n*goto winwin\n\n\n*label win\n\nThe Elder Monster falls under your blows, the elders face in the chest of the horror is staring up, eyes swivelling until mercifully they glaze over. \n\n*label winwin\nA cry of anger and frustration draws your attention to the boy. He has fallen to his knees and his eyes are open and fixed on you. He raises an arm and points, screaming in rage. The boy writhes and struggles and then to your horror his skin starts splitting and black wings emerge from his back! A slimy, tar like imp squirms free and flaps into the sky, screaming. It flies off into the night, leaving you to behold the scene of devastation before you. \n\nThe elder and the muscled man lie dead, grotesquely conjoined together. The villagers are shaking their heads and coming to, as if waking from a long dream. On seeing the scene of devastation before them you can only wonder if they have awoken from one nightmare into another. \n\nA scroll lies on the ground near the body. You pick it up.\n\n*set poemtwo true\nUnravelling it reveals a brightly coloured tribal painting. A group of figures are dancing around an altar at night, stars dot the sky. Something on the altar is shining incredibly brightly and they shield their eyes. Behind them, out of their sight something crawls from a small hole in the night sky. At the bottom of the picture is written [b]“Of death’s dark shadow we will be rid”.[/b]\n*if (stamina = max_stamina)\n\t*goto waxwax\n*elseif (provisions = false)\n\t*goto waxwax\n*else\n\t*goto choice8\n*label choice8\n\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto waxwax\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto waxwax\n\t*if (provisions = false) #Hurry away\n\t\t*goto waxwax\n\n*label waxwax\nYou take the wax from your ears and hurry to put this dreadful place behind you.\n*page_break The Cliff\n*goto_scene cliff\n\n", "treepeople": "*temp bullet_roll 0\n*temp bullet_damage 0\n*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 false\n\t\t\t*set chapter2 false\n\t\t\t*set chapter3 false\n\t\t\t*set chapter4 false\n\t\t\t*set chapter5 false\n\t\t\t*set chapter6 false\n\t\t\t*set chapter7 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto theladder\n\t\t#No\n\t\t\t*goto loadgame\n*label loadgame\n*if (savegame = true)\n\tDo you want to load your saved game?\n\t*choice\n\t\t#Yes\n\t\t\t*gosub_scene gamesave load\n\t\t\t*if (chapter1 = true)\n\t\t\t\t*goto_scene boat theroyalalbert\n\t\t\t*if (chapter2 = true)\n\t\t\t\t*goto_scene cabinda theroughseas\t\n\t\t\t*if (chapter3 = true)\n\t\t\t\t*goto_scene mjaanto yousailthe\n\t\t\t*if (chapter4 = true)\n\t\t\t\t*goto_scene marsh thesoft\n\t\t\t*if (chapter5 = true)\n\t\t\t\t*goto_scene creature itfeelsgood\n\t\t\t*if (chapter6 = true)\n\t\t\t\t*goto_scene junglepath youfollowa\n\t\t\t*else\n\t\t\t\t*goto theladder\n\t\t#No\n\t\t\t*goto theladder\n*label theladder\n*temp bullet_roll 0\n*temp bullet_damage 0\nThe ladder curves gently around the trunk of the tree and after a long climb you are able to look down onto the jungle canopy below. It is rather like looking out over gently rolling green hills that stretch as far as the eye can see. It is peaceful up here, this perspective reminds you of how surprisingly noisy and cramped it feels on the jungle floor. There are a number of other trees around you of similar height and you press on upwards. \n*temp bullet_roll 0\n*temp bullet_damage 0\n\nAfter a while you reach a platform that has been constructed around the trunk. A walkway extends forward to another platform about a hundred foot away. From here you can see that a number of platforms and walkways have been connected around the giant trees. It is a long way down to the jungle below.\n\nFour lean and muscular warriors are racing down the walkway towards you from the platform opposite. They are waving spears and shouting the same phrase: \"Radi Nyumba! Radi Nyumba!\"\n*choice\n\t*if (translation = true) #Use the translation book\n\t\tLady Jane hurriedly flicks through the book as they approach.\n\t\t\n\t\t\"They are saying go back, go back.\"\n\t\t*choice\n\t\t\t#Climb back down\n\t\t\t\tYou climb back down and take the path North.\n\t\t\t\t*goto_scene kolfboy\n\t\t\t#Ignore their cries\t\t\n\t\t\t\t*goto treewarrior\n\t#Go back down the ladder\n\t\tYou climb back down and take the path North.\n\t\t*goto_scene kolfboy\n\t#Ignore their cries\n\t\t*label treewarrior\n\t\tSoon they are close enough to attack.\n\t\tYou must fight the:\n\t\t\n\t\t[b]Tree Warriors[/b]\n\t\t\n\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\n\t\t*label treewarrior_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto roll_dice_loop\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"Your Nyumba is up\"\n\t\t\t\t*goto roll_dice_loopk\n\t\t\t\t\t\n\n*label roll_dice_loop\n*temp treewarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand treewarriordiceresult 1 dicesides\n*line_break\nThe Tree Warriors rolled ${treewarriordiceresult}\n*set diceresult +skill\n*set treewarriordiceresult +treewarriorskill\n*line_break\nYour total: ${diceresult} Tree Warrior total: ${treewarriordiceresult}\n*if (diceresult > treewarriordiceresult)\n\t*line_break\n\tYou push the Tree Warriors back\n\t*set treewarriorhp -2\n*if (diceresult \u003c treewarriordiceresult)\n\t*line_break\n\tThe Tree Warriors attack with venom\n\t*set stamina -2\n*if (diceresult = treewarriordiceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Tree Warriors have ${treewarriorhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (treewarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n\t\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set treewarriorhp - bullet_damage\nThe Tree Warriors have ${treewarriorhp} stamina remaining\n*if (treewarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto treewarrior_fight\n\n\t\n\n*label roll_dice_loopk\n*temp treewarriordiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand treewarriordiceresult 1 dicesides\n*line_break\nThe Tree Warriors rolled ${treewarriordiceresult}\n*set diceresult +skill\n*set treewarriordiceresult +treewarriorskill\n*line_break\nYour total: ${diceresult} Tree Warrior total: ${treewarriordiceresult}\n*if (diceresult > treewarriordiceresult)\n\t*line_break\n\tThe power of your attack stuns the Tree Warriors\n\t*set treewarriorhp -3\n*if (diceresult \u003c treewarriordiceresult)\n\t*line_break\n\tThe Tree Warriors attack with venom\n\t*set stamina -2\n*if (diceresult = treewarriordiceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Tree Warriors have ${treewarriorhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (treewarriorhp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\t\t\n*label click\nThe narrow pathway forces the Tree Warriors into a tight group, making this an easy shot. You squeeze the trigger and the gun clicks. \n\n*if (male = true)\n\t\"Maybe it doesn't work at this altitude Jack?\" says Lady Jane wryly.\n*if (female = true)\n\t\"Maybe it doesn't work at this altitude Jill?\" says Lady Jane wryly.\n\t\n\"Or maybe you didn't put any bullets in it?\" adds Sir Malcolm.\n*goto roll_dice_loop\n\n*label winshot\nThe narrow pathway forces the Tree Warriors into a tight group, making this an easy shot.\n\nYour bullet kills the lead warrior instantly and as he falls he becomes entangled in the others, sending them all off the side of the pathway.\n\n\"You know, some kind of railing would really help increase safety along this path,\" says Sir Malcolm.\n*goto nextplatform\n\n*label win\n\nThe last of the warriors falls and drops silently off the walkway. \n*if (stamina = max_stamina)\n\t*goto walkway\n*elseif (provisions = false)\n\t*goto walkway\n*else\n\t*goto choice1\n*label choice1\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto walkway\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto walkway\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto walkway\n\t*if (provisions = false) #Onwards\n\t\t*goto walkway\n*label walkway\nThe walkway seems a lot narrower when you are actually walking along it. \n\n\"Some railings wouldn’t go amiss here,\" says Sir Malcolm behind you. \n\n*label nextplatform\nYou reach the next platform gratefully. Another walkway leads ahead. A colourful blanket is draped over an opening on your right. It seems a doorway has been carved into the trunk of the vast tree. \n*choice\n\t#Carry on\n\t\t*label nextwarrior\n\t\tAs you start along the connecting walkway four more warriors begin running towards you. \"Radi Nyumba! Radi Nyumba!\" they shout.\n\t\t*choice\n\t\t\t#Retreat to the ladder\n\t\t\t\tYou climb back down and take the path North.\n\t\t\t\t*goto_scene kolfboy\n\t\t\t#Fight them\n\t\t\t\tSoon they are close enough to attack\n\t\t\t\tYou must fight the:\n\t\t\t\t\n\t\t\t\t[b]Tree Warriors[/b]\n\t\t\t\t\n\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\n\t\t\t\t*label treewarrior_fight1\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto roll_dice_loop1\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click1\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win1\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"Get Radi here I come\"\n\t\t\t\t\t\t*goto roll_dice_loopk1\n\t\t\t\t\n\t#Enter the doorway\n\t\tPulling aside the colourful hanging reveals a storage room filled with various foodstuffs gathered from the jungle. Fruits, vegetables and dried meats are gathered here in piles and hanging from the ceiling of the makeshift larder.\n\t\t\n\t\t[i]Add 2 provisions to your inventory [/i]\n\t\t\n\t\t*set provisions true\n\t\t*set provisions_number +2\n\t\t*goto nextwarrior\n\t\t\t\n*label win1\n\nThey join their brothers in the jungle far below. \n*if (stamina = max_stamina)\n\t*goto nextplatform1\n*elseif (provisions = false)\n\t*goto nextplatform1\n*else\n\t*goto choice2\n*label choice2\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto nextplatform1\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto nextplatform1\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto nextplatform1\n\t*if (provisions = false) #Onwards\n\t\t*goto nextplatform1\n\n*label nextplatform1\nYou reach the next platform. A walkway extends forwards and on your left is a doorway behind another colourful hanging. This tapestry shows cheerful family scenes in bright primary colours. \n*choice\n\t#Carry on along the walkway\n\t\t*goto goldenstatue\n\t#Enter doorway\n\t\tThe floor of this chamber has a number of empty mats and blankets on it. It is clearly a sleeping quarters and you marvel at the workmanship required to carve this room into the immense tree. At the far end of this circular room is another doorway. The cloth partition that separates the rooms is a peaceful night scene in various shades of blue.\n\t\t*choice\n\t\t\t#Enter the doorway\n\t\t\t\tYou pull back the curtain to reveal a treetop warrior waiting on the other side! He lunges at you immediately with his spear! You glimpse past him to a number of elderly treetop people comforting small children that are cowering and hunched at the back of the room. \n\t\t\t\tYou must fight the:\n\t\t\t\t\n\t\t\t\t[b]Tree Warrior[/b]\n\t\t\t\t\n\t\t\t\t[b]Skill 7, Stamina 8[/b]\n\t\t\t\t\n\t\t\t\t*label treewarrior_fight2\n\t\t\t\t*choice\n\t\t\t\t\t#Fight\n\t\t\t\t\t\t*goto roll_dice_loop2\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t*goto set_bullet_damage2\n\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click2\n\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t*goto win2\n\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\"Let's go to work\"\n\t\t\t\t\t\t*goto roll_dice_loopk2\n\t\t\t\t\n\t\t\t#Leave and carry along the walkway\n\t\t\t\t*label goldenstatue\n\t\t\t\tLooking along the walkway to the next platform you can see at least a dozen of the tree people running away. In the middle of the platform is a golden idol on a plinth. It is too far away to see much detail but judging by the way the two figures are struggling to lift it, it must be a substantial amount of gold!\n\n\t\t\t\tThe tree people have fled with the statue by the time you get to the platform. There is now just an empty stone plinth with some carvings on it of giant reptilian birds. \n\t\t\t\t\n\t\t\t\tAhead is an astonishing sight! Instead of the expected familiar platform at the end of the walkway there are a series of giant wooden cages suspended from from a limb of the mighty tree. Inside the cages are giant green and scaly reptilian birds, just as depicted in the carvings. The tree people have equipped these creatures with saddles and bridles and are mounting the flying reptiles and soaring away to escape.\n\t\t\t\t*choice\n\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t*goto set_bullet_damage3\n\t\t\t\t\t\t*elseif (bullets_number = 0)\n\t\t\t\t\t\t\t*goto click3\n\t\t\t\t\t*if (gun = true) #Rush to the next platform\t\t\n\t\t\t\t\t\t\t*goto rush\n\t\t\t\t\t*if (gun = false) #Rush to the next platform\n\t\t\t\t\t\t\t*goto rush\n\t\t\t\t\t\t*label rush\n\t\t\t\t\t\tYou rush along the last walkway to the final platform. The remaining tree people have all fled, slowly disappearing into the distance.\n\t\t\t\t\t\n\t\t\t\t\t\tAll of the cages except one are empty. The last of the flying reptiles squawks and shuffles in the cramped cage, it’s wings folded around itself. It looks at you with large eyes, it’s cruel sharp beak poking out of the bars of the cage.\n\t\t\t\t\t\n\t\t\t\t\t\t\"Incredible!\" says Lady Jane. \"This shouldn’t be! I think we are looking at a Pterosaur just as described in the findings of Professor Marsh!\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Can we have that in English please?\" says Sir Malcolm. \n\t\t\t\t\t\n\t\t\t\t\t\tLady Jane purses her lips and then answers:\n\t\t\t\t\t\n\t\t\t\t\t\t\"The last time these were on the planet was… one hundred and fifty million years ago.\"\n\t\t\t\t\t\n\t\t\t\t\t\t\"Give or take a million years,\" replies Sir Malcolm and Lady Jane sighs.\n\t\t\t\t\t\n\t\t\t\t\t\t\"Well, our scaly friend here could save us a lot of time,\" says Sir Malcolm.\n\t\t\t\t\t\n\t\t\t\t\t\t\"It’s probably like riding a horse,\" says Lady Jane. \"Except one that flies. With scales. And a six foot beak.\"\n\t\t\t\t\t\n\t\t\t\t\t\tLady Jane takes the reins of the flying reptile and leads it out of the cage. It eyes you all suspiciously and flaps its wings a little, adjusting to the space. Lady Jane climbs expertly onto it’s back and you follow\n\t\t\t\t\t\n\t\t\t\t\t\t\"Grab tight everyone, this is no time to be shy, it’s a long way down!\"\n\t\t\t\t\t\n\t\t\t\t\t\tYou agree and hold onto her waist more firmly. Lady Jane gives the reins a quick flick and the beast flaps and stretches it’s wings.\n\t\t\t\t\t\n\t\t\t\t\t\t\"Giddy up Princess!\" she shouts and the flying reptile drops off of the end of the platform. \n\t\t\t\t\t\t*page_break The City of the Dead\n\t\t\t\t\t\t*goto_scene city\n\t\t\t\t\t\n\t\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t\t\n\t\t\t\n\t\n\n*label click1\nThe Tree Warriors are forced together on the narrow path, making any shot very easy. You pull the trigger and your gun clicks.\n\n*if (male = true)\n\t\"That's a shame Jack, they were all lined up nicely,\" says Sir Malcolm.\n*if (female = true)\n\t\"That's a shame Jill, they were all lined up nicely,\" says Sir Malcolm.\n*goto roll_dice_loop1\n\n*label winshot1\nYour shot misses the warriors and hits a rope at the side of the pathway. The rope snaps with an audible twang and the branch that it had been restraining swings across the pathway and takes the warriors with it. They are knocked over the side of the path.\n*goto win1\n\n*label roll_dice_loop2\n*temp treewarrior2diceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand treewarrior2diceresult 1 dicesides\n*line_break\nThe Tree Warrior rolled ${treewarrior2diceresult}\n*set diceresult +skill\n*set treewarrior2diceresult +treewarrior2skill\n*line_break\nYour total: ${diceresult} Tree Warrior total: ${treewarrior2diceresult}\n*if (diceresult > treewarrior2diceresult)\n\t*line_break\n\tYour combined attack weakens the Tree Warrior\n\t*set treewarrior2hp -2\n*if (diceresult \u003c treewarrior2diceresult)\n\t*line_break\n\tThe Tree Warrior attacks with all his strength\n\t*set stamina -2\n*if (diceresult = treewarrior2diceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Tree Warrior has ${treewarrior2hp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (treewarrior2hp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loop2\n\n\n*label roll_dice_loopk2\n*temp treewarrior2diceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand treewarrior2diceresult 1 dicesides\n*line_break\nThe Tree Warrior rolled ${treewarrior2diceresult}\n*set diceresult +skill\n*set treewarrior2diceresult +treewarrior2skill\n*line_break\nYour total: ${diceresult} Tree Warrior total: ${treewarrior2diceresult}\n*if (diceresult > treewarrior2diceresult)\n\t*line_break\n\tYour punch smashes into the warrior hurting him badly\n\t*set treewarrior2hp -3\n*if (diceresult \u003c treewarrior2diceresult)\n\t*line_break\n\tThe Tree Warrior attacks with all his strength\n\t*set stamina -2\n*if (diceresult = treewarrior2diceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loopk2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Tree Warrior has ${treewarrior2hp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (treewarrior2hp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loopk2\n\t\n\t\n*label set_bullet_damage2\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot2\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set treewarrior2hp - bullet_damage\nThe Tree Warrior has ${treewarrior2hp} stamina remaining\n*if (treewarrior2hp \u003c 1)\n\t*goto win2\n*else\n\t*goto treewarrior_fight2\n\n\t\n*label click2\nYou draw your gun in an instant and aim straight for the warrior. You pull the trigger. The click sends a jolt through the cowering children.\n\nThe Tree Warrior attacks immediately.\n*goto roll_dice_loop2\n\n*label winshot2\nYour shot kills the Tree Warrior immediately.\n\n*label win2\n\nThe warrior falls and lies still. The women gather the children in their arms and cover their eyes, huddling further into the corner they turn their backs on you and tremble.\n\n\"We need to leave,\" says Sir Malcolm and you move on.\n*if (stamina = max_stamina)\n\t*goto goldenstatue\n*elseif (provisions = false)\n\t*goto goldenstatue\n*else\n\t*goto choice3\n*label choice3\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto goldenstatue\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto goldenstatue\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto goldenstatue\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto goldenstatue\n\n\n\n*label set_bullet_damage3\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot3\n*if (bullet_roll \u003c 6)\n\t*goto loseshot3\n\n*label winshot3\nYou hit his ride just as it starts it's ascent from the platform. It flaps weakly in the sky a few times before plummeting into the jungle so far below, taking it's rider and the treasure with it.\n*goto rush\n\n*label loseshot3\nThe warrior carrying the statue is hit. They fall sideways off of the saddle and you watch helplessly as he and the statue drop into the jungle so far below. His ride soars off, wheeling into the sky.\n*goto rush\n\n*label roll_dice_loop1\n*temp treewarrior1diceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand treewarrior1diceresult 1 dicesides\n*line_break\nThe Tree Warriors rolled ${treewarrior1diceresult}\n*set diceresult +skill\n*set treewarrior1diceresult +treewarrior1skill\n*line_break\nYour total: ${diceresult} Tree Warrior total: ${treewarrior1diceresult}\n*if (diceresult > treewarrior1diceresult)\n\t*line_break\n\tYou push the Tree Warriors back\n\t*set treewarrior1hp -2\n*if (diceresult \u003c treewarrior1diceresult)\n\t*line_break\n\tThe Tree Warriors attack with venom\n\t*set stamina -2\n*if (diceresult = treewarrior1diceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Tree Warriors have ${treewarrior1hp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (treewarrior1hp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set treewarrior1hp - bullet_damage\nThe Tree Warriors have ${treewarrior1hp} stamina remaining\n*if (treewarrior1hp \u003c 1)\n\t*goto win1\n*else\n\t*goto treewarrior_fight1\n\n\t\n*label roll_dice_loopk1\n*temp treewarrior1diceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand treewarrior1diceresult 1 dicesides\n*line_break\nThe Tree Warriors rolled ${treewarrior1diceresult}\n*set diceresult +skill\n*set treewarrior1diceresult +treewarrior1skill\n*line_break\nYour total: ${diceresult} Tree Warrior total: ${treewarrior1diceresult}\n*if (diceresult > treewarrior1diceresult)\n\t*line_break\n\tThe power of your attack stuns the Tree Warriors\n\t*set treewarrior1hp -3\n*if (diceresult \u003c treewarrior1diceresult)\n\t*line_break\n\tThe Tree Warriors attack with venom\n\t*set stamina -2\n*if (diceresult = treewarrior1diceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Tree Warriors have ${treewarrior1hp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (treewarrior1hp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\t\n*label click3\nYou take careful aim for such a difficult shot. Gently you squeeze the trigger and your gun clicks.\n\nThe rider and his mount fly off into the distance, taking the statue with them.\n*goto rush\n\n\n\n\t\t", "triceratops": "*temp bullet_roll 0\nThe exhausting ride continues for hours and you cover an enormous distance until the Rustbucket is driven aground on a sandy bank and you are all thrown unceremoniously out with the sudden impact. Sir Malcolm stands woozilly and dusts himself down, surveying the wreck of the Rustbucket. He salutes the wreck and says solemnly:\n\n\"Goodbye Rustbucket, we hardly knew ye.\" \n\n\"That has to set a record for the shortest period of boat ownership ever,\" says Lady Jane. \"I have hired Pedalo rides that were longer!\" she adds.\n\n*set triceratops true\nBefore you can reply you can hear the sound of bellowing and hoof steps coming from over the ridge. The ground shakes a little as riders appear.  Lady Jane gasps aloud as three riders with spears come into view, sitting on the most curious beasts you have ever seen. The creatures they are riding are quadrupeds with green scaly skin, squat and muscular legs and powerful tails. Most curious are the heads of the animals. They have a beak like a parrot, long sharp horns and a bony shield that extends up from their eye-line.  \n\n*if (male = true)\n\tLady Jane whispers to you: \"This is incredible Jack, really. I think they are riding a genus of herbivorous ceratopsi. In other words a triceratops. A dinosaur!\"\n*if (female = true)\n\tLady Jane whispers to you: \"This is incredible Jill, really. I think they are riding a genus of herbivorous ceratopsi. In other words a triceratops. A dinosaur!\"\n\nThe riders stare back at you while their beasts paw at the ground and snort. \n*choice\n\t#Run\n\t\t*label run\n\t\t\"Let’s not wait around to find what happens next. Run!\"\n\t\t\n\t\tYou run as fast as you can along the yielding sand. You can hear the riders behind you and the snorting of their terrible rides. Suddenly your feet are pulled together and you fall face down before being pulled back along. Rolling around on the ground you see Lady Jane and Sir Malcolm next to you and realise that you have been lassoed. \n\t\t\n\t\tYou are all dragged unceremoniously along until you pass through the gates to their village. Strong arms tie you up further and the three of you are secured to a fence. You strain to look over your shoulder and can see that you have been tied to a fence that forms an enclosure for what must be fifty or more of the Triceratops. You can see ten white huts, some of which hold curious faces in the doorways. The riders that captured you are talking to a village elder and occasionaly waving their arms back in your direction.\n\t\t*goto youngboy\n\t#Fight\n\t\t*label fight\n\t\tThe riders spur their enormous beasts towards you and you are trampled underfoot. Crushed and broken, they finish you off with their spears.\n\t\t*goto_scene youdied\n\t*if (translation = true) #Use the translation book\n\t\t\"I am going to guess we can start with \"Hello\", says Lady Jane and using the book she soon gets a reply from the riders.\n\t\t\n\t\tAfter a quick conversation Lady Jane turns to you and Sir Malcolm and says:\n\t\t\n\t\t\"Well they don’t trust us fully but they are prepared to hear us out. They asked several times if we were from the Shetani tribe. We can accompany them back to their village and speak with the elder.\"\n\t\t\n\t\tYou walk in front while the riders guide you back to their village.  The village is comprised of at least ten or more white huts and a paddock where fifty or so Triceratops are grazing. You are lead into the largest hut at the centre of the village to meet the elder. The elder is a smiling grey haired lady with many studs in her ears. She is smoking a pipe that emits an acrid smoke that you can feel in the back of your throat. She sits on a pile of bright cushions. The three riders sit cross legged on her right side and you sit before her.\n\t\t\n\t\tThrough Lady Jane’s translation you learn that the village is in the thrall of a much stronger tribe who live on the other side of the valley. The elder explains that they provide food and work for the other tribe lest they be wiped out. A delegation will be arriving tomorrow. The intent is to see if the other tribe recognise us. If they do, then we can’t be trusted and will be returned. If they do not, the elder will feel she can trust us. In the meantime, we are their guests overnight.\n\t\t*choice\n\t\t\t#Agree\n\t\t\t\tThe elder looks pleased and Lady Jane explains that she has called for an attendant to arrange a feast. You are taken to a larger, hall shaped hut and seated on cushions at a long low table. Villagers with jars and plates of food bustle around and soon the table groans under the weight of food and drink. The air is filled with rich and spicy aromas. The thin villagers look on with wide eyes and you can see that they have provided all they have to their would be liberators or their enslavers. \n\t\t\t\t\n\t\t\t\tThe elder sits at the head of the table and as the wine flows the conversation starts and soon through Lady Jane you are all sharing stories of past adventures. Sir Malcolm’s tale of the Mermaids and the Red Pearl has everyone in a state of alternating wonder and hilarity and you all leave the feast with the sound of laughter ringing in your ears and newly formed bonds of friendship. You stay in a hut for the night, a solitary guard is posted outside but judging by the way he is swaying about he would not be much use in either protecting you or stopping your escape. \n\t\t\t\t\n\t\t\t\tWith the first rays of sun you are taken bleary-eyed into the centre of the village. The elder is there, flanked by her three guards. Many straw baskets are filled with vegetables and cured meats. A horn sounds somewhere in the distance and four riders come through the entrance to the village shortly afterwards. Three warriors armed with bows ride sleek black horses and a fourth rider is driving a simplistic looking wagon. The warriors dismount and the leader strides towards the village elder whilst his companions load the carriage. You watch as the warrior shouts and waves his arms around, pointing at the food and prodding the elder in her chest. She points in your direction and the warrior glances over then resumes his ranting. When the food has been loaded he makes one final aggressive gesture and they ride out at speed, kicking up dust. \n\t\t\t\t\n\t\t\t\tThe elder calls you over and you learn from Lady Jane’s translation that the elder now believes your story and also that the Shetani tribe are unhappy with the tribute they received today and they will be arriving in force tomorrow to take more. The elder asks for your help. \n\t\t\t\t*choice\n\t\t\t\t\t#Help\n\t\t\t\t\t\tYou agree to help and the elder looks grateful but serious. You return to her hut and and via Lady Jane you start to discuss strategy. You learn that the Shetani tribe are comprised of about one hundred warriors and that you are in the camp of the Amani Tribe. There are only fifty of the Amani Tribe in total and only ten that could be described of as fighters. The Shetani keep them purposefully weak. The Shetani need to travel here through a deep ravine that cuts through the impassable mountain range that separates the tribes. In battle the Shetani hide behind heavy tall shields that interlock and protect them against all but the largest of projectiles.  \n\t\t\t\t\t\t\n\t\t\t\t\t\tYou discuss with Lady Jane and Sir Malcolm and a number of strategies emerge.  \n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*if (dynamite = true) #Use dynamite in the valley and arm the villagers to finish off any survivors\n\t\t\t\t\t\t\t\t*set dynamite false\n\t\t\t\t\t\t\t\tYou discuss your plan with the elder. When night falls some warriors take you to the valley while the rest of the village arms itself and prepares to fight. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tThe night is clear and surprisingly chilly. One of your warrior guides points to a constellation and starts to explain something but you can’t understand him and you are concerned at making too much noise. The valley is tight and winding. The sides are sheer and stretch up for at least a hundred foot. You make a pile from some of the rocks that litter the valley floor among the scrubby plants and hide the dynamite under them. The fuse is eaily hidden under a thin layer of dirt. The fuse blends in with the valley walls where an Amani tribeswoman waits to light it. With the trap laid you return to the village and wait.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSitting uncomfortably on one of the Triceratops you see the first rays of dawn arrive almost immediately accompanied by roosters crowing in the village behind you. Sir Malcolm and Lady Jane are on your right and the elder is on your left. The villagers are lined up in front of you in loose ranks, armed with various agricultural tools. Piles of stones are in front of them, ready for firing from slings. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tA signal passes down from the valley that the Shetani are on their way and nearing the ambush point. The village holds it’s breath. Silence is followed by a distant boom that echoes off the valley walls as a series of ever smaller aftershocks is followed by a blast of hot and dusty air that covers the village in an impenetrable cloud. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tWhen the dust starts to settle you can see warriors from the Shetani appear on the horizon. They gather into formation and begin marching towards you. The elder turns to you with a worried expression and an arrow lands by your feet. Clearly the explosion did not destroy the bulk of the Shetani army.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Stay and fight\n\t\t\t\t\t\t\t\t\t\t*label stayandfight\n\t\t\t\t\t\t\t\t\t\tThe Shetani warriors outside the village gates form into units, raise their shields and advance. A group of archers follows close behind them, providing a creeping barrage of arrows. The villagers resist bravely but they are helpless against the Shetani who have superior numbers, experience and equipment. Soon the village is overrun and no one is left standing. Including you.\n\t\t\t\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t\t\t\t#Run\n\t\t\t\t\t\t\t\t\t\t*label runaway\n\t\t\t\t\t\t\t\t\t\tThe Shetani warriors outside the village gates start to form into units, shields raised. Looking around at the ill-equipped villagers you realise it is hopeless.\n\n\t\t\t\t\t\t\t\t\t\t\"The jig is up I’m afraid,\" you say and your companions nod in agreement. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*label spurring\n\t\t\t\t\t\t\t\t\t\tSpurring your tricertatops on you storm out of the village gates and veer away from the massing army. A single arrow zips past your ear. As you turn you see the advancing army enter the village gates. You don’t look back again and follow the path out of the village.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*label soonyoufind\n\t\t\t\t\t\t\t\t\t\tSoon you find yourselves alongside a wide and fast flowing river. \n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"This must be what carried us to the village,\" says Sir Malcolm. \"We can follow this to its source and get back on track.\"\n\t\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t*label scrap\n\t\t\t\t\t\t\t\t\t\tSomething white by the rivers edge catches your attention. It is the skeleton of a horse. There is not a scrap of flesh on it anywhere. You pass the skeleton and find more, including the remains of a rider. Only metal and bone have been left behind. As you turn a bend in the river your rides rear up and snort nervously, pawing at the ground and unwilling to go on. Coming down the path towards you is a torrent of black, coating everything in it’s path. Suddenly the bones make sense.\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\"Ants!\" shouts Lady Jane.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Stay\n\t\t\t\t\t\t\t\t\t\t\t\t*goto stay\n\t\t\t\t\t\t\t\t\t\t\t#Jump in t
