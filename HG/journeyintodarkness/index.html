<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Journey Into Darkness — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "journeyintodarkness", "title": "Journey Into Darkness", "scenes": {"aheadpath": "*temp bullet_roll 0\n*temp bullet_damage 0\n*image heron.jpg\n*temp tigerpath false\n*temp boarpath false\n*temp lucktest 0\nThe putt-putt of the ship’s engine and the beauty of the surrounding jungle helps to dispel any anxiety caused by the nocturnal rhythm section. Huge yellow blooms stand out brilliantly in the lush green foliage on either side. Your passing disturbs a heron and sends it flapping and squawking into the sky. Sir Malcolm is whistling a music hall tune that you vaguely recognise. Up ahead the river forks. The current is faster on the right.\n*choice\n\t#Ahead\n\t\tSomething bumps under the boat, making it jerk forward a little. The sound of a heavy object falling onto the deck makes you turn. A thick green tentacle is feeling it’s way across the boats surface! Soon it is followed by another and then another. The boat lists dangerously over to one side. \n\t\tYou must fight the:\n\t\t\n\t\t[b]Tentacles[/b]\n\t\t\n\t\t[b]Skill 6, Stamina 6[/b]\n\t\t\n\t\t*label tentacle_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto roll_dice_loop\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"San-Nakji time!\"\n\t\t\t\t*goto roll_dice_loopk\n\t\t\t\n\t\t\n\t#Right\n\t\tThe fast flowing river rushes you along with increasing speed. At first it feels good to be making such quick progress but as the speed increases the Rustbucket becomes harder to control. Soon you are hurtling along and nearly out of control. Looking ahead you see white, rushing water and to your relief a much calmer and wider tributary to the left. \n\t\t*choice\n\t\t\t#Carry on\n\t\t\t\t*label waterfall\n\t\t\t\tYou are joined by you companions and you look down the river to where you are headed. The white cascading water ahead tells you that you are heading towards a waterfall!\n\t\t\t\t*goto_scene spider\t\t\n\t\t\t#Try to join tributary\n\t\t\t\t\"This is going to be tight!\"\n\t\t\t\t*choice\n\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\tThe Rustbucket tilts dangerously as you fight the current, careening into calmer waters at the last moment. You spin the wheel to compensate and let out a sigh of relief. \n\t\t\t\t\t\t\t\t*goto shadow\n\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\tThe Rustbucket tries to turn but the current is too strong and you are pushed past the way off of the wild ride.\n\t\t\t\t\t\t\t\t*goto waterfall\n*label shadow\n\nA shadow falls across the ship's wheel and you notice that it has suddenly become very grey and gloomy. You look back at the sky and see black clouds rolling in behind you. Lightning forks down from the clouds and the deep rumble of thunder ten seconds later tells you the oncoming storm is just a couple of miles away! You shout back to your companions that a storm is coming in.\n\n*if (male = true)\n\t\"We’ve just seen it too Jack,\" yell Sir Malcolm and Lady Jane as they retreat to their cabins for safety.\n*if (female = true)\n\t\"We’ve just seen it too Jill,\" yell Sir Malcolm and Lady Jane as they retreat to their cabins for safety.\n\n*comment remember to link these up\n*choice\n\t#Head into the storm\n\t\tYou turn the Rustbucket around so that it faces into the storm. The elements rage against you. Rain pounds the cabin window and the river hurls the boat and stomachs alike up into the air. The black sky is illuminated only by blinding flashes of lightning and thunder like cannon fire. \n\t\t\n\t\tYou have convinced yourself that the Rustbucket is surely going to disintegrate when calm descends. All is silence and you take in a deep, shuddering breath. The eye of the storm then passes and you brace again.\n\n\t\tEventually the storm has passed, exhausting everyone including itself. The Mjaa Nto has risen appreciably and the blue waters are now frothy and brown, with flotsam and jetsam of all types floating on the surface. Sir Malcolm opens the cabin door:\n\t\t\n\t\t*if (male = true)\n\t\t\t\"You know Jack,\" he says with a smile, \"this boat and you have a lot in common. You aren’t much to look at, but you are tougher than you look!”\n\t\t*if (female = true)\n\t\t\t\"You know Jill,\" he says with a smile, \"this boat and you have a lot in common — you are tougher than you look!”\t\t\t\n\t\t\n\t\tHe slaps your back and you try not to grimace at the powerful blow. The river widens out and becomes much calmer and with the light fading you decide it would be a good place to stop for the night and recover from the battle with the storm. \n\t\t\n\t\tAfter a welcome hot meal you are soon asleep in your cabin. \n\t\t\n\t\t[i]Add 2 stamina points[/i]\n\t\t*set stamina +2\n\t\t*gosub limit_stats\n\t\t\n\t\tIt is not long before you are awake again, the jungle drums ringing in your ears. After a fitful sleep you arise resentfully with morning light coming in through the windows and to the sounds of a conversation on deck. \n\t\t\n\t\t*if (male = true)\n\t\t\t\"Look at this Jack,\" says Lady Jane.\n\t\t*if (female = true)\n\t\t\t\"Look at this Jill,\" says Lady Jane.\n\t\t\n\t\tThere are wet footprints on the deck, already fading as the sun rises. The prints are webbed and very large. Setting off again with a mug of tea in hand, you ponder their significance.\t\n\t\t\n\t\tThe river splits.\n\t\t*choice\n\t\t\t#Left\n\t\t\t\tA faint buzzing noise can be heard over the sounds of the river. Looking up you see a shape flying over you. Before you can focus it is hidden by the trees. \n\t\t\t\t\n\t\t\t\tA tributary runs right and you slow the Rustbucket to get a better look. You cannot see anything out of the ordinary but the buzzing seems to be coming from this direction.\n\t\t\t\t*choice\n\t\t\t\t\t#Follow tributary\n\t\t\t\t\t\tBeautiful purple flowers completely dominate both sides of the river. They are spectacularly vivid and they grow in size as you follow the bend of the Mjaa Nto. \n\t\t\t\t\t\t\n\t\t\t\t\t\t*label vista\n\t\t\t\t\t\tA new vista opens up you are staggered to see a great yellow structure hanging over the river. The bottom of the structure is very close to the water but it should be possible to navigate around it with care.\n\t\t\t\t\t\t*goto amazing\n\t\t\t\t\t\t\n\t\t\t\t\t#Carry on\n\t\t\t\t\t\t*goto sunbeats\n\t\t\t\t\n\t\t\t#Ahead\t\t\t\n\t\t\t\tYou become aware of a buzzing noise and start to curse the HMS Rustbucket’s engine. As the noise intensifies you notice that it is coming from ahead and you are staggered to see a great yellow structure hanging over the river. The bottom of the structure is very close to the water but it should be possible to navigate around it with care.\n\t\t\t\t*label amazing\n\t\t\t\t\n\t\t\t\t*if (male = true)\n\t\t\t\t\t\"Amazing Jack!\" says Lady Jane \"This is a natural bee hive but on an unprecedented size and scale!\"\n\t\t\t\t*if (female = true)\n\t\t\t\t\t\"Amazing Jill!\" says Lady Jane \"This is a natural bee hive but on an unprecedented size and scale!\"\n\n\t\t\t\t\"Just think of all the honey and wax candles you could get from this!\" adds Sir Malcolm.\n\n\t\t\t\tThe entire surface is comprised of perfect hexagons. As you cast your eyes upwards you notice shapes crawling about and the buzzing intensifies alarmingly. The hive carries on up into the tree canopy, appearing to go on forever.\n\t\t\t\t*choice\n\t\t\t\t\t#Take some honeycomb\n\t\t\t\t\t\t\"I am going to get the Rustbucket right alongside and then we can hack off some honeycomb.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith great care you manoeuvre the Rustbucket alongside and marvel at the colossal formation. The hexagons are incredibly precise and you wonder at the complex mathematical equation governing this enormous construction.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou hack off a great chunk of honeycomb easily the size of a Christmas ham. Honey oozes from it gloriously.\n\t\t\t\t\t\t*set wax true\n\t\t\t\t\t\t*set provisions true\n\t\t\t\t\t\t*set provisions_number +1\n\t\t\t\t\t\t\n\t\t\t\t\t\t[i]Add wax and 1 provision to your inventory[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\tThe buzzing is far louder now and some of the shapes above start descending. Coming into view are a number of giant bees! \n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\"I think this is our cue for a song Jack,\" says Sir Malcolm.\n\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\"I think this is our cue for a song Jill,\" says Sir Malcolm.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if (male = true)\n\t\t\t\t\t\t\t\"I don't think it would do to be stung by one of those Jack,\" agrees Lady Jane, putting away her notebook.\n\t\t\t\t\t\t*if (female = true)\n\t\t\t\t\t\t\t\"I don't think it would do to be stung by one of those Jill,\" agrees Lady Jane, putting away her notebook.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou push the Rustbucket off of the hive with your boathook and head down the river. Looking back you see a few bees inspecting the damage. As you continue the buzzing fades.\n\t\t\t\t\t\t*goto sunbeats\n\n\t\t\t\t\t\t\n\t\t\t\t\t#Go around\n\t\t\t\t\t\t\"I am going to take her around\".\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith great care you manoeuvre the Rustbucket past. As you do so you marvel at the colossal formation. The hexagons are incredibly precise and you wonder at the complex mathematical equation governing this enormous construction.\n\t\t\t\t\t\t\n\t\t\t\t\t\tLady Jane is making furious notes in her notebook and Sir Malcolm reaches over the side of the boat to touch the honeycomb in fascination.\n\t\t\t\t\t\t\n\t\t\t\t\t\tWith the hive just behind you the buzzing becomes far louder and some of the shapes above start descending. Coming into view are a number of giant bees!\n\t\t\t\t\t\t\n\t\t\t\t\t\tLooking back you see a few bees inspecting the hive where you passed. As you continue the buzzing fades.\n\t\t\t\t\t\t*goto sunbeats\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\n\t\t\t\n\t\t\t#Right\n\t\t\t\tBoth sides of the river give way to an intense purple colour as spectacular blooms take over. The flowers become increasingly large as you continue until they are as big as the wheels of a carriage.\n\t\t\t\t\n\t\t\t\tA tributary runs to the left and you slow the Rustbucket to get a better look. The enormous flowers continue in this direction. Curiously there seems to be a buzzing sound coming from here too.\n\t\t\t\t*choice\n\t\t\t\t\t#Follow tributary\n\t\t\t\t\t\tThe beautiful purple flowers completely dominate both sides of the river. They are spectacularly vivid and they grow in size as you follow the bend of the Mjaa Nto. \n\t\t\t\t\t\t*goto vista\n\t\t\t\t\t\t\n\t\t\t\t\t\t\n\t\t\t\t\t#Carry on\n\t\t\t\t\t\t*goto sunbeats\n\t\t\n\t\t\n\t#Drop anchor\n\t\t\"We are going to tough it out,\" you shout back to your companions. \"Hold on, things are going to get a bit bumpy,\" and you throw the anchor overboard. \n\t\t\n\t\tThe storm hits and shunts the boat violently, lifting up the stern and rushing the prow into the river. Fortunately the Rustbucket topples back with an almighty slap that lifts your feet as you hold onto the wheel for dear life. The sky blackens and rain pelts you like shotgun pellets. The Rustbucket lurches forward and then stops suddenly. The anchor chain is pulled tight and for a moment the boat holds against the storm. The storms increasing ferocity pushes the Rustbucket forward as the anchor drags along the river floor. It snags on something and the boat strains again before the anchor chain snaps completely and the Rustbucket is carried away down the river by the storm. \n\t\t\n\t\tWhat follows is a dizzying ride along the Mjaa Nto as the storm drives harder and the river flows faster. After what seems like an eternity the storm starts to abate and the skies clear. However the Rustbucket is still hurtling along the river. You are joined by your companions and you look down the river to where you are headed. The white cascading water ahead tells you that you are heading towards a waterfall! The sound of rushing water intensifies and with no anchor you await the worst. \n\t\t*goto_scene spider\n\t\t\n\t\t\n\t#Go with it\n\t\t\"I am going to go with it,\" you shout back to your companions. \"Hold on, things are going to get a bit bumpy.\"\n\t\t\n\t\tThe storm hits and shunts the boat violently, lifting up the stern and pushing the prow into the river. Fortunately the Rustbucket topples back with an almighty slap that lifts your feet as you hold onto the wheel for dear life. The sky blackens and rain pelts you like shotgun pellets. The storm drives the Rustbucket faster and faster down the river. You are at the mercy of the tempest and hurtle down the river at breakneck speed, bracing as the boat leaps in and out of the water like a salmon. \n\t\t*goto_scene triceratops\n\t\t\n\t\t\n*label sunbeats\n\nThe sun beats down from a cloudless sky. Glancing around at your companions you see that Sir Malcolm is dozing with a wide brimmed hat pulled low over his face. Lady Jane has somehow constructed a crude but efficient fishing pole.\n\n*if (male = true)\n\t\"Caught a whopper earlier Jack but it got away. I wasn't sure if I caught it, or it caught me!\"\n*if (female = true)\n\t\"Caught a whopper earlier Jill but it got away. I wasn't sure if I caught it, or it caught me!\"\n\nA strange sound breaks you out of your reverie. Something is hitting the boat! There is another \"thwonk\" as an arrow buries itself in the deck. Lady Jane drops her fishing rod to the deck and rolls to her cabin door and inside for cover. Sir Malcolm lifts his deckchair above his head and kicks open his cabin door to make it to relative safety. More and more arrows start to find their mark and you duck down behind the wheel. \n\nUp ahead the river diverges again. The fork to the right is faster flowing water, straight ahead and to the left look less choppy. \n*image arrows.jpg\n*choice\n\t#Left\n\t\tThe air around the Rustbucket fills with arrows and you bob up and down, alternating navigation with arrow dodging.\n\n\t\tOne of the arrows is particularly well aimed and it is coming right for you!\n\t\t*choice\n\t\t\t#Test your luck\n\t\t\t\t*gosub lucktestgosub\n\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t*set luck -1\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\tYou duck down just in time as the arrow whizzes over the top of your head and sinks deep into the cabin door behind you.\n\t\t\t\t\t\n\t\t\t\t\t\tFinally the hail of arrows stops. Sir Malcolm and Lady Jane emerge from their cabins and help tidy up.\n\t\t\t\t\t\n\t\t\t\t\t\t\"These arrows will make great kindling,\" says Sir Malcolm. \n\t\t\t\t\t\t*goto howstrange\n\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\tYou raise your arm just in time to stop the arrow hitting you between the eyes. It buries itself in your forearm and you look at it curiously before steeling yourself to pull it out.\n\t\t\t\t\t\n\t\t\t\t\t\t[i]Lose 2 stamina points[/i]\n\t\t\t\t\t\t\n\t\t\t\t\t\t*set stamina -2\n\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*goto howstrange\n\t#Ahead\n\t\tThe air around the Rustbucket fills with arrows and you bob up and down, alternating navigation with arrow dodging.\n\n\t\tOne of the arrows is particularly well aimed and it is coming right for you!\n\t\t*choice\n\t\t\t#Test your luck\n\t\t\t\t*gosub lucktestgosub\n\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t*set luck -1\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\tYou duck down just in time as the arrow whizzes over the top of your head and sinks deep into the cabin door behind you.\n\t\t\t\t\t\n\t\t\t\t\t\tFinally the hail of arrows stops. Sir Malcolm and Lady Jane emerge from their cabins and help tidy up.\n\t\t\t\t\t\n\t\t\t\t\t\t\"These arrows will make great kindling,\" says Sir Malcolm. \n\t\t\t\t\t\t*goto howstrange\n\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\tYou raise your arm just in time to stop the arrow hitting you between the eyes. It buries itself in your forearm and you look at it curiously before steeling yourself to pull it out.\n\t\t\t\t\t\n\t\t\t\t\t\t[i]Lose 2 stamina points[/i]\n\t\t\t\t\t\t*set stamina -2\n\t\t\t\t\t\t*if (stamina \u003c 1)\n\t\t\t\t\t\t\t*goto_scene youdied\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*goto howstrange\n\t\t\n\t\t\n\t#Right\n\t\tThe fast flowing river rushes you along with increasing speed. The arrows drop harmlessly into the water behind you as the Rustbucket gathers pace.\n\t\t\n\t\tYou hurtle along. Quite far up ahead a large tree overhangs the turbulent river. You can see figures moving around at the base. As you get closer you can hear shouting as your attackers swing from ropes towards the Rustbucket in an attempt to board!\n\t\t\n\t\tHowever, the Rustbucket is travelling far too fast and you look back at the comical sight of the would-be pirates alternately swinging impotently back and forth over the river or splashing into the raging waters.\n\t\t\n\t\tThere is no time to savour the scene however as the Rustbucket continues to gather speed.\n\t\t*goto_scene spider\n\t\t\n\t\t\n\t\t\n\n\n\n*label lucktestgosub\n*temp lucktest 0\n*rand lucktest 1 12\n*if (luck > lucktest)\n\t*set lucktext \"lucky\"\n\t*set lucky true\n\t*return\n*else\n\t*set lucktext \"unlucky\"\n\t*set lucky false\n\t*return\n\t\n*label roll_dice_loop\n*temp tentaclediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand tentaclediceresult 1 dicesides\n*line_break\nThe tentacles rolled ${tentaclediceresult}\n*set diceresult +skill\n*set tentaclediceresult +tentacleskill\n*line_break\nYour total: ${diceresult} Tentacles total: ${tentaclediceresult}\n*if (diceresult > tentaclediceresult)\n\t*line_break\n\tYou hack at the tentacles with your machetes\n\t*set tentaclehp -2\n*if (diceresult \u003c tentaclediceresult)\n\t*line_break\n\tThe tentacles wrap around you\n\t*set stamina -2\n*if (diceresult = tentaclediceresult)\n\t*line_break\n\tThe tentacles flail menacingly\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe tentacles have ${tentaclehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (tentaclehp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set tentaclehp - bullet_damage\nThe tentacles have ${tentaclehp} stamina remaining\n*if (tentaclehp \u003c 1)\n\t*goto win\n*else\n\t*goto tentacle_fight\n\n\t\n*label roll_dice_loopk\n*temp tentaclediceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand tentaclediceresult 1 dicesides\n*line_break\nThe tentacles rolled ${tentaclediceresult}\n*set diceresult +skill\n*set tentaclediceresult +tentacleskill\n*line_break\nYour total: ${diceresult} Tentacles total: ${tentaclediceresult}\n*if (diceresult > tentaclediceresult)\n\t*line_break\n\tThe tentacles recoil in shock\n\t*set tentaclehp -3\n*if (diceresult \u003c tentaclediceresult)\n\t*line_break\n\tThe tentacles wrap around you\n\t*set stamina -2\n*if (diceresult = tentaclediceresult)\n\t*line_break\n\tThe tentacles flail menacingly\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe tentacles have ${tentaclehp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (tentaclehp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\t\n*label win\n\nThe tentacles let go and disappear beneath the surface.\n\n\"I definitely do not want to see the creature they were attached to,\" says Sir Malcolm and you are all forced to agree.\n*if (stamina = max_stamina)\n\t*goto shadow\n*elseif (provisions = false)\n\t*goto shadow\n*else\n\t*goto choice9\n*label choice9\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto shadow\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto shadow\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto shadow\n\t*if (provisions = false) #Onwards\n\t\t*goto shadow\n\t\n\n\n*label winshot\n\nThe tentacles retract immediately and disappear beneath the surface.\n\n*if (male = true)\n\t\"You obviously hit something vital Jack,\" says Lady Jane.\n*if (female = true)\n\t\"You obviously hit something vital Jill,\" says Lady Jane.\n*goto shadow\n\n*label click\nYou hear a click as you pull the trigger.\n\n*if (male = true)\n\t\"Good work Jack!\" shouts Sir Malcolm with heavy irony.\n*if (female = true)\n\t\"Good work Jill!\" shouts Sir Malcolm with heavy irony.\n\n*goto roll_dice_loop\n\n*label click1\nYou get the lead raider in your sights and pull the trigger. Click!\n\nThe raiders look at each other and laugh.\n*goto raider_fight\n\n\n*label limit_stats\n*if stamina > max_stamina\n\t*set stamina max_stamina\n*return\n\n*label howstrange\n\nLady Jane is looking over the side and then turns to speak:\n\n\"How strange. I am sure something in the water was looking at us. I just caught a pair of bright yellow eyes staring up at me, over here,\" she says pointing to a spot in the water. \n\nYou all gather at the side and peer over, but there is nothing to be seen. \n*choice\n\t#Jump in\n\t\t\"I am going to get to the bottom of this,\" you say and prepare to get into the river removing as much clothing as you can whilst still preserving some level of modesty and decorum.\n\t\t\n\t\tYou tie a rope around your waist and hand the slack to Sir Malcolm.\n\t\t\n\t\t\"Pull me up if I tug on the rope,\" you say and he salutes.\n\n\t\tYou climb over the side of the boat and lower yourself into the water feet first, preparing to submerge. There is a sharp stinging on your feet and you pull your leg up to see why. Something has bitten you and a thin ribbon of blood curls away in the water. A shape under the water darts towards your other foot and you are bitten again. In an instant hundreds of small grey fish with red eyes surround you and the water boils with them. \n\n\t\t\"Pull me in! Pull me in!\" you shout and your last memory is of Sir Malcolm hurriedly pulling on the rope to get you back into the boat.\n\t\t\n\t\tLifting you from the water Lady Jane and Sir Malcolm cry out in horror. The piranhas have stripped all the flesh from your body, sparing only the half that didn’t enter the water. \n\t\t*goto_scene youdied\t\t\n\t*if (dynamite = true) #Use dynamite\n\t\t\"I am not going to mess about with this,\" you say. \"Whatever it was you saw, I am going to blow it up!”\n\t\t\n\t\tYou light the fuse in the dynamite and wait until the last moment before you throw it into the river. You cover your face and drop to the deck, Sir Malcolm and Lady Jane have already beaten you to it and are huddling over on the other side. There is an enormous boom and a plume of water jets up from the river, rocking the Rustbucket disconcertingly. A moment of silence is followed by a rain of grey fish with red eyes that fall flapping around you. They have small, sharp teeth. \n\t\t\n\t\t\"Well,\" says Lady Jane \"wrong coloured eyes but quite efficient fishing nontheless!\"\n\t\t\n\t\tGathering around the ships engine you roast the fish and enjoy an excellent meal.\n\t\t*set dynamite false\n\t\t\n\t\t[i]Add 2 stamina points[/i]\n\t\t*set stamina +2\n\t\t*gosub limit_stats\n\t\t*goto putters\t\t\n\t#Ignore it\n\t\t*label putters\n\t\t*image piranha.jpg\n\t\t\"Whatever it is, I have a feeling that if we are going to meet it shouldn't be where it is in it's element,\" you say.\n\t\t\n\t\tLady Jane nods and continues to scan the surface. The Rustbucket putters on.\n\t\t\n\t\tYou see movement from the corner of your eye and sense danger. \n\t\t\n\t\tWithout warning a figure swings down onto the deck of the Rustbucket from out of the thick jungle! Another and another alight on the boat, cruel daggers held in their teeth they let go of the vines that they swung in on and advance towards you with knives in hand.\n\t\t\n\t\tA final figure lands. They clamber in through the bridge and knock into the controls, sending the Rustbucket moving down the river.\n\t\t\t\t\n\t\tYou must fight the:\n\t\t\n\t\t[b]Jungle Raiders[/b]\n\t\t\n\t\t[b]Skill 6, Stamina 6[/b]\n\t\t*label raider_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto roll_dice_loop1\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damage1\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click1\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win1\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"Together again\"\n\t\t\t\t*goto roll_dice_loopk1\n\t\t\n\t\t\n*label roll_dice_loop1\n*temp raiderdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand raiderdiceresult 1 dicesides\n*line_break\nThe Jungle Raiders rolled ${raiderdiceresult}\n*set diceresult +skill\n*set raiderdiceresult +raiderskill\n*line_break\nYour total: ${diceresult} Jungle Raiders total: ${raiderdiceresult}\n*if (diceresult > raiderdiceresult)\n\t*line_break\n\tYou push the raiders back with a concerted attack\n\t*set raiderhp -2\n*if (diceresult \u003c raiderdiceresult)\n\t*line_break\n\tThe raiders slash you with their knives\n\t*set stamina -2\n*if (diceresult = raiderdiceresult)\n\t*line_break\n\tYou circle each other warily\n\t*goto roll_dice_loop1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Jungle Raiders have ${raiderhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (raiderhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loop1\n\t\n*label set_bullet_damage1\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot1\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set raiderhp - bullet_damage\nThe Jungle Raiders have ${raiderhp} stamina remaining\n*if (raiderhp \u003c 1)\n\t*goto win1\n*else\n\t*goto raider_fight\n\n\t\n*label roll_dice_loopk1\n*temp raiderdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand raiderdiceresult 1 dicesides\n*line_break\nThe Jungle Raiders rolled ${raiderdiceresult}\n*set diceresult +skill\n*set raiderdiceresult +raiderskill\n*line_break\nYour total: ${diceresult} Jungle Raiders total: ${raiderdiceresult}\n*if (diceresult > raiderdiceresult)\n\t*line_break\n\tYour punch scatters the raiders\n\t*set raiderhp -3\n*if (diceresult \u003c raiderdiceresult)\n\t*line_break\n\tThe raiders slash you with their knives\n\t*set stamina -2\n*if (diceresult = raiderdiceresult)\n\t*line_break\n\tYou circle each other warily\n\t*goto roll_dice_loopk1\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Jungle Raiders have ${raiderhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (raiderhp \u003c 1)\n\t*goto win1\n*else\n\t*goto roll_dice_loopk1\n\t\n*label win1\n\nAs the last warrior falls the HMS Rustbucket comes to a sudden stop. During the fight she has run aground. \n*goto nothinguseful\n\n*label winshot1\nYour shot kills the nearest raider instantly and his dagger goes flying from his hand. It spins into the air before landing in the top of his companions head. This raider topples forward, knocking his partner off of the boat before falling to the deck. On seeing this the remaining raider jumps overboard and swims away.\n*goto nothinguseful\n\n*label nothinguseful\nThe warriors have nothing useful on them and you respectfully consign their bodies to the river.\n*if (stamina = max_stamina)\n\t*goto stepoff\n*elseif (provisions = false)\n\t*goto stepoff\n*else\n\t*goto choice10\n*label choice10\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0)\n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto stepoff\n\t\t*if (provisions_number = 0)\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto stepoff\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto stepoff\n\t*if (provisions = false) #Step off\n\t\t*goto stepoff\n\n*label stepoff\nAs you step off the boat to push it clear you see a small path into the jungle. \n\nThe path divides, splitting left and right. The pig runs down the left hand path. From the right you hear sounds of people laughing and shouting. It is not a language you recognise.\n*choice\n\t#Left\n\t\t*label boarpath1\n\t\t*set boarpath true\n\t\tThe path leads to a glade. A tattered and ancient scarecrow stands in the centre, it’s clothes bleached and worn by the weather. Disturbingly you note it is wearing the remains of a safari suit. Before you can investigate further something starts hurtling and squealing through the jungle towards you. \n\t\tYou must fight the:\n\t\t\n\t\t[b]Wild Boar[/b]\n\t\t\n\t\t[b]Skill 2, Stamina 3[/b]\n\t\t*label boar_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto roll_dice_loop2\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damage2\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click2\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win2\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"This will blow your house right in\"\n\t\t\t\t*goto roll_dice_loopk2\n\t\t\n\t\t\n\t\t\n\t\t\n\t#Right\n\t\t*label tigerpath1\t\t\n\t\t*set tigerpath true\n\t\tTall grass makes it easy for you to hide as you cautiously approach the source of the shouting. A group of ten or so are standing around a large, deep pit in the ground where two tigers are fighting each other. As the tigers leap and claw the excitement of the crowd grows and they alternate between watching the fight and gesticulating wildly, presumably laying bets. \n\t\t\n\t\tNot far from where you are hiding in the grass is a crude wooden cage with a tiger in it. It has unusually prominent front teeth, curving down like long white daggers. The cage is secured with a simple wooden peg. \n\t\t*choice\n\t\t\t#Return to the Rustbucket\n\t\t\t\t*goto return\n\t\t\t*if (boarpath = false) #Take the other path\n\t\t\t\t*goto boarpath1\n\t\t\t#Release the tiger\n\t\t\t\tCrawling carefully and slowly to the cage you wait until the action in the pit has captured the attention of the onlookers and remove the peg. The cage door opens a fraction.\n\t\t\t\t*choice\n\t\t\t\t\t#Test your luck\n\t\t\t\t\t\t*gosub lucktestgosub\n\t\t\t\t\t\tYou have been ${lucktext} with a score of ${luck} vs ${lucktest}\n\t\t\t\t\t\t*set luck -1\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t*selectable_if (lucky = true) #Lucky\n\t\t\t\t\t\t\t\tThe sabre-toothed tiger leaps from the cage and straight onto the back of the nearest spectator, sinking it’s fangs deep into his shoulder. His scream is brief before he drops limply to the floor. The tiger bounds between the terrified tribesmen as they scatter and run. \n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tSecreted in the grass you smile and nod at each other.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Return to the Rustbucket\n\t\t\t\t\t\t\t\t\t\t*goto return\n\t\t\t\t\t\t\t\t\t*if (boarpath = false) #Follow the other path\n\t\t\t\t\t\t\t\t\t\t*goto boarpath1\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*selectable_if (lucky = false) #Unlucky\n\t\t\t\t\t\t\t\tThe sabre-toothed tiger leaps from the cage and on seeing this the crowd scatters in every direction. Catching your scent the tiger turns and crouches, ready to leap.\n\t\t\t\t\t\t\t\tYou must fight the:\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[b]Sabre Toothed Tiger[/b]\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t[b]Skill 6, Stamina 6[/b]\n\t\t\t\t\t\t\t\t*label tiger_fight\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Fight\n\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loop3\n\t\t\t\t\t\t\t\t\t*if (gun = true) #Use gun\n\t\t\t\t\t\t\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t\t\t\t\t\t\t*goto set_bullet_damage3\n\t\t\t\t\t\t\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t\t\t\t\t\t\t*goto click3\n\t\t\t\t\t\t\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t\t\t\t\t\t\t*goto win3\n\t\t\t\t\t\t\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\t\t\t\t\t\t\"I hate to do this but it's you or me\"\n\t\t\t\t\t\t\t\t\t\t*goto roll_dice_loopk3\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\n\n\n\n*label roll_dice_loop2\n*temp boardiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand boardiceresult 1 dicesides\n*line_break\nThe Wild Boar rolled ${boardiceresult}\n*set diceresult +skill\n*set boardiceresult +boarskill\n*line_break\nYour total: ${diceresult} Wild Boar total: ${boardiceresult}\n*if (diceresult > boardiceresult)\n\t*line_break\n\tYou hit the boar\n\t*set boarhp -2\n*if (diceresult \u003c boardiceresult)\n\t*line_break\n\tThe boar bites your ankles\n\t*set stamina -2\n*if (diceresult = boardiceresult)\n\t*line_break\n\tThe boar runs around squeeling\n\t*goto roll_dice_loop2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Wild Boar has ${boarhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (boarhp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loop2\n\t\n*label set_bullet_damage2\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot2\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set boarhp - bullet_damage\nThe Wild Boar has ${boarhp} stamina remaining\n*if (boarhp \u003c 1)\n\t*goto win2\n*else\n\t*goto boar_fight\n\n\t\n*label roll_dice_loopk2\n*temp boardiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand boardiceresult 1 dicesides\n*line_break\nThe Wild Boar rolled ${boardiceresult}\n*set diceresult +skill\n*set boardiceresult +boarskill\n*line_break\nYour total: ${diceresult} Wild Boar total: ${boardiceresult}\n*if (diceresult > boardiceresult)\n\t*line_break\n\tYou flatten the boar\n\t*set boarhp -3\n*if (diceresult \u003c boardiceresult)\n\t*line_break\n\tThe boar bites your ankles\n\t*set stamina -2\n*if (diceresult = boardiceresult)\n\t*line_break\n\tThe boar runs around squeeling\n\t*goto roll_dice_loopk2\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Wild Boar has ${boarhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (boarhp \u003c 1)\n\t*goto win2\n*else\n\t*goto roll_dice_loopk2\n\t\n*label click2\nYour gun clicks uselessly as the boar runs towards you.\n\n*if (male = true)\n\t\"Thanks for your help Jack,\" says Sir Malcolm.\n*if (female = true)\n\t\"Thanks for your help Jill,\" says Sir Malcolm.\n*goto boar_fight\n\n*label win2\n\n*set boar true\nThe boar will make an excellent meal.\n*choice\n\t*selectable_if (tigerpath = false) #Take the other path\n\t\t*goto tigerpath1\n\t#Return to the Rustbucket\n\t\t*label return\n\t\tYou finally get the Rustbucket back off of the bank it was stuck in through a combination of branches for levers, elbow grease and some swearing for good measure.\n\t\t*if (stamina = max_stamina)\n\t\t\t*goto_scene creature\n\t\t*elseif (provisions = false)\n\t\t\t*goto_scene creature\n\t\t*else\n\t\t\t*goto choice11\n\t\t*label choice11\t\t\t\t\t\t\t\n\t\t*choice\n\t\t\t*if (provisions = true) #Eat Provisions\n\t\t\t\t*if (provisions_number > 0)\n\t\t\t\t\t*gosub_scene eatprovisions\n\t\t\t\t\t*goto_scene creature\n\t\t\t\t*if (provisions_number = 0)\n\t\t\t\t\t*gosub_scene noprovisions\n\t\t\t\t\t*goto_scene creature\n\t\t\t*if (provisions = true) #Don't eat provisions\n\t\t\t\t*goto_scene creature\n\t\t\t*if (provisions = false) #Moving along\n\t\t\t\t*goto_scene creature\n\n*label winshot2\nYour shot kills the boar instantly and he skids to a stop at your feet.\n*goto win2\n\t\t\n*label roll_dice_loop3\n*temp tigerdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand tigerdiceresult 1 dicesides\n*line_break\nThe Tiger rolled ${tigerdiceresult}\n*set diceresult +skill\n*set tigerdiceresult +tigerskill\n*line_break\nYour total: ${diceresult} Tiger total: ${tigerdiceresult}\n*if (diceresult > tigerdiceresult)\n\t*line_break\n\tYou repel the tiger\n\t*set tigerhp -2\n*if (diceresult \u003c tigerdiceresult)\n\t*line_break\n\tThe tiger claws you\n\t*set stamina -2\n*if (diceresult = tigerdiceresult)\n\t*line_break\n\tThe tiger looks for an opening\n\t*goto roll_dice_loop3\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Sabre Toothe Tiger has ${tigerhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (tigerhp \u003c 1)\n\t*goto win3\n*else\n\t*goto roll_dice_loop3\n\t\n*label roll_dice_loopk3\n*temp tigerdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand tigerdiceresult 1 dicesides\n*line_break\nThe Tiger rolled ${tigerdiceresult}\n*set diceresult +skill\n*set tigerdiceresult +tigerskill\n*line_break\nYour total: ${diceresult} Tiger total: ${tigerdiceresult}\n*if (diceresult > tigerdiceresult)\n\t*line_break\n\tYour strike shocks the tiger\n\t*set tigerhp -3\n*if (diceresult \u003c tigerdiceresult)\n\t*line_break\n\tThe tiger claws you\n\t*set stamina -2\n*if (diceresult = tigerdiceresult)\n\t*line_break\n\tThe tiger looks for an opening\n\t*goto roll_dice_loopk3\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Sabre Toothe Tiger has ${tigerhp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (tigerhp \u003c 1)\n\t*goto win3\n*else\n\t*goto roll_dice_loopk3\n\t\t\n*label set_bullet_damage3\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot3\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set tigerhp - bullet_damage\nThe Tiger has ${tigerhp} stamina remaining\n*if (tigerhp \u003c 1)\n\t*goto win3\n*else\n\t*goto tiger_fight\n\n\t\n\t\n*label win3\n\nYou are glad to be alive but killing this magnificent animal doesn't sit at all comfortably with you.\n*choice\n\t#Return to the Rustbucket\n\t\t*goto return\n\t*if (boarpath = false) #Follow the other path\n\t\t*goto boarpath1\n\t\t\n*label winshot3\nYour shot kills the Tiger instantly.\n*goto win3\n\n*label click3\nWith the tiger in your sights you pull the trigger and hear a clicking sound.\n\n*if (male = true)\n\t\"You certainly pick your moments don't you Jack?\" says Sir Malcolm.\n*if (female = true)\n\t\"You certainly pick your moments don't you Jill?\" says Sir Malcolm.\n*goto roll_dice_loop3\n\t\t\n\n", "alleybox": "*temp bullet_roll 0\n*temp bullet_damage 0\n\nThe gloomy narrow alley is a depressing contrast to the warm and bustling club. No sooner have you walked a few steps towards the main street than three figures emerge in front of you from the shadows. They advance towards you with caps pulled low. One is patting a sap into his palm. As you raise your arms to fight a deep man’s voice from behind says\n\n“We should even the odds a little.\" Glancing over your shoulder you see Lady Jane Joseph and Sir Malcolm Penrose.\n\n[i]From now on, when you are with Lady Jane and Sir Malcolm you will fight as a group. Your stats will stay the same when you fight in a group with Sir Malcolm and Lady Jane and any stamina losses carry over. If you reach zero stamina either in a group or on your own, you are dead.[/i]\n\nYou fight the [b]Thugs[/b] together.\n\n[b]Skill 6, Stamina 6[/b]\n\n*label thug_fight\n*choice\n\t#Fight\n\t\t*goto roll_dice_loop\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0) \n\t\t\t*goto set_bullet_damage\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click\n\t*if (instant_win = true) #Insta Win\n\t\t*goto win\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\tYour fingers slip into place and your fist tingles in anticipation\n\t\t*goto roll_dice_loop1\n\t\t\t\n*label click\nYou hear a click as you pull the trigger.\n\n\"Probably one of those old fashioned guns that need bullets,\" says Sir Malcolm.\n\n\"Looks like we are going to do this the traditional way,\" adds Lady Jane.\n\n*goto roll_dice_loop\n\n\t\t\n\n*label roll_dice_loop\n*temp thugdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand thugdiceresult 1 dicesides\n*line_break\nThe thugs rolled ${thugdiceresult}\n*set diceresult +skill\n*set thugdiceresult +thugskill\n*line_break\nYour total: ${diceresult} Thugs total: ${thugdiceresult}\n*if (diceresult > thugdiceresult)\n\t*line_break\n\tYou punch the thugs and send them reeling.\n\t*set thughp -2\n*if (diceresult \u003c thugdiceresult)\n\t*line_break\n\tThe thugs hit you savagely.\n\t*set stamina -2\n*if (diceresult = thugdiceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe thugs have ${thughp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (thughp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\n*label win\n\nSir Malcolm makes an untidy pile of the unconscious thugs, dusts his hands off and then smiles at you broadly. He holds out his hand and you shake it warmly.\n\n*if (male = true)\n\t\"Jack Sinclair, I'm Malcolm Penrose, pleased to meet you.\"\n*if (male = false)\n\t\"Jill Sinclair, I'm Malcolm Penrose, pleased to meet you.\"\n\nYou both turn to Lady Jane Joseph and she bows politely. You notice her captivating eyes are a vivid green. You thank them both for their help and say:\n\n\"A most unusual turn of events - even for the Adventurers Club.\"\n\nLady Jane speaks: \"No doubt hired by Percy Thistlethwaite. He would do anything to get his hands on that meteorite. The steamer to Angola leaves tonight and we have to be on it if we are to stand a chance of reaching it before he does.\"\n\n\"Wait a moment…we?\" you splutter.\n\n*if (male = true)\n\t\"Now, now Jack we are all adventurers here!\" says Lady Jane. \"Straight after the lecture I ran into Sir Malcolm and it was clear we had the same thing in mind: beat Percy to the jewel. It didn't take much detective work to see that you were also on the same track. The shenanigans in this alley just confirm that someone wishes you bad intent. No common or garden mug-hunter in a hundred mile radius of London would be stupid enough to try anything at the Adventurers Club!\"\n\t\n*if (male = false)\n\t\"Now, now Jill we are all adventurers here!\" says Lady Jane. \"Straight after the lecture I ran into Sir Malcolm and it was clear we had the same thing in mind: beat Percy to the jewel. It didn't take much detective work to see that you were also on the same track. The shenanigans in this alley just confirm that someone wishes you bad intent. No common or garden mug-hunter in a hundred mile radius of London would be stupid enough to try anything at the Adventurers Club!\"\n\n\"I hadn't planned on making this an expedition!\" you say, but not with ill feeling. \"I only decided to go on this jaunt after the lecture!\"\n\n*if (male = true)\n\t\"I think the facts are pretty straightforward Jack,\" says Lady Jane \"We are racing to the jewel. It is somewhere in Tanzania. The steamer for Angola leaves tonight. If we miss it then the next one is a week away, giving Percy a massive head start. We stand more chance of success if we work as a team. Oh, one more thing — I have the last tickets so unless you fancy a long swim or taking the trip as a stowaway then I suggest we get moving and discuss this further over dinner.\"\n*if (male = false)\n\t\"I think the facts are pretty straightforward Jill,\" says Lady Jane \"We are racing to the jewel. It is somewhere in Tanzania. The steamer for Angola leaves tonight. If we miss it then the next one is a week away, giving Percy a massive head start. We stand more chance of success if we work as a team. Oh, one more thing - I have the last tickets so unless you fancy a long swim or taking the trip as a stowaway then I suggest we get moving and discuss this further over dinner.\"\n\nYou catch Sir Malcolm smirking from the corner of your eye and know that you lost this argument before you even knew you were having it.\n\nLady Jane whistles for a carriage and you speak to Sir Malcolm:\n\n\"Well now we have one thing in common,\" you say.\n\n*if (male = true)\n\t\"What's that Old Boy?\" replies Sir Malcolm.\n*if (male = false)\n\t\"What's that Old Girl?\" replies Sir Malcolm.\n\n\"We both know what it feels like to be knocked flat by Lady Jane!\"\n\nYou shake hands again and a carriage arrives.\n*if (stamina = max_stamina)\n\t*goto HMS_Wayfarer\n*elseif (provisions = false)\n\t*goto HMS_Wayfarer\n*else\n\t*goto choice1\n*label choice1\n\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto HMS_Wayfarer\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto HMS_Wayfarer\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto HMS_Wayfarer\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto HMS_Wayfarer\n\n*label HMS_Wayfarer\n*page_break HMS Wayfarer\n*goto_scene boat\n\n*label winshot\nYour bullet passes through the first thug and ricochets off of the wall behind him, hitting the second thug in the back. He collapses forward onto the third thug, pinning him to the floor.\n*line_break\nSir Malcolm and Lady Jane look at you incredulously as you blow the smoke from the end of your pistol for added effect.\n*goto win\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set thughp - bullet_damage\nThe thugs have ${thughp} stamina remaining\n*if (thughp \u003c 1)\n\t*goto win\n*else\n\t*goto thug_fight\n\n*label roll_dice_loop1\n*temp thugdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand thugdiceresult 1 dicesides\n*line_break\nThe thugs rolled ${thugdiceresult}\n*set diceresult +skill\n*set thugdiceresult +thugskill\n*line_break\nYour total: ${diceresult} Thugs total: ${thugdiceresult}\n*if (diceresult > thugdiceresult)\n\t*line_break\n\tYou punch the thugs with a sledgehammer blow\n\t*set thughp -3\n*if (diceresult \u003c thugdiceresult)\n\t*line_break\n\tThe thugs hit you savagely.\n\t*set stamina -2\n*if (diceresult = thugdiceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe thugs have ${thughp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (thughp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop1\n\n\n\n\n", "alleynobox": "*temp bullet_roll 0\n*temp bullet_damage 0\n\nThe gloomy narrow alley is a depressing contrast to the warm and bustling club. No sooner have you walked a few steps towards the main street than three figures emerge in front of you from the shadows. They advance towards you with caps pulled low. One is patting a sap into his palm.\n\n\"We should even the odds a little.\"\n\nGlancing over your shoulder you see the impressive, muscular frame of a man and next him a petite figure with long dark hair, her green eyes shining in the alley like a cat.\n\n\"Sir Malcolm Penrose and Lady Jane Joseph, at your service.\"\n\n[i]From now on, when you are with Lady Jane and Sir Malcolm you will fight as a group. Your stats will stay the same when you fight in a group with Sir Malcolm and Lady Jane and any stamina losses carry over. If you reach zero stamina either in a group or on your own, you are dead.[/i]\n\nYou fight the [b]Thugs[/b] together.\n\n[b]Skill 6, Stamina 6[/b]\n\n*label thug_fight\n*choice\n\t#Fight\n\t\t*goto roll_dice_loop\n\t*if (gun = true) #Use gun\n\t\t*if (bullets_number > 0) \n\t\t\t*goto set_bullet_damage\n\t\t*if (bullets_number = 0)\n\t\t\t*goto click\n\t*if (instant_win = true) #Insta Win\n\t\t*goto win\n\t*if (knuckle = true) #Use Knuckle-Duster\n\t\tYour fingers slip into place and your fist tingles in anticipation\n\t\t*goto roll_dice_loop1\n\t\t\t\n*label click\nYou hear a click as you pull the trigger.\n\n\"Probably one of those old fashioned guns that need bullets,\" says Sir Malcolm.\n\n\"Looks like we are going to do this the traditional way,\" adds Lady Jane.\n*goto roll_dice_loop\n\n\n*label roll_dice_loop\n*temp thugdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand thugdiceresult 1 dicesides\n*line_break\nThe thugs rolled ${thugdiceresult}\n*set diceresult +skill\n*set thugdiceresult +thugskill\n*line_break\nYour total: ${diceresult} Thugs total: ${thugdiceresult}\n*if (diceresult > thugdiceresult)\n\t*line_break\n\tYou punch the thugs and send them reeling\n\t*set thughp -2\n*if (diceresult \u003c thugdiceresult)\n\t*line_break\n\tThe thugs hit you savagely\n\t*set stamina -2\n*line_break\n*if (diceresult = thugdiceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop\nYou have ${stamina} stamina left\n*line_break\nThe thugs have ${thughp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (thughp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\n*label win\n\nSir Malcolm makes an untidy pile of the unconscious thugs, dusts his hands off and then smiles at you broadly. He holds out his hand and you shake it warmly.\n\n*if (male = true)\n\t\"Jack Sinclair, I'm Malcolm Penrose, pleased to meet you.\"\n*if (male = false)\n\t\"Jill Sinclair, I'm Malcolm Penrose, pleased to meet you.\"\n\nYou both turn to Lady Jane Joseph and she bows politely. You notice her captivating eyes are a vivid green. You thank them both for their help and say:\n\n\"A most unusual turn of events - even for the Adventurers Club\"\n\nLady Jane speaks:\n\n\"No doubt hired by Percy Thistlethwaite. He would do anything to get his hands on that meteorite. The steamer to Angola leaves tonight and we have to be on it if we are to stand a chance of reaching it before he does\"\n\n\"Wait a moment…we?\" you splutter.\n\n*if (male = true)\n\t\"Now, now Jack we are all adventurers here!\" says Lady Jane. \"Straight after the lecture I ran into Sir Malcolm and it was clear we had the same thing in mind: beat Percy to the jewel. It didn't take much detective work to see that you were also on the same track. The shenanigans in this alley just confirm that someone wishes you bad intent. No common or garden mug-hunter in a hundred mile radius of London would be stupid enough to try anything at the Adventurers Club!\"\n*if (male = false)\n\t\"Now, now Jill we are all adventurers here!\" says Lady Jane. \"Straight after the lecture I ran into Sir Malcolm and it was clear we had the same thing in mind: beat Percy to the jewel. It didn't take much detective work to see that you were also on the same track. The shenanigans in this alley just confirm that someone wishes you bad intent. No common or garden mug-hunter in a hundred mile radius of London would be stupid enough to try anything at the Adventurers Club!\"\t\n\n\"I hadn't planned on making this an expedition!\" you say, but not with ill feeling \"I only decided to go on this jaunt after the lecture!\"\n\n*if (male = true)\n\t\"I think the facts are pretty straightforward Jack\",says Lady Jane. \"We are racing to the jewel. It is somewhere in Tanzania. The steamer to Angola leaves tonight. If we miss it then the next one is a week away, giving Percy a massive head start. We stand more chance of success if we work as a team. Oh, one more thing - we have the last tickets so unless you fancy a long swim or taking the trip as a stowaway then I suggest we get moving and discuss this further over dinner.\"\n*if (male = false)\n\t\"I think the facts are pretty straightforward Jill,\" says Lady Jane. \"We are racing to the jewel. It is somewhere in Tanzania. The steamer to Angola leaves tonight. If we miss it then the next one is a week away, giving Percy a massive head start. We stand more chance of success if we work as a team. Oh, one more thing — we have the last tickets so unless you fancy a long swim or taking the trip as a stowaway then I suggest we get moving and discuss this further over dinner.\"\n\nYou look again at the tidy pile of thugs in the alley and weigh up the odds of success in going alone.\n\nSir Malcolm whistles for a carriage and Lady Jane speaks to you:\n\n*if (male = true)\n\t\"Remember Jack, a stranger is just a friend you haven't met yet.\"\n*if (male = false)\n\t\"Remember Jill, a stranger is just a friend you haven't met yet.\"\n\n\"Try telling that to them,\" you reply, nodding at the comatose thugs.\n\nA laughing Lady Jane replies \"I guess that's true. Well in that case, let me put it like this - don't make me force you!\" \n\nWith that Lady Jane raises her guard and drops into a fighting stance, all the while smiling winningly.\n\nThe carriage arrives and Sir Malcolm helps Lady Jane aboard. She turns to you:\n\n*if (male = true)\n\t\"Saved by the bell Jack... this time,\" she says.\n*if (male = false)\n\t\"Saved by the bell Jill... this time,\" she says.\n\nNothing now would stop you from joining them.\n*if (stamina = max_stamina)\n\t*goto HMS_Wayfarer\n*elseif (provisions = false)\n\t*goto HMS_Wayfarer\n*else\n\t*goto choice1\n*label choice1\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto HMS_Wayfarer\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto HMS_Wayfarer\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto HMS_Wayfarer\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto HMS_Wayfarer\n\n*label HMS_Wayfarer\n*page_break HMS Wayfarer\n*goto_scene boat\n*label winshot\nYour bullet passes through the first thug and ricochets off of the wall behind him, hitting the second thug in the back. He collapses forward onto the third thug, pinning him to the floor.\n*line_break\nSir Malcolm and Lady Jane look at you incredulously as you blow the smoke from the end of your pistol for added effect.\n*goto win\n\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set thughp - bullet_damage\nThe thugs have ${thughp} stamina remaining\n*if (thughp \u003c 1)\n\t*goto win\n*else\n\t*goto thug_fight\n\n\t\n\n\n*label roll_dice_loop1\n*temp thugdiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand thugdiceresult 1 dicesides\n*line_break\nThe thugs rolled ${thugdiceresult}\n*set diceresult +skill\n*set thugdiceresult +thugskill\n*line_break\nYour total: ${diceresult} Thugs total: ${thugdiceresult}\n*if (diceresult > thugdiceresult)\n\t*line_break\n\tYou punch the thugs with a sledgehammer blow\n\t*set thughp -3\n*if (diceresult \u003c thugdiceresult)\n\t*line_break\n\tThe thugs hit you savagely\n\t*set stamina -2\n*line_break\n*if (diceresult = thugdiceresult)\n\t*line_break\n\tYou dodge each other\n\t*goto roll_dice_loop\nYou have ${stamina} stamina left\n*line_break\nThe thugs have ${thughp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (thughp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop1\n\n\n", "anaconda": "*temp bullet_roll 0\n*temp bullet_damage 0\n\nThe morning sun forces you awake. Sir Malcolm has already started the fire for the ships engine and tea is being brewed. You are joined by Lady Jane. She gives you a weak smile and you sit and drink while the sun warms your shoulders and the sounds of the jungle transport you. Before long you are on your way again down the Mjaa Nto.\n\nA severe rattling from the ships engine followed by a loud banging causes you to turn and investigate the commotion. Sir Malcolm is banging the dying engine with a stick while an amused Lady Jane looks on. The engine rattles and then dies. Sir Malcolm rushes to you and grabs you by the shoulders, shouting frantically and shaking you:\n\n*if (male = true)\n\t\"My God Jack! Do you know what this means!\"\n*if (female = true)\n\t\"My God Jill! Do you know what this means!\"\n\nYou stare back, lost for words.\n\n\"No more tea man! No more tea!\"\n\nYou all dissolve into laughter.\n\nSuddenly the boat tips. A plume of water explodes from the river and drenches everything in spray. It seems a huge swaying tree has burst out of the water but to your horror you see through the spray that it is a giant anaconda! Towering above the boat it lowers it’s head and fixes on you with cold black eyes. It’s mouth opens, revealing lines of dagger-like teeth and a flickering pitchfork tongue.  \n\nA loud bang from the ships engine is followed by a huge cloud of smoke and steam. Shouting \"the bridge, now!\" you leap into shelter. \n\nAfter the briefest of pauses there is a mighty thump on the roof of the helm room and suddenly sunlight is bursting in through a gaping hole above. The snake is tearing it’s way through the roof, there is no time to lose!\n*choice\n\t*if (boar = true) #Use the boar\n\t\t*set boar false\n\t\tYou rush out of the bridge with the pig in your arms just as the giant snake finishes tearing off the roof. It throws the debris to one side and hisses in anticipation. Lady Jane is shouting:\n\t\t\n\t\t*if (male = true)\n\t\t\t\"Jack, use the anchor Jack!\"\n\t\t*if (female = true)\n\t\t\t\"Jill, use the anchor Jill!\"\n\t\t\n\t\tYou skewer the pig onto the anchor and roll away. Wind whistles past you as the snake strikes, swallowing the pig and anchor in one go. It rears up to strike again and the anchor chain pulls tight. The snake starts thrashing wildly and the Rustbucket is pulled violently forward. In desperation to get free the anaconda disappears below the water and the boat is pulled forward at terrifying speed. Sir Malcolm lets out a whoop as the boat is propelled faster and faster along the river. Lady Jane smiles at you, holding onto the railings of the speeding ship. \n\t\t\n\t\t\"Just like fishing!\" she shouts.\n\t\t\n\t\tThe boat lurches from one side of the river to the other in an increasingly wild fashion. There is a sudden jolt as it hits rocks and the hull is torn wide open. As the boat starts to sink it is beached at the edge of the river. The three of you jump to shore and inspect the damage. The HMS Rustbucket will not be sailing again.\n\t\t\n\t\t\"Well, looks like we are going to be stretching our legs again,\" says Sir Malcolm. \n\t\t*page_break The Jungle Path\n\t\t*goto_scene junglepath\n\t*if (dynamite = true) #Use dynamite\n\t\t*set dynamite false\n\t\tYou light the fuse and throw the dynamite out of the cabin and into the frothing waters at the base of the Anaconda. There is a terrible pause during which the Anaconda rises to full height and then propels down towards you, fangs bared.\n\t\t\n\t\tAt the last moment there is a muffled boom and the Rustbucket rocks violently back and forth. The head of the Anaconda drops to the cabin floor, it's eyes seem to have a look of surprise in them. There is a moment of silence and then heavy thudding as chunks of the snake rain down. \n\t\t\n\t\tYou are on the edge of a marsh. After various attempts it is obvious that the Rustbucket's engine will not start. She will not sail again.\n\t\t\n\t\t\"Can I suggest a small ceremony?\" says Sir Malcolm\n\t\t\t\t\t\t\n\t\tYou gather around and salute.\n\t\t\t\t\t\t\n\t\tLady Jane speaks: \"Here he lies where he long’d to be. Home is the sailor, home from the sea\".\n\t\t\t\t\t\t\n\t\tYou leave the Rustbucket and head into the marshes.\n\t\t*page_break The Marsh\n\t\t*goto_scene marsh\n\t#Fight\n\t\tYou must fight the:\n\t\t\n\t\t[b]Giant Anaconda[/b]\n\t\t\n\t\t[b]Skill 8, Stamina 8[/b]\n\t\t\n\t\t*label anaconda_fight\n\t\t*choice\n\t\t\t#Fight\n\t\t\t\t*goto roll_dice_loop\n\t\t\t*if (gun = true) #Use gun\n\t\t\t\t*if (bullets_number > 0)\n\t\t\t\t\t*goto set_bullet_damage\n\t\t\t\t*if (bullets_number = 0)\n\t\t\t\t\t*goto click\n\t\t\t*if (instant_win = true) #Insta Win\n\t\t\t\t*goto win\n\t\t\t*if (knuckle = true) #Use Knuckle-Duster\n\t\t\t\t\"I am going to make you my next wallet\"\n\t\t\t\t*goto roll_dice_loopk\n\t\t \t \n\t\t\t \n*label roll_dice_loop\n*temp anacondadiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand anacondadiceresult 1 dicesides\n*line_break\nThe Anaconda rolled ${anacondadiceresult}\n*set diceresult +skill\n*set anacondadiceresult +anacondaskill\n*line_break\nYour total: ${diceresult} Giant Anaconda total: ${anacondadiceresult}\n*if (diceresult > anacondadiceresult)\n\t*line_break\n\tYou hack at the striking snake\n\t*set anacondahp -2\n*if (diceresult \u003c anacondadiceresult)\n\t*line_break\n\tThe anaconda strikes\n\t*set stamina -2\n*if (diceresult = anacondadiceresult)\n\t*line_break\n\tThe snake towers over you and prepares to strike\n\t*goto roll_dice_loop\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Anaconda has ${anacondahp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (anacondahp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loop\n\t\n*label win\n\nThe lifeless body of the snake drops into the river and is gone. \n*if (stamina = max_stamina)\n\t*goto edgeofmarsh\n*elseif (provisions = false)\n\t*goto edgeofmarsh\n*else\n\t*goto choice8\n*label choice8\n*choice\n\t*if (provisions = true) #Eat Provisions\n\t\t*if (provisions_number > 0) \n\t\t\t*gosub_scene eatprovisions\n\t\t\t*goto edgeofmarsh\n\t\t*else\n\t\t\t*gosub_scene noprovisions\n\t\t\t*goto edgeofmarsh\n\t*if (provisions = true) #Don't eat provisions\n\t\t*goto edgeofmarsh\n\t*if (provisions = false) #To the Wayfarer!\n\t\t*goto edgeofmarsh\n\n*label edgeofmarsh\nYou are on the edge of a marsh. After various attempts it is obvious that the Rustbucket's engine will not start. She will not sail again.\n\t\t\n\"Can I suggest a small ceremony?\" says Sir Malcolm\n\t\t\t\t\t\t\nYou gather around and salute.\n\t\t\t\t\t\t\nLady Jane speaks: \"Here he lies where he long’d to be. Home is the sailor, home from the sea\".\n\t\t\t\t\t\t\nYou leave the Rustbucket and head into the marshes.\n*page_break The Marsh\n*goto_scene marsh\n\n*label set_bullet_damage\n*rand bullet_roll 1 6\n*set bullets_number - 1\nYou rolled a ${bullet_roll}\n*line_break\n*if (bullet_roll = 6)\n\t*goto winshot\n*if (bullet_roll \u003c 6)\n\t*rand bullet_damage 1 6\nYour bullet caused ${bullet_damage} damage\n*set anacondahp - bullet_damage\nThe Anaconda has ${anacondahp} stamina remaining\n*if (anacondahp \u003c 1)\n\t*goto win\n*else\n\t*goto anaconda_fight\n\n\t\n*label winshot\nThe Anaconda rears up to strike, mouth open wide. Your bullet hits its palate and enters its brain.\n*goto win\n\n*label click\nThe Anaconda rears up to strike, mouth open wide. You aim and your gun clicks uselessly.\n\n*if (male = true)\n\t\"There is a time and a place Jack!\" says Lady Jane.\n*if (female = true)\n\t\"There is a time and a place Jill!\" says Lady Jane.\n*goto roll_dice_loop\n\n*label roll_dice_loopk\n*temp anacondadiceresult\n*rand diceresult 1 dicesides\n\nYou rolled ${diceresult}\n*rand anacondadiceresult 1 dicesides\n*line_break\nThe Anaconda rolled ${anacondadiceresult}\n*set diceresult +skill\n*set anacondadiceresult +anacondaskill\n*line_break\nYour total: ${diceresult} Giant Anaconda total: ${anacondadiceresult}\n*if (diceresult > anacondadiceresult)\n\t*line_break\n\tYour punch the snake and it reels backwards\n\t*set anacondahp -3\n*if (diceresult \u003c anacondadiceresult)\n\t*line_break\n\tThe anaconda strikes\n\t*set stamina -2\n*if (diceresult = anacondadiceresult)\n\t*line_break\n\tThe snake towers over you and prepares to strike\n\t*goto roll_dice_loopk\n*line_break\nYou have ${stamina} stamina left\n*line_break\nThe Anaconda has ${anacondahp} stamina left\n*if (stamina \u003c 1)\n\t*goto_scene youdied\n*if (anacondahp \u003c 1)\n\t*goto win\n*else\n\t*goto roll_dice_loopk\n\n\n\n", "boat": "*temp mapsafe false\n*temp mappocket false\n*temp nomap false\n*temp bullet_roll 0\n*temp monkeyfight false\n*temp porthole false\n*temp monkeybrain false\n*temp cloche false\n*temp bullet_damage 0\n*comment NEW CODE FOR SAVE AND LOAD\n\n*if (savegame = true)\n\tDo you want to save your progress?\n\t*choice\n\t\t#Yes\n\t\t\t*set chapter1 true\n\t\t\t*gosub_scene gamesave save\n\t\t\t*goto theroyalalbert\n\t\t#No\n\t\t\t*goto theroyalalbert\n\t\t\n*label theroyalalbert\n*temp mapsafe false\n*temp mappocket false\n*temp nomap false\n*temp bullet_roll 0\n*temp monkeyfight false\n*temp porthole false\n*temp monkeybrain false\n*temp cloche false\n*temp bullet_damage 0\nThe Royal Albert Dock is a hive of activity even at this time of night. Standing in the dock is the HMS Wayfarer, a magnificent liner with four golden capped funnels. It is hard to take in the enormity of the vessel, truly a city that can float on the sea. An army of porters are carrying crates and luggage onto the ship like a long line of ants overseen by various officials with clipboards.\n\n\"What about my luggage and tickets?\" you ask your companions.\n\n\"Already taken care of,\" says Lady Jane. \"You aren’t the only one who has been busy!\" she adds with a wry smile and you join the queue to board.\n\nThe Wayfarer is a beautiful ship. On boarding, a sweeping staircase draws your eye upwards to an ornately carved Poseidon holding aloft a trident. Cherubs and dolphins are carved into the banister and fine art adorns the walls. A steward in a smart white jacket takes you to your cabin on the port side of the ship.\n\nIt is lavishly decorated with red and gold wallpaper and the ornamented drinks cabinet is well stocked. A small beech writing table is in the centre of the room and a sumptuous double bed to the side. There is a small safe in the wall. The en-suite bathroom is also highly opulent and you notice the gold taps are in the shape of dolphins.\n\nYour luggage is in the room. Lady Jane has provided equipment for the adventure in the form of a [i]machete, backpack, rope, book of matches, safari suit, a grappling hook and 5 gold coins.[/i]\n*set machete true\n*set backpack true\n*set rope true\n*set matches true\n*set suit true\n*set hook true\n*set gold + 5\n*set empty_inventory false\n\nYou can feel a faint vibration as the ships powerful engines start up. A long bass note sounds from the horn and a slight lurch tells you that you are on your way.\n\nThe journey takes you past France, Spain, Morocco, the Sahara, Guinea and Ghana. Over the weeks the cold air is replaced by a pleasant warmth as you pass from the North Atlantic to the South and you are forced to settle into a life on board. Always in the back of your mind is the urgency of the the task at hand and the incongruity of being surrounded by such opulent surroundings and high society that is in stark contrast to your pressing need for escape and adventure. \n\nSir Malcolm and Lady Jane prove to be the kindred spirits you had predicted they would be and your evenings of swapping stories and playing cards keep you all sane. It occurs to you that you should publish a book of their exploits, you know it would amaze and delight readers and it would be appalling if such fabulous tales were lost to posterity! The story of Lady Jane and the Four Monks would be worth the price alone!\n\nAs you get closer to your destination the tension and frustration rises and there is an overwhelming feeling of being an animal in an a
