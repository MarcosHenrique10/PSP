<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Factions: Raids of the Divided — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>

      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "factionsrotd", "title": "Factions: Raids of the Divided", "scenes": {"after4": "*label After4\nYou have investigated all four factions. You have picked up so many clues yet something is off. You remember what Riz told you before you started all this.\n\"One of these factions might be the cause of all these raids so keep your guard up. Be ready for anything including not-so-honest leaders.\" \nIt felt like almost yesterday when he said that. Time flew so quickly, and soon everything will come to an end. \nAll that investigating, just to find out the identity of the raiders. Someone shall pay for the crimes they committed.\nAlthough the lives lost could not be replaced, the livelihood of those that remained had to be returned. \nAlthough it is nothing in comparison to a family member or friend, that is all you can do for others. \nYou do not have the power to bring others back; the power to bring a broken family together again. \nIn fact, you cannot get bogged down by this sinking feeling that is slowly creeping in, you have to shake it off... you have to hold the line. \n\nYou have to solve the case because with a keen eye for details one truth will prevail.\n\"Hey Investigator,\" Riz snaps you out of thought, \"I still feel like we do not know enough about each other.\" \"What do you want to know?\" you ask.\n\"Everything, let us start with parents. Do you still have them?\"\n*choice\n\t#No, I lost both of them\n\t\t*set parents \"Orphan\"\n\t\t\"Oh, I am so sorry to hear that,\" Riz says with genuine empathy.\n\t\t*goto next\n\t#No, I lost my mother\n\t\t*set parents \"Motherless\"\n\t\t\"Oh, I am so sorry to hear that,\" Riz says with genuine empathy.\n\t\t*goto next\n\t#No, I lost my father\n\t\t*set parents \"Fatherless\"\n\t\t\"Oh, I am so sorry to hear that,\" Riz says with genuine empathy.\n\t\t*goto next\n\t#Yes, I am very grateful that both my parents are still living\n\t\t*set parents \"Both alive\"\n\t\t*label next\n\"How about yours?\" you ask. \"Yes, I love them very much and cannot wait to go back to them after all this investigating,\" Riz responds. \nThis brings a smile to your face, 'you are glad there is actually someone grateful for both their parents. \nIt is all too common for children to take advantage of their parents or disrespect them only to lose them and realize how much they were truly worth. If only they knew...' you think.\n\"Do you have any siblings?\" Riz asks.\n*fake_choice\n\t#No, I do not have any siblings\n\t\t*set siblings \"only child\"\n\t#Yes, I have one sibling\n\t\t*set siblings \"of two\"\n\t#Yes, I have two siblings\n\t\t*set siblings \"two siblings\"\n\t#Yes, I have three siblings\n\t\t*set siblings \"three siblings\"\n\t#I have too many siblings\n\t\t*set siblings \"too many\"\n\"Oh, I do not have any siblings. I wonder what it would be like to have a sibling?...Did you have many friends growing up?\" Riz asks.\n*fake_choice\n\t#Yes, I had a lot of friends. I was actually quite popular in my village\n\t#I had a few close-knit group of friends which was fine, I did not need many friends because we were close\n\t#No, I was more of a lone wolf, I could not really make friends so most of my life I spent alone\n\"I spent my earlier years with my parents.I remember my parents were really proud of me when they realized my interest in peace keeping. \nSeeing their smile was worth more than anything. I was then sent to train to become a Musfir. \nThey then somehow got into contact with this group and when I learned about them, what they did, and what I would have to do, I agreed to go with them. \nNot too long after I was sent to recruit because of the raids and that is when I met you, and I am glad to have met you,\" Riz says with a smile.\n*choice\n\t#Wow, what a fascinating story\n\t\t*set Kindness +2\n\t\t\"Really?...I'm..uh glad you think so,\" Riz says turning a little red. \"I have actually never been told that.\" The two of you continue to carry a conversation. \n\t\tAfter all that travelling and investigating you have earned a break.\n\t\t*page_break The next day\n\t\t\"Hey, I managed to pull a few strings and got the Assembly to meet up again. Actually it was not really me, it was the other Musfirs just doing their jobs.\n\t\tNow once the Assembly meets, we and other Musfirs who were investigating will lay out all the information we have collected so that we can all decide on the course of action,\" Riz says.\n\t\t\"What if a faction refuses?\" you ask.\n\t\t\"A faction has no choice but to accept because if they decline they will be assumed to be the raiders. It might be a dirty tactic, but it will help us get to the bottom of this,\" Riz replies.\n\t\t\"So could not each faction just have given information to the others about what was happening to their lands?\" you ask.\n\t\t\"Honestly they could have and I do not know why they did not. I assume it was because they did not trust the other factions enough. \n\t\tThey shared that they had been invaded but not any other specific information. The problem was that no one was really trying to put all the pieces together either. \n\t\tAlso, the raids happened all of a sudden with not enough time to properly account for much of anything,\" Riz says.\n\n\t\t\"Let us get back to the task at hand, are you ready for the Assembly?\" Riz asks. Before you know it a day or two flies by and...\n\t\t*page_break The Assembly has begun\n\t\tAll the faction leaders are here as well as their advisers. The air is tense. The other investigators besides Riz and you are getting ready to explain their findings.\n\t\tYou have an overwhelming sensation take over you. \n\t\t\"Hmmm, may I have a second to gather my thoughts?\" you whisper to no one in particular, not that anyone was paying attention to such an inaudible question.\n\t\t*page_break gathering thoughts\n\t\tYou focus your mind and take a deep breath. \n\t\tBy the time you are ready all the other investigators have already informed the Assembly about their findings and all eyes are on you or so it feels like.\n\t\t*page_break\n\t\t\"${name} and I have went to all four factions and investigated. We have found out that the raids are coming from the east.\n\t\t\"Yes we know that already, almost all of the Musfirs have said this,\" one of the faction leader's council member interrupts.\n\t\t\"I am not finished yet. As I was saying we found out the raids are coming from the east. \n\t\tSome of the raided homes in Aganbad have signs of damage to the floor and the beds look like they have not been made.\n\t\tSafistan reports say that Aganbad was attacked first, then Badalpani, and then Kelisgar.\n\t\tBadalpani was actually only attacked from the direction of south-east. \n\t\t\"Yes we get it, everyone was attacked from the east,\" another council member cuts Riz off and you realize that everyone is starting to get inpatient except for Chalchar, \n\t\the seems furious because Aganbad is the eastern most faction.\n\t\t*page_break\n\t\tTrying to come to the rescue of Riz you says, \"We also learned that Safistan was not invaded.\" \n\n\t\tYou hears gasps.\n\t\tIt feels like time has come to a halt.\n\n\t\tThen someone responds, \"What do you mean not invaded, were they not raided like all the other factions?\" at this point you do not even know who is speaking.\n\t\t\"Yes, that is what I mean, they were not raided,\" you say. The seriousness in the room could alone kill a jester, everyone seems worried except for Sufian and Chalchar who's anger has switched to relief.\n\t\tThe Safistan council members look like they are about to faint while Soron looks like he is about to explode.\n\t\t'Chalchar must not be worried because now he has less heat on him, but why is Sufian not worried? He must have wanted us to say this.' you try to think as chaos starts to ensue.\n\t\tSoron and the other council members are trying to defend Safistan while everyone is accusing Safistan of lying and worse. Sufian joins in trying to defend Safistan as ideas are thrown about destroying Safistan and its people. \n\t\tYou can see the sweat drip off of faces.\n\n\t\tDrip. You watch a particular bead of sweat fall off of a face.\n\n\t\tDrop. It lands on the floor.\n\n\t\tYou are having a hard time thinking with all the noise, you try to block it out.\n\t\tThis time someone overly enthusiastic flings his hand to the side for emphasis and drops of sweat land on your face. \n\t\tJust as you hurriedly try to wipe off someone else's sweat off of your face you hear, \"ENOUGH!\" The room falls silent.\n\t\tRiz continues,\"We are not getting anywhere like this, I say we vote\"\n\t\tMurmurs occur but no one stands up to object the idea.\n\t\tYou are not sure if your opinion will count but you think the raiders are from...\n\t\t*fake_choice\n\t\t\t#Safistan\n\t\t\t\t*set Morality -5\n\t\t\t#Aganbad\n\t\t\t\t*set Morality -5\n\t\t\t#Kelisgar\n\t\t\t\t*set Morality -5\n\t\t\t#Badalpani\n\t\t\t\t*set Morality -5\n\t\t\t#Something is not right\n\t\t\t\t*set Morality +5\n\t\t\"Can we vote more than once,\" Zefir says with a smirk.\n\t\tRiz says no and the voting begins.\n\t\t*page_break\n\t\t\"Aganbad votes Safistan is responsible,\" Chalchar says.\n\t\tGanbaro looks at Chalchar chuckles coldly then says,\"Badalpani votes Aganbad is responsible.\"\n\t\t\"Kelisgar would vote for both but since it is not allowed, Safistan it is,\" Zefir says.\n\t\tAll eyes turn to Sufian who sighs then says, \"I do not think Aganbad is responsible. I would like to say I will not vote but that might mean the end of my people. \n\t\tMy weakness forces me to vote for Aganbad.\"\n\n\t\tRiz takes charge and says, \"Two votes against Aganbad and two votes against Safistan, is everyone fine with the Musfirs breaking the tie?\"\n\t\tChalchar objects furiously, but eventually calms down.\n\n\t\t\"This is it ${name}, do not feel pressured but I think you should be the one responsible for the fate of this land. Who do you think the raiders are?\n\t\t*fake_choice\n\t\t\t#Something is not right\n\t\t\t#Something is not adding up\n\t\t\t#What could it be?\n\t\tWho do you think the raiders are?\n\t\t*fake_choice\n\t\t\t#It can't be Aganbad, you ruled them out when you went there to investigate\n\t\t\t#You do not believe it can be Safistan, Sufian would never raid the other factions would he? And..and the raiders came from the east...\n\t\tYou quickly look at a map\n\t\t*image alfarid.jpg\n\t\tWhat if the raiders are not part of the four factions? What if they are east of Alfarid?\n\t\tYou get up and declare\n\t\t*fake_choice\n\t\t\t#We have been looking at this the wrong way, we need to look to further east, east of Alfarid\n\t\t\t#Both Safistan and Aganbad are innocent, the raiders came from whatever lies east of Alfarid\n\t\tThis gets everyone's attention. Some scramble and try to find a map and look at what is to the east.\n\t\t\"Wait are you trying to say whoever is across the Deserted Mountains raided us?\" Zefir asks.\n\t\t*choice\n\t\t\t#Yes, think about it, the raids are from the east, Aganbad was hit first then Badalpani, then Kelisgar.\n\t\t\t\t\"They must not have been able to raid Safistan because of East Trios,\" Riz suddenly realizes.\n\t\t\t\t\"That must be why only the south-eastern part of our land was raided, Pani river must have forced them to go south.\" Ganbaro adds.\n\t\t\t\t\"These people could not cross the rivers,\" Riz says.\n\t\t\t\t\"Could the raiders not cross the river for fear of water or was the terrain impassable for them?\" Sufian asks.\n\t\t\t\t\"Let us continue tomorrow, we have had enough of an Assembly for one day, we can discuss our plans tomorrow,\" Riz says.\n\t\t\t\tEveryone seems to agree and a sense of relief is written on everyone's faces.\n\t\t\t\t*page_break Ending\n\t\t\t\t\"I am glad I chose you to be my partner. You saved our land from becoming divided, you saved our land from itself. \n\t\t\t\tI would not want anyone else by my side.\n\t\t\t\t*line_break\n\t\t\t\tSo are you ready for whatever we are up against?\" Riz says looking into your eyes.\n\t\t\t\t*page_break Sneak Peek\n\t\t\t\tIn the world of Mazeef there exists many lands: Alfarid, Zeron, Thalkit, Windsfur, the Ivik Alliance, and more.\n\t\t\t\tMany of these lands do not know of the others' existence.\n\t\t\t\tThey could only travel to other lands that they were connected to, not ones separated by huge bodies of water.\n\t\t\t\tHow were they to make such journeys across such vast and treacherous oceans and seas?\n\t\t\t\tWith the arrival of new inventions this problem too would be solved.\n\t\t\t\tA lot of things are about to change. What will happen when these lands meet. What will happen to the factions? Will there be peace?\n\t\t\t\t*page_break The End\n\t\t\t\tOr will there be war?\n\t\t\t\t*goto ending\n\t\t\t#The reason why Safistan was not hit was because of East Trios. They must not have been able to cross rivers.\n\t\t\t\t\"That must be why only the south-eastern part of our land was raided, Pani river must have forced them to go south,\" Ganbaro says.\n\t\t\t\t\"Yes, That makes sense if they came from east of the Deserted Mountains. Aganbad was hit first then Badalpani, then Kelisgar.\" Riz adds.\n\t\t\t\t\"Could the raiders not cross the river for fear of water or was the terrain impassable for them?\" Sufian asks.\n\t\t\t\t\"Let us continue tomorrow, we have had enough of an Assembly for one day, we can discuss our plans tomorrow,\" Riz says.\n\t\t\t\tEveryone seems to agree and a sense of relief is written on everyone's faces.\n\t\t\t\t*page_break Ending\n\t\t\t\t\"I am glad I chose you to be my partner. You saved our land from becoming divided, you saved our land from itself. \n\t\t\t\tI would not want anyone else by my side.\n\t\t\t\t*line_break\n\t\t\t\tSo are you ready for whatever we are up against?\" Riz says looking into your eyes.\n\t\t\t\t*page_break Sneak Peek\n\t\t\t\tIn the world of Mazeef there exists many lands: Alfarid, Zeron, Thalkit, Windsfur, the Ivik Alliance, and more.\n\t\t\t\tMany of these lands do not know of the others' existence.\n\t\t\t\tThey could only travel to other lands that they were connected to, not ones separated by huge bodies of water.\n\t\t\t\tHow were they to make such journeys across such vast and treacherous oceans and seas?\n\t\t\t\tWith the arrival of new inventions this problem too would be solved.\n\t\t\t\tA lot of things are about to change. What will happen when these lands meet. What will happen to the factions? Will there be peace?\n\t\t\t\t*page_break The End\n\t\t\t\tOr will there be war?\n\t\t\t\t*goto ending\n\t#So... can we continue our investigation now or what?\n\t\t\"...Oh sorry I bored you,\" Riz sighs. \"I just thought you wanted to know a little bit more about me.\" \n\t\tThe rest of the day is used to rest from all the previous investigating and travelling.\n\t\t*page_break The next day\n\t\t\"Hey, I managed to pull a few strings and got the Assembly to meet up again. Actually it was not really me, it was the other Musfirs just doing their jobs.\n\t\tNow once the Assembly meets, we and other Musfirs who were investigating will lay out all the information we have collected so that we can all decide on the course of action,\" Riz says.\n\t\t\"What if a faction refuses?\" you ask.\n\t\t\"A faction has no choice but to accept because if they decline they will be assumed to be the raiders. It might be a dirty tactic, but it will help us get to the bottom of this,\" Riz replies.\n\t\t\"So could not each faction just have given information to the others about what was happening to their lands?\" you ask.\n\t\t\"Honestly they could have and I do not know why they did not. I assume it was because they did not trust the other factions enough. \n\t\tThey shared that they had been invaded but not any other specific information. The problem was that no one was really trying to put all the pieces together either. \n\t\tAlso, the raids happened all of a sudden with not enough time to properly account for much of anything,\" Riz says.\n\n\t\t\"Let us get back to the task at hand, are you ready for the Assembly?\" Riz asks. Before you know it a day or two flies by and...\n\t\t*page_break The Assembly has begun\n\t\tAll the faction leaders are here as well as their advisers. The air is tense. The other investigators besides Riz and you are getting ready to explain their findings.\n\t\tYou have an overwhelming sensation take over you. \n\t\t\"Hmmm, may I have a second to gather my thoughts?\" you whisper to no one in particular, not that anyone was paying attention to such an inaudible question.\n\t\t*page_break gathering thoughts\n\t\tYou focus your mind and take a deep breath. \n\t\tBy the time you are ready all the other investigators have already informed the Assembly about their findings and all eyes are on you or so it feels like.\n\t\t*page_break\n\t\t\"${name} and I have went to all four factions and investigated. We have found out that the raids are coming from the east.\n\t\t\"Yes we know that already, almost all of the Musfirs have said this,\" one of the faction leader's council member interrupts.\n\t\t\"I am not finished yet. As I was saying we found out the raids are coming from the east. \n\t\tSome of the raided homes in Aganbad have signs of damage to the floor and the beds look like they have not been made.\n\t\tSafistan reports say that Aganbad was attacked first, then Badalpani, and then Kelisgar.\n\t\tBadalpani was actually only attacked from the direction of south-east. \n\t\t\"Yes we get it, everyone was attacked from the east,\" another council member cuts Riz off and you realize that everyone is starting to get inpatient except for Chalchar, \n\t\the seems furious because Aganbad is the eastern most faction.\n\t\t*page_break\n\t\tTrying to come to the rescue of Riz you says, \"We also learned that Safistan was not invaded.\" \n\n\t\tYou hears gasps.\n\t\tIt feels like time has come to a halt.\n\n\t\tThen someone responds, \"What do you mean not invaded, were they not raided like all the other factions?\" at this point you do not even know who is speaking.\n\t\t\"Yes, that is what I mean, they were not raided,\" you say. The seriousness in the room could alone kill a jester, everyone seems worried except for Sufian and Chalchar who's anger has switched to relief.\n\t\tThe Safistan council members look like they are about to faint while Soron looks like he is about to explode.\n\t\t'Chalchar must not be worried because now he has less heat on him, but why is Sufian not worried? He must have wanted us to say this.' you try to think as chaos starts to ensue.\n\t\tSoron and the other council members are trying to defend Safistan while everyone is accusing Safistan of lying and worse. Sufian joins in trying to defend Safistan as ideas are thrown about destroying Safistan and its people. \n\t\tYou can see the sweat drip off of faces.\n\n\t\tDrip. You watch a particular bead of sweat fall off of a face.\n\n\t\tDrop. It lands on the floor.\n\n\t\tYou are having a hard time thinking with all the noise, you try to block it out.\n\t\tThis time someone overly enthusiastic flings his hand to the side for emphasis and drops of sweat land on your face. \n\t\tJust as you hurriedly try to wipe off someone else's sweat off of your face you hear, \"ENOUGH!\" The room falls silent.\n\t\tRiz continues,\"We are not getting anywhere like this, I say we vote\"\n\t\tMurmurs occur but no one stands up to object the idea.\n\t\tYou are not sure if your opinion will count but you think the raiders are from...\n\t\t*fake_choice\n\t\t\t#Safistan\n\t\t\t\t*set Morality -5\n\t\t\t#Aganbad\n\t\t\t\t*set Morality -5\n\t\t\t#Kelisgar\n\t\t\t\t*set Morality -5\n\t\t\t#Badalpani\n\t\t\t\t*set Morality -5\n\t\t\t#Something is not right\n\t\t\t\t*set Morality +5\n\t\t\"Can we vote more than once,\" Zefir says with a smirk.\n\t\tRiz says no and the voting begins.\n\t\t*page_break\n\t\t\"A e they to make such journeys across such vast and treacherous oceans and seas?\n\t\t\t\tWith the arrival of new inventions this problem too would be solved.\n\t\t\t\tA lot of things are about to change. What will happen when these lands meet. What will happen to the factions? Will there be peace?\n\t\t\t\t*page_break The End\n\t\t\t\tOr will there be war?\n\t\t\t\t*goto ending\n\n\t\t\t\n*label ending\n*page_break\nWe hope you've enjoyed playing [i]Factions: Raids of the Divided.[/i]\n\n*feedback\n\nWe release new games on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n\n\n\n", "aganbad": "*label Aganbad\nAs your party arrives in Aganbad you noticed the change around you. No longer are there as many trees.\nThis area has more of a desert feel to it. The air is drier. The weather is a lot warmer. 'So the factions might have been based on weather,' you muse.\n\"Where should we start looking?\" you say.\n\"Since the reports of the raids where on the outskirts of their territory we should start there.\nWe should be close,\" Riz replies.\n*page_break\nAs the two of you arrive at what seems to look like where the raids took place, you both immediately get to work. You take in the scene in front of you.\nAlthough this area is part of Aganbad there are very few signs of inhabitance, and the few homes in the distance look ransacked. \nWhat remains of the entrance of one particular home can barely be called that. The door, if it can even be called that, is barely held together by fraying strands, leaving more holes than it covers. \nYour partner tells you to take this one while he will investigate another home.\nAs you enter this particular area of residency you get to work.\n'Time to look for clues.' you think to yourself.\n*choice\n\t#investigate the bed\n\t\tAs you look at the bed you notice that the bed has not been made. It is a mess... hmmm what could this mean? You will have to think about this later.\n\t\tFor now, you go back to investigating.\n\t\t*choice\n\t\t\t#investigate the window\n\t\t\t\tThe window does not seem to be broken or even damaged. You find this strange, why would the window not be damaged in a raid? You will have to think about this later.\n\t\t\t\tFor now, you go back to investigating.\n\t\t\t\t*choice\n\t\t\t\t\t#investigate the floor\n\t\t\t\t\t\tAs you scan the floor you see signs of damage as if the floor is broken in some places. You will have to think about this later.\n\t\t\t\t\t\t*goto_scene doneinvestigating\n\t\t\t\t\t#finish investigating\n\t\t\t\t\t\t*set Morality -10\n\t\t\t\t\t\t*goto_scene doneinvestigating\n\t\t\t#investigate the floor\n\t\t\t\tAs you scan the floor you see signs of damage, as if the floor is broken in some places. You will have to think about this later.\n\t\t\t\tFor now, you go back to investigating.\n\t\t\t\t*choice\n\t\t\t\t\t#investigate the window\n\t\t\t\t\t\tThe window does not seem to be broken or even damaged. You find this strange, why would the window not be damaged in a raid? You will have to think about this later.\n\t\t\t\t\t\t*goto_scene doneinvestigating\n\t\t\t\t\t#finish investigating\n\t\t\t\t\t\t*set Morality -10\n\t\t\t\t\t\t*goto_scene doneinvestigating\n\t\t\t#finish investigating\n\t\t\t\t*set Morality -25\n\t\t\t\t*goto_scene doneinvestigating\n\t#investigate the window\n\t\tThe window does not seem to be broken or even damaged. You find this strange, why would the window not be damaged in a raid? You will have to think about this later.\n\t\tFor now, you go back to investigating.\n\t\t*choice\n\t\t\t#investigate the bed\n\t\t\t\tAs you look at the bed you notice that the bed has not been made. It is a mess... hmmm what could this mean? You will have to think about this later.\n\t\t\t\tFor now, you go back to investigating.\n\t\t\t\t*choice\n\t\t\t\t\t#investigate the floor\n\t\t\t\t\t\tAs you scan the floor you see signs of damage, as if the floor is broken in some places. You will have to think ab \tAs you look at the bed you notice that the bed has not been made. It is a mess... hmmm what could this mean? You will have to think about this later.\n\t\t\t\t\t\t*goto_scene doneinvestigating\n\t\t\t\t\t#finish investigating\n\t\t\t\t\t\t*set Morality -10\n\t\t\t\t\t\t*goto_scene doneinvestigating\n\t\t\t#finish investigating\n\t\t\t\t*set Morality -25\n\t\t\t\t*goto_scene doneinvestigating\n\t#don't bother actually investigating, pretend to work then finish\n\t\t*set Morality -50\n\t\t*goto_scene doneinvestigating", "badalpani": "*looplimit 10000\n*label Badalpani\nRiz tells you that Badalpani actually has two territories. One on the mainland and one island that is north of the mainland. \nBadalpani has  nice, cool weather. The sun is not excessively hot and the winds are not excessively strong. This would be a nice place to take a nap.\n\"Hey ${name}, where would you live if you got to choose everything about your dream home?\" Riz asks.\n*fake_choice\n\t#I want to live in the desert where the houses are far apart and I am at peace with the sand around me\n\t#I want to live here in Badalpani where the wind perfectly complements the sun and the water is just the right shade\n\t#I want to live in a fancy house with lots of surrounding homes, we can all get together for festivities\n\t#I do not need too much luxury a simply house will do, I am more concerned living happily with family and friends\n\t#I actually do not care at all\n\t#I am not sure yet, I still need time to decide what I truly want\n\"Oh I see...\", Riz replies.\n*line_break\nBut you are not here to relax, you are here to investigate.\nThis is why the two of you hurry and get to Ganbaro so you are not tempted to take it easy and become distracted.\nGanbaro is like the opposite of Chalchar yet somewhat similar looking.\nHis size and weight are strikingly similar but he is not nearly as comical to look out. He does not have that moustache that curls in on itself.\nAnother difference is that he has grey hair and ice cold blue eyes. He also has a stubble and sharp eyebrows.\nThis adds to what people would say a rather cold aura. Ganbaro's presence is not that big or intimidating per-say, it is just slightly cold... \nAt least that is what you think people would think of him, on the other hand, you do not get this aura. \nMaybe it is just for show and you can see right through it, which would mean he is not that scary of a guys after all. Yes, that is what you conclude and you finish your observations.\n\n\"Welcome,\" Ganbaro says.\n\"We would be more welcoming but as you might know by now that we were also hit by the raids,\" he continues.\n\"It is no problem at all, in fact, the scenery on the way here was breathtaking,\" Riz says.\n\"Yes I cannot believe at how much cool, clear water is here, it is wonderful,\" you add.\n*line_break\n\"It is indeed but it can also be burdensome,\" Ganbaro says.\n\"Taking people, animals and supplies back and forth from our island back to the mainland here can get difficult,\" Ganbaro continues.\n\"The two of you probably heading to the island sometime right?\" Ganbaro asks.\n\"Yes, we probably are,\" Riz says.\n*line_break\n\"I can offer the two of you a way there if you complete a haul for us, you just have to take a few things to the island,\" Ganbaro says.\n\"Okay, that saves us from having to swim all the way there, haha, glad I can swim\" Riz jokes.\n\n\"Wait, can you swim ${name}?\" Riz stops laughing and asks.\n\"Yes, I can,\" you reply.\n*page_break\n\"This here is one of Badalpani's mini-boats. It can take up to one passenger or large object. \nBecause there are three things you have to take you will have to go back and forth repeatedly.\n\nThe three things are a sack of grain, a chicken, and lumber.\nThe problem is you cannot leave the chicken alone with the grain because it will peck at it and destroy the sack, \nand you cannot leave the chicken alone with the lumber because it will scratch at the lumber and ruin the quality. \nOnce all three are in the island you do not have to worry about them and your task will be complete. \nAlso once you are done using the mini-boat you can leave it on the shore\" Ganbaro informs.\n\n\"That sounds almost impossible,\" Riz states.\n\"Well good luck, I am off to plan for any other threats.\" Ganbaro says as he walks away.\n\"Since we have to do this haul and the boat can only take one passenger how about you complete the haul, \nand I will just investigate the raided areas of the mainland.\nYes that sounds like a good plan, see you later at this spot,\" Riz says then leaves to investigate.\nYou are left with a sack of grain, a chicken, and lumber.\n*page_break\nWhat do you want to take along to the island?\n*label question\n*choice\n\t#chicken\n\t\tYou drop the chicken off at the island. What do you want to take back?\n\t\t*choice\n\t\t\t#chicken\n\t\t\t\t*set Morality -25\n\t\t\t\t*goto question\n\t\t\t#nothing\n\t\t\t\tYou are back at the mainland. What do you want to take to the island?\n\t\t\t\t*choice\n\t\t\t\t\t#lumber\n\t\t\t\t\t\tYou drop lumber off in the island. What do you want to take back?\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#lumber\n\t\t\t\t\t\t\t\t*set Morality -25\n\t\t\t\t\t\t\t\tYou realize that is not a good idea.\n\t\t\t\t\t\t\t\t*goto question\n\t\t\t\t\t\t\t#chicken\n\t\t\t\t\t\t\t\tYou drop the chicken off at the mainland. What do you want to take to the island?\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#chicken\n\t\t\t\t\t\t\t\t\t\t*set Morality -25\n\t\t\t\t\t\t\t\t\t\tYou realize that is not a good idea.\n\t\t\t\t\t\t\t\t\t\t*goto question\n\t\t\t\t\t\t\t\t\t#sack of grain\n\t\t\t\t\t\t\t\t\t\tYou take the sack of grain to the island. What do you want to take back to the mainland?\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#sack of grain\n\t\t\t\t\t\t\t\t\t\t\t\t*set Morality -25\n\t\t\t\t\t\t\t\t\t\t\t\tYou realize that is not a good idea.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto question\n\t\t\t\t\t\t\t\t\t\t\t#l e. I have some stress that needs to be relieved.\n\"Ha..ha,\" Riz laughs nervously, \"We had better get going\".\n\nBefore you get a chance to turn around, Chalchar pulls you in for a bear hug.\n\"HA HA HA I cannot let you leave with a grand hug. You seem like you two actually want to help,\" the air in your lungs escape as you feel your back being squeezed.\nChalchar turns to Riz.\n\"No thank you I am fine\" Riz says trying to shrink into invisibility.\nChalchar picks up Riz but only gives a light hug.\n'Why did he want to only break my back?' you think.\nA few minutes later as the two of you venture out of Aganbad Riz says,\"Where do you think we should go now?\"\n*choice\n\t*selectable_if (Badalpani = false) #\"Badalpani\"\n\t\t*set counter +1\n\t\t*set Badalpani true\n\t\t*page_break\n\t\t*goto_scene badalpani\n\t*selectable_if (Kelisgar = false) #\"Kelisgar\"\n\t\t*set counter +1\n\t\t*set Kelisgar true\n\t\t*page_break\n\t\t*goto_scene kelisgar\n\t*selectable_if (Safistan = false) #\"Safistan\"\n\t\t*set counter +1\n\t\t*set Safistan true\n\t\t*page_break\n\t\t*goto_scene safistan\n\t*selectable_if (counter > 3) #Finished Investigating\n\t\t*page_break\n\t\t*goto_scene after4", "doneinvestigating2": "*label DoneInvestigating\n*disable_reuse Globally\nAs you finish investigating you look to see if your partner has also finished. He seems to be talking to someone.\nYou go to where the two are talking\n\"Ah, there you are ${name}, this is Chalchar, the leader of Aganbad.\" Riz says.\nChalchar is a beefy man with hair that is black with a slight red hue to it.  His eyes are brownish red, and he has a moustache that curls in on itself. \nHis skin seems to have been darkened from the sun, and he stands tall with certitude. In short, he is tall, dark, and handsome.\n\n\"It is an honor to meet you\" you say.\n\"No need for such formalities, I heard you two are investigating. Where do you plan to go after this?\" Chalchar says.\n\"Actually we haven't decided\" Riz says.\n\"Well if you find out who is behind theses raids be sure to tell me. In fact, feel free to hand them over to me. I have some stress that needs to be relieved.\n\"Ha..ha,\" Riz laughs nervously, \"We had better get going\".\n\nBefore you get a chance to turn around, Chalchar pulls you in for a bear hug.\n\"HA HA HA I cannot let you leave with a grand hug. You seem like you two actually want to help,\" the air in your lungs escape as you feel your back being squeezed.\nChalchar turns to Riz.\n\"No thank you I am fine\" Riz says trying to shrink into invisibility.\nChalchar picks up Riz but only gives a light hug.\n'Why did he want to only break my back?' you think.\nA few minutes later as the two of you venture out of Aganbad Riz says,\"Where do you think we should go now?\"\n*choice\n\t*selectable_if (Badalpani = false) #\"Badalpani\"\n\t\t*set counter +1\n\t\t*set Badalpani true\n\t\t*page_break\n\t\t*goto_scene badalpani\n\t*selectable_if (Kelisgar = false) #\"Kelisgar\"\n\t\t*set counter +1\n\t\t*set Kelisgar true\n\t\t*page_break\n\t\t*goto_scene kelisgar\n\t*selectable_if (Safistan = false) #\"Safistan\"\n\t\t*set counter +1\n\t\t*set Safistan true\n\t\t*page_break\n\t\t*goto_scene safistan\n\t*selectable_if (counter > 3) #Finished Investigating\n\t\t*page_break\n\t\t*goto_scene after4", "fairy_cog": "In the land of Alfarid there resides four factions: Aganbad, Badalpani, Kelisgar, and Safistan.\nEach faction having their own leader and way of life.\nThese factions have been at peace for ages; however differences between the leaders have started to rise.\n\nFurthermore, news of recent raids has started to spring up and shake the lands.\nThe people of these lands having had peace for so long are immediately concerned about this. \nNot to mention the lives being ruined by the raids.\nBecause of this surprising threat, the leaders of each faction realized that these raids must be stopped or at least feigned interest to not seem suspicious.\nWho would wish to en ust one more investigator. We will start by going to Aganbad,\" Riz says slightly annoyed.\n\t\t\t\t\t\t\t\t*set counter +1\n\t\t\t\t\t\t\t\t*set Aganbad true\n\t\t\t\t\t\t\t\t*finish\n\t\t\t\t\t\t\t#\"I was just kidding, I guess I will help\"\n\t\t\t\t\t\t\t\t\"Very funny, anyway we are heading to Aganbad first. I hope you like the heat.\"\n\t\t\t\t\t\t\t\t*set counter +1\n\t\t\t\t\t\t\t\t*set Aganbad true\n\t\t\t\t\t\t\t\t*finish\n\t\t\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\n\t\t\t\t\t\n\t\t\n\n\n\n ", "kelisgar": "*label Kelisgar\nAs your party arrives near Kelisgar you noticed the change around you. Kelisgar would be just a giant plain of grass as far as the eye can see if there were not so many buildings. \nThe homes over here seem large and numerous.\n\"We should be nearby, as the raids took place in the outskirts of Kelisgar.\" Riz says.\n*line_break\n\"Wow, if this is the outskirts I wonder how the center of Kelisgar looks, it must be packed.\" you say.\n*line_break\n\"Wait what is that?\" Riz says.\n'As you look to what Riz was pointing at you see an area blocked off.\nThat must be the area that got raided, but why is it closed off,' you think.\n\nWhen you get closer you see two guards posted near the entrance and exit of the raided zone.\nOne of the guards sees the two of you and says in a monotonous, bored tone, \"Sorry our orders are not to let anyone in if you want to go speak with Zefir.\"\n'He must  be their leader,' you think.\n\"And where is Zefir.\" you ask.\n\"Zefir is in the center of the city, you will know where he is when you get there.\" the guard says.\n\"Enjoy your trip at the center of Kelisgar, it is a quite a sight if you are seeing it for the first time,\" the other guard chimes in.\n\n*page_break\nThe guard was right. Kelisgar is a breathtaking sight but the two of you do not have the luxury of exploring. Riz manages to find Z o have been raiding the people of Alfarid? What are they?\nAnd what will be the people of Alfarid's response?\n*page_break\nWho are the raiders?\n*fake_choice\n\t#Aganbad\n\t#Kelisgar\n\t#Badalpani\n\"Safistan,\" you tell the Assembly.\n*line_break\nThe Assembly erupts into chaos. You see a horde of people charging with weapons of all kinds. Swords and Axes directed at Sufian. \nSomeone reaches Sufian as swings his sword at his\n*page_break ...\nYou wake up with a startle. Riz rushes into the area you were sleeping in.\n*line_break\n\"I keep getting this nightmare. Everyone charges at Sufian and right when someone is about to attack I wake up,\" you say.\n\n\nWhat if I had said Safistan instead of realizing the raiders came from the east.\n\n*ending", "sadending": "Sadly, you were unable to complete your investigation.\nWhether you were unable to gather the clues, you ran out of morality, or you could not complete your tasks, Alfarid could not be saved.\nAlas, it was not meant to be this time.\nNo one knows whether the fate of Alfarid was forgotten or that you were forgotten. \nThe people of Alfarid could not figure out who was behind the raids. How did they get away or hide their loot so well?\nWithout ${name} something just did not add up. No one could put all the pieces together.\nWho were the raiders?\n\nWho were they indeed? And will the land end up as just another faded memory? \nA bedtime story for children, a frightening story to discipline kids, or a motivational tale for those that need it?\n\nWorry not, we shall not take failure sitting down, we will rise and solve this case.\nPlay again to find out who the raiders are and crack the case. Play again to save Alfarid, the land that needs YOU.\n*ending", "safistan": "*label Safistan\nAs soon as you enter Safistan you see guards. \nWhen you are in range to carry a conversation with them they surprisingly welcome you before you have a chance to do anything else.\n\"Welcome to Safistan, who might you two to be.\" one of the guard says.\n\"This is ${name} and I am Riz,\" your friend says.\n*fake_choice\n\t#stay silent\n\t\t*goto skip\n\t#\"Well met\"\n\t\t*set Kindness +2\n\t\t*label skip\n\t\t\"You two must be on business, we will take you to see Sufian right away.\"\n\t\tNot really given a choice the two of you are led to this Sufian. \n\t\t\n\t\tYou are brought before a group of people. You cannot tell who Sufian is by their clothing, they all seem to wear a similar garb.\n\t\tYou then realize one particular man is giving off a greater aura then the others, as well as the other two men's eyes keep shifting from this Sufian to Riz and you.\n\t\t*line_break\n\t\tWhat is distinct about Sufian are his eyes. They have a kindness to them. \n\t\tSufian has a long beard that connects to a faint moustache. His long black hair comes down from a sort of cap. \n\t\tHe is also wearing a flowing robe which hides what is probably a muscular build.\n\t\t*page_break\n\t\t\"Well met, I assume the two of you were brought here with care\" Sufian says.\n\t\t\"Yes, your guards are quite nice for...eh guards,\" Riz says.\n\t\t\"So why are the two of you here?\" asks Soron, one of men standing besides Sufian.\n\t\t*line_break\n\t\t\"Soron let us not be hasty, you do not have to answer that travellers, actually would either of you like a cup of tea?\n\t\t*line_break\n\t\tWe can discuss all this over a nice hot cup of tea,\" Sufian asks.\n\t\t\"Yes,\" Riz says.\n\t\t\"You are too kind,\" you follow.\n\t\t*line_break\n\t\t\"Also, how about a riddle? 'T' to the left of me. 'T' to the right of me. 'T' inside of me, what am I?\n\t\t\n\t\t'Why is he asking us a riddle?' you think.\n\t\t*choice\n\t\t\t#plant\n\t\t\t\t*goto wrong1\n\t\t\t#potato\n\t\t\t\t*goto wrong1\n\t\t\t#tar\n\t\t\t\t*goto wrong1\n\t\t\t#thermostat\n\t\t\t\t*goto wrong1\n\t\t\t#timber\n\t\t\t\t*goto wrong1\n\t\t\t#trash\n\t\t\t\t*goto wrong1\n\t\t\t#tea pot\n\t\t\t\t\"Interesting, here is another. If you say me out loud I will disa
