g, you dress and come downstairs with \nGretchen. Your mother and her handmaiden are surprise to \nsee the two of you.  \n\n\"I simply understood that you were going to leave quite \nearly, and yet here you are.\"\n\n\"Mother,\" you look at her, unable to smile, \"I really \ndon't want to go outdoors. I think I'll stay in today, \nmaybe play a board game with Anna.\"\n\nYour mother frowns.\n\n\"Nonsense. Come with me for some berries and cream, put \non your riding habit, and get out for some fresh air.\"\n\n*page_break\n\nShe puts your arm through hers and walks with you to the \ndining room.\n\n\"Besides,\" she continues, \"I'm told that it's ready for \nyou to see.\"\n\nYou look at her furling your brow. \"What's ready?\"\n\nShe simply smiles and continue escorting you to the \ndining room table.\n\nThe stable boy has brought both of your's and Gretchen's horses \nout. You immediately notice that Daisy is wearing a new saddle. \n\n\"Where did this come from?\" You indicate the saddle to the \nboy.\n\n\"I'm sorry, m'lady, is there something wrong with it?\" He \nlooks at you fearful.\n\n\"Oh, don't bother,\" you respond with a sigh. \n\nThis is turning into a strange enough day. Why worry over \na riding saddle? You did need a new one, after all. \n\nMaybe your father is surprising you and why your mother \ninsist that you go for a ride. You must thank them when \nyou return.\n\nStill upset by the incident with the Hag, you automatically \nlead Daisy to the major oak.\n\n*page_break\n\nThe men are not as rowdy as they usually are. I mean, yes, \nthey're being talkative and cheerful, but they're also doing\nmore positive things for themselves and each other.\n\nIn an open area, for example, there are two men working\ntogether butchering a deer with another freshly killed doe \nwaiting to be clean and dress laying nearby on the ground.  \n\nAnd when did the camp get a blacksmith? \n\nAnd did you notice the wood-fire oven, which is dreadfully \nneeded to keep the men from stealing bread from bakers in \nthe nearby hamlets. \n\nThey seem to go about their chores without a making a \ncare in the world cooperating with one another.\n\nWhat's going on? This camp has never been this productive.\n\nYet, all of that isn't the biggest thing you mark as being \nthe most different as you move futher into Robyn's hide out.\n\nYou didn't recognize anyone.\n\nYes, some of the men have always come and gone according to \ntheir finances and status with the law, but there has always \nbeen the men who are loyal and live with Robyn. \n\nAs men pass you, on horse or by foot, they smile and nod they're \nheads, as if they know you, but you cannot recall anyone by their \nChristian name.\n\nNow you're sure of it: There is no Brit, Hugh, Bert or Gaunter. \n\nWhere's Lars, Allan, Will Scarlett, and Little John? You wonder. \nWhere's William, Jack and Gretchen's Tuck?\n\n*page_break\n\nYou're not panicking yet, but this is very odd. Sure, you don’t \nrecognize anyone, so you simply have to ask after Robyn.\n\n\"Where's Robyn? Did he go somewhere with Tuck or someone else?\"\n\nYou always receive a polite, shrugging of shoulders and the \nresponse,\"I'm sorry, m' Lady, but I don't know a Robyn.\"\n\nNow you're confuse, frighten, and ready to cry.\n\n\"Maybe we should ride into Nottinghamshire for something to eat \nand a strong drink,\" Gretchen suggest.\n\nJust then, someone approaches you and looks up with a smile that \nhas a couple of teeth missing.\n\n\"M'lady, I'm Jared.\" He bows. \"I was given orders to take you to \nthe property in the Dunkeries whenever you're ready, being you've \nnever been there afore.\"\n\nYou look down at the man. He looks old, older than your father, \nbut he's clean and wearing neat clean clothes as the Merry Men \nalways have. That isn't different about the camp below the \nmajor oak. \n\nYou nod your head, and he runs off to get his horse.\n\n\"You're going off with this stranger?\" Gretchen's voice is \nserious.\n\n\"Well, he was given orders, and we both have weapons.\"\n\n\"What if it's a trap?\"\n\n*page_break\n\nYou look at Gretchen and sigh. \"It's not a trap, and now you've \ngot me even more curious as to who is calling me to the Dunkaries.\"\n\nYou ride for an hour, nothing unusual occurring, when you see \nin the distance construction of a two level building is in progress. \nWhen you arrive at the edge of all of the activity, you can see two \nbuildings that are complete.\n\nA short distance away, you see  Brit, Hugh, Bert, and Gaunter, moving \nabout their business, carrying this or that.\n\nLars, Allan, and Will Scarlett,  are working on something together, \nand shouting at one another. Lars looks up and sees you. He calls \nout and waves, so does Allan and Will. \n\nLittle John appears out of no where, walking up behind you.\n\n\"I'll take care of the ladies, Jared. Why don't you take their horses?\"\n\nHe smiles as he dismounts, grasping the reigns of all three horses after \nLittle John helps you and Gretchen dismount.\n\n\"Oh, Little John!\" You say with a sudden release of emotions and put \nyour arms around him.\n\nYou really caught him by surprise. He gently pushes you away, then tenderly \nspeaks.\n\n\"Are you all right?\"\n\n\"I've just had a really odd couple of days.\"\n\n*page_break\n\n\"Well, you'll be fine as soon as you're with him.\"\n\nHe smiles.\n\n\"Uh, Little John...where's Tuck?\" Gretchen ask. \n\nHow sweet! Our dear Gretchen cheeks are turning pink!\n\nLittle John smiles knowingly. \"You'll see him soon, too.\"\n\nThen, behind you comes Tuck, William, and Lars walking side by \nside with the man they now call Robert. \n\n\"There you are darling! I thought you'd never come to see what \nI've done so far.\" He gives you a kiss on the forehead.\n\nHe puts your arm through his and begins to give you the tour.\n\n\"Robyn, what is all this?\"\n\nHe stops, turns you, and looks you straight in the eyes.\n\n\"Why did you just call me Robyn?\"\n\nAnd then it hit you like a zap of lightning. Despite her little \ngame last night, the Hag of 49th Street is true to her word.\n\nYou search the depths of his eyes, and you knew, and, still you\ncouldn't believe it.\n\n\"Oh, Robert, is it really [i]you[/i]?\"\n\nHe frowns.\n\n\"Of course it's me.\"\n\n*page_break\n\n*image hoodandmaid.png left\n\n\"And all of this land is yours?\"\n\n\"[i]Ours[/i], Lady Dore. It's [i]ours[/i].\"\n\n\nYep, this is Lord Robert Dore, your husband, the one who has \nregain his previous life back because of you doing something \nextremely special for The Hag of 49th Alley.\n\nHe doesn't remember being Robyn Hood. The Hag gave him and \neveryone else new memories. \n\nHe thinks he helps the men of Sherwood Forest live in a more \nproductive manner at the major oak. When he's able to, he finds \nthem a job, even if it means working for him or his mother. The \ncaves keeps their treasury that they no longer add to, but use \nwhen needed. Only Robert's trusted men know how to find them.\n\nYou wrap your arms around him feeling like you can never let go. \nYou got the last two years of your own life back!\n\nA few feet over, Gretchen stands and watches Robert pick you up \nand swing you around. Then Tuck approaches her and presents her \nwith some flowers.\n\n\"Would you like to join me for for some lunch?\" He ask.\n\n\"Oh, my, yes.\"\n\n*page_break\n\n\nThis is the end of this paticular Robyn Hood's Unusual Tale with\nMarian as the lead. \n\nYou may return to the beginning to enjoy another one of her Tales\nby linking below, or link to one of Robyn's Tales with Marian and \nhis Merry Men, or end the Tales at this point.\n\n*goto_scene ending\n\n", "mmmarian": "*label mmmarian\n\n*page_break\n\nYou and Gretchen approach the few guards in the back of \nthe Palace. You bat your eyes and speak demurely.\n\n\"You know, my dear fellows, my hand servant, Gretchen, \nhas never visited St. Edwin's Chapel. Would you do me \nthe favor of escorting her there to retrieve us a bottle \nof their fine wine? I'd be ever so grateful.\"\n\nAnd that's all it took.\n\nYou wave good bye until they are out of site of the \nstable. \n\nThen, you find your basket, quickly change clothes, pull \nyour hair into a pony tail, cut off some hair from the end, \nuse the mirror to make sure you do a good job gluing  the \nhair above your mouth, on your chin, and on your eye brows, \npin up your hair, pull on your cap, and you mount Daisy.\n\nYou know about the not-so-well-guarded area in the back of \nthe Palace, the same area Gretchen's escort are from (Gretchen \nhas instructions of turning the ride into a very long trip), \nand that's where you lead your horse to exit the Palace grounds. \n\nSoon you have cross the area and are on the main road between \nMansfield and Edwinstow Church.\n\n*page_break\n\nYou're not on the road long at all when you see two men standing \nin the middle, doing absolutely nothing. One was young, you swear \nnot much older than you; and the other was older, but not old \nenough to be your father. \n\nWhen you ride closer, you can see that they look pleasant and \nare smiling.\n\nYou hail them, remembering to lower the timbre of your voice to \nsound more masculine.\n\n\"Good day to you, strangers. I am searching for any information \nyou may have on Robert Dore, formerly of Loxley and London.\"\n\nYou're not positive, but you swear that the eyes of the younger\none go suddenly wide for just a split second before the two men \nlook at one another.\n\n\"We're not saying that we have any,\" replies the older one. \n\"We're not saying that we don't. Are you the law?\"\n\nYou didn't expect anyone to ask you that.\n\n\"Uh, it doesn't matter who I am, but I know Robert Dore, and \nI'm looking for him or any information about him.\"\n\nSuddenly, a bigger man jumps down from one of the trees.\n\n\"Maybe you should come down off of that horse,\" he says.\n\nHow do you respond?\n\n*choice\n  #You Stand Your Ground.\n\n    \"No, why should I? I only want information. Have you seen \n    Robert Dore or heard anything about him or not?\"\n\n    *set leadership  %+10\n    \n    *goto mm5c\n\n  #You Threaten Them.\n\n   \"Oh, believe me, you don't want me to get off of my horse. \n   I'll take all three of you on if I have to!\"\n   \n   *set brave %+10\n\n   *goto mm5c\n\n  #You Bribe Them.\n    \n    \"Look, I have gold coins I promise to give you if you help \n    me find Robert Dore without hurting me.\"\n\n    *set coward %-10\n\n    *goto mm5c\n\n*label mm5c\n\n\nThe big man looks at you seriously as the other two begin to laugh.\n\n\"I must insist that you come down off of that horse,\" he says as he \nreaches up and pulls you out of your saddle, and drops you onto the \nground. \n\nThe other two men are now laughing harder as two other men come out \nfrom behind some bushes.\n\n*page_break\n\nYou jump up and pull out your saber. You circle around pointing at \neach one of them. You forget yourself and speak naturally.\n \n\"You all are really making me angry!\"\n\nThey pause to stare at you for a moment, look at one another for \nanother moment, then all burst out laughing.\n\n\"Oh, we can't have that now, can we?\" Ask the oldest one as he \npulls out his sword and advance on you with a swift attack which \nwould have caught any lesser opponent off guard. You parry just \nas quickly until you have control of the next attack.\n\nThe other four men stare. What they see is what they think is a \nsubstantially small man with a high voice looking awkward in oversize \nclothing. Even your cap falls low behind your ears and your stockings \nbubble over the top of your leather boots; but you're getting the best \nof a season fighter.\n\nThe biggest one speaks to the other two and they run off.\n\nThis is a formidable opponent you're fighting, a professional \nswordsman, and you know you can't give in, nor give up.\n\nFinally, you're able to come in for the strategy attack that made \nMarco de Luna famous, the move that you shouldn't include in any \ntournament. \n\nWith a sweep of your right foot, you trip the stranger, bringing \nhim to the ground.\n\n*page_break\n  \nYou touch him square in the chest with the point of your saber.\n\nYou glare at the other two men. \n\nBreathing hard, you ask, “Now, are you going to tell me what you \nknow of Robert of Loxley, or am I going to have to skewer each one \nof you through?”\n\nThe two men take only a few moments of getting over you getting the \nbest of their friend before they roar with laughter. Not that they \ndidn't believe that you can, but because, once again, you forgot \nabout your voice. \n\nIn the corner of your eye, you can see someone steps out from behind \na bush and you think, \"Now I'm good, but this isn't fair!\"\n\n“Perhaps,\" says the man as he approaches you, \"that is a question you \nshould be asking me instead of threatening my men in such an uncivilized \nmanner.”\n\nYou realize that you know that voice.\n\nYou turn and face the newcomer, still seething; but, suddenly, you're \ndropping your sword, rushing to him and wrapping your arms around his \nshoulder, as he accepts your...\n\n*choice\n  #Hug.\n    You've missed this person.\n\n    *set romantic %+10\n\n    *goto mm5d\n\n  #Kiss on the cheek.\n    You care about this person.\n    \n    *set romantic %+20\n\n    *goto mm5d\n        \n  #Kiss on the lips.\n\n    This person is your love.\n    \n    *set romantic %+30\n\n    *goto mm5d\n\n*label mm5d\n\nThe newcomer moves away from you, hands on both of your \nshoulders.\n\n“Oh, Robert,\" you say, \"it's really [i]you[/i]! I've \nfound you!”\n\n*page_break\n\nYou flood his face with kisses, making him laugh.\n\n\"Stop! Stop! That tickles!\"\n\nThe men draw their weapons, but they just stand there with \nodd looks on their faces. \n\nThe one who looks just a little older than Stephen, ask \n“Uh, Robyn?”\n\nThe newcomer holds you off to pull off the oversize cap and \npeels off your mustache.\n\n“Men, may I introduce to you, Maid Marian FitzWater of \nBlidworth, my fiance.”\n\nThe men are first too stun to react. They gawk between you\nand your finance. Their mouths drop open nearly to their \nchest.\n\nThe biggest one is the first to remove his hat and bow.\n\n“My, lady.” He says. “Please forgive us for our rudeness.”\n\nThen the others did the same, a couple of them fumbling \nover the words,“rudeness” because it is not part of their \nvocabulary.\n\n*page_break \n\nThe oldest one is still on the ground, but he's able to\nremove his hat just the same.\n\n“Lars,\" Robert looks down at the oldest one still laying \non the ground, \"you can get up. I promise you, Marian \nisn’t going to hurt you now that she's found me.”\n\nYou cover his face with more kisses. He does less laughing \nnow that themustache is remove.\n\nThen in a rush you say... \n\n“I knew I'd find you in the forest, Robert! It only made \nsense that you would be here. I had first sent a letter off \nto your cousin Molle and Uncle Addy, and they both  claimed \nto not have heard from or seen you. That could only mean \nyou were delayed trying to get to Wales.\" \n\nYou pause to look crossly at each man.\n\n\"But these,\" you pause, \"uh, men,\" you continue, \"acted as if \nthey didn't know you.”\n\nHe smiles at you.\n\n\"They were only protecting me.\"\n\nHe looks warily around the area. \n\n“Marian, we are out in the open. Please follow us to somewhere \nmore private and then I'll explain everything.”\n\n*page_break\n\nYou replace your cap and mount your horse. Robert replaces \nhis hood and mounts his. The men mount their own horses, and \ntogether they lead you to the hidden cave in the Creswell \nCrags. \n\nAfter you've secure your horses, Robert leads you to a hidden \nopening. He lights several candles that are behind some rocks \nand bushes, and hands one to you and the rest to the men.\n\n*achieve candle\n\n“Careful,” he warns. “Step exactly where I step. There are \ntraps.”\n\nIt doesn't take long for you to notice the large opening \nahead. It isalmost as if the entire area is lit with light.\n\n“Oh, my!” You exclaim.\n\nAs you walk closer, you can see large silver candle sticks, \nand the loose gold coins sparkling as the light hits the \nground. \n\nThen you see large sacks, barrels, chests, and wooden boxes. \nSome have coins, jewelry and the likes. Others have \nnonperishable vegetables such as potatoes, carrots, and beets.\n\nThere are sacks of flour, ground corn, dried fruit, and \ndried meat wrap in cloth.\n\n*page_break\n\n“Robert, what is this place?”\n\nHe smiles because he is so proud that you are impress.\n\n“It's my, well, our, larder. That is, all of this belongs \nto myself and my men.” \n\nShe continues to look around. \"I don't understand.\"\n\n“Well, Marian, I can't return home, not now, not as long \nas they think I've murdered my step-father. So, I live here, \nin Sherwood Forest, among the other rejects of society.”  \n\n“Hey!” The largest one shouts in protest.\n\n“Give it up, William,” the second largest man warns. “You \nknow we're all rejects otherwise we'd be living in a nice \nwarm house instead of the cold dark forest.”\n\n\"Yeah,\" another begins, \"If it wasn't for Robyn, we'd be \nwearing the same clothes all of the time and eating what \nscraps we can find in the garbage.\"\n\n\"Yeah!\" The others agree.\n\n“Oh, sorry, Robyn,” the one call William says.\n\nRobert nods his head.\n\n*page_break\n\nYou look at the men and back at Robert in bewilderment.\n\n“Why are they calling you Robyn?” You finally ask.\n\n“That's my new name. The men gave it to me.” He pauses, \nspreads his legs, putting his hands on his waist, and turn \nhis head up and to the side.\n\n“Robyn Hood. Catchy, no?\"\n\nYou give him a half smile. “I guess. But, where did you \nget all of this?”\n\nYou wave your arm implying the contents of the cave.\n\nThe men snicker. You look at them with your furl brow. You \nwonder, what could possibly be so funny.\n\nThe men watch Robert, waiting for him to explain.\n\n“Uh, well, you see, Marian, we sort of, well...how can I \nput this delicately?”\n\n“We take what we want from [i]anyone[/i] we want!” Shouts \nthe oldest one and a barrage of laughter spew out from all \nof the men.\n\n“That's right!” Another affirms.\n\n“Enter [i]our[/i] forest, and your stuff is ours!” The \nyoungest one states.\n\n*page_break\n\n“We take what we want and don't say sorry.” The biggest one \nsays in a nonapologetic tone.\n \n“And we [i]ain't[/i] gonna say sorry, even if you beg us, 'cause \ndon't care!” One gets out between catching his breath and \nlaughing.\n\nRobert crosses his chest and rolls his eyes a few times saying \nnothing as his men continue to laugh and shout anything that they \nthink is funny about their line of business.\n\nWhen they had become silent, and the laughter had lowers to a \nfew guffaws, you look at Robert steadily.\n\nHe smiles.\n\n“You see, Marian,\" he starts with his version on how they live, \n\"we need to survive out here properly with clothing, tents, blankets, \nhousewares, horses, weapons, just to name a few necessities.\" \n\nHe stops for a moment to try to read you, but your expression isn't \nchanging. \n\n\"Marian, there are too many Barons and men of the rich class who \ntake advantage of the poor, and let's not start on all of the new \nproclamations your cousin keeps coming up with that is effecting \neveryone's property. And those outlandish taxes!\"\n\n*page_break\n\n\"So, what are you saying Robert, you just take anything you want \nfrom someone else?\"\n\n\"But, we also give! We're supporting the poor in the towns and \nlittle hamlets in and around the forest, the farmers, and the Abbey \nwith money, food...”\n\nYou interrupt. “Oh, I see. Basically you're saying, you take from \nthe undeserving rich to give to the struggling poor.”\n\n“Yes, exactly! We take from the rich to give to the poor!”\n\nYou put your finger to your chin and look up to think about what \nRobert has told you.\n\nYou relax and smile.\n\n“Well, Robert...I mean, Robyn...I completely support this new \nendeavor of yours.”\n\nHe exhales.\n\n\"I'm so happy to hear that you're okay with all of this.\"\n\n\"Of course, you being an outlaw has indefinitely postponed our \nwedding, but we'll work it out. I'm just happy that I've found \nyou and your, uhm, merry band of thieves\n\n*page_break\n\nRobyn and the men laugh.\n\n\"Before you return to the Palace, I want to show you the way to \nour camp. You must be careful when you are near our territory \nbecause we have many traps and signal alarms.\"\n\n\n\"All right, lead the way, then I must get back before Joan begins \nto worry and sends the guards out to look for me.\"\n\n\n\n*goto_scene mm7\n\n*finish", "mmmarianstory": "*label mmmarianstory\n\n*page_break\n\n\nYou are fourteen-years-old Maid Marian FitzWalter, eldest daughter \nof Lord and Lady Robert John FitzWalter of Blidworth.  You are \nsub-royalty and are somehow related to the King Henry II through \nyour father.  \n\nWho is your distant relative?\n\n*fake_choice\n  #William The Conqueror.\n\n   That's right! The first Norman (for Northman, also known as Vikings) \n   King Of England!\n\n  #Henry I.\n    Sorry, Marian. You should study the family tapestry better.\n\n  #Edward The Confessor.\n    No, that's going too far back.  Have a sit down chat with your\n    father about your family history.\n\n\nHello, Marian. It's very nice to meet you. I am The Storyteller and \nI am going to tell the story of you and Robert Dore, and guide you \nalong in your many adventures. \n\nWhat would you like to call me?\n\n*input_text  storyteller\n\nYou named me ${storyteller}, is that right?\n\nAm I a female, a male, or am I asexual?\n\n*fake_choice\n  #Female\n    Great! Allow me to help you with my feminine grace.\n    \nYou will find that I'm a very loyal servant and will always think \nof your needs over my own.\n\n\nLet's begin telling your story, all right?\n        \n*goto_scene mm1\n\n\n", "mmmessenger": "*label mmmessenger\n\n*page_break\n\n*image daffodil.png\n\nYou spend what seems to be an exhausting morning with Joan \nand her maidens (and, of course Gretchen is there), tatting \na new quilt and listening to Joan's woes. You act with \nconcern and interests, laughing when appropriate, showing\nsadness at other times. \n\nTruth be told, your interest lies more with the big heavy \nclock in the hallway as it chimes the hours, the quarter\nhours, and the half hours as you wait for Todd to return.\n\nJoan even catches you twice watching the door at the side \nof the room that leads out of the main hall.\n\n\"Are you expecting somebody, Marian?\" Joan ask.\n\n\"Uh? What? Oh! No, no. I just thought I heard a knock.\"\n\n\"Don't worry about any knocking at the door. The servants \nwill get it. Now,\" she laughs loudly before she continues \nher story, \"you won't believe what happens next!\"\n\nIt is tradition of society for ladies to take a rest after \nlunch, so you slowly drag your legs up to the third-floor \nto your room. You're heartsick because there is no word \nfrom Todd.\n\n*page_break\n\nIt is tradition of society for ladies to take a rest after \nlunch, soyou slowly drag your legs up to the third-floor to \nyour room. You'reheartsick because there is no word from Todd.\n\nWhat exactly does that mean? Did he find Robert, or is he \nin trouble.Perhaps some awful robbers catch him in the \nforest. If anything happens to Todd, you're the one who \nwill be held responsible. \n\n\"Don't worry,\" Gretchen says soothingly, stroking your hair \nafter you'rerecline on the bed. \"I can't believe that anything \nhas happened to him. After all, he's wearing the Palace colors.\"\n\n\"Which is exactly why he may be in trouble,\" you respond. \"I \nhope Ididn't make the wrong decision to send him into Sherwood \nForest alone.\"\n\n\"Shush,\" Gretchen says as she continues to stroke your hair. \n\"There'sno reason to worry about that right now. Calm yourself, \nmy pet, and rest.\"\n\nGretchen stays beside you until you fall asleep, although you \nsleeprestlessly with Todd on your mind: You see him in a ditch \nwith anarrow in his back, his fine clothing and leather bag \ntaken from him.\n\n*page_break\n\nWhen you wake from your nap, you discover that Gretchen is no \nlonger accompanying you as she always is. You sit straight up \nand look around the room. For a few moments you've forgotten \nthat you are at John's Palace. \n\nThere's a rush of tapping at the door that startles you.\n\nThe door comes open just crack and you hear Gretchen's low \nvoice.\n\n\"Are you awake?\"\n\nYou turn and hang your legs over the side of the bed.\n\n\"Yes, Gretchen. Have you seen Todd?\" You say just loud enough \nfor her to hear you.\n\n\"Yes, he has returned. He's waiting to speak to you in the \ngarden.\"\n\nYou waste no time putting on your slippers, hurrying out of the \ndoor,running down the stairs, and taking the back door of the \ncastle to the garden.\n\nTodd is sitting on the edge of the flower bed brick wall when \nhe hears the sound of your footsteps on the stone walk. He stands, \ntakes off his hat and bows in your direction.\n\nWhen he draws in his breath to begin speaking, you interrupt \nhim.\n\n\"Well? What did you find out?\"\n\n*page_break\n\nHe's taken aback for a moment by your abruptness. He bows again as \nhe shakes off the feeling to rush.\n\n\"Maid Marian,\" he says slowly and precisely. \"There seems to be \nsomeone who does [i]indeed[/i] know the whereabouts of Robert Dore.\"\n\nOnce again he takes a breath to continue speaking, when you interrupt \nhim.\n\n\"There is! You mean you found someone to give my letter to! What did he \nsay exactly? Will he give the letter to Robert?\"\n\nYou begin to walk around and a big circle talking to yourself.\n\n\"No, it can't be true. It can't be this simple to find him when the \nlaw hasn't found him by now. Oh dear, oh dear! What does this mean? \nMaybe I shouldn't have sent Todd out? What was I thinking?\"\n\n\"Maid Marian. Please listen,\" Todd implores you. \"You don't understand \nI think I've found Robert Dore himself.\"\n\nYou stop walking and turn in a flash to stare at him.\n\n\"What are you saying?\"\n\n\"At first the men that I met mistreated me when I told them that I was \nlooking for news of Robert Dore>\"\n\n\"Oh dear!\" You don't like hearing that. Todd is your favorite messenger.\n\n*page_break\n\nTodd rubs his left upper arm.\n\n\"I'm okay. They mostly played with me. Push me back and forth between \nthem is all.\"\n\n\"Oh, how terrible! I'm so sorry Todd!\"\n\n\"No worries, my lady. I was happy to be helping you. Anyway, at one \npoint their leader approached them.\"\n\n*page_break\n\n\"Their leader?\"\n\n\"Oh, most definitely,\" Todd began. \"This new fellow was not a brute \nand immediately told them to stop their shenanigan and to leave me be. \nAnd they  did without hesitating.\"\n\nHe stop to smile and forgot himself for a moment.  Todd reach and \ntakes your hands.\n\n\"In addition,\" he continues, \"I remember seeing Dore when he last \nvisited your home in London. Except for being a little dusty and \nwearing a green hooded cape, I know that was your finance! I'll \nsell my own sister if that wasn't Robert Dore to whom I gave your \nLetter to.\"\n\nYou squeeze his hands.\n\n\"That's right! You have seen Robert before!\" \n\nYou let go of his hands and begin twirling around.\n\n\"I knew I'd find him here! He's alive! I knew he was! Soon I'll be in \nthe man I love arms again!\" \n\nYou stop dancing only because you become dizzy and almost lost her balance.\n\n\"Oh!\" You say as you try to find one of the benches. Todd takes your hand to \nlead you.\n\n\"Thank you, dearest Todd!\"\n\n*page_break\n\nHe smiles at you.\n\n\"I must take some time to refresh myself before he arrives at the castle. \nI'll need you and Gretchen to keep a lookout in the area where I wrote him \nto meet me.\"\n\n\"Actually, Maid Marian, he believes it's safer for you to meet him at \nhis hideout.\"\n\n\"Really? Whatever for?\"\n\n\"I believe he plans on telling you that at the time.\"\n\n\"Well, how do I find this hideout of his?\"\n\nTodd takes off his Royal jacket.\n\n\"Here, take this. This way his men will know who you are when they \nsee you.\"\n\n\n*page_break\n\nIt isn't long before supper, and soon after, no one will be able \nto leave the Palace from the front gates, but you can't wait even \nanother day to see Robert now that you know he's in Sherwood Forest. \n\nEven if it's a short visit, you must verify that the man you love is \nreally alive and safe by seeing him with your own eyes, hold him with \nyour own arms, and kiss him with your own lips.\n\nYou grab Gretchen and pull her into your room.\n\n\"Did Todd have any good news?\" Gretchen ask.\n\n\"He had more than good news!\" You say as your eyes go bright. \"He saw \nRobert!\" You squeeze her hand tight and practically jump up and down \ntaking her with you.\n\nGretchen gasp. \"He saw Robert?\"\n\n\"Yes!\"\n\n\"That's incredible!\"\n\n\"I know!\"\n\n\"So Robert received your note and he's coming here?\" \n\n\"Well, Robert received my note, but for some reason he cannot come \nhere and we have to go out to him.\"\n\nGretchen nods her head. \"That makes sense. He's a notorious outlaw. \nHe can't just be out wandering around near the grounds of the Palace.\"\n\n*page_break\n\n\"That's right. So put on your riding clothes. We're going out for a \nstroll on our horses.\"\n\n\"This late? What about Joan?\"\n\n\"I'll handle Joan. Don't you worry.\"\n\nDespite the problems Joan has had during her life, she's also a spoil \nand gullible princess and you are about to use that to your advantage.\n\n\n\nYou and Gretchen walk directly in front of her wearing your riding \nhabits.\n\nShe looks at you oddly. \"Where are you going, Marian?\"\n\nWhat Excuse Does Joan Accept?\n\n*fake_choice\n\n  #You're Picking Mushrooms.\n\n   \"I suddenly had a craving for mushrooms, and Gretchen says that \n   wild mushrooms grow plentiful around the Palace in the forest. So \n   we're off to go pick some.\"\n\n   \"Oh,\" Joan says surprise. \"I had thought maybe we could play a game \n   before supper.\"\n\n   You feign innocence.\n\n   \"I'm sorry, dear. I had no idea; but you know we don't make it out \n   here that often, and these mushrooms are only around for a very short \n   period of time. I'll be about play after supper or some other time \n   while I'm here. Does that sound all right?\"\n\n   You smile and continue on your way with Gretchen behind you as \n   Joan's face turns an odd shade of pink as it does whenever she \n   doesn't get her way.\n\n   *achieve mushrooms\n\n\n  #No Where Special.\n     \n    \"I'm simply taking Daisy out for a ride. I don't like for her to \n    be stuck in the stall too long. I won't be long.\"\n\n    \"You know, our stable groom can do that for you. That's why he's \n    here, after all.\"\n\n    Gretchen looks at you, her eyes a little wide. You calmly look at \n    Joan.\n\n    \"I understand,\" you respond, \"but my Daisy is a very picky horse. \n    And being away from home makes her jumpy. I rather take her for a \n    little ride myself.\"\n\n    \"All right, but don't be long. Cook went all out for your first \n    night here. Don't make me have to send the guards out to find \n    you!\" She laughs a little.\n\n    You laugh a little back.\n\n    \"I won't. Don't worry, about me Joan. You're always worrying.\" \n    You chuckle a bit as you take one last look before you take a look \n    at Gretchen and wink your eye. \"We'll be back in time for supper,\" \n    you say behind you shoulder.\n\n  #You're Riding Out To The Church.\n\n    \"I have to ride into Edwinstowe. It's imperative that I see the \n    priest there.\"\n\n    Joan eyes go wide.\n\n    \"Why, cousin, have you forgotten that we have a priest here in our \n    own chapel?\"\n\n    \"No, of course not, dear Joan. But this matter concerns Gretchen's \n    father, and she can't make inquiries to the priest of the Prince and \n    Princess of England.\"\n\n    \"Oh, quite right.\" She looks at Gretchen.\"  \"Gretchen, I do hope it's \n    nothing too worrisome, and, remember, there is power in prayer.\"\n\n    \"Uh,\" Gretchen looks at you for a moment, \"of course I will, your \n    highness. Thank you for the kind words.\"\n\n    Gretchen forgets herself and hurries past you as you smile one last \n    time at Joan.\n\nYou've been riding for a few minutes, following the instructions that \nTodd has given you when two men exit from behind trees and approach you. \nNeither is on a horse. One is older, but not as old as your father, and \nthe other isn't much younger than your brother, Stephen. \n\n*page_break\n\nYou instinctively reach for the hilt of your saber around your waist, and\nGretchen slides the knife out from underneath her left sleeve.\n\n*achieve blade3\n\nThe two men remove their hats and bow low.\n\n\"Maiden Marian,\" the oldest one begins. \"My name is Lars and this \nhere is Jack. We were sent to lead you to him.\"\n\nYou don't say anything, but you nod your head. They help you and \nGretchen dismount and you follow them leading your horses. \n\nYou know anyone else in the forest would rob you and Gretchen, or \nworse, before riding off with your horses.\n\nAfter a short while, one large and one lanky man fall from two trees. \nYou're taken aback by their sudden appearance, but your first two \nescorts didn't act surprise. \n\nIs this where they'll rob, rape, and leave you for dead? Your hand \nreturn to your saber and you think about the long blade strap above \nyour boot. This girl isn't going to go down without a fight!\n\n\"I'm William, Maid Marian,\" the largest one says bowing his head. \n\"And that's Bert,\" he says pointing to the other with his chin. Bert \nalso removes his hat and bows. \"We'll continue to him from here.\"\n\n*page_break\n\nLars and Jack hang back while William and Bert take over. You follow \nthem further and further as the trees and bushes become denser until \nyou see two men leaning against a tree. One of them whistles real high \nand sharp before he removes his hat and introduces himself and his \npartner to you and Gretchen.\n\n\"I'm Will Scarlett, Maid Marian. Tuck and I will lead you the rest of \nthe way to him. Please make sure your horses follow our footsteps exactly. \nWalk towards the edges, closer to the bushes and trees and not in the \nmiddle of the road.\n\n\nIn the near distance, next to the major oak, you spy someone who looks \nfamiliar. He begins waving and calling your name.\n\n“Marian!”\n\nYou drop your reigns. \n\n“It [i]is[/i] you!” \n\nYou run the short distance to him. \n\nWhat do you do?\n\n*fake_choice\n\n  #You Take Him By The Hands And Look Fondly Into His Eyes.\n    You still care about Robert.\n\n  #You Let Him Lean You To The Side And Give You A Long Kiss.\n    Robert is definitely your man!\n\n  #You Take Him Into Your Arms And Hold Him Tight.\n    You've missed Robert very much.\n\nHe puts his arms around you and holds you. You wish this moment can \ngo on forever. After all of the nights of crying, after all you've \nbeen through trying to find him, you never want to let him go.\n\n*page_break\n\nHe pulls you away and looks lovingly into your eyes.\n\n“You have no idea how much I have missed you,\" he says.\n\nAs Little John helps Gretchen secure the horses, he gives her a mug of \nsomething to drink, and begin some idle chit chat, your smile fades \nas you come to a few realizations.\n\n“Robert, why did I have to meet you out here? Why didn't you sneak \ninto the Palace as instructed?”\n\n\"I'm a wanted man,\" he responds. \"One reason why I've lasted so long \nis because I don't take any chances on being seen by the wrong people.\"\n\nYou look around at the men surrounding you, laughing, singing, talking,\nand the very organize camp of tents, tables, and stools. \n\nThere's a large pit in the middle with a large lamb shank cooking over \none end, a keg sitting on the end of a long table, rush lamps hanging \nfrom the trees, and a corral of horses.\n\n\"Robert, what is all of this and who are these men?\" You indicate with\nyour hand.\n\n\"Well...\" He takes you by your hand and leads you to a set of stumps \nsitting side by side near the fire. \n\n\"This is where I live, and these are some of my men. That is, we are \nall wanted by the law and we live together, watch over the other, \ninstead of living precariously on our own in these woods,\" he says \nproudly with a big smile across his face.\n\n*page_break\n\n\"Where does all of this come from? I mean after all, I understand you \ncan make some of it, but you're outlaws. I didn't think outlaws could \nlive so well.\"\n\n\"Marian, I love you and I know you love me, right?\"\n\n\"Yes, I do Robert,\" you say looking at him tenderly.\n\n\"So I know I can trust you and I know you will understand what I'm \nabout to tell you.\"\n\n\"Of course, my darling. Anything. You can always trust me.\" \n\n\"And you will always love me?\"\n\nYou look at him sweetly.\n\n\"Robert? How can you ask that? I've lost count how many years I've \nknown you because it doesn't matter. I fell in love with you that very \nfirst day, and I can't imagine myself not loving you. When you were \nmissing from my life, I had no life.\"\n\nHe pauses for a moment, then he inhales and exhales.\n\n\"Marian, I'm Robyn Hood. And these men? Well, they're all outlaws and \nthey help me take from the rich, give to the poor, and we keep what we \nneed to for ourselves.\"\n\nYou look at him with a blank face.\n\n*page_break\n\n\"You're the one robbing from the rich on the roads through Sherwood \nForest?\"\n\n\"Yes, but...but we give food, money, and other things to the poor to \nhelp the them live and to pay their taxes that your cousin keeps \nraising.\"\n\nHow do you react?\n\n*fake_choice\n\n  #You Accept What He Tells You.\n\n    Well, of course you accept what he tells you. Why would he lie about \n    something like this?\n\n    \"Robert Dore,\" you say, \"you can call yourself Robyn Hood, if this is \n    what you need to do. I'm simply happy that you're alive and in my\n    my life again.\"\n\n  #You Scold Him.\n\n    Really, Marian. You finally find Robert and you're going to scold\n    him?\n\n    \"I've been worried sick about you! I cry myself to sleep every night \n    not knowing if you're alive or dead, wondering if you've been caught \n    by the Sheriff or other law officer, or laying in a ditch somewhere \n    with an arrow in your chest. I've sent my baby squirrels everywhere \n    searching for you with no results. Did you ever stop and think that \n    the one who loves you with all her heart and soul should've been \n    contacted some how and told that you are alive and well and living in \n    Sherwood Forest? And because...\"\n\n  #You Stare At Him In Disbelief. \n    \n    This is certainly a surprise. What are you going to say to Robert, \n    and what are you going to do?\n\n    Right now, all you do is stare at him. \n\n    What is this so bad? Is certainly explains a lot.\n\n    You blink your eyes twice.\n\n    \"Are you all right? Marian, speak to me. There's nothing I can \n    change about being Robyn Hood, this is who I am now. I can't go \n    back to being Robert Dore.\"\n \n    You blink your eyes several times and shake your head to get the\n    fuzziness out. \n\n    I think Robert might misinterpret why you're shaking your head.\n\nThe only thing you could think to do is take him by his shoulders\nand puts your lips on his as you hold him tight. \n\nWhen  you let go of one another he asks, \"Does that mean you really\ndo understand?\"\n\nYou smile and nod your head.\n\n*page_break\n\nA little later as the two of you sit together, holding hands, \ncatching up on the events over the last couple of years, Tuck\nwalks up to Robert. \n\n\"Robyn, we really should lead her back to the Palace. She's all \nready been away for some time.\"\n\n*achieve mushrooms\n\n\"You're right,\" Robert responds. \"He's right,\" he says to you \nand let's go of your hands, \"You should be heading back.\"\n\nYou look around at the men who have been very noisy as the sun \nbegins to drop below the horizon. They are enjoying each others \ncompany; laughing, hooting, singing, dancing, taking turns \nthrowing long blade knives into a tree. A sort of game, you \nfigure. \n\n\"Your men are certainly merry for a bunch of outlaws.\"\n\nHe looks around. \"I guess they are,\" he says with a laugh.\n\nYou suddenly have a great idea.\n\n\"Robert… I mean, Robyn, I want to help you and these outlaws… \nI mean Merry Men, on your endeavors to help the poor.\"\n\n\"That's great! You can be another one of my spies, especially \nat the Palace, Nottinghamshire, and in London.\"\n\n*page_break\n\nHe pulls you as he stands and gives you a hug.\n\nTuck walks up with Gretchen and your horses bringing up the \nrear. \n\nYou sigh very heavily, your eyes trying to see Robyn's eyes as\nthe sun has already set a little further.\n\n\"Well, I guess it is time to leave you to your merry band of \nthieves, but I wish I didn't have to.\"\n\n\"You can come back anytime. I'll even set up a tent with items \nyou will need especially for the two of you when you visit.\"\n\n\"Tuck is going to lead you back the way you came, and the men \nwill continue as they did bring you here. Pay close attention,\" \nhe instructs. \"We have traps and signal alarms between the main \nroads and our territory. I also have men on guard in the trees\nwho can tell me that you're on your way.\"\n\n\"Wow, you're very organized.\"\n\n\"You only know the half of it.\"\n\nThe men near by laugh. \n\n\"Next time,\" Robyn continues, \"I'll show you our main larder \nand one of our caves.\"\n\nHe smiles, and you return his smile.\n\n\"I do love you, Robyn of Sherwood Forest. Please don't ever \nthink other wise.\"\n\n\"I love you, and don't you ever forget.\"\n\n\n\n*goto_scene mm7\n\n", "mmtawn": "*label mmtawn\n\n*page_break\n\n\"Well, nice to meet you, Tawn.\"\n\n\"Why are you dress in black? And with your skin black, I don't \nsee you very well. I only know you are there because of your \nvoice.\"\n\nYou smile.\n\n\"That's the point, Tawn. I want to make it difficult for the \nDark Elves to see me.\"\n\n\"That's a smart idea,\" she says, then smiles.\n\n\"You just smiled!\" You said excitedly trying not to raise your \nvoice too loud.\n\nShe looks at you like she doesn't understand.\n\n\"I've been with the adult Elves of Light since last night, and \nI've yet to see one give me a real smile.\"\n\n\"Oh, that. We learn not to show our emotions as we grow older. \nI actually slipped when I smiled at you. I have to work harder \non the that, especially being a Sintha.\"\n\n\"I've never known a race of beings quite like you before,\" you \nsay as you continue to smile. \n\n*page_break\n\nYou stand up and start looking around.\n\n\"I've got to find a way to get you out of there.\"\n\n\"He keeps it locked. I don't know where the key is.\"\n\nThe tent is very large and lavish with lacquered furniture \nand pillows everywhere. Then finally, at the last place you \nlook because it is the first place you look, the key is \nsitting on the table right next to the pillow that is holding \nthe Benign Globe.\n\n\"Here it is!!\"\n\nYou put the key into the lock and begin turning right and \nthen left, then back right again. \n\nThe lock won't turn.\n\n\"We have to hurry to find Jaeda and the others and leave \nthis place as quickly as possible!\"\n\n\"You don't have to tell me twice, Tawn. I have others with \nme right now outside looking for the others. I figure they \nshould be nearby.\"\n\nJust then, Robyn tentatively comes through the opening, \nalthough he cannot see you.\n\n“Marian,” he whispers just loud enough for you to hear him. \n“Where are you, little squirrel? What's taking so long?”\n\n*page_break\n\n“I'm right here. You won't believe who I just found.”\n\n“Jaeda?”\n\nYou keep working the key.\n\n“No, but the Globe is over there to the right. See it?”\n\n“Yes. I'll get it.” Robyn takes a few steps into the tent \nin the direction of the Globe, but then you hear Tawn say...\n   \n“Listen.\"\n\nZerkit enters the tent and you freeze bent over with the \nkey in the lock. What do you know? Watching the Elves did \ncome in handy. \n\nRobyn also freezes in mid reach for the Globe.\n\nZerkit looks around, frowning, gritting his teeth and \nsniffing the air. Squinting, he looks in the vague direction \nof Robyn and the Globe. \n\nHe sniffs the air some more as his head moves in your \ndirection. Still squinting, he eyes settles on the area \nbehind you.\n\n\"What is this? A shadow stealing my Elf?\"\n\n\"I am not a shadow, Zerkit; but I will be releasing this \nElf.\"\n\n*page_break\n\nYou stand up and face him.\n\nVery slowly, Robyn, comes out of his freeze and removes the \nBenign Globe from the pillow. He takes one step towards the \nentrance and freezes holding the Globe close to his chest. \n\nZerkit squints his eyes moving between you and Robyn. Then \nhe glares at you and growls deep in his throat.\n\n\"Grrrrrrr! Your heart is my Bemway's supper!\"\n\nYou see Zerkit unsheathes his sling blade and rush after \nyou.\n\nHe swings as you tumble away.\n\nSee, you did learn something else from the Elves just by \nwatching. Good for you!\n\nZerkit madly swings his blade where you last were in the \nshadows. This is only making him angrier.\n\nRobyn is now behind Zerkit and attacks by hitting him with \nhis shoulder as he rolls past, holding the Globe close to \nhis chest.\n\nZerkit's growl is louder as his frustration grows. He turns \nand sees the Globe roll pass him from behind. \n\n\"Grrrrrrrowl! What you are, not matter! The jacwars will \nhave your eyes always!\"\n\n*page_break\n\nAs Zerkit rushes to the wrong place and swings madly in \nfront of himself, you really want to take this time to ask \nwhat jacwars are. They likes eyes, so you assume it's some \nsort of bird, maybe?\n\n\"Get out, Marian, I've got him!”\n\nYou crawl over to the cage to get Tawn but she is no longer\nthere. You look around the tent for her, but there's too many \ndark shadows. You only hope that she ran through the entrance \nwithout anyone noticing. \n\nSuddenly, there is bright light zipping around the tent hitting \nobjects. Every object it hits flies through the air and attacks \nZerkit. Bottles and jars break on him, pillows plummet him, sheets \nof fabric wraps around him.\n\nIt is Tawn. She's escape the cage and is attacking Zerkit with \nhis own possessions.\n\nZerkit is screaming in anger and frustration.\n\n\"Arrrrrrrrrrrggh!\"\n\nYou and Robyn don't waste time running out of the tent with Tawn \nclosely behind you.\n\nBreathing hard, you look around. The center of the camp is still \nvery bright and you can here the Dark Elves enjoying themselves, \nyet you do hear some other disturbing noises not too far away that \nsounds like a scuffle. You wonder if Black Mike has anything to do \nwith that. \n\n*page_break\n\nDid he find Jaeda? \n\nYou feel Tawn clinging to your right leg.\n\n\"Tawn, I didn't know you could do that! King Jaeden lead us to \nbelieve thatnone the Fair Folk had any magical powers. He claims \nthat maybe you once did, but that was long ago and that you are \nall passive now.\"\n\n\"We don't and we are! At least, that's what I've been told by \nour Elders. They did not use any magic, and I have no idea why \nI was able to attack Zerkit like that!\"\n\n\"Well, I'm glad you did because that helped out greatly!\"\n\n\"Shush,\" Robyn says in a loud whisper.\"He's coming.\"\n\nZerkit stumbles out of the tent holding his side with one hand, \nrubbing his eyes with the other. He s e \nedges of the walls sparkle and the roof top glow, yet \nyou had no problems looking directly at anyof the \nbuildings.\n\nLida takes you into the entrance way of one of the buildings. \nShe guides you through an open double doors where various \nadult Elves of Light are already gathering.  \n\nThere are several round and long wooden tables with high \nback chairs throughout the large room of high ceiling. You \nknew right away that this is the Great Hall.\n\nLida introduces you to a small group of Elves standing \ntogetherholding a tall glass of green liquid, then stands \npolitely behind you. The group are speaking softly to one \nanother, until they are made awareof who you are. Now each \nare looking at you, their eyes glow for a few seconds.\n\n*page_break\n\n\"Maiden Marian Fitzwater of Blidworth, it is our pleasure \nto finally meet you. We are the Elders who were on the \nselection committee. We are so pleased to have found you \nand Robyn Hood of Sherwood Forest.\"\n\nAnother, a male this time, raises his eyebrows just \nslightly, a move you've yet to see on an Elf of Light's\nface. \n\n\"You'll never know how glad we are that you've agreed to \ntake on this quest,\" he says.\n\nThese are Elders? Well, I assume you just have to take \ntheir word for it. They have no gray hair nor wrinkles \nas the Elders back home. No, these beings you are looking \nat right now are as ageless and golden haired as Lida. \n\nAnd, of course, you have to take his word that they are \nglad that you and Robyn have agreed to take on the quest, \nbecause by their expression there is absolutely no way to \ntell. \n\nSuddenly, there is an interruption near the door. What's \nhappening?\n\n*fake_choice\n\n  #It's Some Sort Of Animal Trying To Enter The Great Hall.\n\n    Well, no it isn't. I know you would think so, because of \n    the sound you hear, but look how calm the Elves of Light \n    are. Would they be this calm if a wild animal enters the \n    great Hall?\n\n    Truth As Badly As One Would Think.\n\n    All things considering, that's a great attitude to take,\n    Marian. I guess that's why we're such close pals.\n\n    Oh, by the way, did you realize you have dirt in your \n    ears, too?\n\nAfter you clear your mouth and nose, you look down at your \nclothes. Because the blossoms and the dirt are moist from the \nmorning dew, the large purple and yellow petals are clinging \nto your skin and the dirt is ground into your clothing.\n\n*page_break\n\nThank goodness you're not really hurt; but, it's definitely \ntime to take that bath you thought about earlier. \n\nAnd thank goodness, there are clean clothes available to \nput on.\n\n\nWhen you reach the top of the hill, you notice that Robyn is \nawake, and talking to a tall, dark skin, burly man wearing a \nwide hat, and a wide sash around his waist. As yours, his \nclothes is his own but not quite his own. \n\nYou realize immediately that it must be Black Mike.\n\nMarian, get into your tent quickly, take that bath and get \nthose clean clothes on! You can't let Black Mike see you like \nthis!\n\nYou come up the back way and scurry as quickly as you can \ninto your tent; and what do you find? An addition to the \ncontents of your tent! \n\nIt seems while you're were away making a mess of yourself, \na young Elf of Light maiden has made herself at home in your \ntent. \n\nThere are strings of silver interlacing with her golden hair \nthat fall to her shoulder. She is dress similar to Killia in \na pale, nearly white, blue cloth that sparkles when she moves \neven the slightest. You notice right away that her feet are \nbare. \n\n*page_break\n\nDidn't you see shoes on the other Elves of Light that you \nhave met prior to coming to Varna?  Why is this maiden \nshoeless? Should you ask? \n\nI don't know. That might be rude. Maybe it'll come up in \nconversation at a later time.\n\n*page_break\n\nShe's immediately aware of your presence, somehow, and hops \nup out of the chair, and bows her head slightly towards you.\n\n\"Pardon me, Maiden Marian,\" she begins. \"I am Lida. King \nJordan has assigned me to be your official Attendant as \nlong as you are here in Varna. I am to assist you in any \nway you need.\"\n\n\"Oh!\" You say.\n\n\"I've brought you some flowers to help with the atmosphere \nof this tent as my way of apologizing that you are not in \nmore proper lodging.\"\n\nYou look at the table and there is a vase of wild flowers.\n\n*achieve wild\n\n\"Thank you! They're quite lovely.\" You say excitedly.\n\n\"May I help you with your bath? You appear to be in distress, \nand need to refresh yourself and replace your clothing with \nsomething clean.\" \n\n*page_break\n\nYou look down at yourself. \"Yes, I guess it's difficult to \nhide that I am in distress,\" you say with a slight chuckle.\n\nThe corners of Lida's mouth turns up slightly, therefore, \nyou know that she found your joke amusing.\n\nLida helps you out of your riding clothes and boots, and  \ninto the tub of rosehips. You ease your body lower under \nthe water. \n\n\"Ah...\"\n\n\"Is the water to your liking?\" She ask.\n\n\"Oh, yes, it's perfect,\" you purr.\n\nLida's expression does not change.\n\n\"I'm happy that you're pleased.\"\n\nYou don't know how long you were in the bath, but after \nLida washes you with a thin fragrance liquid, rinses you \nwith fresh clear water, and dries you with a fluffy very \nabsorbent cloth towel, she sprays with an after bath mist \nthat makes your skin glisten.\n\nNext, she helps you put on the two piece outfit that Killia\nhas chosen for you. \n\n*page_break\n\nIt's a top and a bottom, but the bottom closes partially \nin the middle. You have to put one leg in one side, and \nthe second leg into the other; similar to your riding pants, \nbut it's fuller than a skirt of a normal dress. \n\nThe top has no sleeves and corner wraps around you leaving \npart of your torso and your back bare.\n\nThen it's time for your hair. Lida picks up a brush from \nthe table.\n\n\"Maiden Marian, would you please come and sit in the chair \nso that I may properly style your hair?\"\n\nIn no time, Lida completes an elaborate series of braids \nthat interlace with your regular long locks.\n\nLastly, she ties a cord of thin silver around your neck.\n\n*achieve cord\n\nYou stand to look at your reflection in the tall mirror \nin the corner of the tent.\n\n\"Oh, my!\" Is all you're able to say.\n\n\"Queen Killia will be happy that you're pleased,\" your \nAttendent says, although her expression is the same as \nit always is.\n\n*page_break\n\nWhen you're ready, you exit the tent and immediately \nnotice that Robyn is no longer on the hill with Black \nMike.\n\n\"We need to go,\" says Lida. \"They'll be waiting for \nus at the Great Hall for the First Meal.\"\n\n\nIt doesn't take you long to ride to the building that\nis the called the Great Hall, and you can see another\nreason why these Elves are known as the Elves of Light.\nEven their buildings shine brightly, but you can still\nlook at them\n\nWhen you walk through the double doors to the large \ndining room, you see Robyn in the midst of several Elves. \nYou push your way through (after all, he is your man!) \nand throw yourself into his arms. You put your arms around \nhis neck to give him a big hug. \n\nHowever, he doesn't return your hug. Instead, he pulls you a \nway and gazes at you from your head to your toe as if he was \nseen you for the first time.\n\n\"Look at you!\" He says. \"You look absolutely beautiful! I love \nyour hair, those clothes (which, by the way, show off more skin \nthan anything from home ever did), and your skin actually \nsparkles!\"\n\nOh, look at you acting coy!\n\n\"I took a bath!\" Is the only explanation you give him.\n\n*page_break\n\n\"Ah!\"\n\nYou look around the Great Hall.\n\nYou hug him again. \"Isn't Varna wonderful!\" You say with a \ngreat smile.\n\nHe returns your smile and enthusiasm as he looks around the \nhall at the exquisite furniture and crystalline lamps that \ncover the ceiling. \n\n“Yep,\" he says, \"Varna is definitely not like England nor like \nany other place I've ever been.”\n\nAs his male Elf Attendant waits quietly behind him, the other \nhuman in the room, the tall dark man, steps up takes off his hat, \nand bows low with a flourish.\n\nNow that he is up close, you can see his full beard, and long \ncoils for hair, rings on eight of his ten fingers, and he wears \na large chain with a medallion around his neck. Of course you, \nalready know who he is.\n\n“Good'ay, me lady. Allow me ta intro'uce me self. I'mma Cap'n \nBlack Mike uv da Lady Anne.”\n\nHe takes your hand and kisses it.\n\nYou're taken aback by his sudden sweet disposition and you \ngiggle.\n\n*page_break\n\n“Oh, Black Mike. Robyn's told me so much about you, of course, \nbut I did not expect someone so handsome, nor so refine.” You \nreturn his bow by curtsying.\n\nRobyn makes a face and looks at the two of you. I don't think he \nlikes the fact that you're being so nice to Black Mike, whose not \nonly a pirate, but a stranger to you.\n\n\"Come this way,\" Robyn's male Elf Attendant says as he guides all of\nyou towards a long wooden table with high back chairs in the middle of \nthe room. \n\n*goto_scene mmelves3\n\n*finish\n\t", "rh1": "*label rh1\n\n*page_break\n\n*image intro.png left\n\nMost of the vagabonds you meet in Sherwood Forest know of your fame and are \nsurprise that you are hiding from the law.  You want to explain and make your \npoint of view clearer.\n\n*choice\n  #You Tell Them The Direct Truth.\n\n    \"Returning home from the Crusades with King Richard found me staying in\n    in bed for days at a time. Mostly, I was missing Marian who had yet to\n    return from Paris. \n\n    After a couple of weeks, my step-father decided that a good old fashion\n    hunting trip was all I needed to forget about Marian for awhile. He felt \n    killing a buck or two will make me feel more like myself again. \n    \n    He made the arrangements for us to take a week trip to his winter lodge \n    and he invited several of his friends to join us.\n    \n    Well, to make a long story short, it was a hunting accident; and \n    because no one else was around as a witness, the magistrate states \n    that I'm responsible for killing my step-father since he has no other\n    heir.\" \n    \n    *goto rh1a\n\n    *set brave %+10\n       \n    \n  #You Tell Them The Half Truth.\n\n    \"I and a few other men helped good King Richard escape from a prison during \n    the Crusades. It was a long, harrowing, journey to return home, and when\n    I did, all I wanted to do was spend time in bed eating my mother's \n    cucumber sandwiches and drinking tea.  My step-father felt I wasn't \n    behaving like a man, and set up a hunting trip for me, himself, and some\n    of his friends. \n\n    My step-father and I were alone on a walk early one morning, when we found\n    ourselves separate in the fog. I shot off a volley of arrows when I heard \n    his screams for help, but I had mistakenly shot him instead of the animal that \n    was attacking him.  The magistrates now says that I had planned the entire incident \n    and that the shooting is not an accident.\"\n    \n    *goto rh1a\n\n    *set cautious %+10\n    \n  #You Exaggerate The Truth.\n\n    \"I was ill after returning from the Crusades with King Richard. As a \n    result, I'm in bed for a couple of weeks. The doctors say I am suffering \n    from PoReZSS, or Post Religious Zealot Stress Syndrome, and explain that \n    I am one of the of the worse cases that they have ever seen.\n        \n    My step-father decided that I needed a good old fashion hunting trip\n    to help me heal and be myself again. He felt killing a few bucks is the\n    perfect remedy.  \n   \n    Arrangements are made for us to take a week trip to his winter lodge.\n    He also invites several of his friends to join us. \n    \n    Early one foggy morning, we went out, alone, for a walk. Of course, we \n    had our bows and arrows. Some how, we became lost. I could hear my\n    step-father shouting that he was being attacked by a dear. \n    \n    I shot in the direction of the horrible cries of my step-father trying\n    desperately to kill the deer. When I finally found the doe, she is dead, all \n    right, but my step-father is also accidentally hit several times by several stray\n    arrows. \n\n    No one else is around as a witness, therefore, the magistrate decided that I\n    had planned the entire trip to kill my step-father since he has no other heir.\"\n   \n    *goto rh1a\n\n    *set exaggerate %+10\n    \n    \n\n\n*label rh1a \n\n*page_break\n\nYou are happy to reveal the tales of your accomplishments to anyone \nwho will listen, and the lawless were always needing a means of \nentertainment.  They were quite impress on how you handle yourself \nin extraordinary circumstances.  \n\n*achieve friendship\n\n*choice\n  #The Story Of The First Archery Tournament.\n\n    \"I was sixteen when my step-father decided that it was time to show\n    off my skills that I  had been honing for seven years.  He paid the fee \n    for me to enter the annual Midsummer Festival Archery Tournament.  \n    \n    Together we had created a special bow of imported European Yew. It \n    has a high bend to break ratio, so he was pretty sure I'd have the \n    best bow in the competition. My arrows were made for me by his \n    friend in Yorkshire, the best arrow maker in all of England. \n    \n    I don't know much about arrow making, but when I compared my arrows \n    with the others who were competing, the shaft of my arrows are\n    thinner and sturdier, and the feathers were long and wide.\n    \n    The idea of the tournament is to have each opponent step up to the\n    target at one time. You miss, step away, the targets are pushed back,\n    and the tournament continues until one man is left standing.\n\n    Well, I was the last to step up to the mark and aim at the first line\n    of targets. I spy the target, then lower my bow.\n\n    'That target is too close!' I shouted.\n\n    The referees, the lineman, and the spectators are all in shock by \n    what I had said, but after much discussion, the head of the tournament \n    agreed to move my target back another two feet.\" \n    \n    *goto rh1b\n\n    *set exaggerate %+10\n    \n   \n  #The Story Of The First Fencing Tournament.\n\n    \"I was sixteen when my step-father decided it was time that I showed \n    off my fencing skills that I had been honing for seven years.  He \n    paid the fee for me to enter the annual Midsummer Festival Fencing \n    Tournament. \n \n    Now, in those tournaments, there was no face or chest protectors. \n    You just got out there and fenced with your opponent in whatever \n    you wore to the tournament. \n \n    I had been using a light fencing foil, but my step-father had \n    surprised me that day with a brand new heavier epees blade that \n    his best friend in Yorkshire had made especially for me.  \n\n    One by one, I quickly took out the competition until I was at the \n    top of the tier. We last two were the best of the best in all of \n    the surrounding counties.  I remember that his name was Braun, \n    and he was a big young man, although the officials insisted that he \n    was in my rank.  \n\n    Well, we went at it for an hour. Sometimes he had the best of me, \n    other times I had the best of him. He'd attack, I'd parry. I'd \n    attack, he parry. \n\n    Finally, he just became exhausted and fell over \n    onto the ground making a loud thud. He was out and I won the ribbon \n    and the five silver con prize.\"\n\n    *goto rh1b\n\n    *set wit %-10\n    \n\n  #The Story Of The First Lancing Tournament.\n    \"I was sixteen when my step-father decided it was time that I showed\n    off my lancing skills that I had been honing for seven years.  He \n    paid the fee for me to enter the annual Midsummer Festival Lancing \n    Tournament.   \n  \n    I didn't have my horse Clint at that time, but another steed that I\n    called Brownie.  I practiced charging the lancing dummy on Brownie \n    morning, noon, and night, so I was ready for that tournament.\n  \n    Rumors had spread that I was the best in the entire area. I don't \n    know if that was true or not, but I surely enjoyed lancing.  \n\n    When it was my turn at the tournament, I was ready. I had my armor \n    on, and so did Brownie. When the flag went down Brownie rushed down \n    the lane. \n\n    I aimed and tucked my chin as my step-father had taught me. All of a \n    sudden, Brownie raised his head and reared up! I didn't know what was \n    happening to him, but the opponent was coming on us fast. \n    \n    I could see his lance aimed right at my chest.  \n     \n    I shouted, “Brownie, there is only you and me here, just you and \n    me! Now run, boy run!” \n\n    Well, my words obviously got to him because he lowered his head \n    and sprung forward just in time for me to hit my opponent right in \n    the side, knocking him off of his horse. \n\n    Later I was told that my opponent had found out that I was going to\n    ride Brownie, a steed, so he changed his horse to a mare in heat. Brownie \n    was just reacting as any male would in such a situation! I was lucky that \n    Brownie was more loyal to me than my opponent gave him credit.\"\n    \n    I aimed, but stopped. I still wasn't satisfied and shouted \n    that the target was still too close, so they moved the target \n    another two feet.\n\n    I cocked my arrow, raised my bow, aimed, and let my arrow fly.\n  \n    Not only did my first arrow hit the center of the target, but my \n    next two arrows split the first! \n\n    I did, after all, still had two more arrows as the competition \n    called for.\n\n    Needless to say, I won the blue ribbon, and the five silver \n    coins prize.\"\n    \n    *goto rh1b\n\n    *set wit %+10\n\n*label rh1b\n    \nThe longer you are in the forest, the more they realize that you are \ntruly the cleverest of even the most smartest among them (which really isn't \nsaying much), so they usually agree with whatever you say.  And the longer \nthat you are in the forest, the more they accept you as one of them. \n\n\n\n*goto_scene rh2\n\n*finish\n\n\n\n\n\n\n\n", "rh2": "*label rh2\n\n*page_break\n\n*image merrymen.png left\n\nIt came to past that you had a great idea for these thieves of Sherwood \nForest.  You gather them together under the great oak at the north  end \nof the Heart of Sherwood to share the information with them.\n\n\"Gentlemen, I have a suggestion,\" you begin. \"We should become organized!\"\n\nThe men begin to mumble.\n\n\"What?\"\n\n\"A suggestion?\"\n\n\"He's using dem big words agin.\"\n\n\"What 'cha talkin' 'bout?\"\n\n\"What he's talkin' 'bout?\"\n\nA big oily looking one scratches his butt. \"Or-gy-iz?\"\n\n\nOkay, Robert, go ahead and try again.\n\n\"You see, everyone, you currently approach someone by yourself to take \ntheir money, right?\"\n\nThey look at you oddly. A couple of them are scratching their heads, \nbut that may be due to lice.\n\n*page_break\n\n\"Think about it?\" You continue. \"Wouldn't you be more successful of \nrelieving any passerby of their valuables if you were one large group \nof ruthless men, instead of one person working independently?\"\n\nMore odd looks from the crowd. \n\nBe careful, Robert, I think you're losing them.\n\n\"A lot of desperate men are much more intimidating than one man, wouldn't \nyou agree?\"  \n\nThe men begin mumbling to themselves and anyone close enough to hear \nthem. Then, as if by a silent signal that only they could hear, the \ncrowd slowly disperse, each man finding their own way back to the life \nthat they have made for themselves in the forest.\n\nSo, what do you do next?\n\n*choice\n  #You Decide To Give Up On Your Plan.\n\n    \"Hey, everyone, wait just a minute! Hear me out, will you?\"  \n\n    It's too late. You're now talking to the leaves. \n\n    You finally give up, you sit down on the log and put your head in\n    your hands. Obviously the men who live out of the law in Sherwood \n    Forest prefer to be loners; and when you think about it, \n    with good reason. They don't care  much for what would otherwise \n    be considered acceptable social activities with other human beings.\n    \n    *set coward  %+10\n\n    *set cautious %+10\n\n    *goto_scene rh2a\n\n  \n  #You Try A Different Approach To Your Plan.\n\n    \"Everyone, everyone! Don't go! Come back!\" You shout, but every man \n    kept walking.\n \n    Then a light bulb went off over your head and you remember that they \n    are not as smart at you as you are, so words won't work.  What they need \n    is an actual demonstration.\n\n    You shout as loud as you can.\n\n    \"Listen men, let's try this! Come with me and let's do a group robbery! \n    Whatever we get, we will share, okay?\"\n\n    A few men stop and turn around.\n\n    William looks cautiously at you. \"You mean, no matter what we steal \n    together, you'll really give me part of it?\"\n\n    \"I swear it.\"\n\n    \"Like what?\" Ask Brett.\n\n    \"Well, like, food, blankets, horses… Anything! We steal it, we share it!\"\n\n    \"Say, I think I like that idea,\" says Little John. \"Most people are afraid \n    of me and take off before I can steal much.\"\n\n    \"Me, too,\" came a few of the voices.\n\n    \"Exactly!\" You say jumping off of the log.  \"So, do you want to try \n    thieving with me?\"\n\n    \"Sure.\"\n\n    \"Why not?\"\n\n    \"Yeah, I'll go.\"\n\n    \"All right, let's do this!\" You say very happy. Then you stop because you \n    realize something.\n\n    \"Since this is a trial robbery, I'm only going to need a few of you to \n    participate. Everyone else, hide in trees and bushes to watch and learn. \n    Then we'll all meet back here under the major oak.\"\n  \n    The men shout in agreement.\n\n    \"Okay!\"\n\n    *set leadership %+10\n\n    *set brave      %+10\n     \n    *goto_scene rh2b\n\n  #You Decide To Trick Them.\n\n    Okay, Robert, it's time to pull out that bag of rocks that you've been \n    collecting and hidden behind the stump. \n  \n    You sit on the stump and put your head into the bag.\n  \n    \"Boy, oh boy, I've got some great jewels in this bag! They are absolutely \n    beautiful! Rubies, sapphires, and stones I don't even know the names to!\" \n\n    You look up to see if everyone is paying attention. Well, not everyone, but \n    a few have stopped walking and are actually looking back.\n\n    \"I'll be getting a lot of money when I trade these in, that's for sure. One \n    hundred pounds, two hundred pounds... more than that I bet. Who knows? Too bad \n    I have no one to share the money with.\"\n    \n    Suddenly you hear a voice.\n\n    *set exaggerate %+10\n\n    *set wit %+10\n\n    *goto_scene rh2c", "rh2a": "*label rh2a\n\n*page_break\n\nUntil…\n    \n\"I think I understand what you were trying to do, Robert,\" Will \nScarlett says as he becomes the first of the few men to approach you. \n\"It's like with Prince John's Palace guards.  You never see a single \none of them alone. They are always at least two of them together.\"\n\nYou turn around and there is a small group of men.  You recognize Little\nJohn, William, with Will Scarlett.  There is also Lars and Jack and a few\nother men you didn't know.\n    \n\"I'm a big man,\" William begins, \"but you put Little John and I together, \nand we're more like three men.\"\n \n\"I left my family 'cause my father died and my mother couldn't afford \nto feed us all. I thought I'd be doing better on my own, but I ain't,\" \nsays Jack, the youngest among them.  \n    \n\"I couldn't get a regular job to take care of my wife and baby girl,\" \nLars says.  \"I had killed a man trying to steal a loaf of bread and \nsome coal for a fire.\"  They all look at Lars nodding their heads in \nunderstanding. \"I can't go back.  The forest is now my home.\" \n\nYou stand up and move towards Will Scarlett, Little John, William, Jack, \nLars; and now there are others as well who have had a change of heart. \n\n*page_break\n\n\"Then men, I think you can call ourselves organize. We steal together, \nwe take care of one another, we share what we steal with each other.\"\n    \nEveryone grins and nod their heads. Then you each shake the others hand \nagreeing to be brothers until the end. \n   \n\"You should be our leader, Robert, you're smarter than us,\" William \nsuggest.\n    \n\"Here, here!\" The others shout.\n   \nOf course, you're the smartest, but you're also the most arrogant. You \nlove hearing their cheer so you let it continue a little longer than \nneed be.\n      \nYou finally raise your hands up in the air. \"Okay, okay, men. I will \nbe your leader.\" \n\nYou part your legs, put your hands on your waist, and look forward with \nyour chin up. \n\n\"Now for our first group robbery!\" Jack shouts.\n\nThe men all nod their heads in agreement.\n\n*page_break\n\n\"Yeah, let's go!\" The men all yell and begin to rush away from the oak \ninto the forest towards the open roads.\n\n\"Wait, wait! I can't go out on any of the main roads looking like this! \nThe clothes I've been wearing look too fancy. I need to change.\"\n\n\"Yeah,\" Little John says, \"you do look like you've shopped at the best \nstores in London.\"\n\n\"Well, that's because I have.\"\n\n“Here, Robert, I found this.”  Lars tosses a  green cloak with a hood at \nyour feet.\n\nYou pick it up and shake it out.\"Ah, perfect!\"\n\n\"I wear an extra pair of tights. You can have one,\" says Jack.\n\n\"I'll take the outer pair, if you don't mind.\" \n\n\"You need some shoes. Here, take mine. I'll be watching from behind a \nbush.\"\n\n\"Thank you, Allan!\"\n\n*page_break\n\n\"You still need a shirt,\" William says.\n\nYou don't know where it came from but soon a brown shirt hit you in \nthe face.\n\nYou put everything on, and then you threw the green cape over your \nshoulders. You pull up \nthe hood.\n\nWith your arms out you turn around. “How do I look?” \n\nThe men pull on their beards or rub their scraggy chins as they give \nyou the once over.\n  \n“Something's not right,” says Little John.\n \n“Yeah, I just don't know what,” William agrees.\n\n“Hey, I know.”  Jack picks up some dirt, rubs his hands together, then \nwalks over to you. “You're too clean, Robert. He rubs your face with the\ndirt.”\n\nNow the men nod and give you the thumbs up.\n\n“Yeah, that's it!”\n\n“Now you look like one of us!”\n\n“Not even your mutter would know 'ya!” Will Scarlett shouts.\n\nYou look around at your men very satisfy. You smile.\n\n\"It's time to go.\"\n\n*goto_scene rh2d\n\n", "rh2b": "*label rh2b\n\n*page_break\n\n\"Yeah, let's go!\" The men all yell and begin to rush away from the oak \ninto the forest towards the open roads.\n\n\"Wait, wait! I can't go out on any of the main roads looking like this! \nThe clothes I've been wearing look too fancy. I need to change.\"\n\n\"Yeah,\" Little John says, \"you do look like you've shopped at the best \nstores in London.\"\n\n\"Well, that's because I have.\"\n\n“Here, Robert, I found this.”  Lars tosses a  green cloak with a hood at \nyour feet.\n\nYou pick it up and shake it out.\"Ah, perfect!\"\n\n\"I wear an extra pair of tights. You can have one,\" says Jack.\n\n\"I'll take the outer pair, if you don't mind.\" \n\n\"You need some shoes. Here, take mine. I'll be watching from behind a \nbush.\"\n\n\"Thank you, Allan!\"\n\n*page_break\n\n\"You still need a shirt,\" William says.\n\nYou don't know where it came from but soon a brown shirt hit you in \nthe face.\n\nYou put everything on, and then you threw the green cape over your \nshoulders. You pull up \nthe hood.\n\nWith your arms out you turn around. “How do
