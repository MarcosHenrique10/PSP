ing.”\n\nBlack Mike puts his blade back into its sheath. He sneers at the Young Elf.\n\n“Alriet, Robyn. Me spare ‘em, but me not turnin’ me back on the lot of 'em!”\n\n*page_break\n\n*image robinmarian.png\n\nYou mount your horses and soon find yourself meandering through a series of \na variety of levels of walkways, under arches behind water falls, until \nyou reach the Castle of Light near the entrance to the area where the \nElves of Light live in Varna. The sun light  made the edges of the walls \nsparkle and the rooftop glow.\n  \nThe dining room of the Great Hall is where you find Marian speaking to some \nElves. She is wearing something that is completely different from her regular \nclothing; an Elf of Light top and skirt, much more revealing than anything \nyou've seen her wear before. Her skin shines and so does her hair, and it makes \nyou smile to see her that way. \n\nAround her neck is a cord made for thin strips of woven silver.\n\nMarian turns around and sees you enter the room. She excuses herself and \nruns over to you.\n \nShe takes both of your hands.\n\n“Oh, Robyn! Isn't this place amazing?”\n\nYou return her smile and enthusiasm. \n\n“Yeah. It's definitely not England nor like any place I've been.”\n\nBlack Mike walks forward, takes off his hat, and bows low with a flourish. \n  \n“Good'ay, me lady. May I 'troduce me self. I'm Cap'n Black Mike uv da\n[i]Lady Anne[/i].” \n\nHe takes Marian's hand and gives it a long kiss.\n\n*page_break\n\n“Oh, Black Mike!” Marian is taken aback. “I've heard of you but did not \nexpect someone so handsome, nor so refine.” She returns his bow with a \ncurtsy.\n\nYou look back and forth between Black Mike and Marian. What is this? Is \nBlack Mike making googly-eyes at your Marian? Is he trying to seduce her?\n\n\"Yeah, well.” You grab Marian's hand. “Let's sit down to breakfast, \nshall we?” \n    \nYou walk Marian to the long table in the center where many of the Elves \nof Light in the room were sitting, placing yourself clearly between Black \nMike and Marian near the end where your Elf is waiting for you. \n\nAfter settling, a horn can be heard that seem to come from the center of \nthe room, yet there are no musicians. All of the Elves of Light suddenly \nstand as King Jaeden and Queen Killia enter through a pair of tall \ndoors with their Attendees. King Jaeden sits on your end of the table, \nand his queen sits on the opposite end. \n\nIt seems from no where servants appear and are walking around the long \ntable adding food to the various small plates that were in stacks in \nfront of you.  They also pour various thickness color liquids in three \ndifferent glassware.\n \nNothing on the plates look familiar. No bread, no meat, no fish. You \nwatch Jaeden for a clue as to what to eat first.  There is something \ngreen that wiggles slightly  when you touch it with your three prong \nfork that Jaeden is now placing into his mouth, so you decide to try it.\n \n\n*page_break\n\nHey, not bad! Sort of minty, like the leaves in your mother's garden.  \nYou begin to gingerly place pieces of it into your mouth. \n\nJaeden is watching you. “Robyn, I sense that you have questions to \nask me.\"\n\nYou're not surprise that he's asking, however, you're feeling a little \nantsy. How do you proceed?\n\n*choice\n  #You Eat Your Meal Slowly To Find Out More Information. \n\n    You reply, “Yes, yes, I do,” before you pick up a glass containing \n    a white liquid that reminds you of cow's milk except for the spark \n    of bright blue when light hits the glass.  \n    \n    You take a long sip, and you swear that you can feel your eyes \n    sparkle after you swallow.\n\n    “Wow! Jaeden, what is this?” \n\n    *achieve milk\n\n    “Milk of one of the Cowgirls; Matilda, I believe, since  her calf is \n    still very young and she has plenty to share.”\n\n    You look around and notice that you are the only one with a glass \n    of milk.  You're confuse.\n\n    “If this is just cow milk, why am I the only one with a glass?”\n\n    “No, you misinterpret what I've said.  You are not drinking milk \n    from any cow, and certainly not milk from a domesticated field cow \n    that you associate with your homeland.  You are drinking Matilda's, \n    the Cowgirl, milk.”\n\n    You, Marian, and Black Mike stare at the glass in astonishment.\n\n    “She heard you were coming and she wanted to give you something \n    that Cowgirls save special for their children, her fortified milk.”\n\n    “Say what?”\n\n    *goto rh9a\n  \n  #You Eat Quickly To Quickly Return Home.\n\n    You pull on your hood, lower your head, and begin stuffing your \n    mouth. You look up at him. “Noff,” you say with your mouth full. \n    You stick your face back into the plate. \n\n    “Pardon Robyn's table manners, Jaeden,” Marian says. “I think he's \n    just so anxious to return your globe to you that he's beside  himself.”\n\n    “I understand.” The one corner of his mouth raises slightly.  “And, \n    Black Mike, I'm sorry that I brought you to Varna the way that I did.  \n    In the condition that I found you, well, I just wasn't sure if you \n    would have come on your own.”\n\n    “Arg, yar a pointy eared scallywag, thars for sure, but a good guy. \n    Alls forgiv'.” Black Mike raises one of his glass toward Jaeden. \n \n    Jaeden nods his head.  “Then, once you've had your fill, I'm sure \n    you'll be ready to begin your quest.”\n\n    \"Aye! Wars be dese Dark Elves? Me be sheddin' thar blud soon!\"\n\n    “The messengers were quite clear that they are camped not far from \n    our front gates. I will give you a map.”\n\n    You raise your hand and make some sort of grunt sound as you wipe \n    your mouth with your sleeve. Then, you grab the small ceramic cup on \n    your right that contains a dark brown liquid. Before you drink it, \n    you swirl the cup and notice that the liquid seems a little thick. \n    You pour the entire content of the cup in your mouth at one time \n    and in a gulp it's down your throat.  \n   \n    Even though you feel it could use some cream  and sugar, you suddenly \n    found your heart is racing and you stand up from the table and shout, \n\n    “Yiiiiiiiaaaaaa! That hits the spot!”\n   \n    *finish\n\n    *set cautious %+10\n\n    *goto_scene rhelves3\n\n  #You're Ready To Go!\n\n    \"You know, I thought I did, but truthfully I don't see any problems \n    for this quest. Simple in, grab the Globe, easy out. We'll be back \n    before supper.\"\n\n    \"I knew that we were coming to the right person for this job,\" Jaeden \n    says, his face showing no expression. \"Thank you again Robin, Marian, \n    and Black Mike. Everything you will need is waiting for you at your \n    tents after you've completed eating the First Meal of the day.\"\n\n    \"Than, each of you, eat until you are full. You'll begin your\n    quest as soon as you are ready.\"\n\n    *finish\n    \n    *set brave %+10\n\n    *goto_scene rhelves3\n\n*label rh9a\n\n*page_break\n\n“Cowgirl's milk is more than simply nutritious.  It is said that it \nis fortified with the very essence that created Varna, the part that \nis Varna itself.  If a Cowgirl share's her milk with anyone, it means \nshe is twinuit.”\n\n“Twinuit?” Marian ponders.\n\n“Yes. How you say...um, that she cares about you. That she is in love.”\n\nMarian's eyes go wide.  “I hate to be a poor guest, and it's flattering that \na Cowgirl wants to share her precious milk; however, Cowgirl or not, no one \nis twinuit with Robyn, but me.”\n\nThe soft fluttering sound is heard and Marian looks around not the \nleast bit self conscious. She even goes as far as closing her hand \nover yours. \n\n“Well,” you say quickly to change the subject, “Jaeden, when you \nproposed this quest of yours to us last night, you insisted on a quick \nanswer, and I understand the urgency of it all, but can you tell us more \nabout the situation?”\n\n“I don't know why we were not aware that the Benign Globe was missing \nbefore the Dark Elf messengers arrived with the ultimatum.  We have a \nconnection to it, you see.”\n\n“How so?”\n\n*page_break\n\n\"It's power is linked to the essence of what makes us Elves Of Light. \nI don't know if you can understand exactly what I mean by that or not.”\n\nMaid Marian sits up. “I believe I do.  There is something like energy \nas if from the sun itself that surrounds you all, your entire home, and \nthat energy is part of the globe.”\n\nJaeden nods his head.\n\n“Yet, the Dark Elves were able to take it without you knowing,” you \ncomment.\n\n“Yes,” Jaeden replies.  “Which leads me to believe that, somehow, the \nDark Elves' knowledge has changed.”\n\n“Do ya know whar d'ey be?” Black Mike ask.\n\n“Yes, the messenger was quite clear. I will give you a map.  It seems \nthat they have camped not far from our front gate.”\n\n*finish\n\n*set leadership %+10\n\n*goto_scene rhelves3\n\n\n\n \n  \n", "rhelves3": "*label rhelves3\n\n*page_break\n\n*image robinmarian.png\n\nYou feel like you can use a nap after that surprising heavy meal, but \nat the same time the sooner you're out of Varna, the better.  \n\nMarian rides on Clint with you as your Elf takes you and Black Mike \nback to your tents on the grassy hill.  Inside, you each find a set of \naccessories to add to your clothing: A mael vest, high leather wrist \nbands and high leather boots. The mael is tightly woven but is not \nheavy to wear.  \n\nYour weapons are also there.  All of your short blades, and Black Mike's \nlong blade, are sharpen, the sheath buff to a shine. The points of yours \nand Marian's arrows are also sharpen and they have fresh feathers.  \nThe bows have been restrung.\n\nThere's also a good leather saddle and head and flank cover for your \nhorses.\n\nMarian has return to wearing her riding clothes.\n\nOnce dress, you mount your horses and follow the Elf to the beginning \nof the stone trail that leads out of the tall stone gates of the  \nVarna into the mountains. Jaeden, Kilia and several Elves Of Light await \nyou.\n \nJaeden steps forward. Lying across his hands is a silver sack. A \nmultitude of colors explode from the cloth.\n\n“Here, Robyn, take this sack. It’s made of a special mael to hold the \nBenign Globe.”\n\n\n*page_break\n\nYou accept the sack in both palms of your hands. You weigh it and are \nsurprise how light it is. \n*achieve sack\n\n“Jaeden, this cloth is so thin and soft. Will it hold the globe? \nAccording to how you've described the globe, it must be very heavy.”\n\nJaeden's expression does not change.  “It will be fine. This is a rare \nmael, even stronger than the mael that you're wearing, created by our \nMother.”\n\n“All right.” You take the sack, fold it carefully, and tuck it into a safe \nand secure place in your pack.\n\nJaeden steps back to stand beside his wife. \n\n“May Vanuite look over you all and bring you back to us quickly.” Jaeden \nsays.\n\n“May Vanuite look over you all and bring you back to us quickly,” says \nKilia and the other Elves of Light.  They wave as the three of you exit \nthrough the gate.  You carry Jaeden's map to the Dark Elves' camp.\n\n\n*page_break\n\n*image robinmarian.png\n\nYou've been riding for a couple of hours.  Black Mike is grumbling \nunder his breath and Marian has been singing a song low and to herself. \nYou  suddenly raise your hand to stop the horses.\n\n“What is it, Robyn?”\n\nYou turn the map one direction, and then the other.\n  \n“I'm not sure, but I think we're lost.”\n\nBlack Mike face is turning red and he cliches his teeth.  He mumbles \nto himself, “Why wud dat hea' gimlet giv' a map ta a lan' lu'ber?”\n\nMarian shouts, \"Look!\" She points.\n\nWhat is she pointing at?\n\n*choice\n  #Black Smoke Rising Into The Sky.\n    \n    You and Black Mike look in the direction she is pointing.\n\n    \"That wasn't there a few minutes ago,\" you say.\n\n    You begin turning the map around some more trying to figure \n    out where the smoke is coming from.\n\n    The smoke becomes blacker as it rises.\n\n    \"What do you think it could be?\" Marian ask.\n\n    \"I'm not sure, but everything we've seen so far is so\n    beautiful, green, and prestine. I can't imagine who would\n    be creating a fire large enough to make that much smoke\n    nor what they could be burning to be that dark.\"\n\n    \"It be Dark Elves!\" Black Mike shouted. \"Gimme map!\"\n\n    He reaches over and snatches the map from your \n    hands.\n \n    \"Hey!\"\n\n    He ignores you as he sneers, looking at the map closely.\n    He turns the map right once, looks up towards the smoke\n    within the low hills in the mountains, then points a \n    finger onto a spot on the map.\n\n    \"Arggg! Dis be dem!\"\n\n    You look back and forth between Black Mike and the \n    smoke.\n\n    \"Well, Robin!\" Marian exclaims. \"Let's go!\"\n   \n    *set cautious %+20\n\n    *goto rh9b\n   \n\n  #Carrion Birds In The Air.\n\n    \"Something is either dead, or dieing, in that direction.\" \n    She is pointing behind you to the right. \n    \n    \"My father had taught me how to track by following Carrion \n    birds.\"\n\n    \"Yar ah bright one, m'lady! Dats bery true.\" Black Mike winks \n    at Marian, and she giggles. \"If'n we find dose heathe' Dark \n    Elves, it surely be in dat di'ection.\"\n\n    You don't like the way Black Mike is looking at Marian, nor \n    the way Marian is looking at Black Mike.\n\n    \"Of course she's bright!\" You say excitedly. \"That's my woman, \n    Marian, the smartest person I know!\"\n\n    Marian blushes, but you're not fooling Black Mike. He knows \n    you're acting jealous.  \n\n    \"Let's go!\" She says as she hits the side of her horse and \n    races in the direction that the Carrion birds are flying high \n    in the air.\n\n    The three of you ride until you’re almost at the top of a hill.\n\n    \"Black Mike, do you see anything?\"\n\n    \"Aye, me frien'. Me see pointy tops wit flyin’ flags.\" \n\n    \"We must be near their camp!\" Marian crys out. \"Let's \n    go!\" \n\n    *set  exaggerate %+10\n\n    *goto rh9b\n   \n\n\n  #Three Men Racing Towards You On Horseback.\n\n    You look up the road and there are three males coming \n    speedidly towards you on horseback.\n\n    From a distance you can tell that they are dark skin like \n    Black Mike, but they didn't look human. And they didn't ride \n    those horses the way humans do either. Are those Dark Elves? \n    They didn't wear shirts, and their pants billows in the wind.\n\n    Immediately, Black Mike hit his horse hard on the side and is \n    riding rapidly in the direction the three riders were approaching. \n    He pulls out his sword, and when he is close enough to one of \n    them, he clashes blades and knocks the elf off of his  horse. \n    He jumps off of his own horse and the two begin fighting.\n\n    In the meantime, Marian pulls out her bow and is sending arrows \n    at the other two Dark Elves.  She looks over at you.\n\n    \"Robyn! What are you doing? I need your help!\"\n\n    With that, you're reluctantly force into joining in if you want \n    to or not. You cock your bow and aim at the Elf that is riding \n    in front of Marian's Elf, knowing you're going to miss him. \n\n    Once they realize that they are under attack from a distance, the \n    two Dark Elves give in and quickly retreat up the hill. Of course, \n    you follow Marian following them. \n  \n    Marian hits one in the back of his shoulder, and he falls to the \n    ground.\n\n    Black Mike jumps back on his horse after relieving the one Dark Elf \n    of his young life, and the three of you race to the top of the hill.\n\n    *set coward %+10\n\n    *goto rh9b\n\n    \n*label rh9b\n\n*page_break\n\nYou race to the top of the hill, Marian on your right, Black Mike on \nyour left, yelling an attack cry.\n\n\"Ariiiiiiiiieeeeeeeeggg!\" \n\nThen, suddenly you bring Clint to a halt. Below you, there are over \nfifty Dark Elves waiting for you with a sling blade in each hand.\n\nYou take Clint on a quick U-Turn and ride him hard back in the other \ndirection.\n\n\"Retreat! Retreat!\"\n\nWhere do you go?\n\n*fake_choice\n  #The Elves Of Light Homeland.\n\n    You've return to the Elves of Light homeland, but you don't \n    dare seek out the King or the Queen at their castle home.  \n    Instead, you act like every thing is as it should be.\n\n    Marian and Black Mike follow you because, well, you're the \n    leader of this quest. What else are they to do?\n\n    Humming your favorite song, you go to your pack and remove \n    the Elven food within the white cloth that was given to you \n    for second meal.\n\n    Marian and Black Mike sat on their horses silently\n    looking at you queerly as you sit against a tree.\n\n  #The Grassy Hill.\n\n    You don't stop until you've race all the way back to the \n    Elves of Light home and find your way back to the Grassy\n    Hill. \n\n    Marian and Black Mike follow you because, well, what else\n    are they suppose to do? You are the leader of this quest,\n    after all.\n    \n    Without a word, you go to your pack and remove the Elven \n    food within a white cloth that was given to you for second \n    meal. After all, all of that action gave you a hugh appetite.\n\n    Marian and Black Mike sat on their horses silently\n    with a quizzical look on their faces, watching\n    you as you sit against a tree.\n\n   \n\n  #To The Bottom Of The Hill.\n\n    Like a bat out of hell, Robyn races Clint down the hill\n    and did not stop until he is clear of where they first\n    saw the Dark Elves.\n\n    Of course, Black Mike and Marian follow you because they\n    had no choice since you are the leader of this quest.\n\n    After you're calm, you sit down in the grass.\n\nYou look up at them.\n \n\"I'm telling you, I've made up my mind. I'm going to sit here, \nhave my lunch, then we can make arrangements with Jaeden to go \nhome. Care to join me?\"\n\n\"But, the Dark Elves still have the Benign Globe!\" Says Marian in \nnear hysterics.\n\n\"And King Jaeden just has to find someone else to retrieve it for \nthem,\" you say calmly, looking at your hands as you begin to \nunwrap your second meal.\n\n*page_break\n\n\"But, Robyn, there’s a reason you’re known as a hero! You can use your \nwit against those barbaric Dark Elves!\"\n\n\"Marian please, don't start with me.\" You turn away from her to look at \nBlack Mike. \"It's good seeing you again, friend. I hope next time will \nbe under better terms. You're invited to the wedding, you know.\" You \nsmile.\n\n\"Robyn...\" Marian begins again.\n\n\"Marian, dear, I'm serious. No more.\"\n\nMarian throws up her hands. She takes the reigns of her horse and steer \nher towards the home of the Elves Of Light. \n\nBlack Mike looks at you sadly, shakes his head, and turns his horse\naround to follow Marian to the castle.\n\n\n*finish\n\n*goto_scene elves4", "rhelves4": "*label rhelves4\n\n*page_break\n\n*image onlyrobin.png\n\nYou lean against the tree with your hands supporting your head, and \nlook around, smiling, happy with your decision.  Soon you'll be home \nand have to deal with Prince John; you rather deal with Prince John and \nhis guards than those Dark Elves anytime.  \n\nThere's a valley below and you notice a small village. It's full of \nactivity.  You recognize the fairies that Jaeden has describe fleeting \nin, out, and around a large brightly color tree. \n\nVery small folk walk about holding items, pushing barrows, or talking \nin small groups.\n\nYou can hear their laughter rising high above the land.\n\nSuddenly, a large stream of many colors originating from above your \nhead surrounds the village. When it withdraws, the village is gone.\n\nYou jump up and stare into the valley. You rub your eyes and look again. \n\n\"What? What has happened? What was that light?\"\n\nAnd unnatural roar comes from directly above you. Is that some sort of \nlarge animal?  \n\nYou pull up your hood, hide behind the tree and look up. You can make \nout six dark figures wearing only billowing pants and a wide belt. A \nsling blade is tuck inside their belt. \n\n*page_break \n\nYou recognize them from before your big retreat. They are not large \nanimals. They are Dark Elves.\n\nThe tallest, darkest, more muscular, and the most meanest looking one \nholds a large globe with color lights swirling around it. You know \nimmediately that is is the Benign Globe.\n\n\"Oh, no! No, no, no! This can’t be happening!\"\n\nYou jump on Clint and ride back to the Elves Of Light's castle.\n\n*page_break\n\n*image robinbird.png\n\nYou rush  into the Great Hall looking for Marian and Black Mike; or \nJaeden, or Killia, or anyone!\n\nMarian is the only one you find in the dining room. She sits at a \nsmall round table with her hands in her lap. Her bow and quiver of \narrows lay on the table.\n\n\"Where is Black Mike?\" You ask, afraid that he may have found \nsome spirits and is on his way to getting drunk. \n\n\"Gone to the [i]Lady Anne [/i]. He will not stay here with you \nbecause you are such a coward. I’m only here as a messenger.\"\n\n\"I have news!\"\n\n\"It’s too late, Robyn.\"\n\n\"But...\"\n\nMarian stands up and faces you.\n\n\"I thought I knew you, Robert.  Where is that brave man that I fell \nin love with?\"\n\nShe gathers her bow and quiver and walks toward the opposite door \nand leaves the Great Hall.\n\n*page_break\n\nYou watch her feeling helpless; your mouth opens. Then you suddenly \nyell at the door after Marian, shaking your hand in the air.\n\n\"It’s not over! If no one else will go with me, I’ll go by myself!\" \nAnd with that, you point your index finger square in your chest.\n\nJaeden suddenly appears in the Great Hall behind you.\n\n\"It was Zerkit with the Benign Globe. That must have been a warning.\"\n\nYou jump and still a little shaky when you turn to face Jaeden.\n\n\"He must be stopped!\"\n\n\"You are brave, Robert of Loxley.\"\n\n\"Oh, I...gee, this is awkward.\" You scratch your head. \"I didn’t \nreally mean that I’d go alone. I was just saying that for dramatic \neffect.\"\n\n\"Oh. I see.\"\n\nHe looks at you steadily. You pull up your hood.\n\n\"Is what Marian said true. Is it over? Have you decided against \nhelping us?\"\n\n*choice\n  #Yes, It's Over. You Cannot Fight The Dark Elves By Yourself.\n\n    \"I guess it is, Jaeden. I can’t get your globe back by myself.\"\n\n    His facial expression does not change.\n  \n    \"That’s all right. I understand. It’s not your fight, after all. \n    I’ll send you home when you are ready.\"\n\n    \"I'm sorry, Jaeden. I'm not the man you think I am.\"\n\n    Jaeden walks over and puts his hands on both of your shoulders. \n\n    \"It is not over until it is over. Do not worry about us. Another \n    way will be revealed to stop Zerkit.\"\n\n    He pulls you in and wraps his arms around you. \"Remember, Robyn, \n    always look for the silver lining, especially if it's a circle.\"\n\n    You think that's an odd thing for Jaeden to say right before he \n    instructs you to, \"Close your eyes and relax.\"\n\n    You do as Jaeden tells you. Your mind goes blank, and you have \n    never felt as peaceful as you did right then; not even when your \n    mother sang your favorite lullaby to you as you fell asleep every \n    night back in Loxley. \n   \n    Suddenly, your mother's sweet face and red hair comes to your mind. \n    You can see her clearly as she pushes a stray eyelash from your cheek.\n\n    \"Good night, my sweet Robert.\"\n\n    *set coward %+10\n\n    *goto rhelvesend1\n\n        \n  #I Would Say, Yes, But Something Has To Be Done!\n\n    \"I'm not sure if it's going to work, but I do have an idea.\"\n\n    \"You're a wise one, Robyn Hood of Sherwood Forest.\"\n\n    \"They knew we were coming, I just know it, so I have to sneak up \n    on them. Can you find me a black horse?\"\n\n    \"That is not a problem. Let me know if there is anything else you \n    need.\"\n\n    You spend the afternoon up on the grassy hill exercising, and \n    practicing with your sword.\n\n    *set leadership %+10\n\n    *goto rhelvesend2\n\n       \n  #No, It's Not Over!\n     \n    \"Jaeden, I mean it. Someone has to stop...uh, Zerkit did you say?\"\n\n    Jaeden nods his head.\n\n    \"Someone has to stop Zerkit, and if it has to be me alone, it has \n    to be me alone.  After all, I'm the one who is Robyn Hood.\"\n\n    Jaeden's expression almost change when you give him the news. Almost.\n\n    \"You are a brave man, Robyn of Sherwood Forest; but to help you succeed,\n    I want to teach you some movements that male Elves of Light use to\n    retell stories of our ancient ancestors during the 'Light of Vanuite'\n    celebration. I believe they will help you when you meet Zerkit, which \n    you must before this quest is over.\"  \n    \n    \"I am willing and ready, Jaeden; and I just had my own idea on how\n    I can sneak into the Dark Elves' camp.\"\n\n    \"Oh?\" \n\n    The corner of Jaeden's lip just went up slightly.\n    \n    *set brave %+10\n\n    *set wit %+10\n\n    *goto rhelvesend3\n\n*label rhelvesend1\n\n*page_break\n\n*image robinmarian.png\n\nIt is early evening, the sun just setting behind the horizon. You are \nsitting on logs around a large fire.\n\nYou suddenly jump up and begin looking around, your eyes wide. Then you \nblink several times before you begin rubbing them. \n\nYou look around again.  When your eyes focus, you can clearly see that \nyou’re at home, in your hidden camp, in Sherwood Forest. \n\nYour Merry Men are hooting and hollering, drinking ale and having knife \nfights as Marian finishes a ballad while playing her lute. As always, \nGretchen is clapping to the rhythm.\n\nMarian has been watching you. \"What’s wrong, Robyn?\"\n\n\"Nothing, Marian. Nothing,\" you say as you continue to look around the \ncamp, still a little disoriented.\n\n\"Are you sure?\"\n\n\"Yes, yes, I'm sure.\" You give her a kiss. \"Go ahead, play us another \nsong.\"\n\nShe continues to frown from worry, but she begins to tune her lute.  \n\n\"Everyone, Robyn has asked for another song.\"\n\nSuddenly, you notice a cord made from thin strips of woven silver \naround Marian's neck. Where did that come from? It wasn't there before...\n\nYou quickly take her hands to turn her towards you. You look at her \nearnestly.\n\n*page_break\n\n\"Did you have some bad news for me about Prince John placing a large \nprice on my head and that bounty hunters will be soon coming after me \nto turn me in,dead or alive?\"\n\nShe looks at you, eyes wide, almost fearful.\n\n\"I was trying to decide when to tell you. I'm sorry.\" The brows above \nher eyes furl as she looks at you. \"How did you know?\"\n\nFrom no where words come back to you in Marian's voice.\n\n\" ...there’s a reason you’re known as a hero! You can use your wit \nagainst those barbaric Dark Elves!\"\n\nYou kiss Marian lovingly, then let go of her to shout into the air, \n\"Jaeden!\"\n\nNow Marian looks at you startled.\n\n\"Robyn! What's wrong? Who is Jaeden? Who are you calling?\"\n\n\"Jaeden! Jaeden! Jaeden!\" \n\nYou continue to call madly into the air.  Your men have quiet down, \nand they now look at you with furl brows. They begin to speak to \nthemselves about your unusual behavior, wondering if you had lost \nyour mind.\n\n\"Jaeden! Where are you? I was wrong! Jaeden!\"\n\nBut King Jaeden, Of The Elves Of Light, did not respond.\n\n*page_break\n\nIt isn't long after  when Robyn Hood's camp was raided by Palace \nguards. Many of the men were lucky to escape into the forest, perhaps \nbeing caught some other time; still others were not.\n\n\nAllan a Dale's family was allowed to bury his body in Pappiewick Church.\n\nWill Scarlett's grave lies in Blidworth Church.\n\nTuck returned to his regular duties at Newstead Abbey, became a Friar,\nand was later buried there.\n\n\nMarian's family arranged a marriage for her with the Duchy of Brittanny, \nand she was never allowed to return to England again.  She lived there \nwith her handservant Gretchan who aided her in raising eight children.\n\nRobert Dore's body was not found at the camp under the Major Oak. Some say \nthat he finally escaped and made it to Wales.\n\nOthers say that Robert was injured and that Little John helped him get \naway to his cousin, of his mother's blood, at Kirkley. His cousin was \nunable to help him, and this is where Robert Dore of Loxley died. Little \nJohn buried him in a grave near Kirklees Priory.\n\nLittle John himself is known to have been buried in a St. Michael's \nChurch graveyard in Hathersage, Derbyshire, under a yew tree.\n\nIt took several centuries before the known properties, including the content \nof each cave, the stables, the wells, and the farm, that belonged to Robyn \nHood and his Merry Men were all discovered. \n\nRobyn Hood was indeed, a Prince Of Thieves.\n\nThis is the end of this tale about Robyn Hood, but there are more.\nYou can either go back where you chose this adventure to select another,\nbegin reading the tales about about Marian Fitzwalter and Robin Hood,  \nor end the Unusual Tales now:\n\n*goto_scene ending\n\n\n\n\n*label rhelvesend2\n\n*page_break\n\n*image onlyrobin.png\n\nA young female Elf of Light brings you an evening meal which she serves \non a low table.\n\nEven though you are enjoying your meal third Elves of Light meal more \nthan your first and second, you finally realize that you have yet to see \nany meat with your meals. \n\n\nYou ask the young Elven maiden, who is now serving the hot musky tasting \ndrink that could use some cream and sugar, why not?\n\n\"We live in harmony with all of Vanuite's children, and that includes \nall that live in the forest, the rivers, the lakes, the ocean, and the \nmountains.\"\n\nHow do you respond?\n\n*fake_choice\n  #\"Not even with hot chicken gravy?\"\n    \"I mean, there's nothing like chicken gravy covering a roasted \n    rooster.\"\n\n    She looks at you with eyes wide and drop mouth, as she stumbles \n    backwards to exit your tent and get away from you as quickly as \n    possible.\n\n    \"I'm just asking,\" you say before you take a long gulp of the \n    drink and shout,\n \n    \"BOY, DOES THAT HIT THE RIGHT SPOT!\"\n   \n     \n  #\"Not even if one was eating you?\"\n    \"I heard the largest animals have the tenderest flesh.\"\n    \n    \"No.\" She quickly picks up the dishes, puts everything back into the large\n    basket that she had use to bring them in, then exit your tent.\n\n    You're sitting at the table still with the fork in your hand.\n\n    \"Hey!\" You call after her. \"I was still eating!\"\n     \n    You mumble to yourself, \"I was just asking, geez,\"  before you take \n    a long gulp of the drink and shout, \"BOY, DOES THAT HIT THE RIGHT \n    SPOT!\"\n\n  #\"Not even their children?\"\n    \"You haven't really eaten until you've had a nice spring lamb.\"\n    \n    She looks at you with eyes wide and drop mouth, as she stumbles \n    backwards to exit your tent and get away from you as quickly as \n    possible.\n\n    \"I'm just asking,\" you say before you take a long gulp of the drink \n    and shout,\n \n    \"BOY, DOES THAT HIT THE RIGHT SPOT!\"\n       \n\nJaeden enters your tent after you have eaten.\n\n\"I have found you a black horse, Robyn. Are you ready?\"\n\n\"I guess I'm as ready as I'm going to be. I promise that I would bring \nback your Benign Globe and I'm going to get it for you.\"\n\nThe corners of Jaeden's mouth lifted just slightly.\n\n\"Thank you Robyn.\"\n\n*page_break\n\nJaeden, Killia, and the other Elves of Light wait for you at the gate that \nleads out of the Elves Of Light's home.\n\nYou mount the black horse that Jaeden chose for you. \n\n\"May Vanuite be with you, and I will see you soon, my new friend.\"\n\n\"May Vanuite be with you,\" the others say.\n\nThey wave, you wave back, and then you face the road that will lead you \nonce again to the Dark Elves' Camp.  \n\n*image onlyrobin.png\n\nRobert Dore never returned to the Elves of Light home. No one, not Marian, \nnot Black Mike, not the Elves of Light, nor even the Merry Men of Sherwwod\nForest has, ever seen Robyn Hood again. \n\nAlso, the Benign Globe was never recovered, nor had anyone seen Zerkit \nor any of his warriors that were with him.  When the Morgas \ninvestigated on behalf of the Elves of Light, nothing was found at \nthe camp's location but a large blacken indintation as if the ground \nhad been scourched. \n\nKing Jaeden had returned Black Mike and Maid Marian to their homelands \nwith their memories altered. In addition, no one had ever heard of Robyn \nHood and his Merry Men, and it was never believed that Robert was \nresponsible for the death of his father-in-law.\n\nThe men within and around the great oak continue living there in \npeaceful harmony. They welcome anyone who was down on their luck, \nand men came and went as they pleased. \n\nThey were never hassled by the law.\n\nThey had no reason to steal.\n\nAnd, for reasons they could not fathom, Jack, Little John, William,\nWill Scarlett, and Lars some how knew that they were the ones responsible\nfor keeping everything in order in and around the great oak in Sherwood\nForest. Especially when Prince John became King. \n\nThis is the end of this tale about Robyn Hood, but there are more.\nYou can either go back where you chose this adventure to select another,\nbegin reading the tales about about Marian Fitzwalter and Robin Hood,  \nor end the Unusual Tales now:\n\n*goto_scene ending\n  \n\n\n*label rhelvesend3\n\n*page_break\n\n*image  onlyrobin.png\n\nFor the next few hours, on the grass hill next to your tent, Jaeden \nteaches you how to move quickly from a standing position to a squatting \nposition, how to tumble, how to crawl low and fast, and how to make \nquick jabbing motions into the air with your flat hand and with your \nfist.  He teaches you how to control your body to move slowly and to \nstay as he says, \"frozen as ice\", in any position.\n\nYou practice into the early evening drinking water and a plenty of\nlarge glasses of Bessie the Cowgirl's milk.\n\n\nJaeden enters your tent as you're practicing a few  moves.\n\n\"I feel that you are ready, Robyn. Do you feel that as well?\"\n\n\"Almost. I believe that the Dark Elves knew that we were coming.  \nTheir hearing and other senses must be more acute than mankind. Am \nI wrong?\"\n\n\"You are right. They smelled you and your horses long before they \nactually saw you.\"\n\n\"Than, I need a bath. Where's the nearest pond or river?\"\n\nJaeden looks at you oddly and then lift the corners of his mouth \njust a touch.\n\n\"No need. I'll have a maiden prepare you a bath, Robyn.\"\n\n*page_break\n\nNot only does Jaeden have a maiden prepare you a bath, but she \nfills the warm water with leaves of plants that grow in the area \nnear the Dark Elves' camp. \n\nShe actually helps you bath with a natural sponge.\n\nI know you're not crazy enough to tell Marian this part of your \nstory when you return home, right Robyn? That is, you won't if you \nwant to keep all of your fingers.\n\n\nYou are clean, dry, and wearing a Elf robe when Jaeden enters.  \nYou look down at your clothes that are laying on a high thick \nsleeping cot.\n\n\"I can't wear these, they're dirty.\"\n\n\"We can take care of that.\"\n\n\"No, Jaeden. I need a new set of clothing. Can you find me a black \npair of pants, high black boots, black long sleeve shirt and a black \nhood?\"\n\nJaeden looks at you with the same expression that he always has.\n\n\"Yes, that is very possible.\"\n\n\"And black paint.\" You say to him as he begins to walk away.\n\nHe turns.\n\nFor the first time, you notice a little furl in Jaeden's blond \nhaired brow.\n\n*page_break\n\n\"What?\" He asks.\n\n\"The Dark Elves have keen senses, so I have to become unheard and \nunseen. I want you to paint my face and hands with black paint.\"\n\nJaeden looks at you unemotionally.\n\n\"That can be arranged.\"\n\n\"And a clean black horse?\"\n\n\"Of course, Robyn. Anything else?\"\n\n\"No, can't think of anything.\"\n\nThen you see what you have are waiting for. The little corners of \nJaeden's mouth lifts up.\n\nYou smile, then laugh as you slap Jaeden on the back.\n\n\"Now I'm almost ready to get your Globe back for you!\"\n\nThe same Elf maiden who help with your bath now paints your arms, \nhands, face and neck with the black paint. You put on the clothing \nand look at yourself in the mirror.\n\n\"Perfect,\"  you say, remembering not to smile and show your teeth.\n\nAgain, an Elf escort you to the large gate where, Jaeden, Kilia, and \nother Elves of Light are waiting.\n\n*page_break\n\nYou mount the black horse that Jaeden chose for you. \n\n\"May Vanuite be with you, and I will see you soon, my new friend.\"\n\n\"May Vanuite be with you,\" the others say.\n\nThey wave, you wave back, and then you face the road that will \nlead you once again to the Dark Elves' Camp.\n\n*finish\n\n*goto_scene rhelves5\n\n\n  ", "rhelves5": "*label rhelves5\n\n*page_break\n\n*image onlyrobin.png\n\nYou do not get lost this time, nor do you run into anyone taking a\nnight stroll, so it doesn't take you as long to make out the tops of \ntheir tents on the other side of a hill as it did earlier \nthat day. \n\nYou dismount and rummage through the pack for the Benign Globe sack. \nYou loop the sack through your belt.\n\nYou stroke the long nose of the horse.\n\n\"If all doesn’t go well, you make sure to head back home. Otherwise, \nI'll be back as quickly as I can.\"\n\nThe horse responds with a whinny and head nod as you brush its flank.\n\n\"Here I go.\"\n\nKeeping low, you crawl down the hill until you reach the very first \ntent in their camp. You stand, stepping quickly and staying in the \nshadows. \n\nA few torches are lit where you are, but no one is in sight. You can \nsee the brightness of a larger fire in the area that must be the middle \nof the camp. You hear the Dark Elves whooping and hollering.\n\nYou keep moving forward, looking around until you notice the most \nlavish of the tents.\n\n*page_break\n\nYou enter.\n\nThe lighting is low, but you make out the Benign Globe sitting on a \npillow on a table on the other side of the tent. \n\n\"Ah. This is easier than I thought it'd be,\" you say out loud because \nyou're just that proud of yourself.\n\nThen, you think you hear a voice. \n\nYou instantly freeze although you're not sure if you actually heard \nsomeone speaking or not.  Jaeden had taught you that this move was good \nfor times such as this one.\n\nThen what do you hear?\n\n*fake_choice\n\n  #\"Sheesha, Magna Din?\"\n\n    You haven't heard the Elves of Light speak in their native \n    language so it's possible that's one of them right now; but \n    where?\n    \n\n  # \"Your Words Are Third Language.\" \n    \n    That is definitely a voice. You know that some Fair Folk \n    speak English, so hearing your native tongue doesn't \n    surprise you. \n\n    Still, you need to be careful. That sentence came out \n    awkward. Not as refine as the Elves of Light speak. \n     \n\n  #\"I know not Zerkit.\"\n\n    That is a voice and you already know that some Fair \n    Folk speak English, so hearing your native tongue doesn't \n    surprise. \n\n    Still, you need to be careful. That sentence came out \n    awkward. Not as refine as the Elves of Light speak.\n    Could be a Dark Elf trying to fool you. It is very dark\n    in that tent.\n\n\"Please tell me who you are.\"\n\nThe voice came just above a whisper, very low in resonance, it\nis high with a lilt. You use only your eyes to scan the tent as \nmuch as you can without turning your head.\n\n\"Did you come to save me?\"\n\nWell, that certainly cannot be a Dark Elf, so you relax. You look \naround until you see an embellished golden cage on the floor. You \ndon't believe what you're looking at as you walk towards it.\n\n\n*page_break\n\nThe fairy in the cage had plenty of room to stand straight up.\n\n\"Did you come to save me?\" She ask again.\n\n\"You're a fairy,\" you say instead of answering her question.\n\nYou squat down so that you can see her closer. She is pale, not as \nbright and colorful as the ones you saw in the valley that afternoon.\n\n\"Correction,\" she says. \"I'm Zerkit's pet fairy, unless you free me \nfrom this cage.\"\n\n\"I'm Robyn Hood.\" You say. \"What is your name?\"\n\n\"You're Robyn Hood?\" She gives you a little smile and her color \nbrightens for a few seconds. \"Nice to meet you. They call me Laney.\" \n\n\"Nice to meet you, Laney.\"\n\n\"But, why are you dress in black? Is your skin really that color? I had no\nidea you look like this. I could barely tell someone was in the tent when \nyou entered.\" \n\nYou smile.\n\n\"That's the point, Laney. I wanted to make it difficult for the Dark \nElves to see me.\"\n\n\"Ohhhhhh!\"\n\n\"How did Zerkit catch you? You can fly?\"\n\n*page_break\n\n\"The Dark Elves entered our village. They had some sort of catcher. \nIt was made of a fine weave of a metal we had never seen before. They \nthrew it, and it caught me. I couldn't fly, I couldn't break through, \nand it made me fall from the sky!\"\n\n\"Like a net?\" You ask.\n\n\"I don't know what they call it. They told me if I did not help them\nmore Dark Elves will come with more of those catchers and take more \nof my people captive. I couldn't let that happen!  I didn't know what \nthey planned on doing with the Benign Globe, but I help them get it \nfrom the Elves of Light.\"\n\nWell, now you know how the Dark Elves got the Benign Globe.\n\nLaney begins to cry. Little shiny white beads falls from her eyes.\n\n\"Now Zerkit won't let me go! He says that I'm now part of his \ncollection.\" She cries some more. \"I've been stuck here so long, and I \nmiss my family. Please release me so that I can go home,\" she whines, \nwith good reason, in her high lilt voice.\n\nYou realize that Laney must have lived in the village that you saw \ndisappear with the Benign Globe. You didn't know how to tell her. \n\nWhat do you do?\n\n*fake_choice\n  #Release Her. Maybe That Wasn't Her Home.\n\n    \"Laney, I came here for the Benign Globe, but of course I'll \n    let you free.\"\n\n    *set cautious %+10\n   \n       \n  #Release Her And Tell Her What You Saw.\n    \n    \"Laney, I came here for the Benign Globe, but of course I'll let \n    you free. However, there is something you must know first. I think that \n    Zerkit use the Globe on your villiage.\"\n   \n    Laney looks at you confuse. \"What do you mean?\"\n\n    \"The Benign Globe is a weapon. Zerkit used it on a small village \n    below the hill sides of the Elves of Light's home.\"\n\n    She looks at you with her eyes wide.\n\n    \"There was a large colorful tree in the middle of the village, and \n    I saw fairies.\"\n\n\n    \"And?\" Laney ask.\n\n    \"I'm sorry, Laney, but the village is now gone. Destroyed by the \n    Globe.\"\n\n    Laney sits down and her crying becomes worse.  The beads from her \n    eyes create two little triangle towers that shine nearly blinding\n    Robyn.\n\n    *achieve diamonds\n  \n     \n    *set brave %+10\n \n       \n  \n  #Don't Release Her. It's Too Dangerous.\n\n    \"Laney, I came here for the Benign Globe. Releasing you may be too dangerous. \n    The camp is filled with Dark Elf warriors.\"\n\n    Laney sits down and her crying becomes worse.  The beads from her eyes create\n    two little triangle towers.\n\n   \n    *set cautious %+10\n    \n    *set coward %+10\n    \n\nYou stand up and notice that the cage has a lock in the latch, so you \nbegin to look for the key, hoping it is simply lying around the tent. \n\nAnd there it is! Right on the table right next to the cage. This entire \nquest is  turning out to be much easier than you had first imagine it \nwould be. Of course, you weren't planning on finding Laney, but you are \nhappy to be doing a real [i]\"Robyn Hood Thing\"[/i] right now. \n\nYou bend down and put the key into the key hole, but no matter how many \ntimes you turn it left, or turn it right, the lock will not release.\n\nThen you hear Laney say real low, \"Oh, no.\"\n\n*page_break \n\nZerkit enters the tent and you freeze bent over with the key in the lock.\n\nHe stares, frowning, gritting his teeth and sniffing the air.\n \n\"What is this? A shadow stealing my Fae?\"\n\n\"I am not a shadow, Zerkit; but I will be releasing this Fae.\" \n\nYou stand up. \n\n\"Oh, and I'm taking the Benign Globe and returning it back to the Elves of \nLight.\"\n\nZerkit glares at you and growls fiercely.\n\n\"Grrrrrrr! Your heart is my Bharat’s supper!\"\n\nYou don't know what a Bharat is, and once you see Zerkit unsheathe his \nsling blade, and rush after you, you think this is not the best time \nto ask.\n\nZerkit swings his blade as you tumble away. \n\nWhile Zerkit is busy with you, Laney uses the opportunity to work the key.\n\nZerkit madly looks around for you, but due to the little light in his \ntent, you are blending too well with the darker corners. This is only \nmaking him angrier.\n\n*page_break\n\n\"Grrrrrrrowl! What you are, not matter! The keckals will have your \neyes always!\"\n\nAs Zerkit rushes to the wrong place and swings madly in front of himself, \nyou really want to take this time to ask what a keckal is. It likes eyes, \nso you assume it's some sort of bird, maybe?\n\nYou circle behind Zerkit, staying low, waiting for the right moment to \nrush him.\n\nHe turns, you make several short jabs with your fists into his side.\n\nZerkit drops his blade as he falls heavy onto the rug.\n\n\"Oof!\"\n\nSuddenly, there is bright light zipping in the air and it begins \ncreating a series of tight circles around Zerkit. \n\nThe color of the tree in the village begins raining down on him as \nlight dust, then sparkle and explode into brighter lights of reds, \nblues, yellows and oranges as it floats down.\n\nIt is Laney. She escape the cage and is attacking Zerkit with fairy \ndust. \n\nZerkit is screaming in agony.\n\n\"Arrrrrrrggh!\"\n\n*page_break\n\nYou take this opportunity to grab the Benign Globe and run out of \nthe tent.\n\nBreathing hard, you look around. It sounds like most of the Dark Elves \nare still in the center of the camp, yet you hear some coming towards \nZerkit’s tent.\n\nZerkit stumbles out of the tent holding his side with one hand, and Laney\nwith the other. She is twisting and trying to get out of his grip. He \nglares at you.\n\n\"You...you are hu-man! I am Zerkit! Mighty King of the Dark Elves! \nScourge of the Mountain People! You cannot defeat me!\"\n\n\"I am Robyn Hood who steals from the rich to give to the poor. I am \nthe redeemer of the Benign Globe...\"\n\nYou raise the globe higher and direct it at Zerkit’s middle.\n\n\"...and the bringer of death to Zerkit, the Dark Elf King.\"\n\nLaney shouts, \"Robyn, don't!\"\n\nZerkit yells, \"No! No! I have three wives, eleven children, twenty \nZagwars, and a Bharat to feed!\"\n\nOkay, now, you absolutely have no clue what a Zagwar is, but that Dark \nElf must be doing pretty well if he has twenty of them; still, this is \nnot the time to ask.\n\n*page_break\n\nWhat do you do?\n*choice\n  #You Save Laney And Spare Zerkit's Life.\n\n    “I tell you what, Zerkit. I'm in a good mood tonight and I'm going\n    to give you a choice. You can let go of Laney and leave here on your \n    own, take your warriors with you, go to your mountain home, and never \n    return or bother these peaceful folk again. \n    \n    Or, you can leave my way.”\n  \n    You raise the globe to his head.\n\n    “No, no! I go, I go! I, Zerkit, don't want to go, poof! I love \n    my Bharat!”\n\n    Zerkit immediately lets go of Laney. She raises to the air and \n    flies beside you. The King of the Dark Elves jumps on his horse that\n    waits for him beside his tent, and races away towards the high \n    mountains.\n\n    *set leadership %+10\n\n    *set brave %+10\n\n    *goto rh9d\n\n  #You Save Laney And Destroy Zerkit.\n\n    You look at him, but you don't have to think long.\n\n    \"No, Zerkit. I saw what you did to Laney's village, how you \n    destroyed it and everyone who lived there. You don't deserve to \n    be spared.\"\n\n    \"No! P'eese!\"\n\n    \"I hope your race learns a lesson from this and there will \n    no longer continue in your old ways and changes the Dark \n    Elves for the better.\"\n\n    With that, you hold the globe up to Zerkit's head.\n\n    \"Now Laney! Shake your fairy dust!\"\n \n    It took Laney a moment to realize what you mean, then she \n    concentrates and shakes until she makes a spark and an explosion \n    of purple and green.\n\n    \"Owwwwll!!\" Zerkit yells, he opens his hand, and Laney flies away.\n\n    The Benign Globe colorful lights expand and encirclse him.\n\n    He shrieks.\n \n    \"No! Rrrggggh!!\"\n\n    Within moments, he is gone.\n\n    *set brave %+10\n\n    *goto rh9e \n\n  #You Save Laney And Threaten All Of The Dark Elves' Lives.\n\n    You look at Zerkit, thinking.\n\n    \"All of you Dark Elves are a big threat to the Fair Folk, Zerkit. \n    What if I do to you what the Elves Of Light didn't do centuries \n    ago, and destroy all of you right now?\"\n\n    \"No! Look, I let go of fae!\"\n\n    Zerkit releases Laney and she flies over to you. Zerkit keeps both \n    hands over his head.\n\n    \"And you will leave now and never return to bother these beautiful \n    peaceful beings?\"\n\n    \"I, Zerkit, promise on all my wives, children, and Zagwarg's life!\"\n\n    You turn to one of the tents, and you release the power of the Benign \n    Globe on it, just to prove your point.  The the color lights of the \n    globe circled the tent within seconds was gone.\n\n    \"AAAIIIEH!\" Zerkit screams and runs. He jumps on his horse that waits\n    beside his tent and head towards the high mountains.\n    \n    *set brave %+20\n\n    *goto rh9e\n\n*label rh9d\n\n*page_break\n\nSome Dark Elves warriors hear you and their king shouting and are \nrunning towards his tent when he races past them. Confuse, they look \ntowards his tent and see the Benign Globe appear to float. After all, \nthey do not see you because you are hidden in the darkness.\n\nTheir eyes wide, they shout in fear, \"Globe is cursed!\"\n\nWithout thinking it through logically, they stumble over their own feet \nto reach their horses. Some of the Elves weren't even fully on their \nhorses' back when their horse took their hysterical quick kicking on \ntheir sides as a signal to begin galloping.  \n\nThey shout a warning to the others.\n\n\"Rrrggggh! Globe haunted! Run!\"\n\n\"Globe cursed!\"\n\n\"Get out of way!\"\n\n\"Zerkit gone!\"\n\n\"Spirits! Evil spirits!\"\n\n\"Run for life!\"\n\nThe Dark Elves are mighty warriors, but extremely superstitious.\n\n*page_break\n\nTo make sure that all of the warriors receive the message that the \nBenign Globe is curse, you run around the camp holding it out at \narms length. The colors swirl around it as you run. \n\nLaney helps by flying around creating burst of sparkles over their \nheads as they rush around their camp, arms covering their heads,\nas they attempt to escape the chaos.\n\nIt is not long before the Dark Elves mounted an available horse and\nraces to the high mountains leaving the camp completely empty. \n\nYou place the globe into it's sack when you feel satisfy.\n\n\"Thanks Laney. I wasn't sure if I could beat Zerkit on my own, but you \nreally helped.\"\n\nShe happily dances beside you, twirling back and forth.\n\n\"I didn't know you had any powers,\" you continue. \"Jaeden lead me to \nbelieve that all of the Fair Folk are passive and that what powers \nyou may have once had were long gone.\"\n\n\"We are and they were! I don't know what came over me. I didn't even \nknow I could do that!\" \n\nShe flies high above your head making little color burst that were\nnot harmful.\n \n\"I kept thinking,\" she continues, \"about how my family and friends are \njust...gone. I no longer have a home and Zerkit is responsible for that.\nI just had to get him back for that!\"\n\n\"I guess you just needed to become really angry.\" You smile.\n\nShe flies down and faces you wearing a smile. \"I guess so!\" She laughs. \nHer high lilt voice becoming even higher.\n\n\"What are you going to do now? Where are you going to go?\"\n\nShe slows down and looks a little sad for a moment.\n\n\"There are more of us, somewhere, I just don't know where.\"\n\n\"Perhaps Jaeden knows. Return with me to the Elves of Light \nhome.\"\n\n\"Oh, I hope so!\"\n\n\nYou reach the point where you left your horse pack the globe. \nSoon you're back on the trail to Elves of Light home with Laney \nflying beside you. \n\n*finish\n\n*goto_scene rhelves6\n\n*label rh9e\n\nSome Dark Elves warriors hear you and their king shouting and are \nrunning towards his tent when he races past them. Confuse, they look \ntowards his tent and see the Benign Globe appear to float. After all, \nthey do not see you because you are hidden in the darkness.\n\nTheir eyes wide, they shout in fear, \"Globe is cursed!\"\n\nWithout thinking it through logically, they stumble over their own feet \nto reach their horses. Some of the Elves weren't even fully on their \nhorses' back when their horse took their hysterical quick kicking on \ntheir sides as a signal to begin galloping.  \n\nThey shout a warning to the others.\n\n\"Rrrggggh! Globe haunted! Run!\"\n\n\"Globe cursed!\"\n\n\"Get out of way!\"\n\n\"Zerkit gone!\"\n\n\"Spirits! Evil spirits!\"\n\n\"Run for life!\"\n\nThe Dark Elves are mighty warriors, but extremely superstitious.\n\nTo make sure that all of the warriors receive the message that the \nBenign Globe is curse, you run around the camp holding it out at \narms length. The colors swirl around it as you run. \n\nLaney helps by flying around creating burst of sparkles over their \nheads as they rush around their camp attempting to escape the chaos.\n\nIt is not long before the camp is empty of Dark Elves. You place \nthe globe into it's sack when you feel satisfy.\n\n*page_break\n\n\n\"Thanks Laney. I wasn't sure if I could beat Zerkit on my own, but you \nreally helped. I didn't know you had any powers. Jaeden lead me to \nbelieve that all of the Fair Folk are passive and that what powers \nyou may have once had were long gone.\"\n\n\"We are and they were! I don't know what came over me. I didn't even \nknow I could do that!\" \n\nShe flies around your head.\n \n\"I kept thinking,\" she continue, \"about how my family and friends are \njust...gone. I no longer have a home and Zerkit is responsible for that.\"\n\n\"I guess you just needed to become really angry.\" You smile.\n\nLaney smiles. \"I guess so!\" She laughs. Her high lilt voice becoming \neven higher.\n\n\"What are you going to do now? Where are you going to go?\"\n\nShe slows down and looks a little sad for a moment.\n\n\"There are more of us, somewhere, I just don't know where.\"\n\n\"Perhaps Jaeden knows. Return with me to the Elves of Light home.\"\n\n\"Oh, I hope so!\" \n\n*goto_scene rhelves6\n\n*finish \n\n", "rhelves6": "*label rhelves6\n\n*page_break\n\n*image robinmarian.png\n\n\n\nAs the light of the new day slowly rise over the horizon, you and \nLaney reach the gates to find Jaeden and Killia waiting for you. You \njump down from the horse, reach into your pack, remove the sack, \nthen produce the Benign Globe.\n\n\"Here, Jaeden. I am proud to return that which belongs to you.\"\n\n\"Thank you, Robyn, friend, you have done well.\"\n\n*achieve longbow2\n\nYou look up and point to the fairy flying beside you.\n\n\"Jaeden, may I introduce Laney. She was a Dark Elf captive, then \nsuddenly found her powers and helped me defeat Zerkit. She lived in \nthe village that was destroyed.\"\n\n\"Oh?\" Jaeden says, and for the first time you believe you hear concern \nin the tone of his voice.\"Come closer, little one.\" Jaeden says to Laney. \n\nHe looks her over intently, then the corners of his lips raise as he \npeers into her eyes. \n\n\"I knew your great-grandfather,\" he says. He slightly shakes his head. \n\"I know where others of your folk reside. I will tell you where and \nhave some of my guards escort you so that you do not have to travel \nalone.\"\n\nHe walks with his wife and attendees away from the great gate. \n\n\"First, however, you must have some nourishment, be refreshed, and \nrecuperate from being in vial hands of that Dark Elf.\"\n\n\"Oh, thank you, King Jaeden, thank you!\" She flies around in a circle of \nexcitement, creating pink non-explosive fairy dust around everyone's head.\n\n*page_break\n\nThen, suddenly, Black Mike is beside you. His two large hands engulf \nyours as he shakes it heartily before  he gives you a big man hug.\n\n\"Ya scared me thar Robyn, me friend! Me thought ya was goin' back on \nya word!\"\n\nYou happily receive his brotherly affection, but you're also twisting your head\naround looking for someone else.\n\n\"Where's Marian?\"\n  \nHe finally let's go and looks around. Only the Elves of Light surround \nthe two of you. No Marian.\n\n\"Me dun't know,\" Black Mike says.\n\n\"Didn't she return to the [i]Lady Anne[/i]?\"\n\n\"Aye, but me not see her 'fore dis mornin'.\" He looks around. \"Me\nthinks 'bout it, me don't know how me got har just now!\"\n\nJaeden and Kilia come closer to the two of you. Kilia gives Black \nMike a coy Elves of Light smile and nods her head. Black Mike responds \nwith a smile and a wink.\n\n\n\"I'm sorry to have brought you from your ship this way, Black Mike, \nbut I knew you wouldn't want to miss this celebration. The Benign Globe \nhas been returned to it's rightful place.\"\n\n\"Where's Marian!\" You ask in a rush.\n\n*page_break\n\nWhich ending do you want for this story?\n\n*choice\n  #A Hero's Ending\n    Then a horn could be heard blowing in the distance, and in a blink, \n    the entire community of the Elves Of Light appear around you.  \n\n    They are shouting your name.\n\n    \"Robyn. Robyn. Robyn. Robyn.\"\n\n    Keep in mind that this isn't really as raucous as your men can \n    become under the same situation. These are Elves of Light, and \n    they simply do not yell; but, they're saying your name, showing \n    that they are grateful, so you'll accept it just the same.\n\n    Suddenly, you're in the air, as the Elves of Light pass you around, \n    carrying you to the dining hall of the Great Hall. Instantly the \n    tables are full of food and drink.\n\n    Once again, King Jaeden is beside you.\n\n    \"Don't worry, Robyn. All is as it should be, and I've also given \n    you a special gift.\"\n\n    \"Other than the reward you've promised?\"\n\n    He says nothing, but you swear that the corner of Jaeden's lips move \n    up higher than you had ever notice before. \"Look at me Robyn. Look \n    Deep into my eyes.\"\n\n    You do and you can't believe what you see. There are all of your men,\n    smiling and waving at you. \n\n    Then, before you know it, you are asleep.\n    \n   \n    *set brave %+20\n    \n    *goto rhhero\n\n  #A Romantic Ending.\n\n     \n    \"Then, I take it that you're ready to return home?\" Jaeden asks.\n    \n    \"Of course I am ready to go home!\"\n\n    \"That is fine. You will find all as it should be.\"\n\n    \"Including my Marian?\"\n\n    \"Including your Marian, with a special gift, just as I had prmised.\n   \n    \"After all I've been through, I just want to get home to Marian.\"\n\n    \"Very well then, Robert Dore of Loxley, look into my eyes.\"\n    \n    You do, and you find yourself drifting off to sleep.\n\n    *set romantic %+20\n\n    *goto rhromantic\n\n*label rhhero\n\n*page_break\n\n*image robinmarian.png\n\nIt is early evening, the sun just setting behind the horizon. You are \nsitting on logs around a large campfire with your Merry Men.\n\nYou suddenly jump up and begin looking around the camp, your eyes wide. \nThen you blink several times and rub your eyes. You look around again. \nWhen your eyes are fully focus, you can clearly see that you’re at home, \nin your hidden camp, under the major oak, in Sherwood Forest.\n\nBehind you is a cart with two white horses.  You can see that it \nis pack high with large thick wooden chests. You automatically know \nwhere they came from.\n\nYou look around some more. Something is bothering you, but what is it?\n\n\"Marian!\" You say in panic.\n\nGretchen comes up to you and puts her hand tenderly on your shoulder.\n\n\"Robyn, what's wrong?\" She looks at you with her matronly eyes. \"She's \nin your tent waiting for you as she told you she would be.\"\n\nYou rush to your tent and enter. Marian is sitting at your small table \nwriting. She turns when she hears you, smiles and stands.\n\n\"There you are! What took you so long? I've been waiting.\"\n\n*page_break\n\nMarian is wearing her riding clothing, but at the same time they are \nnot her riding clothing.  Her skin shines, and so does her hair. Around \nher neck she wears a cord made from thin strips of woven silver.\n\nYou rush over and take her in your arms. You bend her low and kiss her. \nThen you look at her seriously.\n\n\"What’s wrong, Robyn?\"\n\n\"Quick, didn't you tell me that Prince John and the Sheriff of \nNottinghamshire have blocked all of the roads in and out of Sherwood \nForest?\"\n\nShe looks at you strangely. \"No. Of course not.\" \n\n\"And I'm not an Enemy Of The Crown and there's no large bounty of my \nhead, dead or alive?\"\n\nShe looks at you searching your eyes. \"Robyn, your name nor the activities \nhere in the forest ever come up in John's court.  He has too many other \nmuch more important worries on his mind now that he may be King.  Where \nhave you gotten these ideas?\" \n \n\"I guess in my sleep; still, it wouldn't hurt for us to make sure that \nwe have more back roads, and to clear the roads that we know about. We \nnever want to be caught under this oak.\"\n\n*page_break\n\n\"Okay,\" she says. She looks at you a bit longer. \"I think the roads to \nour home are already cleared.\"\n\n\"What do you mean? What home?\" \n\n\"Our home, Robyn. Our farm, in the Dukeries.\"\n\n\"I can't live in the Dukeries!\"\n\n\"Why not? You love our farm. Your men love our farm. They love taking \ncare of the cattle, the horses, and the crops with you.\"\n\n\"But, I'm Robyn Hood!\"\n\nShe continues to look at you. \n\n\"Robyn, are you feeling all right?\"\n\n\"Of course I am! I just don't understand why you're telling me that \nwe have a farm in the Dukeries when I'm Robyn Hood!\"\n\n\"Not there. You're Robert Dore.\"\n\n\"What?\"\n\n\"Robyn, what is this about? You're scaring me.\"\n\n*page_break\n\nThen King Jaeden's words come back to you...\n    \n\"I've also given you a special gift.\"\n\n\"Come sit by the fire, dear. I'll get you something to drink,\" \nMarian says.\n    \nYou exhale deeply, smile a half smile, and mumble, \"Thanks Jaeden.\"\n\n\"What?\" She asks.\n\n\"Nothing, love, nothing.\"\n    \nShe holds your hand and leads you to the opening of your tent. \n  \n\"Would you like for me to play a song?\" \n\n\"Yes, my dear, sweet, Marian, please play me a song.\"\n\n*page_break\n\nNo longer concerned with having a large, lavish, Palace wedding,  \nMarian FitzWalter agreed to marry Robert Dore at Steetley Chapel \nin 1199.  They had four children. \n\nSince Robert Dore was no longer an outlaw, he was free to go between his \nmother's home in London and his farm in the Dukeries. When his mother \ndied, he inherited the estate in London.  \n\nHe, Marian, Gretchen with Tuck and the other Merry Men continued to \nsupport the poor and the Abbey through the death of King John, until \nHenry the 3rd took the throne in 1216. \n\nThe law never found out that Robert Dore was Robyn Hood. Ever.\n    \nThis is the end of this tale about Robyn Hood, but there are more.\nYou can either go back where you chose this adventure to select another,\nbegin reading the tales about about Marian Fitzwalter and Robin Hood,  \nor end the Unusual Tales now:\n\n*goto_scene ending\n    \n \n*label rhromantic\n\n*page_break\n\n*image hoodandmaid.png\n\nIt is early evening and the sun is just setting behind the horizon. You are \nsitting on a log around a large pit that is cooking several wild boar.\n\nYou suddenly jump up and begin looking around, your eyes wide. Then you blink \nseveral times before you begin rubbing them. \n\nYou look around again.  When your eyes focus, you can clearly see that you’re at\nhome, in your hidden camp, in Sherwood Forest. \n\nYour Merry Men are either making some sort of commotion, drinking ale, eating or\nlistening to Marian as she finishes a ballad on her lute. As always, Gretchen is \nclapping to the rhythm.\n\n\"That was mighty lovely, my lady,\" came a complement.\n\n\"Yea, mighty lovely,\" comments another. \n\n\"Ah, my mug's empty. Time for a break!\" announces another and they all jump to\nhead to the kegs or the outdoors plumbing.\n\nMarian has been watching you. \n\n\"What’s wrong, Robyn?\"\n\n\"Nothing, Marian. Nothing,\" you say as you continue to look around the camp,\nstill a little disoriented.\n\n\"Are you sure?\"\n\n\"Yes, yes, I'm sure.\" You walk over to give her a kiss. \"Go ahead, play \nus another song.\"\n\nShe continues to frown, but she begins to tune her lute.  \n\n\"Everyone, Robert has asked for another song.\"\n\nYour eyes go wide and your mouth goes gap.\n\nYou pull her a little to the side and urgently\nwhispers in her ear.\n\n\"You just called me Robert?\"\n\n\"Uh?\"\n\n\"You called me Robert! I'm Robyn Hood.\"\n\nShe turns and looks at your, her brow twisted.\n\n\"What are you talking about?\"\n\nSuddenly, you notice a cord made of thin strips of woven silver around \nMarian's neck. Where did that come from? It wasn't there until...\n\nYou quickly take her hands and look at her earnestly.\n   \n\"Did you have some bad news for me about Prince John placing a large price \non my head and that bounty hunters will be soon coming after me to turn me in,\ndead or alive?\"\n\nShe looks at you, eyes wide, almost fearful. \n\n\"No! Of course not. Why would John do that?\"\n\n\"And there is no such person as Robyn Hood?\"\n\n\"Not that I know of. Why are you asking these wild questions?\"\n\nWilliam and Tuck approach you. They both remove their hats and bow their\nheads.\n\n\"'Cuse, me, Lord. I can drive the other cart when you're ready. Tuck and I \ncan tie our horses to the back, and Tuck's misses can ride along with him.\"\n\n\"That's a good idea!\" Gretchen says as she hands Tuck a fresh mug and gives \nhim a side hug.\n\nTuck's [i]misses[/i]? Gretchen's [i]side [i]hugs[/i] Tuck? \n\n[i]Lord[/i]? \n\n[i]What's going on[/i]?\n\n\"That's a good idea,\" Marian responds, but we're not ready to leave. I think \nRobert needs to rest for a bit. Would you bring him a mug of ale, William?\"\n\n\"Of course not, my lady.\"\n\nMarian slowly walks you to a chair at a table.\n\n\"Robert, I'm very worried about you. Maybe we should stay here for the night\ninstead of going home? That way you'll get a good night's rest and be\nready for another day of supervising the men.\"\n\nAnd that's when you notice the two white wagons with white horses near\nthe corral. The horses had a slight glow about them even though the sun \nis almost down.\n\n\"Jaeden's reward,\" you utter.\n\nMarian helps you sit down. You stare up at her\n\n\"Those two carts!\" You say excitedly. \"They're from Jaeden! He did as he had \npromised!\"\n\nYou stand up and take Marian by the shoulder and look into her eyes as the\nmen lit the trees with more lamps.\n\n\"Jaeden! He gave me back my name! He gave me a great reward!I am so happy\nthat you insisted that I helped the Elves of Light!\"\n\n\"All right, if you say so,\" she replies trying to get you to sit back down, but instead, \nyou take her in your arms.\n\nThen you give her a kiss as if there was a time that you almost lost her forever.\n\n\n*achieve spices\n\n\nThis is the end of this tale about Robyn Hood, but there are more.\nYou can either go back where you chose this adventure to select another,\nbegin reading the tales about about Marian Fitzwalter and Robin Hood,  \nor end the Unusual Tales now:\n\n*choice\n\n  # Continue With Another Robyn Hood Tale.\n\n    You won't belive this unusual tale!\n\n    *finish\n\n    *goto_scene rh8\n\n  # Begin Marian's Tales.\n   \n    A tom-boy, a spy, a fighter? Yep,\n    Marian got it all going     \n\n    \n    *goto_scene marianstory\n\n  # End Of The Unusual Tales.\n    \n    Farewell! Come Back Later!\n\n    *finish\n  ", "rhgretchen": "*label rhgretchen\n\n\n\n“Gretchen, what are you doing here?”\n\n“Looking for you on the behalf of your fiance. She is grieving over \nthe news that you are now outside of the law. Not believing a word of \nwhat she has heard, she's sent me into Sherwood Forest to ask about \nyou.”\n    \n\"Why you?\"\n \n\"Other than you, Robert, I am the only one she completely trust.\" \nShe smiles.\n\nYou give her an understanding nod.\n\n“Listen, Gretchen, this is not a good place for us to talk. We are \nout in the open here. Mount your horse and follow us to a more secluded \narea.”\n\nYou replace your hood and mount Clint.   Gretchen mounts her horse, \nand the men mount theirs, and together you lead Gretchen  to  your hidden \ncave in the Creswell Crags which was near by. You all dismount and allow \nGretchen to sit on the most comfortable rock.\n\n“You see Gretchen, I live in the forest now, and these men...well, \nwe're sort of a gang.”\n\n*page_break\n\nGretchen's eyes grow wide. “Oh!”\n\n\"But a good gang.\"\n\nShe smiles.\n\n“Where is Marian?” You ask.\n\n\"She is waiting for me at Prince John's Palace at Clipstone.  I am\nto take you to her in the back court yard where there are fewer guards\nif I found you.”\n\nThe men look at you. They know you go no where without at least two of \nthem; one in front of you and one behind, at all times.\n\n“Ah, gee, Gretchen, I don't think that would be the  best thing to do.” \n\nYou pause to think.\n  \n“Listen, I'm sending Lars and Jack with you. They'll lead you back  to the \nPalace, then hide and wait.  Tell Marian  that you found me, come up with an \nexcuse to leave the Palace, then they'll return to our hide out with both of \nyou.\" \n\nShe bows at you and smiles. “Sounds like the perfect plan.”\n\n*page_break\n    \nIt was late in the afternoon when you hear horses approaching in the \ndistance. You hide while Little John, William, and Brett take \nto the trees.\n  \nYou hear the all clear signal, and walk forward.  In the near distance \nyou can see Lars and Jack escorting Marian and Gretchen to the major oak. \n   \nYou shout and wave.\n\n“Marian!”\n\nShe drops her reigns. “Robert, it [i]is[/i] you!” She  runs the short distance \nto you. What do you do?\n\n*choice\n  #You Take Her By The Hands And Look Fondly Into Her Eyes.\n    You care about Marian.\n   \n    *goto rh6c\n\n    *set romantic %+10\n              \n  #You Take Her Into Your Arms And Hold Her Tight.\n    You've missed Marian very much.\n\n    *goto rh6c\n    \n    *set romantic %+20\n       \n  #You Lean Her To The Side And Give Her A Long Kiss.\n    Marian is definitely your woman!\n\n    *goto rh6c\n\n    *set romantic %+30\n\n*achieve wild    \n\n    \n*label rh6c    \n  \n“I knew I'd find you in the forest, Robert. It only made sense that you'd be \nhere!” \n\nYou hand her the wild flowers you had been gathering while you wait for her\narrival. You remember how much she loves receiving flowers.\n\n*achieve wild\n\nShe hugs you some more than you sit her down to listen to her side of \nthe story.  \n\n“At first, I sent a private messenger with a letter to your uncle and \ncousin in Wales, and they claimed they had not heard from you. I was \nworried. I had to find out what had happened to you,  but John has the \nSheriff of Nottinghamshire watching me so closely.  He's practically what \nI'm trying to bathe! That's why I made up some excuse about needing to \nget away from the city, into the forest, to cousin John's Palace.\"  \n\nYou kiss her. “You have no idea how much I have missed you.”\n\n“Robert, why did I have to meet you out here?  Why didn't you sneak into \nthe back of the Palace grounds as I had instructed in my message?” \n\n\"I wanted you to meet me at our hide out so you know how to come here \non your own whenever you wanted. We have watch points, traps, and alarms \nthat warn us of anyone approaching.\" \n\nMarian and Gretchen look around at the very organize living area of \ntables, chairs, tents, a stable of horses, a large central fireplace, \nand smaller fire for cooking.\n\n“Wait, I don't understand. What is this place?”\n\nHow do you answer her?\n\n*choice   \n\n  #“Well, This Is Our Main Hideout.\" \n\n    \"We also have a several caves where we keep our additional \n    supplies and hold up when we need to. You see, I can't return \n    home, not now, not as long as they think that I've murdered \n    my step-father. So, I live here, in Sherwood Forest, and these \n    are just a few of my men.\"\n\n    *goto rh6d\n\n    *set leadership %+10\n\n\n  #\"We Can't Return To Our Homes.\"\n\n    \"We are all living out of the law for one reason or another,\n    Marian, so we live here, together, sharing and taking care\n    of one another.\"\n\n    \"But, how are you acquiring all of this? I know that you haven't \n    any money.\"\n\n    “Uh, well, you see, Marian, we sort of, well...how can I put this \n    without losing your love and respect?”\n\n    \"You won't lose my love and respect, Robert.\"\n    \n    The men snicker. Marian looks at them with her brow furl. What could \n    possibly be so funny?\n   \n    “We're thieves, Maid Marian!” Shouts Lars and the men roar with \n    laughter.\n\n    \"And Robyn's our leader!\" Added Jack.\n\n    *goto rh6d\n\n    *set cautious %+10\n\n  #\"Well, Frankly, If We Can't Pay For It, We Basically Take It.\"\n    \n    Marian looks at you oddly for a moment. You didn't know what\n    to do, so you smile.\n\n    \"What are you saying, Robert?\"\n\n    \"Marian, please understand.\" She allows you to take her hands. \n    \"We know no other way to live a decent life out here in the forest. \n    We're also supporting the poor in the towns and little hamlets in \n    and around the forest, the farmers, and the Abbey with money, food...”\n\n    Marian interrupts. “Oh, I see. Basically you're saying, you take from \n    the rich slobs to give to the retched poor.”\n\n    “Yes, exactly! We take from the rich to give to the poor.”\n\n    *goto rh6d\n    \n    *set exaggerate\n\n*label rh6d\n\nShe doesn't remove her hands as she looks around for a moment, thinking.\n\n\"Why do you they call you Robyn?” Marian and Gretchen ask simultaneously.\n\n“That's my new name. The men gave it to me.” You release her hands,\npause, spread your legs, putting your hands on your waist, and turn your \nhead up and to the side. \n \n“Robyn Hood. Catchy, no?”\n\n*page_break\n\nMarian gives you a half smile. “I guess.\" \n\nShe puts her finger to her chin and looks up as if she is thinking.  \nNow she is smiling that wonderful smile that you love so much.\n\n“Well, Robert...I mean, Robyn...Gretchen and I will completely support \nthis new endeavor of yours.”  \n\nYou exhale in relief.\n \n“In fact”, she continues as she puts her arms around your neck, “I want \nto help. Gretchen and I are joining your, uhm, merry band of thieves.” \n\nShe looks over at Lars, Little John, William, Will Scarlett, and Jack.  \nThey each grin back at her. They like being called a merry band of thieves.\n\n“All right!” You agree. “You can be my other secret eyes and ears,  \ninforming me about the comings and goings  in Nottinghamshire, the Palace, \nand London before it gets out to everyone else.\" \n\n“We will!” She says, then she kisses you on the cheek. “This is wonderful! \nYou have no idea how I've been wanting to stick it to my cousin for so long, \nand this gives me the chance.”\n\n\"So have I,\" says Gretchen. \"You have no idea.\"\n\nThe Merry Men gives Marian three cheers because she is now the Mistress of the \nBand of Thieves.\n\n\n\n*goto_scene rh7\n\n*finish\n", "rhgroom": "*label rhgroom\n\n*page_break\n\nWhen they hear the cue phrase, Little John and Lars leap out of the \nbushes. Little John holds his staff in both hands, and Lars brandishes \na long knife. \n\nWilliam, Jack, and Will jump  down from the trees, each carrying the \nbest swords that they could find.  The swords need some repair and \nweren't very sharp, but you have assure them that if they use methods to \nfrighten a person, they won't have to use the weapons.  \n\nLittle John stomps over to the carriage and pulls on the door almost \ntearing  it from its hinges.\n\nThe young man recoils from the door. His voice shakes when he sees Little \nJohn.\n\n”Wha...wha...what are you doing?”\n\n“I'm gonna rob you. What do I look like? Your partner for the ball? \nNow, off with them jewels!”\n\nWilliam reaches up and grabs James by his leg and pulls him down.\n\n*page_break\n\n\"What the...” James struggles to get his footing, but lands flat on his butt \njust the same. Jack snatches off his hat. \n\n“Hey, I like those boots,” Jack says staring  down at the fancy black \nleather boots with the gold colored lacing.\n\n“Take off your boots,” William snarls.\n\n“My boots?” James shakes.  “But, but, but, the sire had these made \nespecially for me as a gift!”\n\nWilliam pokes him in the arm with the tip of his blade and Will Scarlett \nsteps up pointing his weapon at James' throat.\n\n
