he ship is drifting unman towards a \nbeach.  Black Mike is yelling at his crew in their native \nlanguage as they lower the sails,drop anchor and prepare a \nboat to take to the beach. \n\nYou grab Gretchen's hand and pull her back downstairs. \n\n\"Let's get our weapons! We're going to the beach!\"\n\n*page_break\n\nThe men turn to follow.\n\n\"Not you!\" You say to Lars, Jack, and William. \"Just \nGretchen! She and I are not missing any of this!\"\n\nThe men look at one another, confusion on their faces, \nbut they know better than to argue with you.\n\nBlack Mike shouts, \"Bo 'nd Kurt, ya wit Robyn 'nd me \n'nd his men in da first boat!  Da rest uv ya take care \nof da ladies 'nd git ready ta shoot if ya see any trouble. \nMe hear tales of can'bals, 'nd me not like ta be anyone's \nlunch ta day.\"\n\nYou and Gretchen come up deck and stand beside Little \nJohn, Will and Tuck.\n\n\"Gretchen and I are coming, too,\" you smile as you check \nthe tightness of the saber at your side, and the blade in \nyour boot.\n\n*achieve blade5\n\n\"Nah, no women. Not 'til me secure da beach.\"\n\nYou stop what you're doing and give Robyn the look. You \nknow which look I'm talking about.\n\n*page_break\n\n\"Uh,” he clears his throat. “Black Mike, Marian and Gretchen \nare coming along, too.\"\n  \nYou happily return to placing your favorite arrows into \nyour quiver.\n\n*page_break\n\n*image beach.png left\n\n\nWhen the boat hits the shore, Robyn is the first one out. He is \nso busy staring at the ground of large pebbles instead of soft \nsand, that he forgets about you. Luckily, you have Black Mike \nwho is very much a gentlemen. He helps you out of the boat as \nTuck helps Gretchen.\n\nNow you understand why Robyn is staring at pebbles. Unlike \nstanding on sand, your footing is sure.  The small stones weren't \neven wet or shift under your feet.     \n\nThe floral on the edge of the beach is larger than you've seen \nbefore, and they were a variety of unusual colors. Is it your \nimagination, or is the sky bluer?\n     \nAs you continue to marvel at your surroundings, and the others \nfollow you out of the row boat, you hear Gretchen shout, \"Look!\"\n\nIn front you, up the beach is a young girl running towards you. \nShe is yelling something inaudible. \n\nThree men on horses are racing up behind her.\n\nWhat strikes you most about what you see?\n\n*fake_choice\n\n  #The Young Girl.\n\n    Her skin tone is an odd pale blue, and her long black hair \n    flies behind her. She wears a little top that covers most \n    of her torso, and a skirt that falls above her knees.\n\n    It's hard to tell how old she is, but she is not a child, \n    neither is she a woman. \n\n\n  #The Three Men.\n\n    It is quite obvious that she does not belong to them, because \n    even from this distance, you can see that their skin tone is \n    different. They are golden brown, as a way skin become after \n    being in the sun too long.\n\n    Their hair is black and each wears a different version of \n    facial hair, such as a beard only on the chin, or a mustache \n    and a full beard. Their hair is long and ties behind them. \n\n    They wear colorful balloon pants that bellows around their \n    legs and a sash around their waist, but no shirt. The thick \n    gold chain around their necks catches the sun rays and flashes \n    as if sending out some sort of message.\n\n  #The Fact That You See No Weapons.\n\n    This must mean that they only want to capture her. Could she \n    be royalty of some sort and they need her for ransom?\n\nThe girl cries out something that you do not understand, but \nshe sounds afraid.\n\nWill sets up his bow, cocks an arrow, aims and shoots all \nwithin a few moments. The first rider falls off of his horse \nand onto the beach.\n\nWithout thinking, you shoot the next rider, and Gretchen the \nlast.\n\nThe young girl falls into the pebbles, turns her head sideways \nand breaths heavily as you and Robyn quickly run to her.\n\n*page_break\n\nYou bend down beside her, listening to her as her breath \nregulates back to normal.\n\nYou can now see that she has a pattern of dark blue spots on \nher forehead and on her hands. \n\n\"Are you all right?\" You ask.\n\nShe raises her head, gives you a small smile, and speaks in \nthe words you do not understand.\n\n\"Oh, she doesn't speak English.\" You sadly share with Robyn \nlookingup at him.\n\n\"I do. I say your words,\" she suddenly responds.\n\n\"Are you all right?\" You repeat.\n\n\"Yes. Tired from running.\"\n\nYou and Robyn help her stand and allow her to lean on him \nwhile he holds her with one arm. At this time the rest of \nthe boating party is approaching.\n\n\"Are there more of them?\" Robyn ask.\n\n*page_break\n\n\"Two more at camp. I got a way, ran. Those three came for \nme.\"\n\n\"Who are they?\" Robyn point at the one body that's closest.\n\n\"The Morga. They take me from my home to take to their home.\"\n\n\"They didn't try to hurt you?\" You check again.\n\n\"No, no. They are taking me to their Queen. They will not \nhurt me.\"\n\n\"Why?\" Robyn queries. \"Who are you?\"\n\n\"My name is Tin, but I don't know why they take me.\"\n\nYou look at Robyn and Black Mike.\n\n\"What should we do?\"\n\nWhat do you want to do?\n\n*choice\n  #Start A Temporary Camp.\n    \n    \"Let's get our things and horses off of the ship and\n    set up a temporary camp. Then we can find out where\n    Tin lives and someone can take her home.\"\n\n    \"Me want ta git home, too, but me don't know how me \n    got har, or war me is.\"\n\n    \"I'm sorry this happened, ole friend,\" Robyn remarks,\n    \"but I'm sure we'll get you home.\"\n\n    \"Don't worry, Black Mike,\" you say as you give him\n    a pat on the shoulder.\n\n    You look down at Tin. \"And we'll get you home as\n    soon as we can.\"\n\n    *set leadership %+10\n    \n    *goto mm11a\n  \n  #Start A Permanent Camp. \n\n    \"Robyn, this is as good as any place to live. It \n    doesn't have to be Ireland, you know.\"\n\n    He nods his head in agreement.\n\n    \"We can find a place to set up a camp ourselves \n    until we figure out how you can find Southport \n    again, Black Mike,\" Robyn responds. \n\n    \"First, we need a place with fresh water, then\n    someone can take Tin home.\"\n\n    *set brave %+10\n\n    *goto mm11a\n\n  #Take Tin Home.\n   \n    You look down at Tin. \n\n    \"If you show us where some fresh water is, after we \n    set up a quick camp, we'll take you home. There's enough \n    of us to protect you until then.\"\n\n    *set cautious %+10\n    \n    *goto mm11a\n\n*label mm11a\n\n\"No, please, can't go home. Something bad will happen.\" She \nlooks at you and Robyn, eyes pleading. \"Please. I need your \nhelp to stop it or even you will die.\"\n\nYou look at Robyn. He shrugs his shoulders. You gently turn \nTin asyou bend down to face here. \n\n\"What will happen?\" \n\n\"Bad. Everything gone. First here, my home, next your home. \nBurn.\" \n\n*page_break\n\nYou, Gretchen, Robyn, and Black Mike look at one another.\n\n\"All right, Tin,\" you say, \"you can stay with us. Tell us \nall you know and we will somehow help stop this bad thing \nfrom happening.\"\n\n\"We should do something about the others at the camp that \nwas holding Tin,\" Gretchen suggests. \"If the three do not \nreturn, they'll know that something has happened and will \ncome after her.\"\n\n\"Good thinking, Gretchen.\" \n\nRobyn calls to Will, Tuck, and Little John.\n\n\"Get these bodies off of the beach. Then find the camp \nwhere they were keeping Tin. It can't be too far from here \nif she was running.\"\n\n\"It is not,\" Tin interrupts. \"It is a short way from beach.\" \nThen she points in the direction she came from.\n\n\"Take these horses. Get rid of the men and any sign of \ntheir camp, then meet us back here.\"\n\n\"Got it!\" They run down the beach to first hide the bodies.\n\n\"Now, where's that fresh water?\" you ask, with a smile.\n\n*page_break\n\nFor the first time Tin smiles. She points inland. \n\n\"It is a short way from beach,\" she says.\n\n\n*finish\n\n*goto_scene mmescape6\n\n\n", "mmescape6": "*label mmescape6\n\n*page_break\n\n*image daffodilrobin.png\n\nThe sun is high in the sky while Robyn's men and the crew \nof the [i] Lady Anne [/i]finish taking the rest of the \nnecessary supplies and weapons off of the ship as Black \nMike supervises. The ship's anchor is in a shallow area \nand the men easily ride the horses across to the beach \nand the temporary camp beside a river.\n\nClearing the land is an easy task and while the tents are \nset, Cook, Black Mike's man, and his assistant, begin \nputting together a meal. \n\nLuckily, there's plenty of edible fruit and vegetables \naround. Tin shows Cook's assistant which are the ones that \nare poisonous. She also shows the men the best way to catch \nthe large purple fish in the river. It turns out to be a \nmore efficient way than how they have been fishing \nfor years.\n\nSoon, it's evening, and you, Robyn, and Gretchen sit with\nTin. The temperture near the beach is a little cooler now\nthat it had been, so Cook made a big pot of something hot\nfor all to drink.\n\nTin is calmer than she had been and you've spent most of the \ntime with her, talking about anything except her abductors.\n \nYou know that she is eleven years old and her people are \nknown as the Misty Elves.\n\n\"Wait,\" Robyn interrupts, \"I meant to ask earlier, but became\nso busy that I didn't have the chance to ask. Forgive me for \nasking now. I just need to know.\" \n\nHe pauses and looks at you. You figure he must be getting ready\nto say something rude.  \n\n*page_break\n\nTin looks up at him patiently waiting. You can see \neven in the vague lighting of the fire what a beautiful \nwoman she will become.\n\n\"I was surprise that you can speak our language,\" he \ncontinues, \"because we are from a large island called \nEngland.\"\n\n\"You are in the land of Varna and all of us who live here \nare called the Fair Folk. Some Fair Folk have been traveling \nall around the world for centuries and learned other languages.\"\n\n\"Really?\" Gretchen says. \n\n\"We talk these other languages to one another as well, to \nstay...how you would say...fresh.\" \n\n\"How many other languages do you know?\" You ask.\n\n\"One hundred and eighty, but yours is the third language.\"\n\n\"How about that!\" Gretchen says excitedly.\n\nRobyn looks at you and Gretchen with a serious face.\n\n\"Am I the only one to wonder where we are? That is, Tin,\nwhere exactly is Varna?\" He ask as he looks between you\nand Gretchen.\n\n*page_break\n\n\"I can't answer,\" Tin says.\n\n\"Why not?\"\n\n\"One,\" she begins, \"I don't know. I never been told. Two, \nif I knew, it's forbidden for me to tell you because our \nHomeland is secret.\"\n\n\"Than how did we get here?\" You ask.\n\n\"I don't know. It would take a wise and powerful Elder on\nVarna to bring you here.\"\n\nThe three of you look at one another.\n\n\"Okay,\" you begin, \"maybe we can figure that out later.\nGo ahead, Tin. What did you hear from the Morgas?\"\n\n\"I hear them talk of the dragon eggs.\"\n\n\"Dragon eggs?!\" The three of you exclaim.\n\n\"Kizzy had three eggs. They were taken and hidden. That \nway, no more dragons.\"\n\n\"Who's Kizzy?\" Robyn questions for each of you.\n\n\"A dragon!\" She says in an exasperating tone.\n\n\"The mother dragon?\" You query gently.\n\n*page_break\n\n\"Yes.\"\n \nYou can tell that Robyn is being distrusting. \nHe immediately ask, \"How do you know this?\" \n\n\"All children learn the story of Kizzy and the battle. \nWe won and take eggs. She lost and lives alone in \nmountain.\"\n\nShe points in the direction of the mountain although it \nonly looks like a looming shape at this time of night.\n\n\"The Morgas wants all three eggs. I heard them say they \nhave one.\"\n\nYou, Gretchen, and Robyn look at one another blankly.\n\n\"It seems that we have to find those other two eggs,\" \nGretchen asserts.\n\nRobyn shrugs his shoulders. \"How is this part of our \nconcern? What can the Morgas do with these eggs?\"\n\n\"They have something that can hatch the eggs,\" Tin begins. \n\"What dragon hatchlings see first, they will...what's it \ncall...first thing see becomes mama?\"\n\n\"Oh, no!\" Your eyes go wide at the realization and \nimplication of what Tin is telling you. \"It's like with \nmany animals. If the hatchlings see the Morga first, they \nwill bond with them!\"\n\n*page_break\n\nTin is nodding her head. \"Yes. Then Morgas will use \nthem to burn and fly across ocean. They laugh when \nthey spoke of this.\"\n\n\"I don't feel badly now for killing those three,\" Gretchen \nmumbles low.\n\n\"But, it's impossible to find them!\" Robyn exclaims.\n\n\"I know where one is and how to find the other.\"\n\nThe three of you look at her as if you have an exclamation \npoint over your heads.\n\n\"How do you know this?\"\n\nHow [i]does[/i] Tin know this information:\n\n*choice\n\n  #She Learned It In School.\n\n    If all Misty Elves learned this information in school,\n    it wouldn't matter who the Morgas kidnap. \n\n    No, I think she must be someone special to know\n    this.\n\n    *set coward %+10\n\n    *goto mm12a\n\n  #Her Mother Or Father Told Her.\n\n    And if one of them told her, they must have a good\n    reason to tell her. This doesn't sound like something\n    everyone would know.\n   \n    *set cautious %+10\n\n    *goto mm12a\n\n  #Her Religious Leader Told Her.\n\n    If this is true, Tin must be very special to her\n    species and her race.\n\n    *set leadership %+10\n\n    *goto mm12a\n\n*label mm12a\n\n\"I am to know. I am Tin Kurtial of the House Of Ruins.\"\n\nSee! She [i]is[/i] royalty or something after all!\n\n\"That's why they kidnapped you!\" Robyn exclaims.\n\n\"Well,\" you start, \"this is turning into an interesting \nadventure.\"\n\nTin looks at you with a frown.\n\n\"Tomorrow morning, after a good night's rest and our \nbellies full, we're going after some dragon eggs!\" \n\n\"No! We talk to Kizzy first!\"\n\nThe three of you look at one another with a blank face \nagain, each asking \"What?\"\n\n\"Kizzy, the dragon, talks?\" You ask the question on \nGretchen's and Robyn's mind.\n\n*page_break\n\nTin frowns at you again.\n\n\"Of course she talks!\" She says sounding even more \nupset with your conversation than before. \"We can \ntalk to her about the Morgas, about her eggs, and \nask for her help.\"\n\n\"I don't understand.\" You look at Robyn and Gretchen for \nbackup. \"Do we really need the help of a dragon at this \npoint?\"\n\n\"Morgas are many. They are strong and mean. We need to \nenter the castle to find the one egg and the thing that \nwill do the hatching.\"\n\nGretchen giggles.\n\n\"Seems to me that having a dragon will be a good thing.\"\n\n\"But, will she help?\" Robyn questions.  \"After all, she \nwas sent to live in that cave and her children were taken \naway. Wouldn't she be angry about that?\" \n\n\"Dragons have their own...how you say...ways, like people. \nShe accept her fate long ago.\"\n\nYou look at Robyn. You can tell that he is still unsure.\n\n\"How do you know this?\" He asks.\n\n*page_break\n\n\"I have been visiting Kizzy since I was small. My mama \ntakes me and still visits alone, and so does my grand-mama. \nIf it wasn't for our generations of women, she would be \ncompletely alone.\"\n\nShe pauses and looks at each of you. Then she smiles.\n\n\"She'll do anything to help us to get her children \nback.\"\n\n\"Just like any mother would,\" you add.\n\n\"Without harming us?\" Robyn ask warily.\n\n\"She will not harm us,\" Tin assures.\n\nYou return her eagerness. \"Then let's decide how we're \ngoing to do this.\"\n\n*image dragon.png\n\nWhich route do you take first?\n\n*choice\n  #Talk To Kizzy.\n\n    In the morning after a hearty breakfast, you, Robyn, \n    Gretchen, and your Merry Men pack and prepare for the \n    trip to the mountain to find Kizzy.\n\n    Black Mike and his crew stay behind to watch over the \n    camp and to scrub the [i] Lady Anne[/i].\n\n\n    *set brave %+10\n\n    *goto mm12b\n\n  #Retrieve Tin's Dragon Egg.\n\n    In the morning after a hearty breakfast, you, Robyn, \n    Gretchen, and the Merry Men pack and prepare for the \n    trip to the lake to find Kizzy's egg that Tin is \n    responsible for.\n\n    Black Mike and his crew stay behind to watch over the \n    camp and to scrub the [i] Lady Anne[/i].\n    \n\n    On the way, Tin explains that after the war with the \n    last dragons, groups of different races became responsible \n    for keeping the peace. The House Of Ruins is responsible \n    for one of the eggs, although it is kept secret as to where \n    it's hidden. \n\n    Every time a female Mage comes of age, she is to hide the \n    egg that the House is responsible for. This way, every few \n    years, the egg has a new hiding place.\n\n    If something happens to the Mage of the House of Ruins, \n    that egg is forever lost.\n\n    Tin came of age only a few weeks ago and newly hid Kizzy's \n    egg. Somehow the Morga found out.\n\n    *set leadership %+10\n\n    *goto  mm12c\n\n  #Get Help From Tin's Caul.\n\n    In the morning after a hearty breakfast, you, Robyn, \n    Gretchen, and the Merry Men pack and prepare for the \n    trip to meet Caul.  His kind are historians, and he \n    may know something useful.\n\n    Black Mike and his crew stay behind to watch over the \n    camp and to scrub the [i]Lady Anne [/i]. \n\n    \"It's interesting,\" Tin begins, \"but the Black Mike \n    and his crew look and speak much like the Charo \n    people.\"\n\n    \"Really?\" You respond. \"The Moors live in coastal \n    areas. I guess they either visited here and some \n    stayed, or were brought here at some time.\" \n\n    \"I can't wait for you to meet Caul!\" She says with \n    enthusiasm.\n\n    \"If what you say about Black Mike is true,\" says Robyn,\n    \"I can't wait to meet him either!\"\n    \n    *set cautious %+10\n\n    *goto mm12d\n\n*label mm12b\n\nTin leads the way, but since she has never approach  the\nmountainfrom that direction she becomes a little lost. You \nhear mumblings of discontent from the Merry Men.\n\n\"I'm use to seeing small red flowers growing on the side \nof a hill.\"\n\nYou ask Robyn to remind the men to stay patient. After all, \nshe is it just a little girl.\n\nThe group does become lost once, and you lose about an hour \nof time getting back on track before you find the large opening \nto the cave where Kizzy dwells.\n\n\"Do not come closer,\" Tin tells the Merry Men. \"Dragons \nhave excellent smell, and too many new smells will make her \nnervous. She will use her flame first without thinking, \nask questions last.\"\n\n\"What about us?\" You ask, indicating yourself, Robyn and \nGretchen.\n\n\"You are the leaders,\" she says to you and Robyn, \"you may \ncome, but do not speak until she is ready. No sudden movements. \nTreat her politely.\" \n\n\"All right,\" you and Robyn respond at the same time.\n\n\"She will use her flame to check if you have force me to \nbring you to her. She warns me by making a dragon shrill, and \nI know to quickly move to the side of the walls. You are with \nme, you must do the same as a test.\"\n\n*page_break\n\nRobyn turns around and says to the others, \"We shouldn't be \nlong.\"\n\nYou walk in slowly behind Tin holding Robyn's hand. Once you \nare a short distance inside of the cave, it is not as dark as \nyou expect. All of the light still comes from the opening.  \n\nThen you hear a voice, its words coming in English, which \nsurprises you. It's low, yet not  deep as a man's would be, \nor gruff as a bear.\n\n\"I smell you Tin.\"\n\nTin responds in her language. \n\n\"Are you safe?\"\n\n\"Yes,\" Tin affirms in English this time.\n\nThen suddenly, there is a loud, high sound that shook the\nmountain. You and Robyn had enough time to put your backs \nagainst one side of the cave walls, and Tin edges up to the \nother side. Yellow and orange flames come shooting pass you as \nyou turn your head and close your eyes.\n\nKizzy laughs.\n\n\"Ah, it's nice to see that you've brought trustworthy guests \nwith you today.\" She pauses. \n\n*page_break\n\nThen slowly, Kizzy's head emerges from the darkness as high as \nshe can raise it in the low ceiling of that part of the cave. The \nsunlight from the opening helps you get a good look at her. \n\nShe is mostly red with green eyes, and two sharp bones curving \naway from her forehead. Her wings that are pulled against her body \nare red, line with black bones, and the spines that begin on her \nforehead are also black. \n\nRobyn squeezes your hand. \n\n\"It's nice to meet the two of you,\" she says. \"They call me \nKizzy.\"\n\nStaying quiet, Tin introduces you. \"Kizzy, these are my new \nfriends, Robyn and Marian. They have come from another island. That \nspeak the third language. They are here today with me because they \nwant to help. Your eggs are in danger.\"\n\nThe burning smell of sulfur escapes Kizzy's nose when she does a \nlow intense growl. She lowers her head as if on a hunt.\n\nRobyn holds your hand tighter.\n\n\"How is this possible?\"\n\nTin then explains what has happen to her, what she knows from \nthe Morgas, her rescue, and your plan to attack Queen Andar's Castle \nthat night with the Merry Men.\n\nKizzy is quiet for a few moments. She is no longer in shock over \nthe news about her children, and instead is coming up with her own \npart in the rescue. \n\n*page_break\n\n\"I will leave to fly east to Andar's castle shortly after darkness \nfalls and hide in the forest,\" she explains. She pauses again.\n\"Here.\" \n\nYou can hear the sound of light metal scratching against the rough \nground as it rolls towards Tin. It hits her bare big toe before\nshe picks it up.\n\n\"What is it?\"\n\n\"A whistle that only I can hear.\" \n\nYou and Robyn eyes go wide as you look at one another.\n\n\"A long time ago, someone made it to trap me. I tricked him. I've \nkept it as a prize. Tonight, use it when you need me and I will\ncome.\"\n\nTin nods her head.\n\n\"I must be familiar with the others who will be at the castle.\"\n\nTin turns to Robyn. \"Your men and Gretchen can come in now. Kizzy \nmust know their scent.\"\n\nOne by one, the seventeen men from the [i] Lady Anne [/i] and your \nhandmaiden, Gretchen, enter the cave to meet Kizzy.\n\n\"Now,\" you announce to Robyn, \"let's go get those other eggs.\"\n\n*finish\n\n*goto_scene mmescape7\n\n*label mm12c\n\n*page_break\n\nYou've been following Tin to a lake after taking a break to \neat a simple meal. \n\nDid you bring any fish to eat?\n\n*fake_choice\n\n  #Yes, But It's Raw.\n\n    Ooooh, sushi!\n\n  #Yes, And It's Cooked.\n\n    Cold but cooked is better than raw!\n\n  #No, Just Fruit And Vegetables.\n\n    I mean, I like a good orange, but I've got to have my \n    meat and fish!\n     \n\nYou note that, unlike yourself at Tin's age, and other children \nyou have been around, such as your sister, Anne, Tin isn't very \ntalkative. Your sister would've driven the men crazy by now with \nthe constant chatter and little jokes that aren't really funny. \n\nNo, Tin takes her position very seriously, riding quietly, only \nspeaking when it's necessary.\n\nAfter riding for a while, you can see the lake off in the \ndistance.\n \nIt is a very large lake, wider than it is long, and the sun rays \nshimmering on the surface gives you the sense that it is the ocean \nthat you're viewing. Especially when it's only a strip of land \nlaying far off on the horizon. \n\n\"That's my mark where I hid the egg in the lake,\" Tin says as \nshe points to a large tree with red blooms. \n\n\"Rocks are holding the egg down,\" she continues, \"so it stays at \nthe bottom. I will need someone to go underwater with me to remove \nthe rocks, tie it to a new rope, then you all can help pull it up.\"\n\n\"I'll go,\" Bert immediately volunteers.\n\nHe ties a rope around his waist, takes off his boots and shirt, and \neasily wades into the water. \n\nTin does a running jump and dives into the lake and is out of sight. \n\nAll the Merry Men laugh at Bert as he looks strangely at the place \nwhere she went under. He surface swims to that spot, takes a deep \nbreath, and enters the lake.\n\nYou are all waiting for a tug on the rope. This is taking longer \nthan you thought it should. From your understanding, the Kizzy's \negg isn't that large.\n\nSuddenly, Bert's head bobs up in a different place on the surface\nof the water and shouts something that doesn't quite sound like...\n[i]anything.[/i] \n\nHe disappears with a jerk.\n\nYou, Robyn, Gretchen and the men all look at one another.\n\nWhat do you think he said?\n\n*fake_choice\n  #It Sounded Like, [i]'Yalp.'[/i]\n\n    At least, that's what Sean says.  \n\n    \"Why would he say that?\" Both Lars and William make funny \n    faces.\n\n    \"Yeah,\" Allan agrees. \"Why would he say, 'yalp?' What does  \n    that even mean?\" \n\n  #It Sounded Like, [i]'Help.'[/i]\n\n    \"Something isn't right,\" Robyn realizes.\n\n    \"They've been under there too long!\" You exclaim. \"He's \n    saying 'help'!\"\n  \n    \"I agree!\" \n  \n\n  #It Sounded Like, [i]'kelp.'[/i]\n\n    \"Maybe he's in a kelp bed,\" ponders Reiff.\n\n    \"And he wants to warn us. Yeah, that's it,\" Will \n    determines  and most of the mend nod their heads in \n    agreement.\n\n    \"But, didn't you notice how his head jerked, liked \n    someone alive pulled on him?\" Robyn comments.\n\nThen the men quickly pull on the rope to find it without an \negg or a Bert at the end. \n\nThat also doesn't explain anything about Tin?\n\nYou jump off of your horse, take off your riding habit and boots, \nand jump into the water. You surface swim to where you last saw \nBert before you take a deep breath and dive.\n\nYou hear Robyn behind you.\n\nThe water is clearer on the surface than it is as you swim deeper. \nIt becomes a little murky, but you're able to still see. \n\nIn addition, there are large thick plants, almost like kelp, \ngrowing in this part of the lake, and swimming between them becomes \ndifficult. \n\nSuddenly you see Bert. Strips of plants binds his legs up to his \nwaist, but not his arms, and he is struggling with two creatures \nthat must be from the lake. \n\nThey are blue and orange, and the bottom half of their bodies are \nas a fish with a large fin, but they have humanoid arms and fingers. \n\nOne of them turns and sees you; and you see him, a face that's a \ncross between a human without a nose and a fish mouth. It has large \nfins for ears are on the side of the head and you can see the gills \nopening and closing.\n\nYou swim faster towards them.\n\nNext you see Tin. Poor little Tin! They have her wrap from head \nto toe to a large, tall, very thick plant. Her head is on her \nchest, but you can still see her blank eyes and very pale skin \nbetween the wrappings around her face. Non-frequesnt air bubbles\nrise from her mouth.\n\nYou pull your short knife out from around your waist, rapidly \napproach the three swimmers and puncture one of the fishmen with \na quick jab in the side of his belly. \n\nHe doesn't hesitate to let go of Bert as an orange fluid floats \nfrom the wound, enabling Bert to fight off the other.\n\nOut of the corner of your eye, you see Robyn. You indicate to him to \nhelp Bert as you swim over to Tin. \n\nIt is not easy to cut her off of that plant because of the thickness \nand the amount of plants than are around Bert. \n\nOnce Bert is free, between the three of you, you are able to \nrelease Tin and Robyn carries her out of the lake. \n\nShe's laying on her back and Geoffrey pushes everyone out of \nthe way so that he can reach her.\n\n\"Here! Step back! Let me attend to her!\" \n\nHe turns Tin on her side and sits on his knees beside her back \nas he begins to rub it in a series of circles that went from \nsmall to large using only his fingers. Then he hits her once, \nhard, square between her shoulder blades.\n\nAs they watch, everyone is not aware that each of them are \nholding their own breaths.\n\nTin coughs and water comes pouring out of her mouth. She leans \nback into Geoffrey's lap with her eyes close, breathing deeply \nthrough her mouth. As her breathing regulates, and she begins \nbreathing through her nose, she opens her eyes. \n\nEverybody is ecstatic and showing their relief in some way other \nthan loudly whooping and hollering which is normally their way, \nbut they didn't want to frighten Tin after her experience.\n\n\"She needs space! Give her room!\" Geoffrey warns as everyone \nattemptsto touch her. \"She's not going to remember what has \nhappened. She was near death.\"\n\nAmaze, you look at Geoffrey. \n\n\"How did you know to do that?\"\n\n\"I told Robyn once, but he's probably forgotten.\" he says, and \neveryone laughs nodding their heads. \"I once worked on a merchant \nship between London and the Mediterranean. I learned that from an \nEgyptian healer.\"\n\nA couple of men who is closes gives Geoffrey a manly pat in the \nback. \n\n\"Believe me,\" he continues, \"she was under for a long time and I \nknow by the look on her face that she took in a lot of water. I \nwasn't sure if I could bring her back.\" \n\nYou look around for Bert. \"How's Bert?\"\n\nYou can hear him coughing. \n\n\"My throat's dry, but I'm okay.\"\n\n\"Hey, give him some fresh water!\" Claus yells. \n\n\"What about the egg?\" Someone ask.\n\n\"Still in the lake, obviously,\" Robyn announces.\n\n\"I know where it is. Give me a few minutes. No one else will \nbe able to find it,\" Bert says.\n\n\"If there's fishmen, we've got to be more prepared,\" Reiff \nreminds everyone, who nods in agreement. \"I'll go back in with \nyou.\"\n\n\"So will I,\" you and Robyn say simultaneously.\n\n\"I'll go, too,\" Geoffrey, volunteers.\n\n\"I'll see to Tin.\" Gretchen gets a bag of fresh water and sits\nTin up to hold her. \n\n\"Just a little at a time,\" Geoffrey reminds her as he stands up.\n\nGretchen nods her head.\n\n\"Let's go.\"\n\n\nYep, sure enough, there are three fishmen surrounding the egg. \nThey are holding something that looks like long spears with a \nsharp point; but there are five of you with four very sharp \nsabers out. \n\nAfter making what appears to be fearful looks towards each \nother, the fishmen don't hesitate to swim away with a big \n[i] swish [/i], leaving Kizzy's egg to you.\n\n*achieve egg \n\nBack on shore, with the egg, you see that Tin has her color \nback and is wearing your habit.\n\nYou bend down beside Gretchen and put your hand across Tin's \nforehead. You don't  know why, but it was something that your \nmother always did when you weren't feeling well.\n\nYou suddenly felt maternal, yet you didn't know if she should \nfeel warm or cool.\n\n\"Do you need more time to rest, or are you ready to ride?\" \nYou ask.\n\nShe gives you a weak smile.\n\n\"I am ready to ride.\"\n\n*finish\n\n*goto_scene mmescape7\n\n*label mm12d\n\n*page_break\n\nYou've been riding south for quite a while when suddenly \nin the distance you can see what looks like a limited \nforest of a thick grove trees in one area.\n\nTin, leading the group, points. \"That is it, there!\" She \nexclaims.\"That's where the tree dwelling Charo live, the \nCity of Dan.\"\n\nAs you ride closer, you can see a tall wall of trees \nsurrounding the city.\n\n\"The City of Dan is made from trees of slow burning wood.\"\n\nAt first, you're not sure what you're seeing in the trees. \nAs you become even closer, you realize that you're looking \nat rooms and buildings with wooden ramps, stairs, and ladders \ntie together with rope to connect them. Humanoids of all \nshapes and sizes move amongst, within, and between the trees.\n\nThere are wooden turrets strategically place around the top \nof the wall of the Watch. \n\nWhen your small group reaches the gate, Tin tells you to \nstop. Then she raises her hand.\n\n\"I am Tin of the House of Ruins. I speak the Third Language,\" \nshe announces. \"I am here to speak to Schek of the House of \nMomthe. It is of an urgent matter.\"\n\n*page_break\n\nThe Watcher on the wall continues looking directly at Tin \nfor another minute or two before he disappears.\n\nYou're not sure, but if you had to guess, you are waiting \nfor almost half an hour before the giant gate opens.\n\nThe courtyard is enormous and surrounds the main parameters \nof the circular city. You recognize a herd of small milk \nbearing animals like goats and large colorful birds almost \nthe size of geese staying together, weaving in and out of the \ncourtyard. You can also hear birds that sound like chickens. \n\nThe only people you see are one herder and three other \nWatchers.\n\nThen, you can hear the noise of a large wooden contraption that \nworks on ropes, pulleys, and wheels coming down from between \ntwo trees.\n\nOut steps a large dark man wearing bright color pants and tunic. \nThe hair on his head is short and thick, the color of salt and \npepper as over his mustache and the hair under his chin.\n\nHis arms are spread out as he walks with long strides over to \nTin.\n\n\"My dearest, Tin! Why have you been away from me so long!\"\n\n\"Caul!\" She yells. One of the Watchers helps her dismount and \nshe runs into his arms. \n\n*page_break\n\nHe is a jolly man with a large toothy smile, but behind him \nstood three men and a woman. They were dress similar as he, \ntheir hair black, the woman's head wrap in cloth, each wearing \na frown on their face. They look much younger than the Caul.\n\nThe Caul looks at the four of them. \n\n\"Why are you frowning,\" he ask as he continues to smile. \"Tin \nhas come for a visit. We should be celebrating!\"\n\n\"She brought [i] booglas [/i]...strangers, into our home,\" \nthe tallest one explains.\n\nThe Caul becomes angry and raises his voice.\n\n\"Since when do we not trust anyone of the House of Ruins? If \nyou're going to behave this way, leave!\"\n\n\"She is just a child! How do we know how trustworthy she \nreally is?\" Reminds the other male.\n\n\"I agreed to be her Caul and I do not have to explain myself \nto you or to anyone,\" the Caul says calmly, his toothy smile\nreturning.\n\n\"I'll stay, papa,\" informs the female. \"I trust Tin.\"\n\nThe three sons show their disapproval by turning their backs \non their father and returning.\n\n*page_break\n\nThe Caul looks at you and Robyn.\n\n\"I am so sorry for the behavior of my children. I know that \nTin would never come here with strangers unless it was very \nimportant. You're welcome in my home. Please join me and my \ndaughter, Galeen.\"\n\nWhen you all dismount, Tin introduces each of you, then you \nfollow the Caul and his daughter to the contraption that \ntakes you up into a private room high in the first tree while \nyour horses are having food and water.\n\nPart of the small talk includes Black Mike.\n\n\"Tin told us,\" you begin, \"that you and your people look a \nlot like my friend, Captain Black Mike, and his people. Now,\nafter meeting you, I must admit that the likeness is uncanny.\" \n\n\"Ah, perhaps we are related!\" The Caul says.\n\n\"You could be Black Mike's brother.\" \n\nHe releases with a large belly laugh as he touches his daughter's\nhand.\n\nEveryone nods in agreement and chuckles a little. \n\n\"And what do you think?\" The Caul shows his large teeth.\n\n\"Could be, since his people, the Moors, do spend a lot of \ntime on the sea. You can meet him before he leaves.\"\n\n\"I'd like that very much!\"\n\n*page_break\n\nEventually, you are all comfortable, there is food and drink, \nand the King of the Charo begins the conference.\n\n\"I am known as the Caul to Tin's race. It's like an uncle or \ngodfather to those who speak the third language. That is why \nshe brought you here to meet me and to hear what information \nI know.\"\n\n\"She's told you everything,\" you begin. \"What can you add? \nAnything?\"\n\n\"I think I can.\" He looks at Tin. \"You're sure that they said \nthey had something that can hatch a dragon's egg.\"\n\n\"Yes.\"\n\n\"Can you remember exactly the words they used? Are you sure \nthey used the word, [i]'something'[/i] when they were speaking\nof it?\"\n\nShe sat there and looking down at her lap. \n\n\"No, now that I think of it, they did use a word.\" \n\nShe continues looking at her lap, furling her brow as she \nthinks.\n\n\"I remember!\" She jumps up. \"They use the word over, and over... \n[i]'meesh'[/i]!\"\n\nThe Caul's mouth drops as he looks at her.\n\n*page_break\n\n\"Do you mean, [/i]'globe'[/i]?\" He repeats in English.\n\nFor the first time you see Tin's cheeks seem to blush.\n\n\"Yes, yes! Globe! They said it over and over. They said that \nthey had the Globe, and that was good enough; but one argued \nthat the Queen wanted me, too, and that they better not \nreturn without me.\"\n\nThe King stood up and stares blankly ahead. His daughter touches \nhis shoulder.\n.\n\"Papa, what is wrong?\"\n\n\"The Globe,\" he mumbles. \"The Elves' Of Light Benign Globe.\" He \ncontinues to stand and stare.\n\nFinally, Galeen is able to ease her father back into his chair. \nShe gives him something to drink, and then you all wait.\n\n\"The only thing that can crack a dragon's egg is the heat of a \ndragon's breath,\" he begins. \"That's why Kizzy's eggs are hidden. \nThe eggs could not be destroyed, so that was the best solution.\"\n\nHe took another sip of liquid. Everyone waits for him to continue.\n\n\"However, during the Great Dark Elf war that began on the other\nside of the island, The Elves Of Light were given a weapon, by\ndivine intervention, to stop the Dark Elves.\n\nHe pauses for another drink of water. \n\n*page_break\n\n\"This weapon is so strong, that it is the only thing that can\nlevel this city in a matter of minutes.\"\n\n\"How do you know?\" Robyn quires.\n\n\"The Elves Of Light are pacifist. They only demonstrated what the \nGlobe could do, and the Dark Elves pulled back their armies and \ndisperse.\"\n\n\"Why do you seem so sure?\" You ask.\n\n\"The Elves of Light had invited a representative of all of the Fair \nFolk to witness the demonstration. My esteem forefather was there \nand recorded the experience.\"\n\n\"Did they destroy this weapon afterwards?\" Robyn ask.\n\n\"As far as the rest of us know, it cannot be destroyed by anyone \nor anything on earth.\"\n\n\"So, you now believe that the Morgas have the Globe?\"\n\n\"It's the only explanation.\"\n\nYou look him straight in the face.\n\n\"That means, with even one dragon and the Globe, the Morgas have \nenough power to destroy anything.\"\n\n\"And they can fly across oceans to other lands,\" Tin says.\n\n\"Great!\" Robyn exclaims, throwing his hands in the air.\n\n*page_break\n\n\"We have no choice. We must have the eggs in our possession!\" You \nannounce calmly. \"And we must attack the castle to get the Globe \nwhile they're not expecting us.\"\n\nYou look around at the men and Gretchen. They are all nodding their \nheads in agreement.\n\n\"Let me get my men ready!\" the King declares as he stands up.\n\n\"No, thank you, but it's best if we do this in a small group that \nno natives recognize,\" Robyn responds. \"Easier for us to get in and\nout.\"\n\n\"Good thinking,\" says the King. \"Still, I will have my men prepared\nin case this spills over beyond the city of Mennore.\"\n\n\"You also need another piece of the puzzle,\" he says as he returns\nto his seat. \n\nWithout a word, the Caul looks at his daughter and nods. She returns\nthe nod, then leaves the room.\n\n\"Fill your stomach, everyone!\" He says with a large smile and arms\nspread. \"You're going to be busy and need the strength!\"\n\nWithin minutes, Galeen returns with a dragon's egg.\n\n*finish\n\n*goto_scene mmescape7\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "mmescape7": "*label mmescape7\n\n*page_break\n\n*image mennore.png left\n\nAfter riding for hours to take possesion of the other egg and\neating another meal, as the sun is setting, you all arrive at \nthe hillside just above the sprawling city of Mennore where the \nMorgas reside. \n\nYou watch the city as lights begin to glow inside of the homes, \nthe buildings, in the streets, and the stone castle on the other \nside of the city.  \n\nRobyn has sent Allan, Tuck, Reiff, and Sean in to secure the \ncity. All everyone else can do right now is stay low and wait.\n\nIt seems it's not long before you hear the all clear signal \ncome from Allan who is assign the right outskirts of town. \n\nStaying low and in the dark crevasse, you enter the city with \nLars, Little John, Tin, and Bert. After a while, Allan comes \nout of a corner at the north wall. \n\n\"There is one gate on the west wall,\" he speaks low, \"where \nyou can enter the castle's courtyard. They have a few bunkers \nout near that wall and I'm assuming others are inside the gate.\"\n\n\"Okay let's get to work.\"\n\nYou loosen the rope from around your arm with three hooks on\none end that Black Mike made before you left the camp that \nmorning. You toss the rope, hooks first, against the wall, and \nwhen you pull on the rope, the hooks catch. You climb up the \nrope, hand over hand, until you reach the top. \n\n*page_break\n\nJumping low over the edge, you immediately scoot into the \ndarkness on the other side. You listen. You don't hear a guard, \nand neither do you see one in the near distance, so you give \nthe all clear signal for the next climber to come up. That is \nTin. \n\nYou keep Tin away from the wall, and as guards make themselves \nknown, you, Allan, Lars, Little John, or Reiff take care of them, \nhiding their bodies somewhere in the darkness. \n\nYou finally stop seeing guards. You are now safe from them, at \nleast you believe that you are. \n\nNext, you circle the top floor looking for the door or a window \nto enter the castle.\n \nThere are the stairs! \n\nGo, Marian! Hurry because you know at any moment other guards\nmay become aware of your presence.\n\nYou rush from one empty room to the next: That is, no Morga, \nbut no dragon's egg or ultimate weapon either.\n\n\nBefore long, you open the double doors to a large room that \nsits against the west wall. It is well lit and open room with \na long wooden table in the middle and high back chairs. \n\nThere is a long side table, and you sigh with relief when \nyou see Kizzy's egg on a pillow, and the Benign Globe on \nanother.\n\n*page_break\n\nThis room is also full of large decor artifacts, tall vases \nwith illustrations, and paintings with ornate frames on the \nwall.  They look very impressive. Obviously this is the Royal \nportrait room. \n\nHowever, in the corner of your eye you catch the most recent \nportrait, parents and child, that is incomplete. It looks odd \nfor other reason as well.\n\nWhy would they hang an incomplete painting?\n\nYou are unable to stop to take a good look at it because, \nsuddenly, there is a loud sound, a horn through the castle \nand below on the grounds.\n\nYou grab the ultimate weapon and Lars grabs the egg, but it \nis too late. Guards begin to flood into the open doors. \n\nLittle John reacts immediately with his staff and takes down \nfour guards during a quick raucous as you and Lars push Tin \nback onto the balcony. Your biggest concern is keeping Tin \nand the egg out of harms way. \n\nReiff and Allan unsheathe their sabers and move in for a swift \nattack while Tin looks over the balcony.\n\n\"Marian! Look!\" She points down and your eyes follows her \nfinger. It's Robyn, and most of the Merry Men. They are caught \nbetween the front and back of the courtyard gate. They are fairing \nvery well, but you can seethat they will be over taken soon.\n\nTin puts the thin hollow metal between her lips and blows long \nand hard.\n\n*page_break\n\nWithout warning, a mammoth of black and red scales with wings \nover twice its width [i]whooshes[/i] over the castle's wall into \nthe courtyard, landing with a hard thud. A thick, heavy tail \ncrashes down on low wooden buildings and crates as it faces \nthe back line of the Morga warriors.\n\nIt inhales, its fire heart glows, than flames burst forward from \nits mouth.\n\nKizzy sweeps her massive head to catch all of the men charging \non Robyn. They scream and run, others are dead instantly, as they \ncatch the flames giving Robyn and the men a chance to enter the \ncourtyard and rush up the castles front stairs.\n\nNow bells are ringing. They start at the castle, then repeat \nacross the city. Morgas are heard shouting in the streets.\n\nYou are looking over the balcony at the chaos with Tin when you \nheara woman’s voice behind you say, \"Get them, you fools! Don't \nlet them get away!\" \n\nYou turn. The woman has unsheathe her double blades, but she is \nnot coming towards you or Lars. She is staring at Tin.\n\nShe shakes her head, and puts her blades away as she continues \nto stare.\n\n\"Stand down! Stand down, I say!\" She shouts.\n\nHer men did, and lower their heads with their hands behind \ntheir backs.\n\n*page_break\n\nShe inches her way closer to the five of you, unafraid, and \nbends lower so that she is at Tin's level.\n\nIn a tender, loving voice, she  ask, \"Tin? Is that really you, \nbaby?\"\n\nTin eyes go wide. She looks up at you. You look down, but \nsay nothing. She moves behind you and peeps out at the \nstranger.\n\n\"Baby, please tell me that you know me?\"\n\nReiff, Little John, and Allan step forward.\n\n\"Get back!\" Little John warns as he banishes his staff.  \n\"I'll take your head off before I let you hurt that child! \nI don't care if you are a woman!\"\n\nYou look at the woman, then you found that unusual Royalty \nfamily painting on the wall.\n\n\"Everyone, Tin is her child.\" You point at the painting on \nthe wall with your chin.\n\nThe Merry Men follow your gesture to the painting. It is \nclearly the woman, with pale blue skin, yellow brown hair, \na series of dark blue dots on her forehead and hands, and \npointy ears. The image represents her in full detail, \nincluding wearing a gold band on her finger.\n\n*page_break\n\nStanding next to her is a man of brown skin as if he is out \nin the sun everyday. His black hair is back, and he has a \nfull black beard. He wears colorful balloon pants with a \nmatching open tunic. There is a gold ring in his ear and \na gold chain around his neck, a gold band on his finger. \nHowever, the painting of him is very sketchy.\n\nIn his arms he holds the beginning sketch of a baby with \npale blue skin.\n\n\"Are you Queen Andar of the Morga?\" You ask.\n\nShe looks up at you.\n\n\"Yes, I am.\"\n\n\"Tin is your child with the King?\"\n\nShe stands up.\n\n\"Yes!\"\n\n\"I believe you. That's explains Tin's dots on her forehead \nand hands, yet her hair is black and she has round ears, like \nher father.\" \n\n\"I loved Turle!\" Andar admit, tears forming in the corners of\nher eyes, \"but my parents changed their minds about having a \nco-relationship with the Morga. They took my husband and my \nbaby away from me, and wanted me to return home. I refused!\"\n\n\"And you want to use the Globe and the dragons to get even?\"\n\n*page_break\n\n\"Yes! I'd do anything to get my child back and to destroy \nthem for breaking my heart!\"\n\nTin comes from behind you and eases over to her mother. She \nputs her arms around her waist.\n\n\"I know that you are my mama.\" She repeats to Andar as she\nbegins to cry.  \"You are my real mamma.\"\n\nAndar looks down at her, speechless. Then, she allows herself \nto cry as she holds onto her little girl.\n\nRobyn is suddenly at the open door with Tuck and Willaim in \ntow. He sees the Morga soldiers standing quietly at attention. \n\nConfuse, he searches the room for the egg or the weapon when \nhe sees you, Little John, Reiff, Allan and Lars with Tin hugging \na woman at the back of the room. \n\nYou and Lars are in possesion of what you all came for. \n\nIt seems that everything is under control.\n\n\"What's going on here!\" He shouts.\n\nEveryone, but the soldiers, look in his direction.\n\n\"Robyn!\" You yell with a smile as he continues to frown and \nwear his mean, serious face.\n\nYou make your way to him and jump up and down as best you can \nholding the dragon's egg.\n\n*page_break\n\n\"Everything is all right!\" You point to Andar with your chin \nover your shoulder. \"That's Queen Andar, Tin's mother!\"\n\nRobyn is taken aback. \"Tin's [i] mother [/i]?\" He stares at \nthe sight of mother hugging her long lost daughter. \n\nHe looks down at the dragon egg.\n\n\"Well, someone better stop Kizzy before she destroys this \ncity,\" he says matter of factly.\n\n*finish\n\n*goto_scene mmescape8\n\n\n\n\n\n\n\n\n\n\n", "mmescape8": "*label mmescape8\n\n\n*page_break\n\n*image hoodandmaid.png\n\nWithin three days, the party of Elves of Light arrive to retrieve\nthe Benign Globe.  \n\nThey are truly the most beautiful of all the creatures on Varna. \nTheir hair is golden, they have pointy ears, and their eyes \nglow an unnatural color. Even in the daylight, there is an overall \nsparkle about them. Even their hores are the purest of white.  \n\nRobyn, Marian, Gretchen, and the Merry Men are there to meet \nthem before they returned to  their temporary camp. The Elves \nassure them that all of the Fair Folk are beholding for their\npart in this, what could have been an horrific incident, and\nthat their King Jaeden has rewards for them. However, they\nare being secretative to what that will be.   \n\n*page_break\n\nBlack Mike is given instructions on how to find his way back home. \nAll he needs do is leave the cove, and the [i]Lady Anne [/i] will \nbe able to return to Southport the way she came, and in plenty of \ntime for the festival. \n\n\nKizzy is as grateful for being allowed to be part of the conflict \nthat lead to the return of her children as much as she is for \nbeing encouraged to use her flames in battle.\n\n\"It's been a long time,\" she said with a smile.\n\nShe promised to never disturb her eggs; however, there now exist\na written pack with the Elves of Light to hatch one of the eggs\nand raise the hatchling as their own when she dies, because she \nwill eventually.\n\nMarian, Robyn, Gretchen and the men decide to settle on the land \nadjacent to other human tribes, the Charo and the Tike, where \nanimals to hunt is adbundent, plenty of wood is available to \nbuild, and there's plenty of fresh water.\n\nThe men found themselves mostly attracted to the Charo, and slowly \nthe community of The Hood began to grow.\n\nOf course, Tuck had Gretchen, and they had their first little \nbaby boy one year after the end of this story. \n\nWhich it has.\n\n*page_break\n\nAs for Tin, she stayed with her mother and her father's people \nbeing a true Princess, and grew to be a beautiful woman and a wise \nleader. When she was of age, she chose to marry a Prince from her\nmother's people, and together they continued to keep the peace \nbetween the two races.\n\n\n\nThis is the end of this paticular Robyn Hood's Unusual Tale with\nMarian as the lead. \n\nYou may return to the beginning to enjoy another one of her Tales\nby linking below, or link to one of Robyn's Tales with Marian and \nhis Merry Men, or end the Tales at this point.\n\n*goto_scene ending", "mmgretchen": "*label mmgretchen\n\n*page_break  \n  \nAfter Gretchen rides off through the front gates, you go into \nthe parlor where Joan and her maidens are waiting for you to \njoin them in making a quilt.\n\n\"Oh, this is lovely,\" you say about the fabric as you sit down.\n\n\"Thank you,\" Joan says, a large smile on her face. \"These are \ndrapesthat once hung in my bedroom in Anjou when I was a child.\"\n\nYou smile. \"Well, where do I begin?\"\n\n\nFor the next two hours you are force to listen to idle chit chat \nabout Joan's life as you worry if dearest Gretchen is all right \nand finding out anything about Robert.\n\nYou are concentrating so hard on your own thoughts that you \naccidentally prick your finger with the needle, twice!\n\n\n\"Lunch will be serve on time,\" the cook's assistance announce.\n\n\"Oh, wonderful!\" Joan responds. \"We have some fresh game hens \ntoday and cook has prepared them my favorite way. I know you'll \nenjoy them, Marian.\"\n\nShe looks at her Ladies in Waiting.\n\n\"Sarah and May, will you take care of the quilt please,\" she \ncommands.\n\n*page_break\n\nAs Joan exits through the room's back door, Gretchen enters \nthrough the front door. She has a large smile on her face which \nyou know can be for any reason.\n\n\"Ah, Gretchen, there you are! Just in time for lunch.\"    \n\n\"I am?\" She ask, feigning surprise. You look at her face \ntrying to readher, but she's playing with you. \"That is good \nto hear!\"\n\nShe walks past you and heads towards the opposite door.\n\nYou stand there with your mouth drop just a bit.\n\n*page_break\n\n\"Did you find what I sent out to look for?\" You ask, \nnonchalantly.\n\nShe stops.\n\nWhat is her response?\n\n*fake_choice\n\n  #\"Yes, Yes, I Found An Entire Basket Of Blueberries.\" \n\n    \"I was taking them to the kitchen now so that they can \n    be cleaned and  you can enjoy them with your biscuits \n    and cream.\"\n\n    *achieve berries\n\n  #\"Yes, Yes, I Found Blueberries And Mushrooms.\"\n\n    \"But I thought you'd want to pick these mushrooms yourself. \n    You would not believe these mushrooms unless you see them.\"\n\n  #\"Yes, I Found  Some Very Good Mushrooms.\"\n\n    \"However, you need to go for a nice ride in the forest to \n    see for yourself. I'll help you pick some more.\"\n\nSince Gretchen didn't change her expression, you have no idea \nwhat she is talking about. What's with all the talk about the \nblueberries, and why would you need to see the mushrooms yourself?\n\nShe turns and walks towards the door, then turn back to face you. \n\n\"You really need to go for a nice ride in the forest anyway. It's \na beautiful day. Give you a chance to get out of this dusty Palace \nof John's.\"\n\n*page_break\n\nIt is usual for the women of the castle to rest after lunch, so \nyou wait for Joan to close the door to her room, and everyone else \nis tending to their chores, to rush out the back door of the castle \nto the stable with Gretchen. \n\nWhat's the excuse you use when the guards see you walking your \nDaisy and Gretchen's George from the stables?\n\n*fake_choice\n  #I Need Some Fresh Air.\n  \n    \"You don't live in the Palace,\" you say to the Captain. \"You \n    have no idea how stuffy it can get inside those stone walls!\"\n\n  #I'm Restless.\n\n    \"I've been traveling in that carriage for two days. I'm going \n    for a little ride in the country side,\" you explain to the \n    Captain.\n\n    \"Maid FitzWalter, Prince John would have our heads if he learns \n    that we let you go out into Sherwood Forest unescorted.\"\n\n    \"So we won't tell him,\" you say with a little laugh and a wink.\n\n  #We're Going To Pick Wild Mushrooms.\n\n    \"My handservant says there are some excellent wild ones growing \n    nearby.\"\n\n    Gretchen smiles. \n        \n    \"She just won't take my word for it. She wants to see them for \n    herself,\" she says to the Captain.\n\nGretchen leads you behind the Palace a little past the area where \nthere are no guards to find two men waiting for you on horseback.\n\nYou're surprise, but not in shock. After all, these are obviously \nmen who know something about Robert. One was older, but not as old \nas your father, and the other wasn't much older than your brother, \nStephen.\n\n\"This is Lars and Jack. They are going to lead us to the best wild \nmushrooms you have ever seen,\" Gretchen says unemotionally.\n\nThey take off their hats and bow their heads to you. \"Follow us, \nplease Maid FitzWalter,\" the eldest says kindly.\n\n*page_break\n\n\"Wait a minute! I'll do no such thing!\" You put your hands on your \nwaist and you look back and forth between the two men whose eyes \nhave gone wide. \"What is all this talk about wild mushrooms? Do you \nknow anything about what has happened to Robert Dore or not!\"\n\n\"Yes, we do!\" They respond together, startle by your sudden outburst.\n\nGretchen is now laughing her head off.\n\n\"Oh, boy,\" she says. \"I had no idea how much longer I could hold \nthat in!\"\n\nYou look at Gretchen.\n\n\"These fine gentlemen personally know Robert and is under orders \nto take us to him.\"\n\n\"Why didn't you say so? All this talk about me needing to see some \nmushrooms.\"\n\n\"Well, I had to get you out of the Palace some how!\"\n\n\n\nYou follow Lars and Jack deeper into the forest to an area you've \nnever seen before. At one point you must dismount your horse and \nwalk. \n\nIn the near distance, next to the major oak, you see someone who \nlooks familiar. He begins waving and calling your name.\n\n*page_break\n\n“Marian!”\n\nYou drop your reigns. \n\n“Robert, it [i]is[/i] you!” \n\nYou run the short distance to him. What do you do?\n\n*choice\n\n  #You Take Him By The Hands And Look Fondly Into His Eyes.\n    You still care about Robert.\n\n    *set romantic %+10\n\n    *goto mmga\n\n  #You Take Him Into Your Arms And Hold Him Tight.\n    You've missed Robert very much.\n\n    *set romantic %+20\n\n    *goto mmga\n\n  #You Let Him Lean You To The Side And Give You A Long Kiss.\n\n    Robert is definitely your man!\n   \n    *set romantic %+30\n\n    *goto mmga\n\n*label mmga\n\nHe takes your hand and leads you to the wooden chair by a \nlong table. He sits by you and looks lovingly into your eyes.\n\n“You have no idea how much I've missed you,\" he says lovingly\nas he kisses your knuckles.\n\nYour smile fades as you come to a few realizations.\n\n“Robert, why did I have to meet you out here? Why didn't you \nsneak into the Palace grounds as Gretchen instructed?”\n\n\"I'm a wanted man,\" he responds. \"I can't take any chances \nof being seen.\"\n\nYou look around at the men surrounding you and the very organize  \ncamp of tents, tables, stools, and a large fire pit in the middle. \nYou notice a lamb shank cooking over one end of the fire. \n\nThere's also a keg sitting on the end of one of the long tables, \nrush lamps hanging from the trees, and a corral of horses.\n\n*page_break\n\nYou lean in to whisper to him as you indicate with your hand.\n\n\"Robert, what is all this and who are these men?\" \n\n\"This is where I live, and these are my men. That is, we are \nall outlaws living together in harmony, watching over the other \ninstead of living precariously on our own in these woods.\"\n\nHe pauses as you continue to look around the camp.\n\n\"And am their leader,\" he says with a big smile across his \nface. \n\nYou look at him.\n\n\"Really? And you didn't think once to get in contact with me? \nI'm your finace. Or have you forgotten that?\"\n\n\"Marian...\" he starts.\n\nYou take a deep breath as you prepare to interrupt him.\n\nUh, oh. You're going to go into one of your tyrants, aren't you?\n\n\"I've been worried sick about you! I cry myself to sleep every \nnight not knowing if you're alive or dead, wondering if you've \nbeen caught bya sheriff or other law officer, or laying in a \nditch somewhere with an arrow in your chest. I've sent my baby \nsquirrels everywhere searching for you with no results. Did you \never stop and think that the one who loves you with all her heart \nand soul should've been contacted some how and told that you are \nalive and well and living in Sherwood Forest? You didn't…\"\n\n*page_break\n\nRobert grabs you and puts his lips over your mouth and holds you \ntightly in his arms. You're tense at first, but then you relax \ninto the comfort of his embrace and return his kiss.\n\nWhen he releases you from the kiss, you're all dreamy head and \nhe's smiling.\n\nNo one kisses like Robert Dore.\n\n\"You're right, you're right,\" he finally says. \"I'm so sorry, \nmy love. From here on out we'll never be separated again.\"\n\nA little later as the two of you sit together, holding hands, \ncatching up on the events over the last couple of years, Lars \nwalks up to Robert. \n\n\"Robyn, we really should lead her back to the Palace. She's \nall ready been away for some time, and she's only suppose to \nbe picking mushrooms.\"\n\n\"You're right,\" Robert responds. \"He's right,\" he says to \nyou and let's go of your hands. \"You should be heading back.\"\n\nYou squint your eyes and look at him.\n\n\"Why did he just call you Robyn?\"\n\n\"Oh, that! That's my new name. The men gave it to me. Pretty \ncatchy isn't it?\"\n\n*page_break\n\nYou relax. With a blank face you say, \"I guess so.\" \n\nYou look around at the men who have been very noisy this entire \ntime as they drink and laugh and hoot and take turns throwing \nlong blade knives at a tree.  \n\n\"You can also say that your men are pretty merry for a bunch of \noutlaws.\"\n\nRobyn looks around. \"I guess you can,\" he says with a laugh.\n\nYou sigh.\n\n\"Well, I guess it is time to leave you to your merry band of \nthieves, but I wish I didn't have to.\"\n\n\"You can come back anytime. I'll even set up a tent especially \nfor you and Gretchen when you visit.\"\n\n\"I would like that; but where would you get the tent and \nfurniture? Do you have money? I will give you more if you \nneed it. \"\n\nYou hear some men laughing behind you. You look at them \nwondering what is so funny.\n\n\"Uh... Well, first, I would never take money from you, \nMarian. And,second..let's just say that can wait for later,\" \nRobyn says witha little chuckle. \n\n\"Okay.\" You stand, still holding his hand. \"Gretchen,\" you \ncall, \"it's time to go. Please bring the horses.\"\n\n*page_break\n\nRobyn stands beside you.\n\n\"Pay close attention to where my men lead you,\" he instructs. \n\"We have traps and signal alarms between the main roads and our \nterritory. I also have men on guard who can tell me that you're \non your way.\"\n\n\"Wow, you're very organized.\"\n\n\"You only know the half of it.\"\n\nThe men near by laugh again.\n\n\"Next time,\" Robyn continues, \"I'll show you our main larder \nand one of our caves.\"\n\nHe smiles, and you return his smile.\n\n\"I do love you, Robyn Hood of Sherwood Forest.\"\n\n\"And I love you, Maiden Marian.\"\n\n\n\n*goto_scene mm7\n\n*finish\n", "mmhag": "*label mmhag\n\n*page_break\n\n*image hag.png left\n\nYou follow the Hag down 49th street alley until you reach a \ndoor that is ajar. You can tell that its lit by only a few \ncandles because of a gloomy archaic glow through the slit of \nlight that's escaping. \n\nYou smell the dirt coming off the floor and the mold coming \nfrom places you didn't want to poke your nose into. A large \nkettle is boiling in the corner, and roots, grasses, and herbs \nhang from the ceiling, in coordinating bundles, drying. There \nare shelves and shelves full of dusty books, bottles and \ncanisters. \n\n\"I got just what you need,\" she says loudly, though you hear \na strange whistling sound now and then coming from her missing \ntooth. \n\nShe pulls a canister off of a shelf, cackling low as she does.\n\n\"This [i]is[/i] the best stuff. Works fast. All you need to do \nis blow it in the person's face or put it in their drink.\"\n\nShe takes two pouches out of a hidden inside pocket and uses \nher hand to fill them from the canister. As the powder dust\nblows up in her face, she simply sneezes.\n\nWill this powder really work?\n\n*page_break\n\nWhen she's finish, she ties the tops.\n\nShe has a crook smile as if she knows something evilly secret \nthat you don't know as she pushes the bag on the table towards \nyou.\n\nYou take a pouch that jingles from a secret pocket inside of \nyour cape.\n\n\"Nah, nah. That's not what I want from you. For what I'm giving \nyou, the payment is much higher.\"\n\n\"What do you mean?\" You question as you put the pouch of coins \naway.\n\n\"I know you want Robert to be able to use his name again and have \nall of his property back.\"\n\nYours and Gretchen's eyes go wide. You look at one another aghast. \nHow does she know this?\n\n\"And he's gonna need something to protect him once John becomes \nKing and goes after his prime estate in the Dukeries.\"\n\nYou become angry and raise your voice.\n\n\"What are you talking about? Richard is King!\"\n\nThe Hag laughs her high cackle, then has a coughing fit. She \ncatches herself with one hand on the table for support as you \nwatch.\n\n*page_break\n\"[i]Was[/i], my dear Missy, [i]was[/i]. He's currently laying dead \nin a tent in France after catching an arrow in the chest.\"\n\nYou slump into Gretchen arms, beginning your grieving for your dear \ncousin.\n\nCome on girl, you're not going to faint. You're not going to let the \nHag see you vulnerable.\n\n\"What is that powder and what do you want for it?\" Gretchen ask as \nyou get your bearings.\n\n\"It's a sleeping powder. You only have to blow it into someone's \nface. Once they get it up their nose, they'll fall fast asleep for \nat least forty minutes.\"\n\n*page_break\n\n\"And we need it because...?\"\n\n\"Castles have guards that need to be temporarily in dispose.\"\n\n\"Because...?\" Gretchen continues to pry.\n\n\"So that you can get past them to get...\" \n\nFrom inside the front pocket of her cape, the Hag pulls out a \nfolded paper. She unfolds it to present a rubbing of what?\n\n*fake_choice\n  #A Knife Handle.\n   \n    \"This knife was made for Rollo, Duchy of Normandy, and \n    brought to England by our first ruler, William. I must \n    have this knife!\"\n\n    \"But it's just a weapon,\" Gretchen says.\n\n    \"You know nothing about the history of this [i]weapon[/i], \n    and you don't have time for a history lesson!\" She snaps. \n    \"Just look carefully at the hilt! It must be this blade!\"\n\n    \"Something this valuable will be locked in a chest. We \n    don't have and keys and John isn't going to simply hand \n    them over.\"\n\n    The Hag rolls her eyes.\n\n    \"How does this pretty young thing put up with you?\" the \n    Hag proclaims as you're ready to speak up.\n\n    \"Please don't speak to her that way,\" you say when you \n    are finally feeling better. \"We'll get the chest open. \n    It's finding which chest is the real problem.\"\n\n    The Hag unfolds a bigger sheet of paper with a rubbing.\n\n    *goto mm26a\n\n    *set brave %+10\n\n  #A Pearl Brooch. \n\n    \"This brooch was made for King William the First when he \n    traveled to the Mediterranean and brought back to present\n    to his wife, Matilda.You can easily see all of the \n    intricacies in this rubbing. I must have this brooch!\"\n\n    \"Why? I couldn't possibly see you wearing any sort of \n    jewelry,\" Gretchen comments.\n\n    \"I don't need to explain myself to you!\" She snaps. \"Just \n    bring me what I want!\"\n\n    \"Something this valuable will be locked in a chest. We don't \n    have any keys and John isn't going to simply hand them over.\"\n\n    The Hag rolls her eyes.\n\n    \"How does this pretty young thing put up with you?\" The Hag \n    proclaims as she glares at Gretchen\n\n    \"Please don't speak to her that way,\" you say, defending the \n    woman you've known for most of your years. \"We'll get the \n    chest open. It's finding which chest is the real problem.\"\n\n    The Hag unfolds a bigger sheet of paper with a rubbing. \n\n    \"[i]This[/i] is the chest that contains the brooch.\"\n\n    *goto mm26a\n\n    *set  wit %+10 \n\n  #A Necklace Of Diamonds And Sapphires.\n\n    \"This necklace in gold is worth a fortune, but with \n    everything that's in the Palace vault, Prince John will \n    never miss it. I must have this necklace!\"\n\n    Gretchen couldn't help herself and she chuckles loudly as \n    she holds you up.\n\n    \"It's more than likely a handsome necklace, but where would \n    [i]you[/i] wear such fine jewelry?\"\n\n    \"I don't need to explain myself to you!\" She snaps. \"Just get \n    it. Who ever sent you here knows that I can do what I promise \n    to do.\"\n\n    That's true, Marian.\n\n    Gretchen looks at you. \"How are we to find the chest and get \n    it open?\" \n\n    \"Don't worry about opening it, but we'll need luck on our side \n    to find it rapidly,\" you say as you slowly stand on your own.\n\n    *set leadership %+10\n\n    *goto mm26a\n\n*label mm26a\n\n*page_break\n\nYou and Gretchen go through the Hag's door and find yourself \non a normal dark alley at the end of Edwinstowe Church.\n\nYour horses are there waiting for you.\n\n\"Are we going to be able to do this and return to the Hag on\ntime?\" Gretchen ask, worry, as she mounts her horse.\n\n\"I don't have any doubts, Gretchen, and I really need you to \nbe the most steadiest you've ever been. Can you do that?\"\n\n\"Of course I can!\"\n\n\"We must return by midnight, or I have no bargain with the hag.\"\n\nYou hit Daisy on her side and set the pace as you turn the corner\nat Edwinstowe Church, and rush to the great oak. \n\nYou know immediately who can unlock a door and a chest without \na key.\n\nAs you ride quickly through the path in the forest, your mind \ndrifts to thoughts of having a normal life with Robyn.\n\nNo more hiding, no more robbing...and children of your own...\nand your families back in your life. You can't believe how much \nyou miss Anne.\n\n*page_break\n\nWhen you and Gretchen arrive, the men are busy celebrating \nsomething in the usual fashion; drinking, whooping, and \nhollering. \n\nThere were a couple of games of [i]back hold [/i] on display, \nand one good hand wrestling. \n\nNow there's a new thing that they call stomping, in which \nthey do exactly that, stomp. There's words that go with \nstomping that sound like drinking songs, so this new way\nto dance gives them another reason to drink.\n\nWell, it all keeps them happy and busy.\n\nWilliam sees you first, and he comes over to relieve you two \nof your horses and points in the direction of Robyn talking \nphilosophywith Lars.\n\nYou run over, and he sees you as you're coming.\n\n\"Pardon me Lars, but Marian is here, and she looking very \nanxious about something.\"\n\nYou say a hasty greeting to Lars. \n\n\"Marian, calm down,\" Robyn instructs, holding you back \ninstead embracing you. \"Your face is red and you're breathing \nhard.\"\n\nHe signals to William to bring you and Gretchen something \nto drink.\n\n*page_break\n\nYou're not sure about your face, but you do feel intense. \nWhat do you do?\n\n*choice\n  #Ignore Him.\n\n    This is too important to  wait.\n\n    *set leadership %+15\n\n    *goto mm26b\n\n  #Calm Down.\n\n   You have enough time. Allow yourself to calm down before you \n   tell him why you're there.\n\n   *set cautious %+10\n   *goto mm26b\n  \n  #You Just Need That Cold Drink.\n\n    You have been on the road for a while, driving from home to\n    Notthinghamshire, and from there to here. \n\n    Having a cold drink won't slow you down that much.\n   \n    *set coward %+10\n    \n    *goto mm26b\n\n*label mm26b\n\nAfter you're calm, and your face isn't as red, you begin \nby telling Robyn:\n\n\"This is extremely important, and, therefore, you must trust \nme like you've never trusted me before. Can you do that?\"\n\nHe looks at you and you catch a spark in his eyes as he \nhold you by the shoulders.\n\n\"Of course,\" he says with a smile. Then he attempts to kiss \nyou.\n\n\"I'm serious, Robyn! No questions. No matter what you see me \nor Gretchen do, no matter what it is, you cannot ask any \nquestions!\"\n\n\"Why not?\" He asks immediately.\n\n\"Robyn!\" You and Gretchen exclaim.\n\n*page_break\n\n\"No questions, at all!\" You shout.\n\n\"Okay, okay!\" He promises, still smiling. \"No questions.\"\n\n\"Next, we need Jack to come with us with his pick tools.\"\n\nRobyn furls his brow and for the first time he looks \nserious.\n\n\"Why do we need Jack with his tools?\"\n\n\"No Questions!\" You and Gretchen shout, your eyes wide.\n\n*page_break\n\n\"Okay, I get it. No questions at all about any part of \nthis, whatever it is we're doing.\" \n\n\"That's right. Now call Jack and let's get going.\"\n\nRobyn and Jack follow you and Gretchen to Prince \nJohn's Palace in Clipstone. You take them to the \nback of the Palace where there are fewer guards. \nYou hide their horses and tell them to wait behind \nthe brick fence in the backyard.\n\n\"We'll return as quickly as possible. Stay low and \nkeep quiet,\" you instruct (as if you really have to).\n\n*page_break\n\nNext, you and your handmaiden ride to the front of the \ncastle and approach a small group of guards on duty at \nthe gate.\n\nAfter dismounting and getting up close to the Captain, \nyou begin batting your eyes, and blinding him with your \nsmile. \n\nAs you inch even closer, you take a pinch of sleeping \npowder from the bag in your pocket. When his head is\nlow enough to meet yours, you blow the powder into the \nCaptain's face.\n\nWithin moments, he is falling off of his horse, fast asleep.\n\nMinor chaos ensues as his horse becomes nervous, and raises\nhis front legs while it whinnies loudly. \n\nGretchen has done the same thing to the guard who is \nflanking the Captain.\n\nWith two men down, one of the guards naturally ask, in \nalarm,\"What's going on?\"\n\nThe other three guards dismount, then before they know it,\nthey are also on the ground.\n\nYou and Gretchen hit the back end of the horses, and they\nrun away into the forest,  and the women drag the bodies in the \nnearby bushes.\n\n*page_break\n\nYou arrive at the back door of the castle.\n\n\"Good evening. I was out for a ride and it became very \nlate as I was returning. I don't want my parents to know when\nI've returned.\"\n\n\"Of course. I won't tell them that I saw you enter through \nthe backdoor,\" said the guard to the outside entrance. He \nwinks at you, and you smile back. \n\nHe and his partner are the next asleep.\n\nGretchen enters to take care of the guards on the inside \nalone.\n\nLastly, you have to deal with the two guards in front of \nthe Storehouse. It has two lock entrance doors, but only \none set of guards. You took the one on the left while \nGretchen went after the one on the right. Simultaneously, \nthey slide down the wall.\n\n\"We're here,\" you say in exasperation.\n\nGretchen smiles. \"I'll go get Robyn and Jack.\"\n\nWhen Robyn sees you, he starts to open his mouth, but you\nput your finger up to his lips, and he remembers. Still,\nyou can tell that he is impress by what you and Gretchen\nhave accomplish.\n\n*page_break\n\nYou indicate the first door with only a gesture of your \nhand to Jack.\n\nJack looks between you and Robyn. Robyn nods his head, so \nhe places his long, thin, needles into the lock, and works \nthem until a click can be heard.\n\nWith a smile on his face, he opens the door.\n\nThere are a small set of stairs that you quickly descend \nbefore you reach the second door. Jack went directly to \nwork until you hear another click.\n\nThe door swings open, and Robyn's and Jack's mouth drops. \nThey both stand and stare as you hurry in and flatten on \ntop of another chest the larger paper with the rubbing.\n\n\"Robyn, Jack, come on! We don't know how long we have. \nWe're first looking for the chest that looks like this,\" \nyou touch the one below you.\n\nGretchen is already looking at one chest, then putting \nit aside to look at the next.\n\nThere is no organization to this room. Some of the artifacts \nare on tables, some are against another, still some are laying \non the floor in stacks.\n\n*page_break\n\nIt is quite obvious that this room is either not important \nto John, or he's forgotten about it. Neither one of those \nstatements really sound like Prince John.\n\n\"It has the two dragons on the left and right touching \nheads and tails to make a circle.\"\n\nYou suddenly look up from what you're doing and see the men\nrelaxing.\n\n\"Robyn! Jack! This is extremely important and we don't have\ntime for you to dawdle!\"\n\nIn half an hour, you have made progress, but there is still\nso many chests, and you need to get Robyn and Jack out of \nthe castle before the guards wake.\n\n\"This is it!\" Gretchen yells from across the room. \"Bring \nthe rubbing!\"\n\nThe three of you nearly knock one another over, and Jack does \nhit a shield sitting on its side, to get to the back corner \nthat Gretchen is in.\n\nYou lay the map flat. Yes! Two dragons making a circle and a \nfamily crest in the middle.\n\nJack has a harder time opening the chest than he did the doors, \nbut you do eventually hear the click.\n\n*page_break\n\nYou open the chest, and there it is in plain sight. \n\nWhat is it?\n\n*fake_choice\n  #The Knife\n   Isn't that handle magnificent.\n  #The Brooch\n    That pearl came all the way from China\n    *achieve brooch\n  #The Necklace\n    Only a royal neck should wear that necklace.\n\nYou didn't give Jack and Robyn time to [i]\"ooooh\"[/i] and [i]\n\"ahhhhh\"[/i]; you quickly wrap it in a soft satin cloth and \nplace it safely inside the secret pocket of your cape.\n\n\"Let's get out of here.\"\n\nYou have to hurry to make it to the Hag's place in time. You \nsay a quick good bye to Robyn promising him that you'll explain\neverything tomorrow, thank Jack, and you're rushing through \nSherwood Forest to Nottinghamshire. \n\nAt first, you don't see an alley between 49th and 50th Street \nas you should. You become confuse. \n\n\"Gretchen, what do we do?\" Your head starts to hurt and you \nfeel like you're going to cry.\n\n*page_break\n\nThen Gretchen points.\n\n\"Look!\"\n\nThe rest of the main part of the large square of \nNottinghamshire begin to disappear behind you and a long, dark, \nnarrow road slowly appears. Again, there are doors, with dingy \nblinds covering the windows and there are few lights.  \n\nYou slowly gallop Daisy down the alley, until you see a door \nthat is slightly ajar with that same gloomy archaic glow peering \nfrom it.\n\n\"Wait here this time,\" you instruct Gretchen.\n\nShe nods her head.\n\nYou knock. The Hag doesn't respond, so you push the door open.\n\nThe hag is not wearing her cape, but an old worn oversize sweater \ninstead. She's in front of the pot looking like she is stirring it.\n\n\"I'm back,\" you call. \n\nShe doesn't respond. You watch as she bends to pick up something \nlarge that wiggles and toss it into the pot, stirring it some more.\n\n\"We found it,\" you say.\n\n\"What do you want? A cookie? Put it on the table.\"\n\n*page_break\n\nYou remove it from your secret pocket, and leaving it with the \ncloth covering it, you gently place it on the table.\n\nThe Hag continues stirring with her back to you.\n\n\"And our deal?\"\n\n\"Deal?\" The Hag responds innocently with a question.\n\n\"Yes, to return Robyn...that is Robert...his land, his money, \nhis name! Like you promised!\"\n\n\"I made no such promise. Now get out of here.\" She continues \nto stir.\n\n\"Grrrrr!\"\n\nYou pull out your saber and move swiftly between the table \nand where the Hag stood, but you suddenly freeze as if you \nwere ice and you cannot breath.\n\n\"Let her go!\" \n\nThe Hag turns around. She sees Gretchen, gives one of her \nhigh cackles, and releases you onto the floor. You're \nsuddenly warm again, and you can breath. You look up at \nthe Hag.\n\nShe's return to her pot.\n\n*page_break\n\n\"I was only plain'.\" She says, still cackling. \n\nYou feel Gretchen help you stand.\n\n\"Are you all right, my pet?\"\n\n\"Yes, I'm okay.\"\n\nYou look Gretchen directly into her eyes.\n\n\"I want to go to the castle, have a bath, and wake up \nwith my family.\"\n\n\n\n\nIn the mornin
