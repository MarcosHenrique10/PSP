w Robyn.\n\n    \"Are you going to save that child, Robyn?\"\n\n    \"The Elves of Light certainly must know another hero.\"\n    \n    You throw up your hands and stomp towards Daisy. Black \n    Mike shakes his head and follows you.\n\n    You two mount your horses and ride down the road towards \n    the castle leaving Robyn alone.\n\n    *set leadership %+10\n\n    *goto mm23c\n\n\n*label mm23a\n\nOkay, looks like you're going to try this one again. Don't\nworry girl friend, I'm here with you.\n\nThe three of you ride in the direction on the map until you’re \nalmost at the tiptop of the hill.\n\n\"Black Mike, do you see anything?\" Robyn ask.\n\n\"Aye, me frien'. Me see pointy tops wit flyin’ fl'gs. It be \nthar c'mp!\"\n\nYou soon find the hill that protects the Dark Elves from \nany surprise attacts by their enemies sooner than you had\nearlier that day.\n\nYou race to the top of the, Robyn in the middle, Black Mike \non his left, yelling an attack cry.\n\n\"Ariiiiiiiiieeeeeeeeggg!\"\n\nThen, before you know it, Robyn is yelling, \"Retreat, retreat,\nretreat!\" as he's turned Clint around in a very dangerously\nsharp u-turn as he headed back down the mountain.\n\n*page_break\n\nSo now you're sitting on top of Daisy, looking at Robyn whose\nsitting comfortably under a shade tree with Clint quitely eating \nthe wild vegetation which is different from this morning.\n\n\"But, the Dark Elves still have Jaeda and the Benign Globe!\" \nYou say near hysterics.\n\n\"And King Jaeden just has to find someone else to retrieve them \nfor him,\" he says as he calmly unwraps something he finds in his \npackto eat.\n\n\"But, Robyn, there’s a reason you’re known as a hero! You can use \nyour wit against those barbaric Dark Elves!\"\n\n\"Marian please, don't start with me.\" You turn away from her to \nlook at Black Mike. \"It's good seeing you again, friend. I hope \nnext time will be under better terms. You're invited to the wedding, \nyou know.\" You smile.\n\n\"Robyn...\" Marian begins again.\n\n\"Marian, dear, I'm serious. No more.\"\n\n\"Ugh!\" You exasperate loudly as you turned Daisy to lead her down\nto the castle of the Elves of Light. Black Mike shakes his head and\nfollows you.\n\n*finish\n\n*goto_scene mmelves6\n    \n*label mm23b\n\n\"What are we going to do, Robyn?\" You ask. \"The Dark Elves \nstill have the Benign Globe. We have yet to rescue Jaeda.\"\n\n\"Aye, me ole frien'. Ya made a pro'ise, 'nd in all da time \ndat me known ye, 'ya ne'er broke one. Is dis da time ta \nbegi'?\"\n\n\"Look, I'm the leader of this quest and I make the final \ndecisions, and I say that it's not worth putting our \nlives at risk with those...those...those monster Elves.\"\n\n\"But Robyn...\" \n\n\"No buts. They will find another hero, I know it. Jaeda and \nthe Globe will be return home, just not by us.\"\n\nHe looks at you with his serious face and you look back at him \nwithout hope.\n\n*page_break\n\nYou watch him as he goes through his pack and pulls out the\nfood that the Elves of Light has place in your packs. He\nsits down below a tree. \n\nClint is quite happy eating the wild vegetation which is \ndifferent from what he had that morning. \n\nHe looks up at you and Black Mike.\n \n\"I'm telling you, I've made up my mind,\" he says as he \neats something guey betweem what seems to be two slices \nof bread. \"I'm going to sit here on top of this hill, \nunder this gloriously shaded tree, have my lunch, then we \ncan make arrangements with Jaeden to go home. Care to \njoin me?\" \n\n\"Ugh!\"\n\nYou decide not to spend any more important time on Robyn.\nYou have a little girl to rescue. \n\nIn your frustration, you hit Daisy a little too hard on \nher flanks.\n\n\"Sorry, dear,\" you coo as you reach down to pet her. You \ngive Robyn one more look of disapointment before you lead \nDaisy to the Elves of Light castle. \n\nBlack Mike looks at Robyn, but says nothing before he begins \nto follow you.\n\n*finish\n\n*goto_scene mmelves6 \n\n*label mm23c\n\n\"Yu be 'ave pl'n, Maid'n Maria', me can tell.\"\n\n\"Are you up to helping me, Black Mike?\" \n\nHe nods.\n\n\"Then follow me.\"\n\n*finish\n\n*goto_scene mmelves6  ", "mmelves6": "*label mmelves6\n\n*page_break\n\n*image daffodil.png\n\nYou and Black Mike return to the castle and find your \nway to the Great Hall to have a conference. \n\nYou move around the long halls until you find a door \nopen to one of the smaller rooms that looks perfect for \nprivacy. \n\nYou sit beside one another in the large chairs, touching \nelbows to put your heads together, and speak low.  Since \nJaeden and Killia didn't know how the Dark Elves were \nable to kidnap Jaeda, you thought that there may be spies.\n\n“I have an idea. We can do this with or without Robyn.”\n\n“Me list'nin'.”\n\n“I think the Dark Elves knew that we were coming long \nbefore we climbed to the top of the hill. They were \nwaiting for us.”\n\n“Me a'ree.”\n\n“I think, like many animals, they can hear better and even \nsmell better than we can.”\n\n\"You are so right,” came Jaeden's voice.\n\n*page_break\n\nYou're surprise to find him suddenly standing over you.\n\n“They smelled you and your horses coming long before you \nreached the top of the hill,” he said.\n\nYou smile.\n\n“Then I have an idea where we can become as if we are \ninvisible to them, but in order for it to work, we must \nleave after the sun goes down.”\n\nYou look up at Jaeden.  \"I will need a few things, for \nBlack Mike and myself, if you please.\"\n\n\nJaeden's Librarian brings you all of the maps showing the\nhills, plants, trees, and other permanent formations that\nare around where the Black Elves camp is for you to study. \n\nYou and Black Mike have your heads close together, discussing\nyour plan.\n\n\nIt isn't long after when Robyn runs into the room. He is \nbreathing heavily.\n\n“Oh, there you two are! We have to go after the Globe! We must \nrescue Jaeda!”\n\n*page_break\n\nYou don't look up from the sketch that you are drawing onto \nthe map to the Dark Elves' camp. \n\n\"Yes, yes, we've established that a long time ago, Robyn.”\n\n“No, you don't know what I saw! There was a village below the \nhill. I saw it, it was beautiful! There were fairies and small \npeople living there.”\n\nRobyn stops and bends over to catch his breath. He now has \nthe attention of both you and Black Mike.\n\n“Go on.”\n\n“Then, a stream of bright lights came from above me! It \nencircled the village, and when it was gone, the village \nwas destroyed!”\n\nYou stand up. \"Oh, no!\"\n\nBlack Mike sneers.\n\n“Wait, wait, I'm not done! I heard horrible bellowing above \nme. I hid behind the tree, then looked up as best I could. \nI saw them. Several Dark Elves! One, the largest of them, \nheld what had to have been the Benign Globe! It was still\nalive, swirling with colors!\"\n\n\"It was Zerkit with the Benign Globe,” says Jaeden \nunemotionally. “That must have been a warning.\"\n\n*page_break\n\n“Then there is no time to lose,” you say. “Robyn, we tried \nit your way. Now we're trying it mine. We're going to return \ntonight and sneak in when the Dark Elves are busy hooping, and \nhollering, and boozing it up.\"\n\n\"How do you know they'll be hooping, and hollering, and \nboozing it up?” Robyn ask.\n\nYou and Black Mike look at Robyn blankly. You turn to \nBlack Mike.\n\n“Would Robyn's men be hooping, and hollering, and boozing it \nup at night?”\n\n“Whut else is thar ta do?” Black Mike responds.\n\n“Would you be hooping, and hollering, and boozing it up?” You \nask Black Mike.\n\n“Me be drun' 'nd slobbrin' on Large Lucy 'fore sun be down.”\n\n“And there you have it.”\n\nThe corners of Jaeden's mouth lifts just a touch.\n\n“You are all three very brave,” he says, “but to help you \nsucceed, I want to teach Robyn some movements that male Elves \nof Light use to retell stories of our ancient ancestors during \nthe 'Light of Vanuite' celebration. I believe they will help \nyou when you meet Zerkit, which you must do before this quest \nis over.\"\n\n*page_break\n\nFor the next few hours, on the grassy hill next to your tents, \nJaeden watches as three Elves of Light males teaches Robyn how \nto move quickly from a standing position to a squatting position, \nhow to roll and tumble, how to crawl low and fast, and how to make \nquick jabbing motions into the air with your flat hand and with \nyour fist. \n\nThey teach Robyn how to control his body to move slowly and to \nstay as Jaeden calls, \"frozen as ice\", in any position.\n\nBlack Mike does not have to learn theses moves because, as Jaeden \nnicely puts it, he is “too large of a man.” Instead, he practices \nfighting with his sword and throwing knives.\n\nYou, being a woman, cannot practice the moves; but what they don't\nknow is that there are different ways to learn and that you do not \nneed to practice something to do it. \n\nYou watch the Elves Of Light carefully as you innocently stretch \nyour body in many positions.\n\nYou, Robyn, and Black Mike practice into the early evening drinking \nplenty of cool fresh water, and a glass or two of Bessie's milk.\n\n*achieve milk2\n    \n\nAs the sun moves in the sky, Lida arrives carrying large baskets \nover eachside of a horse that contains your Third Meal which she \nserves on a low table to you and Robyn in his tent.  Black Mike is \nenjoying the same meal in his own.\n\n*page_break\n\nEven though you are enjoying each delicacy, with gusto I must \nadd, you finally mention to Robyn that no form of meat has been \nserve to you. \n\n\"Now that I think about it,\" Robyn says, \"you're right. There \nhasn't been anything that could be classified as meat in any of \nthe meals we've shared with them.\"\n  \n\"No wild game, boar, pheasant, trout, capers for First Meal, \nnor even a scrawny chicken has ever been on the serving platters.\"\n\nLida is quietly standing at attention while you and Robyn eat. \nWhen it is time for her to serve the hot musky tasting drink \nthat can use some cream and sugar, you ask about the lack of meat.\n\n\"All of the Fair Folk live in harmony with all of Vanuite's \nchildren. We would never think of harming another living creature, \nlet alone consume one.\"\n\n\"What of the Dark Elves?\"\n\nLida lowers her head. \"I'm sorry to say that they do not live \nas we do.\"\n\n\nYou lean into Robyn. \"That may explain the drove that we saw.\"\n\n*page_break\n\n\"It can't be that you don't eat any meat,\" Robyn says to Lida.\n\n\"We never have.\"\n\nHow does Robyn respond?\n\n*fake_choice\n  \n  #\"Not Even With Dark Greasy Spicy Hot Mutton Gravy?\"\n        \n    \"I mean, you really should give it a try.\"\n\n    She looks at Robyn with eyes wide and drop mouth, as she \n    stumbles backwards to exit the tent and get away from you \n    as quickly as possible.\n\n    You look at him crossly.\n\n    \"Really, Robyn? Did you not hear her say they live in \n    harmony with other creatures?\"\n\n    \"I'm just asking,\" he says to you before he takes a long \n    gulp of the drink and shouts,\n\n    \"BOY, DOES THAT HIT THE RIGHT SPOT!\"\n\n      \n\n  #\"Not Even If One Was Eating You?\"\n\n    \"I heard the largest animals have the tenderest flesh.\"\n\n    \"No.\" She quickly picks up the dishes, puts everything \n    back into the large basket, then exit his tent.\n\n    You're sitting at the table still with the fork in your\n    hand.\n\n    \"Hey!\" He calls after her. \"We were still eating that!\"\n\n    You cross your arms and give him the look. \n\n    \"I was just asking,\" he says before he takes a long gulp \n    of the drink and shouts, \n\n    \"GOTTA DANCE!\"\n\n\n\n  #\"Not Even Their Children?\"\n    \n    \"You haven't really eaten until you've had a nice spring \n    lamb.\"\n\n    Lida looks at Robyn with eyes wide and drop mouth, as \n    she stumbles backwards to exit his tent and get away from \n    him as quickly as possible.\n\n    \"Robyn! That was unnecessarily insensitive!\" You snap.\n\n    \"I'm just asking,\" he says before he takes a long gulp \n    of the drink and shouts, \n\n    \"GOTTA DANCE!\"\n\n    \nJaeden and Black Mike enters Robyn's tent.\n\n“Jaeden,” you begin, “Robyn, Black Mike and I are now ready \nfor a bath. We must smell like the plants that grows in the \narea where the Dark Elves have camped.”\n\n“That can be arranged. I will have your Attendees prepare \nyou each a bath in your tent.”\n\n“We also need new black clothing. A black tight fitting long \nsleeve shirt, black tights, black boots, black gloves, and a \nblack hood. I'll also need black paint for our skin. Will \nany of that be a problem?\" \n\n*achieve boots\n\n\"Not at all.\"\n\n*page_break\n\n\"Lastly, we need black horses. They must be bare back and \nfreshly washed.\"\n\n“Of course, Maid Marian. I will have it all ready for you \nas soon as possible.”\n\nYou're smiling. Your plan really excites you because you \nhave much confidents.\n\n“What is all of that about?” Robyn ask.\n\n“Evil Elves not see, not smell!” Black Mike says. “Plan be \ngud! Arg!”\n\n\n\nWhen you are ready, you meet Robyn and Black Mike at the \nfront of your tents.\n\n\"Ready?\" You ask.\n\n\"Who's that speaking? Marian, is that you?\" Robyn looks \naround.\n\n\"Me not see ya? Ya thar Marian?\" Black Mike says, \npretending to answer the air.\n\n\"Oh, stop, you two!\"\n\nBlack Mike has a good laugh.\n\n\"Har, har, har!\"\n\n*page_break\n\n\"That's right, both of you need to get all of that \nout now. From here on out, it's serious time.\"\n\nRobyn grabs you and kisses you on the forehead.\n\n\"Just teasing, little squirrel.\"\n\n\nJaeden, Killia and other Elves of Light are waiting \nfor you once again at the front gate.\n\nRobyn makes sure that the globe's sack is in his belt \nloop, then you all mount your horses.\n\n\"May Vanuite be with you, and I will see you soon, my \nnew friends.\"\n\nEveryone repeats, \"May Vanuite be with you,\" and they \nall wave. You all wave back, and then you face the road \nthat will lead you once again to the Dark Elves Camp.\n\n\nThe three of you remember the way, so even in the dark, \nyou do not become lost, and it doesn't take long to make \nout the tops of their tents on the other side of a hill.\n\nYou all dismount and the three of you bring your heads \ntogether and speak very low.\n\n“We have to remember to be as quiet as we can,\" you \ninstruct. \"They have better hearing,”\n\n*page_break\n\n“Aye,” Black Mike responds in an almost whisper.\n\n\"Listen for the warning signals in case anything goes\nwrong.\"\n\nThe other two nod their heads.\n\n“I'm assuming that Zerkit will have both the Globe and \nJaeda in the same tent, and that it will be heavily \nguarded. Black Mike, look for that tent and take out \nthe guards.”\n\n“Arrrg! Dey be feel me 'rath 'nd me blade!\"                                                                                                            1”\n\n“Robyn, you and I stay together.”\n\n“Right.”\n\n\"Remember, no heroics. Stick to the plan.\"\n\n“We get in, stay quiet in the shadows, and get out \nas quickly as we can,” Robyn says.\n\nYou and Black Mike nod your heads.\n\nYou strike the long nose of your horse.\n\n\"If all doesn’t go well, you three make sure to \nhead back home. Otherwise, we'll be back as quickly \nas we can.\"\n\n*page_break\n\nAll three horses respond with a low whinny and head \nnod. Robyn brushes the flanks of his horse.\n\n\"Well, here we go.\"\n\n\n*finish\n\n*goto_scene mmelves7", "mmelves7": "*label mmelves7\n\n*page_break\n\n*image dark.png left\n\nKeeping low, you and Robyn crawl down the hill until \nyou reach the very first tent in their camp. You stand, \nstepping quickly and staying in the shadows. A few \ntorches are lit where you are, but no one is in sight.\n\nYou can see the brightness of a larger fire in the area \nthat must be the middle of the camp. You can hear the \nsound of [i]gutteral[/i] whooping and hollering that you\nhave never heard coming from a human. It can only be the\nDark Elves.\n\nYou signal to Black Mike, who is behind you, to go ahead. \nHe moves stealth like and enters the camp.\n\nYou keep moving forward, slowly, looking around until \nyou notice the most lavish of the tents that is surprisingly\nwithout any guards.\n\nYou signal to Robyn to wait as you enter.\n\nThe lighting is low, but you make out the Benign Globe sitting \non a pillow on a table on the other side of the tent.\n\n\"Ah. This is easier than I thought it'd be,\" you say out loud \nbecause you're just that proud of yourself.\n\n\"Whose there?\"\n\nYou instantly freeze although you're not sure if you actually \nheard someone speaking or not. This move is proving useful at \na time like this.\n\n\"I know I heard someone. Please tell me who you are.\"\n\n*page_break\n\nThat is definitely a voice; although it is a low whisper, it is\na high lilt. You use only your eyes to scan the tent as much as \nyou dare without turning your head.\n\n\"I know you're not Zerkit. Did you come to save me?\"\n\nWell, that certainly cannot be a Dark Elf, so you relax. You look \naround until you see an embellished golden cage on the floor. You \ndon't believe what you're looking at as you walk towards it.\n\nWhat's in the cage?\n\n*choice\n  #A Fairy.\n  \n    The fairy in the cage stands up.\n  \n    \"Did you come to save me?\" She ask again.\n\n    \"You're a fairy,\" you say instead of answering her question.\n\n    You squat down so that you can see her closer. \n\n    \"I'm now Zerkit's fairy, unless you let me out and take \n    me with you.\" \n\n    \"I'm Marian.\" You say. \"What is your name?\"\n\n    She gives you a little smile and her color brightens for \n    a few seconds. \"Nice to meet you. They call me Tomma.\"\n\n    \"Nice to meet you, Tomma.\"\n\n    She looks at you with sad eyes.\n\n    \"Why are you dress in black? Is your skin really that \n    color?\" She ask.  \"I can see you because my kind have very\n    good vision and hearing. You spoke the third language.\"\n\n    Thank goodness it wasn't a Dark Elf sitting in the half dark \n    who heard you speak, you think!\n    \n    You smile.\n\n    \"That's the point, Tomma. I wanted to make it difficult for \n    the Dark Elves to see me.\"\n\n    \"Ohhhhhh. That makes sense.\"\n\n    *set brave %+10\n\n    *goto_scene mmtomma\n\n    \n\n  #An Elf\n  \n    The Elf in the cage stands up. She is wearing clothing as the\n    adult Elves of Light, but a little simpler then the King and \n    Queen, and the Elders that you've met. Much more like Lida's.\n\n    \"Did you come to rescue me?\" She ask again.\n  \n    \"You're an Elf of Light.\" You say instead of answering her \n    question.\n\n    You squat down so that you can see her better. She is pale, not \n    as bright nor with any type of glow. Since you've never seen a \n    child elf before, it is difficult to guess her age. \n\n    \"I'm Zerkit's pet elf,\" she says, \"unless you get me out of here.\"\n\n    \"I'm Maid Marian of Blidworth. Are you Jaeda?\"\n\n    Her eyes become wide and bright. “You know Jaeda?”\n\n    “I was sent here to rescue her. You're not her?”\n\n    “No, no. My name is Tawn. I am one of Jaeda's Sinthas.”\n\n    “You're a Sintha? I thought they were adult Elves of Light.”\n        \n    “No. Not all of us. Two of us are young so that we grow old with \n    our intended.\"\n\n    \"That makes a lot  of sense,\" you say, thinking of Gretchen, how \n    different it would be between you if you were the same age. You \n    begin to miss her.\n\n    *set leadership %+10\n\n    *goto_scene mmtawn\n\n\n\n  #A Human\n\n    Actually, inside of the cage is a metal ball that connects to \n    a metal chain. The chain itself exits the cage and is attach \n    to the ankle of a little girl.\n\n    You stare at her. \n\n    When you first enter she is laying on a pile of pillows near \n    the back of the tent, but now she sits up.\n\n    There's enough light in the tent to see her clearly. The tone \n    of her skin is medium and she is only covered from the waist \n    to about mid-leg with some sort of animal skin.  She wore \n    nothing on top, therefore, you can see that her breast are \n    beginning to blossom. There is a cord around her neck holding \n    what looks like a tooth. \n\n    She wore bangs that partially cover her eyes while the rest of\n    her hair fell to her shoulders. \n    \n    \"Speak to me!\" She says raising her voice a bit. \"I do not see \n    you well.\"\n\n    You still could not find the right words. You simply continue \n    staring.\n\n    She stands up and you now see that she is carrying some sort \n    of sharp weapon in one of her hands.\n\n    \n    \n    *set cautious %+10\n\n    *goto_scene mmtikah", "mmelves8": "*label mm8\n\n*page_break\n\n*image hoodandmaid.png\n\nYour quest is finally over when you see the tall gates at the \nentrance to the home of the Elves of Light. \n\nThere are elves behind the gates and as you get closer you can \nsee Jaeden, Killia, and other Attendees including Lida and Pom. \n\nRobyn gives a signal for you three to stop several feet away from \nthe gate. He dismounts and helps Jaeda down. She immediately runs \nto her father's open arms. Jaeden picks her up and enclose her near \nhis shoulders while Killia embraces both of them at the same time.\n\nIn the meantime Robyn has taken the Globe and removed it from its \nsack.\n\nYou dismount and so does Black Mike. He helps the other guest \ndismount down and you take her by the hand. \n\nWhen you are close to the Royal family, you can hear Jaeden saying \nover and over, \"My little honey dove, my little honey dove, my \nlittle honey dove,\" over and over as he rocks Jaeda back and forth. \n\nThe three of you did not want to interrupt and you wait patiently \nuntil the parents are ready to acknowledge you.\n\nFinally, Killia steps away to stand beside her husband. You can \nsee even from that distance that she is crying. \n\nNow you know for certain, adult Elves of Light do express affection, \nat the right time, for the right reason.\n\n*page_break\n\nRobyn steps up. \"For you, King Jaeden, I have returned what \nbelongs to you.\" He bows his head as he presents the Globe. \n\nOne of the Attendees approaches and accepts for the King.\n\n\"Thank you Robyn, Marian, and Black Mike. I knew I could depend \non and trust you to bring what is most precious back home to me.\"\n\n\"As for the Dark Elves,\" Robyn continues, \"they have all returned \nto\" the mountains, although their belongings are still at the camp.\"\n\n\"No worries. We will take care of the camp. I assume you are in a \nhurry to return to your own homes?\"\n\n\"Arrrggg! Me be missin' me pints, me ladys, 'nd me mates. Not in dat \no'der,\" says Black Mike with a laugh.\n\nYou finally walk forward with one of the children in toll. Which one:\n\n*fake_choice\n\n  #Tomma, The Fae.\n\n    Her diamond tears are not falling from her eyes, but she looks \n    very sad. \n\n    \"King Jaeden,\" Queen Killia, this is Tomma, one of Jaeda's \n    friends who was kidnapped only because she was here visiting \n    that day.\"\n\n    \"Where are the others?\" Killia asked.\n\n    You put your head down.\n\n    \"The Dark Elves did something to them, mama, papa. We didn't find \n    them,\" Jaeda explains in a weak and sad voice.\n\n    Both Jaeden and Killia nod their head once. \n\n    \"That makes us very sad, Jaeda,\" says the King to his daughter.\n\n    \"King Jaeden,\" you continue, \"Tomma is from the village that Zerkit\n    destroyed and now she has no home. Can you help her?\"\n\n    \"Come closer, little one,\" King Jaeden said. \n\n    Tomma flew up and hovers near the King's head so he can see her \n    face better. The King takes a few moments to look at her and then \n    he appears deep into her eyes.\n\n    \"I knew your great-great-grandfather when I was a child,\" he says \n    as the corners of his lips turn up just slightly. \n\n    And then he is serious again. \n\n    \"I know where members of your race have settled in another part\n    of Varna. You may stay with us for a few days and recuperate from \n    your harrowing experience of being in the hands of those despicable \n    Dark Elves.\" He says.\n\n    He looks over at Jaeda. \"She can spend time with you, my little \n    honey dove, and you can recover together. Then I will have a few \n    of my troops escort you there. Would you like that?\" He ask Tomma \n    directly.\n\n    \"Yes, yes I would!\" Tomma did a little dance in the air.\n\n  #Tawn, The Elf.\n\n    \"Papa, mama, I have something special to tell you. It should make \n    you happy.\"\n    \n    They share looks again.\n\n    \"What is it?\"\n\n    \"Tawn used magic with the Dark Elves.\"\n\n    Jaeden looks first at Killia before he looks down at Tawn. He \n    continu to look at Tawn when he asks, \"What do you mean?\"\n\n    \"Tawn, you have my permission to speak directly to my father.\"\n\n    Tawn doesn't hesitate. She bows her head before looking up at \n    Jaeden. \n\n    \"I don't know exactly how to describe it, your hignest, but it \n    felt like it does when we shine, but the brightest I've ever \n    shined before. Then I was moving rapidly. Everything I touched \n    went flying in the air.\"\n\n    \"Oh!\" Killia suddenly gasp.  \"I remember doing that as a very \n    small child, and my Sinthas stopped me!\"\n\n    You look at Killia and she's smiling. I mean, she's really \n    smiling!\n\n    \"Just like all of our emotions,\" she continues, \"I was told \n    that it isn't the right way to for a Elf of Light, especially\n    a Royalty, to behave.\" \n\n    She looks around at every one. \n\n    \"I had completely forgotten about that! I had no idea that it\n    was magic, but I now remember how much fun it was!\"\n\n    \"It is fun,\" Tawn agrees.\n\n    \"I think a lot of things you are doing is really magic,\" you \n    begin, as you look at King Jaeden, \"and you're not aware of it. \n    Like, the extreme bright light when you appeared out of nowhere \n    when Gretchen and I first met you on the road.\" \n\n    Robyn smiles as he nods his head. \n\n    \"I hope you don't mind me saying this,\" he says looking from \n    King Jaeden to his Queen, \"but maybe you, as a race, should \n    embrace your magic abilities and bring it back. That, and with \n    the Benign Globe, you'll be able to protect all of the Fair Folk.\"\n \n    The corners of the King's lips raise just a bit.\n\n    \"I will take that under advisement from a new friend.\"\n\n    Then, King Jaeden looks at the three of you and smiles a real \n    smile.\n\n\"You will be home and with your love ones shortly.\"\n\n\nWhat would you like as an ending to this adventure that Marian had? A \nHeroes Ending  or a Romantic Ending?\n\n*choice\n  #Hero's Ending\n\n    The small greeting party moves inside of the gates and suddenly \n    there is a melodious sound of a variety of horns coming from all \n    around you.\n\n    In an instant, the entire community of the Elves of Light, young\n    and who-knows-how-old, surround you making a perfect circle.\n\n    The furthest Elf begins to touch the back of the Elf in front. \n    They are beginning the ceremony known as the \"Vanue Bond\". \n\n    As each Elf touches the one in front of them, they create a thin \n    stream of light that connects them together. \n\n    Once you, Robyn, and Black Mike are part of the Vanue Bond, the \n    Elves hum low and soft, but it soon become an intense hum because \n    there are so many Elves.  \n\n    Then Jaeden hands Jaeda to Killia and she steps up between Robyn \n    and Black Mike. Killia touches Black Mike's opposite shoulder, \n    Jaeda touches Robyn's. When the stream of light connects all of \n    the Elves of Light with you three, Jaeden walks over.\n\n    \"Marian, Robyn, and Black Mike, you are bond to Vanue as friends \n    of the Elves Of Light and all of the creatures of Varna in this \n    life and the next.\" He pauses and looks at each of you. \"Now, \n    close your eyes.\"\n\n    You look at Jaeden, Killia and Jaeda one last time before you do \n    as he ask.\n\n\n    Then you fall asleep.\n  \n    *set brave %+10\n\n    *goto mmheroending\n\n  #Romantic Ending\n\n    You wake up on your bed in Robyn's hideaway camp, although you \n    have no idea how you got there. You're have a vague memory of \n    being on an adventure of some sort, but you don't remember what \n    exactly. Elves? Magic? Magical elves? \n\n    You're not, sure, but you do feel tired.\n\n    You sit up. It's day time, although you don't really know \n    what time it is, and the sun is making lovely shadows on your \n    west wall as it shines through the trees.\n\n    You want to go back to sleep.\n\n    *set romantic %+10\n\n    *goto mmromanticending\n\n*label mmheroending\n\nYou awake on the floor of your tent in Robyn's hideaway camp, \nalthough you have no idea how you got there. You're looking \nstraight up at the ceiling for a few moments. Nothing about it \nlooks real. The colors are dull and the figures are surreal. \nSlowly, everything comes into focus and looks as it should, \nand you realize where you are. You sit up.\n\nThe feeling you've been somewhere between the Palace and your \ntent is strong, yet, also vague. \n\nHow can it feel both strong and vague at the same time, Marian? \nYou're being silly.\n\nYou stand and look around. Yes, this is definitely your tent. \nThere's your table that you use to write on, and your little \nchair that you always sit on. There's your bed and pillows, \nand some of the personal items you've brought here, like your \nhand mirror, and shell handle brush?\n\nShell handle brush? \n\nOf course. You've always had a shell handle brush.\n\nYou're okay, Marian. Obviously it was just a dream.\n\nGretchen rushes in.\n\n\"Why aren't you ready?\" She ask looking at you up and down.\n \n\"You don't even have your dress on yet so that I can brush \nyour hair. Hurry! Everybody's ready to eat and we're all \nwaiting on you!\"\n\n*page_break\n\nShe hurries to your bed and picks up the dress that's laying \non it. \n\nHey! That wasn't there just a few moments ago!\n\nGretchen helps you out of your orange dress with the piping \naround the neck and into the green linen dress with the tiny \npearls and the pearl buttons down the front. \n\nShe grabs your shell handle brush off of your table and begins \npulling it through your hair. Then she gives you a four layer \nbraid down the middle of your back.\n\n\"Oh, don't forget to change your shoes!\" She says as she places a \nmulti-banded silver chain around your neck around your neck and \nhook it for you.\n\nYou sit down on your bed to change your shoes to a green pair.\n\nYou sit still for a few moments feeling a little overwhelm. First \nyou wake up on the floor of your tent having the feeling that you've \nbeen on a journey, your tent does not look familiar, Gretchen is \nrushing you to dress for supper. And why are you wearing such a \nfancy dress to sup with Robyn and his men out in Sherwood Forest?\n\n\"Can I come in?\" It's Robyn.\n\n\"Yes, of course.\"\n\nHe walks in and he's also dress in fine clothing. He is wearing a \nlong sleeved shirt with a high collar, a brocaded vest, tights, and \nnew polished boots. His short jacket fits him perfectly. And he is \nwearing a green cap that's sporting a long pheasant feather.\n\n*page_break\n\n\"Are you ready for this?\"\n\nYou look at him unsure what he means. You're simply going to eat a \nmeal.\n\n\"Yes, yes of course I am. Perfect timeing, too. I'm starving.\"\n\nHe puts out his arm and you accept it with a smile. \n\nWhen the two of you exit and  walk some length between your tent and \none of the long tables now full of all sorts of food, in the distance \nyou see your parents and siblings. Robyn's mother is also here, Tikah\nis standing beside her dress as a proper your girl with bows in her \nhair, and all of the Merry men are dress in new clothing as well.\n\nEverybody begins to cheer when they see the two of you.\n\n\"Hooray for Marian and Robert! Hooray for Marian and Robert! Hooray \nfor Marian and Robert!\"\n\nYour face contorts as you realize that they are calling Robert, \nnot Robyn. You stop him mid-stride and pull on his arm.\n\nIn a rush, you whisper in his ear.\n\n\"Robyn, why are our families here? Why are they calling you Robert \ninstead of Robyn?\"\n\n*page_break\n\n\"I wondered that at first, myself,\" he says with a smile, a little\nlouder than you. \"Then, I remembered Jaeden saying,'If you are \nsuccessful, we will rewarded greatly.'\"\n\nYou look at him with your eye brows a skew.\n\n\"Marian, you slept longer than I, so I had time to think it over.\"\n\nYou continue to give him a blank look as mumbling begins with the\nMerry Men and the guest.\n\n\"Marian, we were successful! This is obviously our reward! And boy, \nis it great! Robert Dore is not an outlaw, and Robyn Hood does not \nexist!\"\n\nHe smiles at you, wide, with all of his teeth showing.\n\n\"What?\"\n\n\"Not only that, but look over there.\"\n\nHe points at the water trough where two white horses are drinking. \nEach are attach to a wagon that has chests, one sitting on top of \nthe other.\n\n\"I haven't looked yet, but if it's correct, it should be enouch\nto keep the men from being thieves!\"\n\nYou are so overwhelm that you feel yourself become a little dizzy.\n\n\"Marian!\"\n\n\n*page_break\n\nIt seems like the voices are far away.\n\nYou slowly open your eyes, blinking several times, and look around \nas Robert holds you in his arms.\n\nEveryone is there asking if you are all right.\n\n\"I'm fine, everyone. Really, I am. I'm just a little hungry. After \nall, I haven't eaten all day.\"\n\n\"Get this wonderful woman a plate of food!\" You hear Lars yell \nout.\n\n\"Even an apple will do!\" Little John says.\n\n\"Come on, y'all! Let's eat!\" Jack says.\n\nYour mother and  Gretchen stay to help Robert walk you to your \nplace of honor at the head of the table.\n\nHe kisses you on your forehead. \n\n\"We did the right thing, didn't we?\" He whispers into \nyour ear.\n\n\"Yes, we did.\" \n\n\"Will it always be this way?\"\n\n\"I hope so.\"\n\nRobert Dore inherited both the Dore and Smyth estate since he\nwas of age, and he was never blamed for the murder of his\nstep-father. He and Marian lived in London where his mother\njoined him, and they had five children.\n\nThey kept the major oak as a place for men of destitude to\nlive until they were on their feet. The original Merry Men \nlived at and ran the Dore's farm in The Dukeries where most \nof the new batch of Merry Men wer trained before they moved \non and took a more permanent position somewhere else.\n \n\n\nThis is the end of this paticular Robyn Hood's Unusual Tale with\nMarian as the lead. \n\nYou may return to the beginning to enjoy another one of her Tales\nby linking below, or link to one of Robyn's Tales with Marian and \nhis Merry Men, or end the Tales at this point.\n\n*goto_scene ending\n    \n\n\n\n*label mmromanticending\n\nThen Gretchen rushes in, stops, and stares at you.\n\n\"You're not dress yet?\" She says with alarm.\n\nYou look at her, your brow furl.\n\n\"I'm not dress? Why aren't I just wearing what I have on?\" \nYou look down and you are not wearing your riding habit \nany longer, as you should be, but this red dress is a nice\none for dinner with Robyn and the Merry Men.\n\n\"Marian! You can't wear that!\"\n\nShe quickly moves to your bed and picks up a white linen \ndress that is laying on the end.\n\nDo not ask me why you didn't see that in the beginning.\n\nIt's a beautiful dress with a low crop neck. It has short \nsleeves, and little white flowers are crochet throughout the \nbody.\n\nGretchen helps you out of the dress that you are wearing. You\ncan feel en \nshe promise the pendant will be yours one day.\n\nGretchen stands in front of you smiling. You turn and look at yourself\nin the full mirror.\n\nMy, you look absolutely beautiful.\n\n*page_break\n\n\"Where did all of this come from?\" You say referring to the pendant.\n\nGretchen looks at you bright with bright eyes, her hands together \nin front of her. \n\n\"Oh, my pet, I know that ever since you were a child, you wanted to \nwear this on your wedding day.\"\n\n\"My what?\"\n\nJust then, you hear a familiar voice at the front of your tent.\n\n\"Is she ready yet?\"\n\n\"Yes, yes! Come in!\"\n\nYou swear that if your eyes could that would bulge out of your head\nright at this moment. Of course, that is impossible, still, you can't \nbelieve what you are seeing. For who walks through the entrance of your \ntent, but your father. \n\nRobert John FitzWalter stands tall at the front of your tent. He wears\na leather tunic, cotton shirt, brown pants and leather boots. Around his\nwaist is his favorite sword.\n\n\"Father?\" \n\nHe smiles.\n\n\"I'll give you the word when we're ready,\" says Gretchen as she hurries \nfrom the tent.\n\n*page_break\n\n\"Father, what are you doing here? How did you find me? Would you allow me \nto explain everything first?\"\n\n\"What sort of questions are these? Now come here. I want one more hug from \nmy baby girl before she becomes a woman.\"\n\nYou run to his arms and he embraces you as he never has before.\n\n\"I am so proud of you, Marian. I always have been,\" he whispers into your\near.\n\nTears start to form in your eyes. He let's go and notices them.\n\n\"What's this?\" He says as he pulls out his handkerchief. \"This is not a day\nof crying!\"\n\nHe taps at the corners of your eyes.\n\n\"We're ready!\" You can hear Gretchen call.\n\n\"Turn around.\" Your father says. He takes the veil laying on your bed (okay, \nyou're not telling me that the veil was there earlier) and uses the garland \nof wild flowers (and I [i] know [/i] those were not either!) to secure it to \nthe top of your head. \n\nHe puts out his arm and smiles. You accept it and walk through the opening.\n\n*page_break\n\nNow, you are sure that you are going to faint because this is not what you\nwere expecting.\n\nIn front of you is an narrow path that Gretchen slowly walks while she \nsings a lovely ballad. She doesn't sing seriously very often so you've \nforgotten what a beautiful voice she truly has. Wind picks up her voice\nand the song through the oaks of Sherwood Forest.\n\nOne of Robyn's men steps up and hands you a bouquet of wild flowers that \nhad been tie together with a ribbon. \n\n\"Now,\" he says with a smile.\n\n\"Walk with me,\" your father says low.\n\nAllowing him to set the pace, you walk with him down the path. Everyone is\nlooking at you. On the left are all of the Merry Men, many of whom you know \nby name. It's very rare to see them all clean and wearing the best clothing. \nThey're holding their hats to their chest, and they are smiling at you; but\nsomething is different with the way they are smiling at you.\n\nFor some reason all of those eyes on you are making you blush. You don't \nblush. Never as Marco de Luna and not even when facing Zerkit.\n\nZerkit? Why do you know that name?\n\nOn the right side of the path...Wait? Who are those people on the right? \nIs that Enis, Oliver, Stephen, and Anna? Is that your mother?  \n\n*page_break\n\nYour eyes become first slits as you strain to see clearer, then wide\nwhen you're close enough to clearly see that it is your family. Stephen is\neven waving at you.\n\nOh, and look at the front of the Merry Men! It's Lady Smyth, Robyn's mother.\nShe is beaming as she looks at you. \n\nStill, the biggest surprise is seeing Tikah, clean, her hair cut, dress as Anna, \nstanding beside your mother, and smiling! She has such a beautiful smile.\n\nWhat is going on here?\n\nTuck is at the end of this path. He is also clean, well shaven, hair comb \nback, and he is wearing a plain black robe that's a little too small. Robyn \nstands beside him. He looks so handsome. He's wearing a brocade vest that you\ngave him so many years ago. \n\nWhen you reach the end of the path, your father let's go of your arm, lifts \nthe veil, and gives you a kiss on the forehead. He stands beside your mother\non your family's side. \n\nGretchen stand beside you while Lars stands beside Robyn. She throws the rest\nof the petals that she held with her skirt over your head. \n\nTuck indicates that he wants you to step up next to Robyn as Robyn turns to\nface Tuck and takes your nearest hand. Gretchen takes your flowers. \n\n\"I am not rightly a monk, so I am not allowed to do the certain of their duties. \nYet, I'am very happy and proud that the Abbey Minister gave me permission to go \nahead and bring these two wonderful people together in matrimony because of the \ndeep friendship we have. \n\nI can tell you, and all of you here to witness this ceremony I know will agree \nagree, that no two people truly deserved to be joined together than the two before \nme. That is, [i]no[/i] one more than Robert and Marian.\"\n\n\"Wait!\" You shout interrupting Tuck. You whisper loudly to Robyn. \"We need to \ntalk!\"\n\n*page_break\n\n\"Okay,\" he calmly says as you grab his hand and runs with him trailing.\n\nA mumbling begins to spread through out the crowd. Is Marian getting cold feet?\n\nYou enter Robyn's tent.\n\n\"What's wrong, Marian? Isn't this what you want?\"\n\n\"Of course it's what I want! I just don't know if I'm going crazy or\nnot!\"\n\n\"What do you mean?\"\n\nYou begin to pace.\n\n\"First, it looks like I'm having a wedding, but I don't remember doing\nany of the preparations. My family is here, which is weird because I have \nno idea how they knew where to find us and why my father hasn't sent\na message to the the Sheriff to have you arrested. Your mother is \nhere, and Tuck just called you Robert! And we're already been through\nthis before, but in secret!\"\n\n\"Come here, come here. Calm down, my little squirrel.\"\n\n\"How do you expect me to calm down!\"\n\nHe takes you into his arms and gives you a very long enduring kiss. When\nit ends, he sits you onto his lap on the bed. \n\n\"Marian, I came to from our unexpected nap before you, and I found this,\" \nhe indicates through the opening of his tent \"Preparations for our \nwedding and everyone insisting that I didn't have to lift a finger.  There \nare even women from Nottinghamshire here preparing our wedding feast.\"\n\nYou are doubtful.\n\n\"Really?\"\n\n\"Well, at first, I hid, especially when I saw your family, until someone\ncame by and called me Robert. Then I saw my mother. I ran to her and went\ndown on my hands and knees begging her to forgive me for getting caught,\neven though I saw no constable or the Sheriff. She had no idea what I was \ntalking about.\"\n\n\"She didn't say anything about you being wanted for killing your step-father?\"\n\n\"No! It seems that Robert Dore is not an outlaw, and there is no such person \nas Robyn Hood.\"\n\n*page_break\n\n\"What? What about your Merry Men?\"\n\n\"Oh, these men have been displaced and have no home. Most of them have some sort \nof job and live here until they can get their feet back on the ground and can \nmove back to a town or the city, or return to their families.\"\n\n\"Really?\"\n\n\"It seems that everything that my men had collected over the time when I was Robyn \nHood is still available for them to use, and that's a lot of merchandise and money.\"\nHe pauses for a moment and looks around. \"They all get along quite well.\"\n\nYou look at him. \"How can this be?\"\n\n\"Well, I was just as surprised as you are now until I remembered King Jaeden \nsaying, 'If you are successful, we will reward you greatly.'\"\n\nHe smiles a big smile. You continue to look at him.\n\n\"Marian, don't you understand? We were successful! This must be our reward! \nThis, and there are two white horses attached to wagons filled with silver \nand gold.\"\n\n\"So, no more hiding in the woods, sneaking around, robbing from the rich?\"\n\n\"No more. I still want to help the poor, but I'm going to do it legally.\"\n\nYour face brightens. \"That sounds wonderful!\"\n\n\"And did you see her? We're already starting our family with the adoption\nof Tikah!\"\n\n\"Yes! I did see her standing with my family! Oh, Robyn, I'm so happy we're going\nto help that little girl and that she's now ours.\"\n\n\"I'm glad that she already speaks our language. I'll get her started with a\ngoverness as soon as we get settled.\"\n\n\"Splended!\"\n\n\"I'm also putting aside some of my land to hire men who need jobs to tend it and \ngrow vegetables and keep stock. I'm keeping the gold and silver that we stole and \nadd it to what King Jaeden gave to me, because we certainly don't need it. I'm \npaying the taxes of those who cannot instead.\"\n\n\"Oh, Robyn...\"\n\n\"You mean, Robert.\"\n\nYou take him by his shoulders and pulls him into you for a long kiss.\n\n\"Now, let's get married so that I can finally be Lady Robert Dore and get back the \nlife that we lost.\"\n\nHe looks at you sadly.\n\n\"Some of it was fun, wasn't it?\"\n\n\"Oh, Robert, you being Robyn Hood was a lot of fun.\"\n\n\n\n\nThis is the end of this paticular Robyn Hood's Unusual Tale with\nMarian as the lead. \n\nYou may return to the beginning to enjoy another one of her Tales\nby linking below, or link to one of Robyn's Tales with Marian and \nhis Merry Men, or end the Tales at this point.\n\n*goto_scene ending\n\n", "mmescape": "*label mmescape\n\n*page_break\n\n*image daffodil.png\n\nYou don't know how, but you're  alone riding through the \nforest past the town of Edwinstowe and entering Robyn's camp.\n\nYou jump off of Daisy and look around for Robyn. In the \nmidst of all of the jeering, cursing, dancing, and the \ndrinking, you see him by the fire. You rush over to him \nand throw yourself into his arms. \n\n\"Oh, Robyn! I bring some good news and some bad news.\"\n\n“Everyone, listen!” He shouts.  “Quiet for a bit, will \nyou?  Something's up with Marian.”\n\nThe men do as he ask and begin mumbling loudly to who is \never near enough to hear them.\n\nHe ask, “What is the good news?”\n\n“Well”, you say sweetly. “My baby squirrels have found \na new deep cave well hidden in the forest.”\n\n\"That's great news! We need more space for hording.\"\n\nA big cheer come from the men and the ones who have \nmugs raise them high in the air.\n\n“Yeah!”\n\n*page_break\n\nThen they pour the ale down their gullets. You simply \nlook around and smile, proud of what you are accomplishing.\n\n“See there, my men just love to horde. Now, my sweat \nMarian, what's the bad news? I can tell you've been crying.“\n \n“Well, Gretchen and I were at Court yesterday. Robyn, \nJohn has listened to the Sheriff of Nottinghamshire and \nhas agreed to put a bounty on you!”\n\nRobyn smiles and kiss you on the forehead.\n\n“Marian, darling, please don't fret. There is no way \nthe Sheriff can find this place in all of Sherwood.  \nDon't forget about our alarms. We'll hear anyone coming \nlong before they reach us. We'll swoop down, attack, \nand it'll all be over in no time.”\n\nYou're not listening to a word he says.\n\n“You don't understand.  My baby squirrels have reported \nthat there was a secret meeting at John's Palace where \nthe Sheriff revealed his plan to get enough coins donated \nto make any man interested in turning you in. That's why \nI went to Court yesterday.”\n\nThe men have quiet down now and are circling around you \nand Robyn. They are listening intently.  \n\n\n*page_break\n“I still don't see a problem.” He smiles.\n\n“Robyn,\" you continue to try to convince him, \"John \nannounced  that they've collected over three hundred \ngold coins from the Barons, and they are now sending \nthe message through out the isles with your likeness to \ncapture you dead or alive!”\n\nMumbling rises among the m e time to bring up a \ndrastic solution.\n      \n\"I've been thinking, Robyn,\" you begin softly, \"ever \nsince John announced that you are now an Enemy of \nthe Crown, maybe it's time for you to leave England.\"\n\n\"Leave England!\" All of the men say at once.\n\nRobyn looks up into your eyes.\n\n\"After all, Robert Dore is an outlaw, and now, as \nRobyn Hood, you're an Enemy of the Crown. What has \nto happen before you finally get it?\"\n\nYou pause as he looks away.\n\n*page_break\n\n\"To save yourself,\" you begin, \"and to save the men \nwho are loyal, you must leave England.\"\n\nHe begins walking back and forth with his arms on \nhis head. You, and his men, know when he is like this, \nit's best to leave him alone.\n\nHe paces back and forth for several minutes before\nhe finally stops and removes his hood.\n\n\"No,\" he decides, \"we're not going to run away. England \nis our home. Instead, we’re going to turn into bats, \nand hide in our caves.” \n\nThis is when you know that the Merry Men are truly \nloyal friends because they didn't even blink when \nhe made the decision to basically live like animals. \nInstead of complaining, they easily agree.\n\nRobyn raises his hood.  \n\n“So what exactly is your plan, Robyn?” Tuck ask.  \n“We're all with you, what's your strategy?\"\n\nHe pulls off his hood. \n\n\"I'm the one they'll be looking for, not you all,\" \nhe begins. \"So, you'll basically do what we have always \ndone, just not as frequent, not as obvious, and not \nso out in the open.\"\n\n*page_break\n\nHe pauses as if thinking. \n\n\"We have plenty in our caves to continue to share \nand to live off of, we just need to clear this camp \nand not meet under the oak any longer.\"\n\nThe men respond with the variation of, \"Okay\", \n\"Sure\", \"Yeah\", \"All right\", \"Sounds like a plan \nto me.\"\n\n\"We need to bring down camp, make sure it's clean \nand doesn't look like any one has ever lived here, \nlet alone Robyn Hood, move our supplies to the hen continues watching you.\n\n\"I can't believe he thinks he can just up and leave me \nhere,\"you continue. \"'Oh, I love you so much,' then he \nsays good bye, in a cryptic way intending to leave\nEngland all togther!\"\n\nYou quickly attack the contents of your wardrobe. \n\n\"You don't desert the one you love. What was I thinking! \nI'm so glad that I didn't send my letter to him. You \ndon't desert the one you love!\"\n\n“But...”\n\n*page_break\n\nYou turn on a snap, your pointing finger in the air.\n“No buts! I'm not staying here any longer under the so \ncalled protection of that nit wit Sheriff nor the ever \nwatchful eye of my evil cousin. We're going with the man \nI love, so start packing!”\n\n“Right away,” Gretchen says without any further \ninterruptions. She retrieves your personal items from \nyour bath and lay them on the bed. You are both use \nto going on trips away from home on horseback that \nit doesn't take you longto decide what to take and \nwhat to leave behind. \n\nHowever, someone quietly enters your room just far \nenough to see what you and Gretchen are doing. \n\nWho is it?\n\n*choice\n  #Princess Joan.\n\n    She has return from London and sees your light \n    on.\n\n    *set exaggerate %+10\n\n    *goto mm9a\n\n  #Your Mother. \n\n    She's checking on how you're doing.\n\n    *set brave %+10\n\n    *goto mm9b\n\n  #Aunt Rose.\n\n    She watches you going up the stairs.\n   \n    *set cautious %+10\n\n    *goto mm9c\n\n*label mm9a\n\nThe Princess  watches you for a minute before she says \nanything. \n\n“And what is this all about.” \n\nShe moves her hand across the room to indicate your \nthings spread on the bed, chair, and dresser. \n\nYou and Gretchen jump. Gretches places her hand to her \nheart and breath deeply, her eyes wide, glad to see \nthat it was only Joan.\n\n“Joan! You know better than to just enter my room \nunannounced! You nearly frighted poor Gretchen into \nthe vapors!” \n\nYou rush over to Gretchen to attend to ands.\n\n\"All right. I'm not going to cry. Your father will \nbe suspicious.  I'll leave you two to your packing.\"\n\nShe walks towards the door, opens it, turns and \nblows you a kiss.\n\n\"I'll see you in the morning.\"\n\n\n*goto mm9d\n\n*label mm9c\n\nYour aunt Rose watches you for a minute before she \nsays anything. \n\n“And what is this all about!” \n\nShe moves her hand across the room to indicate \nyour things spread on the bed, chair, and dresser. \n\nYou and Gretchen jump. Gretchen places her hand to \nher heart and breath deeply, her eyes wide, glad to \nsee that it was only Rose.\n\n“Rose! You know better than to just enter my room \nunannounced! You nearly frighted poor Gretchen \ninto the vapors!” \n\nYou rush over to Gretchen to attend to her.\n\n“I'm sorry, my dear niece, but your door was ajar \nand I heard strange noises. I see now it was only \nyou two packing.”\n\n“Yes, we are packing. That's all. Nothing sinister \nabout that.” \n\nYou laugh a little as you pull Gretchen closer to \nyou by her shoulder.\n\nRose walks further into your room, her face \nslightly skew. \n\n*page_break\n\n“You're going somewhere?” She looks at you strangely. \n“You've just returned from Nottinghamshire, and you're \nleaving already?”\n\nYou glance around the room, trying to come up with \na response that would not be suspicious.  You catch \na glimpse of a gold broach in the shape of a clover \non your dresser.  \n\n“It's my friend, uh, Ivy. I've heard from her just \nthis morning.  She is very ill, and Gretchen and I are \ngoing to see her. We'll be gone for quite some time.”\n\n*achieve clover \n\nYou smile a little too wide.\n\nGretchen nods her head. “That's right. We're visiting \nIvy, her closest friend.” \n\nShe smiles a little too wide.\n\nRose returns your smile. “Oh, I see.” She pauses.  \n“You'll be back before the weather changes, I assume?”\n\n“Oh, of course we will. It's a short trip.”\n\n“Very well then. Don't forget to say good bye before \nyou leave.”\n\nYou assure her that you you won't, and she exits.\n\n*goto mm9d\n\n*label mm9d\n\n*page_break\n\nIn the late afternoon, Gretchen fetches your \nbelongings, and with her own, she goes to the \nstables to prepare for your departure. Jeffree, \nyour young serf, helps her pack the two horses.  \n\nYou are having supper, as normally as possible, with \nRose and your mother. Rose stares at you, mouth open \nready for the next morsel of food on her fork, as \nyou stuff your mouth with everything on your dish.\n\n“My!” Rose exclaims.  “You shouldn't eat  that way, \nMarian. You can choke to death.”\n\nYou smile while you chew, drink some water, then \nchew some more. \n\n“Oh, leave her alone,” your mother scolds.  “She's \nfine.”\n\nRose ignores her.\n\n\"Who's the eldest sister here?\" She questions as \nshe raises one eye brow.\n\nFinally you say, “I want to get on the road as \nsoon as posible. The vagabonds and outlaws abond \nafter you leave the safety of the town, you know?”\n\n“Of course I know!” Rose makes a disgusting face.\n\n*page_break\n \n“Especially that Robyn Hood and his gang.  I heard \na woman isn't safe without several escorts even \nduring the day.” She leans forward, a look of concern  \ncrosses her face.  “You do have an escort, right \ndear?”\n\n“Aunt, do you think John would allow me to go on \na trip without an escort? Besides, we're not going \nfar tonight. We'll begin the bulk of our journey in \nthe morning.” \n\n“That's right, Rose. Now leave her alone. You act \nas if she's still a child,” your mother chides.\n\nRose frowns at your mother, then she leans back to \ncontinue nibbling on the grapes still on her plate. \n\nYou take a napkin, tap at your mouth, and push yourself \nup from the table. \n\n“Well, we're off. I'll write to you as soon as I reach \nour destination.” \n\n“And where is that, exactly?” \n\nYou stop, turn slowly, and face Aunt Rose.\n\n“You haven't told me,” she continues.\n\nYou look directly at her and continue doing what you've \nalready been doing; you lie, but you have to be quick.\n \nWhere is the largest city where anyone can easily become \nlost to the point that no one could find them if anyone \nis looking?\n\n“London. She lives in London. We're going to London.” \nYou smile and watch Rose closely.\n\n“Again? It hasn't been long since you were last there.”\n\nOkay, so you were in too much of a hurry to come up with \nanother city.\n\nYou don't have a response. You just smile and nod your \nhead.\n\n“All right. Good bye and have a nice trip.”\n \nYou don't respond. You walk over to your mother, bend \ndown and kiss her on the cheek. She grabs your hand and \nsqueezes it. \n\n“Good bye, my dear. Know that we all love you with all \nof our hearts.”\n\n“I'm thankful for that, mother. Good bye.”\n\n“What was that about? It's not as if you can't see her \non your next outing to London.”\n\n“Of course, Rose, you're right. I'm just always sad to \nbe away from my children. You would understand if you \nhad any.”\n\nYou rush out through the back dining room door,  to the \nback porch, on your way to the stables.\n\n\n*goto mm9e\n\n\n*finish\n\n*label mm9e\n\n*page_break\n\n*image daffodil.png\n\nYou and Gretchen, wearing the plain riding clothes that \nyou always wear to enter the forest, additionally wrap \nin dark capes with hoods, ride quickly towards the center \nof Nottinghamshire. You knew that there are extra guards \non the roads, and you need to buy something very special \nbefore you go to Robyn's hideout.\n\nYou pull the hood further down your forehead as you look \naround. The streets are empty now because of the Sheriff's \ncurfew, but you can hear the footsteps \nof the patrolman in the distance.\n\n“Stay over here in the shadows,” you order Gretchen as \nyou dismount.\n\nYou jot into a hidden side street that only the most \nunforgiven knows about.\n\nWho told you?\n\n*fake_choice\n  #Tuck.\n     He knows more than he appears to know.\n  \n  #Lars.\n     No one knows how close you two have become.\n\n  #Gretchen.\n     She never ceases to amaze you.\n     \nYou count doors and wiggle the doorknob of the one you \nare looking for; the wood makes a scratchy sound as it \ncracks open.\n\nYou step in to find, standing in the middle of her low \nlit dirty little shop of odd menagerie, the Hag of 49th Alley,  \nsmiling at you with crook teeth. She has been expecting you.  \n\nYou can smell the dust, mold, grass, and dead mix with \nalive who-knows-what that has been existing in her hovel \nfor who-knows-how-long.\n\nYou are told that she will be the only one in the area who \nwill have exactly what you are looking for: Something that \nwill not kill anyone, but will put them, instead, into a \nquick, deep sleep.\n\nAt first, the Hag is suspicious.  She makes herself almost \ninto a ball, her hunch back rising, as she looks you up \nand down. She squints her eyes and takes a long drag of\nthe air to distinguish you from everything that her nose is \nfamiliar with.\n\nFinally, she asks, “Aren't you Prince John's cousin?” \n\nYou say nothing as are the instructions.\n\n*page_break\n\n“Nah, nah, you go away. King Richard is dead, dead I tell \nyou, and I don't want any trouble from John before or after \nhis coronation as the new King.”\n\nYour eyes go wide when hearing of your dear sweet cousin who \nleft again to fight for Christianity, this time in France.\n\n“Ah, you didn't know!” She laughs a hag's cackle of a \nlaugh.  “Well, soon you all will know.”\n\nShe turns her back on you.\n\n“It's okay. John will get what's coming to him, don't you \nworry.\" She takes a couple of steps away from you. “Now \nbe gone. I don't need the likes of you around.”\n\nYou lay a small pouch of gold on the dingy old wooden \ntable with one short leg.  The Hag faces you.  You look \nup and stare her directly in her one good eye.\n\n“Okay, okay. You can stay.”\n\nShe hobbles closer to grab the pouch and weighs it in \nher hands.  \n\n“I already know n      \n\n  #Robyn Is Surprise That You Didn’t Understand The Message Of The Candy.\n     \n    Why would you think that meant something special?\n    \n  \n“It hurts me so much to say this.”  He breaths deeply in \nand out and look deeper into your eyes.  “Marian, I can't \nhave you come with me.  I don't know what's going to happen \nto me. I can't give you the life you're usedto, the life you \ndeserve. I'm sorry, but this is goodbye.”\n\nWell, you're not smiling now.\n\nYou push Robyn as hard as you can directly in his chest.\n\n“Oh, no you don't, Robert!”\n\nOh, no, you're calling him by his Christian name.\n\n“I've waited six years for you!”\n\n*page_break\n\nAnd now you're going to put a lot of words together really, \nreally, really fast, aren't you?\n\nWell, I'm not going to indulge you right now by repeating \nwhat you say word for word. \n\nI will say that, basically, you tell him that you're never \ngoing to be separate from him again.\n\nRobyn's quiet. The Merry Men are quiet. Gretchen is quiet, \nbut you're seething.\n\n“AAAAARRRRGGGG!!!!”\n\nAnd, there you go, stomping off into the darkness.\n\n*page_break\n\nYou sit cross legs under one of the smaller oaks that is \nlit with hanging rush lamps and put your face in your hands. \nYou're not going to cry again, he simply frustrates you.\n\nYou hear Robyn talking to Lars and Gretchen, but right then \nyou didn't care what he has to say. You're not giving in on \nthis. You’re not going to be apart from him ever again if it \nkills him!\n\nSoon Robyn walks over and sits beside you.\n\nYou do not say a word or shift your position, and he slowly \nand easily, moves closer.\n\nYou continue to stay still, so he eases his arm around your \nshoulder.\n\nYou don’t resist, so he pulls you in toward his shoulder.  You \nrelax into it.\n\n“Listen, my little squirrel,” he begins, “I have always wanted \nonly the best for you.  You are used to London and Rome, and \nshops in Paris, and sitting beside Barons and other s he hands you a \nsingle white rose. You didn't notice it when it came in.\n\n*achieve rose2\n\nYou look at Lars. “Begin what? What is this rose for? Not that \nI don't appreciate it and all, but Gretchen's being all secretive, \nsays it's a surprise.”\n\n“It is,” is all Lars says on the subject. Then he takes your hand \nand looks at it.\n\n“I want you to know that I thought I would never be able to do \nthis, and it's an honor to do it for you.”  \n\nHe kisses you on the forehead, loops your arm into his, and waits \nfor Gretchen's signal.\n\nSoon you hear her singing. You look at Lars.\n\n*page_break\n\n“Not yet,” he says, looking straight ahead.\n\nHe waits a few more moments, then says, “Now,” and escorts you \nthrough the opening of the tent.\n\n\nAll of the lamps in the camp are hanging from and sitting around \nthe major oak. Will, and Little John stand in line behind Robyn, \nand Tuck is facing him. The rest of the Merry Men stand on the \nleft side, Robyn's side. \n\nGretchen is still singing, walking up to where the men are waiting. \nShe clears her throat and everyone turns. She's throwing loose dry \nrose petals, that she holds with the tail of her skirt, onto the \nground.\n\nGretchen stands across from Robyn and the men. When you are near, \nshe covers you with the rest of the petals. \n\n*achieve rose1\n\nLars raises your veil to reveal your face, steps back into the \nfirst line, and Gretchen stands on your side opposite Lars.\n\n\"I don't ordinary bring two people together in matrimony,\" Tuck \nbegins, \"but I believe that God will allow this, making it true \nand holding it fast because no two people belong together more, \nnor love each other more, than Robyn and Marian.\"\n\n*page_break\n\n\"Here, here,\" say the witnesses.\n\nTuck indicates that you say the vows first.\n\nYou look at him, your mouth agape, your eyes wide. This can't \nbewhat you think it is, can it, really? \n\nYou look at the man you've come to know as Robyn Hood whose \noceangreen eyes look at you lovingly with hope.\n\nYou know the words. \n\n\"I take you, Robert Dore, as my true husband above all else \ntill death does part us.\"\n\n\"And I take you, Marian FitzWalter,\" came the words from the \none you now call Robyn Hood,  \"as my true wife above all else \ntill death does part us.\"\n\nTuck smiles and says to Robyn, “You may kiss your wife.”\n\nHe takes you in his arms and gives you a long, deep kiss that\ncame from somewhere you did not know existed. \n\nYou swoon never wanting that moment in time to end; but it must.\n\nThe honeymoon has to be put off for another time because you \nmust get on the road, and you're doing so as Lady Robert Dore.  \n\n*finish\n\n*goto_scene mmescape4\n\n\n", "mmescape4": "*label mmescape4\n\n*page_break\n\n*image daffodilrobin.png\n\nWhen Robyn's men are ready to leave the major oak hide out, the\ncart is in the lead with you and Gretchen riding on one side,\nLars and Will on the other. \n\nRobyn, and the rest of the Merry Men are behind, some riding in \nthe woods, watching the road, at a slow pace as not to bring any \nunnecessary attention to the group. \n\nYou're able to take some of the side roads, but you couldn't\ncompletely miss a guard check point. \n\nRobyn and the majority of the men quietly hide. It wouldn't\nlook odd for two women riders to be with two escorts.\n\nYou and Gretchen ride directly up to the guard who is in front \nfiguring he is the Captain of this small troop. \n\n\"Good evening. I take it that you are the Captain?\"\n\n\"Yes. Captain Jeremy Cosin, at your service. And I recognize \nyou. Are you not Maid Marian FitzWalter?\"\n\n\"Why yes, I am. Thank you for knowing me.\"\n\n\"Maid Marian, I must ask, why are you out on this road at this \ntime\nof night? It's not proper.\"\n\n*page_break\n\n\"It may not be, but I am with an escort (you indicate Lars and \nWill who keep their heads down). We're delivering some much\nneeded supplies that includes medication to Budby,\" you say, but \nnot very loud.\n\n\"I'm sorry, I didn't hear you.\"\n\nGretchen dismounts and walks to the first guard flanking the \nCaptain on the other side.\n\nYou indicate for the Captain to come closer as you reach into \nyour outer pocket. \n\nHe leans over his horse a bit as you come closer on your own. The\nguard Gretchen approaches does the same. \n\nIt may look to the others that you are only speaking privately to \nthe Captain while Gretchen speaks to the flanking guard, but a\nmuch more sinister act is at play.\n\nThe Captain shouts orders and the guards step aside allowing the\ncart access to the road. Lars and Will, move slowly past the guards.      \n\nQuickly, Marian and Gretchen move from one guard to the next.\n\nBy the time you lead your horse to the opening of the road, \nthe Captain has fallen off of his horse! His horse cries out \nin confusion, and the other guards shout. \n\nThen the next guard falls off of his horse, then another, \nand another, until they are all on the ground. \n\nThe horses whinny and shake their heads, some raise both \nforelegs off of the ground, others stomp, as the guards fall \nasleep. \n\nGretchen and Marian hit the horses rears to send them running.\n   \n\"Come on!\" You yell to the others as you begin collecting the \nguards weapons and checking their pockets for their pay.\n\n*achieve blade5\n\nThe Merry Men dismount and help you and Gretchen remove \nanything of value, and add it to their person or  under \neverything else in the cart.\n\n\"What did you do?\" Robyn ask you and Gretchen.\n\nYou respond with only a smile.\n\n\"Let's go!\" You say in a rush as you find your horse to \nmounther.\n\nThis is how you take care each set of guards that you meet\nas the team makes their way west.\n\n*goto mm10a\n\n*label mm10a\n\n*page_break\n\nWell, you've made it to the Irish Sea, but Robyn is lost.\n  \nOf course, there is plenty of money to replenish your supplies, \nwhile you give your horses a good rest, so Merry Men set up camp \nin the forest. In the meantime, while you stay hidden and take \ninventory, the men check out the nearby port.\n\nHow do you spend your extra time:\n*choice\n  #Alone With Robyn.\n\n    The two of you still need that honeymoon.\n\n    *set romantic %+10\n\n    *goto  mm10b\n\n  #Being With Gretchen.\n\n    Who else is going to remind you that you are a lady?\n\n    *set cautious %+10\n\n    *goto mm10c\n\n  #Writing A Letter To Your Father.\n\n   You've been feeling guilty for leaving without any sort \n   of explanation or saying good bye to your father.  \n\n   *set leadership %+10\n\n   *goto mm10d\n\n*label mm10b\n\nWhile Gretchen receives some help from Tuck and Little John \non sorting and completing the  inventory so that  men know \nwhat  to buy in town, you and Robyn go for a stroll in the \nforest.  \n\nRobyn has gotten very good on memorizing rock formations, \ntrees and bushes, since he's been living in a forest as The \nHood, so you don't think anything about how far the walk has \ntaken you.\n\nFor the most part, you and Robyn have walk silently, \nhand-in-hand, enjoying the surroundings and being with one \nanother.  You enjoy listening to the birds chirping above, \nthe scurrying sound of the ground animals, the rustling of \nthe trees as the wing blows through them.  \n\nWinter is coming bringing the rains with it and you think \nhow you want to be somewhere, anywhere, then here by then.\n\nYou find a bench someone made out of wood infuse into a \ntree, and you sit down to rest.  Robyn lovingly puts his \narm around you.\n\n“Are you cold? Maybe we should have worn our cloaks or cape.”\n\n“No, I'm fine, but you can hold me closer just the same.”\n\n*page_break\n\nHe pulls you in.\n\n“Are you worried Robyn?”\n\n“What do you mean?”\n\n“I know that this was not your first choice, to leave the \nplace you love, your home.” You pause. “Leaving your mother.”\n\n“I was able to get the word to her, just as you did your \nmother, and that's good enough.”\n\n“But they won't ever see their grandchildren.”\n\n“Not everyone gets to see their grandchildren, Marian. Things \nhappen. Life happens.”\n\nHe pauses, then kisses you on the forehead.\n\n“Besides, we don't know that. Anything is possible.”\n\n“I guess you're right.”\n\n“As long as I know where you are, as long as you're with me, \nI'm not worried about the future.”\n\nYou put your head down on his shoulder.\n\n“Neither am I.”\n\n*finish\n\n*goto_scene mmescape5 \n\n\n\n*label mm10c\n\nYou're sitting in Gretchen's tent while Robyn does some \nhunting. You wanted to go with him, but Gretchen insist \nyou stay with her and do some darning.\n\n“Gretchen, I just don't understand the purpose of this. \nCan't we just throw the clothes away and buy some new ones?”\n\n“My dear, sweet pet. Obviously you didn't realize that your \nmother did not waste money on simply replacing everything \nthat became a little worn.  That's what you need to know as \nhead of the household. When and how to save your husband's \nhard earn money.”\n\n“But my husband's hard earn money isn't that hard earned,” \nyou respond with your nose in the air, smiling teasingly.\n\nGretchen frowns and shakes her head.\n\n“Maybe it's time for your husband to find a new way to earn \nhis money.”\n\nYou sigh.\n\n“That would be nice, wouldn't it?”  You look directly at her. \n“I mean, after all, I love the adventures now, but I also want \nchildren, and we can't have children on the run.”\n\nYou pause as you look at your handiwork and sigh. \n\n\"And we will always be on the run if he lives as a thief.\"\n\n*page_break\n\nGretchen smiles. “You won't be on the run forever. I just \nknow it.”\n\nYou smile back and continue darning a jacket that's come a \nlittle loose around the shoulders.\n\n\"Robyn loves you,\" Gretchen continues, \"and he wants the \nbest for you.With a new lease on life, he can start all over.\"\n\n\"I know, and you're right, so let's keep those lessons on how \nto save money coming.\"\n\n*finish\n\n*goto_scene mmescape5\n\n*label mm10d\n\n\"Dearest Father,\n     \nI know by now mother has spoken to you about what is happening\nto me, that she has shared only what I have asked her to tell\nyou and my beloved family, but I must get this message to you \nto let you know that I am leaving England.\n\nI wish I could have said goodbye in person, but everything \nhappened so fast. Just know that I've made this choice without \nbeing under constraint and that Gretchen is with me. Unfortunately, for\nthe other people involved, I cannot say more than this.\n\nI love you father. Thank you for being the best papa a young\ngirl could ever have. We don't get to choose our parents, but\nif we could, there would be no doubt that I would choose you.\nBecause of you, I am who I am today.\n\nGood bye. Perhaps we shall meet again some day.\"\n\nYour Loving Daughter,\nMarian\nApril 8, 1199\n\n*finish\n\n*goto_scene mmescape5\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "mmescape5": "*label mmescape5\n\n*page_break\n\n*image daffodilrobin.png\n\nIt isn't long before Robyn gets the word that the man that \nfits his old friend Much's description is willing to meet\nwith the two of you soon after dusk in the back of the Rusty \nNail.\n\nExiting the forest under close watch of Little John and William, \nyou and Robyn enter the town of Southport.\n\nYou're surprise at how quiet it is for a port that size, until \nyou enter the Rusty Nail. The deafening sound of the singing \nand jeering practically slaps you in the face. \n\nA large Moor moves towards you, knocking anyone out of his way \nwith his wide shoulders. William and Little John move to flank \nyou and Robyn.\n\n\"Dore?\" He ask low and intense.\n\n\"Yes,\" Robyn responds.\n\nHe nods at you, Little John and William, then leads the four \nof you to a back room. He let's you and Robyn in, than bars the \ndoor. William growls, his hand on his waist where his weapon is \nhidden.\n\nRobyn waves at his men. \"It's all right. Just stay by the door.\"\n\n*page_break\n\nYou smile as the Moor closes the door with you and Robyn on the \ninside.\n\nFor the next half hour, Much and Robyn tease and argue over \ninsinificant topics without getting anything important accomplish, \nlet alone arrive to the point of why you are there. \n\nYou have been sitting in a chair in shock to find out that \nthe Hag is right about her information concerning King Richard.\n\n\"More the reason for me to get out of England, Much! John's \nnot one of my biggest fans as Prince, I can just imagine what \nhe'll do to me if he catches me as King!\"\n\n\"Ya still on dat! Ya dun't really s'pect me ta b'lieve ya'r \nRobyn 'ood?\"\n\n\"Well, you're running around the isles as Captain Black \nMike!\"\n\n\"Least me pick me own name!\"\n\n\"So did I!\"\n\nYou surprise them by suddenly standing up and slapping \nyour hand on the end of the table.\n\n\"That's enough!\"\n\n*page_break \n\nYou look at both men intensely to show your anger.\n\nGeezz, how grown men can act like little boys sometimes.\n\nYou pull a small pouch out from a hidden pocket in the \ninside of your  cape and open it over the table so that \nsome gold coins fall out.\n\n*page_break\n\nMuch stares for a moment then reaches for the coins,\nbut you are too fast and you hit his hand as if he is \na  child.\n\n\"Half,\" you say. \"You get fifty coins now, and the rest \nwhen we are safely out of England. That is, if you agree.\"\n\nMuch stands up and whistles.  His man opens the door.\n\n\"Ya and Dore's men can come in. We need wit'esses.\"\n\nLittle John and William enter the room.  Much reaches \nacross the table and grabs Robyn's hand.\n\n\"In front uv dese men, me promise ta git ya, yur wife, \n'nd da uders safe'y out uv Englan', Robyn 'ood.\"\n\nMuch pumps Robyn's hand once.\n\n*page_break\n\n\"And I agree to give you fifty gold coins now, Black Mike, \nand another fifty once you've delivered us safely out of \nEngland.\"\n\nHe pumps Black Mike's hand once.\n\nEveryone else in the room nod their head as witnesses to \nthis verbal agreement.\n\n\n\n*goto mm11lady\n\n*finish\n\n*label mm11lady\n\n*page_break\n\n\n*image ladyanne.png left\n\nWhen Black Mike is ready to set sail, you and Robyn discuss \nlanding on the port of Sligo, Ireland, to find your mother's \nfamily instead, and Black Mike has agreed for a crap more gold.\n\nHe steers the [i]Lady Anne [/i] west into the Irish Sea, then \nnorth. He sails without any mishaps for two days and Black Mike \ndoesn't worry that he will miss one moment of the upcoming \nDruken Sailor Festival in Southport.  He's happy and cheery, \nall without a pint, whenever he's below deck with the rest of you.\n\nThen, when you and Robyn are taking a lazy stroll around the deck, \nthe Merry Men are doing tactical exercises, and Gretchen is sitting \nenjoying the sun and sea air as she finishes some fancy tattering, \nthe wind picksup and becomes colder than usual for that time of the \nyear.  \n\nQuickly, a thick, strange fog surrounds the ship making it extremely \ndifficult for the  man in the crow's nest to see anything beyond what \nwas directly below him.\n \nBlack Mike suggest that you all stay below deck, and even though\nyou are comfortable, you know it shouldn't take so long to reach\nSligo. \n\nRobyn makes a decision. “I'll be back, dear. I'm going to go check \nin with Black Mike.”\n\nHe leaves the cabin, and you return to writing on your own epic \npoem.\n\n*page_break\n\n“The dragon roars as it exits the cave.\nIt blows it's fire and kills your knave.\nYou hold your sword and raise it level.\n'I'll have your head soon, you devil!'”\n\nYou smile. You didn't think you could write such enthralling \nfantasy.\n\nRobyn returns shortly and reclines on the bed, one hand holding \nup his head. You patiently wait for him to say something as you \nobserve his noncommittal behavior from your place at the small \ntable and chair.\n\n“Well?” You ask.\n\n“He thinks the ship is bewitched.”\n\n“What? As in witchcraft?”\n\n“Yep.”\n\n“Black Mike has appeared to be a very sensible man to me, but,\nwe both know there is more to this world then we can imagine. \nSo tell me why he thinks this.”\n\n“Well, this fog. He knows these waters, Marian. Heck, I've spent \nplenty of time traveling on a ship myself. He's never seen a fog \nthis thick lasting continuously this long before, and I have to \nsupport him on that one.”\n\n*page_break\n\n“I must admit it's unusual, I guess.”\n\n\"And he doesn't hear or see anything that helps him navigate the\nwaters. No birds, no bells, no lights.\"\n\n\"That is strange as well.\"\n\nRobyn sits up.  “Then, there's the ship itself.”\n\nYou wait.\n\n“She's steering herself into unknown waters.”\n\n“Oh, Robyn, come on. Are you sure he hasn't broken his promise \nand didn't sneak some liquor on board?”\n\nHe looks directly at you and does not blink. “Marian, I saw it \nwith my own eyes. I tried steering the [i] Lady Anne [/i] hard \nto the right with my own hands. I couldn't. The steering wheel \nstayed steady without anyone touching it.”\n\nYou're taken aback.\n\n“Oh,” is all you can come up with to say.\n\n“I'm going to go see how the men are doing.”\n\n*page_break\n\nIt's the next day. At least, as far as you can tell, it's \nmorningagain. You have been awake for awhile, eaten what \nlittle breakfast there is, and are now counting the time \nuntil lunch. \n\nGretchen is in the mess hall teaching Lars, Jack, and \nWilliam how to write their names.  Robyn is anxious, so \nall he is doing is pacing back and forth in the center \nof your cabin. You're not sure where anyone else is.\n\nWhat is this I hear? Wait, it's the crew above deck \nshouting and a making all sorts of a commotion! \n\nOne by one or in small groups, everyone below deck rushes \nthe stairs to see what all of the fuss is about above deck. \nYou and Robyn reach the deck first and see what Black Mike \nand the crew are staring at.\n\nThe fog is gone and t
