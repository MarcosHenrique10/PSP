uld find. \nLittle John and Lars jump out from behind bushes. Little John, as always, \nhas his staff, and Lars banishes a long blade.\n\n\"Get down off the horse or I'll knock you off!\" William says menacingly.\n\n\"Wha... Wha… wha… what is going on?\" The traveler asked.\n\nYou shake your head.\n\n\"I told you,\" you remind him, \"I want to get a gander of what's in \nyour pack.\"\n\nThe horseman awkwardly dismounts and stands at the side of his horse \nshaking.\n\nWhile Jack and Will open up the pack and start pulling out the contents, \nLars walks over to the traveler.\n\n*page_break\n\n\n\"Say, you look about my size.\" Lars walks around him looking up and \ndown. Lars stops. \"Take off your clothes,\" he suddenly commands.\n\n\"What?\" \n\n\"Hey,\" Lars calls to Robert. \"Didn't you say we can take whatever \nwe want?\"\n\nRobert smiles. \"I sure did!\"\n\nLars turns and looks at the horseman and points his blade at his chest. \n\n\"Then off with your clothes,\" he commands again, more aggressively this \ntime.\n\n\"But, but, but, but...\" \n\nWilliam helps out by placing his sword square in the man's chest. \"No buts!\" \nHe growls.\n\nPoor man. He's shaking, and now he's crying, as he pulls off each piece \nof his clothing, and hands them over to Lars.\n\nIn the meantime, Jack, Will Scarlett, and Little John are emptying the pack.\n\n\"Everything in here is prime stuff, if you ask me!\" says Jack, excitedly.\n\n\"Then I guess we'll have to take it all,\" you respond nonchalantly.\n\nIt's getting late, Robert. Give the whistle signal to let the men know it \nis time to bring this robbery to a close. \n\nWilliam and Lars, holding all of the horseman's clothing, mounts his' \nhorse. Jack joins you on Clint. Little John takes the pack, since you \nknow that the traveler will not want to trifle with him, and he and the\nothers quickly enter the forest.\n\n\"Wait! You can't leave me out here like this!\"\n\nYou grin. You had no idea how much fun or easy this would be, did you?\n\n\"Oh, but we can. Thank you for making this such a pleasant experience \nfor us.\"\n\nThe traveler stands in his under pants bawling so hard that you could\nbarely understand what his last words are.\n\n\"Who are you to treat someone this way?\"\n\n“He's Robyn Hood, that's who! “William shouts down from on top the poor \nman's horse. “The most notorious archer and swordsman in all of England.  \nYou should be happy that he's letting you off so easily!”\n \nYou salute the man and spur Clint into the forest with William and Lars \nbehind you.\n\n*page_break\n\nYou and William ride the horses hard off of the the main road,  through \nthe forest, and back to the large oak.  Hooping and hollering, they each \njump off of the horses. \n\n\"I've got me some fancy clothes!\" Lars shouts. \"'Cept I'm giving the\nvest to our leader since it's green!\"\n\n*achieve vest2\n\n\"And I've got me a horse!\" William yells.\n\n*set leadership %+10\n\n*set brave %+10\n\n*goto_scene rh2e\n\n*finish", "rhmarian": "*label rhmarian\n\n\nThe stranger looks awkward in his oversize clothes. Even his cap \nfalls low behind his ears.  You note how his stockings bubble over \nthe top of his knee-high leather boots and how his elbows hide inside \nof  the leather gloves, and you think of  the substantial trade you can \nmake for them in town.  Those are some really great  looking boots and \ngloves, after all.\n\nFinally, the stranger gets the best of Lars, dislodges his sword from \nhis hand, and trips him to the ground.  His blade comes down and touches \nLars square in the chest.\n\nThe stranger looks at William and Will. “Now, are you going to tell me \nwhat you know of Robert of Loxley, or am I going to have to skewer each \none of you through?”\n\nThen William and Will roar with laughter at the  high timbre  of the \nnewcomer's voice as he breaths heavily glaring down at Lars.\n\nYou step out from behind the Little John and the bush.\n\n“Perhaps that is a question you should be asking me instead of threatening \nmy men in such an uncivilized  manner.”\n\nThe stranger turns and faces you; dropping the sword, rushing you, arms \naround your shoulder, you accept their...\n*choice\n  #Hug.\n    You've miss this person.\n        \n    *set romantic %+10 \n    \n    *goto rh6a \n     \n  #Kiss on the cheek.\n        \n    You care about this person.\n        \n    *set romantic %+15\n   \n    *goto rh6a\n     \n     \n  #Kiss on the lips.\n    This person is your love.\n\n    *set romantic %+20\n\n    *goto rh6a\n\n*label rh6a\n    \nThe stranger moves away from you, hands on both of your shoulders.    \n    \n“Oh, Robert, it's [i]really[/i] you! I've found you!”\n    \nThe stranger floods your face with kisses, tickling you with their\nmustache and beard.\n\nYour men draw their weapons, but they're not quite sure what to do, \nnor what to think, or even what to say.\n\nJack is the first to find his tongue. “Uh, Robyn?” \n\nYou hold off the stranger with both arms long enough to pull off \nthe oversize cap.  The strangers long wavy hair falls down her back.\n\n“Men, may I introduce to you, Maid Marian FitzWalter of Blidworth, \nmy fiance.” \n\nThe men are first too stun to react. Their mouths drop open nearly \nto their chest.  \n    \nIt is William who is the first to  bow, and remove his hat. \n\n“My, lady.” He says. “Please forgive us for our rudeness.”\n\nThen the others did the same, a couple fumbling over the words, “rudeness” \nbecause it is not part of their vocabulary.   Lars is still laying on \nthe ground, but he removes his hat.\n\nMarian removes her false mustache and curtseys.\n\n*page_break\n\nYou look down at Lars, stricken on the ground.\n\n“Lars, you can get up. I promise you, Marian is definitely a woman, and \nshe is not going to hurt you now that she's found me.”\n\nMarian covers your face with  more kisses (You would tell her to stop; \nI mean, in front of the men...but you don't). \n    \nThen in a rush she says, \n\n“I knew I'd find you in the forest, Robert. It only made sense that you\nwould be here. I had first sent a letter off to your uncle and cousin, and \nthey claimed to not have heard from you.  That could only mean you were \ndelayed; but these, uh, men, acted like they didn't know you.”\n\nYou smile at her, but look warily around the area.  \n\n“Marian, we are out in the open. Please follow us to somewhere more private \nand then I'll explain everything.”\n\nMarian replaces her cap  and mustache and  mounts her horse. You replace your \nhood and mount Clint. The men mount their own horses, and together you lead \nMarian to  your hidden cave in the Creswell Crags.\n\n*achieve candle\n\nYou light several candles that are hidden behind rocks and hand one to Marian \nand the rest to your men.\n\n“Careful,” you warn her. “Step exactly where I step. There are traps.”\n\n*page_break\n\nIt doesn't take long for Marian to notice the large opening ahead. It was \nalmost as if the entire area was lit with light.\n\n“Oh, my!” She exclaims.  \n\nAs you walk closer, she can see large silver candle sticks, and the loose \ngold coins sparkling as the light hits the ground.  Then she sees large sacks, \nbarrels, chests, and wooden boxes. Some have coins, jewelry and the likes. \nOthers have nonperishable vegetables such as potatoes, carrots, and  beets. \nThere are sacks of flour, ground corn, dried fruit, and dried meat.\n\n“Robert, what is this place?”\n\nYou smile because you are so proud that she appears impressed.\n\n“It's my, well, our, larder. That is, all of this belongs to myself \nand my men.”  You pause to watch her. “You see, Marian,\" you \ncontinue, \"I must live in Sherwood Forest now.“\n\nShe stops walking and turns to face you. “What? What do you mean?”\n\n“Well, I can't return home, not now, not as long as they think I've \nmurdered my step-father. So, I live here, in Sherwood Forest, among the \nmen who cannot return to regular society for one reason or\nanother.”\n\n“I heard them call you Robyn. Why are they calling you Robyn?” \n\n“That's my new name. The men gave it to me.” You pause, spread your legs, \nputting your hands on your waist, and turn your head up and to the side.  \n“Robyn Hood. Catchy, no?\"\n\n*page_break\n\nMarian gives you a half smile. “I guess. But, where did you get all of this?” \n    \nShe waves her arm  implying the contents of the cave.\n\nThe men snicker. Marian looks at them with her brow furl.\n\nThe men watch you, waiting for you to explain that part of  \nyour, and all of the men who look up to you, new way of  life.\n\n“Uh, well, you see, Marian, we sort of, well...how can I put \nthis gently?”\n\n“We take what we want from anyone we want!” Shouts Lars and the \nmen roar with laughter.\n\n“That's right!”  Little John affirms.\n\n“And we ain't gonna say sorry, even if you beg us, 'cause don't care!” \nWill gets out between catching his breath and laughing.\n\nYou say nothing as your men continue to laugh and shout anything that \nthey think is funny about your line of business. You do cross your chest \nand roll your eyes a few times while you wait for them to get it all out \nof their system.\n\nWhat answer do you finally give her?\n\n*choice\n\n  #\"We Need To Survive Out Here Properly.\"\n\n    “You see, Marian, there are too many Barons who take advantage of the \n    poor, and let's not start on all of the new proclamations your cousin \n    keeps coming up with that is effecting everyone's property. And those \n    outlandish taxes are nothing to spit at. How else are we suppose to\n    live?”\n\n    *set leadership %+10\n    \n    *goto rh6b \n\n  #\"Although We Take, We Also Give.\"  \n\n    \"We're supporting the poor in the little hamlets in and around the \n    forest, the farmers, and the Abbey with money, food, and wine, which \n    right now we still happen to have barrels of, and...”\n\n    Marian interrupts. “Oh, I see. Basically you're saying, you take from \n    the undeserving rich to give to the retched poor.”\n\n    “Yes, exactly. We take from the rich to give to the poor.”\n\n    *set brave %+10\n\n    *goto rh6b\n\n  #\"Why Not? There's Plenty To Go Around!\"\n\n    \"It's not fair the way the rich in the area live. We're simply trying\n    to keep everything equal.\"\n    \n    *set exaggerate %+10\n\n    *goto rh6b\n\n*label rh6b\n\nMarian puts her finger to her chin and looks up as if she is thinking.  \nNow she is smiling that wonderful smile that you love so much.\n\n“Well, Robert...I mean, Robyn...I completely support this new endeavor of \nyours.”  \n\nYou exhale in relief.\n\n“In fact”, she continues as she walks back down  to you, “I want to help.”\n\n“Oh? Sure! What exactly do you want to do?”\n\n“Gretchen and I are joining your, uhm, merry band of thieves.” \n\nShe looks over at Lars, Little John, William, Will, and Jack.  They each grin \nback at her. They like being called a Merry Band of Thieves.\n\n“All right!” You agree. “You both can be another set of my secret eyes \nand ears,  informing me about the comings and goings  in Nottinghamshire, the \nPalace, and London before it gets out to everyone else.\" \n\n“We will!” She hugs you. “This is wonderful! You have no idea how I've been \nwanting to stick it to my cousin for so long, and this gives me the chance.”\n\nThe Merry Men gives Marian three cheers because she is now the Mistress of the \nBand of Thieves.\n\n\n\n*goto_scene rh7\n\n*finish\n\n", "rhmessenger": "*label rhmessenger\n\n\n\"So, you there, why are you looking for Robert Dore of Loxley?\"  \n   \nHe looks over at you frighten, shaking just a little, but at least he \nhears a little kindness in your voice, which the men are not giving him.\n\n\"I.. I...I,\" he stutters, \"have a message for him, or at least for \nanyone that knows him. I have instructions to give it only to the person \nwho has information about Robert Dore of Loxley.\"\n\nYou remove your hood and smile. \"Trust me, I can take that message.\"\n\nThe young man looks at you with relief and pulls out a note with a seal \nfrom within his coat.\n\n\"You fit her description, so I know that I can trust you with this message.\" \nHe hands the note to you, bow, and tries to run away, but he finds\nhimself suddenly in William's grip.\n\nYou stare at the seal, astonish.\n\n\"I don't believe it.\"\n\n\"What is it?\" Each man ask.\n\nYou look up. \"It's from Marian.\"\n\n*page_break\n    \n\nSince Lars is one of the eldest of your men, and therefore looks more \ntrustworthy, you send him and young Jack to follow Marian's instructions \nto fetch her and her handservant, Gretchen, at the back entrance to the \ncastle where fewer guards kept watch.\n\n\nIt is almost evening when you hear horses approaching in the distance. \nYou hide while Little John, William, Will Scarlett and Brett\ntake to the trees.\n  \nYou hear the all clear signal, and walk forward.  In the near distance you can \nsee two of your men escorting Marian and Gretchen to the major oak. \n   \nYou shout and wave.\n\n“Marian!”\n\nShe drops her reigns. “Robert, it [i]is[/i] you!” She  runs the short distance \nto you. What do you do?\n\n*choice\n  #You Take Her By The Hands And Look Fondly Into Her Eyes.\n    You care about Marian.\n    *set romantic %+10\n\n    *goto rh6e\n           \n  #You Take Her Into Your Arms And Hold Her Tight.\n    You've missed Marian very much.\n    *set romantic %+15\n    \n    *goto rh6e\n\n  #You Lean Her To The Side And Give Her A Long Kiss.\n    Marian is definitely your woman!\n    *set romantic %+20\n\n    *goto rh6e\n    *achieve wild \n    \n*label rh6e\n   \n“I knew I'd find you in the forest, Robert. It only made sense that \nyou'd be here!” \n\nShe hugs you some more than you sit her down to listen to her side \nof the story.  \n\n“At first, I sent a private messenger with a letter to your uncle and \ncousin in Wales, and they claimed they had not heard from you. I was \nworried. I had to find out what had happened to you,  but John has the \nSheriff of Nottinghamshire watching me so closely.  He's practically what \nI'm trying to bathe! That's why I made up some excuse about needing to \nget away from the city, into the forest, to cousin John's Palace.\"  \n\nYou kiss her. “You have no idea how much I have missed you.”\n\n“Robert, why did I have to meet you out here?  Why didn't you sneak into \nthe back of the Palace grounds as I had instructed in my message?” \n\n\"I wanted you to meet me at our hide out so you'd know how to come here on \nyour own whenever you wanted. We have watch points, traps, and alarms that \nwarn us of anyone approaching.\" \n\nMarian and Gretchen look around at the very organize living area of tables, chairs, \ntents, a stable of horses, a large central fireplace, and smaller fire for cooking.\n\n“Wait, I don't understand. What is this place?”   \n\n“Well, this is the main camp of our home. We also have a several caves \nwhere we keep our additional supplies and hold up when we need to. You see, \nI can't return home, not now, not as long as they think that I've murdered \nmy step-father. So, I live here, in Sherwood Forest, and these are just a \nfew of my men.\"\n\n\"Why do you they call you Robyn?” Marian and Gretchen ask simultaneously.\n\n“That's my new name. The men gave it to me.” You pause, spread your legs, \nputting your hands on your waist, and turn your head up and to the side.  \n“Robyn Hood. Catchy, no?”\n\n*page_break\n\nMarian gives you a half smile. “I guess. But, how are you acquiring \nall of this? I know that you haven't any money.\"\n\nThe men snicker. Marian looks at them with her brow furl. What could \npossibly be so funny?\n\n“Uh, well, you see, Marian, we sort of, well...how can I put this gently?”\n\n“We're thieves, Maid Marian!” Shouts Lars and the men roar with \nlaughter.\n\n“That's right!”  Little John affirms.\n\n“Enter our forest, and your stuff becomes our stuff!” Jack states.\n\n“We take what we want, and laugh while we're taking it.” William says \nwith an unapologetic tone.\n\n“And we ain't gonna say sorry, even if you beg us, 'cause we don't \ncare!” Will Scarlet gets out between catching his breath and laughing.\n\nYou cross your chest and roll your eyes a few times while you wait for \nthem to get it all out of their system.\n\n*page_break\n\n“Don't let them fool you, dear Marian. We're also supporting the poor \nin the towns and little hamlets in and around the forest, the farmers, \nand the Abbey with money, food...”\n\nMarian interrupts. “Oh, I see. Basically you're saying, you take from \nthe rich slobs to give to the retched poor.”\n\n“Yes, exactly! We take from the rich to give to the poor.”\n\nMarian puts her finger to her chin and looks up as if she is thinking.  \nNow she is smiling that wonderful smile that you love so much.\n\n“Well, Robert...I mean, Robyn...Gretchen and I will completely support \nthis new endeavor of yours.”  \n\nYou exhale in relief.\n \n“In fact”, she continues as she puts her arms around your neck, “I want \nto help. Gretchen and I are joining your, uhm, merry band of thieves.” \n\nShe looks over at Lars, Little John, William, Will Scarlett, and Jack.  \nThey each grin back at her. They like being called a merry band of thieves.\n\n“All right!” You agree. “You can be my other secret eyes and ears,  \ninforming me about the comings and goings  in Nottinghamshire, the Palace, \nand London before it gets out to everyone else.\" \n\n“We will!” She says, then she kisses you on the cheek. “This is wonderful! \nYou have no idea how I've been wanting to stick it to my cousin for so long, \nand this gives me the chance.”\n\n\"So have I,\" says Gretchen. \"You have no idea.\"\n\nThe Merry Men gives Marian three cheers because she is now the Mistress of the \nBand of Thieves.\n\n\n\n*goto_scene rh7\n\n*finish", "rhrobert": "*label rhrobert\n\n*page_break\n\n\nHello, Robert. It's very nice to meet you. I am [i]The Storyteller[/i] and I am \ngoing to tell your story and guide you along in your many adventures. \n\nAm I a female, a male, or neither?\n\n*fake_choice\n  #Female\n    Great! Allow me to help you with my feminine grace.\n  \n\n  #Male\n    Wonderful! I hope my muscles come in handy.\n    \n  #Neither\n    Splendid. May my experience in life guide you wisely.\n   \nYou will find that I'm a very loyal servant and will always think of your \nneeds over my own.\n\n       \nLet's Get Started!\n\n*goto_scene rh1\n\n", "screenshots": "*script window.animateEnabled = false;\nEven though your mother dresses you in beautiful \nexpensive linen and brocade surcoats and fine linen \nsmocks, expecting you to practice fine needle work \nand learn how to run a household properly, in reality \nyou are more like what we, today, would call a tom boy. \n\nEach day your father has pants and an over shirt \nhidden in the barn for you to change into before \nmeeting him for your lessons in using a short blade, \na spear, fencing, and shooting a bow and arrows.\n\nAfterward, you have to scrub the dirt off in a small \ntub before you can retrieve your proper clothing. So \nfar, you and your father have kept this secret from \nyour mother for four years.\n\n\nThis summer, your family have an invite to the London \nestate of Lord and Lady Jonathan Randolph Smyth. This \nis when you first meet Robert Dore, Lady Smyth's son \nfrom a previous marriage.  \n\nYou'll never forget the first time you notice him.\n \nHe is standing quietly beside his mother and step-father, \nwith his hands behind his back, rocking back and forth on \nhis heels. You look at his skinny legs and fall instantly \nin love. You are so entrance that you simply forget how to \nbehave like a young lady. \n\nWhat do you do instead?\n*script changeBackgroundColor(\"sepia\")\n\n*fake_choice\n  #Force Him To Chase You Around The Meadow.\n\n\n\n  #Challenge Him To A Shooting Match.\n\n  #You Dare Him To Climb A Tall Tree.\n*script changeBackgroundColor(\"black\")\n\n\n\n\n“Men,“ you start one morning, “we need ways to protect ourselves and to \nkeep what is ours safe from those who do not want to join our way of \nlife.“\n\nThis time, you're not getting a lot of odd looks or scratching of heads; \nthe men quietly wait for you to continue. \n\n“We need to set up look out points across the main road that leads in \nand out of the forest.” \n\nThey look at you and politely wait for you to get to the point.  \n\n“That means, men, we need to be on the watch for interlopers.”\n\nOkay, now you're getting the blank look on their faces.\n\n“Interlopers! Interlopers! People we don't want to find us!“ \n\nA look of understanding is coming across a few faces.  “Got it?” \nYou ask.\n\n“Oh!”\n\n“Yeah, I got it!”\n\n“Sure, Robyn, we get what you mean!”\n\n“We can't have just anyone coming up on us from behind and taking our \nstuff!”\n\n\"Not when we work so hard to get it!\"\n\n“We need to see them before they see us!”\n\n“Yeah!”\n\nYou exhale, happy that they finally understand. \n\nWhat is the most important to you and your men?\n\n*fake_choice\n  #Setting Up Look Out Points.\n\n  #Creating Traps And Alarms.\n\n  #Creating And Clearing Back Roads.\n\n\n\n\n*script changeBackgroundColor(\"sepia\")\n\n\nUh, oh! Now you're giving Robyn the look. You know what look \nI'm talking about.\n\n“Robyn, we're not giving up on this quest. We promised. Jaeda \nand the Globe need to be returned to their home before it's \ntoo late. And if you would stop and listen to me, I do have \na plan.”\n\nHe looks at you, then smiles.\n\n“[i]You[/i] have a plan?”\n\n“Yes, I actually have a couple of plans, and I believe \nthat they are good plans.”\n\n“Okay, but right now, let's give my plan a try.”\n\n“You have a plan?”\n\n“Of course I do!\" \n\nHe stops to look you straight in the eyes. \n\n\"You once promised to follow me no matter where I go. Is \nthat true now?” He ask you.\n\n“I will always follow you,” you say.\n\nWhich way do you follow Robyn.\n\n*fake_choice\n  #You Follow Robyn To The Dark Elves Camp.\n\n  #You Follow Robyn To The Elves Of Light Home.\n   \n\n\n  #You Do Not Follow Robyn.\n\nTomma begins to cry. Little shiny white beads falls from \nher eyes.\n\n\"Now Zerkit says that I'm now part of his collection!\" \nShe cries some more. \n\nYou realize that Tomma must have lived in the village that \nRobyn saw destroyed using the Benign Globe. You didn't know \nhow to tell her. \n\nWhat do you do?\n\n*fake_choice\n\n  #Release Her. Maybe That Wasn't Her Home.\n \n  #Release Her And Tell Her What You Know.\n\n  #Release Her, Tell Her What You Know, And Ask For Her", "startup": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n*title Who Was The Real Robin Hood?\n*author Christy Waites\n*scene_list\n  startup\n  mmmarianstory\n  mm1\n  mm2\n  mm3\n  mm4\n  mm5\n  mm6\n  mm7\n  mmelves\n  mmelves2\n  mmelves3\n  mmelves3\n  mmelves4\n  mmelves5\n  mmelves6\n  mmelves7\n  mmelves8\n  mmescape\n  mmescape2\n  mmescape3\n  mmescape4\n  mmescape5\n  mmescape6\n  mmescape7\n  mmescape8\n  mmgretchen\n  mmhag\n  mmmarian\n  mmmessenger\n  mmtawn\n  mmtikah\n  mmtomma\n  mmvarnaa\n  mmvarnaa\n  mmvarnac\n  $ rh1\n  $ rh2\n  $ rh2a\n  $ rh2b\n  $ rh2c\n  $ rh2d\n  $ rh2e\n  $ rh3\n  $ rh4\n  $ rh5\n  $ rh6\n  $ rh7\n  $ rh8\n  $ rhaway\n  $ rhaway2\n  $ rhaway3\n  $ rhaway4\n  $ rhaway5\n  $ rhbaron\n  $ rhedent\n  $ rhedent2\n  $ rhedent3\n  $ rhedent4\n  $ rhedent5\n  $ rhedent6\n  $ rhedent7\n  $ rhedent7a\n  $ rhedent7b\n  $ rhedent7c\n  $ rhedent8\n  $ rhelves\n  $ rhelves2\n  $ rhelves3\n  $ rhelves4\n  $ rhelves5\n  $ rhelves6\n  $ rhgretchen\n  $ rhgroom\n  $ rhhorseman\n  $ rhmarian\n  $ rhmessenger\n  $ rhrobert\n  variables\n \n  \n*create leadership 10\n*create brave 10\n*create cautious 10\n*create coward 10\n*create exaggerate 10\n*create romantic  17\n*create wit 10\n*create storyteller 10\n\n*achievement spices1 visible 10 Unusual Spices\n    Find Unusual Spices.\n    You've Found Unusual Spices!\n*achievement spices visible 10 Wild Spices\n    Find Wild Spices.\n    You've Found Wild Spices!\n*achievement diamonds1 visible 10 Diamonds\n    Find Diamonds.\n    You've Found Diamonds.\n*achievement diamonds visible 10 Several Diamonds\n    Find Several Diamonds.\n    You've Found Several Diamonds!\n*achievement rose2 visible 10 A Single Rose\n    Recieve A Single Rose.\n    You've Received A Single Rose.\n*achievement mushrooms visible 10 A Basket Of Mushrooms\n    Find A Basket Of Mushrooms.\n    You've Found The Basket Of Mushrooms!\n*achievement lute visible 10 Lute\n    Find A Lute.\n    You've Found A Lute!\n*achievement crossbow visible 10 Crossbow With Cranequin\n    Find A Crossbow With Cranequin.\n    You've Found A Crossbow With Cranequin!\n*achievement egg visible 10 Dragon's Egg\n    Find A Dragon's Egg\n    You've Found A Dragon's Egg!\n*achievement vest visible 10 Mael Vest\n    Find A Mael Vest.\n    You've Found A Mael Vest!\n*achievement vest2 visible 10 Green Vest\n    Find A Green Vest.\n    You've Found A Green Vest!\n*achievement dress visible 10 Dress With Pearl Collar\n    Find A Dress With Pearl Collar.\n    You've Found A Dress With Pearl Collar! \n*achievement rose3 visible 10 Single White Rose\n    Find A Single White Rose.\n    You've Found A Single White Rose!\n*achievement berries visible 10 Blue Berries\n    Find Some Blue Berries.\n    You've Found Some Blue Berries!\n*achievement shoes visible 10 Pair Of Beige Linen Shoes\n    Find A Pair Of Beige Linen Shoes.\n    You've Found A Pair Of Beige Linen Shoes.\n*achievement blade4 visible 10 Long Handle Blade\n    Find A Long Handle Blade.\n    You've Found A Long Handle Blade!\n*achievement blade3 visible 10 Long Blade\n    Find A Long Blade.\n    You've Found A Long Blade!\n*achievement ribbons visible 10 Blue Ribbons\n    Find Blue Ribbons.\n    You've Found Blue Ribbons.\n*achievement boots visible 10 Black Leather Boots\n    Find A Black Pair Of Leather Boots.\n    You've Found A Black Pair Of Leather Boots!\n*achievement basket visible 10 Basket Of Mushrooms\n    Find A Small Basket Of Mushrooms.\n    You've Found The Basket Of Mushrooms! \n*achievement wild visible 10 Wild Flowers\n    Find A Bouquet Of Wild Flowers.\n    You've Found A Bouquet Of Wild Flowers!\n*achievement brush visible 10 Shell Handle Brush\n    Find A Shell Handle Hair Brush.\n    You've Found A Shell Handle Hair Brush!\n*achievement rose1 visible 10 Rose Petals\n    Find Dry Rose Petals.\n    You've Found The Dry Rose Petals!\n*achievement milk2 visible 10 Bessie's Milk\n    Find A Glass Of Bessie's Milk.\n    You've Found A Glass Of Bessie's Milk!\n*achievement handkerchief visible 10 Handkerchief\n    Find A Monogram Hankerchief.\n    You've Found A Monogram Hankerchief!\n*achievement clover visible 10 4Leaf Clover\n    Find The 4Leaf Clover Pendant.\n    You've Found The 4Leaf Clover Pendant!\n*achievement pen visible 10 Pen And Paper\n    Find Fancy Pen And Paper.\n    You've Found The Fancy Pen And Paper!\n*achievement disguise visible 10 Diguise Kit\n    Find A Disguise Kit.\n    You've Found A Disguise Kit!\n*achievement cord visible 10 Silver Cord\n    Find Silver Cord.\n    You've Found Silver Cord!\n*achievement brooch visible 10 Pearl Brooch.\n    Find A Pearl Brooch.\n    You've Found The Pearl Brooch!\n*achievement friendship visible 10 Friendship\n    Find Some Friends.\n    You've Found Friends!\n*achievement chest visible 10 Gold Coins\n    Find A Chest Of Gold Coins!\n    You've Found The Chest Of Gold Coins!\n*achievement lock visible 10 Lock Pick\n    Find A Lock Pick.\n    You've Found A Lock Pick!\n*achievement sack visible 10 Silver Mael Sack\n    Find A Silver Mael Sack.\n    You've Found A Silver Mael Sack!\n*achievement milk visible 10 Matilda's Cow Milk\n    Find A Glass Of Matilda's Cow Milk.\n    You've Found A Glass Of Matilda's Cow Milk!\n*achievement shields visible 10 Shields\n    Find Some Shields.\n    You've Found The Shields!\n*achievement axe visible 10 Dwarf Axe\n    Find A Dwarf Axe.\n    You've Found A Dwarf Axe!\n*achievement arrows1 visible 10 Arrows\n    Find Some Razor Sharp Arrows.\n    You've Found Some Razor Sharp Arrows!\n*achievement blade2 visible 10 Silver Short Blade\n    Find A Silver Handle Short Blade.\n    You've Found The Silver Handle Short Blade!\n*achievement bag visible 10 Water Bag\n    Find A Water Bag.\n    You've Found A Water Bag!\n*achievement horses visible 10 Horses\n    Find Some Horses.\n    You've Found Some Horses!\n*achievement arming visible 10 Arming Sword\n    Find Arming Sword.\n    You've Found The Arming Sword!\n*achievement sword2 visible 10 Silver Handle Sword\n    Find The Silver Handle Sword.\n    You've Found The Silver Handle Sword!\n*achievement boots2 visible 10 Heavy Leather Boots\n    Find Heavy Leather Boots.\n    You've Found Heavy Leather boots!\n*achievement bow visible 10 Silver Handle Crossbow\n    Find A Silver Handle Crossbow.\n    You've Found A Silver Handle Crossbow!\n*achievement longbow2 visible 10 Linen Longbow\n    Find A Linen Longbow.\n    You've Found A Linen Longbow!\n*achievement arrows3 visible 10 A Dozen Arrows\n    Find A Dozen Arrows.\n    You've Found The Dozen Arrows!\n*achievement seaweed visible 10 Sea Weed Bath\n    Find Sea Weed Bath.\n    You've Found The Sea Weed Bath!\n*achievement wine visible 10 Glass Of Wine\n    Find A Glass Of Wine.\n    You've Found The Glass Of Wine!\n*achievement pouch visible 10 Leather Pouch\n    Find A Leather Pouch.\n    You've Found A Leather Pouch!\n*achievement bandages visible 10 Bandages\n    Find Some Bandages.\n    You've Found Some Bandages!\n*achievement ale visible 10 Mug Of Ale\n    Find A Mug Of Ale.\n    You've Found A Mug Of Ale!\n*achievement longbow3 visible 10 Longbow\n    Find A Longbow.\n    You've Found A Longbow!\n*achievement elegant visible 10 Elegant Paper\n    Find A Sheet Of Elegant Paper.\n    You've Found A Sheet Of Elegant Paper!\n*achievement blade5 visible 10 Silver Blade\n    Find A Silver Blade.\n    You've Found A Silver Blade!\n*achievement candle visible 10 A Candle\n    Find A Candle.\n    You've Found A Candle!\n*achievement tourniquets visible 10 Tourniquets.\n    Find Some Tourniquets.\n    You've Found Some Tourniquets!\n*achievement woolen visible 10 Woolen Tunic.\n    Find A Woolen Tunic.\n    You've Found A Woolen Tunic!\n\n*label purchase_loop\n*if not(choice_is_web or choice_is_steam) and not(choice_randomtest)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  From royal birth, to outlaw, Robyn lives the carefree life in Sherwood Forest, robbing from the undeserving rich and giving to the wretched poor. But when Prince John makes him an Enemy of the Crown and places a high bounty on his head, Robyn decides it would be best if he, and anyone who wanted to, make a quick dismissal from Sherwood.\n\n  [i]Who Was The Real Robin Hood?[/i] is a 150,000 word interactive novel by Christy Waites, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n  On a pirate ship that belonged to his good friend, the Moor, he left the shores of an English port with Marian, her hand servant, and his Merry Men. Soon an unusual fog envelops the ship and when it lifts, the ship had taken itself to the shores of an unknown land. The Isle of Varna.\n\n  At least, that is one tale.\n\n  Maybe the Elves of Light show up in Sherwood Forest requesting the help of Robyn and Marian to retrieve their powerful weapon and rescue their daughter, and magically spirit them away? Maybe Marian went to the Hag of 49th Alley for help? There wasn't much time before bounty hunters would be combing the forest looking for Robyn's camp and the Hag does have her special ways of making things happen quickly.\n\n  What happens simply depends on who you are playing, Marian or Robyn, and which choices you make.\n\n  Good luck and I hope you enjoy!\n\n  • Play as Robyn, or Marian[n/]\n  • Be highly efficient with a bow and arrow, sword, knife, or staff[n/]\n  • Be brave when you face Zerkit[n/]\n  • Charm Edent, the Dragon[n/]\n  • Find Kizzy, the Dragon, and two missing eggs[n/]\n  • Refrain from giving an autograph to the Fair Folk who know your tales[n/]\n  • Plan a quick, surprise, outdoor wedding for Marian\n\n  *if choice_prerelease and not(choice_is_ios_app)\n    [i]You can play the game as Maid Marian for free today. The path of Robin Hood will be available on ${choice_release_date}.[/i]\n\n    *choice\n      #Sign up to be notified when the game is available.\n        *subscribe {\"now\": true}\n        *restart\n      #Play the game as game as Maid Marian now for free.\n        *goto purchased\n\n  [i]You can play the the game as Maid Marian for free. Purchase the path of Robin Hood below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n\n\n*page_break\n\n*image hoodandmaid.png\n\nOnce upon a time in England, around the end of the 12th century AD, \nthe dashing and very witty young man, Robert Dore, lived with his \nparents in Loxley, near Sheffield, England. When his father died, his \nmother had remarried and they moved to London to live on his new father's \nestate. \n\nWhat is the most important event in History at this time?\n\n*fake_choice\n  #Richard's Third Crusade.\n    You know your history!\n  \n  #The Magna Carta Was Signed.\n    No, sorry, it’s a little too early for that event.\n\n  #Henry II Had Eight Legitimate Children.\n    I wonder how many illegitimate children did he have? \n\n\nAs Robert grew older, he had the eye of every maiden of marrying \nage and the envy of all of the men. However, his eye was only\nfor the Maiden FitzWater who stole his heart the moment he met \nher when they were young and foolish.\n\nIn addition, it was known through out the land that Robert was an \nexcellent archer and swordsman, although it seems that he had never \nactually completed any official tournament or sporting event.  No one \nseemed to care that the stories were not substantiated and, therefore,\nthe unauthorized stories continue to spread and become more and \nmore exaggerated. \n\nIt didn't matter. Robert had a great life and the respect of all that\nhe met.\n\nThen, tragedy struck.  When Robert was involved in the death of his \nstep-father, the law  proclaimed that it had not been an accident and \na large reward was placed on young Robert's head.  His mother, who loved \nhim over anyone else, gave him a small bag of money and told him to leave their \nhome in London and hide until she could prove that he was innocent of the \ncrime.  \n\nRobert packed what he could and left everything else behind. He  quickly rode \noff on his faithful steed, Clint, to Wales where his birth father's relatives \nstill lived. He knew that they would care for him until he could return to\nEngland; however, losing his way, he soon  found himself in Sherwood Forest, \nnear the shire of Nottingham. \n\nIt didn't take long for him to discover that there were others  hiding from \nthe law in and around the forest.  They were ruthless thieves, godless murderers, \nvagabonds of the worse kind, and men who thought nothing of good hygiene. \n\n\n*page_break\n\n\n\nAfter a large burly one, known as Little John, took Robert's money (he really \ndidn't put up much of a fuss) he decided that they weren't such bad lots \nafter all. Fearing to venture out to be captured by Palace guards or the \nSheriff of Nottinghamshire, Robert stayed in Sherwood.  \n\nBesides, Little John had taken a fancy to Clint, and being much larger \nthan Robert, was confiscating him to sale the steed for a few silver pieces.  \n\nRobert couldn't let this happened! He loved Clint, after all; he had raised \nhim from a small colt. So Robert had followed Little John as he lead Clint \ndeeper and deeper into the forest.\n\nIn the meantime, Maiden FitzWater was devistated that her love has become\nan outlaw. Still, she believed none of the stories that were being spread\nabout Robert and swore to her dedicated handservant, Gretchen of Arondale,\nthat she will be with her true love some day.\n\n\nThis is the real true story of what happened to Robert Dore.  Who would \nyou like to tell you the story:\n*check_purchase adfree\n*choice\n  *if (not(choice_purchased_adfree)) #The One Who Becomes The Famous Outlaw. [Requires Purchase]\n    *goto purchase_loop\n  *if (choice_purchased_adfree) #The One Who Becomes The Famous Outlaw.\n   \n    *goto_scene rhrobert\n\n  \n    \n\n  #The One Who Loves Him.\n   \n    *goto_scene mmmarianstory\n\n \n   \n\n", "variables": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License,
