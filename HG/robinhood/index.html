 not the only casualty, nor the worse.\n\n\nIt is Gretchen who is screaming after finding Tuck under the \nlarge,thick, horrible neck of Edent. She nearly falls to the \nground besidehim, to be near him, and holds him as best she could \nin her lap.\n\nHugh, Lars, William and Little John came quickly to the aide of \ntheir fallen friend to move the beast off and keep it from crushing \nhim completely. \n\nGretchen pulls him up into her arms. She rocks him soothingly as \ntears streak down her face. At times you couldn't clearly hear what \nshe is saying through all of the blubbering as she attempts to revive \nher love. \n\n\"No, it can't be you! We'll get you taken care of...I promise...you'll \nbe fine, just say something to me, please. Just show me that you're \nstill here with me.\"\n\nMarian finds you and puts both her arms around your shoulder. You hold her tightly as \nshe cries softly into your shoulder. \n\n*page_break\n\nTears are forming in the corners of your own eyes. You have never\nlost a Merry Man in battle before.\n\nAnd to lose Tuck is unthinkable.\n\nWilliam walks up to Gretchen and bends down. He removes Tuck from her arms \nas Lars helps lay him down. William stands Gretchen up despite her attempt \nto reach Tuck.\n\nWilliam turns her around and looks into her eyes.\n\n\"He's gone, Gretchen.\"\n\nShe looks at William as if she didn't understand him, as if she didn't believe \nhim. She turns one more time to look down to see Tuck's inert body laying by \nthe Dragon, Edent. \n\nYou know that Gretchen is ready to allow William to let her mourn with him.\n\n*finish\n\n\n*goto_scene rhedent9\n\n\n\n\n\n\n\n\n\n\n", "rhedentend": "*label rhedentend\n\n*page_break\n\n*image kardeen.png\n\nFive years have passed since the ship that set sail for Ireland\nlanded at Kardeen beach in the land of Varna. \n\nShortly thereafter, the capital city's name was changed to Tuck City.\n\nEvery anniversary in Mount Kardalean there is a big celebration \nhonoring the men and ladies who disembarked from the [i]Lady\nAnne [/i] and stayed to make it their new home. \n\nEven though the humans did not have to wait for an invite to \nvisit the Elder Dwarves in their native home,they always received\na formal invitation just the same. \n\nGovernor Lord Robert Dore, his wife, Lady Marian Dore, the \nAssistant Governor, Sir William Fletcher, and his wife, Maiden \nGretchen Fletcher, attended the celebration with their children.\nThe others who were once called the Merry Men, attended with their \nfamilies as well. \n\n\nThe head of every household of Elder Dwarves who chose to remain\nin Kardeen took time off from their farms, shops, or  the Mount \nKardalean Trading Post to gather their families and servants together \nand take the two day journey to participate in the activities\nand enjoy the food.\n\nThe festivities is also meant to recognize the heroism of Jack Marsh \nand Tuck. A large garden of fresh flowers are planted on Tuck's grave \nnext to his statue, and there is a parade for Jack sitting by his \nyoung wife and children. \n\n*page_break\n\nGovernor Robert Dore and Marian Dore lived in the capital city and\nhad five children; three boys and two girls. Since they did not mate\nwith an Elder Dwarf, as the other Merry Men, all of their children\nwere the average height of humans. \n\nAll three of the boys were raised with the intention to continue the\nfamily name as Governor of the State in order from the eldest to the \nyoungest once their father dies, or becomes too feeble to carry on the \nposition. However, the middle son, Henry, became a King's Guard, \ninstead, and moved permanently to Mount Kardalean. Robert couldn't \nkeep that from him.\n\nTheir eldest daughter, Emma, fell in love with an Elf of Light, and\nboth set of parents gave their blessing to the union and she moved\nto Varna to raise her children as royalty. \n\nAll of original humans and their horses that were brought to Kardeen\nlived long, healthy lives.\n\n*page_break\n\nOh, and Robyn Hood? \n\nThe stories about him and his Merry Men became exaggerated as \nlong as there was someone around to tell the tale. \n\nThe first clear reference to [i]'rhymes of Robin Hood'[/i] is from the \nalliterative poem Piers Plowman, thought to have been composed in \nthe 1370s, but the earliest surviving copies of the narrative ballads \nthat tell his story date to the second half of 15th century, or \nthe first decade of the 16th century. \n\nThe story of Robin Hood, the Merry Men, and Maid Marian has been a \nMay Day play, stage plays, novels, games, and films. \n\nPlease believe me, this is the true tale.\n\nOr is it?\n\nWhy not read Marian's Tale or another Robyn Hood Tale and make up\nyour own mind?\n\n*choice\n  #The Tale of Edent the Dragon, Part 1.\n\n    You don't know much about Dragons. What will you do?\n\n    *goto_scene rhedent\n\n    *set brave %+20\n\n  #The Tale of The Benign Globe.\n\n    You have found during your life as a hero that \n    coming to the aide of strangers can often\n    be very rewarding.\n\n    *goto_scene rhelves\n\n    *set leadership %+10\n\n  #Marian's Tales.\n\n    Marian is a strong, brave, smart woman who has \n    taken lead over a few of these Unusual Adventures\n    herself.\n    \n    *goto_scene mmmarianstory\n\n    *set brave %+10\n\n  *End Of The Unusual Tales\n    End right now, come back later.\n\n    *finish\n\n\n\n\n", "rhelves": "*label rhelves\n\n*page_break\n\n“Robyn, seriously, look at me.” She puts her hands on the sides of \nyour head and turns it towards her. \n\nShe pauses and waits until she is sure that she has your complete\nattention.\n\n“Gretchen and I were on our way here with important news, very\nimportant [i]bad news[/i], when suddenly, something appeared in front of \nus, like people, as if by magic.”\n\nMagic? What did I tell you! Witchcraft!\n\n“If they were able to get past your alarms and your men,” she continues,  \n“I knew they must be extraordinarily special and you must listen to what \never it is they have to say.”\n\nJust then six figures on horseback  are being lead towards the campfire \nby Gretchen, Marian horse trailing behind. \n\nThey are ageless; tall, thin, with golden hair and pointy ears. One is a \nfemale and the others are males.  Their horses are white, and an aura of \nsilvery-white light surrounds them. \n \nThey remind you of such being that your mother spoke of  when you were a \nchild. \n\n*page_break \n\n“There are Brownies and Wood Elves living in our garden and they look over \nus with their magic. You must treat them well,” your mother always warn, \n“and give them no reason to fuss, or they will leave us, never to return.” \n\n\nYou thought her stories were just her remarkable imagination that she used \nto keep you in check, but now?\n\nMarian turns around. “Oh, here they are now!”\n\nThe Merry Men instantaneously unsheathe their swords, cock their arrows, \nand glare threateningly at the strangers.  William growls. \n\nWhat do you do?\n\n*choice\n  #You Raise Your Hood And Attempt To Hide Behind Marian.\n    Marian shoves you forward. You, after all, are who the visitors \n    want to see.\n\n    *set  coward %+20\n\n    *goto rh8a\n\n  #You Raise Your Hood Telling Your Men To Put Away Their Weapons.\n    You do believe they may be magical, though they may not, so\n    it's best to be polite.\n\n    *set cautious %+10\n\n    *goto rh8a\n\n  #You Raise Your Hood Signaling Your Men To Wait.\n    Magical or not, you don't want to take any chances.\n        \n    *set  leadership  %+20\n        \n    *goto rh8a\n    \n*label rh8a\n\nYou're shaking noticeably.\n\nGretchen makes a silly giggle.  “Robyn, there's no need to be \nfrightened and your men can put down their weapons. The Elves of \nLight come in peace.”\n\nYou step away from Marian, put your hands on your waist, and \nspread your legs. \n  \nYou try to sound tough as you stutter, “Wh...wh...what makes you \nthink that I’m afraid?” You
