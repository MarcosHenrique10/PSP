<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Who Was The Real Robin Hood? — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "robinhood", "title": "Who Was The Real Robin Hood?", "scenes": {"choicescript_description": "From royal birth, to outlaw, Robyn lives the carefree life in Sherwood Forest, robbing from the undeserving rich and giving to the wretched poor. But when Prince John makes him an Enemy of the Crown and places a high bounty on his head, Robyn decides it would be best if he, and anyone who wanted to, make a quick dismissal from Sherwood.\n\n[i]Who Was The Real Robin Hood?[/i] is a 150,000 word interactive novel by Christy Waites, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nOn a pirate ship that belonged to his good friend, the Moor, he left the shores of an English port with Marian, her hand servant, and his Merry Men. Soon an unusual fog envelops the ship and when it lifts, the ship had taken itself to the shores of an unknown land. The Isle of Varna.\n\nAt least, that is one tale.\n\nMaybe the Elves of Light show up in Sherwood Forest requesting the help of Robyn and Marian to retrieve their powerful weapon and rescue their daughter, and magically spirit them away? Maybe Marian went to the Hag of 49th Alley for help? There wasn't much time before bounty hunters would be combing the forest looking for Robyn's camp and the Hag does have her special ways of making things happen quickly.\n\nWhat happens simply depends on who you are playing, Marian or Robyn, and which choices you make.\n\nGood luck and I hope you enjoy!\n\n• Play as Robyn, or Marian[n/]\n• Be highly efficient with a bow and arrow, sword, knife, or staff[n/]\n• Be brave when you face Zerkit[n/]\n• Charm Edent, the Dragon[n/]\n• Find Kizzy, the Dragon, and two missing eggs[n/]\n• Refrain from giving an autograph to the Fair Folk who know your tales[n/]\n• Plan a quick, surprise, outdoor wedding for Marian", "choicescript_screenshots": "Robyn Hood has been named Enemy Of The Crown and must rush out of\nEngland with Marian and their devoted team. Now he's found himself \nin more unusual messes in other lands. It's up to you to help him\nsucceed or perish.", "choicescript_screenshots.txt": "Robyn Hood has been named Enemy Of The Crown and must rush out of\nEngland with Marian and their devoted team. Now he's found himself \nin more unusual messes in other lands. It's up to you to help him\nsucceed or perish.", "choicescript_stats": "\n*stat_chart\n  \n  text storyteller\n\n  percent leadership Auspicious Decisions\n\n  percent brave Beat Odds\n\n  percent cautious Choose Wisely\n \n  percent coward Successfully Escape\n\n  percent exaggerate Overstate Truth\n\n  percent romantic Romantic Attention\n\n  percent wit Abide Plesentry", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2019-07-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Who Was The Real Robin Hood?[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "marianstory": "*goto_scene ending\n\n\n\n\n\n*label mm7a\n\n*page_break\n\n*image tales.png left\n\nYou and Gretchen spend the previous night at the Palace \nand are now racing down the main road to Edwinstowe \nto make it to Robyn's great oak hide out and back \nbefore anyone of importance misses you. It is just \nbefore the sun is gone from the sky, and you usually\ntry not to be gone so late.\n\nAt this point, you're able to make a decision on which \nadventure you lead Robyn, his Merry Men, and Gretchen \nmy the choice you make for Marian.\n\nDo You...\n\n*choice\n  #Encourage Robyn To Leave England In Order To Escape the Bounty?\n  \n    You and Gretchen reach the end of Edwinstowe Church, \n    and was about to turn the corner when a bright light, \n    brighter than the sun, engulfs you. You try to bring \n    Daisy to a halt, but she continues racing through the \n    forest, as you block your eyes with both hands.\n\n    *set coward %+10\n    *goto_scene mmescape\n\n    \n  #Talk Robyn Into Aiding Beings From A Distant Land?\n\n    You and Gretchen reach the end of Edwinstowe Church, \n    and was about to turn the corner when a bright light, \n    brighter than the sun, engulfs you. You bring Daisy \n    to a halt, and you block your eyes trying to see \n    what's in front of you. You can sense that Gretchen \n    is still beside you, but you cannot see much else. \n\n    As the light becomes dimmer, six figures on horseback \n    emerge. They appear ageless; tall, thin, with golden \n    hair and pointed ears. An unnatural glow comes from \n    their eyes. One is a female and the others are males. \n    The female and are the tallest male and they lead the \n    other four. A silvery-while sphere hovers over their \n    heads.\n\n    Their horses are white, and an aura of silvery-white \n    light continues surrounds them. \n\n    *set cautious %+10\n\n    *goto_scene mmelves\n\n #Request Aide From The Hag?\n\n    You and Gretchen reach the end of Edwinstowe Church,\n    and was about to turn the corner when a bright light, \n    brighter than the sun, engulfs you. You bring Daisy to \n    a halt, and you block your eyes trying to see what's \n    in front of you. You can sense that Gretchen is still \n    beside you, but you cannot see much else.\n\n    \n    With out warning, you find yourself in a dark alley. \n    Only two lambs glow above doors without numbers giving \n    the row of dirty windows and walls that need painting \n    an eerie glow. \n\n    Slowly, a deep darkness takes shape in front of you. \n    You turn to face Gretchen, and she nods her head to \n    verify that she too sees what you see. You touch your s\n    aber on your belt and she touches her bow.  \n\n    The shape turns into a person, shorter than you, or it \n    has a deform back, wearing a long black cape with tatters\n    and a hood pull over its head. \n\n    An evil cackle comes before the words.\n\n    \"Don't be afraid, little Missy. It's I who you seek. \n    I've been expecting you and your handmaiden.\" The Hag \n    announces unexpectedly. \"I know why you're here, and I'm \n    willing to help, but you must give me what I want first.\"\n\n    You begin to open your mouth. She snarls at you.\n\n    \"Not here you brat!\" She looks around. \"Quietly. \n    Follow me.\"\n\n    *set brave %+10\n\n    *goto_scene mmhag\n\n   \n\n", "mm1": "\n*label mm1 \n       \n*page_break\n\n*image intro.png left\n\nEven though your mother dresses you in beautiful \nexpensive linen and brocade surcoats and fine linen \nsmocks, expecting you to practice fine needle work \nand learn how to run a household properly, in reality \nyou are more like what we, today, would call a tom boy. \n\nEach day your father has pants and an over shirt \nhidden in the barn for you to change into before \nmeeting him for your lessons in using a short blade, \na spear, fencing, and shooting a bow and arrows.\n\nAfterward, you have to scrub the dirt off in a small \ntub before you can retrieve your proper clothing. So \nfar, you and your father have kept this secret from \nyour mother for four years.\n\n\nThis summer, your family have an invite to the London \nestate of Lord and Lady Jonathan Randolph Smyth. This \nis when you first meet Robert Dore, Lady Smyth's son \nfrom a previous marriage.  \n\nYou'll never forget the first time you notice him.\n \nHe is standing quietly beside his mother and step-father, \nwith his hands behind his back, rocking back and forth on \nhis heels. You look at his skinny legs and fall instantly \nin love. You are so entrance that you simply forget how to \nbehave like a young lady. \n\nWhat do you do instead?\n\n\n*choice\n  #Force Him To Chase You Around The Meadow.\n\n    Very quietly, you tip toe up behind Robert and tap him on \n    the shoulder. \n\n    Before he realizes what is happening, you yell, “Tag, you're \n    it,” and run away from the adults and other children into the \n    empty tall green grass of the open meadow.\n\n    “What?” Robert turns his head to see you running away.\n\n    You turn your head and laugh as you run your fastest. \n\n    “You can't catch me!” You shout. \n\n    You zig-zag through the grasshoppers who jump high in the air \n    to keep you from stepping on them.\n\n    “Oh, yes I can!” You hear Robert yell behind you.\n    \n    *set wit %+10\n    *goto mm1a\n    \n    \n\n  #Challenge Him To A Shooting Match.\n\n    You walk boldly up to him from the rear and tap him on the \n    shoulder. When he turns around, his eyes are wide. You really \n    gave him an unexpected surprise.\n   \n    You note that his eyes are a shimmering ocean green as you \n    tilt your own head slightly back to look into them.\n\n    “I bet,\" you say without hesitation, “that I can shoot a can \n    with an arrow further away than you can.”\n\n    He frowns at you and looks you up and down. “Are you kidding? \n    I'm the best there ever was at shooting cans from any distance!”\n\n    “Is that right? Then prove it!\"\n\n    “I will!” He says and marches off towards the side door of his \n    family home.\n\n    You don't know what to do but watch him walk away. He turns and \n    yells back at you. \n\n    \"Are you coming, or what?\"\n\n    You follow close behind, imitating the way he's walking with his \n    legs apart and his arms swinging as if he's bigger than he really \n    is. You want to laugh but know that since you're the one who threw \n    the gauntlet out, you had to take it seriously.\n\n    Your father has taught you good manners in such situations.  \n    You are Englishmen (and English women) after all.\n   \n    *set brave %+10\n\n    *goto mm1b\n\n\n  #You Dare Him To Climb A Tall Tree.\n\n    You walk up behind him and tap him on the shoulder. When he \n    turns you are taken back by how green his eyes are as you lean \n    your head to look up into them.\n\n    \"Do I know you?\" He asks politely.\n\n    \"No, you don't. I'm Marian FitzWalter, daughter of Lord \n    and Lady Robert FitzWalter.\"\n\n    \"I'm Robert Dore,\" he says as he neatly bows before you. \"I \n    am the new heir to Jonathan Randolph Smyth estate. It's nice \n    to meet you.\"\n\n    You curtsy and say, \"It's nice to meet you, too.\" You smile. \n    You turn and point at the tall oak tree behind you. \"See that \n    tree over there? I bet you a shilling that I can climb it \n    higher than you can.\"\n\n    Robert appears a little stun by your challenge. He looks back\n    and forth between you and the tree.\n\n    \"You?\" He asks. \"I've been climbing that tree every day for years! \n    If anybody can climb higher than I, it certainly couldn't be you. \n    You are a girl.\"\n\n    You don't become angry at him for saying that. After all, \n    ever since you were able to walk, your father has been warning \n    you that men will treat you differently simply because you're \n    a girl. However, Robert's impolite comment has now made you \n    determine to beat him at climbing that tree. \n\n    You smile up at him.\n\n    \"Then it's a bet?\" You ask.\n\n    His eyes go wide for just a second before he calmly says,\n    \"It's a bet.\"\n\n    Robert puts out his hand and you accept it. You each pump \n    the other hand  once, then you push him to the ground just \n    before you turn and race to the tree, laughing the entire way.\n    \n    *set exaggerate %+10\n    *goto mm1c\n\n*label mm1a\n\nThe chase is on! Once he tags you, you chase him. When someone \ntries to  join in the game, you knock them over onto the ground! \nThis is not a game for everyone.\n\nEventually, Robert cannot run any longer. He falls down \nonto the ground and you fall down beside him. You both \nlaugh until your sides ache and you're out of breath.\n\n*page_break\n\nWhen the rising and falling of your chest finally \nstops, and after you've watch the cloudless sky for \na bit, you turn your head and face Robert. \n\n“I'm Marian.” \n\nYou put out your hand towards him.\n\nRobert smiles a big toothy grin. “I'm Robert.” \n\nHe takes your hand and kisses it gently. \n\n“I'd bow, too,” he continues between breaths,” but \nI'm just too tired.”\n\nWhich, of course, makes you laugh, which makes \nRobert laughs, then you are both laughing together \nagain.\n\n*finish\n\n*goto mm1d\n\n\n\n\n*label mm1b\n\n*page_break\n\nRobert enters a hallway not far from the side door entrance,\nand on the wall is a collection of very impressive sabers, \nknives, and bows. Robert bow towards you and and indicates \nthe wall.\n\n\"Ladies first,\" implying that you have first choice.\n\nYou don't take long to inspect the bows and find one that is \nvery similar to theone that you have at home, and you select \nyour arrows.\n\nRobert selects, then smiles confidently. \n\n\"Are you ready?\" He ask.\n\n\"I was ready yesterday.\"\n\n\"Then let's go to the shooting range at the side of the estate \nnear the barn. I do all of my practicing there.\"\n\n\"Lead the way. I'm right behind you.\"\n\n*page_break\n\nRobert retraces his steps through the hallway to the doorway. \nHe opens, steps, misses the second step, and falls over onto \nhis stomach.\n\n\"Ooooof!\"\n\n\"Oh, wow! Are you all right?\" You ask as you stare down at \nhim in disbelief.\n\n\"Owww!\" He howls as he sits up and cradles his right foot with \nboth hands. \"My ankle! I hurt my ankle!\"\n\nAt first, you just gawk while he continues yelling, but you \nremember where you last saw your father.\n\n\"I'll go get help!\" \n\nYou run as fast as you can until you find your father on the \nother side of the field. When you tell him the story, he \nfollows you quickly to where Robert is sitting in the dirt \nyelling.\n\n\"Young Master Robert!\" Your father shouts astonish. He tells \nyou to stay with him while he finds Lord Smyth and bring help.\n\nRobert suddenly begs you to hold his hand, and he stops \nyelling when you do. He looks so sad at you with his large \ngreen eyes.\n\n\"Does it still hurt much?\" You ask.\n\n*page_break\n\n\"Just a little.\" He admits. He looks down at your hand. \n\"You know, I don't know your name.\"\n\n\"Oh!\" You realize in all of the excitement you didn't have \nthe time to tell him. \"I'm Marian.\"\n\n\"I'm Robert,\" he pauses. \"I'm glad to meet you.\"\n\nYou don't say anything else until you hear the adults coming.\n\n\"Are we going to be friends, Robert?\" You ask quickly.\n\n\"I do believe we are.\"\n\nYou two smile at one another as you hear your handservant, \nGretchen, angrily shouting your name.\n\n*finish\n\n*goto mm1d\n\n\n\n*label mm1c\n\n*page_break\n\nYou continue to laugh as you scamper up the trunk of \nthe tree to the first branch. You stop and look down to \nwatch Robert continue to brush himself off.\n\n\"Come on,\" you shout, \"do we have a bet or don't we?\" \n\nHe doesn't respond; he simply continues to dust himself \noff, so you decide to try to make him angrier. \n\n\"I know why you're taking so long. You're chicken! You're \na chicken who welches on his bets!\"\n\nRobert looks up at you, his cheeks turning red. \n\n\"My father warned me about chickens who welches on \ntheir bets! He said that they are just plain no good \nand I shouldn't waste my time on them!\"\n\nYour father never told you that, but you thought it is\na nice touch. \n\nNow Robert is glaring at you, his cheeks very red. You \nmake chicken sounds to irritate him even more.\n\n\"Buk, buk, buk, buk, brrr-awk! I'm a big cowardly chicken! \nBuk, buk!\"\n\n\"I'm no chicken!\" He exclaims as he stomps his feet. He \nrushes the tree, his face getting even redder.\n\nYou laugh as you climb up to the next branch and watch as \nhe struggles to climb the trunk.\n\n*page_break\n\n\"Well you must be,\" you continue to taunt him, \"because \nchickens can't climb trees.\"\n\nRobert climbs the trunk and pulls himself up within the \ncrook of the first branch.  He stops to catch his breath \nas you climb up to the next branch. \n\nYou call down to him tauntingly. \"Robert Dore, come catch \nme or lose a nice shiny shilling!\" You climb to the next \nbranch.\n\nRobert growls with anger as he reaches for the next branch; \nbut the branch below fails him, he misses the second branch, \nand falls down onto his back.\n\nHe didn't fall far, but he did get his breath knock out of \nhim just the same.\n\n\"Oooff!\"\n\n\"Robert!\" You scream as you hurry down the tree. \n\nHe is lying still and his eyes are close when you reach \nthe ground. You wonder if he is breathing.\n\n\"Robert! Robert! Speak to me!\"\n\nYou start to shake him, but you feel odd touching him.\n\n\"Are you all right? Please be all right? Please say \nsomething!\"\n\nYou begin to look around for your father when you feel \nRobert touching your hand. He begins to cough.\n\n\"Calm down,\" he says between coughs. \"I'm all right.\"\n\nYou squeeze his hand. \"Oh, Robert! I was so frightened \nthat you were dead!\"\n\n\"Dead? Didn't I tell you that I climb that tree every day?\" \nHe asks and pauses as you nod your head. Then with a sly \nsmile he says, \"I also fall out of it almost every day.\n\nYou look at him for a moment before a great guffaw escapes \nfrom your mouth. It is so contagious that Robert can't help \nlaughing along with you between coughs.\n\n\n*page_break\n\n\"I'm going to go get you some water,\" you say. Before you \ncan stand up, Robert holds your hand tightly.\n\n\"Did you really believe that I was dead?\"\n\n\"Well, yes! You fall, you were still, your eyes were closed.\"\n\n\"And that frightened you?\"\n\n\"Well, of course it frightened me!\"\n\n\"Does that mean you like me, even a little bit?\"\n\nYou sat there on your knees looking down at Robert. Boy does \nhe have beautiful green eyes.\n\n\"Yes, I guess it does mean I like you just a little bit.\"\n\nHe smiles up at you, brings your hand to his lips, and \nkisses it so gently.\n\n\"I like you a little bit, too.\"\n\n\"Really?\" You look at him sweetly. \"Well, you owe me a \nshilling.\"\n\n*finish\n\n*goto mm2d\n\n\n\n", "mm2": "*label mm2\n\n*page_break\n\n*image daffodil.png\n\nThere came a time when Robert's step-father insist that he \nbegin competing inofficial tournaments in London and Nottinghamshire. \nYou were so envious because, since you're a woman, you cannot \ncompete.\n\nThe best you can do is cheer Robert on and you never miss an \nevent where he is competing. \n\nFunny, even though Robert participates in archery, fencing, \nand jousting, competition, you have yet to see him ever complete \nan event. \n\nWhat seems to always happen?\n\n*fake_choice\n  #He Injures Himself.\n\n    You'd think by now that Robert would be less clumsy, but \n    it never fail that he'll falls off of his horse, or shoot \n    himself with his own arrow.\n    \n       \n  #His Weapon Will Malfunction.\n\n    It is really weird to watch a very expensive specialty \n    crafted epees blade fall apart, but it did!\n    \n    \n  \n  #He's Late For A Competition.\n\n   You would not believe how often this happens and he ends \n   up not competing.\n\n\nYou're just as competent as any man, so you devise a plan to \nenter the next Midsummer Festival in London.  In fact, you \nwonder why you haven't come up with this sooner! \n\nThe previous year a traveling theater troupe in London \ntaught you the secrets of how the four of them are able to \nplay more than one character by using makeup and wigs. \n\n*achieve disguise\n\nYou are particularly eager to learn that gum arabic will \neasily stick removable hair to skin and that it can be found \nin any general store.\n\n*page_break\n\nOn the first day of the festival, you make the excuse that \nyou are too ill to join your family and are going to stay at \nhome in bed instead.\n\nRobert, being a sweet boyfriend, offers to stay with you, but \nyou have your hand servant, Gretchen, tell him politely with \nas much detail as possible, that it has to do with lady troubles. \n\nYou look out the window and see the backside of Robert and his \nhorse as he races away  from your home. Good!\n\n\"What do you want me to do next?\" Gretchen ask.\n\n\"Here, take this large basket with my yarn and needles and go \nto the back of the barn. You'll find a set of men's clothing, \na wide sash belt, and a large floppy hat that I've hidden there.\"\n\n\"Okay.\"\n\n\"Place them into the basket, making sure that the yarn and \nneedles cover the clothing and hat.\"\n\n\"All right.\"\n\n\"Take the basket into the Daisy's stall.\"\n\n\"I will, but where are your weapons?\"\n\n\"I've already hidden them in Daisy's stall under the hay.\"\n\n\"Oh.\"\n\n*page_break\n\n\"Go, quickly, Gretchen! I need to leave soon to arrive in time \nfor the events!\"\n\n\"I will! Good luck!\"\n\n*page_break\n\nYou clip some hair off of the ends of your hair and fashion a \nmodern mustache over your lips and a beard on your chin. You \nbraid your hair and clip it to your head. Then you sneak out \nof the back door as Gretchen keeps the rest of the household \nstaff busy else where.\n\nNo one sees you proceed to the stables and enter Daisy's stall. \nYou quickly change clothes,put the big floppy hat on your head, \ngrab your weapons, and rush into town. \n\nYou make it to the festival just in time to sign up as Marco de \nLuna from Spain, a man of travel who speaks broken English with \nhis native Spanish (you've learned enough Spanish from your \nGoverness who had spent years in Spain to get away with this). \n\nRemembering to keep a low timbre every time you're force to \nspeak, you pay the entry fee with money that you have been \nsecretly saving and prepare for your first competition.\n\n\nSo far so good.\n\n*choice\n  \n  #Archery.\n\n    As Marco de Luna, you step up in line in front of a target. \n    This is the first time you're actually shooting at a \n    regulation target instead of one that your father created. \n\n    It is an understatement to say that you are excited. Your \n    adrenaline is pumping so much that you feel like you're a \n    horse racing around a track.\n\n    You look down the line and you spot Robert. Uh, oh! You \n    better pull your hat down more on that side of your head.\n\n\n    The rules call for three rounds of arrows per target. At \n    least one of your arrows must hit the center of the target \n    in order to qualify to continue in the competition.\n    \n    The ones who are disqualify step away from the line as the \n    target moves to the next mark, then you shoot your three \n    rounds of arrows. It continues this way until there is only\n    one archer left.\n\n    *set leadership %+10\n\n    *goto mm2a\n\n    \n  #Fencing.\n\n    The Fencing tournament is held under a large canopy instead \n    of in the main arena. \n\n    Each competitor is place against someone of the same weight, \n    which means, of course, that Marco de Luna will be fighting \n    against the small men in the tournament.\n\n    The rules call for the competitors to fight one person at a \n    time. The judges expect to find the victor when a fencer \n    makes a (what would be consider a killing stab) jab onto a \n    pad that's over the heart of the official fencing vest that \n    each opponent must wear. \n\n    Each time you win a bout, you move up the ranking tier \n    until there are only two fencers left.\n\n    The last two opponents fight to the death.\n\n    I'm just kidding!\n\n    I had you going there for a moment, didn't I, Marian?\n\n    As you double check to make sure that your hair is in \n    place, your hat is on tight, and that you're not going \n    to lose your mustache or beard, you look around at the \n    other competitors. \n\n    Robert is there, on the far left, so you keep your head \n    tilted down and looking in the opposite direction as much \n    as possible.\n\n    Your father always tells you that you are the best student \n    he's ever had in fencing, but you've always thought of \n    fencing as only a necessity for protection, not something \n    you choose if you want to have fun. You prefer archery; and \n    if you're going strictly for the fun, you really love the \n    staff. Still, you know you can take down every man here without \n    any problems.\n    \n    *set brave %+10\n    *goto mm2b\n\n  #Staff Fighting.\n    \n    What training is necessary for fighting with a staff, anyway? \n    All you have to learn is how to knock your opponent over with \n    a long staff of wood, right? At least, that's what your two \n    older brothers like for you to think; however, your father \n    has been training you that there's a lot more to it than that. \n\n    And you enjoy it every time you get the best of even your \n    biggest brother, Enis, don't you?\n\n    So here you are, signing up, and paying the fee, because you \n    really do love fighting with the staff.\n\n    *set exaggerate %+10\n    *goto mm2c\n\n*label mm2a\n\nAt first, you're the underdog. Not because of your shooting \nskills, but because the audience believe that you are a Spaniard. \nAfter all, the citizens of England may be on the side of the \nSpaniard's in regaining control of their country from the Moors, \nbut it doesn't mean that they want one to win in their own \ntournament.\n\n*page_break\n \nThat all changes as you move forward in the tournament never \nmissing the center of the target.\n\n\"De Luna! De Luna! De Luna!\" The audience in the gallery are \nstanding behind you shouting while the targets are being move \nto the next line.\n \nYou want to jump up and down, waive your arms in the air and \nshout at the spectators. If you could, what would you say?\n\n*fake_choice\n  #\"No, It's Me, Marian FitzWalter!\"\n\n    That's right, embarrass your entire family, including the \n    King, why don't you? \n\n  #\"Ha! I Am A Woman And I'm Winning This Stupid Event!\"\n\n   Less embarrassing for your entire family, including the \n   King, but it will land you in jail until the Magistrate \n   figures out who you are.\n\n  #\"I Like To Speak On The Rights Of Women!\"\n\n   Not a good time! Not a good time!\n\nYou're nearing the end of the archery event when it's down \nto you and one other competitor. He shoots and all three of \nhis arrows misses the target. The audience gasp as one. \n\nNow all eyes are on you. You cock your first arrow and \nlook towards the target, aim, and...your hat falls down \nover your eyes!\n\nYou shoot, cock, and shoot, cock and shoot the other two \narrows hoping luck is on your side, but it is not.\n    \nWhoosh, whoosh, whoosh! Your arrows fly through the air. \nAgain, the audience gasp as one. \n  \nYou push back your hat to find that is he glaring at you? Does he know your secret?\n\nSlowly, he eventually moves close enough to call to you over \nthe noise.\n\n\"Senior de Luna! You've got some good moves,\" he states,\"but\nyou're not better than me. You're sloppy and weak.\" He points \nat the board. \"We will meet soon, and I can't wait until I put \nyou in your place.\"\n\nDon't lose your cool, Marian. It's just words. Any one can \nboast.\n\n*page_break\n\nHe laughs and then he disappears around the back of the food \ncart.\n\nThe crowd goes wild! It seems that you're next opponent has \nforfeited, and you are now about to face Sir Lance of Oxford. \n\nSpectators are calling your name.\n\n\"De Luna! De Luna! De Luna! De Luna!\"\n\nAs the match begins, Lance attacks with enthusiasm and catches \nyou just slightly off guard. You glare at him, as he looks at \nyou surprise by your sudden retaliation of a just as enthusiastic \nof a parry. \n\nYou step back to give yourself space, some room to work an \nattack, but Sir Lance doesn't give you much of a chance. He attacks, \nattacks, attacks, only allowing you to defend yourself as quickly \nas he attacks.\n\nAnd on top of that, he won't shut his mouth. He keeps verbally \nharassing you every chance he gets.\n\n\"Ha! De Luna! You call that a jab? What was that de Luna, anyway? \nIs that what they teach you in Spain?\"\n\nWell, I know you're tired of all of this, but what are you going \nto do?\n\n*page_break\n\nYou can't choose that move that your father has told over and \noverto never execute in a tournament, or can you? I mean after \nall, this Sir Lance of Oxford is not giving you much choice, is \nhe?\n\nWith much speed, you attack. You quickly move your feet as you \nare until you slip your foot underneath his, and knock them down. \nYour blade touches his chest over his heart.\n\nThe match is over.\n\nThe spectators go wild!\n\nYou bow, but when you raise your head and look at the board, \nyour pseudonym is not on the top as the winner.\n\nYou notice that the judges and the referee have their heads \ntogether in a conference. \n\nOh, no, Marian. What have you done? Are you going to be kick \nout of the tournament?\n\nMinutes go by before they finally separate, and one of the \njudges approaches the board. \n\nHe removes your name from second place and move it above Sir \nLance's name.\n\nMarco de Luna is the clear winner.\n\n*page_break\n\nYou begin to shake a little from the excitement, as the \ncrowd goes mad, calling your name, but you contain yourself \nas you bow.\n\nA judge is by your side to escort you to meet King Richard, \nreceive your ribbon and your reward of ten silver coins.\n\n\n*goto mm2d\n\n*finish\n\n*label mm2c\n\nSince staff fighting is more one-on-one than any other \nsport, you fight against an opponent of the same weight, \nwhich means Senor de Luna will be fighting against light \nweight men.\n\nEach fight takes place over a man-made pond which is more \nlike a large mud puddle. It's twelve feet long, four feet \nwide, and four feet deep. Then there is a fifteen foot \nwooden plank from one end to the other.\n   \nThe strategy in staff fighting calls for the two men to \nstand sideways, which is why there isn't very much room \nexcept for two men to stand at one time. \n\n*page_break\n\nOf course, this is the event the spectators themselves \nlove the most. They want to see the better man knock the \nlesser man into the mud.\n\nAnd don't think they're going to take pity on you if \nyou're the lesser man. Nope. The muddier you are, the \nmore they are going to laugh. \n\nThe laughter becomes greater and greater as you struggle \nout of that hole, accept the Towel of Shame to wipe your \nface, and take the long embarrassing Loser Walk to the \nwater trough where you will jump in and clean the mud \nfrom your skin and your nice tournament clothes. \n\nLastly, you’re wet, until the England sun dries you the \nnatural way. \n\nBecause of these reasons, there's never many competitors testants excuse themselves \nfrom the tournament because they didn't want to fight you, Marian!\n\nYou bow to the audience goes crazy shouting your name. They may \nbe unhappy at the lack mud, but they are also stomping their feet \nat the joy that you've won this event.\n\ngoto mm2d\n\n*finish\n\n*label mm2d\n\n*page_break\n\nAn escort takes you to the Royal Family's box to receive your reward \nfrom King Richard.\n\nRichard looks straight at you, but your hat is pull down hiding your \neyes, and with your mustache and beard, it is impossible for him to \nrecognize his own cousin.\n\n\n\"Senior Marco de Luna, I welcome you to our humble festival and am so \nplease toaward you with these blue ribbons and silver coins for your \nmany successful wins in today's tournament. Soon, I will be ready to \njoin your countrymen in returning Christianity to all of western Europe.\"\n\n*achieve ribbons\n\nYou say nothing as you bow low. You know that you should take off \nyour hat, which is the proper thing to do, but you can't! Your hair will \nsurely reveal that you are a woman. \n\nSome mumbling rise from the people who are nearby.\n\n\"He doesn't take off his hat, brother. What insolence!\" Prince John \nsays to the King. \n\nRichard laughs. \"Perhaps that is not his way. He is a Spaniard, after \nall.\"\n\nYou stand and smile, than bow one more time. \n\n\"Gracias, Rey Ridge,\" you say in your new resonance voice. \n\nThen you walk away as the audience continue to shout your name.\n\n\"De Luna! De Luna! De Luna! De Luna!\" \n\n*page_break\n\nAs soon as you're behind the stands, you rush to where Daisy is \nwaiting for you.\n\nYou tuck your ribbon and gold coins into your pocket, untie your mare,\nmount her, and ride swiftly home praying that you will beat your family.\n\n\"They can't be home yet, they just can't,\" you say to yourself over and\nover, sweat beading on your brow, as you race to your family's London\nhome.\n\nOnce home, you take a quick bath in the little tub e \nspring, you and Anna join your mother in a lengthy stay with \nher relatives in Paris. Of course, your closest confidant \nand handservant, Gretchen, travels with you as part of your \nentourage.\n\n\nIn Paris, many days are spent shopping at the best stores. \nWhenever you find just the right fabric, just the right lace, \njust the right beads for your dress, or the clothing for your \nwedding party, your mother buys it and have it ship ahead to \nEngland.\n\nNow and then, a letter  arrives from Robert, and that keeps \nyou going with a smile. You know you will see him soon and \nyou will be able to return home to begin your wonderful \nmarriage.\n\nBack home, Prince John gives permission to your father to \nredecorate the chapel of his Palace and add a new hall for \nthe reception, so that keeps them both busy.\n\nMoney is no object.\n\nEven with Robert far away, your wedding is coming together \nnicely, and you are enjoying Paris.\n\n\nIt seems much too soon that months goes by without a letter \nfrom Robert and you begin to worry that something is happening. \nYou can no longer enjoy your trip away from home.\n\n*page_break\n\n*image daffodil.png\n\n\nThe news finally arrives in Paris that King Richard is in \nEngland from the Crusades. You are ecstatic! You and your \nmother quickly make the preparations for the return trip \nhome.\n\nYour father has been in Blidworth, but left word that he \nwill be in his office in London by the time you've return \nand will be home for supper by evening. In the meantime, \nhe has sent an escort to help you, your mother, and sister \nto the family London house.\n\nHowever, when you come ashore, Robert is not there to \ngreet you. This is strange because you wrote to him, and \nyour father would have inform him as well. \n\nIn addition, you've become aware of rumors that a tragedy \nhas befallen Lord and Lady Smyth, but when you and your mother \nattempt to inquire about what, no one will speak directly to you. \nPeople simply avoid looking at you, or indirectly speak to you \nin a rush.\n\n\"Oh, Lady and Maiden FitzWalter, you've returned! Good \nday to you both!\" Would all they say before they quickly hurry \noff.\n\nNow you can't help but wonder if Robert made it home after all? \n\nCan Robert be dead? It was a war, after all, and we both know \nhow Robert isn't always the marksman he makes himself out to be. \nLet's not even mention his ability with the saber. \n\nIs that why people are acting funny, not speaking to you directly \nwhen you ask, because Robert Dore did not return from the \nCrusades with King Richard?\n\n*page_break\n\n\nYou  arrive home and go straight to your room. You're worn our\nand you need your best friend, Gretchen; but she is missing. \nWhere is she? You call out to another servant to ask.\n\n“I'm sorry, Maid Marian, but I have not seen her since directly \nafter we'd arrived in London.”\n\nWhere can Gretchen be?\n\nYou throw yourself on your bed and tears begin to fall from \nyour eyes.\n\n\"Robert must be dead. That must be it. Maybe that's what Gretchen \nis doing, looking into the Smyth tragedy and is finding out that \nmy Robert is dead!\"\n\nHot tears are coming in a rush down your cheeks and soaking an \narea of your pillow.\n\nGretchen walks in and goes straight to you, sitting on the \nedge of your bed.\n\n\n\"Oh, Gretchen!\" You cry out as you sit up.\n\nShe puts her arms around you and holds you tenderly. \n\nWhen she ends the hug and looks at you, she says...\n\n*page_break\n\n“I know what has happened, why Robert was not at the shore,” \nshe says, “but you must hear it for yourself.”\n\n“All right.” You respond as you stop crying. You take your \nhandkerchief from under your sleeve and dry your tears.\n\n*achieve handkerchief\n\n\nWho do you want to hear the story from?\n*choice\n\n  #The Magistrate Of London.\n\n    It is evening when you and Gretchen dress in light capes \n    with hoods, take to the streets of London and hasten to \n    t is didn't answer the question \nabout Robert.\n\n*page_break\n\n“Robert told me the story,\" she says, then she pauses, looking \ndeep into your eyes.\"Are you sure you want to hear it?\" \n\nYou sip and nod.\n\nMrs. Smyth enhales, then exhales.\n\n\"He and Jonathan had gone for a walk on the morning of the third\nday and they had become separated. He heard his step-father screams\nas he called for help. He was being attacked by a deer, but Rober\ncouldn't see him because of the fog. Still, he tried to save Jonathan \nby shooting blindly into the fog. When they had found Jonathan, he \nhad had several stray arrows in his body!”\n\nAgain, she breaks down and the tears flow freely. You put your \ncup down so that you can put your arms around her to comfort her.\n\n\"I'm so sorry,\" you say over and over. \"I'm so sorry.\"\n\nYou know the story isn't over, so you wait.  \n\nWhere is Robert? What has happen to Robert?\n\nLady Smyth reaches a point that she can dry her tears, drink her \ntea, and continue.\n\n“What I'm about to tell you, you cannot tell anyone.”\n\nNow you are afraid. “Of course not.”\n\nShe sits her tea onto the side table, stands up and purposefully \nmoves toward her door. She listens, then she opens it quickly. No \none is there. \n\nShe's at her window next. Even though it's a second floor room, she \nswings open the window looking for anyone who's lurking about.\n\nShe returns to sit beside you, and when she speaks, her voice is \nlow to the point that Gretchen has to lean forward in order to hear \nher.\n\n*page_break\n\n“I knew no one would believe that Jonathan's death was accidental, \nso before the Magistrate came to arrest him officially, I gave \nRobert all of the money that I kept hidden in the house. I told \nhim to leave immediately and go to his father's people in Wales. \nI told him to keep in touch with me, and in the meantime I will \nfind a way to prove that he is innocent.\"\n\nShe puts her head into her hands, but she doesn't cry.\n\n\"I haven't heard from him.”\n\n“Have you figured out a way to find him innocent?” You ask, \nyour voice almost inaudible.\n\nShe looks up into your eyes.\n\n“No. The Magistrate allowed me to bury Jonathan and has kept \nme under guard ever since. Our assets have been taken over and \nall of my bills are being paid by the Magistrate. He sends a \nguard in town with my servant to shop for things that we need.\"\n\nShe shakes her head and makes a disgusting face. \n\n\"I hate that man! I am his prisoner and I know he is getting joy \nfrom this!” \n\nHer face softens, then the sadness returns. For the fourth time, \nshe begins to cry. \n\n“I don't even know if Robert made it to Wales or not!”\n\n*page_break\n\nYou continue to speak low.\n\n“I can help. Tell me who to contact and where, and I'll send a \nmessenger to Wales to look for Robert.”\n\n*finish\n\n*goto_scene mm5\n\n*label mm4c\n\nYour father takes your hand and leads you to his large leather \ncouch.\n\n\"Marian,\" he begins with large sad eyes, \"I love you very much \nand I would never hurt you, but I feel that this news must come \nfrom me.\"\n\n\"Father, is this about Robert? Is Robert dead? Did he not return \nfrom the Crusades?\"\n\n*page_break\n\nHe takes your hands into his large hands and he squeezes them.\n\n\"I can assure you that Robert did return from the Crusades, but \nno one knows at this time if he is alive or not.\"\n\nYour eyes go a little wide, you're not sure what he means by \nthat. You raise your voice just slightly as his words has excites \nyou.\n\n\"How can anyone not know if Robert is alive or not?\"\n\nYour father drops his head and begins looking at your hands.\n\n\"Father, please tell me? What has happened to my fiancé? I have \nthe right to know.\"\n\nHe continues looking at your hands.\n\n\"All I've gotten from rumors is that something bad has befallen \nLord and Lady Smyth, but no one will tell me what it is.\"\n\n*page_break\n\nYour father finally looks up directly into yo
