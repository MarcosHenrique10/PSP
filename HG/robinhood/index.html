Go On The First Boat. You've Never Heard Of Cannibals.\n\n    \"I'm coming, too,\" Marian smiles as she checks the tightness \n    of the blade at her side and the one in her boot.\n\n    \"Nah. No women 'till me knows it's safe,\" Black Mike orders.\n\n    Marian gives you that look. You know the look I mean.\n\n    \"Uh, Black Mike, Marian can come with us.\"\n\n    \"If Marian goes, so do I,\" Gretchen says as she checks her \n    blade under her hidden sleeve.\n\n    You don't even look at Marian. \"Uh, Black Mike, Gretchen, \n    too.\"\n\n    \"If Gretchen's going, I'm going, too,\" says Tuck.\n\n    \"Of course you're coming. That's a given. Both you and\n    Will because he's the best shot.\"\n\n    *set leadership %+10\n\n    *set brave %+10\n\n    *goto rh10e\n\n  #Send The Pirates And Your Biggest Men First.\n\n    \"I'm coming, too,\" Marian smiles as she checks the tightness \n    of the blade at her side and the one in her boot.\n\n    \"Nah. No women 'till me knows it's safe,\" Black Mike orders.\n\n    You see an opportunity to stay behind.\n\n    \"Ah, Black Mike is right, Marian. We don't know what's on the \n    island. I'll stay with you and Gretchen until Black Mike, Bo, \n    Kurt, William, Little John and Tuck have secured the beach first.\"\n\n    She gives you that look. You know the look I'm talking about.\n\n    \"Are you trying to imply, Robyn Hood, that I, Marian FitzWalter of \n    Blidworth, can't take care of myself?\" She ask as she straps on her \n    sword.\n\n    \"No, no, no, of course not! \"\n\n    \"Then I'm going.\"\n\n    Gretchen is checking the blade she has pushed up her sleeve. \"And \n    if Marian goes, I go.\"\n\n    \"Fine!\" You say, as you strap on your own sword.\n    \n    *set cautious %+10\n\n    *set exaggerate %+10\n\n    *goto rh10e\n\n*label rh10e\n\n*page_break\n\n*image dwarves.png\n\nWhen the boat hits the shore, you surprise yourself by being the first \none out.\n \nImmedicately, you are amaze at how large the pebbles are on the beach \nand, unlike standing on sand, how your footing is sure.  The small \nstones aren't even wet or shift under your feet.  \n   \n     \nAs you continue to  marvel at your surroundings, and the others follow \nyou out of the row boat, you hear someone shout, \"Look!\" \n\nAs if they are part of the trees and foliage themselves, nine little men\nand one little woman appear on the grassy part of the beach. And even \nthough they are much smaller than even the smallest of your shore group, \nthey certainly aren't children.\n\nOf course, you've seen midgets without substantial employment or financial \ngain begging on the streets; or performing in the circus or in a traveling \ntroubadour as a fool because they usually aren't accepted in regular society.\n\nBut these are different.\n\n*page_break\n\nThey are stout of body, with pointy ears and golden wavy hair that fell \npast their shoulders, and facial hair that did the same. Some of the men's \nhair and beards are in braids as you've only seen on women. And when the \nlight hits their eyes just right, they shine.\n\nAs Irish men on the battlefield, they wear skirts instead of slacks or \ntights, that went all the way down to their ankles, and lace boots cover \ntheir legs. Tunics with a high collar and full sleeves cover their chest \nand torso. They wore a knit cap with flaps that cover their ears.\n\nA few of the men had metal plates on their chest and shoulders, wear a helmet, \nand carry a shield. They are obviously soldiers.\n\nYou can tell the woman from the men because, even though there is no difference\nin her clothing, breast help shape her frame, and her face is gentler.\n\nThe last thing you notice is the thick leather belt that holds their saber to \ntheir waist in a sheath that is almost longer than they, themselves, are tall.\n\nEveryone in your team unsheathe their weapons or quickly cock their bows.\n\nYou pull up your hood and step behind Marian.\n\nThe one with thick bushy eyebrows looks very carefully between you and \nBlack Mike. \n\n\"Robert of Loxley,\" he says addressing you directly with a surprisingly \nbooming voice, \"welcome to our home. There's no reason to be afraid. We were \nexpecting you.\"\n\nYou peak over Marian's shoulder. \"Wha...wha...wha...makes you think I'm \nafraid?\" \n\nYou suddenly remember something from your childhood, something from your \nmother. \n\n“There are Brownies, Wood Elves, and Gnomes living in our garden and the \nlook over us with their magic. You must treat them well,” your mother warns \nas she continues, “and give them no reason to fuss, or they will leave us, \nnever to return.” \n\nYou thought her stories are her remarkable imagination  to keep you in check, \nbut now?\n\nThese certainly could not be the dwarves of your childhood bedtime stories from \nso many years ago. Could they?\n\n*page_break\n\nYou step from around Marian and lower your hood. \"Everyone, put away your \nweapons. They won't harm us. I can tell.\" \n\nBlack Mike's crew didn't like taking orders from you, so they look over at him.\nWhen he gives a nod, they sheath their sabers.  \n\n\"What do you mean, you were expecting us?\" You ask.  \"Who are you?  How did you \nknow we would come to this beach?\"\n\n\"Oh, forgive me,\" says the one who spoke first. \"My name is Broon.  I am the\noldest of the Elder Dwarves and the Keeper Of The Records.\"  \n\nHe indicates the female who has long wavy hair in a part and two brads falling \ndown her back. \n\n\"This is Banta and she is here representing her brother, King Macken, and his \nQueen, Leefa. You will be meeting them soon.\"\n\n\"It is so nice to meet you both, Robyn Hood and Captain Black Mike,\" Banta\nsays.\n\nMarian steps forward and looks the female up and down. \"How did you know their\nnames?\" She ask suspiciously.\n\nThe corners of her lips turns up. \"Just as I know your true name, Lady Marian \nFitzWalter Dore, and your loyal hand servant is Maiden Gretchen of Saxe.\"\n\nGretchen smiles and pushes her knife further up her sleeve.\n\n*page_break \n\nBlack Mike looks suspiciously at Broon. \n\n\"Ya didn't an'wer all uv Robyn's que'tions. Who  dey?\" He points to the other \nfour Dwarves. \"How culd ya be 'pectin' us when me not 'ntend ta brin' us h'ar, \n'nd how did ya know me come ta dis ver' shore?\"\n\n\"I'm sorry,\" Broon says. \"These four are our Attendees and a few of our soldiers, \nand we Elder Dwarves brought you here.\"\n\nYou all respond in some sort of manner as the following.\n\n\"What?\"\n\n\"Uuugg, it wasn't bewitched, it be magic!\"\n\n\"How could you do that?\"\n\n\"That's impossible!\"\n\n\"My mother was right!\"\n\n\"Wh'ar is h'ar?\"\n\nBroon raises his hands for attention.\n\n\"Please calm down everyone and let me explain.\"\n\n*page_break\n\nSuddenly, you notice that everyone is calm very quickly without carrying \non a fuss for a little while longer.\n\n\"All of your questions will be answered soon.  However, you've had a very \nlong journey.  I know you and your people need to refresh yourself and eat a \ngood meal.”  \n\nBehind him appear other Dwarves dress differently than they pulling large \nrow boats.\n\n“These locals,” Broon continues, “will assist in removing your possessions \nfrom the [i]The Lady [/i] and restocking the supplies while your temporary \ncamp is being prepared.”\n\n*finish\n\n*goto_scene rhaway5\n\n", "rhaway5": "*label rhaway5\n\n*page_break\n\n*image robinmarian.png\n\nWhen all of your belongings are off of the ship and packed into \ncarts, and all of the men are mounted on horses, Broon and his party \nareready to guide you to the Dwarves' city, Kardeen, on their ponies.\n\n“Quickly, please, follow us, for our King awaits.\"\n\nAnd then, you begin to feel that you and time are moving swiftly.\n\nHow does it feel to you?  \n\n*fake_choice\n  # Like:[i] ZIP [/i]! \n\n    The rest of the Merry Men and the crew are off the [i] Lady \n    Anne [/i] and on the beach. All of your supplies and your horses \n    have also been unloaded.  \n\n  # Like:[i] SWISH [/i]! \n\n    You are riding up a path through the forest and into the \n    mountains. Than it's as if glass is under your horse as you \n    glide through a series of various levels of walkways, under \n    arches, over water falls.\n\n    You had just enough time to wonder how long would it be before \n    you would arrive at the castle, because you saw no tops of \n    buildings.\n\n  # Like:[i] BOING [/i]!\n\n    You and the men are standing in an open area with wooden furniture \n    and several tall wooden box-like contraptions. \n\n     \nYou turn your head around in disbelief.  It seems no one else notice \nhow quickly you and all of your supplies travel through such a distance \nfrom the beach to the mountains but you. \n\nSuddenly, although you could not tell if he was old or young, a male \nDwarf is beside you. He answers the question you are asking in your \nhead.\n\n\"Don't worry about Marian. She and Maiden Gretchen are nearby.  They \nwill enjoy a bath while you all take a shower.\"\n\n  \nShower? What's a shower, and you can't help but wonder if it's going to \nhurt.\n \nYou, Black Mike and the other men get a demonstration on how to turn on \nthe shower, adjust the water pressure, and control the flow, the hot water \nand the cold water.\n\nOnce you each make that first \"Ahhhhhh,\" your men swear you must figure \nout how to set these showers up when you get to where ever you're going \nto end up for the rest of your life.   \n\n*page_break\n\nHowever, it isn't lasting as long as you want because [i]BING, BANG, \nBOOM[/i]! you are all clean, standing with towels wrap around your waist \nlooking at clothes that are laying on high cushions for each of you to \nselect from. \n\nAll of you men look at the clothing with disgust.\n\n\"Uh, I'm only wearing my own clothes,\" says Jack.\n\n\"Ar! War's me dagger 'nd me boots? I'm not puttin' on no sissy skirt,\" \none of Black Mike's crew men complains.\n\n[i]BLINK[/i]! \n\nYou are all in your own clothes, clean, sabers sharpen, your boots are \nbuff, a fresh spring scent and no static cling.  \n\n*achieve blade2\n\nSoon the same Dwarf returns to retrieve you and the men. \n\nOnce again, that feeling of gliding on ice returns as you meander over \nand under bridges. \n\nYou are finally reunited with Marian and Gretchen in front of a building \nwith a set of large double doors.\n\n*page_break\n\nWhen she sees you she runs across the grass to hug you. You kiss her \nand hold her back full length to take a good look at her.\n\n\"Look at you!\" You say with great admiration. \n\nMarian is wearing one of the Elder Dwarves clothing, but her skirt has \na slit in the front to give her more movement, and showing much more of \nher legs and hips than Banta. Her skin sparkles, and her hair, that hangs \nloosely  down her back in large waves, shines. Around her neck is a \nchain made of thin strands of silver that catches the brilliance of the \nsun.\n\n\"You look spectacular!\"\n\n\"Isn't this place fantastic,\" she says to everyone. \n\nWilliam, Little John, and a few of Black Mike's crew are surrounding \nGretchen and giving her complements, which, as a servant, she isn't use \nto receiving. \n\nShe, too, wears an Elder Dwarf dress that flows from her waist out, \nwith a split in the middle of the skirt, and long bellowing sleeves. \nHer hair is braided into two long braids with silver string intertwine \nwithin, and her skin also sparkles.\n\n*page_break\n\n\"Maiden Gretchen, you should wear this color always,\" says William.\n\n\"And you smell like the first days of spring,\" Little John points out.\n\nGretchen gives them a coy smile. \"Oh, you're just saying that because \nI'm the only unmarried women here.\"\n\nWhich is true, of course, but there is something different happening to \nGretchen in the dwarf clothing,that allows her large bosom to pop up\nto the surface, that she has never felt before as a simple hand servant. \nThe men's attention is making her aware that she indeed looks different \nthan usual.\n\nGretchen, it turns out, is a beautiful woman; but someone notices this\nfact long before the others.\n\n\"May I have the pleasure of escorting you to the meal?\" Tuck ask. \n\nGretchen giggles.\n\n\"Of course, Tuck. I wouldn't have it any other way.\"\n\nAnd, again, time speeds up, and before you can say  \"Holy, \nMother of....\"\n\n[i]SWOOSH[/i]! \n\nYou are all standing in another open area surrounded by giant \ntrees of the like you've never seen in England.\n\n*page_break\n\nThere is a large outdoors bowl and in the center is a stage. The \ntwo large heavy high back chairs sit in the middle, and in each sit \nan Elder Dwarf. \n\nThey are certainly beautiful creatures despite their size and \nstature.  A crown of gold with gems hovering over their heads.\n    \nOn either side of them stand the four attendees who you recognize \nfrom the beach. Broon and Banta stand on the side of the King.\n\n\"My friends, I'm so glad you have arrived safely.  Allow me to \nintroduce myself: I am  Macken, King of the Elder Dwarves, and \nthis is my wife, Queen Leefa.\"\n\nThe corners of Leefa's lips turn up just slightly as she nods.\n\nDespite how everything so far has been pleasant, you immediately \nbecome argumentative.\n     \n\"Where exactly is here? You force us here but you tell us nothing.\"\n \nMarian pokes you in the arm and whispers. \"Robyn, don't be rude,\" \nshe scolds. \"Give the King time to explain.\" \n  \n\"I understand how you must feel,\" Macken says. \"You are in Kardeen, \non the continent of Varna, our home. That is, true home of all of \nus known as the Fair Folk.\"\n\n*page_break\n\nHis lips lift just a bit as he acknowleges each of you with a nod \nbefore he continues.\n\n\"We, meaning our Eldest Dwarves, know of your problems with Prince \nJohn of England, and we want to help.\"\n\nSuddenly, his eyes changed for a second and you saw true empathy \nin them. \n \nAnd then it was gone.\n\n\"You are a good man, Robyn, and so are all of you.  We did not want\nto see you come to any harm.  So, we brought you here to live.  You \nwill be safe, no one will ever hunt you down or harm you.\"\n\n\"I don't understand,\" you say while everyone one looks at the other, \nmumbling under their breath.\n\n\"Broon, my family, and Attendants will stay close by you and teach \nyou our ways.  Then,  when the time is right, you'll be assimilated \ninto our world and meet all of Fair Folk of Kardeen.\"\n\nDon't lose your cool, Robyn.\n\n\"I still don't understand.  Do you mean to keep us here against our \nwill?\"\n\n\"Please don't think of it that way.  We want only to protect you and \nthis was the best way we knew how.  Think of us as your guardians, not \nyour captors.\"\n\n*page_break\n     \n\"But, we have the [i]Lady Anne [/i].  We could simply sail away.\"\n\nBlack Mike pokes you in the other arm and whispers. \"Arg, me friend. \n[i]Lady Anne's [/i] bewitched, 'member, 'nd dey be why.\"\n\nMacken takes a moment to first look at you and than at Black Mike. \n\"That would not be wise,\" he finally says. \"Besides, you will not be \nable to leave on the [i] Lady Anne.[/i]\" \n\nYou're starting to lose your cool. \n \n\"Why not?  She's fit. Are you telling me you're going to st...Hey!\"\n   \nBlack Mike and Marian jab you in each side of your ribs.     \n\n\"Shsssssh,\" Black Mike urgently whispers into your ear, “no time \nfor dis. We no nothin' uv dese crea'ures. We no choice but ta \n'gree.\"  \n\n\"Shsssssh,\" Marian urgently whispers into your other ear, \"you're \nbeing a terrible guest.  We wanted to get away from England, and \nwe've arrived away from England.\"\n\nThe murmur among the men becomes louder.\n\n*page_break\n\n\"What's going on?\"\n\n\"I'm not sure.\"\n\n\"I don't mind living here.\"\n\n\"Arg!\" \n\nMarian finally speaks  directly to King Macken.\n\n\"Forgive Robyn, your highness. He's use to being on his own, \nyou know, independent of anyone's help.\" She smiles and takes \nyour hand.  \"We all are thankful for you saving  us and \nbringing us to this wonderful land of yours.  We are truly in \nyour debt.\"\n\nHis expression does not change. \n\n\"Of course, I understand.  Now, come, everyone.  Please join \nmy family, my special guest, and I in the dining room of our \nGreat Hall.  There's quite a feast waiting for you and it's \ngetting late.\"\n\n\n*page_break\n\nYour Dwarf arrives behind you. When he clears his voice, you jump.\n\n\"Don't do that!\" You shout.\n\nHe simply looks at you.  \"May I show you the way to Great Hall?\"\n\n\"Of course,\" Marian says, charmingly, as she takes your arm.\n\nIt doesn't take long for you to enter the Great Hall, which is a \nmagnificent place. And, what is really strange, even though it is\nnot far away, you would have easily become lost if not for your \nguide. Each hall was short with a quick turn, like in a hedge maze.\n\nWhen you enter your destination, the room is full of male and \nfemale adult Elder Dwarves milling around in small groups having \nlow private discussions. As you past by, a group would become silent \nas they eye you expressionlessly. \n\nYou're not sure if they're happy to see you or angry that you are \nall there.\n\nSoon your Dwarf takes you to a large round table with high back \nchairs in the middle of the room and stands behind you as you make \ndecisions where to sit. You and yours sit on one side of the round \ntable, while Black Mike and his crew sit on the opposite so that they \nare facing you. Four chairs were left empty at the front curve of the\ntable.\n\n*page_break\n\nThen, with blare of harmonious horns, King Macken with Queen Leefa \nenter through a large set of doors at one end of the room. Broon and \nBanta are behind them with their Attendees.\n\nWhen King Macken and Queen Leefa sit at the same time at the front of \nthe same large round table as you, all of the Elder Dwarves also sit. \nBroon sits on the right of King Macken closest to you, Banta sits on \nthe other side ofthe Queen closest to Black Mike.\n\n\"Robyn, you may all sit down now,\" Broon announces.\n\nImmediately, out of no where, servants appear and are walking around the \ntables adding food to the various small plates that start off in small \nstacks in front of you. They also pour various thickness color liquids \nin three different glassware.\n \nThere is bread and unusual looking fruit in large bowls on the tables, \nand you the main dishes of meat, fish, and vegetables are place on the \nsmall places in front of you. \n\nYou watch Broon for a clue as to what to eat first, but he is quietly \nspeaking to King Macken. Then you look towards Marian. You decide to try \nwhat ever she eats first.\n\nWhat do you eat and what do you think about it?\n\n*fake_choice\n  #Something Bright Green That Wiggles Slightly When You Touch It.\n    \n    Marian is placing pieces of it into her mouth as she smiles. You decide \n    to try it and gingerly place a piece into your own mouth using the\n    three prong fork. \n\n    Hey, not bad! It's cool, minty, like the leaves that you mother grew in her \n    garden, and melts in your mouth. You continue to eat more.\n\n  #Something White With A Spongy-Looking Texture.\n\n    You only put a touch in your mouth, when you decide that it's too \n    bitter, and you know you made a awkward face; but you don't want to \n    spit it out, not with Broon sitting right beside you. So you hold it \n    in your mouth.\n\n    You note something that is orange, shiny, and looks gooey and hope \n    that it is sweet. You pick up a spoon, scoop up a lot of it, and stuff \n    it in your mouth. \n\n    Sure enough, even though you have no idea what it actually is, all \n    you know is that the sweetness is overpowering the bitterness and you \n    can smile again. You take a couple more mouthfuls of that!\n\n  #Something Purple, Diced, With A Blue Stringy Sauce.\n\n    This dish is served in a small bowl and is thin like soup, but \n    everything is either too large to fit into the scoop of the spoon, \n    or poke with a three prong fork. You watch Macken for any clue on how \n    to eat it. \n\n    He first adds a few shakes of [i]what-ever-it-is-that-is-bright-pink-\n    shiny [/i] and sparkles from a shaker to it befire he brings the small \n    bowl up close to his lips and sort of pushes the content into his mouth \n    with the three prong utensil.\n\n    *achieve spices1\n\n    A little messy, but at least you don't wear a beard like Black Mike \n    and his men. Plus, there are wet towels sitting in a plate to clean \n    a messy chin right up.\n\n\nAfter you all have been eaten for awhile, you notice that Broon, Macken, \nand Leefa are watching you.\n\n\"I have a confession to make,\" King Macken finally says. \"I brought you to \nKardeen because we need you.\"\n\n\"Uh?\" You ask with your mouth full of food.\n\n*page_break\n\nThe Queen looks at Marian and then back at you. She then speaks directly \nto you. \n\n“You are the legendary, Robyn Hood, and the tales of your heroism \nspread far. You are the only one who can help us.”\n\n\"Really? Even in this place that isn't on any of our maps, you know \nof me?\"\n\n“Please Robyn,” says Macken. “Listen to our  tale.”\n\n\"Okay.\"\n\n*page_break\n\n\"There are many different Fair Folk who have live with mankind, but Kardeen \nis our original home,\" Leefa begins.\n\n\"We Elder Dwarves are the foremost metallurgist of all of the Fair Folk \nand once lived in the great mountain called Kardalean.\"\n\n\"We would mine the mountain, smelt the metals with great skill and \ncare, create unusual jewelry from the gems and share what we created \nwith all of the Fair Folk to trade with mankind throughout the world. \nWe were the ones who brought on what you call the Bronze age, etc., in \nyour history.\"\n\n\"That is how we lived our lives for thousands of years, until…\" Leefa \ninterrupts her husband, and they both look at one another.\n\n\"What happened?\" Marian ask.\n\nLeefa looks at you and then at Marian for a long time before she answers.\n\n\"Edent.\"\n\nYou, Marian, and Black Mike look at one another.\n\n\"Who be dis Edent?\" Black Mike ask.\n\n\"A Dragon,\" says the King.\n\nOh, you don't like the sound of that.\n\n\"A young Dragon at the time,\" continues Leefa, \"looking for gold and \nthe precious gemstones to claim as his own.\"\n\n*page_break\n\n\"And he found it in Mount Kardalean,\" says Marian.\n\nOh, you definitely don't like the sound of that.\n\n\"Yes,\" King Macken looks directly at you. \"He's been there ever since. \nAnd, ever since, beginning with the mountains, he is poisoning our \nhomeland.\"\n\nYou know you're going to get yourself into big trouble by asking, but \nyou ask just the same.\n\n\"What do you need from me?\"\n\nBanta, Broon, Queen Leefa, and King Macken all say at the same time,\n\"We need for you to kill Edent.\"\n\nSee, what did I tell you. \n\nYou did know that you didn't need to ask, right?\n\n*page_break\n\nThis is the end of Part One of this Tale. \n\nYou have three choices:\n\nYou may continue to Part Two of the Tales of Edent the Dragon,  \nor go on another adventure with Robyn and Marian, or change over\nto read Marian's Tales. \n\n*choice\n  #The Tale of Edent the Dragon, Part 2.\n\n    You don't know much about Dragons. What will you do?\n\n    *goto_scene rhedent\n\n    *set brave %+20\n\n  #The Tale of The Benign Globe.\n\n    You have found during your life as a hero that \n    coming to the aide of strangers can often\n    come in handy.\n\n    *goto_scene rhelves\n\n    *set leadership %+10\n\n  #Marian's Tales.\n\n    Marian is a strong, brave, smart woman who has \n    taken lead over a few of these Unusual Adventures\n    herself.\n    \n    *goto_scene mmmarianstory\n\n    *set brave %+10\n\n  #End Of The Unusual Tales\n    Return for more Tales later.\n\n    *finish\n\n\n    ", "rhbaron": "*label rhbaron\n\n*page_break\n\n\nLittle John and William leap out of the bushes. Little John, an expert with the staff,\nimmediately gets in stance looking as menacing as he can, and William brandishes\nhis sword. \n \nLars, Jack, and Will jump down from the trees, each carrying the best \nswords that were available.  The swords needed some repair and weren't very \nsharp, but you've assure each of them that their behavior is often mightier than the \nsword.\n\nLittle John stomps over to the carriage and pulls the door from its hinges.\n\nThe red face Baron recoils. His voice shakes when he sees Little John. \n    \n\"What's going on?\"\n\nLittle John uses his long strong arm to reach in and grab the Baron by the \nshoulder and  pulls him out of the carriage.\n\n“It's a robbery. What do you think? Now, give me your stuff!”\n\nWilliam reaches up and grabs Rodney by his leg and pulls him down.\n\nIn shock, Rodney struggles to get his footing, landing flat on his back instead. \nJack snatches off his cape and hat. \n\n“What size are those boots?” William ask pointing down at the fancy brown\nleather with the gold lacing.\n\n*page_break\n\n\"What?\" Rodney ask in surprise.\n\n\"What size are your boots?\" William ask again more pointedly.\n\n\"Size?\"\n\nWilliam put his sword right up to hit the corner in his neck.\n\n\"If I have to ask you what size are your boots one more time…\" He starts\nmenacingly.\n\n\"They...they..they're size 14!\" Rodney shouts.\n\nWilliam looks happily at Jack. Jack nods his head in approval.\n\n“Take off your boots,” William snarls.\n\n“My boots?” Rodney shakes.  “But, but, but, the Baron had these made especially \nfor me as a gift!”\n\nWilliam pokes him in the middle of his throat, while Bret steps up pointing his \nweapon at Rodney's chest, and Jack his neck. \"Your boots!” The three of them shout \ntogether.\n\n“All right, all right! Just don't kill me!”\n\n*page_break\n\nRodney struggles with his boots while Lars takes off the Baron's 10 rings, \nheavy chain with a pendant, pocket watch,  and stuff them into his pocket. \nHe wraps the Baron's cape around his shoulder and plop his hat onto his \nhead.    \n\nWhen you whistle the signal to leave, William jumps up onto the front of the \ncarriage and grabs the reigns while the others jump inside. \n\nNow grinning because you enjoy this much more than you thought you would, you \nbow to the Baron and Rodney. \n\n“Thank you gentlemen for making this an enjoyable experience for all of us.  \nYou may now carry on your travels to Nottinghamsire.”\n\nThe Baron's red face was now the reddest yet.  He stomps the ground several \ntimes.\n\n“Hurumph! I will not stand still for this type of behavior! Who are you?” \nHe insist.\n\n“He's Robyn Hood, that's who!“ William shouts down from his perch. “The most \nnotorious archer and swordsman in all of England.  You should be happy that \nhe's letting you off so easily!”\n\nYou bow one last time, jump up on Clint, and wave to the travelers before \nriding off with the carriage leaving the Baron and his manservant standing\nin the road.\n\n*page_break\n\nWilliam rides the horses hard off of the the main road, through the forest,\nand back to the major oak. Hooping and hollering, they each jump out of \nthe carriage.\n\nWhat is this? There are two small chests in the carriage.\n\nLittle John calls to you. “Look, Robert!”\n\n*achieve chest\n\nOne chest is full of gold coins and the other with rare stones. \nThe men stand goggling at the spoils.\n\n*set brave %+10\n\n*set wit %+10\n\n*goto_scene rh2e\n\n*finish\n  \n", "rhedent": "*label rhedent\n\n*page_break\n\n*image robinandall.png\n\nThere are two round tables in the room, and chairs; but the chairs are \nsmaller than the ones in the Great Hall, being meant as a conference \nroom for the Dwarves only, so you all stand as you discuss your \nnext move.\n\nBlack Mike approaches Marian with his hand out.\n\n\"Pay me, Lady Maria', 'nd me 'nd me crew will be on our way.\"\n\n\"What? You deserting me Black Mike?\" You ask surprise.\n\n\"Agree ta safely git ya outta Englan'. Me git you safely outta \nEnglan'. Deal compete.\"\n\n\"He's got a point there, Robyn,\" Marian says calmly.\n\n\"Me needs ta git back ta Large Lucy 'nd Fest'val. King git me home \nin time.\"\n\nMarian reaches into one of the large pockets sewn into the side of \nthe tunic and pulls out her pouch holding the rest of the gold coins.\n\n\"Wait!\" You shout as you grab her hand with the pouch. You look \nhopefully at Black Mike. \"I need you friend. I can't fight a Dragon \nalone.\"\n\n*page_break\n\nYou shouldn't have said that. Your men take great offense and all \nshout at once.\n\n\"Hey!\"\n\nSome throw in a few obscenities, but I, the Storyteller, don't speak\nas such.\n\n\"You don't think that we can kill a Dragon?\" William finds this \ninsulting.\n\n\"I don't even need the rest of ya to kill a Dragon,\" Little John says \nas he stomps his staff to the floor.\n\n\"I have youth on my side, old man!\" Yells Jack.\n\nNow all of your men are speaking at the same time which makes a lot \nof noise in that small room. It takes Marian to bring order.\n\nShe stands in the midst of them arms out.\n\n\"Men! Men! Calm yourselves!  I think you simply misunderstood what \nyour leader means,\" she says looking around, sneaking a sly wink \nin your direction. \"Robyn wants more men power to go after this Edent, \nthat's all.\"\n\nShe looks at you and smile her warmest, lovely smile. Then she\nlooks around at the Merry Men and Black Mike's crew. \n\n*page_break\n\n\n\"Robyn promised to lead us out of England away from the tyranny of \nPrince John and with the help of his good friend, he has done just \nthat.\" \n\nShe pauses to look directly at each of your men. \"\n\n\"A race of people who knew of our dilemma brought us, strangers, to \nsafety to be our guardians in a new life. We're not going to question \nhow, we're simply going to be grateful.\" \n\nShe pauses again before she emphasizes the most critical question. \n\"What's wrong with them asking us to come to their aide in a crisis?\"\n\nShe stops and takes a good look around. \n\n\"Nothing. Absolutely nothing.\" She finishes and tosses the pouch\nto Black Mike.\n\n\"A promise is a promise. We have found a new home, and we are going \nto kill Edent.\"\n\nBlack Mike takes off his hat. He bows low to Marian with a flourish, \nand waves his hat at you.\n\n\"Me be seein' ya, Robyn Hood!\" \n\nBlack Mike and his crew waits before they're through the door before their\nbooming laughter is heard in the hallway.\n\n*page_break\n\nSoon after Black Mike leaves, your Attendee returns to lead you your men, \nMarian and Gretchen, back to the Great Hall to discuss the details of your \nquest.\n\nKing Macken, Broon, and the king's high ranking Dwarves and Captains have \nretrieve maps and texts concerning Mount Kardalean and the days when the\nDwarves were metallurgist within the mountain. \n\nMugs of red wine and fruit is place on the tables for you to enjoy.\n\n*achieve wine\n\n\"When Edent attacked,\" the King is explaining, \"he came in through \nhere.\" He points at a place on the map that is high near the top on \nthe front of the mountain that faces where you are now. \n\n\"King Mor was evacuating the premises of our women, children, and \nnon-warriors by rushing them up to the top of the mountain. The\nwarriors fought Edent for as long as they could; but, as soon as \nthe Dragon entered the mountain, he brought the front entrance down \nbehind him and that made the emergency exits at the top collapse.\"\n\n\"Oh, dear!\" Gretchen says under her breath.\n\nKing Macken looks down. \"We lost King Mor.\" He pauses. \"He was a \ncousin and a great leader.\" He exhales before he continues. \"Those \nwho survived worked their  way to another exit here.\" He points to a \nplace on the right side of the great mountain range. \"As far as we \nknow that is the best way back in.\"\n\n*page_break\n\n\"That looks like a long journey,\" William observes.\n\n\"I believe you're right. No one's ever tried to go back, and there's \nno records that covers the journey to our new home here. We've been \nguessing.\"\n\nYou have been moving and twitching in your seat this entire time.\n\nMacken looks at you with a blank face.\n\n\"Robyn, is there something you want to ask?\" He ask.\n\n*choice\n  \n  #\"Yes. How Do You Know The Dragon Is Still Alive?\"\n\n    Macken's face does not change. \"Why do you doubt us?\"\n\n    Marian looks at you. \"Yes, Robyn, why would they make up something\n    like this?\"\n\n    \"I'm just concern that we're going to go all that way there and not \n    find a Dragon.\"\n\n    \"If that is the case,\" Marian says, \"we would have helped them return\n    to their native home.\" She smiles.\n\n    Your men all look at you with a funny expression.\n\n    \"You're not afraid of a dragon, are you, Robyn?\" Brett ask concern\n    in his tone.\n\n    \"Me? Of course not!\" You chuckle as everyone continues to look \n    at you. \"All right, all right. Sorry. Let's get this show back \n    on the road, shall we?\"\n\n    *set cautious %+10\n\n    *goto rh11a\n\n  #\"Yes. Are There Other Races Who Can Help?\"\n\n     \"I mean, not to be disrespectful, but surely there are \n     others in this area who can do this for you?\"\n\n    \"There are, but ridding our home of Edent is our job.\"\n\n    \"Why?\"\n\n    Everyone stares at you.\n\n    \"Robyn, don't be silly,\" Marian says. \"It's the Elder Dwarves \n    home and, therefore, their responsibility. It's as simple as that.\"\n\n    \"I understand that,\" Little John says.\n\n    \"So do I,\" agrees the rest of your men.\n\n    \"Calm down, Robyn. We'll be fine.\" Marian smiles at you.\n\n    You attempt a smile back. \n\n    \"We may need the assistance of another Fair Folk for something\n    that we cannot do ourselves, but we are not ones to usually\n    ask for favors,\" Broon explains.\n\n    \"That makes since to me. I've always been like that,\" William\n    adds.\n\n    You hear many versions of, \"Me, too,\" coming from your men.\n\n    You try not to look embarrass.\n\n    \"Okay, then, let's continue with a plan.\"\n\n    *set coward %+10\n\n    *goto rh11a\n\n  #\"Yes. What Is This Quest Really About?\"\n\n    Everyone in the room is staring at you.\n\n    \"What?\" You ask as you look around. \"Am I really the only one\n    who thinks killing the Dragon is really a ruse?\"\n\n    \"A ruse for what?\" Marian ask.\n\n    You look around the room. Now your men are glaring at you.\n\n    \"Okay, sorry I asked.\"\n\n    *set exaggerate %+10\n\n    *goto rh11a\n\n*label rh11a\n\nSuddenly, one of the King's Attendants quickly makes his way from the \ndoor to the front of the room, walking directly to Macken. He clears \nhis throat.\n\nMacken turns to find a silver tray with a seal message in his \nAttendant's hand. He takes it, unseals the letter, and reads \nit. After a few moments, he puts his head down and sadly shakes it.\n\n\"This must wait. The Black Elves are at it again.\"\n\n*finish\n\n*goto_scene rhedent2\n\n\n\n\n\n\n\n\n\n", "rhedent2": "*label rhedent2\n\n*page_break\n\n*image robinandall.png\n\nKing Macken's warriors suddenly stand at attention and exit the Great Hall \nin a very organized manner.  Macken calls Broon and hands him the message\nto read for himself.\n\n\"Quickly, go tell my wife and the Eldest Ones what is happening. We will \nleave as soon as we are organized. I want this taken care of immediately \nand quickly.\"\n\n\"Of course, your highness.\" Broon leaves the room. Despite the urgency of \nthe King's message, Broon's expression does not change.\n\n\"What's happening?\" You and Marian ask at the same time.\n\n\"The Black Elves are a brutish race who profits on the misery of the weak. \nThis message just came saying that they've attacked a Laurel village and \nhave taken many captives. The Laurels are a child-like race and they \nwill not survive without our help.\"\n\n\"We're going, too,\" Marian says.\n\nYour men start shouting.\n\n\"Yeah!\"\n\n\"Let's do this!\"\n\n\"Let's get those Black Elves!\"\n\n\"Hooray!\"\n\nYou edge your way closer to Marian, and whisper in her ear.\n\n*page_break\n\n\"Isn't this a little much? After all we're already going after a Dragon.\nDo we have to go after the Black Elves as well?\"\n\nShe turns and gives you that look. You know the look I'm talking about.\n\n\"Robyn, how can you asked me that? This is our home now, and just like \nwe would do in England, we're going to do whatever  we need to do to \nhelp here.\"\n\n\"But...\"\n\nRobyn, you know your wife is a very strong and willful woman. Never \nargue with her over such decisions that she may make alone.\n\nMy advice...remember to always pick your battles carefully.\n\n\"Gretchen, men, let's get our weapons and be ready to go when King Macken\nis ready!\" Marian shouts.\n\n\"Yeah!\" Came Gretchen and the men.\n\nYou're lead to a large area of tall trees in a circle, laying out \ntemporary walls. Your personal dwellings are colorful tents woven from\nwarm sheep wool, and there were personal tables and chairs, some \nfurniture, and private privies. \n\nThe tent belonging to you and Marian is spacious and comfortable. On your bed\nand table you find your weapons: blades sharpen, arrows with new points,\nand bows with new strings.\n\n*page_break\n\nIn addition, there is fine mesh mael under garments and high bands of leather \nfor your arms.  When you are ready, you look at yourself in the long mirror.\n\n\"You look so different, Marian,\" you say.\n\n\"And except for the new mael and the leather bands on your arms,\" she begins,\n\"you look the same.\" \n\nYou both laugh, then you kiss her. \n\n\"I know you believe that we're doing the right thing, little squirrel. I guess \nI just worry too much.\"\n\n\"I'm glad that one of us does,\" she says before she kisses you back.\n\n*finish\n\n*goto_scene rhedent3\n\n\n\n", "rhedent3": "*label rhedent3\n\n*page_break\n\n*image robinandall.png\n\nYou, Marian, Gretchen, and your men meet King Macken and his troops in \nfront of your tents.  His officers are on small ponies that are capable \nof carrying their size and girth. The rest of the troops are marching.\n\nThe King gives you a copy of the map made by his spies who are  watching \nthe Black Elves. The map not only shows the location of the Black Elves' \ncamp, but also where they're horses are in a corral, and where they are \nkeeping the Laurels under watch.\n\n\"It should take us about two hours to march there. You will be there sooner.\nDo not do anything without us. Make sure you wait quietly and out of sight.\"\n\n\"Understood,\" says Robyn.\n\n\"First, have one of your men sneak in and free their horses. Then, when \nyou hear the signal, your marksmen will attack from one side, here. We \nwill enter the camp on the other side and attack with our swords and axes. \nSince I'm only taking a couple of units, we will greatly need your help \nextinguishing the Black Elves.\"\n\n\"Sounds like a good plan to me.\" You smile.\n\n\"The Laurels will be in a large cage, here. Their hands will be bond. \nWe can wait until almost all of the Black Elves are dead before we start \nreleasing them.\"\n\n\"All right.\"\n\n*page_break\n\n\"Some of the Laurels can fly, others cannot, but we can take as many as\nwe can on horseback so that we can return home quickly. Will that work\nfor you?\"\n\n\"Great!\" \n\n\"They'll have to stay with us until they can be relocated because the \nBlack Elves never leave a village standing.\"\n\n\"We're ready when you are.\"\n\n\"Good. Let's begin.\"\n\n*page_break\n\nYou've been riding for almost two hours. The men have been riding quietly\nand Marian has been singing low and to herself. You  suddenly raise your \nhand to stop the riders.\n\n“What is it, Robyn?” Ask Marian.\n\n*choice\n  #You're Lost.  \n\n    You turn the map one direction, and then the other.\n  \n    “I'm not sure, but I think we're lost.”\n\n    Marian points down the road. “Look!”\n\n    Coming in the opposite direction are a group of a race who are even \n    smaller than the dwarves. Some are on small ponies, others are walking. \n    \n    The ponies have large packs, and the people carry some of their \n    belongings on their back and on top of their heads. Some belongings are \n    on polls between two people. It looks like about a hundred or more of \n    them stretch single file in the road.\n\n    As they come closer you can see that they are similar to the Dwarves, \n    but not exactly. They have pointed  ears, dark curly hair, and olive \n    tone skin. They wear less clothing. When they are even closer, you see \n    that their eyes are almond shape, and the color of bright green.\n\n    *set leadership %+10\n\n    *goto rh10b\n\n  #You Want Marian To Sing The Ballad Louder. \n \n    “Alas my love you do me wrong \n    To cast me off discourteously;\n    And I have loved you oh so long\n    Delighting in your company.\n\n    Greensleeves was my delight,\n    Greensleeves was my heart of gold\n    Greensleeves was my heart of joy\n    And who but my lady Greensleeves.\n\n    Thy petticoat of sendle white\n    With gold embroidered gorgeously;\n    Thy petticoat of silk and white\n    And these I bought gladly.\n\n    Greensleeves was my delight,\n    Greensleeves my heart of gold\n    Greensleeves was my heart of joy\n    And who but my lady Greensleeves.\"\n\n    “That's beautiful, Marian. Did you write that one?”\n\n    “Thank you, Robyn, but no. I learned it in London.”\n\n    The two of you look lovingly into each others eyes, until you hear \n    a bunch of moaning coming from some of the men.\n\n   Just then,  Marian points down the road. “Look!”\n\n   *set romantic %+10\n\n   *goto rh10c\n\n  #You're Hungry.\n\n    You can't believe it, but you're actually ready for the second meal of \n    the day. \n\n    \"My stomach is growling something awful,\" you say to Marian. \"I \n    guess I didn't get enough of that fruity biscuits and cheese after \n    all.\"\n\n    \"Well, they did pack us lunch, but I think we should wait on King \n    Macken and his troops and rescue the Laurels first. Most of that\n    is meant for the Laurels.\"\n\n    You look behind you at your men.\n\n    \"Isn't anyone else hungry yet?\"\n\n    \"Naw.\" \n\n    \"Nope.\"\n\n    \"Can't say that I am.\"\n\n    \"I know I'm hungry for some Black Elf blood!\" That was Will Scarlet, \n    and Gretchen gives him a disgusting look.\n\n    \"Sorry,\" he says apologetically with his head down.\n\n    You pull out the map again and begin to look at it closely. You hold \n    it out, you turn it around, you turn it back.\n\n    \"Truthfully, I think we're lost. Which is why I'm glad we have some \n    food. Wouldn't want to be out here, lost, without food or water.\"\n\n    *set exaggerate %+10\n\n    *goto  rh10d\n\n*label rh10b\n\nWhen the lead horseman had to stop because they cannot pass you, you and \nMarian approach him.\n\n\"Hail, fellow traveler,\" Robyn says. \"We are riding to the camp of the \nBlack Elves, and have become lost. Have you seen them and know where their \ncamp is by chance?\"\n\nThe leader rides closer to you. He looks up at you with a scowl on his face.\n\n\"I am Merck, King of the Forest Elves. You do not look like you are of \nVarna. Why are you looking for the Scourge of the Mountain People?\"\n\n*page_break\n\n\"Uh, well you see, we're sort of on a quest for King Macken Elder Dwarves.\nWe promise to help rescue the kidnapped Laurels.\"\n\n\"Save some Laurels?\" He turns around and speaks  the Forest Elves' secret \nlanguage to his nearby subjects. The elves, both male and female, giggle \nand begin to pass the words down the line. Soon others are giggling\nas well.\n\n\"Who are you to be so bold, and so foolish?\"\n\nYou don't like anyone calling you foolish, especially a short guy riding \na pony. You sit up straight in your saddle to get as tall as you can over \nhim.\n\n\"I just happen to be Robyn Hood of Sherwood Forest. That's in England, by \nthe way. And King Macken himself brought me here to kill Edent, the\nDragon.\"\n\n\"Yeah! So I'd be nice to him if I was you!\" \n\nYou don't know who said that but it was nice to have support.\n\n\"Robyn Hood?\" The small king's eyes become wide. \n\nOnce again he speaks to his people in their secret language. He lowers \nhis head in an apologetic gesture as his guards, wives, and children who \nwere closest to the front of the line did the same. \n\n*page_break\n\n\"Even here in Varna, we know of your good deeds. If King Macken has \nsent for you, then there is hope.\"\n\nHe bows his head again and you do the same.\n\n\"Yes, we know where the Black Elves' camp is,\" he continues. \"Our scouts \nfound their camp on the other side of that hill yesterday morning.\" He \npoints to the left.\n\n\"Where are you and your people going?\" Robyn asks.\n\n\"We are on our way to the other side of the Elves of Light home,\" he pauses. \n\"Good luck to you, Robyn Hood of Sherwood Forest. We all depend on you.\"\n\nYou find the spot where Merck is pointing on the map and are back on \nthe right road.\n\n*goto rh10e\n\n*finish\n\n*label rh10c\n\n*page_break\n\nWalking on the road in the opposite direction, a little man wearing a worn \nwide brim hat and an old dusty worn suit is leading a strange little beast \nof burden by a thick rope. The beast is short with thick stocky legs and \nlong thick hair covers its eyes. It is carrying an extra wide and very high \nload.\n\nWhen the man reaches the point in the road where he could not pass the your \ngroup, the beast makes three short and loud snorts, and the man stops walking.\n\nYou pull your hood over your head.\n   \n“Hail, kind traveler. I’m Robyn Hood of Sherwood Forest, and this is my \nwife,  Marian of Blidworth, and her handservant, Gretchen. The others \nare my Merry Men.”\n\n“Roby' 'ood!\" shouts the beast. He snorts and raises his head high, shaking \nit up and down in a sort of laugh that shows off his big white teeth. \n\n\"Bless my long floppin' 'ars! As I breath and live, 'nd I’ve been livin' \nand breathin' for near two 'undred 'nd fifty y'ars, it’s the great 'ood \n'imself!”\n\nThe beast looks up and around at each of you. He clearly opens his mouth \nto speak. All of you drop your mouth and gawk at the beast of burden.\n\nDon't worry, Robyn, I understand why you thought it would be the strange \nlittle man  to respond. I thought so as well!\n\n\"You...you...you've heard of me?\" You ask, shrinking down into your saddle.\n\n*page_break\n\n\"We all know the tales of Rob'n 'ood!\" The beast continues to snort and \nshake his head up and down. \"I’m Terrel, 'nd dis har’s Mars, my human. \nMighty fine ta meet y’all!“\n\n“I’m sorry,\" Marian begins, \"and I don't mean to stare, but you've surprised \nus. We thought, well, I don’t know quite how to put this.“\n\n“I know Mars har ain’t much to look at, but iff'n I’d known we'd be meetin' \nRoby' 'ood, I woudda cleaned 'im up good 'nd made 'im wear a suit 'nd tie!”\n\n\"Well, then, Terrel, would you mind helping us?\"\n\nTerrel shows his big teeth to you and Marian.\n \n“Why, course I help 'ya enyway I can Rob'n! What cha got in mind?”\n\n“Well, I was wondering if you know the way to the Black Elves' camp.”\n\n“Yep, seen 'um last mornin'.”\n\n“You did!” You and Marian exclaim together. \n\nTerrel looks around.\n\n“Oh, I see y'all got off the main trail way o’er thar.” He uses his nose to \npoint and you all look to the far right. “Iffin’ ya goes \nback ‘nd git on the road dat forks right by dat ‘ill over thar...” Terrel \nraises his nose “...y’all see the tip top of thar tents.”\n\nMarian smiles sweetly.\n\n\"Thank you Terrel, Mars. You've been very helpful.\"\n\nMars’ cheeks turns red and Terrel's lips spread. \n\nTerrel does a series of short snorts, and Mars leads forward. You all get \noff of the road to make room for them to pass. Terrel snorts three times, \nand Mars stops.\n     \nTerrel looks up at you and Marian one last time. \"May Vanuite be with ya\nall.\"\n\nHe makes series of short snorts, and Mars continues down the road.\n\n\n*goto rh10e\n\n*finish\n\n*label rh10d\n\n*page_break\n\nSuddenly, Marian is shouting.\n\n\"Look!\"\n\nComing down the hill is a small storm of low dust, and in the midst are \nriders heading straight towards you.\n\nThey are not human, but they are certainly full humanoid as you are, and\nit appears that they are all men. They are shirtless, and they wear\npants that billow from the rushing air that their horses are creating.\n\nThere are at least a dozen of them and their skin is the color of coal.\n\nYou know right away who they are.\n\nThe natives you've met on the road quickly run for cover.\n\nMarian, Gretchen, Will Scarlett, and Bo waste no time sending their arrows\nthrough the air as the rest of your men race to meet them somewhere on \nthe hill.\n\n\"Wait! Wait! There's no signal! We haven't dealt with the horses!\" You\nshout, but no one is listening.\n\nMarian turns her head as she's riding up the hill. \"Robyn!\"\n\n\"We're not doing this correctly,\" you say to yourself, but then you\nshake your head. No use arguing, no one is listening. You do as you're \nsuppose to do; shoot arrows at the Black Elves.\n\n*page_break\n\nWilliam and Little John meet the front of the riders first, crashing\nwith two of them, knocking them onto the ground. William fights with \nhis saber while his opponent unsheathe a sling blade. Little John \nfound no problem adjusting his staff to their blade.\n\nBecause of your men's constant and impeccable training, they take \ncontrol of the scrimmage in no time and the surviving Black Elves are \ngalloping back up the hill; however, you and your men already know \nfrom the map that they have made their camp in a small valley surrounded \nby the hills, so you do not rush after them.\n\nYou signal your men and gather them together to do what you do best.\n\n\"Okay, they know we're here,\" you begin, \"but we still have the advantage\nbecause they don't know that King Macken's coming.\"\n\nEveryone agrees.\n\n\"So what should we do?\" Tuck ask.\n\n\"Let's get in place. Jack and Allan, go by foot and sneak in the back \nand release the horses as we originally planned. Archers, let's get \ninto place. Bert, Geoffrey, Reiff, retrieve the horses that are loose. \nHugh and William, gather the dead. Everyone stay low and listen for the \nsignal.\"\n\n*achieve horses\n\nThere. Don't you feel better now that everything is back on track?\n\n\n*goto rh10e\n\n*finish \n\n\n*label rh10e\n\n*page_break\n\nIt has clearly been over three hours without a signal from King Macken,\nand you're beginning to feel uneasy. Your men are becoming antsy and you \ncan't help wondering what the Black Elves are thinking.\n\nThe men have been passing around the water because you're all thirsty, but \nyou seem to be the only one who's hungry.\n\n\"Just a little nibble to keep my stomach from growling?\"\n\n\"No, Robyn!\" Marian responds in a harsh whisper. \"You just have to wait like \nthe rest of us!\"\n\nThen, what you've been waiting for finally happens.\n\nAn extremely, high, sharp sound that sounds like strings and horns coming \nfrom the other side of the Black Elves' camp.\n\nThe signal!\n\nYour archers take to their horses and enter the camp shooting arrows. \n\nYou pump your arm up in the air.\n\n\"Go! Go! Go!\"\n\n*achieve arrows3\n\nAnd with a heart stopping growl, your men gallop hard into the camp swinging\ntheir blades at anything big that is moving.\n\n*page_break\n\nYou can hear the Elder Dwarves as they make their way through the other side\nof the camp.\n\n\"Robyn!\"  Marian is calling. You race into the camp, shooting along the way,\nuntil you find her and Gretchen by the cage holding the Laurels.\n\nKing Macken did not fully describe the Laurels correctly. You can see why \nthey are not able to survive on their own. They not only look like children, \nthey act as children.\n\nYou couldn't tell how old they are because they are different sizes, but the\ntallest wasn't as big as the shortest dwarf. \n\nIf they were human, they would be between the ages of two and eight.  They \nwore no clothing, which made them appear very fragile, and their skin is \ndark violet. Their eyes are bright green that didn't need the sun to shine.  \n\nThere are about thirty of them, and as Macken said, a few have wings, but \nyou can see that their wings have been torn from their backs.\n\nThey huddle in a close pack in the back of the cage, clinging to one another \nas best they can with their hands tie, looking at you. Their eyes are wide \nand their thin naked forms shiver. You can tell that they did not know that \nyou are there to rescue them.\n\nYou look around for Jack. \n\n\"Jack! Get over here with your tools! Now! Quick! We found the Laurels!\"\n\n*page_break\n\nSince he knew where the cage is, it didn't take long for Jack to arrive\nwith Allan close behind.\n\n\"We lead the horses out of the camp. No one will find them if they try!\"\nHe laughs.\n\n\"Great! Get to that lock. I don't know how the King and our people are\ndoing, but I know this all has to end soon.\"\n\nAs Jack works the lock on the cage, you, Marian and Allan cover him; but\nas soon as they enter to cut the ropes off of the Laurels'wrists, they \nbegin making a horrid squealing sound and walking over each other to\nget away from Jack and Allen. They wouldn't leave the cage even though\nthe door is open!\n\n\"What's going on!\" Robyn shouts.\n\n\"They won't let us near them!\"\n\n\"Robyn, listen!\" Marian yells.\n\nThen you notice. Other than the squealing of the Laurels, the sound of \nsteel on steel and men shouting is subsiding.\n\nWithout warning, between two tents comes King Macken with two of his \nCaptains.\n\n\"Oh, Robyn and Marian! You've done it! You've freed the Laurels!\"\n\n\"Yes, but we haven't untied them yet. They won't let us near them.\"\n\n*page_break\n\n\"Not a problem. They're unfamiliar with you, that's all.\" \n\nHe indicates to his two Captains to go into the cage. The Laurels look at \nthem and immediately calm down. They even allow Jack and Allan help cut the\nropes without being alarm.\n\nKing Macken smiles and nods his head. \"As I said, like children.\"\n\nYou jump down off of your horse and sit down on the ground. Marian and \nGretchen join you.\n\n\"Now, I'm not only starving, but I also need a nap,\" you say.\n\n\"Robyn,\" says Gretchen, \"I have to agree with you.\"\n\n\"Well, I know some of the water and food is meant for the Laurels, so \nlet's see what the King says before we take our turn eating.\"\n\n\"I'm sorry my dearest, but I have to override you on this one.\"\n\nYou stand up, search the pack on the back of your horse, pull out \nsomething that is been nicely wrap in white thickly woven cloth. \n\nAnd as everyone else is checking the camp to do a complete job of\nthe Black Elves, arrange to transport the Laurels with the humans on\ntheir horses or on the extra horses, and locate rope to lead the stray \nhorses to the city, you begin to eat.\n\n*finish\n\n*goto_scene rhendent4\n\n", "rhedent4": "*label rhedent4\n\n*page_break\n\n*image robinandall.png\n\nIt is late, and  you are ready to retire, but there is still activity\nall around you. \n\nYou didn't have to go to the Great Hall for your third meal; instead, in \nyour small tent community, long tables have been set up and are laden with  \nan assortment of breads, cheeses, and fruits while young Elder Dwarf maidens \nserve steaming hot bowls of a very aromatic fish stew. \n\nTorches create plenty of light on long polls and small pots containing fire.\n\nYou have not seen King Macken since you've return. He and Queen Leefa\nare busy getting the Laurels settle on the other side of their city and\nhave postpone the trip to Mount Kardalean.\n\nIt doesn't matter to your men. They are happily dragging out all of the\nweapons to clean, sharpen, and replace the shafts on the arrows. They\nspeak quietly, yet happily, about their experience so far since leaving \nSherwood Forest and speculate on what the days will bring.\n\n\nDespite your doubts, you sit without speaking next to Marian watching your \nmen. She holds your hand while she chats with Gretchen. \n\n\"I want a large kitchen with a tall counter in the middle for all of the\nfood preparation,\" Marian is saying.\n\n\"Why? You don't know how to cook. What you just described is for someone \nwho has a large family and knows how to cook!\"\n\nThe two ladies laugh.\n\n\"Well, I can learn! And Robyn and I are going to have a large family, so\nI need to learn how to cook.\"\n\n\"That's why ladies of your status,\" says Gretchen with a wink, \"hires a \ntrained cook.\"\n\nThey laugh together again.\n\nYou don't look towards Marian and Gretchen when you say, \"We're hiring \na cook.\"\n\nThey're quiet for a moment, then they laugh once again.\n\n*page_break\n\nBroon approaches you with a couple of Attendees close behind him.\nHe waits politely before he speaks.\n\n\"Good evening, Robyn.\"\n\nYou look over at him, a little startle.\n\n\"Oh, hello, Broon! I'm sorry, I was thinking about something. I didn't\nrealize that you were there.\"\n\n\"It's all right.\" He pauses. \"I have a message from King Macken.\"\n\nWhat is the message?\n\n*fake_choice\n\n  # Have Your Men Ready To Leave In The Morning.\n\n    \"So soon?\" You respond. \"We haven't had much time to rest from\n    today!\"\n\n    \"I'm sorry, Robyn, but we Elder Dwarves do not need much rest.\n    It may have something to do with our size, weight and metabolism.\"\n\n    \"Perhaps,\" you say. Then you look at him with sad weary eyes. \n    \"Can you speak to him on our behalf? We really do our best\n    Dragon slaying when we're fully rested.\"\n\n    \"Oh, no, no, no. I am sorry. I didn't mean to imply, Robyn, that we \n    would be leaving  for Mount Kardalean tomorrow.  \n\n    \"We're not?\"\n\n    \"Most certainly not.\" He pauses. \"The King would like to speak to\n    you about other matters concerning you and your people new life\n    with us.\"\n    \n    \"Oh, all right. Please convey that I'm looking forward to seeing \n    him.\"\n\n\n  # Have Your Men Shower Before They Retire.\n\n    \"A shower? As what we had shortly after we arrived?\"\n\n    \"Yes. It is our custom to have a shower, to be refresh before we\n    retire. The women will have a bath in the privacy of their tent.\"\n\n    \"That's a definite can do! We all really liked that shower!\"\n\n  # Meet Him In The Morning After First Meal.\n\n    \"Why, of course, I'll be happy to. Do you know why?\"\n\n    \"Ah, I advise the King on many subjects, but he does not come to me \n    for all of his needs.\"\n\n    \"Does that mean you really do know, but you don't want to tell me?\"\n\n    Broom looks at you and that noncommittal way of his.\n\n    \"There's nothing hidden in my words, Robyn Hood. The King does not \n    tell me everything. What kind of ruler would he be if he could make up\n    his own mind?\"\n\n    \"You are so right. I'm sorry for what I said.\"\n\n\"The King does want me to share with you that the journey to Mount \nKardalean is actually postponed.\"\n\nNot that you're complaining, you simply want clarification.\n\n*page_break\n\n\"Why is that? You all seem so anxious when we arrived.\"\n     \n\"Outward changes. With the Black Elves attack on the Laurel village, \nand the Forest Elves move to the other side of the land that belongs \nto the Elves of Light, King Macken has become worried.\"\n\n\"Worried about what?\"\n\n\"My experience has shown that signs like this means that something \nunusual has happened, is happening, or will happen. That's why he \nhas sent a team of scouts to survey the area before we attempt to \nclimb Mount Kardalean and enter the only door.\"\n\nYou squeeze Marian's hand.\n\n\"All right,\" you say while Marian holds your hand tight. \"How many \ndays will this scouting expedition last?\"\n\n\"We should have a report in a fortnight.\"\n\n\"That long?\"\n\n\"The King wants his scouts to be thorough.\" \n\nYou attempt to hold back your relief.\n\n\"All right. We'll be ready to leave in two weeks.\"\n\nWhat do you end up accomplishing during the two weeks?\n\n*choice\n\n  #A Honeymoon.\n\n    You woke up the next morning with Marian leaning on one\n    elbow, smiling down at you.\n\n    You turn on your side and look at her. \n\n    \"Why are you smiling so?\"\n\n    \"I was thinking that maybe we should use this time to be\n    alone together.\"\n\n    \"We are alone together,\" you say as you wink at her.\n\n    \"I mean, a honeymoon. We haven't had one. Gretchen and the men \n    are always around. And even when we've tried to go on a walk by \n    ourselves, something or someone always interrupts us.\"\n\n    \"You know that's actually a good idea. I'll talk to King Macken\n    this morning to see if we can take a little honeymoon over by the \n    ocean.\"\n\n    \"Perfect,\" she says as she reaches over and hugs you.\n\n    *set romantic %+10\n\n    *goto 12a\n\n\n  #Cross Training With The Dwarfs.\n\n    After a shower and the first meal on the first full day, your men \n    are doing what they do best; drilling. \n\n    They've set up make shift targets and began by practicing with swords\n    and staffs, and fighting one another in pairs. Others are on their horses, \n    speeding around the outermost edges of the tent community, practicing \n    wide turns and narrow turns, while picking up objects with the end\n    of their swords.\n\n    You sat on top of your steed shouting critiues, advise, warnings, and \n    commands at your men, giving out a thumbs up when appropriate; however, \n    you do not smile. That gives them the wrong impression.\n\n    In the meantime, Marian and Gretchen sit with a small group of\n    Elder Dwarf women learning how to spin fine wool. It seems that the \n    Elder Dwarves clothes are thick due to the low temperature inside of \n    the mountain, and they are preparing to return their homeland. \n    \n    *set leadership %+10\n     \n    *goto rh12b\n\n    \n\n  #Go Exploring.\n\n     In the morning, after the first meal, you met with King Macken.\n\n     \"I would like to have your permission, your highness, for us to do\n     some exploring during these two weeks while we wait for your\n     scouts to return.\"\n\n     \"A grand idea,\" he responds, \"we're thinking of like minds. I believe\n     that since you'll be living here with us at Kardeen, you need to become\n     one with Kardeen.\"\n\n     \"I like the sound of that,\" you respond. \"We are excited at the thought\n     of being a part of Kardeen.\"\n\n     \"Splendid. I will arrange a trip to the small coastal village of Sumage.\n     You may leave after I have prepared you some provisions.\"\n     \n     *set brave %+10\n\n     *goto rh12c\n\n*label 12a\n\n*page_break\n\n*image robinmarian.png\n\nKing Macken sets up a small group of Attendees and escorts to accompany \nyou and Marian to the coast laden with all of the conveniences you will\nneed for two weeks. You and Marian didn't have to lift a finger. They're \ntaking care of the cooking, cleaning, and all of your basic needs.\n\nThere are even some times for pleasure including  soothing oil massages\nand rejuvenating sea weed baths. \n\nWhen is the last time you had a seed weed bath?\n\n*achieve seaweed\n\nThis is exactly what you two lovers need. The time to be alone with\neach other is essential. You are refamiliarize being yourself with the \nother without worrying about any troubles. \n\nInstead you've been given the time to remember why there's love between \nyou in the first place. Now you have the privacy to begin your family.\n\n\"This is living,\" you say to your wife one afternoon when you are\nstretch out on the beach watching the sunset, drinking some sort of cold\nfruity juice.\n\n\"And you're sure you're okay about living on Kardeen?\" She ask.\n\n\"Yes, I am. It's beautiful here and I like King Macken and his people.\"\n\n\"What about going after Endent?\"\n\nWhy did she have to ruin a perfect honeymoon?\n\n*finish\n\n*goto_scene rhedent5\n\n\n*label rh12b\n\n\"Hail, to you, sire Robyn Hood,\" came a voice. You look around and see no \none. \n\nThe voice clears its throat. \"Ahem.\" A pause. \"Down here, sire Hood,\" it \nsays.\n\nYou look down and see one of the King's Captains in casual military dress \nlooking up at you. He has a few soldiers with him.\n\n\"Forgive me for the intrusion,\" he says with a bow.\n\n\"Oh! You're not intruding, I just didn't see you!\"\n\n*page_break\n\n\"So sorry. I am very aware that you weren't expecting me, and you being \nso high…\" \n\n\"Yes,\" you don't allow him to continue his comment, \"Clint is a very \nlarge horse and that makes me even taller in the saddle.\"\nYou chuckle as you thought about your remarks. \"I didn't mean to \ninsult you.\"\n\n\"You didn't insult me, sire. As I said, I am aware of our height \ndifference. Nothing can be done to change that.\"\n\n\"Correct you are!\" You smile. You wait, but when he didn't continue.\nyou ask, \"Did you want to see me about something? \"\n\n\"Yes. I am Captain Lock, and these are a few of my unit. We've been \nwatching your men.\" He pause as he looks around the field. \"What are \nthey doing, exactly?\"\n\nYou furl your brow, and look around yourself.\n\n\"Do you mean, the drills?\"\n\nHe looks up at you and it's his turn to have a furl brow.\n\n\"I assume that's what I mean.\" He pauses and looks around the field\nagain.\n\n\"Is there something about the drills you don't understand?\" You \nask.\n\n*page_break\n\n\"Yes, that is exactly what I mean.\" \n\nHe spends a few moments watching the sword fighting. \n\n\"For example,\" he continues as he points towards the men, \"those men are \nfighting one another,\" then he points to the men on horses, \"while those \nmen are riding horses around the circle picking up things with their swords.\"\n\nHe looks up at you again. \n\n\"I don't understand the reasoning behind any of this. Why would your men \nfight their own  comrade, or shoot arrows and throw a knife at nothing?\"\n \nYou start to laugh, but you hold it back because you don't want to insult \nthe Captain.\n\n\"Drills is a word that means practicing one thing long and hard, over and\nover.\"\n\nThe Captain continues to look around the field.\n\n\"You see, we're not trying to hurt one another when we're practicing sword \nfighting. Yet, without the practice, we would be less ready to fight the \nreal enemy.\"\n\n\"Do you mean your men drill on a regular basis?\"\n\n\"Oh, yes, especially if it's something new we're learning.\"\n\n*page_break\n\n\"I think I understand. And is it the same with riding your horses? Are you \nteaching your horse to run fast with you mounted as you hit something?\"\n\n\"Yep, that's right.\"\n\n\"Yes, yes, I think I do understand. But I also notice that most of your \nfighting has to do with attacking your opponent from the waist up.\"\n\n\"Well, yeah, of course.\"\n \nRobyn, I know you think that's an odd observation from the Captain, and I \nknow you're not sure what he's implying, but you should show interest.\n\n\"Have you ever thought of hitting them anywhere from the waist down?\"\nThe Captain continues. \"You'll be surprise how much damage you can do \nonce you've brought your enemy to his knees in one stroke.\"\n\nYou bring your hand up to your chin. \n\n\"Hhmmm? Can't say that I've ever thought of that, but I like the idea.\"\n\n*page_break\n\n\"Shall I show you? There's several ways you can go about it, especially\nfrom your height.\" He pauses. \"In return you can show my men your \ndrills.\"\n\n*achieve axe\n\nYou smile as you look around the field.\n\n*page_break\n\n\"Little John, Will, Lars,\" you call, \"come and meet Captain Lock and \nhis men. We're going to do a little cross training.\"\n\n\"We can also, uh, drill you on ways to use an axe. Very effective if\nyou want to disembowel someone.\"\n\n*achieve axe\n\n*finish\n\n*goto_scent rhedent5\n\n*label rh12c\n\nIt is late afternoon before you and yours are ready to saddle up for the\nride to the sea.  This time there is no unusual illusion of the natural\norder of time moving faster than its suppose to; instead, you enjoy a nice \ngalloping of the horses to your destination which allows you to enjoy the ride.\n\nKardeen is a lovely country.\n\n*page_break\n\nBesides the individual supplies that you each carry on the back of your horse, \nKing Macken sent a cart full of tents and food stuff, including a new mother\ngoat tie to the back of the cart so that you will have fresh milk for drinking\nand cooking.\n\nYou had watch the Attendees load the cart and witness many unfamiliar objects \nthat you cannot explain, but, hey, this is Kardeen, and you figure there is \nplenty of time for questions and learning how to use those tools later.\n\n\nIt is dark as you enter Sumage and fire lamps are hanging in various places\nthroughout the village. The houses are small, but then what do you expect? \nEvery dwarf isn't going to live like the king and queen. This is a village\nafter all, not the capital.\n\nYou notice immediately that there is nobody about, and it is very quiet, and \nyou'll find out why that is shortly.\n\nThe wagon driver pulls up to the fourth house. It is the only house on the \nstreet with all of the lights on.\n\nTwo dwarves sitting near the front door stand upon seeing your party. Three \nsmaller ones are already waiting below the steps, maintaining the urge to run \nto the wagon. \n\n\"Hail, Jain!\" The driver calls out.\n\n\"Hail to you, Gregor!\" \n\n*page_break\n\nThe husband and wife walk down from the porch to join their children. Jain \ncontinues to the driver side of the wagon and reaches up to shake Gregor's \nhand.\n\n\"You made it in good time,\" he says. \"I thought for sure that I would \nhave to bed the children before you arrived and they would miss seeing \nour guest.\"\n\nYou, Marian, and Gretchen dismount and walk towards the dwarf family.\n\n\"Jain, I'd like for you to meet sire Robyn Hood. And this is his wife, \nDam Marian, and her hand servant, Maiden Gretchen. Sire Robyn, Dam Marian,\nMaiden Gretchen, this is your host, Master Seaman Jain.\"\n\n\"Sire Robyn,\" Jain begins with a smile and a bow, \"this is my loyal wife, \nJen, and our three children.\" They each smile and bow to you. \n\n\"I hate to rush, but please excuse my wife while she beds the children. In \nthe meantime, I will show you to where your quarters will be during your \nvisit.\"\n\nJain's family bows, and then Jen rushes the children into the house.\n\n\"Follow me.\"\n\nYou return to your horses and allow Gregor to lead the way as he follows \nJain to the back of his property. Two dwarves were waiting.\n\nTo your surprise there is a large structure. Jain has help opening the high \ndouble doors and assisting you all inside. \n\n*page_break\n\n[i]This[/i] is a very large structure. \n\nYou dismount your horse and Gregor gets down from the wagon. Jain approaches\nthe two of you. \n\n\"It is pass bed, so I have to delay taking you with my crew and I on your first \nmorning.\" \n\n\"Why is that?\" You ask.\n\n\"We rise at four  in order to eat and travel to the beach.\"\n\n\"Oh, I see. That's why the town is already, uh, close. Bed time is very early\nhere.\"\n\n\"Yes, very much so.\"\n\n\"I'm sorry we arrived late.\" You smile apologetically. \"This is like our vacation \nand we were in no hurry.\" \n\n\"Then I want you to take as much time as you need to set up your tents and to \nget comfortable. I can leave you two of my men who help around our small garden\nfor tonight. `Jen will help set up first meal after I and the children are gone.\" \n\n\"Sounds fine,\" you say, \"we'll be just fine. See you tomorrow.\"\n\n*page_break\n\nJain starts to walk away. \n\n\"Oh, and Jain, thank you so much for the opportunity to explore your village\nand surrounding areas. We so look forward to it.\"\n\nJain stops and looks at you. For a few moments he's a little speechless.\n\n\"Explore? Oh no, we're getting out on the water to catch fish.\"\n\nHe waves, smiles, and continues back to the house.\n\n\"Catch fish?\"\n\nThis is not what you had in mind when you spoke to King Macken. \n\nStill, think of it this way. Your men will be fishermen by the time the two\nweeks come to a close.\n\n\n*finish\n\n*goto_scene rhedent5\n\n\n\n\n\n\n\n\n\n     \n\n   ", "rhedent5": "*label rhedent5\n\n*page_break\n\n*image robinandall.png\n\nThe scouting team's return did not mean an immediate embarkment on \nyour trip to Mount Kardalean. The King and Queen first have secret\ndiscussions with the scouts that include the Eldest Dwarves, the \nCaptains of their troops, and Broon. This conference went on \nfor an additional two days.\n\nFinally, you and your team receive an invite to join them in the\nGreat Hall where you sit comfortably in the larger chairs, enjoying\nfruit and wine.\n\n\"There are many things we must discuss and complete before we can \nenter the great mountain,\" King Mackin begins. \"First, there were \nmany rogue Elves taking advantage of travelers and the citizens of \nthe smaller surrounding villages. They have been eradicated.\"\n\nYou stand to get his attention.\n\n\"Do you mean, we will [i]not[/i] be running into the Black Elves?\" You ask.\n\n\"Yes.\"\n\nYou make a great sigh of relief and your shoulders automatically\nrelax.\n\n\"We may, however, meet up with trolls.\"\n\nYou don't like the sound of that. Your shoulders are tense again.\n\n*page_break\n\n\"Huh? Trolls?\" \n\nThe lead scout, Sasheen, stands to volunteer an explanation. \n\n\"It is tradition for stronger trolls to leave their mothers, sisters \nand weaker brothers to wander with male siblings, or alone when they \nreach a certain age.\" \n\nShe knows that none of you will know this vital information, \nconsidering you're the newcomers to this land, so she continues.\n\n\"They are dangerous enough considering their full-adult size, which\nis monsterous. However, if, when they are young, they are captured \nand trained to be submissive to the Black Elves, they become an \nextremely perilous foe.\"\n\nYou try not to show fear in your face as you reach for Marian's\nhand, but King Macken is able to read it just the same.\n\n\"Do not worry Robyn. I'm increasing our military troops on the \nquest for this very reason.\"\n\n\"Very good,\" you say with a nod of your head and a smile on your \nface.\n\n\"In addition,\" King Macken states, \"our scouts found that the \ndoor used by our ancestors to exit our homeland has been sealed by \nElven magic. I have contacted the Maiges with white bird. \nWe cannot leave until an Elf who can remove the magic arrives to \njoin us.\"\n\n*page_break\n\nMarian leans in towards you and happily whispers,\"How exciting. We \nget to see the elusive Maige Elf!\"\n\nYou don't return her excitement. In your head an Elf is an Elf. \n\n\"Sasheen and her team also found,\" the King is saying, \"that large \nfissures were created when the top of the mountain collasped.\nTherefore, I am sending a burrowing crew ahead of us to open up \none of those fissures and create a new door and steps leading to the\ninterior. We should not leave ourselves with only one way in one way \nout of the mountain.\"\n\nThe King pauses for a moment to look around at the crowd who quietly \nwait for him to continue. He looks directly at you.\n\n\"Lastly, while we wait, we must prepare warmer clothing for you \nand your men, Robyn, for it is very cold inside of the mountain.\" \n\nQueen Leefa stands to take her turn.\n\n\"Your women have been learning how to weave cloth from wool and \nare already wearing clothing that is befitting a maiden of our \nculture. Although the weather is almost always pleasant here, it is \nnot the same inside the mountain. In the time that we have \nbefore we reach the door, we must prepare the men for the temperatures \nwe will face once inside.\"\n\nYou hear your men mumbling their disapproval. You stand to address \nthe Queen.\n\n*page_break\n\n\"Um...Queen Leefa, I understand why you dress as you do, and we do \nwant to be one with the Elder Dwarves, including taking on your \ncustums. Still, (and you try not to say this as if you're begging)\nwould it be all right if we men continue to wear our own clothing \nunderneath yours?\" \n\nShe looks at you with a blank stare. \n\n\"It will help my men feel more secure and adjust to the changes \neasier.\"\n\nKing Macken stands up to speak to his wife, and Broon joins them \nfor a brief private conference.\n\n\"Yes, we see no problems with that as a choice,\" your new Queen\nreplies.\n\nYou exhale and say, \"Thank you\" and bow before you return to \nyour chair.\n\nKing Macken takes Queen Leefa's hand.\n\n\"That is all, unless I have forgotten something that needs to be \naddressed before I release all of you to prepare for departure.\"\n\nHe waits, and when no one speaks, he says, \"You have been warned,\nnow be prepared.\"\n\n*page_break\n\n\nA week later, you are looking up the front side of Mount Kardalean. \nYou can see where there once was a large opening in the front, about\ntwo levels high, where large boulders now jot in and out.\n\nAfter the mountain is rid of Edent, the construction crew can begin\nrebuilding the front door as well.\n\nThere is snow on the caps, otherwise the rugged surface is gray, and\nthe lower slopes is a luscious shade of green.\n\nYou're still sitting on Clint while your men set up camp. The King\nand his troops are on the far left, and the women with the rest of his\nstaff are closer to you in the middle.  Marian and Gretchen are \nwith them now adding the last touches to your warm woolen clothing. \n\nThe two Maige Elves have arrived. From this distance, you know \nthey are the Maiges because:\n\n*fake_choice\n  #They Are Staying Close To King Macken And His Personal Guard.\n\n    They were part of King Macken's team, yet they are thin and\n    taller than the Dwarves, which makes them hard to miss. \n\n    They are riding up front with him because, they are, after \n    all, royalty. It would be unthinkable for them to ride in \n    any other order of the convoy.\n\n    They definitely didn't need the protection of the Dwarf army.\n    They're natural magician after all. \n\n     \n  #They Have A Natural Glow To Them.\n\n    Even in the day light, these two, tall, slim, beings with pointy\n    ears, long black hair, and eyes that glow unnaturally can be spotted \n    easily across the camp. Their pale green skin that is almost \n    transparent shines just enough that they glow.\n\n   \n  #They're Acting More Superior.\n\n    It's already been explained to you that the stronger Fair Folk\n    Help the weakest, but you've found nothing that weak about the \n    Dwarves just yet.\n\n    And if the Maige Elves are so superior, where have they been \n    where Edent is concern?\n\n*page_break\n   \nThe Maiges carry their own property on the back of their horses, \nspeak very little and kept to themselves.\n\nYou and Mariann are introduced to them, but that's all. They show \nno interest in having a conversation with you thereafter.  However, \nyou know that one is a Chief Sorcerer and the other a student.\n\nThey will climb the mountain with you and open the door, then they will \nturn around and return to their home. They will not stick around and help \nyou kill Edent.\n\nYou continue watching the Maige Elves when Tuck walks up to you.\nHe looks up the height of the mountain to the snowy peaks.\n\n\"Are you ready to begin the climb tomorrow mor
