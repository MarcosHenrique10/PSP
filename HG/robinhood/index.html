rse to the front so you can leave first \n    thing after breakfast.\"\n\n    *set leadership %+10\n\n   \n    *goto_scene mmgretchen\n\n\n  #Dress As A Man And Look For Him Yourself.\n    \n    Gretchen has one of your lower servants fetch a large basket \n    from one of Palace's lower servants.\n\n    \"Put my men clothes and hat, the skin glue, scissors, and a \n    mirror into the basket, Gretchen, and make sure there's plenty \n    of balls of yarn and needles on top to hide them.\"\n\n    \"Got it.\"\n\n    \"Then place it under the bush on the far south end corner of \n    the stable.\"\n\n    \"Okay.\"\n    \n    You approach Joan, who looks at you surprise when she notices \n    that you're wearing riding clothes.\n\n    \"Are you going somewhere?\" She ask.\n\n    \"I'm still very restless from that long carriage ride from \n    Nottinghamshire. I think I rather go out riding before lunch. \n    The fresh air will do me some good. That is, if it's all right \n    with you, Joan?\"\n\n    Joan wants you to work on a quilt with her, but gives in to \n    the desires of her guest.\n\n    \"Well...of course not, dear. I understand. We can talk this \n    evening. It is a gorgeous day for a ride.\"\n\n    \"I thought so as well.\"\n\n    You give her a hug and a kiss on the cheek.\n\n    *set brave %+10\n\n    *goto_scene mmmarian\n\n  #Send Your Trusted Messenger.\n\n    Your entourage includes Todd, the youngest of your family's \n    three official messengers who live on the property in London.\n\n    Before breakfast, you rise early to write two letters. One,\n    \"To Whom It May Concern,\" introduction letter for anyone who \n    claims to know Robert or his whereabouts. \n   \n    The second with more detail about Robert and where you would \n    be waiting to meet him in the back of the castle if the letter \n    reaches him.\n\n    After breakfast, and before you join Joan for a little bit of \n    gossiping and quilt making, you give Todd some instructions.\n\n    \"Be sure to wear the Palace colors that I left for you in your \n    room. That way whoever approaches you knows this is official \n    business. Only say what I've written down here, nothing else. \n    Do you understand?\"\n\n    \"Yes, Maid Marian.\"\n\n    \"Robert stands about five feet, eleven inches tall. He's not a \n    thick man, but sort of thin, with reddish-brown hair, and ocean \n    green eyes.\"\n\n    \"Ocean green eyes. Yes, I understand.\"\n\n    \"Only give this second letter to anyone who fits that description \n    or who claims they know Robert Dore. No one else, understand me?\"\n\n    \"Yes, of course, Maid Marian.\"\n\n    \"Then come back to the Palace and report directly to me. If the \n    sunsets and you have no luck, well, just return it and we'll try \n    again tomorrow.\"\n\n    *set cautious %+10\n\n    *goto_scene mmmessenger\n\n  \n\n\n", "mm7": "*label mm7\n\n*page_break\n\n*image daffodilrobin.png\n\nYou are proud of Robyn when he admits to aiding the poor by \nsupporting them with money, food, and seeds that he and his \nMerry Men steal from the rich. \n\nYou're so proud of him that you have join Tuck of the Newstead \nAbbey in being Robyn's spy around the Palace, in London, \nNottinghamshire, and Sherwood Forest. In addition, since Robert \nDore is no longer on the top of the wanted list, you're free \nto visit Lady Smyth whenever you can and share secrets so that \nshe knows that her son is alive and safe. \n\nYou continue to be Marco de Luna, winning events at tournaments \nand festivals to the delight of the spectators; and in disguise, \nyou help pass out the money and food and other items that the \npoor need or trade in the nearby hamlets and towns.\n\n\nIt has been over three years since Robert became Robyn Hood when \nyou are at Court with your father and mother. Some very important \nissues are brought to Prince John's attention that you will have \nto tell Robyn about immediately.\n\nWhich will you tell him first?\n\n*fake_choice\n  #Complaints About The Goings On In Sherwood Forest.\n\n    A Baron comes forward to address Prince John.\n\n    \"My favorite short cut through Sherwood Forest is now a haven \n    for beggars and thieves,\" he begins, \"and the most abominable \n    of them is the one they call Robyn Hood. No one is safe from \n    he and his band. Something has to be done!\"\n\n    Another Baron didn't wait to be recognize and shouts, \"I've \n    been robbed three times and had to walk to the nearest village \n    in my stocking feet!\"\n\n    \"Several of my fine steeds did not make it to market. They and \n    my horsemen completely disappeared!\" Shouts another.\n\n    \"My wife and children were robbed and left tied to a tree!\" \n    Shouts yet another.\n\n    Soon court protocol is abandon and the room is fill with the \n    noise of angry Barons making one complaint after another about \n    Robyn and his men.\n\n    \n    \n\n\n  #The Sheriff of Nottinghamshire's Report.\n\n    Prince John is sitting high on the thrown as if he is King \n    instead of Richard.\n    \n    \"The Sheriff of Nottinghamshire has something to say about an \n    outlaw known as Robyn Hood.\"\n\n    The Sheriff moves to the front of the Court and clears his \n    throat.\n    \n    \"Ahem.\" \n\n    He puffs out his chest and pulls out a scroll from his breast \n    pocket. He begins to read from it.\n\n    \"It seems that many reports from farmers and businesses men \n    in and around Sherwood Forest are coming in concerning large \n    quantities of items disappearing at one time from their property. \n    From what we can tell this is not the work  of one man, and \n    an investigation is currently underway. If you have any \n    information concerning any large theft, please report to me as \n    soon as possible.\"\n\n    The Sheriff rolls up the scroll, places it back into his pocket, \n    then returns to his place in Court.\n\n    \"Ahem.\" He clears his voice again and coughs.\n\n    \"What about Robyn Hood?\" A Baron shouts without waiting for \n    recognition.\n\n    The Sheriff worriedly looks at Prince John.\n\n    \"What about Robyn Hood?\" Prince John asks nonchalantly.\n\n    \"Rumor has it,\" the Baron says,\" that he and his men are \n    responsible for all these thefts. And I for one is sick of \n    it! I can't even use my favorite short cut through the forest \n    without the possibility of being accosted!\"\n\n    Suddenly, several Barons are shouting, \"Me either!\"\n\n    \"Would you like for me to look into the matter myself?\" \n    Prince John ask.\n\n    There is a big uproar in the court basically with everyone \n    shouting some form of, \"Yes!\"\n\n   \n\n\n  #The Sheriff And Prince John's Plan.\n\n    When all who had come to have a audience with Prince John \n    has had their say, he stands up to address the court.\n\n    \"The Barons met secretly recently here and discuss the \n    problem of the outlaw known as Robyn Hood. The Sheriff of \n    Nottinghamshire will tell you of his plan and what has been \n    done to rid the forest of him, his men, and all other Godless \n    ruffians who live there.\" \n\n    The Sheriff comes to the front of the court and stands below \n    the Prince on his right side.  He faces the audience, and clears \n    his throat.\n\n    \"Ahem.\" He looks around with a meek smile.\n\n    He clears his throat again. \"Ahem.\" \n   \n    He quickly jerks his head over at the Prince who glares at \n    him. \n\n    \"Well, hum...I figured if there was a large collection of gold, \n    you know, if the Barons and other Royals would pool their money \n    together, we would have a large bounty to put on Robyn Hood's \n    head. Dead or alive, of course.\"\n    \n    Then, a sudden uproar came from the mouths of the Barons that \n    are in attendance.\n\n    “What? I’m not giving a single shilling out of my hard earned \n    money!\"\n\n    “There is no way I’m going to go for this! My daughter’s birthday \n    is coming up, and she deserves the ultimate best sixteenth birthday \n    ever!\" \n\n    “Your daughter? What about my wife? If she hears about this, I’ll \n    be sleeping with my dog, Peaches, for the rest of our marriage!”\n\n    Protocol is forgotten and the noise the angry Barons are making \n    over the refusal to contribute to the reward for Robyn Hood becomes \n    over bearing.\n\n  \n\n\n*page_break\n\nAll and all, Prince John, being who he is, did not let the mayhem \nmake him loose his cool. He calmly raises one of his hands to \nshoulder length and the Protector of the King brings the court to \norder.\n\n\"You idiotic hens,\" he begins. \"The Barons who had attended the \nsecret meeting have already donated three hundred gold coins to \nhire experience bounty hunters to rid England of that scoundrel, \nand you're making trivial excuses for not pitching in?\"\n\nA mumbling arose among the court.\n\nJohn looks around and smiles his most devilish smile.\n\n\"The one known as Robyn Hood is now an official Enemy of The \nCrown, wanted dead or alive.\"\n\nHe returns to his chair and raises one eyebrow as he says, \n\"Satisfied?\"\n\nThe mumbling continues until John raises his hand.\n\n\"My last announcement for today.\" He pauses. \"We're having a \nvery special archery tournament in Nottinghamshire on the weekend \nof the 12th.  I assure you, it will be an event you will not want \nto miss.\"\n\nWith that, the Court Administrator rises from his seat, and Prince \nJohn exits, the Protector of the King following close behind with \nfour of the King Guards and the Court Administrator.\n\n*goto_scene mm7a\n\n", "mm7a": "*label mm7a\n\n*page_break\n\n*image tales.png left\n\nYou and Gretchen spend the previous night at the Palace \nand are now racing down the main road to Edwinstowe \nto make it to Robyn's great oak hide out and back \nbefore anyone of importance misses you. It is just \nbefore the sun is gone from the sky, and you usually\ntry not to be gone so late.\n\nAt this point, you're able to make a decision on which \nadventure you lead Robyn, his Merry Men, and Gretchen \nmy the choice you make for Marian.\n\nDo You...\n\n*choice\n  #Encourage Robyn To Leave England In Order To Escape the Bounty?\n  \n    You and Gretchen reach the end of Edwinstowe Church, \n    and was about to turn the corner when a bright light, \n    brighter than the sun, engulfs you. You try to bring \n    Daisy to a halt, but she continues racing through the \n    forest, as you block your eyes with both hands.\n\n    *set coward %+10\n    *goto_scene mmescape\n\n    \n  #Talk Robyn Into Aiding Beings From A Distant Land?\n\n    You and Gretchen reach the end of Edwinstowe Church, \n    and was about to turn the corner when a bright light, \n    brighter than the sun, engulfs you. You bring Daisy \n    to a halt, and you block your eyes trying to see \n    what's in front of you. You can sense that Gretchen \n    is still beside you, but you cannot see much else. \n\n    As the light becomes dimmer, six figures on horseback \n    emerge. They appear ageless; tall, thin, with golden \n    hair and pointed ears. An unnatural glow comes from \n    their eyes. One is a female and the others are males. \n    The female and are the tallest male and they lead the \n    other four. A silvery-while sphere hovers over their \n    heads.\n\n    Their horses are white, and an aura of silvery-white \n    light continues surrounds them. \n\n    *set cautious %+10\n\n    *goto_scene mmelves\n\n #Request Aide From The Hag?\n\n    You and Gretchen reach the end of Edwinstowe Church,\n    and was about to turn the corner when a bright light, \n    brighter than the sun, engulfs you. You bring Daisy to \n    a halt, and you block your eyes trying to see what's \n    in front of you. You can sense that Gretchen is still \n    beside you, but you cannot see much else.\n\n    \n    With out warning, you find yourself in a dark alley. \n    Only two lambs glow above doors without numbers giving \n    the row of dirty windows and walls that need painting \n    an eerie glow. \n\n    Slowly, a deep darkness takes shape in front of you. \n    You turn to face Gretchen, and she nods her head to \n    verify that she too sees what you see. You touch your s\n    aber on your belt and she touches her bow.  \n\n    The shape turns into a person, shorter than you, or it \n    has a deform back, wearing a long black cape with tatters\n    and a hood pull over its head. \n\n    An evil cackle comes before the words.\n\n    \"Don't be afraid, little Missy. It's I who you seek. \n    I've been expecting you and your handmaiden.\" The Hag \n    announces unexpectedly. \"I know why you're here, and I'm \n    willing to help, but you must give me what I want first.\"\n\n    You begin to open your mouth. She snarls at you.\n\n    \"Not here you brat!\" She looks around. \"Quietly. \n    Follow me.\"\n\n    *set brave %+10\n\n    *goto_scene mmhag\n\n   \n\n", "mmelves": "*label mmelves\n\n*page_break\n\n*image elves.png\n\n“Greetings, Maiden Marian and Maiden Gretchen,” the tall \nlead horsemen says.\n\nYou and Gretchen gasp, but you do not say anything. You are \nnot afraid. \n\n“I am Jaeden, and this is my wife, Killia. We are the Elves \nof Light, and it is not accidental that we have come across \nyou on this road on your way to see Robyn Hood of Sherwood \nForest. We have come a long way to meet you and he.”\n\nYou smile. Without thinking twice about it, you say, “Yes, \nyes, we can take you to meet Robyn.\"\n\nYou continue on your way to Robyn's camp with the Elves \nclose behind. They do not say anything else, but you \nfeel a glow of warmth building inside of you and you \nknow you can trust the Elves. You know, when this all\ncome to an end, they will help you. \n\nSoon you can see the hanging lamps on the major oak and \nthe surrounding area where Robyn's camp lies. \n\nTheir tents are large enough for two men to share and \nthey are set up around a large central fire. Around the fire \nare logs for sitting. The fire is already lit and you can hear \nthe men talking, cursing, singing, and laughing.\n\nYou turn to face Jaeden.\n\n*page_break\n\n“Let me go ahead and tell him. There is something of extreme \nimportance that I need to tell him as well. It's why I was \ncoming this evening.”\n\n“I know,” Jaeden says.\n\nYou look at him oddly. How could he know, you wonder.\n\n\n*page_break\n\n*image daffodilrobin.png\n\nIn the midst of all of the jeering, cursing, singing and \nthe drinking by the Merry Men, you rush into the camp to \nfind Robyn near the fire. You throw yourself into his arms.\n\n\"Oh, Robyn! I bring some good news and some bad news.\"\n\n“Everyone, listen!” He shouts. “Quiet for a bit, will you? \nSomething's up with Marian.”\n\nThe men do as he ask, although, being concern, they mumble \nloudly to no one in particular.\n\n“What?”\n\n“What's wrong?”\n\n\"What's going on?\"\n\n\"Maid Marian is here.\"\n\n\"Where is my Gretchen?\"\n\nThat last one was Tuck. You already know how the two of \nthem havebecome very cozy lately, and that has made you \nhappy.\n\n\"I brought a small group of Travelers who have been seeking \nyou and I.\"\n\n“Seeking us? What for?”\n\n*page_break\n\n“I have to let them tell you, Robyn, but I know you'll \nbe endeared with them as quickly as I have.”\n\nYou smile up at him brightly; however, he has a leery \nlook on his face.\n\n“Robyn, seriously, look at me.” You put your hands on \nthe sides of his head and turn it towards you. “Gretchen \nand I were on our way here with important news, important \nbad news, when suddenly they appear in front of us, as \nif by magic.”\n\n\"Magic?\" He ask, eyes darting side to side.\n\n\"Well, no, not exactly, but if they were able to get past \nyour alarms and your men,” you continue, “I knew they had \nto be extraordinarily special and you must hear whatever \nit is they have to say.”\n\nJust then the Elves approach on horseback being lead towards \nthe campfire by Gretchen, your horse trailing behind. An aura \nof silvery-white light surrounds them.\n\nYou turn around. “Oh, here they are now!”\n\nThe Merry Men instantaneously unsheathe their swords, cock \ntheir arrows, and glare threateningly at the strangers. William \ngrowls.\n\nRobyn raises his hood, steps behind you, and shakes noticeably.\n\n*page_break\n\nYou push Robyn in front of you.\n\n“Robyn, there's no need to be frightened and your men can put \ndown their weapons. The Elves of Light come in peace,” Gretchen \nsays.\n\n“Indeed Robyn,\" King Jaeden begins, \"we have come in peace. I \nam Jaeden, King of the Elves of Light. You and your men need \nnot fear us.”\n\nRobyn's men look back and forth between you and the visiting \nElves, waiting for a signal from Robyn. However, slowly, as \nif in a dream, the men put their weapons away without Robyn \nsaying one word.\n\nHe attempts to step behind you again, but you shove him \nforward.\n\n“We, the Elves Of Light, have traveled far seeking you and,\nMarian,“ continues the King.\n\n“What? Seeking us? But...but why? I can't even figure out \nhow you can speak English.\" Robyn reacts. \"Is this magic?\"\n\nThe expression on the Elves faces do not change.\n\nKillia, the only female, whose long hair flows down her \nback, speaks directly to Robyn.\n\n*page_break\n\n\"Robyn, there is no magic, only illusions.\"\n\nYou're not sure what that means, (how did they miss\nyour alarms and traps, huh?) but you step once again \nbehind Marian, and she returns you to the front.\n\n“You are the legendary, Robyn Hood of Sherwood Forest,\"\nshe continues, \"and the tales of your heroism spread far \nand wide.\"  \n\n\"We know of your companion, Marian,\" Jaeden interrupts. \n\"She is good in her heart and she is wise. We know that \nyou are the only ones who can help us.”\n\nJaeden has been watching you without blinking his eyes.\n\n\"This is not our first involvement with the Children of \nMan,\" he continues. \"Many of the Fair Folk speak your \nlanguage, but we've come to you at this time for the \nspecial...how you say...delicacy of this quest.\"\n\nYou notice Jaeden slowly reach over and touch his \nQueen's hand.\n\nYou lean up against Robyn and whisper in his ear. “Robyn, \nwhy are you acting this way?”\n\n“Please Robyn,” says Jaeden. “Listen to our tale.”\n\n“I don't know...”\n\n*page_break\n\nYou jab him you in the arm and whisper in a rush. “Robyn, \ngive them a chance or no snuggling by the fireside before \nI must leave tonight.”\n\nThere, that ought to convince him. You know how much just \nloves he just loves to snuggle.\n\n\"Robyn,\" Killia raies her voice, \"you are a very clever man, \nand Marian is brave and smart with many skills. We know that \nyou and she are the best for this quest, otherwise we would \nnot be here wasting our time speaking to you right now.\"\n\n\"Wait, can I first ask, where are you from?\"\n\n\"We are from a place where the free Fair Folk dwell. Our home \nis call Varna,\" Jaeden answers.\n\n\"I thought all of the known world has been explored by now,\" \nyou say. \"Why haven't I heard of Varna?\"\n\n\"We are not like the Children of Man,\" Kilia says.\n\n\"Our home was hidden long ago from mankind. Varna is there, \nyou just no longer see it.\"\n\n\"Why not?\" Robyn ask.\n\nYou poke him in the arm. \"Robyn, you're not being polite.\"\n\nRobyn looks at you and searches your eyes. He can see how \nimportant this is to you.\n\n\"All right. I'm sorry. It isn't fair to not at least listen \nto you after you've traveled so far. Please, join us by \nthe fire.\"\n\nThe King dismounts and assist his Queen off of her horse \nbefore they join you, Robyn and Gretchen by the fire. Some \nof the Merry Men want to know what is happening, and quietly \ngather behind you to listen intently.  \n\nYou offer them something to drink, while their Attendees care\nfor their horses.  When all is settle, Jaeden begins.\n\nWhich part of their story interest you the most?\n\n*choice\n  #The Dark Elves.\n\n    *achieve ale\n    \n    \"All of the Fair Folk once intereacted more with the Children\n    of Man, but at one point we retreated from mankind to live in \n    are home in Varna,\" Killia begins. \n\n    “When the Fair Folks retreated from mankind to live in Varna,\"\n    Jaeden explains, \"the Dark Elves began to change. They were \n    once the most concern about Mother Gaia than all of us, and \n    they tended Varna with love and care.\"\n\n    \"No one noticed when the darkness in their souls began to grow\n    and they started craving all of Varna for their own,\" Killia\n    adds. \n    \n    *set brave %+10\n\n    *goto mm20a\n\n\n  #Their Daughter Is Missing.\n\n    \"We do not see our daughter on a regular basis because of \n    activities we must attend to as leaders of the Elves of Light.\"\n\n    \"Well, of course,\" Marian says. \"That makes perfct sense.\"\n\n    \"Our daughter spends most of her days with her Sinthas,\"\n    Killia added.\n\n    \"As I am Marian's handservant?\" Gretchen ask with a smile.\n\n    \"And more,\" Jaeden says. \"The Sinthas are her Attendees and\n    her Teachers. They watch over her constantly. All that we \n    are as a race is taught to her by the Sinthas.\"\n    \n    Killia looks at Jaeden and the glow between them went dull.\n    She looks at her hands, and when she looks up, you see the \n    saddest eyes you've seen on any being.\n\n    *set cautious %+10\n\n    *goto mm20b\n\n  #The Powerful Benign Globe.\n\n   “When the Dark Elves heart grew dark, they wanted us to bring\n   all of the Fair Folk to them as slaves. When we refused, they \n   began a war that we could not win,” Jaeden informs you. \n\n   “We had prayed to our Spiritual Ancestors and they replied with \n   the Benign Globe,\" Killia states.\n\n   \"A Globe?\" Robyn ask. He looks at you with a furl brow.\n\n   “The [i]Benign Globe[/i]. It is a powerful weapon and when the \n   Dark Elves received just a small demonstration of what it could \n   do, they left the low lands to the high mountains and were not \n   seen or heard from for what would be...” Jaeden looks at Killia.\n\n   “Twenty-five hundred.”\n\n   “Twenty-five hundred in how you measure years.”\n\n   *set leadership %+10\n\n   *goto mm20c\n\n*label mm20a\n\n\"What is different now?\" You ask.\n\nThe King and his Queen look at one another. \n\n\"We received an ultimatum,\" says the King, although the expression\non his face is the same, you know there is no reason to not\nbelieve him.\n\nBoth you and Robyn turn to look at the other with wide eyes.\n\n\"An ultimatum?\" Robyn ask.\n\n\"Yes. Our ultimate weapon is missing and so is our daughter. If\nwe do not give them all of the Fair Folk as their slaves in two\nmore of your days, they will use the weapon.\"\n\nYou turn Robyn around to look at him.\n\n\"Robyn, we must do this.\"\n\n\"Please,\" Killia says, \"our daughter's life, everyone's life is\nat stake.\"\n\nYou look around, at the King and Queen, at your men, at Gretchen.\nYou knew that you have no choice.\n\n\"Robyn...\" you say one more time.\n\n\"Okay. With you, for our future, I will go on this quest.\"\n\n*goto mm20d\n\n*finish\n\n\n*label mm20b\n\n\"Our daughter, Jaeda, and all of her Sintha's are missing,\" Jaeden\nsays.\n\nYou and Gretchen gasp. \"Oh, no!\"\n\n\"What do you think that means?\" Ask Robyn.\n\n\"They are missing, and so is our ultimate weapon. Somehow, the \nDark Elves have kidnapped them and used Jaeda to get the weapon. \nThat would be the only way.\"\n\nKillia went back to look at her hands, as Jaeden takes them both\ninto his own.\n\n\"Robyn, Marian, we need you to bring Jaeda home to us with the\nweapon before it is too late.\"\n\nRobyn looks over at his men and then at Gretchen. Finally he\nlooks at you. \n\n\"No child should have to suffer in the hands of monsters. \nMarian, let's go get their daughter and bring her home\nsafe with that weapon so no one get's hurt.\"\n\nYou wrap your arms around him and hold him tight.\n\n*goto mm20d\n\n*finish\n\n\n*label mm20c\n\n\"Now they're back and they've used our daughter to get the \nBenign Globe.\"\n\n\"Why don't you pray for another Globe?\" Robyn ask.\n\nKillia looks Robyn straight in the eyes. \"We were meant to be\nthe caretakers of the Globe, forever. There is no praying for\nanother.\"\n\n\"I'm sorry,\" Robyn starts, \"I guess I just don't understand.\"\n\nKillia's eyes go dim and narrow, almost like slits in her head. \nShe sits forward and it's almost as if her face is so close to \nRobyn's, that her nose is touching his.\n\n*page_break\n\nYou close your eyes and shake your head, looking again at the \ntwo of them. Surely you're not seeing what you think you are.\n\n“The Dark Elves can bring death, destruction, disease, dread \nand despair to everything and everyone you have ever held dear \nand to every beautiful place you've ever seen, “ she warns. \n“Even to your unborn child.”\n\nRobyn's eyes go wide and he raises his hood.\n\n“That sounds like life as we know it, gone,” he says low, \nalmost to himself.\n\nYou wrap your arms around him from the back, touching his \nchest, laying your head on his back.\n\n“We must do this, my love. They must have chosen us for a \nreason.”\n\nRobyn's quiet for a moment, then he turns around to face\nyou.\n\n\"You're right. You're always right.\" He kisses you.\n\nThen to King Jaeden he says, \"Let's do this.\"\n\n*goto mm20d\n\n*finish\n\n*label mm20d\n\n*page_break\n\n\"I only ask for one thing,\" says Robyn.\n\n\"Ask,\" Jaeden responds.\n\n\"Can I take my men with me? I really don't go anywhere without\nmy men.\"\n\nThe men listening all nods their heads. Robyn never goes without\nat least one man in front of him and one man behind.\n\n\"I'm sorry,\" Jaeden says without hesitation,\"but few Children\nof Men have seen our homeland, and we try to keep it that way.\"\n\nSuddenly, Killia's eyes begin to glow. \"What about Captain\nBlack Mike of the [i]Lady Anne[/i]?\" She suggest. \"I do believe\nyou know him, Robyn.\"\n\n\"Yes, yes,\" admits King Jaeden. \"The Moore. He's helped us out\na couple of times.\"\n\nRobyn jumps up. \"Black Mike? He's a pirate!\"\n\nThe corners of Killia's mouth raise just a tad and she tilts\nher head. \n\nWhat is this? Does the Queen have a crush on Black Mike? She\ndoesn't even look at her King this way!\n\n\"He's such a gentlemen. He once gave our daughter a diamond \nstudded bracelet.\"\n\n\"That he stoled before he burnt the town down!\" You shout.\n\n*page_break\n\nYou pull on Robyn's shirt tail, forcing him to sit down.\n\n\"Stop, Robyn. You've always share good stories about your friend.\nWhy are you behaving this way now?\"\n\n\"Because I only told [i]you[/i] the very few nice things that he's \never done!\"\n\nKing Jaeden and Queen Killia stand up.\n\n\"Very well then,\" he says. \"We'll leave immediately.\"\n\nRobyn kisses you on your forehead.\n\n\"Oh, by the way,” he says. “What was the bad news?\"\n\n\"Oh, yes, that.” You say rapidly. “Prince John has put a large price \non your head and made you Enemy of the Crown, but we can discuss \nthat later.”\n\n\"Say what?\"\n\nAnd even though Robyn is still fuming about Black Mike, you suddenly\nfeel yourself becoming groggy, and before you know it, you've\nfallen asleep.\n\n\n\n\n*goto_scene mmelves2\n\n\n*finish\n", "mmelves2": "*label mmelves2\n\n*page_break\n\n*image varna.png left\n\nYou're in Varna, although you don't know  exactly where Varna is; still, \nyou know that's where you are.\n\nYou slowly open your eyes to a sun that seems brighter than normal \nshining in a bluer than the usual sky that you've always waken to all \nof your life. You place your hand over your brow until your eyes have a \nchance to adjust.\n\nYou realize that you are laying on the ground on top of...what is this? \nGrass? When have you ever felt such perfectly springy blades of grass as \nthis grass?\n\nYou sit up and rub your eyes. Look around, Marian. Have you ever seen such \nyellows, reds, oranges, purples, browns in front of you, such a clear sky \nabove you?\n\nYou're on a hill and Robyn is laying next to you sound asleep.\n\nYou stand and notice that you are wearing your regular riding clothing, \nbut at the same time they are not your regular riding clothing. There's Daisy,\nRobyn's good ole faithful Clint, and one other horse happily eating some wild \nvegetation behind you.\n\nThere are two large colorful tents billowing in the breeze to your left, \nand when you turn your head, you realize that there is another one behind you. \nYou bring your hand to your brow to scan the horizon.\n\nRobyn is snoring so you decide not to wake him, just yet, and went to investigate \nthe tents instead.\n\n*page_break\n\nYou enter the very first tent because you know immediately that it's yours.\nThere is a bed, a desk with a chair, and large pillows on the floor.  It \nlooks very feminine, it sparkles, and it just feels right to you. Besides \nthere are clothing on the bed that are similar to what Killia wears.\n\nThere is also a large tub already full of water and rosehips.\n\nWhat do you want to do?\n\n*choice\n\n  #Wake Up Robyn.\n\n    He has been a sleep for a while. Maybe you should wake him up.\n\n    You walk out of the tent and walk back to where Robert is laying.\n\n    “Marian, is that you?\"\n\n    You look down and Robyn is looking up at you, shading his eyes. He is \n    wearing his regular clothing, but at the same time they are not his \n    regular clothing.\n\n    “Of course, it's me.” You smile. “Looks like we're in Varna, Robyn. \n    You need to stand up and take a look around. It's beautiful. Not like \n    any place I've seen before.”\n\n    Robyn stands up and takes your hand.\n\n    “Wow. You're right.” He squeezes your hand. “Do you think we're doing \n    the right thing, little squirrel?”\n\n    You say without hesitation, “Yes, we are.”\n   \n    *set cautious %+10\n\n    *goto_scene mmvarnaa\n    \n   \n\n    \n\n  #Take A Bath.\n  \n    That sounds like a good idea. After all, it has been a while, and you \n    were last racing down the dusty road on Daisy. \n\n    You touch the water and it is warm. You gasp.\n\n    \"Perfect. Just the way I like it.\"\n\n    You take off your clothes and step into the tub. You lean back, sigh \n    deeply, and close your eyes.\n\n    \"I don't know where Varna is, but this bath is heavenly.\"\n\n    *goto_scene mmvarnab\n\n  #Do More Exploring.\n\n    I guess the bath can wait. Let's go see more of Varna!\n\n    You walk out of the tent and notice that Robyn is still sleeping.\n    You were going to invite him to join you, but he looks so peaceful\n    that you don't want to disturb him. Instead, you decide to take\n    a nice stroll on your own.\n\n    Behind the tents, at the bottom of the hill, there are flowers\n    as far as you can see.  As the sun slowly rise in the east, the flowers \n    respond to the warmth and slowly open to display their own glory. \n    Even from the distance you are, it is an absolutely wonderful sight.\n    You decide to take a closer look.\n\n    The foliage is not only bright and colorful, but also tall compare\n    to the roses, daffodils, black-eyed susans, milkweeds, wild geraniums, \n    and other typical flowering plants that you are use to at home. They\n    are more like bushes compare to what you see in front of you. \n\n    Whatever these plants are known as they easily stand five feet tall, \n    if not taller.\n\n    You rush down the hill to get a closer look at the beautiful blooms\n    and smell their perfume that's already titling your nose. \n\n    Suddenly, you trip over something in the grass and you find yourself\n    tumbling uncontrollably head over heels the rest of the way down the \n    hill.\n\n    *goto_scene mmvarnac\n\n", "mmelves3": "*label mmelves3\n\n*page_break\n\nThe Elves in the room begin to take a seat at the round \ntables as the ones in the hallway hurry in for the \ngathering of the First Meal. \n\nYou're place in the middle between Robyn and Black Mike.\n\nWithout seeing where the music is coming from, a cacophonous \nof blaring horns play, and the huge double doors on the far \nend of the room open. First, all you can see is a large glow \nof light, very similar to when you first saw the Elves in the \nroad. \n\nThrough the middle of the light emerges King Jaeden; his \nqueen, Killia, on his right, another female is on his left, \nand an assortment of attending Elves are behind him.  \n\nAll of the Elves of Light at the round tables stand. \n\n\"You must also stand, please,\" instructs Pom who is clearly\nstanding behind the three of you. \n\nYou are so amaze by the beautiful spectacle that the entering \nElves of Light are creating that you didn't notice that the \nother Elves are standing already.\n\n\"Oh!\" \n\nYou quickly jump up to your feet.\n\n\"Aargh,\" Black Mike says after he stands up. \"The bewitching \nQueen Killia.\"\n\n*page_break\n\nKing Jaeden and Queen Killia sit at the end the long table, \nKing Jaeden being catty-corner to Robyn. The female Elf on \nJaeden's left, sits directly across the table from you, an \nAttendee sits across from Robyn and one across from Black \nMike, and the rest stand a fair distance behind the King.\n\nWhen you look over your right shoulder, you can see Lida \nwaitingsilently.\n\nAll of the Elves sit down.  Robins elf leans in towards you \nthree and say, \"You may sit now.\"\n\nOnce you sit down, it seems out of no where servants appear \nand are walking around the long Hall with the high ceilings \nadding food to the various small plates that were in stacks \nin front of you.  They also pour various thickness and color \nliquids in three different glassware.\n\nYou aren't much of a cook, but you've eaten at the table \nof your cousins and other royalty all of your life. The \nbest cooks within your own world, and the other dining \nrooms you've visit throughout Europe, prepare the most \nscrumptious meals and delicious snacks and pastries; \nyet, you have never seen such food that is being put in \nfront of you now. \n\nThere is nothing you would consider as bread, any sort of\nmeat, no foul, or even fish.\n\nRight away, you notice that Robyn is acting a little antsy. \nHe's bouncing a little and looking around. You're not sure \nwhat's on his mind, or what he might do; or what he might \nsay for that matter.\n   \n\nWhat do you do?\n\n*choice\n  \n  #You Smile And Eat Your Food Politely.\n    \n\n    There is something green that wiggles slightly when you \n    touch it with your three prong fork that Robyn is trying \n    relying on Jaeden's first bite. You smile brightly, take \n    a small piece of it onto your fork, and place it in your \n    mouth.\n    \n    Oh! You find it quite delightful. Almost like the special \n    candy that your father brings back when he travels north. \n    Yes, this almost takes like mint. You begin to place fork \n    full of the green minty-flavor wiggly food into your mouth, \n    holding your little finger up in the air.\n\n    Jaeden is watching Robyn and they begin speaking to one \n    another.\n    \n    *set brave %+10\n\n    *goto mm21a\n\n  #You Watch Robyn Carefully For Any Guest Mishaps\n    \n    Nothing looks familiar, but you decide the little, round, \n    purple beeds that are in a bowl. You pick up a deep round \n    metal utensil with a long curve handle and begin to scoop \n    some up. Surprisingly, despite their hard shell, they \n    easily melt in your mouth.\n\n    As you decide to try something cream color with little \n    holes, cut into interesting tiny squares, you look back \n    and forth between Robyn and Black Mike. \n\n    Black Mike is smiling flirtatiously in Killia's direction. \n    You notice Killia is looking at him and that noncommittal \n    way of the Elves Of Light with abnormally glowing eyes.\n    \n    Robyn, however, is hunkering down, his hood over his head, \n    and is shoveling food into his mouth. \n\n    *set cautious %+10\n\n    *goto mm21b\n\n  # You Interrupt Him When He Begins To Speak.\n    \n      \n    “Robyn,\" King Jaeden begins, \"I sense that you have \n    questions to ask me.\"\n\n    Robyn raises his hand and opens his mouth to speak.\n\n    \n    *set coward %+10\n\n    *goto mm21c\n\n*label mm21a\n\nYou happen to see a white liquid that looks a lot like \ncow milk in one of Robyn's glasses, except there is a \nblue glow when light hits the glass.\n\nRobyn takes up this glass and sips at the liquid.\n\n“Wow!” He exclaims. “Jaeden, what is this?”\n    \nJaeden looks at the glass of white fluid that Robyn \nis holding. Again you notice a light blue flash coming \nfrom the milk as the light hits the glass.\n\n“Milk of one of the Cowgirls,\" Jaeden answers. \"Matilda, \nI believe, since her calf is still very young and she has \nplenty to share.”\n\nYou look around and notice that only Robyn has a glass \nof the milk.\n\nYou become a little confuse. \n\nRobyn also notices that no one else has a glass of milk.\n\n“If this is just cow's milk, why am I the only one with a \nglass?” He ask.\n\n“No, you misinterpret what I said. You are not drinking \nmilk from any cow,and certainly not milk from a domesticated \nfield cow that you associate with your homeland. You are \ndrinking Matilda's, the Cowgirl, milk.”\n\n*page_break\n\nYou and Robyn stare at the glass in astonishment.\n\n“She heard you were coming and she wanted to give you \nsomething that Cowgirlssave special for their children, her \nfortified milk.”\n\nYour eyes grow large. \n\n“What do you mean?\" Robyn ask.\n\n“Cowgirl's milk is more than simply nutritious. It is said \nthat it is fortified with the very essence that created Varna, \nthe part that is Varna itself. If a Cowgirl share's her milk \nwith anyone, it means she is twinuit.”\n\n“Twinuit?” You ask.\n\n“Yes. How you say...um, that she cares about you. That she \nis in love.”\n\nYou immediately feel on the defence.\n\n“I hate to be a poor guest,” you can't stop yourself from \nsaying, “and it's flattering that a Cowgirl wants to share \nher precious milk; however, Cowgirl or not, no one is twinuit \nwith Robyn, but me.”\n\nYou hear the soft fluttering sound and you look around not \nthe least bit self conscious. You hold your head up high as \nyou close your hand over Robyn's.\n\n*page_break\n\n“Well,” Robyn says quickly to change the subject, “Jaeden, \nwhen you proposed this quest of yours to us last night, you \ninsisted on a quick answer, and I understand the urgency of \nit all, but can you tell us more about the situation?”\n\nYou return to placing pieces of what could only be a sweet \ncheese that's purple on the outside and ogre on the inside \ninto your mouth. \n\nChewing very, very slowly,  only half listen to what they \nare talking about you hear the words \"Sintha\", \"caregiver\", \nand \"missing\". You stop chewing, to listen more carefully.\n\n\"We don't understand why we were not aware that the Benign \nGlobe was missing before they gave us the ultimatum,\" Jaeden \nwas saying. \"The Elders have a connection to it, you see.”\n\nRobyn leans in closer to Jaeden. “How so?”\n\n“It's power is linked to the essence of what makes us Elves \nOf Light. I don't know if you can understand exactly what I \nmean by that or not.”\n\nYou sit up. “I believe I do. There is something like energy \nas if from the sun itself that surrounds you all, your entire \nhome, and that energy is part of the Globe.”\n\nJaeden nods his head.\n\n*page_break\n\n“How do you think they kidnapped Jaeda?” You ask.\n   \n\"We have no idea how or when that happened, but they had to \nhave used her to get the Globe.\"\n   \n\"How could she have carried it?\" Robyn ask. \"From how you \ndescribed it, it must be large and heavy.\"\n\nJaeden looks at Robyn in that noncommittal way of these \nElves.\n\nHe blinks his eyes twice.  \"I believe,\" Jaeden begins,\"that \nour weights and measures are different than yours. Jaeda \nmay be a child, but she is, uh, one of us.\"\n\n\"An Elf of Light with the energy of the sun,\" you say.\n\nThe corners of both Jaeden and Killia lips lift just slightly, \nso you know you are right.\n\n“Do ya knows whar d'ey be?” Black Mike ask.\n\n“Yes, the messengers were quite clear. I will give you a map. \nIt seems that they have camped not far from our front gates.”\n\n\"Gud. Me be spillin' thar blud soon.\"\n\n*goto_scene mmelves4\n\n*finish\n\n*label mm21b\n\n\"Robyn,\" you hear Jaeden say, \"I was sure there is something\nyou want to speak to me seriously about before you leave on \nyour quest.\"\n\nRobyn looks up and mumbles something, then his face is back \nin the plate.\n\nYikes! You better say something fast to fix this fiasco \nbefore it turnsto a diplomatic situation. Those Elves of Light \ndo know magic. I don't care what they say!\n\nFirst thing first. Poke Robyn in the ribs with your elbow.\n\nHe jumps just a touch and looks over at you with his eyes wide. \nThen he puts his head into his plate and continues shoveling food \ninto his mouth.\n\n\"I apologize for Robyn's behavior, King Jaeden, Queen Killia. \nWe're bothso excited and very anxious to bring your child and \nthe Globe home to you.\"\n\n\"I understand. This is no time for idle chit chat. So be it. Please\nbe sure to eat your fill, and we can return to your tents to prepare\nto travel as soon as possible.\"\n\n\"Whars be dese Black Elves?\" Black Mike ask.\n\n\"They have a camp not far outside of our gate. The messengers were \nsure to give me a map. My mapmakers are making another for you.\"\n\n\"Me be sheddin' thar blood!\" Black Mike shouts. \n\n*page_break\n\nYou're shaken by his outburst. Robyn sits straight in his chair \nbecause of his outburst. However, the Elves do not bat an eye. \n\nAll, that is, except for Killia, who you happen to look at. Her eyes \nare still wide and there is that slight turn up of the corners of her \nmouth for several moments after Black Mike speaks.\n\n*goto_scene mmelves4\n\n*finish\n\n*label mm21c\n\nYou immediately interject.\n\n“Actually, Jaeden, but we are both very anxious to rescue Jaeda and\nreturn your Globe to you. I believe we have all the information \nthat we need.”\n\nRobyn looks over at Black Mike who is nodding his head.\n\n\"You know,\" he responds, \"I thought I did, but truthfully, I \ndon't foresee any problems. Easy in, grab the Globe and Jaeda, \nquick out.\"\n\n\"Aye!\" Black Mike says.\n\n“I understand.” The one corner of Jaeden's mouth raises \nslightly. “And, Black Mike, I'm sorry that I brought you to \nVarna the way that I did. In the condition that I found you, \nwell, I just wasn't sure if you would have come on your own.”\n\n“Arg, yar a pointy 'ared scallywag, thars for sure, but a gud \nguy. Alls forgive'.” Black Mike raises one of his glasses toward \nJaeden.\n\nJaeden nods his head. \n    \n“Then, once you've had your fill, I'm sure you'll be ready to \nbegin your quest.”\n\n\"Aye! Wars be dese Dark Elves? Me be sheddin' thar blood soon!\"\n\n*page_break\n\n“The messengers were quite clear that they are camped not far \nfrom our front gates. I will give you a map.”\n\n\"Then, let's eat our meal quickly so that we're on our way.\" \n\nYou see Robyn grab a small ceramic cup on his right that contains \ndark brown liquid. Before he drinks it, he swirls the thick \nliquid in his cup.\n\nSuddenly, he tilts back his head and pours the entire contents \ninto his mouth at one time and gulps it down his throat.\n\nRobyn stands up from the table and shouts..\n\n“Yiiiiiiiaaaaaa! That hits the spot!”\n\n“What do you think that was?” You ask, quite taken aback by his \nuncivilized behavior.\n\n\"I don't know, but it sure could use some cream and sugar!\"\n\n*goto_scene mmelves4\n\n*finish\n\n\n\n", "mmelves4": "*label mmelves4\n\n*page_break\n\n*image robinmarian.png left\n\nYou and Robyn feel like you can use a nap after \nthat surprising heavy First Meal, but you also \nknow that you must be on the road to the Dark \nElves' camp as soon as possible. \n\nRobyn's Elf and Lida escort you, Robyn, and Black \nMike back to your tents on the grassy hill. Inside \nyou find your riding outfit is clean and laying\non your bed. In addition, there is a mael vest, \nhigh leather wrist bands and high leather boots. \nThe mael is tightly woven but is not heavy to wear.\n\n*achieve vest\n\nYour weapons are also there. All of your short \nblades are sharp, the sheath buff to a shine; the \npoints of your arrows are also sharp and they have \nfresh feathers. The bows are restrung.\n\nThere's also a good leather saddle and head and \nflank cover for your Daisy.\n\nOnce dress, you exit your tent while Lida carries \nthe new saddle and flank cover. Black Mike and Robyn \nare waiting. They are also wearing the mael vest, \nleather wrist bands and leather boots. Their horses are \nalready ready to mount.\n\nSitting high on your horses, the three of you follow \nyour Elf Attendees to the beginning of the stone trail \nthat leads out of the tall stone gates of from the Elves \nOf Light home into the mountains of Varna. \n\n*page_break\n\nJaeden, Killia and several Elves Of Light await you.\n\nJaeden steps forward and takes Robyn's hand. He places \na small silver sack into it. A multitude of colors \nexplode from the cloth.\n\n“Here, Robyn, take this sack,\" he says. \"It’s made \nof a special sack to hold the Benign Globe.”\n\nHe accepts the sack and bounces it in his hand as if \ntrying to guess its weight.\n\n“Jaeden, this cloth is so small, thin and soft. Will it \nhold the Globe?”\n\nJaeden's expression does not change. \n\n“It will be fine. This is a rare mael, even stronger \nthan the mael that you're wearing, created by our \nMother.”\n\n“All right.” Robyn takes the sack, folds it carefully, \nand tucks it into a safe and secure place in his pack.\n\nJaeden steps back to stand beside his wife.\n\n“May Vanuite look over you all and bring you back to \nus quickly.” Jaeden says.\n\n“May Vanuite look over you all and bring you back to \nus quickly,” says Killia and the other Elves. They wave \nas the three of you exit through the gate.\n\nRobyn carries Jaeden's map to the Dark Elves' camp as \nyou and Black Mike follow.\n \n*page_break\n\nYou've been riding for a couple of hours. Black Mike is \ngrumbling under his breath, but to keep the mood light, \nyou have been singing a song low and to herself. Robyn \nsuddenly raises his hand to signal for the two of you to \nstop.\n\n“What is it, Robyn?”\n\n*choice\n\n  #He's Lost.\n\n    Robyn turns the map one direction, and then the other.\n    \n    “I'm not sure, but I think we're lost.”\n\n    Black Mike face is turning red and he clinches his teeth. \n    He mumbles to himself.\n\n    “Why wud dat 'ead gimlet giva map ta a lan' lubber?”\n\n    You sigh heavily. \"He's an elf, Black Mike. An Elf of Light. \n    How many times do I have to correct you?\"\n\n    You shake your head and look over at Robyn. He looks at \n    the map for moment one direction, then turns it back the \n    other direction.\n\n    \"I'm not sure,\" Robyn says, \"but I think I overshot \n    the turn.\" \n\n    \"Let me see,\" you say as you reach over for the map. \n\n    \"No,\" says Black Mike, trying to hold in his exasperation. \n    \"Let [i]me[/] see!\" He moves closer to Robyn and snatch the \n    map out of Robyn's hand.\n\n    Just then, you point down the road. “Look!”\n\n    *set cautious %+10\n\n    *goto mm22a\n\n    \n\n  #He Wants To Hear The Song You're Singing.\n\n    Robyn Wants You To Sing The Ballad Louder.\n\n    “It's been a long ride, would you mind singing louder \n    to soothe me.”\n\n    You smile, and begin to sing.\n\n    “Alas my love you do me wrong\n    To cast me off discourteously;\n    And I have loved you oh so long\n    Delighting in your company.\n\n    Greensleeves was my delight,\n    Greensleeves was my heart of gold\n    Greensleeves was my heart of joy\n    And who but my lady Greensleeves.\n\n    Thy petticoat of sendle white\n    With gold embroidered gorgeously;\n    Thy petticoat of silk and white\n    And these I bought gladly.\n\n    Greensleeves was my delight,\n    Greensleeves my heart of gold\n    Greensleeves was my heart of joy\n    And who but my lady Greensleeves.\"\n  \n    “That's beautiful, Marian. Did you write that one?”\n\n    “Thank you, Robyn, but no. I learned it in London.”\n\n    The two of you look lovingly into each others eyes, \n    until you hear Black Mike grinding his teeth.\n\n    “Can we git back ta da task at ''nd or is it smooch'n \n    time?”\n\n    Just then, you point down the up in the sky. “Look!”\n\n    *set romantic %+10\n\n    *goto mm22b\n\n    *finish\n\n   #He's Hungry.\n\n    \"I don't know about you two, but I'm feeling a little \n    peckish.\"\n\n    \"You're hungry?\" You ask. \"Now? After that surprisingly\n    heavy meal we had just a short while ago during First \n    Meal?\"\n\n    \"Tell ya da truth, me culd eet mor, too,\" Black Mike says. \n    \"Food gud, not fillin' me, big man.\"\n\n    \"See! I'm glad you agree with me! Women just don't understand!\n    They turn around some thin leafy greens on their plate, \n    smell them, and they're full. We men need a hearty seven \n    course meal, four, five times a day!\"\n\n    Suddenly, you look down the road.\"Look!\" You shout, \n    pointing.\n\n    *set leadership %+10\n\n    *goto mm22c\n\n*label mm22a\n\nAbove you, and not very far away, a large fume of smoke \nrises into the sky.\n\n\"That smoke wasn't there a few minutes ago,\" you note. \n\"And look how black it is. That's fresh smoke.\"\n\n\"Perhaps from a large campfire?\" Robyn ask.\n\n\"I would guess.\"\n\n*page_break\n\n\"Me thinks thar be Dark Elves whar thar be smoke,\" Black \nMike says as his horse raises is forelegs in the air.\n\n\"Then let's go!\" Robyn shouts and leads the way a hill \ntowards the smoke.\n\nYou race  to the top when suddenly, Robyn pulls Clint in \nfor an emergency halt.\n\n\"Retreat! Retreat! Retreat!\"  \n\nHe shouts hysterically as he pulls on Clint's reigns to \nmake him turn around and swiftly gallops down the hill.\n\n*finish\n\n*goto_scene mmelves5\n\n*label mm22b\n\n*page_break\n  \nIn front of you where the forests thickens, you see a \ndrove working its way towards you with much urgency.\n\nFirst you only assume that they are animals by their \nmovement, and you can tell that they are cover with fur, \nbut as they came closer there is a familiarity to them.\n\nNone of them were as large as an adult deer, and they \nfought for position in rank with the smaller ones, about \nthe size of a goat, who move in a sort of jumping way. \nSmaller ones brought up the rear and they reminded  you \nof rabbits, except with stubby ears.\n\nYour horses begin to act distressful as the drove came \ncloser and closer. You pet Daisy on the side of her head.\n\n\"There, there, girl. It's all right. There's nothing to \nworry about,\" you say to Daisy in a nice calming voice.\n\nBlack Mike's horse kept lifting his fore legs off the \nground as he held onto his reigns, gritting his teeth.\n\n\"What should we do?\" Robyn ask as his horse, Clint, shakes \nhis head and stomps his feet as he whinnies. Robyn had to \nhold on tight to stay in his saddle.\n\n\"I don't think there's anything we need to do,\" you say. \n\"Just keep our horses calm until that drove passes by, \nwhich they certainly will. I don't think they really \nnotice that we're on the road in front of them.\"\n\n*page_break\n\nAnd sure enough, when the animals reach you, they automatically \npart and became two lines. As they pass, they are once \nagain one line, and continue down the road. \n\n\"What was that about?\" Robyn ask. I've never seen anything \nlike it.\"\n\n\"I know what you mean.\" You say \"it's like they know something \nthat we don't know, or that we should know.\"\n\n\"It be like rats jumpin' ship 'fore it sinks.\"\n\nYou and Robyn look at Black Mike.\n\n\"Where are they coming from?\" You ask.\n\nRobyn is looking at the map. \"They came from the forest, \nand that's where we're supposed to go according to the map.\"\n\nThe three of you look at one other. \n\nThe drove is down to the very small animals who remind \nyou of voles. My how quickly they're moving their tiny \nlittle legs to stay with the pack. \n\n\"Let's go,\" orders Robyn. \n\nThe small animals who are bringing up the rear of the \ndrove didn't mind that you three are moving your horses \nthrough the mist of them. \n\nSoon, according to the map, you have to ride up a hill. \nOn the other side, is where the Dark Elves' camp should \nbe.\n\n\"According to the map, this is the place,\" Robyn says. \n\"Are you ready?\"\n\n\"Me be ready two day a'go!\" Black Mike says as his steed \nrears up on his back legs.\n\n\"Then let's go!\"\n\nYou're beside Robyn as you race up the hill, Black Mike is on \nhis of the other side, as your horses gallop at school speed. \n\nAll of a sudden, Robyn is pulling on Clint's reigns and shouting,\n\"Retreat! Retreat! Retreat!\" \n\nYou look over at him and he is turning around, rushing down \nthe hill.\n\n*finish\n\n*goto_scene mmelves5\n\n\n", "mmelves5": "*label mmelves5\n\n*page_break\n\n*image advance.png left\n\nYou and Black Mike retreat with Robyn to the bottom of \nthe hill only because he is the leader of this quest.\n\n\"Robyn, what are you doing?\" You ask. \"Why did you turn \naround and retreat?\"\n\n\"I don't know. I just think we're going about this the \nwrong way.\"\n\n\"What do you mean?\"\n\nRobyn ignores your question turning his attention to his \nbuddy instead. \n\n\"Black Mike, you say that your ship is dock at the shore?\"\n\n\"Aye, dat’s wut dat crusty pointy ear'd King say.\"\n\n“And we can leave
