ning?\" He ask you as he \ncontinues to view the mountain.\n\n\"Don't have much of a choice now, do I?\"\n\n\"You're our leader, Robyn. You do not have to go after the Dragon if \nyou do not want to. No one will think less of you.\"\n\nYou look down at him.\n\n\"You're kidding, right? My wife and her handservant are willing to \ngo, but I won't go myself? That's a ridiculous thought.\"\n\nHe looks up at you.\n\n*page_break\n\n\"Just wanted to ask. You know I've got your back no matter what.\"\n\nYou smile. \"I know you do, friend. And I know you'll do everything\nin your power to protect my wife and Gretchen.\"\n\n\"Especially, Gretchen,\" he says as he walks away. \n\n\n\n*finish\n\n*goto_scene rhedent6\n\n\n ", "rhedent6": "*label rhedent6\n\n*page_break\n\n*image robinandall.png\n\nThe next night, you and half of the original quest party are camping  \nmidway up the trail that leads to the front door. The rest are left\nbelow with a small troop.  Surprisingly, King Macken is on this part \nof the quest. He's very excited to see his ancestral home. \n\nThe last you hear from the King, he is settling into his tent with \nhis Attendants. The highest ranking soldiers are surrounding him \nand the Maiges. \n\nEveryone is comfortable in their tents, the horses and ponies are\ntogether, and a few pot lamps are still burning.\n\nIt's a quiet night.\n\nYou are asleep on the mat next to Marian who barely makes a sound as she \nbreaths slowly in and out.\n\nSomething wakes you, forcing you to open your eyes with a snap. You \nlay still to listen carefully.\n\nWhat is it?\n\n*fake_choice\n  #A Lion Is In The Camp.\n\n    You've never heard such souds coming from a lion in your \n    life!\n\n    Men are shouting, the horses are in a panic. \n\n    The lion could be heard clear across the camp.\n\n    If it is a lion...but it's not.\n\n    \n  # Black Elves Are Attacking.\n    \n    It sounds like Black Elves! They've found\n    your camp! \n\n    What do you choose to do, Robin? Fight, or flight?\n\n    Wait, you have Marian to protect.\n\n   \n  # It's A Large Single Troll.\n\n    Men are shouting, the horses are neighing in \n    panic. There is a loud stomping that is shaking \n    the ground, and a deep guttural growl from \n    something you've never heard before.\n\n\nYou jump up, surprise to see that Marian is still asleep. The \nshouting, stomping, and growling is quickly getting closer. \nYou go outside to view what is happening.\n\nSome distance ahead is a large fire, and in front of it is a \nbeast larger than the flames casting an even larger shadow. \n\nYou can't see details, but it's the beast that is growling, \nsometimes yelping from pain of stepping on a fire pot. Its giant \nfeet carry the mass of its weight that's causing the ground\nto shake as it moves forward, tearing tents, and being \nmenacing.\n\nReaching down, it picks up one of the King's soldiers who \nhappens to be standing too close, putting himself between it \nand the King, and with its two huge hands it twists tearing \nthe soldier apart. What's left of the bodygoes in different \ndirections across the camp.\n\nYou hear screams of panic as a few dwarves shriek, running \naround in hysterics, flames rising from their clothing.\n\nYou return to your tent.\n\n\"Marian, wake up! Wake up! Something is attacking us! We need to \nhide!\"\n\nGroggily, Marian responds.\n\n\"Huh, what?\"\n\n*page_break\n\n\"Get up! We must run and hide before it catches up to us \nand we have no camp left!\"\n\n\"All right, I'm coming.\" She sits up, then pauses for a moment. \n\"What is that I'm hearing? Are we being attacked by Black Elves?\"\n\n\"No! It's one beast, and it's as big as a mountain! I think it's \na troll!\"\n\nMarian's eyes widen for just a second before she jumps into \naction. She has her sword, bow, quiver, and short blade ready in \nno time. She exits the tent.\n\nYou call, \"Marian! What are you doing!\" \n\nShe doesn't come back and you know that you have to go out there.\n\n\"Uhg!\" You exclaim as you put on your blade and grab your bow \nand quiver.\n\nYou exit your tent to find that the Merry Men and the soldiers \nwere surrounding the troll, bearing their swords and torches. \n\nIn frustration, the troll howls as it attempts to capture someone \nelse in it's grasp, but everyone keeps their distance. The archers \nsend a constant volley of arrows, but the behemoth's thick skin \nkeeps it from going down.\n\nThrough the smoke, you make out Gretchen standing at a fair distance \nfrom the troll with Will Scarlett. Marian is still beside your tent, \nshooting arrows. \n\n*page_break\n\n\"Over there!\" You shout at her as you point, then pull her behind \nyou. As soon as you join Gretchen and Will, you instruct them to \naim for the nape of the neck.\n\n\"Right at the base!\" You command. \n\nThe four of you send arrow after arrow to the spot where the hair \nmeets the neck, although it is difficult to see through the troll's \nlong matted hair.\n\n*achieve arrows1\n\nYou lead the others directly behind the troll for better shots. \nIn agony, the troll wails as he attempts to grasps the back of \nhis neck to pull the arrows out that stick to him like pins.\n\nIn the meantime, Tuck exits his tent carrying a long handle \nthree-inch battle axe that Captain Lock had given him during \nthe cross training drill sessions with the Dwarves. \n\n\nHe wastes no time to quickly gauge his distance before he \npasses between the men and Dwarves to reach the troll. No \none sees him coming as he moves faster than a man his size \nshould be able to run, until he passes by the troll with the \naxe poise to slice through his lower legs in one stroke. \n\nThe troll screeches, landing on its knees. Tuck returns and \nlunges, hitting him square on the top of his head with all \nof this might, forcing the entire hilt of his weapon into the \ntroll's skull. \n\nTuck, and the men behind him, hurriedly maneuver their way \nbackwards to allow the troll to fall forward on its face. \n\n*page_break\n\nAll of the archers walk in a little closer with their arrows \ncock in their bows. The rest of the Merry Men have their sabers \nand the Dwarves have their axes high in the air. Tuck stands \nover the fallen troll, his axe still embedded in its head.\n\nIt's you who realizes that the troll is not going to stand up. \nStill,you carefully idle over to his back foot and give it a \nswift kick. \n\nYou don't hesitate to retreat back to Marian's side.\n\n\"I think you got it, Tuck,\" you say hesitantly.\n\nThen suddenly, there is a outcry of cheer from almost everyone \nin the camp.\n\n\"Tuck!\"\n\n\"Tuck!\"\n\n\"Tuck!\"\n\nThe Merry Men didn't hesitate to reach their companion. They \nslap him on the back, give him manly hugs, but you sense that \nsomething is distracting him.\n\n\"Oh, my dear, Tuck!\" \n\nYou look over and see Gretchen. She is looking at Tuck. She's also \nsmiling and shouting, but there is a different type of message in \nher eyes. \n\nThe men surround him and she cannot go near enough to hug him.  \n\nTuck sees her, winks, and returns her smile.\n\n*page_break\n\nNo one can sleep that night.\n\nFirst, the fires are put out and an inventory is taken of what is \nusable and what is not. The soldiers discard of the troll's body, \nand the King makes a long speech as he thanks Tuck for stopping the \nmonster before more damage had been done and more lives lost. \n\nThen the mead is brought out and there's some celebrating by almost \nall. King Macken's soldiers are not allow to drink on duty, and the \nMaige Elves keep to themselves, as always.\n\nExhaustion hits everyone shortly after noon, so King Macken plans \nthe second leg of the climb up Mount Kardalean for the next day.\n\n\n*finish\n\n*goto_scene rhedent7", "rhedent7": "*label rhedent7\n\n*page_break\n\n*image edent.png left\n\nLate in the evening, after third meal, the King brings everyone \ntogether.There seems to be a change in plan that involves your team, \nhis military force, the scouts and the Maige Elves. \n\nWhat do you think he wants to discuss?\n\n*fake_choice\n\n  #Returning To The Bottom Of The Mountain.\n\n    After the troll last night, he may want to gather more forces.\n\n  #Returning To Kardean.\n\n    After the troll last night, he may have had a change of \n    mind about trying to return to their mountain homeland after \n    all.\n\n  #Returning To The Town.\n\n    After the troll last night, he may have to replace some of \n    the provisions that were lost.\n   \n\n\"As a result of what happened last night, I want to change our \napproach to the mountain.\"\n\nThe King pauses to look around at the gathering. He knew so many \nof those Dwarves well and is hoping that he is right about you and \nyour party.\n\n\"I don't know if that troll was a rogue,\" he continues, \"or if he \nwas sent here by the Black Elves, but I do not want us all entering \nMount Kardalean at the same time. Therefore, we're going to stagger \nour approach.\"\n\nA mumbling began amongst your men.\n\n\"In addition,\" he is saying, \"I am worried about our people at \nthe bottom of the mountain.\"\n\nThe mumbling becomes louder. \n\nKing Macken raises his hands and the mumbling eases off.\n\n\"I have sent one of our scouts down to check on our people, to \nlet them know what is happening, and to be aware of trolls \nand the Black Elves.\"\n\nHe turns and looks directly at you.\n\n*page_break\n\n\"Robyn, I'm going to stay with the Maiges and enter through the \nback door after they've removed the seal. I am giving you first \nchoice to come with me, to follow after half a day, or to take \nthe trail to the top of the mountain and enter through the new \ndoor.\"\n\n\"Excuse me for a moment, your majesty?\" Marian raises her hand \nto receive the King's attention. \"With all due respect, I do \nhave a concern.\" \n\nHe nods his head giving her permission to continue.\n\n\"Your crew that's working on the new entrance into the mountain \nmust be making quite a noise. Wouldn't Edent be awaken by this?\" \n\nYour eyes go wide and you look at Marian. You  have not thought of \nthis, and now you're more concern that she is. \n\n\"We've never been concerned about that ourselves,\" the King begins, \n\"because, you see, the top of the mountain is several miles above Edent. \nDragons do not hear or see very well, so I doubt that he's aware that \nthey are there and is now awake.\" \n\n\"Dragons don't hear or see very well?\" You repeat. \"How do you know \nthis for sure?\" \n\nThe King looks at you with his blank face. \"You have my word. It \nis well documented fact by different races before we were even born.\"\n\n\"Besides,\" Broon interrupts, \"we would have heard something, or not\nhave heard anything at all from our crew by this time if the Dragon \nis roaming the halls of our mountain.\"\n\nHe looks at you steadily, but you can see the kindness in his face.\n\n*page_break\n\n\"Did I not cover any information about Dragons during the briefing?\"\nKing Macken mentions as he looks around at the gathering.\n\n\"No, you did not, your highness,\" you answer for everyone.\n\n\"I'm sorry. I meant to.\" He shakes his head as if clearing it of \ncobwebs. \"I think that entire ordeal with the Black Elves coming so \nunexpectedly had me all befuggled,\" he implies using an ancient \nDwarf term for confuse.\n\n\"Please, tell us now.\" Marian sees the worry on your face. \n\n\"Since Dragons have excellent sense of smell, they rely heavily \non their fire breath when hunting their prey or fighting their \nenemy.\"      ' \n\n\"You never want to get in front of a Dragon's face,\" Broon adds. \n\"When it inhales enough air, it can exhale a stream of fire that \ncan reach distances of twenty or more feet.\"\n\n\"Twenty or more feet?\" You repeat.\n\n\"The shields we've given you are made from a special ore from \nthis very mountain and are strong enough to withhold a Dragon's \nbreath long enough for you to react,\" the King assures you.\n\n*achieve shields\n\n\"Still,\" Broon steps forward, and looks at each of you sternly,\n\"you must be careful. The shields are strong, but they are unable \nto withstand too many hits from a Dragon's breath at one time.\"\n\nThe Merry Men are losing their cool and you hear mumblings of \ndiscontent behind you. Actually, you're surprise that they didn't\nsay anything sooner.\n\n*page_break\n\n\"Also, it's important that you know that a Dragon's body is \ncovered with thick impenetrable scales, and exposed long, sharp \ncurved claws are at the end of their four feet,\" Captain Lock \ninterjects.\n\nThe mumbling behind you becomes louder.\n\n\"Than how are we suppose to kill this thing?\" Little John \nshouts out.\n\nAnd your men agree in one united voice.\n\n\"Yeah!\" \n\nAs usual, King Macken facial expression does not change. He \nspeaks serenely.\n\n\"All Dragons have an area of exposed flesh, just below their \nstomach or on their chest. Most in both places. It is small, \nbut it is there and able to be distinguish from the scaly skin.\"\n\n\"You need to stab Edent in that unprotected area, and push your \nsword deep into his flesh to kill him,\" added Broon. \n\nThe men look at each other, shaking their heads, shrugging their \nshoulders as they furl their brows.\n\n\"So, you're saying that we do have to get close to him?\" Brett \nask.\n\n\"Yes,\" Broon responds, \"and that is why you have the shields and \nthe helmets.\"\n\n*page_break\n\n\nJack looks at the helmet he carries in his hand. \"That would be \ngreat protection, if they fit our heads better!\"\n\n\"Yeah!\" The men agree very loudly.\n\nMarian turns around to address the Merry Men.\n\n\"Now, now,\" she begins, and smiles her lovely smile, \"it's too \nearly to get surly. And we don't want to show disrespect to the \nKing. Let them tell us all that we need to know in order to be \nsuccessful and\nget through this quest unscathed.\"\n\nThe men all put down their heads and mumble, \"Sorry, Lady \nMarian.\"\n\n\"Gentlemen, please continue.\" She smiles.\n\nCaptain Lock looks at you, Marian, Gretchen, the Merry Men \nand his owntroop. \n\n\"Do not expect Edent to go down easy,\" he discloses. \"He is not \na warrior with many battle scars. He has become lazy and spoiled \nliving on top of our gold in the mountain, but he is a Dragon none \nthe less.\"\n\n\"Your ancestors couldn't kill him because of your height and \nstrength, and that's why you've asked us,\" Marian concludes.\n\n\"Yes,\" Broon interrupts. \"We lost many men attempting to kill \nhim the way it is written in our books that go back through infinity. \nKing Mor triedto bring down the beast for hours before he made the \ndecision to retreat.\"\n\nCaptain Lock eyes become slits as he speaks cautiously. \n\n*page_break\n\n\"There's another way to kill a Dragon,\" he claims, \"and that's by \nway of its Dragon's heart.\n\nThere's a gasp from the young and inexperience men (including you), \nbut the others lean forward to listen carefully.\n\n\"There is the possibility that a Dragon does not die immediately \nafter being mortally wounded in its belly and will keep up a fight \nwhen you attempt.\"\n\n\"What?\" All of the men ask.\n\n\"The heart may also be a prefer way because there is less chance \nof you being hit with the blood heat. If your helmet does not fit \nproperly, you're a goner before you have a chance to use the shield \nor run away.\"\n\n\"Great!\" Says Jack as he throws down his helmet. The other Merry Men \nfollow, yelling.\n\n\"This piece of tin is no good!\"\n\n\"Why 'cha give dem to us?\"\n\n\"Carry them all this way for nothing!\"\n\n\"Listen, listen to me!\" The Captain shouts, but the men are not \nmilitary, and, therefore, his rank means nothing to them. \n\nMarian turns and gives them the look. You know what look I'm talking \nabout.\n\n*page_break\n\nWhen the men lower their head and apologize, she smiles and tells the\nCaptain to continue.\n\n\"However, there are many of you to keep his attention in various areas\nwhich will confuse him and allow one or more men the chance to climb to \nhis chest by way of his back or leg to reach his heart. After stabbing \nhim, you must push your hand in and pull out the heart. Edent will die \ninstantly.\"\n\nThe men are mumbling amongst themselves again. You can hear Tuck saying,\n\"I can go for the heart.\"\n\nYou turn around to face them.\n\n\"What would you like for me to do, men?\"\n\nThey look at one another, and shrug their shoulders as one.\n\n\"We're behind you no matter what, Robyn. You know that,\" William \nreminds you.\n\nThe men agree as if in a chorus.\n\n\"Yeah!\"  \n\nYou look at your wife.\n\n\"Any advise?\"\n\nShe smiles and shakes her head.\n\nSo, which way into the mountain do you choose?\n\n\n*choice\n\n  # Continue To The Back Door With The King.\n\n    You preferred the idea of being in a crowd.\n\n    \"If you don't mind, your majesty, I prefer to continue on the \n    path to the back door with you.\"\n\n    The King nods. \"Then it will be so. Be prepared to leave first \n    thing after first meal.\"\n\n    \"We will be ready.\"\n\n    *finish\n\n    *set coward %+10\n\n    *goto  rhedent7a\n\n\n  # Travel To The Top Of The Mountain.\n\n    You like the idea of entering through the new door. After all, \n    you've never been that high above the ground before. \n\n    \"I don't mind traveling to the top of the mountain,\" you choose \n    without any discussion. \"I assume that means I and my team will \n    enter through the new door?\"\n\n    \"Yes. I've received the latest report yesterday. The crew has \n    widen one of the chasms to create a large double door. They are \n    still working on the stairs to the first level which should be \n    complete by the time you arrive.\"\n\n    \"Splendid.\" \n\n    \"Sasheen's team will escort you. Please be ready to leave before day \n    break.\"\n\n    \"Of course.\"\n\n    *finish   \n    \n    *set brave %+20\n\n    *goto rh7b\n\n   \n  # Follow The King To The Back Door.\n\n     \"You will stay here until the afternoon and bring up the rest of \n     the supplies. Does that sound acceptable?\"\n\n     \"Will we be alone?\"\n\n     \"No. Captain Lock stays with you and his troop will be your escort  \n     the rest of the way. Does this meet with your approval?\"\n\n     \"Yes, yes, it does. I can't wait to be on the way.\"\n\n     \"I'm glad to hear that. I foresee by end of the day tomorrow, one way\n     or the other, this adventure will come to an end.\"\n\n     You wish he hadn't put it quite that way.\n\n     *finish\n\n     *set leadership %+10\n\n     *goto_scene rhedent7c\n\n", "rhedent7a": "*label rhedent7a\n\n*page_break\n\n*image robinandall.png\n\nTo make sure that your team is ready on time, you wake them up before \ndawn and have the cooks begin first meal early. \n\nYou have a special treat for the King.  \n\nWhat is it?\n\n*fake_choice\n  #Fresh Squeeze Juice From A Plant With Needles.\n\n    \"We had something similar when I was on the Crusade. I hope you\n    like it,\" you say as you offer the King a glass.\n\n    The King accepts the glass, and takes a sip of the juice. \n    Immediately, the King purses his lips and squint his eyes \n    tightly.\n  \n    Now you did it Robyn. I think you've made an enemy out of\n    a new friend.\n\n    \"Oh, I'm so sorry, your highness! I thought for sure that\n    you would enjoy this!\"\n\n    King Macken blinks his eyes a few times, and slowly his\n    mouth makes a smile.\n\n    \"I do!\" He explains! \"It's so, different! What do you call\n    it?\n\n    \"Well, like I said, it was similar to a plant that the\n    locals call cactus.\" You sign with relief. \"I'm so happy\n    that you like it.\"\n\n    \n\n  #Eggs And Lamb Chops.\n   \"I had seen a bird that resembles one from home, so I raided\n   her nest for some eggs. I cooked them the way my mother had\n   taught me.\"\n\n   \"Mmm! That smells wonderful! What else is on the plate?\n   \n   \"Marian turned over some fresh lamb chops over the fire.\"\n   \n   \"Come in, Robyn. Whatever you have on those plates does smell \n   a lot more appetizing than steam purple slack leaves.\"\n\n   \"Then I'm happy that you'll indulge me, and that you are\n   also a meat eater. I couldn't offer this to the Elves of\n   Light.\"\n\n   The King laughs in agreement as he gestures to his Attendee to\n   bring over another chair. He slices into the eggs and and takes\n   a bite. \n\n   \"Ah! Absolutely delicious!\"\n\n  #Biscuits And Gravy.\n\n    You stand at the front of the King's tent.\n\n    \"Good morning, sire. I hope it isn't too early for you to\n    join me in breakfast?\"\n\n    \"I can smell your meal already! Come in, come in!\"\n\n    You walk in balancing the two plates.\n\n    \"This is something one of my men taught me, and I like it\n    because it's a quick, easy, and filling meal.\"\n\n    \"Yum, young Robyn! That smells delicious.\"\n\n    \"Biscuits and gravy made with lamb chop drippings,\" you \n    announce as you hand him a plate.\n\n    The King cuts into the biscuit and takes a bite.\n\n    \"Wonderful! Come sit by me and I'll have my Attendee\n    pour us something to drink. What would you like?\"\n\n    \"Well, it's too early for grog. At least, that's the\n    excuse my wife would make, so I guess it has to be\n    tea.\"\n\n    The King gives you a big belly laugh.\n\n    \"Same would mine!\"\n\n   \n\nIt wasn't long thereafter when you are all on your way \non the road to the backdoor that leads to the Elder Dwarf \nmountain city of Kardalean.\n\n*page_break\n\nKing Macken personal military troop of train ponymen, lead \nby Captain Sorrel, are in front. You and Marian have the \nprivilege of riding beside the King. \n\nBehind you are the boring Maige Elves, who rather stick to \nthemselves anyway, and directly behind them is Captain Sorrel's \nfootmen. The Merry Men are riding in front of the King's \npersonal cart. Last, bringing up the rear, is Captain \nLachman's unit.\n\nIt's the King who sets the pace for the journey, but he \nis traveling at a bare trot instead of a swift gallop. \n\nThere is plenty of time before nightfall, so you don't \nhave to race with the sun. Okay, that's understandable; \nhowever, the King is anxious to see his ancestral homeland. \nThat's why he's on the quest with you. It doesn't make much\nsense to not take advantage of the wonderful weather and \nrace to the backdoor. \n\nKing Macken is looking straight ahead as he bounces lightly \nup and down on his pony.\n\nYou want to ask him why the pace is slow, but at the same \ntime, you don't want to insult him. After all, it is a \nbeautiful day. Could it simply be that he wants to enjoy \nthe view?\n\n\"Excuse me, your majesty?\" You call, but it doesn't get his \nattention. He continues looking straight ahead.\n\n*page_break\n\n\"Pardon. King Macken, I hope you don't mind, but I \nhave a question.\"\n\nStill nothing. He looks straight ahead instead of responding.\n\n\"King Macken!\" You shout. \"Excuse me sire. May I have \na moment?\"\n\nNothing from the King.\n\nThen you notice his Atttendant, who is walking between \nthe two of you strike him gently on the leg with a riding \ncrop. The King shakes his head and glares down at his \nAttendant, but he's not angry. He looks at him for a moment \nas the one holding the crop points in your direction.\n\n\"I'm sorry, your highness I simply wanted to speak to you.\"\n\n\"Oh, no, it's all right. I'm the one to apologize. I often \nbecome so relax on such rides, that I almost fall asleep.  \nWe should gallop faster. The heavy bouncing helps.\"\n\n\"I see,\" you say grinning.\n\n\"What were you going to ask me?\"\n\n\"Nothing important. It can wait until we arrive.\"\n\nThe King raises his hand, his flag bearer raises the \nflag, and everyone comes to a halt. His Captains, \nthe Elves, you, and Marian join him for a quick meet.\n\n*page_break\n \n\"It's good weather,\" the King begins. \"I hope it's not \nsnowing on top. I don't like the way those clouds look. \nNevertheless, there's no reason why we cannot hurry to \nmake it before nightfall.\" \n\nThere's an agreement from everyone, and Captain \nLochman assures you that he will inform the Merry Men.\n\nThe King raises his hand, the flag goes up, he hits the \nflanks of his pony until it is galloping. This, of course, \nforces the riders ahead to match the increase speed quickly \nso that they are not hit in the rear. \n\nYou look over at the King and immediately notice the \ndifference as he sits taller and bounce higher than before. \n\nYou also feel the breeze of air blowing gently against \nyour face, something that never happens in Sherwood Forest. \nThe air always feltso stuffy and more stale as if you are \nindoors with the windows close.\n\nFunny, you never thought of that way before.\n\nYou think that you will be taking many rides into the \ncountry with your lovely wife here in Kardean.\n\nAfter an hour, a shout is heard from the front as Captain \ncalls for one of your Attendants. The Attendant leaves \nthe King's side, runs to the front of the line, and is \nback in a couple of minutes.\n\n\"From Captain Sorrel, your majesty. The backdoor is \nstraight ahead. He says we should reach it within the \nhour.\"\n\n\"Splendid, splendid. Did you hear that Robyn? We should \nbe at the backdoor in an hour.\"\n\n\"What was that?\" Marian ask.\n\n\"We're almost there.\"\n\nShe exhales deeply. \"Good. I can't wait to get this over\nwith. This mountain air is giving me a headache.\"\n\n*page_break\n\nEven though there are so many people in front of you, \nthere is no doubt when you reach the backdoor. It is double \nand stands at least ten feet high.  It is made from planks \nof Lignum Vitae wood, one of the strongest woods in the world, \nand ore from the mountain.\n\nThe Maiges, Marian, and yourself, join the King at the front \nof the line. \n\nThere are ancient engravings in the wood. You try to imagine \nthe tool it would take to place them there. \n\nKing Macken pulls scrolls of ancient papers with worn crease \nedges from beneath the front left inside pocket of his tunic. \nHe unrolls them, left hand holding the top, right hand holding \nthe bottom, and skims the first page for any information \nconcerning the engravings. \n\n\"You will not find the answer you seek in those scrolls,\" \ndeclares the Elf holding the staff with the large white crystle.\n\n\"I don't understand.\" The King looks back and forth between the \ntwo Elves. \"These were brought down from the mountain when my \nancestors fled, and kept safe in the family chests.\"\n\n\"I believe you. However, these markings were made much, much \nlater.\"\n\n\"It's why an Elder Miage Elf has sealed this door,\" reveals the \nother.  \"We don't know for sure who put the markings on the door, \nbut they indicate great peril awaits the Elder Dwarves if they \nwould ever return.\"\n\nKing Macken gasp. He unconsciously steps backwards away from the \ndoor. \n\n*page_break\n\nThe first Elf stands in the center, raises his staff over \nhis head, and closes his eyes. \"Tanen ouch'la dem!\" He commands \nin a loud voice.\n\nWithout warning, blue bright lights reveal another set of ancient \netchings on the door. They pour out into the afternoon light.\n\nHe twirls his staff around with his eyes still close. \n\n\"Tanen och'la dandin!\" \n\nHe shouts on the last word; his voice, a raising thunder.\n\nAnother set of engravings appear in red lights. The blue and \nred ancientletters raise from the door and begin twirling together \naround and around in the air.\n\nThe wind picks up and flies past your face. Unbelieveably, you \nswear that it becomes stuck in the woven tunic that you're wearing. \nNow there is a noise in the wind that you cannot give a name.\n\nThe horses and ponies become uneasy as the ground shakes. Their \nriders sensing their own fear, pull in on the reigns and speak to \nthem by name to calm the loyal beast.\n\nThe Maige bent his staff to the center of the door. With one\nlast roar, he opens his eyes and he hollers, \"Yar!\" as if he is \nspeaking to a person.\n\n*page_break\n\nUnexpectedly, the red and blue lights separate and escape into \nmillions of shards of light that shoot away from the door and \ndissipate past the riders and footmen. The sound you are hearing \nraces away with them. That light only blinds you for a few seconds \nas the Elf continues to yell.\n\nIn an instant, a yellow glow escapes the center of the door and it \ngradually takes on a solid form of a  face with a beard. It grows, \nalmost as big as the door itself, returning the noise that the Maige \nis making. You cannot look at it and you must cover your ears before \nit too flees past you and dissipates into the air.\n\nThe Elf finally closes his mouth. The ground stops shaking, the wind \nstops blowing, and the back double doors to the Elder Dwarves home \nswing open. \n\nThe Maige Elves stand quietly calm as they always are.\n\nKing Macken turns to you and Marian. \"Welcome to my home.\" \n\n*page_break\n\nHe crosses the threshold  and the Elves follow. Immediately, \nlamps turn on and you are looking at the inside of your first \ncavern.\n\nBeing an emergency entrance and exit to the Elder Dwarves home, \nit is an extremely large room; about as large as your tent \ncommunity in Kardeen. \n\nOrange stalactites create the ceiling, and pale white stalagmites \ncreate the back wall. The ceiling and part of the wall  reflect \nin the crystal clear pool with blue stalagmites forming in it. \n\nThere are two natural exits within the room, and one Dwarf-made.\n\nThe Dwarves had made the floor smooth and given it a high gloss. \nThe reflection of the ceiling and walls on the pool and floor \nmakes the entire room appear magical.\n\nYou and Marian are staring at the sight. The King's Attendant \ntaps you just hard enough on the arm with the riding crop to \nget your attention. He successfully startles you, bringing you \nback to the present. King Macken is looking at you.\n\n\"My Attendants will take care of the Elves' horses, my ponies \nand my cart. When you are ready, Captain Sorrel or Captain \nLochman will show you where to join us.\"\n\n\"Of course, of course. I'll have my men get ready and we'll \nmeet you soon.\"\n\n*page_break\n\nThe King turns and walks away and exits the backroom.\n\nWhat happens next that surprise you?\n\n*choice\n\n  #The Dwarves Lead Their Ponies Into The Cavern.\n\n    \"Wait! You mean to tell me that our horses can come into \n    the mountain with us?\"\n\n    \"Of course, sire Robyn. We are connected to the mountain \n    at birth and it is our home. Everything we care about exist \n    in the mountain. We would never leave our ponies or cattle \n    to the beast of the night.\"\n\n    You stop and thought about it for a few seconds and smile \n    cross your face.\n\n    \"Of course you wouldn't!\" You exclaim.\n\n    *set cautious %+10\n\n    *goto rh13a\n\n  # There Is Nothing That Your Horses Can Eat.\n\n    \"What are my horses suppose to eat? Certianly \n    we're not taking them with us to join King Macken?'\n\n    Captain Lochman did a sort of chortle.\n\n    \"No, of course not. One of the carts carries the hay and \n    feedbags for the horses and the ponies.\"\n\n    Good, you think, because the inside of a mountain is no place \n    for your horses to die of starvation.\n\n    *set exaggerate %+10\n\n    *goto rh13a\n \n\n  #The Pony Drivers Enters The Cavern, Carts And All.\n\n    \"All right, men, ladies,\" you call out. \"Let's get to work!\"\n\n    As you line your horses against the wall nearest Captain \n    Sorrel, the two carts came rolling in.\n\n    The drivers arrange them in the middle of the room, and quickly \n    begin heaving pitch forks full of fresh hay in several places \n    through out the room for the horses and ponies. \n\n    Next they begin removing the King's ponies from the carts. They \n    receive bags of oats to eat and will be led to the pond to drink \n    later.\n\n    *set leadership %+10\n\n    *goto rh13a\n\n*label rh13a\n\nThe Captain calls to his footmen before you call to your Merry \nMen.\n\n\"Bring them on in!\" You shout. \"Wait until you see this cave!\"\n\nCaptain Sorrel's Dwarves are still busy removing their reins, \nhanging them on the hooks on the wall, and taking off their \nsaddles when your men stagger in, leading their horses, and \nbegin moving their eyes asthe gape over the size and splendor \nof the cavern.\n\n*page_break\n\n\"Imagine if we had this to live in back home?\" Will Scarlett \nasks.\n\n\"We have no reason to leave,\" Tuck responds.\n\n\"Yeah,\" the rest concedes.\n\nThere's a pause. \n\n\"Does anyone else miss home?\" Sean looks around at the others.\n\nNo one says anything. They continue to stare at the room. \nGaunter strikes Sean in the back of his head with his open \nhand. Sean doesn't even say, \"Hey!\" because he realizes that \nit's a silly question.\n\nIn the meantime, Captain Lochman arrives. His unit are only \nfootmen, so after he quickly dismounts, and his young apprentice\ntakes his reins, he exits the room with his men following behind \nin a single line.\n\n\nIt takes you longer to have your horses ready to feed and water \nbecause you always groom them at the end of the day, especially \nafter a long ride.\n\nYou look around and your men are idle. Tuck and Gretchen are \nhaving a cozy chat, while Marian is debating over something with \nLars, so you know they are all ready to proceed.\n\n*page_break\n\nHowever, you no longer see Captain Sorrel nor Captain Lochman.\n\n\"Everyone, attention please!\" You raise your voice just a little \nand cross your arms twice in the air.\n\nYou know that you can create echoes in caves, and a cavern \nthis would create quite a disturbance.\n\nYou have their attention because they're all starting to \nfeel hunger and want to continue to what ever comes next. \n\nWhy do you want their attention?\n\n*choice\n\n  #You Want To Review How To Fight Edent.\n\n    \"Robyn, we've been over it time and time again. Can't we \n    just get on with it?\" Lars wants to know.\n\n    \"Yeah, I'm hungry,\" says Brett.\n\n    \"Me, too,\" whine some of the other Merry Men.\n     \n    \"I'm so tired, I'm about to fall over and sleep on this \n    purty shiny floor,\" someone adds.\n\n    \"You shouldn't have stayed up so late playing cards!\" \n    Someone else retorts.\n\n    Marian looks at you.\n\n    As you can tell, not everyone is as apprehensive as \n    you  are about killing a Dragon.\n\n    \"Ah, come on, men! Don't you want to feel just a lot \n    more safe about what we're here to accomplish by going \n    over it one more time?\"\n\n    Then you hear some variations of...\n\n    \"I feel just fine.\"\n\n    \"I'm not worried.\"\n\n    \"In. Kill the Dragon. Out. What more is there?\"\n\n    \"If nothing else, I'm feeling the best I've ever felt.\"\n\n    You shake your head.\n\n    *set cautious %+10\n\n    *goto rh13b\n\n  #Did Anyone Happen To Hear Which Way To The Meet?\n\n    Everyone, including Marian and Gretchen, look at you with \n    blank faces.\n\n    \"Robyn, dearest, you are the leader of this quest. It \n    is your responsibility to know this information,\" Marian \n    says, trying not to sound condescending.\n\n    \"Robyn,\" Lars begins, \"don't you know?\"\n\n    \"Of course I do! I was just checking to see if any of my \n    team is paying attention as well. You're part of this too, \n    you know?\"\n\n    \"Sorry, Robyn,\" Hugh scratches his head. \"We're just so use \n    to you doing all the thinking, and just telling us what to do.\"\n\n    Jack puts his hand on your shoulder. \"And it's worked just \n    fine for us until now.\"\n\n    \"Don't you want it that way?\" \n\n    \"Well, then, you've got to tell us when you're changing \n    things up on us,\" Bert states. \"How else we're gonna know?\"\n\n    As a choir, the men together exclaim,\n    \n    \"Yeah!\"\n\n    *set exaggerate %+10\n\n    *goto rh13b\n\n  #\"Did Any Of You Notice Which Exist The Captains Took?\"\n\n    They look at one another, shaking their heads, shrugging \n    their shoulders, and in other ways appearing confuse. They \n    begin a low mumbling between themselves.\n\n    \"Did you see them?\"\n\n    \"Nah, I didn't see them.\"\n\n    \"Did you?\"\n\n    \"Why would I? I was busy with my horse.\"\n\n    \"Same with me.\"\n\n    \"Somebody had to have seen somethin'\"\n\n    *set leadership %+10\n    \n    *goto rh13b\n\n*label rh13b\n\n*page_break\n\nAt length, Lars looks directly at you and ask, \"Weren't you \nsupposed be the one keeping contact with the Captains so \nthat one of them would escort us out of here?\" \n\n\"Yeah Robyn,\" Little John says. \"I know you couldn't have \nmissed thesize of this mountain and how difficult it would \nbe to find our way on our own.\" \n\n\"Whoa, don't put this on me!\" You are put off by what Little\nJohn has said. \"We're the newbies here, remember? One of \nthem, if not both of them, should have waited on us.\"\n\nThe mumbling subsides a bit.\n\n\"Well, what are we gonna do?\" William ask for everyone.\n\nMarian finally steps forward and faces the men.\n\n\"Now, now. Settle down everyone. I know you're getting a \nlittle grumpy because we're all hungry, but there's only \nthree doors. We're just have to guess and try one. We can \nalways turn around and try another door.\"\n\nSome of the men didn't like the idea, but they certainly \nweren't going to vocalize it too loud. They continue mumbling, \nstill, Marian stood her ground, put her hands on her hips, \nand gives them the look. You know the look I mean.\n\n*page_break\n\nThe men put down their heads and say, \"Sorry Lady Marian,\" \nin unison.\n\n\"All right\", she says, then she turns towards you. \"I do \nbelieve they took the first door.\"\n\nYou look at the three doors. \"I believe it was the third, \nso that's the one we'll take first.\"\n\nYou pick up your shield and you head to the third arch on \nthe right. You step inside but you notice that the lamps \ndo not come on automatically as they did in this room for \nthe King.\n\nYou stop. You cannot see anything.\n\nYou can hear a variations of the phrase,\"What's wrong Robyn?\" \nbehind you.\n\nAbruptly, Reiff, who is fourth biggest amongst the Merry Men \nafter Tuck, William, and Little John, pushes the throng from \nthe back of the line. \n\n\"Let's get going!\" He shouts rudely. \n\nThen, as his voice reverberates around the room, he trips on \nhis own feet, knocking everyone (some head over heels, others \nsideways, some a mixture of both), down several flights of\nstairs into Mount Kardalean. \n\n*finish\n\n*goto_scene rhedent8\n\n\n\n\n\n\n\n\n   ", "rhedent7b": "*label rhedent7b\n\n*page_break  \n\n*image robinandall.png  \n\nIt is still dark when you and your team of men, women, and \nDwarves are ready to embark on your trek to the top of the \nmountain. \n\nThe air is cool and crisp that morning, there is no snow \nfalling,and you are thankful for that. Hopefully you will \narrive at the new door before the weather changes.\n\nFor the first time, you and your men put on the Elder \nDwarves thick woolen clothing over your own.\n\n*achieve woolen\n\n\nHow do you feel?\n\n*fake_choice\n\n  #You And Your Men Feel Silly.\n\n    You think you look like women in the long tunics.\n\n  #Hot. Literally And Physically Hot.\n    \n    Believe me, you won't feel that way once you're on the mountain.\n\n  #Surprisingly Comfortable.\n\n   Not that you're planning on always wearing these clothes, but\n   for this weather, you're glad the King insisted.\n\n\nThe sun is slowly rising, and it's been two hours since you've \nbeen on the new trail that the digging crew has cleared. \n\nThe wall on one side of the trail is fifteen feet high, \nand there's a drop on the other side. Still, the path is wide \nenough to ride two or three abreast.\n\nHowever, when you turn the third bend, you are suddenly facing\na four feet high bank of fresh soft snow.  \n\n*page_break\n\nYou exhale, your breath creating a curl in front of your face, \nand say with annoyance. \"Oh, great.\"\n\nSean, who is riding the closest to your left, ask, \"What are \nwe going to do, Robyn?\" \n\nYou say nothing. You simply stare at the snow.\n\n\"We do have the shields,\" Marian reminds you. \"We can get \nthrough the snow if we use them like shovels.\"\n\nYou turn and look at her with a blank face.\n\n\"Oh, come on, Robyn! It'll work! Since this snow is almost \nas tall as  Sasheen's team, they can stay behind and bring \nthe horses through.\"\n\n\"That really is a good idea, Robyn. I'm up for it,\" assures \nWilliam.\n\n\"So am I,\" the others men agree, although they don't really \nsound enthusiastic.\n\n\"Okay. I just hope we don't get any more snow fall before \nwe reach the door.\"\n\nEveryone but the Dwarves dismount and move forward with \ntheir shields out to push the snow off of the edge of Mount \nKardalean. \n\n\n*page_break\n\n\"This is slowing us down,\" you over hear Reif complain to Lars \nafter you've been shoveling for two hours.\n\n\"I agree, but it can't be helped, and neither can this growling \nin my stomach. It's definitely time for a break and our next meal.\"\n\nYou turn your head and notice Reif looking up into the cloudy sky.\n\n\"There's no sun and that's making it difficult to tell the \ntime; however, I'm not ready to argue with your stomach, my \nfriend.\"\n\nHe stops and looks directly at you. \"Hey, Robyn, we need a \nbreak. We've been shoveling for hours.\"\n\nThe men stop shoveling. They all smile at Reif for making \nthat very astute observation.\n\n\"In fact, I'm not shoveling another inch until you've fed me!\" \nSomeone else shouts.\n\n\"Yeah!\" Yell all of the men as they let the shields drop onto \nthe pathmaking a big clamor which echos on the mountain.\n\n\"My stomach's growling something awful, Robyn. It's definitely \ntime for some eats,\" cries Lars. \n\n\"Okay, gang, I'm not going to argue with you over that point,\" \nyou exclaimas you drop your own shield on top of the pile with \nthe others.\n\n*page_break\n\nSoon, a fire is blazing from the dry wood you've been carrying \non the back of one of the ponies, and the women retrieve the \nsalted mutton, bread and dried fruit and pass them around.\n\nThe ponies and horses eat from a bag of oats, but you must \nshare your fresh water with them while you all sit on your \ntents to eat. The wall of snow keeps the wind off of you \nwhich makes this period of rest pleasant. \n\n*achieve bag\n\nStill, it is quiet. No one wants to use their energy to \nsing, make jokes, prank, or tease another Merry Man. Instead, \nthey sat quietly as they chew and swallow, passing a leather \npouch of grog around to help ease off the chill.\n\n\"How much further are we to the top?\" You ask Sasheen.\n\n\"We've been making good time, truthfully. Of course, we would \nhave been there by now if it weren't for the new snow. I can\nsay that we'll be there before nightfall.\"\n\n\nSoon, you, your team, and the Dwarves repack all of your \nbelongings, strap them tight to the back of the ponies and \nhorses, and continue up the path.\n\nThe path is more steep at this juncture. \n\nHow long does it take to turn the next bend?\n\n*fake_choice\n\n   # One hour, but...\n\n     it feels like three, though no one is complaining that \n     they need another break.\n\n  # Two hours, but...\n\n    it feels much, much, much longer because the wind is \n    picking up.\n\n  # Three hours, but...\n\n    it feels longer and you're worried that you're going \n    to have to spend the night on the side of the mountain.\n \nWhen you turn the next bend you see something raising above \nthe next slope as part of the cap of the mountain.\n\nIt is grey and it looks hard and solid. It rises into the \nclouds almost as high as the tip top of the mountain. There's \nnothing in everything you have ever seen before to prepare \nyou for a site such as this. \n\n\"What am I looking at?\" You ask out loud to no one.\n\n*page_break\n\nMarian is beside you also staring. She reaches for your hand.\n\n\"Is that the door we're seeing?\"\n\nYou do not answer, but you squeeze her hand.\n\nYour men realize that you and Marian have stop shoveling. They \nare now staring ahead at the cap as well.\n\nYou hear Sasheen pushing her way to the front until she is \nstanding next to you.\n\n\"Ah, it's magnificent! I had no idea they would rebuild it \nas such!\" She exclaims loud enough that her voice is picked \nup by the wind. \n\n\"Is that the door?\" You ask, looking directly at her, but she \nis calling her team and doesn't hear you.\n\n\"Toma, Glores, Renie, Gren, Jorelle, Kent! Quick, bring the \nponies!\"\n\nThen there is a bit of confusion as your escorts abandon your\nhorses and come galloping on their ponies between your men to \ntake the lead of the excursion back.\n\n\"Well,\" Sasheen calls to you, \"are you coming? The amount of \nsnow on the path is no longer deep. We can make it to the \ntop of the mountain in no time!\"\n\n\"Oh!\" You shout. \"Ladies, men, grab your shields, mount your \nhorses. Let's get going!\"\n\n\nNext thing you know you are all racing as fast as your horses \nand can go behind the short leg ponies on your way to the \nnew door. \n\nThe closer you are to the door the better you can truly \nsee how magnificent it truly is. It is made of metal instead \nof wood as the original door had been, and there are no ancient \nDwarfish ruins etched into it's surface.\n\nRight now, you really don't care how it is made. You feel a \nthrill that it looks heavy enough to keep out any rogue trolls \nor nasty Black Elves.\n\n*page_break\n\nSasheen jumps off of her pony and wrestles with the bag that is \nslung around her shoulder. She pulls out a long metal triangle \nthat is a little bit bigger than her own hand. It was smooth \nand shiny on one side with short round ridges on the other.\n\nYou walk up and join her at the door.\n\n\"This is a key,\" she says to you. \"Duncan from the crew who made\nthe door sent some down to the King before we began our climb.\nEveryone who lives in the mountain or has freedom to visit us \nwithout an invitation will have their own key that no one else \nwill be able to use to give them access.\"\n\nShe sticks the key into a thin opening. \n\n\"It is my understanding that you and your people will each \nreceive a key.\"\n\nYou and Marian smile at the thought of being that high up in King\nMacken's gratitude. \n\nThe key turns once, and Sasheen says, \"Tanen ouch'la dos.\"\n\nThe double doors begin to slowly open inward. At the same time \nlamps in the large entry room light up spontaneously and you are \nlooking at the curve walls of the first natural cavern you \nhave ever seen.\n\n\"Everyone, come in!\" Sasheen shouts. \"Hurry, before the sun sets!\"\n\nYou and your team watch as she waits for her team to lead the \nponies, two each pulling a cart, through the doors and enter the \ncave.\n\n\"We can take our horses in with us?\" You ask, amaze.\n\n\"Robyn, you're not thinking. This is a door leading to an entrance \nand an exit room. This cave is huge, as they are in every level of \nthis mountain. We have never left our ponies or our stock outside. \nThey live inside with us to be protected.\"\n\n\"Oh!\" \n\nYou're certainly happy to hear that. You love Clint and didn't want \nto see neither he, nor Marian's lovely Daisy whose getting up there \nin years, or any of your other horses turn into horse sicles.\n\nOnce you've step inside pulling, dearest Clint behind you, on the \nleft of the chamber, you can see a large pool that has been forming \nfrom trickling underground water for centuries. \n\n*page_break\n\nThe floor had been smooth and buff to a sheen. The reflection of \nthe gold and blue colors of the stalactites on the roof of this, \nthe upper  most room of the mountain, are incredible. \n\nEveryone is overcome with emotions.\n\nYou mostly hear a lot of, [i]\"Awww,\"[/i] sounds coming from your \nmen, the likes of which you have no idea they can make.\n\n\"It's like something only in a dream,\" you are surprise to hear \nTuck utter.\n\n\"I read about this in our books,\" Sasheen is saying. \"All of us \nhave. There are drawings, but nothing compares to this.\"\n\n\"And to think this was all covered with rock and dirt before the \ndigging crew came to clean it up,\" Glores says, and all of the \nother Dwarves agree while nodding their heads.\n\n\"All right, what do we do and go next?\" You ask Sasheen.\n\n\"First, let's take care of our ponies and horses. We've brought \nfreshhay for them, and they can drink from the pool. My drivers \nwill take care of the goods on the cart.\"\n\n\"All right. Then, after, where do we go?\"\n\n\"Down, by way of the completed stairs. I can guide you to meet \nKing Macken and his captains. They didn't need to deal with the \nnew snow, so I know they're already here.\"\n\n\"Let's get to work, men!\" You shout just enough to create an echo.\n\n*page_break \n\nEveryone looks around in surprise, wondering where the extra \nsound is coming from, except for the Dwarves. They are laughing.\n\n\"Ha! Yes, that's what happens when you shout around here,\" Sasheen \nis saying between her laughter. \"So we really frown upon doing \nthat! It's considered rude, no matter whose company you're in.\"\n\nShe continues laughing while your cheeks turns red.\n\n\"Sorry about that.\"\n\nShe leads her pony further into the room and against one of \nthe walls. The scouts follow suit and remove the bridles and \nsaddles from their ponies, hanging them onto hooks, then leading \nthe ponies to the fresh hay that one of the cart drivers shovels \nnear the pool.\n\nYou have your team lead their horses against the opposite wall; \nbut it takes you longer to have them ready to eat and drink \nbecause you always groom your horses at the end of the day, \nespecially after a long ride.\n\n\nAfter awhile, Sasheen is impatiently pacing up and down the room \nwhile her team sits together next to their ponies, gnawing on some \nextra dry jerky.\n\nSuddenly, she stops. \n\n\"You know what,\" she begins,\"I'm really anxious to see the room \non the next level. It had to have some renovation done as well. \nWhy don't you join me when you're finish with your horses?\"\n\n\"Sounds good,\" you respond without looking up from what you are \ndoing.\n\nSasheen opens the map, looks over it for a few moments, then \nleads her team, with their packs on their back, down one of the \nunnatural arches in the wall.\n\n*page_break\n\nFinally, you look around and all your men are either sitting on \nthe floor, leaning  against their horse, slouching, or in some \nother way relax while they share some idle chitchat with one \nanother.\n\n\"Well I guess we're ready to meet Sasheen so that we can eat \nthird meal with the King,\" you say with a big grin across your \nface.\n\nYour men prepare by putting on their helmets that only partially \nfit on their heads, making sure that their weapons are in place \nand snug, backpacks on their back comfortably, and their shields \nare in one hand.\n\nThen, everybody notices that there are two arches that lead out \nof the room. The men begin to look between one opening and the \nother; and Gretchen ask out loud the question that is on everybody's \nmind.\n\n\"Which opening did Sasheen take?\"\n\nA mumbling begins amongst your men.\n\n\"Why, that one, of course!\" You say assuredly as you point to \nthe arch on the right.\n\nMarian looks back and forth between the arch on the left and the \narch on the right. \n\n\"Are you sure? Did you see her when she left?\"\n\n\"Well…\" You pause. You've never lie to Marian and you didn't want \nto start today. \"No, I didn't; but I did look at the map when we \nwere below the mountain,  and I'm sure that it's that opening.\" \nYou say with assurance as you point once again to the right.\n\nWell, you might have been honest with Marian, but your honesty is \nonly making your men grumpy.\n\n*page_break\n\n\"What? You're not sure?\" Bert, who is near the front of the group, \nask.\n\n\"What are we supposed to do? Walk around this entire mountain \nuntil we find Sasheen?\" Someone else questions.\n\n\"Robyn,\" Lars begins, \"this isn't fair. We're tired and we're \nhungry, and we're very tired. This is no way to treat a man my age. \nHow could you lose Sasheen?\"\n\nThe mumbling amongst the men becomes louder.\n\n\"All right men, take it easy,\" You say with your hands up in the \nair. \"We'll find Sasheen, we'll find the King, we'll get plenty \nof food and plenty of rest. I promise.\"\n\nThe mumbling lessons a bit because, after all, they do trust \nyou.\n\nMarian whispers in your ear. \"So which way are we taking?\"\n\nYou look at her. \"The right, like I've said.\"\n\nYou pick up your shield and you head to the arch on the right. \nYou step inside but you notice that the lamps do not come on \nautomatically as they had in this room for Sasheen.\n\nYou stop. You cannot see anything.\n\nYou can hear a variations of the phrase,\"What's wrong Robyn?\" \nbehind you.\n\nAbruptly, Reiff, who is fourth biggest amongst the Merry Men \nafter Tuck, William, and Little John, pushes the throng from \nthe back of the line. \n\n\"Let's get going!\" He shouts rudely. \n\nThen, as his voice reverberates around the room, he trips on \nhis own feet, knocking everyone (some head over heels, others \nsideways, some a mixture of both), down the partially finish \nflights of stairs.\n\n\n*goto_scene rhedent8\n\n\n*finish", "rhedent7c": "*label rhedent7c\n\n*page_break\n\n*image robinmarian.png\n\nYou wake up to the strong smell of roast lamb chops on \nthe fold-able table near your mat. And if it is possible, \nyou also smell the fresh bread with butter slather all \nover the top.\n\n\"That dear wife of mine. She never forgets about me,\" \nyou say out loud as you sit up. \n\nYou grab the plate and begin eating hurriedly. You don't \nknow what time it is but you can tell that you are late \nbecause of all the noisy activity outside.\n\nThe King, two of his troops, his wagon of personal \nbelongings, and the Maige Elves should have been on their \nway hours ago. Soon it will be your turn to leave and \ntrek up the side of the mountain to the back entry. \n\nYou can hear shouting outside. One of them is Marian.\n\n\"No! I said I wanted all of the tents down and packed by \nnow! Why aren't they? As soon as Robyn is up and out, \nours should be the very last one! I shouldn't have to say \nthis again!\"\n\n\"That's my woman\", you say to yourself with a smile as \nyou swallow your last bite of the chop.\n\n*page_break\n\nThen as if on cue, Marian enters the tent carrying a tall \nmug. Since the Dwarf women do not have proper riding clothes, \nshe is wearing her leggings with a Dwarf tunic.\n\n\"Oh, you're finally up.\" She says, although you notice she's \nnot smiling. \"Here. I figured you\"ll need something to drown \ndown your breakfast, or lunch, whatever you decide to call it.  \nIt's too late for one but too early for the other.\"\n\n\"Aren't we supposed to leave directly after second meal?\" \nYou ask as you accept the mug.\n\n\"Yes, when the sun is directly above us. Right now it's not, \nbut I've already asked some of the men who were up early to \neat their second meal. I'm hoping to keep us on the move with \njust a short break. Sasheen assures me that shouldn't be a \nproblem.\"\n\n\"That's one of the things that I love so much about you, my l\nittle squirrel. You know when to take over.\"\n\n\"And I love that you trust me to do the right thing.\"\n\n\"Of course I do!\" \n\n\"Then when you're done eating, would you mind heading over to \nthe river and wash up, and I'll send a couple of the men over \nto finish packing our things and bring our tent down? Put on \nthose clean clothes I left in the corner.\"\n\n*page_break\n\nYou look over and see that they are your Elder Dwarves clothing.\n\nYou stand up from the mat and salute her. \"Aye, aye, me Captain!\"\n\nThat got a smile out of her.\n\nYou look up and can see that it's overcast at the top of the \nmountain, but the sun is high and bright as it's moving towards \nthe blue western sky when you are ready to be on the way. \n\nYou and your team lead with Captain Lock and his pony unit \nbeside you. The three carts are being driven by four ponies \neach, and a foot unit marches at the end. \n\nThe way to the back door is more like a road than the path. \nOne side has a nine foot wall, and on the other side there is \na short drop to the river that gurgles as it runs below the \nmountain. It's a beautiful view from where you are against the \nmountain. \n\nYou feel great delight in being given the choice on when and \nwhere to enter the ancient homeland of the Elder Dwarves,  \nand you're glad you chose this way.\n \n\nAfter a few hours of galloping at a nice pace, you notice a large \ndoor of dark wood and shiny metal against the mountain.\n\n\"Captain!\" You call behind you. \"Is that it? Is that the door?\" \nYou're pointing ahead.\n\n*page_break\n\n\"Yes, it is!\"\n\n\"Marian, should we take a break or keep riding? It doesn't \nlook far at all. We can enjoy our third meal where it's warm \nand cozy.\"\n\nWhat do you prefer to do?\n\n*choice\n  \n  #I Can Ride For A Couple Of More Hours.\n\n   After all, you did eat late, and you did eat a lot. I know that \n   you can easily ride for a couple of more hours.\n\n   \"I don't see why we can't continue riding,\" Marian responds.\n\n   \"Agree!\" Captain Lock says after reviewing the map and turns to \n   instruct his officers to past down the command that they are going \n   to increase the speed.\n\n   \"Let's pick up the pace then!\" You say and instruct your team as\n   you hit Clint's planks to instruction him to gallop faster, so do \n   the Dwarves until all of you, including the marching unit, are \n   moving approximately three miles per hour faster than you were \n   originally!\n\n\n   *set leadership %+10\n\n   *goto rh14a\n\n  #Our Horses Need A Rest.\n   \n   It's not good to ride your horse too long. And let's not forget \n   about the ponies who have to pull those heavy carts.\n\n   \"I think, more than us, our animals need a break,\" she suggest.\n   \n   \"I follow your logic, dearest,\" you say. It doesn’t look far \n   at all. I bet we'll arrive there within the hour.\"\n\n   \"I agree,\" the Dwarf Captain adds. \"It isn't far at all, and\n   we don't need to push our rides.\" \n\n   *set cautious %+10\n \n\n   *goto rh14a\n\n  #Truthfully, I'm Feeling A Bit Peckish.\n\n   You're making great time, so this is a perfect time to stop \n   and eat some dried mutton, bread, and water, and feeding the\n   horses. \n\n   \"You're always hungry, Robyn!\" Marian teases.\n\n   \"Then, should we stop and take a break?\" You ask again.\n\n   \"Why not!\" Captain Lock \n\n   *set coward %+10\n\n   *goto rh14a\n\n*label rh14a\n\n\nThe back door is indeed made from planks of Lignum Vitae \nwood, one of the strongest woods in the world, and ore \nfrom the mountain. \n\nThere are ancient engravings in the door that Captain \nLock did not recognize nor are they on the map or the \nother papers given to you by the King.\n\n*page_break\n\nYou, Marian, and Captain Lock dismount and approach the \ndoor.\n \n\"To my understanding,\" Captain Lock begins, \"the Maiges found \nthat our door could be compromised, and that's why they took \nit upon themselves to put a seal on it.\" \n\n\"Oh, I understand,\" interrupts Marian. \"I guess they do see \nthemselves as your guardians in a sense.\"\n\n\"Yes, just as we do with the Laurels and other smaller, \nweaker Fair Folk.\"\n\nYou indicate to him to continue.\n\n\"The door will be rebuilt, stronger than it already is,\nand we will each have our own personal key that works with \nthe words that the Maige Elves.\"\n\n\"A key?\" You repeat.\n\n\"Yes. You and Lady Dore will have one because you are \nbeholden by the King and he will allow you access to our \nmountain home whenever you please without prior permission.\"\n\nYou look at Marian, smiling. \n\n\"Not since our dear King Richard have I been treated \nso well.\"\n\nMarian face returns your glow.\n\n*page_break\n\nHe closes his eyes and says the words as instructed. \n\n\"Tanen ouch'la dos.\" \n\nThe large doors begin to open slowly. At the same time \nthe lamps on the inside of the room light automatically, \nand for the first time, you are looking inside of a cavern.\n\nIt is a extremely large room, about as large as your camp \ncommunity at Kardeen, with orange stalactites creating the \nceiling, and pale stalagmites creating the back wall. \nThe ceiling and part of the wall reflects in the clear \npool of water with blue stalagmites forming in \nit. \n\nThere are two natural exits from the room, and one Dwarf-made.\n\nThe Dwarves had made the floor smooth and given it a high \ngloss. The reflection of the ceiling and walls on the pool \nand floor makes the entire room appear magical.\n\nYou've never seen anything like it in your life. You and \nMarian both gasp and your eyes grow wide. She reaches for \nyour hand.\n\nCaptain Lock takes the reins of his horse and leads him \ninto the room. He gives instructions  to his men to dismount \nand bring their ponies in.\n\n*page_break\n\n\"Wait! Wait! What are you doing?\" You ask aghast.\n\n\"We're going inside. What are you waiting for?\" He ask, \nhis brow turn inwards.\n\n\"Do you mean you want us to bring our horses inside?\"\n\nCaptain Lock laughs. \n\n\"Yes, and the carts also.\"\n\nHe pauses and looks at you still smiling. That's when \nyou realize that he's the first Dwarf from the capital \nyou've seen laughing. Otherwise, every Dwarf connected \nto the capital never even smiles. \n\n\"Come on,\" he continues. \"It will be night soon.\"\n\nYou have your men dismount, and together you enter the \nmountain.\n\nThat's when you see the horses and carts that the King's \nparty brought with them. Their saddles sat on the floor \nand their reins and chains hung on hooks. \n\n\"Leave your horses to eat and drink. I'll have the cart \nleaders unchain the ponies so that they can do the same. \nThey'll also take care of the cart's content.\" \n\n*page_break\n\n\"And where do we go next?\" You ask.\n\n\"See the fork over there?\" He points to a place where there \nare two round natural arches side by side in the wall. \"One \nleads to where the servants and my warriors will meet the \nothers, and we will find the King waiting for us at the end \nof the other.\"\n\nHis arm is moving until he is pointing to the natural opening \non the left.\n\n\"That's great! I know I'm not the only one ready for third \nmeal.\"\n\nYour men respond with some sort of eager version of:\n\n\"Sure am!\"\n\n\"Yeah!\"\n\n\"I'm starvin'!\"\n\n\"It's about time!\"\n\n\"Feed me!\"\n\n\"Very well then,\" Lock affirms. \"When you are ready, \njoin us.\"\n\n*page_break\n\nCaptain Lock and his ponymen efficiently remove their \nbridle and reins, and hang them on hooks in the wall, \nstack their saddles on the floor, and lead their ponies \nto the hay. \n\nWith their packs on their backs, they pick up their \nshields. The infantry join them in one straight line.\n\n\"See you and yours soon, Robyn,\" Lock calls out as they \nexit through the opening to meet the King. \n\n\nYou follow suit, but it takes you, your men and \nladies a little longer to lead your horses to the hay \nbecause you always groom them at the end of the day, \nespecially after a long ride. \n\nBert is the first to complete his chores and ventures \nclosely to the unnatural opening on the other side of \nthe room.\n\n\"Where do you suppose this arch leads to?\" he ask.\n\n\"It doesn't matter. We're to follow Captain Lock,\" you \nremind him.\n\n\n*achieve boots2 \n\n\"Yeah, but each room is different\", asserts Will. \"I can't \nhelp but wonder where this opening leads myself. May even \nbe a stairwell,\" he says as he tightens his boots. \n\n*page_break\n\nHe joins Bert peering into the arch, but he did not enter \nfar enough in forthe lights to come on automatically.\n\n\"The lamps didn't come on.\"\n\n\"It may be because we haven't actually entered,\" explains \nWill.\n\nAs each man finishes with his horse, check the placement of \ntheir knives, the tightness of their blades around their waist, \nand put their quivers with their bows around their shoulders,\nmore and more of them picks up their shield in one hand and \nbecome curious about the opening.\n\n\"This could lead to where they do the smelting. I heard \nthat's deep in the mountain,\" one of the men concludes.\n\n\"Could lead to where they mine the gemstones,\" discloses \nanother.\n\n\"That's where I want to go!\" Announces yet another as he \npushes the men a little from the back of the pack.\n\n\"Yeah!\" All of the men beam.\n\nFinally, when you are ready, you take Marian's hand and \nforce your way to the front of the group, just under the \nopening. \n\n*page_break\n\nBy now, every one is making their own personal conjecture \nof what is on the other side of that particular opening; \nincluding Gretchen who swears that it must be where they \nhave their barn because of the smell, having a very sharp \nnose for such things.\n\nWhere do you think that opening leads?\n\n*fake_choice\n  # \"It Doesn't Matter Right Now.\"\n\n      \"Kardeen is now your home. You have plenty of time to \n      explore the the halls of the mountain as visitors with\n      an open pass.\"\n\n  #  \"I agree with Gretchen.\"\n\n     \"After all, the horses, ponies, and carts of the King's \n     traveling party are not here. They must have been taken \n     to the next room, like a barn.\"\n\n  #  \"To A Place We're Not To Enter.\"\n\n     \"That might be why the lamps didn't automatically come on \n     as they did when the back door came open.\"\n     \n\n\"Everyone, everyone, what are you doing?\" You shout. \"We're \nsupposed to be meeting King Macken so that we can have third \nmeal. Have you forgotten that?\" \n\nEverybody's eyes are now wide and some of their mouths are \nnow open.\n\n*page_break\n\n\"I don't know about you, but I'm hungry!\" You continue.\n\nNo one responds. They continue to gawk.\n\n\"Let's go, and that's an order!\"\n\nSilence.\n\n\"Robyn, look!\" Came Marian. She points to something \nbehind you.\n\nYou turn around.\n\nThe lamps have come on and now you are looking at a large pool, \nbigger than the one in the room that you are in, with a large \nand long grouping of stalactites above it, some of them nearly \ntouching the pool. \n\nIn the middle of the pool, an island of orange stalactites of \ndifferent heights rise, and blue draperies hang to form  the \nback wall. \n\nTiny diamonds are imbedded into the walls making the entire room \ntwinkle as stars in the sky. \n\nThe team in the front who can easily see are quietly staring in \nabsolute awe.\n\n\"What are 'ya gawkin' at?\" Hugh is the furthest in the back and \nis standing on his tip toes trying to see above everyone's heads \nand shoulders.\n\n\"Yeah, step aside,\" commands Reiff as he begins to shove. \"The \nrest of us want to see as well!\"\n\n*page_break\n\nThen Reiff does a heavy push and looses his footing. He falls \non to the back of Geoffrey, and the next thing you know, with \na lot of yelling and a lot of clanging of shields, there are \nfourteen men and two women falling in a domino effect.\n\nThey didn't fall into a pool. Instead, they slide down several \ndisorientating floors into the mountain. \n\n\ngoto_scene rhedent8\n\n*finish", "rhedent8": "*label rhedent8\n\n*page_break\n\n*image robinmarian.png\n\nThe group didn't enter quietly into a room many floors \nbelowthe entrance in which they enter, but slide for \nseveral flights into the depths of Mount Kardalean; \nwailing and bellowing, and clanging their shields, \nuntil you finally hit a large, solid object that keeps \nthe team from falling any further. \n\n\nNext, one by one, each of the fifteen men and two \nwomen pile on top of you, starting with your dearest \nwife, Marian, and ending with the rowdy Reiff. \n\nOh, what a terrible sight it is. The weakest feel \nstuck and don't even try to physically move the person \non top of them, and the strongest ones are trying to \nphysically push everyone else off.\n\n\"Get off of me!\"\n\n\"Hey, stop pushing!\"\n\n\"Wait! Wait! I can't move yet!\"\n\n\"Get off! Get Off!\"\n\n\"I can't!\"\n\n*page_break\n\n\"Who's dat on top?\"\n\n\"I don't know, but he's gotta move first!\"\n\n\"I'm not gonna say it again! Get off of me!\"\n\n\"Reiff started this!\"\n\n\"Yeah, and I'm gonna get him when we're back on \nour feet!\"\n\n\"Not if I get him first!\"\n\n\"No, I didn't start this!\"\n\nThen four men along with Marian and Gretchen yell, \n\"Just get off!\"\n\nTheir voices reverberate throughout the cavern.\n\nThe lights have come on and you can see the gold \ntrinkets covering the floor and a mound of everything \nimaginable that gold canbe made into pile high next \nto the stairs. \n\n*page_break\n\nGold statues, gold plated decorative objects, gold \ncups and plates...it was amazing. You've seen a lot of \ngold in one place before (you own one!), but never anything \nlike this.\n\nAfter many more moments of blaming, everyone is \nstanding, straightening their weapons and pulling down \non their helmets.\n\nYou open your mouth to have their attention (this is \nobviously not where to meet the King), but something \nabout the gold reminds you of something, a very \nimportant piece of information, and you look down \nat the floor. You become aware of where you are.\n\nWhere are you?\n\n*fake_choice\n  #In The Gold Molding Room.\n\n   That explains the large variety of gold objects \n   in the pile and on the floor.\n\n  #In The Shipping Room.\n\n   Remember, King Macken explain how they once share\n   the obects with other Fair Folk to deliver \n   through out the world. That's how they made their\n   living.\n\n  #The Dragon's Room.\n\n    This is exactly where Edent would make the heart\n    of his residence in the mountain. Dragon's simply\n    love gold.\n\nYou slowly turn around and look at the bottom of the wall \nwhere you fell to find that it's not a flat wall after all.\n\nA large, gold and thick shape begins as a coil and curves\nup and over; a line of spikes running down it's middle.  It \ncontinues until you clearly recognize long, curving nails, \nof a foot with a snout resting on the end pointing adersely in\nyour direction.  \n\nThere are undeniably pointy teeth extending from a mouth, \nshort boney structures over its jowls, and two long horns\non top of the head as the spikes end in between. \n\nWhat must be overly large wings fold and lean against each \nside of the scally body. \n\nIn this way, you literally stumble on the five hundred-years-old \nDragon, Edent.\n\n\"Shhhhhhhush,\" you whisper to the others as you quickly \nshuffle to push them backwards.\n\n*page_break\n\nThere is an eye, but it's shut when you hear the deep, \ngutteral sound shake the cavern.\n\n\"Who dares disturb my slumber in my own home?\" Came the voice, \nnice and slow. \n\nHis left eye snaps open.\n\nYou push your team further back.\n\n\"All right, he knows we're here.\"\n\n*finish\n\n*goto rh15\n\n*label rh15\n\n*page_break\n\n*image robinmarian.png\n\nYou turn around to face your team.\n\n\"All right,\" you speak just above a whisper to your team, \"this \nis what we've talked about and what we've practiced for. You \nall know what to do. I believe in you! Just listen for my signals!\"\n\nQuietly, they each nod their heads, and holding their shields high \nthey begin to slowly disperse from the small pack.\n\n\"Thief,\" Edent utters, low and frightful, his one eye searching. \n\"you may be able to procure one of my precious collections, but you \nwill not leave these caverns alive.\"\n\nYou walk forward a couple of steps, staying to Edent's left, \nimpoweringall of your will to keep from shaking, and begin what \nyou do best; charm.\n\n\"I'm no thief, oh great Dragon. I'm Robyn Hood,\" you say with \ngreat flourish, though you do not taunt him by bowing. \n\n\"You say that as though I know who you are.\"\n\n\"Ah, but I know of you, formidable one, and I have traveled \nfrom the great green isle of England simply to gaze upon you.\"\n\n*page_break\n\nAbruptly, Edent raises his head exposing the claws on both of \nhis forelegs. You slowly step backwards.\n\n\"You know of me?\"\n\n\"Yes,\" you speak slowly, but clearly, \"and I know the entire \ntale of how easily you overwhelmed the simple Elder Dwarves of \nKardeen and took Mount Kardalean from them. Which they \ndeserved, if you were to ask me.\"\n\n\"It was nothing. I come from a family of mighty warriors.\"\n\n\"And what you want, you take, correct?\"\n\n\"Precisely.\"\n\n\"Spoken as a true king under the mountain.\" You pause. \"There's \njust one thing I had difficulty believing.\"\n\n\"Oh?\"\n\n\"It's a little thing, your eminent one, and I'm truly embarrassed \nto even mention it.\"\n\n\"And what is that?\"\n\n\"It is said that your entire body is protected by thick scales, \nbut some say that is not true.\"\n\n*page_break\n\n\"How dare they!\" Edent stands on his forelegs, his wings lift \nup as high as they can. He turns his head, attempting to see \nyou better.\n\n\"Who speaks these falsehoods?\" He bellows. \"I shall have \ntheir burnt hide for my next treat, and deliver affliction \nto their family for generations!\"\n\nYou back step several more feet.\n\n\"Oh, Edent, they aren't worth you worrying about; you're \nmuch too noble for that.\"\n\nYou pause and Edent composes himself.\n \n\"Still,\" you continue, \"I so would love to see all of your \nglory. May I please behold your beautiful golden belly?\"\n\nEdent looks directly at the place of where he smells and hears you. \nYou are exactly where he wants you. You prepare to move on the gold \nfloor as fast as you can with your shield up. \n\nYou stare up at the Dragon and you swear that the corners of his \nmouth turnupward into a curl as he says, \"You are a fine guest. \nA most pleasant visitor. Of course you can.\"\n\nAnd then, very slowly, Edent raises up his left foreleg and leans \non his right side exposing his belly and throat. \n\n*page_break\n\nWhat do you know? King Macken is right. \n\nIn plain sight on his belly is a versicle area where four scales\nare missing and much more pliable under skin is exposed. On his\nchest, two scales are missing, just enough for a knife to enter, \nand you can clearly see the under skin that forms the heartplate.\n\nEdent is being so polite, that for a moment you feel badly for what \nyou're about to do; however, he is a fire breathing Dragon, and he \ndid threaten you, remember?\n\n\"Now!\" You shout as you move swiftly from your previous position \nto a new one, holding your shield in front of you.\n\nJack moves quickly to the left, punctures the under skin, then \nslices into Edent's body in one motion. He doesn't stop moving, \npulling his shield in front of him on his way past, until he's \nagainst the far wall.\n\nEdent wails as he lowers his leg, his thick tail flopping heavily \nback and forth. His eyes squints, as he roars. Then he takes several \nseconds to inhale air and you cry out, \"Shields!\" \n\nEdent spews fire at the last place he remembers smelling you.\n\n*page_break \n\nTuck jumps from Edent's leg, catching himself on the Dragon's chest \nwhere the scales are missing using two long axes.\n\nThe area where bloodfire is spilling out onto the floor, melting the \ngold that it hits, can be seen from several angles in the room.  The \nteam continues moving, sending arrows into the opening or into Edent's \neyes.  The Dragon's howling echoes through the entire mountain.\n\nTuck pulls himself up, using the axes to climb closer to the heart \nplate.\n\nIn Edent's confusion, he is seeing less than normal and is not sure \nwhere to aim his flame. He inhales deeply.\n\n\"Shields!\"\n\nHe sprays fire across the room, although he's unsure of his target. He \nis unable to trust his nose and his eyes are beginning to fill with his \nown bloodfire. \n\n\"Hurry, Tuck!\" You call. \"We only have one more try before our shields \nare useless!\"\n\nTuck supports himself with one of the axes as he reaches into his belt \nfor his short knife. He cuts into the under skin over the heartplate, \nthen into the heartplate itself.\n\nThe Dragon attempts to free himself of Tuck by weaving and shaking his \nchest. Tuck swings along with the Dragon's struggle, holding tightly to \nthe axe with each motion.\n\nEdent takes in his third long breath.\n\n*page_break\n\n\"Shields!\"\n\nYou see Tuck drop his knife to pick up his shield that's on his belt. \n\nThe Dragon lowers his head, emitting his firebreath downwards nearly \nhitting Tuck, but his shield is there in time.\n\nThen swiftly, Tuck pushes his arm into the open heartplate, tugs \nwith all of his might twice, and pulls out Edent's heart. \n\nThe sound that Edent makes is so horrific that you and the others \nmust cover your ears to endure it. Then, his tail thumps on the floor \nof the cavern and his head waves back and forth as his eyes rolls \ninto the back of their sockets.\n\nAt length, his head falls forward, his tongue lobs from his mouth, \nand steam escapes from his throat. The color of his scales changes \nto dirty yellow.\n\nEdent, the five hundred-years-old Dragon, is dead.\n\nAt least, you're hoping he's dead. You're all quiet, not moving to \nventure close to the body of the giant creature to verify its demise. \n\n*achieve bow\n\nStill, it didn't take long for the cavern to suddenly fill with the \nsound of grown men whooping and hollering like you've never heard \nwhooping and hollering before. \n\n*page_break\n\nSome are cheering for Jack for being the fastest amongst them, the \nothers for Tuck for being the strongest. Not even Little John nor \nWilliam had the true strength to pierce the Dragon's heart membrane \nwith his knife and remove the heart with his hand. \n\n\"Jack! Jack! Jack! Jack!\"\n\n\"Tuck! Tuck! Tuck! Tuck!\"\n\nYet, you couldn't smile because something isn't the same any longer,\nyou can feel it in your gut, and you are not ready to celebrate just \nyet.\n\n\"Hey, is everyone all right?\" You begin to ask. \"Everyone?\" You \n \"Is anyone hurt?\"\n\nThen suddenly, you hear a scream. \n\nSomeone is injured. Who is it?\n\n*fake_choice\n\n  #Lars.\n\n    It's Marian screaming as she looks at poor Lars' left arm. Some \n    how, when Edent fell, the eldest of them all was too close, and\n    his arm was caught by one of the Dragon's claw. The claw was \n    still sticking out of his arm. \n    \n    Gretchen always carry a medical kit and quickly got to work to \n    save Lar's arm.\n\n    *achieve tourniquets\n\n    Then, during all of the celebration and attention given to Lars, \n    you realize that you have not seen Tuck.\n   \n  # Tuck.\n    \n    You look down at Edent's body. The Dragon has fallen on top of \n    Tuck and the large man's body lays under the long thick scally \n    neck. Gretchen is the one screaming. She is holding his head in \n    her lap, shaking him from the shoulders, but Tuck's eyes are \n    not open and he is not responding.\n  \n    # Will Scarlett.\n\n    Will and Marian are screaming because he didn't shield himself \n    well and the dragon fire caught his hands to his wrists. \n\n    Gretchen runs to the rescue with her medical kit.\n\n    But, he is
