byn Hood!\"\n\n\"Hip, hip, hooray! Hip, hip, hooray! Hip, hip, hooray!\"\n\nI must admit, I like the name Robyn Hood, too.\n\n*page_break\n\nWhen the word got out around the forest about your accomplishment with \nthe group robbery, the small band of believers grew. Brett, Reif, Hugh, \nGeoffrey, Bert, Sean, and Gaunter are the first to join Lars, Jack, Allan,\nLittle John, William and Will Scarlett as your men of Sherwood Forest, \nwilling to do your bidding.  \n\n*finish\n*goto_scene rh3", "rh3": "*label rh3\n\n*page_break\n\n*image onlyrobin.png\n\nNow that you have a regular constant supply of booty, you begin to \nmake your men's  life style a little better.  \n\nFirst, you establish the major oak  as your main camp hideout and \nthe hidden caves as places to hold up and keep the loot.   \n\nYou convince the men to bath and wash their clothes in the nearby River \nMaun on a regular basis; and once they become more civilize, at least \nin looks, you send the less notorious into Nottinghamshire, the neighboring \nvillages, and the hamlets to purchase what they couldn't trade or steal.  \n\nYou and your men are not only eating better, but in a variety of innovative \nways that you have taught them, the supplies that you need for a happy \nexistence are starting to appear. \n\nThe men had better quality of clothing, hats, and shoes. They each now had a \nhorse which made traipsing all around the forest by foot a thing of the past. \n\nYou acquire weapons and you teach the men how to care for them properly.  \nYou now have tents, tools, blankets,  eating utensils and plates, mugs,\nand real pots to cook your food. \n\n*achieve sword2\n\nYep, life is definitely improving.\n\n*page_break\n\n“Men,“ you start one morning, “we need ways to protect ourselves and to \nkeep what is ours safe from those who do not want to join our way of \nlife.“\n\nThis time, you're not getting a lot of odd looks or scratching of heads; \nthe men quietly wait for you to continue. \n\n“We need to set up look out points across the main road that leads in \nand out of the forest.” \n\nThey look at you and politely wait for you to get to the point.  \n\n“That means, men, we need to be on the watch for interlopers.”\n\nOkay, now you're getting the blank look on their faces.\n\n“Interlopers! Interlopers! People we don't want to find us!“ \n\nA look of understanding is coming across a few faces.  “Got it?” \nYou ask.\n\n“Oh!”\n\n“Yeah, I got it!”\n\n“Sure, Robyn, we get what you mean!”\n\n“We can't have just anyone coming up on us from behind and taking our \nstuff!”\n\n\"Not when we work so hard to get it!\"\n\n“We need to see them before they see us!”\n\n“Yeah!”\n\nYou exhale, happy that they finally understand. \n\nWhat is the most important to you and your men?\n\n*fake_choice\n  #Setting Up Look Out Points.\n\n    For the next couple of weeks, they follow your instructions and set \n    up an elaborate network of look out points high in the trees between \n    your hide out and the two main roads to and from Nottinghamshire. You \n    especially have them concentrate on the area around Prince John's Castle \n    and  your caves.\n\n    The men took turns on lookout morning, noon, and night. No one got in \n    or out of your area of Sherwood Forest without you knowing about it.\n   \n   \n\n  #Creating Traps And Alarms.\n\n    For the next few weeks, they follow your instructions and set up an \n    elaborate network of traps and warning alarms between your hide out \n    and the two main roads to and from Nottinghamshire, and around your \n    caves. Further away an interloper is, the bigger the trap and louder \n    the warning. \n\n    The traps around your caves and hideout around the major oak are \n    especially elaborate. And no one could enter one of your caves, unless \n    they knew how to pass through the traps at the entrance.\n\n    You teach them a variety of whistles, calls, and signals that they \n    can beat on wood so that you all can communicate secretly with one other.\n    \n\n  #Creating And Clearing Back Roads.\n\n    For the next few weeks, they follow your instructions to create extra back \n    roads, hidden trails, and to clear out roads that exist but are not being \n    used.\n\nIt doesn't take long for your men to discover that the royal guards strictly \nkeep to the main roads, so you all now use only the side roads and hidden trails.  \nYou take note that the  barons and other noblemen only hunt in certain areas in \nThe Dukeries; your men now hunt or steal everywhere else.  \n\nNext you begin training your men on using various weapons and tricks to being a \nsuccessful thief. How do you go about this?\n\n*fake_choice\n  #You Use Your Wit To Get Other's To Train.\n\n    \"Say, Little John, you're mighty good with that fighting staff. Want \n    to give it a go at training the others? I would but the staff just \n    isn't my thing.\"\n    \n    \"Robyn, who should lead the sword training?\" Will Scarlett ask you.  \n\n    You think for a moment. \"You Will.\" You turn him around and lead him \n    in the opposite direction where the other men are waiting. \"We don't \n    want anything to happen to my arm, now, do we?\" \n\n    Well, Robyn, that leaves the bow and arrow for Lars, which is what \n    you secretly want, isn't it? After all, there are no one-on-one \n    action involve in learning how to shoot at a target. As long as he \n    keeps them pointing their bows away from you, you are sure to be safe.\n        \n    *finish\n    *goto_scene rh4\n \n  #You Hope The Men Already Have Excellent Training.\n\n    You already know that Little John is a wiz with the fighting staff, \n    and you've seen how madly Will Scarlett can handle both a knife and \n    a sword. William isn't that bad with all three, and Lars is a natural \n    with a bow and arrow. So that leaves the youngest, Jack, who doesn't \n    bring any experience to the table due to his age.\n   \n    \"Okay, men, g...uh, other things. Yeah that's it!\"\n\n    Be careful Robyn. They're beginning to give you some funny looks.\n\n    \"I am, after all the leader, so I need to do leader type things.\"\n\n    \"Oh, yeah, leader type things,\" a few of the men say.\n\n    \"I get it!\" The others join in. \n\n    \"Well, uh, I can teach the staff,\" Little John says.\n\n    \"Lars and I can teach the bow and arrows,\" states Will Scarlett.\n\n    \"That's what I mean men!\" You say excitedly.\n\n    \"I used to be a pretty good thief,\" begins Brett. \"I guess I can help \n    with that.\"\n\n    \"I can show how to pick locks,\" says Jack.\n\n    \"This is great!\" You shout. Let's eat, and get started!\" You say to your \n    men.\n\n    Well, Robyn, I can't believe you got out of teaching any sort of fighting \n    method.\n\n    *finish\n    *goto_scene rh4    \n\n\n\n\n", "rh4": "*label rh4\n\n*page_break\n   \n*image onlyrobin.png\n\nThe time came for you to make another great leadership decision.  You \nhave always hated Prince John; he's a spoil brat tyrant who only cares \nabout himself and his Barons. He thinks nothing for the pious and the \npoor. And you're horrified at the thought that he will be king after \nRichard (your step-father did a good job of raising you to be a \npro-Richard supporter).\n\nYou realize that you are in the position to aid the church and the poor\nwith money and food.  \n\nHow do you expect your men to react to your plan?\n\n*choice\n  #Indecisively (after all, it is their stuff).\n    \n    \"Men,\" you begin, \"I'm very proud of you.\"\n\n    That's good, Robyn. Start with a compliment.\n\n    \"You're doing a fantastic job of stealing to the point that we \n    can sometimes take days off just to enjoy life. Everyone has a \n    horse, we have tables and chairs, we have tents, we've got spoons \n    to eat our soup. We've got more than we need, and a way to get \n    more when we need it.\"\n\n    You wait a couple moments to look around at s a team.\"\n\n    You can see practically see the large question marks over \n    all of their heads as they furl their brow and make funny faces.\n\n    \"What you mean, Robyn?\" Bert ask.\n\n    \"Well, I've been thinking. We've got more than enough to survive\n    in the forest, and I know a way  that we can support the people in \n    and around Sherwood, and confuse the sheriff at the same time.\"\n    \n    “We're listening, Robyn.” Little John says.\n\n    “Let's give some of our money, jewelry and food to the poor in \n    the neighboring villages and hamlets.“ \n\n    You smile. You watch your men. You wait.\n\n    Suddenly, a loud groan rises from the men; nevertheless, you move \n    forward with your plan.\n\n    “Listen to me. Prince John keeps raising taxes,” you say loudly, \n    in a rush, with a serious face,  “and the farmers don't have \n    enough money to buy seeds nor food for their stock.  We're stealing\n    from the rich, anyway. Why not spread the wealth and help even \n    things out for the poor?”\n\n    Then a funny thing happen. Your men turn their backs on you and \n    begin to walk away.  \n\n      \n    *goto rh4c\n\n*label rh4a\n\n*page_break\n\n\"What do you mean by'boo'?\" Jack ask his brethren who is directly \nbeside him.\"If someone had been kind to my mum, giving her some food \nand some money, I would still be at home.\" \n\n\"Yeah, well, no one cared about me when I came back from the Crusades,\" \nreminds Thomas. \"I’ve been on my own ever since.\"\n\n\"But look how much we've accomplished together,\" Will Scarlett reminds \nthe boo errs. \"If it wasn't for Robyn caring so much about us, we wouldn't \nbe doing as well.\"\n\n\"Yeah, we should also care about others!\" Came an unknown voice.\n\n\"Well, I still say boo!\" A random voice shout.\n\n\"And I still say, yeah!\" Several shouts return.\n\n\"Boo!\"\n\n\"Yeah!\"\n\n\"Boo!\"\n\nRobyn, do something! Your men can't go on like this forever!\n\nMore volleys of \"boos\" and \"yeahs\" continue until you finally step \nup on top of the table and shout...\n\n\"Listen to me!\"\n\n*page_break\n\nAnd all of your men stop squabbling to listen to you, their leader.\n\n\"Men, I really wasn't expecting us to be so divided on this issue. So\nI guess I have to make a single leader decision.\"\n\nAll the men look up at you hopeful that you will take their side.\n\n\"I can't stand Prince John, and I think what he's been doing to this \ncountry since the King's been gone is atrocious. Therefore, we will \nhelp the poor. We will steal whatever we can, we will keep what we need, \nand we will give some of what we have to the poor.\"\n\nYou stop and you glare down at your men.\n\n\"Is that clear?\"\n\n\"Yes, Robyn.\" They all respond unanimously.\n\n*finish\n\n*set leadership %+20\n\n*goto_scene rh5\n\n\n*label rh4b\n\n*page_break\n\nLittle John wants to help you out. He stands up on a tree stump, waves \nhis arms over his head, and shouts to get their attention. “Wait a sec.  \nI think we owe it to Robyn to hear him out.” \n    \nThe men do a lot of grumbling, but they did turn around to face Little \nJohn.\n \n“Would we be wearing better clothing, eating good food, having good weapons, \nand sleeping under warm blankets at night if Robyn hadn't come upon us?”\n\nThe men look down at their feet, muttering.\n\n“Nope.”\n\n\"I guess not.”\n\n“You're right.\"\n\n“We wouldn't.”\n\nLittle John continues. “Then stop acting like a bunch of babies and listen \nto him.“ He jumps off of the stump. \"And the next guy who turns his back \nbefore he is finish...\"\n\nMore muttering.\n\n\"Yeah, just as I thought.\"  \n\nEveryone, with the exception of William, is frighten of Little John and \nwouldn't want to go up against him even if everything good was on their \nside.\n \nHe turns towards you. “Robyn, let me get this straight. We're still \ntaking what we want from anyone who enters the forest, right?”\n\n“Yes! Absolutely!”\n\n*page_break\n\nThen Jack slowly intercedes. “But... we're going to give... some of \nwhat we take... to the poor?”\n\nYou jump up in the air. “Exactly!”\n\n“How much?” \n\nYou hear a deep, booming voice, and you know who it is.  William steps \nforward. \n\n“How much?”\n\n“Well,” you begin, “Uh, how does enough to pay their taxes and buy food \nand seeds sound?”\n\nThe men come together in a huddle.  You tab your feet as you wait \nimpatiently, trying hard to figure out what they are saying.\n\nSuddenly they all look up and grin at you.\n\n“All right, Robyn,\" William announces, “If 'ya say we should stick it to \nPrince John by giving to the poor and the church,  we'll stick it to \nPrince John.”\n\n“I'm gonna enjoy sticking it to the Prince,” Bret says. \n\nThe rest grin evilly and nod their heads in agreement.\n\n*finish\n\n*set cautious %+10\n\n*goto_scene rh5\n\n\n*label rh4c\n\n*page_break\n\n“Ah, come on guys!\"\n\nYou lost them, Robyn. You sit down on the ground, looking down, \nwishing you had your step-father's way with words when it came to \npolitics.\n\n“How much?” \n\nYou hear a deep booming voice. You look up. William is standing \nover you. “How much?”\n\n“Well,” you begin, “Uh, how does enough to pay their taxes and buy \nfood and seeds sound?”\n\n\"Hey!\" William calls to the others. \"Wait up.\" \n\nAll the men come together in a huddle.  You tab your feet as you wait \nimpatiently, trying hard to figure out what they are saying.\n\nSuddenly they all look up and grin at you.\n\n“All right, Robyn,\" William announces, “If 'ya say we should stick it \nto Prince John by giving to the poor,  we'll stick it to Prince John.”\n\n“I'm gonna enjoy sticking it to the Prince,” Will Scarlett says. \n\nThe rest grin evilly and nod their heads in agreement.\n\n*finish\n\n*set leadership %+10\n\n*goto_scene rh5", "rh5": "*label rh5\n\n*page_break\n\n*image onlyrobin.png\n\nYou and your men begin to steal from anyone who dare to enter what \nyou begin to consider \"Your\" forest on their way to and from the city \nof Nottinghamshire or any of the townships on the outskirts. Contents \non carriages and carts, or animals being driven to Prince John's Palace, \nare especially high on the list of \"Things To Confiscate.\"\n\nAll you need to say is the phrase, \"I really must insist,\" and your men \nwill fall from the trees and jump from behind bushes, boldly taking anything \nthat isn't stable down to the ground. Then, you  boldly give some of the \nill gain riches to the poor and the nearby Abby.\n\n*achieve arming \n\nThe word is getting out about what you and your men are doing. The \nthought that a traveler may suddenly say the words, \"I really must \ninsist,\" has made the ride through Sherwood Forest a frightening one \nfor the Barons, noblemen, and anyone else with anything you may want \nto take, which could be anything.  \n\nHowever, the commoners, especially the poor, of the surrounding towns \nand hamlets all know the name Robyn Hood and are calling you a hero.\n\n*fake_choice\n\n  #You Don't Know Why They Would.\n\n    You personally do not pass out any perishables, money, or seeds.\n\n    You may be Robyn Hood now, but you were born Robert Dore of Loxley, \n    and he would never take on such lowly chores.\n\n  #You Personally Pass Out The Food And The Money.\n\n    No one knows what you really look like because you always wear \n    a disguise.\n\n    *achieve disguise\n    \n  #You Personally Never Pass Out The Food And The Money.\n\n    You're worry that you will be recognize.\n\n\nEarly one day, two of your men enter the camp sitting high on a cart \nbeing pulled by two wheezing mules, their horses being tether to the back. \nThe other three riding along the side.\n\nNow that they are in camp, they laugh loud and hardy as they jump down \nfrom the cart and dismount from  the horses. They catch your attention, \nand anyone else within hearing distance.\n\nYou walk slowly over wondering what all the noise is about. You see the \ncart.\n \n“What's all this?”\n\n\n*fake_choice\n  #Kegs Of Wine.\n\n    “Wine!” They all yell, slapping each other on the back. \n\n    “And the best in these parts, if you ask me!” Says Jack as he \n    stumble over after having a difficult time keeping his balance. \n\n    That's when you notice that they all appear a little too joyful \n    for that time of day.\n   \n    \"How would you know?\" Ask Lars. \"How many kegs of wine have you \n    come across in your very short life?\"\n    \n    Everyone is laughing again. \n\n    You walk to the side to move a large dirty canvas that is covering \n    the cart to view the contents. To your delight, the cart there are \n    many large kegs, one sitting upon the other.\n\n \n         \n  #Chests Of Silver.\n\n    “You won't believe it Robyn!” Will Scarlett yell. \n\n    “Silver!” The rest of the men yell as they slap each other on the \n    back, holding onto their bellies as they laugh some more.\n  \n    You look at them in disbelief.\n\n    \"Silver?\" You ask.\n\n    \"Yep,\" Lars responds. \"See for yourself!\" \n   \n    You walk to the side to move a large dirty canvas that is covering \n    the cart to view the contents. To your delight, there are large chests \n    of the king's finest silver.\n\n\n  #Slabs Of Dry Salted Mutton.\n\n    “Dried mutton!” They all yell, slapping each other on the back. \n\n    “And the best in these parts, if you ask me!” Said Jack. \n\n    You walk to the side of the cart. The wonderful aroma of the dried \n    lamb wafts up your nose. You move the dirty canvas, and to your delight, \n    the cart is fill with large slabs of dry mutton wrap in cheese cloth. \n\n\n*page_break\n\nTo your mis-delight, there is a large man wearing an old robe with holes,\nwith his hands tie and a gag in his mouth leaning against the booty. His \nhead is crop short and shear at the top, and his knees are bent against his \nchest, and his feet are together with rope.  \n\nHe has beady eyes and he is beet red in the face. \n\nShaken by the animal look the captive gives you, you point and ask anyone who \nwants to answer, “And, who is our guest?”\n\n“He's a monk, Robyn! A monk!” Says Jack excitedly. “And a big one at that!”\n\nWilliam interjects. “You taught us to respect the clergy, and we didn't know  \nwhat else to do with him.”\n\n“So you brought him here?”\n\nWilliam shrugs his shoulders. \n\n“Why is he tied and gagged?”\n\n“He put up a fight and wouldn't shut up!” Little John explains.\n\nYou shake your head and roll your eyes. “Get him down.”\n\nWilliam, Little John, and Lars pulls the stranger down out of the \ncart and he falls to the ground. He's struggling to stand up, growling \nat Will who tries to help. \n\nMy, Robyn, but he is a big one for a monk! \n\n*page_break\n\nYou take out the gag and cut the ropes on his feet. “What say you, \nmonk?”\n\n“I'm not a monk!” The not-a-monk roars. “I tried to tell these brutes \nthat!”  He glares at you. Your eyes go wide and you take a few steps back.  \nInstantly, all five men step in front of you.\n\n“Hey, we don't like the way you're looking  at our Robyn, monk,\" \nLars reports.\n\n“Arg! You heathens! My name is Tuck and I have taken a vow of poverty.  \nI've sworn myself to the church and what you've taken is intended for \nthe Newstead Abbey!”\n\nYou peek around and over your men. \n\n“I apologize for their rude behavior, but it's  not bath day yet, and \nsome of my men have a tendency to act before they think.  I'll be sure \nto make it up in some way to the dear monks.  In the meantime, I'm afraid \nthat you must stay here with us, because you see, no one who finds us...uhm, \nhow can I put this delicately.“ You pause to think. “Well, I just have to \ncome out and say it. No one who ever finds us, leaves us.“\n\n  \nTuck looks like he has a large question mark over his head.  \n\n“Uh?” He looks at each of you. “Hold on, what do you mean, I can't leave? \nYou can't hold a man against his will!”\n\n*page_break\n\n“I understand how you're feeling. I was once in the same position you're in \nright now. Not very comfortable, to be sure.”\n\nAbout now, the men who are not squeamish about such things have unsheathe their \ndaggers and swords. William is even snarling. No one is  smiling. \n\nSuddenly, Tuck's expression changes.  His eyes go bright and he is smiling. \n“Wait, wait! I know you. You're the Hood. Robyn Hood!\" \n\nYou leave the protection of your men to come forward, pull on your hood, smile, \nand bow low. \n\n“Tis, I. In the flesh.”\n\nTuck breaths heavily, makes a sort of low chortle, as he smiles nervously.\n \n”Nice to meet you, sire Robyn Hood.  Tuck, at your service. I'll be \nproud to help in your fight against tyranny and for the good of all of \nEngland; that is, if you have me.”\n\n\"Can you wield a sword?\" \n\n\"I had trained to be a Templar.\"\n\nYou cut loose the bonds on his wrists.\n\n*page_break\n\nThat afternoon, as the two of you share stories, Tuck ate more than he \nhad for several days.  You learn that Tuck practice Swords and Daggers \nwith his brother when he was younger. He is still very accurate when \nit comes to using a sword or a dagger, and that gives you ideas.\n\nHis mules are fed and given plenty of water, and before it became evening,  \nhe climbs onto the empty cart and continues to the Abbey, a tall tale \nready for the Sheriff of Nottinghamshire of how bandits had stolen the contents \nof his cart on the road right after entering the forest. All true, of course,  \nbut he is going to hold back the part about joining you and your men.  \n\nYou are quite satisfy because Tuck will be a great asset, being  another \nset of  eyes and ears to tell you useful information and any beneficial \nsecrets, since he can  easily travel between the towns and hamlets in the \narea without being given a second thought.\n\n*finish\n\n*goto_scene rh6\n\n\n\n \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "rh6": "*label rh6\n\n*page_break\n\n*image marian.png left\n\n\nIt wasn't long afterwords when Little John and Jack find you \neating your lunch.\n\n“We found someone nosing around the forest off the main trails claiming \nto be looking for  Robert Dore of Loxley.“\n\nYou fall off of the stump spilling your plate of  roast mutton and \ncarrots onto the dirt. \n\n“Looking for Robert Dore of Loxley, the outlaw?”\n\n“Yeah. They set off one of our alarms. Says that they knows him \npersonally. “\n\n“How so?”\n\n“Wouldn't say.  William sent us to find you to make a decision \non what to do.\"\n\nReluctantly, you put on your hood and ride Clint between your two \nmen to a point just short of where you could hear... \n\n*choice\n  #A Raucous of Steel On Steel And The Laughter Of Men.\n\n    After tying down your horses,  you, Jack, and Little John crouch  \n    behind a bush.\n\n    Sure enough, there is a stranger, a small person, fighting blade \n    to blade with  Lars.  You cower behind  Little John peaking around \n    his body, and over his shoulder, now and then, not seeing as much \n    as you like to see, but you're not ready to do much more than that \n    at the moment. \n    \n  \n    *goto_scene rhmarian\n\n  #A Pleasing Voice Of A Woman  And The Laughter Of Men.\n    \n    After tying down your horses,  you, Jack, and Little John crouch  \n    behind a bush.   \n\n    Sure enough, sitting on a log in the midst of Lars,  William, and Jack\n    is Gretchen. She is dress in casual riding clothing, and her long hair \n    is braided into two circlets on either side of her head which is  cover \n    with a short linen veil.  She is also laughing, which explains the lilt \n    sound that you hear, and speaking happily to your men. \n\n    “That's the funniest story I've ever heard!” Lars exclaim.\n\n    “Was Robert really that awkward when he was an squire of Sir George?” \n    William ask.\n\n    “Oh, yes, I assure you he was!”  She pauses to look up at the sky as \n    if thinking. “I remember the time when...”\n\n    You jump out from behind the bush and pull down your hood. “I think \n    the men have heard enough, Gretchen.”\n\n    She stands up, placing her hands together in front of her torso, \n    and bows. She is happy to see you. \n\n    “Robert Dore! It's so nice to see that the rumors of your departure \n    from England, dead or alive, are only an exaggeration!”\n\n        \n    *goto_scene rhgretchen\n\n   \n  #An Annoyingly High Male Voice And The Laughter Of Men.\n\n    After tying down your horses,  you, Jack, and Little John crouch  \n    behind a bush.\n\n    Sure enough, there is a stranger, a young man, not much older than \n    Jack, wearing the colors of Prince John's Clipstone Palace, getting a\n    good verbal ribbing and being push around by William, Lars, and Will.  \n\n    The poor young man is near tears as he begs the men to leave him alone \n    as he ask over and over if they have personal information on Robert Dore \n    or not.  They respond with laughter and pushing him between one another.\n  \n    You cower behind  Little John peeking around his body, and over his \n    shoulder, now and then, not seeing as much as you like to see, but you're \n    not ready to do much more than that at the moment. \n\n    However, it's quite obvious that the young man isn't much of a threat, \n    so you come out from behind Little John and approach him.\n\n           \n    *goto_scene rhmessenger\n\n    \n", "rh7": "*label rh7\n\n*page_break\n\n*image onlyrobin.png\n\nYou and your men are becoming  a little too self-confident. \n\nIt's been over a year since you've become Robyn Hood  and you have been using \nyour inherent charm and wit to talk travelers into handing their valuables over \nin a nice manner. When that didn’t work, you simply say, \"Oh, but I must insist,\" \nand your men jump out of the trees and the bushes to take what they want by force.\n\nYou'll talk, talk, and talk sweetly morning, noon, and night to get what you want; \nand why shouldn’t you?  \n\nYour men are very well train by now.  Your main hide out, your caves, and your \ntraps are very well organize.  \n\nIn addition, Marian, Gretchen,  and Tuck keep you inform of the goings on in \nNottinghamshire, Prince John's Palace, and London.  You're on top of  all  of  \nPrince John's activities, you know what his Barons are up to,  and the secrets you \nhear from Marian's Little Squirrels keeps you free to continue helping the poor \neat healthy food, keep a decent roof over their heads, and pay their taxes \nwithout any strife at all.\n\nYou are doing good for the surrounding communities and there is  no possible way \nfor you to be found.   \n\nRight?  \n\nWell, we shall see.\n\n*finish\n*goto_scene rh8", "rh8": "*label rh8\n\n*page_break\n\n*image robinmarian.png\n\nOne evening, when Tuck is visiting, you and your band are in front of your \nlarge camp fire, happily drinking your ale, speaking about the events of \nthat day, and having knife fights.  \n\nWhat's a knife fight? Don't you remember?\n*fake_choice\n  #A fight To The Death.\n\n    Of course not, Robyn! Your men want some manly entertainment, but the \n    last thing you want is for them to die by each other's hands. \n\n    You came up with a game of hand-to-hand combat involving two men being \n    tied together by their prominent hand, and fighting with a knife held by \n    the other hand.  Who ever gets cut first, loses, and first aid is \n    administered so that they can fight another day.\n\n  #Throwing Knives At A Tree Trunk.\n    No way. Your men want more action than that after a busy day of thievery.\n \n    You came up with a game of hand-to-hand combat involving two men being \n    tied together by their prominent hand, and fighting with a knife held by \n    the other hand.  Who ever gets cut first, loses, and first aide is \n    administered so that they can fight another day.\n   \n  #Fighting With Knives Tied To The Non-Prodominent Hand.\n\n    You had to come up with something manly to help keep them entertained! \n    And Gretchen has taught you how to admister first aide so that they can \n    all live to fight another day.\n    \n    *achieve bandages\n\n\n    \n\nIn the midst of all of the jeering, cursing,  and the drinking, Marian rushes \ninto the camp and finds you near the fire.   She throws herself into your arms.  \nYou can tell that she has been crying.\n\n\"Oh, Robyn! I bring some good news and some bad news.\"\n\nYou look at her afraid to ask. Of course, you don't want to hear any bad news; \nbut you've never seen her cry before, and you didn't like it at all.\n\n“Everyone, listen!” You shout.  “Quiet for a bit, will you?  Something's up \nwith Marian.”\n\nThe men do as you ask, although, being concern, they mumble loudly to no one \nin particular.\n\n“What?” \n\n“What's wrong?”\n\n\"What's going on?\"\n\n\"Maid Marian is here.\"\n\n\"Where is that dainty Gretchen of Arondale?\"\n\nYou frown then ask, “What is the good news?”\n\n*goto rh8a\n\n*finish\n\n*page_break\n\n*image tales.png left\n\n*label rh8a\n\nAt this point, you have three choices to take Robyn and his crew on a \nTales adventure.  \n\n*choice \n  # The Tale Of The Benign Globe.\n\n\n    \"I brought a small group of travelers who have been\n    seeking you.\"\n\n    “Seeking me?” You become worry. How is this good news? “What for?”\n\n    “I have to let them tell you, Robyn, but I know you'll  be as \n    endeared with  them as quickly as I am.” She makes a weak smile, \n    but it's a smile nevertheless.\n\n    You don't like the sound of that.  Sounds like witchcraft.  Has \n    the Hag of Dark Alley been about the woods lately?\n   \n    *set cautious %+20\n        \n    *goto_scene rhelves\n\n  # The Tale Of Edent The Dragon, Part 1\n\n    \"My baby squirrels have found a new cave.\"\n\n    \"That's great news! We need more space for hording.\"\n\n    A big cheer come from the men and the ones who have mugs raise \n    them high in the air.\n\n    “Yeah!”\n\n    Then they pour the ale down their gullets. You simply look around \n    and smile, proud of what you are accomplishing.\n\n    “See there, my men just love to horde!\" \n\n    You continue to smile as the sadness in her eyes deepen.\n\n    \"Okay, go ahead and tell me the bad news.\"\n\n    *set brave %+20\n\n    *goto_scene rhaway\n\n  #The Tale Of Edent The Dragon, Part 2\n\n    Marian convinces King Macken and Queen Leefa of the Elder Dwarves\n    that you, to your disapproval, need some time to discuss their \n    request to kill Edent the Dragon for them.\n\n    So, when the meal is complete, and the King and Queen and their \n    Attendees have left the Hall , Broon and your assign Attendee lead you \n    and your party to a small room with in the Great Hall. There, Broon \n    leaves you alone to make your decision. \n\n     \n    *set leadership %+20\n\n    *goto_scene rhedent\n\n      \n\n      \n", "rhaway": "*label rhaway\n\n*page_break\n\n \n\"I was at court today, and I heard that the main roads in and out \nof Nottinghamshire will be heavily guarded until further notice.\"\n\n\"Oh, good grief!“ You throw up your hands, bury your head inside of \nyour hood and shake it. \n\nHowever, this is only an annoyance.  You take off your hood and address \nyour men.\n       \n“Well, that means we're going to have to stay closer to the roads \nthat are not on any map but our own.”\n\n\"But, Robyn, if that's the case,\" William begins, \"only the wealthy \nwill be be left to move freely on the main roads.\"\n\n\"Which leaves the commoners and us watched more carefully,\" Sean notes. \n\n*page_break       \n\n\"And we can't get to the wealthy if we can't get to the main roads,\" \nHugh adds.\n     \n\"Ugh!\" You raise your hood and begin pacing back and forth with your \nhands on your head.\n\nTuck, looks at you concern on his face. Unexpectedly, he suggest,\n\"Maybe it's time to leave Sherwood Forest.\"\n\n\"Leave Sherwood Forest?\" Marian and the men say simultaneously.\n\n\"Look, I'm not sayin' stop doin' what you're doin', Robyn. I'm just \nsayin' that maybe we should do what we do in another location.\"\n\nMarian watches you pace and she becomes as concern as Tuck.\n\n\"Tuck may have a point, Robyn,\" she says.\n\n*page_break\n\nTuck stops your pacing by placing his large hands on your shoulders. \n\nListen, Robyn, I wasn't going to tell you this until I was \nabsolutely sure about this rumor, but now that Marian has \nreported the heavinggurading of the main roads, I can't help \nthinking that it's more than just a rumor.\"\n\nYou look up at Tuck. You've never seen him so serious. \n      \n\"I don't know any baby squirrels,\" Tuck begins looking around \nat Marian and the Merry Men while he continues to hold you by \nyour shoulders. \"I know hawks, and they have told me that Prince \nJohn has collected enough gold from his Barons to put a hefty \nbounty on your head, dead or alive.\"\n\nYour eyes go wide as his grip gets a little tighter. \n\nYour men move in closer.\n\n*page_break\n  \n\"It's been hinted that the Barons have collected 300 gold coins, \nand they're already sendin' the message through out the isles \nto capture you,  dead or alive.\"\n\n\nMarian reaches towards you, but William still has his grip \ntight.\n\n\"It's true, Robyn,\" she says. \"That is the biggest reason why \nI came to see you.\"\n\nMumbling rises among your men. You pull your hood on.\n\n“I understand that they're already encouraging  men to band \ntogether to hunt you down and share the money,“ continues Tuck. \n       \nYou lower your head and your hood is now hiding your face.\n\n“Robyn, listen to me,\" Tuck grips you even tighter. \"Our alarms \nmay warn us, and our traps may slow them down, but there are too \nmany ruthless men in the country side who wouldn't hesitate to \nturn you in for that much gold!”\n\n*page_break\n      \n\"I know I would.\" Jack says, nonchalantly. Lars hits him hard \non the back of the head. \"Hey!\"\n\nMarian rushes over to you as William lets you go and steps aside. \n   \n“Robyn, Tuck is right. With a bounty that high, more and more men \nwill come after you until you are captured or dead!\"    \n    \nTears are filling up in the corners of her eyes.\n       \n*fake_choice \n  #You want to hold her, but you don't.\n    You don't want to send the wrong message to the men.\n         \n  #You tell her there is no need to cry.\n    After all, you hate seeing her crying.\n           \n  #You Do Nothing. \n    It's rare, but sometimes Marian simply needs to cry.\n     \nThe men's mumbling has become louder and you can clearly \nhear what they are saying.\n\nThomas was the first to speak directly. “What are you going \nto do, Robyn?”\n\n*page_break \n\n“What are we all going to do?” Little John says correctly \nlooking around at the other Merry Men.\n\n“I know one thing,” William says. \"I've stood beside Robyn \nsince I met him, and I'm not about to leave him now.”\n \n“Me, neither,\" Little John says. \n\n\"Me, too,\" says Lars. \n\n*page_break\n\n“Looks like we'll do whatever you tell us to do, \nRobyn,” Allan says. \n\nWill Scarlett holds up his mug. “I salute you, Robyn!”\n\n\"We're here for you, Robyn,\" says Tuck. \n\nMarian looks up at the Merry Men surrounding you and her. \nYou have yet to lower your hood. Their loyalty gives her \nhope.\n\n*page_break\n      \n\"What are you going to do Robyn?\" She ask.\n\nYou are walking back and forth in the small area between \nMarian  and the nearest Merry Man behind you. They wait \nanxiously for you to give them the word.\n        \nYou finally stop pacing and stand on a log. \n    \n“We could try to search the forest for  others to stand on \nour side against the bounty hunters, but I don't know if we \nwill find any. More than likely they'll turn me in for the \nbounty themselves.“\n\nThe men agree.\n\n\"I could pay them to join us,\" you continue, \"give them an \nactual salary, but how do we know who we can trust?”\n\nThe men nod their heads in unison.\n\n*page_break\n\n“So, we’re going to take the obvious approach.“  You slowly \nlook at each man in the face. \n\nThey freeze and lean closer  as they  wait for your command...\n\nWhat Do You Decide To Do?\n\n*choice\n  #Leave Sherwood Forest.\n\n    \"We’re going to be big chickens and run away in the opposite \n    direction.” \n\n    This is when you know that your Merry Men are truly loyal \n    friends because the Merry Men do not even bat an eye.  \n\n    “Okay.”  Tuck agrees.\n\n    “Seems like a good plan to me.”  Will Scarlett love the idea\n\n    “Why not?”  Bert says without a complaint.\n\n    “I'm too young to die anyway.” That was Jack.\n\n    “I'm too old to fight.”  That was Brett.\n\n    You raise  your hood.  \n\n    “So what exactly is your plan, Robyn?” Tuck ask.  “We're all \n    with you, but where are we going?”\n\n    You pull off your hood. \n\n    \"I'm not sure, but we need to find a place that works as \n    well as Sherwood has worked for us all of these years.\" You \n    stop and look around. \"I need a couple of volunteers to search \n    for another dense forest as far away from here as possible.\"\n\n    \"It needs to be close to the main roads, right, Robyn?\" Reiff\n    ask.\n\n    \"No!\" You and Marian shout at the same time. \n\n    *set cautious %+10\n\n    *goto rh10aa\n  \n\n  #Leave England All Together.   \n\n    “We’re leaving England, that way we can be sure of escaping \n    the law all together.” \n\n    This is when you know that your Merry Men are truly loyal \n    because not a single one wanted to argue.\n\n    “Okay, with me,”  Tuck responds.\n\n    “Seems like a good plan to me,\" says Will Scarlett.\n\n    “Why not?” Ask William\n\n    “I'm too young to die anyway.”  That was Jack.\n\n    “I'm too old to fight.”  That was Lars.\n\n    You raise  your hood.  \n  \n    You hear an unidentified voice.\n \n    “We're all with you, but where are we going?”\n\n    You pull off your hood. \n\n    “Jack, pack for a two day ride and take our fastest horse. \n    Ride west to Southport. Find my friend, Much.  Tell him of \n    our plight and that we need to get out of the country as \n    soon as possible. Tell him we'll be in Southport under \n    cover of darkness in four nights.”\n\n    Jack nods his head and runs off.\n\n    Marian asks, “What are you going to do, Robyn?”\n\n    “I'll tell you what I'm going to do, what my men and I are \n    going to do together.” \n\n    You look around.  \n\n    \"Over the next two days, we're going to deliver as much of \n    the treasure and food as we can out of our caves and larder \n    into town, the hamlets, and the Abbey.”\n  \n    You pause. \n\n    “Then we're going to pack what we need and we're getting \n    the hell out of England.”  \n     \n    You pull on your hood and you walk away.\n      \n    *set coward %+10\n\n    *goto rh10a \n    \n  #Hide In Our Caves.\n          \n    “We’re going to turn into bats, and hide in our caves.” \n\n    This is when you know that your Merry Men are truly loyal friends \n    because they didn't even blink when you made the decision to \n    basically live like animals.  \n            \n    “Okay.” Tuck agrees.\n\n    “Seems like a good plan to me.”  Bert loves the idea.\n\n    “Why not?”  William's not complaining.\n\n    “I'm too young to die anyway.” That was Jack.\n\n    “I'm too old to fight.”  That was Lars.\n\n    You raise  your hood.  \n\n    “So what exactly is your plan, Robyn?” Tuck ask.  “We're all \n    with you, what's your strategy?\"\n\n    You pull off your hood. \n\n    \n\n    \"I'm the one they'll be looking for, not you all. So, you'll \n    basically do what we have always done, just not as frequent, \n    not as obvious, and not so out in the open.  We have plenty \n    in our caves to continue to share and to live off of, we just \n    need to clear this camp and not meet under the oak any longer.\"\n\n    You don't smile. You pull on your hood and begin to walk away.\n\n    \"But, what should we do right now?\" You don't know who that is\n    and you don't want to know. It should be obvious, right?\n\n    You sigh. \"We need to clean up this area and make it look like\n    no one has ever lived here. Be ready to move out in three days.\"\n\n    You look at them and wait. No one says anything, so you replace \n    your hood.\n\n    *set leadership %+10\n\n    *goto rh10a\n\n\n\n*label rh10a\n\n*page_break\n\nYou go over to Marian and pull her tightly against your chest. \n\n\"Are you all right with this?\" You ask tenderly as you stroke\nher cheek.\n\nAt first, she says nothing, her face a blank. Then her eyes \nsparkles the way you love, and she smiles.\n\n\"I love you, Robyn.\" \n\nThose words came from the most sincere place than ever before.\nYou touch your forehead to hers.\n\n\"I'll contact you.\" \n\nYou raise your hood and enter your tent.\n\n\n*page_break\n\n*image onlyrobin.png\n\nYou realize that you have to work fast.\n \nNow that Prince John has increase the guards in and \nout of the forest, you and your men must use the hidden \nback roads and rough trails that you've been mapping \nout all of these years.\n\nOriginally this is great plan, but they are not necessary\nroads that are completely clear. Therefore, some of them \nare slowing your progress down.  \n\nThat evening, Marian didn't show, and you worry, but \nyou cannot let that take over your immediate concerns \nright then. You have to give out various assignments. \n \nTuck brings an extra cart for you to [i]borrow[/i], and \nwith the ones that you've [i]\"borrowed\"[/i] along the way, \nyou have a total of five carts to fill. \n\nYou instruct your men to first remove the perishables, \nedibles, liqueur, and seeds from the camp and take them \nto the personal larder.  \n\nNext, the iron and silver ware, decor, the gold and the \nsilver, went to one of the caves for collecting later as \nneeded.\n\nAll tents and everyday supplies are last on the wagons. \nThe men pack their personal belongings to carry on their\nown horses.\n\nBy mid-afternoon of the second day, when you and your \nmen are ready to move your basic supplies to your new \nsuitable hideout, [i]you[/i] instead find that you are \nnow completely cut off and cannot reach it, suitable or \nnot.\n\nYou decide to head east towards the river to miss \ndetection. However, you find yourself facin Palace guards \nthere as well. \n\n*page_break\n\n\"What are we going to do Robyn?\" Will Scarlett ask.\n\nYour mind turns to Marian and how much you love her.\n\n\"There's no way out of this. We can't stay anywhere near \nSherwood Forest,\" you respond. \n\nYou look at your men. The men stay quiet, waiting. You \npull on your hood.\n\n\"I think that it is best to leave England all together \nas I thought all along. The best chance we have is finding \nmy friend Much to get us out of England on his ship.\"\n\n\nYou lead Clint back to the your oak hide out, and the men \nfollow you.\n\n\n*page_break\n\nYou take another day to give away as much as you can to the \nnearby hamlets and the Abbey. Your men make sure that the \npeople that you can highly trust have possession of the bulk \nof what is taken out of the caves,  and they will pass it on \nto the needy without much suspicion. \n\nBy noon the next day, the caves still contain an overly \nsubstantial amount of ill gotten shiny stuff, still you're \nunable to spend any more time except to fortify the traps.  \n\nSo the time has come to seal the caves and set up as  many \nnew capture traps as can be set around them. \n\nYou stop to write a goodbye letter to Marian, telling her \nhow much you love her and you hope she understands. \n\nAs you watch Lars ride off to deliver your letter to the \nPalace where she is visiting with her family, you can see \nher face. You hope that you will see her this way always, \nand that she will never fade.\n\nBy sunset tomorrow, you and your men who want to join you \nwill begin the trip to Southport.\n\n*finish\n\n*goto_scene rhaway2\n\n*label rh10aa\n\n*page_break\n\n\"Some place hidden. We can't live as we've been living any longer,\"\nyou point out. \n\n\"I'll go,\" Gaunther volunteers first.\n\n\"Me, too,\" says Bert.\n\n\"All right. For the rest of us, we need to clean up this area and \nstore items in our larder or give extra supplies away. It has to \nlook like no large group, let alone Robyn Hood, has ever \nlived here.\"\n\n\"Here, here,\" came a group agreement.\n\n*finish\n*goto_scene rhaway2\n\n   \n    \n  \n\n\n\n", "rhaway2": "*label rhaway2\n\n*page_break\n\n*image robinmarian.png\n\nIn the early evening, long  before you are ready to leave, Maid Marian \nreturns with Gretchen.  They are dress in riding clothing including a \nhooded cape. There are large packs on the back of their horses ready\nfor a long trip.\n\n“Marian, what is this?” You indicate the horses after you help her \ndismount.\n\n“Gretchen and I are going with you!” She says with a large smile as she \nbounces up and down. \n\nSadness clouds your mind.  You wrote her a letter yesterday. You sent Lars \nwith it to Prince John's Palace to deliver it. You've already said goodbye; \nyet, here she is as if Lars did not give her your letter. \n\nWhat do you think happened?\n\n*fake_choice\n  #Lars Couldn't bring Himself To Deliver The Letter.\n\n    He knows how much she loves you and just couldn't be the one to bring \n    the message that would break her heart.\n\n  #Lars Didn't Give Her The Letter And Told Her A Lie.\n\n    He didn't want Marian to know you were leaving without her and told her \n    to wait for you.\n   \n  #Lars Didn't Give Ger The Letter, Giving His Own \"Message\" From You.\n\n    Lars felt you should give her the message in person and told her to \n    wait for you.\n\n    \n  #Lars Did Give Her The Letter, But She Is Too Stubborn To Accept It.\n\n   After all, Marian is her own woman and is not ready to say goodbye to \n   you.\n  \n\nYou look into her dark brown eyes.  You know it would be difficult saying \ngoodbye to those splendid eyes, but now that she wants to go with you, \nit's going to be even harder. \n\nYou take her in your arms and hold her.  You pull her away and she is \nstill smiling; but she notices that you are not. \n\n“Robyn, what's wrong?”\n\n“It hurts me so much to say this.”  \n\nYou breath deeply in and out, you look deeper into her eyes.  She looks \nso innocent and full of hope to you. Oh, so sweet and  so beautiful. \n\nIn fact, the way the light from the sunset is shifting through the trees \nand hitting her face, you swear you've never seen her more beautiful. \n\n“Marian, I can't have you come with me.  I don't know what's going to \nhappen to me. I can't give you the life you're use to, the life you \ndeserve. I'm sorry, but this is goodbye.”\n\nMarian's not smiling any longer. In fact, she looks angry. \n\n*page_break\n\nShe pushes you really hard in the chest. \n\n“Oh, no you don't, Robert!” \n\n(Uh, oh...she's calling you Robert)  \n\n“I've waited six years for you!” \n\n(And now she's talking really, really, fast!) \n\n“First, you willingly run off with Richard on one of his Crusades, \nthen I'm cheated out of my wonderful wedding at John's Palace when \nyou become an outlaw. Then you're out here calling yourself la, de, \nda, Robyn, wearing a ridiculous green hood and frolicking around with \nyour merry men having the time of your life looting and stealing and \nhooting and hollering and I have to sneak around in the woods, in the \ndark mind you, in order to see you when I'm able to get the chance to \nsee you. Now, that we're finally able to leave the tyranny of my stupid \nobnoxious cousin behind to have a life, a real life, and be together, \nyou say goodbye? I don't think so, Mr. Man!”\n\nYou're quiet. Your men are quiet. Gretchen is quiet, but Marian is \nseething. \n\n“AAAAARRRRGGGG!!!!” \n\nWell, there she goes, stomping off. \n\n*page_break\n\nGretchen and Lars calmly walk over to you.\n\nGretchen speaks low. “Robyn, you have to go after her.” \n\n“Not when she's like that I'm not!”\n\nLars puts his fatherly arm over your shoulder.\n\n“We need to be ready to leave soon if we expect to be traveling most \nof the night to get to the coast day after tomorrow. Robyn, go after \nher.”\n\nWhat do you do?\n\n*choice\n  #You Have A Mug Of Ale Instead.\n \n    \"Nope, not going to go after her until she calms down.  You forget, \n    she's a better knife fighter than I am!\"\n\n    You walk over to one of the carts that holds the remaining keg of \n    ale and pour yourself a mug full. You open your mouth and let the \n    cool alcohol caress your throat. You figure when she has finally \n    calm down, you'll be just liquored up enough to take what ever she \n    throws at you.\n   \n    *achieve ale\n\n    You finish your ale just as Lars and Gretchen walks up.\n\n    \"Well?\" Gretchen ask.\n\n    *set coward %+20\n\n    *goto rh10b\n   \n    \n  #You Send Gretchen To Speak To Her.\n   \"You go after her, Gretchen. You're a woman and you have that \n   woman bond thing going on. Then you can report back to me.\"  \n   \n   \"No, I won't.\"\n\n   \"What? I thought we were friends!\"\n   \n   \"We are,\" she says, \"but you're on your own with this one.\"\n \n   You turn to Lars. You know that Marian likes him. \n\n   \"Ha!\" He says as he turns away. \"Do we have some more ale left?\" \n   He calls out to the men.\n\n   Gretchen does something you didn't think she is capable of doing. \n   She raised the tone of her voice.\n\n   \"Robyn!\"\n\n   *set coward %+10\n\n   *goto rh10b\n\n\n  #You Ask Lars For More Advise.\n\n    \"Lars,\" you begin, \"you've known plenty of women.\"\n    \n    \"I don't know about that.\"\n\n    Your face goes a skew. \"Well, I know you've had a wife.\"\n\n    \"I'm amazed that wonderful woman put up with the likes of me as long \n    as she did. I didn't deserve her.\"\n   \n    \"Tell me what to do?\"\n\n    \"I don't know much about love, but I do know that Marian loves you \n    very much, and if you don't go after her now, you will never find a \n    love like that for the rest of your life.\"\n\n    He looks at you long and hard.\n\n    \"And I'll make sure that it'll be my job to remind you of that for \n    the rest of my life.\"\n\n    *set cautious %+10\n\n    *goto rh10b\n\n*label rh10b\n\n“Fine!” You say to the Gretchen and Lars as they walk back towards the \nhorses.\n\nYour men are no longer gawking and are returning to their own packing, \nbut you can feel their eyes watching you as you pick up a lamp and walk \ntowards Marian.\n\nYou find Marian a short distance away under one of the nearby smaller \noaks that was lit with hanging rush lamps. Her legs are cross and she \nhas her hands covering her  eyes.\n\n*page_break\nYou sit down beside her.  She doesn't say anything nor shift her \nposition, so you move closer slow and easy. \n\nShe stays still, so you ease your arm around her shoulder. \n\nShe doesn't resist, so you pull her towards your  own shoulder.  She \nrelaxes into it.\n\n“Listen, my little squirrel, I have always wanted only the best for \nyou. You are use to London and Rome, and shops in Paris, and sitting \nbeside Barons and other noblemen. We're going to be running away, and \nI don't know what that really means.\"\n\nMarian looks up at you. Her eyes are dry, but you've never seen them \nmuch sadder. \n\n\"I don't want London or Rome or Paris. That was always what my parents \nwanted for me. I've always only wanted you.\"\n\n\"Marian...\"\n\nShe puts her finger on your lips to stop you from speaking.\n\n\"I don't care if we're on the run, as long as I'm running with you.\"\n\nYou look at her as if for the first time.  You realize that she is \nright. Marian isn't some dainty little thing that needs to have \nservants and be taking care of her every whim. She is a fighter, \na spy, a renegade, and made of rougher stuff than you are giving \nher credit for.\n\nMarian is truly the Mistress of the Merry Men; and if the Merry Men \nare leaving England, than so is the woman you love. \n\nYou put your arms around her and kiss her long and deep.\n\n\"Please forgive me. I never thought of it that way.\" You stand up and\npull her up by both hands. \"Let's go finish packing and get the hell \nout of England.\"\n\n\n*page_break\n\nIt is a short while later, when the sun has complely set, and the \ncresent moon is rising, when you ask for a report from your men.\n\nYou walk up to them and take your [i]\"Robyn-Hood-The-Leader\"[/i] pose.\n\nWith a stearn look, you ask, \"Have you packed as much as you can, and when \nI say that, I mean as much gold and silver as you can, on your horses?\"\n\nThey all reply at once.\n\n\"Yeah.\"\n\n\"And we have all the other necessary provisions on the cart and decided \nwhich two of you are going to drive the horses and the cart?\"\n\nWill Scarlett and Little John nod their heads. \"'Cept for the last of the \ntents and lamps,\" Will says, \"we're ready.\"\n\n\"And, Tuck, didn't you tell me one that you were granted certain duties \nas other men of the cloth?\"\n\n\"Uh, yeah, I guess, sort of. It depends. What 'cha got in mind?\"\n\nYou go over to him and put your arm around his shoulder as best you can.\n\n\"Walk with me.\"\n\n\n\nA short while later, you approach Gretchen, and with a large smile you put \nyour arm around her.\n\n\"Walk with me,\" you instruct.\n\n*page_break\n\nSoon all of the lamps in the camp are hanging from and sitting around the \nmajor oak. Will, and Little John stand in line behind you. You stand in \nfront of the line with Tuck facing you. The rest of the men stand in short \nrows looking at your back.\n\n\nThen you hear Gretchen clear her throat and you all turn. She walks forward \nfrom your tent, throwing loose flower petals that she holds with the tail of \nher skirt onto the ground.\n\nBehind her, Lars is escorting Marian, her arm through his, coming slowly \nbehind Gretchen. \n\nMarian has changed out of her riding clothes into a dress, and a white veil \nthat belongs to Gretchen covers her head and face.\n\nGretchen begins to sing a song. She stands across from you and the men. When \nMarian comes near, she covers her with the rest of the petals. Lars steps back \nin the rows with the other men.\n\n\nAs soon as Gretchen has finish singing the song, Tuck begins.\n\n\"I don't ordinary bring two people together in matrimony,\" he says, \"but I believe\nthat the good lord will allow this, making it true and holding it fast because no \ntwo people belong together more, nor love each other more, than Robyn and Marian.\" \n\n\"Here, here,\" said the witnesses.\n\nTuck indicates that Marian says the vows first.\n\n\"I take you, Robert Dore, as my true husband above all else till death does part us.\"\n\n\"And I take you, Marian FitzWalter, as my true wife above all else till death does \npart us.\"\n\n\nUnfortunately, the honeymoon has to be put off for another time because you must get \non the road, but you are the happiest that I have ever seen you.\n\n*finish\n\n*goto_scene RH17a\n\n   *label RH17a\n\n*page_break\n\nYou send the cart forward of the convoy with Gretchen and Marian riding their horses\non one side,  Lars and Will on the other, the rest of the men behind, searching the\narea, watching carefully, at a slow trot.\n\nYou still don't know how to get around the guards, but Gretchen has a knowing\nsmile on her face, and Marian assures you that it will be okay. \n\nWhat do you think she is going to do?\n\n*fake_choice \n  #Convince The Guards To Let You Through.\n\n    After all, she does have a way with the guards. She can charm them to do whatever\n    she wants.\n\n    You hide and watch Marian and Gretchen ride directly up to the guard who is in front \n    figuring he is the captain of this small troop. You hear her speaking, although you don't \n    know what she is saying. \n    \n    Both she and Gretchen dismount and walk closer to the horseman. He leans down and Marian gets\n    even closer to speak to him quietly. Gretchen does the same to the guard flanking the lead on the \n    right.\n\n    Next thing you know, the guards step aside opening the road! \n\n    Wow! How do you think she did that!\n\n    The cart, Lars and Will, move slowly past the guards.  You watch as Marian and Gretchen \n    quickly move from one guard to the next.\n\n    By the time you ride to the opening of the road, the captain has fallen off of his horse. \n    His horse cries out in confusion, and the other guards shout. Then the next guard falls \n    off of his horse, and another, then another, until they were all on the ground. In confusion\n    the horses cry out loudly as Gretchen and Marian hit their flanks to send them running\n    away.\n\n    \"Quickly!\" Calls Marian as she begins to remove the guards weapons.\n\n    What is going on here?\n\n    When you findally rush over to her, you found that the guards were asleep. Each and every \n    one of them. You and the rest of the men begin removing the weapons and anything else valuable \n    and add it to your person or add under everything else in the cart.\n", "rhaway3": "*label rhaway3\n\n*page_break\n\n*image robinmarian.png\n\nWell, I can't believe that it's happen again, but you've lost your \nway.\n  \nThat is to say, Wales is not in sight, but you know you're near \nthe shores of the Irish Sea. How do you know this?\n\n*fake_choice\n  #There Are Fulmars Flying In The Distance.\n\n    And everyone knows they stay closer to the cliff's.\n\n  #It Would Have Taken Longer To Travel To The North Sea.\n \n    And you've only been traveling for two days.\n\n  #There's Been More Sand In The Dirt.\n\n   And shells, too. Who knew there is more Tampa to snail shells \n   near the shores of the Irish Sea.\n\n \nYou're still a more north than you thought you would be.\n  \nOf course, you have plenty of money to replenish your supplies while \nyou give your horses a good rest, so you set up camp in the forest. In \nthe meantime, while you stay hidden with the women, the men check out \nthe nearby port.\n\nOn the second afternoon, Tuck finds you and Marian on a romantic stroll\nthat you thought you are taking alone.\n\n*page_break\n\n\"Robyn, didn't you tell us, more than once I might add, about a friend, a \nMoor, that escaped from prison with you during the Crusades?\"\n\n\"Yes I did. He's a Captain, and he was looking for a ship so that he \ncan sail home. Why?\"\n\n\"Well, there's one hanging around one of the bars calling himself \nBlack Mike. He's a pirate and Captain of the [i]Lady Anne[/i] that's in \nport.\"\n\nYou slap your thighs.\n\n\"The [i]Lady Anne[/i]!\"\n\n\"Mean something to you?\" Marian ask calmly.        \n\n\"My friend's name is Much, and he had us calling him Mike! And his \nmother's name had been Anne. He said if he ever had a ship, he'd name \nit after her!\"\n\nTuck looks at you with a blank face.\n\n\"Don't you get it?\" You ask. \"We made it to Southport!\"\n\n*page_break\n\n\"Do you want us to hang out around the Rusty Nail to see if it's \nhim?\"\n\n\"I want you to do better than that. Be very discreet, find him, \nand make a meet for Marian and I at that bar.\"\n\nYou watch Tuck lumber away. You call after him.\n\n\"Uh, Tuck, no offense, but I don't think you can be as discreet as, \nsay, Lars and Will. Send them instead.\"\n\n\"No offense taken.\"\n\n*page_break\n\n*image ladyanne.png\n\nIt isn't long before you get the word that the man that fits \nyour friend, Much's description is willing to meet with you soon \nafter dusk in the back of the bar known as the Rusty Nail.\n\nYou and Marian exit the forest under close watch of Little John \nand William and enter the town of Southport. \n\nYou're surprise at how quiet it is for a port that size, until you \nenter the Rusty Nail. The deafening sound of the cheering and jeering \nhit you in the face, nearly knocking you and Marian over. \n\nOf course, Marian wears her hooded cape, and you wear your green \nhood, but no one is paying attention to you anyway.\n\nAs large saucy women serve drinks and let themselves be man handle \nby the locals, a Moor moves towards you, knocking anyone out of his \nway with his wide shoulders. William and Little John move to flank you \nand Marian.\n\n\"Dore?\" He ask low and intense.\n\n\"Yes,\" you respond.\n\nHe nods at Marian, Little John and William, then leads the four of \nyou to a back room. He let's you and Marian in, than bars the door. \nWilliam growls, his hand on his waist where his weapon is hidden.\n\n\"It's okay. I'm all right; and besides, I have Marian.\"\n\n*page_break\n\nYou smile as the Moor closes the door with you and Marian on the \ninside. You turn and behind a desk is a large dark shape of a man in \nthe shadows. There is a single candle on the table.\n\nYou can tell that he is leaning back in the chair and that his legs \nare cross on the table. He is wearing a large floppy hat, and smoking \na cigar. You cannot only smell its stench, but you can also see the red \nlight of its end.\n\n\"Da last time me hear' uv Robert Dore,\" he says, chewing on his cigar, \n\"he be runnin' from da law fa murderin' his mutter's second husban'.\"\n\n\"The last time I had heard of Much, he was desperately trying to \nreturn home from England. What happened?\"\n\nHe removes the cigar from his mouth, puts his legs down, and reaches \nover the table to light two more candles with the end of the cigar. \n\nYou and Marian can now clearly see the thick heavy full beard covering \nhis face and his dark brown eyes that are just as piercing as you \nremember. \n\nHis hair is much longer and falls into long locks into his face and \nbelow his shoulders. Large rings encircle eight of his fingers and \nthere is a chain holding a large round madallion around his neck.\n\n\"It turns out, he likes da wea'ter just fine har in Englan'.\" He steps \nfrom behind the desk and takes Marian's hand. \"'nd he 'specially likes \nda women.\" \n\n*page_break\n\nHe bends low and kisses her on the hand while looking up and giving her \na wink.\n\nYou hit his hand and he let's go of Marian's. \"This one happens to be \nmy wife and cousin to the King.\"\n\nMuch's eyes go wide and his head jerks back in surprise and he looks \nat the two of you. He bows low.\n\n\"For'iv me, Lady Dore, 'nd ya hav' me condo'ences. King Richard was \none uv da best.\"\n\n\"What?\" You ask.\n\nMarian sits heavily in the nearby chair. \n\n\"Than it is true.\" She looks down at her lap.\"The Hag had told me \nwhen I was on my way to be with you, but I thought it was \nonly talk.\"\n\n\"That means John is King?\" You ask. You can tell that Much is \nholding back something.\n\nMuch chews on his cigar. \"Not so true. Ne'phew, youn' Arthur, cud \nbe da next king.\"\n\n\"Nevertheless, I've made up my mind. We're leaving England.\"\n\nMuch returns to his chair behind the desk. \"'nd me underst'nd dats \nwhar me comes in. Ya want me ta git ya out of Englan' on da Lady \nAnne, aye Dore?\"\n\n\"Well, Marian, her hand maiden, Gretchen, and my men.\"\n\nSuddenly, you catch a gleam in Much's eye. \"Why shud I?\" He ask \nnice, slow, and clear.\n\nYou sit down in the other chair across from him. You lean in close. \n\n*choice\n  #\"Because We're Long Time Friends, And You Owe Me.\"\n\n    \"If it wasn't for me, you would've died in that disgusting \n    prison in Jerusalem, Much.\"\n\n    \"Ha!\" Much laughs. \"Ya think too highly uv ya self, Dore. Me \n    woodda found me own way wit out ya.\"\n    \n    \"Then why were you begging me to take you with me, huh?\"\n\n    \"Dah way me 'members, ya mate didn't make it 'cause uv ya, \n    'nd me saved ya scrawny arse.\"\n\n    \"But if it wasn't for me, you wouldn't have gotten out of \n    Jerusalem into England.\"\n\n    *set exaggerate %+10\n\n    *goto rh10c\n\n  #\"Because I'm Robyn Hood, And We're Friends.\"\n    \n    Much's eyes go wide again, and then a roar of laughter escapes \n    his large round mouth. He was so loud that his man on the other \n    side of the door had to check to see if everything is all right.\n\n    Much waves at the door as he continues laughing. \"Ya? Robyn Hood \n    of Sherwoo' Fo'est?\"\n    \n    His barrow chest raises high with every breath he takes.\n\n    You sit there with your arms cross waiting for him to finish. \n    Marian sits with her arms cross without blinking at him.\n\n    \"It's true,\" she says.\n\n    \"Why do you think they haven't caught Robert Dore yet?\" You ask.\n\n    \"'Cause he's really da more notor'ous Robyn Hood?\" He bellows.\n\n    You and Marian look at him blankly as you patiently wait for your \n    old friend to get it.\n\n    Much's laughter becomes lesser and lesser as he realizes that you \n    are very serious.\n\n    He stops laughing.\n\n    \"D'ey not caught Robert Dore 'cause he's da more notor'ous Robyn \n    Hood,\" he finally says.\n\n    You both nod your heads.\n\n    *set brave %+10\n\n    *goto  rh10c\n\n  #\"Because I'm Ready For A New Life.\"\n    \n    Even in the candlelight, you can see Much's large white teeth when \n    he smiles.\n\n    \"Ya tellin' me dat dis has nothin' ta do wit ya bein' 'n outlaw?\"\n\n    You shift in your chair. \"Well, of course it does! Do I really have to \n    give you the details?\" \n\n    \"Dore, me an' ya goes way back, 'nd ya tellin' me ya can't trust me \n    wit details? Me heart's brok'n.\"\n\n    You know Much is exaggerating about that [i]\"heart's broken\"[/i] \n    part, but you decide to go ahead and tell him the truth.\n\n    You inhale and exhale. \n\n    \"Well, you see, Much, I'm not only the outlaw Robert Dore, who is \n    on the run because the Magistrate says I killed his step-father, \n    [i]which I did not do[/i], by the way, I also started hiding out \n    as Robyn Hood to escape.\" \n\n    You look at Much, and take another inhale, exhale before you\n    continue. \n\n    \"Now Prince John wants Robyn Hood's head. Probably on a pike so \n    that he can show off that he was responsible for the capture of me, \n    Robyn Hood.\"\n\n    Much looks at you blankly for a moment.\n\n    Suddenly, he his laughing loud and hardy.\n\n    \"Do Robyn Hood knows ya been runnin' 'round usin' his name?\" He \n    continues laughing.\n\n    \"No, I'm telling you, Much. I'm Robyn Hood.\"\n\n    He stops just long enough to stare at you, then he continues his \n    laughter. He is so loud that his man on the other side of the door \n    had to check to see if everything is all right.\n\n    Much waves at the door as he continues laughing. \"Ya? Robyn Hood \n    uv Sherwoo' For'st?\"\n    \n    His barrow chest raises high with every breath he takes.\n\n    *set cautious %+10\n\n    *goto rh10c\n\n*label rh10c\n\nMarian has enough of your boyish behavior. She pulls a small pouch \nout from a hidden pocket in the inside of her cape and opens it over \nthe table. Some gold coins fall out.\n\n*page_break \n\nMuch stares for a moment,  reaches for the coins, but Marian is \ntoo fast and hits his hands as if he [i]is[/i] a child.\n\n\"Half,\" she says. \"You get fifty coins now, and the rest when we are \nsafely out of England. That is, if you agree.\"\n\nMuch stands up and whistles. His man opens the door.\n\n\"Ya 'nd Dore's men come in. Me needs wit'esses.\"\n\nLittle John and  William enters the room. Much reaches across the \ntable and grabs your hand.\n\n\"In front uv dese men, me promise ta git ya, de lady, and da \nothers safely out of Englan', Robyn Hood.\"\n\nMuch pumps your hand once.\n\n\"And I agree to give you fifty gold coins now, Captain Black \nMike, and another fifty once you've delivered us safely out of\nEngland.\"\n\nYou pump his hand once.\n\nEveryone else in the room nod their head as witnesses to this \nverbal agreement.\n\n\"Oh, by da way, Robyn, some kid showed up h'ar a c'ple uv days 'go, claimin' ta \nbe a Merry Man uv Robyn Hood after gettin' drunk on too much uv me fine ale. \nHe had me laughin' so hard dat me put him in me brig on me ship just 'cause me \nculd.\"\n\nYou all yell, \"Jack!\"\n\n*finish\n\ngoto_scene rhaway4\n\n", "rhaway4": "*label rhaway4\n\n*page_break\n\n\n*image robinmarian.png\n\nThe next day while you and the men clean and sharpen your weapons, Black \nMike's crew prepares for the voyage. \n\nAt night they sneak your supplies, horses,  Gretchen, Marian, the men, \nand yourself on board. When everything is set, just before day break, \nBlack Mike pulls the [i] Lady Anne [/i] from the port and out into the \nIrish Sea.\n\n\"Well, this is it,\" you say to Marian as the two of you stand on deck, arm\nin arm, watching the lights of Southport get smaller and smaller. \"Are you sad?\" \nYou ask her.\n\n\"Are you kidding? We're having a real adventure!\" She says excitedly. \"I've \nalwayswanted to have a real adventure, and now I'm having one.\"  Then she \nlooks at you lovingly. \"And I'm having one with you.\" \n\nShe kisses you. \n\nYou look off and back to the shore feeling that same twinge of home sickness \nyou felt when you first left England. \n\n\"Goodbye England. Who knows, maybe one day we can return.\"\n\n*page_break\n\n\nWhile Marian goes below to get settled, you step up to watch Black Mike  \nat the helm, the sun rise slowly coming up behind you.  He turns one more \ntime to look at Southport.\n\n\"Me 'pect ta be back ta Southport 'fore da Drun'en Sail'r Fest'val begi',\" \nhe tells you. \"Me 'nd me crew ne'er miss it.\"\n\n\"Oh, about that.\" You take one of his hands off of the wheel and places \nsome gold coins into it. \"I had a change of plan. I was wondering if you \ncan take us to Sligo, Ireland?\"\n\nHe stares at the money in his hand as he speaks.  \"Me 'ave da swif'est \nship in dese seas. Me git ya ta Sligo 'nd be back ta me Large Lucy \nat da fest'val, on time.\"\n\n\"Then we have a deal.\"\n\n\nBlack Mike is kind enough to give you and Marian your own cabin, Gretchen a \ncabin, while your men sleep with the crew. \n\nHe steers the Lady Anne west into the Irish Sea, then north. He sails \nwithout any mishaps for two days and Black Mike doesn't worry that he will \nmiss one moment of the festival. \n\nSuddenly, when you and Marian are taking a lazy stroll around the deck, \nyour men are doing tactical exercises, and Gretchen is sitting enjoying \nthe sun and sea air as she finishes some fancy tattering, the winds pick \nup and become colder than usual for that time of the year.\n\n*page_break  \n\nQuickly, a thick, strange fog surrounds the ship making it extremely \ndifficult for the [i] Lady Anne's [/i] man in the crow's nest to see \nanything beyond what was directly below him, and that would be his\nfeet.\n \nBlack Mike, looking brave, suggest that you all stay below deck, so \nyou do. \n\nDespite the losing the necessity of being above deck, you and the \nrest of his guest enjoy eating the fresh fish, bread, and fruit, while \ndrinking your four o’clock tea. You and your men want something \nstronger than tea, but the women insist. \n\nAs time goes by, you are all warm and cozy under thick blankets,\nhappy that Marian and Gretchen are there to entertain you.  \n\nMarian sings songs while playing her lute, they both tell stories and \nrecite epic poetry, and they even try to teach more civilize songs to \neveryone; but your men and the [i] Lady Anne's [/i] crew seem to always \nslip into some form of a nasty sea ditty before the end.\n\n*page_break\n\nYou have been on the ocean for, how many? Is it five days now?  It shouldn't \ntake this long to reach Sligo, should it? And Black Mike has been acting \nmysterious since this fog has arrive; still, who knows these waters better, \nright? \n\nYou decide to approach him.\n\n*choice\n  #You Question Him As A Friend.\n\n    \"How's it going there, buddy?\"\n\n    \"Me needs a pint,\" he says as he stares straight ahead.\n\n    \"What are you taking about?\"\n\n    \"Make dat six pints.\"\n\n    You are very concern. \n   \n    \"Black Mike! You promise me with the ladies aboard that \n    you wouldn't take any chances and that you will stay sober!\"\n\n    \"Me knows whut me pro'ised!\" He says through clench teeth.\n\n    \"Than what's really going on? Shouldn't we have been in \n    Sligo by now?\"\n\n    \"Me don't knows iff'n we past da Isle Of Man yet.\"\n\n    \"What are you talking about?\"\n\n    \"Robyn, me ole frien', me need ta tell someone dis.\"\n\n    \"Tell me what?\"\n\n    \"Me thinks da [i] Lady Anne [/i] is bewitched,\" he says with \n    a hard \"d\" at the end.\n\n    You look at him. You don't know if you should laugh or take him \n    seriously, so you simply continue to look at him blankly.\n\n    \"Since dis e'il fog, me no been 'ble ta tell whar we be. We no see \n    lan'.\"\n\n    \"Oh.\" You think for a moment. \"Well, that doesn't prove that the \n    [i] Lady Anne[/i] is bewitched.\"\n\n    \"Den wut it prove?\" He raises his voice, then catches himself. \n    \n  \n    *set leadership %+10\n\n    *goto rh10d\n\n\n  #You Question Him As A Passenger. \n\n    Black Mike looks more like he is staring out into the fog instead \n    of steering the ship when you approach him.\n\n    \"Me ask ya ta stay be'ow, Robyn. Why ar' ya dis'beyin' me orders?\"\n\n    \"Because I'm concerned. We've been sailing for five days, and I \n    thought for sure you would have gone around the northern tip of \n    Ireland and docked in Sligo by now.\"\n\n    Black Mike turns to stare at you. His eyes are dangerously red from \n    not enough sleep. \n\n    \"'re ya tellin' me, Black Mike, Cap'n of the [i] Lady Anne[/i], a pirate \n    uv dese har waters who takes whut me wants when me wants, how long it \n    takes ta nav'gate dis large islan' ta da port of Sligo?\"\n\n    You back off a touch. \n\n    \"No, no, of course not! I'm just asking. I  want to make sure our deal \n    still stands. I mean, you wouldn't, but any other pirate captain may \n    take advantage of the situation, being that I'm Robyn Hood and all.\"\n\n    He makes a little chortle, and sighs deeply as he looks down and shakes \n    his head. When he looks at you, you see the old Much again.\n\n    \"Aye, we off due ta dis damn' fog, but me pro'ise is me pro'ise, Robert \n    Dore. 'nd me will git ya, yar woman, 'nd yar friends safely to Irelan'.\"\n\n    He continues staring out into the fog.\n\n    \"Is there something I should know, Much?\"\n\n    He turns and looks at you, eyes wide and mouth open; but then, he is \n    his normal self again. \"No. Go below, Robyn.\"\n\n    \"Okay. I trust you. I certainly don't want this to turn ugly. I have the \n    women to think about.\"\n   \n    *set cautious %+10\n\n    *goto rh10d\n\n  #You Sneak Up On Him.\n    \"Hey, Black Mike!\"\n\n    He jumps, and turns on you gritting his teeth, his eyes aflame.\n\n    \"Robyn! Whut 're ya doin'?  Didn't me tell ya ta stay be'ow deck!\"\n\n    \"Sorry. You've been so quiet staring out into this fog. I thought \n    you could use a laugh.\"\n\n    \"Arg! If ya had scare' me harder, me be slit'n ya throat!\"\n\n    You back off, your eyes large. \n\n    \"Are you okay? You don't look yourself.\"\n\n    Black Mike closes his eyes and lowers his head. When he looks back \n    at you, even by the dim light from the lamps on the deck, you could \n    see something that you had never seen in his eyes before. Fear.\n\n    \"The [i]Lady Anne[/i] is lost 'n dis fog, Robyn. Me ne'er seen notin' \n    like it in me life. Me don't know whar we be, 'nd we're runnin' out uv \n    food. I didn't want ta tell ya, friend, but now ya knows.\"\n\n    *set exaggerate %+10\n\n    *goto rh10d\n\n*label rh10d\n\n*page_break\n\nHe looks around. None of his men are paying any attention to him. He \nlowers his voice again. \n\n\"Me be in ma'y wa'ers, ne'er me seen such a fog.\"\n\n\"Okay, I believe you. I'm your buddy, remember?\"\n\n\"Not only dat,\" he continues, \"me not be steerin' da ship for three\ndays. She be sailin' harsel'.\"\n\nNow you start to say something. \"But...\"\n\n\"Look.\" Black Mike lets go of the  wheel.\n\nSure enough, the wheel is steady. \n\n\"But...\" you begin.\n\n\"Put yar hands on it 'nd try ta brin' har 'round, sharp.\"\n\n\"But...\"\n\n\"Do it!\"\n\nYou don't know how to steer a ship and you are worry on how bringing \nthe [i]Lady Anne[/i] around sharp would feel to the rest of the \npassengers. Still, Black Mike's eyes arewide and he looks craze, \nso you grab the wheel and with all of your might you turn it to \nmake a sharp right. \n\nNothing happens. The [i] Lady Anne [/i] stays straight and steady.\n\nBlack Mike drinks out of his water bag.\n\n\"She be bewitched,\" he says. \"We no seen lan', 'nd we runnin' out \nuv food.\"\n\n\"Oh.\"\n\n*page_break\n\n*image robinmarian.png\n\nYou have been awake for awhile, eaten what little breakfast there is, \nand is finding something to keep you occupy until the little bit of lunch \nthat is available is ready. \n\nGretchen is in the galley teaching Lars, Jack, and Will how to read the \nbible, and all of the men how to write their names.  Marian is in the cabin \nwriting a song. You are anxious, so all you are doing is pacing back and \nforth the center of your cabin.\n\nSuddenly, there is shouting and a commotion from the crew of the [i]Lady \nAnne[/i]. One by one or in small groups you all rush the stairs to see \nwhat all of the fuss is about above deck. \n\nYou and Marian reach the deck first and see what Black Mike and the \ncrew are staring at. \n\nThe fog is gone and the ship is drifting unman towards a beach.  The crew of \nthe [i]Lady Anne[/i] cannot believe what they are seeing.  They point, and stare, \nand mumble in their native tongue. \n      \nYou and Marian rush to the side of the ship to allow more people below a \nchance to come to the deck to see what all the shouting is about. \n\nThere, on the starboard side, you all view the most beautiful land you \nhave ever seen.  In fact, no human has ever seen a beach whose water is \nso blue and clear, floral as colorful, or trees as green.  \n\nSoon everyone is staring at the beach in stun admiration.\n \n*page_break\n\nFinally, Black Mike comes out of his reverie and begins shouting\ncommands madly as his men simultaneously in three languages.\n     \n\"Stop gawking' at it 'nd  drop anchor!\" \n\nSoon you hear him say in English, \"Bo 'nd Kurt, wit Robyn 'nd me in \nda first boat.  Da rest uv ya be wit da ladies 'nd git ready wit da\ncannons iff'n ya' see tro'ble. Me hear' tales uv cann'bals, 'nd me \nnot be someone's lunch taday!\"\n\nHe finishes in his native tongue before he steps into the shore boat.\n\nWhen you hear that, you become a little leery about being one of the \nfirst off of the ship. After all, this is certainly not Ireland. \n\nWhat do you do?\n\n*choice\n  #Send The Pirates First And Stay On The [i]Lady Anne[/i].\n\n    \"Black Mike,\" you begin, \"you know, you have a point. Maybe I \n    should stay and protect the women.\"\n\n    \"I'm coming, too,\" you hear Marian behind you saying. She smiles \n    as she checks the tightness of the blade at her side, and \n    the one in her boot.\n\n    \"If Marian's going, I'm going.\" Gretchen looks serious as she \n    tucks her knife into her hidden sleeve holder.\n\n    \"But dear,\" you say to Marian, \"shouldn't we send the pirates \n    in first? They're use to situations like this.\"\n\n    She stops what she's doing and gives you the look. You know \n    which look I'm talking about.\n\n    \"Uh, I guess I am going,\" you say. Marian clears her throat. \n    \"And so is Marian and Gretchen.\"\n  \n    She happily returns to placing her favorite arrows into her \n    quiver.\n\n    *set coward %+10\n\n    *set cautious %+15\n\n    *goto rh10e\n\n  #
