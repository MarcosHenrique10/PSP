\n\t\"You know, I've heard that, Evony,\" you tell her. \"It is nice to hear that it is true.\"\n\t\n\t\"Why of course, ${name}. If you are lucky, we may even end up working together, hmm?\"\n\t*goto surpriseguest\n*elseif (talking >= 50)\n\t\"I haven't been here for long,\" you tell her and flash a smile. \"Only a few weeks at most, but so far everything seems very new and exciting around here. Plenty of business going through, plenty \n\tof opportunities to tap into.\"\n\t\n\t\"Of all the places, the Mediterranean is the place do business. The whole region is thriving,\" she says and laughs quietly. \"If you are lucky, we may even end up working together, hmm?\"\n\t*goto surpriseguest\n*else\n\tYou nod quietly for a moment, collecting your thoughts into a cohesive sentence.\n\t\n\t\"Well I am new here,\" you tell her and flash a quick smile. \"I haven't been here longer than a few weeks, in fact.\"\n\t\n\t\"Well of all the places, the Mediterranean is the place do business. The whole region is thriving,\" she says and laughs quietly. \"If you are lucky, we may even end up working together, hmm?\"\n\t*goto surpriseguest\n\n\n\n\n*label surpriseguest\n\n\"Hey! Hey!\" you hear shouts from behind you. \"You can't go in without an invitation!\"\n\nThen there is a trio of silenced shots that ring from the direction of the front door. Suddenly the doors are kicked open and you see the man from Greece standing there, holstering a silenced pistol \nand unveiling a submachine gun from underneath his coat. This man, Valery Nasonov, looks at you and instantly brings the weapon to bear, squeezing the trigger. You launch yourself directly at Evony, \ntackling her out of the way while also bringing both of you into cover. You hear Evony's hurried breathing against your ear, feel her arms wrapped around you as she seeks for shelter, but then push \nher back.\n\n*if ((talking >= 70) or ((talking >= 50) and (charm > 55)))\n\t\"Jealous boyfriend of yours?\" you ask in an effort to throw her off from the scent of you being the real target.\n\t\n\tHer answer is muted by the loud noise of gunfire. \nThere is another burst of fire from Nasonov's firearm, joined quickly by the pistols of the servants and guards rushing to the scene. The crowd once gathered in celebration is screaming and rushing to \nflee and scatter. One by one the pistols are silenced. One of the guards rushes in through the main room and stands right beside you as he fires off a couple of hasty shots, then is gunned down with \na solid well-aimed burst.\n\nAnd here you thought Nasonov was a professional who might care at least a little about collateral damage. Clearly your initial through was entirely mistaken. Unfortunately you fully expected to be \nsearched at the door and didn't bring your own weapon with you, leaving you with little means of fighting back.\n\n*choice\n\t#Grab the guard's pistol and engage the assassin.\n\t\t*set charm -5\n\t\t*set covert -5\n\t\tThe guard is right beside you now, his arm outstretched and the pistol still hanging on his finger by the trigger guard. You hear a burst of gunfire aimed somewhere completely elsewhere and \n\t\ttake your chance, scrambling over and grabbing the pistol from the guard, then slide back into cover. Evony looks at you like a deer caught in the headlights, completely stunned, but with \n\t\tNasonov right there you do not have the time or opportunity to snap her out of it.\n\t\t\n\t\tYou roll against the wall and into the open interior archway, then bring the pistol up to take aim at your opponent. \n\t\t*if (combat >= 70)\n\t\t\t*achieve smersh\n\t\t\t*set nasonov_killed true\n\t\t\t*set kills +1\n\t\t\tThe sight picture is right over Nasonov's head, but as soon as you start squeezing the trigger he starts turning around and crouches. He's quick. Unbelievably quick. A burst of \n\t\t\tbullets lands a line of hits right through the middle of the archway, missing you by a wide margin but only because Nasonov is busy getting out of the way. You lower the pistol \n\t\t\tand fire again, this time hearing the splatter of blood against a wall.\n\t\t\t\n\t\t\tYou lower the pistol and take in a deep breath, looking at Nasonov's head with a hole clear through it. That was... far easier than you thought it would be. There's a rustling \n\t\t\tfrom behind you as Evony peeks out past you, then lets out a loud scream.\n\t\t\t\n\t\t\tIf this woman is intimately involved with a smuggling operation fuelling bloody revolutions across the globe, she is a very good actress. If she isn't acting, then she must be \n\t\t\tshielded from the far bloodier affairs of the business. However, this may end up as an excellent way into the whole affair if you play your cards right.\n\t\t\t*page_break\n\t\t\t*goto intothenight\n\t\t*else\n\t\t\tThe sight picture is right over Nasonov's head, but as soon as you start squeezing the trigger he starts turning around and crouches. He's quick. Unbelievably quick. A burst of \n\t\t\tbullets lands a line of hits right through the middle of the archway, missing you by a wide margin but only because Nasonov is busy getting out of the way. Still, the bullets feel \n\t\t\tlike they hit far too close for comfort and your reaction brings you back behind cover.\n\t\t\t\n\t\t\tYou take a deep breath and listen to the Soviet agent scramble for cover. Another rush of steps from further away alert you to incoming reinforcements, probably more guards, so you \n\t\t\tpeek out again and get off a couple of shots while Nasonov makes a run for the door. None of your shots make contact unfortunately. Before you can rush after him, Evony leans against \n\t\t\tyou and peek past you at the death and destruction by the door, letting out a sudden scream.\n\t\t\t\n\t\t\tIf this woman is intimately involved with a smuggling operation fuelling bloody revolutions across the globe, she is a very good actress. If she isn't acting, then she must be \n\t\t\tshielded from the far bloodier affairs of the business. However, this may end up as an excellent way into the whole affair if you play your cards right.\n\t\t\t*page_break\n\t\t\t*goto intothenight\n\t#Make a run for it while you can.\n\t\t*set covert +5\n\t\t\"Evony,\" you try to call out to the woman shivering with shock beside you. \"Evony!\"\n\t\t\n\t\tHer eyes widen as you call her name again and again, finally her focus turning to you. Her eyes flit over to the guard lying dead beside you, then back to you, her entire face contorting \n\t\tin shock, disgust, and fear. You take her shoulder and grip firmly, then shake her to make her snap out of it. If this woman is intimately involved with a smuggling operation fuelling \n\t\tbloody revolutions across the globe, she is a very good actress. If she isn't acting, then she must be shielded from the far bloodier affairs of the business. However, this may end up as \n\t\tan excellent way into the whole affair if you play your cards right.\n\t\t\n\t\tYou have to get out of here, but you also can't just leave Evony behind either. She's the only connection you have right now to the smuggling operation and perhaps clearing your name. \n\t\tWith a strong grip on her arm you guide her to stand up while you grab the guard's pistol and take in a deep breath. A burst of gunfire sounds from the direction of the front door and a \n\t\tline of puffs go across the dead guard, ending on the wall right between you and Nasonov. You reach your hand out and fire blindly towards the assassin, hoping to force him into cover \n\t\tbefore you suddenly launch out of cover and run across the room while dragging Evony along behind you.\n\t\t\n\t\tThere's more gunfire behind you, but you can't stop now. The doorway you slip through shield you from any incoming fire and also gives you a way around to the cars. \n\t\t*page_break\n\t\t*goto intothenight\n\t#Tell Evony to run while you create a distraction.\n\t\t*set charm +5\n\t\t*set nasonov_killed true\n\t\t\"Evony,\" you try to call out to the woman shivering with shock beside you. \"Evony!\"\n\t\t\n\t\tHer eyes widen as you call her name again and again, finally her focus turning to you. Her eyes flit over to the guard lying dead beside you, then back to you, her entire face contorting \n\t\tin shock, disgust, and fear. You take her shoulder and grip firmly, then shake her to make her snap out of it. If this woman is intimately involved with a smuggling operation fuelling \n\t\tbloody revolutions across the globe, she is a very good actress. If she isn't acting, then she must be shielded from the far bloodier affairs of the business. However, this may end up as \n\t\tan excellent way into the whole affair if you play your cards right.\n\t\t\n\t\t\"Evony, listen to me. When I tell you to run, run across this room towards that door over there,\" you say and point your finger across the room, making sure she follows your gesture before \n\t\tyou continue. \"Do you understand? I will create a distraction, but when I tell you to run, you [i]have[/i] to run. Okay?\"\n\t\t\n\t\tShe nods, you nod, then her eyes fall on the dead guard again. You pull her by the shoulder to make her not look at the brutal scene and keep her focus on you. A burst of gunfire sounds \n\t\tfrom the direction of the front door and a line of puffs go across the dead guard, ending on the wall right between you and Nasonov. Distraction. Now you just have to find a distraction. \n\t\tThere's nothing in reach except the guard and his gun. That will have to do.\n\t\t\n\t\tYou grab the guard's arm and tug him closer to you, then sling him up so you can hold him up as a human shield. With a deep breath you hoist him up and step out with the guard in front of \n\t\tyou to shield you. Nasonov looks at you and grins, then takes aim. Suddenly you hear a gunshot and see Nasonov's head burst open with a hole. You look to the side and see Evony there, \n\t\ther whole body trembling, the guard's pistol in her hands with smoke coming out of the barrel. For a moment she just stares at the Soviet agent's already lifeless but still standing body, \n\t\tthen lets out a blood-curdling scream.\n\t\t*page_break\n\t\t*goto intothenight\n\n\n\n\n*label intothenight\n\"Evony, we have to go. Right now,\" you tell the woman still reeling from the shock of the sudden gunfight.\n\nThere's no time to stay and comfort her, so you head for your car. Surprisingly Evony takes to her feet and follows you closely, almost as if she's clinging to the only point of safety in the whole \nworld. You run as fast as you can while staying mostly out of sight. Who knows, Nasonov might have a partner lurking around somewhere. However, nothing happens on the way to your car and you help \nEvony onto the passenger seat before you rush to the driver's seat and take the wheel.\n\nAs you speed off along the gravel road and head to the winding asphalt leading back towards Rome, you try and ask Evony if she has a safe place to stay, any friends to contact, anyone you could take \nher to. She shivers and shakes on the passenger seat, completely mum. So you decide to take her back to the hotel with you. It's the only way to keep the door open for yourself if you want to find \nJishkariani and Lund.\n*page_break\n*if not (nasonov_killed)\n\tAbout five minutes after leaving the villa, a pair of bright headlights appear in the distance behind you. Whoever is driving the other car is catching up to you fast, and soon enough those \n\theadlights are right up against your bumper. Evony shrieks in terror as the car suddenly jolts from a push against the rear bumper, then another. Then the chasing car pulls back and swerves \n\tonto the oncoming lane, trying to catch up with your rear tire so it can push you off the road.\n\t\n\tEvony leans against you, but you're forced to push her off so your hand can move freely between the gear shift, the wheel, and the handbrake if necessary. She shrieks again and curls up in \n\ther seat.\n\t\n\t\"Don't let them kill me... don't let them kill me... why would they want to kill me...\"\n\t\n\tShe keeps muttering to herself in between those brief loud shrieks that escape her each time the car jolts with another hit. You're not going to just sit by and let yourself be spun around. \n\tEspecially seeing that the car chasing you is a normal four-door car while you're in a performance-tuned luxury Maserati.\n\t*page_break\n\t*if (driving > 50)\n\t\tYou slam your foot down and put your hand against the gearshift, pushing it forwards to switch to a higher gear as soon as the revs get high enough. The car launches forwards, creating a \n\t\tgap between you and the other car just in time before it tries to turn into you. Instead the chasing car ends up swerving across the road, losing speed and growing the distance to you. \n\t\tWith your eyes switching between the mirrors and the road ahead you keep your foot down, speeding ahead at over 100 km/h. You can feel the speed in your chest, pounding at you while you \n\t\tguide the car masterfully along the rural roads.\n\t\t\n\t\tThe chasing car is still trying, however, and bumps against the back of your car after pushing up to its probable top speed. You take in a deep breath and slow down, allowing the car to \n\t\tget close and try to get beside you again. This time you roll down the window, open the centre console, then pull out your pistol. With a bit of clear straight road ahead of you, you lean \n\t\tout the window and take aim. \n\t\t*if (combat >= 50)\n\t\t\tThe dark night road flashes with a blinding light of fire from the pistol. You hear shattering glass, then the screech of tires that quickly gives way to the sound of a car slamming \n\t\t\tinto the dirt of the field beside the road. As you drive away you hear the horn on the car bleat in a single monotonous tone.\n\t\t\t*page_break\n\t\t\t*goto aftermaths\n\t\t*else\n\t\t\tThe dark night road flashes with a blinding light of fire from the pistol. You hear the screech of tires that quickly gives way to the sound of a car slamming into the dirt of the \n\t\t\tfield beside the road. As you drive away you hear the horn on the car bleat in a single angry honk.\n\t\t\t*page_break\n\t\t\t*goto aftermaths\n\t*else\n\t\tYou slam your foot down and put your hand against the gearshift, pushing it forwards to switch to a higher gear as soon as the revs get high enough. The car launches forwards, but not fast \n\t\tenough to avoid the chasing car shoving into you. The tires squeal to maintain grip, and you turn the wheel forcefully to keep control of the direction. Your assailant pulls back, only to \n\t\tgather more speed for another ram. At this point you've had enough. You roll down the window, open the centre console, then pull out your pistol. Before the cars can come together again, you \n\t\tlean out the window and take aim. \n\t\t*if (combat >= 50)\n\t\t\tThe dark night road flashes with a blinding light of fire from the pistol. You hear shattering glass, then the screech of tires that quickly gives way to the sound of a car slamming \n\t\t\tinto the dirt of the field beside the road. As you drive away you hear the horn on the car bleat in a single monotonous tone.\n\t\t\t*page_break\n\t\t\t*goto aftermaths\n\t\t*else\n\t\t\tThe dark night road flashes with a blinding light of fire from the pistol. You hear the screech of tires that quickly gives way to the sound of a car slamming into the dirt of the \n\t\t\tfield beside the road. As you drive away you hear the horn on the car bleat in a single angry honk.\n\t\t\t*page_break\n\t\t\t*goto aftermaths\n*else\n\t*goto aftermaths\n\n\n\n\n*label aftermaths\nWhen you reach your hotel room, Evony Lellouche is still trembling and unresponsive. As soon as she gets to the small sitting room in the hotel room, she sits down on the sofa and lies down, curling \nup into a foetal position. You try and think back. Was it this hard for you as well the first time you saw someone get killed? Maybe. The years have made the experience hazy in your mind, probably \nbecause you have had no willingness to remember it.\n\nYou pour a couple of glasses of bourbon from the decanter in the room and offer one of the low glasses to Evony. She takes it but remains silent, drinking it quickly while you make ready for bed. She \nremains still on the sofa, still in her silver dress. Just before you head to the bedroom yourself you pour another glass of bourbon for Evony and call the night manager.\n\n\"Yes, hello,\" you start in a quiet voice, glancing back at the woman shivering in shock. \"Can you arrange for a set of clothes to be delivered to my room tomorrow morning? No, not for me. A women's \ndress will be fine. Size 44, I believe. I trust in your fashion sense, just make sure you have it ready for early morning. Thank you.\"\n\nAn hour after you have turned off the lights and gone to bed, you hear her shuffling around until the shower gets turned on in the bathroom. There's no other sound, just the shower.\n*choice\n\t#Go check on Evony.\n\t\tYou climb out of bed and rub your eyes for a moment. You're body thrums with a need to get some rest now that all that adrenaline has fully washed out of your system, but you still brave the \n\t\tsteps leading to the door of the bedroom, then into the bathroom. The shower is still running and sounds almost as if it's just falling into an empty tub, but as soon as you step into the \n\t\tbrightly lit bathroom you see Evony sitting in the bathtub right underneath the rain of water.\n\t\t\n\t\tShe's shivering violently, cradling her knees against her bare chest, her eyes staring unfocused straight ahead of her. As you walk towards her, she doesn't respond to you in any way. Not \n\t\teven an acknowledgement that you are in the same room as her. There are no words of consolation, no way of finding those elusive words that might make what she has just experience float \n\t\taway from her mind.\n\t\t\n\t\t\"I can still feel the blood,\" she whispers, almost too quiet for even you to hear. \"It won't come off. They can't get away with it...\"\n\t\t\n\t\t*choice\n\t\t\t#Make sure the water is warm and go back to bed.\n\t\t\t\tYou heave a deep sigh and walk closer to the shower, placing your hand up between Evony and the falling water. It's cold. No wonder she is shivering so much. You move your hand back \n\t\t\t\tdown and then take hold of one of the handles, turning it counter-clockwise until you can feel the water become nice and warm for your guest.\n\t\t\t\t\n\t\t\t\tOnce the water is falling down nice and warm for Evony you stand back up and make your way back to the bathroom door. With a quick final glance back you step out and get back to bed. \n\t\t\t\tIt takes no more than perhaps five minutes before the sound of the shower suddenly stops. Evony shuffles around outside the door for a moment, then the light in the sitting room is \n\t\t\t\tturned off and the hotel room goes completely silent.\n\t\t\t\t*goto comemorning\n\t\t\t#Sit on the edge of the bathtub and stay with her for a while.\n\t\t\t\t*set charm +5\n\t\t\t\tYou take in a deep breath and walk closer to the bathtub so you can sit on the edge. While Evony keeps staring straight ahead with a blank expression, you reach out and place a hand \n\t\t\t\ton her shoulder. The water cascades down from her hair, and flows down over your hand. It's cold, almost freezing cold. With your free hand you reach out to the handle and turn it \n\t\t\t\tcounter-clockwise, making sure that the water becomes nice and warm for Evony and yourself.\n\t\t\t\t\n\t\t\t\tFor a while you just sit there and wait, holding Evony's shoulder as the trembling very slowly starts to subside. One of the arms hugging her knees shifts finally and she moves a \n\t\t\t\thand up to yours, holding it gingerly while you still sit. A while later her body seems to go limp, her eyes closing as she nods off to sleep for a just a moment.\n\t\t\t\t\n\t\t\t\tIt's no use to leave her sitting in the bathtub if she is already nodding off. You turn off the water for her and look down at her.\n\t\t\t\t*choice\n\t\t\t\t\t#Take her to bed with you.\n\t\t\t\t\t\tYou lean down and hook an arm around her back, helping her up so you can pick her slender naked figure out of the tub so you can carry her into the bedroom. Making sure you \n\t\t\t\t\t\tturn off the lights as you go through the hotel room, you nudge the bedroom door open and walk over, settling Evony down on one side of the wide comfortable bed. You tuck \n\t\t\t\t\t\ther in, then climb into bed on the other side, shuffling about until you're comfortable. The room falls silent.\n\t\t\t\t\t\t\n\t\t\t\t\t\tSuddenly you feel the bed and the sheets shift. Evony moves closer to you and presses her shivering and obviously naked body against your back. You can feel the water drops \n\t\t\t\t\t\troll on her dark skin, her hair still completely wet. Her breathing strikes you as hot and fast.\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe makes no move to do anything else but lie there, perhaps seeking some misguided solace in not being completely alone.\n\t\t\t\t\t\t*goto lovemaker\n\t\t\t\t\t#Take her to bed and sleep on the sofa.\n\t\t\t\t\t\tIt doesn't seem right to take her to bed with you, but you can't let her sleep on the rough sofa either. You hook an arm around her back and help her up, then pick her slender \n\t\t\t\t\t\tnaked figure out of the tub so you can carry her into the bedroom. You place her in the middle of the soft comfortable bed and tuck her in, then make as quiet of an escape \n\t\t\t\t\t\tfrom the room as you can. You close the door quietly and turn off the lights in the sitting room, then head for the sofa to get some sleep.\n\t\t\t\t\t\t*goto comemorning\n\t\t\t\t\t#Put her on the sofa.\n\t\t\t\t\t\tIt doesn't seem right to take her to bed with you, but you can't let her sleep in the bathtub either. You hook an arm around her back and help her up, then pick her slender \n\t\t\t\t\t\tnaked figure out of the tub so you can carry her to the sofa. She lets out a soft sigh as you make sure she has one of the extra pillows and a blanket to cover herself with. \n\t\t\t\t\t\tThen you walk off to bed by yourself, turning off the lights in the sitting room before closing the door.\n\t\t\t\t\t\t*goto comemorning\n\t\t\t#Pick her up and carry her to bed.\n\t\t\t\t*set charm +5\n\t\t\t\tYou lean down and hook an arm around her back, helping her up so you can pick her slender naked figure out of the tub so you can carry her into the bedroom. Making sure you \n\t\t\t\tturn off the lights as you go through the hotel room, you nudge the bedroom door open and walk over, settling Evony down on one side of the wide comfortable bed. You tuck \n\t\t\t\ther in, then climb into bed on the other side, shuffling about until you're comfortable. The room falls silent.\n\t\t\t\t\n\t\t\t\tSuddenly you feel the bed and the sheets shift. Evony moves closer to you and presses her shivering and obviously naked body against your back. You can feel the water drops \n\t\t\t\troll on her dark skin, her hair still completely wet. Her breathing strikes you as hot and fast.\n\t\t\t\t\n\t\t\t\tShe makes no move to do anything else but lie there, perhaps seeking some misguided solace in not being completely alone.\n\t\t\t\t*goto lovemaker\n\t#Stay in bed and try to get some sleep.\n\t\tThe shower continues for almost an hour, then finally stops. Evony shuffles around outside for a moment, then the door to the bedroom opens softly and Evony's figure emerges into the bedroom. \n\t\tThe sheets are pulled aside on the other side of the wide bed, Evony climbs in, then presses her shivering and obviously naked body against your back. You can feel the water drops roll on her \n\t\tdark skin, her hair still completely wet. Her breathing strikes you as hot and fast.\n\t\t\n\t\tShe makes no move to do anything else but lie there, perhaps seeking some misguided solace in not being completely alone.\n\t\t\n\t\t*goto lovemaker\n\n\n\n*label lovemaker\n*set evony_bed true\n*choice\n\t#Turn over and make sure she gets some sleep.\n\t\t*achieve consent\n\t\tYou slowly turn around on the bed, pulling the sheets up so they do not bundle up beneath you. Evony's face is right there, her deep brown eyes looking directly into yours. Her heavy breathing \n\t\twashes over your lips, her scent like an intoxicating perfume. Yet you pull her to you and wrap your arm around her with no other intent but to cradle her to sleep. It does not take long at \n\t\tall for her to pull herself against you and fall asleep, her breathing becoming deep and relaxed.\n\t\t\n\t\tYou look at her for just a moment longer, then fall asleep yourself.\n\t\t*goto comemorning\n\t#Turn over and kiss her.\n\t\t*set evony_affair true\n\t\t*achieve vespa\n\t\tYou slowly turn around on the bed, pulling the sheets up so they do not bundle up beneath you. Evony's face is right there, her deep brown eyes looking directly into yours. Her heavy breathing \n\t\twashes over your lips, her scent like an intoxicating perfume. You reach out and slide your fingertips along her smooth dark skin, moving your hand up to her slender neck and hooking it behind \n\t\ther neck. Both of you come together in one motion, your lips meeting one another in a hungry kiss.\n\t\t\n\t\tSuddenly, as Evony rolls on top of you, it appears that you will not be doing much sleeping tonight after all.\n\t\t*goto comemorning\n\t#Leave her be.\n\t\t*achieve consent\n\t\tYou stay where you are and allow Evony to pull herself against you. It does not take very long for her breathing to relax, her still shaky figure becoming still behind you. It does not take \n\t\tlong at all for her to fall asleep, her breathing becoming deep and relaxed.\n\t\t\n\t\tYou look at her for just a moment longer, then fall asleep yourself.\n\t\t*goto comemorning\n\n\n\n\n*label comemorning\n*page_break\nThe next morning comes around with the bright Italian sun peering in through the curtains, painting a single column of light right across the head of the bed which also happens to be exactly where \nyour head is as well. \n*if ((evony_affair = \"true\") and (charm > 55))\n\tThe bright light rouses you from that oh so comfortable sleep, your entire body feeling relaxed for the first time in weeks. With a deep yawn you roll over to your back and glance over to Evony \n\tsleeping soundly beside you. With a quick smile at her sleeping form you climb out of bed and wrap yourself in a robe, heading into the sitting room, making sure you close the door behind you \n\tso as not to interrupt your female companion.\n\t\n\t*goto breakfastthings\n*elseif (evony_affair = \"true\")\n\tThe bright light rouses you from that oh so comfortable sleep, your entire body feeling relaxed for the first time in weeks. With a deep yawn you roll over to your back and glance over to Evony \n\tbeside you. She's not sleeping. She's laying on her back beside you, completely silent, her eyes unblinking as they stare up at the ceiling. As you shift and slowly sit up from the bed, her eyes \n\tflit over to you and she offers a warm smile to you, then turns onto her side facing you. With a quick smile at her you climb out of bed and wrap yourself in a robe, heading into the sitting \n\troom, making sure you close the door behind you so as not to interrupt your female companion.\n\t\n\t*goto breakfastthings\n*else\n\t*if (evony_bed)\n\t\tThe bright light rouses you from that oh so comfortable sleep. With a deep yawn you roll over to your back and glance over to Evony beside you. She's not sleeping. She's laying on her back \n\t\tbeside you, completely silent, her eyes unblinking as they stare up at the ceiling. As you shift and slowly sit up from the bed, her eyes flit over to you and she offers a thin smile to \n\t\tyou, then turns onto her side with her back to you. With a quiet sigh you climb out of bed and wrap yourself in a robe, heading into the sitting room, making sure you close the door behind you \n\t\tso as not to interrupt the woman in your bed.\n\t\t\n\t\t*goto breakfastthings\n\t*else\n\t\tThe bright light rouses you from that oh so comfortable sleep. With a deep yawn you roll over to your back and slowly sit up from the bed. With a deep yawn you climb out of bed and wrap yourself \n\t\tin a robe, heading into the sitting room, making sure you close the door behind you so as not to interrupt the woman sleeping out on the couch.\n\t\t\n\t\t*goto breakfastthings\n\n\n\n*label breakfastthings\nYou ring the front desk for a serving of breakfast and delivery of the dress that you had requested for Evony the previous night, then make your way into the bathroom for your morning routine.\n\nYou hear some shuffling from the other room, pretty sure that it's just Evony turning around beneath her blanket. She doesn't call out to you or anything, just remains silent, perhaps still \nmulling over the events of the previous night.\n\nJust as you walk out of the bathroom there is a knock on the door. You can hear Evony jump from the way her blanket rustles for a split second.\n\n\"Room service!\"\n\nYou walk to the door and peer through the peephole to make sure it is in fact room service, then open the door for the young Italian man sent up to deliver everything on a little table that you \ncan push around. The scent of freshly made bread and coffee fill the hotel room as the table trundles on to the middle of the sitting room. After setting everything up for an enjoyable breakfast, \nthe service boy leans down and collects a parcel from below the tabletop, from a shelf that had been hidden away by the pristine tablecloth.\n\nYou thank the boy and hand him a tip in exchange for the parcel, then toss it over to Evony who has finally decided to stand up. The door closes, you make sure it locks, then watch your female \nguest begin to tear open the parcel to reveal an exquisite pastel blue summer dress. It's certainly getting warm enough in Italy for wearing such a lovely thing, even though the summer months lie \nstill ahead.\n*page_break\n\"Why did you take me here?\" Evony suddenly asks while you are sitting down together for breakfast.\n\n\"You did not tell me any other place where I could take you,\" you respond and break off a piece of bread for yourself.\n\n\"Well,\" she says quietly and lowers her eyes to her milky coffee, then glances back up at you. \"Thank you. \n*if ((evony_affair = \"false\") and (evony_bed = \"true\"))\n\tFor everything you did for me last night, and looking after me. \nI appreciate it.\"\n\nMiss Lellouche has a far softer nature than what Titos Metaxas hinted towards. Yes, you saw the alluring businesswoman with a streak of confident ambition during the party, but now... now you have \na hard time in seeing that. It could be the exhaustion from the shock, or perhaps the injury of seeing such violence as she did, or perhaps it is all an act. No matter which it is, she appears to \nbe placing a great deal of trust in you right now. \n*if (evony_affair)\n\tPerhaps it is simply you, but you feel a completely different sense about her after the way you joined together during the previous night.\n\n*label questions\n*if (tick = 1)\n\tEvony takes in a deep breath and sinks her head lower, lifting up the coffee cup to her lips at the same time. She takes a sip of the drink and swallow, then lets out a huffing breath as the \n\twarmth of it strikes her mouth.\n\t*goto questionstart\n*elseif (tick = 2)\n\tYou watch the woman opposite from you take another sip of her coffee, then settle it back down on the porcelain coaster with a soft clink.\n\t*goto questionstart\n*elseif (tick = 3)\n\tEvony's hands are still trembling, but she pushes through and grabs one of the fresh bread buns set in a wonderful little wicker tray for you. She breaks the bread in two, then breaks off a \n\tsmaller piece from one of the halves, placing the still steaming piece of bread into her mouth.\n\t*goto questionstart\n*else\n\t*goto questionstart\n\n\n*label questionstart\n*hide_reuse\n*choice\n\t#\"Is there anywhere you can go? Anywhere I can take you?\"\n\t\t*set tick +1\n\t\t*set charm +5\n\t\t*set unsure true\n\t\t\"No, I would not want to bother you,\" she says quietly and takes in a deep breath. \"I was supposed to leave for Monaco this morning. To meet with a business acquaintance of mine. But I suppose \n\t\tI will have to cancel that.\"\n\t\t\n\t\t\"Well, what luck. I believe my journey was about to take me to Monaco as well,\" you tell her and flash a wide smile.\n\t\t\n\t\t\"If that is true, then I am very lucky to have met you,\" she tells you while her brow furrows. \"But if you are thinking of driving to Monaco simply to please me in some way, I would beg of \n\t\tyou to not do so. I am capable of driving myself, thank you. Despite last night I am not some damsel in distress.\"\n\t\t\n\t\t*goto questions\n\t#\"Is there anyone I can call for you? Someone who might be worried about you?\"\n\t\t*set tick +1\n\t\t*set charm +5\n\t\t\"Yes, but you should not be the one to call them,\" she says and flashes a wide slightly concerned smile. \"I do not wish for you to entangle yourself in something you know nothing about, and \n\t\tthe people I would call can be the very... serious type.\"\n\t\t\n\t\t\"Like the man at the party?\" you ask, trying to misdirect her into thinking perhaps Nasonov was there for her or someone else more nefarious than you.\n\t\t\n\t\t\"Yes...\" she whispers back and hangs her head down.\n\t\t\n\t\t*goto questions\n\t#\"Do you know who the man at the party was?\"\n\t\t*set tick +1\n\t\tYou watch as Evony takes in a deep breath, then lets it out in a slow steady exhale. She thinks for a moment, her eyes focusing on each thing on the little table between you at a time while \n\t\tsearching through her memory. Eventually she looks back up at you with an apologetic look.\n\t\t\n\t\t\"No,\" she says quietly and shakes her head. \"I am sorry.\"\n\t\t\n\t\t\"Hmm, perhaps he was a madman then,\" you muse in an effort of further misdirection, to which Evony lets out a single chuckle.\n\t\t\n\t\t\"No, I do know the type. He was no madman - he was a professional,\" she says quietly, then exhales in a loud sigh. \"I just do not know why anyone would send someone like that after me. I have \n\t\tdone nothing...\"\n\t\t\n\t\t*goto questions\n\t*if (tick > 2) #Convince Evony to tell you about her contacts.\n\t\t*set tick +1\n\t\t*if (((talking >= 50) and (evony_affair = \"true\")) or (talking = 90))\n\t\t\tEvony looks at you with a hesitant look as she thinks. It's clear that she really doesn't want to drag you into the more underhanded business she was alluding to, but she seems to come \n\t\t\taround to trusting you enough to maybe let things slip. She heaves a sigh and finally relents.\n\t\t\t\n\t\t\t\"You should not ask questions you do not want to hear the answers to,\" she tells you quietly and sighs again. \"These people are dangerous.\"\n\t\t\t\n\t\t\t\"Who are they? How did you meet them?\"\n\t\t\t\n\t\t\t\"I met them through my fiancée years ago. He was killed in a car accident years ago in Côte d'Ivoire, but they told me they wanted to make sure I was taken care of. I guess they \n\t\t\tfelt somehow responsible for the accident... maybe they were. In any case, they helped me establish myself in the Mediterranean,\" she tells you with a sorrowful voice. \"But that kind of \n\t\t\thelp does not come without some kind of price.\"\n\t\t\t\n\t\t\t\"I'm sorry,\" you state. \"For your fiancée.\"\n\t\t\t\n\t\t\t\"Thank you, but that is far behind me now,\" she says, her voice suddenly becoming cold and detached, her body instantly stiffening to the point of trembling under the tension. \"If that man \n\t\t\twas after me, somehow they must have dragged me into a mess. I have to find out what they're doing.\"\n\t\t\t\n\t\t\t\"Who are they?\"\n\t\t\t\n\t\t\t\"No, do not ask me that again. I will not have you getting involved in this.\"\n\t\t\t*goto questions\n\t\t*else\n\t\t\tEvony looks at you with a hesitant look as she thinks. It's clear that she really doesn't want to drag you into the more underhanded business she was alluding to, but she is also shaken \n\t\t\tfrom the previous night's events. finally she lets out a deep sigh and shakes her head at you.\n\t\t\t\n\t\t\t\"No, please don't ask me about them,\" she tells you with a pleading look. \"I will not have you getting involved in this.\"\n\t\t\t\n\t\t\t\"If these men are dangerous, I want to know. Maybe I can help you.\"\n\t\t\t\n\t\t\t\"No! No, you can't get involved!\"\n\t\t\t*goto questions\n\t*if (unsure = \"true\") #Show her a poker chip as proof that you have business in Monaco.\n\t\tYou dab the corners of you mouth with a napkin, wiping off any food or drink, then stand up and make your way over to the little box containing the casino chips. You unlatch with a solid pop, \n\t\tthen open the lid and take out one of the clay chips, showing it from afar to Miss Lellouche. Her smile widens but she still seems unsure about you, so you walk back to the table and place \n\t\tthe chip down, then sit back in your chair to continue breakfast.\n\t\t\n\t\t\"[i]Casino Mont Royal[/i],\" she whispers quietly to herself while reading the stamped text on the chip. \"I did not know you were so influential to gain access there. You surprise me, ${name}. \n\t\tHere I am not knowing where you have come from or what you do, yet you have connections at the [i]Mont Royale[/i]\"\n\t\t\n\t\tFor the first time since you met, Evony gives you a look of fascination mixed in with a hint of admiration. That certainly is no act. You can see the sparkle in her eyes as she looks at you, \n\t\tand that cannot be faked no matter how good an actor one might be.\n\t\t*goto questions\n\t*if (tick > 2) #\"Let us finish breakfast and get going.\"\n\t\t*goto drivearound\n\n\n\n\n*label drivearound\nWith your breakfast done you pack up your belongings and make sure you have not left anything important behind. An hour after eating you are already in the black Maserati downstairs, turning the \nkey in the ignition and making the car purr with a lovely throaty noise. You pull out of the parking lot near the hotel and glance at Evony who has her eyes staring out the passenger side window, \nlooking at Rome as it passes on by.\n\nThen you're on the road heading north towards the border with France. You take solace in knowing that you are not heading home just yet - just passing through very briefly before reaching Monaco. \nHopefully that will stay that way until you have this case solved.\n\nThe bright sun is already high up in the sky by the time you reach the Italian Riviera and the French border waiting just after the beautiful small city of Ventimiglia. The woman beside you is \ntrembling, her eyes looking out through the window on her side. You can see her lips move as she shifts on her seat, and you can just about to make out what she has just whispered to herself.\n\n\"I should've ran while I had the chance...\"\n*finish Chapter 6: High Stakes\n\n\n\n\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Sophie\"\n*set surname \"Martin\"\n*set status \"Burned\"\n*set combat 30\n*set disguises 90\n*set driving 10\n*set technology 50\n*set talking 70\n*set covert 70\n*set charm 60\n*comment screenshot from Chapter 4\n\n\"Before we have any further discussion, I must ask, and forgive me for being so crude,\" Titos stops you with a few carefully crafted but forceful words. \"But how is a burned spy to pay for this \ninformation? You know my services do not come cheap, and now you do not have your country to pay on your behalf.\"\n\nTitos leans off the thick stone railing and takes a few careful slow steps along the long edge of the balcony. His hand skims along the smooth surface of the stone, his eyes constantly peering \nin your direction like those of a hungry dog looking at a bowl of food just out of reach. It is not a gaze of ravenous and violent hunger, but rather a look of deep desire for something that \nhas been promised.\n\nYou have very little as far as possessions go, especially when it comes to wealth. You could give Metaxas the gold bullion coins worth several thousand francs, but that would be pocket money \ncompared to the usual ransoms paid to him for good intelligence. Even in the case where you still had access to the wealth of France, coming to Titos would still be an action best done very \ninfrequently. Now of course you could pay what you can and get what you can in return, but you could also try to gain what information you can get on Lund and promise Metaxas any diamonds that \nyou can recover off the shore - if that even is how Lund gets the diamonds into the West.\n\n*fake_choice\n\t#Offer as much as you have in gold bullions and settle for what you can get.\n\t#Offer all the operational details from the anti-smuggling operation in the north and in the Crimea.\n\t#Promise him whatever diamonds you can recover from Lund's operation.\n\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Olivier\"\n*set surname \"Durand\"\n*set status \"Active\"\n*set combat 90\n*set disguises 10\n*set driving 70\n*set technology 50\n*set talking 30\n*set covert 60\n*set charm 30\n*comment screenshot from Chapter 3\n\nThe office building taken over by the border guards as a branch of their service is a largely unassuming brand new concrete box near the heart of the city. You can hear construction equipment \nmoving and squeaking in the nearby blocks, expanding the city and transforming the entire look of it into something more modern. The shiny brass plaque outside the door is marked with a big red \nstar. Right inside the door, the offices of the border guards are marked with a single name: Speransky.\n\nStrangely enough even though you are on the run from them, you end up walking directly into the maw of the KGB so that you can escape them.\n\nThe irony is not lost on you as you walk past rows of tables and finally make the approach to a door with a frosted glass window on it, a plague beside the door identifying it as the border guard \noffice. You knock briskly and open the door as soon as you hear a reply from within, closing the door behind you as calmly as you can.\n\n\"Arseny Speransky?\"\n\n\"Yes?\"\n\n\"My apologies, can I borrow a match?\" you ask and make eye contact with the officer seated behind the desk.\n\n\"What kind of question...\" the officer starts, then abruptly stops and squints his eyes at you. \"Ah. I prefer a lighter.\"\n\n\"Better still,\" you say and close the distance to the table, offering a hand in greeting.\n\n\"Until they go wrong. Which one are you with then? You're not British or American. French?\"\n\n\"Doesn't matter, Speransky,\" you tell him as he reaches across the table and shakes your hand with a firm grip.\n\n\"Ah, I'll consider you French then,\" the man chuckles and pulls his hand away, sweeping a fingertip over his neat moustache. \"Let me guess, you need to get across the border. I will be honest, it \nis not a guess. It is the sole reason anyone comes to me in such a direct manner. Well, before we get to assembling any sorts of papers, let me tell you that Turkey has been sealed off meticulously on \nour side, but you can still get into Greece or Italy through Yugoslavia with fairly simple papers. I would not recommend the mountain roads from Bulgaria into Greece directly. You will not have a \npleasant time.\"\n\n*fake_choice\n\t#\"I need to get in contact with someone in Turkey. I had hoped to make into Istanbul.\"\n\t#\"What is wrong with the direct route over the mountains?\"\n\t#\"Is Yugoslavia really that safe?\"\n\t#\"Let's just get this over with.\"\n\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"François\"\n*set surname \"Gaillard\"\n*set status \"Burned\"\n*set combat 70\n*set disguises 10\n*set driving 50\n*set technology 30\n*set talking 90\n*set covert 20\n*set charm 55\n*comment screenshot from Chapter 5\n\nYou climb out of bed and rub your eyes for a moment. Your body thrums with a need to get some rest now that all that adrenaline has fully washed out of your system, but you still brave the \nsteps leading to the door of the bedroom, then into the bathroom. The shower is still running and sounds almost as if it's just falling into an empty tub, but as soon as you step into the \nbrightly lit bathroom you see Evony sitting in the bathtub right underneath the rain of water.\n\nShe's shivering violently, cradling her knees against her bare chest, her eyes staring unfocused straight ahead of her. As you walk towards her, she doesn't respond to you in any way. Not \neven an acknowledgement that you are in the same room as her. There are no words of consolation, no way of finding those elusive words that might make what she has just experienced float \naway from her mind. Violence such as that would mark her for life.\n\n\"I can still feel the blood,\" she whispers, almost too quiet for even you to hear. \"It won't come off. They can't get away with it...\"\n\n*fake_choice\n\t#Make sure the water is warm and go back to bed.\n\t#Sit on the edge of the bathtub and stay with her for a while.\n\t#Pick her up and carry her to bed.\n\n*if not(choice_is_ios_app)\n\t*script changeBackgroundColor(\"black\")\n\n*set name \"Manu\"\n*set surname \"Legrand\"\n*set status \"Active\"\n*set combat 30\n*set disguises 50\n*set driving 90\n*set technology 70\n*set talking 10\n*set covert 60\n*set charm 65\n*comment screenshot from Chapter 2\n\nThe metal fence rattles as you finally pass through a few minutes later, gaining access into the closed city. You see the shine of a light in the distance and pat your comrade on the shoulder to \nhurry him up, running with him to the large building you saw earlier with the Red Star mounted on the wall. There's no sound of shouting, so you must have gotten in without being noticed, \nbut you bring up your Welrod pistol and prepare yourself.\n\nYou see the round spot of light on the ground, swaying back and forth with the steps of what sounds like a guard guessing by the heavy steps. Both you and Remi freeze in place as the soldier \nin green stops almost right next to you, scanning the outside of the fence with his flashlight for a moment before continuing along. It's hard to see any insignia on him, but by the AK-47 \nslung over his shoulder and the silhouette of a Soviet uniform you can guess that this is an MVD soldier guarding the perimeter of Sevastopol.\n\nHe turns to look up towards where he was coming from, then where he's going, then pauses again to sweep through with his flashlight once more.\n*fake_choice\n\t#Shoot him.\n\t#Strangle him.\n\t#Try to sneak away.\n\t#Wait patiently.\n\n*if choice_is_ios_app\n\t*finish\n\n*script changeBackgroundColor(\"speia\")\n\n*set name \"Colette\"\n*set surname \"Lemaire\"\n*set status \"Active\"\n*set combat 70\n*set disguises 10\n*set driving 50\n*set technology 90\n*set talking 30\n*set covert 50\n*set charm 50\n*comment screenshot from Chapter 1\n\nThe short column of cars drives along slowly, although surprisingly enough the riders that usually accompany the cars are not there. You can feel the pounding of your heart against your chest as \nthe pressure mounts and you feel yourself become more and more scared that this is not your ambush any more, but instead a trap. The Opel comes down the road at speed, as if it's in a hurry, \nthe dust kicked up by its tires occasionally masking the truck from view. If there is an emergency, that might explain the riders being left behind as a slow hindrance.\n\nThe column doesn't show any sign of stopping beside you to check on your truck or your wellbeing. Good. Instead they rush down the road past you, kicking a cloud of dust in your face just \nbefore they reach the mine placed on the road by one of the Americans. You feel the shockwave hit your chest, but the sound of the explosion is immediately muffled by a strong ringing \nin your ears. The Americans launch into action while the Opel and the truck careen off the road in desperation to try and survive the ambush. The mine went off too soon and exploded at \nfirst contact, meaning the heart of the explosion hit the Opel's engine which blocked a majority of shrapnel.\n\nThe truck accompanying the Opel empties. A dozen men with AK-47 rifles jump out and rush to take cover, answering the Americans' fire with an onslaught of rapid-fire bursts. One by one the \nmen drop down dead, but there are still plenty of them, and they are making their way to the Opel in a chaotic formation.\n*fake_choice\n\t#Take cover and get involved in the fighting.\n\t#Take cover and let the Americans handle the fighting.\n\t#Keep watching the scene unfold.\n\n\n\n\n\n\n", "startup": "*title Diamant Rose\n*author Teo Kuusela\n*scene_list\n\tstartup\n\tdesertrats\n\tclosedcity\n\tcross\n\tburnnotice\n\t$ safehouseroma\n\t$ highstakes\n\t$ diamonds\n\t$ phoenix\n\n\n*comment // CHARACTER INFO //\n*create name \" \"\n*create surname \" \"\n*create gender \" \"\n*create status \"Active\"\n\n*create welrod 4\n*create russian false\n*create spotted false\n*create bangedupcase false\n*create guard \"alive\"\n*create payment_type \" \"\n*create mansion_invite false\n*create heelrecorder true\n*create kills 0\n\n\n*comment // PERCENTAGE STATS //\n*create disguises 250\n*create driving 0\n*create combat 0\n*create talking 0\n*create technology 0\n\n\n*comment // OPPOSED PAIRS //\n*create covert 50\n*create charm 50\n\n\n*comment // PEOPLE //\n*create sekou_killed false\n*create nasonov_wounded false\n*create nasonov_killed false\n*create evony_affair false\n*create evony_bed false\n*create ides_affair false\n*create jishkariani_ploy \" \"\n*create evony_confide false\n*create evony_killed false\n*create evony_out false\n*create evony_ko false\n*create remi_killed false\n*create remi_kneecap false\n*create nasonov_mansion false\n*create jishkariani_killed false\n*create lund_killed false\n\n\n*comment // CLUES //\n*create remi_confirmed false\n*create mercier_burn false\n*create overview_basic false\n*create overview_advanced false\n*create lady_known false\n*create evony_listened false\n*create doorcode false\n*create record_crimea false\n*create record_mercier false\n*create record_burn false\n*create record_hunter false\n*create record_worktime false\n*create weapons_found false\n\n\n*comment // ACHIEVEMENTS //\n*achievement firsttry visible 20 Filing Genius\n\tInformation screams to be discovered.\n\tYou found the documents on the first try. What luck!\n*achievement ghost visible 50 Ghost\n\tRemain unnoticed in Sevastopol.\n\tThis is why there are very few movies about French spies.\n*achievement goloud visible 50 Soviet Strength\n\tSmash through a Soviet checkpoint.\n\tThat wasn't very quiet, now was it?\n*achievement sorry visible 20 A Curious Mind\n\tCheck up on Remi.\n\tYou found Remi's body.\n*achievement safe visible 20 Better Safe Than sorry\n\tLeave while you still can.\n\tYou left Remi's without seeing what happened.\n*achievement bulgarian visible 20 Our Man in Bulgaria\n\tMake contact with an inside man.\n\tYou've been equipped with everything you need to get into Greece.\n*achievement fullstack visible 20 All Your Information Are Belong To Me\n\tMake a good deal with the Greek.\n\tTitos Metaxas has given you all the information he can.\n*achievement traitorous visible 50 Feel the Burn\n\tBecome a true traitor to France.\n\tYou spread classified information and committed high treason.\n*achievement smersh visible 100 One-man SMERSH\n\tTake care of a Soviet agent.\n\tThe KGB will no longer be chasing after you, although you might end up on the naughty list.\n*achievement vespa visible 20 Roman Holiday\n\tYou never know who you might meet in Rome.\n\tYou began an affair with Evony Lellouche in Rome.\n*achievement consent visible 20 Keep it Classy\n\tSilence does not consent give.\n\tYou chose to not to take advantage of Evony Lellouche.\n*achievement ruthless visible 20 Ruthless\n\tTake care of a sudden inconvenience.\n\tYou decided to kill Evony Lellouche.\n*achievement lover visible 20 From France With Love\n\tHave a woman close to your targets fall for you.\n\tYou convinced Evony Lellouche to abandon her relationship in favour of yourself.\n*achievement ideslove visible 20 The Spy Who Loved Me\n\tHave Scorpio fall for you.\n\tYou began an affair with Brandon Ides in Monaco.\n*achievement judo visible 50 Judo Chop!\n\tTake him down, baby!\n\tThat really hurt! Honestly!\n*achievement maximal visible 100 Honour to the Service\n\tReturn to France with a fully detailed debrief.\n\tYou've cracked the case and earned back your place in France.\n*achievement dishonour visible 100 Traitor to France\n\tFail to prove yourself to those who once hired you.\n\tAt the end of your journey, you were still considered a traitor.\n*achievement favours visible 100 Agent Retraité\n\tThere by the grace of Ides go you.\n\tYou have a new identity far away from the spy game.\n*achievement circle visible 100 Full Circle\n\tGet involved in the early steps of a bloody future conflict.\n\tYou accepted Brandon's offer and continued in the spy game, this time in Vietnam.\n\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tDiamonds are pouring out through the Iron Curtain, but somebody talked - your entire spy ring is either dead or disavowed. Everything ties back to what happened a decade prior in Africa, and you have to find out where it ends. The mission isn't over.\n\n\t[i]Diamant Rose[/i] is a 87,000 word interactive cold war novel by Teo Kuusela, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\t• Experience an exciting romp through the deadly world of espionage![n/]\n\t• Play the part of a French intelligence agent.[n/]\n\t• Evade enemies, find old friends, manipulate those closest to your targets.[n/]\n\t• Shut down a major operation funnelling Soviet diamonds past the Iron Curtain.[n/]\n\t• Will you focus on revenge, or redemption? Your future depends on your actions.\n\n\t*if choice_prerelease\n\t\t[i]You can play the first four chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n\t\t*choice\n\t\t\t#Sign up to be notified when the game is available.\n\t\t\t\t*subscribe {\"now\": true}\n\t\t\t\t*restart\n\t\t\t#Play the first four chapters now for free.\n\t\t\t\t*goto purchased\n\n\t[i]You can play the first four chapters of the game for free. Purchase the rest of the game below.[/i]\n\t*if choice_is_advertising_supported\n\t\t[i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n\t*purchase_discount adfree 2017-08-17 $3.99 $2.99 purchased\n\t*if choice_is_advertising_supported\n\t\t*page_break_advertisement\n\t*if not(choice_is_advertising_supported)\n\t\t*page_break Play Now for Free\n\n\n*label purchased\n\nIn the world of espionage there are no written rules, or books on procedure. There is no training that will prepare you for the harsh reality waiting out there in a world divided by an Iron \nCurtain. If you are found out, someone will come for you sooner or later. There is little room for empathy and friendships in a life that will constantly tear you away and endanger those who \nstay around an agent for long enough.\n\nHowever, there are some unwritten rules that all spies know by heart, whether by hearing about them or by learning them out on the field. These have become known as [i]the Moscow rules[/i]:\n\n[i]- Assume nothing.[/i]\n*line_break\n[i]- Never go against your gut.[/i]\n*line_break\n[i]- Everyone is potentially under opposition control.[/i]\n*line_break\n[i]- Do not look back; you are never completely alone.[/i]\n*line_break\n[i]- Go with the flow, blend in.[/i]\n*line_break\n[i]- Vary your pattern and stay within your cover.[/i]\n*line_break\n[i]- Lull them into a sense of complacency.[/i]\n*line_break\n[i]- Do not harass the opposition.[/i]\n*line_break\n[i]- Pick the time and place for action.[/i]\n*line_break\n[i]- Keep your options open.[/i]\n\n*finish Chapter 1: Rats in the Desert\n"}};
