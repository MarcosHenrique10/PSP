he might hold about Soviet \ninvolvement. You shake your head. Brandon slowly raises his pistol and aims it at the suffering man.\n*fake_choice\n\t#Let him go ahead with this.\n\t#Stop him and do it yourself.\n\t\t*set kills +1\n\t\t*set sekou_killed true\n\t\tWith a quick motion you place a hand on Brandon's arm, pushing it back down while you raise your own pistol. He looks at you and lifts an eyebrow, then shrugs as he lets you take \n\t\tcareful aim. \nThere's a loud bang, the man in the car slumps down with a clear hole in between his eyes. You hear the snap of the trigger as it is released and then pulled again. Another bang, another hole. \nIt's gruesome, but you have seen worse - in pictures.\n\n\"And so the head of the snake has been cut,\" you ponder out loud and see your American fellow shake his head. \"This won't solve the issue of Soviet gems flooding into the region.\"\n\n\"No, but now it needs a new place to go. A place that is not going to destabilize Liberia,\" the agent beside you says calmly. \"It will take months to find the next candidates for such \nsupport.\"\n\n\"In the meanwhile the groups and tribes that have already been equipped will use the weapons for their own gain. They will be aimless without anyone to lead them to Liberia.\"\n\n\"I would bet high stakes on those tribes turning against one another now. The equipment will not be a problem for much longer,\" Brandon says and turns away from the car. \"Thank you for \nyour help out here. You made it possible to make this entire affair quick and painless. I'll be telling my superiors exactly that and recommend that they send our thanks to your superiors.\"\n\n\"I appreciate the gesture,\" you tell the American agent with a smirk and take a step closer to the car, opening the door and leaning in to recover a briefcase that looks very beat up and \nhas a couple of bullet holes in it. \"However, if you aim to secure me a promotion, I think whatever is in this briefcase will do a far better job than anything you put on record.\"\n*finish Chapter 2: Closed City\n\n\n", "diamonds": "*comment 17197\n\n*temp caught_snoop true\n*temp tick 0\n*temp tock 0\n*temp lund_met false\n*temp wounded false\n*temp helper \" \"\n*temp runner \" \"\n*temp radiocostume false\n\n\n*if (evony_out)\n\t*set helper \"Kalliope\"\n\t*goto invitations\n*else\n\t*set helper \"Evony\"\n\t*goto invitations\n\n\t\n*label invitations\n*if (mansion_invite)\n\t*goto invitestyling\n*else\n\t*goto caughtstyling\n\n\n*label invitestyling\nJishkariani's yacht is just about as fancy as you imagined when looking at it from afar. Your host has been most friendly in inviting you to join him for the cruise to Majorca, avoiding you any \nfurther inconvenience of getting your own boat, or flying, or anything else like that. You're sipping champagne and watching the ocean go by from the top deck, a pair of scantily clad young women \nsunbathing nearby with Jishkariani ogling them from inside. \n*if (evony_out = \"false\")\n\tEvony was there for a moment, but has now left to hide somewhere inside. She is wearing a blinding white summer dress, and you cannot blame her for retreating from the wind when you saw how \n\tthe gusts pick up on the light fabric.\n\t*goto floatin\n*else\n\tJishkariani was furious when you left Monaco, fuming over Evony's sudden disappearance. Apparently the guards had been out looking for her, to no avail, and her place had been taken by the \n\tredhead from the casino. Now as you enjoy a voyage on the yacht, you finally manage proper introductions and get to know the woman a little better. It appears that Kalliope Raptis is quite \n\tthe charmer who has sailed from Greece to the Rivieras seeking to launch a career in singing or entertainment. It's quite impossible to tell whether that is true and she has simply been co-opted \n\tinto the spy game, or if it's all an extensive cover. No matter which it is, she is playing her part perfectly.\n\t*goto floatin\n\n\n*label floatin\n\nThere are far fewer guards inside than you at first thought, although there are plenty of them patrolling the deck area. With a suitable window and the whole yacht used to you being there already, \nyou might be able to try and find where they hold the diamonds after picking them up. Or perhaps you could take a look at the dinghy and see if the divers have lost any piece of their treasure while \nloading and offloading.\n\n*choice\n\t#Stay where you are and enjoy the trip.\n\t\t*set charm +5\n\t\t*set covert +5\n\t\tYour target lies ahead at the mansion. That is where, if anywhere, you can find concrete evidence of the smuggling operations and find a solid link to Ingemar Lund. While the yacht might \n\t\thold secrets as to how the smuggling is conducted, the end result will still be the same, and all you will achieve by snooping around is lose what favour you have gained from Jishkariani \n\t\tand his people.\n\t\t\n\t\tSo you stay up on deck and enjoy the sun, enjoy the bubbly drink, and watch the horizon for the first appearance of Majorca.\n\t\t*goto majorca\n\t#Go snooping around the stern.\n\t\t*set charm +5\n\t\t*set covert -5\n\t\tYou place your glass down on one of the small tables on deck after emptying it and walk inside. You give Jishkariani a quiet compliment over the ship and then venture off down the stairs \n\t\tto the middle deck. The couple of guards who are there turn to see you as you walk down with as confident of a swagger as you can muster.\n\t\t\n\t\t\"Good day,\" you say and nod to them, walking past them to the stern where the dinghy is. \"Is that a Mercury back there? Do you mind if I go see it, I've been thinking of getting one for myself.\"\n\t\t\n\t\tThe guards shrug and you take that as a sign that they either don't care about who goes near the dinghy, or just don't care about you that much. In any case, you walk back outside and can \n\t\thear the giggles from the deck above you. Apparently Jishkariani has joined them outside in the sun now that you are not there. Meanwhile you make your way to the raised dinghy and slide \n\t\ta hand along the rubbery surface of the inflatable boat. The bottom of it is smooth with no crevice to hide the kind of diamonds that have been coming out of the Soviet Union. They would \n\t\thave to be tiny in order to get caught anywhere in there.\n\t\t\n\t\tThere's nothing around here. Even the diving gear is holed up somewhere else. For now you'll just have to go back up and enjoy the trip.\n\t\t*goto majorca\n\t#Go snooping below decks and try to find the diamond haul.\n\t\t*set covert -5\n\t\tYou're working with the assumption that the yacht has not been to Majorca yet, and so has to be still full of diamonds from the last drop off the coast of Greece. Of course they could have \n\t\tbeen offloaded somewhere else, but you honestly don't think Jishkariani would leave those diamonds off his direct supervision for long. Even if he isn't on yacht and the diamonds are, it \n\t\tis a floating bank vault, and if your instincts are right Jishkariani will be there to personally count the diamond haul at the end of the journey.\n\t\t\n\t\tYou place your glass down on one of the small tables on deck after emptying it and walk inside. You give Jishkariani a quiet compliment over the ship and then venture off down the stairs \n\t\tto the middle deck. The couple of guards who are there turn to see you as you walk down with as confident of a swagger as you can muster. With a nod you turn to walk down towards the bow \n\t\tof the ship - where the cabins are - which shouldn't alarm them to anything.\n\t\t*page_break\n\t\t*if (evony_out)\n\t\t\tThere's nobody in the cabins that you know of, which gives you some security to just move as you will and have a look around. For the most part at least. One of the doors is not like \n\t\t\tthe others, leading to some kind of maintenance room, so obviously you take the time to try the handle. It's unlocked and leads to a small closet with metal shelves on all three open \n\t\t\twalls, with a hatch on the floor.\n\t\t\t\n\t\t\tYou peek back to the hallway and the sitting room where the guards are hanging out, just to make sure they aren't peering after you. Then you slip into this small room and close the \n\t\t\tdoor behind you. The hatch is the next obstacle, so you turn the wheel on it to unlock it, then give it a solid tug to swing it open.\n\t\t\t\n\t\t\tAs you descend the ladder heading down, you see this lowest deck is divided into bulkheads. It'll be nigh impossible to open those heavy doors without making noise, and disguising \n\t\t\tyourself right now is highly inconvenient. You're on a yacht, someone will see you sooner rather than later, and any hidden bodies will have that very same fate.\n\t\t\t\n\t\t\tThe floor is made out of grates, which makes it possible to slip underneath amongst the pipes, but that will not allow you to move past bulkheads - what kind of a bulkhead would \n\t\t\tit be if there was a huge hole for you to go through.\n\t\t\t\n\t\t\tHowever, you do take a few hesitant steps along the section you descended into, and lo and behold you see something sparkling underneath the metal grates. You crouch down and lift \n\t\t\tthe grate up just a little bit so you can stick your hand in there, picking up a small diamond off one of the thick pipes running underneath the walkway. Without much time to \n\t\t\tspend under the main portion of the yacht, you slide the grate back and hurry back towards the ladder, climbing up. As soon as your head sticks out of the hole in the floor, you \n\t\t\tnotice that the two guards are there already waiting for you.\n\t\t\t\n\t\t\tOne of them shakes their head at you, while the other stomps directly on your face. Everything goes dark as your hold slips and you smash back down to the floor below.\n\t\t\t*goto caughtstyling\n\t\t*else\n\t\t\tThe only person in the cabins should be Evony, so you can't move around completely freely. You try and be quiet about it as you walk along the hall and study the doors. One of them stands \n\t\t\tout from the others, since it is some kind of a maintenance room. There's no other way down, so this has to hide the access further below, but before you can even try the doorhandle you \n\t\t\thear one of the other doors open. Suddenly you find yourself standing face-to-face with Evony.\n\t\t\t\n\t\t\t\"What are you doing down here?\"\n\t\t\t*choice\n\t\t\t\t#\"I was looking for you.\"\n\t\t\t\t\tEvony blinks a couple of times, glances at the maintenance door, then turns to look down the hall towards where the guards are. She swallows loudly, then reaches out and pulls you \n\t\t\t\t\ttowards her door. \n\t\t\t\t\t*if (evony_affair)\n\t\t\t\t\t\tHer lips meet yours in a hungry kiss, her hands pressing on your shoulders. She takes in a sniffling breath and pushes herself against you forcefully, almost as if she's taking \n\t\t\t\t\t\tsome kind of misguided solace in feeling you pressed against her.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"This is crazy,\" she whispers from the corner of her mouth, eager to keep her lips on yours. \"Vepkhia is right above us. His people are everywhere.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tEven so, she pulls you along with her into her cabin and pulls the door shut behind you, leading you in. Well, you failed in taking a look down below, but this is one way to \n\t\t\t\t\t\tspend the time too. As you roll onto the bed you notice that there is a picture frame turned picture-side down on the nightstand, a tissue right beside it.\n\t\t\t\t\t\t*goto majorca\n\t\t\t\t\t*else\n\t\t\t\t\t\tHer grip is surprisingly strong around your arm, although not tight enough for you not to pull your arm away if you really wanted to get away.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"What do you want with me?\" she hisses at you quietly. \"Ever since Rome you haven't brought me anything but trouble.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou can see her eyes are red, as if she has been crying recently.\n\t\t\t\t\t\t\n\t\t\t\t\t\tShe suddenly pushes you back from the door and shakes her head at you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"You're just like the rest of them. You'll fit right in at the mansion, I'm sure. Go back upstairs. Go!\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tFor a moment she just stares at you, showing you the stairs leading back up to the top deck. You hear the guards nearby shuffling, probably responding to Evony raising her \n\t\t\t\t\t\tvoice at you. With hands raised you're forced to back away. You've definitely lost the possibility of sneaking down below, that's for sure. So you make your way back up to \n\t\t\t\t\t\tthe deck.\n\t\t\t\t\t\t*goto majorca\n\t\t\t\t#\"Nothing, just roaming the yacht.\"\n\t\t\t\t\tEvony blinks a couple of times, glances at the maintenance door, then turns to look down the hall towards where the guards are. She swallows loudly, then reaches out and pulls you \n\t\t\t\t\ttowards her door. Her grip is surprisingly strong around your arm, although not tight enough for you not to pull your arm away if you really wanted to get away.\n\t\t\t\t\t\n\t\t\t\t\t\"Don't treat me like and idiot,\" she hisses at you, then glances back at the maintenance door. \"You don't want to go in there. Go back upstairs and have another drink while you \n\t\t\t\t\tstill can.\"\n\t\t\t\t\t\n\t\t\t\t\tShe looks into your eyes for a moment, her brow furrowing as she examines you closely. For a moment you think she might tell on you, but instead she just closes her cabin door and \n\t\t\t\t\ttakes your hand more gently, guiding you towards the stairs personally.\n\t\t\t\t\t*goto majorca\n\t\t\t\t#\"I was looking for a way to the maintenance deck.\"\n\t\t\t\t\tYou tell the truth, although it is a mere whisper since you don't want the guards to hear you say that. Evony blinks a couple of times, glances at the maintenance door, then \n\t\t\t\t\tturns to look down the hall towards where the guards are. She swallows loudly, then reaches out and pulls you towards her door.\n\t\t\t\t\t\n\t\t\t\t\t\"There are a lot of guards down there,\" she tells you in a whisper. \"You don't want to go down there. They [i]will[/i] spot you.\"\n\t\t\t\t\t\n\t\t\t\t\tShe looks into your eyes for a moment, her brow furrowing as she examines you closely. For a moment you think she might tell on you, but she slowly leans to your ear and kisses \n\t\t\t\t\tyour cheek.\n\t\t\t\t\t\n\t\t\t\t\t\"So I was right about you,\" she whispers, then takes your hand and starts pulling you back towards the stairs leading to the top deck. \"Come, it's safer to stay up above.\"\n\t\t\t\t\t*goto majorca\n\n\n\n*label majorca\n*page_break\nMajorca appears as a small dot in the horizon at first, then grows and grows into a large green Mediterranean island. Instead of heading for any of the lovely port towns or the city of Palma, the yacht \nrounds the island into a peaceful little cove on the smaller island of Sa Dragonera to dock with a quaint wooden pier. Jishkariani's mansion is large, dominating the top of the rocky cliff that stands \nout on the north-eastern tip of the island. Its luxurious painted granite façade and large windows fit the cliffs beautifully, and the architecture seems to flow directly from the nature in a strange \nultramodern style that hardly fits the era of concrete and glass.\n\nYou get off the yacht with Jishkariani's entourage and walk up a set of large stone steps that lead all the way up to what look like back doors that make most front doors envious. There are already \na few people outside enjoying the hot sun, all of them looking distinctly Scandinavian with their light skins and blonde hairs. It's to the point where you believe these to be someone's carefully \ncrafted stereotype of who you might see and meet in a place like Sweden.\n\nJishkariani pauses to greet the people he seems to know well, and you move to shake their hands quickly before you are ushered inside to enjoy refreshments. However you divert from the guards leading \nthe way, asking for them to point you towards a bathroom. You walk off just in time to see another group of guards hauling a set of heavy black bags towards an elevator. \n*if (doorcode)\n\tThat has to be the elevator Evony mentioned to you, leading down to the hidden away basement where the smuggled goods must be stored. \nThe doors open after the guards insert a code of some kind on a keypad attached to the wall beside the doors. They walk inside, bags still closely guarded, then the doors close and the elevator start \nheading down.\n\nYou take a moment to look around. You have a few options available to you: you can either skip the party entirely and go snooping around right away, you can take the lay of the land and wait until \nthe party before you sneak off to do some proper snooping around, or you can see what the party holds for you. \n*if (evony_out)\n\tAs you're standing there, trying to make up your mind, you see the redhead, Kalliope, walk inside and come straight to you. She glances around and makes sure there isn't anyone around to hear \n\tyou talking.\n\t\n\t\"If you need to start rummaging around, I can try to keep everyone busy during the party, but I can't make miracles happen,\" she whispers to you. \"If something really bad happens, I can defend \n\tmyself and provide you cover, but only if you're confident we can get away with this. It's a big house, lots of guards. Can we make it if things turn nasty?\"\n\t\n\t*choice\n\t\t#\"Yes, I think we can. If you have my back, I have yours.\"\n\t\t\t\"I'll have your back,\" she tells you and then swallows hard. \"I just hope we can keep this quiet for as long as necessary.\"\n\t\t\t\n\t\t\tThen without further ado she walks away from you, flashing a wide smile towards Jishkariani still talking outside as she passes the open doors, heading towards the bar to fetch some \n\t\t\tdrinks.\n\t\t\t*goto gopop\n\t\t#\"No, maybe not. But we can make enough noise for Ides to come in hard after us.\"\n\t\t\t\"If things turn nasty, I hope so,\" she tells you and then swallows hard. \"I hope you know that Ides won't be able to mount a rescue unless we are absolutely sure that all the proof \n\t\t\tof this smuggling ring is in here.\"\n\t\t\t\n\t\t\tThen without further ado she walks away from you, flashing a wide smile towards Jishkariani still talking outside as she passes the open doors, heading towards the bar to fetch some \n\t\t\tdrinks.\n\t\t\t*goto gopop\n\t\t#\"No, if that happens you should stay back. If I'm lost, you can still get close to the operation and turn over the whole organization.\"\n\t\t\t\"Fine,\" she tells you and then swallows hard. \"I'm ready for it, I just hope you can keep things quiet.\"\n\t\t\t\n\t\t\tThen without further ado she walks away from you, flashing a wide smile towards Jishkariani still talking outside as she passes the open doors, heading towards the bar to fetch some \n\t\t\tdrinks.\n\t\t\t*goto gopop\n*else\n\t*goto gopop\n\n*label gopop\n*choice\n\t#Head upstairs. There may be an office I can rummage through.\n\t\t*set lund_met true\n\t\t*set charm -5\n\t\t*set covert +5\n\t\tYou look around to see if anyone is watching, then cross the hall to the staircase leading up to the second floor. The staircase winds up to a richly furnished sitting room that precedes \n\t\tseveral hallways cutting deeper into the building. A large balcony opens up one one side, separated from the sitting area with a row of beautiful French windows. The stairs lead further up \n\t\tto a smaller third floor, which has to be the private rooms belonging to Jishkariani - you doubt he would settle for anything less.\n\t\t\n\t\tSo you climb further up, making sure there are no guards stationed at the doors by peeking around the railings as best you can. The stairs climb straight through the floor of the third floor, \n\t\tleading up into a luxurious lounge with a large bar and French windows leading out to the roof of the mansion. Open doorways lead into what look like an office and a bedroom.\n\t\t\n\t\t\"Good day, Agent ${surname},\" you hear a wispy older man's voice tell you. \n\t\t*if (covert >= 60)\n\t\t\t\"You know, I had nearly forgotten of your existence. You walk as a ghost might, largely unnoticed and leaving little trace. It takes a very sharp eyes to see you. Fortunately I have such \n\t\t\tsharp eyes on my payroll.\"\n\t\t\t*goto ruptusinter\n\t\t*elseif ((covert > 40) and (covert \u003c 60))\n\t\t\t\"You are quite the efficient spy, aren't you. It took a sharp eye to identify you. Fortunately I have such sharp eyes on my payroll.\"\n\t\t\t*goto ruptusinter\n\t\t*else\n\t\t\t\"You enjoy being seen, I take it? You do tend to leave a trail and seem to enjoy announcing yourself to the world. I am surprised Vepkhia did not take notice and become suspicious of you.\"\n\t\t\t*goto ruptusinter\n\t#I need to get in the elevator.\n\t\t*set charm -5\n\t\t*set covert -5\n\t\tYou look around to see if anyone is watching, then cross the hall to the elevator doors. The keypad juts out of the wall with little indication as to which are the correct buttons to press, \n\t\tand the doors themselves are sealed shut. If you want to get inside, you will need to catch it when a guard is just entering, or get a passcode. \n\t\t*if (doorcode)\n\t\t\tFortunately for you, Evony was kind enough to give you the code, assuming that the code hasn't been changed since the last time she had the opportunity to learn it.\n\t\t\n\t\tThe sound of laughter is heading your way, forcing you to quit your investigation straight off the bat for now. You walk hastily some ways from the elevator doors, pretending to be looking \n\t\tat one of the paintings hung on the wall. Jishkariani finally walks inside the mansion, leaving the guests still sunbathing outside. When he sees you admiring the painting he throws his \n\t\tarms wide open and lets out a roar of laughter.\n\t\t\n\t\t\"Ha, my friend! You like my paintings?\" he asks, then continues before you can answer. \"It is not for sale, I'm afraid. You will not believe what I had to go through to purchase that beauty.\"\n\t\t\n\t\t*if (charm > 55)\n\t\t\t\"It's a Dali, isn't it?\" you ask, hoping you aren't completely lost when it comes to the art scene.\n\t\t\t\n\t\t\t\"Ah, you know your painters. you truly must be French. Yes, it's a Dali that an acquaintance of mine commissioned for his wife. Turns out, she was not very fond of surrealist art and had to \n\t\t\tget rid of it without him knowing, so we played for it. Nearly lost my yacht, had it not been for a very lucky ace! Now come, the guests should be arriving soon. Let us get a drink!\"\n\t\t\t*goto partyhours\n\t\t*else\n\t\t\t\"It is very... nice,\" you tell him, trying to make heads or tails from the surrealist piece in front of your eyes.\n\t\t\t\n\t\t\t\"Ha, it is not often that France produces someone who cannot abide by art to its fullest merit. No matter! There is plenty else to enjoy here. Come, the guests should be arriving soon. Let us get a \n\t\t\tdrink!\"\n\t\t\t*goto partyhours\n\t#I'll wait until the party before taking a closer look.\n\t\t*set charm +5\n\t\t*set covert -5\n\t\t*goto partyinterruptus\n\t#Maybe the party is my best option and someone will provide me with information.\n\t\t*set charm +5\n\t\t*set covert +5\n\t\t*goto partyinterruptus\n\n\n*label ruptusinter\nYou stand straight and turn to see a grey-haired man sitting in the lounge, directly behind your back as you came up the stairs. He folds a Finnish newspaper very neatly in twain, then reaches up to \nremove his thick-rimmed glasses from his face. Ingemar Lund.\n\n\"What gives me the honour of meeting you again, hmm?\" he asks you with a knowing smile. \"You were not satisfied with dismantling my operations in the north? You should have. Or at the very least, \nyou should have taken the opportunity to enjoy a few drinks before it came to this. You spies never take the time to enjoy the little things, always rushing headlong into everything.\"\n\nYou hear the thwip of pressurized air rushing through a small pipe and feel a prick in your neck. As your vision becomes blurry you turn to see a figure standing at the doorway to the office. \nAlthough your eyes try their best to focus on whoever this is, the blurriness overtakes you faster than you can fight it back. Suddenly you feel faint and find yourself on your back lying on \nthe floor as everything goes dark.\n*page_break\n*goto caughtstyling\n\n\n*label partyhours\n*page_break\n*label partyinterruptus\n*set lund_met true\nThe party is approaching steadily and you take the time to enjoy yourself in the sizeable lounge while waiting for other people to arrive. You've taken a look around the bottom floor to get your bearings, \nand have noted just how absurdly large and posh the mansion is. Some of the other guests who have turned up very early mill back and forth between the inside of the mansion and the beautiful sunny \noutside.\n\nIt is quite the posh and lavish affair. People have arrived in their finest outfits, whether that takes the form of well-tailored suits or beautiful Italian and French dresses of the latest fashion. You \nlook into the crowd and see the sparkling of gemstones everywhere. Rings, earring, necklaces, wristwatches, all of them bearing gems of some kind, diamonds being the most popular. How fitting, considering \nthe very reason why you have come here in the first place.\n\n*if (evony_out)\n\tYou watch Kalliope closely as she flits through the crowd, mingling and getting to know everyone in a fashion most unfitting to someone who works in a Casino, but very fitting for someone trying to charm \n\ttheir way into high society. Then again, you can imagine that at least half of the people present have done the very same, forming a web of deeply interconnected socialites milling around career politicians \n\tand business magnates. Her bright red hair peeks out here and there in the crowd as she moves, constantly keeping herself near enough to Jishkariani to entice him, to lure him in, and to lure in those who \n\tseem closest to him. You can do nothing but admire her relentless talent on show.\n\t\n\t*goto kalleys\n*else\n\tYou catch sight of Evony every now and again as she flits through the crowd, acting in many ways like a hostess despite this being nominally at least Jishkariani's party. \n\t*if (evony_affair)\n\t\tDuring periods where she is in full sight and the conversation roams in uninteresting directions for her, she looks your way with a thin smile. Her look is strangely cold and calculating, her smile \n\t\tnot as warm and soft as it had been before you decided to get close to Jishkariani despite her warnings. \n\t\t\n\t\t*goto kalleys\n\t*elseif (evony_bed)\n\t\tDuring periods where she is in full sight and the conversation roams in uninteresting directions for her, she looks your way with a smile. Her look is warm as she considers you, studies you from afar, \n\t\talthough her smile is not as warm and soft as it had been before you decided to get close to Jishkariani despite her warnings. \n\t\t\n\t\t*goto kalleys\n\t*else\n\t\tDuring periods where she is in full sight and the conversation roams in uninteresting directions for her, her gaze roams, sometimes landing on you but then continuing onwards. Her thin smile graces you \n\t\twith its presence whenever your eyes meet, but otherwise she pays you little mind.\n\t\t\n\t\t*goto kalleys\n\n*label kalleys\nThere's another one of those periods where you're left almost by yourself in the lounge, but unlike those other times this time you see a figure enter that you haven't seen before. He's a grey-haired, \ntall figure, his face marked with wrinkles and thick-rimmed glasses placed upon his nose. No, you have seen him before. Several times.\n\nIngemar Lund.\n\n\"Good evening, Agent ${surname}. What a pleasure to have you once more with your nose in my affairs,\" he tells you and chuckles. \n*if (covert >= 60)\n\t\"You know, I had nearly forgotten of your existence. You walk as a ghost might, largely unnoticed and leaving little trace. It takes a very sharp eyes to see you. Fortunately I have such sharp eyes \n\ton my payroll.\"\n\t*goto interruptus\n*elseif ((covert > 40) and (covert \u003c 60))\n\t\"You are quite the efficient spy, aren't you. It took a sharp eye to identify you. Fortunately I have such sharp eyes on my payroll.\"\n\t*goto interruptus\n*else\n\t\"You enjoy being seen, I take it? You do tend to leave a trail and seem to enjoy announcing yourself to the world. I am surprised Vepkhia did not take notice and become suspicious of you.\"\n\t*goto interruptus\n\n\n*label interruptus\nWith a sigh and a smack of his lips, Lund motions to the man behind the bar. You hear the thwip of pressurized air rushing through a small pipe and feel a prick in your neck. As your vision becomes \nblurry you turn to see the bartender shrugging to you, stepping back when you try and reach out to him. Although your eyes try their best to focus on anything and anyone, the blurriness overtakes \nyou faster than you can fight it back. Suddenly you feel faint and find yourself on your back lying on the floor as everything goes dark.\n*page_break\n*label caughtstyling\nA heavy whack across your face brings you back to. Your eyes lull open and focus slowly on the world around you. Time after another you blink, trying to shake the blurriness from your vision so you \ncan take in your surroundings. You're in a basement of some kind, smooth concrete walls around you. You lean your head to the side and try to count how many figures you see in the room, but suddenly \na strong grip brings you looking back straight forwards. It's Jishkariani. \n*if (gender = \"female\")\n\tHe never did seem like one to shy away from hitting a woman.\n\n\"Colour me surprised,\" he chuckles. \"I had no idea I had such a diligent agent on my tail. \n*if (lund_met)\n\tI still wouldn't, had you not meddled in the boss' affairs before. \nQuite the surprise indeed.\"\n\n*if not (lund_met)\n\tYour eyes shoot wide and you look into his eyes. The man laughs, but shows no sign as to how he could have known who you are. \nHe looms over you while studying every detail of your face, burning you into memory while you see someone emerge from behind him. \n*if (nasonov_killed)\n\tIt's not just anyone either, it's your former partner Remi Boulanger. He offers you a smirk and steps into full view, glancing down at the blood splattered on your fine shirt from the beating \n\tyou have undergone.\n\t\n\t\"Morning sleepyhead,\" he says and rubs his hands together. \"You're far too diligent. You should have taken your chance to die or disappear.\"\n\t\n\t\"I'm not one to leave things unfinished,\" you tell him and spit a blob of blood on that nice concrete floor.\n\t\n\t\"Well first time for everything, ${name},\" Remi tells you with a chuckle, then places a hand on Vepkhia's shoulder and pulls him back. \"Let me handle this, Vepkhia. You go up and tell the boss \n\tthat the new batch of diamonds are here.\"\n\t\n\tJishkariani takes in a deep breath and rubs his knuckles, then nods at Remi. With a few steps backwards, the Georgian man is at the door, then he slips out of the room to leave you and Remi alone. \n\tAt least as far as you know, since you haven't seen behind you so far. \n\t*page_break\n\tYou watch as you former partner starts walking back and forth in the room, observing you as you shuffle back and forth against the restraints holding you down to the flimsy little chair.\n\t\n\t\"You're not going to tell me you're in deep cover, are you?\" you ask, perhaps just a little hopeful that might be the case.\n\t\n\t\"It wouldn't be nice of me to lie to you in your last hours of life,\" he responds and gives you an apologetic shrug.\n\t\n\t*if (heelrecorder)\n\t\tYou click your heels together, engaging the recorder inside your shoe. You can feel the small motor start whirring inside the heel, but the noise of it is muffled and disguised perfectly by \n\t\tother ambient humming in the room.\n\t*goto confusions\n*else\n\tIt's not just anyone either, it's your former partner Remi Boulanger. He offers you a smirk and steps into full view, glancing down at the blood splattered on your fine shirt from the beating \n\tyou have undergone.\n\t\n\t\"Morning sleepyhead,\" he says and rubs his hands together. \"You're far too diligent. You should have taken your chance to die or disappear.\"\n\t\n\t\"Not for a lack of trying,\" you hear a rough voice call out and another figure walks out: Nasonov. \"Your friend here must have some very observant guardian angels.\"\n\t\n\t\"Not like the KGB to believe in angels, Valery.\" Remi says and laugh, only to receive a shrug as a response from the Russian man. \"Vepkhia, let us handle this. You go up and tell the boss that \n\tthe new batch of diamonds are here.\"\n\t\n\tJishkariani takes in a deep breath and rubs his knuckles, then nods at Remi. With a few steps backwards, the Georgian man is at the door, then slips out of the room to leave you, Remi, and Nasonov \n\tall alone for a big reunion.\n\t*page_break\n\tYou watch as you former partner starts walking back and forth in the room, observing you as you shuffle back and forth against the restraints holding you down to the \n\tflimsy little chair. Nasonov isn't so patient. He walks up to you and slams his fist right into your gut to stop you from squirming.\n\t\n\t\"You're not going to tell me you're in deep cover, are you?\" you ask from Remi, gasping for air as your lungs struggle against the shock of Nasonov's punch.\n\t\n\t\"It wouldn't be nice of me to lie to you in your last hours of life,\" he responds and gives you an apologetic shrug.\n\t\n\t*if (heelrecorder)\n\t\tYou click your heels together, engaging the recorder inside your shoe. You can feel the small motor start whirring inside the heel, but the noise of it is muffled and disguised perfectly by \n\t\tother ambient humming in the room.\n\t*goto confusions\n\n\n*label confusions\n*if ((tick > 3) and (heelrecorder = \"true\"))\n\tYou feel the spool of magnetic tape stop in your heel, having run out of recording space. You have a few of your questions recorded, so there's at least some proof of this meeting taking place, \n\tbut whether that will be enough to exonerate you with the French is a question to be asked of them personally.\n\t*goto confque\n*else\n\t*goto confque\n\n*label confque\n*hide_reuse\n*choice\n\t#\"How did you get out of Crimea?\"\n\t\t*if ((tick \u003c= 3) and (heelrecorder = \"true\"))\n\t\t\t*set record_crimea true\n\t\t*set tick +1\n\t\t\"Well that's a very boring story to tell,\" Remi answers you and sighs impatiently. \"Since I'm standing here and obviously working with the whole smuggling ring, you can probably hazard a \n\t\tguess. I walked out with fully legitimate papers. No questions asked at the border either. It's good to have friends in high places.\"\n\t\t\n\t\t*goto confusions\n\t*if (remi_confirmed = \"true\") #\"Who did I see in the bathtub?\"\n\t\t*if ((tick \u003c= 3) and (heelrecorder = \"true\"))\n\t\t\t*set record_mercier true\n\t\t*set tick +1\n\t\t\"Hmm? Oh, that was Mercier,\" Remi enlightens you. \"Everything did happen as I told you, except that the car crash was planted in the papers. Mercier was getting too close.\"\n\t\t\n\t\t\"Why did you want me to see that? Why ask me to come to the hotel?\"\n\t\t\n\t\t\"You weren't supposed to get out alive, to be perfectly honest,\" Remi tells you and shrugs again. \"The Soviets were supposed to kill you before you could get out of Crimea, but nobody knows \n\t\twhat happened with that. \"\n\t\t\n\t\t*goto confusions\n\t#\"What happened with the burn notices? How did you manage that?\"\n\t\t*if ((tick \u003c= 3) and (heelrecorder = \"true\"))\n\t\t\t*set record_burn true\n\t\t*set tick +1\n\t\t\"I sent out a general distress call to Istanbul. The Soviets were kind enough to dangle some false reports past listening stations, so it wasn't hard to convince both France and the Brits \n\t\tthat everything had gone south and nobody could be trusted. Everyone involved except me were new to the region, and with Mercier dead it seemed like our ring had been uncovered by someone \n\t\tnew,\" Remi says and smirks. \"Honestly, I'm surprised they burned you as easily as they did. Especially after what happened in the north.\"\n\t\t\n\t\t*goto confusions\n\t#\"Why was Nasonov sent after me?\"\n\t\t*if ((tick \u003c= 3) and (heelrecorder = \"true\"))\n\t\t\t*set record_hunter true\n\t\t*set tick +1\n\t\t\"Isn't it obvious?\" Remi laughs. \"You were a loose end holding far too much information. You had to be taken care of before you could report home. Even if you were burned, we couldn't take \n\t\tthe chance that someone somewhere would take you seriously.\"\n\t\t\n\t\t*goto confusions\n\t#\"How long have you been working with Jishkariani?\"\n\t\t*if ((tick \u003c= 3) and (heelrecorder = \"true\"))\n\t\t\t*set record_worktime true\n\t\t*set tick +1\n\t\t\"I don't work for Jishkariani. I work for Lund, and get paid very handsomely for it,\" Remi tells you and leans a little closer to you. \"When I'm done using France to misdirect everyone about \n\t\tLund's smuggling operations, I'll have a mansion just like this one waiting for me.\"\n\t\t\n\t\t\"Mansion? I see concrete and nothing but.\"\n\t\t\n\t\t\"Ha ha. Funny guy.\"\n\t\t\n\t\t*goto confusions\n\t*if (nasonov_killed = \"false\") #\"What about you, Nasonov? What are you getting out of this?\"\n\t\t*set tick +1\n\t\tNasonov's answer is a solid punch to your gut.\n\t\t\n\t\t\"Sorry,\" Remi apologizes with a laugh. \"He doesn't like talking.\"\n\t\t\n\t\t*goto confusions\n\t#\"Let's get this over with. Torture me if you must\"\n\t\t*goto breakout\n\n\n\n*label breakout\nIt doesn't seem like Remi is very enthused about torturing you for information. In fact it almost seems like he is pondering what your steps have been to get where you are now, and how you could have \nachieved it all. Since you are burned it is unlikely that you have contacted anyone who would consider your information with credibility. So, the likelihood of you holding any important information is \nslim at best, which in turn means that torturing you would be largely unnecessary.\n\nHe sniffs as he clears a nostril, then walks towards something behind you. You can hear him doing something behind your back, most likely trying to pick an object to use on you guessing by the clattering \nsound. \n*if not (nasonov_killed)\n\tYour Soviet friend on the other hand just stands there, glaring at you. You've slipped through his fingers enough times for him to be furious at you, and you don't doubt that he would enjoy making \n\tyour death very slow indeed. \nSuddenly there's a buzzer sound from the door. Remi sighs and walks past you, heading for the door.\n\n\"Don't go anywhere,\" he tells you and gives a little wink before opening the door.\n\n*if not (nasonov_killed)\n\tNasonov walks after him, giving you a quick glare before he too walks out. \nJust before the door closes you hear another door open and then shut, meaning that the buzzer must have called Remi further away than just whatever lies beyond the first door. However, this gives you \nplenty of time to try and get out of the ropes, so you start wiggling again. \n*if (evony_out)\n\tA hand slips through the crack of the door just before it closes fully, then pulls the door back open. You see Kalliope walk in, rushing to you as quickly as she can in her fine dress and heels.\n\t\n\t\"What the hell are you doing here?\" you murmur, still trying to wiggle out of the ropes.\n\t\n\t\"I could ask you the same question. You're supposed to be finding proof, not enjoying a bit of ropeplay,\" she whispers with a light giggle, then starts to untie you. \"We don't have long, so here. \n\tTake this and make the best use of it. I have to get back to the party before they notice I'm gone.\"\n\t\n\tYou feel the ropes loosen around your hands, then something being placed into your right hand. You can feel the familiar grip of a pistol in your hand, although the balance instantly tells you \n\tthat the barrel has been extended, probably with a suppressor. You pull the slide back and slide a finger along the side until you feel the breech, making sure there is a cartridge in there. \n\tThen you let the slide snap back before that cartridge gets ejected.\n\t\n\t\"How did you even get here?\"\n\t\n\t\"Don't ask,\" she tells you with a tone of voice confirming that she had to use her body as a tool of the trade. \"Just get our of here and find what we need.\"\n\t\n\tAfter making sure that the ropes are loose enough for you to manoeuvre without issue, she stands back up and rushes out the door. Just in time too, since not even a minute afterwards the door \n\topens again, Remi walking towards you with a fury in his eyes. He has to be thinking that something is up. \n\t*if not (nasonov_killed)\n\t\tSurprisingly enough, you don't see Nasonov with him.\n\t\n\t*choice\n\t\t#Shoot him dead.\n\t\t\t*set remi_killed true\n\t\t\t*set kills +1\n\t\t\tHe can see your shoulders shift and a smug smile marks his face, clearly still thinking that you're bound and struggling against the ropes. However, when he is suddenly faced with the \n\t\t\tbarrel of a gun, that smug smile disappears instantly. There is no hesitation. You squeeze the trigger. \n\t\t\t*if ((combat = 90) or ((combat > 50) and (charm \u003c 45)))\n\t\t\t\tThere's just a single shot that rings in the room, combined with the metallic clack of the slide being thrown back by recoil. Remi's face distorts as your well-placed shot pierces his \n\t\t\t\teye and keeps going, shredding through his brain before punching through the back of his skull. The wall next to the door is now freshly painted in a deep red.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t\t*elseif (combat >= 50)\n\t\t\t\tThere's a rapid pair of shots that rings in the room, combined with the metallic clack of the slide being thrown back by recoil. Remi's face distorts as your shot pierces first through \n\t\t\t\this chest, bouncing off a rib before ripping through a lung, then continuing through his back. The second shot smashes through his jaw and into his brain before punching through the \n\t\t\t\tback of his skull. The wall next to the door is now freshly painted in a deep red.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t\t*else\n\t\t\t\tYou let loose with as many shots as it takes. Two of them punch into his chest, another clean through his throat, then another hits his jaw and punches through, lodging itself somewhere \n\t\t\t\tinside his skull since it never comes out. The wet bloody gurgling coming through the hole in his throat is horrendous, and Remi's look of surprise and anguish distort his face into \n\t\t\t\tsomething that will haunt your dreams for years to come. Finally you take in a deep breath and put him out of his misery with another shot through his head. The wall next to the door \n\t\t\t\tis now freshly painted in a deep red.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t#Shoot him in the knee.\n\t\t\t*set remi_kneecap true\n\t\t\tHe can see your shoulders shift and a smug smile marks his face, clearly still thinking that you're bound and struggling against the ropes. However, when he is suddenly faced with the \n\t\t\tbarrel of a gun, that smug smile disappears instantly. There is no hesitation. You squeeze the trigger. There's just a single shot that rings in the room, combined with the metallic clack \n\t\t\tof the slide being thrown back by recoil. \n\t\t\t*if (combat >= 50)\n\t\t\t\tRemi yelps in pain as his kneecap shatters and the leg buckles under him. The man falls to the floor and cries out in pain.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t\t*else\n\t\t\t\tTemi yelps in pain as the bullet punches against his kneecap and then tears its way out some ways up his thigh. The man falls to the floor and cries out in pain.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t#Threaten him with the pistol.\n\t\t\tYou stand up from the chair and start moving around the room. Remi's eyes are focus on your pistol, his mind racing to figure out how the hell you got it.\n\t\t\t\n\t\t\t\"Take your gun and drop it on the floor,\" you order him, and with a smirk he does so.\n\t\t\t\n\t\t\t\"What are you doing? You're not getting out of here, and you won't shoot me,\" he tells you confidently, to which you reply by shooting just over his head, startling him into walking \n\t\t\tcloser to the chair.\n\t\t\t\n\t\t\t\"Get in the chair.\"\n\t\t\t\n\t\t\tHe sits down and gives you plenty of space for you to shift over and grab his gun for yourself. Slowly you make your way out towards the door, then nudge it open with your back, glancing \n\t\t\taround to see a small observation room on the other side of it. There are a couple of chairs and a heavy looking table that you can use to block the door. Perfect. Remi is still sitting \n\t\t\tin the chair.\n\t\t\t\n\t\t\t*goto aftershot\n*else\n\tA hand slips through the crack of the door just before it closes fully, then pulls the door back open. You see Evony walk in, rushing to you as quickly as she can in her fine dress and heels.\n\t\n\t\"What the hell are you doing here?\" you murmur, still trying to wiggle out of the ropes.\n\t\n\t\"I could ask you the same question. I had a feeling you were in trouble, and it seems I was right,\" she whispers with a frown, then starts to untie you. \"We don't have long. Take this, you'll \n\tprobably need it to get out of here. \n\t*if not (nasonov_killed)\n\t\tBe very careful, the maniac from Rome is here... I didn't want to believe it, but it looks like Vepkhia or Ingemar sent him. \n\tI have to get back to the party before they notice I'm gone and come deal with me as well. Be careful.\"\n\t\n\tYou feel the ropes loosen around your hands, then something being placed into your right hand. You can feel the familiar grip of a pistol in your hand, although the balance instantly tells you \n\tthat the barrel has been extended, probably with a suppressor. You pull the slide back and slide a finger along the side until you feel the breech, making sure there is a cartridge in there. \n\tThen you let the slide snap back before that cartridge gets ejected.\n\t\n\t\"Why are you helping me?\"\n\t\n\t\"Because you don't deserve this... and Vepkhia deserves to have you run around destroying his business,\" Evony tells you in a hurried hushed voice. \n\t*if not (evony_confide)\n\t\t\"I'm not an imbecile, ${name}, you're obviously after Vepkhia and I'm sure you're after Lund too. they have to face justice at some point, and if you succeed you will have freed me from \n\t\tthem. Good luck.\"\n\t\n\tAfter making sure that the ropes are loose enough for you to manoeuvre without issue, she stands back up and rushes out the door. Just in time too, since not even a minute afterwards the door \n\topens again, Remi walking towards you with a fury in his eyes. He has to be thinking that something is up. \n\t*if not (nasonov_killed)\n\t\tSurprisingly enough, you don't see Nasonov with him.\n\t\n\t*choice\n\t\t#Shoot him dead.\n\t\t\t*set remi_killed true\n\t\t\t*set kills +1\n\t\t\tHe can see your shoulders shift and a smug smile marks his face, clearly still thinking that you're bound and struggling against the ropes. However, when he is suddenly faced with the \n\t\t\tbarrel of a gun, that smug smile disappears instantly. There is no hesitation. You squeeze the trigger. \n\t\t\t*if ((combat = 90) or ((combat > 50) and (charm \u003c 45)))\n\t\t\t\tThere's just a single shot that rings in the room, combined with the metallic clack of the slide being thrown back by recoil. Remi's face distorts as your well-placed shot pierces his \n\t\t\t\teye and keeps going, shredding through his brain before punching through the back of his skull. The wall next to the door is now freshly painted in a deep red.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t\t*elseif (combat >= 50)\n\t\t\t\tThere's a rapid pair of shots that rings in the room, combined with the metallic clack of the slide being thrown back by recoil. Remi's face distorts as your shot pierces first through \n\t\t\t\this chest, bouncing off a rib before ripping through a lung, then continuing through his back. The second shot smashes through his jaw and into his brain before punching through the \n\t\t\t\tback of his skull. The wall next to the door is now freshly painted in a deep red.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t\t*else\n\t\t\t\tYou let loose with as many shots as it takes. Two of them punch into his chest, another clean through his throat, then another hits his jaw and punches through, lodging itself somewhere \n\t\t\t\tinside his skull since it never comes out. The wet bloody gurgling coming through the hole in his throat is horrendous, and Remi's look of surprise and anguish distort his face into \n\t\t\t\tsomething that will haunt your dreams for years to come. Finally you take in a deep breath and put him out of his misery with another shot through his head. The wall next to the door \n\t\t\t\tis now freshly painted in a deep red.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t#Shoot him in the knee.\n\t\t\t*set remi_kneecap true\n\t\t\tHe can see your shoulders shift and a smug smile marks his face, clearly still thinking that you're bound and struggling against the ropes. However, when he is suddenly faced with the \n\t\t\tbarrel of a gun, that smug smile disappears instantly. There is no hesitation. You squeeze the trigger. There's just a single shot that rings in the room, combined with the metallic clack \n\t\t\tof the slide being thrown back by recoil. \n\t\t\t*if (combat >= 50)\n\t\t\t\tRemi yelps in pain as his kneecap shatters and the leg buckles under him. The man falls to the floor and cries out in pain.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t\t*else\n\t\t\t\tRemi yelps in pain as the bullet punches against his kneecap and then tears its way out some ways up his thigh. The man falls to the floor and cries out in pain.\n\t\t\t\t\n\t\t\t\t*goto aftershot\n\t\t#Threaten him with the pistol.\n\t\t\tYou stand up from the chair and start moving around the room. Remi's eyes are focus on your pistol, his mind racing to figure out how the hell you got it.\n\t\t\t\n\t\t\t\"Take your gun and drop it on the floor,\" you order him, and with a smirk he does so.\n\t\t\t\n\t\t\t\"What are you doing? You're not getting out of here, and you won't shoot me,\" he tells you confidently, to which you reply by shooting just over his head, startling him into walking \n\t\t\tcloser to the chair.\n\t\t\t\n\t\t\t\"Get in the chair.\"\n\t\t\t\n\t\t\tHe sits down and gives you plenty of space for you to shift over and grab his gun for yourself. Slowly you make your way out towards the door, then nudge it open with your back, glancing \n\t\t\taround to see a small observation room on the other side of it. There are a couple of chairs and a heavy looking table that you can use to block the door. Perfect. Remi is still sitting \n\t\t\tin the chair, which gives you plenty of time to get things ready.\n\t\t\t\n\t\t\tOnce the door is blocked off, you head out.\n\t\t\t*goto snuckway\n\n\n\n\n*label aftershot\n*if not (remi_killed)\n\tYou stand up from the chair and make sure to grab some of the ropes with you. While Remi is still struggling in agony on the ground, you crouch down beside him and start tying up his hands, \n\tignoring the litany of curses emerging from his lips. He's bleeding, but not profusely, so he will end up surviving even if you leave him behind. Might end up with heavy bloodloss, but probably not \n\tto a fatal degree. \n*if (remi_killed)\n\tYou stand up from the chair and walk over to Remi, taking one final look at him before you leave him behind for good. What a shame he turned out the way he did, but after his treason you cannot \n\treally feel all that sorry for how things ended for him. One way or another, he was a dead man walking. \nYou reach down and slide your hand under his suit jacket, taking Remi's pistol before you stand back up and leave the room. The next room is some kind of an observation room, although there's no window \ninto the room you were held in. There are a couple of chairs and a heavy looking table that you can use to block the door, but with Remi in the condition he is in, it's not really necessary to start \nhauling that stuff in front of the door. So you just close the doors behind you and head out.\n*label snuckway\n*page_break\nYou have to be under the mansion. Everything around you is concrete tunnels lit up by bright clinical white lights, the walls painted in white with coloured stripes leading to different sections of \nthis underground lair of sorts. There's no real other option, especially since the concrete walls radiate with a natural coldness to them. So you have to be near where the diamonds are, probably \neither being processed into smaller batches, or kept in a vault. You know from previously handling these diamonds that they go out cut, so there has to be a processing room somewhere, although it \nis equally likely that the parcels go out to be cut in shops all across Europe.\n\nYou arrive at a crossroad with painted letters on the wall marking where each coloured line leads you to. The tunnel to your right leads to the elevator, so that's not it. The one to your left leads \nto the armoury and storage, the tunnel behind you eventually leads to the radio room, and the one straight ahead leads you to the vault. How convenient.\n\n*label crossyroad\n*if ((tock = 1) and (nasonov_killed = \"false\"))\n\t*goto nasonovfight\n*elseif (tock \u003c 3)\n\t*disable_reuse\n\t*choice\n\t\t#Head to the armoury.\n\t\t\t*set tock +1\n\t\t\t*goto weaponr\n\t\t#Head to the radio room.\n\t\t\t*set tock +1\n\t\t\t*goto radior\n\t\t#Head to the vault.\n\t\t\t*set tock +1\n\t\t\t*goto vaultr\n*else\n\t*goto vaultr\n\n\n\n*label nasonovfight\n*set nasonov_killed true\n*page_break\nYou turn the corner and instantly jump back as you suddenly once more come face-to-face with Nasonov. There is a cold grimace on his face as he suddenly jerks forwards and grabs you by the throat, \ndragging you out into his corridor, slamming you against the wall. You see him go for his hip, either for a gun or knife, but it hardly matters to you which. He has to be taken care of, once \nand for all. This time you won't let him just disappear out of sight.\n\nNo, this time you'll end this.\n\nWithout hesitation you jump to the side and pull out your pistol. Nasonov is doing the exact same, his hand coming back up with a pistol comfortably held in it, the barrel quick to point your way.\n\n*if (combat > 50)\n\t*achieve smersh\n\tYou're faster to the shot, squeezing the trigger and planting one solid shot in Nasonov's chest. He fires off several shots, but the pain from his chest must have throwing him off since he misses \n\teach and every one of them. You squeeze the trigger again and again, another two holes appearing in the Soviet agent's chest. Then you plant one final shot right between the eyes.\n\t\n\tYou take in a deep breath, trying to calm yourself from the sudden rush of adrenaline. The encounter ended up being underwhelming considering Nasonov's excellent record, but at the same time you \n\tweren't expecting a very long wrestling match either. That's more for Hollywood.\n\t*goto crossyroad\n*else\n\t*achieve smersh\n\t*set wounded true\n\tIf you were trying to match or perhaps even win in the race to being first to shoot, you lost by a whole lot. Nasonov brings the gun to bear and lets loose a couple of shots your way, one of them \n\tslamming you in the shoulder, throwing your aim off with the first shot you're able to get off. For someone with his kind of record you were expecting a quick death with a single tap to the head, \n\tbut something must have triggered his ego, because he's just grinning with a smug smile at you. He's so confident about winning this firefight that he doesn't even try to pop into cover.\n\t\n\t*if (combat = 50)\n\t\tYou take a breath and squeeze the trigger again. This time your shot hits him. In fact, it hits far more accurately than you thought you would be able to: straight through the eye.\n\t\t\n\t\tNasonov's face is one of confusion for a moment, then he slumps down and you get to heave a deep sigh of relief.\n\t\t*goto crossyroad\n\t*else\n\t\tYou take a breath and squeeze the trigger again. The bullet ricochets off the side of the corridor some ways down. Another shot, it hits the wall beside him.\n\t\t\n\t\tNasonov shakes his head at your effort and shoots you in the other shoulder, making your aim even worse. Then, still silent, he aims for your head and squeezes the trigger. You don't get to \n\t\tsee the muzzleflash, or feel the sensation of the bullet travelling through your skull. Everything just kind of... stops.\n\t\t*goto crossyroad\n\n\n\n*label weaponr\n*set weapons_found true\nYou peer past the corner towards the armoury. The painted line ends at a heavy looking door with two guards standing on either side of it. You can't get a clear view of what lies beyond through the \nsmall window cut into the door, although you can imagine that a weapons cache that size might have some lovely gems in it. Not literal gems, those would be in the vault.\n\nUnfortunately the straight corridor leading up to that door will make your options limited. \n*if (radiocostume)\n\tFortunately you are in a guard outfit so you might be able to bluff them and have them leave. Or at least have one of them leave so you'll be alone with the other.\n\t\n\t*choice\n\t\t#Try to bluff the guards into leaving.\n\t\t\tWith a deep breath to steel yourself you round the corner and start walking confidently towards the guards. Your face is still marked with bruises and some dried blood, which will definitely \n\t\t\tcause questions to arise if you're not smooth enough with your words.\n\t\t\t\n\t\t\t\"Evening,\" you call out to them with a wide smile. \n\t\t\t*if ((talking > 50) or (disguises > 50))\n\t\t\t\t\"They sent me down here to gather more folks to guard the roof. After they caught that spy that was hanging around, the boss doesn't want any more trouble. Either of you available?\"\n\t\t\t\t\n\t\t\t\t\"Sorry, we've got orders to guard the armoury,\" one of the guards answers and shrugs.\n\t\t\t\t\n\t\t\t\t\"Well, look, I'll just end up scaring the guests if I go up there, so I can take one of your places. That's at least one more extra guard up there. Sound good?\"\n\t\t\t\t\n\t\t\t\t\"What happened to your face?\"\n\t\t\t\t\n\t\t\t\t\"That spy they caught can be an asshole,\" you answer and shrug dismissively. \"It's probably why they sent me gathering folks from down here instead of going up myself.\"\n\t\t\t\t\n\t\t\t\tThe two guards look at one another and shrug. One of them grabs the keys to the armoury off his belt and hands it over to the other one, then starts heading down the hall towards you. He pats \n\t\t\t\this hand on your shoulder as he walks by, then continues on, leaving you with just one guard to deal with. You walk closer to him and take the now empty spot on the other side of the door.\n\t\t\t\t\n\t\t\t\t\"Those the armoury keys then?\" you ask and nod towards the keys in the other guard's hands.\n\t\t\t\t\n\t\t\t\tHe nods to confirm it and looks down. Too bad, because he doesn't get to see you whack him across the face. With the pistol still in your hand the blow is far harder than with a bare fist, causing \n\t\t\t\tthe guard to slump to the ground.\n\t\t\t\t*choice\n\t\t\t\t\t#Snap his neck.\n\t\t\t\t\t\t*set kills +1\n\t\t\t\t\t\tHe's already down on the ground, so this should be easy enough. Instead of bothering to lock him in a grip with your arms you instead shove the sole of your shoe against his throat and \n\t\t\t\t\t\tpress down. His gasps become wheezy and frail, his eyes bulge out of his head, his arms and legs flail in an effort to get you off of him, but it's all to no avail. Then you release his \n\t\t\t\t\t\tthroat and give his jaw a kick. There's a loud snap and the guard starts to shake violently on the ground, gurgling from his throat accompanying the painful death. Even before his body has \n\t\t\t\t\t\tstopped shaking you pick up the armoury keys and go in.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto roomery\n\t\t\t\t\t#Choke him out.\n\t\t\t\t\t\tHe's already down on the ground, so choking him out is fairly easy. Instead of bothering to lock him in a grip with your arms you instead shove the sole of your shoe against his throat and \n\t\t\t\t\t\tpress down. His gasps become wheezy and frail, his eyes bulge out of his head, his arms and legs flail in an effort to get you off of him, but eventually he just kind of stops and goes limp. \n\t\t\t\t\t\tYou press down for just a moment longer to make sure he isn't acting, then lift off your foot and pick up the armoury keys so you can get in.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto roomery\n\t\t\t\t\t#Shoot him.\n\t\t\t\t\t\t*set kills +1\n\t\t\t\t\t\tHe's already down on the ground, so it's fairly easy to lean over him, press the muzzle of your pistol against his head, and squeeze the trigger. You can hear the wet splattering sound against \n\t\t\t\t\t\tthe concrete floor and see the man go limp. Without hesitation you grab the keys and turn to the door so you can get inside the armoury.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*goto roomery\n\t\t\t*else\n\t\t\t\t*set kills +2\n\t\t\t\t\"You're needed elsewhere! Up on the roof I think.\"\n\t\t\t\t\n\t\t\t\t\"What do you mean? We've got orders to guard the armoury,\" one of the guards questions you, taking a step closer.\n\t\t\t\t\n\t\t\t\tThere's a moment's pause as you think about what to say next, which the other guards pick up on. One of them grabs his pistol, which just will not do. With a sigh you resolve to just take them out \n\t\t\t\tthe old-fashioned way, although it is not your preferred choice to do so. From this rang it's a simple matter of lifting your suppressed pistol and taking quick aim. You squeeze the trigger once, then \n\t\t\t\tagain, and again and again, making sure the two guards drop to the ground. The door is locked off, but fortunately one of the guards carries the keys to it with him. Without hesitation you unlock \n\t\t\t\tthe door and slip inside.\n\t\t\t\t*goto roomery\n\t\t#Kill the guards.\n\t\t\t*set kills +2\n\t\t\tYou round the corner to the armoury door, instantly raising your pistol and taking care of the guards. They don't stand a chance, especially since you take them by surprise. The door is locked off, \n\t\t\tbut fortunately one of the guards carries the keys to it with him. Without hesitation you unlock the door and slip inside.\n\t\t\t*goto roomery\n*else\n\t*set kills +2\n\tIn fact, you don't really have a choice in the matter if you don't want to become as covered in holes as a slice of swiss cheese.\n\t\n\tYou round the corner to the armoury door, instantly raising your pistol and taking care of the guards. They don't stand a chance, especially since you take them by surprise. The door is locked off, \n\tbut fortunately one of the guards carries the keys to it with him. Without hesitation you unlock the door and slip inside.\n\t*goto roomery\n\n*label roomery\nThe room is full of weapons crates. You go through them and see that most of them have Cyrillic on them, indicating that diamonds is not the only thing smuggled out of the Soviet Union by Lund's \nlittle organization. These are crates of RPGs, AKs, pistols, grenades, mines, everything one might need for building a whole revolutionary army. This whole smuggling thing runs far deeper than you \nhad first thought.\n\nThese have to be taken care of. Using your knowledge of explosives you set up these boxes however you can to maximize the destruction. You set detonators into the mines and place them on the weapons \ncrates, arm everything you're able to arm, then take as many grenades as you can hold. You back away from the armoury, take the pin off a grenade, and toss it in. Another, then another, then you \njust dump the rest in while you still can and run for it.\n\nThe entire island shakes violently by the force of the explosion. If people weren't quite yet alerted to you being on the loose, they were now.\n*goto crossyroad\n\n\n\n\n*label radior\nThe radio room reveals itself as you push open the door, only to find that it isn't empty. A guard sits there with headphones on and feet planted securely up on the table, one hand on a half-full \ncoffee cup, the other reaching over to tap the ash from his cigarette into a dirty ashtray.\n\n\"Georgie, it's not your shift yet, leave me alone,\" he murmurs without even looking at you.\n\nGood for you, because that means there isn't much he can do in the way of defence.\n*choice\n\t#Shoot him.\n\t\t*set kills +1\n\t\tYou lift up your suppressed pistol and plant the muzzle almost right on the guard's head. He must feel it tickling his hair because he begins to turn to look at you now, just in time to see \n\t\tyour finger squeeze the trigger. A flash of panic marks his face, he jerks his feet off the table, but by that time there has also been the metallic clack of the slide being shoved back by recoil. \n\t\tThe guard's head is disfigured by a hole that has punched clean through, spreading a mist of red on the radio and the Playboy poster hung on the wall just above it.\n\t\t*goto fainter\n\t#Knock him out.\n\t\t*if ((combat = 90) or ((combat > 50) and (charm \u003c 45)))\n\t\t\t*check_achievements\n\t\t\t*if not (choice_achieved_judo)\n\t\t\t\t*achieve judo\n\t\t\tYou extend your hand flat and lift it up across to your shoulder. With a grunt you bring the hand down right on the guard's neck in a solid chop, making the man suddenly slump down unconscious. \n\t\t\tYou weren't actually thinking that would work, but apparently it did. Far better than you could have hoped in fact.\n\t\t\t*goto fainter\n\t\t*else\n\t\t\tWith a quick move you close the distance and hook your arm around the man's throat, placing pressure on it. You can hear the guard gasp as he struggles against you, flailing to try and grab \n\t\t\tat you or fight you off. He even goes for his gun, but with a swift yank at his throat you force him to lose his grip. It takes only a short while before he starts to shake in panic against \n\t\t\tyou, then finally fall limp against the chair, now unconscious.\n\t\t\t*goto fainter\n\n*label fainter\n\nYou tug the guard off the chair and get to work as fast as possible, tuning the frequency up to what Brandon Ideas had told you would be used for the operation in case something went wrong. Well, \nsomething did go wrong, and Brandon's help will be necessary to pull this thing off.\n\n\"Phoenix to Scorpio, can you hear me?\" you repeat a few time until you hear an acknowledgement on the other end. \"Operation compromised but asset in play, will require a heavy hand to fall down on \nthis rock. Over.\"\n\n\"Scorpio copies, Phoenix. We'll do what we can. \n*if (ides_affair)\n\tKeep safe until we get there. \nOver.\"\n\n\"Over and out.\"\n\nThe exchange is fast and you get out before the radioman gets back. Good, the last thing you need is another complication holding you back. You glance back at the guard and then the door. Having one \nof those outfits could end up being of use to you.\n*choice\n\t#Disguise yourself as a guard.\n\t\t*set radiocostume true\n\t\tYou tune the radio quickly to a random frequency, then crouch over the guard. there is a brief moment where you think of maybe apologizing for this, but it's not like he will care in his current \n\t\tcondition that you are stripping him all the way to his boxers. It takes a while but you eventually get the outfit on, disguising yourself as a guard. Not very well since there is a fair size \n\t\tdifference between you and the guard, but well enough that you'll be able to bluff some more ignorant guards.\n\t\t*goto crossyroad\n\t#Leave him be.\n\t\tYou tune the radio quickly to a random frequency, then step over the guard so you can head out, but not before you recover an extra magazine of ammunition for yourself. After all, the pistol \n\t\tgiven to you is the same make as the guards'.\n\t\t*goto crossyroad\n\n\n\n\n*label vaultr\n*if (weapons_found)\n\tThe vault isn't nearly as big as you expected it to, however the room before it is twice the size you imagine the vault to be. You see room for perhaps two dozen workers at two separate long tables, \n\teach equipped with the necessary items to make smaller packages that can be more easily smuggled by traditional means. There are only a couple of guards, both of them waiting in cover beside the \n\tvault door.\n\t\n\t*if (radiocostume)\n\t\tYou could try to talk your way past, which would be a viable option since you don't exactly have the kind of weapons necessary to flush them out. No, hold on. Yes you do. \n\t\t*goto granata\n\t*else\n\t\tYou won't be able to talk your way past, not the way you're dressed, and you don't exactly have the kind of weapons necessary to flush them out. No, hold on. Yes you do. \n\t\t*goto granata\n*else\n\tThe vault isn't nearly as big as you expected it to, however the room before it is twice the size you imagine the vault to be. You see two dozen workers surrounded by a dozen heavily armed guards, \n\teach of the workers going through the shipment of diamonds to separate them into smaller packages that can be smuggled by more traditional means for cutting. It's like a well-oiled machine in there, \n\tthe guards keeping close eye that nobody tries to swipe up any loose diamonds for themselves.\n\t\n\tYou heave a sigh and think. You can't talk your way past them, not with your bruises. \n\t*if (radiocostume)\n\t\tEven in your guard outfit, the bruises are still marking you. You could maybe lure them into going through emergency procedures if you found something to trigger them. The other option would be \n\t\tto fight them head-on, but then the problem lies in being heavily outgunned. But wait, there was an armoury back there, wasn't there?\n\t\t\n\t\tBetter go there first. \n\t\t*goto crossyroad\n\t*else\n\t\tEven if you could get a guard outfit, the bruises would still mark you. You could maybe lure them into going through emergency procedures if you found something to trigger them. The other option \n\t\twould be to fight them head-on, but then the problem lies in being heavily outgunned. But wait, there was an armoury back there, wasn't there?\n\t\t\n\t\tBetter go there first.\n\t\t*goto crossyroad\n\n\n*label granata\nThere's one more grenade. \n*if (radiocostume)\n\t*choice\n\t\t#Convice them to leave the vault door.\n\t\t\t*if ((talking > 50) or (disguises >= 50))\n\t\t\t\tYou walk out into the open and wave at the guards to catch their attention. One of them stands up from his cover and furrows his brow at you.\n\t\t\t\t\n\t\t\t\t\"Hey! There was an explosion in the armoury! They need more people over there to find the one who did it!\" you shout to them, only to have them exchange quick glances.\n\t\t\t\t\n\t\t\t\t\"We're not supposed to leave the vault unguarded!\"\n\t\t\t\t\n\t\t\t\t\"I'll take care of it,\" you respond. \"The asshole beat me up, so I can't exactly be running up and down the halls here, so I might as well take your place instead.\"\n\t\t\t\t\n\t\t\t\tThe two guards hesitate and look at one another again, then the guy standing up walks around his bit of cover, heading your way. His fellow guard isn't nearly as excited to head off, \n\t\t\t\tbut eventually relents and stands up as well. You offer them an apologetic smile and a shrug as they pass you by, leaving you alone in the processing room.\n\t\t\t\t\n\t\t\t\t*goto vaultin\n\t\t\t*else\n\t\t\t\tYou walk out into the open and wave at the guards to catch their attention. One of them stands up from his cover and furrows his brow at you.\n\t\t\t\t\n\t\t\t\t\"Hey! There was an explosion in the armoury! They need more people over there!\" you shout to them, only to have them exchange quick glances.\n\t\t\t\t\n\t\t\t\t\"We're not supposed to leave the vault unguarded!\"\n\t\t\t\t\n\t\t\t\t\"Don't worry about that, I'll take care of it,\" you respond.\n\t\t\t\t\n\t\t\t\t\"No can do! We have direct orders!\"\n\t\t\t\t\n\t\t\t\tThe two guards look at one another again, then the guy standing up slowly crouches back down. Both of them remain still for a moment, but it looks like neither of them are willing to \n\t\t\t\tmove from where they are. Looks like you have to do this the more violent way then. Slowly you lower your hand behind your back where you've been hiding the grenade while talking to \n\t\t\t\tthe guards.\n\t\t\t\t\n\t\t\t\t*goto granatier\n\t\t#Use the grenade.\n\t\t\t*goto granatier\n*label granatier\nYou pull the pin and run forwards into the processing room, then toss the grenade at the guards. They try to shoot at you once they figure out what exactly it is you're throwing at them, but you duck \ndown behind one of the long tables in time to miss the incoming hail of bullets. You count the seconds, waiting, then there's a sudden explosion. When you peek over the table, the guards aren't a \nproblem anymore.\n\n*label vaultin\nYou still have your cigarette box, which is very excellent indeed. One snap after another you start taking pictures of the tables and the equipment, the unfinished pouches of diamonds that haven't \nbeen sealed away in the vault. It's surprising that any of them have been left behind at all, but then again the explosion was pretty big. Perhaps big enough for a full evacuation, which will give \nyou plenty of time to get the vault open.\n\nThis is where your [i]plastique[/i] comes in handy.\n*page_break\nThe vault door visibly buckles and then with a loud groan falls over, the carefully placed plastic explosive having wrenched it completely off the hinges. The vault door is now open, and behind \nthe smoke is revealed... a treasure trove.\n\nIt's shelves upon shelves of cash, diamonds, gold, and guns. With your cigarette box you enter and start snapping pictures of each and every shelf, just to get all of it recorded. Then as you're \njust about done you hear the guards rushing back in to secure the vault. You have everything you came for, now it's time to play off Lund's hubris. You tuck your disguised camera into your pocket, \nthen walk out of the vault with your hands up. You can already hear the radio crackle with an order to take you upstairs - alive.\n*goto partyr\n\n\n*label partyr\n*page_break\n\"Well well,\" Ingemar Lund says and sighs. \"You have become a constant fixture as a thorn in my side. \n*if (lund_met)\n\tFor a moment I was glad that we might put every bit of nastiness behind us, but this is ridiculous and will not stand. \nYou have destroyed a cache of weapons that was to be delivered within the week to the buyers, and you have ruined a perfectly good vault door.\"\n\nThe guard behind you shoves you towards Lund, forcing you to close the distance a little bit. The party in the mansion has been abruptly called to an end and people are making their way off the island. \nGood, that will leave less collateral damage for Brandon to worry about.\n\n\"I can only imagine what you have done with your fellow Frenchman, but to be honest I do not care,\" Lund continues while motioning for another guard to come closer. \"He had come near the end of his \nservice with me anyways.\"\n\nYou watch as Lund takes hold of the guard's jacket and opens it, reaching in and recovering his pistol. With a deft touch he grabs the slide and pulls back, loading the pistol before setting it down \non the smaller bar counter here in his personal lounge. You hear heavy steps from behind you coming up the stairs, then the murmurs of Jishkariani fuming under his breath. He isn't nearly as capable \nof hiding his agitation as Lund is.\n\n\"Tell me, Ingemar, how are you down here?\" you ask to try and get a measure of just how accommodating Lund can be. \"We never found any trace of you travelling even near to the Mediterranean.\"\n\n\"You were not looking hard enough then. But of course, as any good smuggler - or spy as yourself for that matter - knows, it serves one well to have many passports under many names.\"\n\n\"Can't we be done with this already?\" Jishkariani asks, trying to keep his emotions bottled up to little avail.\n\n\"Hush, Vepkhia, there is no need to be hasty and rude. You only die once, after all,\" Lund says and chuckles. \"It should be enjoyable to the end.\"\n*page_break\nThe guards grab you by the shoulders and start dragging you out through the opened French windows. Everything out here is the mansion roof, or more like an oversized balcony that could fit a pool if \nLund was as decadent as Jishkariani. Instead it serves more as a small garden with potted plants and vegetables. You're forced to walk past all of it until you reach the far end, Jishkariani and \nLund following along at a steady distance behind you.\n\nJust before reaching the edge you are turned around to face the two powerful smugglers holding you now at gunpoint. Well, not literally. Not yet.\n\n\"Why are you here?\" Lund calls out to you in a sudden question. \"Why is it that you are drawn to me in such a manner? Is it because you seek to redeem yourself in the eyes of the French? That will \nnot happen, I assure you. Is it for revenge over your sudden status as a [i]persona non grata[/i]? Or is it perhaps something simpler. The rush of adrenaline, the joy of the hunt, hmm?\"\n\nThe CIA should be on their way by now if they were preparing for things to go south, as they should have just in case. \n*if (evony_out = \"true\")\n\tYou see a flash of red through the lit-up inside of the mansion; the bright fiery hair of Kalliope as she takes down a guard from behind and seizes his weapon for her use. She's quick and silent, \n\twalking outside and straight away ducking behind some large plants to hide. She has your back after all, it seems.\n*if (evony_out = \"false\")\n\tYou see another guard walk out to the roof, this time with Evony in front of him. Lund turns back to see her approaching, smiling a wicked smile as he turns back around to look at you.\n\n\"What is it about me that draws you? Ever since you killed Sèkou Marcine, you have been like a bloodhound on my trail. For a moment I thought you may have had me pinned back in Finland, but then you \nsettled for exactly what I offered you,\" Lund says and laughs.\n\nThis guy really likes talking. \n*if (evony_out = \"false\")\n\tYou see Evony's eyes pierce into you as Lund boasts about you killing Marcine. She studies your facial expression intently, obviously trying to gauge whether or not it's true. \nJishkariani on the other hand is the complete opposite to Lund. He's rubbing his hands nervously, fidgeting in place, eager to just take care of you if this starts taking too long. He won't give you a \nsecond thought, he just wants to get rid of you as fast as possible.\n\n*choice\n\t#Keep Lund talking. Keep feeding his ego.\n\t\tIt doesn't take much to keep Lund talking, but it takes much more to keep Jishkariani under control. It's a tightrope walk to balance the two, especially since the Georgian smuggler grows \n\t\tmore and more tired of all the words with each turn of the conversation. But you're buying time.\n\t\t\n\t\t*if ((talking >= 70) or ((talking >= 50) and (charm > 55)))\n\t\t\tYou do splendidly with both men, balancing them off one another, turning the conversation around whenever it has to in order to buy you more time. Jishkariani grows more and more agitated \n\t\t\tas time goes on, but he's not quite ready to blow a fuse. Not just yet.\n\t\t\t*goto dassault\n\t\t*elseif (talking = 50)\n\t\t\tIt's a very carefu
