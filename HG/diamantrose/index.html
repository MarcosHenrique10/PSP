last night,\" Remi tells you in a hurried, almost panicked voice. \"Lund is confirmed as involved, and the best guess right now \nis that they attach the diamonds to the bottom of Lund ships with magnets. The ships will be bound to be inspected, so the diamonds will have to be dropped off somewhere. The Turkish Straits \nare too deep - Greek archipelago maybe. That's our lead so far.\"\n\n\"What about the British? Have they found anything new about the magnets?\"\n\n\"Mercier said there has been no news from London, and the agents here have gone silent. That's why he came to see me. If the Brits have gone underground or captured, everything might be \ncompromised,\" Remi tells you and rushes to walk past, trying to act as natural as possible. \"Come to my hotel room tonight, I'll get documents so we can get out before the noose tightens \naround us.\"\n*page_break\nFeodosia is a resort town. Very little happens outside the beautiful summer months, but now that early spring silence feels overbearing. Only a few days ago it had been liberating to you, \nbut now you know that there is a very likely chance of a hunt going on, namely for your little band of spies. Every figure standing at a street corner, every window with curtains cracked open, \nevery car that slows beside you - it all feels like a trap close to being sprung all around you.\n\nYou return to your little apartment and collect a briefcase ready with whatever you might need for a quick escape. Falsified documents, the odd gadget to help on your journey, gold bullion coins \nhidden in the handle, as well as ways to disguise yourself. Fairly straightforward. Then with the briefcase collected you dump the rest of any documents or papers you have written on into one of \nthe metal trash containers. You also make sure to drop in any notepads you may have written on to make sure there's no evidence of your handwriting left in the room.\n\nOn your way out, you set the trash can on fire.\n*page_break\nThat night you enter the hotel lobby with your head low and your hand gripping tightly to your briefcase. Remi's staying on the third floor under a pseudonym, but asking around is too dangerous. \nYou know the room number from picking him up earlier in the week, although that alone is a breach in usual protocol. Yet it allows you to simply walk up the staircase towards Remi's room, \nsatisfied with the knowledge that with him is a secured getaway.\n\nYou step out onto the third floor and walk along the carpeted hallway, glancing at room numbers as you go to keep track of where you are and how far out you are from Remi's 328. You walk around \na structural pillar bottlenecking part of the hallway and reach the room. With a brisk knock... the door suddenly opens?\n\nYou give the door another nudge and it creaks wide open for you. It's completely quiet inside, but as you step in just past the threshold you can get a good angle on a lamp on the floor, as well \nas a broken chair. There are papers scattered on the floor, some of them coloured as if tickets for a train or perhaps a ferry. Yet no sign of your partner. \n*label callout\n*hide_reuse\n*choice\n\t#Proceed further inside.\n\t\t*achieve sorry\n\t\t*set remi_confirmed true\n\t\tThe door creaks as it slap against the wall beside it, your back brushing against the cool outside surface of the door while you step further inside. Around the corner lies a scene of \n\t\tfurther destruction, and it is clear that there has been a fight here. Strangely enough, the room has not been rummaged around in any more than that - the papers are on the floor because \n\t\tthey landed there when someone was tossed against a table, not because they were thrown around during a search. Yet as you continue further inside, Remi's briefcase containing masks and \n\t\tfake documents is nowhere to be found so far.\n\t\t\n\t\tYou take care not to step on anything as you cross the main room, glancing at the small corner with a bed set in it, then towards the kitchen. The kitchen has knives on the floor, probably \n\t\ttorn down in the struggle since nothing else seems to have been disturbed. With careful steps you move to the bathroom door and push it open. Instantly your breath catches and you feel \n\t\tthe urge to turn and let your lunch out all over the hotel room floor.\n\t\t\n\t\tIt's a scene of butchery. It's hard to tell that it's Remi sat in the cramped little bathtub, his fingernails torn off and fingertips sliced to shreds, his eyes gouged and hair pulled \n\t\tso hard that chunks are missing. That explains the struggle, although the scene in the bathtub would have taken several hours of brutalization to make happen. A single kitchen knife is \n\t\tleft behind, sunken into the thigh of the figure in the tub with the handle carefully pried off.\n\t\t\n\t\t*goto insideview\n\t#Call out for Remi.\n\t\t\"Remi?\" you call out into the quiet hotel room, reaching up for the small concealable pistol holstered under your armpit. \"Remi!\"\n\t\t\n\t\tThere's no response. Not even the sound of shuffling from anyone dragging themselves around, or the creak of furniture shifting around. No thumping, no creaking, no moaning, nothing. \n\t\tYou glance back to the hallway, almost expecting it to be an ambush and for the KGB to come bursting through all the other doors in the hotel to swarm you - but nothing happens. It's \n\t\tjust silence all around you. The sound of being completely alone.\n\t\t\n\t\t\"Remi!\"\n\t\t*goto callout\n\t#Leave.\n\t\t*achieve safe\n\t\tThe hotel room is silent before you, the hallway is still clear. Yet the longer you stand there, the worse the feeling of being trapped grows inside you. You feel your heart stuffing \n\t\titself up into your throat, feel your lungs struggling to take even small breaths, and hear your mind racing. You have to come up with a plan, and right now it has to be that you cut \n\t\tyour losses and get out while you can.\n\t\t\n\t\tThe operation is compromised, there is no other way about it. If Remi is alive he is bound to be in the hands of the Soviets, alive or dead, and you are the only one who still holds \n\t\tany leads onto the smuggling operation or information about the magnets the Brits found. Of course at this point you have no documents or pictures of documents to back your claims, \n\t\tbut at least you have your life.\n\t\t\n\t\tWith that, you back out of the hotel room and briskly walk down the hallway, heading towards the emergency staircase instead of the main stairwell. The last thing you want to do right \n\t\tnow is to walk out the main door in case the place is being watched. And so, with hurried steps, you rush through into the emergency stairwell and shut the door behind you, pressing your \n\t\tback against the entrance.\n\t\t\n\t\t*goto hastyescape\n\n\n\n*label insideview\n*page_break\nThe sound of footsteps out in the hallway catch your attention. Your eyes shoot instantly to the very edge of the door you have left open, then back to the lifeless near-drained body in \nthe bathroom. There is no way to talk yourself out of this one, no matter how competent of a charade one might put up. If this is a civilian walking through, you will have a problem ten \nminutes from now, if all this has been a trap to catch whoever Remi was working with it will be the MVD or KGB - depending on who got their people into place first - and you will have \nyour hands full of problems instantly.\n\nThose footsteps out in the hallway are steady, muffled by the carpet but still distinct. They're not heavy or hurried like those of someone rushing to make a capture, they aren't slow and \nsoftened as if one trying to sneak towards something - they're regular, casual even.\n\n*choice\n\t#Make a run for it.\n\t\t*set spotted true\n\t\tYou take to your trusty feet and rush out of the hotel room, hopping over the mess in the main room so you have a clear shot for the hallway. Just as you come around the corner \n\t\tyou can hear the footsteps outside stop. You barge out and pause as you suddenly come face-to-face with a wrinkly woman at least in her seventies. She jumps and begins to chastise \n\t\tyou straight away in a rural dialect of Russian, but by the time she realizes that you are fleeing from something in the room, you have already come halfway down the corridor in \n\t\tthe direction of the emergency stairwell.\n\t\t\n\t\tThe door smashes open as you shove into it while in a full run, your shoulder making particularly heavy contact. That'll end up hurting in the morning.\n\t\t\n\t\tWith a nudge of your elbow against the door you close it behind you, then lean your back against it to make sure it closes completely. Suddenly you have very few likely scenarios \n\t\tbefore you, all of which include the old woman calling for help. Fortunately you chose the emergency stairwell which is bound to lead to an alternate way out of the hotel. The last \n\t\tthing you'd want is to walk out through the front door.\n\t\t\n\t\t*goto hastyescape\n\t#Hide around the corner from the front door.\n\t\tThat same corner that first blocked your view into the hotel room is now to become your saviour. You rush out of the bathroom and hop over the mess in the main room, clearing it \n\t\tin a single bound. The same bound that also leads you straight over to the wall and twists you around so your back lands flush against it. Just to be sure you bring your small \n\t\tpistol to the ready, but mostly you just steady your breathing and listen.\n\t\t\n\t\tThe footsteps outside become silent, then approach the door hesitantly. While your mind races to try and make it sound menacing, it becomes quickly absolutely clear that it is far \n\t\tfrom it. In fact now that you really listen to it, there appears to be a little shuffle to the steps. Perhaps someone who cannot lift their foot properly.\n\t\t\n\t\t*goto thoughtfulescape\n\t#Sneak out through the window.\n\t\t*goto windowescape\n\t#Wait and see what happens.\n\t\tYou press yourself against the doorframe of the bathroom and listen, calming your breathing and staying perfectly still so you do not attract attention. Leaving the front door open \n\t\twas a major blunder in hindsight, but it's not like closing the door was the main problem when you first arrived. With a glance directed back to the body in the bathtub, you reassure \n\t\tyourself that no matter what you won't be ending up like that.\n\t\t\n\t\tThe footsteps in the hallway stop just outside the door, but you cannot hear whether they creep closer or disappear entirely. No matter which it is, the steps certainly are not \n\t\tleading away from the hotel room door.\n\t\t\n\t\t*goto thoughtfulescape\n\n\n\n*label thoughtfulescape\n*choice\n\t#Try to sneak out through the window after all.\n\t\t*goto windowescape\n\t#Make a run for it.\n\t\tYou barge out and pause as you suddenly come face-to-face with a wrinkly woman at least in her seventies. She jumps and shrieks in surprise. Her small frail-looking body doubles over as \n\t\tshe bounces backwards and lands on the floor, but by the time she can regain her composure and begin a tirade of curses, you have already come halfway down the corridor in \n\t\tthe direction of the emergency stairwell.\n\t\t\n\t\tThe door smashes open as you shove into it while in a full run, your shoulder making particularly heavy contact. That'll end up hurting in the morning.\n\t\t\n\t\tWith a nudge of your elbow against the door you close it behind you, then lean your back against it to make sure it closes completely. Suddenly you have very few likely scenarios \n\t\tbefore you, all of which include the old woman calling for help. Fortunately you chose the emergency stairwell which is bound to lead to an alternate way out of the hotel. The last \n\t\tthing you'd want is to walk out through the front door.\n\t\t*goto hastyescape\n\t#Walk out and try to talk your way past.\n\t\t*set charm +5\n\t\tYou take in a deep breath and steel yourself for whoever is standing just outside the room right now. With your hands stuffed safely in your coat pockets you walk out as confidently \n\t\tas you are able. As you step over the threshold you come face-to-dace with a frail elderly woman, her body stiffening as she backs away a step and confronts you with no shame over \n\t\tperhaps peeking in on someone's personal business.\n\t\t\n\t\t\"Good day,\" you say and pull the door shut behind you. \n\t\t*if ((russian = \"true\") and (talking >= 50))\n\t\t\t\"I'm sorry, have I been too noisy today?\"\n\t\t\t\n\t\t\tThe woman looks up at you and squints, almost as if she is trying to figure you out since she hasn't seen your face before. Then she seems to realize that this is a hotel and people \n\t\t\tcome and go from day to day, her face softening into a very narrow smile.\n\t\t\t\n\t\t\t\"Not since this afternoon. You should keep it that way!\" she tells you in a firm voice, then turns and stomps off.\n\t\t\t\n\t\t\tWhile the frail woman walks away you turn and head down the hallway, moving with quick steps. The old woman's shuffling steps disappear from earshot and you quicken your own step, \n\t\t\topening the door leading to the emergency stairwell so you can escape the situation. The door creaks as it opens, then again as it closes, then slams shut behind you with a final nudge \n\t\t\tby your back as you lean back against it. The stairwell is empty, which is an excellent sign since nobody will see you leave, unlike the case with the main entrance.\n\t\t\t*goto hastyescape\n\t\t*else\n\t\t\t\n\t\t\tSuddenly your mouth feels dry and you blink a few times, trying to regain whatever it is you were thinking of saying to get yourself out of the situation. As the words appear to \n\t\t\tescape you at the moment, you simply stand there and share an extremely awkward moment with this frail old woman. The woman looks up at you and squints, almost as if she is trying \n\t\t\tto figure you out since she hasn't seen your face before. Finally she smacks her lips and turns around, starting to walk the other way while muttering incoherent curses.\n\t\t\t\n\t\t\tWhile the frail woman walks away you take your chance and head down the hallway, moving with quick steps. The old woman's shuffling steps disappear from earshot and you quicken your own step, \n\t\t\topening the door leading to the emergency stairwell so you can escape the situation. The door creaks as it opens, then again as it closes, then slams shut behind you with a final nudge \n\t\t\tby your back as you lean back against it. The stairwell is empty, which is an excellent sign since nobody will see you leave, unlike the case with the main entrance.\n\t\t\t*goto hastyescape\n\n\n\n*label hastyescape\n*fake_choice\n\t#Put on one of your disguises.\n\t\t*set masked true\n\t\tWith an empty stairwell, putting on your mask is safe enough. You thumb the latches holding your briefcase shut and move them to the side until there is an audible pop. The top of the \n\t\tcase opens, revealing the neatly assembled compartments, but the largest of them holds your interest the longest. In it is a stack of paper envelopes, one of which you pick up and tear \n\t\topen to reveal that inside is a mask painted with the shade of an extremely realistic skin colour.\n\t\t\n\t\tWith a swipe of your hand you uncover a small mirror attached to the inside of the briefcase top, helping you immeasurably in sliding the rubbery mask over your head and arranging it so \n\t\tit matches up to your facial features. While not moulded to your face, the paint has been meticulously toned to your skin colour and the edges have been faded to seem natural around \n\t\tthe eyes and ears. With a quick dab of a special kind of make-up putty at the seams, the mask becomes sealed to your skin, smoothing out any noticeable edges.\n\t\t\n\t\tOf course, the mask would not be enough to fool anyone from up close, but it would help you blend into a crowd and make a getaway to a place where you no longer require a mask to move \n\t\tunnoticed.\n\t\t*page_break\n\t#Try to slink away without using a disguise.\nThe door at the bottom of the stairwell leads directly outside behind the hotel, exactly where the buildings give way to a parking lot that is left near empty in the off-season. Without \neven so much as glancing around to see if you've been spotted or not, you turn and start walking. As the buildings close in on one another and leave only a narrow alleyway ahead of you, \nyou still keep walking, marching with steady step to get to any place with a larger crowd. While walking you try and concentrate, to push the paranoia from your mind and remember the core \nrules to espionage.\n\n[i]Do not look back; you are never completely alone.[/i]\n\n*goto spotters\n\n\n\n*label windowescape\nThe windows of the hotel room face towards the parking lot behind the hotel. With a quick peek it seems the parking lot is relatively empty in the off-season, so you should be clear to try and \nmake a getaway down that way. The only problem is that you are a few stories up from the ground. Nevertheless you steel yourself and rush to one of the windows with as quiet steps as you can \nmanage, unlatch a window, then poke your head through.\n\nThe building is made of stone, meaning that fortunately the decorative lip just outside the window is just wide enough for you to plant your feet on it - at the very least it can accommodate \nthe ball of your foot. With a deep breath to steel yourself, you climb out the window.\n\nThe breeze rolling in from the Black Sea instantly tugs at you, trying to pull you off the side of the hotel. Fortunately you are still right by the window with a strong grip on the windowsill, \notherwise you may have found yourself heading far faster towards the pavement than you had perhaps planned. Slowly you scoot along the little ledge, keeping hold as best you can wherever you \ncan find anything to hold on to, although your body is going crazy with the sensation of constantly being on the edge of losing your balance.\n\nOne tiny scoot of your feet after another carries several windows' distance until you finally reach a drainpipe attached to the wall with heavy looking bolts. It's probably unlikely to be enough \nto support your weight for long, but a slide down would clearly be far easier to achieve than a struggle to get up on a pipe such as this. Looking both ahead and behind you at all the rows of \nshut windows and no other way inside the hotel than the way you came out, it's your only chance to head down now.\n\nAnd so you take as steady of a grip on the pipe as you can and start trying to slide down.\n*page_break\n*set bangedupcase true\nIt's an effort. It really is. Not only do your shoes keep snatching on the bolts keeping the pipe in the wall, but also on the side of the building itself. As you skid down, your hands begin \nto feel a sensation of burning, and on the way down you briefcase has been banged up a fair bit against everything that happened to go past on you way down. Yet you manage to keep a hold for \nas long as you need to, and finally your foot lands on solid ground.\n\nWithout even so much as glancing around to see if you've been spotted or not, you turn and start walking. As the buildings close in on one another and leave only a narrow alleyway ahead of you, \nyou still keep walking, marching with steady step to get to any place with a larger crowd. While walking you try and concentrate, to push the paranoia from your mind and remember the core \nrules to espionage - those self-evident guidelines that always help to guide you into the mindset of an [i]agent provocateur[/i].\n\n[i]Do not look back; you are never completely alone.[/i]\n\n*label spotters\nYou come out of the alleyway and turn the corner, only to be suddenly faced with a black little car parked on the side of the road. Inside are two men, one of them looking through a camera straight \nahead in the direction of the hotel. It's a good thing you did not go out through the front, because that camera is pointed directly towards the entrance. The other man is smoking a thin cigarette, \nhis face lit with the red glow as his eyes flick over the crowd. \n*if ((masked) and (disguises >= 50))\n\tHis gaze pauses on you for the briefest of moments before continuing onwards.\n\t\n\t[i]Go with the flow, blend in.[/i]\n\t\n\tYou stay calm and walk past their car. As you pass a pair of talking women you reach up and straighten your collar, hiding your neck from a sudden breeze rolling in from the Black Sea. You're \n\tclear. At least it appears you are.\n\t*goto wayout\n*else\n\t*set spotted true\n\tHis gaze comes around to you and stops instantly. You see him reach over to the other man and tap him on the shoulder, bringing his attention to you as well.\n\t\n\t[i]Go with the flow, blend in.[/i]\n\t\n\tDespite their attention now aimed towards you, you force yourself to calm down and keep walking past their car. While they could snag you directly off the street, you cannot be sure that they \n\tare even looking for you necessarily. It might simply be that your glance in their direction ended up catching their attention. Nevertheless you hasten your steps and continue past a pair of \n\ttalking women, reaching up to straighten your collar as there is a sudden tug from the breeze rolling in from the Black Sea. The car doesn't start its engine, you can't hear the doors opening. \n\tYou're clear. For now at least.\n\t*goto wayout\n\n\n\n*label wayout\n*page_break\nThere is a time in everyone's life when you just have to stop and find a direction. Now, as your entire spy ring has been decimated and your only known colleagues have either gone underground or \noutright missing, you can't help but find this that very point in your life. Your only lead as far as the diamonds go will take you to the Greek islands, and you have the opportunity of reporting \nin on the way by taking a detour into Istanbul.\n\nBut, as always, there is a problem with that.\n\nIt is not easy to cross into Turkey, and even if you could produce the necessary papers for passage, it's unlikely you will be allowed to cross from the Soviet Union into a fresh NATO country. \nTempers are still running fairly hot in that regard. Your best option is to tap into a resource that tends to be contacted whenever it's necessary to get someone out from behind the Iron Curtain \nas soon as possible - a border guard by the name of Arseny Speransky who is stationed in Bulgaria. The Bulgarian-Greek border is your surest way out to the West, and it serves an excellent route \nto Greece as well.\n\nIn fact, travelling to Greece first would allow you to speak with an old acquaintance of yours, Titos Metaxas, who is an information broker with tendrils in most every country along the Mediterranean \ncoastline. The danger is that is the Soviets are hunting down your entire spy ring, which might also make those few leads you have gathered disappear.\n\nSo you find yourself standing at the bow of a ship heading for Varna, hoping to gain some distance on the Soviet authorities before the noose around your operation closes around your neck as \nwell.\n*page_break\nWhile you may have been nervous back in Crimea about the Soviets going on a manhunt for you, in Bulgaria at least there is no sign of such a mobilization of their secret police apparatus. Your \njourney continues from the seaside resort of Varna on train track leading further inland, pausing for close to a week after you reach the rapidly growing city of Plovdiv since you have to find \nthe contact that might be able to get you across the border. The major border crossings have all been shut down and the Iron Curtain has become far better at sealing off access after they started \nconstructing a wall in Berlin.\n\nWhile the border guard is subordinate to the KGB, it is hardly as ideologically extreme as the guards assigned to Soviet military bases and the gulags. for the most part they are still the same \npeople who would have been guarding the border whether the Iron Curtain was there or not. However, locating a single officer along a fairly long border is not exactly easy. You still put the word \nout and pose as an old friend to find where Arseny Speransky is, eventually finding out that he has been delegated to paperwork in Plovdiv.\n\nWhat luck.\n*page_break\n*if (rng > 10)\n\t*set trip \"vacation\"\nThe office building taken over by the border guards as a branch of their service is a largely unassuming brand new concrete box near the heart of the city. You can hear construction equipment \nmoving and squeaking in the nearby blocks, expanding the city and transforming the entire look of it into something more modern. The shiny brass plaque outside the door is marked with a big red \nstar. Right inside the door, the offices of the border guards are marked with a single name: Speransky.\n\nStrangely enough even though you are on the run from them, you end up walking directly into the maw of the KGB so that you can escape them.\n\nThe irony is not lost on you as you walk past rows of tables and finally make the approach to a door with a frosted glass window on it, a plague beside the door identifying it as the border guard \noffice. You knock briskly and open the door as soon as you hear a reply from within, closing the door behind you as calmly as you can.\n\n\"Arseny Speransky?\"\n\n\"Yes?\"\n\n\"My apologies, can I borrow a match?\" you ask and make eye contact with the officer seated behind the desk.\n\n\"What kind of question...\" the officer starts, then abruptly stops and squints his eyes at you. \"Ah. I prefer a lighter.\"\n\n\"Better still,\" you say and close the distance to the table, offering a hand in greeting.\n\n\"Until they go wrong. Which one are you with then? You're not British or American. French?\"\n\n\"Doesn't matter, Speransky,\" you tell him as he reaches across the table and shakes your hand with a firm grip.\n\n\"Ah, I'll consider you French then,\" the man chuckles and pulls his hand away, sweeping a fingertip over his neat moustache. \"Let me guess, you need to get across the border. I will be honest, it \nis not a guess. It is the sole reason anyone comes to me in such a direct manner. Well, before we get to assembling any sorts of papers, let me tell you that Turkey has been sealed off meticulously on \nour side, but you can still get into Greece or Italy through Yugoslavia with fairly simple papers. I would not recommend the mountain roads from Bulgaria into Greece directly. You will not have a \npleasant time.\"\n\n*label starshina\n*choice\n\t#\"I need to get in contact with someone in Turkey. I had hoped to make into Istanbul.\"\n\t\t\"Unfortunately that will not be possible. It might be possible to obtain passage on a cargo ship through the Straits, but that would be by sheer stroke of luck. It would be very unlikely \n\t\tthat you can get onto a ship with even legitimate papers without already being on the crew manifesto,\" Speransky tells you and rubs his hand against his brow. \"If you truly wish to head \n\t\tto Istanbul, the better choice would be to head in through Greece. Or you could try to steal a boat and run the border out at sea, eh?\"\n\t\t\n\t\tSperansky bursts out in a brief bit of laughter, then catches himself and composes himself once more. You know as well as he does that taking the Black Sea route out from behind the Iron \n\t\tCurtain is just as dangerous as the land routes - perhaps even moreso since the Soviet patrol boats carry larger guns than foot patrols and watchtowers.\n\t\t*goto starshina\n\t#\"What is wrong with the direct route over the mountains?\"\n\t\t\"The border guards of course,\" the officer tells you and chuckles. \"There are only two crossings you have a chance to cross at, and both have recently received reinforcements from our \n\t\tfriends in Moscow. Were they Bulgarians, I could help you, but these are KGB men meant to make absolutely sure that the border holds. Even if you wish to force the issue at the crossing \n\t\tpoint, I would say it is quite unlikely that you will manage to cross without several bullets in you.\"\n\t\t*goto starshina\n\t#\"Is Yugoslavia really that safe?\"\n\t\t\"For the most part. Tito has been making overtures towards the Kremlin this year so the border guards have been more relaxed than usual. It is far from safe, but it would be your safest \n\t\toption if you do intend to get out to the West,\" the officer tells you and clears his throat.\n\t\t*goto starshina\n\t#\"Let's get this over with.\"\n\t\t*goto starrypaper\n\n\n*label starrypaper\nThe border guard officer reaches down to one of the drawers of his desk, pulling it open and recovering some papers that he quickly then places on the desk.\n\n\"Look, far be it for me who knows exactly what kind of chances you have on getting across which border to tell you what to do, but I would say that you want the Yugoslavian route. But, the choice \nis yours. What I write on these papers relies entirely on how brave you think you are. And how many spies of yours you desire dead as a response to the humiliation if you do manage to get through.\"\n\n\"These papers. They will be legitimate?\" you ask, to the amusement of Speransky.\n\n\"Oh, of course not. But they will be convincing enough to let you through if the guards are inclined to let anyone through in the first place.\"\n\n\"I do not intend to be caught if I can avoid it, and there has been far too much death already.\"\n\n*choice\n\t#\"I don't have too much time, I'll try the train from Sofia.\"\n\t\t*achieve bulgarian\n\t\t\"Mh, straight across it is then,\" Speransky says and picks up the papers one by one, passing them through a typewriter so he can fill them out.\n\t\t\n\t\tYou wait for near to an hour as the officer makes absolutely sure that the papers are convincing, redoing several pages after slip-ups that would throw a border guard to suspicious mode. \n\t\tThe few mistakes he does make are very intentional and carefully placed to mimic something a clerk might make.\n\t\t\n\t\t\"Have an excellent ${trip},\" Speransky finally says and breaks your wait, handing over the papers.\n\t\t\n\t\tWith your papers in hand you march straight back through the fairly open office, walk down the concrete stairwell, and walk out of the lion's den without so much as a question as \n\t\tto who you are. It feels too easy, but you nonetheless make your way back into the city and head to Sofia where you can take the train into Greece.\n\t\t\n\t\tNot even a full day after you were in Speransky's office you find yourself climbing up on an old rickety train car in Sofia, a single ticket in hand along with the papers authorizing you \n\t\tto cross by the way of a fake visa, travel clearance, and your fake passport.\n\t\t*page_break The Border.\n\t\t*goto greco\n\t#\"I can't afford to get caught at the border, so I suppose I shall try Yugoslavia.\"\n\t\t*achieve bulgarian\n\t\t\"Yugoslavia it is then,\" Speransky says and picks up the papers one by one, passing them through a typewriter so he can fill them out.\n\t\t\n\t\tYou wait for near to an hour as the officer makes absolutely sure that the papers are convincing, redoing several pages after slip-ups that would throw a border guard to suspicious mode. \n\t\tThe few mistakes he does make are very intentional and carefully placed to mimic something a clerk might make.\n\t\t\n\t\t\"Have an excellent ${trip},\" Speransky finally says and breaks your wait, handing over the papers.\n\t\t\n\t\tWith your papers in hand you march straight back through the fairly open office, walk down the concrete stairwell, and walk out of the lion's den without so much as a question as \n\t\tto who you are. It feels too easy, but you nonetheless make your way back into the city and begin your journey towards Yugoslavia.\n\t\t*page_break The Border.\n\t\t*goto yugo\n\n\n*label greco\nThe train comes to a halt right before the border after climbing up through the mountains for what feels like hours. Flashlights sweep across the side of the train on the outside, \nthe guards passing by making sure that all the curtains have been pulled shut to hide the border crossing from any curious gazes. The people working on the train were very meticulous in the \nsweep through the cars, making sure everyone understood that it was a matter of national security that those curtains are shut until the border is well behind the train.\n\nHowever for now your attention is on the three green-clad soldiers walking in with rifles slung around their shoulders and red stars adorning the front of their caps.\n\n\"[i]Papers![/i]\"\n\nThey speak with a commanding snap to their voices, which at the same time seems to carry a great deal of boredom as well. As they come down the car his naturally drowsy eyes fall on you, his \nvoice barking a command for you to hand over your papers, which you do. One after another the paper flick over in the guard's hands, his eyes taking in all the detailed information. Then \nvery casually, without lifting his eyes off the papers, he asks you a question. Surprisingly he asks it in Russian instead of Bulgarian like you had expected him to.\n\n*if (rng >= 15)\n\t\"Work trip, hm?\"\n\t*goto trickyone\n*elseif (rng \u003c= 5)\n\t\"Vacation, hm?\"\n\t*goto trickyone\n*else\n\t*set right true\n\t\"$!{trip}, hm?\"\n\t*goto trickyone\n\n*label trickyone\n*choice\n\t*if ((right = \"true\") and (trip = \"vacation\")) #\"Yes, I hear the Greek islands are very nice this time of year.\"\n\t\tThe border guard glances up at you for a brief moment, then looks back to your papers. He flicks through them again in a hurried motion, finally flips through your passport, then shakes \n\t\this head. With a bored sigh he hands the papers back to you.\n\t\t\n\t\t\"Have an enjoyable stay in Greece.\"\n\t\t*goto goonie\n\t*if ((right = \"true\") and (trip = \"vacation\")) #\"No I'm afraid I'm on a work trip. The Greek islands will have to wait for another time.\"\n\t\t*goto busted\n\t*if ((right = \"true\") and (trip = \"work trip\")) #\"Yes, it's a work trip. No time for enjoying the lovely Greek islands, I'm afraid.\"\n\t\tThe border guard glances up at you for a brief moment, then looks back to your papers. He flicks through them again in a hurried motion, finally flips through your passport, then shakes \n\t\this head. With a bored sigh he hands the papers back to you.\n\t\t\n\t\t\"Have an enjoyable stay in Greece.\"\n\t\t*goto goonie\n\t*if ((right = \"true\") and (trip = \"work trip\")) #\"No, I'm going on vacation. I hear the Greek islands are very nice this time of year.\"\n\t\t*goto busted\n\t*if ((right = \"false\") and (trip = \"vacation\")) #\"Yes, it's a work trip. No time for enjoying the lovely Greek islands, I'm afraid.\"\n\t\t*goto busted\n\t*if ((right = \"false\") and (trip = \"vacation\")) #\"No, I'm going on vacation. I hear the Greek islands are very nice this time of year.\"\n\t\tThe border guard glances up at you for a brief moment, then looks back to your papers. He flicks through them again in a hurried motion, finally flips through your passport, then shakes \n\t\this head. With a bored sigh he hands the papers back to you.\n\t\t\n\t\t\"Have an enjoyable stay in Greece.\"\n\t\t*goto goonie\n\t*if ((right = \"false\") and (trip = \"work trip\")) #\"Yes, I hear the Greek islands are very nice this time of year.\"\n\t\t*goto busted\n\t*if ((right = \"false\") and (trip = \"work trip\")) #\"No I'm afraid I'm on a work trip. The Greek islands will have to wait for another time.\"\n\t\tThe border guard glances up at you for a brief moment, then looks back to your papers. He flicks through them again in a hurried motion, finally flips through your passport, then shakes \n\t\this head. With a bored sigh he hands the papers back to you.\n\t\t\n\t\t\"Have an enjoyable stay in Greece.\"\n\t\t*goto goonie\n\t#\"Is there a problem?\"\n\t\t*if (right)\n\t\t\tThe border guard glances up at you for a brief moment, then looks back to your papers. He flicks through them again in a hurried motion, finally flips through your passport, then shakes \n\t\t\this head. With a bored sigh he hands the papers back to you.\n\t\t\t\n\t\t\t\"No, have an enjoyable stay in Greece.\"\n\t\t\t*goto goonie\n\t\t*else\n\t\t\tThe border guard glances up at you for a brief moment, then looks back to your papers. With a slow motion he moves on to your passport and flicks through the pages, letting you stew in \n\t\t\tthe silence for some time longer.\n\t\t\t\n\t\t\t\"Just answer the question,\" the guard tells you.\n\t\t\t*goto trickyone\n\t#Stay silent.\n\t\t*if (right)\n\t\t\tThe border guard glances up at you for a brief moment, then looks back to your papers. He flicks through them again in a hurried motion, finally flips through your passport, then shakes \n\t\t\this head. With a bored sigh he hands the papers back to you.\n\t\t\t\n\t\t\t\"Have an enjoyable stay in Greece.\"\n\t\t\t*goto goonie\n\t\t*else\n\t\t\tThe border guard glances up at you for a brief moment, then looks back to your papers. With a slow motion he moves on to your passport and flicks through the pages, letting you stew in \n\t\t\tthe silence for some time longer. \n\t\t\t*goto busted\n\n*label busted\nFor a time there is only silence while the guard flips through your papers again, then he steps back with you papers and extends an arm towards the empty side of the aisle.\n\n\"Comrade, you will have to come with me. There are some irregularities we must check,\" he tells you with a monotonous pace to his words.\n\n*label bustedpro\n*choice\n\t#Stay where you are and protest.\n\t\t*set charm -5\n\t\t\"There must be a mistake,\" you protest and draw the guard's ire, his face scrunching into a glare. \"My papers are in order.\"\n\t\t\n\t\t\"Comrade, get up and come with me,\" the guard repeats and frowns at your protest. \"This is your final warning before we drag you out of this train.\"\n\t\t*goto bustedpro\n\t#Go along with the intention of bribing the guard.\n\t\t*set charm +5\n\t\tWith a sigh you stand up and reach up above your seat to collect your briefcase, slinging it down to your side before looking at the guard and slowly stepping past him. Behind this guard \n\t\tof yours, his two fellows continue checking the rest of the seats in the car, but you are walked down the aisle towards the door leading out. You slide open the heavy door between the seating \n\t\tarea and the little vestibule forming a connection between the two passenger cars. The guard slides the door shut behind him and you step down to open the door leading outside, then halt. \n\t\tWhile you have been walking, you've thumbed open the hidden compartment in the briefcase handle and slipped a couple of gold bullion coins into your hand - worth \n\t\t\n\t\t*if ((talking >= 50) and (charm > 55))\n\t\t\t*set covert +5\n\t\t\t*set guard \"bribed\"\n\t\t\t\"Look, I realize you are simply doing your job,\" you tell the guard and glance over your shoulder. \"But I must get across the border. I do not have time for this, and I am sure you are \n\t\t\teager to return to your post without more papers to fill.\"\n\t\t\t\n\t\t\tSlowly and with your hands in full view of the guard at all times you turn, then switch your briefcase from one hand to the other so you can show the guard the couple of gold coins \n\t\t\tthat are probably worth more than he makes in years of dutiful service. The guard pauses and looks at the coins, then at you, then back towards the inside of the seating area where his \n\t\t\tfellows are still looking through the paperwork of other passengers. You glance back to the door leading out, thankful that the communist regimes are so dutiful about closing the curtains \n\t\t\twhen crossing a border since you are avoiding any curious looks from outside.\n\t\t\t\n\t\t\t\"Do we have an agreement?\"\n\t\t\t\n\t\t\tThe border guard sucks on his teeth and furrows his brow, then glances back to his fellows before turning back to you again. With a deep breath he reaches out with one hand handing over \n\t\t\tyour papers. At the same time as you take hold of the papers, you drop the gold coins in their place, rewarding this man for letting you pass without issue. Both of you wait for a moment \n\t\t\tlonger, then return into the cab where the guard guides you quite forcefully back to your seat, showing up a bit in front of the other border guards.\n\t\t\t*goto passingthrough\n\t\t*else\n\t\t\t\"You're doing your job,\" you say to the guard and glance over your shoulder. \"But we don't have to go out there. We can handle this right here.\"\n\t\t\t\n\t\t\tSlowly and with your hands in full view of the guard at all times you turn, then switch your briefcase from one hand to the other so you can show the guard the couple of gold coins \n\t\t\tthat are probably worth more than he makes in years of dutiful service. The guard pauses and looks at the coins, then at you, then back towards the inside of the seating area where his \n\t\t\tfellows are still looking through the paperwork of other passengers. You glance back to the door leading out, thankful that the communist regimes are so dutiful about closing the curtains \n\t\t\twhen crossing a border since you are avoiding any curious looks from outside.\n\t\t\t\n\t\t\tThe border guard sucks on his teeth and furrows his brow, then glances back to his fellows before turning back to you again. He hesitates.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Attack him while he's preoccupied.\n\t\t\t\t\t*set covert -5\n\t\t\t\t\t*set charm -10\n\t\t\t\t\tYou take the opportunity and bring your briefcase suddenly up in a wide swing, clocking the border guard square on the jaw with the hard edge. You see the corner hits hard enough \n\t\t\t\t\tto cut him and force him to stagger back from both impact and surprise alike, but while he is trying to bring his weapon to bare you launch yourself at him and force him into the \n\t\t\t\t\tsmall and cramped bathroom of the train car. Your briefcase falls to the floor right next to the door, both your hands now free to grapple with the guard.\n\t\t\t\t\t\n\t\t\t\t\tYou ball the hand that is holding the gold bullion coins into a fist, the coins within reinforcing your hand as you bring it to bear on the surprised soldier. It barely takes two \n\t\t\t\t\tpunches after the sudden strike from your briefcase to force him to fall limp against the toilet seat.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Snap his neck.\n\t\t\t\t\t\t\t*set guard \"dead\"\n\t\t\t\t\t\t\t*set kills +1\n\t\t\t\t\t\t\t*goto assaulter\n\t\t\t\t\t\t#Make sure he's unconscious and tie him up.\n\t\t\t\t\t\t\t*set guard \"tied\"\n\t\t\t\t\t\t\t*goto assaulter\n\t\t\t\t\t\t#Muffle him and leave him.\n\t\t\t\t\t\t\t*set guard \"muffled\"\n\t\t\t\t\t\t\t*goto assaulter\n\t\t\t\t#Wait patiently.\n\t\t\t\t\t*set covert +5\n\t\t\t\t\t*set guard \"bribed\"\n\t\t\t\t\tThere's a brief moment where the border guard looks as if he is about to turn your offer down and push you out the door, but then he glances back to his fellow guards in the car \n\t\t\t\t\tand lets out a sight.\n\t\t\t\t\t\n\t\t\t\t\tThen he reaches out, handing you your papers and your passport. At the same time as you take hold of the papers, you drop the gold coins in their place, rewarding this man for \n\t\t\t\t\tletting you pass without issue. Both of you wait for a moment longer, then return into the cab where the guard guides you quite forcefully back to your seat, showing up a bit in \n\t\t\t\t\tfront of the other border guards.\n\t\t\t\t\t*goto passingthrough\n\t#Go along with the intention of killing the man when you're out of sight.\n\t\t*set charm -5\n\t\t*set welrod -1\n\t\t*set covert -5\n\t\t*set kills +1\n\t\tWith a sigh you stand up and reach up above your seat to collect your briefcase, slinging it down to your side before looking at the guard and slowly stepping past him. Behind this guard \n\t\tof yours, his two fellows continue checking the rest of the seats in the car, but you are walked down the aisle towards the door leading out. You slide open the heavy door between the seating \n\t\tarea and the little vestibule forming a connection between the two passenger cars. The guard slides the door shut behind him and you step down to open the door leading outside, then halt.\n\t\t\n\t\tThere is a strange icy calm that you always feel build up when you plan death and destruction, while at the same time the familiar wash of adrenaline pumps through your system. With your \n\t\tback to the border guard it is easy to lift your free hand up and take hold of the Welrod hidden inside your jacket. You could also go for the small pistol in the holster, but you do not \n\t\thave a suppressor for it - and the Welrod was a very knowing choice to make sure you had a quiet option for a scenario such as this.\n\t\t\n\t\tYou take in a deep breath and then whip around, clocking the border guard with your briefcase directly on the jaw. You see that the corner hits hard enough to cut him and force him to stagger \n\t\tback from both impact and surprise alike, but while he is staggering back towards the small cramped bathroom and trying to bring his weapon to bare, you extend your arm and let off a single \n\t\tshot from the Welrod at near to point-blank range.\n\t\t\n\t\tIt's impossible to miss from here. A red mist paints the mirror in the bathroom, the guard slumps back and falls over the toilet. \n\t\t*if ((welrod \u003c 2) and (welrod > 0))\n\t\t\tYou take note that the Welrod has become a fair bit louder than it used to be. The repeated shots must have started to wear out the rubber washers inside the suppressor part, and now \n\t\t\tthe sound is becoming closer to what a regular attachable suppressor sounds like. You have maybe one shot left before you must begin to think far more carefully even about when to use \n\t\t\tyour silenced pistol.\n\t\t\t*page_break\n\t\t\t*goto assaulter\n\t\t*elseif (welrod \u003c= 0)\n\t\t\tYou take note that the Welrod has become a fair bit louder than it used to be. The repeated shots must have started to wear out the rubber washers inside the suppressor part, and now \n\t\t\tthe sound has become closer to what a regular attachable suppressor sounds like. You will have to be far more careful about when to use your silenced pistol from now on.\n\t\t\t*page_break\n\t\t\t*goto assaulter\n\t\t*else\n\t\t\t*page_break\n\t\t\t*goto assaulter\n\t#Go along with the intention of knocking out the man when you're out of sight.\n\t\t*set charm -5\n\t\t*set covert -5\n\t\tWith a sigh you stand up and reach up above your seat to collect your briefcase, slinging it down to your side before looking at the guard and slowly stepping past him. Behind this guard \n\t\tof yours, his two fellows continue checking the rest of the seats in the car, but you are walked down the aisle towards the door leading out. You slide open the heavy door between the seating \n\t\tarea and the little vestibule forming a connection between the two passenger cars. The guard slides the door shut behind him and you step down to open the door leading outside, then halt.\n\t\t\n\t\tYou take in a deep breath and then whip around, bringing your briefcase up in a wide swing, clocking the border guard square on the jaw with the hard edge. You see the corner hits hard enough \n\t\tto cut him and force him to stagger back from both impact and surprise alike, but while he is trying to bring his weapon to bare you launch yourself at him and force him into the \n\t\tsmall and cramped bathroom of the train car. Your briefcase falls to the floor right next to the door, both your hands now free to grapple with the guard.\n\t\t\n\t\t*if ((combat = 90) or ((combat > 50) and (charm \u003c 45)))\n\t\t\t*achieve judo\n\t\t\tIt takes only a single chop in the right spot on the neck for your opponent to suddenly crumple down against the toilet. He's safely unconscious.\n\t\t\t*goto assaulter\n\t\t*elseif (combat >= 50)\n\t\t\tYou ball your hand into a solid fist and let fly. The initial hit with your briefcase did wonders, and so it requires no more than three hits to bring the border guard to the point of \n\t\t\tgoing down. A final blow makes him crumple against the toilet, unconscious.\n\t\t\t*goto assaulter\n\t\t*else\n\t\t\tYou ball your hand into a solid fist and let fly. The pain is excruciating in your hand and you could swear you hear a crunch when your knuckles come into contact with the border guard's \n\t\t\tface. He's putting up a struggle, coming to from the initial blow with your briefcase, and in the hurry to make sure he does not have the opportunity to turn the tables on you, you grab \n\t\t\thim by the head. You put your full bodyweight into a sudden hop and tug, bringing your opponent's head smashing against the small sink. His eyes roll back and he suddenly slumps down \n\t\t\tagainst the toilet, quite unconscious.\n\t\t\t*goto assaulter\n\n\n\n*label assaulter\nYou make sure to collect your papers before you shut the bathroom door, then force the handle until you hear a snap somewhere inside the door. Then, as calmly as you can with adrenaline pumping \nthrough you, you return and walk past the other border guards, offering them a quick smile before you scoot over to your seat. With a deep exhale you settle back down in your seat and close your \neyes, waiting for the train to continue onward.\n\n*label passingthrough\nAs the border guards pass and then convene with other guards coming down from the other direction, they report that there have been no problems, get off the train, and a whistle blows. With a screech \nthe train begins to grind against the tracks and slowly picks up speed. By the time the border guards become aware of their missing comrade you are safely on the Greek side having your passport \nstamped.\n\n*label goonie\n*goto endscene\n\n\n\n\n*label yugo\nAs Speransky promised, the Yugoslavian border appears to be very much a cakewalk. You arrive on a busy bus heading towards the Adriatic, carrying people going on holiday and family travelling to \nmeet their kin, or conversely returning from such a trip. A few seem to be businesspeople, which is quite surprising since the bus is not exactly of very high quality. The border from Bulgaria into \nYugoslavia looms ahead of you and the bus comes to a halt on the Bulgarian side.\n\nYou see the guards outside head over, one bearing a pole with a mirror attached to the end of it, another is holding the leash of a particularly large German Shepherd. The doors to the bus open \nwith a hiss, allowing one of the border guards into the vehicle. With a clipboard in hand, probably filled with images of wanted people, he comes and checks everyone's face, comparing what he \nis seeing to what is on his clipboard. Then he climbs back out of the bus and confirms that nobody else has found anything, at which point you are able to drive off towards the Yugoslavian side.\n\n[i]Go with the flow, blend in.[/i]\n\nThe bus comes to a halt again, this time forcing you to get off the bus for a quick journey into the customs office. After about ten minutes of queueing you get to the border guard waiting for you, \nthen let him take your passport and visa, and everything else that you had been given as far as documentation goes.\n*page_break\nThere's no problems. The border authorities do not even glance twice your way, just stamp away at your passport and visa to make sure they've all been marked for you. It's a very simple and \nstraightforward affair. There aren't even any basic questions to answer. Once you head away from the building you climbing back up onto the bus, waiting around for a moment for everyone to get \nback before the bus trundles off into the heart of Serbia.\n\nEventually you reach the border from Yugoslavia into Greece, only to find it of similarly trivial nature. While Speransky's papers are useless at this point, this is exactly where your many false \npassports come into play, equipping you with an identity that brings little notice from the Greeks. You have crossed Greek border security before, always with little trouble, and this continues \nthat long list of fair luck with this group of authorities - even if you happen to be coming in from a Communist state.\n\n*label endscene\n*finish Chapter 4: Burn Notice\n\n\n\n\n\n\n\n\n\n\n\n\n", "desertrats": "*comment 5109\n\nSèkou Marcine.\n\nThat is the name of the revolutionary you've been sent to find and investigate. The hot air circulates slowly through your small sweaty one-room apartment on the outskirts of Danané thanks solely \nto the ceiling-mounted fan. The wooden blinds rattle gently against the windowframe, while the small city echoes with the sound of the morning adhan. You can see that tall minaret from which the \ncall is given five times a day from your window, the structure marking the single mosque servicing the entire population. You take a deep breath, groaning in agony over the stinging of hot sweat \non your skin as the warm air continues to scorch you. A week you have been here and you still haven't gotten used to this. With a sigh you get to work and open a thick manila envelope, the very \nfirst page graced by the picture of the target.\n\nSèkou Marcine developed revolutionary tendencies during his education in metropolitan France. The dossier on him lists every place he has ever lived in, every known international trip, as well as \nany jobs and relationships he has ever forged. To be perfectly honest, you skim through most of that section since it is very thick indeed, and because you aren't expected of making contact with him \nunless absolutely necessary. You did take note that right before leaving France, now almost a full year ago, he had been involved with the student unions of Marseilles and at the same time had had \nclose ties with a girl by the name of Evony.\n\nShe might be a possible way to contact him, but according to Jacques Martin - your handler stationed in Abidjan - the girl had never left France. So that is not an option. However, it is clear from \nMarcine's recorded actions in Africa that he has returned to his home continent in order to spread the seed of revolution. Not that Algerian mess, mind you. That's something even Soviet agitators \nwould refuse to touch as far too likely to blow up in their face. No, the rumour about Sèkou are that he's been gathering support from local tribes and Liberian political outcasts in order to overthrow \nthe Liberian government.\n\nEstablishing a communist revolution in the place that once was the promised land for freed slaves from the United States would be a great victory for the Soviets, and a considerable embarrassment to \nthe Americans. You are here to make sure that does not happen. Not by acting directly, mind you, just by making sure information passes on to the Americans before things become too dire.\n*page_break\nYou sit at the window of the house you have been staying in for months now, peering through a telescope mounted on a tripod, marking down details of a curious little yellowish-tan Opel that has \ncome to travel with an open-bed truck at all times. The truck in turn is filled with men carrying AK-47 rifles and wearing no particularly distinguishable identifier of whether they belong to any \nkind of militia or tribe. That all has been stripped from them when they swore themselves to this revolutionary group growing stronger still with each passing day.\n\nYou have a full manila folder of notes already, detailing how many people Sèkou Marcine travels with, how he travels, at which times he travels. All of it becomes detailed in your notes which in \nturn are compiled into reports that leave for Langley via your handler. Unfortunately, Marcine has become less and less of a fixture in Danané during the past couple of weeks, prompting you to \nstart tailing him as best you can, and sneaking into his house when possible.\n\nThere has been proof of him receiving gems which go towards paying for smuggled arms and bribing officials. He has been courting people from Liberia, Côte d'Ivoire, and Mali, all with the intention \nof assembling an alliance of political outcasts and tribal powers to help in his cause.\n*page_break\nYour long seven-month journey on the tail of Marcine finally comes to an end with a message transmitted via the numbers station in Senegal. The message is simple: compile your information and \narrive at a meeting point near the Liberian border in two days. You are also given a phone number to call. Your callsign has been given as Phoenix, the American agent's as Scorpio. The next day you \ncall the number given to you, letting the line ring three times before you hang up, then dial it again. The other line is answered immediately and all you hear is silence.\n\n\"Phoenix active.\"\n\n\"Scorpio activated.\"\n\nYou hang up the line immediately and take in a deep breath. The meeting has been confirmed, now you have to make your way north to Yéalé and wait for your American contact.\n*page_break\nYou tug at the coarse thin scarf wrapped around your neck, grimacing as you feel just how permeated it is with dust and sweat. Despite how disgusting it feels, you flip it up to cover your mouth \nand nose as a lone truck trundles down the path towards you. The squeaking of the suspension was the first thing you had heard as the truck appeared over the little ridge to your north, quickly \nfollowed by the bangs and warbles of the misfiring engine. The gearbox whines like a hurt animal as the truck glides into the little valley between the ridge it had just climbed and starts climbing \nup to the hilltop you are standing on. It's an old truck, built either for the war or just before it, and brought to Liberia well after it should have been put out to pasture - but beggars can't \nbe choosers.\n\n\"Bad time to be standing around in the middle of nowhere, friend! Finding any fish?\"\n\nYou look up and see a wide-jawed man leaning out of the truck cabin, his chiselled features glistening with a thick layer of sweat that cannot feel good on the small patch of razor-burn on \nhis neck. The truck screeches to a halt right beside you and you see more faces appear, this time from the back of the truck as a group of three more men stand up, dressed in a dull green \nthat marks them as some kind of military force.\n\n\"I would, but I'm a bit busy waiting for someone. I'd be holding a sign, but they are a bit cliché don't you think?\" you continue the assigned passphrase, pull down the cloth from your face, \nthen walk up to the truck so you can reach up and shake hands with the man. \"Good morning to you, Scorpio. Or do you prefer Mr. Ides? I trust Liberia has treated you well?\"\n\n\"It's hot, it's on the brink of collapsing, but it's like made for Africa - just like this truck,\" the man chuckles and opens the door with a loud screech so you can get in, Ides and the driver \nscooting over so you can have a seat inside. \"And please, call me Brandon.\"\n\nAs you sit down and slam the door shut behind you, you notice a bundle of papers on the dashboard. A map of the border region between Côte d'Ivoire and Liberia, mission documents peeking out \nfrom thick manila folders, but the one file that catches your attention the most is a set of papers clipped together with a photograph of you in uniform from a few years back. \n\n*choice\n\t#In the picture I see a woman.\n\t\t*set gender \"female\"\n\t\t*goto picturednice\n\t#I am neither, I only see myself as I am.\n\t\t*set gender \"n/a\"\n\t\t*goto picturednice\n\t#In the picture I see a man.\n\t\t*set gender \"male\"\n\t\t*goto picturednice\n\n*label picturednice\nYou're wearing the uniform of the French police, face neutral and looking directly at the camera, although you know that inside you were feeling the happiest you had in years when that particular \npicture was taken. You had just been accepted into the [i]Service de Documentation Extérieure et de Contre-Espionnage[/i], your native French answer to organizations such as the CIA and MI6, and \nthat picture was on the card that granted you access to the training facility where you started your secretive career.\n\nWith a smirk you take note that the document has your age off by three years. Fortunately that is three years for the better. You lower your gaze to the [i]nom de guerre[/i] - an alias that you \npicked during basic training to anonymize your new persona - and see that they certainly have your surname right:\n\n*choice\n\t#Durand\n\t\t*set surname \"Durand\"\n\t\t*goto surnam\n\t#Gaillard\n\t\t*set surname \"Gaillard\"\n\t\t*goto surnam\n\t#Lemaire\n\t\t*set surname \"Lemaire\"\n\t\t*goto surnam\n\t#Legrand\n\t\t*set surname \"Legrand\"\n\t\t*goto surnam\n\t#Martin\n\t\t*set surname \"Martin\"\n\t\t*goto surnam\n\t#None of these.\n\t\tIf none of those are your chosen surname, what is?\n\t\t\n\t\t*input_text surname\n\t\t*page_break\n\t\t*goto surnam\n\n\n*label surnam\nYou reach out and thumb at the paper out of curiosity, picking it up to read through the dossier assembled on you. It is quite thorough, although for the most part you have not done much of \nanything that is notable enough to reach foreign agencies. Intelligence gathering for the most part is tedious work, and being stuck in Italy for the first two years in the service did \nnothing at all to help with that. This mission, undertaken with Brandon Ides and his team of American agents - all of whom you had read similar dossiers of - would be your big chance to \nprove yourself as a capable field agent to boot.\n\n\"I hope we have everything right,\" the man seated next to you says with a chuckle before leaning forward to pick up the map, the truck meanwhile picking up speed and trundling along once more.\n\n\"Most things,\" you respond vaguely and place the documents back on the pile, tucking the papers into a folder until you can barely see your first name:\n\n*if (gender = \"male\")\n\t*choice\n\t\t#Alex\n\t\t\t*set name \"Alex\"\n\t\t\t*goto firnam\n\t\t#Claude\n\t\t\t*set name \"Claude\"\n\t\t\t*goto firnam\n\t\t#François\n\t\t\t*set name \"François\"\n\t\t\t*goto firnam\n\t\t#Louis\n\t\t\t*set name \"Louis\"\n\t\t\t*goto firnam\n\t\t#Michel\n\t\t\t*set name \"Michel\"\n\t\t\t*goto firnam\n\t\t#Olivier\n\t\t\t*set name \"Olivier\"\n\t\t\t*goto firnam\n\t\t#None of these.\n\t\t\tIf none of those are your chosen name, what is?\n\t\t\t\n\t\t\t*input_text name\n\t\t\t*page_break\n\t\t\t*goto firnam\n*elseif (gender = \"female\")\n\t*choice\n\t\t#Aimée\n\t\t\t*set name \"Aimée\"\n\t\t\t*goto firnam\n\t\t#Colette\n\t\t\t*set name \"Colette\"\n\t\t\t*goto firnam\n\t\t#Dominique\n\t\t\t*set name \"Dominique\"\n\t\t\t*goto firnam\n\t\t#Hélène\n\t\t\t*set name \"Hélène\"\n\t\t\t*goto firnam\n\t\t#Olivia\n\t\t\t*set name \"Olivia\"\n\t\t\t*goto firnam\n\t\t#Sophie\n\t\t\t*set name \"Sophie\"\n\t\t\t*goto firnam\n\t\t#None of these.\n\t\t\tIf none of those are your chosen name, what is?\n\t\t\t\n\t\t\t*input_text name\n\t\t\t*page_break\n\t\t\t*goto firnam\n*else\n\t*choice\n\t\t#Alex\n\t\t\t*set name \"Alex\"\n\t\t\t*goto firnam\n\t\t#Camille\n\t\t\t*set name \"Camille\"\n\t\t\t*goto firnam\n\t\t#Dominique\n\t\t\t*set name \"Dominique\"\n\t\t\t*goto firnam\n\t\t#François\n\t\t\t*set name \"François\"\n\t\t\t*goto firnam\n\t\t#Manu\n\t\t\t*set name \"Manu\"\n\t\t\t*goto firnam\n\t\t#Maxime\n\t\t\t*set name \"Maxime\"\n\t\t\t*goto firnam\n\t\t#None of these.\n\t\t\tIf none of those are your chosen name, what is?\n\t\t\t\n\t\t\t*input_text name\n\t\t\t*page_break\n\t\t\t*goto firnam\n\n\n*label firnam\nAs the journey continues, your American colleague shows you the map in order for you to detail the information that you have gathered so far. It's been nearly seven months of hard work concentrated \non a single man. Your one-agent operation has revealed that this is in fact the case, and it is fairly likely that the Soviet Union is supporting Marcine. The CIA will not tolerate such a presence, \nespecially if the Soviets are involved. Since his activities appear to be concentrated in what was French West Africa up until some years ago, the Americans require at least some cooperation from you \nin order to strike quickly and cut the head off the snake - nevermind the fact that it'll look good in the inter-agency cooperation briefs.\n\n\"If he follows the same kind of schedule as he has over previous visits, Marcine will be leaving a village here in the valley at sundown. They travel at night between villages, but this \nis as close to the Sudan that they have ever come, so I cannot be sure,\" you inform your CIA counterpart who nods quietly beside you. \"The column is most often composed of a few riders \nflanking a truck and an old Opel. Marcine travels in the Opel, in front of the truck.\"\n\n\"They will have to use flat ground then. Paths, roads, that type of thing,\" Ides muses and looks at your finger sweeping down across his very detailed map of the region. \"Good. The options \nare limited for them. We can close off the paths they are most likely to use when they get here.\"\n\n\"Although it might seem like it, this area is not covered in vegetation or rocky ground. They can still escape in any direction, especially now that the ground will be dry and solid under \ntheir wheels. Your better chance would be here, where the first road is. They will be using the roads as much as they are able to, and where they join the road is where you should strike.\"\n\n\"So, if they move east, we should strike here,\" the American taps the map with a finger, then sweeps to another point. \"And if they travel south, we can strike here. I cannot split my men, \nbut we can drive in between these roads, roughly where a line drawn from the closest points meet, so we can intercept them no matter which way they go. I'll need to send a scout out... \nWell, good thing we brought in good radios.\"\n*page_break\nYou have plenty of time to go around and drop off a couple of these American commandos, equipping them with radios and giving them a frequency to tune to before the truck trundles off again. \nEventually you come to a comfortable stop, the leaf springs creaking below the truck bed as the engine gulps in air and finally stops. The trees on either side of the truck block vision to \nthe little dirt path you've been following.\n\nAside from Brandon's men climbing around in the back of the truck, there is nothing but silence around you. The forest is quiet, still, and for a moment you feel the flow of fresh air as \nyou pop the door open. It doesn't last long. As quickly as the breeze comes it goes again, leaving behind the usual overbearing humid heat that nearly makes you choke.\n\nIn such a climate, and with no way of knowing how long you will be waiting, you could almost leap into the American's arms when he reveals that an insulated cooler box has been hidden away \nin the back of the truck. The window into the cabin slides open and one of the men in the back reach in with cool bottles of beer and cola. The cool bottle alone feels heavenly enough, \nthen you take in the first sip and can't help but let out a groan that could better fit in a commercial.\n\nBrandon chuckles and takes a swig of his own bottle, leaning back against the seat while you settle in and wait. You look at him, catching a glance directed towards you at the same time, and \nsee a smile crawling onto Brandon's face as he looks at you with an open posture.\n*page_break\nIt takes almost two hours before you finally hear something from the American scouts left out to observe the possible routes from the village. The time is spent chatting casually about things, \nintermittently going through Sèkou's profile time and time again to make sure the operation is on a rock solid base. Then, finally, the hushed atmosphere of the truck is broken by a steady \nstream of beeps. The morse code comes in clear after some tweaking of the tall antenna the Americans have rigged up, telling you that the convoy is on the way and heading for the southern route.\n\nExcellent. That is where you shall be heading then. Brandon gives the signal and the commandos rush to send out a copy signal, then take down the antenna. Everyone climbs back into the truck \nand someone bangs twice on the roof of the cab, giving the signal that everyone is inside. By that point the engine is already coughing to life.\n\nWith a powerful yank at the steering wheel, the driver turns you around and slams his foot down as hard as he can. The engine of the truck complains under the sudden stress and you can \nhear a painful sound of crunching coming from the gearbox as the American tries to shift into higher gear. Clearly these Americans should stick to their automatic transmissions and stop \ntorturing these poor cars.\n\nFor a moment, you imagine it might be better for you to drive. After all, driving is right there on par with being able to talk and handle yourself in combat as the trinity of basic skills \nthat matter most to any good secret agent.\n\n*choice\n\t#In another life I could have perhaps become a racing driver, but right now we don't have the time for a driver switch.\n\t\t*set driving 90\n\t\t*set disguises -90\n\t\t*goto drivestep\n\t#I'm one of the best drivers I know, but unfortunately we don't have time for a driver switch.\n\t\t*set driving 70\n\t\t*set disguises -70\n\t\t*goto drivestep\n\t#Well, I couldn't be any worse, that much is certain.\n\t\t*set driving 50\n\t\t*set disguises -50\n\t\t*goto drivestep\n\t#Perhaps not, I'm a fairly lousy driver to be completely honest.\n\t\t*set driving 30\n\t\t*set disguises -30\n\t\t*goto drivestep\n\t#Then again, better not. I'm a terrible driver and would just end up driving us into a ditch.\n\t\t*set driving 10\n\t\t*set disguises -10\n\t\t*goto drivestep\n\n\n*label drivestep\nIt takes near to fifty minutes to reach the road on an intercept course, leaving the group with only about ten to get ready for the column. However, as you see from the Americans jumping \nout of the truckbed and rushing to any place with cover, it's clear that they are well enough rehearsed that they only need five. The truck is pulled away to the side of the road and \nthe driver hops out to open the hood, acting as if it has overheated or broken so it doesn't seem too out of place.\n\n\"Go out with the driver,\" Brandon tells you while loading his pistol, since he intends to hide in the cabin. \"We need someone who can speak fluent French out there.\"\n\nThere's no room for debate. The door squeaks open and you hop out, slamming the door shut behind you as you join the driver who has so far uttered not a single word to you or anyone \nelse. As you lean up against the side of the truck, letting the driver handle the acting while you make yourself seem disinterested and bored, the driver reaches over and taps your arm \nwith something hard. You look down and see that the object is a pistol - a small and discreet sidearm that you could easily hide up your sleeve. As you reach out and take the pistol \ninto your hand, you can't help but reflect on all the years of training.\n\n*choice\n\t*if (not (combat = 90)) #I'm responsible for breaking all the marksmanship records in the agency, and I'm excellent in close quarters as well.\n\t\t*set combat 90\n\t\t*set disguises -90\n\t\t*goto combatstep\n\t*if (not (combat = 70)) #The shooting range always treated me well, my grouping is always tight and when that fails me I'm able to defend myself in other ways.\n\t\t*set combat 70\n\t\t*set disguises -70\n\t\t*goto combatstep\n\t*if (not (combat = 50)) #I'm a capable agent, both with a weapon and without. I have exactly the skills expected of me, although I have hardly perfected them.\n\t\t*set combat 50\n\t\t*set disguises -50\n\t\t*goto combatstep\n\t*if (not (combat = 30)) #Shooting is not my strong suit, but I manage well enough and can defend myself in a pinch.\n\t\t*set combat 30\n\t\t*set disguises -30\n\t\t*goto combatstep\n\t*if (not (combat = 10)) #Unfortunately I'm an absolutely terrible shot and flinch every time I even think of punching someone.\n\t\t*set combat 10\n\t\t*set disguises -10\n\t\t*goto combatstep\n\n\n*label combatstep\nYou lower your hand and slide the pistol into your pocket, keeping your hand on it to mask the shape through the fabric. Then you wait. And you wait. And you wait.\n\nIt feels like an eternity, but you welcome it as time to use for figuring out what you will say in case the Americans' target stops to talk and perhaps even help. Although it does not \nfit the profile that you have been able to build of Sèkou Marcine, it might happen nonetheless and you have to plan ahead in case it does. Either way, the column will come to a stop \nalmost right beside you.\n\nThen you hear the sound of cars: a higher-pitched whine of a six-cylinder Opel mixed with the rumble of a truck. It's the final chance to pick your words, but as the pressure mounts \nand you feel your heart pound almost in your throat, it becomes difficult to find them as easily as before.\n\n*choice\n\t*if (not ((driving = 90) or (combat = 90))) #I will improvise, as I always do. Talking to people comes entirely naturally to me.\n\t\t*set talking 90\n\t\t*set disguises -90\n\t\t*goto talkingstep\n\t*if (not ((driving = 70) or (combat = 70))) #Nonetheless, I have the words in mind. I have always been excellent at talking to people.\n\t\t*set talking 70\n\t\t*set disguises -70\n\t\t*goto talkingstep\n\t*if (not ((driving = 50) or (combat = 50))) #I still have time, I trust I will be able to find the words again, although I might have to keep it a bit short.\n\t\t*set talking 50\n\t\t*set disguises -50\n\t\t*goto talkingstep\n\t*if (not ((driving = 30) or (combat = 30))) #Better keep it short and simple. Being elaborate will only prove your downfall, as it always does.\n\t\t*set talking 30\n\t\t*set disguises -30\n\t\t*goto talkingstep\n\t*if (not ((driving = 10) or (combat = 10))) #Perhaps it would be better to be silent after all. You've never been able to find the right words.\n\t\t*set talking 10\n\t\t*set disguises -10\n\t\t*goto talkingstep\n\n\n*label talkingstep\nThe short column of cars drives slowly, although surprisingly the riders that usually accompany the cars are not there. You can feel the pounding of your heart against your chest as \nthe pressure mounts and you feel yourself become more and more scared that this is not your ambush any more, but instead a trap. The Opel comes down the road at speed, as if it's in a hurry, \nthe dust kicked up by its tires occasionally masking the truck from view. If there is an emergency, that might explain the riders being left behind as a slow hindrance.\n\nThe column doesn't show any sign of stopping beside you to check on your truck or your wellbeing. Good. Instead they rush down the road past you, kicking a cloud of dust in your face just \nbefore they reach the mine placed on the road by one of the Americans. You feel the shockwave hit your chest, but the sound of the explosion is immediately muffled by a strong ringing \nin your ears. The Americans launch into action while the Opel and the truck careen off the road in desperation to try and survive the ambush. The mine went off too soon and exploded at \nfirst contact, meaning the heart of the explosion hit the Opel's engine which blocked a majority of shrapnel.\n\nThe truck accompanying the Opel empties. A dozen men with AK-47 rifles jump out and rush to take cover, answering the Americans' fire with an onslaught of rapid-fire bursts. One by one the \nmen drop down dead, but there are still plenty of them, and they are making their way to the Opel in a chaotic formation.\n*choice\n\t#Take cover and get involved in the fighting.\n\t\tYou rush around the front of the truck and take cover on the other side, lifting up the pistol handed to you so you can take aim. The group of enemies keeps backing away towards the \n\t\tOpel slowly, some of them occasionally kneeling to get off some aimed shots. You land your sight picture on one of them and squeeze the trigger just as he's aiming for one of the \n\t\tAmericans hurrying to switch cover.\n\t\t\n\t\t*if (combat > 50)\n\t\t\t*set kills +1\n\t\t\tBefore the man can take the clear shot you suddenly see a red mist blow out from the other side of his head, your finger having pulled tight against the handle, the barrel of \n\t\t\tyour pistol smoking a bit. That was a really good shot, if you say so yourself. You look up towards the Americans, seeing the soldier there has gotten to new cover and is unleashing \n\t\t\thell on the defenders with renewed vigour.\n\t\t\t\n\t\t\t*goto skipparoo\n\t\t*else\n\t\t\t*set kills +1\n\t\t\tThe AK goes off in a short aimed burst just before you get your aimed shot off. The first shot of yours hits him in the shoulder, tossing him back in surprise and pain. The second \n\t\t\tshot hits him square in the chest, right over the heart if you see the splash of blood correctly. You glance up at the Americans and see a couple of them have broken from cover \n\t\t\tto recover their wounded fellow, pulling him back so they can staunch the bleeding.\n\t\t\t\n\t\t\t*goto skipparoo\n\t#Take cover and let the Americans handle the fighting.\n\t\tYou rush around the front of the truck and take cover on the other side, peering out to see the events unfolding before you. \n\t\t*goto skipparoo\n\t#Keep watching the scene unfold.\n\t\t*goto skipparoo\n\n\n*label skipparoo\nAs the enemies rush towards the Opel, they bunch up into a tight cluster. You see a small sphere arc through the air and land in their midst, then burst in a sudden explosion that \nslaughters the bunched up defenders. By this point Brandon has crawled out of the truck cabin and is watching the insurgents collapse, their AKs clattering onto the ground as they fall. \nThe gunfire ends and the scene becomes silent.\n\nBrandon places a hand on your shoulder and squeezes lightly before he walks over towards the Opel to make sure that Marcine is dead, on his way making sure that the men that had only been \nwounded do not get the chance to recover their weapons and put up resistance. One by one, each of the wounded insurgents find a quick death with a single bullet from Ides' pistol. You walk \nup behind him a moment later to take a look at Marcine's condition and make sure you can confirm what is happening to your superiors. Were these Americans to take anything from the car and \ngain intelligence insights without you being involved, they would be highly irritated.\n*page_break\nThe inside of the car is covered in blood. You can see the man you know to be Sèkou Marcine on the back seat, his chest slowly rising and falling as he struggles to breathe, his body marked \nwith bullet wounds. He has turned against the wide back seat so he can look out the side window at Brandon. Slowly he slides back, reaching out with one arm while the other hooks underneath \nso he does not slump all the way down, instead staying propped up on his elbow. The window has shattered and so you could easily reach in and take his hand if you wanted to.\n\n\"That's him,\" Brandon says quietly, a cold tone in his voice as if this isn't the first time he has seen someone suffering through death like this.\n\n\"Yes, Sèkou Marcine, the root of your troubles,\" you confirm the fact, identifying the man only for Brandon to lift up his arm and check that there is still a round in his pistol.\n\n\"Do you have orders to take him alive?\" Brandon asks you quickly, only for you to shake your head.\n\nThe French government has no wish to have the kind of baggage that Marcine would bring with him. They even refuse to see the benefit of any information that
