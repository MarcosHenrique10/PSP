<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diamant Rose — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "diamantrose", "title": "Diamant Rose", "scenes": {"burnnotice": "*comment 11135\n\n\n*temp query 0\n*temp bigquery 0\n*temp tick 0\n*temp payment_made false\n\n*if (covert >= 60)\n\t\"You are as hard a person to find as always,\" \n\t*goto literallyfirst\n*elseif ((covert > 40) and (covert \u003c 60))\n\t\"Well well, if it is not my most favourite of spies. You are as difficult to find as always,\" \n\t*goto literallyfirst\n*else\n\t\"You are making my line of work far too easy. Are spies not supposed to stay hidden?\" \n\t*goto literallyfirst\n\n\n*label literallyfirst\na flowery yet deep voice beckons from behind you. \"I was not expecting to see you, \n*if (gender = \"male\")\n\tMonsieur ${surname}. \n\t*goto surries\n*elseif (gender = \"female\")\n\tMademoiselle ${surname}. \n\t*goto surries\n*else\n\t${surname}.\n\t*goto surries\n\n\n*label surries\n*set status \"Burned\"\nOr, I suppose I should call you just ${name} now. It seems appropriate to be more friendly now that you are no longer in service of the [i]Deuxième Bureau[/i].\"\n\nTitos Metaxas has never been one to shy away from notice, despite the line of work and the kind of clientèle he favours to meet in person with. He wears the finest white suit that you have ever \ncome to witness, with always the most beautiful light red carnation on his lapel. He is in all regards a handsome man, the kind where you look at him and believe for a brief moment that those \nancient Greek statues were chiselled after his image. While his thick black hair is curled and he bears a thick moustache on his upper lip, it is a surprisingly neat and delicately assembled image \nthat never seems to get messy or out of line.\n\nThe man comes around your chair and sets a small brown envelope on the table in front of you before continuing on his way to the thick stone railing. The cafe you are sitting in is almost entirely \nempty, especially the large balcony that overlooks the idyllic town built on the slopes around a small Aegean cove. You reach out and unwrap the cord holding the envelope shut, then open it and \nslide out the piece of paper stowed away inside. Suddenly your jaw drops.\n\n\"Now, I do wonder what you may have gotten yourself into to warrant such a heavy response. Either you have turned against France, which I highly doubt,\" Titos says and runs his hand along the stone \nrailing. \"Or you have crossed the wrong line, which I could see happening. Or someone has spread some very nasty things about you to the right ears. Tell me, why is it that the French have disowned \nyou?\"\n\nThe letter is a burn notice. [i]Service de Documentation Extérieure et de Contre-Espionnage[/i] has wiped its hands cleans of you and everything you do or have done. Your identity is to be wiped, \nrecords of you are to be purged, and anyone who knows you or of you must be made aware that you are no longer a reliable agent. Yet it could be worse - you are not in the sights of a sniper as you \nread the letter, for instance. As far as you know.\n\n*label questions\n*if (bigquery = 4)\n\t*achieve fullstack\n\t*goto aftertalk\n*elseif ((bigquery = 3) and ((payment_type = \"intelligence\") or (payment_type = \"cash\")))\n\t*goto aftertalk\n*elseif ((bigquery = 2) and (payment_type = \"cash\"))\n\t*goto aftertalk\n*elseif ((bigquery = 1) and ((payment_type = \"cash\") and (guard = \"bribed\")))\n\t*goto aftertalk\n*else\n\t*goto queriescheck\n*label queriescheck\n*if ((payment_made = \"false\") and ((query = 1) or (bigquery = 1)))\n\t*gosub payment\n\t\"Very well, we are in business then,\" Titos tells you and leans back against the railing. \"What do you want to know?\"\n\t\n\t*choice\n\t\t#Try to haggle Titos for more information than you're paying for.\n\t\t\t*if (talking >= 70)\n\t\t\t\t*if ((bigquery \u003c= 1) and not (payment_type = \"diamonds\"))\n\t\t\t\t\t*set bigquery -1\n\t\t\t\tYou present the smoother, most eloquent case on your own behalf. You can see Titos' at first hesitant look turn into admiration over your efforts. He knows what you're doing, he's had \n\t\t\t\tenough people lick his behind in order to get information out of him, he seems very impressed by your efforts.\n\t\t\t\t\n\t\t\t\t\"You continue to astound me,\" he tells you with a chuckle. \"That is the best speech I have ever heard of a client. Fine, ask you questions and I shall see what I can do for you. This \n\t\t\t\ttime. Do not think that this will be a running arrangement.\"\n\t\t\t\t*goto queriescheck\n\t\t\t*elseif (talking >= 30)\n\t\t\t\tYou present your case to the information broker who keeps a straight face throughout. He knows exactly what you are doing, he's had enough people in your situation with a great demand \n\t\t\t\tfor information. You cannot even fathom the amount of buttlicking that is necessary for Titos to agree to bargain.\n\t\t\t\t\n\t\t\t\t\"No,\" Titos tells you with an amused tone, then chuckles. \"But I will give you credit, that was a fine attempt. Now, ask your questions.\"\n\t\t\t\t*goto queriescheck\n\t\t\t*else\n\t\t\t\tYou make your best case, but Titos cuts you off mid-sentence, laughing in your face as if you are telling him the most wonderful of jokes.\n\t\t\t\t\n\t\t\t\t\"No. Absolutely not,\" he tells you in a chillingly firm tone. \"You will get what information I deem to give you. In fact, the only reason I am offering to give you any information is \n\t\t\t\tthat you have always been a reliable client in the past. Quite honestly, you are lucky I do not cut the amount of information I thought I might give you.\"\n\t\t\t\t*goto queriescheck\n\t\t#I'm fine with the agreement we have.\n\t\t\tTitos looks at you expectantly, waiting for your first paid-for question.\n\t\t\t*goto queriescheck\n*choice\n\t#\"Do you have any information about this notice?\"\n\t\t*set query +1\n\t\t*set mercier_burn true\n\t\tYour Greek contact lets out a sudden burst of laughter, then looks over his shoulder at you.\n\t\t\n\t\t\"If anyone has answers, it is you,\" he tells you and looks back down towards the sea. \"But what I will tell you is this: do not approach any spies. Being burned is not the end of \n\t\tyour life, but if you continue in the game you will only be digging your own grave. They could have easily placed a mark on you and half a dozen assassins would be taking aim at you as \n\t\twe speak, but right now you have simply been erased.\"\n\t\t\n\t\tThe information broker takes in a deep breath, then turns around to face you with a narrow but friendly smile on his face. He lets silence hang over the balcony for some time longer, leaning \n\t\thimself back against the railing, his pristine suit jacket pulled taught for a brief second before he shifts and settles back, tugging the jacket out of the way so it does not become \n\t\tscrunched up.\n\t\t\n\t\t\"But there is a flicker of hope for you. The same time that came through, there were three other burn notices. Two from the British, and another one from France,\" he tells you with a widening \n\t\tknowing smile. \"I have not been able to find out who the British are just yet, but give it time.\"\n\t\t\n\t\t\"And the Frenchman?\"\n\t\t\n\t\t\"Well that is easier. You enjoy your [i]noms de guerre[/i] far too much. A man by the alias of Antoine Mercier.\"\n\t\t\n\t\tYou have great difficulty in keeping your face straight as you hear all this information, but it is quite necessary whenever dealing with Titos. A glimpse into the mind of a client is an \n\t\texcellent tool for confirming information related to whatever information is being handed over. You have dealt with Titos for long enough to know when he is studying your face for any \n\t\tticks that might give away anything he might already have a hunch about. After all, the role of an information broker relies not only on hearing everything, but on the ability to spot and \n\t\tconfirm the valuable pieces of information from all that noise.\n\t\t*goto questions\n\t*if (mercier_burn = \"true\") #\"Was there any mention of a Remi Boulanger.\"\n\t\t*set query +1\n\t\t\"Remi?\" Titos asks with a chuckle and turns his side against the railing in a way where he can still see you. \"No, there has been no word of Remi Boulanger in quite some time. You expected \n\t\told Boulanger to be burned as well? My my, what have you been up to I wonder.\"\n\t\t\n\t\t\"You know of Remi?\"\n\t\t\n\t\t\"He is an excellent client, and that is about as much as I can tell you without a far better compensation,\" Titos says and laughs.\n\t\t\n\t\t*choice\n\t\t\t#Tell him that Remi is dead.\n\t\t\t\t\"Was,\" you start, then take in a deep breath. \"He [i]was[/i] an excellent client.\"\n\t\t\t\t\n\t\t\t\t\"Ah, well. Your line of work has finally caught up with him, hmm?\"\n\t\t\t\t\n\t\t\t\tTitos' voice has become lower, tinged with an apologetic tone. His brow furrows, his eyes flit from side to side, and you can almost hear the gears turning inside his head \n\t\t\t\tto connect all the information based on what you have just told me. It takes a mere short moment for his eyes to shoot back up to look to you.\n\t\t\t\t\n\t\t\t\t\"So it appears that an entire merry band of spies has been burned in one fell swoop... All but one?\" Titos ponders out loud, his eyes fixing on you with a penetrative stare. \"Then  if you are concerned that Boulanger has not received a burn notice, but are surprised that Mercier has, my instincts tell me you know something more. Let me guess, one is like the \n\t\t\t\tother, but only one has been burned. Were that the case... now that would be a very interesting situation to say the least.\"\n\t\t\t\t*goto questions\n\t\t\t#Tell him Remi is on the run, just like you.\n\t\t\t\t\"Remi is on the run,\" you tell Titos and take a deep breath.\n\t\t\t\t\n\t\t\t\t\"Ah, well there it is.\"\n\t\t\t\t\n\t\t\t\tTitos' voice has now sparked, filled with a curiosity and vibrance of a man on the hunt for the final puzzle piece. His brow furrows, his eyes flit from side to side, and you can \n\t\t\t\talmost hear the gears turning inside his head to connect all the information based on what you have just told me. It takes a mere short moment for his eyes to shoot back up to look \n\t\t\t\tto you.\n\t\t\t\t\n\t\t\t\t\"So it appears that an entire merry band of spies has been burned in one fell swoop... All but one?\" Titos ponders out loud, his eyes fixing on you with a penetrative stare. \"Then  if you are concerned that Boulanger has not received a burn notice, but are surprised that you and Mercier have, my instincts tell me you know something more. Let me guess. Mercier  is in no position to be burned, but has been, while one of two runners remain without so much as a mark on him. Now that is a very interesting situation to say the least.\"\n\t\t\t\t*goto questions\n\t\t\t#Withhold any information.\n\t\t\t\tYou suck on your tongue for a brief second, keeping yourself quiet and as emotionless as you can. Titos' eyes become inquisitive in response to your silence, narrowing slowly as \n\t\t\t\tthe pause grows longer and longer. You can tell that his mind is racing, the gears ratcheting and trying to collect the information into a neat bundle, guided by your choice of \n\t\t\t\tstaying quiet about what happened in Crimea.\n\t\t\t\t\n\t\t\t\tOf course, he's going mostly by your reaction in all of this, trying to guide the conversation where he can gleam something off of you. Then again, so are you.\n\t\t\t\t*goto questions\n\t#\"I need any information you have about Ingemar Lund's shipping enterprise in the Mediterranean.\"\n\t\t*set bigquery +1\n\t\t*set query +1\n\t\t*set overview_basic true\n\t\t\"Very straightforward thinking of you. Officially Lund has no business down here, only companies that are subsidiaries of subsidiaries, the shipping company one of many that license the use \n\t\tof his name. However, that autonomy from the man himself is feigned at best,\" the information broker tells you. \"Officially Lund Shipping is run by a woman by the name of Evony Lellouche. She \n\t\tis a shipping magnate in her own right, and very respected in the region, but it's a very thick smokescreen for Lund's smuggling enterprises.\"\n\t\t\n\t\tThat makes sense. If Lund has such delicate dealings in the Mediterranean, his smuggling ring in the north was small in comparison. Yet that leaves open the question of how he manages such \n\t\tlarge quantities of smuggled goods on two fronts at a time. There must be a reliable middleman in addition to the legitimate businesswoman.\n\t\t\n\t\t\"Lund is busy in the north. During our investigation he showed no interest in the Mediterranean. He took more trips to the Caribbean than down here. So, who is his man here?\" you pose the \n\t\tquestion, prompting a low chuckle from Titos in response.\n\t\t\n\t\t\"Smart. Very smart. Vepkhia Jishkariani. He is a Georgian businessman who used to run an import/export firm on the Turkish-Georgian border. All the way up until Turkey joined NATO, so now \n\t\the has taken to Majorca. As it happens another one of Lund's subsidiary of a subsidiary companies owns the house he lives in. Quite the mansion too I'm told,\" Titos tells you with a widening \n\t\tsmile. \"Miss Lellouche is a frequent visitor as well. So there you are: your missing link. Jishkariani enjoys spending a great deal of time out here in the Greek islands as well, I hear. His \n\t\tyacht is called the Polaris, and it can stay anchored out there for weeks at a time.\"\n\t\t*goto questions\n\t*if (bigquery > 0) #\"Wait, but how does that connect to smuggling diamonds through the Turkish straits?\"\n\t\t*set bigquery +1\n\t\t*set query +1\n\t\t*set overview_advanced true\n\t\t\"Well I suppose the details would be for you to find out, aren't they?\" Titos says and gives you a quick shrug. \"You asked about Lund Shipping in specific, so I am assuming that \n\t\tthey have been making stops that are not on record. Well, that particular company is on record as owning three ships, all of them named Aurora with a serial number differentiating one from \n\t\tthe other. They use that to great effect in confusing customs and naval patrols, I hear. The thing is, they operate two additional ships also of the same name. It's an oversized shell game.\"\n\t\t\n\t\t\"That's how the same ship seems to be able to move so fast between the Black Sea and the Aegean...\" you mutter to yourself, putting a map together in your mind.\n\t\t\n\t\t\"However, the ships never leave the Aegean unless they are travelling north. The southernmost port they come to is Thessaloniki, which is quite advantageous for smuggling operations, since \n\t\ttheir route just so happens to take them right past Mr. Jishkariani's usual mooring point,\" the information broker continues.\n\t\t\n\t\t*goto questions\n\t*if (bigquery > 0) #\"What can you tell me of Evony Lellouche? Is she involved in the underhanded business?\"\n\t\t*set bigquery +1\n\t\t*set query +1\n\t\t*set lady_known true\n\t\tThe information broker stops and lifts a hand up to his chin, reaching an index finger up to stroke the edge of his moustache. He looks past you and thinks, trying to compose all \n\t\tthe information clearly stored in his very impressive memory.\n\t\t\n\t\t\"Evony Lellouche is a harder one to say anything about. She is a powerful figure pulling the strings of other powerful figures, and prefers to stay in the shadows. When her name is attached \n\t\tto anything, it is a legitimate business transaction. However, if there is anything about her that is connected to illegal affairs, it would be how close she seems to be with Jishkariani. \n\t\tThey attend the same business parties and other such affairs... balls and such. I believe she is French-Algerian in origin, and has largely pulled herself up in the world by her bootstraps, \n\t\tas I believe the American saying goes. Even so, do not think for a moment that she is somehow frail and vulnerable - her game has so far been all about ambition and climbing the social ladder.\"\n\t\t\n\t\t\"She is close to Jishkariani then?\"\n\t\t\n\t\t\"As far as I can tell. They might evene be lovers, although if that is so I cannot see what she sees in Jishkariani.\"\n\t\t\n\t\t*goto questions\n\t*if (bigquery > 0) #\"Tell me of Jishkariani. What is his role in all this? What's his game?\"\n\t\t*set bigquery +1\n\t\t*set query +1\n\t\t\"My guess would be that if he is connecting all of this, and if they are indeed smuggling diamonds on the Auroras, he would be the middle-man reaping the benefits and footing the costs in \n\t\tthe West. He seems unassuming and his businesses are very low-income affairs, yet he can afford a mansion on Majorca - he would likely be the head of the whole operation,\" Titos tells you. \n\t\t\"Unlike me, Jishkariani loves to gamble. That is doubtlessly his one weakness, and if you ever need to find him you can find him in Monaco at a baccarat table nine out of ten times. Under \n\t\tthat polished surface, however, there is always large amounts of money going through his hands, and he is trusted by near everyone in the region as a partner.\"\n\t\t\n\t\t\"Why is it that we have never looked into Jishkariani's affairs before? He sounds like the kind of man that would have rang alarm bells at some point,\" you pose the question.\n\t\t\n\t\t\"Because he has the money to spend. Authorities look the other way when you pay them well for their services, when you sit down at the same baccarat table with them and make them feel like \n\t\ta winner, when you do favours for them when they are in a pinch. How do you think I am able to still roam around freely, hmm?\" Titos explains and barks a quick laugh. \"And if it so happens \n\t\tthat you are right and Jishkariani has connections behind the Iron Curtain... Well, that is a whole new machine of blackmail and bribery he can rely on.\"\n\t\t\n\t\t*goto questions\n\t*if (payment_made = \"true\") #\"I have all the information I need, thank you.\"\n\t\t*goto aftertalk\n\n\n\n\n*label payment\n\"Before we have any further discussion, I must ask, and forgive me for being so crude,\" Titos stops you with a few carefully crafted but forceful words. \"But how is a burned spy to pay for this \ninformation? You know my services do not come cheap, and now you do not have your country to pay on your behalf.\"\n\nTitos leans off the thick stone railing and takes a few careful slow steps along the long edge of the balcony. His hand skims along the smooth surface of the stone, his eyes constantly peering \nin your direction like those of a hungry dog looking at a bowl of food just out of reach. It is not a gaze of ravenous and violent hunger, but rather a look of deep desire for something that \nhas been promised.\n\nYou have very little as far as possessions go, especially when it comes to wealth. You could give Metaxas the gold bullion coins worth several thousand francs, but that would be pocket money \ncompared to the usual ransoms paid to him for good intelligence. Even in the case where you still had access to the wealth of France, coming to Titos would still be an action best done very \ninfrequently. Now of course you could pay what you can and get what you can in return, but you could also try to gain what information you can get on Lund and promise Metaxas any diamonds that \nyou can recover off the shore - if that even is how Lund gets the diamonds into the West.\n*goto paymentchoice\n\n*label paymentchoice\n*choice\n\t#Offer as much as you have in gold bullions and settle for what you can get.\n\t\t*set payment_type \"cash\"\n\t\t*if (guard = \"bribed\")\n\t\t\tYou have less bullions now than when you started, since you did end up bribing the guard, but it should still be something to offer the information broker. \n\t\tWith a glance around the cafe you make sure that there are no untoward prying eyes, then reach down to the handle of your briefcase to take out a single gold coin. With a calm and \n\t\tslow motion you bring your hand back on top of the table, then set the coin down and show Titos what he can expect.\n\t\t\n\t\t\"Mm, interesting magic trick,\" he chuckles and nods at the coin in approval. \"But you know as well as I do that cash for operation use is hardly enough to buy anything significant \n\t\tfrom me. The gesture of giving me everything you have, however, is appreciated.\"\n\t\t\n\t\tIs this really how you want to handle the payment?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set payment_made true\n\t\t\t\t*return\n\t\t\t#No, let me think of something else.\n\t\t\t\t\"Well, if you believe you have something better to offer,\" Titos tells you and chuckles quietly to himself.\n\t\t\t\t\n\t\t\t\t*goto paymentchoice\n\t#Offer all the operational details from the anti-smuggling operation in the north and in the Crimea.\n\t\t*set payment_type \"intelligence\"\n\t\tRevealing sensitive operational intelligence is as good as treason. Then again how can someone who has no country commit treason?\n\t\t\n\t\tIt's a shaky question that is bound to be tossed aside with a very simple rebuttal, but you don't pause to think about it for too long, and instead present a shortlist of what kind of an \n\t\taccount you might be able to give to Titos.\n\t\t\n\t\t\"Well well, you are a resourceful one indeed. The Soviets would pay a hefty amount in exchange for information about who was responsible for Estonia and Sevastopol. Perhaps you might be \n\t\table to put me on the right track to pay your expenses after all.\"\n\t\t\n\t\tIs this really how you want to handle the payment?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set payment_made true\n\t\t\t\t*achieve traitorous\n\t\t\t\t*return\n\t\t\t#No, let me think of something else.\n\t\t\t\t\"Well, if you believe you have something better to offer,\" Titos tells you and chuckles quietly to himself.\n\t\t\t\t\n\t\t\t\t*goto paymentchoice\n\t#Promise him whatever diamonds you can recover from Lund's operation.\n\t\t*set payment_type \"diamonds\"\n\t\t\"You and I both know anything I have on me will not be enough,\" you tell Titos who nods in agreement. \"But this entire operation was about discovering how diamonds from the Soviet Union \n\t\tare ending up in Africa and in the West. Whatever diamonds I find thanks to your information, I will forward to you.\"\n\t\t\n\t\t\"Ha, what you are essentially asking of me is a loan in order for you to pay me with great future wealth,\" the information breaker roars in laughter, then takes a few more steps along the \n\t\tedge of the balcony. \"You know I am not a gambling man, ${name}. I do not like playing against the odds.\"\n\t\t\n\t\tThe man hesitates for a moment and seems to think things through. Perhaps he is counting the sheer amount of diamonds coming through at any given time, since it is enough to fuel war \n\t\ton one entire continent, perhaps he is rethinking his line of business. No matter what is going on inside his head, as he once more brings his look directed towards you, there is a sense \n\t\tof agreement about it.\n\t\t\n\t\tIs this really how you want to handle the payment?\n\t\t*choice\n\t\t\t#Yes.\n\t\t\t\t*set payment_made true\n\t\t\t\t*return\n\t\t\t#No, let me think of something else.\n\t\t\t\t\"Well, if you believe you have something better to offer,\" Titos tells you and chuckles quietly to himself.\n\t\t\t\t\n\t\t\t\t*goto paymentchoice\n\n\n\n\n*label aftertalk\n\nTitos Metaxas stops to clear his throat, his eyes sparkling as he stands rigid in place for a moment. He takes a step away from the railing, then another, and another, until he is standing right \nbeside your table. \n*if (payment_type = \"cash\")\n\tHe places his hand gently on the table, pressing his fingers against the smooth surface while his eyes peer directly into yours.\n\t\n\t\"There, it is time for you to pay up. My time and information are a valuable commodity after all,\" he tells you with a low murmur. \"Now you are enlightened, but my pocket still craves filling.\"\n\t\n\tYou reach down to the handle of your briefcase and start thumbing out gold bullion coins, emptying the hidden compartment so you can pay the man.\n\t*goto islandhop\n*elseif (payment_type = \"intelligence\")\n\tHe places his hand gently on the table, pressing his fingers against the smooth surface while his eyes peer directly into yours.\n\t\n\t\"There, it is time for you to pay up. My time and information are a valuable commodity after all,\" he tells you with a low murmur. \"Now you are enlightened, but my pocket still craves filling. \n\tHere, take this. There is a locker at the new railway station in Thessaloniki. Write down everything about the operations, place them in an envelope - or several if you must - and I shall have \n\tsomeone pick it up next Monday.\"\n\t\n\tTitos places a small key on the table, conjuring it as if by sheer magic.\n\t\n\t\"If the locker is empty, I will have you hunted down and make sure you disappear for good, and not just from records. Understand?\"\n\t\n\t*goto islandhop\n*else\n\tHe places his hand gently on the table, pressing his fingers against the smooth surface while his eyes peer directly into yours.\n\t\n\t\"There, it is time for you to pay up. My time and information are a valuable commodity after all,\" he tells you with a low murmur. \"Now you are enlightened, but my pocket still craves filling. \n\tYou have promised me diamonds and I will hold you to it. Here, take this. Whenever you have something for me, call this number and someone will always pick up. Tell them the country you are in, \n\tand they will tell you a place you can drop the diamonds off in. Simple, just follow the instructions.\"\n\t\n\tTitos places a small card with a phone number on it on the table, conjuring it as if by sheer magic.\n\t\n\t\"If you die, the information I have given you will go down with you, which is not an issue. If you are alive at the end of this and I do not hear from you... I will make sure you disappear, and \n\tnot just from records. Understood? I will have what is owed to me.\"\n\t*goto islandhop\n\n\n*label islandhop\n*page_break The Aegean Sea\nBefore you and Titos part ways he gives you one final thing - the name of an island. You \"borrow\" a boat off the Thessaloniki harbour and sail off to the open sea, heading directly south-east until \nyou see the Greek islands begin emerging in the horizon. The island you are looking for is a small one, northernmost in the group called the Sporades. You turn your small motorboat northward once you \nsee the cliffs of high islands in the distance, then travel until you reach one that is far flatter and covered in low shrubbery. A lighthouse rises in the northernmost part of the small island, \nflashing a light in steady rhythm.\n\nAnchored right off the south side of the island is a large shining white luxury yacht. The Aegean sparkles beneath the vessel, the sun is scorching the beautiful near-empty sand beach on the island. \nA dinghy is moored to the back of the yacht, with two people loading it up with scuba diving equipment. You bring your boat to the other side of an even smaller island that sits on the other side \nof the yacht, the bushes there just tall enough that you might be able to observe whatever is going on without drawing attention to yourself.\n\nAnd so you bring your motorboat behind the island while still far away from the yacht, then turn directly towards the island and cut the engine once you're close enough that you might be heard. \nThe momentum carries you forwards and beaches you on the tiny little island. You hop out and tie down the boat, then gather the little equipment you have and rush up the beach to the shrubbery \ncovering the top.\n\nIt takes you only fifteen minutes or so to settle down in a good position, binoculars in your hands as you lie low and look at what is happening.\n\n*label sneakypeaky\n*if (tick = 3)\n\t*goto setupwatch\n*choice\n\t*hide_reuse #Look to the shore past the yacht.\n\t\t*set tick +1\n\t\t*goto shoreup\n\t*hide_reuse #Look at the top deck of the yacht.\n\t\t*set tick +1\n\t\t*goto deckhand\n\t*hide_reuse #Try and peer inside the yacht through the windows.\n\t\t*set tick +1\n\t\t*goto insides\n\t*hide_reuse #Follow the divers loading the dinghy.\n\t\t*set tick +1\n\t\t*goto dingher\n\n\n*label shoreup\nThe sandy beach on the island of Spathoura shines a pale tan colour, dotted in one spot by towels laid out in a small line. You can see three figures on the beach sitting on the towels and enjoying \ndrinks of some kind. One of them is a woman dressed in a bright white bathing suit, the other a man in a colourful shirt and shorts that reach down to mid-thigh at most. Strangely enough the third \nappears to be a man in far more clothing than this climate warrants, wearing a dress shirt and full pants, as well as having a fedora hiding his head from the sun. \n*if (tick = 1)\n\tTwo other figures are walking along the beach right at the water's edge, both of them young girls by the look of them, one wearing blue and the other red. Suddenly one nudges the other, then runs \n\toff and careens into the water, chased by the other girl. The water sparkles as it splashes high into the air as the pair of them break for the ocean.\n\t*goto shoreup1\n*elseif (tick = 2)\n\tTwo more figures are running into the water, the splashing water sparkling in the air around them as it arcs through the air. It is impossible to see who they are or see their gender from this far \n\tout, especially with the water obscuring most of them by now.\n\t*goto shoreup1\n*else\n\tTwo more figures appear to be swimming in the water just off the beach, chasing one another in sweeping strokes. You cannot tell who they are, and distinguishing any kind of gender is impossible \n\tfrom the range with only their heads above the water. It's hard enough to see them at all in the water as it is.\n\t*goto shoreup1\n\n*label shoreup1\n\nBut the beach is not the only thing to be occupied by people. At the top of the beach, where the sand finally gives way to the grassy rest of the island, you see three men in black standing tall \nagainst the sky and clearly armed. All of them have their arm bent in a way that makes it very clear that they are either on a sling, or resting on top of a weapon hung from the shoulder. \n*if (tick = 2)\n\tYou can see one of them lift a hand up to his mouth, then swing it down to toss something to the ground. The figure then steps on the same spot, twisting the foot a couple of times, then returning \n\tto a relaxed standing pose.\n\nYou can imagine the laughter filling the beach while these guards stand close watch. Nothing special seems to be happening aside from the swimming. This isn't what you're looking for.\n*goto sneakypeaky\n\n\n\n\n*label deckhand\nYou focus the binoculars on the yacht's top deck, spotting now the black dots moving back and forth along the whole length of the vessel are well-armed guards. \n*if (tick = 1)\n\tSuddenly someone rises up in the middle of the deck: a dark slender figure wearing a white flowing dress that catches your attention with the way it moves as the wind tugs at it. The figure \n\tmoves quickly after standing up, crossing the deck and heading directly inside the ship.\n\t\n\t*goto deckhand1\n*elseif (tick = 2)\n\tOne of the guards stops suddenly and turns around, standing straight with his weapon up as if saluting someone who is out of your view, just past the doors leading inside the ship.\n\t\n\t*goto deckhand1\n*else\n\t*goto deckhand1\n\n\n*label deckhand1\nWhile you can take the time to follow the patrol cycles and try your very best to figure out an opening for perhaps getting a peek inside the yacht, it very quickly becomes clear that there is no \nsuch opening. While the guards are some ways apart, it does not appear that any part of the deck is out of sight for long.\n\nThe guard complement travelling on the yacht must be considerable, but counting them from this distance will be near to impossible even during a shift change. Counting faces will not work either, \nsince you cannot get detailed enough looks on the guards, and going by clothes is useless what with everyone wearing the same kind of turtleneck sweater - despite the heat.\n*if (tick = 4)\n\tAs you keep observing the scene you can see a figure in white appear at the doorway leading out from the inside of the yacht. The dark-skinned woman stands in place for a moment, then turns her \n\tback to you. You can tell only due to how the white dress arches down and paints itself clear against her skin, but you can also see that she brings her hands up to her face, her elbows out wide, \n\tas if she is holding binoculars. As you keep looking she starts to turn around and that suspicion is confirmed, the sun glinting off the glass of her binoculars very clearly.\n\t\n\tYou lower your binoculars just slightly to see where the sun is, trying to see if it might betray your whereabouts, but as you pick them up again the woman has disappeared off the deck.\n*goto sneakypeaky\n\n\n\n\n*label insides\nThe hull of the ship shines with the light reflected off the calm waves of the Aegean. The windows on the hull are almost like dark painted circles, although occasionally someone passes past one of \nthem, giving you some sense of depth to what lies beyond. \n*if (tick = 2)\n\tA large figure stops at one of the windows, then turns to face directly towards you. You can see the broad figure painted against the darker inside of the yacht, a light tan tailored suit hiding \n\twhat looks like a very muscular - or just fat - body. It's hard to tell exactly who he is, but after a moment's pause at the window whoever the figure is turns and moves away. You see the same figure \n\tpassing by the windows near the top deck soon after, then nothing.\n\t*goto sneakypeaky\n*elseif (tick = 3)\n\tYou spot movement through the little bit of structure that sits on the top deck, the large windows granting you a glimpse of a white flowing dress moving across. You follow the motion and try \n\tto get a closer view if you can. There is a flash of white through the window again, and again, almost as if whoever this person is is dancing back and forth. For all you know they might be.\n\t*goto sneakypeaky\n*else\n\tFor such a vessel of luxury there does not appear to be much going on. Nobody is moving about, there are no flashing lights from within, nothing.\n\t*goto sneakypeaky\n\n\n\n\n*label dingher\nThe divers and their little rubber dinghy catches your attention. They are outfitted in full wetsuits and large tanks, something you would not expect from hobbyists necessarily. In fact, if these \nwere casual divers you would expect there to be more of them. No, these seem like professionals based on everything you are able to see.\n\n*if (tick = 1)\n\tFilling the dinghy with gear takes very little time from when you start watching the divers. You watch them climb into the dinghy and lower it into the water, disconnect the hooks that serve \n\tto lift the dinghy up, then turn on the engine. You have hear the prattling engine bark into life. Then the engine squeals and the dinghy shoots off, a rough wake left behind it as they disappear \n\tbehind the yacht.\n\t*goto sneakypeaky\n*elseif (tick = 2)\n\tThe divers are on their dinghy, leaving behind a tumultuous wake as they appear from behind the yacht, travelling fast out towards much deeper water. Their heading seems to be towards the \n\tnorth-west from the island, towards the shipping lanes. However, the shipping lanes themselves are far enough away that a dinghy would hardly be enough to get to them. \n\t*goto sneakypeaky\n*elseif (tick = 3)\n\tThe divers have left the yacht, leaving behind only a wake that is dissipating fast, but not fast enough to hide that they must have been heading off towards the north-west. You peer into the \n\tdistance and can barely see them in the distance still, shooting off towards where the shipping lanes are. Of course the shipping lines are far enough that the dinghy will not be the most effective \n\tway of getting there for any long amount of time, but who knows. the divers might be brave.\n\t*goto sneakypeaky\n*else\n\tThe divers are gone, as is the dinghy. You can hear the ripples from their wake reaching the shore of your little island, but no matter how hard you peer into the distance you can no longer spot \n\tthem.\n\t*goto sneakypeaky\n\n\n\n\n*label setupwatch\n*page_break\nYour first observations of the yacht give you a quick overview of whatever is happening. The biggest thing that stands out is the sheer amount of guards, well armed guards, that the yacht has. That \nalone makes all kind of alarm bells ring in your head. Perhaps the hunch had been correct and Titos had tipped you off with just the right information to direct you here. This is the Polaris, \nJishkariani's private yacht, and somehow it must be involved with how the diamonds come into the West.\n\nSlowly but surely the sun starts to go down, sinking lower and lower against the horizon. The water around the yacht is painted a dull orange, the people on the beach begin to pack up their things \nfor a return to the yacht, and in the distance... in the distance a cargo ship is heading towards the island.\n\nThe ship turns quite a distance away, but close enough that the water has become much shallower than it would be on the marked shipping lanes. The ship comes and goes, heading towards Thessaloniki, \nand about an hour afterwards the dinghy with the divers returns. By this point the people enjoying their beach adventure have returned as well, and you can hear champagne bottles being popped open \naboard the luxury yacht.\n\nThen, as soon as the dinghy has been raised out of the Aegean, the yacht's engines rumble to life and begin to propel it forward, turning towards the south. It sails past your little island and \ncontinues on, kicking up a high foaming wake as it goes. Behind it flaps a French yacht ensign.\n\nHowever, you have to lift up your binoculars once more as you see it go by, as you see a figure at the stern of the yacht, standing beside the raised dinghy in a flowing white dress. As you look \ntowards the slim dark-skinned figure, you can see her looking almost directly towards you.\n*page_break\nThe beach the party has left behind has been cleaned up nicely. There is no piece of thrash left behind, only a few cigarette stumps at the top of the beach where the guards had been overlooking \nthe oceanside carousing. There are no leads to follow except the yacht itself.\n\nNo leads on the beach, but there is a lead in the water. You only notice it as you are leaving the islands with the intention of heading back to the mainland, but there is a buoy floating in the \nwater near to where the yacht had been anchored. The orange rubbery sphere is floating in the water, marked with black paint to bear the Polaris' name. You reach out for it and pull it out of the \nwater, only to reveal a heavy tightly packed bag hanging from it.\n\nOpening the bag, you see that it is filled with small diamonds - the exact same kind that you collected from Sèkou Marcine's briefcase back in the day.\n\nBut who left this behind?\n*page_break\n*label retry\nYour return to mainland Greece is filled with doubt. You know that the next places you should go are the ones where you are most likely to find more clues, something more to nail Jishkariani as the \nsource of the diamonds, something to hand over to the authorities for them to make the proper arrests. So, your options are fairly limited: Monaco and Majorca.\n\nHowever, before you head over there you have one more detour to make. You thought you would never be forced to rely on its hospitalities, but you have an off-the-record safehouse in Rome that holds \nequipment necessary for you to take down this smuggling ring - alone if you must. But why? That's the questions you keep pushing out of mind night after night, especially now that you have become a \n[i]persona-non-grata[/i] in the espionage world. After all, you could simply disappear. Make a new life for yourself somewhere and settle down for a change.\n\nThen again, where is the excitement in that.\n\nYou sit down in your unassuming \"borrowed\" car one morning, having already driven across Greece to get to the Adriatic coast. Your trusty and familiar \n*if (bangedupcase)\n\tbanged up \nbriefcase is stowed away on the passenger side seat. As usual you lean down and connect the wires under the dash, the engine purring to life as you get a whiff of electrical smoke and lean back against \nyour seat. From the corner of your eye you can see that a black car has pulled up right next to you, stopping right beside you while you were down under the dash. As you turn to glance over, you \nlook directly into the eyes of a strong-jawed man with sunglasses and thick black hair neatly combed over in a straight parting. He's looking straight at you, or so it seems, and you have a strange \nfeeling of having seen him before somewhere.\n\n*if (spotted)\n\tThe man's gaze floats across your face, then focuses on the building behind you, then suddenly locks down on you again. His brow furrows and the eyes become cold, piercing even. It's almost \n\tunnoticeable but you see a shift in his shoulders. He's reaching for something, somewhere below the point where you cannot see due to the passenger side door. His stare continues to pierce you \n\tas he noticeably leans further, now more obviously reaching for something.\n\t\n\tHe must have recognized you from somewhere. If you are his target, which is very likely from the way he looks at you, you have to do something instead of just sitting around.\n\t\n\t*choice\n\t\t#Shoot the man.\n\t\t\t*gosub trial_end\n\t\t\t*set covert -5\n\t\t\tYou move your hand up beneath your jacket, offering the man a flash of a smile as you pretend to be going for your wallet or something. He twitches and leans back and you see his hand \n\t\t\trise up, holding a silenced pistol. With your free hand you reach down as fast as possible and lean your seat back, dropping out of view while you take out your own pistol. You move \n\t\t\tjust in time as the glass suddenly shatters and rains down on you from both sides, a hurried grouping of bullets shooting through the driver's side window and then continuing out through \n\t\t\tthe passenger side window.\n\t\t\t\n\t\t\tThen there's a squeal of tires. You rise up, bringing your pistol to bear. \n\t\t\t*if ((combat = 90) or ((combat > 50) and (charm \u003c 45)))\n\t\t\t\t*set nasonov_wounded true\n\t\t\t\tYou let off a couple of hasty shots and can see the bullets connect with the car. The rear window shatters, but you cannot see any obvious burst of blood paint the inside of the car. \n\t\t\t\tThen again, if you did hit the man through the seat there wouldn't really be any visible blood spurt. Only way to know for sure would be to chase him down and ask him whether he's injured.\n\t\t\t\t*goto gethit\n\t\t\t*elseif (combat > 30)\n\t\t\t\tYou let off a couple of hasty shots. The rear window shatters and a bullet hole now graces the trunk of the car, but you don't see blood anywhere. So either you missed or the blood \n\t\t\t\tsplatter spread low enough for the seats to cover it from view. Only way to know for sure would be to chase him down and ask him whether he's injured.\n\t\t\t\t*goto gethit\n\t\t\t*else\n\t\t\t\tYou let off a couple of shots towards the car driving off, but to no avail. You hit one of the tail lights with the first shot, but the recoil kicks you off-target and the bullet \n\t\t\t\tends up flying off who knows where. Definitely not at your mysterious assailant.\n\t\t\t\t*goto gethit\n\t\t#Drive off.\n\t\t\t*gosub trial_end\n\t\t\tYou slam your foot down on the clutch, ready the other on the gas, then slap your palm against the gear shift. With your feet working overtime to give you as fast of a launch as possible, \n\t\t\tyou drive off. The rear window of your car shatters from the bullets and you swerve to nudge the assailant's car to the side. \n\t\t\t*if (driving >= 70)\n\t\t\t\tYou pass by the car, using the limited width of the free space to get out of the parking spot. At the very last moment you kick the gas pedal and flick the steering wheel. The back \n\t\t\t\twheels scream in agony as you burn the rubber and flick the now loose back of your car against the front of the assailant's, nudging it aside and into a position where he cannot easily \n\t\t\t\tdrive off to follow you. You can feel the grip return to the wheels as you let off a bit, then launch down the street as fast as possible.\n\t\t\t\t*goto carflee\n\t\t\t*else\n\t\t\t\tYour whole car shudders and jolts from the impact, but so does the other car. With your feet and hands still working hard you drive off as fast as you are able to, swerving a bit to \n\t\t\t\toffer an unpredictably moving target to the assailant, the worry of being shot soon becoming a worry about driving around with a car with one side caved in. Not to mention the fact \n\t\t\t\tit's been \"borrowed\" for your use.\n\t\t\t\t*goto carflee\n\t\t#Stay where you are despite your instincts.\n\t\t\t*gosub trial_end\n\t\t\tYou blink and lower your hand down on the gear shift, staring at this man with his gun. The barrel is pointed directly at your face, the man quirks an eyebrow at your sudden display of \n\t\t\tapathy at the circumstances, then he squeezes the trigger.\n\t\t\t\n\t\t\tYou never get to see the muzzleflash. By the time your eyes register the light and transmit the image in electrical signals to your brain, half of it is already missing. The good news \n\t\t\tis that you go nice and quick instead of writhing in agony for hours waiting for a sweet kiss of death to carry you out of your pain, \n\t\t\t*goto deathending\n*else\n\tThe man's gaze floats across your face, then focuses on the building behind you. It's a small hotel that you have been staying in, with the window to your room right beside you across the narrow \n\tsidewalk. The other driver's gaze locks on to that window, then you see him reach down to the passenger side of his car. He opens the driver's side door with you still watching him, then stands \n\tup out of the car.\n\t\n\tSuddenly you see a silenced pistol of Russian make rise up from behind the car, held by this stranger. It goes off with a loud pop, the bullet shatters the window to your room, then the driver \n\tthrows a hand grenade after it with quite stunning accuracy.\n\t*choice\n\t\t#Shoot the man.\n\t\t\t*gosub trial_end\n\t\t\tYou take the assailant by surprise with your motion, bringing your free hand down as fast as possible to lean your seat back, dropping you out of view while you take out your own pistol. \n\t\t\tYou move just in time as the glass suddenly shatters and rains down on you from both sides, a hurried grouping of bullets shooting through the driver's side window and then continuing out \n\t\t\tthrough the passenger side window.\n\t\t\t\n\t\t\tThen there's a squeal of tires, the explosion inside the hotel room goes off, and you rise up to bring your pistol to bear. \n\t\t\t*if ((combat = 90) or ((combat > 50) and (charm \u003c 45)))\n\t\t\t\t*set nasonov_wounded true\n\t\t\t\tYou let off a couple of hasty shots and can see the bullets connect with the car. The rear window shatters, but you cannot see any obvious burst of blood paint the inside of the car. \n\t\t\t\tThen again, if you did hit the man through the seat there wouldn't really be any visible blood spurt. Only way to know for sure is to chase him down and ask him whether he's injured.\n\t\t\t\t*goto carchase\n\t\t\t*elseif (combat > 30)\n\t\t\t\tYou let off a couple of hasty shots. The rear window shatters and a bullet hole now graces the trunk of the car, but you don't see blood anywhere. So either you missed or the blood \n\t\t\t\tsplatter spread low enough for the seats to cover it from view. Only way to know for sure would be to chase him down and ask him whether he's injured.\n\t\t\t\t*goto carchase\n\t\t\t*else\n\t\t\t\tYou let off a couple of shots towards the car driving off, but to no avail. You hit one of the tail lights with the first shot, but the recoil kicks you off-target and the bullet \n\t\t\t\tends up flying off who knows where. Definitely not at your mysterious assailant.\n\t\t\t\t*goto carchase\n\t\t#Drive off to escape.\n\t\t\t*gosub trial_end\n\t\t\tYou slam your foot down on the clutch, ready the other on the gas, then slap your palm against the gear shift. With your feet working overtime to give you as fast of a launch as possible, \n\t\t\tyou drive off. The rear window of your car shatters from the bullets sent your way, and you swerve to nudge the assailant's car to the side. \n\t\t\t*if (driving >= 70)\n\t\t\t\tYou pass by the car, using the limited width of the free space to get out of the parking spot. At the very last moment you kick the gas pedal and flick the steering wheel. The back \n\t\t\t\twheels scream in agony as you burn the rubber and flick the now loose back of your car against the front of the assailant's, nudging it aside and into a position where he cannot easily \n\t\t\t\tdrive off to follow you. You can feel the grip return to the wheels as you let off a bit, then launch down the street as fast as possible.\n\t\t\t\t*goto carflee\n\t\t\t*else\n\t\t\t\tYour whole car shudders and jolts from the impact, but so does the other car. With your feet and hands still working hard you drive off as fast as you are able to, swerving a bit to \n\t\t\t\toffer an unpredictably moving target to the assailant, the worry of being shot soon becoming a worry about driving around with a car with one side caved in. Not to mention the fact \n\t\t\t\tit's been \"borrowed\" for your use.\n\t\t\t\t*goto carflee\n\t\t#Stay where you are.\n\t\t\t*gosub trial_end\n\t\t\tThe man sits back down in his car, then storms off just as the explosion goes off inside the hotel, showering your car with broken glass. His tires are still squealing by the time he reaches \n\t\t\tthe end of the street and hooks a right. It doesn't seem that he cares in the slightest about taking care of eyewitnesses, which is excellent for you since you now know the face of your \n\t\t\tassassin.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Chase after him.\n\t\t\t\t\t*goto carchase\n\t\t\t\t#Leave it be for now.\n\t\t\t\t\t*set covert +5\n\t\t\t\t\tWith a deep breath you calm your raging emotions, trying to go through the scene that just happened in your mind's eye, picking out details and burning them into permanent memory. \n\t\t\t\t\tSomewhere in the distance you hear the wail of sirens alerting you tot the fact it's time to go. You slap your hand down against your gear shift and push it forwards, pulling your \n\t\t\t\t\tcar out of the parking spot and rushing down the street, hanging a left instead of following the mysterious assailant to the right.\n\t\t\t\t\t\n\t\t\t\t\t*goto skippery\n\n*label gethit\n*page_break\nYou pull the seat upright and lower your hand on the gear shift only to become suddenly paralyzed with a horrific shock of pain. It's the kind of pain you cannot describe in words, one where the body \nis rejecting the constant pain due to shock but when you move it becomes obvious. You glance down and see sunshine coming in through the middle of the car door, your freshly ironed pants drenched in \nblood. The bullet wound is in your leg. Only a centimeter higher and you would have a high likelyhood of bleeding out, but now you should still be able to treat yourself and maybe even walk it off. \nIf you walk very carefully.\n\nYou launch into action while the adrenaline is still in your system, removing your belt and then ripping the bullethole on your pants until the entire pant leg comes off. There is an exit wound. Good. \nYou can patch yourself up fairly safe in the knowledge that there is no metal still lodged inside you. With a quick motion you roll the now ripped off pant leg until it becomes a thick layer you can \nplace around your leg to soak up the blood, then finagle your belt around your leg as well so you can fix the makeshift bandage in place.\n\nWhile you act quickly to staunch the bleeding, your hand begin to shake, then your body begins to shiver as if you had been soaked in icewater. The adrenaline is going and the shock of being shot is \ntaking its place. You move faster, the quick motions not making it any easier to try and hook your belt tight enough. Eventually you give up and tighten your belt around your leg as well as you can, \nthen hook it around and tie it off so it will stay put. Your body is shaking far too much for you to be able to fasten the belt up any other way.\n\nAt least you're now bandaged up, in a manner of speaking.\n*page_break\nWith a deep breath you calm your raging emotions, trying to go through the scene that just happened in your mind's eye, picking out details and burning them into permanent memory. Somewhere in the \ndistance you hear the wail of sirens alerting you tot the fact it's time to go. You slap your hand down against your gear shift and push it forwards, pulling your car out of the parking spot and \nrushing down the street, hanging a left instead of following the mysterious assailant to the right.\n*goto skippery\n\n\n\n\n*label carchase\n*set covert -5\nThe sound of tires squealing fills the narrow streets of the Greek city, your assassin proving his quite formidable driving skills as he waves through in an effort to escape. He is gaining distance \non you with each city block passed, especially when there is other traffic partly blocking you from chasing him down.\n\nHe takes a sudden right, smashing one of the outside tables of a small cafe as he swings wide. This is becoming dangerous, and not just for the two of you. You pull out your pistol and fire off \ntwo shots, trying to aim for his tires now while you have open space for it. The bullets pierce the bodywork but with a sudden swerve your assassin makes it near to impossible for you to hit your \ntarget accurately. Then he swings a sharp left into a narrow road between buildings.\n\n*if (driving > 70)\n\tWith a tug at the handbreak you swing around that same corner, rushing after him. The street is becoming narrower and narrower towards the end, until it suddenly becomes an alleyway meant for \n\tpedestrian use. You almost lock up your brakes as you try and avoid the same fate awaiting your assassin, your eyes peeled on the back of his car as the vehicle continues at near to full speed \n\tin. There is a horrid screech of metal grinding against the stone walls of the buildings, the vehicle lodging itself in between them, hanging with the tires off the ground.\n\t\n\tThere is a shattering of glass and you can see the assassin kick the windshield away, climbing out and rushing down the alleyway to make a getaway. You smirk and back your car up. There's no \n\tuse in trying to chase him down anymore. He could have gone anywhere and you would just put yourself at further risk of being ambushed. Besides which, your ferry for Italy is leaving soon.\n\t*page_break\n\t*goto skippery\n*else\n\tYou kick your foot down on the brakes and come to a stop just a few meters after the turn. With a swift motion you shift into reverse and back up, whipping the front around so you are facing \n\tdown that narrow street. Another gear shift and you rocket down after your assailant. The street is becoming narrower and narrower towards the end, until it suddenly becomes an alleyway meant for \n\tpedestrian use. You almost lock up your brakes as you try and avoid the same fate awaiting your assassin, your eyes peeled on the back of his car as the vehicle continues at near to full speed \n\tin. There is a horrid screech of metal grinding against the stone walls of the buildings, the vehicle lodging itself in between them, hanging with the tires off the ground.\n\t\n\tThere is a shattering of glass and you can see the assassin kick the windshield away, climbing out and rushing down the alleyway to make a getaway. You smirk and back your car up. There's no \n\tuse in trying to chase him down anymore. He could have gone anywhere and you would just put yourself at further risk of being ambushed. Besides which, your ferry for Italy is leaving soon.\n\t*page_break\n\t*goto skippery\n\n\n\n\n*label carflee\n*set covert -5\n*set nasonov_wounded true\nThe rear tires squeal in agony as you come around the corner, rounding another block of these small Greek streets. This one is cobblestoned, causing the entire car to shake enough to feel as if it \nis coming apart at the seams. You glance back at the rear view mirror once you are reaching the end of the city block lined with old-fashioned architecture from a more crown-headed times, seeing the \nfront of your assassin's car turning after you. Without hesitation you take the next left possible, heading up to the winding roads leading up to the mountains in an effort to either lose or ruin \nthe stranger on those narrow and precarious roads.\n\nThe hillclimb causes the engine in your car to whine, the gearbox crunching loudly as you shift between gears to try and keep the speed up. Meanwhile the car chasing you is slowly making up the \ndistance, neatly rounding the apex of the corner before the hill starts to become steeper. The road zig-zags up the side of the mountain only a few times, but hopefully your assailant makes a mistake \nyou can benefit from. Especially since you should be on your way in the exact opposite direction - towards a ferry waiting to leave for Italy.\n*page_break\nYou turn the sharp corner to the next straight stretch of the road, your assassin friend now very close behind you. As soon as you've turned in you see a truck right there in front of you. The driver \nswerves to avoid you and the car behind you, near to toppling over his vehicle with such a sudden jerk at the wheel. \n*if (driving > 70)\n\tThere is plenty of space on the shoulder on the drop side. A whole tire width in fact. You use that space to the best of your ability, hearing the gravel beneath your tires for just a moment as \n\tyou manoeuvre around the truck and shoot off into the distance as fast as you can. A look through the rear view mirror tells you that your assassin is a formidable driver as well since he chooses \n\tto follow your lead along the shoulder.\n\t\n\tHowever, the truck is already toppling over by the time he veers over to the shoulder. A crate on the bed of the truck teeters for a moment, then falls onto the asphalt road only to shatter. You \n\tcan't see what it contained, but it must have been something that breaks easily and form sharp edges, or was just sharp otherwise, because you see the chase car's tires blow out.\n\t\n\tThere's a loud screech of rubber sliding on asphalt, then a loud crash as your assassin loses control and veers off the edge. By the sound of it the car ends up on the road below, which is not that \n\tbig of a fall, but big enough to make sure your assassin won't be chasing you anymore no matter which way he ended up landing. With a flick of the handbrake at the next corner you whip the car \n\taround, then start heading back down.\n\t\n\tYou can still make it to the ferry.\n\t*goto fleepass\n*elseif (driving >= 50)\n\tThere is some room on the shoulder. Perhaps a tire width or so. It's just enough for you to have some room to manoeuvre around the truck, although you have to take your foot off the gas pedal to \n\tmake sure you are able to avoid a certain collision. You can sense the back of the truck nearly grinding against the side of your car as you pass, but you're through. A look through the rear view \n\tmirror tells you that your assassin is quite the formidable driver since he chooses to use the narrow shoulder to its fullest extent.\n\t\n\tHowever, the truck is already toppling over by the time he veers over to the shoulder. A crate on the bed of the truck teeters for a moment, then falls onto the asphalt road only to shatter. You \n\tcan't see what it contained, but it must have been something that breaks easily and form sharp edges, or was just sharp otherwise, because you see the chase car's tires blow out.\n\t\n\tThere's a loud screech of rubber sliding on asphalt, then a loud crash as your assassin loses control and veers off the edge. By the sound of it the car ends up on the road below, which is not that \n\tbig of a fall, but big enough to make sure your assassin won't be chasing you anymore no matter which way he ended up landing. You slow down and take in a deep breath, then make a neat three-point \n\tturn at the corner so you can start heading back.\n\t\n\tYou can still make it to the ferry.\n\t*goto fleepass\n*else\n\tThere is some room on the shoulder. Perhaps a tire width or so. It's just enough for you to have some room to manoeuvre around the truck, although you have to take your foot off the gas pedal to \n\tmake sure you are able to avoid a certain collision. Or so you think. Suddenly the back of the truck swings around and collides directly with the back of yours. You were almost safely through, \n\tbut now find yourself swinging around from the impact. The tires scream and smoke up the whole width of the road as you go across, only to be stopped by the side of your car slamming against the \n\tstraight-cut wall of stone reaching up to the next road heading higher up.\n\t\n\tHowever, you are not only one veering out of control. A crate has fallen off the bed of the truck and shattered, spreading something on the road that has caused your assassin's tires to blow up. \n\tAs the tiresmoke dissipates around your car you can see the chase car veer off the edge, and by the sound of it end up on the road below. It's not that big of a fall, but big enough to make sure \n\tyour assassin won't be chasing you anymore no matter which way he ended up landing. You put your car back into gear, quickly moving back to the road.\n\t\n\tYou can still make it to the ferry.\n\t*goto fleepass\n\n\n*label fleepass\n*page_break\nThe assassin's car has ended up on its side on the street below the one you were on. The truck has come to a stop at the corner just before it went off the side as well, with the driver sitting in \nthe cab in sheer shock. A glance into the toppled over car however reveals that the man who tried to kill you is nowhere to be found. You even stop and make absolutely sure to have a very close look \ninside.\n\nYou take a look down the side of the road as well, but there's nobody there either. Your assassin has well and truly disappeared.\n\nUnfortunately you do not have that much time to chase him down or ponder where he could have gone, your ferry is about to leave.\n*page_break\n\n*label skippery\nThe front wheels hit the edge of the ramp leading up to the ferry, the rear tires squealing as they lose grip for just a moment as you rush up and into the last available spot on the vessel. Somewhere \nabove you the horn of the ferry blows in signal that it is leaving port, and the ramp begins to slowly lift up at the same time, sealing the inside of the ship. You take in a deep breath and slap your \nhand against the wheel nervously.\n\nOff to Italy you head.\n*finish Chapter 5: Safehouse Roma\n\n\n\n\n*label deathending\nSo your story comes to an abrupt end.\n\nThe diamonds still flow into the West and into Africa, fuelling the fires of revolution and corruption while mother France remains blissfully ignorant of just why those fires are as powerful as \nthey are. Someone would eventually replace you and begin asking the right questions to get on the trail of diamond smuggling in the Mediterranean, but you would forever remain stricken from record.\n\nYour body would be interred in a nameless grave somewhere in Igoumenitsa.\n\nDo you wish to try again?\n*choice\n\t#Yes, please.\n\t\t*goto retry\n\t#No, thank you.\n\t\t*ending\n\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first four chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2017-08-17 $3.99 $2.99 purchased\n*abort", "choicescript_description": "Diamonds are pouring out through the Iron Curtain, but somebody talked - your entire spy ring is either dead or disavowed. Everything ties back to what happened a decade prior in Africa, and you have to find out where it ends. The mission isn't over.\n\n[i]Diamant Rose[/i] is a 87,000 word interactive cold war novel by Teo Kuusela, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Experience an exciting romp through the deadly world of espionage![n/]\n• Play the part of a French intelligence agent.[n/]\n• Evade enemies, find old friends, manipulate those closest to your targets.[n/]\n• Shut down a major operation funnelling Soviet diamonds past the Iron Curtain.[n/]\n• Will you focus on revenge, or redemption? Your future depends on your actions.\n", "choicescript_stats": "*temp fullname \" \"\n*temp tempdis 0\n*temp codename \"Phoenix\"\n\n*if (disguises \u003c= 100)\n\t*set tempdis disguises\n\n*set fullname ((name & \" \") & surname)\n\n*label statpage\n*if not(choice_nightmode)\n\t*image stats_flair.png center Service de Documentation Extérieure et de Contre-Espionnage. Stamped TRÉS SECRET\n*if choice_nightmode\n\t*image stats_flair_invert.png center Service de Documentation Extérieure et de Contre-Espionnage. Stamped TRÉS SECRET\nOperative: ████████ ██████████████\n*line_break\nNIRPP: ████████\n*if choice_is_web\n\t*line_break\n\t*line_break\n\tNext of kin:\n\t*line_break\n\t████████ ██████████████\n\t*line_break\n\t████ ██████████████\n\t*line_break\n\t███████ ██████████████\n\t*line_break\n\t██████ ██████████████\n\t*line_break\n\t█████████ ██████████████\n\n*stat_chart\n\ttext fullname Nom de Guerre\n\ttext Codename\n\ttext Status\n[b]Performance Evaluation[/b]\n*stat_chart\n\tpercent Combat\n\tpercent tempdis Disguises\n\tpercent Driving\n\tpercent technology Gadgetry\n\tpercent Talking\n\topposed_pair Covert\n\t\tOvert\n\topposed_pair Charm\n\t\tMalice", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game.\n\n  *purchase adfree $3.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.\n\n", "closedcity": "*comment 13219\n\n*temp flashlight false\n*temp infodump false\n*temp patrolled false\n*temp car false\n\n*temp tick 0\n*temp rng 0\n\n\n*rand rng 1 20\n\n\"Here,\" the man sitting beside you in the cramped little attic room tells you, offering a cup of fresh steaming coffee towards you. \"You look like you could use it.\"\n\nA light is switched on in the building right across the street from where you are, the little attic window nearly entirely blocked off by a camera with a telescope lens attached, and a telescope \nstanding by itself on a tripod. You've been in the Crimea for only a few days but already you're in the thick of it. Beside you stands Remi Boulanger, a fellow French agent who has spent years \nout here along the coast of the Black Sea, working with a small spy ring to keep an eye out on whatever the Soviets might be doing out here.\n\nThis is the latest place where those damnable diamonds have been spotted, and so you've been sent after them. Remi h
