l balancing act indeed, but you manage to move the conversation in a way that doesn't make Jishkariani lose control just yet. He's still getting constantly more and more \n\t\t\tagitated, but he's still holding in there.\n\t\t\t*goto dassault\n\t\t*else\n\t\t\tYou try to balance the conversation flow, but Jishkariani grows more and more agitated by the word. It's impossible to keep him from doing something rash, as Lund finds out when he tries \n\t\t\tto turn and hold him back - instead it throws him over the edge. He grabs the pistol from Lund's hand and shoots.\n\t\t\t\n\t\t\tThe whole late evening sky flashes with a bright light one time after another, the bullets ripping through your chest. He's not letting you go down quick, instead aiming deliberately so \n\t\t\tthat you will go down slow and see him shooting the whole magazine. With each shot he comes close and closer, then finally pauses when there's a click and the hammer hits nothing but air \n\t\t\tinside the chamber. The large man closes the last bit of the distance in almost a jog, then kicks you off the side, sending you to certain death.\n\t\t\t\n\t\t\tYou don't hear yourself hit the ground. Everything just kind of stops all of a sudden, your vision going dark.\n\t\t\t*page_break\n\t\t\t*goto death\n\t#Stay quiet and let Lund monologue.\n\t\tLund keeps going on and on at length, but you can see Jishkariani growing more and more agitated by the word. It's impossible to keep him from doing something rash, as Lund finds out when he \n\t\ttries to turn and hold him back - instead it throws him over the edge. He grabs the pistol from Lund's hand and shoots.\n\t\t\n\t\tThe whole late evening sky flashes with a bright light one time after another, the bullets ripping through your chest. He's not letting you go down quick, instead aiming deliberately so \n\t\tthat you will go down slow and see him shooting the whole magazine. With each shot he comes close and closer, then finally pauses when there's a click and the hammer hits nothing but air \n\t\tinside the chamber. The large man closes the last bit of the distance in almost a jog, then kicks you off the side, sending you to certain death.\n\t\t\n\t\tYou don't hear yourself hit the ground. Everything just kind of stops all of a sudden, your vision going dark.\n\t\t*page_break\n\t\t*goto death\n\t#Seize a guard's weapon and turn the tables.\n\t\tYou let Lund talk while you have a look at the guards standing right on either side of you. It will take only basic combat skills to be able to wrest one of those pistols, or to use one of \n\t\tthem as a shield for that matter. Lund has the pistol from the guard inside, which will make him perhaps the most prominent threat. You steady your breathing and take in the cool evening air, \n\t\twaiting for your time to strike. Then, as Jishkariani gets more and more fidgety and Lund turns to handle him, you suddenly twirl around one of the guards and try to seize his gun.\n\t\t\n\t\t*if (combat >= 50)\n\t\t\t*set kills +1\n\t\t\tThe guard is caught suddenly in an arm lock and moved to shield you with his body. Meanwhile you wrest control of his pistol with a sharp tug at his wrist, strong enough to hear a snap \n\t\t\tsomewhere in there. The guard screams, the other guard screams at you to let his fellow go, but Jishkariani is the one to make the first move. He shoots the guard held in your grip in \n\t\t\tthe chest. Then again, and again, and again.\n\t\t\t\n\t\t\tYou bring your gun up and fire off a couple of rounds at the other guard, taking him down, then turn to Jishkariani. The guard in front of you suddenly topples over, the dead weight of \n\t\t\thim wrenching him out of your grasp and forcing you to seek shelter behind some heavy pots.\n\t\t\t\n\t\t\tDamned. Now you're trapped.\n\t\t\t*goto monsault\n\t\t*else\n\t\t\tYou manage to grab the guard into an arm lock and twisted him around to shield you with his body, but he isn't giving you his gun. One blow after another hits his wrist or tries to wrench \n\t\t\tthe pistol from his hand, but he's just not letting go. The other guard screams at you to let his fellow go, but Jishkariani is the one to make the first move. He shoots the guard held in \n\t\t\tyour grip in the chest. Then again, and again, and again.\n\t\t\t\n\t\t\tFinally the guard in front of you lets go of the pistol and you manage to force the other guard into cover with a hasty couple of shots, but then your shield suddenly topples over. The \n\t\t\tdead weight of him is too much for your grip and you're forced to seek shelter behind some heavy pots.\n\t\t\t*goto monsault\n\n\n*label dassault\n\nIt's a noise from behind the two smugglers that suddenly catches their attention, breaking their focus on you. It's ${helper}, suddenly facing them down, grasping a pistol in her hands and causing \na very sudden shift in the power balance of the situation. The guards on either side of you turn to her as well, which allows you to pick one off quickly, grabbing his pistol and pointing it at \nLund while all other weapons become drawn and pointed in what could easily be considered a classic Mexican standoff.\n\n*if not (evony_out)\n\t\"Evony?\" Vepkhia sasy quizzically, the situation dawning on him while Lund just chuckles to himself.\n\t\n\t\"Well well, the kitty finally grew claws,\" Lund says and peers directly at Evony.\n\t\n\t\"This is it. Vepkhia, Ingemar, I've had enough. Enough of the both of you!\" Evony cries out at the two men, her hands shaking, the . \"Whatever this is... it ends now. I will have no part in your plans any longer.\"\n\t\n\t\"What a shame,\" Lund says with an almost cocky tone to his voice, while Vepkhia appears to be stunned into silence for the first time in his life.\n*label monsault\n*page_break\nThere's shouting coming from the inside of the mansion: the sound of guards rushing up to the roof.\n\nSuddenly there's a noise of helicopters flying low at high speed. You glance off the roof for just long enough to see two helicopters rise up off the shores of the island and buzz right over the \nmansion. Their arrival is the best possible time for gunshots, so everyone takes their chance at shooting anyone they can see, at the same time looking for better cover. The doors to the helicopters \nopen and out peer armed men, these equipped with fully automatic rifles, their fire raking across the roof nearly indiscriminately to force everyone to stop.\n\nYou know they're CIA. They have to be. Although, if they have identified themselves you certainly haven't heard it. The sound of guards rushing out to the roof comes across the chopping blades \nof the helicopters, but is then silenced by the rapid fire from above pinning the incoming guards before they can even get close.\n\nYou peer out from your chosen cover, only to see Jishkariani and Lund hurrying towards the inside of the mansion. You have a perfect shot for now, but won't for long. You have to pick a target \nbefore they get inside.\n\n*fake_choice\n\t#Shoot Lund and go for the kill.\n\t\t*set lund_killed true\n\t\t*set runner \"Jishkariani\"\n\t\t*set kills +1\n\t\tWith a deep breath you line up the sights of the pistol and follow Lund for a moment as he goes along the roof. Gunfire from above rakes the roof behind the two running men, ricocheting \n\t\toff the stones and sparking up quite impressively in the dark evening.\n\t\t\n\t\tYou squeeze the trigger and watch on as Lund suddenly drops like a stone. Jishkariani in the meanwhile ignores his fallen comrade and makes a dive inside the mansion, for the relative safety \n\t\toffered by the guards shooting up at the helicopters.\n\t#Shoot Lund and go for the legs.\n\t\t*set runner \"Jishkariani\"\n\t\tShooting a moving target is hard enough. Shooting a very slim moving target like a leg is near to impossible. Yet you bring your sights up and give it a shot.\n\t\t\n\t\tSomeone from above you shoots at the same time, making it impossible to know which one of you actually hits, but suddenly you see Lund trip and smash face-first against the roof. Only a \n\t\tcloser inspection will tell you who shot him, since the bullet hole will be the clear clue, but that hardly matters. He's down.\n\t\t\n\t\tYou see gunfire rake across the roof, ricocheting off the stone just behind Jishkariani as he makes a dive inside the mansion and the relative safety offered by the guards shooting up \n\t\tat the helicopters.\n\t#Shoot Jishkariani and go for the kill.\n\t\t*set jishkariani_killed true\n\t\t*set runner \"Lund\"\n\t\t*set kills +1\n\t\tWith a deep breath you line up the sights of the pistol and follow Jishkariani for a moment as he goes along the roof. Gunfire from above rakes the roof behind the two running men, ricocheting \n\t\toff the stones and sparking up quite impressively in the dark evening.\n\t\t\n\t\tYou squeeze the trigger and watch on as Jishkariani suddenly drops like a stone. Lund in the meanwhile ignores his fallen comrade and makes a dive inside the mansion, for the relative safety \n\t\toffered by the guards shooting up at the helicopters.\n\t#Shoot Jishkariani and go for the legs.\n\t\t*set runner \"Lund\"\n\t\tShooting a moving target is hard enough. Shooting a relatively slim moving target like a leg is near to impossible. Yet you bring your sights up and give it a shot.\n\t\t\n\t\tSomeone from above you shoots at the same time, making it impossible to know which one of you actually hits, but suddenly you see Jishkariani trip and smash face-first against the roof. Only a \n\t\tcloser inspection will tell you who shot him, since the bullet hole will be the clear clue, but that hardly matters. He's down.\n\t\t\n\t\tYou see gunfire rake across the roof, ricocheting off the stone just behind Lund as he makes a dive inside the mansion and the relative safety offered by the guards shooting up \n\t\tat the helicopters.\n\nThe guards withdraw from the third floor private lounge, heading down after their boss. You give chase, only to be stopped short by ${helper} rushing to you, intercepting you.\n\n\"Are you alright?\" she asks and you nod. \"We have to go after them.\"\n\n\"I'll go after them. You make sure the roof and this whole floor stays clear,\" you tell her, then run after ${runner}.\n*page_break\nAs soon as you head down the stairs there's gunfire raking above your head, forcing you to keep your head down and your body hidden behind the heavy stone railing. There are at least two dozen guards \ndown there by a quick count you manage to take before they force your head down again. You can hear the helicopters descend outside, the engines cutting off and silence - aside from the gunshots - \nonce more taking over.\n\nWhile you're trying to pick off guards from your vantage point, the doors to the mansion suddenly burst open and in pour the few men you saw on the helicopters previously. The firefight lasts for \nonly a few moments longer before all the guards are either dead or surrendered, and you rush down the steps just in time to see Brandon rushing in.\n\n*if (ides_affair)\n\t\"My god, are you alright?\" he shouts to you, rushing to intercept you and forcing you to pause for long enough to point him to go back.\n\t\n\t\"Go back Brandon, I have to get ${runner}! Secure the mansion!\" you shout at him, then keep running.\n\t*goto chaserino\n*else\n\t\"Great to see you in one piece!\" he calls out to you, but you're already gone out the backdoor after ${runner}.\n\t*goto chaserino\n\n*label chaserino\nThe chase takes you down the stone steps towards Jishkariani's yacht, ending just short of it as you stop ${runner} with a shot right in front of him. He comes to an abrupt stop and turns around, \nholding a pistol still in hand. \n*page_break\n*if (runner = \"Lund\")\n\tLund looks you straight in the eyes and drops his gun, taking a few steps away from it. His lips curl in a smile as you stare each other down at the dark shoreline, his hands rising into the \n\tair.\n\t\n\t\"What now then?\" he calls out to you with a chuckle. \"Will you send me to France? Sent to enjoy a long trial that will end with me in a cushy cell in a low-security prison? Is that what is to \n\tcome of me?\"\n\t\n\t*choice\n\t\t#The rule of law has to prevail.\n\t\t\tYou meet Lund's stare and walk closer to him. Not only is he surrendering to you, he even kneels as you approach him. You swallow hard and steel yourself, Lund's lips parting for another \n\t\t\tsentence trying to provoke you.\n\t\t\t\n\t\t\t\"Come now, we're both civili-\" he starts, but you're close enough to grab your pistol and whip him across the face with it.\n\t\t\t\n\t\t\tThe older man slumps to the ground, limp and unconscious. You heave a sigh and look back up to the mansion, wondering if you did the right thing.\n\t\t\t*goto epilepy\n\t\t#No, this ends right here.\n\t\t\t*set lund_killed true\n\t\t\t*set kills +1\n\t\t\tYou meet Lund's stare and walk closer to him. Not only is he surrendering to you, he even kneels as you approach him. You swallow hard and steel yourself, Lund's lips parting for another \n\t\t\tsentence trying to provoke you.\n\t\t\t\n\t\t\tHe doesn't get a single word out, your trigger finger squeezing down faster than his mouth can work to taunt you. There's a red mist that shoots out the back of his head, and then the \n\t\t\tman slumps limp to the ground.\n\t\t\t*goto epilepy\n*else\n\tJishkariani whips around and points the pistol at you, threatening you with the barrel of his gun just the same as you are doing to him. His lips tug into a confident smile, although his whole \n\tbody is trembling. That'll definitely throw his aim off.\n\t\n\t\"What now?\" he calls out to you. \"Are we to kill one another here on the beach? Fine by me. Go ahead and shoot me!\"\n\t\n\tHe moves closer to you, you move closer to him, your sights staying on one another as you begin to circle around. One step after another crunches against the rocky shore, but Jishkariani shows \n\tno sign of relenting.\n\t\n\t\"Come on! Shoot me!\" he screams out.\n\t*choice\n\t\t#Shoot to kill.\n\t\t\t*set jishkariani_killed true\n\t\t\t*set kills +1\n\t\t\tYou choose to grant a dead man's last wish and squeeze the trigger. Without flinching you see him take the bullet, a red mist exploding from the back of his head before he suddenly \n\t\t\tslumps down dead.\n\t\t\t\n\t\t\tWith a deep breath you look down at Jishkariani's large carcass lying limply against the rocks of the shore. Brandon won't like this.\n\t\t\t*goto epilepy\n\t\t#Wait for him to shoot first, then kill him.\n\t\t\t*set jishkariani_killed true\n\t\t\t*set kills +1\n\t\t\tJishkariani growls, then extends the growl into a yell, then into a scream. It's like a war cry of a man trying to pump himself up for death, but as his finger squeezes the trigger, there's \n\t\t\tnothing but a metallic click. He's empty. Then its your turn.\n\t\t\t\n\t\t\tWithout flinching you see him take the bullet, a red mist exploding from the back of his head before he suddenly \n\t\t\tslumps down dead.\n\t\t\t\n\t\t\tWith a deep breath you look down at Jishkariani's large carcass lying limply against the rocks of the shore. Brandon won't like this.\n\t\t\t*goto epilepy\n\t\t#Wait for him to shoot first, then shoot to disarm.\n\t\t\tJishkariani growls, then extends the growl into a yell, then into a scream. It's like a war cry of a man trying to pump himself up for death, but as his finger squeezes the trigger, there's \n\t\t\tnothing but a metallic click. He's empty. Then its your turn.\n\t\t\t\n\t\t\tHe flinches as the bullet hits him in the shoulder, having not expected that. A blood-curdling cry of pain escapes his lips and the pistol drops to the ground, the large man falling to his \n\t\t\tknees. You rush over and kick the gun away, then swing your hand down, whipping Jishkariani across the face with your pistol.\n\t\t\t\n\t\t\tThe man slumps to the ground, limp and unconscious. You heave a sigh and look back up to the mansion, wondering if you did the right thing.\n\t\t\t*goto epilepy\n\t\t#Shoot to disarm him.\n\t\t\tYou choose to grant a condemned man's last wish and squeeze the trigger. He flinches as the bullet hits him in the shoulder, having not expected that. A blood-curdling cry of pain escapes \n\t\t\this lips and the pistol drops to the ground, the large man falling to his knees. You rush over and kick the gun away, then swing your hand down, whipping Jishkariani across the face with \n\t\t\tyour pistol.\n\t\t\t\n\t\t\tThe man slumps to the ground, limp and unconscious. You heave a sigh and look back up to the mansion, wondering if you did the right thing.\n\t\t\t*goto epilepy\n\n\n\n\n*label epilepy\n*page_break\nThe walk back up into the mansion feels far longer than before. There's a heaviness on your shoulders, a burden that finally has the opportunity to start pushing down now that it's all finished. \nAs you get atop the stone stairs you see the commandos in civilian clothes regrouping in the foyer. It's not all of them, but most of them. The others must still be clearing what lies below. \n*if ((evony_out = \"false\") and (sekou_killed = \"true\"))\n\t*set evony_affair false\n\tYou see a figure storming out of the mansion, heading towards you in what can only be considered a huff. As you get closer you see it's Evony and stop, letting her march towards you. For a \n\tmoment you think she might be glad at everything being over and done with, but then see the grimace on her face. She marches straight to you and slaps you hard across the face.\n\t\n\t\"It's true, isn't it?\" she demands to know. \"You killed Sèkou!\"\n\t\n\tAs you recover from the blow you can see Brandon standing at the top of the stone steps, wincing at the heavy blow and the accusation. He had been there when it happened, you had chosen to \n\tdo it personally instead of letting him go ahead with it, so you do not have a defence ready for yourself. You turn back to look at Evony but before you can open your mouth to try and say \n\tanything she smacks you across the face again. She turns straight afterwards and storms up the steps, huffing loudly in a blind fury that makes Brandon step well clear of the incoming woman, \n\this hands raised at his sides to show he's not going to stand in her way.\n\t\n\tAfter Evony has stormed off, Brandon starts to slowly walk down towards you, wincing again as he sees you press a hand against your throbbing cheek.\n\t\n\t\"Well it could have been worse,\" he tells you with a chuckle. \"She could have still had a weapon on her.\"\n\t\n\tYou sigh and start climbing up the steps, walking past the American agent. \n\t*if (ides_affair)\n\t\tHe places a hand on your shoulder as you pass him by and stops you, peeking over at your cheek. With a soft smile he lifts a hand up and strokes your sore cheek with a cool hand, then \n\t\tleans closer.\n\t\t\n\t\t\"I'm glad you're alright,\" he tells you with a smile, then leans closer, your lips meeting in a soft kiss.\n\t\t*finish Epilogue: Vol du Phénix\n\t*else\n\t\tHe places a hand on your shoulder and pats down firmly a couple of times. There are no more words, you just make the journey up into the mansion together, but just as you reach the top \n\t\tof the steps you hear Brandon chuckle again under his breath.\n\t\t*finish Epilogue: Vol du Phénix\n*else\n\t*if (ides_affair)\n\t\tAs you get closer you see Brandon walk out of the mansion, getting to the top of the stone steps before halting to wait for you. You keep climbing and see that there is a wide smile on \n\t\this face. He places a hand on your shoulder as soon as you reach him and stops you. With a soft smile he lifts a hand up and strokes your jawline with a cool hand, then leans closer.\n\t\t\n\t\t\"I'm glad you're alright,\" he tells you with a smile, then leans closer, your lips meeting in a soft kiss.\n\t\t*finish Epilogue: Vol du Phénix\n\t*else\n\t\tAs you get closer you see Brandon walk out of the mansion, getting to the top of the stone steps before halting to wait for you. You keep climbing and see that there is a wide smile on \n\t\this face. As soon as you reach him he lifts his hand and pats down on your shoulder hard.\n\t\t\n\t\t\"Well that was one hell of a rescue mission,\" he tells you with a loud laugh. \"Are you alright.\"\n\t\t\n\t\tYou give a quick nod and receive another firm pat on your shoulder. Then the large American pulls you with him to celebrate a job well done.\n\t\t*finish Epilogue: Vol du Phénix\n\n\n\n\n\n\n*label death\nSo your story comes to an abrupt end.\n\nThe diamonds still flow into the West and into Africa, fuelling the fires of revolution and corruption while mother France remains blissfully ignorant of just why those fires are as powerful as \nthey are. \n*if (evony_out)\n\tThe Americans would carry on with the investigation, only to crack it several years later once their honeytrap is embedded deep enough inside to blow the whole thing wide open. You, however, \n\twould remain as a footnote in their files, otherwise stricken from history.\n\t\n\t*goto deathier\n*else\n\tSomeone would eventually replace you and begin asking the right questions to get on the trail of diamond smuggling in the Mediterranean, but you would forever remain stricken from history.\n\t\n\t*goto deathier\n\n*label deathier\nYour body would be dumped off Jishkariani's yacht some days later, only to end up washed up off the coast of Sicily in such a condition that identification would be impossible even from someone close \nto you. Your final internment would happen in a small village, placed into a small Catholic graveyard under a blank headstone.\n\n*ending\n\n\n", "highstakes": "*comment 16825\n\n*temp tick 0\n*temp brandauer_call false\n*temp evony_help false\n*temp evony_suspicion false\n\n\n\"Good evening,\" you greet the valet rushing to open the car door for you, another valet getting the door for Evony.\n\nYou step out of the car and make sure to grab your briefcase personally before you make your way inside the casino hotel to check into a room. As soon as you enter through the gilded doors you're hit with \nthe mixed wall of smoke from cigars, cigarettes, and pipes. With Evony by your side you make your way to reception, but when you are about to ask for a free room Evony steps past you and greets the woman \nbehind the desk like an old friend. Her demeanour is now that of a confident and experienced businesswoman, not the trembling woman who spent the whole trip to the French Riviera avoiding looking at \nanything except the rising mountains.\n\n\"Good evening, Michelle,\" she chimes with a wide smile - the same she had on for the party near Rome. \"I will have my usual suite, and please put another suite on my account as well.\"\n\nEvony turns to you and offers a more genuine smile to you while the woman behind the desk starts checking for available rooms. A thin book is placed on the desk and turned around so Evony and yourself \ncan put down your signatures, then receive keys. You glance at Evony's, then yours, noting that you will be sharing a wall it seems.\n\n\"A thank you for what you did for me in Rome,\" she tells you with a smile before she leans close and plants a soft kiss on your cheek. \"Now, I am sorry, but I have much to do and many people to call. I \nhope to meet you again during our stay here.\"\n\nShe walks off towards the elevators while you turn back to the woman on the other side of the reception desk. You offer her a smile, then place the box of casino chips in front of her.\n\n\"Would you be so kind as to store these for me and open an account in the casino for me?\"\n\n*if (gender = \"male\")\n\t\"Certainly, Monsieur. \n\t*goto surries\n*elseif (gender = \"female\")\n\t\"Certainly, Mademoiselle. \n\t*goto surries\n*else\n\t\"Certainly. \n\t*goto surries\n\n*label surries\nIt seems you have already played with us before?\"\n\n\"Yes, but there were... special circumstances that forced me to close my old account.\"\n\n\"Ah, \n*if (gender = \"male\")\n\tvery well Monsieur. \n\t*goto surries2\n*elseif (gender = \"female\")\n\tvery well Mademoiselle. \n\t*goto surries2\n*else\n\tvery well. \n\t*goto surries2\n\n*label surries2\nUnder which name shall I put this account?\" she asks.\n\n\"Put it under ${surname}. Thank you.\"\n*page_break\nWhen you get to your room you take a moment to pause right outside your door, hearing Evony's voice muffled and incomprehensible through the luxurious door leading into her suite. She must be on the \nphone already. You open your door and slip inside, locking the door behind you before moving any further into the luxuriously furnished sitting room. A door lead into a large bedroom, another door \nleads to an equally fancy bathroom with a large bathtub and shower.\n\nThe windows overlook the beautiful Monaco harbour, the boats visible in the beautiful sunset orange that shines off the waves of the Mediterranean sea. Some of them look large enough to be the \nPolaris, although from this distance it's impossible to see without getting out your binoculars.\n\n*label roomchoice\n*if (tick = 2)\n\t*goto knocking\n*hide_reuse\n*choice\n\t#Use the drill and listening device to hear Evony's conversation.\n\t\t*set evony_listened true\n\t\t*set covert +5\n\t\tYou pop open your briefcase and rummage around for the additional equipment you stuffed in there: the ones that you recovered from your safehouse in Rome to be specific. The drill is in a \n\t\tdull greyish blue sleeve, disassembled into so small pieces that it cannot be any thicker than a normal envelope that has a glove inside it. That is a terrible analogy, but also as close to \n\t\taccurate as you can think of.\n\t\t\n\t\t*if (technology >= 70)\n\t\t\t*set tick +1\n\t\t\tYou were always good with gadgets, and putting together this drill that has been dismantled into a dozen pieces is like assembling your old service rifle from your army days - you could \n\t\t\tdo it in your sleep. No more than half a minute later you have it in working order and fitted with a drillhead, then start drilling a hole into the wall you share with Evony's suite, \n\t\t\tright near the bottom of the wall just to make sure the hole created is out of a normal line of sight.\n\t\t\t\n\t\t\tIt doesn't take too long to slowly grind away the wood separating the two of you, and as soon as you're thought you pull the drill away. The listening device is essentially a long metal \n\t\t\trod, roughly the size of a normal pen, with a microphone at one end and an audio jacket on the other that you can connect either to a recording device in those fancy gadget shoes of \n\t\t\tyours or a larger recording device.\n\t\t\t\n\t\t\tYou remove the heel of one of the shoes, revealing a small recorder hidden within, a small coil of magnetic tape waiting to be set up. It doesn't take you too long for you to start up \n\t\t\tthe machine, hearing the quiet whirr of the motor inside start turning the magnetic tape over. That should do it.\n\t\t\t\n\t\t\t*goto roomchoice\n\t\t*elseif (technology = 50)\n\t\t\t*set tick +1\n\t\t\tYou were never good at assembling these things. They go into so many different parts and then feel so flimsy once you get it together, it's just not your thing. But you still open up \n\t\t\tthe sleeve containing the drill and start putting it together. A minute or so later you have it in working order and fitted with a drillhead, then start drilling a hole into the wall \n\t\t\tyou share with Evony's suite, right near the bottom of the wall just to make sure the hole created is out of a normal line of sight.\n\t\t\t\n\t\t\tIt doesn't take too long to slowly grind away the wood separating the two of you, and as soon as you're thought you pull the drill away. The listening device is essentially a long metal \n\t\t\trod, roughly the size of a normal pen, with a microphone at one end and an audio jacket on the other that you can connect either to a recording device in those fancy gadget shoes of \n\t\t\tyours or a larger recording device.\n\t\t\t\n\t\t\tYou remove the heel of one of the shoes, revealing a small recorder hidden within, a small coil of magnetic tape waiting to be set up. It doesn't take you too long for you to start up \n\t\t\tthe machine, hearing the quiet whirr of the motor inside start turning the magnetic tape over. That should do it.\n\t\t\t\n\t\t\t*goto roomchoice\n\t\t*else\n\t\t\t*if (tick = 0)\n\t\t\t\t*set tick +2\n\t\t\t\tYou were never good at assembling these things. They go into so many different parts and then feel so flimsy once you get it together, it's just not your thing. But you still open up \n\t\t\t\tthe sleeve containing the drill and start putting it together. A couple of minutes later you have it in working order and fitted with a drillhead, then start drilling a hole into the wall \n\t\t\t\tyou share with Evony's suite, right near the bottom of the wall just to make sure the hole created is out of a normal line of sight.\n\t\t\t\t\n\t\t\t\tIt doesn't take too long to slowly grind away the wood separating the two of you, and as soon as you're thought you pull the drill away. The listening device is essentially a long metal \n\t\t\t\trod, roughly the size of a normal pen, with a microphone at one end and an audio jacket on the other that you can connect either to a recording device in those fancy gadget shoes of \n\t\t\t\tyours or a larger recording device.\n\t\t\t\t\n\t\t\t\tYou remove the heel of one of the shoes, revealing a small recorder hidden within, a small coil of magnetic tape waiting to be set up. It takes you a good while to start up the machine, \n\t\t\t\talmost ruining the magnetic tape in the process, but eventually you hear the quiet whirr of the motor inside start turning. That should do it.\n\t\t\t\t\n\t\t\t\t*goto roomchoice\n\t\t\t*else\n\t\t\t\t*set tick +2\n\t\t\t\tYou were never good at assembling these things. They go into so many different parts and then feel so flimsy once you get it together, it's just not your thing. But you still open up \n\t\t\t\tthe sleeve containing the drill and start putting it together. A couple of minutes later you have it in working order and fitted with a drillhead, then start drilling a hole into the wall \n\t\t\t\tyou share with Evony's suite, right near the bottom of the wall just to make sure the hole created is out of a normal line of sight.\n\t\t\t\t\n\t\t\t\tIt doesn't take too long to slowly grind away the wood separating the two of you, and as soon as you're thought you pull the drill away. The listening device is essentially a long metal \n\t\t\t\trod, roughly the size of a normal pen, with a microphone at one end and an audio jacket on the other that you can connect either to a recording device in those fancy gadget shoes of \n\t\t\t\tyours or a larger recording device.\n\t\t\t\t\n\t\t\t\tJust as you're removing the heel off one of the shoes, you're interrupted. \n\t\t\t\t*goto roomchoice\n\t#Change clothes and go gambling.\n\t\tYou take the dry cleaning bag with the same fine clothes you had worn for the party near Rome. The hotel had really done a quick job at giving it a quick clean, making you ready to hit the \n\t\tcasino floor in full regalia, so to speak. The just to make sure you're looking representable, you head into the bathroom to double-check everything via the large mirror in the bathroom.\n\t\t\n\t\t*goto knocking\n\t#Try and see if you can see Jishkariani's yacht in the harbour.\n\t\t*set tick +1\n\t\tYou open up your briefcase \n\t\t*if (evony_listened)\n\t\t\tonce again \n\t\tand recover those small binoculars that served you ever so well while last time observing Jishkariani's affairs. With a quick tuning of the binoculars you can tell the yachts at much greater \n\t\tdetail, although they still look fairly small. It's enough to see details, however, and comparing one yacht to another gives you a good sense of which ones might match with the Polaris. \n\t\tHowever, you can't find that specific yacht in the bunch, but if Titos is correct you will be likely to see it sailing in eventually.\n\t\t\n\t\tYou lower the binoculars from your face and take a deep breath, looking out towards the open horizon. Somewhere over there is Majorca, Jishkariani's private little hiding place. Maybe the \n\t\tyacht is there as well, or perhaps it is still en route from Greece. Who knows, it could have made a stop in Tunisia for all you know.\n\t\t\n\t\t*goto roomchoice\n\n\n\n\n*label knocking\nA sudden knock at the door startles you from what you were doing. Just in case it's another nasty surprise for you, you grab your pistol and hide it behind your back on the way to the door. You \npeer through the peephole into the hallway outside, seeing a woman standing outside your door, holding a bottle of something.\n*page_break\nThere's another knock while you watch the woman to make sure she doesn't have any tricks up her sleeve. She's a striking redhead who just so happens to fill out her casino \nhostess uniform in such a way that you're sure she has an excellent record of return customers. You open the door and come face-to-face with her, seeing that in her hands is a bottle of what \nlooks like scorpion wine. Probably Vietnamese guessing by the kind of letter stamped on the label.\n\n\"Yes?\"\n\n\"Oh, good evening, I was asked to bring up a bottle for you,\" she tells you with a chiming voice, her smile widening.\n\n\"There must have been a mistake, I didn't order -\"\n\n\"A gift from an old friend,\" she tells you in a hushed low tone, giving you a knowing look under her brow. \"I hear it's made a grand tour of Langley and Liberia. Just remember: it tastes better \nif you give the bottom a touch before you taste it.\"\n\nYou look at her for a moment, your eyes flitting down to her breast to see a small plaque pinned to her chest: Kalliope Raptis, waitress. Slowly you remove your hand from the door and take the \nbottle from her. She offers you a smile and a nod, then turns around so she can walk off back to whatever duties she might have. You close the door and holster your pistol, then look at the bottle \nagain. The bottle is far lighter than it's supposed to be, and as you flick the bottle back and forth there is no real splash of the liquid inside. It seems like the bottle has double-layered glass \nwith liquid only between those layers.\n\nCheck the bottom, huh? You turn the bottle over and check the seam running along the bottom edge, noting that it's barely wider than usual bottles of liquor, wine, or even something like scotch. \nWith a sigh you take hold of the bottom of the bottle, then grip the neck, then twist in opposite directions. The bottom unscrews and pops out, revealing that there is a small rolled-up piece of \npaper hidden inside. Unfolding it, you discover a short message.\n\n\"[i]Good seeing you, friend.[/i]\n*line_break\n[i]I hope you know Baccarat.[/i]\n*line_break\n[i]Table eight, 11pm.[/i]\n*line_break\n[i]- Brandon Ides[/i]\"\n\nBrandon Ides? What the hell is the CIA doing in Monaco?\n\nWhile you're studying the bottle you hear the door next to yours open, and as you rush to the peephole can see Evony walking down the hallway past your door, dressed in a wonderful and very expensive \nlooking deep purple dress.\n*page_break\n*if (evony_listened)\n\tYou rush back to the listening device and turn off the recording before the magnetic tape runs out completely. It hasn't been running for long, but the tape isn't exactly very long either. You \n\tgo to the effort of rewinding the tape and then listening to it. The recording starts mid-conversation. Unfortunately you cannot hear who is on the other line and what they are saying.\n\t\n\t\"But who was he?\n\t*line_break\n\tNo, no I don't. Why would anyone come after me if you're doing your part? Was it you? Did you send him?\n\t*line_break\n\tFine... Fine! Just as long as it wasn't you or Lund trying to get rid of me.\n\t*line_break\n\tOh, I know my place perfectly, Vepkhia.\n\t*line_break\n\tI don't care! Vepkhia, this is your operation, Ingemar has made it perfectly clear. But I'm still the face, and you need to keep this kind of thing from happening.\n\t*line_break\n\tNo, I still don't care! I don't know what you're doing with my ships, but I know that you bear the responsibility with-\n\t*line_break\n\tI know they're Ingemar's ships, but I'm the one who has my name tied to all of the legitimate papers. If you want that to change, I can sell off my shares and walk away.\n\t*line_break\n\tDon't you dare threaten me, Vepkhia. I just had someone burst into a quiet party and shoot off who knows how many hundred rounds not ten meters from me!\n\t*line_break\n\tNo, I am not fine!\n\t*line_break\n\tYou're arriving tonight?\n\t*line_break\n\tUrgh... Yes, fine, I will meet you at the pier tomorrow afternoon then.\n\t*line_break\n\t... Love you too.\"\n\t\n\tAt that point the conversation ends and you hear Evony put down the receiver, heaving a deep shaky sigh. She paces back and forth right where the listening device has been drilled through, \n\tthen hurries to the door. The door opens and slams shut a mere moment after. This must be where she left the room. You rewind the magnetic tape and store it away, install a fresh coil inside \n\tthe sole of your shoe, and then get ready to head out yourself.\n\t*page_break\nYou sit down at the Baccarat table after having recovered some of your casino chips, setting them in a series of even stacks onto the table in front of you. With quick nods of greeting to the bank \nand the other players, you set down a bet and start playing. \n*if (charm >= 65)\n\tThe first few rounds end up with you quite a bit on top. You're not exactly swimming in chips, but you're as close as you can be to it without sitting at a high roller table.\n\t*goto winnings\n*elseif (charm > 55)\n\tThe first few rounds end up with you on top. The winnings have been meagre so far, but you've been getting your bearings at the table quickly enough, making reading the other players easier.\n\t*goto winnings\n*elseif (charm = 50)\n\tThe first few rounds end up with you being roughly in the same place as you were when you first sat down. When it comes to the chips at least.\n\t*goto winnings\n*else\n\tThe first few rounds end up with you in the hole. Not massively so, but you have definitely been making bad bets and had a horrible card draw so far.\n\t*goto winnings\n\n\n*label winnings\n\nYou glance down at your wristwatch at the same time while giving the stack of casino chips a quick count, expecting a familiar face to appear soon at the table. The time keeps ticking on and you bet on \na hand more, but Ides is nowhere to be found. Instead, you suddenly hear someone from directly behind you offer you a drink. You turn to look behind you, seeing the redhead from before, holding out a \nsilver tray with a martini glass on it.\n\n\"Your drink,\" she says and offers you a smile.\n\nApparently the CIA has gone a bit overboard with the stringing along shtick, which isn't very surprising since you have been burned by the French. That information would have carried over to the \nAmericans as well. You take the drink and the coaster that comes with it, placing it on the edge of the table. As you look down at the glass, you can see through the wide bottom that the coaster has \nsomething written on it. A pair of cards lands in front of you, marking you as the player for this round, and you make sure to place a bet before you slide the cards closer. You take a peek at the \ncards, then take a sip of your drink, at the same time reading the note on the coaster.\n\n\"[i]Running late. Enjoy the Vesper.[/i]\"\n*page_break\nAlmost an hour after that note you finally see the table slowly start to empty and filter out to other games or to enjoy drinks for a change. You stay at the table and wait, finally getting a \nreward as Brandon Ides finally appears through the crowd and makes his way to your table, sitting down on the seat beside yours. The table empties of all but the dealer, as if everyone was just \ncalled away.\n\n\"Sorry about the wait,\" the American says to you in surprisingly fluent French while setting a bet and calling for cards to be dealt to him as well on the next round. \"Colour me surprised that \nyou actually waited. I hear you're not exactly welcome around these parts. For what it's worth, I'm sorry to hear about the whole burning thing and just know that I haven't doubted your loyalties \nat any point. No matter what Langley tells me.\"\n\n\"Oh I'm sorry sir, and you are?\" you ask with an a playful tone, receiving a smirk from the American who is now comfortably seated beside you.\n\n\"You know, you should change that tone of yours. You never know who you might be speaking to... maybe a section chief, for example,\" he says, his smile widening. \"Yeah, I handle all operations \nalong the Rivieras now. In fact, I handle operations all the way to Franco's playground in Spain. Which is why I'm here, aside from making sure an old friend is still a friend, so let's cut to \nthe chase. First of all, I need to know what the hell you're doing with Sèkou Marcine's old fling.\"\n\nIf it hadn't dropped for you yet, now it definitely had. Evony Lellouche was once engaged to Sèkou Marcine - you were responsible for the two becoming torn from one another suddenly. Not that \nMarcine did not have it coming to him whether you were involved or not.\n\n\"How do you know about that?\"\n\n\"We have eyes and ears in place. You arrived with her in a Maserati that by now must have been reported as stolen. \n*if (evony_affair = \"true\")\n\tYou know, I saw the way she looks at you and it's the same look she used to give her lover. Oh yes, she has a lover, but you should already know that if you've done your homework. Now, \n\tseriously, tell me: \n*if ((evony_affair = \"false\") and (evony_bed = \"true\"))\n\tYou know, I saw the way she looks at you and it's like nothing I've ever seen before. It's almost as if she respects you. Now tell me: \nwhat the hell have you gone and done?\"\n\n*choice\n\t#Tell him everything you know.\n\t\t*set charm +5\n\t\t*set covert -5\n\t\tWhile the two of you play cards you speak in hushed voices. You leave out any operational details but make it perfectly clear to Brandon what has been going on as of late, and going by his \n\t\tfacial expressions - most of which are blank but the few that betray any kind of emotional reaction - he has been fully aware of the smuggling operation. It's you telling him about the Lund \n\t\tshipping and Jishkariani's yacht that brings about the biggest reaction from it. His face looks as if suddenly several pieces of information slot together into a revelation.\n\t\t\n\t\t\"Wait, wait, wait,\" he stops you as you get to what happened in Rome. \"You're saying you have a way in?\"\n\t\t\n\t\t\"Maybe.\"\n\t\t\n\t\t\"Look, we've been dangling a honeypot in front of this guy's face for months now. He doesn't budge, and I think that's solely because Lellouche is in the picture. You have to get her out \n\t\tand open the door for us,\" Brandon tells you quietly, flipping his cards over. \"If you want the diamond smuggling ring, we'll get you your diamond smugglers, but Jishkariani is the moneyman \n\t\tfor commies in Africa. We want him to go down hard.\"\n\t\t\n\t\t\"How am I supposed to do that?\"\n\n\t\t\"The same way you got on Lellouche's good side in the first place? You'll think of something. We'll have people watching you and Lellouche, in case things go wrong.\"\n\t\t*goto contact\n\t#Tell him everything relevant to Evony.\n\t\tWhile the two of you play cards you speak in hushed voices. You make sure to answer his question about Evony in great detail, telling him about what happened in Rome and how she is connected \n\t\tto the diamond smuggling, Lund, and Jishkariani. Those names go by in passing, but Brandon's face contorts at each mention as he puts together disparate pieces of information floating around \n\t\tin his head.\n\t\t\n\t\t\"Hold on,\" he suddenly stops you. \"That's our way in.\"\n\t\t\n\t\t\"What is?\"\n\t\t\n\t\t\"We've been dangling a honeypot in front of Jishkariani's face for months now. He doesn't budge, and I think that's solely because Lellouche is in the picture. You have to get her out \n\t\tand open the door for us,\" Brandon tells you quietly, flipping his cards over. \"If you want the diamond smuggling ring, we'll get you your diamond smugglers, but Jishkariani is the moneyman \n\t\tfor commies in Africa. We want him to go down hard.\"\n\t\t\n\t\t\"How am I supposed to do that?\"\n\n\t\t\"The same way you got on Lellouche's good side in the first place? You'll think of something. We'll have people watching you and Lellouche, in case things go wrong.\"\n\t\t*goto contact\n\t#Turn the conversation straight to Jishkariani.\n\t\tWhile the two of you play cards you speak in hushed voices. You bypass the events along the Black Sea, your meeting with Metaxas in Greece, and the events of Rome. Instead you focus on what \n\t\tyou found out about Lund shipping and Jishkariani's yacht, and the probable recovery operation that happens just off the Greek islands. You watch as Brandon's face contorts as he puts together \n\t\tdisparate pieces of information floating around in his head.\n\t\t\n\t\t\"Hold on,\" he stops you suddenly. \"How did you find out about that? Nevermind, if that's true you might end up getting your diamond smugglers.\"\n\t\t\n\t\t\"Here's hoping.\"\n\t\t\n\t\t\"Look, I will help you with that, but I need Jishkariani - and that's where I need your help in return. We've been dangling a honeypot in front of Jishkariani's face for months now. He doesn't \n\t\tbudge, and I think that's solely because Lellouche is in the picture. You have to get her out and open the door for us,\" he tells you and slaps his cards on the table. \"Jishkariani isn't just \n\t\ta diamond smuggler, he's the moneyman for most of the commies in Africa. We want him to go down hard.\"\n\t\t\n\t\t\"How am I supposed to do that?\"\n\n\t\t\"The same way you got on Lellouche's good side in the first place? You'll think of something. We'll have people watching you and Lellouche, in case things go wrong.\"\n\t\t*goto contact\n\t#Try and be as vague as you can about everything you know.\n\t\t*set charm +5\n\t\t*set covert +5\n\t\tWhile the two of you play cards you speak in hushed voices. Your vagueness about everything is quickly getting on Brandon's nerves and you can see him grimace, his face contorting as you keep \n\t\ttalking. Finally he just stops you outright.\n\t\t\n\t\t\"Look, I'm not an idiot. You can keep your secrets but we can help each other out,\" he tells you. \"Here's the thing. We've been dangling a honeypot in front of Jishkariani's face for months now. \n\t\tHe doesn't budge, and I think that's solely because Lellouche is in the picture. You have a way in, and you have to get her out and open the door for us. Whatever you want with them, Jishkariani \n\t\tis the moneyman for commies in Africa. We want him to go down hard.\"\n\t\t\n\t\t\"How am I supposed to do that?\"\n\n\t\t\"The same way you got on Lellouche's good side in the first place? You'll think of something. We'll have people watching you and Lellouche, in case things go wrong.\"\n\t\t*goto contact\n\n\n\n*label contact\n*choice\n\t#\"What do you know about Jishkariani and his operation?\"\n\t\t\"We've been following his dealings for a while. Everything goes through that mansion of his, and that place is a fortress. Nobody who isn't invited can get in or out. The staff is vetted and all \n\t\tof them have been working there for years, and before that they've been working somewhere where Jishkariani can keep an eye on them. That's all of them, no exceptions; from servants, to cooks, \n\t\tto cleaners, to gardeners. Every single one of them have been vetted.\"\n\t\t\n\t\t\"So you have to be invited. By Jishkariani, or someone in the inner circle.\"\n\t\t\n\t\t\"Exactly. That's where you come in.\"\n\t\t\n\t\t*if ((talking > 50) and (charm > 55))\n\t\t\tTo be fair, you are quite the charmer. It probably won't take too much to figure out a way to cajole your way inside the mansion - especially with Evony backing you up. Of course, she hasn't \n\t\t\tso far been very interested in letting you in, but maybe you can force the issue.\n\t\t\t*goto contact\n\t\t*else\n\t\t\tUnfortunately you aren't exactly the type to talk and charm your way into that mansion, but you can certainly still try to get in by other means.\n\t\t\t*goto contact\n\t#\"What do I get in return for helping you?\"\n\t\t\"I can pull some strings, make sure that after all this is done you can get a new identity, a new life,\" he tells you. \"If that's what you want. Everything will be legitimate, not just a \n\t\tcover.\"\n\t\t\n\t\t\"And if I want my old life back? To go back to France?\"\n\t\t\n\t\t\"Look... I can try, but that kind of thing is well beyond my paygrade,\" he tells you and sighs. \"It's not normal for a burned agent to be taken back in. It just doesn't happen. Once the call \n\t\tgoes out, it's over. Hell, I could be burned just for talking to you right now, but I have a feeling that you wouldn't sell out France. So if you can't prove it to the frogs - no offence - \n\t\tyou can prove that you're not working as a double-agent and we can still set you up somewhere nice.\"\n\t\t*goto contact\n\t*if (evony_listened = \"true\") #Tell Brandon about Evony's call and Jishkariani's pending arrival to Monaco.\n\t\t\"So,\" he says with a chuckle. \"It appears you certainly haven't lost your edge. That information helps a great deal. Knowing Jishkariani, he will be hitting the high-roller tables here as soon \n\t\tas he can. That'll make planning ahead far easier. Thank you.\"\n\t\t\n\t\t\"What's his usual routine after reaching Monaco?\"\n\t\t\n\t\t\"He comes straight here. There's no deviation, even when he has business with someone. That's why we're keeping such a close look at the place. Whatever he's doing while he's in Monaco, it \n\t\tall happens inside these walls, or on his yacht if absolute privacy is necessary.\"\n\t\t*goto contact\n\t#Collect your chips and invite Brandon up for a drink.\n\t\tIt becomes clear that you've talked for long enough. Any further would start drawing curious looks your way, and so you decide to collect your chips. While you're standing up and stuffing \n\t\tyour pocket with the clay tokens, Brandon places a card on the table in front of you. You instantly reach over and slide it back.\n\t\t\n\t\t\"You can buy me a drink first. You know what room I'm in,\" you tell him with a smile dancing on your lips.\n\t\t\n\t\t\"I'm on company time.\"\n\t\t\n\t\t\"Then once you're off company time.\"\n\t\t*page_break\n\t\tThat same evening, around when you are just about ready to give up on Brandon, there is a knock at your door. A peek through the peephole shows you the distorted face of Brandon waiting on \n\t\tthe other side, and you open the door quickly to let him in. He rushes past you as soon as the crack in the door is wide enough, then helps you close it.\n\t\t\n\t\t\"I really shouldn't be here,\" he tells you and sighs, then presents you with a bottle of red wine.\n\t\t\n\t\t\"Well, now you are. So what were you going to tell me at the table?\" you say with a slightly teasing tone of voice, heading off to fetch a couple of wine glasses so you can pop open the bottle.\n\t\t\n\t\tBrandon walks over to the sofa in the room and places the bottle on the low table in front of it, glancing over his shoulder at you. You pick up a couple of glasses and a corkscrew, then turn \n\t\tyour attention to him. He flashes you that same card he was showing you before at the table. There's a number on it, as well as a name: \"Brandauer\".\n\t\t\n\t\t\"This is very important, so listen closely. Whenever Jishkariani gets here, or you see an opportunity, contact him. He will make sure you are in a position to get close. You can trust him, he's \n\t\tone of ours,\" Brandon tells you and places the card down on the table. \"He will lay the trap that you can spring in order to get yourself in.\"\n\t\t\n\t\tWith a nod you take a look at the card, at the same time placing the glasses down on the table, then hand over the corkscrew so Brandon can take care of opening the bottle. You slide the card \n\t\tinto your pocket and turn back to see the American, smiling as you watch him gingerly open the bottle of wine, then pour it in the two glasses. Soon enough the room fills with the cheerful ringing \n\t\tof the two glasses coming together in a cheers, celebrating your reunion.\n\t\t*page_break\n\t\tThe next few hours go by as you chat and catch up, talking in vague terms about operations that neither of you can actually talk about, getting to know each other more and more. Brandon seems \n\t\tlike he has always considered you a friend, ever since Marcine, and as you keep talking and drinking you can't help but feel that same kind of bond with him. Companions in arms, in a way, tied \n\t\ttogether by fate to keep fighting the same fight. \n\t\t*if (evony_affair)\n\t\t\tAt one point he falls abruptly quiet, then turns to look at you with a concerned grimace.\n\t\t\t\n\t\t\t\"Look, I know it's none of my business, but you shouldn't be stringing along someone like Evony. Use her while you can, get us a way inside, but don't drag her into the mess we're all about \n\t\t\tto step into,\" he tells you and sighs. \"I've done my research. Jishkariani first approached Evony around a month after our operation in Africa. She was put up on a pedestal as a powerful figure, \n\t\t\ther name tied to all sorts of companies, but she's no businesswoman. Or perhaps she is now, but she wasn't then. She was a puppet, a face for Jishkariani, and you do not want to know how \n\t\t\tJishkariani kept her docile. I haven't been able to find out anything concrete, but the rumours are out there: drugs, alcohol, all kinds of abuse, and not the light taps a husband is supposed \n\t\t\tto give to a broad stepping out of line. I'm talking shattered bones.\"\n\t\t\t\n\t\t\t\"Why are you telling me this?\"\n\t\t\t\n\t\t\t\"Because no matter how jaded this line of work has made me over the years, I still believe that Evony Lellouche deserves to go her own way. Do not drag her down into this pit. Tell her she \n\t\t\thas to go, tell her anything that will make her run and not look back. We'll take care of her and supply her with a fresh start somewhere.\"\n\t\t\t\n\t\t\tHe heaves a deep sigh and pours his glass full again, then takes a long sip. For that moment the room is silent and the air feels heavy, then Brandon finally turns to you and smacks his lips, \n\t\t\thesitating in a manner that seems completely foreign to him.\n\t\t\t\n\t\t\t\"If you're manipulating her, fine, hand her over to us after you're done with her. If you care about her, help her escape Jishkariani's clutches. Just... think about it, okay? Anyways, let's \n\t\t\tget back to something more cheerful, huh?\"\n\t\t\t*page_break\n\t\t\n\t\tAt some point during the evening he finally has a look at the time and tries to get up off the couch, murmuring something about it being late and how he should get back to his own bed.\n\t\t*choice\n\t\t\t#Escort him out and make sure he gets to the elevator.\n\t\t\t\t\"Ah!\" you exclaim and put your glass down on the table, standing up so you can help the man to the door. \"I suppose it is getting late.\"\n\t\t\t\t\n\t\t\t\tBrandon sways back and forth on the journey to the suite door, although as you walk behind him you're not at all sure that it isn't just the hotel wobbling under you. Both of you get \n\t\t\t\tsafely to the door and you unlock it after a quick moment of fumbling with the lock. The American shakes your hand as the last thing before he exits, then walks out, starting to hum \n\t\t\t\t\"Marines' Hymn\" on his slow zig-zagging march towards the elevator.\n\t\t\t\t\n\t\t\t\tWith a chuckle you close the door and head to bed.\n\t\t\t\t*goto cashedin\n\t\t\t#Offer him the use of the sofa.\n\t\t\t\tYou reach out and grab his shirt, pulling him back to the sofa with you, quickly moving to pour more wine in his glass.\n\t\t\t\t\n\t\t\t\t\"Don't be silly, Brandon,\" you tell him with a laugh. \"I can't finish the bottle by myself. You can stay on the sofa for the night.\"\n\t\t\t\t\n\t\t\t\t\"You don't mind?\" he slurs and looks over at you, accepting the pouring of more wine without complaint.\n\t\t\t\t\n\t\t\t\t\"No. Now drink up!\"\n\t\t\t\t\n\t\t\t\tFor a couple of hours more you drink and make merry, then finally sleep overtakes your American colleague. His eyes just suddenly close and he falls limp over the armrest of the sofa, \n\t\t\t\tnearly spilling the wine held in his hand, although you are nimble enough still to catch it before it becomes a mess. You set the glasses down on the table and fetch him a blanket and \n\t\t\t\tsome pillows, then make sure he's comfortable before heading off to your own bed.\n\t\t\t\t*goto cashedin\n\t\t\t#Offer him to share your bed for the night.\n\t\t\t\t*set ides_affair true\n\t\t\t\t*achieve ideslove\n\t\t\t\tYou reach out and grab his shirt, pulling him back to the sofa with you, quickly moving to pour more wine in his glass.\n\t\t\t\t\n\t\t\t\t\"Don't be silly, Brandon,\" you tell him with a laugh. \"I can't finish the bottle by myself. You're staying with me tonight.\"\n\t\t\t\t\n\t\t\t\t\"You don't mind?\" he slurs and looks over at you, accepting the pouring of more wine without complaint. \"Wait, what do you mean stay with you?\"\n\t\t\t\t\n\t\t\t\tYou chuckle and pull the bottle away from his glass, set it down on the table, and then look him in the eye. It might be the wine doing this, but you place your hand on his chest, \n\t\t\t\tbringing about a slightly confused reaction in the man sitting beside you. You lean in closer to him until he has no other option than to figure it out for himself, although just \n\t\t\t\tto make it clear to him you spell it out as well.\n\t\t\t\t\n\t\t\t\t\"I'm saying you're joining me in bed.\"\n\t\t\t\t\n\t\t\t\tBrandon swallows hard and blinks a couple of times, then surprises you by taking initiative. His lips are suddenly planted against yours, his strong arm reaching up to stroke your neck \n\t\t\t\tand pull you against him. If you thought you were going to sleep in your bed, you would be proven wrong the following morning when you wake up atop Brandon's muscular chest, still on \n\t\t\t\tthe sofa.\n\t\t\t\t*goto cashedin\n\t#Collect your chips and leave the table.\n\t\tIt becomes clear that you've talked for long enough. Any further would start drawing curious looks your way, and so you decide to collect your chips. While you're standing up and stuffing \n\t\tyour pocket with the clay tokens, Brandon places a card on the table in front of you. There's a number on it, as well as a name: \"Brandauer\".\n\t\t\n\t\t\"Whenever Jishkariani gets here, or you see an opportunity, contact him. He will make sure you are in a position to get close. You can trust him, he's one of ours.\"\n\t\t*goto cashedin\n\n\n\n*label cashedin\n*page_break The Next Evening.\nLate the following evening, you make ready for the casino floor, looking at yourself through the mirror while making sure your \n*if (gender = \"male\")\n\ttuxedo \n\t*goto fineries\n*elseif (gender = \"female\")\n\tevening gown \n\t*goto fineries\n*else\n\tset of fineries \n\t*goto fineries\n\n*label fineries\nfits well and looks as perfect on your as any other time you put such expensive clothes on. The phone sits silent right in front of you, just waiting for you to contact this Brandauer fellow \nthat your American colleague had forwarded to you as a contact. It never feels right to be working with a contact you have never met before, and who is supposed to get you a great deal of access \nto a target at that.\n\nYet your hand falls on the receiver of the phone.\n*choice\n\t#Call Brandauer.\n\t\t*set brandauer_call true\n\t\tYou pick up the receiver and dial the number directly. You hear the tone change with a quiet click as it connects you over to the right line, then begins to ring on the other end, sending \n\t\ta buzzing sound down to your end. It rings once, then twice, then you hear the rattling as the line opens and the receiver on the other end is picked up.\n\t\t\n\t\t\"Brandauer, [i]Grüß Gott[/i].\"\n\t\t\n\t\t\"This is ${surname},\" you introduce yourself quickly. \"I hear you might be able to help me? A friend with a scorpion told me I should contact you.\"\n\t\t\n\t\t\"Ah, of course. Everything is already in place for you,\" you hear on the other end. \"I shall make sure the plaques are waiting for you downstairs. Good fortunes.\"\n\t\t\n\t\tThe line goes dead. That was far faster and simpler than you thought it would be. Then again you weren't expecting Brandauer to be new to this kind of thing, it doesn't seem like the CIA's \n\t\tstyle to rely heavily on unknown assets. In any case there doesn't remain anything else to do, excpet check your clothes one last time, then head down after a moment's wait to give this \n\t\tBrandauer some time to get the wheels in motion.\n\t\t*goto prewealth\n\t#Call Evony.\n\t\t\"[i]Opérateur.[/i]\"\n\t\t\n\t\tYou don't expect Evony to be in her room, but you ask the operator to connect you to the room beside yours. You hear the clicking of the phone lines, then the familiar buzzing as the \n\t\tphone on the other end rings, rings, and rings again. You take in a breath and exhale in a deep sigh as the other end rings for a fifth time, about to put the receiver down when you \n\t\tsuddenly hear the click of the line opening.\n\t\t\n\t\t\"Hello? Evony Lellouche speaking,\" you hear a breathy voice announce on the other end.\n\t\t\n\t\t\"Good evening Evony, this is -\" you start but are cut off by Evony cheerfully calling out your name.\n\t\t\n\t\t\"${name}!\" she calls out with a light laugh. \"I'm sorry to have kept you waiting, I was getting dressed for the evening. Is there something I can do for you?\"\n\t\t\n\t\t*choice\n\t\t\t#\"In fact there is. You are friends with a Vepkhia Jishkariani. I need you to arrange for me to meet him.\"\n\t\t\t\t*set evony_help true\n\t\t\t\tThere's a silent pause on the other end. You wait, and wait, and wait, until finally you have to call out for Evony's name to elicit any kind of response and make sure she's still \n\t\t\t\tthere.\n\t\t\t\t\n\t\t\t\t\"How do you know of Vepkhia?\" she asks you, her tone one filled with suspicion.\n\t\t\t\t\n\t\t\t\t*if ((talking >= 75) or ((talking >= 50) and (charm > 55)))\n\t\t\t\t\t\"Please, Evony, if I told you, you would wish I hadn't,\" you say calmly and wait for another pause to linger over the line. \"I know what kind of a man he is, you don't need to \n\t\t\t\t\tbe concerned about me. However, I do need to meet with him and make sure what I have heard of him is true.\"\n\t\t\t\t\t\n\t\t\t\t\t\"You do not have to meet him to make sure of it. I will tell you right now that he is everything you might have heard and more,\" she tells you with an almost scolding, hurried \n\t\t\t\t\tvoice. \"But if you truly wish to meet with him, I can pull him aside. In the lobby, nowhere private, that is my condition. That will be better for everyone.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Very well, if that is how you wish to go about it, then I will trust you. You know the man.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Yes... I do know him. Be in the lobby an hour from now and I can make the introductions. Until then,\" you hear Evony say on the other line, then the rattling of her receiver \n\t\t\t\t\tbeing put down.\n\t\t\t\t\t\n\t\t\t\t\tShe seems rattled by your request. Hopefully she will not be too unnerved and shaken up to keep a calm head, but to be entirely fair to her you did not notice her freeze even \n\t\t\t\t\twhen she was under fire, so she must have very cool nerves. That kind of strength of character will carry her far in life.\n\t\t\t\t\t*goto charismatiatic\n\t\t\t\t*else\n\t\t\t\t\t*set evony_suspicion true\n\t\t\t\t\t\"That's irrelevant,\" you say very matter-of-factly. \"I know what kind of a man he is. Even so, I must meet him if that is at all possible. He will be attending the casino tonight, \n\t\t\t\t\twill he not?\"\n\t\t\t\t\t\n\t\t\t\t\t\"How do you know so much about him?\" Evony asks you hurriedly, and you can hear her moving as she does so, almost as if she's looking for something.\n\t\t\t\t\t\n\t\t\t\t\t\"Evony, I cannot tell you that,\" you respond and wait as a heavy silence falls on the call.\n\t\t\t\t\t\n\t\t\t\t\t\"I wish you wouldn't force me to,\" she says quietly into the phone. \"But I will make introductions if we see you on the floor.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Good. Excellent. Thank you, Evony,\" you say, only to hear her receiver rattle as it's placed down and the line goes dead.\n\t\t\t\t\t\n\t\t\t\t\tShe seems more than a little rattled by your request. Hopefully she will not be too unnerved and shaken up to keep a calm head, but to be entirely fair to her you did not notice \n\t\t\t\t\ther freeze even when she was under fire, so she must have very cool nerves. That kind of strength of character will carry her far in life.\n\t\t\t\t\t*goto charismatiatic\n\t\t\t#\"In fact there is. I'm ashamed to even say this, but the Casino is not extending me the credit so I might enjoy the high-roller tables. Would you be able to help me?\"\n\t\t\t\t*set evony_help true\n\t\t\t\t\"It's not a good idea to go to those tables today, ${name}. I'll be spending my night with a friend who frequents those tables, and I suspect today is no different. Unless you want \n\t\t\t\tto lose, those tables won't be friendly to you,\" Evony says on the other line.\n\t\t\t\t\n\t\t\t\t\"Who said anything of tonight?\" you ask with a chuckle. \"If you insist, I will attend the tables another day, but if it is in any way possible that you can arrange me credit tonight \n\t\t\t\tbefore you leave to meet with your friend, I would truly appreciate it.\"\n\t\t\t\t\n\t\t\t\tThere is a moment's pause as Evony takes in the proposal and mulls it over. Being asked for money is one thing, but putting her own reputation on the line and to pull strings just so \n\t\t\t\tthe casino will extend credit for you is a whole different matter. After a moment you can hear a sigh heaved, then those magic words:\n\t\t\t\t\n\t\t\t\t\"Very well, I will arrange for it,\" she tells you softly. \"But then we are even. No more favours.\"\n\t\t\t\t\n\t\t\t\t\"No more favours,\" you repeat.\n\t\t\t\t\n\t\t\t\t\"Good. Remember, please wait until tomorrow night with it, I do not want to see you at the high-roller tables tonight. I'm serious, ${name},\" she tells you. \"Now I must go if I must \n\t\t\t\ttalk with the casino before I meet my friend. Enjoy your evening.\"\n\t\t\t\t\n\t\t\t\t\"You as well, Evony,\" you say and hear the rattling of her receiver being settled down.\n\t\t\t\t\n\t\t\t\tShe doesn't seem none the wiser about your true intentions, which is good, and you are not nearly as beholden to the Americans now, which is even better. You put the phone down and take \n\t\t\t\tin a deep breath. Evony will not be happy to see you tonight, but neither of you have a choice in the matter. You have to get close to Jishkariani.\n\t\t\t\t*goto prewealth\n\t\t\t#\"No no, I was simply wondering if you happened to be available tonight? Perhaps we could enjoy dinner.\"\n\t\t\t\t*if (evony_affair)\n\t\t\t\t\t\"Oh,\" she pauses. \"Oh! I'm sorry, I'm afraid I'll be spending the evening with an um... friend of mine. We will be in the casino, but it's not possible for us to meet. Please \n\t\t\t\t\ttrust me on this. Vepkhia can be... the jealous sort. We would both be better off if you stayed clear of me tonight.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Ah, so this Vepkhia,\" you pause as if you're thinking about who he might be. \"He is your husband?\"\n\t\t\t\t\t\n\t\t\t\t\t\"No! No,\" Evony rushes to speak. \"He is the friend I warned you about. In the car.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Well, then I should meet him, make sure you are okay,\" you say, goading Evony into some kind of decision on her part.\n\t\t\t\t\t\n\t\t\t\t\t\"No, you cannot. Please, just trust me and stay away. You have nothing you should be doing with him, and you do not want to meddle,\" she tells you forcefully.\n\t\t\t\t\t\n\t\t\t\t\tThe line suddenly goes dead with a loud bang. Evony just hung up on you, quite forcefully in fact. Well now, that's a surprising turn of events. She seems more than a little rattled. \n\t\t\t\t\tPerhaps her concern is genuine and you have managed to crawl under her skin during your brief time together. Hopefully she will not be too unnerved and shaken up to keep a calm head, \n\t\t\t\t\tbut to be entirely fair to her you did not notice her freeze even when she was under fire, so she must have very cool nerves. That kind of strength of character will carry her far in life.\n\t\t\t\t\t*goto charismatiatic\n\t\t\t\t*else\n\t\t\t\t\t\"Oh,\" she pauses. \"Oh! I'm sorry, I'm afraid I'll be spending the evening with a friend of mine, but we will be in the high roller tables in case you wish to meet me. I would tell \n\t\t\t\t\tyou to be very careful if you do, however. Vepkhia can be... the jealous sort.\"\n\t\t\t\t\t\n\t\t\t\t\t\"He is one of the friends you told me about in the car? The dangerous kind?\" you ask, prodding at her to give you more.\n\t\t\t\t\t\n\t\t\t\t\t\"Yes,\" she sighs. Please, just trust me and stay away. You have nothing you should be doing with him, and you do not want to meddle in his affairs,\" Evony states quietly.\n\t\t\t\t\t\n\t\t\t\t\t\"Well, if you are sure,\" you state calmly and lean against the little table the phone is on. \"Perhaps I shouldn't. Can we get dinner another time then?\"\n\t\t\t\t\t\n\t\t\t\t\t\"I don't know. Maybe. We might be leaving soon, so I cannot say if I have the time or not,\" Evony tells you, then takes in a sharp breath. \"I should be going. I need to meet Vepkhia \n\t\t\t\t\tsoon. I hope you enjoy your evening.\"\n\t\t\t\t\t\n\t\t\t\t\t\"You as well, Evony,\" you state just in time before the line goes dead.\n\t\t\t\t\t\n\t\t\t\t\tShe seems more than a little rattled. Perhaps her concern is genuine and you have managed to crawl under her skin during your brief time together. Hopefully she will not be too unnerved and \n\t\t\t\t\tshaken up to keep a calm head, but to be entirely fair to her you did not notice her freeze even when she was under fire, so she must have very cool nerves. That kind of strength of character \n\t\t\t\t\twill carry her far in life.\n\t\t\t\t\t*goto charismatiatic\n\t#Leave the phone alone and handle this by yourself.\n\t\tGranted you have no idea how things will go if you walk right up to Jishkariani or try to play him at a table with what little you have to offer, which is hardly enough to carry you anywhere \n\t\tin a high-roller table. So, somehow you need to get close between the front door and the tables. That should be fun. You take one last look through the mirror and make sure you look good before \n\t\theading out of the room and down to the lobby.\n\t\t\n\t\t*goto charismatiatic\n\n\n\n\n*label charismatiatic\n*comment WHERE THE MC AMBUSHES JISHKARIANI IN THE LOBBY AND FORCES AN INTRODUCTION, GETS INVITED TO BACCARAT.\nYou walk across the lobby of the casino, having descended down from the hotel section of the palatial building. While you cannot exactly simply lurk in the casino lobby, you do have to keep an \neye on the front door so you can jump on your chance as soon as one appears. So you end up sitting down at the bar some ways into the casino, finding a seat with an excellent view of the lobby. \nWith a cocktail in one hand and your eyes on the door, you wait.\n\nAnd wait.\n\nThen wait some more.\n\nUntil finally you see a group of men walk in, all of them wearing black turtleneck sweaters with bulges at the hip betraying the presence of weapons. Behind them arrive the familiar faces of \nboth Evony and Jishkariani. Along with them arrive others that are clearly part of their entourage, dressed in fine clothes and chatting quietly while allowing Jishkariani to take the lead. \nIt's time to strike. You down your cocktail and stand up, hurrying out of the bar on a casual but confident intercept course, trying not to seem like you're heading directly towards this larger \nparty of people.\n*page_break\n*if (evony_help)\n\t*comment WHERE EVONY HAS AGREED TO ARRANGE A MEETING\n\tAs you pass across the lobby once more, heading out towards the front desk while trying to look as nonchalant as possible, Evony suddenly breaks off from the group. You notice her say something \n\tto Jishkariani as she heads away, the entire group stops and gathers before she walks away from them, heading straight towards you. There is a friendly smile on her face, although you can see \n\tthat her body language is definitely tense. \n\t*if (evony_affair)\n\t\tPerhaps even more tense than you might like. She keeps her arms in front of her, hidden from Jishkariani as her hand clenches into a fist and then tightens until you can see it tremble.\n\t\n\t\"${name},\" she starts and nods in a greeting, bringing you to a halt and directing your attention more directly to her and the group looming behind her. \"You wanted to meet Vepkhia, did you \n\tnot? Shall we?\"\n\t\n\tYou smile and reach out your hand, taking hers so she can walk you back towards Jishkariani and his entourage, his eyes fall on on you and squint as he takes measure of you. His guards do much \n\tthe same, their eyes flicking over you as they keep a constant watch for any threats that might approach their boss. Evony leads you directly to the burly round-faced man. Close enough that \n\tyou can make out just how haphazardly shaven his face is.\n\t\n\t*goto veppywag\n*else\n\t*comment WHERE YOUR APPEARANCE COMES AS A SURPRISE TO EVONY\n\tAs you pass across the lobby once more, heading out towards the front desk while trying to look as nonchalant as possible, you meet Evony's gaze for a brief moment. She tenses up as you pause \n\tand turn, furrowing your brow as if you're surprised at seeing her, then move closer. Her gaze lingers on you, the guards spot you and move to intercept you, but you keep going.\n\t\n\t\"Evony! How lovely to see you again,\" you call out in a friendly tone, offering apologetic smiles to the rest of the group for disturbing them.\n\t\n\tThey all stop and the guards gravitate to the side you are approaching from until you have to stop so you don't agitate them too much. You notice Evony whisper something to Jishkariani, then \n\tslide past him. She puts on a narrow but friendly smile while she moves past the guards and approaches you. \n\t*if (evony_affair)\n\t\tShe keeps her arms in front of her, hidden from Jishkariani as her hand clenches into a fist and then tightens until you can see it tremble.\n\t\n\t\"${name},\" she starts and nods in a greeting while getting closer, then switching over to whispering. \"You do not want to do this. Please, walk away.\"\n\t\n\tYou look into Evony's eyes, seeing her standing firm before you, trying to exude a wall of authority that will not allow you past her to Jishkariani or anyone else. There is a pause as you \n\ttake her hand into yours, acting as if there is nothing wrong here, no battle of wills where she wants you to step away while you still can. But you cannot do that. You need to get close to \n\tJishkariani and that is exactly what you will do.\n\t\n\t\"Evony,\" you say cheerfully and glance over her shoulders. \"Who are your friends? I absolutely must meet them.\"\n\t\n\tThe volume of your voice is carefully chosen to be just loud enough for them to hear you, making a refusal of making introductions rude. She gives you an almost pleading look, a fire of \n\tanger burning deep in them as she turns, her lips tugging back into a cordial smile. She could sic the guards on you, but as you hold her hand it becomes increasingly clear that she will \n\tnot do that. Her fingers press against your hand, wrapping around it so she can pull you alongside her, putting on a careful and almost surprising act. With a quick breath to steel herself \n\tshe lead you past the guards and straight to who must be Jishkariani, a burly round-faced man with quite the haphazardly shaven face.\n\t\n\t*goto veppywag\n\n\n*label veppywag\n*gosub gooberino\n\n\"I do not know what I would have done had ${name} not been there that night,\" Evony says and guides your hand out towards the Georgian man. \"${name} ${surname}, meet Vepkhia Jishkariani.\"\n\n\"A pleasure to meet you, Monsieur Jishkariani. This is the friend you were talking about then, Evony?\" you say, pointing the question to the woman who quickly snaps her attention to you and nods. \n\"Well, in that case I've heard great things about you.\"\n\nStroking Jishkariani's ego appears to do wonders, the handshake getting a little firmer as he gets more enthusiastic. His smile widens, his eyes focus on you, and his body turns so it is facing \nyou more directly. As he moves closer to you, you notice that the man is sweating profusely, and as he shifts he moves with a limp.\n\n\"Well well, it is very good to meet you. I believe I owe you my thanks,\" Jishkariani says and offers you a lopsided smile, his emerald eyes piercing into your very soul. \"I would not know what \nto do were Miss Lellouche to be stolen from me.\"\n\n\"I only did what I expect anyone might do in such a situation,\" you say and slowly pull away from the handshake before it lasts too long.\n\n\"No, most people would have run with no regard to anyone else,\" Jishkariani tells you, then launches his hand to point out towards the high-roller tables. \"Please, join us for some baccarat.\"\n\n\"Oh, thank you very much for the offer but luck has not been with me so far. I'm afraid I do not have enough at hand to join the high-roller tables.\"\n\n\"Oh please, we'll see to that. Richard,\" Jishkariani turns over his shoulder to one of the guards. \n*gosub gabbergabber\n\n\"You are far too kind, Monsieur Jishkariani.\"\n\n\"Think nothing of it. Now, come, let us play.\"\n*page_break\nWith that the group keeps walking, one of the guards moving off to fetch you some plaques while you are escorted deeper into the bowels of the casino. You walk confidently alongside Evony and \nJishkariani, heading into the more secluded section of the casino where the high-stakes games are held. The rooms are brightly lit with fantastic chandeliers, with a table directly underneath and \nplayers all holding a drink or some kind of a smoke.\n\nThe guards lead the way to one of the rooms, the players there greeting the familiar faces in the group, sitting back to wait for the new people to come and settle down. Those not in the know \ngather their plaques and leave, apologizing to Jishkariani on the way out over not knowing that he would be attending his table tonight. Then, with a sweeping motion, Jishkariani offers you a \nseat at the table.\n*page_break\n*goto baccaration\n\n\n\n\n*label gooberino\n*if (gender = \"male\")\n\t\"Vepkhia, honey, I would like you to meet my hero. He's the one who saved me in Rome.\"\n\t\n\t\"What? This guy saved you?\"\n\t*return\n*elseif (gender = \"female\")\n\t\"Vepkhia, honey, I would like you to meet my heroine. She's the one who saved me in Rome.\"\n\t\n\t\"What? A woman saved you?\"\n\t*return\n*else\n\t\"Vepkhia, honey, I would like you to meet my saviour. ${name} here is the one who saved me in Rome.\"\n\t\n\t\"What? Really?\"\n\t*return\n\n\n*label gabbergabber\n*if (gender = \"male\")\n\t\"Make sure that Monsieur ${surname} has extensive credit extended from the casino. And withdraw some plaques for him so he can jo
