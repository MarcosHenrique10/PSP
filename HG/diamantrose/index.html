in us.\"\n\t*return\n*elseif (gender = \"female\")\n\t\"Make sure that Mademoiselle ${surname} has extensive credit extended from the casino. And withdraw some plaques for her so she can join us.\"\n\t*return\n*else\n\t\"Make sure ${name} here has extensive credit extended from the casino. And withdraw some plaques from the account while you're at it.\"\n\t*return\n\n\n\n\n\n\n*label prewealth\n*page_break\nYou walk across the lobby of the casino, having descended down from the hotel section of the palatial building. Before you can even make it to the desk hidden behind a set of steel bars to keep anyone \nfrom getting into where the money and casino chips are held, \n*if (brandauer_call)\n\tthe man standing there begins to rummage around below the counter. By the time you arrive there is a stack of casino plaques waiting for \n\tyou.\n\n\t\"Good evening, \n\t*gosub namings\n\there are the plaques you ordered prepared. I hope the tables favour you tonight. The high-roller tables are just through the door there,\" the cashier tells you and points towards the \n\tback of the casino floor.\n\t\n\t*goto chippies\n*else\n\tthe man standing there smiling at you as you make your slow approach.\n\t\n\t\"Good evening,\" you start straight off the bat. \"I'm tempted to join the high-roller tables tonight. How about we make it plaques in twenty-fives, total to a hundred thousand.\"\n\t\n\t*gosub titular\n\tJust a moment.\"\n\t\n\tThe man takes a few steps to the side and opens a thin large book, flipping over the pages for a moment before running a finger down what seems like a very long column of numbers. After a further \n\tmoment of double-checking from another page towards the back, he closes the book and walks back to you with a smile.\n\t\n\t\"Everything is in order, \n\t*gosub namings\n\tyou wished for plaques totalling a hundred thousand dollars, yes?\"\n\t\n\t\"Yes.\"\n\t\n\t\"I shall fetch them for you,\" he states while sliding over a receipt towards you, beneath those heavy looking metal bars. \"I will require your signature here.\"\n\t\n\tWhile you're signing the man walks in the back room and shortly returns with a stack of plaques. They rattle a bit as he places them neatly on the counter and slides them out to show you how \n\tmuch they are each worth and that the amount totals to your request, then stacks them back up and slides them towards you. At the same time he reaches out to take the signed piece of paper back, \n\tgiving you a nod as a thank you.\n\t\n\t\"Please, \n\t*gosub namings\n\thave an enjoyable evening. The high rolling tables are just through the door there,\" the cashier tells you and points towards the back of the casino floor.\n\t\n\t*goto chippies\n\n\n*label titular\n*if (gender = \"male\")\n\t\"Very good, Monsieur. \n\t*return\n*elseif (gender = \"female\")\n\t\"Very good, Mademoiselle. \n\t*return\n*else\n\t\"Very good. \n\t*return\n\n\n*label namings\n*if (gender = \"male\")\n\tMonsieur, \n\t*return\n*elseif (gender = \"female\")\n\tMademoiselle, \n\t*return\n*else\n\t*return\n\n\n*label chippies\n*page_break\nSo you head off towards the tables in the back, safe in the knowledge that you now have the means to play and perhaps get the feel of Jishkariani as a person, although already from what you've heard, \nit doesn't seem like he will be very hard to read personality-wise. You glance down at the stack of casino plaques in your hand, counting it again while you head back towards the high-roller tables. \nUnfortunately your own regular chips are not quite enough to make sizeable bets, \n*if (charm > 70)\n\tdespite your amazing cardsmanship at the smaller tables so far, \n\t*goto wealthcheck\n*elseif (charm > 55)\n\teven though you've had fairly good fortunes so far at the smaller tables, \n\t*goto wealthcheck\n*else\n\tespecially after all those losing rounds already played at the smaller tables, \n\t*goto wealthcheck\n\n\n*label wealthcheck\nbut fortunately you've found another way to move forward.\n\n*if (brandauer_call)\n\t*comment WHERE THE AMERICANS ARRANGE FOR EVERYTHING VIA BRANDAUER\n\tBrandauer and your American friends have equipped you with some larger plaques. You don't know where that kind of money comes from, but a part of you doesn't want to know. It would just end up \n\tstressing you more to know whose money you are playing a game of baccarat with, especially when the small stack of plaques is worth a hundred thousand US dollars.\n\t\n\tYou walk confidently into the more secluded section of the casino where the high-stakes games are held. The rooms are brightly lit with fantastic chandeliers, with a table directly underneath and \n\tplayers all holding a drink or some kind of a smoke. You turn into the room that Brandauer told you is the usual room for Jishkariani's games, and take a seat at the sparsely populated table. The \n\tfirst couple of hands go your way, leaving you with essentially double your money - something that you sense is Brandauer's doing somehow.\n\t*goto wealthcheckgogog\n*else\n\t*comment WHERE EVONY HAS ARRANGED FOR SIZEABLE CASINO CREDIT\n\tThanks to Evony, you have access to a fair bit of credit in the casino. While it might end up hurting Evony's reputation if you lose it all and the casino starts digging into your history only \n\tto discover that you don't exist, at least you personally won't be on the hook for it. Essentially you are using the casino's money to play against Jishkariani.\n\t\n\tYou walk confidently into the more secluded section of the casino where the high-stakes games are held. The rooms are brightly lit with fantastic chandeliers, with a table directly underneath and \n\tplayers all holding a drink or some kind of a smoke. Of course, you have no idea where Jishkariani will end up playing, but you roam around and look for any signs of such a big figure having a \n\tset table. Eventually you decide to pick the least populated room and head to table, settling down to play. The first couple of hands go your way, although the payout does not climb very high.\n\t*goto wealthcheckgogog\n\n\n*label wealthcheckgogog\n\nThen you hear quiet voices in the hallway get closer, stop right outside the room you are in, and then move inside. The other people at the table greet the entering group jovially enough, a couple \ntake their plaques and take their leave, but you remain seated. As you sit, the room becomes quiet, almost as if it's being agitated by your presence. A man in a black turtleneck sweater appears \nright beside you, quite obviously hiding a handgun underneath the sweater.\n\n\"This room is reserved,\" he tells you with a gruff voice and a very harsh blocky accent.\n\n\"I'm sorry, I didn't see a sign,\" you tell the man and turn around.\n\nAs you come around and take a look at the group, you notice Evony standing behind a couple of these similarly dressed guards. Her lips are stretched in a thin smile as her eyes fall on you. \n*if (evony_help)\n\tThe look becomes cold and her smile disappears, a fire burning in her eyes. You had told her that you would stay away. She is clearly not happy about this. Yet, \nEvony steps past the guards and head out to the open space between you and the group, holding out a hand to the guard who has decided to accost you.\n\n*if (gender = \"male\")\n\t\"Hold on,\" she says and breaks the looming silence. \"Vepkhia, honey, I know him. He's the one who saved me in Rome.\"\n\t\n\t\"What? This guy saved you?\"\n\t*goto thissenone\n*elseif (gender = \"female\")\n\t\"Hold on,\" she says and breaks the looming silence. \"Vepkhia, honey, I know her. She's the one who saved me in Rome.\"\n\t\n\t\"What? A woman saved you?\"\n\t*goto thissenone\n*else\n\t\"Hold on,\" she says and breaks the looming silence. \"Vepkhia, honey. This is the one who saved me in Rome.\"\n\t\n\t\"What? Really?\"\n\t*goto thissenone\n\n\n*label thissenone\n\n\"Yes. Please, ${name} ${surname}, meet Vepkhia Jishkariani,\" Evony hurries to stand between you and the burly round-faced man with a haphazardly shaven face.\n\n\"A pleasure to meet you, Mr. Jishkariani. This is the friend you were talking about then, Evony?\" you say, pointing the question to the woman who quickly snaps her attention to you and nods. \"Well, \nin that case I've heard great things about you.\"\n\nYou obviously hadn't heard anything but vague warnings from Evony, but you put on your best smile and try to belong without seeming like too much of an ass-kisser. After all, behaving such doesn't \nfit well to your still thoroughly French sensitivities. The woman offers a smile to Jishkariani and guides him to step closer, at which point you notice that the man is sweating profusely and walking \nwith a limp. Strange, this is hardly the kind of figure you would have expected to see running an operation this big, yet there he is standing right in front of you now, shaking your hand.\n\n\"Well well, then I believe I owe you my thanks,\" Jishkariani says and offers you a lopsided smile, his emerald eyes piercing into your very soul. \"I would not know what to do were Miss Lellouche to \nbe stolen from me.\"\n\nYou glance back and see Evony looking away awkwardly. It does not seem that she is as fond of dear old Vepkhia than he makes it sound, but it would not be the first one-sided relationship to have \nhappened between two people engaged in such underhanded affairs as they are.\n\n\"Please, Mr. Jishkariani, feel free to join me. It was time I passed the shoe.\"\n*goto baccaration\n\n\n\n\n*label baccaration\n*page_break\nThe game of Baccarat begins, Jishkariani's small entourage of guards still eyeing you nervously while Evony hovers over the Georgian's shoulder, looking at his cars. Only occasionally do her eyes \nraise to look at you, a softness hidden behind them now that she is no longer obviously visible to the guards or Jishkariani. While still pondering over the cards the relative silence of the room \nis broken by the clicking of heels, a familiar redhead making her way inside the room and very obviously flaunting herself at the man sitting almost opposite from you. If you had to guess, she is \nmeant to be the Americans' honeytrap.\n\nEvony's face sours when the redhead walks into the room and chimes in eloquently to ask for drink orders. For someone who perhaps dislikes being so close to Jishkariani, she certainly acts quite \njealous when someone else shows interest in him. What a strange kind of dynamic the two share. After your opponent orders a drink, the redhead turns around and leaves, very intentionally leaving \nyourself and Evony hanging.\n\nYou spot the trick to make sure Jishkariani knows the redhead is only interested in him, you spot Evony noticing it as well but taking it in a very different fashion. Her face is one of anguish, \nif anything.\n*page_break\n*if (charm > 55)\n\tOne hand after another you control the table. Despite short surges of victory over you, Jishkariani stays fairly deep in the hole. At this point, the won hands are nothing but aggravating to \n\thim. \n\t*goto winbig\n*else\n\tOne hand after another you struggle on even terms with Jishkariani. It appears that luck is on your side... for now. Your bets are paying out and Jishkariani's aren't. You start observing the \n\tdealer more closely, but cannot catch any sign of him conducting any sleights of hand with the cards. Whether he is or not, the few times where Jishkariani does win seem to only aggravate him \n\tmore. \n\t*goto winbig\n\n\n*label winbig\nEvony leans down to his ear and whispers something, one hand gently stroking the man's thick shoulder. Instead of being comforted by it Jishkariani suddenly snaps at her with a growl in what you \nassume to be Georgian, or one of the other Kartvelian languages - it certainly doesn't sound like anything else you've heard commonly spoken in the region. For a brief moment you see her face scrunch \nup, then she steels herself and pulls back from the aggravated man.\n\nYou pause while bending one of your cards against the table, having a good long look and an equally good think. You're supposed to get close to Jishkariani. Close enough to get into his mansion. \nThere might be a few ways in, the option of having Evony invite you in quickly fading as you watch their relationship become tense right before your very eyes. You could try to make the man angry \nenough to try and reclaim his money, but that is betting on him being particularly petty. The last option would be to let him win, but then you need to keep on talking until you're invited.\n\n*choice\n\t#Time to start losing.\n\t\t*set jishkariani_ploy \"losing\"\n\t\t*set charm +5\n\t\t*set covert +5\n\t\tBaccarat is a strange game in the sense that losing intentionally is quite hard. You can call for another car even when you are in a tight situation already, but since the dealer will stop \n\t\tat a set amount of points and dealt cards there comes a point where that no longer works. It takes you a fair bit of effort to guess the wrong bet to make and then go through with it, but \n\t\tslowly it starts to work out nicely. You're suddenly haemorrhaging casino plaques, and Jishkariani is on the top of the world.\n\t\t\n\t\tEvony gives you a suspicious look but says nothing. As you lose another plaque, and another, her eyes look at you in such a sharp inspection that you might think she's trying to pierce into \n\t\tyour very soul. She's catching on to something. You just wish you knew what that something was.\n\t\t*goto bigbucks\n\t#Play careful, keep yourself even.\n\t\t*set jishkariani_ploy \"even\"\n\t\t*set charm +5\n\t\t*set covert -5\n\t\tBaccarat is a strange game in the sense that losing intentionally is quite hard. You can call for another car even when you are in a tight situation already, but since the dealer will stop \n\t\tat a set amount of points and dealt cards there comes a point where that no longer works. However, placing haphazard bets and calling for cards when you really shouldn't can be easily done \n\t\there and there to counteract your current luck. Jishkariani's mood starts to pick up as soon as he's slowly crawling closer and closer to the amount he started off with.\n\t\t\n\t\tEvony gives you a look of suspicion, although she doesn't voice whatever is going through her head. she continues to watch you closely as you lose another hand, then win the next one, \n\t\tamazed at the sudden drop in your luck. Or perhaps she's catching on to something. It's hard to tell.\n\t\t*goto bigbucks\n\t#Keep going while the going's good\n\t\t*set jishkariani_ploy \"winning\"\n\t\t*set charm -5\n\t\t*set covert -5\n\t\tYou know, not only is the amount of money coming your way feeling very nice indeed after everything you've been through, but seeing Jishkariani's smug smile wiped from his face is very \n\t\tsatisfying. So you keep going, one round of cards after another, cleaning house with a near-constant domination of the table.\n\t\t\n\t\tEvony gives you a slight smile as you keep cleaning up, although there is a certain kind of worry hidden behind her eyes. While she seems happy to see you clean out Jishkariani, she is less \n\t\tthan pleased that her supposed lover is getting more and more agitated by your antics.\n\t\t*goto bigbucks\n\n\n\n*label bigbucks\n*page_break\n*if (((talking = 90) or ((talking > 50) and (charm > 55))) and (jishkariani_ploy = \"winning\"))\n\t*set mansion_invite true\n\tJishkariani finally throws his hands up in exasperation and jumps up from his seat. Evony is shooed away with a handwave before she can even try to console the sore loser, but surprisingly he \n\tturns to you with a smile. Throughout the game you have done your utmost to keep talking, keep getting in through that wall around him, and as he smiles to you and offers you hand for a shake \n\tit appears you have gotten through.\n\t\n\t\"You have an excellent luck about you,\" he tells you and smacks his lips. \"Unfortunately none of that seems to have rubbed onto me tonight.\"\n\t\n\t\"Bad luck, old sport.\"\n\t\n\t\"Listen, I will be hosting people at my mansion over the weekend. Rich, influential people. I'll tell you what, you attend and play cards with these folk, give me half of the night's winnings, \n\tand I shall have you shake hands with people you would never have dreamed of shaking hands with.\"\n\t\n\tYou're in.\n\t*goto islandadventure\n*elseif ((talking >= 70) and (jishkariani_ploy = \"even\"))\n\t*set mansion_invite true\n\tJishkariani finally has had enough of being strung along. He's on the losing side of things still, but his exasperation has made him quit the table early. Evony is shooed away with a handwave \n\tbefore she can even try to console the man, but surprisingly Jishkariani turns to you with a smile. Throughout the game you have done your utmost to keep talking, keep getting in through that \n\twall around him, and as he smiles to you and offers you hand for a shake it appears you have gotten through.\n\t\n\t\"You have luck about you,\" he tells you and smacks his lips. \"Looks like some ended up rubbing on me by the end of it too.\"\n\t\n\t\"Seems like. It has been a fine evening of games.\"\n\t\n\t\"Listen, I will be hosting people at my mansion over the weekend. Rich, influential people. I'll tell you what, you attend and play cards with these folk. If you have the kind of luck as you had \n\tearlier, give me half of the night's winnings, and I will have you shake hands with people you would never have dreamed of shaking hands with.\"\n\t\n\tYou're in.\n\t*goto islandadventure\n*elseif (jishkariani_ploy = \"losing\")\n\t*set mansion_invite true\n\tJishkariani finally slaps his hands against the side of the table, letting out a bark of laughter before hopping off his seat. Evony takes a startled step back and looks on as the man collects \n\tthe plaques on his side of the table, having near to cleaned out your side of it. Surprisingly he turns to you and almost wrenches your hand into his, shaking it excitedly.\n\t\n\t\"Bad luck, bad luck,\" he tells you with a horrifically fake consoling tone.\n\t\n\tHe turns to Evony and gives her a wet sounding kiss on the cheek, then snaps his fingers a few time to get the guards to collect the plaques, including his new winnings. Then he suddenly turns \n\tyour way again.\n\t\n\t\"Look, I feel bad for ruining your evening,\" he starts. \"I'm hosting people at my mansion over the weekend. Rich, influential people. I'll tell you what, you come join us, there will be cards \n\tinvolved, I will hake you shake hands with people you have never even fathomed of meeting, and hopefully that will help close those wounds I've inflicted tonight.\"\n\t\n\tPerhaps he's honest, perhaps he wants you there to clean you up of more precious money, but his intentions hardly matter. You're in.\n\t*goto islandadventure\n*else\n\tJishkariani finally has had enough of being strung along. He's on the losing side, he has no patience left for it, and stands up from the table as once more the bet goes your way. He takes a deep \n\tbreath and turns around, snapping his fingers at a guard to pick up the remaining casino plaques on his side of the table. Evony is shooed away with a handwave before she can even try to console \n\tthe sore loser, and Jishkariani continues to stew quietly while you still sit relaxed at the table.\n\t\n\tHe looks at you with a narrow smile, his jaw clearly clenched. Without saying another word, he leaves the room. Evony looks at you with concern, then follows along obediently.\n\t*goto islandadventure\n\n\n\n\n*label islandadventure\n*page_break\nThings are coming to a head. You've been modifying your gadgets a little bit when you've been able to. Instead of having your briefcase with you, you'll need to be carrying the stuff you need hidden \naway and disguised instead of bundled into a briefcase.\n\nYou look down at the gathered gadgets and heave a sigh. A recording device in the heel of a shoe, plastique with a separate detonator, camera disguised in a cigarette box, and your trusty pistol. \nThat's what you will be carrying into the Mansion, hoping that it will not be discovered on you. The main issue you have is what to do with the plastique. You could either get a large pack of gum and \nhide it in that, all wrapped up and hidden as something innocuous, or you could remove the recording device and stuff it in the heel compartment.\n\n*fake_choice\n\t#Replace the recording device compartment with plastique.\n\t\t*set heelrecorder false\n\t\tThe recording device doesn't matter, so you removed it from the heel of your shoe and replaced it with as much [i]plastique[/i] as you could fit into the compartment. Easy, but now you won't \n\t\tbe able to record any discussions while at the mansion.\n\t#Get a chewing gum pack and leave the heel recorded alone.\n\t\tThe chewing gum pack you found is just enough to blow a big hole once it's all been replaced with the explosive. Easy enough to do, and you even leave in one stick of gum just to make sure \n\t\tyou have something to offer in case someone caught you with it.\n\n*if (mansion_invite)\n\tThe same night after your game with Jishkariani, just after you have finished tinkering with gadgets, you receive a call from Brandon. It's a short exchange, confirming that you're in, but even so \n\tit's cut shorter by a sudden knock at your door. You hang up and go to answer it, only to find Evony there.\n\t\n\t\"I can't believe you did that,\" she tells you and barges past you into the suite. \"I warned you about these people, and now you've stuck your hand right in the hornets' nest.\"\n\t\n\tShe starts pacing back and forth while you close the door, her hand brushing through her hair, her facial expression strained. Then suddenly she stops and looks at you accusingly, pulling her \n\thand way from her head and instead pointing straight at you.\n\t\n\t\"It was you, wasn't it. Out there in Greece. That was you watching his yacht! I knew I saw someone on that little island, but I didn't realize you would be so careless as to actually waltz \n\tright up to him. What do you want with him?\"\n\t\n\t*choice\n\t\t#\"I'm with the French intelligence, chasing down diamonds flowing in from the Soviet Union. I want Jishkariani to go down, and Ingemar Lund with him.\"\n\t\t\t*set evony_confide true\n\t\t\t*set doorcode true\n\t\t\t*set evony_out true\n\t\t\t*if (evony_suspicion)\n\t\t\t\t\"I knew it!\" she suddenly exclaims and backs away a few steps. \"I knew it...\"\n\t\t\t\t\n\t\t\t\tShe falls away from you and you close the distance when she doesn't just hurry past you and out the door. Her eyes flit down to the floor and then back and forth as she thinks, then \n\t\t\t\tturns back to see you.\n\t\t\t\t\n\t\t\t\"So it was you... watching,\" she lets out a quiet whisper, her eyes looking at the floor while her mind works to put together what exactly she's been involved with all this time. \"You \n\t\t\twill be going to the mansion, hoping to arrest them? Kill them?\"\n\t\t\t\n\t\t\tYou look into her eyes and watch her think out loud, her hands fidgeting with her dress nervously. She's almost like a rabbit in the headlights, wanting to just dart away while she still \n\t\t\tcan, but too paralyzed by fear to actually do it. You've seen her and Jishkariani together. There is no love lost between the two, but even so she is hesitating. Then finally she takes \n\t\t\tin a deep breath and meets your gaze.\n\t\t\t\n\t\t\t\"What do you need me to do?\"\n\t\t\t\n\t\t\t\"Just stay away. There are others who need to get close too, and you leaving will open that window for them.\"\n\t\t\t\n\t\t\t\"Who?\"\n\t\t\t\n\t\t\t\"Doesn't matter, but it's vital that they get close to Jishkariani so we can take them all down as one.\"\n\t\t\t\n\t\t\t\"Fine,\" she says, then rushes to a notepad beside the telephone, writing down a set of six numbers. \"Here, this will open a door to a private elevator. It leads below the mansion, I \n\t\t\tthink. Some of his guards always head that way after we return from Greece. The diamonds will be down there.\"\n\t\t\t\n\t\t\tYou nod your thanks, then pick up the phone to call Brandon.\n\t\t\t\n\t\t\t\"She's out. You have your window to move.\"\n\t\t\t*goto mansiontrip\n\t\t#\"I'm chasing down Ingemar Lund and Vepkhia Jishkariani. They have to go down for the crimes they've committed.\"\n\t\t\t*set evony_confide true\n\t\t\t*set evony_out true\n\t\t\t*if (evony_suspicion)\n\t\t\t\t\"I knew it!\" she suddenly exclaims and backs away a few steps. \"I knew it...\"\n\t\t\t\t\n\t\t\t\tShe falls away from you and you close the distance when she doesn't just hurry past you and out the door. Her eyes flit down to the floor and then back and forth as she thinks, then \n\t\t\t\tturns back to see you.\n\t\t\t\t\n\t\t\t\"So it was you... watching,\" she lets out a quiet whisper, her eyes looking at the floor while her mind works to put together what exactly she's been involved with all this time. \"You \n\t\t\twill be going to the mansion, hoping to arrest them? Kill them?\"\n\t\t\t\n\t\t\tYou look into her eyes and watch her think out loud, her hands fidgeting with her dress nervously. She's almost like a rabbit in the headlights, wanting to just dart away while she still \n\t\t\tcan, but too paralyzed by fear to actually do it. You've seen her and Jishkariani together. There is no love lost between the two, but even so she is hesitating. Then finally she takes \n\t\t\tin a deep breath and meets your gaze.\n\t\t\t\n\t\t\t\"What do you need me to do?\"\n\t\t\t\n\t\t\t\"Just stay away. There are others who need to get close too, and you leaving will open that window for them.\"\n\t\t\t\n\t\t\t\"Who?\"\n\t\t\t\n\t\t\t\"Doesn't matter, but it's vital that they get close to Jishkariani so we can take them all down as one.\"\n\t\t\t\n\t\t\t\"Very well...\"\n\t\t\t\n\t\t\tYou nod your thanks to Evony, then pick up the phone to call Brandon.\n\t\t\t\n\t\t\t\"She's out. You have your window to move.\"\n\t\t\t*goto mansiontrip\n\t\t#\"I don't know what you mean. If anything, I've just had bad luck piling up since Rome.\"\n\t\t\tShe looks at you for a moment, measuring you, trying to figure out whether you are lying or not. \n\t\t\t*if (talking > 50)\n\t\t\t\tFinally she nods, then lowers her eyes to the floor for a moment. Her chest heaves as she takes in a deep breath, then looks back up at you.\n\t\t\t\t\n\t\t\t\t\"Alright,\" she says quietly. \"I'm sorry, I don't know what came over me. I guess I've just been paranoid ever since Rome...\"\n\t\t\t\t\n\t\t\t\t\"You don't have to apologize, it's only natural to see enemies around every corner after something like that.\"\n\t\t\t\t\n\t\t\t\t\"I guess,\" she whispers, then looks up at you.\n\t\t\t\t\n\t\t\t\t*if (evony_affair)\n\t\t\t\t\tShe moves to walk out of your suite, then suddenly stops right beside you and leans close to you, offering you a quick kiss on the cheek. As you turn to look into her eyes \n\t\t\t\t\tafterwards, you can see she hesitates for a moment. \n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Let her leave.\n\t\t\t\t\t\t\tYou offer her a smile, she smiles back. Then you feel her take a step away from you, hesitate again, but finally move past you towards the door. The door squeaks just \n\t\t\t\t\t\t\ta tiny bit as it swings wide open, then closes behind Evony.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSuddenly the suite feels very cold and lonely.\n\t\t\t\t\t\t\t*goto mansiontrip\n\t\t\t\t\t\t#Kiss her properly before she leaves.\n\t\t\t\t\t\t\tYou lean closer to her and place your lips against hers, turning slowly until you face each other. For a moment longer she remains stiff and anxious, then starts to relax \n\t\t\t\t\t\t\tin your arms. She lets out a soft sigh into the kiss and presses herself against you, but you push her back to make sure things don't get too far. Both of you seem to be \n\t\t\t\t\t\t\tleft wanting as you part and look at one another. Then she clears her throat and leaves hurriedly.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tSuddenly the suite feels very cold and lonely.\n\t\t\t\t\t\t\t*goto mansiontrip\n\t\t\t\t\t\t#Kiss her properly and bid her to stay the night.\n\t\t\t\t\t\t\tYou lean closer to her and place your lips against hers, turning slowly until you face each other. For a moment longer she remains stiff and anxious, then starts to relax \n\t\t\t\t\t\t\tin your arms. She lets out a soft sigh into the kiss and presses herself against you, making it clear that she will stay the night if that is what you wish to happen. For \n\t\t\t\t\t\t\ta moment you think about maybe asking if she wants to, but then you suddenly feel her tongue.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tThings get heated in an instant. Soon enough you find yourself backing away towards the bedroom, leaving a trail of clothes as you go.\n\t\t\t\t\t\t\t*goto mansiontrip\n\t\t\t\t*else\n\t\t\t\t\tShe moves to walk out of your suite, then suddenly stops right beside you and leans close to you, offering you a quick kiss on the cheek. As you turn to look into her eyes \n\t\t\t\t\tafterwards, she moves on. The door closes behind her.\n\t\t\t\t\t*goto mansiontrip\n\t\t\t*else\n\t\t\t\tHer eyes become cold and hard on you, then she shakes her head at you.\n\t\t\t\t\n\t\t\t\t\"You are terrible at lying,\" she tells you, then lets out a huff and storms directly to the door. \"Fine, have it your way. Keep slinking around and putting your nose in other peoples' \n\t\t\t\tbusiness. I won't miss you when you finally step over a line.\"\n\t\t\t\t\n\t\t\t\tYou try to stop her, maybe to talk some more, or persuade her to rethink how she wants this to go, but she tears herself away from you and storms out. The suite door slams shut behind \n\t\t\t\ther.\n\t\t\t\t*goto mansiontrip\n\t\t#She knows too much and has become a liability. I have to shut her up.\n\t\t\t*set evony_out true\n\t\t\tWell that's one option available to you, and Brandon Ides did ask you to get rid of her in order to get the CIA honeytrap closer. The Americans will have time do that in the coming days \n\t\t\tbefore you make your trip to the mansion, and perhaps there is enough time to assemble a solid plan of action for what you will do.\n\t\t\t\n\t\t\tBut first, you have to figure out how to take care of Evony, and then live with your choice afterwards.\n\t\t\t\n\t\t\t*choice\n\t\t\t\t#Knock her out and make her Ides' problem.\n\t\t\t\t\t*set charm -5\n\t\t\t\t\t*set evony_ko true\n\t\t\t\t\tYou take in a deep breath to steel yourself for what is to come. Evony takes that as a sign of something and take a step closer to you, her eyes focused on yours while she tries \n\t\t\t\t\tto read you. Perhaps she is looking for something that isn't there, or perhaps she is misreading what you are steeling yourself for.\n\t\t\t\t\t\n\t\t\t\t\t*if (combat >= 50)\n\t\t\t\t\t\tSuddenly you bring your fist high in an uppercut, clocking the woman right on the jaw. The pain radiates through your hand and makes you let out a grunt of pain, but that \n\t\t\t\t\t\tnoise is dwarfed by the sound of Evony falling down instantly. She hadn't been expecting that of all things, it seems. Good for you. It made things much easier. You pick up \n\t\t\t\t\t\tthe phone and call Brandon, your eyes focused on the unconscious woman before you.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Your window's open, but you'll have to send someone up for a collection. Yeah, she's out, but I have to tie her up. Just make sure you put her somewhere where she can't get away.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs soon as the receiver is back down you hop over the woman and start dragging her further into the suite. There's no rope around, but you quickly rip up a sheet so you can \n\t\t\t\t\t\ttie her arms and legs, then stuff her mouth so she can't make too much noise. Then you just have to wait for the Americans to come pick her up.\n\t\t\t\t\t\t*goto mansiontrip\n\t\t\t\t\t*else\n\t\t\t\t\t\tSuddenly you bring your fist high in an uppercut, clocking the woman right on the jaw. The pain radiates through your hand and makes you let out a grunt of pain, but Evony only \n\t\t\t\t\t\ttakes a few hasty steps back. She's not down yet, but she is stunned. You take the opportunity instantly to rush her, quickly tossing her to the floor and wrestling her into a \n\t\t\t\t\t\tpin, although she does a hell of a job of fighting back. Her elbows keep slamming into you, leaving sure bruises on you while you fight her down, then finally manage to hook an \n\t\t\t\t\t\tarm around her throat.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou squeeze. She begins to gasp for air, then shake violently as her body reacts in panic to you holding her down. Then as soon as she starts going limp, you let her go and make \n\t\t\t\t\t\tsure she's just unconscious.\n\t\t\t\t\t\t\n\t\t\t\t\t\tIt takes a few deep breaths to calm yourself after that, but you stand up, your body full of adrenaline as you make your way to the phone. You pick up the receiver and call Brandon.\n\t\t\t\t\t\t\n\t\t\t\t\t\t\"Your window's open, but you'll have to send someone up for a collection. Yeah, she's out, but I have to tie her up. Just make sure you put her somewhere where she can't get away.\"\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs soon as the receiver is back down you hop over the woman and start dragging her further into the suite. There's no rope around, but you quickly rip up a sheet so you can \n\t\t\t\t\t\ttie her arms and legs, then stuff her mouth so she can't make too much noise. Then you just have to wait for the Americans to come pick her up.\n\t\t\t\t\t\t*goto mansiontrip\n\t\t\t\t#Shoot her and call Ides to take care of the clean-up.\n\t\t\t\t\t*achieve ruthless\n\t\t\t\t\t*set charm -10\n\t\t\t\t\t*set evony_ko true\n\t\t\t\t\tYou take in a deep breath to steel yourself for what is to come. Evony takes that as a sign of something and take a step closer to you, her eyes focused on yours while she tries \n\t\t\t\t\tto read you. Perhaps she is looking for something that isn't there, or perhaps she is misreading what you are steeling yourself for. With a shake of your head you move towards the \n\t\t\t\t\tsmall bar in the suite, offering her a drink to misdirect her. Her brow furrows as she thinks you're trying to change subjects, but she agrees to a drink and moves to sit down on \n\t\t\t\t\tthe couch.\n\t\t\t\t\t\n\t\t\t\t\tInstead of making her a drink, however, you pull out your pistol from its holster and sneak as close to her as you can. You can see her lips move as she asks you about something, \n\t\t\t\t\tbut your ears are thrumming with blood so loudly that you cannot hear her. With a swift motion you grab a pillow from the couch, press it against the back of her head, pin it down \n\t\t\t\t\twith the barrel of your pistol, and squeeze the trigger.\n\t\t\t\t\t\n\t\t\t\t\tThe coffee table is covered in red, as is the radio on the other side, as well as the curtains and the wall behind that. You take a moment to relax yourself, then walk back to the \n\t\t\t\t\tphone and pick it up, calling Brandon.\n\t\t\t\t\t\n\t\t\t\t\t\"Your window's open. You'll have to send up a clean-up crew. No, the other kind.\"\n\t\t\t\t\t*goto mansiontrip\n\t\t\t\t*if (evony_affair = \"true\") #Convince her to leave and hide. For my sake.\n\t\t\t\t\t*achieve lover\n\t\t\t\t\t*set charm +5\n\t\t\t\t\t*set doorcode true\n\t\t\t\t\tYou shared a lovely night in Rome. As soon as you mention it, you see Evony freeze and her face flush. Her lips move without any sound emerging from between them, her eyes look \n\t\t\t\t\tto the floor, and her hands touch errantly at her dress. You take a step closer to her, then another, and another, until you can place your hand on her chin and raise her eyes \n\t\t\t\t\tto you.\n\t\t\t\t\t\n\t\t\t\t\t\"Look, you have to get away,\" you start, staring deep into her eyes. \"I will be going against Jishkariani and Lund, and I can't have you there in the mix. I need my focus to be \n\t\t\t\t\ton them.\"\n\t\t\t\t\t\n\t\t\t\t\t\"So... you were the one watching. Oh god,\" she whimpers and buries her head against your shoulder, taking in a deep breath.\n\t\t\t\t\t\n\t\t\t\t\t\"Evony,\" you say again, this time more forcefully. \"You cannot be there. For your own safety, you have to leave and go somewhere safe. If nothing else, do it for me.\"\n\t\t\t\t\t\n\t\t\t\t\tShe is trembling in your arms, her breathing catches, then she gives a single nod against your shoulder. It's clear that she doesn't want to leave, or perhaps has no place to go \n\t\t\t\t\tto, but she does agree to go. Good. You move towards the phone and pick it up, calling Brandon back.\n\t\t\t\t\t\n\t\t\t\t\t\"She's out, but she needs a place to stay. Can you get her somewhere safe? Yes, you're clear to move. Alright.\"\n\t\t\t\t\t\n\t\t\t\t\tYou hang back up and pull Evony off your shoulder, looking her in the eyes again.\n\t\t\t\t\t\n\t\t\t\t\t\"Evony, someone will knock on your door tomorrow morning and give you instructions, and tickets to get to somewhere safe. Once all of this is over, I will come meet you. I swear.\"\n\t\t\t\t\t\n\t\t\t\t\t\"Alright,\" she says, then rushes to a notepad beside the telephone, writing down a set of six numbers. \"Here, this will open a door to a private elevator. It leads below the mansion, \n\t\t\t\t\tI think. Some of his guards always head that way after we return from Greece. If you want everything they are hiding, it will be down there.\"\n\t\t\t\t\t*goto mansiontrip\n*else\n\t*page_break\n\tYou keep watch on Jishkariani and his entourage throughout the next few days, until it starts looking like the guards are making sure the yacht is ready to leave. That's the signal you need to \n\tmake you rush into action, collecting all of your gadgets and informing Brandon that you're going for it. He warns you that he doesn't have any backup ready for you, but you choose to leave the \n\treceiver for your tracking device back in the suite for him to use, just to make sure he can find you if you drop off the radar. With that notice given, you make your way down to the harbour, \n\tintent on sneaking onto that yacht so you can get inside the fortress of a mansion. \n\t\n\tYou're just walking out of the casino when suddenly you feel someone stumble into you from behind, feeling a light prick against your neck at the same time. A drunken man walks past, mumbling his \n\tapologies while he keeps going. Then, as you're just about to head over to the valet and have them pick up your car, you feel faint. A black car screeches to a halt right beside you, two men come \n\tout, and drag you in while you are almost powerless to resist them.\n\t\n\tEverything starts going hazy and dark, the insides of the car spinning as you try to get your bearings. You see Jishkariani sitting beside you, looking at you with a grin.\n\t\n\t\"Good day to you, and welcome. Today you will be giving me my money back. With interest.\"\n\t*goto mansiontrip\n\n\n*label mansiontrip\n*finish Chapter 7: Diamonds Are Forever\n\n\n\n\n\n\n", "phoenix": "*comment 4572\n*comment TOTAL 88450\n\n*temp check 0\n*temp killcount \" \"\n\n*gosub killcounting\n\n*if (remi_confirmed)\n\t*set check +1\n*if (mercier_burn)\n\t*set check +1\n*if (overview_basic)\n\t*set check +1\n*if (overview_advanced)\n\t*set check +1\n*if (lady_known)\n\t*set check +1\n*if (evony_listened)\n\t*set check +1\n*if (doorcode)\n\t*set check +1\n*if (record_crimea)\n\t*set check +1\n*if (record_mercier)\n\t*set check +1\n*if (record_burn)\n\t*set check +1\n*if (record_hunter)\n\t*set check +1\n*if (record_worktime)\n\t*set check +1\n*if (weapons_found)\n\t*set check +1\n\n\n\"Are you sure you want to go through with this?\"\n\nThere's a slap as Brandon Ides drops a full-stuffed envelope on the table in front of you. The sun is shining out from the shores of the French Riviera, flooding in through the large windows of \nyour hotel room. One way or another, this will be your final day in Monaco, although as Brandon has made absolutely clear you do have a few options on where you go from here. You've been burned \nas an agent, and thus you cannot be a trusted asset in the eyes of any intelligence agency unless the French send out word that they were mistaken. Which is unlikely.\n\nHowever, after what happened on Majorca, you have managed to contact them. Despite everything, they want to hear you out, especially after the Americans sent word about one of their agents being \ninvolved with the smuggling operation. As so you will need to go to Marseilles to meet with them. Preferably in a public location.\n\n\"I have something that might interest you as an alternative, if you want to slip away while you still can,\" Brandon continues. \"However, the opportunity is right now. I might not be able to \nswing things around for you after the meeting.\"\n\n*choice\n\t#\"I have no choice, Brandon. Whether I'm walking into my death or to reinstatement, I have to see this through.\"\n\t\t\"Well, I suppose I can't fault you for wanting to see this thing through,\" Brandon asks and grunts, bringing his head up to his head so he can scratch his scalp. \"If they do end up leaving \n\t\tyou in limbo, I'll figure something out for you. I'll make arrangements so you can walk away. Trust me on that. It might not be the best life, but it'll be a peaceful retirement for all \n\t\tintents and purposes.\"\n\t\t*goto marseillaise\n\t#\"This is what I want to do, Brandon. I need to see this through, and the only way that will happen if I go to this meeting.\"\n\t\t\"You want to do this, huh?\" Brandon asks and grunts, bringing his head up to his head so he can scratch his scalp. \"Well, I suppose I can't fault you for wanting to see this thing through. \n\t\tIf they do end up leaving you in limbo, I'll figure something out for you. I'll make arrangements so you can walk away. Trust me on that. It might not be the best life, but it'll be a \n\t\tpeaceful retirement for all intents and purposes.\"\n\t\t*goto marseillaise\n\t#\"You know what, you're right Brandon. I no longer exist, I might as well disappear. What do you need of me?\"\n\t\t\"Don't worry, this will be easy compared to what you just went through,\" Brandon says and chuckles. \"I've requested a transfer to South-East Asia. Vietnam is turning into a hotbed and \n\t\tour eyes are turning that way. I can feel that sooner or later, something will happen, and I want to be in place and well-informed when things go south.\"\n\t\t\n\t\tHe drops a manila folder in front of you, which you open to reveal photos of the Viet Minh guerillas, reports in French about the still fairly recent withdrawal of French troops from \n\t\tthe region, and a map of the country. Brandon leans down and taps the inland regions, the highlands around the area where the Cambodian and Laotian borders meet.\n\t\t\n\t\t\"Here. The city of Pleiku. I need you there, to find contacts among the Montagnard who live around the highland region, and I need you to compile as full of a report as you're able \n\t\tto. I need contacts, numbers, willingness to rise up against the Vietnamese if they have to. Everything you can get me,\" Brandon tells you.\n\t\t\n\t\t\"You haven't been assigned there yet, Brandon,\" you inform the man who chuckles. \"What do you need all this for?\"\n\t\t\n\t\t\"A rainy day. Trust me, after this operation, they will assign me wherever I want to go,\" Brandon says and paces slowly around the table. \"This is completely off the books. I'll filter \n\t\tsupplies down your way as well as I can, and I will send another asset to make sure you're not working all by yourself.\"\n\t\t\n\t\tIt sounds like a simple enough task, even if it does take place in a country that may not be the most accepting of the French any longer. However, you look up at Brandon and stand up. \n\t\tThe two of you clasp your hands together and shake firmly. That very evening you would be on your way to Italy in order to catch the first of many shorter flights leading you towards \n\t\tthe jungles of Vietnam. No time for farewells or anything else for that matter. Anything you have to buy would have to be bought en route.\n\t\t*page_break A Year Later\n\t\t*set status \"Active renegade element\"\n\t\t*achieve circle\n\t\tThe hot air circulates slowly through your small sweaty one-room apartment thanks solely to the ceiling-mounted fan. The bamboo blinds rattle gently against the windowframe, while the small \n\t\tcity of Pleiku echoes with the sound of a bustling market just below your window. You have found a nice hole for yourself, situated on the top floor of a colonial-style building in the heart \n\t\tof Pleiku, giving you the best possible view of the city and unlimited access to the highlands region. You can see that gilded roofs of the Buddhist temple nearby, shimmering brightly in \n\t\tthe almost oppressing-feeling sunlight. You take a deep breath, groaning in agony over the stinging of hot sweat on your skin as the warm air continues to scorch you.\n\t\t\n\t\tYou've come a full circle it seems. As you open the manila folder containing your notes, you can't help but chuckle how you have come all the way from your first solo field operation in \n\t\tAfrica, where you hunted Sèkou Marcine because he was gathering a force of revolution, to now sitting in another former French colony gathering names to what is becoming more and more \n\t\tclearly a revolution of your own making. Well, not of your own making - of the Americans' making.\n\t\t\n\t\tThere's a knock at your door, bringing your attention back away from your window and the folder arranged on your small table beside it. You stand up and walk to the door, grabbing your \n\t\tpistol on the way just to be safe. Yet, as you open the door, what greets you is the familiar sight of Kalliope, that bright red hair burning like a flare as always.\n\t\t\n\t\t\"Good morning. Ready for another busy day?\"\n\t\t\n\t\tThe woman steps past you into the room and you close the door behind her, hearing the latch snap into place to lock the door. For a moment you think about everything you've left behind. \n\t\t*if (evony_affair)\n\t\t\tEspecially Evony, from whom you have heard not a single word. She perhaps does not even know where you are or what you are doing. then again, that might well be for the better. \n\t\tYou take in a deep breath, feeling the hot sweat sting against your skin, then turn to start another beautiful and agonizingly hot day of plotting in a place far away from everything and \n\t\teveryone you once knew. But what you do next... is the beginning of another story.\n\t\t*ending\n\n\n\n\n*label marseillaise\nYou stand up and flash a smirk at the American, reaching out and clasping arms with him. \n*if (ides_affair)\n\tHis other hand lifts up to cradle your jawline for a moment as he tries to steel himself, gazing into your eyes for what might be the last time. \nHe looks like he wants to do more, but there is very little he alone can do. The CIA might be able to do more, but in the end for them you are a burned agent and would become a liability. You \nmight even become a point of contention between them and the French, which would cause you no small amount of trouble. \n\n\"Thank you, Brandon,\" you tell him. \"I appreciate the gesture, and the help.\"\n\n\"Think nothing of it. I hope we may see one another again after the meeting.\"\n\n\"I hope so as well.\"\n*page_break Two Days Later\nYou're sitting on a park bench in Marseilles, watching the ocean in the distance, the horizon hiding Majorca somewhere far beyond it. It's pissing down with rain. Tiny annoying drops that feel \nlike mist until a gust of wind whips them around and sends them against your face, crashing against you like thousands of tiny needles.\n\nWith a deep breath you open your briefcase and place a manila envelope beneath your jacket so you can slide it down onto the seat beside you as soon as your contact arrives, but for now it must \nremain dry. Your hands pull the briefcase back together and closes it, then swing it down beside the bench where it finally gets to settle down against the cast iron leg. The park is nearly empty, \nbut you know you're being watched. Knowing who you're about to meet, that's all you can really imagine being the case. Finally after another ten minute wait a man in a trenchcoat and fedora walks \ndown the gravel path, slowing down just before your bench. Without any pause he walks over and sits on the park bench with you. You slide the manila folder out from beneath your jacket.\n\nHe rummages around in his pocket for a moment, then pulls his hand out and offers you a cigarette before taking on himself. Right after taking a long first drag he exhales and glances over to you. \nIt's been a few years since you saw this man last. The man, Jacques Martin, was once upon a time your handler in Africa, but now he was much higher up in the order - to the point where you have no \nidea what his role is anymore. It's all become far too classified for someone like you to be aware of it.\n\n*if (kills = 0)\n\t\"You know, you left no bodies whatsoever in your wake. If nothing else comes of this, I want you to know that I'm bloody proud of you,\" \n\t*goto manilla\n*elseif (kills = 1)\n\t\"You know, you left only a single body behind. If nothing else comes of this, I want you to know that I'm bloody proud of you,\" \n\t*goto manilla\n*elseif (kills \u003c= 5)\n\t\"You know, you left ${killcount} bodies in your wake,\" \n\t*goto manilla\n*else\n\t\"You know, you left ${killcount} bodies in your wake. I'm not sure if I should be impressed or afraid by your efficiency to provide stiffs to the local morgues,\" \n\t*goto manilla\n\n*label manilla\nthe man says quietly, placing a hand on the manila folder containing your report. \"Care to tell me what the hell happened out there?\"\n\n\"Everything went perfectly in Crimea until we got too close,\" you tell him while he opens the folder and starts flicking through the pages.\n\nYou start filling him in with everything you know, from the meeting with Remi at the park in Feodosia, to the Bulgarian border, to meeting with Titos Metaxas, to Rome, and finally to Monaco and Majorca. \nIt's quite the story to tell, and you're skimming over some of the details since those are in the report. This is a full debriefing, but you insisted on a public place so there's no chance of either \nside getting any ideas about disappearing the other. Once you're done talking, the man sitting beside you clears his throat and slowly flips a page over.\n\n\"No, I mean what the hell happened out there?\" he specifies and nods towards the ocean. \"The Spaniards are asking a lot of untoward questions. They've put the explosions down to some kind of turf \nwar between [i]estraperlo[/i], which I suspect is partially correct, but they are also out for blood. I suspect that would be your blood they want.\"\n*page_break\nA moment of silence hangs over the bench as you let your former supervisor read the files. He smacks his lips and takes in a deep breath.\n\n*if (nasonov_killed)\n\t\"So you killed the infamous Nasonov, hmm?\" he finally asks. \"The Russians aren't happy about that. Soviet involvement in this was official but classified. Nasonov wasn't acting rogue when he \n\tcame after you.\"\n\t\n\t\"You've been following him while he chased me?\"\n\t\n\t\"We got glimpses of him here and there. When he arrived and then left Greece. \n\t*if (nasonov_mansion)\n\t\tThen again at the French-Italian border. He was in Marseilles under a false name for a time, then took a boat to Majorca. \n\tBut that's about it,\" Martin informs you, then for the first time takes a proper look at you. \"That was some good work, by the way. The KGB is rattling the sabre, but since we burned you they \n\tcan't go after our agents without escalating everything.\"\n\t*page_break\n\"I'm concerned about one thing. Titos Metaxas,\" Martin says and leans back, lowering the papers. \"What did you offer him in return for the information he gave you? Oh don't worry, we already know you \ngave him the ${payment_type}. \n*if (payment_type = \"intelligence\")\n\tWhy? Why'd you do it?\"\n\t\n\t\"I didn't have anything else to give him, and if my hunch was right that someone betrayed the operation from inside, the operational details were already known to the Soviets.\"\n\t\n\t\"Either you're far smarter than the agency gives you credit in any of our files, or just utterly reckless. I understand why you did what you did,but that is still a horrific treason towards France.\"\n\t*goto paymentz\n*elseif (payment_type = \"diamonds\")\n\t*set check +1\n\tYou know, it's impossible to count how much money went through that place now. As soon as you left the island, Titos' salvage crews were turning over every damned rock on the island.\"\n\t\n\t\"He got paid well for his service.\"\n\t\n\t\"Yes and only the Soviets lost in that transaction, so the higher-ups aren't too concerned. However, this now leaves diamonds worth millions of francs for Metaxas to play with instead of it being \n\tours to use. That would have been a considerable bounty.\"\n\t*goto paymentz\n*else\n\tOperational backup funds are for an agent to do with as they please as long as it is necessary. Your use falls under that, there are no questions regarding that on any level of the agency.\"\n\t*goto paymentz\n\n*label paymentz\n\nThe man beside you takes a moment to take a deep breath, then exhale. He flips over a couple of pages, to where your involvement with the CIA operation begins.\n\n\"We heard from the Americans. Scorpio \n*if (evony_out)\n\twas very pleased that you helped them get someone inside, although things moved far too fast from there to make much of a difference in the end. \n\t*goto boo\n*else\n\twasn't all that pleased over your efforts. At least when it comes to providing them an opening that they had been hunting for months. \n\t*goto boo\n\n\n*label boo\n*if (jishkariani_killed)\n\tHe was also displeased by the fact that you denied Vepkhia Jishkariani from them. According to his report, death was far too fast for Jishkariani, and they would have made him 'squeal' about all \n\tthe communist revolutionaries in Africa, had they gotten their hands on him.\"\n\t\n\t\"It couldn't be helped.\"\n\t\n\t\"Perhaps not, but that doesn't help the Americans now. Or us, by extension.\"\n\t*goto oob\n*else\n\tYou gave them Jishkariani, and that was very appreciated. I believe his initial report from Jishkariani's debriefing was that the CIA would be able to make him 'squeal' about many of the communist \n\trevolutionaries working in Africa.\"\n\t\n\t\"Will France be kept in the loop? This was our mission since Marcine was taken down.\"\n\t\n\t\"Obviously. The Americans have promised us full cooperation, and I believe the British will be in the know as well.\"\n\t*goto oob\n\n\n*label oob\n*page_break\n*if (lund_killed)\n\t*set check +2\n\tMartin takes the cigarette from his lips and tosses it to the ground only to stomp on it. He takes a breath of fresh air, then looks into the distance as he lets that air back out.\n\t\n\t\"So, you killed Lund?\"\n\t\n\t\"Yes.\"\n\t\n\t\"Good. He is a loose end that cannot remain on the loose. He's the kind of man that would keep doing what he's doing whether he's in a prison or not. It's better he not get the opportunity. \n\tThat for one is a real service to France.\"\n\t\n\t*goto afterall\n*else\n\tMartin takes the cigarette from his lips and tosses it to the ground only to stomp on it. He takes a breath of fresh air, then looks into the distance as he lets that air back out.\n\t\n\t\"So, you chose not to kill Lund?\"\n\t\n\t\"Yes.\"\n\t\n\t\"Unfortunate. He is a loose end that cannot remain on the loose. He's the kind of man that will keep doing what he's doing whether he's in a prison or not. It's better he not get the opportunity. \n\tBut we cannot get to him now that he's been turned over to the Gendarmes. It's the court's problem now, and we will do what we can to make sure he becomes isolated.\"\n\t\n\t*goto afterall\n\n\n*label afterall\n*if (remi_killed = \"false\")\n\t\"And what about Remi?\" you pose the question. \"I know he was turned over to you and that he's alive.\"\n\t\n\t\"Is he really?\" Marcine asks in retort and gives you a knowing look, signalling that Remi has been quietly disposed of.\n\t\n*if (check >= 10)\n\t*set status \"Active, reinstated\"\n\tWith a deep sigh the French intelligence agent turns to look at you, picks up the manila folder, and stands up. Without another word he starts walking away from the park bench, but as you look \n\tdown to where he sat, there is another folder there. With a smile you pick it up and instantly see that it's an official record bearing your picture and name.\n\t\n\tYou've been reinstated, although your name will probably have to get changes when you first report in. Not just that, you can see your clearance level has gone up, meaning a nice little promotion. \n\tWith a chuckle you close the folder and stand up, collecting your briefcase and heading off towards the setting sun. \n\t*if (((evony_out = \"false\") and (evony_affair = \"true\")) and (ides_affair = \"true\"))\n\t\tAs you get closer and closer to the gate leading out of the park, you can see a figure standing there. Slowly she turns to see you, and you see the familiar face of Evony smiling at you. She \n\t\treaches out with her hand, inviting you to walk with her. Yet you also see a strange sadness hidden in her eyes, a resignation of sorts. Before you can address it you notice that she isn't \n\t\talone. As you get closer and closer, you see another figure round the corner to welcome you: Brandon. He offers you a big grin as he stands beside Evony, waiting for you.\n\t\t*achieve maximal\n\t\t*goto finishline\n\t*elseif ((evony_out = \"false\") and (evony_affair = \"true\"))\n\t\tAs you get closer and closer to the gate leading out of the park, you can see a figure standing there. Slowly she turns to see you, and you see the familiar face of Evony smiling at you. She \n\t\treaches out with her hand, inviting you to walk with her. Yet you also see a strange sadness hidden in her eyes, a resignation of sorts.\n\t\t*achieve maximal\n\t\t*goto finishline\n\t*elseif (ides_affair = \"true\")\n\t\tAs you get closer and closer to the gate leading out of the park, you can see a figure standing there. He snaps around as you get closer and you see that it's Brandon waiting for you. He reaches \n\t\tout with his hand, inviting you to take it and walk with him.\n\t\t*achieve maximal\n\t\t*goto finishline\n\t*else\n\t\t*achieve maximal\n\t\t*goto finishline\n*elseif ((check \u003c= 4) or ((check \u003c= 6) and (payment_type = \"information\")))\n\tWith a deep sigh the French intelligence agent turns to look at you, picks up the manila folder, and stands up. Without another word he starts walking away from the park bench, leaving you all \n\talone on the bench. For a moment everything is quiet, then you hear a crunch of something behind you. Before you can react someone has a garrote wire wrapped around your throat, squeezing down \n\ton you. You can't breathe, you can't claw at the wire, you can't reach whoever is behind you.\n\t\n\tAll sound leaves the world, replaced by the thuds of blood pulsing inside your ear. So this is what it feels like to die.\n\t\n\t*achieve dishonour\n\t*if (ides_affair)\n\t\t*set status \"Burned, M.I.A.\"\n\t\tSuddenly your throbbing face is awash with a warm rain, your entire head numb to the point where you barely register the sensation. That is, until the wire wrapped around your neck suddenly \n\t\tloosens, only to be torn away. You gasp and cough as air fills your lungs again, falling forwards off the bench, finding yourself on your knees on the rough rain-soaked gravel.\n\t\t\n\t\t\"Come on,\" you hear a voice push through the noise of blood still rushing through your swollen ears. \"We better get out of here.\"\n\t\t\n\t\tYou could recognize that voice from anywhere - Brandon Ides. His strong arm wraps around your shoulders and he pulls you up to your feet, dragging you along with him, lifting you up just \n\t\tenough for your feet not to keep digging into the gravel path during your way out towards the exit from the park. You look up at Brandon while massaging your throat, feeling the swelling \n\t\tof your entire head slowly subside. There is a fierce passion in the American's eyes, a determination you haven't seen of him even during the most intense moments that you have shared with \n\t\thim. That strong touch of his guides you hurriedly into the back of a 2CV.\n\t\t*page_break\n\t\tIt's amazing how fast the American agent has shuffled you off. The small engine in the car squeals as it turns over for the first time, Brandon taking over the driver's seat confidently. \n\t\t*if (evony_affair)\n\t\t\tOne the passenger seat you see another figure, who turns to look at you as the car is put into gear and Brandon's foot falls on the gas pedal. Evony looks at you and gives you a worried \n\t\t\tlittle smile, making sure you are feeling okay and still breathing.\n\t\tThe whole car jolts as Brandon rolls the car over the curb and launches off down towards the coast. From how you are splayed out on the back seat you can see the car turn and the Mediterranean \n\t\tsea opens up before you, offering you a view towards clearer skies.\n\t\t\n\t\tAs you lie there you notice there is an envelope underneath you. You slide it out and open it, noticing that it's been filled with cash, a passport, and some other papers: the essentials \n\t\tof a brand new identity. If Brandon has supplied this to you, you can be quite sure that Langley is not in the know and the man is risking his whole career.\n\t\t\n\t\t\"Lie still and keep out of sight. We're getting you out of here so you can disappear,\" Brandon tells you, glancing at you via the mirror, speeding up as you head off.\n\t\t*goto finishdead\n\t*else\n\t\t*set status \"Missing, K.I.A.\"\n\t\tThe world goes blurry as you can no longer function, your body starting to shake violently in panic and asphyxiation, then everything goes dark. You have been executed as a traitor to France.\n\t\t*goto finishdead\n*else\n\t*set status \"Retired\"\n\tWith a deep sigh the French intelligence agent turns to look at you, picks up the manila folder, and stands up. Without another word he starts walking away from the park bench, leaving you all \n\talone on the bench. For a moment everything is quiet, then you hear a crunch of something behind you. You turn quickly and see Brandon there, holding another manila folder in his hand.\n\t\n\t\"Bad luck,\" he tells you and shrugs. \"But I told you we would take care of you.\"\n\t\n\tYou open the folder and look inside, seeing new records and credentials for yourself. Not as a spy of any nation, but as a civilian. The Americans have come through, saving you from a life as \n\ta stateless person. With a quick smile he pats you on the shoulder and invites you to walk with him. There's no words necessary, you know the CIA have everything sorted out and you just need \n\tto be briefed on your new identity.\n\t\n\t*if (ides_affair = \"true\")\n\t\tWalking side by side, the man slowly and gently reaches out, taking your hand and entwining your fingers together. \n\t*if ((evony_out = \"false\") and (evony_affair = \"true\"))\n\t\tAs you get closer and closer to the gate leading out of the park, you can see a figure standing there. Slowly she turns to see you, revealing the familiar face of Evony waiting and smiling \n\t\tat you. Yet you also see a strange sadness hidden in her eyes, a resignation of sorts. \n\t*achieve favours\n\t*goto finishline\n\n\n\n\n*label finishline\n*if ((evony_out = \"true\") and (evony_ko = \"false\"))\n\t\n\tAs you look out ahead, towards the horizon, you can't help but think of where Evony might be now. \n\t*if (ides_affair)\n\t\tYou glance over to Brandon who meets your look, smiling, perhaps knowing what you're thinking about or perhaps not. He shakes his head at you and furrows his brow, silencing you before you \n\t\tcan voice out the questions running through your mind.\n\tSeveral months later a card is forwarded to you, bearing a printed image of the Reno skyline with a tagline: [i]The Biggest Little City in the World[/i]. Evony's signature is on the back, but there \n\tis no address, no lengthy message, nothing to indicate what kind of life she is to now lead, or whether Reno is her final destination on her journey to a fresh life. \n\t*if ((evony_bed = \"true\") and (evony_affair = \"false\"))\n\t\tHowever, the back is not entirely blank. There is a lipstick mark in the shape of Evony's lips pressed down on the white back of the card, below which has been written a short and simple message: \n\t\t\"[i]Merci beaucoup pour tout[/i] - thank you very much for everything.\"\n\t*goto finishdead\n*label finishdead\n\n\nWe hope you've enjoyed playing [i]Diamant Rose.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n\n\n\n*label killcounting\n*if (kills = 9)\n\t*set killcount \"nine\"\n\t*return\n*elseif (kills = 8)\n\t*set killcount \"eight\"\n\t*return\n*elseif (kills = 7)\n\t*set killcount \"seven\"\n\t*return\n*elseif (kills = 6)\n\t*set killcount \"six\"\n\t*return\n*elseif (kills = 5)\n\t*set killcount \"five\"\n\t*return\n*elseif (kills = 4)\n\t*set killcount \"four\"\n\t*return\n*elseif (kills = 3)\n\t*set killcount \"three\"\n\t*return\n*elseif (kills = 2)\n\t*set killcount \"two\"\n\t*return\n*else\n\t*set killcount kills\n\t*return\n\n\n\n\n\n\n\n", "safehouseroma": "*comment 9356\n\n*temp tick 0\n*temp unsure false\n\n\nYou arrive in Rome late one evening, stopping your car in a shadowy dead end. This narrow alleyway is flanked by heavy buildings from the mid-19th century, one of which is apparently condemned \nto be demolished in favour of a new office building. What a shame. Especially since your safehouse is in it. \n\nWith a deep breath you open the car door and look around to see if you're alone, then move to the fencing that has been erected around the condemned building. The roof has already been ripped off \nand piled up behind the fencing, but you slip through and into the building despite this. As soon as you enter the building you can feel it around you, almost like it's shifting. You don't see \nthe movement and can only barely feel it, making you honestly think that you're imagining it for a moment.\n\nSlowly, feeling things out as you go, you head further inside. Your steps echo along this old abandoned hallway that leads you to a stairwell heading up, the night sky hanging above you since the \nroof over the stairs has been torn off. The stone steps have deep grooves in them from all the heavy use over the years, leading you up to the second floor. The whole building is empty. Every \nmove you make echoes eerily down the halls and rooms, making the building feel only stranger.\n\nDespite this, you keep going, heading out into the second floor to find your old room. You're just lucky to have happened by the house when you did, because a week later the equipment hidden away \nwould no longer be here.\n*page_break\nAs you keep moving onwards down the narrow corridor on the second floor, you keep your head on a swivel. The clearing crew must have forced all the doors open, which gives you easy access to \neverywhere - including your old room. Seems like there's no need for keys. You slip inside the once beautifully decorated living room of the safehouse and rush straight away to the threshold \nbetween it and the kitchen. The floorboard there is loosened with a hidden compartment beneath.\n\nYou pause and take a moment to listen, checking one last time in case you're not alone in this building. There's no noise aside from your foot as you shuffle around. Good. You lean down and rip \nthe floorboard off, peering down to see a little curled piece of string slip into the compartment, letting you know in a subtle and simple way that nobody else has been inside the compartment. \nGood.\n\nInside that compartment is exactly what you remember putting in there when you last left: a listening device, a pair of shoes with a recording device in one heel, a tracker with matching receiver, \na concealable drill, [i]plastique[/i] with a detonator, a camera hidden inside a cigarette box, as well as an extra box of ammunition for your pistol. One thing is for certain: it's good that you \narrived when you did, or the demolitions people would have had a nasty surprise waiting for them had the [i]plastique[/i] gone off during the demolition.\n\nIn addition there is a small wad of Italian lira. Enough to put you up for a few nights in a hotel while you gather your thoughts and make a plan. You also have that bag of diamonds that will prove \nto be very useful indeed in the coming days.\n*page_break Two Days Later.\n\"Good morning,\" you say and smile to the lean thin-moustached man behind the front desk of the hotel. \"Anything new for me?\"\n\n*if (gender = \"male\")\n\t\"Good morning, Monsieur. \n\t*goto titular\n*elseif (gender = \"female\")\n\t\"Good morning, Mademoiselle. \n\t*goto titular\n*else\n\t\"Good morning. \n\t*goto titular\n\n*label titular\nA package arrived for you late last evening,\" the day manager tells you with a friendly smile.\n\nHe leans down under the desk to collect a small brown package and places it gently onto the desk. There are no markings on it aside from your [i]nom de guerre[/i] and an added room number markered \nin by the night manager.\n\n\"Did any kind of message arrive with this?\"\n\n\"No, I'm sorry. Only the package itself.\"\n\n\"Thank you.\"\n\nYou take the package and nod to the day manager before making your way down the hall to the elevator. There is a young bellhop inside, his face marked with bright red pimples and voice cracking as \nhe asks for your floor. Soon enough the doors close with a rattle and the same elevator you used the previous day starts moving up.\n*page_break\nYou make sure to lock the hotel room door as you enter, then quickly walk to a table and start ripping open the brown paper covering the package. As soon as you unfold the thick paper you see a \nfolded note. Someone has hastily written something on the visible part of it:\n\n\"[i]Careful. Your friend from Greece has followed you.[/i]\n*line_break\n[i]I thought these might also help you now that you can no longer rely on the motherly bosom of France.[/i]\n*line_break\n[i]- T[/i]\"\n\nYou unfold the paper and find that it's a memo lifted off of the British. Specifically it details someone called Valery Nasonov, a KGB agent with active records going back to the start of the Cold War. \nApparently he is quite the accomplished hunter by the sheer amount of agents - on the list marked with retracted names and codenames - that have disappeared shortly after his arrival in any one city. \nInside the folded piece of paper is also a blurry black and white picture showing the partially covered face of the man who tried to explode you inside your hotel room back in Greece. It appears that \nsomehow you have wound up on a Soviet hit list after all. Then maybe you weren't just being paranoid back in Crimea.\n\nAside from that excellent tip-off about KGB officer Nasonov, there is also a small cardboard box inside the parcel. You open it and find that inside is a neat row of casino chips from an establishment \nin Monaco, known very well as a place for high-rollers and characters of ill repute to mingle freely and without prying eyes. There is also a laundry tag from the hotel you are staying at.\n*page_break\n\"Hello again,\" you say to the day manager and offer him a quick flash of a smile, then place the laundry tag on the desk. \"I believe you have something of mine. Can you just check up on that, if \nyou could.\"\n\n\"Of course, it won't take more than a \n*if (gender = \"male\")\n\tmoment, Monsieur.\"\n\t*goto titularis\n*elseif (gender = \"female\")\n\tmoment, Mademoiselle.\"\n\t*goto titularis\n*else\n\tmoment.\"\n\t*goto titularis\n\n*label titularis\n\nThe day manager takes the tag from you and walks into the backroom. While the door is still closing behind him you notice him open another door leading to a service stairway, then making his way \ndown to the basement. You wait by the front desk for a while, maybe twenty minutes or so. You're about to leave, or maybe chase after the day manager to find out what is going on, but then you hear \nthe door creak open in the backroom. You turn around to see the day manager making his way out to you with a smile on his face and a dry cleaning bag on his arm.\n\n\"Here you are. My apologies for the wait, but someone had misplaced it in the wrong section of the laundry room,\" the day manager tells you and bows his head.\n\nYou take the dry cleaning bag from the manager and take a look at the clothes inside. That is by far the most expensive \n*if (gender = \"male\")\n\ttuxedo \n\t*goto fineries\n*elseif (gender = \"female\")\n\tevening gown \n\t*goto fineries\n*else\n\tset of fineries \n\t*goto fineries\n\n*label fineries\nyou have ever handled, perfect for any black-tie affair. If it's coming from Titos, it is part of another payment made to him, or a debt collection. The manager catches your attention again by holding \nout an enveloped to you.\n\n\"Oh, this was with the clothes. I hope you enjoy your evening,\" he tells you and bows quickly before turning to another person approaching the front desk with business of their own.\n\nYou open the envelope and peek at what lies within. It's an invitation to a private party held in a villa just outside of Rome this very same evening. Another tip to drive you onwards. It's hardly \nwhat you paid for, but apparently Titos really wants you to succeed on this mission of yours.\n\nAs you lower the invitation and take a few steps from the front desk you suddenly have a man in a particularly well-tailored suit walk up to you and hand you a car key.\n\n*if (gender = \"male\")\n\t\"Here you are, old boy. Park that for me, will you,\" he tells you with a particularly nasal voice and instantly walks away.\n\t*goto carkey\n*elseif (gender = \"female\")\n\t\"Here you are, little lady. Park that for me, will you,\" he tells you with a particularly nasal voice and instantly heads off. \"Try not to scratch the paint.\"\n\t*goto carkey\n*else\n\t\"Here you are, fellow. Park that for me, will you,\" he tells you with a particularly nasal voice and instantly walks away.\n\t*goto carkey\n\n*label carkey\n\nYou walk out to find a black '57 Maserati A6G Frua Spider waiting for you outside. For a moment you think of leaving the keys at the front desk since the hotel does not have a parking service, but then \nyou take another look at the car. It would be such a waste to dress up for a fine party and not have the car to match. So instead you hop over to the car and climb in, running a hand on the smooth \nsurface of the closed canvas roof.\n*page_break Villa Martiae.\nIt's unbelievable how the Maserati purrs after all those horrid compact cars you have been driving around in. The drive from Rome into the lovely winding roads of the countryside is near to heavenly, \nand comes to a saddening and abrupt end when you finally reach Villa Martiae. The two-story renaissance villa is absolutely huge. It dominates the hillside otherwise arranged in neat rows of olive \ntrees. The gravel road shift and rumbles under the car as you pull up to the front door, only to be greeted by a man in a very expensive looking tuxedo and a very obvious bulge of a pistol at his hip.\n\n*if (gender = \"male\")\n\t\"Buonasera, Signore,\" \n\t*goto itasur\n*elseif (gender = \"female\")\n\t\"Buonasera, Signorina,\" \n\t*goto itasur\n*else\n\t\"Buonasera,\" \n\t*goto itasur\n\n*label itasur\nhe starts to greet you, but you cut him off by stepping out of the car and handing him your invitation.\n\nHe smiles and bows his head to you, giving you back the invitation while you walk around the back of the car. You climb up the large stone steps leading to a front door flanked with large romanesque \nmarble pillars, then head inside. The doors are opened for you, and as soon as you step over the threshold there is a waiter ready to offer you a glass of champagne. A wave of people talking washes \nover you as you make your way further in and are faced with several dozen people chatting quietly between themselves.\n\nYou've made some inquiries as to the nature of the party you have the invitation to. Apparently it is a gathering of all kinds of businesspeople from all across Europe and the Middle-East. For that \nreason you have made some fake business cards for a fake business just to make sure you fit in for the few hours that the party lasts. While you sip the champagne, looking around for any faces you \nmight recognize, you suddenly hear a deep sensual female voice call to you from behind you. You turn to see a dark-skinned woman wearing a luxurious silver dress standing near to right next to you, \nholding a slender cigarette in one hand.\n\n\"Excuse me, may I borrow a match?\" she asks, her lips tugging at the corners into a smile.\n\n\"I prefer a lighter,\" you respond and smile, then reach into your pocket to take out a cigarette lighter.\n\n\"Wonderful, that will do quite nicely,\" she tells you and reaches over so you can light the cigarette for her.\n*page_break\nThe slender woman takes a single long drag of the cigarette, then exhales the smoke through pursed lips. With a satisfied smile she reaches out towards you, a silver bracelet jingling against a \nsilver wristwatch.\n\n\"Evony Lellouche,\" she introduces herself.\n\nIt takes some doing to keep your face neutral as she tells you her name. So this is why Titos sent you the invitation. It makes sense now, although now that you are face-to-face with the business \npartner and perhaps lover of a diamond smuggler that just so happens to be in your crosshairs, you find yourself at a bit of a loss as to what to do. However, you do manage to take her hand and \nshake it firmly.\n\n*fake_choice\n\t#\"${surname}, ${name} ${surname}.\"\n\t\t*set charm +5\n\t\tThe woman lets out a light chuckle and shakes her head at you, lifting one hand up to her cheek and brushing a strand of raven black hair behind her ear.\n\t\t\n\t\t\"Please, that may work when coming from the lips of someone like Connery, but it does not fit your lovely French accent,\" she says with a broad smile.\n\t\t\n\t#\"${name} ${surname}. A pleasure to meet you, Madame.\"\n\t\tThe woman lifts a hand up to her cheek and brushes a strand of raven black hair behind her ear.\n\t\t\n\t\t\"The pleasure is all mine,\" she says with a broad smile. \"And it's Mademoiselle.\"\n\t\t\n\t#\"${name} ${surname}.\"\n\t\tThe woman lifts a hand up to her cheek and brushes a strand of raven black hair behind her ear. \nHer eyes travel over your figure, taking you in and studying you closely.\n\n\"I have not seen you before, \n*if (gender = \"male\")\n\tMonsieur, \n\t*goto surries\n*elseif (gender = \"female\")\n\tMademoiselle \n\t*goto surries\n*else\n\t*goto surries\n\n*label surries\nwhich is quite surprising,\" she tells you, suddenly breaking the silence. \"I know everyone around here, but you - you I do not know.\"\n\n*if ((talking = 90) or ((talking > 50) and (charm > 55)))\n\t\"Well, now that is clearly because I am nobody of importance,\" you start and give her a wry smile. \"I haven't been working along the Mediterranean for long. A few weeks at most, but I intend to \n\tcreate some waves if I can.\"\n\t\n\t\"Of all the places, the Mediterranean is the place to do it. Business is thriving,\" she says and laughs quietly.\n\t
