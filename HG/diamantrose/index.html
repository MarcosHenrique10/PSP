as been tasked with keeping you alive and acting as the contact with the local \nchapter of your merry little band of spies.\n\n\"Looks like somebody finally turned up. Are you sure you got the recorded set up correctly?\" Remi asks, leaning over the telescope to peer through it, aiming the lens towards the recently lit-up \nwindow.\n\n*choice\n\t*if (not (((driving = 90) or (combat = 90)) or (talking = 90))) #\"I know this kind of technology inside and out. There's no way I'd install a bug wrong.\"\n\t\t*set technology 90\n\t\t*set disguises -90\n\t\t*goto technologystep\n\t*if (not (((driving = 70) or (combat = 70)) or (talking = 70))) #\"I'm confident. I'm good enough with this sort of technology to make sure a bug is working.\"\n\t\t*set technology 70\n\t\t*set disguises -70\n\t\t*goto technologystep\n\t*if (not (((driving = 50) or (combat = 50)) or (talking = 50))) #\"Yes, I'm sure. It's working. Whether it's placed in the perfect spot, I don't know, but it should work.\"\n\t\t*set technology 50\n\t\t*set disguises -50\n\t\t*goto technologystep\n\t*if (not (((driving = 30) or (combat = 30)) or (talking = 30))) #\"I'm not sure. I couldn't find a good spot for the damned thing, but I think it should be working.\"\n\t\t*set technology 30\n\t\t*set disguises -30\n\t\t*goto technologystep\n\t*if (not (((driving = 10) or (combat = 10)) or (talking = 10))) #\"Honestly? No idea. I don't know anything about this kind of technology, so it'll be exciting to find out.\"\n\t\t*set technology 10\n\t\t*set disguises -10\n\t\t*goto technologystep\n\n*label technologystep\nRemi lets out an indistinct hum in response. The light blinks out again and you stand up to watch the apartment building you've been staring at ever since you arrived here. The front door opens and \na figure in a dark trench coat and a fedora walks out. The streetlights wash out any distinct colours from the figure, masking the whole sidewalk with a dull yellowish-orange glow. However, you \nlean in to look through the camera, revealing that the figure is holding a briefcase that appears to be on the heavy side. You also notice that the lapel of that trench coat is decorated with a \nlittle pin in the shape of a red star.\n\n\"Politburo?\" you ask quietly. \"Have we been watching a politician this whole time?\"\n\n\"Maybe,\" Remi answers and pulls away from the telescope while you rush to take a couple of pictures. \"But that doesn't seem right.\"\n\nThe figure stops for a moment beside a dull brown Moskvich, pausing to light up a cigarette before continuing along. You snap another picture, then suddenly realize that there's suddenly no briefcase. \nThe Moskvich starts moving, pulling away from the parking spot and turning around to head your way. You snap more pictures.\n\n\"Drop-off. He just dropped off the briefcase by the car,\" you say and Remi hurries to the telescope.\n\n\"[i]Merde[/i],\" he sighs as he peers down at the moving car, your finger moving quickly to wind the camera roll and snap another picture. \"I know the driver.\"\n\nThe car drives past you and heads straight down the road, speeding up and disappearing from sight very quickly. Remi moves away from the window and starts pacing back and forth along the small \nattic room, bringing his hand up to his face, hiding it from you.\n\n\"Why didn't I think of it before,\" Remi finally says in a hushed voice, finally coming to a halt. \"The man in the car goes by many names. Recently he's adopted the alias of Grigori Vovk. He has \nhelped us in the past to smuggle in goods, and that is his trade - smuggling small amounts of items in behind the Iron Curtain. Recently he dropped off th face of the earth. About a week after \nyour northern mission, in fact. I haven't seen him or heard of him at all, which usually means he's been purged. Obviously he hasn't been.\"\n\n\"Then what's the next move?\"\n\n\"Corner him and find out what he knows.\"\n\n\"How? You said you haven't been able to find him as of late.\"\n\n\"Don't worry, I haven't really been looking. Now I will. I'll contact you as soon as I have something.\"\n*page_break\nIt takes almost two weeks before you hear of Remi next. You continue watching the place for another week until you receive new orders to pack up and relax the stakeout. With a manhunt going on \nfor this Grigori Vovk fellow, the section chief has decided not to keep the watch going on the house, especially if it is indeed a home or office belonging to a member of the politburo. While \nat any other point in time it would be beneficial, right now the political realm of the Soviet Union is not a priority for your spy ring. Others in Moscow are doing a far more important job at \nuncovering political secrets.\n\nOne particular rainy morning you are enjoying a very sharp-tasting horrid cup of coffee at a depressing little diner some ways off from the rented apartment you have managed to obtain as your \nsafehouse for however long you will be staying in the Soviet Union. The window next to your little table is battered with small drop of rain, drowning out the sound of the patriotic speeches \nechoing through the radio.\n\nSuddenly someone stumbles against your table, apologizing in Russian before continuing on. As you gather your senses you notice there is a small note left behind in the form of a folded-up paper. \nWith a quick sip of coffee you reach out and grab the piece of paper, folding it out and reading it. It's from Remi, bidding you to come to a hotel some blocks away on a set date.\n*page_break\nThe hotel isn't anything too fancy, but looks much nicer than you might have expected. Perhaps the only reason why it does not astound you how nicely furnished and decorated the place is the fact \nthat Feodosia, the city you are staying in, is a holiday destination throughout the summer months. The note gave you a room number which you memorized, allowing you to walk straight for the \nelevators after a quick greeting to the man standing behind the front desk.\n\nYou hurry up to the right floor and then down the hallway, finding the correct door and knocking firmly on the door. There's no sound from the other side. You knock again. Then you hear the rattling \nof the locks being opened, and soon enough Remi is peering at you through the crack in the door.\n\n\"Oh, you're here. Good,\" he tells you, withdrawing for a moment before pulling the door fully open, coming out with a thick jacket in hand. \"We should get going. Dear Grigori won't wait for long.\"\n\n\"You found him? Your note didn't tell me anything,\" you complain, eliciting a chuckle from Remi.\n\n\"I know it didn't,\" he tells you with a smug grin. \"Of course I found him, but we will have to hurry along if we want to see him in a talkative condition.\"\n\n\"What do you mean?\"\n\n\"We have competition.\"\n*page_break\nThe drive from the hotel takes you to the outskirts of Feodosia, Remi's little box van coming to a halt right beside what seems like a little shack of a house built in between old warehouses and \na lumber yard. Remi opens the glove box with a swift motion and recovers a silenced Welrod pistol, twisting the back and cycling the bolt to load the weapon. You do the same with a second Welrod \nthat was left behind.\n\n\"Expecting trouble?\" you ask while Remi is already stuffing the firearm under his jacket.\n\n\"Of course I am. You should be too,\" he tells you with a grin, opening the van door with a loud pop. \"Remember. Never go against your gut. Everyone is potentially under opposition control.\"\n\nYou've heard the rules before. Remi doesn't have to remind you. You've been out in the field before and felt the paranoia, suffered the consequences of losing focus, and seen others suddenly \ndisappear because they were careless. It happens all too often. For now, however, you're not quite sure what Remi is trying to get at, since your target is a lone figure in a small house in the \nmiddle of nowhere. While he told you that you have competition from someone and made sure to take weapons along for the ride, you don't have a feeling that he's expecting violence to break out. \n\nYou walk behind Remi as you make your way over to the front door of this small house. He glances quickly through the windows on either side of the door, then knocks forcefully, one hand under \nhis jacket and holding to his loaded Welrod pistol. There's nothing but silence. Remi knocks again.\n\n*fake_choice\n\t#\"All part of the plan you're refusing to share with me?\"\n\t\t\"Ha ha, funny,\" Remi murmurs and knocks again. \"There is no plan except to find Grigori. If someone stands in out way, we'll cross the bridge when we get to it.\"\n\t\t\n\t\tWith a grunt he pulls back the hand and shoulders the door, trying the handle at the same time. It opens, but doesn't move to full open. It's not locked, but something is definitely blocking \n\t\tthe door. Remi pulls out the Welrod, backs away, then shoulders the door again, this time causing a large screeching noise from the other side - the noise of a heavy piece of furniture \n\t\tgrinding against the floor as it shifts back. Another shove, another loud noise, then there's enough of a gap for you both to slip inside.\n\t\t\n\t\tYou enter the house and look around, eventually finding yourselves standing at the bottom of the stairs leading down to a basement. \n\t#Go around and find another way in.\n\t\tYour partner is left knocking on the door as you back away and peer back around the corner. The house is longer than it is wide, leaving a three more spread out windows lining the side of \n\t\tthe house before you get to the back of it. One of the windows is ajar, but high enough that you won't have an easy time to jump up to it and get it open. At least in the time it takes for \n\t\tRemi to bust through the front door when he gets tired of knocking. The back door is more likely to be the easy choice.\n\t\t\n\t\tSo you walk around and try the back door. It's locked. As you look around and try to find a spare key, you suddenly hear a crash from inside, then a moment of silence. Shortly after the \n\t\tback door unlocks and Remi stands there, looking to you while holding his Welrod safely in one hand.\n\t\t\n\t\t\"Coming in or not?\"\n\t\t\n\t\tWith a smirk he lets you pass into the house and you find yourselves standing at the bottom of the stairs leading down to a basement. \n\t#Kick the door in.\n\t\tYou reach up and grasp Remi's shoulder, pulling him gently away from the door. With a clear of your throat you move in front of the door and try the handle. It moves and the door opens, but \n\t\tinstantly catches on something blocking it from the other side. Steadying yourself, you suddenly bring your foot out, kicking the door as forcefully as you can. There's a loud crash from \n\t\tthe other side of the door and there's now a big enough gap for you both to slip through.\n\t\t\n\t\tRemi gives you a quick smirk and pulls out his Welrod, heading in first. You both make your way inside the house and have a look around, eventually finding yourselves standing at the bottom \n\t\tof the stairs leading down to a basement.\n\t#Let Remi handle this.\n\t\tYou clear your throat and take a step back, letting Remi handle the door while you look around, making sure nobody is watching you, and peering past the corner of the house to make sure \n\t\tnobody is running away from the house in an effort to give you the slip. There's nobody around. Perfect.\n\t\t\n\t\tWith a grunt he pulls back the hand and shoulders the door, trying the handle at the same time. It opens, but doesn't move to full open. It's not locked, but something is definitely blocking \n\t\tthe door. Remi pulls out the Welrod, backs away, then shoulders the door again, this time causing a large screeching noise from the other side - the noise of a heavy piece of furniture \n\t\tgrinding against the floor as it shifts back. Another shove, another loud noise, then there's enough of a gap for you both to slip inside.\n\t\t\n\t\tYou enter the house and look around, eventually finding yourselves standing at the bottom of the stairs leading down to a basement. \nThere a clattering noise from below, then a muffled moan. Carefully Remi starts heading down, his Welrod at the ready. You do the same, giving him enough space to clamber up to safety in case \nit's an ambush waiting for you down there.\n\nYou're not entirely wrong. As soon as you descend down the stairs, you see a gunshot ping against the concrete wall right beside the stairs, a puff of dust exploding out from a fresh little hole. \nAt the same time you hear the crack of a suppressed pistol firing, the distinct sound of a muffled bulletshot joining a metallic clack. Another muffled moan.\n*page_break\n\"Hold it right there!\" you hear a woman's voice call out from the direction of that sudden gunshot, watching as Remi freezes and brings his hands in full view, the man keeping his finger off the \ntrigger of that black-painted pistol. \"Who are you? You don't look like KGB, and you're definitely armed like KGB.\"\n\nRemi takes a single slow step away from the stairs, giving the woman a good view at him. While the KGB doesn't exactly have a look about them, you can't disagree with whoever this woman is. Were \nyou to imagine a KGB agent, Remi looks very little like that mental image, especially since he very much lacks any kind of distinctly Slavic facial features.\n\n\"Neither do you,\" Remi answers, peering out into the basement, obviously seeing someone who you cannot from where you are. \"Let me guess, you're the British? Look, we want to hear where Grigori \nis shipping goods to. You've been interrogating him, right?\"\n\nThere's a moment of silence, but then you hear some shifting around. Remi looks your way and nods his head, inviting you into the open. You follow the instruction, taking a quick moment to peer \nout, seeing two figures in the distance waiting for you, a gagged and bloodied man tied to a chair just behind them.\n\n\"Sevastopol,\" you hear an answer, this time from a man. \"Seems like we're chasing down the same leads, so we'll have our people contact yours and make this official, but I see no problem in us \nworking together. Whatever you're looking for, it's going through Sevastopol.\"\n\n\"Well isn't that just great,\" Remi sighs and looks at you, sliding his pistol back under his jacket.\n*page_break Sevastopol\n\"The patrol has passed.\"\n\nYou look up to see the dark-clad man beside you lower the binoculars from his face. The moon high above you shines on the smooth painted surface of a red star that has been mounted on the side \nof a building. There are two layers of fences between you and that building, the first of many in the closed city of Sevastopol - a heart of research and industry that is under tight lock and \nkey of the Soviet secret police. Of all the places to break into, this is by far the worst you can imagine. However, breaking in will not be the main problem. Like with all security in \nthe Soviet Union, getting in will never be the problem, but getting back out will. You've seen it in Berlin, you've heard the horror stories from the infamous gulags, you've experienced it \nbefore in Estonia. If you cannot get back out again you're in for a long and extremely uncomfortable sit-down with particularly nasty Soviet enforcers, and that will either end with you talking or \nyou disappearing. Usually both.\n\nAlready you're having second thoughts about this mission. Grigori did end up admitting that he was delivering diamonds to the port in Sevastopol, where he hands them over to a different contact \neach time. Apparently they are stockpiled for a while before being loaded up, but now your mission has become to find out what kind of ships the diamonds are being smuggled out on, and how the \nsmuggling is happening, since there has been no trace of the diamonds being found. You take in a deep breath of the cool night air.\n\n\"Can you see the Brits?\" you ask, peering down to the clear border fencing around the city, unable to see anyone except a lone sentry and the bright-glowing end of his cigarette.\n\n\"No, but I have a feeling they will be just fine without us babysitting them,\" your partner in crime tells you with a quiet chuckle, stowing away the binoculars and picking up his pack of \nequipment. \"We have to move.\"\n*page_break\nYou grab your pack and sling it over your shoulder, running crouched after the man you know as Remi Boulanger, a fellow French agent who has been tasked with getting you through this \noperation alive. After all, the change of scenery from being mainly stationed in Africa with the occasional excursion into Europe to a full operation in Crimea has been very abrupt for all \ninvolved. You think back to the mission in Africa, the assassination of Sèkou Marcine, and the briefcase you had recovered from his car in the aftermath. Inside had been documents and items \nthat led you on the trail of a large-scale smuggling operation of diamonds from the depths of the Soviet Union and into the west. Inside had also been a pouch of rough diamonds of a quality \nto rival the main sources you knew of in South Africa.\n\nThroughout the past few years you had been involved with every step of the investigation and had ruled out any involvement of the de Beers mining conglomerate that held practical monopoly on diamonds, \nso clearly it is not an effort to work with de Beers but rather an attempt to tap into the black market.A route for this smuggling had been shut down in Finland only four months prior, and leads from \nthat operation led you on the trail of a much greater operation in the Mediterranean. Somehow the Soviets were getting diamonds through the Bosporus without anyone's knowledge and the biggest port \nwhere they could achieve something like that is right here in Sevastopol. \n\nYou reach the fence and crouch back down, watching as Remi pulls out a pair of beefy wire cutters so the two of you can get to work. You look at the cutter in your hand and frown, shaking your head. \nSometimes you wish you lived in a world with laser-equipped watches that could cut a hole in the fence in seconds.\n*page_break\nThe metal fence rattles as you finally pass through a few minutes later, gaining access into the closed city. You see the shine of a light in the distance and pat your comrade on the shoulder to \nhurry him up, running with him to the large building you saw earlier with the Red Star mounted on the wall. There's no sound of shouting, so you must have gotten in without being noticed, \nbut you bring up your Welrod pistol and prepare yourself.\n\nYou see the round spot of light on the ground, swaying back and forth with the steps of what sounds like a guard guessing by the heavy steps. Both you and Remi freeze in place as the soldier \nin green stops almost right next to you, scanning the outside of the fence with his flashlight for a moment before continuing along. It's hard to see any insignia on him, but by the AK-47 \nslung over his shoulder and the silhouette of a Soviet uniform you can guess that this is an MVD soldier guarding the perimeter of Sevastopol.\n\nHe turns to look up towards where he was coming from, then where he's going, then pauses again to sweep through with his flashlight once more.\n*choice\n\t#Shoot him.\n\t\t*set flashlight true\n\t\t*set welrod -1\n\t\t*set covert -5\n\t\tYou place your hand on Remi's shoulder to press him against the wall, making sure he does not get in your way as you raise your pistol and take aim through the small sight picture, \n\t\tsmall balls of radiant green glowing on each little prong to make it more usable at night. The sights hover exactly over the head of the guard and you slowly begin squeezing the \n\t\ttrigger.\n\t\t\n\t\t*if (combat >= 30)\n\t\t\t*set kills +1\n\t\t\tAt this range it's nigh impossible to miss your target. You feel the kick in the internally silenced pistol but hear near to no sound escape it, the thud of the guard collapsing \n\t\t\tto the ground actually louder than the gunshot. Remi gives you an approving tap on the shoulder with his palm and hurries to the guard who now lies silent and still on the ground.\n\t\t\t\n\t\t\t\"I guess we're inside now. Quick, fetch his flashlight and turn it off, I'll drag the body out of sight,\" Remi tells you and hooks an arm around the corpse, shuffling back into \n\t\t\tthe shadows.\n\t\t\t\n\t\t\tYou rush out into the open and snatch the flashlight off the ground, thumbing the switch off before jumping back into the shadows with Remi. It appears that you remain unnoticed. \n\t\t\tPerfect. Meanwhile Remi has just managed to drag the guard's body around the corner and has opened a large container meant for garbage. You have to help with the guard just a bit, \n\t\t\tbut the two of you manage to get him inside and close the lid quietly. Remi heaves a sigh of relief and looks at you with a smirk.\n\t\t\t\n\t\t\t\"The port should be in this direction, but we can't go too far or we'll hit the naval base, and that's the last place we want to get close to tonight. Remember, all we need to do \n\t\t\tis find the Harbourmaster's office and find any records of civilian ships docking here.\"\n\t\t\t*goto inthecity\n\t\t*else\n\t\t\tYou would imagine that at this kind of range it is impossible to hit a target such as a full-grown man. You would be right.\n\t\t\t\n\t\t\tExcept somehow you still manage to miss. Although Remi succeeds in the struggle not to smack his head with his palm, he does give you a look of grave and deep disappointment. \n\t\t\tThe noise of the pistol in your hand is barely noticeable, but both of you suddenly jump into action as you see the guard turning towards you to investigate the muffled thwip \n\t\t\tof the Welrod. Your instinct is to press against the wall as flush as you're able, since reloading the weapon would involve cycling the bolt manually. Remi on the other hand \n\t\t\thas already unleashed his knife on the poor guard.\n\t\t\t\n\t\t\tThe guard goes down gurgling and with a muffled scream as Remi drives the knife into his throat and chest, one quick stab after another to finish the guard off. Even from the \n\t\t\tawkward angle you can see the guard is trying desperately to bite Remi's hand and the two are playing a cat and mouse game between the appendage and mouth. Somehow with the \n\t\t\tvery last seconds left in his life you can see Remi flinch and grit his teeth, stifling a scream of his own as the guard finally manages to clamp his jaw down.\n\t\t\t\n\t\t\tThere are no words, but you can see Remi motion towards the still lit flashlight and then at you. While your partner begins to drag the guard into the shadows you rush out \n\t\t\tinto the open and grab the flashlight, instantly thumbing it off before slinking back. Remi has just managed to drag the guard's body around the corner and has opened a large \n\t\t\tcontainer meant for garbage. You have to help with the guard just a bit, but the two of you manage to get him inside and close the lid quietly. Remi heaves a sigh of relief \n\t\t\tand looks at you with a scowl, bringing one hand to the other to massage a fairly nasty bite mark. With gritted teeth your fellow agent disregards the wound and continues on \n\t\t\tthe mission.\n\t\t\t\n\t\t\t\"The port should be in this direction, but we can't go too far or we'll hit the naval base, and that's the last place we want to get close to tonight. Remember, all we need to do \n\t\t\tis find the Harbourmaster's office and find any records of civilian ships docking here.\"\n\t\t\t*goto inthecity\n\t#Strangle him.\n\t\t*set covert -5\n\t\t*set flashlight true\n\t\tYou slide your hand down and make sure your Welrod is safely holstered before you place your other hand up on Remi's shoulder and give him the nod. He catches on quick and nods back, \n\t\twaiting for you to take the initiative. And so you do. With steady quiet steps you approach the guard from behind, reach out with your hands, then strike in one quick motion to bring \n\t\tyour arm over the guard's mouth to keep him silent and to tilt his head back while the other squirms underneath his chin and begins squeezing.\n\t\t\n\t\t*if (combat > 30)\n\t\t\tThe guard squirms against you and opens his mouth in a muffled scream, but you press your other arm against his throat and feel his protestations weaken considerably. As you feel \n\t\t\this entire body begin to tense and squirm while his lungs work to try and get any air into them, you feel him suddenly shut his jaw and bite onto your arm. The pain is excruciating \n\t\t\tand you can feel the hard teeth sink in even through the layers of clothes you are wearing, but you muffle your own scream against the guard's shoulder.\n\t\t\t\n\t\t\tStrangling someone is always a gruesome act, and you feel the point approaching where you can either let go and leave the guard unconscious and facing a horrendous ache all \n\t\t\tover his body the next morning, or you can keep going until the guard will never prove another problem. While the choice itself is quickly made, you take a moment to look over \n\t\t\tthe insignia on his uniform to confirm that he is indeed part of MVD - the infamous Soviet police that run the gulags and successors to NKVD who in turn are rumoured to have committed \n\t\t\tmore horrendous acts than even the Nazi Einsatzgruppen during the war.\n\t\t\t\n\t\t\tYou feel the struggle against you end as the guard becomes unconscious. The time to choose is now.\n\t\t\t*choice\n\t\t\t\t#Finish him.\n\t\t\t\t\t*set kills +1\n\t\t\t\t\tThe guard slumps in your arms and you can finally release the man's mouth, taking the arm that had fresh bite marks on it and hooking it around the arms strangling the \n\t\t\t\t\tSoviet, bringing your hold as tight as you are able to muster. His body begins to thrash against you as it clings to what life it has left, then finally goes completely \n\t\t\t\t\tstill. Remi rushes to you and grabs the guard's flashlight, thumbing it off before reaching down to grab his legs.\n\t\t\t\t\t\n\t\t\t\t\t\"Come, there is a container back there for thrash, we can put him in there,\" your partner says and guides you to shuffle backwards. \"Good work.\"\n\t\t\t\t\t\n\t\t\t\t\tThe two of you manage to drag the body back to the dumpster without issue, lifting up the large top with a quiet creak before hoisting the guard in and closing it again. \n\t\t\t\t\tYou breathe a heavy sigh as the adrenaline rush begins to wane and your pulse normalizes, the struggle is over. Remi is there again, placing a hand on your shoulder and \n\t\t\t\t\tguiding you to turn your attention further into the city.\n\t\t\t\t\t\n\t\t\t\t\t\"The port should be that way, but we can't go too far or we'll hit the naval base, and that's the last place we want to get close to tonight. Remember, all we need to do \n\t\t\t\t\tis find the Harbourmaster's office and find any records of civilian ships docking here.\"\n\t\t\t\t\t*goto inthecity\n\t\t\t\t#Let him go.\n\t\t\t\t\tThe guard slumps in your arms and you loosen your grip over his mouth, pulling away the arm with fresh bite marks on it. You make sure that the man is unconscious before \n\t\t\t\t\tfinally loosening your hold around his neck, motioning for Remi to come help you. He rushes over to you and grabs the guard's flashlight, thumbing it off before reaching \n\t\t\t\t\tdown to grab his legs.\n\t\t\t\t\t\n\t\t\t\t\t\"You left him alive?\" your partner asks with a hiss and shakes his head, then guides you to shuffle backwards. \"Well, there is a container back there for thrash, we can \n\t\t\t\t\tput him in there to sleep this off.\"\n\t\t\t\t\t\n\t\t\t\t\tThe two of you manage to drag the Soviet back to the dumpster without issue, lifting up the large top with a quiet creak before hoisting the guard in and closing it again. \n\t\t\t\t\tYou breathe a heavy sigh as the adrenaline rush begins to wane and your pulse normalizes, the struggle is over. Remi is there again, placing a hand on your shoulder and \n\t\t\t\t\tguiding you to turn your attention further into the city.\n\t\t\t\t\t\n\t\t\t\t\t\"The port should be that way, but we can't go too far or we'll hit the naval base, and that's the last place we want to get close to tonight. Remember, all we need to do \n\t\t\t\t\tis find the Harbourmaster's office and find any records of civilian ships docking here.\"\n\t\t\t\t\t*goto inthecity\n\t\t*else\n\t\t\tThe guard squirms against you and opens his mouth in a muffled scream, but you press your other arm against his throat and feel his protestations weaken considerably. As you feel \n\t\t\this entire body begin to tense and squirm while his lungs work to try and get any air into them, you feel him suddenly shut his jaw and bite onto your arm. The pain is excruciating \n\t\t\tand you can feel the hard teeth sink in even through the layers of clothes you are wearing, but you muffle your own scream against the guard's shoulder.\n\t\t\t\n\t\t\tStrangling someone is always a gruesome act and very physical. The guard keep squirming against you, bites your arm again, and suddenly you feel him twist around and escape \n\t\t\tyour chokehold. Even so, you still have him held in place fortunately, although he is gasping for air hurriedly, trying to slam his elbows into your sides to get away. You're \n\t\t\tnot quite sure where he comes from since he is just suddenly there, but you see Remi take advantage of you keeping the guard still and takes out his knife.\n\t\t\t\n\t\t\tYou can feel the vibrations in the guard's neck and the gurgles coming out as Remi's knife slices deep into the Soviet's throat, your partner giving you only a quick nod as \n\t\t\tcourtesy before the sharp blade cuts the artery and a sudden spray of blood shoots out of him. While you are still holding the guard to make sure he dies without alerting \n\t\t\tany patrols that might be close enough to hear him, Remi grabs his feet and pushes gently to guide you to move backwards towards the shadows.\n\t\t\t\n\t\t\tThe two of you manage to drag the body back to the dumpster without issue, lifting up the large top with a quiet creak before hoisting the guard in and closing it again. \n\t\t\tYou breathe a heavy sigh as the adrenaline rush begins to wane and your pulse normalizes, the struggle is over. Remi is there again, placing a hand on your shoulder and \n\t\t\tguiding you to turn your attention further into the city.\n\t\t\t\n\t\t\t\"That could have gone better,\" he says and lets out a deep sigh with a bit of a chuckle mixed in. \"The port should be that way, but we can't go too far or we'll hit the naval \n\t\t\tbase, and that's the last place we want to get close to tonight. Remember, all we need to do is find the Harbourmaster's office and find any records of civilian ships docking here.\"\n\t\t\t*goto inthecity\n\t#Try to sneak away.\n\t\t*set covert +5\n\t\tThe guard lingers. You bring your hand up to Remi's shoulder and tap a couple of times, indicating that you should keep going despite the guard, and by the nod your partner gives \n\t\tyou it appears that he agrees with you. The steps you take are quiet and careful, leading you slowly but surely further and further away. As you are just about to turn the corner \n\t\tand be completely out of line of sight from the guard, he decides to continue on his merry way as well, never looking behind him and towards you.\n\t\t\n\t\tRemi pats your shoulder and finally lets out a deep sigh of relief as you come around the corner into a little courtyard between several buildings.\n\t\t\n\t\t\"Ah, that was good luck,\" he says quietly and turns to peer past you towards the heart of the city. \"The port should be that way, but we can't go too far or we'll hit the naval \n\t\tbase, and that's the last place we want to get close to tonight. Remember, all we need to do is find the Harbourmaster's office and find any records of civilian ships docking here.\"\n\t\t*goto inthecity\n\t#Wait patiently.\n\t\t*set covert +5\n\t\tYou wait patiently exactly where you are, resting your hand on Remi's shoulder to make sure neither of you does anything rash. You can feel how your breath is a bit ragged and \n\t\tkeeps catching, your heart pounding in your chest as the two of you wait for the guard to make his move. The beam of light travels across exactly where you cut through the fence, \n\t\tpauses for the briefest of moments, then continues.\n\t\t\n\t\tYou can see a grin on Remi's face when the guard takes a few quick steps away from you, continuing on his way and pointing the flashlight straight ahead. As those heavy steps \n\t\tdisappear into the distance Remi pats your shoulder and finally lets out a deep sigh of relief at the same time as your caught breath releases.\n\t\t\n\t\t\"Ah, that was far too close but we're in,\" he says quietly and turns to peer past you towards the heart of the city. \"The port should be that way, but we can't go too far or we'll \n\t\thit the naval base, and that's the last place we want to get close to tonight. Remember, all we need to do is find the Harbourmaster's office and find any records of civilian ships \n\t\tdocking here.\"\n\t\t*goto inthecity\n\n\n*label inthecity\n*page_break\nYou skip across one quiet street lit by dull orange lights after another, all of the buildings around you markedly similar as if they have all been made out of the same concrete mould. In \nfact, aside from the posters of Lenin and Stalin, there are little differences from one building to the next. That includes the row after row of uniform Moskviches parked in front of them. \nFinally the concrete maze gives way for the breeze coming in from the Black Sea and Remi heaves yet another sigh of relief. Another hurdle overcome with little to no problems.\n\nYou look over the bay below you, a steep slope leading down to the port from the hilltop you are standing on right now. Once more Remi pulls out his binoculars and takes in the lay of the \nland, pointing out ahead with one hand.\n\n\"This is it. There, I think that is the harbourmaster - the small building near the fuel or gas towers, whatever those silos are\" Remi says and lowers the binoculars, giving them to you so you \ncan have a look. \"If the Brits have the right information patrols are on twenty minute passes, leaving plenty of space for us to get in and find the information we need about who is stopping \nhere to load up diamonds.\"\n\nThe hillside is completely open on the descent. There are a few watchtowers further away where the naval base begins, but the merchant port here is only guarded by a fence with razor wire \nacross the top. As with the city border itself, once more you do an awkward crouch-run to the fence and prepare the wire cutters. One snip after another creates a hole large enough for \nRemi and yourself to pass through, this time without a second fence to hinder you further.\n*page_break\nThe harbourmaster's office is a small building of little note, but unfortunately also large windows meant for overseeing the port - which also means that any patrols will see lights and \npeople inside the office while you rummage around for files. \n*if (flashlight)\n\tYou still have the flashlight from the guard, which will make your effort a fair bit easier. \nRemi stands beside you as you crouch down and pick the simple lock on the door.\n\n\"Remind me again, do you speak Russian?\"\n\n*choice\n\t#\"Not fluently.\"\n\t\t\"Well, I suppose that would have been too much to hope for,\" Remi says and clears his throat quietly. \"One of us must keep watch and if guards arrive, and make sure they don't become \n\t\talarmed. I suppose that task will fall to me then. Head inside and try to find anything you can, I'll stay by the door and keep watch.\"\n\t\t\n\t\tWith a curt nod you move inside while Remi remains just inside the door, leaving it open just enough for him to peek through. Meanwhile you push on inside and round a pair of \n\t\tfairly rickety desks standing in your way, behind them a full wall of filing cabinets assembled in an alphabetical order. Well, there's plenty of files to look through - enough \n\t\tthat you'll spend an entire night looking through them if you want to go methodically. Perhaps it is time to trust in luck and the highly valued skill of skimming.\n\t\t\n\t\tIn your mind's eye you separate this wall of filing cabinets into six sections to help you focus your search. Then you pick a section to start with.\n\t\t\n\t\t*goto sectioned\n\t#\"I can pass myself off as a native in most cases.\"\n\t\t\"Good, that's far better than I had hoped,\" Remi says with a grin. \"Alright, one of us must keep watch here in case guards notice movement in the office, and make sure they don't \n\t\tbecome alarmed. If you know Russian to that decree, the obvious choice is you. So stay by the door and keep watch while I try and find anything useful.\"\n\t\t\n\t\tWith a curt nod you let Remi pass by and head into the back of the office while you take a nice spot right inside the doorway, leaving the door open just a crack so you are able to \n\t\thear what is going on outside and have at least a little bit of a line of sight as well. You crouch down and lean against the wall, waiting while you hear your partner pull open \n\t\tcreaking and whining drawers of the filing cabinets set against the back wall.\n\t\t\n\t\t*if (rng > 10)\n\t\t\t*set infodump true\n\t\t\tOne drawer after another opens and then closes as Remi goes through them. You glance back and see him going at seemingly random through the drawers, flicking quickly through the \n\t\t\tpapers to see if he can see any familiar names in the mix before continuing on to the next one. Of all the people in the agency you would trust Remi to know the most of the \n\t\t\tdealings going on in this part of the Soviet Union - hence it's an excellent bet that he will find something despite his chaotic method.\n\t\t\t\n\t\t\tYou see the blink of flashlights in the far distance as a patrol begins the journey around the perimeter and inevitable towards you. You hear the echoes of a single bark of a \n\t\t\tdog excited to get to work, but at the same time also the sound of a bundle of files being placed on one of the tables in the office.\n\t\t\t\n\t\t\t\"You were in the Finland operation, yes?\" Remi asks you suddenly in a hushed voice. \"There was a man involved named Lund if I remember correctly in the memo.\"\n\t\t\t\n\t\t\t\"Yes, he was involved in the smuggling operation but we ended up downplaying his role after he turned in all the information of his contacts behind the Iron Curtain,\" you inform \n\t\t\tyour partner who hums quietly. \"Why?\"\n\t\t\t\n\t\t\t\"I found records here. It says 'Lund Shipping, Aurora' on it and it's sealed with red cord. Do you think your man was involved down here as well?\"\n\t\t\t\n\t\t\t\"It's possible. It would certainly explain why he was so willing to give us all his information and cut ties in the north. I was not aware that he had his own shipping company, \n\t\t\thowever.\"\n\t\t\t\n\t\t\t\"Well, I suppose this will be the lead we have been looking for. I need to make sure, so keep an eye out for guards.\"\n\t\t\t\n\t\t\t\"I see a patrol, we don't have too much time left,\" you inform Remi who gives you a simple nod and gets back to work, untying the cord and working to quickly thumb through the \n\t\t\tdocuments.\n\t\t\t*page_break\n\t\t\t\"I have it!\" Remi exclaims with a hushed voice, but you silence him quickly with a shush.\n\t\t\t\n\t\t\tYou peer out of the small crack left in the doorway and see the points of light rounding behind the tall and wide cylinder-shaped structures between the harbourmaster's office \n\t\t\tand the water. The patrol is close but heading for the shore right now, giving you a window of opportunity to leave if you have what you came here for. Your partner is quick to \n\t\t\tcover his tracks and put the rest of the paperwork back into the drawers and shut it, then rush to you and crouch beside the door.\n\t\t\t\n\t\t\t\"I have it, ${name}. It's a much bigger operation than we thought,\" your partner tells you and once more you stop him.\n\t\t\t\n\t\t\t\"I hope the Brits found what they came here for, because we need to get away while we can,\" you tell him and open the door, pointing out towards where the patrol is going now.\n\t\t\t\n\t\t\t\"Well, very well. It can wait until we are out of the city.\"\n\t\t\t\n\t\t\t*goto goodluck\n\t\t*else\n\t\t\tOne drawer after another opens and then closes as Remi goes through them. You glance back and see him going at seemingly random through the drawers, flicking quickly through the \n\t\t\tpapers to see if he can see any familiar names in the mix before continuing on to the next one. Of all the people in the agency you would trust Remi to know the most of the \n\t\t\tdealings going on in this part of the Soviet Union - hence it's an excellent bet that he will find something despite his chaotic method.\n\t\t\t\n\t\t\tYou see the blink of flashlights in the far distance as a patrol begins the journey around the perimeter and inevitable towards you. You hear the echoes of a single bark of a \n\t\t\tdog excited to get to work, but at the same time also the sound of a bundle of files being placed on one of the tables in the office. Behind you a drawer slams shut a little \n\t\t\ttoo loud for comfort, and Remi lets out an exasperated sigh.\n\t\t\t\n\t\t\t\"There's nothing here, just ferries and cargo ships!\" Remi exclaims in a hushed voice, then goes to another part of this wall of filing cabinets.\n\t\t\t\n\t\t\t*goto oneifbyland\n\n\n*label sectioned\n*if (tick > 2)\n\t*goto twoifbysea\n*else\n\t*hide_reuse\n\t*choice\n\t\t#Upper left.\n\t\t\t*set tick +1\n\t\t\tYou open a drawer and flip through the folders, skimming through the words marked on each bundle. The names are all Russian as far as you can see - fishing vessels, tankers, \n\t\t\tcargo ships, nothing of value to your investigation. \n\t\t\t\n\t\t\t*goto itsnouse\n\t\t#Upper centre.\n\t\t\t*set tick +1\n\t\t\tYou rummage through the drawers of this file cabinet in a hurry, noting how the few folders placed inside hold nothing that might out of the ordinary for a large port behind \n\t\t\tthe heavy Iron Curtain. The records are of cargo vessels, relatively small ones at that, many of them offloading supplies from Bulgaria and Georgia. These vessels do not venture \n\t\t\tfar enough to be used for smuggling diamonds past the Turkish straits.\n\t\t\t\n\t\t\t*goto itsnouse\n\t\t#Upper right.\n\t\t\t*set tick +1\n\t\t\tWere it not for the fact that the West has already recovered the plans for the Moskva-class of helicopter carriers, you might have been pleased with finding this particular \n\t\t\tfile cabinet. While it is mostly empty and the insides have gathered a fair bit of dust, the folder detailing the refuelling process for the ships is for some reason hidden \n\t\t\taway in the drawer. Perhaps it was once refuelled on the side of the civilian port and hence the harbourmaster was given such information, and ten years prior such information \n\t\t\twould have granted you a certain instant promotion.\n\t\t\t\n\t\t\tBut right now it is not useful to you in the slightest.\n\t\t\t\n\t\t\t*goto itsnouse\n\t\t#Lower left.\n\t\t\t*set tick +1\n\t\t\tYou crouch down and open this particularly well-worn drawer on the filing cabinet, flicking through the folders within quickly. They're ferries. All of them. Ferries crossing \n\t\t\taround behind the Iron Curtain, never even getting close to Turkey. That means none of these can be used for smuggling, since the diamonds are journeying out into the West and \n\t\t\tinto Africa.\n\t\t\t\n\t\t\t*goto itsnouse\n\t\t#Lower centre.\n\t\t\t*if (tick = 0)\n\t\t\t\t*achieve firsttry\n\t\t\t*set infodump true\n\t\t\t*goto thatstheone\n\t\t#Lower right.\n\t\t\t*set tick +1\n\t\t\tYou open this section of the filing cabinets with a quick motion and a squeal that indicates these files have not been accessed for a long while indeed. As would be indicated by \n\t\t\tthe particularly nasty sound, all the files inside are several years old. There is nothing of use for you here.\n\t\t\t\n\t\t\t*goto itsnouse\n\n\n*label itsnouse\n*if (tick = 2)\n\tThis is useless. You're not finding anything that would be of any use to the investigation into the Soviet diamonds or the smuggling operation necessary to flood the third world.\n\t*goto sectioned\n*elseif (tick = 1)\n\tAnother wrong set of drawers, another moment lost to meaningless names on useless documents.\n\t*goto sectioned\n*else\n\t*goto sectioned\n\n\n*label thatstheone\n*set tick +1\nThe metal file cabinet creaks and rattles as you grab a handle and pull, revealing a drawer stocked absolutely to the brim with folders neatly mapped and bundled together. You flick \nthrough it with your fingers, skimming through the labels as fast as you can while still taking the time to understand what they say and try to place them in your mind to anything \nyou might have heard of before.\n\nThen you hit payday. A heavy bundle of manila folders wrapped with red cord and labelled \"Lund Shipping, Aurora\" in cyrillic alphabet. While aside from the red cord the bundle seems \nvery normal with little of note, it is the name that strikes you as familiar. The operation that had shut down a smuggling operation from Estonia into Finland had uncovered the name \nof the man responsible: Ingemar Lund. By all rights he is a rich entrepreneur that has business ties all across Scandinavia and Finland, and his involvement was largely buried due \nto him voluntarily turning over as much information as he had on the Soviets he was conducting business with. If he is in fact operating still through the Black Sea, you can imagine \nthat your agency shutting down his northern operation was of little concern to him.\n\nYou take the bundle of folders out and place it on one of the desks, untying the cord around the bundle and opening a folder to go through it further. \n*if (flashlight)\n\tYou cover the end of the flashlight with your hand to dissipate and dull the brightness, then switch it on so you can see better. The light shines through your hand with a slightly \n\tred glow, painting the page with just enough of its shine to make the words easier to read.\n\t\n\t*goto readywordy\n*else\n\tIt's difficult to make out what the papers say without a good source of light, but you cannot endanger the task at hand by turning on the office lights. Even a cigarette lighter \n\tor a match would be far too bright for the task, and the flickering of the flame would only attract attention to the motion. So, with no other recourse, you move closer to the \n\twindow and use the moonlight as best you can.\n\t\n\t*goto readywordy\n\n*label readywordy\n*page_break\nYou flip through document after document, poring over them to try and find anything that might indicate that this is the paperwork you are indeed looking for. There are no details, \nno mention of diamonds, nothing that would directly link Lund and the smuggling operation - except that the same ship is stopping in Sevastopol every week. That should be impossible. \nBy the records it is an old cargo ship, incapable of moving cargo that fast. You take the bundle of papers into your hand and collect them into a pile, tying them back together \nwith that same red string.\n\nYou rush to Remi who is waiting by the door and tap him on the shoulder. He puts a hand up and halts you, then points out through the crack in the doorway, pointing out a pair \nof lights moving in the distance.\n\n\"You have something?\" Remi asks in a hushed voice after he's sure you've spotted the patrol.\n\n\"Yes, a connection to the smuggling ring in the north that we shut down. There is something fishy about the ship involved,\" you inform him and receive a quiet nod in reply.\n\n\"The details can wait. We need to move before the patrol gets close.\"\n\n*goto goodluck\n\n\n*label oneifbyland\n*comment MC watching the door, patrol arrives.\n*set patrolled true\nYou start hearing the two men on patrol, chatting quietly in Russian while they make their way along their route. You see the dog lean its head down as it smells something, then lets out \na lone low bark. The guards pull the dog along since it hasn't gone crazy over the scent, but it will be impossible to hide in the office with the dog on alert. You hiss at Remi to warn \nhim about the closing patrol. As you do, the dog's ears perk up and it stops.\n\n*label lantern\n*hide_reuse\n*choice\n\t#Go out and try to bluff the guards.\n\t\t*set charm +5\n\t\tSlowly you slide up to your feet and for a brief moment take in a deep breath to steady yourself. You glance at Remi who has pushed up against one of the tables and crouched down, \n\t\treaching for his pistol, getting ready to offer you support in case things go south. Then you open the door. \n\t\t*if (combat > talking)\n\t\t\tYou know, for a very brief second you have the horrid feeling that perhaps pulling out your pistol would have been a better route to go down, but at this point it is far too late \n\t\t\tto change your mind.\n\t\t\n\t\tThe dog with the patrol starts barking like mad and pulling at the leash connecting it to one of the guards. You act shocked and push against the door as if in surprise, closing it \n\t\tjust in case. The guard not busy holding a dog quickly grabs his AK-47 and brings it up, ready to load it if you prove to be hostile.\n\t\t\n\t\t\"[i]Halt! Identify yourself![/i]\"\n\t\t\n\t\tYou raise up your hands and stop, showing yourself as no threat to the patrol.\n\t\t\n\t\t*if (talking > 50)\n\t\t\t\"Hey, hey, calm down. I thought I would get out before I would prove any trouble for you,\" you start in Russian. \"Either of you have a light?\"\n\t\t\t\n\t\t\t\"What are you doing here? Identify yourself?\"\n\t\t\t\n\t\t\t\"I work here. Well, during the day at least. I forgot my glasses and thought I left them behind, but I couldn't find them in the break room, so I came here to see if they were \n\t\t\tin the office. Now, do you have a light or not?\"\n\t\t\t\n\t\t\tThe guards still look hesitant about you but the dog has mellowed a little bit. The armed guard standing closer to you lowers the sights of his gun to the ground and squints \n\t\t\tthrough the darkness. fortunately for you, as you can see from the insignia on the uniforms, these are not MVD soldiers, but Militsiya - although why they would be patrolling the port \n\t\t\tis anyone's guess. Even so you can be happy about the coincidence, since the MVD would already be dragging you to be interrogated as a spy.\n\t\t\t\n\t\t\t\"Come on, do me this one favour, please. It's been a hell of a day, Comrades,\" you continue, laying it on a bit thick.\n\t\t\t\n\t\t\tThe guards look at one another as if trying to feel out if either of them have a bad feeling about you or not, but before they can turn back to you there is a sudden flash behind \n\t\t\tthem. You see a burst of fire in the direction of the naval base, then hear the crack of an explosion ring through the air. It's less the shockwave that sends you reeling, and more \n\t\t\tthe surprise of it - although you know very well that it's likely the work of the Brits.\n\t\t\t\n\t\t\tThe guards immediately jump to action. Strangely enough, their first response is not to detain you, but to run in the direction of the explosion. As they run away from you and the \n\t\t\tharbourmaster's office, you slip back inside the small building and nod at Remi.\n\t\t\t\n\t\t\t\"We need to move, quickly,\" you tell your partner as you close the door behind you and rush to the filing cabinets to help him look for anything of value.\n\t\t\t*goto patrolyum\n\t\t*else\n\t\t\t\"[i]Identify yourself![/i]\"\n\t\t\t\n\t\t\t\"Hey, hey, calm down,\" you say, switching to Russian and trying to stall for time so you can come up with some way to distract them, although it seems the guards are not biting.\n\t\t\t\n\t\t\t\"On your knees! Right now! Hands above your head!\"\n\t\t\t\n\t\t\t\"Calm down, comrades, I was just here to...\"\n\t\t\t\n\t\t\t\"Shut up! On your knees!\"\n\t\t\t\n\t\t\t\"Who are you? What are you doing here?\"\n\t\t\t\n\t\t\tYou can only imagine what Remi is doing inside as he hears you being detained - then a sudden flash attracts your attention. You see a burst of fire in the direction of the naval base, \n\t\t\tthen hear the crack of an explosion ring through the air. It's less the shockwave that sends you reeling, and more the surprise of it - although you know very well that it's likely the \n\t\t\twork of the Brits.\n\t\t\t\n\t\t\tThe guards immediately jump to action. Strangely enough, their first response is to stop with detaining you and run in the direction of the explosion. As they run away from you and the \n\t\t\tharbourmaster's office, you slip back inside the small building and nod at Remi who has been creeping towards the door with his pistol at the ready.\n\t\t\t\n\t\t\t\"We need to move, quickly,\" you tell your partner as you close the door behind you and rush to the filing cabinets to help him look for anything of value.\n\t\t\t*goto patrolyum\n\t#Ready your pistol.\n\t\t*set charm -5\n\t\t*set kills +1\n\t\tYou look over at Remi and pull out your Welrod, cycling the bolt to make sure you have a loaded weapon in hand. \n\t\t*if (welrod \u003c 4)\n\t\t\tAs you pull back on the bolt the ejector snaps the old casing out of the firearm, your hand moving quickly to catch the small brass object to save you from it ringing against \n\t\t\tthe ground. You catch it just in time, fortunately. \n\t\tAt this point Remi has also prepared his Welrod pistol, steadying himself against one of the tables so that he is ready to fire as soon as the door opens. The guards continue \n\t\tapproaching the door, the man holding the dog's leash sticking back while the one more heavily armed takes the few hesitant steps up to the door.\n\t\t\n\t\t\"[i]It's open,[/i]\" you hear the guard say on the other side of the door, followed quickly by the telltale clack of an AK being loaded.\n\t\t\n\t\t*if (combat \u003c talking)\n\t\t\tYou know, for a very brief second you have the horrid feeling that perhaps pulling out your pistol would have been a better route to go down, but at this point it is far too late \n\t\t\tto change your mind. \n\t\tThe guard nudges the door with his AK, the column of light breaking in through the opening widening until it paints everything up to the first table, leaving in shadow only your little \n\t\tcorner. The dog keeps barking and pulling at the leash, then suddenly goes silent.\n\t\t\n\t\tThe entire port is suddenly bathed in a bright flash. The echo of a blast on the naval base reaches you with a sudden crack through the air, drawing attention away from you for \n\t\ta moment. The door is now fully open, but the guards are looking at a column of fire and smoke reaching high into the sky beyond buildings and heavily guarded fencing. Remi is \n\t\tfirst to react in the sudden moment of chaos, squeezing the trigger and bringing the guard right next to you crashing inside with a bullet in his face. While he is still moving \n\t\tinside, you round our into the doorway and shoot at the other guard, who collapses and lets slip the dog.\n\t\t*page_break\n\t\t*set welrod -2\n\t\t*set kills +1\n\t\tThe guard dog rushes straight for you, snarling and barking, teeth ready to tear you to shreds. But as it bounces up to land on you, Remi fires again. You see a sudden burst of \n\t\tred mist escape the dog, quickly cycle your own pistol, then fire another shot into the dog. It lands on you and instantly collapses, bouncing off and into the office, breathing \n\t\tits last breath before landing.\n\t\t\n\t\t\"We need to move! Come help me, we need to find anything in here,\" Remi calls out to you, turning back to the filing cabinets and opening another drawer to rummage through.\n\t\t\n\t\t*goto patrolyum\n\t#Wait and see what happens.\n\t\t*set covert +5\n\t\tThe dog catches a scent again as the patrol walks closer. This time it lets out an excited bark and sniffs some more, then rushes to pull against the leash in your direction. \n\t\tThe guards, although at first confused by the sudden reaction to the scent, now follow the dog's lead with the dog handler holding a pistol and the fellow with him an AK-47. \n\t\tYou've been busted, but you still have some time to prepare before the guards get close enough to notice the door is partially open.\n\t\t\n\t\t*goto lantern\n\n\n\n\n*label twoifbysea\n*comment MC searching, patrol arrives.\n*set patrolled true\nYou hear Remi hiss from the doorway to catch your attention. You hear the low huff of a dog catching a scent, then a pair of men speaking. The patrol. You're too late to make \nan escape, and the dog will certainly be one to spoil any attempt at hiding in the office. You crouch down behind one of the tables and take your welrod out, cycling the bolt to \nmake sure it's loaded. \n*if (welrod \u003c 4)\n\tAs you pull back on the bolt the ejector snaps the old casing out of the firearm, your hand moving quickly to catch the small brass object to save you from it ringing against \n\tthe ground. You catch it just in time, fortunately. \n\nYour partner shows you his hand to tell you to stay back, then stands up right next to the door. With a deep breath and a final nod to you, he opens the door and walks out, closing \nthe door behind him to make sure you won't be seen. However, you can hear him walk casually down the steps outside and towards the approaching guards. The dog with them goes crazy, \nbarking and growling at Remi. You hear one of the guards order him to halt and identify himself.\n\n\"Dobryy vecher, tovarishchi!\" you hear Remi exclaim and then lower his voice, talking to the guard.\n\nYou have no idea what they are talking about, but it seems that Remi manages to relax them well enough. You see a flicker of light against the windowframe, just big enough to belong to perhaps \na match or cigarette lighter but no larger than that. There's a chuckle from behind the door, the dog has stopped barking. Then suddenly there's another flash of light, this time against the \nskyline. Through the window you see a burst of fire from the direction of the naval base. You hear heavy footsteps sprinting away from the office, then the door opens and Remi slips inside.\n\n\"We need to move, quickly,\" your partner tells you and rushes straight past you to the filing cabinets to look for anything of value.\n*goto patrolyum\n\n\n*label patrolyum\n*comment escape after the Brits detonate.\n*page_break\nYou hear the wail of sirens echoing off the hills surrounding the port area - the sounds of a closed city making itself doubly closed from all passage. There's not much time and you rush \nthrough document after document with Remi doing the same beside you. Suddenly he stops and pulls out a large bundle of documents.\n\n\"You were in the Finland operation, yes?\" Remi asks you suddenly in a hushed voice. \"There was a man involved named Lund if I remember correctly in the memo.\"\n\n\"Yes, he was involved in the smuggling operation but we ended up downplaying his role after he turned in all the information of his contacts behind the Iron Curtain,\" you inform \nyour partner who hums quietly. \"Why?\"\n\n\"I found records here. It says 'Lund Shipping, Aurora' on it and it's sealed with red cord. Do you think your man was involved down here as well?\"\n\n\"It's possible. It would certainly explain why he was so willing to give us all his information and cut ties in the north. I was not aware that he had his own shipping company, \nhowever.\"\n\n\"Well, I suppose this will be the lead we have been looking for. I need to make sure, so keep an eye out for guards.\"\n\n\"I see a patrol, we don't have too much time left,\" you inform Remi who gives you a simple nod and gets back to work, untying the cord and working to quickly thumb through the \ndocuments.\n\n\"I have it!\" Remi exclaims with a hushed voice, but you silence him quickly with a shush. \"We need to move.\"\n\nYour partner is quick to cover his tracks and put the rest of the paperwork back into the drawers and shut it, then rush out to the door, waiting for you to be with him. The entire \ncity will be on alert, so you will need to either be even more careful in how you make your escape, or lose any semblance of this being a covert action. Both of you rush out of \nthe office and down towards the fence you had cut through, making your way out of the port just as the red and blue lights of a police car pass by on top of the hill that you first descended \nfrom.\n\n*choice\n\t#Steal a car and make a run for it through the checkpoint.\n\t\t*set covert -5\n\t\t*set car true\n\t\tThe two of you hurry up the hillside and cross the street curving along the crest, then sneak in between the high concrete buildings. There are lights turning on in some of the \n\t\twindows as the sirens join the explosion in disrupting the night, although no people hurry to the streets. You can see figures silhouetted against the windows, however, and feel \n\t\tas if they are all watching you as you slink through the shadows. You stop Remi once you reach the rows of parked Moskviches, guiding him to one of the cars.\n\t\t\n\t\tYou try the doorhandle and feel it catch, then hear a pop as something inside the door unlatches and allows it to open freely. Of course it's unlocked. Your luck is beginning to \n\t\tturn. You turn to glance at Remi, \n\t\t*if (driving \u003c 50)\n\t\t\tthen step away from the driver's seat and rush around to the passenger side. You know the car and by extension you both, will be in far safer hands if you allow your partner \n\t\t\tto drive. The first thing Remi does is look around for keys, searching through the usual places where one might store them, then lets out a disappointed sigh. No keys, it seems. \n\t\t\tRemi loses patience at the search and leans down below the dashboard, pulling out his knife so he can hotwire this very usual Soviet machine. Only a very brief moment later you \n\t\t\tsee sparks fly, smell the ozone of electricity arcing between wires, then hear the worble of the engine kicking and screaming into life. Making sure both doors are closed and \n\t\t\tthe handbrake is disengaged, Remi gives you a quick wink - then you're off.\n\t\t\t*goto checkpoint\n\t\t*else\n\t\t\tthen give him a wink and sit down on the driver's seat. The first thing you do is look around for keys, searching through the usual places where one might store them, then let \n\t\t\tout a disappointed harumph. No keys. You lean down below the dashboard and reach down for the wires, pulling out your knife so you can cut a couple of them and hotwire this \n\t\t\tvery usual Soviet car.\n\t\t\t\n\t\t\t*if (technology \u003c 30)\n\t\t\t\tIt takes you far longer than it should to find the right wires. Eventually Remi loses patience as sirens are approaching and pulls you away so he can replace you. Only a \n\t\t\t\tvery brief moment later you see sparks fly, smell the ozone of electricity arcing between wires, then hear the worble of the engine kicking and screaming into life. Remi's \n\t\t\t\tsmile is intolerably smug as he sits back upright on his seat. You give him a grimacing smile, disengage the handbrake, then close your door so that you are ready to drive off.\n\t\t\t\t*goto checkpoint\n\t\t\t*else\n\t\t\t\tYou cut the wires with a quick tug of your sharp knife, then reach them together and see the sparks fly. You can smell the ozone of arcing electricity, then hear the worble \n\t\t\t\tof the engine kicking and screaming into life. You lean back, close your door, then disengage the handbrake so you can be off.\n\t\t\t\t*goto checkpoint\n\t#Sneak back the way you came and go through the fence.\n\t\t*set covert +5\n\t\tThe two of you hurry up the hillside and cross the street curving along the crest, then sneak in between the high concrete buildings. There are lights turning on in some of the \n\t\twindows as the sirens join the explosion in disrupting the night, although no people hurry to the streets. You can see figures silhouetted against the windows, however, and feel \n\t\tas if they are all watching you as you slink through the shadows.\n\t\t\n\t\tOnce more you cross the rows upon rows of Soviet cars, sneaking past buildings and through yards to remain away from the sirens and the sightlines of the nosy citizenry. When you get \n\t\tback in reach of the fence, however, things become far more difficult than before. You hear the squeal of tracks and feel the rumble of a heavy machine through the ground, meaning a \n\t\ttank is on the move - probably to reinforce the checkpoint. As you get closer to the fence and the location where you first hid from the passing guard, you start hearing the dogs and \n\t\tshouting of men assembling a tight cordon around the city.\n\t\t\n\t\tBut, fortunately for you, they have not quite yet been able to seal up the hole you have created. So, you and Remi make a desperate run for it, crawling through the hole in the fence, \n\t\tthen the second fence. Suddenly you hear a shout from behind and the loading of guns. With a loud clang a spotlight is turned on and the beam of light pointed at you and your partner, \n\t\tmaking your legs carry you faster towards the forest. Just in time you duck down in between the trees, hearing the puffing of bullets hitting the ground and the whine of ricocheting \n\t\tright above your heads.\n\t\t\n\t\tYour journey continues deeper, further away from the city.\n\t\t*goto thebritisharecoming\n\n\n\n\n*label checkpoint\nYou round the corner to the main road leading out of town, although a checkpoint stands between you and freedom still. As you drive closer, you begin feeling a rumbling through the ground, \nfollowed a loud squealing noise of tracks. It could signify only one thing: a tank.\n\nBoth you and Remi look at one another at the same time, probably with the very same facial expression of worry and fear etched in your faces. While they say many things about the survivability \nof Soviet cars, you doubt a Moskvich will not fare well against a T-54 or even the previous T-44. Looking at the flimsy metal doors and very thin windows, you doubt it would do very well against \neven a regular handgun.\n\nSo, since the city will likely be cordoned off an peaceful passage through the checkpoint will be out of the question, you are left with one choice - to ram through. Neither of you are very \nenthused about that prospect with a tank around, but waiting around would be even more dangerous. The MVD would not abhor to seal the city and go door-to-door if they had to in order to find \nwhoever was responsible for the explosion.\n\nAnd that is how you find yourselves careening straight into a Soviet checkpoint in a rickety feeling stolen car. A side-street passes by and you see the T-54 staring straight at you for a \nfraction of a second, then you're already blasting past. The engine of the Moskvich squeals as if in pain, you hear the MVD guards turn and load their weapons, commanding you to stop. Obviously \nyou don't. Both of you duck at the same time just before the red and white gate of the checkpoint. The AKs begin to sing as the guards fire at your car, the barrier smashes into the front of \nthe car and splinters into a hundred pieces, at the same time smashing the windshield as well as pushing the frame around it a good distance towards you.\n\nIt's a good thing you ducked, because you're both still in good health as you careen down the road and into the forest while bullets pepper your tailpipe.\n*goto thebritisharecoming\n\n\n\n\n*label goodluck\n*comment Either watching, patrol does not notice.\n*page_break\nThe two of you make your escape, closing the office door on your way out before rushing back towards the fence where you cut through. You can hear the dog barking in the distance behind \nyou, but by the time the dog might get your scent, you have scurried through the port fence and are clambering up the hillside from which you first descended to it. Your shadows are painted \nagainst the high grassy knoll by moonlight and the reflections of the port floodlights.\n\nThe two of you hurry up the hillside and across the street curving along the crest, then sneak in between the high concrete buildings. Everything is quiet. Almost eerily so. You rush silently \npast those same rows upon rows of Moskviches, then cross a yard in between the tall concrete boxes, followed by another road and another yard. Aside from your footsteps echoing coldly off the \nconcrete looming all around you, there is little sound in the city.\n\nThen as you reach the same spot where you had first hidden from the MVD guard, within sight of the double-fence and the holes on it leading out of the city, you feel the earth shift. The tremors \necho through the solid ground beneath your feet for only a split second, then you turn and see the sky behind you light up in a dull orange-red. It takes a moment still until the sound of an \nexplosion hits you with a dull echoing ringing that has been dissipated by the maze of concrete between you and the port. Although the explosion comes as a surprise, you can immediately guess \nthe culprit: the Brits.\n*page_break\nThe shouting of guards begins straight away. This far out, the guards are not concerned of rushing over to help - they are concerned with sealing the city as fast as possible. Sirens bellow and \nwhine somewhere behind you, heavy footsteps echo off the buildings, and in the chaos you and Remi rush for the fence.\n\nYou crawl through the same holes you entered the city through, scrambling to your feet as soon as you are able while a dog begins to bark somewhere behind you. Remi launches to his feet as \nhe emerges from the hole in the fence and taps you on the back to guide you into a run. The both of you cross the wide-open area between the fence and the forest, hearing a few shouts from behind, \nalthough as you slide into the cover of the trees, there are no shots fired in your direction. Either you have gotten away scot free, or the guards are rushing to cut you off. Either or, you need \nto keep moving.\n\nYour journey continues deeper, further away from the city.\n\n*label thebritisharecoming\n*comment Meeting the Brits outside the city\n*page_break\n*if (car)\n\t*achieve goloud\n\tYour headlights flicker with each bump in the road, the crash with the boom at the checkpoint apparently strong enough to create problems with the wiring of the car. As you round a bend in \n\tthe heart of the forest, you see two lightshafts emerge from the side of the road. At first your reaction is to flinch and think about driving off the road or perhaps speed up, expecting it \n\tto be the Militsiya. But as your Moskvich trundles ever onward you can see that it isn't the iconic Volga of the Militsiya, but the small truck that you arrived in from Feodosia in.\n\t\n\tWith screeching brakes you come to an abrupt halt and the truck drives onto the road, turning so those bright headlights are pointed the way you were going in the first place. A figure leans \n\tout through the passenger side window and you hear a voice as if that of a saving angel call out to you.\n\t\n\t\"[i]Get in![/i]\"\n\t\n\tIt's the British.\n\t*goto endscene\n*else\n\tThe forest is eerily quiet aside from the snapping of twigs and rustle of shrubbery as you walk through, trying to avoid the branches spreading across your path. It takes you near to ten \n\tminutes to walk back to where you had been dropped off in a small truck, but as you get to the little clearing on the side of the road there is nobody waiting for you there. However, in \n\tthe distance you see light shining through the forest. There is a bend in the road in that direction, so it could very well be the Militsiya waiting for anyone coming along the road. But \n\tit's still worth investigating.\n\t\n\tAs you break through the cover of the forest you see that instead of a Militsiya Volga parked on the side of the road, it's the truck. The engine roars to life and pulls the vehicle out to \n\tthe road as you and Remi walk forwards, those bright headlights now pointed in the direction of Feodosia. A figure leans out through the passenger side window and you hear a voice as if that \n\tof a saving angel call out to you.\n\t\n\t\"[i]Get in![/i]\"\n\t\n\tIt's the British.\n\t*goto endscene\n\n\n*label endscene\n*if ((covert > 55) and (infodump = \"true\"))\n\t*achieve ghost\n*page_break\nClimbing into the cramped truck you remain silent for now. The explosion will have gained all of you the kind of attention that you should not have as effective spies, and the tension in the truck \ncabin could be cut with a knife.\n\n\"What were you thinking?\" Remi finally goes and blurts out, looking at your British colleagues demandingly.\n\n\"We have our orders, you have yours. This was a joint task for the sake of convenience and good faith, not because we were supposed to act as a unit,\" Marion, the female spy who never speaks in \nFrench, tells Remi while brushing aside the confrontational tone of voice.\n\n\"I hope you at least had a good reason for such a fireball,\" Remi continues and glances your way, obviously fuming at being caught off guard by who are supposed to be allies.\n\n\"Yes,\" Marion's partner and the current driver, David McDonnell, steps in and continues his partner's lead in English. \"And you found everything you were looking for?\"\n\n\"Yes, I believe we did,\" Remi states and then leans back in his seat, closing his eyes for a moment to calm himself down as the truck wobbles and continues down the lonely road to the more open city \nof Feodosia.\n*finish Chapter 3: The Cross of Feodosia\n\n", "cross": "*comment 10166\n\n*temp rng 0\n*temp masked false\n*temp trip \"work trip\"\n*temp right false\n\n*rand rng 1 20\n\n\nYou take in a deep breath as you walk along the streets of Feodosia, walking past a group of apartment buildings, beside them a low one-story building with a large fenced-off playground beside \nit. For a moment you pause to look at the group of children running around and playing without a care in the world underneath the overbearing shadow of a Soviet star mounted atop the building. \nThe teachers are standing by the door, one of them smoking while they make sure the children do not get up to anything they shouldn't. Your presence catches their eye and both women look your \nway for a moment to make sure you aren't creeping around or anything.\n\nWith the raucous giggling of the children still ringing in your ears you turn and continue on the street down towards a little diner. The whole place is a dreary grey, the furnishings modest, \nthe wall mounted with a chalkboard menu and a row of soviet heroes in full dress uniform.\n\nAs you are enjoying a small modest breakfast with a particularly cheap tasting and bitter cup of coffee to chase it down with, you hear the door open with a jingle of the bell attached above \nit. This new arrival walk past your table and places a folded newspaper on the corner of your table, the section of the page in front of you having Cyrillic letters underlined in order to make \nup an address. It's finally time for a debrief with the section chief.\n\nAfter paying for your food you take the newspaper with you and walk out, heading down towards the heart of the quaint little holiday town and the address for your meeting place.\n*page_break\nAntoine Mercier, the section chief that you and Remi are subordinated to, rubs his brow in exasperation while thinking about the details of the British mission. This is the first time you have met \nyour superior directly, although Remi appears very comfortable around him despite the slightly cool atmosphere of the room at the moment. The Brits are present as well, showing your chief a \ndevice they discovered at the naval yard while you were rummaging around for documents and a connection to the West.\n\n\"Then what is it?\" Mercier asks, motioning towards the device and sidestepping the issue of the explosion.\n\n\"It's a magnet,\" Marion states in her oh so friendly tone of voice that sends chills down your spine.\n\n\"Specifically it appears to be an electromagnet,\" David steps in and brushes past his partner. \"There is a receiver inside the waterproofed casing which is tuned for short-range radio signals. \nWe tested the frequency and it seems like a specific signal causes the magnet to disengage, although it must be first engaged manually when attaching to something.\"\n\n\"It follow the same principle as limpet mines, then?\" Chief Mercier states and rubs a thumb along his chin.\n\n\"To a degree, yes, although it does not appear these are meant for explosives. They could be, although these clips on the shell of the device would indicate something else needs to be strapped to \nit. There's far too much give on them to make it useful for a shaped charge to be attached,\" David answers and shrugs. \"We will need to get this to London, and they can pick it apart.\"\n\n\"Good. I will put the wheels in motion for us to be kept in the loop. Thank you,\" your section chief dismissed your British colleagues and waits until they are out of the room before \nopening the package of documents you and Remi recovered. \"If my gut is to be believed, those magnets are involved with the jewels. I will contact you as soon as I know how. For now, return to \nyour safehouses and take some time to relax. You've both certainly earned it.\"\n*page_break Two Days Later.\nYou are roused from your sleep by the ringing of your phone. The sharp high-pitched bell keeps filling your small apartment and quite possibly the four neighbouring apartments around yours \nas well - the walls are thin enough for it. You crawl out of bed and groan as you walk to the wall-mounted phone, noting that it is still dark outside before you pick up the receiver and \nbring it to your ear. You groan an answer into the phone and lean yourself against the wall with your elbow while bringing your hand up to rub your eyes.\n\nOn the other end there is silence for a brief moment, working quickly to alert you from your sleep. Then Remi's voice.\n\n\"Komsomol's'kyi park.\"\n\nThe line goes dead. Something must be wrong, there's no reason for you to meet unless things had gone south, but at the same time it can't be too bad since he wants to meet instead of relaying \nan alert to get out while you can.\n*page_break\nThe sun is just rising above the horizon as you tug your long coat tighter around you, sheltering from the cold morning dew. Nobody has arrived in the park and you've been slowly roaming \naround for perhaps an hour and a half already. People are starting to arrive in the park on their daily commutes to work, or to enjoy a nice morning walk. An older gentleman is seated on one \nof the park benches with the local morning paper, reading through the middle pages as you pass. For a moment you pause and glance at the front page, noting a news about a car crash the \nprevious night with one casualty - a Caucasian man in his mid-forties of unconfirmed nationality.\n\nAs you continue on your way, you see another man standing in place some distance away, looking your way as if begging for your attention. During your walk you make sure to get closer to him \nand he begins to walk close behind you. From this distance you can see the sheen of a mask - one similar to the ones you have at your safehouse. He whispers over to you, and you hear Remi's \nvoice.\n\n\"We have a problem. Mercier was killed after he came to see me
