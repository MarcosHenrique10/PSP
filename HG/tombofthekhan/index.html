 voice --your mother's? It's so hard to tell-- whispers gently, warming your ear with its breath.\n*page_break \"[i]Trust me.[/i]\"\nWhat do you do?\n*choice\n  #You've come this far: what adventure lies beyond this narrow ledge? Time to throw your chips to the wind, and take the plunge. \n    *set wisdom -10\n    *set intelligence -15\n    *set bravery +20\n    *goto trustfall\n  #No.... something just doesn't seem quite right about all this. You can't put your finger on it, but there's definitely some missing piece of information you're not grasping here. It's best to sit tight until you can collect your wits and figure it out.\n    *set wisdom +5\n    *set intelligence +5\n    *set bravery -10\n    *goto hesitate\n*label hesitate\nYou take a deep breath, sucking dust particles older than the Magna Carta straight into your lungs. Tiny, sharp pains in your chest snap you out of your reverie:\n\nWhere are you? What just happened? What's happening now?\n\nSuddenly you remember: Jacy's disappeared. Or been replaced. Or possibly not; it could all be in your head. \n\nWhen you can't trust your own perceptions, who can you trust? You curse under your breath, hoping against hope that your situation somehow sorts itself out, without you having to do--\n\n\"$!{name}, now is time. Come. Come to me.\"\n*page_break Dammit.\nThe rough, gravelly voice doesn't inspire you with confidence. You peer into the deep darkness, stalling for time. A decision will have to be made, but it doesn't have to be right this second. It can wai--\n\n\"$!{name}, please. [i]Please[/i] come down. I don't think I can hold on any longer.\"\n\nThe sound of Jacy's normal --if somewhat shrill-- voice slaps you in the face like a ten-pound bag of ice. Is she really down there? Does she need help?\n*page_break Is she... alone?\nFeeling the warm, charred end of the rope, you make your decision. You know what must be done. Taking a deep breath, you steel your nerves and start to:\n*choice\n  #...descend down the slope, sliding down on your stomach, your ears perked up for any noise or change in the air, however imperceptible.\n    *set bravery +10\n    *set leadership +10\n    *set blasphemy -5\n    *goto trustfall\n  #...feel like this whole thing was a mistake from the start, and that you should just stay put until Jacy --or whatever-- shows herself. You're too exhausted to deal with this regardless; a little rest and perspective will do wonders for your situation.\n    *set bravery -15\n    *set wisdom +10\n    *goto chicken\n*label chicken\nYou stretch out as much as you can without sliding any further down the slope, enjoying the tiny little pops of your knuckles and joints. It's one of the small joys for an archaeologist, especially after hours crouched in some tiny underground passage.\n\n\"Show yourself, Jacy. I'm not coming down before then. So you can do what I say, or just sit and fester down there forever. Whatever, I've got plenty of time.\"\n\nYou grin and brace yourself mentally, wondering what odds Vegas would put on which voice you'll hear next. Will it be another weak and pitiful feminine plea from Jacy? Or a rock-throated, stone-gargling earth beast attempting to lure you to certain death? \n\nEither way, you're not moving. You're staying put right where you are, at least until more information comes to light. Acting without knowledge is just like batting blindfolded. You might hit something accidentally, but 99% of the rest of the time, you're just blindly flailing around while looking like a complete imbecile. Rash decisions are for--\n*page_break A strange sensation in your stomach stops your train of thought.\nYou look down, and through your favorite Banana Republic shirt, you can see things... [i]glowing[/i]. Long, squirmy, worm-like things, bunched together like a ball of yarn.\n\nYou cry out as an intense, sharp pain stabs your stomach. Then another stings you on the lower right side of your abdomen, then another just under your ribcage. Within a breath, your entire lower body is wracked with pain, as the phosphorescent tubes try to burrow out of your skin.\n\nYour belly distends, farther and farther and farther, until it is nearly triple its normal size. The pain is unbearable, like thousands of bullets slamming into your skin from the inside of your body. The glowing tubes grow in size, pushing against each other under your skin and forming a writhing, slithering, pulsating mass of luminous green, blue, and pink light.\n\nYour only wish is for death, but death never comes. Instead, the tubes finally break out of your engorged abdomen and spill out into the darkness below. \n\nWithin seconds, it's all over. You look down. Even in the darkness, somehow, you can still see: a thin cord of bone is all that exists between your lower ribs and your exposed, bleeding hips. \n\nYou try and laugh, but can only manage a tiny and pathetic wheezing. You let go.\n*achieve wormguts\n*goto_scene ending\n*label slopemonster\nYou trust Jacy. In a lifetime of archaeology, she's been your greatest find. Time and time again in previous digs, her judgement and good sense has trumped yours. \n\nSo you let go.\n\nThe clawed hand releases your ankle almost instantly. You exhale a sigh of relief, then grin.\n\nCrisis averted.\n\nYou barely flinch when the talons rip through both your pants and the skin around your groin, pulling away with your private bits as easily as you might grab a handful of M&Ms from a bowl. Glancing down, you feel a slight tickling sensation as hot fluid fills your socks and shoes.\n\nQuietly, you wonder when the pain will hit. Did the creature sever a nerve? Are you just in shock? Momentarily, you consider bracing for the inevitable wave, but then decide against it: \n\nWhy bother? You lost.\n\nAs the shroud covers your eyes, your only wish was to see what had done it, the thing, the creature that took your life. Blindness comes on too quickly, however --being denied that one simple thing would make your blood boil, if half of it weren't flowing freely down the side of a subterranean slope-- and then the wave of pain finally hits you. But only for a minute.\n*goto_scene ending\n*label noask\nYou wisely decide to zip your big yapper.\n\nSlowly, cautiously, you lower yourself down the slope to Jacy's ledge. Dull aches in your knees and just below your right shoulder blade make you wince, but after a few minutes you're able to reach the ledge and rest for a moment.\n\n\"C'mon, $!{name}, time's a-wastin'.\"\n\nWell... a short moment.\n\nWhile you stall for time to catch your breath, Jacy is already hard at work. She grabs your flashlight without asking, and carefully scans the edges of the pit until she finds what she's looking for.\n\n\"Ah, there it is. I knew it couldn't have landed far. Here, $!{name}, hold this, and keep the beam focused on that one spot. Don't shine it into the middle of the pit.\"\n\nShe hands you back the flashlight, guiding your hands to place the light on a near ledge, where you see her customized pink 16-inch Maglite, inscribed with the words [i]Welcome To Your Party[/i] in flowing cursive script along the shaft. If the two of you never make it out, you'll at least leave behind a hell of a find for the archaeologist coming behind you.\n\nJacy measures out some rope and begins to climb down to the lower ledge. A thick band of sweat down the back of her shirt indicates that she's probably just as tired as you, but doesn't want to show it.\n*page_break It's then that curiosity trumps your good judgement...\nDirectly disobeying your assistant's orders, you move the beam into the center of the pit. You realize the futility almost instantly: the darkness is just too deep for a simple flashlight to conquer. You'd have a better chance trying to illuminate the vast distances between the planets with a--\n\nA sharp slap snaps you to attention.\n\n\"WHAT DID I JUST TELL YOU?!? Do NOT. SHINE. THE. LIGHT. IN. TO. THE. PIT.\"\n\nYou bring the beam up to her face. She shrieks like a bat and covers her eyes as you momentarily blind her. In the confusion, you drop the flashlight.\n\nWhat's the big deal? Didn't you shine it down there just a minute ago? What does she know about this that she's not letting on?\n \nSuddenly, all light and sound are extinguished from the shaft.\n\nAnd that's when you notice something... a little [i]weird[/i].\n*page_break Far, far, below you, deep down in the pit --as if a million miles away-- something turns and looks back at you. \nYou can't tell what it is --in fact, it appears to the naked eye to be nothing more than a tiny pinpoint of light-- but you [i]know[/i] it wasn't aware of you until just now. You [i]know[/i] that the distance between it and yourself is unthinkably vast... just as you [i]know[/i] that the thing could reach across that span in the blink of an eye.\n\nDeep in the recesses of your mind, the part of your brain that allows you to live as a functioning adult tells you that you are staring down a bottomless subterranean shaft; but a different part of your brain, one that perhaps you won't consciously use but a handful of times in your life, is making a convincing argument that you are, in fact, looking [i]up[/i], into a night sky devoid of all but one, singular, menacing star.\n*page_break And that star appears to be coming closer...\nHave you been turned upside down? It's entirely possible to lose one's bearings in the twists and turns of the earth's underbelly. It wouldn't have been the first time in your career that you've ended rightside-up after a few too many bends and turns in a tunnel.\n\nBut even then, there was one constant that you could always rely on, even when your senses could not be trusted: gravity. And here, it seems gravity is pulling you down, down, deep into the bottomless pit. So there's no way you could be staring up into the night sky... regardless of how much it feels like you are doing [i]exactly that[/i].\n\nBut then again, what [i]is[/i] gravity? A relatively weak attraction pulling you into the center of the earth. But what if... a stronger pull was exerting itself on you right now --some colossal cosmic force, a nearby star, a previously-undiscovered planet-- or a being so utterly alien, a creature so impossibly--\n\nYou stop yourself mid-raving. There's better ways to find these things out than flights of idle fancy.\n\n\"Jacy? What [i]is[/i] that light down there? Is it... is it coming closer?\"\n\nSilence. You look over to where she just was.\n*page_break Jacy's gone.\n\"Jacy?\"\n\nYou hear a low grunt about a half-dozen feet below you. Without the flashlight, it's impossible to see exactly where it came from.\n\nOr what it is.\n\n\"Jacy? Is that... is that you?\"\n\nA soft murmuring bubbles up from beneath you. You rub your eyes and open them wide, trying to adjust to the dark, but nothing works.\n\n\"Listen... I, uh, I just have some questions. That thing --that light-- in the pit... well, what is it? And why is it getting closer?\"\n\nYour words are swallowed by the deep silence of the pit, broken up only by the faint murmuring. Not knowing what else to do, and without a flashlight to guide you, you stop and stare at the minuscule light at the center of the pit. \n\nThere's no question it's growing, and deep down in the long-unused portions of your reptilian DNA, you know that it's coming for you. \n*page_break That's when you realize where the murmuring is coming from...\nAs you stare at the tiny, growing point of light, you begin to see that it has a [i]pulse[/i]. Almost imperceptible at first, but the slight rising and falling of the murmuring coincides exactly with the light, like some galaxies-distant ephemeral drum. \n\nYour breathing quickens, your heart starts to race. You don't know how long you have until it arrives, but you know that it's not long enough. Did you wake it? Anger it with the flashlight? It doesn't seem possible; but then again, very little of what you've experienced down in this brutal tomb has made any logical sense. \n\nYour breathing is getting shallower as your lungs clench up; your chest feels like a large animal is sitting on it. A wave of nausea fills your stomach, disappears, then floods back again. Do you go back up to the circular chamber? Or down, closer to the approaching light? \n\nYou hesitate, not knowing which way to go, when you hear, over the low hum of the murmuring, a low-pitched, but oddly familiar female voice piercing the silence.\n*page_break \"$!{name}, come down. Follow me to safety.\"\nIt's getting harder and harder to breathe, and your head is starting to ache from the extreme lack of oxygen; even if you wanted to, it's no sure bet that you're physically capable of sliding down to wherever Jacy is.\n\nAgain, you hear the voice. This time, it sounds rough and gravelly, as if spoken by a wooden puppet or golem carved from riverbank mud.\n\n\"$!{name}. $!{name}. Come. Now.\"\n\nYou try and reply, but your heart feels like it's in your throat, choking off all air.\n*page_break \"Come, down. No chance.\"\nDo you:\n*choice\n  #Throw caution to the wind, and use your last shred of strength to slide down the slope towards what you hope is Jacy?\n    *set bravery +15\n    *set wisdom -15\n    *goto trustfall\n  #Stay put, hoping against hope that you can recover your senses and return your breathing to normal, before making any rash decisions?\n    *set bravery -10\n    *set wisdom +10\n    *goto hesitate\n*label trustfall\nYou feel a strong, peaceful feeling as you blindly scrabble down the slope to Jacy. \n\n[i]Whatever will be, will be. If it was meant to happen, there's no point in trying to stop it now.[/i]\n\n[i]Your fate is in Genghis' cold, dead hands now.[/i]\n\nYour feet strike a ledge far sooner than you'd expected. For that one moment, you stand perfectly still, not breathing, doing no actions of any kind.\n*page_break Something right next to you is panting heavily, however.\nYou turn to face what you hope is your assistant. The breathing is irregular, punctuated by light wheezes at erratic intervals. You feel its moist, hot breath on your face; the sensation of droplets of saliva against your skin remind you of the fetid jungles of Central America, specifically at the dig site where you first met Jacy so many moons ago.\n\nStrange that you should remember that, now.\n\nSomething grabs the back of your shirt and lifts you off the ledge. You feel yourself swoosh down the side of the pit, almost as if you were flying --or perhaps more like how a rabbit feels as a bird of prey soars back to its eyrie, clutching your shivering form-- until, after four or five seconds that feel like days, you land roughly on another ledge. \n\nTo your surprise, your bird of prey flicks on the flashlight.\n*page_break Before your eyes can adjust to the light...\n...you almost swear that you see Jacy right next to you. Except that it's not Jacy; not all of it, anyways. Her face looks like a waxen mask, stretched over a humanoid form composed entirely of deep shadow.\n\nYou close your eyes tightly against the glare. When you open them again, Jacy is studying the stone wall next to you, looking just as you've always known her.\n\n\"Did you just... carry me down here?\"\n\nJacy gives you a look as if you just asked the stupidest question in the world, and continues searching along the edge of the slope. Against your better judgement, you press the issue.\n\n\"Jacy, I need to know whether you just--\"\n\nWithout breaking her focus on the wall, she shushes you with a rude hand gesture.\n\n\"SHHH!! Zip it!\"\n\n\"Hey! I just need some--\"\n\nJacy suddenly shrieks, sending high-pitched banshee wails echoing across the pit.\n*page_break \"I've found it!! I'VE FOUND IT!!\"\n\"F-found what?\"\n\nJacy turns her wild eyes on you, like a beast startled by gunfire. For a breath, she doesn't recognize you, staring at your face as if you were some incomprehensible, alien deity. \n\n\"Jacy? Are... are you ok?\"\n\nA small line of drool beads down from the corner of her mouth. Her teeth appear much larger than you remember.\n\nSuddenly, her head snaps back slightly, and a familiar look returns to her eyes.\n\n\"$!{name}, you're here....? Ah, yes. [i]Yes[/i]. Of course.\"\n\n\"J-Jacy...? What's going on with... with you?\"\n\nThe excitement returns to her face, making her appear almost childlike.\n*page_break \"Here, $!{name}! It's right here!\"\nBefore you can respond, she shoulders you out of the way, and places her fingers in a small crevice in the stone. Muttering to herself, she feels around the crevice, tracing her fingers along its inside edge.\n\nThat's when you notice that the 'crevice' is actually just one small section of a vast, ten-foot high engraved spiral in the rock.\n\nYou've found it.\n\nThe Tomb of Genghis Khan.\n\nThe greatest discovery in archaeological history.\n\n*achieve chamber\n\nYour knees start to go weak with excitement...or maybe utter exhaustion. Your legs, unable to hold up your weight any longer, give out. \n*page_break You start to fall backward into the abyss...\n...when a strong, slightly feminine hand grabs your shoulder and shoves you face-first into the wall.\n\n\"Look alive there, $!{name}, we're not out of the woods yet.\"\n\nYou twist around to put your back against the stone, then slide down into a sitting position. Staring into the deep abyss, you see nothing but jet-black darkness, like peering into a part of space where the stars have all been devoured by some vast, ravenously hungry evil.\n\nJacy puts down the flashlight near your knees, and starts jostling and huffing in the dark. If only you knew what she did... why doesn't she tell you? Did she really lift you down the slope to this ledge? If not, how did you get here?\n\nOr... [i]did[/i] you get here?\n\n\"A-ha!\"\n\nWith a girlish grunt, Jacy finds what she's looking for in the darkness. You hear a metallic [i]click[/i], followed by a damp wooden [i]thud[/i], and finally the unmistakable sound of stone grinding against stone. Jacy scoops up the flashlight, shines it in your face, then points it toward the smooth, circular doorway cut into the middle of the spiral.\n\nJacy grasps your hand in hers.\n\n\"Are you ready?\"\n*set jacylvl3 true\n*gosub check_run_ad\n*finish\n\n*label check_run_ad\n*if not(shown_ad)\n  *advertisement\n  *set shown_ad true\n*return", "level3": "A sudden, violent shudder rips through your body as you step forward. Within a few seconds, every hair on your arms, legs and head is standing at full attention, your limbs jerking in violent spasms. \n\n[i]What's happening to me?[/i]\n\nThe walls around you have transformed into a pink, spongy substance, and appear to be pulsating along with your increasing heart rate. Ahead of you is a door, backlit with a purplish-black haze.\n\nYou bring your hands up to your face --harder than it sounds, as it feels like you're moving through thick sand, encountering resistance for every movement-- and are horrified to see them covered in dark red boils. You turn your hands around, watching in shock as they detach from your wrist and [i]schlopp[/i] to the floor, melting into a single pile of disgusting ooze.\n\nYou need to act. Fast.\n*page_break Closing your eyes, you crouch down to collect your hands before they seep into the stone floor, where the centuries-old dust will absorb them forever.\nThe pounding in the walls seems to slowly dissipate as you try and focus on the task at hand. You feel around the floor in front of you with the nubs of your wrists, but can't seem to find your hands. Disappointed, you open your eyes.\n\nTwo messy disturbances in the dust are all that mark your frantic search; that, and a trail of shoe-prints leading down the tunnel. Strangely, your hands seem to have re-attached themselves to your wrists. The festering boils have receded, too.\n\nAh. Fantastic. Something new to worry about.\n*set knowsaboutinsanity true\n*set INSANITY (((blasphemy*5) + (bravery + intelligence)) - (wisdom + leadership))\n\n[i]New statistic: [b]INSANITY[/b][/i]\n\n*if ianlvl3 = true\n  *goto ianlevel3\n*if goncharlvl3 = true\n  *goto sololevel3\n*if sololvl3 = true\n  *goto sololevel3\n*if jacylvl3 = true\n  *goto jacylevel3\n*else\n  *bug\n*label ianlevel3\nYou turn to Ian, who looks as if he's just barely escaped from the ninth circle of Hell.\n\n\"Did you-- did you feel that too?\"\n\nIan stares at you like a wild animal.\n*page_break \"I need to leave this place. I need to leave this place [i]right now[/i].\"\nYou grab his shoulders.\n\n\"Listen, Ian, just bear with me here. You can do this. We're almost done... we're almost out. Did you hear that door slam shut earlier? That's got to be an exit, right? They can't build these things without some way to get in and out, right? They can't just put an important tomb in, uh, some interdimensional space, right?\"\n\nThe two of you stare at each other in awkward silence.\n\n[i]... can they?[/i]\n\nYou should've chosen your words a little more carefully. After a moment of regret, you snap back to attention. Thinking in mystical, occult-esque terms never helped anybody solve anything. Time to get back to brass tacks.\n\nYou give Ian a little shove as you start marching down the tunnel.\n*page_break \"C'mon, let's do this thing.\"\nThe two of you creep down the tunnel towards the sound of the slamming door. Suddenly Ian stops and puts his hand on your arm.\n\n\"These tracks in the dust... we're not alone down here, are we?\"\n\n\"Let's just say that there might be as many as three people down here besides us: Jacy, Gonchar, and the ol' Khan himself. So best have that thing ready.\"\n\nIan stops and squints down the tunnel.\n\n\"I don't think I could shoot Jacy.\"\n\nYou almost choke. \"What the hell?! We're NOT... I just meant-- you know what? Nevermind. Just put that thing away before we end up hurting ourselves.\"\n\nIan nods, flips the safety back on, and tucks the weapon into his pants. You've seen movie and television action stars do this for decades, and quietly wonder to yourself how often it results in a self-inflicted gunshot wound to the genitals. Are actual holsters really so expensive?\n*page_break Before you can ask, you reach the door.\nIt's an imposing, beautifully-constructed architectural masterpiece. Composed of several tons of black marble, the door is nearly half as thick as it is wide, sporting a dizzying array of locks, levers, and gears designed to keep the door secured for all eternity. The dazzlingly intricate mechanics of the door are kept well-lubricated by an ingenious, Rube Goldberg-esque system of oil-recycling spouts and greasetraps. Gorgeous sigils from the far corners of the Mongol world empire line the outer rim of the door, each painstakingly carved by a master craftsman. Most impressively, the massive door rests on a single, perfectly-balanced hinge, similar to the most advanced modern vaults. It's an architectural masterpiece, and arguably the finest man-made object of its era.\n\nIt's also wide open.\n*page_break\nYou try and peer at what lies beyond the door, but everything is obscured by a purplish mist. You're also starting to feel that weird buzzing sensation you get right before the hallucinations take over.\n\nYou and Ian glance at each other.\n\n\"You first.\"\n\n\"I insist.\"\n\n\"Age before beauty.\"\n\n\"Misunderstood genius before drooling imbecility.\"\n\nWell, you can't argue with that. Do you:\n*choice\n  #Take the lead and go first, bravely throwing yourself to the wolves?\n    *set bravery +15\n    *set leadership +15\n    *set wisdom -5\n    *goto youfirst\n  #Let the man with the gun go first, wisely putting the weapon between the two of you and any potential danger?\n    *set bravery -10\n    *set leadership -10\n    *set wisdom +5\n    *goto ianfirst\n*label ianfirst\n\"You go ahead, Ian, and get ready to use that thing.\"\n\nIan is visibly shaken.\n\n\"$!{name}, I, uh...\"\n\nYou look into his eyes. You know what he's seeing. Ian's lips are quivering, his eyes blinking three times a second. He's terrified; possibly even more than yourself. \n\n\"Ian? Ian, are you still with me?\"\n\nIan stares right through you, as if trying to understand complex events occurring a million miles behind you.\n\n\"Ian? Ian, look at me! You're... you're just hallucinating. Ian!\"\n*page_break He pulls the gun and puts the barrel in your mouth.\nThis won't end well. Do you:\n*fake_choice\n  #Slowly put your hands above your head, avoiding any sudden moves?\n  #Slowly bring your hands up to the gun, getting ready to jerk it away when you get the chance?\n  #Slowly close your eyes, bracing yourself for an instant, painless end to all existence?\nThe smell of urine fills the cramped space of the tunnel. Not feeling particularly warm or wet down there, you glance down. \n\nA wide, wet stain spreads across Ian's pants.\n\nHe pulls back on the hammer.\n\n\"I'm not afraid of you.\"\n\nYou'd answer, were it not for the lethal cylinder of metal between your teeth.\n\nTears stream down his cheeks. \"I'm not afraid of you. I'm not afraid of anything.\"\n\nIan takes the gun out of your mouth...\n\n[i]Phew! Thank--[/i]\n\n... and puts it up to your forehead.\n*page_break \"I'm going to squeeze this now, and you're going to go away.\"\n*choice\n  #\"Ian, listen to me: it's me, $!{name}. I'm not whoever --whatever-- you think I am. Calm down, and put the gun away. Nobody here is going to hurt you.\"\n    *set bravery +5\n    *set intelligence +5\n    *goto ianlisten\n  #\"Go ahead and shoot me, you sorry sack of s--t. Let's see if you've got the guts.\"\n    *set bravery +15\n    *set wisdom -20\n    *goto ianguts\n  #\"Ian, you, uh... you pissed your pants.\"\n    *set leadership +5\n    *set wisdom +5\n    *goto ianpee\n*label ianlisten\nIan's hand starts shaking violently. Your words must be getting through to him.\n\n\"That's it, man, just calm down. Nobody needs to get shot today. I'm not going to hurt you, no one is. Just slowly put the gun down.\"\n\nA confused look spreads across his face. His pupils dilate farther than you'd thought human eyes could. If your life wasn't in immediate danger, you'd marvel at just how [i]cute[/i] those puppy-dog eyes are.\n\nHe slowly lowers his gun.\n\n\"Good. [i]Good[/i]. Now, just a little lower, and we're there. Good. Take a deep breath, Ian, just relax... relax, and put the gun away.\"\n\nIan brings the gun down to his waist and closes his eyes. \n\nYou did it! Now, you just need to--\n\nIan opens his eyes, points the gun at your face and pulls the trigger. Long-distant thunder rumbles above as you feel a heavy mallet smash in the back of your skull. Several years later, you see the blindingly white explosion of light. Finally.\n*goto_scene ending\n*label ianguts\nIan looks terrified, as if he's just been caught pleasuring himself in his parents' bedroom. \n\n\"Y-you can't speak to me like that.\"\n\nSeeing an opening, you decide to push your advantage.\n\n\"I can talk to you any way I want. What are you going to do about it? Shoot me? Be my guest, [i]compadre[/i].\"\n\nIan's pupils dilate, and he starts shaking. He stares off at a point on the wall behind you, and you make your move. Quickly, you duck your head to the side and push the point of the gun toward the ceiling. \n*page_break You brace yourself for the shot...\n...but the shot never comes. \n\nYou take a good look at your would-be murderer. Ian's eyes have returned to normal, or at least a lot closer to normal than they were a minute ago. He stuffs the gun into his pants and sits down.\n\n\"You... you aren't [i]him[/i].\"\n\nYou chuckle, inwardly relieved that the mortal danger has passed. For now.\n\n\"No, Ian, I don't suppose I am. Do you need a minute?\"\n\nHe grabs his head with both hands and starts to shake vigorously.\n\n\"Lemme get this s--t out first, then we can walk.\"\n\nYou stand over him for a minute, waiting for him to get his mind straight. No point in rushing into anything down here, not while one or both of you is not right in the head.\n\nAnd armed. \n*page_break You think you hear a small chuckle coming from the door...\nAfter a few minutes, Ian stands up, stares you in the face, and nods his head.\n\n\"Let's go, $!{name}. Time to make the discovery of a lifetime. Hopefully something that will put that glorified Taco Bell training center $!{school} on the map.\"\n\nYou laugh, glad to see Ian's once again in possession of his wits, at least for the time being. The two of you approach the door, cautiously, straining your ears for any sound coming from the other side.\n\nThe faint laughter you heard earlier is still etched on your mind. Do you:\n*fake_choice\n  #Tell Ian about it, hoping that the knowledge won't scare him off?\n  #Keep it to yourself, hoping that Ian's ignorance will give him the strength of mind to go first.\n\"Ian? I, uh...\"\n\nA steely glint reflects off Ian's eyes. He grins evilly, winks at you, then whips out his gun.\n\n\"COWABUNGAAAAAAAAAA!!!!\"\n \nIan rockets through the door like a ballistic missile.\n\n...and disappears through the doorway with a sickening [i]schllurpp[/i], followed by total silence. \n*page_break\nYou cautiously approach the door, listening for any sound of Ian or his fearless cavalry charge. \n\nNothing.\n\nAn arm's length away from the doorway now, you start to notice certain things. The purplish mist, for example, seems almost solid in appearance. The sigils inscribed around the surrounding frame are all a variation of the same word: [i]evil[/i].\n*page_break\nAs you get closer, the air itself within the doorway seems to congeal. You reach your hand out to touch it, and that's when you realize that what you thought was purplish mist is actually a slick, membranous substance. \n\nYou push on it, slightly, and feel it pulse beneath your fingertips. Bringing your face up to within two or three inches of the membrane, it appears to be riddled with dark, reddish-black veins.\n\nSuddenly, you hear a muffled gunshot from the other side. Then another. And then a third.\n\nThen... silence.\n\nWhat do you do?\n*choice\n  #Plunge through the eerie membranous material and rescue Ian, provided he was able to kill whatever he was firing at with three shots.\n    *set bravery +10\n    *set leadership +5\n    *set insanity +15\n    *goto mistdoor\n  #Stay put. You only heard three shots, and, assuming that revolver was loaded, Ian should have three more to go. Barging in there now might shock and bewilder the poor kid... or startle whatever hellbeast he was shooting at. \n    *set bravery -15\n    *set wisdom +5\n    *set insanity -5\n    *goto miststay\n*label miststay\nIt's too dangerous: no point risking your own life as well as Ian's. He's the one that's armed, he's the one that can defend himself far better than you can... not only that, but there's a strong possibility that when you stepped through that door, Ian might mistake you for whatever he was shooting at, and--\n\nA powerful pang of hunger stops your train of thought. You've been hungry many times before, but never like this. It's almost as if your stomach acids have finally gotten fed up with your irresponsible ways, and have begun devouring your intestines from the inside out.\n\nA sharp cramp in your abdomen causes you to double over in pain. You clutch helplessly at your stomach, feeling the almost sensual heat of the fluid streaming over your hands and arms.\n \nYou pull your arms into the beam of your flashlight. \n*page_break They're covered in blood.\n[i]Exactly whose blood is this?[/i]\n\nYou stare at the liquid crimson covering your hands for a breath, until another wave of excruciating pain ripples through your lower abdomen. You half-fall into a sitting position on the floor, your pants hitting the wide pool of fluid with a thick, syrupy [i]splash[/i].\n\nYou roll up the bottom of your shirt, which is soaked in blood, and quickly find the three small, spurting bloodsprings in your stomach. \n\nYou feel your heartbeat racing, out of control, pumping out blood at an unsustainable rate.\n\n[i]Three shots fired[/i].\n\nYou open your mouth to ask Ian what he was shooting at, but no sound comes out. As you slump back against the cold stone wall, you question whether it might have been better if you had never seen [i]Indiana Jones and the Temple of Doom[/i] as a kid... or if your parents had bought you a subscription to [i]Car and Driver[/i] magazine instead of [i]Archaeology Today[/i]...\n*goto_scene ending\n*label ianpee\nIan stares at you with the blank, uncomprehending eyes of a shark or a grizzly. You wonder if all traces of his humanity have left him, if the strange evil in this place has taken what he can never get back. You take a deep breath, and try again.\n\n\"Ian... I... I hope you brought another pair of pants.\"\n\nNo reaction. His face seems almost frozen now, a poorly-crafted clay mask incapable of human emotion. \n\n[i]One last shot[/i]\n*page_break \"I'd always hoped to avoid having the words 'urine-soaked' anywhere on my tombstone...\"\nSuddenly, a tiny flicker of life appears in Ian's eyes. His pupils start to focus, training on you, then the gun, then back onto you.\n\nHis entire body convulses. The gun clatters to the floor.\n\n\"Oh my god, $!{name}, I'm so sorry! I... I just--\"\n\nYou breathe a shallow sigh of relief. \n\n\"Oh! No no no no... Ian, my friend. It's no problem. Just keep that thing pointed away from us from now on, eh?\"\n\n\"Yeah, of course, of cou---ahh, s--t. I really did piss myself, didn't I?\"\n\n\"Maybe you just got a little too happy back there.\"\n\n\"I swear, this hardly ever happens. Once, maybe twice a week, tops.\"\n\n\"We'll bring a big box of adult diapers on our next dig. Just try to control yourself during the big press conference next week.\"\n\nThe two of you chuckle for a moment as Ian fruitlessly tries to use dust and dirt to dry out the obvious stain in the front of his pants. \n*page_break You think you hear a small chuckle coming from the door...\nIan, too busy with his personal grooming, doesn't seem to notice it, and you don't bring it up. After a few minutes, Ian stands up, stares you in the face, and nods his head.\n\n\"Let's go, $!{name}. Time to make the discovery of a lifetime. Hopefully something that will put that glorified Taco Bell training center $!{school} on the map.\"\n\nYou smile at him, glad to see Ian's once again in possession of his wits, at least for the time being. The two of you approach the door, cautiously, straining your ears for any sound coming from the other side.\n\nThe faint laughter you heard earlier is still etched on your mind. Do you:\n*fake_choice\n  #Tell Ian about it, hoping that the knowledge won't scare him off?\n  #Keep it to yourself, hoping that Ian's ignorance will give him the strength of mind to go first.\n\"Ian? I, uh...\"\n\nA steely glint reflects off Ian's eyes. He grins evilly, winks at you, then whips out his gun.\n\n\"COWABUNGAAAAAAAAAA!!!!\"\n \nIan rockets through the door like a ballistic missile.\n\n...and disappears through the doorway with a sickening [i]schllurpp[/i], followed by total silence. \n*page_break\nYou cautiously approach the door, listening for any sound of Ian or his fearless cavalry charge. \n\nNothing.\n\nAn arm's length away from the doorway now, you start to notice certain things. The purplish mist, for example, seems almost solid in appearance. The sigils inscribed around the surrounding frame are all a variation of the same word: [i]evil[/i].\n*page_break\nAs you get closer, the air itself within the doorway seems to congeal. You reach your hand out to touch it, and that's when you realize that what you thought was purplish mist is actually a slick, membranous substance. \n\nYou push on it, slightly, and feel it pulse beneath your fingertips. Bringing your face up to within two or three inches of the membrane, it appears to be riddled with dark, reddish-black veins.\n\nSuddenly, you hear a muffled gunshot from the other side. Then another. And then a third.\n\nThen... silence.\n\nWhat do you do?\n*choice\n  #Plunge through the eerie membranous material and rescue Ian, provided he was able to kill whatever he was firing at with three shots.\n    *set bravery +10\n    *set leadership +5\n    *set insanity +15\n    *goto mistdoor\n  #Stay put. You only heard three shots, and, assuming that revolver was loaded, Ian should have three more to go. Barging in there now might shock and bewilder the poor kid... or startle whatever hellbeast he was shooting at. \n    *set bravery -15\n    *set wisdom +5\n    *set insanity -5\n    *goto miststay\n*label mistdoor\nWith a running head start, you leap through the doorway. \n\nThe sensation is unlike anything you've ever felt before, as if you were jumping in to a large vat of warm yogurt. For a moment, you bask in its warm, comforting embrace.\n\nA breath later, a blast of Arctic-level air slaps you in the face. \n\nThe first thing you notice about your new surroundings is that you can now see your condensed breath, tiny puffs of white mist hovering in the wintry air. The second thing you notice is that this chamber --rough-hewn, vaguely elliptical, with no markings or decor of any kind on its dark red walls-- seems to be lit by some sort of bright red, photographic darkroom-esque light, the source of which eludes you. A deep, rhythmic [i]thum... thum... thum[/i] vibrates through the floor and walls and up on into your legs, making it difficult to stand straight. The doorway behind you looks much the same as it did from the other side.\n\nShivering, you turn your flashlight off and tuck it into your belt. There seems to be one door out of this chamber, with a membranous appearance similar to the one you just came through. As you cross the chamber towards the exit, it feels as if you're walking on a sponge, your shoes making a wet [i]schlish[/i] noise with every step. You're tempted to think this is another hallucination, but the growing moistness in your socks and the glacier-like temperature certainly feel real enough. \n\nAs you approach the other door, you notice something odd about the wall. A deep, rich, ruddy red from a distance, the texture of the wall seems to be... [i]moving[/i]. Getting a closer look, you peer at it closely, rub your eyes in disbelief, and look again.\n*page_break Veins. Thousands upon thousands of veins, trickling down the walls like a horde of blood-red centipedes.\nYou shudder violently, both from the cold and from the sickening revulsion in the pit of your stomach. The room jolts, knocking you into the two-inch thick slushy morass on the floor. Though you quickly bounce back to your feet, your hands --submerged in the sick fluid for less than half a second-- are now bright pink and burning. You blow on them to no avail; they don't get any cooler.\n\nYour feet, now that your shoes and socks are soaked through in the same foul liquid, are beginning to feel as if they're on fire now, too. Sharp, intense pinpricks of pain shoot through your hands and feet, simultaneously feverishly hot and ice cold.\n\nSuddenly a familiar voice drifts in from the exit door.\n*page_break \"...$!{name}.... $!{name}... come quickly, or I'll...\"\n\"Ian!!\"\n\nYou charge through the door, bursting into a much smaller chamber than before. The last one was comfortably larger than your first two apartments combined. This one, on the other hand, is just barely big enough for you, a prone Ian, and the completely nude form of Dr. Avery Gonchar.\n\n\"Ahhh, $!{name}, my all-time favorite archaeologist. How goes the dig? Turn up any pottery sherds or cat femurs?\"\n\nGonchar's blindingly white skin almost seems to glow in the eerie red half-light of the chamber. Large, neatly-cut, steak-like portions of his skin hang from his body in various places, most notably his thighs and chest. With his left hand, he absent-mindedly fondles a clean, rectangular cut flopping over his knee. \n*page_break In his right hand, spinning around his index finger, is Ian's revolver.\nIan curls into a ball at your feet, whimpering. You can't see his eyes, but you know he must be hallucinating again. \n\nOr thinking he's hallucinating: upon closer inspection, you now know where those shots were fired, and at whom: three tiny, bullet-sized holes pierce Gonchar's pasty white chest and abdomen. Strangely, you don't see any blood on either the bullet holes or the hanging strips of flesh. Gonchar himself doesn't even seem to notice them.\n\n\"So, Doctor. Avery. Are you going to shoot us both with that thing? Also: where the f--k are your pants?\"\n\nGonchar chuckles. \"What, this old thing? Less than useless down here. Where we're going, harmless trinkets like these will be nothing more than the primitive afterthought of a long-dead reptilian brain. As you see.\"\n*page_break Gonchar puts the barrel of the gun in his mouth and fires. \nYou cringe and close your eyes on instinct, but hear no shot. After a moment, you open your eyes again. Gonchar's face, sadly, is still intact.\n\n\"You see? Try it yourself. No more jarring than an insect clearing its throat.\"\n\nGonchar hands you the gun. It smells strongly of just having been fired --which would explain the number of holes in Gonchar's torso-- but upon closer inspection, you see that the safety is on.\n\nDid he know this when he put the gun in his mouth?\n\nYou flick the safety off. It's long past time for reckoning. \n\n\"This insect's weapon seems to have ventilated your insides well enough. Want to tell me a little more about that?\"\n\nGonchar dismissively waves a hand at Ian. \n\n\"Your friend here saw me and reacted as you might expect. We will leave him behind. He is of no use to anyone in about ten minutes. Ten minutes to the end of this world, and the beginning of a dream! But you-- you need to come with me. We are close, now... so close!!\"\n\nYou look down at Ian, who is whimpering and shivering in a ball on the floor. Admittedly, he does look pretty useless right now.\n\nGonchar traces your line of sight and smiles. \n*page_break \"We both know it to be true. Come with me, now, and leave this mortal prison forever.\"\nYou bring the gun up to his face.\n\n\"I don't like that sound of that. I don't like the sound of that at all.\"\n\nA strained look passes over Gonchar's features, if only for a fraction of a second. He blinks, then smiles at you with his eyes.\n\n\"Shoot me if you like. It makes no difference to me. Perhaps a week ago, in a different life, in a different system... perhaps then, it meant something. But not now. Not anymore.\"\n\n\"What the hell are you even talking about? What system? What is this place? How do we get out?\"\n\nGonchar laughs, a full-bodied laugh that sounds as if he's been gurgling with molten lava.\n\n\"We'll have plenty of time later to forget you ever asked these stupid questions. Come, now, or I leave you both to die in this hole.\"\n\nDo you:\n*choice\n  #Switch the safety on, put the gun in your belt, and follow him out of here?\n    *set bravery +5\n    *set wisdom +5\n    *set blasphemy +5\n    *goto gunbelt\n  #Pull the trigger and [i]shoot this motherf----r in the godd---ed face[/i].\n    *set bravery +5\n    *set insanity +10\n    *goto gunshoot\n*label gunshoot\nYou pull the trigger.\n\nAn explosion of light and sound blinds you. A shock of pain ripples through your upper chest and right shoulder blade. \n\nYou pull the trigger again. \n\nAnother explosion, another blast; this one knocks you flat against the wall. Indescribable pain wracks your chest, your throat, your lungs. You can no longer breathe.\n\nSlowly you slide down the wall, until you're slumped on the floor. Seconds without oxygen tick by. Your head is too heavy for your neck: craning, you see your lower body, covered in dark red ink, sitting placidly in a inch-deep puddle of blood. You reach for your chest, and feel the two wounds, one on either side of your sternum.\n\nDizzy, fading to black, you make one last effort. Focusing all of your willpower, you maneuver your palm and fingers so that the gun points up, up towards Gonchar's snivelling form. You can see his pale white feet, which haven't moved out of your narrowing cone of vision. You crane your neck up: Gonchar is staring down at you, looking at you like your first-grade teacher Miss Britton did so many decades ago, when you told her that because you couldn't draw the letter E, you had decided to give up any hope of ever writing the alphabet. It's a look of pity, an elder resigned to watching the utter stupidity of youth for what they know is not the last time.\n\nYou fire once more. A small black hole opens in his gut, just below the two fresh and bloodless holes in his chest. He barely flinches.\n\nAt the same time, a much larger, not nearly-as-bloodless chunk disappears from your stomach. You slump over onto the floor next to Ian. He, too, has been shot three times, his glassy, dead eyes locked in a confused stare for all eternity. The last thing you can feel is your bowels vacating into your blood-soaked pants. Your cone of vision turns to a single insignificant speck, then, to nothing at all.\n*achieve gutshot\n*goto_scene ending\n*label gunbelt\nCautiously, you lower the gun --never taking your eyes off of Gonchar-- and, safety on, tuck it into your belt. \n\nGonchar laughs.\n\n\"You must think yourself very frightening, holding that tidy little arrangement of powder and steel.\"\n\nYou brush him off. \"Everybody's scared of something, Gonch. [i]Especially[/i] you,\" you say, hoping that it's actually true, and not just tough-sounding bluster. \"Now would you mind finally giving me an explanation about this place? Perhaps... oh, I don't know... like pointing me to the exit?\"\n\nGonchar's grin fades. He flips a slice of skin back and forth over his knee, then nods his head to a small, almost camouflaged opening behind him. Just like the walls of these two chambers, this concealed door is a deep red, criss-crossed with veins.\n\nFor a split-second, you wonder what would happen if you pumped a bullet into that door. Would it bleed?\n\nYou quickly put that thought deep into the recesses of your mind. Gonchar turns, crouches down, and motions you through the door.\n\n\"Come now, enough millennia have been wasted. Our rewards await us on the other side of this meaty veil.\"\n\nYou cringe at his choice of words, then crouch down for a better look... and hear Ian wheeze. Keeping your eyes ahead, you shake him by the shoulder with one hand. \n\nNo response.\n\n\"C'mon, Gonch, help me out with Ian. We can't just leave him here, not like this.\"\n\nGonchar's nauseating sigh fills the chamber.\n*page_break \"So be it. I'm tired, frankly, of dragging your weak and listless corpse with me into godhood.\"\nWith that, he turns and crawls through the door. The strange portal seems to drag him in, head-first, with a disturbing [i]schluuupp[/i]. \n\nAnd, just like that, the only sound you hear is Ian's ragged breathing. \n\nYou look down at your friend. His face is ashen, his eyes wide open but staring off at nothing in particular. You poke him in the ribs, but get no response. After a few moments, you know it's time to make a decision. What do you do?\n*choice\n  #Stay down here with Ian for as long as it takes. He's your friend, godd--mit!! No archaeologist gets left behind!\n    *set wisdom +5\n    *set leadership +20\n    *set insanity -20\n    *goto takehim\n  #You know, there's just not all that much you can do for him down here. Not by yourself, at any rate. It's a risk, but it may be best to follow Gonchar through the portal, and see if you can find a way out of this mess, get help, and then come back for Ian as soon as is humanly possible.\n    *set wisdom +10\n    *set leadership +5\n    *set blasphemy +5\n    *goto leavehim\n  #Ian, schmian. Once Gonchar said the word 'godhood,' you already knew where your a-- was headed.\n    *set bravery +10\n    *set wisdom -10\n    *set leadership -20\n    *set blasphemy +20\n    *set insanity +40\n    *goto leavehim\n*label leavehim\nYou get down into a crouch and push through the opening. The door has the texture of a curtain made of raw cow tongue, and is tighter than you expected. With some effort, you separate the folds until the opening is large enough, and crawl through.\n\nOnce through, you emerge into a low tunnel not much taller than the portal itself. The purplish-brown walls, floor, and ceiling are in a constant state of motion, as if they were nothing more than the paper-thin veneer between you and a roiling swarm of billions of insects. \n\nThe constant motion makes it difficult for you to move, even on all fours, as you proceed slowly down the corridor. In addition to the vibrating walls, strange flashes of intense, white-hot light occasionally explode just outside the range of your peripheral vision, leaving you even more disoriented. \n\nYou press on. \n\nSoon the corridor takes a sharp turn to the left, then an even sharper turn back to the right. After a few minutes, the tunnel becomes nothing but a series of twists and turns at geometrically-impossible angles, leaving you with no sense of up, down, left, or right. Gravity seems to have abandoned this psychotic tunnel system completely, and you're just about to give up and head back when you see it: a glowing silver light coming from the end of the tunnel.\n*page_break\nRelieved, buoyed by the childlike sense of discovery that first inspired you to become an archaeologist, you scamper ahead and through what you hope is the final portal between you and the legendary resting place of Genghis Khan. There is no door here, just silver, glimmering light.\n\nYou crawl through and stand up. You're in a spherical chamber, its jet-black walls bare of decoration, with just a single large object in its center. That object is a vast, twenty-by-nine-foot pool of liquid mercury. \n\nA soft, silvery glow seems to emanate from just below the mirrored surface of the pool, which undulates like a thin sheet of oceanic silver, despite the lack of air currents inside the chamber. Beneath the waves of toxic liquid, you think you can just glimpse a hint of something bright and shiny in the exact center.\n*page_break Dr. Gonchar stands at the far end of the pool, an evil gleam in his eyes.\nThe reality-TV superstar archaeologist is clothed in nothing but blood. He seems to be mocking you, standing with his hand on his hip in a pose that can only be described as \"sassy.\" Your eyes flit between him and the alluring object just out of vision beneath the silver waves of the pool.\n\n\"Ahhhh.... $!{name}. So it's come to this. Frankly, I'm amazed you survived this long... perhaps I was wrong to doubt you, so many years ago, when you turned in that midterm paper on the nomad-city relationship of the Khwarzim Empire. If you had asked me then if could pick out one student most likely to end the human race, to free our species from its mortal prison and start conquering the vast spaces between the stars... I'm sad to say I wouldn't have picked you.\"\n\nYou start to circle around the pool, your fingers on the gun in your belt. You circle to the right, shielding the gun from his vision with the left side of your torso.\n\n\"No? Who would it have been?\"\n\nGonchar pauses. For a moment, he actually appears much as he did when he was your former T.A., so many years ago. He looks almost... human. You wonder if you will be able to do what you're about to do.\n*page_break \"If I had to pick one?\"\n\"Yes.\"\n\n\"Sheldon.\"\n\nYou stop dead in your tracks.\n\n[i]\"Sheldon?!?\"[/i]\n\nGonchar grins.\n\n\"I know he was a pompous, stubborn blowhard, but the kid had gumption.\"\n\nOf [i]course[/i] he would pick Sheldon over you. The kid that nobody liked. Always wore a white suit with a white fedora, and a pair of old B.K. Knights basketball shoes that were four sizes too big, with broken shoelaces of different lengths that used to bug the crap out of you. Spoke loudly and interrupted often. The last you heard of him was years ago, when he stalked you on MySpace to send you rants about an NFL/FBI conspiracy involving the cloning of star quarterbacks. \n\nIt could've been him, right here, inhaling four million times the lethal dose of mercury while plotting to commit capital murder. It could've been [i]Sheldon[/i].\n\nGonchar makes a move toward the pool. You pull the gun.\n*page_break \"F--k Sheldon.\"\nGonchar sees the revolver and stops. His grin melts away as his face contorts into full-on panic.\n\n\"Y-you're not g-going to take t-this away from m-me, $!{name}. No... I've just... no!\"\n\nSomething about his change of manner disturbs you... but you like it. Scared Gonchar is something you could get used to.\n\n\"What in the hell are you talking about? What [i]is[/i] this place? Where are we? I want answers, d-mnit!!\"\n\nGonchar stares at you quizzically, then exhales, all signs of terror removed from his face.\n\n\"...You mean you still don't know? Haven't I explained all this to you already about a thousand times? And here I thought you... ah, what a fool I've been. To think! You!\"\n\nYou're not sure what he's talking about, but you're pretty sure it's not very flattering. You point the barrel at his head.\n\n\"You start explaining this place. Now. No more enigmatic statements, no half-sentences, no creepy bulls--t. What. Is. This. Place.\"\n\nGonchar peers down at the pool. His eyes blaze in excitement.\n \n\"Quite simply my dear $!{name}, this is where Gods are made.\"\n*page_break You aim a few yards above his head and fire. \nThe kickback knocks your hand back far more than you expected; when you open your eyes a half-second later, you're quietly relieved that he's still standing, unscathed. \n\n\"I'm not f--king around here, Gonchar. Explain this place. You won't get a second warning.\"\n\nGonchar sighs, his eyes still locked on the obscured object just beneath the waves.\n\n\"That object in the pool. Do you see it?\"\n\nYou give the object a quick sideways glance, but keep your focus on him.\n\n\"Yeah. Why? What is it? Is that him? His head, maybe? Internal organs?\"\n\nGonchar breaks his staredown to give you an exasperated look.\n\n\"Really, $!{name}? Does that seem like anything even remotely like the ancient funerary customs of the steppe nomads of Central Asia?\"\n\nEmbarrassed, you look down at the ground.\n\n\"No. No, of course not.\"\n\nGonchar resumes his creepy, almost predatory stare towards the center of the pool.\n\n\"No, naturally. Any fool could see that. No, this 'tomb' holds no dead mortal. In fact, Genghis' human remains were probably devoured eons ago. No, this is not so much a tomb as it is a 'birthing pool'... where one of us --myself, to be clear-- will shed his primitive casing and join the ranks of the immortals, becoming a traveller of time and space, much like the being that left this here so many millions of years before us.\"\n\n\"Sounds like a big steaming heap of B.S. to me.\"\n*page_break \"What it should sound like, is a death sentence. Goodbye.\"\nBefore you can react, Gonchar dives into the pool and slithers beneath the waves. You didn't think it was more than two or three feet deep, but the liquid mercury can conceal deep secrets. \n\nAfter a few seconds, Gonchar appears in the center of the pool, rising up like a dolphin. He hovers in the air for a moment, his arms spread out to each side, every inch of him covered in thick silver, his features obscured. He looks like a silver statue. The entire room around him begins to vibrate with a soft [i]hummmm[/i].\n\nWhat do you do?\n*choice\n  #Line your sights on him and pull the trigger. Then pull it again. Then again, just to make sure.\n    *set bravery +5\n    *set intelligence -5\n    *set blasphemy -10\n    *goto shootgonch\n  #Line your sights on him, but wait to shoot. Get a feel for what the hell is going on, first.\n    *set wisdom +10\n    *set intelligence +10\n    *set insanity -10\n    *goto waitshoot\n  #Tuck the gun in your belt, take a deep breath, and dive in.\n    *set bravery +20\n    *set wisdom -20\n    *set intelligence -15\n    *set insanity +30\n    *goto divein\n*label shootgonch\nYou aim the revolver at his chest and pull the trigger. The report and kickback blind you for a second, but when you open your eyes, nothing has changed. Gonchar's form, encased in silver and lit from below by some unknown source, still hovers over the middle of the pool.\n\nHuh. Must've missed.\n\nYou line up the sights even more carefully this time, then... bring it back down. You open up the cylinder to see how many bullets you've got left.\n\nOne.\n\nOne bullet left, and then this hunk of metal is useless. \n\nYou glance back at Gonchar, who now seems to be emitting a warm, silver glow.\n\nWhat do you do?\n*choice\n  #Take aim one more time, and fire.\n    *set wisdom +5\n    *goto aimmore\n  #Take your shoes off, roll up your pants and carefully step into the pool so you can get a closer shot.\n    *set wisdom +10\n    *set bravery +5\n    *set insanity +10\n    *goto wadepool\n  #Grit your teeth, throw the term 'one hundred times the lethal dosage' to the wind, and dive in after him.\n    *set wisdom -15\n    *set intelligence -10\n    *set bravery +10\n    *set insanity +30\n    *goto divein\n*label aimmore\nYou close the cylinder and bring the gun up to aim, but you needn't have bothered. Gonchar's silver, faceless form is less than three feet away from you. Your terror-white face reflects like a funhouse mirror off his shimmering chest. \n\nA small circular depression opens in the middle of where his head once was. A sound like the high-pitched whirring of a thousand transmission belts issues from the gaping hole.\n\n\"[i]YOU.[/i]\"\n\nBefore you can react, a fine black cloud pours forth from the orifice-mouth and into yours. Within seconds, your entire body is filled to bursting with billions of microscopic, flying insects, clogging up every artery, intestinal tube, and airpipe. You drop to the ground, having lost all control of your basic bodily functions, and suffocate in silence until the black insects begin to fill the inside of your eyeballs. The last thing you see is hundreds of minuscule little winged dots buzzing around your narrowing field of vision, until all is black. \n\nAnd then, they feed.\n*achieve swarm\n*goto_scene ending\n*label wadepool\nAfter momentarily considering taking your shoes and socks off before jumping in --and then remembering that this pool is liquid mercury, not water-- you rush to the edge and leap over, gun drawn above your head and ready to close in for the killshot.\n\nYour body sinks like a stone, shooting down into the depths of the pool like a cannon ball. What had looked like a raised pool no more than three or four feet deep is actually a vast underground sea surrounding a silver column of liquid mercury that stretches deep down into the black levianthanic depths. \n\nYou're a good swimmer, but a force far beyond your control seems to be dragging you down at an alarming speed. You look up, and the surface of the silver column is rapidly falling away from you: twenty, now thirty, now forty yards away and getting dimmer. Outside the column, the water --you presume it's water, at any rate-- is getting blacker and blacker with each passing second. Vast, shadowy forms flit around the column beneath you.\n\nYour time is running out. Do you:\n*choice\n  #Fight against the current with all your strength, in a desperate attempt to get back to the surface?\n    *set bravery +5\n    *goto current\n  #Swim out of the toxic silver column, and take your chances in the surrounding water?\n    *set bravery +10\n    *set wisdom +5\n    *set insanity +5\n    *goto outwater\n  #Drop the weapon, give in to the current, and let it take you to where it will?\n    *set bravery +20\n    *set wisdom -30\n    *set insanity +50\n    *goto staycolumn\n*label current\nYou release your grip on the revolver, and try swimming back to the surface. You weren't prepared for this level of danger or depth, and your air is dangerously low. Already you feel sharp stabs of pain in your lungs and chest. \n\nFor a moment, it seems you're getting closer. Above you, you can almost see the shiny, shimmering surface. As you glide through the liquid mercury, you feel like you're slowly gaining. For a moment, the surface --air!-- seems a real, distinct possibility. For a moment, you begin to regret letting the revolver go: what are you going to do about Gonchar once you break the surface? The madman clearly has murder on his mind.\n\nFor a moment.\n\nYour muscles, buoyed for a moment by the surge of survival-instinct adrenaline, begin to fade with exhaustion. You've not eaten in god knows how many hours, nor have you had so much as a sip of water. First the quad and hamstring muscles in your legs lock up, then your shoulders tense and freeze. \n\nYou're sinking.\n\nSlowly, all the muscles in your body cease working. With no oxygen and no food, you never stood a chance. The current begins to drag you down, back down into the depths. You close your eyes, and resign yourself to your fate.\n*goto staycolumn\n*label outwater\nYou figure that if you could just swim outside of the column of liquid mercury and head for the dark black water, you'd have at least a slim chance of survival. Without a moment to lose, you head towards the edge of the column. \n\nYou feel a surge of power in your otherwise tired and nutrient-starved muscles, no doubt a \"for last-ditch survival only\" batch of adrenaline your body's been stashing for a rainy day. It takes a few harrowing seconds, but finally, you reach the edge. Elated, you push through, out of the column and into the surrounding sea.\n\nThe subarctic temperature of the water hits like a sack of bricks. For a moment every muscle in your body locks into frigid paralysis, and you begin to sink. Dangerously short on air, you try and concentrate your focus to fight against your body's natural desire to panic.\n*page_break And... it works!\nAdrenaline is a hell of a drug, you muse, as you dig deep into your second surge of energy and work your way to the surface. Without the strong current pushing you down, you approach the surface a lot quicker than you expected: clearly, escaping from the silver column was the right idea.\n\nAs you approach to within just a few yards of the surface, something impossibly vast, perhaps the size of four or five department store parking lots, plunges into the water above. The sheer scale of the thing pounds your senses into submission, and it is only after a few confused seconds before you realize what the colossal object is.\n\nA face. \n\nGonchar's face.\n\n[i]HAH HAH HAH HAH HAH[/i]\n\nYour old nemesis laughs, the sound erupting like the sulphuric bubbling of a gargantuan underwater volcano. There's no escape for you anymore. A breath later, you're trapped up against the rapidly descending god-beast, and watch as your flesh is ripped off your bones by the force. Pinned underneath the diving leviathan, your skin, then extremities, then limbs and scalp fly off your frame. You keep expecting, hoping, to black out, to lose consciousness, but it never stops. It never stops descending.\n*achieve leviathan\n*goto_scene ending\n*label staycolumn\nYou lean back into the silver column of liquid mercury, letting it drag you into the depths. You relax your muscles, and accidentally inhale a large gulp of the toxic stuff --only to discover that you can breathe it in just fine. \n\nYou laugh to yourself, watching tiny air bubbles rocket away from you toward the surface... still visible, though it must be a quarter-mile or more away from you now. The current is picking up more and more speed as it carries you along. The vast, shadowy shapes swimming in the dark waters just beyond the edge of the column race by your vision like telephone poles on the highway. \n\nSoon you're speeding by too fast to see anything other than microscopically-thin streaks of silver light. You must be travelling as fast as a jet, at least, as you watch your arms and legs elongate to cartoonish lengths. \n\nStill, you pick up more and more speed, until your entire body is wisp-thin, a long string of individual molecules stretching for hundreds of miles behind you, held together by nothing more than your consciousness. Around you is the black night of space as you continue to rocket across the incomprehensibly vast distances between the stars. Somewhere, in some time, you detect the faint echo of Gonchar's screams...\n\n\"[i]...no...[/i]\"\n\nYou smile. You've won.\n*achieve starchild\n*goto_scene ending\n*label waitshoot\n\"Gonchar! GONCHAR!! Give me my answers, or I'll shoot you dead, so help me God!\"\n\nYour nemesis' silver-encased form makes no move. Is he daring you to shoot? This is clearly a man unhinged enough to coat himself from head to toe in extremely toxic poison.\n\nYou wrack your brain for long-forgotten chemistry lessons: how long does mercury poisoning take? Should you save your last remaining bullets, and let his epic-level stupidity do your dirty work for you?\n\nYou lower your weapon. As you do, a silver Gonchar just behind you and to your right removes your arm at the shoulder. The silver Gonchar at your left removes the other one. \n\nIt's surprisingly painless.\n\nYou collapse to your knees and look down: no blood. The entire room begins to throb as the other silver Gonchars remove your legs, ears, nipples, and other protruding organic material. Within seconds, you are no longer the sum of your parts.\n\nYour eyes, ears, and tongue are still fully functional as they are divided amongst the silver Gonchars, who then depart in different directions, spanning the globe. You see and hear and taste, very clearly, the faces and screams of thousands of women and children, but find you lack the ability to care. Perhaps in a past life, you would've, but now they are only the screams of the ants. Nothing more.\n*achieve antscreams\n*goto_scene ending\n*label divein\nThe instant you're submerged in the pool you feel every cell in your body vibrate with the atomic power of a thousand dying suns. Never before have you felt so powerful, or so weak. You move, almost flying or gliding rather than swimming, to the center of the pool. \n\nA silver-coated Gonchar awaits.\n\nHe grins, showing his teeth. Even the insides of his mouth are now coated in toxic mercury.\n\n\"You came, $!{name}. For a moment, I had my doubts about you. But you did it, you took this, the final step! I've never been so proud!\"\n\nYou try to snort in derision but accidentally inhale instead, only then realizing that you can breathe the liquid mercury as if it were thick, syrupy oxygen. You look down at the mirrored surface of your forearms and hands, then glance back up at him. Below you, miles away, some sort of powerful light source glistens.\n\n\"Do you have any idea how ridiculous you look, Avery? Like some sort of bad Cambodian Silver Surfer knock-off doll.\"\n*page_break The smile disappears from his face.\n\"Ah. Perhaps, in my haste and excitement, I misjudged you... your intentions. Are you even aware, my dear $!{name}, that we are the birthlings of gods, right here, right this very moment?\"\n\n\"I'm aware that every inch of our bodies is coated with extremely poisonous material. And that we're both going to die from it a lot sooner then we'd like.\"\n\nGonchar makes an audible sign of disgust.\n\n\"Those who do not appreciate their gifts are doomed to be forgotten. As a mewling immortal, it is no longer my place to discuss this or anything else with those who choose to be insects. In light of our deep friendship toward the ends of our lives, however, I will grant you the honor of my first kill.\"\n\nGonchar twitches an eyebrow, and a wall of invisible force the size and mass of a Mack truck slams into you. \n\nYour head feels like you just pulled it out of the trash compactor. Before you can shake of the dizziness and nausea, a second blast smacks into your left side, cracking every rib and shattering the bones in your upper arm.\n\nGonchar remains in the center of the pool, a thick sheen of mercury masking whatever expression hid on his face. He pauses to look you over once more, then opens his mouth-orifice.\n*page_break \"Congratulations, $!{name}. A pity no one will ever remember this, no archaeologist will ever find your powdered bones.\"\nBefore you can think of a snappy comeback, the liquid mercury around you coalesces into molten steel, crushing every inch of your body. Unable to fight it, the force crumples you into a rolled-up foetal position, with unyielding, constant pressure coming from all sides. Pain wracks you in waves, every second ripping decades off your life. You buckle under the torrential assault until you are dreaming of the sweet release of death.\n\nBut it never comes.\n\n[i]Wait a minute...[/i]\n\nStill under intense pressure, you take stock of your position.\n\nYou're still alive. \n\nYou flex your hands, then your arms. All your limbs, even the ones that had just been broken or smashed, are still under your control. In fact, when you move them, the pain stops.\n\nYou suddenly have an incredible idea: \n*page_break Why not just stop feeling pain?\nWith just a minor effort of will, the pressure, the pain, the brutal force... all of it stops. Immediately. You draw yourself up to your normal height... then, for s--ts and giggles, to ten times your normal height.\n\nYour head, chest, and shoulders break above the surface of the pool. You see Gonchar's tiny form below make a sudden shiver. You reach down to grab and crush his head, but he seems to slide into liquid form himself, spilling through your fingers.\n\nA breath later, you sense his presence behind you. You turn to face him.\n\n\"Ahhh, $!{name}. Why didn't you tell me you had embraced your new godhood? Clearly, it is time to celebrate. We'll start by annihilating all trace that this world ever existed.\"\n\nA surge of power ripples through you; you feel it radiating in each and every one of your cells. This power, wherever it comes from, wants to be tested, to be used. Is this really what it feels like to be a god? How can you be sure you're not still hallucinating?\n\n\"Come now, $!{name}... divinity beckons.\"\n\nYou have to admit: Gonchar might, actually, know what he's talking about. You want nothing more than to use this new power, to explore it, understand and conquer it. What do you do?\n*choice\n  #\"Lead the way... master.\"\n    *set wisdom -5\n    *set intelligence +5\n    *set blasphemy +10\n    *set insanity +30\n    *goto master\n  #\"Out of my way... a--hole.\"\n    *set wisdom +10\n    *set leadership +5\n    *set blasphemy -10\n    *set insanity -10\n    *goto ahole\n*label master\nA small part of you, buried deep within the recesses of your brain, wants to go back to $!{school} and savour this moment, the moment in time that you were able to transcend the petty interdepartmental squabbles and grant-writing politics, and just show up to their next meeting as a god. \n\nPart of you would like that very, very much.\n\nYou're dazzled by the possibilities, as vast amounts of energy surge through your body. Nothing is impossible; there are no longer any barriers to what you can do. To what you should do.\n\nFor example: could you now, using both your extranatural strength and ability to breathe liquid mercury, descend to the bottom of the Atlantic and bring up the [i]Titanic[/i]? One half at a time, of course. The ship could be made into a museum! Ticket sales would rival Disneyland!\n\nWell... Euro-Disney, anyway.\n\nThe same could be said of the lost city of Heraclion, buried under the waves so many centuries ago. Or the lost temples of Tibet, or the Golden Triangle. Perhaps even Atlantis! Your mind starts to swim with possibili--\n*page_break \"Come now, $!{name}, it's time to lay waste to this sick civilization, and start anew.\"\n\"Wait... what? Why? There's so many better uses of our powers...\"\n\nGonchar tilts his head back and scoffs.\n\n\"This species is done. It's served its purpose: we're here now. Other worlds beckon. They will not miss this one.\"\n\n\"Now hold on just a minute: I'm not sure what we're capable of --and that's provided we're not just experiencing a mutual, mercury-based hallucination, as we share a room in some roach-infested Mongolian emergency room-- but I'm pretty sure I'd rather use my powers to further the cause and spirit of archaeology... of knowledge.\"\n\n\"All human knowledge, every scrap of it, was a pale dream of what we have just accomplished. We have attained this. No one else. We are the real thing. Everything else is a poor imitation, a single grain of rat's s--t. Now that you have ascended, you should feel [i]insulted[/i] by the presence of so much banal falsehood, so much misinformation. It must all be destroyed, so that no other species will follow the false paths of human culture, religion, and science. We must do what we do for the rest of the multiverse.\"\n\nWhat do you do?\n*choice\n  #Gonchar is right. Hell, he was right all along: it's time to finish this world, and lay down the foundations for a better one. Plus, you've got to be honest: the wanton destruction sounds a little... [i]fun[/i].\n    *set blasphemy +20\n    *set insanity +50\n    *goto beta\n  #Gonchar is wrong. Divine power should be used to build, to improve... not to annihilate. This madman must be stopped.\n    *set wisdom +20\n    *set blasphemy -20\n    *set insanity -30\n    *goto ahole\n*label beta\n\"Let do this. Time to bring it all down.\"\n\nWithout another word, the two of you break to the surface like a pair of long-sleeping titans bent on vengeance. He goes his way, you go yours. \n\nWithin hours, you've devoured your first major city, ripping the skin off of every man, woman, and child in the larger Beijing region. Seoul is next, then Kyoto. You skip over some of the larger cities, giving them false hope. Hope that you'll tire, or leave, or that someone, somewhere, will find your weakness and destroy you. The thought makes you smile.\n\nIt's not long before your work here is done. You turn to the rest of the universe, freeing every world in your path. Every few hundred million years, you come across one of your own, usually in the vast black centers of dying galaxies. \n\nYou stop, acknowledge the Work, and continue on. No need for delay. Work must be done.\n*achieve thework\n*goto_scene ending\n*label ahole\n\"This ends here, Gonchar.\"\n\nGonchar's face contorts with bestial rage.\n\n\"Are you--are you serious? Do you have any idea what you're saying, or has all your newly-discovered power gone straight into the overproduction of testosterone and rock-stupid posturing?\"\n\n\"You know what I mean. I'm saying it again: NO. You're not leaving this chamber. You're [i]never[/i] leaving this chamber.\"\n\nThe corners of his mouth-orifice rise up in a sick simulacrum of a smile. \n\n\"And if [i]I[/i] destroy [i]you?[/i]\"\n\n\"Then I'm taking you wi--\"\n\nGonchar strikes through the center of your chest with his arm, grabbing and ripping your heart out before you can even think to react. \n\nYour chest is wracked by the most intense pain you've ever felt. \n*page_break Until you decide it isn't.\nIn the blink of an eye, your heart and chest are back as they were. You take a split second to ponder whether you even need a heart at all, anymore. \n\nGonchar wastes no time starting his next attack. He begins screaming in tongues, babbling nonsense with the volume and [i]basso[/i] tone of a vast mountain collapsing in on itself. He strikes ten feet to the right of you, then ten feet to the left.\n\nA moment later, you're engulfed in white-hot flame.\n\nThe scent of searing flesh mixed with boiling mercury nauseates you to your core... until it doesn't. With a flick of the mind, the flames cease to exist, as does the mercury covering your body. \n\nJust for good measure, you dispose of your corporeal form to assume a vessel of pure light. Then you rebuild your body, cell by cell --making sure to get the capillaries and nerve endings just right-- and climb back in, all in the span of half a millisecond.\n\nGonchar seethes with the righteous rage of the divine.\n*page_break If there was only some way to use that to your advantage...\n\"So, $!{name}, are you just going to stand there like a freshly-milked cow, or are you going to [i]fight[/i]?! Give me your best shot!!\"\n\nHis challenge enrages you far more than it should: you feel his insult deep within the nucleus of every atom in your body. Grinning, you retreat your consciousness back to the atomic level, spinning the neutrons until their violently collective vibrations threaten to tear you into a trillion pieces. You put your hands out in front of you, focus the vibrations outward, and release the equivalent of forty 50-megaton nuclear warheads directly at Gonchar's fat f--king face.\n\nIt takes all of your concentration to contain the explosion within your rival's skull, but you can't control it all, leaving you at the center of a 50-mile-wide smoking crater in the rural Mongolian countryside.\n*page_break When the smoke and flames clear, Gonchar stands before you, unscathed.\n\"So, $!{name}, is this your plan? That we waste our time, locked in fruitless combat, for all eternity? I doubt it would be nearly as fun after a couple hundred millennia.\"\n\nAn impossibly powerful surge of animalistic rage fills each and every one of your cells to bursting. You stagger, floored by the strength of this anger fueled by chaos and impotence. You pause for a moment to collect your thoughts, but the lapse only makes it stronger. You feel helpless against it: within seconds, it will take you over completely.\n\nWhat do you do?\n*choice\n  #Fight it! Re-take control of yourself, or this could get really messy!\n    *set wisdom +10\n    *set insanity -10\n    *goto fightit\n  #Give in! Let the rage flow through you, and help you become more powerful than you could ever imagine!\n    *set wisdom -25\n    *set insanity +50\n    *goto givein\n*label fightit\nYou pause again, but this time focusing on controlling your emotion. Within half a heartbeat, the rage subsides... but only just barely.\n\nStill, the power and speed of these feeling amazes you. Is this how the Old Testament God felt all the time? No wonder he was levelling cities when they looked at him funny.\n\nThis also gives you an idea...\n\nYou return to your normal, familiar form, just so that Gonchar can witness your most withering smirk.\n\n\"You're right, Gonch: it's fruitless for us to fight. You know it can only end one way.\"\n\nGonchar puffs his chest out slightly, his silver-plated arms akimbo. He tilts his head, but says nothing.\n*page_break \"... with me kicking your a-- so hard, that nine months from now your mom gives birth to my foot.\"\nGonchar's head visibly vibrates, then his entire body blinks in and out of existence. \n\nYou weren't expecting that.\n\nThen he charges.\n\nYou [i]were[/i] expecting that.\n\nGonchar slams into you like the hammer of an elder god. The two of you topple back into the pool, where you are again submerged in liquid mercury. This time, the toxic fluid stings your bare skin.\n\nYou also find that you can no longer breathe in the mercury, as you did before. \n\nIs this \"godhood\"... [i]wearing off[/i]?\n\nIf so, then it's now or never.\n*page_break You wrap Gonchar in a bearhug, and squeeze.\nGonchar's face is just inches from yours. This close, you can see the silver fluid washing off in places. Mostly notably, the tip of his nose. \n\nYou bring him closer, then sink your teeth into his nose. N
