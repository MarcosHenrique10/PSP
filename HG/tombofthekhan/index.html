<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tomb of the Khan — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "tombofthekhan", "title": "Tomb of the Khan", "scenes": {"choicescript_description": "You are a world ­famous archaeologist at the entrance to the long ­lost tomb of Genghis Khan. Can you defeat the Lovecraftian horrors within, or will you descend into madness?\n\n[i]Tomb of the Khan[/i] is a thrilling interactive horror novel by Todd Maternowski, where your choices control the story. The game is entirely text-based--without graphics or sound effects--and powered by the vast, unstoppable power of your imagination.\n\n• Enjoy a 52,000 ­word tale of friendship, magic, and inter­dimensional horror[n/]\n• Develop an archaeological style: cautious and scientific, or a screaming bat out of hell?[n/]\n­• Become the greatest archaeologist in history, or assume the mantle of the Khan and go for world domination![n/]\n­• Over 25 unique and gruesome deaths!\n", "choicescript_stats": "These are your stats. Nuture them as you would your first-born child.\n\n*stat_chart\n  text Name\n  text School\n  text Intelligence\n  text Wisdom\n  text Bravery\n  text Leadership\n*if knowsaboutblasphemy = true\n  *stat_chart\n    text Blasphemy\n*if knowsaboutinsanity = true\n  *stat_chart\n    text INSANITY\n  \n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements.", "death": "You have died.\n\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Tomb of the Khan.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99\n", "entrance": "*comment label ToC comeback - line 74\n*comment openbook - line 82\n*comment deal - line 90\n*comment refusal - line 112\n*comment refusal2 - line 131\n*comment listenin - line 146\n*comment frothing - line 157\n*comment trysleep - line 184\n*comment watchopening - line 189\n*comment stopgonch - line 234\n*comment backcamp - line 248\n*comment sitwatch - line 285\n*comment waitian - line 334\n*comment joinhim - line 364\n*comment refusal3 - line 381\n*comment entertomb - line 508\n*comment openthetomb - line 464\n\n\nA week later, and everything that could go wrong has gone wrong. Monsoon-heavy rains made excavations impossible, and an unseasonably icy north wind from Siberia sent everyone back to the relative comfort of their tents. Food that was tinned less than two weeks ago is rotten when opened, and when you tried sending one of your assistants back to the nearest town for supplies, the truck, inexplicably, wouldn't start. The extremely expensive high-tech surveying equipment you brought isn't working for some reason, and despite having partially designed it yourself, you can't seem to figure out the source of the malfunction. Even simple tools, such as your flat-head screwdriver, have gone missing, though no one claims to have borrowed it out of your tool chest. \n*page_break\nWorst of all, last night you [i]swear[/i] you heard some sort of shifting noise outside the tent, but when you went to investigate ([i]sans[/i] flashlight, since your new AA batteries ran out and you can't find the replacements...), you didn't see anything.\n\nWell, that's not exactly true. You did see [i]something[/i]. Something strange, a flicker of movement in the rain-drowned moonlight, a thing that your brain had a hard time processing. You don't remember going back inside your tent, or closing your eyes and falling asleep. But when you tried recalling it the next morning, you found its image as fleeting as a waking dream.\n*page_break And to make matters worse...\nWhen you woke up this morning, all of the local workers you'd hired for the dig were gone. They had arrived ahead of you and your assistants, but you had not seen them emerge from their drenched tents in three days. Now, they were gone: no tire tracks, no sign that they were ever there, other than a small pile of trash where their tents used to be, mostly cheap unfiltered Turkish cigarette butts and a couple of empty bottled of [i]kumis[/i]. \n\nYou idly pick up a bottle and take a whiff. The usually sweet-smelling mare's milk gives off a rancid stench, a vile odor that reminds you of the fetid swamps of southern Louisiana. You look around for a place to throw it away, and, seeing nothing but the tents of your grad students, toss it back on the ground.\n\nYou look up to the sky. More dark purple clouds on the horizon. More rain. Another day, lost.\n\nYou feel like this expedition may have been a mistake.\n*page_break Someone taps you on the shoulder...\nYou turn around, and have to hold back the bile when you see it's Dr. Avery Gonchar. You clench your fists, wanting nothing more than to work out your frustrations all over his smarmy, self-satisfied face. \n\nHis eyes, however, throw you off. They're glassy, excited, nervous, as if focused on something a million miles away. You turn around to see what he's looking at, but all you see are dark clouds and darker mountains. \n\n\"$!{name}, I've got a proposition for you.\"\n*page_break Here it comes...\nGonchar opens a small satchel and holds it up to your face. You can't quite see what's inside, other than a strange-smelling book that looks like it was bound in some weird... well, you don't know what. You glance around for your grad students, but they're both still in their tents; Jacy's probably studying Yakut verb forms, while Ian is sleeping off another evening of chemically-enhanced entertainment. You cross your arms and lean on one hip, waiting to hear what sort of bullcrap Gonchar is going to spew this time.\n\n\"Yeah? What? Spit it out, a--hole.\"\n*page_break\nGonchar stares at you for a moment, his right eye twitching just slightly. \n\n\"Have you ever heard of a book... a book called the [i]Nexus Tyrannicon[/i]?\"\n*page_break After a second of silence, you burst out laughing...\n\"And to think, I thought you were being serious. The [i]Nexus[/i]? The so-called 'forbidden knowledge personally transcribed by Satan himself for world's most bloodthirsty mass murderers?' [i]Pure. Horseshit.[/i] It was nothing but a medieval scare tactic, a Dark Aged-fable like Prestor John or its Zoroastrian predecessor, [i]Pesha Vanyu[/i]. Is this your 'proposition?' Some Victorian-era fake of a make-believe grimoire? I hope you didn't pay more than five bucks for that at the airport news stand.\"\n\nGonchar narrows his eyes, as if you just insulted his mother (which you have done, repeatedly, in your mind over the past week). He indignantly whips the book out of his bag and thrusts it into your chest. The binding looks even odder in the light, and you feel a slight tingling in the tips of your ears.\n*page_break \"This is no 19th-century forgery, my friend...\"\nYou raise your hand to cut him off, pushing the strange book away. \n\n\"Hold on, let me guess. You found this in some dank, impossible-to-find bookseller in the slums of Istanbul, and were convinced by the merchant to part with something very valuable to get at its secrets. Then, the next morning, you went back to that same place and found no trace whatsoever of the shop where you purchased it; it was nothing more than a trinket gift shop or tannery or something. After an initial period of hesitation, you opened it up, and read the, presumably, poorly-written incantations, and decided that they were the real deal when you heard a loud knock outside your high-rise hotel room window. When you had it appraised, the book expert was shocked and appalled, and helped you only reluctantly, taking no money in exchange. He claimed that it was bound in centuries-old human skin, which generally lends credence to the whole 'creepy black magic' vibe. Am I missing anything?\"\n\nGonchar just grins and shoves the book into your hands.\n*page_break \"You tell me.\"\nYou hold the book: it doesn't feel like normal leather. The binding is tough, somewhat rubbery, and seems to have the faintest trace of --unless you're imagining things-- [i]vibration[/i]. You want to open it, but a nauseous feeling in the pit of your stomach prevents you. You toss it back to Gonchar, as non-chalantly as possible.\n\n\"Ok, I'll bite. What's the big deal?\"\n\nGonchar's rictus grin widens, showing two rows of gleaming white teeth. \"It's bound in human heart.\"\n*choice\n  #You retch, then use an entire bottle of industrial-strength orange hand soap to remove the top few dozen layers of skin on your tainted hands.\n    *set wisdom +1\n    *goto comeback\n  #You shove Gonchar in the chest and send him and the vile book sprawling. \"Don't ever talk to me again you goddamned psycho.\" You turn and walk back to your tent.\n    *goto comeback\n  #Intrigued, you snatch the book from his hands and open it.\n    *set bravery +2\n    *set wisdom -2\n    *set blasphemy +5\n    *goto openbook\n*label comeback\n\"Wait! Wait, comeback!\"\n\nYou hear Gonchar shuffling off the ground behind you as you head for your tent. [i]Fantastic[/i], you think to yourself, [i]as if this expedition could get any worse[/i]. You ponder the once-unthinkable option of calling the whole dig off, but before your mind can process it a hand grips your shoulder in a steel-like vise and spins you around. You're a little alarmed by just how effortlessly Gonchar moved you, and wonder where he acquired all that strength.\n\n\"Just hear me out.\"\n*page_break\n*goto deal\n*label openbook\nThe nausea in your stomach turns to hungry curiosity as you crack the binding and open the book. The very first page you land on looks as if it were written by dozens of deranged asylum inmates: each crimped word appears to have had multiple authors using different alphabets, with seemingly-random geometric patterns scattered across the page in a chaotic maelstrom of codified insanity. You can just barely make out some ancient Phoenician script, some Euboean, some Flemish. A little corrupted Latin, mixed in with some profoundly disturbing images labelled in a long-forgotten Slavic tongue. A great deal of it seems to be in a some sort of crude, almost guttural script you've never seen anything like in your life-- and you wonder if even Jacy is up to the task of translating this mess. \n\nYou turn to Gonchar. \"I can't make heads or tails out of this.\"\n\nHis grin widens. \"You don't have to.\"\n*page_break\n*goto deal\n*label deal\n\"Forget what you [i]think[/i] you know about me, $!{name}, about my life, my wealth and fame. This is the truth: I have spent the last two decades and over three million dollars --my entire inheritance-- in an effort to find [i]this[/i].\" He taps the cover of the book, shuddering slightly. \"Power. [i]Real[/i] power. Not the cheap stuff involving votes and bribes and guns. No, I want something very different: to tap into and control the very currents of existence. And this is what will get me --us-- there.\"\n\nYou look at him warily. \"I-I'm... not sure I follow you.\"\n\nGonchar gestures wildly all around him, flailing his arms. \"This! Here! All of this! Don't you see? If your research is correct, if [i]my[/i] research is correct, then it --true power-- is buried somewhere, right here, right here beneath our feet. We could be standing on the source as we speak!\"\n*page_break You start to back away slowly...\nW-What do you want from me, weirdo?\"\n\nGonchar's face contorts into a hideous mask for a single breath, before resuming its normal air of punchable smugness. \n\n\"I need you to help me open the Gate.\"\n*choice\n  #\"Go f--k yourself.\"\n    *set wisdom +2\n    *goto refusal\n  #\"I thought you'd never ask!\"\n    *set bravery +5\n    *set wisdom -2\n    *set blasphemy +2\n    *set intelligence +1\n    *goto openthetomb\n*label refusal\nGonchar pays no attention to your answer, and grins. \"$!{name}, $!{name}, $!{name}... I am going to open the Gate now, here, within the hour. Whether you help me or not. Of course, it will be significantly easier if I had a scientist of your experience and intelligence to assist me with a few, ah, trivial, tasks. But in the end, that Gate is going to open, and I'm going to be the first mortal to enter the Tomb of the Khan in almost a thousand years. There is no more point in waiting... can't you hear them? They call to us! They've been trapped for too long, and their hunger is more insatiable than it has been in a hundred million years! This is you last chan--\"\n\nYou cut him off abruptly, get right in his face and give him your answer.\n*choice\n  #\"I wouldn't even piss on your corpse if it were on fire. Take your apesh-t insane plots straight to hell.\"\n    *set wisdom +2\n    *goto refusal2\n  #\"This sounds crazy, but... what [i]exactly[/i] do you need me to do?\"\n    *set wisdom -1\n    *set intelligence +2\n    *set bravery +1\n    *goto openthetomb\n  #\"No more talk. I'll help you, but on one condition: [i]I'm[/i] the one that enters the tomb first. I go, then you, or no deal, a--wipe.\"\n    *set wisdom -4\n    *set intelligence +2\n    *set bravery +4\n    *set blasphemy +2\n    *goto openthetomb\n*label refusal2\nYou storm back into your tent and zip it closed behind you, ignoring his pathetic pleas. You bury yourself in your sleeping bag and cover your head with your pillow, until Gonchar stops whining and moves on. After a minute of eerie silence, you hear the sound of a zipper, then muted voices. \n\nAnd that's when you realize that the crazy bastard has moved on to one of your grad students.\nDo you:\n*choice\n  #Cover your head again and try to sleep, confident that neither of your assistants is stupid enough to take the bait?\n    *set bravery +1\n    *goto trysleep\n  #Put your ear up against the flap and try to strain and listen to what's going on?\n    *set intelligence -1\n    *goto listenin\n  #Storm out of your tent, fists flying, teeth gnashing, mouth frothing with righteous fury!\n    *set bravery +4\n    *goto frothing\n*label listenin\nYou strain your ears, but the voices are still too low and too muffled to make anything out. The only thing you're sure of is that Gonchar approached Jacy, not Ian --smart guy. Jacy's strong ambitious streak makes her a natural fit for Gonchar's raving lunacy. Hell, give her her own reality show and a two-million dollar budget...\n\nYou snap out of it. If he really is trying to rope in Jacy, what do you do?\n*choice\n  #Really, she's got a good head on her shoulders. She'll be fine... I'm not her mother.\n    *goto trysleep\n  #You grab your heaviest flashlight --a three-cell silver Maglite that you inherited from your father, with the words '[i]BAD MOFO[/i]' etched on the handle-- and go outside to lay waste to your rival's inflated cranium.\n    *set bravery +2\n    *set wisdom -2\n    *goto frothing\n*label frothing\nFlushed red with rage, you storm out of your tent with one mission --that insufferable a-hole is finally going to get what's coming to him. Visions of dumping his bleeding corpse out in the desert to be food for the [i]olgoi-khorkhoi[/i], the legendary Mongolian Death Worm, fill you with almost orgasmic pleasure as you stomp over to Jacy's tent, rip open the flap and see her... doing yoga with Ian. They both look up at you with annoyed looks on their faces, and now you suddenly feel like the a-hole.\n\n\"Uhhh... what are you doing here?\"\n*fake_choice\n  #\"I'm, uh... I thought I heard something. Nevermind. As you were.\"\n  #\"I know it's getting lighter, but I thought maybe you could use a flashlight for your... exercises?\"\n  #\"I'm... hey, is that the Warrior Pose? Very cool.\"\nIan nods his head and returns to his yoga, but Jacy isn't buying it. \n\n\"What's up, $!{name}? Were you spying on us?\"\n\nAfter a moment's pause, you overcome your childhood instinct to lie your butt off and decide to come clean. \n*page_break \"Did... did Dr. Gonchar approach either of you with an insane proposition recently?\"\nIan opens his eyes wide and blurts out, \"Dude! That perv? I don't swing like that --it's cool if you do, whatev, right?-- but that mack is just not my type, y'know?\"\n\nJacy rolls her eyes. \"You mean about the book? The [i]Nexus[/i]? Yeah, he was here last night. Offered me a nice, well-funded position with a fast-track to tenure. Real pushy about it... of course I refused. Before he could ask, I told him in no uncertain terms not to bring it up with you, that you would never fall for something so transparently idiotic. Secret gates? Black magic? I'm not giving him a drop of my blood for that nonsense.\"\n*page_break \"Waitaminute, he wanted a drop of your [i]blood[/i]?!\"\nJacy looked amused. \"Well, yeah, sure, of course. Isn't that par for the course for these weirdos? Blood, hair, semen, that sort of thing? A living, organic link to the real world? Just standard shamanistic practice, both in symbolically bridging the metaphysical gap between the 'real' and the 'spirit' worlds, as well as fulfilling the archetype of the 'sacrifice,' of which there are actually two schools of thought regarding--\"\n\n\"Well, that's great. I was about ready to smash his skull in with this flashlight.\"\n\nJacy smiles. \"If it comes down to that, I'll help. Plenty of places to bury a body in the Gobi Desert.\"\n\nYou return to your tent, satisfied that things will be alright.\n*goto watchopening\n*page_break\n*label trysleep\nYou close your eyes, shielding them from the rays of daylight pouring through your tent walls. Though you're confident you handled Gonchar correctly, you can't help but feel that something is wrong. Utterly, disastrously, wrong. You take a few deep breaths, but your mind and body are too giddy to sleep, as if they've been supercharged on a half-dozen cans of Red Bull and pixie sticks. You toss and turn, to no avail --you can't get comfortable here. Not while... well, you don't know exactly what's wrong, but you know something is not right. \n\nPutting on your boots and grabbing your heaviest flashlight, a silver two-pounder with the words 'BAD MOFO' inscribed on the handle, you try and catch a little fresh air.\n*goto watchopening\n*label watchopening\nEven though it's now just a few hours from high noon, you take one look at the rolling, dark purple sky above you and know it's another wasted day. Back in college, you used to love the smell of approaching rain... but this time, something's not right. You take one whiff, then another, then a third to confirm what you already knew: it doesn't smell like rain at all.\n\nIt smells like fire. And something metallic --iron.\n*page_break \"Fire! FIRE!\"\nYou run to the tents to wake up Jacy and Ian. Jacy whips open her tentflap, alert, with a small handheld fire extinguisher at the ready. \n\n\"Where is it? The truck? The gear? [i]Our notes[/i]?\" \n\nYou feel your decision to bring her on this expedition was a good one, possibly the only decent choice you've made thus far. \"Find the source, Jacy! Check the truck first, then yell if you find it! I'll get the other extinguisher!\" You dash to Ian's tent- the grad student emerges, confused and blinking. \n*page_break \"Did I miss something, chief?\"\n\"Ian, something's on fire, we need to put it out before this whole expedition goes to sh-t!\"\n\nIan wipes the sleep out of his eyes. \"Sure, man, sure... so, uh, what do you want me to do?\"\n*fake_choice\n  #\"Search the perimeter of the camp for any fires or smoke!\"\n  #\"Stay inside your tent, it's too dangerous for you out here!\"\n  #\"Go get a map and a flashlight, and find your godd--ned balls!\"\nIan, still groggy, narrows his eyes at you. \"Cheezus K. Rist, chill the eff out.\" Not wanting to waste another word on him, you tear up the nearest hill to try and see the source of the burning smell. Huffing up the incline, you start to hear two voices yelling --one thin and reedy, the other... deep, fathomless, almost... [i]abyssal[/i]. \n\nCresting the ridge, you see the source of all this chaos, down by a bend in what was once a quiet little brook near the dig site. The second \"voice\" you heard was not a \"voice\" at all, but rather, the pounding, rhythmic sound of roaring water. Dr. Gonchar stands at the edge of the raging current, his hands in supplication above his head, the ground beneath him red and slick with blood: his own, it seems, as his hands, feet and side have all been punctured with a gleaming gold knife laying at his feet.\n*page_break You creep closer...\nInching forward on all fours, you spot what looks like odd, dark markings in the ground around Gonchar --until you realize that they are the sigils of a protective summoning circle, dug out of the riverbank mud and now filling with the smoking hot blood of your enemy. Gonchar grows paler and thinner with each passing second as you stare and watch the horror unfold. Oblivious to your presence, he barks commands to the darkening sky, using some type of bestial, reptilian language. \n\nDrained of all color, looking like Death, Gonchar issues one final, earth-shattering monosyllabic shriek. The dark purple clouds above you turn a sickly grey-green. A foul-smelling mist envelopes you, making it next to impossible to see clearly. The roaring water turns black as tar, getting louder and louder until a huge explosion knocks you flat on your back. \n*page_break You sink down into the mud for a moment, collecting your wits...\nYou pat your chest down just to make sure you're still alive, ignoring the painful buzzing sound in your ears. Idly wondering what a doctor in Ulan Bataar might charge you for out-of-network surgery on two busted eardrums, you groggily stagger to a crouch, and look around.\n\nThe sky is still an eerie green and the mud still covered in bloody sigils, but there is one major difference from before the explosion. The stream, still black and oily, is now running in the opposite direction. The waters are parted in the center, revealing a massive, yawning iron door in the riverbottom, presided over by a green-black statue that just seems... [i]wrong[/i]. As a trained archaeologist, you've seen all manner of decorative tomb guardians, but this one resembles nothing you've ever come across in all your research. \n*page_break \nNormally, these tombs are guarded by statues or depictions of stout, muscle-bound, and heavily-armored warriors with hair on their chests and fury in their eyes. This statue, however, is ripped straight out of H.R. Giger's nightmares: gaunt, sickly, leaning to one side, with the facial features of a skinned dog. Lacking pupils or any sort of relatable human emotion, the deep-set, ink-black eyes give the impression of confusion, or bewilderment. Taken as a whole, the statue reminds you less of a tomb guardian, and more the petrified corpses of Pompei, encased in ash for all eternity, souls tortured by a fate they had never suspected. \n\nThough he should be long dead due to blood loss, Gonchar struggles to his feet and begins hobbling toward the unsettling sculpture. What do you do?\n*choice\n  #You get a running head start and tackle him from behind.\n    *set bravery +2\n    *goto stopgonch\n  #You sit down in the mud, waiting with bated breath to see what happens next.\n    *goto sitwatch\n  #You run and catch up to him, put his arm around your shoulders and walk together into the Tomb of Genghis Khan.\n    *set wisdom -5\n    *set intelligence -1\n    *set blasphemy +5\n    *set bravery +10\n    *goto joinhim\n*label stopgonch\nYou plow into your enemy, belting him in the small of his back with your shoulder. Both of you tumble to the mud --and are instantly covered in steaming black blood. You bolt to your feet, but the skin that came in contact with the vile effluvia sizzles like rancid bacon. You scream, but it sounds to you as if your voice is coming from a long distance away. Desperate for an answer to your pain, you run to the edge of the parted water and thrust your burning arms into the roiling tide.\n*page_break A breath later, you wonder if that was wise...\nThe tar-black water alleviates the burning... replacing it with an oily, sickly feeling that causes you to shudder violently. You quickly draw your arms back out, but it is too late: small dark-green globules of some unknown matter are already forming on the burnt patches of skin on your arms. The globules seem to move in circles, then elongate into tiny worms. You try to brush them off but they latch onto your pink, scorched burnmarks... and start to burrow inside.\n\nPanicking, you look around for help, but see only Gonchar's blood-caked feet, as he crawls on all fours into the gaping entrance. What do you do?\n*choice\n  #You suck it up, take a deep breath and plunge in after him.\n    *set bravery +2\n    *goto entertomb\n  #You head back to camp, hoping to find Jacy and whatever medical supplies you can get your hands on.\n    *set wisdom +5\n    *goto backcamp\n*page_break\n*label backcamp\nYou begin to stagger back to camp, but the worms under your skin cause your body to shudder all over --the intense, searing heat of your burns overwhelms your senses and you black out. \n\nYou come to, face-down in the mud --a minute or a week later-- and look behind you. The statue is still there, slick and alien, standing over the wide-open iron door in the bottom of the riverbed. You try to get up, but you're up to your armpits in the mud --trapped. You start to panic. Perhaps you scream. The rushing of the water fills your ears: in a moment, it may resume its natural course and fill your lungs. \n\n*page_break A rough hand grabs your shoulder...\nAnother hand joins the first, then another, then a fourth. A few seconds later you're sitting upright in the mud, wondering just what it is that is causing Ian and Jacy to look at you like that. Ian is showing unexpected competence treating and bandaging your wounds --he doesn't quite believe you about any 'worms,' and now that you look more carefully, you don't see any of the worm-marks either... nor do you feel them crawling underneath your skin. \n\nFor a fleeting moment, you wonder if Gonchar's blood was laced with an insanely heavy dose of some form of mind-altering substance. It would explain quite a bit...\n*page_break\nAfter a few minutes --during which Jacy does not take her eyes off the statue or the iron door for more than a split second-- Ian finally finishes with your bandages. \n\n\"Sheesh, Prof, make sure to go easy on the open flame next time. If we were back in the dorms, I could whip up this kick-ass batch of homemade, all-natural homeopathic salve, which the ancient Cambodians used for a variety of maladies, including--\"\n\nYou abruptly cut him off with a gesture as Jacy, wordlessly, gets up and heads straight for the massive iron gate. You scramble to your feet, wincing at the pain in your arms, and hobble after her.\n\n\"Jacy, I know what you're thinking, but don't go in there.\"\n\nJacy turns around, her eyes flashing with an almost primal excitement.\n*page_break \"I have to.\"\nYou grab her elbow but she shoves you away. Stunned, you watch as she peers down into the gaping tomb for a moment before disappearing inside. Ian comes up alongside you.\n\n\"Well, Professor, what do you say? Should we follow her in?\"\n*choice\n  #\"We only live once!\" You exchange a meaningful glance with him, nod, then plunge in after her.\n    *set bravery +15\n    *goto entertomb\n  #\"Hold on, I'll be right back.\" You stagger back to camp and leave detailed GPS readings and instructions on precisely where you are and what you are doing. Once you hit 'send' on the final email to your Department head --you grin a little to yourself, knowing that she's going to piss her powersuit when she reads it-- you head back, grab Ian by the arm and enter the gate.\n    *set bravery +5\n    *set wisdom +5\n    *set intelligence +5\n    *set leadership +5\n    *goto entertomb\n  #\"No. F--king. Way.\" Leaving Ian to fend for himself, you head back to camp, wondering if you can get the Mongolian government to spring for enough engineers and heavy equipment to dig Gonchar and Jacy out of their watery graves. One thing is for sure: your expedition has now officially crossed over from \"plagued by setbacks\" to \"fatal cautionary tale.\"\n    *set bravery -10\n    *set leadership -10\n    *goto refusal3\n*label sitwatch\nStill a little dazed from what you've seen, you watch in silence as Gonchar staggers toward the entrance. The rushing water fills the air like the sound of a thousand jet engines, so you can't hear what Gonchar says before plunging in, but you suspect it was some sort of ritualistic command. Your enemy, still bleeding profusely, enters the tomb and disappears in the darkness.\n\nYou wait for him to come out, for the door to close, for the waters to stop their unnatural movement and resume their normal flow. You wait, and wait some more.\n\nNothing.\n\nYou jerk forward as someone taps you on the shoulder, breaking your focus.\n*page_break \"Are you alright?\"\nJacy and Ian are behind you, staring at the alien statue and the heavy iron door. \n\n\"W-What the [i]hell[/i] is that?\"\n\nYou stand up straight, clear your throat and run your fingers through your hair.\n\n\"I believe it is a tomb guardian of an uncommon Uigher type, though badly worn down from centuries beneath the--\"\n\nJacy interrupts you. \"No, not the statue, though we'll come to that. What is [i]that[/i]?\"\n\nShe points to the iron door. You hesitate for a moment, weighing your options, considering the most intelligent possible answer. Finally, you think you've got it.\n*page_break \"I, uh, don't know.\"\nAfter explaining the situation --and brushing aside the millions of questions you simply have no good answer to-- Jacy finally gets to the meat of the matter.\n\n\"So.... should we go in?\"\n\nYou pause. \"Well... this may or may not be the actual tomb of Genghis Khan, considering our recent archaeological evidence has pointed out over a thousand other tombs of various khans in the general area. Hell, it might not even be a tomb at all: certainly, we've never run across anything like it before. But above all, there's the water... while normally --you know, you guys were here filling up canteens just yesterday-- this is a shallow, quiet brook... well, you can see what it is now. I don't know what strange feat of engineering Gonchar and his money pulled off, but, if, [i]if[/i], we were to go down there, and the water covered us up...\"\n\nIan shrugs. \"Fine with me. It [i]is[/i] pretty cool, though. Let me get my phone, my buddies Sai and Star-Rom will want to see this.\"\n\nYou smile as Ian skips back to camp. Then you notice Jacy, who had been staring over your shoulder the entire time you were talking.\n\n\"Jacy, did you... hey, why don't you go collect whatever surveying equipment that survived the rainstorms, and--\"\n\nHer eyes assume an expression of staring at something a million miles away... a look you've seen before. She shoulders past you as if you didn't even exist.\n\n\"Jacy?\"\n*page_break \"I'm coming, Father.\"\nYou wheel around and try to grab her arm but she slips out of your grasp like an eel. Before your next breath, she's disappeared through the gate. Unsure of what to do, you look back in the direction of camp, but don't see any sign of Ian returning. What do you do?\n*choice\n  #Sit tight and wait for Ian to come back, hopefully with more useful equipment than just his phone.\n    *set wisdom +4\n    *set bravery -10\n    *set leadership -5\n    *goto waitian\n  #Ian's a big boy, he can fend for himself. You head in after her.\n    *set bravery +10\n    *set intelligence +2\n    *goto entertomb\n*page_break\n*label waitian\nYou wait, and wait, and wait some more, until you get fed up with him and head back to camp yourself. Once you get there you find him sitting on a large pack of equipment, a serious look on his face, cleaning the barrel of a handgun.\n\n\"Ian? You... you have a gun?\"\n\nIan doesn't look up from his gun.\n\n\"D--n right I do. No telling what's down in that hole. Or what's happened to Jacy. To tell you the truth, prof, she's been acting [i]really weird[/i] these last few days.\" \n*fake_choice\n  #\"Now hold on a minute, Ian, we didn't discuss this. We're not going down there, no way. Not without heavy construction vehicles and some TNT.\"\n  #\"Let's assess this situation like calm, intelligent adults first, Ian. No need to whip that thing around, you know we're not supposed to have weapons on this expedition.\"\n  #\"Do you have another one for me? Let's go back to the hole and just unload on some f--kers.\"\nIan gets up, shoves the gun into his Navajo-crafted hemp-and-turquoise waistband, and looks you right in the eyes.\n\n\"The only thing that matters now is getting Jacy out of that damn tomb. I'm going, right now. Are you with me on this or not?\"\n*choice\n  #\"I-I'm sorry, Ian... you can go ahead, I'll get the authorities on the line and see if we can get any help out here.\"\n    *set bravery -10\n    *set wisdom +5\n    *set leadership +2\n    *goto refusal3\n  #\"Ian, you can't do this. Stop this macho cowboy bullcrap and take stock of our situation here. I need you up here, not chasing phantoms in some weird chamber in the middle of buttf--k nowhere. You're staying up here.\"\n    *set bravery -10\n    *set leadership -5\n    *goto refusal3\n  #\"Let's go. And if we ever see Dr. Avery Gonchar, I want you to put one in his chest and two in his head.\"\n    *set bravery +15\n    *set leadership +5\n    *set wisdom -5\n    *goto entertomb\n*label joinhim\nYou try and prop Gonchar up, but, despite his emaciated, bloodless state, he's as heavy as a Mack truck. You stagger under his weight, wondering what other laws of physics and biology are getting warped and twisted today.\n\nAs you head to the gate, Gonchar whispers something weakly, too softly for you to hear. You lean in close, smelling the acrid stench of bile in his throat. He mouths something again, but you can't catch it. You lean in even closer.\n\n\"What? What is it?\"\n\nGonchar looks up at you, his pupils dilated, huge purple spots under his eyes.\n\n\"I-I... need to t-tell you s-something.\"\n\nYour faces are close enough to touch, both darkened in the shadow of the alien statue. \n\n\"Is it important?\"\n\nGonchar smiles weakly, and shoves you in.\n*goto entertomb\n*label refusal3\nYou head back to camp in a huff, pissed off beyond belief that Jacy --Jacy, of all people!-- had abandoned you and the expedition in favor of chasing some spurious phantom. After all, you're not treasure-seekers, you're archaeologists. [i]Scientists[/i]. \n\nYou storm into your tent, zip up the flap behind you and find your headphones. You plug them into your ancient, worn-out MP3 player, but of course it doesn't work, the battery must've drained while you were out dealing with insane morons all day. Rather than fire up the gas generator outside to charge it, you toss it back into your pack and hit the sleeping bag like the fist of an angry god. Within seconds, you drift off into sweet, sweet sleep...\n*page_break \"Prof, are you awake?\"\nYou open your eyes. It's dark outside, but you can see Ian's familiar visage outlined against the orange walls of your tent. Shadows leap and dance against the wall behind him.\n\n\"Ian? You [i]know[/i] you're not allowed in here.\"\n\n\"I know, prof. But Jacy's got something to show you.\"\n\n\"Jacy?! She's back? Alive?\"\n\nIan rolls his eyes. \"Well, yeah, obviously. Aaaaaanyways... you might want to check out this thing she got from the tomb. Looks legit to me, but, hey, you're the expert here.\"\n\nYou bolt out of your sleeping bag and out the tent. Outside, a huge bonfire illuminates the night sky. Jacy is there, crouched over, hugging her knees to her chest and rocking back and forth.\n*page_break \"Jacy? Are you...?\"\nShe doesn't seem to hear you, so you approach and crouch down in front of her. Without so much as glancing at you, she tosses a small bag that jingles as it lands at your feet. You open it, expecting coins --always an archaeologist's best friend when trying to date a tomb-- and find some far more unexpected.\n\nIt's a hairpiece composed of nine gold medallions strung along a gold chain. On the front of each medallion is the picture of a tall, thin woman riding a horse. On the back: \"[i]Borte - Khairtai[/i].\"\n\n[i]Borte. My Love.[/i]\n\nYour breath catches in your throat. If this was some other khan, he certainly had it in for Genghis' wife.\n*page_break \"Uhhh, Jacy?\"\n\"Where did you get this?\"\n\nYour assistant continues looking down at the ground in silence. You bend down near her, and ask again.\n\n\"Jacy? Jacy, can you hear me? [i]Where did you get this?[/i]\"\n\nA deep voice answers behind you. \"From the tomb of The Great Khan, of course. Who else would be buried with a relic like that? It should be obvious to even a third-rate manure salesman such as yourself.\"\n\nYou turn around. [i]Gonchar[/i]. Except... not at all how you remember him. This one is healthy, tanned, confident, with a voice at least an octave lower than you remember. His eyes smile as he nonchalantly whisks the priceless hairpiece from your grasp, toying with it idly.\n\n\"We found this, and much more. [i]Much[/i] more. But... I didn't find what I [i]really[/i] wanted. Just weapons, personal possessions, jewelry... useless trifles.\"\n\nYour eyes light up in anticipation, your heart soaring with the thrill of discovery. Such a find, if true, would be one of the greatest hordes in archaeological history, a once-in-a-trillion opportunity. You try and mask your excitement, trying to stay calm as you get more information out of your enemy.\n\n\"B-but I saw you... you were, pardon me for saying so, but you looked like you were about to step through Death's Door.\"\n\nGonchar laughs.\n*page_break \"That is exactly what I did, my friend.\"\nHe slaps you, hard, on the back. \"So, you are intrigued, I see. As well you should be. Will you be joining us this time, in our next foray into the tomb? I would love to have you along. You can keep all the trinkets you find... except one.\"\n\n\"Listen, Gonchar, first things first. What happened to Jacy? How did you two get out? What, exactly, is down there?\"\n\nGonchar smiles, and rubs his belly. \"All excellent questions, my friend, excellent questions. Will you join me? I was planning on going back down right now, it's quite fortunate you're here --I didn't intend to wake you-- and I can answer any questions you have along the way. Much of it, I suspect, will be self-explanatory once we're inside.\"\n\nGrudgingly, you consider it. \"But what about Jacy?\"\n\nGonchar looks down at her in surprise. \"Ah, yes, of course. The girl. Jacy... up!\"\n\nJacy gets to her feet, an odd expression in her eyes. You turn to face her.\n\n\"Jacy... are you--\"\n*page_break \"I'm fine,\" she snaps. \"Now let's get this over with.\"\nThe three of you --four, once Ian tags along, shouldering a large canvas bag-- head for the tomb. Once you get there, you're shocked: the roaring, tar-black river is, once again, a gentle, bubbling brook, no deeper than five or six inches. The waterline doesn't even reach the lip of the massive iron door, and just barely covers the feet of the disturbing guardian statue. The mud on the riverbank, once stained dark red with blood, is a bland, pebble-strewn shade of brown.\n\n\"What happened to all the water?\"\n\nGonchar swats the air, as if he's shooing away such an inane question. \n\n\"You mean the torrents? Gone, of course. Did it's purpose, and returned whence it came. Now, isn't that a beauty?\"\n\n\"But the statue... it wasn't there two days ago, when the stream was--\"\n\n\"$!{name}, $!{name}, $!{name}, you bore me with your questions. Come, let's get inside! It's time for you to see what only Jacy and I have seen, amongst the tens of billions of humans who've lived and breathed over the last 800 years. The discovery of a lifetime... and beyond!\"\n\nYou glance back at Jacy to see what she thinks.\n*page_break Her eyes are welling up with tears...\n\"Jacy, what's wrong?\"\n\nGonchar twists you back around so that you're facing the entrance. \n\n\"Do you want to do this, $!{name}, or not?\"\n\n\"Well... yeah, but--\"\n\n\"Great!\" Gonchar bellows. \"...sucker.\"\n\nWith almost supernatural strength, Gonchar shoves you into the tomb. You fall backwards into the darkness...\n*goto entertomb\n*label openthetomb\nGonchar grins. \"Ah--a seeker! I knew it was not a mistake to bring you into my confidence... others were not so wise...\" Gonchar sighs, and shakes his head. \"But they're old problems. It's just you and me, now, ready to make the most important discovery in all of human history. Are you ready?\"\n\nYou raise an eyebrow. \"[i]All[/i] of human history? Isn't that a little bit of an... exaggeration?\"\n\nGonchar laughs. \"You still think we're talking about the [i]tomb[/i] of Genghis Khan, don't you? Not to worry, you'll see soon enough. Come. We've an appointment with immortality.\"\n*page_break\nIntrigued, you follow Gonchar down to a tiny, quiet brook nestled between the camp and the dig site. It's been your primary source of clean, fresh water --though Ian continually lectures you every time you put a potable water pill in your canteen. Nature-Boy drinks it straight.\n\nGonchar walks around in the ankle-deep water for a few minutes, looking intently for something. You stand on the shore and watch, wondering what, exactly, this crazy sumb-tch is doing. Did he drop a key? Is he panning for gold? Searching for the big 'X' on the ground that marks where to dig for treasure? \n\nSuddenly, Gonchar stands perfectly erect, clutching the disturbing book to his chest. He shudders, then makes a whining, high-pitched animal noise. After several minutes of squealing like a gut-shot deer, Gonchar, now covered in sweat, stops and looks directly at you. He utters a single word in some unknown language --it sounds more like a large fish choking to death than any known human sound-- and points both of his fists in the direction of your face.\n*page_break Pain erupts from every inch of your skull...\nYou collapse to the dirt, wracked by unimaginable pain. Fifty yards away, someone looks down the barrel of a gun and laughs. Five miles away, a young man nervously cheats at a card game for the first time. Fifty miles away, a toddler urinates on a busted-up sidewalk. Five thousand miles away, a woman presses the edge of a dirty scalpel against a wart on her nose, and steels herself. \n\nIn a flash, everything is back to normal. Your head still feels a little woozy, but the images from a moment before dissipate into forgetfulness. Gonchar is still standing there, his fists pointed in your direction, mumbling something in a low tone of voice. Your headache is gone, but you feel feverish across your body, your temperature getting higher and higher.\n\n*fake_choice\n  #\"Gonchar!! Stop this at once! I've changed my mind!\"\n  #\"Gonchar! You need to tell me what's going on!\"\n  #\"Is that all you got!? BRING IT ON!!\"\nGonchar doesn't say anything: he just grins. Your body temperature continues to skyrocket, until it feels like every inch of your skin is afflicted with fever, that your internal organs are liquefying into sweat. You try to stand up and approach him, but your muscles are too weak and flaccid, and you fall onto your back, limp as a ragdoll.\n\nYou stare up helplessly at the dark purple clouds rolling miles above you, wondering if that incident at the guard station a week ago was the final time you'd ever seen sunlight. \n\nA moment later, Gonchar's head appears in your field of vision. He studies your features for a moment, asks you a question in English that you can't understand. He brandishes a large, ritualistic-looking dagger of jade and bone... and smiles.\n*page_break \"Now you're ready.\"\nHe grabs your wrist. Something hard and sharp presses against it. A moment later your wrist is wet with blood: steaming, smoking, blood. Gonchar cuts your other wrist, and behind both knees, letting a stream of your life-fluid spill into small trenches of concentric circles in the sand. \n\nAs they fill up, the searing heat in your body gradually morphs into an icy chill. Too weak to move, you wince when the quiet bubbling of the brook turns into a deafening roar, the shadow of the rising waters casting its shadow over your prone form. The earth shakes beneath you as you hear an ear-splitting [i]CRACK[/i]... and then all, save the rushing sound of water, is quiet again. \n*page_break \"Finally... it's time.\"\nGonchar pulls you up to a sitting position. You look down at your hands and feet, now sheet-white and paralyzed. Before you is a massive iron door, an ominous structure that could not possibly have been there a few minutes before. Standing in front of it is a truly disturbing statue of black onyx: it looks more like the charred, starved corpse of a half-human skinned jackal than the usual beefy tomb warrior-types you're familiar with. \n\nThere's something... [i]odd[/i]... about the statue, but as you try and focus on it, you black out from exhaustion. One second and a sharp slap across the face later, and Gonchar is once again in your limited field of vision, pouring some unknown, viscous fluid down your throat. \n\nIt tastes like an old cup of grape kool-aid that someone put their cigarette out in.\n*page_break \"This will make you feel better...\"\nYou snap to attention, the feeling returning in your limbs. You still feel woozy and uncoordinated, but at least you can breathe, move, and act. You try to stand up and fail, feeling like a newborn colt just learning to walk. Gonchar grabs you under the armpit and hauls you up to your feet, then gestures at the door.\n\n\"Mankind has only ever had one real dream, $!{name}. And it's link to our reality lies in there. Come, make history with me!\"\n\nBefore you can answer, he shoves you in the back. You stumble forward into the gaping darkness.\n*page_break\n*goto entertomb \n*label entertomb\nYou shudder, then come to in complete darkness. You don't remember how you got here, waking up on a cold stone floor --weren't you just stepping through the gate a half-second ago? And where is everyone?-- but your body feels like a million insects are buzzing just under your skin, inside your internal organs, and in your skull. \n\nYou shake your head from side to side to get the buzzing to stop, and it lessens, somewhat. Fumbling for your favorite flashlight, you find your arms sluggish and unresponsive, moving as if you were encased in thick molasses. \n\nFinally, after some difficulty, you flip the flashlight on and get your first look at this strangely-concealed chamber.\n*page_break Your heart jumps in your chest when you see it...\nAll around you, filling the room with silent horror, are two dozen statues frozen in various twisted and tortured poses. Charred-black and chiselled into loathsome, almost sub-human shapes, the detail on the sculptures is as sharp as the day they were carved. From their mode of dress and startlingly lifelike features, you deduct that these were the Khan's royal servants. No surprise there: servants were frequently buried along with the divine ruler they served. \n\nBut going through the trouble of carving intricately detailed statues, then burning them until they were black and ashen, is definitely outside the norm. \n\nAnd the cruelty necessary to capture the servants' expressions and body language as they are wracked with intense, unrelenting pain... the artist or artists who carved these statues was very likely some sort of sadist. The terror immortalized on their faces unnerves you, and you start to look for a way out.\n*page_break\nYou shine your light around the walls and ceiling, and see strange markings covering certain sections of the walls. Some of the writing is in Mongolian, some in old Jin Chinese... but most of it is in some oddly-geometric, unknown script, much of which seems hastily scrawled on top of the older writing. It's a little difficult to read in limited light conditions, but you squint your eyes at some of the alien script and realize... that you've seen similar markings before.\n\nIn Gonchar's book.\n\nYou reach up to touch it...\n\nAs your fingers brush the strange symbols, you are startled by a slight jolt, then have a strange sensation of thick, syrupy liquid flowing through the inside of your arm, from your fingertips to your elbow. You snap your hand away from the writing and point it at the floor, but the eerie feeling flows up against the pull of gravity, past your triceps and into your shoulder, up your neck, through the base of your skull, until finally--\n*page_break\nYou open your eyes. You're laying on the floor, your back damp with oily river water. You call out for Jacy, for Ian, even for Gonchar, but you hear no response. Slowly, you get to your feet, and realize that your flashlight is off, holstered in your pocket. You turn it on, realizing only then that your eyes have already grown adjusted to the pitch-black darkness of the tomb, and that the light from the bulb is quite painful to your eyes. Shrugging, you turn it back off and study your surroundings.\n\nAll around you are the statues, their faces illuminated by a faint, barely-discernible pale green glow. You brush past them, searching for a way out. Fortunately, the chamber is smaller than it looks, and you find a single doorway. Above it, in an intricately-sculpted arch, is the standard --if surprisingly flowery-- funerary language of a typical chieftain's tomb. Simple, yet elegant --with one minor exception. Where the name of the deceased would normally be, the carving has been crudely scratched out. In it's place is a single Mongolian word written in dark red ink: [i]TODQUR[/i].\n\n[i]Evil.[/i]\n\n[i]Danger.[/i]\n\nFantastic. You look around for another exit, sigh, and duck your head under the archway and into the tomb.\n\n*achieve findtomb\n\n*finish\n\n\n", "level2": "*temp shown_ad false\nYou stumble down the hallway in a daze, your feet nearly slipping on the wet, oily floor. The faint phosphorescent green glow of the walls lights your way as if you were walking under the light of an alien moon. Sweat drips off your brow --the heat and humidity in the tiny, enclosed space intensifies with each step. \n\nYou stop: you're positive you just heard something ahead of you. You close your eyes, focus, and hear the [i]thu-THUM[/i], [i]thu-THUM[/i] of some vast kodo drum in the distance. \n\n\"H-Hello...?\"\n\nUnlike the approaching drum, your voice leaves no echo. Dizzy from the heat, you reach for the wall to brace yourself, and your hand sinks half an inch deep into the slick, slimy surface. Instinctively you try and pull it back but it's stuck, trapped in viscous goo. You cry out, but no sound leaves your throat. The steady, rhythmic pulsing of the drum vibrates through your palm. As you try and scream, the pulsing gets louder and faster, as if it's [i]excited[/i]...\n*page_break\nYou whip out your flashlight and turn it on. \n\nBare dirt walls. Dirt floor. Utter silence.\n\nYou shake your head and chuckle, wondering if you should've packed some sort of instrument to indicate whether you're certifiably insane. \n\nYou shake your head, clearing the mental cobwebs clogging up your skull. Right now, you could really use some unbiased information from an external source. You check your phone: no reception, no messages. Low power --you didn't think to charge it before you descended down into a mysterious hole in the middle of the forbidden zone. If and when you finally [i]do[/i] make it out of here, your fellow academics at $!{school} are going to have a field day with your haphazard unprofessionalism. \n\nAh well. Screw them. You're down here, and they're not.\n*page_break Which reminds you...\nYou don't mind being alone, but you don't want to be alone in [i]here[/i]. Certainly, one or both of your assistants is down here, someplace --not to mention Gonchar, the King of the A-holes. Still in the tunnel, you put your hands to your lips and shout,\n*choice\n  #\"JACY!!\"\n    *set intelligence +4\n    *goto forkchamber\n  #\"IAN!!\"\n    *set leadership +2\n    *goto forkchamber\n  #\"GONCHAR!!\"\n    *set wisdom -5\n    *set blasphemy +5\n    *goto forkchamber\n*label forkchamber\nThe echoes of your voice fade into the darkness. You press ahead. \n\nJust a few paces later, you enter a small chamber. By design, it seems to have been the traditional final resting place of a khan's personal bodyguard --but several things are wrong. The chamber floor is littered with broken weapons and old corpses. You step cautiously into the chamber, trying to avoid the shattered spearheads, splintered arrows, and the hilt of a gold-plated sword attached to a blade that seems to have... [i]melted[/i] into a puddle on the floor. \n\nThe floors and walls are covered in the skeletal remains of around twenty to thirty heavily-armed warriors, but there are only two sarcophagi in the room. As a general rule, pitched battles don't normally take place within burial sites. \n\nSomething strange happened here. \n\nOne of the tombs' lids has been pushed slightly off its case. You shine the flashlight inside, and see the dignified remains of some legendary warrior, his archaeologically-priceless armor and weapons lain lovingly over his bones. The other tomb is sealed tightly, and you assume that --in the absence of a crowbar to validate your findings-- it's occupant is resting in much the same way.\n\nWhich means a pitched battle in close quarters happened [i]after[/i] Genghis Khan's two most trusted comrades were buried with their leader. \n\nA quick scan with the flashlight reveals something else...\n*page_break\nNearly buried beneath a jumbled pile of 800 year-old corpses is a door. It looks to be of solid steel construction, with a vast iron column nearly a foot thick bolting it closed... [i]from this side[/i]. Delicately stepping over and between the mixed skeletal remains, you approach the door to test its strength. A knock and a push later, and you're convinced that this is no ceremonial door protecting the remains of a great leader. The bolt alone probably weighs in excess of a ton, and the door could be up to two or more feet thick of solid, unbreakable steel. \n\nUnlike the vault of a bank, however, this door was never meant to be opened. It has no hinges, and seems to have been specifically designed to match the dimensions of the entrance exactly, so much that you couldn't fit a piece of paper through the crack. Even more strangely, the jamb around the frame is a thick, uneven, glassy ceramic material unlike the solid stone around it --almost as if the door was melted into place with intense heat.\n*page_break A cold draft at your knees startles you...\nYou look down. Three feet away from the door is a hole, crudely burrowed through the solid rock. The armor of the corpses around it looks as if it were turned to liquid and melted into the warriors' skin, before cooling off over the next few centuries. \n\nJudging from the shards of rock littering the floor beneath your feet, the hole was dug from the other side of the rock. \n\nAs if something was behind the door, in the actual burial chamber, something that required a few metric tons of steel to seal off. \n\nSomething that dug its way through solid rock, around the door...\n\n...and slaughtered thirty battle-hardened, veteran Mongol warriors. \n*page_break The cold air tickles the tiny hairs on your legs once more...\nYou bolt upright, trying to take it all in. Surely, this is not what it initially seems. \n\nBecause that would be [i]crazy[/i]. \n\nRemembering the hallucinations you'd experienced earlier in the day, you wonder whether you can trust what you're currently seeing. Reaching out to the hole --just a rough three-foot diameter tunnel in the stone-- you again feel an irregular burst of cold air. The edges of the hole are still sharp, as if clawed open by some manic beast. As you run your finger over it, it cuts you... and a single drop of your blood falls to the earth, not two inches from a another fleck of fresh, dark, red blood.\n\nSomeone else's blood.\n\nDo you:\n*choice\n  #Sprint back down the way you came?\n    *set bravery -10\n    *set leadership -5\n    *goto runback\n  #Search the area for more information?\n    *set intelligence +10\n    *set wisdom +5\n    *goto forksearch\n  #Cackle maniacally as you crawl through the hole?\n    *set bravery +20\n    *set wisdom -10\n    *goto hole\n*label runback\nThe reptilian instinct for self-preservation takes control of your body as you hurtle back down the tunnel. \n\n\"Thisiscrazythisiscrazythisiscrazy...\"\n\nYou stumble over rough spots, roll into a crouch and leap up to start running again. You smack into walls, their thousand year-old dust only momentarily slowing your momentum. Your heavy breathing drowns out the strange noises coming from behind you. \n\nYou run for what seems like hours, days, weeks stretched into months, never tiring, as gallons upon gallons of adrenaline fuel your muscles. You begin to wonder if you missed the exit, or indeed, if there ever was one.\n\nFinally, you come to the end: the tunnel slopes up sharply, tapering to a point.\n*page_break You see a familiar face...\nThere, in a narrow cut in the wall, is the statue you saw at the riverside guarding over the iron door. Gaunt and terrible, in the pale green glow it looks positively alien, an unsettling link to all the remote, unknowable crevices of the universe. \n\nSticky, translucent mucous drips off its skull, pooling around the spiny exoskeleton of its lower appendages. The effect is eerie, as if the creature's skin is melting off, exposing bone and sinew. Whether it's a trick of the pale light or your over-active imagination, the slick, wet statue seems to be [i]breathing[/i]...\n\nWhat do you do?\n*choice\n  #Get right up close and personal to the statue, investigating it for clues to any possible way out.\n    *set intelligence +10\n    *set bravery +10\n    *goto statue\n  #Back away slowly.\n    *set bravery -5\n    *goto backaway\n*label statue\nYou approach the possibly-inanimate object cautiously --and notice that the source of the liquid is a tiny drip of water directly over the statue's head. You wonder: are you under the river? Has the entrance been blocked up? Where did the door you came through go? Does that mean you're trapped down here, with whoever left that droplet of blood in the guard room... and whatever dug that hole 800 years ago?\n\nEver the professional scientist, you decide that any answers to these questions must be derived from the evidence at hand, not from useless speculation. You begin by searching the walls around the statue for any small handholds or other irregularities, but find nothing but slightly-damp rock. \n\nNext, you investigate the statue itself --surprisingly, it's ice-cold to your touch-- but after a few minutes of poking, prodding, and trying to lift it, you give up. As disturbing as it looks, it appears to be nothing more than an unseasonably frigid statue at the dead-end of a passageway. \n\nAfter taking stock of your situation, you decide there's only one thing to do...\n*page_break\nWithout a pick or shovel, there's no way to bust through the rock above. And even if you did, who's to say you would survive the ensuing flood of river water? You --and the other being down here-- must've gotten down here via some other means. \n\nWhich means you'll need to head back to the chamber.\n\nYou proceed slowly down the corridor, testing the roof, the walls, the floor, for any hidden weakness, any hidden passageway that would allow you to begin to make sense of it all. You wrack your brain, trying to remember the block of time between entering the tomb and waking up in this hallway, dazed and alone. Did you fall and hit your head? Inhale some spores from a narcotic underground fungus? You run your hands across your scalp, expecting blood or a large bump, but feel nothing. \n\nNot a minute later, you're back in the chamber of horrors. You look back: the statue --and the dead-end-- appear so much closer now, not much more than twenty feet, even after all that running you did to get there. You close your eyes and clench your fists: something isn't right. Something isn't making any sense.\n*page_break Collecting your senses, you step back into the chamber...\n*goto forksearch\n*page_break\n*label backaway\nYou take one tentative step back, then another, then a third, never taking your eyes off the gleaming statue and its lidless black eyes. A moment later you back into hewn stone, your hands scrabbling along the cool smooth surface for something to cling to. Finding nothing, you edge back along the wall, keeping your gaze locked on the statue, sensing in your gut that were you to let your guard slip, even for a second, the eerie creature will lunge. A rush of similar memories dredged up from your childhood --of psychic battles against ill-formed, shadowy menaces lurking behind your bedroom closet door-- fill your mind with their infantile inanity.\n\nYou laugh without smiling, then experience a moment of physical terror when your hand slides back over the stone and feels... nothing.\n*page_break Thrown off balance, you fall backward into the abyss...\nWith a [i]thump[/i] your upper back and shoulder slam against the stone floor. You reach over to push yourself up and feel something hard and sharp slice open the first three knuckles of your hand. Your heart pumps wildly. You get into a low crouch and fumble for your flashlight. You jab your injured hand into your pocket to retrieve it, then switch it on.\n\nThe burial chamber. You're back in the burial chamber.\n\nYou shine the beam back through the tunnel you came through. The statue is there, not twenty feet away, still locked in its tortuous pose. [i]Was it really that close this entire time? Why did it feel like I ran for miles then?[/i] \n\nYou move the beam down to your hand, now covered in dark blood. The gash is wide but not too deep, the result of brushing up against one of the many razor-edged ancient Mongolian weapons scattered around the room. \n\nWell, running didn't work. Time to think of something else...\n*goto forksearch\n*page_break\n*label forksearch\nYou take a deep breath to steel yourself, then proceed to investigate the room. You start with the hole itself: while it's only been a few minutes, already both droplets of blood are beginning to fade as they seep into the dirt floor.\n\nApparently, the source of that blood only beat you to this room by a matter of minutes. But who were they? What did they want? Where did they go?\n\nYou start to examine the walls themselves for clues, for any sort of hidden passage into or out of the chamber. Running your hands along the walls, you dust off the intricately-detailed carvings of some of Genghis Khan's greatest victories: Badger Mouth. Kara-Khitan. Khwarzem. Each battle scene is cast in wrought iron and covered in some sort of ancient rustproofing substance, its ingredients lost to time. As you study the artwork, all you can think about are the logistical nightmares you'd have to deal with in getting this out of... wherever this is... and into the museum of your choice. \n*page_break Then you notice something odd...\nYou nearly slap your head when it hits you: in each of these meticulously-detailed battle scenes, [i]there is no central figure[/i]. Normally, Genghis would be depicted front and center, leading the triumphant charge of the Mongol cavalry into the thick nest of enemy spears... but not here. Sure, you see the familiar depictions of his favorite generals, such as Jebe and Subutai. And the hilariously unflattering portrayals of his enemies, particularly the Shah of Khwarzem. \n\nBut no Genghis.\n*page_break Well, there [i]is[/i] one odd figure...\nIn each battle, behind the main lines but still positioned in an elevated place of command, is a solitary, thin, naked figure. Its arms outstretched, flanked by vast, swirling clouds, the ground around it slightly discolored with a strange form of rust... and drawn, each time, with no face.\n\nYou start to get dizzy. You weren't prepared for this. A decade of intense studying, lecturing, publishing... and right now, in this moment, you feel as if you know nothing. As you lean in closer, a voice, faint and weak, cries out for help.\n\nIt's coming from the hole.\n\nDo you:\n*choice\n  #Bolt through the hole to find the source of the voice?\n    *set bravery +10\n    *set leadership +10\n    *goto hole\n  #Ignore the voice, focusing instead on the odd carving in front of you?\n    *set bravery -10\n    *set leadership -20\n    *set blasphemy +5\n    *goto relief\n*label relief\n*achieve guilty\n\nA dark trickle of guilt shivers up your spine --but you're an archaeologist, not a doctor. Whether someone out there really does need help --or it's another hallucination-- a priceless work of history stands before you, and you're (presumably) the first scientist to witness it in all of human history.\n\nYou lean in to look more closely, slowly scanning the beam of your flashlight across the carvings. There can be no mistake about it: the naked figure, so similar in shape to a crucifix, is occupying a very commanding position in each battle. Except that he is not 'leading' [i]per se[/i]... his vast armies seem to be [i]running away[/i] from him, rather than following his command.\n\nAnd then there's the strange rust...\n*page_break \"Moving, isn't it?\"\nYou wheel around, the narrow shaft of light providing a glimpse of your old enemy. \n\nHe chuckles.\n\n\"You see it too. I knew you would.\"\n\nNot sure whether to brain him with your flashlight or give him a hug, you stare at him for a moment, hoping that he's not just another illusion. You close your eyes, take a deep breath, and open them again. He's still there, brushing his fingers across the carving.\n\n\"It's amazing what they were able to accomplish in such a short time, don't you think? Certainly, they must have started sculpting this years before his 'death,' but--\"\n\n\"W-what is it? What are these figures?\"\n\nGonchar gives you a smile dripping with condescending pity.\n*page_break \"A warning.\"\n\"I don't... I don't understand.\"\n\nGonchar dismisses your words with a wave. \n\n\"People fear anything that disrupts their false little worlds. And rightly so: there is a fine, thin line between survival and annihilation. Our distant ancestors knew this well; the artist who carved this, of course, experienced it first-hand. What you are seeing here is as close to the truth as any image ever recorded in human history, truer than any photo, any video, any thermal imaging scan. What we are doing here cannot even be measured in terms of history, or science... it transcends all human endeavours, all earthly possibilities.\"\n\nA cold chill runs down your spine. \n\n\"I'm here to find the final resting place of Genghis Khan.\"\n\nGonchar bares his teeth. \"Genghis Khan was a weak and helpless vessel, one that was quickly discarded when it ran its course. [i]We[/i] will not be so easily tossed aside... will we? No one becomes an archaeologist because they like getting ten-thousand year old dirt on their jeans. No, we sacrifice, we struggle, we starve, for the extremely unlikely chance that, one day, we can make our claim, that we can be acknowledged alongside some narrow strand of legend, even if
