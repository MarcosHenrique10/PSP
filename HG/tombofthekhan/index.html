ot because it was part of your plan; you've just always wanted to bite someone like that. \n\nGonchar screams. More importantly, he starts to struggle to get away from you.\n\n\"Maniac!! Cannibal!\"\n\n[i]Perfect.[/i]\n\n\"Hey, a--wipe. You remember telling me that the 'veil is thin here'?\"\n\nGonchar grunts, still trying to squirm out of your grasp.\n\nYou feel your power fading fast. Any second now, you'll just be some regular mortal, drowning in a pool of poison. Gonchar's strength doesn't seem to be fading, though. Not yet.\n*page_break It's now or never.\nYou close your eyes and feel for the barrier that separates this hellish nightmare from everyday reality. This would have been impossible before you set foot in the pool; now, it takes no more effort than checking to see if your shoelaces are tied. \n\nYou smile. The barrier is paper-thin.\n\nYour short-lived godhood is almost gone, drained by forces you can't pretend to understand. With your last remaining spark of divinity, you wrap the barrier around the two of you, rip a hole in the fabric and...\n*if (insanity > 150)\n  *goto slamwin\n*else\n  *goto slamlose\n*label slamlose\n...you both fall through the veil. You land on a hard surface, liquid mercury pouring into your eyes and mouth. Sputtering, you rise into a low crouch and wipe the toxic stuff from your eyes, but your hands are covered with the silvery fluid too. You instinctively reach for the edge of your shirt, but that, too, is now nothing more than tatters and rags.\n\nStill blind, you stagger away from the liquid. It splashes the top of your feet a little, but is no longer unfathomably deep. After just a few feet, you fall --and beneath your hands is dirt. Rich, granular topsoil, from the feel of it. You rub it all over your hands and forearms, then proceed to cover your face with it, hoping to scrub the mercury off your exposed skin. It works to an extent, and within a few minutes you're able to open your eyes.\n\nThe first thing you see is something you'd never expected to witness again: daylight. Lots of it, everywhere. A light breeze ruffles the top of your bare scalp. You wonder, briefly, what happened to your hair.\n*page_break\nYou try to open your eyes wider, but the bright sunlight sears your pupils. You close them tightly, and strain your ears to see if they work, but you hear none of the usual noises of the outdoors --no crickets, no buzzing insects, or tree branches shuffling in the wind. \n\nSo you sit. And wait.\n\nDarkness comes, but you still can't open your eyes. You fall asleep, though whether from standard exhaustion, from extreme starvation, or from lethal poisoning, you can't tell. Days pass and nights fall, far too quickly by your reckoning, and just as you're about to try and stand up and walk to shelter, you hear the unmistakeable sound of a diesel truck engine. \n\nVoices follow. Several at once, angry voices, confused, belligerent. Something soft touches your face, and, a few minutes or hours later, something hard and blunt smacks into the small of your back. The language switches from Mongolian to Russian to English to Chinese and back to Mongolian, but even though you could once speak all of these languages fluently, now they are just incomprehensible gibberish.\n\nIn time, you are laid horizontally on a bed, your stomach pumped, your veins cleansed, your eyesight and hearing restored. Officials from many, many different governments come, asking questions, but you pretend not to understand. How would they react to the truth? Dire threats are hurled at you, physical violence hinted at. Terrorism charges, environmental impact reports, military tribunals. But nothing they can do bothers you in the slightest. You have no desire whatsoever to talk to them. No need to explain.\n\nAlthough sometimes, you have to wonder....\n\nDid Gonchar make it out alive?\n*goto_scene ending\n*label slamwin\n...fuse yourself with your arch-rival.\n\nFor a split moment in time, neither you nor Gonchar technically exist. You move your subatomic particles into the vast expanse of space between his electrons and the nucleus they orbit, create a duplicate of these nuclei, then send them spinning incomprehensibly fast as you escape.\n\nThe entire process takes less than a fraction of a nanosecond, after which you are now behind him. His entire body hums in a high-pitched shriek. \n*page_break Then, with a well-placed kick in his rear, you send him hurtling through the gap.\nThere's a loud BOOM, then a POP, and then... nothing.\n\nYou glance around. You're outside now, surrounded by sweet, sweet daylight. A light breeze ruffles your hair, which has grown almost three full feet since you first entered the tomb. \n\nHas it really been that long?\n\nAll around you is devastation, the kind of scorched-earth hellscape you would expect to find at the exact center of a nuclear blast. Intense heat radiates from the ground in waves. It tickles you a little, so you rise into a low hover and begin to scan over your surroundings.\n*page_break It takes less than a second to find Gonchar.\nYou fly over to him, careful not to touch his charred, smoking corpse. Wisps of silver-black smoke rise from thousands of minuscule fires located across his body: the amount of pain you put him in will never again be experienced, not in a million universes.\n\nDid he deserve it? Well... you had to make sure. How else do you kill a god? Anything less, and it would've been you, lying there in a puddle of steaming mercury, blasted out of existence on the molecular level.\n\nYou stretch your arms out at each side, tilt your head back and roar. The sound --almost orgasmic-- sends a five hundred mile shockwave in all directions, knocking down trees and telephone poles, announcing your safe arrival to an unsuspecting planet.\n\nYou float back down to earth, close your eyes, and feel the land through your feet. Nothing at all stirs within three miles. Five miles away, a rodent emerges, dazed and dying, from her hole. Three miles past that, a snake spits a cockroach out of its mouth.\n\nIt's not for almost seventy-two miles before you find your first human: in a vehicle, hurtling away from the blast at a speed much too unsafe for the poor-quality road he's on. A hundred miles beyond that, men with heavy boots and expensive equipment rush into helicopters. A deer sniffs the air above a river, curious. Two peasants, illegally collecting wood near the Aral Sea, scratch the cancerous boils on their forearms.\n\nA phone call in Moscow, another in Beijing. Another call, to a quaint little place a quarter-mile beneath the surface of the Appalachian Mountains. You reach through, into the esophagus of the speaker, and tickle his throat. He begins to hack and cough. A twist of your fingers, and his neck snaps like a twig.\n\nYou grin. \n\nLet them come.\n*achieve letthemcome\n*goto_scene ending\n*label givein\nIf you're going to be a god, why half-ass it? You take a long, cool drink of this planet-sized tsunami of fury, giving over complete control of your mind and body.\n\nThe first thing you notice is the sheer amount of energy collapsing into your body. This is no temporary blast. No, this rage is nothing more than the concentrated frustration of quintillions of silenced, living creatures—the fury of unrecorded millions of annihilated planets, focused and channelled directly into the marrow of your bones.\n\nSuddenly every cell in your body feels like it's been stuffed with enough unstable plutonium to rip the sun in half. Your skull begins to split down the center, your skin to explode off your face...\n*if (insanity > 150)\n  *goto powerblast\n*else\n  *goto split\n*label powerblast\nYou cackle maniacally.\n\n[i]Such a tease[/i].\n\nLike a busy host preparing their house moments before the first guests arrive, you start to prepare your body to receive this galaxy-sized vault of energy. First you lower your consciousness down to the molecular level, and, chopping up the energy into infinitesimally small chunks, store it in the vast empty spaces between your molecule's nuclei and orbiting electrons.\n\nYou weren't really using that space anyway.\n\nNext, you set the energy influx to spin around the nuclei at faster-than-light speeds... making you quite heavy.\n\nSo heavy, in fact, that the rest of the earth's gravity shifts to roughly the area just below your belly button.\n\nYou've never felt so great in all your life. Why didn't you do this [i]years[/i] ago?\n*page_break \"$!{name}, you fool! You'll kill us all!\"\nYou turn to face Gonchar, just as you finish transforming yourself into a living, breathing sun.\n\n\"Mmmm?\"\n\nGonchar gives you a hard glare. You sense panic in his voice. His electrons begin to orbit in wild new ellipticals.\n\n\"You can't handle the power! Give it back to me! Give it ALL to me!!\"\n\nYou grin, bowing to him at the waist with an exaggerated sweep of your hand.\n\n\"As you wish, master.\"\n\nYou focus inward, searching for a specific cluster of molecules located in a small dab of visceral fatty tissue stuck to the bottom tip of your left lung. You'd come across it earlier, when you had made space to store a galaxy's worth of pent-up fury, and made a mental note to use it later. It wasn't much, by most standards --a fairly primitive planet, with the highest life forms exhibiting only the most rudimentary cognitive ability-- but those beings had seen you, in a younger, more raw time in the universe. They had befriended and worshipped you, then watched as you annihilated it all. They saw it all.\n\nAnd they were [i]pissed[/i].\n*page_break\nSqueezing off a little planetary-sized hatred, you focus it into an infinitesimally-small ball of blue-white light. Then you make another, and another, and a few more, until you are left with a swarm of hundreds of screaming little will-o-wisps of pure, undying fury, the kind of anger that, if left unchecked, would continue to simmer long after the heat death of the universe.\n\nYou let the tiny balls of hatred hover between the palms of your hands, just in front of your chest, the power flowing over your body in a pyro-orgiastic swirl of emotion.\n\nSatisfied, you redirect your focus outward. As you re-open your eyes, Gonchar swings and surprises you with a perfectly-placed haymaker to the face. \n\nCaught off guard, you lose control of the small cluster of cells on your cheeks holding the core energy of forty suns. \n\n\"Ah, shi--\"\n\nForty simultaneous supernovas explode in a six-inch square space, setting off a chain reaction millions of years in the making... and taking a fair-sized chunk of the universe with it. \n\nAt least you saw the light, and understood. All other forms of life --in a single flash, silent and blinding-- never even  existed.\n*achieve haymaker\n*goto_scene ending\n*label split\n...and you decide to use your newly-godlike power to control this colossal wave of energy, to focus it and bend it to your will.\n\nAfter three seconds, you realize your mistake.\n\nYour weak, frail physical body is no match for your metaphysical ambition. The skin on your arms hardens into dry, dusty white-hot concrete, then splits at the seams. Boiling blood evaporates through your artery walls. Your charred and blackened organs crumble to ash, and your skull splits perfectly down the middle to allow the plume of steam from your sizzling brain matter to escape. The uncontrolled surge of energy sprays malevolent chaos across your solar system, and the resulting planet-sized explosions send your individual molecules spinning off into the empty reaches of space.\n*achieve splitskull\n*goto_scene ending\n*label takehim\nYou crouch down and run your hand through Ian's hair, peering off at the door Gonchar disappeared through. You can't go on without him... but you also don't want Gonchar to get [i]too[/i] far ahead of you. \n\nAfter all, it's not like you have any idea of how to escape this place.\n\nYou bend over his shivering, foetal form to whisper in his ear. A coppery, acrid scent fills your nostrils.\n\n\"C'mon, Ian... we've got to move.\"\n\nNo response.\n\n\"Ian, man, it's time. Take a moment to pull yourself together... but we've got to get out of here.\"\n\nA faint half-whimper escapes from his lips. Starting to get angry, you lean over to shake his shoulder. As your fingers brush against his shirt, he flops over onto his back.\n*page_break The bottom half of his shirt is covered in bright pink blood.\nYou jump backwards and lose your balance, slamming into the wall behind you.\n\n\"Ian! IAN! What the--what the hell?\"\n\nIan's mouth makes a bubbly noise. His right hand clumsily paws over the blood-stained section of his shirt.\n\n\"Ian! Godd-mnit, you stupid... stay with me, Ian, just-- let me... s--t.\"\n\nYou fumble for the bottom edge of his shirt, and cringe at the touch. It's sticky but comes off his skin fairly easily, and after a minute you carefully peel back the shirt up to his chest. Underneath, his belly is covered in bright, reddish-pink blood.\n*page_break You stare down at the carnage for a second, before realizing that blood isn't normally pink.\nYou start to wipe it off with your bare hands, but a constant trickle of pink blood just replaces whatever you've wiped away, making progress impossible. After a few minutes of this --and remembering that your shirt is, in fact, your lucky \"dig\" shirt, and not to be ruined under any other than the most dire life-and-death emergency circumstances-- you get into an awkward, one-legged crouch, just to wipe the blood off with your leg. It seems to do the trick: one soiled pant leg and a few swipes later, you see the source of the problem.\n\nThree small, bullet-sized holes in his abdomen, each one oozing a small amount of the bright reddish-pink fluid. You don't know how they got there --you remember hearing three gunshots-- but you do know one thing:\n \nBullet holes don't normally have eyes.\n*page_break The middle one turns to you and blinks.\nAfter a minute of dry heaves, you collect yourself and re-assess the situation. Careful not to come into contact with any of the three eyeballs, you nevertheless clear away enough fluid to see that, yes, your most disgusting fears are indeed confirmed.\n\nThree bloodshot eyes nestle in Ian's abdomen, each one secreting pink ooze around their crusty, red rims. The eyes stare at you, blinking at staggered intervals that somehow make them even more repulsive.\n\nYou wave your hand to the right to see if they can see you, but the eyes don't react. It's only after you shift to Ian's other side that you notice they follow the movements of your face. Suppressing the urge to jab one out with your finger, you ignore the abdominal orbs and lean in close to Ian's ear.\n\n\"Ian... Iaaaaaaannnn... I'm here, it's me, $!{name}. I need to you pull it together, and help me get us out of here. Are you still there? Are you with me, Ian?\"\n\nIan sighs deeply, his extra eyes blinking rapidly as his belly rises and falls. \n\n\"Uggh... ok... Ian, it's time. Time to get up. Time to get moving. Time to get the hell out of this place.\"\n\nIan shakes his head, ever so slightly, then moves his hands over his stomach. His lips part, just a sliver, before issuing a tiny stream of inaudible words.\n\nYou lean in even closer, putting your ear up to his mouth.\n\n\"What's that, Ian? What did you say? Speak up, it's hard to hear you.\"\n\nHe jabs his thumb underneath one of the eyes in his stomach, twisting and turning it until it's plucked out. Then, before you can react, he pops it into his mouth and starts chewing. Pink fluid oozes from the corners of his mouth as he opens his mouth and whispers:\n*page_break \"Please... eat the others.\"\nHis breath smells like death. You can't imagine a more physically repulsive request. \n\n\"Ian, I... c'mon, we'll cover these up, get you up on your feet--\"\n\n\"[i]please.... [i]you... must...[/i]\"\n\n\"Ian, for chrissake, pull yourself together! Under no circumstances will I EVER--\"\n\n\"$!{name}... just do this... one thing... for me...?\"\n\nYou pause. No one ever mentioned this possibility in Archaeology 101. Do you:\n*choice\n  #Ignore his request, pull his shirt back down, and try and lift him to his feet?\n    *set bravery -5\n    *set wisdom +10\n    *set intelligence +10\n    *goto noeyes\n  #Follow his wishes, and get it over as quickly as is humanly possible?\n    *set bravery +20\n    *set wisdom -10\n    *set intelligence -10\n    *set insanity +40\n    *goto eateyes\n*label noeyes\nSlowly, delicately, you uncoil the bottom edge of his shirt, until it once again covers his entire abdomen. The reddish-pink fluid stains your hands and wrists: you'd pay a year's salary for a box of industrial-strength disinfectant right now.\n\nYou get into a weightlifter's crouch and arch your back, prepping it for the heavy weight it's about to lift in the next minute. You briefly ponder leaving Ian and his disgusting belly alone here to rot, then quickly correct yourself. \n\nIan is your friend, god----it. More than that, he's a human being in need. \n\nPositioning yourself behind him, you get a good grip under his armpits, then lift. Much to your surprise, he comes up light as a feather, as if you were lifting a small, boneless child.\n*page_break Then he turns around...\nIan smiles, a rictus grin that you've seen somewhere before, though you can't quite place it. He stares deeply into your eyes and brings his hands up to your face, caressing your cheeks. His voice croaks out a few words; a raspy, scratchy, deeply unsettling sound.\n\n\"[i]...you may be blind, but I will see...[/i]\"\n\nIan rams his thumbs into your eye sockets. Excruciating pain rips through your face and head. You fall to your knees as everything goes dark. You vomit, first from the pain, then from the loud chewing sounds coming from just over your head. \n\nEvery muscle in your body convulses with pain. Thick, viscous fluid pours from the holes where your eyes once were, down your cheeks and onto the floor. You bring a hand up to your face, feel two long strands of nerves, and nearly black out from the agony. \n\nIan's voice rings out above your crumpled form.\n\n\"Ahh... much better. Now... for the rest of you.\"\n\nYou try and speak, but your face is numb and unresponsive.\n\n\"Hold still, old friend.\"\n*achieve oldfriend\n*goto_scene ending\n*label eateyes\nYou pause for a moment, stalling until you can think of a better plan.\n\n\"Ian... I'm not sure I really want to do this.\"\n\nIan responds with a shrill, nasal, inhuman wail. The sound hits your nerve endings like an electric shock, sending ripples of disgust through every muscle in your body.\n\nYou crouch down over his abdomen to get a better look at the eyes growing there. The two remaining ones stare back at you, blinking irregularly, in a sort of curious anticipation. Slowly, you bring your finger to one to see if it will close its eyelid before you poke it. \n\nDistressingly, it does not.\n\n\"Ian... Ian, you're going to have to help me out here. I don't think I can do this for you.\"\n\nA raspy [i]hissssss[/i] escapes Ian's lips, then he doubles over in pain. His body contorts briefly, then lies still.\n\nIan's stomach rises and falls, but you can't hear him breathing. The central eye looks at you, intelligent, questioning. Do you:\n*choice\n  #Cover Ian's disgusting stomach back up, carry him up under your shoulder and press on?\n    *set wisdom +10\n    *set leadership +15\n    *goto noeyes\n  #Jab your thumb right the hell into that d-mn eye, pluck it out, and go to chowtown?\n    *set wisdom -10\n    *set leadership -5\n    *set insanity +40\n    *goto eatem\n*label eatem\nYou stare at the central eye. It stares back.\n\nForgoing any ceremony, you jab your thumb into the eyehole.\n\nIt sinks in surprisingly easily. Maneuvering between the edge of the eyeball and the lip of the hole, you thrust it deep, get underneath the eye, and lift. The sensation is not unlike removing a rogue strawberry from a cup of thick yogurt.\n\nA moment later, you're holding the eye between your thumb and forefinger, locked in a staring contest with a disembodied body part.\n\nIt blinks; you blink.\n*page_break It blinks again; you pop it in your mouth.\nYou weren't sure what to expect when you got this far --maybe a mucous-y, slimy ball oozing down your throat and making you retch-- but you certainly weren't expecting a sudden explosion of color and sound. Vivid lights, cacophonous noise, and pungent smells overwhelm your senses, filling your puny mortal mind to bursting with a non-stop barrage of stimuli. \n\nA thin surge of electricity ripples through you, starting at your head and coursing down into your extremities, until your entire body is humming with a slight vibration.\n\nA breath later, everything around you stops.\n\nYou open one eye: you are no longer in an underground burial chamber, searching for the lost tomb of one temporarily-successful tribal chieftain. For this one moment, your cares, your personal problems, your worries for the future --all of these anchors to the material world are suspended as you hover in a small pocket of unreality, nestled snugly between time and space, in which none of that matters, or ever mattered, or ever could matter.\n\nThere is no air here, but you inhale deeply all the same, trying to acclimatize yourself to your new surroundings. This place is so peaceful, so calm and wonderful. Frankly, you're having a hard time even remembering what it was like before you came here, or even how long you've been here... perhaps since the beginning of time? The past is less than a memory.\n*page_break Something tells you that you're not alone...\nA laugh. Your reverie is broken by a shrill, too-familiar laugh that grates on the very marrow of your bones, forcing the hairs on the back of your neck to stand at attention. You look around.\n\nThere are several other entities here. One lay at your feet, a weak signal sporting a glimmering pink jewel in its midsection. You reach down to pluck the jewel away, stuffing it in your pocket for safekeeping. \n\nAnother entity is shielded, by both distance and some sort of obstruction. You can't sense it too clearly, but get the feeling that it's a female. And in tremendous danger.\n\nBut it's the one behind you that has your nerves on edge. You wheel around to face it, head-on.\n*page_break \"Ah, $!{name}, what strange, strange things you've eaten to-night.\"\nThe aura of peace and calm dissipates instantly. You're back in a cold subterranean chamber, facing the door Gonchar disappeared through earlier. Ian is still laying motionless on the ground. Something is bulging in your front right pocket.\n\nYou reach into your pocket and feel something slimy and spherical. \n\n[i]Oh yeah, of course. The other eyeball[/i].\n\nYou pull it out to study it. It looks exactly like the other one. It even blinks the same, as it stares at you, bloodshot and red-rimmed. \n\nYou feel a strong urge to return to that quasi-peaceful place, despite Gonchar's presence. Should you risk it and pop this other eyeball, hoping to experience that strange, quiet bliss? Or do you toss it back to Ian?\n*choice\n  #Even if it's just for a few seconds, it's worth it to go back to that serene, idyllic place free of cares and worries.\n    *set wisdom -10\n    *set insanity +10\n    *goto timespace\n  #That place was just a mirage, an illusion... and a short-lived one at that. Time is of the essence here: if you keep farting around chasing ghosts, you're going to end up a ghost yourself in this hellish tomb.\n    *set wisdom +10\n    *set insanity -10\n    *goto tosseye\n*label tosseye\nYou gently toss the slimy thing back at Ian. It lands on the soaked portion of his shirt with a little [i]plifsh[/i]. You turn to study the exit. Regardless of whether or not Ian can hear you, you opt to talk out a plan of action.\n\n\"Ok, Ian, we're going to have to get serious here. Gonch--\"\n\nTwo powerful hands grip at each side of your mouth and pull. You gag, nearly passing out from the unexpected, sharp pain ripping through your face. You clutch helplessly at the hands, which seem to be made of solid steel ship's cable, all titanium veins and concrete muscle.\n\nA split-second later, the pressure on one side of your face eases, as the hand disappears. Your brief sense of relief is short-lived, however, as a moment later something hard and sharp and jagged is shoved down your throat. \n\nBoth hands then grip your jaws shut with unrelenting force, as if your skull is caught inside an industrial-strength vise. Unable to breathe, you swallow the object, and immediately know you have made a mistake: the unknown object starts tearing up your esophagus from within, inch by painful inch, like a jagged little ball of bent and warped razor blades. Within minutes, small but deep gashes appear down the length of your throat as the skin is pierced clean through from the inside.\n\nAs the edges of your vision fade into foggy black mist, you begin to laugh. [i]Never turn your back on an illusion[/i], you remember your grandpa telling you. You try and chuckle, but the air build-up gets caught in your throat, unable to squeeze past the spinning, rotating blade ball wrecking havoc there. The pressure builds, and builds, and builds, until a small pocket of air erupts from your throat, defiant and weak, at the same moment that the jagged little sphere erupts from your Adam's apple. The last thing you see is a thick cloud of blood-red droplets spraying all over the wall in front of you.\n*achieve jagged\n*goto_scene ending\n*label timespace\nYou roll the second eyeball in your fingers for a bit, then pop it in your mouth like a gumball. It slides down the back of your throat without any help from you --almost as if it was capable of independent motion-- and a moment later you feel a slight buzzing sensation in the pit of your stomach.\n\nThe odd tingling sensation slowly spreads, first to the rest of your torso, then creeping down the length of your limbs and up into your neck. Within a minute, you feel it at the back of your eyes, and just inside your ear canal.\n\nOther than that, you feel no difference whatsoever.\n*page_break That is, until you feel, rather than see, Ian rise up behind you...\nYou wheel around to face him. His eyes are a little glassy, his shoulders hunched, his face pale... but otherwise, he seems fairly normal.\n\nYou decide to test him.\n\n\"So, feeling better? Taking those three bullets to the gut must've stung a little.\"\n\nIan stares at you with glassy, zombie-like eyes for a moment, before the lights come on inside his head.\n\n\"I got shot? Wait, what? I thought I just had really bad diarrhea.\"\n\nYou chuckle.\n\n\"Well, let's hope not. This cave is pretty cramped, and a single squirt could render us unconscious in these less-than-ideal ventilation conditions.\"\n\nIan snorts in derision. He opens his mouth to make a snarky comeback, then stops, his mouth open, his eyes staring at something behind you.\n*page_break \"Uhhh, $!{name}... I think we've got a problem.\"\nYou turn around. Two plumes of thick black smoke issue from the door Gonchar disappeared through.\n\nWithin a split-second, your nose tells you that the source of this smoke is far, far more vile than the worst case of subterranean taco s--ts.\n\nIan grabs your shoulder as he starts to gag.\n\n\"Uggh... what the hell do you think that is?\"\n\nThe smoke is thick, almost greasy: you're not sure how you know this, but you're certain this is no ordinary smoke. As it fills your mouth and nostrils, you're reminded of the time your uncle gave you a cigar when you were ten, and forced you to smoke it. This stuff is even more solid, more sandpapery somehow --even as you stall, you feel it scratching the insides of your mouth and throat like tiny shards of glass embedded in steel wool.\n\nSomething evil is happening just on the other side of that door. Do you:\n*choice\n  #Close your eyes, cover your mouth, and charge through the doorway, peril be damned?\n    *set bravery +20\n    *set wisdom -10\n    *set insanity +10\n    *goto headsmoke\n  #Close your eyes, cover your mouth, and slink away from the source of the smoke, and live to fight another day?\n    *set bravery -20\n    *set intelligence +5\n    *goto runsmoke\n*label runsmoke\nYou turn to run but it's too late. The membranous portal behind you erupts in billowing black sludge. A tidal wave of noxious, tarry substance knocks you to the floor, then crashes over you, filling every exposed orifice in your body with jet-black pitch. \n\nBlind, deaf, mute, and unable to breathe, you flail about for a few minutes, until the darkness within matches the darkness without...\n*goto_scene ending\n*label headsmoke\nYou grab a unsuspecting Ian and, fighting a knee-deep surge of tarry black fluid pouring through the door, dive through the membranous portal. Passing through it is surprisingly easy, as the two of you slide through with a sickening [i]shlissp[/i]. \n\nEven more sickening, though, is what you find on the other side: a full-scale close-up, just three inches away from your face, of Gonchar's bare a-- and balls. \n\nYou hear a low rumbling, and bolt to your feet in the nick of time, just as Gonchar's sphincter jettisons a hundred or more gallons of vile, noxious tarry fluid onto your shins and feet. You stare in disgust at the thick pool of oily, jet-black mystery substance when it happens again. You dodge to the side to avoid the bulk of it, but Ian is not as quick, nor as fortunate.\n*page_break A quick glance around reveals the problem...\nThe three of you are in a long, rectangular room which appears to be carved of richly-marbled volcanic rock. A small lavender light seems to originate from the far end of the room, roughly thirty feet away, though you can't quite see the source. Running down the length of the entire room, directly in the center, is a small, one-row garden of ripe black currants, glistening as if they'd just been cleansed by a sweet afternoon rain.\n\nGonchar is at the end of the row of berries, naked and on all fours, sh-tting what appears to be a swimming pool's worth of inky black pitch. His face, already pale in the best of times, is whiter than bleached chalk, his features locked in a deathly grim expression.\n\n\"G-Gonchar? Gonchar, are you...?\"\n\nA stream of black urine shoots out of his sphincter in a thin, inch-thick line. The excess fluid seeps through the membranous doorway, which, other than the splatter, looks much like it does on the other side.\n\n\"Gonchar? Gonchar! Tell us how--\"\n\nIan grabs your shoulder and twists you around.\n\n\"I know what's happened here, $!{name}.\"\n\nYou're genuinely surprised. \n\n\"You... you do?\"\n\nIan nods and points toward Gonchar's head.\n\n\"Yep.\"\n\nYou follow his gaze until you see it.\n*page_break There, directly underneath Gonchar's deathly visage, is a half-eaten black currant.\nAs you watch yet another deluge of oily tar erupt from Gonchar's bare a--, something unexpected happens.\n\nYou're suddenly hungry. Ravenously, insatiably hungry.\n\nYou glance down at the currants. They appear to be fresh, clean, and juicy. And the facts are, you haven't eaten in ages --at least several hours, if not several days. You're weak, and shaking, and a strong tingling sensation in the pit of your stomach is trying to get you to eat one of those delicious berries.\n\nBut then you look at Gonchar's rigid, ghostly expression, and know that maybe this is not the time or the place to devour the first thing you see.\n\nYou turn to Ian, and immediately see the face of a starving-yet-conflicted man. He, too, is staring down the barrel at those berries, going through the exact same thought processes that you are. \n*page_break You've got to fight this urge...\nYou walk down the length of the room, which doesn't take long, and study the contents. From the other end, the view towards the entrance looks no different: a straight line of currant shrubs, backlit by some unknown, but pleasant, lavender light source. Only Gonchar's filthy, prone form is any different. That, and the total lack of a way out. You head back.\n\nYour hunger increases almost exponentially with every step. By the time you get back to the entrance, you can think of nothing other than the black currants.\n\nIan is already on his knees alongside Gonchar, rocking back and forth, staring at the juicy morsels.\n\nYou try to weigh the pros and cons, but your mind is muddled, your thinking hazy, your ideas impossible to grasp. Ian taps you on the knee and nods his head slightly, giving the berries --and Gonchar's suffering form-- a sideways glance. Do you:\n*choice\n  #Do the obvious thing. There's no way out here; this is a dead end. No time to waste in this obvious trap. Just grab Ian and go.\n    *set wisdom +10\n    *set intelligence +15\n    *goto nocurrant\n  #Do the obvious thing. Those berries are not just berries; your body is craving them for some unknown, possibly supernatural, reason. You've already swallowed a pair of gross eyeballs, why stop now?\n    *set bravery +20\n    *set wisdom -20\n    *set insanity +30\n    *goto yescurrant\n*label nocurrant\n\"C'mon, Ian, this is a dead end. There's nothing here.\"\n\nYou force your ravenous hunger into a deep, deep place, and walk toward the exit, grabbing Ian's shoulder as you pass by.\n\nHe snarls.\n\nYou stop and look down. Both Ian and Gonchar are on all fours, and both are staring up at you with strange, almost bestial looks on their faces. Ian's chewing a mouthful of black berries, while your former arch-nemesis is leering at you with an unnerving rictus grin, covered in his own filth. \n\nYou back away slowly.\n\n\"Ian, that... that wasn't very smart. Those berries are real s--t stirrers. And Gonchar --Avery-- it's good to see that you're back, but frankly, you're not looking so hot righ--\"\n*page_break The two howl with rage as they lunge across the room at you.\nWithin half a second, you're battling for your life against two madmen with the strength of gorillas on PCP. Both Ian and Gonchar rip into your arms, torso, and head with their teeth, gnawing flesh and crunching bone and skull. The three of you devolve into a many-limbed mass of spurting blood and snapping bone, as two terrible mouths attack anything and everything in their path, regardless of who or what is being attacked. \n\nThe floor is soon drenched in blood from all three of you. You manage to drag your battered, broken body to the door, but the membranous flap only seems to open in one direction. You collapse from exhaustion and blood loss --the others don't stop, despite their own massive hemorrhaging and splintered bone shards-- and as you slip into sweet, sweet nothingness, you seriously wonder if the ultraviolent [i]animus[/i] present in those black currants will ever let Ian or Gonchar rest... or whether they will rip themselves open to feast on each other's innards as they are with yours.\n*achieve gorilla\n*goto_scene ending\n*label yescurrant\nYou join Gonchar and Ian on your knees, selecting a bushel of berries closer to the center of the room. The sharp pangs of hunger in your belly are at a fever pitch now. Carefully, cautiously, you pluck a currant from the bush, pop it into your mouth, and--\n\n[i]Wait a minute[/i].\n\nYou drop the berry on the ground, and look more closely at the bush. How are they growing here? Where do they get sunlight? Why are they planted like this, in a single row? \n\nSomething is not right here.\n\nYou grab a handful of the bush in front of you and pull, and are surprised at how easy it comes up out of the ground. You pull out the bush alongside it, and the next, and the one after that, until the only two currant bushes still in place are the one Ian's currently picking berries off of, and the one directly under the gargoyle-like gaze of Gonchar.\n*page_break It's time to end this, right here.\nYou approach Ian first, wary of waking Gonchar from his berry-and-diarrhea-induced trance. Ian hasn't had the same reaction to the currants as Gonchar, but he does seem to have a strange, singular focus.\n\n\"Ian, I... I need that bush.\"\n\n\"Mmm-mmph.\"\n\n\"Listen, I need that bush. I'm taking them out, all of them. You can have the berries. Just, let me rip it out of the ground. There's something down there.\"\n\nIan crouches over his berries like a monkey protecting his stash of bright shiny objects, but then looks at you and raises an eyebrow. Assuming that this is the universal sign for \"go ahead, I won't attack you,\" you grab the base of the bush and rip it out quickly. It comes up even easier than the others, with almost no root system whatsoever.\n*page_break And now, on to Gonchar...\nYou ponder whether you should ask permission --what if it breaks his trance and he attacks you like some enraged animal?-- but in the end, figure that he wouldn't respond anyway. Besides, Ian still has his revolver.\n\nWithout taking your eyes off him, you grab a handful of the bush, and yank. \n\nNothing. The thing feels welded into place.\n\nYou pull again, with more strength. Nope. For whatever reason, this bush doesn't want to move. Using your hands, you dig a small trench around the plant --the soil smells rather revolting, like a dumpster full of vomit on a hot August afternoon in Texas-- and pull again, with no luck.\n\nSo you dig deeper, and pull, and dig deeper, and pull again, and dig deeper than that. Single-minded of purpose, you throw everything you have into that dig, exhausting your already-weak muscles until they can move no longer. But it's no use... the root system for this one goes down too deep.\n\nYou stop, and lay down crosswise to the former row of currants. You're still ravenously hungry, but far too tired to do anything about it: you can barely keep your eyes open at this point. Ian, apparently finished eating all the berries on his bush, crouches over you.\n\n\"Need some help, boss?\"\n\nYou smile.\n\n\"Go f--k yourself.\"\n*page_break Ian grins, puts his hand in the dirt, and pulls out a small shaft of golden light.\nYou jerk upright with a start.\n\n\"Ian, what the--?\"\n\nIan smiles, not at you, but at the thin beam of light erupting from the soil. He gets to his feet, effortlessly rips the last bush from out of the ground, then delivers a swift flat-footed kick to the side of Gonchar's head. \n\nYour former arch-rival slumps over on his side, his eyes vacant, his bowels vacated.\n\nYou drag yourself over to the light as Ian starts removing large mounds of dirt. Within seconds, he's cleared a two-by-two foot space in the formerly rectangular garden. Below, some unknown light source shines, filling the chamber in a hazy, golden glow.\n\n\"What... what [i]is[/i] this place?\"\n\nIan just smiles. He clears out another foot of dirt, then another, until he's made a roughly three-by-six-foot hole. Shimmering, glistening light erupts from the excavation, blinding your eyes.\n\n\"Ian, it's... beautiful.\"\n\n\"I know.\"\n*page_break His grin spreads from ear to ear, and he shoves you in.\nSurrounded by the warm, golden water, you hardly notice, or even care, when Ian drops Gonchar's emaciated body next to yours. Truth be told, you've never felt this good, not in all your life. Simply nothing compares to this, no feeling in the world, and there's plenty enough of this for both you, Gonchar's hollow shell, and the other body in here. \n\nIt's amazing, really, what the light can make you see. Clumps of dirt begin to cover you up, pushing you deeper and deeper into the pure, golden waters of the Khan. Within a few minutes, you can't even see Ian behind the wall of soil. Too bad... he would really have loved this. You close your eyes, your hunger gone, without a trouble in the world, and sink in.\n*achieve sharedtomb\n*goto_scene ending\n*label youfirst\n\"I'll go first, Ian, but get ready to use that thing.\"\n\nAs you get ready to enter, you hear a slight whimper behind you. Turning around, you see that Ian is visibly shaking.\n\n\"$!{name}, I, uh...\"\n\nYou look into his eyes. You know what he's seeing. Ian's lips are quivering, his eyes blinking three times a second. He's terrified; possibly even more than yourself. \n\n\"Ian? Ian, are you still with me?\"\n\nIan stares right through you, as if trying to understand complex events occurring a million miles behind you.\n\n\"Ian? Ian, look at me! You're... you're just hallucinating. Stay with me, man! Stay with me!\"\n*page_break He pulls the gun and puts the barrel in your mouth.\nThis won't end well. Do you:\n*fake_choice\n  #Slowly put your hands above your head, avoiding any sudden moves?\n  #Slowly bring your hands up to the gun, getting ready to jerk it away when you get the chance?\n  #Slowly close your eyes, bracing yourself for an instant, painless end to all existence?\nThe smell of urine fills the cramped space of the tunnel. Not feeling particularly warm or wet down there, you glance down. \n\nA wide, wet stain spreads across Ian's pants.\n\nHe pulls back on the hammer.\n\n\"I'm not afraid of you.\"\n\nYou'd answer, were it not for the lethal cylinder of metal between your teeth.\n\nTears stream down his cheeks. \"I'm not afraid of you. I'm not afraid of anything.\"\n\nIan takes the gun out of your mouth...\n\n[i]Phew! Thank--[/i]\n\n... and puts it up to your forehead.\n*page_break \"I'm going to squeeze this now, and you're going to go away.\"\n*choice\n  #\"Ian, listen to me: it's me, $!{name}. I'm not whoever --whatever-- you think I am. Calm down, and put the gun away. Nobody here is going to hurt you.\"\n    *set bravery +5\n    *set intelligence +5\n    *goto ianlisten\n  #\"Go ahead and shoot me, you sorry sack of s--t. Let's see if you've got the guts.\"\n    *set bravery +15\n    *set wisdom -20\n    *goto ianguts\n  #\"Ian, you, uh... you pissed your pants.\"\n    *set leadership +5\n    *set wisdom +5\n    *goto ianpee\n*label sololevel3\nYou close your eyes tightly, hoping that the hallucinations stop. Once you get out of this place --[i]if[/i] you get out of this place-- you suspect a few trips to the head shrinker might not be such a bad idea.\n\nA breath later, sharp pain envelopes both your wrists. Everything, from the thin little bones under your palm to the muscles that stretch across the back of your wrist and up into your fingers, feels as if it's been lit on fire. You look down, screaming.\n*page_break At some point, your hands seem to have re-attached themselves when you weren't looking. \nWithin a minute, the pain recedes, and you find yourself back in the pink, fleshy-walled chamber. \n\n[i]Is this a hallucination? Or was just the other stuff an illusion, and this is the real thing?[/i]\n\nThe door ahead of you expands, and shrinks, and expands again, almost imperceptibly... and only when you don't directly look at it. But when you turn away and then turn back, the change is unmistakable. \n\nYou crouch down to the door, wondering if you'll ever be able to trust your own senses ever again. Clearly, none of this can be happening... right? Perhaps it's just a temporary glitch in your nervous system, caused by some rogue spore or head trauma. You've heard of less crazy stories, of archaeologists who inhale some 3,000 year-old fungus dust, and a week later these normally healthy people are peeing orange smoke. \n*page_break Come to think of it, when was the last time you had to go to the bathroom down here?\nYou scrunch up your face, take a deep breath, and focus on the task: getting out of this infernal place alive.\n\n*goto leavehim\n*label jacylevel3\nDazed by the sudden confusion, you scramble to your feet, following the trail of footsteps. \n\nThe air is thin in this corridor, and you find yourself panting harder than you should. Of course, you haven't eaten, or slept, or had anything to drink in...\n\nYou stop.\n\n[i]No, it can't be... can it?[/i]\n\nA smug line spreads from ear to ear.\n\n[i]This is all a dream, isn't it? It has to be! My god, what an idiot I've been.[/i]\n\nThere's one pretty good way to see if you're trapped inside a dream: pain. You step toward the stone wall, and gracefully slide your fingertips down its surface. \n\nRough. Scratchy. Hard as, well... a rock.\n\nYou grin even wider as you crack the knuckles on your right hand, then ball it into a fist.\n\n\"I'm sorry, Dream Self, but this is very definitely going to hurt.\"\n*page_break You rear back, wheel around and send your fist flying into the wall with a perfectly-placed haymaker.\nYou're a little surprised when your punch suddenly stops at the wall. You're slightly less surprised a moment later, when multiple, layered waves of white-hot pain streak down from your dislocated knuckles, sending rivulets of agony through your forearm and upper back.\n\n\"AAGGGGGGAAAGGGHHHHHJESUSHOLYMOTHAGODF**KS**TC**KSTUPIDSTUPIDSTUPID!!!\"\n\nYou collapse into a giant heap of nerve endings and f-bombs, rubbing your knuckles and wrist tenderly with your left hand. Each soft touch sends new and more powerful shocks of pain through your system. You curse the god that would allow such things to happen in this world.\n\nYou close your eyes to shut out the pain, but it only seems to intensify. The pain is so great that it even hurts to think, which, considering the situation, is probably for the best.\n\nAn ice-cold chill envelopes your body and puts your hairs on end. You begin to shiver violently.\n*page_break A large, hairy claw grabs your injured hand and squeezes.\nYou pass out.\n\nYou wake up.\n\nThe first thing you notice is a searing, screaming headache. It feels as if your brain is currently being roasted on a skillet, with the softer parts turning to liquid and bubbling out your ears.\n\nThe second thing you notice is light. Lots of it. Bright, very bright, too bright. Brighter than a thousand freshly-birthed stars. You wonder if your eyes are open or closed, and decide that it wouldn't matter either way.\n\nThe third thing you notice is the complete lack of pain in your right hand. In fact, you can't feel anything up to at least your elbow. You flex it: it feels strange. Distant and unresponsive. Almost as if--\n\nWaitaminute.\n*page_break You open your eyes.\nYour eyes take a moment to adjust, a moment that stretches far longer than you'd like. A vast, white, amorphous blob in front of you slowly starts to sharpen, bit by bit, until you can just make our the fuzzy outlines of a ceiling.\n\nThe ceiling of a pristine, white, totally septic room. Or at least, you assume it's a room, because you can't actually see any walls...\n\n\"$!{name}? Are you awake?\"\n\nJacy! Childlike joy flushes through you. For a moment, you worry that you might start crying, but quickly decide that it would be totally worth it, even if you melted into a whimpering, blubbery mess. \n\n\"J-Jacy... well, everything's going to be fine!\"\n*page_break Jacy looks down at you, and smiles, exposing multiple rows of tiny, serrated teeth.\n\"Yes... [i]fine[/i].\"\n\nYou bolt backwards into a clumsy crab-walk, but immediately lose your balance and smack the back of your head flat against the floor. \n\nJacy stands up into a loping, misshapen stance. Her arms seem significantly longer than her torso, almost like a mutant gorilla. She continues to stare at you, smiling. The rows of shark-like teeth begin to rotate around her O-shaped mouth. In both directions. Simultaneously.\n\nThe sound that then emits from her mouth is unmistakably hers.\n\n\"This physical form disturbs you. I will come closer.\"\n\nJacy glides forward across the floor without actually moving her legs. Too close to run, you raise your arms in self-defense.\n\nThat's when you notice a fourth thing: your right hand is missing. Half your arm, actually, right up to the elbow, where there's a gaping hole full of shredded muscle, sinew, and thousands of moving white specks.\n\nJacy's on top of you now. What do you do?\n*choice\n  #Carefully study your surroundings for some way out: a clue, an object, a possible weapon. The keen and well-trained eye of a professional archaeologist should be able to locate and process even the smallest object, feature, or detail to their advantage. To get out of this situation, you're going to need your wits to be at their fullest. \n    *set wisdom -10\n    *set insanity -10\n    *set intelligence +10\n    *goto kissher\n  #Kick her in the neck!!\n    *set wisdom +5\n    *set insanity +5\n    *goto strikeher\n*label kissher\nUsing the carefully-trained eye of a professional archaeologist, you scan your immediate area for roughly half a second before Jacy shoves her face into yours.\n\nOn some level, some deep, dark place that you never admitted to, even on lonely digs in faraway places, the two of you drunk out of your minds on whatever vile fermented rotgut the locals use to get black-out drunk... somewhere, hidden in some far corner... you hoped this would happen.\n\nNot like this, of course. But Jacy's not an unattractive young woman. And you... well, things sometimes get lonely in the field. You know? Stranger things have happened. Worse things. Much, much worse.\n\nIt's hard to tell if it's the sheer unexpectedness of a long-buried dream come true, or the lightheadedness caused by massive blood loss, but a tiny hint of a smile stretches across your face, right about where your jaw and the lower half of your face used to be. Well, half of a smile, anyways. \n\nAhhh, Jacy... if the timing had just been a little bit better...\n*achieve kiss\n*goto_scene ending\n*label strikeher\nYou lash out with your boot, at first just grazing her slimy lower jaw in more of a defensive motion, then --getting a little head of steam-- following up by smashing her Adam's apple in with a solid strike from your heel.\n\nShe gasps with a sudden and bubbly [i]irrkkthhh[/i] and collapses to the ground in a writhing heap. You crabwalk backward for a few feet before springing into a low crouch, never taking your eyes off your former assistant.\n\nAs Jacy --or whatever that thing is on the floor-- struggles for air, her limbs quivering, you begin to feel a little bad about slamming her windpipe shut. Sure, [i]maybe[/i] she was about to devour your soul, and sure, [i]maybe[/i] she was about to wear your small intestine like a feather boa.\n*page_break Or maybe something else was going on...\nGrudgingly, you have to admit that, considering everything that's gone on since you got down here, [i]maybe[/i] your perception of reality is not what it usually is. \n\nMeaning that, well... there's a slight possibility that you just hallucinated Jacy attacking you with a physically-impossible mouth of rotating knives, and really just now owe your assistant a huge apology.\n\nAnd a little help.\n\nDo you:\n*choice\n  #Approach her cautiously, your hands up in a non-threatening gesture, trying to see both if it really is her, and if you can help her?\n    *set wisdom +10\n    *set leadership +20\n    *set insanity -5\n    *goto helpair\n  #Screw her! She's been more than a little off since I found her in that pit. Down here, it's every archaeologist for themselves!\n    *set wisdom -10\n    *set leadership -20\n    *set blasphemy +10\n    *goto leaveair\n  #No one else is down here but you too. Isn't it a good time to commit murder? This may be your only chance. [i]Finish the job[/i].\n    *set wisdom -20\n    *set leadership -40\n    *set blasphemy +20\n    *set insanity +30\n    *goto finishair\n*label leaveair\nYou stand up, a little wobbly from the lack of food or sleep, and glance around the room. That's when you notice something: at the far end, almost hidden among the septic white walls due to its similar coloring, is a coffin-sized box.\n\nCould this be...?\n\nYou approach it, cautiously. After all, what if this really is the Tomb of the Khan? What if this strange, six-foot oblong thing is what you've been searching for this entire time?\n\nIt is a little weird, that it looks so... un-Mongol-like. Very un-tomb-y. Almost more like the inside of a hospital room, or frankly, like the inside of an MRI machine. Perfectly clean, dust-free, eye-blindingly white... not what you would've expected for a 1000-year-old tomb.\n\nYou edge closer. The top seems to have a small crack, an opening! You place your fingers in it, and--\n*page_break\nTwo sets of razor-sharp talons sink deep into both sides of your face. You feel a strong pulling motion, first to your left, then to your right, as your head is twisted off your neck. The last thing you see before the darkness falls is Jacy's face, now blue from near-asphyxiation.\n\nAh, yes. Forgot about her.\n*goto_scene ending\n*label helpair\n\"Jacy... are you alright? Talk to me.\"\nYou creep towards her thrashing, flailing form one step at a time, making your voice loud but commanding, without --you hope-- any hint of anger or aggression. You've got to get through to her somehow.\n\n\"Jacy, I know it's you. I'm sorry. Stop moving around so much, it's only making it worse.\"\n\nThe Jacy-creature stops momentarily and looks at the far wall, before resuming her mad dervish dance on the floor. \n\nYou decide to give it one more try.\n\n\"Listen, Jacy... I'm sorry. I'm so sorry.\"\n*page_break She stops again. This time, she turns her twisted face towards you.\nThe hairs on the back of your neck stand up.\n\nShe rolls into a low crouch, one hand latched to her neck as if she were trying to strangle her own throat, and locks her gaze on you. The layered rows of teeth stop rotating, and the outer lip curves upwards in a menacing, toothy grin.\n\n\"$!{name}, you... you [i]hurt[/i] me.\"\n\nYou lower yourself slightly, until you're roughly at her eye level. Terror adrenaline flushes through your system, and you fight the urge to run.\n\n\"I did. I did, Jacy, and I'm sorry. I apologize.\"\n\nHer grin grows a little wider, and she tilts her head to the side.\n\n\"[i]Why[/i] did you hurt me?\"\n\nYou tilt your head to match hers, wondering if she's making some unconscious preparation to go for your throat.\n\n\"Because I was afraid.\"\n\nBoth of her eyebrows rise to the top of her forehead. It's then that you notice her hairline has receded quite a bit in the last twenty minutes.\n\n\"Afraid? Of [i]me[/i]?\"\n\nHer old, normal, regular human face flickers to life for a few seconds, then disappears. You start to wonder which is the illusion... whether reality is determined by your actions, or vice-versa.\n\n\"Yes. I was afraid you were going to eat me... that you would eat my face. My guts. Anything. Everything.\"\n\nJacy's old, smiling face reappears then disappears then reappears again, like a face seen through a strobe light at a craptastic dance club. Her grin stretches from ear to ear.\n*page_break \"Trust your instincts, $!{name}.\"\nShe lunges for you. You bring your arms up on sheer gut instinct. Your remaining good arm locks fingers with hers --she keeps one claw firmly on her own neck, as if trying to keep her head attached to it-- and for a moment, all is silent.\n\nThen, in a flash, comes the explosion.\n\nIt's not something you can see; rather, it's as if an invisible ball of force imploded between the two of you. Your bodies slam into each other, your foreheads colliding and sending you reeling.\n\nYou both nearly collapse --except that your arms are still locked together. Suddenly every nerve ending in your body is jolted with electricity. An unseen presence is passing like a wave over every cell in your body... and you get the impression that it means to stay.\n\nYour mind is a muddled mass of disorientation and abject terror. Is Jacy trying to take you over?\n\nYou look at her face.\n*page_break Her eyes, too, are full of a horror beyond her understanding.\nIt starts to hurt. To [i]really[/i] hurt. You can't move; neither can she. Red-hot pins stab through the heart of every nerve ending in your entire body. You cannot escape: and somehow, without knowing how, you know this invisible entity will never allow you to die.\n\nYour mind is wiped clean: your brain's capacity for thoughts and ideas is overwhelmed by a singular focus on pure, intense pain.\n\nYou open your eyes, and stare at Jacy.\n\nHer body is as rigid as yours: she, too is feeling what you are. Far from comforting you, it only makes you hurt even more. Why did you come down here? What have you done to your friend? How can you--\n\nJacy's grip loosens. Her body goes limp; the terror in her eyes is replaced by a placid, content look. \n\nA warm, girlish smile spreads across her alien face.\n*page_break That's when you realize what happened...\n[i]She gave in.[/i]\n\n[i]She let it win.[/i]\n\nSomehow --you didn't think it possible-- the extreme pain ravaging your cells doubles in intensity. Every muscle contracts to its max; every organ stops. Your lungs no longer work; your eyesight begins to fade.\n\nDecision time.\n\nDo you:\n*choice\n  #Let it win. Just... let it win. You can't fight it anymore. Once you saw the look on Jacy's face, you knew the decision was already made. This thing is too strong for you to fight right now... maybe at some later date, when you're rested, fed, and have your strength back. But not now.\n    *set intelligence +5\n    *set insanity +10\n    *goto givein2\n  #Tell it to go take a flying f**k. \n    *set wisdom +10\n    *set insanity -10\n    *goto struggle\n*label givein2\nYou stop struggling. Instantly, it's as if you just fell backwards into a warm pool the water is pouring over your face, covering you as your body sinks deeper and deeper into the void.\n\nSuddenly, your left arm jerks. Then, your right. Soon your legs follow suit. Your organs, which didn't quite agree with your decision to let go in the first place, are the last to follow.\n\nYou spring to attention; Jacy does the same. You sense strange, physical transformations occurring across your body, but you lack the ability to see or feel them anymore. You start to move in awkward, jerky steps, crouched low like a feral beast at times, bipedal at others. \n\nYour vision starts to fall away, but you watch, helplessly, as Jacy and yourself tear at the ceiling of the all-white room with your bare hands and feet, ripping both the tiles and your limbs to shreds. You hear strange wailing sounds in the distance, as if through a thick, damp fog. \n\nHelplessly, you watch as the two of you bolt and leap into the vast and barren Mongolian countryside, passengers in your own corporeal forms. Your field of vision gets narrower and narrower, until, finally --just before you enter your first major population center, it's citizenry screaming and aflame-- you wink out of existence.\n*achieve possess\n*goto_scene ending\n*label finishair\nYou approach her thrashing pre-corpse with one thing on your mind: cold, calculated murder. Although you've never admitted it at any time in your life before this, the urge to kill something, anything --to snuff its pathetic little candle out of existence, forever-- has been a driving force, perhaps [i]the[/i] driving force, your entire life. \n\nAnd possibly before then.\n\nAnd now, here, the chance to finally do what you were born to do fills every cell in your body with an almost orgasmic, intoxicating delight, a feeling a thousand times more powerful than the strongest narcotic. \n\nYou're almost overwhelmed by the sheer ecstasy of it all. Where to start? What should be the killing blow? Prolong the pain indefinitely, or get it over with one, swift, stroke? And what to do afterwards: desecrate the corpse? Cannibalize it?\n\nMost importantly, what if you enjoy this [i]too[/i] much? Will this be the first of many, many more murders? Will you commit so many more atrocities, that this one --your first-- will fade into the deepest recesses of your memory, a faint recollection of the moment everything in the world finally made sense?\n*page_break Of course, there is one small issue...\nYou stare at Jacy, wondering if she will cooperate. After all, as the saying goes: [i]life loves living[/i]. This being your first time, things could get quite messy after all is said and done.\n\nShe writhes around the floor, one claw wrapped tightly around her own neck. You heft your flashlight in your hands, studying her strange, wondrous new skull, and somehow instinctively knowing that this particular species has a soft spot just a half-inch above and behind the right ear, where a major blood vessel rests behind a small piece of bone that is especially prone to splintering into tiny, sharp shards when struck at precisely the right angle. \n*page_break Strange how you would know that. Seems fairly specific, actually...\nYou pause.\n\nJacy stops moving. She locks eyes on you. Her pupils narrow into cat-like slits. She bolts up into a low crouch, her claws out, her limbs tensed and ready to strike.\n\nSuddenly, you're not exactly sure what to do. Do you:\n*choice\n  #Stop this madness! Lift your flashlight in front of you in a defensive gesture while slowly backing away. Maybe you can talk her out of this.\n    *set wisdom +10\n    *set leadership +5\n    *set insanity -10\n    *goto talkout\n  #Brain her!\n    *set wisdom -15\n    *set insanity +15\n    *goto brainher\n*label brainher\nYou close in and bring the heavy Maglite down in a long arc, aiming directly for Jacy's soft spot. Unfortunately, whatever source of information feeding you seems to have been working on her, too, as she simultaneously sweeps her talons right across your jugular. \n\nHalf a breath later, the once-septic white floors and ceiling of the room are covered in twin sprays of bright red blood. \n\nYou hear strange screams in the distance, as if through a thin wall in a cheap apartment. A deep voice laughs. You collapse to your knees, all of your remaining energy flowing out through you at around four gallons a minute. \n\nYour vision starts to fade around the edges, white edges turning dark red. Jacy is nowhere to be seen within your narrowing circle of vision. Perhaps she... got away?\n*goto_scene ending\n*label talkout\n\"Jacy, I'm not a threat. Let's just calm down and--\"\n\nThe she-beast lashes out at you with a claw, but you're ready. You deflect it with the butt of your flashlight --she still gouges your hand and wrist with a deep gash-- and bring the flashlight down on her skull.\n\nYour first hit just grazes her, but it does its job. In the extra second you've bought by stunning her, you bring it down again, this time with all your remaining strength. \n\nIt connects.\n\n\"Like Rob Deer in his PRIME, baby!!\" you yell, as the side of her head starts to flicker bits of bone and blood. She staggers, you take aim, and [i]thwack[/i] her so hard in the Adam's apple that it shatters the glass bulb.\n*page_break Less than a minute later, it's all over.\nCompletely drained, you glance around the room for a blood-free spot to take a nap. At the far end of the room is some sort of white box --roughly coffin-esque in size and shape.\n\nYou suddenly get a little burst of energy.\n\nCould this be?\n\n...the actual tomb of Genghis Khan?\n\nTears stream down your face as you approach. A million wild possibilities jostle for attention in your mind. Could this really be the burial chamber? After all the trials --and outright murder-- you suffered through, that this, here, is the final resting place of the greatest military leader in human history?\n\nAs you reach it, you see that it is open at the top, just a tiny sliver. Without gloves, without your notebook, or measuring tape, or anything, you reach down, grab an edge and pull.\n*page_break Big mistake. Big, big mistake.\nAn unseen force far more powerful than you surges through your body, from your trespassing fingertips and into your arms. Within seconds  agree with your decision to let go in the first place, are the last to follow.\n\nYou spring to attention. You sense strange, physical transformations occurring across your body, but you lack the ability to see or feel them anymore. You start to move in awkward, jerky steps, crouched low like a feral beast at times, bipedal at others. \n\nYour vision starts to fall away, but you watch, helplessly, as you tear at the ceiling of the all-white room with your bare hands and feet, ripping the tiles --and your limbs-- to shreds. You hear strange wailing sounds in the distance, as if through a thick, damp fog. \n\nHelplessly, you watch as you bolt and leap into the vast and barren Mongolian countryside, a passenger in your own corporeal form. Your field of vision gets narrower and narrower, until, finally --just before you enter your first major population center, it's citizenry screaming and aflame-- you wink out of existence.\n*goto_scene ending\n*label struggle\n[i]This is it[i], you think. [i]Conscience's last stand[/i].\n\nYour brain's neurons make a quick connection to the old Atari game, [i]Custer's Last Stand[/i], a rather unfortunate attempt at erotic gaming that ended up arguably being the worst video game ever made. \n\nYou recall the inevitability of getting your manhood skewered by a random cactus, and laugh. You start to laugh hard, far more than the memory really deserves. A full and throaty belly laugh, that shakes you down to your core.\n\nYou feel the unseen power's grip over your body weaken, ever so slightly.\n\n[i]Ah, so this is how it's going to go down now, is it?[/i]\n\nYou think back to your high school days, when you visited The Pines Baptist Family Church Camp. It was about as boring a field trip as you could devise... until you and two of your friends snuck out of the cabin, crossed through a half-mile of thick forest in the middle of a moonless night, and switched the \"I\" and \"E\" letters on the sign. \n\nYou think back to the bus ride home the next morning, sweating bullets that a teacher would see the sign as you drove away... and the unbelievable sense of relief when absolutely no one noticed the switch. You chuckle again.\n*page_break You feel the thing's hold over you weaken even more.\nOne by one, you recall instances in your childhood: dirty jokes, pranks involving underwear and/or bodily fluids, totally inappropriate pick up lines you've never had the courage (or stupidity) to use in dive bars. The filthier the memory, the more control you regain over your body.\n\nUntil finally, you win.\n\nYou stand up, yourself again, having beaten back the alien presence with humanity's oldest and most potent weapon.\n\nBursting with confidence and with a huge smile across your face, you kick open the coffin. You feel the invisible being cower --clearly, the tables have turned. You look inside.\n\nWithin is a wizened little corpse, with no clothing or any sort of adornments, buried face-down. \n\nThere's a small spot in its upper back, marked by a splintered ribcage, where some gooey, white, bubbly substance resides. \n*page_break You smile. This is far, far better than you could've expected.\nYou pat down your pockets until you find it: a small plastic sandwich bag, your last one. These things are worth their weight in gold when you're deep in an underground dig. Using a piece of rib as a makeshift spoon, you scoop the white substance --every last drop-- into the little baggie. \n\nAs you do so, the unseen force --once so malignantly powerful-- shrieks wordlessly. \n\nYou're firmly in control now.\n\nYou start to zip it up, and feel it trembling in fear. You keep it half-open, and whisper into the bag.\n\n\"Listen up, dipwad, this is how things are going to go. You're going to show me the way out of this place, and in exchange, I'll remove you from this prison. You're going to work for me, now. Not just here, not just limited to this dig: you're going to come with me [i]everywhere[/i]. You do what I say when I say it, or you're getting stuffed into an old can of rotten sardines and tossed into the middle of the Pacific. Do I make myself clear?\"\n\n[i]Perfectly... Master.[/i]\n\nYou grin, glancing back at Jacy's unfortunate form, wondering whatever happened to Ian and Gonchar. \n\nNo matter. Things are going to be a little bit different in the world of archaeology from now on.\n*achieve winning\n*goto_scene ending\n", "rivals": "Dusk is settling as you finally reach the site. Despite the hard travelling and episode with the Darkhad at the gate, you can't wait to start digging around. The tomb of Genghis Khan, after all, is perhaps the most famous 'lost tomb' in human history. Legend has it that when the Great Khan died, those who buried him were killed by a detachment of soldiers, who were in turn killed by another detachment, and so on until it was absolutely certain that no one, anywhere, knew the precise location of the burial site.\n*page_break Until now...\nUsing state-of-the-art technology and cutting-edge research, you and your hand-picked team of grad students believe that you are poised on the edge of the greatest historical discovery of the last eight hundred years. Your name will live on for all eternity, alongside those other archaeological greats such as- say, what is your name, anyway?\n*goto naming\n*label naming\n*input_text name\nYour name is $!{name}, right?\n*choice\n  #You'd better believe it.\n    *set name \"$!{name}\"\n    *goto gender\n  #Er, not exactly. Here, let me spell it out for you.\n    *goto naming\n*label gender\nAre you male or female?\n*choice\n  #Male\n    *set gender \"male\"\n    *goto school\n  #Female\n    *set gender \"female\"\n    *goto school\n  #Other\n    *set gender \"unknown\"\n    *goto school\n*label school\nNow let's talk about your employer, the University of:\n*input_text school\n*page_break\nWhoa, the University of $!{school}? That's one of the top research institutions in the world!\n*choice\n  #Well, of course it is. I would never even consider going to a cut-rate refrigerator repair school like Harvard.\n    *set intelligence +2\n    *goto hopes\n  #The school itself is not important: it's the work you do that really counts.\n    *set wisdom +2\n    *goto hopes\n  #Research? Hell, I'm just there to PARTY!\n    *set wisdom -2\n    *set bravery +2\n    *set leadership +1\n    *goto hopes\n*label hopes\nNow let's get to the good stuff: your hopes and dreams. Ever since you were in elementary school, you've been fascinated by the Mongols... especially since your history books offered so little \"real\" information. How did they [i]really[/i] build the largest land empire in human history? How did they do it so quickly? The standard answers were laughable, to be honest. Which one was your personal favorite?\n*fake_choice\n  #\"They brought two horses into every battle.\"\n  #\"They could shoot while riding backwards.\"\n  #\"They were fast and merciless.\"\n  #\"Genghis Khan was a powerful shaman with magic powers. Also, aliens.\"\nReally, though, the answer is obvious: they had one of the greatest leaders in history, Genghis Khan. Very little is actually known about him... but you intend to change that, and soon. You and your team have narrowed down the possibilities to this specific sacred mountain in the Ikh Khorig, a place where, according to legend, the young Khan had chosen as his final resting place, and a regular burial site for Khans for hundreds of years prior to that. \n*page_break There's just one problem...\nDr. Avery Gonchar. Youngest person ever to get their PhD in Archaeology from Princeton. Offered full tenure at Stanford at age 25, and turned it down to star and produce his own reality show, [i]Treasure Shafted[/i]. World-renowned urban explorer, nature photographer, environmental activist, and tech entrepreneur. Heir to the Gonchar Coal Company family fortune. [i]And a horse's ass[/i]. \n\n\nOh, there was also that time he abused his power as a TA and gave you a 'D' on your Archaeology 101 final essay... after you made fun of his Indiana Jones hat. \n*page_break And now...\nAnd now [i]he's[/i] here, at this very site, having greased the right palms and smiled into the right cameras. And after outright stealing your research. How do you expect to handle this?\n*choice\n  #If I ever see his fat face again I'm going to serve him up a big steaming plate of fist tacos!\n    *set bravery +2\n    *goto rumors\n  #I'm willing to let bygones by bygones, and may the best archaeologist win.\n    *set wisdom +2\n    *set bravery -2\n    *goto rumors\n  #I hope he brought his stupid cameras, because it's time the world saw what a [i]real[/i] archaeologist looks like.\n    *set bravery +1\n    *set leadership +2\n    *goto rumors\n*label rumors\nBut Gonchar's not your only problem: there's heavy resistance within Mongolia itself to your expedition. After all, the entire point of hiding the Khan's tomb --and slaughtering all those soldiers-- was to prevent it from ever being discovered. There are many who consider your profession to be nothing more than a glorified graverobber... and Gonchar's promises of finding 'the most priceless artifacts in all of human history' isn't helping your image much.\n*choice\n  #I completely understand the concerns of the Mongolian people, and cannot emphasize enough how everything I find will be treated with the utmost respect and dignity.\n    *set leadership +5\n    *set wisdom +2\n    *goto rumor2\n  #While the Mongols will get [i]most[/i] of any artifacts I find, I still plan on keeping some of the really good stuff and sending it back to the University of $!{school}. After all, I want as many people to experience the heights of Mongolian culture and history, not just limit this knowledge to a couple of people in a hard-to-reach museum in Ulan Bataar.\n    *set leadership +1\n    *set intelligence +3\n    *goto rumor2\n  #I'd like to cite the old-school archaeologist case of [i]Finders vs. Keepers[/i], and remind everyone of just how lame the British Museum would be with just stuff from England.\n    *set bravery +3\n    *goto rumor2\n*label rumor2\nFinally, there are those in Mongolia --you saw them and their picket signs as your plane landed at the Chinggis Khan International Airport, plus when that old Oirat woman spit on you at the press conference-- who believe that the Great Khan's tomb should not be disturbed for other, more nebulous reasons. Namely, that Genghis was a spiritual guide and mystic shaman on the level of a Jesus or Buddha, and that opening his grave would release powerful spirits, possibly starting the Apocalypse. What are your thoughts about that?\n*choice\n  #While I may not give much credence to the mystical aspect of these views, I still respect the cultural truths that birthed them, and have no intention of disrespecting a site sacred to millions.\n    *set leadership +4\n    *set wisdom +2\n    *finish\n  #My assistants and colleagues back at the University may laugh, but to be honest, I'm a little worried about what we may find down there.\n    *set wisdom +2\n    *set intelligence -5\n    *set bravery -2\n    *finish\n  #What is this, backwoods Alabama? I've got a [i]P.H.D.[/i] The last thing I'm going to worry about is some superstitious mumbo-jumbo about graveyard curses and angry ghosts. I've read about the so-called Tomb of the Pharaohs curse and it's sheer tinfoil-hat pseudo-science claptrap. Save the lame spook-stories for your next second-grade sleepover.\n    *set intelligence +2\n    *set bravery +1\n    *finish", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"Colorado Fists\"\n*set school \"Southeastern Hades University\"\n*set gender \"male\"\n*set intelligence 20\n*set wisdom 8\n*set bravery 37\n*set leadership 21\n\nFour guards level their Soviet-era AK-47s at your vehicle; two more open the back and start rifling through your gear. Despite the sweltering heat, the Darkhad --the ancient line of guardians sworn to protect these sacred lands by any means necessary-- are dressed in heavy paramilitary uniforms more suited for the frozen steppes of Siberia than the forbidden badlands of Ikh Khorig. Their leader, armed with a pair of ivory-handled revolvers and sporting a six-foot long, gleaming black composite bow strapped across his back, approaches the driver's side and knocks on the window. What do you do?\n\n*fake_choice\n  #Move both hands off the wheel, roll down the window and dazzle him with your winningest smile.\n  #Nod knowingly at the guard while producing your papers.\n  #Grip the wheel with both hands and gun it.\n\n*script changeBackgroundColor(\"black\")\n\n*set name \"Aurora Rogue\"\n*set school \"University of Paris\"\n*set gender \"female\"\n*set intelligence 25\n*set wisdom 28\n*set bravery 12\n*set leadership 23\n\nThere's heavy resistance within Mongolia itself to your expedition. After all, the entire point of hiding the Khan's tomb was to prevent it from ever being discovered. There are many who consider your profession to be nothing more than a glorified graverobber. How do you respond?\n*fake_choice\n  #I completely understand the concerns of the Mongolian people, and cannot emphasize enough how everything I find will be treated with the utmost respect and dignity.\n  #While the Mongols will get [i]most[/i] of any artifacts I find, I still plan on keeping some of the really good stuff and sending it back to the University of $!{school}. After all, I want as many people as possible to experience the heights of Mongolian culture and history, not just limit this knowledge to a couple of people in a hard-to-reach museum in Ulan Bataar.\n  #I'd like to cite the old-school archaeologist case of [i]Finders vs. Keepers[/i], and remind everyone of just how lame the British Museum would be if it just had stuff from England.\n\n*script changeBackgroundColor(\"sepia\")\n\n*set name \"The Mississippi Kid\"\n*set school \"Malaria Technical\"\n*set gender \"unknown\"\n*set intelligence 9\n*set wisdom 11\n*set bravery 43\n*set leadership 19\n\nYou storm back into your tent and zip it closed behind you, ignoring your enemy's pathetic pleas. You bury yourself in your sleeping bag and cover your head with your pillow, until he stops whining and moves on. After a minute of eerie silence, you hear the sound of a zipper, then muted voices. \n\nAnd that's when you realize that the crazy bastard has moved on and is now trying to seduce one of your grad students with his idiotic scheme. Do you:\n*fake_choice\n  #Cover your head again and try to sleep, confident that neither of your assistants is stupid enough to take the bait?\n  #Put your ear up against the flap and try to strain and listen to what's going on?\n  #Storm out of your tent, fists flying, teeth gnashing, mouth frothing with righteous fury!\n\n*set name \"Boniface VIII\"\n*set school \"Jed's Worm Farm and Music Conservatory\"\n*set gender \"unknown\"\n*set intelligence 39\n*set wisdom 13\n*set bravery 14\n*set leadership 31\n\nRemembering the hallucinations you'd experienced earlier in the day, you wonder whether you can trust what you're currently seeing. Reaching out to the hole --just a rough three-foot diameter tunnel in the stone-- you again feel an irregular burst of cold air. The edges of the hole are still sharp, as if clawed open by some manic beast. As you run your finger over it, it cuts you... and a single drop of your blood falls to the earth, not two inches from another fleck of fresh, dark, red blood.\n\nDo you:\n*fake_choice\n  #Sprint back down the way you came?\n  #Search the area for more information?\n  #Cackle maniacally as you crawl through the hole?\n\n*set name \"El Mystico\"\n*set school \"Hard Knocks Polytechnical\"\n*set gender \"female\"\n*set intelligence 35\n*set wisdom 34\n*set bravery 12\n*set leadership 24\n\nYour rival screws up his eyes at you, as if y
