it's vicariously through some long-forgotten civilization. What I'm offering you, $!{name}, is the chance to transcend the frail, sickly concept of human civilization... to face the cosmos as an equal, rather than an insect.\"\n*choice\n  #\"You're f---ing brilliant.\"\n    *set wisdom -5\n    *set blasphemy +10\n    *goto withcrazy\n  #\"You're f---ing insane.\"\n    *set wisdom +5\n    *set blasphemy -10\n    *goto nocrazy\n*label withcrazy\nYou have to admit it --you're intrigued. Gonchar may be bats--t insane, but he hit on one aspect perfectly: you've always felt, well, a little [i]different[/i] than your colleagues. As far back as elementary school, while your classmates gorged themselves on pre-teen swill, you were reading classic Golden Age-era sci-fi and trying to work out the logistics of bringing home a Manhattan-sized chunk of diamond from the core of Jupiter. In high school, your AP History and language studies took up the majority of your Saturday nights. Even in college, you silently scoffed as 99% of your classmates focused their majors on Egypt and Israel, which, frankly, have been dug to death and show a profound lack of imagination. You've always been different.\n\nNot just 'different'... let's be honest here. [i]Better[/i].\n\nAnd now's your chance to prove it.\n*page_break\n\"Alright, Gonchar. You talk a big game. Let's see what this is all about.\"\n\nGonchar grins.\n\n\"We already have.\"\n\nHe casually kicks the torso off a warrior corpse at his feet, exposing a rusted iron lever. \n*page_break \"Now the fun part begins.\"\nHe effortlessly pushes back on the lever, which creaks and groans as metal scrapes against raw metal. Behind you, a thin sliver of wall opens, exposing a small, ancient mineshaft littered with the corpses of millions of beetles. Gonchar ducks his head and walks in, turning dead insects into tiny clouds of dust particles with each step. You steel your nerves and follow.\n\n\"So, where are we going? What is this place?\"\n\nGonchar chuckles. \"We're in the tomb of the Khan. The passage we're currently in is a shortcut the builders used, to bypass the Pit.\"\n\n\"The pit? What pit?\"\n\nGonchar dismissively waves his hand behind him. \"Had you crawled through that rat's hole near the Seal, you would've found out soon enough. A sort of trap, or barrier, if you will.\"\n\n\"A barrier... to keep people in? Or out?\"\n\n\"In.\"\n\nYou start to feel sick. Deep down, you already knew that, just as you know the answer to your next question. Still... you need to hear it from someone else. Someone who, while clearly insane, might have some clue as to what's going on. You brace yourself, and ask Gonchar the question that has been pressing on your mind ever since you saw the massacre in the burial chamber.\n\n\"...did it work?\"\n\nGonchar halts. A tiny hint of genuine concern flickers across his face for a moment... then it's gone.\n*page_break \"No.\"\nYou grab him by the shoulders and turn him to face you.\n\n\"Listen, a-hole: you've got to tell me what this [i]is[/i]. What are we dealing with here? Is it still alive? Is it... this is insane... is it-- [i]Genghis Khan[/i]?\"\n\nGonchar pauses for a moment, studying the piles of beetle corpses on the floor. \n\n\"No, I don't think it is... I don't think so. The old fool's body would have been ravaged by then, as stupid as he was, wasting so much energy trying to create the largest, and longest-lasting, empire in known history. Idiot! Where is your empire now, you sick bastard?! The biggest conquest in human history, the longest continuous line of royal descendants... and yet to-day, Mongolia is just a unwanted sliver of desert, wedged between two temporarily large empires. Pathetic, really, when you think--\"\n\nYou slap him hard across the back edge of his jawline. He barely winces, a mixture of confusion and hatred filling his eyes. You lightly toss and catch your flashlight, hefting it in your hand.\n\n\"Enough pseudo-occult mumbo jumbo. Just tell me why we're here, and what I need to do.\"\n\nGonchar grins, rubbing his jaw.\n*page_break \"With pleasure.\"\n\"I'm so glad you're finally showing a little initiative, $!{name}. I was beginning to worry about my faith in you.\"\n\nYou brush him off with a wave.\n\n\"You still haven't told me anything, about why we're here or what we're doing. As far as we're concerned, we're still on an expedition to find the tomb of Genghis Khan.\"\n\nGonchar squeals and claps like a small child.\n\n\"Oh, we are!! We are indeed! But not for the usual purpose of locating specific, long-dead carbon life-forms and their quaintly-shaped precious metals. No, Genghis --and a tiny handful of others-- are unique to history for one reason. They had something... or, rather, [i]became[/i] something... that separated them from the rest of [i]homo sapiens[/i]. I believe --and my research has confirmed this-- that it was not some special internal quality, or luck, or convergence of factors, but rather, a physical, tangible object that allowed these individuals to accomplish the impossible, the unthinkable, the otherworldly.\"\n\nGonchar pauses, brushing eons-old dust off his sleeve.\n*page_break \"And that object is in here somewhere. Within the next few minutes, we could be [i]gods[/i].\"\nYou hesitate, intrigued but still confused. Gonchar wouldn't know a straight answer if it bit him in the ass.\n\n\"Ok, so... an object. Somewhere in here. What is it?\"\n\nGonchar's smile fades.\n\n\"Well... perhaps a talisman, or a piece of a meteorite... or--\"\n\n\"Wait a f--king second: you don't [i]know[/i]?! What the hell? What are you basing this on? What evidence?\"\n\nGonchar runs his fingers through his hair, looking at the rough cuts in the ceiling.\n\n\"M-my research. All of it. Years of study.\"\n\nYou clench your teeth and bring your face within an inch of his. He jerks back slightly, avoiding your gaze.\n\n\"And what, [i]exactly[/i], is this 'research?' A book? A lecture? A grainy internet video narrated by some Illuminati truther!?\"\n\nGonchar hesitates, carefully choosing his words for a moment.\n*page_break \"Mostly Astral.\"\n\"...Astral?\"\n\n\"Correct.\"\n\n\"Astral.\"\n\n\"Yes, that's what I said.\"\n\n\"And, I presume, when you say 'Astral,' you're referring to --just bear with me on this-- the 'Astral Plane?' As in, 'sitting around in an incense-filled room with your eyes closed, chanting at invisible spirits and taking drugs?' [i]That[/i] 'Astral?'\"\n\nGonchar screws up his eyes at you, as if you're the single slowest person on the entire planet.\n\n\"I suppose that's what an imbecile would call it, yes.\"\n*choice\n  #You can't take it anymore. You turn and leave the deranged madman with his adolescent power fantasies, and head down the tunnel in silence.\n    *set wisdom +5\n    *set intelligence +5\n    *set leadership +5\n    *goto walkdown\n  #You can't take it anymore. You slam the heavy end of your flashlight across the back of his ear and bring your knee up into his solar plexus.\n    *set leadership +3\n    *set bravery +10\n    *set blasphemy -5\n    *goto attack\n  #You can't take it anymore. You [i]must[/i] hear more about this! \"Tell me more. All of it,\" you tell him. \"We're in this together now, you and me, to the very end.\"\n    *set wisdom -10\n    *set intelligence +5\n    *set bravery +10\n    *set blasphemy +15\n    *goto astral\n*label walkdown\nYou walk down the tunnel, hearing nothing but your own footsteps. Gonchar is strangely quiet: you're tempted to take a quick glance back --just to make sure he's still there-- but force yourself not to.\n\n[i]No. Don't look back. Whatever you do, don't look back.[/i]\n\nYou strain your ears, wishing for the first time in your life that you had ears like a fox, the ones that could rotate behind you... just on the off-chance that Gonchar isn't sneaking up with a huge knife, ready to split your shoulder blades open with ancient Mongol steel. \n\nYou hold your breath, but can hear no sounds of any kind coming from behind you --not even the echo of your footsteps. It's almost as if all traces of sound have been sucked into a black hole. \n*page_break Your resolve falters. You begin to turn around...\nAnd you stop yourself. \n\n\"No.\"\n\nYou press forward, led on by your flashlight... which is now beginning to flicker. You try and remember the last time you changed the batteries: maybe a week. Five days, tops. They shouldn't be flickering like this, not now. \n\nYou pat down your pockets for spare D-cells, and find an old ballpoint pen refill case, a piece of bright yellow chalk, and --something unexpected. A small, jagged, triangular sherd of pottery, one you've never seen before. Had Gonchar slipped this in there when you weren't looking? \n\nThere's writing on one side. You shine the faltering rays of your flashlight on it. The writing is crude, hurried, but unmistakably clear:\n\n[i]TURN AROUND[/i]\n*page_break With a slight hiss, your flashlight goes out.\nYou freeze, unwilling to take another step forward. Didn't Gonchar mention something about a deadly pit? You think back to your favorite movie growing up, and wonder if there are poisonous snakes down here. Or worse: the --probably-- mythical Mongolian Death Worm. \n\nYou cringe as something cold and wet drips onto your forehead. [i]If ever there was a place where you might encounter a legendary creature...[/i]\n\nAnother drop hits your forehead, then slides down your nose an onto your upper lip. It smells awful, like month-old Mexican food in the back seat of a hot car. You wipe it off with your sleeve, then get hit again on the nape of your neck. \n\nThis time, it's hot and slimy, hitting your skin with a sickening [i]schlopp[/i].\n*page_break You look up...\nLess than a foot above your head is a vague, human form embedded in the ceiling. Grey stone morphed into a dark pink, pulsing, organic material, covering almost all of the strange body. A disembodied voice --tiny, nasal... your mother's voice, from when she was a small child-- whispers faintly into your ear.\n\n\"[i]Here the veil is very thin... practically non-existent. Fight it, and fail.[/i]\"\n\nTears well up in your eyes.\n\n\"M-Mom?\"\n\nA small, three-fingered hand brushes your ankle. You jerk back in alarm, lifting first one knee as high as you can off the ground, then the other. The tiny disfigured hand grasps your calf and tickles the back of your knee. You start to run, but it's grip turns to iron. You fall, landing flat on your face.\n\nWoozy, you push yourself up off the ground.\n*page_break You wipe the cave dust from your eyes and see...\nGrey stone. Your flashlight lays on the ground about three feet away, it's fading beam illuminating a small triangular section of rough-hewn stone. \n\nQuickly, you snatch it up and shine it on the ceiling. Nothing, no human form, no creepy little goblin-child. Just stone.\n\nD-mnit, this is getting bad. You must've inhaled some sort of airborne fungal narcotic spores at one point down here. Your hallucinations are getting stronger and stronger. After all, honestly, how would you even know what your own mother's voice sounded like when she was a child? \n\nYou make a mental note to visit a reputable psychologist if and when you ever escape from here. You suspect you might have some deep-seated issues that need working out.\n\nYou freeze as the barely-audible sound of a sniffle drifts down the tunnel. Not knowing whether you can trust your own senses anymore, you cover up the beam of your flashlight and strain your ears.\n\nNothing.\n\nYou hesitate: could this just be another hallucination? Or is it Gonchar, preparing another ambush, to wipe out the one person who knows his bats--t insane plans? As you ponder your options, you hear it again, slightly louder. The sound is coming from less than ten feet away, up the tunnel and slightly to the right. \nDo you:\n*choice\n  #Charge the source of the noise, hoping to gain the element of surprise --or, failing that, at least pick up enough steam to tackle your enemy and pin him against the wall?\n    *set bravery +10\n    *set wisdom -5\n    *goto ian1\n  #Creep stealthily closer, flashlight off but at the ready, waiting for your ambusher to make the first move?\n    *set bravery +3\n    *set intelligence +3\n    *goto ian2\n*label ian1\nYour heart beats wildly as you lower yourself into a crouch, bounce a little on your legs, and spring at your attacker. \n\nFor the longest half-second of your life, you hurdle through the unknown, utterly blind in the darkness of space, not knowing what you will meet at your destination, nor when, your only tenuous connection to reality the rocky, uneven ground beneath your feet. Terror grips every nerve in your body, as the crushing realization that [i]something is on the other side of this insane charge[/i] dawns on you. If you only [i]knew[/i] it was a giant tentacled beast, or slavering monster, or even Gonchar...\n\nA moment later, your knees plow into something soft, yielding, and surprisingly low to the ground. Your legs stop but your upper body continues its momentum, sending your neck and head slamming into the unforgiving stone wall in front of you. You reel as you fall on top of your attacker, who squirms like a sack of pythons under your weight. \n*page_break \"Hey what the fu-\"\n*goto iangun\n*label ian2\nA cold chill numbs your hands and feet as you click the flashlight off. You stand there in the darkness --you've always marvelled at just how utterly, completely [i]black[/i] the darkness is when you're this deep under the earth-- and wait for another sound.\n\nNothi--no, wait! Something shuffled nearby, a small scuffing along the stone floor.\n\nIs it coming? Should you run? Take a swing? Turn your flashlight back on and catch a quick glimpse of the beast before it snuffs your life out?\n*page_break Your finger hovers over the switch...\nJust as you decide to turn the light back on --you hear another noise, a sort of [i]click[/i] sound that reminds you of the way saliva smacks when it drips from the top of a creature's mouth and onto the bottom row of teeth. Weird, unformed images flash past your imagination, too fast and too... [i]wrong[/i] for your conscious mind to grasp. \n\nYou take another step. You can hear it breathing now, great gulps of air, expelled from some sort of disgusting sac bladder. How did you not hear this before? Did it detect you yet? Is it getting excited, preparing itself for a kill ten centuries in the making? \n\nOr is it... afraid?\n*page_break\nYou take another step, then one more, and again, until you are directly upon the creature. It's breathing is more erratic now, irregular, unpredictable. You're close enough to strike it --which means you must be within its grasp, too. \n\nSlowly, but not too slowly, you bring your flashlight high above your head. Your muscles tense, your shoulder starts to ache. Your bicep starts to quiver under the strain and adrenaline.\n\nWith a sickening shudder, the beast stops breathing. It knows you're there. It's now or never.\n\nYou bring the heavy flashlight down with every shred of your remaining strength. Too late, you realize you've made a lethal mistake, as the edge of the light scrapes against the stone wall you thought was farther away, stopping much of the strike's momentum. Your flashlight digs into soft flesh, and you experience the primal thrill of crushing bone and strained sinew. The beast emits a tinny, almost squeaky noise, then utters an ancient curse.\n\n\"Hey what the fu--?\"\ngoto iangun\n*label iangun\n\"What the sh-t?\"\n\nYou recognize that voice. \n\n\"Ian!\"\n\"Wait, $!{name}? Holy crap holy crap, I almost just shot your invisible ass!\"\n\nYou fumble for the switch on your flashlight and turn it on. Before you, down in a low crouch, is your second-favorite assistant. He's covering his eyes from your beam with one hand. \n\nHis other hand holds a gun.\n*page_break\n\"Oh you-- you were really going to shoot me.\"\n\n\"Man, I don't want to shoot anybody. But these last few minutes...\"\n\n\"If you don't want to shoot anybody, then where'd you get the gun?\"\n\nIan looks down at his hand. The safety on the gun --a little .38, worn from old age, or frequent use-- is off.\n\n\"I don't normally, you know, condone this sort of faux-macho, red-state, genital-compensation --listen, I just brought it along, alright? I don't know why. I didn't even own it until we landed at Ulan Bataar. But then things started happening...\"\n*page_break\nYou involuntarily shudder, thinking of the strange visions you've seen lately. \n\n\"Things? What things? What's been going on, Ian? Tell me!\"\n\n\"I, uhh...\"\n\n\"Hold on... let me guess. Strange, inexplicable things, that seem to come and go at random?\"\n\nYou give Ian your most reassuring smile, before realizing that he can't really see you in the dark. His face contorts, his eyes grow distant. He brings his other hand up to the gun, and starts to rub his index finger up and down the barrel of the .38.\n*page_break \"Y-You're not a-a-alive. You're n-not [i]reeeeeeal[/i].\"\nYou've never seen Ian look like this. His left eye twitches, his hands tremble. His breath stops as he lowers the barrel of the gun and points it between your eyes. \n*choice\n  #You smack him across the face with your flashlight.\n    *set bravery +10\n    *set wisdom -15\n    *goto slapface\n  #\"PUT THE GUN DOWN, A--HOLE!\"\n    *set bravery +5\n    *set wisdom -10\n    *goto yellatian\n  #\"Ian... Ian, it's me, $!{name}. I'm not a hallucination, I'm not going to hurt you. Put the gun down... please.\"\n    *set intelligence +5\n    *set leadership +10\n    *goto yellatian\n*label slapface\nYou whip your flashlight around and connect with the side of his skull in a tremendous explosion of heat and light. Your light goes out, exposing strange, surreal shapes in the darkness. The pull of sleep is strong... and you have no urge to resist. You drift downward, nestling snugly into the back of your own skull, just as the intelligent, thick, red, plasma-like mist begins to infiltrate every orifice in your corpse...\n*achieve headshot\n*goto_scene ending\n*label yellatian\nHe starts to pull the trigger.\n\n\"That's funny,\" you tell him.\n\nIan pauses. Given another second to live, you press on.\n\n\"I never figured you for a Limbaugh-lovin', nuke-a-gay-whale-for-Jesus type.\"\n\nIan raises an eyebrow. A moment later, the glassy look is gone, his eyes now shrewd, expectant --and smiling. He lowers the barrel and holsters the gun.\n\n\"Fascist tool.\"\n\nRelieved, you crack a smile too. After you remember to exhale, that is.\n\n\"Corporate wage slave. You almost had me there. Were you really going to shoot me? In the [i]face[/i]?\"\n\n\"Biblehumper. Yeah, well... it's been weird. Really weird. I've seen some... damn, I'll never be able to explain it, I just--\"\n\n\"Unpaid fracking apologist. You don't need to tell me a thing. I've seen it too... maybe not what you've seen, but certainly quite a bit that I couldn't explain. Where's Jacy?\"\n\nIan peers out into the darkness.\n\n\"You mean you didn't see her? She was right here!\"\n*page_break\nYou flash the beam in a circle around you, but see no one. The two of you stand in silence for a moment, before you notice Ian rubbing his shoulder.\n\n\"Sorry about that, by the way. I thought you were a horrifying, tentacled nether-beast.\"\n\n\"No worries, chief. It'll leave a nasty watercolor bruise, though, for a few weeks. Maybe a Rothko. I'll snap a few phone pics of it and sell 'em online for millions. Oh, and sorry for nearly blowing your head off. I thought you were an extraterrestrial intelligence in the physical form of my dad, coming to crack open my neck and sip the juices within.\"\n\n\"Ah. Well--your dad, huh? That's interesting, because I thought I'd imagined the voice of--\"\n\nThe sudden noise of a great door slamming shut echoes down the tunnel. You whip your flashlight down the hall; Ian draws his gun. \n\nYou glance down at the .38 and smile. He follows your gaze, then looks back up, grinning mischievously.\n\n\"You ready, Tex?\"\n\n\"Giddy-up.\"\n\nThe two of you rush down the hallway, cackling maniacally.\n*set ianlvl3 true\n*gosub check_run_ad\n*finish\n*label attack\nYour flashlight hits Gonchar's neck so hard that the cap pops open and the batteries fly out. Your knee strike whiffs awkwardly through thin air --Gonchar has disappeared.\n\nYou wait, straining your ears for a sound, any sound. \n\nNothing.\n\nYou open and close your right hand, which is sore after the flashlight bucked from your hand. Questions come at you in waves, overwhelming your light-deprived senses, the answers sliding out of your grasp and back into the darkness.\n\n[i]Did I hit him?[/i]\n\n[i]Did I hurt him?[/i]\n\n[i]...where the hell is he?[/i]\n*page_break\nYou listen for breathing, for a shoe scraping against stone, anything that could give Gonchar's presence away. Your empty, apparently harmless flashlight feels inadequate in your hands. Unless you hit him so hard that he simply poofed out of existence...\n\nAfter a long moment, you get on your hands and knees and start feeling along the floor for the batteries. Touching the frail beetle corpses causes you to shudder violently at first, but after a minute of struggling to keep your nerves in check, you realize it's no different than running your hands over the dusty, forgotten area under a couch or bed.\n\nYou brush your hand across the stone floor. \n*page_break That's when you notice something odd...\nGrooves. Spindly, circular, grooved patterns in the floor, underneath all the dead beetles and dust. Some are perfect circles, others seem to form other symbols, almost like letters...\n\n\"Fascinating, isn't it?\"\n\nYou draw your hand back as if from a hot stove. Tiny geysers of adrenaline erupt through your veins, and your hands and knees shake violently. You knew he was there, somewhere in the darkness.\n\n\"Sigils, if you were wondering. Not dissimilar from those used in traditional Western-style ceremonial magick, or in some forms of Daoist sorcery. These, well, I suspect to be Arabic in design. Though it is much easier to study them when you can actually, you know, [i]see[/i] them.\"\n\nA hand grips your wrist in an iron-like vise. A breath later, two D-cell batteries are placed in your open palm. The invisible man's grip slips back into the nether.\n*page_break\nYou feel like taking a swing at the darkness, but realize that you would just look ridiculous. You slide one battery in, hoping the positive and negative sides are lined up correctly.\n\n\"Gonchar?\"\n\nYou slide the other one in, and shut the case.\n\n\"Yes?\"\n\nThe voice is coming from your right.\n\n\"Sigils, huh?\"\n\n\"Naturally.\"\n\nYou turn towards the source of the voice, and raise yourself up into a low crouch.\n\n\"You know what?\"\n\n\"...hmmm? No, what?\"\n\nYour finger hovers over the ON button, as you continue to narrow down your lead.\n\n\"Chicken butt.\"\n\nYou turn the flashlight on and shine it directly at him. Gonchar stands there, stark naked. The lower half of his body is drenched in blood, up to a surgically straight line across his chest, like an old man's pants line. His eyes are glassy-white; he looks at something behind you, nods, and the milky-white top half of his body walks away. The blood-caked bottom half remains motionless.\n*page_break Without a word, you turn and briskly start walking away.\n*goto walkdown\n*label astral\nGonchar makes a [i]cluck-cluck[/i] noise with his tongue, then hands you a small velvet bag. \n\n\"Before we go any further, you're going to need to take this.\"\n\nYou undo the small string and crack open the bag. A strong, strangely familiar scent wafts into your nostrils. \n\n\"What the hell is this? Oregano?\"\n\nGonchar chuckles. \n\n\"Mostly mugwort, some lamb's cress, myrrh... and just a dab of something I concocted in the lab, to give it an extra little 'kick.'\"\n\nYou look back down at the little green bag.\n*page_break Your nose tingles, and the bag starts to break down into swirling patterns...\n\"You.... you've drugged me. You drugged me earlier. That's what this is all about.\"\n\nGonchar dismisses you with a wave of his hand.\n\n\"Nonsense! I did no such thing!\"\n\n\"B-but the things I've seen...\"\n\nGonchar snorts. \"Ahh... yes. [i]Things[/i]. Well, I can assure you this: nothing you have experienced thus far was the result of herbal alteration. After all, I wouldn't want you to do anything [i]illegal[/i].\"\n*page_break\nYou're starting to doubt yourself. Is he lying? Is he telling the truth? Why are his eyes slowly moving to the sides of his head, like a cow?\n\n\"So, no... uggh... nothing is--what the...\"\n\nGonchar looks at you disapprovingly. \"It's happening again for you, isn't it? Well, I suppose it can't be helped-- no, the Veil is very thin here. Practically non-existent. As a matter of fact, what you are seeing now is far, far more factually accurate than anything you have come to believe is 'true' before now, including such crudely-invented illusions as stop signs, taxes, and expense reports. Those fictions only exist in your mind, placed there by unscrupulous con men whose entire existence revolves around fabricating the most outrageous lies. I, on the other hand, offer you something else: actual, literal, freedom, and the unstoppable power that comes with that freedom.\"\n*page_break \"Now are you going to take these or not?\"\nYou look down at the bag, then back up at Gonchar. His eyestalks are sprouting from the sides of his head now, where his ears should be, which you find odd. His lips are wide and red, but his mouth doesn't seem to be moving when he talks. \n\nSomething's not quite right, but you can't place your finger on it. You reach up and grab one of his eyestalks. Gonchar's body shivers a little, but he says nothing. You release your grip, your hand covered in viscous, warm slime. The little green bag has disappeared.\n*choice\n  #\"I'm in. Where's the bag?\"\n    *set wisdom -15\n    *set intelligence -10\n    *set bravery +10\n    *set blasphemy +15\n    *goto lsd\n  #\"I'm out. Where's the exit?\"\n    *set wisdom +10\n    *set bravery +5\n    *set blasphemy -10\n    *goto nolsd\n*label lsd\nGonchar motions to the floor with one of his insect-like appendages. \n\n\"Pick it up.\"\n\nYou bend down to pick it up, and feel a tiny pinprick in your right bicep. You look back over your shoulder, and see your old enemy standing there, flickering on and off like a strobe light. A jolt of pain runs down your arm as the bicep muscle folds in on itself, then starts flapping in rhythm to an old 70s R&B song you liked as a kid. \n\nYou feel utterly fantastic, and want to feel this way forever. \n\nThe bag on the floor. That's where you can find this, again and again and again. \n\nYou reach down, but it's gone. A strange man with translucent hair laughs.\n\n*page_break \"You won't be needing that any longer.\"\nYou want to feel anger at the man for taking the bag away, but can't. You're not capable of that emotion, not now, not anymore, never again for the remainder of your life. You open your eyes, realizing only now that they had been closed the entire time, perhaps your entire life. \n\nYou're buried in some sort of hole, with just your head and neck protruding above the ground. Above you is the most wondrous sight you've ever witnessed: a white light spiral, spanning the entire horizon, providing warmth and pure, clean energy to the trillions of tiny insect heads like yourself dotting the landscape. You stare at it in rapt fascination, knowing full well that nothing else in the universe could ever match this, nothing could ever force your eyes away. \n\n[i]This[/i] is life. [i]This[/i] is truth.\n\nA small, golden-brown beetle scuttles up to you and taps your ear with its pincer.\n\n\"We're wasting time. Come.\"\n\nThe dirt around you crumbles into a fine powder. Reluctantly, you crawl out of your hole and follow the beetle towards a knot in a giant willow tree. As you do so, the vast white spiral changes to a sickly green, then disappears altogether. \n\nThe beetle turns its empty eyes back to you and raises its mandibles toward the tree. You step forward.\n\n\"Welcome to godhood.\"\n*set goncharlvl3 true\n*gosub check_run_ad\n*finish\n*label nolsd\nYou shake your head and take a deep breath. A glint of steel zips through your peripheral vision: something small and sharp stabs your forearm just as you jerk it back. \n\nYou shine your flashlight on your wound: a small scratch, with a tiny droplet of dark red blood pooling on one end. You move the beam into Gonchar's face. His eyestalks are gone, replaced by the smug, condescending look you're more familiar with.\n\nHe's smiling.\n\n\"You son of a bitch. What did you do?\"\n\n\"Merely assisted your consciousness to expand its horizons; I am no more than the man crouching behind the gatekeeper, the whisperer of passwords, the shadow of the sigil on the wall.\"\n\nYou immediately put your mouth over the scratch and start sucking out the blood. It tastes vile, like chalky rust, and you spit it out onto the floor. You repeat this process several times, until your mouth can take no more. Panting heavily, you stare up at Gonchar, who eyes the little puddle of spit on the ground with disapproval.\n\n\"That was actually rather expensive.\"\n*page_break\n*goto nocrazy\n*label nocrazy\nYou slap him across the face, connecting just behind the jawline. Gonchar winces, but the impact doesn't seem to affect him much, not physically. \n\n\"I've had enough of your mysterious occultic BS. We're not at some goth dorm party surrounded by $15 black Hot Topic candles and a half-dozen impressionable sociology major dropouts. We're in an underground tunnel in the middle of the f--king desert with no food, no supplies, and no way out, possibly trapped with some sort of ancient hellbeast that can dig through solid rock like it was stale breakfast cereal. So are you going to stop spewing this arrogant diarrhea, get down to business and get us out of here, or should I just brain you with my flashlight right now?\"\n\nGonchar appears dazed as you speak, but once you finish a tiny, almost imperceptible smirk escapes the corner of his mouth.\n*page_break \"Crushing my skull would be for the best, I suppose.\"\nYou cock the flashlight like a mace, above and just behind your head. \n\n\"Just give me a reason, a--wipe.\"\n\nGonchar's smirk slowly envelopes his entire face. It seems to stretch far beyond the reach of a normal human mouth.\n\n*page_break \"Just one?\"\nYou start to bring the flashlight down on Gonchar's skull but are checked when the two of you hear a loud, low moan behind him. The moan, the sound of a moose or cow struggling to breathe, chills you to the bone. Every hair on your body stands up. Gonchar's face drops.\n\nThen, as quickly as it started, the baying stops. \n\nThe two of you stare out into the darkness for a long, long time. Neither of you move a muscle, nor could you if you wanted to. You feel like you've just been ambushed by the Gorgon of ancient legend, and have had your sinews, bone, blood, and other juices all turned to stone. \n\nYou wait for more, but nothing happens. Finally, Gonchar exhales, loud and long, for what seems like minutes. He turns to you and musters a weak smile.\n*page_break \"Well... that was interesting.\"\nYour own body begins to thaw out, and you find you can speak, though it comes out in a slushy, slurring mash.\n\n\"W-what was th-th-that?\"\n\nGonchar shrugs, then walks over to a pile of warrior corpses along the wall. He kicks the torso off of one and the head and shoulder off another, exposing a small, short passageway. \n\n\"I can haphazard a guess, but it would be wrong.\"\n\n\"H-humor me.\"\n\nGonchar squats into a crouch, and runs his fingers across a corroded, rusty weapon laying on the floor.\n*page_break \"Our opponent.\"\nYou stare at him in disbelief. \n\n\"So, this is some sort of [i]game[/i] now?\"\n\nGonchar stands up, pats his back pants pocket and, not finding something, gingerly crosses his arms.\n\n\"It may not be. The noise you --we-- heard could be an animal in need of help, or a friend, come to assist us in our time of need. But!-- I find it far more advantageous, personally, to treat every unknown entity as a possible enemy first. And if, after the unknown becomes known, said entity reveals themselves to be an ally... well, then it would be a pleasant surprise.\"\n\n\"Huh. So... what about me? Was [i]I[/i] once your enemy?\"\n\nGonchar snorts, ducks his head, and silently crawls through the opening and into the dark corridor.\n*page_break\nYou stand and wait there for a minute, before you realize that he's not coming back. The beam of your flashlight is also getting lower every half-hour; you consider turning it off to save precious battery, but with whatever creepy enemy is out there, you opt not to. \n\nStill, you have to do something. Gonchar is gone. Ian and Jacy are nowhere to be found. You heard a faint voice from the hole, and something potentially very nasty could be down the corridor Gonchar disappeared into. What do you do?\n*choice\n  #Crawl through the hole. One of your friends might be down there, in need of help.\n    *set wisdom +5\n    *set leadership +15\n    *set bravery +10\n    *goto hole\n  #Follow Gonchar down the dark corridor. \n    *set intelligence +5\n    *set bravery +5\n    *goto darkcorridor\n*label darkcorridor\nYou duck into the corridor, stepping over a 900 year-old warrior corpse with its arm and part of its shoulder sawed clean off. You wonder what had the power to accomplish this so long ago --even with modern technology, it's a difficult thing to pull off-- and start to imagine what dark, infernal thing hunts you in this abyssal cave. \n\nYou shake your head from side to side, trying to dislodge these idiotic thoughts. [i]There's got to be a reasonable explanation[/i]. There always is --perhaps its staring you in the face right now, and you just haven't figured it out yet. \n\n[i]Maybe I'm on the verge of some great scientific leap forward here, a discovery that goes far beyond traditional archae--[/i]\n*page_break The sound of shoes scuffling against rock echoes down the corridor.\nYou point the fading beam of your flashlight down the tunnel. There, about twenty feet in front of you, is a man's bare white ass. It's albino-pale, and criss-crossed with deep red gashes. \n\nMoving the flashlight up, you see that the backside belongs to Dr. Avery Gonchar --except that he looks nearly unrecognizeable from when you last saw him just a few minutes ago. He's completely naked, exposing milk-white skin that looks as if it hasn't seen sunlight in decades. His eyes are glassy, his pupils white. Much of his body is bleeding, or covered in long, jagged scratches. \n\nHe's chewing on his hand. In that hand is a book. A book you've seen before.\n*page_break Your flashlight starts to flicker, then goes out.\nGonchar --or what was once Gonchar-- emits a low-pitched, reptilian [i]hissss[/i]. Footsteps strike the stone floor: he's heading right for you. What do you do?\n*choice\n  #Stand your ground. He's lost a lot of blood; you can take him.\n    *set bravery +5\n    *set wisdom -10\n    *goto standfight\n  #Run back the way you came. Without light, you wouldn't stand a chance.\n    *set wisdom +5\n    *set bravery -10\n    *goto runfrom\n  #Get down into a low crouch and roll, aiming for the knees. He won't be expecting that...will he?\n    *set intelligence +5\n    *set bravery +10\n    *goto aimknees\n*label standfight\nYou brace yourself in the pitch-black darkness, getting down into a ready stance and swinging the heavy flashlight from side to side in front of you. \n\nThe footsteps stop. You strain your ears for any sound, and, hearing nothing, squint your eyes in the darkness. \n\nNothing. No sound of any kind, other than your own breathing. You wonder if the creepy Goncharian creature can feel your heart pounding in your chest.\n\nYou need light. You flick the button on and off, then slap it against your thigh to give it a jolt. You flick it on again, and a thin beam of light illuminates the rough cavern ceiling.\n*page_break The flashlight is ripped out of your hand.\nThe light disappears and you are again in total darkness. To your left, you hear a loud crunching sound, and know that [i]something[/i] just snatched your flashlight and... [i]ate[/i] it. \n\nYou start to think that maybe you should have run when you had the chance. You back away slowly, your hands feeling along the tunnel walls. \n\nYou take one step backward, then another. The crunching noise stops. Total silence fills the corridor. You gulp nervously and take another step back, your fists clenched in front of you like an untrained boxer in his first fight.\n*page_break \"Where are you going, $!{name}?\"\nThe voice is low and familiar, about an inch from your ear. You instinctively swat it away, shuddering when your hand connects with something cold and slimy. Disgusted, you jerk back.\n\n\"Oh, come on $!{name}. Do I really scare you that much?\"\n\nYou fumble around in the darkness, feeling for the wall, searching for anything solid.\n\n\"Gonchar? Is that--what the hell happened to you?\"\n\nYou hear a muffled snort.\n\n\"Why do you ask? I merely went down this passageway, a little more quickly than you were prepared for, evidently. I found nothing of interest, and turned back. And that's when we met.\"\n\nYou try to locate him by his voice, but the echo effect makes it all but impossible. \n\n\"Why did you break my flashlight? Why are you naked? What... what the hell happened to your [i]eyes[/i]?!\"\n\nYou back into something cold and clammy. Your hand finds something with the consistency of frozen pizza. You give it a squeeze, and hear Gonchar whimper softly behind you. \n*page_break \"Ahhhh.... please do that again.\"\nA sliver of ice slides down your spine. You leap away.\n\n\"You sick f--k! What the hell is wrong with you?!\"\n\nGonchar laughs.\n\n\"Sick? I don't feel unhealthy, or unnatural. Very much the opposite.\"\n\nYou shudder. The initial rush of adrenaline has left your body, leaving you weak and shaking. You can't see a thing in the deep, deep darkness. You steel your nerves and clear your throat, trying to cover the quiver in your voice.\n\n\"Ok, Gonchar... enough of the games. I just saw ...[i]think[/i] I saw... you... well, you know, I'm not sure what I can trust in this place. Certainly not my own eyes.\"\n\n\"Oh, I disagree. Whatever you saw, that was the truth.\"\n\n\"What, are you serious? I've seen some crazy s--t down here. Unbelievable stuff, you know... and then it goes back to normal. Or, as close to normal as I could hope for.\"\n\nYou hear a scuffling sound along the wall to your right, followed by another revolting, throaty moan from Gonchar.\n\n\"Ohhhhhhh... to be young and stupid. Come now, relax. Drink it all in. Interact. Experience. Experiment. Triumph. You only get out of existence as much as you put in. It's time to get up from your seat in the back row, and get on the stage with the other performers.\"\n\n\"What stage? What performers? What the hell are you talking about?\"\n*page_break \"They're waiting.\"\nYou pause, squinting in Gonchar's general direction. You get an idea.\n\n\"Listen, Gonch...the performance is worthless if the audience can't see the stage.\"\n\nYou hear Gonchar make a [i]hmm[/i] sound. Something scuffs against the wall to your left.\n\n\"That's the first intelligent thing you've said all millennium.\"\n\nA burst of bright pink light blinds you for a moment, then fades. Directly in front of you is Gonchar, moving his elongated limbs in a skittery, jerky way that strongly resembles a giant albino cockroach. His left hand above the wrist is missing, replaced by a bright pink flame melting the skin of his arm off like wax. With his other hand, he tosses a small bag at your feet.\n\nYou hesitate to pick it up, not knowing how you could ever trust your eyes again.\n\n\"What's this? What's in the bag?\"\n\nA shiver ripples over Gonchar's pasty elastic skin. Something bubbles under the tangled masses of blue and red veins.\n\n\"A looking glass... in powder form.\"\n*choice\n  #\"Sounds good. Let's do this.\"\n    *set wisdom -5\n    *set bravery +5\n    *set blasphemy +15\n    *goto lsd\n  #\"This is the last time I'm going to tell you: leave me alone, and never come back.\"\n    *set wisdom +5\n    *set blasphemy -10\n    *goto nodice\n*label runfrom\nYou run.\n\nYou sprint back the way you came, smacking your shoulders into solid earth and tripping over exposed roots and stone. Scrambling to your feet as quickly as possible, you continue on, ignoring the pain in your arms, plunging wildly into the darkness. \n\nYou need to make the burial chamber. You need to get away from the creature that may once have been Dr. Avery Gonchar, Half-Lizard Reality Show Archaeologist Superstar. And once you leave this infernal tunnel and get back to the chamber-- well, you'll worry about that part of the plan when you get there.\n\nYou just wish you had a light. If you could just see where you were going, and what that thing was behind you...\n\nPart of the darkness shifts in front of you. Your forehead tries --and fails-- to break through a billion years of solid rock, and you black out. \n*page_break\nYou open your eyes, close them, then open them again. \n\nNo difference.\n\nA queasy feeling in your stomach and a searing headache tell you that you're probably not dreaming. You open and close your right hand, noticing only then that your back is cold and wet. Slowly, you struggle against your own limp and useless muscles until you're in a sitting cross-legged on the floor.\n\nYou run your fingers across the ground. The stone beneath you is slightly damp in places, particularly where you were just laying. You sniff your palm to try and figure it out --is it sweat? Blood? Gonchar's liquified remains?-- but the fluid is nearly odorless, with just a slight hint of something metallic. You sit and ponder for a moment, your mind blank and unfocused.\n*page_break A faint, shrill cry rouses your senses.\nYou scramble to all fours, vomit something cold and slimy, then crawl forward towards the sound of the voice. Whether it's Gonchar, or one of your assistants, or even some slobbering beast mimicking a human voice to lure you in... regardless of anything, it's your only point of contact with another living creature, and you're going to find it as quickly as you possibly can. \n\nBefore you've gone ten feet, your palms and fingers are already sliced to ribbons on sharp metal objects. The sudden stabs of pain make you smile.\n\nYou're back in the burial chamber.\n\nYou reach for your flashlight and slam it against a priceless Mongolian helmet, dislodging it's unlucky owner's skull from his neck. The bulb flickers to life, and you grin again.\n\n\"Looks like everything is going my way today!\"\n\nSpotting the hole near the giant iron door, you scuttle over to it, aim your flashlight, and peer in. The hole is a roughly-burrowed tunnel extending far past the limit of the fading beam, no taller than two feet at the most, and only slightly wider. A long, pale-white centipede skitters across your line of sight.\n\nThere's no other way to do this: you're going to have to get down on your stomach and crawl through.\n\nYour smile fades. \n\nYou take a deep breath, duck your head, and plunge through.\n*page_break \n*goto hole\n*label aimknees\nYou take two steps, put your arms in front of your face and barrel into the creature's knees. You brace for impact, hoping that the beast's limbs will buckle when you plow into them. \n\nFor a single, brief moment in time, you are weightless in deep space, hurtling blindly through the void. \n\nHalf a breath later, you slam into solid stone. Pain spikes through your entire body, as if half a dozen steel bolts just shot through your spine. You cry out, but hear no echo. Wincing, you flail helplessly at your back with your one free arm, wondering why you can't move --or even feel-- the other. \n\nSomething large rushes by in the dark. Your scalp tingles as every hair on your body stands to attention. A slight buzzing drones in your left ear. \n\nYou decide to stand up, but none of the muscles in your body respond. The beast could be moments away from devouring you alive --or worse-- and all your body wants to do is sit there like a loaf, wallowing in irregular bursts of pain. \n \nNot knowing what else to do, you hock a large amount of mucous in your mouth, and spit into the darkness. It makes a sickening [i]plish[/i] sound.\n*page_break Suddenly, you wish you hadn't done that.\nDid it hit the beast? \n\nYou strain your ears for any sound, and, hearing nothing, squint your eyes in the darkness. \n\nNothing. No sound of any kind, other than your own breathing. You wonder if the creature can hear your heart pounding.\n\nYou need light. You test your hand by opening and closing your palm. You feel just a little bit of pain between your shoulder blades, but it seems to work. You flick the button on and off, then slap it against your thigh to give it a jolt. You flick it on again, and a thin beam of light illuminates the rough cavern ceiling.\n*page_break A swift movement in the dark, and the flashlight is ripped out of your hand.\nThe light disappears and you are again in total darkness. To your left, you hear a loud crunching sound, and know that something just snatched your flashlight and... [i]ate[/i] it. \n\nYou start to think that maybe you should have run when you had the chance. That maybe you shouldn't have launched a gob of phelgm at an enraged, invisible monster. Slowly, you rise up into a crouch, every muscle in your body aching, your lower back as stiff as a plank of wood. You take a deep breath and back away slowly, your hands feeling along the tunnel walls. \n\nYou shuffle one agonizing step backward, then another. The crunching noise stops. Total silence fills the corridor. You gulp nervously, clench your teeth and take another step back, your hands supporting your weight like some sort of early primate.\n*page_break \"Where are you going, $!{name}?\"\nThe voice is low and familiar, about an inch from your ear. You instinctively swat it away, shuddering when your hand connects with something cold and slimy. Disgusted, you jerk back, then shudder as another bolt of pain snakes through your rib cage.\n\n\"Oh, come on $!{name}. Am I really that revolting?\"\n\nYou fumble around in the darkness, feeling for the wall, for anything solid.\n\n\"Gonchar? Is that--what the hell happened to you?\"\n\nYou hear a muffled snort.\n\n\"Why do you ask? I merely went down this passageway, a little more quickly than you were prepared for, evidently. I found nothing of interest, and turned back. And that's when you performed that wonderful dance move. What do you call it? It must be a hit at parties.\"\n\nYou try to locate him by his voice, but the echo effect makes it all but impossible. \n\n\"Why did you break my flashlight? Why are you naked? What... what the hell happened to your [i]eyes[/i]?!\"\n\nYou bump into something cold and clammy. Your hand finds something with the consistency of frozen pizza; fumbling for a hold, you give it a pre-emptive squeeze, and hear Gonchar whimper softly. \n*page_break \"Ahhhh yessss.... please do that again.\"\nA sliver of icewater slides down your spine. You back away.\n\n\"You sick f--k! What the hell is wrong with you?!\"\n\nGonchar laughs.\n\n\"I don't feel unhealthy, or unnatural. Quite the opposite, on a technical level.\"\n\nYou shudder. The initial rush of pain-adrenaline has drained from your body, leaving you weak and shaking. You can't see a thing in the deep, thick, syrupy darkness. You steel your nerves and clear your throat, trying to cover the quiver in your voice.\n\n\"Ok, Gonchar... enough of the games. I just saw... I [i]think[/i] I saw... you... well, you know, I'm not sure what I saw, or what I can [i]trust[/i], here, in this place. Certainly not my own eyes.\"\n\n\"Oh, I disagree. Whatever you saw, that was the truth.\"\n\n\"What, are you serious? I've seen some crazy s--t down here. Unbelievable stuff, you know... and then it goes back to normal. Or, close enough to normal.\"\n\nYou hear a scuffling sound along the wall to your right, followed by another revolting, throaty moan from Gonchar.\n\n\"Ohhhhhhh mmmmmmm... to be young, and so stupid. Come now, relax. Drink it all in. Interact. Experience. Experiment. Triumph. You only get out of this existence as much as you put in. It's time to get up from your seat in the back row, and get on the stage with the other performers.\"\n\n\"What stage? What performers? What the hell are you talking about?\"\n*page_break \"They're waiting.\"\nYou pause, squinting in Gonchar's general direction. You suddenly get an idea.\n\n\"The performance is worthless if the audience can't see the stage.\"\n\nYou hear Gonchar make a [i]hmm[/i] sound. Something scuffs against the wall to your left.\n\n\"That's the first intelligent thing you've all millennium.\"\n\nA burst of bright pink light blinds you for a moment, then fades. Directly in front of you is Gonchar, moving his oddly-elongated limbs in a skittery, jerky way that heavily resembles a giant albino cockroach. His left hand above the wrist is missing, replaced by a bright pink flame melting the skin of his arm off like wax. With his other hand, he tosses a small bag at your feet.\n\nYou hesitate to pick it up, trying your best to reason away the thing in front of you.\n\n\"W-What's this? What's in... what's in the bag?\"\n\nA shiver ripples over Gonchar's pasty elastic skin. Something bubbles under the tangled masses of blue and red veins.\n\n\"A looking glass... in powder form.\"\n*choice\n  #\"So be it. What do you need me to do?\"\n    *set wisdom -5\n    *set bravery +5\n    *set blasphemy +15\n    *goto lsd\n  #\"This is the last time I'm going to tell you: Leave. Me. Alone.\"\n    *set wisdom +5\n    *set blasphemy -10\n    *goto nodice\n*label nodice\nYou look down at the bag. In the iridescent pink light, it looks like a tiny organ, perhaps a heart. Whether it's your imagination or not, you think you see it pulse, ever so slightly.\n\nPart of you wants to open it. It's just sitting right there, less than a foot away. You tell yourself that bending down, with your recent injuries, would make it too difficult to grasp.\n\nAs if in response, every shred of pain in your body instantly disappears.\n\nYou breathe in, filling your lungs with ecstatic relief. You know what's in the bag. New worlds. Important discoveries. Arcane, alien knowledge. Each grain a universe, waiting impatiently, aching, longing, teeming with life, and death, and things that are neither. There are no secrets in the universe, there never were any secrets, any mysteries: all the answers were in plain view the entire time, lying out in the open, right there, less than a foot away.\n*page_break Your hand glides down to the floor...\nGonchar clears his throat. You glance up at him, and although you can't see it, you hear the phlegm bubble down his esophagus. Your hand snaps back, as if you'd just touched the edge of a hot stove.\n\"You know what, Avery? Screw you.\"\n\nGonchar says nothing. The pink flame crackles.\n\n\"Take your f--king drugs and shove off.\" \n\nThe air around you grows heavy and quiet, the vast, immeasurable silence of deep space. Millions of tons of some invisible mass force you down, bending your back, your hips, your knees, until you are face-down on the floor. Straining against it, you move your face and look up at your torturer.\n\nHis swollen pink face looks ripe to burst. His eyes, bulging from their sockets, stare straight ahead in quiet horror. No sound escapes his lips, stretched back against his teeth until the gums begin to bleed.\n*page_break You try and scream, but cannot. Sound does not travel here.\nYour body is drawn into the dusty floor beneath you, and you feel your ribs begin to crack. You wonder if this is what it feels like, if this is what happens when you insult the universe to its face. \n\nYour line of sight diminishing, you try and grasp the only thing you can see. Your hand crawls along the dirt, a fleshy worm bred for suffering, until it reaches the bag. Your fingers brush it, nudging it away. The weight on your skull and neck triples. You close your eyes, emit a single, silent scream, and force your arm forward. A breath of eternity later, your fingers close around the bag, nestling it in the palm of your hand.\n\n*page_break The weight stops. \nYou open your eyes, realizing only then that they were closed. Three feet away, your flashlight rolls along the ground, as if you'd just dropped it. Gonchar and his pink flame are nowhere to be seen. \n\nYou drag yourself up to all fours, listening to the rhythmic symphony of your muscles and joints popping and cracking. Nothing feels right: your body seems strange and distant, a marionette with its strings in a tangled mess. \n\nDragging yourself up off the dirt, you crawl over to your flashlight. As you reach to pick it up, a small bag drops from your hand to the ground. You stare at it for a moment in confusion --[i]did I really just experience that?[/i]. After a second, you feel a slight pressure on your eardrums, and quickly your hand darts to snatch it up. \n\nYou put it in your pocket, not knowing if this is right. Far off, down the tunnel, a pink-and-orange speck twinkles, then disappears.\n\nBrushing your fingers down the length of the flashlight, you stand up, the muscles in your body creaking and groaning like unused gears in some ancient machine. \n\nPatting the small lump in your pocket, you nod, point the flashlight down the tunnel, and start walking.\n*set sololvl3 true\n*gosub check_run_ad\n*finish\n*label hole\n*gosub check_run_ad\nThe tunnel walls are jagged and sharp, a twisting, erratic chaos vortex in the deep darkness. You crawl through like a worm, contorting your body into impossible angles until you can no longer discern up from down. You inch forward, moving your body in sections like an earthworm, your shoulders scraping against the hard rock walls, your arms flailing in front of your head, your feet scrabbling for a hold, your legs pushing off against unseen stone to thrust your upper body up through the hole, which then waits, impatiently, for the rest of you to catch up. \n\nEach breath feels like it will be your last. The air grows thinner and thinner, yet your lungs grow greedier. A thousand times, you change your mind, you hesitate, you decide to go back--but it's too late now, you're not even sure if your body could withstand backing up, feet-first, into the void. Your psyche wouldn't survive ten minutes of that. \n*page_break So, slowly dying, you forge ahead.\nIt isn't until you hit an almost 90-degree bend in the rock that you start questioning your life choices.\n\nThe faint beam of your flashlight doesn't help you here. Are you close to the end of the tunnel? Your own body blocks the sight-lines back: in this cramped, claustrophobic place, it's impossible to tell if you've travelled ten yards, or ten feet. You start to wonder about the entity that dug this tunnel through solid rock, so many centuries before. \n\nWhat was it, exactly? Why was it here? Where was it going? Why burrow through solid rock? \n\n*page_break Where is it now?\nYou quietly reflect for a moment, before realizing that all these idle questions are just your way of stalling for time. The sharp bend is before you: do you press forward, snaking your body in unnatural ways to get past this, or do you blindly contort your way back to the burial chamber?\n*choice\n  #Crawling through this tunnel was a terrible idea. Even if you get past this bend --which seems to go straight up-- what about the next angle? And the next? And the forty or fifty after that? Steeling yourself, you inhale a tiny amount of stale, musty air, feel out the ground behind you with your foot, and start sliding backward.\n    *set bravery -10\n    *goto slideback\n  #You're running out of time, and it's looking more and more like this tunnel will soon become your makeshift grave. Still, you must press on: if some ancient murder-beast could do it, so can you. Scrabbling for a handhold, you twist your body around until you're on your back, and drag yourself up.\n    *set bravery +15\n    *goto forward\n*label slideback\nYou feel like an earthworm in reverse, except doubly-blind, as now you have no way of sensing where you are going. You wiggle your foot behind you, feeling for the rocky edges of empty air, then scoot backwards until some part of your body can go no further.\n\nDespite the cool feel of the stone, sweat begins to pool on your temples, misting over your eyes. You turn your flashlight off --in this situation, it's less than worthless, and you may need to save the batteries for later. \n\nYou feel a rise in the tunnel behind you, and twist around until you're on your back, the stone ceiling just three inches above you: you're glad you turned off the light when you did. Slowly, you scoot along your back up over the rise, mimicking the posture of a championship limbo dancer.\n*page_break You wiggle your hips over the rise...\n...and get stuck. Your lower back locks up, the muscles tightening into coiled steel cable. You try and grab a fistful of stone but can't find a good handhold. Your heart, now lower than your legs, begins to pump rapidly, flushing your head and neck with hot, trapped blood. You kick with your feet, trying to shove yourself back down the tunnel, but your knees slam up against the stone and go numb.\n\nEven in the pitch black darkness, you can feel the edges of your vision fading. You reach for your flashlight and turn it on.\n*page_break Big mistake.\nThe unmoving, unyielding stone is wrapped around you like a coffin. You begin hyperventilating. Fumbling with your flashlight, you try and switch it off, but it slips out of your sweat-slick palms. It rolls to a point above your head, illuminating millions of tons of rock hovering an inch above your face.\n\nYour throat constricts. You try and force down another gulp of air, but it can't get through. The pale, dusty stone above you begins to turn pinkish-red. Helplessly, you watch in wonder as the solid slab devolves into tens of thousands of tiny, dancing dots, like a swarm of single-celled organisms caught in the rush of the tide. As your consciousness fades, you can't help but laugh at the absurd corpse you're leaving behind for the tomb's next victim. Just imagine the advances in archaeological technique a thousand years from now...\n*achieve buriedalive\n*goto_scene ending\n*label forward\nScooting up along your back, you reach the sharp angle and shine your flashlight up. From what you can tell, it seems like the tunnel here is a more-or-less vertical shaft, roughly six feet long, ending in a larger chamber. You refocus your beam to see if it can reach the ceiling, but you catch nothing but darkness.\n\nYou slowly drag your upper torso up through the hole until you're in a sitting position. After taking a deep breath of stagnant air, you twist and contort your body around --scraping the outer edge of both legs red-raw and nearly popping your thigh bone out of its socket-- until finally, you're in a standing position. Your eyes are just a foot below the edge of the shaft now. After a few minutes to rest your exhausted muscles, you scamper up out of the tunnel and into a large, spherical chamber.\n\nBetween the crawling, the claustrophobia, and the terror-adrenaline, you've never been more exhausted in all of your life. You barely even have the energy to shine your flashlight around the chamber. With your muscles turned to jelly, you lay on your back to catch some rest.\n*page_break You hear a woman's voice nearby...\n[i]It's happening. Again[/i]\n\nYou close your eyes, knowing that your mind is not your own. The visions, feelings, sights and sounds since you found yourself down here... clearly it's all just in your head. Just a starving mammal's psychosomatic reaction to a high-stress environment. Perhaps with the help of some hallucinogenic spores or fungi, just to add a pinch of madness to an already thick sh-tstew. You'd grin, if your muscles had the ability.\n\nThen you hear it again. You ignore it. \n\nAnd then again. You scoff... \n*page_break And then a third time. The voice sounds familiar...\nJacy.\n\nThat's Jacy's voice, no question. Now you start to doubt the in-your-head theory. What if it's really her?\n\nYou cry out, seeing if you get a response.\n\n\"Hello? Who's there?\"\n\nSilence.\n\n[i]Of course[/i]. Naturally, it was all in your head. Wishful thinking, that someone like Jacy would be caught dead dow--\n*page_break \"$!{name}? Is that... is that r-really you?\"\nYou strain against gravity to get up to a sitting position, then shine the flashlight around the chamber. At first glance, it appears to be a half-dome, the ceiling riddled with strange, arcane sigils. A spiral symbol, closely resembling a black hole, predominates your surroundings.\n\n\"Jacy? Jacy, where are you?\"\n\n\"$!{name}, I'm down here! Down in the pit!\"\n\n\"Pit? What pit? Where are you?\"\n\n\"I'm in the pit! In the god d-mn big-ass hole in the f--king ground!\"\n\nYou shine your beam along the ground, trying to locate where her voice is coming from. The ground beneath you is worked stone, a labyrinthine design of nested circles. The rough, jagged hole that you emerged from is directly in the center of the innermost circle.\n\n\"Jacy... what [i]is[/i] this place?\"\n\nJacy's voice grows deep and growly, sounding like a large dog that just learned how to speak English.\n*page_break \"[i]Come down here, and I'll tell you.[/i]\"\nNow that's disturbing.\n\nYou've known Jacy for a long time now, and her voice has never sounded like that. Even during those times --those many, many times-- when you made her so mad she would start throwing things at your head. Metal things. Sharp things.\n\nYou're going to need a little more convincing.\n\n\"Jacy? Come down where? Where are you?\"\n\n\"Please hurry, $!{name}.... [i]please[/i].\"\n\nHmm. Her voice sounds normal again.\n\nInteresting.\n\nScanning your beam along the ground, you finally see it: at the edge of the furthest inscribed circle is a small ledge, nearly hidden from view. Past that is nothing but deep darkness. \n \nYou've got a plan.\n*page_break \"Jacy, can I ask you a question?\"\nTotal, absolute silence descends on your prone form. For the next few seconds, you watch as your chest rises and falls, the only clue that you're even still breathing. Suddenly, there's a loud [i]pop![/i], and the rush of normal cave noise fills your ears like a audio tsunami.   \n\n\"A question? About what?\"\n\nSomething is wrong. You need to know if this is the really her: a single mistake here, and you might end up passing through the thousand-year-old digestive tract of some metaphysical horror. Of course, it [i]could[/i] be Jacy... \n\nYou rack your brain, trying to think of something only the real Jacy would know. Finally, it hits you: something she had admitted to you, once, after a late night of research on the Uigher matriarchal tribal customs of the 1100s. Something too alien, too otherworldly for a centuries-old imposter to guess.\n\n\"Jacy? Are you still there?\"\n\n\"Of course. Can you hurry it up? What's your question?\"\n\nYou point your flashlight behind you so as not to give away your position, and crawl to the very edge of the pit. Staring into it, you feel as if you are face-to-face with the Void itself, with the formless black nothingness that stretches between the stars, ripped out of space, then packed, condensed, and impacted into a tiny ten-foot sphere by some malignant galactal god. \n\nYou swallow another gulp of stale air and steel yourself. This could end badly.\n*page_break \"Jacy... what's the most underrated movie of all time?\"\nYou hear a slight note of uncertainty in her voice.\n\n\"Are you serious?\"\n\n\"Yes.\"\n\n\"Just come down here and help me.\"\n\n\"Answer the question first.\"\n\n\"Why is this so important to you? I need your help!\"\n\n\"I just need to make sure.\"\n\n\"Make sure of [i]what[/i]?\"\n\n\"...just answer me, Jacy. Please.\"\n\n\"Fine.\"\n\nA blast of foul-smelling wind rushes up from the pit, swirls around the domed chamber, then disappears back down just as quickly as it came. As it leaves, you feel a strange tingling on your scalp. Jacy's voice --weaker than usual-- follows it.\n*page_break \"[i]Josie and the Pussycats[/i].\"\nD-mnit.\n\nYou disagree with her --of course, the correct answer is [i]Meet the Feebles[/i]-- but there's no denying it's really her. Unless that strange wind had something to do with it. But where would that amount of air come from? And how could it move, and disappear, so fast?\n\n\"Okay, okay. You pass. Well... what do you need from me?\"\n\n\"I pass? Amazing. Just great. We'll celebrate with some Night Train later. In the meantime, just shine your flashlight down here. I dropped mine somewhere in the pit, and I'm... I don't want to slip and fall.\"\n\nYou bring the flashlight around and shine it over the edge. There, about twenty feet down, is your prized assistant. She's got a large backpack, a huge coil of rope, and an angry look on her face ...almost as if you'd just blinded her.\n*page_break You clear your throat, and quietly move your beam a little to the left.\n\"[i]Danke schoooon[/i], prof. Now can you help me find my flashlight? It's probably on one of those ledges over there.\"\n\nYou scan the pit, but your tiny flashlight is not up to the task. The edges seem rough-hewn in places, smooth in others, with small footholds and ledges at random intervals here and there. The center of the pit is masked by a deep, unsettling darkness, a pool of ink-black miasma that absorbs and devours any shred of light that falls into its web. Jacy lets out more rope down the wall of the pit, having double-secured it around a squat, featureless obelisk at the mouth of the chamber.\n\nAs you watch her let out more rope, you notice something else. Her hands, normally smooth and honey-colored, are pale and bony, almost like crow's feet through an X-ray. You start, nearly dropping the flashlight into the abyss below.\n\n\"Uhhh... Jacy?\"\n\nYour assistant continues to let out carefully-proportioned lengths of rope down the wall while counting under her breath.\n\n\"Yes[i]eightnine[/i]? What[i]teneleven[/i]?\"\n\nYou rack your brain, trying to come up with another question. Just to prove it's her. Another little bit of trivia, something only she would know. It can't hurt to ask, right?\n\n\"I need to ask you another question.\"\n\nThe rope stops. Jacy does not look up.\n\n\"[i]Why[/i]?\"\n\n\"Well, for... just to make sure, that... listen, can I just ask it?\"\n\nJacy looks up. Her pupils are bone-white, her eyes narrowed into slits.\n*page_break \"No questions.\"\nYou say nothing. After a moment, Jacy returns to her task, murmuring integers to herself as she lets the rope down.\n\nWhat do you do?\n*choice\n  #Ask her another question. Better safe than sorry. You have to know she's not some sort of she-beast disguised as your assistant.\n    *set wisdom +5\n    *set bravery -5\n    *set leadership -10\n    *goto askjace\n  #Scamper down the wall to her ledge, and start helping her out. She got the movie thing right, shouldn't that be good enough?\n    *set bravery +5\n    *set wisdom -5\n    *set leadership +10\n    *goto noask\n*label askjace\nYou steel your nerves, look past her into the jet-black darkness of the pit, and summon your courage. You trust nothing down here, not even your own eyes. But there is [i]one[/i] thing you can always rely on: \n\nJacy's unhealthy obsession with obscure 1980s sports trivia.\n\nYou take a deep breath, not knowing if the person you once knew as your assistant is still just that... or if the unholy form below is just seconds away from sinking its fangs into your throat and using your spinal cord as a toothpick.\n\n\"...Jacy?\"\n\nNo response. You shudder, then close your eyes.\n\n\"Jacy... who is your favorite baseball player of all time?\"\n*page_break You hear a low growl...\nYou open your eyes. She's staring directly at you, a look of fierce, white-hot hatred in her eyes. Eyes that seem to be reflecting far more light than your flashlight is giving off.\n\n\"I [i]thought[/i] I said 'no more questions.'\"\n\n\"Just humor me, then. I've seen some insane s--t since I got down here, and I just need to know that--\"\n\n\"Rob Deer. Rob [i]F--king[/i] Deer. We've talked about this already: you're too hung up on strikeouts and batting average, and are blind to the [i]infinitely[/i] more relevant stats like total bases, walks, and dreamy, lush, mid-80s mustache-and-mullet combos. Christ, what the hell is wrong with you? If you're too lazy to help out, then just say so, so I can politely tell you to sod the f--k off. You can find your own godd--n way out of this dusty s--thole.\"\n*page_break Grinning, you scamper over the side of the pit. \nYou immediately realize your mistake. A sheer twenty-foot drop onto a narrow ledge would be difficult even in the best possible situation; with your battered, exhausted muscles, it's practically no different than leaping to your death. \n\nYou press your belly flat against the rough stone walls of the pit, hoping against hope that your body won't peel off and send you hurtling backwards into the abyss. Your hands are still clutching the top of the ledge, but you simply don't have the strength to pull yourself up --in retrospect, maybe you should have spent more time at the gym than at the library, or drank more protein shakes and less academic-friendly gas station wine-- and you start to seriously consider the consequences of sliding down a nearly-vertical slab on your stomach.\n\nSighing, you gently bang your forehead into the rock, hoping to shake out a decent idea. You're not the tallest archaeologist in the world, and that ledge is a good ways down the slope. A plunge now might dislodge Jacy from the ledge, and send you both tumbling into the nether.\n\nYou muster up some courage, and shout down.\n\n\"Ja--\"\n*page_break A rough, hairy claw wraps itself around your ankle.\nThe claw yanks your foot, and you drop an armspan down the slope. Losing your grip on the ledge, you slap your palms flat against the stone, hoping the friction will keep you up.\n\n\"Jacy, is that you? Did youaaaagh!!\"\n\nSharp, serrated talons sink into the tendon behind your ankle, sending tiny little explosions of pain up through your calf and lower back.\n\n\"Jacy, answer me!! JACY!!\"\n\nThe sharp, bristly hairs on the claw dig into the flesh around your ankle as the thing tightens its grip. With another pull, your body is dragged another foot down the slope, then another. No sounds come from the darkness below you. Do you:\n*choice\n  #Kick and tear at the claw with your other foot, possibly losing your balance in the process?\n    *set bravery +15\n    *goto kicking\n  #Release your grip, and let Jacy --or whatever it is-- pull you down the slope?\n    *set bravery +20\n    *set wisdom -15\n    *goto slopemonster\n*label kicking\nYou're not going to be devoured alive without a fight. Twisting your hips around for leverage, you jam the heel of your hiking boot into the creature's claw. Your strike has no effect, but you do it again, and again, and then one more time. Your kicks are getting progressively weaker, and you're beginning to wonder why you didn't listen to your perpetually-stoned Uncle Bob and just take a bulls--t major like Psychology or Political Science when, suddenly, the claw lets go.\n\nYou continue to slide down the rough slope. The ledge is probably a good seven or eight feet above you now, and completely out of reach.\n\n\"Jacy?!? If you're still alive... a little help?\"\n\nYou hear a muffled whimper beneath you. \n\n[i]Jacy.[/i]\n\nGlass shatters in the darkness. \n\n[i]Jacy!![/i]\n*page_break Something grabs your belt and drags you into the abyss.\nHurtling blindly through the void, you wonder how it all came to this, what choices you could have made to prevent this from ever happening, and why you're not currently defecating in your pants. It's only then that you get that painful, hollow sensation in your stomach and realize that you're ravenously hungry. How long has it been since you've eaten? You try and trace back your steps, but it's difficult to focus with the deafening rush of wind at your ears. \n\nHell, even if it's been two or three days since you last chowed down on a protein bar, that's just a drop in the bucket compared to how long it's been for whatever just grabbed you. You try and picture what sort of meal you'll end up being, and decide: not all that great. If you hadn't eaten anything for a thousand years, that first meal would [i]murder[/i] you.\n\nWeightless, formless, free, you plunge through the nether, surrendering your fate, your body, your soul, to the void, diving deeper, and deeper, and deeper...\n\n...until your feet gently touch down on some sort of solid, unmoving mass. The claw's grip on your belt is gone, and, now that you think of it, had been gone for some time. As you marvel at your new surroundings, a coarse, almost-familiar voice whispers in your ear.\n*page_break [i]\"Give me your flashlight.\"[/i]\nYou throw back your elbow and connect with flesh and bone. The creature emits a high-pitched little [i]oof[/i] on contact. You smile.\n\nA breath later, your smile is wiped off your face when something sharp and heavy slams into the back of your neck, then again against the tip of your ear. Surprised by just how much pain you're in, you throw a wild haymaker into the dark and hit skin stretched taut over bone, bruising your knuckles. \n\nA pair of claws grabs your collar and shoves you against the stone slope. Breathing heavily, you grab the beast's bony wrists, crane your neck and sink your teeth into its fingers.\n\nAn ear-piercing, too-familiar feminine scream erupts from the dark space in front of your eyes.\n*page_break \"AAAAGHHWHAT THE F--K IS YOUR PROBLEM?!?!\"\nJacy!\n\n\"Oh my god, Jacy, I didn't realize, wow, I'm just so happy tha--\"\n\nA fist smashes against your left cheek, dazing you momentarily and sending a shockwave of pain through your head and neck. \n\n\"THAT'S for being such an ungrateful piece of s--t! How dare you attack me after--we're on a godd--n [i]ledge[/i] here, $!{name}! What the hell are you even thinking?\"\n\n\"[i]Me[/i] attack [i]you?[/i] I thought you were attacking me!? I just felt--\"\n\nYou feel her fingers caress your cheek where she clocked you. \"Felt? Who cares what you [i]felt[/i]. We don't have time for that. We've got to get down, off this ledge and down to the bottom of this pit. I've searched through the rest of this complex, and there doesn't appear to be any obvious exit.\"\n\nAs always, your prize student has done her homework.\n\n\"But what if there's no exit down there, either?\"\n\n\"Did you bring your flashlight? Please tell me you brought your flashlight.\"\n\n\"Jacy, what if there's no exit in the pit?\"\n\n\"?!{name}. Hey. Flashlight. You still got it?\"\n\n\"Jacy! What if there is no way out of here?\"\n\nYou hear a sigh, then a moment of silence. Finally, she responds, her voice quiet and firm.\n*page_break \"Well... then at least we'll have discovered something incredible. Something no one has ever seen before.\"\nThe two of you descend further into the pit over the next few hours, fighting against your own exhausted bodies, trying to keep your focus. The air grows thicker and colder as you scramble down each ledge, with odd pockets of moist, hot air that dissipate in less than a second, leaving you drenched in an icy sweat that chills your body into the very marrow of your bones.\n\nBut it's ok: your training and past experience prepared you for this. You've been in deeper caves than this. You've survived cold, suffocation, and giant subterranean insects. A chaotic barrage of memories assault you: your first dig... happy hour shouting matches in the teacher's lounge... an Egyptian cave floor in motion, as millions upon millions of cockroaches slithered across a thousand years' of noxious bat guano... hiding in the tomb of that unknown nomadic chieftain with the rest of your terrified sophomore class just outside of Tel Aviv, as the rockets screamed across the sky above, frozen in place, unable to shift, the femur of some long-dead man jabbing you in the left buttcheek...\n\nBut that was different. Those times, you had your crew, your diggers, local guides, equipment, maps, full canteens, anti-diarrhea pills, occasionally-running automobiles, and extra batteries. Down here, it's just you and Jacy, and whatever you two happened to have on you when you went through that mysterious door in the river. \n\nYou're suddenly yanked out of your reveries when the rope connecting you to Jacy goes taut. She's below you, sliding first down the slope with the flashlight to scout ahead. You grasp the rope, but draw your hand back when it sears your flesh.\n\n\"Why would it--Jacy!!\"\n*page_break Something shiny and red passes between you. A moment later, Jacy and the light are gone.\n\"Jacy?!? JACY!!!\"\n\nFor a moment, you hear nothing. No sound of any kind escapes from the pit below; even your own breathing, your own heartbeat, are drenched in silence. \n\nWhat just happened? Where did she go? What was that... that...\n\nYou clutch the broken rope to your chest. Though it was only visible for a split second, you saw enough. The physical feeling of terror starts to creep up your legs, snaking its way through your nervous system, past your knees, then quads, then into the lower regions of--\n*page_break \"$!{name}, come down. [i]Come to me[/i]!\"\nThe voice sounds unnatural, almost gutteral, certainly in no way like hers. And yet...\n\n\"Jacy? Is that you? Are you alright?\"\n\nNo response. Did you simply imagine that voice? Is your brain once again playing tricks on you? Are you hallucinating?\n\n\"J-Jacy? I... are you... are you alive? Do you need help?\"\n\n\"Yes! Yes, I'm fine. Just jump down. You're close enough. Very close.\"\n\nThat was definitely her voice, even if there was a slight, unfamiliar trill to it.\n\n\"Are you ok? No broken bones? Can you walk?\"\n\n\"Perfectly fine. Now come, come to me. [i]Now[/i].\"\n\nA little vibration goes up your spine and into the base of your head just above the neck. You shiver. That last word sounded... off.\n\n\"Are... are you sure it's safe? Turn on the light! If I'm coming down, I need to see where I'm going, at least.\"\n\n\"Just jump. Light not needed anymore.\"\n \nThat time, it was her voice, but... she would never talk like that. She'd sooner be fed alive to rabid barracudas than use bad grammar.\n\n\"Jacy? Could you... I need the light. Just show me where you are, and... I want to see if you're alright.\"\n\nYou're startled by a strange noise, almost like a cowbell, rattling in your ear. An ice-cold gust of air rushes up from the pit and circles around you for a moment, before twisting off into the deeper darkness of the pit center. You then experience an odd, almost comforting, feeling that you need to relax and accept things as the way they are: everything's going to be just fine.\n\nYou can't stop the wide, warm, satisfied smile stretching across your face. Anyways, why would you? A familiar, feminine
