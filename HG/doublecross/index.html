, suprisied by his reaction, \"I was just being friendly.\"\n\n\t\t\"Ah, very good,\" Alex says, although he is very obviously not listening to you and doesn't care for what you have to say, \"Now if you wouldn't mind leaving me in peace I have a lot to do before it's time to leave.\"\n\n\t\tYou are very obviously dismissed and you can't help thinking as you back out that you handled that very badly.\n\t\t*set alex %-15\n\t\t*goto seven\n\t#Slip Out\n\t\t*goto seven\n\t#Make your way quietly into the room to sit and watch\n\t\t*set alex %+5\n\t\t*goto nine\n*label nine\n\nYou step quietly into the room. There is a seat near the door and you settle yourself in that, watching Alex as he reaches the crescendo of his speech.\n\nHis pain radiates through every word he speaks, and it's hard not to believe his heart is genuinely breaking, \"Wash me in steep-down gulfs of liquid fire! O Desdemona! Dead.\"\n\nHe finishes and even though you only caught the back end of his speech, you can feel its power radiating through you. There is no denying Alex's acting skill.\n\nAlex turns around in suprise when you start clapping.\n\n\"How long have you been there?\" He's visibly startled at your presence, it seems like he was very much wrapped up in his own world.\n\n\"Not long,\" You reply, trying not to look creepy, \"I was just walking past and I heard you and just sat in for the last bit. It was great, a very powerful rendition of-\"\n*choice\n\t#Hamlet\n\t\tAlex furrows his eyebrows at you, \"Um, thanks. But wrong play.\"\n\n\t\tYou blush, luckily Alex moves the conversation on for you.\n\t\t*set alex %-5\n\t\t*goto ten\n\t#Romeo and Juliet\n\t\tAlex furrows his eyebrows at you, \"Um, thanks. But wrong play.\"\n\n\t\tYou blush, luckily Alex moves the conversation on for you.\n\t\t*set alex %-5\n\t\t*goto ten\n\t#The Taming of The Shrew\n\t\tAlex furrows his eyebrows at you, \"Um, thanks. But wrong play.\"\n\n\t\tYou blush, luckily Alex moves the conversation on for you.\n\t\t*set alex %-5\n\t\t*goto ten\n\t#Othello\n\t\t\"You know your theatre pretty well.\" Alex is clearly suprised.\n\t\t*set alex %+5\n\t\t*goto ten\n\t#A Shakespeare monologue\n\t\tAlex chuckles a little, \"You know there's no shame in admitting you don't know what play it is after hearing approximately half a page.\"\n\n\t\tYou turn a little red, but Alex seems to find it funny.\n\t\t*set alex %+5\n\t\t*goto ten\n*label ten\n\n\"I think that's about as good as it's going to get. I'm pretty confident the casting people will like it.\"\n\n\"What I saw was pretty impressive.\" You say, \"The raw emotion you show is astounding, you have nothing to worry about.\"\n\nAlex smiles at you, thankful for the compliment, \"The task for the audition is to do a monologue dedicated to the perfect woman. I imagine most of the actors will be doing monologues concerned with love. I think this'll make me stand out, in a good way.\"\n\n*choice\n\t#\"But if they wanted a romantic monologue surely you aren't going to get the part for a tragedy?\"\n\t\t\"That's what I initially thought too. But no, the role they're looking for is a stalker, someone to exhibit obsessive love, so there's no need for romance specifically. Simply incredibly strong feelings. Othello feels so strongly for Desdemona he would rather kill her than bear the thought of her being with another man. The more I thought about it the more appropriate it seemed.\"\n\n\t\t\"Clever.\"\n\n\t\t\"I'm glad you think so.\" He replies appreciatively.\n\t\t*set alex %+8\n\t\t*goto eleven\n\t#\"I like your initiative.\"\n\t\t\"You still chose a script that would show the depth of feeling but simply in a seperate tone...\" You muse.\n\n\t\t\"Exactly.\" Alex replies looking pleased, \"I'm glad you see it.\"\n\t\t*set alex %+8\n\t\t*goto eleven\n\t#\"What makes you want to do a tragedy when you could do something much happier?\"\n\t\t\"That's an odd question.\" Alex says, looking a bit confused.\n\n\t\t\"I'm just saying surely pursuing acting you're doing what you do because you love it and doing it makes you happy. How can pretending to be miserable make you happy?\"\n\n\t\t\"An interesting question...\" Alex muses, \"I suppose I would have to say it's the study of the emotions I partake in, rather than the feeling of the emotions themselves that I enjoy. If you understand me?\"\n\t\t*set alex %+5\n\t\t*goto eleven\n\t#\"I think you should do a different monologue. This one is wrong.\"\n\t\t\"My audition is in two hours. I am hardly in a position to present another polished piece.\" Alex says coldly, \"I appreciate your vote of confidence. Now if you'll excuse me I have to practice my substandard piece again. If you'll kindly leave me alone.\"\n\t\t*set alex %-15\n\t\t*goto seven\n*label eleven\n\n\"Would you like to hear the scene again?\" Alex asks, \"It helps me if I have an audience to work with, I'd really appreciate it.\"\n\nTime's getting on, if you stay it will make you late for Opal.\n\n*choice\n\t#Stay\n\t\t*set alex %+5\n\t\t*set opal %-10\n\t\t*set alexact true\n\t\t*goto twelve\n\t#Hurry on\n\t\t\"I'm sorry,\" You start making your way towards the door, \"I'm afraid I do have to be somewhere, I just stuck my head in on the way there.\"\n\n\t\t\"It's no problem.\" Alex smiles his crooked smile, \"If you're my 'guard' later you'll get to hear it then.\"\n\n\t\tYou smile at him and wave as you leave.\n\t\t*goto seven\n*label twelve\n\nYou settle yourself back down to watch.\n\nYou thought catching the back end of the speech was good, hearing it from the begining is better. Alex is nothing short of a master at slowly building the raging emotions he exposes. By the end of the speech you can feel every heartbeat of agony on the monolouge. It's both a beautiful and painful experience, feeling so much rage, betrayal, self-hatred and love in the space of about five minutes.\n*page_break\nWhen Alex stops, his head is shiny with sweat and his bony hands are shaking with emotion, but he looks pleased, \"I think that's the best it's ever been.\" He says happily, \"What do you think?\"\n\n\"Pretty breathtaking.\" You say honestly.\n*if (alex>40)\n\n\n\t\"Thank you for staying to watch I really appreciate it. I feel so ready for the audition now.\" he thinks for a second, \"If you ever need a favour let me know.\"\n\t*set alexsfavour true\n\t*goto thirteen\n*else\n\t*goto thirteen\n*label thirteen\n\n\"Anyway, thanks again, but I need to go get my stuff together. It'll be time to leave soon.\"\n\nYou check the time and he's right, looks like you stood Opal up. Time for you to go get ready too.\n\n\"One more thing.\" Alex asks as you both make your way out of the library, \"During the day it's just an audition, but this evening I have an actual performance. You should think about coming, not in like a body guard way, in a watching me perform way. I'd like you to see it. If you have the time it is. You don't have to give me an answer because I know you might find yourself busy. But if you can.\"\n*temp alexinvite true\nYou say goodbye and go your seperate ways.\n\nBut you guys seem to be getting along well, what do you think of Alex?\n\n*choice\n\t#It's nice to have a friend who seems completely uninterested in the cattyness everyone else seems to adopt automatically round here.\n\t\t*set alexf true\n\t\t*set alex %+15\n\t\t*goto four\n\t#I find myself looking at him as more than a friend. I like his passion.\n\t\t*set alex %+15\n\t\t*set alex1 true\n\t\t*goto four\n\t#I'm using him. I'm never going to find out what's going on between Christopher or Rebecca by asking either of them. But Alex probably knows.\n\t\tThat makes sense. Even if it is cold.\n\t\t*page_break\n\t\t*goto four\n\n*label seven\nIt doesn't take you long to get to Opal's quarters. You lift your arm to knock but she opens the door to you before you can do so, \"You're bang on time.\" she smiles at you, her usual friendly smile, \"Come in.\"\n\nShe ushers you inside, you take off your shoes and, at her gesture, go and sit on her sofa.\n\nOpal serves you a drink and sits next to you with one of her own. She sips it and watches you for a moment.\n\nHer face is friendly enough but you can't help but feel a bit like a small fish being eyed up by a deep sea angler fish, like she's soon going to be picking you out of her teeth.\n*page_break\n*if (chris1=true)\n\t*set opalconvu true\n\t*goto fourteen\n\n*else\n\t*goto fifteen\n\n*label fourteen\nThe silence stretches on and you're beginning to wonder if she's invited you over to sit in silence when she places her tea delicately on the coffee table.\n\n\"I notice you and Christopher seem to be close.\"\n\nAh, this conversation doesn't look like it's going in a good direction.\n\n*choice\n\t#Play innocent. \"He is my employer and a pleasure to work for - that's as close as we are.\"\n\t\t\"You can play innocent all you want. But I've seen the way you look at him and the way he looks at you, there's no point being cagey with me.\"\n\n\t\t\"I don't know what you're talking about.\" You maintain. You aren't going to be goaded into showing your hand before you know what she's holding. Does she think you're an idiot?\n\t\t*set opal %-10\n\t\t*temp didnttell\n\t\t*goto sixteen\n\t#Play defensive. \"I don't know what you're talking about.\"\n\t\t\"Of course you don't,\" Opal says dryly, \"You don't have the brains to even try and deny it. I don't know what he sees in a simpleton like you.\"\n\n\t\t\"I simply don't know what you're trying to imply. I'm not a simpleton. Nor, just because I'm employed by your host, can you talk to me however you want.\" you retort just as dryly. You don't have to sit here and let her insult you.\n\t\t*set opal %-10\n\t\t*temp didnttell\n\t\t*goto sixteen\n\t#Play aggressive. \"What of it? Not that it's any of your business.\"\n\t\t\"Oh you have claws. How cute.\" Opal's goading you, and you know it, \"But it is my business. I can always call your agency and inform them you're engaging in relations with a client.\"\n\n\t\t\"It wouldn't matter as long as my client doesn't report an issue. Do you have any idea how many people try and create problems for bodyguards? If they recalled people everytime someone had a complaint we'd never get our jobs done. You'll have to do better than that low trick.\" you're well aware that you're stooping to her level. But you aren't going to let her intimidate you like this.\n\t\t*set opal %-15\n\t\t*temp didtell\n\t\t*goto sixteen\n*label sixteen\n\n\"You're boring me now.\" Opal stands, \"I only called you here to tell you something anyway and I don't see why I should be bored to tears by you when I can simply tell you what I need and then see you out.\"\n\n\"Fine.\" You stand, \"What did you want to tell me?\"\n\n\"Just to keep your hands off Christopher.\" In a moment she is right in your face, her beautiful face contorted in anger as she viciously bares her teeth, \"He is mine. I've had my eye on him for years, and he will be mine. I have made myself into the perfect woman for him and I will not have you swanning in at the apex of my plan and massacring it. Do you understand me?\" \n\nShe leans away from you and smooths back her hair, \"Consider that your warning. Now if you don't back off, I will do everything in my considerable power to ruin you.\"\n\n*choice\n\t#Meet her head on. You aren't going to back down and you tell her so.\n\t\t\"I knew you were an idiot.\" she says conversationally as she sees you out, \"Fine. Have a good day.\"\n\t\t*set opal 1\n\t\t*goto four\n\t#Back off. This relationship isn't worth this trouble.\n\t\t\"Good. Now get out.\" Opal doesn't even see you to the door, simply allows you to scuttle out.\n\t\t*set opal %+5\n\t\t*temp breakup true\n\t\t*goto four\n\t#Tell her it's Christopher's decision to make, not hers.\n\t\t\"Think what you like. But I'll take that as a challenge. I'll simply make sure he makes the right decision. Now,\" she escorts you to the door, \"I hope not to see you with him again. Good day.\"\n\t\t*set opal 1\n\t\t*goto four\n\n*label fifteen\n*label replay1\n\"I get the feeling you and Christopher aren't close.\" she says casually, as if she's asking about the weather.\n\n\"Why should we be? He's simply my boss.\" you reply.\n\n\"You're so coy.\" Opal smiles teasingly, placing her hand on your arm in a cheeky little nudge, \"Come on, nothing I say will get back to him. If you must know I have an opportunity for someone of your expertise. A job after this one if you like. But I would very much like to know you a little better before I offer it. You need not tell me anything incriminating, I don't want to put you in an awkward position, I simply want to know the basic truths about your priorities. If you are worried about trusting me I promise you that I will be putting my trust in you as much, if not more, than you put yours in me.\"\n\n\"So what exactly are you asking me?\" You can't deny your interest is rising.\n\n\"I have two questions. The first is, why do you do what you do?\"\n*set opalconvf true\n*choice\n\t#It's good money.\n\t\t*set opal %+5\n\t\t*goto eighteen1\n\t#The power to protect people who need it and doing the right thing by those people.\n\t\t*set opal %+10\n\t\t*goto eighteen1\n\t#It's a good way to meet and get to know powerful people in a positive way.\n\t\t*set opal %+12\n\t\t*goto eighteen1\n\t#The action, the guns, the car chases. All that stuff.\n\t\t\"Oh,\" Opal looks mildly alarmed, \"How... barbaric.\" she trails off, apparently unable to think of another word to describe you.\n\t\t*set career %-5\n\t\t*set opal %-10\n\t\t*goto seventeen\n\t#I'm not sure, it's simply what I found myself doing.\n\t\t*set opal %-5\n\t\t*goto seventeen\n\t#This question seems innocent, but I don't trust her. I don't answer.\n\t\t*set opal %-10\n\t\t*goto seventeen\n*label seventeen\n*if (replay=true)\n\t*goto fourtyfour\n*else\n\t\"Ah,\" she looks a little disappointed, \"If that's how you tick I expect my proposition will be of little interest to you. You are boring me now. Please see youreself out.\"\n\n\tShe dismisses you with a wave of her hand, carrying on like you hadn't even spoken, let alone are standing in the middle of her quarters. All you can do now is simply show yourself out.\n\n\t*goto four\n*label eighteen1\n\"An interesting answer.\" Opal appraises before moving on to the next question, \"It's good to know that about you. But the second question is the key. What do you think of Christopher? Remember you answer this for me and I will trust you. I've made a promise to you, and I will not break it.\"\n\nThis is a much more loaded question. It's not specifically against the rules to discuss your personal opinion on your employer. But you do have to trust she isn't going to turn round and tell him because you can't imagine he would be happy about being discussed by you. It is a breach of trust if nothing else.\n*choice\n\t*selectable_if (chris\u003c5) #I despise that lying wretch.\n\t\t*if (gender = true)\n\t\t\tOpal actually laughs and claps, \"Oh, I do love the anger of a woman scorned. Excellent. It appears we have a lot in common\"\n\t\t\t*set opal %+10\n\t\t\t*goto eighteen\n\t\t*else\n\t\t\tOpal actually laughs and claps, \"Oh, I do love the anger of a man scorned. Excellent. It appears we have a lot in common\"\n\t\t\t*set opal %+10\n\t\t\t*goto eighteen\n\t#I'm ambivalent towards him.\n\t\t\"I shall see if I can change that,\" Opal give you a sly grin.\n\t\t*goto eighteen\n\t#I don't think I trust him, I've been getting a bad vibe from him recently.\n\t\t*set opal %+10\n\t\t*goto eighteen\n\t#I don't think my opinion on him matters. He is my employer, I think nothing of him.\n\t\t*set opal %+5\n\t\t*goto eighteen\n\t#I actually quite like him, he respects my decisions and is amicable to work with. I hope to work with him for the foreseeable future.\n\t\t*set opal %-10\n\t\t*goto seventeen\n\t#I don't answer. It's too risky to be talking to her about things like this.\n\t\t*set opal %-10\n\t\t*goto seventeen\n*label eighteen\n*if (replay=true)\n\t*goto fourtyfive\n*else\n\t*goto albatros\n*label albatros\n*temp opalprop true\n\"It seems our feelings are close enough. I feel I can trust you with this. But not here. I will not lie to you, this is a large proposition, and I do not care to make the risk of the walls having ears. So escort me to town today, we can talk openly. I think you will find it worth you while.\"\n\nOpal stands and stretches, sticking her chest out and pushing her shoulders back. Straightening in relief she smiles down at you and offers you a hand to pull you up, \"Oh this is turning into a rather lovely day,\" she says as she escorts you to the door, \"I shall see you in an hour or so.\"\n\nAnd with that, you find yourself in the corridor, standing slightly dazed.\n*page_break\n*goto four\n*label four\nYou make your way to the office to brief everyone before you set off for the hectic day.\n\nYou push your way into the room to find your staff already all assembled. You're pleased to see Emma managed to wrangle two more guards from the agency, a bright eyed and bushy tailed boy and girl. You call them that because neither look to be older than eighteen and have the bouncy look of youngsters with no experience. But at least it's someone.\n\nThat brings your total staff up to twelve. It should be enough, even if the time everyone spends sleeping is going to be limited.\n\nIt's rare that you're all together, but on such a hectic day and with Christopher's big company ball coming up in two days you need all hands on deck.\n\nYou go and stand next to the monitors so everyone can see you. You give them a run down of the brief plans concerning the upcoming ball so people can start preparing their equipment.\n\nWhat have you decided on for that?\n*choice\n\t#The ball, with all the confusion and people is a great time for the kidnapper to try again, I pull out all the stops, all my staff are going to be armed and on high alert. I don't care how the party guests feel about it.\n\t\t*set chris %-15\n\t\t*set career %+10\n\t\t*goto nineteen\n\t#The ball might be a good opporunity for the kidnapper to try something, but I should never forget I'm offering a service and need to keep my customer, Christopher happy. And he won't be if my staff are frightening all his guests.\n\t\t*set chris %+10\n\t\t*set career %-20\n\t\t*goto nineteen\n*label nineteen\n\nOkay, your staff will prepare accordingly.\n\nNow for the plans for today. You knocked up a plan last night that you're pretty happy with.\n\nWho are you going to be tailing for the day?\n*choice\n\t*selectable_if (chris1=false) #Rebecca\n\t\t*temp rebout true\n\t\t*goto twenty\n\t*selectable_if (chris1=false) #Opal\n\t\t*temp opalout true\n\t\t*goto twenty\n\t*selectable_if (chris1=false) #Alex\n\t\t*temp alexout true\n\t\t*goto twenty\n\t*selectable_if (chris1=true) #I'm not working today, me and Christopher are going on a date.\n\t\t*temp chrisout true\n\t\t*set career %-10\n\t\t*goto twenty\n*label twenty\n*if (chrisout = true)\n\tWhen you tell your staff you're going to be taking the day off they look downright outraged. Of course you don't tell them why, but no matter how you look at it this is quite an abuse of your power and once they see you and Christopher leave together you can be sure there's going to be some seriously malicious comments thrown your way.\n\n\tAll you can do is loudly remind them that you are in charge in that a stern letter from you to the agency assessing their performance could be murderous to their careers. It quietens them. For now.\n\t*goto twentyone\n*elseif (career > 50)\n\tEveryone seems pretty happy with your plan. Despite your inexperience you take your job seriously, you've trained hard and you're good at what you do. It shows in how you work and those you're in charge of appreciate it and respect you.\n\t*goto twentyone\n*else\n\tEveryone looks a bit unsure. Your inexperience is really shining, and your plans are not the best. If you want to stay on top of your game you really have to focus more on your job. You can't ask for the others respect when you don't lead by a good example.\n\n\tThankfully no one says anything about your ineptitude. For now.\n\t*goto twentyone\n*label twentyone\n\nYou dismiss everyone and they leave immediately to meet and escort their charges. Only a handful are staying at the house and those lucky ones go to grab some breakfast\n\nYou make a bee line for the door yourself, you have a lot to do.\n*page_break\n*if (chris1 = true)\n\t*goto twentytwo\n*else\n\t*goto twentyfour\n*label twentytwo\n\nJust as you're about to leave, Emma calls you over. She's not smiling at you or being friendly, which is unusual for her. She casts her eyes around the room, sees that it's empty and stands so she's on a level with you.\n\n\"Right. I need to talk to you?\" She sounds angry.\n\n\"About what?\" You ask innocently.\n\n\"You and Mr Haywood. I've seen you on the cameras, sitting on his lap, flirting outrageously. I know there's something going on between you two.\"\n\nYou've never seen Emma this angry.\n\n\"Now I know you're my boss.\" Emma continues, getting herself more and more worked up, \"And I'm not the type of person to tell someone what to do. But this has to stop. You can't fool around with a client, it stops you from doing your job properly. And as I just said, I'm not nosy, but if you can't do your job it affects all of us - it isn't fair.\"\n*choice\n\n\t#\"You're right. I am your boss and it's none of your business.\"\n\t\t*goto twentythree\n\t#\"With all due respect Emma, I don't want to fight, but it has nothing to do with you.\"\n\t\t*goto twentythree\n\t#\"You're right. I shouldn't have pursued aything with him, I'll speak to him today. This needs to remain professional.\"\n\t\t\"Good,\" Emma sighs in relief, \"I don't want to argue with you, but I don't want to risk this job going wrong either.\"\n\t\t*set breakup true\n\t\t*goto twentyfour\n\t*selectable_if (breakup = true) #\"I've actually already had a think about it Emma, and I was going to do just that this morning.\"\n\t\t\"Good,\" Emma sighs in relief, \"I don't want to argue with you, but I don't want to risk this job going wrong either.\"\n\n\t\tShe pats you on the back and you leave to go find Christopher.\n\t\t*set career %+10\n\t\t*goto twentyfour\n*label twentythree\nEmma swells in anger, \"I thought there was more respect between us than you just dismissing me like that!\" You try to say something back but she holds up her hand, \"No I don't care what you have to say. I'm very angry right now. We'll finish this job together. But I'm never working with you again, and I'm telling the Agnecy what you've been up to. It might not be against the rules, but they'll have a serious think about reassigning you any more high-profile jobs. That's all I want to say, and nothing you have to say to me will change my mind.\"\n\nShe won't listen to another word you say and you storm out, angrier than you've been in a long time. Everyone seems to be against your budding relationship.\n\n*label twentyfour\n*page_break\n*if (chris1=true)\n\t*goto twentyfive\n*else\n\t*goto twentysix\n*label twentyfive\nYou emerge from your office to find Christopher himself waiting for you, standing straight up hands clasped in front of him, not relaxing for a second.\n*if (breakup = true)\n\t*goto twentyseven\n*else\n\t*goto twentyeight\n*label twentyseven\n\nYour stomach drops as you remember how handsome he is and you forget for a second you've promised to end things with him, and your resolve wavers.\n\nHe smiles that intelligent smile of his and steps towards you, \"Morning ${name}.\" his arms go around you and suddenly your head is pressed against his chest.\n\nRemembering yourself you step away from him, Christopher looks startled and confused. His arm reaching out to you, he examines your face.\n\n\"What's wrong?\"\n*page_break\n\n\"I don't want to see you anymore.\" you blurt, short and painful, \"Not while I work for you.\"\n\nChristopher looks like you've slapped him, his head jerks and a little strand of hair comes loose and falls in his grey eyes. For the first time since you've known him his cheeks redden.\n\n\"Why?\" he asks, his eyes searching you as if he's looking for an answer.\n\n\"Because I work for you.\" You say, \"It's upsetting people more than I thought it would and getting very heavy very fast. It's a lot to stake my career on.\"\n\nChristopher only blinks at you, evidently trying to pull his face back into its controlled mask and failing.\n\n\"But I thought-\" he starts, then stops, then starts again, \"That we had something potentially amazing between us. I thought it was worth the risk.\"\n*choice\n\t#Break. No I can't do it. I do want to see this through with him.\n\t\t\"It is.\" you say, you feel the tension leave your body and see it leave Christopher at the same time, \"I'm sorry, that was a stupid thing to say, I wasn't thinking.\"\n\n\t\tBut Christopher doesn't seem to care about that, he's hugging you tight and lifting you up in his arms, \"Please don't scare me like that again,\" his head is buried in the crook of your neck and he sounds relieved, \"I know it's hard, but I won't let anything bad come of this, I promise.\"\n\n\t\tHe pulls away so your nestled snugly in his arms and he can still look down at you\n\n\t\tYou hear the door open behind you. You turn your head in time to catch a glimpse of Emma's enraged face before she slams it shut on you.\n\n\t\tBut you'll deal with that later. For now it's just you and Christopher.\n\t\t*goto twentyeight\n\t#Stand by your decision. I knew this was going to be hard, but this is my choice. Better now than later when both our feelings are stronger and will be hurt more.\n\t\tHe looks at you, his eyes confused, almost pleading. But you hold his gaze and set your face in a hard line.\n\n\t\tYou've made your decision, he's just going to have to deal with it.\n\t\t*set chris 1\n\t\t*set chris1 false\n\t\t*set chrisout false\n\t\t*goto twentynine\n\n*label twentynine\nHe looks intently at your face for a second. Almost like he's checking for a weakness. When he sees none he straightens, his broken demenour is gone in a second. Replaced once agian by the professional cold man you were so close to knowing better.\n\n\"Fine, have it your way.\" he says coldly, he turns on his heel and strides away from you and out of sight.\n\nHe got over that quickly. Maybe it's a good thing you decided to break it off.\n*page_break\n*label nintyone\nNow, with the whole day off before you and your plans in tatters around your feet, you turn on your heels and stride back into the office.\n\nAfter all, you owe Emma some kind of apology. You'll cover her and let her take the day off instead.\n\nPlus it'll keep your mind off things.\n\nShe's thrilled of course and this gesture fixes the rift you caused with your unprofessional foray.\n\n*page_break\nEmma takes off to make the most of some good old fashioned rest and you settle yourself in front of the monitors.\n\nThe house's buzzing energy abates quickly when the staff realise Christopher isn't going out. It seems as if they dissapear in penance because before you know it, pretty much all the staff are huddling in the kitchens or break rooms. Like squirrels weathering a storm.\n\nIt would appear they are avoiding Christopher.\n\nI wonder what could have put him in such a bad mood.\n\nThat isn't your problem anymore. But one thing you do find out is Christopher, instead of making other plans or staying in his quarters, storms around the house. You think at first he's just burning off steam, but you realize quickly he seems to be conducting a methodical search.\n\nIt goes on all day, he spends at least an hour in each of the rooms he visits. Even going so far as to run his fingers over the walls, as if looking for hidden doorways.\n\nYou can't leave the monitors to go question him. All you can do is file this mysterious behaviour away in the back of your mind.\n*page_break\nThe rest of your day passes without incident, and before you know it Emma has come to relieve you for the evening.\n*goto thirty\n\n*label twentysix\n*if (rebout=true)\n\t*goto thirtyone\n*elseif (alexout=true)\n\t*goto thirtytwo\n*elseif (opalout=true)\n\t*goto thirtythree\n\n*label twentyeight\n\"Come with me,\" Christopher takes you hand and starts walking to his office. It feels weird how quickly holding his hand has come naturally to you.\n\nHe pulls you inside and it's then you realize something is off about him. In his usual way there aren't many indicators, but you know him well enough by now to know that he blinks a lot when he has something awkward to discuss.\n\n\"${name}, I'm really sorry, I know it was lot of work for you to get today off. But I'm afraid I can't take you out.\"\n*choice\n\t#\"You're right it was a lot of effort for me to get today off, and if this is how you treat my effort I won't be doing it again. Forget it.\"\n\t\tIf he's not going to take this seriously then why should you? And why should you put your career on the line for something that isn't serious?\n\n\t\t\"Do you not think I would consider that?\" Christopher says, his eyes growing dangerous, \"I have no choice. I need to do something today, do not suggest for a second I do not feel you're worth the effort.\"\n\n\t\t\"Actions speak louder than words,\" you bite back, \"And I've heard a lot of words from you, but now you actually might have to act on something you're backing off. What am I supposed to think?\"\n\n\t\tChristopher stands and drops your hand, \"I didn't realize what a child you were. You clearly don't undertsnad that some things are more important. Get out. Consider yourself lucky I have enough good will towards you not to terminate your contract here and now. But I imagine your job will need your entire attention from now on, so never seek me out for personal reasons again.\"\n\n\t\tYou don't need telling twice, you're half way out the door as he finishes.\n\t\t*set chris1 false\n\t\t*set chris 1\n\t\t*goto nintyone\n\t#\"Why can't you spend the day with me? It better be a good reason.\"\n\t\t\"We can still spend the day together,\" Christopher reassures you with a small smile, \"I simply can't take you out, there's too much I need to do.\"\n\t\t*set chris %+5\n\t\t*goto ninty\n\t#\"That's okay Christopher, even if you can't take me out we, can we still spend the day together at least?\"\n\t\tChristopher smiles at your understanding.\n\t\t*set chris %+10\n\t\t*goto ninty\n*label ninty\n\"Of course we can spend the day together.\" he cups your face gently, \"For me, this will actually bring us closer than a date. Because now I'm going to trust you with something that is well outside the bounds of your contract. Please help me, I know my mother is trying to work against me.\"\n\nYou open your mouth to ask questions but he puts his fingers to your lips, \"Just let me explain, then you can ask me things.\" he takes a deep breath, \"I have worked hard to build up this company above and beyond what my father left me. My mother however, doesn't like to not be the center of attention. She is enraged that she has nothing to do with it all any more, and especially annoyed she doesn't have control over me. I know her claim is that in the will it was all left to her. She says to distribute it fairly, but I know her too well to think for a second that distributing it ever crossed her mind. No, she is determined to take it from me.\"\n\n\"What does this have to do with today?\" you ask, making him smile even wider.\n\n\"You've hit the nail on the head my love. I know for a fact Mother has been searching the house, she thinks the will is here. I must simply find it before her. We are currently in a legal stalemate, neither of us has a greater right to the assets. That will is the decider and I must get my hands on it before her. Once she sees that what it entitles me to, she will no doubt destroy it and she will be a thorn in my side till her final pathetic breath.\"\n*label replay10\n*choice\n\t#\"What do you plan to do to your Mother if you fully control all the assets?\"\n\t\t\"I will simply cut her off completly from any control she has over the company. I will set her up in a nice little house of her own with a fixed income each year, and she can stay there happily. I will keep her and give her whatever she wants.\"\n\t\t*goto replay10\n\t#\"What do you need my help for?\"\n\t\t\"I trust you to be another set of eyes.\" Christopher squeezes your hand, \"The only pair I trust besides my own.\"\n\t\t*goto replay10\n\t#\"Will I get something if I do help you?\"\n\t\tChristopher wrinkles his nose, \"I didn't think you were the type of person to focus on something like that. I also thought it would be obvious I am not interested in screwing you around. Please don't ask me something like that again. I came very close to being offended.\"\n\t\t*set chris %-10\n\t\t*goto replay10\n\t#I'm done asking questions.\n\t\t*goto nintythree\n*label nintythree\n\"So,\" Christopher takes your hand and puts it against his chest, \"I know we're still on the cusp of something here, but for me, we might as well be in it already. I know that I want you. Before it was okay to wait and take things slow, but now I need your help to work against this, and it is serious. Which makes us serious. Will you help me?\"\n*choice\n\t#\"Yes. I'm with you.\"\n\t\t*set chris %+5\n\t\t*goto nintyfour\n\t#\"No, I'm backing off. I didn't expect to get tangled in a family argument first thing.\"\n\t\t*goto twentynine\n*label nintyfour\n\"I'm so happy,\" Christopher gives you a bone crushing hug, \"But we will have time to discuss things more this evening. I'll be taking you out then and showing you an unbelieveable time. But for now, to work.\"\n\n\"One problem,\" you cringe, as you have to bring it up, but you know you have to discuss it, \"I'm going to struggle taking the day off and the night.\"\n\n\"Why? You're the boss of that group, surely what you say goes?\" Christopher brushes off your concerns and you learn a little more about his management tactics.\n\n\"Yes, I am.\" you agree, \"But I still work as a contractor. If I'm reported to the agency for not working it could be a problem.\"\n\n\"Again, no worries. I am your employer. What can they say against me? If I am happy with your service what can your agency do? Besides I know plenty of people who use your agency, I simply have to recomend you and they will ask for you by name. No worries about the agency or the other workers. I'll look after your interests.\"\n\nHe smiles at you and pulls you out the room, clearly closing the matter for now.\n*page_break\n\n\"So, I know my father was a bit of an eccentric. This house may look modern but it's archaic in its design in terms of hidden passages and compartments. We have to find the right one.\"\n\n\"Can't the servants help?\" you ask, as he pulls you off to a location of his choice.\n\n\"And run off with the contents of the compartments and sell it off to my mother, if I don't give them half my assets? Yes, I imagine they would be happy to help with that.\" Christopher says sarcastically.\n\nHe stops and pulls you into the gym. A large sterile room that houses the indoor part of the pool, as well as all the gym gear.\n\n\"Why here specifically?\" you ask, starting to copy Christopher as he runs his hands over the walls and lifts up paintings, or stamps on the floor looking for hollow patches.\n\n\"I have no idea where it is. We are simply working from one end of the house to the other.\"\n*page_break\nAnd thus goes your whole day. It is impossible to talk with such a delicate task so you don't.\n\nWith the two of you working, you do speed up the job, only spending about half an hour per room. But it's to no avail, the house is huge and you havn't even doen a quarter of it by the time people start arriving back at the house.\n\nClearly exasperated, Christopher retreats to his office, pulling you behind him.\n\n\"Thank you for your help today,\" he says as he settles himself behind his desk in a way that now feels weirdly formal.\n\n\"I told you, it's fine.\" you smile, trying to keep things casual.\n*fake_choice\n\t#\"We'll try again soon.\"\n\t#\"Don't worry about not finding anything.\"\n\t#\"You know I'll always help you.\"\n\t#\"Our date better be good to make up for it though.\"\n\n*label nintyfive\nChristopher lets out his unusually bark like laugh, \"Of course,\"\n\n\"Why are you laughing?\"\n\n\"Because I have someone who knows how to make me feel better. And someone who will search with me again soon.\" Christopher's eyes are full of warmth as they hold you, \"You should go get ready, as will I. Today had been about me, but tonight, is all about you.\" he leans over his desk, takes your hand and kisses it.\n\nYou leave the room and go straight back to your own to get ready.\n*goto thirty\n\n*label thirtyone\nYou go straight to Rebecca's room to pick her up. You may as well not have rushed, she isn't ready.\n\nDespite her assurances that she'll 'just be a minute' you're stood outside for about half an hour before she emerges.\n\nHer driver is clearly used to the wait because he pulls up at exactly the same moment the two of you step out of the house.\n\nYou open the door for Rebecca as Stephen sits in the front, trying not to show his annoyance at the wait.\n\n\"I think we'll go to Andrew's today,\" Rebecca tells the driver who pulls off immediately with no further explanation, or even stopping to look through the sat nav, \"We're going to get Alex's suit for the ball.\" Rebecca says, without being asked, \"And only Andrew will do. He's the finest tailor I know.\"\n\nRebecca launches into a blow-by-blow account of all the tailors she's tried over the years. There isn't a huge amount you can contribute to the conversation, and no gaps left for you to speak much besides, so you simply listen politely.\n*page_break\n\nIt turns out the tailor isn't far away and you're soon stepping out of the car, only to be swept inside by two impeccable assistants while Stephen and the driver wait outside.\n\nThey lead the two of you into an almost sickeningly pastel room. One of them pushes up a tea service and they both leave, with the assurances that Andrew will be with you soon.\n\n\"Lovely,\" Rebecca sits in the window seat, crossing her ankles and placing her hands on her lap, \"I'm glad we finally have some time alone. I would very much like to talk to you. Come, sit with me.\"\n\nShe holds out her hands to take yours, guiding you onto the cushion next to her.\n\n\"I have a quick question for you first. Do you think Christopher is happy right now?\"\n*choice\n\t#\"I don't think he's very happy at all - I actually think he'd be a lot happier if you left.\"\n\t\t\"I appreciate your honesty. Brutal as it is,\" Rebecca nods looking at her hands.\n\t\t*set reb %+10\n\t\t*goto sixty\n\t#\"I don't know. I try to make it as comfortable for him as possible in this difficult time. That's as far as my job goes.\"\n\t\t\"Very cold of you.\" Rebecca says grimly, \"I suppose it would be foolish to ask any more of you. Although I do hope to find you have more extended compassion than you seem to right now.\"\n\t\t*set career %+10\n\t\t*goto sixty\n\t#\"I don't think he's particularly happy or sad. Honestly I don't really get what you're driving at.\"\n\t\t*set reb %-5\n\t\t*goto sixty\n\t#\"He seems happy enough from what I've seen.\"\n\t\t\"A down right lie.\" Rebecca spits at you, \"Have I not made it clear enough I have no patience with liars?\"\n\t\t*set reb %-10\n\t\t*goto sixty\n*label sixty\n\"I know the question may seem odd, but you need to understand: No matter what he has said to you, no matter how it may appear, I love my son. I want him to be happy.\"\n*choice\n\t#\"Then why are you forcing a stranger on him and demanding he date her?\"\n\t\t\"Because I want to see him happy. And I know he isn't, even if my presence weren't making him so uncomfortable. Whether you agree with it or not, can you not see I'm trying to help?\"\n\n\t\t\"I don't think setting him up is helping,\" you maintain firmly.\n\n\t\t\"Perhaps. I simply wish to give him something to hold onto for what I must do to him.\"\n\t\t*set reb %+5\n\t\t*goto sixtyone\n\t#\"Then why are you here, even though you can see he doesn't want you here?\n\t\t\"I must admit your honesty is a very appealing quality in you.\" Rebecca smiles ruefully, \"Even if conversing with you is like the voice in my head that chastises me has grown a body of its own.\"\n\n\t\t\"You haven't answered my question,\" you press.\n\t\t*set reb %+10\n\t\t*goto sixtyone\n\t#\"Then why do you treat him like a child?\"\n\t\t\"Because he insists upon behaving like one.\" Rebecca snaps, \"A child should not hold the assets he holds. Which is why I must do what comes next.\"\n\n\t\t\"What does come next?\" you ask, but Rebecca simply motions for your silence and continues on as if you hadn't spoken.\n\t\t*set reb %-5\n\t\t*goto sixtyone\n\n*label sixtyone\n\n\"I love my son, but I've put him first for too long. He's become spoiled and entitled. He does not behave like a man should, but like a manipulative child, unable to not have things his way. Has anyone told you about our dispute eight years ago?\"\n\nYou can only shake your head.\n\n\"It was the death of my husband which caused it. He and I had agreed in his last will and testament that I would inherit his assets, untill the boys proved themselves mature enough to take them. My husband and I had many differences, but he knew I love nothing more in the world than my boys and he trusted me to divide the assets fairly if nothing else.\"\n\n\"However the will's location is unknown. My husband loved that house and built thousands of secrets into it and I know he's hidden that will somewhere in those walls. It will entitle me to seize my assets back from Christopher who, while I was greiving for my husband, seized the chance to monopolize them. Without the will I have no legal case to make for them being restored to my name.\"\n\n\"I tell you this because I want your help recovering that will, and restoring what's mine.\"\n*label replay5\n*choice\n\t*hide_reuse #\"Why do you want the assets so badly?\"\n\t\t\"Because Christopher has taken something that isn't his. I will not be walked all over and allow him to take them. I have given up a lot for him and he will not rob me of the last thing I have left in my life. I have lost-\" Rebecca's voice dies in her throat, \"What I have lost does not matter. I will not bore you with the sad story of what has been taken from me...Suffice to say I will not allow a spoiled child to run amock. If he wishes to be so powerful, he can earn his power back himself through honest work, not steal it.\"\n\t\t*goto replay5\n\t*hide_reuse #\"What do you need my help with?\"\n\t\t\"You have eyes in that entire house in the form of cameras. You can tell me where Christopher has looked, or where he may be looking, that way I can search; firstly undetected and secondly more throughly, because I will not be searching where he's already been. Secondly you can help me search yourself. As a senior member of staff you can go anywhere in that house unquestioned and without looking suspicious. I will have two sets of eyes, which will double my chances.\"\n\t\t*goto replay5\n\t*hide_reuse #\"What about Alex?\n\t\tRebecca quiets at the mention of her second son, \"I do not wish to talk about Alex. Just know that when my assets are restored, I will be buying him a house in London near West End, so he can pursue the acting career he wants as easily as he can. I can't say any more on him.\" Rebecca's eyes shimmer with tears, and you can tell there's more, but she refuses to say. \n\t\t*goto replay5\n\t*hide_reuse #\"What's in it for me?\"\n\t\t\"Besides the moral superiority? I do not wish to control any assets or business. On their return to me I shall sell them. They will go for millions. Half for me, and half for you, a generous split so I will expect you to pull your weight.\"\n\t\t*goto replay5\n\t#Enough questions.\n\t\t*goto sixtytwo\n\n*label sixtytwo\n\"You understand this sordid affair much better now?\" Rebecca asks, looking wistfully out of the window.\n\n\"Yes,\" you reply, waiting for the question you know is coming.\n\n\"So can I count on you?\"\n*label replay6\n*choice\n\t#Yes, the deal is fair.\n\t\t\"A fair deal.\" You conclude.\n\n\t\t\"More than fair,\" she argues back, a smile playing on her lips.\n\n\t\t\"Just fair,\" you maintain, making her laugh.\n\t\t*set rebplot true\n\t\t*set reb %+8\n\t\t*goto sixtyfour\n\t#Yes, I want to help her. She has been robbed by her own son, and the fiscal incentive is also a nice bonus.\n\t\t\"I love my job. But that doesn't mean I can be employed by a thief.\" you say, holding Rebecca's hard gaze.\n\n\t\t\"You know, I find myself very much liking you,\" Rebecca smiles.\n\t\t*set reb %+12\n\t\t*set rebplot true\n\t\t*goto sixtyfour\n\t*hide_reuse #Not yet, I need a better offer than that.\n\t\tRebecca makes a very unadylike snort at your attempt at hard ball, \"I will offer you less if you try to screw me around once more. There is no bargaining here you greedy little parasite.\"\n\t\t*set reb %-10\n\t\t*goto replay6\n\t#No. I won't risk my employment for money or morals, no matter how much the price.\n\t\t\"What a shame.\" Rebecca says, \"Fine, do as you will. Clearly you are not much of a gambler. Very safe, but you will never win big the way you're going.\"\n\t\t*set reb %-10\n\t\t*goto sixtythree\n*label sixtyfour\n\n\"We have an accord.\" Rebecca holds out her hand to you to shake, \"We will search every second until we find that will. One last thing though.\" she holds your hands, forcing you to look her in the eye, \"I still expect you to care for my son. This accord doesn't mean I want him taken from me. If he's kidnapped this deal is off.\"\n\n\"Understood.\" you say and she lets go of your hand.\n*label sixtythree\nJust then Andrew strides dramatically in. If there was any more to be said to Rebecca, it will have to wait.\n\nAndrew is unexpectedly macho for a personal tailor, his perfectly fitted suit doing nothing to hide his bulging muscles or his very gothic neck tattoo.\n\nHis spotless assistants hurry after him carrying reams of fabric that all look to be basically the same material to you in shades of navy grey and black, although everyone else in the room seems to be able to identify the differences.\n\nThere is little more to do but sit for the hours that Rebecca is there 'yes'ing and 'no'ing design choice after design choice and reeling off Alex's measurments and, in the last hour or so, arguing over how quickly the suit can be made.\n*page_break\n*if (book=true)\n\tWhen there is finally a break for lunch, Rebecca asks you to run and fetch her some aspirin 'for better decision making'. There isn't any in the car so while Stephen watches over here you make a quick dash for the pharmacy just down the road.\n\n\tOn the way back you pass a book shop. Remembering what Rob said earlier, you come to a stop outside the window.\n\n\t*choice\n\t\t#Go pick up a voucher quickly.\n\t\t\tYou don't have much time so you rush in quickly with the intention of just picking up a voucher.\n\n\t\t\tBut at the checkout they're having a sale. It's a huge set of ten encyclopedia for children, each book dedicated to a different subject with full double spread pages filled with delicate hand drawn diagrams. The topics range from dinosaurs to space. It's perfect and you buy it.\t\t\n\t\t\t*set bookbuy true\n\t\t\t*goto next5\n\t\t#Rush straight on.\n\t\t\t*goto next5\n*else\n\t*goto next5\n*label next5\n*page_break\n\"What a day.\" Rebecca sways slightly as she steps out into the late afternoon sun, \"I hope Alex likes his suit. Although that is a vain hope. Knowing him I doubt he will even notice that he has one, and I shall have to forcibly steal all his ugly jumpers before the party, so he will simply end up wearing the suit through default.\" Rebecca sighs as you open the door for her to slide into the car, \"I am very sick of sitting down, I feel like a nice walk. Please take us to the river bank.\"\n\nIt is clear the driver must have been with Rebecca for many years as 'the river bank' is, again, the only instruction he needs.\n\nHalf an hour later you find yourself being parked up next to an abandoned forest track.\n\n\"Come along ${name}!\" Rebecca doesn't wait for you to walk round and open the door for her, she simply jumps out the car, kicks off her shoes like a girl, hitches up her skirt and runs off down the forest track barefoot.\n\nShe's a lot faster than she appears and you find you have to sprint after her to keep up.\n\nThe forest track is clearly an abandoned road with great cracked slabs of concrete and pot holes, that eventually thin into a dirt track. You carry on following Rebecca, who you gain on slowly when suddenly she disappears.\n\n*choice\n\t#Call for her.\n\t\tShe calls back to you, her voice coming from the direction of a solid hedge.\n\t\t*goto sixtyfive\n\t#Look around for clues as to where she went.\n\t\t*set career %+5\n\t\tYou see broken branches on what, at first glance, appears to be a solid hedge.\n\t\t*goto sixtyfive\n*label sixtyfive\nYou throw yourself through after Rebecca and find yourself slipping and sliding on a muddy trail after her. You follow it to the edge of the forest and come out into a grass meadow. It's completely empty and looks untouched, running down the side of a calm clear river. Rebecca is already standing next to the river, her feet, ankles and dress splattered with mud, looking up at the sky she's breathing hard.\n\nRebecca turns and beckons over to you, her face looking twenty years younger with rosy cheeks and shining with a youthful energy, \"${name} - come over here!\" she's waving her arms wildly, very unlike herself.\n\nYou walk over to her and stand by her side, \"Isn't it wonderful here?\" she asks, pulling off her cardigan and throwing it on the grass.\n\nYou don't have time to answer because she suddenly gives you a light push towards the river.\n*if (career>50)\n\tYou grin and catch her arm, setting your feet firmly on the ground. You're well trained after all, you can keep your footing from much more than a little suprise push.\n\n\t\"Impressive,\" Rebecca teases playfully, diving head long into the river and splashing you as she resurfaces, \"Although I hope you won't leave me to go in all alone.\"\n\t*set reb %+5\n\t*goto sixtysix\n*else\n\tUnfortunately your self-defence skills aren't enough to counteract this mild assault (for shame) and you topple head first into the river.\n\n\tRebecca simply laughs as you as you pull yourself out onto the bank completely soaked, \"I wasn't expecting you to actually fall in,\" she laughs, only to jump in herself. She splashes you from the water, \"Come back in, it's fun.\"\n\t*goto sixtysix\n\n*label sixtysix\n*choice\n\t#Jump in after her.\n\t\t*set reb %+10\n\t\t*goto sixtyseven\n\t#Stay on the bank.\n\t\t\"Aw I think someone's being the grumpus!\" Rebecca yells from the water as she splashes around and you settle yourself down on the bank.\n\t\t*set reb %-10\n\t\t*goto sixtyeight\n\n*label sixtyseven\n\nYou jump into the water sending a mini tidal wave over Rebecca's head. She very obviously doesn't care as she kicks onto her back and does a lazy backstroke against the light current.\n\n\"I like to come here when all the stress gets a bit high. It reminds me of when I was younger. My family owned a farm in Ireland and there was a river running through our land. Swimming here I can shut my eyes and pretend I'm back there.\"\n*label sixtynine\n*choice\n\t#\"So you married money?\"\n\t\t\"I guess you could say that. Most people do. Although I find I have to disagree. I would say I married a monster.\"\n\n\t\t\"The money or your husband?\"\n\n\t\t\"Maybe someday I'll tell you,\" Rebecca chuckles to herself.\n\t\t*set reb %+5\n\t\t*goto seventy\n\t#\"Then how did you and your husband meet?\"\n\t\tRebecca visibly stiffens, when she answers her voice sounds restrained, \"He was visiting Ireland. And he couldn't resist my pretty face.\" she smiles at you, \"And now here I am.\"\n\t\t*set reb %+5\n\t\t*goto seventy\n\t#\"Surely you prefer your life now? It must be easier having money.\"\n\t\t\"You have such a small mind.\" Rebecca says, she sounds pitying, \"If I were to ask you if you would exchange everything you have and everything you are for money. Would you say yes?\"\n\n\t\tShe holds up her hand to you, \"No I don't want an answer. I only want you to think about it. Although I do hope you conclude you would never say 'yes'.\"\n\t\t*set reb %-5\n\t\t*goto seventy\n\t#\"Tell me more about your life then.\"\n\t\t\"There isn't much to tell,\" Rebecca says, although she smiles at the memories she is so obviously indulging in, \"It was very simple living on a farm. I have to say I have yet to find a more freeing feeling than splashing through the mud, not caring what I'm wearing or anything else for that matter.\"\n\n\t\tThere is a brief pause while she thinks, \"I would say I was a lot happier though. Although perhaps that is simply what happens when you go from having few responsibilites to many, maybe I was happy as careless, rather than in Ireland.\"\n\t\t*set reb %+8\n\t\t*goto seventy\n\t#Stay silent.\n\t\tYou simply watch as Rebecca enjoys the simple thrills on the river bank. She looks like she's recharging more with every second. By the time it is time to leave she's practically glowing with energy.\n\t\t*set reb %+8\n\t\t*goto seventy\n*label sixtyeight\n\"Spoil sport.\" Rebecca kicks water up that splashes the front of your shirt, and then falls into a strong breast stroke across the river. She seems content to just amuse herself swimming back and forward, so you simply settle yourself down to watch.\n\nAfter half an hour of swimming she comes and sits next to you on the bank, shaking with cold and weariness. She dries herself briskly with her cardigan and sits next to you.\n\n\"Don't you want to go back?\" you ask.\n\n\"No, I just want to enjoy the quiet out here for a little.\"\n\nShe has terrible goose bumps, but it is her decision so you simply settle down next to her.\n*goto sixtynine\n*label seventy\n\"Come on,\" Rebecca stands and wrings out her hair, \"We should get back, Alex has a performance tonight and I would like to get ready to go watch it.\"\n*set alexinvite true\nThe two of you start trudging your way back towards the car, \"You don't have much of an Irish accent.\"\n\n\"No, I don't.\" Rebecca replies, stopping like that's the end of the conversation, \"My husband didn't care for my 'Country Irish' accent. When we were married I had speaking lessons to train it out of me.\"\n\nHer voice is pained and resentful, and she holds up her hand to stop you talking anymore, so you make your way back to the car in silence.\n*page_break\nThere are big towels waiting in the boot of the car (evidently the driver is used to these excursions.).\n\nRebecca is unnaturally quiet on the journey home. When you arrive, she simply gives you a quick thanks before disappearing into the house, lost in her own thoughts.\n\nYou follow shortly behind, confirming with Emma that the day went fine and you can have a few minutes to yourself. You make your way to your room.\n*goto thirty\n\n*label thirtytwo\nYou make your way to Alex's rooms. He opens the door to you looking very much not on top of his game. He's trembling and he looks clammy.\n\n\"Are you okay?\" you ask as he jitters out of the room.\n\n\"Yeah - Yeah,\" Alex says, shuffling his feet while half his body tries to walk down the corridor and the other half tries to stop to chat, \"Just a bit nervous. Is all. I always get nervous before an audition. I'll chill in a minute. Just can we go?\"\n*page_break\n\nAlex is a nervous and unresponsive mess all the way to the audition hall. You get there an hour early and it seems to help his nerves. Leaving the driver and Joe out the front of the theatre, you go in and sign in with the front desk. Usually non-actors aren't allowed in, but you're a special case.\n\nThe two of you are shown to a huge room and you grab seats by the wall. You can't help but wonder why it's so empty. But you realize quickly it's because you're so early. After the two of you have sat down, the room fills up fast. All of them men with strong booming voices and big personalities.\n\nThen people start to be called, which just sends Alex over the edge into a sweating mess.\n*if (alexact=true)\n\tDespite the fact that you saw his wonderful acting earlier, you really can't help but wonder if he's up for the task now.\n\t*goto fourtysix1\n*else\n\tYou're struggling to believe he's an actor at all.\n\t*goto fourtysix1\n*label fourtysix1\n*page_break\n\"Hey,\" he touches your arm gently, eyes wide, \"How long until I go up?\"\n\n\"Uh - twenty minutes.\" you say, nervous yourself in case you somehow make it worse.\n\n\"Good good,\" Alex says distractedly, he stands up, swinging his bag over his arm, and makes his way over to the bathroom. You stand outside to wait.\n\nYou wait quite a while, all you can hear from inside are loud clatters and the occasional strangled cry. You can only imagine what he's doing in there.\n\nWhen Alex emerges he's like a completely different person. He's standing up straight, all trace of sweatiness gone and his hair is tamed into a sophisticated style. He's changed into suit trousers and a loose shirt. For the first time he looks so much like his brother, in control and commanding.\n\n\"Alex?\" you ask dumbly.\n\n\"Shh.\" Alex hisses his mask cracking a little, \"I'm not Alex.\"\n*choice\n\t#\"Then who are you?\"\n\t\tAlex rolls his eyes, his mask cracking more by the second, \"I'm Othello. But call me whatever you like, just not Alex. Alex is terrified right now and I don't want you calling him back!\"\n\n\t\tYou simply nod dazedly and Alex... Othello, straightens himself up.\n\t\t*goto fourtyfive1\n\t#Refuse to play along\n\t\t\"Then who the hell are you?\" you say meanly.\n\n\t\t\"You're breaking my focus right now.\" Alex looks half deranged as the mask he hitched on his face slips off slowly, \"I'm not one for telling people what to do but shut up - this is not the time to distract me.\"\n\t\t*set alex %-20\n\t\t*goto fourtyfive1\n\t#Play along despite your confusion\n\t\tAlex nods at you in thanks. Even if you don't know what he's doing, you respect that he's got his own little way of dealing with this audition - it seems to have worked at any rate.\n\t\t*set alex %+8\n\t\t*goto fourtyfive1\n\t*selectable_if (alexact=true) #Call him Othello.\n\t\tAlex looks thoroughly taken aback as he slips easily back into his actor's mask.\n\t\t*set alex %+15\n\t\t*goto fourtyfive1\n\n*label fourtyfive1\nAlex's name rings out across the room as he's called into the audition.\n\nYou follow him quiet as a shadow, keeping a cliched five steps behind him.\n\nThe casting crew don't even spare you half a glance as you seat yourself on the end of the front row. Hell - they barely even look at Alex! They're too busy talking among themselves.\n\nBut it doesn't deter him. He strides confidently on stage with the air of a man who owns shares in half the universe and clears his throat.\n\nFrom the look on the caster's face this is evidently not the done thing. It's hard not to laugh at how affronted they all look.\n\n\"My name's Alex Haywood.\" Without giving the casting crew time to react, Alex launches straight into his speech.\n\n*if (alexact=true)\n\tYou thought since you've seen it a few times it would be less powerful. You couldn't have been more wrong. It's almost like Alex was holding back in front of you before, but now he gives it everything he's got, starting with mysterious simmering emotions and building up to a crescendo of anguish.\n\t*goto fourtyseven1\n*else\n\tYou were having your doubts in him when he was sweating his body weight in the waiting room, but all those misconceptions are blown away when he starts. You've never seen such raw and honest emotion.\n\t*goto fourtyseven1\n*label fourtyseven1\nWhen he's done, there's a silence. You can't speak for the casting crew but you've lost your breath a little in the wake of Alex's passion.\n\n\"Thank you for considering me,\" he gives a dramatic bow and walks out. You have to remind yourself very quickly to follow him.\n*page_break\n\nYou sit back down next to him in the waiting room. He's back to Alex again, hair flopping around his face, hands naturally a little shaky, crooked grin.\n\nHe's not standing tall, domineering the room anymore, and you suddenly relize how thin he really is now his charisma isn't filling him out. You've never seen him out of a big jumper before, and his thin shirt does little to hide his jutting shoulder blades and delicate waist. Then he pulls his jumper back on, and you can only wonder if you over exaggerated the whole thing.\n\n\"What do you think?\" he asks, eyes shining, clearly still on a high from his performance.\n\n*choice\n\t#\"Outstanding. That's it.\"\n\t\t*set alex %+10\n\t\t*goto fourtyeight1\n\t#\"I don't really know enough about acting to comment.\"\n\t\t\"Okay,\" Alex shrugs, \"I'll just have to teach you sometime.\"\n\t\t*set alex %+5\n\t\t*goto fourtyeight1\n\t#\"Weren't you kind of rude to the casting crew?\"\n\t\tAlex shrugs, \"I have to act all the way through those auditions otherwise I freak out. Today I was Othello and he's a straight talking, no nonsense type who doesn't beat about the bush. If that was rude then it's how I am. Besides the only thing that should matter is how I act.\"\n\n\t\t\"If you say so,\" you let it go, after all it seems to have worked for him so far.\n\t\t*goto fourtyeight1\n\t#\"I think acting's a waste of time, so I'm not going to encourage you.\"\n\t\t\"Whatever.\" Alex says, flicking his wrist at you, \"If you have some constructive criticism for me, go ahead. If you're just going to bash my choice of career then I'm going to ignore you.\" he smiles inanely.\n\t\t*set alex %-10\n\t\t*goto fourtyeight1\n*label fourtyeight1\nAlex grins to himself and leans back in his chair. \"Now we just wait for their callback list, then we can get off.\"\n\n\"How long is that going to take?\" You ask.\n\n\"Probably quite a while. My audition was quite early.\" His stomach rumbles loudly.\n\nYou raise your eyebrows, \"You didn't eat this morning did you?\"\n\nAlex blushes and refuses to meet your eyes, \"I guess I might have forgotten.\" he admits.\n\n*choice\n\t#Send Alex's driver to get some food and bring it back for both of you.\n\t\t\"I'm not really a fan of having things done for me...\" Alex says tentatively.\n\n\t\t\"But this is something a mate would do if you'd brought one.\" You say, pointing out all the other actors who are having food brought to them by well-wishing friends.\n\n\t\tAlex eyes them over, clearly still on the fence.\n\n\t\t\"Well if nothing else I'm hungry...\" you add, hoping to tip his decision.\n\n\t\tYou just make him laugh though, \"Fine. Good point made, and taken. Nothing crazy fancy though.\"\n\t\t*set alex %+8\n\t\t*goto fourtynine1\n\t#Suggest to Alex leaving the driver at the audition so Joe, Alex and yourself can go out and get something to eat.\n\t\t\"I can't do that!\" Alex says, with a look on his face like you've suggested going down to the river and throwing in a sack of kittens, \t\"This is my audition! I'm not some pompous toff who needs people to do my waiting for me. It's my responsibility to be here and hear the results for myself.\"\n\n\t\t\"Okay,\" you say, holding your hands up in a suprised surrender, \"What if I got them to bring the food here? That's something you'd have a friend do, not an employee, right?\"\n\n\t\t\"Fine.\" Alex says, although he looks ruefully at his bony hands and doesn't look happy about it.\n\t\t*set alex %-8\n\t\t*goto fourtynine1\n*label fourtynine1\n\nYou get Joe to bring you two big chunky sandwiches and take away drinks with a cake each.\n\nYou hand Alex his then make a start on yours. You aren't even halfway through when you look over and realize Alex's food is gone already.\n\n\"Hungry?\" you ask.\n\n\"I must have been,\" Alex says patting his stomach through his big jumper.\n*choice\n\t#Offer him your cake.\n\t\t\"It's fine,\" Alex says, waving it away, \"I do appreciate the sentiment, but I'm really full.\"\n\t\t*set alex %+5\n\t\t*goto fifty\n\t#Shrug it off (that cake is mine).\n\t\t*goto fifty\n*label fifty\n*if (alex1=true)or(alex>40)\n\t\"I want to thank you for coming with me today,\" Alex says, relaxing and sipping his drink, \"I know it's your job, but it felt good to have someone I was comfortable with in the audience. It was a bit like you were cheering me on.\"\n\t*goto fiftyone\n*else\n\tThe two of you eat your food in a slightly uncomfortable silence. After all, the two of you haven't exactly got off on the right footing.\n\t*goto fiftyfour\n*label fiftyone\n*choice\n\t#\"You're right, it is my job. That's it. Let's not get too comfortable.\"\n\t\t*set alex %-8\n\t\t*goto fiftytwo\n\t#\"You were a pleasure to watch. I'm glad I got the opportunity to see you.\"\n\t\t*set alex %+8\n\t\t*goto fiftytwo\n*label fiftytwo\n\"It's been all about me today so far.\" Alex continues conversationally, \"And you've been so supportive. I'd like to know more about you.\"\n\n\"What do you want to know?\" you ask, making the most of your cake.\n\n\"Hmm. Okay lets start simple. How old are you?\"\n\n*input_text age\n\n\"Pretty young. To be managing such a huge scale job that is.\"\n\n\"I'm not that young.\" You say, trying not to sound petulant.\n\n\"It's a lot of responsibility to have no matter how old you are. Sorry, I wasn't trying to talk down to you, you're only five years my junior after all.\" He's quiet for a moment, \"Do you like having such a big job?... No that's not right, do you like being a security agent? Don't you want to do something else?\"\n*set dream1 true\n*choice\n\t#\"This is all I've ever wanted.\"\n\t\t\"Really?\" Alex looks incredulous, \"You don't dream of something better?\" he visibly slumps, \"Then I can only say I'm jealous of you.\"\n\t\t*set dream \"Bodyguard\"\n\n\t\t*goto fiftyfour\n\t#\"I love what I do. But I wish I had the freedom to take the jobs I want, rather than the ones I'm given.\"\n\t\t\"So you want your own agency?\"\n\n\t\t\"If I can find the money.\" you reply, \"Like under a rug. Or in the flying pig that escaped my room this morning.\"\n\n\t\t\"I see your point.\" Alex chuckles, \"But we can live and dream.\"\n\t\t*set dream2 true\n\t\t*set dream1 false\n\t\t*goto fiftyfour\n\t#\"Actually if I could choose I'd be a-\"\n\t\t*goto fiftythree\n*label fiftythree\n*input_text dream\n\n\"Do you reckon you'll do that one day?\" Alex asks, as if listening to you talk about your aspirations is pure bliss to him.\n\n\"I can hope.\" is all you can reply.\n*label fiftyfour\n\n\"Well we have a few hours to kill.\" Alex trails off as you dump the empty containers in a nearby bin, \"I have a pack of cards, or a game boy colour. If you want, we could swap out when we die.\"\n*label replay3\n*choice\n\t#Cards sounds fun.\n\t\tYou both decide a simple game would be best and settle on blackgammon, relaxing and chatting as you go.\n\t\t*set alex %+5\n\t\t*goto fiftyfive\n\t#Old school gaming? I'm in.\n\t\t\"I was secretly hoping you'd say that.\" Alex admits as he pulls it out his back pack, \"In recognition of your good taste I will allow you to go first.\"\n\n\t\tAll Alex has with him is Mario Deluxe. The two of you swap in and out when you die, cheering the other on and making an unseemly racket in the stoic waiting room, stealing snatches of chatter in the loading screens.\n\t\t*set alex %+8\n\t\t*goto fiftyfive\n\t*hide_reuse #I offer to help him run lines.\n\t\t\"Much appreciated.\" Alex says, \"But I need a break from work.\"\n\t\t*set alex %+10\n\t\t*goto replay3\n\t#Actually I prefer not to be goofing off, even thought there's nothing really to watch for with Joe at the entrance.\n\t\tAlex understands, he even seems pretty content to just sit and chat, reading his book and occasionally making friendly conversation.\n\t\t*set career %+10\n\t\t*goto fiftyfive\n*label fiftyfive\nYou find out a lot more about Alex that afternoon. He's not a man to waste words, he's well read and fiercely intelligent but despite that, he never talks down to you. His bookish appearance doesn't do justice to his physical activities either, he's a big fan of swimming and squash, even though he admits himself he has the coordination of a spider with eight left feet.\n\nHe's also done more acting than you originally thought, playing many supporting roles for the Shakespeare company, and even leading roles in the London production of 'War Horse' and 'The Woman in Black.'\n\n\"I'd like to get a a permanent arrangement though. I'm not a big fan of having to work in a library to make ends meet. No matter how much I love books.\"\n\n*choice\n\t#Ask him why he doesn't use his family's money.\n\t\t\"I think you'd know me well enough by now to know I don't like to depend on others to do things I can do for myself.\" He says a little sharply. \"But more than that...\"\n\t\t*set alex %-5\n\t\t*goto fiftysix\n\t#Let him talk, he'll say what he wants.\n\t\t*set alex %+5\n\t\t*goto fiftysix\n*label fiftysix\n\"I just don't want to get mixed up in this power play over who really owns the business. It's causing enough of a rift between Mum and Chris without me getting involved. And they're both so greedy, Mum insists she signed a will that left everything to her, but there's no proof so Christopher's monopolising the assets. It's such cold behaviour from both of them, I don't want to be such a ruthless person. I don't see why they can't just share the money. I mean it's a hell of a lot, after all.\"\n\n*choice\n\t#This seems like some interesting information I want to file away for later\n\t\t*goto fiftyseven\n\t#I feel really sorry for Alex, his family tearing itself apart over money.\n\t\tAlex simply smiles at the look of sympathy on your face.\n\n\t\t\"Hey,\" he holds out his hands like he's washing them of the whole scandal, \"I wouldn't want that much money anyway. As my brother found out the hard way, a lot of responsibility comes with that many assets. I want to be free to do what I want to do, which is act, not run a giant corporation.\"\n\n\t\tYou know he really means it, if he didn't you imagine he would be after his Dad's fortune as well. You can only wonder if Alex is the only genuine person you've met so far.\n\t\t*set alex %+10\n\t\t*goto fiftyseven\n\t#I think Alex is stupid for not getting involved, as he just said - it's a lot of money - why wouldn't you go after it if it's up for grabs?\n\t\tIt's almost as if Alex can read what's going through your head because he frowns, \"I know that look. It's the look greedy people get when I tell them I have no interest in a fortune. If that's what interests you - I advise you to pursue my brother - because I'll have no part in it.\"\n\t\t*set alex %-15\n\t\t*goto fiftyseven\n*label fiftyseven\n*page_break\nAn unnatural hush suddenly settles over the room over the room as the casting agents come out.\n\nIt's hardly suprising to you that Alex gets a call back, although he acts no less ecstatic for it.\n\nHe basically bounces out of the audition hall, and you get to see a whole new side of Alex, the side that won't shut up when he's talking on and on about what his next audition piece should be like and trying to engage you in a conversation to help him choose.\n\n*if (book=true)\n\tYou're looking out the window as Alex rabbits on when you see a book shop having a sale. It jogs something in your memory....\n\n\t*choice\n\t\t#Go in to pick up a voucher quickly\n\t\t\tYou aks Alex to nip in quickly, he, of course, doesn't mind. You go straight up to the counter to purchase a voucher.\n\n\t\t\tBut at the checkout they're having a sale. It's a huge set of ten encyclopedia for children, each book dedicated to a different subject with full double spread pages dedicated to delicate hand drawn diagrams. The topics range from dinosaurs to space. It's perfect and you buy it.\n\t\t\t*set bookbuy true\n\t\t\t*goto next6\t\n\t\t#Shrug and move on.\n\t\t\t*goto next6\n*else\n\t*goto next6\n*label next6\nHe's like a child all the way back home in the car, practically bouncing on springs off the back seat when you pull up outside the house.\n\n*if ((alex1=true)or(alex>50))\n\t\"Hey I can't remember,\" He calls over his shoulder from half way up the steps, while you and Joe are still half way out the car, \"Did I ask you to that show I have tonight? Bah!\" He doesn't give you chance to reply, \"I have to go get ready, but if you want to come you will do, right?\"\n\n\tAnd off he bounces. You can only wish you had his energy as you grope your way up to your room, Emma assuring you through your radio that the day has all gone perfectly.\n\t*set alexinvite true\n\t*goto thirty\n*else\n\tWithout even a 'how do you do' Alex has bounced away into the house. You are left to grope your way sleepily to your room.\n\t*goto thirty\n\n*label thirtythree\nYou make your way along to Opal's rooms.\n\nOn your arrival you find she's all ready to leave.\n\n\"I've never had a bodyguard before.\" she says conversationally as the two of you make your way out of the house, \"Do you have to walk five steps behind me?\"\n\n\"No, I can walk anywhere\" you reply, wondering if she's making a joke, \"Where would make you feel more at ease?\"\n\n\"Next to me.\" Opal says without hesitation, \"Daddy's always rushing around with people two steps behind him, and I do think it looks rather obnoxious. If you're next to me it feels more companionable. Even if the reality of the situation is different.\"\n\nYou fall into step beside her and while she says it is more companionable she still waits for you to hold open doors for her and doesn't hold them for you in return.\n*page_break\nYou slide into the car next to her. Drew is sat in the front, as he's your partner for the day and will back you up in everything you do, next to a driver you're unfamiliar with.\n\n\"Where to, Ms.Sandhurst?\"\n\n\"London.\" Opal says commandingly, crossing her ankles delicately and placing her hands on her lap like royalty, \"I think for this party my dress is going to have to be particularly breath taking.\"\n\n\"Of course,\" The driver agrees, in the tone of a man who agrees with eveything.\n\nLondon. With all those people around, it's not going to be easy to do your job. On the flip side the chances of the kidnapper targeting Opal, considering she is not yet formally attached to Christopher, are next to nothing.\n\nYou spend the car journey in relative silence. Emma calls you occasionaly to ask a question and Drew and your driver make occasional gruff exchanges but other than that no one speaks. Opal seems content to simply look out of the window, still as an ice sculpture.\n\n*page_break\n\nAfter battling through traffic you finally arrive in London. The moment you're parked and have opened the door for Opal, she swans off, not even bothering to check if you're close at hand.\n\nYou hurry after her, leaving Drew to tail behind in his role as rear guard.\n\n\"We'll go to Covent Garden first.\" Opal informs you as you fall into step beside her, \"After that drive, I am quite in the mood for some tea.\"\n\nMore tea. You can only be suprised it doesn't grow out of these people's ears.\n\nWhen you're out on the street Opal makes a very derisive snort you didn't think she'd be capable of. You follow her line of sight to a giant billboard. It's an advert for jewllery, a nighttime scene with a dark woman lying seductively under a full moon which shines on her body and highlights the curves of her naked form, luminescent pearls hang from her neck.\n\nYou do a double take when you realize the woman on the billboard is Opal.\n\n*choice\n\t#\"Why the snort? You look beautiful up there.\"\n\t\t\"Of course I do,\" Opal says, waving her hand dismissively, \"I'm a beautiful woman.\"\n\n\t\t\"Then why the snort? Surely an advert like that is a big achievement for a model.\"\n\n\t\t\"I'm not a model.\" Opal contradicts.\n\n\t\t\"But-\" You're eyes flicks back to the billboard but she cuts across you.\n\t\t*set opal %-10\n\t\t*goto thirtyfour\n\t#\"I didn't know you were a model.\"\n\t\t\"I'm not.\" Opal says simply, \"I was merely cast in that one role due to an unfortunate circumstance.\"\n\n\t\t\"Surely that still makes you a model?\" You press, making Opal sigh.\n\t\t*set opal %+8\n\t\t*goto thirtyfour\n\t#Remain silent.\n\t\tOpals eyes flick to you, \"No questions?\"\n\n\t\t\"It's not really my business,\" you reply stiffly\n\n\t\t\"That's a first. When it's up on a billboard everyone tends to think it's their business.\" Opal says, appraising you.\n\n\t\t\"If you don't want to say,\" You shrug, \"But if you do I'll listen.\"\n\t\t*set opal %+5\n\t\t*goto thirtyfour\n*label thirtyfour\n\n\"I'm not a model, I've done the one job but I don't tend to advertise it. Unfortunately I've found people tend not to care what you have to say, when their eyes are occupied elsewhere.\" she says it so flippantly that you almost miss the wistful note in her voice.\n\n\"Anyway,\" she continues, \"The idea of modeling doesn't appeal to me. However the owner of the company who commissioned the adverts took a shine to me and insisted I be used in the advertisment else he would take his commision elsewhere. Apparently my personal views on the matter made little different when such a high paying job was at stake for Daddy.\"\n\n*choice\n\t#\"You still had a choice.\"\n\t\t\"Hardly,\" Opal replies harshly, \"Daddy is not in the habit of keeping children who do not ask 'How high' when he says 'Jump'.\"\n\n\t\t\"Why do you need to be kept?\" you press.\n\n\t\t\"I will not talk about this anymore!\" Opal hisses at you, and she stalks ahead, clearly very unsettled.\n\t\t*set opal %-8\n\t\t*goto thirtyfive\n\t#\"It's not a big deal. You can do this one thing for your Dad.\"\n\t\t\"Yes, when one struggles to be taken seriously in an intellectual capacity, it's not a big deal when they are forced to flaunt their body for an industry that is traditionally thought of as where the dullards go to try and make a living.\"\n\t\t*set opal %-10\n\t\t*goto thirtyfive\n\t#\"That sucks.\"\n\t\t\"Eloquently put,\" Opal says coldly, but she smiles in appreciation of your sentiment.\n\t\t*set opal %+10\n\t\t*goto thirtyfive\n*label thirtyfive\nThe two of you walk in silence for a while, wending between people and barging through tourists to keep as close to Opal as possible.\n\nWhen you reach Covent Garden, Opal points the two of you towards a tea shop.\n\nYou're making your way over to it when you realize Opal isn't next to you, but stood a few metres back, staring into the window of a shop.\n\nYou retrace your steps back to her and see that it's an old fashioned sweet shop called 'Ethel's Allsorts', with large jars sat on polished wooden shelving lining the walls all the way up to the roof. There's even an old fashioned cash register on the counter.\n\n\"This wasn't here the last time I visited.\" Opal says, she reaches out her fingers and touches them lightly to the glass, \"It's quite wonderful isn't it?\" She blinks and turns to carry on up the street.\n\n*choice\n\t#\"Wouldn't you like to go inside?\"\n\t\tOpal pauses, taking time to think like it's a huge decision. Then she nods once, \"Yes. I think I would like to go inside.\"\n\t\t*set opal %+15\n\t\t*goto thirtyseven\n\t#F
