all into step beside her.\n\t\t*set opal %-5\n\t\t*goto thirtysix\n*label thirtyseven\nYou open the door for her and she steps tentatively inside. You follow her in and shut the door behind you.\n\nWhen you turn back to her you find that Opal is practically a whole different person. She hasn't strode across the center of the room with enough confidence to knock people backwards. Instead she's stood in the corner of the room next to you, nervously shuffling one of her feet and her eyes darting around and around.\n\nThe cashier turns and smiles at the two of you before going back to dusting the back shelves.\n\nYou wait beside Opal, unsure what to do about her sudden change in character.\n*choice\n\t#Ask if she is going to look around.\n\t\t\"Of course,\" Opal says, almost aggresively.\n\n\t\tYou fade youreself into the background, something that comes naturally in your position.\n\t\t*set opal %-5\n\t\t*goto thirtyeight\n\t#Look around the store yourself, perhaps she'll feel more at ease.\n\t\tYou walk off slowly, browsing the shelves while keeping an eye on Opal in your peripheral.\n\t\t*set opal %+5\n\t\t*goto thirtyeight\n\t#Re-open the door for her so she can leave.\n\t\tShe looks at you and shakes her head silently, then looks longingly around the shop.\n\t\t*set opal %-8\n\t\t*goto thirtyeight\n*label thirtyeight\nOpal's heels click on the polished wood as she creeps slowly down the length of the shop, eyeing the shelves in wonder.\n\nThe two of you are there for nearly half an hour, you watching Opal as she inspects every jar in the shop, her eyes wide like a child, like sweets are things she's never seen before.\n\nWhen she's been round the whole shop she straightens and smiles at you, not a professional smile or a vicious smile like you've seen on her before, but a genuine open and warm grin.\n\n\"It's lovely in here.\" she says simply.\n\n\"Very old fashioned.\"\n\n\"It's part of the charm,\" Opal says, looking around joyfully.\n\n\"Are you going to buy something?\"\n\nSuddenly Opal stiffens as if you've said something incredibly rude, \"I do not have the money.\" she says, her cheeks reddening slightly.\n*choice\n\t#Buy a bag of sweets for her.\n\t\t\"I expect you don't carry around pocket change.\" You joke to lighten the mood, \"No drama,\" you delve in your own pocket and come out with a few coins, \"What's your choice?\"\n\n\t\tOpal is staring at you with some mixture of suprise and an emotion you can't identify.\n\t\t*set opal %+15\n\t\t*goto thirtynine\n\t#Open the door for her to leave.\n\t\t\"Okay,\" you say uncertainly, \"Shall we be off then?\"\n\n\t\t\"Of course,\" Opal nods, shaking off the nervous girl she'd been in the shop. She steps outside again, back to her fierce self.\n\t\t*goto thirtysix\n*label thirtynine\n\"You'll really buy them for me?\" she asks incredulously.\n\n\"Of course,\" you shrug, \"It's no big deal.\"\n\n\"But what could I have?\"\n\n\"Anything, just don't go over,\" you count the change in your palm, \"3.48\"\n\n\"Okay,\" Opal says, making her cautious way back around the store.\n\nYou spend another half hour waiting on her, now she actually has to choose what she wants. Drew even radios you to ask if everything is alright, you've spent so long in there. \n\nIn the end she chooses traditional strawberry Bon-Bons. You buy her 100 grams worth, which only gets about eight Bon-Bons but Opal seems to love it, taking the white paper bag delicately in her hands and peering inside.\n*page_break\nYou both leave the shop, but Opal stops outside, looking up at you, the little bag still clutched in both hands.\n\n\"Thank you.\"\n\n\"It's okay,\" you shrug, it's no big deal to you, although Opal seems to be thoroughly shaken by the experience.\n\n\"I've never had sweets before.\" Opal admits, looking down at the bag and inspecting the sweets with fervour.\n\n\"Not even desserts?\"\n\n\"No.\" Opal says, still staring at the sweets as if they might disappear, \"Daddy always said he was never going to have a fat daughter, so I've never been allowed anything like this.\"\n\n\"Surely now you're older you can get it yourself?\" You press.\n\nOpal swallows, \"I live off Daddy 100%, I can't buy anything without his consent. I'm not even allowed cash,\" she glances at you as her cheeks redden, \"I've always wanted to try these. When I was little I tried to get my tutors to give me some, just once. But they were under Daddy's thumb and wouldn't.\"\n\n*choice\n\t#I've had enough of this pathetic sob story. The rich girl can't have sweets? Really heart wrenching. I not-so-subtly walk along.\n\t\tYou glance over your shoulder to see Opal tucking the white bag into her own. Putting her confident demenour back on, she follows you.\n\t\t*set opal %-10\n\t\t*goto thirtysix\n\t#Her Dad controls her entire cash flow? I can only wonder what else she's never been allowed. Poor girl.\n\t\tIn a gesture that comes as a suprise even to yourself, you chuck her under the chin.\n\t\t*set opal %+10\n\t\t*goto fourty\n\t#Even though she's so controlled she still has so much confidence. I admire that, and I like that I know her better now.\n\t\t*set opal %+10\n\t\t*goto fourty\n*label fourty\n\n\"Enjoy them.\"\n\n\"I will,\" she smiles at you, then after a moment offers you the bag, \"I'd like to share them with you.\"\n\nTouched by the gesture you take one and pop it in your mouth. Opal follows suit.\n\nTo you it's just a normal sweet, but Opal's face lights up, \"Oh wow.\" she says thickly as the gooeyness cements her jaw together.\n\nShe links arms with you and continues on to the tea shop.\n*page_break\n*label thirtysix\nThe two of you push your way in to a very fancy tea parlour. Opal is greeted by name and shown to a booth by the window. Opal gestures for you to sit opposite her.\n\nThe whole thing is very flowery and twee. Everything is pastel shaded and flowers are embroidered everywhere, including the servers' uniforms.\n\nA tea service is brought almost immediately with delicate little finger sandwiches filled with insubstantial fillings like cucumber and watercress.\n\n*if (breakup=true)\n\t*goto fourtyone\n*elseif (opalprop=true)\n\t*goto fourtytwo\n*elseif (opalconvf=true)\n\t\"I think it's such a shame we couldn't see eye to eye.\" Opal says, glancing wistfully at you.\n\n\t\"What do you mean?\" you ask, sticking with your tea over the green sandwiches.\n\n\t\"Nothing really.\" Opal smiles, and she refuses to say anything on the subject again. You spend the rest of the tea in silence.\n\t*goto fourtyeight\n*else\n\t*goto fourtythree\n*label fourtyone\n\"I'm glad you decided Chrsitopher wasn't worth your time.\" She smiles at you, \"You can do much better, and to that end I have a proposition for you. But I have a few questions first.\"\n\nShe lets you wait for a moment as she smiles mysteriously.\n*set replay true\n*goto replay1\n\n*label fourtythree\n\"It's a shame you couldn't come to see me this morning.\" Opal muses, \"But no matter, you're here now. And I have a proposition for you, but first a few questions. If you will indulge me.\"\n\nShe lets you wait for a moment as she smiles mysteriously.\n*set replay true\n*goto replay1\n\n*label fourtytwo\n\"I'm glad you came to see me earlier.\" Opal smiles at you over her tea cup, \"We have much to discuss.\"\n*page_break\n*label fourtyfive\n\"Straight down to business then. Put your radio on the table so I know no one else is listening in.\"\n\nYou do so.\n\n\"Now know that this is a very lucrative and exclusive opportunity I'm offering. I would advise you take me up on it. If however you don't, I expect you to keep your mouth zipped. In fact if you give even the faintest hint you might blab I will make sure you can't.\" Opal explains matter of factly, \"Now the threats are out the way, to the crux of the matter.\"\n\n*page_break\n\"I'm determined to marry Christopher.\"\n\n\"Okay...\" You say. The whole idea isn't as sinister as you were first thinking.\n*label replay2\n*choice\n\t*hide_reuse #\"Why is this a lucrative opportunity for me?\"\n\t\t\"Because if you help me I will be very much in your debt. And you will have the gratitude of one of the richest and most influential women in the country. Anything you want, I'll make sure it's yours. You want a big pay off straight up? Fine. You want job security the rest of your life? I'll sort it for you. You want to set up your own company and make yourself rich? I'll invest in you.\"\n\t\t*goto replay2\n\t*hide_reuse # \"Why do you want to marry Christopher so badly?\"\n\t\t\"I don't want Christopher. I want his company. Or companies should I say. You only see him working for the one. Realistically he owns shares for the UK's top ten retail leaders and has an interest in more than two of England's biggest banks. I want those assets. It's quite simple.\"\n\t\t\t\n\t\t\"I thought your family had their own assets?\" You ask, confused.\n\n\t\tOpal stiffens, \"That is a very personal question that I shall refrain from answering. Suffice to say, the assets I have access to are not great enough for what I need to do.\"\n\t\t*goto replay2\n\t*hide_reuse # \"Why do I need to stay quiet about this?\"\n\t\t\"We can't have Christopher know how desperately I'm pursuing him. Nothing turns a man off more than that. No, we need subtlety. The way his simpering mother introduced the idea of us dating did not help at all. But what's done is done. But now I need an edge, someone who sees everything. With your resources you can tell me everything about him, where he is at any time, what he likes, where he plans to go. And I can make myself available.\"\n\t\t*goto replay2\n\t#\"That's all I wanted to ask.\"\n\t\t*goto fourtysix\n\n*label fourtysix\n\"Good.\" Opal says flippantly. My voice was getting hoarse, \"So will you help me?\"\n*choice\n\t#Yes. I can't turn this opportunity down. The sky is the limit with this, I could do anything in the world if we pull it off.\n\t\t*set opalplot true\n\t\t*set opal %+20\n\t\t*goto fourtyseven\n\t#No. I can't take this risk, and I feel sorry for Christopher being used like that.\n\t\t*set opal %-20\n\t\t*goto fourtyfour\n*label fourtyseven\n\n\"I knew you had some brains,\" Opal says, smiling at you.\n*page_break\n*if ((((rob1=true)or(alex1=true))or(rob>50))or(alex>50))\n\t\"One last thing though,\" Opal says delicately, though her eyes are boring into you, \"I don't want you to get too involved with the Haywoods. Or any of the staff to be honest. I've got a lot on the line putting my cards on the table like this - and I don't want to risk your loyalties shifting.\n\t*choice\n\t\t*selectable_if ((rob1=true)or(alex1=true)) # I was actually interested in someone. But this opportunity is better. It's a shame it can't be helped.\n\t\t\tYou sigh, wondering what might have been. But you nod at Opal, \"Sure, the steaks are pretty high after all.\"\n\n\t\t\t\"I appreciate your empathy,\" Opal says, smiling warmly at you.\n\t\t\t*set rob1 false\n\t\t\t*set alex1 false\n\t\t\t*set rob %-75\n\t\t\t*set alex %-75\n\t\t\t*set book false\n\t\t\t*set opal %+10\n\t\t\t*goto edit1\n\t\t#Sure, I have no issues not getting close with others.\n\t\t\tYou shrug, \"Makes no ends to me,\" you reassure her.\n\n\t\t\t\"Thank you, for making me feel at ease,\" Opal smiles at you and the two of you settle into a comfortable silence for a few minutes.\n\t\t\t*set rob1 false\n\t\t\t*set alex1 false\n\t\t\t*set rob %-75\n\t\t\t*set alex %-75\n\t\t\t*set book false\n\t\t\t*set opal %+10\n\t\t\t*goto edit1\n\t\t#I'll speak to who I want when I like. You can't boss me around like that.\n\t\t\t\"As long as we have an agreement I will.\" Opal says delicately.\n\n\t\t\t\"Then it appears we don't have an agreement.\" you shrug.\n\n\t\t\t\"Fine.\" Opal narrows her eyes at you, \"No agreement,\" The two of you settle into an uncomfortable silence.\n\n\t\t\tYou know you've just closed one door on yourself, you hope it's worth it.\n\t\t\t*page_break\n\t\t\t*set opalplot false\n\t\t\t*set opal 1\n\t\t\t*goto fourtyeight\n*else\n\t*goto edit1\n*label edit1\n\nShe spends the rest of your tea break explaining exactly what role you're going to play for her.\n\nShe gives you her phone number, stressing she wants updates on where Christopher is at all times, anything Christopher says to you (or you happen to overhear)about his likes and dislikes, any rumours that might come in handy for her to know. Basically nothing is too silly to text her about, she wants to know it all. You're also to run interferance with the servants and Christopher's 'blasted mother'. You can't help but have images of all your years of training coming down to rugby tackling servants if they try to enter the wrong room at the wrong time.\n\n\"Anything to make me stand out,\" she finishes as she puts down her empty tea cup, \"It's rather unfortunate that he is a very attractive man really. Else it would make it much easier. As it is I am one amoung many clamouring for his attention. So, as I said, I need an edge.\"\n*page_break\n*label fourtyeight\n\"Right,\" Opal continues, standing and brushing herself off, \"It's time to get me a beautiful dress that will make me look like a queen. Well, even more than I already do.\"\n\nYou follow Opal out of the tea shop and spend the rest of the day trailing around after Opal in the role of 'carrying person'. \n\nBy the end of the afternoon you feel like you've seen a million dresses. Opal asks for your opinion on each and commpletely ignores everything you say anyway, so you might as well be blowing raspberries at her for all the impact you make on her final decision.\n\nFinally the dress is picked and just when you think you're free, you are reminded that there are shoes to look for too.\n*if (book=true)\n\tYou're sitting in a Chanel, waiting for Opal when you see a Waterstones across the way.\n\n\tRemembering what Rob said earlier, you have a thought.\n\n\t*choice\n\t\t#I could call Drew in here for just a second, run across and pick up a voucher.\n\t\t\tYou run across the road, with the full intention of just getting a voucher to speed up the process (you would out and out buy a book if you weren't working.).\n\n\t\t\tBut at the checkout they're having a sale. It's a huge set of ten encyclopedia for children, each book dedicated to a different subject with full double spread pages dedicated to delicate hand drawn diagrams. The topics range from dinosaurs to space. It's perfect and you buy it.\n\t\t\t*set bookbuy true\n\t\t\t*goto fourtynine\n\t\t#I could run and pick up a book for Anna. But I won't. It's not my business.\n\t\t\t*goto fourtynine\n*else\n\t*goto fourtynine\n*label fourtynine\n*page_break\nBy the time you bundle all the bags, your charge and yourself back into the car and make for home you feel more tired than if you'd had to cope with an actual kidnapper.\n\nYou jerk out of a semi-doze as the car crunches on the gravel drive. You've never been so happy to be off your feet.\n\nYou let Opal out of the car and she bids you a pleasant good night, while gesturing for the driver to get her bags.\n\nRather him than you.\n*goto thirty\n*label fourtyfour\n\"A shame.\" Opal says, \"I had hoped to have an accomplice in my plans.\"\n\nShe refuses to speak about it again.\n*goto fourtyeight\n\n\n*label thirty\nYou stumble into your room and collapse on your bed.\n\nWhat a day, and it isn't even over yet. But you do have a few minutes to collect yourself.\n\nWhat do you find yourself thinking about?\n\n*choice\n\t*selectable_if (opalplot=true) # I think about my deal with Opal, I get the feeling she's planning more than she's telling me.\n\t\tYou can only speculate as you lie there, wondering what you might have got yourself into.\n\t\t*set opal %+10\n\t\t*goto onehundred\n\t*selectable_if (rebplot=true) # I think about my promise to Rebecca, I hope I can keep it without Christopher finding out.\n\t\tIt's such a sad situation with her and Christopher pitted against each other so fiercely. It will no doubt be even sadder if you are caught, Christopher will at least fire you. Your mind wanders as you scour the house in your head. Where could that will be?\n\t\t*set reb %+10\n\t\t*goto onehundred\n\t*selectable_if (chris1=true) # I think about Christopher, and this weird half relationship we've started, and where those damn documents might be.\n\t\tYou try to keep your mind focussed on where the will might be. But you can't seem to stop your mind slipping back and replaying every moment when he pulled you closer to him or touched your face. You just lose yourself in the memory of how his breath tasted on your lips when he was so close.\n\t\t*set chris %+5\n\t\t*goto onehundred\n\t*selectable_if (rob1=true) # Weirdly, I think about Rob. I found myself thinking about his smiling face a lot today.\n\t\tThe whole situation is becoming more and more jumbled with every conversation you have. It's hard not to think about the only person who seems to be honest and genuine. Especially when he's so caring.\n\t\t*set rob %+10\n\t\t*goto onehundred\n\t*selectable_if (rob>50) # I think about Rob, I like how our friendship is going.\n\t\tThe whole situation is becoming more and more jumbled with every conversation you have. It's hard not to think about the only person who seems to be honest and genuine.\n\t\t*set rob %+10\n\t\t*goto onehundred\n\t*selectable_if (alex1=true) # I think about Alex. Fantasize might be a more appropriate term.\n\t\tYou can't help it. You know he's supposed to be under your protection and you shouldn't be thinking like this. But it's hard to ignore the passion and drive of a man so determined to excel on his own merits. He's truly one in a million and it's such a stick that you can't do anything about it.\n\t\t*set alex %+10\n\t\t*goto onehundred\n\t*selectable_if (alex>50) # I think about Alex, I like how our friendship is going.\n\t\t*set alex %+10\n\t\t*goto onehundred\n\t#I've found out today there is definitely more going on than first seemed. I'm going to have to watch my steps.\n\t\tYes, something suspicious is going on, and you get the feeling a lot is being hidden from you. You can only hope you've gathered the resources to survive the storm you have a feeling is coming.\n\t\t*set chris %+5\n\t\t*set reb %+5\n\t\t*set opal %+5\n\t\t*goto onehundred\n\t#I think about the party looming on the horizon, planning in my head and tweaking details.\n\t\tEven lying on your bed, work never seems to stop. There's no time with this big social event looming. It will be the biggest test of your skills so far and you can only hope you're up to it.\n\t\t*set career %+10\n\t\t*goto onehundred\n\t#I think about a holiday. One I'm going to take when all this is over.\n\t\tYes, a beach perhaps. Or just even somewhere out in the country. Ideally a place with no radio signal, where you can really kick back and put up your feet.\n\t\t*set career %-10\n\t\t*goto onehundred\n\n*label onehundred\nBut you can't stay wrapped up in your thoughts for long.\n\nYou have to get up, get ready and get moving to-\n*choice\n\t*selectable_if (alexinvite=true) # Escort Alex to his play. Sure I'll have to go in a professional capacity, but I'll still get to be there.\n\t\t*goto onehundredtwo\n\t*selectable_if ((robinvite=true)and(opalplot=false)) # Go to Rob's house. I'm sure Emma won't mind covering me for a few hours and it'll be nice to get out.\n\t\t*goto onehundredthree\n\t*selectable_if (chris1=true) # Have my date with Christopher.\n\t\t*goto onehundredfour\n\t*selectable_if (chris1=false) # Go back to work. No rest for the wicked.\n\t\t*set career %+15\n\t\t*goto onehundredfive\n\n*label onehundredtwo\nWhen you get to Alex's room, he isn't there. You find him at the car, waiting and jittering about nervously. \n\n\"I just heard,\" he grabs your arms and bounces on the balls of his feet, \"Mr. Cox is going to be there. The biggest agent in England is going to be there, I think I might throw up a bit. I'm so nervous.\"\n\n*choice\n\t#\"Calm down.\"\n\t\t\"You don't think I tried that?\" Alex furrows his brows at you as he continues to bounce.\n\t\t*set alex %-5\n\t\t*goto 1\n\t#\"Let's get off now then, we can be there early and you can prepare more.\"\n\t\t\"Great plan!\" he bounces over to the car and starts pulling on the door handle.\n\t\t*set alex %+8\n\t\t*goto 1\n\t#\"Would you like me to listen to your piece?\"\n\t\t\"Thanks, but no, I'm just going to let go when I get on stage. I don't want to bore myself with the words. Come on!\" he runs over to the car and starts pulling on the handle even thogh it's locked. \"Let's go.\"\n\t\t*set alex %+5\n\t\t*goto 1\n\t#\"Can you calm down? I can't protect you if I'm distracted by your jibbering.\"\n\t\tAlex ignores you and starts pawing at the car like a cat at the door.\n\t\t*set alex %-8\n\t\t*goto 1\n*label 1\nYou bundle Alex into the car and set off nice and early. Despite that, when you get there, cars are clogging the roads. You and Alex have to get out and walk to the theatre, leaving the car to try and find a space to park.\n\n\"I didn't think there'd be so many people here.\" Alex frets, wringing the sleeve of his jumper in his hands. He leads you round a side door where you're let in and led through to a small but private dressing room.\n\nAlex squawks to himself for a few minutes while you familiarise yourself with the room then a sudden calm washes over him, he stops jumping up and down and he sits in front of the dressing mirror and starts to tame his hair back into a style reminiscent of his brother's.\n*choice\n\t#\"You calmed down quickly.\"\n\t\t\"Shh,\" Alex presses his finger to his lips at you, \"I need to focus into character,\"\n\t\t*set alex %-8\n\t\t*goto 2\n\t#\"Do you need any help?\"\n\t\t\"I'm fine thank you, allow me some time to slip into character.\"\n\t\t*set alex %+5\n\t\t*goto 2\n\t#Keep quiet.\n\t\tAlex smiles as you walk to the door and stand by it, giving him a quiet moment to prepare himself.\n\t\t*set alex %+8\n\t\t*goto 2\n*label 2\nAfter dabbing some light stage make up on himself, Alex stands and unhooks what you assume is his costume from a hook and looks at it apprehensively.\n\nAfter a minute or two of silence, he lays it out and starts to pull off his clothes.\n*if (alex1=true)\n\t*label 4\n\tYou can't deny that the idea of Alex getting dressed in front of you is quite appealing. You avert your eyes, but can't help a little peek. But the moment you do, all cheeky thoughts drop out your head, because Alex is utterly skeletal.\n\t*goto 3\n*elseif (alexf=true)\n\t*label 5\n\tYou avert your eyes but when his shirt comes off you can't help but do a slight double take, because you see out of the corner of your eye that he is utterly skeletal.\n\t*goto 3\n*else\n\tHow do you feel about this?\n\t*choice\n\t\t#I really like Alex. The kind of like where the idea of him taking his clothes off is quite appealing.\n\t\t\t*set alex1 true\n\t\t\t*goto 4\n\t\t#I don't care. I'm not attracted to Alex.\n\t\t\t*set alexf true\n\t\t\t*goto 5\n*label 3\nHis shoulder blades jut upwards alarmingly, and you can count his ribs through his papery skin. The skin stretched between his hips is convex and you can see every nodule of his spine.\n\nYou can see this isn't normal, he has the body of a gawky teenager growing into himself.\n*choice\n\t#Ask him if he's okay.\n\t\t\"Alex...\" you start, but he cuts you off with a glare.\n\n\t\t\"Not now,\" he says, and you can see the pleading in his eyes as he tried to keep the character he's adopting from cracking under the weight of his very real world problem. \n\t\t*set alex %-10\n\t\t*goto 6\n\t#Wait till after the show to ask him about it.\n\t\tHis eyes flicker and meet yours. You simply keep your mouth shut and look away as he slips his shirt over his head.\n\t\t*set alex %+10\n\t\t*goto 6\n\t#Keep your mouth shut, it's none of your business.\n\t\tYou turn your back on him while he finishes his change.\n\t\t*set career %+5\n\t\t*goto 6\n\t#Keep your mouth shut, I don't know how to approach him about this.\n\t\tYou can't help but keep letting your eyes flick over him out the corner of your eye. You barely know what to think, let alone say.\n\t\t*goto 6\n*label 6\nIt's a tense wait for Alex's segment, but now he's in character he seems even less nervous than you.\n\nWhen you're called forward, he strides uncaringly out of the dressing room, you following behind, ready to watch from the wings.\n\nConsidering how many people you saw on the way in, it's a lot simpler than you expected. The previous monolouge exits the stage and Alex is ushered straight on without preamble to start his.\n\nYou stand in the right wing as close as you can be without being seen, while Alex goes and stands in the centre of the stage.\n*page_break\n*if (alex1=true)\n\t\"Had we but world enough, and time, this coyness, my love, were no crime\" he starts slowly and shows every syllable of love poured into the poem by savouring each word, and you find yourself getting caught up in his poem.\n\n\tSuddenly, Alex's eyes are holding yours, and it's as if it's only the two of you standing alone, and he's talking only to you, \"A hundred years should go to praise thine eyes, and on thy forehead gaze.\"\n\n\tIt could just be your imagination, but his loving passion seems to glow more fiercely when your eyes lock, \"An age at least to every part, and the last age should show your heart.\"\n\n\tAlex does a small flick with his eyes, as if suddenly remembering he has an audience. He turns away from you and back to them. But his eyes slowly but surely draw back to you, and as he finishes the poem, your eyes are locked again, \"Thus though we can not make our sun stand still, we will make him run.\"\n\n\tThere is such fierceness in Alex's voice that you wonder if it's just acting.\n\t*goto 7\n*else\n\tHe starts his monolouge, an old poem about a woman avoiding the affections of a man when he only wants to adore her. You can't deny the acting is beautiful, but it really does lose something when you're standing on the side lines.\n\t*goto 7\n*label 7\n*page_break\nThere is a moment of silence when Alex finishes his monolouge, then applause erupts from everyone in the theatre. Alex bows to them, and leaves the stage with people calling for an encore.\n*if (alex>50)\n\tThe second Alex is off the stage, he lets a big smile spread over his face as he pulls you into a rough hug, \"They never applaud in the middle of the performance!\" he yells over the noise.\n\n\t\"Well you deserve it,\" you reassure as Alex jitters through a pile of people trying to congratulate him.\n\t*goto 8\n*else\n\tThe second Alex is off stage, people are flooding him with congratulations.\n\t*goto 8\n*label 8\nYou are about to escort him away when, looking back over your shoulder, you see a familiar figure. On the end of the front row, just visible to you from behind the curtain, is Rebecca, crying hard into a hanckerchief and applauding raucously.\n\nJoe is with her, so safety wise you don't need to worry, although it is a suprise that Alex didn't know she was coming.\n\nYou and Alex push your way back to the dressing room as the audience calms down and the show goes on.\n*if (alex1=true)\n\tThe moment the two of you are in the dressing room, Alex turns to you and grips you by the arm, \"Did you like the poem?\"\n\t*choice\n\t\t#Tell him it was beautiful\n\t\t\t\"I'm glad you think so because...\"\n\t\t\t*set alex %+8\n\t\t\t*goto 9\n\t\t#Tell him it was old and you didn't understand it\n\t\t\t\"I hope you will think about it some more, \"because...\"\n\t\t\t*set alex %-5\n\t\t\t*goto 9\n\t\t#Ask if it was directed at you.\n\t\t\t*set alex %+8\n\t\t\t*goto 9\n\t\t#Keep silent\n\t\t\t*set alex %+5\n\t\t\t*goto 9 \n\t*label 9\n\tAlex gulps, \"It's dedicated to you.\" he lets his hand slip down to yours and slips his fingers through yours.\n\n\tThen he lets go of your hand, and you can see his charismatic acting facade is gone, he's back to Alex, \"Well, you know - only if you want it to be.\" he adds, then he starts bustling loudly with make-up.\n\t*goto 10\n*else\n\t*goto 10\n\n*label 10\n\n\"That was fantastic!\" Alex gushes as he reapplies his make-up for the bow at the end. He whirls around the room, gushing about the casting agent and panicking that he might have gone to the loo in his performance.\n\nWhen he's all touched up, he sits down next to you on the bench next to the door.\n\n*if (alex>30)\n\t*goto 14\n*else\n\t*goto 11\n*label 14\n\"One thing ${name}. I know you saw me when I put my costume on. I just want you to know it's alright. If you want you can ask about it, but if you don't want to know then I'll just tell you I'm not in any danger, so you don't have to worry.\"\n*choice\n\t#Ask more.\n\t\t*goto 12\n\t#Leave it at that.\n\t\t\"Okay,\" you say, letting out an internal sigh of relief. You don't want to make it any more your business, and if he says he doesn't have a problem then who are you to disagree? He's a grown man after all.\n\t\t*goto 11\n\n*label 12\n\"You don't look alright, you actually look pretty ill.\" you say bluntly.\n\n\"I appreciate your concern. But I am fine. I know how it looks, but I can't feel hunger...\" he runs his hand through his hair, \"This deserves some explanation. You know my family. Well, growing up, Dad was never around and Mum gave all her attention to Christopher. She instructed our servants to do the same, so they did. I wasn't mistreated, but I was phased out the picture a lot. A lot of the times, because I wasn't on the priority list, people would forget to feed me. I couldn't get food for myself because the staff in the kitchens would chase me out.\"\n\nAlex shrugs his shoulders at you, \"It happened for most of my young life, and after being hungry so often you forget what it feels like. You can't seperate it from the feelings in the rest of your body any more because you're so used to it being there. I try to eat, but it's hard to remember when I've never made it a part of my life. I know I'm painfully thin, but I'm gaining weight slowly, and doing my best to give my body what it needs.\"\n\n*choice\n\t#\"Well, I'm glad that you have a handle on it.\"\n\t\t*set alex %+5\n\t\t*goto 13\n\t#\"That's horrible. I'm so sorry.\"\n\t\t\"set alex %+5\n\t\t*goto 13\n\t#\"Don't be absurd. How can you forget to eat?\"\n\t\t\"You asked,\" Alex raises his eyebrows, \"Believe my answer or not, that's how it works. Try judging after you've experienced years on end of gnawing hunger. You'd try to forget about food too.\"\n\t\t*set alex %-5\n\t\t*goto 13\n\n*label 13\n\"Anyway there's no need to worry about it. So don't.\" Alex smiles at you, \"I'm glad you can understand all my little quirks and things.\"\n*label 11\n\nThe two of you sit beside each other for what feels like an age. You can feel Alex next to you fidgeting, nervous, now he's back to himself, about being called back on stage.\n*page_break\n\nFinally he is called back out, he walks out with all the other monolougers and takes a bow. Some people are still calling for him to do an encore.\n\nYou notice through the crowd that Rebecca has disappeared.\n\nThe two of you go back to the changing room to get the rest of his stuff only to find Mr Cox is already waiting for Alex.\n\nYou stand at the side and listen as the two gush at each other, clearly both as enthusiastic as the other, over an upcoming audition for Alex and a possible recurring spot in the London Theatre.\n*page_break\n\nWhen Alex and you finally leave, the crowds have all cleared and the car is waiting out front, which is good because you're exhausted and can't wait to get home.\n\nThe drive home passes in a blur with Alex gibbering excitedly. When you're home, he bounces off to the library, unable to sleep while you trudge back to your room, hoping against hope no-one will call on you this evening.\n*page_break\n*goto onehundredsix\n\n*label onehundredthree\n\nAfter so much work it feels weird taking the night off to walk out the house without keeping an eye on someone.\n*if (career>50)\n\tLuckily you've been so efficient at your job that Emma was happy to cover an evening off for you.\n\t*goto 15\n*else\n\tUnfortunately you leave with Emma's grumbling ringing in your ears. Your inefficiency at your job has left a lot of work undone.\n\t*goto 15\n\n*label 15\nRob's house isn't far, only a ten minute drive to the nearest town. Although it does take you a while to find it because it's hidden down a maze of back roads, and even when you find it, you think at first the building is abandoned. There is a small garden at the front, if you can call it that. There are thistles and nettles bursting through the rickety fence and you can see rubbish and cans thrown carelessly into the midst. The bricks are stained and the front door's wood warped so badly that when you call Rob to come let you in (because the intercom is hanging off the wall), it takes him nearly ten minutes to lift the door out the frame.\n\n\"${name}! You're here, I thought you might have got stuck at work,\" he hands you a torch to climb the stairs ahead of him as he tries to jam the door back into place.\n\nRob climbs up the stairs after you, directing you all the way to the top floor. He opens up one of the two doors there and is hit by a flying set of dungarees as Anna bursts out of the door and wraps herself around his leg.\n*page_break\nShe's a lot smaller than she seemed in the picture, very small for a six year old. But no less lively as she clings to Robs leg and grins up at him with a mouth only half full of teeth.\n\n\"There's my girl,\" Rob picks her off him and stands her in front of you, brushing her dungarees down, \"This is ${name}.\"\n\nAnna gives you a quick peek from under her fringe, but then looks down at the floor and fidgets. \"Where are your manners?\" Rob presses as she scuffs her shoes against the floor.\n\n\"My name is Anna and I like dinosaurs. It's nice to meet you.\" Rob smiles down at her approvingly, and gestures for you to say hello back.\n\nYou bend down so you're the same height as Anna, \"My name's ${name} and I like...\"\n*fake_choice\n\t#\"Dinosaurs too.\"\n\t#\"Astronauts\n\t#\"Princesses\"\n\t#\"Pirates\"\n\t#\"Animals\"\n\n\"And it's nice to meet you too.\" you finish.\n\nAnna sticks her finger in her mouth sucks on it, and meets your eyes. She hold them for a second till she squeaks and makes a run for another room slamming the door behind her.\n\nRob laughs at the expression on your face, \"She's just shy, she'll come out in a minute. Can I get you a drink?\"\n\nRob leads you off the hall through one of the three doors into a kitchen. To his credit, despite the fact his apartment is small and clearly very old, he's done a good job at patching it up. Photos and (what you presume are Anna's) art pieces plaster the walls and everything is spick and span.\n\nRob gets you a drink and puts some food on. While he's cooking, he lets you rant about everything in your day and by the time it's time to sit down you feel a lot better.\n*page_break\nYou jump when Anna clears her throat behind you, \"Please could you help me up?\" she holds up her arms and you pick her up under the arm pits and sit her on the chair next to you.\n\n\"And Mr Quackers and Lady Gruffallo.\" Anna says, pointing to the door where  you see a soft duck and gruffallo sat waiting for you to seat them at the table. When you do, Anna claps in delight and sits Mr Quackers on your lap. Apparently as some kind of reward.\n\nWhat do you think of Anna?\n*choice\n\t#I love all children, and she is particularly sweet.\n\t\tShe is rather isn't she?\n\t\t*set rob %+5\n\t\t*set anna +1\n\t\t*goto 16\n\t#I really don't like kids. So much so I think I'll reconsider visiting Rob again.\n\t\t*set rob %-5\n\t\t*set anna -1\n\t\t*goto 16\n\t#I don't usually like kids, but she is quite sweet I guess.\n\t\tShe is rather isn't she?\n\t\t*set anna +1\n\t\t*set rob %+5\n\t\t*goto 16\n\t#I don't really care for her, I don't dislike her either though.\n\t\t*goto 16\n\n*label 16\nRob serves up some seriously delicious cooking though. Black bean and cheese enchiladas with sourcream dip.\n\nAfter the food Anna jumps down from the table and takes Mr Quackers and Lady Gruffallo to her room.\n\n\"So how was your day?\" You ask Rob, your ranting time over.\n\nRob blushes as he puts the dishes in the sink, \"Oh you know - normal.\" he says.\n\n\"Yeah?\" you press as Rob's ears start to smoke. He's such a terrible liar.\n*page_break\n\n\"Rebecca actually wanted to speak to me,\"\n\n\"Oh yeah?\" You ask.\n\n\"There were rumours among the staff before she came, but I thought it was all rubbish. But apparently when Mr Haywood, her husband I mean, died, Christopher threw her out the house and fired all the staff that she was close to. There were these rumours that she was going to take Mr Haywood's company off him and he wanted her out the way. I thought it was all rubbish, but then she wanted to talk to me today and she says she needs my help finding something in the house.\"\n\n*if (rebplot=true)\n\t*goto 19\n*else\n\t*goto 20\n\n*label 19\n\"It's okay Rob, she asked me too. I know what's going on.\"\n\nRob blinks at you, clearly suprised, \"But I thought you had to be on Christopher's side? You work for him after all?\"\n\n\"And you don't?\" you ask, raising your eyebrows.\n\n\"Our jobs are very different in levels of importance.\"\n\n\"That doesn't matter, I'm helping Rebecca because...\"\n*choice\n\t#\"He's using Rebecca's money to pay me, so by extension I work for her.\"\n\t\t\"That's not really a reason,\" Rob says skeptically.\n\n\t\t\"It is,\" you insist, \"The person whose money I'm taking is the one I have to listen to, else I'm just a fraud. I think the money is Rebecca's, and I'm not a fraud.\"\n\n\t\t\"Kind of twisted logic but I see your point... Or I can at least appreciate the sentiment...\" Rob trails off uncertainly.\n\t\t*goto 21\n\t#\"What Christopher has done is wrong. I can't just stand at the side.\"\n\t\t\"You're right,\" Rob looks suddenly fierce, \"He's lucky enough to have a family who cares about him and loves him, but he'd rather screw them over for more money. It makes me sick.\" Rob visibily shakes in anger for a moment before he takes a deep breath, unclenching his fists. \"Sorry, it's a sore topic for me.\"\n\n\t\tYou nod in understanding and give Rob a moment to recompose himself.\n\t\t*set rob %+8\n\t\t*goto 21\n\t#\"The money I'm going to get for helping her is pretty sweet.\"\n\t\tRob looks visibly taken aback by your admission, \"I did not think that was like you at all.\"\n\n\t\t\"Well it is,\" you say shrugging, leaving an awkward moment of silence between the two of you.\n\t\t*set rob %-5\n\t\t*goto 21\n\t*selectable_if (revenge=true) # Christopher hurt me, and I won't let him treat me like that.\n\t\t\"Wow, I didn't think you were like that,\" Rob looks suprised.\n\n\t\t\"Why not?\"\n\n\t\t\"Well, you make it your job to look after people, not hurt them.\"\n\n\t\t\"That doesn't mean I shouldn't look after myself,\" you counter.\n\n\t\tRob looks at you for a moment, \"I never really thought about it like that,\" he says, nodding his head in agreement.\n\t\t*goto 21\n\n*label 21\n\n\"Either way,\" Rob says, \"We can help each other now right?\"\n*set robplot true\n\n\"Right,\" you agree, \"It'll be much easier with the three of us working together,\"\n\n\"I wonder why she didn't get us all together to begin with,\" Rob muses.\n\n\"I think for all Rebecca trying to show us she trusts us, I don't think she trusts us enough not to team up on her,\" you wonder out loud.\n*goto 22\n\n*label 20\n*page_break\n\"What are you looking for?\" you prompt.\n\n\"Some kind of legal document. It'll give Rebecca the right to take back her husband's money and business. She says she'll split it with me in return for my help.\"\n\nYou wonder for a moment if maybe you had played your cards right with Rebecca she would have made that offer to you.\n*page_break\n\n*label 22\nJust then there's a loud crash on the door outside, Rob groans and pulls himself up out of his chair, \"This always happens, sorry, let me just go deal with. You know...\"\n\nRob leaves you in the kitchen, you can hear him leave through the front door and talk to someone out on the landing although you can't hear what he's saying.\n\nHe's been gone for a while when Anna pops her head around the door and sidles into the room holding Mr Quackers in front of her like a shield.\n*choice\n\t#Go over to her and pick her up.\n\t\tYou pick her up under the arms and lift her up onto your hip. She looks terrified and clings grimly to her stuffed toy. Half way back to the counter she starts to squirm out of your hands and you have to put her down lest you drop her.\n\n\t\tYou simply go and sit back down on your stool. Evidently rough play was not the answer.\n\n\t\tIt takes Anna a few minutes to recollect herself, but she seems determined to discuss something with you, so once she's dusted herself down she comes up to your seat and pulls on your shirt to get your attention.\n\t\t*set anna -1\n\t\t*goto 23\n\t#Wave at her.\n\t\tShe waves back and saunters closer to you, stopping just by your seat.\n\t\t*set anna +1\n\t\t*goto 23\n\t#Ask her a question about Mr Quackers.\n\t\t\"Does Mr Quackers like swimming?\" you ask, noticing his body looks a bit water stained.\n\n\t\t\"Of course he does, he's a duck.\" Anna says holding the toy down at her side and staring at you incredulously, \"All ducks have webbed feet so they can swim properly,\" she explains to, sidling closer closer to your seat so she can show you Mr Quacker's webbed feet.\n\t\t*set anna +2\n\t\t*goto 23\n\t#Ignore her and hope she goes away.\n\t\tUnfortunately she seems to have some goal in mind, because she sidles closer to you and tugs on your shirt.\n\t\t*goto 23\n*label 23\n\nAnna gestures for you to come sit on the floor with her, then when you do she leans in conspiratorially, \"Rob never brings people home,\" she says, almost slyly.\n\n\"Oh really?\" you ask, wondering where a six year old might be going with this.\n\n\"Really. So who are you?\"\n\n*if (rob1=true)\n\t*label 24\n\tYou stammer a little, being out right asked by his sister before you've discussed it with Rob. You know what you hope you are to Rob. But if you say it to Anna she'll definitely talk to him about it and if Rob doesn't feel the same way and you've told his little sister you're an item that would look incredibly weird. On the flip side if you tell her you're just friends and she relays that to Rob, you don't want him thinking you are actually just friends.\n\n\tYou swear the look on Anna's face is verging on smug, \"It's okay, I won't talk to him about it,\" she says.\n\n\t\"About what?\" you blurt, \"I haven't said anything.\"\n\n\t\"Yeah, but your face is bright red. I'm six, not stupid.\" You realize that all Anna's cute act was just a front, and you fell for it.\n\t*goto 26\n*elseif (robf=true)\n\t*label 25\n\t\"We're good friends,\" you shrug, \"I don't know what else to tell you.\"\n\n\t\"But Rob doesn't make friends.\" she insists.\n\n\t\"Well clearly he does,\" you quip back, realizing the two of you are having a very juvenile back and forth.\n\n\tAnna raises her eyebrows at you and mutters, \"Must be a pretty special friend,\" apparently determined to have the last word, before she drops it.\n\t*goto 26\n*else\n*choice\n\t#Just his friend.\n\t\t*goto 25\n\t#Hopefully something more.\n\t\t*goto 24\n*label 26\n*page_break\n\"Right, now that business is out of the way,\" Anna says, slapping her hands together like she's dusting them off, \"You can play with me while we wait for Rob. He usually takes ages when Mrs Lindhall gets drunk.\"\n\nYou do a little double take, not expecting something like that to come so casually from a six year old, although it does make sense considering all the crashing on the landing.\n*page_break\n*if (bookbuy=true)\n\t*set anna +2\n\t*goto 17\n*else\n\t*goto 18\n*label 17\n\"Ah, before we go play,\" you say, catching her arm as she scrabbled to her feet, \"I have something for you,\" you go to your bag, pull out the encyclopedia and hand them to her.\n\nHer hands buckled under their weight and you have to keep your hand under the books to help support them. Anna looks at the cover, her little mouth hanging open in a big 'O' as her eyes roam the globe on the cover.\n*page_break\n\"Did you say this was for me?\" she asks, her voice a little whisper.\n\n\"Yeah, all yours.\" \n\nAnna simply stands and blinks at it for a minute, when she speaks her voice is so small you can barely hear her, \"I've never had a book like this all to myself before. Are you sure I can have it?\"\n\n\"Oh course,\" at your affirmation Anna reverently places the book down on the floor and flings her arms around your neck. She thanks you over and over again, swinging from your neck like a hanging monkey.\n*page_break\n*label 18\n\n\"Come on,\" Anna says collecting her things, \"I'll show you our room,\"\n\nShe shows you back through to the hall. You can still hear Rob out in the hall, trying to help his neighbour into her house. Anna leads you through one of the remaining two doors into the bed room.\n\nIt's completely plastered with paintings, even the roof is covered. The room's quite small, with only enough room for a chest of drawers, a child's desk and a bunk bed, the top of which has been fashioned to look like the spire of a castle using cardboard.\n\nCreativity bursts out of every seam of the room. Colourful sheets hang down around Rob's bottom bunk, the wardrobe is painted different swirling colours and toys sit on every surface from the window sill to the top of the wardrobe looking down at you. However, you can see it's all been done to try and brighten up a room which has clearly seen better days. The hanging sheets hide cracks in the bed posts, the mural on the wardrobe can't hide the fact the wood is damp and the toys are all home made from old house equipment. There's a set of dolls made from cracked kitchen utensils and a collection of cats stitched out of what looks like old curtain.\n\n*if (bookbuy=true)\n\tAnna spreads out her encyclopedia on her desk and the two of you sit and read together until Rob comes back.\n\t*goto 27\n*else\n\tAnna hands you a toy so ugly you arn't really sure what it is, and informs you you're trying to seige the castle. She then climbs up into her bunk and insists you throw pillows at her fort. The two of your play like this for a while untill Rob comes back.\n\t*goto 27\n*label 27\n*page_break\n\n\"Sorry about that,\" Rob says, coming back slightly red faced half an hour later, \"But anyway, it's bed time for you missy.\" he says, pointing dramatically at Anna, who puts up suprisingly little fuss as she's changed and tucked in.\n*if (rob1=true)\n\t\"Hey,\" Anna says as the two of you try to leave, you turn back around and she grins at the two of you her head sticking out of her fort, \"Enjoy the rest of your date,\" she says before retracting her head giggling.\n\n\tBoth you and Rob leave quietly and stand outside the room, he mummbles awkwardly, his face beetroot.\n\n\t*choice\n\t\t#\"Kids, they say the silliest things.\"\n\t\t\t\"Silly?\" Rob asks, scratching the back of his head, \"So this isn't a date?\"\n\n\t\t\t\"Uh,\" you try to speak but feel your voice catch in your throat, he sounds so disappointed, \"I don't know, is it?\" you ask.\n\t\t\t*goto 28\n\t\t#\"So, I guess that idea doesn't appeal to you?\"\n\t\t\t\"No! I mean yes.\" Rob stummbles over himself, \"It does appeal to me, very much.\"\n\t\t\t*goto 28\n\t\t#Remain silent.\n\t\t\t*goto 28\n\t\t#\"So, shall we go enjoy the rest of our date?\"\n\t\t\t\"Oh - Yeah, but first. I want to - you know.\" he stammers.\n\t\t\t*goto 28\n\t*label 28\n\tRob blinks at you, his big brown eyes looking even bigger as he bites his lip. He puts his hand on your shoulder as if scared you're going to slap him off. Then he leans in, closer and closer. He closes his eyes, and then you feel his lips bump against yours, dry but soft. The kiss only lasts for a second and when Rob pulls away he's redder than you've ever seen him.\n\n\t\"Right,\" Rob says, patting your shoulder awkwardly, \"Do you want another drink? Or something?\" he asks leading you back into the kitchen.\n\t*goto 29\n*else\n\tRob tucks Anna into bed and leads you back to the kitchen, \"Thanks for playing with her, she's usually quite shy,\"\n\n\t\"No problem,\" you say, \"I have to be heading off soon myself though. My bedtime and all.\"\n\n\t\"Oh, alright. One more drink first though.\" Rob says leading you back into the kitchen.\n\t*goto 29\n*label 29\n\"Here,\" Rob says, handing another drink to you as the two of you sit opposite each other at the table, \"You know, I feel bad gossiping but there's so much going on at work at the minute. It's hard not to be curious about it.\"\n\n*choice\n\t*selectable_if (rebplot=true) # Well yeah, we are trying to help Rebecca overthrow him after all.\n\t\t\"No, it's more than that,\" Rob presses, staring into his cup,\n\t\t*set rob %+5\n\t\t*goto 30\n\t#\"What makes you say that?\"\n\t\t*set rob %+5\n\t\t*goto 30\n\t#\"Lot of gossip this evening.\"\n\t\t\"Maybe,\" Rob blushes, \"But you can't deny you're interested, so many comings and goings.\"\n\t\t*set rob %-5\n\t\t*goto 30\n\t#Remain silent.\n\t\t\"Are you pretending not to be interested?\" Rob jokes at your pensive face,\n\t\t*goto 30\n*label 30\n\"I mean where does Alex fit into all this? Does he not want millions of pounds worth of inheritance? I tried asking Rebecca and she won't talk about him, it's like he isn't even her son. And...\" Rob swallows nervously, \"You can't tell anyone this because she said that if he heard me tell anyone she would make sure I was fired, but I heard Opal on the phone to someone, reassuring them that everything was going according to plan, that she would be married to 'him' within the year. Is 'him' Christopher? And why does she want it so badly? It all seems so off.\"\n*choice\n\t#\"You just make sure not to stick your head in too far, you can't afford to get the sack Rob.\"\n\t\t\"I appreciate you looking out for me,\" Rob says smiling, \"You're right we do have to be careful of our jobs. I reckon there's about to be a whole big shift in that place, we need to be careful we're on the right side.\"\n\n\t\t\"I'll toast to that.\" you agree, clinking your glasses together.\n\t\t*set rob %+5\n\t\t*goto 31\n\t#\"I wonder about Alex myself.\"\n\t\t\"He's a bit of a wild card in the whole thing.\" Rob agrees, \"I can't believe he cares as little as he seems to. I wonder if he's planning something too.\"\n\n\t\t\"Maybe,\" you reply, wondering if Rob might be right about there being more to Alex than there seems.\n\t\t*goto 31\n\t*selectable_if (rebplot=true) # \"I asked Rebecca about that myself. She was just as tight lipped.\"\n\t\t\"All she said was that she would be setting him up with his own place with some of the money,\" you finish.\n\n\t\t\"Well that's a lot more than what I got out of her, she must like you,\" Rob jokes, \"I do wonder what happened to pull them apart so far though.\"\n\n\t\t\"I guess we'll have to wait and see if she tells us.\" you say, shrugging and taking a long drink.\n\t\t*set reb %+5\n\t\t*goto 31\n\t*selectable_if (opalplot=false) #\"Opal? Really? That is odd, it must be Christopher but why would she be so intent on marrying him so fast?\"\n\t\t\"Yeah I know. I can't figure her out.\"\n\n\t\t\"Well, her dad does a lot of business with Christopher. Maybe he's trying to get them together so business will be better.\" you say, shuddering at the though of such a cold marriage.\n\n\t\t\"Ah,\" Rob says, \"Maybe you're right. Here's to never having a marriage like that,\" he says, toasting with you.\n\t\t*set opal %+5\n\t\t*goto 31\n\n*label 31\nAll too soon it's time to go home. Rob walks you down to your car and waves you off.\n\nHow do you think tonight went?\n*comment AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA BELOW NEEDS FIXING! SELECTABLE IF!!!\n*choice\n\t*selectable_if (rob1=true) #Every moment I spend with Rob I like him more. That kiss was perfect to me.\n\t\t*set rob %+5\n\t\t*goto 32\n\t*selectable_if (rob1=true) #Every moment I spend with Rob I like him less. I don't really want to pursue him anymore.\n\t\t*set rob %-20\n\t\t*set dumpr true\n\t\t*goto 32\n\t#Rob's a good friend, it was nice to get the opportunity to know him better.\n\t\t*set rob %+5\n\t\t*goto 32\n\t#I don't like spending time with Rob, and I don't think I will again.\n\t\t*set rob %-5\n\t\t*goto 32\n\t#I found out some interesting things this evening, that I think I should definitely keep in mind as I go forward. He seems to hear a lot as a servant.\n\t\t*set career %+5\n\t\t*set reb %+3\n\t\t*set opal %+3\n\t\t*goto 32\n\n*label 32\nYou make it back to the house and slip to your room unseen, craving your bed.\n*goto onehundredsix\n\n*label onehundredfour\nYou jump out of bed, all the excitement suddenly washing over you.\n\nYou are going on a date with Christopher. Yay!\n\nJust then there's a knock on your door. You open it to see Rob, standing there with a clothes bag and appraising you skeptically.\n\n\"Christopher wanted me to bring this up.\" he says, handing it over the threshold to you.\n\nYou take the bag and look back up to thank Rob, but he's already half way down the corridor.\n\nThere is a note on the hanger that says 'For you. For tonight. Christopher.'\n*page_break\n*if (gender=true)\n\t*goto 33\n*elseif (gender=false)\n\t*goto 34\n\n*label 33\n*if (date1=true)\n\t*label 35\n\tInside the bag is one of the most beautiful dresses you've ever seen. A ruby red that looks beautiful next to your skin with golden detail round the neck, it's floor length and cinched in at the waist.\n\n\tYou find some shoes in the bottom of the bag, gold to match the detail.\n\n\tYou put it on immediately. It falls like a river of silk over your body and you find it fits you to the stitch, hugging your figure and showing off everything you have to boast about. The shoes fit perfectly and are low enough to be comfortable. You look down and smile at the gold detail glinting around your toes.\n\t*goto 37\n*elseif (date2=true)\n\tInside the bag is one of the most beautiful dresses you've ever seen. A forest green that looks perfect next to your skin. It's covered in silver stitching detail designed to look like a silhouetted winter forest. Puff sleeves give it a girly touch and the hem stops at your knees. You find thick black tights and a big black poncho in the bag too. It looks like you're going somewhere cold.\n\n\tA pair of silver flats have been included in the bottom of the bag. You put everything on and it fits perfectly. You can't help but think you look perfect for going to a winter wedding.\n\t*goto 37\n*elseif (date3 =true)\n\tYou open the bag and the content spills out onto the floor. There are ropes, a harness, a rucksack, some clothes and some very weird looking shoes. You put on the clothes, a comfy set of combats with a plain shirt, and pack all the ropes and the harness into the bag feeling mildly confused.\n\t*goto 37\n*elseif (date4=true)\n\tYou open the bag, curious to find out what's inside. There is simply another note saying 'Bring this with you. We're going to need it.'. Confused, you dress yourself and fold the clothes bag into your own.\n\t*goto 37\n*else\n\t*set date1 true\n\t*goto 35\n\n*label 34\n*if (date1=true)\n\t*label 36\n\tInside the bag is one of the finest suits you've ever seen. A simple black, but clearly very well tailored. You put it on to find the cut fits you to the stitch.\n\t*goto 37\n*elseif (date2=true)\n\tInside the bag are some simple but fine clothes. Black pressed trousers with a deep red button up, and an extremly warm black jacket. You must be going somewhere cold.\n\t*goto 37\n*elseif (date3 =true)\n\tYou open the bag and the content spills out onto the floor. There are ropes, a harness, a rucksack, some clothes and some very weird looking shoes. You put on the clothes, a comfy set of combats with a plain shirt, and pack all the ropes and the harness into the bag feeling mildly confused.\n\t*goto 37\n*elseif (date4=true)\n\tYou open the bag, curious to find out what's inside. There is simply another note saying 'Bring this with you. We're going to need it.'. Confused, you dress yourself and fold the clothes bag into your own.\n\t*goto 37\n*else\n\t*set date1 true\n\t*goto 36\n\n*label 37\n*page_break\nThere's a knock on your door, \"${name}, are you ready to go?\"\n\n\"Yeah,\" you yell back, trying not to sound breathless and excited.\n\n*if (date1=true)\n\t*label 39\n\tYou open the door to see Christopher looking, if possible, even more handsome than usual. He towers over you in a grey, finely cut suit.\n\t*goto 38\n*elseif (date3=true)\n\tYou open the door to see Christopher like you've never seen him before. He's dressed like you in comfy combats and an ordinary t-shirt. You note for a second how strong his arms look bare, you've never had a good look at them before but now he's not wearing so many layers you can't help but take an eyeful.\n\n\t\"I've never seen you like this before.\" you comment, trying to explain your few seconds of silence.\n\n\t\"Neither have I,\" Christopher admits jokingly, hitching up the combats, \"But after we talked about dates I thought I might try something new.\"\n\t*goto 38\n*else\n\t*goto 39\n*label 38\n\"Shall we?\" Christopher holds out his arm to you and you take it, letting him guide you down the corridor to the car, attracting the stares of everyone you pass.\n\nEven the driver looks a little suprised as the two of you get in, \"What about other security, Sir?\" he asks, looking pointedly at you, clearly not dressed for work.\n\n\"I have security enough for the evening.\" Christopher says sharply, clearly annoyed at the delay, \"I think the two of us can handle one evening without nosy interruptions.\"\n\nThe driver stares at you resentfully as if you were the one to tell him off and then hunkers down behind the steering wheel to drive.\n*page_break\n\"So where are we going?\" you ask as Christopher reaches across the seat to take your hand.\n\n\"Ah, it's a suprise.\" he says winking at you.\n\nHe refuses to say anything else about it no matter how much you playfully pester him.\n*page_break\n\n*if (date1=true)\n\tIt doesn't take the two of you long to arrive. You pull up outside a very boutique building, small pillars flanking the door.\n\n\tAfter giving the driver a stern look Christopher gets out and opens your door himself, apparently determined to be the perfect gentleman.\n\t*label 43\n\tHe offers you his arm and sweeps you into the building. It's clearly a resturaunt with tables everywhere, but it's completely empty.\n\n\t\"Where would you like to sit?\" Christopher asks, stroking your arm with his hand and gesturing around, a glint of excitment in his eyes, \"The restauraunt is ours for the whole evening.\"\n\n\t\"You've reserved the whole resturaunt?\"\n\n\t\"I thought you would appreciate some privacy at last.\" Mr Haywood smiles at you and guides you to a booth seat. He calls the waiter over and lets you choose both the food and the wine, which comes incredibly quickly.\n\t*goto 40\n\t\n*elseif (date2=true)\n\tIt doesn't take the two of you long to arrive. Although at first you don't realize it because you just pull up on the side of the road.\n\n\t\"Are we there?\" you ask as the car comes to a stop. Christopher just laughs and gets out the car to open your door for you.\n\n\t\"Just come with me,\" he says, taking a bag out the boot of the car and linking arms with you. He leads you off down a forest path on the side of the road.\n\n\tHe has to get out a torch in the growing dark and, despite the unwieldiness of holding a torch and a bag, he grips your hand the entire walk, making sure you don't make a wrong step.\n\t*page_break\n\tAfter nearly half an hour of silent walking, the two of you break out into an empty field. It's so dark now you can see the stars clearly over head, and a nearly full moon lights the meadow for you, so you can see you're completely alone. A river runs down the far side, the sounds of the running water making you feel completely peaceful.\n\n\tChristopher leads you down the the water and sets the bag on the bank.\n\n\t\"This is where we're going to have our date,\" he says, smiling in excitement. He unpacks the bags, pulling out a picnic blanket and the fanciest picnic you've ever seen. Tupperware full of every kind of food you could want, \"I didn't know what you might like.\" Christopher explains awkwardly as he lays it all out and pulls out a bottle of wine.\n\n\tHe spreads out the blanket for you and gestures for you to sit. Pouring you both a glass of wine he holds it up to cheers you \"To a beautiful evening,\"\n\t*goto 40\n*elseif (date3 =true)\n\tIt doesn't take the two of you long to arrive. You pull up outside a giant sports hall.\n\n\t\"Do you know what we're doing yet?\" Christopher teases as he lets you out the car and you walk in together.\n\n\t\"I think I might,\" you say as you see the hall is lined with nothing but indoor rock-walls.\n\n\t\"It's ours for the evening,\" Chris grins at you, clearly hoping you're impressed, \"Have you ever done stuff like this before?\"\n\t*choice\n\t\t#Yes, all the time.\n\t\t\t*label 42\n\t\t\t\"Great, you can teach me then.\" You spend the next half hour showing Christopher the basics, but he picks it up fast enough and you're soon spotting each other.\n\n\t\t\tYou can't deny spotting Christopher is a bit of a treat for you. He's clearly never been rock climbing before but he obviously does sone kind of fittness. He's lean and his arms bulge as he pulls himself up the walls. You almost forget to spot him more than once.\n\t\t\t*goto 41\n\t\t#Enough that I can get myself up and down the wall.\n\t\t\t*goto 42\n\t\t#Never\n\t\t\t\"That's okay,\" Christopher smiles and waves a man over out a side office, \"We'll just take a quick lesson.\"\n\n\t\t\tThe instructor shows you the knots and the ropes and the basics. It takes you and Christopher about an hour before he's happy leaving the two of you alone.\n\n\t\t\tIt's fun learning something new with him. He laughs and doesn't take it too seriously. He looks a lot younger and alot more carefree than you're used to seeing him.\n\t\t\t*goto 41\n\t*label 41\n\tThe two of you spend hours in the hall, trying every wall available. By the end, the two of you are sweating, but happy.\n\n\t\"Had enough?\" Christopher asks, you just nod as you bend over to get your breath back, \"Come on then.\" Christopher grabs your hand and takes you to a back room. It's clearly supposed to be a storage area, but Christopher seems to have taken over. There's a picnic in the middle of the floor and a bottle of wine already uncorked for you.\n\n\tChristopher leads you over and sits you down, pouring you a glass he clinks his with yours \"To a wonderful evening,\" and the two of you dig in.\n\t*goto 40\n*elseif (date4=true)\n\tIt doesn't take the two of you long to arrive. The car drops you off next to several boutique clothes shops.\n\n\t\"Isn't it quite late to be shopping?\" you ask, well aware it's well past seven.\n\n\t\"They couldn't resist staying open when I told them I had a special someone to spoil.\" Christopher says slyly, winking at you.\n\t*page_break\n\tOver the next few hours you find yourself caught up in a whirlwind. Christopher insists you vist all the shops. You try on everything you even half like the look of. Christopher is attentive to each piece of clothing, complimenting you liberally with a critical eye.\n\n\tHe inists on buying you every piece you like, despite the label of the shops you're in, and won't hear a word of protest from you, brushing it off as nothing to him.\n\n\tWhen your feet are sore from so much standing and changing, Christopher smiles down at you. Like he's reading your mind he asks, \"Food?\" and whisks you off, leaving a suprised assistant.\n\n\tHe walks you straight down the street to the front of a beautiful building, pillars lining the front and flower boxes standing everywhere.\n\t*page_break\n\t*goto 43\n\n*label 40\n*page_break\nChristopher can't seem to stop asking questions the whole time. You can barely eat your food, he wants to know so much about you.\n\nEven questions that seem completely weird or useless to you. Like what you wanted to be when you were a kid, your favorite colour. You tell him all of it and the more he finds out about you the happier he seems.\n\nFinished, you lean back in your seat, completely full of good food.\n*if (opalconvu=true)\n\t\"I have one more thing to ask you though...\" Christopher leans over, taking your hand in his, \"I heard you and Ms Sandhurst had a meeting of sorts today.\"\n\n\t\"Of sorts.\"\n\n\t\"Tell me about it?\"\n\t*choice\n\t\t#\"She asked about us. I kept us discreet.\"\n\t\t\t\"Are you ashamed of our relationship?\"\n\n\t\t\t\"Not at all,\" you reply squeezing his hand, \"It's simply none of her business that we are together, so I saw no reason to discuss it with her.\"\n\n\t\t\tChristopher gives you one of his dazzling smiles, \"I'm glad you think that way.\"\n\t\t\t*set chris %+5\n\t\t\t*goto 46\n\t\t#\"She asked about us. I told her to back off.\"\n\t\t\t\"Did you now?\" Christopher asks, raising his eyebrows in amusement.\n\n\t\t\t\"Yes. She has her eyes on you, and I'll have none of it.\"\n\n\t\t\t\"Are you jealous?\" Christopher's voice is light and teasing and he chuckles as you sputter.\n\t\t\t*set chris %+5\n\t\t\t*goto 46\n\t*label 46\n\n\t\"It doesn't matter. I was simply curious about what she wanted. I think it is not only my mother trying to grab my fortune but Opal as well. Or her father is at least, I understand he keeps her under quite a tight thumb. I am currently have him in an awkward position as I have a deal with his competitor to take my business to them if he raises his prices on me, but with my company being responsible for about three quarters of his annual turn-over he is unable to loose me as a client. As far as I understand, the earning cap has frustrated him. He seems to be imagining that marriage will make me more kindly disposed towards him.\"\n\t*goto 45\n*else\n\t*goto 45\n*label 45\n*page_break\nChristopher sighs and leans back in his chair a little, \"Look I need you to tell me something.\"\n\n\"What?\" you ask, because Chrristopher looks uncharacteristically nervous.\n\n\"Why are you here? You're putting so much at risk, and you seem so uninterested in all the things that everyone else seems to value me for. My money usually. That you're here is amazing. I don't understand why though.\"\n\nBefore you tell him, what do you actually think?\n*choice\n\t#I'm here for the money.\n\t\tWell you're playing your cards rather well so far.\n\t\t*goto 48\n\t#I'm here because I like him for him.\n\t\tFalling hard and fast. Very fairytale.\n\t\t*goto 48\n*label 48\nSo what do you say to him?\n*choice\n\t#\"Because to me you're a real man.\"\n\t\t*set chris %+8\n\t\t*goto 47\n\t#\"Because I like how you make me feel.\"\n\t\t*set chris %+5\n\t\t*goto 47\n\t#\"Becuase I have a good feeling about this and I want to see where it goes.\"\n\t\t*set chris %+5\n\t\t*goto 47\n\t#\"Because you're a wonderful and caring person.\"\n\t\t*set chris %+8\n\t\t*goto 47\n\t#\"I don't know.\"\n\t\tChristopher blinks at your response, \"You don't know why you like me?\"\n\n\t\t\"We're just starting out,\" you reason, \"But I know I want to find out more.\"\n\n\t\tChristopher's smile is back on his face, \"Well, let me give you a reason to keep going down this path.\"\n\t\t*goto 47\n\n*label 47\nChristopher sits forward and scoots himself right next to you, \"I've wanted to do this since the second I met you. I won't wait a second longer to do it.\"\n\nSuddenly he's like a Christopher you've never seen before, all your touches up until now have been teasing and romantic. Now his face fills with greed. He grabs the back of your neck and suddenly you're kissing. It's hot and needy, you can taste his hot breath and his hands are on your back gripping you close to him.\n\nYou feel Christopher moan  \"God you're lips are perfect,\" into your mouth and he pulls you closer, gripping you hard like he's scared you might slip away from him.\n\nWhen the two of you finally pull apart, you're breathing heavily and Christopher has the biggest smile across his face, his chest heaving in time with yours.\n*page_break\nYou stay like that till late into the night, sat there in each others arms, alternating between heated kissing and silly talk about everything.\n\nEventually it's time for you to go home. The drive is a blur and Christopher walks you up to your room.\n\nOutside your door he pulls you back into his arms and kisses you deeply.\n*choice\n\t#Invite him inside\n\t\t\"Would you like to come in?\" you ask, breaking your lips apart for a moment.\n\n\t\t\"Yes.\" Christopher says, his eyes holding yours, \"But I will not. I know how much pressure that aspect can put on something. I think we have enough pressure without making things more difficult. When this is over.\" he reassures, bumping your nose with his.\n\t\t*goto 49\n\t#Leave it at that\n\t\t*goto 49\n*label 49\n\n\"Goodnight,\" Christopher smiles down at you, tucking your hair behind your ear. He gives you one last chaste kiss and then leaves you to stumble into your room.\n*goto onehundredsix\n\n\n*label onehundredfive\nYou give yourself a minute to breathe deeply in and out before you pull yourself back up again and go straight to the office.\n\nThe looks of relief on your staff's faces are pretty evident. They're being worked to the bone in the run up to this party and the fact that you're putting so much work in yourself is inspiring them to do the same.\n\nYou walk straight to Emma readying yourself to sit down for the next few hours now.\n\nThe two of your spend the evening planning. Keeping half an eye on the security cameras as the hours ware on, you notice some strange interactions.\n*page_break\nFirst of all, you see Rob visit Rebecca's room before he leaves for the evening. They just sit and talk for a long time. Unusual, you havn't seen her so friendly with the other staff.\n\nSecondly you see Opal visit Christopher, not for any length of time, but you do notice she is the one to leave, instead of Christopher dismissing her. Perhaps he is mellowing.\n\nFinally, when you're struggling to keep your eyes open and most of the house seems to be in bed, you stand and excuse yourself. Your evening has been productive and your plans are all made. It's time for you to rest.\n\n*label onehundredsix\nYou open your door to your quarters and fall into bed scrambling under the covers as you get undressed.\n*if (opalplot=true)\n\tJust when you think you're about to get to sleep your phone buzzes.\n\n\tYou pick up the call, only to have Opal launch straight into a million and one questions about Christopher.\n\n\tLuckily it only takes her an hour to be satisfied and she rings off, leaving you to finally sleep.\n\t*goto onehundredseven\n*elseif (rebplot=true)\n\tJust when you think you're about to fall into a restful sleep, your phone buzzes.\n\n\tIt's Rebecca. Apparently now the house is asleep, it's a great time to go searching.\n\n\tYou pull yourself back up and out of bed and go meet her in the entrance hall. She's suprisingly chipper for the hour and the two of you get straight down to searching the house.\n\n\tThe sun is starting to rise when Rebecca finally admits you're going to find nothing this evening.\n\n\tYou escape her to go back to your room to fall straight into bed, pretty sure you're only going to be getting a few minutes sleep.\n\t*goto onehundredseven\n\n*else\n\t*set career %+8\n\tYou think you'll fall to sleep straight away, but you find your mind full of everything and it takes you a suprisingly long time to fall into a restful sleep.\n\t*goto onehundredseven\n*label onehundredseven\n*finish", "protect4": "*temp secchris 0\n*temp secalex 0\n*temp secreb 0\n*temp secopal 0\n*temp cameras 1\n*temp staff 11\n*temp secroom false\n*temp wound 0\n*temp ronanwound 0\nYou wake up bleary the next morning.\n\nNo, not the next morning, you didn't even have time to eat yesterday you were so run off your feet with organising, while being interrupted by everyone needing you to do something.\n\nSo today is the day of the big ball your staff have been dreading like the apocalypse.\n\nHow do you feel about it?\n*choice\n\t#It's a great opportunity for me to challenge the skills I have. I want to be the best at my job, and that will never happen otherwise.\n\t\t*set career %+10\n\t\t*goto one\n\t#I hate parties. I hate them even more when they double my workload.\n\t\t*set career %-10\n\t\t*goto one\n\t#I wish I could actually attend rather than having to work.\n\t\t*set chris %+5\n\t\t*set reb %+5\n\t\t*set opal %+5\n\t\t*goto one\n\t#I'm ambivalent.\n\t\t*goto one\n*label one\nEither way, you need to get up now. It's your responsibility to go ahead to the venue and set up the security. Your team and charges will follow you later.\n\nOn your way to the venue, you go over the plans again in your head.\n\nThe venue is a riverside resturaunt that has been entierly rented out for the party. There is the main hall, the first room people will enter into, an expansive room for the guests to mingle and chat in. Off to the left of that are two bathrooms and to the right is the ball room where all the dancing will take place. The band are going to be on a raised platform in the middle of the room. A small room on the opposite side of the room has been set aside for you to put all your monitors. The rest of that wall is take up by giant glass doors that let out onto a patio raised over the river.\n\nA spiral staircase runs from the main hall, intersects through the ball room and leads up to a balcony that looks out over the grounds. They are designed to be maze-like, with hedges crisscrossing everywhere, hiding romantic little alcoves.\n\nYou have four charges to watch. You can have a rear and close guard for each. Although there would be no point having two guards (or even any) for someone who you don't really think is at risk...\n*page_break\nEmma will be in the monitor room of course but other than that you have eleven members of staff to split between your four charges, monitor room, patrols and staionary guard. Of course your own skill as a guard will help you here, but you're only one person so if you don't plan well you can't say what will happen.\n\nSo lets go through your plan:\n\nHow many of your staff are going to be following Christopher?\n*choice\n\t#Two\n\t\tGood idea, he is the man to sign your paychecks after all. Good to keep him safe.\n\t\t*set secchris 2\n\t\t*set staff -2\n\t\t*goto two\n\t#One\n\t\tYou have a feeling Chris isn't in as much danger, so he doesn't need as many staff. I hope you're right. Else I don't know whose going to employ you from now on...\n\t\t*set secchris 1\n\t\t*set staff -1\n\t\t*goto two\n\t#Zero\n\t\tYou don't think Christopher needs much protection. If you're sure...\n\t\t*set career %-50\n\t\t*goto two\n*label two\nHow about Alex?\n*choice\n\t#Two\n\t\tGood idea, there has been an attempt on him already after all, it's pretty likely he's being targeted.\n\t\t*set secalex 2\n\t\t*set staff -2\n\t\t*goto three\n\t#One\n\t\tYou have a feeling Alex isn't in as much danger. He doesn't seem to have much claim to any money after all. So why would a kindapper want him?\n\t\t*set secalex 1\n\t\t*set staff -1\n\t\t*goto three\n\t#Zero\n\t\tYou don't think Alex is at much risk. So why waste the man power?\n\t\t*set career %-25\n\t\t*goto three\n*label three\nAnd Rebecca?\n*choice\n\t#Two\n\t\t*set secreb 2\n\t\t*set staff -2\n\t\t*goto four\n\t#One\n\t\t*set secreb 1\n\t\t*set staff -1\n\t\t*goto four\n\t#Zero\n\t\t*set career %-25\n\t\t*goto four\n*label four\nLast but not least, Opal?\n*choice\n\t#Two\n\t\t*set secopal 2\n\t\t*set staff -2\n\t\t*goto five\n\t#One\n\t\t*set secopal 1\n\t\t*set staff -1\n\t\t*goto five\n\t#Zero\n\t\t*goto five\n*label five\n*label replay\nOkay you have ${staff} staff members left. Where are they going to stand guard?\n\n*choice\n\t*selectable_if (staff>0) # The Grand Hall\n\t\tHow many staff?\n\t\t*choice\n\t\t\t*selectable_if (staff>1) #Two\n\t\t\t\t*set secreb +2\n\t\t\t\t*set staff -2\n\t\t\t\t*goto replay\n\t\t\t#One\n\t\t\t\t*set secreb +1\n\t\t\t\t*set staff -1\n\t\t\t\t*goto replay\n\t*selectable_if (staff>0) # The Ball Room\n\t\tHow many staff?\n\t\t*choice\n\t\t\t*selectable_if (staff>1) #Two\n\t\t\t\t*set secopal +2\n\t\t\t\t*set staff -2\n\t\t\t\t*goto replay\n\t\t\t#One\n\t\t\t\t*set secopal +1\n\t\t\t\t*set staff -1\n\t\t\t\t*goto replay\n\n\t*selectable_if (staff>0) # The Balcony\n\t\tHow many staff?\n\t\t*choice\n\t\t\t*selectable_if (staff>1) #Two\n\t\t\t\t*set secchris +2\n\t\t\t\t*set staff -2\n\t\t\t\t*goto replay\n\t\t\t#One\n\t\t\t\t*set secchris +1\n\t\t\t\t*set staff -1\n\t\t\t\t*goto replay\n\t*selectable_if (staff>0) # The Gardens\n\t\tHow many staff?\n\t\t*choice\n\t\t\t*selectable_if (staff>1) #Two\n\t\t\t\t*set secalex +2\n\t\t\t\t*set staff -2\n\t\t\t\t*goto replay\n\t\t\t#One\n\t\t\t\t*set secalex +1\n\t\t\t\t*set staff -1\n\t\t\t\t*goto replay\n\n\t*selectable_if (staff>0) # Monitoring cameras\n\t\tHow many staff?\n\t\t*choice\n\t\t\t*selectable_if (staff>1) #Two\n\t\t\t\t*set cameras +2\n\t\t\t\t*set staff -2\n\t\t\t\t*goto replay\n\t\t\t#One\n\t\t\t\t*set cameras +1\n\t\t\t\t*set staff -1\n\t\t\t\t*goto replay\n\t#I have no more assignments.\n\t\t*goto six\n*label six\nYou can't see any flaws in your plan. You can only hope there aren't any.\n\nYou arrive at the venue.\n\nIt's huge, not just that, but stepping inside is like stepping into a chandelier. The whole room is shimmering crystal and glass, lit up so light bounces everywhere. The bar is made of ice and you can see the bottles of champagne and liquor through the frost. The ball room is much of the same, and the garden is being done up to fit, there are people everywhere setting up lights and fountains.\n\nYou're about to get to work when you spot a familiar face pop up from behind the bar.\n*page_break\n*if (rob1=true)or(rob>40)\n\tRob sees you and shoots up his hand to wave at you, accidentally knocking two glasses off the bar in the process.\n\n\t\"Hey,\" he shouts over, already cleaning up his mess, \"I didn't think you'd be here this early.\"\n\n\t\"I have to set up,\" you say, grabbing a bin bag and handing it to Rob.\n\n\t\"Hey, me too!\" Rob exclaims, like it's the biggest coincidence in the world.\n\n\t\"What are you setting up?\"\n\n\t\"Ah, one of the bar staff dropped out, so since I have bar experience I'll be working here for tonight. I'll get to watch you work. I'm super interested to be honest.\"\n\t*page_break\n\t\"What about Anna?\"\n\n\t\"The guys at work know I can't work such short notice unless they cover my child care expenses. They're happy to pay me enough and then some to cover everything. I think they were just relieved I can mix cocktails.\"\n\n\t\"You can mix cocktails?\" You ask with raised eyebrows, thinking of Rob's coordination.\n\n\t\"Yeah, I know what you're thinking.\" Rob laughs at himself, \"Don't get me wrong. I'm not a proper tender, I can't throw the bottles in the air or spin them round my wrists and stuff, I don't think I'd dare. But I used to work behind a bar so I know how to put the stuff together, even if I can't do all the flashy stuff.\"\n\n\t\"Aren't you a little young to have had bar work?\" You ask, feeli
