<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Double/Cross — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "doublecross", "title": "Double/Cross", "scenes": {"choicescript_description": "You are the head bodyguard assigned to protect the richest, most powerful man in England. Enter a house filled with secrets and intrigue, and see if you can uncover the truth about the colourful cast that inhabits it. Choose between a host of romanceable characters, both male and female, but don’t forget to protect your own interests too. Will you abide by your contract or will you discard your morals for something more inviting?\n\n[i]Double/Cross[/i] is a 100,000-word interactive novel by Toni Owen-Blue. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\n• 95,000 word romantic drama.\n• Make friends and business partners and decide who keeps your loyalty and who you’ll double cross as you protect the richest man in England, or just look out for yourself.\n• Schmooze, sneak, backstab, fight or work your way to the top.\n• Piece together the truth about the colorful cast that surround you, uncover the secret of the kidnapper and covet favors to play a pivotal role in this sordid affair.\n• Play male or female, gay or straight.", "choicescript_stats": "*stat_chart\n\ttext name Name\n\ttext age Age\n\tpercent career Career\n\tpercent chris Christopher Haywood\n\tpercent alex Alexander Haywood\n\tpercent reb Rebecca Haywood\n\tpercent opal Opal Sandhurst\n\tpercent rob Robert Smith", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2022-02-23 $4.99 $2.99 start\n  *abort\n\n*else\n  You're completely upgraded!\n", "demoend": "And that's the end of the demo.\n\nI hope you enjoyed the story so far. You can subscribe through my website to get an email when this is all finished. Or you could give it another go now, there's loads of paths to find, even in the opening.\n\nAny suggestions or help would be much appreciated. You can get in contact with me through my website blue-books.org.uk\n\nThanks for playing!", "earlyend": "Your life becomes a bit of a blur after that.\n\nYou are of course held up as an example to people of your profession everywhere. Not only did you keep everyone safe but you went above and beyond to catch the criminal responsible.\n\nYou have to pack up and move yourself and all your staff out of Mr Haywood's house immediately, with an efficent and cold thank you and good bye.\n\n*if (opalplot=true)\n\tYou try to find Opal to say goodbye to her but she has left the house even before you.\n\n\tYou hear a while later that she disappeared. Running away from her family, never to be heard of again.\n\t*goto 1\n*else\n\tYou try and find Rebecca to say goodbye to her, but she is gone even before you.\n\n\tNeither Alex nor Christopher seem to care. Rebecca fades out of their memory as quickly as a rainy yesterday night and you never hear anything of her again.\n\t*goto 1\n*label 1\n*page_break\n\nNot that you have much time to think about that. Your daring catch makes the papers and you find yourself more sought after professionally than you could have ever dreamed.\n\nYou have your pick of jobs, from the most exciting to the most lucrative and you find yourself never having to answer to anyone again.\n\n*if (rob1=true)\n\tWhatever was blossoming between you and Rob dies. Both of you have so little time that after a few visits you struggle to find the time. And then you struggle to remember. And after a while Rob fades in your memory completely.\n\t*goto 2\n*else\n\t*goto 2\n*label 2\nAll in all, your success lets you head off into the world with a great head start and you make the most of it with one success after another.\n\nYou only sometimes think back to that choice you made and wonder, just maybe, how your life would have gone if you had decided to help that woman, that time, not that you can remember her name now.\n*goto_scene end", "end": "*page_break End\nWe hope you've enjoyed playing [i]Double/Cross.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\nThere's lots of different paths for all the characters, so see how many you can find.\n\nIf you'd like to see more and support my writing then you can like me on facebook\nhttps://www.facebook.com/bluebooksuk\nor have a look and message on my website\nhttp://www.blue-books.org.uk/\n\nSpecial thanks to the choice of staff and community for the software.\n*ending", "protect1": "You admire the gold filigree on the gates as you glide past, the limo so smooth that even the gravel drive feels like water under the wheels.\n\nYou've been working in this house for a while now. Even so, you still can't get over its magnificence. The gates are just the beginning, inside there's acres of tended ground, lush and pruned to perfection, dotted with fountains and a shimmering pond full of the biggest Koi carp you've ever seen. That's just the garden. In the centre of everything is the household you've found yourself working for. Designed and built by your employers' father, it is a sprawling glass beast, the apex of modern luxury.\n \nYou would find it all very beautiful, if it weren't for the fact that an ostentatious glass house makes your job almost impossible. As Head of Security, having to protect a house in which every movement can be seen from the outside just adds another layer of difficulty to an already challenging job.\n\n*page_break\n\nYou shouldn't complain though, you're only just qualified to run such a big operation with ten staff under you. You're pretty lucky to land such a high profile job, but since your employer asked for a-\n*choice\n\t#Man\n\t\t(Because security is a \"man's work\", whatever that means)\n\t\t*set gender false\n\t\t*goto one\n\t#Woman\n\t\t(Because security is a \"woman's work\", whatever that means)\n\t\t*set gender true\n\t\t*goto one\n\n*label one\n*page_break\nAnd you were the only one available. So here you are.\n\n\"Finally,\" your employer Christopher - Mr Haywood - lets his furrowed brow relax as the house comes into view. He's lounging in the back seat next to you, swirling amber liquid round a crystal glass that's been filled one time too many considering it's only lunchtime.\n\n\"Will you be going out again today Mr Haywood?\" you ask, half listening as you turn your head to check out the rear window of the car.\n\n\"Once was enough,\" he replies, dry as ever.\n\nTurning back around in your seat, you catch him staring lazily at you.\n\nYou are his employee, but even just viewing him objectively, you can't deny he's quite breath taking in his appearance. His features are all sharply defined, from his intelligent brow to an elegant jaw, always set in an expression both beautiful and haughty. His skin is a naturally light tan, striking bronze against his black hair, which he styles to swoop back over his head. His eyes, a cold grey that jump startlingly out of his dark face, are always holding a level gaze, never surprised and always in control.\n\nBut you have other things to be looking at so you unclip your seat belt and lean forward to make sure the house guard under your command is following proper procedure.\n\n*page_break\nThe limo slides smoothly to a stop in front of the marble steps leading up to the front door.\n\nYou've just clicked open your door, ready to go and let Mr Haywood out when you hear a shout.\n\n\"Unknown figure on the roof!\"\n\nAs Mr Haywood's primary protector, your priority is his safety at any cost. Your years of training have taught you to:\n*choice\n\t#Grab Mr Haywood's head and push him down into the foot well, order the driver to get moving again and take us away from the house. That's text book.\n\t\t*set career %+12\n\t\t*goto two\n\t#Pull Mr Haywood's body behind you and become a human shield. This may not be the first port of call, but it's my personal knee-jerk reaction.\n\t\t*set career %+5\n\t\t*set chris %+8\n\t\t*goto two\n\t#Order a diamond formation around the car and send someone to the roof to check for threats. No need to jump at loud noises, it's a safe course of action without going overboard.\n\t\t*set chris %+5\n\t\t*set career %+8\n\t\t*goto two\n\t#Open fire on the roof, finally time for some action! Just what I've been waiting for!\n\t\t*set career %-20\n\t\t*set chris %-20\n*label two\n\n\"That's a repairman you idiot!\"\n\nYou can only stare in horror at Mr Haywood's unimpressed face as your subordinates, Stephan and Drew, start a shouting match over the top of the car.\n\nYou'd better do something quickly.\n*choice\n\t#Get straight out the car and reprimand Stephan, the guard who sighted the figure on the roof. Mr Haywood is stressed enough without him jumping at shadows and making it worse.\n\t\tFlinging open your door, you silence the argument and give Stephan a stern reprimand about his behaviour. Then quickly skirt round the car to open Mr Haywood's door for him, hoping this will be forgotten quickly.\n\t\t*set chris %+5\n\t\t*set career %-10\n\t\t*goto three\n\t#Get out the car and reprimand Drew, the guard who verified it a false threat. Yes, it wasn't real. But Mr Haywood is in constant danger, you can never be too cautious about what is or isn't a threat. What if it had been an attacker?\n\t\tYou get out the car, standing straight and professional in the hope of reminding the team under you how they're actually supposed to behave. You give Drew a a quick clipped reprimand as you circle the car to let Mr Haywood out.\n\t\t*set career %+13\n\t\t*goto three\n\t#Jump out the car, take them both aside and reprimand them both. They are being so painfully unprofessional right now you want to slam their heads together.\n\t\tTempting as it is to take them both by the ear like the children they are, you pull both men to the side and quickly remind them that they aren't children, they are men, professional men.\n\t\t\n\t\tThey both have the decency to look sheepish. \n\n\t\tYou order them to their next task and return to the car to escort Mr Haywood to the house.\n\t\t*set career %+10\n\t\t*set chris %+5\n\t\t*goto three\n\t#Just try and skate on past the awkward moment. After all, nothing really happened.\n\t\tYou jump out the car, silencing both men with a stern look, but nothing more, and open Mr Haywood's door for him.\n\t\t*set career %-20\n\t\t*set chris %-20\n\t\t*goto three\n*label three\n\nHe appraises you as he stands up, although whether he is pleased or not you aren't sure, and walks past you to the house.\n\nHe takes the steps two at a time, with you following close behind and bursts through the double doors. The hall is quite amazing, made only of marble and glass accented with gold, with a huge crystal fountain in the middle and hanging plants swinging from the roof, making the room smell fresh.\n\nMr Haywood's secretary, Charlotte, bustles reliably out of her study as you enter, following you both down the hall and gibbering non-stop.\n\nYou know she's good at her job organising Mr Haywood's life. But it doesn't make her any less shrill.\n\n*page_break\n\nStill striding determinedly down the hall, Mr Haywood holds up his hand.\n\n\"Just cancel the rest of my day Charlotte, I'm in no mood.\"\n\n\"Very good, sir,\" She replies, to her credit, not skipping a beat. She holds out her arms, already full of papers, and Mr Haywood drapes his jacket over them, \"Any leisure activities I can organise for you Sir?\"\n\nMr Haywood simply shakes his head, and Charlotte scurries away down the corridor. \n\n\"Can you make sure I'm not bothered for the rest of the day?\" Mr Haywood glances briefly at you as you follow him through the corridors to his quarters.\n*choice\n\t#\"Are you thinking of attackers, or just friends and relatives? Because that doesn't really fall in my job description.\"\n\t\t*set chris %-5\n\t\t*goto four\n\t#\"I'll tell my staff to be as discreet as possible.\"\n\t\t*set chris %+5\n\t\t*goto four\n\t#\"We'll do our best to keep the day as smooth and relaxing as possible for you, Sir. But I'm afraid I can't compromise any procedures we've put in place.\"\n\t\t*set career %+8\n\t\t*goto four\n\n*label four\n\nMr Haywood simply nods and opens the door to his quarters, \"I have no intention of leaving the house for the rest of the day. Plan your staff accordingly.\"\n\n\"Thank you for informing me,\" you bow your head to him politely.\n\n\"I'm hardly in a position to make your job difficult.\" Mr Haywood snorts, letting his door close behind him and leaving you out in the corridor.\n\nThe first thing you do is radio Emma, the woman in charge of camera surveillance.\n\nShe's your second in command. When Mr Haywood's in the house, she takes charge of keeping an eye on things, and you get to make plans or just take a rest. Whatever you choose.\n\nSo now she's confirmed everything's running smoothly, what are you going to do with your down time?\n*choice\n\t#While Mr Haywood's safety is technically Emma's responsibility, while he's home I am still in charge. It's my responsibility to check all the staff before I start relaxing.\n\t\t*set career %+10\n\t\t*goto five\n\t#I head straight to the gym. It's not time off per say, I still need to be strong and fit to fulfil my responsibilities. But I won't deny I selfishly want to blow off a little steam too.\n\t\t*set career %+5\n\t\t*set chris %+5\n\t\t*goto five\n\t#I go to do a bit of reading. A sharp mind is just as important as a strong body in this line of work. Although I won't deny I do kind of just want to sit and read for a bit.\n\t\t*set career %+5\n\t\t*set alex %+5\n\t\t*goto five\n\t#I just need to go to my room for a bit and sleep. If I get tired (which I am) I'm going to start making mistakes.\n\t\t*set career %+5\n\t\t*set ronan %+5\n\t\t*goto five\n\t#I'm going to go check on Stephan and Drew. They must be really feeling the strain of being on constant alert, they aren't usually so unprofessional. Maybe it would be good to cover one of their shifts, try and lift their morale.\n\t\t*set rob %+5\n\t\t*set career %+8\n\t\t*goto five\n\t#I'll give the guys at my agency a call. After all, this job might be going well, but I'm still an independent contractor. The more people know me, and like my enthusiasm, the more likely I'll be to get another high profile job after this.\n\t\t*set opal %+5\n\t\t*set career %+5\n\t\t*goto five\n*label five\n\nDecision made, you start to head away from Mr Haywood's room when he sticks his head back round his door.\n\nIn all the months you've known him, he has never shown much emotion. He is clearly a hard man, and even in the difficult time he is in right now, he seems reluctant to rely on anyone, even you. But right now you can see a tinge of grey in his face, and a strand of hair hangs down into his eyes. It makes his usually flawless appearance look nearly rabid. \n\n\"Good, you're still here, come in, come in,\" he ushers you inside and your plans disappear in a puff of smoke.\n\nHe gestures for you to pull your shoes off at the door, which you do, discovering that the wooden floor is heated comfortably from underneath. The whole room has a calming, naturistic feel. The walls are a gentle green with cream accents and all the furniture is a light wood. You are clearly in a lounge area as there are simple green silken sofas arranged to look out over the gardens through huge windows that take up most of the wall.\n\nMr Haywood gestures for you to sit on one, and you do, almost sinking embarrassingly backwards into the soft cushions.\n\n*page_break\nMr Haywood sits opposite you, looking a touch wan.\n\nHe looks up at you, \"My mother is coming.\"\n\nYou pause, not really sure how to behave. His reaction seems a bit odd for a simple maternal visit.\n\n\"And she's bringing my brother.\" he adds, as if this creates layers of horror to the already world ending event.\n*choice\n\t#I remain silent. Whatever is going on is none of my business.\n\t\t*set career %+8\n\t\t*goto six\n\t#I comfort him, he's clearly rather upset, even if I don't understand.\n\t\t\"Hey,\" you say, getting him to look at you, \"Just calm down and tell me what I need to do to make this easier for you.\"\n\n\t\tHe smiles at you, \"Of course, this is quite unlike me.\"\n\n\t\tYou smile encouragingly back at him as he shakes off his mood.\n\t\t*set chris %+8\n\t\t*goto six\n\t#I tell him to pull himself together, I'm kind of uncomfortable right now.\n\t\t\"Sir, this doesn't seem as bad as you're making it sound. Please calm down.\"\n\n\t\tMr Haywood looks visibly startled by your brusqueness. Trying to shake off his mood, he continues.\n\t\t*set career %-5\n\t\t*set chris %-5\n\t\t*goto six\n\n*label six\n\n\"Regardless, while they are here I need you to include them under your protection. They're actually coming here because there was an attempt on Alexander, my brother, so it appears it is not just me in need of protection.\"\n\n\"I understand.\" You say nodding, \"Let's go over where they'll be staying so I can get everything organised.\"\n\nInstead of getting any free time, you spend the next hour with Mr Haywood, going over the plans for his visitors.\n\nYou've never spent so much time around him.\n*choice\n\t#It's good to get to know him a bit better. The more I know him, the better I can work for him. I want to do my job well.\n\t\t*set career %+10\n\t\t*goto seven\n\t#I'm seriously annoyed my time off got cut.\n\t\t*set career %-10\n\t\t*goto seven\n\t#He might be my employer but he makes me want to be unprofessional. He's such a handsome man. I can't deny I was a little excited to get to know him better because I want to, rather than because I have to.\n\t\t*set chris %+10\n\t\t*set chris1 true\n\t\t*goto new1\n*label new1\nThis is the first time the two of you have been around each other when Mr Haywood doesn't have his guarded professional face on, and you can't help but enjoy it.\n\nAnd even though it seems crazy, he seems to be enjoying it too. Every time he catches you looking at him out of the corner of your eye, he smiles. You even catch him watching you twice, his eyes studying your face.\n\nYou find yourself disappointed when you finally stand to leave.\n\nMr Haywood stands and shows you to the door, but doesn't open it. He simply looks at you in silence for a few seconds \"If you would return later to let me know everything is in order I would much appreciate it.\" his voice is weirdly stiff and formal, and he's never asked you to report to him before. Unusual.\n\n*page_break\n*label seven\nYou leave his quarters, stiff from sitting down. His family is arriving early in the morning, which gives you little time to prepare.\n\nBut now it's time for lunch (a very late one), so you head off to the kitchens.\n\nOn your walk, you marvel at the house, contemplating your good luck for the millionth time.\n\n*fake_choice\n\t#But I do feel sorry for Mr Haywood\n\t#Mr Haywood's pain is my gain.\n\nIn the last year there have been two kidnapping attempts. The first one wasn't taken very seriously as the kidnapper was so inept and clumsy, no one was even sure it was an attempted kidnap. Mr Haywood himself admitted to thinking it was a practical joke.\n\nThe second one was the one which caused your hire. It very almost worked too, but Mr Haywood managed to elude his captor, and through sheer guile and wits, dodge this kidnapper in his own home while waiting for the police to arrive. Unfortunately the kidnapper left no trace of himself, even his fingerprints had been obviously burned away. \n\nSo here you are, bound to protect a billionaire from any more kidnappings. You've yet to do anything but stand guard. When the time comes, you can only hope you're up to the job.\n\n*page_break\n\nLost in your own thoughts, you only register someone running full pelt out of an adjoining corridor and straight into you when you're on your back looking at the roof.\n\nYou land hard, the offender on top of you, stammering apologies profusely.\n\nThe surprise over, you look at him and recognise the face, one of the many servant profiles you have to remember. You know he's mostly responsible for food service, called Rob. At least you're pretty sure that's what it is. It's hard to think when he's stammering so close to you, \"I'm so sorry I didn't see you there-\"\n*choice\n\t*if (gender=false)\n\t\t#Bill\n\t\t\t*set name \"Bill\"\n\t\t\t*goto eight\n\t\t#Matthew\n\t\t\t*set name \"Matthew\"\n\t\t\t*goto eight\n\t\t#Muhamed\n\t\t\t*set name \"Muhamed\"\n\t\t\t*goto eight\n\t\t#None of these\n\t\t\t*goto nine\n\t*else\n\t\t#Sophia\n\t\t\t*set name \"Sophia\"\n\t\t\t*goto eight\n\t\t#Madison\n\t\t\t*set name \"Madison\"\n\t\t\t*goto eight\n\t\t#Ava\n\t\t\t*set name \"Ava\"\n\t\t\t*goto eight\n\t\t#None of these\n\t\t\t*goto nine\n*label nine\n\nSo, what's your name?\n\n*input_text name\n\n*goto eight\n\n*label eight\n\n\"Yeah I know.\" He says, blushing and pushing himself off you, \"I'm Robert. Although I guess you probably already know. But call me Rob, please.\"\n\nThe fact that the boy's face is scarlet only highlights how baby-faced he is. When he pulls you up, you realize the two of you are the same height. His wiry frame and round face juxtapose each other. Freckles stand out on his nose against the stark white of his skin. His hair is a blond mop, teased reluctantly into a small tail at the nape of his neck. His huge brown eyes combined with his nervous plump lips put you in mind of a puppy.\n\n\"Nice to meet you Rob,\" You hold out your hand to shake. He looks at it for a few moments before realizing what you want. When he shakes it's a jittery and sweaty experience.\n\nHe stands there awkwardly for a few seconds, then gabbles, \"AnywayIhopetoseeyouagainsometimebye.\" in one breath and flees.\n\n*choice\n\t#Catch his arm.\n\t\t\"It has been nice to meet you, you can come say hi anytime you want.\" You say. There's no reason for him to be so scared of you, and it would be nice to have someone to talk to and not have it be all about work.\n\n\t\tHe nods at you, blushing fiercely and walks normally down the corridor instead of sprinting away, waving at the end as he disappears from view.\n\t\t*set rob %+8\n\t\t*goto ten\n\t#Let him go, I have no desire for more sweaty awkwardness thank you.\n\t\t*goto ten\n*label ten\nYou carry on your way to the kitchens and grab yourself a light lunch. \n\nJust as you've finished enjoying it and you're wondering what to do next, Emma radios you.\n\n\"${name}, are you busy right now?\"\n\nWell, are you?\n*choice\n\t*selectable_if (chris1=true) #\"Sorry I can't help you right now Emma,\" Mr Haywood suggested you go see him later and you fully intend to take advantage of that at a reasonable hour.\n\t\t*set career %-10\n\t\t*goto eleven\n\t#\"Sorry, I can't help you right now Emma.\" You're sure she can handle whatever it is. Besides you have to prepare for Mr Haywood's family, if you do both you won't be off till midnight.\n\t\t*set career %-10\n\t\t*goto eleven\n\t#\"Nothing I can't put off. What do you need?\" You might end up working a little late, but this is your job after all.\n\t\t*set career %+8\n\t\t*goto twelve\n\n*label eleven\n\n\"Ah, damn. Okay, no problem, I'll get someone else to take care of it. Anything I need to know?\"\n\nYou let her know about Mr Haywood's visitors.\n\n\"No wonder you have no time, you're going to be swamped!\" Emma replies, chirpy as ever, and the radio goes dead.\n\nYou stand and stretch. First things first, you should probably go to the guest rooms and make sure the cameras are all in good working order.\n\n*page_break\n\nYou haven't been to the guest wing of the house much. Once when you did an initial sweep of the house. But otherwise there's been no need to go there. Mr Haywood really isn't the \"guest\" type.\n\nIt's just as spectacular as the rest of the house, built for comfort. You start with the room Mr Haywood's mother is going to be staying in, checking all the camera leads in the room.\n\nYou're just on a desk chair, stretched up to a particularly difficult to reach lead when the door opens.\n\n\"Hard at work I see,\" You twist to see the voice...\n*page_break\n\n*if (career>20)\n\tThe chair you're on wobbles, but your cat-like reflexes allow you to retain your balance. Instead of falling, you simply spring off the chair and land confidently.\n\n\t\"My apologies,\" Mr Haywood says, striding over and bending down to place a hand on your shoulder, \"I almost caused quite the accident there.\"\n\n\t\"I'm fine,\" you say, brushing yourself off. It is, after all, your job to not be easily startled.\n\n\t\"You're sure you didn't hurt yourself?\" Mr Haywood asks, scrutinising every inch of you.\n\t*goto new2\n\t\n*else\n\tand send yourself sprawling on the floor, glad you at least landed on a rug.\n\n\tSometimes you are so smooth it hurts. You, usually.\n\n\t\"My apologies,\" Mr Haywood says, striding over and bending down to place a hand on your shoulder, \"Are you hurt?\"\n\n\t\"I'm fine,\" you say, brushing yourself off. The carpets are so plush you barely felt a thing.\n\n\t\"Don't be silly, let me have a look.\" Mr Haywood pulls you to your feet and scrutinises every inch of you.\n\t*goto new2\n*label new2\n*if (chris > 37)\n\tYou take the opportunity to look at his face, really look. With all the work you have to do you barely get the chance.\n\n\tYou feel like you're starting to know it better. Before you wouldn't be able to read the expression he's pulling, but now the little crease in his eyebrows tells you genuine concern, the way his lips are tight shut is telling you he wants to say something.\n\t*goto fourteen\t\n*else\n\tHis face, blank and professional as always, is a complete mystery to you.\n\t*goto fourteen\n\n*label fourteen\n\n\"It looks fine.\" he says, straightening to his towering height over you, \"My apologies for startling you, I should have known you'd be in here.\"\n\n*page_break\n\n\"It's no problem at all, Sir,\" You reassure him, \"I should have better footing maybe.\"\n\n\"I just came to make sure everything is prepared for tomorrow.\"\n\n\"Well in terms of safety, I think we're done here.\" You reassure him. He only nods distractedly, \"I'll just leave you to make your final checks,\" nodding respectfully you move towards the door.\n\n\"Wait a moment.\" Mr Haywood catches your shoulder as you walk past him, \"Would you stay with me a moment? Some company would be much appreciated.\"\n*choice\n\t#Of course I can stay.\n\t\t*set chris %+10\n\t\t*goto fifteen\n\t#Company is not part of my job description.\n\t\t*gosub end_trial\n\t\t*set chris %-10\n\t\t*set career %+10\n\t\t*goto sixteen\n*label fifteen\n\"Thank you,\" Mr Haywood lets go of your shoulder, and sinks into the sofa next to him, \"I'm sorry, I'm not usually like this. But with this kidnapping threat I'm already on edge, then just add my mother and brother and-\" he trails off. Closing his eyes he takes both his hands and massages his temples, relaxing back into the sofa.\n\nUnsure of what would be appropriate to do or say, you perch yourself awkwardly on the opposite end of the sofa and make what are supposed to be comforting sounds.\n\n\"Relax,\" Mr Haywood reassures you. You look at him and his bright grey eyes meet yours. He flits his eyes to the side, motioning for you to relax on the sofa like him.\n\nYou slide onto the seat, still not 100% relaxed. He is still your employer after all.\n\n\"I don't want to deal with my mother right now. Especially since she's warned me there is a surprise. I've learned not to expect good things from that woman.\"\n\n*page_break\n\n\"${name},\" he says your name like he's savouring it, you look back into his eyes, \"Do you think we have an obligation to love our family no matter what?\"\n*choice\n\t#\"Yes I do. Blood is thicker than water. Your family will always be there for you so you should do the same for them.\"\n\t\t\"A very idealistic point of view...\" Mr Haywood says. It sounds like he's chastising you, \"I wish I could have that kind of outlook.\" He smiles at you, his eyes shining like silver.\n\t\t*set chris %+5\n\t\t*goto seventeen\n\t#\"I think sometimes family does things it's hard to forgive them for, but we love them anyway, whether we want to or not.\"\n\t\t\"Do you really believe that?\" Mr Haywood looks at you, his eyes clouded and a furrow in his brow, \"It sounds like a very painful situation we all put ourselves in.\"\n\n\t\tYou nod assuredly, \"When I say it like that I guess it sounds harsh. But if you think of it both ways it also means we will be loved whether we want it or not. Maybe that sounds less painful to you.\"\n\n\t\tMr Haywood nods, his eyes clearing of clouds, \"Yes. It does rather.\" he admits, a smile tugging the corners of his lips. \n\t\t*set chris %+5\n\t\t*goto seventeen\n\t#\"Not at all. Just because you have a biological bond doesn't mean you have to do anything, especially if you aren't being treated well.\"\n\t\t\"I see our opinions align.\" he sighs, \"And yet here I am, allowing them into my house like some little boy, with the hope that maybe this time will be different.\" he smacks his hand to his forehead laughing at himself, \"I guess I'm not as grown up as I thought. I'm still a little boy trying to make everything idealistically great.\"\n\t\t*set chris %+5\n\t\t*goto seventeen\n\t#\"It's interesting you use the word 'oblige'...\"\n\t\tHis body shakes as he laughs, his eyes shining at you, \"How very obtuse of you,\" he slaps the back of the sofa as his surprisingly bark like laughter fills the room.\n\t\t*set chris %+10\n\t\t*goto seventeen\n*label seventeen\n\n\"Thank you for making me feel more at ease.\" his eyes are holding yours. Suddenly they fill with something you've never seen before. If you had to name it you'd say it was greed.\n\nThen it's gone and he's just looking at you, blinking his clear eyes. He shifts his body closer to yours on the sofa so his hand can reach across the gap between you. He brushes your cheek lightly with the tips of his fingers.\n*choice\n\t#Lean into his touch\n\t\t*set chris %+8\n\t\t*set chris1 true\n\t\t*goto eighteen\n\t#Get out now. I don't want this.\n\t\t*gosub end_trial\n\t\tYou jump out of your seat, dodging your head around his hand and standing up.\n\n\t\t\"I'm glad I could help you, sir. I'll go and finish up my work for the day.\" you keep your voice as light as possible despite your discomfort.\n\n\t\tA moment of hurt flashes across Mr Haywood's face before he stands in front of you, his professional face back on. \"Yes of course. I shall see you in the morning when the guests arrive.\"\n\n\t\tWithout preamble or another word he strides out of the room, leaving you completely alone and more than a bit surprised.\n\t\t*set chris %-10\n\t\t*goto sixteen\n*label eighteen\nHe smiles as you lean into him, his fingers nervously drawing a line down your face and under your chin.\n\n\"I like the way you're looking at me right now.\" he says, shifting himself a little closer to you. His body is now on the cushion next to yours, his knees bumping yours, \"Usually when you look like that you're focusing really hard on something. It's always been on your job before though...\"\n\nHe trails off, his hand slipping from your chin to your hands resting in your lap. He traces along the top of your thumb with his fingers.\n\n\"It's nice having your attention to myself for a little bit.\" he says wistfully.\n\nSurprise keeps you in your seat (although at least you keep enough of your wits not to gape at him). Mr Haywood has never before shown any sign he feels anything towards you but appreciation for your good service. Now he's talking like he's been watching you intently all this time.\n\n*page_break\nYou've fantasized about him, but he's your employer. You never thought for a second you would be entertaining anything but a fantasy.\n\n\"What?\" You blurt intelligently.\n\nHis eyes dance in amusement at your increasingly reddening face, \"I'm sorry to surprise you. I usually check myself when I'm around you, but today with everything piling up I need to behave how I want, rather than how I should, just for a little bit.\"\n\nHe grips your hand suddenly in a vice like grip, \"And this is what I want, your eyes on me,\" his thumb dances over your wrist to the pulse there, he grins as he feels it, \"Your heart beating fast for me.\"\n\n*page_break\n\n\"Indulge me,\" he says, his voice enticing and cheeky like his sparkling eyes, \"Just for an hour, pretend we aren't in a professional contract.\"\n\nIt isn't a question, it's a statement. \n\nStill, up until now things have been odd but still retained some boundaries. Are you as willing as he is to do away with the last of your professionalism?\n*choice\n\t#Yes.\n\t\t*set chris1 true\n\t\t*set chris %+15\n\t\t*goto nineteen\n\t#No.\n\t\t*gosub end_trial\n\t\tYou pull your hand out of his grasp, shaking your head.\n\n\t\t\"I'm sorry,\" you say as Mr Haywood's business mask slips back onto his face, \"I'm afraid I shouldn't have stayed, I want to honour our contract.\"\n\n\t\tMr Haywood simply nods, completely unembarrassed and unaffected to your eyes.\n\n\t\tAt this obvious dismissal, you leave him sitting there, staring off into space.\n\t\t*set chris1 false\n\t\t*set chris %-25\n\t\t*goto sixteen\n\n*label nineteen\nIf you don't mind me asking, why exactly? Do you like him, or is it his money that appeals to you?\n*fake_choice\n\t#Christopher is lovely, I'd want to get to know him better even without the money.\n\t#Christopher seems nice. I can't deny his fiscal situation is a bonus though.\n\t#I don't care for Christopher. My eyes are very much on the 'prize'\n\nHe smiles at you. You've never seen his face so animated, he looks like a whole other person. Not the strict businessman you always see, more like a young man without a care in the world.\n\n\"Do you know how hard it is to put on this stern face all the time? Especially when I just want to spend an hour talking with someone who doesn't defer to me and only see me as their boss.\"\n\n*choice\n\t#\"It must be lonely.\"\n\t\tHe looks thoughtfully at you, \"I think that would be the word to describe how I feel. Yes.\" he says, \"I've never known anyone, family excluded, who hasn't been employed by me.\"\n\n\t\tNow that you think about it, in the four months you've been in Mr Haywood's employ, you've never once seen him take a non-professional phone call, let alone have a visitor. It never occurred to you to even think about it before, it's just an assumption that everyone has at least some friends to talk to. You never even thought about how alone Mr Haywood actually is.\n\n\t\t\"Not in your whole life?\" you ask disbelievingly.\n\n\t\tHe bites his lip, making him look even younger, \"Let me tell you something about me, that I think will help you to understand me better,\" \n\t\t*set chris %+8\n\t\t*goto twenty\n\t#\"Then why do you do what you do?\"\n\t\tHe looks pained as he answers \"I would rather not discuss that in what is my hour off. Suffice to say I don't know how to do anything else.\"\n\n\t\tHe turns his head from you for a moment as if collecting himself. Then turns back, completely himself again except for the glimmer gone from his eyes.\n\n\t\t\"But if you are so keen to know about my personal life I suppose a short story would only take a few minutes and wouldn't ruin our hour together.\"\n\t\t*set chris %-8\n\t\t*goto twenty\n\t#\"I like your face better when you aren't putting one on.\"\n\t\tYou can't get over how dazzling his smile is, especially now when he is being so open with you and his eyes shine and his hand is resting gently on yours.\n\n\t\t\"I'm glad you like it,\" he says, his grin turning a little roguish as he leans closer still, \"I've spent most of my life putting on a face. It's good to know I haven't forgotten how to act like myself.\"\n\n\t\tYou cock your head questioningly to the side.\n\n\t\t\"I want to tell you a bit more about myself, may I?\"\n\n\t\tYou nod for him to continue.\n\t\t*set chris %+10\n\t\t*goto twenty\n\n*label twenty\n*page_break\n\"I was really lucky growing up. You know the company I have was passed down from my father, and we were just as fortunate with money back then. I had the best education money could buy. I was already bright so with the extra tutoring I was given on top, it was easy for me to be a few years ahead of myself. I didn't see my dad much, but my mother loved me to pieces, maybe too much, and my brother and I didn't fight all the time like most kids do.\"\n\n\"But as I got older I realized all these privileges come with a lot of expectations. I was always going to take over the business, I was always going to be at the top yes. But I was going to be there alone. I know I don't have much room to complain, they aren't by any means the worst problems in the world. But I've always been in advanced classes or a manager or just being pushed forward in life too fast to stop and make friends. For the most part it's fine, but when there's so much stress I can't help but feel the need for some company.\"\n\n*choice\n\t#I feel a little bad for him. He's right, it isn't the worst set of problems, but everyone's allowed a bit of weakness once in a while.\n\t\t*set chris %+8\n\t\t*goto twentyone\n\t#That must be lonely. I'm glad I stayed to comfort him.\n\t\t*set chris %+12\n\t\t*goto twentyone\n\t#What a spoiled baby, most people would kill for what he has.\n\t\t*set chris %-15\n\t\t*goto twentyone\n\n*label twentyone\n\"It's hard to have anything as simple as a conversation with anyone. No one wants something as simple as a conversation from me, they either want to work for me for an extortionate amount of money, or they want to marry me and just skip the middle man.\"\n\nYou gulp. The two of you are so close together now you can feel his breath kissing your cheeks.\n\n\"No one will sit and just listen to me be myself.\" Mr Haywood smiles at you, his eyes flicking all over your face like he's trying to drink every detail of it, \"So thank you.\"\n\nYou let out a breath you didn't realize you'd been holding as he leans back away from you.\n\n*page_break\n\n\"I feel much better,\" he smiles at you, sweeping a stray lock of hair back from his head, \"Let's move onto something more light hearted perhaps?\" Without waiting for your answer he pushes on, \"I'd like to hear more about you. Hm - How old are you?\"\n\nYou raise an eyebrow, \"Don't you know from my Agency Profile?\"\n\n\"Well yes,\" he replies, looking cheekily at you from under his lashes, \"But for the purpose of this conversation I'm pretending I don't have all your background information. Feels more natural don't you think?\"\n\nYou chuckle at his impish grin, \"Oh alright I'm-\"\n\n*input_text age\n\n\"Only ten years younger than me.\" he says grinning.\n\n\"Are you asking me questions you know the answer to because your answers have all been pre-planned?\" you ask suspiciously, laughing softly.\n\n\"Oh, please. I'm not that socially inept.\" Mr Haywood protests, but his cheeks definitely warm.\n\n\"Ask me something not on my profile.\" You tease.\n\n\"Fine, fine.\" he lays back spreading his arms over the back of the sofa, one coming to rest lightly on your shoulders, \"If I were to take you on a date,\" Mr Haywood asks as if he's simply asked about the weather, \"What would you like to do?\"\n\n*choice\n\t#\"I like the classic date. A nice dinner, some nice wine, lots of opportunities to just talk and enjoy each other's company.\"\n\t\t*gosub end_trial\n\t\t*set date1 true\n\t\t*set chris %+10\n\t\t*goto twentytwo\n\t#\"I've got a bit of a soft spot for a simple date. Just a picnic, or even just a walk somewhere, enjoying being alone and just relaxing together.\"\n\t\t*gosub end_trial\n\t\t*set date2 true\n\t\t*set chris %+15\n\t\t*goto twentytwo\n\t#\"I like those high thrill adventure dates, so we can really experience something together and start the whole making memories malarkey.\"\n\t\t*gosub end_trial\n\t\t*set date3 true\n\t\t*set chris %+8\n\t\t*goto twentytwo\n\t#\"I've got a soft spot for being spoiled. Having a man taking me round shopping, or doing something really extravagant like an evening ball or something.\"\n\t\t*gosub end_trial\n\t\t*set date4 true\n\t\t*set chris %-5\n\t\t*goto twentytwo\n\n*label twentytwo\n\n\"Cute,\" Mr Haywood reaches out and runs his hand down your face once more. You can feel that his fingers are shaking a bit. \n\nHis other arm stays around you so you're in a half embrace. His body is facing yours and you're so close you can see yourself reflected in his cold eyes. \n\n*if chris >= 65\n\t\"I want to do that with you.\" his hand moves to your hair, stroking it back away from your face until he's cupping the back of your head, \"I want to know you so much better than I do now.\"\n\n\tHis warm breath dances across your lips.\n\t*goto twentythree\n*else\n\t\"I've not been on a date in so long.\" he agonises, shutting his eyes and whining a little.\n\n\t\"You never know when your next date will be,\" You reassure him.\n\t*goto twentythree\n\n*label twentythree\n*page_break\nThen your radio goes off. Mr Haywood jumps away in surprise and your intimate moment is broken.\n\n\"Emma?\" You answer curtly, trying and failing not to show your irritation.\n\n\"The camera in the mother's room isn't working.\"\n\n\"I just made sure it was working,\" you retort without skipping a beat, \"So I know it's fine.\"\n\n\"You just seemed to have forgotten about it,\" Emma says flatly, and the radio goes off.\n\n*page_break\n\nMr Haywood can only laugh as you try to gather yourself.\n\n\"I guess we had forgotten about that.\" he chuckles, standing up and stretching, \"I feel much better, thanks to you,\" he says, his eyes alighting on you, full of warmth, \"I apologise for the inconvenience I've caused you.\" he strides to the door and opens it, \"I'm going to get some rest, see you tomorrow morning.\"\n\nWith a last nod he leaves you to yourself. You're not sure whether you want to die of embarrassment, or kill Emma for interrupting.\n\n*finish\n\n*label sixteen\n\nYou leave the room at a respectful enough pace, but once you're out, it's a swift trot down the hall towards the rest of your work, and away from a potentially awkward situation.\n\nYou can only wonder what might have happened if you had stayed.\n*finish\n\n*label twelve\n\"Thanks, I know you're busy.\"\n\n\"It's no trouble you say,\" internally mourning your lost time for just a second, \"What is it you need doing?\"\n\n\"All of the feeds from a camera in the reception dining hall have been lost. I'm pretty sure one of the cleaners just disconnected the power or something, this is the fourth time it's happened. But can you go double check now?\"\n\n\"Of course.\" you find yourself relieved the job doesn't seem to be a big one, \"After I'm done with that I'm going to come to the office, Mr Haywood has relatives coming to stay and we'll be protecting them as well. We need to change our plan to accommodate them. Also can you contact the Agency about drawing up a new contract for Mr Haywood that will include his relatives? Also don't be afraid to drop the hint that with the extra measures we have to take we could do with another two staff members. Not highly qualified, basic SIA training will do, but I think we're going to need someone.\"\n\n\"Got'cha,\" Emma says, her voice cheery as usual despite the extra stress that's just been dumped on your heads, \"Anything else?\"\n\n\"No, I'll see you in an hour,\" you click the radio back on to your belt and head off to the dining room.\n\n*page_break\n\nWhen you first arrived at the house it took you some time to realize there were actually three dining rooms: The one you're in now, used by the staff for casual (usually rushed) meals. A much smaller and more intimate one you know Mr Haywood favours. Then the one you're heading to now, the big fancy dining hall (or the 'reception' dining hall) because it's the one used for special or important occasions.\n\nIt's situated in one of the long arms of the house that stretches around the pool, so both east and west walls face out onto the grounds. The roof and walls alike are a tinted glass, so being in the room is almost like being outside. \n\nThe furniture's very modern, but with obvious Victorian influences. The table may be sheer glass, but it's absurdly long with bronze clawed feet. The decor is clearly Renaissance inspired too. A painting on the wall uses a very soft colour palette with gentle brush strokes, the female subject reclining like a Greek goddess, but her make up's thick and her clothes tight and low cut, marrying modern fashion with a classic painting style.\n\n*page_break\n\n*if (rob >=10)\n\n\tYou're so absorbed in the painting you jump when the door opens to the dining hall.\n\n\t\"Rob, you surprised me,\" You surprise him in return, he looks at you and drops everything he's holding.\n\n\t\"${name}.\" he just blinks at you, turning red in the face yet again. He looks down at his feet and  only then does he seem to realize he's not holding anything anymore. \"Urgh I'm such a klutz sometimes.\" he complains, turning redder and bending down.\n\n\t*choice\n\t\t#Rush over to help him.\n\t\t\t*gosub end_trial\n\t\t\t\"It's okay,\" you say hurrying over and bending down as he does, you bang your heads together.\n\n\t\t\t\"Ah,\" he looks up at you, if possible turning even redder, \"${name}, I'm so sorry. Do you need ice? What can I do? I can't believe I did that!\"\n\n\t\t\t\"It's fine, really,\" You smile at him, trying to put a stop to his little tizzy. \"No big deal,\" You start to pick up the cleaning equipment on the floor, Rob still stammering at you.\n\n\t\t\tRolling your eyes, you stand and set all his stuff down on the long table.\n\n\t\t\t\"Actually if you want to make it up to me you can help me for a sec,\" you say, an idea occurring to you to cut your work short.\n\n\t\t\t\"What could I possibly do?\" Rob asked, nervousness making him bite his lip.\n\t\t\t*set rob %+10\n\t\t\t*goto twentyfour\n\t\t#Stay where you are.\n\t\t\t*gosub end_trial\n\t\t\tYou turn your attention away from him and back to your task, striding into the corner to check the mains connection.\n\n\t\t\tYou stride back over to the table where Rob is piling up his dropped stuff, some of it falling back to the floor in his fumbling.\n\t\t\t*set rob %-10\n\t\t\t*goto twentyfour\n*else\n\n\t\"Oh ${name}, Hi.\" You turn to see Rob coming in much less jittery that the last time you saw him.\n\n\t\"Evening,\" You greet him, snapping out of your awed reverie. You can see that he's struggling quite a bit trying to carry all the equipment he's holding.\n\n\t*choice\n\t\t#Go take a few items off him.\n\t\t\t*gosub end_trial\n\t\t\t\"Here, let me take something,\" You go over to him and unhook a bucket from one of his arms and pry a litre bottle of cleaning fluid out of his hands and go to set them on the table.\n\n\t\t\t\"Thank you.\" Rob flushes and stumbles after you, setting his armful down next to yours.\n\t\t\t*set rob %+10\n\t\t\t*goto twentyfour\n\t\t#Don't help.\n\t\t\t*gosub end_trial\n\t\t\tYou turn your attention away from him and back to your task, striding into the corner to check the mains connection.\n\n\t\t\tYou stride back over to the table where Rob is piling up his stuff, some of it falling to the floor in his fumbling.\n\t\t\t*set rob %-10\n\t\t\t*goto twentyfour\n*label twentyfour\n\"You usually work in here, Yes?\" you ask.\n\nRobs puppy eyes are wide in uncertainty, \"Yes.\" his reply is unsure.\n\n\"You've been working in here today yes?\" he nods, \"Have you done anything with the cameras?\"\n\nHis face flushes and he runs his hands nervously through his hair, pulling his tail out of place, \"Oh no. Did I break something? I am so sorry. I was working earlier when I tripped over a wire and I pulled it out the back of the camera up there.\" he points a shaky finger to next to the door. \"I put it back in again, I thought I fixed it. I'm so sorry.\"\n\nThrough his babbling, on closer inspection you find that while Rob had reconnected the camera, some of the prongs for the plug were bent. It's simply a case of straightening them out.\n\n\"How much is it going to cost to fix?\" Rob asks nervously, peering over your shoulder.\n\nJust then Emma's voice crackles away from your radio, \"It's working again now. Thanks.\"\n\nRob visibly breathes a sigh of relief and smiles sheepishly at you, \"I'm really sorry you know.\"\n*temp frog false\n*choice\n\t#\"It's no problem.\"\n\t\tYou smile at him. \"It was easily fixed, no harm done. But next time let one of us know just in case.\"\n\n\t\t\"Rob grins and nods emphatically, \"Yes, you're right. I will.\"\n\t\t*set rob %+10\n\t\t*temp frog true\n\t\t*goto twentyfive\n\t#\"Please don't create any more work for me.\"\n\t\tRob hangs his head guiltily, \"I'm really sorry. I tried to fix it.\"\n\t\t*set rob %-10\n\t\t*goto twentyfive\n\t#Remain silent\n\t\tRob blinks at you, clearly unsure of what you're thinking.\n\t\t*goto twentyfive\n\n*label twentyfive\n\n\"Is that all you were here for?\" Rob asks, looking abashed, \"I'm still really sorry I didn't tell anyone. I just find all you guys so intimidating. You work so hard at what you do, and you're all so stony-faced - it's kind of scary. Anyway, I'm actually on break, I came looking for you to say 'Hi' again because you seemed really friendly when we spoke earlier and I thought you might have a bit of time since I'm technically on break. Anyway, I can see you're working. I'm sorry. I'll just get on.\"\n\n*label twentysix\n*choice\n\t*disable_reuse #I'd love to stay at be a bit sociable, but I do actually have work to.\n\t\t\"Ah,\" Robs ears practically droop, \"I know. You guys have so much work to do. I'm really really sorry to bother you and all. I just thought... Oh never mind. I tend not to think very much I guess.\"\n\n\t\t\"Work comes first,\" you shrug.\n\n\t\tJust then your radio crackles to life, Emma as usual, \"Hi ${name}. I'm afraid Stephan and Joe are having a rota issue. Easily solved issue, but it's stress you just don't need so stay away from the office for a bit. I'll just sort it quick.\"\n\n\t\tLooks like you have to not work for just a little bit.\n\t\t*set rob %+5\n\t\t*set career %+10\n\t\t*goto twentysix\n\t#That's nice, I really appreciate him trying to be friendly. I'll stay for a bit and chat.\n\t\t*set rob %+ 10\n\t\t*goto twentyseven\n\t#Even If I didn't have work I don't think I would stay. I find Rob rather, what's the word? Annoying.\n\t\t\"Sorry Rob no can do,\" You can't even think of an excuse to fill the silence, you just leave.\n\t\t*set rob %-25\n\t\t*goto sixteen\n\n*label twentyseven\n\n\"It couldn't hurt to have a bit of a break.\" you smile at him, and he smiles back.\n\n\"I'll go get some tea,\" and before you can even open your mouth he's out the room.\n\nWhat do you think of him?\n*choice\n\t#It's nice to have someone make the effort to be my friend, I've been here four months and since then everything has been about work.\n\t\tYes, it's nice to have friends.\n\t\t*set rob %+10\n\t\t*goto twentyeight\n\t#He is so cute, despite his bumbling I find him very attractive. Can't wait to spend some more time around him and find out how much we have in common.\n\t\tThe budding of new romance perhaps? Very exciting.\n\t\t*set rob %+10\n\t\t*set rob1 true\n\t\t*goto twentyeight\n\t#I find him very annoying. I actually don't even know why I'm still here.\n\t\tWell neither do I then, you'd probably better leave before you hurt his feelings.\n\t\t*set rob %-30\n\t\t*goto sixteen\n*label twentyeight\nUnsure of what else to do with yourself you go and sit at the closest end of the long dining table.\n\nIt doesn't take Rob long to come back with the tea and some chocolate biscuits. You notice he must have already had one as there is a chocolate smear on the corner of his mouth.\n\n\"Thanks,\" You smile at him as he sits opposite you on the table, \"So you said you find us intimidating?\" you start, chuckling internally at the expression on his face.\n\n\"I just meant that -\" Rob stutters and stops.\n\n*choice\n\t#\"That we walk around all stony-faced and silent like in a bad action film?\"\n\t\t\"No not at all just that,\" he stops for a moment to think.\n\t\t*set rob %+5\n\t\t*goto twentynine\n\t#\"You find me intimidating?\"\n\t\t\"A little,\" he admits sheepishly, \"But more than that...\" he stops for a moment, clearly considering his next words carefully.\n\t\t*set rob %+5\n\t\t*goto twentynine\n\t#\"What we're having to be here for makes you nervous, not us per say?\"\n\t\t\"I guess that too,\" he admits, \"I can't deny the idea of kidnappers is a bit unnerving.\"\n\t\t*set rob %+10\n\t\t*goto twentynine\n\t#\"That you're frightened of guns?\"\n\t\t\"Are you making fun of me?\" he looks hurt, \"Just because I'm a bit jittery doesn't mean you can do that you know.\" He stays silent for a second before moving on.\n\t\t*set rob %-10\n\t\t*goto twentynine\n*label twentynine\n\"It's more that you're all just so focused and work so hard. I've never seen such,\" he pauses, \"Diligence I guess. And what you do is so amazing. Protecting people the way you do is pretty cool.\"\n\nYou neglect to mention to him, considering you're a private contractor, how much your protection actually costs. It makes you sound much less Samaritan than he seems to think you are.\n\nTime for you to get off the subject maybe?\n*choice\n\t#\"What about your work? Diligence applies to every profession.\"\n\t\tHe shrugs, \"I work to live not the other way around. I admire you guys' commitment to your jobs. Not that I don't work hard, but I'm not really in a position to be that way.\"\n\n\t\t\"Why not?\" you ask, watching his hands twitch towards the biscuit plate like he's nervous you might tell him off.\n\n\t\t\"I've not got the freedom to commit to something like that really.\"\n\n\t\t\"Tell me about it?\"\n\t\t*set rob %+8\n\t\t*goto thirty\n\t#\"Tell me more about you?\"\n\t\t\"What would you like to know?\" he ask mischievously, making his eyes sparkle in a way you haven't seen before.\n\n\t\t\"Anything,\"\n\n\t\t\"My life is going to seem pretty dull in comparison to yours, my job's pretty boring.\"\n\n\t\t\"Why do you do it then?\" you press, watching him curiously across the table as he eyes the plate of biscuits.\n\t\t*set rob %+13\n\t\t*goto thirty\n\t#\"Why are you making such an effort if I intimidate you?\"\n\t\t\"I didn't say that, it sounds really mean.\" Rob blushes, \"Don't twist what I say like that.\"\n\n\t\tThere's a brief silence.\n\n\t\t\"Anyway,\" Rob continues, avoiding your eyes and clearly no longer very comfortable with you, \"I'll clean this tea up, we really shouldn't be relaxing in here. I'll see you around the house.\"\n\n\t\tWith that he whips the cup away and takes the tray out the door without so much of a backwards glance at you.\n\t\t*set rob %-10\n\t\t*goto sixteen\n\n*label thirty\n\nHe snatches a biscuit lightning fast and it disappears into his mouth.\n\n\"You really wanna know?\" he asks, mouth full of biscuit, you chuckle at him and nod, as he offers you the biscuit plate.\n\n\"It's quite the sob story, would you like some sustenance?\"\n\n*choice\n\t#Take a biscuit\n\t\t*if (gender = false)\n\t\t\t\"Good man,\" Rob smiles at you, \"It's good to see you understand the importance of chocolate biscuits.\"\n\t\t\t*set rob %+5\n\t\t\t*goto thirtyone\n\t\t*else\n\t\t\t\"Good woman,\" Rob smiles at you, \"It's good to see you understand the importance of chocolate biscuits.\"\n\t\t\t*set rob %+5\n\t\t\t*goto thirtyone\n\t#Reject the biscuit\n\t\t\"You clearly need to be educated in the importance of chocolate biscuits.\" he chides, taking the plate away from you.\n\t\t*set rob %-5\n\t\t*goto thirtyone\n*label thirtyone\nHe takes another for himself and settles back in his chair, \"I feel kind of bad even saying this, but unfortunately I have a little girl I have to support, so I can't get rid of my income and my education is, well, non-existent, so I'm kind of stuck here. Don't get me wrong, I wouldn't trade her for the world. But I kind of wish I had the freedom to go for a job I care about.\"\n\n\n*choice\n\t#\"But you don't look old enough to have a little girl!\"\n\t\tA boyish grin cracks across Robs face and lets out a surprisingly deep chesty chuckle, \"You're damn right she is! I'm only seventeen. Sorry I explained that badly, she's my sister, not daughter.\"\n\n\t\t\"Why are you looking after her then? Surely your Mum and Dad should be doing that?\"\n\t\t*set rob %+5\n\t\t*goto thirtytwo\n\t#\"Why can't the mother help care for her?\"\n\t\t\"Oh, sorry I explained that badly. She's my little sister. Our parents are gone.\"\n\n\t\t\"How?\" you ask, rendered a little speechless by his admission.\n\t\t*set rob %+8\n\t\t*goto thirtytwo\n\t#\"You chose to have her, you do her a disservice by calling her 'unfortunate'.\"\n\t\tRob looks at you, a glint of hurt in his eyes, \"I know you're right. I feel evil even thinking the word 'unfortunate', about her. You're wrong about one thing though, she's my little sister. I had no agency in the choice to bring her into the world.\"\n\n\t\t\"Oh,\" your telling off dies on your tongue, it changes quite a lot if he is caring for her in place of the parents, \"How did that happen?\" you blurt.\n\t\t*set rob %+10\n\t\t*goto thirtytwo\n\n*label thirtytwo\n\n\"Unfortunately they died two years ago. Just been me and little Anna since then, she's the cutest thing!\"\n\nHe sits up a bit to pull a wallet out of his back pocket and pulls out a crumpled polaroid to show you. Without rose tinted glasses on, you can see she is a pretty ordinary kid. She looks to be about six, a little pudgy in her mud spattered dungarees with her blonde hair done up in two bobble-tied pig tails. Her hands are blue with paint and there's a piece of paper next to her filled with multi-coloured hand prints.\n\n\"She's such a little artist,\" Rob proclaims, \"Light of my life, that girl.\" he takes the picture back from you and looks at it smiling for a few seconds.\n\nThen he seems to remember himself and slips it back into his wallet, \"Sorry. I just love that girl to pieces. I could go on and on about her for days. But I won't.\"\n*choice\n\t#\"I can see why you do, she looks too adorable!\"\n\t\t\"I know, I love her little pig tails. I'm going to cry and cry the day she grows out of them!\"\n\t\t*set rob %+8\n\t\t*goto thirtythree\n\t#\"You do an amazing thing by looking after her you know.\"\n\t\t\"You really think so?\"\n\n\t\t\"I do,\" you nod encouragingly, \"She's really lucky to have you.\"\n\t\t*set rob %+15\n\t\t*goto thirtythree\n\t#\"Don't you have other relatives who can look after her? Doing it yourself is really holding you back.\"\n\t\t\"Even if I did have relatives I wouldn't give her up for anything.\" Rob's so defensive you can practically see his hackles rise and his voice has gone from a light carefree tone to a defensive one, \"How can you say protecting someone is holding you back? Just because you get paid for it doesn't make what you do better than what I do.\"\n\t\t*set rob %-25\n\t\t*goto thirtythree\n\t#\"Please go on about her, I'd love to hear more.\"\n\t\t\"I'll bring in some photos of some of her drawings! They are so cute, I can show you a picture she did of me and you'll be able to see she's really good.\"\n\t\t*set rob %+5\n\t\t*goto thirtythree\n\t#\"You know you say you respect me and my team for what we do, but I have to say I think what you're doing is more worthwhile.\"\n\t\tRob blushes fiercely, \"Thank you, I really appreciate you saying that. I know my job is nothing to be super proud of. But it's all for her, and it makes it worth it.\"\n\t\t*set rob %+20\n\t\t*goto thirtythree\n\n*label thirtythree\nYour radio buzzes to life on your hip and Emma's voice crackles through the room, \"We're all sorted here if you want to come back and plan for tomorrow.\"\n\nYou unclip the radio and reply, \"Okay I'll be right there.\"\n\n\"Always working,\" Rob chips in, grinning at you as he starts to stack up your tea things.\n\n\"Of course,\" You reply, grinning wistfully as he takes your half drunk cup away, \"Thank you for the tea.\"\n*if (rob >=65) and (rob1 = true)\n\t\"It was my pleasure.\" he replies, he pauses as he stacks up the tea tray, \"I would.\" he stops, \"I would really like to see you again.\" he stops again, \"Soon.\" he finishes lamely.\n\n\t\"Sure.\" You smile up at him despite the fact he's averting his eyes.\n\n\t\"Really?\" he asks incredulously.\n\n\t\"Yeah we've had a nice chat, we should do it again sometime.\" You look confusedly at him as he mumbles something under his breath, \"What was that?\" you ask.\n\n\t\"I said...\" he pauses, \"Never mind.\" and with that he picks up the tea tray and rushes out the room, leaving you sitting dumbfounded.\n\n\tStanding you make your way back to your office, smiling to yourself all the way.\n\t*finish\n*elseif (rob >=65) and (rob1 =false)\n\t\"No problem, made for a nice break,\" Rob smiles at you, \"I don't have many friends here, so it's nice to have someone to talk to.\"\n\n\t\"Well feel free to come seek me out anytime,\" you smile, \"I'll see you around.\"\n\n\t\"Great,\" Rob gives you a final smile and you leave, both headed off to your respective jobs in a good mood.\n\t*finish\n*else\n\t\"It's okay. I'll just see you round sometime.\" Rob smiles politely at you and takes the tea tray away.\n\n\tYou stand and make your way back to Emma, your mind pouring over the plans for tomorrow.\n\t*finish\n\n\n*label end_trial\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first chapter is available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n*purchase_discount adfree 2022-02-23 $4.99 $2.99 purchased\n*abort", "protect2": "You wake the next morning as normal, not to your alarm but to the buzzing of your radio.\n\nUrgh, it kind of annoys you when Emma bothers you in the morning like this, she can sleep during the day when you go out, but you don't have that luxury. \n\n\"${name}? Wake up. Sorry about this but I need your help.\"\n\n\"What is it?\" you ask groggily, shuffling your top half out of bed to reach your radio.\n\n\"Joe is really badly ill, I need someone to cover her perimeter check.\"\n\nYou eye the clock. It's four AM. \n\n*choice\n\t#You aren't doing a perimeter search right now, it's insane. You don't believe that Joe is ill, just tired. Everyone is under stress, she's just going to have to buck up and do her damn job.\n\t\tYou tell Emma to sort Joe out, and get her to do her job. Then you pull the pillow over your head and try to catch a few more hours of shut eye.\n\t\t*set career %-15\n\t\t*goto one\n\t#You tell Emma to get someone else to do the search, and to radio you only if you are the last option to do it: you're going to get sick yourself if you aren't careful and push yourself too hard.\n\t\tEmma's reluctant to wake anyone else up and you have to gently remind her that if she works you into the ground and you get so sick that you can't work, the contract will be lost. \n\n\t\tAfter that she seems much more willing to call around and you slink back into bed hoping you can fall back to sleep again.\n\t\t*set career %+8\n\t\t*goto one\n\t#You drag yourself out of bed. You may hate it right this second, but this is your job and one of the reasons you get paid so well is because of stuff like this.\n\t\tCombing your fingers through your hair, you roll out of bed and start throwing on your clothes.\n\t\t*set career %+13\n\t\t*goto one\n\t#You pull yourself up to go check on Joe. You'll see how sick she really is. If she is sick you'll happily help - but only if she's really sick.\n\t\tCombing your fingers through your hair, you roll out of bed and start throwing on your clothes.\n\t\t*set career %+10\n\t\t*goto one\n\n*label one\nA few minutes later a knock at the door makes you jump. Why does no one in this house want to do anything at a normal time?\n\n\"${name}? Are you still in there? Emma informed me you were awake.\" Mr Haywood's voice drifts through your room. \n*page_break\n*if (chris1 = true)\n\tYou freeze. First the weird time spent with Mr Haywood the day before, now this?\n\n\tYou can feel your heart pounding in your chest just at the thought, the two of you are getting closer and closer all the time. On the one hand you know you shouldn't feel anything for him, on the other you can't seem to help yourself seeing more than an employer in him, and it gets worse the more you learn about him.\n\n\tAll you can do now is fumble your way through the dark and hope your bed-head doesn't make you look completely deranged as you open the door. \n\t*goto zero\n*else\n\tYou hop towards the door half in and out of your trousers. Feeling incredibly unprofessional with your hair sticking up everywhere and a pillow print still on your face, you open the door for him.\n\t*goto zero\n*label zero\n\n\"Mr Haywood,\" you bow your head respectfully, marveling at him, dressed in a full suit with his hair perfectly swept back even at this time.\n\n\"${name}, I've informed Emma to find someone else for your early morning task. I have something else in mind for you.\"\n\n\"Of course\" you reply, thinking that the second your contract ends, you're taking a very long holiday.\n\n*if (chris1 = true)\n\tMr Haywood offers you an arm, which you blink at uncertainly. \n\n\tYou realize with a sudden jolt that he wants you to take it.\n\t*choice\n\t\t#Take it.\n\t\t\tDoing away with the last of your propriety you link your arm through his, wishing you looked half as composed as him so early.\n\n\t\t\tYou glance at him and realize he's smiling at you, his free hand traces a quick line down your face, \"I'm glad you're awake.\"\n\n\t\t\t\"I wasn't untill a few seconds ago,\" you reply, which makes him laugh as he starts to lead you down the corridor.\n\t\t\t*set chris %+5\n\t\t\t*goto three\n\t\t#Don't, yesterday was a mistake. I need to get my head straight again. \n\t\t\tHe holds his arm out insistently to you. You pull your arms very obviously away from him, cursing yourself for letting things get too far yesterday.\n\n\t\t\tYour eyes meet his and with a flash of annoyance, Mr Haywood turns away from you.\n\t\t\t*set chris1 false\n\t\t\t*set chris %-20\n\t\t\t*goto two\n*else\n\t*goto two\n\n*label two\nMr Haywood motions down the corridor and you fall into step beside him, wondering what could possibly be important enough to disturb you this early.\n\nYou follow him to his home office.\n\nHe motions for you to sit on the chair in front of his desk.\n\n\"Would you like a drink?\"\n\n\"No.\" You reply, your stomach not really used to having to work at this time of day, \"I won't stay long, just let me know the problem and I will go and deal with it immediately.\"\n\n*page_break\n*label five\n\n\"Ever efficient.\" Mr Haywood toasts you with a coffee cup and settles himself behind his desk, \"The first thing I had to talk to you about is a message I recieved from my mother after we parted yesterday. It seems that it isn't just my brother and mother visiting, there is also a third party.\"\n\n\"Oh?\"\n\n\"I wish I knew,\" Mr Haywood says, anticipating your question, \"My mother refuses to say, but insists that it is a good idea, regardless of what I think or how much it may inconvenience you.\"\n\nYou stay si
