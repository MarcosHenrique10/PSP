ng a little bit parent-ish just asking.\n\n\tRob brushes off the question and moves on, evidently not wanting to talk about it, \"Anyway, I have the day to practice, hinges a little rusty and all. So we should probably get on.\"\n\n\tHe ducks back behind the bar and you're left to your own preparations.\n\t*page_break\n\t*goto seven\n*else\n\tRob sees you, only inclining his head before he ducks back behind the bar.\n\t*goto seven\n*label seven\nYou spend the whole day setting up cameras and negotiating memorising faces of the staff. It's boring work, but it seems to be over fast because you need to get changed for the evening.\n\nChristopher didn't seem to care that originally your staff were planning on wearing your easy-to-move-in and not particularly smart work gear, but since Rebecca found out, you and your staff have all been given \"appropriate clothing.\"\n\n*if (gender=true)\n\tRebecca was originally determined you wear a dress. But since that would have impeded your work, Christopher put his foot down there.\n\t*goto eight\n*else\n\t*goto eight\n*label eight\n*page_break\nYou hide in the bathroom for a few minutes and emerge feeling a very different person. You're wearing a fitted black suit with tails and a dickie, black dress shoes shined so you can almost see your own reflection. The suits seem to have been specially made because there are holsters in the jacket for your equipment, all sewn in for your convenience. \n\nWhen you leave, you see Emma shifting uncomfortably in her matching outfit.\n\n*if (chris1=false)\n\t\"I feel like a penguin,\" she complains as you approach.\n\n\t\"But a very pretty penguin.\" you tease as you fiddle with your own too-tight dickie.\n\n\t\"A band of very pretty penguins.\" Emma quips, gesturing to the staff who've come ahead with her.\n\n\t\"Hopefully they're also ready?\" you ask as you and Emma make your way to the monitor room.\n\n\t\"100%\" Emma says, tearing off her offending dickie as soon as the two of you are out of sight. \"Remind me what you're going be doing this evening?\"\n\t*goto rose\n*else\n\tShe approaches you awkwardly, looking over your shoulder as if just meeting your eyes will upset her.\n\n\t\"Apologies, but I need reminding of your role this evening.\" she says, shifting uncomfortably in a suit that matches yours.\n\t*goto rose\n\n*label rose\n*page_break\n*if (chris1=true)\n\t\"I'll be on Christopher's guard.\"\n\t*set secchris +5\n\t*goto nine\n*elseif (rebplot=true)\n\t\"I'll be on Rebecca's guard.\"\n\t*set secreb +5\n\t*goto nine\n*elseif (opalplot=true)\n\t\"I'll be on Opal's guard.\"\n\t*set secopal +5\n\t*goto nine\n*elseif (alex1=true)or(alex>50)\n\t\"I'll be on Alex's guard\"\n\t*set secalex +5\n\t*goto nine\n*else\n\t\"I'll just do general patrols and periodically check in with you.\"\n\t*set cameras +1\n\t*goto nine\n\n*label nine\n\n\"Okay,\" Emma says as the two of you check your radios, \"You'd better get out there, they'll be arriving soon.\"\n\nShe's right, so you slip out of the monitor room and head off to the front of the building where all the cars will be arriving.\n*if (rob>50)\n\tOn your way past him Rob gives you a thumbs up, now in the same outfit as yourself. He takes no time in dropping the cloth he's holding. You wave back but don't stop.\n\t*goto ten\n*else\n\t*goto ten\n*label ten\n*page_break\n*if (secreb\u003c3)\n\t*set continuity true\n\t*goto nextplease\n*else\n\t*goto nextplease\n*label nextplease\nIt doesn't take long for guests to start arriving. All rich business partners or customers of Christopher with their spouses. They give you and your staff wary looks as they go on past into the Grand Hall.\n\nYou look through the windows to see them awkwardly milling around inside, too sober to dance.\n\nBy the time your charges arrive, the hall is quite full and the alcohol flowing freely.\n\n*page_break\n\nYou step up to open the door for them and offer your hand to help each of them up and out.\n\nChristopher looks much the same as he always does in his suit, whereas Alex looks almost funny. He seems so out of place with his bowtie lopsided and his shirt a little untucked.\n\nRebecca looks her usual self in a delicate chiffon gown in her signature blue. Opal however, clearly takes the cake, look stunning in a trailing ivory dress with purple flowers embroidered over one arm and down her chest to hug her waist.\n\n\"Alex,\" Rebecca seems exasperated as she tucks in his shirt, making Alex run his hand through his already electric-shock hair, \"At least try pretending like you want to be here.\"\n\n\"None of you have to be here mother,\" Christopher cuts in,\" This is, after all, a work function.\"\n\n\"Nonsense.\" Rebecca says brushing imaginary dust off Alex's shoulders, \"Aren't you going to escort Opal?\" she continues, looking pointedly at her son.\n*page_break\n*if (chris1=true)\n\t*goto eleven\n*else\n\t*goto twelve\n*label twelve\nChristopher appraises Opal, his eyes running over her body, \"Perhaps Opal would like to find me later.\" he says simply before turning and walking off alone.\n\nRebecca shakes her head as her cheeks redden.\n*page_break\n\"He's so rude. I apologise, Opal.\"\n\n\"No trouble.\" Opal smiles, lighting up her face, \"He is like all men. If you ask him to do something you can guarantee he won't do it, even if he wants to.\"\n\nRebecca laughs. You turn to Alex, expecting him to look a little offended, only to realize he's drifted off into his own little world again.\n\n\"Daddy should be here already anyway. I shall go and says hello to him before I find Christopher.\"\n*if (opalplot=true)\n\t*goto thirteen\n*else\n\t*goto fourteen\n*label fourteen\n*page_break\nThere is an awkward silence after Opal leaves between Alex and Rebecca.\n\nYou suddenly realize you've never seen Rebecca truly nervous before. She looks like a little girl trying to talk to her own son, completely unsure of herself.\n\n\"How was the play last night?\" Rebecca asks, tentatively threading her arm through his.\n\nAlex doesn't draw his arm back, but he doesn't tighten it around his mother's either.\n*page_break\n\"Fine thank you Mother,\" he says stiffly, while he and Rebecca walk through the great double doors, you keeping close behind.\n\nRebecca seems at a loss for what to say, and Alex doesn't seem much interested in saying anything either.\n\nAfter a few seconds of standing awkwardly, he unhooks himself from her and excuses himself.\n*if (secalex>4)\n\t*goto fifteen\n*if (secreb>4)\n\t*goto sixteen\n*else\n\t*goto seventeen\n*label eleven\nYou rush off after Christopher, almost losing him in the hall. Luckily he's waylaid by guests and you manage to catch up to him.\n\nHis face is as unreadable as ever. He spends an hour wading through the sea of guests, being greeted by every single one. You follow close at his shoulder, close enough that his hand reaches out and brushes your own a couple of times. You can't say whether on purpose or by accident.\n\nFinally Christopher fights his way though the crowd, grabs a favoured glass of brandy from Rob and escapes up the spiral stairs to the balcony.\n*page_break\n\nYou follow him, but when the two of you are alone on the balcony together you aren't sure whether to approach him or stand at the door like you're supposed to.\n\nChristopher makes it plain what he wants by holding his hand out to you.\n\n\"${name}, I'm watching on the camera. You can't seriously be considering indulging this relationship now?\" Emma sounds angrier in your ear than you have ever heard her.\n\nYou reach your finger up to your head set and flick the button onto mute. You chose to be with Christopher a long time ago.\n*set career 1\n*page_break\nYou take his hand and he pulls you into his arms and sweeps you around, bending you over backwards and kissing you deeply, his breath hot on your lips.\n\n\"Don't worry about her,\" he says, standing you up but not letting go of you, \"I have spoken to your agency to express how thrilled I am at your performance. So very thrilled...\" he trails off as his fingers pull lightly on your dickie, tugging it aside so he can kiss your neck gently.\n\nSuddenly, taking you by the waist, he lifts you into one of the balcony chairs and stands before you holding your hand, \"Before anything else happens between us I want to thank you. I know how risky this relationship with me has been for you. I do not wish to ask you to risk yourself any more, so to that end...\"\n\nThen he's on one knee in front of you, grasping your hand tightly, his eyes wavering in uncertainty.\n\n*fake_choice\n\t#\"Yes!\"\n\t#\"Wait, what's going on?\"\n\t#\"No!\"\n\n\"Calm down, my love,\" Christopher runs one of his hands down your cheek, \"I don't want anything from you. The opposite, I want to give to you. The position you're in right now is precarious, I don't want you to worry. So this is me giving myself to you. Whatever you want to make you feel safe. You want to get married so it doesn't matter if you lose your job? If it will show you I'm here to support you then I want to do it for you.\"\n\nWhat do you think of this?\"\n*choice\n\t#I would feel safer married to him.\n\t\t\"So are you asking me to marry you?\" you ask, still unsure.\n\n\t\t\"If you want me to ask you then you have only to say so.\"\n\n\t\tYour breathing sounds so loud in your own ears, and it's hard to talk but you manage to whisper to him, \"Ask me then.\"\n\n\t\tA smile spreads across Christopher's face and he pulls you to your feet, \"I will. I promise. Simply give me time to find a ring worthy of your hand.\" he kisses your knuckles.\n\t\t*set chris %+5\n\t\t*goto eighteen\n\t#I appreciate that he's trying to eliminate my difficulties. But this is too much.\n\t\t\"You don't need to marry me,\" you say, squeezing Christopher's hands tightly, \"I trust us, with or without a ring.\"\n\n\t\tA moment of dejection flashes across Christopher's face, but at your reassurance he lights back up again, \"I'm happy that you trust me so much.\"\n\n\t\tHe lifts you to your feet and offers you his arm.\n\t\t*set chris %+3\n\t\t*goto eighteen\n\t#This is exactly what I've been waiting for.\n\t\t\"That's what I want.\" you blurt.\n\n\t\t\"Christopher smiles at your eagerness and pulls you to your feet, \"Then give me time to find a ring worthy of the hand I'll be taking.\"\n\t\t*set chris %+5\n\t\t*goto eighteen\n\t#This is getting crazy serious. I want out.\n\t\tYou stand abruptly, knocking Christopher off his knee, \"I...\" you find yourself stammering. You weren't expecting this.\n\n\t\t\"${name}, what's wrong?\"\n\n\t\t\"I don't want this.\" you blurt, \"This is too crazy. It's over, don't - never again.\"\n\n\t\tYou run from the balcony, snatching your hand out of Christopher's as he tries to grab you.\n\t\t*set chris %-15\n\t\t*set dumpc true\n\t\t*goto nineteen\n\n*label eighteen\n\"Now that I have my big question out the way, would you care for a walk in the gardens?\"\n\nYou take his arm and allow him to escort you down the stairs. When you reach the bottom of the stairs you see Opal engaged in fierce conversation with a stern looking old man. From his strong face and beautiful amber eyes he looks to be her father.\n\nAt the sight of you and Christopher arm in arm his jaw tightens in anger.\n\nWithout even a polite 'Hello', you and Christopher slip out the door to the gardens at the bottom of the stairs.\n*page_break\n\nYou start to walk off through the gardens, but you hear Opal come through the door behind you.\n\nChristopher smiles muttering \"Stubborn.\" Then you hear a choking wail from around the corner.\n\nComing around it, you see a swaying Rebecca crying pathetically in front of a cold Alex.\n\n*goto showdown\n\n*label nineteen\nYou rush down the stairs and fall over your own feet landing in a heap at the bottom. You're cradling a painful ankle, crouching behind the banister of the stairs when you hear some voices, pulled off to the side of the room.\n\n\"You find him have to say.\n\t\t\"Suit yourself,\" Alex shrugs, letting go of your shoulder, \"Bye,\" he says, swanning off with his usual misty far off look in his eyes.\n\n\t\tBut he doesn't get far, you both hear a pathetic choke and turn to see Rebecca stumbling towards you.\n\t\t*goto showdown\n\t\n*label 101\n\"Good,\" Alex says absently, leading you to sit on a bench in the garden, \"Look I have something I want to tell you.\"\n\n\"What?\"\n\n\"I want you to ask yourself if you really trust Christopher,\" Alex holds up his hand to stop you from talking, \"No, I don't want you to tell me, I want you to ask yourself that when I tell you what I'm about to tell you.\" Alex settles himself back onto the seat, \"He's lying to you about that will. Don't deny you're looking for it, I know exactly what's going on. I might not care to get involved myself but it doesn't mean I don't see what everyone else is doing. That will entitles him to nothing. He wants to find it so he can get rid of it because he knows it would take everything away from him. I know what that will said because I know Father didn't want to leave Mother anything but he had to - although I don't know why.\"\n*choice\n\t#\"Why are you telling me this?\"\n\t\t\"Because I had a feeling Christopher lied to you. I may not care about who inherits what, but I would hate to see you, well anyone really, be with someone who I knew was lying to them. I thought it was just right you knew.\"\n\t\t*goto 102\n\t#\"I don't believe you.\"\n\t\t\"Believe what you want,\" Alex raises his eyerbows, \"I'm not going to force you to do anything. Although you might want to consider the question 'Why would I lie?'\"\n\t\t*goto 102\n\t#\"How do you know about this?\"\n\t\t\"Because, without wishing to sound self-pitying, no one ever enters the quiet little boy in to the equation. I know most everything about this, not that I care in the slightest.\"\n\n\t\t\"I mean how do you know?\" you press.\n\n\t\t\"It doesn't matter, and I'm not going to tell you,\" Alex puffs out as if a great weight has been lifted from his chest.\n*label 102\n\"Anyway I just thought you should know.\" Alex shrugs and stands, \"Now you know you can do what you like,\" and he leaves you alone, sat on the bench.\n\nSo now you do know, what does this change?\n*choice\n\t#I definitely don't want to be with Christopher anymore. What a lying little cheat.\n\t\t*set chris %-20\n\t\t*set chris1 false\n\t\t*goto 103\n\t#I don't believe what Alex said. I still don't want to be with Christopher though, asking me to marry him was just too mad.\n\t\t*set chris %-20\n\t\t*set chris1 false\n\t\t*goto 103\n\t#I want to be with Christopher actually. I find that kind of ruthlessness sexy.\n\t\t*set chris %+10\n\t\t*goto 103\n\t#I actually wonder if I could pretend to be with Christopher long enough to find the will and then take it to Rebecca. I'm sure she'd be willing to cut some kind of deal for not destroying it. Not just Christopher that can lie.\n\t\t*set chrisdc true\n\t\t*goto 103\n*label 103\nChristopher slips out the door you hurtled out of a few minutes ago and, seeing you, smiles sheepishly.\n\n\"That was a bit strong wasn't it?\" he says coming to sit down next to you.\n*if (chris1=true)\n\t*goto 104 \n*else\n\tgoto 105\n\n*label 104\n\"Yeah,\" you say shrugging, \"I freaked out a little, but we're fine. I'm sorry.\"\n\n\"No I'm sorry, I just wanted to show you I want to look after you.\"\n\n\"I know.\" you say and Chrsitopher pulls you into a hug, crushing you against his chest.\n*page_break\nSuddenly you hear a wavering cry break the night. Pulling apart, Christopher takes your hand, \"Come on,\" you stand and turn the corner to find Rebecca weaping holding herself up on a hedge as Alex looks coldly at her.\n*goto showdown\n*label 105\n\"Yeah it was, but I'm kind of glad. I know the kind of person you are now, and I don't think we would work.\"\n\nChristopher looks taken aback, he was clearly expecting you to forgive his bumble.\n\n\"I'm sorry.\" you say, \"But this is just too much. I hope I haven't ruined the opportunity to work for you,\"\n\nChristopher looks away from you shaking his head, \"No you haven't. I will never send you away from me.\"\n*page_break\nSuddenly you hear a wavering cry in the night. The two of you stand and rush around the corner to find Rebecca weeping, swaying drunkenly. Alex is standing next to her, a blank look on his face.\n*goto showdown\n\n*label thirteen\nBowing your head politely to Rebecca and Alex you slip after Opal, keeping close by her side.\n\nShe barely even stops in the hall, slipping straight through into the Ball Room.\n\nAs she enters she is caught immediately. By his strong face and beautiful amber eyes he is unmistakably her father.\n\n\"Where's Christopher?\" he asks, pulling her sharply into an alcove.\n\n\"His mother infuriated him, I'm giving him time to cool down before I make my next move.\"\n\n\"Idiot woman.\" the man hisses, although whether talking about Opal or Rebecca you aren't sure. Opal doesn't even flinch, or ask.\n*page_break\n\"I shall simply circulate father. It is never a bad time to make friends.\"\n\n\"Good girl,\" the man says gruffly, kissing her on the forehead and letting his vice-like grip on her arm go.\n\n\"If only Rebecca wasn't here, she upsets her son so much.\" Opals tone is sly, and her eyes smile at you as her father thinks deeply.\n\n\"Then I will simply distract her.\" her father concludes, grasping his daughter's hand.\n\n\"Genius Daddy,\" Opal smiles admiringly up at him, \"I will give Christopher some time before I seek him out.\"\n\n\"There's my girl.\" Mr Sandhurst says, before he disappears into the crowd.\n\n\"Idiot.\" Opal says rolling her eyes at you.\n\n*page_break\nOpal spends the next hour mingling all the way throuh the ball room. She socialises seamlessly, disarmingly charming with the women and flirting subtly with the men. She seems to know everyone. Or, as you realize as the hour goes on, everyone who has any influence.\n\nYou simply do your job. You stand to the side as she dances and flirts, getting occasional updates on the rest of the party. But nothing seems to go amiss as the evening wares on.\n*page_break\nEventually Opal joins you at the side of the room, breathing heavily from a particularly fast number.\n\n\"I could do with some air,\" she says, her cheeks slightly flushed.\n\nYou open the door for her and follow her out onto the riverside patio. Seeing all the people out and milling around, Opal immediately turns and slips round the side of the hotel.\n\nOnce there she leans against the wall and lets out a long low sigh, \"Socialising is an essential part of this society. But it does get tiresome rather quickly.\"\n*choice\n\t#\"I wish I was part of it.\"\n\t\t\"Everyone looking in from the outside seems to feel that way. But to be in such a social world you would also have to accept that your actions would be dictated by social context. But then you could also say negative things about every way of life.\"\n\t\t*set opal %-5\n\t\t*goto twentyone1\n\t#\"It looks pretty tiring yes, I'm glad to be excluded.\"\n\t\t\"I would have to say the same...\" she runs her fingers over the hard brick of the wall.\n\t\t*set opal %+5\n\t\t*goto twentyone1\n\t#\"Well you're good at it at least.\"\n\t\t\"A small comfort,\" she says, although she lets out a chuckle.\n\t\t*set opal %+8\n\t\t*goto twentyone1\n\t#Remain silent. \n\t\t\"You don't need to be so po-faced. We are a team now. I do not want you to treat me so carefully. We are equals. I won't have it another way.\" A flash of annoyance crosses her melancholic face.\n\t\t*set opal %-7\n\t\t*goto twentyone1\n\n*label twentyone1\n\"I wish I had no part in it.\" Opal says wistfully.\n\n*choice\n\t#\"What do you mean?\"\n\t\t\"That I could be anywhere but here right now.\"\n\t\t*set opal %+5\n\t\t*goto twentytwo\n\t#\"The grass always looks greener...\"\n\t\t\"Usually because it is,\" Opal replies, her tone ast thing I'm going to give to Daddy, a marriage to a man I don't love. After that I will at least have the assets to not be under his control... Although...\" her voice finally cracks, \"If I'm honest I'm frightened of even that, because after I've achieved that goal... I've never thought of anything else my whole life. What would I do? What would be the point of me?\"\n\n*choice\n\t#\"That's not scary, that's exciting. You can finally find your own path.\"\n\t\t*set opal %+5\n\t\t*goto twentyfive1\n\t#\"You're worth a lot more than you give yourself credit for.\"\n\t\t*set opal %+10\n\t\t*goto twentyfive1\n\t#\"You're so spoiled. It will give you the chance to grow up, and you need it.\"\n\t\t\"Oh,\" Opal looks slightly taken aback by your abruptness, \"Perhaps you are right.\" she blushes hard, \"I feel rather ridiculous now...\"\n\n\t\t\"It's okay,\" you say, holding out your arm, \"Let's get on with your growing up.\"\n\t\t*set opal %-10\n\t\t*goto twentythree\n\t#Remain Silent.\n\t\t\"Please say something,\" Opal says, her big eyes pleading with you, \"No,\" Opal holds up her hand, \"Never mind. I have asked you to be yourself around me. That's simply what you're doing.\"\n\t\t*set opal %-5\n\t\t*goto twentyfive1\n*label twentyfive1\nOpal blinks up at you, \"You know what's exceptional about you?\"\n\n\"What?\"\n\n\"Everything about you makes me want something I've never wanted before.\" And suddenly her arms are around you, and her lips are against yours kissing you with a fierce need.\n*choice\n\t#Kiss her back\n\t\tYou feel her arms wrap around your neck, holding your head possessively to her. She's kissing you with the hottest passion.\n\n\t\tIn turn you slip your arms around her waist and pull her closer to you so you can almost feel the beating of her heart.\n\n\t\tWhen she pulls away her cheeks are flushed and she keeps her arms wrapped tight around you like she's frightened you're going to run. \n\t\t*goto twentyfour1\n\t#Push her off\n\t\tYou push her shoulders quite hard in your suprise and she takes a violent step back from you, \"Sorry,\" you sputter, \"It's just. I like you as a friend. Nothing more.\"\n\n\t\t\"Oh,\" Opal blushes, and for the first time since you've met her, out of all the shit she's told you, tears start to fall down her cheeks, \"I'm sorry. I've just never felt so close to anyone, I thought... Never mind.\"\n\n\t\t\"It's okay,\" you reassure her, \"No problem, I just don't want things that way. But it doesn't change anything.\"\n\n\t\t*goto twentythree\n*label twentyfour1\n*page_break\n\"I've never kissed anyone I actually wanted to before.\" Opal trails off, \"It's... perfect.\"\n\nShe gives you another brief kiss on the lips, her soft ones bumping your own, \"But we can't stay here. We have a plan to pursue.\"\n*choice\n\t#\"But what about us?\"\n\t\t*set opal %+8\n\t\t*goto twentyfive\n\t#\"You're still going to marry Christopher after this?\"\n\t\t*set opal %-15\n\t\t*goto twentyfive\n\t#\"You're right, we have things to do.\"\n\t\t\"Thank you for understanding.\"\n\t\t*set opal %+5\n\t\t*goto twentyfive\n*label twentyfive\nOpal looks up at you with sad eyes and strokes your cheek \"I can't change things because of this. I'm still stuck at my father's. I still need to break free of him. I want to be with you, but it doesn't change anything. Can you be okay with that?\"\n*label replay1\n*choice\n\t*hide_reuse #\"I can free you from your dad, I'll look after you.\"\n\t\tYou feel Opal stiffen in your arms, \"I can't do that,\" she presses her lips to yours before you can press her for more information, \"Make your choice.\" She says as she pulls away from you, \"I'll understand either way.\"\n\t\t*goto replay1\n\t#\"Yes I can, it'll be hard, but it's just physical right? I like you more than just that.\"\n\t\t*set opal %+10\n\t\t*set opal1 true\n\t\t*goto twentysix\n\t#\"No I can't, if we're going to be together you're not going to be his too.\"\n\t\t\"Not even for a little bit.\" Opal states weakly, \"I'm sorry. I should never have kissed you. But,\" she pulls a smile back on her face and lets her arms fall away from you, \"No hard feelings, we still have a business relationship.\"\n\t\t*set opal %-8\n\t\t*goto twentythree\n*label twentysix\n\"Right,\" Opals face reddens, \"Well. That's good.\" she seems unsure of how to handle herself now, and you get the feeling you're seeing a part of her no-one's ever seen before.\n\n*label twentythree\n*page_break\n\"Come then,\" Opal stands up straight and brushes off her dress, \"Lets go find Christopher.\"\n\n\"Of course,\" you naturally fall into step next to her.\n\nThe two of you search everywhere, dodging other people as best as possible. It's clear to you that Opal really wants to get the whole thing over with.\n\nHowever when you enter the entry hall to look for him the two of you run into Opal's father. He grabs her roughly by the arm and pulls her over the the stairwell, you following close behind.\n*page_break\n\"Where have you been girl?\" His face is a pleasant facade, his voice full of anger.\n\n\"In the gardens looking for Christopher.\" Opal lies without skipping a beat.\n\n\"Then you would have seen he is up on the blacony right now, and has been for the past half hour. Don't lie to me you little whore.\" his hands tighten on her arm, and you can see her skin turning pale from the pressure.\n\nWhat are you going to do?\n*choice\n\t#Nothing, what Opal does with her father is none of my business.\n\t\t*goto twentyseven\n\t#I take his hand and pull it off her arm.\n\t\t\"What are you doing?\" Mr Sandhurst demands as you pry his fingers off her arm.\n\n\t\t\"You appear to be disturbing my client.\" you say, maintining your professional facade, \"I must request you don't manhandle her... Sir,\"\n\n\t\tOpal's father looks like he is about to slap you, but you're in a public place and for all intents you're not over stepping your bounds.\n\t\t*set career %+8\n\t\t*set opal %+8\n\t\t*goto twentyseven\n\t#Tell him to back off.\n\t\t\"Get off her,\" you demand, stepping protectively close to Opal. You don't care if talking to her father like this is over stepping the line.\n\n\t\t\"You can't speak to me like that!\" Opal's father looks like steam is about to start furling out of his nose.\n\n\t\t\"${name},\" Opal shoots you a murderous look, \"Is just being silly Daddy, don't get angry, remember where we are.\"\n\n\t\tMr Sandhurst shoots you a deathly look, and turns back to Opal, his hand even tighter on her than before.\n\t\t*set career %-10\n\t\t*set opal %-10\n\t\t*goto twentyseven\n\n*label twentyseven\n*page_break\n\"Now get up there,\" Opal's father jerks his head up the stairs.\n\nOpal doesn't say anything, she simply inclines her head and starts climbing the stairs, her face blank.\n\nShe reaches the top and puts her hand on the door, and turns to you, \"I know this is your job, but you need to wait outside. He'll never break his pride by showing to witnesses he's doing what his mother wants.\"\n\n\"There's only one entrance it's fine.\" You say, taking up a place to the side of the door, guarding.\n*if (opal1=true)\n\tOpal gives you a sad look, then walks up to you. She puts her hands gently on your face and presses her forehead against yours so you can feel each others breath dancing on each others lips.\n\n\t\"I don't want to touch him.\" she says. You aren't sure whether she's asking for reassurance or reassuring you. But she lets go of your face and slips through the door before you can ask.\n\t*goto twentyeight\n*else\n\tOpal rolls her shoulders, like she's getting ready to go into a boxing ring.\n\n\t\"Wish me luck,\" she says jokingly as she slips through the door.\n*label twentyeight\nIt's quite boring waiting outside for them. You can't really hear through the door, so you simply have to stand there, checking in with Emma and wondering how it's all going.\n\nAbout half an hour later Opal leaves, shutting the door quickly behind her and practically running down the stairs.\n\n\"Come on,\" she gestures frantically to you and you follow. She stops at the bottom and pulls out a compact, fixing imperfections that are invisible to you.\n\n\"So how'd it go?\" you ask, when she doesn't say anything.\n*page_break\n\"I don't know yet, chasing him won't work. He has to think it's his idea, so he has to watch my beauty in the moonlight as I walk through the gardens alone and oh-so-vulnerable.\"\n\n\"Really?\" you ask raising your eyebrows.\n\n\"Of course. He's a typical ass, he will always think an idea is good if it's his.\" Opal slips her compact back into her clutch and walks serenely through a door at the bottom of the stairs into the garden.\n*page_break\n\nIt doesn't take long for Christopher to join you in the gardens. Opal was very right, when he gets to set the tone, stride up to her and grab her hand of his own accord he seems more than happy to do it and he does just that.\n\nGushing at her about what a fool he feels for not giving her the time of day before, blaming his mother.\n\nYou walk along behind them, trying to give them space while still doing your job when all three of you stop at the sound of a wrenching wail coming through the bushes.\n\nComing around the corner you see a swaying Rebecca stood in front of Alex as she cries loudly.\n*goto showdown\n*label fifteen\nYou fall in close behind Alex. He walks straight out into the gardens without stopping to greet anyone.\n\nYou are left with no choice but to run after him, trying not to shoulder barge anyone. Alex is already disappearing into the maze of hedges when you make it outside and you have to run after him. However he doesn't go far, simply stalking to a bench and sitting there, arms folded.\n\nYou sit next to him, not able to help wondering why he came to the party at all.\n\n\"Tell me something,\" Alex says, after a few minutes of silence, \"You always seem so in control. Just confidently holding this whole security operation together. You always seem to be where you need to be. You can see you're always using your head and that you know what you're doing. So... do you feel as confident as you look?\"\n*choice\n\t#\"Not even a little - fake it till you make it.\"\n\t\tAlex chuckles at you, \"I like the saying. I might adopt it.\" he sighs to himself,\n\t\t*goto 5\n\t#\"Hell yeah I am. I have no reason to doubt myself.\"\n\t\tAlex looks visibly taken aback by the vehemence of your conviction, \"Really?\" he asks.\n\n\t\t\"Well yeah,\" you say, with a little shrug, \"If I can't believe in myself then who else is going to?\"\n\n\t\t\"I admire that so much,\" Alex says, looking at you wistfully,\n\t\t*set alex %+5\n\t\t*goto 5\n\t#\"Sometimes I feel nervous. I work hard to look as confident as I am.\"\n\t\t\"It works pretty well,\" Alex smiles at you, \"Hell, I'm starting to think you might be the better actor out of us.\"\n\n\t\tYou chuckle at his silly joke, \"But why do you ask?\"\n\t\t*set alex %+8\n\t\t*goto 5\n\n*label 5\n\"I just want to have that confidence as part of me. I envy the way you adopt it so easily. I mean look at me, before I go on stage I have to slip on a completely different skin. How pathetic is that?\"\n\nAlex lets a silence fall between you again, but you can almost hear his thoughts churning.\n\n\"Why do you think I act?\" Alex asks, turning to you, his brow furrowed in concentration.\n*choice\n\t#\"Because you love it\"\n\t\t\"I'm sure that's what I told you myself,\" Alex says, rubbing his temples,\n\t\t*set alex %+5\n\t\t*goto 6\n\t#\"Because you're good at it\"\n\t\t\"That maybe, but it's never been why I do it,\" Alex counters,\n\t\t*goto 6\n\t#\"I don't know.\"\n\t\t\"You don't presume to know me do you?\" Alex says, a teasing note in his voice.\n\n\t\t\"Should I?\" you raise your eyebrows.\n\n*label 6\n\"I thought I loved it, but as I thought about it more I realized I don't love it. I hate it actually.\" Alex continues, \"I've realized the more I think about it, I do it because I need it.\"\n\n\"Why? you ask, slighlty taken a back by Alex's admission.\n\n\"I've spent my life ignored. No one's ever paid attention to me, what I have to say. But when I started acting, when I started showing all those emotions, people wanted to watch and listen to me then. It got to be that was the only way I knew how to express myself. This person I was on stage became more important than the person I actually am.\"\n*page_break\nAlex turns fully on the bench to look you right in the eyes,\n*if (alex1=true)\n\t\"You know why I'm telling you this?\"\n\n\tYou simply blink back at him, staring at you with such intensity. \n\n\t\"Because you're the first person whose actually asked me what I think. What I want. You've made me see how little I've been valuing my own desires...\" he trails off on the word 'desires' and your mind flashes back to that moment in his dressing room when he held you, \"I know what I want. Now I just need the courage to ask...\"\n\n\tHis voice trails off again, his face turns scarlet and he pulls at the collar of his suit.\n\t*page_break\n\t*goto 7\n*else\n\t\"So I want to thank you,\" You are the only person to value me enough to ask my opinion. So I've had to consider myself, and think about what I want. I know we havn't known each other long. But I consider you a friend.\"\n\t*goto 7\n*label 7\n\n\"You want to know what I actually want to do?\" Alex says, leaning back on the bench and looking up at the stars.\n*choice\n\t#\"You've thought about that already?\"\n\t\t*goto 8\n\t#\"If you want to tell me.\"\n\t\t*goto 8\n\t#\"Actually this is all getting a bit heavy.\"\n\t\t\"Perhaps you're right,\" Alex says, \"Perhaps it is too much for one evening.\"\n\t\t*set alex %-10\n\t\t*goto 9\n\n*label 8\n*set alex %+5\n\"Of course. I want to write. One thing I do enjoy is all the emotions I have to explore on stage. That part is fun. So rather than act in plays, I think I want to write them.\"\n\nAlex shrugs his shoulders, \"I don't know why I didn't think of that before to be honest,\" \n*label 9 \nAlex stands and stretches, \"I think it may be time to go inside and at least attempt to enjoy the party.\" he stands for a second, and you can almost see him slipping on the mask of the confident actor.\n\nYou stand up beside him and the two of you start making your way inside, when you suddenly hear a gutwrenching wail. You both turn to see Rebecca running toward you, kicking off her shoes and stumbling, clearly drunk.\n\n\"Alex,\" she says, her voice choked as she stops a few feet from you as if not sure what to do.\n*goto showdown\n\n*label sixteen\nAs Alex walks off Rebecca stretches out her arm likes she wants to grab him, but instead lets it fall by her side. For a moment she looks so dejected.\n\nThen a second later she's upright with a friendly smile on her face, almost like you imagined it.\n*choice\n\t#Ask her if she wants to talk about it.\n\t\tRebecca looks at you in suprise, like she forgot you were standing there.\n\t\t*if (reb>60)\n\t\t\tThen she cracks a smile and nods, \"Yes, you know that I would. However, first I would like a stiff drink.\"\n\t\t\t*set reb %+5\n\t\t\t*goto 1\n\t\t*else\n\t\t\tThen she shakes her head slowly, \"I don't think it would be appropriate... Although I do think I need a stiff drink.\"\n\t\t\t*set reb %-5\n\t\t\t*goto 1\n\t#Keep silent\n\t\tRebecca surveys the room, then sighs to herself and mutters something like \"All boring.\" then dusts off her dress and beckons you to stand next to her, \"I think a drink might be in order.\"\n\t\t*goto 1\n\t#Talk about something else\n\t\t\"Do you go to stuff like this often?\" you ask, clutching at straws.\n\n\t\tRebecca turns to you and smiles, evidently grateful despite your paper thin excuse for a distraction, \"I used to all the time when my husband was alive. But one tends to not get invites to events like this when one has no influence. So I haven't recently. Although I do remember the first port of call was always the bar.\" Rebecca says with a smile, beckoning you to follow her.\n\t\t*set reb %+5\n\t\t*goto 1\n*label 1\nThe two of you slip through the crowd in the main hall. Stopping regularly to make nice small talk. Most people express how pleased they are to see Rebecca again after so long.\n\nAlthough you can't help but think how hollow their expression seems when none of them have bothered to even text her in 8 years.\n\nFinally the two of you make it to the bar and Rebecca shoos two young looking people off their stools and seats herself up with her ankles crossed, patting the seat next to her for you to sit down.\n*if (rob>40)\n\t*if(gender=true)\n\t\tRob pops up from behind the bar, a big smile on his face, \"My favorite girls!\" he says, waving dorkishly.\n\t\t*goto 2\n\t*else\n\t\tRob pops up from behind the bar a big smile on his face, \"There's my favorite girl and her dashing date,\" he jokes.\n\t\t*goto 2\n\t*label 2\n\t\"I've not been a girl in a long time,\" Rebecca says, brushing off his mild flattery despite her pink cheeks.\n\n\t\"An obvious lie,\" Rob carries on teasing her.\n\t*goto 3\n*else\n\tRob pops up from behind the bar, and greets Rebecca in a very familiar way. They seem quite close, Rob is almost teasing.\n\t*goto 3\n*label 3\n*page_break\n\"Wine?\" Rob asks.\n\n\"I think something a little stronger this evening,\" Rebecca says, her eyes perusing the bar.\n\nJust then you feel a tap on your shoulder and you turn to find an elderly man. He looks familiar, but that is because he looks a lot like Opal. They have the same striking face, the same amber eyes and the same flawless skin.\n\n\"Ah, Mr Sandhurst,\" Rebecca says, turning round with a tall fruity looking something in her hand.\n\n\"I wonder if I might have a word?\" he says, chivvying you off your seat to sit next to Rebecca.\n*page_break\nIt turns out he wants to have many words. About nothing in particular as well. You're stood behind Rebecca's chair for nearly two hours listening to the most boring conversation in the history of time.\n\nYou can even see Rebecca trying to escape it, excusing herself countless times. Eventually she gives up and just sips endless fruity drinks while Mr Sandhurst talks her ear off. Everything from the stock market, to a little angst moment about his little girl Opal growing up.\n\nInterestingly enough you glean from your radio that Opal and Christopher seem to be together. You wonder if perhaps Mr Sandhurst is stalling for time, it certainly feels like it. But you can only wonder why.\n*page_break\nWhen he finally leaves, Rebecca has had quite a few drinks, enough so that she half slips off her stool and you have to catch her.\n*fake_choice\n\t#Suggest fresh air\n\t#Suggest going home\n\t#Suggest another drink\n\n\"Outside!\" Rebecca demands over the top of you.\n\nPeople around you are starting to look over at you. So you escort her out into the garden trying to support her as little as possible.\n*page_break\n\nThe moment you're outside Rebecca collapses on a bench. She looks blearily up at you slapping the bench next to her, \"Come!\"\n\nThe two of you sit in silence for a while. It's quiet outside in the gardens and you're completely alone.\n\nYou glance at Rebecca to make sure she's okay, and you realize tears are falling freely down her face, running black lines of mascara.\n\n\"Tell me ${name}, what do you think of me?\"\n*choice\n\t# \"I think you're drunk\"\n\t\t\"I'm not drunk all the time!\" Rebecca gives you a pathetic drunken slap on the arm, \"I don't need jokes or smart assery right now.\"\n\n\t\t\"What do you need?\" you ask her, wondering if the answer is going to be 'a bucket'.\n\n\t\tBut Rebecca doesn't seem to be listening to you anymore, she's off in her own world, her eyes distant.\n\t\t*set reb %-5\n\t\t*goto 4\n\t#\"I think you are going through a stressful time, and you're feeling the pressure.\"\n\t\t\"But this isn't about now. This is about everything I am.\" Rebecca insists forcefully.\n\t\t*set reb %+5\n\t\t*goto 4\n\t#\"I think you are a caring woman in an uncaring situation.\"\n\t\t\"You think I'm a victim in this. Oh that's almost funny,\" Rebecca says without a trace of humour in her voice.\n\t\t*set reb %+5\n\t\t*goto 4\n\t#\"I think you're hiding something from me.\"\n\t\t\"I would accuse you of cheek if you weren't right,\" Rebecca says, smiling through her tears,\n\t\t*set reb %+5\n\t\t*goto 4\n\t#Remain silent.\n\t\t\"Why don't you say anything,\" Rebecca insists, \"Are we not closer than that? Have we not shared enough to be honest with each other?\" she gives you a pathetic drunken slap.\n\t\t*set reb %-5\n\t\t*goto 4\n*label 4\n\"I've always thought of myself as average, I have my qualities but I've made thousands of mistakes. And yet only one follows me around. But being here and seeing him every day. It's just getting worse, I can't escape it. I feel ashamed that I want to forget what I've done, but I hate myself for it.\"\n\nYou simply sit next to her and listen, Rebecca determined to cry herself out.\n*page_break\n\"Alex...\" Rebecca trails of, choking on her own sob, \"I disregarded him. I didn't give him everything he should have had in a mum, everything he deserved. Hell, I didn't give him anything. I don't know what was going through my head, it's like I thought the name 'Mum' was enough to make me one to him.  I gave it all to Christopher and now look at the mess I've made.\"\n\n\"And why? I hear you ask in your head. Well because of my God awful marriage. My bastard of a husband thought Christopher was some kind of prodigal son, he gave him all his effort and I followed suit in a desperate attempt to make such a hateful marriage bearable. But what good was it? My marriage was hell anyway. I asked you to help me because I felt responsible for Christopher, but I'm too selfish for that really because here I am, fast approaching the winter of my life, with nothing to show for it and three sons who dispise me. I just wanted to grasp something back for myself, and the only thing I have a right to any more is that money.\"\n*fake_choice\n\t#\"Three sons?!\"\n\t#\"Why did you stay in such an awful marriage?\"\n\t#\"Why do you think your husband was such a bastard?\"\n\t#\"Do you really have a claim on that money?\"\n*label 202\n\"Alex.\" Rebecca calls out seeing him walking through the garden not far away.\n\nRebecca springs upright and runs to him, kicking off her heels as she runs. You run after her, only to nearly crash into the back of her as she stops a few feet from Alex.\n*goto showdown\n\n\n*label seventeen\nYou watch Rebecca for a moment, she reaches out to her son. But pulls her arm back when she seemingly thinks better of it.\n\nYou shrug it off and set off about your own work.\n\nYou spend the party circulating, checking on all your staff and frequenting the monitor room.\n*page_break\nYou knew there was something going on in the house, but you can have no doubt after the evening.\n\nYou see Opal with what must be her father off in a dark corner. You only see because of how closely you look but it's clear to you that he is incredibly angry with her. After their conversation she leaves to find Christopher, although when she finds him she doesn't seem to make much of an impact because he quickly brushes her off.\n\nRebecca and Rob also seem suprisingly familiar with each other. She sits at the bar for ages, leaning over to talk privately to him.\n*page_break\nOn one of your patrols round the patio you hear the unmistakable voices of Alex and Christoper. It's the first time you've ever heard them speak to each other.\n\n\"Have you found it yet?\" Alex asks.\n\n\"Why do you care? You've made it plain you have no interest in any of this. Not that I'm complaining, please do remain uninterested.\"\n\n\"As long as I have to live in your house it's going to cause tension between you and Mother. At the minute I'd prefer one of you found it just so you can both stop measuring up to each other. It is very tedious the way I keep getting dragged into things.\"\n\nYou lose their voices over the commotion of the party then, you can only wonder what they were talking about.\n*page_break\n*if (rob>50)\n\tYou can see Rob is completly swamped all night. It would be an understatement to call the party a success.\n\n\tHe waves at you occasionaly, managing to drop something every time he does so, but never manages to get a moment to speak to you.\n\t*goto 201\n*else\n\t*goto 201\n*label 201\nThe party is drawing to a close when you run into Rebecca. Or more accurately she runs into you, staggering out of the bar area smelling heavily of drink, falling into your arms.\n\nShe blinks blearily up at you before her eyes move to something over your shoulder and she lurches away.\n*goto 202\n\n*comment FINAL SCENE!!!!!AAAAAAAAAAAAAAAAAAA\n\n*label showdown\n\n\"What do you want Mother?\" Alex asks, his eyes taking in Rebecca's mascara stained face, wild hair falling out of it's pinned style.\n\n\"I just... Was just thinking about you.\" Rebecca says, looking lost for words.\n\n\"What's got into you?\" Is all Alex seems to be able to think to say, taking in his slightly mad looking mother as she cries pathetically in front of him.\n\n\"I just, I can't bear this!\" Rebecca chokes, and then she's letting out the most heart-wrenching screech you've ever heard, \"I want to fix my mistakes, I just don't know how.\"\n*page_break\nYou're vaguely aware of the household gathering around them.\n\nRebecca stumbles and falls to the floor, muddying her dress completely. Alex stares at his mother, a look of cold detachment on his face. Christopher is also staring at his mother with a look of disgust. Opal eyes up Christopher, a small satisfied smile tugging at her lips.\n*page_break\n*if (cameras=2)\n\t\"${name},\" you hear Emma's voice in your ear cut through the awkward scene, \"Just to let you know some of the cameras in the garden have gone out. What do you want me to do?\"\n\t*choice\n\t\t#\"I want you to send extra staff to the garden.\"\n\t\t\t*set secchris +1\n\t\t\t*set secalex +1\n\t\t\t*set secreb +1\n\t\t\t*set secopal +1\n\t\t\t*goto 10\n\t\t#\"Check with the hotel if they have anyone working tonight. No need to panic.\"\n\t\t\t*set career %-10\n\t\t\t*goto 10\n\t\t#Don't say anything. You don't want to be the one to break the silence.\n\t\t\t*set alex %+3\n\t\t\t*set reb %+3\n\t\t\t*set opal %+3\n\t\t\t*set chris %+3\n\t\t\t*goto 10\n*else\n\t*goto 10\n*label 10\n\"Mother what are you doing? You're a state!\" Christopher marches up to her, but doesn't help her up. He simply looks down at her in disgust.\n\nIt all seems to be too much for Rebecca and she breaks down into more grief wracked sobs, not even able to speak over her own tears.\n\n\"Oh for Christ's sake Christopher!\" Alex storms over, \"She clearly needs help to the car.\"\n\n\"Right,\" Chrstopher points at Drew, trying like all your staff to be as invisible as possible, \"You help her to the car. Round the side of the bulding, I don't want people seeing her in this mess.\"\n\n\"Christopher,\" Opal saunters over to him, placing her hand gently on his shoulder, \"Don't you think-\" \n*page_break\n\nBut she doesn't get time to finish, because a sudden raring engine and the loudest crash you have ever heard shakes the world and all hell breaks loose. All the garden and indoor lights cut, plunging all of you into darkness. You can hear people running and screaming. \n\nIt's pretty clear this is another kidnapping attempt. It couldn't be anything else. Time for you to do your job.\n*page_break\n*if (chris1=true)\n\tYou know your priority now, it's keep Christopher safe.\n\t*goto 11\n*elseif (rebplot=true)\n\tYou know your priority now, it's keep Rebecca safe.\n\t*goto 12\n*elseif (opalplot=true)\n\tYou know your priority now, it's keep Opal safe.\n\t*goto 13\n*elseif (alex1=true)or(alex>50)\n\tYou know your priority now, it's keep Alex safe.\n\t*goto 14\n*else\n\tIt's time to co-ordinate your team, and do your damndest to get the lights back on as fast as possible.\n\t*goto 15\n*label 11\nUnfortunately because of all the time you've been spending with Christopher, your fitness and awareness skills aren't what they need to be, and you find yourself only able to scrabble around in the confusion.\n\nThen you suddenly feel a reassuring arm around your waist. Christopher has found you. He simply holds you in the dark, clinging to each other, safe in the knowledge that the other is okay.\n*goto 16\n\n*label 12\n*if (career>75)\n\tYour astounding skills allow you to locate Rebecca in an instant. You grab her arm and pull her off the floor, her shaking sobs only louder now. You pull her against the hedge, keeping her safe and shouting into your head set for Emma to prioritise getting the lights back on. You feel Rebecca still shaking in your arms, almost hugging you in distress and fear.\n\t*goto 16\n*if (career>50)\n\tLuckily your skills are sound, it takes you a few seconds but soon enough you wrap your arms around Rebecca and pull her up, keeping her safe and huddling against the hedge.\n\t*goto 16\n*else\n\tUnfortunately your skills are not what they need to be, and you find yourself lost in the dark, unable to locate the person you're supposed to protect. You can only grope around trying to find her, getting buffeted by others and hoping against hope Rebecca is safe. You can still hear her sniffing and crying softly to herself.\n\t*goto 16\n*label 13\n*if (career>75)\n\tYou're flawless at your job. It barely takes you a moment to react as you grab Opal and pull her against the hedging, using your body to shield her all the while shouting into your headset for Emma to prioritise the lights and making sure everyone else is doing exactly what they need to be doing. You can feel Opal clutching at you for safety. \n\t*goto 16\n*if (career>50)\n\tYou aren't perfect at your job, but your skills are enough to grab Opal in the dark, pulling her against nd get out of here. The best way to make sure those we have are safe is to make sure they aren't here anymore.\n\t\t*set career %+10\n\t\t*goto 25\n\t#I'm going to call everyone to gather in the monitor room, if everyone's together we can keep an eye on them and search the grounds for the kidnapper.\n\t\t*set career %+5\n\t\t*goto 26\n\t#I'm going to leave my staff to figure out what to do with the charges and go straight after the kidnapper. Catching him would do wonderful things for my career. Besides if I catch him he can hardly make off with anyone.\n\t\t*goto 27\n\t*selectable_if (kidnap=true) # I'm going order everyone else to the monitor room where they'll be safe. I'll go find whose missing and then we can make our next move.\n\t\t*goto 27\n*label 25\nYou make the safest choice. It's best to get the people you know are okay to safety and think about your move from there.\n\nYou order your staff into a diamond formation around your charges and head off to the car through the chaos. You have to barge people out the way and get two of your staff to run into the road to make way for the car to get to you.\n\n*if kidnap=false\n\tWith everyone safe and in the car, you get in after them. The driver takes you away as fast as possible through the crowd.\n\n\t\"Well done,\" Emma congratulates you over the head set, \"As long as those four are safe our job is done. I'll just pack up here and follow you home. I have to admit I'm impressed. I didn't think you could do it.\n\t*finish\n*else\n\tYou bundle the charges you have into the car. You look back at the hotel, and take a deep calming breath.\n\n\tBut you have a choice to make now, do you cut your losses and leave with those you have in the car, or do you trust the driver to get them back to the house?\n\n\tOf course you might want to consider it may be beneficial for you to have a certain someone out the picture for a while.\n\t*choice\n\t\t#Go back to find those missing. It's the right thing to do.\n\t\t\tYou slam
