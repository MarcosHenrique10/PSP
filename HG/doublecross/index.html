lent, not wishing to accidentally agree that you're being hugely inconvenienced. At least not out loud.\n\n\"All you can do at the moment is anticipate the extra guest and prepare the safety appropriately.\"\n\n*page_break\n\nYou nod in agreement, \"Is that all, Sir?\"\n\nMr Haywood looks at you for a second as if weighing things up in his mind. You shift uncomfortably.\n\n\"One last thing ${name}. I just want you to know something about my mother. She-\" Mr Haywoood pauses delicately, \"Is rather like a whirlwind.\" You look questioningly at him, he isn't making his point very clear for you, \"I just want you to, the phrase 'be careful', sounds a bit strong, but perhaps not. Anyway, Mother has always had issues adjusting to the idea that Alex and myself especially are grown men.\"\n\nHe pauses again and you panic, for one mad moment, that he wants reassurance, \"But that is irrelevant,\" He continues, lifting the worry off you, \"All I am saying is that she does not like to be told she does not know best and can be rather dramatic when she doesn't get her way. I would like to warn you so you know it is normal for her and it shouldn't affect your work.\"\n\nHe waves a hand in dismissal, his eyes still on you as if he is still weighing you up as you walk towards the door. Your hand is on the door knob when Mr Haywoods voice cuts through the room, sharp and commanding.\n\n\"No matter what she says always remember that I am your employer.\"\n\nYou stop. His voice is the harshest you have ever heard. It's almost threatening.\n\n*choice\n\t#Reassure him that will always be the case.\n\t\t\"Thank you ${name},\" he smiles kindly at you as you turn to leave, with plenty to think on.\n\t\t*set chris %+8\n\t\t*goto seven\n\t#Turn and question him. \n\t\tMr Haywood holds up his hand, his eyes burning with anger, \"You do not question me. You do as I say. Now remember what I have said and go do your job - and nothing else.\" he doesn't shout, but there is such fierce emotion in his voice he may as well have shrieked.\n\n\t\tAs soon as his explosion abates he ignores you, and you leave with a lot to think about.\n\t\t*set chris %-15\n\t\t*set reb %+8\n\t\t*goto seven\n\n*label three\n\nHe walks with you to his home office and leads you behind his desk, he sits on his chair and pulls you onto his lap in a suprising act of intimacy. You can feel his warmth even through all the layers of clothing, your breath catches in your throat as he slides one arm around your waist, pulling you a little closer to him. \n\n\"Why are you awake so late?\" you ask, as he traces the dark smudge under his eyes with his fingers.\n\n\"I'm concerned about this visit in the morning,\" he looks at the clock and amends himself, \"In a few hours.\"\n\n\"Why?\" You ask as Mr Haywood casts his gaze out the window, seemingly lost in his own thoughts.\n\n\"My mother is a trying woman.\" he says simply.\n\nHe leans behind you and takes a coffee in his hand, passing a second to you, pushing it into your hands.\n\n*choice\n\t#Ask him what he means\n\t\t\"Just that I don't have the energy to deal with her right now. There's so much going on, this addition is quite trying.\"\n\t\t*set chris %+5\n\t\t*goto four\n\t#Tell him to calm down\n\t\tHurt flashes across his face, \"I came looking for you specifically you know.\" his voice is frosty and he doesn't have to say he looked for you because he thought you would be more understanding than this. The words hang in the air between you anyway.\n\n\t\tHe looks away from you, clearly less comfortable with you on his lap than he was before.\n\t\t*set chris %-10\n\t\t*goto four\n\t#Reassure him\n\t\tHe smiles at you and pulls your head onto his shoulder, \"Thank you, I know it's silly. I'm supposed to be the big scary CEO yet here I am losing sleep over a menopausal woman.\"\n\n\t\tHe chuckles at himself, his hands finding your hair he gently weaves his fingers though it, \"I'm glad you'll be here. Me and my mother have never seen eye to eye.\"\n\t\t*set chris %+8\n\t\t*goto four\n*label four\n\n\"Surely you understand?\" he asks. You can feel his eyes boring into you, willing you to empathise.\n\nHis hand is on your leg, lighlty brushing your knee, his other arm is completely encircling you, holding you close to him.\n*choice\n\t#I do.\n\t\t*set chris %+10\n\t\t*goto six\n\t#I don't.\n\t\tYou feel Mr Haywood stiffen under you.\n\n\t\tIt's as if something between you breaks and he firmly guides you to standing, motioning for you to sit away on the other side of the desk, where his employees sit.\n\n\t\tYou sit, sensing his hurt for only a momemnt, before his face is back to its usual, what you have learned to be, mask.\n\t\t*set chris %-15\n\t\t*goto five\n\t#I'll try to understand you.\n\t\t*set chris %+5\n\t\t*goto six\n\n*label six\n\"Thank you. Even I know it must seem a little silly now, but you'll understand when you meet her, she is quite the... entity.\" he chuckles to himself, \"She doesn't like to be told what to do, and she still has to learn that I am the man in charge of our business now. She can get quite hysterical at times. Try not to let it alarm you.\"\n\nMr Haywood places his finger under your chin and pulls your eyes up to his, \"I know you're more together than to be frightened by some silly upset middle aged woman, but I thought you would appreciate a warning.\"\n\n\"Is there anything else I need to know?\" You ask.\n\n\"You know me too well already.\"  Mr Haywood chuckles, \"On a professional note my mother is bringing a guest, who you will have to make allowances for. I am sorry I didn't let you know sooner, I was only informed after you and I parted yesterday. Before you ask I don't know who they are either. If it's a guest of Mother's she is, no doubt, also suffering from a shrill mid-life crisis.\"\n\nYou keep quiet, wary of speaking badly of his family, even if Mr Haywood's doing it so casually.\n\n*page_break\n\nLike a sudden chill has swept the room you can feel the hairs on the back of your neck raising. You can't explain it, it's warm in Mr Haywood's arms, and his face seems the same but something in his voice has become ominous.\n\n\"You will do something for me won't you, ${name}?\", he waits for you to hold his eyes before he continues, \"No matter what that woman says, you remember that you are not hers, but mine.\" There's a pause, then Mr Haywood seems to collect himself, \"My employee I mean.\"\n\nWill you promise him that?\n*choice\n\t#Yes\n\t\t\"Of course,\" you smile at him, ignoring his stumble. You catch his eye and take a deep breath, not believeing yourself what you're about to do, \"I'm yours.\"\n\n\t\tMr Haywoods eyes open wide in surprise for a moment, dropping his coffee and knocking yours to the floor. He grabs the back of your head in his hands and pulls your head down towards his. His fingers are laced through your hair, and his eyes are on yours holding you as he pulls your face close. He stops pulling when you are mere inches apart. His grey eyes are hauntingly close and you can feel his warm breath on your lips, your noses are touching lightly.\n\n\t\t\"I-\" Mr Haywood stutters, you can feel the words dance across your lips more than you hear them in your ears, \"Feel this is worth more time than a quick kiss in my office will allow, but it is all I can give you right now.\"\n\n\t\tHe slowly lets go of your face and slumps back against the chair, \"It would seem I have more to think on,\" he smiles ruefully to himself, squeezing your hand, \"I shall see you later,\"\n\n\t\tWith that sudden dismissal you leave, your stomach still churning with nerves.\n\t\t*set chris %+10\n\t\t*goto seven\n\t#No\n\t\t\"I can't see why I have to promise that,\" You say shakily, \"You have my contract.\"\n\n\t\t\"If you can't see, it doesn't matter,\" Mr Haywood replies coolly, extracting you from his lap and dismissing you with a wave of his hand, \"Go and organise the guest room,\" and with that you're dismissed.\n\t\t*set chris %-15\n\t\t*goto seven\n\n*label seven\n\n*page_break\n\nYou find yourself almost happy that you were woken up so early. You thought you were going to be rushing around this morning, but with all the extra time you get to take things at a leisurely pace. You have to tell yourself it was worth it pretty damn hard.\n\nYou're stood in the hall, watching Mr Haywood pace restlessly. The rest of the staff are out front to meet the guests so it's just you two.\n\nHow do you feel being alone with him after this morning?\n*choice\n\t*selectable_if (chris1 = true) #I actually feel like I want to spend more time around him, there's something between us, no matter if he's my employer or not.\n\t\t*set chris %+8\n\t\t*goto eight\n\t*selectable_if (chris > 30) #We get on quite well, I don't mind spending time with him at all.\n\t\t*set chris %+5\n\t\t*goto eight\n\t#There's something going on with him I'm not seeing, I feel a bit of aprehension when I'm around him now.\n\t\t*set career %+5\n\t\t*goto eight\n\t#I'm getting a seriously bad vibe from him, this visit has brought out a whole new colour I haven't seen before.\n\t\t*set reb %+5\n\t\t*goto eight\n\t#No differently to how I felt before.\n\t\t*goto eight\n\n*label eight\nMr Haywood twitches as a car engine roars up the drive and cuts off outside, his face is blank and if you had to say anything about him you would have to use the word 'resigned'.\n\nThere's a flurry of activity outside as servants get bags and butlers open doors.\n\nA few moments later the subject of all Mr Haywood's duress glides in. And glide is the only word for it, she is the most elegant woman you have ever seen. Ageing with grace she highlights a refined face with blue eyeshadow and a gentle lipstick. Unlike her son she is very pale, her skin is white and unblemished and her hair is golden framing her face in a soft bob. Her clothes make her look even more approachable, a sky blue dress that flutters around her knees, carelessly highlighting her slim frame. In fact the only thing she and Mr. Haywood have in common are their cold grey eyes.\n\nShe smiles warmly at you as she enters and holds out a perfectly manicured hand, \"${name}?\"\n\nYou shake her hand, surprised by her firm grip, \"Yes Ma'am,\".\n\n\"No, no, none of that,\" she flaps her hands, waving the title away, \"There are three Haywoods in the house now, and two of them are Mr., you will call us by our first names else I shall get confused.\"\n\nYou see Mr.Haywood give you a small nod out of the corner of your eye.\n\n\"Of course Rebecca,\" which causes her to beam at you.\n*page_break\n\n\"I'd like you to meet Alexander.\" Rebecca says, pulling her other son forward. When you take a good look at him it's not suprising to you that his mother's sweeping entrance overshadowed him completely. In fact if you hadn't just heard his name you wouldn't have said he could be related to his two charismatic relatives. He's tall like Mr.Haywood - Christopher, you remind yourself - but not in the same way. Where Christopher is tall and commanding, Alexander is slight with bony wrists. His dark hair is the same colour as his brother's but instead of the refined sweep, his hangs boyishly around his face. His face is pale like his mother's, but has the look of pale from being indoors, rather than naturally fair. His clothes are a world apart as well, brown cords with a reliable looking high-necked blue jumper with old fashioned diomands criss-crossing his chest. Even his eyes are different, instead of the trademark grey, they're a clear and lively blue.\n \n\"Alex, please.\" he holds out his hand to you, meeting your eyes in a firm but unremarkable shake.\n\n\"Where is your additional guest Mother?\" Christopher asks dryly, ignoring pleasantries.\n\n\"Oh, she was just making a call - ah, here she is.\"\n\n*page_break\n\nFrom the taken aback expression on Christopher's face you're sure he was expecting a middle aged friend of his mother, which this woman certainly isn't.\n\nShe walks in with such poise she looks almost like a dancer in her movements. She's wearing a summer dress that billows around her dancers legs as she strides confidently forward. The cheerful yellow of the dress fits her hourglass figure to the stitch and highlights her flawlessly black skin and amber eyes. Her face looks as strong as her body, with a straight nose, sharp eyebrows and lips in a pronounced cupid bow. Her deep brown hair's scraped to the side into a large golden net tie, an unusual style that draws attention to her striking face.\n\n\"Mr Haywood,\" she held her hand out to him, not seeming to care that she should really be the one being greeted.\n\n\"This is Opal Sandhurst.\" Rebecca filled in as Christopher took her hand and brushed his lips against her knuckles.\n\n*page_break\n\n\"Charmed.\" Christopher drops her hand as quickly as is polite and turns a cold smile on the group, motioning over the two closest servants, Charlotte and Rob, \"Well I expect you're all tired. You will be shown to your rooms and we will have plenty of time for a catch up over lunch.\"\n\n\"Excellent idea Christopher.\" Rebecca smiles at her son, earning nothing more than a polite nod back.\n\nSo who will you escort?\n\n*choice\n\n\t#Rebecca\n\t\t*goto nine\n\t#Alex\n\t\t*goto ten\n\t#Opal\n\t\t*goto eleven\n\t*selectable_if (chris1 = true) #Call over Drew  to take your escort place, you want to check on Christopher.\n\t\t*set chris %+8\n\t\t*set career %-8\n\t\t*goto twelve\n\n*label nine\nYout take Rebecca's suitcase, and she smiles warmly at you and follows you towards her room, leaving the others still fumbling with bags.\n\n\"It's nice to finally meet the person responsible for my son's safety,\" she says conversationaly, \"I want to thank you for your hard work.\"\n\n\"It's my pleasure,\" you reply politely, trying not to let it show on your face how much of a struggle her bags are.\n\n\"What do you think of my son then?\" Rebecca keeps her tone light, but you can see out of the corner of your eye she's looking pointedly at you and you can feel there's more to this question than you know.\n*choice\n\t*selectable_if (chris1 = true) #\"I think he is a great man and employer, he has my loyalty completely.\"\n\t\t*set chris %+10\n\t\t*set reb %-10\n\t\t*goto thirteen\n\t#\"I'm here to do a job, not think anything of my employers.\"\n\t\t*set career %+10\n\t\t*set reb %+5\n\t\t*goto thirteen\n\t#\"I'm not sure, he's been acting a bit strangely recently, since he found out about your visit.\"\n\t\t*set reb %+10\n\t\t*set chris %-10\n\t\t*goto thirteen\n\t#Remain silent. You don't have enough of the full picture.\n\t\t*goto thirteen\n\n*label thirteen\n\n\"Interesting,\" Rebecca muses as you lump her bags through the door of her room.\n\n\"Well this is quite lovely,\" she starts, looking around at the immaculate guest room, \"I sometimes forget how wonderful this house is.\"\n\n\"It's pretty wonderful,\" you agree, still trying not to huff and puff from the heavy bags.\n\n\"We have plenty of time to freshen up before lunch, would you stay and have some tea with me?\"\n*choice\n\t#Yes\n\t\t*set reb %+10\n\t\t*goto fourteen\n\t#No\n\t\t*set reb%-5\n\t\t*goto fifteen\n*label fourteen\n\n\"Excellent, I was hoping for a little chat,\" going over to the door she orders a tea service through the in house phone.\n\nYou finish piling up her bags awkwardly by the door. You don't even have time to take off your shoes before Rebecca has grabbed your arm and steered you to one of two seats around a little coffee table.\n\n\"So,\" she starts without preamble, \"Has my son told you much about me?\"\n\n*choice\n\t#\"Nothing more than you were visitng.\" (Lie)\n\t\t\"Hm.\" Rebecca merely eyes you, looking like she's trying to peer into your head.\n\t\t*set chris %+5\n\t\t*set reb %-10\n\t\t*goto sixteen\n\t#\"He akinned you to a whirlwind, or he held the same reverence at any rate\"\n\t\t\"I'm flattered.\" Rebecca snorts in a very unlady like way.\n\t\t*set chris %-10\n\t\t*set reb %+10\n\t\t*goto sixteen\n\t#\"A few bits and pieces.\"\n\t\t\"Very diplomatic of you.\" Rebecca says lightly, almost teasing you.\n\t\t*set reb %+8\n\t\t*set chris %-5\n\t\t*goto sixteen\n\t#Remain silent.\n\t\t\"You don't talk much do you?\" You can detect something that sounds almost like teasing in Rebeccas voice.\n\t\t*goto sixteen\n*label sixteen\n\nThe tea service arrives and Rebecca motions for it to be put down in front of you two.\n\n\"I hope our presence hasn't made your job too much harder,\" she says conversationally, pushing the sugar away from her as if its mere proximity could sweeten her tea.\n\n\"We're always happy to accommodate,\" you give the standard company answer.\n\n\"Has there been any luck catching the monster who's doing this to my son?\" \n\n\"None,\" you say truthfully, \"Until another attempt is made we have no leads I'm afraid.\"\n\n\"A very nasty catch 22,\" Rebecca sighs, sipping her tea, \"You by no means want an attempt, but unless something happens it makes for a nerve wracking stalemate.\"\n\n\"Exactly,\"\n\n*page_break\n\n*if (chris1 = true)or(chris >= 60)\n\tRebecca's eyes are searching you, \"I get the feeling he's warned you against me,\" she holds up her hand in a silence motion, \"Don't deny it, I have many faults, but I can see the hold he already has over you. Nothing I have to say to you will make a difference. Although I would remind you that there is always a second side to every story, no matter how black someone might paint it.\"\n\n\tWith that she flicks her free hand at you, \"Now get out. I have no time to waste with you.\"\n\n\tStartled at her abrupt attitude you put your tea cup down and leave, politely and quickly.\n\n\tShaking your head in confusion you head to Emma's office to check on everything.\n\n\t*page_break\n\n\t\"Everyone is in their rooms,\" Emma says before you can even ask, \"Getting ready for lunch. Actually now would be a good time to go over the plans for the ball next week.\"\n\n\tYou nod in agreement and look over Emma's shoulder to the camera display. You can see Rebecca in her room standing by the window. There isn't enough detail to see her face, but she has a tissue held loosely in her hand.\n\n\tYou turn your attention back to Emma, and the complicated plans for Christopher's big public appearance.\n\t*set reb1 false\n\t*set reb %-20\n\t*set chris %+8\n\t*goto fifteen\n*else\n\t\"Poor Christopher. He really has had such a trying time.\" Her eyes are on you again in that way that tells you she's watching your every move.\n\n\t\"Yes he has,\" you agree, after all, a kidnapping threat is no easy thing to deal with.\n\n\t\"Hm,\" Rebecca's eyes are thoughtful, and you can only try not to fidget under her gaze.\n\n\t\"You seem to be quite the strong minded person you know.\"\n\n\tSlightly taken aback, you say the first thing that comes into your head, \"Thank you.\"\n\n\t\"I'm glad you think it's a compliment. Yes, I think we will get on rather well.\" Rebecca's eyes bore into you, saying more than her mouth is. Then in a sudden movement she's up and moving across the room, \"I have to freshen up for lunch - I look forward to seeing you there.\" You stand, thank her, and move to the door to leave. It's just as the door is slamming on your heels, so you aren't sure, but you're sure you hear Rebecca say, \"And again after that.\"\n\t*temp letter true\n\t*set reb %+10\n\t*goto fifteen\n\n*label ten\n\nYou go to take Alex's bags from the doorman, but he reaches for them the same time as you.\n\n\"Ah, I can take my own bags. It's okay really.\" he stammers, blushing.\n\n*choice\n\t#Insist you take his bags\n\t\t\"I know it's your job to care for us, but I don't like having things done for me I can do for myself.\" Alex says, puffing up a little under his jumper.\n\n\t\tWith that he grabs his bags and starts off in completely the wrong direction. You have to call him back and lead him down the right corridor.\n\t\t*set alex %-8\n\t\t*goto seventeen\n\t#Let him take them\n\t\t\"Thanks. Sorry - it's just I don't like to be fussed over.\" Alex comfortably hitches his bags under his arms, \"Lead the way.\"\n\t\t*set alex %+8\n\t\t*goto seventeen\n\n*label seventeen\n\n\"Still,\" you say, skeptically watching him lug his case down the corridor. It looks heavy, or he looks weak, you aren't sure, \"I could help you with the shoulder bag?\"\n\n\"Ah, I appreciate it. But it was me who chose to pack a library, so I'll do the heavy lifting.\" He smiles lopsided at you and stops to pull off his jumper, revealing a faded button up underneath, \"I didn't know how long we were going to be staying, so I may have over done the packing.\"\n\n\"Well the room isn't far,\" you reassure him, seeing you aren't going to get any bags anytime soon.\n\nYou show him the rest of the way in silence, only for his bags to split ten paces away from his door.\n\nYou see he wasn't joking when he said he brought a library, there is nothing in his suitcase but books. They tumble out of the ripped seam like an avalanche, pooling in the hall.\n\n\"Drat,\" Alex puffs a wisp of hair out his face, \"I hope none of them are bent.\"\n\n*page_break\n\nHe bends and starts to pile them up, delicately flipping through each one to check for bent pages.\n\n\"Let me help you now,\" you say, bending beside him and try your best to copy his reverence with the books.\n\n\"Thanks,\" Alex says, barely glancing at you as he flips through a particularly old looking copy of the Hippolytus tragedy.\n*choice\n\t#Focus and work in silence\n\t\t*set Alex %+8\n\t\t*goto eighteen\n\t#Offer him a 'Medea' to put with Hippolytus\n\t\t*set alex %+13\n\t\t*goto eighteen\n\t#Offer him a 'History of Modern Religion' to go with Hippolytus\n\t\t*goto eighteen \n\t#Ask why he has so many books\n\t\tHe's so wrapped up in the avalanche he doesn't seem to hear you.\n\t\t*set alex %-10\n\t\t*goto eighteen\n\n*label eighteen\n\nIt takes the two of you half an hour of silent work to pick up all the books, checking them all, and move them to the table in Alex's room.\n\nHe has a book for everything, from how-to to non-fiction to the most fantastic thrillers. However you notice more than half his collection is made up of scripts and monologues.\n\n\"We're lucky it split so close to the room,\" Alex says as you pile up the last of them, \"Thank you for your help.\"\n\n\"No problem,\"\n\n*choice\n\t#\"Are you an actor?\"\n\t\t\"Kind of,\" you look at him questioningly making him smile.\n\t\t*set alex %+8\n\t\t*goto nineteen\n\t#\"Why so many books?\"\n\t\t\"Why not?\" he counters, staring lovingly at the pile on the table, \"I take from the question you aren't a big reader. But it's part of what I do, so even if I didn't like it it would really be my job to be well read.\"\n\n\t\t\"What do you do?\" you ask him pleasantly, slighlty annoyed that he seems to be looking down on your lack of literary taste, even though you never said for a second you didn't read.\n\t\t*set alex %-8\n\t\t*goto nineteen\n\t#\"Could I borrow something form your collection sometime?\"\n\t\t*set alex1 true\n\t\t*set alex %+13\n\t\t\"Of course,\" he gushes, looking pleased you have some common ground, \"I might have to withhold a few things from you if I need them, but otherwise feel free to stop by any time and I'll lend you basically anything.\"\n\n\t\t\"What might you be withholding?\"\n\n\t\t\"Just some of the scripts, I need to practice, after all.\" you give him a look that prompts him to explain.\n\t\t*goto nineteen\n\n*label nineteen\n\n\"Technically my full time job would be librarian. I should say ex-job now, I've had to quit thanks to this debacle,\" it isn't hard to detect the resentment in his voice, \"But I'd consider my main trade to be acting. Stage acting, not film acting.\"\n\n\"Ah, that would explain all the scripts.\"\n\n\"Yes, I have a bit of an Achilles heel when it comes to not packing light I'm afraid. But I've actually got a few upcoming performances, and when I'm a bit nervous I like to act all the characters I can think of, just to remind myself I'm good at what I do. For that I need a lot of scripts. Weird, I know.\"\n\n*choice\n\t#\"Not at all.\"\n\t\t*set alex %+8\n\t\t*goto twenty\n\t#\"Kind of weird, but if it works for you I guess.\"\n\t\t*goto twenty\n\t\t*set alex %-5\n*label twenty\n\"What can I say? It works for me.\" he says, smiling crookedly. You notice he never smiles straight, it's only ever the right side of his face that twitches up into a cheeky crook, \"Hey, seeing as I'm under your official protection now you might even have to escort me there and you'll get to see me act.\"\n\n*choice\n\t#\"I'd like that.\"\n\t\t\"Thanks, hopefully you'd enjoy it. The first one coming up is just a simple monolouge competition so it's only a little thing. But it's still an opportunity for local scouts to come and see me.\"\n\t\t*set alex1 true\n\t\t*set alex %+15\n\t\t*goto twentyone\n\t#\"Theatre isn't really my thing.\"\n\t\t\"Well each to their own.\" Alex shrugs.\n\t\t*set alex %-8\n\t\t*goto twentyone\n\t#\"Maybe.\"\n\t\t\"Ah, I guess with what you do you can't commit. Sorry that was insensitive of me. Well, we will simply have to hope.\" he smiles reassuringly at you.\n\t\t*set alex %+8\n\t\t*goto twentyone\n\n*label twentyone\n\n\"Sorry I don't usually talk about myself this much,\" Alex scratches the back of his neck, showing just how long all his limbs are, \"You got me rambling.\"\n\n\"It's okay\", you reassure him, \"I did kind of ask. But I do have to get back to work now, I'll leave you to freshen up for lunch.\"\n\nAlex's cheeks go a little pink, \"Yes of course, Sorry I kept you - I'll see you later.\"\n\n*goto fifteen\t\n\n*label eleven\n\nYou take Opal's bags and lead her away from the group.\n\n\"Do be careful with that,\" Opal says as you lug her unwheeled and very heavy suitcase down the hall, \"So what can you tell me about Christopher? I've never met the man before, and while Rebecca assures me he is quite the gentleman, I feel I need to take her maternal opinion with a pinch of salt.\"\n\n*choice\n\t*selectable_if (career >50) #\"He's a fair employer, past that I can't tell you very much about him.\"\n\t\t*set career %+10\n\t\t*set opal %+15\n\t\t*goto twentytwo\n\t*selectable_if (chris >65) #\"He's, as Rebecca has told you, a gentleman.\"\n\t\t*set chris %+8\n\t\t*set Opal %-10\n\t\t*goto twentytwo\n\t*selectable_if (chris \u003c15) # \"I'm afraid I can't think of any positive qualities to tell you.\"\n\t\t*set opal %+8\n\t\t*set chris %-10\n\t\t*goto twentytwo\n\t#\"I don't feel comfortable discussing him this way.\"\n\t\t*goto twentytwo\n\t#\"From what I know of him he's a nice enough man.\"\n\t\t*set chris %+5\n\t\t*goto twentytwo\n\t#\"There's something a bit odd about him, I can't place my finger on it though.\"\n\t\t*set opal %+5\n\t\t*set chris %-10\n\t\t*goto twentytwo\n\n*label twentytwo\n\nThere's a thoughtful pause behind you as you try not to swing her case into a side table. Opal remains silent for the rest of the trip to her room, which you're glad of. You're not really sure how well you can talk while wielding such a big bag.\n\nThe two of you arrive at the room. Opal stands in front of the door and looks pointedly at you. You place her bags on the floor and open the door for her. She sashays in ahead of you, carrying herself with more confidence than one person should really be allowed.\n\n\"Yes, this will do.\" she says, like there was anything you could have done if the room wasn't good enough, \"Thank you for bringing my cases for me,\" she turns to you and smiles, lighting up her already very pretty face, \"Would you care for a drink?\"\n\n*choice\n\t#Yes, a bit of a sit down would be good.\n\t\t*set opal %+5\n\t\t*goto twentythree\n\t#No, I'll get straight back to work.\n\t\t\"Off you go then,\" Opal wastes no time in shooing you out the door, closing it firmly behind you. \n\t\t*set career %+10\n\t\t*goto fifteen\n*label twentythree\nOpal waves you towards the window seat as she calls service for two summer juices.\n\n\"It's quite a beautiful house,\" Opal says conversationally as she comes to sit on the window seat beside you, regally crossing her ankles, \"My father built his own house too, but I find it to be too old fashioned personally. But everyone has different tastes I suppose. So,\" she continues before you can ask any questions of your own, \"Do you have any leads on finding the kidnapper?\"\n\n\"None,\" You reply truthfully, thinking to yourself that you don't even have any leads, but this girl doesn't need to know that.\n\nYou take the following gap as an opportunity to talk yourself.\n*choice\n\t#\"You're father is quite well off as well then?\"\n\t\t*set opal %+5\n\t\t*goto twentyfour\n\t#\"How do you know Rebecca?\"\n\t\t*set opal %+5\n\t\t*goto twentyfour\n\t#\"Why have you come to visit now, when it would be much easier for you when there's less security?\"\n\t\t*set opal %+10\n\t\t*goto twentyfour\n\n*label twentyfour\n\"All your questions will be answered at lunch no doubt, for now I'm saving my voice.\" Opal said dismissively waving your question away, \"I have no interest in repeating myself.\"\n\nYou don't point out to her you aren't going to be at lunch, that you are, unlike her, not a guest. But you don't care to waste your voice either.\n\n\"I do have one question for you before you go though,\" Opal says downing her drink, already making gestures towards the door, \"Is Christopher seeing anyone?\"\n*choice\n\t#\"I don't know\"\n\t\t*set Opal %-10\n\t\t*goto twentyfive\n\t*selectable_if (chris1 = true) #\"Yes, I know for a fact he is.\"\n\t\t*set chris %+10\n\t\t*goto twentyfive\n\t#\"I'm sure he is, he's a handsome man, although I don't know for sure.\"\n\t\t*set chris %+5\n\t\t*set opal %+5\n\t\t*goto twentyfive\n\t#\"It isn't my place to gossip about my employers personal life.\"\n\t\t*set career %+10\n\t\t*set opal %+8\n\t\t*goto twentyfive\n*label twentyfive\n\n\"I'll bear that in mind.\" and with that she takes you a mere second to guide you out the room and shut the door behind you.\n*goto fifteen\n\n*label twelve\nBy the time you've called Drew over, Christopher has disappeared. Taking an educated guess, you make your way towards his quarters. They are, after all, in the opposite direction to the guest rooms.\n\nYou knock on the door, bouncing on your toes a little bit. You have been flirting with the changes in your relationship, but this is different, this isn't two people who are attracted to each other pushing the boundaries. This is you going to check on someone you like because you're worried about them.\n\nThe realization hits you quite hard, and you can almost feel your stomach clench as you realize how changed the dynamics of your relationship have become, and what it could mean for this job, and your future after that.\n\nChristopher interupts your thoughts by opening the door, his face is resigned, until he sees you, then he lets a smile spread from ear to ear, \"I was just thinking about you.\" he pulls you inside.\n\n*page_break\n\n\"I just thought I'd check up on you,\".\n\n\"Thoughtful, but unnecessary, I'm a big boy.\" seeing the look on your face he backtracks, \"Not that I don't appreciate it.\"\n\nChristopher takes your hand and pulls you lightly to the sofa, sitting you down next to him and tucking you under his arm, \"Want to know what I was thinking about?\"\n\n\"Go on,\" You reply, playfully running your fingers over his hand.\n\nChristopher turns his body so he's facing you squarely, his arms still wrapped around you, his grey eyes meeting yours with a staggering intensity, \"I was thinking about how beautiful you are. I love how your eyes sparkle, and that cute expression you get on your face when you concentrate...\" Christopher takes one hand and runs it under your chin, \"I know this is crazy.\"\n\n*choice\n\t#\"I know,  but I don't care.\"\n\t\t*set chris %+5\n\t\t*goto twentysix\n\t#\"This is going too fast, I'm open to this, but we need to slow things down.\"\n\t\t\"I know, but. I'm sorry but-\"\n\t\t*set chris %-10\n\t\t*goto twentysix\n\t#\"I actually came here to tell you I can't do this, because, yes, it's crazy.\"\n\t\tChristopher drops your face like you've scorched him, \"But, I thought-\" he stops himself before he can say anything else, \"If that's what you want. You should leave though.\"\n\n\t\tYou stand and look at him, wanting to say something else because you're terrified now it's going to be awkward, \"Save me some face, don't give me that look of pity,\" Christopher spits, he stands himself and, ignoring you, walks into another of his rooms, leaving you to let yourself out.\n\t\t*set chris1 false\n\t\t*set chris %-30\n\t\t*goto fifteen\n*label twentysix\n\nChristopher moves so fast that even with your years of training to react quickly you find you can't stop him. He pushes you back on the sofa so you're lying down breathlessly. He leans over you, pressing your bodies together so your faces are inches apart.\n\nHe blushes fiercely, \"I'm so sorry I don't know what came over me,\" but he doesn't move, he stays there. You can feel his hard chest through his thin shirt. Averting his eyes from yours he lets is head drop, you can feel his lips on your neck, then he kisses you. It's a nervous dry kiss, then another, and another. He traces down the side of your neck with small kisses, his hot breath dancing over your skin. His hand grips yours tightly, holding onto you as his tongue flicks out of his mouth and tastes your skin, making you shiver.\n\n\"I can't seem to help myself around you,\" you feel him whisper against your neck, \"You're like no one I've ever met before. Accomplished, caring, beautiful and blind to all those things most people want me for, business transactions, money. I just can't let someone like you slip through my fingers.\"\n\n*page_break\n\nHis hand is suddenly on your waist, gripping your hip through your shirt, pulling your closer to him.\n\n\"I need to take you out, unprofessionally. I know that I'm putting you in a difficult position, but please, let me.\"\n*choice\n\t#Yes\n\t\tYou feel him smile into your neck, he nips your skin lightly, \"I can't wait. You have a day off tomorrow if I remember correctly. I will arrange our time together for then.\"\n\n\t\tIt's still hard to believe that this is happening.\n\n\t\t\"One good thing about my mother,\" Christopher muses, \"I like that you call me Christopher. It sounds like a beautiful name when you say it.\"\n\n\t\tHe lifts himself off you, the absent weight of his chest making you a little breathless, \"I feel I can restrain myself better now there is a light at the end of the tunnel. Although perhaps you should go. I've found restraint, but I can't promise more than a few minutes of it.\"\n\n\t\tYou get yourself up and chuckle at him as you leave, doing a little geeky wave, that you hate yourself for, on your way out.\n\t\t*set chris %+10\n\t\t*goto fifteen\n\t#No\n\t\tYou feel Christopher's breath hitch on your neck, \"Do you not want more than this?\" he asks, gesturing to your intertwined bodies, you can hear the hurt in his voice.\n\n\t\t\"I just don't see how you can have anything real while I'm still your employee,\" you say, not sure yourself what you're feeling.\n\n\t\t\"I see,\" Christopher says flatly, \"I shall refrain from bothering you in the future then.\" It takes him mere seconds to disentangle himself from you and see himself out. You can only stare after him.\n\t\t*set chris %-15\n\t\t*set chris1 false\n\t\t*goto fifteen\n\n*label fifteen\nWith everyone resting up for lunch you have time now to go to Emma and make plans for the ball that Christopher has to attend at the end of next week, an event that's bound to double your work, so you'd better be prepared.\n\n*page_break\n\nIt's one o'clock when you get a call asking you to come to the dining room. You can't think why you could possibly be needed right this second, but it isn't really your place to decide whether you're going to go or not.\n\nThe second you walk in, Rebecca grabs your arm and steers you to the table, \"Ah, ${name}, wonderful.\" she pushes you into a seat. You look round to see you're sat between Christopher and Opal. Rebecca slides into the seat opposite you. Alex is at the table too, looking incredibly out of place in a scruffy hoodie.\n\n\"Mother, I'm sure ${name} has better things to do than sit in on a family lunch.\" Christopher says, his eyebrows nearly disappearing into his hairline.\n\n\"Nonsense, I think we would all feel more at ease if we got to know the person watching us like a hawk. No offence dear,\" Rebecca holds up her hand to you, \"Besides, I've not seen you in months, and talking to you about yourself is pulling teeth, so I shall have to ask the closest observer.\" Rebecca gestures to you.\n\n*page_break\n\nFantastic, so the lunch is professional enough that you can't refuse, but you will no doubt have to suffer personal questions, about the person sitting next to you no less.\n\nGood luck!\n\n*page_break\n\nRob, looking very smart in a black waist coat leans over to fill your water and offer you a drink.\n\n*if (rob1=true)or(rob>40)\n\tHe smiles and gives you the tiniest of winks before he backs away. Or tries to back away, he manages to knock your shoulder with the jug of water.\n\n\tLuckily for him, he catches it. Unluckily for you, a big slop of water spills into your lap.\n\n\tYou suddenly become aware everyone at the table is looking at you. Rob is biting his lip, clearly mortified at his own clumsiness.\n\n\t\"Are all your staff this inept?\" Rebecca is the first to speak, directing her gaze firmly at Christopher.\n\n\tYou suddenly realize that while you know Rob is clumsy, his slip up in front of Christopher could be quite detrimental to his job.\n\t*choice\n\t\t#Cover for Rob\n\t\t\t\"It was just a little bump.\" you say, holding up your hands, \"No harm done.\"\n\n\t\t\tRob's looking at you like you've gone mad. You give him a pointed look and gesture him from the table. He backs away gingerly as if scared you're going to change your mind.\n\n\t\t\tEveryone else placated that it really wasn't a big mistake, you turn your head to the side and catch a beetroot Rob mouthing 'Thank you'.\n\n\t\t\tYou give him a little smile, and turn back to your meal, realizing now that you have to sit through the whole meal with a wet crotch.\n\t\t\t*set rob %+20\n\t\t\t*goto twentyseven\n\t\t#Leave him to his concequences.\n\t\t\t\"Not all of them. You-\" Christopher gestures to Rob, \"Please go find us another server who is not going to decorate me and my guests, and inform Charlotte of your mistake.\"\n\n\t\t\tBeetroot with embarrassment, Rob stammers out a polite acceptance and leaves. He's so red you can almost see steam coming off his head.\n\n\t\t\tAnother server rushes up to you with a cloth. The spill isn't that big and you manage to dry most of it and return to your meal.\n\t\t\t*temp gone true\n\t\t\t*set rob1 false\n\t\t\t*set rob %-20\n\t\t\t*goto twentyseven\n\t*goto twentyseven\n*else\n\t*goto twentyseven\n*label twentyseven\n\n\"It's nice to spend sometime together,\" Rebcca says to no one in particular. Both her sons remain silent.\n\n\"How long has it been since you were all last together?\" Opal asks, jumping in when it's evident neither Christopher or Alex intend to.\n\n\"Not since your fathers funeral was it Christopher?\" Rebecca asks, trying not too subtly to draw her son in.\n\n\"Around,\" Christopher replies, as the food is brought out.\n\n\"So around eight years,\" Rebecca turns to Opal as the food is placed down.\n\nYou only ever eat like this when you go to fancy resturaunts. There's an exotic salad with a dome of orange rice and pearly-shelled mussels decorating the rim of the plate.\n\nWhat an awful time to realize you need to know the difference between an hor d'oeuvre and dessert fork.\n\n*page_break\n\nYou're left mostly in peace to try and hide your eating habits as Rebecca and Opal chatter over the starter about inheritance tax.\n\nIt becomes evident pretty quickly that Opal is quite the business woman. Her understanding of tax percentages and business law is impressive, especially considering it's all off the top of her head.\n\nYou manage to glean from the conversation that she is in fact the daughter of the owner of Christopher's contracted sales and marketing company.\n\n*page_break\n\nIt isn't until the main course (a mouth-watering lamb shank baked in a red wine sauce with glazed parsnips) that you are called on to contribute to the conversation.\n\n\"${name}, I've been meaning to ask,\" Rebecca catches your eye as you take a big inelegant mouthful, \"How much notice do you need if we want to go out?\"\n\n\"As much notice as possible is always appreciated,\" You say diplomatically, swallowing your mouthful whole and nearly choking, \"But with the three of you I would say a days notice is realistic - although you can always ask and we will do our best to accomodate.\"\n\n\"Four,\" Rebecca corrects, causing both you and Christopher to raise your eyebrows.\n\n\"Four, mother?\" Christopher sounds pretty incredulous.\n\n\"Well Opal of course.\" Rebecca smiles widely at him.\n\n\"And why, I dread to ask, does she need any protection?\" Christopher asks.\n\n\"Well you're getting on a bit now Christopher, and I was hoping you two would find you get on very well. Her father has already approved, he thinks you two make a lovely match. He said if he could pick anyone for his little girl to marry, it would be you.\"\n\n*page_break\n\nYou look around, expecting somekind of outburst. However Christopher carries on cutting his lamb, calmly and collectedly. Opal blinks prettily at him, you can't tell what she's thinking. Rebecca takes a triumphant sip, looking pleased with herself. Alex carries on chewing on a parsnip staring dreamily out the window, looking an awful lot like he's not listening to a thing anyone is saying.\n\nChristopher finishes his mouthful and looks pointedly at his Mother, \"I only met her approximately 5 hours ago. I think it's situations like this that have birthed the phrase 'Jumping the gun'.\"\n\nWhat are you thinking about all this?\n*choice\n\t*selectable_if (chris1 = true) #I can feel my heart beating in my throat, I thought there was something between us. The way he's reacting, like this is no big deal, I don't like it at all.\n\t\t*set chris %+10\n\t\t*goto twentyeight\n\t*selectable_if (chris1 = true) #Well Opal will just have to get in line, myself and Chris have to finish what's between us before she can appear on the scene. This is practically arcane, with the parents setting it up, it's absurd - and I'm not worried in the slightest.\n\t\t*goto twentyeight\n\t#She may be going about it in the wrong way, but it looks like Rebecca is actually trying to make her son happy. I can appreciate that.\n\t\t*set reb %+10\n\t\t*goto twentyeight\n\t#I can only wonder how much of a say Opal had in this idea.\n\t\t*set opal %+10\n\t\t*goto twentyeight\n\t#I feel really sorry for Christopher, having this suprise thrown at him.\n\t\t*set chris %+10\n\t\t*goto twentyeight\n\t#Not my business, though I guess it's a bit weird.\n\t\t*set career %+10\n\t\t*goto twentyeight\n*label twentyeight\n\n\"Well that's why she's here dear, so the two of you can get to know one another.\"\n\n*if (chris1=true)\n\tThe movement's so small that you barely think even you see it, but you could swear for a second his eyes flick to you.\n\n\t\"Did it ever occur to you I might be seeing someone on my own terms Mother?\"\n\n\t\"Please, Christopher. I know you. In all your years as a grown man you've never had a single relationship. I'm not fool enough to think you've started recently.\"\n\n\tThrough virtue of how well you know Christopher you see a slight tightening in his jaw, embarrassment.\n\n\t\"Regardless I will not be entertaining Ms.Sandhurt\" he inclines his head to her politely, but his eyes are cold.\n\t*page_break\n\n\t\"Surely one evening won't hurt,\" Rebecca pushes.\n\n\t\"Mother I-\"\n\n\tRebecca cuts across him, \"Christopher stop behaving like a child. I will not take no for an answer.\"\n\n\t\"It is you who are behaving like I am a child, Mother. I am a grown man, I may live my life is I please, with or without a partner. And if I do live my life with a partner it will be one of my choosing.\"\n\n\t\"Christopher, you are being very rude right now. Opal is still related through business. Think about it as such.\" Rebecca doesn't say 'Think how good this could be for business.' but the idea hangs in the air none the less.\n\n\tChristopher simply stands and wipes his mouth on his napkin, \"There appears to be no talking to you right now. I shall retire.\" and with that he sweeps from the room.\n\n\t*choice\n\t\t#Stay\n\t\t\t*set chris %-15\n\t\t\t*set opal %+10\n\t\t\t*set reb %+10\n\t\t\t*goto thirty\n\t\t#Follow him\n\t\t\t*set chris %+10\n\t\t\t*set opal %-15\n\t\t\t*set reb %-5\n\t\t\t*goto thirtyone\n*else\n\tYou shuffle uncomfortably, not loooking at anyone and hoping no-one is looking at you. You really don't want to get involved in this.\n\n\tYou catch Alexanders eye. You aren't sure, but you think you see a sparkle of laughter in his eyes. Well, at least someone is enjoying themselves.\n\n\t\"Am I to understand that when you say 'get to know one another', you intend for me to take Ms. Sandhurst out and wine and dine her?\" Christopher says, unreadable as always.\n\n\t\"If you choose to, if you would rather take her rock climbing or ice skating however, I'm not one to judge.\"\n\n\t\"This method of dating is incredibly archaic.\"\n\n\t\"If you would entertain someone of your own accord I wouldn't be so 'archaic' as you put it.\"\n\n\t*page_break\n\n\t\"I don't see why I have to entertain anyone at all.\"\n\n\t\"Because you're hardly a spring chicken Christopher. It would really make your Mum feel better if she knew there was someone looking after your interests.\"\n\n\t\"And can my Mother not trust my capabilites in looking after my own interests?\"\n\n\tThere is a stony silence between the two. Alex is back to looking back out the window, clearly completely uninterested. Opal is watching Chirstopher closely, her eyes raking his body. A casual observer would say she was checking him out, but you can see her eyes flicking quickly backwards and forwards, almost as if she's trying to read him. She looks up, catches your eyes and gives you a warm smile that doesn't reach her amber eyes. They bore into you and you feel the hairs on the back of your neck stand up. You don't understand what, but you have the distinct sense she's staring you down over something.\n\n\t*choice\n\t\t#Look away\n\t\t\tYou avert your eyes and you can hear a little smug exhale of air. You have no idea what her problem is. You just shrug it off.\n\t\t\t*set opal %-5\n\t\t\t*goto thirtytwo\n\t\t#Hold her gaze\n\t\t\tYour eyes hold her blazing amber ones. Her brows furrow just a fraction and you can see a brutality in her eyes that doesn't match her pretty delicacy.\n\t\t\t*set opal %+5\n\t\t\t*goto thirtytwo\n\n\t*label thirtytwo\n\tThere's a small scrape as Christopher pushes his chair away from the table, dabbing his mouth with a napkin, \"There appears to be no talking with you right now Mother, I shall retire for the day.\" he leaves in a confident sweep and you are all left sat, staring at your cooling dinners.\n\n\t*goto thirty\n\n*label thirty\n\n\"I'm very sorry Opal. He's always been like this. I'm sure he will come around.\" Rebecca says, looking dejectedly at her meal.\n\n\"I do hope so, Daddy would be so disappointed if my visit was all for nothing.\"\n\n\"Not completely for nothing.\" Rebecca corrects, \"There is still the party at the weekend.\"\n\nYou see Alex out of the corner of your eye come back to earth from his day dream and visibly start at his missing brother. Only to cringe as his Mother turns her attention to him instead.\n*page_break\n\"Will you be coming to the ball Alex?\" \n\n\"I don't think I should,\" Alex nervously tugs the collar of his hoodie.\n\n\"Why not?\" Rebecca presses.\n\n\"I don't have an outfit.\" He blurts. Evidently it's the first excuse that comes to mind.\n\n\"There's still time to get one.\"\n\n\"But I have an audition.\"\n\n\"Then I shall get something for you. What else you got?\" Rebecca quips, not skipping a beat.\n\nAlex simply opens and shuts his mouth, unable to make excuses fast enough.\n\n\"Will you be able to handle that?\" Opal asks, looking pointedly at you, \"I need to go and find a dress as well. So tomorrow both Alex, Rebecca and I have to go to different places. Is your staff up to such a task?\"\n\nYou don't like her tone, challenging. Almost mocking.\n\n*choice\n\t#\"There's very little we can't handle Ms.Sandhurst.\"\n\t\t*set opal %-5\n\t\t*set career %+10\n\t\t*goto thirtythree\n\t#\"It's no problem. Thank you for letting me know.\"\n\t\t*set career %+5\n\t\t*set opal %+10\n\t\t*goto thirtythree\n\t#Give her a silent nod\n\t\t*set career %+5\n\t\t*set alex %+5\n\t\t*goto thirtythree\n\t#\"I asked for twentyfour hours warning. It will be a stretch to manage this at such short notice.\"\n\t\t*set opal %-10\n\t\t*set reb %-5\n\t\t*set career %-5\n\t\t*goto thirtythree\n*label thirtythree\nRebecca cuts across with a very loud sigh, \"You know, Christopher's outburst has caused me to loose my appetite. I think I shall retire for the afternoon. ${name}, will you accompany to my room? I'm sure you have little time to dawdle about eating anyway.\"\n\n*choice\n\t#\"I would be glad to escort you.\"\n\t\t*set reb %+10\n\t\t*goto thirtyfour\n\t#\"You were the one who invited me to 'dawdle', as you put it. You can hardly reprimand me now.\"\n\t\tThe entire family stare coldly at you. Perhaps you should learn to mind your manners if you intend to stay employed here.\n\n\t\t\"No more dawdling then, get back to your work.\" Rebecca says icily.\n\n\t\tYou stand up, your chair scraping loudly in the unfriendly silence that has settled over the room, and hurry out the door.\n\t\t*set reb %-25\n\t\t*set opal %-20\n\t\t*set career %-10\n\t\t*goto thirtyfive\n\t#\"I should actually get straight back to work, if you'll excuse me.\"\n\t\t\"A shame. But I am glad to see you're so diligent.\" Rebecca gives you a small smile as she stands, \"No rest for the wicked after all.\"\n\n\t\tYou smile politely at her and stand, \"Thank you for the lunch, I appreciate the opportunity to get to know you all better. We'll all be ready to go tomorrow,\" you reassure them as you leave, already trying to figure out how your staff are going to cope with following four people at once.  \n\t\t*set reb %+5\n\t\t*set alex %+5\n\t\t*set opal %+5\n\t\t*set career %+10\n\t\t*goto thirtyfive\n*label thirtyfour\n\nRebecca smiles at you, she is quite a radiant woman despite her age. She stands and offers you her arm. You give your half-finished lamb shank one mournful look before you take her arm and escort her out.\n\n\"Thank you.\" Rebecca says as she gestures for you to open the door for her, \"I expect with tomorrow being so busy you are very eager to get off and get planning.\"\n\n\"It's no problem Rebecca.\" you say, causing her to give your arm a little squeeze as you take her down the corridor.\n\n\"You must think us all ridiculous after witnessing that lunch. I am very sorry you had to witness it. I was hoping we could get to know you better but instead you just ended up caught in the middle of a row.\"\n\n*choice\n\t#Remain Silent. You're determined this is going to be none of your business.\n\t\t*set reb %-5\n\t\t*set career %+5\n\t\t*goto thirtysix\n\t#\"It's no problem. Things like that happen.\"\n\t\t*set reb %+5\n\t\t*goto thirtysix\n\t#\"You don't need to apologise for your son's difficult behaviour.\"\n\t\t*set reb %+10\n\t\t*goto thirtysix\n\t#\"What did you expect? Jumping a blind date on him like that?\"\n\t\t*set reb %-10\n\t\t*set career %-5\n\t\t*goto thirtysix\n\n*label thirtysix\nThe two of you fall into a silence as you walk, and you think you're safe from any more personal matters for a few minutes.\n\n\"So what has Christopher been saying about his old Mum?\" Her words are innocent, but there's a heavy insistency behind them. You can feel how much your answer matters to her.\n\n*choice\n\t#Lie. \"He talks about you all the time. He's clearly very fond of his family.\"\n\t\t\"Hog wash,\" Rebecca snorts, and there's a flash of anger in her eyes, \"Don't lie to me!\"\n\n\t\tHer hand grips your arm like a talon, you can almost feel her nails cutting into your skin.\n\n\t\t\"I appreciate you trying to console me,\" She says, her tone telling you she clearly doesn't appreciate it, \"But I will never appreciate a lie. Especially a bad one.\" She shoots you a pointed look.\n\t\t*set reb %-15\n\t\t*goto thirtyseven\n\t#\"I had never heard anything of you till recently.\"\n\t\tRebecca simply stares unblinkingly ahead and nods, \"I knew that would be the answer. Yet I find it still very hard to hear.\" You can feel her delicate hand clutching your arm, \"Yet I do appreciate someone who can be honest with me. I know it isn't in your interest to upset me. So thank you, it's good to know I can trust you.\"\n\t\t*set reb %+20\n\t\t*goto thirtyseven\n\t#\"I'm not comfortable discussing this with you.\"\n\t\t\"Diplomatic.\" Rebecca says, eyeing you, \"And by diplomatic I don't mean agreeable. I mean spineless.\" There is a touch of venom in her voice and you feel a cold chill through the hand that's clutching your arm.\n\t\t*set career %+10\n\t\t*set reb %-5\n\t\t*goto thirtyseven\n*label thirtyseven\n\nYou arrive outside Rebecca's room, and she detaches from your arm, \"Thank you for escorting me. I do get rather lost in this house.\"\n\n\"No problem.\" You reassure her, you turn to leave.\n*if (reb > 15)\n\tRebecca catches your arm, \"One last thing ${name}.\"\n\n\tYou turn back to her, her cold grey eyes squarely meeting yours despite her disadvantage in height.\n\n\t\"Has Christopher asked you to keep an eye on me? Or anything outside of your job description?\"\n\n\t*choice\n\t\t#\"No.\"\n\t\t\t\"A short but sweet answer.\" Whether Rebecca is being sarcastic or just dry you can't tell, \"I understand I'm putting you in a diffciult position. But you neeed not fear elaborating with me.\" Rebecca reaches out and grips your shoulder firmly, \"I hope to speak to you again soon.\"\n\t\t\t*set reb %+5\n\t\t\t*goto thirtyeight\n\t\t#\"Nothing really. Simply that I should remember he is my primary employer.\"\n\t\t\t\"Interesting.\" Rebecca furrows her brow and taps her chin, \"Thank You, ${name}. We will talk again soon. I find myself liking you more and more.\"\n\t\t\t*set reb %+10\n\t\t\t*goto thirtyeight\n\t\t#Remain silent. You will not get dragged into this squabble, damnit!\n\t\t\t\"Don't be so afraid.\" Rebecca blinks up at you, giving you a welcoming smile, \"Nothing you say to me will get back to him. I think you'll find there's a lot of benefit in working outside of your job description.\"\n\t\t\t*goto thirtyeight\n\n\t*label thirtyeight\n\tWith that Rebecca dissapears into her room, shutting the door behind her and leaving you with a lot to think about.\n\t*goto thirtyfive\n\n*label thirtyfive\nYou spend the rest of the day holed up with Emma, drawing up a new contract and planning the very difficult task that is to be tomorrow. You retire early - you're going to need your rest after all.\n\n*finish\n\n*label thirtyone\nYou stand awkwardly, your chair making a noise that seems deafening in the awkward silence.\n\n\"I should go and check on my staff.\" You're not even sure whether this is an acceptable excuse to be leaving. But you find you care less and less about propriety and more and more about Christopher.\n\nYou see Opal and Rebecca exchange a look as you scuttle out the room. You can't really say what they're thinking, and you don't have time to right now. But it seems pretty clear to you they are on the same 'team'.\n\nIt takes you a while to find Christopher. You look in his office, the other dining room, you even knock on his chambers. In the end you have to make a detour to the monitor room, where you see he's nowhere in the house.\n\nCrap.\n\n*page_break\n\nYou rush to the front door where Charlotte helpfully informs you he hasn't taken the car. The grounds then. He's not supposed to go walking out there alone. The gardens are so vast it's impossible for you to maintain proper surveillance there.\n\n*choice\n\t#Clearly he wants to be left alone. I should respect that.\n\t\t*set career %-15\n\t\t*set chris %-5\n\t\t*goto thirtyfive\n\t#I need to find him and make him feel better.\n\t\t*set chris %+5\n\t\t*goto thirtynine\n\t#I need to find him, it's actually my job at this point to get him back in the house.\n\t\t*set career %+8\n\t\t*goto thirtynine\n*label thirtynine\n\nYou rush out into the grounds. It's a windy day and it almost sweeps you off your feet. \n\nYou've always known that the grounds are big. But now you're faced with the task of searching them they are seeming bigger by the second.\n\n*fake_choice\n\t#Standing here isn't making them any smaller. Set out on foot.\n\t#You're sure there was a gardner caddy stored in the shed. It'll make your search a bit faster with any luck.\n\t#Go and ask Charlotte if she saw which way he went.\nIt takes you longer than you hoped to find him, long enough that your stomach is grumbling again.\n\nHe's chosen to hide at the very edge of the grounds. His back up against the wall boundary flanked on either side by hanging trees.\n\nYou push your way through the branches and he looks up, distinctly not dishevelled looking. He smiles at you.\n\n*choice\n\t#\"Are you alright?\"\n\t\t*set chris %+10\n\t\t*goto fourty\n\t#\"How could you come out here? It's dangerous!\"\n\t\t*set chris %+5\n\t\t*goto fourty\n\t#\"How could you come out here? It's my job to protect you, it isn't fair to treat me this way.\"\n\t\t*set chris %-12\n\t\tChris' smile fades fast.\n\n\t\t\"I thought you were out here to see how I was. Not to order me about some more.\"\n\n\t\tThere's a stony silence.\n\n\t\t*choice\n\t\t\t#\"You're right I'm sorry.\"\n\t\t\t\tHis smile is back on his face in a second.\n\t\t\t\t*goto fourty\n\t\t\t#\"This isn't just about you.\"\n\t\t\t\t*set chris %-20\n\t\t\t\t\"Right now, yes it is. Don't get too familiar. I am ultimately your employer. What I say goes. Not what you say.\"\n\n\t\t\t\tYou blink, the words go round and round in your head, and you realize how he thinks of your relationship. Very different to what you were thinking it seems.\n\n\t\t\t\t*choice\n\t\t\t\t\t#He's upset right now. He's saying things he doesn't mean. I'll just walk away for now and come back later.\n\t\t\t\t\t\t\"I'm sorry. I think maybe I should leave.\"\n\n\t\t\t\t\t\t\"Maybe that would be best.\" and he dismisses you with a flick of his hand.\n\t\t\t\t\t\t*goto thirtyfive\n\t\t\t\t\t#I don't care how upset he is. Whatever this thing was between us is off. I won't be with someone who doesn't care for what I say.\n\t\t\t\t\t\t*set chris1 false\n\t\t\t\t\t\t*set chris 1\n\t\t\t\t\t\t\"Fine.\" You say, shrugging and trying to look as nonchelant as possible, \"You're the employer. I shall remember that from now on. I'll simply point out that in our contract it's stated that if you leave our safety perimieter of your own will we aren't responsibile for your well being.\"\n\n\t\t\t\t\t\tYou leave him sat alone under the tree to get back to your job. No more distractions.\n\n\t\t\t\t\t\tOr...\n\n\t\t\t\t\t\tPerhaps scorned you are not easily written off.\n\n\t\t\t\t\t\tWhat are you going to do?\n\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Commit myself to work 100%. No distractions. Really.\n\t\t\t\t\t\t\t\t*set career %+20\n\t\t\t\t\t\t\t\t*goto thirtyfive\n\t\t\t\t\t\t\t#I think a little revenge might be in order.No one treats me like that.\n\t\t\t\t\t\t\t\t*set reb %+5\n\t\t\t\t\t\t\t\t*set opal %+5\n\t\t\t\t\t\t\t\t*set revenge true\n\t\t\t\t\t\t\t\tNothing serious. As Christopher so kindly reminded you, you are still employed by him. But evidently there is something going on with Rebecca and Opal. It couldn't hurt to stick your nose in a little further and see what's going on at least.\n\n\t\t\t\t\t\t\t\tYou set off to find Rebecca. No point wasting any time.\n\t\t\t\t\t\t\t\t*goto fourtyone\n*label fourty\n\n\"I appreciate that you're worried about me. But it's no problem honestly. I just needed some space. I didn't want to be in the house with them. No drama though - I shall simply weather the storm, and by that I mean my mother, as I have always done.\"\n\n\"If you say so.\" You reply, slightly unsure, \"But it's okay to be a bit upset about it. Your mother did have quite a big suprise for you.\"\n\nYou manage to make Christopher laugh, he seems to relax, \"A touch of an understatement, but correct in its essence.\"\n\nHe stands and makes his way over to you. Slinging his arms over your shoulders so he's looking straight down at you.\n\n\"Are you worried that I'm going to start seeing Opal?\" He looks strong and so in control standing over you, but you can see in the slight quiver of his eyes how much he wants an answer.\n*choice\n\t#\"I'm not worried. I know we've started something and I trust you to finish it.\"\n\t\t\"Good. I'm glad you feel that way.\" Christopher takes a deep breath, his eyes holding yours. You can feel the wind tearing your hair into a mess but you don't care. \n\t\t*goto fourtytwo\n\t#\"She's just such a beautiful woman... I thought for a second...\"\n\t\tChristopher places his fingers on your lips to quiet you. They smell faintly of his cologne and the tips are soft against your lips.\n\n\t\t\"To me, you're twice as beautiful as Sandhurst. You have an honest beauty. When she looks at me, I feel like a piece of meat she wants to devour. When you look at me I feel like a man. There's no contest between you.\"\n\t\t*goto fourtytwo\n\t#\"Are you telling me I have nothing to worry about?\"\n\t\tChristopher blinks at you, \"I think you already know the answer. Are you testing me?\" He teases you lightly as he pushes back the hair that's whipping your face in the wind.\n\t\t*goto fourtytwo\n*label fourtytwo\n\"I promise you I'm not going to see her. Actually I promise you not to see anyone else, I want to spend my time with you.\"\n\nChristopher takes your hand and turns back towards the house, \"Come on, I know I'm outside your perimeter. I'm sorry about that.\"\n\nThe two of you walk in silence for a little while, it's difficult to talk when the wind whips your words away.\n\n*page_break\n\nJust outside the range of the house's cameras, Christopher pulls you to a stop, spinning you to face him, \"I mean what I say. I want to give my time to you. And I mean it in a serious way, I want to see where we can take this. I want you for the whole of tomorrow.\" He bends and kisses your hand, \"I'll call for you at 10, be ready.\"\n\nHe smiles at you and leaves.\n\nYou take a moment to collect yourself and make your way back inside, heading straight for the office and trying to figure out how you're going to orchestrate a day off when you hear a high musical laugh and the faint sound of Rebecca's voice.\n\n*choice\n\t#Hide and Listen.\n\t\t*goto fourtythree\n\t#Stay out in the corridor and face them head on.\n\t\tOpal and Rebecca meet you head on as you come down the corridor. They smile and greet you politely, but don't stop as they carry on by, chattering about a funny story concerning Opal's father in a skiing accident.\n\n\t\tBut you can feel their eyes on your back as you retreat away from them to your office.\n\n\t\tWhen you get there Emma gives you a dirty look, but says nothing to you. Not even any pleasantries, just straight down to work.\n\t\t*goto thirtyfive\n\n*label fourtythree\nEyes scanning the corridor, you see that there's not really a good place to hide so you pick a door and, hoping to God they aren't going to come through it, hide behind it, leaving a crack to listen through.\n\n\"I'm so glad it didn't put you off him.\" Rebecca says. You strain to hear her as she and her companion are still so far down the corridor.\n\n\"Not at all.\" Such a musical voice that could only belong to Opal replies, \"It was quite a shock for him. I'll go see him myself this afternoon and apologise, perhaps I should have presented myself more privately to give him an opportunity to discuss it with me.\"\n\n\"Perhaps.\" although Rebecca doesn't sound sure, \"Either way I'm sure we will get over this little bump. You two have so much in common, you both want the same things, there's no reason you shouldn't get on very well.\"\n\n\"Definitely.\" You can hear them walking past your room, \"But I do have one concern...${name}\" she says your name delicately like she's saying something really offensive.\n*if (gender=false)\n\t\"Why?\" Rebecca asks, \"${name} seems to be perfectly confident in his position to me.\"\n\t*goto fleetwood\n*else\n\t\"Why?\" Rebecca asks, \"${name} seems to be perfectly confident in her position to me.\"\n\t*goto fleetwood\n*label fleetwood\n*page_break\n\n\"I didn't mean I wasn't confident in ${name}s ability to protect Christopher. I was thinking of something else entirely.\"\n\nThey're too far away for you to hear Rebecca's response.\n\nIt would be very unwise to follow them in an open corridor.\n\nWhat do you think of this?\n*fake_choice\n\t#What me and Christopher do is none of Opal's business. She has no stake in him, who he sees is his choice and he's chosen me.\n\t#She better be 'concerned', she might be rich but if she crosses me, I have claws.\n\t#I know what Christopher said. But I can't help but feel a squirming in my stomach, I have a feeling there's more to Opal than I'm seeing.\nEither way, you have alot to think about as you go about the rest of your day.\n\nYou go straight to your office and, noting that Emma seems to be very unhappy with you, get down to work.\n\n*goto thirtyfive\n\n*label fourtyone\n\nTrying to tame your hair out of 'wind swept' style you check the clock as you stride back into the hall. You can't think where else to check but Rebecca's room.\n\nLuck is on your side and she's there, opening the door to you with a wide smile.\n\n\"${name}, it's lovely to see you.\" But she doesn't invite you in.\n\n\"Rebecca,\" you incline your head, suddenly a bit lost for words, you can't exactly be completely honest with her.\n\n\"Is there anything I can help you with dear?\"\n\n*choice\n\t#\"I noticed some friction between you and Christopher. I wanted to see if there was someway I could help.\"\n\t\t\"A nice sentiment, if a touch forthright.\" Rebecca opens the door to you. You can't be sure whether her face is tight out of amusement or annoyance.\n\t\t*set reb %+5\n\t\t*goto fourtyfour\n\t#\"I didn't get an opporunity at lunch to hear more about you, I thought now would be a good time.\"\n\t\tRebecca looks rather suprised, \"That's quite a lovely thought. Please come in.\"\n\t\t*set reb %+8\n\t\t*goto fourtyfour\n\t#Stammer uncertainly.\n\t\t\"Are you alright ${name}?\" You simply open and close your mouth at her, \"Are you choking?\" she asks.\n\n\t\tUnsure of whether she is joking or not you simply ask to come in.\n\t\t*set reb %-8\n\t\t*goto fourtyfour\n*label fourtyfour\n\nYou follow her inside her suite and she gestures to a seat.\n\n\"Now, please tell me what's been on your mind. You look rather shaken if I'm honest.\"\n\nThere's a short pause while you improvise a fabricated interest that might steer the conversation towards Christopher.\n\n\"Were you just with Christopher?\" Rebecca asks, watching you intently and putting alot of emphasis on the word 'with'.\n\nYou gulp.\n*choice\n\t#Yes.\n\t\t\"Good.\" Rebecca gives you a warm smile, \"I'm a big fan of honesty. Everyone's always lying to each other. It makes things take such a long time. I do appreciate you stopping by, but I am quite worn out from the day. However if you would escort me personally to town tomorrow I would be much obliged and more inclined to discussion. Good night.\"\n\n\t\tYour dismissal is pleasant, but clear.\n\t\t*set reb %+10\n\t\t*goto thirtyfive\n\t#No.\n\t\tA sudden coldness washes over Rebeccas face, \"You would do well to remember I despise liars.\" she spits the word like a vicious swear, \"If you would care to accompany me to town tomorrow you may apologise to me then. Now get out.\"\n\n\t\tShe points you to the door and you scurry out with your tail between your legs.\n\t\t*set reb %-20\n\t\t*goto thirtyfive", "protect3": "*temp opalconvu false\n*temp opalconvf false\n*temp didnttell false\n*temp didtell false\n*temp robinvite false\n*temp alexinvite false\n*temp alexact false\n*temp breakup false\n*temp opalprop false\n*temp alexout false\n*temp rebout false\n*temp opalout false\n*temp chrisout false\n*temp book false\n*temp bookbuy false\n*temp replay false\nYou're surprised when your alarm wakes you up and not your radio.\n\nYou expected that today, since all of your charges are wanting to go out, there would be an early morning panic.\n\n*if(chris1=true)\n\tEspecially since you're taking the day off. Not that anyone knows that Christopher's outing is with you. Although they are sure to find out since your own staff are going to have to escort you out.\n\n\t*goto next\n*else\n\t*goto next\n*label next\n\nSmall blessings.\n\nYou're getting ready, really enjoying the fact that you can get dressed at a leisurely pace when there's a knock on the door.\n\n*if (rob1=true)or(rob>50)\n\t*goto arss\n*else\n\t*goto bollocks\n\n*label arss\nYou're pleasantly suprised to find Rob at the door with a tray of breakfast.\n\n\"Emma told me you had a really busy day today. I thought you might not have time to get something to eat so I - You know.\" He looks down at the tray and shakes it a little, causing the china to rattle, \"It's for you.\" He adds.\n\n\"Thank you.\" You notice two cups on the tray, evidently someone came prepared just in case.\n\n*choice\n\t#\"Would you like to come in?\"\n\t\t*set rob %+10\n\t\t*goto one\n\t#\"Thank you for bringing breakfast, but I just need some time alone before today if that's okay?\"\n\t\t\"Oh, of course. Silly of me to think that maybe - No. Anyway I hope you enjoy.\" He scuttles off down the corridor.\n\n\t\tYou smile after him and set the tray down. Everything is arranged artistically on the plate - there are even dainty little pots for the sugar and milk.\n\n\t\tOne thing out of place is an envelope propped up between your mug and the tea service.\n\t\t*set rob %-5\n\t\t*set rob1 false\n\t\t*goto two \n\n*label one\nRob pretends to look at his watch, even though you know he must have time because he brought two cups, \"I think a ten minute chat would be nice.\"\n\nYou stand aside and he steps into your room, eyes darting around for a place to sit.\n\n*fake_choice\n\t#Point him over to the one stool not covered in your junk.\n\t#Shove a load of my stuff on the floor to make space for him to perch on the bed.\n\t#Lead him over to your little dining table, nice and tidy.\n\t#The only place to sit in the barren room is your desk, it'll have to do.\n\nRob perches on the edge of his seat and looks much more comfortable when you go to finish washing your face and he can busy himself with the tea stuff.\n\n\"How's Anna?\" You call through from your en-suite.\n\n\"Beautiful as always.\" Rob replies. You can hear the joy in his voice when he talks about her, \"She's gotten really curious about things recently, she wants to read all these encyclopedia. She understands more words than I thought she would though. She's constantly coming to tug on my shoulder to ask me to help her identify plants in the back garden or find places in her atlas. It's a shame though...\" he trails off, suddenly going quiet.\n\n\"What's a shame?\" You ask, coming back through and toweling your face.\n\n\"Uh - I didn't really mean to say anything, it just kind of came out, I don't want to complain. But I don't really have enough money to be spending on fancy books, and the library is a bit lacking in books like that.\"\n*set book true\nRob makes tea noisily, clearly hoping for a quick subject change.\n\n\"So...\"\n*choice\n\t#\"What do you do in your time off then?\"\n\t\tRob hands you your tea. He doesn't seem too happy about this new topic of conversation either, \"Unfortunately I don't have a lot of time that isn't here or looking after Anna and our home.\"\n\n\t\t\"Okay,\" you try a different tact, \"What do you enjoy?\"\n\n\t\t\"Interesting,\" Rob sits, looking thoughtful as you tuck into your breakfast, \"I like cooking. I like to pretend I'm making a potion. Actually pretend I didn't say that, that's weird. But I do still like making stuff from scrath that people can enjoy. Me and Anna bake together a lot and that's probably the most fun. I did actually always think that if I could pick a job, I would want to be one of those dessert chefs, making fruit flowers and stuff.\"\n\t\t*goto three\n\t#\"What are you doing today?\"\n\t\t\"Same as every day,\" Rob shrugs and starts filling his tea with sugar, \"I finish at three, go and collect Anna from nursery. Then we go home. Although that's a lie, today is new story day so we'll go to the library on the way home.\"\n\n\t\t\"What story are you going to get?\" You ask teasingly.\n\n\t\t\"Well Anna's story will probably be about a jungle adventure and Rob's story will probably be one of those self help books that tell you how not to drop things under pressure.\" he chuckles to himself, \"I'm so clumsy, how I keep my job is beyond me.\"\n\t\t*goto three\n\t#\"Do you have any other family?\"\n\t\t\"We have an aunt. Although I get the feeling she doesn't like to see us. Because it's just us and all, I think she feels guilty. I don't really like to see her either. She's never done anything for Anna, but when she sees her she's all over her saying lots of 'I love yous' and stuff, but I'm just there thinking: If you love her why won't you give her anything, not even birthday or Christmas cards, let alone any money for actual things like the school uniform she's going to need next year.\"\n\n\t\tYou blink at Rob in shock. He's getting himself more and more worked up, his face going a little red just talking about his aunt.\n\n\t\t\"I'm sorry.\" Rob averts his eyes, \"I just think Anna gets confused, and I don't think it's fair. I mean 'I love you' is such an easy thing to say, but so hard to follow up and I hate when people throw it around like that.\"\n\t\t*goto three\n\t#\"Do you have a partner?\"\n\t\tRob nearly spits out his tea at you. At least you successfully changed the topic.\n\n\t\t\"Sorry!\" Rob apologises as he pats himself on the back, \"Um-\" he turns red, whether from choking or embarrassment you aren't sure.\n\t\t*if (rob1=true)\n\t\t\t\"No. I'm not seeing anyone. I uh-\" he sputters again, his eyes darting from you to around the room and back to you, his face heating up more and more.\n\n\t\t\t\"Are you?\" he asks, his eyes are big, bravely holding yours.\n\n\t\t\t*choice\n\t\t\t\t#Yes.\n\t\t\t\t\t\"Oh,\" Rob averts his eyes from you, suddenly very interested in his tea cup, \"I'mhappyforyou.\" he blurts.\n\t\t\t\t\t*set rob %-10\n\t\t\t\t\t*set rob1 false\n\t\t\t\t\t*goto three\n\t\t\t\t#No.\n\t\t\t\t\t\"Oh,\" Rob holds your gaze. His face is so open and you can see a little sparkle in his eyes, \"I'm glad.\" Rob slaps his hand over his mouth as he realises what he's said, \"Urk, I mean-\"\n\t\t\t\t\t*set rob %+5\n\t\t\t\t\t*goto three\n\t\t*else\n\t\t\t\"I'm not seeing anyone.\" he shrugs, composing himself and sipping his tea, \"Who has time, really?\" \n\n\t\t\tYou can't help but chuckle in empathy. Exactly, who has time?\n\t\t*label three\n\t\tYou are interrupted for the first time not by your radio. The beeper at Robs hip buzzes insistently.\n\n\t\t\"Ah, they need me back in the kitchens.\" Rob stands, picking up the breakfast tray presumably out of some kind of habit and then putting it back down again for you, \"It's been nice to see you.\"\n\n\t\t\"Yes,\" You agree, standing and walking him to the door. You open it for him, but he turns to speak to you one last time.\n\n\t\t\"I was thinking. If you aren't busy this evening you might like to come to my house.\" His face is so hot you think he might erupt at any second, \"I mean you have a busy day today, I could cook, it would be fun. If you can get time off that is.\"\n\n\t\t\"I'll have to let you know when I get back.\" You say and the two of you exchange numbers before he disappears out the door.\n\n\t\tSmiling, you make your way back over to your breakfast. After all it's always nice to have someone looking out for you. Then you realize there is an envelope lying down, half covered by the plate.\n\t\t*temp robinvite true\n\t\t*goto two\n\n*label bollocks\nRob's standing at the door holding an envelope out to you, which he passes over the threshold, keeping his distance.\n\n\"Thanks,\" you say, as he carries on down the corridor before you can even ask who it's from.\n\n*label two\n\nYou turn the letter over in your hands. The lack of address must mean it's from someone in the house. But who would write a letter to you if you live in the same house?\n\nWasting no more time, you open it up to see it is a short invitation from Opal to join her for tea at nine before her outing.\n\nYou have to wonder if rich people must do everything over tea.\n\n*choice\n\t*selectable_if (chris1=true) #I will accept, but not because I want anything to do with her. The phrase 'keep your enemies close' springs to mind.\n\t\t*set chris %+10\n\t\t*set opal %-5\n\t\t*goto five\n\t#I will accept. I can't deny I'm curious about this whole affair, something is clearly going on that I'm not seeing.\n\t\t*set opal %+5\n\t\t*set chris %-8\n\t\t*goto five\n\t#I won't accept, I have no time for tea.\n\t\tYou simply spend your time in the office with Emma, preparing for your busy day. Exciting.\n\t\t*set opal %-10\n\t\t*goto four\n\t#I will accept, but not for personal curiosity. I have a responsibility to know all my charges, and I know basically nothing about Opal.\n\t\t*set career %+5\n\t\t*goto five\n*label five\n*if (rob1=true)or(rob>50)\n\tYou eye the breakfast Rob brought you mournfully, it seems a shame to leave it, but you're going to have to get going now.\n\t*goto six\n*else\n\tMaking sure you have everything, you set off straight away.\n\t*goto six\n*label six\nOn your way to Opal's quarters you notice the house is a lot livelier than usual. It seems that the staff are making the most of everyone being out by giving the house a good industrial scrub. It seems everyone is busy today.\n\nGoing past the library you hear a voice and banging drifting through the open door.\n\nYou have a few minutes.\n\n*choice\n\t#See what it is\n\t\t*temp act true\n\t\t*goto eight\n\t#Carry on\n\t\tYou shrug and carry on. There's always something odd going on round the house, if you investigated everything you'd never have time for anything else.\n\t\t*goto seven\n*label eight\nCurious you stick your head around the door. Alex is standing inside in, what you are quickly discovering are, his trademark brown cords and lumpy grandad patterned jumper.\n\nHis back is to you and he is soliloquising animatedly, slamming his hands on the table next to him in fierce emotion \"This look of thine will hurl my soul from heaven, And fiends will snatch at it. Cold, cold, my girl!\"\n*choice\n\t#Greet Alex\n\t\tAlex jumps and turns to you, shaking his head and visibly very annoyed at being interrupted.\n\n\t\t\"May I help you ${name}?\" He asks, looking away from you and back to some papers open on the table.\n\n\t\t\"Nothing specific,\" You say
