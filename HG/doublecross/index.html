ous and you manage to, just, feeling sick from the impact.\n\t*set wound +1\n\t*goto 32\n*label 32\nYou push yourself up on your feet again just in time to grapple the man who launches himself at you.\n\nHe knocks you prone, but you bring him down with you, struggling for the upper hand.\n*choice\n\t#Try and pull him into a sleeper hold. Subduing him is my best bet.\n\t\tYou do your best to turn him over so you can have the upper hand. You manage to flip him over but his wild flails are almost like an animals and his fist catches you on the bridge of the nose. Your eyes water and you instinctively release your hold to clutch your face.\n\t\t*set wound +1\n\t\t*goto 33\n\t#Low blow, this is no time for by the rules fighting.\n\t\tA dastardly but no less effective move that makes the man roll off you with a sickening groan.\n\n\t\tYou catch his hands but he flails his legs, moving to block him. You let go and he pushes himself to his feet away from you.\n\t\t*set ronanwound +1\n\t\t*goto 33\n\t#Reach for my gun. Even if I don't shoot him it will frighten him submission. Hopefully.\n\t\tYou fight to reach your gun. But against such a wild attacker to let your guard down even for a second would mean a broken bone.\n\n\t\tYou feel a knee in you stomach and the man treads on your hand causing you to cry in pain.\n\t\t*goto 33\n*label 33\n\nThe man uses the break in fighting to push himself off you and tear off out of the maze and into the gardens. Evidently now his plan to catch you off guard hasn't gone how it was supposed to. He doesn't dare to challenge you openly. To let him hide again would be to loose your advantage.\n\nYou run after him, sprinting as fast as you can, vaulting hedges and shortening the gap between you.\n\nYou pull your gun out of its holster. Just in case.\n*page_break\n*if (wound=0)\n\tLuckily you're completely ready for the chase. Nothing's holding you back and you soon catch him, tackling him to the ground and hitting him across the back of the head to confuse him.\n\t*goto 34\n*else\n\tUnfortunately he hit you hard earlier and you aren't feeling quite yourself as you chase after him.\n\n\tIt takes you a while to even get close to him down on the bank. It's completely black and you're left chasing the sound of his feet crunching on the gravel bank.\n\t*goto 35\n*label 34\n*page_break\n*if (rebplot=true)\n\t\"Stop!\" A shrill voice cuts through the bushes. You turn and see Rebecca stumbling towards you.\n\n\t\"Rebecca!?\" you say in suprise as she hikes up her dress and steps through the bushes towards you, \"Why are you here?\"\n\n\t\"I came to find you. I had a feeling you would do your job far too well. Think about what you're doing.\" Rebecca kneels next to you in the bushes and whispers, \"If you catch him you're out of a job. My plans will be ruined and our deal will be off. Christopher will throw me out the house. The cameras can't see us here. Let him go.\"\n\t*goto 36\n*elseif (opalplot=true)\n\t\"No!\" Opal's voice cuts through the bushes to you, commanding as ever. You turn to see her striding towards you through the bushes like a drill sergeant.\n\n\t\"Opal? What are you doing?\"\n\n\t\"I had a feeling you might do your job too well.\" Opal kneels down next to you in the mud, the attacker still under you, \"So I came to stop you. Think, if you do this, your contract is over. Christopher will send you away. Our deal will be off. You can't do that to me, I need your help.\"\n\t*goto 37\n*else\n\t\"Alright alright ye'bloody animal.\" the mans voice is a gruff Irish bark. \n\t*goto 40\n*label 36\n*page_break\n\"Come on,\" she urges, \"No one can see you here. Just let him go.\"\n\nSo, what are you going to do?\"\n*choice\n\t#She's right. If I don't let him go all our plans will be ruined.\n\t\t*set career %-5\n\t\t*set reb %+10\n\t\t*goto 38\n\t#I know this will end what I have with Rebecca but I can't sacrifice all my integrity for that.\n\t\tYou bow your head for a second, then crack the kidnapper hard enough to knock him out. Now he can't run.\n\n\t\t\"What are you doing?\" Rebecca asks, staring at you in horror.\n\n\t\t\"I'm doing my job,\" you reply coldly, \"Me forfeiting everything I've worked for was not part of our deal.\"\n\t\t*goto_scene earlyend\n\n*label 37\n\"Come on,\" she urges, \"No one can see you here. Just let him go.\"\n\nSo, what are you going to do?\"\n*choice\n\t#She's right. If I don't let him go all our plans will be ruined.\n\t\t*set opal %+10\n\t\t*set career %-5\n\t\t*goto 38\n\t#I know this will end what I have with Opal but I can't sacrifice all my integrity for that.\n\t\tYou bow your head for a second, then crack the kidnapper hard enough to knock him out. Now he can't run.\n\n\t\t\"What are you doing?\" Opal asks, staring at you in horror.\n\n\t\t\"I'm doing my job,\" you reply coldly, \"Me forfeiting everything I've worked for was not part of our deal.\"\n\t\t*goto_scene earlyend\n\n\n*label 38\nYou nod. The feeling of finally abandoning one path for another settling over you.\n\n\"Great. I'd better get back before someone starts to panic about where I am.\" she stand and stretches. Then leaves you to decide how best to get rid of the man.\n\nYou carry him down to the river, taking paths where you know the cameras have blind spots and dump him on the dark bank. No one will see him till he wakes up.\n*set chriskidnap false\n*set alexkidnap false\n*set opalkidnap false\n\nYou return to the house to find all your charges safe and ready to go home, congratulating you on your great success on keeping everyone safe.\n\nYour agency are sure to hear about the great job you've done. Your betrayal will remain a secret. I hope your lie pays off for you.\n*set chris %+5\n*set reb %+5\n*set opal %+5\n*set alex %+5\n*set rob %+5\n*finish\n\n*label 40\nYou crack him over the head to shut him up.\n\n\"Argh! Point made!\" He yells struggling under you, \"Look I can see I'm pinned here. But you're a hired hand, am I right?\" his accent is so strong you struggle to understand him.\n\nYou're about to get up and drag the scoundrel with you when your vision blurs. Your hands fly to the back of your head and your fingers come away bloody, then your vision goes completely and you fall to the floor out cold.\n*finish\n\n\n*label 35\n\nYou run as far and as fast as you can. But you can hear his footsteps getting further and further away in the dark until eventually you can't hear them anymore.\n\nClutching your injuries you go back to the hotel.\n\nYou stumble into the main hall that's all but deserted except for your charges and staff.\n\nEmma rushes over to you and lets you lean on her.\n\n\"I couldn't get him.\" You say needlessly.\n*if (ronanwound>0)\n\t\"Don't worry,\" Emma reassures you as she eases your weight fully onto her, \"It's not your job to catch him. And with that kick you gave him I don't think he'll be trying again soon.\" she tries and fails to cover her snort at your scrap.\n\t*goto 44\n*else\n\t\"It's not your job to catch him. You didn't even need to try. So don't think about it anymore.\"\n\t*goto 44\n\n*label 44\n*page_break\n\nYou look around you and see that\n*if (kidnap=false)\n\teveryone present.\n\n\tYou sign in relief. You may not have caught him, but at least everyone's safe.\n\t*finish\n\n*elseif (chriskidnap=true)\n\tChristopher, \n\t*goto 41\n*else\n\t*goto 41\n*label 41\n*if (alexkidnap=true)\n\tAlex, \n\t*goto 42\n*else\n\tgoto 42\n*label 42\n*if (opalkidnap=true)\n\tOpal\n\t*goto 43\n*else\n\t*goto 43\n*label 43\n's gone. \n\n\"I'm sure we'll find them\" Emma reassures you, \"There was such a panic. But I know you can handle it. Tell us what you want us to do next.\"\n*finish", "protect5": "*temp chrisbribe false\n*temp rebsave false\n*temp alexchrisbribe false\n*temp alexrebbribe false\n\n*if (alexkidnap=true)\n\t*set opalkidnap false\n\t*set chriskidnap false\n\tYou toss and turn all night. You can't believe it.\n\n\tAlex taken on your watch. You tried so hard, but evidently your efforts weren't enough. You can only hope he's okay, and that you don't lose your job over this.\n\t*goto 1\n\n*elseif (opalkidnap=true)\n\t*set chriskidnap false\n\tYou toss and turn all night. You can't believe it.\n\n\tOpal taken on your watch. You tried so hard, but evidently your efforts weren't enough. You can only hope she's okay, and that you don't lose your job over this.\n\t*goto 1\n\n*elseif (chriskidnap=true)\n\tYou toss and turn all night. You can't believe it.\n\n\tChristopher taken on your watch. You tried so hard, but evidently your efforts weren't enough. You can only hope he's okay, and that you don't lose your job over this.\n\t*goto 1\n\n*else\n\t*set career %+30\n\tYou toss and turn all night, fidgeting with your own success.\n\n\tYou've always known you've been good at your job, but now everyone else knows it. Indisputable proof. All your charges are safe.\n\t*goto 1\n*label 1\n\n*if (continuity=true)\n\tOne thing you can't seem to shake off though... You didn't put much security on Rebecca, and she didn't go missing. She didn't even seem to be in danger.\n\n\tPerhaps it's nothing, perhaps it's just you. But you can't help thinking that she seems suspiciously safe. It's worth thinking about looking into.\n\t*goto 2\n*else\n\t*goto 2\n\n*label 2\n*page_break\nEventually you're saved the trouble of trying to get some sleep by the phone ringing as the sun peeks up over the horizon.\n\n*if (alexkidnap=true)\n\t*goto 3\n*elseif (opalkidnap=true)\n\t*goto 3\n*elseif (chriskidnap=true)\n\t*goto 4\n*else\n\t*goto 5\n\n*label 3\nIt's your agency. They are, of course, not happy at your ineptitude, but inform you that Christopher does not wish to terminate your contract. Although they do slip in an ominous 'yet' as you ring off.\n\nYou'd better watch your step.\n*goto 6\n*label 4\nIt's your agency. They are, of course, livid at your ineptitude, but inform you that since you are still bound to protect others and there is no one to terminate the contract despite the broken terms you will remain employed by the Haywood's for now.\n\nAlthough they hasten to add you shouldn't be expecting to get another job any time soon before they ring off.\n\nIf you want to remain with the agency you're going to have to impress them in some way now.\n*goto 6\n*label 5\nIt's your agency and they sound ecstatic at your success. They didn't need to, but they seemed to be unable to help calling you. They reassure you that after the kidnapping threat has gone you have your choice of jobs after managing such a big operation so seamlessly. \n\nGood job.\n*label 6\n*page_break\nThe second you press the off call button there's a loud rap on your door. \n*if (chris1=true)\n\t*goto 7\n*elseif (opalplot=true)\n\t*goto 8\n*elseif (rebplot=true)\n\t*goto 9\n*elseif (alex1=true)or(alex>70)\n\t*goto 10\n*else\n\t*goto edit42\n*label 7\nYou open it to find Christopher. \"Good Morning my love,\" he says, stepping into your room and bending to give you a soft kiss, \"I couldn't resist coming to see your face first thing in the morning.\" he smiles down at you and takes your hand, pulling you back into the room to a sitting position on the end of the bed.\n\n\"How are you feeling about last night?\" he asks.\n*choice\n\t#\"How do you feel?\"\n\t\t\"Knowing that you and I are both safe - I feel fine,\" Christopher smiles at you, and he looks so carefree for a moment you forget about any worries you might have.\n\t\t*set chris %+8\n\t\t*goto 21\n\t#\"Awful, I couldn't do my job to the standard I wanted.\"\n\t\t\"You did the best you could,\" Christopher comforts you, pulling you close to him, \n\t\t*goto 21\n\t#\"As well as I can be, I kept you safe after all.\"\n\t\t\"Thank you,\" Christopher smiles at you, \"I appreciate your way of thinking of me,\" he pauses for a moment, \n\t\t*set chris %+3\n\t\t*goto 21\n\t*selectable_if (continuity=true) # \"Actually I've noticed something suspicious. None of my staff were watching Rebecca last night, and there was no problem for her.\"\n\t\t*set chris %+10\n\t\t*goto 22\n\t*selectable_if ((alexkidnap=true) or (opalkidnap=true)) #I just can't believe someone was taken because I couldn't do my job properly.\n\t\t\"I don't care about any of that,\" Christopher reassures you, \"We kept us safe, and that's what matters. What do those people matter? We're fine. But...\" his voice trails off.\n\t\t*goto 21\n\n*label 21\n\"There is one thing I wanted to ask you though.\" Christopher continues, \"I want to know what security measures you put on my mother.\"\n\n\"All the security measures I put on everyone,\" you reply.\n\n\"It's just I saw, well I think I saw, her alone, slipped away from your staff for a moment. And she just seemed so unconcerned. It seems odd to me that she might be so calm in a situation like that unless...\" Christopher tails off, looking pointedly at you.\n*choice\n\t#\"She doesn't understand the danger she's in?\"\n\t\tChristopher snorts in a burst of apparently uncontrollable laughter, \"My mother may be many things my love, but an idiot she is not. No, I think it's not that she doesn't understand the danger. Merely that there is none. Not to her at any rate.\"\n\n\t\t\"Are you suggesting what I think you're suggesting?\"\n\n\t\t\"What do you think I'm suggesting?\" Christopher eyes hold yours, challenging you. He looks almost, dare you even think it, dangerous.\n\t\t*set chris %+5\n\t\t*goto 23\n\t#\"She has no reason to fear?\"\n\t\t\"Exactly my thoughts,\" Christopher smiles at you, evidently pleased your minds are in sync.\n\t\t*set chris %+8\n\t\t*goto 23\n\t#\"Are you suggesting what I think you're suggesting?\"\n\t\t\"What do you think I'm suggesting?\" Christopher asks, holding your eyes in what feels to you like a dare. A dare to say what's on your mind.\n\t\t*set chris %+3\n\t\t*goto 23\n\t#\"I have no idea what you're driving at.\"\n\t\t\"Don't you?\" Christopher raises his eyebrows in surprise, \"I thought you would have seen something so obvious.\"\n\n\t\t\"Apparently not,\" you say.\n\n\t\t\"I'm saying that she doesn't seem to be in danger. And who wouldn't be in danger from a kidnapper? Except the kidnaper themselves... or...\" Christopher trails off, apparently determined you're going to piece together something at least.\n\t\t*set chris %-5\n\t\t*goto 23\n*label 23\n\n\"You think she is responsible for the kidnappings?\"\n\n\"I'm sure of it,\" Christopher replies vehemently.\n\n\"What do you want to do about it then?\"\n*page_break\n*goto 24\n\n*label 22\n\"Yes that is suspicious.\" Christopher raises his eyebrows, but his voice doesn't suggest he is dismissive.\n\n*choice\n\t#\"I can't help but think she might have something to do with the kidnapper. Otherwise how is she safe?\"\n\t\t\"You think she's the one causing all this?\"\n\n\t\t\"That was roughly what I was getting at yes,\" you say, still a bit wary of verbally accusing Christopher's own mother.\n\t\t*set chris %+8\n\t\t*goto 25\n\t#\"What do you think of that?\"\n\t\t\"I know what I think, but what do you think? I don't want you to be frightened of saying what you think in front of me,\"\n\n\t\t\"Well,\" you start slowly, \"I think that her safety points to her being very closely linked with the kidnapper. There isn't really another explanation.\"\n\t\t*goto 25\n\t#\"I don't know what to think about it though.\"\n\t\t\"Are you sure?\" Christopher raises his eyebrows, \"Someone as smart as you, who noticed the suspicion in the first place doesn't know what to think?\"\n\n\t\t\"Perhaps I do,\" you concede, \"Although I'm a little wary of saying it about your own mother.\"\n\n\t\t\"Don't be,\" Christopher reassures you, \"And if our thoughts are on the same lines I can say I have no problem with you saying whatever you like about the witch. So say it.\"\n\n\t\t\"I think she is heavily tied to the kidnappings.\" you say in a rush.\n\t\t*page_break\n\t\t*goto 25\n*label 25\n*page_break\n\"I think you're right,\" Christopher nods, his hand squeezing yours harder as if for comfort.\n\n\"What do you want to do about it?\"\n\n*label 24\n\"I don't want to do anything\" Christopher says, taking your hand and rising to his feet with you, \"We can't prove my mother is behind all this. And while I do believe she has arranged this so she can search the house without my interruption, it would also work just as well for her to have us on a wild good-chase looking for evidence against her.\"\n\n\"So we do nothing?\"\n\n\"Only search more vehemently. I have no doubt that as more of the house gets searched and her desperation to find the will increases so will the frequency of these attempts. Time is not on our side to be investigating. Besides, finding the will will end it all. Once the assets are legally mine even if she were to make me disappear for a time that wouldn't give her any rights. So either way as long as we find that will we win.\"\n*page_break\n\n\"Yes, we win,\" he smiles down at you lightly kissing your mouth, putting a heavy emphasis on we, \"But we,\" he says jokingly putting a heavy emphasis on the word we again, \"Have no time to waste. We'll spend every second searching and end this as quickly as possible.\"\n*goto 12\n\n\n\n\n*label 8\nYou open it to find Opal standing on the other side, surprisingly fresh considering the late night.\n\n\"May I come in?\" she asks. You gesture into your room and she glides past you, sitting on the edge of your bed and smoothing her skirts.\n*if (chriskidnap=true)\n\t*goto 101\n*else\n\t*goto 102\n*label 101\n\"Things haven't gone quite as planned have they?\"\n*fake_choice\n\t#\"I did the best I could.\"\n\t#\"Well, what do you want to do now?\"\n\t#\"I'm sorry.\"\nOpals holds up her hands, clearly angry you even dared to speak, \"I don't think I need to tell you our deal is off. There is nothing to my plan without Christopher.\"\n\nYou suddenly realize that Opal is blinking back furious tears, \"I can't believe this! And I was so close.\" Opal despairs. She stands and starts to make her way out.\n*page_break\n*if (opal1=true)\n\t*goto 103\n*else\n\t*goto 104\n*label 103\nYou catch her arm, \"But what about us?\"\n\n\"You think there can be an us after this?\" Opal looks up at you and you can see her eyes watering, \"Even if you hadn't let me down, you think I can be with someone when I'm not free? If we were together I wouldn't be free, I'd need you. I don't want to need you, all I want is to want you. But I find myself wanting that less now.\" she shakes your hand off her arm, \"Get off me. I don't ever want to speak to you again.\"\n\nShe leaves your room, hiding her face.\n*set opal 1\n*goto 12\n*label 104\n\"I don't want to speak to you again, please do me the honour of staying as far away from me as you can. Good day.\" Opal slips out of your room, giving you one last fierce stare she stalks away.\n*goto 12\n\n*label 102\n\"Last night went well,\" Opal smiles at you, looking very much at home in your room.\n*if(alexkidnap=true)\n\t*goto 105\n*else\n\t*goto 106\n*label 105\n\"But, Alex-\" you start, but Opal cuts you off.\n\n\"It works very well for us. I think it will really hit home for Christopher how real this threat is, and when he needs someone to drown his fear and console him,\" Opal raises her hand, \"I will be there.\"\n*choice\n\t#\"Good point.\"\n\t\t\"You always need to think of how events affect you, not others. Otherwise every disaster is tragedy and it's a very sad way of looking at things when a disaster might actually be making your life easier. What a grey way to go through life that would be,\" Opal dismisses with a wave of her hand.\n\t\t*set opal %+5\n\t\t*goto 106\n\t#\"Our plan isn't the only thing in the world, I still care about my job.\"\n\t\t\"Of course, you're quite right.\" Opal looks pityingly at you, \"But don't worry about that. I will make a point to sing your praises to Christopher. He is a very easy man to manipulate. As long as he thinks it was his idea to think that way, he won't care about his brother. It will be no problem in no time at all. I promise.\"\n\n\t\tOpal smiles at you like she's fixed all your problems, and, in her own little way, you can't deny she's trying to help.\n\t\t*set opal %+5\n\t\t*goto 106\n\t#\"I thought you would know me well enough to know by now that someone's kidnap might sit on my conscience.\"\n\t\t\"Really? Going behind your employer's back, you're okay with, but this makes you uncomfortable? You're a strange one.\" Opal raises her eyebrows at you.\n\n\t\t\"That's different,\" you argue, \"No one's getting hurt while I help you, whereas Alex could be in danger.\"\n\n\t\t\"If you say so,\" Opal shrugs, \"But this is really all to your benefit. With such a threat impending, Christopher will be eager to seek comfort in the arms of the beautiful woman just down the hall,\" Opal sweeps her hair back dramatically.\n\n\t\t\"We'll have to agree to disagree on that,\" you say, trying not to sound like a sullen child, causing a tense silence between you.\n\t\t*set opal %-5\n\t\t*goto 106\n\n*label 106\n*if (opal1=true)\n\t*goto 107\n*else\n\t*goto 108\n*label 107\n\"I just came by to see you,\" Opal smiles, patting the place on the bed next to her.\n\nYou sit down and she runs the tips of her fingers down your face, \"I just want you to know,\" you can see Opal nervously searching for words, \"This thing with Christopher won't be forever. I don't just want you to be on the side.\"\n*choice\n\t#\"All of last night was a mistake, I can't cope with sharing you,\"\n\t\t\"Oh,\" Opal looks slightly taken aback at your change of heart.\n\n\t\t\"Last night was wonderful,\" you reassure her, \"But I've had time to think about it, and I'm sorry, but knowing you're with him,\" you see Opal shudder at the thought, \"It's too much to know that and be with you.\"\n\n\t\tOpal lets her hand fall from your face, completely crestfallen, \"Oh, okay. I can't blame you for that. I just thought - Oh, never mind what I thought.\"\n\t\t*set opal1 false\n\t\t*goto 117\n\t#\"Oh, I don't mind being a thing on the side, this isn't serious right?\"\n\t\tOpal blinks at you, seeming completely alarmed, \"You really think that?\"\n\n\t\t\"Well sure,\" you shrug, \"You're with someone else, we could hardly take this whole thing too seriously. Besides, I barely know you.\" Opal does a violent double take, blinking rapidly.\n\n\t\t\"You're serious?\" she asks, her hand falling from your face. You get the sinking feeling she wasn't on the same wave length as you, \"But-\"\n\n\t\tOpal can't seem to stammer out the words so you simply apologise.\n\t\t*set opal1 false\n\t\t*set opal %-10\n\t\t*goto 117\n\t#\"I know, we just have to wait to be together.\"\n\t\t*set opal %+5\n\t\t*goto 116\n*label 116\n\"Thank you,\" Opal says so quietly you barely hear her.\n\n\"What are you thanking me for, silly?\" You ask, smiling as she runs her other hand through your hair. \n\n\"For being okay with this, for understanding this is something I have to do I guess.\"\n\nShe doesn't give you a chance to reply, because suddenly she's kissing you and any other thoughts you have melt away with her soft lips, her hard hands pulling at your hips.\n\nYou may not have all of her for now, but it's clear it's you she wants.\n*goto 12\n*label 117\n*page_break\nOpal stands and gives you a weak smile, \"Anyway, I'm off to get Christopher,\" she says with transparent bravado, miming lassoing something.\n\nThen she flees from the room before you've even had chance to stand up. \n*goto 12\n*label 108\n\n\"I just came by to say good morning, and check where Christopher is,\" Opal adds, \"It's time to really kick this plan into high gear.\"\n\nA quick radio to Emma reveals Christopher to be in his quarters. You relay this to Opal and she stands, ready to leave.\n\n*label 109\nYou walk Opal to the door and she smiles up at you, \"I'll see you soon,\"\n*choice\n\t#\"Wait, what was with your father last night? I have to ask.\"\n\t\t\"I know it's clear what my father is like.\" Opal takes a deep shaking breath, \"Rest assured though, that he will pay for being the type of man he is.\"\n\n\t\t\"What do you mean?\" you ask.\n\n\t\tOpal shudders and shakes her head, \"I don't wish to say any more about him right now.\" she gives you a small smile and heads out the door.\n\t\t*goto 110\n\t*selectable_if (continuity=true) # \"Wait, I have something I need to tell you. I noticed something about Rebecca last night.\"\n\t\t\"What?\" Opal asks, cocking her head curiously at you.\n\n\t\t\"I didn't put any security on her, and she was absolutely fine. I get the feeling she isn't in danger and to me that says she's somehow involved in all this.\"\n\n\t\t\"Oh you are the intutive one...\" Opal muses, \"Hmm - Well thank you for telling me, but I also think it doesn't matter much.\" You frown your question at her, \"These kidnappings are helping,\" Opal explains, \"They keep you here for starters and they keep Christopher afraid, which makes my job easier. So let's not interfere with something that's helping us along.\"\n\t\t*set opal %+10\n\t\t*goto 110\n\t#Just let her go.\n\t\t*goto 110\n*label 110\n\n\"Bye,\" you return her smile as you shut the door on her.\n*goto 12\n\n*label 9\nYou open it up and barely have time to react as Rebecca flounces past you into your room and sits on the bed.\n\nSlightly stunned you turn, shutting the door behind you.\n*page_break\n*if(chriskidnap=true)\n\t*goto one\n*if(alexkidnap=true)\n\t*goto two\n*else\n\t*goto three\n*label one\n\"Things went a bit awry didn't they?\" Rebecca states without preamble. You start to speak, but she holds up her hand, \"Did I not tell you that if my son came to harm that I would terminate our deal?\"\n\n\"Yes you did,\" there is no point arguing the point.\n\n\"And what's happened to my son?\" Rebecca asks, and in the wake of her question you see, not the domineering woman you have come to know, but instead you see the worried look of a mum who is terrified for her son's safety.\n\n\"He's been taken.\" You say, knowing your chances of staying in with Rebecca are slim to none.\n*if (reb>85)\n\t*goto 40\n*else\n\t*goto 41\n*label 40\n\nBut then something miraculous happens. Her face crumples from its stern expression into one of soft disappointment, \"I wish I could stay angry at you.\" Rebecca sighs, \"But we've become quite close haven't we?\" she doesn't wait for you to answer, \"I know you well enough to know that you did everything you could. I can't be angry at you for that. I just wish I knew my son was safe.\"\n\n*label 41\n\n\"You think that was an empty threat?\" she asks you pointedly. You have a strong feeling you are about to find out first hand that it was not.\n*choice\n\t#\"I did everything I could!\"\n\t\t\"But it wasn't enough.\"\n\n\t\t\"Rubbish,\" you argue back, \"It was enough to save everyone else. I can't control everything.\"\n\t\t*set reb %-10\n\t\t*goto 43\n\t#\"Why do you care? I kept you safe.\"\n\t\t\"You really don't know me at all do you?\" Rebecca looks at you incredulously.\n\n\t\t\"I just mean why does this affect our deal?\"\n\t\t*set reb %-20\n\t\t*goto 43\n\t#\"So is our deal off?\"\n\t\t*set reb %-5\n\t\t*goto 43\n*label 43\n\n\"I can't trust you,\" Rebecca shrugs, \"so I don't want your 'help'.\"\n*set rebplot false\nShe stands to leave, \"Good day to you.\" and makes towards the door. You can only watch her go. It seems you've alienated both sides in this messed up power-play.\n*goto 42\n\n*label two\n\"Things have gone rather wrong haven't they?\" Rebecca says, raising her eyebrows, \"Alex gone.\"\n\n*choice\n\t#\"I'm sorry, I did everything I could.\"\n\t\t*if (reb>60)\n\t\t\tRebecca sighs \"The thing is, I know you well enough to know you did.\"\n\t\t\t*set reb%+5\n\t\t\t*goto 44\n\t\t*else\n\t\t\t\"And yet somehow I don't believe you.\" Rebecca looks sadly at you.\n\t\t\t*goto 43\n\t#\"Alex was never part of our deal.\"\n\t\t\"If that is the only reason you think this matters I have nothing else to say to you.\"\n\t\t*set reb %-10\n\t\t*goto 43\n\t#\"I know how upsetting this must be.\"\n\t\t*if (reb>60)\n\t\t\t\"No, you don't know,\" Rebecca says slowly, as if choosing her words, \"But I know you're trying, and I know this wasn't your fault.\"\n\n\t\t\t\"I'm glad,\" you say, letting out a nervous breath.\n\t\t\t*set reb %+5\n\t\t\t*goto 44\n\t\t*else\n\t\t\t\"That's the thing, you don't.\" Rebecca defends.\n\n\t\t\t\"But I'm trying...\" is all you can think to argue.\n\t\t\t*goto 43\n*label 44\n\"I'm upset.\"\n\n\"I know,\" you cut across to reassure her, knowing she has every right to be upset.\n\n\"But we,\" she points between the two of you, \"Everything is still good.\"\n*goto 45\n\n*label three\n\"I'm impressed,\" Rebecca says as you close the door behind her.\n\n*if (opalkidnap=true)\n\t*goto 46\n*else\n\t*goto 47\n*label 46\n\"But - Opal,\" you start, but Rebecca interrupts you.\n\n\"Oh posh - I don't care about her, you kept my boys safe. To me that's the most important thing.\"\n*label 47\n\n\"Thank you, I can't express how much I appreciate how hard you've worked. For everything I want.\"\n*page_break\n*label 45\nRebecca is silent for a minute, then she calls you over to sit next to her. You both perch on the end of the bed, \"I have a confession to make to you.\"\n\n\"What is it?\"\n\n\"I think I know who the kidnapper is.\"\n*fake_choice\n\t#\"And you didn't tell me before because up until now my job's been too easy?\"\n\t#\"How?\"\n\t#Stammer.\nRebecca shushes you, \"Just let me say everything I'm thinking. I don't know for sure. But you're the expert, so I trust you'll know if I'm right or not.\"\n\nShe takes a deep breath then balks a little, \"Actually for you to know this, you're going to have to know a lot more about me. It's quite difficult to articulate. Just give me a moment.\"\n*page_break\n\"You may have already guessed that I did not love my husband. I could never love him because our marriage didn't come around like most did. As I've already told you I was living in Ireland before. I lived on a farm and I was engaged to the man I shared the farm with and we had a son.\"\n\n\"I met my husband when he was on a business trip, one night very late, when I was walking back from a friend's house. He was drunk and he attacked me. I was black with bruises for weeks. My husband however knew who the stranger in our little village was. Our farm was utterly failing and our son was beginning to have difficulties,\" she pronounces the word 'difficulties' delicately, \"That we could never have foreseen costing so much.\"\n\n\"So my then fiancee struck up a bargain with my late husband. That in exchange for our silence concerning his brutality towards me, something that would have ruined his public image had we leaked it, in exchange Mr Haywood was to marry me and let me reap all the benefits that implied.\"\n*label replay2\n*choice\n\t*hide_reuse #\"Your fiancee can't have loved you much to do that.\"\n\t\t\"You're very right.\" Rebecca smiles wistfully, \"I realize now he didn't love me very much at all. He convinced me at the time that marrying money was the best way to secure my little Ronan's future. Where as in reality it was a fantastic way to get rid of me, and make enough money that he wouldn't have to look after his little boy himself, or anything else for that matter.\" Rebecca bites her lip, \"Thinking about it now, I almost get angry at how stupid I was to believe his spiel. But - we live and learn.\"\n\t\t*goto replay2\n\t*hide_reuse #\"What kind of difficulties?\"\n\t\t\"My son was already starting to show signs of trauma. I didn't know at the time, I've only since researched the phenomenon, but trauma from my fiancee, who I realize, looking back on it, was not a good one. A possible repercussions of trauma at such a young age is Dissociative Identity Disorder. More commonly know as Multiple Personality Disorder. Basically when suffering something unpleasant, the mind...create is the wrong word..becomes multiple parts of one person. My little Ronan was a very nervous boy, but this other side of him was rude in its confidence.\"\n\n\t\tRebecca sighs seemingly to herself, \"I think you know enough about it now to understand the story, so that's enough.\"\n\t\t*goto replay2\n\t#\"So what does this have to do with the kidnappings?\"\n\t\t*goto 461\n*label 461\n\"Everything, if you let me finish. My fiancee is also long gone now. When he died, my son vanished. All up to that point his DID was getting worse, I couldn't even imagine why. Young as I was then and, despite my experiences, woefully ignorant of some of the cruelties people, children, have to face at the hands of people like my ex-fiancee. But I digress,\" Rebecca pulls herself out of her own thoughts, \"At the party I saw him. My Ronan is unmistakable, red hair, tall and his nose so broken. He looked at me, and I knew he was the kidnapper from the way he was dressed, but he didn't make any move towards me, he just slunk away into the bushes.\"\n\n\"So you think he's responsible for the kidnappings.\"\n\n\"I hate myself for saying this but it would make sense. The last time I saw him, he told me he was ashamed to be my son, not because I was shameful, but because he didn't feel good enough to have me,\" Rebecca's eyes glaze over, \"I don't mean that in an obnoxious way, I'm simply relaying what he said. Anyway, I tried to persuade him that wasn't the case, but all he would say was that he didn't want to see me again until he felt he deserved it.\"\n*page_break\n\"This is the part of the story where I am at fault, because I didn't try to see him again. If I'm honest with you I was even a little happy I wouldn't have to face that part of my life again. He was so young when he said that, I had just hoped he'd gone on, got help. But it seems I was wrong.\"\n\n\"But why would he be trying to kidnap your other sons?\" You interject,\n\n\"It's no secret that there was a dispute between myself and Christopher over my husband's settlement. He could have found out from anyone who knew me if he cared to snoop around. Which I am beginning to suspect he did.\"\n*choice\n\t#\"I don't think we should go jumping to conclusions. You clearly feel guilty about this, but I think this might be a bit of a jump.\"\n\t\tset reb %-10\n\t\t*goto 471\n\t#\"You said your Ronan was timid. You don't think ramming a lawnmower through the wall of a hotel a bit out of character?\"\n\t\t\"Ronan was, yes. But that other part of him, he was a swaggering monster. He would be able to do it.\"\n\t\t*set reb %+5\n\t\t*goto 471\n\t#\"Thank you, I think this will help in protecting you guys.\"\n\t\t\"That was my intention.\" Rebecca smiles at you and pats your arm.\n\n\t\t\"Do you want to do something else about this?\"\n\t\t*set reb %+5\n\t\t*goto 471\n\t#\"I'm so sorry to hear about all this.\"\n\t\t\"Thank you for saying so.\" Rebecca smiles ruefully at you, \"I would have told you anyway, but just for the record I find myself wanting to tell you these things. Getting to know you, not just as my employee, has been a good decision.\"\n\n\t\tYou smile at her to let her know you appreciate what she's saying, \"So what do you want to do about all this?\"\n\t\t*set reb %+10\n\t\t*goto 471\n\t\t\n\n*label 471\n\"I'm not going to do anything about it. The best way to stop it still remains the same. Ronan will have no reason to carry on doing what he's doing if I have what is mine. I think that's what he wants, for Christopher to be out the way so I can search the house. So we simply carry on as before, only now you know who you're looking out for and a bit about their profile. That's all I came here to tell you.\"\n\nRecognising her dismissal you stand and are about to see her out when you look back to see she is still sat on the bed, looking, unusually for her, a bit abashed.\n\n\"Are you okay?\" you ask, surprised at Rebecca sitting on your bed, picking at her nails like a nervous school girl.\n\n\"Just one more thing,\" Rebecca gestures for you to sit back next to her on the bed, which you do.\n*page_break\n\"I was thinking we could come to some other arrangement.\"\n\n\"What kind of arrangement?\"\n\n\"Well,\" Rebecca fully blushes, but charges on, \"I'm an autumn woman. I know what I want, and while this idea may not initially appeal to you, I just thought that perhaps. Well you know the human body has its needs and I'm sure you have those needs too, just like me, and what with all that's going on, I don't imagine you've had time to see to them. What I'm saying is this deal could be mutually beneficial. Like exercise.\"\n\nThis time it's you holding up your hand to interrupt Rebecca's bumbling, \"Are you trying to proposition me?\" you ask, just to make sure you got the right end of the stick.\n\n\"Only so far as you know - the mutual benefits - I don't think for a second someone like you would want someone like me on a more permanent basis. Used and older as I am.\" Rebecca says the last bit stiffly.\n*choice\n\t#\"Yes a mutually beneficial relationship might be a good idea.\"\n\t\t*set reb2 true\n\t\t*goto 491\n\t#\"Why would I not want someone like you? What if I told you I did, would we go there?\"\n\t\t*set reb1 true\n\t\t*set reb %+10\n\t\t*goto 481\n\t#\"I'm sorry, but I think we work better as friends.\n\t\t*goto 501\n\t*selectable_if (rob1=true) # \"I'm sorry Rebecca, but I'm already seeing someone else.\"\n\t\t*set rob %+10\n\t\t*goto 501\n\n*label 481\n\"What?\" Rebecca opens her eyes wide in surprise.\n\n*if (rob1=true)\n\t\"But I have to ask. I thought you and Robert...\" she trails off, looking embarrassed.\n\t*choice\n\t\t#Yes your right. I don't know what I was thinking. I want Rob.\n\t\t\t\"Trying to play us both?\" Rebecca asks scornfully, looking hurt, \"Although I suppose I can't blame you. Looking like you do, you could have anyone you want...\"\n\n\t\t\t\"Let's just forget this happened...\" you say, trying to glade over the awkward moment.\n\n\t\t\t\"I think that would be best.\"\n\t\t\t*page_break\n\t\t\t*set reb1 false\n\t\t\t*set reb2 false\n\t\t\t*set reb %-20\n\t\t\t*set rob %-20\n\t\t\t*goto 501\n\t\t#I know. And I'm ending it. For you.\n\t\t\t\"Oh,\" Rebecca blushes to her roots, \"I never really believed that would be your answer.\"\n\n\t\t\t\"Well it is,\" you say, holding her gaze, forgetting Rob in a moment.\n\n\t\t\t\"But he's so young and full of energy. I don't know - he just seems more like you.\"\n\t\t\t*set rob1 false\n\t\t\t*set rob %-50\n\t\t\t*goto edit1\n*else\n\t*goto edit1\n\n*label edit1\n\n\"What if I want someone like you?\" you repeat to her shocked face.\n\n\"Don't ask me to answer that question please. I can think of many reasons, but I don't think it would do my self-esteem any good to extol them.\"\n\n\"Well I can think of a lot of reasons I would want to be with you,\" you counter, shuffling yourself closer to Rebecca on the bed so your knees are touching, \"You're a passionate beautiful woman.\"\n*page_break\nRebecca looks like she's about to argue, but she simply swallows and reaches out tentatively and runs her hand down your face, \"So this is the beginning of something?\" her voice sounds dry with nerves.\n\nYou smile at her and nod, feeling her fingers delicately tracing your cheeks.\n\n\"So um-\" Rebecca swallows and licks her lips, moving her face tentatively towards you. Then she kisses you gently, her hands caressing your cheeks, \"I've been thinking about you for a long time.\" she whispers into your mouth, \"But I didn't think that-\"\n\n\"Shh,\" you hush her smiling into your kiss, pushing her back onto your bed and kissing away the rest of her worries.\n*goto 12\n*label 491\n\"That's good.\" Rebecca smiles, looking just above your eyes.\n\nThere's a long silence between you.\n\n\"So - when would you like to, you know, exercise?\" she asks.\n\n\"Now? I guess.\"\n\n\"I think that would be acceptable.\" There's a moment of tension between you, then you grab one another with a fierce passion and the awkwardness seems to matter less as you lose yourself in one another.\n*goto 12\n*label 501\nRebecca stands and smiles down at you, not a hint of embarrassment left on her face, \"Well that's all I needed to talk to you about. I think maybe we should get to work now.\"\n\nShe offers you a hand and you use it to pull yourself up, \"Sure just give me a minute, you go on ahead.\"\n\nRebecca leaves you to spend a few minutes radioing Emma. After all, you do have some crucial information now.\n*goto 42\n\n*label 10\n\"Ah, ${name},\" you open it up to find Alex shuffling his feet, \"I just, uh, I mean. Did you sleep well?\" he doesn't wait for you to answer before ploughing on, \"May I come in?\"\n\n\"Sure,\" you step aside to let him in, he puts his foot in your room, then pulls it out, then puts it back in again like he's dancing a very awkward hokey cokey.\n\n\"Alex,\" you interrupt his nervous dancing and make him jump.\n\n\"Yes, right,\" Alex says, stepping into your room.\n*page_break\n\"What's up?\" you ask, as Alex half walks, half jives over to the bed like he's still not sure he should be in your room.\n\n\"You know - not much,\" Alex sits on the end of your bed and clasps his hands together over his lap, presumably to stop himself shaking around.\n\n\"Well something clearly is up.\" you say, pulling up a chair to sit opposite him.\n\n\"It's just, urgh,\" Alex lets out a frustrated half gargle, \"I just despise it here. This is where I had to grow up, I had so many bad experiences here and just being forced back...I hate it. I can't even express how much I despise this house, how much I wish I could be anywhere else.\"\n*choice\n\t*selectable_if (continuity=true) #\"You may not have to stay much longer, I have some very interesting information on Rebecca.\"\n\t\t*set alex %+5\n\t\t*goto 301\n\t#\"Stop being such a baby. Growing up in this house, life can't have been that bad.\"\n\t\tInstead of looking defensive Alex simply looks defeated, \"Maybe you're right. Maybe I need to stop living in who I was and live in now.\"\n\n\t\tYou shrug.\n\n\t\t\"It's just so hard,\" Alex continues, \"when I feel the flaws that past gave me holding me back, it's hard not to dwell.\"\n\n\t\t\"Everyone has their own baggage.\" you say.\n\t\t*set alex %+5\n\t\t*goto 300\n\t#\"Don't worry, I'm sure it'll be over soon. And I'm making sure you're safe.\"\n\t\t\"And I thank you for it,\" Alex smiles at you, \"Really I can't complain, I'm safe and you're making that happen.\"\n\n\t\t\"It doesn't make being here with a family who've clearly ignored you all your life any easier for you.\"\n\n\t\t\"No, but I should be thankful for what I have. In any case, I definitely shouldn't be bursting in here to complain to you.\"\n\n\t\t\"It's alright,\"\n\t\t*set alex %+5\n\t\t*goto 300\n\t#\"I don't know what to say to you.\"\n\t\t\"You don't need to say anything,\" Alex smiles at you, \"Being here with you, I'm already feeling better.\"\n\n\t\t\"Well I'm glad I could be of help...\" you trail off uncertainly, making Alex laugh.\n\t\t*goto 300\n\n*label 301\n\"Like what?\" Alex asks, crinkling his eyebrows at you.\n\n\"Like the fact I put no security on her last night and she was totally fine. Considering what happened, don't you think that's awfully suspicious?\"\n\n\"Yes... yes I do...\" Alex trails off, seemingly lost in his own thoughts.\n\n\"What are you thinking?\" you ask, studying his intent face for a clue.\n\n\"I'm thinking that's a piece of information I need to mull over.\" Alex says, closing the subject.\n*page_break\n*label 300\n*if (alex1=true)\n\t*goto 302\n*else\n\t*goto 303\n*label 302\n\n\"You're a good friend,\" Alex smiles at you then his face drops and he throws up his hands, \"Not that that's all you are to me. I mean you're an attractive person. I couldn't help but - no, I mean not that I am, that's not all I see, but not that I'm not, if that makes any sense. Urgh and this is why I came, I can't even say it right. I mean of course I feel - you know. I mean - you're really nice.\" he finishes lamely.\n*fake_choice\n\t#\"Nice? A side salad is nice. A sunny day is nice.\"\n\t#\"I have no idea what you just said.\"\n\t#\"Are you trying to flirt with me?\"\n\t#I have no idea what to say to this.\n\"Just the thing is.\" Alex takes a deep breath, \"My God I wish I could be half as smooth talking as Romeo, that sly dog. If you give me a minute I could go out and get in a super romantic character then come back in and woo you properly.\"\n\n\"I don't want to be 'wooed' properly,\" you say incredulously.\n\n\"Oh,\" Alex looks a little surprised, \"See I knew that and yet look at my faffing about, when all I want to do is ask you, um, can I kiss you, would that be alright? I mean not alright, I mean would you like it?\"\n*choice\n\t#\"Shut up and kiss me,\"\n\t\t\"Well, yes of course, I just wanted to do it properly that's all. I didn't want to invade your personal space if you didn't want me to. It would be such an awful thing to-\"\n\n\t\t\"Alex! Oh my god!\"\n\n\t\t\"Oh yes, right I'm going to kiss you.\" Alex falls into silence for a moment, then, \"Are you sure this is what you want?\"\n\n\t\tYou just give him a look that makes him blush and look away, \"Maybe if you stand up, and maybe close your eyes\" he adds sheepishly.\n\t\t*goto 304\n\t#Lean over and kiss him yourself, he's evidently not going to pull himself together any time soon.\n\t\tYou don't let Alex talk a moment more, you reach over, pressing your lips to his to shut him up.\n\n\t\tWhen you pull away Alex is blinking in surprise, \"Wow.\" he says breathlessly. He pulls you, still standing, between his legs and looks admiringly up at you, \"Close your eyes,\" he whispers, almost too quiet for you to hear.\n\t\t*goto 304\n\t#\"I'm sorry, I don't want that. You're my friend, that's all.\"\n\t\t*set alex1 false\n\t\t*set alex %-20\n\t\t*set dumpa true\n\t\t*goto 305\n*label 304\n*set alex %+10\n*page_break\nThe moment your eyes close Alex transforms into a different person. He stands and wraps your body in his arms, drawing you close to him, holding you tightly in his arms, pressing his warm body to yours like he's scared you might slip away. His lips are tender on yours, you can feel him treasuring every moment of your kiss.\n\n\"My monologue was for you,\" Alex says, pulling suddenly out of your kiss in a flushed rush \"At the time I thought it was incredibly romantic to dedicate it to you. But now those words don't seem right. I want to astound you with my own words.\"\n\n\"Are you still talking?\" you ask Alex teasingly.\n\n\"I just had to tell you how much you've inspired me. I've always acted because other people's words felt better than my own, but when I think about you, when I thought about this,\" he gestures between the two of you, \"I think the most wonderful things. I want to say them all to you. But I can't help but think this would take a very long time.\" he adds slyly.\n*page_break\n\"I'll simply have to stick around,\" you reply playfully, pressing your lips to his again.\n\nYou can't help but feel a little longing when he pulls away from you and sits back on the bed.\n\n\"I actually uh, have something very important to talk to you about then,\" he swallows nervously, pulling you to sit next to him.\n*goto 308\n*label 305\n\"Oh, well in that case it's probably a good job I'm not playing Casanova - I wouldn't want to ruin his track record,\" Alex jokes as a painful silence settles between you, \"I'm sorry,\" he says after a while, \"I didn't want to make you uncomfortable, I just thought...but never mind. I hope this doesn't affect anything between us. I still want to be your friend.\"\n\n\"Of course it doesn't,\" you reassure, \"I can hardly get upset with you for just asking.\"\n\nAlex lets out a little sigh of relief.\n*page_break\n*label 303\n\"You're a good friend,\" Alex smiles at you and visibly relaxes on the bed.\n\n\"I try,\" you smile, relaxing yourself.\n\n\"I didn't just come here to complain, I actually wanted to talk to you about something.\"\n*label 308\n*if((dream1=true)or(dream2=true))\n\t*goto 306\n*else\n\t*goto 307\n*label 306\n\"Remember when I asked you what you really want to do with your life?\"\n\n\"Yeah,\" you reply, only able to wonder where he might be going with this.\n\n\"I've been thinking about it, and about what I want to do and...\" he takes a deep breath, clearly unsure of what he's saying.\n*page_break\n*label 310\n\"This is going to sound childish as anything, but why don't we just go? I've never even been able to think of the courage to start afresh on my own, completely washing my hands of my family and their squabbles. I didn't even think of setting out after any kind of dream until I met you. And I was thinking perhaps you felt the same, doing things alone is so scary. I was thinking maybe together it wouldn't be.\"\n\n\"So what exactly are you saying?\"\n*page_break\n\"I'm saying why don't we do what we want to do rather than what we're supposed to do? If we do it together we can cover each other's backs, help each other and pursue what we really want. Rather than staying, for me, with a vile family with no concerns other than money, and, for you, a job you despise and just want rid of. It wouldn't just be freedom, but it would be fun too. We have fun.\" he finished lamely, but his eyes are fierce with excitement.\n*if (dream2=true)\n\t\"So, what do you think, we pool our money and we make a go of it? I can write and you can start your own business, I know we could do it.\"\n\t*goto 320\n*else\n\t\"So, what do you think, we pool our money and go for it? I can write and you can be a ${dream}. We could do it, and we wouldn't need anyone but us.\"\n\t*goto 320\n\n*label 320\n*choice\n\t#\"Yes, we should do it.\"\n\t\t*set alex %+15\n\t\t\"Really?\" Alex says, as if the suggestion wasn't his.\n\n\t\t\"Yeah,\" you say, smiling, \"Why shouldn't we try to do what we want?\"\n\n\t\t*if (alex1=true)\n\t\t\tAlex kisses you fiercely, \"I know it's mad, and a bit childish to fight so hard for an ideal, but I don't care, I refuse to settle and I know we can be so happy together. I want to show you what I can do, and I want you to do what makes you happy. I'll be there for you, I promise, and I know you'll be there for me. We can do anything.\"\n\t\t\t*goto 12\n\t\t*else\n\t\t\t\"Exactly,\" Alex smiles at you, \"I know it sounds childish and a bit mad, but if it's mad to dream of your ideal and go for it, than I hope I'm utterly bonkers.\"\n\t\t\t*goto 12\n\t#\"No, this is crazy.\"\n\t\t\"We sound like children planning to run away from home,\" you add, hearing the scorn in your own voice, \"We aren't children. We have responsibilities, we can't just up and leave.\"\n\n\t\tAlex is blinking hard at you. It's clear he didn't expect such a harsh rebuttal, \"I just thought you might want to.\"\n\n\t\tYou shake your head at him, \"I've worked hard to get to where I am. I'm going to carry on working hard. It's not ideal, yes, but nothing ever is. In fact it's really immature to expect it to be. I know your family upsets you, but any adult learns to deal with what makes them unhappy.\"\n\n\t\tAlex visibly flinches away from you, and you can only wonder if maybe you were a bit too harsh, \"Right,\" he says, standing in a rush and dashing out the room, not even bothering with a feeble excuse.\n\t\t*set alexhurt true\n\t\t*set alex1 false\n\t\t*set alex 1\n\t\t*goto 12\n*label 307\n\"I was wondering...\" Alex trails off, \"What you want to do with your life? I mean, what's your big goal, do you love what you do day in day out?\"\n\n*set dream1 true\n*choice\n\t#\"This is all I've ever wanted.\"\n\t\t\"Really?\" Alex looks incredulous, \"You don't dream of something better, something more?\" he visibly slumps, \"Then I can only say I'm jealous of you.\"\n\t\t*set dream \"Bodyguard\"\n\n\t\t*goto 310\n\t#\"I love what I do. But I wish  out the bottle to you, \"This is just mine and the guys way of saying thanks, you've been a great boss, and congrats on last night.\"\n\n\"I can't drink it now.\" you point out, \"It's early morning.\"\n\nEmma blushes, \"Oh yeah, you're right, I'll leave it with you then,\" she says, pushing the bottle into your hand and scuttling down the hall and away. You close the door behind her, chuckling to yourself.\n*page_break\n*goto 42\n*label edit102\n\"Hey,\" Emma waggles her fingers in an uncertain wave at you, \"Look, about yesterday...\" you expect congratulations, but you're surprised when she says, \"You got lucky. Look, I don't know if this is the best you can do, but you need to do better. We have some inexperienced guys on our team, and they're all watching you for guidance, and your work ethic is just. Not great.\" she finished lamely.\n\n\"Last time I checked, I'm your superior,\" you say, with no small amount of annoyance in your voice.\n\n\"I know -  I know.\" Emma blushes, \"I just wanted to tell you, as a friend, that maybe this career path isn't the right one for you. I'm sorry if you don't want to hear it.\"\n\nShe bows her head at your stunned silence and walks away as you shut the door on her heels.\n*page_break\n*goto 42\n\n\n*label 42\n*if (rob1=true)or(rob>60)\n\t*goto 11\n*else\n\t*goto 12\n*label 11\n\nThere's another knock, more insistent this time. Pulling open the door you see Rob, chewing nervously on his lips.\n\n\"Hey. Uh, I just wanted to make sure you were okay - you know, after yesterday.\"\n*if (chriskidnap=true)\n\t*goto 450\n*if ((alexkidnap=true)or(opalkidnap=true))\n\t*goto 451\n*else\n\t*goto 452\n*label 450\n\n\"As fine as I can be,\" you reply.\n\n\"Well I guess that's good,\" Rob shews his lip nervously, \"Because I'm not...\" he sounds unsure of himself, but his eyes look resolute, \"I'm not fine because I thought we were friends. And you let my employer get taken away. You know my situation, what are Anna and I supposed to do?\"\n*fake_choice\n\t#\"But you have other opportunities!\"\n\t#\"You've not been fired, surely they're keeping you on.\"\n\t#\"I'm sorry Rob.\"\n\t#\"But I didn't mean to!\"\n\"No,\" Rob holds up his hands, his face turning his trademark red, \"I don't care about anything you have to say. I have this one certain support in my life for Anna. And now the senior staff are talking about redundancies or just outright firing because there's no one to sign our pay checks. Do you know how hard it was for me to get this job? I can't go back to bar work, I can't leave Anna alone in the evening, she'll get taken away from me!\" Rob's getting so worked up his face is turning purple.\n\nHe stops and leans over, bracing himself on his knees and breathing heavily, \"I thought I could trust you.\" he says despairingly, \"I thought you were this amazing person. But I was so wrong. And I made you my friend and now my friend, my only friend has let me down so badly, and I hate it. I can barely look at you.\" tears start to leak out his eyes, \"I got so happy for a while. Anna's been doing so well, we were saving money, we were going to buy our own place one day, and my own life was going well. I was getting better at this job, I wasn't a friendless workaholic and now...\" Rob shakes his head, clearly running out of steam, his face returning to a normal colour.\n\n\"Whatever the ins and outs I feel like you've let me down. I don't want to see you again.\" then he runs away from you, ignoring any attempt to call him back.\n*set rob 1\n*set dumpr true\n*goto 12\n\n*label 451\n*choice\n\t# \"I feel awful. I couldn't live up to my responsibilities.\"\n\t\t\"Hey, hey,\" Rob says soothingly, \"Sliding his arm around your shoulders, \"I thought you were amazing. I saw you yesterday, running around trying to hold it all together. It was amazing. There was so much confusion all I could do was hide under the bar. But you, wow! I know it wasn't perfect in the end, but I thought you were incredible. It was just an impossible task, there's nothing you can do about that.\"\n\n\t\t\"I feel a bit like little Anna,\" you find yourself joking.\n\n\t\t\"Well the way I get her to feel better is I play castles with her. We could do that if you want?\"\n\n\t\t\"I think I'm fine,\" you say. You can't help but smile at Rob's attempts to cheer you up.\n\t\t*set rob %+5\n\t\t*goto 453\n\t# \"I feel okay, I did the best I could.\"\n\t\t\"You're so brave.\" Rob says admiringly, \"I was coming to your room like some ponce to reassure you you did everything. And here you've already done it yourself.\" he chuckles light heartedly, his face heating.\n\n\t\t\"Yeah, I can look after myself.\" you reassure him, \"I do appreciate you coming here though. It's good to know I've got you backing me up.\"\n\t\t*goto 453 \n\t# \"I feel great. Considering the job, I did really well last night.\"\n\t\t\"Really?\" Rob says, looking surprised, \"I would have thought you'd be frustrated at the very least.\"\n\n\t\tYou shrug, \"I can't get hung up on these things. It's out of my job to deal with the kidnapping now. All I can do is hold myself together and carry on doing my job.\"\n\n\t\t\"I guess I can admire that,\" Rob says sceptically, clearly he came here expecting to cheer you up.\n\n\t\t\"I don't expect you to get it,\" you reassure him.\n\t\t*set rob %-5\n\t\t*goto 453\n*label 452\n\n*choice\n\t#\"I'm great. I did an amazing job yesterday.\"\n\t\t\"We're very much in agreement.\" Rob says, smiling at you and clapping you on the back, \"In fact, I thought you could do with a treat so...\" Rob bends down and reaches around the frame of your door. Producing a tray with a coffee filter and a bowl of strawberries, \"Breakfast,\" Rob says, his cheeks glowing as he pushes the tray into your arms.\n\n\t\t\"Thanks.\" You take the tray and smile warmly at Rob. It's nice to be appreciated.\n\t\t*goto 453\n\t#\"I'm a bit shaken up to be honest. I've been preparing for something like that for so long. It was completely different actually having to go through it.\"\n\t\t\"You're so brave.\" Rob says admiringly, \"The way you were running around last night. So in control, making everything so right. But you just feel what everyone else felt, but you just did something about it. Without wishing to sound like a little kid - you're so cool.\" Rob blushes and picks up a tray he's hiding around the door frame, \"I brought you a celebratory breakfast,\" he says, pushing the tray of strawberries and fancy coffee into your hands.\n\n\t\t\"Thank you,\" you say, your chest swelling a little bit, pleased you have someone always on your side.\n\t\t*set rob %+5\n\t\t*goto 453\n\t#\"Forget about me, how are you doing? Yesterday must have been scary.\"\n\t\t\"So scary!\" Rob admits, surprisingly enthusiastic, \"But you kept it all together. I knew you could do it. I knew no-one would be in any danger with you around.\" He gazes admiringly at you, \"I brought you breakfast,\" he announces, bending to get a tray hidden behind the doorframe.\n\n\t\tHe pushes the tray laden with fancy coffee and a bowl of strawberries into your hands.\n\n\t\t\"Thank you.\" you smile at him. It's nice to be appreciated.\n\t\t*set rob %+8\n\t\t*goto 453\n\n*label 453\n*page_break\n\"Anyway that's all,\" Rob scuffs his foot on the floor, his face going a little pink, \"I just wanted to check on you. I should get to work though.\"\n*if (rob1=true)\n\tRob leans forward and brushes his lips against your cheek, blushing scarlet.\n\n\t*goto 454\n*else\n\t*goto 454\n*label 454\n*if (anna>1)\n\t\"You should come round soon,\" Rob says, waving dorkishly on his way down the corridor, \"Anna misses you already.\"\n\n\tYou watch his back retreat away, and smile to yourself as you shut yourself in with your breakfast.\n\t*goto 12\n*else\n\t\"I'll see you round,\" he waves, tripping over his own feet on his way down the corridor.\"\n\n\tYou watch his back retreat away, and smile to yourself as you shut yourself in with your breakfast.\n\t*goto 12\n\n\n\n\n\n*label 12\n*page_break\nThe next month falls into a routine for you.\n*if (chris1=true)\n\t*goto 13\n*elseif (opalplot=true)\n\t*goto 14\n*elseif (rebplot=true)\n\t*goto 15\n*elseif ((alex1=true)or(alex>75))\n\t*goto 16\n*elseif ((rob1=true)or(rob>75))\n\t*goto 17\n*else\n\t*goto 20\n*label 13\nYou and Christopher spend every moment possible searching the house, and when there are so many people around that it becomes impossible, he takes you out on the most breath-taking dates.\n\nHe spares no expense where you are concerned, seemingly still trying to impress you despite the fact you very obviously have eyes for no-one else. In no area is this clearer than in your work, the decline of all the house's security measures is obvious to everyone. You just don't have the time for it all, and it is only through Christopher's insistence to your agency that you are doing everything you can that you keep your job, holding it by the skin of your fingers.\n\nThe wedding idea he mentioned at the party also seems to have evaporated for the moment. Whether forgotten in the face of your current predicament or whether simply on the back-burner you can't be sure.\n*page_break\nAs for finding the will, you make no progress, but neither does Rebecca, so that at least is something.\n*if (opalkidnap=false)\n\n\tOpal stays in the house, although becomes more and more reclusive as time passes and it becomes clear that Christopher's interest in you is not going to fade.\n\t*goto extra1\n*else\n\t*goto extra1\n*label extra1\n*page_break\n\nYou are cleaning your teeth one morning when you drop the tube of paste. Bending down to get it, something odd catches your eyes. You probably wouldn't have noticed it before all those weeks searching for slight imperfections in the house design that might indicate a hidden hinge, but now the uneven tiles stick out to you like a sore thumb.\n\nReaching over, you pull at the tile. It falls with a clatter to the floor, but that doesn't matter to you because inside the hole is a long thin mahogany box. \n\nYou open it up to find some rolled sheets of paper. Unfolding the top, you see the insignia of the family attorney and an opening line about a last testament.\n\nThis is what you've been looking for. It's in your hands, the thing that you know will end the stale mate you're in.\n*if (chrisdc=true)\n\t*goto 26\n*else\n\t*goto 27\n*label 26\nYou grin with glee, this can't have worked out better for you. You planned all those weeks ago how you were going to use this document, and to find it without Christopher - you don't even have to give him the slip.\n\nBut now it comes to it, the moment where you have to betray the man who put so much trust in you. Can you do it?\n*label replay1\n*choice\n\t*hide_reuse #I'll first check the will, if he was a liar than yes I have no qualms betraying him. If Christopher was honest with me I want to be with him.\n\t\tIt seems Alex was telling you the truth. The will leaves nothing to Christopher.\n\n\t\tBut this doesn't put him out the running. He currently holds most of the assets, without the will there is little Rebecca can do to prove everything belongs to her.\n\n\t\tThe question is really which opportunity will you take?\n\t\t*goto replay1\n\t#I'm taking this thing straight to Rebecca, no matter what it says she'll pay well for it.\n\t\t*goto 28\n\t#I'm taking this to Christopher. With this, all the problems will be out of our hair and we can be together and live like royalty.\n\t\t*goto 29\n\t#I'm taking this to Christopher, if he wants it he can marry me. But before my position is secured I won't be giving it to him.\n\t\t*set chrisbribe true\n\t\t*goto 29\n\n*label 27\nYou hug the will to your chest. Everything you've been looking for.\n\nHowever on unfolding the will you see that Christopher isn't the one everything has been left too. No, it's Rebecca.\n*choice\n\t#I'm sure Christopher didn't know about this. I'll tell him what I found, and I know he'll do that right thing.\n\t\t*goto 29\n\t#So? The assets are mostly controlled by Christopher, all I need to do is get rid of the will and make sure everyone knows. The dispute will end and Christopher and me will be together.\n\t\t*goto 29\n\t#This isn't right, and he lied to me. I'm going to give this to Rebecca so she can set things right.\n\t\t*set chrisdc true\n\t\t*goto 28\n\t#I wonder how much Rebecca will be willing to give me for this will. A lot more than I'd get as just as Christopher's partner I imagine.\n\t\t*set chrisdc true\n\t\t*goto 28\n\n*label 28\nUnable to let the matter wait, you set off straight away, heading straight to the office to use the cameras in your search.\n\nThe taken aback expressions on everyone's faces speaks volumes about your presence over the past few weeks, but you have bigger concerns for the moment.\n\nYou see Rebecca in the front hall, taking a leisurely stroll, enjoying the flowers and talking with Rob of all people, and you set off immediately.\n*page_break\nNeither seem very pleased to see you as you approach them.\n\n\"Rebecca,\" you incline your head politely, \"I was hoping to have a word with you.\"\n\n\"And what could we have to talk about?\" Rebecca asks, raising her eyebrows. The two of you have never had a head to head before, but it has been clear since the beginning that you are both on opposite sides of this conflict.\n\n\"Plenty if you listen to me,\" you reason, clutching the will in your hand.\n\n\"Fine, but make it quick,\" Rebecca flips her hand dismissively at you.\n*choice\n\t#You know what, I would rather give this to Christopher. He may not be perfect, but this woman is worse, she deserves nothing.\n\t\tYou raise your eyebrows at her, \"Never mind then,\" you say, and stalk off.\n\n\t\tNone of this family are saints it seems, all you can do is stick with the lot you chose to start with.\n\n\t\tIt doesn't take long to find Christopher.\n\t\t*goto 39\n\t#\"I have the will you've been looking for. Now let's talk about what you're going to give me for it.\"\n\t\t*goto 30\n\t#\"I have the will you're looking for, here,\" Give it to her.\n\t\t*set reb %+10\n\t\t*set rebsave true\n\t\t*goto 30\n*label 30\nYou become suddenly and painfully aware of a presence behind you. You've been with him every day for the past month. You know how his eyes feel on you.\n\nYou turn to find Christopher standing staring at you in utter disbelief, \"But-\" he stutters and falls silent.\n*set chris 1\n*set chris1 false\n\nThen a rage, an animalistic one you have never seen crosses his face and he spits at your feet, \"You little tramp!\" for the first time the calm cool Christopher is truly gone. He is shaking with a consuming anger.\n\nThe his hand lashes out towards you and you find yourself on the ground blinking up at him, half feeling uncomprehending surprise, half tears stinging your eyes at the pain in your jaw.\n\nIn your daze Christopher pulls you up and holds you tight against him. You feel him taking your own gun out of your holster and then you feel a cold metallic hardness on the side of your head.\n\nIt's safe to say you couldn't have foreseen this kind of madness.\n*page_break\n\"Now you give me that will right this second,\" Rebecca and Rob are both speechless, clearly as shocked as you at such a violent reaction.\n\n\"GIVE IT TO ME!\" Christopher screams. You can feel flecks of spit landing on your shoulder from behind, \"I order you to give it to me now!\"\n\n*if (rebsave=true)\n\t*goto 31\n*else\n\t*goto 32\n\n*label 31\n\"No.\" Rebecca says firmly, like she's talking to a toddler, \"I won't give it to you and you'll put that gun down this instant.\"\n\n\"Like hell I will, you mad witch.\"\n\n\"Oh yes you will Christopher and I will tell you why right this second. If you were to shoot an employee when you had money, then it would be easy enough to hush up. But while I have this,\" she waves the will around, \"I have the money and I have two good witnesses to testify what the will said, so you can't win at this point my dear. All shooting poor ${name} is going to get you will be some very awkward prison time.\"\n*page_break\nYou can feel Christopher tense behind you, and you wish with all your heart that Rebecca was gambling someone else's safety right now.\n\nBut miraculously Rebecca's reasoning seems to work, you feel Christopher's arms loosen on you.\n\nThen Rebecca holds out her hand to you.\n*choice\n\t#Take it.\n\t\t*goto 35\n\t#Leave it.\n\t\t*goto 36\n*label 35\nRebecca smiles as you step forward and grasp her hand, \"That's right,\" Rebecca coaxes, looking over your shoulder at Christopher, \"Now that's all sorted,\" Rebecca smiles brushing herself off like the whole affair has made her dirty, \"I would like you to leave my house Christopher. In the next week or so would be best I think.\"\n\nChristopher can only sputter at his mother staring at the will in her hand.\n\n\"As for you,\" Rebecca turns to you like Christopher just evaporated, \"What made you bring this to me?\"\n*choice\n\t#\"I saw it belonged to you. I only wanted to do the right thing.\"\n\t\t\"An admirable thing. Much appreciated,\" Rebecca gives you the warmest of smiles.\n\n\t\t\"I thought until now the will was for Christopher. But knowing it's not, it shouldn't go to him.\"\n\t\t*set reb %+10\n\t\t*goto 37\n\t#\"I was hoping there would be a reward for its return.\"\n\t\t\"And that there will be,\" Rebecca says, looking at you almost pityingly, \"If that is all that really matters to you.\"\n\n\t\t\"I think at this point it's the best I can hope to come out of this with,\" you shrug, earning you another pitying look.\n\t\t*goto 37\n\t#\"Christopher lied to me, and I'm not okay with that.\"\n\t\t\"I'm a woman who can appreciate that,\" Rebecca says, turning a disapproving eye to Christopher, \"I detest liars.\"\n\t\t*set reb %+10\n\t\t*goto 37\n\t#\"I changed my mind about who I was rooting for.\"\n\t\tRebecca looks completely taken aback, \"I don't really understand.\" But before you can elaborate you're interrupted.\n\t\t*goto 37\n*label 37\n\n\"I can't believe you,\" Christopher is still standing across the room, shaking uncontrollably, \"You were mine! It was perfect, and you threw it all away. Why? We could have been happy.\"\n\n*fake_choice\n\t#\"Happy to me isn't a relationship where I get lied to.\"\n\t#\"You mean you would have been happy?\"\n\t#\"Yours? I don't belong to anyone.\"\n\t#Remain silent. He isn't worth my time.\nChristopher just spits at your feet, looking half deranged with his hair flying around his face and his eyes bulging.\n\n\"Christopher I'm going to ask you to calm yourself or you're going to have to leave,\" Rebecca says, still like she's talking to a small child.\n\nThis just seems to send Christopher over the edge. He yells some strangled profanity and starts tearing at his hair, stamping his foot.\n\nRob smiles at you, blushing to the roots of his hair.\n*page_break\n*set rebplot true\n\"Come dear, I appreciate you trusting me. It appears I misjudged you. But let's forget about that.\" Rebecca says, gesturing for you to follow and leaving an enraged Christopher to his tantrum, \"Now, let's talk about what we're going to do next. Now I can't do much about the fact you've neglected your job for the last few weeks. But let's talk about what else we can do...\"\n*set end3 true\n*finish\n\n*label 36\nRebecca raises her eyebrows at you as you back away from not just Christopher but everyone, \"I'm surprised.\" Rebecca says coolly, \"You seem like just the kind of weasel to shelter under others. But fine. You're all safe now. And Christopher will not be needing you to work for him anymore. Good day to you.\"\n\n\"But,\" you gesture at the will.\n\n\"But nothing,\" Rebecca says, raising her eyebrow cockily, \"Why should I share what's mine with someone I can't trust? Now I said - good day,\" she says it with such fierce vehemence you can almost feel it blow you over backwards. \n\nNo matter how much you talk, no matter what you do, your contract is now over. And you aren't welcome in the house anymore. It's time for you to leave with as much dignity as possible.\n*set end4 true\n*finish\n\n*label 32\nYou see Rebecca's eyes flick to your hand, where you're still clutching the will, \"If I had it I wouldn't, but I have to say Christopher you have it very wrong. Your little 'tramp' hadn't finished trading it away just yet.\"\n\nYou see her wicked smile through your pain and realize that you have made enemies on all sides.\n\nChristopher's hand scrabbles at yours. But you hold the will grimly, it is, after all, your only hope now.\n\n\"You let go of it. Or I swear I will shoot you. Jilting harlot.\" you can feel Christopher's hot anger on the back of your neck.\n*choice\n\t#Let go.\n\t\t*goto 33\n\t#Hold on.\n\t\t*goto 34\n*label 33\nYou feel the will get pulled through your fingers and you know Christopher is taking the last thing that might have saved you.\n\n\"Now get out,\" Christopher says, pushing you away from him to the floor.\n\nYou look to Rebecca, hoping against hope she might step in. But she is simply looking down at you, arms folded and face scowling.\n\nYou get up and begin to stumble away, \"I'll be informing your agency of your terrible performance in my house,\" Christopher calls after you, as you escape down the hall to pack anything you can and get out as fast as you can.\n*set end7 true\n*finish\n*label 34\n\"You can't kill me,\" you protest, twisting the will away from his sweaty grasp, \"So your threats are empty. People don't allow things like that to happen.\"\n\n\"You're right, I can't kill you,\" Christopher says, an ominous amount of calm in his voice.\n\nYou feel his grip relax around you as he lets you out of his deathly grip and the barrel of the gun leaves your head.\n*page_break\nThen you hear a loud bang. You've heard gun shots so many times before and for a moment you can't help but think you're at the practice range, but then you collapse.\n\nYou look down and see a hole in the centre of your knee. Then the pain hits and it's like nothing you've ever felt before. You can feel every ounce pump of blood spilling out of you.\n\nYou clutch your leg and that's the only thing you can do until you feel yourself being lifted onto a stretcher. You're vaguely aware of wailing sirens and more pain in your leg, and eventually you're not aware of anything.\n*set end5 true\n*finish\n\n*label 29\nYou leave your room and head straight for Christopher's usual lair, his office. Surprisingly he's not there, or in his quarters, very odd.\n\nIn the end you have to go to the monitor room, hoping to find him by camera. The second you walk in, you can feel all the unfriendly eyes burning into you. You've not become well liked these past few weeks. But that doesn't matter now, you stride over to the monitors and pointedly ignore Emma pointedly ignoring you.\n\nYou see Christopher in the front hall, talking to Charlotte, so you set off.\n*page_break\n\"Good morning my love,\" Christopher says on your approach, pulling you to him and bending you backwards in a toe-curling kiss. You're vaguely aware of Charlotte sighing and walking off.\n\n\"Morning,\" you reply, eager to get straight down to it, \"I have something for you.\"\n\n\"What?\" Christopher asks, looking genuinely confused.\n\n*if (chrisbribe=true)\n\t*goto 38\n*else\n\t*goto 39\n*label 38\n\"Something that will secure our future. That is, if our future is secure.\" putting an extra emphasis on the word 'our' you trail off, eyeing him meaningfully. You hope he gets what you're saying, it would be an awkward thing to come right out and say.\n\nChristopher furrows his brows at you, \"Our future is fine.\" he says uncertainly.\n\n\"Ah, it's just, this feels so silly to say,\" you avert your eyes acting up a touch coy, \"I'm just worried the future may not be as it seems without some kind of, I don't know, promise between us. Don't you think?\"\n\nA look of dawning understanding begins to come over Christopher's face, \"And you want a promise, before you'll trust me with our future?\" he asks, just to make fully clear.\n*choice\n\t#\"Yes,\" I want security before I trust him with this will.\n\t\t*set chris 1\n\t\t*goto 402\n\t#\"No,\" I backtrack. I trust him and I don't want to enter a marriage this way.\n\t\t\"Just my little joke sweetie, to lead up to...\" you press the will into his hand.\n\t\t*set chrisbribe false\n\t\t*goto 39 \n*label 402\n\"I see,\" Christopher says. He looks completely crestfallen for a moment, then he straightens, \"And there is no way around this? This is the way you want things?\"\n\nYou nod your head to reinforce what you said.\n\n\"Then let's go get married.\"\n\n\"Now?\"\n\n\"Yes now, I have no intention of waiting for this future of ours. Charlotte!\" he calls loudly, \"Bring the car around. Now.\"\n*fake_choice\n\t#\"Great idea, let's get off straight away.\"\n\t#\"Hey, I want a proper wedding, that's going to take some planning!\"\n\t#\"Really? Right now?!\"\nChristopher presses one long finger to your lips, \"I don't care what you have to say. You've made your choice. You want us to be this way, so we're going to be this way and it's going to start now.\" Christopher says, his other hand digging painfully into your shoulder, \"This will be our life from now on. My love.\"\n*set end2 true\n*finish\n\n*label 39\n\"I have it!\" You half whisper half squeak, barely able to contain your excitement.\n\n\"Are you telling me you have what I think you're telling me?\"\n\n\"The very same,\" you say, smiling up at him.\n\nChristopher blinks at you, completely speechless, then he picks you up and crushes you to his chest, \"That's perfect - you're perfect!\" he sets you down only to pull you into a tighter embrace with a all-consuming kiss.\n*page_break\n\"So what next?\" You ask breathlessly as you pull apart.\n\n\"Now my mother has no claim on anything she will leave. There is little she can do, so the 'guests',\" he pronounces the word 'guests' like the word 'puss', \"Will be leaving at the earliest convenience. I think we will also find the kidnappings stop now. So I'm going to stop paying your agency. However, I would...\" Christopher trails off and swallows, \"I would like you to stay here. Very much, I think my life would be a lot poorer if you stopped living here.\"\n\n\"Let's see,\" you say, playfully tapping Christopher on the nose, \"First things first.\"\n*set end1 true\n*finish\n\n\n\n\n\n*label 14\nYou carry on doing your job to the best of your ability, but nothing happens on that front, and soon there is little for you to do but to check your staff carry on doing that same thing they have been for weeks, that quickly turn into months.\n\nYou spend the rest of the time using your lucrative position to keep your eyes on Christopher. You note things about him you didn't before, his fondness for red wine, the fact that he doesn't like to be disturbed last thing at night, the kind of books he's reading. All this information you feed back to Opal, so she can 'surprise' him by having the same taste in wine, or having read the same books.\n\nChristopher falls for Opal very quickly and soon he's taking her out, buying her things and before you know it inviting her to share his quarters.\n*page_break\n*if (opal1=true)\n\t*goto 111\n*else\n\t*goto 112\n*label 111\nThat's difficult, watching her live so closely with him. Christopher is always touching her and stroking her like she's a dog that belongs to him. In contrast all your relationship can manage is the occasional stolen moment when Christopher is out.\n\nAll you can do is keep reminding yourself that you are the one she wants, not him.\n\nIt's hard to say which is worse, the announcement of their wedding a mere two months after that iconic party, or having to stand and watch the small wedding itself a few weeks afterward.\n*goto 113\n*label 112\nYou can only be mild
