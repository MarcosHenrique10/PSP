ly impressed at how fast she works.\n\nIt only takes Christopher two months to propose to her, much to everyone's surprise. You attend the wedding, of course, one of the few people who do as Opal keeps it small. Presumably out of a desire of wanting it to be quick.\n*label 113\n*page_break\nIt doesn't take long after that for the fiscal benefits to begin. Opal, now being your direct employer, arranges for an immediate large pay rise, with the promise of a large bonus on the horizon.\n\nThis was not the original deal though, and you tell Opal as such the next time you get a moment alone. She only smiles and reassures you the rest of the plan is underway.\n\nThat evening the agency call you up and tell you the Haywood's have decided your services are no longer required. You go to the agencies head office for an immediate debrief while your staff pack up.\n\nThen you return to the house for the final night of your employment, ready to leave in the morning.\n*choice\n\t#I trust this is part of Opal's plan, I go along with this.\n\t\tYou decide to settle down for the evening when your phone buzzes with a text from Opal, simply asking you to come to her quarters.\n\n\t\tMaybe you are going to get an explanation after all.\n\t\t*set opal %+10\n\t\t*goto 115\n\t#I'm going to go ask Opal about this plan right now, I need to know what's going on.\n\t\tIt's not too late to knock on the door to her quarters and ask for a word with her. If anything she'll probably expect it because you didn't get any warning about your pending lack of employment.\n\t\t*label 115\n\t\tNo point in wasting time, so you head straight off to their quarters and knock on the door, \"Who is it?\" Opal's familiar musical voice drifts out the door.\n\n\t\t\"${name},\" you answer gruffly.\n\n\t\t\"Ah, perfect timing, come in but make sure to shut the door behind you,\" you do so, letting yourself into the small living room, orange in the light of the dying sun.\n\n\t\t\"Come on through,\" Opal's voice drifts out of the bedroom. Slightly confused you just follow her voice.\n\t\t*goto 114\n\t#Thinks she can fob me off? Ha, I'm going to find Christopher and expose what she's done.\n\t\tYou're not going to let her run off with everything she promised to share with you and live a happily ever after while you break your back with work. No.\n\n\t\t*set opal %-20\n\t\t*goto 115\n*label 114\n*page_break\nFor a moment you think you've been invited into a very awkward situation. Opal's stood over the bed in a white silk negligee, and Christopher is lying on the bed in nothing but briefs, staring up at her.\n\nIt only takes you a few seconds to realize that Christopher isn't breathing.\n*choice\n\t#\"My god what have you done?!\"\n\t\t*goto 119\n\t#Run over to him and check his vitals, surely he isn't dead.\n\t\tNot wasting a second you speed over to the bed and press your fingers against his neck, nothing. You press your head on his chest, nothing. You even try the beginnings of CPR but Opal interrupts you.\n\n\t\t\"I assure you, he is quite dead.\"\n\n\t\tYou straighten up and stare at him and her, stunned, \"But, I, what?\" You ask, stuck for words.\n\t\t*goto 119\n\t#Stand there, stunned.\n\t\tYou blink at the whole scene, your mind reeling, it's all too much to take in.\n\t\t*goto 119\n\t#Grab Opal so she doesn't run away.\n\t\tOpal raises her eyebrows at you, \"What are you doing?\"\n\n\t\t\"Making sure you don't escape.\"\n\n\t\tOpal looks even less amused, \"I had no such intention. Besides, you were all part of this. You might want to hear the whole thing before you rush off to the authorities and implicate yourself horribly.\"\n\n\t\tYou let go of her in surprise. It's true, you have been helping her. For your staff, your secret meetings with her are not secret, it wouldn't take much for her to convince people you were involved with the murder.\n\t\t*page_break\n\t\t*set opal %-10\n\t\t*goto 119\n\n*label 119\n\nOpal sits on the bed next to the still Christopher looking pointedly away from him, \"I killed him.\" Opal says simply, \"I had hoped to simply divorce him when my goal was achieved and live comfortably on a nice separation payment.\"\n\n\"Your goal?\" you press\n\nOpal looks up at you from her place on the bed, \"What do you think it was?\"\n*choice\n\t#\"I thought it was money.\"\n\t\t\"You're supposed to be intelligent in your job. Can't you see I already have money?\" Opal scoffs.\n\n\t\t\"I mean money that isn't controlled by your father,\" you quip.\n\n\t\tOpal looks thoughtfully at you, \"Do you really think that is so important to me?\"\n\n\t\t\"Why don't you just tell me what was important to you then?\" you say quickly, unnerved by Christopher's staring eyes.\n\t\t*set opal %-5\n\t\t*goto 120\n\t#\"I thought it was to get away from your Dad.\"\n\t\t\"And in a way it was, but for me, I can't just escape from him. It has to be more.\"\n\t\t*set opal %+8\n\t\t*goto 120\n\t#\"I thought you really liked Christopher.\"\n\t\tOpal snorts loudly, \"Are you insane? At what point did I give that impression?\"\n\n\t\t\"I thought you must like him a little,\" you say, eyeing his body, \"Otherwise I don't know how you could marry him,\"\n\n\t\t\"You are more innocent that I thought.\" Opal says scornfully, \"Let me explain.\"\n\t\t*set opal %-10\n\t\t*goto 120\n\t#\"I have no idea honestly.\"\n\t\t*set opal %+5\n\t\t*goto 120\n*label 120\n*page_break\nOpal sighs, \"Explanations, let's make this quick. We have to make this death look natural before too long passes. So a quick explanation.\"\n\nOpal motions for you to sit on the end of the bed by Christopher's cold feet. You are inclined to decline the offer.\n\n\"You know by now I have not had a wonderful experience. My father is a controlling and hot-headed man who sees me as little more than an opportunity to expand his business through personal ties. I've never had a life of my own, I've never had friends, I have nothing to live for but myself. I wish more than anything I could do my life over. I wish it so much it aches. But I just have this one life, and he will pay for ruining it.\"\n\nShe says the last bit with such violent vehemence you step back, \"I pillaged my father's office and found the business who has most influence over his profits. It was Christopher's, so I planned to come here, get him to marry me and then use my secure position to persuade him to cut off all business ties with my father. But Christopher refused. I've been trying these past two months to plant the idea, to get him to agree so it wouldn't have to come to this, but he refused every single time.\"\n*page_break\n\"Being with Christopher has been no picnic. He is very much like my father, controlling and, as I've found out, prone to violent rages. He's been threatening to get rid of me every time I behave in a way he doesn't one hundred percent agree with. He's been pressing me so hard, I panicked. I didn't intend to kill him. Because I can't lose control of his assets until my father doesn't have a penny to his name.\" Opal's breathing hard, her chest heaving with emotion from her explanation.\n\n\"I will not mean nothing,\" Opal finishes her voice cracking, \"I refuse to let my life have no meaning, overshadowed by people who don't care about me, who tell me I don't matter.\"\n*choice\n\t#\"What did Christopher do to you?\"\n\t\t\"Nothing I've not experienced before.\" Opal says cryptically, not meeting your eyes.\n\n\t\t\"What?\" you press, \"For you to lash back like this.\"\n\n\t\t\"I can't,\" Opal shouts, \"I can't think about all this, it's too much. Just tell me.\" Opal takes a deep ragged breath.\n\t\t*goto 121\n\t#\"This is insane. You're insane.\"\n\t\t\"Maybe,\" Opal shrugs, \"But what is insane? Is it insane to murder your own husband in fright for yourself,\" she swallows dryly, \"Is it insane to have all meaning in life robbed from you, and then want to ruin the person who did it to you? Is it insane to look out for yourself to the best of your ability?\"\n\n\t\tThere's a silence between you as Opal's words settle.\n\t\t*set opal %-10\n\t\t*goto 121 \n\t#\"Why didn't you tell me this before?\"\n\t\tOpal is clearly taken aback by your question, \"Would you have helped me if you knew how desperately I wanted this? It was never supposed to go this far, but I always knew there was a chance that it might have to.\" Opal shrugs, \"Maybe a part of me was scared to admit how far I would go.\"\n\t\t*set opal %+10\n\t\t*goto 121\n\t# Stammer. What can I say to a crazy murderer?\n\t\t*goto 121\n\t# Stammer, she has so much pain in her life I don't know what I can say to that. Words seem so meaningless.\n\t\t*goto 121\n\t#\"How will this give your life meaning?\"\n\t\t\"This doesn't give my life meaning,\" Opal runs her fingers along the lace of her negligee, \"This is my life's meaning. To escape, to make him pay, that's all the meaning I have.\"\n\n\t\t\"Then what after this?\" you ask, mouth dry.\n\n\t\t\"I don't know,\" Opal says, staring off into space, lost in her own thoughts, \"And isn't that just the scariest thing?\"\n\n\t\tSilence falls between you.\n\t\t*set opal %+5\n\t\t*goto 121\n\n*label 121\n*page_break\n\"What do you say?\" Opal asks, tears shining in her eyes. You can see her hands start to shake, \"Will you help me?\"\n*choice\n\t#\"Yes I'll help. We need to get that body out of here.\"\n\t\t*set opalassit true\n\t\t*set opal %+20\n\t\t*goto 122\n\t#\"No, I won't help, assisted murder was not part of our deal. But I won't turn you in either.\" She still owes me for the work I've done so far, I can't collect if she's in prison.\n\t\t*set opal %+5\n\t\t*goto 123\n\t#\"No I won't help you. I'm calling the police. You're clearly unhinged.\"\n\t\t*set opaldc true\n\t\t*set opal 1\n\t\t*goto 124\n*label 122\nOpal lets out a relief wracked sob and throws herself at you hugging you tightly, \"I was so scared I was going to be in this all alone.\"\n\n\"I'm not leaving you alone,\" you reassure her as she lets you go. You can see her shaking.\n\n\"Are you alright?\" you ask.\n\n\"Not really, I can barely believe what I've done.\" she's silent for a moment, \"But now isn't the time to fall apart.\" Opal straightens up and sniffs loudly.\n*page_break\n*if (opal1=true)\n\t*goto 125\n*else\n\t*goto 126\n*label 125\n*page_break\n\"Okay,\"  you say, letting Opal feel what she needs to feel.\n\nThen her hands wrap around you again and she's kissing you, a deep and passionate kiss, her body pressed against your own. You can feel her tears on your cheek and her desperation through the way she clutches you.\n\n\"I love you.\" she moans into your mouth, \"I know it's crazy, but I do. I've never met anyone like you, you want me to be yours and yet be my own person at the same time. I feel like with you I can be anything, do anything. I love you.\" she breathlessly tells you again.\n\n\"I don't expect you to feel the same yet,\" she pulls back, putting her fingers to your lips, \"I just had to let you know.\"\n*page_break\n*label 126\nThe two of you wait until night, then take Christopher's body and dispose of it in a place you think no one will find it with a plan to claim the kidnapper finally succeeded in his plans.\n\nThen you wait, and hope against hope no one suspects what you've done.\n*set end8 true\n*finish\n\n*label 123\n\"I guess that's all I can ask from you.\" Opal's shoulders slump a little, \"Although I must admit, I was hoping to not be in this all alone.\"\n\nYou keep your distance as Opal visibly folds in on herself. Then she's upright again, wiping her eyes, \"You'd better go then, just don't say anything. I'll sort it all.\"\n*if (opal1=true)\n\t*goto 127\n*else\n\t*goto 128\n*label 127\n*page_break\n\"Wait, one more thing.\"\n\nYou turn on your way out the room.\n\n\"I still want you. I know I can't love you yet, I know we haven't known each other long enough, but I know that's where my feelings are going. Can you still be with me after this?\"\n*choice\n\t#No. I can't be with you knowing what you've done.\n\t\t*set opal1 false\n\t\t*goto 135\n\t#Yes. I still want you too.\n\t\t*set opal %+5\n\t\t*goto 134\n*label 134\nYou give Opal a silent nod, which she returns with a weak smile.\n\n\"I'm glad. Now go, I need to work,\" she gestures to Christopher\n*goto 128\n\n*label 135\nOpal nods, clasping her hands in front of her, \"I thought that might be the case. Well, I tried and put myself out there.\" she sighs, \"Idiot, making jokes. I understand, don't worry, our deal is still on.\" then she turns away from you, seemingly unable to turn back.\n*label 128\n\nYou close the door as you leave, hoping Opal knows what she's doing.\n*set end9 true\n*finish\n*label 124\n\n*if (opal1=true)\n\t*goto 129\n*else\n\t*goto 130\n*label 129\n\"But-\" Opal jumps off the bed over to you and slides her hands around your neck, \"What about us?\"\n\n\"Us?\" you ask incredulously, \"When I agreed to us I didn't know you were like this,\" you gesture at Christopher.\n\n\"Please my love,\" Opal's kissing your neck, \"Don't do this. We'll never be together.\"\n\n\"I told you there is no us,\" but Opal doesn't seem to care, she pushes herself against you fiercely and you can feel her body through her thin clothes.\n\n\"Please,\" she moans into your mouth.\n*choice\n\t#Push her off\n\t\t\"Get off me!\" you push her back insistently and she stumbles to the floor, \"This isn't a joke.\"\n\t\t*goto 130\n\t#Kiss her back\n\t\tYou can't help it, the way her lips feel on your skin, the way her hot breath dances against you.\n\n\t\tYou sink into her, losing yourself in her touch. Forgetting everything.\n\n\t\tThen a pain cuts through your euphoric stupor and your vision goes black.\n\n\t\tWhen you come to, there's a pair of handcuffs round your wrists.\n\t\t*set opalprison true\n\t\t*set end11 true\n\t\t*finish\n\n*label 130\n\n\"You think I'm just going to let you turn me in?\" Opal snarls at you, and then she lunges straight for you.\n*if (career>75)\n\t*goto 131\n*elseif (career>50)\n\t*goto 132\n*else\n\t*goto 133\n*label 131\nYour quick reflexes don't even give her a chance. As she comes flying at your face, you take her wrist and twist her into a sleeper hold.\n\nShe scratches at your arm like a wild cat at first, but then she can only flail her arms, then she's out cold.\n\nYou phone the police with no more interruptions and it doesn't take long for you to hear the squeal of sirens.\n*set end10 true\n*finish\n*label 132\nYour reflexes aren't as quick as they should be and she barrels straight into you, knocking you on your back. She scratches at your face like a wild beast, keeping you pinned to the floor.\n\nYou shake off your surprise and push back against her, flipping her into the floor and securing her arm in a firm lock. She kicks and squeals threatening to pull her own arm out its socket.\n\nYou fumble for the nearest thing to hand and crack it across the back of her head. She goes limp.\n\nYou stand yourself up, dust yourself off and phone the police. It doesn't take long to hear the squeal of sirens.\n*set end10 true\n*finish\n*label 133\nYour reflexes are abysmal, when she lunges at you you barely have time to breathe and she knocks you flying. Landing on top of you, she punches, kicks, and snarls like an animal.\n\nYou try to push her off but you don't have enough strength. The last thing you see is Opal reaching out and grabbing a decorative vase and smashing it over your head.\n\nWhen you come to, your hands are bound by tight metal cuffs.\n*set opalprison true\n*set end11 true\n*finish\n\n\n\n*label 15\nYour security work eases off as nothing happens, so once your staff are all in a comfortable routine, all there is to do is remain vigilant. You and Rebecca search high and low at every opportunity.\n\n*if(robplot=true)\n\tYou know Rob is searching too, although you notice Rebecca never actually officially introduces you to each other. Perhaps she still doesn't fully trust you.\n\n\t*goto 400\n*else\n\t*goto 400\n*label 400\n*if((reb1=true)or(reb2=true))\n\t*page_break\n\tYou and Rebecca continue to steal moments together. She starts off nervous about your time together, but soon comes into her own and you find she is a caring partner and a fierce lover. You find she likes to spoil you, jumping at opportunities to massage your back. One memorable afternoon she takes over the kitchen and bakes treats for the two of you to enjoy together. One evening you come back from a late night in the office and she's run a hot bath and chilled some champagne for your arrival.\n\n\tHow are you feeling about the personal part of your relationship?\n\t*choice\n\t\t#I think I'm really falling for her, she's wonderful.\n\t\t\tYou can't help but smile as you think about the way she treats you and you repay her in kind. Your compliments make her giggle like a young girl and she tells you the way you worship her body makes her feel like a goddess.\n\t\t\t*set reb %+10\n\t\t\t*goto 4011\n\t\t#She's not keeping this casual enough.\n\t\t\tHer full on behaviour makes you a little uncomfortable and you can't help but act it every time she does another over-blown thing for you.\n\n\t\t\tThe vibes seem to emanate off you because Rebecca stops treating you, only coming to visit you personally for the more carnal aspect of your relationship.\n\n\t\t\tHowever you can tell Rebecca isn't comfortable with this. She seems unsure of how to keep things casual and in the end she simply stops coming to your room.\n\n\t\t\tYou don't pursue her. It's clear you want different things.\n\t\t\t*set reb1 false\n\t\t\t*set reb2 false\n\t\t\t*set reb %-10\n\t\t\t*goto 4011\n\t\t#This was fun, but it needs to stop now.\n\t\t\tYou choose your evening to have the conversation with her and try to let her down as easily as you know how.\n\n\t\t\tRebecca seems surprisingly unaffected, although you know her well enough to know she's hiding her reaction - she'll simply feel what she feels alone in private later.\n\n\t\t\tAt first it makes your relationship awkward, but soon Rebecca is back into the swing of treating you like an employee and any personal thoughts you had for one another evaporate as you bend your minds to your mutual task.\n\t\t\t*set reb1 false\n\t\t\t*set reb2 false\n\t\t\t*set reb %-10\n\t\t\t*goto 4011\n*elseif (rob1=true)\n\tEvery moment you're not at work or with Rebecca you find yourself with Rob. You're always welcome at his house and he's always thrilled to cook for you.\n\t*page_break\n\tOne evening together Anna has roped both of you into making cake by claiming a desire to learn to bake only to slope off to play at the difficult bits.\n\n\tRob is red in the face from mixing the batter by hand. You try to take it from him but he's determined to break his wrist with his furious mixing.\n\n\t\"Why don't you let me have a go?\" you ask, trying hard to laugh at his huffing and puffing.\n\n\t\"I'm trying to do something nice for you. I'm your boyfriend after all.\" Rob says simply, then he blushes, making himself go even redder, \"I mean I am aren't I?\" he asks, \"I guess we haven't talked about it but I thought...\" he trails off then adds quietly, \"that this was really serious.\"\n\t*choice\n\t\t#\"Of course it's serious. I'm crazy about you.\"\n\t\t\t\"Well...good.\" Rob says, trying and failing to hide his relief, \"I know I haven't taken on you on dates and stuff.\"\n\n\t\t\tYou shrug, prising the mixing bowl out of his hands, \"I think it works for us.\" you say smiling.\n\t\t\t*set rob %+5\n\t\t\t*goto 4011\n\t\t#\"Let's not get ahead of ourselves.\"\n\t\t\t\"Oh,\" Rob turns a flaming red, \"I'm sorry, you're right I haven't taken you out or anything. I just thought you'd figure with, you know, Anna, I can't - but never mind. You're right, just me being silly.\" he tries to laugh it off. But he never tries to kiss you again and his invites to his house dry up.\n\n\t\t\tIt's clear he thought a lot more of you than you of him.\n\t\t\t*set rob %-10\n\t\t\t*set dumpr true\n\t\t\t*goto 4011\n\t\t#\"How could I not love you?\"\n\t\t\t\"Oh...Thanks.\" Rob says lamely, his face turning a flaming red he lets silence fall between you for a few minutes while he mixes even more furiously.\n\n\t\t\t\"You know I love you too right?\" he blurts after a few minutes of silence, \"Like a lot.\" he adds lamely, \"Even though I'm kind of rubbish at showing you.\"\n\n\t\t\t\"It's fine,\" you say, grinning as Rob hands you the cake batter bowl to lick.\n\t\t\t*set rob %+10\n\t\t\t*goto 4011\n*else\n\t*goto 4011\n*label 4011\nYou are cleaning your teeth one morning when you drop the tube of paste. Bending do to get it something odd catches your eyes. You probably wouldn't have noticed it before all those weeks searching for slight imperfections in the house design that might indicate a hidden hinge, but now the uneven tiles stick out to you like a sore thumb.\n\nReaching over you pull at the tile. It falls with a clatter to the floor, but that doesn't matter to you because inside the hole is a long thin mahogany box. \n\nYou open it up to find some rolled sheets of paper. Unfolding the top you see the insignia of the family attorney and an opening line about a last testament. Unfolding more you see it's the right thing and, yes, everything was left to Rebecca.\n\nThis is what you've been looking for. It's in your hands, the thing that you know will end the stale mate you're in.\n*page_break\n*if (robplot=true)\n\tBarely able to contain your excitement you make straight for Rebecca's quarters. However you run into her in the hallway, strolling through the hall enjoying the flowers with Rob walking next to her, apparently there as a drink stand, but you know better.\n\n\t*goto 4211\n*else\n\tBarely able to contain your excitement you make straight for Rebecca's quarters, however you run into her in the hallway, strolling around enjoying the flowers. Rob's with her, you motion for him to go but Rebecca shakes her head.\n\n\tYou motion for Rob to go but Rebecca calls him to stay, and you wonder if she can't see the excitement in your eyes.\n\n\t\"You're both involved in this,\" Rebecca says, her eyes darting from one of you to the other like she's worried you might be annoyed at her. But now isn't really the time.\n\t*page_break\n\t*goto 4221\n*label 4211\nThe moment she sees you she can tell there is something different about you. She does a little jump, nearly knocking Rob over.\n\n*label 4221\nUnable to wipe the grin off your face, you hold out the mahogany box to her, \"I found it,\"\n\nRebecca, hands shaking, takes it from you and nervously peeks inside, quickly slamming the lid shut in shock \"Oh my goodness you did.\" then she's crying and she's thrown herself at you, grasping you in the tightest hug you've ever experienced, \"Thank you. I can fix everything now. I know I can. Thank you.\"\n*page_break\n*if (reb1=true)\n\t*goto 4231\n*elseif ((rob1=true)or(rob>70))\n\t*goto 4241\n*else\n\t*goto 425r\n\n*label 4231\nRebecca throws her arms around you and presses her lips to yours, not caring who's watching, not caring about anything. You can feel the tears on her cheeks. You can feel her trying to pour everything she feels for you into the kiss she's giving you.\n\nPulling away from you, she looks you in the eyes, pulling your arms tight around her, \"You're perfect to me, I never want to be apart from you.\"\n*set end12 true\n*finish\n*label 4241\n\"What is this?\" you don't need to turn around to see who it is. Christopher's voice is cold as ice.\n\nAnd Rebecca is holding the will out in the open. There's no hiding what you're doing here.\n\nRebecca doesn't even try to lie, \"We're simply excited, I think you can guess why.\"\n\n\"Yes I can guess.\" Christopher says calmly , his eyes roving over all of you, \"I let you in my house to keep you safe and you betray me.\" he spits towards Rebecca, \"I give your clumsy ass a job even though you're the most useless person I've ever had the misfortune of meeting, and you betray me.\" he spits at Rob, \"And you,\" his eyes turn on you, full of venom, \"I trusted you, I would have given you everything if you asked me. You could have had all of this, you could have even been mine if you wanted. But you betray me as well.\" he spits at your feet, \"I see three traitors,\" he shouts, his face beginning to turn red.\n*fake_choice\n\t#I try and calm him down.\n\t#I walk away with Rebecca and Rob, this isn't getting us anywhere.\n\t#I leave it to Rebecca, she is the spearhead after all.\n\"Let's be reasonable about this,\" Rebecca starts.\n\nBut it seems Christopher is past reason, he cuts across her, ranting and raving, \"And now you're going to take everything that's mine and leave me with nothing, is that it?! You...\" Christopher screams, lost for sufficient insult, \"Well I won't let you!\" he screeches like a banshee, \"This is mine! All of this is mine!\"\n\nYou have a moment, although it seems to be a very long time, as Christopher produces a gun. Strangely you have time to register it as one of your own staff's. He points it at his mother. You see Rob move pushing Rebecca out the way, putting himself in the way.\n\n*choice\n\t#I stay where I am.\n\t\t*goto 4251\n\t#Push Rob out the way.\n\t\t*goto 4261\n*label 4251\nYou simply stand and watch. You don't believe Christopher knows how to handle a gun, he probably hasn't even taken the safety off.\n\nA loud bang reassures you you're wrong, and you watch as Rob slumps to the floor, blood trailing out of a hole in his chest.\n*set end13 true\n*finish\n*label 4261\n*if (career>90)\n\tYour hours of training pay off. Your reflexes allow you to grab Rob and pull, dragging him out the way.\n\n\tSplintering china assures you the bullet hit the flowers behind you.\n\n\tChristopher is simply standing there, looking alarmed at himself. It's no difficult matter for you to run over and crack him over the back of the head.\n\n\tProblem solved.\n\t*set end14 true\n\t*finish\n*elseif (career>75)\n\tYour hours of training pay off, your reflexes allow you to grab Rob and pull, dragging him out the way. However, your arms aren't as strong as they need to be.\n\n\tTo pull him you need a counterweight, which means to pull him away you swing yourself forward, into the path of the bullet.\n\n\tYou barely even register you've been shot, because your world fades to black.\n\t*set end15 true\n\t*finish\n*else\n\tBut you aren't quick enough, strong enough, anything enough. Because time slides by. You can't make your body do what you want fast enough. You fail to grab Rob and pull him out the way.\n\n\tYou simply watch as he slumps to the floor, a hole in his chest pumping blood rhythmically onto the tiles.\n\t*set end13 true\n\t*finish\n\n\n\n*label 425r\nThe three of you find yourselves in a sad jump hug.  Laughing in relief, it's over, Christopher doesn't stand a chance.\n*set end14 true\n*finish\n\n\n\n\n\n\n*label 16\nYou and Alex plan your departure to land on your next pay check, your final pay check, you remind yourself.\n\n*if (career>50)\n\tYour staff make it plain they're sad to see you go, despite your inexperience you've lead them soundly, treating them fairly and more than pulling your weight.\n\t*goto 312\n*else\n\tYour staff never say it, but they seem happy to see the back of you. It seems your lack of passion for your career shows in your work more than you thought. You even heard Drew and Joe looking forward to a boss who 'knows what they're doing,' until they realize you're there.\n\n\tIt's not that they dislike you per say, Emma is certainly friendly enough, but even she can't pretend she isn't looking forward to a new, passionate, competent leader.\n\t*goto 312\n*label 312\n*page_break\n*if (alex1=true)\n\tAlex comes out of his shell more every day. At the beginning of your relationship you find yourself having to tell him off for slipping into a character and not being himself, sometimes without realizing. But as time goes on and the two of you grow closer, you find him acting less and less, even giving up auditions entirely. His weight improves too, slowly but surely. He confides in how uncomfortable the changes in his body are making him. You simply reassure and keep reminding him to eat meals, sure that if you keep trying, looking after himself will come naturally to Alex eventually.\n\n\tHe's more childish than you expected, due to your money saving the time you spend together can't be expensive outings, but when you do go out together, he makes a game out of wherever you go.\n\n\tOne time you go to a 1800's museum, and he spends the entire time there pretending to be a Victorian gentleman. None of your walks are boring, with Alex trying and failing to climb trees, jumping in puddles and, on one occasion, making you a daisy chain.\n\n\t*page_break\n\n\t\"You know something ${name}?\" he says, passing you the lolly you're sharing while you're out feeding the ducks together.\n\n\t\"What?\" you answer playfully, taking the biggest lick possible before handing the lolly back for Alex's turn.\n\n\t\"I think I'm falling in love with you. You know I'm telling the truth, else I'd resent you having more lolly than me with that giant lick.\"\n\n\tYou open your mouth to reply when he presses the lolly against your lips to shush you, then pulling it aside to press his lips against yours.\n\t*goto 313\n*else\n\tYou find Alex to be one of the most carefree friends you've ever had, up for anything. You think at first it's because he's a bit of a push over, but you realize after a while he's up for anything because he can make anything fun. Everything becomes a game. With a happy goal in his mind Alex is almost a different man, and much funnier than you first thought.\n\t*goto 313\n\n*label 313\n*page_break\nYou suspect he's already making good on his idea to become a writer, as when you aren't together you can see him in the monitors, sat in the library scribbling furiously. When you mention it he only blushes and feebly diverts the topic to whatever he happens to be looking at.\n\nThe two of you find a flat in the suburbs of London. Flat might be a generous word, room is closer, but it's cheap and well connected, well situated for you to go anywhere, do anything.\n*page_break\nYou wake up on your last morning from a restless night of not really sleep.\n\nToday is a whole new start for you. It's like leaving school all over again. But this time you know better, you won't be cajoled into positions because you have to be there, you will make what you want to do happen, not just follow the easy route. And, as Alex said, it will be fun.\n\nYou're packing up your toiletries when you drop your toothpaste on the floor. Bending to get the tube you see a sliding panel under the sink base. You slide it out, to find a box which you open to find a sheaf of paper inside.\n\nYou unroll it to find the will of the late Mr Haywood, Alex's father. Obviously you know Christopher is currently running the company, but the strange thing is the will titles Rebecca as the one supposed to inherit, and give both sons positions.\n*choice\n\t#I'm going to take this to Alex. I'm not sure what to make of all this.\n\t\t*set alex %+10\n\t\t*goto 314\n\t#I'm going to take this to Rebecca, Christopher's obviously undermined her.\n\t\t*set alex %-10\n\t\t*goto 314\n\t#I'm going to take this to Christopher. I wonder how much he would pay me to not take this to Rebecca?\n\t\t*set alex %-10\n\t\t*goto 314\n*label 314\n*if (alex1=true)\n\tYou jump as Alex's arms wrap around you, \"Good morning my love,\" he kisses your ear, \"Watch'a got there?\"\n\t*goto 315\n*else\n\t\"Hey,\" you jump at Alex's voice just behind you, \"You still aren't packed?\" he raises his eyebrows at the sheet in your hand and peers over your shoulder.\n\t*goto 315\n*label 315\nYou hear him suck in his breath as his eyes travel down the page, \"My family have been looking for this for years. It would stop all their arguing.\"\n*choice\n\t#\"What do you want to do with it?\"\n\t\t\"Don't you know? I'm surprised.\" Alex says, stepping away from you to give you space to turn around.\n\n\t\t\"I think I know.\" you say, \"But this is still 100% your decision, this is 100% yours,\" you say, flapping the paper limply.\n\t\t*set alex %+5\n\t\t*goto 316\n\t#\"We should use it to get some money to put towards our place.\"\n\t\tAlex looks visibly taken aback, \"You really think so?\" he asks confusedly.\n\n\t\t\"Of course,\" you answer, \"You don't have to take over the company or anything, but I imagine your mother and brother would pay a lot of money to secure this will, or make it disappear, respectively. It would make our life a lot easier.\"\n\t\t*set alex %-10\n\t\t*goto 316\n\t#Give it to Alex. It's his decision.\n\t\tYou push the will into Alex's hands, but to your surprise he curls his fingers and refuses to take it.\n\t\t*set alex %+8\n\t\t*goto 316\n\t#Say nothing.\n\t\t*set alex %+5\n\t\t*goto 316\n*label 316\n*page_break\nAlex's eyes linger on the will and you can almost see the gears ticking in his mind. He's always preached that he would never back stab like his family to get money, but he's never had much of a chance to do so up until now. Now, the opportunity has fallen in his lap and you can see that it is harder for him than he thought it would be to walk away from.\n\n\"Everything I've said to you about how I feel about this still applies.\" Alex says, smiling as he meets your eyes, \"I've told you how I feel. I'm going to walk away from this now, and I'm never going to speak to these awful blood relatives of mine again, and I will be free from their petty squabbles now.\" he holds your eyes and you can see he's hoping you will make the same decision, \"I'm going to go get the last of my bags, I'll see you out front, leaving in ten.\"\n\nHis hands make a small motion, although you have no idea what he was even thinking of doing, because he slips out the room.\n\nThe final decision is yours.\n*choice\n\t#I'm going to wash my hands of this and leave right now.\n\t\t*set alex %+10\n\t\t*goto 317\n\t#I'm taking this will to Rebecca. Alex has made his decision, but that doesn't mean I can't make a different one. Our plans will still work out.\n\t\t*set alexrebbribe true\n\t\t*set alex %-75\n\t\t*goto 318\n\t#I'm taking this will to Christopher. And screw Alex, he might throw away money but I won't. I'll set out alone.\n\t\t*set alexchrisbribe true\n\t\t*set alex 1\n\t\t*set alex1 false\n\t\t*goto 319\n*label 317\nYou smile at the will in your hand. Your decision is pretty clear. You drop the piece of paper on the floor, picking up your toothpaste and stowing it in your wash bag. You step on it on the way out for good measure.\n\nWell and truly washing your hands of the whole thing.\n\nYou lug your case down the stairs, meeting Alex out the front. There's no car this time to stow your bags in. You both struggle and laugh, trying to pull your wheelie cases down the gravel path. It's quite a walk to the nearest bus stop, but that's fine.\n*set end16 true\n*finish\n*label 318\nYou chew your lip. Alex may not be happy blackmailing his family. But you have no qualms about using them to step up a little. And it's not like it affects yours and Alex's plans. You can still live together, the blackmail won't be on his conscience. It won't affect him at all.\n\nYou tell yourself this as you knock on Rebecca's door, not quite sure whether you believe it. \n\nRebecca opens the door to you, and you take the plunge, explaining everything. You try to be quick, but by the time you struggle down the front with your bags, Alex is already gone. It's on you to follow him, struggling with your case while the terms of your deal ring in your ears.\n*set end17 true\n*finish\n*label 319\nYou leave your washbag on the side and clutch the will in your hand.\n\nAlex may want to make this new start as difficult as possible, but you have no interest. You're not going to just walk away from an opportunity like this.\n\nIt will be so much easier to pursue being a $(dream) if you have some money in the bank. And that's what's important.\n\nYou look out your window and see Alex dragging his suitcase away up the drive. Maybe the two of you are more different than you thought.\n\nYou turn away and go to find Christopher.\n*set end18 true\n*finish\n\n\n*label 17\n\nEvery moment you're not at work you find yourself with Rob. You're always welcome at his house and he's always thrilled to cook for you.\n*page_break\n*if (rob1=true)\n\t*goto edit5\n*else\n\t*goto edit6\n*label edit5\nOne evening together Anna has roped both of you into making cake by claiming a desire to learn to bake only to slope off to play at the difficult bits.\n\nRob is red in the face from mixing the batter by hand. You try to take it from him but he's determined to break his wrist with his furious mixing.\n\n\"Why don't you let me have a go?\" you ask, trying hard to laugh at his huffing and puffing.\n\n\"I'm trying to do something nice for you. I'm your boyfriend after all.\" Rob says simply, then he blushes, making himself go even redder, \"I mean I am aren't I?\" he asks, \"I guess we haven't talked about it but I thought...\" he trails off then adds quietly, \"that this was really serious.\"\n*choice\n\t#\"Of course it's serious. I'm crazy about you.\"\n\t\t\"Well...good.\" Rob says, trying and failing to hide his relief, \"I know I haven't taken on you on dates and stuff.\"\n\n\t\tYou shrug, prising the mixing bowl out of his hands, \"I think it works for us.\" you say smiling.\n\t\t*set rob %+5\n\t\t*goto 500\n\t#\"Let's not get ahead of ourselves.\"\n\t\t\"Oh,\" Rob turns a flaming red, \"I'm sorry, you're right I haven't taken you out or anything. I just thought you'd figure with, you know, Anna, I can't - but never mind. You're right, just me being silly.\" he tries to laugh it off. But he never tries to kiss you again and his invites to his house dry up.\n\n\t\tIt's clear he thought a lot more of you than you of him.\n\t\t*set rob %-10\n\t\t*set dumpr true\n\t\t*goto 500\n\t#\"How could I not love you?\"\n\t\t\"Oh...Thanks.\" Rob says lamely, his face turning a flaming red he lets silence fall between you for a few minutes while he mixes even more furiously.\n\n\t\t\"You know I love you too right?\" he blurts after a few minutes of silence, \"Like a lot.\" he adds lamely, \"Even though I'm kind of rubbish at showing you.\"\n\n\t\t\"It's fine,\" you say, grinning as Rob hands you the cake batter bowl to lick.\n\t\t*set rob %+10\n\t\t*goto 500\n*label edit6\n*label 500\n*page_break\nOn a particularly unextrordinary day you're just humming alone to yourself one morning, when you drop your toothpaste on the floor.\n\nBending to get it you see a loose tile at the back of the wall under the sink. You reach for it to try and push it back in place, but it comes away in your hand, revealing a hole in the wall with a mahogany box inside.\n\nCurious you pull it out and open it up.\n\nIt's a will. The late Mr Haywood's will. But it doesn't add up with what you know. Christopher owns the company, controls the assets. But the will leaves everything not to Christopher, but to his wife.\n\nA memory stirs in the back of your mind. Did Rob mention something along these lines to you before? You're sure he did.\n*choice\n\t#Take the will straight to Rob, he stands to gain a lot if he has it.\n\t\tYou find him following Rebecca around the hall as she admires the gardens. Rob's being used as a drink stand.\n\n\t\tKnowing Rebecca is involved you step forward and back again, not wanting to take the credit for Rob's find, wondering if you should wait till later.\n\n\t\tMercifully Rob looks over, you hold up the mahogany box and mouth away. Rob must be too far away to know what you're mouthing but he seems to get it from the excited jumping because he beckons your over. \n\t\t*set rob %+8\n\t\t*goto 5011\n\t#Take the will To Christopher, screw Rob, I stand a lot to gain if I can guarantee this will is gone.\n\t\tYou push Rob from your mind. Sure you're betraying him, but you have problems too. This money will go a long way to solving them all.\n\n\t\tYou make your way to Christopher's quarters, trying not to check guiltily over your shoulder the whole way.\n\n\t\tAfter all you've not promised Rob anything. You have to put yourself first, or you'll never get anywhere in this world.\n\t\t*set rob 1\n\t\t*set end19 true\n\t\t*finish\n\t#Take the will to Rebecca, it is hers after all.\n\t\tYou find Rob and Rebecca together at any rate. Rebecca gliding through the hallway admiring the flowers while Rob serves as a portable drink stand, following her around.\n\n\t\tEager to tell them both the good news you waste no time in stepping out into the open making them both jump.\n\t\t*set rob %+5\n\t\t*set reb %+20\n\t\t*goto 5011\n*label 5011\n\"What is this?\" Rebecca asks as you hold out the mahogany box to her, Rob bouncing on his toes beside you.\n\n\"I know you didn't come directly to me to help with your problem.\" you say delicately, not wanting to admit directly Rob told you everything, \"However I heard about your search and took it upon myself to help. I think you'll find what you're looking for in here.\"\n\nRebecca stares at you open mouthed, taking the mahogany box dumbly. She opens it up and her eyes fill up with happy tears.\n*page_break\n*goto 4241\n*label 20\nYou concentrate exclusively on tightening the security till the house itself seems to creak under the strain.\n\n*if (continuity=true)\n\tYou keep your eye on Rebecca. But, to your frustration, there doesn't seem to be anything unusual about her, nothing to suggest there might be something you're not seeing. Except for one thing, she spends a lot of time with Rob. Not anything overtly suspicious, but she doesn't seem to deal with any of the other servants. It's not a big thing of course, but it's worth noting.\n\n\tYou have a choice to make. You can raise your suspicions with your agency, and risk their scorn if your hunch is wrong, or you can keep quiet and just do your job.\n\t*choice\n\t\t#I let them know about my suspicions. I can't in good conscience not say anything.\n\t\t\t*goto 601\n\n\t\t#I don't let them know. I don't know anything, and have no way of proving anything.\n\t\t\tYou wouldn't want that kind of embarrassment.\n\t\t\t*goto 600\n\t\t#I don't let them know. I think she is involved somehow, but I don't want my contract to end, not yet.\n\t\t\tClever, you have a nice position here. It would be a shame for it to be over so soon.\n\t\t\t*goto 600\n\n*else\n\t*goto 600\n*label 601\n\nNot at all surprisingly your agency tell you they need a little more proof than your suspicions and a coincidence.\n\nIt seems you're going to need to do a little digging of your own. So how would you like to go about it?\n*choice\n\t*selectable_if ((alexsfavour=true)and(alexkidnap=false)) # Alex owes me a favour. I imagine he knows quite a bit about his own mother. I'll start there.\n\t\t\t*goto 602\n\t#I bet Rob knows a lot of servant gossip. I'll go to him.\n\t\t*if (rob>50)\n\t\t\tRob seems mildly surprised to see you. He's friendly enough, but wary of your sudden interest in him.\n\n\t\t\tHe chats amicably enough about himself. But the moment Rebecca comes up he goes suspiciously silent. You go for broke and ask him about all the time they've been spending together.\n\n\t\t\tInstead of encouraging, this seems to frighten him, and you can't get another word on the subject out. So there is definitely something there.\n\n\t\t\tBut not enough.\n\t\t\t*goto 600\n\t\t*else\n\t\t\tRob's openly suspicious of your sudden interest in him, and refuses to say anything to you past civil pleasantries, shuffling away the moment there is a lull in your conversation.\n\n\t\t\tYou can see you aren't going to get anywhere, you haven't made enough friends to call in favours.\n\t\t\t*goto 600\n\t#I think the best thing to do would be to get Emma to specifically monitor Rebecca. If we both watch her we're sure to see something.\n\t\tYou confide your suspicions in Emma. \n\t\t*if (career>70)\n\t\t\tDespite her scepticism she's learned to trust your judgement, so agrees to help you. Keeping an eye on Rebecca day and night.\n\n\t\t\tYou don't see anything to start with. But you're sure you will eventually.\n\t\t\t*goto 600\n\t\t*else\n\t\t\tUnfortunately Emma doesn't trust in your skills enough to believe such an unfounded hunch and refuses to help you.\n\n\t\t\tYou do your best to monitor Rebecca alone, but with you needing to be here, there and everywhere you go for hours without knowing where she is or what she's up to.\n\n\t\t\tIf there is anything unusual going on, you certainly aren't going to find out about it.\n\t\t\t*goto 600\n*label 602\nYou find Alex in his usual place in the library, pouring over another script.\n\nHe jumps when you tap him on the shoulder.\n\n\"Oh ${name}, I didn't see you there, sorry. What can I help you with?\"\n\nYou sit next to Alex trying not to look furtive, \"Remember you said you owed me a favour?\" \n\n\"Yes,\" Alex replies, serious now as he pushes the script to one side, \"What do you need?\"\n*page_break\n\"Nothing mad,\" you assure him, \"Just need to have a chat about someone.\"\n\n\"You sure you want to use your favour on this?\" Alex teases, his tone light now he's realized your favour is basically a non-effort on his part.\n\n\"Very sure,\" you smile, \"I just need to know everything there is to know about your mother.\"\n\nAlex raises his eyebrows, \"I would ask, but I suspect I don't want to know.\" he shrugs his shoulders, \"Sure. I don't know everything mind. And some of what I know is through rumour, so it might be wrong.\"\n\n\"Sure sure,\" you wave your hand for him to continue, sure you're onto something.\n*page_break\n\"I don't know the details of my mother and father's marriage arrangement, only that it wasn't a loving thing. It was very much arranged for whatever reason. When I was younger I heard rumours that when my mother came to the house she was beaten black and blue, and my father had rescued her. I heard another rumour that she threatened my father with...something. I heard those rumours so long ago, they're kind of twisted, and they all sound ridiculous.\"\n\n\"Anyway that's how Mother ended up in the house. I don't know anything about her before, except she took speech therapy for a long time after, to correct for some kind of speech impediment that annoyed my father. In my fanciful younger days I imagined she had a stutter from all the beatings she sustained in her previous life. But that bit is childish speculation.\"\n\n\"Myself and Mother have never been close, but she doted on Christopher, so on a personal level I know very little. As far as any other information goes I know two things: firstly, that her extended family, who I have never met, used to be sent large payments from my father, but that stopped a few years before his death and I don't know why. Secondly, and although this is only a rumour it is one that seems to have stuck among the servants, that she has another child, besides myself and Christopher.\"\n\n\"I hope that helps.\" Alex says, pulling his script back over with a shrug, \"That's everything I know.\"\n*page_break\nYou only get the chance to think about everything Alex said late in your room that night.\n\nWhat do you think?\n*choice\n\t#Pretty much everything I heard was rumours and here say, what a waste of a favour.\n\t\tYou sigh and turn over, putting Rebecca out of your mind.\n\n\t\tIt's a shame, you really thought you were onto something.\n\t\t*goto 600\n\t#Rumours are always born from something, I suspect there is something there.\n\t\t*goto 603\n*label 603\nThose would be some pretty extreme rumours to spring out of the ground.\n\nTrue your agency isn't going to listen to just rumours, but a little digging on your part through civil records could turn up some things contradicting what Rebecca's told the agency.\n\nYour agency won't question the rumours, but if they know Rebecca's been lying, they will at least help you look a bit further.\n*page_break\nYou spend the next few days calling various public offices in your off moments. And sure enough, you do uncover some things about Rebecca, although not everything you'd like. Public records, funnily enough, aren't for everyone.\n\nHowever, you do find out about her change of name, not just second for her marriage but her first name too. Although what it used to be you have no idea, as you're told those records aren't in the UK system. No, according to the man on the phone you'd need to contact the public records in Ireland.\n\nThat tells you enough in itself.\n\nYou also take the liberty of borrowing Rebecca's national insurance number to request her medical records. These are frustratingly slap-dash, but one thing that does stand out to you, is that Rebecca had a prescription for selective serotonin reuptake inhibitors. A quick google search reveals it as a drug for post-partum depression. And checking the dates you see it dates before Christopher's birth.\n\nYou can only conclude the rumours about there being another child are true.\n*page_break\nYou take your new found information to the agency.\n\nThey are incredibly surprised by what you've found. And it's enough for them to insist they take it off your hands. It seems Rebecca has been very dishonest with everyone.\n\nYou go back to your everyday run of the mill work and don't think about Rebecca again.\n\nUntil a week later, when she's arrested.\n*set end20 true\n*finish\n\n\n*label 600\n*page_break\nYou start to feel the months slip by. You're careful not to get lulled into a false sense of security.\n\nIt doesn't take long for your skills to be put to the test once again.\n*page_break\nIt's night when you are awoken by  what you think must be an earthquake.\n\nYou throw yourself to the floor. But the moment you're there, the floor stops shaking. The noise carries on though, a deafening grinding ripping through the night, chugging and belching.\n\nYou grab your radio, only to find static crackle.\n\nWhat are you going to do?\n*choice\n\t#Gather my staff. Alone we're all useless, we need to work as a team.\n\t\t*goto 604\n\t*selectable_if (chriskidnap=false) #Find Christopher, he's the man who signs my pay checks.\n\t\t*goto 606\n\t#Find the disturbance. No doubt that's where the kidnapper just was, he can't go far if I move fast.\n\t\t*goto 606\n*label 604\n*if (career>70)\n\tWithout radio communication it's going to be hard. You take a deep breath and wrack your brain. You feel so relieved that you're meticulous about everything, because you can see the staff rota in your mind's eye. If you're quick you can get round pretty much all the rooms and your office in less than a minute.\n\n\tYou jump to your feet and set off. Only sparing a thought to how surprisingly unsurprising it feels to be running off to catch a criminal in your PJs.\n\n\tYour quick thinking saves you, and you round up all your staff in half a minute. You take a few more seconds to assign them to your various charges. Your lips moving ahead of your own brain, you know your job's protocol so well.\n\t\n\tThat done, you set off for whatever that disturbing noise is still filling the air. With all your charges safe, you need to see if you can finally catch who is responsible.\n\t*goto 606\n*else\n\tWithout radio communication you're lost. You can't seem to think of anything with that grinding growl ripping through the air. You bang the wall in frustration and run to the office in the hopes you'll be met.\n\n\tNo such luck, there are only three staff there. You can only assume they've run off to try and follow their own, unclear procedures. If only you'd been more prepared.\n\n\tYou waste precious minutes ordering your few staff to try and get the communications back up. They keep asking questions you don't know how to answer.\n\n\tIn the end you throw your hands in the air and leave to go and stop that infernal sound that's still ripping through the air.\n\t*goto 606\n\n*label 606\n\nYou set off at a run, you can hear the sound getting closer and closer. It sounds like an engine.\n\nYou run around a corner and stop dead. A truck is sticking out of the wall, its wheels spinning furiously. The smell of burning rubber fills your nose and the noise is almost deafening.\n*page_break\nThis is your downfall, you don't hear someone creeping up behind you. It's only when they latch onto your back that you know.\n\nBut their arm is already around your neck, pressing on your carotid artery. You know a sleeper hold well enough.\n\nYou have 30 seconds, tops, to get out of this before your body gives up. Think, what do you need to do?\n*choice\n\t#The best way to get out of anything is do what is least expected. He thinks I'm going to try and pull, so I push.\n\t\t*if (career>70)\n\t\t\tIn a practiced twist you know better than your own mother you fight your instincts and stop pulling against your assailant, instead you push the arm on your throat up towards the ceiling, jarring the attacker's joint, and loosening the hold on your neck.\n\t\t\t*goto 607\n\t\t*else\n\t\t\tBut this is not only unexpected it's unnatural. And despite your brain knowing what to do, your body can't stop flailing uselessly.\n\n\t\t\tYou can only think, as your vision wanes, if only you had trained a bit more.\n\t\t\t*goto 608\n\t#Go for the eyes.\n\t\tYou scrabble at your assailant's arm. But he holds you too tight, your arms aren't long enough to reach the face and do some damage. You can see your vision going black and you scrabble more in your panic.\n\t\t*goto 608\n\t#Stamp on the feet.\n\t\t*if (career>80)\n\t\t\tIt's hard to make your legs move in the way you want when your body wants to flail in desperation. But you get a hold of yourself, take all your power and stamp. You hear a crack and your attacker's hold loosens as he moans in pain.\n\t\t\t*goto 607\n\t\t*else\n\t\t\tBut it's an unnatural move. And you haven't honed your skills, trained your body enough to know what to do under pressure. Your mind knows, but it's like you and your body aren't one and you can feel your vision going.\n\t\t\t*goto 608\n\n*label 607\nThe attacker grunts and loosens his hold enough for you to pull yourself away.\n\nNot wasting a second you turn and crack him in the temple with your elbow. He drops like a log.\n\nYou heft him over your shoulder and make back for the office. You need to phone the police, it's finally over.\n*set end21 true\n*finish\n*label 608\n*if ((alexsfavour=true)and(alexkidnap=false))\n\tYou hit the floor hard. You feel a wave of sickness overcome you as the blood rushes back to your head.\n\n\tYou look up to see Alex standing over your unconscious assailant holding half a shattered chair.\n\n\tHe looks at it in alarm, like he's only just realized he's holding it, and drops it. He rushes over to you and helps you put your head between your legs.\n\n\t\"You're lucky I feel like I owe you,\" he grumbles as you regain your faculties.\n\n\t\"Whatever,\" you say, as the enormity of the whole thing washes over you, \"It all turned out fine, I'm not about to quibble ifs and buts.\"\n\t*set end23 true\n\t*finish\n*else\n\tYou feel your world slide into blackness. You had so much more you needed to do, but your time is over. You realize as you fall into unconsciousness, that you'll never get an opportunity like this again, this was your last chance. It's over now.\n\t*set end22 true\n\t*finish\n", "protect6": "*if (end1=true)\n\t*goto 1\n*elseif (end2=true)\n\t*goto 2\n*elseif (end3=true)\n\t*goto 3\n*elseif (end4=true)\n\t*goto 4\n*elseif (end5=true)\n\t*goto 5\n*elseif (end7=true)\n\t*goto 7\n*elseif (end8=true)\n\t*goto 8\n*elseif (end9=true)\n\t*goto 9\n*elseif (end10=true)\n\t*goto 10\n*elseif (end11=true)\n\t*goto 11\n*elseif (end12=true)\n\t*goto 12\n*elseif (end13=true)\n\t*goto 13\n*elseif (end14=true)\n\t*goto 14\n*elseif (end15=true)\n\t*goto 15\n*elseif (end16=true)\n\t*goto 16\n*elseif (end17=true)\n\t*goto 17\n*elseif (end18=true)\n\t*goto 18\n*elseif (end19=true)\n\t*goto 19\n*elseif (end20=true)\n\t*goto 20\n*elseif (end21=true)\n\t*goto 21\n*elseif (end22=true)\n\t*goto 22\n*elseif (end23=true)\n\t*goto 23\n\n*label 1\n*if (alexkidnap=true)\n\tIt is odd that the moment Christopher spreads word of his intention to completely seperate from his mother, Alex turns up again, relatively unharmed from his experience, and refusing to talk about it.\n\n\tChristopher never follows up the whys and wherefores of the whole affair, so you put your curiosity to bed. That mystery, it seems, is not for you. \n\t*goto 101\n*elseif (opalkidnap=true)\n\tIt is odd that the moment Christopher spreads word of his intention to completely seperate from his mother, Opal turns up again, relatively unharmed from her experience, and refusing to talk about it.\n\n\tChristopher never follows up the whys and wherefores of the whole affair, so you put your curiosity to bed. That mystery, it seems, is not for you. \n\t*goto 101\n*else\n\t*goto 101\n*label 101\n*page_break\nChristopher becomes a different man, with the worry off the will of his chest. He spoils you more than ever, shunning Opal completely, ignoring his mother's protests.\n\nYou suspect he has words with both of them, as they both leave soon after, their heads held suspiciously high, like they're trying to be too proud.\n\nYou hear through the grapevine that Opal becomes disowned by her father, and Rebecca fades off the social scene altogether, apparently having found another son from a previous relationship. You hope she doesn't put the new lad through as much pain as she did Christopher.\n\nHe lets Alex stay as the months slip by, and it becomes clear whatever threat there was has vanished.\n\nThe brothers part on cold but civil terms.\n*page_break\nChristopher annuls his contract with your agency, but insists you stay to live with him.\n\nYou don't see the need to get back in contact with the agency, you're sure they don't want to. And you don't need them, living your life with Christopher.\n\nFocusing on nothing but what makes the two of you happiest, always together.\n*goto 50\n\n*label 2\nChristopher burns the will on the way to the town hall. When you both arrive he pulls you out. He pushes a £50 note into the hand of a passerby and drags you both inside the church.\n\nYou're married within the hour.\n*page_break\nAfter that he stops at a ring shop, buying you both a gold band.\n\n\"Happy?\" he asks, shoving it on your finger with such vehemence that skin comes off your finger.\n\n\"Are you?\" You ask, tilting your head to the side.\n\n\"I suppose.\" he says, meeting your gaze, \"I just thought we had more than this.\" he twists the ring on your finger, \"But I suppose this mutual understanding will work just as well.\"\n*page_break\n*if (alexkidnap=true)\n\tIt is odd that the moment Christopher spreads word of his intention to completely seperate from his mother, Alex turns up again, relatively unharmed from his experience, and refusing to talk about it.\n\n\tChristopher never follows up the whys and wherefores of the whole affair, so you put your curiosity to bed. That mystery, it seems, is not for you. \n\t*goto 102\n*elseif (opalkidnap=true)\n\tIt is odd that the moment Christopher spreads word of his intention to completely seperate from his mother, Opal turns up again, relatively unharmed from her experience, and refusing to talk about it.\n\n\tChristopher never follows up the whys and wherefores of the whole affair, so you put your curiosity to bed. That mystery, it seems, is not for you. \n\t*goto 102\n*else\n\t*goto 102\n*label 102\n*page_break\nOpal leaves the moment your wedding is announced. She holds her head high, but gossip a few months later tells you she's been disowned, and is subsequently missing.\n\nYou don't spare much more thought for her.\n*page_break\nAny issue your agency might have had with you marrying a client is quickly forgotten when Christopher hires another of their senior staff for double the price.\n\nAs his wife, now it's you being looked after, followed from place to place by the people you used to work with. It takes a lot of getting used to.\n*page_break\nHowever as the months wear by, it becomes clear the threat has passed. Alex disappears and Rebecca leaves soon after, having become a drawn and worried looking old woman in the space of a few months.\n\nEventually it's just you and Christopher in the house. Your 'understanding' works well enough. You have everything you could ever want. And Christopher doesn't dare get rid of you, knowing he'd have to auction his company to pay for such an expensive divorce.\n\nYou suspect Christopher finds love elsewhere as he becomes scarcer and scarcer, but this works fine, as you enjoy the company of another.\n\nAll in all, you haven't done badly for yourself.\n*goto 50\n*label 3\nThings go more smoothly than you could have ever expected.\n\nWith the will secure it's a simple matter for Rebecca to claim the assets back in her name. She offers Christopher a job on the senior staff, but he simply says 'Oh you'd love that wouldn't you?' and spits at her feet. He leaves the house soon after, slipping away without a word to anyone.\n\nEspecially not to you. For his final days in the house he can barely be in the same room as you, let alone meet your eye, affecting the demeanour of a wounded puppy.\n\nYou don't see him again after he leaves, nor do the rest of his family. You never even hear about what he's up to through the grapevine. For all intents and purposes he vanishes.\n*page_break\n*if (alexkidnap=true)\n\tIt is odd that the moment Rebecca spreads word of her intention to completely seperate from her son, Alex turns up again, relatively unharmed from his experience, and refusing to talk about it.\n\n\tRebecca never follows up the whys and wherefores of the whole affair, so you put your curiosity to bed. That mystery, it seems, is not for you. \n\t*goto 103\n*elseif (opalkidnap=true)\n\tIt is odd that the moment Rebecca spreads word of her intention to completely seperate from her son, Opal turns up again, relatively unharmed from her experience, and refusing to talk about it.\n\n\tRebecca never follows up the whys and wherefores of the whole affair, so you put your curiosity to bed. That mystery, it seems, is not for you. \n\t*goto 103\n*else\n\t*goto 103\n*label 103\n*page_break\nOpal departs soon after. She's courteous to Rebecca for her invite, but insists she must get back to her father, saying that without Christopher there is no need for her to stay. You can only think that without Christopher having the money there is no need for her to stay.\n\nAlex too, disappears in the night. You never hear his story, although Rebecca sobs for days after his departure.\n\nYourself and Rob are on cordial terms after ending on the same side. He gives you a brief hug after he leaves his last day at work, apparently with the intention to be a stay at home dad. You wish him luck, and he does you.\n*page_break\nRebecca terminates the contract with your security agency the moment she has the right to.\n\nYou try to protest, knowing you're going to struggle to find another job with the reputation you've made for yourself. But Rebecca stays tight lipped about the whole affair, only assuring you that she knows there will be no more issues with kidnappings. She refuses to tell you how she may or may not know that for a fact.\n\nNot to your suprise at all, your agency terminates your contract with them with no reference. While they don't say anything, they make it pretty clear they think you've disgraced their company name.\n*page_break\nThis matters less when Rebecca sells all her assets. 50% for her, 35% for Rob, who apparently was employed by her the whole time. And the final percentage for you.\n\nSeveral million pounds. Not having a job seems much less consequential now.\n\nYou can't help but think, as you look back on the months spent with the Haywoods, that you may have betrayed Christopher's trust, you may have failed at any kind of security, but regardless you've done pretty well for yourself.\n*goto 50\n\n*label 4\n*label 7\nYou leave with your tail between your legs. Your staff follow you a few days later at their dismissal.\n\nYou don't even try to contact your agency, but they contact you, leaving ranting and raving answering messages. Very unprofessional. But then I guess you were the one who started it.\n\nThey refuse to pay you your last set of wages. You visit a Legal Aid office to see what they can do, but after explaining the circumstances the lawyer struggles not to laugh in your face. You haven't a leg to stand on.\n*page_break\nSo you leave the security industry unceremoniously with no money and no reference.\n\nYou even try to get back in contact with Rebecca but you can't get near her, and you're told she's busy, liquidating the assets of all things.\n\nYou don't see any of the others again. You don't even hear their names except for the times you care to glance at the Financial Times.\n*if (end7=true)\n\n\tAll you can do now is try and hold your head high and move on.\n\n\tBut on lonely nights in your new flat, when you're kept awake by the screaming toddler on the floor below you, you can't help but curl up, and wonder how things might have been different.\n\t*goto 50\n*else\n\t*goto three\n*label three\n*page_break\nYou do get one suprise visitor.\n\nYou're packing up your house. Most of your furniture is going to have to go, you have to move to a much smaller place. Suddenly there is a banging on the door, you open it to find Christopher.\n*if (chris>60)\n\t*goto one\n*else\n\t*goto two\n*label one\n\nThere are tears running down his face. His suit is truly ruined, stained and creased. He looks likes he hasn't sle o the prison system.\n\nYou put the newspaper down on your kitchen table. It's so weird being able to read inbetween the lines with all the intimate details you know. You shrug and pick yourself up. It's the first day of your new contract.\n\nYou can only hope it won't be as messy as the last one.\n*goto 50\n*label 10\nYour quick thinking turns out to be your saving grace. Opal's parole is paid pretty much immediately. But it's already too late for her. The only person she could have pinned the whole crime on was, well, you. And you get to work immediately making your case.\n\nAnd no amount of Opal's money can make the police forget you were the one to report the crime.\n\nOpal tries to put up a good defence, but, with your help and testimonies, there is a very strong case against her, and she finds herself with a very heavy sentence.\n\nThe last time you see her, she's being pulled away from you, spitting and snarling about betrayal, looking more like a feral beast than herself.\n*page_break\nYou may have given up your claim on any of Opal's assets when you turned her in.\n\nHowever Rebecca has a suprise for you, when all the messy court business is out the way, she takes you aside and and promises you a large amount of money.\n\nShe makes it plain she has every intention to auction off her assets and, as a thank you, she intends to give you 10% of the Haywood fortune.\n\nShe laughs at the suprise on your face, and thanks you sincerely for everything you've done.\n*page_break\nOf course, your contract terminates.\n*if (career>70)\n\tYour agency, impressed with your handling of all your work, immediately offers you another job.\n\t*goto seven\n*else\n\tYour agency, although skeptical about your previous work, are very impressed by the way you handled Opal, and so immediately offer you another job.\n\t*goto seven\n*label seven\n\nWhich you immediately turn down.\n\nYour bank account is looking deliciously full right now, and it seems about the right time to take a ho l it would work. He does his best to hide it, but the rejection damages your friendship into an awkward nothingness that you can't save, no matter what you try.\n\n\tYou make sure Rob and Anna are well set up in their house with their half of the money to keep them comfortable.\n\n\tThen it's time to decide what you want to do.\n\n\tYou think maybe a holiday first. You have all the time in the world to sit and think.\n\t*goto 50\n*else\n\tYou're not sure who decided it when, but you find yourself roommates. It just makes so much sense.\n\n\tRob buys a modest semi-detached house for himself and Anna, and rents you a room. Not that you can see a time when you'd move away from your friend.\n\n\tRob is the happiest he's ever been. Not having to work, he stays home to look after Anna.\n\n\tThe moment things have calmed down, you all take a holiday together. Anna's first ever holiday, and a nice opportunity for you to think what you want to do next.\n\n\tAlthough it's hard to think ahead when you're so relaxed.\n\t*goto 50\n*label 15\nRob blinks over you as you come to in hospital.\n\nYou're fine, don't worry, just need some healing time.\n\nRob tells you everything that's been going on, from Christopher losing it and being escorted out by your staff, to Rebecca's efforts to get all her assets in order as quickly as possible.\n\n\"And then she'll sell them off, then we're all all sorted.\" Rob finishes excitedly, then he blushes and rubs the back of his neck, \"I just want to thank you. I've always been nervous around you because of what you do. You've made me realize even more than that how amazing you are. Thank you for - you know.\" Rob gestures at your bandages.\n\n\"Anytime,\" you say, smiling at him, trying not to blush yourself.\n*page_break\nRebecca doesn't take long to reign in all Christopher's old projects, and organise the business appropriately.\n*goto twenty\n\n\n\n*label 16\nYou never hear what happened between Christopher and Rebecca. Or with the kidnapper to move to a bigger, better apartment with less damp. However Alex, suspiciously quiet for the first few weeks of you living together, refuses.\n\nYou let the idea go, but soon your arguments begin to start. It seems you were not the person Alex thought. Nor is he the person you thought.\n*page_break\n*if (alex1=true)\n\tYour break-up is messy. Alex cries, you cry. But in the end you have to concede, you're just too different. Alex admits he can't forgive you for getting involved with his back-stabbing blood relatives, and you part ways.\n\n\tYou move the final box into your own place, modest but beautiful and sit, resting your feet on it. Now you don't have someone judging your every move, you're free to live the life you want.\n\n\tBliss.\n\t*goto 50\n*else\n\tYou throw your hands in the air and give up. You don't see his problem with a little step up. You decide to live alone and are a lot happier for it.\n\n\tYou move the final box into your own place, modest but beautiful and sit, resting your feet on it. Now you don't have someone judging your every move, you're free to live the life you want.\n\n\tBliss.\n\t*goto 50\n*label 18\nYou don't see Alex again. Although you do get a letter from him.\n*if (alex1=true)\n\tA mixture of angry accusation and melancholy regret for your lost love.\n\t*goto twentythree1\n*else\n\tA mixture of angry accusation and melancholy regret for your lost friendship.\n\t*goto twentythree1\n*label twentythree1\n\nYou toss it in the bin. Yes, you have all the time in the world now, you're completely provided for in every way. But even you don't have time for any more of Alex's self-righteous rubbish.\n\nYou sigh and stretch, and wonder, out of all the things you could do today, which one you should choose.\n*goto 50\n*label 19\nYou don't see Rob again. Although you do get a letter from him.\n*if (rob1=true)\n\tA mixture of angry accusation and melancholy regret for your lost love.\n\t*goto twentythree\n*else\n\tA mixture of angry accusation and melancholy regret for your lost friendship.\n\t*goto twentythree\n*label twentythree\n\nYou toss it in the bin. Yes, you have all the time in the world now, you're completely provided for in every way. But even you don't have time for any more of Rob's complaining, banging on about his sister, like she's the only person in the world you might concern yourself with.\n\nYou sigh and stretch, and wonder, out of all the things you could do today, which one you should choose.\n*goto 50\n*label 20\nEverything is in chaos for a few days. Such a close and personal scandal to a man like Christopher is a subject of great interest to the media and you find yourself interviewed and butted around.\n\nYour job doesn't get any easier despite the incarceration of the kindapper. Now you're simply protecting Christopher from overly zealous news crews.\n\nYou count yourself lucky that your involvement in the whole thing has been kept well under wraps.\n*page_break\nWhen you extract the whole story from your agency, you find out that it was true, Rebecca did have another son, responsible for everything you've been put through so far.\n\nOnce you provided the lead it was easy enough to make the necessary connections.\n\nYou escort Christopher to the trial and watch Rebecca plead not guilty. She seems so confused you have to wonder if maybe she isn't. You notice her main crime seems to be association, but it's out of your hands now.\n*page_break\nYou do very well out the whole thing. For going above and beyond your contract you recieve a massive bonus, not only from your agency but from Christopher as well for 'getting rid of the insipid cow'.\n\nAfter the news groups grow tired of the story, your contract with Christopher terminates, but you're offered another job pretty much immediately.\n\nYou umm and ahh about taking it, because you think it's about time you took a little time to yourself. Work will be there when you get back, you're in demand now.\n\nYou can only smile to yourself. For you, everything's turned out pretty well.\n*goto 50\n*label 21\nEverything is in chaos for a few days.\n\n*if (alexkidnap=true)\n\tAlex is found quickly, not much the worse for wear for his experience.\n\n\tYou never find out why the kidnapper did what he did. He keeps tight lipped about it all. There seems to be no motive. But all's well that ends well, and you soon forget about the mystery.\n\n\tAt any rate, in the light of your current success, your agency seems to forget about your previous failings.\n\t*goto 108\n*elseif (opalkidnap=true)\n\tOpal is found quickly, not much the worse for wear for her experience.\n\n\tYou never find out why the kidnapper did what he did. He keeps tight lipped about it all. There seems to be no motive. But all's well that ends well, and you soon forget about the mystery.\n\n\tAt any rate, in the light of your current success, your agency seems to forget about your previous failings.\n\t*goto 108\n*elseif (chriskidnap=true)\n\tChristopher is found quickly, not much the worse for wear for his experience.\n\n\tYou never find out why the kidnapper did what he did. He keeps tight lipped about it all. There seems to be no motive. But all's well that ends well, and you soon forget about the mystery.\n\n\tAt any rate, in the light of your current success, your agency seems to forget about your previous failings.\n\t*goto 108\n*else\n\t*goto 108\n*label 108\n*page_break\nAfter that so much happens, and you are in a whirl of success. Your current contract is obviously over, but Christopher offers you a huge final bonus for your wonderful work.\n\nYou and your staff pack up and move out the house, slapping each other on the back. They're all clamouring to work with you again, all on a success high.\n\nYou smile to yourself. You might work with them again, but maybe some time off first, bask in your success a bit. After all the agency has been kind enough to let you know that any job you want in the future is yours.\n\nThere is no
