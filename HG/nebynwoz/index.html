<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NE By NW Oz — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "nebynwoz", "title": "NE By NW Oz", "scenes": {"choicescript_description": "Become a village junk collector with high, magic ambitions to rule in Northwest or Northeast Oz. Multiple cases of mistaken identity involve everybody in Oz from the original L. Frank Baum Oz characters to even yourself. You will be thrust into intrigue and suspense at every turn as you try to replace the dead Wicked Witch of the West and Wicked Witch of the East.\n\n[i]NE By NW Oz[/i] is a 30,000 word interactive novel by Ron Baxley, Jr., where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "*bug Stats page should not be visible.", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2018-05-08 $2.99 $1.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "rest_of_game": "*label WinkieCountry\n\n*page_break\n\n[i]Chapter 4 The Fates Motel[/i]\n\nYou have traveled down the Winkie Trail to the Winkie Country. You are at a recently built motel with and office and nine small cabins lined up side by side by it. An Edwardian \n(not Victorian) grey  mansion with black trim sits atop a hill with steps leading to it, and the Edwardian mansion has a tower built into that resembles one of the ones in the \nWicked Witch of the West's castle. You heard that one of the Royal Historians of Oz who Princess Ozma wrote to via magic telegraph once lived in a house in this style. He never\nwould have made his look this ominous, though. \n\nYou are feeling a little tired after your long journey and wonder whether or not to stop. You look at the Edwardian mansion with its wicked witch tower and shiver. The cabins \nlook cosy enough, though, like little version of the homes in your village yet sepia-colored. They are decorated with flowerboxes outside with yellow Winkie flowers, and there \nis lots of greenery around them. Even the grass that surrounds the hotel and house above is jaundiced or yellowy. A small swamp gurgles not far behind the hotel. Occasionally,\na breeze blows over the swamp, and the most foul odor enters your nostrils, presumably from the stagnant water and soil there. You do not like the stark magical neon sign which \nreads, \"Fates Hotel.\" A more cosy setting is some miles down with barns and the Scarecrow's corn castle, but the villagers have told you, again, that he has gone on a journey. \nYou are exhausted from many miles of travel on foot. It is started to get late, and you frankly feel like stopping at the hotel, the first sign of civilization since the \nEmerald City many miles back.\n\nA Winkie guard, still dressed in his Winkie guard yellow, fluffy hat and coat and carrying a big yellow umbrella, yells out to you from his office to come on it and steps back \ninto it. Before he steps back into it, you notice that he is smoking a thin cigar. He smiles a lot, yet something about him and his nervous laughter makes you uneasy.\n\n*choice\n #Go into the office and get a room to stay for the night. \n  The Winkie Guard smirks at you under his big hat and gives you a pad to fill out your information on. You pay him some loose change for the room. The Winkie Guard offers to\n  escort you to your room with his trusty umbrella because it has started to rain. You tell him you will be okay. \n  *goto hotelroom\n #Go up to the Edwardian creepy house on the hill with the witch tower.\n  You climb the stairs to the mansion on the hill, looking behind you to see you are not being followed. You feel incredibly dizzy as you climb the steps up the steep hill. \n  Heights have always done this to you. As you climb the steps, you cannot help but feeling like eyes are watching you from the side window of the Fates Hotel office below. \n  You enter the front door, surrounded by crown molding, which is unlocked. You climb the winding stairs to the tower room and see a chair with the Wicked Witch of the West's \n  clothes placed on it as if she were sitting there. Creeped out, you get out of the house quickly and go back down the hillstop steps to the hotel.\n  *set sawwitchcostume 1\n  *page_break  \n  *goto WinkieCountry\n #Go to the swamp \n  You see part of a wagon sticking up from the swamp. The wagon is a deep red and has traveled through all the way from the Quadling Country. It looks like somebody tried to \n  sink the wagon into the swamp on purpose. You shudder. You decide to go back to the hotel and figure out what to do from there.\n  *page_break\n  *goto WinkieCountry\n #Kill the Winkie Guard\n  *set wickedpoints+100\n  You suspect something about the Winkie Guard, go with your instincts, and walk into his office and zap him with your magic. He hits the ground, presumably dead, and you \n  leave the motel and go on back down to the Winkie Trail.  \n  *goto WinkieCountry2\n #Continue down the Winkie Trail, deciding not to kill the Winkie Guard. \n  *set goodpoints+100\n  *goto WinkieCountry2\n\n\n*label hotelroom\n\nYou are in a hotel room with a painting of the former Wicked Witch of the West on the west wall with something strange about the dark eyes. A small bathroom extends from the \nmain room with a nondescript white tub with a transluscent shower curtain on metal rings, toilet, sink, and tile. A comfortable bed with clean linens and nice pillows sits \nin the middle of the room. You seem to remember the Winkie Guard owner muttering something about changing out the sheets only as a formality. He mentioned in passing that \nno one hardly ever stops at the hotel any more. He had said, \"We follow the formalities.\" Yet you did not see anybody else helping manage the property, though he did state \n\"We.\" As you are bleary-eyed and dirty from your journey, you do not give this additional thought. The bed and the shower look good to you. \n \nYou have several choices in the hotel room:\n*choice\n\n #Take a shower in the bathroom to get rid of the dust of the long journey.\n  *goto shower  \n \n  *label shower\n  *if sawwitchcostume=1\n   *if sawwitchpainting=1\n    *gosub sawall\n    *label sawall \n    At first, you start to take off the silver slippers and decide to hide them under a pile of motel towels. You also start stripping down for the shower in general. \n    However, thinking back to seeing the witch clothing in the creepy house and the eye holes in the witch painting, you decide not to take a shower. You think back \n    to other things you may have seen. It's just too creepy here.\n    *goto hotelroom\n   *else\n   *page_break\n   As you take your shower, you realize you forgot to lock the door to the bathroom and left the door open. Suddenly, a shadow of what appears to be the Wicked Witch of the \n   West donning a conical hat appears. She slashes through your shower curtain with a butcher knife. As her hand goes through the water, one of your last thoughts is that \n   she could not be the Wicked Witch of the West or any wicked witch as the shower water is not melting her. You are not an ancient witch or wizard, so water does not affect \n   you;your flesh is not almost dust. However, it is penetrable to the butcherknife that is hacking through the shower curtain. Your very last thought as you see the face of \n   your attacker is it is the Winkie Guard hotel owner dressed in the clothes his late master, the Wicked Witch of the West, left behind when she died. The stabbing does you \n   in as you fall to the tub, dead. Thankfully, the incognito Winkie Guard did not see your silver slippers where you hid them under a pile of towels while showering. \n    \n   Someone, through the magic of the silver slippers, who they command but for a moment,  allows you to retrace your ill-placed steps and try again (It must be very\n   strong magic indeed, for usually only the wearer of the silver slippers can command them, and this person is affected space and time through commanding them, magic \n   you probably could not handle even with more experience)...\n   *page_break\n   *goto hotelroom\n   *goto ending\n  *goto ending\n \n #Lock the door, baricade it, and sleep.\n  *page_break\n  You lock the door, baricade it with a chair, and sleep on the comfortable bed. You realize it is a water bed, but water does not affect you. You wake up refreshed and ready\n  to continue your journey. You step outside. \n  *goto WinkieCountry\n #Examine the painting of the Wicked Witch of the West.\n  The dark eyes are actually holes. You lift the painting up and see two small peep holes within the wall. The Winkie Guard, from his office, can spy on whomever is in this \n  room! \n  *set sawwitchpainting 1\n  *goto hotelroom\n #Leave the hotel room \n  *goto WinkieCountry\n\n*label WinkieCountry2\n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints}\n\n*page_break\n\n[i]Chapter 5 Heading to Northwest Oz[/i]\n\n\nYou make your way further down the Winkie Trail to the Scarecrow's Corn Castle. The castle looks like a giant ear of corn. It is surrounded by the signature yellow \ngrass of the Winkie region along with some yellow plants and shrubbery. The corn castle has gigantic kernels with occasional kernels missing for windows.  \n\nThe Scarecrow is not in but is visiting the Good Witch of the North as you have been told many times by villagers during your journey here. Surrounding his corn castle are \nmany corn fields which you walk through. One crow attendant has been left behind and is following you. He squawks, \"Nevermore... nevermore... nevermore will the faux witch \nrule!\" He then flies away out east never to be seen in Winkie Country again.\n\nYou walk along the rows, trying not to get lost and trying to get back to the Winkie Trail. \n\n*page_break \n\n*image witch.jpg\n\nSuddenly, you hear a cackling from the sky above the cornfield. What appears to be a witch and perhaps even the Wicked Witch of the West pursues you on a broomstick, smoke \ncoming from behind it as if it were a cropduster. You thought she was dead! She was melted with water. How could this be?! The witch or person riding the broom is wearing a \nblack conicalhat and black clothing and does a pretty convincing cackle. The person grows closer and closer.\n\nThe crow attendant flies away toward the Munchkin Country, and you are left alone.\n\n\n\n*if sawwitchcostume=1\n *if sawwitchpainting=1 \n  You suspect this has something to do with the witch clothing you saw back at the Fates Hotel and the Winkie Guard.\n\nDo you: \n\n*choice\n\n #Zap the witch out of the sky with magic?\n  *set wickedpoints+100 \n  The witch crashes out of the sky and into the cornfield, and you run down to the Winkie Trail. \n  *goto WinkieCountry3\n #Run for your life through the rows of the cornfield but do not harm the witch?\n  *set goodpoints+100\n  You run for your life through the cornfield with the witch or whoever it is chasing you down. The wicked witch cannot keep up the pace and runs out of magic power for her \n  broom and crashes it into a nearby wagon. You quickly make your way back to the Winkie Trail and continue your journey, leaving the stalker seemingly behind. \n  *goto WinkieCountry3\n #Run to the Scarecrow's Corn Castle door and knock on his door. \n  Didn't you pay attention to the villagers and what they said about his not being in? How about when you remembered when you first came? Are you getting to be that \n  forgetful? The Scarecrow is not in. You knock and knock and cannot get anybody to the door. A hollow sound echoes through the corn castle chamber. Suddenly, you hear a \n  cackling getting closer and closer. You are at a bit of a deadend with having the corn castle right in front of you. The person on the broomstick snatches you up and that \n  is the last you are heard from again.   \n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}\n  \n  Someone, through the magic of the silver slippers, who they command but for a moment,  allows you to retrace your ill-placed steps and try again (It must be very\n  strong magic indeed, for usually only the wearer of the silver slippers can command them, and this person is affected space and time through commanding them, magic \n  you probably could not handle even with more experience)...\n  *page_break\n  *goto WinkieCountry2\n  *goto ending\n\n*label WinkieCountry3\n\n*page_break\n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints}\n\n[i]Chapter 6 Northwest by Northeast Oz[/i]\n\nYou make your way down the Winkie Trail through a forest with trees filled with leaves that are golden in color. \n\n*image MOUNTRUSHEDMORE.JPG\n\nYou see a small mountain there with carvings of the Famous Four, Dorothy, Scarecrow, Tin Woodman, and the Cowardly Lion within it. This is Mount RushedFour. The alleged heroes certainly were rushed in their journey. \nFirst, they were rushed to the Wizard. Then, they were rushed to the Wicked Witch of the West. Sure, they slowed down to smell the poppies... perhaps a little too much. But their rushed journey of intelligence, heart, \nbravery, and longing for home seemed to touch many of the residents of Oz. Tributes like this could now be found throughout the country. It is fitting that the tribute of Mount RushedFour is on \nthis particular mountain because it is the mountain that the former Wicked Witch of the West's castle sits upon. Also, though the Wicked Witch of the West always called \nherself that and was referred to herself as that, you note from a compass that you are carrying that her castle is actually located more in the Northwest of Oz. If you take \nover her castle as a magic user, you want to be ${name} the ${magicgender} of the Northwest. Whether you decide finally to lean more toward wickedness or good as a magic \nuser remains to be seen. Perhaps you will be known throughout the entire country by your title just as your predecessor was.   \n\n*if wickedpoints>goodpoints\n The do-goodery of the Famous Four of Mount RushedFour at this point in your journey makes you sick because of your wickedness.\n *goto climbupmountain \n *goto ending\n*else\n You admire the good they did on their journey because you are more good than wicked. \n *goto climbupmountain\n *goto ending\n\n*label climbupmountain\n \n*page_break\n\nYou decide to climb up the mountain. You have to head a little northeast at times to head back northwest on the craggy, zig-zagged mountain paths. You get a little winded and very \ndizzy. From the shadows, you feel as if someone is watching you struggle up the mountain trail. Suddenly, a cloaked figure grabs you and places a bottle of courage and forces it \ndown your throat. (People once called alcohol bottles of courage.) The cloaked figure tries to pull off your silver slippers, but his fingers bend back slightly as if by magic. The figure retreats and yells, \"Eeee-eee!\" in a male voice.\n\nYou are forced by him into a nearby child's wagon, a red wagon not to be confused with the Red Wagon that the Sawhorse carries Princess Ozma in. This one is truly a \nchild's toy and is labeled, \"Telegraph Nonflier Red Wagon\" in golden letters. Crammed into it by your mystery assailant, you are pushed down the craggy trail of the mountain. \nYou are completely woozy and see doubles and triples of the trail in front of you. You can see behind you, though, that the cloaked figure is staring at you to make sure that you  \nreach your demise.\n\n*if sawwitchcostume=1\n *if sawwitchpainting=1\n  You suspect, though you can only see a hazy version of the cloaked figure, that this could be the Winkie Guard from the Fates Hotel in disguise.\n  *goto mountainchoice\n  *goto ending\n\n*label mountainchoice\n\nDo you: \n\n*choice\n #Try to steer the wagon properly down the craggy mountain trail?\n  You somehow manage to steer the wagon properly down the craggy mountain trail. However, you suspect that the figure watching you will not be satisfied until he or she knows you\n  are dead. You decide to do your best to sneak past the dark figure up to the witch's castle atop the mountain. \n  *goto witchscastle \n #Jump out of the wagon to the rocky trail from the fast moving wagon?\n  You break an arm and a leg. The last thing you remember is the cloaked figure putting you out of your misery with a butcher knife. \n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}\n  \n  Someone, through the magic of the silver slippers, who they command but for a moment,  allows you to retrace your ill-placed steps and try again (It must be very\n  strong magic indeed, for usually only the wearer of the silver slippers can command them, and this person is affected space and time through commanding them, magic \n  you probably could not handle even with more experience)...\n  *page_break\n  *goto mountainchoice\n  *goto ending\n #Try to steer the wagon properly down the craggy mountain trail but jump out at the very bottom of the trail?\n  You in your worst bleary-eyed fashion steer the Telegraph Nonflyer Red Wagon down the craggy mountain trail. At the very moment that it crashes off the trail into a craggy \n  canyon below, you jump out into some bushes. You hear an echo of a screeching laugh down the mountain. The stalker in the dark cloak thinks that you are dead.\n  *set fakedmydeath 1\n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}\n  *goto witchscastle\n  \n*label witchscastle\n\n*page_break\n\n*image witchcastle.jpg\n\nYou make your way further up the mountain to the castle of the former Wicked Witch of the West. You see a trail leading further north into Gillikin Country and a craggy path to the castle. \n\nDo you:\n\n*choice\n #Travel to the castle?\n  *goto insidewesterncastle\n #Travel up trail to Gillikin Country? \n  *goto GillikinCountry \n  \n*label GillikinCountry\nYou see an army of Nomes approaching from the far North. All of them are covered in jeweled armor and look formidable, though they are quite short. You are not sure why they are coming to try to \nconquer Oz again. There are hundreds of them, and you do not think even the silver shoes will help you here. To the west is the Deadly Desert which destroys anything that touches it. \n\n*choice \n #Try to go further North toward the army \n  Your magic is no match for the Nomes' brawn in this case. You are massacred, and the silver shoes magically back you up to where you made your mistake. \n  *page_break\n  *goto witchscastle\n #Go back to Winkie Country and witch's castle \n  *goto witchscastle\n #Go to the Deadly Desert \n  You are instantly destroyed when you touch the sands of the Deadly Desert. The silver shoes magically back you up to where you made your mistake.\n  *page_break\n  *goto witchscastle \n  \n\n\n \n\n*label insidewesterncastle\n\n*image CastleSteps.jpg\n\nYou cross over the lowered drawbridge into the former castle of the Wicked Witch of the West. You climb the stone tower stairs to her spell tower.\n\n*achieve westerncastle  \n\nThe stairs have no bannister, so you have to be very careful. At the very top of the stairs, though, is a bannister end of sorts with a very sharp, pointy metal pike that the \nWicked Witch of the West's Winkie Guards could impail invaders on.\n\nSuddenly, at the top of the stairs, you see a dark figure in a black hat and witch's attire struggling with a figure dressed as a Winkie Guard. It's going to be a struggle \nfor you to climb this steep, winding staircase and make your way to the struggling figures. One of those individuals, whether truly a Winkie Guard or truly a wicked witch, \nprobably saw you struggling with heights back at the Fates Hotel and the mountain itself. If you tried to kill him before, he obviously survived.\n\n*if fakedmydeath=1\n *goto sneakup\n *goto ending\n*else \n *goto bargeup\n *goto ending\n\n*label sneakup\n \nThe figure in the black hat and witch's attire does not see you coming up at first because this is the individual in the dark cloak who saw you fake your own death. This works \nto your advantage.\n\nDo you: \n\n*choice\n #Try to pull the two struggling individuals apart.\n  The person in the wicked witch clothes fights you as you struggle to pull the two of them apart. As you get closer, you see that the witch is definitely a Winkie Guard \n  dressed in wicked witch clothing. The person in the Winkie Guard clothing, however, is a young lady who looks like Princess Ozma but is definitely not the Princess herself. \n\n  You continue to try to pull them apart, the disguised Winkie Guard in witch costume batting hard at your arms. You notice as he is batting at your arms that around his \n  waist, surrounding his black robe, is the Magic Belt. He must have stolen it from Princess Ozma somehow. That's how he has kept showing up so quickly at different places \n  because the Magic Belt allows one to teleport at will.\n\n  *page_break\n  \n  Suddenly, the Winkie Guard disguised as the wicked witch pulls the young lady that he has forced into Winkie Guard clothes from you. He pushes her off the staircase, and she \n  plummets, screaming to her death. Using his Magic Belt, he teleports down the staircase to the young lady, picks up her body, and teleports away, cackling as he leaves you \n  onthe staircase.  \n\n  There is no reason to try to follow him. Princess Ozma or Glinda will have to deal with him later. \n\n  You have come here to be the ${magicgender} of the Northwest, working further and further in either direction to become ultimately good or wicked. As you have no way of \n  knowing if the Winkie Guard traveled to the Fates Hotel or anywhere else in Oz, following him would be futile at this point. You will remember all that transpired with him \n  and, whetherwicked or good, report it back to Glinda or Princess Ozma should they ever ask, which you feel they will. There may be some opportunity to do so at some point.\n  *goto spellroom  \n \n #Pull the hat and clothes off the Wicked Witch. \n  This sounds like you are being vulgar, but, really, you have figured out that the Wicked Witch is really a Winkie Guard incognito. He cannot cope with not having his dual \n  identity any more and freezes for a moment, crying out in anguish. He is wearing his Winkie Guard clothes beneath the Wicked Witch costume and does not really know who to \n  be any more. You are able to free the young Winkie lady who throws off the Winkie Guard clothes the former Winkie Guard has put on her over her own clothes. She descends \n  the staircase and runs out of the castle to safety. You can see her through a nearby window in the stairwell. She is staring up tentatively at the castle and window, \n  wondering what to do.\n   \n  You noticed when you pulled the Wicked Witch clothes off of the Winkie Guard that there was a Magic Belt in the pile. Before you can grab it, the deranged Winkie Guard does\n  and teleports himself away. You think about following him. \n\n  Nevertheless, you have come here to be the ${magicgender} of the Northwest, working further and further in either direction to become ultimately good or wicked. As you \n  have no way of knowing if the Winkie Guard traveled to the Fates Motel or anywhere else in Oz, following him would be futile at this point. You will remember all that \n  transpired with him and, whether wicked or good, report it back to Glinda or Princess Ozma should they ever ask, which you feel they will. There may be an opportunity \n  to at some point.    \n\n  *set goodpoints+100\n  *goto spellroom\n \n #Zap the Wicked Witch\n  You zap the wicked witch who plummets to her death, her robe revealing Winkie Guard clothes. Actually, she was a he. The Winkie Guard, as you probably know, was dressed as \n  the Wicked Witch. Killing him goes against the no death rule in Oz and is very wicked indeed. \n\n  You were able to free the young Winkie lady who throws off the Winkie Guard clothes the former Winkie Guard has put on her over her own clothes. She descends the staircase \n  and runs out of the castle to safety. You wonder whether you should follow her. \n\n  Nevertheless, you have come here to be the ${magicgender} of the Northwest, working further and further in either direction to become ultimately good or wicked. As you have\n  no way of knowing if the Winkie Guard traveled to the Fates Motel or anywhere else in Oz, following him would be futile at this point. You will remember all that transpired\n  with him and, whether wicked or good, report it back to Glinda or Princess Ozma should they ever ask, which you feel they will. There may be an opportunity to at some point.   \n\n  *set wickedpoints+100   \n  *goto spellroom\n\n*goto ending\n\n*label bargeup \nWithout the element of surprise on your side, without having faked your own death, you have little choice but to try to separate the two struggling figures. You cannot\nattack the witch because she is expecting you. You cannot reveal the identity of the witch for the same reason right now. \n\n*page_break\nThe person in the wicked witch clothes fights you as you struggle to pull the two of them apart. As you get closer, you see that the witch is definitely a Winkie Guard \ndressed in wicked witch clothing. The person in the Winkie Guard clothing, however, is a young lady who looks like Princess Ozma but is definitely not the Princess herself. \n\nYou continue to try to pull them apart, the disguised Winkie Guard in witch costume batting hard at your arms. You notice as he is batting at your arms that around his waist, \nsurrounding his black robe, is the Magic Belt. He must have stolen it from Princess Ozma somehow. That's how he has kept showing up so quickly at different places because the \nMagic Belt allows one to teleport at will.\n\n*page_break\n\nSuddenly, the Winkie Guard disguised as the wicked witch pulls the young lady that he has forced into Winkie Guard clothes from you. He pushes her off the staircase, and she \nplummets, screaming to her death. Using his Magic Belt, he teleports down the staircase to the young lady, picks up her body, and teleports away, cackling as he leaves you on\nthe staircase. \n\nThere is no reason to try to follow him. Princess Ozma or Glinda will have to deal with him later. \n\nYou have come here to be the ${magicgender} of the Northwest, working further and further in either direction to become ultimately good or wicked. As you have no way of \nknowing if the Winkie Guard traveled to the Fates Motel or anywhere else in Oz, following him would be futile at this point. You will remember all that transpired with him \nand, whether wicked or good, report it back to Glinda or Princess Ozma should they ever ask, which you feel they will. There may be an opportunity to at some point.\n\n*set Winkiegirldead+1\n\n*goto spellroom \n*goto ending\n\n\n*label spellroom\n\n*page_break\n\nJust outside the spellroom of the Wicked Witch of the West, at the top of the tower not far from that sharp metallic pike at the one bannister end that does not really have a \nbannister attached to the treacherous stone steps, there is a window. The metallic pike is so very sharp that it could easily break skin and might even create a gash. If \nfurniture carried up the staircase above heads were to somehow brush over it, it would be scraped horribly, and the pike would leave a mark. It's like an extended version of \nthe tall needle on the spindle of a spinning wheel. The Wicked Witch of the West did not use it to curse maiden's, however, but, as aforementioned, to have her guards \nimpail intruders upon it. \n\n*if Winkiegirldead=0 \n *goto justoutsidespellroom\n*else\n You might have been able to send a message through the Winkie Girl to Ozma or even, if you are leaning more toward evil tendencies, maim her, but she is dead at the bottom \n of the staircase.  \n *goto spellroom2\n*goto ending\n\n*goto ending\n\n*label justoutsidespellroom  \n\nYou glance down briefly through a window at the stop of the stairs to see the captive Winkie girl the former Winkie Guard had dressed in his clothes while\nhe was dressed in clothes of the former Wicked Witch of the West. She is wearing a slip now. \n\nYou do not want to scream out, lest there are other supports of the Winkie Guard usurper in the castle.\n \nYou are deciding whether to continue benevolent feelings toward the girl or send her a definite message to not meddle in your affairs. \n\nDo you: \n\n*choice\n #Use the the pike on the metal heart you found to chisel a pleading message to Ozma and throw it down to the young lady. \n  You chisel the message, \"Ozma, send help\" with the pike on the half-rusted, half-metallic heart which seems fitting for the young lady that got tied into a relationship \n  with the Winkie Guard. \n   \n  You decided to trust her, and you feel she will trust you now that you have saved her life. \n    \n  You toss the metallic heart to her like a miniature frisbee through the window a little off to the left so as not to hit her.\n \n  She smiles, picks up the heart, reads the message, and yells up, \"I will rush the message to Ozma immediately.\" At this, she pockets it. \n\n  *set goodpoints+300 \n   \n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}\n  *page_break\n  *goto spellroom2\n #Chisel a warning to Ozma on the metal heart you found, sharpen the pointy end of the metallic heart, and throw it at the girl viciously.\n  With the pike, you chisel the message, \"Ozma, butt out!\" You sharpen the pointy end of the metallic heart on the steps. Getting a good blade end, you throw it like a Ninja \n  star at the girl below, hoping to hit her arm or leg. You just want to do enough to keep her from being nosy. You want her injured and scared to come around your castle \n  again. The make-shift Ninja star connects with her leg, and she screams.\n  \n  She runs far away from the castle never to be seen again. You do not care if she sends your warning to Princess Ozma or not. \n\n  *set wickedpoints+300\n    \n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}\n  *page_break   \n  *goto spellroom2  \n\n*goto ending           \n\n\n*label spellroom2\n\n*page_break\n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints}\n\n[i]Chapter 7 The Spellroom of the Former Wicked Witch of the West[/i]\n\nThis is the spellroom of the former Wicked Witch of the West. Jars of various ingredients with bits of animals and plants line shelves nailed into the grout of the castle \nbrick. Between a few of the jars, you see a pepperbox labeled Powder of Life, which you take. You read the magic words on the box which are, \"WEAUGH! TEAUGH! PEAUGH!\" On \nanother shelf are various vials of different viscocity and putrid colors. On the floor below the shelves is a big bag labeled, Insta-Lunchpail fruittree seeds.  \n\nA bookshelf is crammed with books about Oz, its residents, and magic. \n\nOn a gigantic music-stand is an open, leather-bound magic book as heavy or more than the Book of Records. It is turned to a page for commanding/sending creatures and \nteleporting a few objects. One creature to command that you may not have heard of is the Woozy. The Woozy is a bear-like creature who looks like he is made of leathery cubes \nand rectangular solids of various sizes, is a little over the size of your average large breed dog, has the ability to spit fire, and likes to eat bees.\n\nYou read that page of beginner spells and thanks to the power of the silver shoes feel confident in casting them again and again.\n\nOnce again, however, in your quest to become a magic user, you have the choice to make between being wicked or good. Ultimately, your decisions will make you forever named the\nWicked ${magicgender} of the Northwest or the Good ${magicgender} of the Northwest.\n\nAs ${name}, ${magicgender} of Yet Fully Undetermined Goodness or Wickedness of the Northwest, \n\nDo you: \n\n*choice\n #Send seedplanter creatures with nozzle-like noses to help the Winkie countryfolk. \n  *if sentseedsfirst=1  \n   *goto plantingseeds   \n  *else\n   You have to teleport the Insta-Lunch Pail seed before doing this step.\n   *goto spellroom2\n  *goto ending \n\n #Send wolves to go viciously attack some of the Winkie villagers.\n  *if sentwoozyfirst=0  \n   *goto wolvesattackvillagers\n  *else\n   *goto wolvesattackwoozy\n  *goto ending\n\n #Send plower creatures with round plow hands to plow land helpfully for the Winkies.\n  The plow creatures plow more of the ground for the Winkie citizens who rejoice that their nearby magic user it helping them. \n  *set sentplowersfirst 1\n  *goto spellroom2\n  *goto ending\n\n #Send bees to go attack the Winkies.\n  *if sentwoozyfirst=0\n   *goto beesattack\n  *else\n   *goto warningaboutwoozy\n  *goto ending  \n\n #Teleport useful Insta-Lunch Pail seed to the Winkies.\n  *if sentplowersfirst=1\n   *goto transportseed\n  *else\n   The fields need to be plowed first before you send seed.\n   *goto spellroom2\n  *goto ending\n  \n\n #Send the Woozy, against his will, to attack the Winkie villagers. \n  *if sentbeesfirst=0\n   *goto warningaboutbees\n  *else \n   *goto woozyattack\n  *goto ending\n          \n*goto ending  \n \n*label plantingseeds\nThe seedplanting creatures have nozzle-like noses which allow them to plant the seeds deep into the soil. The Insta-seeds work and lunchpail trees instantly grow for the\ncitizens. Many of them open up their lunchpail fruit and eat the faux meats (like tofu direct from a plant), fake cheeses, pseudo-breads, and real vegetables and fruits \nwithin them. They rejoice and call you a good magic user.\n*goto goodspellending\n*goto ending \n\n*label wolvesattackwoozy\nThe wolves will attack the Woozy who has stuck around. You better rethink this.\n*goto spellroom2\n*goto ending\n\n*label wolvesattackvillagers\n*if sentwoozyfirst=1\n *if sentbeesfirst=1\n  The wolves attack the Winkie villager, wreaking havoc everywhere they go. They unfortunately bring lots of red hues to a country already mostly dappled in yellow. \n  They maim many and kill a few and then run off toward the wicked, haunted forest. The Woozy has run off on his rectangular solid bounding legs like a bear or large \n  dog frightened by a noise, but you might be able to send him back again. Throughout the Winkie Country, villagers begin to curse the unknown wicked magic user.\n  *goto wickedspellending\n *goto ending \n*elseif sentwoozyfirst=0\n The wolves attack the Winkie villages, wreaking havoc everywhere they go. They unfortunately bring lots of red hues to a country already mostly dappled in yellow.  They maim \n many and kill a few and then run off toward the wicked, haunted forest. Throughout the Winkie Country, villagers begin to curse the unknown wicked magic user.\n *set sentwolvesfirst 1  \n *goto spellroom2\n *goto ending\n*else\n The wolves attack the Winkie villages, wreaking havoc everywhere they go. They unfortunately bring lots of red hues to a country already mostly dappled in yellow.  They maim \n many and kill a few and then run off toward the wicked, haunted forest. Throughout the Winkie Country, villagers begin to curse the unknown wicked magic user. \n *set sentwolvesfirst 1 \n *goto spellroom2\n*goto ending \n\n*label beesattack\n*if sentwolvesfirst=0\n  The bees sting many of the residents of the Winkie villages, some of them leaving their stingers behind. Others simply buzz about and make general nuisances of themselves. \n  As red welts form on their arms, legs, and other parts, the Winkie villagers curse the unknown user of magic.\n  *set sentbeesfirst 1\n  *goto spellroom2\n  *goto ending\n*elseif sentwolvesfirst=1\n  The bees sting many of the residents of the Winkie villages, some of them leaving their stingers behind. Others simply buzz about and make general nuisances of themselves. \n  As red welts form on their arms, legs, and other parts, the Winkie villagers curse the unknown user of magic.\n  *set sentbeesfirst 1\n  *goto spellroom2 \n  *goto ending\n*elseif sentwoozyfirst=0\n  The bees sting many of the residents of the Winkie villages, some of them leaving their stingers behind. Others simply buzz about and make general nuisances of themselves. \n  As red welts form on their arms, legs, and other parts, the Winkie villagers curse the unknown user of magic.\n  *set sentbeesfirst 1  \n  *goto spellroom2\n  *goto ending\n*else\n  The bees sting many of the residents of the Winkie villages, some of them leaving their stingers behind. Others simply buzz about and make general nuisances of themselves. \n  As red welts form on their arms, legs, and other parts, the Winkie villagers curse the unknown user of magic.\n  *goto wickedspellending\n\n*goto ending\n\n*goto ending\n\n*label warningaboutwoozy\nThe Woozy likes to eat bees and is still hanging around. Sending out the bees near him would not be a good idea. You bring the Woozy back and decide what to do next.\n*set sentwoozyfirst 0\n*goto spellroom2 \n\n*label woozyattack\n*if sentwolvesfirst=1\n *if sentbeesfirst=1\n  The Woozy, against his will, shoots flames out of his eyes on his odd cubical head. He toddles through the Winkie villages on rectangular solid legs, horrifying many \n  with his flaming eyes on his cube-shaped head. He eats some of the remaining bees flying through the air with relish as he continues his path of destruction. Some \n  Winkie villagers die in the flames. Others escape with just their lives. The Winkie villagers curse the wicked magic user who enchanted the otherwise good Woozy and \n  made him do these evil deeds.\n  *goto wickedspellending\n *goto ending\n*elseif sentwolvesfirst=0\n  The Woozy, against his will, shoots flames out of his eyes on his odd cubical head. He toddles through the Winkie villages on rectangular solid legs, horrifying many \n  with his flaming eyes on his cube-shaped head. Some Winkie villagers die in the flames. Others escape with just their lives. The Winkie villagers curse the wicked \n  magic user who enchanted the otherwise good Woozy and made him do these evil deeds.\n  *set sentwoozyfirst 1\n  *goto spellroom2\n*goto ending\n \n*label transportseed\n*set sentseedsfirst 1\nYou send the bag of Insta-Lunch Pail seed to the Winkies now that the fields have been plowed.\n*goto spellroom2\n\n*label warningaboutbees\nYou better send the bees out to the Winkies first and let them attack because the Woozy will eat more of them if he arrives first\n*goto spellroom2\n\n*label goodspellending \n*page_break\n*set goodpoints+300\n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints}  \n\n*achieve novicemagewest   \n\nWith your very recent actions, you are advancing more toward being a good magic user. You have used your spells to help the citizens of the Winkie Country. \n\nWho would have thought you would have done that as a humble Quadling villager with no real talent toward magic until you acquired the silver shoes? \n\nYou were always looked down on as a common junk collector, but now feel you are earning the respect of many through your benevolent actions and white magic.\n\nThe Winkies are starting to talk more amongst themselves about seeking an audience with the powerful good magic user who now inhabits the former castle of the Wicked \nWitch of the West. \n   \nHaving gained experience with these basic spells, you feel you are ready to use the Powder of Life spell on different objects throughout the castle. \n\n*goto spellroom3\n*goto ending\n\n*label wickedspellending \n*page_break\n\n*set wickedpoints+300 \n \nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints} \n\n*achieve novicemagewest   \n\nWith your very recent actions, you are advancing more toward being a wicked magic user. You have used your spells to make the lives of the Winkie citizens miserable.\n\nWho would have thought you would have done that as a humble Quadling villager with no real talent toward magic until you acquired the silver shoes?\n\nYou were always looked down on as a common junk collector, but now you feel you are being given the respect you deserve and are leaning toward trying to force that \nrespect with dark magic. \n\nThe Winkies are starting to talk more amongst themselves about starting a revolt against you as the new magic user in the former Wicked Witch of the East's castle.\n\nHaving gained experience with these basic spells, you feel you are ready to use the Powder of Life spell on different objects throughout the castle. \n\n*goto spellroom3\n*goto ending\n      \n   \n*label spellroom3 \n\nYou are now ready to advance to the Powder of Life spell. You already took the pepper box with the Powder of Life. Looking at the vials and pieces of creatures within the \nspellroom,you do not think you could make a very good creature. You decide to go to the kitchen to look for parts for a creature to bring to life with Powder of Life.\n\n*page_break\n\n*goto kitchen\n*goto ending \t \n \n*label kitchen \n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints}\n\nYou have traveled to the kitchen in the former Wicked Witch of the West's castle. A large grater with large holes and at least 20 steak knives are scattered on a butcher \nblock. Canned goods of many varieties line the cabinets along with pots and pans. An unspoiled melon has been magically growing on a vine trailing from a pot in the \ncorner of the kitchen. Small sticks of kindling are beside an old fashioned wood burning stove. A sink with a clockwork disposal that runs on magic sits in the middle \nof the kitchen. It does not require water to work, but it magic was only known to the wicked witch. Within the sink is a pile of disgusting debri, the hodge-podge of \nwhich has collected into putrid slime. A roll of twine sits up on the countertop.  \n\nUsing different objects, you decide to:\n\n*choice\n #Create an evil spider creature out of the knives and collander using Powder of Life and the magic words.\n  You stick knives into the large grater's holes making three legs on either side of it. You then stick six more knives' blades into the three of either side, giving \n  the spider hinged legs. You place two knife blades in its mouth to simulate sharp mandibles. Next, you sprinkle the Powder of Life on the creature and yell, \n  \"WEAUGH! TEAUGH! PEAUGH!\" The metallic spider creature comes to life. You order it to go attack the villagers, which is does, leaving cuts wherever it goes.\n  *set wickedpoints+300\n  *goto broomcloset\n #Create a good knight, a living suit of armor, made of stacked pots, pans, and canned goods.\n  You try to create a made of stacked pots, pans, and canned goods and dub him Sir CannedDoGoods as he looks little like a suit of armor. However, when you use the \n  Powder of Life on him and say the magic words, he quickly falls aparts. He says in a noble if not defeated voice, \"When I go into battle, it seems I often fall apart.\"\n  You decide that this just is not going to work and look for other options. \n  *goto kitchen\n #Create a good melon-headed creature out of the melon, kindling, and twine to help the villagers collect lunchpail fruit.\n  You carve a kind face into the melon. You then sharpen a large piece of the kindling to a spear-like point and stick it in the melon with the smiley face. Next, you \n  tie other pieces of kindling together to make arms and legs to attach to the largest piece of kindling which serves as the creatures neck and body at the same time.\n  Finally, you sprinkle Powder of Life on the creature and yell the magic words that came with it. \"Oh, happy day!\" yells the melon creature. You tell him to go help \n  the Winkies collect lunchpail fruit, which he gladly does. \n  *set goodpoints+300\n  *goto broomcloset\n #Create an evil creature out of the putrid slime in the sink. \n  It slithers around some but soon begins to disintegrate after you perform the Powder of Life spell. You decide that this just is not going to work and look for other\n  options. \n  *goto kitchen\n*goto ending   \n     \n*label broomcloset     \n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints}\n\nYou have found a broomcloset. Above the broomcloset is a sign which reads, \"Brooms That Are Not for Flying.\" Inside the broomcloset are brooms with leather loops on the tops of them to hang them on\npegs inserted in particle board toward the back of the closet, dush brushes on sticks with leather loops for them to hang as well, feather dusters, and assorted empty \ntin cans of cleaners which the witch must have been keeping for spare spell ingredient storage. Another roll of twine is on the closet shelf as is a screwdriver. \nNoticeably absent is a mop and mop bucket, which the hydro-phobic witch must have kept well away from herself. She probably had it located near servant quarters. Very \nnoticeable, somewhat hidden in plain sight if you will, is a small door which, being enchanted, will enlarge to an enormous door to a gigantic safe\nwith the right combination spell. The Wicked Witch of the West died with the information and did not leave it behind.\n\n*page_break\n\n*if wickedpoints>goodpoints\n You wish you had some nails or sharp tools here to make some fangs or sharp teeth for a creature, but there are none.\n *goto continues\n*else\n You wish you had some nails here and a hammer to nail things together.\n *goto continues\n*goto ending \n\n*label continues\n\nNow that you have had a little practice with making Powder of Life creatures, you decide to move on to the next room regardless of what kind of creature you create. You\nhave full confidence that you can create a viable creature.\n\n*page_break\n\nUsing different objects, you decide to:\n\n*choice\n #Hook two brooms together on one broom together with the twine to make a helpful broom with legs.\n  You create a broom with other broom legs. Sprinkling the Powder of Life on it and saying the magic words, you are over-joyed to see it spring to life and sweep around.\n  You send it to help the Winkie villagers with their housework. Many of them begin to discuss how grateful they are that the nearby magic user has been showing such \n  good actions. Some of them are talking about coming to visit you one day. \n  *set goodpoints+300\n  *goto witchbedroom\n #Punch holes with the screwdriver in the empty cleaning cans and put a long piece of twine through them, knotting the twine on both ends to make an evil snake.\n  You bring the evil-looking tin-can snake alive with Powder of Life. It scares some villagers but because it has no fangs it does not do any harm to the villagers. Like \n  you stated before, you decide to move on to the next room anyway.\n  *goto witchbedroom\n #Hook four pushbrooms together with twine so they can scrape the ground together and trip the villagers.\n  You bring the combined pushbrooms to life with your magic powder, and they descend down to the villager, making a clean sweep of the mountain trail and the villagers \n  below. They knock villagers over here and there, the villagers cursing the evil magic user who has moved into the castle. \n  *set wickedpoints+300\n  *goto witchbedroom\n #Hook two featherdusters together apiece to make virtual birds to fly and help the villagers with dusting.\n  You bring the combined featherdusters together to make virtual birds and bring them to life with Powder of Life. They fly down the mountain but are captured by the \n  villagers who think they are chickens. Unfortunately, they will never lay eggs or be of any use to the villagers.\n  *goto witchbedroom\n   \n*goto ending  \n\n\n\n*goto ending   \n \n*label witchbedroom   \n   \n*page_break\n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints}\n\nYou are in the former Wicked Witch of the West's bedroom. A four poster bed with each of the posters made to look like giant broomsticks and the headboard carved with \nan effigy of her telescopic eye with all sorts of runes carved around it is there. Her coverlet is dark satin. Across from her bed is a hat rack with a witch's hat on it.\nThere is also a dark walnut chest of drawers with carved cloven feet made to make it look ominous. You open one of the drawers and see identical folded witch's robes but\nwith one set missing. On the side of the chest of drawers, you notice a secret button.\n\nAs you have entered the room, your silver slippers have been glowing as if to convey something, but you feel you should do at least one more Powder of Life spell before\nproceeding. There is not much to work with in the room, so you choose between two viable options this time, one good, one wicked.\n\nDo you? \n\n*choice\n #Turn the chest of drawers with the cloven feet into a beast of burden to help the Winkies. \n  You turn the chest of drawers into a beast of burden to help the Winkies with your magic powder. It is hitched to a cart and helps carry the cart around for them to gather \n  lunchpail fruit.\n  *set goodpoints+300\n  *goto visionsfromshoes\n #Turn the hatrack with the witch's hat into a walking hat rack. \n  You turn the hatrack into a walking hat rack and with the witch's hat, it causes many villagers to faint or flee. \n  *set wickedpoints+300 \n  *goto visionsfromshoes\n #Press the secret button on the side of the chest of drawers.\n  A flat board suddenly juts out of the side of the chest of drawers and on this board is a map and secret plan for the witch to take over the Nome Kingdom. There is a \n  note with a magic spell for opening a safe somewhere in the castle with jewels stolen from the Nomes. Shortly after it comes out, the flat board retracts into the \n  chest of drawers from whence it came.\n  *goto witchbedroom\n*goto ending \n\n*label visionsfromshoes\n\n*page_break\n \nThe silver shoes begin to glow even more of their own volition. Suddenly, you are given a vision. \n\nSomething about being in this place, this place where the Wicked Witch of the West spent many hours sleeping and resting, has evoked a vision from the mysterious\nsilver slippers. \n\nAfter destroying a Winkie village in the past and taking on any whom would leave their Winkie village as guards, the Wicked Witch of the West adopted a son left after \nshe killed his family. She presented him with one toy, the Telegraph Non-flier Wagon you saw earlier and had him pull heavy rocks from the mountain with it to build his \nstrength. As he grew up, she trained him in the ways of military discipline but not magic. When he came of age, she made him the head of her Winkie \nGuard...  \n\nThe silver shoes begin to show a later vision... \n\nWhenenever the Head of the Winkie Guard, the Wicked Witch of the West's adopted son, would fail to lead the other members of the guard properly, the Wicked Witch of the\nWest would say, as shown by the shoes, \"You'll never be as powerful as me. You'll never be like me at all. You'll never be anything but a peon. You have no magic powers \nin you whatsoever, and you've got a weak spine just like the rest of those villagers. Get a backbone. Grow up! Be more like me!\" The Head of the Winkie Guard, an older \nteenager, is shown by the shoes in the vision with a down-cast expression... \n\nThe silver shoes begin to show a vision later still...\n\nThe Head of the Winkie Guards, the adopted son of the Wicked Witch of the West in uniform, is shown slaughtering nome after nome just to impress his mother. Even after \nhe helps an army of Winkies defeat the Nomes, underground bearded creatures with potbellies who love jewels and help even create them, and brings back wagons of jewels \nto the Wicked Witch of the West, she mutters, pointing a gnarled finger to herself, \"Hmmm... well, you may just be getting close to being like me after all. But you will \nnever be me. You didn't get all the jewels, did you? And you left many of the Nomes still alive!\" She tugs at a pigtail she was woven her long black hair into. She peers at \nher adopted son with a piercing stare from her uncovered eye, a black patch covering the other one. He simply looks down and does not say a word... \n\nNext, the silver shoes show a later vision... \n\nChaos is in the castle. The Wicked Witch of the West has been killed. Her adopted son, the Head of the Winkie Guard, looks through her chest of drawers. He puts on \none of the black witch's robes and wears one of her conical hats. He begins to cackle in an odd falsetto... \n\nThe silver shoes end their vision. You feel led to click them three times, which you do and ask to return to the spellroom. \n\n*page_break\n\n*goto spellroom4\n\n*goto ending \n\n*label spellroom4\n\n*achieve experiencedmagewest\n\nThis is the spellroom of the former Wicked Witch of the West. Jars of various ingredients with bits of animals and plants line shelves nailed into the grout of the castle \nbrick. Between a few of the jars, you see a pepperbox labeled Powder of Life, which you take. You read the magic words on the box which are, \"WEAUGH! TEAUGH! PEAUGH!\" On \nanother shelf are various vials of different viscocity and putrid colors. On the floor below the shelves is a big bag labeled, Insta-Lunchpail fruittree seeds.  \n\nA bookshelf is crammed with books about Oz, its residents, and magic. \n\nOn a gigantic music-stand is an open, leather-bound magic book as heavy or more than the Book of Records. \n\nIt is now turned to a page of spells stolen from the Nome Kingdom and written into the spellbook with the Wicked Witch of the West's spidery cursive scrawl. \n\nOne spell will turn many of the creatures and citizens of the Winkie Country into non-talking objects. The Tinwoodman, Emperor of the Winkies, who is rusted solid away from \nhis own metallic castle, the Woozy who is running around in the woods, the villagers, and the creatures of Winkie Country will all be turned into objects.\n\nThe other spell will return jewels stolen by the Wicked Witch of the West to the Nome Kingdom. It is a Nome spell to retrieve jewels and have them go back to their \nhome location. \n\nShould you: \n\n*choice\n #Cast the spell to turn all Winkie citizens into objects. \n  You cast the spell, and a deafening silence fills the hills and valleys of Winkie Country. The Tinwoodman turns into a metal funnel. The Scarecrow is still away on his\n  journey to the Good Witch of the North and escapes the spell. The Woozy turns into a set of building blocks. Finally, Winkie villagers turn into various inanimate \n  objects here and there, pitchforks, pitchers, and other objects that were in their hands dropped and crashing to their floors. Letting out a piercing cackle, you show \n  you are wicked once and for all.  \n  *set wickedpoints+1000\n  *goto wickedending \n #Cast the spell to return all jewels in the secret safe back to the Nomes. \n  You cast the spell to return all jewels back to the Nomes. The surviving Nomes see this as a peace offering and are indebted to you for returning their stolen \n  property. They had planned to invade the Winkie Country and the Wicked Witch of the West's former castle. Instead, they put their weapons aside, polish the hundreds \n  of jewels you have returned, and work on placing them back into place deep underground.\n  *set goodpoints+1000\n  *goto goodending\n*goto ending \n\n*label wickedending \n\n*page_break \n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints}\n\nThe Nomes have started to march from the Nome Kingdom in an underground tunnel beneath the Deadly Desert that is a shortcut they have been working on straight to the \nformer Wicked of the Witch's castle. \n\nSuddenly, floating just outside the spellroom window, Glinda arrives via a big cherry, somewhat translucent bubble-gum bubble. It gives her and her captive a filtered \nred look. Her captive is the Winkie Guard dressed as the Wicked Witch of the West and is also in his own separate yet magically linked big cherry bubble-gum bubble. \n\nNext, Ozma, wearing the Magic Belt they both retrieved from the Winkie Guard, arrives in the spellroom as well. She adjusts here O and Z crown atop her head and\nstraightens out her long white gown upon arrival.\n\nGlinda shouts so her voice will carry through the bubble, \"Henceforth, you will be known as ${name} , Wicked ${magicgender} of the Northwest. You have been so wicked \nthat the Book of Records has recorded you as such. As you can see, we captured he whose efforts you may have tried to evade in your quest... The Head of the Winkie\nGuard, dressed as the Wicked Witch of the West, was who I thought had traveled to Quadling Country with his Magic Belt dressed as a magic user, and I hoped by giving \nhim the silver slippers that we could better track his movements through magic. You were not supposed to be the one that was chosen. It was a case of mistaken identity \nall along. We discovered the Head of the Winkie Guard up to mischief in the Munchkin Country thanks to his stolen Magic Belt. But now what to do with you?\"\n\nOzma sighs and says, \"I told you to be good.\" With a wave of her ivory wand, your spell over the Winkie citizens is broken, and they are returned to being living, \nbreathing citizens again, not objects. The Head of the Winkie Guard's use of one of his mother's spell against the Tin Woodman has been thwarted by Ozma as well. \nShe will have to stop your more irritating spells individually, however.\n\nWhile the two good do-ers decide what to do with you, you decide to: \n\n*if magiccrochetneedle=1\n *choice\n  #Use the magic crochet needle on Glinda's bubble.\n   Glinda's bubble pops, and she nearly plummets to her death below. She causes another bubble to go around herself and heads Southeast back to the Quadling Country, \n   yelling something about leaving it to Ozma to deal with, that she is done.\n   *set wickedpoints+1000\n   *goto wickedendingOzma \n  #Use the magic crochet needle on Winkie Guard's bubble. \n   Before about to plummet to his death, the Winkie Guard latches on to the window-sill, jumps in, and grabs the Magic Belt from Ozma. He continually evades Ozma \n   and Glinda from now on, making sure never to be caught. He also serves as much unwanted competition as a faux wicked witch in the Winkie Country and the Munchkin \n   Country.\n   \n   The Book of Records erases your title and changes his to The Wicked Magic User of the Northwest and Northeast, and he remains a thorn in your side. \n\n   Also, as the aforementioned Nomes begin to storm the castle, you instantly regret your decision. It looks like from now on you will just be a common Quadling villager\n   working in the Nome's jewel mines for the rest of your life.\n\n   *page_break\n   The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n   *goto wickedending\n *goto ending   \n*else\n *choice\n  #Use your faux wand on Glinda's bubble. \n   Glinda's bubble-gum bubble pops, and she nearly plummets to her death below. She causes another bubble to go around herself and heads Southeast back to the Quadling Country, \n   yelling something about leaving it to Ozma to deal with, that she is done.\n   *set wickedpoints+1000\n   *goto wickedendingOzma\n  #Use your faux wand on Winkie Guard's bubble. \n   Before plummeting to his death, the Winkie Guard latches on to the window-sill, jumps in, and grabs the Magic Belt from Ozma. He continually evades Ozma and Glinda\n   from now on, making sure never to be caught. He also serves as much unwanted competition as a faux wicked witch in the Winkie Country and the Munchkin Country.\n   \n   The Book of Records erases your title and changes his to The Wicked Magic User of the Northwest and Northeast, and he remains a thorn in your\n   side. \n\n   Also, as the aforementioned Nomes begin to storm the castle, you instantly regret your decision. It looks like from now on you will just be a common Quadling villager\n   working in the Nome's jewel mines for the rest of your life.\n\n   *page_break\n   The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n   *goto wickedending\n *goto ending\n*goto ending\n  \n*label wickedendingOzma \n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints}\n\nThe Nomes have started to storm the castle. Using a quick spell, Ozma sends them back to the Nome Kingdom along with the jewels that were hidden away in the castle. \n\nAs Ozma is distracted, you are able to: \n*choice\n #Teleport Ozma to the Emerald City and the Winkie Guard to the Emerald City dungeon.\n  You realize that now Ozma can come back and check on you with her Magic Belt and prevent you from doing too much mischief.\n \n  You are ${name}, the Wicked ${magicgender} of the Northwest and will, as Glinda stated, henceforth be known as such within the Book of Records and will be known by \n  all citizens of Oz as such. \n\n  However, your wickedness will be more thwarted by Ozma having that Magic Belt. When you turn citizens into slugs, she will be there. When you dry up wells, she will\n  be there. \n \n  Using your magic shoes, you decide to back up a few steps in time and make a different decision...\n\n  *goto wickedendingOzma \n \n #Snatch the Magic Belt from Ozma and teleport Ozma and the Winkie Guard back to the Emerald City.\n  *set wickedpoints+300 \n  *achieve experiencedmagewest\n  Without use of the Magic Belt, Ozma cannot come back to check on you as quickly. This will give you time to continue to work on more evil spells in the spellroom. \n\n  You are ${name}, the Wicked ${magicgender} of the Northwest and will, as Glinda stated, henceforth be known as such within the Book of Records and will be known by \n  all citizens of Oz as such. \n\n  With the Magic Belt, you may be able to rule over the Northeast of Oz as well, going back and forth at will.  \n\n  Who knew when you started as an overly-ambitious Winkie peasant that you would make it this far through fakery and evil magic? The Winkie Guard who thought he was his\n  adopted mother, the Wicked Witch of the West, and dressed as her made his way through deception and delusion.\n  \n  You feel like you have gone beyond delusion, have transcended it if you will. You have become what you deluded yourself to be. You are no longer a common Winkie junk\n  collector but truly are the Wicked ${magicgender} of the Northwest. You are a Winkie ${magicgender} through and through.\n  \n  Winkie villagers curse your name, the benevolent witches, and O.Z. Diggs, the wizard of Oz who no longer rules, sigh deeply when your name is called, and you strike\n  fear in the hearts of all throughout Oz. \n\n  And from henceforth, you will be wicked and in your own mind, doing what you will, truly free.\n\n  The End  \n  \n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}\n  *goto ending   \n\n*goto ending\n   \n*goto ending  \n\n*label goodending \nSuddenly, floating just outside the spellroom window, Glinda arrives via a big cherry, somewhat translucent bubble-gum bubble. It gives her and her captive a filtered \nred look. Her captive is the Winkie Guard dressed as the Wicked Witch of the West and is also in his own separate yet magically linked big cherry bubble-gum bubble. \n\nNext, Ozma, wearing the Magic Belt they both retrieved from the Winkie Guard, arrives in the spellroom as well. She adjusts here O and Z crown atop her head and\nstraightens out her long white gown upon arrival. The Head of the Winkie Guard's use of one of his mother's spell against the Tin Woodman has been thwarted by Ozma shortly \nbefore her arrival. \n\nGlinda shouts so her voice will carry through the bubble, \"Henceforth, you will be known as ${name}, Good ${magicgender} of the Northwest. You have been so good that\nthe Book of Records has recorded you as such. As you can see, we captured whose efforts you may have tried to evade in your quest. The Magic User was who I thought had \ntraveledto Quadling Country with his Magic Belt dressed as a magic user, and I hoped by giving him the silver slippers that we could better track his movements through \nmagic. You were not supposed to be the one that was chosen. It was a case of mistaken identity all along. We discovered him up to mischief in the Munchkin Country thanks \nto his stolen Magic Belt. But now what to do with you?\"\n\nWinkie citizens are lining up outside your door now that you have done so many good works for them.\n\nOzma says, \"Perhaps you should figure out what to do about the Winkie citizens who are lined up outside your castle doors.\"\n\nShe trusts you and hands the Magic Belt for you to use for good if you wish.  \n\n*choice \n \n #Create illusions to make yourself appear more grandiose than you are and require appointments. \n  This has been done before by the well-noted Wizard of Oz, O.Z. Diggs. Eventually, this works for a while, but after a few years of this, a few of the Winkie\n  villagers get tired of it, push their way through, and discover you in your bathrobe, a humbug. Your reputation as a powerful wizard decreases throughout the \n  Winkie Country and the land.\n  *page_break\n  The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n  *goto goodending\n #Use the Magic Belt to take appointments outside in disguise and then use it to travel back to the throne chamber to greet your guests a few at a time.\n  With the Magic Belt, you are able to write down appointments in a disguise and then travel back to your throne chamber. People think you are a powerful wizard\n  indeed with the way you are able to appear suddenly in the throne chamber. From magic agricultural help to solving other problems, you are known as a wise, good\n  wizard.\n  *set goodpoints+300\n  *page_break\n  *goto goodending2\n #Create Powder of Life creatures to deal with the long line of Winkies.  \n  You create a kind of Powder of Life creature bureaucracy of living bric-a-brac. The bric-a-brac bureaucracy sets up appointments for you, requires that forms be\n  filled out in triplicate (all Winkie yellow), makes people visit various rooms to pick up various forms and fill them out, and keeps the Winkies from seeing you for\n  days. The Winkies grow impatient with you and your bureaucracy and eventually give up. They begin to say that they remember you being quite good but that what good is \n  a good ruler if you can never see said ruler?\n  *page_break\n  The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n  *goto goodending\n #Use the Magic Belt to escape the crowd of Winkies outside and go to the former castle of the Wicked Witch of the East. \n  You are unknown to the Munchkins in the East and are your reputation does not precede you. You quickly discover that you will have to remake your reputation there \n  where you had already built up a good reputation here. \n\n  You use the Magic Belt to return to the former castle of the Wicked Witch of the West in Winkie Country. \n  *page_break \n  *goto goodending  \n\n*goto ending\n\n*label goodending2 \n\n*achieve experiencedmagewest\n\nYou are ${name}, the Good ${magicgender} of the Northwest and will, as Glinda stated, hencefor
