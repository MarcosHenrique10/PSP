*page_break   \n  *goto spiders\n  \n \n*label spiders\n\nA small cave sits a short distance from the path. From the nearby cave, a giant spider crawls out and blocks your path. The spider is about twice your size. A bit of spider \nsilk sloppily sticks out of its thorax. On the giant spider, the silk is more like large sticky thread.\n\nWhat should you do?\n\n*choice\n #Walk around the spider.\n  The spider spits webbing at you from its thorax, wrapping you quite nicely with its arms. It gives you a piercing bite, and you begin to \n  feel dizzy and sleepy. That is all you remember as you go into darkness. You are spared the sight of the spider\n  sucking your blood and juices from your body.\n    \n  Someone, as if by magic not of your own, allows you to retrace your ill-placed steps and try again...\n  *page_break\n  \n  *goto spiders \n  *finish \n #Bat the spider with the stick you picked up. \n  You bat the spider with the stick you picked up, and it retreats to its cave. You begin to wonder what is in that cave. As you ponder\n  a while, the spider comes back for another go.\n  *goto spiders\n #Use your colored stick on that large, sticky thread sticking out its thorax\n  You grab the sticky thread of the spider-silk with your periwinkle-colored stick. You are then able to forcefully pull more out of the \n  spider's thorax. You wrap the silk around the spider, covering everything but its thorax. You also do this so that you can still access more \n  silk. Next, you do this process again and again until the spider is completely wrapped up in its own silks save for its behind. You then \n  tear the stick away. Finally, you reuse the stick to wrap another huge roll of spidersilk around in case you run into another spider. \n  Oh, what a tangled web you will weave when you perhaps deceive the next one and pull out a weapon that uses his brother spider's\n  silk against him. Seeing no additional gigantic spiders, however, you venture cautiously toward the nearby cave. \n  *page_break       \n  *goto cave\n  *label cave\n  Now that the spider has been wrapped up, you venture into the nearby cave. In the back of the dank cave are more intricate webs where past prey has been caught.\n  Remnants of dried-out prey are here and there, and some wrapped bodies hang by single threads of silk from the ceiling. There is a loom here that the giant \n  spiders, more intelligent than Out World spiders, use to do additional weaving. These spiders are able to use weaving tools. You try your hand at it yourself. \n  You place the huge roll of greyish spider-silk on the loom and weave yourself a crude robe. You now have a crude robe in addition to your\n  magic wand.\n\n  You then venture back to the path, ignoring the spider you wrapped up earlier, and travel to what appears to be the top of a cliff. \n  *goto hammerheads\n #Jump over the spider and run into the cave.\n  You jump over the spider and run into the cave. You spot a loom within the cave but are not able to see little else because the spider has followed you here. \n  You jump back over the spider and return back to the path. \n  *goto spiders\n  *finish\n\n*label hammerheads \n\n*page_break \n\nYou are at a cliff with a rope descending down it to the rest of the path. You can see Glinda's light red, ruby-encrusted palace shining like the red sunrise in the distance. \nAll around the cliff are little squat, armless men in shortpants and necks that look like stacks of pancakes and with flatheads. These are the Hammerheads of Oz, and they can \nspring their necks out to knock trespassers down. One of the Hammerheads screams, \"THOU... SHALL... NOT... PASS!\" He is wearing a conical, grey hat, and the rest are \nsubservient to him, waiting on him foot and well... foot in their case as they are handless. Small rocks surround the Hammerheads on the cliff surface, but they cannot pick \nthem up with their mouths as they do other objects.They bring him, the squat figure in the conical grey hat, things in their mouths and form a protective semi-circle around \nhim, their leader. The only difference in attire that the leader has is that grey, conical hat. Like the others, he is wearing short pants, a little grey vest, a red bowtie, \nred knee socks, and Buster Browns. \n\nWhat should you do? \n\n*choice \n #Jump over the Hammerheads to the rope. \n  Their necks spring out to their full-size, and their flatheads knock you down mid-jump. You are back where you started on the clifftop.\n  *goto hammerheads\n #Go around the Hammerheads to the rope.\n  Their necks spring out to their full-size and extend out horizontally to where you are trying to sneak past. You are knocked down, are very winded, and have to return to \n  where you started on the clifftop.\n  *goto hammerheads\n #Pick up rocks and throw them at the leader's grey, conical hat.\n  You pick up and throw rocks at the leader's conical hat. It falls some distance from the Hammerheads. That being the only thing that indicated who the leader of them was, \n  the Hammerheads begin to squabble. While they are distracted, you grab the hat and put it on. As the hat was designed for the very large, top-heavy head of a Hammerhead and\n  is of a very stretchy cotton, it still fits yours. The Hammerheads, seeing you read the hat, bow all the way to the ground, not springing their necks at you again. They see \n  you as your leader now, and you are now dressed in a grey, make-shift robe and grey conical hat. You also have a fake, painted wand at your side to complete the look. \n  *page_break\n  You are now able to climb down the rope, which you do, and head toward Glinda's Palace... \n  *page_break\n  *goto Glindaspalace   \n #Attack the Hammerheads with your fake wand, the perwinkle-colored stick. \n  The Hammerheads glance at each other and roll their eyes. You manage to poke one or two in the eye with your stick, but this just perturbs the rest. You know no magic, and \n  this is not a real magic wand either, so you just have to keep beating the Hammerheads with it. One or two of them knock the stick from your hands by thrusting their necks \n  out with their flatheads. Their flatheads connect with the stick, it hits the ground, you collect it, and retreat back to where you started on the clifftop.\n  *goto hammerheads\n    \n\n*label transitiontoGlinda        \n    \n\nSuddenly, a cherry-scented bubble gum bubble surrounds you. You feel yourself floating through the air, screaming all the while. Suddenly, the sickly sweet bubble gum\nbubble pops. Suddenly, you land on your feet in front of Glinda the Good. When Glinda saw, via the Book of Records, you perform an act of magic while dressed as \na magic user, she summoned you. You are still not a true magic user. You did not correct her when you arrived.\n    \n*page_break\n    \n*goto Glindaspalace\n    \n*finish \n\n*label house\n \n*page_break\n\nYou live in a red-painted cottage in the village and pass by an open seamstress shop on the way to it. You try to conform to the red color schemes of most of the Quadlings. \nHowever, you have always had tastes that bordered on the gothic while still adhering to what one associates with magical, good colors. You have a black fake leather chair \nin your den, for example, that would have looked gothic were it entirely ebony, but it has flecks of shiny emerald green in it here and there. A dagger sits on a side table\nbeside the fake black leather chair. Hanging on a coat rack is a silky black bathrobe or dressing gown that looks somewhat like a magic robe -- emphasis on somewhat.\n\nYou decide to... \n*choice\n #Wear the silky black bathrobe that appears somewhat wizard-like.\n   You put on the silky black bathrobe over your red clothes, and they show through. You hope you can pull off the magic user look in this and head back to the pub.\n   *goto pub\n #Pick up the dagger so that you can cut some robe material from the chair, remembering the seamstress shop you passed by. \n   You pick up the dagger. You rip away at the seams of the black fake leather couch with the emerald flecks within the material. The flecks\n   shine verdantly on the floor, and the material looks resplendent in the sunlight that comes through one of the few cottage windows. You decide to \n   take the material to the seamstress you passed along the way.\n   *page_break\n   *goto seamstress\n #Pick up the dagger so that you can go back and use it on the guy in the pub. \n   You pick up the dagger and rush back to the pub. You try to use the dagger on the big guy in the pub, but the dagger is wrestled away from you. You are placed in Emerald\n   City jail, a basement area where people are rehabilitated by doing fun things until their sentence is over. You are given sets of children's magic kits with which to \n   entertain yourself in jail where you will stay for many years.\n   \n   Someone, as if by magic not of your own, allows you to retrace your ill-placed steps and try again...\n   *page_break\n   *goto house\n   *finish \n #Start off early on a journey to Glinda's Palace to become a magic user despite not looking like one.     \n    *goto pathtoGlindas \n #Sleep on the couch.\n   You fall asleep on the couch. When you awaken the next day, you cannot help thinking that somehow you missed out on some big opportunity by falling asleep there.\n\n   Someone, as if by magic not of your own, allows you to retrace your ill-placed steps and try again...\n   *page_break\n   *goto house\n   *finish\n\n*page_break\n\n*label seamstress\n\nIn the seamstress shop, a woman in glasses that magnify her eyes many times over is dressed in a gorgeous red gown of her own creation and is sewing away at another gown at \na wooden table. Mannequins of various sizes from Munchkin to Gillikin and in colors from blues to purple stand all over the small shop, proving the talented seamstress gets \nwork from all over Oz. The dress the seamstress works on is a red one as well but is frillier than the one she wears. The seamstress appears to be ancient but is well-fit \nfrom her years of hard work. \"Come in... come in...\"\n\n*page_break\n\nYou explain to the seamstress that you need a magic user robe and hat made out of the leathery, shiny couch material. \n\nThe woman says, \"Well, sonny, I can do that. Just don't tell Glinda that I practice a little magic.\"\n\nShe pulls out a magic crochet needle and with a few magic words creates an black, leathery robe for you with emerald green flecks within it here and there and a conical\nhat. The attire could be for a witch or a wizard and is basically unisex.  \n\nYou hand her a coin in return for the robe and hat (you carry several, though money is not commonly used in Oz... people are far more likely to barter here), \nand she thanks you.\n\n*page_break\n\n\n*goto seamstressdialogue\n\n\n*label seamstressdialogue\n\nYou have picked up some knowledge about magic here and there, cursory knowledge, and decide to ask this magic user a few questions. \n\nYou decide to ask the seamstress about: \n\n*choice\n #Glinda\n  The woman says, \"Glinda already knows that I practice a little magic but thinks me harmless. They really do not want a lot of people practicing magic in Oz any more. As \n  for you telling her, that was a bit of a joke. She already knows.\"\n  *goto seamstressdialogue\n #leaving\n  *goto leaving\n #Book of Records \n  Glinda sees all with her magic Book of Records. It writes down everything that happens in Oz in real time. She is probably reading our conversation as we speak. I hope the\n  spell I decided to cast keeps us hidden away.\" The woman darts her magnified lenses to the left and right in a slightly paranoid way.  \n  *goto seamstressdialogue \n #silver shoes\n  The seamstress says, \"The silver shoes are one of the most powerful objects in all of Oz. The possessor of them automatically has great magic power at his or her \n  disposal. They are so powerful that even if one does not have magical ability that they can give one magical ability.\" \n  *goto seamstressdialogue\n #magic and how it is done\n  The seamstress waves her crochet needle. It creates a darkness in the room, and she squints through her big lenses at you. She whispers, \"Glinda cannot spy on us now, but it \n  is temporary.\" The seamstress pulls out a silver crochet needle, mutters something over it, and then asks you to trust her. You watch as she puts the crochet needle in your \n  skull, and  it comes out the other side of your skull. She removes it, and you are unharmed. She explains, \"This is a magic trick that novice magic users can do. The object \n  is already enchanted and basically creates an illusion. All you have to do is be confident in using it.\"\n  *set magiccrochetneedle 1\n  *goto seamstressdialogue  \n\n*label leaving\n\n*page_break\n\nThe seamstress shows you the way out. \n\nAs you start to leave, she whispers, \"If Glinda sees that you are a magic user, you will definitely be summoned to her castle.\"\n\nThe seamstress hands you a silver crochet needle before you go without further explanation. You are trying to remember if she explained to you how to use it.  \n\nThanking her for her advice, you decide not to immediately put the robe and hat on but to put it on just before you go into the pub. Besides, you had something to prove\nto those fellows, even if it was a white lie.\n\n*page_break\n\n*set costume 1\n\n*goto pub\n*finish \n\n*page_break\n\n*label Glindaspalace   \n\n*achieve glindaspalacearrival \n\n[i]Chapter 2 The Perceived Magic User Meets Glinda[/i]\n\n*image glindaspalace.jpg\n\nYou have not traveled very far from your village to the courtyard of Glinda's castle. \n\nYou start in the courtyard on a road of red bricks with a fountain meant to emulate the Forbidden Fountain in the Emerald City but not as grand. What strikes you, as \nmuch of the Quadling Country often has, is the sheer amount of the color red here...\n\n*page_break\n\nAs you make your way, Glinda's castle looms to the side as a ruby-studded and red marble affair -- especially in the throneroom which you enter, and Glinda, a \nwoman in her thirties or forties but who appears younger, sits in a sheer light red dress on a pale marble throne with vermillion veins. She has cherry-red long curls which \nare also cheery because they bounce cheerily when she makes declarations. Female attendants in all of the colors of the different sub-countries of Oz, including Winkie yellow,\nGillikin purple, Munchkin purple, Emerald City green, and Quadling Country wait on Glinda's beck and call. Most of them look as cheerful as\nshe does, yet a few look exasperated.  \n\nGlinda has her magic wand with her, which resembles a red stick with a pointy end (being a fraud/imposter, you do not have a real one). Not far from her throne, on a \nlittle endtable sits the silver slippers, slippers that can add to one's magic power if one already hads magical abilities. They shine with a bright light white but also \nreflect the reds in the throne-room at times. They look a little like pointy Munchkin slippers but are made entirely of pure silver. These were the magic shoes that the \nWicked Witch of the East wore when the house fell on her but were transferred to Dorothy by Locasta the Good Witch of the North. Glinda, the good witch of the South, made \nDorothy and her friends go through an entire adventure before she told them how powerful they were and that they could take her home. You do not need to be told. You have \nheard of their great power and that they date back to around or before King Pastoria's reign.  \n\n*page_break\n\nTo Glinda's right, on a gigantic music stand that extends from a base the size of a coffee table sits the Book of Records, a book that weighs at least one hundred\npounds and growing. This tells Glinda everything that is going on in Oz in written form in real time. She does not travel across the extensive country to know what is going \non at any given time. The magic book, as events happen, shows her what is going on in narrative or story form. Very recently, she has not been reading it as it is closed on \nits stand,and she is far away from it. She looks like she has just been merely glancing in it throughout the day. \n\nGlinda states in a joyous voice, curls jiggling beneath a ruby-encrusted tall crown and looking at your attire, \"I am so happy to meet the latest mage in the Land of Oz! I \nwant you to state your name, gender, and where you would like to become a magic user. The North is already taken by the Good Witch of the North, Locasta. The South is already \ntaken by me, Glinda. That leaves you to choose between the west and the east eventually. That robe and hat, your appearance in general, certainly do not help me to see if you \nare a witch or a wizard, so please state that as well. All of this is so that the Book of Records can magically write a record of her you are.\"\n*page_break\n\nGlinda asks, \"What is your name?\"\n\n*input_text name\n*if \"$!!{name}\" = \"RATING\"\n  *feedback\n \nYou say that your name is ${name}.\n\nGlinda asks, \"What is your gender?\"\n\n*fake_choice\n  #Female (Witch)\n    *set gender 1\n    Glinda states, getting up from the throne to make sure everything was transcribed in the gigantic Book of Records, \"Welcome, ${name} , newest Witch of Oz.\"\n    *set gs \"She\"\n    *set gn \"she\"\n    *set gp \"her\"\n    *set pp \"her\"\n    *set magicgender \"Witch\" \n  #Male (Wizard)\n    *set gender 2\n    Glinda states, getting up from the throne to make sure everything was transcribed in the gigantic Book of Records, \"Welcome, ${name} , newest Wizard of Oz.\"\n    *set gs \"He\"\n    *set gn \"he\"\n    *set gp \"him\"\n    *set pp \"his\"\n    *set magicgender \"Wizard\"\n\n*label firstdecision \n\n${name} eyes the silver slippers. ${gs} also eyes the Book of Records. The silver slippers are the more powerful and could truly give ${gp} magical abilities. ${gs} could \nfake magical abilities with the Book of Records, though, being seen as all-knowing about what goes on throughout Oz.\n\n\n${name} decides whether or not to get the silver slippers through alleged subterfuge and theft, leaning toward wickedness, or by asking for them like a good person or \ndecides to get the Book of Records. \n\n*label seconddecision\n\n*choice \n\n #You steal the silver slippers.         \t\n   *goto stolenslippers\n   *finish\n #You politely ask for the silver slippers.\n   *set goodpoints+250\n   *achieve askforshoes\n   Glinda gladly gives you the silver slippers, seeing a lot of good in you. Happily, you bid her and her kingdom goodbye and head toward the Yellow Brick Road.\n   Your goodness score is: ${goodpoints}\n   Your wickedness score is: ${wickedpoints} \n   *goto YellowBrickRoad\n   *finish\n #You steal the Book of Records.\n   *set wickedpoints+100\n   Well, you try to steal the Book of Records. As it weighs 100 pounds, you do not get very far and take it back to the table, huffing and puffing.\n     \n   Glinda giggles and cheerily says she forgives you, and you are back to the proverbial square one, albeit feeling a little more wicked for the theft.\n     \n   Your goodness score is: ${goodpoints}\n   Your wickedness score is: ${wickedpoints}\n   *goto seconddecision\n   *finish\n\n #You politely ask for the Book of Records. \n   *set goodpoints+100\n   Glinda giggles and says, \"As you could possibly see, it weighs one hundred pounds or more. You could not possibly carry it with you.\"\n\n   Your goodness score is: ${goodpoints}\n   Your wickedness score is: ${wickedpoints}\n   *goto seconddecision\n   *finish               \t\n \n*label stolenslippers\n \n*set wickedpoints+250\n*achieve stealshoes \n \nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints} \n   \nGlinda's guards of many colors from the many lands of Oz chase after you after you steal the silver slippers. You feel like a blurry rainbow is chasing you.\n\n*choice\n # You zap the guards, maiming many of them with your newfound power from the silver shoes and flee.\n  *set wickedpoints+250\n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints} \n  *goto YellowBrickRoad\n  *finish\n # You apologize for stealing the silver slippers and vow that you will only use them for good (perhaps your fingers were crossed;we'll see).\n  The guards, hearing from Glinda to do so, allow you to leave.\n  *set goodpoints+100\n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints} \n  *goto YellowBrickRoad\n  *finish\n # You give the silver slippers back. However, you still feel strangely drawn to them, so you follow Glinda's guard back to her castle.  \n  *set goodpoints+100 \n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}\n  You decide to think about what to do again. \n  *page_break\n  *goto seconddecision\n  *finish \n # You dance the Jitterbug in the silver slippers, hoping this will distract the guards. They ask that you come back to show Glinda the dance. \n  At this point when you return, Glinda takes the shoes back from you.\n  *set wickedpoints+100\n  You decide to think about what to do again. \n  *page_break              \n  *goto seconddecision\n  *finish\n  \n*label YellowBrickRoad  \n\n[i]Chapter 3 You, ${name},[/i]\n*if wickedpoints>goodpoints\n [i]Wicked ${magicgender} of Oz[/i]\n*if goodpoints>wickedpoints\n [i]Good ${magicgender} of Oz[/i]\n\nMake a Big Choice Between Regions\n\n*image YellowBrickRoad.jpg\n\n\nYou have made your way to the Yellow Brick Road. You can decide to go to the Winkie Country out west or the Munchkin Country out east. If you hop backwards a few times, you\nwill be at the Emerald City and Princess Ozma's resplendent palace. Once you decide to go to a particular region, either west or east, that will be the region that you will \ndecideto rule over, eventually deciding through your decisions to be forever good or forever wicked. There is even a little worn, zig-zagged path that goes to the west of the Emerald City.\n\nGlinda telepathically keeps sending you a message, \"Remember... if you wish to stay on the good path, in addition to demonstrating other good actions, you must not kill\nany people or creatures in Oz.\"   \n\n*choice\n #Go to the Winkie Country.\n   *goto EmeraldCityonwaytoWinkies\n   *finish\n #Go to the Munchkin Country.\n   *gosub trial_end\n   *goto_scene rest_of_game MunchkinCountry\n   *finish \n #Take a few steps back and go to the Emerald City and Ozma's Palace.\n  *if wickedpoints>goodpoints\n    Ozma says as you enter her palace, \"So you decided to grace us with your malignant presence, ${name} , wicked ${magicgender} of Oz. As you know, magic use \n    has been banned except for by certain people.\"\n    *gosub Ozmaspalace\n    \n    Ozma says, \"I am afraid that is all I have time to answer for now. Be aware that if you continue down the wicked path that I will be sending my friends to stop you. \n    Also, the villagers in your area will probably also turn against you. If you continue down the good path, you will not be left alone either. People from all over the \n    country will seek your help just as they do with me and how they did with O.Z. Diggs, though at the time all of his magic was just faked and his powers were mostly \n    illusions. Have a good day and do try your best to be good.\"\n     \n    *page_break\n\n    *goto YellowBrickRoad\n   \n  *if goodpoints>wickedpoints\n    Ozma exclaims, \"It is so good to see you, ${name}, good ${magicgender} of Oz! However, as you know, magic use has been banned except for by certain people.\" \n    *gosub Ozmaspalace\n\n    Ozma says, \"I am afraid that is all I have time to answer for now. Be aware that if you continue down the wicked path that I will be sending my friends to stop you. \n    Also, the villagers in your area will probably also turn against you. If you continue down the good path, you will not be left alone either. People from all over the \n    country will seek your help just as they do with me and how they did with O.Z. Diggs, though at the time all of his magic was just faked and his powers were mostly \n    illusions. Finally, I have made a No Death rule in Oz. You must not kill any people or creatures in Oz or will definitely be venturing down the wicked path. Have a\n    good day and do try your best to be good.\"    \n\n    *page_break\n  *goto YellowBrickRoad\n\n #Stand on Yellow Brick Road\n   Some crows decide to fly near you and begin to eye you suspiciously.\n   \n   You suspect they think that you are a Scarecrow, and you think you need to make a decision.\n   *goto YellowBrickRoad\n #Take the zig-zaggy path \n   You take the zig-zaggy path. After a few minutes, you find it leads to the pumpkin house of Jack Pumpkinhead and that several pumpkins are planted here.\n   \n   *goto jacksplace\n\n\n*label ozmaspalace\n\n*page_break\n\n*image Ozgate.jpg\n\nThe Guardian of the Gates opens the gate to the Emerald City for you, and you step on through the gate... \n\n*page_break\n\nOzma's place has loomed before you in ivory tinged with green from the green spectacles you are asked to wear. Emeralds shine here and there throughout the palace as\nyou make your way in. Ozma sits on her tall throne and addresses you. \n\nOzma states, flinging her long black hair back and adjusting her crown with an O and a Z on it, \"Again, I banned magic use by no others than Glinda, O.Z. Diggs, and me for a \nreason. I see that Glinda has been lenient and has still allowed for new magic users.\"\n\nAn audience surrounds Ozma, including an alive man made of a Jack O'Lantern with a wooden body and clothes affixed to it, a Sawhorse that resembles an abstract wooden horse \nand a sawhorse on which to saw wood at the same time, and the talking head of a Gump, a creature somewhat like a moose or deer, on the wall.\n\nThrough an open doorway from the throneroom to a large library, you see some gaunt, sickly-looking bespectacled individuals of both genders all dressed in green. They are \nincredibly pasty, not having been out in sunlight for days or even weeks, tabulating things found in Oz history books into smaller books that have tabs the many colors of the\nrainbow on them. You cannot see what is written on the tabs. \n\n\nYou interrupt Ozma... \n \n*choice\n #Ask Ozma where the Gump head came from. \n   Ozma explains that some friends and she once had to escape the Emerald City by putting the head of a Gump on some couches along with some ferns with some ropes and \n   bringing the creature to life with Powder of Life and some magic words.\n  \n   You take note about the creation of the Powder of Life creature.\n   *return  \n\n #Ask Ozma about the gaunt, sickly individuals in the library and their tabbed, little books.\n   Those are the Tabulators. They are a group of individuals who have chosen to live in the Emerald City just to tabulate historical information about Oz. They seldom if ever \n   visit Glinda and read modern stories about Oz in the Book of Records. Instead, they spend their days keeping somewhat obscure tabs on historical figures in Oz. I tolerate \n   them as I love all of my subjects. However, though I know many of the people and stories they discuss, I grow weary of them because so many new adventures have happened so\n   much new life is in Oz. Granted, we would not be where we are today, including myself, were it not for many of the historical figures they like to tabulate. Yet they tend to \n   pick out the more obscure ones instead of the most well-known and pride themselves in giving history lectures. Ozma holds a groan in check for a minute and tries her best to \n   be friendly as one of the Tabulators stumbles into the throne-room.  \n   \n   *page_break\n   He pushes up his thick glasses which further magnify the bland creamyness of his skin. He is wearing green robes but chooses not to wear the green glass of the Emerald City, \n   citing the historical fact that it was O.Z. Diggs, the Wizard of Oz, that deemed that people wear green glasses in the Emerald City and that when Ozma took over that she did \n   not require it. Plus, he would have to wear the green glasses over his prescription glasses which would look silly. \n\n   The spokesperson for the Tabulators says, \"I could not help but over-hear, in the quiet of the library, you discussing us, Princess Ozma.\" He thrusts his tablet into your \n   face with its many colored tabs, you grab it and examine it, and you can see each alphabetical listing with a Roy G. Biv pattern repeated over and over again, one color for each \n   name and then the sequence starting again: \n\n   A-B-Sea Serpent ... \n   Abatha ... \n   Agnes ... \n   Bristle ... \n   Chiss ... \n   Dog-gone ... \n   Ervic ... \n   Fyter the Tin Soldier ...\n   Graham Gems ...\n   Herby ...\n   Ivy ...\n   Jenny Jump ... \n   King Kinda Jolly ...\n   Lavender Bear ...\n   Mr. Muffin ...\n   Norgold the Wise ...\n   Owen ...\n   Prince Kaver ...\n   Queen Ann Soforth ...\n   Rak ...\n   Sir Hokus of Pokes ...\n   Tugg ...\n   Unc Nunkie ... \n   Vees Fullaballoon ...\n   Wecuse Weeble ... \n   Xanadooshius ... \n   Yester ...\n   Zeb Hugson \n   \n   *page_break\n\n   \"This is MY tablet\" the Tabulator spokesperson states in a gravely, whiny voice, \"with my tabs on information on historical figures of Oz. Do you know all of them?\"\n\n   \"I do know quite a few of them and have read many Oz history books in school, 20 or more, but I honestly cannot remember all of them all of the time. A few I have not ever \n   heard of you\" you state.  \n \n   He clucks his tongue and states to Princess Ozma and to you, shaking his head full of greasy locks he has not washed in days because of his over-attentiveness to his \n   scholarship, \"UN-ACC-EPT-ABLE! WHAT A RUBE!\" He stares at you with wide, magnified eyes through the lenses, making his eyes look like novelty ones or false eyeballs seeming \n   to float in the, to you, blurry hodge-podge and vanilla pudding-like consistency of his skin. \n   \n   With surprisingly agile hands, hands used to reaching for and handling heavy tomes and nimble fingers used to writing detailed notes, he snatches his tablet back with its \n   many tabs. You grow enflamed at this. The Tabulator almost clicks away on reproduction silver slippers, but you stop him.\n\n   *page_break\n   \n   You take deep breaths and state calmly, \"I am a collector and seller of junk... er... as well as being a ${magicgender}.  I find many old objects and some of them turn out \n   to be antiques, and I cherish them. However, every once in a while, I make a new discovery, something brand new that somebody has invented and left behind by mistake or \n   something brand new from the Smith and Tinkers factory or even Wogglebug Labs in Wogglebug University. Brand new inventions and even brand new bric-a-brac can be intriguing. \n   Those new discoveries, those new aspects of life, make things interesting too! I guess what I am trying to say is I am a little obsessed with the old, but I would be VERY \n   limited if I only kept tabs on the old.\"\n\n   The leader of the Tabulators whines loudly, \"Rest assured WE will not be keeping tabs on YOU at all, you nobody.\" He clicks away to the rest of the Tabulators, his green \n   robes dragging slightly over his reproduction silver slippers. \n\n   Princess Ozma whispers, \"Do not mind him. Again, I tolerate them because they like what they do, and I accept everybody for what they do as long as it is not truly evil.\"\n   \n   You state, not feeling like you need to defend yourself in front of the leader of the Tabulators, \"If they are not keeping tabs on me, good. I will be making a life for \n   myself in Oz and will be well-noted in the Book of Records one day.\"\n\n   \"That's the spirit\" says Ozma, \"As long as you are famously good and not infamously wicked, I do not have a problem with your ambition. Now perhaps we should turn to other \n   subjects. By the way, the Tabulators have a way of repeating past history magically, so if you ask about them again, we will have to go through this whole episode again. \n   That is how they are even better than most at recording history. They can back-track some and observe history through magic and make people forget they were even there. \n   I ask that they use it sparingly as I do not really want a lot of people using magic in Oz like Glinda apparantly does.\" \n     \n   *return         \n         \n #Ask Ozma where the pumpkin headed man came from.\n   Ozma explains that she was once turned into a boy named Tip by a witch, Mombi, and that as a boy, she played a trick on Mombi by putting a pumpking carved with a Jack \n   O'Lantern face on a carved wooden body with some clothes. She explains that Mombi brought who would be called Jack Pumpkinhead to life with Powder of Life and some \n   magic words.\n  \n   You take note about the creation of the Powder of Life creature.  \n   *return   \n\n #Ask Ozma where the Sawhorse came from.\n   Ozma explains that after a witch, Mombi, who had turned her into a boy and kidnapped her and after Ozma as a boy had made the pumpkin headed creature and watched it \n   brought to life with Powder of Life and magic words by the evil witch, that she had run off with the pumpkinheaded creature and the Powder of Life and eventually found a \n   Sawhorse. Ozma said she as the boy Tip had brought to life the Sawhorse with the powder and magic words. She said she had to add carved ears to the horse-like creature and \n   handles from carved sticks for Jack Pumpkinhead, the pumpkin-headed creature, to hold on to as he rode the Sawhorse.\n  \n   You take note about the creation of the Powder of Life creature.\n   *return   \n \n #Ask Ozma why she only allows certain people to use magic in Oz now. \n   This seems to annoy Ozma. She says, \"When a certain witch, Mombi, and others started using magic for evil means like the former wicked witches did, I decided that only \n   certain people should be allowed to use magic in Oz. Unfortunately, I later heard after being turned back to my present form that Mombi gave some Powder of Life to the\n   Wicked Witch of the West before she died, some some of that it still sitting around somewhere. Who knows what hands it might fall into?\"\n   *return \n\n*label jacksplace \n\nJack Pumpkinhead, a creature with the head of a Jack O'Lantern and a body of large sticks dressed in a vest and polka-dot cavat, greets you at the door of his pumpkin house. He says, \"If you go much further into these \nwoods,you're going to need one of my already carved jack o'lanterns to ward off evil. I keep some around for when I need a new head when my current head spoils. I am most concerned with my head spoiling.\"\n\n*choice \n #Go back to where you came from originally in this area. \n   You go back to the Yellow Brick Road. \n   *page_break\n   *goto YellowBrickRoad \n #Do not take the jack o'lantern.\n   You decide not to take the jack o'lantern. \n   *goto jacksplace\n #Take the jack o'lantern. \n   You take a jack o'lantern. \n   *set gothead+1\n   *page_break \n   *goto jacksplace\n #Go further into the woods.  \n   *if gothead=1 \n     *goto woods  \n     *finish\n   *else\n     *goto lostinwoods\n   *finish\n   \n*label woods\nYou travel further down the path in the woods. With the guidance of the jack o'lantern, you are able to find a short-cut and not get mixed up by a witch's curse on the path. Eventually, you find a small cabin \nand enter it. On the table is a check-list. Most of the items are normal things such as natural ingredients. One item on the check-list is, \"Give some Powder of Life to the Wicked Witch of the West.\" This must\nbe or must have been Mombi's old cabin. Mombi was the witch who helped in the kidnapping of Princess Ozma and disguised her as a boy named Tip in the past. The Powder of Life which got from Dr. Pipt actually brought\nJack Pumpkinhead back to life. His jack o'lanterns, however, can see through her magic. Having seen all that you need to see here, you decide to go back to the Yellow Brick Road.\n*page_break\t   \n*goto YellowBrickRoad\n\n*label lostinwoods\t \nYou wander around aimlessly in the dark woods which have been cursed by a witch. You do not have a jack o'lantern to guide you through the dark magic.\n     \nSomeone, through the magic of the silver slippers, who they command but for a moment,  allows you to retrace your ill-placed steps and try again (It must be very\nstrong magic indeed, for usually only the wearer of the silver slippers can command them, and this person is affected space and time through commanding them, magic \nyou probably could not handle even with more experience)...\t\n*goto jacksplace  \n \t\n*label EmeraldCityonwaytoWinkies \n\nYou travel some distance down the Winkie trail west from the Emerald City and soon see the metallic towers of Nick Chopper, the Tin Woodman's castle, now that he is non-magic \nEmperor of the Winkies. A barn sits in the background that is part of Scarecrow's kingdom and not too far from his Corn Kingdom, which you will eventually loop back\naround to as the trail curves around some other structure you cannot see now, around the barn, and to the Scarecrow's corn fields and castle fashioned out of a gigantic ear of\ncorn. In the fore-ground, though, on a stump near a patch of woods if what garners the most attention from you.\n\n*page_break\n\nHis nickel plating that Nick later placed on himself as been magically removed, his tin and metal body exposed to the elements by magic, and unoiled and in the rain for what \nmust have been weeks sits a completely rusted-out Tin Woodman. You weep at the sight of him because of the many tales of his bravery that have been passed through all of us. \nWhy you yourself had picked up a little Tin Woodman toy that a child had discarded in Quadling Country in the hope that you would one day have compassion and not just be a \ncollector of old junk and seller of things to the highest bidder. You have a lot of tendency to good within you, but you can also lean toward being a cold, calculating \nindividual. You have never felt as the Tin Woodman must have felt before he rusted away, though, because, as you can see from the hole in his chest, someone has taken away \nhis heart! \n\n*image TinWoodman.jpg\n\nLooking at the Tin Woodman, you try to decide what to do.  \n\nDo you: \n\n*choice\n #Try to oil the Tin Woodman. \n  You would oil Nick Chopper, the Tin Woodman, but you do not have an oilcan, and his signature oilcan is not anywhere around. One guesses you \"oilcannot.\"\n  *goto EmeraldCityonwaytoWinkies\n #Look in the hole in the Tin Woodman's heart, the Valentine's shaped hole, to try to help him. \n  *gosub trial_end\n  You gaze into the hole cut into the Tin Woodman's chest. \n\n  *page_break  \n  Before he rusted completely solid, the Tin Woodman wrote a note on a piece of nearby yellow birchbark (yellow is the \n  signature color of the Winkie Country in general) using the last of his oil and his sharpest metallic digit, his pinky. It resembles lettering does as it in monochromatic \n  fingerpaint by a child, but you remember the pains it must have taken him to do this as he was rusting and could not move his legs. The note reads, \n  \"Be wary of the Winkie Guard but do not kill him. Witch one is he?\" \n\n  You know the wise Scarecrow would have admonished his friend for the spelling error, yet you wonder about it. You had heard from some villagers on the way that the Scarecrow \n  was not in the area, that he was visiting the Good Witch of the North. Perhaps he went to get help. Why he did not go to Ozma or Glinda is beyond you... unless all of this \n  relates somehow, the rusted out Tin Woodman and the danger the Winkies are in and Ozma and Glinda not wanting the Scarecrow not to come near. Surely the good magic leader of Oz \n  and good witch of the South were not in cahoots with some nefarious plot and did not want the Scarecrow involved. That was unlikely.\n  \n  You also find it interesting that the Tin Woodman, just before he lost his heart to the thief and before he rusted, managed to forgive the thief and his persecutor by asking \n  the next person who came along to discover his secret note not to kill his alleged persecutor.  \n\n  After all, the Tin Woodman's note had read, \"Be wary of the Winkie Guard but do not kill him.\" But which one? \"Witch one is he?\" indeed. He had to mean, \"Which one?\" There \n  were tens to hundreds of Winkie Guards serving under the former, late Wicked Witch of the West, and they were all freed and disbanded from their service. You think finding \n  the one he is talking about, with their yellow fluffy hats, is going to be like finding a clean cotton-swab stick amongst ones covered in ear-wax.\n\n  *page_break\n  \n  After looking so carefully at the heart-shaped hole in the Tin Woodman's chest, you look directly beneath that hole, and under the Tin Woodman's foot is a metallic cut-out. \n  It was partially saved from rust by partially being under his foot.\n\n  Being a collector of old objects like your father and his father before him, this intrigues you. You tug with all your might and thanks to the looseness of the soil \n  underneath the foot, you are able to procure the metallic heart that was cut out before a magic spell was cast to remove the Tin Woodman's nickel plating and a spell was \n  cast to leave him to the elements/rain without an oilcan.\n  \n  The metallic heart, where the rounded metal foot end of the Tin Woodman's foot as on it, has a perfectly clean, shiny metallic quasi-semi-circle but one more confined by \n  half of the heart shape, and where the end of his foot was not, is rusted out completely in a second quasi-semi-circle also confined by half of the heart shape. It makes a \n  kind of ying and yang of rust and pure metal. You pocket the item and decide to continue on your way. \n\n  *page_break\n  \n  *set gotmetalheart+1 \n\n  *set goodpoints+300\n  \n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints} \n  *goto_scene rest_of_game \n \n #Carry the Tin Woodman.\n  He is entirely too heavy for you to carry. \n  *goto EmeraldCityonwaytoWinkies   \n #Kick the Tin Woodman with your black leather, steel toe unisex work-boots, kicking him while he is down.\n  *gosub trial_end\n  You wickedly kick the Tin Woodman with the sharp steel toe end of your black leather unisex workboots. A clang echoes through the patch of woods and through distant \n  cornfields, where you hear a fluttering of crows and cawing. You maliciously grin as you see the gigantic dent you have left in his torso just below the heart. \n\n  You had been thinking about how your father was a junk collector and his father before him and how you had been forced into the business, them not seeing any other potential in \n  you. Focusing on this rage, you kicked the heck out of the poor Tin Woodman, literally kicking him while he was down. You heard the stories. He had did not have a heart and \n  tried to change that but realized he had a heart all along. \n\n  You start to think you want magic at all costs, not to find that you have had the power inside all along but to seize it, to clutch at it with all your might every time you \n  can and not wait and to focus on the dark, angry reasons you want to leave your former life behind. Not only are you getting darker in action but darker in perspective.\n\n  *page_break\n  \n  You have tried to be the debonair man about village, so to speak, but know that when it boils down to it, at least according to a voice that comes from the smudgiest place \n  within the darkest corner of your mind, you will never be anything but a rube, not much better or identical to what is no more than the trashy so-called bric-a-brac you \n  gather, the sad yet malignant inner accusing voice moans.\n \n  In kicking the Tin Woodman, you noticed you cause it to move slightly and reveal the cut-out heart-shape out of the Tin Woodman's torso where it fell beneath his foot. This is \n  not his heart but where they cut to get into it.\n\n  Being a collector of old objects, this intrigues you. You tug with all your might and thanks to the looseness of the soil underneath the foot, you are able to procure the \n  metallic heart that was cut out before a magic spell was cast to remove the Tin Woodman's nickel plating and a spell was cast to leave him to the elements/rain without an \n  oilcan.\n  \n  The metallic heart, where the rounded metal foot end of the Tin Woodman's foot as on it, has a perfectly clean, shiny metallic quasi-semi-circle but one more confined by \n  half of the heart shape, and where the end of his foot was not, is rusted out completely in a second quasi-semi-circle also confined by half of the heart shape. It's makes a\n  kind of ying and yang of rust and pure metal. You pocket the item and decide to continue on your way.\n\n  *set gotmetalheart+1 \n  \n  *set wickedpoints+300 \n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints} \n  \n  *goto_scene rest_of_game\n   \n*finish            \n\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased_2\n  *return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n  *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2018-05-07 $2.99 $1.99 purchased_2\n*abort\n\n"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
        finished: this.finished, temps: this.temps, _para: this._para,
        _pending_scene: this._pending_scene, _resume: this._resume,
        initial_commands: this.initial_commands, stats: Object.assign({}, this.stats),
      };
      try {
        this.scene = this.load_scene("choicescript_stats");
        this.line_num = 0;
        this.indent = 0;
        this.finished = false;
        this.temps = this._freshTemps();
        this._para = [];
        this._pending_scene = null;
        this._resume = null;
        this._in_stats = true;
        this._runStatsLoop();
      } finally {
        this._in_stats = false;
        this.scene = saved.scene;
        this.line_num = saved.line_num;
        this.indent = saved.indent;
        this.finished = saved.finished;
        this.temps = saved.temps;
        this._para = saved._para;
        this._pending_scene = saved._pending_scene;
        this._resume = saved._resume;
        this.initial_commands = saved.initial_commands;
        this.stats = saved.stats;
      }
    }

    _runUntilEnd() {
      while (true) {
        try {
          this._mainLoop();
          return;
        } catch (e) {
          if (e instanceof RestartGame) {
            this._resetAll();
            this._enterScene(this.load_scene("startup"));
            continue;
          }
          if (e instanceof LoadGame) { this._applyState(e.state); continue; }
          if (e instanceof QuitGame) {
            try { this.autosave(); } catch (_) { /* never mask quit */ }
            throw e;
          }
          throw e;
        }
      }
    }

    _mainLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          const nxt = this._nextSceneName(this.scene.name);
          if (!nxt) break;
          this.temps = this._freshTemps();
          this._enterScene(this.load_scene(nxt));
        }
      } catch (e) {
        if (e instanceof GameOver) { this._flushParagraph(); return; }
        throw e;
      }
    }

    _enterScene(scene) {
      this.scene = scene;
      this.finished = false;
      this._pending_scene = null;
      const resume = this._resume;
      if (resume !== null && resume[0] === scene.name) {
        const [, lineNum, indent] = resume;
        this.line_num = lineNum != null ? lineNum : 0;
        this.indent = indent != null ? indent : scene.lines[this.line_num].indent;
      } else {
        this.line_num = 0;
        this.indent = 0;
      }
      this._resume = null;
      if (scene.name !== "startup") this.initial_commands = false;
    }

    _nextSceneName(current) {
      const i = this.scene_list.indexOf(current);
      if (i === -1) return null;
      if (i + 1 < this.scene_list.length) return this.scene_list[i + 1];
      return null;
    }

    // ---- save / load state ---- //

    _baseState() {
      return {
        version: 1,
        scene: this.scene ? this.scene.name : null,
        line_num: this.line_num,
        indent: this.indent,
        initial_commands: this.initial_commands,
        scene_list: this.scene_list.slice(),
        stats: toJsonable(this.stats),
        temps: toJsonable(this.temps),
        unlocked: Array.from(this.unlocked).sort(),
      };
    }

    captureState() {
      const state = this._baseState();
      if (Object.keys(this.checkpoints).length) state.checkpoints = deepCopy(this.checkpoints);
      return state;
    }

    _applyState(state) {
      this.scene_list = (state.scene_list || []).slice();
      this.stats = fromJsonable(state.stats);
      this.temps = fromJsonable(state.temps);
      this.unlocked = new Set(state.unlocked || []);
      this.checkpoints = deepCopy(state.checkpoints || {});
      this.initial_commands = state.initial_commands === undefined ? false : state.initial_commands;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = state.scene ? this.load_scene(state.scene) : null;
      this.line_num = state.line_num || 0;
      this.indent = state.indent || 0;
    }

    _resetAll() {
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.unlocked = new Set();
      this.checkpoints = {};
      this.initial_commands = true;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
    }

    autosave() {
      if (this.scene === null) return;
