th be known as such within the Book of Records and will be known by \nall citizens of Oz as such. \n\nWith the Magic Belt, you may be able to rule over the Northeast of Oz as well as soon as the Munchkins grow used to you, going back and forth at will.\n\nWho knew when you started as an overly-ambitious Quadling peasant that you would make it this far through some fakery but mostly good magic? \n\nThe Winkie Guard, who thought he was his adopted mother, the Wicked Witch of the West, and dressed as her, made his way through deception, delusion, and evil magic.\n  \nYou feel like you have gone above delusion, have transcended it if you will. You may have started out in what was a lie, a facade. You may have started out wearing\na costume and subscribing to artifice and only pretending to be a good ${magicgender} . However, by pushing yourself to make good decisions along the way, you have \nbecome truly good. In short, you have moved from being a hypocrite to being the genuine article.\n\nYou will be celebrated by the Winkie villagers in tales for many years to come, and Glinda, Ozma, and the former good wizard of Oz, O.Z. Diggs will say your name \nwith broad smiles and contentment on their faces. Your reputaton for being a good ${magicgender} will spread throughout the Land of Oz, and people and creatures from far\nand wide will come to you to seek out your wisdom.     \n\nAnd from henceforth, you will be good and doing what is ordained to be good from now through all eternity.\n\n \n*goto ending  \n\n\n*label MunchkinCountry\n\n[i]Chapter 4 Poppie-ing on By the Way to Munchkin Country[/i]\n\nYou travel down the Yellow Brick Road to a poppy field. Vermillion poppies with little ebony crown-like centers create what looks like a soft cozy blanket upon the \nflat field. If you smell them, you will certainly curl up and go to sleep. You notice a very small path in the poppy field that is actually walkable. The Emerald City looks \nverdant from an emerald glow and shiny in the background, but you know you must press on in your quest to be a magic user in the region you have selected, the Munchkin \nCountry. \n\n*image poppies.jpg \n\n*choice\n #You decide to stop and smell the poppies. \n  You inhale a big whiff of the poppies and start drifting off to sleep in the field. A mysterious figure dressed in black comes by and murders you there in your \n  sleep. \n\n  The silver slippers take you back a few steps to before you made this poor decision... \n\n  *page_break\n  *goto MunchkinCountry \n\n #You decide to pick some poppies carefully and put them in your pocket. \n  Being careful not to inhale the poppies, you put some in your pocket. You then decide to travel further down the Yellow Brick Road. \n  *set gotpoppies+1 \n  *page_break \n  *goto MunchkinCountry2\n\n #Explore the walkable path in the poppy field. \n  You come across a little castle made of dried-out poppies and twigs, the castle of the Queen of the Field Mice. Her Majesty, dressed in a small metal crown that looks a lot\n  shinier than her grey fur, leaves her castle and attendants for a moment and comes out to greet you. She states, \"I have heard from a message from Glinda that your quest to\n  become a magic user is an urgent one.\" You nod. \n  \n  She says, \"I will not keep you, but I wanted to let you know one thing that my subjects and I discovered when going on a journey. In the the woods where the Cowardly Lion \n  once frequented, we saw a strange flash of white light as if one of my knights were dressed in their spoon armor and the armor reflected the light. We thought it might be \n  some magic, but we could not tell. We saw that someone was dressed as the Wicked Witch of the East in that black dress, black conical hat, and ugly striped socks. We knew \n  it was somebody alive and not a spirit. Anyway, it is a bit of a mystery. By the way, I strongly suggest taking some poppies from my kingdom but not smelling them. My own \n  court magician Blackfurred the Magician uses dried poppies in some of his spell ingredients. Well, I must bid you adieau and wish you the best on our journey.\" \n  \n  You think that as you often like to collect things that she did not have to inform you about the poppies. \n  \n  You thank her and bow slightly to the Queen, and she nods her head at you, scampering back to her castle. \n  *page_break \n  *goto MunchkinCountry\n\n #You decide not to pick some poppies but decide to move on down the Yellow Brick Road. \n  *page_break\n  *goto MunchkinCountry2\n\n*goto ending\n\n*label MunchkinCountry2\n\n[i]Chapter 5 No Lions or Tigers or Bears[/i]\n\nYou come to a gourge, which is now called the Kalidah Gourge. A bridge has been built over it, so you cross it. You click your way on down the Yellow Brick Road\nin your silver slippers. They shine brightly in the afternoon sun and reflect the yellows of the road and the many blue hues that are becoming more and more a part of \nthe landscape as you travel into the Munchkin Country. You almost wish you could find a Kalidah, the part-lion, part-tiger, and part-bear creature. Oh, my, how as a dealer \nin bric-a-brac you could use a loose kalidah tooth or, if your darker instincts push you, a kalidah skin rug or coat.\n\nEventually, you make your way to the forest where Dorothy first encountered the Cowardly Lion. Not far from the Yellow Brick road, you see a glint in the forest. \n\nDo you...\n\n*choice \n #Investigate it and move on.  \n  You see the glint was a shovel and is beside what appears to be a recently covered hole covered in dirt. You dig up some of the dirt and see that there is a \n  dismembered, decomposing leg of a Munchkin there. You know it is a Munchkin leg because of its size, and the foot has a little yet adult-sized blue pointy shoe with a bell \n  on it, which the Munchkins are fond of wearing. You nearly vomit but compose yourself and rebury the leg, deciding to continue on. You know the Cowardly Lion is \n  now the King of the Beasts in a different region. Knowing that the Cowardly Lion is a good and brave animal, you know he never would have torn the leg off of a \n  Munckin. Also, even if he had gone incredibly wrong somehow, you know that he would not have used a shovel but would have used his paws. How the Munchkin leg got there is \n  a mystery. You suspect it might have to do with the former evil ruler of the country or a new evil. Though you are a seller of different objects, the shovel has no appeal \n  to you as it has been used to dig the hole for this dead limb and, of course, you do not want to carry the limb or anything related to it either.\n  *set sawleg+1\n\n  *page_break\n  *goto MunchkinCountry3\n \n #Move on.\n  You ignore the glint in the forest, feeling a little afraid of it like the Cowardly Lion, and continue on down the Yellow Brick Road. Something nags at you that you\n  should have checked it, but you decide to press on. \n\n  *goto MunchkinCountry3\n\n*goto ending\n\n*label MunchkinCountry3\n\n[i]Chapter 6 The Rear Cabin Window of the Favorite Fan[/i]\n\nYou arrive at the former, sparely decorated two-room cabin of the Tin Woodman and enter it. You wish there were more here to pick up and possibly sell. However, you realize\nthat more and more you are beginning to wish that there are more magic objects around you to use for spells. Within the cabin, there is a chair beside an open window with a \ntelescope that points mysteriously further East toward the former castle of the Wicked Witch of the East. Not far from this room is a bedroom (once used for storage) where \nsome belts are on the floor and an axe with dried bloodstains on it sits by. The bed was placed in the cabin after the Tin Woodman lived there because when he had his \nMunchkin parts replaced with metal and tin, he no longer had to rest. After the Tin Woodman's Munchkin body parts were chopped off by his axe enchanted by the Wicked Witch \nof the East and replaced with tin and metal, he no longer needed to eat to live. Therefore, there is not much to his kitchen, which he kept only for visitors, either.\n\n*if sawleg=1\n You wonder if the buried Munchkin leg you found earlier has anything to do with the scene in the bedroom. Surely if it were from the Tin Woodman when he had a \n Munchkin body, it would have been decomposed to bone by now. Still, though, you sense there is some connection between the two. You know at least that the axe had to\n be used to chop something and produce blood.\n *goto continues2\n*else\n You know about the Tin Woodman's origins and wonder about the axe in the bedroom.\n *goto continues2\n*goto ending \n\n*label continues2\n\n*image MissGideyroom.jpg \n\nThere is not much to do here. You have seen a suspicious scene in the bedroom, however. \n\nDo you: \n\n*choice\n #Rest on the bed \n  You rest on the bed and soon fall asleep. Soon, you find yourself strapped to the bed with the belts on the floor. A dark, mysterious figure then begins to use the\n  axe on you. You scream in pain, and everything is a blur.\n \n  *page_break \n \n  The silver slippers take you a few steps back in time to before you made your fatal mistake... \n\n  *goto MunchkinCountry3 \n \n #Look through the telescope to investigate further and help \n\n  You look through the telescope and notice, through the lens, that it was pointed to an open window at the Wicked Witch of the East's house. An identical \n  telescope is pointed in your direction, and all you can see is a glowing red small circle like a cigar being stoked.  \n\n  When you see the sight of the lit cigar in the dark, that dark figure up in the castle, your silver slippers begin to glow... You begin to feel yourself taken \n  back... to a vision of what once happened here... \n\n  A figure dressed all in black like the former Wicked Witch of the East but with some very ugly striped socks used an axe on a Munchkin lady's leg and had a Munchkin \n  tinsmith named KluKlip replace it with heavy metal in the cabin.\n\n  \"It's a little thing I like to call de-Munchkin-ing... you Munchkins are so strong inside and out despite being so small... de-Munchkin-ing is destroying part of \n  your body and that strong Munchkin spirit. So you can never leave me\" spat the person dressed as the Wicked Witch of the East. The person has broad shoulders, and\n  you can smell the stench of a bad cigar on the person's clothing through the magic of the silver slipper as they take you back. They make the vision truly real \n  for you. You can even see that the faux witch is broad-shoulder. She speaks in a screechy falsetto as if she has a much lower voice. You see her shoes and realize\n  that they are Winkie Guard shoes. You suspect that the Wicked Witch of the East is a Winkie Guard from out west dressed as the Wicked Witch of the East. You wonder\n  what he has been doing in the west as well.  \n \n  The deluded female Munchkin adored the figure dressed as the Wicked Witch of the East and said, \"I never would have left you anyway. Just how I am supposed to use \n  the flying-\" (She must have suffered from what some Ozians have called \"Stuck-at-home Syndrome.\" Yes, they are unaware of the Out World's term that sounds just like\n  that and implies falling in love with one's kidnapper.)\n\n  The person dressed as the Wicked Witch of the East screeched, \"Not in front of KluKlip... now if you ever need me or if I need you, we will just signal to each other\n  through the windows, go it?\"\n\n  KluKlip, looking wide-eyed under a hynopsis spell, stood in the cabin after having completed making a metal leg for the female Munchkin and installing it on her. \n\n  The female Munchkin nods... and the vision begins to fade... \n\n  *if sawleg=1\n   You now know where that buried leg came from in the Cowardly Lion's woods and who buried it there. You know how that axe was used and why the Munchkin lady had to \n   be strapped to the bed too. You decide to leave this now awful place and go on down the Yellow Brick Road.  \n   *goto MunchkinCountry4\n  *else \n   You know how that axe was used and why the Munchkin lady had to be strapped to be bed too. You decide to leave this now awful place and go on down the Yellow Brick Road.  \n   *goto MunchkinCountry4\n  *goto ending\n  *set goodpoints+100\n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}  \n  \n  You decide to continue down the Yellow Brick Road.\n  *page_break\n  *goto MunchkinCountry4\n \n #Leave the cabin and continue down the Yellow Brick Road\n  *goto MunchkinCountry4 \n\n #Grab the axe and wait for somebody to enter the cabin and swing at them. \n  Your more wicked tendencies take over, and you grab the axe. You were told not by good witches not to harm or maim others on your journey and risk going on the \n  wicked path. You grab the axe anyway and quietly wait for somebody to come in. Suddenly, a figure dressed in dark witch robes comes in, you take a swing at the \n  person and run, hoping you've killed the intruder. \n  *set wickedpoints+300\n  *set gotaxe+1\n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}\n  *page_break\n  *goto MunchkinCountry4 \n \n\n*goto ending\n\n\n*label MunchkinCountry4\n\n*page_break \n\n[i]Chapter 7 This Place is for the Birds[/i]\n\nYou arrive at the cornfields where Dorothy first met the Scarecrow. Part of the cornfields have been cleared out to make a runway and round-top thatched building\nthat looks like a little cottage mixed with an airport hangar. By a fence on the edge of the hedgerow by one of the fields is a non-alive Scarecrow placed there to\nreplace the living Scarecrow who left the area years ago. The burlap sack for his face is removable without causing him to complain. His clothes are removable as well. \nEven the alive Scarecrow can have his straw scattered here and there and not be harmed, but this one would never even utter so much as groan if you took out his stuffings.\n \n\n*image scarecrow.jpg\n\n*page_break\n\nOn the round thatched building in the clearing in the cornfields, a sign reads, \"Miss Gidey's Flying School.\" There is an open window in the building which also \nserves as Miss Gidey's home as you can see through another open window that there is a bedroom in the school. Behind the school is a clothesline with something on it, but \nyou cannot make out what is hanging on it from here.\n\nTo the left of the flying school, which is actually for Munchkin children, is a domed set of flying monkey bars. The flying monkeys are wrought iron ones linked together by \narms with their wings outstretched being part of their connection to each other. They are linked like Barrel of Monkey toys but are linked more vertically with arms \n, through smelding of wings points together, and with curves at times. They form a repeating pattern in the hemisphere or dome of this playground equipment. Enough \ngaps exist between the flying monkey bars that Munchkin children can grab on to them and climb up the dome.\n\nThe wonderful craftsmanship in this custom-job for the flying school for children could only have been done by the Munchkin tinsmith and inventor Kluklip. He chose\nthe design of the flying monkeys, having heard about the Winkie Country and the kingdom they became enslaved in via the magic cap years ago.   \n\nYou have seen this particular kind of playground equipment throughout Oz, even in the Quadling Country, so this is not too unusual to you despite the \nflying monkey pattern. What sticks out to you,though, is that large crows have covered the entire set of flying monkey bars, just leaving several flying monkey patterns \nrevealed here and there. They make the domed playground equipment look like a shiny ebony hemisphere with their wings. When they flutter their wings while in place, they make \nthe dome, though an illusion, appear to vibrate. All of them are staring with onyx eyes toward Miss Gidey's Flying School while the largest of the crows squawks at them.  \n\nHe squawks, \"Nevermore... nevermore... Nevermore will the faux witch rule! Nevermore... nevermore... nevermore will the winged monkeys fly!\" \n  \nDo you: \n\n*choice\n #Speak with the large crow leader on the domed flying monkey bars.\n  The large crow leader sees your magic user attire and snaps at you with his beak. \"Faux! Faux!... Nevermore! Nevermore!\" You become uneasy as the others stare at \n  you. You back away slowly as the crows return their gaze to Miss Gidey's Flying School.\n  *goto MunchkinCountry4 \n #Go look at the the clothesline.\n  Hanging on the clothesline is a dripping Winged Monkey costume with one of the legs cut off of it from the knee to the foot. You find this very odd indeed. \n  *goto MunchkinCountry4\n #Look in Miss Gidey's bedroom window.\n  Hanging from the ceiling of Miss Gidey's bedroom is a Da Vinci-esque set of flying wings that are much larger than the usual ones as if to compensate for something.\n  You think about why a relatively light Munchkin would have to use more heavy duty wings.\n\n  Sitting on her nightstand is a golden fez which would stay on perfectly atop a bun hairstyle or if someone were to pile their hair into it and hold it on with a \n  bobbypin. The golden fez looks like the ones you heard the Winged Monkeys wore that were almost like receivers, symbols of their slavery, from transmissions from the golden\n  cap that when worn and magic words were spoken, gave the wearer three wishes by the enslaved flying monkeys. This does not look like one of the original fezes. The old you \n  would have loved to have sold something like that.\n  \n  *goto MunchkinCountry4\n #Look in Miss Gidey' classroom window. \n  Munchkin children are being taught how to be Winged Monkeys! On Miss Gidey's chalk-board is an illustration of a Munchkin child in a flying monkey costume complete\n  with Da Vinci flying machine-like wings. The wings shown for the child are quite petite. Hanging from the ceiling by wires is an example of the flying machine/wings\n  the children will use with their costumes. A magic lantern show plays (with no H.M. Wogglebug in sight... the professor bug who was highly magnified by such a machine and \n  thoroughly educated at another school). Notes are on the board with flight instructions. The magic lantern show shows a silent sepia representation of the usage of \n  the wings. Miss Gidey has very short hair on the sides which is just beyond a silvery crew cut and keeps her hair very long on the top. She has put her log hair atop \n  her head into a bun. The teacher walks around the classroom observing the children taking notes and has not noticed you peeking into the window. Miss Gidey has a long stick \n  with her to smack children, so none of them are allowed to day-dream out the window either. You notice Miss Gidey walks with a tha-thump. Looking at her, the hairs\n  on your neck and arms stand up. She has a metal leg! You may have learned quite a lot about her on your journey already. Ordinarily, people who have prosthetic legs  \n  or arms or even the Tin Woodman, who basically has one big prosthetic body to replace his former Munchkin body, do not creep you out. Something about Miss Gidey and \n  this entire set-up does, however.\n  *page_break \n  *goto MunchkinCountry4\n #Leave the area and go on down the Yellow Brick Road further East. \n  *goto crowsblocking\n*goto ending \n\n*label crowsblocking\n\nThe crows begin to fly toward you as you try to leave. \"FAUX! FAUX! FAUX!\" they cry. They begin to peck and stab at you with their beaks. Were it not for your conical\nhat, some of their sharp talons would get caught in your hair, you are sure of it.  \n\nYou retreat back to an area near the flying school. \n\nDo you: \n\n*choice\n #Go up and try to reason with the crows.\n  The big leader of the crows squawks, \"Nevermore... nevermore... will the faux witch rule!\" The crows begin to peck and peck away at you, pecking off your clothes \n  and eventually pecking away your flesh. Eventually, you fall down before the winged monkey bars, looking like a Halloween decoration put out at a playground.\n  *page_break\n  The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n  *goto MunchkinCountry4 \n\n #Dress in the Scarecrow clothes to scare the crows away. \n  You go the area near the side of the fields where the Scarecrow is beside the fence. You dress in this non-talking Scarecrow's clothes. \n\n  You even put the painted burlap sack over your face, making sure to put some breathing holes in it first.\n \n  Going back and waving your arms, you are able to scare the crows away. The big leader of the crows, in fact, seems to have some respect and experience with the real \n  Scarecrow and seems to have been fooled by your disguise. \n\n  You are now able to go further East down the Yellow Brick Road safely. \n\n  *goto MunchkinCountry5 \n\n #Rush to Miss Gidey in her school to tell her. \n\n  Miss Gidey runs out as best she can with the children toward the Munchkin City to safety. The crows seeing you running behind her and the children. They begin to \n  fly out en masse in their black flock. The murder of crows pursues everybody.  \n\n  The big leader of the crows squawks, \"Nevermore... nevermore... will the faux witch rule!\" The crows begin to peck and peck away at you, pecking off your clothes \n  and eventually pecking away your flesh. Eventually, you fall down before the winged monkey bars, looking like a Halloween decoration put out at a playground.\n\n  *page_break\n  The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n  *goto MunchkinCountry4 \n\n #Use the axe to kill the crows, choosing to kill on the wicked path.\n  *if gotaxe=1\n   You swing the axe at the crows, connecting with some, causing a flurry of black feathers, red spurts, and carnage. The rest fly away screaming, \"FAUX! FAUX!\n   NEVERMORE!\"\n   *set wickedpoints+100\n   Your goodness score is: ${goodpoints}\n   Your wickedness score is: ${wickedpoints}\n   *page_break\n   *goto MunchkinCountry5  \n  *else\n   You do not have the axe. \n   *goto crowsblocking\n  *goto ending\n\n*goto ending  \n  \n\n*page_break\n\n*label MunchkinCountry5\n\n*page_break\n\n*image munchkinland.jpg\n\n[i]Chapter 8 Munchkin Land As You've Never Seen It[/i]\n\nYou have entered the Munchkin City. Thatched little houses are here and there as are exotic flowers. A little sign reads, \"Munchkinland.\" You notice that some distance \nbehind it, up on a hill, adult Munchkins have been turned to stone. The city itself seems abandoned.\n\nYour silver slippers begin to glow... \n\nThey show you a vision of someone who looks like the Wicked Witch of the East with that black conical hat and clothes and awful striped socks casting a spell while \nin the Munchkin City. However, the fallen Dorothy house, which has been made into a museum, is not far in the background, so it cannot be the Wicked Witch of the East\ncasting the spell. The house fell on her. \n\nA winged monkey with a metal leg replacing one of its wings has a set of wings that look more fabricated than real, than made of flesh. The wings are also \nover-sized and look more like glider wings with ribbing. The faux Wicked Witch of the East turns many adult Munchkins, the children being presumably back at Miss Gidey's, \ninto stone. The other adult Munchkins, not knowing what to do, abandon their kids back at the flight school and run toward the North to seek out the help of Lacosta, \nthe Good Witch of the North. You feel this vision was not from that long ago.\n \nThe faux Wicked Witch of the East says to the winged monkey with the fake wings, \"Go... now fly! Fly! After them! Pursue them!\" It takes a long time for the \nwinged monkey with the fake wings and the heavy metal leg to get off the ground. The winged monkey had to run down the entire length of the Yellow Brick Road that is \nwithin the Munchkin City itself to get off the ground and finally flies North toward where the other adult Munchkins ran. It has to hold on tightly to its golden fez\nto keep it from falling off of its head despite it being kept on with a bobby-pin. \n\nThe faux Wicked Witch of the East then looks at the Dorothy House in the background and states, \"Perfect... She Who Was Not Maimed's House will be the perfect setting for\nanother of my Fate Hotels to lure tourists in. The Munchkin houses will be perfect little cabins.\" \n\nWith this, the faux Wicked Witch of the East puts her (or his?) hands on a Magic Belt and vanishes away from the area. With this, your vision from the silver slippers ends...\n\n*page_break \n\nDo you: \n\n*choice \n \n #Pick some of the multi-colored flowers\n  You pick some of the many, different colored flowers in the area, making a boquet. \n  *set gotflowers+1\n  *set goodpoints+100\n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints} \n  *goto YellowBrickRoad2   \n #Pick up a Munchkin statue \n  \n  *image Munchkinstatue.jpg\n  \n  As you are changing from being a junk collector to more of a magic user, you really should learn to leave some items alone -- particularly when figurative signs pointed to \n  their being enchanted. \n  \n  As you pick up one of the small statues, you realize that it is still under an enchantment. You begin to feel your feet and then your legs stiffen. Then, you feel\n  your torso do the same. As you reach your last breath, you realize that the spell that turned the Munchkins to stone, the aura of it, is still close around them. \n\n\n  *page_break\n\n  *image becomestatue.jpg\n\n  This is your last thought as you also turn into a statue among the other statues. Looking like a magic user and now a statue, you look like a nice tribute to the \n  faux Wicked Witch of the East as you can still gaze out at the other statues but cannot speak or cry for help.\n  \n  The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n  *goto MunchkinCountry5 \n  *page_break\n\n #Travel further down the Yellow Brick Road. \n  *goto YellowBrickRoad2\n  \n #Travel North up a small, worn trail. \n  *goto Locastahouse \n\n*goto ending \n\n*label Locastahouse\n\nYou have traveled down a small path to an area just north of Munchkin Country. A small white castle, which is more like a old schoolhouse, sits with a small turret tower at its belltower.\nThis is the humble castle of Locasta, who teaches some of the Munchkins here. You can see through a window that the real Scarecrow and Locosta are busily discussing something of great urgency.\nThe door to the little school-house-like castle is locked, and there is a sign on the door which reads, \"Urgent Conference... Please come back later.\"\n\nYou decide it's better to just go back from whence you came. \n\n*page_break \n\n*goto MunchkinCountry5 \n \n*label YellowBrickRoad2 \n\n*image YellowBrickRoad.jpg \n\nThe Yellow Brick Road ends here on its furthest East side and an old craggy trail leading to the former castle of the Wicked Witch of the East looms further east.\n\nSeeing nothing here, you decide to walk on down to the former castle of the Wicked Witch of the East.\n\n*page_break  \n\nAs the Yellow Brick Road has ended, you are traveling down an old craggy trail. It is close enough to the Munchkin City and its former joy that the ominous appearance \nof twisted trees has not started yet. Instead, you see flowering trees and frolicking nature here and there. Nature is something that, despite living in a village, \nyou have never taken the time to enjoy. You were always so busy collecting and selling your junk. You even see an occasional bird tweeting here and there. However, the \nbird's songs all seem more melacholy than that of a dove as if they know that evil has infiltrated the land. \n\n*image munchkinbird.jpg\n\n*page_break\n\n*goto outsideofwitchcastle \n\n*label outsideofwitchcastle \n\n*image witchcastle2.jpg \n\n[i]Chapter 9 Northeast by Northwest Oz[/i]\n\nThe Wicked Witch of the East's castle looks just like the Wicked Witch of the West's, decrepit and gray with a big tower. You notice that a huge garden with heirloom \nvegetables is outside of the castle. The garden was kept up by Munchkin slaves before the Wicked Witch of the East was killed by Dorothy Gale's house falling on her\nfrom the sky. Some rotted tomatoes sit on a vine, and everything else is completely dead. Brown vines, ursine-colored bushy vegetables, and even black, slimey dead \nveggies release a putrid stench in the neglected garden. \n\nDo you:\n\n*choice\n\n #Take some of the rotten tomatoes. \n  You take some rotten tomatoes and walk on in to the castle. \n  *set gottomato+1\n  *goto insidecastle\n  *goto ending\n #Proceed on in the castle. \n  *goto insidecastle\n\n*goto ending\n\n*label insidecastle\n\nYour travel up a a winding, stone staircase upon entering the \ncastle. \n\n*image CastleSteps.jpg\n\n*achieve easterncastle \n\n*page_break\n\nThe faux Wicked Witch of the East, the Winkie Guard in his boots and those horrible striped socks, is trying to push Miss Gidey, dressed as a Winged Monkey with her\nmetal leg sticking out of the place where her costume leg was removed, down the staircase. He points to her DaVinci-esque glider wings and screeches, \"You have not \nbeen flying well at all, and you must get better at flyng to teach the little ones! You will learn to fly just like a baby winged monkey learns to fly... by being pushed \nout of the tree! Well, in this case, the scholarly must fall not from the Ivory Tower but the ebony...E-e-ee-hee-hee!\"\n\nThis Winged Guard must have been taught by somebody much older with a lot of books to speak this way, yet he must have become twisted or demented through how he \nwas raised too.  \n\nThe former Winkie Guard, dressed as a faux Wicked Witch of the East along with a Magic Belt around his waist which must be keeping him able to travel freely between\nregions, prepares to shove Miss Gidey, the Munchkin disguised as the Winged Monkey with glider-esque wings, down the tall tower. \n\nDo you: \n*choice \n\n #Rush up the tower. \n  You rush up the tower but are forced down by the Winkie Guard disguised as the Wicked Witch of the East. You fall to your death and do not see what happens to \n  Miss Gidey as she also falls. At least she has a sporting chance with her wings. \n\n  The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n  *page_break\n  *goto outsideofwitchcastle  \n\n #Throw a rotten tomato at the Winkie Guard disguised as the Wicked Witch of the East.\n  *if gottomato=1\n   *set goodpoints+100\n   *goto nexttowerscene\n  *elseif gottomato=0 \n   You do not have a tomato. You did not pick one. Your fumbling to reach for what is not there has given the disguised Winkie Guard time to attack you and leave\n   you for dead. \n\n   The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n   *goto outsideofwitchcastle \n  *goto ending \n\n #Swing an axe at the arm of the Winkie Guard, going on the wicked path to maim.\n  *if gotaxe=1\n   You connect the axe with the Winkie Guard's arm, leaving a gash in it. He screams and puts his hands on his Magic Belt to retreat, leaving Miss Gidey, disguised\n   as a flying monkey, to fly down the stairwell and out of the castle.\n   *set wickedpoints+300\n   Your goodness score is: ${goodpoints}\n   Your wickedness score is: ${wickedpoints} \n   *page_break \n   *goto magictower  \n  *else \n   You do not have the axe. You chose not to take it earlier and chose to not go further down the wicked path earlier.\n   *page_break\n   *goto insidecastle\n  *goto ending\n \n*goto ending \n\n*label nexttowerscene \n*page_break\n\nThe Winkie Guard disguised as the Wicked Witch of the East tries unsuccesfully to remove all the rotten tomato from his eyes and face. \"It burns!\" he screams. \nHowever, the wetness of the tomato, of course, does not hurt him as he is not a wicked witch, just wicked.\n\nMiss Gidey, disguised as the Winged Monkey, looks at him, seemingly uncertain what to do.  \n\nDo you: \n*choice \n\n #Give her a Munchkin flower boquet.\n  *if gotflowers=1 \n   Miss Gidey smells the flower boquet. While she smells them, the Winkie Guard manages to get the tomato out of his eyes. He forces her down the stairwell anyway\n   and flings you down to die before you are even able to see what happens to Miss Gidey. Flowers flutter through the sky and land in primary color hues, a few of \n   them landing on your face with their soft petals before you die.  \n \n   The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n   *goto nexttowerscene \n  *elseif gotflowers=0\n   You do not have any flowers. The Winkie Guard manages to get the tomato out of his eyes. He forces her down the stairwell anyway\n   and flings you down to die before you are even able to see what happens to Miss Gidey.  \n \n   The silver slippers glow and allow you to take many steps backward in time to before you made this bad decision... \n   *goto MunchkinCountry\n  *goto ending\n  \n #Put poppies in a flower boquet and give them to Miss Gidey.\n  *if gotflowers=1\n   *if gotpoppies=1\n    *goto Gideyasleep\n   *elseif gotpoppies=0\n    *goto beingsentback\n   *goto ending\n  *elseif gotflowers=0\n   *goto beingsentback2\n  *goto ending \n  \n #Go up the tower\n  You rush up the tower but are forced down by the Winkie Guard disguised as the Wicked Witch of the East. You fall to your death and do not see what happens to \n  Miss Gidey as she also falls. At least she has a sporting chance with her wings. \n\n  The silver slippers glow and allow you to take a few steps backward in time to before you made this bad decision... \n  *goto nexttowerscene \n\n*goto ending \n\n*label beingsentback2 \nYou do not have the flowers. The Winkie Guard manages to get the tomato out of his eyes. He forces her down the stairwell anyway\nand flings you down to die before you are even able to see what happens to Miss Gidey. Flowers flutter through the sky and land in primary color hues, a few of \nthem landing on your face with their soft petals before you die.\n   \nThe silver slippers glow and allow you to take many steps backward in time to before you made this bad decision... \n*goto MunchkinCountry  \n\n*label beingsentback \nYou do not have any poppies. The Winkie Guard manages to get the tomato out of his eyes. He forces Miss Gidey down the stairwell anyway\nand flings you down to die before you are even able to see what happens to Miss Gidey. \n    \nThe silver slippers glow and allow you to take many steps backward in time to before you made this bad decision... \n*goto MunchkinCountry \n     \n*label Gideyasleep\nMiss Gidey smells the flower boquet and immediately passes out on the stairs thanks to the poppies. Getting the tomato out of his eyes and seeing that he\ncan no longer push Miss Gidey off the stairwell to make her practice his flying, the disguised Winkie Guard holds on to the magic belt around the waist of \nhis black Wicked Witch of the East robe and retreats to another area of Oz. You suppose that with her heavy metal leg and her heavy wings that he did not \nwant to bother with her either now that she has the added dead weight of sleep. You leave the snorting Miss Gidey on the stairs and proceed up to the former \nWicked Witch of the East's magic tower.\n*set goodpoints+300\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints} \n*page_break\n*goto magictower\n\n*label magictower    \n*page_break\n\n[i]Chapter 10 The Former Spellroom of the Wicked Witch of the East[/i]\n  \nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints} \n\nThe spellroom of the former Wicked Witch of the East contains sparse ingredients as she used most of hers to keep the Munchkins in complete enslavement to her. \nEmpty spell ingredient jars line shelves on her walls. Most of the books on her shelves revolve around magic agriculture and hypnotic powers. She also \nhas a copy of the Seers and Rogue-bucks catalog among her books, which is opened to the pantyhose section where she ordered those awful striped ones \nshe loved to wear as well as black robes and capes for her younger sister and her. A very high shelf, placed such that Munchkins could not reach it, contains some jars of \nheirloom seeds from the Vegetable Country. The Wicked Witch of the East obviously had stolen these valuable heirloom seeds from heirloom vegetables of the royals \nof the Vegetable Country and used them to plant gigantic vegetables for her own stewed vegeterian dishes.  \n\nA gigantic spellbook, heavier than the Book of Records but bound with paperbirch stained the color of rotted, blackened blueberries, sits atop a bonzai tree with long \nmagical roots that thrive in a magic patch of soil on the bottom of the tower. Her spellbook sits atop a stunted tree but with long, ancience roots, in other words.\n\nThe spellbook is turned to a page that shows one how to control agricultural objects to hurt people or to help them. This was a specialty of the Wicked Witch of \nthe East, and she used it to turn the former Munchkin who would become the Tin Woodman's axe on him so much that he had to be completely replaced with metal and \ntin. \n\nYou read that page of beginner spells and thanks to the power of the silver shoes feel confident in casting them again and again.\n\nOnce again, however, in your quest to become a magic user, you have the choice to make between being wicked or good. Ultimately, your decisions will make you forever named \nthe Wicked ${magicgender} of the Northeast or the Good ${magicgender} of the Northeast.\n\nAs ${name} , ${magicgender} of Yet Fully Undetermined Goodness or Wickedness of the Northeast, with the power of your silver shoes and the spellbook,  \n\ndo you:\n\n*choice \n\n #Cause a hoe to do some hoeing for the Munchkins with a magic spell from the book.  \n  A hoe is controlled by you from this distance and tills the earth for the Munchkin to help with the gardening. Your heart is filled with goodness.\n  *set goodpoints+100\n  *achieve novicemageeast  \n  *goto magictower2\n #Cause a hoe to chop a finger off of a Munchkin with a magic spell from the book.  \n  A sharp hoe is controlled by you and chops off the finger of a Munchkin. You cackle wickedly.\n  *set wickedpoints+100\n  *achieve novicemageeast\n  *goto magictower2\n*goto ending \n\n*label magictower2 \n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints} \n\nYou decide whether to continue using magic to help the Munchkins or harm the Munchk?ins, either way by controlling their objects.\n\nDo you:\n\n*choice\n\n #Cause some pruning shears to prune some non-talking apple tree branches.\n  The pruning shears auto-matically prune some non-talking apple tree branches. Your heart is filled with joy.  \n  *set goodpoints+100\n  *goto magictower3 \n #Cause some pruning shears to cut off two fingers off of a Munchkin.\n  The pruning sheers cut off two fingers from a Munchkin. You scream with wicked delight. \n  *set wickedpoints+100\n  *goto magictower3    \n*goto ending\n\n*label magictower3\n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints} \n\nYou continue by practicing and mastering the controlling objects spell.  \n\nDo you: \n\n*choice\n #Cause an axe to chop down a rotted, non-talking apple tree on its own. \n  The axe starts chopping mid-air, much to the amazement of the Munchkins. Soon, it has felled the rotted apple tree, and the Munchkins rejoice. You are exceedingly\n  glad that you have helped them. You have felt your magic power grow.\n  *set goodpoints+300 \n  *achieve experiencedmageeast\n  *goto magictower4\n #Cause a Munchkin's axe to chop off all of the body parts of a Munchkin. \n  The axe begins to chop, and the Munchkin screams. Soon, the screaming has stopped, however. KluKlip, Munchkin tinsmith, is available to help the Munchkin by \n  replacing his missing parts with metal and tin. This makes you want to utter some curses. Nevertheless, your damage is done, and the new Tin Woodman will no \n  longer be a Munchkin again. You feel your magic power grow after you have accomplished this.  \n  *set wickedpoints+300\n  *achieve experiencedmageeast\n  *goto magictower4 \n*goto ending\n\n*label magictower4\n\n*page_break\n\n[i]Chapter 11 Spell it Out To Them[/i]\n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints} \n\nThe spellbook in the spellroom senses that you have gained power and turns to a new page. \n\nThis one allows you to either control Munchkins' minds for evil or to make suggestions to them through messages for good.\n\nYou glance up at the heirloom seeds on the shelves and wonder what they were for, but you suppose that this mystery will soon be answered.\n\nDo you: \n\n*choice\n\n #Control the Munchkin children disguised as Winged Monkeys and made them do your bidding.\n  You control the Munchkin children who are Miss Gidey's Flight School. You have them fly around your castle and keep away intruders, bringing any who intrude to\n  you to be dealt with.\n  *set wickedpoints+300\n  *goto magictower5\n #Whisper magic messages to Miss Gidey, encouraging her to release the children and stop her Winged Monkey charade. \n  You keep whispering magic messages to Miss Gidey, kind suggestions that she stop doing what she is doing and why. Your kind suggestions actually touch her heart,\n  and she stops participating in the Winkie Guard's malignant plan, something she was questioning during the latest confrontation anyway. You still think she\n  deserves to be punished in a just way somehow. However, trying to explain all of this to Glinda in a magic message would be too complicated.\n  *set goodpoints+300\n  *goto magictower5  \n*goto ending\n\n*label magictower5\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints} \n\nYou sense that you are to make an ultimate decision with the mind control or good messages which will seal your fate as a wicked magic user or good magic user\nforever.\n\nDo you: \n\n*choice\n\n #Control the Munchkin children disguised as Winged Monkeys to maim the other Munchkins.  \n  Doing the near unthinkable, you have the Munchkin children, under your mind control spell, maim the other Munchkins, the adults who did not escape to Locasta. \n  You cannot get past Locasta's magic kiss protection spell that she put on the others. The Munchkin children, incognito as flying monkeys, swoop down at the \n  Munchkins who chose to stay on the borders of the Munchkin Country and drop them from great heights, maiming them or, at times, killing them. You screech at \n  having made children do such horrible things. You are beyond the green.\n  *set wickedpoints+1000\n  *goto magictower6\n #Whisper magic messages to the Winkie Guard, disguised as the Wicked Witch of the East, to turn himself in to Glinda. \n  The more you looked at the Winkie Guard disguised as the Wicked Witch of the East all in dark witch garb, the more you realized Glinda thought you were him\n  when you were doing everything in Quadling Country as a fake ${magicgender}. That is why she first summoned you and allowed you to do all that you did so that you\n  could be better tracked. It was all a case of confused identity. The Winkie Guard, who has been hiding out in the old Tin Woodman's cabin, receives your \n  message. You have to repeat it several times to convince him that it is the best things to do. He leaves the cabin immediately, using his Magic Belt to \n  transport to Glinda's palace in the Quadling Country. Glinda removes him of his garb there and sends him to the play-room dungeons of the Emerald City to \n  pretend to be a guard there and have fun in his intended role for the rest of his days. Play is used as a form of rehabilitation in the magical fairy land, \n  after all.   \n  *set goodpoints+1000\n  *goto magictower6\n*goto ending \n\n*label magictower6 \n\nYour goodness score is: ${goodpoints}\nYour wickedness score is: ${wickedpoints} \n\n[i]Chapter 12 Alls Spell That Ends Spell[/i]\n\nYour silver slippers are glowing even more radiantly now. You feel power coursing through your veins. Your last decision sealed your fate as did other decisions\nalong the way.  \n\n*if goodpoints>wickedpoints\n You are now ${name} , Good ${magicgender} of the Northeast. Your final spell and last decisions before you are confronted will be based on that.\n *goto goodMunchkinending2\n*else\n You are now ${name} Wicked ${magicgender} of the Northeast. Your final spell and last decisions before you are confronted will be based on that.\n *goto wickedending2 \n*goto ending \n\n*goto ending \n\n*label goodMunchkinending2 \n\nBelow your window, in the courtyard, you hear the many tinkling of bells, bells, bells... bells on Munchkin hats and bells on Munchkin shoes. A blur of blue\nis below and fiddle music plays loudly as the Munchkin adults and children rejoice that a good ${magicgender} has taken over the castle of the former Wicked Witch\nof the East. \n\nSuddenly, in your spellroom, a puff of chalkdust appears and Locasta, Good Witch of the North, with her magic slate at her side has Miss Gidey, dressed as a \nwinged monkey, in tow. Locasta adjusts her white gown and white conical hat before speaking. She stretches her aging body a little. \n\nLocasta says, \"Congratulations on being the good ${magicgender} of the Northeast. I think it's best to call you that as the witch's castle always was more in the \ndirection of the Northeast and to distinguish you from the former Wicked Witch of the East. I am sure we will be working together for quite some time... but, \nahem... for now... there is a little matter to attend to.\"\n\nLocasta's magic chalk writes on her slate, \"Decide what to do with Miss Gidey. What should you do?\" (Locasta turns to you expectantly.) \n\n*choice \n #Make her live in her Winged Monkey suit forever, having her serve you in your castle as punishment.  \n  Locasta stated, \"That was not the choice I would have made, but very well... Miss Gidey will stay here forever in your castle. I am not so sure that is a good\n  idea as, through enchantment, she was best friends with the Wicked Witch of the East and encouraged the visiting Winkie Guard to be just like her just as the Winkie Guard \n  encouraged her to be a Winged Monkey for him, a kind of cos-play dependent relationship if you will. (Locasta had heard of cos-play through magical studies of the Out World\n  and was not quite sure what it was but knew it involved Out Worldians dressed as Ozians or other fantasy characters and pretending to be them... You, however, \n  are very confused, having never heard of it.)\"\n\n  With your decision having been made, Locasta kisses Miss Gidey and you on the forehead for benevolent magic protection, bids you both adieau, and disappears\n  in a puff of chalk dust that makes you both cough. \n \n  *goto goodending2continues\n #Remove the Winged Monkey suit from Miss Gidey and make her perform community service, restoring Munchkinland to its former glory. \n  As you remove the Winged Monkey suit from Miss Gidey, you tell her, \"At some point, I am sure you were a good Munchkin woman. Return to how you once were \n  before the witched witch, before becoming this enslaved flying monkey. Miss Gidey exclaims, nearly jumping from the loose long-johns she had underneath it \n  despite her metal leg, \"I'm free! No longer do I have to be something I do not want to be!\" \n\n  Locasta explains, \"Through enchantment, Miss Gidey was best friends with the Wicked Witch of the East and encouraged the visiting Winkie Guard to be just like her just as \n  the Winkie Guard encouraged her to be a Winged Monkey for him, a kind of cos-play dependent relationship if you will. (Locasta had heard of cos-play through magical studies \n  of the Out World and was not quite sure what it was but knew it involved Out Worldians dressed as Ozians or other fantasy characters and pretending to be them... You, \n  however, are very confused, having never heard of it.) However, I think that the kindness and trust you have shown toward her and the encouragement you have shown her\n  to be who she really is will work wonders.\"\n\n  Locasta then places a protective magic kiss on both of your foreheads.  \n\n  You explain that Miss Gidey and you both have much work to do, so Locasta bids you both farewell and disappears in a puff of chalkdust.   \n\n  *set goodpoints+300  \n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints}  \n   \n  *goto goodending2continues \n*goto ending\n\n*label goodending2continues\n*page_break\n\nThose heirloom seeds from the Vegetable Country that the Wicked Witch of the East had in her lab have come back to haunt you. An Army of living tomatoes, cucumbers,\nsquash, and other vegetables are marching in an produce-ious army toward your castle to retrieve their stolen property. They want their seeds back. You look at \na label on one of the containers of the heirloom seeds, and it reads, \"Quick growing.\"\n\nDo you:\n\n*choice\n\n #Send Miss Gidey to plant the quick-growing heirloom vegetable seeds in the garden in front of the castle to start an army of your own.\n  Miss Gidey plans the quick-growing heirloom seeds. The wizened seeds produce the finest tomatoes, cucumbers, corn, and squash, and they prepare for battle. There\n  are hundreds of vegetables outside your castle now, and the Vegetable Country Army will not battle them because they come from precious heirloom seeds. The \n  Vegetable Country resents you and does not look upon you as very much of a good ${magicgender} from now on.\n  *goto goodending2finish\n\n #Send Miss Gidey to return the heirloom vegetable seeds to the Army of the Vegetable Country. \n  Many in the Army of Vegetable Country weep vegetable juice upon the return of the precious heirloom seeds. They cheer among themselves how good the new ruler\n  of the Northeast it. They will repeat your name and title, ${name}, Good ${magicgender} of the Northeast, in their berry ballads for many seasons to come. Their\n  seeds being returned, the Army of the Vegetable Country retreats back to their sub-terrenean country accessible via the Munchkin Country. \n  *set goodpoints+300\n  Your goodness score is: ${goodpoints}\n  Your wickedness score is: ${wickedpoints} \n  *goto goodending2finish\n \n\n\n*goto ending\n\n*label goodending2finish \n\n*achieve experiencedmageeast\n\nIn the annals of the Book of Records, you will henceforth and forevermore be known as ${name}, Good ${magicgender} of the Northeast, and your benevolence and \nheroism will be known through all the Land of Oz. Miss Gidey continues to help you restore good order back to the Munchkin Country. Her old flight school is\nconverted into a regular school to give Munchkins lessons in reading, writing, arithmetic, and benevolent magic.\n\nThe Munchkins make up songs about you and sing about you in various ditties during their celebrations between planting and harvest times. \n\nYou never would have guessed that as a simple Quadling villager that after bluffing your way through being magical at first that you would end up here. Yes, you were \nconfused with somebody else for a while. However, you have truly become your own person and have forged your own path. \n\nAs it has been a very long day, you recline for a moment on your throne and dream of what magical, wonderful opportunities the future holds for you and all of \nthe Munchkin Country. \n\n\n*goto ending \n\n\n*label wickedending2\n\nYou have to use your magic power on inanimate objects to close the castle gate because Munchkins have stormed the castle in protest at your wickedness. They grew\nway too weary of having to deal with a tyrannical evil ruler in the past, have had to go through much with the latest usurper, the Winkie Guard dressed as their \nformer enslaver and Miss Gidey, and are fed up. The bells on their hats and shoes make a chaotic sleigh bell rhythm as they march up and down the castle walls \ntrying to figure out a way in.  \n\nSuddenly, in your spellroom, a puff of chalkdust appears and Locasta, Good Witch of the North, with her magic slate at her side has Miss Gidey, dressed as a \nwinged monkey, in tow. Locasta adjusts her white gown and white conical hat before speaking. She stretches her aging body a little.\n\nLocasta says, pulling up her sleeves, \"Now to see what to do with you, ${name}, Wicked ${magicgender} of the Northeast. You were not even supposed to be the one \nthat Glinda, that silly girl, was going after. It seems you have been part of a case of mistaken identity. Glinda thought she was pursuing the crazed Winkie Guard\nwho thought he was the Wicked Witch of the West and East when she saw you in your magic outfit and saw you performing acts of magic. She thought perhaps he was\ntrying to take over Quadling Country too with his use of the Magic Belt and his ability to make people follow him down the dark path. Anyway, you have clearly become\nas wicked as he was. Yes, yes... what to do with you.\"\n\nYou are unable to get to the magic book in the spellroom or the heirloom seeds right now. Locosta blocks your way.\n\nShe looks at her magic slate which hovers before her.  \n\nDo you:  \n\n*choice\n\n #Enchant an axe and use it on the slate. \n  *if gotaxe=1\n   The axe cuts right through the magic slate. Locasta looks devastated as you cackle. She cries, \"I shall have to make a new one of those, and it takes a long \n   time and a lot of conjuring. You truly are the Wicked ${magicgender} of the Northwest. She disappears along with Miss Gidey in a puff of chalk dust, vowing to \n   return to deal with you one day. \n   *goto wickedending2continues\n  *else\n   You do not have an axe.\n  \n   The silver slippers magically direct you back in time to where you could obtain the axe.    \n\n   *goto MunchkinCountry3 \n  *goto ending\n #Throw rotten tomatoes at the slate to distract Locasta and free Miss Gidey, the prisoner. \n  *if gottomato=1\n   You throw tomatoes at the slate like a bad child throws a wad of paper at the chalkboard when the teacher's back is turned. Locasta turns to you and clucks \n   her tongue. She purses her lips beneath her white hat and says, gazing at her magic slate which gives her advice, \"Now what I am supposed to do?\" She cannot \n   see any advice there because of the obstruction of the red debri, and her magic chalk cannot write on the board.\n\n   With Locasta distracted, you are able to free Miss Gidey, dressed as a Winged Monkey, and she agrees to be your servant in your evil doings. Locasta vows to \n   return one day and disappears in a poof of chalk dust. \n\n   *set gotgidey+1 \n   *goto wickedending2continues\n   *goto ending\n  *elseif gottomato=0\n   You do not have the tomatoes.\n\n   The silver slippers magically direct you back in time to where you could obtain some.  \n\n   *goto outsideofwitchcastle   \n  *goto ending\n #Turn yourself in to Locasta. \n  Your evil magic and your bid to take over the former throne of the former Wicked Witch of the East is now over. You had come so far from your humble origins as\n  a Quadling villager only to give up at the end. You are sent to the play dungeons of the Emerald City where you play games related to being a good magic user. \n  \n  The silver slippers magically backtrack and give you another chance to make another decision.  \n\n  *goto wickedending2 \n\n*goto ending\n \n\n*label wickedending2continues \n   \n*page_break \n\n*if gotgidey=1 \n Miss Gidey, still dressed as a winged monkey, assists you in most of your vile plans as you continue your wickedness. She seems all too eager a pupil, and you \n encourage her to explore her evil side while still being totally subserviant to you.\n *goto wickedending2continuesmore\n*else \n You have decided to continue your wicked plans as a solitary vocation.  \n *goto wickedending2continuesmore\n*goto ending\n\n*label wickedending2continuesmore\n\nThe Munchkins are still clamoring at your gates. They have cut down a tree and are using it as a battering ram on your gates. All below your window is a blur of \nMunchkin blue clothes and occcasional micro-scopic glints from their decorative bells in the light. BAM! You brace yourself. \n\nSuddenly, marching not far behind the Munchkins, you seem, from this distance, the even tinier, Vegetable Country army. The members of the Celery are in in the front ranks. \nBehind them are more root soldiers. Not far behind them in higher ranks are the Currants. Currant Sour screams at them to march forward. They are angry that the former \nWicked Witch of the East used their precious heirloom seeds and see you as her heir apparent. \n\nDo you: \n\n*choice\n\n #Enchant the Munchkin's own weapons to fight off the Munchkins.  \n  You enchant the Munchkins own weapons to fend them off. Their own axes and swords attack them, leaving much injury and cannage. Soon, the Munchkins retreat.\n  *goto wickedending2final \n #Have the heirloom seeds from the spellroom planted and enchant them to grow quickly. \n  The heirloom seeds grow into monstrously large talking vegetables with the wisdom of ages but the strength of new creations. They use natural weapons such as \n  whip vines and thorns to keep the Munchkins at bay. Soon, the Munchkins retreat.\n  *goto wickedending2final\n*goto ending \n\n*goto ending\n\n*label wickedending2final \n\n*page_break\n\n*if gotgidey=1 \n Miss Gidey, still dressed as a winged monkey, continues to assist you in most of your vile plans as you continue your wickedness. She helped with some of your \n plans to defeat the Munchkins. Now, you have much bigger vegetables to fry.\n *goto wickedending2final2\n *goto ending \n*else \n You have decided to continue your wicked plans as a solitary vocation.  \n *goto wickedending2final2\n*goto ending\n\n*label wickedending2final2\n\nThe Vegetable Country Army has now reached your gate. They have picked up the fallen tree the Munchkins left and are using it to beat down your gate. The Celery\nare crisply making short work of the gate. The root soldiers are starting to dig beneath the gate itself. \n\n\nDo you: \n\n*choice \n\n #Command the heirloom vegetables to attack.  \n  The heirloom vegetables will not attack their own kind from the Vegetable Country. The vegetables manage to break in and storm up your tower. They decide to do\n  something they have seen witches and wizards do to their own kind many times. They decide to make you into a nice stew. Gathering together a cauldron and plenty\n  of water, they place it on a roaring fire. They throw you in the boiling water. You scream, \"I'm boiling! I'm boiling. What a world... what a world when some\n  little vegetables like you could get rid of my wickedness... boiling... boiling... Ooooo.\"\n\n  The magic silver slippers backtrack and allow you to make a better decision... \n\n  *goto wickedending2final\n\n #Enchant the Vegetable Army's swords to turn on them. \n\n  They slice. They dice! They chop! The enchanted swords make short work of the vegetables, and you decide whether you would like to have a nice salad or some \n  vegetable soup for dinner.\n  *set wickedpoints+100 \n  *goto wickedending3final\n*goto ending \n\n*goto ending\n\n*label wickedending3final\n\n*page_break\n\nWhether you have earlier or not, you decide to plant more Heirloom Vegetables. You spend the rest of your days pulling puppet strings in a wicked way in Munchkin\nCountry. One of your favorite things is to play constant daily games of what you call Plants Versus Munchies in which you strategically place heirloom alive vegetables\nin front of your castle as the Munchkins occasionally rebel, sicking the plants on the Munchkins in droves and watching them fall as they are splattered with tomatoes\nor strangled with vines.\n\nUsing your control of inanimate objects throughout the land, you reinforce the former slavery of the Munchkins, and they are subjugated to you. \n\n*if gotgidey=1\n Miss Gidey serves as your Head Winged Monkey, a nuevo-Nikko for Northeast Oz, and she continues to train the Munchkin children to be winged monkeys for you. You\n use the faux Winged Monkeys to enforce order amongst the older Munchkins and keep them under your evil thumb. You have basically stolen the former Winkie Guard's\n evil plan from him and use it to your advantage. \n *goto wickedending4final\n *goto ending \n*else\n You continue to make many plans on your own, wondering what it would have been like if you could have obtained Miss Gidey to help you. \n *goto wickedending4final\n*goto ending\n\n*label wickedending4final\n\n*achieve experiencedmageeast\n\nThe Book of Records shall henceforth and forever more have you listed as ${name}, Wicked ${magicgender} of the Northeast, and wherever your name or title is \nspoken in Oz, fear is struck in the hearts of those who utter it.  \n\nLocasta comes to battle you from time to time. Most of the times it is a draw, and you continue to develop your dark arts more and more with the spellbook of the \nformer Wicked Witch of the East as well as using the power of the silver slippers. Glinda had hoped they could be used to identify your location and control you\nmore when she, regardless of how you obtained them, allowed you to take them. She had no idea you would go this far. Glinda and Ozma leave Locasta to deal with \nyou and keep you at bay and become resigned to having a new wicked magic user in Oz.\n\nAs you sit back on your throne, occasionally choking a Munchkin who is not doing enough to bring you his crops or zaping one who just refuses to cooperate (there is no \nrest for the wicked), you cackle to yourself that you never thought that such a humble Quadling villager would become such a prideful, evil magic user. You feel\nnow that you glean more respect with your power, and it does not bother your conscience at all that you squash people who are as you once were under the weight \nof your mighty, magnificent shoes. \n\n*goto ending \n\n*label ending\n\n*page_break End\nWe hope you've enjoyed playing [i]NE By NW Oz.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n\n\n", "startup": "*title NE By NW Oz\n*author Ron Baxley, Jr. \n\n*scene_list\n  startup\n  $ rest_of_game\n\n*create goodpoints 0\n*create wickedpoints 0\n*create costume 0\n*create goodpath 0\n*create wickedpath 0\n*create gothead 0\n*create magiccrochetneedle 0\n*create sawwitchcostume 0\n*create metalheart 0\n*create gotmetalheart 0\n*create sawwitchpainting 0\n*create fakedmydeath 0\n*create Winkiegirldead 0\n*create sentwoozyfirst 0\n*create sentbeesfirst 0\n*create sentwolvesfirst 0\n*create sentplowersfirst 0\n*create sentseedsfirst 0\n*create sentseedplantersfirst 0\n*create sentharvestersfirst 0\n*create gotpoppies 0\n*create sawleg 0\n*create gotaxe 0\n*create gotflowers 0\n*create gottomato 0\n*create throwtomato 0\n*create gotgidey 0     \n\n*create name \"\"\n*create gender \"\"\n*create location \"\"\n\n*create gs \"\"\n*create gn \"\"\n*create gp \"\"\n*create pp \"\"\n*create magicgender  \"\"\n\n*comment *achievement explanation visible 100 Really Only 500 Points Can be Obtained Each Gameplay\n*comment        Approximately half can be found on one major path and approximately half can be found on another\n*achievement glindaspalacearrival visible 100 Gliding into Glinda's Place \n       Find a way to make it to Glinda's Palace\n*achievement stealshoes visible 100 Snatch the Silver Slippers\n       Steal the silver slippers\n*achievement askforshoes visible 100 Request the Silver Slippers\n       Ask for the silver slippers politely \n*achievement westerncastle visible 100 A Western Mage's Home is His or Her Castle \n       Make it to and Find the castle of the former Wicked Witch of the West\n*achievement easterncastle visible 100 An Eastern Mage's Home is His or Her Castle \n       Make it to and Find the castle of the former Wicked Witch of the East\n*achievement novicemagewest visible 100 Cutting Teeth on the Spell-stand out West\n       Casting your first set of major spells in the west \n*achievement novicemageeast visible 100 Cutting Teeth on the Spell-stand out East\n       Casting your first set of major spells in the east \t   \n*achievement experiencedmagewest visible 100 Beginning to Master the Spell-book out West\n       Casting your second set of major spells in the west\n*achievement experiencedmageeast visible 100 Beginning to Master the Spell-book out East\n       Casting your second set of major spells in the east\t     \n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  Become a village junk collector with high, magic ambitions to rule in Northwest or Northeast Oz. Multiple cases of mistaken identity involve everybody in Oz from the original L. Frank Baum Oz characters to even yourself. You will be thrust into intrigue and suspense at every turn as you try to replace the dead Wicked Witch of the West and Wicked Witch of the East.\n\n  [i]NE By NW Oz[/i] is a 30,000 word interactive novel by Ron Baxley, Jr., where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n  *if choice_prerelease\n    [i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n    *choice\n      #Sign up to be notified when the game is available.\n        *subscribe {\"now\": true}\n        *restart\n      #Play the first three chapters now for free.\n        *goto purchased\n\n  [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase_discount adfree 2018-05-08 $2.99 $1.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n\n[i]Chapter 1 Introducing the Newest, Potential Magic User of Oz[/i]\n\nNorthwest Winkie Country in Western Oz is in need of a new magic user after the Wicked Witch of the West had that unfortunate hydro-accident with that Kansas tourist in her \ncastle. Northeast Munchkin Country in Eastern Oz is in need of a new magic user too after the Wicked Witch of the West's sister, the Wicked Witch of the East, had a little \naccident with the Kansas tourist's house which came flying in to Oz via tornado, the only way to travel. You long for either job.\n\nYou are a common villager in the Quadling Country in Southern Oz, have always wondered what it would be like to be a magic user, and have longed to go on an adventure to \nbecome one. As you decide to become a magic user, you will need eventually to determine if you are going to be more wicked or more good in your quest. Unfortunately, you are a\nlong way off from being a mage and will need to learn how to be one or even who to seek to be one. Except for the common red rags you wear, you have the lean, tall look of a \nuser of magic. You have those high cheekbones and an androgynous look about you and still look quite young despite being in your late thirties to early forties. \n\n*page_break\n\nPeople think you are either too hard or too soft for your gender. This certainly throws them a bit aback when they see your job as the village junk collector. (Quadling \nresidents seldom ask you your gender and just conduct business with you, but someone further on your journey will. He or she will want to know a lot more about you than \nthese villagers  who could certainly care more for you.) You collect junk and resell it at the open market as your father before you did and his father before him did and so on. \nCollecting things will prove of use to you on your journey. In your quest, take everything you can (and even some things you should not if you choose to steal and be wicked). \nThink of more creative, magical uses for objects. Choose your actions carefully as some may lead to death and having to re-walk a path. Enjoy your quest to become a good or wicked magic user in ... \n\n*page_break\n\n*image title.jpg\n \n\n*page_break\n\n\n*label pub\n\nIn a pub in a village in Quadling Country, you are bragging to some people that you are a magic user. However, you are just a common Quadling villager. You look as common \nas the other Quadlings in their red farmer attire with their dirty hands soiling the pint glasses here and there. You sell odd junk that you find in the village but have \nalways wanted to do more with your life. That is why you are bragging about being a magic user in this pub. The pub you are in is decorated with red tapestries and was \nconstructed from shiny red-wood the owner was careful not to take from talking trees. The pub-goers guffaw at how soft you look in such a rowdy place of hard people. The blood-like\ntinge of the red-wood and tendency to use red in the decor, unlike some places in Quadling Country, gives this particular place an aire of aggression. The common pubgoers here, mostly \nlarge farmers, look like bulls ready to charge at the color that surrounds them. \n\n*page_break\n\n*if costume=0 \n One of the morbidely obese blow-hards in the pub, dressed in a fancy yet tight red suit and vermillion newsboy cap, says after your continous bragging, \"You don't look like a \n wizard or even a witch in those rags. Where's your wand, eh?\" He stands and hulks over you with broad shoulders that almost bust through his suitcoat. \n \n You decide to... \n *choice\n   #Punch the guy in the nose.\n    The chubby guy and his friends pummel you, and you are left black and blue. You are no longer seen as a mage at all after you resorted to such violence, and you \n    are left nursing your injuries for quite some time. To add insult to injury, the heavy-set guy in the fancy red suit was mayor of the Quadling village in the county\n    of the Land of Oz. You should have recognized him and thought of something wittier. You thought with your fists and paid for it. \n    \n    Someone, as if by magic not of your own, allows you to retrace your ill-placed steps and try again...\n    *page_break\n    *goto pub\n    *finish\n   #Pull a rare coin from the guy's ear.\n    The chubby guy blows steam from the corner of his mouth and says, \"You're going to have to do better than that. Even my 10 year old can do better.\" He wipes \n    grease from some of the ready-fried, aquarium plant-fish on his napkin. (Ready-fried aquarium plant-fish are vegetarian versions of fish so that not many fish are \n    harmed in Oz and are similar to the simulated meat that grows within lunchbox tree fruit.) The blowhard chugs a pint of red ale and turns his attention away from you. \n    *page_break \t\n    *goto pub\n    *finish\n   #Retreat back to your house to think this through.\n    *goto house  \n   #Pull a rabbit from a hat. \n    You grab the chubby guy's red newsboy-style cap and reach into it. You manage to knock his plate of rare-bit into the hat. You pull it out and sarcastically say, \n    \"Ta-da! I managed to pull a rare-bit from a hat!\" The large guy is infruriated that you have ruined his hat, and he and his friends pummel you, and you are left black \n    and blue. You are no longer seen as a mage at all because you appeared to not have the skill. Perhaps appearance in this case was truly everything. \n    \n    Someone, as if by magic not of your own, allows you to retrace your ill-placed steps and try again...\n    *page_break\n    *goto pub\n    *finish\n   #Start off early on a journey to Glinda's Palace to become a mage despite not looking like one.     \n    *goto pathtoGlindas \n*else\n    You look like everybody else in the pub but with a few exceptions. You still have that androgynous, lean look. Also, you have donned your conical ebony hat, \n    and its little green flecks shine in the sunlight coming in the pub's window. Your leathery black robe blows slightly in the doorway as you come in with dramatic effect.\n\n    The blow-hard, the portly guy in the pub, says, \"Now, you look like a magic user! Now do some magic!\"\n    \n    *label nowmagicuser\n    \n    You decide to... \n    \n    *choice\n     #Leave the pub and start off on journey to Glinda's Palace somewhat early.     \n      *goto pathtoGlindas  \n     #Pull a rare coin from the guy's ear.\n      The chubby guy blows steam from the corner of his mouth and says, \"You're going to have to do better than that. Even my 10 year old can do better than that.\" He wipes \n      grease from some of the ready-fried, aquarium plant-fish on his napkin. (Ready-fried aquarium plant-fish are vegetarian versions of fish so that not many fish are \n      harmed in Oz and are similar to the simulated meat that grows within lunchbox tree fruit.) He chugs a pint of red ale and turns his attention away from you.  \n      *goto nowmagicuser\n     #Pull a rabbit from a hat. \n      You grab the chubby guy's red newsboy-style cap and reach into it. You manage to knock his plate of rare-bit into the hat. You pull it out and sarcastically say, \n      \"Ta-da! I managed to pull a rare-bit from a hat!\" The large guy is infruriated that you have ruined his hat, and he and his friends pummel you, and you are left black \n      and blue. You are no longer seen as a magic user at all because you appeared to not have the skill. Perhaps appearance in this case was truly everything. \n           \n      Someone, as if by magic not of your own, allows you to retrace your ill-placed steps and try again...\n      *page_break \n      *goto nowmagicuser\n      *finish\n\n     #Put the silver crochet needle through the guy's skull. \n      *if magiccrochetneedle=0\n        You try to put the silver crochet needle through the guy's skull, but it is not an enchanted object. It stabs him in the head, and he slaps your arm away with a chubby arm. One of his idiotic friends says, \"Guess you weren't strong enough or powerful enough to do it, eh?\" The blowhard and his friends descend upon you and beat you into a bloody pulp. You will not be seen as a magic user if you cannot handle such a simple feat of magic. Somehow, you think you missed something along the way. Perhaps you can take another path to make up for it.  \n      *if not(magiccrochetneedle=0) \n        You easily put the silver crochet needle just under the guy's red newsboy cap and it comes out of his skull on the other side. You remove it quickly. He and his friends are amazed and are speechless for once. \n      *goto transitiontoGlinda  \n     #Wave the silver crochet needle above the guy.\n      You try to turn the chubby guy into a toad by waving the crochet needle on him. Nothing happens. He rolls his eyes and says, \"Looks like your magic wand doesn't work.\"\n      *goto nowmagicuser\n     \n*label pathtoGlindas\n\n*image Oztree.jpg\n\nYou find yourself on a rocky, dirty trail to Glinda's Palace. Some trees, which seem to be watching you and frowning, are on either side \nof the path. They are alive trees that do not have apples but are living, talking oaks that have been guarding the edge of Quadling Country for hundreds of years.\n\nWhat do you decide to do? \n\n*choice\n #Give them wide berth.\n  You give wide berth to the trees and manage to get past them. One of them throws a small branch at you to try to hit you. You\n  pick it up and decide to make it look like a wand eventually.\n  *goto GreatWallofChina\n #Stop and talk with the trees. \n  They claw at you with their branches and try not to let you pass. You retreat further back on the path from them. \n  *goto pathtoglindas\n #Threaten the trees with an axe.\n  You do not have an axe nor did you have one back at your house.\n  *goto pathtoglindas\n #Tell them your friend the Tin Woodman will be along soon.\n  The trees cringe and let you pass. They know the reputation the Tin Woodman once had for cutting down trees in the Munchkin Country,\n  a reputation that has followed him here to the Quadling Country in Oz. The trees, which are not apple trees by the way but oak, shake so\n  much that some of their leaves begin to fall as well as a small branch. You pick it up and decide to make it look like a wand eventually.\n  You whistle to yourself as you pass the trees and continue on down the road.\n  *page_break\n  *goto GreatWallofChina \n\n*label GreatWallofChina\n\nYou find yourself at the great wall of china (This is not the one in the Out World in China itself but a tiny wall made of china that \nhas the reputation of being of great artistry). You can see over the tiny wall into a little China Country with a miniature china clown, \nmilkmaid and cow, china aristrocrats, and other china miniatures. The architecture is shiny, milky, and delicate. Periwinkle blue ornamentation is \nhere and there on the plate architecture and on the figurines. A small, pieced-together church sits in the middle of the town square as do little \nboxy china shops, shops made of china, not selling china. \n\nWhat do you decide to do? \n\n*choice\n #Step into the China Country. \n  You incite so much panic at your giant size that the china creatures run from you. Some of them fall and break pieces of themselves which\n  will have to be mended. You regret that you destroyed so many. You are asked to not come back in again unless you want to cause more \n  damage. The little saucy, porcelain clown yells at you, flailing an arm in your direction as you leave, \"Hun, you're no Attila!\" \n  *goto GreatWallofChina\n #Step over the China Country.\n  The China Country is so small that you are able to step over it. Without a warning from you first, your shadow startles a few of the \n  china people, causing them to run, fall, and break themselves. Your shadow basically made it look like there was an eclipse over the entire tiny \n  China country. You regret that you caused a few of them to injure themselves.\n  At the edge of the China Country, you find a small jar of periwinkle paint. You quickly dip the branch you found earlier into the periwinkle \n  paint, making it look like a magic wand.\n  *page_break \n  *goto spiders\n #Walk around the China Country.\n  You try but soon realize that the great china wall, though miniature in width and height, extends in length all the way across this part of Quadling Country.\n  You would be traveling for days if you tried it. \n  *page_break\n  *goto GreatWallofChina\n #Ask if you may step over the China Country.\n  You quietly ask the little China creatures if you may step over their country, and they thank you for warning them. With your warning, \n  none of the creatures harm themselves by trying to run away as you step over the country.\n\n  At the edge of the China Country, you find a small jar of periwinkle paint. You quickly dip the branch you found earlier into the \n  periwinkle paint, making it look like a magic wand.\n
