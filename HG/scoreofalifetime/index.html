<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Score of a Lifetime — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "scoreofalifetime", "title": "Score of a Lifetime", "scenes": {"chapter1": "Money! Romance! More Money! Half a billion dollars is missing, and it's finders keepers. Track down the fortune without letting a new flame steal your heart—unless that's your aim all along!\n*page_break Start Game\n\nYour phone alarm blares, shaking you out of a dream that's gone too quickly. You slowly lift yourself up to a sitting position on the couch and yawn as you mute your phone. No new notifications, of course. Wait a minute. You're out of a job, why did you even have an alarm set?\n*choice\n    #I promised myself I'd go door-to-door with my resume. Any job is fine at this point.\n        *set scene1choice \"job\"\n       It's already noon on Friday. Better hurry if  you're going to reach anyone while they're still at work.\n       *choice\n            #Yeah, I know.\n                *goto 1offcouch\n    #I'm working on a novel and I'm making sure to write every day.\n        *set scene1choice \"novel\"\n        It's already noon on Friday. Good luck getting anything accomplished, Hemingway. Better clean up and punch the keys.\n        *choice\n            #Yeah, I know.\n                *goto 1offcouch\n    #...I'm not sure. I certainly don't have anything to do. Just living day-to-day while I pile up credit card debt.\n        *set scene1choice \"bored\"\n        Well, it's already noon on Friday. At least pretend you're going to do something productive.\n        *goto 1offcouch\n\n*label 1offcouch\n\nLooking around your apartment, you're not filled with confidence. After a few months out of college, you've done your best to make the new place your own—with little success. A few hastily-taped posters dangle from the walls and you've moved your piles of clothes out of the major walking paths, but that's about the extent of your housewarming.\n\n*page_break\n\n\nYou yawn again and reach up to touch your head. Your hair is:\n*choice\n    #Long, and messy from another night spent on the couch.\n        *set hairlength \"long\"\n        *goto 4bathroom\n    #Short enough that a little water and a comb will get me out the door looking just fine.\n        *set hairlength \"short\"\n        *goto 4bathroom\n    #What hair?\n        *set hairlength \"bald\"\n        *goto 4bathroom   \n*label 4bathroom\nYou drag yourself off the couch and stumble down the hall. With another yawn, you push the door to the bathroom open and greet your reflection.\n\n\"And a good afternoon to you…\"\n*choice\n    #...sir!\n        *set gender \"m\"\n        *set womanman \"man\"\n        *set womenmen \"men\"\n        *set herhim \"him\"\n        *set ladyguy \"guy\"\n        *set herhis \"his\"\n        *set hershis \"his\"\n        *set maamsir \"sir\"\n        *set shehe \"he\"\n        *set sheshes \"he's\"\n        *goto 5hair\n    #...miss!\n        *set gender \"f\"\n        *set womanman \"woman\"\n        *set womenmen \"women\"\n        *set herhim \"her\"\n        *set ladyguy \"lady\"\n        *set herhis \"her\"\n        *set hershis \"hers\"\n        *set maamsir \"ma'am\"\n        *set shehe \"she\"\n        *set sheshes \"she's\"\n        *goto 5hair\n    #good-lookin'! (use gender-neutral pronouns)\n        *set gender \"x\"\n        *set womanman \"person\"\n        *set womenmen \"people\"\n        *set herhim \"them\"\n        *set ladyguy \"pal\"\n        *set herhis \"their\"\n        *set maamsir \"\"\n        *set hershis \"theirs\"\n        *set shehe \"they\"\n        *set sheshes \"they're\"\n        *goto 5hair\n*label 5hair\n*if (hairlength = \"long\")\n    You try to tug a comb through your hair but it's just too tangled. It takes half an hour to get everything straightened out.\n    *goto 6brush\n*if (hairlength = \"short\")\n    You splash some water on your hair and comb it into place.\n    *goto 6brush\n*if (hairlength = \"bald\")\n    You rub a towel over your scalp and toss it aside.\n    *goto 6brush\n*label 6brush\n\nWell, gotta brush your teeth.\n*choice\n    #Yeah...\n        You finish and spit into the sink. Alright. Time to get your day started.\n        *goto 7clothes\n    #No. I'm not going to brush my teeth today.\n        What are you, six? Have it your way.\n        *goto 7clothes\n*label 7clothes\n*if (scene1choice = \"job\")\n    You've got a stack of resumes fresh out of the printer, and you've practiced interviews enough that you know you'll nail it. It's important to impress potential hiring managers. What are you going to wear?\n    *fake_choice\n        #A suit that's well-worn but still in good condition.\n            *set scene1clothes \"suit\"\n            Perfect. The jacket is a bit frayed and the back of the tie is unraveling, but it's nothing a safety pin can't hold in place.\n        #One of my dresses. Not sure where I'll be applying, so it'll be good to pick something that's fancy enough to impress without standing out too much.\n            *set scene1clothes \"dress\"\n            A good choice. Modest but professional.\n    You take one more glance at the ${womanman} in the mirror. You're killing it with that ${scene1clothes}. Let's go get hired!\n    *goto_scene chapter2a\n*if (scene1choice = \"novel\")\n    No more putting it off, unfortunately. Time to sit down and write. Still in your pajamas? That's just fine. Or would you prefer to change into something less lazy to get the words flowing?\n    *fake_choice\n        #Anything to delay the onset of writer's block another five minutes. Let's see if I can find my jeans.\n            Typical. They're by the couch where you fell asleep last night. No more excuses now, for real. Time to write.\n        #Nope. Flannel and all, Let's get some words down.\n            There you go. You can point to this moment when you make the bestseller list.\n    *goto_scene chapter2b\n*if (scene1choice=\"bored\")\n    Not that you have anything to do, but it's nice to at least be clean.\n    *goto_scene chapter2c\n*finish\n\n\n    \n    \n", "chapter2a": "*comment jobsearch chapter 1\n\nYou make your way out of your apartment and lock the door behind you. The urge to walk back inside and bury yourself in blankets again is strong, but the small bit of money you had saved is almost gone. You're already dressed up, might as well go try to find work.\n\n*page_break\n\nOrange and yellow leaves fall from the trees around you as you walk. Slamming your foot down on the biggest one you can find, a smile crosses your face as the satisfying crunch fills the air. Lost in thoughts of employment and a future of making ends meet again, you're at the crosswalk before you realize it.\n\n*page_break\n\nIf you go left, you'll need to walk about a quarter mile but there's a shopping mall. On a beautiful autumn afternoon, it's likely to be packed. That doesn't bode well for your chances of finding a hiring manager to sit down with, but maybe you'll get lucky. You've got plenty of retail experience from putting yourself through college, so it should be a snap to get hired.\n\nTo the right, there's a used car dealership. It's one of those sketchy buy-here-pay-here lots. There's probably quicker potential for advancement since you'd earn some sort of commission but… selling used cars? \n\n*choice\n    #There are more options at the mall, even if it's likely to be busy. Plus I'm not sure selling used cars is for me\n        *goto_scene chapter2amall\n    #The mall is going to be packed. Something a little more off the beaten path might be my jam anyway. Let's go check out the dealership.\n        *goto_scene chapter2acars\n\n*finish", "chapter2a2cars": "You had always been able to barely see the car dealership from the crosswalk, but it always seemed incredibly far away.\n\nNope, turns out it's actually just tiny. Dozens of rusted cars surround a building that can't be much bigger than your modest apartment. Just as you did at the mall, you make your way between the rows of (much cheaper) cars. A salesman briskly walks over to you as soon as you approach the building.\n\n*page_break\n\nHe's wearing a cheap suit with a gaudy belt buckle and old, worn-out shoes. You try not to grin as you see him struggle for breath, both ends of his unclipped tie swinging in the breeze.\n\n*if (gender = \"x\")\n    *set maamsir \"my friend\"\n*page_break\n\n\"Hello, ${maamsir}. My name is Frank and it's a pleasure to help you. Anything specific you're looking for today?\"\n\nYou had hoped to talk to someone higher up on the chain, but something seems off about Frank. He might know more than he lets on.\n\n*choice\n    #Ask Frank (politely) to get his boss\n        \"I'd like to speak to a manager if anyone's available.\"        \n        *goto frankboss\n    #Tell Frank you're looking for a job.\n        \"Hey,\" you say. \"I'm actually here to see if there are any open positions. Would you be able to help me with that?\"\n        *goto frankhelp\n\n*label frankboss\n\n\"Sure,\" he grumbles. \"You sure it isn't anything I can help you with?\n\n*choice\n    #Give him a shot\n        \"Well, I'm actually here to see if there are any open positions. Would you be able to help me with that?\"\n        *set frankrelationship 10\n        *goto frankhelp\n    #\"No, I need to talk to someone in charge.\n        He frowns. \"Whatever you say, ${maamsir}.\n        *set frankrelationship 5\n        *goto frankboss2\n\n*label frankhelp\n\n*goto frankinside\n\n*label frankboss2\n\nFrank scowls and motions for you to follow him inside.\n\n*goto frankinside\n\n*label frankinside\n\nHe turns and walks toward what could generously be called a modest office. Frank props the door open and waves you inside, following behind you.\n\n*page_break\n\nIt's not much space, but they've made it work. There's a small lobby with three chairs and a TV broadcasting static. On the other side of the building there's a door labeled \"Finance Office\" and what appears to be a bathroom. Frank offers you coffee, but you shake your head.  You're willing to give this place a shot, but not by drinking _that_.\n\n\"Give me just a moment, ${maamsir}.\" You nod as Frank opens the finance office door, steps inside, and closes it behind himself.\n\nYou hear hushed voices speaking inside and after a moment, the door swings open again.\n\n*page_break\n\n\"Come on in,\" a voice calls from inside. You step inside and smile at Frank as he walks back out to the lot.\n\nBehind the desk, a tall man stands and stretches his hand out, a gold watch dangling from it. Everything about him seems lanky and awkward, but he's acting friendly. You take his hand and shake it.\n\n\"I'm Vince, he tells you.\"\n\n\"Pleasure to meet you,\" you respond. \"I'm ${fname}.\n\n*goto interview\n\n*label interview\n\n\"It's really great to meet you, ${fname}.\" \n\nHis voice cracks as he pulls his hand away and sits back down. Looking over him again, you're struck by just how young he looks. You've only been out of college for a short time, but you'd be shocked if he was even your age. \n\nSure, this isn't the most glamorous car dealership, but it's still surprising that Vince appears to be in charge of it at his young age. Maybe your instincts were right and this is somewhere you can jump-start your career.\n\n*page_break\n\n\"You sure I can't get you any coffee or anything?\"\n\nYou shake your head. \"No, thanks.\"\n\nVince laughs. \"I didn't figure. Just habit. People usually sit where you are when they're buying a car, so they're already convinced we're going to try to short-change them. Ever bought a car before, ${fname}?\n\n\"Nope.\" You shake your head again. \"Mom and dad made sure there was food on the table, but we were a hand-me-down and bus family.\"\n\n*page_break\n\n\"Same here,\" Vince replies. \"Sounds like you learned the value of hard work early. This wouldn't be your first job, would it?\"\n\n\"Worked retail through college and did part-time in high school,\" you tell him.\n\n\"Good.\" He leans his chair back and tilts his head to the side, cracking his neck. \"How's the job hunt been so far? I can tell you're young like me. Have you experienced people not taking you seriously?\"\n\n*fake_choice\n    #\"Honestly, I just started a few hours ago.\"\n        \"And you came here on your first day? I'm honored!\"\n    #\"Yeah, it's been rough. But it's their loss if they don't hire me, you know?\"\n        \"You're damn right. I like your attitude.\"\n    #That's none of his business. Say something noncommittal.\n        \"I guess,\" you reply.\n        He grins.\n        \"Well, hopefully I can make it easier.\"\n*page_break\n\n\"I'll cut to the chase. We don't sell a lot of cars here but we do plenty of work for our sister stores in the big city. If everything checks out, I'd love to take you under my wing. Toss me one of those papers, will ya?\"\n\nYou hand him a resume and he nods. His eyes scan down the page. \"This is what we're looking for. A history of honest work and a willingness to learn. I'll need to get approval from our central store to bring you on, but Frank could use a little bit of competition.\n\nYou laugh. \"Sounds good.\"\n\n*page_break\n\n\"Well,\" Vince says. \"I'll fax a copy of this over to my boss and see what she says on her end, but I've got a good feeling. Once I get the OK, I'll give you a call and bring you in for a real interview. That sound good?\"\n\n*fake_choice\n    #\"That sounds great.\"\n        \"I'm glad! I should be able to reach back out to you by tomorrow afternoon one way or the other.\"\n    #\"Do you know how long that will take?\"\n        Vince shrugs. \"Maybe a couple hours? We've got our Saturday morning meeting scheduled for 10 tomorrow, so if I haven't heard back by then I'll bring it up to her at that point. After that I'll give you a call, so probably early afternoon.\"\n\nVince stands up and sticks his hand out again. You shake it and turn to leave the office. \"If you've got any questions ame \"Jessica\"\n        #Gretchen.\n            *set fname \"Gretchen\"\n        #Barb.\n            *set fname \"Barb\"\n        #Something Else.\n            *input_text fname\n    *goto plot\n\n*label plot\n\nThat's right. \"The Thrilling Adventures of ${fname}\". It's going to fly off the shelves. Just… as soon as you write it.\n\nYou twirl a pen between your fingers for a while, trying to think of a plot. Turns out it's not as easy as you thought to write a bestseller. Or maybe it is, but you just need inspiration to strike.\n\nAnother five minutes of pen twirling doesn't bring you any closer to the New York Times list.\n\n*page_break\n\nMaybe you just need to clear your head. How about a drive?\n\n*choice\n    #Yeah, that sounds good.\n        You push your chair back from the computer, leaving a blinking cursor at the start of an empty text document. But you'll get back there! Inspiration just needs to strike.\n        \n        You figure it'll be easier to get your mind straight with a couple laps around the neighborhood. Since you've already cleaned up for the day, you won't be petrified if you run into somebody you know.\n        \n        *goto startdrive\n    #I'd really like to get at least SOME words down first.\n        Your shake your head and turn back to the computer. \"Alright,\" you tell yourself. \"Let's see.\"\n        \n        Closing your eyes, you will inspiration to strike. Suddenly, your fingers are moving without conscious thought. After what seems like hours, you finally feel your hands come to rest on the keyboard. Time to open your eyes and discover the novel your genius brain created.\n        \n        *page_break\n        \n        \"Once Uppn a Time.\"\n        \n        That's it. That's the extent of the masterpiece. A glance down at the computer's status bar reveals that the typing-trance lasted all of fifteen seconds.\n        \n        It's all you can do to not laugh at yourself. Alright. Maybe that drive will do some good.\n        \n        *goto startdrive\n\n*label startdrive\n\nYou put on your \"good\" jeans and grab your keys, locking the door behind you. It only takes a few minutes to walk to the curb where you parked the last time you left your house (which was… God, when?).\n\nTurning the key with the same prayer as always, you're pleasantly surprised when the engine catches. You give it a couple minutes to warm up and pull off the curb… just as the Check Engine comes on with an unhelpful \"ding!\".\n\n*page_break\n\nYou roll your eyes. Luckily, there's a used car dealership right up the road. They had actually sent a salesman door-to-door about the time you moved in with fliers. But they figured out pretty quickly that you didn't have the means to buy even one of their broken-down junkers, and you hadn't seen him since.\n\nA more charitable interpretation would be that they didn't want to bother you, but why assume the best? After all, it's a used car dealership. Hopefully they'll remember you enough to diagnose your car for free, anyway.\n\n*page_break\n\nYou pull onto the car lot and before you can even find a place to park, a salesman starts running your way. He's wearing a cheap suit with a gaudy belt buckle and old, worn-out shoes. You try not to grin as you see him struggle for breath, both ends of his unclipped tie swinging in the breeze.\n\n\"Hey!\" he yells. You stop where you are and roll the window down. \"How can I help you today?\"\n\nYou smile as you let him catch his breath. \"Well,\" you say, \"my check engine light came on and I wasn't sure what to do. I was hoping you guys might be able to fix it cheap or at least let me know what's wrong.\"\n\n\"We'd be happy to once our service drive is open.\"\n\nIt strikes you as a little strange that their service drive isn't open on a Friday afternoon.\n\n*fake_choice\n    #\"So... what time is your service drive open?\"\n\n\"Ten to three. That's ten a.m. to three p.m. Every Thursday.\"\n\nYou roll your eyes. So… in six days.\n\n\"Alright, I guess I'll come back in six days.\"\n\n\"Well,\" he says. \"hold on. It's a pretty slow afternoon. I could take a look at it if you've got an hour or so.\"\n\n*choice\n    #\"Sure, where should I park?\"\n        \"Right over there is perfect.\" He gestures at an empty spot labeled \"employee parking\".\n        \n        Feeling particularly important, you pull in.\n        *goto frankinspect\n    #\"I'll just come back Thursday.\"\n        \"You sure? If there's something wrong with it then you could develop some additional problems over the next week.\"\n        \n        He makes a good point, you think. And you did ask him to fix it cheap. If this guy's expecting a big payday barking up the wrong tree.\n        *page_break\n        \n        \"Alright,\" you say. Where should I park?\"\n        \n        \"Right over there is perfect.\" He gestures at an empty spot labeled \"employee parking\".\n        \n        Feeling particularly important, you pull in.\n        *goto frankinspect\n\n*label frankinspect \n\n\"I'm Frank,\" the man says, sticking his hand out. You climb out of the car and slam the door, doing your best to smile at him through the frustration. \n\n*fake_choice\n    #\"Good to meet you, Frank. I'm ${fname}.\"\n        \"Pleasure's all mine, ${fname}. If you want to toss me the keys, you're welcome to hang out in the lobby and drink some coffee.\n    #\"Yeah, are you gonna look at the car or not?\"\n        \"Jeez, ${womanman}, I'm trying to do you a favor. Throw me the keys and sit down.\n*page_break\n\nYou shrug and give him the keys, making your way into the lobby.\n\nThe coffee machine looks older than dirt and might actually be full of it.\n*page_break\n\nYou consider giving it a shot.\n*fake_choice\n    #Sure, I'll pour myself a cup.\n        You grab one of the styrofoam cups and set it underneath the drip. Nothing happens. You press every button imaginable, but it's totally busted. \n    #Maybe once my car is fixed.\n        There you go, treat yourself with a cup of disgusting car dealership coffee.\n    #No chance. I'm never touching that.\n        Fair.\n\n\n*page_break\n\nYou sit down in one of the chairs and glance around, still waiting for a book idea to strike. Famous writers take inspiration from all kinds of places, right?\n\nFor some reason, you don't think William Faulkner spent a lot of time hanging out in used car dealerships. \n\n*page_break\n\nLeafing through old, boring magazines about cars only kills so much time. You feel like it would be a good idea for these dealerships to stock magazines that AREN'T about cars, but what do you know? They've obviously got it figured out, judging by the… literally zero people on the lot.\n\nYou yawn and and sit back in the chair, crossing and uncrossing your legs. \n\n*page_break\n\nAfter about half an hour, the door finally swings open with the [i]ding![/i] of a cheap bell. Frank walks in with a grin, having changed into a mechanic's uniform.\n\n*page_break \"Well?\"\n\nHe reaches into his pocket and pulls out a small piece of metal.\n\n\"This was stuck to your battery. I'm not sure how it got in there, but it was causing the engine to think there was a short circuit. I turned it back on and the light's off. No charge.\"\n\n*page_break\n\nYou smile and reach your hand out to shake. Frank wipes his dirty fingers on a cloth hanging out of his pocket. On the other side of the office, the finance office door opens.\n\nFrank waves as a tall man steps out of it.\n\n\"Frank helping you out, young ${womanman}?\"\n\n'Young ${womanman}'? This guy can't be a day past 20. You stifle a grin. \n*page_break \"Yeah, he's been great.\"\n\n\"I'm glad to hear that. My name's Vince, I'm the finance manager here. And also the sales manager.\" He laughs. \"We don't sell or finance a lot of cars. Mostly we just do logistics work for our sister store in the city.\"\n\n*choice\n    #\"That sounds interesting, could you tell me more about that?\"\n        *goto explanation\n    #YAWN. Now that the car's fixed, I can finally go on that drive.\n        *goto gottawrite\n\n*label explanation\n\n\"I know you're just being polite, but I appreciate it.\" Vince cracks that mischievous smile again. \"I'll keep it short.\"\n\n\"Basically, we work alongside some of the Benz dealerships in Chicago. You know how people trade in their used cars, right? They're obviously not all trading in a used Mercedes. So the Hondas, the Kias, even the Audis, they all have to get sold somewhere.\"\n\n*page_break \"I never thought about that.\"\n\n\"Yeah, so we sell some of the lower-end ones here. But a lot of the time we're just tapped to take them from one dealership to another or do dealer trades. Which is exactly what it sounds like.\"\n\n*goto gottawrite\n\n*label gottawrite\n\n*page_break\n\n\"That's cool,\" you say. \"I really need to get home and work on my novel.\"\n\n\"Oh, you're a writer? That's really interesting! This might be impolite, but what's the money like? I don't know if I've met an author before\"\n\nYou can't tell if Vince is legitimately interested or just polite (or flirting?).\n\n*fake_choice\n    #\"I'm still working on my first novel, so there isn't any so far!\"\n        \"Oh,\" Vince laughs. \"Well, if you're ever looking for some work to make ends meet while you're on your way to the bestseller list, we can always use a hand around here.\"\n    #\"No comment.\"\n        \"That good!?\" Vince laughs. \"Well, if you're ever looking to stack those bills even higher, let us know. We've got plenty of odd jobs around here and Frank can always use the help.\"\n\n\"Got it,\" you say.\n\n*page_break\n\nVince turns to head back into his office. \"Well, it's been a slow day, so thanks for coming by and making things interesting. Hope we see you soon.\"\n\nYou nod as he walks back behind his desk and the door closes behind him. Frank waves as you head for the door. The car starts as reliably as it ever has and you make it home with no issues.\n\n*page_break\n\nWith your head ostensibly clear, you hop out of the car and walk back inside. The words come a little more easily now. You write a secondary character that's kind of an amalgamation of Vince and Frank—tall, young, and confident, but industrious and clever.\n\nA ${womanman} named ${fname} is still the lead, of course. \n\nA couple hundred words make their way onto the page, and an outline is starting to take shape. \n\nThis is a big one! What's your novel about?\n\n*fake_choice\n    #Just like me, my characters are obsessed with romance. The perfect soulmate is out there for everyone and they're going through anything to find it.\n        *set bookplot \"romance\"\n    #It's a murder mystery. I love solving puzzles and I think I could write an incredible one.\n        *set bookplot \"mystery\"\n    #An adventure series for young adults. Not only will it be fun and easy to read, I'm going to keep pumping them out until I can retire.\n        *set bookplot \"adventure\"\nYou make sure to save your work locally [i]and[/i] to a cloud drive to make sure it doesn't get lost.\n\n*page_break\n\nYou didn't expect to spend the afternoon at a car dealership, but at least you got some direction on your book and fixed your car. One of your more productive days, at least recently.\n\nYou stand up and stretch, ready to make some dinner and go to bed.\n\n       \n*goto_scene day1finish", "chapter2c": "Changing into a different pair of pajamas, you proudly take a seat back on the couch. You might not be going anywhere in life, but there's TV to watch.\n\n*page_break\n\nYou settle into a pile of blankets and look for something to watch. Unfortunately, you've been spending most of your free time lately doing exactly this, and you're caught up on all your programs.\n\nA notification pops up on your phone and you check it—uh oh.\n\n*page_break\n\nYour credit card bill is due in 5 days. Since spending the last bit of money from your student loans, you've slowly slipped from \"paying the full credit card balance\" to \"paying the minimum\" to… well, this month it doesn't even look like you'll be able to pay the minimum. And those student loans are lurking not too far away either.\n\nYou roll your eyes and punch the couch in frustration. Looks like you have a choice to make.\n\n*choice\n    #Okay, FINE. I'll go try to find a job.\n        If only we didn't need money, right?\n        *goto finejob\n    #The world sucks and it's unfair, but maybe I can channel this energy into writing a novel. Then at least I don't have to go work for The Man.\n        Nothing wrong with forging your own path. The world needs creatives.\n        *goto finenovel\n    #Nope. Not workin', not writin'. I'm gonna sit on this couch until they haul it away.\n        It's not productive, but your commitment is admirable. Out of pure spite, you toss your phone across the couch and burrow further into the pillows.\n        \n        You queue up another episode of something you've already seen, the images flicking across your eyeballs as you yawn and slowly drift to sleep.\n        *goto slackerend\n    \n\n*page_break\n*label slackerend\n\nSuddenly you bolt upright! Was it all a dream? Are you back at the beginning of the day, positioned to make a wiser choice?\n\n*choice\n    #Yes! Thank goodness, this horrifying look at a potential future was all I needed to motivate me!\n        *goto secondchoice2\n    #No. It's Friday afternoon, and I'm not leaving this couch, consequences be darned.\n        *goto_scene slackendscene\n\n*label secondchoice2\n\nIt's so nice to get the occasional do-over, isn't it? What's it going to be?\n\n*choice\n    #Let's go find a job!\n        *goto finejob\n    #Let's go write a novel!\n        *goto finenovel\n    #I've changed my mind. I don't want to do anything. Ever.\n        *goto_scene slackendscene\n\n*label finejob\n\n*set scene1choice \"job\"\n\nAfter convincing yourself to update your resume, you've got a stack of copies fresh out of the printer. It's important to impress potential hiring managers. What are you going to wear?\n*fake_choice\n    #A suit that's well-worn but still in good condition.\n        *set scene1clothes \"suit\"\n        Perfect. The jacket is a bit frayed and the back of the tie is unraveling, but it's nothing a safety pin can't hold in place.\n    #One of my dresses. Not sure where I'll be applying, so it'll be good to pick something that's fancy enough to impress without standing out too much.\n        *set scene1clothes \"dress\"\n        A good choice. Modest but professional.\nYou take one more glance at the ${womanman} in the mirror. You're killing it with that ${scene1clothes}. Let's go get hired!\n\n*goto_scene chapter2a\n\n*label finenovel\n\n*set scene1choice \"novel\"\n\n*if (scene1choice = \"novel\")\n    No more putting it off, unfortunately. Time to sit down and write. Still in your pajamas? That's just fine. Or would you prefer to change into something less lazy to get the words flowing?\n    *fake_choice\n        #Anything to delay the onset of writer's block another five minutes. Let's see if I can find my jeans.\n            Typical. They're by the couch where you fell asleep last night. No more excuses now, for real. Time to write.\n        #Nope. Flannel and all, Let's get some words down.\n            There you go. You can point to this moment when you make the bestseller list.\n    *goto_scene chapter2b\n\n\n\n\n*finish", "choicescript_description": "Money! Romance! Cars! Half a billion dollars is up for grabs. Track down the fortune without letting a new flame steal your heart—unless that’s your plan! When a vehicle with a million-dollar bounty goes missing, you and your boss know it must lead to an even bigger payday.\n\n[i]Score of a Lifetime[/i] is an exhilarating, succinct 43,000 word interactive adventure/romance novel by John Lance where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n• Play as male, female, or non-binary; gay, straight, bisexual, aromantic, asexual, or polyamorous. \n• Discover a hidden fortune and return it.. or keep it for yourself!\n• Find romance with a charming used car salesman and/or a beautiful, high-powered personal assistant.\n• Solve puzzles to unlock the biggest possible payday.\n• Get yourself invited to dinner with the 1% or take everything they have.\n• Feel the rush of a cross-country car chase.\n• Choose the path that works for you: strive to become a novelist, take an entry-level job and climb… or stay at home and literally never leave the couch!\n", "choicescript_stats": "*temp job \"job\"\n*temp company \"n/a\"\n*temp salary 0\n*temp networthdisplay networth\n*temp cashola 0\n*temp ccdebt 0\n*temp sldebt 0\n*set cashola cashonhand\n*set ccdebt creditcard\n*set sldebt studentloan\n*if carsalary > 0\n    *set salary carsalary\n    *set company \"Hullman Pre-Owned Vehicles\"\n*if (scene1choice = \"novel\")\n    *set job \"Write a novel\"\n*if (scene1choice = \"job\")\n    *set job \"Find a job\"\n*if (scene1choice = \"bored\")\n    *set job \"Sit around and be lazy\"\n*if (scene1choice = \"jobfound1\")\n    *set job \"Get to know your new job\"\n\n[b]Life stats:[/b]\n*if (scene1choice != \"unknown\")\n    *stat_chart\n        text job Current Goal\n        text networthdisplay Net Worth\n        text cashola Cash on Hand\n        text ccdebt Credit card debt\n        text sldebt Student loan debt\n[b]Work stats:[/b]\n*if (scene1choice != \"unknown\")\n    *stat_chart\n        text salary Current Salary\n*if (company != \"n/a\")\n    *stat_chart\n        text company Current Employer\n[b]Romantic partner(s):[/b]\n*if (vinceromance = 1)\n    Vince\n    \n*if (rachelromance =1)\n    Rachel", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 9[/b]\n  \n  Unlock chapters 4 through 9, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 9[/b]\n  \n  You've paid to unlock chapters 4 through 9.\n", "credits": "Thank you for playing! You've reached the end of the current version:\n\nv 1.0.0 (!!)\n22 May 2020\n~40000 words (excluding code)\n\nCreated using Choicescript IDE v1.2.1, Windows 10 Notepad, Google Docs.\n\nBanner photo courtesy of Anastase Maragos on unsplash.com, https://unsplash.com/@visualsbyroyalz\n\nWrite to the author at spokeswriter@protonmail.com\n\nTo view version history and/or restart….\n\n*page_break click here!\n\nprevious published versions:\n\nv0.0.1\n21 April 2020\n6000 words\n\nv0.1.0\n22 April 2020\n8000 words\n\nv0.1.3\n26 April 2020\n10500 words\n\nv0.1.4\n27 April 2020\n11900 words\n\nv0.2.0\n29 April 2020\n14000 words\n\nv0.2.1\n01 May 2020\n15000 words\n\nv0.3.0\n04 May 2020\n20500 words \n\nv0.4.0\n10 May 2020\n24218 words (excluding code)\n\n*goto_scene ending\n", "day1finish": "The last glimmers of sunlight disappear as you close the blinds. It's another Friday, but it feels like the first Friday of the rest of your life.\n\n*page_break\n\nYou've made a decent amount of progress toward your goal, and who knows what tomorrow will bring?\n\nFeeling accomplished, you finally head to bed.\n\n*page_break On to the next day...\n\n*goto_scene day2start\n\n\n\n*goto_scene ending", "day2start": "You manage to wake up even before your alarm goes off. \n\n*temp firstoffer 0\n*temp firstcounter 0\n*temp secondoffer 0\n*temp secondcounter 0\n*temp thirdoffer 0\n*temp thirdcounter 0\n*temp finaloffer 0\n*temp finalcounter 0\nIs this… the feeling of motivation?\n\n*set vincerelationship 20\n\n*page_break\n\nWhat a powerful force.\n\n*page_break\n\n*if (scene1choice = \"job\")\n    *goto jobreview\n*if (scene1choice = \"novel\")\n    *goto novelreview\n\n*label jobreview\n\nWithout getting out of bed, you grab your phone and scroll through your notifications. Spam email, friend requests from people you've never met… hold on. There's a couple unheard voicemails. You hit \"play\" on the first.\n\n*page_break\n*if (visitedmall = 1) \n    \"Hey, ${fname}, this is Mike from Mortgen's Department Store at the mall. I took a look at your resume and I'm really impressed. We're expecting increased customer volume for the holiday season, so we'd like to interview you in a couple months about working seasonally for us. Give me a call back…\"\n    \n    *page_break\n    \n    He leaves his phone number at the end of the message; you don't bother writing it down.\n    \n    A couple months? Why don't they just offer to open a 50-year savings bond? This simply won't do.\n    \n    *page_break\n    \n    *if (visitedcars = 1)\n        Luckily, there's another message. \"Hey, ${fname}, this is Vince from the dealership. I wanted to let you know I went over your resume with Alyssa at the main store and we'd love to bring you in for another interview. Give me a call back at this number when you've got some time today. Take care.\"\n        \n        Alright! That sounds significantly more promising.\n        \n        *goto talkcars\n*if (visitedcars = 1)\n    The first voicemail is just some stupid credit card scam, but the second one is much more interesting.\n    \n    *page_break\n    \n    \"Hey, ${fname}, this is Vince from the dealership. I wanted to let you know I went over your resume with Alyssa at the main store and we'd love to bring you in for another interview. Give me a call back at this number when you've got some time today. Take care.\"\n    \n    Excellent!\n    \n    *goto talkcars\n\n*label talkcars\n\nYou roll out of bed and wash your face, trying to wake up enough to sound like you're not asleep on the phone.\n\n*page_break\n\nOnce you're convinced that you sound like someone who's been awake for more than five minutes, you dial the number Vince called from.\n\n\"Hello?\"\n\n*page_break\n\n\"Hi, Vince, it's ${fname}. Just returning your call.\"\n\nFor a moment you wonder if he'll even remember you.\n\n*page_break\n\n\"Ah, ${fname}. How's it going?\"\n\n*fake_choice\n    #\"It's good! How are you?\"\n        \"I'm good, thanks for asking. Still looking for a job?\"\n    #\"I'm good, are you calling about the job?\"\n        Vince laughs.\n        \n        \"Glad to see the straight shooter I met yesterday hasn't changed. I am indeed calling about the job. Still interested?\"\n*page_break\n\n\"Absolutely,\" you say.\n\n\"Wonderful. Why don't you come on down to the dealership this afternoon and we'll run another interview? Don't worry about dressing up or anything.\"\n\nYou grin. Don't need to tell you twice not to dress up.\n\n\"That sounds great,\" you tell him. \"I'll be there this afternoon.\"\n\n\"Great. See you then.\"\n\n*page_break\n\nYou hang up the phone. He did say \"this afternoon\", but it would probably be good to get there sooner rather than later.\n\nNow, he said don't worry about dressing up…\n*fake_choice\n    #I'm wearing a ${scene1clothes} anyway. It's an interview.\n        Professional to the end, huh?\n        *set scene2clothes scene1clothes\n    #Yeah, better show I can follow instructions. Jeans and a T-shirt it is.\n        There we go. Let's stay comfortable, who knows how tough this interview could be?\n        *set scene2clothes \"t-shirt\"\n\n*page_break\n\nWith everything ready for an interview, you glance at yourself in the mirror as you leave the house. Looking good! Good luck out there.\n\n*goto leavehouseday2\n\n*label novelreview\n\nWithout getting out of bed, you grab your phone and scroll through your notifications. Spam email, friend requests from people you've never met, nothing else this morning.\n\n*page_break\n\nYou made some good progress on your ${bookplot} novel yesterday, and you're looking forward to carrying that momentum into the weekend.\n\nYou eventually swing your body out of bed and clean up. After spending just a little more time avoiding it, you settle back into your computer chair.\n\n*page_break\n\nAnd… you sit.\n\n*page_break\n\nAnd then you sit some more. Why is it so hard to get words on the darn page?!\n*temp needfood 0\n*temp needcoffee 0\n*temp needinspiration 0\n*label writerchoice\n*fake_choice\n    *selectable_if (needfood = 0) #I must be hungry.\n        You get up and walk to the kitchen, open up the pantry, and…\n        \n        Oh, right. That's why you're finally writing. You're almost out of food. There's enough there to cobble together a breakfast of stale bread and cheese, that'll just have to do.\n        \n        *set needfood 1\n        *page_break Now, back to the writing...\n        \n        *goto postchoicewrite\n    *selectable_if (needcoffee = 0) #I skipped my morning coffee, that must be it!\n       It feels like we're pretty far into \"excuse\" territory now, but you get up anyway and pour a mug. As you bring it to your lips…\n       *fake_choice\n            #the steam fogs up my glasses and I wipe it away.\n                *set glasses 1\n                You laugh it off and keep drinking. Before long you've finished the coffee. Nowhere to run, gotta write this book.\n                *set needcoffee 1\n                *goto postchoicewrite\n            #the steam approaches my eyes and I blow it away.\n                *set glasses 0\n                You laugh it off and keep drinking. Before long you've finished the coffee. Nowhere to run, gotta write this book.\n                *set needcoffee 1\n                *goto postchoicewrite\n    *if ((needfood > 0) and (needcoffee > 0)) #I guess I just need inspiration. I got home yesterday and could write just fine, maybe I'm inspired by talking to people.\n        That's true. And worst case scenario, maybe you can take a job at the car dealership.\n        \n        How does that sound to you?\n riting going?\"\n    \n    You shrug. \"It's enjoyable, but I'm hitting a roadblock so I figured I'd come see about helping you guys out during the downtime.\"\n    \n    *goto vinceconvo2\n\n*if (scene1choice = \"job\")\n    \"Thanks for coming in again. Like we discussed yesterday, I brought you up during our weekly meeting and my boss gave the OK to bring you on board.\"\n    \n    You smile. \"I'm glad to hear that.\"\n    \n    *goto vinceconvo2\n\n*label vinceconvo2\n\n*page_break\n\nVince nods. \"I'm not sure how much work we'll have for you, but we're happy to put you on the payroll,\" he laughs.\n\n*if (scene1choice = \"novel\")\n    \"You're even welcome to bring a laptop or something if you want to write during the downtime.\"\n\n*if (scene1choice = \"job\")\n    \"There should be reasonable opportunity for advancement, too. Right now it's just about being reliable and making sure we can count on you. I'll have you sit in on our call with corporate next week so you can get a feel for it.\"\n\n*page_break\n\n\"That sounds great,\" you reply.\n\nVince pulls some payroll forms out of the desk. \"If you want to go ahead and fill these out, I'll get you put in the system.\"\n\nYou glance through the papers and see that the salary field is blank.\n\n\"What about salary?\"\n\n*page_break\n\nVince grins, showing off his perfect teeth.\n\n\"Welcome to the world of making deals. You might be haggling with customers over price, so I wanted to give you some practice. Choose an hourly salary between 1 and 50 dollars and I'll accept it or counter-offer.\"\n\n*page_break\n\n\"And don't sell yourself short,\" he reminds you with another smile.\n\n*goto prefirstoffer\n\n*label prefirstoffer\n*input_number firstoffer 1 50\n\n*if (firstoffer \u003c 10)\n    \"I said don't sell yourself short!\" He laughs. \"Try again.\"\n    *goto prefirstoffer\n*elseif (firstoffer \u003c 20)\n    \"I think you should go a little higher.\"\n    *goto prefirstoffer\n*elseif (firstoffer > 30) count out of the red, and fast.\n\n\"That sounds great,\" you tell him.\n\n*page_break\n\n\"See you at… ten a.m.? Does that work?\"\n\nYou nod.\n\nVince stands up and hands you the rest of your paperwork. \"Alright. You're officially on the team now, so feel free to ask Frank whatever you like on your way out.\"\n\nGrinning, you step out of his office and close the door behind you.\n\n*page_break\n\nFrank shakes your hand as you leave. \"Welcome to the team, ${fname}. Sounds like I'll see you on Monday.\"\n\n*achieve job\n\n*page_break\n\nYou walk back to your car, tossing the paperwork into the passenger seat.\n\nReaching down to turn the radio on, you see something you must have missed. Frank (or someone) hung an air freshener from the mirror for you, and it smells like success.\n\nYou drive by a convenience store on the way home to celebrate. Money's still tight, but you figure it's alright to splurge on a little treat to enjoy tonight.\n\nWhat's on the menu?\n\n*temp drinkchoice \"unknown\"\n*fake_choice\n    #Just a cheap six-pack of beer. I just want to relax a little bit.\n        You decide to just buy whatever's on sale.\n        *set drinkchoice \"beer\"\n    #Something a little harder. I can either mix it or drink it straight, but I'm planning to have some fun.\n        It's been a long couple of days, no reason you shouldn't celebrate.\n        *set drinkchoice \"bourbon\"\n    #I'm not feeling like drinking tonight, actually.\n        Nothing wrong with saving some money and keeping your wits about you.\n        *set drinkchoice \"soda\"\n\nYou hop out of your car at the convenience store and walk inside. The woman behind the counter smiles at you as you pick from the varieties of ${drinkchoice} and take your purchase to the checkout. \n*if (drinkchoice != \"soda\")\n    The cashier checks your ID as you complete the purchase.\nShe puts your drink in a plastic bag and smiles at you again as you leave.\n\nYou smile back, excited to get home and finally relax.\n\n*page_break\n\nWhen you eventually get home, it's Saturday night and you've got plenty of time to kick back. You've got a job starting in two days, money's going to come in soon, and you're finally on track toward your goals. You crack open your ${drinkchoice} and relax in front of the TV.\n\nSipping slowly, you do your best to catch up on the news. You've kind of been out of it the past couple weeks, but every channel is still discussing what's simply called The Divorce.\n\nYou roll your eyes and turn the volume up just as it cuts back to the news desk.\n\n*page_break\n\n\"And our top story tonight, yet again, concerns the pending divorce of professional hockey player Zack Arguelles.\"\n\nIt's difficult to tell, but you think the anchor might be just as tired of this story as you are.\n\n\"Recent motions cast doubt on the personal net worth Mr. Arguelles disclosed to the court.\"\n\nYou take another sip and lean closer to the TV.\n\n*fake_choice\n    #I should be writing, or sleeping, or cleaning my room or something.\n        You probably should be. But this is America and we love our celebrities. Don't you want to be rich someday?\n    #Ooh! Saucy! I wonder what happened!\n        You and me both!\n\n\"Last week's story reported that Mr. Arguelles filed a disclosure of his net worth in the high six figures. But with hundreds of millions of dollars in salary, many asked where the money went. Arguelles didn't provide any details, but confirmed that the filed numbers were accurate.\"\n\n\"Many questioned his modest lifestyle and reserved personality. If this truly was a man who had spent nearly half a billion dollars, where did it go?\"\n\n\"Vanessa Arguelles, Michael's ex-wife and the plaintiff in the case, provided bank records detailing that $450 million was sent via wire transfer prior to divorce proceedings beginning. Mr. Arguelles has not responded to requests for comment.\"\n\n*page_break\n\nOkay, this actually is interesting. This guy (allegedly) tries to hide half a billion dollars from his wife and thinks nobody will notice?\n\nYou grew up close to Chicago and Arguelles has always been a real Windy City hero. Aside from game-winning shots, you never really saw his name in the headlines.\n\nPeople sure do seem to get crazy about money, you think.\n\n*page_break\n\nYou finish your drink and eventually head to bed, wondering if you're only a few months away from joining the class of rich people yourself.\n\n*page_break\n\nThe rest of the weekend seems to fly by and before you know it, you're waking up for your first day of work.\n\n*page_break\n\n*goto_scene day3\n\n*goto_scene ending\n\n\n\n    ", "day3": "*page_break\n\nYou wake up Monday morning to a blaring alarm. Sleepily, you reach out and hit snooze.\n\n*page_break zzzzzzzzz....\n\nNine minutes later, that [i]incredibly[/i] rude noise is disturbing you yet again.\n\n*page_break zzzzzz....\n\nNine more minutes, and it goes off a third time. Was there something you had to do today?\n\n*choice\n    #Not that I remember. I'm smashing that snooze button again.\n        *goto snoozefour\n    #Oh! I'm supposed to go to work! I have a job!\n        *goto getup\n\n*label snoozefour \n\nZZZZzzzzz….\n\nzzzzzzzzzzZZZZZZZZZZzzzzzzzzz….\n\nzzzzzzzzzzzzzzz….\n\n*page_break zzzzzzzzz....\n\nYour alarm goes off a fourth time and you reach out to turn it off.\n\nBut your hand clumsily knocks it off your nightstand and it falls to the floor.\n\nThe cord stays connected, pulling the plug out of the wall as it falls, thankfully falling onto the carpet without any damage.\n\n*page_break zzzz...huh?!\n\nThe alarm isn't any softer as it screams at you from the floor. Eventually you yawn and get up, plugging the charger back in the outlet.\n\nYou shake your head. How can it be 8 a.m. already? Well, now that you've hit snooze a million times, it's past 8:30! Plenty of time to get ready for work by 10, but you better get a move on.\n\n*goto getup\n*label getup\n\n*page_break\n\nYou drag your feet as you walk slowly to the bathroom, still half-asleep. The cold water of the shower (always cold!) startles you further awake, if only so you can use your entire brain to think up appropriate curse words for the situation.\n\nBut you eventually get clean and hop out of the shower, drying off your legs and dripping entirely too much water onto the bathmat.\n\n*page_break\n\nA few minutes in front of the mirror to brush teeth and make sure you're looking your best, and it's almost time to go!\n\nYou roll your eyes and open the refrigerator. There's a little orange juice that doesn't seem to have gone bad yet. You drink it straight from the carton—ew, ew, ew! The orange juice reacts with the toothpaste in that disgusting way that's impossible to describe. (if this doesn't make sense, consider yourself lucky)\n\nBack to the bathroom to brush teeth again and try to shake the worst feeling in the world.\n\nAfter re-brushing, rinsing with water, and visiting the refrigerator again, you give up.\n\nSix ounces of OJ and a nasty taste are going to have to get you through breakfast.\n\n*page_break\n\nAs you head out to your car, you wonder if they'll have food at the dealership. You're not desperate enough to use that disgusting coffee maker, but maybe there's a bag of chips.\n\n…Or maybe you shouldn't clean out their food on the first day. And at $${carsalary} an hour, you'll be able to buy your own food in no time.\n\n*page_break\n\nYou pull into the employee parking spot out front ten minutes ahead of schedule.\n\n*fake_choice\n    #Sit in the car for ten minutes and listen to music.\n        You groove to the radio, enjoying the bursts of music punctuated by static.\n        Hey, you think Frank could fix your radio? You sit a while longer and eventually feel like you're ready to face your first day.\n    #Head inside a little early.\n        That's a go-getter! Maybe you'll be able to punch in a few minutes early and make a couple extra bucks.\n\nYou step  you.\"\n            \n            *page_break\n            \n            She looks at you like you're mocking her, but there's no denying the feeling in her fingertips as you squeeze her hand. Her cheeks briefly flash the lightest shade of red before she jumps up.\n            \n            \"Exquisite,\" she says. \"I will be in touch.\"\n            \n        #I'm sorry, there's no attraction here.\n            *set rachelattract 0\n            \n            You pull your hand away, doing your best to let her down easy.\n            \n            \"It is alright,\" she says. \"This was to be expected. I wish you the best.\"\n            \n    You nod at her and walk back inside.\n    \nThe three of you watch Rachel leave.\n\n*page_break\n\n\"Well,\" Vince says, \"seems like we're going ahead as scheduled. Poor girl, she wasted so much time following us.\"\n\nYou shrug. \"Maybe she should have picked an easier mark.\"\n\nVince laughs and high-fives you. \"I guess we've got something to do tomorrow then.\"\n\n\"Yeah,\" Frank chimes in. \"Want me to go to Chicago with you?\"\n\nVince shrugs. \"I'll be fine, old man. You can sleep in. But I'll be back here around 1, so if you want your cut you better be up by then.\"\n\n*page_break\n\n\"Alright.\" Frank cracks a smile. \"I'll be here at 1. Call if you need any help.\"\n\nHe shakes your hand, and then Vince's, before leaving. You and Vince look at each other.\n\n\"Ready to go?\" he asks.\n\nYou nod.\n\n*page_break\n\"You need a ride home?\"\n\n*choice\n    #That would be nice.\n        \"That would be nice,\" you tell him.\n        *goto takearide\n    *if (vinceromance = 1)\n        #That would be nice, and maybe he could come in?\n            \"That would be nice,\" you tell him. \"And it's been a real long week, so if you'd like to come in for a drink or something…\"\n            \n            You let it hang in the air and he grins.\n            \n            \"I'll take you up on that.\"\n            *goto takearide\n    #\"I'm good.\n        \"I appreciate it, but I'll be okay.\"\n        \n        \"Even knowing you've got a huge paycheck coming tomorrow?\"\n        \n        \"It's a safe neighborhood,\" you tell him.\n        \n        Vince laughs. \"You're a firecracker, ${fname}. You sure?\"\n        \n        *goto choicewalk\n    \n*label choicewalk\n\n*choice\n    #Yeah, I'll be just fine.\n        \"Yeah, I'll be just fine.\"\n        \n        \"Alright,\" Vince says.\n        \n        *if (vinceromance = 1)\n            He holds your hand for a minute and kisses you on the cheek as you leave.\n        *if (vinceromance = 0)\n            He reaches out for a fist bump as you leave.\n        *goto choicewalk2\n    #On second thought, maybe a ride would be wise.\n        \"Alright,\" you laugh. \"you wore me down. I'll take a ride.\"\n        *goto takearide\n\n*label choicewalk2\n\n*page_break\n\nYou wave goodbye to Vince and step out of the dealership.\n\nWalking home quickly, you glance behind you more than you'd like.\n\n*page_break\n\nOne car drives by you extremely slowly, sending a shiver down your spine.\n\n*page_break\n\nBut they roll on, and you make it to the front door without incident. You quickly walk inside and lock the door, collapsing on the couch again.\n*goto chicagomorning\n\n*label chicagomorning\nYou turn on the TV to kill some time before you fall asleep, but it's just more stories on the Arguelles Divorce. Once this is all done, maybe you'll read more about it. But for now, you're going to see them tomorrow. Hopefully for a very, very short amount of time.\n\n*page_break\n\nYou eventually make your way to bed, yawning and setting an alarm for the next morning. \n\n*page_break zzzzzzz....\n\nYou're not sure why (other than the promise of half a million dollars), but you're up long before your alarm. Tossing and turning isn't getting you back to sleep, so you walk to the bathroom and brush your teeth.\n\nChecking your phone, you see that Vince is still planning to pick you up around 10:30, giving you plenty of time to get to the dealership by noon even if there's traffic.\n\n*page_break\n\nYou look for breakfast, but there wasn't anything in the apartment when you left a week ago and things haven't changed since. You'll just have to go to Chicago on an empty stomach.\n\n*page_break\n\nLuckily, Vince rolls up before the scheduled time and has a breakfast sandwich waiting for you when you get in the car.\n\nYou've finished it before your apartment is out of sight.\n\n*page_break\n\nVince laughs. \"Nervous? Or just hungry?\"\n\n*fake_choice\n    #Nervous.\n        \"Nervous,\" you say. \"Very.\"\n    #Mostly just hungry.\n        \"Hungry,\" you tell him.\n    #Both.\n        \"Little of column A, little of column B.\"\n        \nHe smiles.\n\n\"Yeah, I'm on the nervous side here. Feels weird to know that we're flying down the highway in a car worth half a billion dollars. But it is what it is!\"\n\n*if (vinceromance = 1)\n    He reaches over and squeezes your hand as you reach the highway. Although you've spent days together in the car, you feel like you could ride with him forever.\n*if (vinceromance = 0)\n    With expert skill, he pulls onto the highway. Although you've spent days together in the car, you feel like you could ride with him forever and never get bored.\n\nHe even has correct change for the toll plaza!\n\nBefore you know it, you've arrived at the dealership.\n\n*page_break\n\nOne of the employees on the lot waves you into the service drive. \"Hey,\" Vince says. \"Got a dealer trade here.\"\n\n\"Sure, sir. Let me just take a look.\"\n\nThe employee swings the door open to check the VIN and walks around to inspect the car.\n\nHe puts one hand on the trunk.\n\n*page_break\n\nYou exchange a glance of horror with Vince, but the employee keeps walking around the car.\n\n\"It all looks good,\" he says. \"Do you know if there's a bounty on it?\"\n\nVince shrugs as he gets out, tossing the guy the keys.\n\n\"Yeah, couple hundred, I think.\"\n\n\"Sweet. Not a bad way to spend a morning.\"\n\n*page_break\n\n\"No, sir,\" Vince says.\n\n\"I gotta run this upstairs and I'll get the money wired. Do we have your bank info on file?\"\n\nVince laughs. \"I run Hullman Pre-Owned, I'm assuming so.\"\n\nHis face goes white. \"Apologies, sir. Be right back.\"\n\n*page_break\n\nThe man takes off like a rocket into the dealership. Vince looks at you, and then looks away, seeming to scan the parking lot.\n\n\"Looking for Rachel?\" you guess.\n\nHe nods. \"I just know she's going to pop up somewhere, and I'd like to be out of here when she does.\"\n\n*if (rachelromance = 1)\n    Vince sighs. \"I know there's something between you, and I don't mean to be rude about it. But this, for me, is about completing the assignment ASAP. When we're back home and we have the money, you two can do whatever you like.\"\n    \n    *if (vinceromance = 1)\n        You meet his gaze. You can tell he's not thrilled that you're caught in the middle of them, but you also know his feelings for you are so strong that he won't do anything about it. Someday, you know you might have to choose. But like he said, focus on the job.\n\n*page_break\n\n\"I know what you mean,\" you agree. \"She [i]should[/i] just want to see us deliver the car and leave us alone, but who knows.\"\n\nYou look to your left and see the employee that assisted you coming back out.\n\n\"Thank you so much for your patience, Mr. Hullman. Do you have a moment to check that the funds were transfered?\"\n\nVince shrugs, trying to act nonchalant. \"Sure.\" He pulls up a webpage on his phone, logging in. He swallows hard and nods. \"Yes, exactly the amount expected. Thank you so much.\"\n\n*page_break\n\n\"The pleasure is ours. Our Sales Manager wanted to offer you a ride back to Hullman in one of the company shuttles, if it suits you.\"\n\nVince looks at you and shrugs.\n\n\"Sure,\" you say. Vince leaves the keys behind and you take one out the future.\n\n*goto_scene epiloguescene\n\n*label takearide\n\n*page_break\n\nVince walks you outside and helps you into one of the vehicles hanging around the lot.\n\nThe air is chilly, but he still drives you home with the windows down. The cold is a welcome distraction after a week that had you all over the place.\n\nBefore you know it, Vince has pulled up to the curb in front of your apartment.\n\n*if (vinceromance = 1)\n    If only he had taken the long way…\n    \n    *choice\n        #\"Hey, would you like to come in?\"\n            Vince smiles. \"I'd love to, but we've got an early morning. After we get back tomorrow?\"\n            \n            \"Sure,\" you say with a smile.\"\n            *goto vincegoeshome\n        #\"Thanks for the ride, but I'm exhausted and I wouldn't be very good company. I'll see you soon?\"\n            *goto vincegoeshome\n        \n*if (vinceromance != 1)\n    *goto vincegoeshome\n\n*label vincegoeshome\n\nVince smiles. \"I'll see you soon. Good work this week, get some rest.\"\n\nYou reach out and fist bump him as you exit the car, dragging your suitcase inside.\n\n*goto chicagomorning\n\n\n\n", "day8keepit": "\"Which is more?\" you ask with a smirk. \"1.5 million or 4.5 million?\"\n\n\"Clearly 4.5 million,\" Rachel tells you with an eye roll.\n\n\"And is 4.5 million more than 500 million?\"\n\n\"Well, no, but…\"\n\n*page_break\n\n\"If you're going to try to motivate us with greed, Rachel, then why didn't you consider that we could just bust the safe and split half a [i]billion[/i] dollars?\"\n\nShe rolls her eyes. \"Because, I explained, it is tremendously difficult to open and by the time you do so, many people will have already arrived.\"\n\nIt does seem pretty impenetrable. You glance at Vince as if to say \"[i]Hey, dork, this was your plan\"[/i].\n\nHe shrugs.\n\n*page_break\n\n\"Well,\" Vince says. \"Unless one of us is secretly a safecracker, I don't think this is going to work after all.\"\n\n\"Is there any other reason we shouldn't do it?\" Frank glares at Vince, who turns red as only a son caught with his hand in the cookie jar can.\n\nVince sighs. \"Because it's stealing.\"\n\nFrank laughs. \"Alright. What are our other options?\" He looks back at you.\n\n*page_break\n\nYou take a deep breath, again.\n\nWe're going to…\n\n*choice\n    #give Rachel the car.\n        *goto_scene day8rachel\n    #deliver the car as scheduled.\n        *goto_scene day8deliver\n    #What's the worst that can happen if we try to crack it? We're all pretty clever.\n        *goto crackit\n    \n*label crackit\n\n\"I'm gonna need some tools,\" you tell Vince and Frank.\n\n*page_break\n\nA few minutes later, you're standing at the trunk of the car with every power tool that Vince could find in the service drive.\n\n\"Officially, I am explicitly opposed to this and did everything I could to stop you,\" Rachel says.\n\n\"Yeah,\" you nod. \"That'll be our story.\"\n\n*if (rachelattract = 1)\n    You wink at her as you turn back to the car.\n*if (rachelattract = 0)\n    You turn back to the car.\n\nDoing your best to remember what you've read, you pull as much of the safe as you can out of the car's trunk.\n\n*page_break\n\nIt looks like some wires are connected into the actual frame of the car. You aren't sure what they do, but you know it would probably set off an alarm if you cut them.\n\nThe safe is heavy, but you're still able to rotate it somewhat.\n\n\"What else do you know about this thing, Rach?\"\n\n*page_break\n\nShe takes a position next to you and leans over the safe. \"As I said, it is protected by a time-lock mechanism. Even once the correct code is entered, the time-lock will keep the door magnetically shut for twelve hours. Additionally, an alarm will go off immediately.\"\n\nHuh.\n\n\"So there's three parts to this,\" you say. \"The alarm, the time-lock, and the code itself. We just have to disable the alarm, guess the code, and either beat the time-lock or hide it somewhere for twelve hours.\"\n\n*page_break\n\n*temp alarmwork 0\n*temp timelockwork 0\n*temp codework 0\n*temp workcount 0\n\n*label threelocks\n\nWhat part do you want to work on?\n*fake_choice\n    *if (alarmwork = 0) #The alarm.\n        \"What can you tell us about the alarm?\"\n        \n        Rachel points to the wires that connect the safe to the car frame. \"I believe that disconnecting any of these wires or entering too many invalid codes will trigger the alarm. Not only will it generate a strident sound, it will immediately notify Mr. and Mrs. Arguelles.\n        \n        \"Interesting,\" you say.\n        \n        *page_break\n        \n        Vince chimes in. \"How does it know if the wires are disconnected? Or, I guess that's not the right question, because it could just be measuring voltage. How does it know that it's connected to the car wires and not… some other wires?\"\n        \n        Rachel thinks for a moment. \"I suppose it wouldn't.\"\n        \n        *page_break\n        \n        \"Okay,\" Frank says. \"I'm still not a fan of this, but from a mechanical puzzle standpoint, I can't stay away. Give me a sec.\"\n        \n        He lumbers across the lot and returns with a set of jumper cables, hauling a busted tire behind him.\n        \n        \"Here's my idea,\" he says. \"We splice the wires from the safe onto the jumper cables, and we connect them to this junk rubber here. It won't generate any voltage, but hear me out. Then we take another set and hook them to a car battery, I'm sure we have one lying around.\"\n        \n        *page_break\n        \n        \"Rubber's an insulator, so if we use more or less, we should be able to keep the juice flowing through the wires and adjust it to the level it expects so we can cut the wires to the frame.\"\n        \n        \"How sure are you about this?\" Vince asks.\n        \n        \"Like… 60%?\" Frank shrugs.\n        \n        \"Up to you,\" Vince tells you.\n        \n        *fake_choice\n
