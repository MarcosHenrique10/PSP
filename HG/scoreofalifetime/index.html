hree months later…\n\n[b]Epilogue[/b]\n*if (keptjob = 1)\n    Three months later, you're returning home from an uneventful shift at the dealership.\n    \n    *if (vinceromance = 1)\n        Working under Vince while your relationship continued to blossom has been a little confusing, but you've both done your best to separate business and pleasure.\n    \n    *if (rachelromance = 1)\n        Working at the dealership doesn't give you a lot of time to see Rachel, who's still living in Chicago. But you've met up a couple times, and things are continuing to blossom between the two of you.\n*if (keptjob = 0)\n    *if (futureplans = \"travel\")\n        Three months later, you're returning home from a jaunt around the world. After spending two weeks on Miyajima island in Japan, you're looking forward to relaxing for a few days and getting over the jet lag.\n        \n        *if (vinceromance = 1)\n            You didn't know what it would be like traveling with Vince, but he had a blast visiting different countries and you're glad you brought him. He drops you off at your door and kisses you before driving home to get some rest of his own.\n            \n        *if (rachelromance = 1)\n            You spoke with Rachel one or two more times before you left, but things were very up in the air. You're looking forward to touching base with her and seeing how things are going.\n            \n    *if (futureplans = \"novel\")\n        Three months later, you've just finished the first draft of your novel.\n        *if (vinceromance = 1)\n            Vince has been eager to help you proofread and edit. He's enthusiastic, if not incredible when it comes to grammar. It's been nice to have him around.\n        *if (rachelromance = 1)\n            You spoke with Rachel one or two more times before you really got cracking on the book, but things were very up in the air. You're looking forward to touching base with her and seeing how things are going.\n    *if (futureplans = \"nothing\")\n        Three months later, you've managed to accumulate some new clothes and a bunch of crumbs on your new sofa.\n        \n        *if (vinceromance = 1)\n            Vince kept his job at the dealership, and he stops by after work every so often. He knows you're just taking some time off after a series of very stressful events, and he supports you.\n        \n        *if (rachelromance = 1)\n            You spoke with Rachel one or two more times before you started hibernating, but things have been very up in the air. You're looking forward to touching base with her and seeing how things are going.\n\n*if ((vinceromance = 1) and (rachelromance = 1))\n    Vince and Rachel are both aware of your budding relationship with the other, but as things start to get more serious, you might have to choose soon.\n\nAs you check the mail, you toss various junk letters and already-paid bills in the trash. At the bottom of the pile, there's a small envelope.\n\nThe hand-written address is specifically to you.\n\n*page_break\n\nYou take a deep breath and open it. \n\n*page_break\n\nThe card reads:\n\n[i]Dear ${fname}, I hope the previous months have treated you well.\n\nZachary and I are continuing to work through our differences and next month, we'd like to celebrate with some of the people that made it possible.\n\nOn Friday, January 20th, we will be hosting a dinner. It would mean very much if you would attend.\n\nSincerely,\n\nVanessa Arguelles[/i]\n\n*page_break\n\nYou turn the card over, and there's an RSVP segment to mail back.\n\nYou pause and think about it for a moment. You're honored by the invitation, but you also kind of want to put the whole thing in the past.\n\n*if (rachelromance = 1)\n    You shake the envelope one more time and see something else fall out. A small, handwritten note. Different script—much more businesslike and straightforward. You know immediately who it's from.\n    \n    *page_break\n    \n    ${fname}:\n    \n    I am hesitant to admit this, but I have been thinking of you throughout the intervening months.\n    \n    It would be ideal to see you again. Please consider this a personal invitation from myself, as well as Mr. and Mrs. Arguelles.\n    \n    -Rachel\n    \n    *page_break\n    \n    Well, then. One more wrinkle to this.\n\nTurning the RSVP form over in your hand, you grab a pen.\n*choice\n    #I'll attend, on my own.\n        *goto attendonown\n    *if (vinceromance = 1) #I'll attend, but I'll bring Vince along as a date.\n        *goto attendvince\n    *if (rachelromance = 1) #I'll attend, and I'm looking forward to meeting Rachel there.\n        *goto attendrachel\n    *if ((vinceromance = 1) and (rachelromance = 1)) #I'll attend, and I'm going to bring Vince [i]and[/i] meet Rachel. I'll make that choice when I have to.\n        *goto attendtrouble\n    #I'll decline \"with regrets\". I was sick of the Arguelles family before this whole thing started, and I'm not going to spend my valuable time hanging out with them now.\n        *goto stayhome\n\n*label stayhome\n\nYou mark the decline box and stuff the card back in the mail. You hope they're having a great time, but you've got your own things to worry about.\n\n*if ((vinceromance = 0) and (rachelromance = 1))\n    You know that declining will probably be the end of things with Rachel, but you're ready to focus on yourself for a while.\n    \n    *goto noromanceending\n*if ((vinceromance = 1) and (rachelromance = 1))\n    You know that declining will probably be the end of things with Rachel, but you're ready to focus on your relationship with Vince.\n    \n    *set rachelromance 0\n    \n    A couple days later, he visits your apartment after a late night at the dealership. \n    \n    Sitting on the couch together, you tell him about declining the invitation and that things with Rachel are over.\n    \n    He grins. \"So it's just you and me, then?\"\n    \n    You shrug, grinning right back at him. \"I guess so.\"\n    \n    *goto vinceepilogue\n*elseif (vinceromance = 1)\n    \n    A couple days later, Vince visits your apartment after a late night at the dealership. \n    \n    Sitting on the couch together, you tell him about declining the invitation.\n    \n    \"I'm glad,\" he says with a laugh. \"I'm kind of tired of them too. Just you and me, then?\"\n    \n    You shrug, grinning right back at him. \"I guess so.\"\n    \n    *goto vinceepilogue\n\n*label vinceepilogue\n\nHe wraps his arm around you and pulls you tighter.\n\n\"This has been the best few months of my life, you know that?\"\n\nYou try not to blush. \"Me too.\" It's the truth.\n\n\"Actually…\" he says. \"I know that we've probably already been through the most exciting experience of our lives. And I'm okay with that. But I'd like to do my best to give us more together.\"\n\n*page_break\n\nHe pulls away from you and drops to one knee.\n\n*page_break\n\nThings seem to move in slow motion as he reaches into his pocket and pulls out a small box. You're watching his lips move, but you can't hear a word he's saying.\n\n*page_break\n\nThe box flies open and a billion karats of diamond dazzle you. It's a ring, and he clearly wants you to take it.\n\n*page_break\n\nYou blink, staring at him.\n\nOh no, he's waiting for a reaction!\n\n*page_break\n\n\"I said, will you marry me, ${fname}?\"\n\n*fake_choice\n    #Yes!\n        *goto yesyesyes\n    #No...\n        *goto spurnedvince\n\n*label yesyesyes\n\nHe smiles and pushes the ring onto your eager finger.\n\nYou share a huge kiss and collapse into his arms as he sits back on the couch with you.\n\nEverything feels perfect.\n\n*page_break\n\nOver the next few weeks, you let everyone know and start planning a wedding. \"How will you pay for it?\" people ask, not minding their own business. But you don't have any trouble.\n\n*page_break\n\nThe two of you are young, but you know what you want. The wedding goes off without a hitch, and you start your life together.\n\n*page_break\n\nVince eventually moves in with you, inspiring you to occasionally pick clothes up off the floor (if only to make space for all his suits).\n\n*page_break\n\nReflecting on everything that happened, you're pretty proud of yourself. You pursued a long-term romantic relationship, and you made it work. You made a huge leap into the world of adult responsibilities and came away with a good bit of cash. Now that you're rich(-ish), you can decide for yourself if folks with all that money deserve it.\n\nFinal net worth: $${networth}\n\n*goto_scene credits\n\n*label spurnedvince\n\nHe blinks.\n\n\"I thought… okay, never mind.\"\n\nHe stands up and puts the ring away.\n\n\"I meant what I said. This was some of the best times of my life. And it's over, and that's okay. I wish you the best, ${fname}.\"\n\n*page_break\n\nHe leaves, shutting the door behind himself a little harder than necessary.\n\nYou let out a sigh and stare at the ceiling. So dramatic. [i]It's just not the right time, okay Vince?[/i]\n\nYou take a moment to consider your surroundings as you think about the next chapter of your life.\n\n*goto noromanceending\n\n*label noromanceending\n\n*page_break\n\nThe next year flies by. Life sure is easy when you don't have to worry about love or money!\n\n*page_break\n\nYou maintain your friendship with Frank and Vince and even purchase a car from the dealership when your current ride finally expires. \n\nLife is good.\n\n*page_break\n\nReflecting on everything that happened, you're pretty proud of yourself. You didn't pursue a long-term romantic relationship, but there's plenty of time for that in the future. You made a huge leap into the world of adult responsibilities and came away with a good bit of cash. Now that you're rich(-ish), you can decide for yourself if folks with all that money deserve it.\n\nFinal net worth: $${networth}\n\n*page_break\n\n*goto_scene credits\n\n*page_break\n\n\n*label attendonown\n*goto_scene day8mansion\n*label attendvince\n*set vincemansion 1\n*goto_scene day8mansion\n*label attendrachel\n*set rachelmansion 1\n*goto_scene day8mansion\n*label attendtrouble\n*set vincemansion 1\n*set rachelmansion 1\n*goto_scene day8mansion\n\n*goto_scene day8mansion\n", "ontherunending": "*temp thexofyou \"unknown\"\n*temp bigchoice \"unknown\"\n*if (ontherunthree = 1)\n    *set thexofyou \"three\"\n*if (ontherunthree = 0 )\n    *set thexofyou \"two\"\n\n*set networth + 100000000\nIt's been six months since you left Chicago. The ${thexofyou} stayed on the road as police nationwide completed a manhunt of unprecedented scale. But you got away, the case is closed (as far as you know), and the Arguelles Divorce is final, with no fortune to divide.\n\n*if (ontherunthree = 1)\n    The stress of running around with a quarter of a billion dollars has strained your relationships to the breaking point, and you feel like Rachel and Vince are both ready to issue ultimatums.\n    \n    You've given it some thought, and if push came to shove…\n    \n    *fake_choice\n        #I'd choose Vince.\n            It's always been Vince. You were smitten from the first day, and none of this would be possible without him.\n            *set bigchoice \"vince\"\n        #I'd choose Rachel.\n            Vince is special, but it's true love with Rachel. It truly feels like fate brought (and kept) you together.\n            *set bigchoice \"rachel\"\n        #Neither of these options are acceptable to me. I'd move heaven and earth to keep them both, even if it means losing everything.\n            It's like asking you to choose your favorite flavor of ice cream. No deal.\n            *set bigchoice \"both\"\n*page_break\n\nOne night, outside a rest stop in Idaho, Rachel taps you on the shoulder. You sit up suddenly, nearly hitting your head on the roof of the Ford Focus you're sleeping in for the night.\n\n\"Excuse me,\" she says. \"Do you have a moment for discussion?\"\n\n*fake_choice\n    #Yeah. *yaaaaaawn*\n        You slowly wake up. \"Yeah,\" you say.\n    #What's up?\n        You slowly wake up. \"What's up?\"\n    *if (rachelromance = 1) #Of course, my love.\n        \"Of course, my love.\"\n\n*if (ontherunthree = 1)\n    Vince looks back from the driver's seat. \"Want me to step out for a minute?\"\n    \n    \"No,\" Rachel replies. \"This concerns you too.\"\n    \n    He nods as Rachel continues.\n    \n    *page_break\n    \n\"I believe we have completed our objective. Before we return to our lives, I have an important question.\n\nYou nod, knowing what's coming next.\n\n\"What is our future? You and I, ${fname}.\"\n\nYou sigh. \"I've been thinking about that too.\"\n\n*page_break\n\n\"Rachel, I'm so glad that we crossed paths. This has been a wonderful adventure, but I'm ready to return home as well. And for me…\"\n\nYou take a deep breath.\n\n*temp withvar \"unknown\"\n*temp pronounvar \"unknown\"\n*if (bigchoice = \"vince\")\n\n    \"I want it to be with Vince. I've loved being with you and relying on you, and you'll always have my trust.\"\n    \n    She frowns. \"Thank you. That is all I needed to know.\"\n    \n    *set withvar \"with Vince\"\n    \n    *set pronounvar \"him\"\n    *goto ontherunfinal\n\n*if (bigchoice = \"rachel\")\n    \n    \"I want it to be with you, Rachel.\"\n    \n    You see Vince, crestfallen, but you know he understands.\n    \n    \"Excellent,\" Rachel replies.\n    \n    *set withvar \"with Rachel\"\n    \n    *set pronounvar \"her\"\n    *goto ontherunfinal\n\n*if (bigchoice = \"both\")\n    \n    \"You both mean too much to me to choose. I want to go into the future with both of you.\"\n    \n    You can tell that neither of them is particularly enthused, but Rachel nods.\n    \n    \"For now, I can accept this.\"\n    \n    Vince shrugs.\n    \n    *set withvar \"with Rachel and Vince\"\n    *set pronounvar \"them\"\n    *goto ontherunfinal\n\n*label ontherunfinal\n\n*page_break\n\nAfter another couple weeks, you quietly return to Chicago.\n\nYour old apartment, paid for well in advance, is waiting for you.\n\n*page_break\n\nOne night, after a candlelight dinner at a restaurant you'd never heard of a year ago, you return home.\n\nSitting on the sofa ${withvar} by your side, you wrap your arms around ${pronounvar}.\n\nEverything is perfect, even if it's not the life you imagined a year ago.\n\n*page_break\n\nReflecting on everything that happened, you're pretty proud of yourself. You pursued a serious romantic relationship (or two, even!) and handled its ups and downs (so far!) with maturity. You made a huge leap into the world of adult responsibilities and came away with a good bit of cash. Now that you're rich(-ish), you can decide for yourself if folks with all that money deserve it.\n\nFinal net worth: $${networth}\n\n*page_break\n\n*goto_scene credits\n\n\n\n", "screenshots": "*set scene1choice \"novel\"\n*set carsalary 40\n*set vinceromance 1\n*set networth 10178\n*set cashonhand 804\n\n\"And our top story tonight, yet again, concerns the pending divorce of professional hockey player Zack Arguelles. Recent motions cast doubt on the personal net worth Mr. Arguelles disclosed to the court.\"\n\nYou take another sip and lean closer to the TV.\n\n*fake_choice\n    #I should be writing, or sleeping, or cleaning my room or something.\n    #Ooh! Saucy! I wonder what happened!\n\n*set scene1choice \"novel\"\n*set carsalary 30\n*set vinceromance 1\n*set networth 7031\n*set cashonhand 112\n\nFrank shakes your hand, and then Vince's, before leaving. You and Vince look at each other.\n\n\"Ready to go?\" he asks.\n\nYou nod.\n\n\"You need a ride home?\"\n\n*fake_choice\n    #That would be nice.\n    #That would be nice, and maybe he could come in?\n    #\"I'm good.\n        \n\n*set scene1choice \"novel\"\n*set carsalary 33\n*set vinceromance 1\n*set rachelromance 1\n*set networth 1502404\n*set cashonhand 1192\n\n\"At this point,\" Rachel says. \"My offer of 4.5 million dollars stands, if it will purchase your silence.\"\n\n\"We could also just take it to the dealership as scheduled,\" Frank says. You can tell all this skulduggery is threatening to give him an ulcer.\n\n\"Or,\" Vince says with a gleam in his eye. \"We could find a way to smash the safe. Four ways, that's over a hundred milli each.\"\n\nYou take a deep breath.\n\nWe're going to…\n\n*fake_choice\n    #give Rachel the car.\n    #deliver the car as scheduled.\n    #keep the car and try to get into the safe.\n\n*set scene1choice \"bored\"\n*set carsalary 22\n*set vinceromance 0\n*set rachelromance 0\n*set networth 75\n*set cashonhand 75\n\nThe impossibly tall woman pulls off the hood on her sweatshirt to reveal long blonde hair tied in a bun. She picks one of the salespeople and speaks to him briefly.\n\n\"I've got a bad feeling,\" Vince mutters. Might just be paranoid, but her car is in fine shape from what I can see. Don't know why she'd want a new one.\"\n\nVince hasn't done much to seem paranoid to you, and you trust his gut.\n\nHe turns to you. \"What do you think we should do?\"\n\n*fake_choice\n    #Let's wait it out. We have an appointment, right?\n    #I've got a bad feeling too. Let's get rolling.\n\n*set scene1choice \" \"\n*set carsalary 0\n*set vinceromance 0\n*set networth 0\n*set cashonhand 0\n\n\"Yeah,\" Vince says. \"They want [i]this specific Audi[/i]. It's currently on a lot in [i]Santa Monica, California.[/i]\n\n\"Well,\" Frank says, \"decline the bounty. It can't be worth it.\"\n\nVince laughs. \"It is. It's so worth it that I can split it halfway with you and it's still mega-worth it. I was thinking that we have them hold down the dealership. We'll drive out together and I'll bring the car back, we'll split the bounty.\"\n\nFrank looks at you.\n\n*fake_choice\n    #\"Nuh-uh. I want to get in on this, not to mention there's no way I can run the dealership. It's my first day!\"\n    #\"Go ahead, guys, I got this.\"\n\n*page_break\n\n*goto_scene ending", "slackendscene": "You've done it!\n\nYou've managed the ultimate dream. No ambition, no goals, no drive. You're going to sit on the couch until someone stops you.\n\n*page_break\n\nAfter a few more weeks of ignoring your bills, you hear a knock at your door.\n\nYou shake the crumbs off your blanket and stumble to open it. Although you've never met in person, you recognize your landlord. He tells you that you have until the end of the month to make rent, and that he's been trying to call you.\n\n*page_break\n\nYou roll your eyes and close the door on him.\n\nA few days later, he returns and officially serves you an eviction notice.\n\n*page_break\n\nYou fight it as much as you can, which mostly consists of laying around on your couch until they literally drag it out the door.\n\nAfter staying with friends for the night, you come back to find all your belongings on the curb and the locks changed. \n\n*page_break\n\nEventually, you find a job and start making ends meet again. But you can't help feeling that you've squandered time and opportunity.  And really, what's there to look forward to if you're not going to go for it?\n\n*page_break\n\nYou've successfully chosen a life without ambition, and you manage to muddle your way through it.\n\n*page_break\n\nThe end.\n\n*achieve slack\n\n*goto_scene ending", "startup": "*title Score of a Lifetime\n*author John Lance\n\n*scene_list\n    startup\n    chapter1\n    chapter2a\n    chapter2b\n    chapter2c\n    chapter2acars\n    chapter2amall\n    chapter2a2cars\n    chapter2a2mall\n    day1finish\n    day2start\n    day3\n    $ day3afternoon\n    $ day4\n    $ day5\n    $ day6\n    $ day7\n    $ day8deliver\n    $ day8keepit\n    $ day8mansion\n    $ day8rachel\n    $ epiloguescene\n    $ ontherunending\n    $ ending\n\n*achievement job visible 50 Contributing to Society\n    Find a job.\n*achievement slack visible 1 Contributing to my Couch\n    Finish the game without doing anything productive.\n*achievement lover visible 40 I'm Falling for You\n    Start a romance.\n*ac omance 0\n*create zackromance 0\n*create vincehotel 0\n*create ontherunthree 0\n*create vincemansion 0\n*create rachelmansion 0\n\n*if choice_is_omnibus_app\n    *comment skip description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    Money! Romance! Cars! Half a billion dollars is up for grabs. Track down the fortune without letting a new flame steal your heart—unless that’s your plan! When a vehicle with a million-dollar bounty goes missing, you and your boss know it must lead to an even bigger payday.\n\n    [i]Score of a Lifetime[/i] is an exhilarating, succinct 43,000 word interactive adventure/romance novel by John Lance where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n    • Play as male, female, or non-binary; gay, straight, bisexual, aromantic, asexual, or polyamorous. \n    • Discover a hidden fortune and return it.. or keep it for yourself!\n    • Find romance with a charming used car salesman and/or a beautiful, high-powered personal assistant.\n    • Solve puzzles to unlock the biggest possible payday.\n    • Get yourself invited to dinner with the 1% or take everything they have.\n    • Feel the rush of a cross-country car chase.\n    • Choose the path that works for you: strive to become a novelist, take an entry-level job and climb… or stay at home and literally never leave the couch!\n\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first three chapters now for free.\n                *goto purchased\n\n    [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2020-11-12 $2.99 $1.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n\n*label purchased\n\n"}};
