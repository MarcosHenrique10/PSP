s enough to kill you by itself. Panic seizes you. You take one of the chains and start beating them, sending those attached to your arms flying towards the wall. You know you have no chance against so many but every second you stand still provides them with a perfect opportunity to bite again a dozen of times.\nIt is hard to believe, but after a few minutes the rats decide to leave you alone, retreating as if commanded by a common will just like the way they came. Maybe they are used to easier meals? Panting, you say the healing prayer again, fearing that if your wounds are unattended they could be inflamed. Grasping one of the chains, you leave the cell.\n*goto 78\n\n\n*label 80\nFavour decreased by 1.\n*set favour -1\n\nIt may be because of the urgency of the prayer, but an explosion of Light sets the whole cell ablaze, making even you turn your head towards the wall behind you. The rats squeak uncontrollably, running chaotically in all directions. Some of them hit the walls, leaving drops of dark blood near the place of impact. Other start biting one another, turning the shock into blind aggression. Shortly after the light stops, the rats leave you alone, retreating as if commanded by a common will just like the way they came.\nYou need a few seconds to get over the shock of being, as you believe, so close to a certain death. You push as hard as you can, feeling the handcuffs sink into your flesh, then make a pause to catch your breath. The next attempt is successful and you almost cry with joy when both chains break. As you can't see a better weapon nearby, you pick one of them, hoping not to have to use it.\n*goto 78\n\n*label 81\nFavour increased by 1.\n\n*set favour +1\nYou just can't leave a woman to her fate and walk away. The Light inside your soul would not allow it. Not after you saw the horde of rats. You believe they could strip all fresh from the bones of a human in a matter of minutes.\nAs you approach the door, you can't help but tremble. You really wish to leave this damned place as soon as possible. You open it with a loud screech and see an image of desolation chained to the wall just like you were moments ago. Under the dirt and messy hair, you recognize a pair of familiar eyes and cheekbones.\n\n\"Magdalena, is that you, child? What are you doing here?\" you ask while taking a closer look at her. She is dressed in rugs and there are severe cuts on her exposed forearms, heaps and feet.\n\n\"Yes, Brother, set me free please. I will explain. I followed you, I'm sorry. Just let me go,\" she pleads.\n\n\"Maybe I should heal you first. You just can't walk with these wounds. Poor child, you must be in a sea of pain.\"\n\n\"No, please, remove my chains. I just can't stand it anymore!\" She starts crying.\n\nYou are not used to seeing someone in such a desperate emotional state. You may get close to her to give her a fatherly hug to soothe her first. You can also heal her despite her desire to be unchained first. If you suspect a trap and are willing to spend a point of favour, you can smite her just in case. Finally, you can do what she asks you and try to remove the chains. What is your choice?\n*choice\n\t#Hug her\n\t\t*goto 83\n\n\t#Heal her\n\t\t*goto 84\n\n\t#Smite her\n\t\t*goto 85\n\n\t#Unchain her\n\t\t*goto 86\n\n*label 82\nThe corridor ends in a small vestibule. You scream with joy when you see ${ulmia} there, studying the tapestry on the wall. Well, at least the woman in front of you looks like her in her human form. However, her hair is jet dark instead of the crimson you are used to. The scarf she usually wears around her waist is now on her hair. Is she trying to conceal something? She is so concentrated that she seems unaware of your presence.\nWould you like to approach her and hug her as your instincts tell you, or will you rather shout to her from a distance and try to establish if she is really ${ulmia}?\n*choice\n\t#Hug her\n\t\t*goto 88\n\n\t#Talk to her\n\t\t*goto 89\n\n*label 83\n\"Everything is going to be fine, dear daughter. May the Light give you peace,\" you say as you approach Magdalene. You embrace her, feeling her fragile frame stop shivering. You kiss her forehead and let her head rest on your shoulder. The fabric of your cassock absorbs some of her tears. You feel her head move... and a pair of sharp canines sinks into your neck. You want to scream, but all of a sudden you realize you can't move. Maybe she injected stunning poison? A second later, she no longer needs to suck as your artery is severed and blood streams into her mouth. Your knees falter but your arms keep your neck close to her mouth until there is simply not enough blood to keep you alive.\n\nThis is a sad end of your adventure.\n*goto_scene death\n\n\n*label 84\nExperience increased by 2. Favour decreased by 1.\n*set experience +2\n*set favour -1\n\nYou decide to follow your instinct and say the prayer of mending. The pleasant sensation of the Light going through your body is present as always and you almost don't believe your eyes when actually nothing happens! Magdalene remains as battered and bruised. She gives out a wail and shakes her chains.\n\n\"What are you doing, Brother? Why won't you set the servant of the Light from your congregation free?\" she asks.\n\nShe is definitely not a servant of the Light. Whatever she is, you had better leave as soon as possible. Or, alternatively, smite her as a creature of the Darkness.\n*choice\n\t#Walk away\n\t\t*goto 87\n\n\t#Smite her\n\t\t*goto 85\n\n*label 85\nExperience increased by 1. Favour decreased by 1.\n*set experience +1\n*set favour -1\n\nYou have said this prayer a myriad of times before but still you are not fully prepared for what happens next. Magdalene bursts out in an explosion of light that sends you a step behind and blinds you for a few long moments. When your eyes recover, you see a charred skeleton instead of the young girl. A closer examination reveals a set of horns on her temple and a few bones that you believed are not supposed to be present on a human body.\nYou sigh and return to the corridor.\n*goto 82\n\n*label 86\n\"Everything is going to be fine, dear daughter. May the Light give you peace,\" you say as you approach Magdalene and try to remove her chains. It requires you to push as hard as you can but you manage to break them. She steps towards you and tumbles into your arms. You embrace her, feeling her fragile frame stop shivering. You kiss her forehead and let her head rest on your shoulder. The fabric of your cassock absorbs much of her tears. You feel her head move... and a pair of sharp canines sinks into your neck. You want to scream, but all of a sudden you realize you can't move. Maybe she injected stunning poison? A second later, she no longer needs to suck and your artery is severed and blood streams into her mouth. Your knees falter but your arms keep your wound next to her mouth until there is simply not enough blood to keep you alive.\n\nThis is a sad end of your adventure.\n*goto_scene death\n\n\n*label 87\nYou shut the door, ignoring the imploring screams of the maiden. You fear that she may break her chains and come after you. However, nothing like that happens and you try to forget about her as you continue down the corridor.\nAs a matter of fact, the sight of her remains to haunt your dreams, but this is another story.\n*goto 82\n\n*label 88\nRelations increased by 1.\n*set relations +1\n\nYou take the distance to her in a heartbeat. Just before you reach her, she turns towards you. Now you are sure who she is. No creature of darkness could possess such immaculate emeralds. You embrace her as her laugh fills your heart with joy.\n\n\"${ulmia}, I thought I lost you forever. What happened?\" you ask.\n\nShe gives you a long kiss on your lips before answering.\n\n\"It seems that my knowledge of rune lore is not that good. I made a small mistake that made me appear slightly further away from you than I expected.\"\n*goto 90\n\n*label 89\nExperience increased by 1.\n*set experience +1\n\n\"Hay, ${ulmia}, is that you?\" you shout.\n\nShe turns around. Now you are sure who she is. No creature of darkness could possess such immaculate emeralds.\n\n\"I am so happy to see you again, ${name},\" she says and comes closer to you.\n\n\"${ulmia}, I thought I lost you forever. What happened?\" you ask.\n\n\"It seems that my knowledge of rune lore is not that good. I made a small mistake that made me appear slightly further from you than I expected.\"\n\n*goto 90\n\n*label 90\n*page_break\n\"Oh, you probably mean my hair,\" she continues. \"I was very surprised when I looked at the mirror over there. I have never been a brunette, neither in my human nor in my devil form. It seems that the magic of this place is affecting me in a strange way.\" She removes her scarf, exposing the delicate horns typical of her devil form. \"Don't worry, I know you don't like them. I will hide them again.\"\n\n\"No, there is no need to bother, dear!\" You catch her hand. \"I love you even with horns on your head. Talking about how the energies of the place affect you, it seems different from how it was in the mines.\"\n\n\"Oh, yes, I am no longer the murderous bloodthirsty assassin. I am sorry for having to show you that part of me. I guess part of the reason is that my blades are also gone, just like your sword.\"\n\n\"Do you miss them?\" you ask cautiously as you know how much affection she harbours towards them.\n\nShe sighs.\n\n\"If you'd asked me yesterday, I'd tell you that losing them would be almost as hard as losing you. But now that they are gone, I feel relieved.\"\n\nYou look at the tapestry.\n\n\"What is so special about them? You were so engulfed in them that even a tin golem could have sneaked behind you.\" Her laugh ripples as you inspect the hunting scenes.\n\n\"Nothing, they were just familiar to me and I wondered if I could remember where I'd seen them. Now I'm pretty sure I know where we are.\"\n\nYou raise your eyebrow.\n\n\"Castle Lightholme. It used to be the permanent residence of Atoro for a while. I spent the better part of a year here, hoping that he would come back from his crusade so that I could finally speak to him.\"\n\n\"Why would the angel of frost choose to abduct this place into her realm?\"\n\nSister ${ulmia} shrugs.\n\n\"He was her champion. Maybe she is trying to resurrect him and having his home at her disposal may help her somehow. I really don't know. There are rumours that some priests from my order secretly experimented with it, even though the church forbade it. However, this is all I know.\"\n\nShe takes a deep breath.\n\n\"You are right this place is quite different from the last realm of the angel of frost. This is meant to be a prison for creatures of the darkness. She hates, or probably even fears it. What I feel here is a leashed and muzzled version of what I know. However, it is almost tangible. I... I can feel it , really...\"\n\n${ulmia} waves her hands and fireballs appear from her palms. She throws them on floor, leaving charred marks on them.\n\n\"I need to learn to better control them. Playing with fire is dangerous.\"\n\nYou look at her burnt hands. It doesn't look like something dangerous but your heart tells you to alleviate her pains.\n\n\"Shall I heal you?\" you ask.\n\n\"That's very sweet of you, ${name}, but there is really no need for that. It would be better to conserve your favour for when we really need it.\"\n\n\"I insist,\" you say.\n\n\"If you won't listen to me, then at least let me return to my really human form. I guess in this hybrid one it will simply not work.\"\nWill you heal her?\n*choice\n\t#No\n\t\t*goto 92\n\n\t#Yes\n\t\t*goto 91\n\n*label 91\nRelations increased by 1. Favour decreased by 1.\n*set relations +1\n*set favour -1\n\nYou feel glad while seeing her burn marks disappear, leaving the gentle milk white skin on her delicate hands.\n\n\"That was as pleasant as any touch by you.\" The priestess smiles. \"Thank you, but please don't use your prayers for every little bruise I may have. Running out of favour may be dangerous. I have seen men die from overpraying.\"\n\n\"I will have that in mind next time,\" you answer.\n*goto 92\n\n*label 92\n*page_break\n\"Where do we go now?\" You change the subject.\n\n\"Neither of us has the weapons we are used to having, so I guess we'd better go to the blacksmith. I wonder if I will see a familiar face there.\"\n\n\"Where is it?\" you ask.\n\n\"We need to go outside in the yard. It is near the gate. Another place to visit is the library. It is just down the corridor. There is a rich collection of books of prayers, spellbooks, even a few novels. The librarian seems to know most of them by heart. She helped me learn a lot last time I was here.\"\n\n\"Do you expect those people to be actually there?\" you enquire.\n\n\"I don't know.\" The priestess shrugs. \"My guess is that the angel of frost took the castle together with the people who lived there but we will see. Which of the two destinations do you choose?\"\n*choice\n\t#The blacksmith's\n\t\t*goto 93\n\n\t#The library\n\t\t*goto 94\n\n*label 93\n\"I guess neither of us feels comfortable without weapons. Let's go to the blacksmith's,\" you suggest.\n\nSister ${ulmia} nods.\n\n\"Follow me. We need to go through the front yard.\"\n\n\"All right, just be careful. We don't know what may be waiting around the corner,\" you warn her.\n\n\"So, try not to look only where I know you like,\" she gives you a playful smile. You would hate to admit it, but you are beginning to like that behavior of hers.\nThe dark and winding corridors take you to the front gate without any dangerous accounts (save from a few spider that may be poisonous, but they try to stay out of your way). The bolt seems to have never been oiled and that gives you a little bit of a challenge, but you finally succeed in unlocking the heavy wooden door.\n\nA grey cloudy heaven awaits you outside.\n\n\"Is there supposed to be a sun in this realm?\" you ask the priestess.\n\n\"No idea. We won't stay too much here, I hope. Besides, I prefer it this way. My skin is too gentle and if the sun is too strong, I get burn marks. The blacksmith's is over there, near the castle gates.\"\n\nThere are a couple of combat dummies just in front of you. With their painted faces and metal spikes on their \"hands\" they look like scarecrows made by a mad artist. The multitude of holes in their ragged bodies suggests that they have been used extensively.\n\nYou are about to pass by when the dummies come to life, swaying their improvised weapons.\n\n\"Watch out,\" screams Sister ${ulmia} and sends a fire bolt at the one closer to you.\n*if devilry >12\n\t*goto 95\n\n*else\n\t*goto 96\n\n*label 94\n*set library true\n*page_break\n\"Let's see what we can derive from the books in that library,\" you say to Sister ${ulmia}. She nods and leads the way. It seems that the long corridors haven't been used for quite a while as there are enormous spider webs all over it. A lot of the stone blocks are either broken or missing and you really wonder whether it is safe to ascend the winding staircase in front of you.\n\n\"Be careful, dear. This can fall into pieces any time now,\" you warn her.\n\n\"Don't worry, ${name}, I am certain we will die in a more meaningful way,\" she laughs.\n\nYou are not sure it is the time for such a humour but decide to answer her in the same tone.\n\n\"Yeah, like from aging,\" you murmur.\n\n\"You can be quite sweet. Brother,\" she winks.\n\nThe staircase doesn't crumble and you continue down a narrow corridor. Apart from the webs, there are two skeletons in armour. They are armed with long rusty swords.\n\n\"I don't like these fellows. They are so full of...\" Sister ${ulmia} moughs.\n\nThe skeletons slowly come to life with clings.\n\n\"...magic.\"\n\nIt seems that the fight would be inevitable.\n\n*if not (sword) \n\t*goto 107\n\n*else\n\t*goto 106\n\n\n*label 95\n*page_break\nThe dummy is immediately consumed by fire and you need to step away. The fire quickly jumps to the second target, forming another living pyre.\n\n\"That was quite amazing, Sister,\" you comment as you lead her by the hand.\n\n\"This spell is called chain fire. The really powerful warlocks are said to be able to connect multiple targets situated dozens of steps away from each other provided that there is nothing between them,\" she explains.\n\n\"You demonstrate amazing knowledge about infernal magic for a priestess.\"\n\n\"I am only priestess in my heart and you know it...and it is all yours!\"\n\nYou can't resist the temptation to stop and look her in her smiling eyes.\n\n\"I know that too.\" This is the only thing you manage to reply.\n*goto 97\n\n*label 96\n*page_break\nThe dummy is immediately set on fire that is slowly spreading all over it. Nevertheless, it continues in your direction with the second one following it closely.\nYou can go around the burning one, allowing Sister ${ulmia} to throw another fire ball while you deal with the second dummy. Another alternative would be to try to push them into each other, hoping for the fire to consume both of them.\nWhat would you do?\n*choice\n\t#Attack the second dummy\n\t\t*goto 98\n\n\t#Push them together\n\t\t*goto 99\n\n*label 97\n*page_break\nThe blacksmith's is a small building that seems so weathered and rundown that it is hard to believe that it is in use, as the thick smoke coming from the chimney indicates. You intend to get in first, however, ${ulmia} makes a run for it. She opens the door and gives and cries, making you shiver for a moment before you realize it is one of joy, not fear.\n\n\"Gerhard, I'm so happy to see you again!\"\n\nYou also get in to see an enormous man in his late sixties wielding a hammer so big that it is hard to believe anyone can handle it.\n\n\"${ulmia}, you've grown a big woman. I'm happy to see you smiling so wide.\" His voice is coarse.\n\n\"This is my friend Brother ${name},\" she introduces you. \"Can you explain what happened to the castle?\" she asks.\n\nHe shrugs and looks down.\n\n\"I really don't know. My knees hurt and I don't get out as much but there are rumours that the angel of frost has imprisoned the whole castle and the village nearby. Her agents, horrific angels roam the area and... you'd better stay away from them. I'm sorry I can't tell you more. Hey, by the way, what are you doing here? You certainly didn't choose the right time to come back.\"\n\n\"Well, we don't have much time to explain. We are in a need for weapons.\"\n\n\"That might be a bit of a problem. Here is a dagger just like the one I gave you before you left.\" He points at a blade near the anvil.\n\n\"Thank you very much. Do you also happen to have a sword you can spare for the time being?\"\n\n\"That could be a problem. I am working on one, but I can't finish it quickly unless I use the help of the fire elemental from the furnace in the room over there. Ever since the situation changed, he stopped being cooperative. I even stopped going there for fear he may toast me.\"\n\n\"I can try,\" ${ulmia} volunteers.\n\nHow would you react?\n*choice\n\t#Insist that you go\n\t\t*goto 100\n\n\t#Say nothing\n\t\t*goto 101\n\n*label 98\nFavour decreased by 1.\n*set favour -1\n\nIts metal claws look intimidating, but the dummy is quite clumsy and you manage to duck under them and get behind it. The second one immediately tries to attack you, but you evade and deliver him a series of punches breaking it into pieces.\nYou hear ${ulmia}'s scream behind you. Here fireballs seem to have hardly any effect on the dummy as it gets closer and closer to her. The priestess shrieks again as the cold metal buries into her forearm. It is only then that she begins to fight with her fists and legs, each of her blows making a big chunk of wood and cloth fall from it. You run to it in order to deliver the finishing blow.\n\n\"Are you all right?\" you ask her.\n\n\"I guess so.\"\n\nA quick glance assures you she is not. The wound is very deep and bleeds heavily. Moreover, the dummy's claws were rusty and you fear she might be infected.\n\n\"I must heal you, ${ulmia}.\"\n\n\"No,\" she protests.\n\n\"I will do it anyway, so, please, return to your human form before I finish with the prayer.\"\n\nMuch to your surprise, this time she follows your direction. Probably the pain was too strong.\n\n\"I am sorry, ${name}. I overestimated my new abilities. It is intoxicating to have them at my disposal, it is just that I am still too weak. I put both of us in danger.\"\n\n\"No, dear, it was my mistake. I could have done better in stopping them,\" you admit.\n\nShe shrugs and without saying anything more, you continue to the blacksmith's.\n*goto 97\n\n*label 99\n*page_break\nYou kick the first dummy and feel the warmth of the fire. The artificial heads of the two dummies crack together and the fire engulfs them both. Another firebolt makes them a burning pyre.\n\n\"Well done, ${ulmia}. I always knew you were hot.\" You smile at her.\n\nThe priestess blows you a kiss.\n\n\"I feared I overestimated my new abilities. It is intoxicating to have them at my disposal, it is just that I think I am still too weak. It is nice to see that I am not that weak.\"\n\nYou nod and without saying anything more, you continue to the blacksmith's.\n*goto 97\n\n*label 100\nRelations increased by 1.\n*set relations +1\n\n\"I can't let you do that,\" you announce. \"I will wield the sword, so it is something I must do.\"\n\n\"That is very nice of you, but I believe I would be better at talking to the elements. My ancestry is mingled with fire and I am now beginning to master those forces.\"\n\n\"Can you really do it?\" you wonder.\n\n\"I don't know. But I wish to try.\n\nWould you allow her?\n*choice\n\t#No\n\t\t*goto 102\n\n\t#Yes\n\t\t*goto 101\n\n*label 101\n\"All right, darling. Just take care,\" you say.\n\nShe nods and cast a spell that engulfs her in red mist. The blacksmith points her the door, she takes a deep sigh and goes through it.\n*if devilry \u003c12\n\t*goto 104\n\n*else\n\t*goto 103 \n\n*label 102\nRelations increased by 1. Favour decreased by 1.\n*set relations +1\n*set favour -1\n\nYou enter the room.The air is filled with soot and makes you cough. There is no fire in the furnace, only a pile of dying embers.\n\n\"Why do you come? I hate it when people open that door. It is so cold outside.\" The embers shiver. That must be the elemental the blacksmith told you about. You expected it to be a wild raging conflagration. What you behold makes you smile. Nevertheless, you remind yourself to be careful with elementals as they can be quite unpredictable.\n\n\"I need some of your fire to help Gerhard finish a sword,\" you explain.\n\n\"I have very little warmth remaining. I fear that if I give you some, I may die. He is so terrible at taking care of me.\"\n\nWhat would you reply? You can threaten him, which would be a rude approach but you really need a piece of the elemental. You can offer to pray for it. You have never tried it but suppose that the Light will have an invigorating effect on the fire creature. Or, you can also explain that the sword will help fight the angel of frost. Finally, you can confess it.\n*choice\n\t#Threaten him\n\t\t*goto 244\n\n\t#Pray for it\n\t\t*goto 245\n\n\t#Explain why you need the embers\n\t\t*goto 246\n\n\t#Confess it\n\t\t*goto 247 \n\n*label 103\n*set sword true \n\nYour heart is about to sink into the abyss while you wait for the priestess to come back with the piece of burning embers. You just couldn't believe your eyes as she emerges with a triumphant smile and a shovel with a burning piece of coal.\n\n\"Careful kids, this embers is priceless.\" Gerhard takes it, goes to his anvil and sets to work.\n\nDuring the next couple of hours you watch as the blacksmith repeatedly hammers the blade, then puts it into water, creating a cloud of steam. You also use the time to get some much needed rest as you know you will need all your strength to finish your journey. From time to time, you lay your eyes on the beautiful ${ulmia}. Sometimes you wish it will be all over and you will be able to enjoy her company without having to worry about fallen angels, demons or any other monstrosities.\n\n\"It is done,\" says Gerhard, panting and interrupts your daydreaming.\"Try it.\" He hands you the swords. You take it carefully and try a few swings. The balance is perfect. It feels a bit lighter than your previous sword and by the look of the blade it must be a lot sharper.\n\n\"I think it will be a lot easier to fight with it,\" you say with a smile. \"Thank you, Gerhard, I really don't know how to repay you.\"\n\n\"By slaying that hell of an angel and returning the region back to the white world.\" He is quick to snap back... and smiles as well.\n\n\"Thank you, Gerhard,\" says ${ulmia} and gives him a quick hug.\n\n\"Take good care youngsters and good luck!\"\n\n\"May the Light watch over you!\" You bless him and leave the blacksmith's.\n*if not (library)\n\t*goto 94\n\n*else\n\t*goto 124\n\n*label 104\nRelations decreased by 1. Favour decreased by 1. \n*set relations -1\n*set favour -1\n*set sword true\n\nYour heart is about to sink into the abyss while you wait for the priestess to come back with the piece of burning embers. You just couldn't believe your eyes as she emerges with a shovel with a burning piece of coal.\n\n\"Are you alright dear?\" you ask when you see her burnt hand.\n\n\"Yes, I will be fine.\"\n\nYou can't fail to hear a hint of blame in her voice. The burn seems nasty and you must say a healing prayer.\n\nDuring the next couple of hours you watch as the blacksmith repeatedly hammers the blade, then puts it into water, creating a cloud of steam. You also use the time to get some much needed rest as you know you will need all your strength to finish your journey. From time to time, you lay your eyes on the beautiful ${ulmia}. Sometimes you wish it will be all over and you will be able to enjoy her company without having to worry about fallen angels, demons or any other monstrosities.\n\n\"It is done,\" says Gerhard, panting and interrupts your daydreaming.\"Try it.\" He hands you the swords. You take it carefully and try a few swings. The balance is perfect. It feels a bit lighter than your previous sword and by the look of the blade it must be a lot sharper.\n\n\"I think it will be a lot easier to fight with it,\" you say with a smile. \"Thank you, Gerhard, I really don't know how to repay you.\"\n\n\"By slaying that hell of an angel and returning the region back to the white world.\" He is quick to snap back... and smiles as well.\n\n\"Thank you, Gerhard,\" says ${ulmia} and gives him a quick hug.\n\n\"Take good care youngsters and good luck!\"\n\n\"May the Light watch over you!\" You bless him and leave the blacksmith's.\n*if library\n\t*goto 124\n\n*else\n\t*goto 94\n\n*label 105\n*set sword true\n\n\"Thank the Light you are safe,\" says Sister ${ulmia} as soon as she sees you and embraces you, almost making you drop the shovel.\n\n\"Careful kids, this embers is priceless.\" Gerhard takes it, goes to his anvil and sets to work.\n\nDuring the next couple of hours you watch as the blacksmith repeatedly hammers the blade, then puts it into water, creating a cloud of steam. You also use the time to get some much needed rest as you know you will need all your strength to finish your journey. From time to time, you lay your eyes on the beautiful ${ulmia}. Sometimes you wish it will be all over and you will be able to enjoy her company without having to worry about fallen angels, demons or any other monstrosities.\n\n\"It is done,\" says Gerhard, panting and interrupts your daydreaming.\"Try it.\" He hands you the swords. You take it carefully and try a few swings. The balance is perfect. It feels a bit lighter than your previous sword and by the look of the blade it must be a lot sharper.\n\n\"I think it will be a lot easier to fight with it,\" you say with a smile. \"Thank you, Gerhard, I really don't know how to repay you.\"\n\n\"By slaying that hell of an angel and returning the region back to the white world.\" He is quick to snap back... and smiles as well.\n\n\"Thank you, Gerhard,\" says ${ulmia} and gives him a quick hug.\n\n\"Take good care youngsters and good luck!\"\n\n\"May the Light watch over you!\" You bless him and leave the blacksmith's.\n*if library\n\t*goto 124\n\n*else\n\t*goto 94\n\n*label 106\nYou take your sword and step in front of Sister ${ulmia}, managing to behead the first of the skeletons even before it manages to get up. Its bones roll on the dirty floor and you kick a few away just to be on the safe side if its pieces continue to fight.\nThe second skeleton takes you by surprise, charging at an unexpected for undead speed, slamming you with its shield and knocking you off balance. You hear Sister ${ulmia}'s cry as she sends a fire bolt at the enemy, melting the shield, but the skeleton continues towards you seemingly unharmed. It is just a foot from you when ${ulmia} grabs a big bone from its fallen comrade and hits its shoulder. Its hand carrying the sword falls down and the creature stops for a second, probably wandering what to do with its incapacitated remains thus giving you the time to rise and decapitate it as well.\n\n\"You know, we make a very good team,\" ${ulmia} says, trying to catch her breath.\n\n\"Absolutely, dear. You are so good, no matter whether you use spells or melee weapons,\" you smile at her.\n\n\"Well, under other circumstances, I wouldn't use this weapon. It is disgusting!\" She tries to shake the dirt off her hand.\n\nYou hug her and the two of you continue towards the library.\n*goto 248\n\n*label 107\n*page_break\nYou feel very sorry for not having your blade now. Sister ${ulmia} starts gathering magical energies in her hands, ready to release them in a conflagration. However, it happens much too slowly. The skeletons are up on their feet, the first of them raises its shield defensively.\nYou realize there is hardly any time for a prayer of smiting. Even if you manage to do so, the second one will most likely reach ${ulmia} before she is ready. Would you step in front of Sister ${ulmia}, trying to delay the skeletons with your bare hands or refrain from such bravery, relying on the good old prayer of smiting?\n*choice\n\t#Attack\n\t\t*goto 108\n\n\t#Smite\n\t\t*goto 109\n\n*label 108\nNot hesitating, you jump in front of your love. The skeleton near you stops for a second and shifts its attention towards you. Its subsequent attack is rather clumsy and you dodge it without a problem. Normally, you would use the opportunity for a counterattack but there is really nothing you could do to the undead creature unarmed, so you keep moving as much as the limited space allows you, knowing that the goal is to give ${ulmia} enough time to finish her spell.\nThe second skeleton closes on you too.\n\n\"Lay down!\" the priestess shouts.\n\nYou kiss the ground and feel a mass of heat above you. The fireball engulfs the undead, cremating them in an instant. You rise, panting and removing the sweat from your brow and look at Sister Umlia and can't help but smile. She looks glorious – her right hand still extended to direct the flamewave, her green eyes aflame.\n\n\"That was spectacular, dear,\" you say.\n\n\"Next time, please, don't stand between me and the monsters. I am still not very good at controlling the magic here. I don't want you to get roasted.\"\n\n\"All right, next time I will leave you to the natives and just watch you do all the work,\" you joke and wink at her. She says nothing but awards you with a smile as you both continue to the library.\n*goto 248\n\n*label 109\nFavour decreased by 2.\n*set favour -2\n\nYou try to mouth the sacred words as quickly as you can but the skeleton is too close to ${ulmia}. Before any of you could finish, it grabs her hand and twists it badly. You hear her bones break and her scream makes you cry the last word with such a ferociousness that the Light not only shatters the first skeleton but also puts the second to rest.\n\nYou rush to the priestess, who looks unnaturally pale even for her.\n\n\"Are you all right?\" you ask nervously.\n\n\"The pain...\" she sithers. \"It is almost intolerable.\"\n\nYou nod and recite a healing prayer and are quite happy to hear her sigh with relief.\n\n\"That was amazing, Brother ${name},\" she says.\n\n\"Come on, Sister. I've healed more serious stuff.\"\n\n\"No, I was talking about smiting two skeletons with a single prayer. I don't think I've seen anything like that.\"\n\n\"I think I got overexcited when I hear you scream, so full of pain.\"\n\n\"Or maybe it is the energies of this world that make prayers stronger?\"\n\n\"Could be the case.\" You shrug and continue towards the library, careful not to step on any of the sharp bones in the area.\n*goto 248\n\n*label 110\nExperience increased by 2. \n*set experience +2\n*set read_books +1\n*set random_books -1\n*page_break\n\"I presume that any information about the angel of frost might be valuable,\" says the priestess. \"I choose her story.\"\n\nThe ghost nods and murmurs something. The book opens and a monotonous voice starts reading.\n\nThe voice of the book retells you the story of the fallen angel of frost and adds a few details and events you were unaware of.\nThe angel of frost was sent into the abyss to scout the domain of devils. Unfortunately, she fell in love with their master with all of her pure heart. She loved to spy on him, cherishing his though infernal handsomeness.The devil caught her but instead of executing her, as was the custom, made her his lover. For a while, the angel of frost was happier that she was in heaven, but then the leader of the devils grew fed up with her and cheated on her.\nThe angel of frost was devastated. Her sea of love turned into an avalanche of hatred and she turned both her love and the concubine into statues of ice. Thus, she became the new ruler of that layer of the abyss. She committed various atrocities towards the devils, personally slaying tens at a time.\nWhen Atoro arrived, a spark of hope appeared in her frozen heart. Could the holy paladin bring her back to the Light? It was easy for her to make Atoro love her with all the powers of the Light and Dark she now possessed, but it turned out to be one based on worship on the side of the paladin, instead of mutual longing. Not only did Atoro fail to melt her, but he allowed her to corrupt him.\n\"Despite her atrocious nature, the angel of frost has been known to harbor respect towards couples in love. While she enjoyed delivering painful death to cheaters, she never did any harm to the ones true to each other in their hearts,\" the voice reading the book concludes.\n*goto 257\n\n*label 111\nDevilry increased by 2.\n*set devilry +2\n*set read_books +1\n*set random_books -1\n*page_break\n\"It is the first time I don't have to fight the devil inside me. ${name}, I believe mastering my new powers can be crucial for the success of our mission. I choose the book of Dark.\n\nThe voice of the book starts explaining how to feel the force of the Dark, what words to use to reach for it. It also includes a few exercises, including making a small flame appear in the air and dance, drawing runes in the air.\n\nSister ${ulmia} is obviously having a lot of fun and you also enjoy her beaming smile.\n*goto 257\n\n*label 112\nFavour increased by 1.\n*set read_books +1\n*set random_books -1 \n*page_break\nYou spent a few years studying different prayers and you are actually surprised when the voice of the book reads you a few you've never heard of. When you pronounce them, you feel the Light surround you.\n*goto 257\n\n*label 113\n*set dark_healing true\n*set read_books +1\n*set random_books -1\n*page_break\n\"I like the story about Brother Carton. It is good to know that there were other priests like us, lurching between the Light and Dark. Don't you think it would be nice to be able to heal a devil?\" ${ulmia} asks.\n\n\"Only if that devil is you, my dear. Yes, that skill would be handy if I need to renew you in this hybrid devilish form.\"\n\n\"I like it when you care about me, ${name}.\" Her warm hand touches yours.\n\nThe voice of the book tells you the story of the exorcist who failed at consecrating a farm haunted by devils. He was abducted by the creatures of the Dark and held prisoner there.\n\n\"For all the faith in the Light I have, I felt strong fear to be left to the mercy of these creatures I spent all of my life fighting against. I thought the Light left me and I wandered what sin I had committed to deserve it. As time passed, I realized it was a lesson to learn. I must admit that as foul as their kind is, they treated me well. They fed me with freshly baked break and even occasionally would bring me a jug of fine wine,\" the voice read on.\nThe reason his smiting prayers failed to work was not discovered but maybe it had something to do with the place. Brother Carton was allowed to go outside from time to time.\n\n\"I was very happy when they let me see the sunlight again. I saw small devils play around, just like human children would do. One of them fell and hurt its knee badly and its mother immediately came to carry it inside and calm him. She put soothing balm on its knee. Then, the realization struck me. Devils are really not much different from us. I felt filled with doubt. How many of them had I destroyed for the reason of them being what they are? Tens? Close to a hundred? I didn't keep track.\"\nBrother Carton spent a few weeks researching the ways they heal and then somehow discovered a way to use prayers to do that.\n\nThe voice concludes with the actual prayer.\n\n\"It is not very different from the one I am used to saying,\" you remark.\n\n\"Just like humans and devils are not very different,\" Sister ${ulmia} replies.\n\n\"I would disagree. Ulmiroth is very different from you.\"\n\n${ulmia} gives out a bored sigh.\n\n\"You still don't understand. Ulmiroth is evil, but it is not because she is a devil but because she chose to be. Even if being born an angel won't guarantee that you will be benign.\"\n\n\"That sounds wise.\"\n*goto 257\n\n*label 114\n*set relations +1\n*set read_books +1\n*set random_books -1\n*page_break\n\"I know it may sound like an irresponsible decision, but I would love to hear the story about the Sisters who fell in love with each other,\" ${ulmia} says.\n\nYour eyes open wide.\n\n\"I... didn't know you fall for... women love.\"\n\nSister ${ulmia} roars with laughter.\n\n\"I guess I know what bothers you, ${name}. No, I don't like women the way that you do. I like the story because it is about two powerful women who let their love fuel their actions, resulting in a revolution of a sort. Come on!\" she pets your forearm. \"I thought you would be more concerned about the fact that it might be the least useful book for our current mission.\"\n\nYou put your hand on your face.\n\n\"Just let it go, please.\"\n\nThe voice of the book tells you of the time when the Church of Light was more conservative about same gender relations. It was believed that only romances between a priest and a priestess were acceptable as only they would provide the medium needed to nurture the next generation of faithful priests. This changed when two of the most influential priestesses of the time appeared to be madly in love with each other.\n\nSister Claudia was the Prelate of the Order of Sacred Restoration, renowned for its healers. Sister Rosary was the High Exorcist of the Order of the Cleansing fire. They met in a cursed village ravaged by the plague of undeath. The Church of Light feared that the epidemic could reach the city nearby as had happened the previous year, so it gathered together the most valuable members of the two Orders.\n\nAs soon as their eyes met, Sister Rosary felt fire stronger than the one she used to cleanse evil with burn inside her heart. Sister Claudia knew that her soul can only be fully healed if they are together.\n\nThe two priestesses spent more than a month on the battlefield of putrescence. When all the remaining living were healed and all of the zombies put to rest, the Sisters threw themselves into each other's arms and shared a passionate kiss, no longer able to hide their desires.\n\nWhen they left the village, they vowed to keep their love secret. Unfortunately, at the next Convergence, their eyes danced with each other too much. Brother Rion, a prophet filled with unclean ambition, was able to perceive what was going on between the ladies and he went to the High Priest to make the revelation.\n\nThe High Priest summoned the Sisters to remind them that their duties as priestesses of the Light included not falling in love with each other. Claudia did not react, her secretive nature telling her that it is better to continue their secret affair, but Rosary burst out and shouted that she would rather throw her cassock than give up on her beloved. That night was the last for her as a member of the clergy.\n\nSister Claudia appeared adamantine, in control of her emotion but inside her soul was bleeding. Of course, she continued her relations with Rosary but it was a painful love, yet a fiery and strong one.\n\nAbout a year later, the son of the High Priest was abducted by a demon. Sister Claudia reminded him of the best exorcist of their time and the little detail that it was him who made her leave the Church.\n\nThe High priest had to swallow his pride and ask Rosary for help. Just a day after that, he had his son in his arm. That day, the Church changed its doctrine on same sex relations. Rosary was invited back into the Church and when it was the time for the High Priest to resign, he appointed no other than the legendary exorcist.\n\nWhen the voice of the book stops, you marvel at the joy on Sister ${ulmia}'s face.\n*goto 257\n\n*labe  around it, so you can't see it very well.\n\n\"Could it be the castle of the angel of frost?\" you wonder.\n\n\"I guess we should find out. It doesn't seem to be that far away.\"\n\nYou nod and set off. The path winds among dead trees and clearing.\n\n\"That place gives me the creeps,\" you say.\n\n\"Come on, you didn't say that in the abandoned mine. Did you feel more comfortable there?\" ${ulmia} asks.\n\n\"Actually, yes. It consisted of tunnels and caves. Apart from some of the monsters, the place was not much different from what you would expect to see in our world. This area is an example of a slow decomposure.\"\n\n\"I could see your point. Look!\"\n\nThe path ends at what appears to a plantation of enormous carnivorous plants. There are dozens of devils working there, cleaning the leaves, watering them with some red liquid that may very well be blood.\n\nOccasionally, the plants would take a bite of the devils wandering around and chew big chunks of meat. A few angels armed with sticks and whips don't hesitate to use their weapons to abuse the infernal slaves.\n\n\"Sweet Light, what is this place?\" Sister ${ulmia} curses quietly.\n\n\"It was you who told me that the angel of frost hates creatures of the Dark. I guess you are right.\"\n\n\"Did you see those angels? Their faces are... distorted. They look cruel. What are they?\" The priestess continues expressing her horror.\n\n\"Maybe the same thing as the angel of frost. Come on, let's go around. There is nothing we can do about them.\"\n\n\"Yeah, you are right.\" ${ulmia} sighs and looks away. \"I am beginning to hate this place as well.\"\n\nAs you try to make past the dead bushes near the mine, you come about another ugly scene. A female devil is down on her knees. An angel has his arm clenching one of the devil's horns and caning her with the other.\n\n\"Tell me again what did you do to that overseer!\" the angel shouts.\n\n\"I told you already...\" whines the devil.\n\n\"What? I can't hear you.\"\n\n\"I told you already, master! The succubus was dying. She was bitten too badly by the venomous plants. I knew overseers have antidotes, but I had no idea where. The overseer saw her condition but refused to help. I couldn't watch her die. I needed to do something.\"\n\n\"I need to do something too. And I would watch to see you die,\" the angel says and hits her very hard. The body of the devil shivers in agony.\"\n\n\"Please, have mercy!\" she begs.\n\n\"You deserve none! Or maybe I should let you finish your tale. What happened later?\"\n\n\"I confessed the overseer. She told me where the antidote was.\"\n\n\"Confessed her? A dark confession? You deserve a painful death.\"\n\nSister ${ulmia}'s face gets as red as Ulmiroth's. You know that she is dying to help the devil. On the other hand, it could be dangerous...\n*choice\n\t#Wait a while\n\t\t*goto 261\n\n\t#Attack the angel\n\t\t*goto 126\n\n\t#Continue on your way\n\t\t*goto 127\n\n\t*selectable_if (control_evil) #Control the devil, making her stand up and fight\n\t\t*goto 128\n\n*label 125\nRelations decreased by 2. Favour decreased by 1. \n*set relations -2\n*set favour -1\n*set friend true\n*page_break\nSister ${ulmia} and you are going to make you regret that decision, but you say the prayer of smiting, putting an end to the misery of the devil.\n\n\"Who's there?\" asks the angel.\n\n\"Just come out and don't make anything stupid. Change to your human form, please,\" you whisper to ${ulmia}.\n\n\"I can't make anything more stupid than what you just did. I hate you!\" she whispers back and puts a disarming smile on her face.\n\n\"We are just priests coming back from a mission for the angel of frost. I am Brother ${name} and this is Sister ${ulmia},\" you explain.\n\nThe angel looks at you judging you.\n\n\"There are many new minions of Her Highness Chill. As if we angels can't handle everything. Anyway, I guess I should thank you. That piece of dirt did the same thing again – she confessed me and while I was under the confusion tried to stab me. I am only sorry that she didn't suffer enough.\"\n\nYou see the priestess smile and you are certain she imagines cutting him to pieces.\n\n\"I need to go back to the plantation or the lazy peons will start wasting their time.\n*goto 264\n\n*label 126\nExperience increased by 1. Devilry increased by 1. \n*set experience +1\n*set devilry +1\n*set foe true\n*page_break\nYou take out your sword and charge but before you can reach the angel, all there is left of him are charred remains. You turn around to see ${ulmia}. She seems relived.\n\nYour attention shifts towards the devil woman. You bend and help her get up.\n\n\"Are you all right?\" Sister ${ulmia} asks.\n\n\"Yes, I was planning to confess him and ask about his weak spot so I can stab him there but the pain was unbearable, I thought I would pass out before I could do so.\"\n\n\"You are a brave girl. What is your name?\" Sister ${ulmia} asks.\n\n\"Sulphura.\"\n\n\"I am Sister ${ulmia} and this is Brother ${name}.\n*if not (dark_healing)\n\t*goto 131\n\n*else\n\t*goto 268\n\n*label 127\nRelations decreased by 2.\n*set relations -2\n\nYou decide it is high time to go and pull Sister ${ulmia} by the sleeve of her cassock. You know she is angry with your decision, but decides to follow it anyway. Your heart actually hurts to know the discomfort you are causing her and you begin to wonder if you like this submissive incarnation of hers or the wild and unpredictable Ulmiroth.\n\nAs you move away, you step on a branch and break it.\n\n\"Who's there?\" The angel sees you. You start thinking of an excuse for being there, but there is really no need. The devil sands up, a dagger in her hand, and backstabs the angel.\n*goto 271\n\n*label 128\nFavour decreased by 1.\n*set favour -1\n\nYou decide to use the newly learned prayer of controlling creatures of the Dark. Realizing that it is not the noblest of decisions, you nevertheless decide to do so because of the low risk for you. The devil woman looks too tired to get up and fight... or doesn't want to do it for some reason but you guess some external stimulus may change the situation.\n\nThe angel is flabbergasted when you see her rise to her feet. You are just as surprised to see a dagger in her hand, sparkling in the sun before sinking into his heart.\n*goto 271\n\n*label 129\nFavour decreased by 2.\n*set favour -2\n\nYou decide it is high time to go and pull Sister ${ulmia} by the sleeve of her cassock. You know she is angry with your decision, but decides to follow it anyway. Your heart actually hurts to know the discomfort you are causing her and you begin to wonder if you like this submissive incarnation of hers or the wild and unpredictable Ulmiroth.\n*goto 131\n\n*label 130\n*page_break\nWhere would you like to go?\n*choice\n\t*hide_reuse #The inn\n\t\t*goto 140\n\n\t#The stables\n\t\t*goto 141\n\n\t*hide_reuse #The cemetery \n\t\t*goto 142\n\n\t*hide_reuse #The church\n\t\t*goto 143\n\n\t*selectable_if (palace) #Leave the town and continue to the palace\n\t\t*goto 138\n\n*label 131\n*page_break\nYou continue your way towards the castle. Quite a few mosquitoes try to take advantage of you, causing you major annoyance.\n\n\"Did I really hear you swearing, Brother ${name}?\" the priestess asks you amused.\n\n\"Hm, I thought I did so only in my mind. These must be some of the most terrible creatures the Light ever created. Do you happen to have some of that garlic cream we used last time we were travelling through such an infested area?\"\n\n\"No, I am sorry, I left it near my bed in your church. Shall we go back?\"\n\n\"I most certainly hope to do so. But I guess we need to kill someone. Did you hear that?\"\n\n\"There is someone over there.\"\n\nSister ${ulmia} is right. There is a woman bathing in a lake. The vision of her makes you blush and look away, but before that (apart from her being strikingly beautiful) you notice that she has a pair of leather wings and horns that are much longer than ${ulmia}'s.\n\n\"Come on, ${name}. I know there are priests who never see a naked woman in their life, but a little infernal bird told me you are not one of them.\" Sister ${ulmia} says in a mocking voice.\n\n\"So you won't feel uncomfortable if I look at her?\"\n\n\"Oh, you are boring sometimes. I am a priestess from the Order of the Cleansed. It is not that easy to get me out of my comfort zone. Don't overdo it, though.\"\n\nWhen you look in the direction of the lake, you see that she is already at the shore and... kind of dressed in a tight short leather skirt and a very meager leather top. She has long jet black hair and tanned skin that highlights her navy blue eyes. Her meaty cherry coloured lips would have been especially beautiful if not for them being bruised. Her skin bears numerous other cuts.\n\nThat must be the succubus the she-devil you met before tried to save.\n\n\"Don't worry, we are not here to hurt you,\" Sister ${ulmia} says as you approach the demoness.\n\n\"You sacred me. I thought that the angels from the plantation were coming for me. I knew I had to run away quickly, but a girl like me just can't go on being dirty and my leg is badly hurt.\" She offers you the view of a shapely thigh with an ugly scar on it. \"Can you do anything to help me? I need just a little bit of energy.\" She blinks seductively.\n\nQuite a few ideas form in your mind\n*choice\n\t*selectable_if (dark_healing) #Heal her\n\t\t*goto 272\n\n\t#Offer her some of your energy\n\t\t*goto 273\n\n\t#Suggest ${ulmia} gives her some of her energy\n\t\t*goto 274\n\n\t#The angels in the castle may need a proof of loyalty. Smite her\n\t\t*goto 275\n\n\t#The angels in the castle may need a proof of loyalty. Enthrall her and escort her to the castle\n\t\t*goto 276 \n\t\n\t#Deny any help and move on\n\t\t*goto 134\n\n\n*label 134\nYou go on the path leading towards the palace, this time meeting no one. It seems that the area outside the plantation is not very crowded. Reaching a crossroad, you stop.\n\n\"There seems to be a village of a sort over there,\" says the priestess.\n\n\"I can't see it very clearly,\" you admit.\n\n\"Maybe my vision is not that sharp. Do you suggest we go there?\"\n\n\"I don't know. We may find something helpful...\"\n\n\"Or our death,\" you interrupt her.\n\nWhat would you decide?\n*choice\n\t#Continue your way\n\t\t*set palace false\n\t\t*goto 138\n\n\t#Head for the village\n\t\t*goto 139\n\n\n*label 138\nThe way towards the castle is uneventful and you feel that you are making a steady progress towards it, however, a strange feeling arises within you. It is a mixture of anxiety and confusion. A part of you seems to be sure that you are doing something wrong.\n\nA pair of angels armed with wrong spears guard the gate. They remain silent as you approach them, but they step closer to each other, blocking your way.\n\nWhat would you do?\n*choice\n\t*selectable_if (trophy) #Show them the trophy\n\t\t*goto 395\n\n\t*selectable_if (slave) #Give them the succubus\n\t\t*goto 396\n\n\t*selectable_if (dark_confessions) #Confess them\n\t\t*goto 397\n\n\t*selectable_if (angel_control) #Ask ${ulmia} to control one of the angels\n\t\t*goto 398\n\n\t#Wait\n\t\t*goto 399\n\n*label 139\n\"Is it a ghost town or something?\" Sister ${ulmia} says skeptically as you enter. There is little sign of it being inhabited. The 'town' actually consists of just a few buildings that seem to need repair. The main square is dirty.\n\n\"I think we may be wasting our time here. I am sorry for suggesting coming here.\" Says Sister ${ulmia} and turns around, ready to go back towards the crossroad.\n\nThe wind blows, howling from the graveyard nearby.\n\n\"Did you hear that?\" you ask the priestess.\n\n\"I am not very sure? Was that a moan... or just the wind?\" ${ulmia} strains, trying to hear more. This time, there is a screech from the inn.\n\n\"Maybe there is someone in there,\" you say.\n\n\"Just like you would expect from a ghost town. I don't know, ${name}, I don't usually feel this way but this place gives me the creeps.\"\n\n\"Nothing gives you the creeps, does it?\"\n\n\"I thought I was immune with fear. I really don't know what is happening. See?\" The priestess shows you her forearm. It looks goosy.\n\n\"All right, shall we just walk around and take a look. Then, we can go leave for the castle,\" you offer.\n\nShe nods. You feel her body so close to yours, as if she was trying to be virtually in you. The feeling is pleasant but you are just not used to it.\n\n\"Oh, that is a church,\" she exclaims.\n\nIt is a pain to look at it. There used to be a glass roof, just like the one of your church. This one is broken. There are strange symbols on the walls.\n\n\"Have you seen anything like this before?\" You ask the priestess. She steps away from you to take a closer look.\"\n\n\"I don't think these are demonic runes. I feel something ancient about them, something unknown.\"\n\n\"That mist over the graveyard.\" You scratch your chin. \"It looks unnatural. I can almost smell something evil.\"\n\nSister ${ulmia} turns around and takes a deep breath.\n\n\"This unexplainable fear of mine... it is the source,\" she whispers. \"Oh my dear Light, there is someone!\" She puts her hand on her mouth.\n\nYou give your best to behold at least a silhouette but you fail. Maybe she is having hallucinations.\n\n\"Forget about it for the time being. Let's see what else we have here. This seems to be stables,\" you point at a shaggy ramshackle building. \"I hope there are no horses in.\"\n\n\"And that must be the inn,\" the priestess says. \"You know what, if there is any place I would rather enter in this damned place, that would be it.\n*goto 130\n\n\n*label 140\nThe inn seems to be the best preserved building in the village. You feel that this is supernatural, so you proceed towards it with caution.\n\n\"Someone is whistling inside,\" Sister ${ulmia} whispers. Her sense of hearing is keener than yours and you need to step a few meters further ahead to be able to hear it too. Taking out your sword, you enter.\n\nThere is no immediate danger, though. Just the innkeeper standing behind a counter, singing something as he wipes glasses. You scrutinize his features but you see nothing particularly interesting. The man is tall and big, with a short beard, but there is nothing to suggest that he belongs to the Dark.\n\n\"Welcome to my inn,\" he says without bothering to smile. \"It has been a while since I last got any guests.\"\n\n\"I don't think there are many potential ones alive in the area,\" Sister ${ulmia} remarks.\n\n\"It is true. I guess I might be the only one alive in the village,\" the innkeeper nods. \"This makes me suspicious, doesn't it?\"\n\n\"Most certainly,\" you say.\n\n\"When the angel of frost came here and laid waste to our village, she decided to leave me alone because she thought I could provide her with information whenever she needs it. You know, in my profession, I have access to all kinds of stories.\"\n\n\"Does she visit you often?\" the priestess enquires.\n\nThe man shakes his head.\n\n\"No. I am beginning to think she doesn't need me that much. I fear she may send a sentinel to execute me.\" His face remains devoid of emotion. \"It is getting late. Would you like to spend the night here?\"\n\nYou hear a screech coming from below, probably in the basement.\n\n\"Mice,\" the innkeeper shrugs. \"These pests are really annoying. But, don't worry, they prefer to stay down. I will offer you a room on the second floor.\"\n\nYou doubt the noise was made by a rat. Well, at least not a rat as small as the ones from your realm. Who knows what monstrocities are the rodents here.\n\nWhat do you do?\n*choice\n\t#Ask him about the other places of interest in the area\n\t\t*goto 144\n\n\t#Spend the night in the inn\n\t\t*goto 145\n\n\t#Check the noise in the basement\n\t\t*goto 146\n\n\t*selectable_if (prophet) #Follow the urge to receive a prophecy\n\t\t*goto 286\n\t\n\t# Attack him\n\t\t*goto 287\n\n\t#Leave the inn\n\t\t*goto 288\n\n*label 141\n\n\"Let us see if there are no animals inside,\" you say and offer the priestess your hand and she readily takes it. It is wet and cold.\n\nThe closer you get to it, the more you have the feeling there is someone... or something inside it.\n\n\"Oh, dear Light, it is not a joke,\" you exclaim as you see the... horses inside. There is a couple of them. Their skeletal bodies are covered with rags and saddles that sparkle as they start twisting and turning. Their fiery eyes look into your soul and you feel them begging you to release them.\n\nYou step closer and examine their reigns. They are made of chains and are tied to a supporting pillar.\n*if prophet\n\t*goto 370\n\n*else\n\t*goto 371\n\n*label 142\nRelations decreased by 1.\n*set relations -1\n\n\"${name}, you can't... Why do you want me to go there?\" She asks, her face getting as white as a ghost.\n\n\"Come on, ${ulmia}, you have to overcome your fear.\"\n\nShe takes a deep breath.\n\n\"I guess you are right, Brother. I need to fight it. Let's go.\"\n\nYou offer her your hand, but she declines it with a sweeping gesture. You smile at her determination to succeed herself. As you step into the graveyard, the mist surrounds you. It moves as if it alive, crawling up your legs, then subsiding in wavelike motions.\n\n\"Oh, ${name}, we must run out. These are the mists of recall!\" She suddenly remembers. \"This is why I fear them... I fear Ulmiroth.\"\n\nYou are not very keen on seeing the devil again, but wander if she would have a higher chance of survival in this realm.\n\n\"Would she be as uncontrollable as she was in the other realm?\" You ask as you both slowly move back.\n\n\"What? Are you really considering having me turn back to her? How... how could you?\" Her voice softens to a mere whisper.\n\nDo you want her to turn into Ulmiroth?\n*choice\n\t#Yes\n\t\t*goto 375\n\n\t#No\n\t\t*goto 374\n\n*label 143\n\"What do you feel when you see a church of the Light in such a state?\" Sister ${ulmia} asks you as you approach the derelict building.\n\n\"Well, it is hard to put my finger on it. In a way, it is like seeing a dead body – you know the true miracle – the spirit – is gone forever. But, it is also true that in a church there will always be a spark of the Light. And I feel happy to be wherever the Light is.\"\n\n\"I doubt there is much of a spark here,\" says the priestess while examining the runes. \"They are infernal. Whoever wrote them here, wanted do desecrate the place forever.\n\nYou get close to the door and put your ear on it. You are not sure, but you think you hear a wail.\n\nOpening the door, you almost knock it down.\n\n\"Oh, my... what the...\" You put your hands on your head. An enormous pentagram is drawn on the floor and it occupies almost all of it. There are traces of blood everywhere. And that is not all. A whirlwind of ghosts starts dancing around you. Their whisper is so quiet, it is hard to understand what they are saying. And, even when you think you can make out individual words, you can't make out what they want to say because they talk simultaneously. However, it is not hard to guess they are unhappy, as they speak about death, being forgotten, tormented and begging to be released.\n\nSuddenly, your blood runs cold. You know that sometimes the souls of the victims of violent death just can't leave and become one with the Light and stay to seek revenge, maddened. Obviously. these are trapped in the pentagram in which you happen to be too.\n\nOne of the souls passes through ${ulmia}, knocking her down.\n\n\"Are you all right, dear?\" you ask as you help her get up.\n\n\"Yes, but it was a shattering experience.\"\n\nIt is time to act. What do you do?\n*choice\n\t#Just get out\n\t\t*goto 378\n\n\t#Smite the mad souls\n\t\t*goto 379\n\n\t#Threaten them\n\t\t*goto 380\n\n*label 144\n\"You really should have come earlier. The village was so alive, so full of energy. My inn was the place to be every night. There were bards singing of great deeps and mighty monsters. Youngsters were laying the foundations of love. It was a place full of joy and I made good money.\" It is the first time you see him show any emotion, but it is soon gone.\n\n\"Now, it is all over. Most villagers, as I said, were killed but their souls still reside in the church, trapped by some spell. I wouldn't go there if I was you. Those tormented wraiths can be dangerous.\"\n\n\"Equally threatening can be the horses in the stables. They are just skeletons, raised by some evil magic. The angels sent by the one of frost were riding them when they came. A couple died in the fight with the villagers. I think the local priest was the reason behind their demise. And so, the horses were left here. I don't know why.\n\n\"As for the graveyard, I don't think you should go there. The mists there are thought to change people in unexpected ways.\"\n\nWhat would you do next?\n*choice\n\t#Ask him about the other places of interest in the area\n\t\t*goto 144\n\n\t#Spend the night in the inn\n\t\t*goto 145\n\n\t#Check the noise in the basement\n\t\t*goto 146\n\n\t*selectable_if (prophet) #Follow the urge to receive a prophecy\n\t\t*goto 286\n\t\n\t# Attack him\n\t\t*goto 287\n\n\t#Leave the inn\n\t\t*goto 288\n\n*label 145\n*achieve get_a_room \n*set relations +1 \nRelations increase by 1.\n\nYou can swear you saw a spark in his eyes when you accept his proposal. The innkeeper leads you up the stairs towards a neatly furnished room with a beautiful bed. It is wide enough for at least four people to sleep in and is covered by pink sheets.\n\nAs soon as you are alone, Sister ${ulmia} dives into the bed and gives you a foxy smile.\n\n\"I've been waiting to be alone with you for quite a long time, ${name}. I need to feel you close to me.\"\n\nYou don't need to wait for a second invitation. You land by her voluptuous body and start kissing her while your trembling hands try desperately to remove her cassock. This appears to be problematic.\n\n\"I need help, dear. Lend me a hand or I will be forced to tear your clothes.\"\n\n\"Where exactly do you want me to lend that hand of mine? Oh, I would enjoy you doing so, but please, leave the pleasure for some other time. I didn't get my spare cassock.\"\n\n*goto 289\n\n*label 146\nThe basement is quite creepy. It is so dark that you step on filthy parts of kegs quite a few times, almost losing balance. It fact, you can't tell where the light comes from.\n\nAs if reading your thoughts, Sister ${ulmia} points at something.\n\n\"Glowing mushroom!\" you exclaim.\n\n\"Don't tell me you are going to eat them, please.\"\n\n\"No way, I want to leave as soon as possible. By the way, what are we doing here anyway?\"\n\n\"Trust my instincts, will you?\" Sister ${ulmia} puts her manicured finger in front of her voluptuous lips.\n\nYou hear someone sobbing further down the basement, right behind the row of biggest kegs.\n\n\"It can be a trap, be careful, dear!\" You warn the priestess as you see her running towards the voice. You follow her to see a beautiful dark haired woman tied to the wall with a couple of snakes.\n\nYou can't help but look twice at the brunette. She is lightly clad, displaying awesome lean muscles.\n\n\"If you are servants of the inn keeper, come closer. I have something for you!\" She raises her foot in the air. \"This time I don't care if your snakes bite or not, I am not letting you do this to me again.\"\n\n\"What did they do to you?\" ${ulmia} inquires.\n\n\"You know very well... or you don't?\" The woman makes a questioning pause.\n\nSister ${ulmia} shakes her head.\n\n\"So, you will set me free?\" The woman's eyes are full of hope.\n\n\nSister ${ulmia} nods.\n\n\"Not so fast! Not before she tells us who she is and why she is here!\" You protest.\n\n\"${name}, this could take too much time. Trust me!\"\n\n\"I am Sicilia, the daughter of the innkeeper. The two of us were left alive by the angel of frost in return for dad's loyalty. Gradually, he became a monster and left me here with his snakes. That's it, can we please go now?\"\nWould you set her free?\n*choice\n\t#Yes\n\t\t*goto 147\n\n\t#No\n\t\t*goto 148\n\n*label 147\nExperience increased by 2.\n*set experience +2\n\nYou use your blade to cut the bodies of the snakes into two. Sicilia jumps on her feet and heads for the stairs up.\n\n\"Are you coming?\" she asks taking out something from a keg.\n\n\"Sure,\" you say and run after you. The object is a long knife, or rather a short sword.\n\nAs you get out, you see two ghouls blocking your escape route. Sicilia does not even slow down, disabling the ghouls with two precise swings of her blade.\n*if not (keeper)\n\t*goto 150\n\n*else\n\t*goto 149\n\n*label 148\nRelations decreased by 1.\n*set relations -1\n\n\"I am sorry, I have a bad feeling about this. You don't know what could happen if we set her free,\" you say.\n\n\"Well, I guess... she will be able to escape this creepy basement.\" The priestess ironies you.\n\n\"I am serious, ${ulmia}, she might be dangerous. I suggest we leave immediately.\"\n\n\"So be it, ${name}. You know I trust you completely. It is just that sometimes I begin to regret that,\" she says and heads for the staircase. You quickly follow her, not wanting to leave her away from you.\n*if not (keeper)\n\t*goto 290\n\n*else\n\tYou leave the inn\n\t*goto 130\n\n*label 149\nYou feel quite uneasy knowing that you will need to pass by the remains of her father. However, she barely looks at them. Instead, she spits on the headless corpse.\n\n\"I owe you one for killing this monster,\" she says and leaves the building. You are quick to follow her example. She is nowhere to be seen.\n*goto 151\n\n*label 150\nAs you reach the bar, the innkeeper appears from behind it and leaps over it, blocking your way. His eyes glow in reed as he raises his long-nailed claws.\n\n\"Forgive me father, I will sin!\" she young woman say and you are not sure whether she is talking to you or her father, but she really commits it in what seems like a perfect execution by beheading. When she turns back and looks at you with malice filled eyes, you shiver at the thought of having to face her in battle.\n\n\"I owe you one,\" Sicilia says.\n\n\"Why? You helped us by... killing your father.\" Sister ${ulmia} states.\n\n\"This is exactly what I owe you one for,\" she says and leaves the building. You are quick to follow her example. She is nowhere to be seen.\n*goto 151\n\n*label 151\n\"It is hard to believe what this woman can do with a sword,\" you say to Sister ${ulmia}.\n\n\"Hey, haven't you seen Ulmiroth in action?\"\n\nOops!\n\nThe priestess touches the back of your hand.\n\n\"I know what you mean. I am sure the Order of the zealots would give a lot to have her among its members.\"\n\n\"How did you know you had to get down in that basement?\" You try to change the subject.\n\nShe shrugs.\n\n\"I had the vague feeling someone was calling for me.\"\n\n\"And why didn't you tell me?\"\n\n\"As I said, it was vague, I wasn't sure but I had to check.\"\n*goto 130\n\n*label 158\nWhen you look around, you are happy to see your beloved Sister ${ulmia}. It is quite dark, but you can't mistake her silhouette and sweet smell even in twilight. You look around. It seems that you are in some kind of a century old oak forest. It takes you a second to realize that something is wrong with the trees. Their branches are twisted, as if they are hands stretched out, trying to grasp someone... or something. There are no leaves either.\n\nYou open your mouth to ask ${ulmia} about this place but she puts a finger in front.\n\n\"Be quiet,\" she whispers. \"We don't want to wake the ents.\"\n\n\"What?\"\n\n\"Ents – trees that move. Formidable foes,\" she explains.\n\n\"They seem dead,\" you point out.\n\n\"Oh, they can be undead too. Actually, not quite as your prayer wouldn't be able to harm them. Let's move.\" She takes your hand and leads you among the t
