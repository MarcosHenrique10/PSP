\n*set name \"Jacob\"\n*set ulmia \"Ulmia\"\n\nShe prepares to hit him again. As she does so, her hair moves to the other side and you spot a necklace that reminds you of the one you gave to Sister ${ulmia}. \n\n\"I think I should kill her,\" Amelia whispers in your ear.\n\nWhat would you do?\n*fake_choice\n\t#Just nod\n\t\t\t\n\n\t#Ask Amelia not to kill her\n\t\t\t\n\t\t\t\t\t\n\t#Ask her to stun her and take the necklace\n\n*script changeBackgroundColor(\"black\")\n*set name \"Michael\"\n*set relations 11\n*set experience 9\n*set devilry 11\n*set favour 9\n\nOver the hill, you see a huge bear about to attack a man. Next to them, there is a bear cub, its leg in a trap. \n\nWhat is your choice?\n*fake_choice\n\t#Leave\n\t\t\n\t#Fight the bear\n\t\t\n\t#Rescue the cub\n\t\t\n\t#Use holy fire\n\n*script changeBackgroundColor(\"sepia\")\n*set name \"Sarah\"\n*set relations 12\n*set experience 12\n*set devilry 14\n*set favour 4\nShe turns to you and steps forward, engulfing you with the green serenity of her eyes. You feel her warm breath tingle the skin of your cheeks. The urge to kiss her becomes overwhelming.\n\nWould you go for it?\n*fake_choice\n\t#Yes\n\n\t#No \n\t\t\n*set relations 13\n*set experience 14\n*set devilry 15\n*set favour 2\n*set name \"Catherine\"\n\nAtoro raises his sword and attacks fanatically with a devastatingly precise swing of his sword towards your chest. You can either dodge of parry.\n*fake_choice\n\t#Dodge\n\n\t#Parry\n\t\t\n*set relations 22\n*set experience 23\n*set devilry 15\n*set favour 4\n*set name \"Jerome\"\n\nYou know you have to act fast if you want to have a chance to deal with demonologist.\n*fake_choice\n\t#Cast a prayer of smiting\n\t\t\n\n\t#Use the present from Babel's daughter\n\t\t\n\n\t#Use Clarissa's rag doll\n\t\t\n\n\t#Use the holy water behind you\n\t\t\n\t\n\t#Use Kalea's medallion\n\t\t\n*ending\n", "startup": "*title Path of Light\n*author Ivailo Daskalov\n\n*scene_list\n\tstartup\n\theresy\n\t$ pre_mine\n\t$ min
