o help the demonologist, but it turns out you are wrong. You see a huge fluffy ball with long tooth and nails stick both in his ankle. The man screams and kicks the angry cat, causing it to retreat to its asylum.\n\nThe demonologist gazes at you, paying no attention to the rapidly expanding pool of blood around his shoe.\n*if anger\n\t*goto rzerofive\n\n*else\n\t*goto rzerothree\n\n*label rtwofive\n\n\"Only the Light has the power to command me, unlike some man,\" you roar.\n\n\"Father, you will find out that I am no mere human,\" his twisted smile reveals sharp teeth. \"Say your prayer, 'cause it will be your last!\"\n*goto tninesev\n\n*label rthreezero\n\nThe demonologist reaches you, his stare penetrating deep inside your soul, making you unable to move or pray. You feel your soul being dragged out of you into a cold abyss...\n*goto_scene death\n\n*label rthreeone\n*page_break\nEpilogue\n\nYou don't remember much of your way back to the church. You only realize feeling too tired to step on, but your feet manage to complete the task again and again, using a source of energy of their own.\n\nClarissa is waiting for you in front of the temple.\n\n\"Be blessed, Father!\" she says.\n\nYou only manage to smile.\n\n\"Can you guess who's waiting for you in?\" Her face bears a mischievous smile.\n\n\"She...\" you whisper.\n\n\"Yes, Brother. The demon you destroyed allowed the angel of frost to leave her prison, setting ${ulmia} free as well. Don't keep her waiting. I know she's...how do you say it? Dying to see you again.\"\n\nClarissa moves away to let you go in. Your eyes behold the priestess sitting on one of the chairs, her head tilted gently down. As she senses you presence, she stands up and rushes towards you with wide open arms. As you embrace her, you feel sudden tears roll down your cheeks. ${ulmia} wipes them with her fingers and you fall into her emerald lakes. Here, you feel like being in the place you belong.\n*page_break\n*set checkpoint 4\n*set dagger cp_dagger\n*set cp_key key\n*set cp_wine wine\n*set cp_instructor instructor\n*set cp_clairvoyant clairvoyant \n*set cp_freedom freedom \n*set cp_salvation salvation\n*set cp_consecration consecration\t\n*set cp_animal animal \n*set cp_stash stash \n*set cp_necklace necklace\n*set cp_retribution retribution \n*set cp_east east \n*set cp_west west \n*set cp_name name \n*set cp_favour favour \n*set cp_relations relations \n*set cp_experience experience \n*set cp_devilry devilry \n*set cp_exorcist exorcist \n*set cp_confessor confessor \n*set cp_healer healer \n*set cp_prophet prophet \n*set cp_zealot zealot \n*set cp_damage damage\n*set cp_wounds wounds \n*set cp_woundss woundss \n*set cp_shield shield \n*set cp_promise promise \n*set cp_vine vine \n*set cp_pup pup \n*set cp_fur fur \n*set cp_witch witch \n*set cp_sphere sphere \n*set cp_knowledge knowledge \n*set cp_shade shade \n*set cp_glow glow \n*set cp_xx xx \n*set cp_ex ex \n*set cp_clean clean \n*set cp_zombies zombies\n*set cp_slash slash \n*set cp_nail nail \n*set cp_feather feather \n*set cp_fel fel \n*set cp_transformation transformation \n\n*set cp_shield shield\n*set cp_promise promise \n*set cp_vine vine \n*set cp_pup pup \n*set cp_fur fur \n*set cp_witch witch\n*set cp_hand hand \n*set cp_mud mud \n*set cp_magic magic \n*set cp_block block\n*set cp_rabbit rabbit\n*set cp_angel angel\n*set cp_rainbow rainbow \n*set cp_mouse mouse \n*set cp_ox ox \n*set cp_hour hour \n*set cp_flowers flowers \n*set cp_water water \n*set cp_medallion medallion \n*set cp_anger anger \n*set cp_contact contact \n*set cp_prayer prayer \n*set cp_whiskers whiskers \n*set cp_icon icon\n*page_break\n\n\nCongratulations, dear reader, you reached the true happy end of the story! This is an achievement!Your performance (based on experience and relations) ranks you as:\n*if (experience+relations)\u003c50\n\tHopeful.There is much hope that you will do better next time.\n\t*goto credits\n\n*elseif (experience+relations)\u003c68\n\tNovice.You still have a long way to walk on the Path of Light.\n\t*goto credits\n\n*elseif (experience+relations)\u003c84\n\tMaster of Prayers. You are very efficient in directing the Light!\n\t*goto credits\n\n*else\n\tChampion of the Light. You are one of the greatest assets of the Church of Light\t\n\t*goto credits\n\n*label credits\n*check_purchase frostiap\n*if choice_purchase_supported and not(choice_purchased_frostiap)\n\tThis is the end of part one. If you enjoyed the Path of Light and want to continue the adventure, you can buy part 2 which is available as an in-app purchase.\n\t*purchase frostiap $3.99 GoToFrost\n\t*abort\n*else\n\t*label GoToFrost\n\tCheckpoint reached. If you perish, you may restart at this point.\n\t*set checkpoint 4\n\t*goto_scene frost", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Path of Light.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "frost": "*page_break\n*set Favour 15\n*set Relations 40\n*set Experience 60\n*set Devilry 10\nYou wake up, still feeling tired after the strenuous day before. Sister ${ulmia} is not in your bed, but you could sense her sweet odor in the sheets, still warm from the contact with her body. You put you cassock on and go to the main chamber. You stop at the doorway to take a long look at the priestess, who is arranging candles on the altar. Her leather cassock can't hide the exquisite curves of her upper body. You thank the Light for having her as your soulmate... or a sort of. Your bond with her has always been strong and it got even stronger at the cursed mine.\nYou approach her. She hears you and turns back, beaming with a smile that makes your heart skip a beat. You say nothing, none of the many greetings related to the Light, just give her a peck on her lips. She embraces your neck with her arms. The feeling is magnificent. You can't imagine how you lived without having here by your side all this time. It must have been a lonely and sad life.\n\n\"Did I wake you up, ${name}?\" she asks stepping back and allowing you to fall deeply in the warm lush green eyes.\n\n\"No, I must have realized you were away from me,\" you smile.\nSuddenly, Brother Florence enters the church. He's as pale as a ghost and you haven't ever seen him so distraught.\n\n\"Brother ${name}...\"he finishes his sentence half way, realizing you are not alone. You're not sure why, but he's always been feeling uneasy in the company of Sister ${ulmia}.\n\n\"Excuse me, I don't want to intrude but I think you should come to the infirmary.\"\n\nYou nod. The priestess gives you a questioning look. Do you want to ask her to come with you, or leave her at the church?\n*choice\n\t#Go with Sister ${ulmia}\n\t\t*goto 2\n\n\t#Go alone\n\t\t*goto 3\n\t\t\n*label 2\nRelations increased by 1. \n*set relations +1\n*set touch true\n\nYou grab the hand of the priestess as you head for the exit, paying no attention to the expression on the face of the novice. He'll have to get used to her eventually. Maybe you should ask him what bothers him about her when you have the chance.\nThe novice says nothing during your fast paced stride towards the infirmary and you don't press him to speak either.\nSister ${ulmia} squeezes your hand on a couple of occasions, which you know is a playful way of stating she's happy that you took her with you.\nYou soon realize she has a reason not to be.\n*goto 4\n\n*label 3\n*set hand true\n\n\"What happened, Brother?\" you ask the novice. \"You don't look good.\"\n\n\"Kalea...is in the infirmary.\" He struggles with every word.\n\n\"What is so strange about it?\" you wander.\n\n\"She's ...dead.\"\n\"Impossible!\" You are about to say that you were with her yesterday evening, but manage to keep your mouth shut. There's no need to give him that much information.\nYou reach the infirmary.\n*goto 4\n\n*label 4\n*page_break\nAt first, you fail to recognize the woman. Her black hair was one of her most notable features, but it is now snow white. The witch lies on the floor, the skirts of her jet black dress scattered in a pool of blood. The only visible wounds are three parallel cuts on her left wrist. They are deep and long. You can't tell if it was done with a knife or a claw.\n\n\"Would you help me, Brother? We need to check if there are other wounds on her body.\" You ask of the novice. His fingers tremble violently, but help you undress her so that you could perform a quick check and dress her again.\n\n\"What is that. Some kind of fur?\" Brother Florence gives you a bundle of black hair.\nHe points the front of her dress.You take the hairs. Kalea was a witch and she certainly had some affinity to animals. You know she had a cat, but its fur was not that long. It could belong to a bear or... A fangbearer. The thought seems strange but you just can't help but compare it to the one of Grawler. Was he or any of his kind involved? Is this a suicide as it seems at first sight?\n\nYou can pray for revelation, if you want to spend a point of Favour. If you have codeword Touch, you can ask Sister ${ulmia} to use her knowledge in devilry to check for any dark influence. Or, you can return to the church.\n*choice\n\t#Pray\n\t\t*goto 5\n\n\t*selectable_if (touch) #Ask ${ulmia} to take a look\n\t\t*goto 6\n\n\t#Return to the temple\n\t\t*goto 7\n\n*label 5\nFavour decreased by 1. Experience increased by 1. \n*set favour -1\n*set experience +1\n*set feather true\n\nYou believe that the Light may tell you more about the mysterious death of the witch. While you say the prayer, you denote the fact that Kalea was an instrument of the Light, helping many sick regain their health.\n\nYou really expected more that what you received. It is as if someone cast a protection from the Light spell, just like the case with the disease. But, you receive a vision of a snow white feather laying on her bosom. There was an angel involved in her death. The angel of frost you met in the mines is the first guess you can think of. Then, what about Clarissa? She looks as innocent as the child she decided to incorporate, but could she keep a dark secret? Did she become corrupt in the mines, just like the once holy paladin Atoro?\n\nThis is the only thing the Light can tell you. You thank it, but feel anger that it is not as powerful as you were taught to believe.\n\nNow, if you have codeword Touch, you can ask Sister ${ulmia} to use her knowledge in devilry to check for dark influence or return to the temple.\n*choice\n\t#Ask ${ulmia} to take a look\n\t\t*goto 6\n\n\t#Return to the temple\n\t\t*goto 7\n\n*label 6\nSister ${ulmia} examines the body carefully, touching her hands and temples.\n\n\"I'm sorry, Brother, I can't do much unless you use the medallion.\"\n\nYou expected her to say so. If you don't want to summon her devil form, you can pray for revelation (if you haven't done so) or return to the church. On the other hand, if you wish to unleash the devil, you have to decide whether to ask Brother Florence to go out or let ${ulmia} transform in front of him.\n\nWhat do you choose?\n*choice\n\t#Pray\n\t\t*goto 5\n\n\t#Return to the temple\n\t\t*goto 7\n\n\t#Ask the novice to leave and summon Ulmiroth\n\t\t*goto 8\n\n\t#Summon Ulmiroth\n\t\t*goto 9\n\n*label 7\n*page_break\n*if touch\n\t*goto 11\n\t\n*else\n\t*goto 12\n\n*label 8\nExperience increased by 1.\n*set experience +1\n\nYou can imagine what the reaction of the poor novice would be when he sees the 'other' form of the priestess. However, you don't want to order him directly to leave.\n\n\"Brother Florence, could you please go to the temple and get some holy water. We need to perform a cleansing ritual on the body of the late herbalist.\"\n\nFlorence just nods and seems to be very happy to leave the scene. You take the medallion out and say the prayer.\n*goto 10\n\n\n*label 9\n*set fear true\n \nYou take the medallion out and remind yourself the prayer.\n\"Are you sure you want to do this in front of him?\" Sister ${ulmia} clearly means the novice.\n\n\"He's a brave boy. And he really has to get used to you.\"\n\n\"What are you talking about?\"\n\nYou say the prayer. The transformation is not half way through when he scream is panic and rushes out.\n\n\"Maybe I overestimated him,\" you admit.\n*goto 10\n\n\n*label 10\nDevilry increased by 1. Experience increased by 1. \n*set devilry +1\n*set experience +1\n*set rune true \n\nIt really pains you to see Sister ${ulmia} with red skin, horns and yellow eyes. You hope that it would be worth it.\n\n\"It is a beautiful homicide.\" She smiles. \"I must admit that even I couldn't do it with so much style.\"\nYou try to ignore her violent notes.\n\n\"Are you sure it's not a suicide?\" you ask. \"Severed veins are a classic way to end your own life.\"\n\nThe devil shakes her head.\n\n\"This cut here, it is infused by energies of the Darkn that are not related to her.\" She puts her fingers in the wound, then smears the blood all over her hands, as if she's washing them with water. You feel your stomach begin to riot.\n\n\"Why do you that?\" you ask.\n\n\"For my own pleasure, dear.\" She gives you a hellish smile. \"Now, let me do some real work.\"\n\nShe closes her eyes and begins to chant. The body of the herbalist covers with red mist. When it subsides, two runes of crimson dust remain next to her.\n\"Just as I guessed, Runes of the Darks,\" ${ulmia} says. \"The one who killed her is clearly a master of the dark arts. He or she paralyzed her, then cut her wrist and let her blood come out. Bastard!\"\n\n\"I know that Cain is into witchcraft, just like the late Kalea, but otherwise...\"\n\n\"No, Brother, I mean the pure Dark, not the witchcraft in-between mockery,\" she interrupts you.\n\nYou nod and say the prayer to return her back to her human form.\n*goto 7\n\n*label 11\n*page_break\nYou are only now beginning to realize what happened. You can't help but think of the time you spent with Kalea back in the infirmary, which ironically became her place of death.\n\n\"Last night, you told me about your visit to her house. Do you think what happened could be linked to her demonologist lover?\" ${ulmia} asks you.\n\nYou shrug.\n\n\"I really have no idea. What is worse, I fear for their son. I really hoped she would find it.\"\nSister ${ulmia}'s eyes dance with yours. You know she's trying to say something meaningful but simply can't find the words.\n\n\"I hope that the Light shows us the way to him and lets us solve the mystery related to her death.\" This is all she thinks up. From her lips, it sounds soothing.\n\n\"May it be, Sister. We really need to obtain more information. I'm thinking of checking the militia. The guard on duty may have heard something suspicios. As a fellow witcher, Cain is also someone I would like to speak with.\"\n\n\"What about Clarissa?\" the priestess proposes. \"I'm sure she will come if you invite her with a prayer. A bit of celestial help is always welcome.\n\n\"You are right. I would also want to talk to Brother Florence again. I have the feeling that he probably knows more than he had the opportunity to tell us.\"\n\nWhat do you choose?\n*choice\n\t#Talk to the militia guards\n\t\t*goto 13\n\n\t#Talk to Cain\n\t\t*goto 14\n\n\t#Summon Clarissa\n\t\t*goto 15\n\n\t#Talk to Brother Florence\n\t\t*goto 16\n\n*label 12\n*page_break\nFavour decreased by 1.\n*set favour -1\n\nYou enter the temple, beginning to feel a heavy headache.\n\n\"${ulmia}, what the...\" you scream as you see the priestess lying just in front of the altar, an ugly piercing wound on her lower back. You rush to her and put her head in your lap. There's a streak of blood coming from her mouth and her eyes seem awfully colourless. She moves her lips but you make her a sign to remain silent, while you utter the healing prayer. You sigh in relief as you see her recover in a couple of seconds.\n\n\"I'm sorry, ${name}, I really didn't see that one coming,\" she says with a faint smile. The priestess seems to be able to recover from the experience quicker than you.\n\n\"What happened, Sister?\" you enquire.\n\n\"Since you left me alone, I had no way to be useful other than pray for the soul of the victim. I heard someone enter, but assumed it must be you, so I didn't interrupt. I got stabbed and I'm pretty sure it was a mercy blade!\"\n\n\"A mercy blade? How do you know?\"\n\n\"Come on, ${name}.\" She rolls her eyes. \"I'm able to feel a mercy blade, especially when it is in my body.\"\n\n\"Are the priests from your order the only ones to wear such weapons?\"\n\n\"Why, no. They don't have the properties of soulstealing like ours but are still formidable.\"\n\nYou step up and kiss her forehead.\n\n\"I'm not leaving you ever again,\" you promise.\n\n\"Didn't you already say that?\" she asks with a cunning smile.\n\n\"I'll find who did that to you and Kalea, be it the will of the Light.\"\n\n\"Let's forget what happened to me for the time being since I'm really fine and think about the deceased herbalist,\" Sister ${ulmia} proposes.\n\n*goto 11\n\n*label 13\n*page_break\nSister ${ulmia} and you drop in at the militia headquarters and find the chef of the guards filling in a report, you guess related to the deaf of the herbalist.\n\n\"I'm sorry about her, it is a loss to the whole of the town,\" he says trying not to stare at the priestess. You couldn't blame him. She's much more attractive than most of the town girls.\n\n\"May the Light give her eternal peace. Who was on duty last night?\" You ask.\n\n\"Xavier. But I doubt it would be much use talking to him. He is in a shock from something he saw but I couldn't make any sense of what he said. Anyway, it's worth trying, you may have better luck.\"\n\n\"Where do I find him?\" You ask.\n\nThe chief of the militia points at a room.\n\nAs far as you know, Xavier is not the bravest of the city guards and you aren't surprised that he has a hard time getting over what he saw.\n\nWhen you enter, he attacks you with a cascade of words.\n\n\"Father, forgive me, I have sinned. I know I should have stopped him but I was afraid. He was so big and fury and his eyes glittered like hell fires. So I ran as fast as I could. I know my duty was to stop him... To hunt him and save her. But now she's dead and she's not coming back. She cured me when I was so sick. Her tea was so tasty...\"\n\nYou stop listening to his gibberish. It seems that he saw a fangbearer and chickened out at the sight. Would you like to recite a calming prayer to ease his chain of thought or have you heard enough of him?\"\n*choice\n\t#Pray\n\t\t*goto 24\n\n\t#Save your favour\n\t\t*goto 25\n\n*label 14\n\n\"I think we should visit Cain,\" you say to the priestess. \"He is a witcher and I believe he could tell us more.\"\n\n${ulmia} nods. \"Where can we find him?\"\n\n\"I bet he is at the new wood, practicing his arts.\"\n\n\"Great, I'd appreciate a walk out.\"\n\nIt turns out you are right. You find the lad at the beginning of the grove with exotic trees, preparing a mixture of leaves, branches and a few items you fail to recognize. Wait, there's a tuft of black hair just like the one you saw in the infirmary.\n\n\"What can I do for you, holy ones?\" He asks annoyed.\n\n\"Do you know that Kalea was found dead this morning?\" You ask.\n\n\"Yeah, the news travels quickly in a small town like ours. You don't think it was me, do you?\"\n\n\"Of course not!\" We'll, when you think again, any wielder of dark magic should be a suspect and you know Cain has such an inclination. \"I just thought that as a witcher you could tell us something we failed to see.\"\n\n\"I'm busy right now, Brother. I fear that Magdalena might be the next one to die. A big monster entered her house last night and scared her to death. It is good that she always wears the enchanted ring I gave her. I guess it is what repelled the beast.\"\n\n\"Did he take anything with him?\" ${ulmia} asks.\n\n\"Only a rare dried herb.\"\n\n\"You know what kind of a monster it is, don't you, son?\" You ask.\n\n\"I've read about it. I doubt it is a werewolf, so I believe he must be a fangbearer. Anyway, I want him dead so that my heart will be safe from harm.\"\nYou remain silent, not sure whether to contempt the cruelty or be touched by the tenderness of what he said.\n\n\"You plan to kill him with a spell? Is that why you have a bit of his fur with you?\" You ask.\n\nHe nods.\n\nOn one hand, you feel urged to stop him. Casting such a spell might be devastating for someone treading the line between Light and Darkness. On the other hand, if the fangbearer really is responsible for Kalea's death and endangers Magdalena's life, that could be the end of the problem.\nWhat would be your message?\n*choice\n\t#\"Do as you must\"\n\t\t*goto 26\n\n\t#\"Don't do it\"\n\t\t*goto 27\n\n*label 15\n*page_break\nYou decide that the confessions chamber would be the best place to invite the little angel into your word. Sister ${ulmia} stands next to you as you say the sacred words. Clarissa appears to be slightly confused, and you are quick to find out why. In her small hands, there is a big black book with a cover made of what seems to be the skin of a large snake.\n\n\"Oh, Brother, is that you? I feared it was some creature of the night that wanted to enthrall me again.\" She puts on a big fake smile.\n\n\"What is it that you carry with you, little one?\" Sister ${ulmia} looks at the book.\n\n\"Er, why? I'm an angel. I'm supposed to spread the word of the Light, not the runes of the darkness.\" She looks down and blushes.\n\n\"Then why are you reading infernal runes,\" Sister ${ulmia} enquiries.\n\n\"Well, I spent a lot of time with your brother Zarafell. He taught me to read runes and gave me that book. I was just curious, you know. Sometimes, I miss that imp.\" Clarissa sighs.\n\n\"I miss him too, but that's not the point.\"\n\n*if feather and rune\n\t*goto 17\n\n*elseif feather\n\t*goto 18\n\n*elseif rune\n\t*goto 19\n\n*else\n\t*goto 20\n\n*label 16\n\"I think it's time to return to the infirmary,\" you say to Sister ${ulmia}. \"I want to speak with Brother Florence again.\" She nods and you set off.\n\"I think I should talk to him in private...\" you say anxious about her reaction. She just shrugs, however.\n\"I know that he finds something about me disturbing, though I still don't know what exactly. Do you want me to wait for you in front of the infirmary?\"\nWhat do you reply?\n*choice\n\t#Yes, thank you\n\t\t*goto 28\n\n\t#No, come with me, we'll go to the other room\n\t\t*goto 29\n\n*label 17\nSuddenly, it seems that the pieces of the puzzle come to their place. You know that the killer is someone of celestial origin, probably an angel. You also know that he or she used runes to put an end to the life of the herbalist. Could it really be her? It is hard to believe it, but it doesn't sound impossible. Creatures of the Light are not immune to the influence of Darkness.\nIf you think that the clues are enough to conclude that she is the killer, this moment probably presents the perfect opportunity to attack her now. You believe that if you surprise her and ${ulmia} helps you could defeat her. Or, you could just ignore your suspicions.\n*choice\n\t#Attack\n\t\t*goto 21\n\n\t#Don't\n\t\t*goto 20\n\n*label 18\nYou know that Kalea's killer us of celestial origin, probably an angel. Seeing Clarissa with a book with infernal runes certainly doesn't help to reduce your suspicions. But, you seem to be unable to actually believe it was her. Anyway, you decide to keep in mind that it is a possibility.\n*goto 20\n\n*label 19\nYou know that Kalea's killer used runes and you certainly feel uncomfortable seeing Clarissa read a book full of them. If it wasn't for it, you'd never suspect her. Of course, you remind, yourself, there are many wielders of the force of Darkness and the little angel is probably the least likely. Anyway, you decide to keep in mind that it is a possibility.\n*goto 20\n\n*label 20\n*set angel true \n*page_break\nAs you explain what happened, Clarissa hides the grimoire behind her back.\n\n\"It is most grave that someone who helped the sick should fall. I will do my best to find out who did it,\" Clarissa says.\n\n\"Do you think it could have been a suicide?\" You ask.\n\n\"I doubt it. The cuts on her arm... This is how some people decide to blend with the Dark, but the white hair... There is certainly some magic involved here.\"\n\n\"I'm sure you could tell us more soon, having that book of yours,\" ${ulmia} remarks.\n\nThe little angel just blushes. \"You can rely on me to shed some light on the case. Peace and Light!\" She utters and disappears.\n\n\"She seems suspicious, don't you think?\" Sister ${ulmia} enquires.\n\nYou just shrug, unwilling to admit you have the same feeling.\n*goto 22\n\n*label 21\n*page_break\nAs you explain what happened, Clarissa hides the grimoire behind her back.\n\n\"It is most grave that someone who helped the sick should fall. I will do my best to find out who did it,\" Clarissa says.\n\n\"Do you think it could have been a suicide?\" You ask.\n\nThe little angles closes her eyes for a second, thinking of her reply. You get the chair nearby and throw it at Clarissa. Her small body falls on the floor with a childish cry. Sister ${ulmia} doesn't need to be asked to attack with her blades.\n\n\"May the Light forgive you!\" Says Clarissa and disappears just before the mercy blades reach her.\n\n\"I really thought I could get her,\" the priestess says panting.\n\n\"Don't you think it could have been a mistake?\"\n\nShe shrugs.\n\n\"I know that people have been charged with murder with fewer clues.\"\n\nYou nod, but deep inside your guts, you know you made a mistake.\n*goto 22\n\n*label 22\n*page_break\nWho would like to visit and interrogate next?\n*choice\n\t*hide_reuse #The militia guards\n\t\t*goto 13\n\n\t*hide_reuse #Cain\n\t\t*goto 14\n\n\t*hide_reuse #Clarissa \n\t\t*goto 15\n\t\t\n\t*hide_reuse #Brother Florence\n\t\t*goto 16\n\t\t\n\t#Ready with all of them\n\t\t*goto 23\n\n*label 23\nYou return to the church, your head buzzing with all the information you obtained.\n\n\"Who do you think killed Kalea,\" Sister ${ulmia} asks you why pouring water into a glass and giving it to you.\n\nYou thank her and take a drink, using the pause to think over it once more.\nWhat would you answer?\n*choice\n\t#Clarissa\n\t\t*goto 33\n\n\t#Cain\n\t\t*goto 34\n\n\t#The fangbearer\n\t\t*goto 35\n\n\t#The angel of frost\n\t\t*goto 36\n\n*label 24\nFavour decreased by 1.\n*set truth true\n*set favour -1 \n\nYou haven't used the prayer since the time you were a novice, but it turns out you haven't forgotten it yet. Xavier seems much more comfortable.\n\n\"Feeling better?\" ${ulmia} asks.\n\nHe nods.\n\n\"Would you tell us again what happened, please?\" You insist.\n\n\"I was patrolling near the house of the seamstress when I saw that beast. I really thought that would be the end of me.\"\n\nSo, the fangbearer was near Magdalena's house.\n\n\"In which direction did you run?\" You ask.\n\n\"Down the Main Street.\"\n\n\"So you must have gone by the infirmary. Did you see or hear anything?\"\n\n\"Now that you say it, I think I beheld someone dressed in white come out of there. I thought it could be you, but back then it didn't matter. I wanted to get away from the beast as soon as possible...even though he wasn't even chasing me. I feel ashamed.\" Xavier looks down.\n\n\"That is ok, thank you for the information,\" you say as you leave him.\n*goto 22\n\n*label 25\nEven though he is still in shock, his story seems to make sense. He saw the fangbearer and ran away, and so Kalea is dead now. The cuts on the arm of the herbalist could have been done with the claws of a beast. And, if all fangbearers are as good at using magic as Grawler, this could also be the cause of the unnatural white hair of the herbalist. Everything seems to be coming in place.\n*goto 22\n\n*label 26\n*set hunt true \n*page_break\n\"As a priest of the Light, I must ask you to stop the preparation of that spell immediately. Come on, Sister, let's leave this tainted land,\" you say in a old voice. Then, you whisper: \"Do as you must!\"\n*goto 22\n\n*label 27\n\n\"I think you are acting prematurely. I know a bit about fangbearers as well. They are not necessarily evil and they use the powers of Nature just like you, don't they?\"\n\nCain looks amazed, certainly not expecting you you to know about these monsters.\n\n\"And that would explain why he took a rare herb instead of harming anyone,\" you continue.\n\n\"I know but when it comes to Magdalena, I don't want to take any chances she might end ripped to pieces.\"\n\nYou mean to tell him that the current victim, Kalea, was not ripped but decide against it.\n\n\"It is a poor excuse for killing someone...or something. Believe me. Cain, I'll do my best to sort the situation out.\"\n\n\"I trust your reasoning, Brother, and I'll do as you say. But, if anything happens to her, it would be your fault.\"\n\nYou gulp uneasily.\n\n*goto 22\n\n*label 28\n*page_break\nYou give her a kiss, hoping to make up a little bit for just leaving her on the street. It certainly doesn't make you feel better about it. You enter to see that Florence has moved the body to one of the sick's rooms. He's preparing for the funeral, arranging burning candles around the herbalist.\n*goto 30\n\n*label 29\nRelations increased by 1.\n*set relations +1\n\n\"No way, I'm not leaving you on the street alone. This is a dangerous town,\" you take her arm and lead her in.\n\n\"Don't you think it may be more dangerous inside? After all, it's exactly the place of the murder,\" she tries to reason with you.\n\n\"But you would be close and you could call if you feel threatened. I'd be just a door away from you.\"\n\n\"The very same would be true if I were in front of the entrance and you were to talk to the novice in the hall of the infirmary,\" she smiles.\n\n\"Oh, let's say it would be impolite and improper based on how much I respect and love you,\" you give out a sigh of boredom. Sometimes it's hard to talk with her. But she's right, you must admit.\n\n\"This is more like it,\" she beams.\n\nYou enter to see that Florence has moved the body to one of the sick's rooms. He's preparing for the funeral, arranging burning candles around the herbalist.\n\n\"I'll be right back,\" you say to the priestess as you approach the novice and close the door behind you.\n\n*goto 30\n\n*label 30\n*page_break\n\"Any problems with the ritual?\" you ask the novice as you fix the position of a couple of candles.\n\n\"Not really. I've gone through it a few times before I came to the town,\" he says in a grim voice.\"\n\n\"I know it's not the time now, but sooner or later I have to ask you what you have against Sister ${ulmia}.\"\n\nHe opens his eyes widely.\n\n\"Should I speak what I feel Brother?\"\n\nYou nod.\n\n\"It's hard for me to accept her as a Sister. As far as I know, those from her order can't heal or exorcise and they have a devilish origin.\"\n\n\"Well, there are many ways to serve the Light. I guess theirs is slightly different.\"\n\n\"You call that slightly? I don't think so. She doesn't even look...\"\n\n\"As modest as you'd expect from a Sister.\" You crack a smile.\n\nIt is his turn to nod.\n\n\"I know what you mean.\"\n\n\"I can assure you that all those differences are superficial and she's as loyal a servant of the Light as you and me.\"\n*if fear\n\t*goto 31\n\n*else\t\n\t*goto 32\n\n*label 31\n\n\"I hope you are right Brother and just not blinded by her looks...when she's not a devil. I've heard the priests from her order could do that but never believed it. The vision was scary.\"\n\n\"She was just trying to help because I asked her.\"\n\nThe novice raises his hand.\n\n\"You have your own truth, I have mine. May the Light bless you.\"\n\nBrother Florence starts reading a prayer. With the conversation over, you leave him and join ${ulmia}.\n*goto 22\n\n*label 32\n*set rosary true \n\n\"I really want to believe it, Brother. I've heard that the ones from her order can turn into devils. If that happens with her, you may use this.\" He takes out a wooden rosary from the skirts of his cassock.\n\n\"This is a... present from the abbot in the area where I grew up. He was a real exorcist... Or at least that's what everyone believed in. He is said to have killed a devil with it.\"\n\n\"Should I ask how exactly you obtained it?\" You enquire.\n\nBrother Florence shrugs.\n\n\"After he died, nobody else wanted to touch it, so I took it for myself. There were no objections. I think you should have it just in case.\"\n\n\"Well, thank you. I don't think I'll use the way you suppose, but there are infernal creatures around and it could be useful against them. Yet, I don't think it would be safe for you...\"\n\n\"I'm not skilled at fighting infernal creatures, Brother. It would be useless in my hands anyway.\"\n\nYou thank him and leave him, joining Sister ${ulmia}.\n*goto 22\n\n*label 33\n\nThe little angel appears to be one of the most likely murderers in the list of suspects. Yet, there is another angel more adept in using the forces of the Darkness, which was set free by no other than yourself.\n*goto 37\n\n*label 34\nCain appeared on the suspect list no sooner that you interrogated him. He is really able to deal with runes, but you should have found out that the killer is of celestial origin – something not true about the witcher boy.\n*goto 37\n\n*label 35\nThe mysterious fangbearer may be the perfect assassin. Feral, strong and savage-looking, they are nightmares come to live. However, you should have known that the monster was in the other part of the town around the guessed time of the murder. You know that their kind is able to cast spells, which may or may not involve runes, but they are clearly not of celestial origin.\n*goto 37\n\n*label 36\n*achieve holy \nExperience increased by 5.\n*set experience +5\nBy this time, you may already have found out that the killer is a rune wielder from celestial origin. Clarissa also fulfills those conditions, but the angel of frost is much more powerful and has clearly demonstrated her malevolent nature.\n*goto 37\n\n*label 37\n*page_break\nYou hardly manage to utter your answer, when the front door opens and two men enter. The first is in his 60s, dressed in the red cassock of a high ranking clergy. You haven't seen him in a decade, but he must be Abbot Cromwell. He is a prominent exorcist, often leaving his office to hunt a creature of the Dark.\nThe one behind him is young, probably a novice, dressed in a grey cassock with the handle of a mercy blade coming out of his belt.\n\n\"May the Light be with you, brethren! I am the Abbot of these lands. You must be Brother ${name} right?\n\n\"Yes,\" you confirm. \"And the priestess next to me is Sister ${ulmia} of the Order of the Cleansed.\"\n\n\"I know who you are, beloved. I've been having visions about you two and the angel of frost. You unleashed powerful evil, young ones,\" he says.\n\n\"We were just trying to save the angel,\" Sister ${ulmia}'s eyes flash. The abbot raises his hand.\n\n\"I know, child. You really had to free Clarissa, otherwise the whole county would have fallen into the paws of the Dark. Now, we must enslave... or destroy the angel of frost once more. This is why I'm here, together with Novice Benet.\"\n\n\"Would you like to sit? You look like you've come a long way?\"\n\nThe abbot nods and the two men sit on the benches.\n\n\"My old bones are not as good as they were when I was younger, but my faith will never fail,\" says the abbot with a smile.\n\n\"Can you tell us more about the angel of frost?\" asks Sister ${ulmia}.\n\n\"I'd love to. The legends say she was one of the first exorcist angels to be created by the forces of the Light. She's said to have been so bright that she didn't have a shadow of her own. After defeating several of the minions of the Dark, she became so brave that she decided to enter the Abyss itself. The angel burned one third of the lands of Darkness, but then something happened to her. She observed the carnal love by a couple of demons and became interested in it. Surprised to see devils take pleasure in something that doesn't cause pain, she really wanted to try it, so she became an easy target of seduction to Ignius, the prince of hell. And so, the most powerful servant of the Light fell to the twisted wiles of the darkness.\"\n\n\"What happened to her?\" ${ulmia} pressed the abbot on.\n\n\"Why, she fell in love with him. Legends say that he brought her to heights she never experienced before. She mistakenly considered the new feeling aroused in her as related to the Light. The angel started to doubt the morality of her mission and to believe there was Light in the Darkness. Her confusion must have got worse when Ignius abandoned her for a she-devil. It was only then that she became corrupt.\n\n\"She turned to the magic of frost, wishing to defy the powers of fire wielded by Ignius, hence the name under which she's most famous. Here the different versions of the legend vary. Some say she attacked the prince of hell as soon as she became confident with her new powers. Others insist she waited for him to abandon Fiela, the she-devil that replaced her as a consort to Ignius. Still others believe she felt pity towards her and decided to comfort her, becoming her lover. What all agree on is that the angel of frost replaced Ignius as the ruler of that layer of the Abyss and then left it to Fiela to return to the world we live in. Since then, she's been known to kill people with failing relationships and never someone enjoying a fruitful one. Until she was enthralled in the mines by Atoro, whom, as you know, she also managed to corrupt.\"\n\nSister ${ulmia} trembles as she hears the name of the paladin.\n\n\"What is it that makes the angel of frost that powerful?\" you enquire.\n\n\"Apart from being able to control the powers of the Light and the devastation of frost... She is virtually invincible.\"\n\n\"Do you think the angel of frost killed Kalea?\"you ask.\n\n\"I'm sure of it. In my vision, I saw the still bleeding corpse of the woman, the angel of frost bent over her, enjoying her final breath. I'm sorry that I can't tell you why she did that. I guess you'll need to find out.\"\n\n\"That angel, does she have a name?\" ${ulmia} asks.\n\n\"It is not known, however, some priests decided against calling her the way we do, so they made up the name Chill and it gained popular acceptance.\"\n\nYou nod. \"What are your plans, abbot? I would be happy to invite you to stay with us at the church.\"\n\n\"No, thank you Brother,\" the old man shakes his head.\"I know you and ${ulmia} are a couple and we'd like to respect your privacy. We've already taken a room in the inn.\"\n\n\"Are you going to hunt Chill?\" Sister ${ulmia} asks.\n\n\"Yes! However, there's something related to the task I want to discuss with you. According to my visions, the only way to defeat her would require the priestess to obtain her devil form... for good.\"\n\nSister ${ulmia} looks at you with an instant horror in her emerald eyes. What would you reply?\"\n*choice\n\t#\"If that is the will of the Light\"\n\t\t*goto 38 \n\n\t#\"No, that can't be the price\"\n\t\t*goto 39\n\n*label 38\nFavour increased by 1.\n*set favour +1\n\n\"This is the attitude I'd expect from a priest of the Light, Brother!\" says the abbot. \"I know what you feel towards Sister ${ulmia} and it must pain you a lot to know you'd never see her again as you do now. May the Light bless you for that attitude.\"\n\n\"I've confided that decision to Brother ${name}. If he decides that for the good of the Light I should permanently change into Ulmiroth, so be it!\" Sister ${ulmia} looks down, crimson hue starting to form on her cheeks. A lone tear rolls down. You feel as if you are going to cry as well.\n\n\"The time for it hasn't come yet. I just wanted to warn you, to let you prepare,\" says the abbot.\n\n\"I can never prepare for that. It's like dying, only worse.\" Her hands begin trembling and you have to hug her to provide her a bit of comfort.\n*goto 40\n\n*label 39\nRelations increase by 3.\n*set relations +3\n\n\"I'm sorry, Abbot, there must be some other way,\" you propose.\n\nThe old man just shakes his hand.\n\n\"I'm not going to allow it! Sister ${ulmia} is a priestess of the Light and offering her to the Darkness is like sending a lamb to the slaughter.\"\n\n\"I certainly understand your feelings, Brother,\" says the abbot. \"But you must understand that it is the duty of a priestess to sacrifice for the good of all citizens. The angel of frost is one of the most powerful adversaries the Church of Light has faced and stopping her is of utmost importance.\"\n\n\"Still, I refuse to understand!\" You shout.\n\n\"Be it as it may. \"The time for it hasn't come yet. I just wanted to warn you, to let you prepare,\" says the abbot.\n\n\"I can never prepare for that. It's like dying, only worse.\" Her hands begin trembling and you have to hug her to provide her a bit of comfort.\n*goto 40\n\n*label 40\n*page_break\n\"Anyway, as you are both priests and a couple, I suppose that you may want to declare your relationship in front of the Light and be pronounced a man and wife. On the practical side, we know the affinity the angel of frost has towards couples the love each other and I believe that you may be even safer if you go through the ritual. Brother ${name}, before you decide, I'd like to warn you that I'd expect you to participate in the prayer of marriage since I've been taxing my favour a lot recently.\"\nYou scratch your beard. Sister ${ulmia} is the love of your life and you've been dreaming of marrying to her for a long time. On the other hand, this is something really important and you don't want to rush it. You'd like to prepare for the moment, propose to her the way people outside the church of Light do. But then again, if the ritual is going to make you safer as the abbot says...\nWhat do you decide?\n*choice\n\t#Carry on the ritual\n\t\t*goto 41\n\n\t#Refuse\n\t\t*goto 42\n\n*label 41\nFavour decreased by 1. Relations increased by 3.\n*set favour -1\n*set relations +3\n\nThe ritual is long and in the middle of it, you begin to fear that your excitement will make you forget the words. Sister ${ulmia} looks very happy... and beautiful. You thank the Light for having her.\nWhen it is all over and you kiss her, you feel certain that you will be with her forever.\n*goto 43\n\n*label 42\n\n\"We'll, Sister ${ulmia} is the choice of my heart.\" You smile and look in her eyes. \"However, I believe that we deserve to marry under different circumstances. This is not something a high priest like you should force.\"\n\n\"Very well, the choice is yours,\" the abbot shrugs. \"Maybe in my desire to stop the angel of frost, I'm going too far. I beg you to forgive me!\"\n\n\"It's ok, Father,\" says ${ulmia}. \"We understand.\"\n*goto 43\n\n*label 43\n*page_break\n\"Good, I feel so tired. I'm not that young any more,\" says the abbot. \"Farewell, children, see you tomorrow. Meanwhile, if you need me, we'd be in room 12 of the inn. Come on, Xavier, let's go to rest.\"\nThe old man stands and heads for the door. He passes by the novice and touches the handle.\n*if hand \n\t*goto 45\n\n*else \n\t*goto 44\n\n*label 44\n\nSister ${ulmia} takes out her dagger and, to your amazement throws it at Xavier. The blade sinks deeply into his neck, killing him instantly.\n\n\"${ulmia}, in the name of the Light, what did you do?\" Your first thought is that her devil part somehow took control of her. But, even if it was so, why would she kill the novice instead of the abbot?\n\n\"This young man tried to kill me earlier today,\" shouts the priestess.\n\nThe abbot looks at her with an open mouth, unable to understand what is going on.\n\n\"Check the sheath of his mercy blade. I'm sure there is my blood on it,\" she says.\n\nYou go to the body of the novice and remove his weapon.\n\n\"You are right, ${ulmia}.\"\n\n\"And if you look at the inside of his arm, you'd see a tattoo of a horned silhouette,\" continues the priestess.\n\nYou use the blade to cut the sleeve of his cassock. She is right, again.\n\n\"What does it mean? Did he attack you?\" the abbot spatters.\n\nSister ${ulmia} nods.\n\n\"Yes, last morning I was here alone, praying, when someone stabbed me in the back. Were it not for Brother ${name} finding me before I bleed to death, it would have been the end for me. Your novice was a member of the Cult of the Avengers of Darkness,\" she explains.\n\n\"The ones who killed the last exarch?\"\n\nSister ${ulmia} nods.\n\n\"They would occasionally try to kill important clergy, however, they are even more keen on eradicating the members of the Order of the Cleansed since we are supposed to be former devils. I guess he just couldn't resist stabbing me when he found me praying here yesterday morning.\"\n\n\"Your life was also in danger, abbot. I think you should be grateful that the priestess managed to deal with the assassin.\"\n\n\"I don't know. I just witnessed a cold blooded murder in a sacred place.\" The eyes of the abbot fall on the tattoo of the dead man. \"Just move him to the confessions chamber, leave him there and lock the door. I'll arrange it from there. Farewell.\"\n\nThe abbot leaves. You have doubts he will be able arrange the removal of the corpse, but decide to carry out his instructions nevertheless.\nAfter you are finished, you go out for a walk, together with the priestess.\n*goto 46\n\n*label 45\nFavour decreased by 1.\n*set favour -1\n*set holy_collar true \n\nSuddenly the novice takes out his mercy blade and stabs the abbot. Sister ${ulmia}'s reaction is quicker than yours, she takes out her own weapon throws it at Xavier. The blade sinks deeply into his neck, killing him instantly.\n\nYou run for the abbot, saying a healing prayer.\n\n\"Thank you, young one. I feel better,\" the abbot tries to give you a reassuring smile. \"I really didn't see that coming. I wonder what the meaning of this is.\"\n\nThe priestess cuts the sleeve of the novice, exposing a tattoo of a horned silhouette.\n\n\"What does it mean?\" the abbot asks.\n\nSister ${ulmia} nods.\n\n\"Your novice was a member of the Cult of the Avengers of Darkness,\" she explains.\n\n\"The ones who killed the last exarch?\"\n\nSister ${ulmia} nods.\n\n\"They would occasionally try to kill important clergy, however, they are even more keen on eradicating the members of the Order of the Cleansed since we are supposed to be former devils.\"\n\n\"He nearly killed you, abbot. I think you should be grateful that the priestess managed to deal with the assassin.\"\n\n\"I don't know. I just witnessed a cold blooded murder in a sacred place.\" The eyes of the abbot fall on the tattoo of the dead man. \"Just move him to the confessions chamber, leave him there and lock the door. I'll arrange it from there. Farewell.\"\n\nThe abbot leaves. You have doubts he will be able arrange the removal of the corpse, but decide to carry out his instructions nevertheless.\n\nIt is only then that you find the collar of the Abbot on the floor of the church.\n\n\"I think you should take it,\" says the priestess. \"It is filled with strong energy.\"\n\nYou examine it closely and agree with ${ulmia}. The origin of the energy is not the Light but doesn't feel like the Dark either. After a short wonder, you decide to follow her advice.\nThen, you go out for a walk, together with the priestess.\n*goto 46\n\n*label 46\n*page_break\n\"Brother ${name}, is that you?\"\n\nYou turn around to face the stranger who shouted behind your back. You can't see much of his face as the shady character has his hood down.\n\n\"Do I know you?\" you ask without bothering to hide your annoyance.\n\n\"No, but I've heard about you. See I'm a friend of Kalea and I've come to pay last homage to her.\"\n\n\"How do you know she's dead?\" ${ulmia} snaps.\n\n\"I am a practicer of dark arts. Allow me to have my ways to keep myself informed.\"\n\nHis self-righteous smile makes you angry. Sister ${ulmia} pulls you by your sleeve probably trying to stop you from reacting.\n\n\"Come on, I'm sure it would cost you nothing to tell me where her body is. Priestess, maybe you'd accept a little bribe.\" He gets a beautiful black rose from his sleeve. Sister ${ulmia} looks at it, almost hypnotized and extends her arms to get it.\n\nWould you allow her to do so?\n*choice\n\t#No\n\t\t*goto 48\n\n\t#Yes\n\t\t*goto 47\n\n*label 47\nYou just observe as she takes the flower and presents it to her nose. The expression on her face changes, showing delight. You don't remember the last time there was such a wide smile on her face. She's beautiful, you have to admit.\n\n\"I can take you to her,\" the priestess offers. She looks at you: \"I won't be long. I'll catch up with you in a moment.\"\n\nYou don't feel it right to let her alone with the demonologist. On the other hand, maybe you should trust her more... including her abilities to deal with the ones walking the wide road.\n\nWhat would you choose?\n*choice\n\t#Let her go with him\n\t\t*goto 49\n\n\t#Refuse\n\t\t*goto 50\n\n*label 48\nYou feel quite nervous after everything that happened these days and it seems that the demonologist and his petty attempts to impress Sister ${ulmia} is the bit that is too much for you to handle. You hit his arm, making him drop the flower to the ground.\n\n\"Wow, easy, Brother! I'm just trying to be polite, that's all,\" he says why massaging his wrist.\n\n\"Be polite with someone else, scum,\" you say in an outburst that is not so typical of you.\n\nSister ${ulmia} says nothing, just follows you as you move away from the stranger.\n*goto 51\n\n*label 49\nRelations decreased by 1.\n*set relations -1\n\nYou walk to the market and buy a few plums since you know Sister ${ulmia} loves them and wait for her to appear. Then, you go to the infirmary but there's no one there. She is not in the church either. You start wandering around the town and asking if anyone has seen her, but the priestess is nowhere to be found. Finally, you decide to return to the temple for a prayer. You breathe a sigh of relief as you find her there but then you notice the destitute state she's in. Her red hair is a mess, her eyes are red from crying and there's nothing of the haughty posture she usually displays.\n\n\"Forgive me, Father, I have...sinned,\" she says with trembling lips.\n\n\"What happened, ${ulmia}?\" you ask as you embrace her and kiss her forehead.\n\n\"I... I slept with him.\" She starts weeping again. Her words cut your heart to pieces. \"I'm sorry, ${name}, I was under some sort of a spell. I hate what I did. I hate how week I am when dealing with a demonologist. I'm so sorry. It's never going to be the same... between us. I... I'm not good enough to be in your arms.\" She tries to pull away.\nWhat would you answer?\n*choice\n\t#\"It was my fault.\"\n\t\t*goto 52\n\n\t#\"Yes, it's not going to be the same again.\" \n\t\t*goto 53\n\n\t#\"I'm going to kill that pig.\"\n\t\t*goto 55\n\n*label 50\n\"I'm sorry, stranger, neither of us has the time to act as a guide. Kalea is in the infirmary, which is in that direction,\" you point. \"You can't miss it, is painted in white lime. Tell the novice, Brother Florence, that I send you. And, mind what you are doing. I don't want any walking dead around the town.\"\nYou take ${ulmia}'s hand and move away from the stranger.\n*goto 51\n\n*label 51\n*page_break\nYou visit the market, where you take the opportunity to buy the priestess the plums she loves and basically have a good time chatting to the fellow citizens. The sunshine seems to somehow make all of you forget about the shadow of Darkness hanging over the town.\n*goto 54\n\n*label 52\n\"I'm sorry, my love. I should have been able to predict it. I shouldn't have left you with him. I... it was so stupid of me to forget how susceptible you are to the powers of the demonologists.\"\n\n\"I should have been able to sense it too. That black rose, it was the reagent. It was so beautiful, so fresh...\" The priestess slaps herself. \"Oh, in the name of the Light, even the thought about it makes me succumb to its influence again.\"\n\n\"Don't think about it, ${ulmia}. I'm sure we both are going to get over it. Now, I'm going to make you some relaxing tea.\"\n\nShe nods and tries to sort out her hair.\n*goto 54\n\n*label 53\nRelations decreased by 2.\n*set relations -2\n\n\"I have no words, ${name},\" the priestess says. \"I somehow expected you to sooth me. I know what I did hurt your feelings and I'm more that sorry but it was something I really could not control.\"\n\n\"You come here and tell me you slept with another guy. What do you think my initial reaction would be?\" You raise your voice. \"You don't expect me to be happy with it, do you? If you expect me to forgive you, I think I'd do that but only after the burning rage inside me diminishes.\"\n\n\"I can't listen to you any more, ${name},\" she says and collapses on the bench.\n\n\"I'm sorry, darling. I'm going to make some relaxing tea for both of us.\"\n*goto 54\n\n*label 54\n*page_break\nThis night you find it incredibly difficult to fall asleep. Tomorrow, you should participate in the funeral of Kalea. You find the thought of seeing her dead body again disturbing, which adds to the usual sadness related to the prayer of farewell. Sister ${ulmia} keeps twisting and turning next to you. You hug her in an attempt to soothe her, but it doesn't seem to help much.\n\nA loud cry wakes you up probably moments after you fall asleep. You jump out of bed and run into the church to see the militiaman on duty, pale as a ghost, panting as if he has run for his life through the entire town.\n\n\"Brother, please come to the main square immediately! She's eating him alive!\"\n\n\"Who's eating whom?\"You are still unable to realize whether you're dreaming or not.\n\n\"I'll run to fetch backup,\" he utters and runs out of the temple.\n\nYou are pretty sure he's going to just hide in a safe place until dawn. Sister ${ulmia} is already awake too, so you both head for the main square.\n\nThe militia man was right. In the light of the street lanterns, you see the white haired Kalea clawing the body of the demonologist. He gives no signs of being alive any more but his body is still warm and there is steam coming out from his ripped stomach in the night's chill. Serves him right, you think to yourself, then you have to ask the Light to forgive you.\nKalea cuts a large piece of meat with her claws and starts chewing it, smearing blood all over her face. Her eyes set on you, shining like torches.\n\nDo you smite her now, or wait?\n*choice\n\t#Attack her\n\t\t*goto 58\n\n\t#Wait\n\t\t*goto 59\n\n*label 55\n\"I'm going out to find him,\" you say and rush out.\n\n\"Don't do that, ${name}. He's powerful. More powerful than you could imagine,\" she catches up with you and grabs you by your cassock. \"You can't face him overwhelmed by anger. The Light won't listen to you. Come back to the temple. I know you are angry, Brother, but this is a feeling fueled by the Dark. Please, come back inside.\"\n\nWill you listen to her?\n*choice\n\t#No\n\t\t*goto 57\n\n\t#Yes\n\t\t*goto 56\n\n*label 56\nRelations increased by 1.\n*set relations -1\n\n\"I know you are right, dear one,\" you say looking at the ground. \"I just love you so much that I allowed this holy feeling to turn into hatred.\"\nShe takes your hand and pulls you in the direction of the church.\n\n\"Your burst was so strong, ${name}. I didn't think I was so important to you.\"\n\n\"You are, my dear.\"\n\n\"Will you forgive me? Will it be the same again after what happened today?\"\n\nWhat would you answer?\n*choice\n\t#\"It was my fault.\"\n\t\t*goto 52\n\n\t#\"No, it's not going to be the same again.\"\n\t\t*goto 53\n\n*label 57\nYou run, not sure in which direction you should go. You just need to find that demonologist and make him suffer your righteous wrath. Sister ${ulmia} shouts after you hysterically, but decides not to follow you, probably scared to see the scum again. That suits you fine as you won't have to worry about her while fighting the wielder of dark energies.\nHe is just around the corner and it seems as if he's been waiting for you. You cry out a prayer of smiting, but he appears to be quicker, sending a hellfire bolt in your direction. You try to dodge it, but you fail. The flame is too quick. It licks the skirts of your cassock and soon the fire is all over you. You are soon praying to die sooner as the pain becomes unbearable and your lungs fill with the ashes of your own body.\n\n\"Passion is a weapon of darkness, Brother. Nothing personal, but I really enjoyed...\"\n\nDeath gives you the present of not being able to hear the end of his sentence, but you have the feeling you wouldn't like it at all.\n*goto_scene death\n\n\n*label 58\nYour prayer of smiting sends her flying to the other end of the square, burning with the holy fire of the Light. Her screams are mixed with words and you are under the impression that she's trying to tell you something, but the flame wouldn't let her. When it is finished, she's just a charred skeleton.\n\n\"Rest in peace, dear Kalea.\" You say the prayer of farewell. Of course, you don't bother do the same for the demonologist.\n\nIn the morning, you organize the funeral of the herbalist, hiding her body as much as you can so as not to scare the citizens. Her victim burns at a pyre near the graveyard for fear that he might return as a ghoul as well.\nYou lose the thread that could lead to defeating the angel of frost, so when she appears next winter, there's nothing to stop her massacres. But this is another... rather sad story.\n*goto_scene death\n\n*label 59\nSister ${ulmia} seems to be able to apprehend the situation better. She approaches the ghoul, being careful not to make any quick movements.\n\n\"What happened to you, Kalea?\" she asks gently.\n\n\"When I woke up, I felt cold and hungry. I came out of the infirmary and ran into that man. He seemed delicious with that aura of Darkness surrounding him. He was pretty confident that he could control me but he couldn't. I guess my starvation was stronger.\" She takes another bite.\n\n\"What made you wake up, dear?\" Sister ${ulmia} asks.\n\n\"It was the angel of frost. I made a deal with her. She appeared to me and told me she could find my son if I listened to her.\" A single tear of dark blood comes out of her eye.\n\n\"I hear steps in the distance. Maybe we should leave the town before the militia comes.\"\n\nMaybe she is right. However, you fear to go in the wilderness at night with all the creatures of the Dark that might linger there.\n\nWhat would your decision be?\n*choice\n\t#Stay\n\t\t*goto 61\n\n\t#Leave\n\t\t*goto 62\n\n*label 61\nIt seems the militiaman did call for backup, as soon half a dozen of guards armed with short swords and chainmail armour attack from all sides. You try to tell them to stop, but they won't listen to you. They can hardly be blamed. The fierce looking Kalea, smeared in gore is just too fearsome to be left alive. They overcome her and it is all over for the undead herbalist who ends up slashed to pieces.\nA fire stake is immediately set in the central hair and both her body and that of the demonologist are burned. You can't help but cry a little, not only for your lost friend, but also because you know that with her you may have lost all the chances to defeat the angel of darkness. And, there is a small boy out there, probably within her control and you can't really help him.\n*goto_scene death\n\n\n*label 62\n\"Okay, let's move,\" you order. You take the small winding streets, hoping not to be detected by the guards. The movements of the ghoul are very clumsy, but she seems to give the best of her to keep up. Finally, you leave the town. Your eyes need to get used to the darkness, broken only by the half-full moon.\n\n\"I know I shouldn't have done that,\" says Kalea with a trembling voice. \"I never wanted to become that abomination. I... I never liked my body that much when I was alive, but I hate what I've become.\"\n\n\"It's all right. You are just different, that's all,\" says Sister ${ulmia}. You are lucky to have the devil priestess. She may be the only one who even barely knows how Kalea is feeling right now and is able to show compassion to her.\n\n\"I just needed to find my son. I know Henrik hid him somewhere but he took that secret with him as he died. I was confident that I could use my witchcraft skills to find him, but all my powers proved futile. It was only then that the beautiful angel appeared to me and offered me her help... but at what price. I had to suffer a ritual death and then be raised as a ghoul. She said she wanted to experiment with new runes, she wanted to test them on someone wielding the powers of a witch.\"\n\n\n\"Why did you agree with this deal, Kalea?\" you enquire. \"In this state, I doubt you could appear in front of him.\"\nYou look at the priestess, needing a reassurance you didn't go too far with what you said. She just nods and you take it as a positive sign.\n\n\"'cause I knew you would reach for him, wherever he is and you will take care of him... and teach him in the ways of the Light. Wait, I didn't tell you where he is. He...is...\"\nShe suddenly becomes motionless and falls to the ground, her body stiff.\n\n\"I think the magic that raised her is no longer strong enough to sustain her ghoulish form. If only she could finish what she was about to say...\"\n*if hunt\n\t*goto 63\n\n*else\n\t*goto 64\n\n\n*label 63\n*page_break\n\"Can you use your powers to bring her back?\" you ask the priestess.\n\n\"I really hoped I'd never have to unleash the devil again. I don't know ${name}.\" You can sense her internal struggle.\n\n\"Please, there is a...\"\n\n\"Don't push me, please. I am the one whose body is infested with the Dark and slave to a creature of pure darkness. I doubt it would be so eager to try if you were in my shoes.\"\n\n\"You weren't that hesitant back in the Abyss. You lead a horde of zombies...\"\n\n\"It was different. Oh, in the name of the Light can't you understand. I the Abyss, I really lose much of my human part anyway. But I'm out of it now and I'd hate to do what you'd ask of me.\"\n\n\"I see. So, you refuse?\"\n\n\"You don't understand again, do you?\" she asks in anger.\n\n\"I'm afraid I don't, dear,\" you shrug.\n\n\"I gave you the medallion, so the choice is yours.\"\n\nWould you use the trinket?\n*choice\n\t#No\n\t\t*goto 66\n\n\t#Yes\n\t\t*goto 65\n\n*label 64\n*page_break\nYou hear steps coming from the wilderness and take your sword out, ready for battle.\n\n\"I come with peace, friends,\" the beastly voice of Growler makes you sigh with relief.\n\n\"Well, hello, ball of fur, what are you doing here?\" Sister ${ulmia} welcomes the newcomer.\n\n\"I've been searching for rare herbs in the area. I even had to break into a house in town to steal it.\"\n\n\"I guess you could have asked first,\" you snap him.\n\n\"Humans don't tend to listen to me when I talk. They would rather attack me, because I am the big bad werewolf that would shred them to pieces and eat them and so on.\"\n\n\"I could have talked to the girl. You scared her\" says ${ulmia}.\n\n\"I'm really sorry, priestess. Well, I really couldn't sense you. You spend so much time in that sanctuary you call a church and I really have no means of detecting you in. I believed you were somewhere away from here. I only got your smell a few minutes away. It was hard to make out it was you as that woman there really stinks.\" He points at the corpse.\n\n\"Actually, we might need a bit of help here. She was about to tell us something important when she became numb. I guess someone with the magical power like yours could bring her back... as a ghoul even if only for a few minutes.\"\n\n\"Necromancy is hardly anything I'm good at, but let me check her aura,\" he says and leans over her, barely touching her with his enormous paws.\n\n\"She is so full of magic energy, mostly dark. There is a bit of nature blocking it. I guess I can remove it... or some of it. But, there are risks.\"\n\n\"What risk?\" ${ulmia} aks.\n\n\"She could come back as a mindless ghoul and attack you. I don't want to be around if that happens.\"\n\n\"Okay, you can prepare the spell and leave, then. I think we should try since she can tell us how to reach a small boy, probably surrounded by darkness.\"\n\n\"You are a noble couple. Last time you were after a trapped angel, now your mission is similar.\"\n\nYou really like the sound of the word 'couple' when it refers to ${ulmia} and you but you remind yourself that it is no time to get tender.\n\nThe fangbearer snatches a bit of his fur from his chest and puts it on the corpse. Then runs back from where he came from.\n\n\"I wish you luck. Farewell.\" The wind brings the words to your ears.\n*goto 67\n\n*label 65\nRelations decreased by 1. Devilry increased by 2.\n*set relations -1\n*set devilry +2\n\nYou take the medallion out and you catch your breath as the sight of the expression on ${ulmia}'s face.\n\n\"I see your point, ${name}, and I'm sorry I can't be as strong as I have to.\"\n\n\"May the Light give you strength, darling.\"\n\nYou step next to her and reach for her hand, but she draws back. You can't really blame her. You say the words of the prayer with sadness.\n\n\"Did you miss me, handsome?\" Ulmiroth's voice is a punishment to you, buy you can't say you don't deserve it.\n\n\"Just make it quick, please,\" you beg.\n\n\"And then you'd just send me back in that gorgeous body,\" she stretches like a cat. \"Deal, as long as you promise me to reach for me again, and again. Would you do that, darling?\"\n\n\"Well sometimes I have no choice, I fear.\" You shrug.\n\n\"You hate me don't you?\"\n\n\"I do,\" you admit.\n\n\"That is fine. I like planting the seed of darkness. Just make sure you take care of it and let it grow. Now, let's see what we have here.\" She leans over the corpse.\n\n\"Let's see what we have here. She's a gorgeous ghoul. I'd love to see her rise again. I must warn you that she could be a bit wild when she wakes up. I will use most of my energy on the dark resurrection, so I won't be able to help you enslave her. Would you take the risk?\"\n\n\"I will.\" You gulp.\n\n\"I love brave men.\" She blows you a kiss. Then, she crouches and kisses Kalea.\n*goto 67\n\n*label 66\n\n\"I won't force you to do this, dear. I think you suffered a lot already. My heart bleeds to even think about it.\"\n\n\"What do we do now?\" she asks still in owe from your decision.\n\n\"I will carry her corpse to the infirmary. In the morning, we'll organize a funeral and that will be it. Then, we can go somewhere so that we would be together away from all the hustle.\"\n\nShe nods.\n\n\"Sounds like a dream come true,\" she comes closer for a hug.\n\nThe good news is that you win a romantic week with Sister ${ulmia}. The bad is that you lose the thread that could lead to defeating the angel of frost, so when she appears next winter, there's nothing to stop her massacres. But this is another... rather sad story.\n*goto_scene death\n\n\n*label 67\nKalea suddenly jumps to her feet, so quick that you barely manage to see her movement. Then, she leaps at you, her teeth ready for a bite, her hands raised, and fingers ready to sink into your throat.\nThe speed of her attack is so great that you have no time to react, even to dodge.\n*if not (angel)\n\t*goto 68\n\n*else\n\t*goto 69\n\n*label 68\nYou instinctively crouch, but her knee connects with your head and sends you flying backwards. You fall on your back and just a fraction later Kalea's powerful jaws lock with your neck in them. Your wind pipe crashes and blood starts rushing from your severed artery.\nSister ${ulmia} screams and comes for a rescue but it is too let.\nThis is a rather sad end to the story.\n*goto_scene death\n\n\n*label 69\nClarissa appears out of thin air between you and Kalea. The ghoul freezes mid air, levitating about a meter above ground. Whatever prayer the little angel used, it was just in time to save your soul.\n\n\"Brother, playing with the Dark is dangerous, don't you know?\" The little angel gives you a mischievous smile.\n\n\"Sometimes you need to go into the deepest Dark to let the Light in you shine brightest,\" you recite.\n\n\"Nice choice of a quote. Well, what should I do now with that corrupted witch?\"\n\n\"I need to speak to her. I mean the original Kalea.\"\n\n\"Okay, so, maybe just a little cleansing.\"\n\nClarissa whispers something and the ghoul is engulfed in holy fire. She screams and the smell of burned flesh reaches you nostrils.\n\n\"Kill me already,\" Kalea begs. \"I can't take it any more.\"\n\n\"Just tell me where your son is and we'll let you go,\" you promise.\n\n\"At the ruins, there is a portal to a layer of hell. This is the new domain of the angel of frost. It is where my son is. Please, Brother, save him.\"\n\n\"I will. May the Light bless you!\" You nod at Clarissa and turn around to save yourself the sight of the burning Kalea.\n\n\"I'm done here. I feel so tired,\" says the little angel.\n\n\"You did a great job, holy one,\" you smile. \"Go with peace.\"\n\nYou are left alone with ${ulmia}.\n\n\"You are going there, aren't you?\" She breaks the silence.\n\n\"It is my duty dear. Would you come with me?\" you ask with hope.\n\n\"I don't know, ${name}. I'm a strong woman, but I'll lose control of me. It feels awful to remember what you did under the influence of that devil in me. I can barely take it. If it is deeper into the Abyss, I might be forced to come with you as Ulmiroth if I decide to do so. Is that what you want?\"\n\n\"I... don't know. I don't like being around her but she's a tough girl...\"\n\n${ulmia} sighs.\n*if relations >43\n\t*goto 71\n\n*else\n\t*goto 70\n\n*label 70\n\"I'm sorry, ${name}. I beg you to forgive me.\" Tears roll down her beautiful face. \"Actually, you may still make me. Just use the medallion and...\"\n\n\"I won't do that, dear. I can't stand to see you hurt.\" You embrace her and wipe the wet streaks on her cheeks. Then, you kiss her passionately.\n\n\"I have to go.\" Every piece of you shrieks not to do so, but you must.\n\n\"I'll be waiting for you. Take care!\"\n\nThe first rays of light appear above the horizon as you stride towards the old ruins. A strange red light coming from the remains of the tower suggest that you've found the portal. You bravely step in, unable to see anything because of the blinding hellish light. All of a sudden, it stops, but you need a sometime for your eyes to get used to the darker environment... and behold the angel of frost just a couple of feet from you.\n\n\"Welcome to my realm, Brother ${name}. I love how you fell into my trap.\" Her tone changes. \"Why are you alone? You are worthless.\"\n\nYou try to take your sword out but you can't move.\n\n\"Why are you standing there?\" She laughs. \"And why is the gorgeous priestess of hell not with you? Did she leave you? Well, don't tell me. You will have eternity to think about it. Have you ever wondered why they call me the angel of frost? I'd better show you.\"\n\nShe breathes out a blizzard that engulfs you. The burning cold becomes unbearable as you turn into a frosty statue.\n\nIt is a sad end to your adventure.\n*goto_scene death\n\n*label 71\n\n\"Well, when I think again, I'd die of anxiety if I let you go alone. I'll come with you, ${name}, even if you are going to the core of hell itself,\" she says. Then, she steps closer and gives you a wet kiss, taking your breath away. After a few minutes of tenderness, you head for the old ruins, her hand in yours.\n\nThe first rays of light appear above the horizon as you stride towards the old ruins. A strange red light coming from the remains of the tower suggest that you've found the portal.\n\n\"I think I should check this out,\" ${ulmia} offers However, I'd need Ulmiroth to be able to properly do so.\"\n\n\"I guess you'd have plenty of opportunities to call for your devilry. Maybe we shouldn't start that early.\"\n\n\"That is also true and I'm certainly not eager to go through the transformation for nothing but I guess it might be important.\"\n\nWould you agree with her?\n*choice\n\t#No\n\t\t*goto 72\n\n\t#Yes\n\t\t*goto 73\n\n*label 72\nYou bravely step in first because it is impossible for both of you to enter the ruins of the tower at the same time. You are unable to see anything because of the blinding hellish light. All of a sudden, it stops, but you need a sometime for your eyes to get used to the darker environment... and behold the angel of frost just a couple of feet from you.\n\n\"Welcome to my realm, Brother ${name}. I love how you fell into my trap.\"\n\nYou try to take your sword out but you can't move.\n\n\"Why are you standing there?\" She laughs. \"And why is the gorgeous priestess of hell not with you? Did she leave you? Well, don't tell me. You will have eternity to think about it. Have you ever wondered why they call me the angel of frost? I'd better show you.\"\n\nShe breathes out a blizzard that engulfs you. The burning cold becomes unbearable as you turn into a frosty statue.\n\nIt is a sad end to your adventure.\n*goto_scene death\n\n\n*label 73\nDevilry increased by 2.\n*set devilry +2\n\n\"You have no idea how much I love the fact you are going back to Hell. I will be able to spend more time with you, sweetheart,\" says Ulmiroth. \"Now, let's see what we have here. Some shining runes, well inscribed, I would say. They would only work for you, ${name}. If you and ${ulmia} were both going somewhere, it is only you who'd arrive at the destination. I also don't like the latter. It is too close to the center of that layer of hell. I have the feeling you'd meet the final boss too soon.\"\n\n\"Can you fix those, Ulmiroth?\"\n\n\"I love it when you say my name, sugar. Maybe if you give me a kiss, a proper one, that is.\"\n\nYou look at her face with a slight disgust. It is not that she looks ugly, but all of her features are a distortion of ${ulmia}'s.\n\n\"Okay, we'll talk more about it when we get there.\"\n\nShe cuts her right wrist with the razor sharp nails of her left hand and uses them to write something around the portal. You note that while ${ulmia}'s main hand is the right one, Ulmiroth is left handed.\n\n\"It is done, love. Now, you and ${ulmia} may get in and you will be a few kilometers away from the centre of that layer of hell. See you later.\"\n\nThe she-devil changes back to ${ulmia} and you try to engulf her with your eyes, hungry to capture her features as it could be the last time you see her looking like that. You enter the portal first since the entrance to the ruins of the tower is too tight for both of you to get in simultaneously. You are pretty sure she'd enter just a moment after you.\n\nYour head spins as you are engulfed in blinding red light.\n*goto 74\n\n*label 74\n*page_break\nBeing succeed into emptiness doesn't feel good this time either. At least there is no voice coming from the darkness. A second later, lights touch your eyes. You are forced to blink and turn away. Once you get used to it, you realize they are just two torches. One of them in the cell you are in, the other - a bit further in the corridor.\nStill very dizzy, you try to move your hands but the only result is a metallic ding. There are chains around your wrists hidden below the wide sleeves of your cassock! You turn back to see them starting from a big block of stone. The chains themselves, however, seem rusty and corroded. Maybe if you pull with all your might, you will be able to break them. It is just that you are so weak...\nAnd Sister ${ulmia} is gone. The though strikes you as if a dagger sunk into your heart. Without her, all seems futile. You wonder what went wrong, she was supposed to appear right next to you. Could she be in one of the cells nearby?\nYou hear a creaking sound. It reminds you of rats, but is louder.\n\nWhich makes you realize your weapon is nowhere in sight either.\n\nYou can pray for healing, hoping to remove your dizziness, or sit on the floor for a quick rest. Or, you can try to break the chains despite your weakness.\n*choice\n\t#Pray for healing\n\t\t*goto 75\n\n\t#Rest \n\t\t*goto 76\n\n\t#Pull the chains\n\t\t*goto 77\n\n*label 75\nFavour decreased by 1.\n*set favour -1\n\nThe prayer fills you with the energy of the Light, making you feel capable of lifting a mountain. You push the chains and they fall easily. Maybe too easily, you say to yourself. You could have saved the favour. The feeling of strength, however is so great that you soon stop regretting. As you can't see a better weapon nearby, you pick one of the chains.\nA horde of enormous rats rushes into the cell. They are snow white with bloody eyes and long teeth. Your heart skips a beat as you realize you can hardly fight so many. Not without a sword. Luckily, when they realize you are not in chains, they came back to where they came from. Are they used to easier meal? You just hope that they won't find Sister ${ulmia} enchanted and helpless. The thought makes you shudder and run to the corridor.\n*goto 78\n\n\n*label 76\nThe floor is cold and hard, but you manage to relax your muscles, despite the chains. You even close your eyes for what feels like a second, but could have been much more.\nThe same noise startles you. In horror, you observe a mass of snow white rats rushing into the cell. Their read eyes and bloody red eyes glitter. The light of the torch seems to annoy them and a couple of especially large specimens spit fountains of saliva to douse it.\nIt is hard to tell of your fear or disgust is stronger. You try pushing the chains but to no avail. Maybe it is time to say the prayer of healing. Or, if they really dislike light, it might be a good idea to pray for illumination.\n*choice\n\t#Pray for healing\n\t\t*goto 79\n\n\t#Pray for light\n\t\t*goto 80\n\n*label 77\nYou push as hard as you can, feeling the handcuffs sink into your flesh, then make a pause to catch your breath. The next attempt is successful and you almost cry with joy when both chains break. As you can't see a better weapon nearby, you pick one of them, hoping not to have to use it.\nA horde of enormous rats rushes into the cell. They are snow white with bloody eyes and long teeth. Your heart skips a beat as you realize you can hardly fight so many. Not without a sword. Luckily, when they realize you are not in chains, they came back to where they came from. Are they used to easier meal? You just hope that they won't find Sister ${ulmia} enchanted and helpless. The thought makes you shudder and run to the corridor.\n*goto 78\n\n\n*label 78\nThe light of the torch allows you to look around the small corridor. There is lichen on the walls. Every now and then, a swarm of small spiders passes form one crack to another.\nThere is only one door to the left before the corridor comes to a dead end. To the right, it continues two dozen feet before making a turn. You are about to head that way when you hear a soft moan coming from the cell nearby. A high pitched cry comes next. It doesn't quite sound like the woman you crave to find, but could very well be another prisoner.\n\nWould you like to check if you can help her or continue on your way?\n*choice\n\t#Enter the cell nearby\n\t\t*goto 81\n\n\t#Walk in the other direction\n\t\t*goto 82\n\n*label 79\nFavour decreased by 2.\n*set favour -2\n\nYou say the prayer as quickly as possible, but by the time your strength is restored and you – unchained, the mass of rats is all over you, biting and scratching you all over. And the stink... it i
