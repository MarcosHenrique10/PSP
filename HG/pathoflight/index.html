<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Path of Light — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "pathoflight", "title": "Path of Light", "scenes": {"choicescript_description": "Generate your own priest of the Light. Smite demons, heal wounds, confess fellow villagers, accompany the beautiful and devilish priestess on her journey through the Abyss and find out if you can survive... and win her heart!\n\n[i]Path of Light[/i] is an interactive novel where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n", "choicescript_stats": "*stat_chart\n\ttext name Name\n\ttext ulmia Soulmate\n\t\n*line_break\n*stat_chart\n\ttext favour Favour\n\ttext relations Relations (with ${ulmia})\n\ttext experience Experience\n\ttext devilry Devilry\n\n*line_break\nExplanation of rules\n\nIn this story, you are a priest of the Light. Like most of the clerics you may have met in fantasy settings, you can use prayers to heal, smite creatures of the Dark, confess, etc. \nThere are a few variables that will play an important role in the adventure:\nFavour is the equivalent to manna of casters. Each prayer will decrease your Favour and if it reaches 0, the journey will be over and you will be invited to start again. \nExperience will increase every time you make a very good decision (and will decrease if you make a particularly bad one). \nRelations refer to your friendship with your soulmate. My advice would be to treat her right.\nDevilry stands out for her inclination to use her devilish heritage to deal with problems. While sometimes it is necessary to do so, it will be a bad strategy to push her towards the Dark too often.\n", "choicescript_upgrade": "*label start\n*check_purchase adfree frostiap\n\n*if choice_purchased_adfree = false\n  [b]Part 1[/b]\n\n  Unlock Path of Light Part 1.\n\n  *purchase adfree $3.99 start\n\n*if choice_purchased_frostiap = false\n  [b]Part 2[/b]\n  \n  In Part 2, you will be able to conclude the saga. Will you be able to find Kalea's son? Will you seal his fate? Will you defeat the angel of frost... or bring her back to the Light? It is all in your hands... and your prayers.\n  \n  *purchase frostiap $3.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Part 1[/b]\n\n  You've paid to unlock Part 1.\n\n*if choice_purchased_frostiap\n  [b]Part 2[/b]\n\n  You've paid to unlock Part 2.\n", "death": "*page_break\n*allow_reuse\nYou came to a sad end of your adventure; do you wish to restart completely, or return to the previous checkpoint?\n*choice\n\t#Restart completely\n\t\t*restart\n\t#Return to my previous checkpoint\n\t\t*set dagger cp_dagger\n\t\t*set key cp_key\n\t\t*set wine cp_wine\n\t\t*set instructor cp_instructor\n\t\t*set clairvoyant cp_clairvoyant \n\t\t*set freedom cp_freedom \n\t\t*set salvation cp_salvation\n\t\t*set consecration cp_consecration\t\n\t\t*set animal cp_animal \n\t\t*set stash cp_stash \n\t\t*set necklace cp_necklace\n\t\t*set retribution cp_retribution \n\t\t*set east cp_east \n\t\t*set west cp_west \n\t\t*set name cp_name \n\t\t*set favour cp_favour \n\t\t*set relations cp_relations \n\t\t*set experience cp_experience \n\t\t*set devilry cp_devilry \n\t\t*set exorcist cp_exorcist \n\t\t*set confessor cp_confessor \n\t\t*set healer cp_healer \n\t\t*set prophet cp_prophet \n\t\t*set zealot cp_zealot \n\t\t*set damage cp_damage\n\t\t*set wounds cp_wounds \n\t\t*set woundss cp_woundss \n\t\t*set shield cp_shield \n\t\t*set promise cp_promise \n\t\t*set vine cp_vine \n\t\t*set pup cp_pup \n\t\t*set fur cp_fur \n\t\t*set witch cp_witch \n\t\t*set sphere cp_sphere \n\t\t*set knowledge cp_knowledge \n\t\t*set shade cp_shade \n\t\t*set glow cp_glow \n\t\t*set xx cp_xx \n\t\t*set ex cp_ex \n\t\t*set clean cp_clean \n\t\t*set zombies cp_zombies\n\t\t*set slash cp_slash \n\t\t*set nail cp_nail \n\t\t*set feather cp_feather \n\t\t*set fel cp_fel \n\t\t*set transformation cp_transformation \n\n\t\t*set shield cp_shield\n\t\t*set promise cp_promise \n\t\t*set vine cp_vine \n\t\t*set pup cp_pup \n\t\t*set fur cp_fur \n\t\t*set witch cp_witch\n\t\t*set hand cp_hand \n\t\t*set mud cp_mud \n\t\t*set magic cp_magic \n\t\t*set block cp_block\n\t\t*set rabbit cp_rabbit\n\t\t*set angel cp_angel\n\t\t*set rainbow cp_rainbow \n\t\t*set mouse cp_mouse \n\t\t*set ox cp_ox \n\t\t*set hour cp_hour \n\t\t*set flowers cp_flowers \n\t\t*set water cp_water \n\t\t*set medallion cp_medallion \n\t\t*set anger cp_anger \n\t\t*set contact cp_contact \n\t\t*set prayer cp_prayer \n\t\t*set whiskers cp_whiskers \n\t\t*set icon cp_icon\n\n\t\t*set slave_boy false\n\t\t*set cp_slave_boy false\n\n\t\t*set frost_ally false\n\t\t*set cp_frost_ally false\n\n\t\t*set firedamage 0\n\t\t*set cp_firedamage 0\n\n\t\t*set frostdamage 0\n\t\t*set cp_frostdamage 0\n\n\t\t*set touch false\n\t\t*set cp_touch false\n\n\t\t*set kalium false\n\t\t*set cp_kalium false\n\n\t\t*set bat false\n\t\t*set cp_bat false\n\n\t\t*set locket false\n\t\t*set cp_locket false\n\n\t\t*set tick false\n\t\t*set cp_tick false\n\n\t\t*set lust 0\n\t\t*set cp_lust 0\n\n\t\t*set sloth 0\n\t\t*set cp_sloth 0\n\n\t\t*set wrath 0\n\t\t*set cp_wrath 0\n\n\t\t*set rune false\n\t\t*set cp_rune false\n\n\t\t*set fear false\n\t\t*set cp_fear false\n\n\t\t*set truth false\n\t\t*set cp_truth false\n\n\t\t*set hunt false\n\t\t*set cp_hunt false\n\n\t\t*set rosary false\n\t\t*set cp_rosary false\n\n\t\t*set holy_collar false\n\t\t*set cp_holy_collar false\n\n\t\t*set library false\n\t\t*set cp_library false\n\n\t\t*set sword false\n\t\t*set cp_sword false\n\n\t\t*set control_evil false\n\t\t*set cp_control_evil false\n\n\t\t*set angel_control false\n\t\t*set cp_angel_control false\n\n\t\t*set friend false\n\t\t*set cp_friend false\n\n\t\t*set foe false\n\t\t*set cp_foe false\n\n\t\t*set dark_healing false\n\t\t*set cp_dark_healing false\n\n\t\t*set trophy false\n\t\t*set cp_trophy false\n\n\t\t*set slave false\n\t\t*set cp_slave false\n\n\t\t*set weapon false\n\t\t*set cp_weapon false\n\n\t\t*set dark_confessions false\n\t\t*set cp_dark_confessions false\n\n\t\t*set palace true\n\t\t*set cp_palace true\n\n\t\t*set random_books 0\n\t\t*set cp_random_books 0\n\n\t\t*set read_books 0\n\t\t*set cp_read_books 0\n\n\t\t*set dieroll258 0\n\n\t\t*set dieroll260 0\n\n\t\t*set keeper false\n\t\t*set cp_keeper false\n\n\t\t*set devil false\n\t\t*set cp_devil false\n\n\t\t*set ghost_freedom false\n\t\t*set cp_ghost_freedom false\n\n\t\t*set dead_boy false\n\t\t*set cp_dead_boy false\n\n\t\t*set free_boy false\n\t\t*set cp_free_boy false\n\n\t\t*set slave_boy false\n\t\t*set cp_slave_boy false\n\t\n\t\t*set attack true\n\t\t*set cp_attack true\n\n\t\t*set tick false\n\t\t*set cp_tick false\n\n\t\t*set angeltwo false\n\t\t*set cp_angeltwo false\n\n\t\t*set dead_angel false\n\t\t*set cp_dead_angel false\n\n\t\t*if (checkpoint=0)\n\t\t\tSorry, you haven't reached a checkpoint yet\n\t\t\t*page_break Restart\n\t\t\t*restart\n\n\t\t*elseif (checkpoint=1)\n\t\t\t*goto_scene pre_mine\n\t\t\n\t\t*elseif (checkpoint=2)\n\t\t\t*goto_scene mine\n\t\t\n\t\t*elseif (checkpoint=3)\n\t\t\t*goto_scene demonologist\n\n\t\t*else\n\t\t\t*goto_scene frost\n\t\t\n", "demonologist": "*page_break\nYou feel quite burdened, so you try to draw attention to the outside world and to forget your worries. It is one of your favorite exercises when you were a novice. There is no use for a servant of the Light, if it fails to illuminate the depths of their soul, said Father Joseph, your mentor at the time.\n\nYou force myself to enjoy the fresh air mixed with a bit of lilac and cherry flavours (even though it only reminds you of the sweet smell of Sister ${ulmia}), and the song of the nightingales and swallows (her laugh sounds even more melodical). You sigh, trying to fight the tears that fill your eyes. You'll find that demon essence, you try to calm yourself.\nYou start for the infirmary, as you do every morning. You greet the few villagers who you meet on the road and stroke the huge black wolf of Edric the butcher.\n\nThe infirmary is a little shabby building. A year ago, the mayor asked you if you needed a bigger building but you refused. Thanks the Light, it is rare for more than five beds to be used at the same time.\n\nAt the beginning of your stay in the village you were the only one in charge of the infirmary, but you managed to convince the local bishop that you might need some help. Three months ago, a novice was entrusted to you. Brother Florence is young and dedicated to the cause. He treats you with due respect and is attentive to the needs of patients.\n\n\"Bright Day, Florence\" you walk through the open door.\n\n\"May it be bright till the end, Father!\" He tries to smile, but then looks down.\n\n\"What happened\" you ask.\n\n\"We have a patient with multiple complains.\"\n\nYou go to the room nearby and find Miller Babel lying helplessly on a bed. When he sees you he gazes at you and says\n\n\"Father ...I don't feel\"\n\nMiller chokes, and for half a minute he fails to bring his breathing back to normal. During this time you look at his hands. They appear to be covered with bright red bleeding blisters.\n\n\"He says there are problems with his heart - pain and rapid heartbeat,\" Florence almost shouts in your ear.\n\nYou scratch your beard.\n\n\"Where is Kalea?\" you ask Florence.\n\n\"I sent one of the boys to get her, but she is gone. She left a note and the kid brought it to me. It said that she would be gone for a day or two.\"\n\nSplendid! Now you have to do without the herbalist.\n\nYou've never seen a case like this, with so many symptoms that may be somehow related to each other. You can pray for knowledge, relying on the Light to show you what herbs to use (if you are a healer, you already have that knowledge). Or, you could also say the prayer of healing diseases, however, it is far more complex and taxing in terms of favour than the one dealing with wounds.\n*choice\n\t*selectable_if (healer) #Use your knowledge of herbs\n\t\tYou really need to concentrate on one symptom at a time, for combination of the drugs needed to heal his illnesses can be dangerous and can actually deteriorate his condition.\n\t\t*goto tonetwo\n\t#Pray for knowledge \n\t\t*goto toneone\n\n\t#Pray for healing\n\t\t*goto tonethree\n\n\t#Administer herbs\n\t\t*goto tonetwo \n\n*label toneone\n*set favour -1\nFavour decreased by 1.\n*line_break\nThe information obtained from the Light leaves you glad for reaching for it. You really need to concentrate on one symptom at a time, for combination of the drugs needed to heal his illnesses can be dangerous and can actually deteriorate his condition.\n*goto tonetwo\n\n*label tonetwo\n\"Actually, we will be able to handle ourselves, Won't we, Brother\"\n\nFlorence's eyes express doubt, but he nods in agreement.\n\n\"We have three symptoms and three drugs. Cough - a decoction of Grannies salvation. Sore rash - Cream of pine bark. Palpitations - lavandorov dust. We can combine them.\"\n\"I've never seen those combined before,\" Florence murmurs.\n\n\"Ok, we can then start with the heart problem as it could be the most serious,\" you say.\n\"As you say, Brother ${name}.\"\n\nYou feel a sudden urge to get out of the infirmary. What directions would you give Florence before you go\n*choice\n\t#Treat all symptoms\n\t\t*set mouse false\n\t\t*goto tonefour\n\n\t#Treat only heart pains\n\t\t*goto tonefour\n\n*label tonethree\n*set hand true\n*set favour -2\nFavour decreased by 2.\n*line_break\nThe novice looks wide-eyed while you place your hands on his the temples of the miller in order to better streamline the power of the Light. Then you pray. A strong light wave erupts from your hands and flows into the patient. He groans, but then his breathing calms down. Most of his rash disappears.\n\n\"Can I go now\" Babel asks with gratitude and sparkle in the eyes.\n\n\"No way!\" You shake your head. \"You'll stay here at least until next morning. Brother Florence will take care of you.\"\n\nThe novice tries to hide his disappointment as you leave the infirmary.\n*goto tonefour\n\n*label tonefour\nOutside the day looks wonderful, so serene that you might as well forget your worries for a brief moment. Where would you like to go\n*choice\n\t#Visit the pub\n\t\t*goto tonefive\n\n\t#Walk around the village \n\t\t*goto tonesix\n\n*label tonefive\nThe inn is warm and filled with the aroma of aged wines. You don't find the latter unpleasant, but you are rather indifferent because you don't drink any high spirit beverages.\n\n\"Father, as usual, right\" asks the bartender.\n\nYou nod and reach out to take the cup with mint syrup and honey propolis. The liquid fills you with energy.\n\n\"One more, please!\" you order.\n\nYou look around. Only two of the tables are occupied. On the table in the corner, a big man from the village explains emotionally\n\n\"He shouldn't have done this to Kalea and Henrik ...\"\n\nAs he realizes you are looking in his direction, he suddenly stops talking and sips his beer.\nThe second is near the door - a man you don't know dressed in dusty clothes.\n\nYou can join the table in the corner, hoping to find out more about Kalea. In this case, you should be ready to cast a prayer of confessions to make the man speak on . You can also chat with the stranger or just finish you drink and leave, returning to the infirmary or walking around the village.\n*choice\n\t#Join the table in the corner\n\t\t*goto tonesev\n\n\t#Join the stranger\n\t\t*goto toneeit\n\n\t#Go back to the infirmary\n\t\t*goto tonenine\n\n\t#Go out for a walk\n\t\t*goto tonesix\n\n*label tonesix\nThe walk is very pleasant until the moment you are almost crushed by a militia man riding a big black horse. In clouds of dust, the watchman saw finally manages to take control of the strong animal and get off of his back. With timid steps, you approach them.\n\n\"Father, I'm sorry, I hope I didn't scare you,\" He wrinkles his brow.\n\n\"It's ok,\" you look at the horse, in whose eyes are are still shadows of anxiety. \"What frightened him\"\n\n\"I have no idea. I was patrolling near the ancient fortress. I thought I saw the shadow ...of a predator. The horse whinnied and raced towards the village.\"\n\nI stroked the soft horse muzzle.\n\nWhere would you like to go now\n*choice\n\t#At the pub\n\t\t*goto tonefive\n\n\t#At the infirmary\n\t\t*goto tonenine\n\n*label tonesev\n*set favour -1\n*set mud true\nFavour decreased by 1. Codeword Mud gained.\n*line_break\nAs you approach the table, the man looks at you suspiciously. In your mind, you say the prayer and observe its instant effect. He smiles at you and moves the chair next to him so that you can sit.\n\n\"How's it going, Father\" he asks.\n\n\"I overheard you talking about my assistant at the infirmary.\"\n\n\"Oh, yes, Kalea's father is the mayor of Vranovo. Strong love burned between her and a guy named Henrik. The mayor did not like Henrik because he was from a very poor family. The young man knew it, but had the courage to ask him for the hand of Kalea. Her father was furious. Henrik took a beating from him and was forbidden to approach his beloved daughter. Evil tongues say that the young man swore in the Darkness that he'd prove his might to all and cause a sea of death in Vranovo. After the incident, Callia moved to our village and became assistant to the old herbalist, who soon died and left the house in her possession\".\n\nApparently this story happened whileyou were still a novice. Interesting. You drink the second glass of mint and leave the inn.\n\nWhere do you want to go?\n*choice\n\t#Take a walk around the village\n\t\t*goto tonesix\n\n\t#Return to the infirmary\n\t\t*goto tonenine\n\n*label toneeit\n\"May the Light bless you!\" you greet the stranger.\n\n\"It's an honor to meet you, Father!\" He takes his hat off and asks you to sit down.\nHe proves to be a pleasant companion. He tells you of distant lands he visited and the exotic animals that he saw. After a while you realize that a long time has passed. You say farewell to the man and leave the pub.\n\nWhere do you want to go?\n*choice\n\t#Take a walk around the village\n\t\t*goto tonesix\n\n\t#Return to the infirmary\n\t\t*goto tonenine\n\n*label tonenine\nYour hand is on the door handle of the infirmary when the thought of the visitor who came this morning comes to your mind. \n*choice\n\t*selectable_if (promise) #You made a promise\n\t\t*goto ttwozero\n\n\t#But, you decide to concentrate on the patient\n\t\t*goto ttwoone \n\n*label ttwozero\nPromises made by priests of Light are quite strong. You really should do your best to find the son of the judge and talk to him. Drayl told you where you could probably find him.\n\nYou really don't want to 'forget' about the promise as you fear it would be a major offence towards the Light.\n\nWhere would you go?\n*choice\n\t#Near the old fort\n\t\t*goto ttwotwo\n\n\t#The new forest\n\t\t*goto ttwothree\n\n\t#The judge's home\n\t\t*goto ttwofour\n\n*label ttwoone\nYou have a bad feeling about the state of Babel.\n*if hand\n\t*goto tthreeone\n\n*else\n\t*goto ttwofive \n\n\n*label ttwotwo\nThe old fort is located near the village. There's not much left from the massive building. Hundreds of years years ago there must have lived a feudal lord, but it's no longer the case, and the multitude of carved stones were used for the construction of public buildings in the surrounding villages.\n\nYou cautiously enter the fortress, being careful not to step on any of the big snakes that like to bask at the sunshine during this time of day.\n\nSuddenly, a black silhouette appears from the ruins. It looks like a huge cat, but there are at least three spiked tails finishing its feral body. The thing runs towards you. It takes you a while to realize that this is a demon. You know a prayer that would surround you with a circle of holy Light that would deal damage to the creature of the Darkness and it is perfect if you expect immediate attack. The regular version of the prayer is relatively long but will cost you only a point of favour. There's a shorter version which would do the same, but would cost 2 points of favour. Of course, in an instant, you could summon Clarissa.\n\nWhat do you do?\n*choice\n\t#Cast a prayer\n\t\t*goto ttwosev\n\n\t#Cast an instant prayer\n\t\t*goto ttwosix\n\n\t#Summon Clarissa\n\t\t*goto roneeit \n\n*label ttwothree\nThe distance to the new forest is not very small, but the trail goes through the whole forest area, so it is pleasantly cool and it allowed me to walk faster. A few years ago there was a fire. The mayor decided to deliver exotic trees with which to replace the burnt ones.\n\nThere were rumors that the new trees (very high, with large leaves) come from distant magical lands and therefore are valuable for witches.\n\nThere, on the border between the old and new wood, you see Cain, carefully observing the fallen branches. You sense his strong aura extending in a radius of ten meters. There is some power lingering in him that you fail to understand.\n\n\"Brother ${name} ...what are you doing here?\" he asks sharply.\n\nWhat would you reply?\n*choice\n\t#\"I've just come to talk to you ...\"\n\t\t*goto ttwoeit\n\t\n\t#\"I've come with a request from your father.\" \n\t\t*goto ttwonine\n\n\t#\"I've come to get you back on the path of Light.\" \n\t\t*goto tthreezero\n\n*label ttwofour\nDrayl welcomes you with a big smile and invites you to enter. It turns out that Cain is not home, so you have to wait. His wife serves you homemade cookies and apple juice.\nWhen Cain cames home and finds out that you're in the house, he runs to his room and refuses to get out before you get out. Drayl tries to dissuade him, but without much of a success.\n\nYou have no other choice but take another cookie and go back to the infirmary.\n*goto ttwoone\n\n*label ttwofive\nThe state of Babel is poor. His voice is nearly gone, his hands tremble, and the blisters have become larger and bleed profusely, forming clots on his clothes. You are afraid that the situation with his health is slowly but surely getting out of control.\n*if healer\n\tThe prayer of healing diseases is more difficult and usually costs two points of favour, however, because of your training, it costs a single point\n\tWould you do so?\n\t*choice\n\t\t#Yes \n\t\t\t*set favour -1\n\t\t\t*set magic true\n\t\t\tFavour decreased by 1\n\t\t\t*line_break\n\t\t\tYou place your hands on his the temples of the miller in order to better streamline the power of the Light. Then you pray.A strong light wave erupts from your hands and flows into the patient. He groans, but then his breathing calms down. You expected to see a perfectly healthy man, but are left disappointed.\n\t\t\t*goto tthreeeit\t\t\n\t\t\t\n\n\t\t#No\n\t\t\t*goto tthreeeit\n*else\n\tIf you want and have a couple of favour points, you can use your prayer of heal disease. \n\n\tWould you do so?\n\t*choice\n\t\t#Yes \n\t\t\t*goto tthreetwo\n\n\t\t#No\n\t\t\t*goto tthreeeit\n\n*label ttwosix\n*set favour -2\nFavour decreased by 2.\n*line_break\nYou have experience in battles against creatures of the night, so you act instinctively. Your whispered prayer is heeded, and a spherical light barrier is formed around you. The demon makes a huge jump at you, only to land in it, bursting into an explosion of Light and vanishing without a trace.\n\nAfter a short walk around the ruins, you conclude that Cain is not here.\n\nWhat do you do now?\n*choice\n\t#Look for him in the new forest\n\t\t*goto ttwothree\n\n\t#Visit his home\n\t\t*goto ttwofour\n\n\t#Go back to the infirmary\n\t\t*goto ttwoone\n\n*label ttwosev\n*set favour -1\n*set experience -3\nFavour decreased by 1. Experience decreased by 3.\n*line_break\nYou have experience in battles against creatures of the night, however, that prayer is much too slow. Your whispered prayer is heeded, and a spherical light barrier is formed around you. But the demon is already on you, its claws choking you. The barrier then engulfs it makes it burst into an explosion of light and vanish without a trace. You rub your throat. I did not have any permanent damage, but you feel as if the creature of Darkness touched your soul.\n\nAfter a short walk around the ruins, you conclude that Cain is not here.\n\nWhat do you do now?\n*choice\n\t#Look for him in the new forest\n\t\t*goto ttwothree\n\n\t#Visit his home\n\t\t*goto ttwofour\n\n\t#Go back to the infirmary\n\t\t*goto ttwoone\n\n*label ttwoeit\n*set experience +1\nExperience increased by 1.\n*line_break\n\"... and if my company is not welcome, just tell me and I will leave.\n\nYour humble answer obviously reduces the tension.\n\n\"The forest is not mine, Father, even if I don't want to talk to you, I have no right to require you to leave. In fact,\" the youth puts his hands on his temples and rubs them.\"Maybe I should talk to you, but ...I have doubts you can understand.\"\n\n\"Try it, son. I don't know if I could, but I will give the best of me.\"\n\nCain sits down and picks up a twig and starts playing with it.\n\n\"Father, have you ever wanted to achieve something really badly but did not know how?\"\nYou smile.\n\n\"I think the Light has given me almost everything I need so far.\n\n\"Almost?\" The young man looks at you questioningly.\n\n\"Well, let's not talk about me. I'm here to talk about what the Light can do for you.\"\n\n\"The Darkness also helps sometimes. About a month ago, I found a spell book over there,\" Cain points at a bush.\n\nYou feel a strong suspicion that Cain found the book, but you decide not to bring it up.\n\n\"For some time, I've been testing them,\" continues the boy. \"One day I may become a great warlock and I have everything I need.\"\n\nYou feel the blood going to your head.\n\n\"Do you know how many people have lost everything, including their souls on the path that you took?\"\n\nThe boy looks at you scared.\n*choice\n\t*selectable_if (witch) #Mention Kalea\n\t\t*goto ronesev\n\n\t*selectable_if (vine) #Talk about Magdalena\n\t\t*goto tthreefour\n\n\t#Say no more\n\t\t*goto tthreefive\n\n*label ttwonine\nEven as you speak the words you realize you are walking on thin ice.\n\n\"Do you?\" Cain ironically raises his eyebrows. \"And when, in addition to the Light, you obey the will of my father. If he wants to talk to me, why doesn't he do it himself, rather than making you burry your nose in other people's affairs?\"\n\nYou realize the conversation is not taking the right turn. Would you like to say a prayer of confessions?\n*choice\n\t#Yes \n\t\t*goto tthreesix\n\n\t#Otherwise\n\t\t*goto tthreesev\n\n*label tthreezero\nThe young man just laughs at your words, takes a few twigs from the ground and leaves the place. Despite your attempts to cajole him to listen to you.\n\nYou have no choice but to go back to the infirmary.\n*goto ttwoone\n\n*label tthreeone\n*set magic true\nYou are absolutely shocked when you realize that Babel's health has deteriorated. All his symptoms had appeared again and he is worse than he was in morning. But that is not all ...\n*goto tthreeeit\n\n*label tthreetwo\n*set favour -2\n*set magic true\nFavour decreased by 2\n*line_break\nYou place your hands on his the temples of the miller in order to better streamline the power of the Light. Then you pray.A strong light wave erupts from your hands and flows into the patient. He groans, but then his breathing calms down. You expected to see a perfectly healthy man, but are left disappointed.\n*goto tthreeeit\n\n*label tthreethree\n*set block true\nCain nods.\n\n\"Can you help me to win her heart, Father?\"\n\nYou sigh. It is the strangest thing anyone requested from you.\n*choice\n\t#Agree \n\t\t*goto tfourzero\n\n\t#Disagree\n\t\t*goto tfourone\n\n*label tthreefour\n\"I know how you feel about Magdalene. And you're ready to face all challenges to get to her.\"\n\nThe boy looks at you with wide eyes in which you could read, \"how do you know\", but apparently another matter interests him more.\n\"Is the Light going to get me closer to her?\" he asks in a trembling voice.\n\n\"I don't know, Cain. But I know that the path of Light is created to bring joy. The path of Darkness  - distress and pain. When you think about her, what do you feel?\"\nCain smiles.\n\"What does it mean to walk the path of Light, Father?\"\n\n*choice\n\t#Not to cast any more spells\n\t\t*goto tthreethree\n\n\t#Not to cause harm to anyone\n\t\t*goto tthreenine\n\t\n\n*label tthreefive\nYou feel that the conversation is coming to a stalemate and you may need to say the prayer of confessions in order to break the ice between you and the young man.\n\nWould you do so?\n*choice\n\t#Yes\n\t\t*goto ronethree\n\n\t#No\n\t\t*goto ronesix\n\n*label tthreesix\n*set favour-1\nFavour decreased by 1.\n*line_break\n\"Cain, I'm here to try to help you. I can not always find the right words but that should not distract you. Would you give me a chance?\n*goto ttwoeit\n\n*label tthreesev\n\"Your father is a good man, you should not talk that way about him. He loves you,\" this is what comes to your mind.\n*goto tthreezero\n\n*label tthreeeit\nFlorence rushes breathlessly into the room.\n\n\"Father, we have three patients with such complaints.\"\n\nNow the words of the little angel begin to make sense.\n\n\"Brother, I believe you can handle it perfectly,\" you say and with a quick step you  head for the exit.\n\n\"But ...Father, I don't know what to do!\"\n\n\"Follow your heart, Brother. Read the first 10 prayers from the Book.\"\n\n\"Where are you going? And when in the name of the Light will you be back?\" The Novice is on the verge of a nervous breakdown.\n\n\"To find a cure. Immediately thereafter. And don't forget, my Brother, the Light is with you, even when it seems that you're in the Abyss,\" You slam the door.\n*goto tfourtwo\n\n*label tthreenine\n*set rabbit true\nCain nods.\n\n\"Can you help me win her heart, Father?\"\n\nYou sigh. It is the strangest thing anyone requested from you.\n*choice\n\t#Agree \n\t\t*goto tfourzero\n\n\t#Disagree\n\t\t*goto tfourone\n\n*label tfourzero\nYou ask Cain to find Magdalena and to bring her to the Temple of Light. You have doubts that she would come, but they turn out to be unfounded.\n\nCain stops at the altar, and you go inside the chamber of confessions with the girl.\n\n\"Father, have I sinned?\" she asks with a guilty note in her voice.\n\n\"No, my daughter, I'm just trying to resolve a conflict before it gets serious. You know Cain and Aiken like you a lot.\"\n\n\"Yes, Father. I receive so much affection from their sides and that makes me happy.\"\n\n\"Magdalena, you're a big girl. Also, they are almost men. It might be a good idea to choose one of them for your mate just as the Light advises.\"\n\nThe girl sighes.\n\n\"I don't know Father. I have spent more than a few sleepless nights thinking about it. My heart screams the name of Cain. But lately, something's happening to him. He's not the same radiant boy I knew. And Aiken, he is so kind and dedicated. He could probably make any girl happy. What would you say, Father?\" she asks expectantly.\n\nIt's like asking someone who does not eat meat, whether it's better to eat beef or mutton for lunch, you think to yourself.\n\nHowever, you have to recommend either, otherwise the problem would remain unresolved.\n\nWho would that be?\n*choice\n\t#Cain\n\t\t*goto ronefour\n\n\t#Aiken\n\t\t*goto ronefive\n\n*label tfourone\n\"Only the Light has the right to rule over people's feelings,\" you share a piece of wisdom with him. However, that statement just plagues his hopes, making him put an end to your conversation.You have nothing else to do but head back for the infirmary.\n*goto ttwoone\n\n*label tfourtwo\n\nYou go back to the Temple of Light. You believe that here, under the glass dome you can collect your thoughts and find a solution to the horror that is taking shape in the infirmary.\nYou...\n*choice\n\t*selectable_if (magic) #did your best to heal Babel\n\t\t*goto tfivesix\n\n\t*selectable_if (block or rabbit) #befriended a witcher\n\t\t*goto tfourfour\n\t\n\t*selectable_if (angel) #decide to summon Clarissa\n\t\t*goto tfourthree\n\n\t#are hopeless\n\t\t*goto tfoursix\n\n*label tfourthree\n*set angel false\nYou ask the Light to allow you again to see the little angel. When completed the last words you heard her voice behind you:\n\"Father, what can I do to help?\"\n\nShe is so tiny. Half of your height, but her radiance and is so ...majestic.\n\n\"There's a new disease spreading in the village. All my attempts to deal it were unsuccessful. I don't know whether to try a new prayers or drugs ...\"\n\n\"There is no point, Father. The disease is of a magical origin. It is protected from the effects of Light, just as the Light field protects exorcists by demons.\"\n\n\"How to deal with the disease, then?\" you ask.\n\nYou are alone again.\n*goto tfivesix\n\n*label tfourfour\nFinding Cain is a difficult task, filled with boring details, including his actual extraction from the company of Magdalene. But, it is really important for you to know what this witcher can tell you about the infection.\n\n\"Father, don't waste your time with medicines and prayers. Apparently, the disease is beyond their capabilities.\"\n\n\"Can you help me cope with the disease?\" you ask.\n\nThe boy looks at you with a serious expression on his face.\nYou...\n*choice\n\t*selectable_if (block) #asked him not to cast spells\n\t\t*goto tfoursev\n\n\t*selectable_if (rabbit) #asked him not to do harm\n\t\t*goto tfoureit\n\n*label tfourfive\n*set angel false\nYou ask the Light to allow you again to see the little angel. When completed the last words you heard her voice behind you:\n\n\"Father, what can I do to help?\"\n\nShe is so tiny. Half of your height, but her radiance and is so ...majestic.\n\n\"There's a new disease spreading in the village. All my attempts to deal it were unsuccessful. I do not know how to handle it.\"\n\n\"Don't lose hope, Father. Take me to the infirmary and leave me alone with the sick. I'll make them feel better.\"\n*goto tfivefive\n\n*label tfoursix\nThe next days feel like Inferno on earth. The sick are increasing in number. And they all die, one by one, including you...\n*goto_scene death\n\n*label tfoursev\n\"Father, I promised you I'd never use my witcher skills again. A promise made by a spellcaster is something one can't cross. Now, please excuse me, I need to discuss something with my girlfriend.\"\n\nYou have no other choice but to return to the temple.\n*goto tfivesix\n\n*label tfoureit\n\"I do not know, Father. I'm new to this stuff ...\"\n*if rainbow\n\t*goto tfiveone\n\n*else\n\t*goto tfivetwo\n\n*label tfiveone\n\"...But I'm going to try. I will never forget what you did for me, Father. Just let me go to the infirmary and put an end to your problem. Then, even the prayer of a sinner like me will be able to cure them.\"\n\nHe is cocky. Within an hour you realized that there is a reason to be.\n*goto tfivefive\n\n*label tfivetwo\n\"...And I think I can not handle it. Sorry, Father. Now, please excuse me, I need to discuss something with my girlfriend.\"\n\nYou have no choice but to return to the temple.\n*goto tfivesix\n\n*label tfivethree\nFinding Cain is a difficult task, filled with boring details, including his actual extraction from the company of Magda. But, it is really important for you to know what this witcher can tell you about the infection.\n\n\"Father, don't waste your time with medicines and prayers. Apparently, the disease is beyond their capabilities.\"\n\n\"Can you help me cope with the disease?\" you ask.\n\nThe boy looks at you with a serious expression on his face.\n\n\"I do not know, Father. I'm new to this stuff ...but I'm going to try. I will never forget what you did for me, Father. Just let me go to the infirmary and put an end to your problem. Then, even the prayer of a sinner like me will be able to cure them.\"\n\nHe is cocky. Within an hour you realized that there is a reason to be.\n*goto tfivefive\n\n*label tfivefour\n*page_break\nIt's late. You ask brother Florence to make a decoction for general strengthening, which you're not sure would work. You choose a few prayers and ask him to read them. It turned out that the novice is quite tired. Twice he gets keywords wrong. And, he  spills the potion.\n\"Brother, I think you'd rather to go to bed,\" you say with a soft tone.\n\n\"But I ...I can handle it. I just have to be more careful.\" He yawns.\n\nYou pat him on the shoulder:\n\n\"You're doing great. It is just that yesterday I left you all day alone with Babel and now you are too tired.\"\n\nFlorence tries to look at you with a concentrated look, but fails.\n\n\"Come on, go to sleep, I'll take care of the sick,\" you order him.\n\n\"It would not be fair. You were outside the infirmary, but you were searching for the cure. And, probably, you are no less tired than me.\"\n\n\"Go rest!\" you repeat. \"I can wake you up at any time I feel I need to sleep as well.\"\n\nYou opened the book of the Light and look for another suitable prayer. Before you can do so, you hear the snores of the novice.\n*goto tfivesev\n\n*label tfivefive\n*page_break\nWith excitement, you watch as the thin figure enters the infirmary. Brother Florence and you stand a respectful distance from the infirmary and stare at the stars. Time passes slowly. You are tired, so the minutes to seem like hours to you. It is like a dream. Some of your memories are lost. The only thing you know that when the door of the infirmary opens and the novice and you get inside, the sinister disease is no more dangerous than the common cold.\n*goto tfivefour\n\n*label tfivesix\n*page_break\nNow at least you knew what you are facing. But this doesn't not help you very much because you still don't know how to deal with the disease. Time flows inexorably. It occurred to you that you could send a letter to the Palace of Light, asking them to send you a paladin to remove the protection from the Light. But it would take days, if not weeks.\n*choice\n\t*selectable_if (angel) #Summon Clarissa\n\t\t*goto tfourfive\n\n\t*selectable_if (rainbow) #Meet Cain\n\t\t*goto tfivethree\n\n\t#go back to the infirmary\n\t\t*goto tfoursix\n\n*label tfivesev\nYou wake up on the hard wooden chair, distorted in crazy pose. Apparently, you were really tired to fall asleep like that. You look at the ward. The sick are still asleep. It turns out that the symptoms of the newcomers faded out, so you give them a blessing after waking them up and send them home.\n\nBabel is asleep. He's not fully healed. Some of his blisters closed, leaving ugly scars, but others are still bleeding.\n*if (mouse)\n\t*goto ronetwo\n\n*else\n\t*goto roneone\n\n*label tfiveeit\n*set ox true\nThe old man smiles. Half of his teeth are missing, but his face is radiant.\n\n\"Thank you, Father.\"\n\nProbably, he wants to say something else, but the cough would not let him. You hand him a cup of broth. The very first sip calms his breathing.\n \nBefore you leave the infirmary, you hear the snoring of Florence again. You wonder if you should wake him up, but then decide against it. For now, everything seems under control.\n*goto tsixone\n\n*label tfivenine\nThe old man looks at you questioningly. Probably, he wants to say something, but the cough would not let him. You hand him a cup of broth. The very first sip calms his breathing.\n\nBefore you leave the infirmary, you hear the snoring of Florence. You wonder if you should wake him up, but then decide against it. For now, everything seems to be under control.\n*goto tsixone\n\n*label tsixzero\nThe old man just looks at you. His eyes are full of tears.\n\nHe starts to say something, but the cough would not let him. You hand him a cup of broth. The very first sip calms his breathing.\nBefore you leave the infirmary, you hear the snoring of Florence. You  wondered if you should wake him up, but then decide against it. For now everything seems under control.\n*goto tsixone\n\n*label tsixone\n*page_break\nYou go to the temple and allow the morning light to spill down your face. You want it to reach into the depths of your soul and give you insight as to what to do. The disease is apparently under control. Your gut feeling is that even Babel would be healed. Yet, you don't know what caused the infection. And what about ${ulmia}? The images of her make you feel warmer. Lost in thought, you fell asleep again the hard wooden bench. Apparently, you slept a few hours, because when you wake up the sun is shining relentlessly through the roof.\n\nYou lay your hands on the altar and pray.\n\n\"Father, why don't I hear you mention my name when you talk to the Light?\"\n\nYou smile. The voice reminds you of the song of a spring stream gushed after a severe winter. The sight of the radiant sullen girl makes you smile even wider.\n\n\"Because you're too small,\" you joke.\n\n\"Father, don't underestimate the power of an angel. Even if she is three years old,\" She shows the corresponding number of fingers.\n\"Excuse me, Clarissa, I hope I haven't offended you,\" you tried to hold back laughter.\n\n\"I believe you, Father.\"\n\n\"I miss ${ulmia},\" you admit. \"The whole world seems so empty without her.\"\n\n\"Worry not, Brother. I'll find a way to pull her out of the abyss. I have the feeling I'll be able to do so very soon. My advice would be to continue servicing the town until the time comes,\" she says. \n\n\"Do you know who's behind it?\" you enquire.\n\n\"I do not know. But I know that you know. Right?\"\n\n\"Not at all,\" You shrug.\n\nShe squints her eyes.\n\n\"Listen to your inner voice, Father! Very often  it is like a mirror, reflecting the rays of the Light.\"\n\nYou close your eyes.\n\n\"Kalea? How strange she is out of town. Just at the right time. I wouldn't be surprised if she returns today.\"\n\n\"${name} ...I have a bad feeling. I think you get caught up in something that is too complicated ...\"\n\n\"Too complicated for me?\" You raise your eyebrows\n\n\"Perhaps the verge of your abilities. Promise me you'd take care of yourself.\"\n\n\"Yes, my daughter, I promise.\"\n*if angel\n\t*goto tsixtwo\n\n*else\n\t*goto tsixthree\n\n*label tsixtwo\n\"${name}, you managed to deal with the infection without my help. So, you saved me a lot of energy. I put part of it in this,\" Clarissa says.\nClarissa hands you a little rag doll. It seems it appeared out of thin air.\n\n\"I believe it will help you,\" she states.\n\nThen, she is gone.\n*goto tsixfour\n\n*label tsixthree\n\"${name}, unfortunately I can not help you much .... Beware.\"\n\nShe disappears.\n*goto tsixfour\n\n*label tsixfour\n*page_break\n*if ox\n\t*goto tsixfive\n\n*else\n\t*goto tsixsix\n\n*label tsixfive\n*set icon true\nShortly after Clarissa leaves, the doors open againand in comes a tall woman in a long cloak and scarf, which almost hides her leather bag. Her face seems very familiar, although you have no recollection of meeting her.\n\n\"Father ${name}?\" she enquires.\n\nYou nod and invited her to sit on the bench.\n\n\"My name is Nydia and I am the daughter of Babel. I no longer live in the village,\" she removes her scarf. \"I was told that my father was ill. I even expected the worst. But, I understood, Father, that you were able to find a way to cure the disease.\"\n\nYou blush. It is a little hard to be think of yourself as a hero.\n\n\"The credit is not mine. And your father is not healthy yet.\"\n\nShe smiles.\n\n\"Just a moment ago I was with him. He told me how you encouraged him not to give up ...Thank you Father. There's something I want to give you,\" she says, and hands you a small drawing.\n\nYou've never seen such an artifact. An image of a very thin man is painted on a piece of wood. There is something round and light around his head. Intuition tells you that is an object related to the Light but not the Light in the form in which you know it.\n\n\"It is a relic that passed from generations. It is believed to protect against evil. Take it as a sign of gratitude for what you did for my father.\"\n\nYou feel uncomfortable. You rarely receive gifts, and this one is obviously special.\n\n\"Thank you, Sister.\"\n\nThe woman nods. Then, she stands up, wishes you a bright day and leaves the temple.\n*goto tsixsix\n\n*label tsixsix\n*page_break\nYou decide to visit Kalea. Probably, she has something to tell you about the disease. You scratch your beard. Sometimes, it is not easy to talk to her, maybe it would be a good idea to bring her a gift to make her at ease. You think about the ritual of presenting cut flowers. You could also give her a bottle of holy water - you know it is an ingredient used for some of the herbal potions she prepares.\n\nWhat would you choose?\n*choice\n\t#Flowers\n\t\t*set flowers true\n\t\t*goto tsixsev\n\n\t#Holy water\n\t\t*set water true\n\t\t*goto tsixsev\n\n\t#Nothing\n\t\t*goto tsixsev\n\n*label tsixsev\n*page_break\nKalea's house is quite distant from the village. Several times, you regret not asking to borrow a horse. You don't like to ride, but in places the terrain is very rocky and sharp rocks keeping jabbing your feet. Your leather sandals are relatively well preserved, but they feel as if you're barefoot.\n\nYou knocked on the door of the shabby cottage.The door opens.\n\n\"Father ${name}?\" The swarthy woman seems surprised.\n\n\"May the Light preserve your soul, sister,\" you greet her.\n\nShe steps back and invites you to enter.\n\n\"Make yourself comfortable, Father.\"\nYou decide to... \n*choice\n\t*selectable_if (flowers) #give her the flowers\n\t\t*goto tsixeit\n\n\t*selectable_if (water) #give her the holy water\n\t\t*goto tsixnine\n\n\t#do none of the above\n\t\t*goto tsevzero\n\n*label tsixeit\n*set experience +2\nExperience increased by 2.\n*line_break\nYou hand her the flowers, you kept hiden behind your back until now.\n\n\"${name}, what's that supposed to mean!?\" she says while looking at the blue and orange begonias.\n\nYou answer nothing. Mainly because you don't know what to say.\n\n\"They are so nice!\"\n*goto tsevzero\n\n*label tsixnine\n*set experience +1\nExperience increased by 1.\n*line_break\nYou hand her the bottle of holy water. She opens it and brings it to her nose.\n\n\"Excellent, ${name}, I just need to mix up some potion. Thank you very much!\"\n*goto tsevzero\n\n*label tsevzero\n*page_break\n\"What brings you here, Father? I doubt you walked all the way to here just because of boredom.\"\n\nYou scratch your chin.\n\nMeanwhile, you hear a quiet meow. A huge black cat comes out from the corner and approaches you with a raised tail. The decisive look in its eyes makes you think that it probably intends to brush its fur against your cassock. You are not convinced that you want the long hairs of the animal to stick to your cassock.\n\nWhat would you do?\n*choice\n\t#Gently kick the cat\n\t\t*goto rtwozero\n\t\n\t#Let it come to you\n\t\t*goto rtwoone\n\n\t#Take it into your arms\n\t\t*goto rtwotwo\n\n*label tsevone\n*set experience -1\nExperience decreased by 1.\n*line_break\n\"This start look like an interrogation,\" she snaps. \"I don't think I need to explain anything. I know it looks suspicious. But this has little to do with you!\"\n\nYou get goosebumps.\n\n\"Sister, I did not mean to make you angry. I just ....\"\n\nHow would you continue?\n\nOption A: Ask her if she had the opportunity to learn about the sinister disease that rampaged the village yesterday. \n\nOption B: Tell her you were worried about her.\n*choice\n\t#Option A\n\t\t*goto tsevtwo\n\t\n\t#Option B\n\t\t*goto teitsix\n\n*label tsevtwo\n\"No, as I wrote the note, I was away.\n\nYou frown.\n\n\"Was the situation that serious?\" she asks.\n*choice\n\t#\"No, everything is under control now.\"\n\t\t*goto tsevthree\n\n\t#\"There were terrible bleeding ulcers, suffocating coughs and heart problems.\"\n\t\t*goto tsevfour\n\n\t#\"It was serious. The patients were in terrible condition. They needed help, but you were far away.\"\n\t\t*goto tsevfive\n\n*label tsevthree \n\n\"Then there's nothing to talk about,\" said Kalea. \"There was a problem and you handled it. Nice work, Father.\"\n\nThat were her last words on the subject. After several unsuccessful attempts to get more information from Kalea you give up and decide to leave.\n*goto tninetwo\n\n*label tsevfour\n*set experience +1\nExperience increased by 1.\n\nWhile you enumerate the symptoms, Kalea runs her trembling fingers through her hair a few times, and you could feel her anxiety is growing with every word.\n*goto tsevsix\n\n*label tsevfive\n*set experience +2\nExperience increased by 2.\n*line_break\nDuring the indictment, Kalea runs her trembling fingers through her hair a few times, and you could feel her anxiety is growing with every word.\n*goto tsevsix\n\n*label tsevsix\n*page_break\nThe first tears start flowing from her eyes and she tries to hide them by looking up, but soon this trick stops working. Did you overdo your statement?\n\nYou want to say something that to break the ominous silence.\n*choice\n\t*selectable_if (mud) #Tell her what you know about her story.\n\t\t*goto tsevsev\n\n\t#Confess her. \n\t\t*goto tsevnine\n\n\t#Leave her alone.\n\t\t*goto tseveit\n\n*label tsevsev\n*set experience +2\nExperience increased by 2. \n*line_break\n\"Why are you crying? Did my words upset you? Or is it something related to Henrik?\"\n\nKalea jumps hearing the name and takes a step back.\n\n\"What about him ...What do you know?\"\n\n\"Just the basics - you were in love, but things went wrong and you had to leave your home village. I heard someone tell that at the pub.\"\nHer eyes show no expression. It is hard to know if she heard you.\n\n\"Henrik is a monster. He's a mad demon that only causes pain. He created the plague and made me spread it.\"\n*goto tseveit\n\n*label tseveit\n\"Father, tell me, is it against the Light to do evil, if you have no choice?\" she ask, wetness in her eyes.\n\nHow would you answer?\n\nOption A: \"No. Sometimes when you walk along the path of Light, you falling in a tunnel and you can only go down.\" \n\nOption B: \"You always have a choice, sister. This is a blessing, but it can be a curse.\"\n\nOption C:\" It is up to the Light itself to determine what is right and wrong, I'm just its servant.\"\n*choice\n\t#Option A\n\t\t*goto rzeroeit\n\n\t#Option B\n\t\t*goto teitzero\n\n\t#Option C\n\t\t*goto teitone\n\n*label tsevnine\n*set favour -1\nFavour decreased by 1.\n*line_break\n\"Why are you crying? Did my words upset you? Or is it something else? You can share with me. I'm sure you'll feel better.\"\n\n\"My beloved,\" Kalea emphasizes the word, but you don't realize whether she does it with irony.\"Because of him I left my village and I lost everything I had then.\" The woman looks at you with blood-red eyes.\n\n\"Henrik is a monster. He's a mad demon that only causes pain. He created the plague and made me spread it.\n*goto tseveit\n\n*label teitzero\n*set experience +1\nExperience increased by 1.\n*line_break\n\"Even if someone enprisoned your dearest creature. And threatens that he will not let you see it if you do not obey him?\" her voice is lost in tears.\n\n\"Do you have a child?\" you wonder.\n\nKalea nods.\n\n\"Do you think he can hurt them.\"\n\nShe shakes her head.\n\n\"No, Henrik loves him. Father, in this case, it is a sin to do his bidding and spread infection?\"\n\nWhat would you answer?\n*choice\n\t#Yes\n\t\t*goto teittwo\n\n\t#No\n\t\t*goto teitthree\n\n*label teitone\nKalea says nothing. She purses her lips and begins wringing her hands.\n*goto teitfour\n\n*label teittwo\n*set experience +2\nExperience increased by 2.\n*line_break\n\"Kalea, you can not put personal happiness over the lives of so many people. I'll pray for the Light to forgive you.\"\n*goto teitfour\n\n*label teitfive\nKalea's knees buckle and she looks like she's about to fall down. You can help her stay on her feet. Or, you can decide not to intervene, even at the risk of her falling and getting hurt?\n*choice\n\t#Catch her\n\t\t*goto tninethree\n\n\t#Don't\n\t\t*goto tninefour\n\n*label teitfour\n*page_break\n*set medallion true\n*set anger true\n\"This son of a bitch is going to pay for everything he's done to me,\" she screams. \"I can take it no more.\"\n\nShe reaches into her decolettage and takes a fine medallion out and throws it. You instinctively catch it.\n*goto teitfive\n\n\n*label teitthree\n\"Sister, we all know that the motherly feeling is very strong. She-wolves are known to attack people who pass near their offspring...Whatever you did, I'm sure that the Light will forgive you.\"\n*goto tninezero\n\n*label teitsix\nExperience increased by 1.\n\n\"Why do you worry about me, Father? I know that you answer to all the people in your congregation ...but I did not expect to hear that from you anyway.\"\n\nHow would you answer?\n\nOption A:\"I know about your personal problems with Henrik.\"\n\nOption B:\"You're the best herbalist in the area. Without your help, treating patients would be very difficult.\" \n\nOption C: \"I was afraid that you may also be sick and in a place where there's nobody to help you.\"\n*choice\n\t*selectable_if (mud) #Option A\n\t\t*goto teitnine\n\n\t#Option B\n\t\t*goto teitsev\n\n\t#Option C\t\n\t\t*goto teiteit\n\n*label teitsev\nKalea nodds.\n\n\"I suppose I should be flattered by this response,\" she says ironically.\n*goto tnineone\n\n*label teiteit\nExperience increased by 1.\n\nKalea smiles.\n\n\"Father, I'm flattered by your words.\"\n*goto tninezero\n\n*label teitnine\n*set experience +2\nExperience increased by 2.\n*line_break\nKalea flinches at the mention of the name and takes a step back.\n\n\"What about him ...What do you know?\"\n\n\"Just the basics - you' were in love, but things went wrong and you had to leave your home village. I heard someone tell that at the pub.\"\n\nHer eyes show no expression. It is hard to tell if she heard you.\n\n\"Henrik is a very bad man. If I received at least half of the affection that I receive from your side, my life would have been much happier.\"\n*goto tninezero\n\n*label tninezero\n*page_break\n*set medallion true\nShe reaches into her decolettage and takes an exquisite pendant out.\n\n\"It is a gift from my Henrik, but I will not wear it anymore. I think it's best to take it,\" she says with a wry smile. \"Now, it might be best to go.\"\n\nConfused, you head for the door.\n*goto tninetwo\n\n*label tnineone\n\"Brother ${name}, I'm sorry. I'm tired and need to rest.\"\n\nYou fulfill her request and head for the door.\n*goto tninetwo\n\n*label tninetwo\n*page_break\nThe door openes with the familiar squeak. Then, you see him in his dark glory. He's very tall, with raven black hair. He wears a delicate red robe embroidered with shiny black runes. And, his eyes are completely black - sclera, iris and pupil.\n\n\"In the name of Light, what are you?\" you say, suddenly remembering stories about people who invite demons into their souls to take advantage of their power. You shiver.\n*if contact\n\t*goto tninefive\n\n*elseif flowers\n\t*goto tninesix\n\n*else\n\t*goto tnineeit\n\n*label tninethree\n*set contact true\nIt take you a couple of steps to reach her and grab her by the shoulders. You feel your cheeks get warm. It is so wrong to be so close to her, but you wouldn't let her fall on the ground.\n\nAt this point, ...\n*goto tninetwo\n\n*label tninefour\nKalea tries to remain on her feet, but fails and hits the floor.\n*goto tninetwo\n\n*label tninefive\nTwo jet black curved horns appear on his forehead with a splash of blood ...A thick cloud of gloom enveloped the upper half of his body. His voice echoed in every corner of the room.\n\n\"What is this, Father? Are hiding behind your white cassock to be with my Kalea? Even the Light will not save you from what I have prepared for you? Meet Darkness. And stay there forever!\"\n*if flowers\n\t*goto tninesix\n\n*else\n\t*goto tninesev\n\n*label tninesix\n\"You gave her flowers? Is this what the priests who serve the revered Light do? Father, let me put an end to the ridiculous theater you play and enjoy your last breath.\"\n\nFour tentacles ending with sharp hooks appear from his waist. They seem to be made of pure darkness.\n*goto tninesev\n\n*label tninesev\nYou know you have to act fast if you want to have a chance to deal with demonologist.\n*choice\n\t*selectable_if (prayer) #Cast a prayer of smiting\n\t\t*goto tninenine\n\n\t*selectable_if (icon) #Use the present from Babel's daughter\n\t\t*goto threehundred\n\n\t*selectable_if (angel) #Use Clarissa's rag doll\n\t\t*goto ronenine\n\n\t*selectable_if (water) #Use the holy water behind you\n\t\t*goto rzeroone\n\t\n\t*selectable_if (medallion) #Use Kalea's medallion\n\t\t*goto rzerotwo\n\n\t#Finished with all of the above\n\t\t*goto rzerofour\n\n*label tnineeit\n\"Father, I give you a minute to leave,\" his voice is deep and very powerful. You feel an immediate desire to obey him, though something tells you that it is better to stay in place. Would you agree?\n*choice\n\t#Yes\n\t\t*goto ronezero\n\n\t#No \n\t\t*goto rtwofive\n\n*label tninenine\n*set favour -1\n*set wounds +1\n*set experience +1\n*set prayer false\nFavour decreased by 1.Experience increased by 1.\n*line_break\nThe last word made the demonologist scream.\n*goto tninesev\n\n*label threehundred\n*set wounds +1\n*set experience +1\n*set icon false\nExperience increased by 1. \n\nYou take the picture from your belt. Maybe your hands are shaking because you immediately drop it on the ground. It slides down the floor, as if guided by some invisible force and stops just in front of the demonologist. He looks at it inquisitively, and then his eyes gush blood that rund down his cheeks. His body jerks in a brief but violent agony.\n*goto tninesev\n\n*label rzeroone\n*set water false\n*set experience +2\n*set wounds +2\nExperience increased by 2. \n*line_break\nYou turn back rush for the table with the holy water. With trembling hands you remove the cap and throw the bottle at the demonologist. He doesn't even try to avoid it. But when the first drops reach him there is a hiss, followed by a wild roar.\n*goto tninesev\n\n*label rzerotwo\n*set experience +2\n*set medallion false\n*set wounds +2\nExperience increased by 2. \n*line_break\nHe spots the medallion and freezes.\n\n\"How is it possible? This is my gift for our anniversary!\" He looks at Kalea.\n\n\"Yeah, another one of your trinkets that causes pain,\" the witch hisses.\n\nThe medallion opens and a large insect with three stings comes out. The creature flies toward him and lands on his right eyebrow, despite his attempts to hit it with a hand. The insect sticks its stings one by one...\n*goto tninesev\n\n*label rzerothree\n*if flowers or contact\n\t*goto rzerosix\n\n*else \n\t*goto rzerosev\n\n*label rzerofour\n*if whiskers\n\t*goto rtwofour\n\n*elseif anger\n\t*goto rzerofive\n\n*else\n\t*goto rzerothree\n\n\n*label rzerofive\n*set wounds +2\n*set experience +2\nExperience increased by 2.\n*line_break\nKalea screams. She stretches her hand out with a palm directed towards the demonologist\n\n\"Henrik, because of everything that happened, because of darkness you left to penetrate yor soul ...\"\n\nShe closes her eyes and bowd her head without taking her hand down.\n\n\"...let it all be over!\"\n\nA dark hole appears on her hand and something black comes out, followed by at least another ten. Because of the shock, you need some time to realize that these are bats.\n\nThe flock makes a few circles around the man, then pounce on him.\n\nBlood splashes on the nearby wall.\n*goto rzerothree\n\n*label rzerosix\n\nIt seems you have exhausted all of your options in this battle, and he is still on his feet, exuding confidence and genuine cruelty. Half human, half demon. Is it really the dark arts of demonology can give you strength, unattainable even for the Light? You are surprised by your thoughts, but also scared at this point and feel admiration for this nonhuman.\n\nAlso to the strength of his feelings, which sparked jealousy in him, though without reason.\n\nHe comes to you. For you. For your soul. You have to ask again, but instead just watch the dark figure approaching with every beat of your heart.\n*if wounds>6\n\t*goto rzeronine\n\n*else\n\t*goto rthreezero\n\n*label rzerosev\n\nIt seems you have exhausted all of your options in this battle, and he is still on his feet, exuding confidence and genuine cruelty. Half human, half demon. Is it really the dark arts of demonology can give you strength, unattainable even for the Light? You are surprised by your thoughts, but also scared at this point and feel admiration for this nonhuman.\n\nAlso to the strength of his feelings, which sparked jealousy in him, though without reason.\n\nHe comes to you. For you. For your soul. You have to ask again, but instead just watch the dark figure approaching with every beat of your heart.\n\n*if wounds>5\n\t*goto rzeronine\n\n*else\n\t*goto rthreezero\n\n*label rzeroeit \n*goto teitone\n\n*label rzeronine\n*if favour\u003c1\n\tThe demonologist reaches you, his stare penetrating deep inside your soul, making you unable to move or pray. You feel your soul being dragged out of you into a cold abyss. The Light abandoned you after you overused your share of it.\n\t*goto_scene death\n\n*else\n\n\tOnly a step away from you, the demonologist falls on his knees. He looks at you and hits the floor. His last breath flies out of his lungs with a snore. Henrik's body begins to change.\n\n\t\"Just as the book says,\" Kalea whispers. \"When someone possessed by a demon dies, his body returns to its state as of the date of the invocation. Because this is usually the point at which he loses his soul.\"\n\n\tThe woman brings a finger to his lips and then touches those of the demonologist.\n\n\t\"Farewell, Henrik. The world will be a better place ...without you.\"\n\n\tA few tears fall on the floor with a thud.\n\n\t\"Thank you for your help, Brother ${name}. But now I want to let me see the one my heart chose off. And I need to find our son.\"\n\tThere are dozens of questions you want to ask her. But you know that now it is not the time.\n\t*goto rthreeone\n\n*label ronezero\n\nYou close the door behind you. Something pulls you back with superhuman strength and your skull hits the handle, knocking you out.\n*goto_scene death\n\n*label roneone\n\nApparently, the disease sapped much Babel's strength because he doesn't wake up.\n\nBefore you leave the infirmary, you hear Florence snoring. You wonder if you should wake him up, but then decide against it. For now, everything seems under control.\n*goto tsixone\n\n*label ronetwo\n\nWhen you lean over him, he wakes.\n\n\"How is your heart?\" you ask him.\n\n\"Better, Father,\" he takes a hard breath, then get cramps and coughs. \"Maybe it's my time to take the dark tunnel.\"\n\nWhat will you reply?\n*choice\n\t#\"It's too early for you I'm sure you the Light will give you many days.\"\n\t\t*goto tfiveeit\n\n\t#\"I do not know, only the Light can say.\"\n\t\t*goto tfivenine\n\n\t#\"If it is what the Light decided, you should be prepared.\"\n\t\t*goto tsixzero\n\n*label ronethree\n*set favour -1\nFavour decreased by 1.\n*line_break\n\"Come on Cain, I see that something ails you. Share it with me. You'll feel better. And maybe the Light be able to help you.\"\nThe boy looks at you with sad black eyes and nods.\n\n\"There's a girl called Magdalene. With my best friend Aiken ...we love going out with her. The only thing is, I don't want to Aiken's coming with us. Because of this, I made a spell to hurt his leg.\"\n\nThe boy gives out a guilty look. You approach him and put a hand on his shoulder.\n\n\"Son, the problem is that you're trying to get to something in the domain of the Light by means of the Darkness. And you just have to look to the Light.\"\n\n\"Can the Light allow me to get close to her?\" he asks uncertainly.\n\n\"I do not know Cain. But I know that the path of Light is created to bring joy. The path of Darkness - suffering. When you think about her, what is it that comes to your mind?\"\n\nCain smiles.\n\n\"What does it mean to walk the path of Light, Father?\"\n\nWhat do answer?\n*choice\n\t#\"Do not cast spells any more\"\n\t\t*goto tthreethree\n\n\t#\"Do not hurt others\"\n\t\t*goto tthreenine\n\n*label ronefour\n*set rainbow true\n\n\"It has been said: 'the way of the heart is the way of the Light'. Moreover, Cain had some problems, but he already promised to pay to the Light when you need help.\"\n\nWhen you go out of the confession's chamber, she grabs Cain's arm. Shortly before leaving the temple, the boy turnes to you with a broad smile of gratitude.\n\nIt is time to go back to the infirmary.\n*goto ttwoone\n\n\n*label ronefive\n\"You want to be happy, right?\" you say.\n\nWhen you came out of the confession's chamber, Magdalena passes by Cain without even noticing him and leaves the temple. The young man lookes at you quizzically, and then tries to catch up with her.\n\nYou begin to feel remorse. You promised to help the boy, but actually you hurt him.\n\nSomehow you manage to convince yourself that you may have done the right thing. You know that you are needed at the infirmary, so you head for it\n*goto ttwoone\n\n*label ronesix\nApparently, your reaction is too extreme, because Cain simply refuses to continue the conversation with you.\n\nYou have no choice but go back to the infirmary.\n*goto ttwoone\n\n*label ronesev\n*set experience +2\nExperience decreased by 2.\n*line_break\n\"Take Kalea for example, she is also a witch, but only uses her abilities for good.\"\n\n\"She told you that .... she is a witch?\" Cain asks.\n\n\"Yes\" you say and I realize what you've just done.\n\n\"So, it was intrusion of the privacy of cenfession. Or maybe it was her will to share the news?\"\n\n\"No, Cain. We were in the confession's chamber, and I did wrong to speak with you about it. What you share with the priest is supposed to be secret. I made a mistake, but I just wanted to draw your attention to the witch who is not currently looking into the Darkness.\"\n\n\"I know Kalea and admire her abilities ...Actually, I should not talk about it. Not that I want to mock priest who does not respect his own canon...\"\n\nCain leaves the place at a rapid pace. His last words, however, echo in your mind. You stay there for a while, just to try (unsuccessfully) to collect your thoughts, and then go back to the infirmary.\n*goto ttwoone\n\n*label roneeit\n*set angel false\n\nAs soon as you whisper the name of the little angel, Clarissa materializes between you and the demon. Her aura engulfs it and makes it burst into an explosion of Light and makes it vanish without even a trace. You fall to the ground panting. Your fear is very strong.\n\n\"Thank you, my daughter,\" you say. I see the angel glow start to fade. Apparently, she is getting exhausted. She nods before disappearing again.\n\nObviously Cain is not here.\n\nWhere do you go now?\n*choice\n\t#The new forest\n\t\t*goto ttwothree \n\n\t#Cain's home\n\t\t*goto ttwofour\n\n\t#The infirmary\n\t\t*goto ttwoone\n\n*label ronenine\n*set experience +1\n*set wounds +1\n*set angel false\nExperience increased by 1. \n*line_break\nYou take out the little doll from your belt. At that moment, the little angel appears in the room.\n\n\"By the Light, daughter, what are you doing here?\" you shout scared for her.\n\nThe girl looks at you with blue-gray eyes filled with serenity. Then she turns to the demonologist and blows him a kiss. A small glowing sphere comes from her lips and flies towards him. It sinnks into his chest and makes him cry like an animal.\n*goto tninesev\n\n*label rtwozero\n*set experience +1\nExperience decreased by 1.\n*line_break\nYou try to simply push the cat away, but it is determined to make get on friendly terms with you. You smirk while watching your cassock grtting covered with long black hair. At one point you lose control and kick the pet. He hisses and hides under the couch.\n\n\"Felix, it's not polite to pester guests,\" Kalea hackles him, but the fierce look she gives you awakes some primal fear within.\n\nShe would not fulfill her quiet menace and tear you ...right?\n*goto rtwothree\n\n*label rtwoone\n\nYou try not to encourage the cat in its attempts to befriend you. You just ignore it. This does not reduce the enthusiasm with which it lets its long black hair stick on your white robe while purring contently. Fortunately, at some point it decides that it is not so interesting any more and withdrows under the bed.\n*goto rtwothree\n\n*label rtwotwo\n*set experience +1\n*set whiskers true\nExperience increased by 1. \n*line_break\nYou try to overcome your disgust with animal hair. You lean over and take the huge cat, then start to fondle it, covering most of your robe with black hairs. All the time, you keep telling yourself that cats are creatures of the Light and you have to enjoy the contact with them.\n\n\"I didn't know you loved cats,\" Kalea smiled.\n\n\"I didn't know either but your cat is just really cute. What's its name?\n\n\"Felix.\"\n\nThe animal apparently gets very hot and jumps from your lap and hides under the bed.\n*goto rtwothree\n\n*label rtwothree\n\nIt is time to speak business.\n\nWhat would you say?\n\nOption A: Ask her if she had the opportunity to learn about the sinister disease that rampaged the village yesterday.\n\nOption B: Tell her you were worried about her.\n\nOption C: Ask her where she was yesterday.\n*choice\n\t#Option A\n\t\t*goto tsevtwo\n\n\t#Option B\n\t\t*goto teitsix\n\n\t#Option C\n\t\t*goto tsevone\n\n*label rtwofour\n*set wounds +1\n*set experience +1\nExperience increased by 1.\n*line_break\nA scream comes from under the bed. At first, you think it's a creature of the Darkness that came t
