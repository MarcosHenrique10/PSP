rience +2\n\n\"I am now relieved! Thank you very much, priests!\" When you look at her, you realize Chill changed a lot. Her hair is light brown and her skin is tanned. The watery eyes are replaced by healthy looking auburn.\n\n\"I hope one day I will be able to repay you. Now, let's all leave this cursed realm. See you in heaven!\" she waves you goodbye and vanishes.\n\n*goto 203\n\n*label 403\n\"${name}!\" Sister ${ulmia} says.\n\n\"Yes, dear!\"\n\n\"One day... I want us to die like Chill and Ignius - together.\"\n\nYou embrace her and enjoy the feeling of her head on your chest. You close your eyes and start playing with her hair, but your joy is short-lived. The ground shatters.\n\n*goto 203\n\n\n*label 407\nFrostdamage increased by 2.\n*set tick false\n*set frostdamage +2\nHealing an enemy who seems at full health seems against all logic, but you decide to trust poor Jonathan.\nWhen you say the prayer, you add the special words to increase the effect of the prayer that are the trademark of a true healer. The result is spectacular. Her skin begins to rot! It is a miracle that she is still able to stand on her feet.\n\n*goto 348\n\n*label 408\nFrostdamage increased by 1.\n*set tick false\n*set frostdamage +1\n\nHealing an enemy who seems at full health seems against all logic, but you decide to trust poor Jonathan.\n\nWhen you say the prayer, her skin begins to rot! It is a miracle that she is still able to stand on her feet.\n\n*goto 348\n", "heresy": "\"Do you think we are heading in the right direction?\" You turn your head and smell the sweet odour of Sister ${ulmia}. Her emerald almond-shaped eyes sparkle in the light of the street lamp. She looks stunning even in twilight.\n\n\"Yes... it must be over there,\" she answers.\n\nNeither of you mouth it, but you know how dangerous the streets of the big city can be at this time. You planned to arrive much earlier but your mount lost a horseshoe and had to move really slowly for the last few hours. Then, the stables master spent what seemed like eternity inspecting it before deciding to actually buy it.\n\nAs the priestess reaches next corner, a dirty hand grabs and pulls her. You dash, your hand on your sword, ready to take it out. ${ulmia} is in a narrow alley. The attacker is right behind her, trying to strangle her with a rope. It is too dark to see well, but it seems that there is another rogue with them.\n\nWould you take out your sword?\n*choice\n\t#Yes\n\t\t*set favour -1\n\t\tFavour decreased by 1.\n\t\t*line_break\n\t\tAs soon as the sword leaves your sheath, you realize your mistake. The weapon is much too long to use properly here.\n\n\t\tUnfortunately, you are right about the second bandit. He steps in front, waits for your clumsy swing, then simply kicks the blade out of your hand, leaving you defenseless against his dagger.\n\t\tYou feel sharp pain in your shoulder and your vision blurs. Your knees suddenly feel so meek.\n\n\t\tBy the time you get over the shock, Sister ${ulmia} manages to deal with both of the bandits, sending them whelping around the corner.\n\n\t\t\"Are you all right, Brother?\" Her voice is coarse. You see the concern on her face. There is an ugly scar on her throat, marring her immaculate milk white skin.\n\n\t\t\"I will survive,\" you say with a smile. Your attempt to stand up causes a big wave of pain and you are forced to say a healing prayer.\n\t\t*goto four\n\n\t#No, fight with bare hands\n\t\tUnfortunately, you are right about the second bandit. He steps in front, and tries to attack you with a dagger. However, he is no much for the speed and strength you acquired during your priest training. You grab the wrist of his armed hand and sprain it making him drop his weapon. Then, you give him a few kicks in his stomach without releasing your grip. When you let him go, he has no intention of continuing the fight.\n\n\t\tMeanwhile, Sister ${ulmia} managed to deal with her attacker and they both disappear around the corner, whelping.\n\t\n\t\t\"Are you all right, Brother?\" Her voice is coarse. You see the concern on her face. There is an ugly scar on her throat, marring her immaculate milk white skin.\n\n\t\t\"Yes, dear. I am more concerned about you, though,\" you reply.\n\t\t*goto four\n*label four\n\"Oh, it is nothing dangerous.\" She tries to hide her bruise under the collar of the cassock without much success. \"There is no need to waste favour.\"\n\nBasically, she is right. It is a vital resource. On the other hand, you know how much she loves looking beautiful. Vanity is her soft point, making her put red on her lips or dark powder around her eyes so that they stand out. She would really appreciate it if you cast a healing prayer since the priests from her order can't do that.\n*choice\n\t#Heal her\n\t\t*set favour -1\n\t\t*set relations +1\n\t\tFavour decreased by 1. Relations increased by 1.\n\t\t*line_break\n\t\tYou can see her wide smile as you begin the prayer. It is a beautiful smile. She puts her hand where the scar was.\n\n\t\t\"Thank you so much, ${name}!\" She gives you a brief hug and a kiss on the cheek. \"Now, let's move.\"\n\n\t\tThe priestess grabs you by the hand and you continue towards the inn.\n\t\t*goto seven\t\n\n\t#Don't\t\n\n\t\tYou have a few remorseful thoughts but decide to chase them away.\n\n\t\t\"Now, let's move.\"\n\n\t\tThe priestess grabs you by the hand and you continue towards the inn.\n\t\t*goto seven\n\n*label seven\n\"I don't like that cassock!\" Sister ${ulmia} looks with disgust at the bloodstains as soon as you arrive at the well-lit square in front of the inn. You understand her. She is used to the jet black members of the Order of the Cleansed wear. However, you both decided that it would be wiser if she chooses the white all other Orders within the Church of Light use for their uniforms.\nIt is just that the Order of the Cleansed is associated with devilry. Not many understand that even a devil can give its contribution to the cause of the Light.\n\nThe inn is a massive building. It is quite overcrowded at this hour, which doesn't surprise you at all. You manage to find a nice table in the corner and order roast eggs and cherry juice.\n\n\"Did you expect to be given a mission just after graduating from the Seminary?\" The priestess plays with her infernally red hair, trying to sort the beautiful mess.\n\n\"Well, not with someone as... pleasant as you.\" You enjoy her smile.\n\n\"I am also happy to be able to spend time with you while serving the Light. Do you think there is really a ghoul in the suburbs? It sounds to me like a superstition. But, I need to feel the energies there.\"\n\nYou nod. It is common for the Church to receive requests for help, claiming that some monster has appeared in the area and ask for priests to come and sort the matter. Most often, it is just someone's imagination.\n\n\"I feel like drinking a jug of wine,\" the priestess says.\n\nThe Canon doesn't allow priests to drink. Maybe it is a good idea to talk her out of it. On the other hand, few clerics are that pedantic when it comes to following it. The wine could help her relax... and get more comfortable.\n*choice\n\n\t#Say nothing\n\t\t*set wine true\n\t\t*set relations +1\n\t\tRelations increased by 1.\n\t\t*line_break\n\t\tYou just watch as she orders a big jug of wine. When it arrives, she pours some into her glass, filling it to the brim, then finishes it at one go.\n\n\t\t\"Care to try?\" She asks, her cheek already obtaining a rosy hue.\n\t\n\t\t\"No, thank you,\" you reply.\n\n\t\tObviously, the wine brightens her mood and you can only feel happy for her.\n\t\t*goto ten\n\t\t\n\t#Argue against it\n\t\t\"Sister, you know we are not supposed to have spirit drinks,\" you say with a solemn voice.\n\n\t\t\"Yeah, I know that. But I thought that here with you I needn't stick to every order of the Canon. Anyway, you are right.\" She shrugs.\n\n\t\tYou are surprised at her lack of opposition. She tends to be very dominant at times. Nevertheless, you feel a bit uneasy for having to remind her of the rules of the Church.\n\t\t*goto ten\n\n*label ten\nA couple of knights enter the inn and heads towards your corner. They have shiny plate armours with tabards. As they come closer, you spot silvery candelabra on them. They look like regular warrior priests, however, you fail to recognize the emblem.\n\n\"I smell a devil here,\" roars one of them and turns to Sister ${ulmia}. Your blood runs cold.\n\nWhat you know about the beauty is that she used to be a devil who went through a series of transformation prayers so that she could look human and serve the Light.\n\nThe knight murmurs a prayer you recognize. It is designed to show the true image of a creature and is excellent for spotting creatures of the Darkness under cover.\n\nThe skin of the priestess gets bright red and spotted. You have never seen her initial form, but you guess the prayer should have had a greater effect. Probably the faith of the knight is not that strong. However, this is the least of your concerns at the moment.\n\n\"Spawn of darkness, by the power of the Light, I am taking you to prison!\" he roars.\n\nMoving unexpectedly quickly, he puts his hand on ${ulmia}'s nose. You see a piece of cloth hanging from it. Could it be soaked with a sedative? What kind of a member of the Church would use such methods? The Sister coughs and takes out her daggers. Meanwhile, the second knight gets to a position between you and ${ulmia}. What do you do?\n\nThe most natural action would be to fight your way through the one next to you and try to defend your friend. She would definitely expect that. On the other hand, your chances of prevailing over such heavily armoured foes are not that great. They seem to be fellow priests. Maybe it would be better to let them take her and sort the matters with the high clergy later.\n\nWould you attack?\n*choice\n\t#No\n\t\tYour heart bleeds as you watch her fight like a cornered cat. After she takes a couple of blows, the two knights tie her arms and feet together and take her out.\n\t\t*goto seventeen\n\t#Yes\n\t\t*set relations +2\n\t\tRelations increased by 2.\n\t\t*line_break\n\t\tYou put your hand on the hilt of your sword and take it out. The knight is too close for you to use your blade, but your goal is to hit him with what is sticking out from it. Where would you punch him? The stomach is closer but you wonder whether to attempt to connect with his head.\n\t\t*choice\n\t\t\t#The head\n\t\t\t\t*set experience +1\n\t\t\t\t*set dagger true\n\t\t\t\tExperience increased by 1.\n\t\t\t\t*line_break\n\t\t\t\tYour punch lands perfectly just above his ear and knocks him out with a cry. The other knight turns back and with just as well aimed kick disarms you. This gives Sister ${ulmia} a couple of valuable seconds to try to stab him. However, her weapon is in no way suitable for dealing with such heavy armour.\n\n\t\t\t\tMeanwhile, your first opponent recovers and joins the fight, throwing a heavy keg over you. You are not seriously injured, but the knights use the opportunity to tie her arms and feet together and take her out.\n\n\t\t\t\tYou roll the keg, struggling for your breath. Something sparkling attracts your attention. You bend over in amazement. It is one of Sister ${ulmia}'s daggers. She would rather die than part with it.\n\t\t\t\tShe must have deliberately dropped it for you to take her, hoping that it would help you find (or free) her somehow.\n\t\t\t\t*goto seventeen\n\n\t\t\t#The stomach\n\t\t\t\t\n\t\t\t\t*if wine \n\t\t\t\t\tBefore you recover, the two knights tie the arms and feet of Sister ${ulmia} together and take her out.\n\t\t\t\t\t*goto seventeen\n\t\t\t\t*else\n\t\t\t\t\t*set dagger true\n\t\t\t\t\tIt takes time for you to recover, but judging from the sounds, Sister ${ulmia} is fighting like a hellcat. Unfortunately, before you can step on your feet the two knights manage tie her arms and feet together and take her out.\n\n\t\t\t\t\tSomething sparkling attracts your attention. You bend over in amazement. It is one of Sister ${ulmia}'s daggers. She would rather die than part with it. She must have deliberately dropped it for you to take her, hoping that it would help you find (or free) her somehow.\n\t\t\t\t\t*goto seventeen\n\n*label seventeen\n*page_break\nYou get out of the inn as quickly as you can but you could only watch as a carriage heads off.\n\n\"The Light shall burn you!\" you swear.\n\nYou immediately go to the church nearby. The local priest doesn't know anything about an Order with a candelabrum emblem. You are physically and emotionally exhausted, so you accept his invitation to come in and sleep in the church, even though you desperately want to start searching for your friend. A soothing tea helps you release some of the tension and you manage to get some uneasy sleep on a pew, murmuring a prayer for the Light to watch over ${ulmia}.\n\nWhen you wake up, it is slightly after sunrise. You thank the priest for his hospitality and go out.\n\nJust in front of you, there is a fortuneteller's. You wouldn't normally use such services, but the issue is urgent and maybe the aim justifies the means. A more common option would be to meet your instructor in Basic Prayers, Bishop John, hoping that he could help you.\n\nWho would you visit first?\n*choice\n\t#The Bishop\n\n\t\t*goto eighteen \n\n\t#The fortuneteller\n\n\t\t*goto nineteen\n\n*label eighteen\n*page_break\n*set instructor true\nAs you make your way into the cathedral, you feel nostalgia about the time you were an initiate. As you walk the corridors, a part of you wants to come back to the harmony that reigned your soul back then. However, the memory of what happened last night is stronger and haunts you.\n\nThe Bishop is very happy to see you, even though your pale complexion worries him. You describe why Sister ${ulmia} and you came to the city and how you were attacked by the knights.\n\"Is there anything more you want to tell me about her? I know there are rumours about her Order that seem to be exaggerated. I remember teaching her at the time you were here, but I couldn't get to know her very well.\"\n\nYou perfectly understand his question. He wants to know if she is a devil. You are certain that you could trust him. On the other hand, you don't feel it is moral to share her secret. What would you do?\n*choice\n\t#Tell him\n\t\t*set experience +1\n\t\tExperience increased by 1.\n\t\t*line_break\n\t\t\"Honesty is one of the greatest virtues of the Light. You tell me something I was almost sure myself.\" He gives you a warm smile.\n\t\t*goto twentyeight\n\t#Don't\n\t\t\"I really don't want to talk about it,\" you say uneasily and look down.\n\n\t\t\"That is a good answer, Brother. However, if you want me to help, valuable information like this could be useful.\"\n\t\t*goto twentyeight\n\n*label twentyeight\n*page_break\n\"When the order of the Cleansed was officially recognized by the Church, there was a lot of opposition,\" the Bishop explains. \"After all, those so called priests can't heal and their confessions tend to be violent, not to mention the infernal origin of at least some of the members. What the High Priest wanted was their knowledge of the forces of the Darkness in order to better fight it. The message didn't reach some priests. Many of them were good ones, however, they couldn't get over the fear that the Church is changing for the worse. A few renegades formed the Order of the Purifying Fire aimed at destroying the Order of the Cleansed. The former was condemned by the Church but nevertheless continued to exist. The candelabrum is their emblem. I fear that Sister ${ulmia} might be in great danger. Follow me, please.\"\n\nThe Bishop takes you to a library. Even though it is clean inside, the air smells of dust as the books there seem to be very old. He takes a tome with a leather cover and gives it to you.\"\n\n\"Here you can find the prayer of vision. It will help you locate your friend. If you want, you can say it now. I will be waiting for you in my study.\"\n\nWould you like to say the prayer or would you save the favour for more urgent times?\n*choice\n\t#Mouth it\n\t\t*set experience +1\n\t\t*set favour -1\n\t\tExperience increased by 1. Favour decreased by 1.\n\t\t*line_break\n\t\tThe vision overwhelms your senses and you need to take a seat lest fall on the floor. Your heart races as you see your beloved priestess. She is alive, even though she is struggling against something you can't fathom. It is hard to understand where exactly she is, but something tells you she is in the suburbs.\n\n\t\tThis is all you could find out. Unfortunately, it is not much but you probably need more practice with it in order to achieve better results.\n\t\t*goto twentytwo\n\n\t#Don't\n\t\tI hope that you visited the clairvoyant and you have a basic idea where Sister ${ulmia} is.\n\t\t*goto twentytwo\n\n*label twentytwo\n*page_break\nYou return to the Bishop's study.\n\n\"I hope I was able to help you a little bit. May the Light guide your footsteps,\" he says. \"Is there anything else that happened to you since you came to the city?\"\n\n*if clairvoyant\n\n\t*set retribution true\n\n\tYou tell him about the priest who you met at the fortuneteller's. The Bishop seems concerned.\n\n\t\"Maybe the Church is swarmed with filthy maggots, even though the Order of the Cleansed is not the cause. Maybe it is the time for the prayer of retribution.\"\n\n\tHe hands you a parchment.\n\n\t\"This prayer was scribed by me. I hoped that there would be little use for it but it seems I was wrong. It is designed to punish anyone who is or used to be a priest of the Light but succumbed to the Darkness.\"\n\n\tYou study it carefully, then you bid him farewell.\n\t*goto twentyfive\n\n*else\n\n\t\"Not really.\" You shrug.\n\n\tYou thank him for his help and bid him farewell.\n\t*goto twentyfive\n\n*label twentyfive\n*page_break\nIf you have visited the fortuneteller's now it is the time to continue on your way. Otherwise, you decide to check her out.\n\n*if clairvoyant\n\t*goto thirtysix\n\n*else\n\t*goto nineteen\n\n*label nineteen\n*page_break\n*set clairvoyant true\nThe building is quite small, without much furniture. It is dark inside, which makes you even more depressed. You are surprised to find another priest inside. Maybe visiting the clairvoyant is not that unusual for the members of the Church after all.\n\n\"Oh, one more,\" sighs the fortuneteller. She is quite beautiful, with long hair dyed in blue. Her attire is all in jet black and it seems that she also puts dark dust around her eyes. \"I am sorry, I can't pay to you as well,\" she says to you.\n\nNow it makes sense. The other priest is here not because of what the lady can tell him. He is here for some of her money. Suddenly, anger fills you.\n\nWould you confront him?\n*choice\n\t#Yes\n\t\tHow would you confront him?\n\t\t*choice\n\t\t\t#threaten to inform the high clergy\n\t\t\t\t\"I believe the Bishop will be interested to hear about it? What do you say, Brother? Or maybe you want to tell him before that?\"\n\t\n\t\t\t\tThe other priest becomes pale as a ghost.\n\n\t\t\t\t\"It... it is not what it seems. That pagan is lying!\"\n\n\t\t\t\t\"I am not a judge. Just leave her alone and let's forget about it. Right?\" you propose.\n\n\t\t\t\tHe just nods and leaves.\n\t\t\t\t*goto thirtythree\n\n\t\t\t#threaten him physically\n\t\t\t\t*set favour -1\n\t\t\t\tFavour decreased by 1.\n\t\t\t\t*line_break\n\t\t\t\tYou take him by the collar and pull him closer. His response catches you unprepared as he hits your nose with his forehead. You feel a gush of blood coming out of it and the pain makes you fall on your knees.\n\n\t\t\t\tIt seems that the other priest is as surprised by the damage he caused and leaves the building without saying anything.\n\n\t\t\t\tA prayer of healing later you feel much better.\n\t\t\t\t*goto thirtythree\n\n\t#No\n\t\tYou really don't want to interfere with what is going on inside. If you haven't visited the Bishop, you should do so. Otherwise you continue on your way.\n\t\t*if instructor\n\t\n\t\t\t*goto thirtysix\n\n\t\t*else\n\t\t\t*goto eighteen\t\n\n*label thirtythree\n*page_break\n*set experience +1\nExperience increased by 1.\n*line_break\n\"Thank you for your help!\" The fortuneteller says.\n\n\"I need your help. My best friend was kidnapped last night. I need to find her,\" you explain.\n\n\"Let me see what I can do.\" She invites you to sit at a table while she puts her hands on a glass ball, her eyes closed. After a couple of minutes, she opens them again.\n\n\"Sadly, I couldn't see much. She is alive, this is what I can say for sure, but she is around someone... or something powerful and evil.\"\n\n\"How do I find her?\"\n\n\"You are on a mission, right?\"\n\n\"Yes, we came here to hunt a ghoul that was reported to be haunting the suburbs.\"\n\n\"Find it... and you will find her as well,\" she says slowly. \"I am sorry that I can't tell you more, but with a supernatural being so close to her, it is very hard.\"\n\n\"I am thankful for what you told me,\" you say and reach for your sash.\n\n\"There is no need to pay. Your help in getting rid of that dog of a priest was enough. What is your name?\" she asks.\n\n\"Brother ${name}.\"\n\n\"I am Crystal and I think our paths will cross again.\"\n\nMeanwhile, the ball starts glowing.\n\n\"My little friend wants to show me more,\" she smiles.\n\n*if instructor\n\t*set animal true\n\t\t\n\t\"You already requested the help of the clergy and got basically nothing. What a pity... I see you fighting a giant dog. I think I have something that can help you.\"\n\n\tShe gives you a small pendant.\n\n\t\"Show it to them and the beast will be your friend as long as its heart is beating.\"\n\n\tYou hide it in your stash, thanking.\n\n\t\"One last thing. A woman will help you all the way to the priestess. Just make sure you meet her.\" She sighs. That is all.\n\n\tYou thank her and get to the door.\n\n\t\"You will always be in my prayers, champion.\" She smiles at you as you leave.\n\t*goto thirtysix\n\n*else\n\t\"I see you fighting a giant dog. Be careful, ${name}, it looks ferocious! Oh, and one last thing. A woman will help you all the way to the priestess. Just make sure you meet her.\" She sighs. That is all.\n\n\tYou thank her and get to the door.\n\n\t\"You will always be in my prayers, champion.\" She smiles at you as you leave.\n\n\tYou continue to the cathedral to visit the Bishop.\n\t*goto eighteen\n\t\n*label thirtysix\n*page_break\nThe suburbs look very different from the central part. The streets are dirty and filled with trash. In such a surrounding, a ghoul could easily hide even during the day. Actually, for a moment you believe you have seen him, then it turns out it is just an old trump.\n\nA friend of yours runs an inn in this area and so you drop in. The building is in a desolate state, very little of the cozy place it used to be a few years ago. Sven is happy to see you.\n\"How are you doing, old pal?\" you ask him.\n\n\"Well, I am all right. The bad thing is I don't have many customers. This old barrack has a high maintenance. What are you doing here?\"\n\n\"I am on a mission. Someone reported seeing a ghoul in this area. Have you heard anything about it?\"\n\n\"Not really.\" He shrugs. \"But nothing amazes me these days. After Amelia, the leader of the Twisted Blade band disappeared, all kinds of bad things happen. Before that, her band kept everything in order.\"\n\nThat sounds strange.\n\n\"Any idea about a band of armoured knights with candelabra?\"\n\n\"Yes, I've seen them in the area. There are rumours that they are behind Amelia's disappearance. Their headquarters are probably nearby.\"\n\nYou thank him for the information and bid him farewell, promising to come back soon.\n\nWhere do you do now? To the East, the poorest area in the city, or to the West, near the small market?\n*choice\n\t#Go to the east\n\n\t\t*goto thirtyseven\n\n\t#Go to the west\n\n\t\t*goto thirtyeight\n\n*label thirtyseven\n*page_break\n*set east true\nAfter half of an hour of wandering around the area, you feel completely disgusted with the surrounding. Anxiety arises within you as there is no progress towards finding ${ulmia}... or at least the ghoul.\n\nJust as you are about to leave, you spot a scruffy looking man and decide to ask him a few questions.\n\n\"Not here, follow me,\" he says and heads into a dark street.\n\nWould you follow him?\n*choice\n\t#Yes\n\t\tYou start asking questions as you follow him into the darks street. His answers come in the form of a pair of daggers threatening to pierce into your torso.\n\t\t*if freedom\n\t\t\t\n\t\t\t*set key true\n\t\t\tJust as you believe you are going to be stabbed, the cutthroat suddenly stops and stares at something behind you. You have no idea where she appeared from, but there is Amelia, her hand raised above your shoulder.\n\n\t\t\t\"Hold down, Sparky! This one is a friend,\" she says in a low voice.\n\n\t\t\t\"I am sorry, Mistress,\" he mutters and bows.\n\n\t\t\t\"That is okay. Is the key for the cottage ready?\" she asks him.\n\n\t\t\t\"Yes, Mistress, here it is.\" He produces a lead key out of his pocket.\n\n\t\t\t\"Give it to him. Farewell.\"\n\n\t\t\tYou take the key and turn back to ask her what it is supposed to unlock but she is gone.\n\t\t\t*goto fortynine\n\n\t\t*else\n\t\t\t*set favour -1\n\t\t\t*set key true\n\t\t\tFavour decreased by 1.\t\n\t\t\t*line_break\t\t\n\t\t\tYou are slow to react. You feel one of the daggers sink between your ribs. Luckily, the wound is not deep and you manage to grab the other hand of the assassin, then punch him in the face so hard you knock him out.\n\n\t\t\tWhile you say the prayer of healing, he manages to regain consciousness but his will to fight is over. As soon as he gets on his feet, he runs.\n\n\t\t\tSomething dings as he does so. You bend and pick up a key and decide to take just in case you can use it.\t\t\n\t\t\t\n\t\t\t*if west\n\t\t\t\t*goto fortynine\n\n\t\t\t*else\n\t\t\t\t*goto thirtyeight\n\t#No\n\n\t\tYou have the feeling this could be a trap. There is really no reason for him to ask you into the street unless he has prepared some sort of an ambush. \n\t\tWandering around the area, you find nothing. \n\t\t*if west\n\t\t\t*goto fortynine\n\n\t\t*else\n\t\t\t*goto thirtyeight\n\n*label thirtyeight\n*page_break\n*set west true\nThe market area is crowded. Various goods are sold there but without ${ulmia} by your side... you feel that you need nothing.\n\nSuddenly, your intuition tells you to say a prayer of meditation. It is not as powerful as the prayer of visions you may have learned (or even tried) but it sometimes helps you pay attention to important details.\n\nWould you do it?\n*choice\n\t#Yes\n\t\t*if prophet\n\t\t\t\n\t\t\tYour mind's eye is open to what the Light has to tell you and you are able to experience the vision without the loss of favour\n\t\t\t*goto thirtynine\n\t\t*else\n\t\t\t*set favour -1\n\t\t\tFavour decreased by 1.\n\t\t\t*goto thirtynine\n\n\t#No\n\t\tYou realize you are wasting your time here.\n\t\t*if east\n\t\t\t*goto fortynine\n\n\t\t*else\n\t\t\t*goto thirtyseven\n\n*label thirtynine\n*page_break\nYou close your eyes and say the words. Suddenly, the way you perceive the world changes. You feel the odours of the spices, you hear the song of birds and... a metallic clutter. Concentrating harder, you could even overhear a muffled cry coming from the building in front.\n\nThe entrance is on the other side, in a quiet street. The door is locked but a strong kick makes it open. What you see really stuns you.\n\nIn front of you, there is a woman that must have been quite beautiful but now is covered in crust of dirt and blood. Her arms and legs are still in chains, you see a ring around her throat as well. When she sees you she prepares to attack. You raise your hands, trying to calm her.\n\n\"You aren't one of them, are you?\" she asks and puts her hand under her ribs. Blood is dripping from under her rags.\n\n\"The ones with the candelabra? No. They took my girl too.\"\n\n\"I haven't seen her. I was alone here. I managed to pull the chains out of the wall. I poisoned two of the guards and strangled the third after being stabbed... please, help me remove these chains so that I could escape.\"\n\n\"You are Amelia, right?\"\n\n\"Yes,\" she whispers and closes her eyes. Maybe she lost too much blood.\n\nWould you do as she asks?\n*choice\n\t#Yes\n\t\t*set freedom true\n\t\tThe chains are old and rusty and you have no problem breaking them with your sword. Of course, you don't even think of trying to do so with the ring around her neck.\n\n\t\t\"Thank you very much, priest,\" she says and heads for the door. Keeping herself on her feet seems to be hard for her. Would you like to heal her?\n\t\t*choice\n\n\t\t\t#Yes\n\t\t\t\t*set salvation true\n\t\t\t\t*set favour -1\n\t\t\t\tFavour decreased by 1.\n\t\t\t\t*line_break\n\t\t\t\tAmelia seems startled by what is happening to her but when the prayer does its work she can't hide her smile.\n\n\t\t\t\t\"Thank you, Brother. I really thought I would pass out before I reach my hideout.\"\n\n\t\t\t\t\"I am always glad to help,\" you assure her.\n\n\t\t\t\t\"I will find a way to help you with your quest, I just need to sort a few matters up. See you later,\" she says and moves out with feline grace.\n\t\t\t\t*if east\t\t\t\t\t\n\t\t\t\t\t*goto fortynine\n\n\t\t\t\t*else\n\t\t\t\t\t*goto thirtyseven\n\n\t\t\t#No\n\t\t\t\tYou watch her leave the house, each step tormenting her and you feel remorseful. You are not used to being able to help a wounded person and do nothing. \n\t\t\t\t*if east\n\t\t\t\t\t*goto fortynine\n\n\t\t\t\t*else\n\t\t\t\t\t*goto thirtyseven\n\n\t#No\n\n\t\t\"I can't. I really shouldn't be helping a criminal.\" You say and turn your back on her, leaving. What you just did gets you out of your skin as you are not used to refusing help to someone in such a destitute state.\n\t\t*if east\n\t\t\t*goto fortynine\n\n\t\t*else\n\t\t\t*goto thirtyseven\n\n*label fortynine\n*page_break\nYou continue wandering the area, feeling all hope slowly vanish. Has the Light abandoned you? All your life you have been taught to trust it, but now desperation is taking over.\n\nJust as you are about to sit in a corner and cry, you spot a knight with the candelabrum tabard. He is far from you and with the fast stride of his you simply can't catch him. However, you see where he came from. It is a one-end street with a few houses. However, only one has a door leading to it.\n\nYou thank the Light and grab the handle. The door is locked. It is made of massive wood and reinforced with metal, so shattering it is out of the question.\nYou...\n*choice\n\t*selectable_if (salvation) #met and healed a rogue\n\t\t\"Need some help, Brother?\" You hear a familiar voice from behind. You turn and see Amelia. She definitely looks better, her hair still wet from the shower she must have had. You smell the aroma of roses.\n\n\t\t\"Wouldn't the odour let you out?\" you ask with a smile.\n\n\t\t\"Not, really. It will wear out in a few minutes. Besides, I am here to make a good impression, not to hide. I guess you want that door opened?\"\n\t\n\t\tYou nod.\n\n\t\t\"Would you like to come with me?\" you propose.\n\n\t\tAmelia produces a skeleton key out of her cloak and unlocks the door.\n\n\t\t\"I surely want, but this is not the way I do it.\" She looks you in the eye. \"I will follow you in the shadows and I will help you any way I can.\"\n\n\t\t\"Thank you in advance, then.\"\n\n\t\tYou enter.\n\t\t*goto fiftythree\n\n\t*selectable_if (key) #have a key\n\t\tYou take the key and put it into the lock, knowing that the chances of it being the right one are very slim. You rotate it and the door unlocks with a thud!\n\t\t*goto fiftythree\n\n\t*selectable_if (prophet) #are a prophet\n\t\tNot having the means to deal with the door, you decide to resort to a prayer of meditation. Your senses instantly become overloaded with smells and sounds and you are able to notice details you would ignore otherwise.\n\n\t\tFor example, you notice that one of the bricks about two feet over the ground sticks out. Could it be a cache? You climb, using a few holes in the wall and remove the brick. Behind it you find a key!\n\n\t\tBack on the ground, you put it into the key hole. It works!\n\t\t*goto fiftythree\n\n\t#need to say a prayer of meditation\n\t\t*set favour -1\n\t\tFavour decreased by 1.\n\t\t*line_break\n\t\tNot having the means to deal with the door, you decide to resort to a prayer of meditation. Your senses instantly become overloaded with smells and sounds and you are able to notice details you would ignore otherwise.\n\n\t\tFor example, you notice that one of the bricks about two feet over the ground sticks out. Could it be a cache? You climb, using a few holes in the wall and remove the brick. Behind it you find a key!\n\n\t\tBack on the ground, you put it into the key hole. It works!\n\t\t*goto fiftythree\n\n*label fiftythree\n*page_break\nYou enter the building. There is virtually nothing on the ground floor, only a winding stairway leading down. You descend, trying to be as quiet as possible.\n\nWhen you get to the first underground level, a terrible stink almost makes you cough. There are two cages and in each of them there is a grotesque reminiscent of a human with enormous claws and teeth. Ghouls! So, they are not a superstition after all!\n\nA young boy wearing the candelabrum emblem, oblivious to your presence, opens one of the cages and casts a spell. The ghoul slowly comes out, presumably under his control... then swipes with its claw. The boy manages to put its forearm in front of his face just before it shreds it to pieces. The dangerous nails miss, but the blow nevertheless knocks the boy down.\n\nYou have only a few seconds to do something; otherwise, the ghoul will finish him.\n\nWhat would you do?\n*choice\n\t#Cast a prayer of protection on the boy\n\t\t*goto fiftyfour\n\t\n\t#Smite the ghoul\n\t\t*goto fiftyfive\n\n\t#Do nothing\n\t\t*goto fiftysix\n\n*label fiftyfour\n*set favour -1\nFavour decreased by 1.\n*line_break\nThe prayer gives the boy a few seconds during which the ghoul can't attack him, however, he is mortified with fear. Very soon, the protection will be over.\n\nWhat is your choice?\n*choice\n\t#Smite the ghoul\n\t\t*goto fiftyfive\n\n\t#Do nothing\n\t\t*goto fiftysix\n\n*label fiftyfive\n*set stash true\n*set favour -1\nFavour decreased by 1.\n*line_break\nThe ghoul dies in an explosion of light. The boy looks around, trying to find the source of his salvation. You come out and try to calm him. It takes some time before he is able to speak.\n\"The spell... it didn't work. Why?\" he wonders.\n\n\"I have no idea. What I know is that you would be dead if I hadn't interfered.\"\n\nHe nods.\n\n\"I suggest you go home and forget about those knights.\"\n\nThe boy agrees with you.\n\n\"Before you go, can you tell me if there is priestess with red hair somewhere in the building.\"\n\n\"I don't know, I have never been to the lowest levels. But... I guess these people sent me here to die. If you continue to the lower level, to the tomb, the second coffin to the right is empty. Inside, there is a whistle that stuns ghouls. It works, unlike the spell I just used. Damn it, why did the instructor insist that I leave it there?\"\n\nYou leave him to sort out his feelings and continue to the second underground level.\n*goto fiftyseven\n\n*label fiftysix\n*set favour -1\nFavour decreased by 1.\n*line_break\nYou watch in horror as the ghoul rips him. Then, the ghoul sniffs the air and catches your scent! You realize it is high time to smite him and end his existence in an explosion of light.\n\nThe quick prayer over the remains of the boy does little to help your remorse. You continue to the second underground level.\n*goto fiftyseven\n\n*label fiftyseven\n*page_break\nThis level is colder and smells of mold. The light is scant, coming from a couple of torches. You shiver when you realize you are in a sort of a tomb. Daring to remove the cover of one of the coffins, you see a corpse that resembles a ghoul. Oh, is that how they are formed?\n\nProbably, the best action you can take is cast a prayer of consecration, which is likely to stop the process.\n*choice\n\t#Do it\n\t\t*set consecration true\n\t\t*set experience +1\n\t\t*set favour -1\n\t\tExperience increased by 1. Favour decreased by 1.\n\t\t*line_break\n\t\tThe prayer leaves you rewarded. You could swear you heard a few moans, probably coming from the dying ghouls... or it could have been your imagination.\n\t\t*goto sixty\n\n\t#Reserve the favour for later\n\t\tYou know it is not the right thing to do, but you hope that after you save Sister ${ulmia}, you will be able to deal with the abominations in the coffins.\n\t\t*goto sixty\n\n*label sixty\n*page_break\n*if stash\n\tYou remember the boy's words and remove the cover of the second coffin to the left. The whistle is there. You carefully wipe the dust off it and put it in your stash.\n\t*goto sixtytwo\n\n*else\n\t*goto sixtytwo\n\n*label sixtytwo\nWith nothing else to do here, you descend to the third level. Just like the first, there are a couple of cages. One of them is empty, but in the other there is a scruffy looking man chained to the wall. A young female knight holds a long whip close to his face.\n\n\"I'm not telling,\" he says and spits.\n\nThe girl hits him hard.\n\n\"Everyone says so, in the beginning.\" She prepares to hit him again. As she does so, her hair moves to the other side and you spot a necklace that reminds you of the one you gave to Sister ${ulmia}. Could it be it?\n*if salvation\n\tA gentle tap on the shoulder startles you.\n\n\t\"The man is from my gang. I think I should kill her. Then you can continue downwards,\" Amelia whispers in your ear.\n\n\tWhat would you do?\n\t*choice\n\t\t#Just nod\n\t\t\tYou are not interested in the details of what she is about to do, so as soon as she starts moving silently towards her target, you sneak to the next level. You don't hear a sound as you go further down.\n\t\t\t*goto sixtyeight\n\n\t\t#Ask Amelia not to kill her\n\t\t\t*set favour +1\n\t\t\tFavour increased by 1.\n\t\t\t*line_break\n\t\t\tAmelia could hardly hide her amazement. It takes her half a minute to grasp what you are trying to tell her.\n\n\t\t\t\"You are a good priest, ${name}. I haven't met any like you in this dirty city. All right, just continue down the stairs. I will catch up with you later,\" she whispers.\n\t\t\t*goto sixtyeight\n\t\t\t\t\t\n\t\t#Ask her to stun her and take the necklace\n\t\t\t*set necklace true\n\t\t\tAmelia is slightly surprised by your request, but decides to fulfill it anyway. She moves silently towards her target as if stepping on a velvet carpet. When she is a foot away from her, she jumps and kicks her head. The knight girl stumbles and her head hits the wall. Amelia removes her necklace and throws it to you, then approaches her fellow gang member and unlocks his chain.\n\t\t\tYou use the moment and descend further, to the fourth underground level.\n\t\t\t*goto sixtyeight\n\n*else\n\tWhat would you choose?\n\t*choice\n\t\t#Attack her\n\t\t\tYou doubt that you can move stealthily towards her, so you charge with your sword. Your opponent seems surprised at first but manages to dodge your attack, then raises the whip. Would you like to move close to her or maintain a fair distance from her?\n\t\t\t*choice\n\t\t\t\t#Distant\n\t\t\t\t\t*set favour -1\n\t\t\t\t\t*set necklace true\n\t\t\t\t\tFavour decreased by 1.\n\t\t\t\t\t*line_break\n\t\t\t\t\tThe task you set for yourself is very difficult. The whip is very long and the girl seems to have a lot of experience with it. She starts hitting you quickly, leaving sore lines on your skin. One well aimed sweep lands in your eye and you are forced to cast a healing prayer.\n\n\t\t\t\t\tThen, you go berserk. The knight can't parry with her weapon and is forced to move back to the wall in her desperation to escape from your blade. You really don't mean to kill her, bit one of her moves makes her neck position just in front of your sword and you decapitate her.\n\n\t\t\t\t\tYou feel sorry for her, but manage to force yourself to bend over the headless corpse, pick the necklace and wipe it with the knight's tabard. It is no doubt Sister ${ulmia}'s necklace.\n\n\t\t\t\t\tYou set the prisoner free and go down the stairway.\n\t\t\t\t\t*goto sixtyeight\n\n\t\t\t\t#Close\n\t\t\t\t\t*set necklace true\n\t\t\t\t\t\n\t\t\t\t\tThe closer distance make her whip wielding very difficult. She manages to hit you a couple of time but without too much force. In her desperation, she moves even closer, jabbing herself on your sword. A scarlet stream springs from her lips and she breathes out for the last time. You feel sorry for her, but she dies too quickly. You pick the necklace and wipe it with the knight's tabard. It is no doubt Sister ${ulmia}'s necklace.\n\n\t\t\t\t\tYou set the prisoner free and go down the stairway.\n\t\t\t\t\t*goto sixtyeight\n\n\t\t#Sneak past her to the next underground level\n\t\t\t*goto sixtyeight\n\n*label sixtyeight\n*page_break\nHere, it smells strongly of big animals with just a little hint of decay. A silent growl attracts your attention. Three big dogs are fighting a ghoul. There is not much left of the undead creature and the canines are nibbling bones that still move. For a second you wonder why the heretics would care to have dogs down here. Then, you realize they may have wanted to have a means of protecting from the ghouls in case things go wrong.\n\nFear overwhelms you when the biggest of them sees you and approaches you. There is more curiosity than aggression in his eyes, yet the sheer size of the predator makes you tremble. Even alone, he would be a very difficult foe to overcome.\n*if animal\n\tThe beast sees the pendant and looks mesmerized. It steps forward and lies in your feet. You get over your fear and pet him, making him turn around so that you can reach his breast. The other two canines watch from a distance, indifferently.\n\n\tYou decide it is high time to continue down. The big dog follows you from a distance.\t\n\t*goto seventythree\n\n*else\n\tIt doesn't seem to mind you going past him down the staircase, however.\n\t*goto seventythree\n\n*label seventythree\n*page_break\nA familiar figure awaits you on the next level.\n\n\"I knew you'd come, Brother.\" It is the knight who abducted Sister ${ulmia}. \"I am Brother Simon. Welcome to my domain. Here is the place where the eternal serum is made. It is the secret ingredient for making ghouls.\"\n\nYou look around. The place looks like an alchemist lab, with lots of vials and cauldrons with bubbling substances.\n\n\"You are mad. And judging from your acts, you are no Brother of mine. But the most important question is where ${ulmia} is.\"\n\nThe knight smiles widely.\n\n\"Don't be so quick. You are right, I am declared an outcast from the Church, a heretic. As for your last question, I may allow you to meet her... after I test the ghouls with you. What can be a greater challenge for them than a devout priest of the Light?\"\n\nHe chuckles and you hear heavy footsteps coming down the stairs.\n\n*if consecration\n\tOnly a couple of ghouls appear from above. Simon expresses his disapproval with a loud scream.\n\t*if stash\n\t\tAs quickly as you can, you blow the whisle. A couple of monsters freeze at their places, and only one continues its rush towards you and quickly falls under your blade.\n\n\t\tSimon is furious.\n\n\t\t\"This is not what I planned for you. And that damned boy, I knew I should have sent him to die sooner.\"\n\t\t*goto eighty\n\n\t*else\n\t\t*set favour -1\n\t\tFavour decreased by 1.\n\t\t*line_break\n\t\tYou have time for only one prayer of smiting before the remaining two ghouls reach you. You hack and slash as quickly as you can, behead the first one, kick the other, making him hit the wall, then slice it as well.\n\n\t\tSimon applauds you.\n\n\t\t\"This was not what I planned for you, but it was a nice performance nevertheless.\"\n\t\t*goto eighty\n\t\t\n\n*else\n\tA horde of ghouls appears from above. You count at least half a dozen of them.\n\t*if stash\n\t\t*set favour -2\n\t\tFavour decreased by 2.\n\t\t*line_break\n\t\tAs quickly as you can, you blow the whisle. A couple of monsters freeze at their places, but the others continue their rush towards you. You have time for only one prayer of smiting before the ghouls reach you. You hack and slash as quickly as you can, behead the first one to bite your neck, kick another, making him hit the wall, then slice it as well.\n\n\t\tIt is one of the best fights of your life despite getting wounded a few times. When the battle is over, you need to catch your breath for a second before saying the healing prayer.\n\n\t\t\"That was impressive. I think I should work more on these ghouls.\" Simon claps. \"I knew I should have sent the boy to die sooner.\"\n\t\t*goto eighty\n\n\t*else\n\t\tYou have time for only one prayer of smiting before the ghouls reach you. You hack and slash as quickly as you can, behead the first one to bite your neck, kick another, making him hit the wall, then slice it as well. Then, the last two ghouls knock you down and bite you to death.\n\n\t\tSimon laughs hysterically just before it is all over for you.\t\n\t\t*goto_scene ending\n\n*label eighty\n*page_break\n\"Now, prepare for your next meeting. You wanted to see your beloved Sister ${ulmia}, right? I bet you'll regret it,\" says Simon with a theatrical tone.\n\nA door opens and a creature comes in. Her gait has nothing to do with Sister ${ulmia}'s, swaying to the sides and dragging her left leg. When she comes closer to the only torch, you see a grotesque reminiscent of your friend, her lips twisted, her eyes filled with contempt.\n\n\"Allow me to explain. I needed another mastermind to control my ghouls and that woman seemed like the perfect candidate, having in mind her supernatural background. I've already changed her mind and I know she can lead a whole army of abominations. Now, I want to see her fight... you.\"\n*if necklace\n\t*set relations +1\n\tRelations increased by 1.\n\t*line_break\n\tYou throw the necklace at her. She extend her arm to stop it from hitting her face and it entangles her fingers. Then ${ulmia} sees it and her eyes sparkle. You hope it is a sign of recognition.\n\t*goto eightytwo\n\n*else\n\t*goto eightytwo\n\n*label eightytwo\n*page_break\nShe gets closer. You rise your sword, knowing that you'd never hurt her, even if that means your doom.\n*if relations>4\n\tAs soon as she is a couple of steps from you, her facial expression changes. Sister ${ulmia} is back! The pair of emerald eyes that watches you is full of love!\n\t*goto eightysix\n\n*elseif relations>2\n\t*set favour -1\n\tFavour decreased by 1.\n\t*line_break\n\tShe is just a couple of meters from you but her face tells only one thing - that she is the predator and you are the prey.\n\n\tYou put your hands on your eyes, unable to watch her any more, whispering a prayer. Then, she touches you... gently. When you look again, her emerald pair of eyes watches you with an avalanche of love. Sister ${ulmia} is back!\n\t*goto eightysix\n\n*else\n\tShe is just a couple of meters from you but her face tells only one thing - that she is the predator and you are the prey.\n\n\tYou put your hands on your eyes, unable to watch her any more, whispering a prayer. Then, the final blow comes, splitting your skull and putting a quick end to your life.\n\t*goto_scene ending\n\n*label eightysix\n*page_break\n\"Why do I need to do everything myself?\" Simon roars and starts transforming. His skin obtains a scarlet colour blemished by black dots and a pair of massive horns appear on his head.\n\n\"Are you surprised? I have a reason to hate the Order of the Cleansed. They are traitors to Devilry and should all die... or strengthen the army of ghouls. Since you aren't going to do the second, allow me to help you with the first, ${ulmia}.\"\n\n\"Only over my dead body.\" You step forward.\n\n\"Gladly.\" He grins.\n\nYou...\n*choice\n\t#smite him\n\t\t*set favour -1\n\t\t*set woundss +1\n\t\tFavour decreased by 1.\n\t\t*line_break\n\t\tThe prayer has exactly the result you anticipate. A sphere of Light engulfs him and burns him, making him wail and curse.\n\t\t*goto eightysixa\n\n\t#do something else\n\t\t*goto eightysixa\n\n*label eightysixa\n*page_break\nYou...\n*choice\n\t*selectable_if (animal) #decide to call your canine friend\n\t\t*set woundss +1\n\t\tYou have forgotten about the dog. Strangely enough, he just sat on the floor during your battle with the ghouls and the close shave encounter with Sister ${ulmia}, but now it comes back to life, attacking the devil. Simon tries to command him to go away but to no avail. The canine bites his leg and only retreats with a big piece of devil meat in his jaws. \t\n\t\t*goto eightysixa\n\n\t*selectable_if (dagger) #give ${ulmia} her dagger\n\t\t*set dagger false\n\t\t*set woundss +1\n\t\tYou gently put the dagger in Sister ${ulmia}'s hand. She smiles widely, cherishing the contact with her favourite weapon, then throws it at Simon. The blade cuts into his shoulder with a thud, followed by his scream.\n\t\t*goto eightysixa\n\n\t*selectable_if (retribution) #say the prayer of retribution\n\t\t*set retribution false\n\t\t*set woundss +1\n\t\tYou remember the prayer Brother John taught you. The effect is similar to the prayer of smiting. The Light forms a vortex around the target, wiping and burning him all over.\n\t\t*goto eightysixa\n\n\t#tried all of the above\n\t\t\"I can take care of myself,\" Sister ${ulmia} shouts, giving you a determined look, then charges the devil.\n\t\t*if relations>4\n\t\t\t*set woundss +1\n\t\t\tThe priestess fights like a cougar, using only her nails and teeth. It seems that Simon taught her well. However, you know that it is you who make her confident and allows her to give the best she can.\n\n\t\t\tNevertheless, Simon manages to deliver a couple of strong blows in her ribs, probably breaking a few. The priestess falls to the ground, her face a grimace of pain.\n\t\t\t*goto ninetytwo\n\n\t\t*else\n\t\t\tThe priestess fights like a cougar, using only her nails and teeth. It seems that Simon taught her an interesting way to fight. However, she doesn't seem confident in it. Simon manages to deliver a couple of strong blows in her ribs, probably breaking a few. The priestess falls to the ground, her face a grimace of pain.\n\t\t\t*goto ninetytwo\n\n*label ninetytwo\n*page_break\nYou can barely watch. Would you heal her?\n*choice\n\t#yes\n\t\t*set favour -1\n\t\t*set woundss +1\n\t\tFavour decreased by 1.\n\t\t*line_break\n\t\tSister ${ulmia} quickly rises on her feet and kick Simon in his mouth, making him spit out a few teeth, just before he punches her again and pins her to the ground.\n\t\t*goto ninetyfive\n\n\t#no\n\t\tYou watch with pain as Simon grabs her by her hair, pulls it up and delivers a blow in her face.\n\t\t*goto ninetyfive\n\n*label ninetyfive\n*page_break\nSomething seems to move in the dark...\n*if salvation\n\t*page_break\n\t*set woundss +1\n\tAmelia appears from the shadows and stabs Simon at the back. You see her rotate her blade before taking it out and leaving the place.\n\n\tYou find it very hard to understand her ways of doing business, but you are quite happy for what she just did.\n\t*goto ninetyseven\n\n*else\t\n\t*page_break\n\tBut it turns out it is just a big rat.\n\t*goto ninetyseven\n\n*label ninetyseven\n*gosub end_trial\n*page_break\nYou raise your sword and attack the devil. He doesn't move until the last second before you hit him, then kicks your hand, disarming you. You have to fight him with you bare hands. Simon is supernaturally strong but seems to be tiring quickly.\n*if favour=0\n\tYou used the power of the light much too often. Out of its favour, there is no hope for you to win. You end up as a rotting ghoul\n\t*goto_scene ending\n\n*elseif woundss\u003c5\n\tYou are not very experienced in unarmed combat and your lack of training shows up. After you receive a couple of heavy punches in your face, he quickly moves behind you, grapples you and starts to strangle you. Slowly but surely, the world around you darkens.\n\t*goto_scene death\n\n*else\n\tThe wounds he received earlier are beginning to show up, making him slower and slower. You don't have much experience in unarmed combat, but manage to punch hard in his face, knocking him down. Then, a series of kicks makes his face a bloody mess. After you make sure he is dead you go to Sister ${ulmia} and carefully help her stand up. You wipe the blood off her face and then kiss her passionately.\n\t*set checkpoint 1\n\t*set favour +9\n\t*set experience +6\n\t*set relations +6\n\t*set dagger cp_dagger\n\t*set cp_key key\n\t*set cp_wine wine\n\t*set cp_instructor instructor\n\t*set cp_clairvoyant clairvoyant \n\t*set cp_freedom freedom \n\t*set cp_salvation salvation\n\t*set cp_consecration consecration\t\n\t*set cp_animal animal \n\t*set cp_stash stash \n\t*set cp_necklace necklace\n\t*set cp_retribution retribution \n\t*set cp_east east \n\t*set cp_west west \n\t*set cp_name name \n\t*set cp_favour favour \n\t*set cp_relations relations \n\t*set cp_experience experience \n\t*set cp_devilry devilry \n\t*set cp_exorcist exorcist \n\t*set cp_confessor confessor \n\t*set cp_healer healer \n\t*set cp_prophet prophet \n\t*set cp_zealot zealot \n\t*set cp_damage damage\n\t*set cp_wounds wounds \n\t*set cp_woundss woundss \n\t*set cp_shield shield \n\t*set cp_promise promise \n\t*set cp_vine vine \n\t*set cp_pup pup \n\t*set cp_fur fur \n\t*set cp_witch witch \n\t*set cp_sphere sphere \n\t*set cp_knowledge knowledge \n\t*set cp_shade shade \n\t*set cp_glow glow \n\t*set cp_xx xx \n\t*set cp_ex ex \n\t*set cp_clean clean \n\t*set cp_zombies zombies\n\t*set cp_slash slash \n\t*set cp_nail nail \n\t*set cp_feather feather \n\t*set cp_fel fel \n\t*set cp_transformation transformation \n\t*page_break\n\tCheckpoint reached. If you perish, you may restart at this point.\n\t*goto_scene pre_mine\n\n*label end_trial\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first chapter is available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n*purchase adfree $3.99 purchased\n*abort", "mine": "*page_break\n\"Xavier, they arrived.\" You hear a hissing voice coming from the back of the cage and see the movement of two humanoid creatures. The scales, protruding fangs and long tails mark them as lizardmen. One of them has a muscular body and a sword in his clawy hand. He raises it while charging. The other has a much thinner frame and stays in its place, picking up a crossbow. You are pretty sure Sister ${ulmia} saw the ranged weapon too.\n\nYou can try to parry the attack of the sword wielder, giving ${ulmia} the opportunity to deal with the other lizardman. Alternatively, you could try to knock the swordsman down, run past him and go for the marksman. If you think these creatures are demons, a prayer of smiting might be the best way to deal with them. Unleashing the devil form of Sister ${ulmia} might be a dangerous act here in the abyss, but her fighting capabilities would improve dramatically. The final course of action that occurs to you is breaking the sphere.\n\nWhat is your choice?\n*choice\n\t#Face the melee fighter\n\t\t*goto sevnine\n\n\t#Go for the marksman\n\t\t*goto eitzero\n\n\t#Smite them\n\t\t*goto eitone\n\n\t#Try breaking the sphere\n\t\t*goto eittwo\n\n\t#Use the medallion\n\t\t*goto eitthree\n\n*label sevnine\n*set relations +1\nExperience increased by 1.\n*line_break\nYou know that Sister ${ulmia}'s weapons can be used as projectiles and you hope that she will do so. At the same time, your sword is good for parrying the incoming attack. You manage to do so, taking the lizardman off balance. He appears to be too close for you to use your blade efficiently, so you give him a strong kick to move him away from you and cut his leg. Your opponent drops his weapon and falls to the ground one claw on the wound, the other up in the air. You take the gesture as a sign of surrender. Meanwhile, you see that Sister ${ulmia} has managed to deal with the crossbow-armed attacker, the handle of her dagger sticking out from his shoulder, the blade planted deep inside it, the ranged weapon fallen on the floor. The priestess quickly gets to him, making him take a defensive stance.\n\n\"It won't hurt... much,\" she says while taking her mercy blade out.\n\n\"Litza, I told you it was a mistake to do that,\" says the lizardman just in front of you.\nIt was only then that you realize that the other one is female.\n*goto eitfour\n\n*label eitzero\n*set favour -1\nFavour decreased by 1.\n*line_break\nThe task you set for yourself is very difficult. You can't block the attack of the sword-wielding lizardman as it would give too much time to the shooter.\n\nYou try to dodge the incoming blow and almost succeed as the blade reaches your shoulder cutting a bit of flesh. Yet, the wound doesn't stop you from retaliating, your sword sinking into the calf of your opponent. He shrieks in pain but swings his blade again as you move past him. With your peripheral vision, you see a Sister ${ulmia}'s dagger sink into his uninsured foot, bringing him down.\n\nAs you close on the second lizardman, the second mercy blade swishes next to your ear and lands in the monster's claw just as he's about to shoot, making him drop the crossbow. You hit him with the broad side of the blade and make him fall to the ground. As your attackers seem to have no intention of continuing the attack, you cast a mending prayer and sigh in relief as the Light heals your shoulder.\n\n\"Litza, I told you it was a mistake to do that,\" says the lizardman just in front of you.\nIt was only then that you realize that the other one is female.\"\n*goto eitfour\n\n*label eitone\n*set favour -2\nFavor decreased by 2.\n*line_break\nThe logic behind smithing the lizardman seems strong. You are in the abyss and these creatures are most likely spawn of the Darkness. You see the familiar glow that surrounds both monsters and expect to see them wriggling in pain... But nothing like that happens. The one with the sword strikes you before you can parry. Luckily, you move back a bit and the blade aimed for your neck connects with your shoulder. You grit your teeth and raise your sword, ignoring the pain as you deliver a blow after a blow. It seems the lizardman is not very good with the sword as he falls for your first feint. You blade cuts deep into his thigh, making him drop his weapon and fall to the ground, one hand on the wound, the other up in the air as a sign of surrender.\n\nMeanwhile Sister ${ulmia} managed to deal with the one with the crossbow. You see her taking her daggers out of his shoulder, where it must have been planted deeply, the marksman sitting on the ground. He also seems to have no intention of continuing the fight.\n\n\"Litza, I told you it was a mistake to do that,\" says the lizardman just in front of you.\nIt was only then that you realize that the other one is female.\n*goto eitfour\n\n*label eittwo\n*set experience +1\n*set sphere true\nExperience increased by 1. \n*line_break\nYou certainly feel qualms about breaking something infused with the power of the Light, however, you guess that if lizardmen are cold blooded like the animals they resemble, the lack of heat would make them slower. You raise your sword over the sphere.\n\n\"Stop!\" the Lizardmen shout simultaneously, dropping their weapons.\n\n\"Please, don't break it. We'd be lost without it.\"\n\n\"Litza, I told you it was a mistake to do that,\" says the lizardman just in front of you.\nIt was only then that you realize that the other one is female.\n*goto eitfour\n\n*label eitthree\n*set devilry +2\nDevilry increased by 2.\n*line_break\nYou feel quite nervous searching for the medallion while the lizardman advances on you with a raised sword.\n\nYour fingers tremble and you almost forget the prayer of releasing. And this is all you needed to do for the whole battle.\n\nSister ${ulmia}'s incarnation jumps high on the air and throws her twin daggers simultaneously. One of them reaches the swordsman's foot, making him tumble and fall, dropping his weapon a couple of meters away from him. He puts one of his claws on his wound, the other up in the air as a sign of surrender.\n\nThe second dagger lands deep in the shoulder of the crossbow wielding monster, making him also drop his weapon.\n\nSister ${ulmia} runs past you and takes her blade out of the foot of the monster in front of you, making him shriek in agony. Then, she virtually jumps on the marksman. You have the feeling that she is absolutely out of control. Do you want to stop her?\n*choice\n\t#Yes\n\t\t*goto eitfive\n\n\t#No\n\t\t*goto eitsix\n\n*label eitfour\n*page_break\n\"Okay, lizardmen, would you please tell us who and what you are and why you decided to attack us on sight?\" you ask.\n\nLitza clears her throat:\n\"We used to be members of the militia guarding the mine while it still functioned. After the entrance collapsed, we were trapped inside. We were lucky to be close to that sphere, radiating Light, otherwise we'd become pinkies like everybody else,\" she explains.\n\nThe way she says 'pinkies' makes you shiver.\n\n\"We still couldn't retain our humanity and turned into such monsters,\" says Xavier\nLitza hides her face in her hands.\n\n\"I still want my perfect jet black hair. I can't take it any more.\"\n\n\"Did you attack us just because you wanted my hair?\" asks ${ulmia}.\n\nLitza bursts onto crying, so Xavier speaks instead:\n\"We want to leave this place. Our commander said that the only way for us would be to kill whoever came here and use their right of leave.\"\n\n\"What do you mean by right of leave?\" you ask.\n\n\"If one person comes inside the damned mine, one can leave. However, there's no need to be one and the same,\" he explains. \" and, if we leave, we would be the same as before, he said.\"\n\n\"Who's that commander?\" ${ulmia} asks with a sparkle in her eyes.\n\n\"His name's Atoro and is probably the only one who didn't change.\"\n\n\"Where can we find him? Speak, animal!\" The priestess gets impatient.\n\n\"I don't know, madam. He seldom comes here these days and we only leave this chamber to hunt rats and gather mushrooms. It feels rather chilly away from the sphere. It also keeps most of the creatures that want to attack us away. Including the pinkies,\" he explains.\n\n\"Is it dark in those tunnels?\" asks the priestess.\n\n\"Our night vision is much better now that we are changed, but I guess you'd have little problem as well. There are glowing mushrooms everywhere.\"\n\nDid you threaten to destroy the sphere?\n*choice\n\t*selectable_if (sphere) #Yes\n\t\t*goto eitsev\n\n\t#No\n\t\t*goto eiteit\n\n*label eitfive\nYou grasp the medallion and pray fervently for the Light to regain her human form before she does something she might regret. You see her slow down, then gently pull the dagger from the lizardman's shoulder. ${ulmia} then looks at you, panting and you can swear you see gratitude in these emeralds.\n\n\"Litza, I told you it was a mistake to do that,\" says the lizardman just in front of you.\nIt was only then that you realize that the other one is female.\n*goto eitfour\n\n*label eitsix\n*set devilry +1\nDevilry increased by 1.\n*line_break\nA split second later you realize your mistake. Sister ${ulmia} grasps the handle of the dagger sticking out of the monster's shoulder but instead of removing it, she rotates it. Then, she takes it out only to jab the helpless creature again.\n\nYou grasp the medallion and pray fervently for the Light to regain her human form before she kills the lizardman. The Light is quick to answer your call. The priestess halts her hand on its way to strike and puts it on her mouth.\n\n\"Litza, I told you it was a mistake to do that,\" says the lizardman just in front of you.\nIt was only then that you realize that the other one is female.\n*goto eitfour\n\n*label eitsev\n\"Before you go, I want to ask a favour of you,\" says Litza. \"A few weeks ago, Atoro commanded us to go to the lava lake and search for his favourite sword. He said he lost it there after being disarmed in a fight against a group of pinkies and he couldn't find it after defeating them. Of course, we didn't dare go there and he never came back afterward. If you happen to go by the fire lake, would you try to find it?\"\n\"What's so special about this weapon?\" you ask.\n\n\"There must be something magical about it. It is rumoured that the blows he delivers with it are so strong that basically, you can't parry them.\" Xavier shrugs.\"I believe he might have found it already.\"\n\n\"We'll see what we can do about it,\" you say.\n*goto ninezero\n\n*label eiteit\nBoth Litza and Xavier suffered injuries during the fight. Would you like to heal them?\n*choice\n\t#Yes\n\t\t*goto eitnine\n\n\t#No \n\t\t*goto nineone\n\n*label eitnine\n*set favour -1\n*set experience +1\nFavour decreased by 1. Experience increased by 1.\n*line_break\nYou cast a prayer for basic healing, making sure their wounds bind and no infection takes place and apologize that you can't fully make them recover as it would be too taxing.\n\"We are grateful for what you did for us,\" says Xavier.\" Some say Atoro has such powers but he never used them to make any of us feel better, even when an infernal snake bit Litza and she was delirious,\" the lizardman spits in contempt.\n\n\"Priests can't always use their prayers, there must have been something urgent for him to ask of the Light,\" ${ulmia} assumes.\n*goto eitsev\n\n*label ninezero\n*page_break\nYou bid the lizardmen farewell and go down the tunnel. It does take some time for your eyes to get used to the dim light.\n\n\"Have you ever seen such fungi before?\" Sister ${ulmia} points at the glowing ones scattered virtually everywhere. In fact, it is hard to avoid stepping on them.\n\"I've only head of them. Some fungi are said to be able to accumulate whatever Light is available around them. You see, even in the abyss, these fellows continue to fight. This is amazing!\" you explain.\n\n\"Can we obtain some of the Light stored in them? I've seen you cast a few prayers since we met last night. Maybe if you eat one of them, you can restore some favour,\" she suggests.\n\n\"I don't know if it would work that way. Maybe I should pray for that knowledge. It could be useful.\"\n\n\"It may also be wise to pick one or two just in case we go to an area without any source of light,\" she proposes.\n\n\"There seem to be several species,\" you note. \"Some of them have large red dots on their caps, others have no caps at all. Still other are shapeless, resembling dough spread on the rocky walls.\n\nWhat do you do?\n*choice\n\t#Forget about mushrooms and move on\n\t\t*goto hzeroone \n\n\t#Pray for knowledge\n\t\t*goto ninetwo\n\n\t#Pick up a capless mushroom\n\t\t*goto ninefive\n\n\t#Pick up a dotted mushroom\n\t\t*goto ninethree \n\n\t#Pick up a shapeless mushroom\n\t\t*goto ninefour\n\n*label nineone\nYou have the feeling that the lizardmen want to tell you something but wouldn't dare do so. It might be fear, or regret for attacking you. Would you like to confess them?\n*choice\n\t#Yes\n\t\t*goto twofournine\n\n\t#No\n\t\t*goto ninezero\n\n*label twofournine\n*set favour-1\nFavour decreased by 1.\n*line_break\nYou say the prayer in your mind and you see how their expressions change, obviously the aura of confession making them regard you as more friendly.\n\n\"Is there anything you want to tell me?\" you ask the creatures.\n\n\"Before you go, I want to ask a favour of you,\" says Lisza. \"A few weeks ago, Atoro commanded us to go to the lava lake and search for his weapon. He sais he lost it there after being disarmed in a fight against a group of pinkies and he couldn't find it after defeating them. Of course, we didn't dare go there and he never came back afterward. If you happen to go by the fire lake, would you try to find it?\"\n\n\"What's so special about this weapon?\" you ask.\n\n\"There must be something magical in it. It is rumoured that the blows he delivers with it are so strong that basically, you can't parry them.\" Xavier shrugs.\"I believe he might have found it already.\"\n\n\"We'll see what we can do about it,\" you say.\n*goto ninezero\n\n*label ninetwo\n*set favour -1\n*set knowledge true\nFavour decreased by 1.\n*line_break\nThe prayer is quick, but the Light enlightens you with the knowledge about the glowing mushrooms you need. The capless ones are called angel fingers, the dotted - flower sprays, and the dough-like are known as maker's clay.\n\nMaker's clay tends to be very aggressive when cut or otherwise contacted with, so you should avoid interacting with it in any way.\n\nAngel fingers are poisonous if eaten but tend to remain glowing for days after been picked up.\n\nFlower sprays are edible but in order to obtain the favour stored in them, you need a special prayer which you now know.\n\nWhat do you do?\n*choice\n\t#Forget about mushrooms and move on\n\t\t*goto hzeroone\n\n\t#Pick up a capless mushroom\n\t\t*goto ninefive \n\n\t#Pick up a dotted mushroom \n\t\t*goto ninethree\n\n\t#Pick up a shapeless mushroom\n\t\t*goto ninefour\n\n*label ninethree\nYou remove a dotted mushroom from the wall without any difficulty and immediately spot some spores (also glowing) sticking to your fingers.\n\nWhat would you do with the mushroom?\n*choice\n\t#Eat it\n\t\t*goto ninesix\n\n\t#Put it in your stash\n\t\t*goto ninesev\n\n\t*selectable_if (knowledge) #Say your newly-learned prayer\n\t\t*goto nineeit\n\n*label ninefour\n*set favour -1\nFavour decreased by 1.\n\nYou try to remove a shapeless mushroom with your fingers but it appears to be rock hard and stuck to the rocks. So, you ask Sister ${ulmia} to lend you one of her blades. She sighs, not used to giving any of her weapons to anyone, but still fulfills your wish. As soon as you stick the blade in the mushroom, it explodes, filling your eyes with sharp spores. You try to remove them and cut the inside of your eyelids in the process. Luckily, a mending prayer makes you feel better.\n\nWould you like to pick another mushroom?\n*choice\n\t#Yes - a dotted one\n\t\t*goto ninethree\n\n\t#Yes - a capless one\n\t\t*goto ninefive\n\n\t#Not yet - cast a prayer of knowledge\n\t\t*goto ninetwo\n\n\t#No - continue on your way\n\t\t*goto hzeroone\n\n*label ninefive\nThe capless mushrooms appear to be very fragile and you completely waste a couple of them while picking them up before you get the knack of it. What do you do next?\n*choice\n\t#Eat it\n\t\t*goto ninenine\n\n\t#Put it in your stash\n\t\t*goto onehundred\n\n*label ninesix\nThe mushroom is tasty but you don't feel touched by the Light in any way. What do you do next?\n*choice\n\t#Forget about mushrooms and move on\n\t\t*goto hzeroone \n\n\t#Pray for knowledge\n\t\t*goto ninetwo\n\n\t#Pick up a capless mushroom\n\t\t*goto ninefive\n\n\t#Pick up another dotted mushroom\n\t\t*goto ninethree\n\n\t#Pick up a shapeless mushroom\n\t\t*goto ninefour\n\n*label ninesev\n*set shade true\nYou are careful not to damage the mushroom as you put it in your belt. Would you like to pick another one?\n*choice\n\t#No - move on\n\t\t*goto hzeroone\n\n\t#Pray for knowledge\n\t\t*goto ninetwo\n\n\t#Pick up a capless mushroom\n\t\t*goto ninefive\n\n\t#Pick up a shapeless mushroom\n\t\t*goto ninefour\n\n*label nineeit\n*set favour +3\nFavour increased by 3.\n*line_break\nThe prayer is a long one, but you really feel the power of the Light accumulate within you with every word you say. More than ever, you are sure that the current quest will be successful.\n\nWould you like to pick another mushroom?\n*choice\n\t#No - move on\n\t\t*goto hzeroone\n\n\t#Pray for knowledge\n\t\t*goto ninetwo\n\n\t#Pick up a capless mushroom\n\t\t*goto ninefive\n\n\t#Pick up a shapeless mushroom\n\t\t*goto ninefour\n\n*label ninenine\n*set favour -2\nFavour decreased by 2\n*line_break\nThe mushroom is very sweet and tasty but as soon as you eat it, you feel weak and your stomach burns. You try to throw up and manage to take some of it out. Just before you black out, you say a cleansing prayer.\n\nYou are very happy when you open your eyes and see the beautiful Sister ${ulmia} holding your head in her lap.\n\n\"You scared me,\" she says. \"Do you feel better?\"\n\n\"I do, but I'd like to stay a bit longer where I am now,\" You can't help but crack a smile.\"\nWould you like to pick another mushroom?\n*choice\n\t#Forget about mushrooms and move on\n\t\t*goto hzeroone\n\n\t#Pray for knowledge\n\t\t*goto ninetwo\n\n\t#Pick up a capless mushroom\n\t\t*goto ninefive\n\n\t#Pick up a dotted mushroom\n\t\t*goto ninethree\n\n\t#Pick up a shapeless mushroom\n\t\t*goto ninefour\n\n*label onehundred\n*set glow true\nYou are careful not to damage the mushroom as you put it in your belt. Would you like to pick another one?\n*choice\n\t#No - move on\n\t\t*goto hzeroone\n\n\t#Pray for knowledge\n\t\t*goto ninetwo\n\n\t#Pick up a capless mushroom\n\t\t*goto ninefive\n\n\t#Pick up a shapeless mushroom\n\t\t*goto ninefour\n\n*label hzeroone\n*page_break\nAs you walk down the tunnel, it gradually widens. The air becomes thick with the smell of mould and dust. You have no idea how deep you've gone, as every step is just like the one before.\n\nAll of a sudden, you hear shouts and metal clinking. The tunnel ends into a vast cavern and there you see them. Pinkies, the lizardmen called them and you realize why. At first glance, they look like humans, though hunched and grotesquely hairless. They skin almost glows in pale purple in the scarce light provided by the mushrooms.\n\nThere are three of them - two larger, armed with long spears and a smaller feminine figure, who seems to be their leader. She keeps shouting as if trying to encourage them to continue their hunt. The prey is a creature that makes your blood run cold. His posture is almost human but the face is a lupine nightmare with massive jaws. His long black fur is smeared with blood from the numerous wounds done by the pinkies.\n\n\"Could it be a werewolf?\" you ask Sister ${ulmia}.\n\n\"I don't know. There might be all kind of creatures of the Darkness here.\"\n\nThe wolf-like creature tries to evade the spears, only to get cornered. He waves his paws and an enormous plant appears from the stone floor, spraying rocks as it comes out and grasps the feet of the two pinkies with its roots, buying its master the necessary time to jump past them.\n\nIf the lupine creature had any hope to lose the hunting party, they ended when he almost bumped into a vortex of twisting darkness, stopping his escape. The female pinkie chuckles and sends a firebolt at her prey. You can smell the cocktail of burnt fur and meat.\nThey are all oblivious to your presence, but you guess the battle will end up very soon, as the fire would not stop, spreading from the chest of the beast up to its head.\n\n\"This is not the simple fire I've seen druids summon. The crone wields the powers of the Darkness,\" ${ulmia} whispers in your ear.\n\nThe wolf-like monster summons a shower just over its head, the water sparking just like the holy one you prepare in your church for special occasions. So, the predatory fire is extinguished, but meanwhile the pinkie leader is preparing a new spell. And, back in the caverns, the other abominations shred the plant to pieces. This is going to be a one way battle, unless you decide to intervene. You could be the only hope for the lupine monster. Also, you may want to help the pinkies in an attempt to befriend them.\n\n\"That woman, she gives me the creeps,\" says ${ulmia}. \"Please, don't use my devil form. I wouldn't be able to resist.\"\n\nYou don't make out what she wouldn't resist, but your guess is now it's not the time to ask. Anyway, you decide to listen to her warning.\n*choice\n\t#Attack the hairy monster\n\t\t*goto hzerotwo\n\n\t#Attack the pinkies\n\t\t*goto hzerothree\n\n*label hzerotwo\nYou prepare your sword and charge. You don't need to turn around to know that Sister ${ulmia} is right behind you, her blades in her hands. The crone stares at you with her sinister eyes.\n\n\"Stop!\" she shouts at you. \"Priest, you don't need to interfere with our business or you could spoil the tainted energies I need. I'll need you later. But you, sweetie, you come just in time.\"\n\nYou realize you are unable to move.\n\n\"Don't be shy, darling,\" says the old pinkie. \"LET IT OUT.\"\n\nThe priestess acquires her devil form in an istant.\n\n\"Hunt, my girl and I promise you a lot of souls,\" the crone chuckles.\n\n${ulmia} rushes towards the wolf-like beast, who seems to be too wounded to escape. He tries to defend, but she dismembers him with a few deadly strikes. She then takes a sip from one of his wounds, and spits.\n\n\"What is it darling?\" the crone asks.\n\n\"That soul tastes awful,\" ${ulmia} explains.\n\n\"I understand. Then, try that priest you brought along. I'm sure he'll be sweeter.\" ${ulmia}'s eyes meet yours and you feel chills down your spine.\n\n\"He is my... I can't.\"\n\n\"Do it, darling. DO AS I SAY,\" the pinkie commands...\n*goto_scene death\n\n\n*label hzerothree\n*set experience +1\nExperience increased by 1.\n*line_break\nYou come from behind the crone. She is too busy preparing her spell to hear you before you are a few steps behind her. She turns around to face you, stunning you with her jet black eyes, full of hatred and demons. The lupine uses the moment to leap on her back and bite her neck, removing half of it and then spitting it on the floor in disgust. Tar-like blood springs at regular intervals from the artery, until her heart stops.\n\nYou look at the bloody muzzle. No doubt, an instrument for bringing swift death, but the pair of eyes above them... they are so cunning and noble.\n\nSuddenly, you feel sucked in by an air current. It is the dark vortex, trying to engulf you. With your periphery vision, you see the other two pinkies attacking Sister ${ulmia}, one of them piercing her ankle. You cry in anger, feeling desperate, too frustrated to even pray.\nThe force pulling you from behind disappears. A low growl hints you that it was the lupine spellcaster that made you free. You look at him, his gaze fixed on the battle at the other side of the cavern. Understanding that you are together, he runs in that direction and you are certain its intentions are pure. The problem is that he is too injured, his efforts to move unable to match the speed you saw the beast manifest earlier in the fight. Would you like to heal him, or waste no more time and run to help ${ulmia}?\n*choice\n\t#Heal\n\t\t*goto hzerofour\n\n\t#Run\n\t\t*goto hzerofive\n\n*label hzerofour\n*set favour -2\n*set experience +2\nFavour decreased by 2. Experience increased by 2.\n*line_break\nYou try to say the sacred words as quickly as possible and the flash of Light hits the monster almost instantly, replacing the charred flesh with new. Only the missing and burned hairs suggest of its grave wounds. The beast takes the distance to Sister ${ulmia} in a couple of leaps - as long as his massive body would allow. He takes one of the pinkies by surprise, ripping his heart out with a couple of hits of his claws. The second manages to swing his spear a few times, before the lupine bites his neck and grants him a swift death
