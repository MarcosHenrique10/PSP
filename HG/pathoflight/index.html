 body against yours and lets her head rest on your shoulder.\n\n\"I'm so sorry that the one you considered your father turned out to be corrupt,\" you whisper in her ear.\n\n\"I expected that. Too bad I just refused to believe in it. I just denied my common sense and intuition. Whatever, this will be a lesson for me. I have to fight my own corruption or else end up like Atoro.\"\n*goto tzeroeit\n\n*label tzeroeit\n*page_break\nYou realize you're not alone. Next to you, there is a magnificent creature. She looks like a young woman with proportions as if cut out by a master sculptor, and, she radiates coldness as if she's really a statue made from flesh, devoid of emotions. Her hair and skin are snow white, just like the pair of wings on her back.\n\n\"You defeated my favourite champion. This whole place remained in the Abyss because of him. He was the anchor. Now, it's all over.\"\n\n\"Who, in the name of the Light are you?\" you ask her.\n\n\"I'm known as the angel of frost, but I can assure you that I no longer share anything with the Light of yours.\"\n\n*page_break\n\nSuddenly, the earth shatters. Large chunks of rocks start falling. You feel ${ulmia}'s arms clench yours. The angel of frost doesn't move. Is she invincible, you ask yourself.\n\n\"It will soon be over,\" she says with a serene voice. \"The damned mines will be back out of the Abyss and my reign here will be over. What is worse, I won't be free for now. I just don't have the energy to escape.\"\n\nShe looks at you with her icy eyes.\n\n\"${name}, it would be easiest for me to crush the soul of that beautiful half-devil priestess you care about. But I won't do that, Brother, I won't hurt you that bad. I belonged to the Light and still harbor respect for it. However, I can't let you go without any insurance. Sister ${ulmia}'s staying with me, until you defeat a demon.\"\n\nYou feel something burning on your chest.\n\n\"No need to moan, ${name}. It is a simple sigil that would ensure the next creature of Darkness you defeat will go right into my mouth.\" She shows her perfectly white long canines.\n\n\"That is nonsense! Where do I find a demon?\" you scream.\n\n\"Don't make me laugh, I know something about the prophecy you are victim of. You will suffer only for a while without your beloved. I'm sure Clarissa will help you. Now, tell her goodbye.\"\n\n\"No,\" you shout.\n\n\"Wasting your precious moments with denial will do you no good,\" the angel of frost states.\n\nThen, in a spit of a second, your surroundings change.\n*if favour\u003c1\n\tYou feel like sinking in endless darkness. Suffocating, you reach for the Light again with a prayer... but it is no longer there for you. It seems you used its favour too much and now when you need it most, you have none left. You never return out of the Abyss.\n\t*goto_scene death\n\n*else\n\tYou are no longer in the cave, but in the confessions chamber. Sister ${ulmia} is no longer with you, even though you swear that you can feel her fingers on your forearms. Clarissa, however, is just in front of you.\n\n\t\"I admire the strength of your belief, Brother. You managed to lift the curse of the mines,\" she says.\n\n\t\"But I left ${ulmia} there.\" You can hardly fight the tears any more. In the name of the Light, you could still smell her aroma.\n\n\t\"Father, I'll pray for your peace of heart. Believe in what the angel of frost said as it is the truth. You'll shortly be with Sister ${ulmia} again. Just relax and let the Light flow into you.\"\n\n\tYou breathe deeply and feel some of your pain retreat.\n\n\t\"The next hours might be critical, ${name}. I will help you as much as I can, but it means you can summon me only once, as my stay in the abyss taxed me greatly. Farewell.\"\n\n\tShe vanishes. And you feel urgent to go out in the open air.\n\t*set checkpoint 3\n\t*set dagger cp_dagger\n\t*set cp_key key\n\t*set cp_wine wine\n\t*set cp_instructor instructor\n\t*set cp_clairvoyant clairvoyant \n\t*set cp_freedom freedom \n\t*set cp_salvation salvation\n\t*set cp_consecration consecration\t\n\t*set cp_animal animal \n\t*set cp_stash stash \n\t*set cp_necklace necklace\n\t*set cp_retribution retribution \n\t*set cp_east east \n\t*set cp_west west \n\t*set cp_name name \n\t*set cp_favour favour \n\t*set cp_relations relations \n\t*set cp_experience experience \n\t*set cp_devilry devilry \n\t*set cp_exorcist exorcist \n\t*set cp_confessor confessor \n\t*set cp_healer healer \n\t*set cp_prophet prophet \n\t*set cp_zealot zealot \n\t*set cp_damage damage\n\t*set cp_wounds wounds \n\t*set cp_woundss woundss \n\t*set cp_shield shield \n\t*set cp_promise promise \n\t*set cp_vine vine \n\t*set cp_pup pup \n\t*set cp_fur fur \n\t*set cp_witch witch \n\t*set cp_sphere sphere \n\t*set cp_knowledge knowledge \n\t*set cp_shade shade \n\t*set cp_glow glow \n\t*set cp_xx xx \n\t*set cp_ex ex \n\t*set cp_clean clean \n\t*set cp_zombies zombies\n\t*set cp_slash slash \n\t*set cp_nail nail \n\t*set cp_feather feather \n\t*set cp_fel fel \n\t*set cp_transformation transformation \n\t*page_break\n\tCheckpoint reached. If you perish, you may restart at this point.\n\t*goto_scene demonologist\n", "pre_mine": "\nAlmost a full year passes since the day you defeated Brother Simon. You are sent back to your village to serve as the local priest and Sister ${Ulmia} decides to follow the trail of a renown paladin.\n*page_break\nYou stare at the two moons through the glass roof of the temple of the Light. They are both almost full, standing above the horizon, close to each other. It is time for the midnight prayer, but the words don't come easy. You feel dull anxiety. It isn't because of the superstition about the approaching double full moon, happening once in several lifetimes. You don't believe in that gibberish, nor the nightmares that have tormented you the last few days.\n\nAccording to her lavender scented letter, Sister ${ulmia} was supposed to visit you yesterday, but she didn't come and you are worried that something bad might have happened to her... Even the thought of her makes your heart beat faster. It is considered normal for priests to have romantic relations with each other... and she's no ordinary priestess of the Light. You are among the very few who know it, but she was a devil captured by the renowned paladin Atoro. His Holiness made her undergo the Ritual of Transformation, making her human and allowing her to become a servant of the Light.\n\nYou mouth a silent prayer for her and try to evoke the midnight prayer. There is a howling of the wind, a whistling at the corners of the church. You stop for a moment. The noise resembles a voice, not a human voice, but you can clearly discern the words.\n\n\"Come out... Brother ${name}. I must speak with you...Now.\"\n\nYou instinctively reach for your sword. Even blessed, the blade would do little damage to an immaterial entity like the demon that you suppose is the one calling you out.\n\nYour exorcist education has taught you that the demon can't enter the sanctuary of the church. Moreover, he can't hear or even sense you from inside. Probably the only thing to make it believe you are inside is that you tend to be here every night. Though dangerous, it might actually be a good idea to go out and talk to the demon. You are a priest after all. If anyone can be safe in the presence of a demon, it is one that wears a white cassock. Besides, it may tell you something valuable, albeit likely mixed with lies.\n*choice\n\t#Stay inside\n\t\t*goto zerotwo\n\n\t#Go out\n\t\t*goto zerothree\n\n*label zerotwo\nPerhaps infuriated by your refusal to go outside, the demon vents its rage. You hear objects falling onto the glass roof and pray that the blessed material won't shatter, you hear scratching, bestial growls and screams, and you even hear the demon bashing against the church door and fear that the wooden barrier will not hold. It is only when you draw your sword and approach the door, that the demon finally ceases its efforts.\n\nYou sigh in relief. Being under siege by a creature of the Darkness is most unpleasant even for a priest.\n\nAll of a sudden, the door opens and someone... or something enters the church. Being quite nervous, you instincts urge you to attack the newcomer while still having the element of surprise. On the other hand, it may be a good idea to wait for a second.\n*choice\n\t#Attack\n\t\t*goto oneone\n\t#Wait\n\t\t*goto onetwo\n\n*label zerothree\nYou leave the church and the cold wind tries to stab you through your cloak and blind you with dust. Next to the big oaks in front of you, you see a silhouette in the moonlight.\n\"Come closer, Brother ${name},\" he hisses. You decide that the voice sounds to low not to be male.\n\nYou approach him cautiously, weighing out the alternatives. Prayer of smiting comes naturally to your mind. This is certainly what all creatures of the Dark deserve. However, you came out of the church with the idea of listening to the demon. A prayer of protection from evil is the next option and it will almost certainly make you invulnerable to his attack ... in case he launches one. Finally, you may refrain from prayers in order to preserve Favour.\n*choice\n\t#Smite him\n\t\t*goto zerofour\n\n\t#Cast prayer of protection\n\t\t*goto zerofive\n\n\t#Just approach him\n\t\t*goto zerosix\n\n*label zerofour\n*set favour -1\n*set experience +1\n*set wounds +1\nFavour decreased by 1. Experience increased by 1.\n*line_break\n\"In the name of the Light...\" you whisper as you step on.\n\nThe demon chuckles:\n\"I didn't think you would leave your shell, holy one.\"\n\n\"... I banish you demon back into the realm of perpetual Darkness. May the Light have no mercy on you, as you have none for its servants,\" you shout the last words of the prayer. The demon turns into a moving pyre and as much as you are used to this sight, you need to move your eyes away lest be blinded.\n\n\"We'll meet again, Brother. This time, it won't be easy for you,\" he manages to say before disappearing. You have the uneasy feeling that you were unable to send him away for too long.\n\nSuddenly, the wind disappears too. You return to the church, coughing from the smell of sulphor left from the demon.\n*goto zeroseven\n\n*label zerofive\nFavour decreased by 1. Experience increased by 2.\n*line_break \n*set favour -1\n*set experience +2\n*set shield true\n\n\"May the Light grant me as its faithful servant the blessing of protection from the Darkness and all its minions,\" you say and a faint glow engulfs you. The demon must have seen it, as he growls:\n\n\"Coward! You priests always cry for that damned Light of yours. Maybe you are right, you should fear me, after all\"\n\n\"I don't trust you or any of your kind, demon,\" you say in a calm voice. \"The right word is caution, not fear,\" you say and move closer.\n\n\"Stay there, please, that thing stinks,\" murmurs the demon.\n*goto zerosix\n\n*label zerosix\n*page_break\nExperience increased by 1.\n*line_break\n\"I don't have much time to spend here,\" pants the demon. \"Even at this time of the day, it takes a lot of energy.\" His voice suddenly fills with malice. \"The one who you love will hate you. The one you trust will betray you. The ones you need to protect will all die by my will when the two moons are full. The ruins outside town will be your burial ground...\"\n\n\"Why...why are you telling me this? What do you want from me?\"\n\n\"Die, please. You are the only one that can stop me from turning this town into a wasteland graveyard,\" he hisses.\n*if shield\n\t*goto zeroeight\n\n*else\n\t*goto zeronine\n\n*label zeroseven\n*page_break\nThe midnight prayer makes you temporarily forget about the issues tormenting you. It is like a meditation that allows you to regain your emotional balance once you give up to it. You are so concentrated, that you don't realize someone opened the door and came all the way to the altar, until she speaks.\n\n\"Well, Brother, I knew I'd find you praying. You're a good priest, this is why I love you.\"\nA broad smile appears on you face as you turn to see her. Sister ${ulmia} has arrived.\n*goto onethree\n\n*label zeroeight\nThe demon remains quiet for a few seconds and you decide that he will probably disappear soon. Now that you have listened to him, you are tempted to cast prayer of smiting. On the other hand, it might be a better idea to preserve favour of the Light.\n*choice\n\t#Smite him\n\t\t*goto zerofour\n\n\t#Don't smite him\n\t\t*goto onezero\n\n*label zeronine\n*set experience -1\n*set favour -1\nExperience decreased by 1. Favour decreased by 1. \n*line_break\nJust as you think the demon is about to leave, he leaps on you. You feel his ice cold paws jab into your chest. The pain is so great that you can't concentrate but there is no time to say a prayer anyway.\n\nPanic begins to seize you, but then he just disappears. It isn't that easy for a creature of the Darkness to kill a priest, even without proper protection. You check your wounds and are happy to find out that they are mere scratches. A flesh mending prayer makes your skin anew, but the awful memory remains to haunt you. It is as if he managed to touch your soul and take away a little piece of it with him.\nYou return to the holy sanctuary.\n*goto zeroseven\n\n*label onezero\n*set experience +2\nExperience increased by 2 points.\n*line_break\nAs a priest, you know that favour should be preserved for the times when it is really needed. The demon is going to leave anyway and he wouldn't attack you before that as you are protected from evil. Moreover, if he is that powerful to have the ambitions of killing the whole town, it may take more that an ordinary smiting to get him back to the realm of Darkness.\n\nThe creature vanishes into thin air. You return to the church, coughing from the smell of sulphor left from the demon.\n*goto zeroseven\n\n*label oneone\n*set relations -2\n*set experience -1\n*set favour -1\nRelations decreased by 2. Experience decreased by 1. Favour decreased by 1.\n*line_break\nYou raise your sword and try to slash the newcomer. They see the movement and make an attempt to dodge the holy blade, escaping a certain death. Yet, the sword leaves a long cut on their shoulder.\n\nIt is only then that you realize the mistake you made. You were about to kill Sister ${ulmia}! Your weapon falls to the marble floor with a ding.\n\n\"Is this how you greet the servants of the Light, coming for a prayer?\" she tries to smile, but the pain won't let her.\n\nYou waste no more time and say a prayer of healing.\n\n\"You still owe me a new cassock,\" she jokes.\n*goto onethree\n\n*label onetwo\n\nYou need some time to realize that the newcomer is actually the priestess whose arrival you awaited so eagerly. Sister ${ulmia}!\n\n\"A sword in hand? Is this how you greet the servants of the Light, coming for a prayer?\" Her laugh fills your heart with joy. You quickly return the blade to its sheath. For a second, thoughts of what could have happened had you been so foolish to attack her flash through you mind, but you dismiss them and decide to concentrate on your guest.\n*goto onethree\n\n*label onethree\n\nYou hug ${ulmia} tightly and kiss her forehead, then look into her soothing green eyes and feel tempted to slide your eyes down her milk white skin to her plump bloody red lips. She has the habit, you recall, of putting cherry balsam on them to look even prettier. The sweet smell makes you dizzy.\n\nAgain, you wonder how much of her appearance remains from her former self. Maybe her fiery red hair, carefully restrained in a pony tail is a legacy of the past, you bet.\n\"Nah, don't even think of touching them!\" She waves her index finger in the air.\nYou realize your hands accidentally petted the hilts of the twin daggers resting at her belt. You've seen them before - long and thin, to you, they seem to be the perfect instruments for delivering swift death to those who can't be killed. However, these particular daggers have even more horrific properties - they would devour the soul of anyone who dies by their blades and store it until released by the priestess. For she is not what you would call the ordinary priestess of the Light.\n\n\"Sorry, Sister. What have you been up to all this time?\" you try to change the subject.\nShe puts her finger on your lips.\n\n\"Let's discuss it a bit later. The Darkness is too strong in this town. I don't know why... It wasn't like that last time I was here. I want you to take this medallion,\" she removes a delicate chain from her neck and hands it to you. A silver ball incrusted with the symbols of the Light - a star and a sun - is attached to it. It feels warm from the heat of her body.\n\n\"Why, ${ulmia}?\" you ask in surprise.\n\n\"The trinket is the harness of the devil inside me. I fear that I might lose control over myself and turn back into the infernal creature...forever. This is why I want you to have it. I don't trust myself, but I trust you.\" She winks at you and smiles, albeit wryly.\n\nYou blush, touched by her words but begin to wonder whether actually keeping the medallion is a good idea. You don't have any experience in dealing with such magicks and that could jeopardize the survival of both of you. On the other hand, you don't want to insult Sister ${ulmia}... and she probably knows what she's doing entrusting the task to you.\n*choice\n\t#Keep the medallion \n\t\t*goto onefour\n\n\t#Give the trinket back to ${ulmia} \n\t\t*goto onefive\n\n*label onefour\n*set relations +1\nRelations increased by 1.\n*line_break\n\"I'll do what I can, Sister, but I'm not sure how well I'll be able to handle it,\" you admit.\n\"Don't worry, for those used to being agents of the Light, it comes natural. What is more interesting is that you may need to unleash the devil inside me. She is a powerful girl,\" ${ulmia} flashes her white teeth that now seem to be a bit too long.\n\n\"Ergh, is it safe?\" you ask bewildered.\n\n\"Of course, it is just me... more or less. I want you to try it now. I know my infernal form is not so pretty and under other circumstances, I wouldn't insist... but I want you to know what will happen to me if you need my other self,\" she looks down.\n\nWhat would you choose?\n*choice\n\t#Let her transform\n\t\t*goto onesix\n\n\t#Refuse her\n\t\t*goto oneseven\n\n*label onefive\n*set relations -1\n*set experience -1\nRelations decreased by 1. Experience decreased by 1.\n*line_break\n\"I'm sorry, ${ulmia}, I don't think I can do that. I'm sure you can find better ways of keeping your other self on the leash.\" You try to look away from her mesmerizing green eyes.\n\n\"I can't take no for an answer,\" whispers the priestess. \"If you refuse... then I will simply lose myself. It's not what you want, is it?\"\n\n\"Of course not, Sister. I just fear that I may fail your trust,\" you explain.\n\n\"You just did that, didn't you?\" she says grimly.\n\nShe has the habit of being annoyingly right when using tail questions.\n\n\"I guess so,\" you nod. \"Okay, Sister, let's give it a try but don't blame me if it turns into a disaster.\"\n\n\"Don't worry, for those used to being agents of the Light, it comes natural. What is more interesting is that you may need to unleash the devil inside me. She is a powerful girl,\" ${ulmia} flashes her white teeth that now seem to be a bit too long.\n\n\"Ergh, is it safe?\" you ask bewildered.\n\n\"Of course, it is just me... more or less. I want you to try it now. I know my infernal form is not so pretty and under other circumstances, I wouldn't insist... but I want you to know what will happen to me if you need my other self,\" she looks down.\n\nWhat would you choose?\n*choice\n\t#Let her transform\n\t\t*goto onesix\n\n\t#Refuse her \n\t\t*goto oneseven\n\n*label onesix\n*set relations +2\n*set devilry +1\nRelations increased by 2. Devilry increased by 1.\n*line_break\n\"Thank you, ${name},\" she says with a sparkle in her eyes. Could it be tears? \"We just need to leave the church.\"\n\nDevils are not welcome in the church you say to yourself. You hope that the demon that visited you earlier today won't come again too.\n\n\"Let's go to my chamber,\" you propose. \"Even though it is inside this building, it is not considered a holy place,\" you remind her.\n\nYou take her hand and lead her through the confessions chamber to your bedroom.\n\"Now, hold the medallion. What do you feel?\" ${ulmia} asks.\n\nAt first, it is nothing, but then you sense the Light in that piece of silver, guarding something. You say a prayer, asking it to let go. ${ulmia} was right. For someone devoted to the Light, the procedure is quite easy.\n\n\"Look away for a second, please,\" the priestess says trembling. \"The transformation is sometimes a bit... ugly.\"\n\nYou are quick to do so.\n\n\"Now, behold me,\" commands a hearse voice bearing a distant resemblance to the one of the Sister.\n\nYou are struck by the sight of the creature before you. Her skin is crimson red and blemished at places by small black dots. Two delicate horns ornament the forehead, just above the yellow pupilless abysses of the eyes. A part of you instantly cries for you to defend yourself. You can try to calm yourself and talk to her or ask her to return to her human form at once.\n*choice\n\t#Smite her\n\t\t*goto oneeight\n\n\t#Talk to her\n\t\t*goto onenine\n\n\t#Ask her to transform back\n\t\t*goto twozero\n\n*label oneseven\n*set relations -1\nRelations decreased by 1.\n*line_break\nShe looks straight in your eyes, as if unable to comprehend what you tell her. Then, she announces she's tired and needs to sleep. You offer her the bed of yours with the proposal to help yourself with the sofa in the confessions chamber, but she says the bed's big enough for both. You know she's right, just the option of feeling her body so close to you during the whole night makes you... uneasy.\n\nShe falls asleep as soon as she hits the pillow. For you, it is not that simple. You spend some time just hearing her breathing. Occasionally, she would murmur something and wriggle. Then, you would try to comfort her by petting her hair.\n\nAfter what seems like half of the night, you surrender to your dreams.\n*goto twotwo\n\n*label oneeight\n*set relations -2\n*set experience -1\n*set favour -1\nRelations decrease by 2. Experience decreases by 1. Favour decreases by 1.\n*line_break\nEverything happens very fast. The words of the prayer of smiting come out of your mouth like a song. The face of the devil distorts in a grimace of pain as her skin starts to emit smoke as if set on fire. She screams as she falls to the ground, trying to put out the flame with her bare hands.\n\n\"Stop it, fool,\" she commands. \"What are you trying to do? Kill your beloved friend?\"\n\nYou cease your chanting for a moment, which allows the priestess to concentrate and return to her human form. You shudder when you see the terrible burn marks on her face. In the name of the Light, if they turn into permanent scars, she'd never forgive you. You are quick to say the prayer of mending, hoping that it will help. It amazes you how effective it is this time. Probably it is easier for the Light to undo what it caused.\n\nShe looks in your eyes and this time you have no choice but accept the silent message. There is no pain or anger, just a question.\n\n\"I'm sorry, ${ulmia}, I'd never do that again to you,\" you promise.\n\n\"Wrong answer, Brother, you may need to do so, but only after you make sure I'd never come back.\"\n*goto twoone\n\n*label onenine\n*set relations +1\nRelations increase by 1.\n*line_break\n\"So, this is the one you were talking about all the time,\" you say.\n\n\"How do you feel in the presence of a devil, Brother? Don't you feel the desire to unleash the Light upon me,\" her voice is, at times, so coarse that you have a hard time understanding her.\n\n\"Well, I hope that the one next to me is still the priestess I know,\" you try to hide your nervousness with laughter.\n\n\"You are right, more or less. Could you... could you go one step further and look in my eyes? I want to taste your soul and see how you accept me with your heart. Would you allow me to do that, Brother?\" she gives away a delicate hiss.\n*choice\n\t#Let her do it \n\t\t*goto ththtwo\n\n\t#Refuse \n\t\t*goto twozero\n\n*label ththtwo\n*set experience -1\n*set devilry +1\n*set relations +1\nExperience decreased by 1. Devilry increased by 1. Relations increased by 1.\n*line_break\nShe comes closer, her warm breath carrying a faint aroma of sulfhur. You feel her touch you deep, draining the heat from your body until you tremble.\n\n\"I'm sorry, ${name}, I went a bit too far,\" she whispers. \"Your soul is so pure, so delicious. I really want to eat it, do you realize that?\"\n\n\"I trust you, Sister ${ulmia}. You are stronger than the devil you carry inside.\"\n\n\"Don't be that gullible, ${name}. I gave you the medallion for a reason. Use it now!\"\n\nYou are quick to do so.\n*goto twoone\n\n*label twozero\n*set experience +1\n*line_break\n\"Now that I've seen your other side, Sister, can we go to the next part of the exercise and see you go back to the ${ulmia} I know, please,\" you ask her.\n\n\"If you really want that, then, do it yourself.\" She chuckles. \"Hold the medallion and pray for the Light to enthrall the devil inside its prison once more.\n\nYou close your eyes, trying to concentrate, feeling her hands on yours. They are weird to touch - very hot with a few slimy scales and sharp nails. As you finish your pledge to the Light, you feel the sensation change into something familiar.\n\n\"Yes, that's how you do it, ${name},\" you open her eyes and embrace her warm smile.\n*goto twoone\n\n*label twoone\n*page_break\n${ulmia} manages to calm down after the strong emotions related to the transformation and announces that she needs to go to sleep. You offer her the bed of yours with the proposal to help yourself with the sofa in the confessions chamber, but she says the bed's big enough for both. You know she's right, just the option of feeling her body so close to you during the whole night makes you... desperate.\n\nShe falls asleep as soon as she hits the pillow. For you, it is not that easy. You spend some time just hearing her breathing. Occasionally, she would murmur something and wriggle. Then, you try to comfort her by petting her hair.\n\nAfter what seems like half of the night, you surrender to your dreams.\n*goto twotwo\n\n*label twotwo\n*page_break\nNext morning, you open your eyes early and manage to roll out of bed without waking ${ulmia} up. You pause for a moment to watch her. You really enjoy this moment.\nGoing into the temple, you notice you are not alone. Judge Drayle is sitting on the bench. His tall figure is bent over and facing the altar, his hands clenched together as if for a prayer. You are surprised that he came here so early. He's not even among the most frequent visitors to the church.\n\nWhen he hears you, he quickly stands up.\n\n\"Good morning, Father!\"\n\nHis voice sounds unusually weak and his eyes seem swollen.\n\n\"May the Light lead your steps. What can I do for you?\" you ask.\n\n\"Father, can I count on your discretion. There is something I need to discuss with you.\"\nYou nod and invite him into the confessions chamber. It is a small, underground room with two sofas with adjacent backs.\n\n\"${name}, I think my son Cain is a warlock,\" he mumbles.\n\nYou've known Cain since he was a little boy. Your impression of him is of a good and obedient child. But recently, something about his aura changed - as if the Light can't reach him and he is left alone in the Darkness.\n\n\"Yesterday, I found a note with strange verses,\" the judge continues. \"I couldn't really make myself read them. And the thing that happened last week ...\"\n\nThere comes a long pause. You can't see him, but you sense that he just changed his mind and decided not to share with you what burdens him.\n\nYou can:\n*choice\n\t#Give him some time\n\t\t*goto twothree\n\n\t#Ask him about the note\n\t\t*goto twofour\n\n\t#Ask him what happened last week\n\t\t*goto twofive\n\n*label twothree\n\"Excuse me, father, I just remembered I have something urgent to do,\" Drayle says.\nYou hear his steps as he sets off for the exit. Your intuition tells you to run after him, confess him and make him come back and continue with his story. On the other hand, you may let him go, giving him some time to make up his mind and hopefully come to you again.\n*choice\n\t#Confess him\n\t\t*if (confessor)\n\t\t\t*set favour +1\n\t\t\t*goto twosix\n\n\t\t*else\n\t\t\t*goto twosix\n\n\n\t#Let him go\n\t\t*goto twoseven\n\n*label twofour\n\"What did the note say?\" you ask.\n\n\"It was awful, Brother,\" his voice turns into a strangled cry. \"It was about unspeakable scenes of violence and pain. And, demons that consume human bodies and souls ... Father, I do not want anything bad to happen to my son... and I don't want him to hurt anyone. This is why I came to you. I think only a priest can help him,\" he explains.\n\nWhat would you say?\n*choice\n\t#\"What happened last week?\"\n\t\t*goto twofive\n\n\t#\"Bring him to me, I'll talk to him.\"\n\t\t*goto twoeight\n\n\t#\"I will go to him to talk\"\n\t\t*goto twonine\n\n\t#\"Everyone has the right to choose the path of Light or Darkness. Neither you nor I should interfere!\" \n\t\t*goto threezero\n\n*label twofive\n\"For years now, Aiken, the son of my neighbour has been Cain's best friends. They grew up together. But, a feud developed between them lately. Once I found them fighting. And last week...\" Drayle took a deep breath. \"I came home and saw Cain next to the window. Looking out, he was making strange movements with his arms and whispering something. I swear I heard \"break your leg.\" A second later, I loud cry reached my ears. I ran outside and found Aiken on my lawn - writhing in pain. His hands were on his ankle.\"\n\n\"Was it broken?\" you ask. Apparently, Aiken didn't reach the infirmary, otherwise you would have known.\n\n\"No, it was just sprained. Two days later, he could walk without any limping,\" Drayl explained.\n\nWhat would you say:\n*choice\n\t#\"We all think we hear things.\"\n\t\t*goto threeone\n\n\t#\"Why would Cain want to hurt Aiken?\"\n\t\t*goto threetwo\n\n*label twosix\n*set favour -1\nFavour decreased by 1.\n*line_break\nYou say the prayer in your mind while you run after him.\n\n\"Wait, Drayl. You came so early, there must be something tormenting you. Let me share your worries. Allow the Light in,\" you shout at him while finishing the prayer.\n\nThe man stops on the doorway of the temple, shakes his head and returns to the confessions chamber.\n\nYou decide that this time you should take the initiative and ask him:\n*choice\n\t#About the note\n\t\t*goto twofour\n\n\t#What happened last week\n\t\t*goto twofive\n*label twoseven\nYou hear his footstep echo in the temple. Something tells you that it was wrong of you to let him go and that he would probably never return and talk about what bothers him again as you hoped.\n*goto threethree\n\n*label twoeight\n\"That would be very kind of you,\" Drayle says. \"But, I think that he will never agree to come and speak to you. One of my failures as a father was that I couldn't teach him to trust the Light.\"\n\n\"Probably because you don't reach for it very often yourself,\" you exclaim.\n\n\"That is right, but it is the Light I need now to help the offspring of mine.\"\nWhat would you say?\n*choice\n\t#\"I will go to him to talk\"\n\t\t*goto twonine\n\n\t#\"Everyone has the right to choose the path of Light or Darkness. Neither you nor I should interfere!\" \n\t\t*goto threezero\n\n*label twonine\n*set promise true\n\"Would you really do that?\" the judge asks.\n\n\"Of course. It is my duty to help the congregation entrusted to me by the Light walk on its path. Where do you think I can find him?\"\n\n\"He often goes to the old castle ruins or the new forest. Also, you can come home in the evening and meet him there but he does not like visitors,\" Drayle explains.\n\n\"I will meet him today,\" you promise.\n\nThe judge thanks you and leaves the church.\n*goto threethree\n\n*label threezero\n*set experience -1\nExperience decreased by 1.\n*line_break\n\"I can't believe you say that, Brother,\" judge Drayl seems furious. \"Is that your role as a priest of the Light - just to stay out of harm's way and watch in get into the claws of the Darkness? You know better what the Light says, but I think it should be ashamed of the likes of you,\" he shouts and runs out of the temple.\n\nThe bad thing is deep inside yourself, you feel he's right.\n*goto threethree\n\n*label threeone\n\n\"I hope you are right, Father. I've been trying to make myself believe that what I heard is the result of my imagination. But, even if that is true, there is still the note to worry about.\"\n*goto twofour\n\n*label threetwo\n*set vine true\n\"It is because of Magdalene, the daughter of the miller. I think Cain and Aiken are head over heels in love with her, and they would fight one another for her.\"\n\n\"What is the attitude of Magdalene?\" you ask.\n\n\"I really don't know, Father. I haven't spoken to her, even though it seems like a nice idea. Cain, however, says that she treats them both nicely.\"\n\n\"Father, I am afraid that Cain may have caused the injury to Aiken's foot. I've heard that some warlocks use similar approaches. I don't want anything bad to happen to my son. I also don't want him to hurt someone. This is why I came to you. I think that only a priest can help,\" Drayle says.\n\nWhat would you say?\n*choice\n\t#\"Bring him to me, I'll talk to him.\"\n\t\t*goto twoeight\n\n\t#\"I will go to him to talk\"\n\t\t*goto twonine\n\n\t#\"Everyone has the right to choose the path of Light or Darkness. Neither you nor I should interfere!\" \n\t\t*goto threezero\n\n*label threethree\n*page_break\nYou check your bedroom. Sister ${ulmia} is still sleeping, so you prepare for your morning prayer. You recall some of the favorite passages from the Book of Light. You actually like being at the Church of Light. It has nothing to do with the flamboyant cathedrals you visited as a novice, but it is cozy. And it is bright even on a cloudy morning like today's because of the many windows.\n\nThe doors open with a melodic chime of bells.\n\n\"Good morning, Father!\" a dark-skinned woman with long jet black hair greets you with a smile. She is carrying a basket of herbs.\n\n\"Kalea, may the Light watch over you.\" You smile back. \"I didn't expect to see you.\"\n\n\"Don't we meet at least twice a week at the infirmary?\" She raises her eyebrows.\n\n\"I mean, here in the temple,\" you explain. \"What brings you here, sister? Can I help you with something?\"\n\n\"Today is the day between the two nights of the thirteenth full moon of the year. The colours of the flaming whips must remain here to gain healing properties. You don't mind, do you?\" she asks.\n\n\"Of course not, Kalea.\"\n\nShe goes to the altar and carefully puts the basket next to it. You notice that the sleeves of her green dress are engraved with symbols you fail to recognize. They look somewhat like the golden stylizations of the sun and moon on your white robe, but seem more complex.\n\nYou can ask her about...\n*choice\n\t#... the mysterious symbols\n\t\t*goto threefour\n\n\t#... her attitude towards the Light \n\t\t*goto threefive\n\n*label threefour\nKalea looks at you for a long time, wondering what explanation to give.\n\n\"Let's say they are symbols that I believe help me heal. As I might have managed to convince you, my potions always help the ill feel better.\n\nYou can:\n*choice\n\t#Ask her to tell you more \n\t\t*goto threesix\n\n\t#Confess her \n\t\t*goto threeseven\n\t\n\t#Ask her about her attitude towards the Light \n\t\t*goto threefive\n\n*label threefive\n\"The question is difficult,\" she says, as her eyes wander around the walls of the temple.\"I certainly don't feel the same way as you, Father. For me, it is only a partial source of healing. In combination with the force of water, the plants can restore the health of the patients. But that's all I cherish the Light for.\"\n\nYou smile. To you, she is clearly one of the people who don't accept the Light in their hearts, even though they serve its cause.\n\nYou wonder whether it is a good moment to try to convince her about the importance of Light, even at the risk of being boring.\n*choice\n\t#Convince her\n\t\t*goto fourone\n\n\t#Ask her about the symbols of her dress\n\t\t*goto threefour\n\n\t#Say nothing\n\t\t*goto fourzero\n\n*label threesix\n\"I'm sorry, Father, I can't tell you. There are things that are best left unsaid.\nYou nod.\n\n\"As you wish, Sister. Everyone has the right to speak or be silent. If you decide that you have something to share with me, I'll be here to listen to you, no matter whether it's about this or anything else you wish to share with me,\" you promise.\n\n\"Thank you, Father.\"\n*goto fourzero\n\n*label threeseven\n*set favour -1\n*set experience +2\n*set witch true\nFavour decreased by 1. Experience increased by 2.\n*line_break\n\"Father, my mind says I should be quiet, but my intuition tells me that I can trust you. These are signs of the five elements,\" she stretches her hand out and shows you the symbols one by one. \"The sun, which you may mistakenly interpret as the Light is fire and courage. The drop is water and healing, of course, for you it may be the holy water I often add to my ointments. The rock is ground or determination. The vortex is air or change. The heart is spirit. Something you would call a soul.\"\n\n\"So you are...\" you pause mid sentence.\n\n\"The name doesn't bother me, Father. Witch. What does the Church of Light say about us?\" she asks.\n\n\"It says that the likes of you roam the edge between Light and Darkness and inevitably fall into the abyss of the latter,\" you recite.\n\n\"Brother ${name}, together we've cured dozens of patients. You've known me for a while ... How do you accept the fact that you work with a witch in the infirmary?\"\n\nKalea smiles but her crimson cheeks betray tension.\n*choice\n\t#Approve\n\t\t*goto threeeight\n\n\t#Disapprove \n\t\t*goto threenine\n\n*label threeeight\n*set experience +1\nExperience increased by 1.\n*line_break\n\"Kalea, one of the most important lessons I learned in the Church of Light was to make opinion of someone based only on their actions. As far as I know, you use what you know in order to serve the cause of the Light. I believe you walk on its path, no matter what the official position of the Church is. Besides, its message is more of a warning than an actual condemnation.\n\n\"Thanks for the kind words, Father,\" Kalea says with relief.\n\n\"But still, I want you to be careful,\" you remind her. \"Don't do anything that will make you hate the image in the mirror.\"\n\n\"I'll try, Father. Please, keep what I just told you a secret. I'm sure most people would not understand it so well as you did,\" she asks you.\n\nYou nod.\n*goto fourzero\n\n*label threenine\n\"Kalea, you do seems quite dangerous to me. What would happen if you don't manage to neutralize the Darkness these herbs tend to collect in their juices? They would poison the patients,\" you warn her.\n\n\"Brother, have I done something to lose your trust?\"\n\n\"No, you haven't yet,\" you admit. \"But what would happen if you make a mistake. Someone will be endangered.\"\n\n\"The very same would be true if I don't use the so called dangerous herbs, wouldn't they?\" she snaps back.\n\nYou fail to reply to her question.\n*goto fourzero\n\n*label fourzero\n*page_break\nKalea says goodbye, announcing that she would go back in a couple of days to get the herbs back.\n\nShortly afterwards, Sister ${ulmia} wakes up and comes into the temple. She still looks sleepy.\n\n\"Morning, Lightshine,\" you greet her. \"Did you sleep well?\" you ask.\n\n\"It was not a real sleep,\" she says trying to sort out the fiery mess on her head.\n\n\"Prophetic dreams are something I thank the Light for, but they can be really exhausting.\"\n\n\"You never told me you were a prophet!\" you exclaim.\n\n\"It is quite common among the ones like me, much more than among human priests,\" she explains.\n\n\"What did you dream tonight, ${ulmia}?\"\n\n\"Is there an abandoned mine near here?\" ${ulmia} asks.\n\n\"I've heard there was one a few lifetimes ago. It's all said to have ended a tragedy as it collapsed,\" you explain. \"Ever since, there have been reports about strange voices coming from what used to be the entrance.\"\n\n\"We may need to enter that mine very soon,\" she says coldly.\n\nYou raise your eyebrows.\n\"I know one of the reasons the Darkness is so strong here. The angel who guards this town is enthralled in the mine. We need to get to set her free. She... reached me in my dream.\"\n\"So the angel is... female?\" you ask.\n\n\"She uses the form of a little girl,\" ${ulmia} can't help but crack.\"A sweet little creature.\"\n\n\"I still can't get what you are trying to tell me,\" you scratch your beard.\n\n\"The mine is cursed. For some reason, it became a portal to the abyss, or rather became part of it itself. It sounds terrible but its demolition might not be such a bad thing,\" she states.\n\n\"You want us to go to the abyss and release her?\"\n\n\"We have no choice,\" she shakes her head, as if trying to cast away her doubts. \"I saw a vision of what will happen if we don't manage to control the spread of Darkness around town,\" she looks you in the eye.\"The Abyss will come for us.\"\n*goto fourtwo\n\n*label fourone\n*set experience -1\nExperience decreased by 1.\n*line_break\nYou begin reciting one of the speeches you learned while you were a novice. It's aimed at converting non believers into the faith of the Light. However, she doesn't appear to be touched.\n\n\"I'm sorry, Father, I don't have time to listen to you,\" sh interrupts you.\n*goto fourzero\n\n*label fourtwo\n*page_break\nYou prepare a quick breakfast - boiled eggs, toast and fresh fruit. Sister ${ulmia} says she's not hungry, but you insist. Eventually, she agrees that she might need all her strength and succumbs into eating.\n\n\"Are you coming with me, ${name}?\" Her eyes glisten.\n\n\"Of course, Sister,\" you say without hesitation.\n\n\"Why?\" She hypnotizes you with her emeralds.\n*choice\n\t#\"Because of you.\"\n\t\t*goto fourthree\n\n\t#\"It is my duty to protect this congregation.\" \n\t\t*goto fourfour\n\n\t#\"The Abyss is no place for an angel.\" \n\t\t*goto fourfive\n\n\t#\"You said the Abyss would come anyway.\"\n\t\t*goto foursix\n\n*label fourthree\n*set relations +1\n*set experience +2\nRelations increased by 2. Experience increased by 2.\n*line_break\n\"I really can't let you go there all alone... especially now that you came here. I'd never want to be away from you, ${ulmia}. I pray to the Light that you'll be around me all my life,\" you say blushing.\n\nThe priestess gives you a broad smile.\n\n\"That's one of the sweetest things I've heard in my life. Thanks for your support, Brother. I fear that I may need it.\"\n\nShe touches your cheek with her warm hand. It seems to you that she wants to tell you something, but decides to leave it for another time.\n*goto fourseven\n\n*label fourfour\n*set favour +1\n*set experience +1\nFavour increased by 1. Experience increased by 1.\n*line_break\n\"My duty is to preserve the people bestowed to me by the Light. If that entails going to the abyss itself, so be it. I'm very grateful that you will actually help me, Sister,\" you say fervently.\n\n\"It is so good that we can help each other,\" she gives you a half smile. \"It is just that I hoped to hear something more.\"\n\n\"What is it?\" you enquire.\n\n\"Nevermind, we can talk about it some other time.\"\n*goto fourseven\n\n*label fourfive\n*set favour +1\n*set experience +2\nFavour increased by 1. Experience increased by 2.\n*line_break\n\"I just can't let a creature of the Light suffer in the Darkness of the abyss... especially a little girl. I hope she is all right,\" you say anxiously.\n\n\"Well, angels are not born like humans, so I am not quite sure she is a little girl. My assumption is that she just loves that form and uses it. Anyway, it is good that you want to protect those who seem weak. Too bad my choice is to be strong.\" She looks away.\n\nYou are tempted to ask her what she meant, but decide to remain silent.\n*goto fourseven\n\n*label foursix\n*set relations +1\n*set experience +1\nRelations increased by 1. Experience increased by 1.\n\"So, you've been listening to what I told you. That is nice. We women tend to talk a lot. I am sure nine out of ten male priests would miss that point at the end of my message about where and why I need to go,\" she explains.\n\nYou take it as a compliment and blush slightly.\n*goto fourseven\n\n*label fourseven\n*page_break\n\"You still, haven't told me where you were all that time. And, what is it that brought you here. It can't be the dream about the little angel as you said it came to you last night,\" you ask.\n\n\"I was trying to find out more about the holy paladin Atoro. He is said to have captured my devil form and...\" She takes a deep breath.\n\n\"I know,\" you remind her.\n\n\"All my life, I've been trying to get to him, to have the chance to ask him a few questions. I really needed to learn more about my other self,\" her tone suddenly becomes emotional.\n\nShe grits her teeth:\n\"That bastard kept moving from place to place, too quickly for me to follow. Or rather, this is what I thought. Then, I realized it is a big lie aimed at covering the fact that he is gone.\"\n\n\"Why would anyone aim to hide that?\" you ask.\n\n\"I thought that it was because of the role he played throughout much of his life. He's been an inspiration of a lot of priests. Maybe the high clergy thought the news of his disappearance would deteriorate their morale,\" she explains.\n\n\"But, that is only a theory right?\" you presume.\n\nShe shakes her head.\n\"He is somewhere near here,\" she states. \"I was able to rip that information from the last breath of someone of my original kind.\" Red fires dance in her eyes, before being extinguished by tears. \"Sometimes, I am really confused about who I am and what I should do. I really hope meeting Atoro would give me answers.\"\n\n\"Do you think he might be in the abandoned mine,\" you ask.\n\nShe shrugs.\n\"I don't know, the devil told me about some haunted place. I think it matches the description.\"\n*page_break\nAfter breakfast, you set off for the abandoned mine. You recall being there only one time and hope that you would not get lost in the woods. The mosquitoes seem unforgiving at that time of the year, but it is fortunate that your clothes cover most of your bodies. ${ulmia} is wearing a black leather cassock that certainly provides better protection than your snow white cloth one, ornamented with symbols of the Light. Still, your faces and necks are vulnerable.\n\n\"Here, try this one,\" ${ulmia} says as she spreads some lotion all over her face. \"Those blood suckers hate the aroma,\" she explains.\n\n\"Does it smell of garlic?\" you wonder.\n\n\"Yes, it is supposed to work against vampires as well.\" She winks at you.\n\nSuddenly, you hear a cry followed by a mighty roar.\n\"This way,\" shouts ${ulmia} and runs ahead. You follow her, trying not to lose track of your agile friend.\n\nOver the hill, you see a huge bear about to attack a man. Next to them, there is a bear cub, its leg in a trap. Hunting that way around town is forbidden ever since a child got his leg badly hurt.\n\nOn one hand, the trapper deserves his fate. On the other, you are a priest and are supposed to help all humans and it would be a digression if you don't try to stop the furious mother bear. You may attack her with your sword, even though it will be a tough battle. Other ideas that come to you are to go to the cub and set it free or to try to scare its mother by using holy fire. Bears are known to be afraid of fire, however, this one is affected and you doubt it would have much of an effect on her.\n\nWhat is your choice?\n*choice\n\t#Leave\n\t\t*goto fournine\n\n\t#Fight the bear\n\t\t*goto fivezero\n\n\t#Rescue the cub\n\t\t*goto fiveone\n\n\t#Use holy fire\n\t\t*goto fivetwo\n\n*label fournine\n*set relations -1\n*set experience -2\nRelations decreased by 1. Experience decreased by 2.\n*line_break\n\"There's nothing we can do here,\" you try to convince Sister ${ulmia} as much as yourself. \"This is a mother bear and she'd never stop until she has her revenge on the trapper.\"\n\n${ulmia} says nothing as you both walk away from the ugly scene.\n\"I'm right, aren't I?\" You insist on making her speak.\n\n\"Yes, you are but... I really expected more from the hero I thought you were, ${name}.\" She gives you a stone cold look.\n\nYou hear the screams of the trapper and all your will to continue this conversation disappears.\n*goto fiveeight\n\t\n*label fivezero\nYou take your sword out and approach the angry beast. It roars in your direction and charges.\n\n\"You are a brave fool, ${name},\" says ${ulmia} and you could swear there's adoration in her voice. Her words break your momentary stunlock of fear. The priestess herself tries to attract the bear's attention, shouting and swinging her twin blades.\n\n\"The medallion, use it now or else we are dead meat!\"\n\nShe's most likely right but still you have doubts about unleashing the devil inside ${ulmia}. You are trained with a sword and think that you might actually stand a chance of defeating the beast.\n\nWhat do you do?\n*choice\n\t#Use the medallion\n\t\t*goto fivesix\n\n\t#Refrain\n\t\t*goto fiveseven\n\n*label fiveone\n*set experience +1\nExperience increased by 1.\n*line_break\nYou hope that you will be able to set the cub free and that will dissuade its mother from attacking any of you. That is, provided that she understands what exactly your aim is.\nYou run to the cub, only to scare it, making it try to renew its attempts to run away, The sharp edges of the trap sink deeper into its paw. Its squeals are heard by the mother and she charges at you!\n\n\"The medallion, use it now or else we are dead meat!\"\n\nShe's most likely right but still you have doubts about unleashing the devil inside ${ulmia}. You are trained with a sword and think that you might actually stand a chance of defeating the beast. Alternatively, you could continue trying to disable the trap, using your sword as a lever.\n\nWhat do you do?\n*choice\n\t#Use the medallion\n\t\t*goto fivesix\n\n\t#Fight\n\t\t*goto fiveseven\n\n\t#Disable the trap\n\t\t*goto twfivezero\n\n*label twfivezero\nYou try to suppress your fear. Your hands shake, as your blade sinks between the metal jaws right next to the paw of the bear cub and give your best to rotate the blade. The trap clicks and opens, but the final twist seems to be too much for the little bear and it loses consciousness. This is certainly not the display to assure its mother of your good intentions.\n\nMaybe you should continue with your efforts to alleviate the suffering of the cub, casting a healing prayer. Or, use the medallion, as Sister ${ulmia} insisted. Last but not least, you can fight the angry bear with your sword.\n*choice\n\t#Heal the cub\n\t\t*goto fivethree\n\t\n\t#Use the medallion\n\t\t*goto fivesix\n\n\t#Attack with your blade\n\t\t*goto fiveseven\n\n*label fivetwo\n*set favour -1\nFavour decreased by 1.\n*line_break\nThe Light hears your prayer and a big pyre appears in front of the bear. You close your eyes lest be blinded. However, as you anticipated, the beast quickly overcomes her fear, simply detouring the fire.\n\nWhat would you do?\n*choice\n\t#Walk away\n\t\t*goto fournine\n\n\t#Attack the bear\n\t\t*goto fivezero\n\n*label fivethree\n*set favour -1\n*set transformation true\nFavour decreased by 1. \n*line_break\nYou quickly say the prayer, barely touching the wounded leg so that you can channel the power of the Light. The ugly cut closes instantaneously and the pain seems to withdraw as the cub comes back to its senses and runs to its mother without even limping. She sits on the ground, raising her front paws, ready to embrace it much like a human being would do. You now notice that her eyes seem grayish and you wonder what kind of a beast stands before you.\n\nNow that the imminent danger seems to be over, you are thinking of talking to the trapper the bear was about to attack. You could also approach the beast or walk on to the entrance of the mine.\n*choice\n\t#Talk to the man\n\t\t*goto fivefive\n\n\t#Continue on your way\n\t\t*goto fiveeight\n\n\t#Step closer to the bear\n\t\t*goto fivefour\n\n*label fivefour\nYou feel encouraged by the touching scene in front of you, so you pick up your courage and step forward. Her eyes lock on yours. Then, she puts her enormous claw on her face and slowly transforms into a blonde woman wearing a green dress decorated with leafs and branches. The cub doesn't seem distressed by its mother's change. You guess that it has seen that form of hers before.\n\n\"Thank you for healing my son, priest,\" she says to you. \"I am Alarra. It was so long since I saw a man caring about an animal for the last time.\n\n\"I am Brother ${name}, and this is Sister ${ulmia},\" you point at the priestess.\n\nMeanwhile, you notice that the man Alarra was about to kill is on his feet and about to run away. Do you want to shout to him to stop or continue your conversation with Alarra?\n*choice\n\t#Shout to the man\n\t\t*goto fivefive\n\n\t#Continue talking with Alarra\n\t\t*goto fivenine\n\n*label fivefive\nThe man looks like the image of desolation itself. His clothes are dirty and ragged. Even the numerous patches seem to be unable to stop them falling apart. Several of his teeth are missing and it is quite difficult to understand what he's saying. You manage to make out that there are traps all over the area and that there is a group of people from his hunting party camped near the entrance of the mine.\n\nWhat do you do now?\n*choice\n\t*selectable_if (transformation) #Return to Alarra\n\t\t*goto fivenine\n\n\t#Continue on your own\n\t\t*goto fiveeight\n\n\t*selectable_if (pup) #Lead the cub to safety \n\t\t*goto sixsix\n\n*label fivesix\n*set devilry +2\nDevilry increased by 2.\n*line_break\nYou give your best to unleash ${ulmia}'s devilish side as quickly as possible but the bear is quicker, swiping her paw to maul you. You parry with your sword, but the momentum sends it flying away in the air, out of your reach. You begin to panic, knowing that her next swipe would be the end, having no weapon to stop the beast from delivering the final blow.\n\nAnd then, the red skinned devil attacks her from behind. She jumps up, stabs the bear in the back, pulls herself up, reaching the throat of the beast. Her second dagger sinks into the artery. The creature of the Darkness takes the first blade out and starts cutting.\nYou close your eyes, unaccustomed to so much gore.\n\n\"${name}, that wasn't a real bear,\" the infernal voice of ${ulmia} announces after the final roar ceases.\n\n\"What do you mean?\"\n\nYou see that the enormous corpse of the bear is replaced by the body of a blonde women wearing what used to be a green dress, now mostly covered in coagulating blood. Her face is beyond recognition, her cheeks missing. You feel your stomach can't take it any more. You fall on your knees and throw up.\n\n\"Oh, petty boy, you haven't seen the results I can achieve with these babes,\" ${ulmia} says and swings her daggers.\n\nThe bear cub squeals, mourning its mother's loss. Tears spring from your eyes as you realize what shock it must be going through. Part of you wants to approach the cub and comfort it. Another part of you screams that you should immediately call in ${ulmia}'s human side.\n*choice\n\t#Go to the cub\n\t\t*goto sixtwo\n\n\t#Use the medallion\n\t\t*goto sixone\n\n*label fiveseven\n\nYou try to predict the bear's attack, but it is simply too quick swiping her paw to maul you. You parry with your sword, but the momentum sends it flying away in the air, out of your reach. You begin to panic, knowing that her next swipe would be the end, having no weapon to stop the beast from delivering the final blow.\n\nThe end comes quickly.\n*goto_scene death\n\n*label fiveeight\n*page_break\n*set favour -1\nFavour decreased by 1.\n*line_break\nYou walk for about an hour, looking carefully at the ground, wondering where there might be more traps. A grunt from the bushes nearby distracts you and you feel something hard under your foot. An instant later, the jaws of the trap cut deep into your ankle, making you scream. Sister ${ulmia} is quick to help you, using her mercy blades to open the trap. You curse for the first time in years, yet, you realize it could have been much worse. A quick healing spell makes you feel your foot as good as new.\n\nAs you approach the entrance, you see two men sitting in front of it. They are still too far away from you to be able to see them clearly, but they seem to look as scruffy as the trapper you met earlier. One of them bends and something on his belt sparkles in the sunlight.\n\n\"What do we do with these two?\" you sense worry in her question.\n\n\"Maybe we should just approach them and ask them not to stand in our way,\" you whisper in her ear.\n\n\"That's not a good idea. These guys are scum. They'll probably attack us on sight, because of me at least,\" she warns you.\n\n\"What do you suggest then? Make a sneak attack?\" you laugh quietly.\n\n\"I have a better idea. We are very close to an entrance to the abyss. I'm sure I can summon a couple of angry spirits to chase them away.\"\n\n\"You mean using the medallion again?\" you ask.\n\nYes,\" she nods. They won't be hurt, so the exercise won't be as dangerous as usual.\"\n\nWhat would you choose?\n*choice\n\t#Attack\n\t\t*goto seventwo\n\n\t#Talk to them\n\t\t*goto seventhree\n\n\t#Summon ghosts\n\t\t*goto sevenfour\n\n*label fivenine\n\"I feel I owe you something for healing my cub,\" she says while examining its paw.\n\n\"Can it also turn into a human?\" asks Sister ${ulmia}.\n\nThe blonde in green shakes her head.\n\n\"He was conceived while I was in bear form. His father is the mighty Feodor, the strongest animal to ever wander these woods. There are very few things that would urge me to stay in the form I was born in,\" Alarra explains.\n\n\"Maybe you can teach me about keeping the beastly part of me under control,\" asks ${ulmia}. \"I am also a changeling of a kind, my alternate self being a devil.\"\n\n\"Devilry is something I only vaguely understand, being a witch. Yet, I will show you a few exercises that will help you remember who you are even when your second self takes hold of your body, if that is what you require of me.\n\n${ulmia} looks at you, waiting for your reaction. You, however, don't want to be in a rush.\n\"Do you know anything about the abandoned mine? We need to go there,\" you say.\nAlarra looks at you two from head to toe.\n\n\"You seem to be a strange couple,\" she mocks you. \"A healer and a half devil, going to a plane of the abyss itself.\n\n\"Yeah, almost as strange as a woman that gave birth to a bear,\" Sister ${ulmia} snaps her. You make her a sign to stop gnawing at Alarra. You wonder why she is so short tempered.\n\n\"All right, I can accompany you to the entrance to make sure that no harm comes to you while wondering these woods. I can also give you a bit of my fur that will help you open the portal to the abyss. Or, if you want me, I can tell you more about what happened at the time of the collapse,\" says the changeling.\n\nWhat would you ask of Alarra?\n*choice\n\t#Teach ${ulmia} to control the devil inside her\n\t\t*goto sevensix\n\n\t#Accompany you to the entrance\n\t\t*goto sixthree\n\n\t#Give you a bit of her fur\n\t\t*goto sixfour\n\n\t#Tell you about the collapse\n\t\t*goto sixfive\n\n*label sixone\n*set favour -1\n*set pup true\nFavour decreased by 1. \n*line_break\nIt dawns on you that the soul of the victim must be still in one of her daggers. The devil is certainly tempted to consume it, provided that you give her a chance.\n\n\"${ulmia}, you must release the soul,\" you command her.\n\nHer yellowish eyes flash with anger.\n\n\"Why? Do you care for her. After saving your ass, can't you at least allow me to have a little snack? Is it your way of thanking me for what I've done?\"\n\nYou say nothing, knowing that arguing with her will be futile. So, you just grasp the medallion and prey. The skin of the priestess slowly fades to white, just the way you enjoy looking at. Her horns disappear, her eyes returning to lush green.\n\n\"In the name of the Light, what have I done?\" She puts her hand on her mouth.\n\nYou hug her tightly and feel her body lean to you, seeking your comfort.\n\n\"It wasn't you, but the devil. And, it was a self defense. Believe me, the bear lady would have done the same to you...or me if given the chance,\" you say.\n\n\"This explanation is reasonable, but no good for a priestess of the Light, Brother,\" she whispers. \"May your soul rest in peace, cleansed by the Light, baying at its warmth,\" she recites and kisses her dagger, setting the essence of the shapeshifter free.\n\nMeanwhile, you open the trap and release the cub. The poor thing is so confused and scared that it cuddles you. Its paw is badly hurt, so you feel obliged to cast a healing prayer on it.\n\n\"We can't just leave it here, can we?\" ${ulmia} asks.\n\n\"I don't know, Sister... You are right, but we can't take it with us either. Besides, in the mine, there's supposed to be an angel to set free, so we must hurry.\"\nYou see that the man the bear tried to attack is finally getting over the shock, getting on his feet and about to set off.\n\nWhat do you do?\n*choice\n\t#Shout at him to stop\n\t\t*goto fivefive\n\n\t#Lead the cub to safety\n\t\t*goto sixsix\n\n\t#Just continue to the mine entrance\n\t\t*goto fiveeight\n\n*label sixtwo\n*set devilry +1\n*set favour -1\nDevilry increased by 1. Favour decreased by 1.\n*line_break\nYou open the trap and release the cub. The poor thing is so confused and scared that it cuddles into you. Its paw is badly hurt, so you feel obliged to cast a healing prayer on it.\n\"What are you doing?\" you ask the devil as you see her licking one of the blades with obvious enjoyment. This is when it dawns on you that the soul of the changeling must be in the dagger. Or rather, must have been, before the devil consumed it.\n\nYou say nothing, knowing that arguing with her will be futile. So, you just grasp the medallion and prey. The skin of the priestess slowly fades to white, just the way you enjoy looking at. Her horns disappear, her eyes returning to lush green.\n\n\"In the name of the Light, what have I done?\" She puts her hand on her mouth.\n\nYou hug her tightly and feel her body lean to you, seeking your comfort.\n\n\"It wasn't you, but the devil. And, it was a self defense. Believe me, the bear lady would have done the same to you...or me if given the chance,\" you say. Of course, you don't mean the soul consumption, but she seems to be unaware of it anyway.\n\n\"This explanation is reasonable, but no good for a priestess of the Light, Brother,\" she whispers.\n\n\"We can't just leave it here, can we?\" ${ulmia} asks.\n\n\"I don't know, Sister... You are right, but we can't take it with us either. Besides, in the mine, there's supposed to be an angel to set free, so we must hurry.\"\n\nYou see that the man the bear tried to attack is finally getting over the shock, getting on his feet and about to set off.\n\nWhat do you do?\n*choice\n\t#Lead the cub to safety\n\t\t*goto sixsix\n\n\t#Just continue to the mine entrance\n\t\t*goto fiveeight\n\n*label sixthree\nThe woman whispers something in the cub's ear, making it lie on the ground and fall to sleep. Another whisper makes it fade away, becoming invisible.\n\nAlarra moves quickly with the confidence of someone who spent years in the woods.\n\n\"Halt!\" Alarra suddenly raises her hand. \"Do you see that?\" she points at a pile of leaves just in front of you.\n\n\"What is it?\" you enquire.\n\n\"A trap like the one my son fell into. That son of a monster, I should have killed him!\" she shouts.\n\nYou take your sword out and slash at the pile. The steal meets steal and the trap falls apart.\n\nYou journey to the entrance of mine is otherwise uneventful. However, just in front of it, there is a group of three men. They seem as scruffy as the trapper you met before. Alarra's keen eyes manage to spot the blades resting on their wastes.\n\n\"Scum,\" she curses. \"Poachers, bandits... they are all the same - a plague to nature and humanity alike. Okay,\" she turns to you,\" you two need to reach the altar in front of the crumbled entrance. Then, you need to use the powers you wield in order to activate it get in. Don't worry about these fools, I'll take care of them.\"\n\nShe pets the bark of a tree and hums something. A swarm of bees comes out of their hive among the branches and attacks the men, making them scream in panic. You thank Alarra and run to the altar.\n*goto sixseven\n\n*label sixfour\n*set fur true\n\"Very well, you can have e fraction of my powers,\" says Alarra and transforms her left arm into a bear's claw but without changing the size of her projectile. Then she pinches some of the plush fur and hands it to you.\n\n\"This should be enough to make the portal open,\" she explains.\n\nYou thank her and bid her farewell. Soon, you and ${ulmia} are on your way to the entrance of the abandoned mine.\n*goto fiveeight\n\n*label sixfive\n*set experience+1\nExperience increased by 1.\n*line_break\n\"It was about a century ago,\" she begins her story.\n\nYou raise your eyebrows.\n\n\"What, don't I look that old?\" she smiles. \"I've been using magic to stop my aging since I was in my 30s. So, back then, the mine provided the most profitable work for the men in town. All was going well for a few years, but then a miner disappeared. The owner of the mine increased payment and things went smoothly for another year. Then, someone went missing, again and again. There were rumours of infernal creatures coming from the depths. The mayor wrote to the clergy and some renowned paladin was sent in together with his entourage.\n\n\"Do you know his name?\" ${ulmia} asks excitedly.\n\n\"Nope, my memory falters. At the time, I was already spending most of my days in bear form. Names have little meaning for the children of the Nature,\" Alarra explains. \"What I do know is that the paladin went in a few times. He was said to have discovered a way to turn the devils he found in into humans and boasted of teaching them into the ways of the Light. Meanwhile, boys and girls from the town kept disappearing. After a while, the mine collapsed.\"\n\n\"Do you know what happened to the miners trapped in?\" you ask.\n\nAlarra shrugs.\n\n\"Probably most of them were killed. I know for sure one woman survived. She was a witch from my Sabbath . Her name's Cabala. We used to communicate after the collapse, but then... she changed. I can't explain it but her thoughts became so obsessed with gore. I severed the cord connecting her to me.\"\n\nYou thank her and bid her farewell, heading to the entrance of the damned mine.\n*goto fiveeight\n\n*label sixsix\n*set relations +1\nRelations increased by 1.\n*line_break\n\"I know a hunter who lives nearby. I'm sure he'd love to take care of the cub as he often boasts about being raised together with a great grizzly,\" you say.\n\n\"I like your kind heart, Brother. Okay, let's get it over and away with.\"\n\nThe cub, strange as it may seem, follows you without straying. You find the old hunter at home, smoking a pipe and taking care of his shotgun. He listens to your story carefully, only occasionally swearing the trapper. He seems to have fallen in love with the little beast.\n\"I'm taking it, even if I have to take it from you by force,\" he roars with laughter.\n\nYou leave the shack and head for the entrance of the abandoned mine.\n*goto fiveeight\n\n*label sixseven\n*page_break\nThe altar is no more than a slate with two concave eyelike holes incrusted with runes.\n\"I think I can activate it if you unleash the devil,\" ${ulmia} suggests. \"These runes definitely bear a connection to the Darkness. They seem familiar to me, although I can't feel them very well in this form,\" she explains.\n\n\"You can't feel them? Aren't they supposed to be letters?\" you wonder.\n\n\"No, one and the same rune can have very different meanings depending on the nature of the writer, the materials used and the energy locked inside it.\"\n\n\"Can't we just pray to the Light? Above all, we are going to enter in its name, to save one of its holy servants,\" you suggest.\n\n\"My connection with the Light is not so strong, but you can try.\"\n\nWhat would you do?\n*choice\n\t#Use the medallion\n\t\t*goto sixeight\n\n\t#Pray to the Light\n\t\t*goto sixnine\n\n\t*selectable_if (fur) #Use the fur\n\t\t*goto sevenzero\n\n*label sixeight\n*set devilry +1\nDevilry increased by 1.\n*line_break\n\"Don't worry, this time it will be less dangerous than usually, as the devil will not engage in bloodshed,\" ${ulmia} explains.\n\nYou close your eyes and say the sacred words. When you open them, it pains you to see her majestic features give way to the savage reddish expression of cruelty.\n\n\"Now, I can feel the magic of the altar, Brother. You'd be wise to let me off the leash more often,\" she says, still examining the runes.\n\nYou have no intention of doing so, but you don't want to provoke her. You see her touching the runes one after another with her long-nailed fingers dancing over the stone, occasionally scratching it. Then, it all fades to black.\n*goto sevenone\n\n*label sixnine\n*set favour -2\nFavour decreased by 2.\n*line_break\nIt takes a lot of praying before you get any signal that you are on the right path. You try to envision Clarissa (as you imagine her based on ${ulmia}'s description), the hardship she must be facing over there. Sister ${ulmia} also decides to back you up, saying a few prayers you haven't heard before.\n\nFinally, the altar starts glowing.\n\n\"Now, let's put our hands on it,\" says ${ulmia}.\n\nYou do so and all fades to black.\n*goto sevenone\n\n*label sevenzero\n\"Oh, I completely forgot the fur.\" You put your palm on your face. \"Let's see if that bear woman really gave us something we can use.\"\n\nYou take the fur from your belt and put it on the altar.\n\n\"Now, let me do it the way it should be done,\" says ${ulmia} and spreads it all over the slate.\n\"How come you know what to do?\" you enquire.\n\n\"I'm just using my intuition. Women are said to be much better at that. She-devils...even better.\" She smiles.\n\nFinally, the altar starts glowing.\n\n\"Now, let's put our hands on it,\" says ${ulmia}.\n\nYou do so and all fades to black.\n*goto sevenone\n\n*label sevenone\n*page_break\nYou spend some time in pitch darkness. You don't know exactly how much. It could be seconds or hours, each moment seeming the same as the previous.\n\n\"How dare you come to my place. You are not sure if you hear the voice, or it is in your head. Servants of the Light are not welcome here.\" Strangely, the voice seems very melodic and you can't help but imagine it must belong to a delicate and beautiful woman.\n\n\"I fear no Darkness,\" you state.\n\n\"Too bad for us then. We'll need to kill you or corrupt your soul without that precious spice.\" A fanatic high pitched laughter is the last thing you hear before the darkness gives way to a bit of light.\n*set checkpoint 2\n*set dagger cp_dagger\n*set cp_key key\n*set cp_wine wine\n*set cp_instructor instructor\n*set cp_clairvoyant clairvoyant \n*set cp_freedom freedom \n*set cp_salvation salvation\n*set cp_consecration consecration\t\n*set cp_animal animal \n*set cp_stash stash \n*set cp_necklace necklace\n*set cp_retribution retribution \n*set cp_east east \n*set cp_west west \n*set cp_name name \n*set cp_favour favour \n*set cp_relations relations \n*set cp_experience experience \n*set cp_devilry devilry \n*set cp_exorcist exorcist \n*set cp_confessor confessor \n*set cp_healer healer \n*set cp_prophet prophet \n*set cp_zealot zealot \n*set cp_damage damage\n*set cp_wounds wounds \n*set cp_woundss woundss \n*set cp_shield shield \n*set cp_promise promise \n*set cp_vine vine \n*set cp_pup pup \n*set cp_fur fur \n*set cp_witch witch \n*set cp_sphere sphere \n*set cp_knowledge knowledge \n*set cp_shade shade \n*set cp_glow glow \n*set cp_xx xx \n*set cp_ex ex \n*set cp_clean clean \n*set cp_zombies zombies\n*set cp_slash slash \n*set cp_nail nail \n*set cp_feather feather \n*set cp_fel fel \n*set cp_transformation transformation \n*page_break\nCheckpoint reached. If you perish, you may restart at this point.\n*goto_scene mine\n\n\n*label seventwo\n*set experience +2\nExperience increased by 2.\n*line_break\nThat is the craziest thing I've ever done,\" you admit while taking your sword out of its sheath.\n\n\"I think you used the right word. Remember old Thomas?\" ${ulmia} asks.\n\n\"That demented berserker?\" You raise your brows.\n\n\"Just copy his acts and everything will be alright.\"\n\nYou run out of the bushes, war cries rattling. Sister ${ulmia} manages to look fearsome, swinging her blades with remarkable speed. Her screams reach near impossible heights and for a moment you fear they could cause a landslide.\n\nThe initial reaction of the scruffy men is to reach for their weapons, but then your show makes them choose discretion grabbing their backpacks and running away.\n\nWhen they fade from view, you can't help yourself and burst into laughing.\n\n\"That was a good move,\" you say trying to take a breath. ${ulmia} just gives you a beautiful smile and points at the altar.\n*goto sixseven\n\n*label seventhree\n*set favour -1\nFavour decreased by 1.\n*line_break\nYou come out of the bushes and greet the strangers, making sure your hands aren't close to the hilts of your weapons.\n\n\"We come with peace,\" you assure them. One opens his mouth to reply, exposing at least a dozen missing teeth.\n\n\"If your intentions are so good, show us your gold. I'm sure you could spare a few coins with us... And a night with the mare!\"\n\nThey pull out their blades - rusty cutlaces - and attack. You manage to parry the first slash and to disarm the scoundrel sending the rusty blade away from him. He steps back, then turns around and runs away.\n\nSister ${ulmia} has a harder time dealing with her opponent as her daggers aren't meant to parry, being too light and short. One sword leaves an ugly but shallow trace on her forearm. This is all the bandit manages to achieve before one of the daggers sinks deep into his shoulder. The man cries, desperately looking for his mate and decides to join his flight.\n*goto sixseven\n\n*label sevenfour\n*set devilry +1\n*set experience +1\nDevilry increased by 1. Experience increased by 1.\n*line_break\nSister ${ulmia} observes them for a few minutes, concentrating and breathing deeply.\n\"Now!\" she whispers.\n\nYou reach for the medallion and say the required words, asking for a temporary freedom of her true self. This time, her complexion doesn't change much, leaving the freckles and crimson hair.\n\nThe two scoundrels seem to hear the noise of his retreat, but the devil priestess is ready. About a dozen of apparitions suddenly surround the men.\n\n\"We don't like visitors,\" a stocky man says. \"How do you dare come here?\"\n\n\"George, leave them alone. We haven't eaten a fresh soul in a couple of centuries,\" suggests and elderly woman. At this point, the bandits grab their backpacks and run away. Sister ${ulmia} dismisses the apparitions and you both approach the altar.\n*goto sixseven\n\n*label sevenfive\n*set experience +1\nExperience increased by 1.\n\nYou have serious doubts about what will happen but decide to trust Sister ${ulmia}. So, you grab the filthy man by the collar with one arm and his shoulder with the other and throw him against the trunk of a young oak. ${ulmia} is quick to take off the rope she uses as a belt and ties his hands behind his back. The man shouts for help and his friends are quick to come, running through the bushes. ${ulmia} and you try to be as stealthy as possible, sneaking towards the entrance to the mine using a slightly longer path.\n\nAs you reach the altar, you know you need to be quick, or risk facing the three men in battle.\n*goto sixseven\n\n*label sevensix\n\"So be it, if that is your wish,\" says Alarra while sitting on the ground with crossed legs. \"Come here and give me your hands,\" she says to ${ulmia}. The priestess seems a bit confused but follows her directions. Alarra closes her eyes and slows her breath down.\n\n\"I feel the other entity within you but I can't reach it. There is a silver wall surrounding its cage.\"\n\n\"It's the medallion I entrusted to Brother ${name}. I wanted him to control what I feared I could not,\" ${ulmia} says.\n\n\"Very well, then,\" she turns to you. \" In order for me to be able to help, I need to fully reach the devil.\"\n\n\"Is it possible to lose control?\" you ask the changeling.\n\n\"It is, but I am an experienced witch. Working with both the Light and the Darkness isn't something peculiar to us.\"\n\n\"And what if I refuse?\" you ask.\n\n\"Well, then, there will be very little I could do to help your lady,\" says Alarra.\n\nWhat do you do?\n*choice\n\t#Use the medallion\n\t\t*goto sevenseven\n\n\t#Don't \n\t\t*goto seveneight\n\n*label sevenseven\n*set devilry -2\n*set experience +1\nDevilry decreased by 2. Experience increased by 1.\n*line_break\n\"Nice. Whatever you need to do, do it slowly,\" Alarra commands you. You try to incorporate additional words in your prayer that would allow you to close the silvery cage in an instant if necessary. However, your fears are unwarranted. Sister ${ulmia} starts transforming for a second, then a lighting bolt passes from the eyes of Alarra into ${ulmia}'s,altering her transformation, turning her features from demonic into ursine. The bear form then recedes, allowing the priestess to regain her human beauty.\n\n\"That's it,\" says Alarra. \"Now you can call the Great Bear if you need to constrain the devil. It will replace it and come into hibernation as soon as you want her to do so.\"\n\"And I don't need to fight it like the devil?\" ${ulmia} asks.\n\n\"Nope. The bear does not need your soul. Now, can you do it on your own?\"\n${ulmia} nods and the whole procedure is repeated, this time Alarra only observes.\n\nWhen they are done, you thank the bear woman and set for the entrance of the abandoned mine.\n*goto fiveeight\n\n*label seveneight\n*set devilry -1\nDevilry decreased by 1.\n*line_break\n\"I'm sorry, Alarra I wouldn't like to take any risks,\"you say.\n\n\"I understand Brother. All your life, you've been taught not to trust witches. I won't be insulted by that.\"\n\n\"What would you say?\" You turn to Sister ${ulmia}. \"Would you want me to give her access to the devil?\"\n\nThe priestess thinks for a moment.\n\n\"I already took the decision to bestow that responsibility upon you, so I'd say you should trust your instincts.\n\nAlarra teaches ${ulmia} a meditation which, if nothing else, seems to make her cheer up a bit.\n\nWhen they are done, you thank the bear woman and set for the entrance of the abandoned mine.\n*goto fiveeight\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set relations 7\n*set experience 3\n*set devilry 10\n*set favour 3
