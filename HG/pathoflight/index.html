the circle and starts chanting.\n*goto 207\n\n*label 206\n\"Then, we have nothing left to do here.\" You shrug.\"\n*goto 203\n\n*label 207\nA blaze of fire explodes out of the circle of summoning as Ignius comes into the room. It gets hot and the icicles start falling on the ground and crushing.\n\nThe demon is tall and muscular. You can't help but think that he and the angel of frost must have been a good match... at least physically.\n\nIgnius looks around and spots your sword.\n\n\"I can't stand weapons,\" he says. \"Maybe I am not the violent type.\" He chuckles and your blade turns into a puddle of molten lava. \"But she seems to be!Sof!\" He points at ${ulmia}. The priestess starts sweating considerably.\n\n\"Are you alight ${ulmia}?\"\n\nShe says nothing, but all of her cassock is wet. She takes it off, but it seems she is still about to collapse of overheating.\n*if frost_ally\n\t*goto 219\n\n*elseif healer\n\t*goto 220\n\n*else\n\t*goto 221\n\n*label 208\nFiredamage increased by 1.\n*set firedamage +1\n\nSomething else comes out of the summoning circle. It takes time for you to recognize it. It is the big dog you befriended at the base of the heretics!\n\nIt delivers a painful bite in the thigh of the demon and before he understands what is going on, your canine friends disappears again.\n*goto 387\n\n\n*label 209\nFiredamage increased by 1.\n*set firedamage +1\n\n\"Oh, that is pain in the ass. I really hate the day that snow witch designed those,\" Ignius says as soon as he sees your weapon. A lighting emerging from the rod connects with the demon and bathes him in a shower of sparks.\n*goto 387\n\n*label 210\nFiredamage increased by 1.\n*set firedamage +1\n\n\"It is so nice we meet again, dear. I missed you!\" Her voice is so full of emotion. However, Ignius doesn't seem impressed. \"I miss the opportunity to kill you every day, or at least do that!'\n\nA bug ice cube entombs the demon in a block of ice. You can only imagine his terror and pain. The effort on the angel's part seems to be too much as she falls on her knees, too weak to keep standing up.\n\nIgnius quickly melts the ice but you are sure he doesn't come up unscathed from that.\n\n*goto 387\n\n*label 211\nFiredamage increased by 1.\n*set firedamage +1\n\nYou pray for the light to send you her little servant. Clarissa appears instanteniously.\n\n\"Another angel?\" Ignius shouts. \"Get away from here!\"\n\n\"I love you!\" says Clarissa and blows her a kiss that makes a little explosion.\n\n\"Don't be too hard on hem, ${name},\" the little angel says to you before disappearing.\n*goto 387\n\n*label 212\nFiredamage increased by 1.\n*set firedamage +1\n\n\"You brought my faithful servant. How unwise of you,\" says Ignius. \"Just kill them, please.\"\n\nThe boy, however, just stands still, his stare fixed at the demon. Ignius coughs and spits a large amount of dark blood while Jonathan slowly walks back behind you.\n*goto 387\n\n*label 213\nFiredamage increased by 1. Favour decreased by 1.\n*set firedamage +1\n*set favour -1\n\nYou have your fears of wasting precious favour for a an ineffective smite, but your doubts are unrefuted. Ignius burns like any other demon.\n*if not (exorcist)\n\t*goto 387\n\n*else\n\t*goto 214\n\n*label 214\nFiredamage increased by 1.\n*set firedamage +1\n\nYou use a few special words to prolong his suffering, thanks to your training as an exorcist.\n*goto 387\n\n*label 215\n*if (devil) and (devilry>14)\n\t*goto 217\n\n*else\n\t*goto 218\n\n*label 216\n*if favour\u003c1\n\t*goto 203\n\n*else\n\t*goto 215\n\n\n*label 217\n\"I am getting tired of playing these games.\" Ignius yawns theatrically. \"It was very sweet of you to bring a devil here.\" He closes his eyes and starts trembling.\n\nBefore you know what is happening, Sister ${ulmia} jumps on her feet and takes a bite of your neck, tearing a big artery.\n\nIt is a sad end to the story.\n*goto_scene death\n\n*label 218\n*if firedamage>2\n\t*goto 401\n\n*else\n\t*goto 217\n\n\n*label 219\n\"Don't you ever learn new spells?\" The angel of frost just weaves and the gush of wind seems to cool the priestess down.\n\n\"Just need to stay still for now, we will handle the fight. And no, don't protest.\"\n*goto 387\n\n*label 220\nYou say a special healing prayer designed to cure patient suffering from deadly fever. It manages to cool the priestess down.\n\n\"Just need to stay still for now, we will handle the fight. And no, don't protest.\"\n*goto 387\n\n*label 221\nFavour decreased by 1.\n*set favour -1\nIt takes some effort to find the right words of a healing prayer that would be suitable for the occasion, but the result manages to cool the priestess down.\n\n\"Just need to stay still for now, we will handle the fight. And no, don't protest.\"\n*goto 387\n\n*label 244\nFavour decreased by 1.\n*set favour -1\n\"Give me a piece of embers or I will come and take it myself!\" you shout at the elemental and grab one of the shoves near the furnace.\n\n\"Come closer, then!\" The elemental giggles and expands in big mass of fire. However, it seems that the elemental can't control what he is trying to do and explodes, sending burning embers all over the room. A few of them fall on your face and hands, burning you badly and making you drop the shovel. You shake them off you as soon as possible and say a healing prayer to sooth your pain. Then, you take the shovel and gather a few of the larger pieces. Sadly, the fire elemental is dead. You are trying to convince yourself that it was going to be dead soon anyway, suffocated by the energies of the angel of frost.\n*goto 105\n\n*label 245\nFavour decreased by 1. Experience increased by 1.\n*set favour -1\n*set experience +1\n\n\"I think I can help you,\" you say and approach the elemental. As soon as you start reciting the prayer, the embers expand to a living mass of fire and you need to step back lest be burned.\n\n\"That tasted sweet, human.\" The elemental roars. \"That energy will keep me alive and kicking for a while. Now, here is your reward.\" It throws a large chunk of embers in your feet. You pick it with one of the shovels near the furnace and return to Gerhard and ${ulmia}.\n*goto 105\n\n*label 246\nExperience increased by 1.\n*set experience +1\n\n\"Gerhard told me you aren't feeling well ever after the angel of frost came here.\"\n\nThe pile of embers shivers as you mention the ominous creature. You take its reaction as a confirmation.\n\n\"I need the sword in order to fight with it,\" you explain.\n\n\"Can you really kill her... or make her go?\" The creature squawks.\n\n\"I will certainly give my best to do so. The angel of frost is a poison for all creatures. It caused a lot of suffering and I've sworn to put an end to this madness.\"\n\n\"So be it. I will give you some of what remains of me. Good luck, human. Take one of the shovels over there but please... have just a small piece of embers.\"\n\nYou do as it said, careful not to cause too much damage to the weak creature. Then, you return to Gerhard and ${ulmia}.\n\n*goto 105\n\n*label 247\nFavour decreased by 1.\n*set favour -1 \n\nThe prayer of confession seems to sooth the fears of the elemental. It seems that it also manages to bring some of the dying embers back to life. In a few minutes, it is willing to give you a piece of itself. You take one of the shovels near the furnace and carefully remove a small piece of embers. Then, you return to Gerhard and ${ulmia}.\n\n*goto 105\n\n*label 248\n\"Are you sure this is the library?\" You examine the warmholes in the door. \"I bet all the books inside are eaten from cover to cover.\"\n\n\"Don't be so sure about it, dear. The tomes are enchanted. Some of them are said to have been around for a few centuries.\" She opens the door despite the noisy protests of the hinges.\n\n\"And who says that?\" you enquire.\n\n${ulmia} turns to the right and freezes.\n\n\"She...\"\n\nYou look in that direction. At first, you behold nothing as it is a bit dark in the room but then something moves. It looks like a human being but you could see the bookshelf behind her. The specter starts talking with a gentle feminine voice but you fail to understand what she says. Suddenly, she steps forward.\n\nSister ${ulmia} is still frozen, staring at the apparition. Would you like to smite the ghost?\n*choice\n\t#No\n\t\t*goto 250\n\n\t#Yes\n\t\t*goto 249\n\n*label 249\nFavour decreased by 1.\n*set favour -1\n\nYou mutter the prayer, confident that the Light will help you against that creature of Darkness. The apparition stops and becomes even more transparent.\n\nSister ${ulmia} utters a single word and stops the effect. You look at her, confused. It is the first time anyone interrupts the effect of your prayer after it is mouthed.\n\n\"This is the librarian, ${name}. Take it easy.\"\n\n\"Why didn't you tell me there's a friendly ghost here?\" you ask annoyed.\n\n\"Because I was under the impression nobody else sees her.\"\n\n\"And how did you manage to stop me from destroying her?\"\n\n\"Oh, come on, can't I have secrets of my own?\"\n\n*goto 250\n\n*label 250\n\"Wise Eletha, we've come here to gain wisdom from the books,\" says ${ulmia} and approaches the apparition, extending her hand towards her. The librarian does the same and the two palms – flesh and spectral meet. You start to recognize the features – so noble and proud. You've seen someone looking like her but your mind just fails whom she reminds you of.\n\n${ulmia} turns to you.\n\n\"I met Eletha the first time I was here. I was alone in one of the corners, looking for a rare tome when I heard a strange whisper behind me. It was her. At first, I was startled but then she gestured me to remain silent and showed it to me. Since then, we became friends and I spent a lot of time in the library. Some days, I would come not to read but to meet her. The funny thing is that I am the only one able to see her... or rather was before you came up.\"\n\n\"She reminds me of someone I've met before. Do you have any idea who?\"\n\n${ulmia}'s laugh ripples in the air.\n\n\"Eletha is Atoro's mother. How do you think I know her name, silly?\"\n\nShe is right. It is a bit hard to associate the harsh features of the fallen paladin with the gentle frame of the spectral woman before you, but ${ulmia} is right. Now that you know it, the resemblance is striking. And, you don't particularly like being called silly but you know there are good feelings behind so you take no offence.\n\n\"Don't you think she might be dangerous after... all that happened to Atoro?\"\n\n\"No, corruption is a matter of individual choice, not inheritance.\"\n\nEletha looks at you inquisitively. You bet she is dying to hear more about her son.\n*choice\n\t#Tell her everything, including the part in which you killed him.\n\t\t*goto 251\n\n\t#Tell her you met her in the former realm of the angel of death\n\t\t*goto 252\n\n\t#Tell her nothing\n\t\t*goto 253\n\n*label 251\nExperience increased by 2. Relations increased by 1.\n*achieve honesty\n*set experience +2\n*set relations +1\n\n\"Eletha, we met your son during our journey into the abyss in order to save a little angel called Clarissa that was held prisoner by the angel of frost. You already know that your son was corrupted by the latter, right?\"\n\nThe ghost nods.\n\n\"We met him. He tried to kill Sister ${ulmia} and me.\" You take a deep breath and dive into the beautiful eyes of the priestess, trying to pick up the courage to tell a mother you killed her son. \"I am sorry, Eletha, Atoro died by my hand.\"\n\nEletha's face suddens for a second, but then she smiles.\n\n\"She must be relieved now that her offspring will do no more harm... or maybe because he is resting in peace, no longer under the taint of the angel. Anyway, you did good to tell her. You are a brave man, ${name}!\"\n\nYou can't help but blush.\n\n\"I thank you for understanding, Eletha,\" you say.\n\n*goto 253\n\n*label 252\nExperience increased by 1.\n*set experience +1\n\n\"Eletha, we met your son during our journey into the abyss in order to save a little angel called Clarissa that was held prisoner by the angel of frost. You already know that your son was corrupted by the latter, right?\"\n\nThe ghost nods.\n\n\"We met him. We...\" you dive into ${ulmia}'s eyes, searching for a clue whether to make the grim confession to a mother that you killed her son but you find none, only lush beauty. \"We believe he remains there.\"\n\nYou are sure Eletha knows you are not telling the whole story but you simply can't.\n\n*goto 253\n\n*label 253\n*page_break\nYou have nothing more you want to say to Eletha. The awkward silence is broken by Sister ${ulmia}.\n\n\"Eletha, we need some of the wisdom stored here in order to help us in our fight against the angel of frost.\"\n\nThe specter vanishes.\n\n\"What happened?\" you ask.\n\n\"She went searching for what we need. I suggest we sit at the table over there. This may take a while.\"\n\n\"And how does she know that?\"\n\n\"Well, she will probably come back with a few suggestions\"\n\nYou sit and wait. Eletha appears again sooner than you thought. A few books materialize on the table.\n\n\"Let me see what we have here.\" Sister ${ulmia} starts picking the tomes one by one.\n\n\"A Manual of Prayers. ${name}, you certainly know a lot about praying but I guess it may allow you to reach the Light in a new way. Am I right, Eletha?\"\n\nThe specter nods.\n\n\"Then, we have The Legend of the Angel of Frost. I think that needs no more explanation. There is also The Book of Controlling Evil. It is written by no other than Atoro himself. I read it when I was younger but I really think you need to have a better understanding of the Light than me in order to appreciate it. I think his research was the first step of his fall from grace, but it might be useful to us.\n\n\"The Book of Darkness... interesting.\" ${ulmia}h goes through the pages. \"I am only now beginning to appreciate the dark energies of this place, so this book may allow me to understand them better.\n\n\"And this one...\" She laughs. \"This is my favourite love story – Love of the Light. I've read it a few times as a teenager. It really made me happy.\n\n\"And finally, Healing the Damned. Oh, I've only heard about this heretic book. It is about a priest who felt mercy towards the creatures of the Dark and started helping them.\"\n\n\"There is no doubt it would be nice to read all of them but I don't think we will have the time for even one,\" you conclude.\n\nSister ${ulmia} shakes her head.\n\n\"Eletha has the ability to summon a voice to read, summarizing the essence of the whole book in just a few pages. It worked miracles for my studies, allowing me to concentrate on other ... darker things. However, her magic also has limitations. She was rarely able to make the voice read more than a couple of books at a time, so we must choose. I propose we both pick up a tome, me starting first.\"\n\nWhat would you reply?\n*choice\n\t#\"I trust your decisions, you can pick both.\"\n\t\t*goto 254\n\n\t#\"That sounds fair.\"\n\t\t*goto 255\n\n\t#\"No, I would like to pick both.\"\n\t\t*goto 256\n\n*label 254\nRelations increase by 2. \n*set relations +2\n*set random_books 2\n*achieve choice\n\nSister ${ulmia} beams.\n\n\"I really love you, ${name}. You are such a gentleman, so different from all the other men I've met.\"\n\n\"I also love you, ${ulmia}. I am sure you are so different from even the women I've never met.\"\n\n*goto 257\n\n*label 255\nRelations increased by 1. \n*set relations +1\n*set random_books 1\n\n\"Thanks, ${name}. I guess that many in your shoes would insist to pick both of the books, but not you. I feel so happy to be around you. You seem to know how to treat a woman.\n\nYou can't help but blush.\n\n*goto 257\n\n*label 256\nRelations decrease by 1. \n*set relations -1\n*set random_books 0\n\nSister ${ulmia} frowns.\n\n\"I didn't expect you to be so dominant, ${name}. Then again, I trusted you so much as to give you the medallion, I will trust you now as well.\"\n\nYou don't like it when your beloved disapproves of your actions, even when she tries to hide it, but you stick to your decision.\n\n*goto 257\n\n*label 257\n*if random_books=0\n\t*goto 259\n\n*else\n\t*goto 258\n\n*label 258\n*rand dieroll258 110 115\n*if dieroll258=dieroll260\n\t*goto 258\n\n*elseif dieroll258=110\n\t*set dieroll260 110\n\t*goto 110\n\n*elseif dieroll258=111\n\t*set dieroll260 111\n\t*goto 111\n\n*elseif dieroll258=112\n\t*set dieroll260 112\n\t*goto 112\n\n*elseif dieroll258=113\n\t*set dieroll260 113\n\t*goto 113\n\n*elseif dieroll258=114\n\t*set dieroll260 114\n\t*goto 114\n\n*else\n\t*goto 115 \n\n*label 259\n*if read_books=2\n\t*goto 123\n\n*else\n\t*goto 260\n\n\n\n*label 260\n*page_break\nWhat would you choose?\n*choice\n\t*hide_reuse #Manual of Prayers\n\t\t*goto 119\n\n\t*hide_reuse #The Legend of the Angel of Frost\n\t\t*goto 117\n \n\t*hide_reuse #The Book of Controlling Evil\n\t\t*goto 122\n\n\t*hide_reuse #The Book of Darkness\n\t\t*goto 118\n \n\t*hide_reuse #Healing the Damned\n\t\t*goto 120\n\n\t*hide_reuse #Love of the Light\n\t\t*goto 121\n\n\n*label 261\nRelations decreased by 1.\n*set relations -1\n\nThe emerald eyes of the priestess stab you and you know the silent question they ask and the blame.\n\nYou really need to act quickly.\n\n\"Where is your weak point?\" you hear the devil ask.\n\n\"Just below my ribcage,\" the angel answers immediately.\n\nThe devil stands up quickly. You see a dagger in her hand.\n\nWhat do you do?\n*choice\n\t*selectable_if (angel_control) #Control the devil, making her stop the attack\n\t\t*goto 263\n\n\t#Attack the angel\n\t\t*goto 262\n\n\t#Attack the devil\n\t\t*goto 125\n\n\t#Continue on your way\n\t\t*goto 129\n\n*label 262\nExperience increased by 1. \n*set experience +1\n*set foe true\n\nYou take out your sword and decapitate the angel before he could react. You turn around to see ${ulmia}. She seems relived, which dulls the feeling of remorse.\n\nYour attention shifts towards the devil woman. You bend and help her get up.\n\n\"Are you all right?\" Sister ${ulmia} asks.\n\n\"Yes, I was planning to confess him and ask about his weak spot so I can stab him there but the pain was unbearable, I thought I would pass out before I could do so.\"\n\n\"You are a brave girl. What is your name?\" Sister ${ulmia} asks.\n\n\"Sulphura.\"\n\n\"I am Sister ${ulmia} and this is Brother ${name}.\n*if not (dark_healing)\n\t*goto 131\n\n*else\n\t*goto 268\n\n*label 263\nRelations decreased by 2. Favour decreased by 1. \n*set relations -2\n*set favour -1\n*set friend true\n\nYou use your will to make the she devil stop, which allows the angel to finish her with a strong blow in the head.\n\n\"Who are you?\" asks the angel.\n\n\"We are just priests coming back from a mission for the angel of frost. I am Brother ${name} and this is Sister ${ulmia},\" you explain.\n\nThe angel looks at you judging you.\n\n\"There are many new minions of Her Highness Chill. As if we angels can't handle everything. Anyway, I guess I should thank you. That piece of dirt did the same thing again – she confessed me and while I was under the confusion tried to stab me. I am only sorry that she didn't suffer enough.\"\n\nYou see the priestess smile and you are certain she imagines cutting him to pieces.\n\n\"I need to go back to the plantation or the lazy peons will start wasting their time.\n\n*goto 264\n\n*label 264\nIs there anything you want to ask the angel before you go?\n*choice\n\t#What are these plants\n\t\t*goto 265\n\n\t#What changed during the last month\n\t\t*goto 266\n\n\t#Any other dangers in the area\n\t\t*goto 267\n\n\t#Done with the questions\n\t\t*goto 131\n\n*label 265\n\nThe angel raises his eyebrows and you fear that your question was conspicuous.\n\n\"You two aren't from here, are you? Her Highness Chill brought from her last domain. When fully grown, they are the perfect guards against devils. They simply adore their filthy flesh. The saliva-like liquid these plants produce is poisonous for them as well.\"\n\n*goto 264\n\n*label 266\n\"Her Highness Chill increased the security measures of her palace. I guess it may be a little troublesome to get in.\"\n\n\"What should we do then?\" you ask.\n\n\"Tell them about helping me today. It is so rare for a human to fight against a devil these days that the news will probably reach the palace before you.\"\n\nYou thank the angel.\n\n*goto 264\n\n*label 267\n\"Not really. I think the succubus this filthy devil tried to save escaped from the mine but I suppose she is not too much of a threat.\"\n\n*goto 264\n\n*label 268\n\"${name}, Sulphura is badly hurt. Can you heal her?\"\n\nSister ${ulmia} asks you to use the newly learned prayer of healing creatures of the dark.\n\nWould you do so?\n*choice\n\t#No\t\n\t\t*goto 270\n\n\t#Yes\n\t\t*goto 269\n\n*label 269\nFavour deceased by 1. Relations increased by 1. Devilry increased by 1.\n*set favour -1\n*set relations +1\n*set dark_confessions true\n\nYou nod.\n\n\"Thank you, ${name}. I know that when you learned the prayer you were thinking of healing me in my devil form, but my satisfaction will be as great,\" she says, her eyes full of pride.\n\n\"Why do you happen to be so attacked to the devilish kind, my dear. I thought that the revelation of your background would drag you into humanity.\"\n\n\"All of my life I was made to believe that I originated from that folk. This mindset can't be changed in such a short time. Besides, isn't compassion one of the virtues of humanity?\"\n\nYou smile.\n\n\"That is a smart answer. After all that I've seen these days, I could conclude that what I thought to be white can be black and the other way round. But, well, yeah, in the Seminary, this is exactly what we learned. Humans, especially priests, are supposed to be compassionate.\"\n\n\"All right, let's not waste any more time. Sulphura is in pain.\"\n\nYou recite the prayer. The feeling is strange because it resembles the one you are so used to, but yet the energy that passes through you is very different. It feels like the Light but is a bit colder.\n\nAs the ugly wounds subside, you are as gratified as Sulphira and ${ulmia}. The latter gives you a wet kiss.\n\nSulphura is in tears.\n\n\"I don't know what to say, I am not quite used to receiving such treatment from... humans.\"\n\n\"I don't look exactly human, do I?\" Sister ${ulmia} laughs.\n\n\"I am not sure. You look mostly human but have a few devilish features. What are you? I know nobody of your kind?\"\n\n\"She is unique,\" you joke. \"Let's just say she changes when we... travel.\"\n\nThe look on Sulphura's face is confused but she asks no more questions.\n\n\"There is one thing I can do to repay you. I have the ability to confess and I can teach ${ulmia}. I saw her wield the energies of the Dark.\"\n\n\"That would be very nice, thank you!\"\n\nYou sit on the ground and rest while watching the two ladies perform.\n\n\"Now, you are in trouble.\" You love that foxy look on her face.\n\n\"Why?\"\n\n\"Because you can have no more secrets from me,\" she says.\n\n\"What makes you believe I have any?\"\n\n\"We will see.\" Sister ${ulmia} turns to Sulphura. \"What are you going to do now?\"\n\n\"I will hide somewhere. Don't worry about me. And you?\"\n\n\"We need to meet the angel of frost and... kind of kill her,\" you inform her.\n\n\"I will pray for you!\" Sulphura says and vanishes among the vegetation.\n\nYou are completely taken aback from her last word.\n\n\"Is she some kind of a priestess?\"\n\n\"I don't know, ${name}, I am not that into devilish lore.\" Sister ${ulmia} shrugs.\n\n*goto 131\n\n*label 270\nRelations decreased by 1.\n*set relations -1\n\n\"Why not?\" If looks could kill, you would be dead and buried.\n\n\"You know that I should preserve my favour for the times when we really need it.\"\n\n\"Well, she definitely needs it. Look at her. She is all black and blue!\"\n\n\"I can't heal everyone!\" you snap.\n\n\"I am not asking you to heal everyone. I am asking you to heal that one!\" she shouts. \"I am sorry, ${name}.\"\n\n\"Why do you take it so personally? I mean, we know that you were not born a devil, despite what you were made to believe.\"\n\n\"Yes, but you can't just erase what you believed in all your life.\"\n\n\"I guess you can't. If we kill the angel of frost, we will do good to many more.\"\n\n\"Don't quarrel about me, I will be fine, really,\" Sulphura says. \"Are you really going to destroy Her Highness?\"\n\n\"We will try. What are you going to do now?\" Sister ${ulmia} ask.\n\n\"Oh, don't worry about me, I will hide somewhere. Good luck!\"\n\nSulphura vanishes among the vegetation.\n\n*goto 131\n\n*label 271\n*set friend true\n\nYour attention shifts towards the devil woman.\n\n\"Are you all right?\" Sister ${ulmia} asks.\n\n\"Yes, I was planning to confess him and ask about his weak spot so I can stab him there but it seems you had a quicker remedy. Thank you, I really doubt I would be able to take more punishment before passing out.\"\n\n\"You are a brave girl. What is your name?\" Sister ${ulmia} asks.\n\n\"Sulphura.\"\n\n\"I am Sister ${ulmia} and this is Brother ${name}.\n*if dark_healing\n\t*goto 268\n\n*else\n\tYou say goodbye to the devil woman and continue.\n\t*goto 131\n\n*label 272\nFavour decreased by 1. Relations increased by 1.\n*set favour -1\n*set relations +1\n\n\"I guess my destiny is to be a healer,\" you say theatrically. \" Of all the wounded, no matter if created by the Light or the Dark.\"\n\n\"Come on, ${name}, you just want to impress the lady?\"\n\n\"I've already impressed the most special lady ever to be touched by the Light.\" You blow ${ulmia} a kiss. Then, you get to praying. It is hard to concentrate. With a demon so close to you, you are nervous. And, with such an attractive one... your eyes tend to wonder around, especially when she heals and her dark skin becomes as immaculate as the snow white of ${ulmia}.\n\n*goto 277\n\n*label 273\nRelations decreased by 1.\n*set relations -1\n\n\"Maybe I should help,\" you say with a smile that is too big to be caused by just Samarian intentions.\n\n\"No, you are doing nothing like that, dear,\" says Sister ${ulmia}. At least she seems amuzed.\n\n\"I am just trying to help.\" You shrug.\n\n\"But Ulmiroth won't be able to help doing something about it.\"\n\n\"Well, I was just about to start getting used to her.\"\n\n\"Believe me when I say it,\" the priestess says with her smile still on her face. \"You will not get used to what she will do. You had to try didn't you?\"\n\nYou decide it is high time to just shut up and consider other courses of action.\n*choice\n\t#Suggest ${ulmia} gives her some of her energy.\n\t\t*goto 274\n\n\t#The angels in the castle may need a proof of loyalty. Smite her.\n\t\t*goto 275\n\n\t#The angels in the castle may need a proof of loyalty. Enthrall her and escort her to the castle.\n\t\t*goto 276\n\n\t#Deny any help and move on.\n\t\t*goto 134\n\n*label 274\nDevilry decreased by 1.\n*set devilry -1\n\n\"You naughty boy,\" says Sister ${ulmia}. \"Are you sure you want that? Are you sure you are ready?\"\n\nYou nod but as the next minute proves that you are not.\n\nSister ${ulmia} slowly approaches the succubus, walking like a predator, gracefully shaking her hips. She bents forward and her finger dances on the tanned skin. The two beautiful pairs of lips slide over each other, then the kiss becomes more and more passionate.\n\nYou are confused. On one hand, you are jealous. You never thought that you would see her kissing another. A part of you doesn't want it to happen, much less in front of your eyes. Another part, however, really enjoys the view off her, she seems so beautiful, so excited.\n\nAfter what seems like eternity and it certainly will take more than eternity to forget, the two ladies break the kiss. Sister ${ulmia} approaches you, gently wiping her lips with the tips of her fingers?\n\n\"You enjoyed that didn't you? I wouldn't do it unless I thought it will be pleasant for you.\" Her hand touches yours.\n\nYou feel unable to respond.\n\n*goto 277\n\n*label 275\nRelations decreased by 2. Favour decreased by 1.\n*set relations -2\n*set trophy true\n*set favour -1\n\nYou mutter the prayer and the destructive Light provides a quick death to the succubus.\n\n\"What do you think you are doing?\" Sister ${ulmia} shouts and gives you a noisy slap.\n\n\"If we really want to enter the castle of the angel of frost, we'd better make a good impression on her minions. Having a proof of killing a renegade succubus could be a good idea.\"\n\n\"You are going insane. Do you realize what you did? You just executed a sentient being just for being a...\"\n\n\"Demon. Is it not what we priests were trained to do?\" you ask coldly as you make your way towards the remains of the succubus and take a bit of her charred hair.\n\n\"It is just... Do you know why I decided to be yours? I thought you are different.\"\n\n\"We are on a mission. There are things we must do in order to succeed. You know the stakes are high.\" You are still unwilling to look in her eyes as your gut feeling is that they are set to kill.\n\n\"What is the point of destroying something evil if you become it on the way?\"\n\n\"I would never become anything like her.\"\n\n\"I would bet my life that Atoro thought the very same thing.\"\n\n\"Let's just move on, shall we?\" you propose and do so without waiting for her answer.\n\n*goto 134\n\n*label 276\nRelations decreased by 2.  Favour decreased by 1.\n*set relations -2\n*set slave true\n*set favour -1\n\nA few words are all that you need to take control of the demon.\n\n\"What do you think you are doing?\" Sister ${ulmia} asks you, resentment in her voice.\n\n\"If we really want to enter the castle of the angel of frost, we'd better make a good impression on the angels. Bringing back a dangerous demon will make us look good in their eyes.\"\n\n\"You are going insane. Do you realize what you are trying to do? Any idea how much suffering she will go through? You are sentencing a sentient being to a slow and painful death.\"\n\n\"She is a demon. Is it not what we priests were trained to do, to fight the ones created by the Dark?\" you ask coldly as you make your way towards the remains of the succubus and take a bit of her charred hair.\n\n\"It is just... Do you know why I decided to be yours? I thought you are different.\"\n\n\"We are on a mission. There are things we must do in order to succeed. You know the stakes are high.\" You are still unwilling to look in her eyes as your gut feeling is that they are set to kill.\n\n\"What is the point of destroying something evil if you become it on the way?\"\n\n\"I would never become anything like her.\"\n\n\"I would bet my life that Atoro thought the very same thing.\"\n\n\"Let's just move on, shall we?\" you propose and do so and command the succubus to stand up and set off.\n\n*goto 134\n\n*label 277\n\n\"Why did you help me? You are humans. Aren't you supposed to follow the directions of Her Highness?\" asks the succubus with slightly coarse voice that gives you pleasant chill. This creature was created by the Dark to be a seductress. You know she is not doing it to you willingly.\n\n\"Well, I am not exactly human, even though I may look like one if I want,\" says Sister ${ulmia} and splits her hair in order to show her horns.\n\n\"Oh, they are so small... and lovely.\" The succubus smiles... in a pervert way. You sigh. Maybe you should stop bringing Sister ${ulmia} to hellish realms if you really want to make her human again. You really wish it ends quickly so that you may return to peaceful life and enjoy her love.\n\n\"I am sure we hate the angel of frost as much as you,\" Sister ${ulmia} smiles back at the voluptuous creature who gives her a judging look.\n\n\"I believe you. Maybe I should teach you a trick that will help you. I guess it won't work on Her High...\" The succubus is interrupted by the priestess.\n\n\"Stop calling her Her Highness, please!\" ${ulmia} is getting annoyed.\n\n\"I can make you control angels. Not for long, but you will definitely make a good impression.\" Something infernal sparks in her navy eyes.\n\n\"What do you think about it, ${name}?\" The priestess gives you an equally mischievous look.\n\n\"I must warn you that ritual is quite... intimate.\"\n\n\"What exactly are going to teach her?\" you ask the succubus.\n\n\"Some of my own... abilities.\"\n\nYou swallow a piece of dryness.\n\nIt seems that the priestess leaves the decision to you. And, it is not an easy one. You are sure that the angel of frost will be surrounded by creatures of her kind and the skill. Any new ability would increase your chances of success. On the other hand, can you trust a creature of the Dark that exists to manipulate? Will what she offers to do send your beloved priestess closer to the Dark. Are you ready to watch the ritual?\n\nWhat is your choice?\n*choice\n\t#Tell ${ulmia} to go for it and watch the ritual.\n\t\t*goto 278\n\n\t#Tell ${ulmia} to go for it but turn around and cover your ears.\n\t\t*goto 279\n\n\t#Refuse\n\t\t*goto 280\n\n*label 278\nExperience decreased by 1.\n*set experience -1\n\nIt won't be right to describe the horrors that you saw the two ladies commit with each otherat you saw but you are certain they will haunt your nightmares forever. At a particular moment you decide you can take it no more and turn around.\n\n*goto 279\n\n*label 279\nDevilry increased by 1.\n*set angel_control true\n*set devilry +1\n\nYou feel a soft touch on the back of your neck.\n\n\"Poor boy, I am sorry we kept you waiting. I hope you were a good boy and didn't poke. Sometimes, women need some, privacy.\"\n\n\"You look at the priestess mortified, she looks a shade closer to the image of Ulmiroth. Her skin colour is a bit darker.\n\n\"Let's move, ${name}, we have a lot to do together.\" She blows the succubus a kiss. \"Goodbye, my dear. I will never forget you.\"\n\n*goto 134\n\n*label 280\n\n\"I am sorry, ${ulmia}, we should go. Now, please!\"\n\nThe priestess looks at you with amazement. You can see that she is not willing to leave the game, but she does not defy you. She just blinks, blows the succubus a kiss and comes closer to you.\n\n*goto 134\n\n*label 281\n*set ghost_freedom true\n\n\"What should I do?\"\n\n\"Just do what you do best – say a prayer.\"\n\nThe mayor produces a sheet of paper, as translucent as himself.\n\n\"Where did you take that from?\" Sister ${ulmia} puts he hand before you, blocking your way just as you are about to take it.\n\n\"Why, it was the angel of frost herself. It was one of her more intricate torments. She gave us the words, but they could only be said by someone touched by the Light in order to work. A few souls tried to cleanse themselves from the taint but their efforts were futile.\"\n\nThe priestess pauses for a second, deliberating on the mayor's story. Then, she moves out of your way.\n\nYou take the sheet. It feels strange – weightless but still your fingers don't go through it. You start reading and smile at the familiar feeling of the Light going through it. As soon as you finish, there is no sign of the pentagram. The souls start flying out. The mayor is the last to go.\n\n\"Remember, if you face the angel of frost, I will come to help you in the fight and I will try to bring a few friends with me. But before I go, I need to fulfill my promise.\"\n\n*if devil\n\t*goto 284\n\n*else\n\t*goto 285\n\n*label 282\n\n\"So be it! I will help you by augmenting her powers. Please, do not abuse my trust. Don't fail your mission!\" He shows you a pair of long teeth. You can't help but tremble.\n\n\"I can't do much about you, since I am a creature of the Dark just like her,\" the mayor points at ${ulmia}.\n\n\"That would be fine. We are a team. I wouldn't call her a companion... she is more like a soulmate to me.\"\n\n\"Fine!\"\n*if devil\n\t*goto 284\n\n*else\n\t*goto 285\n\n*label 283\n\n\"I am sorry but I can't really help you,\" he says and disappears.\n\nYou shrug and leave the old church.\n*goto 130\n\n*label 284\nDevilry decreased by 3.\n*set devilry -3\n\nThe mayor shows ${ulmia} a meditation he claims to help her better control her devil self. You must admit that it is an exercise he must have perfected as he was able to control his dark desires and actually make a deal with you instead of attacking you.\n\n\"That was very nice,\" she says, stretching her lean muscles. \"Now my desire to drink your blood is much weaker.\" That comment is probably supposed to make you feel better but it fails to hit its target miserably.\n\nDeciding not to comment, you follow her back to the main square of the village.\n\n*goto 130\n\n*label 285\nDevilry increased by 2.\n*set devilry +2\n\nThe mayor shows ${ulmia} a few tricks involving manipulating the forces of the dark. You must admit that he is very good. Silently, you congratulate yourself for having him on your side instead of him being an enemy.\n\n\"That was very useful,\" she says, stretching her lean muscles. \"Now I feel I can make a mess of any creature touched by the Light.\" That comment is probably supposed to make you feel better but it fails to hit its target miserably.\n\nDeciding not to comment, you follow her back to the main square of the village.\n\n*goto 130\n\n*label 286\nThe vision shatters you, making you want to scream. You are lucky that you manage to stay silent.\n\nYou see the innkeeper with a butcher's knife in his hands. The massive blade runs through Sister ${ulmia}'s stomach, slipping it open. You try to say a healing prayer, knowing that any second you waste might be the last before she dies.\n\nHowever, the innkeeper is too quick. You can barely see as he raises his armed hand, then you see a massive spray of blood come out from somewhere below your eyes. Suddenly, the words are replaced by a gurgle. You fall to the ground.\ most other times, it continues towards you, not seeming to pay any attention to the pyre he's become.\n*if exorcist\n\t*goto 301\n\n*else\n\t*goto 302\n\n*label 296\n*if not (devil)\n\t*goto 304\n\n*else\n\t*goto 303\n\n*label 297\n*if not (devil)\n\t*goto 306\n\n*else\n\t*goto 305\n\n*label 298\n${ulmia} makes a graceful jump that makes you pause for a second, admiring what her gentle but beautiful body can achieve. Then, you both move back towards the main square.\n\n*goto 130\n\n*label 299\nJust as you begin the swing of your sword, you realize there is no chance for it to land where you want – at the base of his neck. He is simply too quick. In fact, you guess he will be able to finish his attack before you despite the great difference between the ranges of your blade and his claws.\n\nSo, you change the trajectory, anticipating the next move of the innkeeper. Your guess is correct and the sword sinks deep into the chest of the creature.\n\nSister ${ulmia} helps you free your sword stuck between his ribs and you leave the inn.\n\n*goto 130\n\n*label 300\nJust as you begin the swing of your sword, something in the back of your mind tell you there is no chance for it to land where you want – at the base of his neck. He is simply too quick. However, you feel that you need to try and hope for the best. You are not surprised when he dodges your blow and lashes at you.\n\nSister ${ulmia} does her best to help, backstabbing you with her dagger and probably saving your life by distracting the evil creature from you. She pays for her bravery with a deep wound in her chest but you use the opportunity to behead the creature of the Dark.\n\nYou look at the priestess. She is panting and bleeding heavily. You guess that she will faint soon unless you do something.\n*if healer\n\t*goto 307\n\n*else\n\t*goto 308\n\n*label 301\nYou say a few extra words you learned during your exorcist's training. They fuel the fire, making it strong enough to cremate the innkeeper before he reaches you. You sigh in relief, grab the hand of the priestess and leave the cursed inn.\n\n*goto 130\n\n*label 302\nFavour decreased by 1.\n*set favour -1\n\nYou watch in horror as the burning creature of the Dark closes on you. You hack and slash at it while the prayer of smiting continues to take its toll on him. Finally, he collapses on the ground.\n\nYou look at your wounds. Some of them seem very deep and bleeding heavily. You just need to say a healing prayer. Sister ${ulmia}, however, thanks the Light, seems fine, even though she also tried to help you defend from the innkeeper.\n\nWhen the pain subsides, you sigh in relief, grab the hand of the priestess and leave the cursed inn.\n\n*goto 130\n\n*label 303\nDevilry increased by 2.\n*set devilry +2\n\nEven with a single blade, Ulmiroth is a deadly machine. She throws the blade at the innkeeper and it lands deep into his nose. He doesn't utter a sound, which makes you wonder if he is immune to pain.\n\nIn a heartbeat, the devil priestess is right next to him. She grabs the handle of the dagger and starts twisting and rotating it until his face is a bloody soup spilled on the floor.\n\n\"Do you still get sick at the sight of me doing this?\" Ulmiroth ask with concern painted on her red face.\n\nYou reply with a single nod, doing your best not to throw up as you leave the inn.\n\n*goto 130\n\n*label 304\nDevilry increased by 1. Favour decreased by 1.\n*set devilry +1\n*set devilry -1\n\nYou nod at the priestess and she waves her hands, accumulating the magical energies around her and focusing them in the form of a fireball. After the first one hits him, he starts running towards you. When the second one does, you realize the priestess wouldn't be able to deal enough damage to him alone, so you begin a prayer of smiting.\n\nWith your combined efforts, when the innkeeper reaches you, he is in the form of sooths.\n\n\"Well done, Brother!\" She congratulates you with a kiss on your cheek. \"Now, let's move out before we have to burn someone else.\"\n\n*goto 130\n\n*label 305\n*achieve damsel\nYou raise your hands up in the air offering to catch her. However, the devil woman jumps so far behind you that you begin to feel stupid.\n\n\"You can leave your courtesy for someone who needs it,\" says Ulmiroth and heads back to the main square.\n\n*goto 130\n\n*label 306\nRelations increase by 1.\n*set relations +1\n\nYou raise your hands up in the air offering to catch her. She smiles and perches in your lap. You use the opportunity of her being so close to you to give her a long kiss.\n\n\"We have a job to do, lover boy,\" she says eventually even though her smiles indicates that she would rather continue.\n\nYou sigh, let her leave your embrace and go back to the main square.\n\n*goto 130\n\n*label 307\nFavour decreased by 1.\n*set favour -1\n\nYou hug the priestess. She almost shrieks in pain.\n\n\"What are you doing?\" She frawns.\n\n\"I am trying to be as close to you as possible so that a single healing prayer will restore us both,\" you explain.\n\n\"Oh, I thought you had less rational thoughts,\" she tries to joke but not being able to control the grimace of pain on her face, she fails.\n\nThe surge of the Light makes you anew. Not wanting to spend even a second more in the building, you return to the main square.\n\n*goto 130\n\n*label 308\nFavour decreased by 2.\n*set favour -2\n\nYou have heard that experienced healers know a trick that allows them to heal multiple targets with a single prayer, but you don't know how.\n\nFirst, you pray for the restoration of Sister ${ulmia}, then you repeat in order to receive yours. The surge of the Light makes you anew. Not wanting to spend even a second more in the building, you return to the main square.\n\n*goto 130\n\n*label 309\n\nYou keep talking but you finally realize that the devil woman is not listening to you.\n\nWhat would you do?\n*choice\n\t#Smite her\n\t\t*goto 199\n\n\t#Defend yourself physically\n\t\t*goto 200\n\n*label 310\n\nYou start putting a word after word, just like you were taught in the academy. You don't feel quite confident you will be able to calm her down, but you do.\n\n\"I am sorry, ${name}, I really don't know what happened to me. Will you forgive me?\"\n\nYou nod.\n\n\"See – the portal is over there. We must go,\" she says.\n\nShe is right. You didn't see it last time you looked there. Maybe it has just appeared. This time, its colour is creamy.\n\n*goto 312\n\n*label 311\nDevilry increased by 1. Favour decreased by 1.\n*set devilry +1\n*set favour -1\n\nYour efforts to calm her down fail. To the contrary, she seems even angrier. She produces a fireball and throws it at you. Failing to dodge, the flame engulfs you, making you scream as you collapse on the ground. You feel helpless, knowing that there is no way you could survive another fireball. But, it is then that her sanity returns.\n\n\"Are you alright, ${name}? I am so sorry, I just...\" Ulmiroth sits next to you with a worried expression on her face. \"I don't know what happened to me, will you forgive me?\"\n\nYou nod and say the prayer of healing.\n\n\"See – the portal is over there. We must go,\" she says.\n\nShe is right. You didn't see it last time you looked there. Maybe it has just appeared. This time, its colour is creamy.\n\n*goto 312\n\n*label 312\n*page_break\nThe next room is considerably darker. All you can actually see inside is a big bed, even bigger than the one is the second realm. It looks so inviting. You feel your eyelids getting heavy.\n*if sloth>6\n\t*goto 313\n\n*else\n\t*goto 314\n\n*label 313\n\nThere is nothing you can do to stop the process. Your legs threaten to fail you, your head feels heavy as if made of lead. The last thing you manage to do is take the few steps towards the bed and collapse on it. Then, you fall asleep. You dream of walking on plains covered by daisies and laughing your heart out with Sister ${ulmia}.\n\nYou never open your eyes again.\n*goto_scene death\n\n\n*label 314\nSister ${ulmia} nudges you.\n\n\"Hey, wake up, you sleepy head. The portal is over there. Let's get it over and away with!\"\n\nShe virtually pulls you towards it. And through it.\n\n*goto 315\n\n*label 315\n\n\"Where are we?\" you ask as you look around. Unlike the small rooms with no exit, you are now in a spacious chamber that seems to be the crossing point of at least three corridors.\n\n\"Oh, we made it through the valley of sins. It was one of my dreams as a little girl. You are making my dreams come true, ${name}!\" She gives you a warm smile that quickly vanishes.\n\n\"Wait, these memories, they are not real, right? The must have been imposed when I changed into a devil.\"\n\nYou embrace her.\n\n\"I love you, ${ulmia}, like only the Light may. Devil or not, no matter how they changed you, nothing can change the way you make me feel inside.\"\n\n\"Thank you, Brother! Nothing let's me feel the Light better than your touch. Now, let's make the mistress of fate pay for what she's done!\"\n\n\"Do you know which way to go?\" you enquire.\n\n\"Sure, I heard something coming from that corridor.\"\n\n\"I should see if there is a prayer for hearing aid once we finish with this,\" you murmur under your nose and make sure she is not too far ahead of you.\n\nIn the next room, there is a statue of an angel. A small figure is assembling a multitude of candles around it. Hearing you, it turns and you the sight makes you want to scream. You don't need a second heartbeat to realize it is Jonathan. He looks so much like his father, with just a few traces of Kalea's legacy.\n\nHis eyes are irisless and his skin is impossibly dark and parched. Kalea's precious son for whom she gave her life is now a creature of the Light.\n\nWhat do you do?\n*choice\n\t#Wait to see what he does\n\t\t*goto 316\n\n\t#Smite him\n\t\t*goto 317\n\n\t#Talk to him\n\t\t*goto 318\n\n\t*selectable_if (control_evil) #Say a prayer of control evil\n\t\t*goto 319\n\n\t#Exorcise him\n\t\t*goto 323\n\n*label 316\nFavour decreased by 1.\n*set favour -1\n\nThe boy raises his open hand and an unnatural wind waves his robe and carries a strong smell of putrescence. A swarm of insects attacks you. You feel dozens of bites and start trying to get them off you as your muscles start burning from the venom they injected into you. Taking a look at ${ulmia}, you realize she is as helpless as you.\n\nFortunately, the locusts soon vanish into thin air as suddenly as the appeared. The pain in the bitten places disappears as well.\n\nSister ${ulmia} laughs.\n\n\"That was just an illusion meant to buy him time to escape. The boy is very talented.\"\n\n\"I think he could just as well have killed us, illusion or not,\" you remark.\n\n\"True! This is what illusionists found out – if you trick the mind of a victim into believing in something, it becomes the victim's reality. The question is why did he leave us alive?\"\n\nYou shrug and one more time you make sure there are no fang marks on your skin.\n\n*goto 320\n\n*label 317\n*if exorcist\n\t*goto 321\n\n*else\n\t*goto 322\n\n*label 318\n\"Don't be afraid, Jonathan. We are sent by your mother...\" You raise your hand in an attempt to show him that you mean him no harm. His scream stuns you.\n\n*goto 316\n\n*label 319\nFavour decreased by 1.\n*set favour -1\n\nYou say the prayer and your mind touches his. In an instant, you fail to suppress the need to cry. You touch the innocence of a child that has been twisted into something beyond recognition with the use of the powers inherited by his witch mother and demonologist father.\n\n\"You are safe now,\" you say as you obtain control over him. You try to calm him down, but he is restless. He is damaged, you realize, by all the mingling with his powers. Doing the best you could to explain him who you are and what you want is not enough.\n\n\"I think you should let him go!\" A sudden whisper makes you turn around. It is Kalea's ghost. She has a strange dagger in her arm.\n\nYou are not very sure what she wants exactly other than you breaking your control over him.\n\nWould you agree?\n*choice\n\t#No\n\t\t*goto 325\n\n\t#Yes\n\t\t*goto 324\n\n*label 320\n\n\"It is a strange feeling,\" says the priestess. \"I can almost sense the wicked angel of frost. She is right there!\" She points at you one of the corridors.\n\n\"Do you think we should go directly there or take a look around?\" you ask.\n\nShe shrugs.\n\n\"I am as eager to face her as you, but I'd rather look around and see if there is something to help us.\"\n\nThere are two other corridors going in a similar direction. The right one is quite dark and you believe you can catch the smell of an animal. The left is better lit, but there is a spooky mist covering the floor.\n\nWhat would you do?\n*choice\n\t#Go to the left\n\t\t*goto 326\n\n\t#Go to the right\n\t\t*goto 327\n\n\t#Go straight ahead to the layer of the angel of frost\n\t\t*goto 344\n\n*label 321\nFavour decreased by 1. Codeword Dead_Boy gained. Relations decreased by 1.\n*set favour -1\n*set dead_boy true\n*set relations -1\n\nThe boy turns into a living pure and his final scream is just a shade less than what you could bear.\n\n\"What the hell did you just do?\" The priestess is furious. \"How could you even think of killing him?\"\n\n\"I... he was a creature of the Dark. I doubt I had much choice...\" Then your qualms kick in, realizing that you should have tried to save the spirit of the child without destroying the body.\"\n\n\"It is alright, ${ulmia}.\" You hear a whisper behind you. Turning around, you see Kalea's ghost.\n\n\"Now, he will find peace and so will I. I wish you good luck in defeating the demon who corrupted my husband and son.\"\n\nThe ghost kneels next to the charred body, paying last homage to her offspring. You leave her alone.\n\n*goto 320\n\n*label 322\nFavour decreased by 2. Relations decreased by 1.\n*set favour -2\n*set relations -1\n\nThe boy shouts in pain as his skin starts smoldering. Maybe your pra ugh her heart. She quickly takes it out, aiming for another blow but she drops it. Meanwhile, the prayer takes effect and she is fully healed from a wound that could very well be mortal.\n\n*goto 337\n\n*label 331\n*if zealot\n\t*goto 338\n\n*else\n\t*goto 339\n\n*label 332\n*if confessor\n\t*goto 340\n\n*else\n\t*goto 341\n\n*label 333\n*if devil\n\t*goto 342\n\n*else\n\t*goto 343\n\n*label 334\nExperience decreased by 1.\n*set experience -1\n\nYou do nothing but watch as the woman delivers a fatal suicidal blow and falls on the ground. Taking a closer look at her, you decide there is nothing left to do here, so you return to the previous chamber.\n\n*goto 320\n\n*label 335\n*set bat true\n\nYou take your sword out of the sheath and with a single blow you shatter the cage into pieces.\n\n\"You have a big heart, priest,\" says the battling, making you freeze in shock. \"I can see in your eyes that you slew many of my kind, but I fail to see evil in them. We are both fighting a common enemy.\"\n\n\"You... can talk?\" you ask.\n\n\"We can do many things. Our psi abilities are not confined to painful waves.\" It is only now that you realize he isn't actually using a voice to speak but rather you hear him in your mind.\n\n\"I will accompany you in the fight with the angel of frost as soon as it begins,\" says the battling.\n\nHappy for gaining a powerful ally, you return to the previous chamber.\n\n*goto 320\n\n*label 336\nFavour decreased by 1.\n*set favour -1\nYou are afraid while you say the prayer of prophecy. You expect to see yourself cut to pieces by the beast but instead, you envision the three of you facing the common enemy – the angel of frost. As much as you would like to see who wins, the Light decides that you've seen enough.\n\nTrusting the prophecy, you decide to set the battling free.\n\n*goto 335\n\n*label 337\nExperience increased by 1. \n*set experience -1\n*set locket true\n\n\"You... saved me from the sin,\" the woman says in a weak voice.\n\n\"The r -1\nWhatever influences her mind, your prayer of confessions and your ability to open people's heart makes you negate it. In just a few minutes. all her desire to commit a suicide is gone.\n\n*goto 337\n\n*label 341\nAt first, you manage to establish a connection with her, but it was only momentary. Suddenly, the woman delivers a fatal suicidal blow and falls on the ground. Taking a closer look at her, you decide there is nothing left to do here, so you return to the previous chamber.\n\n*goto 320\n\n*label 342\nDevilry increased by 1.\n*set devilry +1\n\nYou don't even need to think it twice. Ulmiroth is as quick as a lightning. She reaches the young woman in a single leap and disarms her with a precise blow. Unarmed, the desire to kill herself quickly vanishes.\n\n*goto 337\n\n*label 343\nSister ${ulmia} tries to gather the magic force around her, but she is much too slow. The woman delivers a fatal suicidal blow and falls on the ground. Taking a closer look at her, you decide there is nothing left to do here, so you return to the previous chamber.\n\n*goto 320\n\n*label 344\nAs you go down the corridor, it gets really cold. You can see your freezing breath as it comes out of your mouth. There is also a thin layer of snow cracking under your feet.\n\nThe corridor ends in a large chamber. You need to close your eyes for a few seconds lest be blinded by the whiteness of the snow that is almost everywhere – like dust in a long abandoned cottage. Enormous icicles hang from the roof, some of them delicately touching the floor.\n\nIn the middle of the chamber, you see your archenemy. She is bent over an altar decorated with candles and frozen flowers. The angel of frost is so beautiful that the sight of her makes tears roll down your cheek. She looks so innocent in her lacy white dress.\n\nHer eyes lay on you and you are stunned by her pale blue eyes that sparkle like melting pieces of ice. So, this is the one you need to destroy?\n\nHer wings move gracefully as she s er\n\t\t*goto 373\n\n\t*hide_reuse #Throw your sword at her \n\t\t*goto 351\n\n\t*selectable_if (rosary) #Use Florence's rosary\n\t\t*goto 354\n\n\t*selectable_if (angel) #Ask Clarissa to aid you\n\t\t*goto 355\n\n\t*selectable_if (kalium) #Ask Kalea's ghost to help you\n\t\t*goto 356\n\n\t*selectable_if (locket) #Use the locket of the demon of unrecruited love\n\t\t*goto 357\n\n\t*selectable_if (bat) #Summon the battling\n\t\t*goto 358\n\n\t*selectable_if (ghost_freedom) #Summon the ghosts\n\t\t*goto 400\n\n\t*selectable_if (retribution) #Say the prayer of retribution\n\t\t*goto 359\n\n\t*selectable_if (attack) #Ask ${ulmia} to attack\n\t\t*if (devil)\n\t\t\t*set attack false\n\t\t\t*goto 360\n\n\t\t*else \n\t\t\t*set attack false \n\t\t\t*goto 361\n\n\t#Finished\n\t\t*goto 366\n\n*label 349\nFavour decreased by 1.\n*set favour -1\n\nYou say the prayer of smiting and you are horrified to realize it has no effect on her. You begin to fear she might be invincible.\n\n*goto 348\n\n*label 350\n*set tick true\nThe little boy whispers:\n\n\"Brother, I forgot to tell you, but don't smite her. That would be in vain. Instead, heal her.\"\n\nYou nod.\n\n*goto 348\n\n*label 351\n*if zealot\n\t*goto 352\n\n*else\n\t*goto 353\n\n*label 352\nFrostdamage increased by 1.\n*set frostdamage +1\n\nYou throw your sword at the angel. She tries to dodge but her wings don't allow her to move that quickly. The blade sinks into her thigh. Chill screams, takes it out and throws it away. a crimson liquid starts raining from her, turning into bloody crystals as it falls in the ground.\n\n*goto 348\n\n*label 353\nYou throw your weapon at the angel but she manages to dodge it, despite the difficulty of moving while in the air.\nThe sword falls with a loud ding at the other end of the chamber.\n\n*goto 348\n\n*label 354\nFrostdamage increased by 1.\n*set frostdamage +1\n*set rosary false\n\nThe rosary flies out of your belt, commanded by some unknown force. It lands around the throat of Chill and starts choking her. It takes the angel of frost a few painful minutes before she manages to tear it, sending wooden balls all over the chamber.\n\n*goto 348\n\n*label 355\nFrostdamage increased by 1.\n*set angel false\n*set angeltwo true\n*set frostdamage +1\n\nYou pray for the light to send you her little servant. Clarissa appears instanteniously.\n\n\"No, not you!\" Chill shout. \"Get away from here!\"\n\n\"I love you!\" says Clarissa and blows her a kiss that makes a little explosion.\n\n\"Don't be too hard on her, ${name},\" the little angel says to you before disappearing.\n\n*goto 348\n\n*label 356\nFrostdamage increased by 1.\n*set kalium false\n*set frostdamage +1\n\nYou just think of Kalea and she stands next to you.\n\n\"Feel the wrath of a ghost who lost everything because of you!\"\n\nKalea flies up and attacks Chill. Soon, a lot of bloody feathers start falling on the ground. Finally, the angel of frost manages to banish the angry spirit.\n\n*goto 348\n\n*label 357\nFrostdamage increased by 1.\n*set locket false\n*set firedamage +1\n\nYou remember the locket the demon gave you. You just take it out and show it to Chill. The mere sight of it makes her scream hysterically. It obviously causes her enormous emotional pain.\n\nAs quick as a falcon, she charges at you and grabs the locket. Then, she throws it at the wall and breaks it into small pieces.\n\n*goto 348\n\n*label 358\nFrostdamage increased by 1.\n*set bat false\n*set frostdamage +1\n\nThe catch the smell of the battling as he flies into the room and attacks the angel of frost. Chill is too surprised to react before he gets to her and he manages to lash at her, leaving a long bloody trail on her ribs.\n\nThe angel manages to evade his next attack and even cast a spell that turns him into an ice block. As it falls to the ground it breaks, smashing the battling.\n\n*goto 348\n\n*label 359\nFrostdamage increased by 1.\n*set retribution false\n*set frostdamage +1\n\nYou remember the prayer the instructor taught you. He said he designed it to punish creatures who used to be loyal to the Light but betrayed it. The angel of frost seems to perfectly match the description.\n\nYou say the words and a ball of pure Light engulfs her and burns her with a cleansing fire.\n\n*goto 348\n\n*label 360\n*if devilry>12\n\t*goto 362\n\n*else\n\t*goto 363\n\n*label 361\n*if devilry>12\n\t*goto 364\n\n*else\n\t*goto 365\n\n*label 362\nFrostdamage increased by 1.\n*set frostdamage +1\n\nSister ${ulmia} throws her dagger with the precision of a professional knife juggler and only the quick reaction of the angel of frost saved her from a fatal wound. Instead, the dagger passes through her wing, leaving a small bloody hole.\n\n*goto 348\n\n*label 363\nSister ${ulmia} throws her dagger but misses!\n\n*goto 348\n\n*label 364\nFrostdamage increased by 1.\n*set frostdamage +1\n\nSister ${ulmia} prepares a fireball and launches it towards the angel of frost. It is very quick and only her lightning reaction saved her from getting toasted. However, one of her wings burns badly.\n\n*goto 348\n\n*label 365\n\nSister ${ulmia} prepares a fireball and launches it at the angel of frost, but Chill manages to dodge it unscathed.\n\n*goto 348\n\n*label 366\n*if favour\u003c1\n\t*goto 202\n\n*elseif frostdamage>3\n\t\t*goto 368\n\n*else\n\t*goto 367\n\n*label 367\nYou try as hard as you could to try to end the madness caused by the angel of frost, but it seems that the Light abandoned you. No matter how much damage you manage to deal to its former servant, she takes it with a wicked smile.\nYour life ends in a tomb of ice. It is a sad end to the adventure.\n*goto_scene death\n\n\n*label 368\nExperience increased by 5. \n*achieve angel_slayer\n*set experience +5\n*set dead_angel true\n\nThe angel of frost falls heavily on the floor. By the sound of the fall, you guess she must have broken at least a couple of bones. You step closer to her, feeling pity for all that you had to do to her to stop her from continuing her atrocities.\n\n\"${name}... you've relieved me from the taint of the Dark,\" she says with bloody lips. \"Not the way I wanted but I should still... thank you.\" She forces a smile, and then breathes out for the last time.\n\n\"Rest in peace, Chill,\" you say.\n\n\"Do you think we should summon Ignius and kill him as well?\" asks the priestess.\n\nYou think it over. A part of you just wants to go home and rest. It believes that your task is over and wants to spend some well-deserved time with your beloved. Another part believes that your work is not done before you bring down the creature that started it all – Ignius the Corrupor.\n\nWhat would you decide?\n*choice\n\t#Go home\n\t\t*goto 203\n\n\t#Try to summon Ignius\n\t\t*goto 204\n\n\n*label 370\n\nYou are not sure if the presence of the creatures induces it or not, but you receive a prophetic vision.\n\nYou see yourself setting the creatures free. The priestess smiles widely, obviously enjoying your decision, her fear related to the town gone. The adventurous side of hers returned, she tells you that she wants to try to ride one of them, pointing out that if they comply, the skeletal horses could take you to the palace quickly. You don't agree but don't try to dissuade her. She chooses one of them. The undead creature stands still as she gets on it back. And... as soon as she puts her both hands on the chain reigns, she vanishes together with the mount. You scream in horror. Fear almost overcomes you, but you decide that wherever she is gone, you must go with her. You jump on the back of the other horse and you see the world around you blur. And then, it is ${ulmia} again, safe and sound. You don't see much else as the vision fades away. You know from experience that it means that the prophetic vision is taking you further away in time... you catch a glimpse of the angel of frost, staring at you with her pitch b\nlack eyes. And then, the vision is over.\n\n\"Brother ${name}, are you all right?\" The voice of ${ulmia} sounds worried.\n\n\"Yes, my dear, I just had a vision.\" You smile, trying to sooth her. \"The horses, they are a means of travel.\" You massage your temples, trying to get over the after effects of the dream.\n\n\"I wouldn't expect any less of them.\" She chuckles.\n\nIt is only then that you realize what you said.\n\n\"No, I am serious. I mean, they can teleport us to the place where the angel of frost is.\"\n\n\"Now that are news,\" she exclaims.\n\n*goto 371\n\n*label 371\n\n\"Do you think we should set these wretched creatures free?\" you ask ${ulmia}.\n\nShe shrugs.\n\n\"I would love to see them free. Noone knows how long they have been trapped here. But I would like to leave the decision to you.\"\n\nWhat would you do?\n*choice\n\t#Set them free\n\t\t*goto 372\n\n\t#Don't – return to the main square\n\t\t*goto 130\n\n*label 372\nExperience increased by 1.\n*set experience +1\n\nYou take out your sword and hit the chains. They are old and corroded, so they don't give you a hard time. The skeletal horses immediately get out of the stables. But then, they don't just run away but rather start prancing on the square.\n\n\"Oh, they are lovely, aren't they!\" Sister ${ulmia} puts a big smile. You give the mounts a skeptical look. Well, all you see are two skeletons covered by rags but you decide to say nothing.\"\n\n\"They are not running away. Maybe they need a ride,\" says the priestess. You are beginning to get annoyed by her excitement with these undead monsters. Yet, you decide to say nothing for the time being. There is not much time to do so anyway, as she jumps on the back of the animal. It raises on its back legs and... disappears into thin air.\n\n\"${ulmia}!\" you shout and get on the back of the other undead animal. Suddently, the world around you fades away.\n\n*goto 158\n\n*label 373\n*if healer\n\t*goto 407\n\n*else\n\t*goto 408\n\n*label 374\n\n\"Of course not, dear.\" You smile and quicken your pace. \"You know very well that she can be quite dangerous.\"\n\n\"Then why do you ask me such stupid questions?\" She enquires as you step out of the fog.\n\n\"I just was wondering... She is a survivor and I was worried about you.\" Your explanation suddenly doesn't seem that sound.\n\n\"If you are really worried about me, keep my alter ego as far away from me as possible, please. And, don't underestimate me. I am a survivor too.\"\n\n\"I am sorry, ${ulmia}. Forgive me?\"\n\n\"Sure.\"\n\n*goto 130\n\n*label 375\n*set devil true\n\n\"${name}, you know I left the control over my alter ego to you since I trust you more than myself. Do you really want me to return to the mists and allow my devil alter ego to become me?\"\n\nYou just nod, not sure if any explanation would be fit.\n\nAs she turns her back on you, you can swear you see a couple of tears in her eyes.\n\n\"${ulmia}, if you don't want, you don't have to... I was just thinking.,,\"\n\nA non-human howl interrupts you.\n\n\"${ulmia}, are you all right?\" You shout and run in the mist. Sister ${ulmia} lies before you, her face down on the ground. You grab her by the shoulders and pull her up. The dim light doesn't let you see the transformation at first, but when she opens her eyes, there is none of the emerald serenity that you adore... only hellfire.\n\n\"Miss me, sugar?\" She asks with a smile so wicked you want to push her away from you.\n\n\"Not really,\" you murmur.\n\n\"Then why did you ask her to summon me? Your actions perplex me.\" Her face looks flabbergasted, something you would never expect her to feel.\n\n\"I thought you would stand a greater chance of surviving in this world. I really love you... I mean ${ulmia}.\"\n\n\"We are as one, dear priest. If you love her, you love me as well... even though it will be hard for you to accept it. Lose me... and you will lose her too.\"\n\n\"You would kill me, wouldn't you.\"\n\n\"Not really. We devils are different. Our love is possessive. I would enjoy consuming your soul, feeling it spread all over me, knowing that no other woman will have you. You probably won't understand that.\"\n\n\"Well, if you disembowel me and destroy my soul, I wouldn't take it as a sign of love.\"\n*if devilry>7\n\t*goto 376\n\n*else\n\t*goto 377\n\n*label 376\n\n\"You will see that it is not that bad,\" Ulmiroth hisses and jumps on your back. Her nails sink into your back and her teeth make a bloody mess out of your throat.\n\nThis is a sad end to your adventure.\n*goto_scene death\n\n\n*label 377\n\n\"Yes, I wouldn't expect you to understand. Let's get back to the village.\" She walks more gracefully that ${ulmia}, you have to admit. But there is something predatory in her stroll, something that horrifies you rather than excites you.\n\n\"I miss my daggers. I feel naked without them,\" says Ulmiroth. \"I hope we manage to recover them soon.\n\n*goto 130\n\n*label 378\n\nSome more souls try to pass through you and the priestess, but you are just a few steps from the end of the pentagram. As you leave it, the ghosts become quiet again.\n\n\"I feel sorry for them,\" says ${ulmia}. \"It must be terrible to be a prisoner even after your death.\"\n\n\"Often the victims themselves are the reason they become wraiths. The desire to revenge is too strong to let them become one with the Light. However, I fear that may not be the case. It is the pentagram that makes them stay here.\"\n\n\"Do you think when we kill Chill they will be set free?\"\n\n\"Definitely. If we judge from what happened to the last realm of the angel of frost, it will be destroyed, so will the pentagram.\"\n\n\"Let's go then!\"\n\n*goto 130\n\n*label 379\nFavour decreased by 1.\n*set favour -1\n\nYou say the holy words and the tormented souls around you wail in agony and retreat towards the corners of the pentagram, allowing you a save passage. You don't waste a second, grab ${ulmia}'s hand and rush out of the building.\n\n\"Was that necessary?\" The priestess asks you as you leave. \"I mean, were they going to harm us?\"\n\n\"I can't be sure but I didn't want to take any risks. The fact that the prayer of smiting damaged them clearly indicates that they are filled with energies of the Dark. However, despite what the Church teaches, it is not certain that they are malevolent, much less that they would do something bad to us. You can never know but we... you are much too important.\"\n\n\"That was sweet.\"\n\n*goto 130\n\n*label 380\nExperience increased by 1.\n*set experience +1\n\nYou wouldn't allow a few confused souls to frighten you.\n\n\"Listen, ghost, I am a priest and I want you to stop trying to harm us or else suffer the cleansing might of the Light.\"\n\nYour warning is effective and soon the angry souls retreat towards the edges of the pentagram. Only one of them approaches you again. It obtains the form of an old man in formal attire.\n\n\"Please, excuse my comrades. We don't often get visitors and I guess we are beginning to lose our hospitality. My name is Sweep and I was the mayor of the village before the angel of frost came and cursed us. I take you are not here to destroy us, since you haven't done so already.\"\n\n\"True. We need to get to the one you mentioned and banish her,\" you say coldly.\n\n\"That is a noble mission. I would like to help you somehow... in exchange of our freedom.\"\n\n\"I see you are a politician, trying to negotiate right from the beginning,\" you remark.\n\nThe apparition smiles.\n\n\"It is very hard to escape from yourself. As a... politician as you put it, I also enjoy talking, so if you are not interested in setting us free, we can at least have a chat.\"\n\n\n*goto 381\n\n*label 381\nWhat would you like to ask the mayor?\n*choice\n\t#Enquire about the village\n\t\t*goto 382\n\n\t#Enquire about the angel of frost\n\t\t*goto 384\n\n\t#Enquire about your reward for setting them free \n\t\t*goto 385\n\n\t#Refuse to set them free but require help\n\t\t*goto 386\n\n\t#Agree to set them free\n\t\t*goto 281\n\n*label 382\n\n\"The village was a nice place before the angel of frost came and brought havoc here.\"\n\n\"We are more interested to hear about what it has become,\" you remark.\n\n\"Oh, I guess that information might be more useful to you. I can tell you about it since she transformed it before she killed and imprisoned us. At first, she summoned the mists in the graveyard as a means of doing something good for us. It was supposed to undo changes a person or woman went through. Chill advertised it as a cure for the sick and handicapped. Unfortunately, these mists appeared to be very whimsical. One of the first villagers to try it turned into a baby. Since then, nobody dared enter.\"\n\n\"Maybe the angel of frost is not that powerful. Maybe her skills of manipulating the Light and Dark are not that good,\" Sister ${ulmia} suggests.\n\n\"You wish,\" you reply. \"Well, we destroyed her last realm, so I guess you are right. By the way, mayor, are all the villagers here with you?\"\n\nSweep shakes his head.\n\n\"No. Chill decided to spare the inn keeper. Be careful if you visit him. He is as talkative as me, but he can also be very dangerous. Whatever you do, don't stay there too long.\"\n\n\n*goto 381\n\n*label 383\n\n\"She didn't give us much of a chance to get to know her, other than the massacre she organized and the prison of souls she reserved for us. But, I know for sure that she has a reason to fear us. What she did was not an act of mere cruelty, it was reasonable.\"\n\n\"It makes sense,\" you say.\n\n\"This is another reason for you to set us free.\"\n\n\"I expected you to say that, mayor.\"\n\n\n*goto 381\n\n*label 384\n\n\"I like it when we talk business.\" The mayor rubs his hands. \"You said you were after chill. I can't promise that it will be true for everyone... or actually anyone else, but I will join you when you face and fight her.\"\n\n\"What an old specter like you can do to Chill?\" ${ulmia} enquires.\n\n\"Never underestimate what a creature of the Dark can do to an angel!\"\n\nThe way he says it is so tainted that you wonder if there is a hidden threat to you.\n\n\"I can see the Dark in your companion, priest,\" the mayor says to you. \"I can help her with it.I can tell her more about it, how to use it and to protect against it.\"\n\n\n*goto 381\n\n*label 385\n\n\"I guess you could help us even if we don't set you free. If we defeat the angel, this world will end together with the pentagram and you will be free to join the Light,\" you suggest.\n\n\"And what if you lie to us? What if you are lying or just chicken out before continuing on your quest to kill Chill? My effort would be in vain.\"\n\nHe gives you an appraising look.\n\n*if not (confessor)\n\t*goto 283\n\n*else\n\t*goto 282\n\n*label 386\n*set ghost_freedom true\n\n\"I can't do much about you, since I am a creature of the Dark just like her,\" the mayor points at ${ulmia}.\n\n\"That would be fine. We are a team. I wouldn't call her a companion... she is more like a soulmate to me.\"\n\n\"Fine!\"\n\n\"But first, set us free!\" he demands.\n\n\"What should I do?\"\n\n\"Just do what you do best – say a prayer.\"\n\nThe mayor produces a sheet of paper, as translucent as himself.\n\n\"Where did you take that from?\" Sister ${ulmia} puts he hand before you, blocking your way just as you are about to take it.\n\n\"Why, it was the angel of frost herself. It was one of her more intricate torments. She gave us the words, but they could only be said by someone touched by the Light in order to work. A few souls tried to cleanse themselves from the taint but their efforts were futile.\"\n\nThe priestess pauses for a second, deliberating on the mayor's story. Then, she moves out of your way.\n\nYou take the sheet. It feels strange – weightless but still your fingers don't go through it. You start reading and smile at the familiar feeling of the Light going through it. As soon as you finish, there is no sign of the pentagram. The souls start flying out. The mayor is the last to go.\n\n\"Remember, if you face the angel of frost, I will come to help you in the fight and I will try to bring a few friends with me. But before I go, I need to fulfill my promise.\"\n*if devil\n\t*goto 284\n\n*else\n\t*goto 285\n\n*label 387\nYou...\n*choice\n\t*selectable_if (animal) #have the dog whistle\n\t\t*goto 208\n\n\t*selectable_if (weapon) #have the angelic weapon\n\t\t*goto 209 \n\n\t#have the angel of frost besides you\n\t\t*goto 210\n\t\n\t*selectable_if (angel) #use Clarissa's help \n\t\t*goto 211\n\n\t*selectable_if (free_boy) #can rely on Jonathan\n\t\t*goto 212\n\n\t*selectable_if (slave_boy) #enslaved Jonathan\n\t\t*goto 212\n\n\t#want to smite Ignius\n\t\t*goto 213\n\n\t#finished all available options\n\t\t*goto 216\n\n\n*label 395\n\n\"That is quite impressive,\" says one of the angels. \"Just go ahead until you find the head of security. You will receive your award.\"\n\nYou enter the gate and marvel at the magnificence of the icy marble and the frosty runes.\n\n\"I haven't seen any like them in my life. They are not in demonic,\" says Sister ${ulmia} before you ask her.\n\nYou arrive at an armory and are greeted by a strong looking angel. He takes a minute to listen to your story...\n\nAnd this is all you remember clearly. It seems that someone hits you in the head and you lose consciousness. Then, your nighmare of being stripped off the Light seems much too vivid to be just a dream.\n\nIt is a sad end of your adventure.\n\n*goto_scene death\n\n*label 396\n*goto 395\n\n*label 397\nFavour decreased by 1. \n*set favour -1\n*set weapon true\n\nIt seems strange to confess angels, but the principle is the same, only the source of power seems to be... dubious.\n\n\"You will find only death here,\" says one of the angels. \"You'd better get away as soon as possible.\"\n\n\"But I need to speak with the angel of frost you remark.\"\n\n\"Try the village. There must be a pair of horses that know the way to her lair. Take this in case toy fight a monster,\" he removes the top of his spear and gives it to you.\n\nYou thank them and head for the village.\n\n*goto 139\n\n*label 398\nDevilry increased by 1. Codeword Weapon gained.\n*set devilry +1\n*set weapon true\n\nThe priestess needs only a nod to make her use her newly acquired. She decides to take control of one of the angels and make him stab the other. The poor victim never sees the blow coming.\n\n\"You will find only death here,\" says the possessed one. \"You'd better get away as soon as possible.\"\n\n\"But I need to speak with the angel of frost you remark.\"\n\n\"Try the village. There must be a pair of horses that know the way to her lair. Take this in case toy fight a monster,\" he removes the top of his spear and gives it to you.\n\nYou head for the village.\n\n\"What should I do, mistress?\" The angel's voice is filled with anxiety.\n\n\"Bury your friend!\" says ${ulmia}.\n\n*goto 139\n\n*label 399\nYou don't even see it coming, but all of a sudden the guards attack you with their spears. You have no chance against the seasoned fighter. After the second stab, you lose consciousness and never wake.\n\n*goto_scene death\n\n*label 400\nFrostdamage increased by 1.\n*set ghost_freedom false\n*set frostdamage +1\n\nJust thinking about the ghosts you set free form their prison is enough to make an angry spectral mob appear in the chamber. The wraiths start dancing around Chill, every now and then a ghost attacking her from behind.\n\nIt doesn't take her a lot of time to deal with the undead menace, but until then, the damage is done.\n\n*goto 348\n\n*label 401\nExperience increased by 6.\n*achieve demon_slayer\n*set experience +6\n\nIgnius kisses the ground. The crawling cold attacks him from all sides, determined to engulf him.\n\n\"Did we really kill him?\" Sister ${ulmia} asks, unable to believe what happened.\n\nYou just nod.\n\n*if dead_angel\n\t*goto 403\n\n*else\n\t*goto 402\n\n\n*label 402\nExperience increased by 2.\n*achieve angel_saviour\n*set expe
