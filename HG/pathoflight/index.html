.\nIt is only then that you get to the other side of the cavern. You kneel next to Sister ${ulmia} to check her wound. Nothing too serious for a flash heal to take care of. You say the prayer and she is back on her feet.\n*goto hzerosix\n\n*label hzerofive\n*set favour -3\nFavour decreased by 3 points.\n*line_break\nYour decision to hurry to get to the other side of the cavern appears to be a mistake. By the time you reach ${ulmia}, she's stung several more times. The sight of her being jabbed by the abominations infuriates you, as you take your sword out. The first pinkie tries to counteract. In a dream, you feint and behead him with a single blow. The second spearmen appears to be a much better fighter and manages to evade all of your attacks, however, the battle ends when the lupine creature surprises him from behind and bites his neck.\n\nAs soon as you see him fall, you check the condition of Sister ${ulmia}. She is bleeding heavily, the redness of her immaculate lips extending to her chin. It takes a lot of prayers to bind her wounds and heal them. You sigh with relief when she stands up without showing a sign of pain.\n*goto hzerosix\n\n*label hzerosix\n*page_break\n\"Greetings, strangers. Thank you for helping Grawler, the servant of the Forrest,\" he introduces himself.\n\n\"I'm Brother ${name}, priest of the Light and this is Sister ${ulmia}. If we acted in your service, you certainly returned the favour,\" you explain. \"What are you? I haven't seen anyone of your design,\" you say.\n\n\"I am a fangbearer and my kind is created by Mother Nature in order to preserve it. She combined features of humans, wolves and wolverines when making us,\" he explains.\n\"What are you doing in this hell?\" asks Sister ${ulmia}.\n\n\"I came into the mine to search for a sphere of power that was believed to be able to heal the mother tree in this forest. My brethren and I feared that if that tree dies, that would doom the forest to a slow death. So, I was in when the entrance collapsed.\"\n\n\"Did you manage to find it?\" you inquire.\n\n\"Yes, I did,\" he says and looks at you and ${ulmia} judging you. You realize that sphere might have been the reason he was attacked by the pinkies and now the beast fears that you may want to take it too. \"And what are you doing here?\" he asks.\n\n\"We are trying to find and rescue an angel,\" Sister ${ulmia} explains. \"Do you know anything that could lead us to her?\"\n\nThe beast shakes his head.\n\n\"Sorry, I can't help you with that now, maybe if I manage to recover, I can cast a detection spell which would be difficult in these tunnels filled with energies of the Darkness. But now, I need your aid. Right now, I can use the energy to cast a spell to teleport me...\" he looks in your eyes,\" and you outside this mine, but then I will have nothing to save the main tree. I must obtain the second sphere.\"\n\n\"I assure you we have no intention of leaving this place before achieving our goal. Where is that sphere located?\" you enquire.\n\n\"It is down that tunnel. The caverns there are inhabited by battlings,\" he sniffs the air, as if trying to make out if any of them is coming from that direction. \"These are powerful creatures, more dangerous than the pinkies we faced today. They fly and shriek and make my head hurt...\" the fangbearer looks down. \"I really wish the sphere was somewhere else, but it's not. I smell it,\" he sighs.\n\n\"I don't know, ${name}, we are here for a different purpose and this could slow us down. But, we really have no idea where to go and me may as well find a clue there,\" Sister ${ulmia} says.\n\nWhat would be your decision?\n*choice\n\t#Help Growler\n\t\t*goto hzerosev\n\n\t#Continue on your way\n\t\t*goto hzeroeit\n\n*label hzerosev\n*set experience +1\nExperience increased by 1.\n*line_break\n\"All right, Growler, I guess it was the Light that made you appear on our way, and maybe it was a sign that we should help you some more,\" you declare.\n\nThe fangbearer gives out a low, thankful howl. The tunnel is a bit darker. The shining mushrooms are fewer and some of them seem to have been intentionally destroyed. You stumble at a rock and almost fall to the ground.\n\n\"You don't see well in the dark?\" wonders the beast. \"Of course, Mother Nature hasn't bestowed you with the eyes of its finest creatures. Nevermind, I can fix that, for a day or two.\"\n\nYou feel tempted to argue against his beliefs but decide that this is not the right time to discuss it. And, you don't want to interrupt his spell. Suddenly, the tunnel seems slightly brighter, just good enough for you to be able to see where you are going.\n\n\"I'm sorry, but I can't make your sight in the dark any better. It seems humans are simply not cut out to be nocturnal. Aw, that' disgusting...\"\n\nYou come across the putrid remains of a bat-like creature. It is slightly smaller than a human, with jet black skin that has been pierced by spears in tens of places. The lower half of the creature is almost beyond recognition, eaten... except for the spiny tail ending with a sharp sting.\n\n\"That must have been the pinkies. As if the battlings are not enough...\" grumbles Growler.\nA few hundred meters down the tunnel, it ends in the biggest cavern you've seen. You realize why battlings live here - they could easily fly, even soar here. You see a lot of nests on the wall in front of you.\n\n\"The sphere is somewhere over there,\" says Grawler.\n\n\"But how do we reach it. We stand no chance of climbing that steep wall,\" protests Sister ${ulmia}.\n\n\"It's not getting up there that worries me, it is the creatures that will come down as soon as they see us,\" snaps the fangbearer.\n\nSuddenly, you hear someone running in your direction. You and Grawler manage to jump behind a niche in the wall. It is only then that you realize that there is simply no space for her to do so. A pinkie comes from the great cavern, running away, his steps echoing in the tunnel but still unable to mute the noise from the leathery wing buffet of his pursuer. The pinkie doesn't slow down running past ${ulmia}. Quick as lighting, the battling flies into the tunnel on top of the priestess and hugs her, covering her completely with its wings. Her cry makes your heart bleed.\n\nThen comes the headache. It sucks away all of your strength, making you unable to stand on your feet. It is very hard for you to even think. Your fingers wrap around the medallion. Is it wise to use it now, or try to mobilize yourself to take out your sword and attack the battling?\n*choice\n\t#Yes\n\t\t*goto hzeronine \n\n\t#No\n\t\t*goto honezero \n\n*label hzeroeit\n\"I'm sorry, Growler, we have something urgent to do and are in a hurry,\" you explain.\nSister ${ulmia} looks at you questioningly. She's right, you don't know where to go, while Growler seems to be familiar with these tunnels. But, you fear that he is a magnet for trouble.\n\n\"I understand, kind people. You did enough for me already. I wish you luck.\"\n\n\"May the Light bless you,\" you say and head in an arbitrary direction.\n\n\"Just don't go there,\" he warns you.\n\n\"Why?\"\n\nYou need to hear no answer as something roars in the darkness ahead.\n\n\"Manticores really hate visitors to their pens,\" the fangbearer explains.\n\n\"Maybe we should reconsider travelling by ourselves, what do you think, Sister?\" you ask.\nThe priestess nods. \"All right, Growler, I guess it was the Light that made you appear on our way, and maybe it was a sign that we should help you some more,\" you declare.\nThe fangbearer gives out a low, thankful howl.\n\nThe tunnel is a bit darker. The shining mushrooms are fewer and some of them seem to have been intentionally destroyed. You stumble at a rock and almost fall to the ground.\n\n\"You don't see well in the dark?\" wonders the beast. \"Of course, Mother Nature hasn't bestowed you with the eyes of its finest creatures. Nevermind, I can fix that, for a day or two.\"\n\nYou feel tempted to argue against his beliefs but decide that this is not the right time to discuss it. And, you don't want to interrupt his spell. Suddenly, the tunnel seems slightly brighter, just good enough for you to be able to see where you are going.\n\n\"I'm sorry, but I can't make your sight in the dark any better. It seems humans are simply not cut out to be nocturnal. Aw, that' disgusting...\"\n\nYou come across the putrid remains of a bat-like creature. It is slightly smaller than a human, with jet black skin that has been pierced by spears in tens of places. The lower half of the creature is almost beyond recognition, eaten... except for the spiny tail ending with a sharp sting.\n\n\"That must have been the pinkies. As if the battlings are not enough...\" grumbles Growler.\nA few hundred meters down the tunnel, it ends in the biggest cavern you've seen. You realize why battlings live here - they could easily fly, even soar here. You see a lot of nests on the wall in front of you.\n\n\"The sphere is somewhere over there,\" says Grawler.\n\n\"But how do we reach it. We stand no chance of climbing that steep wall,\" protests Sister ${ulmia}.\n\n\"It's not getting up there that worries me, it is the creatures that will come down as soon as they see us,\" snaps the fangbearer.\n\nSuddenly, you hear someone running in your direction. You and Grawler manage to jump behind a niche in the wall. It is only then that you realize that there is simply no space for her to do so. A pinkie comes from the great cavern, running away, his steps echoing in the tunnel but still unable to mute the noise from the leathery wing buffet of his pursuer. The pinkie doesn't slow down running past ${ulmia}. Quick as lighting, the battling flies into the tunnel on top of the priestess and hugs her, covering her completely with its wings. Her cry makes your heart bleed.\n\nThen comes the headache. It sucks away all of your strength, making you unable to stand on your feet. It is very hard for you to even think. Your fingers wrap around the medallion. Is it wise to use it now, or try to mobilize yourself to take out your sword and attack the battling?\n*choice\n\t#Yes\n\t\t*goto hzeronine\n\n\t#No \n\t\t*goto honezero\n\n*label hzeronine\n*set devilry +1\n*set experience +3\nDevilry increased by 1. Experience increased by 3\n*line_break\nYou are not sure if you got the prayer right, so you say it again and again, trying to assure yourself that your decision was correct. If the lizardmen are to be trusted, then the pinkies fear the Light and therefore are creatures of the Darkness. The battling was unable to slow down the pinkie with its special ability therefore, maybe infernal creatures are immune to it. Just like devils.\n\nThe headache stops and Sister ${ulmia}'s darker half emerges from below the leathery wings, soaked in brownish blood. She cleans her blades with her tongue, then does the same with her fingers. Disgusting!\n\n\"This hell of a creature doesn't have a soul, which is quite a pity. But its blood tastes like sugar. Dare to try it, ${name}?\" She gives you a seductive smile.\n\nYour response is to quickly hide that red skinned abomination back into your beautiful friend.\n\n\"I really need water,\" says the more familiar voice of the priestess.\n*goto honeone\n\n*label honezero\n*set favour -1\nFavour decreased by 1.\n*line_break\nYou grit your teeth and stand up. With your peripheral vision you see that the fangbearer is unable of achieving that feat and he agonizes on the floor, his massive claws on his head.\n\nThe few steps to Sister ${ulmia} seem to be the hardest in your life, but her screams fuel your rage and you manage to take your sword out of its sheath's embrace, though it feels as heavy as a the altar at your church. By the time it arcs up, your hands feel so numb that you almost drop it. It falls on the battling, cutting its leathery skin and launching a fountain of brown blood in the air.\n\n\"${ulmia}!\" you shout, fearing that you might have wounded her with your sword. You grasp the dead body of the flying beast and take it away from her. She fights for her breath, blood coming from her lips. The fact that her injuries were not done by your blade means little to you right now, as you suffer as much as her.\n\nYou say the flash heal, just as her eyes turn black, facing the other world. You're just in time to bring her back. It takes her a few minutes to recover from the dreadful experience. You help her stand up and approach Growler.\n*goto honeone\n\n*label honeone\n*page_break\n\"That's an impossible mission,\" wails Growler. \"I am completely helpless when they start emitting these waves.\"\n\n\"There must be some other way to deal with them,\" Sister ${ulmia} says savagely. \"All creatures have their weak spots. We just need to find them and exploit them.\"\n\n\"I was thinking of giving up,\" you admit. \"I think it's too dangerous. You know that if we die here, the little angel will remain here...forever.\"\n\n\"I propose that we spend some time observing them from a distance. If we fail to find any signs of weakness, we will give up,\" says ${ulmia}.\n\nWhat would you decide?\n*choice\n\t#Spy on the battlings\n\t\t*goto honetwo \n\n\t#Give up\n\t\t*goto honethree\n\n*label honetwo\n*set experience +1\nExperience increased by 1.\n*line_break\n\"Okay, but I insist on maximum precautions,\" you say. She nods and presents you with a devilish smile.\n\nYou manage to find out a lot of information about the surroundings. There appear to be numerous tunnels leading to the vast cavern. One of them leads to the lair of creatures resembling big ants. You observe as a group of battlings hunts two of them. They eat one on the spot, then carry the other to a distant tunnel, where they leave it and fly away.\n\"What is that supposed to mean?\" you murmur to ${ulmia}.\n\n\"I'm going there to check up from a closer distance,\" she says and runs head over heels into the danger zone. You sigh and look away, as if protesting would help.\n\nThanks the Light, she comes soon back, panting.\n\n\"The body of the ant is put in front of a roughly cut stone statue. I thought it was some sort of a pagan god, then I looked into the tunnel. There were at least half a dozen of those creatures, they were made of stone, yet moved as if alive. They took the ant corpse and dragged it into their tunnel.\"\n\n\"These must be stone golems,\" assumes Growler.\" They are dangerous rivals and I suppose I can control them, since they are created by the forces of elements. I don't say it would be easy, but I can try. I've done it outside, but here, everything could easily be corrupted and I can't control a mix of nature and dark energies.\"\n\n\"Maybe I can help you with the Darkness,\" ${ulmia} proposes.\n\nThe fangbearer shakes his furry head.\n\n\"I'd rather die than risk being contaminated... Don't be insulted...\" Growler says apologetically.\n\n\"It's ok. What do you think the battlings give the golems.\"\n\n\"It is food. It seems they fear the golems and want to keep them content,\" Growler explains.\n\n\"Do golems eat?\" inquires ${ulmia}.\n\n\"No, they don't, however, the flesh and external skeleton of the ant might be interesting for their attempts to reproduce and perfect themselves,\" the fangbearer explains.\nWhat he says seems strange enough, but you decide not to ask him any more questions for the time being.\n\n\"I felt something while I was there,\" whispers ${ulmia}, as if in a trance. \"It was terrific. Over there, there is a crypt, full of corpses. They wriggle and move, most of them still not strong enough to leave their cold home. So they stand there waiting. I could be their queen. I could make them attack the battlings,\" she says with a fiendish glitter in her beautiful eyes.\n\nYou search for the medallion and are relieved to find it. It is on you, and maybe it was the problem, because it wasn't next to her while she was away.\n\n\"You got carried away by the dark energies there, didn't you, Sister?\"\n\n\"Yes, it was a mistake. I really stick to you as you are the one with the medallion,\" she wraps her hand around your neck. Her feminine smell overwhelms you and you barely control the urge to hug her.\n\n\"Please, I need to take control of these zombies. I want you to stand next to me. It is one of my fantasies,\" she smiles.\n\n\"${ulmia}, my role is not to allow your devil self to take control over you. I can't let you do it.\"\n\n\"I know you care for me, but I really want to feel you walking on the edge between the Darkness and the Light. It's so hard to explain,\" Sister ${ulmia} sheds a tear. \"Besides, I may need someone blessed to help me in case things get ugly.\"\n\nYou sigh. Women are said to be hard to understand and this is certainly the case now. You know that if you decide to follow her plan, this will fuel her devilry but will also make her happy.\n\n\"So, what makes you two think the battlings won't use their mind flail ability when faced with the golems or the zombies?\" you ask.\n\n\"They are clever creatures. They know their mind tricks won't work on any of those enemies. So, I hope they won't see us,\" explains Growler.\n\nWhat is your choice?\n*choice\n\t#Go to the golems\n\t\t*goto honefour\n\n\t#Approach the zombies\n\t\t*goto honefive\n\n*label honethree\n\"I understand your fear, priest,\" says Growler. \"You helped me against the pinkies, now I will do what I can to return the favour.\" He closes his eyes and concentrates, breathing deeply.\n\n\"I feel your angel. Just take that tunnel,\" he points to the right. \"At the second junction, turn left, then to the right. This is all I can tell you without spending too much of my energy.\"\n\n\"Thanks, Growler, I wish you luck with your cause!,\" you hug him and pat his back.\n\"May our paths cross again!\"\n\nSister ${ulmia} nods. You take her hand and move on.\n*goto hfourone\n\n*label honefour\n*set favour -1\nFavour decreased by 1.\n*line_break\n\"Oh, ${name}, you could be so boring at times,\" Sister ${ulmia} sights. \"Okay, let's move to those pieces of stone.\n\n\"No way!\" Growler snarls. \"If they see you, you'd be dead meat in a minute. Your species is rare here. They'd think you would fuel their evolution. I'll go alone. Just accompany me to the cave in case there's a battling on my way.\"\n\n\"As you wish,\" ${ulmia} shrugs. \"Just be aware that you might be quite exotic too.\"\n\n\"I am, but they won't do any harm to me, because I'm a master of the elements.\"\n\nUnfortunally, that doesn't prevent him from having to run for his life, being chased by half a dozen of golems running ridiculously fast for their bulky bodies. One of them throws a stone at Growler and hits him on the head. The fangbearer grabs his head but continues running. The pursuers stop as they reach the cavern, probably unwilling to enter battling territory.\n\nThe wound seems ugly, so you are forced to say a healing prayer.\n\n\"What happened?\"${ulmia} asks.\n\n\"Too much dark energy,\" Growler says panting.\n\n\"Great, now we should proceed with the zombo plan, Sister,\" you say.\n\n\"I knew you'd make it happen,\" ${ulmia} triumphs and gives you a kiss on you cheek. \"Let's go!\"\n\nYou are still not sure you should do that and your uncertainty only increases as you go into the cavern and towards the crypt.\n\n\"Who was buried here?\" you ask.\n\n\"Why, nobody actually. My guess is that someone just piled here some of the casualties from the collapse. Or maybe some of those who couldn't adapt... they are stored here.\"\nYou come to a structure cut into the wall. A foul stench comes from the hole that appears to be the entrance. It is too much for you to take.\n\n\"Come on in, please,\" insists ${ulmia} with a bribing smile on her face.\n\n\"I really can't do it, Sister.\"\n\n\"Oh, don't be afraid of putrescence. We all end that way, sooner or later. Besides, try to get used to it. It will become worse when they start moving.\"\n\nYou pinch your nose and enter. Two of the living dead welcome you just like a wolf would do with a lamb that accidentally entered their den. Their bodies are almost mummified. The bones that are not exposed are covered with an indiscernible mess of dried flesh and rags. The zombies appear to be having almost full sets of teeth and are desperate to get the taste of you. You don't need to think more before launching the prayer of smiting. Bright light explodes inside the ribcages of the walking dead and reduce them to ashes.\n\"Be careful using the Light here. You may sanctify this place and make our task impossible\"\n\n${ulmia} sits on the floor, her legs crossed, eyes closed, lips whispering something you can't fathom. Two more zombies approach you, dragging their feet, closing on you. ${ulmia}'s face remains blank and it seems that she's oblivious to what's happening. The undead are close now, one of them starts sniffing the priestess. His bony hand is so close to her still shut eyes that your imagination vividly portrays the scene of him inserting his fingers right into her brain.\n\nWould you smite him?\n*choice\n\t#Yes\n\t\t*goto honesix\n\n\t#No\n\t\t*goto honesev\n\n*label honefive\n*set devilry +2\n*set relations +2\n*set favour -1\nDevilry increased by 2. Relations increased by 2. Favour decreased by 1.\n*line_break\n\"I knew you'd make it happen,\" ${ulmia} triumphs and gives you a kiss on you cheek. \"Let's go!\"\n\nYou are still not sure you made the right choice and your uncertainty only increases as you go into the cavern and towards the crypt.\n\n\"Who was buried here?\" you ask.\n\n\"Why, nobody actually. My guess is that someone just piled here some of the casualties from the collapse. Or maybe some of those who couldn't adapt... they are stored here.\"\nYou come to a structure cut into the wall. A foul stench comes from the hole that appears to be the entrance. It is too much for you to take.\n\n\"Come on in, please,\" insists ${ulmia} with a bribing smile on her face.\n\n\"I really can't do it, Sister.\"\n\n\"Oh, don't be afraid of putrescence. We all end that way, sooner or later. Besides, try to get used to it. It will become worse when they start moving.\"\n\nYou pinch your nose and enter. Two of the living dead welcome you just like a wolf would do with a lamb that accidentally entered their den. Their bodies are almost mummified. The bones that are not exposed are covered with an indiscernible mess of dried flesh and rags. The zombies appear to be having almost full sets of teeth and are desperate to get the taste of you. You don't need to think more before launching the prayer of smiting. Bright light explodes inside the ribcages of the walking dead and reduce them to ashes.\n\n\"Be careful using the Light here. You may sanctify this place and make our task impossible\"\n\n${ulmia} sits on the floor, her legs crossed, eyes closed, lips whispering something you can't fathom. Two more zombies approach you, dragging their feet closing on you. ${ulmia}'s face remains blank and it seems that she's oblivious to what's happening. The undead are close now, one of them starts sniffing the priestess. His bony hand is so close to het still shut eyes that your imagination vividly portrays the scene of him inserting his fingers right into her brain.\n\nWould you smite him?\n*choice\n\t#Yes\n\t\t*goto honesix\n\n\t#No\n\t\t*goto honesev\n\n*label honesix\n*set favour -1\nFavour decreased by 1.\n*line_break\nYou just can't restrain yourself. The Light crackes in the air, turning both zombies into dust. The noise interrupts ${ulmia}'s meditation. She looks angry.\n\n\"I asked you not to summon the Light here,\" she states.\n\n\"I'm sorry, Sister, I just couldn't watch that undead so close to you.\"\n\nThe priestess runs her fingers through her hair.\n\n\"What you don't understand is that the zombies need to come near me, to feel that I am their new mistress. I assure you I'm in complete control of the situation,\" she explains.\n\n\"You've done it before, don't you?\" you ask quietly.\n\n\"I won't deny that.\"\n\nShe comes back to the floor, reentering her meditation\n*goto honeeit\n\n*label honesev\n*set experience +1\nExperience increased by 1.\n\nIt is a real test of your self-control, but this time you decide that it is better to trust Sister ${ulmia}. She asked you not to smite zombies here and you manage to live up to it.\n*goto honeeit\n\n*label honeeit\n*page_break\nYou stop counting the zombies that come out of the depths of the crypt on the second dozen. As ${ulmia} warned you, the smell is overwhelming and you almost suffocate until the ritual is complete. And puke too. You are thankful that looking away is much easier than keeping your nose shut, as there are some of the ugliest nightmares you were unable to even imagine. Dry eyeballs, open guts and exposed collar bones were the last features you remember before giving up observing them.\n\nSister ${ulmia} stands up.\n\n\"Fine, the link is complete. Now, they are my slaves.\"\n\n\"Okay, let's get this finished,\" you propose.\n\n\"Not so quick, big boy, don't you think you are missing something,\" she mocks you.\n\nYou stare at her.\n\n\"We have to think of some way to disguise ourselves. The battlings must not find out we are human, or less we will be picked up from the crowd.\"\n\n\"What would you suggest?\"\n\n\"I could use my devil form, which I hope is more natural in here. I will be stronger and for all I get I may be invulnerable to their mind flail, but I would look different from the... group. Another alternative would be to disguise as a zombie, using gore and tattered cloth,\" she suggests.\n\n\"What about me?\"\n\n\"You can go for that second alternative,\" she says calmly, anticipating your reaction.\n\n\"No way is this going to happen.\"\n\nBut then, you think again.\n\nWould you unleash the devil?\n*choice\n\t#Yes\n\t\t*goto honenine\n\n\t#No\n\t\t*goto htwozero\n\n*label honenine\n*set devilry +1\n*set xx true\nDevilry increased by 1. \n*line_break\nIt pains you to say the prayer again. You can't stand all the filth you are getting through. You remind yourself that it is a matter of survival, but feel no better. You just can't look in her eyes after the transformation is complete.\n\n\"You'll get used to it, if you really want to be with me,\" she hisses.\n\n\"I understand you are keen on smearing your infernal skin with dirt,\" you say.\n\nShe just nods and looks for one of those bodies that were not preserved well enough to be zombified. Without hesitation, she takes something from one of the corpses and covers her skin with it.\n\n\"That is a lovely dress - that one over there, isn't it?\" She points at some grey rags on another corpse.\" If you are a gentleman, you'd turn your back. No, actually that's all right by me,\" she says while removing her cassock. It happens too quickly for you to move your eyes in time before feasting on the sight. You feel you are getting insane.\n\n\"Now, it's your turn, Brother. It will be easier if I help you,\" she offers.\n\nIn the name of the Light that is unbelievable. Would you let her make you look more like a zombie?\n*choice\n\t#Yes\n\t\t*goto htwoone\n\n\t#No\n\t\t*goto htwotwo\n\n*label htwozero\n\"I understand you are keen on smearing your milk white skin with this dirt,\" you say.\nShe just nods and looks for one of those bodies that were not preserved well enough to be zombified. Without hesitation, she takes something from one of the corpses and covers her skin with it.\n\n\"That is a lovely dress - that one over there, isn't it?\" she points at some grey rags on another corpse.\" If you are a gentleman, you'd turn your back. No, actually that's all right by me,\" she says while removing her cassock. It happens too quickly for you to move your eyes in time before feasting on the sight. You feel you are getting insane.\n\n\"Now, it's your turn, Brother. It will be easier if I help you,\" she offers.\n\nIn the name of the Light that is unbelievable. Would you let her make you look more like a zombie?\n*choice\n\t#Yes\n\t\t*goto htwoone\n\n\t#No\n\t\t*goto htwotwo\n\n*label htwoone\nYou just nod and close your eyes, unable to believe what is going on and about to vomit again. These are probably the longest minutes of your life. Finally, Sister ${ulmia} decides to have mercy on you.\n*goto htwothree\n\n*label htwotwo\n\"No, Sister, I am a priest of the Light and I can't let me or my cassock be covered by that filth.\"\n\n\"Very well, then don't be surprised if the battlings decide to pick you up on the basis of being the cleanest in the group.\"\n\nYou realize she might be right? Would you reconsider?\n*choice\n\t#Yes\n\t\t*goto htwoone\n\n\t#No \n\t\t*set clean true\n\t\t*goto htwothree\n\n*label htwothree\nAnd so, your assault begins. At first, the battlings just watch from above as you and your army of zombies advance towards their high fortress. There are some buildings that you devastate on your way - apparently used for growing some sort of fungi - and after you do so, they just jump down on you, using their massive wings to insure they drop where they want to.\n\nThe undead turn out to be a force to be reckoned with. Although their bodies lack the longevity of a human being, they simply refuse to cease to fight. Next to you, you see a battling virtually rip apart a zombie only to end up being suffocated by a putrid hand that makes a hole in his throat and just crawls inside.\n\nYou approach the steep wall of the fortress. About half of the zombies ${ulmia} summoned are here, still walking awkwardly on.\n\n*if xx\n\t*goto htwofour\n\n*else\n\t*goto htwofive\n\n*label htwofour\n*page_break\n*set favour -1\nFavour decreased by 1.\n*line_break\nIt is a miracle how long the devil priestess seems to be almost invisible for the battlings. Part of her success is that she walks surrounded by zombies, who fend off any of the incoming beasts, but still... you are pretty sure that if they concentrated on her, it would be the end of your friend.\n\nNow, however, the lines of the undead are reduced and a group of three battlings approaches her. The walking dead are too slow to react and two of the beasts attack her simultaneously, while you manage to put an end to the live of the third. Sister ${ulmia} cries in pain, then turns into a deadly whirlwind, disemboweling them both in seconds. She, however, starts bleeding heavily from the area just below her breasts and you know you have to heal her as soon as she returns to her human form.\n*goto htwofive\n\n*label htwofive\n*if clean\n\t*goto htwosix\n\n*else\n\t*goto htwosev\n\n*label htwosix\n\nSuddenly, a couple of battlings attack you. Your eyes search for Sister ${ulmia}, hoping that she may command some of the undead to help you but, to no avail. She is busy organizing the demise of what seem to be the last battlings that want to attack you. Your headache returns, more terrible that last time and you fall to the ground, with your sword still in hand.\n*if xx\n\t*goto htwoeit\n\n*else\n\t*goto htwonine\n\n*label htwosev\n*page_break\nFinally, Growler appears from somewhere.\n\n\"I really thought you abandoned us, hairy friend,\" you greet him.\n\n\"Not really, ${name}, I followed your army. You know how much I fear the mind flail waves. But, I think I'm just in time.\"\n\n\"Yeah, Growler, we need to get our asses up there, if you need to obtain that sphere of yours,\" says Sister ${ulmia}.\n\n\"Nothing easier than that if you control the power of the wind,\" says the fangbearer with something vaguely resembling a smile. \"Do you want to get a few zombies up there as well?\"\n*choice\n\t#Yes\n\t\t*set zombies true\n\t\t*goto hthreetwo\n\n\t#No\n\t\t*goto hthreetwo\n\n*label htwoeit\nYou barely manage to concentrate on parrying the attack of the first battling that comes down on you, as the your head is killing you. Do you expect an attack from the upper part of the battling or the lower?\n*choice\n\t#The upper\n\t\t*goto hthreezero\n\n\t#Lower\n\t\t*goto hthreeone\n\n*label htwonine\nWhat is even worse is that the mind flail waves emitted by the battlings break the link between Sister ${ulmia} and the zombies, making them uncontrollable. The last thing you see is a bunch of undead eating your friend alive. Another of the rotting shows some mercy to you, poking your eyes and sending you to eternal darkness.\n*goto_scene death\n\n*label hthreezero\n*set favour -2\nFavour decreased by 2.\n*line_break\nYou really haven't seen the battlings use their tails during the battle against the zombies and that is why you underestimate their barbed stings. Now, however, the creature knows that it's facing a living prey and it stings you, causing you to wail in agony. You are pretty sure that thing injected some poison.\n\nYou are lucky that Sister ${ulmia} finally sees you and a zombie comes to save you. You say two prayers - one to cure the poison and a second to heal the deep wound on your thigh.\n*goto htwosev\n\n*label hthreeone\n*set favour -1\nFavour decreased by 1.\n*line_break\nYou remember the terrible sting you saw on the corpse of the first battling. You really haven't seen the battlings use their tails during the battle against the zombies but you believe it comes down to the fact that they were facing undead monsters. A quick swipe of your sword removes the tail of the battling. Meanwhile, it buries its claws into your breasts.\n\nYou are lucky that Sister ${ulmia} finally sees you and a zombie comes to save you. You say a healing prayer and jump on your feet.\n*goto htwosev\n\n*label hthreetwo\nGrowler raises his claws and stats chanting. The wind begins as a gentle breeze and gradually turns into a tornado. You hear ${ulmia}'s scream. You don't feel comfortable either as you are sucked in the whirlwind and spinning around as you gain height. When you arrive on top of the wall, you are instantly attacked by a few battlings.\n*if zombies\n\t*goto hthreethree\n\n*else \n\t*goto hthreefour\nDo you have codeword Zombies?\n\n\n*label hthreethree\n*page_break\nYou need a few seconds to get over the dizziness from the violent spinning. An animal cry comes from right next to you. Before you know it, the zombies put an end to the remaining battling opposition, virtually chewing it to pieces. You mean to ask ${ulmia} to stop the undead from destroying the whole population, but she's already done so, making them fall from above.\n*goto hthreefive\n\n*label hthreefour\n*page_break\n*set favour -1\nFavour decreased by 1\n*line_break\nYou need a few seconds to get over the dizziness from the violent spinning. This allows a battling to come dangerously close to you and before you know it, its fangs pierce your forearm. This distance is too small for you to use your sword, so you punch the battling, only making it sink its canines even deeper. You are pretty certain the creature will amputate your arm shortly. The rescue comes in the form of Sister ${ulmia}'s twin blades decapitating the beast.\n\nThe priestess winks at you, as you say your healing prayer and look at the remains of the enemy once more. That poor creature had it's venomous tale removed and still would have killed you without too much of a problem, save for your friend's interference.\n*goto hthreefive\n\n*label hthreefive\n*page_break\nNone of the remaining battlings show any sign of aggression. Most of them seem to be too old or young to be any threat for you anyway. Growlerer sniffs the air.\n\n\"The sphere is over there,\" he points at what resembles a cocoon located on a rock about 20 feet from the main plain. It wriggles violently. A small hand comes out.\n\n\"Here it is? Can you see the bracelet? It's attached to it,\" shouts the fangbearer. \"But how do we get there?\"\n\nThere is a catwalk leading to it, but it is too narrow.\n\n\"Is it too far away for you to jump. I've seen you perform some pretty epic leaps already. Or maybe summon another tornado?\" you propose.\n\n\"No way. I already used all of my manna and am too tired to do that. Maybe, if I rest for a few hours, I can try.\"\n\n\"It is too dangerous to stay here,\" concludes ${ulmia}. \"I can use the catwalk to go there.\"\nThe priestess certainly looks like the most suitable for such a task, her frame being small, despite her being strong and agile.\n\n\"Of course, I'd be more certain of myself if I'm using my alter ego. She rocks!\" ${ulmia} says with a dreamy expression on her face. This woman is seriously beginning to scare you. And, your guess is that she'll get even scarier the more you stay in this piece of Abyss. On the other hand, her devil form possesses superhuman physical abilities and she'd certainly make it to the cocoon.\n\n\"We need to hurry. That must be a child, and they don't seem to have much time left,\" she states, observing the movements of the hand die out.\nWhat is your choice?\n*choice\n\t#${ulmia} to go in her human form\n\t\t*goto hthreesix\n\n\t#${ulmia} to go in her devil form\n\t\t*goto hthreesev\n\n*label hthreesix\n\"I think you overused your devil form, ${ulmia}. I know you well. You are fit enough to get there. I'll pray for you,\" you explain.\n\n\"As you wish. Do you know a prayer that will keep me alive if I fall?\" she asks jokingly.\n\"Why, no...\" you answer embarrassed. Before you could think of what to say, she's already had her feet on the catwalk. She moves slowly, but steadily. At one time, she slips, however, she manages to hold on to her hands. You feel your heart stop for the moment. Luckily, there are no further critical situations. She gets to the rock.\n\n\"What do I do now?\" she shouts to you.\n\n\"Just tell her to grab the sphere and come back here. Whatever is inside that cocoon, it's probably some kind of an abomination. It could easily push her down,\" Growler says in a low gnarl.\n\n\"I can't ask her to do that. We are priests of the Light. If there is any chance to save a child, we'd go out of our way to do so,\" you explain.\n\n\"Her way is a perilous one,\" snaps the fangbearer, looking at the catwalk.\n\nWhat would you instruct ${ulmia}?\n*choice\n\t#Just take the sphere\n\t\t*goto hthreeeit\n\n\t#Cut the cocoon\n\t\t*goto hthreenine\n\n*label hthreesev\n*set devilry +3\nDevilry increased by 3.\n*line_break\nSister ${ulmia} takes a deep breath, her human features giving way to the diabolical ones.\n\"So, you couldn't jump, Growler. Poor boy. See what a lady can do...\" she steps back towards the edge of the plain, \"... without even looking.\"\n\nShe jumps back, makes a couple of somersaults and lands on the rock next to the cocoon.\n\"What a nice bracelet. I just can't resist,\" she says loud enough for you to hear.\n\n\"${ulmia},\" you shout back.\" Cut the cocoon and free the child,\" you instruct her.\n\n\"And be careful. It could be an abomination. It could attack you the moment it gets out,\" says Growler.\n\n\"I'll take care of it,\" she smiles and turns her back and you see very little of what happens next. You only manage to see her swinging her blades. The remains of the cocoon change colour into crimson. Then, she sits down.\n\n\"What happened?\" you ask her but get no reply. After a while, she stands up and jumps back to your plain. She has blood all over her. All of sudden, you realize what happened over there. ${ulmia} killed the child (or whatever was in that cocoon). It definitely had a soul, which was trapped in one of her daggers. Then, she conducted the ritual with which she devoured itl.\n\n\"You ate its soul, didn't you?\" you ask coldly.\n\n\"I don't know what you are talking about. There was some mutant in the cocoon and I had to kill it in self defense,\" she explains, but her sly smile and red cheeks suggest otherwise. You are quick to dismiss the devil.\n*goto hfourzero\n\n*label hthreeeit\nShe takes a second to realize what you are telling her. You are certain she's having an internal struggle. Eventually, she decides to listen to your advice. She removes the bracelet from the small hand and carefully returns via the catwalk.\n*goto hfourzero\n\n*label hthreenine\n*set favour +2\nFavour increased by 2.\n*line_break\n${ulmia}'s face seems a bit scared by your advice, but just nods and takes out her daggers.\n\"Just make sure you take the bracelet before setting that thing free,\" shouts the fangbearer.\n\nShe follows his order and gets over to the task of cutting the cocoon.\n\n\"${name}, it's a human child. It seems to be half suffocated, but otherwise unhurt,\" she explains.\n\n\"Leave him there and come back,\" orders Growler.\n\n\"What?\" you protest.\n\n\"When ${ulmia} brings me the sphere, I will teleport out of the mine and I will take them with me,\" he explains.\n\nYou nod and observe anxiously ${ulmia}'s way back via the catwalk.\n*goto hfourzero\n\n*label hfourzero\n*page_break\n*set nail true\n${ulmia} hands the bracelet to Growler. He takes it and grasps it tightly. His claws glow, as he absorbs the magical energy of the sphere.\n\n\"I can't stay much more here. The manna is too much for me to handle for too long.\"\nYou hear the tornado again, right behind you.\n\n\"Just jump down, the wind will slow your fall,\" his eyes sparkle while he sniffs the air. \"I can sense your angel. She's over there,\" he points. \"Just go back the tunnel we came from and continue straight ahead until you see a ziggurat. The angel is there. You may need some manna to free her, so take this,\" he removes a nail from his claw and gives it to you. \"Thank you both for helping me. You must be proud of yourself for saving the forest.\"\n\nGrowler disappears. You come to the edge of the plain and look down. The sight of the massacre down makes you sick.\n\n\"Do you realize what we did, Sister? We wiped out almost the whole population of this intelligent species,\" your eyes fill with tears. \"Is it what the Light expects of us?\" You turn to ${ulmia} for support. She comes to you and hugs you.\n\n\"We are in the den of evil, Brother. You know you can't play with fire and hope that you won't even smoke your hands. Let's go before the tornado stops and hope that we won't have to do anything that we'll regret... again.\"\n\nYou look into her deep green eyes. You were sure she was losing her battle with the devil inside her, but right in this moment, she seems more human than ever. You wipe you tears and unwillingly leave her embrace to jump down among the dead.\n*goto hfourone\n\n*label hfourone\n*page_break\nYou reach the ziggurat, just like Growler told you.\n\n\"Why is such a building here anyway?\" you enquire.\n\n\"This place is part of the Abyss. You can expect anything while being here.\"\n\nYou open the screeching door and see two figures in pentagrams in the centre. One of them is the angel ${ulmia} spoke of, a beautiful girl no more than 3 years old with a halo of curly, light brown hair. She's wearing an ornate white dress with floral patterns. She's timidly playing the flute - a sad melody that instantly almost makes you cry. You realize that most of the light in the room comes from that heavenly creature.\n\nNext to her is a devil sitting on the ground, seemingly enjoying the music.\n\n\"Zarafell, I never thought I'd see you again.\" Sister ${ulmia} runs to him.\n\n\"My dearest sister, you are like sulfur for my eyes,\" he exclaims.\n\nHe's much taller than the priestess, but otherwise looks very similar to her infernal form.\n\"What are you doing here?\" she asks him.\n\n\"Well, waiting to see what happens next. I'm quite happy that my roommate is such a talented musician, otherwise, I could have died of boredom.\"\n\n\"I mean, who imprisoned you here? And why?\"\n\n\"I don't really know, sister. Can we discuss it after you set me free? I really have no intention of staying here any more than necessary,\" he protests.\n*choice\n\t#Talk to the angel\n\t\t*goto hfourtwo\n\n\t#Talk to the devil\n\t\t*goto hfourthree\n\n*label hfourtwo\nAs you approach the little girl, she stops playing the flute and looks at you with her immaculate sapphire eyes and smiles. She turns to Sister ${ulmia}.\n\n\"Thank you for coming for me, Sister. May the Light bless you and forgive your devilry,\" her voice sounds like a spring ripple. \"I am Clarissa and humbly thank you for coming here.\"\n\n\"May she bless you too, celestial one,\" ${ulmia} returns the pleasantries. \"How can we set you free?\"\n\n\"If you think that I summoned you in order to save me, I must apologize for confusing you. The journey is not about my salvation, but yours. You step on the bridge between the Darkness and the Light and don't know which side of the river to set foot on. This journey is also about ending the curse of this place and setting free the many souls that still linger in the Abyss,\" she explains with calmness beyond comprehension.\n\n\"And you, Father ${name}, are as important,\" Clarissa turns to you. \"Your task is to lead her by her hand while she steps on the bridge. The Light let me touch her mind and I must assure you that this woman loves you in her confused way.\"\n\nSister ${ulmia} tries to hide her blushing.\n\n\"If you manage to set me free, I will help you in the final battle. Otherwise, I will leave my pentagram when the dungeon collapses,\" the angel says.\n\nWhat would you ask her?\n*choice\n\t#Who imprisoned you\n\t\t*goto hfourfour\n\n\t#How do we break the curse? \n\t\t*goto hfourfive\n\n\t#Can I trust the devil in the pentagram next to you\n\t\t*goto hfoursix\n\n*label hfourthree\nYou see ${ulmia} stretch her hands in an effort to touch his, only to meet an invisible wall. You've never seen her show that much affection to anybody. Well, when you think again, anybody but you. You try to suppress it, but there's something burning inside you.\n\nWhat would you ask him?\n*choice\n\t#Who imprisoned you?\n\t\t*goto hfoureit\n\n\t#Can I trust you?\n\t\t*goto hfournine\n\n*label hfourfour\n\"It was a soul asking questions that got the answers wrong. May the Light and you have mercy on him, because when you walk in the Darkness, you can take the flames of hellfire for the shining of the Light,\" she answers.\n\n\"What does it mean, creature of the Light?\"\n\n\"I can't give you answers, only vague directions as the journey is part of the goal.\"\n\nWould you like to ask her anything else?\n*choice\n\t#How do we break the curse?\n\t\t*goto hfourfive\n\n\t#Can I trust the devil in the pentagram next to you?\n\t\t*goto hfoursix\n\n\t#Finished with your questions?\n\t\t*goto hfoursev\n\n*label hfourfive\n\"In order to put an end to the reign of Darkness in this mine, you need to find the truth.\"\nUnfortunatelly, Clarissa would say nothing more about it, despite your efforts to urge her.\nWould you like to ask her anything else?\n*choice\n\t#Who imprisoned you\n\t\t*goto hfourfour\n\n\t#Can I trust the devil in the pentagram next to you\n\t\t*goto hfoursix\n\n\t#Finished with your questions?\n\t\t*goto hfoursev\n\n*label hfoursix\n\"This creature has a role in your journey, just like I do. Don't ignore him, please,\" she says sweetly. If only you could make out what she means with these riddles.\n\nWould you like to ask her anything else?\n*choice\n\t#How do we break the curse?\n\t\t*goto hfourfive\n\n\t#Who imprisoned you?\n\t\t*goto hfourfour\n\n\t#Finished with your questions?\n\t\t*goto hfoursev\n\n*label hfoursev\n*page_break\nIf you haven't done so, you could talk to the angel or the devil. If you have Grawler's nail, you can use his energy to set any of them free. Or, continue on your way.\n*choice\n\t#Talk to Clarissa\n\t\t*goto hfourtwo\n\n\t#Talk to Zarafell\n\t\t*goto hfourthree\n\n\t*selectable_if (nail) #Set a prisoner free\n\t\t*goto hfivetwo\n\t\n\t#Continue on your way\n\t\t*goto hfivethree\n\n*label hfoureit\nZarafell roars with laughter.\n\n\"It just happens that the Light wants me to play the role of a damsel in distress. It seems to fit better the little lady next to me, but this is how it goes.\"\n*choice\n\t#Ask him if you can trust him\n\t\t*goto hfournine\n\n\t#Finish the conversation\n\t\t*goto hfoursev\n\n*label hfournine\n\"Can you trust me?\" asks ${ulmia} in a solemn voice.\n\n\"Why, would you say that?\" you ask, not sure where that came from.\n\n\"If you can trust me, then, you can trust him. He is my brother!\"\n\nHow do you respond?\n*choice\n\t#\"I can't trust a devil, I'm sorry!\"\n\t\t*goto hfivezero\n\n\t#\"All right, I do, then\"\n\t\t*goto hfiveone\n\n*label hfivezero\n*set relations -1\nRelations decreased by 1.\n*line_break\n\"I am a devil too,\" the priestess says.\n\n\"It is different. You are trying to fight it, to remain human. He, on the other side, is a pure devil,\" you try to explain.\n\n\"I thought that you would understand me. I... hoped that you'd be able to accept me the way I am without trying to change me,\" she says in tears.\n\nYou start to say something, but decide that it would only aggravate the matter.\n*goto hfoursev\n\n*label hfiveone\n*set relations +2\nRelations increased by 2.\n\n\"${ulmia}, I trust you with the whole of my heart, just like I trust the Light. It bothers me that you have your devil's side, but no one on earth is clean of the Darkness one way or another. If you trust this... brother of yours, then, I have no reason to distrust him too.\"\nShe gives you a broad smile and a hug. Then, she kisses you so close to your lips that you shudder.\n*goto hfoursev\n\n*label hfivetwo\n\"Growler stored magical energy for use to use to set the trapped angel free. \"I may not be able to rescue both of them, ${ulmia},\" you say. \"It's probably him or the angel. What do you think?\"\n\nThe priestess sighs.\n\n\"I don't want to make that decision, ${name}. We came all the way here to save the angel, but I can't leave my brother either.\"\n\nYou realize that you have to choose between serving the Light and making Sister ${ulmia} happy.\n*choice\n\t#Set Clarissa free\n\t\t*goto hfivefour\n\n\t#Set Zarafell free\n\t\t*goto hfivefive\n\n*label hfivethree\nYou pray to the Light to give you the power to set at least one of the prisoners free.\n\"It is no use, Brother,\" says Clarissa. \"Our chains are immune to the power we serve. If you don't have other means, you just have to walk on and fulfill he prophecy. Then, the whole mine would be taken out of the abyss and we all will be free.\"\n\n\"Tell me more about this prophecy, Clarissa,\" you ask.\n\n\"I can't Brother. Just continue on your way and follow your heart.\n\nYou nod. ${ulmia} blows a kiss to the devil and you both leave the ziggurat.\n*goto hfivesix\n\n*label hfivefour\n*set favour +3\n*set experience +3\n*set feather true\nFavour increased by 3. Experience increased by 3.\n*line_break\nYou don't know what to do so you just take it out of your belt. It falls from your hand and rolls on the floor, removing the lines of the pentagram.\n\n\"Thank you, Father. Go with my blessing and see you soon,\" she says and disappears.\n\nSuddenly, it becomes quite dark in the ziggurat, which doesn't prevent you from seeing sadness in the eyes of Sister ${ulmia}.\n\n\"Are you alright, my dear? This is what we came here for, didn't we?\" you say and put a hand on her shoulder. She waves goodbye to Zarafell and you both go out of the ziggurat.\n*goto hfivesix\n\n*label hfivefive\n*set relations +3\n*set experience +3\n*set fel true\nRelations increased by 3. Experience increased by 3.\n*line_break\nYou don't know what to do so you just take it out of your belt. It falls from your hand and rolls on the floor, removing the lines of the pentagram.\n\n\"This is a way better,\" Zarafell stretches his arms. \"I knew we'd get along just fine ever since I saw your pale-skinned body walk down the tunnel next to that paladin.\"\n\n${ulmia} doesn't seem to hear him. She jumps on his neck:\n\n\"My big strong brother, I never thought I'd see you again,\" she shouts in his ear.\n\n\"Well, always a pleasure to be with you, darling. I owe you one,\" he winks at her.\n\n\"No way, bro, you supported me throughout my childhood.\"\n\n\"Then, I owe him one,\" he points in your direction.\n\n\"Don't worry about him. I know how to pay him back!\" Sister ${ulmia} laughs.\n\nYou raise your eyebrows.\n\n\"Now, I must leave you alone, since you seem to have a job to do. I'll visit you soon, Ulmiroth\", he says and disappears in a cloud of sulfurous smoke.\n\n\"How did he call you?\" you ask.\n\n\"My devil name is Ulmiroth,\" she clarifies.\n\n\"And how exactly are you going to repay me?\"\n\n\"You don't want to discuss it in front of the angel, do you?\" she reminds.\n*goto hfivesix\n\n*label hfivesix\n*page_break\nAs you come out,Sister ${ulmia} looks around.\n\n\"Wait a minute! This place seems oddly familiar. I am pretty certain that...\" she can't hide her excitement. \"Dear Light, this is the place where I grew up. It's amazing!\"\n\n\"Er, are you sure, my dear? Maybe all infernal dungeons look like that,\" you presume.\n\n\"No way! Come with me! Down the tunnel, there should be a lake of fire...\" She holds your hand and starts pulling you. The more you go down the mouldy corridor, the hotter it becomes.\n\nThe tunnel really ends on a cliff overlooking a body of lava. You are sweating considerably.\n\"Isn't it incredible, ${name}? Have you ever been so hot next to a lady?\" She says and starts pulling her cassock off.\n\nDo you want to stop her from doing so?\n*choice\n\t#Yes\n\t\t*goto hfivesev\n\n\t#No \n\t\t*goto hfiveeit\n\n*label hfivesev\nYou catch her cassock and prevent her from undressing.\n\n\"What are you doing, Jake?\" she asks you with a smile. \"Are you afraid of what I hide down there?\"\n\n\"I don't find it quite appropriate for a priestess of a Light,\" you state, sweat coming down your forehead.\n\n\"Devils don't wear much clothing, especially in places like that.\"\n\n\"Maybe it's high time you decided what you want to be, ${ulmia}.\"\n\nShe frowns.\n\n\"You are right, Brother. I guess.\"\n*goto hfivenine\n\n*label hfiveeit\n*set relations +1\nRelations increased by 1.\n\nYou stare in dismay as her cassock falls on the ground. Sister ${ulmia} is dressed in only two pieces of cloth.\n\n\"When I was a small demon, I didn't wear even as much. ${name}, are you alright?\"\n\nYou fail to answer.\n\n\"You like how I look without the cassock, don't you?\" she teases.\n\n\"I do,\" you admit.\n\n\"You are so kind! Let me show you around.\"\n*goto hfivenine\n\n*label hfivenine\n*page_break\nSister ${ulmia} gets overly excited. It seems that everything here brings back memories from her devilish childhood. She gets carried away in explaining how she and her mates tormented a few firebats. The picture she draws is far from pleasant and you wonder whether it isn't high I time you made her stop bubbling as it's clearly getting on your nerves. On the other hand, you could try to gently push the conversation towards another subject.\n\nWhat is your choice?\n*choice\n\t#Tell her to shut up\n\t\t*goto  hsixzero\n\n\t#Change the topic\n\t\t*goto hsixone\n\n*label hsixzero\n*set devilry -1\nDevilry decreased by 1.\n*line_break\n\"${ulmia},\" you interrupt her. These memories belong to someone you no longer are. It's quite wrong to relate to them. And, I'm sick of listening to what atrocities you committed back then.\"\n\nYour comment leaves her mouth wide open.\n\n\"Why does it make you angry, Brother?\" she asks with sadness in her voice. \"Sorry if I'm annoying you but you are the only one I could speak to right now... And by far the closest human being to my heart,\" she frowns. \"But I guess you have a point. I'm confused about who I am but... You are right I'm not a devil any more.\n*goto hsixtwo\n\n*label hsixone\n*set relations +1\nRelations increased by 1.\n*line_break\nYou patiently listen to her tales, or at least it seems so. Well, honestly, most of the time you pretend. Anyway, you seem to be quite good at faking it.\n\n\"Boy, I can't quite believe I'm telling you all of this,\"she says. \"I'm sorry most of it may not be so pleasant for you to hear,\" she notes.\n\n\"Yeah, I'm sure cooking a bloody soup is not the best topic we could discuss but anyway, I'll take it as a sign of attachment.\"\n\n\"That's right, ${name}. Apart from you being the only human around here, you are by far my closest friend and I'm quite happy you're here with me right now.\"\n\nShe's so beautiful when she smiles to you that you believe you could tolerate her rattling forever.\n*goto hsixtwo\n\n*label hsixtwo\n*page_break\n\"This used to be our play cave,\" she points at a very narrow opening in the rocks. \"I bet there must be some of my toys left there. I used to hide them so that my mates don't take them from me. I'd better go in and check.\"\n\nIt's very dark inside as there appear to be only a few glowing mushrooms. On top of that, there's something moving in there, emitting a hissing sound.\n\n\"Oh, that must be a hell snake. There used to be a lot of them around here. Nothing is more lethal for a devil than one of these fellows, even an exorcist from the order of the Silver Sword.\"\n\n\"Are they dangerous to humans?\" you ask.\n\n\"Yeah, they are even more abnoxious when it comes to humans. Their agony may be prolonged for days before death comes to release the victim. And there's no antidote.\"\n\"Great! Don't tell me they are not of infernal origin,\" you remark.\n\n\"I won't, otherwise I'd lie to you. Even a drop of holy water can burn them to ashes,\" she explains.\n\nYou mean to ask her whether she knows that for sure or she's only heard about it, but you're not in the mood for listening to her explanations.\n\nWhat would you do?\n*choice\n\t#Smite the snake\n\t\t*goto hsixthree \n\n\t#Continue on your way\n\t\t*goto hsixeit\n\n*label hsixthree\n*set favour -1\n*set relations +2\nFavour decreased by 1. Relations increased by 2.\n*line_break\nThe prayer of smithing instantly sets the hell snake on fire, together with about a dozen of its kind, crawling deep in the crevice. The fire burns for a brief moment, but it is enough to see a brass statuette of some winged demon. You enter boldly, searching for it all over the place where you saw it and take it out of the dark place.\n\n\"Wow, this is Razorchest, my favorite imp doll. Thank you ${name}, it means so much to me.\"\n\n\"It is a masterpiece for sure,\" you say with a bit of irony. It must have been cut by the hand of someone skilled, but using your talent to produce something that ugly is beyond your understanding. You look into the dark cavern and wonder whether it could hide something else of value.\n\nWhat would you do?\n*choice\n\t#Enter again\n\t\t*goto hsixfive\n\n\t#Continue on your way\n\t\t*goto hsixeit\n\n*label hsixfour\nIt's so dark in the cave that you have no chance to find anything unless... You remember the mushroom in your belt. You take it out. Unfortunately, it no longer glows. You throw it on the floor and enter the small cavern.\n*goto hsixsev\n\n*label hsixfive\nYou...\n*choice\n\t*selectable_if (glow) #have a glowing mushroon \n\t\t*goto hsixsix\n\n\t*selectable_if (shade) #have a mushroom that is supposed to glow\n\t\t*goto hsixfour\n\n\t#don't have a glowing mushroom\n\t\t*goto hsixsev\n\n*label hsixsix\n*set relations +2\nRelations increased by 2.\n*line_break\nIt's so dark in the cave that you have no chance to find anything unless... You remember the mushroom in your belt. You take it out. Its glow is not very strong but you believe it should be enough. You come across a delicate copper ring - a stylized flame.\n\n\"Does it also belong to you, Sister?\" you enquire.\n\n\"Oh, it cannot be true!\" she exclaims. \"I thought I'd lost it forever.\"\n\n\"What is it?\"\n\n\"It's the ring Atoro gave each of the cleansed on the day of completion of the ritual. I'm not sure it's mine as there were at least nine of us in total. I'm just...\" A single tear rolled down her cheek. \"Thank you so much, ${name}.\"\n\nShe hugs you and starts sobbing. It takes her a few minutes to calm down.\n*goto hsixeit\n\n*label hsixsev\n*set favour -1\nFavor decreased by 1.\n*line_break\nIt is so dark inside that it is not surprising that you slip on something oily and fall to the ground. The result of your search is a sprain ankle. It hurts so bad that you just have to say a healing prayer to alleviate your suffering. Sister ${ulmia} is barely able to refrain from laughing. You try to ignore her as you both continue down along the cliffs.\n*goto hsixeit\n\n*label hsixeit\n*page_break\nAs you walk on, you assure yourself that this is the strangest place you've been to. The main source of light is the lava river which casts enlonged shadows all over the walls of the cavern. To you, they look like demons. You can swear they move from time to time but it could as well be your imagination, sickened by this hellish place. And, there are the noises - the chuckling and bubbling of the lava that echoes all around you. Or, is it a choir of childish voices? Something perches on your cheek and startles you, making you almost fall on the ground. It then flies to the boulder next to you - a pitch-black butterfly with red patterns on her wings.\n\n\"It's not the scariest monster around here,\" Sister ${ulmia} giggles. You realize you must have looked funny.\n\n\"What is it? For goodness sake, what is a butterfly doing here? And why does it look like that?\" you ask.\n\n\"It is a nightmare pollinator. It feeds on the nectar of nightmare tormentors.\"\n\n\"I'm not sure I want to hear about it, then,\" you murmur.\n\n\"Why? The most romantic present a devil girl can receive is a crown from the leaves of an everlasting tormentor. It is a carnivorous flower that is able to preserve its prey for weeks while...\"\n\nYou cough and she gets your message. Or maybe she just saw something.\n\n\"The birthing pools!\" she exclaims approaching a small pond filled with green liquid. \"This is where it all began. Atoro baptized me in its waters and made me e human being.\" Her voice trembles. She comes to its shores and looks at her reflection on the surface. You do the same, wondering how deep it is.\n\n\"It all began here,\" she repeats. \"I want to start anew...at this place.\"\n\nShe turns to you and steps forward, engulfing you with the green serenity of her eyes. You feel her warm breath tingle the skin of your cheeks. You run your fingers over her eyebrows, making her blink. The urge to kiss her becomes overwhelming.\n\nWould you go for it?\n*choice\n\t#Yes\n\t\t*goto hsixnine\n\n\t#No \n\t\t*goto hsevzero\n\n*label hsixnine\n*set experience +1\n*set relations +2\nExperience increased by 1. Relations increased by 2.\n*line_break\nYou wrap your hands around her waist, pulling her even closer to you and plant a few kisses on her check, each drawing closer to her lips. ${ulmia} moans softly just before you experience the taste of her strawberry flavoured mouth. It's intoxicating. And, when the priestess introduces her tongue to you, you find it hard to breathe.\n\nYour hands dance all over her body, unable to be everywhere you want them to be at the same time.\n\n\"It will be better if you undress me,\" she whispers panting, breaking your kiss for a moment. You need no second invitation.\n\n\"Oh, sweet Light!\" you exclaim as you see her completely naked body. You've been imagining it for so long and you realize what your eyes behold now is far better.\n\"What we'll do now needn't be related to the Light at all.\" She bites her lip and turns around. \"My body is yours to do whatever you desire with it. Just make sure you please me,\" she smiles in such a devilish way that you wonder whether the devil hasn't taken control of her again.\n\nYou step forward into an infernal dance you'd never forget...\n*goto hsevtwo\n\n*label hsevzero\nYou use every piece of will to resist the temptation. You are sure that you can't escape it forever. The time for it will come, but not now... Not in this infested damned place. You turn your back, breaking the mesmerizing spell of her emeralds. She doesn't ask why. The silence feels heavy. You can hardly take it any more.\n*goto hsevtwo\n\n*label hsevtwo\n*page_break\nYou look at your reflection on the green surface of the pond. It whispers words you fail to understand as it moves, changing from the image of yourself into something disfigured. You hear ${ulmia}'s footsteps echo away from you.\n*if fel\n\tThe image blurs and continues distorting. Suddenly, it is Zarafell who looks at you from the pond.\n\n\t\"I knew we'd become very close ever since I saw your pale image walking down the cavern,\" he repeats the words.\n\n\tIt downs on you. Your heart beats faster, as the thought comes into being. If ${ulmia} really used to be a devil that changed into a human being by Atoro here, in the depth of the mine, how come Zarafell saw her already in her human form coming back down. And why would such a holy transformation take place in the Abyss? Could it be that...?\n\t\n\t\"You got it, human,\" says the image of Zarafell. \"${ulmia} was not a devil. Not until she came here and was corrupted by the one your church regards as a hero.\"\n\n\t\"But you said she was your sister...\"\n\n\t\"Do not assume devils tell the truth. Still, I didn't lie to you. Atoro used some of my essence to corrupt her. This makes her more than a sister of mine.\"\n\n\tThe surface of the pond swirls and after the water comes still again, you can only see your reflection.\n\t*goto hsevfive\n\n*else\n\tYou have the funny feeling that the pond has something to tell you. You recall a prayer of revelations that sometimes induces prophetic visions. Do you want to say it now?\n\t*choice\n\t\t#Yes\n\t\t\t*goto hsevsix\n\t\t\n\t\t#No\n\t\t\t*goto hsevfive\n\n*label hsevfive\n\"Master, I've come to see you,\" you hear her voice behind you. You've never heard such servile notes coming from her. You turn back and see her kneeling in front of a knight in half plate. It must have been silvery white as the armor worn by paladins, but now it's covered by black rust. He wears no helm and you can see long gray hair and beard, a face weathered and aged. Nevertheless, he steps forward with the grace of a young man despite the enormous two-handed sword on his waist.\n*if ex or fel\n\t*goto hsevsev\n\n*else\n\t*goto hseveit\n\n\n*label hsevsix\n*set ex true\n*set favour -1\nFavour decreased by 1. \n*line_break\nThe water of the pond moves, distorting your image. When it comes still again, you see a moving picture.\n\nA shining knight leads a young maiden dressed in a white robe. You cease your breath when you realize that it is ${ulmia}. She looks a lot younger than now but you can't mistake the adorable features of her face. The knight enters the pond, the water reaching his waist. He waves to ${ulmia} to come and she obeys. He then embraces her and throws her underwater. In a few seconds, he pulls her out. She fights for her breath, water coming down her face that is no longer human.\n*goto hsevfive\n\n*label hsevsev\n\"${ulmia}, run away from him!\" you shout. She stands up and turns half way towards you, probably wondering why you said that. Then, she decides to trust you and run in your direction.\n\n\"It's too late, my daughter. You can't escape from your creator,\" Atoro screams and raises his clenched fist. ${ulmia} falls on the ground.\n\nShe must be dead, you realize and stare at her, desperate to see her move but she wouldn't.\n*goto hsevnine\n\n*label hseveit\n*set experience -3\nExperience decreases by 3. \n*line_break\nAtoro takes his sword out and raises it above ${ulmia}'s head. You've read about ceremonies involving placing the paladin's weapon on the shoulder of initiates, so you observe with interest... As the two-hander slashes through her shoulder all the way to her ribcage. Her scream pierces your heart.\n*goto hsevnine\n\n*label hsevnine\n*page_break\nYou run towards ${ulmia}'s body, but Atoro intercepts your way. You really need to get to her, to know for sure what that damned knight did to her but unfortunately you have no choice but face Atoro. Would you like to attack him with your sword as your righteous rage wails for or cast a prayer of defense (in case you have Favour and want to)?\n*choice\n\t#Attack\n\t\t*goto heitzero\n\n\t#Pray for defense\n\t\t*goto heitone\n\n*label heitzero\nYou take your sword out of your sheath as you run forward. He doesn't move, murmuring something while looking at the ground. You would have known something was wrong were you not blinded by the rage burning in your veins. Suddenly, you feel your feet as heavy as boulders, tumble and fall. Before you can see it coming, Atoro decapitates you with a quick dash of his sword.\n*goto_scene death\n\n*label heitone\nYour prayer is instantly heard and you feel the Light's protection spread all over you like a soft warm sheet. Atoro shouts something, cutting the layer to pieces but failing to harm you. Whatever it was, it was definitely strong. Do you want to simulate being stunned or attack him immediately?\n*choice\n\t#Pretend\n\t\t*goto heittwo\n\n\t#Attack\n\t\t*goto heitthree\n\n*label heittwo\n*set damage +1\nAtoro approaches without hurrying, probably thinking that you are helpless.\n\n\"Well, I'm impressed! Most people wouldn't be able to stand on their feet after...\"\n\nYou interrupt him, piercing the unarmoured area around his shoulders with a quick strike.\n*goto heitthree\n\n*label heitthree\nWould you like to cast a prayer of smiting, in case you have the favour required?\n*choice\n\t#Yes\n\t\t*goto heitfour\n\n\t#No\n\t\t*goto heitfive\n\n*label heitfour\n*set damage +1\n*set favour -1\n*set experience +2\nFavor decreased by 1. Experience increased by 2.\n*line_break\nEven though he still wears the paladin's armor, Atoro is abviously no longer a creature of the Light. You actually assume he's loyal to the Darkness. That is why you decide to pray for justice to be brought upon the one straying from the Path of Light.\n\nThe fallen paladin screams in pain as smoke comes out of his once blessed half plate.\n*goto heitfive\n\n*label heitfive\n*if feather\n\t*goto heitsix\n\n*else\n\t*goto heitsev\n\n\n*label heitsix\n*set damage +1\n\"Atoro, it pains me to see the one who was closest to the Light become a servant of the Abyss,\" the voice of the angel comes from right behind you. Her words sound queerly solemn, said by the voice of a three-year-old.\n\n\"Make someone change your soaked pants, milky mouth, and leave the adults do their duties,\" Atoro mocks her.\n\n\"I'm waiting for your penance, paladin,\" she insists.\n\n\"You'll get none from me!\"\n\n\"As you wish,\" the little angel shrugs and disappears. Atoro coughs a mouthful of blood. You realize Clarissa must have cast the prayer of empathy, making him experience the last serious wound he experienced. You make a mental note to ask her to teach you this very high level prayer.\n*goto heitsev\n\n*label heitsev\nAtoro raises his sword and attacks fanatically with a devastatingly precise swing of his sword towards your chest. You can either dodge of parry.\n*choice\n\t#Dodge\n\t\t*goto heiteit\n\n\t#Parry\n\t\t*goto heitnine\n\n*label heiteit\n*set experience +1\nExperience increased by 1. \n*line_break\nIt takes the best of you to move out of the way of the blade and it misses you by inches. Atoro is forced to make a step forward, carried away by the momentum of the swing, leaving his left side undefended and you take the opportunity to stab him between the two plates of his armor. The wound is not deep, but it bleeds a lot. You cheer up, thinking that he wouldn't take more than one or two wounds like that before collapsing on the floor. But, his next swing makes the most of your loss of concentration and disarms you.\n*goto hninezero\n\n*label heitnine\nYou hardly manage to put your sword between his blade and your body in time. The weight and speed of his weapon are so great that your sword is sent flying in the air, away from you.\n*goto hninezero\n\n*label hninezero\n*page_break\nYou are lucky that the sword does not fall that far from you. You believe that you can make two big steps and reclaim it. Of course, this is probably what your opponent expects from you and you'd be vulnerable to his attacks. But, without it, you can hardly stand any chance against a seasoned blademaster like Atoro. Another option you think of is to try to surprise him by attacking him with your bare hands.\n*choice\n\t#Take your sword\n\t\t*goto hnineone\n\n\t#Punch him\n\t\t*goto hninetwo\n\n*label hnineone\n*set favour -1\nFavour decreased by 1.\n*line_break\nAtoro anticipated that move. His sword swishes through the air, cutting your back. Luckily, the wound is superficial, but it would still hamper your movements if left unattended. This is why you say a prayer of flash healing while grasping the handle of your blade tightly.\n*goto hninethree\n\n*label hninetwo\n*set damage +1\n*set experience +1\nExperience increased by 1.\n*line_break\nYou run towards him, actually enjoying the perplexed look on his face. All he manages to do before you reach him is point the tip of his sword in your directions. You just move it away with your left hand and your punch breaks the nose of the paladin. He cries, stunned by the pain. Meanwhile, you are quick to get to your sword as you know you wouldn't be able to survive this battle without it.\n*goto hninethree\n\n*label hninethree\nYou realize you're getting tired, despite being a lot younger and swinging a much lighter blade. Your swings start getting slower and slower while his seem to remain lightning quick. You need to find a way to end this battle quickly or else be doomed. What would be your strategy? You can keep a long distance, trying to be out of his blade's reach most of the time or just the opposite - try to be within a meter's distance.\n*choice\n\t#Long distance\n\t\t*goto hninefour\n\n\t#Short distance\n\t\t*goto hninefive\n\n*label hninefour\nActually, keeping away from such a long sword appears to be a very hard task, especially having in mind that yours is quite a bit shorter. Your deaf defense leads to no good opportunity to counterattack but at least for now you manage to keep his sword away from your flesh.\n*goto hninesix\n\n*label hninefive\n*set damage +1\n*set experience +1\nExperience increased by 1.\n*line_break\nYou manage to give Atoro a hard time as his sword is much too long and heavy for him to be able to effectively use it when you are so close to him. Several times, he has to step back in order to maintain control over the fight. Once, he loses balance and you don't miss the opportunity to cut him again.\n*goto hninesix\n\n*label hninesix\n*if damage \u003c3\n\t*goto hninesev\n\n*elseif damage=3\n\t*goto hnineeit\n\n*else\n\t*goto hninenine\n\n*label hninesev\nYour muscles simply fail to keep up with the continuous series of blows Atoro delivers. His great sword cuts deep inside your wrist, making you howl in pain and drop your weapon. The pain, however, doesn't last long as he beheads you with his next swing.\n*goto_scene death\n\n*label hnineeit\n*set favour -1\nFavour decreased by 1.\n*line_break\nJust before desperation overwhelms you, Atoro finally starts exhibiting exhaustion. He's been wounded badly and lost a lot of blood.\n\nYou manage to nail him to the ground, piercing him in the abdomen but not before receiving a serious wound in your offhand and having to recite a healing prayer to get over the agony.\n*goto twohundred\n\n*label hninenine\nJust before desperation overwhelms you, Atoro finally starts exhibiting exhaustion. He's been wounded badly and lost a lot of blood.\n\nYou manage to nail him to the ground, piercing him in the abdomen.\n*goto twohundred\n\n*label twohundred\n*page_break\nYou stand before Atoro, panting. He's still alive, although there is blood dripping from the corners of his mouth. He tries to take out your sword from his stomach but fails. The fallen paladin then closes his eyes for the last time. You try to run to ${ulmia} but barely manage to walk, dragging your feet. You never in your life felt so tired.\n\n*if ex or fel\n\t*goto tzeroone\n\n*else\n\t*goto tzerotwo\n\n\n*label tzeroone\nIt takes only a short prayer of restoration to make her regain consciousness. Whatever spell Atoro used, it wasn't as dangerous as it seemed.\n*goto tzerothree\n\n*label tzerotwo\n*if healer\n\t*set favour -1\n\tFavour decreased by 1.\n\t*line_break\n\tSister ${ulmia} is in a terrible condition.You are lucky that you managed to defeat Atoro in time. You believe that if you were just a minute late, she would probably be dead by now. You've seen people die from less serious wounds. It is a miracle that her heart went on beating. But, you remind yourself, she is more than a woman.\n\n\tYour experience in healing prayers, however, makes it look easy to make her flesh whole again after being vertically torn asunder. You cry with happiness when she opens her eyes.\n\t*goto tzerothree\n\n*else\n\t*set favour -3\n\tFavor decreased by 3.\n\t*line_break\n\tYou are lucky that you managed to defeat Atoro in time. You believe that if you were just a minute late, she would probably be dead by now. You've seen people die from less serious wounds. It is a miracle that her heart went on beating. But, you remind yourself, she is more than a woman.\n\n\tIt takes a lot of prayers to make her flesh whole again after being vertically torn asunder. You cry with happiness when she opens her eyes.\n\t*goto tzerothree\n\n*label tzerothree\n*if devilry\u003c17\n\t*goto tzerofour\n\n*else\n\t*goto tzerofive\n\n*label tzerofour\nYou see tears flowing down her lush green eyes and you try to imagine what she must be feeling. She went to the abyss to try to find the one closest to a father, only to be attacked by him.\n\nYou embrace her, she presses her body against yours and lets her head rest on your shoulder\n\n\"I'm so sorry that the one you considered your father turned out to be corrupt,\" you whisper in her ear.\n\n\"I expected that. Too bad, I just refused to believe in it. I just denied my common sense and intuition. Whatever, this will be a lesson for me. I have to fight my own corruption or else end up like Atoro.\"\n*goto tzeroeit\n\n*label tzerofive\nShe quickly transforms into Ulmiroth, her devil alter ego. You search for the medallion but it's nowhere to be found.\n\n\"Looking for something, sugar?\" She flatters her eyelashes. \"Does it happen to be that silvery thing over there?\" The she-devil points at something about a dozen feet away from you.\n\n\"What a pity you lost it while playing with that handsome paladin. Now, let's dance! I'm sure the end will be delicious,\" She takes her daggers out.\n*if relations\u003c24\n\t*goto tzerosix\n\n*else\n\t*goto tzerosev\n\n*label tzerosix\nThe devil woman jabs you in your chest with both of her daggers and raises her hands. Your feet lose contact with the ground and you spend your last minutes up in the air staring at the yellowish eyes of Ulmiroth, your blood dropping all over her. Her red skin absorbs it all hungrily. The pain is excruciating, but what bothers you most is that your soul won't be free after the torment ends but will remain trapped in the daggers... At least until she decides to consume it.\n*goto_scene death\n\n*label tzerosev\nShe seems about to jab you with her twin daggers, when she suddenly bursts into tears and starts cutting her hand. You realize ${ulmia} is trying to regain control over her devil self and in her desperation, she's hurting herself. You grab her arms and stop her. She slowly adopts her human form.\n\n\"I was going to kill you, ${name}. I can't take it any more.\" She weeps again.\n\n\"It's over, Sister, she's gone now.\" You hug her tightly for a few seconds, then tear a piece of your cassock to stop her bleeding. \"Does it hurt much?\"\n\n${ulmia} doesn't answer, she just presses her
