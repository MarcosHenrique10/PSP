his palm upright he curls one claw towards himself, beckoning for you to come closer.\n\n*choice\n    #Abide\n        *goto abide\n    #\"What is it you want!?\"\n        *goto wolfb\n    #Leave\n        *goto ignore\n\n\n*label wolfa\nHe cocks his head at your question. You stare at him. Is this thing before you even real? If so… How?\n\n\"You chose this for yourself or did you forget?\" The thin moonlight divulges no detail of the things face. Only his snout ripped with bits of fur and flesh missing. \n*page_break\n*label wolfb\n\"We exist, only to feed.\" He sprawls his arms out, absorbing all the darkness this forest has to offer.\n\n\"You are my first. You will not be my last…\" The creature smiles, fangs glistening from the moonlight. He turns and with a mere blink his silhouette is gone within the shadows.\n*page_break\n*goto clearing\n\n*label ignore\nYou choose to ignore the creature. You slowly stand up, sneering at it as you turn away. He tilts his head up and scoffs.\n\n\"I'll see you soon, meat.\" He grumbles and with only a ruffle of leaves and branches he disappears with the silence of an owl in flight amongst the chilly air.\n*page_break\n*goto clearing\n\n*label abide\n*set wolfbite +1\nYou cautiously step closer, ignoring your better judgments. You stand at a distance you hope is enough.\n\n\"It's better you don't remember.\" The shadow snarls and his claws lash out faster and farther than you thought they could reach. It grips your throat and claws dig into your neck. His skin and fur illuminate in the light as it hisses and bubbles. The creature grits it teeth growling, enduring the pain for he now has his catch.\n\nHis snarly maw widens as slime and blood drips from his teeth. He goes to bite you. Your only defense while entangled within his grasp is to shield your face with your arm. \n\nHis teeth bare down and sink into your flesh. The pain is excruciating and unbearable as you shove and push him off, stumbling back into the light.\n*page_break\n\"Thank you, meat.\"\n\nHe rolls his head back again, his laughter turning into a deep howl. Wolves chime in from between the trees, many of them. You spin amongst the clearing scanning for the beasts but none appear.\n\nWith a quick ruffle of leaves and branches the creature disappears, your eyes unable to follow its path.\n*page_break\n\n*label clearing\n    \n*if wolfbite > 0\n    You grip your wrist and curse. The blood oozes but the bite luckily wasn't deep. You tear off a bit from your shirt sleeve and wrap it tightly around the wound.\n    *page_break\n    *goto clearing2\n*else\n    *goto clearing2\n*label clearing2\n\n\n*image clearing.png\n*if hint > 0\n    You glance around bewildered, expecting to see the wild beasts and shadows. Nothing is present and the silence sits still amongst the night air.\n\n*if hint > 1\n    -HINT-\n    \n    Remember a path once taken and forget what it'll be.\n    *page_break\n\nYou stand in the center of the clearing. Nothing is left for you here. You ruffle your hands through your hair in distress.\n\nIs this it? One terrible living nightmare after another… There has to be a way out of this forest… Right? You glance up at the light. The moon has not moved since you remember seeing it last. How long has it been?\n\nWith nothing left you wait anxiously. You want to make sure the shadows are gone before setting on the path South.\n\nThe pathway south is short and simple.\n*gosub trial_end\n\n*label glade\n\n\n\n\n*label glade2\n*if action \u003c 1\n    *page_break\n    *goto wolves\n\nYou stand upon the familiar glade. The air, cold as always, remains eerily silent. Your ears fearfully perked for the sounds of foot treads or wolves.\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        *set percept +1\n        You look around. You get an odd feeling of deja vu but you'll never be able to quite place it. The slab and torch lie at the same spot as before. The torch all but lit.\n        \n        You notice the glade leads to several areas. You instantly feel less claustrophobic. Dead branches and twigs cover the ground from the tree canopy above. Bushes scatter the area but nothing stands out. Next to the cement slab is a small pouch.\n        \n        A caw sounds from the sky as a raven is seen fluttering in quickly and lands on a branch nearby. The tree branch wavers and creaks before sitting still.\n        *goto glade2\n        \n        \n    #Inventory\n        *set action -1\n        *if inventory > 0\n            *if necklace > 0\n                You pull out your matches. There are only a few in the box, but the fact you even have any gives you hope. You take note to hold these close by.\n                \n                You also have the necklace although you are not sure what may come of it. Who owned it before? The chains thin and slightly rusted but looks generally modern in design.\n                *goto glade2\n            *else\n                You pull out your matches. There are only a few in the box, but the fact you even have any gives you hope. You take note to hold these close by.\n                *goto glade2\n        *else\n            You have not picked up anything else since the clearing. The notes you found earlier are now gone.\n            *goto glade2\n        \n    *disable_reuse #Self Check\n        *set action -1\n        *if wolfbite > 0\n            You glance at your wrists. The markings from the cuffs are gone. Your clothes are heavily tattered but the cold only bothers you when you think of it.\n            \n            The only wound you bare is the now wrapped bite mark fresh on your forearm. It hurts to the touch.\n            *goto glade2\n        *else\n            You glance at your wrists. The markings from the cuffs are gone. Your clothes are heavily tattered but the cold only bothers you when you think of it.\n            *goto glade2\n            \n            \n    *if inventory > 0\n        *disable_reuse #Light torch\n            *set action -1\n            *image torch.png\n            You take out one of your matches and strike it across the match to light the torch. It ignites quickly.\n            \n            Although it gives off little warmth, its light makes the shadows hide beyond the trees.\n            *goto glade2\n    *if percept > 0\n        *disable_reuse #Approach raven\n            *set action -3\n            *goto raven\n    *if percept > 0\n        *disable_reuse #Investigate pouch\n            *set action -1\n            *set inventory +1\n            *set matches +1\n            You approach the slab and kneel by the pouch. You slowly lift the flap as you check inside.\n            \n            You give a soft sigh of relief for there are no bugs or rotting flesh within it. Instead, there is a small box of matches and a thin chain. You take the matches and place them in your own bag, then lift the chain to observe it.\n            *page_break\n            It is a thin strand once used as a necklace. Both ends of the small links where a pendant should be have been broken apart.\n            *choice\n                #Take the necklace as well\n                    *set necklace +1\n                    *check_achievements\n                    *if not (choice_achieved_necklace)\n                        *achieve necklace\n                    You place the necklace inside your bag with the matches.\n                    *goto glade2\n                #Leave it behind\n                    You leave the necklace in the pouch. You don't know who… Or what it could belong to.\n                    *goto glade2\n    #Head East\n        *set action -2\n        *set east +1\n        *goto east\n    #Head West\n        *set action -1\n        *set west +1\n        *goto west\n    #Wait\n        *set action -4\n        You stand in the center of the glade, too bothered by recent events to sit or let your guard down. Every slight ruffle of leaves and branches swaying makes you turn in the direction of the noise. \n        \n        Nothing shows itself. You'd best find your way out before waiting longer.\n        *goto glade2\n    \n\n*label raven\nYou walk up to the raven and stare at it from the branch. It stands completely still, and doesn't bob its head in random directions like a normal bird should.\n\nFor a moment you mistake it for a statue until it jerks its head in your direction, staring straight into your eyes. You feel as if it's stare penetrates into your mind. It does not caw, it does not move again, only stares.\n*page_break\n*check_achievements\n*if not (choice_achieved_raven)\n    *achieve raven\nBefore you are about to step back from the strange animal its beak slowly opens. Without moving its beak once more you hear a voice echo around you. Not menacing but strange at the very least.\n\n\"I have watched you for awhile, my sweet. This torment need not lengthen.\" After a slight pause it speaks once more. \"Do you remember me?\"\n*choice\n    #\"Have we talked before?\"\n        *goto raven1\n    #\"What is this place?\"\n        *goto place\n    #\"What are you?\"\n        *goto ravena\n\n*label raven1\n\"We have. It is a shame you cannot remember…\" The creatures speech trembles and for the first time you can place the voice as feminine.\n\n\"The forest torments body and mind, it seems.\"\n\n*choice\n    #\"How did I get here?\"\n        *goto origin\n    #\"Who are you?\"\n        *goto ravena\n\n*label ravena\n\"I remain as a raven to hide myself from demons that roam the trees. My name is not important. Not yet.\"\n\n*choice\n    #\"I talked to a creature in the clearing.\"\n        *goto creature\n    *if action > 50\n        #One selectable dialog\n            *goto creature\n\n*label creature\nThe ravens eyes widen. \"Do not listen to whatever he has to say. Vuculpes is a heathen. A demon and one of many.\"\n\nYou say to the raven… \"It had a snout and howled like a wolf but stood upright like a human.\"\n*choice\n    #\"How is that even possible?\"\n        *goto creature1\n    #\"What else is out there?\"\n        *goto creaturea\n\n*label creature1\n\"The forest is cursed with a bridge. It binds the world of the living and of the dead.\"\n\n\"I have said this before… I wish not for you to forget…\" The raven's head droops as a tear falls from its feathers.\n*page_break\n\"I want for you to find me but I cannot tell you the way. The only person that knows is you. The forest moves, you know this. It reacts to what you remember and forget.\"\n\nThe raven's wings spread and it flies up and over the night sky before vanishing beyond the tree-line. \n*goto glade2\n\n*label creaturea\n\"Everything that wishes to torment and devour. Demons of every shade.\"\n\n\"I have said this before… I wish not for you to forget…\" The raven's head droops as a tear falls from its feathers.\n*page_break\n\"I want for you to find me but I cannot tell you the way. The only person that knows is you. The forest moves, you know this. It reacts to what you remember and forget.\"\n\nThe raven's wings spread and it flies up and over the night sky before vanishing beyond the tree-line. \n*goto glade2\n\n\n*label place\n\"This is the cursed forest of Shonnra Morr. You have entered many times but have yet to leave once.\"\n\n*choice\n    #\"How is that possible?\"\n        *goto leave\n    #\"What does that mean?\"\n        *goto leave\n    #\"Who... who am I?\"\n        *goto leave\n\n*label origin\n\"That is a story too long for this place. The trees watch and even listen. I desire to help you but you must learn to forget when it is needed, and remember when it is necessary.\"\n\n*choice\n    #\"What does that even mean?\"\n        *goto leave\n    #\"How can I remember?\"\n        *goto leave\n\n*label leave\nThe ravens beak widens as it goes to speak before the trees arch high up, creaking and aching from a strong wind far above. Below, you and the raven are untouched by its chill but the trees whistle endlessly from its touch.\n\n\"They are listening. You must find me quickly! The forest moves, you know this. It reacts to what you remember and forget.\"\n\nThe raven's wings spread and it flies up and over the night sky before vanishing beyond the tree-line. \n*goto glade2\n\n\n\n\n\n\n*label east\n*if east > 1\n    You return to the east, unsure what may happen. As you walk you try to think of what had been here before but somehow you forgot. You remember a small boy? No.. Girl? Or was that awhile ago… Or not at all?\n    \n    Your mind feels jumbled. The sight confuses you for you remember now that you had literally just been here. But you had left here from the North?\n    *page_break\n    *goto neweast\n    \n    \nYou decide to head East.\n\nThere is no pathway heading this direction. Instead, the trees begin to thin as they scatter around you. The farther you walk, the farther their distance expands.\n*page_break\n\n*label east2\n*if action \u003c 1\n    *page_break\n    *goto wolves\n\nYou stand in an enclosed area with loose trees and foliage scattered about.\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        You warily glance around for the girl you remember. At first you do not see anything, but a shuffling beside a tree calls your attention.\n        \n        It was a smaller shadowed figure, disappearing behind a large clump of bushes. You think it was her.\n        *page_break\n        You cautiously walk around the foliage to look but have managed to lose the figure. Where did it go?\n        *goto east2\n    *disable_reuse #Call Out\n        *set action -1\n        *set op +1\n        You call out amongst the trees. You hear nothing. At first you think no one is actually out there. That is, until you feel a cold claw gripping your shoulder.\n        *page_break\n        \n        You sharply turn in dismay. A cowled figure much smaller stands before you. It's robes are torn and tattered. It's head is drooped low and you cannot see under the hood.\n        \n        For awhile it stands silent. Unmoving…\n        *page_break\n        *goto demon\n            \n    #Wait\n        *set action -2\n        You decide to lean against a tree and wait. As you do so you hear a soft whimper and shuffling behind foliage… As you look in the direction you cannot quite track where it is coming from. You don't think you want to wait and find out.\n        *goto east2\n    #Head Back\n        *set action -1\n        You decide to swiftly leave heading back for the glade.\n        *goto glade2\n    \n    \n    \n*label demon\n*comment dont forget to add demon!!!!\n*choice\n    #Talk to the figure\n        *goto demon1\n    #Observe\n        *goto demon2\n    #Leave\n        *set action -1\n        You immediately decide not to engage with the robed figure. Even if it was the girl…\n        \n        You step back several feet, watching the shadow the entire time until it was out of view. Turning, you briskly head back for the familiar glade.\n        *goto glade2\n\n*label demon1\n*comment add image\n*image demon.png\nYou try to talk to the figure but it remains unresponsive. You take a step back and watch in horror as the figure slowly raises it's head. Under the hood is a demon of bones and flaking meat.\n\nIt takes a step towards you as it twitches and screeches. Even with empty sockets for eyes, you can't help feel a penetrating gaze.\n\nIt steps closer again as you stumble back.\n*choice\n    #Fight it\n        *set action -1\n        Against your better judgment, and with no weapon at hand, you decide to fight the demon. Grabbing a rock, you lunge at it and try to smash the thing's skull.\n        \n        You are shocked when your entire hand and the rock fly right through the beast like it was never there. It wisps away like a fog as you are left with your heart thumping. It beats so hard that you almost feel as if it'd burst from your chest. You hear distant laughter in the trees.\n        *page_break\n        After awhile of catching your breath are you able to collect yourself again.\n        *goto east2\n    #Run\n        *set action -1\n        You quickly turn away and run as fast as you can. You want nothing to do with this thing…\n        \n        Only when you feel you are far enough, do you stop to catch your breath before briskly head back for the familiar glade.\n        *goto glade2\n        \n\n*label demon2\n*comment add image\n*image demon.png\nYou try to observe the thing before you as it moves and wavers. You take a step back and watch in horror as the figure slowly raises it's head. Under the hood is a demon of bones and flaking meat.\n\nIt takes a step towards you as it twitches and screeches. Even with empty sockets for eyes, you can't help feel a penetrating gaze.\n\nIt steps closer again as you stumble back.\n*choice\n    #Fight it\n        *set action -1\n        Against your better judgment, and with no weapon at hand, you decide to fight the demon. Grabbing a rock, you lunge at it and try to smash the thing's skull.\n        \n        You are shocked when your entire hand and the rock fly right through the beast like it was never there. It wisps away like a fog as you are left with your heart thumping. It beats so hard that you almost feel as if it'd burst from your chest. You hear distant laughter in the trees.\n        *page_break\n        After awhile of catching your breath are you able to collect yourself again.\n        *goto east2\n    #Run\n        *set action -1\n        You quickly turn away and run as fast as you can. You want nothing to do with this thing…\n        \n        Only when you feel you are far enough, do you stop to catch your breath before briskly head back for the familiar glade.\n        *goto glade2\n\n\n*label west\n*if west > 1\n    You return to the west, unsure what may happen. As you walk you try to think of what had been here before but somehow you forgot. Was the clearing this way?\n    \n    No… That's not it. Your mind feels jumbled. It is not until you see the river that you remember. The sight confuses you for you remember now that you had literally just been here.\n    *page_break\n    Ahead of you lay an entire structured bridge made of stone, its length extending across the whole bridge. You carefully tap your foot on the cobblestone tabs at the start, testing the reality before you.\n    \n    How is this even real? Was it the bridge that had moved? Or was it the forest?\n    *page_break\n    *goto newwest\n\n\nYou head West through the pathway. It opens up more and more, leading to a shallow river bank. As you walk you can feel something changing in the air and your body feels weighted as if you are carrying something heavy. Before you is a pile of stones.\n\nEverything is the same as it was before… Has nothing changed? Where can you even go?\n\n*label west2\n*if action \u003c 1\n    *page_break\n    *goto wolves\n\nYou stand at the waters edge by the rubble.\n\n*comment inventory have equipment for building plans? blueprints as you used to be ruler surveying construction\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        You kneel by the rubble. It is a pile of cut stone that looked to be stacked at one time and had toppled over. The mud at the waters edge carved away and replaced with cobblestone. The edge of the cobblestone starts the beginning of a bridge that shows severe wear. This was either a bridge in its construction or the repair after collapse. \n        \n        You look across the river to see the other end of the swampland faces a wall of thick trees. What they were building towards, you cannot tell.\n        *goto west2\n    \n    *disable_reuse #Call out\n        *set action -1\n        You call across the river to the other side. You hear your own echo repeat… Then repeat again and again until it slowly fades off.\n        *goto west2\n    \n    *disable_reuse #Inventory\n        *set action -2\n        As you had walked here you felt something in your bags. You quickly go to check and notice a thin, flat stone has been placed inside. Did you put it there?\n        \n        You go to look at it and notice it has a fine chiseled edge and border on one side whilst the other is crumbled and broken off. On the piece is a depiction of ancient writing. You almost think you can read the words, but then realize it's not in English, Portuguese or any native tongue that you can tell. On the left shows a large humanoid with its arms outstretched to a group of workers building steps to it. On the right a row of trees with each one being slightly taller than the one before. Between the trees someone etched lines sporadically giving the object tendrils like a seeping cloud or octopus, its grasp reaching from within the trees.\n        *page_break\n        \n        You flip the tablet over but it is only smooth on the other side. As you go to place it down you hear a howl in the distance that sends shivers down your spine.\n        \n        Then a second howl echoes much closer. You immediately feel you are unwelcome here.\n        *page_break\n        *goto west2\n    #Wait\n        *set action -2\n        You decide to brave the howls amidst the trees as you sit by the stones. Noticing the water by you sits remarkably still your mind goes absolute blank as the trees around you seem to curl towards you. For a split moment the trees feel like they spin around as you stand back up, you clutch the closest one to you for balance. The strange moment subsides as quickly as it had arrived.\n        *page_break\n        *goto west2\n        \n    #Head back\n        *set action -1\n        With no way across, you decide to head back.\n        *goto glade2\n\n*label newwest\n*set hint 0\n*comment make option for reader to check reflection in water. too murkey to see, let them use their hand to clear moss and algae, and in doing so they die lul\n\n\nYou lay your hand on the stone pillar at the edge of the bridge. You can feel the cold, clammy stone under your palm.\n\n*choice\n    *disable_reuse #Percept\n        You gaze over the bridge. It has a well designed arc to it and with little moss and vines on it, you'd mistake it for being built recently. It spans the entire swampy river and leading to an opening in the forest you know for sure wasn't there before.\n        *goto newwest\n    #Head Across\n        *goto across\n\n*label across\nYou cautiously step onto the stone bridge. Every movement you make you expect to go right through the bridge like it wasn't actually there, but it is.\n\nYou glance over the edge at the water below you. For a moment you thought to check your reflection, hoping to see what, or who you are. But the river is too thick with moss and algae. No reflection is there to be seen.\n\nYou dawdle no more as you cross the bridge, choosing to look back not even once.\n*page_break\n\n*goto_scene chapter4\n\n*label neweast\n*image clearing.png\nYou stand at the edge of the clearing. The forest's wild and bizarre effects at play.\n\nBefore you can think of anything, you make sure to step into the center of the clearing, protected by the moons light. You glance up at it.\n\nHow is it that it aids you? Why does it?\n*page_break\n*label neweast1\n*if action \u003c 1\n    *page_break\n    *goto wolves\n\nYou stand in the center of the clearing. Not much surrounds you, everything is the same.\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        You glance around to see if anything has changed. The only thing you see is a small pile of bones at the base of a tree.\n        \n        You observe it but cannot tell if it was once a girls or a mans. All that is left is a skull, femur, and a few others you cannot name. Beside it is mostly decomposed black cloth.\n        *goto neweast1\n    *disable_reuse #Wait\n        *set action -2\n        You sit for a bit in the clearing. You are unsure what you wait for. You have been here many times but this doesn't seem to be the way out.\n        *goto neweast1\n        \n    #Head Back\n        *set action -1\n        With nothing here, you decide to head back to the glade.\n        *goto glade2\n\n*label wolves\n*set east 0\n*set west 0\n*set action 12\n*set op 0\n*set op2 0\n*set percept 0\n*set progress 0\n*set inventory 0\n\n\n*if hint > 1\n    Trying to move around the dense forest, you stumble over thick roots that spring from the ground. The momentum of your fall throws you into a pile of dead twigs and leaves. Barely moving from the sudden pain, the twigs collapse beneath your weight, revealing a trap below. \n    \n    You can scarcely tell how long it takes before you even hit the cold ground. All you know was that the fall was deep enough to break several bones within your body. You lay in agony as you stare at the small opening so far above you, left to slowly rot within the cold, cold ground.\n    \n    *page_break\n    *image shadows1.png\n    Loop Resets… \n    *line_break\n    Try Again?\n    *page_break\n    *goto_scene chapter3\n\n\n\n*comment stage fail\n*set hint +1\nAs you step around a small bush you hear howls in the distance. You have heard many howls tonight but this one sounds sharp… Sudden.\n\nLonger yowls pierce the night as you realize they are getting closer. You back up against a tree, unsure what you must do. How can you escape this place!?\n*page_break\n\nYou turn and run for the clearing, knowing well it had protected you before. Your feet pound against the mud and dirt, jumping over bushes and branches as you make your way.\n\nJust north of the glade right? Where is it?\n\nYou start to feel panic as you search widely. Before you realize it you stumble upon something familiar.\n*page_break\nNot the glade or the clearing, but the rivers edge. You are forced to stop, catching your breath. The howls creep closer.\n*choice\n    #Fight for your life\n        *goto fight\n    #Swim to safety\n        *goto swim\n\n*label fight\n*set death +1\nYou glance around for anything you can use.\n\nStick? No. \n*line_break\nWhat else?\n\nYou see the cut stones at the waters edge. It is the only thing available. You quickly pick up one the has corroded and broke apart, one of its edges now sharp and jagged.\n*page_break\nAlmost at the instant of turning around do you see a massive, maned wolf leaping out from the trees. It's fangs flaring down on you. You raise the rock in defense as the beast falls on you.\n\nThe rock pierces the wolf as it bites down on your neck. Your eyes widen in shock as red streams from your mouth and you can no longer breathe.\n*page_break\nYou both lay there, slowly bleeding out. The beast dies before you do, its dead weight holding you down. Finally its jaws lose grip over your throat. You try to squirm out but more wolves rush in and overtake you. \n\nYou try to push them away but to no avail. First they bite at your hands and arms, but move in to your head and neck. Soon you are ravaged, torn apart by maned wolves.\n\n*page_break\n*image shadows1.png\nLoop Resets… \n*line_break\nTry Again?\n*page_break\n\n*goto_scene chapter3\n\n*label swim\n*set death +1\n*image swamp.png\nWithout thought you try to wade into the river. Its murky and swamp-like stillness hinders your speed. The freezing water is up to your waist by the time you turn around to see several beasts pacing the waters edge.\n\nThey whine and howl, angered by their loss but too scared to follow you.\n*page_break\nThat's when the thought hits you. What are they scared of?\n\n…\n*page_break\nYou glance down into the darkness of the water. The green murk is too thick for you to see anything. You quickly trudge for the other end of the forest.\n\nCloser.\n\nYou are almost there, thinking you are free when something from beneath you grabs at your ankles.\n*page_break\nIt quickly wraps around your leg and tightens. \n\nAs you near the edge of the shore it pulls sharply and you fall into the water. You flail and splash, so close to the other side.\n\nYou struggle against whatever the force is, but its strength trumps yours in the water. You try to stand again, only to lose your footing. You are soon pulled under where you can no longer see. You can only feel the grasp of something as it wraps around your other limbs and holds you under. \n\nYour body takes over, gasping for air only to let thick muddy water into your lungs. You squirm widely as you slowly drown.\n\n*page_break\n*image shadows1.png\nLoop Resets… \n*line_break\nTry Again?\n*page_break\n\n*goto_scene chapter3\n\n\n\n*comment make shadows/wolves/ enemies scared of fire. give interaction for player to fight shadows this time. can either die or start to be successful. make it seem the way to win is by killing them although its the light\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n    *label purchased\n    *return\nRemember earlier how we told you that the first three chapters are available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n    *subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2020-07-09 $2.99 $1.99 purchased\n*abort\n\n", "chapter4": "*set action 12\n*set op 0\n*set op2 0\n*set percept 0\n*set progress 0\n*set inventory 0\n\n\n\nChapter 4\n*line_break\n- WALLS -\n\n*image maze.png\n\n*if hint > 1\n    -HINT-\n    \n    I'm sure you caught on. Its a maze! We have two ideas. Always keep your left hand on the wall? Or perhaps drawing a map may help.\n    *page_break\n    *set action 12\n\nYou take a few steps through thick trees and wind upon a long corridor with walls as high as buildings on both sides. Unsure of what is before you, you glance back at the bridge to notice it is no longer there.\n\nYou take a deep breath before heading forward, wary of any beasts or traps around the corners.\n*page_break\nYou find yourself in a room as small as the narrow pathways in the forest. You look up to the night sky to the notice the Moon is still there. You take note to know the Moon's location as a reference point in case you get lost here. Only a few trees grow on the edges of this place and the majority of the space above you seems clear. \n\n*label start\n*if action \u003c 1\n    *page_break\n    *goto death\nThe room forks off in several directions with a corridor heading North, East and West. Straight ahead, North, the hallway seems fairly dark. To your left looks like a small entry with a torch lit upon the wall. To your right you cannot quite tell right away. It is a long passage with a faint glow at the end.\n\n*choice\n    #Head North\n        *goto north\n    #Head East\n        You head to the right.\n        *set action -1\n        *goto e1\n    #Head West\n        You head to the left.\n        *set action -1\n        *goto w1\n\n\n*label north\n*set hint +1\n*set death +1\nYou decide to head north into the dark hallway. It seemed to feel like the right choice at the time.\n\nAs you step forward into the darkness you begin to lose your footing. The cobblestone floor had turned to jagged rocks and loose debris. You regain balance before quickly turning to head back only to be overwhelmed with dread.\n\nThere is no longer any light down the hall to the first room. With the moons light you can only make out the dark top of the wall meeting the skies. You watch it as you walk back to where you came.\n*page_break\nYou know you had only walked about twenty paces but going back one hundred paces leads you no where. You begin to feel lost as you turn back and go the other direction.\n*page_break\nAnother hundred paces…\n*page_break\nTwo hundred paces…\n*page_break\n\nYou fall to your knees in distress, forever stuck in a dark passageway with no way of escape. You start to climb the walls, hoping you can reach the top.\n\nAs you place your foot on  a stone for leverage, it gives way and you fall. The jagged rocks beneath you pierce your skin. The ones that don't, break and dislocate your spine.\n*page_break\n\n*image gameover.png\nYou are left to die a slow and painful death…\n*line_break\nLoop resets… \n*line_break\nTry again?\n*page_break\n*goto_scene chapter4\n\n*label e1\n*if action \u003c 1\n    *page_break\n    *goto death\n\nYou stand within a thinner passageway. Looking East you can still see the faint glow. However, to the North looks to be a set of stone stairs. West takes you back to the start.\n*choice\n    #Head North\n        *set action -1\n        *goto e2\n    #Head East\n        *set action -1\n        *goto e3\n    #Head West\n        You decide to head back to the first room.\n        *set action -1\n        *goto start\n\n*label e2\nYou decide to take the stairs up. Maybe you can get a good vantage point?\n\nAs you head up you can feel the air turning frigid. You are equal height with the canopy of trees and can feel the full blast of the wind that crosses you. You shiver slightly.\n*choice\n    #Percept\n        *set action -1\n        *goto percept\n    #Head Back\n        *set action-1\n        *goto e1\n\n*label percept\nStanding atop a plateau overlooking almost the entirety of the maze, you can see many of the outlines of hallways and passages around you. On both sides of the plateau can you see many twists and turns of corridors. You try to make out the detail but the farther out you look, you can only see the tops of walls.\n\nAll you know is the way seems to be due North. You decide to head back down the stairs.\n*page_break\n*set action -1\n*goto e1\n\n*label e3\n*if action \u003c 1\n    *page_break\n    *goto death\nYou finally reach the room with the faint glow. You are not sure whether to feel relieved or not, knowing the soft light was simply that of another torch. Nothing stands out in this area.\n\nYou are able to head North through a long passage. East seems to be another hallway that turns slightly to the left. West takes you back to the thinner hallway.\n\n*choice\n    #Head North\n        You head North through a long stretching corridor.\n        *set action -1\n        *goto e5\n    #Head East\n        *set action -1\n        *goto e4\n    #Head West\n        *set action -1\n        *goto e1\n\n*label e4\nYou head farther East. \n\nAs you enter another hallway you get engulfed with an awful smell. You step cautiously farther as the smell only grows stronger. Before you even think of turning around you lose your footing and slip into a large hole within the stone floor.\n*page_break\nYou are barely able to catch yourself with your hands as you hang waist deep into the hole. You quickly pull yourself up and crawl backwards. It is too dark to see but with the horrid stench can you imagine the hole is filled with bodies.\n\nYou definitely leave this place quickly, heading back.\n*page_break\n*set action -1\n*goto e3\n\n*label e5\n*if action \u003c 1\n    *page_break\n    *goto death\n\nBefore you is yet another small sized room. Strange lines are drawn into the ground.\n\n*if ritual \u003c 1\n    *set ritual +1\n    *check_achievements\n    *if not (choice_achieved_ritual)\n        *achieve ritual\n    You step closer and notice them not to be drawn but etched deep into the stone floor. The etching itself has several circular patterns with strange symbols lining the inner circles.\n    \n    The circle itself is about eight feet in diameter or so. The cracks are lined with dried blood and dirt. Best not to linger.\n\nThere is another hallway leading North as well as one heading West. South will take you back.\n\n*choice\n    #Head North\n        *set action -1\n        *goto e6\n    #Head West\n        *set action -1\n        *goto e7\n    #Head South\n        *set action -1\n        *goto e3\n\n*label e6\nYou decide to keep heading North. It is to your dismay that this section leads to a dead end. There is nothing but stones leading straight up. You are forced to head back.\n*set action -1\n*goto e5\n\n*label e7\n*if action \u003c 1\n    *page_break\n    *goto death\n\nNot until now does the hallway finally open up and you can feel yourself able to breathe once more. Ahead of you is a large crevice in the ground. It's at least several meters across and you cannot see the depth. It is far too wide to jump.\n\nAcross from the crevice you can see a small fire lit upon the ground. Maybe theres a way across?\n\nThere are small paths alongside the edge of the crevice heading both North and South. East takes you back.\n\n*choice\n    #Head North\n        You decide to head North.\n        *set action -1\n        *goto e9\n    #Head East\n        You head back East.\n        *set action -1\n        *goto e5\n    #Head South\n        You decide to head South.\n        *set action -1\n        *goto e8\n\n*label e8\nYou are standing beside a cliff, at least twice as large as the stone walls. This must be that plateau from the other side. There seems to be no way across the crevice at this point either.\n\nWith nothing here but rubble you decide to head back.\n*page_break\n*set action -1\n*goto e7\n\n*label e9\nDreadfully you come to a halt in your journey. The path does not lead this way as you glance across the crevice. There is no way across and no other passageways. \n\nThere must be a way over there… You regretfully head back South.\n*page_break\n*set action -1\n*goto e7\n\n\n\n\n*label w1\n*if action \u003c 1\n    *page_break\n    *goto death\nYou come to a torch hanging on the wall. It sits within a hallway leading both North and South.\n*choice\n    #Head North\n        You head North.\n        *set action -1\n        *goto w6\n    #Head East\n        You decide to head back to the main room.\n        *set action -1\n        *goto start\n    #Head South\n        You head South. There is a small corner. As you turn to the right it now leads you farther West.\n        *set action -1\n        *goto w2\n\n*label w2\n*if action \u003c 1\n    *page_break\n    *goto death\nYou come to a part where the walls seem well-developed. The care in the placement and cutting of the stone shows more here than anywhere else. Two pillars stand in the center with wolf heads at the tops. Their jaws wide open with a flame lit within it.\n\nTo the West the walls slope down and beyond that are the hellish trees of the forest. From here you can either head farther West or North.\n*choice\n    #Head West\n        You head farther West.\n        *set action -1\n        *goto w3\n    #Head North\n        You head North.\n        *set action -1\n        *goto w5\n\n*label w3\nThe walls slope down and away from you as you walk. Soon they are no more as trees surround you, too tight to fit through. You follow a path that bends leading South now.\n\nAs you follow it you are taken back to the river. You stand at the waters edge for a moment looking around. There is no easy way to pass around the shores, and nothing lies across the still water.\n\nIts essentially a dead end and you must head back.\n*goto w2\n\n*label w6\n*if action \u003c 1\n    *page_break\n    *goto death\nYou stand in a compact zone. The walls' tops are jagged with metal poles with ends as spikes. Loose rags waver from the poles. Ahead of you is a large cave entrance that goes beneath the corridors into the ground.\n\nThere is also a passageway heading West or back South.\n*choice\n    *disable_reuse #Percept\n        You step closer to the cave to inspect it. Its completely covered with a metal fence, grated with large thick poles. Each portion of the square seems bigger than a foot across. Large enough a small person could easily fit through.\n        \n        Whatever this thing holds, its big. You decide not to stand to close to the entrance.\n        *set action -1\n        *goto w6\n    #Head South\n        You decide to head South.\n        *set action -1\n        *goto w1\n    #Head West\n        You decide to head West.\n        *set action -1\n        *goto w5\n\n\n*label w5\n*if action \u003c 1\n    *page_break\n    *goto death\nYou come to a fork in the hallways. To the North the hallway darkens and bends to the right. To the East and South are more corridors. To the West is a slanted path along the cobblestone floor.\n\n*choice\n    #Head North\n        You head into the darker hallway. Your heart rate sky rockets as you pace yourself cautiously.\n        \n        It bends to the right leading you due East.\n        *set action -1\n        *goto w7\n    #Head East\n        You head East.\n        *set action -1\n        *goto w6\n    #Head South\n        You head South.\n        *set action -1\n        *goto w2\n    #Head West\n        You head West onto the slanted pathway.\n        *set action -1\n        *goto w4\n\n*label w4\nAs you walk the path it begins to slant and slope more. Bits of rock and stone crumble and roll beneath your feet. Before long the hallway slopes into the ground and becomes very dark.\n\nYou question your choices as the slope becomes that of a hill. You lose your footing as you fall backwards onto the rocks. You catch yourself, only hurting your hands and wrist as you can hear the tumbling of the stones down the hall.\n*page_break\nYou listen closely and here them tumbling faster and faster. It lasts for what feels like forever until you hear and tremendously loud bang and crackling.\n\nThe slope only gets worse. Best to head back so you don't fall to your death.\n*set action -1\n*goto w5\n\n*label w7\n*if action \u003c 1\n    *page_break\n    *goto death\nNot until now does the hallway finally open up and you can feel yourself able to breathe once more. Ahead of you is a large crevice in the ground. It's at least several meters across and you cannot see the depth. It is far too wide to jump.\n\nAcross from the crevice you can see a large cliff face heading above the walls. There is a small campfire in the center of this area. It is not lit but there are some smoldering embers still amongst the ashes, someone was here shortly before you.\n\nThere is small pathway alongside the edge of the crevice heading North. You could also head West to the pathway bending to the left.\n\n*choice\n    #Head North\n        You decide to take the thin path alongside the crevice. It is so small that you have to stand sideways and crab walk. Beneath you the crevice is pitch black.\n        *set action -1\n        *goto w8\n    #Head West\n        You decide to go back.\n        *set action -1\n        *goto w5\n\n*label w8\n*if action \u003c 1\n    *page_break\n    *goto death\nYou come to a point where the crevice along your right runs under the wall and goes deep into the ground. There is a small pathway to the North and West.\n\n*choice\n    #Head North\n        *set action -1\n        *goto w9\n    #Head West\n        You head West.\n        *set action -1\n        *goto w10\n\n*label w9\nYou decide to keep heading North. It is to your dismay that this section leads to a dead end. There is nothing but stones leading straight up. You are forced to head back.\n\n\n*set action -1\n*goto w8\n\n*label w10\n*if action \u003c 1\n    *page_break\n    *goto death\nYou come to another cross in the hallway. There is a small torch still lit on the wall. You can go either North or South.\n\n*choice\n    *disable_reuse #Head North\n        *set action -1\n        *goto w11\n    #Head South\n        *set action -1\n        *goto w12\n\n*label w11\nBefore you go far, you notice ahead is a dead end. A small torch is still lit on the wall. On the corner is a small, partially destroyed table made of stone. Atop it looks to be some sort of object. You are too far to tell what it is.\n\n*choice\n    #Pick up object\n        You step closer to pick it up. It is a small wolf pendant head with beautiful small gems for eyes. On the top of the wolf's head is a small loop fit for a chain or necklace.\n        *goto necklace\n    #Head Back\n        You decide just to head back, you think you are almost to the end.\n        *goto w10\n\n*label necklace\n*choice\n    #Take it\n        *set pendant +1\n        *check_achievements\n        *if not (choice_achieved_pendant)\n            *achieve pendant\n        You place the small wolf pendant in your pocket and leave the area.\n        *goto w10\n    #Leave it\n        You decide to set it back down, unsure of its origins, and head back where you came.\n        *goto w10\n\n*label w12\nYou take the pathway south. It bends around almost full circle before you see a cluster of trees ahead. The walls slope down until they are no more than a foot high with crumbling stones around you.\n\nThe canopy above you is dense as you head through the thicket. It almost feels as if it were a tunnel.\n*page_break\nYou sigh with relief as you finally find your way out of the maze. You are not sure where you felt safer amongst the forest or those daunting passageways. Either way, you never felt relief like this to see a spacious plot before you.\n\nBut the most awing beauty lies on the horizon. You cannot see the moon but the hues of red and orange are seen above the trees. It must be dawn!\n*goto_scene chapter5\n\n\n*label death\n*set action 12\n*set death +1\n\n\n*if hint > 1\n    As you fumble through the dark of the maze, you become lost. Clouds ahead roll over the sky and you can no longer find your path. You walk aimlessly around one corner, then the next, and the next. Nothing.\n    \n    The moment you round the next bend you feel the cobblestones beneath your feet give way. You fall sharply into a pit of spikes that penetrate your flesh. \n    \n    You die instantly.\n    \n    *page_break\n    *image gameover.png\n    Loop Resets… \n    *line_break\n    Try Again?\n    *page_break\n    *goto_scene chapter4\n\n\n\n*set hint +1\nYou step around a corner unsure what may lay beyond. The hallway stretches far beyond. So far in fact, you can't even see the room at the end. It stretches into the darkness.\n\nUnsure, you turn around to see the same thing around the corner you just came from. You are surrounded with darkness…\n*page_break\n. . . . .\n*page_break\n*image light_slightly_different.png\n*page_break\n*image demon.png\n*page_break\nA demon rushes you from the shadows. Laughing and screeching as it slams you against the wall. Its breath cold against your face, it stares you down.\n\nIts jaw bone hangs and creaks as it leans towards you. You close your eyes in shock, waiting for it to bite you and tear out your flesh. \n\nThen you feel a tiny trickle across your collarbone. Then a few more as they slide down your side. You open your eyes to see a thousand spiders pouring out of its mouth as they begin to cover every inch of your skin.\n*page_break\nYou squirm and fight but the beast pins you down as you can feel the spiders begin to bite at your toes. \n*line_break\nNipping and scraping behind your ears.\n*line_break\nCreeping into your skin.\n*line_break\nCrawling across your neck.\n*page_break\nYou are stuck within what feels like a never ending torment until the spiders burrow deeper into you. Almost as if you can feel them across your bones and then soon your heart.\n\nSharp pain strikes your chest as you keel over, gasping on your hands and knees. You look around but cannot see the demon anymore but you feel as if your heart had stopped. As if he was reaching into you and gripping it from the back of your ribcage, trying to pull it through.\n*page_break\nYou no longer can move as you collapse to the floor and perish.\n*page_break\n\n*image gameover.png\n*line_break\nLoop Resets… \n*line_break\nTry Again?\n*page_break\n*goto_scene chapter4\n\n", "chapter5": "*set action 12\n*set op 0\n*set op2 0\n*set percept 0\n*set progress 0\n*set inventory 0\n\n\n*page_break\nChapter 5\n*line_break\n- SHAMAN -\n\n*image junglebuildings.png\n\n*comment not actually daylight, after witch you see the sun going down, you are stuck in eternal darkness.\n\n\nTrees span the edges and loosely around foliage and bushes. Amongst all this are several more stone constructions. None of these like the maze however. They seem to be smaller and built in similar fashion. \n\nBirds caw and chirp amongst the branches.\n*page_break\nYou start to head forward through all the buildings. \n*choice\n    #Percept\n        You notice some of the buildings have at least one unbarricaded window that you use to peak through. The rooms are small with shelves nailed to walls and generally a lifted platform of rocks. You assume the platform to be a bed frame.\n        \n        This must have been a small village of sorts.\n        *goto going\n    #Keep going\n        *goto going\n\n*label going\nYou decide to continue through as you come to one last stone shelter. A thin stream of smoke is exiting a chimney in the back. You creep up to the window to peek inside.\n\n\"I'm glad you were able to find me.\"\n\nA voice comes from behind you as you turn around sharply. Before you is a frail, old woman. Her hair is grey, creeping from under a black headscarf that looks hastily wrapped on and droops around her neck. She wears an extra garment over her regular clothes that drapes from her shoulders into a thick, wide cape. The edges are frayed and wrap around her legs to keep warm in the chilly forest nights.\n*page_break\nBefore you are able to ask anything she speaks up again.\n\n\"Please, inside.\" She holds out her left hand to the rickety wooden shack door. Her right arm holding a bundle of sticks. \n\nYou hesitate at first but the woman seems to give off no threatening aura. As you push the door open you notice it has no locking mechanism. It can only sway open then back to fit partially into the frame.\n*page_break\n\"In case you wonder, yes.\"\n\n*choice\n    #\"Yes?\"\n        *goto yes\n    #\"Are you the-\"\n        *goto inter\n\n*label yes\n\"Yes.\" She mutters again, almost annoyed.\n*goto cont\n\n*label inter\n\"Yes.\" She interrupts you.\n*goto cont\n\n*label cont\n\"I was the raven you may have saw earlier. I would hope you remember.\" She throws her sticks down next to the small fire pit she has near the end of her stone shack. She picks up a bowl at a table nearby before pausing her movements for a moment and looks up at you, left eyebrow raised.\n\n\"You do -remember- right?\"\n\n*choice\n    #\"Not Quite\"\n        She sighs at your response. \n        \n        \"It is to be expected, after all.\" She sets her bowl at the other end of the room, next to a mortar and pestle. She tosses in a few herbs hanging from her window and begins to work them into a paste.\n        \n        For awhile you expect her to continue talking but she does not. Perhaps conflicted in her head about what she must do next?\n        *goto herbs\n        \n    #\"You told me to find you\"\n        She exhales happily.\n        \n        \"I'm so glad. This is good, this is really good…\" She sets her bowl at the other end of the room, next to a mortar and pestle. She tosses in a few herbs hanging from her window and begins to work them into a paste.\n        \n        For awhile you expect her to continue talking but she does not. Perhaps conflicted in her head about what she must do next?\n        *goto herbs\n\n\n*label herbs\n\"I want to help you…\" She continues after a prolonged and awkward silence. \"But I have done so for awhile, and I grow weary.\" She trails off again, lost in thought.\n\n\"Tell me… If anything at all, what can you remember? What have you found that you can recall?\"\n\n*label convo\n\nYou ask her …\n\n*choice\n    \n    *if photo > 0\n        *disable_reuse #About the Picture\n            \n            You remember a picture at the very beginning of your memories. Of three teens entering a forest. You can't remember if you had met one of them or not.\n            \n            \"Ahh those poor kids. This forest's corruption touches everyone…\"\n            \n            *label picture\n            \n            *choice\n                \n                *disable_reuse #\"What happened to them?\"\n                    \"The one girl, she faced a terrible fate in a cabin at the edges of the trees. It was barely after entering did this happen. The other two could only scream and run, but the forest will feel it and it'll want to engage. It turned them around and they ran farther inward.\"\n                    \n                    \"I do not know fully what had happened to the other two…\"\n                    *goto picture\n                #\"Am I.. One of them?\"\n                    \"You were not… However are now. And will not be again.\"\n                    \n                    You put your hands to your head. Confused at her words.\n                    \n                    *choice\n                        #\"Why speak riddles? That doesn't help!\"\n                            \"Some things must be so, my sweet. Even though intentions true, will you feel them false.\" She sighs softly.\n                            \n                            \"You must find yourself, in your own way. If I were to tell you, what stops you to think it is a lie. What else do you remember?\"\n                            *goto convo\n                        #Nothing more on the picture\n                            *goto convo\n                #Nothing more on the picture\n                    *goto convo\n    *if camera > 0\n        *disable_reuse #About the Camera\n            You remember a camera by the river. It was of the kids entering the forest. Something to do for a video.\n            \n            \"I wish people will stop coming here. This is more than just spirits walking amongst the living… The curse will lift, but it will take time…\"\n            *goto convo\n    *if necklace > 0\n        *disable_reuse #About the Necklace\n            *if fullnecklace > 0\n                You already told me and gave me them. That is one thing I know you did not forget.\n                *goto convo\n            *set fullnecklace +1\n            You tell her about finding a small chain by the torch and rock slab. She gasps almost instantly.\n            \n            \"Please tell me you have it?\" She stops what is she is doing and runs to you. You hold it out to her as she smiles. \"The pendant as well!?\"\n            *if pendant > 0\n                *check_achievements\n                *if not (choice_achieved_help)\n                    *achieve help\n                \"This is amazing!\" She exclaims happily as you hand it to her as well. She leans by her table and nimbly tries to put it together.\n                *choice\n                    #\"What is it for?\"\n                        \"It will help a spirit cross over. She held it close at the moment of her death. This will give her strength.\"\n                        *choice\n                            #\"Is this why you help me?\"\n                                *if gender = \"male\"\n                                     \"Yes and no. The reason for my presence is one soul. The reason I help is because I cannot ignore it. I have been here awhile and will stay until he remembers.\"\n                                     *goto convo\n                                *else\n                                     \"Yes and no. The reason for my presence is one soul. The reason I help is because I cannot ignore it. I have been here awhile, and will stay till she remembers.\"\n                                     *goto convo\n                            #Nothing more on Necklace\n                                *goto convo\n                            \n            *else\n                You shake your head no. She frowns and tosses the chain on her table. It cannot be done then.\n                *choice\n                    #\"What is it for?\"\n                        \"It would help set a spirit free. She held it close. Every soul lost needs something they held dear to brave the path ahead.\"\n                        *goto convo\n                    #Nothing more on Necklace\n                        *goto convo\n    *if pendant > 0\n        *disable_reuse #About the Pendant\n            *if fullnecklace > 0\n                You already told me and gave me them. That is one thing I know you did not forget.\n                *goto convo\n            *set fullnecklace +1\n            You tell her about finding a small pendant on a rock table in the maze. She gasps almost instantly.\n            \n            \"Please tell me you have it?\" She stops what is she is doing and runs to you. You hold it out to her as she smiles. \"The chain as well!?\"\n            *if necklace > 0\n                *check_achievements\n                *if not (choice_achieved_help)\n                    *achieve help\n                \"This is amazing!\" She exclaims happily as you hand it to her as well. She leans by her table and nimbly tries to put it together.\n                *choice\n                    #\"What is it for?\"\n                        \"It will help a spirit cross over. She held it close at the moment of her death. This will give her strength.\"\n                        *choice\n                            #\"Is this why you help me?\"\n                                *if gender = \"male\"\n                                     \"Yes and no. The reason for my presence is one soul. The reason I help is because I cannot ignore it. I have been here awhile and will stay until he remembers.\"\n                                     *goto convo\n                                *else\n                                     \"Yes and no. The reason for my presence is one soul. The reason I help is because I cannot ignore it. I have been here awhile, and will stay till she remembers.\"\n                                     *goto convo\n                            #Nothing more on Necklace\n                                *goto convo\n            *else\n                You shake your head no. She frowns and tosses the pendant on her table. It cannot be done then.\n                *choice\n                    #\"What is it for?\"\n                        \"It would help set a spirit free. She held it close. Every soul lost needs something they held dear to brave the path ahead.\"\n                        *goto convo\n                    #Nothing more on Necklace\n                        *goto convo\n            \n    *if ritual > 0\n        *disable_reuse #About the Ritual Circle\n            You tell her of a crazy circle you found etched into the stone within the maze. She frowns knowing well of its origin.\n            \n            \"Carved by those who did not desire, to save themselves from what they could not withstand…\n            \n            I was one of those few, as were you.\"\n            *goto convo\n    *disable_reuse #About the Forest\n        *if gender = \"male\"\n            You ask in general about the nature of the forest.\n            \n            \"The forest of Shonnra Morr is named after the Mayan King Shonnra and of his lands of Morr, namely his settlement and surrounding villages. \n            \n            It became a forest engulfed with madness and chaos by an invading army from across the seas. Their power and greed so dire that Shonnra could not compete. Forced to retreat inland deeper where he knew they stood a chance. The forest was a door you see.\n            \n            Beyond this door was a bridge to the first realm of Xibalba, the circles of hell. One of nine. To open this door would allow them to face madness with madness. The key to this door only needed one soul…\n            \n            That of a leader.\n            *page_break\n            \n            Of course, Shonnra would have never wanted this for his people. But because of my foolish words and our great friendship, he trusted me…\n            \n            I told him to make a deal with the god of death, Vucub Came. This deal would save that of his village and its people and destroy their invaders. In return he'd offer his soul to Vucub.\n            *page_break\n            \n            As all things go, I should have known this would not do. The corridors you passed through was the key slot to form this bridge. The invaders were destroyed, but so was Shonnra…\"\n            \n            She left it at that, and said no more.\n            *goto convo\n        *else\n            You ask in general about the nature of the forest.\n            \n            \"The forest of Shonnra Morr is named after the Mayan Queen Shonnra and of her lands of Morr, namely her settlement and surrounding villages. \n            \n            It became a forest engulfed with madness and chaos by an invading army from across the seas. Their power and greed so dire that Shonnra could not compete. Forced to retreat inland deeper where she knew they stood a chance. The forest was a door you see.\n            \n            Beyond this door was a bridge to the first realm of Xibalba, the circles of hell. One of nine. To open this door would allow them to face madness with madness. The key to this door only needed one soul…\n            \n            That of a leader.\n            *page_break\n            \n            Of course, Shonnra would have never wanted this for her people. But because of my foolish words and our great friendship, she trusted me…\n            \n            I told her to make a deal with the god of death, Vucub Came. This deal would save that of her village and its people and destroy their invaders. In return she'd offer her soul to Vucub.\n            *page_break\n            \n            As all things go, I should have known this would not do. The corridors you passed through was the key slot to form this bridge. The invaders were destroyed, but so was Shonnra…\"\n            \n            She left it at that, and said no more.\n            *goto convo\n    *disable_reuse #About the Wolf Demon\n        *comment wolfbite remark\n        You ask about the wolf demon you ran into earlier.\n        \n        \"Vuculpes. A werewolf demon and son of Vucub Came. After the bridge was formed within the forest, demons broke free. They slaughtered everyone and did not care.\n        \n        The people of the forest fought back and killed his father. With eternal anger Vuculpes hunts the lost souls of the forest. It is nothing but a game to him now.\"\n        \n        For a moment she stops to think and realizes something dire.\n        *line_break\n        \"You did not get bit by him did you!?\"\n        *if wolfbite > 0\n            You shamely lift your arm to show her your wound. She rushes to you with tears in her eyes to inspect it. She slowly unwraps the rag and checks with all angles at your wound. Without asking, she peels at part of the wound as you wince.\n            \n            \"It is not too deep… You should be safe. But you must be more careful! The power of a demon is greater than you can imagine. If even his very essence enters your soul, you will be trapped to the realms of Xibalba for all eternity. Definitely take this to consideration, you must be careful. If you are bitten too many times, you may never be free of this place.\"\n            *goto convo\n        *else\n            You shake your head in response. \n            \n            \"Thank heavens! You must be very careful! The power of a demon is greater than you can imagine. If even his very essence enters your soul, you will be trapped to the realms of Xibalba for all eternity. Definitely take this to consideration, you must be careful. If you are bitten too many times, you may not be free of this place.\"\n            *goto convo\n        \n    #Nothing Else\n        You ask her all you could. She opens a small bottle and adds a red liquid to the bowl of herbs she has been grinding.\n        *goto nothing\n\n\n*label nothing\n*if gender = \"male\"\n    \"This last part is for me to confess…\n    \n    My plans were weak. As the shaman for Shonnra I thought I could simply tell him to accept the deal. We'd open the door and I'd enter behind him. The demons would destroy the invaders and I could find Shonnra after all has ended and help him escape. Afterwards we'd close the door behind us…\n    \n    But during their onslaught, the invaders managed to kill the god of death. They had weapons we have never seen the likes of… In anger Vuculpes told the demons to attack any soul they could find.\n    \n    Because he blamed Shonnra for making this deal, Vuculpes vexed his soul to not only feel the pains and terror of his own death, but of the deaths of everyone. Shonnra would enter as one soul but see and feel the horrors of many.\"\n    *page_break\n    Tears begin to flow endlessly down her cheek.\n    \n    \"I let this happen. Because of me Shonnra is trapped and I along with him. I starved and perished within Xibalba. Afterwards, it took me years to figure out all I had lost within my own mind. And now I will stay to help Shonnra. It has been over three thousand years, and if it takes another thousand than so be it.\"\n    \n    The creaky wooden floors splash with her tears as she looks back up at you. Severe desperation in her voice.\n    \n    \"Do you remember now? Or must I say this all again tomorrow!?\"\n    *goto moveon\n    \n*else\n    \"This last part is for me to confess…\n    \n    My plans were weak. As the shaman for Shonnra I thought I could simply tell her to accept the deal. We'd open the door and I'd enter behind her. The demons would destroy the invaders and I could find Shonnra after all has ended and help her escape. Afterwards we'd close the door behind us…\n    \n    But during their onslaught, the invaders managed to kill the god of death. They had weapons we have never seen the likes of… In anger Vuculpes told the demons to attack any soul they could find.\n    \n    Because he blamed Shonnra for making this deal, Vuculpes vexed her soul to not only feel the pains and terror of her own death, but of the deaths of everyone. Shonnra would enter as one soul but see and feel the horrors of many.\"\n    *page_break\n    Tears begin to flow endlessly down her cheek.\n    \n    \"I let this happen. Because of me Shonnra is trapped and I along with her. I starved and perished within Xibalba. Afterwards, it took me years to figure out all I had lost within my own mind. And now I will stay to help Shonnra. It has been over three thousand years, and if it takes another thousand than so be it.\"\n    \n    The creaky wooden floors splash with her tears as she looks back up at you. Severe desperation in her voice.\n    \n    \"Do you remember now? Or must I say this all again tomorrow!?\"\n    *goto moveon\n\n\n\n*label moveon\nYou stand before her…\n*choice\n    #I am a demon?\n        She glares at me but does not answer… You must figure it out…\n        *goto moveon\n    \n    #I am one of the kids from earlier?\n        She sighs but does not answer… You must figure it out…\n        *goto moveon\n    \n    #I am a Mayan?\n        She looks up at you hopeful. You think perhaps you are right, but she does not answer you…\n        *goto moveon\n    \n    #I am Shonnra?\n        *goto shonnra\n    \n    #I am one of the villagers?\n        She looks up at with concern but does not answer… You must figure it out…\n        *goto moveon\n        \n        \n*label shonnra\n\"YES! YES!!\" She reassures you with happiness in her eyes. Quickly they turn to hope. She holds up her concoction she was mixing from earlier.\n\n\"Drink this. I have been working on something for awhile now.\" You take the bowl and look down at the green mixture, chunks of something floating around within it.\n\n*label potion\n*choice\n    #Drink it\n        *set potion +1\n        *set wolfbite +1\n        There is so much to process for you. You slowly lift the bowl to your lips and drink. It is definitely vile, but you hope it helps.\n        \n        \"You do not know how happy I am.\" Her tone goes from that of excitement to one of concern once again. \"But this does not mean I can let go of reality.\"\n        \n        \"You have been here before and I have given this potion to you… Before…\n        \n        But I have faith. Beyond here is a temple, your home. You must make it through to the other side. On that side will be everything you remember… And I will be there.\"\n        *goto shonnracont\n    #Pretend to drink it\n        *set potion +1\n        *set wolfbite +1\n        You lift the bowl and pretend to drink it. You try to let it not even touch your lips.\n        \n        This does not fool her though, and she scoffs at you. She quickly steps forward and tilts it more. It splashes onto your face. You try to keep your lips closed but can feel as it seeps into your eyes and enters your nose.\n        \n        The bowl drops and shatters as you cough. She turns to scold you.\n        \n        \"This was not the first time you have been here, but the first time you chose to deceive me….\n        \n        But I have faith… Beyond here is your home, the temple. On the other side will be everything you remember. And I will be there.\"\n        *goto shonnracont\n    *hide_reuse #Give back\n        *set progress +1\n        You try to hand the bowl back to her. You tell her you will be fine without it. She seems upset and tries to reassure you.\n        \n        \"This was not the first time you have been here, but the first you choose not to drink. Do not worry, it tastes fine.\"\n        *goto potion\n    *if progress > 0\n        #Give it back again\n             You set the bowl down on the table. She seems disappointed.\n             \n             \"Fine, whatever. I guess I'll just see you back and repeat everything again. What's eternity within hell if its not for this.\" She storms to the door. You ponder if you should take the potion she says may help.\n             \n             *choice\n                 #Take it\n                     *set potion +1\n                     *set wolfbite +1\n                     Before you follow her, you take the bowl and chug its contents. You heap over and spit some of it out. It is vile tasting, unlike what she had said. You see a smile cross her lips.\n                     \n                     \"I have faith. Beyond here is your home, the temple. On the other side will be everything you remember. And I will be there.\"\n                     *goto shonnracont\n                 #Leave it\n                     \"Beyond here is your home, the temple.\" She says to you. \"On the other side will b everything you remember. And I will be there.\"\n                     *goto leftit\n        \n\n\n*label shonnracont\n\n*page_break\n*check_achievements\n*if not (choice_achieved_potion)\n    *achieve potion\nShe walks you to the door of the cabin. You hold yourself against the edge of the wall, your head and stomach feeling funny.\n\n\"The side effects will subside. Remember, do not pay attention to the fear Vuculpes tries to create. You are strong and so close. Do not let him or any demon bite you. On the other side I will be waiting for you.\"\n\nBehind you she closes the door. You turn back to see the hut partially decayed. The smoke no longer rising from it. From the window you can see it is empty and filled with dust. \n*page_break\n\nAs you turn to leave for the temple you notice one more thing. Your internal direction has become muddled. You had thought the sun was rising but look to see that it is, in fact, setting once again.\n\nYou uneasily set foot towards the temple that lays beyond.\n*page_break\n\n*goto_scene chapter6\n\n*label leftit\n\n*page_break\n*check_achievements\n*if not (choice_achieved_nopotion)\n    *achieve nopotion\nShe walks you to the door of the cabin.\n\n\"Remember, do not pay attention to the fear Vuculpes tries to create. You are strong and so close. Do not let him or any demon bite you. On the other side I will be waiting for you.\"\n\nBehind you she closes the door. You turn back to see the hut partially decayed. The smoke no longer rising from it. From the window you can see it is empty and filled with dust. \n*page_break\n\nAs you turn to leave for the temple you notice one more thing. Your internal direction has become muddled. You had thought the sun was rising but look to see that it is, in fact, setting once again.\n\nYou uneasily set foot towards the temple that lays beyond.\n*page_break\n\n*goto_scene chapter6\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "chapter6": "*set action 12\n*set op 0\n*set op2 0\n*set percept 0\n*set progress 0\n*set inventory 0\n\n\nChapter 6\n*line_break\n- TEMPLE -\n\n*image temple.png\n\n*if hint > 2\n    -HINT-\n    \n    A key found later opens the door before. A sword beyond must be taken and cleansed then foe faced again in a hall of light.\n    *page_break\n\n\n*label templea\nYou stand before a large temple, taking in the massive scope of its construction. The largest trees next to it cannot even match it's height. You take a few moments to breathe and collect yourself before heading inside and taking on anything that may lay within.\n*page_break\n\n\nYou stand at the entrance of a massive hall before you. To your left stands a grand staircase with steps on two ends. A hallway at the top leads somewhere beyond. The temples appearance on the inside does not seem to match its decaying presence on the exterior. It feels as if the place almost glows.\n\n*label temple\n*if action \u003c 1\n    *page_break\n    *goto beast\n   \nWhile impressive, this place still gives off a feeling of unease. You can't seem to place it.\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        *set percept +1\n        The temple seems massive and all made of stone. The walls are barely faded but you can still see the remains of decorated paintings with almost every color. Depictions of great warriors and gods all within a forest.\n        \n        Below the dual staircase and the corridor is another hallway leading somewhere else. You can see at the end a smaller wooden door. Two standing torches line either side with flames lit upon them.\n        \n        Before you is a grand arch with another room beyond. To your right is two large wooden doors both curving at the top towards each other. Massive, metal loops hang from each door as handles.\n        \n        *goto temple\n\n    #Inventory\n        *set action -1\n        *if inventory > 0\n            You go to read the parchment you had grabbed from the library.\n            \n            'She asked that I best not tell, but a beast roams the grounds beyond the temple. She will not say if it be part demon or other worldly. Tales say of a lord's sword once cleansed may ward a demon soul aside. Will it work on him?? \n            \n            All I need do is find a way into the Grand Hall where our majesty's sword lay and cleanse within the pool beyond the arch? I don't know if I can even muster the courage to leave the library though.\n            \n            Can you hear them? Beyond the walls… The demons scream in joy …'\n            \n            You put the parchment away.\n            \n            *goto temple\n            \n        *else\n            You have not picked up anything since entering the temple.\n            \n        *goto temple\n        \n    *disable_reuse #Self Check\n        *set action -1\n        *if gender = \"male\"\n            You glance down at your arms. You were a King once.. You can barely believe it. Has it… Has it truly been three thousand years? You can barely even comprehend it. You feel as if you had just arrived to the forest a fortnite ago.\n            \n            *goto temple\n        *else\n            You glance down at your arms. You were a Queen once.. You can barely believe it. Has it… Has it truly been three thousand years? You can barely even comprehend it. You feel as if you had just arrived to the forest a fortnite ago.\n            \n            *goto temple\n    #Wait\n        *set action -3\n        You decide to lean up against a wall and wait. You take this time to glance around and see if you had missed anything. You don't think this room has anything of note.\n        \n        *goto temple\n    \n    #Head Upstairs\n        *set action -2\n        You head up the staircase.\n        \n        *goto stairs\n        \n    *if percept > 0\n        #Head left down the hallway\n            *set action -2\n            You head down the hallway to your left.\n            \n            *goto hallway\n        \n    *if percept > 0\n        #Head straight through the archway\n            *set action -2\n            You head through the archway.\n            \n            *goto archway\n            \n    *if percept > 0\n        #Head right through the doors\n            *set action -2\n            You step up to the large wooden doors and pull on the metal loop. The door does not seem to budge so you yank a bit harder. Again it remains immobile.\n            \n            It seems to be locked.\n            \n            *goto temple\n\n\n*label stairs\nAs you go down a hallway and through a decent entry-way, you enter a large room. The ceiling has caved away and moonlight enters through. Vines hang and sway off the ceiling and into the room below. So much debris litters the floor but nearby you see a row of stone pillars with torches on them.\n\n*label stairs1\n*if action \u003c 1\n    *page_break\n    *goto beast\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        You take a moment to look around more before entering farther. What looks to be tons of papers and parchment fragment the pile of stone and debris in the center. As you approach them you notice water is trickling from the roof and turning the majority of the papers to mush.\n        \n        By the pillar and torch you see a couple stone shelves and what looks to be more scrolls and texts upon them.\n        *goto stairs1\n        \n    *disable_reuse #Call out\n        *set action -1\n        It's helped before, so you decide to call out to the room. At first you hear nothing until an audible grown calls back followed by a sudden smash or bang.\n        \n        You jump in the direction as stones crumble and fall from the pile. A sprinkle of dust showers from the ceiling. You see nothing but rubble in the direction and within mere seconds all is quiet again…\n        *goto stairs1\n        \n    *disable_reuse #Approach pillars\n        *set action -1\n        *set inventory +1\n        *set parchment +1\n        You step up to the few shelves left standing and take a scroll from the pile. As you go to open it though, it tears and crumbles beneath your finger tips!\n        \n        You carefully reach for the next parchment as you hear a distorted grown nearby. You decide to grab it and leave the room. Best to read it elsewhere.\n        *goto stairs1\n    \n    #Head Back\n        *set action -1\n        You head back for the front hall.\n        \n        *goto temple\n\n*label hallway\nYou pass through a normal doorway into a decently sized area. Tables and chairs line from one end to the other. \n\n*label hall1\n*if action \u003c 1\n    *page_break\n    *goto beast\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        *set op +1\n        You notice beside the door is a lit torch. It helps to illuminate most of the room. The majority of the tables stand sound and strong. Barely warped or whithered. You think this must have been a dining hall of some sort.\n        *goto hall1\n        \n    *if op > 0\n        *disable_reuse #Grab Torch\n            *set action -1\n            You go to grab the torch by the door. The second you pull it from the wall, you get a strange flash in your vision. It almo
