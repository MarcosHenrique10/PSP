st seems as if you feel a tangible wave of heat strike your skin. It isn't too warm and more pleasant. Constant chatter echoes in your ears. You turn to the tables to see flickers of transparent figures sitting at the tables and cheering.\n            \n            But then they abruptly stand and scramble. Commotion erupts and the figures rush towards you and the door. You lift your hands to try and stop them. The second they touch your very skin you are back in your senses, the torch nonexistent and the room all but full.\n            *goto hall1\n            \n    #Head Back\n        *set action -1\n        With nothing truly here to find, you head back for the main hall.\n        \n        *goto temple\n\n*label archway\nYou stand in a room slightly smaller than the one before. Bordered and gold plated stones line the edges. Aside from the colored walls and paintings, the room is basically bare. All except for a round pool within the center.\n\n*label arch\n*if action \u003c 1\n    *page_break\n    *goto beast\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        *set op2 +1\n        The pool is surrounded like that of a well. The walls come up a few feet and at the top sit more gold stones encircling the contents within. You hear a faint sound of a single drop of water falling into the pool, resonating a soft echo throughout the still room.\n        \n        There is only one way in and out of this room.\n        *goto arch\n    \n    *if op2 > 0\n        *disable_reuse #Touch Pool\n            *set action -1\n            *if gender = \"male\"\n                You walk up to the pool and look within. It's pure pellucid nature shows your reflection clearly. You appear grim, well beaten and exhausted. Your complexion is dark and well worn with scars of battle. You have life within your eyes. You see stories unfold before you that you have since forgotten. A life of purpose, comfort, happiness and control. As a King standing before you and as a King you shall leave.\n                \n                You reach down to touch the water. The ripples reverberate from your soft touch. You can feel the cool crisp wrap around your wrist like a persons touch. You withdraw your hand and look at it. You can't quite place it but you feel this pool has some sort of mystical property to it.\n                *goto arch\n                \n            *else\n                You walk up to the pool and look within. It's pure pellucid nature shows your reflection clearly. You appear grim, well beaten and exhausted. Your complexion is dark and well worn with scars of battle. You have life within your eyes. You see stories unfold before you that you have since forgotten. A life of purpose, comfort, happiness and control. As a Queen standing before you and as a Queen you shall leave.\n                \n                You reach down to touch the water. The ripples reverberate from your soft touch. You can feel the cool crisp wrap around your wrist like a persons touch. You withdraw your hand and look at it. You can't quite place it but you feel this pool has some sort of mystical property to it.\n                *goto arch\n                \n            \n    #Head Back\n        *set action -1\n        You head back for the main hall.\n        \n        *goto temple\n\n\n*label beast\n*set op 0\n*set op2 0\n*set percept 0\n*set progress 0\n*set inventory 0\n*set sword 0\n\n*comment instead of death this time you will run successfully but as you leave you enter another temple and its the same temple, look back to only forest.\n*comment ch6cont will have beast1, beast2, progress scene.\n\nAs you walk through the temple of old, you hear bellowing in the distance. Soon after you can feel the ground shake as dust falls from the stones above. You take a step back as you see a beast round the corner.\n\nThe beast stands on it's hind legs almost the size of the entire hallway. The body is deformed with characteristics from some animals you recognize but also from beasts you have never seen. Giant horns protrude from either side of its thick bull-like skull. Arms dangle from the body and hang down to the floor with claws, each the size of a single human arm. They drag and scrape as the beast walks.\n\nOoze drips from its teeth as it slams the ground beneath it with giant hooves. The stone below cracks and dents as the whole temple trembles with each step it takes.\n*page_break\nYou turn and start to run. The beast wails as it gives chase. It's thick tail behind it thwacking from one wall to the other with loud bangs like a tree trunk being smashed against a wall.\n\nYou are panting heavily as each step slams the ground faster and faster. You turn to see the beast claiming distance on you. You turn a corner of the hall and keep running.\n\n*page_break\nThe beast behind you slams into the wall. The temple begins to shake freely from the beasts footsteps as the walls cease to stand and collapse around you. Large stones fall around onto the beast as it powers through the blast, still charging you.\n\nYou see an opening up ahead with an archway smaller than the hall. Beyond it is the light of the moon and the sight of the forest. You run for it, dodging falling stone the entire way. The beast is now so close it yowls as it swipes at you. \n\nA stringing gash in your leg sends shocks throughout your body as you leap through the entry way. \n\nThe momentum sends you rolling across the ground as the beast slams into the arch. The entryway caves to the beast but at the cost of it falling to the ground. As it goes to rise and swipe at you again, the entire temple collapses onto it.\n*page_break\nYou stand to brush yourself off as the temples rocks and stone roll up to your feet, coming to rest only a few inches from you. You were close to being smashed to pieces.\n\nA peculiar feeling envelops you as you turn around. It is not the forest you expected to see but yet another temple in a state of ruin. Parts of the walls and roof have caved or are deeply scorched with fire. \n\nWith no where else to go… You have to head inside.\n*page_break\n*goto_scene ch6continue\n\n\n\n\n\n", "chapter7": "*set op 0\n*set op2 0\n*set percept 0\n*set progress 0\n*set inventory 0\n\n\n\n*comment have straight section of tree pathway. Every time wolf demon shows up ahead of you, you must turn back and it sets as new section. 3rd time the wolf will be facing away from you and that is when you approach. player can only get 'wolfbite' officially once in this area so that it doesn't stack unfairly\n\n\nChapter 7\n*line_break\n- PATH -\n\n*image forest_DarkWorkX.png\n*if hint > 0\n    You must find the deadend. That is when the path behind you will change.\n    *page_break\n\nTo your left stands a wide river gently flowing South. The thick trees surround you and a narrow path ahead seems to be your only way.\n\n*label start\n*choice\n    *disable_reuse #Percept\n        You look around to make sense of things. The river seems oddly calm and it makes you nervous in this place. The path ahead seems to be the only way. It is wider than most of the paths you've taken so far and it looks to go straight for a bit. It is only due to the fog that you cannot see much farther.\n        \n        *goto start\n        \n    *disable_reuse #Inventory\n        You hold the sword up next to you. It feels different to finally have something to protect yourself with. You hope it maintains the power the pool gave it.\n        \n        *goto start\n    \n    *disable_reuse #Self Check\n        *set op +1\n        *comment make player think about shaman. perhaps they can free themselves despite what she said. it is still cleansed right?\n        You can't help but think back to the shaman… Your friend.\n        \n        If… If it truly wasn't her that you first talked to then… Is everything they said lies as well or were some of them true?\n        \n        What if it was actually your friend and the vision        *goto around\n        \n\n*label around\n\nAs you slowly turn around you see no one is there but the path had changed. It leads to a large opening with a lake in the center. You step cautiously up to it as you can see ahead the skies are changing colors. Again you get the sense the sun is rising, although you don't trust it this time.\n\n*page_break\n*goto_scene end\n\n\n\n\n\n", "choicescript_description": "Find your way through the haunting forests in this puzzle narrative. Is this nightmare or reality? The trees trap all who enter. You must discover what it takes to truly be free.\n\nTrees Don’t Tell is a spooky, interactive novella by Taylor Zane, where your choices help you find your way through the story. It’s mostly text-based—without graphics or sound effects — and fueled by the vast, unstoppable power of your imagination.\nFolk tales have spread about the forests of Shonnra Morr. Tales of were beasts, ghosts and demons. The trees are a hotspot for paranormal encouraging all who are curious. Teens go to explore but few dare to enter. Of the few that do, none have returned.\n\n• Choose to play as a male or female.[n/]\n• Unique action loop counter that really defines the insanity of the forest.[n/]\n• Every choice you make is on you. Which way do you go? Which item do you investigate? Some lead to answers, some lead to death.[n/]\n• Entire items, rooms and even characters can be left undiscovered for multiple playthroughs.[n/]\n• Uncover the history kept secret by the forest.[n/]\n• A beast stalks you amongst the shadows. Escape his grasp or be devoured.[n/]\n• Unveil the reality of your worst nightmare. [n/]\n", "choicescript_stats": "Death Counter:\n\nYou have died ${death} times.\n\n\n*line_break\n\n\n\n*label items\nItems found:\n\n*if journal1 > 0\n    -First journal entry.\n    *line_break\n*if journal2 > 0\n    -Second journal entry.\n    *line_break\n*if photo > 0\n    -A photo of teenagers outside the forest.\n    *line_break\n*if camera > 0\n    -Video of teenagers entering the forest.\n    *line_break\n*if necklace > 0\n    -A thin necklace chain.\n    *line_break\n*if pendant > 0\n    -A small wolf pendant.\n    *line_break\n*if tablet > 0\n    -First tablet depiction.\n    *line_break\n*if tablet2 > 0\n    -Second tablet depiction.\n    *line_break\n*if matches > 0\n    -A near empty box of matches.\n    *line_break\n*if key > 0\n    -A large metal key.\n    *line_break\n*if parchment > 0\n    -A worried note left in the temple library.\n    *line_break\n*if sword > 0\n    *if holysword > 0\n        -A sword now cleansed in holy waters.\n        *line_break\n        \n        No other items.\n        \n        *finish\n    \n    *else\n        -A sword from the Grand Hall.\n        \n        No other items.\n        \n        *finish\n       \n       \nNo other items.\n\n*finish\n    \n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n    [b]Chapters 4 through 7[/b]\n\n    Unlock chapters 4 through 7, including the thrilling conclusion!\n\n    *purchase_discount adfree 2020-07-09 $2.99 $1.99 start\n\n*if choice_purchased_everything\n    You're completely upgraded!\n\n*if choice_purchased_adfree\n    [b]Chapters 4 through 7[/b]\n\n    You've paid to unlock chapters 4 through 7.\n", "death": "You have died.\n\n*goto_scene ending", "end": "*comment end scene vuculpes stabs player, but they fall into the bridge where they slowly die. If they are corrupt the pool turns red and they are sucked deeper into the realms of hell, otherwise they are free\n*comment wolfbite > 1\n\n\n*image lake_jplenio.png\n*page_break\n\n*choice\n    #Percept\n        *goto start\n    \n    \n*label start\n*if death > 19\n    *check_achievements\n    *if not (choice_achieved_died)\n        *achieve died\n    \n    \n    \n    \n    \nYou step closer and gaze around. The open air feels so nice and you can finally feel the air sweep across the lake. It isn't as cold as the stale air within the forest.\n\nAs you look down into the water you can see your reflection from within.\n\nIs this it? Where is the bridge?\n\nYou hear someone approaching from behind you.\n*page_break\nYou turn to see the wolf demon smiling down at you. His pace is slow and unnerving. You take a few steps back as you retreat into the water. The coldness stings through your clothes.\n\nYou don't know what you did wrong. She said the bridge was beyond the temple. But where is it!?\n\nYou stumble in the water as Vuculpes steps up to you swiftly. He grasps his right paw around your throat.\n*page_break\nYou begin to feel your feet tingling. At first you thought it was from the cold but then you notice the edge of the water begins to glow.\n\nThe lake… Is this the bridge?\n\nVuculpes sneers as he notices your gaze at the lake. He begins to drag you away from the water so you cannot enter.\n\n*choice\n    #Struggle Free\n        *goto finish\n\n\n*label finish\n\"You are wasting your time. You have been here for millenniums and you will be here for more!\" His grasp tightens as you can barely breathe.\n\n*choice\n    #Continue to Struggle\n        *goto finish2\n\n\n*label finish2\nYou fight his grasp as you manage to halt his movement entirely. He pulls at your throat near the waters edge. You kick at his legs as the water splashes across his fur and robes. \n\n*if sword > 0\n    With your sword still by your side, you slash vigorously at him. Some of the cuts barely grazing him. Vuculpes raises his claws to strike you.\n    \n    *choice\n        #Kill Him\n            Just as you shove your sword from below, the demon's claws pierce into your chest. Instantly you can feel his grasp across your heart. You wait for him to crush it entirely then and there but you realize his movements have been halted.\n            \n            From your grasp on the sword, it sticks straight into his jaw. It extends entirely up through his head and erupts out his skull. You glare into his eyes as you see the existence from within fade from view. Your heart barely pulsing against his vile hand.\n            *page_break\n            *goto kill\n\n\nVuculpes raises his claws to strike you. You try to shield yourself with your arms to no avail as he smashes his claws through your arms and into your chest. Instantly you can feel his grasp across your heart.\n\nA wide smile crosses his evil face as he licks his lips. He pulls your heart from within and devours it in front of you. You fall backward into the lake, your mind still able to race through thoughts for only a second longer. The water wraps around your body as everything starts to fade.\n\n\"See you on the other side.\" He growls as blood drips from his chin. He stands over you confidently.\n*page_break\n\n*if wolfbite > 1\n    *goto bad\n\n\n*goto good\n\n*label kill\n*check_achievements\n*if not (choice_achieved_kill)\n    *achieve kill\nYou both collapse into the water as pain surges around you. The water stings incredibly as it enters your wound and drowns you from the inside. The wolf's lifeless body fades to a thick ash in the lake as it dissipates away from you.\n\nThe water begins to grow brighter and brighter as you try to rise to your feet. You clutch your hands across your chest as you try to stay awake. You are barely able to move as you fall back to your knees.\n\n\n\n*if wolfbite > 1\n    *goto badno\n\n*goto goodno\n\n\n\n\n*label good\n*set death +1\n*page_break\nYour vision is replaced with a bright tone of blue. The wound within your chest sends a strange yet soothing warmth through your body as it mends. You go to open your eyes you expect to be within the forest, but you are met with the blurry vision of being under water.\n\nYou expect to be drowning but are unable to feel the convulsing of your lungs. The pain from your chest is no more as you can see the face of Vuculpes looking down in anger and surprise.\n\nYou watch as the blue hues wisp and warp in the water around you. Slowly you can feel your body lifting as you rise from the water, above Vuculpes even, and continue ascension.\n\nHe stands back from the water, growling. For awhile you are confused as you look around bewildered. This… Did you make it? Does this mean…\n\nWith a bright flash everything is blasted away and you can feel your body flung upwards. Flashes of lights stream by you as feel you are flowing through realms. \n*page_break\n\n*image dalat_Quangpraha.png\n*check_achievements\n*if not (choice_achieved_escape)\n    *achieve escape\nYou see the world before you change. Your soul has managed to escape the realms of hell. \n*page_break\nYou died a total of ${death} times. \n\n*goto_scene ending\n\n*label bad\n*set death +1\n*page_break\nYour vision is replaced with a dark tone of red. You feel as though the hole in your chest is filled with needles. You keep awaiting death but it does not come. You awake in horror as you are still drowning under water, your body heartless and oozing blood. \n\nAbove, you can see Vuculpes grinning from ear to ear. He has done it. He has managed to claim his prize. \n\nHot, boiling chains wrap around your wrists and legs. You struggle but to no avail as you are pulled deeper into the water. Your skin begins to bubble as you gasp for air. The steaming water enters your lungs and burns you from within.\n\n*page_break\n*image lakered_jplenio.png\n*check_achievements\n*if not (choice_achieved_trapped)\n    *achieve trapped\nYou are pulled deeper into the realms of hell. Your soul was tainted with the blood of demons.\n*page_break\nYou died a total of ${death} times. \n\n*goto_scene ending\n\n\n\n*label goodno\n*set death +1\n*page_break\nYour vision is replaced with a bright tone of blue. The wound within your chest sends a strange yet soothing warmth through your body as it mends. You go to open your eyes you expect to be within the forest, but you kneel still in the water.\n\nYou watch as the blue hues wisp and warp in the water around you. Slowly you can feel your body lifting as you rise from the water above the trees as you continue rising.\n\nThis… Did you make it? Does this mean…\n\nWith a bright flash everything is blasted away and you can feel your body flung upwards. Flashes of lights stream by you as feel you are flowing through realms. \n*page_break\n\n*image dalat_Quangpraha.png\n*check_achievements\n*if not (choice_achieved_escape)\n    *achieve escape\nYou see the world before you change. You were able to kill Vuculpes and your soul has managed to escape the realms of hell. \n*page_break\nYou died a total of ${death} times. \n\n\n*goto_scene ending\n\n*label badno\n*set death +1\n*page_break\nYour vision is replaced with a dark tone of red. You feel as though the hole in your chest is filled with needles. You keep awaiting death but it does not come. You awake in horror as you are still within the water, your body heartless and oozing blood. \n\nYou can see a pool of ashen red surrounding you.\n\nHot, boiling chains splash up from the ground and wrap around your wrists and legs. You struggle but to no avail as you are pulled deeper under water. Your skin begins to bubble as you gasp for air. The steaming water enters your lungs and burns you from within.\n\n*page_break\n*image lakered_jplenio.png\n*check_achievements\n*if not (choice_achieved_trapped)\n    *achieve trapped\nYou managed to kill Vuculpes but you are pulled deeper into the realms of hell. Your soul was tainted with the blood of demons.\n*page_break\nYou died a total of ${death} times. \n\n*goto_scene ending\n\n\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Trees Don/t Tell.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "prologue": "\n*label prologue\n\n*image forest1.png\nYou weakly open your eyes to see a dark sky above you. Immediately you feel your head pounding as you sit up.\n\nIt takes a second before you realize you're alone and freezing. The sky above the forest canopy is just as black as the leaves under them, blending together in a painting of dark night.\n\nYou glance down at your hands and then yourself. You're a…\n*choice\n    #Female\n        *set gender \"female\"\n        *goto intro\n    #Male\n        *set gender \"male\"\n        *goto intro\n    \n*label intro\n\n\nYou look back to your environment..\n\nThe only thing to stand out amongst the thick forest trees surrounding you, is a small shack-like cabin only a few yards off. The cold chill of night begins to seep beneath your skin and against your bones.\n\n*label first\n*choice\n    *disable_reuse #Percept\n        You glance through the trees trying to make out any other useful information. With the air chilling your bones you immediately become distracted. \n        \n        The cabin next to you stands partly slanted, worn with age. The door hangs partly ajar with only one window on the side. It doesn't look big enough to house even a small family.\n        \n        *choice\n            #Search forest\n                You decide to bare the cold and search more. You ignore the undelighted sight of the cabin and venture farther in.\n                \n                With each step you feel your fingers and toes freezing more. Your bones ache. You can't think straight.\n                *page_break\n                \n                You search for anything. Anyone.\n                \n                Nothing is out here.\n                *choice\n                    #Search more\n                        Despite your best instincts you continue to search. Illfully you are not in luck and the cold seeps into your bones. Every step you make takes a few seconds longer then the next.\n                        *page_break\n                        You collapse as your breathing slows. The cold air freezes your lungs as one last breath escapes you.\n                        *goto clearing\n                    #Head back\n                        You decide to head back to the cabin and thankfully find your way.\n                        *goto cabin\n            #Enter cabin\n                *label cabin\n                You creep through the entrance and hastily look around. No one is inside. You close the door behind you with a creak.\n                \n                The air around you is freezing. The small fireplace at the other end of the room looks inviting.\n                *choice\n                    #Light fire\n                        You throw the last bit of logs left into the fireplace and eagerly look around for matches.\n                        *choice\n                            #Inventory\n                                You check your pockets. Thankfully you pull out a box of matches you had preemptively brought with you.\n                                \n                                You hastily light the match and throw one in… Just to watch it burn out. You strike another, throwing in a few extra to light the fire.\n                                \n                                You give a sigh of relief as you reach your hands out to warm yourself. Although the cabin is uncomfortably small, it'll heat up quick.\n                                \n                                *goto fire\n                             \n                            #Percept\n                                You check around for a lighter. Thankfully you see a small box of matches on a table. You quickly snatch them up and hastily light a match and throw it in…. Just to watch it burn out. You strike another, throwing in a few extra to light the fire.\n                                \n                                You give a sigh of relief as you reach your hands out to warm yourself. Although the cabin is uncomfortable small, it'll heat up quick.\n                                \n                                *goto fire\n                            \n                        \n                        \n                \n             \n        \n    *disable_reuse #Call out\n        You call out to the cold night. Hoping for any kind of reply. Not even the caws of a bird or wild animal comes your way.\n        \n        The night seems quiet…\n        \n        *goto first\n\n\n*label fire\n*page_break\n\nThe light from the fire covers your skin like a warm blanket and illuminates the room. You notice the only window outside as it is now pitch black, the inside light making it impossible to see out now.\n\nAfter awhile you finally sit back and take a breath to relax. You're comfortable as comfortable can be in a situation like this.\n\n*label second\n*choice\n    *disable_reuse #Percept\n        *set op +1\n        You glance around the room. A table crooked against a corner to your right. To your left a small metal frame bed sits with stained blankets and a smashed pillow, also heavily stained in hues of brown.\n        \n        The window beside the bed sits within a wooden sill that is aged from leaking water. Its boards cracked and splintered. Cold air seeps through it. Beyond it the empty void watches you. \n        \n        For a brief moment, you don't think you're alone.\n        \n        *if op =2\n            *set op 0\n            \n            *choice\n                #Check window\n                    You shutter as you glance at the window. Its emptiness stares back at you. You think you see movement as you walk up to it.\n                    \n                    The dark night calls to you as big red eyes open inches from the glass. A howl pierces the night as a claw erupts through the glass and pierces your chest before you can even react.\n                    \n                    You glance down in fright. Filthy brown fur sticks into your flesh. You can feel the claws move through your organs as your entire body feels cold and wet.\n                    *page_break\n                    Your vision darkens and the only thing you feel is the pain in your chest.\n                    *goto clearing\n                    \n                    \n                #Check picture\n                    *set picture +1\n                    *set photo +1\n                    *check_achievements\n                    *if not (choice_achieved_picture)\n                        *achieve picture\n                    You decide to glance at the picture and study it. Three people sit happily next to each other. A forest sits upon the background. A girl taking the picture looks exhausted yet happy. Her hair is long blonde and behind her a couple holds each other. The guy has a camera in one hand and his girlfriend around his other arm. They're both darker toned of hair and skin. They look happy together.\n                    *page_break\n                    \n                    As you continue to observe, you hear the creek of the door. You try to turn around but your body feels stiff and you can't seem to move. You aren't quite sure what comes first. Are you frozen with fear, or are you afraid because you're frozen?\n                    \n                    Shes behind your left ear.\n                    \n                    Whispering\n                    \n                    Gently…\n                    *page_break\n                    \n                    You can't make out what she says. Only her breath against your ear. A deep throaty chant as her hot breath creeps across the back of your neck to your other ear…\n                    \n                    A startling laugh erupts loudly in front of you and this you should be able to see, yet no one is there.\n                    \n                    Laughter emits the room and fills your ears. It gets louder…. and louder.\n                    \n                    Before you can even react, a sharp pain fills your chest as you look down. Claws stick out of your torso with blood covering them. Maggots crawl across your wound and eat into your skin and the claws of the attacker.\n                    *page_break\n                    The maggots crawl deeper…\n                    \n                    And deeper.\n                    *page_break\n                    Your vision darkens and the only thing you feel is the pain in your chest.\n                    *goto clearing\n            \n        \n        *goto second\n        \n        \n    *disable_reuse #Self check\n        You look down at your arms and legs. They hurt and ache all over. Scratches have torn your clothing and bits of fabric are stained with your blood. You are amazed you're still standing.\n        *goto second\n    \n    *disable_reuse #Inventory\n        *set op +1\n        You rummage through your pockets. Nothing else is in them besides a small picture. You have no bags and you start to wonder what started this. How did you get here??\n        \n        *if op = 2\n            *set op 0\n            *choice\n                #Check window\n                    You shutter as you glance at the window. Its emptiness stares back at you. You think you see movement as you walk up to it.\n                    \n                    The dark night calls to you as big red eyes open inches from the glass. A howl pierces the night as a claw erupts through the glass and pierces your chest before you can even react.\n                    \n                    You glance down in fright. Filthy brown fur sticks into your flesh. You can feel the claws move through your organs as your entire body feels cold and wet.\n                    *page_break\n                    Your vision darkens and the only thing you feel is the pain in your chest.\n                    *goto clearing\n                    \n                    \n                #Check picture\n                    *set picture +1\n                    *set picture \"Photo\"\n                    *check_achievements\n                    *if not (choice_achieved_picture)\n                        *achieve picture\n                    You decide to glance at the picture and study it. Three people sit happily next to each other. A forest sits upon the background. A girl taking the picture looks exhausted yet happy. Her hair is long blonde and behind her a couple holds each other. The guy has a camera in one hand and his girlfriend around his other arm. They're both darker toned of hair and skin. They look happy together.\n                    *page_break\n                    \n                    As you continue to observe, you hear the creek of the door. You try to turn around but your body feels stiff and you can't seem to move. You aren't quite sure what comes first. Are you frozen with fear, or are you afraid because you're frozen?\n                    \n                    She's behind your left ear.\n                    \n                    Whispering\n                    \n                    Gently…\n                    *page_break\n                    \n                    You can't make out what she says. Only her breath against your ear. She then starts whispering in your other ear. But you can feel her breath on both…\n                    \n                    You then hear a laugh in front of you and this you should be able to see, but no one is there.\n                    \n                    Laughter emits the room and fills your ears. It gets louder…. and louder.\n                    \n                    Before you can even react, a sharp pain fills your chest as you look down. Claws stick out of your torso with blood covering them. Maggots crawl across your wound and eat into your skin and the claws of the attacker.\n                    *page_break\n                    The maggots crawl deeper…\n                    \n                    And deeper.\n                    *page_break\n                    Your vision darkens and the only thing you feel is the pain in your chest.\n                    *goto clearing\n            \n      \n        *goto second\n        \n            \n           \n                   \n\n*label clearing\n*set death +1\nYou gasp awake. Your lungs hurt and your ears pierce with a sharp ringing. What just happened?\n*page_break\n\n\n*goto_scene chapter1\n\n                    \n", "screenshots": "*comment Screenshot example scene\n\n*comment On iPad, the stat screen is visible at all times, so we have to set stats to make choicescript_stats look realistic\n\n*comment NOTE mobile phones can typically only fit about 80 words on the screen at a time.\n\n*comment Good screenshots need to make sense out of context!\n*comment Make sure the *fake_choice is self-explanatory.\n\n*comment It's often difficult to find a self-explanatory moment\n*comment in the game, so we encourage you to tweak the text in\n*comment your screenshot scene to make it easier to understand.\n\n*comment These screenshots have a big impact on sales. It's worth a few minutes to make your game look awesome.\n\n\n*set pendant +1\n*set matches +1\n\nAfter awhile of rubbing your eyes, you finally get to your feet and look around. Your hands still shake.\n\nYou are in a small clearing with trees and vines almost completely surrounding you. Not much fills the strange space except a tree stump, some bushes and a fallen branch. A small piece of parchment lies by your feet. \n\nA soft light glows beyond the branch. There maybe more here if you look around.\n\n*fake_choice\n    #Pickup Parchment\n    #Investigate Stump\n    #Head West\n    #Head Back\n\n\n\n\n\nChapter 2\n*line_break\n- SHADOWS -\n\n*image chapter2.png\n\n-HINT-\n*line_break\nThe light will protect you.\n\nThe wind whistles across the top of the trees. The branches sway and creak with an eerie but rhythmic sound. Near the ground, where you lay, the air feels still. The weather can't break the dense forest.\n\n*page_break\n\n\n\n\n\n\n\n*set death +2\n*set pendant 0\n*set matches 0\n*set picture +1\n*set journal2 +1\n*set key +1\n\nYou awake to see a creature's snout at your face. Large sharp fangs with cold breath that protrudes from its maw as it gazes at you.\n\n\"We could do this for eternity, you and me. I often love these games.\" It speaks as it rolls it's head back and laughs maniacally. You try to come to your senses as your eyes examine for anything else.\n\nYou glance up past the silhouette of trees. It is only this creature amongst the shadows.\n\n*fake_choice\n    #\"What do you mean?\"\n    #\"Why do you torment me?\"\n    #Choose to not engage the creature\n\n\n\n\n\n\n\n\n*image demon.png\nYou try to talk to the figure but it remains unresponsive. You take a step back and watch in horror as the figure slowly raises it's head. Under the hood is a demon of bones and flaking meat.\n\nIt takes a step towards you as it twitches and screeches. Even with empty sockets for eyes, you can't help feel a penetrating gaze. You stumble back as it creeps forward.\n\n*fake_choice\n    #Fight it\n    #Run for your life\n\n\n\n\n\n\n\n\n*set death +7\n*set picture +0\n*set journal2 +0\n*set sword +1\n*set parchment +1\n\nYou step up to the large wooden doors. Without the metal loops you try to push on it instead. The doors do not budge.\n            \nYou notice rusted metal plates spanning both doors has been nailed across the center, preventing them from being accessed. Maybe in hopes of protecting what lays beyond?\n            \nEither way, even with a key, you don't think you'll be able to enter this way.\n\n*fake_choice\n    #Inventory\n    #Wait\n    #Head left down the hallway\n    #Head straight through the archway\n\n\n\n\n\n\n\n\n*page_break\n*image shadows1.png\nLoop Resets… \n*line_break\nTry Again?\n*page_break\n\n", "startup": "*title Trees Don't Tell\n\n*author Taylor Zane\n\n*scene_list\n    startup\n    prologue\n    chapter1\n    ch1continue\n    chapter2\n    chapter3\n    $ chapter4\n    $ chapter5\n    $ chapter6\n    $ ch6continue\n    $ ch6end\n    $ chapter7\n
