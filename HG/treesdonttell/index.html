<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trees Don't Tell — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>

        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "treesdonttell", "title": "Trees Don't Tell", "scenes": {"ch1continue": "*set action 10\n*set op 0\n*set op2 0\n*set percept 0\n*set journal 0\n*set progress 0\n\n\nChapter 1 \n*line_break\n- FOREST -\n\n*image forest2flip.png\n\n*label ch1continue\n*if hint > 0\n    -HINT-\n    \n    The note gives you a useful clue.\n    *page_break\n\n\nYou gasp awake, \n*line_break\nglancing around with confusion.\n*line_break\nDense trees surround you in every direction.\n\nThick vines sway and pulse as if they were living eels.\n\nThe branches shift and snap as they intertwine locking you within a zone at its own will.\n*page_break\n\nAfter awhile of rubbing your eyes, you finally get to your feet and look around. Your hands still shake.\n\nSomething feels… off. \n\nYou are in a small clearing with trees and vines almost completely surrounding you. Not much fills the strange clearing except a tree stump, some bushes and a fallen branch. There's a soft light glowing behind the branch.\n\nThere maybe more here if you look around.\n\n\n*label 1\n\nYou stand in the clearing. The air here has an eerie chill.\n*if action \u003c 1\n    *if progress > 0\n        *page_break\n        *goto shadows2\n    *else\n    *page_break\n    *goto shadows\n*choice\n    \n    \n    *if percept > 0\n        #Head West\n            *set action -2\n            You head through the opening.\n            *goto west\n        \n    *if op2 > 0\n        #Head North\n            *set progress +1\n            You head through the opening. It's only a small pathway before you're lead to another clearing. This one is far larger. The trees surrounding it are more thick and much larger. Many of them vary in height with branches reaching over the clearing. Many of the limbs have broken with age, but nothing lays in the clearing.\n            \n            The clearing itself is empty. As you walk into it you can see the sky above better than before. The moon's light is barely poking through as clouds smother it.\n            *page_break\n            *goto north\n            \n        \n    *if op > 0\n        *hide_reuse #Pickup parchment\n            *set journal2 +1\n            *set action -2\n            You walk to the stump and pick up the paper. You don't know who it belongs to but there's a small excerpt. \n            *page_break\n            'I can't tell whats going on. The— the trees and vines. Everything moves..\n                    \n            I don't know if I'm going crazy or-or… \n                    \n            What the hell..'\n            *page_break\n            You take the excerpt and fold it into your pocket.            \n            *goto 1\n        \n        \n        \n    *if op > 0\n        *disable_reuse #Percept fire\n            *set action -1\n            You kneel by the fire, it's warmth emitting deep comfort. You hold out your hands and for a moment you close your eyes to rest. But as you open them the fire is wisped out like a candle in the wind.\n        \n            You hover your hand over the embers… They are as cold as the ground beneath your feet…\n            *goto 1\n    *if percept > 0\n        *disable_reuse #Investigate stump\n            *set action - 1\n            You walk up to the stump. As you inch closer you notice behind the branch is a very, very small fire. It is giving off a small glow. The shadows hide behind the trees, dancing with the fire.\n        \n            The small parchment lays on the stump. There's no wind in this thick forest to blow it away.\n            *set op +1\n            *goto 1\n        \n    *if percept > 0\n        *disable_reuse #Investigate trees\n            *set action -1\n            *set op2 +1\n            They're just trees.\n            \n            However, something catches your eye. One tree is at least twice the size as the others. As you approach it you quickly notice two things. It has markings across it. Thick gashes scraped into the bark. Something bigger than a bear left those.. \n            \n            But also, on the other side of it there are no other trees. No vines or thick branches blocking your way. It must lead somewhere..\n            *goto 1\n        \n        \n    *disable_reuse #Percept\n        *set action -1\n        *set percept +1\n        You glance around. Nothing, no one, is around you. You get a moment of respite.\n        \n        On the stump you notice a small parchment. Beside it lies the thick, fallen branch. Dead pine needles litter the ground.\n        \n        Although the trees almost completely surround you, there is a small opening to your left. You see a small hue of red in the skies between them. You can only assume it is the sun setting, it must be due West.\n        \n        *goto 1\n    *disable_reuse #Call out\n        *set action -1\n        You try to shout for anyone. But the trees absorb your cries.\n        *goto 1\n    #Inventory\n        *set action -1\n        *if gender = \"male\"\n            You check through everything you own. You're carrying a medium sized pouch at your waist but other than that you don't have much.\n            *goto choice\n        *else\n        You check through everything you own. You're carrying a small gray backpack, one strap is torn completely off. Other than that you don't have much.\n        *goto choice\n        \n        *label choice\n        *choice\n            *if journal2 > 0\n                #Small journal excerpt. Read excerpt\n                    *set action -1\n                    You re-read the journal excerpt.\n                \n                    'I can't tell whats going on. The— the trees and vines. Everything moves..\n                    \n                    I don't know if I'm going crazy or-or… \n                    \n                    What the hell..'\n                    *goto 1\n                \n                \n            #Back\n                *goto 1\n            \n    *disable_reuse #Self check\n        *set action -1\n        *if gender = \"male\"\n            You start to think of everything that has happened to you. You were just at a cabin… weren't you? Or no… that's not it. You were just here? You tried to think beyond that and realized you couldn't. You have no recollection, not even who you were…\n            *line_break\n            \n            You glance down at yourself. You're a thin guy with a soft brown skin tone. Grime and dirt covers your hands. You reach up and touch your hair, its stiff and matted. Your shirt is torn and your jeans have a couple holes. Other than that, you can't quite tell.\n            *goto 1\n            \n\n\n        *else\n        You start to think of everything that has happened to you. You were just at a cabin… weren't you? Or no… that's not it. You were just here? You tried to think beyond that and realized you couldn't. You have no recollection, not even who you were…\n        \n        You glance down at yourself. You're a thin girl with a soft brown skin tone. Grime and dirt fills under your cracked finger nails. You reach up and touch your hair, its stiff and matted. Your shirt is torn and your jeans have a couple holes. Other than that, you can't quite tell.\n        *goto 1\n    #Wait\n        *set action -3\n        You decide to sit for a bit. You curl your knees to your chest to keep warm as you anxiously look around, glancing behind every minute or so.\n        \n        You can't seem to comprehend how much time ends up passing. Was it a minute or was it twenty? You feel weird as you stand to your feet.\n        *goto 1\n        \n        \n\n*label north\n\n*image clearing.png\n\nYou stand in the center of the clearing.\n\n*label north2\n*if action \u003c 1\n    *if progress > 0\n        *page_break\n        *goto shadows2\n    *else\n    *page_break\n    *goto shadows\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        You slowly spin around, observing what you can. The trees are as thick as the other clearing, if not more so. There's definitely no way you can sneak by these ones without getting stuck halfway through.\n        *goto north2\n    *disable_reuse #Call out\n        *set action -1\n        You call out, first towards the trees but then out to the open sky. You wait for awhile as you hold your breath even, hoping to hear a reply. But nothing happens.\n        *goto north2\n    *disable_reuse #Self check\n        *set action -1\n        You are the same as before. This clearing has no noticeable effect on you.\n        *goto north2\n    #Wait\n        *set action -2\n        You sit in the clearing, staring up at the night sky. It's practically pitch black. For a moment you try to think of something but lose process of thought almost instantly.\n        \n        You do not sit long, or perhaps too long. Can you even tell? Either makes no difference as you stand to your feet.\n        *goto north2\n    #Head back\n        *set action -2\n        With nothing else to do, you head back.\n        *goto 1\n    \n\n\n\n\n*label west\n*if action \u003c 1\n    *if progress > 0\n        *page_break\n        *goto shadows2\n    *else\n    *page_break\n    *goto shadows\n\nYou take the pathway west. The trees around you open up more as it leads directly into a wide river. \n    \n*label west2\n*if action \u003c 1\n    *if progress > 0\n        *page_break\n        *goto shadows2\n    *else\n    *page_break\n    *goto shadows\n\nYou stand at the waters edge.\n\n*choice            \n   \n    *disable_reuse #Percept\n        *set action -1\n        You take a moment to survey. The water is murky, stagnant and fowl. The ground beneath your feet has turned muddy, this part of the forest is swamp ridden.\n        \n        Near the waters edge are several stones. They're noticeably square and cut for some purpose although a lot of the edges have crumbled. By your side are a pair of old sneakers completely enveloped in vines and moss.\n        *goto west2\n        \n    *disable_reuse #Call out\n        *set action -1\n        You call out across the stale water. You hear a soft echo in return, but no one replies.\n        *goto west2\n        \n    #Head back\n        *set action -1\n        With little here, you decide to head back.\n        *goto 1\n    \n\n*comment need two shadows. 1st is reset. 2nd is if progress available\n*label shadows\n*set action 15\n*set op 0\n*set op2 0\n*set percept 0\n*set journal 0\n*set progress 0\n*set death +1\n\n*comment new death\n*if hint > 0\n    You turn towards a sudden snapping of twigs and branches beside you. A beast much larger than you and as black as the night itself lunges from the bushes. Before you can even react to its threatening presence, the beast crunches its massive jaw across your neck. The sharp fangs slicing into your skin like butter and crushing against your bones, killing you instantly.\n    \n    *page_break\n    *image shadows1.png\n    Loop Resets… \n    *line_break\n    Try Again?\n    *page_break\n    *goto_scene ch1continue\n\n\n*set hint +1\n\nThe trees sway and howl in the wind. Several crows caw frantically, the first real animals you've heard all night. You turn sharply towards the caws but cannot see a living soul anywhere. Animal nor otherwise. As you turn back to where you were facing, you realize everything had changed.\n\nYou are no longer where you once were. You slowly spin as your heart clumps into your stomach, overwhelmed with feelings of paranoia and anxiety. As you slowly walk amongst the jungle, nothing appears to contain what little familiarity you had just barely achieved.\n\nYou keep walking but every tree is the same as the one you just pass. You start to get disoriented.\n*page_break\nIs that tree… Where's the clearing… \n\nYou start to feel frantic as you can't find your way around.\n\nSuddenly…\n\n\n\nThe flock of crows immediately scatter and fly to the night. You freeze.\n\nBehind you you hear shifting in the trees. You glance around and see nothing. You can feel your heart beating.\n\nYou want to run but just as you turn you trip over thick roots of a tree. You try to scramble to your feet but the roots intertwine around your wrists and hold you tight.\n*page_break\nYou can barely turn your head to see dark shadows wrapping around a tree like a thick fog. \n\nIt slowly… Menacingly crawls up your leg. You can feel the air grow chill as if you stepped into a freezing lake. The shadows feel cold and also wet. Its thick moisture wraps slowly up your thigh and around your waist.\n*page_break\nIt begins to crawl farther up your leg past your waist and constricts tightly around your chest. Your skin begins to burn from the ice that was once your clothing.\n\nBefore long you're enveloped as it wraps around your face and you can no longer breathe. The shadows drown you in darkness.\n*page_break\n*image shadows1.png\nLoop Resets… \n*line_break\nTry Again?\n*page_break\n*goto_scene ch1continue\n\n\n*label shadows2\n*set hint 0\nThe trees start to sway and howl in the wind. Several crows caw frantically. You've seen this before.\n\n*page_break\nYou stand with your back against a tree. Your heart races as you see dark figures approaching.\n\n\"Stay back!\"\n\nYou scream and shout but hear course laughter in response. What are they? How many?\n\nOne..\n\nTwo…\n*page_break\nTwelve.\n\nThe figures step out from behind trees, slowly approaching you. They know you have no way to escape. No way to fight. The shadows morph and contort before your very eyes. You close them, shielding yourself as you wait for the painful choking. The coldness to pierce your bones like needles.\n*page_break\nNothing.\n\nYou open your eyes to nothing. An empty void fills your sight, your mind, your thoughts.\n*page_break\n*goto_scene chapter2\n\n", "ch6continue": "*set action 12\n\n\n\n*comment every soul lost needs something they held dear to brave the path ahead.\n\n*comment Same as ch1continue. Maybe have clues to second part, second part solves it however the action timer makes go back to first part. chap6 -> ch6continue-> chap6\n\n*comment ch6continue lets you know of light harming the beast in beast end but does not fully kill it, only weakens\n\n*comment cannot enter the hall in second loop for the loops are removed and metal casting is nailed over both doors. staircase is destroyed, everything in ruins. soldiers bodies everywhere, show the feeling of demon has attacked.\n\n\nChapter 6\n*line_break\n- TEMPLE -\n\n*comment edit image to show bones littering temple floor.\n*image templered.png\n\n*if hint > 1\n    -HINT-\n    \n    A key found later opens the door before. A sword beyond must be taken and cleansed then foe faced again in a hall of light.\n    *page_break\n\n\n*label templea\nYou stand at the entrance of a massive hall before you. The ceiling above has caved and rubble is everywhere. You can hear the dripping of water through many spots in the ceiling. To your left stands the remains of a large staircase. Completely demolished, there is no way up to the hallway above. You realize this is the same temple… \n\n*label temple\nThe temples appearance within is dim and dark. The paintings are faded and dull.\n*if action \u003c 1\n    *page_break\n    *goto beast\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        *set percept +1\n        The temple seems massive and all made of stone. The walls are painted with splatters of blood and guts. Shards of bone line the floor.\n        \n        Next to the collapsed staircase is a hallway leading somewhere else. You can see at the end a smaller wooden door. Two standing torches line either side with flames lit upon them.\n        \n        Before you is the remains of a grand arch. The ceiling and borders collapsed to nothing. The room ahead is lit from a single hole in the ceiling. To your right is two large wooden doors both curving at the top towards each other. The metal l s. You hold the sword you have found earlier up towards the beast. This is all you need to take the beast down, right?\n    *page_break\n    The ground shakes and trembles as it steps towards you. It swipes at you with it's long claws as you try to parry with the blade. Every now and then you shank the blade in towards it's chest. You can feel as it sinks into the flesh but the beast pays little mind to it.\n    \n    As you try to fight and guard you are pushed back farther and farther. Soon your back is pressed against a cold wall. The beast steps forward into a ray of light from the roof above. The beast raises it's arm to shelter from the light as it falls temporarily. As it roars you can hear groaning deeper in the halls.\n    *choice\n        #Attack the beast\n            You hope the sword is all you need as you rush the beast. You leap and stab it deep into the creature's throat.\n            \n            Immediately it stands and screams in pain before you are even able to take the sword back out. It towers over you, sword sticking from its body as it glares down at you. It raises its claws and with one simple swipe, you are cut in two.\n            *page_break\n            *image gameover.png\n            *line_break\n            Loop Resets…\n            *line_break\n            Try Again?\n            *page_break\n\n            *goto_scene ch6end\n            \n        #Run\n            You decide to leave the beast and run for the halls. You see dead bodies stumbling out towards you as they groan and try to snap and tear at your skin.\n            \n            You swing the sword wildly at them. Only able to cut off a few heads, you are soon overwhelmed as every step you turn is another skeletal figure. They rip at your flesh as they pile onto you.\n            \n            Soon you are a mass of party parts and blood amongst the cold cobblestones.\n            *page_break\n            *image gameover.png\n            *line_break\n            Loop Resets…\n            *line_break\n            Try Again?\n            *page_break\n            *goto_scene ch6end\n    \n\n*if inventory > 0\n    At least you were able to find the key!\n    \n    As you are looking amongst the rubble for more answers you hear the dreadful sound of heavy stomping. You turn in disbelief to the large bull like monstrosity before you. It still lives!\n    \n    *goto beast1\n\n*else\n    You were unable to find the key!\n    \n    As you are looking amongst some rubble you hear the dreadful sound of heavy stomping. You turn in disbelief to the large bull like monstrosity before you. It still lives!\n    \n    *goto beast1\n    \n*label beast1\n\nThe beast rears it's head back and screeches. The sound echoes throughout the corridors as groans from beyond answer the cry.\n*page_break\nYou turn for the hallways and see beings exit the shadows beyond. Lurking from all around are bodies of dead people as they stumble towards you. Most of them skeletal like with emaciated scraps of wet meat and skin sucked to their arms and ribs.\n\nThey outstretch their limbs towards you. Flailing and grasping.\n\nYou try to run but in every direction you step theres another one. The giant bull tilts its head at you as the eye socket's glow. It roars as the bodies overwhelm you. \n*page_break\nYou can only scream as they stab their jagged bones into your body and chomp down onto your flesh. Within moments you are torn to shreds as your blood litters the stone floor amongst the rest.\n*page_break\n\n*image gameover.png\n*line_break\nLoop Resets… \n*line_break\nTry Again?\n*page_break\n\n*goto_scene ch6end\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n", "ch6end": "*set action 14\n*set progress 0\n\n*comment everything from chap 6 except variables will show\n\n*comment DONE if player does not have key yet, or cannot get the sword and cleanse it in time, player is sent to ch6continue until they can come back a second time\n*comment DONE player can have the key with them, makesure to let that be shown so they know they are on track\n\n*comment once sword is held, can put into the pool and get holysword\n\n\nChapter 6\n*line_break\n- TEMPLE -\n\n*comment edit image to show dark red hue!!\n*image temple.png\n\n*if hint > 1\n    -HINT-\n    \n    A key found later opens the door before. A sword beyond must be taken and cleansed then foe faced again in a hall of light.\n    *page_break\n\n\n*label templea\nYou slowly sit up against a wall as you can feel your body aching with pain… When will this nightmare end… You wonder if there is even a reason to fight…\n\nGlancing around weakly you notice you are in the temple as it was before. The halls are decorated with paintings and gold trimming. Although not all, but the majority of the walls and ceiling are intact. You can hear a rumble deep within the temple.\n*page_break\n*if sword > 0\n    You notice a sword laying next to you… You remember finding it deep within the Grand Hall… But it does no damage to the beast still. It's missing something…\n    \n    You stand up at the entrance of a massive hall before you. To your left stands a grand staircase with steps on two ends. A hallway at the top leads somewhere beyond. The temples appearance on the inside does not seem to match its decaying presence on the exterior. It feels as if the place almost glows.\n    *page_break\n    \n    *goto temple\n\n*if inventory > 0\n    *set progress +1\n    You notice a small metal object next to you. You go to pick it up and stare at it blankly. Is this a key?\n    \n    You wonder what it goes to…\n    \n    You stand up at the entrance of a massive hall before you. To your left stands a grand staircase with steps on two ends. A hallway at the top leads somewhere beyond. The temples appearance on the inside does not seem to match its decaying presence on the exterior. It feels as if the place almost glows.\n    *page_break\n    \n    *goto temple\n\n*comment in library find paper again if progress smogs the air around you.\n        \n        The caved in roof destroyed most of the shelves and pillars around you. The majority of the torches have been disturbed and now lay extinguished or smashed under rubble.\n        \n        Before you think to leave you hear roaring from below. A beast rises from amongst the dust and debris and lurks away. You sit terrified for a moment before you muster the courage to leave. Hopefully you don't run into that thing…\n        \n        You head back for the main hall.\n        \n        *goto temple\n\n*label hallway\nYou pass through a normal doorway into a decently sized area. Smashed tables and chairs line from one end to the other. Wood and debris are scattered everywhere.\n\n*label hall1\n*if action \u003c 1\n    *page_break\n    *goto beast\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        *set op +1\n        You notice beside the door is a lit torch. It helps to illuminate most of the room. You can't really make out what this room used to be. \n        *goto hall1\n        \n    *if op > 0\n        *disable_reuse #Grab Torch\n            *set action -1\n            You go to grab the torch by the door. The second you pull it from the wall, you get a strange flash in your vision. It almost seems as if you feel a tangible wave of fire strike your skin. It burns and stings.\n            \n            Before you, you see the beast as it roars, smashing tables and swiping at fleeing figures around it. People scream as they are impaled by its claws. They grab spears and try to fight it to no avail. \n            \n            The entire temple shakes as walls to the side crumble with flames and rock penetrating the walls. Demons and beasts invade the temple killing everyone they see.\n            *page_break\n            You drop the torch as demons draw near and the visions fade. All but one. Before you is the colossal beast as it rears its head and charges you.\n            \n            It blows through all the rubble in its way as you quickly turn for the door. You barely can make it through as it slams against the door, unable to fit through.\n            \n            It screams in anger as it reaches its claws through and swipes at you. You try to catch your breathe as you step back. The beast roars in anger as it continuously slams against the frame. Bits of rock begin to crumble from the construction.\n            \n            Quickly, you decide to turn around and find the things you need to escape this beast.\n            \n            *goto temple\n            \n\n*label archway\nYou stand in a room slightly smaller than the one before. Bordered and gold plated stones line the edges. Aside from the colored walls and paintings, the room is basically bare. All except for a round pool within the center.\n\n*label arch\n*if action \u003c 1\n    *page_break\n    *goto beast\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        *set op2 +1\n        The pool is surrounded like that of a well. The walls come up a few feet and at the top sit more gold stones encircling the contents within. You hear a faint sound of a single drop of water falling into the pool, resonating a soft echo throughout the still room.\n        \n        There is only one way in and out of this room.\n        *goto arch\n    \n    *if sword > 0\n        *disable_reuse #Cleanse the Sword\n            *set action -1\n            *set holysword +1\n            You hold out the sword over the pool. You are unsure what to expect as you slowly submerge the weapon into the water. \n            \n            At first nothing happens until you see the edges of the pool start to glow. Your hand begins to tingle as the light swarms from the edges to the blade. Then that, too, begins to illuminate a soft blue.\n            \n            Everything seems to fade as you withdraw the blade. Looking at it, you see no real difference. But within your hand you can feel everything has changed. You hope this helps…\n            *page_break\n            You head back for the main hall.\n            \n            *goto arch\n                \n            \n    #Head Back\n        *set action -1\n        You head back for the main hall.\n        \n        *goto temple\n\n*label doors\n*set action -1\n*set sword +1\n\n*comment set image to that monastery place\n*image monastery.png\n*page_break\n\nAs the door swings open you see a large hall before you. Moon light shines through several windows to the left. It seems they used to have stained glass images but now litter the floor with colored shards. You slowly walk through the hall as chairs and benches line the sides. They all face the other end of the room with a pedestal and above that, hung on the wall, is a large sword.\n\nAs you get closer you can see the fine nature of the blade. It looks like that of an older design but well maintained. The grip is lined with a fine leather strap. The cross guard is branded with hints of gold and silver. The pommel shines with a clear gem at the bottom.\n*page_break\nYou are unsure of it's origin but feel this may help you in some capacity. You reach up and take the blade from its hook. At first the blade feels heavy until you hold it out with a firm grip and it feels… Just right. Like it was made for you.\n\nWith it held close you head back for the main hall.\n\n*goto temple\n\n\n\n\n*label beast\n*set hint +1\n\n*if holysword > 0\n    *comment foe faced again in a hall of light! run back to hall and the beasts blood makes it crawl away and the shaman is there before you. She was not the one you spoke to, you realize the lady you spoke to was actually vucub and hopefully you did not drink the potion if you did, hopefully it is not too late for your soul. She thanks you for the cleansed sword frees her from her bonds, but she can no longer help you... It is now, or forever be damned!!!!\n    You hear roaring from the deep corridors beyond. Quickly you hold the sword ready by your side. Before you the colossal, skeletal bull steps around the corner to face you.\n    \n    A nearby hole in the wall shines with a ray of the moonlight. As the beast passes it you can see the fur and skin sizzle under the light. The beast barely notices but it gives you an idea.\n    *page_break\n    Quickly you turn around and run for the Grand Hall. The beast instantly gives chase as each step shakes your balance behind you. As you step beyond the wooden doors the creature behind you smashes through them with ease. Wooden fragments go flying everywhere.\n    \n    You stand to face the beast, two hands upon the cleansed sword as you cautiously step back. It lingers forward, dragging the claws along the floor as they scrape. It passes by the first window as the light sizzles the fur off the beast.\n    *page_break\n    It pays little mind to the light as it takes a swipe at you. You stand guard as your balance gets thrown off as you try to hold the sword tightly, not letting go. The beast pursues you as you step back beyond the second window.\n    \n    Once is passes by the light begins to sizzle and the creature groans and lunges at you.\n    \n    *choice\n        #Jump Back\n            You jump back to the third window. As the beast lands in the light the majority of its fur and size sizzles away. It is no more than weak flesh and bone as it lands onto the ground and roars.\n            \n            You quickly pounce upon it and shank the sword deep into its belly. It curls up and roars, clasping desperately at the blade as the wound begins to give of a strong mist and the body is engulfed in a shadowy fog.\n            *page_break\n            *goto her\n        #Lunge Forward\n            You lunge back at the beast. Stabbing it in the belly under moonlight before it is able to attack you. The fur and size of the beast begins to sizzle away in the moonlight. It is no more than weak flesh and bone as it stands before you.\n            \n            You wrench the sword tighter as it clasps desperately at the blade. The wound begins to fizzle as mist spews from it and the creature is wrapped in a thick fog.\n            *page_break\n            *goto her\n    \n*if sword > 0\n    *set death +1\n    You begin to check around a corner as you hear shifting in the shadows beyond. You hold the sword you now have tightly at your side, hoping this is all you need. \n    \n    After a moment the shifting ends and you can wait no longer. You cautiously step forward as laughter emits from the darkness. You recognize the voice from beyond as Vuculpes, the wolf demon.\n    *page_break\n    \"You think a sharp stick can stop a God? You are as ignorant in death as you were in life.\"\n    \n    His face lingers from the darkness as he crawls in from all fours. Growling and snarling as he rises to his hind legs. He holds his arms out wide, claws hanging ready to shred flesh.\n    \n    *choice\n        #Hold the sword ready\n            You grip the sword tightly as you ready yourself to strike. Just like you thought, Vuculpes lunges at you. You hold the sword high as you can feel the resistance in the blade as it pierces his abdomen.\n            *page_break\n            You look down in shock as you realize your gut is shearing with pain. The demons claws are deep into your body as you can feel them tear against your organs. Your eyes widen in shock as your hands let go of the blade sticking from the wolf's body. He laughs yet again.\n            \n            \"I'll never grow tired of your foolishness.\" He mutters deep into your ear as he sharply withdraws his claws from your body and your guts spill onto the ground.\n            \n            You are left bleeding out, bewildered the sword did not protect you.\n            *page_break\n            *image gameover.png\n            *line_break\n            Loop Resets…\n            *line_break\n            Try Again?\n            *page_break\n            *goto_scene ch6continue\n        \n\n*set death +1\nYou begin to check under a collapsed stone shelf as you hear a howl from the other side of the room. You jump for the sound pierces the quiet so loudly and so close to you.\n\nYou grasp around wildly until you can find a stone perfect enough to wield as a weapon. Your eyes dart around wildly, waiting to see the beast. \n*page_break\nNothing compensates your vision though. Instead the shadows in the corner begin to dance with the rapidity of your breathing. They expand and withdraw then expand again. Your breath feels like it is not your own as it surrounds you. Something gasps and snarls behind your ear.\n\nYou jump away, throwing the rock in its direction but see nothing yet again. The shadows begin to grow as they reach out for you. You can run no where as you crawl to the center of the room before you are engulfed in eternal darkness.\n*page_break\nIt starts in your fingers and feet, then lingers and crawls up your body. The feeling of a thousand painful needles until you can no longer feel or see your own self. Soon you feel nothing but your own chest as the needles prick into your heart and your chest rises and falls one last time…\n\n*page_break\n*image gameover.png\n*line_break\nLoop Resets… \n*line_break\nTry Again?\n*page_break\n*goto_scene ch6continue\n\n\n\n*label her\nAs the fog begins to clear you see a figure about the same size as you standing there. She holds the edges of the blade tightly against her gut as you both fall to your knees.\n\nShe looks up at you and winces, yet a smile crosses her lips.\n\nIt is the shaman, your friend, from before.\n*choice \n    #\"How can this be?\"\n        You say to her as she looks up at you… She is weak to speak.\n        \n        \"Y-you remember me?\" \n        *choice\n            #\"I had just spoken with you earlier...\"\n                *if gender = \"male\"\n                    She frowns at your words.\n                    \n                    \"If this is true… Then you have spoken with a demon and not me. I have tried to help you, my King. \n                    \n                    But this was long ago. The demons have outwitted me and captured my soul. I cannot even remem—\" She coughs up blood but seems little bothered by it. In fact, she weakly looks up at you but a smile crosses her lips.\n                    *page_break\n                    \"You do not know it, dear Shonnra. But you have saved my soul. I am now free…. Of this place.\" She hangs low over the blade as blood trickles from her mouth. You go to lay her down softly as you look down in disbelief.\n                    \n                    *goto her2\n                *else\n                    She frowns at your words.\n                    \n                    \"If this is true… Then you have spoken with a demon and not me. I have tried to help you, my Queen. \n                    \n                    But this was long ago. The demons have outwitted me and captured my soul. I cannot even remem—\" She coughs up blood but seems little bothered by it. In fact, she weakly looks up at you but a smile crosses her lips.\n                    *page_break\n                    \"You do not know it, dear Shonnra. But you have saved my soul. I am now free…. Of this place.\" She hangs low over the blade as blood trickles from her mouth. You go to lay her down softly as you look down in disbelief.\n                    \n                    *goto her2\n                    \n\n\n*label her2\n\"Please, tell me… You did not take anything from this demon of mine.\"\n\n*if potion > 0\n    *choice\n        #\"Unfortunately, she gave me a potion...\"\n            She coughs weakly.\n            \n            \"This is not good… It was probably made with the blood of demons. I can only hope your soul stands free of corruption still…\"\n            \n            *goto cant\n\n\n*choice\n    #\"No, I refused her potions.\"\n        She weakly smiles again.\n        \n        \"This is good… It was probably made with the blood of demons. Who knows what it'd have done to your soul.\"\n        \n        *goto cant\n\n\n*label cant\n\"You are so close now, Shonnra. You must… Carry on without me. I wish I had the strength… To free you but I cannot.\"\n\n*choice\n    #\"Can I not free myself with the sword, as I did with you?\"\n        She frowns and shakes her head.\n        \n        \"You can only be freed by that of another soul or find your way to the bridge that binds the realms.\n        \n        The bridge… Beyond the temple…\"\n        \n        She weakly closes her eyes and breathes her last breath. \n        *page_break\n        *goto end\n\n\n*label end\nYou sit there cold and alone for awhile as you watch her body wisp away into the fog and is no more. The sword lay bloodied on the stone below.\n\nThe best you can do is keep going…\n\nYou grip the sword as you stand to your feet and ready yourself. Beyond the temple, you think to yourself, as you travel forth.\n\n*page_break\n*set hint 0\n\nAs you go to exit the hall you find it is but one large building, far from the temple. Only the top of the stone is shown beyond the trees. You are within the forest yet again.\n*page_break\n*goto_scene chapter7\n\n\n\n\n\n", "chapter1": "*set action 12\n\nBefore we begin-\n\nTrees Don't Tell relies mostly on puzzle click elements. Each chapter its own level. If you fail too many times, bad things may happen. Even the smallest of details may lead to a clue for the next chapter. Rushing may lead to certain death.\n\nLastly, If you make a habit of exhausting every option you may find challenge here. How many times will you die before you can reach the end?\n\nEnter And Choose Wisely\n*page_break\n\nChapter 1 \n*line_break\n- FOREST -\n\n*label chapter1\n\n*image forest2.png\n\n\nYou gasp awake, glancing around hastily. Dense trees surround you in every direction. Thick vines sway and pulse as if they were living snakes. The branches rattle and crack as they intertwine locking you within a zone of its own choosing. \n*page_break\n\nAfter awhile of catching your breath, you finally get to your feet and look around. Your head is pounding.\n\nYou are in a small clearing with trees and vines almost completely surrounding you. Not much fills the strange clearing except a tree stump, some bushes and a fallen branch. \n\nThere maybe more here if you look around.\n\n\n*label 1\n\nYou stand in the clearing. The air here feels stiff.\n*if action \u003c 1\n    *page_break\n    *goto shadows\n*choice\n    \n    \n    *if percept > 0\n        #Head West\n            *set action -2\n            You head through the only opening.\n            *goto west\n        \n    *if op > 0\n        *hide_reuse #Pickup journal\n            *set journal1 +1\n            *set journal +1\n            *set action -2\n            You lean down to pickup the small leather journal. You don't know who it belongs to but the majority of pages are also missing. They must have used them for the fire.\n        \n            One small excerpt remains.\n            *page_break\n            'I can't tell whats going on. Sometimes I hear her voice but…. I watched her die the night before…\n        \n            Or was it just earlier tonight?… I can't even remember.\n        \n            How can I not remember … It was so horrifying..\n            \n            I'm sorry, Li- [Theres only a small mark after the letter. The author scribbled over it, trying to hide something.]\n            \n            Why can't I?'\n            *page_break\n            You pull the excerpt out and fold it into your pocket.            \n            *goto 1\n        \n        \n        \n    *if op > 0\n        *disable_reuse #Percept fire\n            *set action -1\n            You lean by the fire, noticing its ashes already gone to the wind. Only a few rock sized bits of ember left.\n        \n            You hover your hand over the embers. They are as cold as the ground beneath your feet. They weren't lit for very long and that was             nights ago.\n            *goto 1\n    *if percept > 0\n        *disable_reuse #Investigate stump\n            *set action - 1\n            You walk up to the stump. As you inch closer you notice behind the branch is the remains of a very, very small fire. It was probably lit only once. The ashes already gone to the wind.\n        \n            The small bits of leather you find to be a journal.\n            *set op +1\n            *goto 1\n    *if percept > 0\n        *disable_reuse #Investigate trees\n            *set action -1\n            They're just trees.\n            *goto 1\n        \n        \n    *disable_reuse #Percept\n        *set action -1\n        *set percept +1\n        You glance around. Nothing, no one, is around you. You get a moment of respite.\n        \n        Near the stump you notice a small patch of leather propped against it. Beside the stump lies the thick, fallen branch. You cannot see behind it but dead pine needles litter the ground.\n        \n        Although the trees almost completely surround you, there is a small opening to your left. You see a small hue of red in the skies between them. You can only assume it is the sun setting, it must be due West.\n        *goto 1\n    *disable_reuse #Call out\n        *set action -1\n        You try to shout for anyone. But the trees absorb your cries.\n        *goto 1\n    \n    #Inventory\n        *set action -1\n        *if gender = \"male\"\n            You check through everything you own. You're carrying a medium sized pouch at your waist but other than that you don't have much.\n            *goto choice\n        *else\n        You check through everything you own. You're carrying a small gray backpack, one strap is torn completely off. Other than that you don't have much.\n        *goto choice\n        \n        *label choice\n        *choice\n            *if journal > 0\n                #Small journal excerpt. Read excerpt\n                    *set action -1\n                    You re-read the journal excerpt.\n                \n                    'I can't tell whats going on. Sometimes I hear her voice but…. I watched her die the night before…\n        \n                    Or was it just earlier tonight?… I can't even remember.\n        \n                    How can I not remember … It was so horrifying..\n                \n                    I'm sorry, Li- [Theres only a small mark after the letter. The author scribbled over it, trying to hide something.]\n            \n                    Why can't I?'\n                    *goto 1\n                \n                \n            #Back\n                *goto 1\n            \n    *disable_reuse #Self check\n        *set action -1\n        *if gender = \"male\"\n            You start to think of everything that has happened to you. You were just at a cabin… weren't you? You tried to think beyond that and realized you couldn't. You have no recollection, not even who you were…\n            *line_break\n            \n            You glance down at yourself. You're a thin guy with a soft brown skin tone. Grime and dirt covers your hands. You reach up and touch your hair, its stiff and matted. Your shirt is torn and your jeans have a couple holes. Other than that, you can't quite tell.\n            *goto 1\n            \n\n\n        *else\n        You start to think of everything that has happened to you. You were just at a cabin… weren't you? You tried to think beyond that and realized you couldn't. You have no recollection, not even who you were…\n        \n        You glance down at yourself. You're a thin girl with a soft brown skin tone. Grime and dirt fills under your cracked finger nails. You reach up and touch your hair, its stiff and matted. Your shirt is torn and your jeans have a couple holes. Other than that, you can't quite tell.\n        *goto 1\n    #Wait\n        *set action -3\n        You decide to sit for a bit. You curl your knees to your chest to keep warm as you anxiously look around, glancing behind every minute or so.\n        \n        You can't seem to comprehend how much time ends up passing. Was it a minute or was it twenty? You feel weird as you stand to your feet.\n        *goto 1\n        \n        \n*label west\n*if action \u003c 1\n    *page_break\n    *goto shadows\n\nYou take the pathway west. The trees around you narrow more as it leads directly into a wide river. \n    \n*label west2\n*if action \u003c 1\n    *page_break\n    *goto shadows\n\nYou stand at the waters edge.\n\n*choice\n    *if op2 > 0\n        *disable_reuse #Pickup camera\n            *set action -1\n            *set camera +1\n            *check_achievements\n            *if not (choice_achieved_camera)\n                *achieve camera\n            You reach down to pickup the camera. To your surprise it still works, albeit the screen flickers black every couple seconds. You click the first video. Its the boy from the picture, holding the film to his face.\n            \n            \"Welcome back to Sam's Abandon guys!! On this channel we go to places all over the world exploring abandoned factories, malls and silos. But TODAY we have something better planned.\"\n            \n            A girl behind Sam sneaks up on him, trying to steal something from his belt bag. Her friend tugs on her gray backpack playfully, trying to pull the girl away. He chuckles as he notices them.\n            \n            \"As you can see I'm here with my lovely Lisa and our friend Alex. Behind us is the Shonnra Morr Jungle! If you haven't heard, they're the haunted woods of Brazil. They say uh… not many can make it past the first tree without seeing or feeling, something? The locals don't say much but we figured we'd come film some scary ghosts or some crap. Hopefully we can catch it live! Stay tuned.\"\n            \n            The screen blackens and flickers. Silence ensues.\n            *page_break\n            …….\n            *page_break\n            *image dark.png\n            \n            *page_break\n            *image camera.png\n            *page_break\n            \n            *goto west2\n            \n   \n    *disable_reuse #Percept\n        *set action -1\n        *set op2 +1\n        You take a moment to survey. The water is murky, stagnant and fowl. The ground beneath your feet has turned muddy, this part of the forest is swamp ridden.\n        \n        A wooden post sticks from the water with a rope tied near its top. You aren't quite sure if it was once used to anchor a boat or was part of a construction. Near the waters edge is a heavily torn sneaker shoe next to a black folding camera.\n        *goto west2\n        \n    *disable_reuse #Call out\n        *set action -1\n        You call out across the stale water. You hear a soft echo in return, but no one replies.\n        *goto west2\n        \n    #Head back\n        *set action -1\n        You head back.\n        *goto 1\n    \n\n\n*label shadows\n*set percept 0\n*set death +1\nThe trees sway and howl in the wind. Several crows caw frantically, the first real animals you've heard all night. You turn sharply towards the caws but cannot see a living soul anywhere. Animal nor otherwise. As you turn back to where you were facing, you realize everything had changed.\n\nYou are no longer where you once were. You slowly spin as your heart clumps into your stomach, overwhelmed with feelings of paranoia and anxiety. As you slowly walk amongst the jungle, nothing appears to contain what little familiarity you had just barely achieved.\n\nYou keep walking but every tree is the same as the one you just pass. You start to get disoriented.\n*page_break\nIs that tree… Where's the clearing… \n\nYou start to feel frantic as you can't find your way around.\n\nSuddenly…\n\n\n\nThe flock of crows immediately scatter and fly to the night. You freeze.\n\nBehind you you hear shifting in the trees. You glance around and see nothing. You can feel your heart beating.\n\nYou want to run but just as you turn, you trip over thick roots of a tree. You try to scramble to your feet but the roots intertwine around your wrists and hold you tight.\n*page_break\nYou can barely turn your head to see dark shadows wrapping around a tree like a thick fog. \n\nIt slowly… Menacingly crawls up your leg. You can feel the air grow chill as if you stepped into a freezing lake. The shadows feel so very cold. Its thick moisture slowly envelopes your clothing, freezing the cloth solid to your skin.\n*page_break\nIt begins to crawl farther up your leg past your waist and constricts tightly around your chest. Your skin begins to burn from the ice that was once your clothing.\n\nBefore long you're enveloped as it wraps around your face and you can no longer breathe. The shadows drown you in darkness.\n*page_break\n*image shadows1.png\nLoop Resets… \n*line_break\nTry Again?\n*page_break\n*goto_scene ch1continue\n\n\n\n                   \n                   \n", "chapter2": "*set action 14\n*set op 0\n*set op2 0\n*set percept 0\n*set progress 0\n*set inventory 0\n\n\nChapter 2\n*line_break\n- SHADOWS -\n\n*image chapter2.png\n\n*if hint > 1\n    -HINT-\n    \n    The light will protect you.\n    *page_break\n\nThe wind whistles across the top of the trees. The branches sway and creak with an eerie but rhythmic sound. Near the ground, where you lay, the air feels still. The weather can't break the dense forest.\n*page_break\n\n*if hint > 1\n    *goto 2\n\nYou go to sit up when you realize you can't. Your hands are bound.\n\nLooking around you notice both your hands are strapped with metal cuffs nailed to a cement slab that you now lay upon. Your eyes frantically dart around. No shadows accompany you. You're alone.\n\n*label 1\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        You try to look around more but you can't see too much. It'd be better to escape the cuffs first.\n        *goto 1\n    *disable_reuse #Call out\n        *set action -1\n        You call for help. You hear something off in the distance. Was it a reply to you?\n        *goto 1\n    *disable_reuse #Struggle free\n        *set action -1\n        You notice your hands are slightly smaller than the intended fitment of the metal casting. You struggle and pull at the chains until one of your hands painfully squeezes through the cuff.\n        \n        You reach over, holding the metal cuff you pull as hard as you can until your other hand pinches through.\n        \n        It hurts like hell but at least you're free.\n        *page_break\n        *goto 2\n        \n\n\n*label 2\n\nYou sit up on the slab. The lifeless forest remains eerily quiet.\n\n*label 3\n\nYou are in a small glade not much larger than the clearing.\n\n*if action \u003c 1\n    *if progress > 0\n        *page_break\n        *goto shadows2\n    *else\n    *page_break\n    *goto shadows\n\n*choice\n    *if percept > 0\n        *disable_reuse #Pickup stone\n            *set action -2\n            *set tablet +1\n            You reach down to pickup the strange stone. Markings scatter the stone with most of the writing cut off on the edge. The pieces tell a larger story.\n            \n            Depicted from the center etchings you can make out what looks similar to the clearing, between an opening of trees is a bridge. What catches your eye is what lays beyond it. A large, stone structure with steps made for giants stacked towering above the trees.\n            *page_break\n            \n            With the stone weighing a good twenty pounds, you decide to gently set it back down where you found it.\n            *goto 3\n            \n    *disable_reuse #Percept\n        *set percept +1\n        *set action -1\n        You look around. You get an odd feeling of deja vu but you'll never be able to quite place it. Near the head of the slab a metal torch is staked into the ground and a subtle flame is lit upon it. It's not very bright but it is softly soothing.\n        \n        You notice the glade leads to several areas. You instantly feel less claustrophobic. Dead branches and twigs cover the ground from the tree canopy above. Bushes scatter the area but nothing stands out. Next to the cement slab is an odd stone.\n        *goto 3\n    *disable_reuse #Call out\n        *set action -1\n        You call out to the glade. The pathways carry your voice. You hear something in the distance, off to the East.\n        *goto 3\n    #Inventory\n        *set action -1\n        You rummage through your stuff. You have everything as before, although it's not much.\n        *goto 3\n    *disable_reuse #Self Check\n        *set action -1\n        You glance down at your hands. They're yours of course. No bruises or strange markings besides the rubbing from the metal cuffs. They still hurt a bit.\n        *goto 3\n    *if percept > 0\n        #Head North\n            *set action -2\n            *goto north\n        \n    *if percept > 0\n        #Head East\n            *set action -2\n            *goto east\n        \n    *if percept > 0\n        #Head West\n            *set action -2\n            *goto west\n        \n    #Wait\n        *set action -4\n        You decide to sit by the torch fire and wait. It's warmth is little comfort but the lighting helps in this dark jungle. You almost notice something out of the corner of your vision, but as your eyes dart in the direction nothing is there.\n        *goto 3\n        \n*label north\n*set progress +1\nYou decide to head North. It's only a small pathway before you're lead to the bigger clearing from before, although you thought you were in a different place…\n\nThe trees surrounding the area stand thick, growing into each other and forming a wall. Many of them vary in height with branches reaching over the clearing. Many of the limbs have broken with age, scattering the edge of the circle but nothing lays in the clearing.\n            \nThe clearing itself is still empty. The sky above is brighter and more clear now. The clouds have gone and the moon is shining down, it's light piercing the forest and shining almost like a ray onto the clearing.\n*page_break\n\n*label north2\n*if action \u003c 1\n    *if progress > 0\n        *page_break\n        *goto shadows2\n    *else\n    *page_break\n    *goto shadows\n\n*image clearing.png\n\nYou stand in the center of the clearing.\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        You slowly spin around, observing what you can. The trees are as thick as the other clearing, if not more so. There's definitely no way you can sneak by these ones without getting stuck halfway through.\n        *page_break\n        *goto north2\n    *disable_reuse #Self check\n        *set action -1\n        You glance down at yourself. The moonlight shines across your body. Only in illumination can you notice the details in your arms, or lack thereof. Your veins unnoticeable through your skin. \n        *page_break\n        *goto north2\n    #Wait\n        *set action -2\n        You sit in the clearing, staring up at the night sky. With the moon bright and showing, it smothers any site of stars. For a moment you try to think of something but lose process of thought almost instantly.\n        \n        You do not sit long, or perhaps too long. Can you even tell? Either makes no difference as you stand to your feet.\n        *page_break\n        *goto north2\n    #Head back\n        *set progress -1\n        *set action -1\n        With nothing else to do, you head back.\n        *goto 3\n    \n*comment east have Alex, white girl, calling out for Lisa. She is unresponsive to your call out at first.\n*label east\nYou head East where a call in the distance beckons you. You cannot make out the words, only the familiarity of it being a human shout.\n\nThere is no pathway heading East. The trees begin to thin as they scatter around you. The farther you walk, the farther their distance expands.\n*page_break\n\n*label east2\n*if action \u003c 1\n    *if progress > 0\n        *page_break\n        *goto shadows2\n    *else\n    *page_break\n    *goto shadows\n\nYou stand in an enclosed area with loose trees and foliage scattered about.\n\n*choice\n    *disable_reuse #Percept\n        *set action -1\n        You warily glance around for the noise you heard earlier. At first you do not see anything, but a shuffling beside a tree calls your attention.\n        \n        It was a smaller shadowed figure, disappearing behind a large clump of bushes before you could get a clear look.\n        *page_break\n        You cautiously walk around the foliage to look but have managed to lose the figure. Where did it go?\n        *goto east2\n    *disable_reuse #Call Out\n        *set action -1\n        *set op +1\n        You call out amongst the trees. You hear nothing. At first you think no one is actually out there. That is, until you feel a cold hand gripping your shoulder.\n        *page_break\n        \n        You sharply turn in dismay. A woman about your age and much smaller stands before you. Her hair is blonde, ragged and shoulder length. Knots and split ends make up every bit of it. Her clothes are as torn as yours.\n        \n        For awhile you both stand there staring at each other. The first real person either of you have seen in… how long? She appears confused and frightened, questioning if you are even real perhaps.\n        *page_break\n        *goto alex\n        \n    #Inventory\n        *set action -1\n        You have not picked up anything else since the clearing. The notes you found earlier are now gone.\n        *goto east2\n            \n    #Wait\n        *set action -3\n        You decide to lean against a tree and wait. As you do so you hear a soft whimper and shuffling behind foliage… As you look in the direction you cannot quite track where it is coming from.\n        *goto east2\n    #Head Back\n        *set action -1\n        You decide to leave these pack of trees for the glade.\n        *goto 3\n\n*label alex\n*comment alex is nearly a skeleton. Make chap 3 show only a skeleton leaning against a tree.\n*set action -1\n*check_achievements\n*if not (choice_achieved_alex)\n    *achieve alex\n\"C-Can you help me?\" She stutters, you are unsure if its from the cold or something else.\n*choice\n    #\"I was hoping you could do the same for me.\"\n        *goto alex2\n    #\"Are you okay?\"\n        *goto alex2\n*label alex2\n*comment if statement for male or female.\n\"I'm looking for my friends. Lisa and her boyfriend, Sam... We got split up awhile ago.\"\n*choice\n    #\"When did you last see them?\"\n        *goto lastsaw\n    *if gender = \"male\"\n        #\"I think I am Sam.\"\n            *goto alex3\n    *else\n        #\"I think I am Lisa.\"\n            *goto alex3\n            \n*label lastsaw\n\"I… I don't remember. It's been so long. I… I think shortly after we got into the forest maybe? The first thing we saw was a small cabin. It was so creepy..\"\n\n\"I don't really remember what happened after… I remember someone screaming for help…\"\n\n*comment need direction after\n*choice\n    #\"What is your name?\"\n        *goto alexname\n    #\"I can't seem to remember anything either...\"\n        *goto alexname\n\n*label alex3\n\"No, I don't think so.\" She tilts her head to the side, reevaluating you.\n*choice\n    #\"Who else would I be?\"\n        *goto alex4\n    #\"Do you remember what they look like?\"\n        *goto alex4\n*label alex4\n\"I can't tell.. I mean I don't remember. Well…\" She goes to scratch her head. As she does so, both of you seem to notice at the same time that her entire hand is completely deformed.\n*page_break\n\n*label alexpain\nHer eyes widen in terror. Wrist bone juts out the side, splintered and broken. She screams and falls to her knees, clutching her forearm in shock.\n\n\"Ahhh it hurts        \n        You look across the river to see the other end of the swampland faces a wall of thick trees. What they were building towards, you cannot tell.\n        *goto west2\n    \n    *disable_reuse #Call out\n        *set action -1\n        You call across the river to the other side. You hear your own echo repeat… Then repeat again and again until it slowly fades off.\n        *goto west2\n    \n    *disable_reuse #Inventory\n        *set action -2\n        *set tablet2 +1\n        As you had walked here you felt something in your bags. You quickly go to check and notice a thin, stone tablet has been placed inside. Did you put it there?\n        \n        You go to look at it and notice it has a fine chiseled edge and border on one side whilst the other is crumbled and broken off. On the piece is a depiction of ancient writing. You almost think you can read the words, but then realize it's not in English, Portuguese or any native tongue that you can tell. On the left shows a large humanoid with its arms outstretched to a group of workers building steps to it. On the right a row of trees with each one being slightly taller than the one before. Between the trees someone etched lines sporadically giving the object tendrils like a seeping cloud or octopus, its grasp reaching from within the trees.\n        *page_break\n        \n        You shudder as a cold wisp of air blows across you. There shouldn't be wind in this thicket of trees. You quickly turn towards the breeze as leaves fall from the trees all around you. For a moment you get the scent of maize and spiced meats. The air around you quickly heats, sending a numbing burn across your skin as your body warms and the trees around you thin. You hear chatter of a large gathering, but cannot tell from where. \n        \n        Momentarily you are perplexed and cannot tell if you are within a building, cave, or even still outside.\n        *page_break\n        As if waking from a dream you are standing there, arms outstretched like you're trying not to fall. You had dropped the stone tablet and it now lays shattered at your feet. A howl is heard in the distance that sends shivers down your spine.\n        \n        Then a second howl echoes much closer. You immediately feel you are unwelcome here.\n        *page_break\n        *goto west2\n    #Wait\n        *set action -3\n        You decide to brave the howls amidst the trees as you sit by the stones. Noticing the water by you sits remarkably still your mind goes absolute blank as the trees around you seem to curl towards you. For a split moment the trees feel like they spin around as you stand back up, you clutch the closest one to you for balance. The strange moment subsides as quickly as it had arrived.\n        *page_break\n        *goto west2\n        \n    #Head back\n        *set action -1\n        With no way across, you decide to head back.\n        *goto 3\n    \n\n*label shadows\n*set action 14\n*set op 0\n*set op2 0\n*set percept 0\n*set progress 0\n*set inventory 0\n*set death +1\n\n\n*if hint > 1\n    A strange crackling causes you to stop abruptly in your tracks. You slowly turn to see nothing behind you. For a moment you continue what you were doing before you hear it again. Reluctantly your gaze slowly drifts up to the tree branches above you while they whip and snap violently, as if the forest had a mind of its own.\n    \n    Bending unnaturally, the branches lash at you as the tips pierce your skin through and through like a dozen spears. You become stuck as the limbs stiffen, leaving you to bleed out amongst the bark.\n    \n    *page_break\n    *image shadows1.png\n    Loop Resets… \n    *line_break\n    Try Again?\n    *page_break\n    *goto_scene chapter2\n\n\n\n*set hint +1\n\nYou hear howls in the distance as leaves blow down from the branches. The air grows colder as you recognize the feeling.\n\nQuickly you try to rush to the familiar clearing. Your heart pounds against your chest with every step you take. Frantically you spin around glancing through all the trees searching for a way out.\n\nYou can barely breathe as the freezing air zaps your lungs. Your chest convulses with pain as you begin to hyperventilate. Leaning against a tree, you look up to see the glade instead, the cement slab, and the torch that lay lit upon it.\n\nYou stumble out towards it as you notice figures within the trees walking towards you.\n*page_break\n\nYou rip the torch from the ground and wave it towards the shadowy figures. You muster what courage you can to scream and shout at them.\n\n\"Stay back!\" You warn to them.\n\nFor a moment they all stand still and quiet. They watch you curiously. Your grip tightening over the cold handle of the torch as you gasp and snarl at the forms before you. Slowly, they begin to chant in a language you can not understand.\n\nYou lash out at one of the creatures but just as you do, a strong, unusual gust of wind blows through the branches of the trees and over the clearing. You grit your teeth and try to plant your feet for you have never faced such a gust before.\n*page_break\n\nWith a faint dreadful wisp, your torch is extinguished. Fear washes over you just as quick as the presence of the shadows draw near. With the light of the moon you can make out only the silhouettes of trees and nothing more.\n\nYou feel their cold hands clutch your wrists and drag you. You flail and scream but to no avail as they throw you hard against the slab. You land sharply on your back, getting the wind knocked straight from you. You moan and struggle until consciousness fades from view.\n\n*page_break\n*image shadows1.png\nLoop Resets… \n*line_break\nTry Again?\n*page_break\n*goto_scene chapter2\n\n*label shadows2\n*set hint 0\n*set death +1\nYou decide to wait out at the clearing, the only familiarity you have had since waking. After a moment of time passing, you hear a sound in the distance, far, far north. It chimes rhythmically.\n\nBells… Or one giant one that is. It chimes loudly and hums after each swing. You decide to approach the sound as you glance through the trees.\n*page_break\nYou cannot make out anything but darkness. But the ringing does not stop, in fact it grows louder and louder. The trees echo the sound, vibrating with intensity as the sound pierces your skull and wracks your brain. You clutch your head, and keel over.\n\nThe sound amplifies through your mind like it was made from a honeycomb alignment of metal rods, reverberating the sound throughout your body.\n*page_break\nInstantly you grow nauseous and cannot hold back vomit as it gushes from your mouth. As you lean back, you feel your head dizzying.\n\nBefore you shadows envelope the forest and wisp around branches like snakes. You crawl back in terror as one forms directly in front of you and reaches his hand out to grasp you.\n*page_break\nYou crawl farther backwards into the clearing just as the shadow extends beyond the tree line. \n\nIn the clearing, under the moonlight, you can finally see the details of the shadow. It is a dark form hidden well under a black robe and cowl. A snout protrudes from under the shadow of the hood. Teeth snarling with a look of satisfaction at your displeasure. Whatever it is, it is not human.\n\nIt's hand reaches out for you. The ends of the robe are severely torn and muddied. Beyond the cloth is menacing claws dried with blood and grime.\n\nThe moment it's paw touches the moonlight it retracts quickly. The beast snarls at you in disgust. Soon more of them come and they begin to circle the clearing. Low but heavy chanting and huffing under their breath.\n*page_break\nYou stay upon the ground, left hand clutching your stomach while the right barely holds you up. Too weak to stand.\n\nThe bells still pound in your head but feel distant in your mind. Your ears feel as though they bleed and you begin to find yourself swaying with each bang of the bell.\n\nBoom, boom.\nBoom, boom.\n\nWith each clang matching your heartbeat, you notice it slowing.\n*line_break\nSlower.,.,.,., Slower..,.,.,..,,.,..\n*line_break\nUntil it stops…\n\n*finish\n\n*comment next chapter\n\n*comment make sure to set hint 0\n\n\n*comment make shadows scared of fire. give interaction for player to fight shadows this time. can either die or start to be successful. make it seem the way to win is by killing them although its the light\n*comment shadows are harmed by the light\n\n\n\n\n", "chapter3": "*set action 12\n*set op 0\n*set op2 0\n*set percept 0\n*set progress 0\n*set inventory 0\n\n\n*comment add in demon section for the east.\n*comment all thats left is new west section, next chapter\n\n*comment after shadows, revive in the glade and not in clearing, so convo only happens once.\n\n*if hint > 0\n    *goto clearing2\n\nChapter 3\n*line_break\n- CHANGE -\n\n*image forest1flip.png\n*page_break\n\nYou awake to see the creature's snout at your face. Large sharp fangs with cold breath that protrudes from its maw as it gazes at you.\n\n\"We could do this for eternity, you and me. I often love these games.\" He rolls his head back and laughs maniacally. You try to come to your senses as your eyes examine for anything else.\n\nIt is only this creature in the shadows. And you? Safe. At least for now. You glance up past the silhouette of trees. \n\n*choice\n    #\"What do you mean?\"\n        *set action -1\n        *goto wolf1\n    #\"Why do you torment me?\"\n        *set action -1\n        *goto wolfa\n    #Choose to not engage the creature\n        *set action -1\n        *goto ignore\n\n\n*label wolf1\nHe cocks his head at your question. You stare at him. Is this thing before you even real? If so… How?\n\n\"You chose this for yourself.\" The thin moonlight divulges no detail of the things face. Only his snout ripped with bits of fur and flesh missing. \n*page_break\n\"You cannot remember…?\" He chuckles deep from within his throat. He slowly lifts his mudded paw to the edge of the tree's shadow. With
