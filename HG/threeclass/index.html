<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Land of three classes - The Exam — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "threeclass", "title": "Land of three classes - The Exam", "scenes": {"choicescript_description": "You have spent years of learning the arts of a magician, trained for the swiftness of a rogue and did endless hours of swordfighting.Now your time has come to put it all to the test. Your day of examination has finaly come. Can you solve the riddles, beat the monsters and do the trickery that is needed to pass? You enter the maze and are left to your own devices. In the next room you can already here the patter of feet on the ground...\n\nIn the style of interactive books, the player is put in a fantasy world. In a maze like dungeon he goes from room to room in the search of the exit. The game itself is text based and all input is done via multiple choice. Nonetheless the game is complex in its own way, it allows solving riddles in more than just one way. The player (YOU), can chose what kind of profession he prefers. Whether to fight or to trick or use to magics. In a retro style you even get hand drawn Pen&Paper like glimpses of your surroundings. If you are stuck - you pray to god for help. Once you DO reach the exit your doings will be evaluated. Can you become a MASTER?", "choicescript_stats": "Values of your alter ego in TriCla\n\n*stat_chart\n  text Staerke Strength\n  text Intelligenz Intelligence\n  text Geschicklichkeit Dexterity\n  text Gesundheit Health\n  text Erfahrung Experience\n  \n  text currentRound Round\n\n  text strSchlucke Quaffs of strength potion\n  text intSchlucke Quaffs of intelligence potion\n  text dexSchlucke Quaffs of dexterity potion\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Remove in-game advertisements.\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n", "ending": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\n\nAlas! You died in the commotions of your exam...\n\n*page_break\n\"I'll be back\" - thats no question.\n\nLuckily the whole thing was just an exam - you are not really dead ...\n\nPerhaps...\n\nSome day you will try again - and act more cleverly...\n\n*page_break\n\n*goto_scene scoring\n\n", "ending2": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nThe exam is over!\n\nYou most certainly did not pass the exam!\n\n*page_break\n\"I'll be back\" - thats no question.\n\n(NO - Not you!)\n\n*goto_scene scoring end", "maze1": "*label start_Scene1\n\nYour mentors have led you to this room.\nIt is quite nondescript. The walls, the ceiling and the floor are made of worked stone.\nThere are two doors, one to the south where you were led through.\nThat door was locked and you were told it would be impossible to open it \nfrom the inside.\n(You even would not have a clue how. There is nothing you could use to\nopen it. There is no handle, no hinges not even a small gap of any kind).\n\nYou were told, the only exit lies to the north. As soon as you go through the northern door, \nthe exam begins.\n*line_break\n(Funny guys - since you can not go back - the exam has already started... \"Teachers!\")\n\n\n*line_break\n*image Raum0.GIF right\n*temp rdif\n*fake_choice\n  #Change current attributes.\n    \n  #Go north\n\n  #Open door to the south\n\n  #Apply skill\n\n*set currentRound +1\nEven before you can begin, three brave warriors storm into the room from the north.\nAll three of them seem to be very experienced fighters\n(to say it with plain words: you are a level 0 character, they appear to be level 5 characters).\n\nThe leader of them shouts: \"Halt! Surrender at once!\"\n\n*choice\n #Submit to your fate\n  They take all your belongings. You have no weapons, no thieving utensils and no spell book anymore.\n  (luckily they did not take the attribute potions).\n  *line_break\n  You are now on your very own in every respect...\n  *choice\n   #Next\n\n    *goto_scene maze1_1\n #Fight - I wont give in that easily!\n  You have no chance (absolutely no chance)!\n  *line_break\n  The leader attacks you and with one cunning (and very hard) blow with his fist, he sends you to the realm of dreams...\n  \n  ...\n\n  Some time later you wake up (naturally you can not tell exactly how much later, but if you were made to guess, \n  you would say about 9 minutes und 45 secconds).\n  \n  They took all your belongings. You have no weapons, no thieving utensils and no spell book anymore\n  (luckily they did not take the attribute potions).\n  *line_break\n  You are now on your very own in every respect...\n  *choice\n   #Next\n\n    *goto_scene maze1_1\n*goto_scene maze1_1\n\n\n\n", "maze10": "*if currentRound > timeLimit\n  *line_break\n\n  Oh No!\n  \n  Your time has run out!\n  \n  Don't you know that you have to do the exam within a defined time limit?\n  Now your time has run out.\n  *goto_scene timeout\n\n*label start_Scene1\n\nThis is a very secret room!\n*line_break\nIt is so secret - the room itself doesn't know where it is!\n\nTo prove how very secret this room is, there is a secret door in the western wall.\nWell, it seems it is only really secret from the other side of the door - \nyou can see it quite well from this side.\n\n*if streitaxtGenommen10 = false\n  On the floor you see a battleaxe!  But I wouldn't advise to battle the axe...\n  *line_break\n*if scrollGenommen10 = false\n\n  There is also some paperwork on the floor ...\n*if (streitaxtGenommen10=false) and (scrollGenommen10=false)\n  *image Raum10.GIF right\n*if (streitaxtGenommen10) and (scrollGenommen10=false)\n  *image Raum10S.GIF right\n*if (streitaxtGenommen10=false) and (scrollGenommen10)\n  *image Raum10A.GIF right\n*if (streitaxtGenommen10) and (scrollGenommen10)\n  *image Raum10V.GIF right\n*label start_Scene2\n*temp rdif\n*choice\n  #Change current attributes.\n    Drink one of the potions to change the corresponding attribute\n    so that you can employ the skills of that class all the better.\n    *choice\n      #Quaff strength potion\n        *set currentRound +1\n        *set rdif currentRound-lastStrDrink\n        *if (lastStrDrink = 0) or (rdif  > 5)\n         *set drinking \"Staerke\"\n         *goto drink\n        You can not drink another strength potion now!\n        *goto endDrink\n      #Quaff dexterity potion\n        *set currentRound +1\n        *set rdif currentRound-lastDexDrink\n        *if (lastDexDrink = 0) or (rdif  > 5)\n         *set drinking \"Geschicklichkeit\"\n         *goto drink\n        You can not drink another dexterity potion now!\n        *goto endDrink\n      #Quaff intelligence potion\n        *set currentRound +1\n        *set rdif currentRound-lastIntDrink\n        *if (lastIntDrink = 0) or (rdif  > 5)\n         *set drinking \"Intelligenz\"\n         *goto drink\n        You can not drink another intelligence potion now!\n        *goto endDrink\n      #Well, actually - I'm not really thirsty now\n        *set currentRound +1\n        Than don't drink - keep going...\n        *goto endDrink\n        *label drink\n        *temp schluckDif\n        So, how many draughts would you like to take?\n        *choice\n          #1\n           *set schlucke 1\n           *goto schlucke_set\n          #3\n           *set schlucke 3\n           *goto schlucke_set\n          #5\n           *set schlucke 5\n           *goto schlucke_set\n          #7\n           *set schlucke 7\n           *goto schlucke_set\n          #10\n           *set schlucke 10\n           *goto schlucke_set\n          #13\n           *set schlucke 13\n           *goto schlucke_set\n        *label schlucke_set    \n        *if (drinking = \"Staerke\")\n         *set schluckDif strSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set strSchlucke -schlucke\n         *set lastStrDrink currentRound\n         *set Staerke +schlucke\n         *set Geschicklichkeit -schlucke\n         *set Intelligenz -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n         *if (Geschicklichkeit\u003c5 )\n          *set Geschicklichkeit 5\n         *if (Geschicklichkeit>18 )\n          *set Geschicklichkeit 18\n         *if (Intelligenz\u003c5 )\n          *set Intelligenz 5\n         *if (Intelligenz>18 )\n          *set Intelligenz 18\n         ok strength = ${Staerke}\n        *if (drinking = \"Intelligenz\")\n         *set schluckDif intSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set intSchlucke -schlucke\n         *set lastIntDrink currentRound\n         *set Intelligenz +schlucke\n         *set Geschicklichkeit -schlucke\n         *set Staerke  -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n         *if (Geschicklichkeit\u003c5 )\n          *set Geschicklichkeit 5\n         *if (Geschicklichkeit>18 )\n          *set Geschicklichkeit 18\n         *if (Intelligenz\u003c5 )\n          *set Intelligenz 5\n         *if (Intelligenz>18 )\n          *set Intelligenz 18\n         Ok intelligence = ${Intelligenz}\n        *if (drinking = \"Geschicklichkeit\")\n         *set schluckDif dexSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set dexSchlucke -schlucke\n         *set lastDexDrink currentRound\n         *set Intelligenz -schlucke\n         *set Geschicklichkeit +schlucke\n         *set Staerke  -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n         *if (Geschicklichkeit\u003c5 )\n          *set Geschicklichkeit 5\n         *if (Geschicklichkeit>18 )\n          *set Geschicklichkeit 18\n         *if (Intelligenz\u003c5 )\n          *set Intelligenz 5\n         *if (Intelligenz>18 )\n          *set Intelligenz 18\n         Ok dexterity = ${Geschicklichkeit}\n        *label endDrink\n        *goto start_Scene1\n  #Go east\n    *set currentRound +1\n    *set tuereWOffen9 true\n    Ok, I go east... \n    *if raumTuerWda9=false\n      \n      Strange - this one seems to be an one-way door!\n    *choice\n      #Next\n         \n        *goto_scene maze9\n  #Go west\n    *set currentRound +1\n    *set g1 true\n    Ok, I go west...\n    *choice\n      #Next\n         \n        *goto_scene maze1_1\n  *if streitaxtGenommen10=false\n    #Take the battleaxe\n     You take the battleaxe. \n     *set streitaxtGenommen10 true\n     *set erfahrung +50\n     *goto weiter\n  *if scrollGenommen10=false\n    #Take the paperwork\n     You take a scroll and discover that it is a magic scroll of\n     \"Detect Magic\" (that might get handy further on).\n     *set scrollGenommen10 true\n     *set erfahrung +50\n     *set kannSpruchMagieEntdecken true\n     *goto weiter\n  #Apply skill\n    *set currentRound +1\n    What kind of skill would you like to use?\n    *choice\n      #Examine the room further ${suchen_help}\n       You look around the room...\n       \n       *if streitaxtGenommen10 = false\n         The battleaxe on the floor seems to be in good shape.\n         You are not really acquainted with axes in general - and battle axes are always\n         so erratic, all they keep thinking is 'battle, battle battle,...'.\n         But this one seems to be quite nice (and still in working order)! \n\n       *if scrollGenommen10 = false\n       \n         There is also something to read on the floor. Looks like a \n         magic scroll - perhaps you should get it?\n       \n       *goto weiter\n      #Search for traps/mechanism ${fallen_help}\n       You search very thoroughly...\n       *goto weiter\n      #Search for hidden doors ${tueren_help}\n       Everybody keeps searching... searching...\n       *goto weiter\n      #Go siliently ${schleichen_help}\n       You sneak....\n\n       and move very silently...\n       *goto weiter\n      #Act of strength ${ka_help}\n        You play the bodybuilder part... but nobody is really impressed!\n        *goto weiter\n      #Fight/Employ weapon ${kampf_help}\n        What exactly would you like to fight?\n        *goto weiter\n      #Pray to God\n        Don't you say. Now that you are stuck, you would like to pray?\n        \n        This smells slightly \"priestish\"...\n        \n        *goto help\n      #Cast a spell ${spruch_help}\n        You think about what spell might fit the occasion...\n        \n        *if Intelligenz\u003c15\n          Somehow the thoughts are swirling around your head. You are not able to \n          keep a magic thought in mind...\n\n          Probably you are a bit to dumb to work magic.          \n          *goto weiter\n        Magic is a delicate issue - you don't know all too many spells as yet.\n        Following is a list of spells you have access to right now:\n        *choice\n          *if kannSpruchMagieEntdecken\n             #Detect magic\n               With that spell I am able to detect all kinds of magic (at least in the near vicinity)!\n               *set kannSpruchMagieEntdecken false\n               *goto weiter\n          *if kannSpruchSpinnenklettern\n             #Spider climb\n               Ui, that is really sticky!\n               *set kannSpruchSpinnenklettern false\n               *goto weiter\n          *if kannSpruchAusbessern\n             #Mending\n               *set kannSpruchAusbessern false\n               *if (ausruestung) and (ausruestungRepariert=false)\n                 You mend your gear!\n                 \n                 Your sword is whole again!\n                 *set ausruestungRepariert true\n                 *set erfahrung +50\n                 *goto weiter\n               I will improve all my stuff - certainly!\n               *goto weiter\n          *if kannSpruchSprachenverstehen\n             #Tongues\n               If only someone would speak to me - I would surely understand...\n               *set kannSpruchSprachenverstehen false\n               *goto weiter\n          *if kannSpruchLicht\n             #Light\n               Hm, nice and bright now...\n               *set kannSpruchLicht false\n               *goto weiter\n          *if kannSpruchSchild\n             #Shield\n               Well, if I don't feel well protected now...\n               *set kannSpruchSchild false\n               *goto weiter\n          *if kannSpruchSpringen\n             #Jump\n               You feel like a grasshopper!\n               *set kannSpruchSpringen false\n               *goto weiter\n          *if kannSpruchTorzuhalten\n             #Hold gate\n               For some time the gate will hold...\n               \n               Hm, what gate was that?\n               *set kannSpruchTorzuhalten false\n               *goto weiter\n          *if kannSpruchFederfall\n             #Featherfall\n               You jump up in the air, and float very slowly back to earth.\n               \n               Cool!\n               \n               But what good does it do right now?\n               *set kannSpruchFederfall false\n               *goto weiter\n          *if kannSpruchMagischenGeschoss\n             #Magic missile\n               Woshh! Woshh!...\n               Arrows shoot from you fingertips...\n               *set kannSpruchMagischenGeschoss false\n               *goto weiter\n          #No spell\n            I thought otherwise, I do not want to work magic right now!\n            *goto weiter\n        *label weiter\n        *choice\n         #Next\n\n          *goto start_Scene1\n    *finish\n\n*label help\nWelcome to the ingame help-system.\n\n*choice\n  #Toggle hints\n    Hints are supposed to give the player a clue what \n    attribute level is required to employ a skill\n    successfully.\n    \n    *if hint\n\n      Hints are now switched off.\n      \n      *set hint false\n      *goto hintDone\n      \n    Hints are now switched on.\n\n    *set hint_used true\n    *set hint true\n    *label hintDone\n    *set  suchen_help \" \"\n    *if hint\n      *set  suchen_help \"(all)\"\n    *set  fallen_help \" \"\n    *if hint\n      *set  fallen_help \"(Thief >15)\"\n    *set  tueren_help \" \"\n    *if hint\n      *set  tueren_help \"(Thief >10)\"\n    *set  schleichen_help \" \"\n    *if hint\n      *set  schleichen_help \"(Thief >15)\"\n    *set  ka_help \" \"\n    *if hint\n      *set  ka_help \"(Warrior >15)\"\n    *set  kampf_help \" \"\n    *if hint\n      *set  kampf_help \"(Warrior >15)\"\n    *set  spruch_help \" \"\n    *if hint\n      *set  spruch_help \"(Magician>12)\"\n    *goto help\n  #Help for this scene\n    Are you sure? \n    \n    The fun part of the game is to figure out what to do and how to do it - yourself!\n\n    Do you really want to look at the hints?    \n    *choice\n     #Yes\n       *choice\n         #Hint 1\n           *set tipcount + 1\n           Take everyting!\n           \n           *goto hweiter\n         #Hint 2\n           *set tipcount + 1\n           \n           Use the door to the east now - in later versions of the\n           game it won't be available anymore - the game is just to easy now.\n           \n           If you like a challenge, you should leave it alone!\n           \n           *goto hweiter\n       *goto hweiter\n     #No\n       That is the spirit! Go forth try solving all\n       quests yourself!\n       *goto hweiter\n  #Take me back to the game\n    *goto start_Scene1\n\n*label hweiter\n*choice\n #Next\n\n  *goto help\n", "maze11": "*if currentRound > timeLimit\n  *line_break\n\n  Oh No!\n  \n  Your time has run out!\n  \n  Don't you know that you have to do the exam within a defined time limit?\n  Now your time has run out.\n  *goto_scene timeout\n\n*label start_Scene1\n\n*if priesterDa11=false\n  This is an homely furnished room. There is a carpet on the floor and a table in the middle.\n  Some comfortable looking stools are placed around it.\n  *line_break\n  The stools are cushioned and have armrests - and really look comfortable.\n  The light in the room is a bid more subdued than in the rooms you visited before.\n  *line_break\n  (now that you think about it, you have no knowledge where the light came from in the other rooms, it was\n  \"just there!\")\n\n  There are two doors leading from the room, one to the north, the other leading to west.  \n*if priesterDa11\n\n  *if priesterState11 = 1\n    This is a homely furnished room. There is a carpet on the floor and a table in the middle of the room.\n    Some comfortable looking stools are placed around it.\n    *line_break\n    The stools are cushioned and have armrests - and really look comfortable.\n    The light in the room is a bid more subdued than in the rooms you visited befor.\n    *line_break\n    (now that you think about it, you have no knowledge where the light came from in the other rooms, it was\n    \"just there!\")\n    *line_break\n    An old man sits at the table. He makes a very sympathetic impression on you, there are many laugh lines around his eyes, he has\n    got shiny white hair and a short trimmed - similar white - beard.\n  \n  *if priesterState11 = 1\n    \"Hello adventurer!\" he says.\n    *line_break\n    (his warm rich voice perfectly suits his appearance)\n  *if priesterState11 = 2\n    \"I guess you are here for the final exam? Yea, yea, the exams, they are always conducted here.\n    I know all about it. Many an adventurer I have seen. Some where gifted - some less gifted.\"\n    *line_break\n    \"You seem to have quite some talent! For that reason I would like to tell you the truth, I think you are able to cope with it.\n    Also I would like to make you an offer!\"\n    *fake_choice\n      #Ah! Interesting, continue good man!\n        \"You know, these exams are really nonsense. You did learn so much and now this humbug.\n        You know that nothing here really can hurt you. If you \"die\" you will wake up, and surely can try at another time again...\n        *line_break\n        (Notice from the author: just like in \"Inception\", only that I wrote this adventure about 20 years ago, perhaps I should\n        sue them!)\n        \n        \"The whole game is only useful for the amusement of the guildmasters. For entertainment of the triumvirate.\n        You should not cope with that. You should not be misused as a toy of the 'noble masters'.\n        *line_break\n        Furthermore, I know from reliable source, the triumvirate plans to suppress the people and wants to install serfdom.\n        This to guarantee their wealth and to be able to keep up 'not working'\"\n        *line_break\n        \n        \"What I am saying is the plain truth\"\n    *fake_choice\n      #Really? That is unheard of!\n        \"Yes, truly\"\n        *line_break\n        \"I myself 'PSSSSST' am a priest.\"\n    *fake_choice\n      #What, a priest? Depart at once - evil fiend!\n        \"No, please wait!\"\n        *line_break\n        \"I see, the indoctrination of the triumvirate even works for people as talented as you are ... what a shame...\"\n        \n        \"Wait - please let me explain!\"\n    *fake_choice\n      #Well now, say, what you must say...\n        \"Yes, I am a priest and I am proud about it!\n        A long time ago I was like you are now, I also took my exams - and I passed them!\n        But believe me, the exams life has in store for you are much harder then this here. There will be no\n        mere conjuror tricks. There will be no playing with colors on a lock - that is just a joke!\n\n        What kind of idiot would protect his 'treasures' with something like that?\n        \n        That is nearly like having to catch a 'flying key' and use it - or to win a game of chess.\n\n        What kind of healthy mind would protect his treasures with something, that can be broken by means which lie\n        in preparation in the room just next door?\"\n\n    *fake_choice\n      #Hm, you are right there - somewhere...\n        \"Yes, don't you know?\n        And here - in this place - it is exactly like that. The triumvirate mocks you!\n        \n        I - and a few others - have noticed that quite some time ago.\n        We departed and hope to bring truth, wisdom and knowledge back into the world.\"\n        \n        \"For that reason we are always looking for brave and talented people.\n        Believe me, seldom have I seen one as gifted as you are.\n        For that reason allow me to make you the following offer!\"\n\n    *fake_choice\n      #Offer? What kind of offer?\n        \"Join us!\"\n        \n        \"Become a priest like me, all your previously gained skills will help you.\n        Talented as you are, I will imply all my influence, that you will be regarded as\n        a level 2 character.\n\n        \"Help us to protect the world from the triumvirate!\"     \n        \n        \"What do you say?\"\n    *choice\n      #You have convinced me!\n        *label pende\n        FLASH!!!!\n        *choice\n         #Next\n           Stop, quit. \n           \n           The exam is at an end.\n\n           You are an unworthy traitor.   \n\n           The priest was naturally only a test. And you have failed miserably!\n           All your possession will be taken from you. A magic of \"Forgetfullness\" will be cast \n           (all your skills will be removed) and you will be banned for live to the land of \"Scorched earth\".\n           Should you ever dare to enter TriCla again you will be an outlaw. Everyone will be allowed to hunt you\n           down and kill you.\n           \n           So be it!\n           \n           (You wonder, if that test was after all not perhaps really the reality!)\n           *goto_scene ending2\n      #You are probably right, but I still think you are part of the exam, therefore I must fight you!\n        *goto pende \n      #Oh no, I don't fall for that intrigue, be gone evil fiend - BE GONE!\n        *set priesterState11 3\n        *set priesterNett11 false\n        \"You poor misguided sap!\"\n        \n        \"I can not allow the triumvirate such talented youths. You will not go any further!\"\n        \n        \"If you want to continue to the next room you have to get passed me!\"\n        \n        \"Be warned however - I am immune to magic. And I can not be harmed by your mere fists!\"\n        \n        \"Fight - and you will die!\"\n        *goto weiter \n      #Can I listen to that again - please!\n        (You are kidding - aren't you?)\n        *goto weiter \n    *goto weiter  \n  *if priesterState11 = 3\n        \n    Your HP: ${Gesundheit} \u003c-> Priest HP: ${priesterHP11}\n    *line_break\n    This is an unhomely furnished room. There is a dreadfully colored carpet on the floor and a table in the middle of the room.\n    Some uncomfortable looking stools are placed around it.\n    *line_break\n    The stools are made of bare, hard wood and have no armrests - and really look uncomfortable.\n    The light in the room is cold and you feel a shiver running down your spine. Isn't there even a groaning somewhere far off?\n\n    There are two doors leading from the room, one to the north, the other leading to west.  \n\n    There is a priest, his eyes are glittering in an evil, cold way and watching every move you make.\n    In his hands he holds a mace, an abhorrent aura engulfs him. He is standing right in front of the northern door.\n    It doesn't seem likely that he will just let you pass.\n  \n*if priesterDa11\n  *image Raum11.GIF right\n*if priesterDa11=false\n  *image Raum11N.GIF right\n\n*label start_Scene2\n*temp rdif\n*choice\n  #Change current attributes.\n    Drink one of the potions to change the corresponding attribute\n    so that you can employ the skills of that class all the better.\n    *choice\n      #Quaff strength potion\n        *set currentRound +1\n        *set rdif currentRound-lastStrDrink\n        *if (lastStrDrink = 0) or (rdif  > 5)\n         *set drinking \"Staerke\"\n         *goto drink\n        You can not drink another strength potion now!\n        *goto endDrink\n      #Quaff dexterity potion\n        *set currentRound +1\n        *set rdif currentRound-lastDexDrink\n        *if (lastDexDrink = 0) or (rdif  > 5)\n         *set drinking \"Geschicklichkeit\"\n         *goto drink\n        You can not drink another dexterity potion now!\n        *goto endDrink\n      #Quaff intelligence potion\n        *set currentRound +1\n        *set rdif currentRound-lastIntDrink\n        *if (lastIntDrink = 0) or (rdif  > 5)\n         *set drinking \"Intelligenz\"\n         *goto drink\n        You can not drink another intelligence potion now!\n        *goto endDrink\n      #Well, actually - I'm not really thirsty now\n        *set currentRound +1\n        Than don't drink - keep going...\n        *goto endDrink\n        *label drink\n        *temp schluckDif\n        So, how many draughts would you like to take?\n        *choice\n          #1\n           *set schlucke 1\n           *goto schlucke_set\n          #3\n           *set schlucke 3\n           *goto schlucke_set\n          #5\n           *set schlucke 5\n           *goto schlucke_set\n          #7\n           *set schlucke 7\n           *goto schlucke_set\n          #10\n           *set schlucke 10\n           *goto schlucke_set\n          #13\n           *set schlucke 13\n           *goto schlucke_set\n        *label schlucke_set    \n        *if (drinking = \"Staerke\")\n         *set schluckDif strSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set strSchlucke -schlucke\n         *set lastStrDrink currentRound\n         *set Staerke +schlucke\n         *set Geschicklichkeit -schlucke\n         *set Intelligenz -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n         *if (Geschicklichkeit\u003c5 )\n          *set Geschicklichkeit 5\n         *if (Geschicklichkeit>18 )\n          *set Geschicklichkeit 18\n         *if (Intelligenz\u003c5 )\n          *set Intelligenz 5\n         *if (Intelligenz>18 )\n          *set Intelligenz 18\n         ok strength = ${Staerke}\n        *if (drinking = \"Intelligenz\")\n         *set schluckDif intSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set intSchlucke -schlucke\n         *set lastIntDrink currentRound\n         *set Intelligenz +schlucke\n         *set Geschicklichkeit -schlucke\n         *set Staerke  -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n         *if (Geschicklichkeit\u003c5 )\n          *set Geschicklichkeit 5\n         *if (Geschicklichkeit>18 )\n          *set Geschicklichkeit 18\n         *if (Intelligenz\u003c5 )\n          *set Intelligenz 5\n         *if (Intelligenz>18 )\n          *set Intelligenz 18\n         Ok intelligence = ${Intelligenz}\n        *if (drinking = \"Geschicklichkeit\")\n         *set schluckDif dexSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set dexSchlucke -schlucke\n         *set lastDexDrink currentRound\n         *set Intelligenz -schlucke\n         *set Geschicklichkeit +schlucke\n         *set Staerke  -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n         *if (Geschicklichkeit\u003c5 )\n          *set Geschicklichkeit 5\n         *if (Geschicklichkeit>18 )\n          *set Geschicklichkeit 18\n         *if (Intelligenz\u003c5 )\n          *set Intelligenz 5\n         *if (Intelligenz>18 )\n          *set Intelligenz 18\n         Ok dexterity = ${Geschicklichkeit}\n        *label endDrink\n        *goto start_Scene1\n  #Go north\n    *set currentRound +1\n    *if priesterDa11\n      *if priesterNett11\n        The sympathetic man starts a conversation with you as you turn to the north.\n        \n        Magnetized you are listening to his every word. He tells about the history of the land, the weather and\n        many other things...\n        \n        ...really fascinating!\n        *goto weiter\n      *else\n        The priest holds you back.\n        \n        \"YOU CANNOT PASS!\"\n        \n        (and rams the back part of his great two handed mace in the ground just before his feet. Lightning flashes around its tip\n        and it wouldn't take much more and the earth would open up and the depth of Khazad Dhum would consume thee...)\n        \n        (or so...)\n        \n        He yells at you - \"prepare for battle!\"\n        \n        Ouch!\n        *line_break\n        (he hit you)\n        *set Gesundheit -1\n        *if Gesundheit \u003c 1\n        \n         Ohhh, that was to much... blackness engulfs you...\n         *goto_scene ending\n        \n        *goto weiter\n    You go north... finally...\n    *choice\n      #Next\n         \n        *goto_scene maze12\n  #Go west\n    *set currentRound +1\n    Ok, I go west...\n    *choice\n      #Next\n         \n        *goto_scene maze7\n  *if priesterState11=1\n    #Say \"Hello\" to the man!\n      *set currentRound +1\n      \"Hello!\"\n      *set priesterState11 2\n      *goto weiter\n  #Apply skill\n    *set currentRound +1\n    What kind of skill would you like to use?\n    *choice\n      #Examine the room further ${suchen_help}\n       You look around the room...\n       *goto weiter\n      #Search for traps/mechanism ${fallen_help}\n       You search very thoroughly...\n       *goto weiter\n      #Search for hidden doors ${tueren_help}\n       Everybody keeps searching... searching...\n       *goto weiter\n      #Go siliently ${schleichen_help}\n       You sneak....\n\n       and move very silently...\n       *goto weiter\n      #Act of strength ${ka_help}\n        You play the bodybuilder part... but nobody is really impressed!\n        *goto weiter\n      #Fight/Employ weapon ${kampf_help}\n        *if priesterState11 != 3\n          What exactly would you like to fight?\n          *goto weiter\n        Ok, priest now I will get back at you.\n        \n        What do you want to fight with?\n        *choice\n          #Fist\n            You are thrashing the priest with your fists.\n            \n            but his aura seems to protect him from all harm.\n            *goto kampfdone\n          *if (ausruestung) and (kleineSteine)\n            #Sling\n              *if Geschicklichkeit \u003c10\n                You miss the priest. \n                \n                He is to agile - he keeps avoiding the pebbles - dumbass!\n                \n                *goto kampfdone\n              *if Geschicklichkeit \u003c15\n                You hit! Not well - but better than not at all!\n                *set priesterHP11 -2\n                *set erfahrung +20\n                *goto kampfdone\n              You hit! \n              \n              Great aiming!\n              \n              Great hit!\n              *set priesterHP11 -5\n              *set erfahrung +50\n              *goto kampfdone\n          *if ausruestungRepariert\n            #Sword (repaired)\n              *label kampfWaffe\n              *if Staerke \u003c10\n                You miss the priest. \n                \n                You do not hit strong enough, he is able to dodge the strikes!\n                \n                *goto kampfdone\n              *if Staerke \u003c15\n                You hit! Not well - but better than not at all!\n                *set priesterHP11 -2\n                *set erfahrung +20\n                *goto kampfdone\n              You hit! \n              \n              Great aiming!\n              \n              Great hit!\n              *set priesterHP11 -5\n              *set erfahrung +50\n              *goto kampfdone\n          *if streitaxtGenommen10\n            #Battleaxe\n              *goto kampfWaffe\n        *label kampfdone\n        \n        Ouch!\n        *line_break\n        (he hit you)\n        *set Gesundheit -1\n        *if Gesundheit \u003c 1\n        \n         Ohhh, that was to much... blackness engulfs you...\n         *goto_scene ending\n        *if priesterHP11 \u003c= 0\n        \n          You have done it. \n          \n          The evil and disreputable priest is no more.\n\n          Just after the last hit, he slumps down. Moments later his body and all his belongings vanish in a flash.\n          *set priesterDa11 false\n          *set priesterState11 4\n        *goto weiter\n      #Pray to God\n        Don't you say. Now that you are stuck, you would like to pray?\n        \n        This smells slightly \"priestish\"...\n        \n        *goto help\n      #Cast a spell ${spruch_help}\n        You think about what spell might fit the occasion...\n        \n        *if Intelligenz\u003c15\n          Somehow the thoughts are swirling around your head. You are not able to \n          keep a magic thought in mind...\n\n          Probably you are a bit to dumb to work magic.          \n          *goto weiter\n        Magic is a delicate issue - you don't know all too many spells as yet.\n        Following is a list of spells you have access to right now:\n        *choice\n          *if kannSpruchMagieEntdecken\n             #Detect magic\n               With that spell I am able to detect all kinds of magic (at least in the near vicinity)!\n               *set kannSpruchMagieEntdecken false\n               *goto weiter\n          *if kannSpruchSpinnenklettern\n             #Spider climb\n               Ui, that is really sticky!\n               *set kannSpruchSpinnenklettern false\n               *goto weiter\n          *if kannSpruchAusbessern\n             #Mending\n               *set kannSpruchAusbessern false\n               *if (ausruestung) and (ausruestungRepariert=false)\n                 You mend your gear!\n                 \n                 Your sword is whole again!\n                 *set ausruestungRepariert true\n                 *set erfahrung +50\n                 *goto weiter\n               I will improve all my stuff - certainly!\n               *goto weiter\n n out!\n  \n  Don't you know that you have to do the exam within a defined time limit?\n  Now your time has run out.\n  *goto_scene timeout\n\n*label start_Scene1\n\n*if licht15=false\n  You see...\n  \n  nothing.\n  \n  It is pitch black!\n\n  *image Raum15.GIF right\n\n*if licht15\n  Hm, you really only see a few walls.\n\n  *if labForschen15 \u003c1\n    But since you are not THAT lazy you walk a bit into the room - and discover\n    that it might be some kind of labyrinth.\n    Naturally you can't overview the whole thing - or have even examined it in any length.\n    But you guess the room is bigger - way bigger - than any other room you have seen here before.\n  \n  *if vonOstenKommend15\n    From here you can see two exits, one in the southeast the other in the northeast.\n    *if wegNachWestenFrei15\n      You know there is another exit to the west.\n    *if wegNachWestenFrei15=false\n      From your intuition you think there might be another exit to the west but as of now\n      you can't reach it, since the labyrinth is in your way.\n  \n  *if vonOstenKommend15=false\n    From here you can only see one exit in the west.\n    From your intuition (or your knowledge) you think there might be two further exits to the east.\n  \n  *image Raum15L.GIF right\n*label start_Scene2\n*temp rdif\n*choice\n  #Change current attributes.\n    Drink one of the potions to change the corresponding attribute\n    so that you can employ the skills of that class all the better.\n    *choice\n      #Quaff strength potion\n        *set currentRound +1\n        *set rdif currentRound-lastStrDrink\n        *if (lastStrDrink = 0) or (rdif  > 5)\n         *set drinking \"Staerke\"\n         *goto drink\n        You can not drink another strength potion now!\n        *goto endDrink\n      #Quaff dexterity potion\n        *set currentRound +1\n        *set rdif currentRound-lastDexDrink\n        *if (lastDexDrink = 0) or (rdif  > 5)\n         *set drinking \"Geschicklichkeit\"\n ou just discovered a key - a GREEN key!\n          *set gruenerSchluessel true          \n          *set erfahrung +100\n          \n       *goto weiter\n      #Search for traps/mechanism ${fallen_help}\n       You search very thoroughly...\n       *goto weiter\n      #Search for hidden doors ${tueren_help}\n       Everybody keeps searching... searching...\n       *goto weiter\n      #Go siliently ${schleichen_help}\n       You sneak....\n\n       and move very silently...\n       *goto weiter\n      #Act of strength ${ka_help}\n        You play the bodybuilder part... but nobody is really impressed!\n        *goto weiter\n      #Fight/Employ weapon ${kampf_help}\n        What exactly would you like to fight?\n        *goto weiter\n      #Pray to God\n        Don't you say. Now that you are stuck, you would like to pray?\n        \n        This smells slightly \"priestish\"...\n        \n        *goto help\n      #Cast a spell ${spruch_help}\n        You think about what spell might fit the occasion...\n        \n        *if Intelligenz\u003c15\n          Somehow the thoughts are swirling around your head. You are not able to \n          keep a magic thought in mind...\n\n          Probably you are a bit to dumb to work magic.          \n          *goto weiter\n        Magic is a delicate issue - you don't know all too many spells as yet.\n        Following is a list of spells you have access to right now:\n        *choice\n          *if kannSpruchMagieEntdecken\n             #Detect magic\n               With that spell I am able to detect all kinds of magic (at least in the near vicinity)!\n               *set kannSpruchMagieEntdecken false\n               *goto weiter\n          *if kannSpruchSpinnenklettern\n             #Spider climb\n               Ui, that is really sticky!\n               *set kannSpruchSpinnenklettern false\n               *goto weiter\n          *if kannSpruchAusbessern\n             #Mending\n               *set kannSpruchAusbessern false\n               *if (ausruestung) and (ausruestungRepariert=false)\n                 You mend your gear!\n                 \n                 Your sword is whole again!\n                 *set ausruestungRepariert true\n                 *set erfahrung +50\n                 *goto weiter\n               I will improve all my stuff - certainly!\n               *goto weiter\n          *if kannSpruchSprachenverstehen\n             #Tongues\n               If only someone would speak to me - I would surely understand...\n               *set kannSpruchSprachenverstehen false\n               *goto weiter\n          *if kannSpruchLicht\n             #Light\n               Hm, nice and bright now...\n               *set kannSpruchLicht false\n               *set licht15 true\n               *goto weiter\n          *if kannSpruchSchild\n             #Shield\n               Well, if I don't feel well protected now...\n               *set kannSpruchSchild false\n               *goto weiter\n          *if kannSpruchSpringen\n             #Jump\n               You feel like a grasshopper!\n               *set kannSpruchSpringen false\n               *goto weiter\n          *if kannSpruchTorzuhalten\n             #Hold gate\n               For some time the gate will hold...\n               \n               Hm, what gate was that?\n               *set kannSpruchTorzuhalten false\n               *goto weiter\n          *if kannSpruchFederfall\n             #Featherfall\n               You jump up in the air, and float very slowly back to earth.\n               \n               Cool!\n               \n               But what good does it do right now?\n               *set kannSpruchFederfall false\n               *goto weiter\n          *if kannSpruchMagischenGeschoss\n             #Magic missile\n               Woshh! Woshh!...\n               Arrows shoot from you fingertips...\n               *set kannSpruchMagischenGeschoss false\n               *goto weiter\n          #No spell\ ome\n           endurance!\n           \n           *goto hweiter\n         #Hint 4\n           *set tipcount + 1\n           \n           There is a key to be found here!\n           \n           *goto hweiter\n       *goto hweiter\n     #No\n       That is the spirit! Go forth try solving all\n       quests yourself!\n       *goto hweiter\n  #Take me back to the game\n    *goto start_Scene1\n\n*label hweiter\n*choice\n #Next\n\n  *goto help\n", "maze16": "*if currentRound > timeLimit\n  *line_break\n\n  Oh No!\n  \n  Your time has run out!\n  \n  Don't you know that you have to do the exam within a defined time limit?\n  Now your time has run out.\n  *goto_scene timeout\n\n*label start_Scene1\n\n*if tuerGefunden16=false\n  This room is a dead end. There is only one exit, the way you came in.\n\nIn the centre of the room there is a very fragile seeming chest.\n*if (truheOffen16=false) and (truheKaputt16=false)\n  The chest is not only very fragile, it is really VERY fragile!\n  \n*if truheOffen16\n\n  The chest is open.\n  Within it you find a scroll!\n  *set schriftrolleGefunden16 true\n  *if getrunken16=false\n    Within you find a delicious looking potion. That potion clearly wants to be drunken!\n    \n*if truheKaputt16 \n\n  The chest is broken. The contents (obviously a fragile potion in a fragile vessel)\n  is likewise broken.\n  *line_break\n  Some idiot obviously did something idiotic!\n  *line_break\n  \n  *if (getrunken16=false)\n    (Remark of the author:\n    *line_break\n    Regrettably you will not be able to get out anymore - \n    you needed that potion!)\n  \n*if getrunken16\n\n  The western wall begins to shimmer bluish. That might be magic!\n  You discover a secret door to the west. You believe you can only\n  see that door because of the potion you drank!\n\n*if tuerGefunden16=false\n  *image Raum16.GIF right\n*if tuerGefunden16\n  *image Raum16G.GIF right\n\n*label start_Scene2\n*temp rdif\n*choice\n  #Change current attributes.\n    Drink one if  > 5)\n         *set drinking \"Staerke\"\n         *goto drink\n        You can not drink another strength potion now!\n        *goto endDrink\n      #Quaff dexterity potion\n        *set currentRound +1\n        *set rdif currentRound-lastDexDrink\n        *if (lastDexDrink = 0) or (rdif  > 5)\n         *set drinking \"Geschicklichkeit\"\n         *goto drink\n        You can not drink another dexterity potion now!\n        *goto endDrink\n      #Quaff intelligence potion\n        *set currentRound +1\n        *set rdif currentRound-lastIntDrink\n        *if (lastIntDrink = 0) or (rdif  > 5)\n         *set drinking \"Intelligenz\"\n         *goto drink\n        You can not drink another intelligence potion now!\n        *goto endDrink\n      #Well, actually - I'm not really thirsty now\n        *set currentRound +1\n        Than don't drink - keep going...\n        *goto endDrink\n        *label drink\n        *temp schluckDif\n        So, how many draughts would you like to take?\n        *choice\n          #1\n           *set schlucke 1\n           *goto schlucke_set\n          #3\n           *set schlucke 3\n           *goto schlucke_set\n          #5\n           *set schlucke 5\n           *goto schlucke_set\n          #7\n           *set schlucke 7\n           *goto schlucke_set\n          #10\n           *set schlucke 10\n           *goto schlucke_set\n          #13\n           *set schlucke 13\n           *goto schlucke_set\n        *label schlucke_set    \n        *if (drinking = \"Staerke\")\n         *set schluckDif strSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set strSchlucke -schlucke\n         *set lastStrDrink currentRound\n         *set Staerke +schlucke\n         *set Geschicklichkeit -schlucke\n         *set Intelligenz -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n tart_Scene1\n  #Go south\n    *set currentRound +1\n    *set hundschlaeft2 true\n    A familiar looking room! \n    *goto_scene maze1_1\n  #Go east\n    *set currentRound +1\n    *line_break\n    *if hundlebt2 and hundschlaeft2\n      Going east makes noise - the hound wakes up!\n    *set hundschlaeft2 false\n    *line_break\n    *if hundEingesperrt2 \n     You go through the door heading east...\n     *choice\n      #Next\n      \n       *goto_scene maze3\n    *if hundlebt2 = false\n     You go through the door heading east...\n     *choice\n      #Next\n      \n       *set raum3CameFrom4 false\n       *goto_scene maze3\n    *set Gesundheit -1\n    The sentinel is awake and won't let you pass!\n\n    The hound snaps at you, ouch!\n    \n    Ouch!\n    \n    *if Gesundheit \u003c 1\n      Ohhh, that was to much... blackness engulfs you...\n      *goto_scene ending\n    *goto weiter\n  *if schalterGefunden2\n    #Use switch \n      *if (hundlebt2) and (hundschlaeft2=true)\n        While walking up to the switch, you make so much noice - the hound wakes up!\n      *set hundschlaeft2 false\n      *if schalter2\n         *set schalter2 false\n         The cage is lifted to the ceiling!\n         *if (hundEingesperrt2) and (hundlebt2)\n            The dog is no longer confined!\n            *set hundEingesperrt2 false\n            *goto weiter\n         *if (hundEingesperrt2) and (hundlebt2=false)\n            The dead dog is no longer confined!\n         *set hundEingesperrt2 false\n         *goto weiter\n      *set schalter2 true\n      *set schaltergenutzt2 true\n      *if (hundlebt2)\n        From the ceiling a cage is lowering. The dog watches the cage with suspicion and scepticism -\n\n        and jumps to safety just in the last moment. \n\n        Growling it eyes you!\n        *goto weiter\n      *if (hundlebt2=false)\n        From the ceiling a cage is lowering. The dead dog does not watch the cage ... because it is dead!\n        The dead dog is now confined!\n      *goto weiter\n      \n  #Apply skill\n    *set currentRound +1\n    What kind of skill would you like to use?\n    *choice\n      #Examine the room further ${suchen_help}\n        *line_break\n        *if hundlebt2 and hundschlaeft2\n          Further examination makes noise - the hound wakes up!\n        *set hundschlaeft2 false\n        *line_break\n        *if schalterGefunden2=false\n          Ahh! You didn't notice before! In the centre of the northern wall there is a small switch!\n        *if schalterGefunden2\n          You look around the room...\n        *set schalterGefunden2 true\n        *goto weiter\n      #Search for traps/mechanism ${fallen_help}\n        You search very thoroughly...\n        *line_break\n        *if hundlebt2 and hundschlaeft2\n          Searching makes noise - the hound wakes up!\n        *line_break\n        *set hundschlaeft2 false\n        *line_break\n        *goto weiter\n      #Search for hidden doors ${tueren_help}\n        Everybody keeps searching... searching...\n        *line_break\n        *if hundlebt2 and hundschlaeft2\n          Searching makes noise - the hound wakes up!\n        *line_break\n        *set hundschlaeft2 false\n        *goto weiter\n      #Go siliently ${schleichen_help}\n        Fascinating idea!\n        *line_break\n        *if hundEingesperrt2\n          You sneak arround the room, you but you do not activate the switch again,\n          so the dog is kept in its cage and you had a nice little silent walk!\n          *goto weiter\n        *if Geschicklichkeit > 15\n         *if hundschlaeft2\n          *if schalter2\n             *set schalter2 false\n             *set hundEingesperrt2 false\n             The cage moves (silently) upwards, nobody notices nothing!\n             *goto weiter\n          *set schalter2 true\n          *set schaltergenutzt2 true\n          What inspiration! You move silently across the room to the northern wall, you unnoticed activate the\n          small switch.\n\n          From the ceiling a cage is lowering. The dog is still asleep, it doesn't run away -\n          slowly - veeerry slowly und silently the cage is lowering... directly above the dog...\n          \n          Yes! It is confined!\n\n          The way to the eastern door is now free!\n          *set erfahrung +100\n          *set hundEingesperrt2 true\n \n          Well done!\n          *goto schl1\n         *else\n          *if schalter2\n             *set schalter2 false\n             *set hundEingesperrt2 false\n             The cage moves (silently) upwards, nobody notices nothing!\n             *goto weiter\n          *set schalter2 true\n          *set schaltergenutzt2 true\n          You move silently across the room to the northern wall, you activate the\n          small switch.\n          \n          From the ceiling a cage is lowering. The dog watches the cage with suspicion and scepticism -\n  \n          and jumps to safety just in the last moment. \n\n          Growling it eyes you!\n          *goto schl1\n         *label schl1\n         *line_break\n         *goto gesch1\n        *else\n         *set hundschlaeft2 false\n         You try moving silently across the room.\n         *line_break\n         *set Gesundheit -2\n         But you are not agile enough - the sentinel notices you - and snaps at you!\n         \n         Ouch!\n         *if Gesundheit \u003c 1\n         \n          Ohhh, that was to much... blackness engulfs you...\n          *goto_scene ending\n         *goto gesch1\n        *label gesch1\n        *set hundschlaeft2 false\n        *goto weiter\n      #Act of strength ${ka_help}\n        You play the bodybuilder part... but nobody is really impressed!\n        *line_break\n        *if hundlebt2 and hundschlaeft2\n          Building your body does not go unnoticed - the hound wakes up!\n        *set hundschlaeft2 false\n        *line_break\n        *goto weiter\n      #Fight/Employ weapon ${kampf_help}\n        *if hundlebt2=false\n          What else would you fight now?\n          *goto weiter\n        You try doing battle with the poor dog!\n        *set hundschlaeft2 false\n        *if Staerke > 15\n         *set hundlebt2 false\n         The poor old hound\n         *line_break \n         - murdered by brute force\n  \n         - Murderer!\n         *set Gesundheit -1\n         During the battle the dog snaps at you...\n         \n         Ouch!\n         *if Gesundheit \u003c 1\n\n          Ohhh, that was to much... blackness engulfs you...\n          *goto_scene ending\n         *goto k1\n        *else\n         The poor hound - is hunted down - it is cornered ... but you are too weak to actually kill it!\n\n         During the battle the dog snaps at you...\n         \n         OUCH!\n         *set Gesundheit -3\n         *if Gesundheit \u003c 1\n\n          Ohhh, that was to much... blackness engulfs you...\n          *goto_scene ending\n\n         *goto k1\n        *label k1\n        *goto weiter\n      #Pray to God\n        Don't you say. Now that you are stuck, you would like to pray?\n        \n        This smells slightly \"priestish\"...\n        \n        *goto help\n      #Cast a spell ${spruch_help}\n        You think about what spell might fit the occasion...\n        \n        *if Intelligenz\u003c15\n          Somehow the thoughts are swirling around your head. You are not able to \n          keep a magic thought in mind...\n\n          Probably you are a bit to dumb to work magic.          \n          *goto weiter\n        Magic is a delicate issue - you don't know all too many spells as yet.\n        Following is a list of spells you have access to right now:\n        *choice\n          *if kannSpruchMagieEntdecken\n             #Detect magic\n               With that spell I am able to detect all kinds of magic (at least in the near vicinity)!\n               *set kannSpruchMagieEntdecken false\n               *goto weiter\n          *if kannSpruchSpinnenklettern\n             #Spider climb\n               Ui, that is really sticky!\n               *set kannSpruchSpinnenklettern false\n               *goto weiter\n          *if kannSpruchAusbessern\n             #Mending\n               *set kannSpruchAusbessern false\n               *if (ausruestung) and (ausruestungRepariert=false)\n                 You mend your gear!\n                 \n                 Your sword is whole again!\n                 *set ausruestungRepariert true\n                 *set erfahrung +50\n                 *goto weiter\n               I will improve all my stuff - certainly!\n               *goto weiter\n          *if kannSpruchSprachenverstehen\n             #Tongues\n               If only someone would speak to me - I would surely understand...\n               *set kannSpruchSprachenverstehen false\n               *goto weiter\n          *if kannSpruchLicht\n             #Light\n               Hm, nice and bright now...\n               *set kannSpruchLicht false\n               *goto weiter\n          *if kannSpruchSchild\n             #Shield\n               Well, if I don't feel well protected now...\n               *set kannSpruchSchild false\n               *goto weiter\n          *if kannSpruchSpringen\n             #Jump\n               You feel like a grasshopper!\n               *set kannSpruchSpringen false\n               *goto weiter\n          *if kannSpruchTorzuhalten\n             #Hold gate\n               For some time the gate will hold...\n               \n               Hm, what gate was that?\n               *set kannSpruchTorzuhalten false\n               *goto weiter\n          *if kannSpruchFederfall\n             #Featherfall\n               You jump up in the air, and float very slowly back to earth.\n               \n               Cool!\n               \n               But what good does it do right now?\n               *set kannSpruchFederfall false\n               *goto weiter\n          *if kannSpruchMagisch      The colors are: RED, GREEN, BROWN, LILAC\n        \n        You can adjust three colors. The current combination of colors is:\n        ${farbe1}, ${farbe2}, ${farbe3}\n        *set mechanismusGefunden6 true\n        *goto weiter\n      #Search for hidden doors ${tueren_help}\n       Everybody keeps searching... searching...\n       *goto weiter\n      #Go siliently ${schleichen_help}\n       You sneak....\n\n       and move very silently...\n       *goto weiter\n      #Act of strength ${ka_help}\n        You play the bodybuilder part... but nobody is really impressed!\n        *goto weiter\n      #Fight/Employ weapon ${kampf_help}\n        What exactly would you like to fight?\n        *goto weiter\n      #Pray to God\n        Don't you say. Now that you are stuck, you would like to pray?\n        \n        This smells slightly \"priestish\"...\n        \n        *goto help\n      #Cast a spell ${spruch_help}\n        You think about what spell might fit the occasion...\n        \n        *if Intelligenz\u003c15\n          Somehow the thoughts are swirling around your head. You are not able to \n          keep a magic thought in mind...\n\n          Probably you are a bit to dumb to work magic.          \n          *goto weiter\n        Magic is a delicate issue - you don't know all too many spells as yet.\n        Following is a list of spells you have access to right now:\n        *choice\n          *if kannSpruchMagieEntdecken\n             #Detect magic\n               With that spell I am able to detect all kinds of magic (at least in the near vicinity)!\n               *set kannSpruchMagieEntdecken false\n               *goto weiter\n          *if kannSpruchSpinnenklettern\n             #Spider climb\n               Ui, that is really sticky!\n               Well since you can climb that well now, you might as well climb to the top of the pillar.\n               *set kannSpruchSpinnenklettern false\n\n               *goto saeule_untersuchen\n               *goto weiter\n          *if kannSpruchAusbessern\n             #Mending\n               *set kannSpruchAusbessern false\n               *if (ausruestung) and (ausruestungRepariert=false)\n                 You mend your gear!\n                 \n                 Your sword is whole again!\n                 *set ausruestungRepariert true\n                 *set erfahrung +50\n                 *goto weiter\n               I will improve all my stuff - certainly!\n               *goto weiter\n          *if kannSpruchSprachenverstehen\n             #Tongues\n               If only someone would speak to me - I would surely understand...\n               *set kannSpruchSprachenverstehen false\n               *goto weiter\n          *if kannSpruchLicht\n             #Light\n               Hm, nice and bright now...\n               *set kannSpruchLicht false\n               *goto weiter\n          *if kannSpruchSchild\n             #Shield\n               Well, if I don't feel well protected now...\n               *set kannSpruchSchild false\n               *goto weiter\n          *if kannSpruchSpringen\n             #Jump\n               You feel like a grasshopper!\n               *set kannSpruchSpringen false\n               *goto weiter\n          *if kannSpruchTorzuhalten\n             #Hold gate\n               For some time the gate will hold...\n               \n               Hm, what gate was that?\n               *set kannSpruchTorzuhalten false\n               *goto weiter\n          *if kannSpruchFederfall\n             #Featherfall\n               You jump up in the air, and float very slowly back to earth.\n               \n               Cool!\n               \n               But what good does it do right now?\n               *set kannSpruchFederfall false\n               *goto weiter\n          *if kannSpruchMagischenGeschoss\n             #Magic missile\n               Woshh! Woshh!...\n               Arrows shoot from you fingertips...\n               *set kannSpruchMagischenGeschoss false\n               *goto weiter\n          #No spell\n            I thought otherwise, I do not want to work magic right now!\n            *goto weiter\n        *label weiter\n        *choice\n         #Next\n\n          *goto start_Scene1\n    *finish\n\n\n*label help\nWelcome to the ingame help-system.\n\n*choice\n  #Toggle hints\n    Hints are supposed to give the player a clue what \n    attribute level is required to employ a skill\n    successfully.\n    \n    *if hint\n\n      Hints are now switched off.\n      \n      *set hint false\n      *goto hintDone\n      \n    Hints are now switched on.\n\n    *set hint_used true\n    *set hint true\n    *label hintDone\n    *set  suchen_help \" \"\n    *if hint\n      *set  suchen_help \"(all)\"\n    *set  fallen_help \" \"\n    *if hint\n      *set  fallen_help \"(Thief >15)\"\n    *set  tueren_help \" \"\n    *if hint\n      *set  tueren_help \"(Thief >10)\"\n    *set  schleichen_help \" \"\n    *if hint\n      *set  schleichen_help \"(Thief >15)\"\n    *set  ka_help \" \"\n    *if hint\n      *set  ka_help \"(Warrior >15)\"\n    *set  kampf_help \" \"\n    *if hint\n      *set  kampf_help \"(Warrior >15)\"\n    *set  spruch_help \" \"\n    *if hint\n      *set  spruch_help \"(Magician>12)\"\n    *goto help\n  #Help for this scene\n    Are you sure? \n    \n    The fun part of the game is to figure out what to do and how to do it - yourself!\n\n    Do you really want to look at the hints?    \n    *choice\n     #Yes\n       *choice\n         #Hint 1\n           *set tipcount + 1\n           First you should examine the room!\n           \n           *goto hweiter\n         #Hint 2\n           *set tipcount + 1\n           \n           The pillar, that certainly is IT. There is something atop of it.\n           \n           *goto hweiter\n         #Hint 3\n           *set tipcount + 1\n           \n           You should certainly climb the pillar!\n           \n           *goto hw
