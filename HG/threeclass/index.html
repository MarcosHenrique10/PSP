\n\n  Oh No!\n  \n  Your time has run out!\n  \n  Don't you know that you have to do the exam within a defined time limit?\n  Now your time has run out.\n  *goto_scene timeout\n\n*label start_Scene1\n\n*if ausruestung=false\n  All your equipment is scattered around the floor.\n  The sling, your sword (seems to be broken though...), your thieving utilities, the spellbook\n  and all the other goodies!\n*if ausruestung\n  The room is empty\n\n*if raumTuerWda9\n There are doors to the north and west.\n \n The door to the west is BROWN in color.\n \n*if raumTuerWda9 = false\n There is a door in the northern wall.\n\n*if (ausruestung=false) and (raumTuerWda9)\n  *image Raum9.GIF right\n*if (ausruestung=false) and (raumTuerWda9=false)\n  *image Raum9OT.GIF right\n*if (ausruestung) and (raumTuerWda9)\n  *image Raum9OS.GIF right\n*if (ausruestung) and (raumTuerWda9=false)\n  *image Raum9OA.GIF right\n\n*label start_Scene2\n*temp rdif\n*choice\n  #Change current attributes.\n    Drink one of the potions to change the corresponding attribute\n    so that you can employ the skills of that class all the better.\n    *choice\n      #Quaff strength potion\n        *set currentRound +1\n        *set rdif currentRound-lastStrDrink\n        *if (lastStrDrink = 0) or (rdif  > 5)\n         *set drinking \"Staerke\"\n         *goto drink\n        You can not drink another strength potion now!\n        *goto endDrink\n      #Quaff dexterity potion\n        *set currentRound +1\n        *set rdif currentRound-lastDexDrink\n        *if (lastDexDrink = 0) or (rdif  > 5)\n         *set drinking \"Geschicklichkeit\"\n         *goto drink\n        You can not drink another dexterity potion now!\n        *goto endDrink\n      #Quaff intelligence potion\n        *set currentRound +1\n        *set rdif currentRound-lastIntDrink\n        *if (lastIntDrink = 0) or (rdif  > 5)\n         *set drinking \"Intelligenz\"\n         *goto drink\n        You can not drink another intelligence potion now!\n        *goto endDrink\n      #Well, actually - I'm not really thirsty now\n        *set currentRound +1\n        Than don't drink - keep going...\n        *goto endDrink\n        *label drink\n        *temp schluckDif\n        So, how many draughts would you like to take?\n        *choice\n          #1\n           *set schlucke 1\n           *goto schlucke_set\n          #3\n           *set schlucke 3\n           *goto schlucke_set\n          #5\n           *set schlucke 5\n           *goto schlucke_set\n          #7\n           *set schlucke 7\n           *goto schlucke_set\n          #10\n           *set schlucke 10\n           *goto schlucke_set\n          #13\n           *set schlucke 13\n           *goto schlucke_set\n        *label schlucke_set    \n        *if (drinking = \"Staerke\")\n         *set schluckDif strSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set strSchlucke -schlucke\n         *set lastStrDrink currentRound\n         *set Staerke +schlucke\n         *set Geschicklichkeit -schlucke\n         *set Intelligenz -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n         *if (Geschicklichkeit\u003c5 )\n          *set Geschicklichkeit 5\n         *if (Geschicklichkeit>18 )\n          *set Geschicklichkeit 18\n         *if (Intelligenz\u003c5 )\n          *set Intelligenz 5\n         *if (Intelligenz>18 )\n          *set Intelligenz 18\n         ok strength = ${Staerke}\n        *if (drinking = \"Intelligenz\")\n         *set schluckDif intSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set intSchlucke -schlucke\n         *set lastIntDrink currentRound\n         *set Intelligenz +schlucke\n         *set Geschicklichkeit -schlucke\n         *set Staerke  -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n         *if (Geschicklichkeit\u003c5 )\n          *set Geschicklichkeit 5\n         *if (Geschicklichkeit>18 )\n          *set Geschicklichkeit 18\n         *if (Intelligenz\u003c5 )\n          *set Intelligenz 5\n         *if (Intelligenz>18 )\n          *set Intelligenz 18\n         Ok intelligence = ${Intelligenz}\n        *if (drinking = \"Geschicklichkeit\")\n         *set schluckDif dexSchlucke-schlucke\n         *if schluckDif \u003c 0\n           There are not as many draughts left!\n           *goto endDrink\n         *set dexSchlucke -schlucke\n         *set lastDexDrink currentRound\n         *set Intelligenz -schlucke\n         *set Geschicklichkeit +schlucke\n         *set Staerke  -schlucke\n         *if (Staerke\u003c5 )\n          *set Staerke 5\n         *if (Staerke>18 )\n          *set Staerke 18\n         *if (Geschicklichkeit\u003c5 )\n          *set Geschicklichkeit 5\n         *if (Geschicklichkeit>18 )\n          *set Geschicklichkeit 18\n         *if (Intelligenz\u003c5 )\n          *set Intelligenz 5\n         *if (Intelligenz>18 )\n          *set Intelligenz 18\n         Ok dexterity = ${Geschicklichkeit}\n        *label endDrink\n        *goto start_Scene1\n  #Go north\n    *set currentRound +1\n    *set raum4CameFrom9 true\n    Ok, I go north...\n    *choice\n      #Next\n         \n        *goto_scene maze4\n      \n  *if ausruestung=false\n    #Take your equipment\n     You gather all your belongings. A pity the nice sword is broken. A mended sword\n     would be much more useful!\n     *set currentRound +1\n     *set ausruestung true\n     *set diebesWerkzeug true\n     *set erfahrung +100\n     *goto weiter\n  *if raumTuerWda9\n    #Go west\n      *set currentRound +1\n      *if tuereWOffen9\n        Ok, I go west...\n        *choice\n          #Next\n         \n           *goto_scene maze10\n      \n      As you go near the western door, a voice can be heard:\n      \n      Say the name, the original colors of the wheel say - or the first part of my own color.\n\n      Beware - you have only one (ONE) try!      \n      *choice\n        #Ehm, I don't have a clue - I think I might rather come back later!\n\n          Yes, truly if one doesn't know what to say - one should for once keep silent!\n          *goto weiter\n        #Certainly - here we go...\n          Say the name:\n          *input_text name9        \n          *if (name9 = \"Malban\")\n            Impressive!\n            *set tuereWOffen9 true\n            *set erfahrung +200\n            *choice\n              #Next\n             \n               *goto_scene maze10\n            \n            (The door opens!)\n          *else\n            Ha, stupid - that was wrong!\n            *set raumTuerWda9 false\n            *goto weiter\n  #Apply skill\n    *set currentRound +1\n    What kind of skill would you like to use?\n    *choice\n      #Examine the room further ${suchen_help}\n       You look around the room...\n       *goto weiter\n      #Search for traps/mechanism ${fallen_help}\n       You search very thoroughly...\n       *goto weiter\n      #Search for hidden doors ${tueren_help}\n       Everybody keeps searching... searching...\n       *goto weiter\n      #Go siliently ${schleichen_help}\n       You sneak....\n\n       and move very silently...\n       *goto weiter\n      #Act of strength ${ka_help}\n        You play the bodybuilder part... but nobody is really impressed!\n        *goto weiter\n      #Fight/Employ weapon ${kampf_help}\n        What exactly would you like to fight?\n        *goto weiter\n      #Pray to God\n        Don't you say. Now that you are stuck, you would like to pray?\n        \n        This smells slightly \"priestish\"...\n        \n        *goto help\n      #Cast a spell ${spruch_help}\n        You think about what spell might fit the occasion...\n        \n        *if Intelligenz\u003c15\n          Somehow the thoughts are swirling around your head. You are not able to \n          keep a magic thought in mind...\n\n          Probably you are a bit to dumb to work magic.          \n          *goto weiter\n        Magic is a delicate issue - you don't know all too many spells as yet.\n        Following is a list of spells you have access to right now:\n        *choice\n          *if kannSpruchMagieEntdecken\n             #Detect magic\n               With that spell I am able to detect all kinds of magic (at least in the near vicinity)!\n               *set kannSpruchMagieEntdecken false\n               *goto weiter\n          *if kannSpruchSpinnenklettern\n             #Spider climb\n               Ui, that is really sticky!\n               *set kannSpruchSpinnenklettern false\n               *goto weiter\n          *if kannSpruchAusbessern\n             #Mending\n               *set kannSpruchAusbessern false\n               *if (ausruestung) and (ausruestungRepariert=false)\n                 You mend your gear!\n                 \n                 Your sword is whole again!\n                 *set ausruestungRepariert true\n                 *set erfahrung +50\n                 *goto weiter\n               I will improve all my stuff - certainly!\n               *goto weiter\n          *if kannSpruchSprachenverstehen\n             #Tongues\n               If only someone would speak to me - I would surely understand...\n               *set kannSpruchSprachenverstehen false\n               *goto weiter\n          *if kannSpruchLicht\n             #Light\n               Hm, nice and bright now...\n               *set kannSpruchLicht false\n               *goto weiter\n          *if kannSpruchSchild\n             #Shield\n               Well, if I don't feel well protected now...\n               *set kannSpruchSchild false\n               *goto weiter\n          *if kannSpruchSpringen\n             #Jump\n               You feel like a grasshopper!\n               *set kannSpruchSpringen false\n               *goto weiter\n          *if kannSpruchTorzuhalten\n             #Hold gate\n               For some time the gate will hold...\n               \n               Hm, what gate was that?\n               *set kannSpruchTorzuhalten false\n               *goto weiter\n          *if kannSpruchFederfall\n             #Featherfall\n               You jump up in the air, and float very slowly back to earth.\n               \n               Cool!\n               \n               But what good does it do right now?\n               *set kannSpruchFederfall false\n               *goto weiter\n          *if kannSpruchMagischenGeschoss\n             #Magic missile\n               Woshh! Woshh!...\n               Arrows shoot from you fingertips...\n               *set kannSpruchMagischenGeschoss false\n               *goto weiter\n          #No spell\n            I thought otherwise, I do not want to work magic right now!\n            *goto weiter\n        *label weiter\n        *choice\n         #Next\n\n          *goto start_Scene1\n    *finish\n\n*label help\nWelcome to the ingame help-system.\n\n*choice\n  #Toggle hints\n    Hints are supposed to give the player a clue what \n    attribute level is required to employ a skill\n    successfully.\n    \n    *if hint\n\n      Hints are now switched off.\n      \n      *set hint false\n      *goto hintDone\n      \n    Hints are now switched on.\n\n    *set hint_used true\n    *set hint true\n    *label hintDone\n    *set  suchen_help \" \"\n    *if hint\n      *set  suchen_help \"(all)\"\n    *set  fallen_help \" \"\n    *if hint\n      *set  fallen_help \"(Thief >15)\"\n    *set  tueren_help \" \"\n    *if hint\n      *set  tueren_help \"(Thief >10)\"\n    *set  schleichen_help \" \"\n    *if hint\n      *set  schleichen_help \"(Thief >15)\"\n    *set  ka_help \" \"\n    *if hint\n      *set  ka_help \"(Warrior >15)\"\n    *set  kampf_help \" \"\n    *if hint\n      *set  kampf_help \"(Warrior >15)\"\n    *set  spruch_help \" \"\n    *if hint\n      *set  spruch_help \"(Magician>12)\"\n    *goto help\n  #Help for this scene\n    Are you sure? \n    \n    The fun part of the game is to figure out what to do and how to do it - yourself!\n\n    Do you really want to look at the hints?    \n    *choice\n     #Yes\n       *choice\n         #Hint 1\n           *set tipcount + 1\n           It is a big difference, whether you enter this room from\n           the northern or the western door!\n           \n           *goto hweiter\n         #Hint 2\n           *set tipcount + 1\n           \n           If you come from north - you should solve the riddle!\n           \n           *goto hweiter\n         #Hint 3\n           *set tipcount + 1\n           \n           In order to solve the riddle you should read a book!\n           But it'd better be the right one.\n           \n           *goto hweiter\n       *goto hweiter\n     #No\n       That is the spirit! Go forth try solving all\n       quests yourself!\n       *goto hweiter\n  #Take me back to the game\n    *goto start_Scene1\n\n*label hweiter\n*choice\n #Next\n\n  *goto help\n", "ramblings": "*label start_Scene1\nHere you find some more \"random\" information that might help or\nmay be interesting!\n\n*choice\n  #General hints\n    You should at least explore each room once.\n    You will not always find interesting things that way, but it\n    is an easy way to get going!\n\n    If your skills seem not to work, it might be that your attributes\n    are to low.\n\n    While starting you might use your attribute-potions a bit\n    lavishly. But once you advance further you should keep an eye on your supply.\n    If a potion has gone dry - it might just be that you\n    can not reach the exit anymore.      \n\n    The map of the game is fix.    \n\n    There is nothing random!    \n\n    Many situations can be solved in more than one way.\n\n    Some items MUST be found, without them you won't go much further!\n    *choice\n      #Next\n       \n       *goto start_Scene1\n  #FAQ\n    Send your questions!\n    \n    In the next version I will than fill in a FAQ!\n    \n    BUG!\n    *line_break\n    One thing right now. The \"Show Stats\" button sometimes resets a situation, this\n    must be fixed by the \"Choice\"-engine developers.\n\n    It does not happen always, and no real harm is done. It might just be, that\n    you have to do the last action you did - befor hitting that button - again.\n\n    *choice\n      #Next\n       \n       *goto start_Scene1\n\n  #Master\n    My best game stats are:\n\n    Quaffs taken: 89\n    *line_break\n    Experience: 2580    \n    *line_break\n    Rounds: 166\n    *line_break\n\n    These values were achieved by playing, not calculating. May be a better score is\n    even possible, if I forgot anything.\n    *choice\n      #Next\n       \n       *goto start_Scene1\n  #Go back\n    *goto_scene startup\n", "scoring": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nHere are your current values:\n*line_break:\n*if hint_used\n  *set erfahrung * 80\n  *set erfahrung / 100\nExperience: ${erfahrung}\n*line_break:\nHealth: ${Gesundheit}\n*temp getrunken\n*set getrunken 0\n*set getrunken getrunken + (40-strSchlucke)\n*set getrunken getrunken + (40-intSchlucke)\n*set getrunken getrunken + (40-dexSchlucke)\n*line_break:\nQuaffs taken: ${getrunken}\n*line_break:\nTurns played: ${currentRound}\n\n*if tipcount > 0\n  To get this far you unfortunately made use of hints.\n  \n  You used ${tipcount} hints!\n\n*if hint_used\n  Because hints were used, 20% of your experience are removed from your scoring!\n\n*if erfahrung \u003c 100\n  That was not really an earnest try - was it?\n  \n  Rank: Loser! (You did NOT pass the exam!)\n  *goto no_share\n*if erfahrung \u003c 500\n  Well now, at least you have seen some rooms!\n  Perhaps next time?\n  \n  Rank: Beginner! (You did NOT pass the exam!)\n  *goto no_share\n*if erfahrung \u003c 1000\n  That wasn't too bad - actually.\n  But honestly - would you say it was enough?\n  \n  Rank: Advanced beginner (You did NOT pass the exam!)\n  *goto no_share\n\nCongratialations! You PASSED the exam!\n\n*if erfahrung \u003c 1100\n  Well ... only just so....\n  \n  Rank: Not a beginner anymore.\n  *goto done_here\n\n*if erfahrung \u003c 1500\n  Well done! A little here a little there...!\n  \n  Rank: Advanced!\n  *goto done_here\n\n*if erfahrung \u003c 2000\n  Clever! Really well done.\n  Only some small things left.\n  \n  Rank: Expert!\n  *goto done_here\n\nWoW! You really mastered the exam!\n  \nRank: Master!\n\n*label done_here\n*label no_share\n*label end\n\n*page_break End\nWe hope you've enjoyed playing [i]Land of Three Classes.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nWelcome to TriCla\n\nOn this fantastic world, three classes have come into vogue. There is bit of history as to how that happened, but that will be told at another place and time.\nFor now it is enough to say: \"That is all right!\"\n\nFollowing classes are in fashion right now:\n*line_break\n\"Thief\" (attribute: Dexterity), \"Warrior\" (attribute: Strength), \"Magician\"  (attribute: Intelligence)\n\nBecause of this adventure being a \"solo\"-adventure and there is no (easy) way to control three persons at once, the author \nuses a \"trick\".\nThe protagonist can \"switch\" between his main attributes.\nEach attribute can be changed by a potion of \"attribute change\" (dexterity / strength / intelligence).\nTo the same degree one attribute is enhanced the other two will be reduced (till some minimum).\nYou have a supply of 40 quaffs for each type of potion. The minimum an attribute can be reduced to is 5, the maximum 18.\n\nEach potion has a cool down (timer). Within that cool down you are not able to take another sip of the\nsame kind of potion. This cool down is kept even after drinking another kind of potion.\n\nWith that system the adventurer can (with a cool down) sort of switch between the classes and their skills.\nAll skills (like disarming a trap, using weapons...) of all classes are available at all times, but whether or not you can \napply them successfully heavily depends on the corresponding class-attributes!\n\nLike any good roleplaying game your character also has a health attribute. You start with 10 health points. \nThese may be reduced (fighting, falling, poison...). If you ever reach 0 points the exam will be interrupted and you will\nbe judged. \n\nThe adventure is an exam. After passing the exam you will be a fully fledged member of the society \nof \"TriCla\", as of now you are still regarded as a pupil.\nIn order to pass the exam successfully you must be agile, clever and creative and solve the different tests. You must ponder\nwhich skill to use in each situation.\nTo pass the exam you must use your skills and gather experience. You need at least 1000 experience points to pass the \nexam successfully. There also is a time limit - but you must discover that by yourself. \n\nIt would be particulary impressive if you would master the whole exam and reach the exit!\n\n*image 3Class.jpg right\n\n*page_break\n\n*script changeBackgroundColor(\"black\")\n\nThis is the introduction. You can't do anything wrong yet! Be glad and live! \n\nYou can view some further information about TriCla - or you can jump right into the exam - as you like!\n\n*fake_choice\n  #Some history about TriCla\n  #What does a warrior do?\n  #What about thieves, aren't they evil?\n  #Magician - what is that?\n  #Further information, help, other\n  #Now - I really want to get started!\n\n*script changeBackgroundColor(\"sepia\")\n\n*set currentRound 2\nThis is again a nearly empty room. The walls, the floor etc are made of the same \nmaterials as in the last room\n(do you remember? - worked stone!).\nTo the east there is a door, which is guarded by a guard dog.\n\nWhich is sleeping right now (Luckily - it appears to be quite strong).\n\n*image Raum2.GIF right\n\n*fake_choice\n  #Change current attributes.\n  #Go south\n  #Go east\n  #Apply skill\n\n*set Staerke 17\n*set Intelligenz 5\n*set Geschicklichkeit 5\n*set Gesundheit 9\n*set Erfahrung 100\n*set strSchlucke 33\n\nThis room is a bit \"different\".\n*line_break\nThere is a small catwalk from the east to the west. About 5 meter deep pits are on both sides of it.\nIt seem there are some kind of slimy animals crawling on the floor.\n\nThere are three doors, one on the western side, one on the eastern side, these doors are connected via the mentioned\ncatwalk.\n\nTo the south there is a third door painted RED. The southern door lies on the other side of the pit.\n\n*image Raum4.GIF right\n\n*fake_choice\n    #Change current attributes.\n    #Go east\n    #Go west\n    #Go south\n    #Apply skill\n", "startup": "*title Land of three classes - The Exam\n*author Christopher Salomon\n*create dexterity 5\n*create  strength 5\n*create  intelligence 5\n*create  currentRound 0\n*create  lastDexDrink 0\n*create  lastStrDrink 0\n*create  lastIntDrink 0\n*create  health 10\n* n of \"attribute change\" (dexterity / strength / intelligence).\nTo the same degree one attribute is enhanced the other two will be reduced (till some minimum).\nYou have a supply of 40 quaffs for each type of potion. The minimum an attribute can be reduced to is 5, the maximum 18.\n\nEach potion has a cool down (timer). Within that cool down you are not able to take another sip of the\nsame kind of potion. This cool down is kept even after drinking another kind of potion.\n\nWith that system the adventurer can (with a cool down) sort of switch between the classes and their skills.\nAll skills (like disarming a trap, using weapons...) of all classes are available at all times, but whether or not you can \napply them successfully heavily depends on the corresponding class-attributes!\n\nLike any good roleplaying game your character also has a health attribute. You start with 10 health points. \nThese may be reduced (fighting, falling, poison...). If you ever reach 0 points the exam will be interrupted and you will\nbe judged. \n\nThe adventure is an exam. After passing the exam you will be a fully fledged member of the society \nof \"TriCla\", as of now you are still regarded as a pupil.\nIn order to pass the exam successfully you must be agile, clever and creative and solve the different tests. You must ponder\nwhich skill to use in each situation.\nTo pass the exam you must use your skills and gather experience. You need at least 1000 experience points to pass the \nexam successfully. There also is a time limit - but you must discover that by yourself. \n\nIt would be particulary impressive if you would master the whole exam and reach the exit!\n\n*image 3Class.jpg right\n\n*set debug false\n*set hint false\n*set hint_used false\n*set debug_used false\n\n*set schaltergenutzt2 false\n*set timeLimit 200\n*set Geschicklichkeit 10\n*set Staerke 10\n*set Intelligenz 10\n*set currentRound 0\n*set lastDexDrink 0\n*set lastStrDrink 0\n*set lastIntDrink 0\n*set Gesundheit 10\n*set schlucke 0\n*set strSchlucke 40\n*set intSchlucke 40\n*set dexSchlucke 40\n*set sprueche 6\n*set g1 false\n*set schalter2 false\n*set erfahrung 0\n*set hundlebt2 true\n*set hundschlaeft2 true\n*set schalterGefunden2 false\n*set kleineSteine false\n*set hundEingesperrt2 false\n*set gitterMitteUnten3 true\n*set gitterwestenunten3 false\n*set stegNordSued4 false\n*set schluessel4 false\n*set diebesWerkzeug false\n*set magieEntdeckt5 false\n*set kannSpruchMagieEntdecken false\n*set raumUntersucht5 false\n*set kannSpruchSpinnenklettern false\n*set kannSpruchAusbessern false\n*set kannSpruchSprachenverstehen false\n*set kannSpruchLicht false\n*set kannSpruchSchild false\n*set kannSpruchSpringen false\n*set kannSpruchTorzuhalten false\n*set kannSpruchFederfall false\n*set kannSpruchMagischenGeschoss false\n*set spruchRolleVorhanden5 true\n*set mechanismusGefunden6 false\n*set regalFarbe7 \"LILA\"\n*set fachFarbe7 \"LILA\"\n*set buchFarbe7 \"LILA\"\n*set brown7 false\n*set gruen7 false\n*set geheimgang7 false\n*set ausruestung false\n*set getrunken8 false\n*set raum9CameFrom10 false\n*set raum4CameFrom9 false\n*set raumTuerWda9 true \n*set tuereWOffen9 false\n*set name9 \"Nix\"\n*set ausruestungRepariert false\n*set raum3CameFrom4 false\n*set streitaxtGenommen10 false\n*set scrollGenommen10 false\n*set priesterDa11 true\n*set priesterNett11 true\n*set priesterState11 1\n*set priesterHP11 10\n*set kannRolleLesen12 false\n*set hatRolleGesehen12 false\n*set weissVonSchalter13 false\n*set kannSpracheVerstehen13 false\n*set gitterUnten13 true\n*set gitterVerbogen13 false\n*set licht15 false\n*set wegNachWestenFrei15 false\n*set vonOstenKommend15 true\n*set labForschen15 0\n*set gruenerSchluessel false\n*set scrollGefunden14 false\n*set blauerSchluessel false\n*set tuerGefunden16 false\n*set truheOffen16 false\n*set truheKaputt16 false\n*set getrunken16 false\n*set schriftrolleGefunden16 false\n*set falleEntschaerft17 false\n*set stegDa18 false\n*set zielscheibeGefunden1 undred years ago, the land was still called \"The land of Priests oppulence\", at that time (you may have guessed)\n    cruel priests of an equally cruel deity ruled the lands.\n    A brave adventure party made it their mission to bring back freedom to the people and kill all the evil priests and banish the\n    cruel deity.\n    After many battles, intrigues, victories and defeats - finally they had made it, they fulfilled their vows.\n    Since that time the land is known as the \"Land of three classes\" - or short TriCla. The rulership is handled by a triumvirate, \n    always consisting of a brave warrior, an agile thief and a clever magician.\n    \n    Since that time the profession of clerics is failing. Always less people are consecrated and even the Gods of\n    healing and knowledge do not find many followers anymore. Since people now view all kind of religious devotion with\n    scepticism.\n\n    There are rumours that there is an underground organisation, which conspires against the wisdom of TriCla.\n    They propagate false reports and try to find followers which are traitors to the wisdom of the triumvirate.\n    \n    *choice\n      #Next\n       Again...\n       *goto start_Scene1\n  #What does a warrior do?\n    Your capabilities lie in tasks that require bravery, strength and skilful use of weapons.\n    Cowardice does not have any meaning in your world. But know also, that a living warrior is worth\n    much more than a dead one. If a battle is futile than it is no shame do withdraw or even to surrender.\n    \n    But - if a goal can ONLY be reached by battle or death, the fight is inevitable and the battle must go on even to the bitter end.\n    Decide wisely, whether a fight is worth it - or not.\n        \n    Do not battle without reason, do not kill without reason.\n    Remember: Warriors are the most peace loving people on the world. They love weapons and a battle - but they dread \n    senseless slaughter!\n\n    Primary commandment of all classes:\n    *line_break\n    Team spirit. \"All for one - one for all\" that is the motto.\n    *line_break\n    The one who abandons his comrades is worth nothing in our society - and he can not expect assistance.\n    Traitors to the own profession or to the wisdom of the triumvirate can not expect mercy.\n    *choice\n      #Next\n       Again...\n       *goto start_Scene1\n  #What about thieves, aren't they evil?\n    Even the profession of the thief is well regarded; his skills lie in the domain of dexterity and agility,\n    be it silent movement, opening of doors, climbing obstacles or anything else.\n    It is no shame to keep things that one may \"find\".\n    Be it hidden gems, treasures which lie around or wallets which are carried all to openly.\n    A thief regards these occasions as challenges to demonstrate his skills and to prove to himself that he is able\n    to perform such tasks. The matter is not that a thief wants to enrich himself, he only wants to prove that he\n    himself is more agile and more clever than other people.\n    The whole life is a game - and the one who plays it better - has the advantages.\n    But friends and partners should be hold in respect - nobody would do any business with a dishonest thief!\n \n    Primary commandment of all classes:\n    *line_break\n    Team spirit. \"All for one - one for all\" that is the motto.\n    *line_break\n    The one who abandons his comrades is worth nothing in our society - and he can not expect assistance.\n    Traitors to the own profession or to the wisdom of the triumvirate can not expect mercy.\n    *choice\n      #Next\n       Again...\n       *goto start_Scene1\n  #Magician - what is that?\n    Magicians are not as much interested in worldly matters as other people.\n    A magician doesn't need strength to work magic. Dexterity is useful but not for climbing or anything the like - a magician uses\n    dexterity (if at all) to draw mystic symbols or write down complex runes.\n    A magician is not a fighter. A spell which offers knowledge is always more valuable than a combat spell.\n    His position in a group is not that of a fighter - that task is for the warriors. \n    *line_break\n    - He MIGHT use combat magic if pressed and if threatened - but only as a last resort. From no fight will a magician\n    gain worthwhile knowledge.\n    *line_break\n    He is always looking out for more knowledge. He wants to discover correlations between elements to be able to control them...\n    Everything a magician discovers will be written down in his (spell-) book. Should that book be lost, he will be\n    bereft of all his knowledge. He will be helpless like a beetle lying on its back.\n \n    Primary commandment of all classes:\n    *line_break\n    Team spirit. \"All for one - one for all\" that is the motto.\n    *line_break\n    The one who abandons his comrades is worth nothing in our society - and he can not expect assistance.\n    Traitors to the own profession or to the wisdom of the triumvirate can not expect mercy.\n    *choice\n      #Next\n       Again...\n       *goto start_Scene1\n  #Further information, help, other\n     *goto_scene ramblings\n  #Now - I really want to get started!\n   *if debug\n     *goto_scene maze19\n   *goto_scene maze1\n   *goto start_Scene1\n", "timeout": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"A
