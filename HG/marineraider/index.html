\t\t\t#\"Peanuts and raisins.\"\n\t\t\t\t\t\"My choice too,\" Scott says and passes over the little delights. \"Just like being at a ballpark.\"\n\n\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\"The song goes 'buy me some peanuts and crackerjack, I don't care if I ever come back...' Private Landry sings pointedly. \"Don't you have baseball in Wisconsin?\"\t\n\n\t\t\t\t\t\t\"Sure, but we also have kielbasa and sauerkraut at the games instead of crackerjack,\" Scott replies.\n\n\t\t\t\t\t\t\"Sauerkraut is called liberty cabbage now.\"\n\n\t\t\t\t\t\t\"No one told me,\" Scott complains halfheartedly.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\tYou manage to wolf down the last of the tasty little feast just before the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"How about some of those hard candies?\"\n\t\t\t\t\t\"There you go, LT,\" Scott says, then tosses the packet of candies over. \"Better than chocolate cause they don't melt in the heat.\"\n\n\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\"Yeah, but the day's not over yet,\" Private Landry chimes in.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\tWith a bit of sweet in your mouth, nothing feels quite so bad. Even when the Japanese arrive at the jungle-line that seems like a mere annoyance.\n\t\t\t\t\t*goto base_firefight_2\t\t\t\n\t\t\t\t#\"Nothing for now. You eat first.\"\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tOfficers can plan and command, but it is the enlisted ranks who fight, and die when the bullets start to fly. This meal could well be their last.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThe men come first. They have to because they are the ones who will fight, and perhaps die.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe men must come first. A little hunger is nothing in comparison to a \tbullet and, besides, your stomach can always lean against your spine.\t\t\t\t\t\t\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese interrupt this collegial meal when they arrive at the jungle-line.\n\t\t\t\t\t*set morale +1\n\t\t\t\t\t*goto base_firefight_2\n\t#The enemy must be getting closer. Better keep my men at their posts.\n\t\t*goto base_firefight_2\t\t\n\n*label time_enough_to_sweat\n\n*set situation 2\n*if time >6\n\tA shot rings out! Private Hagan slumps over!\n\t*set casualties +1\n\t*set hagan 5\n\t*set morale -1\n\t*goto base_firefight_2\n*else\n\t*if time =0\n\t\tYour men get to work with a will.\n\t*if time =1\n\t\tThe tide ebbs out as your men labor on.\n\t*if time =2\n\t\tSun, sand, and sweat. Salt too, as your men work hard.\n\t*if time =3\n\t\tOnly the pounding surf can be heard above the grunts of Marine labor.\n\t*if time =4\n\t\tThe tide ceases to ebb. The coral reefs lurk just below the surface of the water amid the churn of surf.\n\t*if time =5\n\t\tLots of sand but less sweat as your men take an even strain to the work.\n\t*if time =6\n\t\tAll is calm. Your men continue their steady efforts.\n\t*goto defend_beach_base\n\n*label victory!\n\n*page_break\n\nThe last of the enemy has been routed. Nothing stands in your platoon's way of thorough raid of the installation. Every scrap of paper is collected. Each functional piece of Japanese equipment is carried out. Everything else is burned to slag or cinder.\n\n*if ishiro =3\n\tA brief detour returns you to the still bound Ishiro. The enemy lieutenant's disposition has not been improved by half a day alone in the jungle. However, once a bit of water is splashed across the officer's sweat stained brow he recovers his wits. You position him in the midst of the column to resume the march and man manages to murmur something grateful about your return.\n\nThe western beach is right where you left it, cliffs and all. In the distance waits a dark shape, a destroyer silhouetted against the setting sun.\n*if schley =1\n\tA black cloud of smoke billows from amidships. That float-plane must have done a number on your ride home.\n\t*line_break\n\t*line_break\n*if schley =2\n\tThick black clouds of smoke billows from amidships as a fire dances on deck. That float-plane ravaged your ride home.\n\t*line_break\n\t*line_break\nA bright flare launched from the cliff top signals out your victory and the Schley signals back a heartfelt congratulations.\n\n*if landry =2\n\tDown on the beach, a pale private Landry lies motionless under the palm tree where you left him. Rifle cradled in hand, he could be napping, waiting only for a companion to rouse him so he can take his turn as sentry.\n\t*if time \u003c3\n\t\tThen the wounded Marine draws in a ragged breath and Scott breathes a hearty sigh of relief that no one mocks him for.\n\t\t*set landry 1\t\t\n\t\t*set morale +1\n\t*if time >2\n\t\t*line_break\n\t\t*line_break\n\t\tWhen Scott nudges Landry's foot, the Private does not stir.\t\n\n\t\tMarines do not cry. But something has clearly gotten into many an eye.\n\t*line_break\n\t*line_break\n*if ishiro =1\n\tCorporal Ransom stands to attention as you approach. His captive, IJN Lieutenant Ishiro Hasebe, does not look up. Instead the Japanese officer continues to watch the endless surf.\n\t\t\n\t\"No trouble, Lieutenant,\" Ransom replies to the obvious question and then pats the stock of his Thompson meaningfully.\n\t*line_break\n\t*line_break\n*if gerhard =1\n\tHolben tightens Gerhard's blood soaked bandage. The Corporal's breath has gone shallow and skin wan. The sooner you can get him aboard the Schley, the better.\n\t*line_break\n\t*line_break\n*if gerhard =3\n\tActing-jack Holben squats beside the body of Corporal Gerhard beneath the shade of a palm tree. The dead man's features have been covered respectfully by a bone-white handkerchief.\n\t*line_break\n\t*line_break\n*set commendation_7 1\n*if commendation_4 =1\n\t*set commendation_4 0\n*if commendation_6 =1\n\t*set commendation_6 0\n*if gerhard =4\n\t*set gerhard 3\nThe Eureka boats motor in through the surf and your Marines hurriedly pile in over the gunnels.\n\n*if ishiro =3\n\tSimmons suddenly cries out. You look over to find the Private with a hand plastered to a freshly bloody brow. Behind him, Ishiro races for the jungle, still clutching a fistful of rock.\n\t*choice\n\t\t#Shoot to kill.\n\t\t\tWith a single order your platoon opens fire. The enemy lieutenant doesn't make it to cover.\n\t\t\t*set ishiro 2\n\t\t\t*goto finale\n\t\t#Fire a warning shot.\n\t\t\t*if weapon =2\n\t\t\t\tYou slam a round off a nearby rock, drive shards into his legs and tumble him down. Baker drags the wounded enemy officer back to the landing craft. Only then do you give the order to motor back to the waiting Schley.\n\t\t\t\t*goto finale \n\t\t\t*if weapon =1\n\t\t\t\tYou fire a pointed burst into the air. Ishiro throws himself into the sand and remains there until Baker picks him back up.\n\n\t\t\t\tOnce your prisoner is back in the boat, you give the order and leave the little island behind.\n\t\t\t\t*goto finale\n\t\t\t*if weapon =0\n\t\t\t\tBy the time you level your BAR, Ishiro has slipped into the jungle. A final, ineffective, burst is all you can offer as the enemy officer disappears.\n\n\t\t\t\tThere is only one thing left to do. You give the order and leave the little island behind.\n\t\t\t\t*set ishiro 2\n\t\t\t\t*goto finale\n\t\t\t*else\n\t\t\t\tA final sputter from your propellant does no more than smoke the air and turn sand to glass. At the edge of the jungle Ishiro flashes you a grim look before he disappears into the green.\n\t\t\t\t*set ishiro 2\n\t\t\t\t*goto finale\n\t\t#Let him go\n\t\t\t*if character =2\n\t\t\t\tIt seems a petty thing to bring Ishiro down now, after all you've been through. He can stay and rule the entire island if he likes.\n\t\t\t*if character =1\n\t\t\t\tThere is no point in shooting. Ishiro is going to be stranded on this island in the middle of nowhere until the war ends. A year, two years? You don't envy the man that wait or his diet. \n\t\t\t*if character =0\n\t\t\t\tThere is no point to shooting Ishiro. The odds are against him getting picked back up and if the Japanese do send a ship, that will give the U.S. navy or air-force something to play with. And if Ishiro ends up waiting out the war on this lonely island, that's fine too.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\tYou concentrate on getting your men aboard and away from Toga Island. Minutes later the last Marine boot lifts from the beach sand and the Eureka boats motor your raiders back toward the safety of the Schley.\n\t\t\t*set ishiro 2\n\t\t\t*goto finale\n*if ishiro =1\n\tYour prize prisoner gazes back toward the island as Simmons helps him into the landing boat. \"What a shame this will be,\" Ishiro mutters under his breath, resigned to a different life.\n\n\tMinutes later the last Marine boot lifts from the Toga island sand and the Eureka boats motor your raiders back toward the safety of the Schley.\n\t*goto finale\t\n*if ishiro =2\n\tMinutes later the last Marine boot lifts from the Toga island. The Eureka boats motors your raiders back toward the safety of the Schley. You cast one last look back, catch sight of a figure at jungle's edge. Ishiro stares at you across the pounding surf, snaps off a formal salute, and then withdraws from sight.\n\t*goto finale\n*if ishiro =0\n\tMinutes later the last Marine boot lifts from the Toga island. The Eureka boats motor your raiders back toward the safety of the Schley.\n\t*goto finale\n*else\n\t*goto finale\n\n*label finale\n*page_break\nIt is a short trip back to the island of Espiritu Santo.\n*if schley =0\n\tMajor Carlson is waiting for you as the Schley eases into pier.\n*if schley =1\n\tMajor Carlson is waiting for you as the battered and blackened Schley limps into pier.\n*line_break\n*line_break\n*if commendation_7 =1\n\t*set commendation_4 0\n\t*set commendation_5 0\n\t*set commendation_6 0\n\t*set commendation +3\n*if commendation_2 =1\n\t*set commendation +1\n*if commendation_3 =1\n\t*set commendation +1\n*if commendation_4 =1\n\t*set commendation +1\n*if schley =1\n\t*set commendation -1\n*if ishiro =1\n\t*set commendation +1\n*if ishiro =3\n\t*set commendation +1\n*if casualties =0\n\t*set commendation_8 1\n*if commendation_5 =1\n\t*set commendation +1\n*if casualties =1\n\t*if hagan =2\n\t\t*set commendation_8 1\n*if commendation_6 =1\n\t*set commendation +1\n*if commendation_8 =1\n\t*set commendation +1\n*if gerhard =2\n\t*set gerhard 1\n*if condemnation_1 =1\n\tHe doesn't look happy.\n\n\t\"Lieutenant, the Navy gave me a preliminary report on your activities,\" Carlson says. \"You apparently withdrew without engaging the enemy with anything involving the vigor expected of a Marine Corps officer. It is with a heavy heart that I am temporarily removing you from command of your unit until such time an inquiry can be completed. That is all.\"\n\t*choice\n\t\t#\"Sir, I protest!\"\n\t\t\t\"Alright then,\" Carlson says. \"Write up your protest. I'll even read it. But you've been given an order. So, go.\"\n\t\t\t*goto relieved_of_command\n\t\t#\"I did as I thought best.\"\n\t\t\t\"As I indicated, this will be reviewed,\" Carlson says. \"Now, go.\"\n\t\t\t*goto relieved_of_command\n\t\t#Shit.\n\t\t\tYou made the call. You suffer the burn. That is apparently how things will go.\n\t\t\t*goto relieved_of_command\n\n*else\n\t\"I received your radio message concerning the raid,\" \n\t*if commendation \u003c1\n\t\tCarlson shakes his head in disbelief. \"I expected better from your Marines.\n\t\t*if supply_submarine =0\n\t\t\tWe might as well have just asked the Air Force to bomb the island.\"\n\t\t*if supply_submarine >0\n\t\t\tWe might as well have just asked the Air Force to bomb the island or the navy to blockade by picking off the resupply submarine.\"\n\t*if commendation =1\n\t\tCarlson says and glares your way. \"I won't second guess your decisions, Lieutenant.\n\t\t*if supply_submarine =0\n\t\t\tBut I will be looking into your report.\"\n\t\t*if supply_submarine >0\n\t\t\tBut I will be looking into your report. About the only thing you did right was figuring out the resupply schedule so the Navy can have some fun.\"\n\t*if commendation =2\n\t\tCarlson remarks as you disembark. \"It was ably done Lieutenant.\n\t\t*if supply_submarine =0\n\t\t\tThis will give us a lift in coming operations.\"\n\t\t*if supply_submarine =0\n\t\t\tThis will give us a lift in coming operations. Especially if the Navy can pick off that resupply submarine for the island.\"\n\t*if commendation =3\n\t\tCarlson says and shakes your hand as you disembark. \"It was all I could ask for, Lieutenant. I'm going to recommend your men for a meritorious citation. \n\t\t*if supply_submarine =0\n\t\t\tYou've cleared the way for further operations here and in the Solomons.\"\n\t\t*if supply_submarine =1\n\t\t\tGiven your success, and assuming the Navy can pick off the enemy's resupply submarine, we'll have cleared the way for further operations here and in the Solomons.\"\t\t\n\t*if commendation =4\n\t\tCalrson says and cracks a smile as you disembark. \"That was really gung-ho. Your men deserve a citation. And if you've got any recommendations for additional personal merit, be sure to note the individuals in your report.\n\t\t*if supply_submarine =0\n\t\t\tWe're going forward with further operations though, so don't linger over the paperwork.\"\n\t\t*if supply_submarine =1\n\t\t\tExpect something from the Navy too, given how you figured out the enemy's resupply routine. Both services are going forward with further operations though, so don't linger over the paperwork.\"\n\t*if commendation >4\n\t\tCarlson says and pumps your hand as you disembark, his smile wide. \"Excellent. Unbelievable! Whatever you are feeding your men, tell me and I'll order it for the whole battalion.\n\t\t*if supply_submarine >0\n\t\t\tMaybe the Navy too so they can tackle that resupply submarine the Japanese have.\n\t\tI've already transmitted the outline of your action and there's a hint of a unit citation in the air. God knows I'm going to put you down for a personal award and if you've got any individual recommendations, make them and I'll see they stick.\"\n\t*line_break\n\t*line_break\n\t*choice\n\t\t#It is good to be back.\n\t\t\tWar is hell. The Pacific war will therefore be fought in a green hell.\n\t\t\t*goto finale_1\n\t\t*if commendation >4\n\t\t\t#Thankfully, Carlson appreciates what has been done.\n\t\t\t\tCarlson may only be a light Colonel, but he'll be a general soon with this kind of success to push along the Raider doctrine.\n\t\t\t\t*goto finale_1\n\t\t*if commendation =4\n\t\t\t#Can't exactly say if the mission exemplified the spirit of gung-ho...\n\t\t\t\tHard to say what Carlson means by that. He'll have to read the report, after you write it.\n\t\t\t\t*goto finale_1\n\t\t*if commendation =3\n\t\t\t#Further operations? That's an interesting pearl to drop.\n\t\t\t\tA Colonel sees more, and plan more, than a lieutenant. You can be certain of that.\n\t\t\t\t*goto finale_1\n\t\t*if commendation =2\n\t\t\t#This mission wasn't graded. It was strictly pass-fail.\n\t\t\t\tMistakes were made, but not enough to imperil the mission. In the end, success was what mattered.\n\t\t\t\t*goto finale_1\n\t\t*if commendation =1\n\t\t\t#Not sure I like what Carlson insinuated.\n\t\t\t\tHe wasn't there. He didn't understand. Yes, it could have gone better... but it could also have gone far worse.\n\t\t\t\t*goto finale_1\n\t\t*if commendation \u003c1\n\t\t\t#Can't disagree. Send the Air Force instead of the Marines for missions like this.\n\t\t\t\tBlowing up a base doesn't take much, just firepower. The fewer men are risked to do that, the better.\n\t\t\t\t*goto finale_1\n\t\t*if commendation >2\n\t\t\t#The unit deserves a citation. And there are other heroes of note.\n\t\t\t\tCitations and medals are the product of the forge of heroes. Created by sweat, blood, and the fires of conflict.\n\t\t\t\t*goto finale_1\n\t\t*if character_condition =3\n\t\t\t#Wait patiently. I've still got a report to write up.\n\t\t\t\tA lot of people say you should always get in the last word. Well, the first word is often better because you can frame the developing discussion.\n\t\t\t\t*goto finale_1\n\t\t*if character_condition =2\n\t\t\t#Wait patiently. I've still got to see a medic.\n\t\t\t\tOut here, wounds get infected real easy. And no scratch should put you down and out while the war is still heating up.\n\t\t\t\t*goto finale_1\n\t\t*if character_condition =1\n\t\t\t#Wait as best I can. But what I really need is a doctor.\n\t\t\t\tOut here, one wound is a problem. Two is a crisis.\n\t\t\t\t*goto finale_1\n\t\t*if character_condition \u003c1\n\t\t\t#Hard to listen when I'm about to perish.\n\t\t\t\tThe darkness gathers and retreats. Gathers and retreats. Like the sea, but with blood.\n\t\t\t\t*goto finale_1\n\n*label finale_1\n\n*set var_a 0\n*if character_condition =3\n\tCarlson then notes your intact, if stained, uniform. \"You got a lucky charm you like to rub?\"\n*if character_condition =2\n\tCarlson notes a tear in your uniform and the bit of white gauze almost hidden beneath. \"Leading from the front gets dangerous, doesn't it?\"\n*if character_condition =1 \n\tCarlson notes your twice torn uniform and the battle-dressings beneath. \"You do know they can only give you one purple heart per operation, don't you?\"\n*if character_condition \u003c1\n\tCarlson glances down at your bloody rags that were once a uniform. \"They damn near punched your ticket, didn't they?\"\n*choice\n\t#\"Most of my men could use a new uniform too.\"\n\t\t\"They'll get it too,\" Carlson says. \"But right now, go see to them.\"\n\t\t*goto finale_2\n\t*if character_condition =3\n\t\t*if casualties =0\n\t\t\t#\"We've all got one.\"\n\t\t\t\t\"Glad to hear it,\" Carlson says. \"Now, see to your men.\"\n\t\t\t\t*goto finale_2\n\t*if character_condition =3\n\t\t*if casualties >0\n\t\t\t#\"Most of us had one.\"\n\t\t\t\t\"Good. Keep a tight grip on them,\" Carlson says. \"Now, see to your men.\"\n\t\t\t\t*goto finale_2\n\t*if character_condition =2\n\t\t*if casualties =0\n\t\t\t#\"Believe it or not, I was the unlucky one.\"\n\t\t\t\t\"There is luck and then their is being lucky,\" Carlson says. \"Now, see to your men.\"\n\t\t\t\t*goto finale_2\n\t*if character_condition =2\n\t\t*if casualties >0\n\t\t\t#\"Mine won't be the only scar.\"\n\t\t\t\t\"I understand,\" Carlson says. \"Go see to your men.\"\n\t\t\t\t*goto finale_2\n\t*if character_condition =1\n\t\t*if casualties =0\n\t\t\t#\"The Japanese seemed determined to try and kill me in particular.\"\n\t\t\t\t\"Maybe they just don't like officers,\" Carlson says. \"Now then, see to your men.\"\n\t\t\t\t*goto finale_2\n\t*if character_condition =1\n\t\t*if casualties >0\n\t\t\t#\"The enemy fought hard.\"\n\t\t\t\t\"That's unwelcome news, but not unexpected,\" Carlson says. \"Now, go see to your men.\"\n\t\t\t\t*goto finale_2\n\t*if character_condition \u003c1\n\t\t*if casualties =0\n\t\t\t#\"The Japanese all wanted to kill me. Specifically.\"\n\t\t\t\t\"I'd say you're embellishing the tale a little, but it is hard to say that when seeing this,\" Carlson remarks. \"Best you go see to your men while you can.\"\n\t\t\t\t*goto finale_2\n\t*if character_condition \u003c1\n\t\t*if casualties >0\n\t\t\t#\"It's a wonder anyone survives war.\"\n\t\t\t\t\"I've heard that before. Just didn't think to hear it again so soon,\" Carlson says. \"Best you go see to your men while you can.\"\n\t\t\t\t*goto finale_2\n\t*if ishiro_scar =0\n\t\t*if ishiro_sword =0\n\t\t\t#\"I feel bad that I didn't bring back one of those samurai swords.\"\n\t\t\t\t\"Next time,\" Carlson says. \"Go see to you men.\"\n\t\t\t\t*goto finale_2\n\t*if ishiro_scar >0\n\t\t*if ishiro_sword =0\n\t\t\t#\"Those samurai swords are no joke.\"\n\t\t\t\t*set var_a 1\n\t\t\t\t\"So I see,\" Carlson replies. \"See to you men.\"\n\t\t\t\t*goto finale_2\n\t*if ishiro_scar >0\n\t\t*if ishiro_sword >0\n\t\t\t#\"Those samurai swords are no joke. See for yourself.\"\n\t\t\t\t*set var_a 1\n\t\t\t\t\"It is no toy,\" Carlson replies after a brief examination of the weapon. \"Best you see to you men.\"\n\t\t\t\t*goto finale_2\n\n\n*label finale_2\n\n*if casualties =0\n\tYour Marines swagger off the Schley, snap off a crisp salute your way that is decidedly at odds with their jungle torn fatigues.\n*if casualties >0\n\tYour Marines disembark from the Schley in a steady column.\n*line_break\n*line_break\n*if merrik =2\n\tThe body of Private Merrik is carried down by a sullen Corporal Ransom\n\t*if gerhard \u003c3\n\t\tand ${holben_rank} Holben. Neither of whom look you in the eye.\n\t*if gerhard >2\n\t\tand a navy corpsman. Your Marine can't quite look you in the eye.\n\n\t*line_break\n\t*line_break\n*if hagan =4\n\tThe body of Private Hagan is carried down the pier on a stretcher, covered by a bone white sheet. His dreams of college depart with him.\n\t*line_break\n\t*line_break\n*if scott =2\n\tThe covered body of Private Scott is carried down the plank by his fellow Marines, none of whom bother to hide brimming tears.\n\t*line_break\n\t*line_break\n*if gerhard =3\n\tThe covered body of Corporal Gerhard is guided down the pier by ${holben_rank} Holben who does his best to bark the nearby naval personnel out of the way.\n\t*line_break\n\t*line_break\n*if gerhard =4\n\t*if holben =0\n\t\t${holben_rank} Holben walks down the pier, a set of bloody dog-tags in his hands. Those rattle distantly in his hand when he salutes, says stiffly. \"These will be with graves registry, Lieutenant.\"\n\t*if holben =1\n\t\tYou glance down at the twin tags of ${holben_rank} Holben and Corporal Gerhard. Two good men, cut down in their prime. That's the brutal truth of war for you. No mistaking it.\n\t*line_break\n\t*line_break\n*if landry =1\n\t*if scott =1\t\n\t\tPrivate Landry, wounded just minutes after landing, is helped down the ramp by an equally wounded Private Scott. The two lean on each other the whole way down. If not for the white wraps of bandage, the pair could be coming back from a drink-filled liberty.\t\n\t*if scott =0\n\t\tPrivate Landry, wounded just minutes after landing, is helped down the ramp by Private Scott, leans on his friend the whole way down. If not for the white wraps of bandages, Landry could just be coming back from a drink-filled liberty.\n\t*if scott =2\n\t\tPrivate Landry walks stiffly down the plank, more alone than he's ever been.\n\t*line_break\n\t*line_break\n*if landry =2\n\tThe body of Private Landry is carried down the plank by Baker\n\t*if scott \u003c2\n\t\tand Scott. Both stare into the distance as they step past.\n\t*if scott =2\n\t\tand a corpsman. Baker can't seem to see anything but the horizon in the distance.\n\t*line_break\n\t*line_break\n*if scott =1\n\tScott catches your eye in passing, shifts a bandage meaningfully. \"When are we going out again, LT?\"\n\n\tThere is, of course, no answer for that yet. But it is inevitable.\n\t*line_break\n\t*line_break\n*if merrik =1\n\tPrivate Merrik hobbles down to the pier, the bandage about his thigh white and tight. He shouldn't be walking but the man apparently decided to eat brass for breakfast.\n\t*line_break\n\t*line_break\n*if hagan =2\n\tPrivate Hagan is as pale as a set of clean sheets. You can only hope that wounded foot of his will let him appreciate the nurses in Hawaii.\n\t*line_break\n\t*line_break \n*if hagan =3\n\tBadly wounded Private Hagan is carried down from the pier on a stretcher, pale as the sheets in a Hawaii hospital. You can only hope he'll recover quickly enough to appreciate the nurses.\n\t*line_break\n\t*line_break \n*if hagan =1\n\tPrivate Hagan limps down the pier on his injured foot. No doubt he'll soon be sweet-talking Hawaii nurses, trying to make a good story for the others when he comes back.\n\t*line_break\n\t*line_break\n*if holben =1\n\t*if hagan =0\n\t\tPrivate Hagan grips Holben's tags tight in hand as he stares far across the sea.\n\t*if hagan >0\n\t\tThe body of Private Reginald Holben is carried down the gangplank. His dreams of college have ended, forever.\n\t*line_break\n\t*line_break\n*if gerhard =1\n\tCorporal Gerhard tromps down the pier, indifferent to his flesh wound.\n\t*line_break\n\t*line_break\n*if baker =1\n\t*line_break\n\t*line_break\n\tSergeant Baker descends with a glower, clearly still nursing a grudge \n\t*if weapon \u003c4\n\t\tfrom when you shot him during the hand to hand struggle. He'll get over it, you hope.\n\t*if weapon =4\n\t\tand a swath of bandages that cover his horrific burns. He'll be out of the war for months, if not more.\n\t*line_break\n\t*line_break\n*if casualties >5\n\tYour Marines can barely drag their gear off the Schley. Needless to say, their gripes are epic.\n\t*line_break\n\t*line_break\n*if schley =1\n\tThe injured sailors come next. The worst off are driven straight to the hospital; the dead must wait a while longer. That blasted Japanese float-plane... a single bomb nearly wrecked the Schley. That bodes ill for any ship caught without fighter cover.\n\t*line_break\n\t*line_break\n*if schley =2\n\tThe copious number of injured sailors come next. The critical ones are driven straight to the hospital; the dead must wait a while longer. That blasted Japanese float-plane nearly wrecked the Schley with a single precise bomb. That bodes for heavy casualties for any ship caught without fighter cover.\n\t*line_break\n\t*line_break\n*if ishiro =1\n\tSimmons is the last off the ship and he isn't alone. He escorts your captive, Ishiro, down the plank. Carlson raises an eyebrow as the Japanese officer steps before him and salutes.\n\t\t\n\t\"Ishiro Hasebe, Colonel, Imperial Japanese Navy,\" the enemy Lieutenant introduces himself in near perfect English then adds a profound sigh. \"Is a prisoner under your Geneva Conventions allowed a bath?\"\n\n\t\"We'll figure something out,\" Carlson says, then tosses his head toward the Marine base. \"That way, if you please.\"\n\t*line_break\n\t*line_break\n*if ishiro =2\n\tSimmons is the last off the ship.\n\t*if var_a =0\n\t\tHe passes over Ishiro's sword. The sight of the curved blade makes Carlson raise an eyebrow. \"There must be story behind this.\"\n\t*if var_a >0\n\t\tHe holds out the sheath for Ishiro's sword. Carlson slides the blade back in. \"One day, you'll get a chance to tell me the whole story.\"\n\t*line_break\n\t*line_break\n\tHe might as well have asked whether a Marine likes beer.\n\t*line_break\n\t*line_break\n*if ishiro =3\n\tSimmons pokes your captive, the glowering Lieutenant Ishiro, down the plank at the point of a bayonet.\n\t\n\tCarlson raises an eyebrow as the troublesome enemy officer stiffly strides past. \"He seems upset, for some reason...\"\n\t*line_break\n\t*line_break\n*if ishiro =4\n\t*if var_a =0\n\t\tSimmons is the last off the ship, passes over Ishiro's bloody sword.\n\t\n\t\tCarlson raises an eyebrow as Simoons gingerly displays the instrument of Hari-Kiri. \"There must be a story behind this.\"\n\t\t*line_break\n\t\t*line_break\n\t*if var_a >0\n\t\tSimmons is the last off the ship. He carries down Ishiro's effects, and the empty sheathe.\n\n\t\tCarslon raises an eyebrow at the blood splattered gear. \"There must be a story behind this.\"\n*page_break So Ends This Tale\n\nYou and Carlson walk on toward the command hut as twilight begins to thicken. The mission is almost over, with only a detailed report left to write. And tomorrow... will be yet another day in the Marine Corp. Semper Fidelis.\n\n*set meta_time 6\n*goto end\n\n*label relieved_of_command\n*if casualties =0\n\tYour Marines watch you leave from the deck of the Schley. All of them. As one, they tender a salute your way before the navy forces them to disembark as well.\n\t*goto relieved_of_command_2\n*if casualties >0\n\tYour Marines... some of them at least, watch you leave from the deck of the Schley. Then the navy puts them to work.\n*line_break\n*line_break\n*if merrik =2\n\tThe body of Private Merrik is c wn to the pier, the bandage about his thigh white and tight. He shouldn't be walking but the man apparently decided to eat brass for breakfast.\n\t*line_break\n\t*line_break\n*if hagan =2\n\tPrivate Hagan is as pale as a set of clean sheets. You can only hope that wounded foot of his will let him appreciate the nurses in Hawaii.\n\t*line_break\n\t*line_break \n*if hagan =3\n\tBadly wounded Private Hagan is carried down from the pier on a stretcher, pale as the sheets in a Hawaii hospital. You can only hope he'll recover quickly enough to appreciate the nurses.\n\t*line_break\n\t*line_break \n*if hagan =1\n\tPrivate Hagan limps down the pier on his injured foot. No doubt he'll soon be sweet-talking Hawaii nurses, trying to make a good story for the others when he comes back.\n\t*line_break\n\t*line_break\n*if holben =1\n\t*if hagan =0\n\t\tPrivate Hagan grips Holben's tags tight in hand as he stares far across the sea.\n\t*if hagan >0\n\t\tThe body of Private Reginald Holben is carried down the gangplank. His dreams of college have ended, forever.\n\t*line_break\n\t*line_break\n*if gerhard =1\n\tCorporal Gerhard tromps down the pier, indifferent to his flesh wound.\n\t*line_break\n\t*line_break\n*if baker =1\n\t*line_break\n\t*line_break\n\tSergeant Baker descends with a glower, clearly still nursing a grudge \n\t*if weapon \u003c4\n\t\tfrom when you shot him during the hand to hand struggle. Hopefully He'll get over it in time to testify on your behalf.\n\t*if weapon =4\n\t\tand a swath of bandages that cover his horrific burns. He'll be out of the war for months, if not more. But he'll testify if there is a court martial, you are certain of that.\n\t*line_break\n\t*line_break\n*if casualties >5\n\tYour Marines can barely drag their gear off the Schley. \n\t*line_break\n\t*line_break\n*if schley =1\n\tThe injured sailors come next. The worst off are driven straight to the hospital; the dead must wait a while longer. That blasted Japanese float-plane... a single bomb mendation =1\n\tYou achieved one out of seven commendations. \n\t*line_break \n*if commendation =2\n\tYou achieved two out of seven commendations. Not bad.\n\t*line_break\n*if commendation =3\n\tYou achieved three out of seven commendations. Nicely done.\n\t*line_break \n*if commendation =4\n\tYou achieved four out of seven commendations. Admirable.\n\t*line_break\n*if commendation =5\n\tYou achieved five out of seven commendations. Well done!\n\t*line_break\n*if commendation =6\n\tYou achieved six out of seven commendations. Near perfect!\n\t*line_break\n*if commendation =7\n\tYou achieved seven out of seven commendations. Perfect! Hollywood awaits!\n\t*line_break\n*if commendation >7\n\tYou achieved eight out of seven commendations. You have achieved an impossible victory!\n\n\tHonestly, I didn't think anyone could possibly accomplish this feat.\n*line_break\n*line_break\n*if ishiro =1\n\tOne commendation for capturing an enemy officer.\n\t*line_break\n\t*line_break\n*if ishiro =3\n\tOne commendation for capturing a grumpy enemy officer.\n\t*line_break\n\t*line_break\n*if commendation_2 =1\n\tOne commendation for personal bravery.\n\t*line_break\n\t*line_break\n*if commendation_3 =1\n\tOne commendation for capturing a slew of prisoners.\n\t*line_break\n\t*line_break\n*if commendation_4 =1\n\tOne commendation for the destruction of the enemy bay base.\n\t*line_break\n\t*line_break\n*if commendation_5 =1\n\tOne commendation for gathering some intelligence from the bay base.\n\t*line_break\n\t*line_break\n*if commendation_5 =2\n\tOne commendation for gathering significant and extensive intelligence from the bay base.\n\t*line_break\n\t*line_break\n*if schley =1\n\tOne fewer commendation for the damage that the Schley endured during your mission as well as naval casualties.\n\t*line_break\n\t*line_break\n*if commendation_6 =1\n\tOne commendation for the destruction of the jungle base.\n\t*line_break\n\t*line_break\n*if commendation_7 =1\n\tThree commendations for comp rse back in Hawaii.\t\n\t\t*line_break\n\t*if hagan =1\n\t\tPrivate Lawrence Hagan, wounded in action and may lose his leg to gangrene.\n\t\t*line_break\n\t*if hagan =3\n\t\tPrivate Lawrence Hagan, wounded in action just prior to retrieval, is expected to recover state-side for several months. \n\t*if hagan =5\n\t\tPrivate Lawrence Hagan, badly wounded by a sniper, set stateside to recover. It is likely he will remain there due to the grievous nature of his wound. \n\t\t*line_break\n\t*if casualties =7\n\t\tPrivate Reginald Holben, wounded in action during hand-to-hand combat.\n\t\t*line_break\n\t*if casualties =8\n\t\tPrivate Reginald Holben, wounded in action during hand-to-hand combat.\t\n\t\t*line_break\n\t\tCorporal Douglas Ransom, also wounded in action during hand-to-hand combat.\n\t\t*line_break\n\t*if casualties >8\n\t\tPrivate Reginald Holben, wounded in action during hand-to-hand combat.\n\t\t*line_break\n\t\tCorporal Douglas Ransom, also wounded in action during hand-to-hand combat.\n\t\t*line_break\n\t\tPrivate First Class Thomas Simmons, wounded during the final stages of desperate hand-to-hand combat.\n\t\t*line_break\n\t*if gerhard >2\n\t\tCorporal Lance Gerhard, killed in action while leading his fire team during an attack upon an enemy coastal base.\n\t\t*line_break\n\t*if scott =2\n\t\tPrivate First Class William Scott, killed in action just prior to retrieval.\n\t\t*line_break\n\t*if landry =2\n\t\tPrivate First Class Ronald Landry, died of wounds received just moments after arrival on the enemy island.\n\t\t*line_break\n\t*if merrik =2\n\t\tPrivate Henry 'The Mule' Merrik, died of wounds received during a firefight with an enemy patrol. He will be missed.\n\t\t*line_break\n\t*if holben =1\n\t\tPrivate Reginald Holben, killed in action just prior to retrieval.\n\t\t*line_break\n\t*if hagan =4\n\t\tPrivate Lawrence Hagan, killed in action just prior to retrieval.\n\n*goto the_end\n\n*label the_end\n*page_break End\nWe hope you've enjoyed playing [
