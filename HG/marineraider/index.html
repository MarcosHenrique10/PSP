apanese inconsiderately commence their attack.\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"Pass me that cereal bar.\"\n\t\t\t\t\t\"Didn't know you like the granola, LT,\" Scott says, passes over the small brick of compressed cereal.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tIt is a solid meal and promises to sit in your stomach like nothing else. Except perhaps for whiskey.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tIt can't match cereal with milk and a strawberry on top. But out here a fancy breakfast is just a dream.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe bars promise to travel a great way. You had a chance to sample them while on Annapolis maneuvers.\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese rudely interrupt your reverie by commencing their attack.\n\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"I'll take coffee of the instant kind.\"\n\t\t\t\t\t\"Shame there's no way to heat it up,\" Scott says as he passes over the packet of instant Nescafe.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tThere certainly is no chance to light a fire. At best you can leave it in the noon sun, but really that's just asking for trouble. With that in mind you dribble the grounds into your canteen.\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese commence their attack before you've taken more than a sip.\t\t\n\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThere is a lovely flavor that comes out from boiling it? You get the feeling you'll have grit in your teeth as you pour the grounds into your canteen.\n\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese commence their attack before you've taken more than a sip.\t\t\n\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Do you know who invented instant coffee? A chemist by the name of Satori Kato.\"\n\t\t\t\t\t\t\t\t*set morale +1\n\t\t\t\t\t\t\t\t\"He sounds...\" Scott notes in surprise at the Japanese sounding name.\n\n\t\t\t\t\t\t\t\tYou explain that Satori Kato worked in Chicago back at the turn of the century. That he'd figured out how to dehydrate it properly and presented his efforts to the public at the Pan-American World Exposition. You can recall the article on that rather vividly even now. Instant coffee might have caught on more if President McKinley hadn't been assassinated around that time.\n\n\t\t\t\t\t\t\t\t\"Sorry, what?\" Scott asks after you finish the last part of the tale.\n\n\t\t\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\t\tPrivate Landry nudges his fellow Marine ever so lightly. \"Satori didn't shoot the president.\"\n\n\t\t\t\t\t\t\t\t\t\"Oh,\" Scott says and straightens up in understanding. \"Sure.\"\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Let's salute Satori Kato,\" Baker suggests and raises his packet up high to the sky. \"For helping keep United States Marines stay awake during the long hours of this war.\"\n\n\t\t\t\t\t\t\t\tIt is a hilarious salute given the situation, and so you men take up the call with many a grin as they pour the instant coffee grounds into their canteens.\n\n\t\t\t\t\t\t\t\tBut before you can more than sip the resultant mix, the Japanese commence their attack.\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t\t#Just pour the coffee into my canteen.\n\t\t\t\t\t\t\t\tCold coffee in the hot jungle. What a war.\n\n\t\t\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese commence their attack before you've taken more than a sip.\t\t\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe coffee tastes horrible, of course, but thankfully the Japanese commence their attack before you've taken more than a sip.\t\t\n\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"A cracker, plain old cracker, will do fine.\"\n\t\t\t\t\t\"We've got plenty of those,\" Scott notes and passes over a hard biscuit. \"They s it in the world when you are out in the jungle. You scarf the apricots down then swig from your canteen afterward. For a moment you feel like you could take on the world.\n\n\t\t\t\t\t\t\tA good thing too because the Japanese then commence their attack.\n\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t#\"Peaches.\"\n\t\t\t\t\t\t\t\"There you go,\" Scott says and tosses over a little box.\n\n\t\t\t\t\t\t\tYou snag it out of the air and dig right in. Nothing like it in the world when you are out in the jungle. You scarf the peaches down then drain your canteen afterward. For a moment you feel like you could take on the world.\n\n\t\t\t\t\t\t\tA good thing too because the Japanese then commence their attack.\n\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t#\"Surprise me.\"\n\t\t\t\t\t\t\t*rand die_roll 1 2\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if die_roll =1\n\t\t\t\t\t\t\t\tScott tosses a box. Apricot. Should be delicious.\n\t\t\t\t\t\t\t*if die_roll =2\n\t\t\t\t\t\t\t\tScott tosses a box. Peaches. Should be delicious.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tAnd it is. You scarf the dried fruit down and then drain your canteen afterward. For a moment you feel like you could take on the world.\n\n\t\t\t\t\t\t\tA good thing too because the Japanese then commence their attack.\n\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"Peanuts and raisins.\"\n\t\t\t\t\t\"My choice too,\" Scott says and passes over the little delights. \"Just like being at a ballpark.\"\n\n\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\"The song goes 'buy me some peanuts and crackerjack, I don't care if I ever come back...' Private Landry sings pointedly. \"Don't you have baseball in Wisconsin?\"\t\n\n\t\t\t\t\t\t\"Sure, but we also have kielbasa and sauerkraut at the games instead of crackerjack,\" Scott replies.\n\n\t\t\t\t\t\t\"Sauerkraut is called liberty cabbage now.\"\n\n\t\t\t\t\t\t\"No one told me,\" Scott complains halfheartedly.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\tYou manage to wolf down the last of the tasty little feast just before the Japanese commence their attack.\n\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"How about some of those hard candies?\"\n\t\t\t\t\t\"There you go, LT,\" Scott says, then tosses the packet of candies over. \"Better than chocolate cause they don't melt in the heat.\"\n\n\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\"Yeah, but the day's not over yet,\" Private Landry chimes in.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\tWith a bit of sweet in your mouth, nothing feels quite so bad. Even when the Japanese commence their attack, it seems more like an annoyance.\n\t\t\t\t\t*goto at_last_they_come\t\t\t\n\t\t\t\t#\"Nothing for now. You eat first.\"\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tOfficers can plan and command, but it is the enlisted ranks who fight, and die when the bullets start to fly. This meal could well be their last.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThe men come first. They have to because they are the ones who will fight, and perhaps die.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe men must come first. A little hunger is nothing in comparison to a \tbullet and, besides, your stomach can always lean against your spine.\t\t\t\t\t\t\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese interrupt this collegial meal halfway through.\n\t\t\t\t\t*set morale +1\n\t\t\t\t\t*goto at_last_they_come\n\t#The enemy can't possibly be this disorganized. Best keep the men primed.\n\t\t*goto at_last_they_come\n\n*label at_last_they_come \n*page_break\n\nPrivate Simmons emerges from the Jungle, his face dark with a fresh dab of jungle paint. \"LT, we've got Japs coming in!\"\n*choice\n\t#\"How many?\"\n\t\t\"Well, near as I can tell...\" Simmons says.\n\t\t*goto at_last_they_come_1\n\t#\"MGs? Mortars?\"\n\t\t\"Yeah, both,\" Simmons says.\n\t\t*goto at_last_they_come_1\n\t#\"When?\"\n\t\t\"Soon,\" Simmons says.\n\t\t*goto at_last_they_come_1\n\n*label at_last_they_come_1\n*if resistance >40\n\t\"We've stirred up a real hornets nest. Forty plus.\"\n*if resistance \u003c41\n\t\"We've got beau-coup Japs. Thirty plus.\"\n*line_break\n*line_break\nBaker curses softly as he slips over beside you. \"How do you want to play defense on this LT? I figure we've made them mad enough that they'll come straight on, but if they've got some cooler heads amongst them then they'll try to flank\"\n\n*choice\n\t#\"We're standing in their base. Taunt them and deploy the BAR's to cover our front.\"\n\t\tYour men deploy, fire team beside fire team just as the first of the enemy begin to close in.\n\t\t*if character =2\n\t\t\tThe pidgin Nippon you have taught your Marines gets visceral.\n\t\t*if character =1\n\t\t\tThe scraps of Japanese your men have picked up from Corporal Ransom gets raucous and visceral.\n\t\t*if character =0\n\t\t\tThe bits of Japanese you picked up in Port Arthur gets bawdy and visceral.\n\t\t*set logistics +1\n\t\t*goto closer?\n\t*hide_reuse #\"They'll be looking for the flank. Form a reserve fire team to counter that.\"\n\t\t*if firepower =2\n\t\t\t\"There's not enough men for that,\" Baker indicates.\n\t\t\t*goto at_last_they_come_1\n\t\t*if firepower =1\n\t\t\t\"We're cutting things fine,\" Sergeant Baker notes. \"But maybe it'll work.\"\n\n\t\t\tHe sets off to see to things personally.\n\t\t\t*set formation 0\n\t\t\t*set morale +1\n\t\t\t*set logistics +1\n\t\t\t*goto closer?\n\t\t*else\n\t\t\t\"That'll work,\" Sergeant Baker agrees and sets off to attend that personally.\n\t\t\t*set formation 0\n\t\t\t*set morale +1\n\t\t\t*set logistics +1\n\t\t\t*goto closer?\n\t*if character =2\n\t\t*if firepower =0\n\t\t\t#\"A triangular, all around defense shall serve well regardless of the axis of attack.\"\n\t\t\t\tBaker sets the fire teams into mutually supporting positions. There's no way for the Japanese to outflank you now.\n\t\t\t\t*set logistics +1\n\t\t\t\t*goto closer?\n\t*if character !=2\n\t\t*if firepower =0\n\t\t\t#\"We play defense. Everyone into line.\"\n\t\t\t\tBaker sets the fire teams into supporting positions. There's no way for the Japanese to outflank you now.\n\t\t\t\t*goto closer?\n\t*if character =0\n\t\t#\"Defense? Forget that. Let the enemy do it. We'll counter-attack before they're ready for it.\"\n\t\t\tBaker gives you a grin. \"Hit first, hit hard, keep hitting. I like it, LT.\"\n\n\t\t\tYou never doubted that he would. In but a few moments, your platoon is ready to take the fight to the enemy.\n\t\t\t*set situation 1\n\t\t\t*set morale +1\n\t\t\t*goto offensive_firefight_jungle\t\t\n\n*label closer?\n*page_break\nShadows of the dying day shift in the breeze as your men sight down on the approaching enemy. One, two, three...\n\n*if situation =1\n\tYou count the moments as the end of the column begins to pass. Each second drawing you closer to the point where you can open fire on the rearmost enemies. \n\n*choice\n\t#Open fire!\n\t\t*set resistance -3\n\t\t*goto base_firefight_2\n\t#Closer...\n\t\tFour... five... six...\n\t\t*choice\n\t\t\t#Open fire!\n\t\t\t\t*set resistance -6\n\t\t\t\t*goto base_firefight_2\n\t\t\t#Closer...\n\t\t\t\tSeven... eight... nine and ten...\n\t\t\t\t*choice\n\t\t\t\t\t#Open fire!\n\t\t\t\t\t\t*set resistance -10\n\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t#Closer...\n\t\t\t\t\t\t*if situation =1\n\t\t\t\t\t\t\tThe last of the enemy draws out of range, leaving your Marines alone in the jungle and without an enemy to fight. Well, except for the jungle base.\n\t\t\t\t\t\t\t*set time 10\n\t\t\t\t\t\t\t*goto 2nd_base\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tToo close! The foremost enemy riflemen catch clear sight of your Marines and scramble for cover before a shot is fired.\n\t\t\t\t\t\t\t*set resistance -5\n\t\t\t\t\t\t\t*set casualties +1\n\t\t\t\t\t\t\t*goto base_firefight_2\n*label base_firefight_2\n*page_break\n*set time 0\n*set var_a 0\n*goto base_firefight_3\n\n*label base_firefight_3\n\n*if situation =2\n\t*if time =0\n\t\tDark figures begin to appear at the edges of the jungle. A heck of a lot of them too.\n\t*if time =1\n\t\tThe enemy advances in relentless rushes.\n\t*if time =2\n\t\tThe enemy refuses to relent.\n\t*if time >2\n\t\tThe enemy just won't give up.\n\t*line_break\n\t*line_break\n*if time =0\n\t*if merrik =0\n\t\t*if mortar =1\n\t\t\tThe company trench mortar barks out as Private Merrik feeds in a round, knocks a pair of the enemy over like ten-pins.\n\t\t\t*set resistance -2\n\t\t\t*line_break\n\t\t\t*line_break\n*if time =1\n\t*if merrik =0\n\t\t*if mortar =1\n\t\t\t*line_break\n\t\t\tMerrik feeds in a final mortar round, scoops up his rifle even before the shell slams into the Japanese.\n\t\t\t*set resistance -2\n\t\t\t*line_break\n\t\t\t*line_break\n*if aa =1\n\t*if time =0\n\t\t${holben_rank} Holben opens fire with the AA gun and sends a hundred rounds down range in a heartbeat.\n\t\t*set resistance -5\n\t*if time =1\n\t\tHolben continues to fire the AA gun and only lifts his finger off the trigger to reload. His features are filled with fierce glee as he ravages the enemy with long rakes of fire.\n\t\t*set resistance -4\n\t*if time =2\n\t\t${holben_rank} Holben rips off a final volley from the AA gun, stares over the weapon's red-hot barrel at the devastation he's wrought. Then a Japanese round snaps through the air, cuts a perfect ring out of a tendril of smoke that rises above the now silent machine gun. \n\n\t\t*if character =0\n\t\t\tYou yell. He takes cover.\n\t\t*if character =1\n\t\t\tYou call him to cover, and he flops down right away.\n\t\t*if character =2\n\t\t\tYou shout to him by name and he flops down into cover.\n\t\t*line_break\n\t\t*line_break\n\t\tAn instant later a hornet's nest of Japanese fire zings over his head as the enemy renews their advance.\n\t\t*set resistance -3\n\t*line_break\n\t*line_break\n*if trench =0\n\t*if time =0\n\t\tThis assault must be daunting, but they're Japanese and they're determined. Marine rifles kick and bark at them but still they advance from cover to cover. Your BAR's trade steady fire with their machine guns, lay down sheets of lead that shatter timbers and trees alike.\n\t*if time =1\n\t\tThe enemy is halfway across, despite copious casualties.\n\t*if time =2\n\t\tThe enemy is nearly to your position, and paying for every yard with blood.\n\t*if time =3\n\t\tThe enemy attack falters on the cusp of your position. The Japanese hunker down, build up a steady rate of fire.\n\t*if time >3\n\t\tThe fighting is brutally close.\n\t*line_break\n\t*line_break\n*if trench =1\n\t*if time =0\n\t\tIt must be daunting for the Japanese to assault your trenches, but even so they're determined. Your rifles kick and bark at them but still they advance from cover to cover. Your machine guns trade steady fire with theirs, lay down sheets of lead that shatter timbers and trees alike.\n\t*if time =1\n\t\tThe enemy is halfway to the trenches, despite copious casualties.\n\t*if time =2\n\t\tThe enemy is nearly to the trenches, and paying for every yard with blood.\n\t*if time =3\n\t\tThe enemy attack falters before your entrenched Marines. The Japanese hunker down, begin to build up a steady rate of fire.\n\t*if time >3\n\t\tThe fighting is brutally close.\n\t*line_break\n\t*line_break\n*if weapon =0\n\t*if time =0\n\t\tYour BAR kicks as you send a volley over.\n\t*if time =1 \n\t\tYour BAR continues to dig into your shoulder as the rounds continue to pour out.\n\t*if time =2\n\t\tThe open sights have all but become your world as you squeeze the BAR's trigger.\n\t*if time =3\n\t\tSmoke begins to rise from the BAR's barrel as you wrench open another ammo pouch.\n\t*if time >3\n\t\tYour BAR's barrel glows cherry-hot.\n\t*set resistance -2\t\n*if weapon =1\n\t*if time =0\n\t\tThe enemy is beyond effective range of your Thompson.\n\t*if time =1\n\t\tYou give the enemy a short burst as they grow closer.\n\t*if time =2\n\t\tYou empty your clip at the approaching enemy.\n\t\t*set resistance -1\n\t*if time =3\n\t\tThe bolt on your submachine gun slides back as you slap in a fresh clip.\n\t\t*set resistance -1\n\t*if time >3\n\t\tYour every burst finds its mark.\n\t\t*set resistance -2\t\n*if weapon =2\n\t*set resistance -1\n\t*if time =0\n\t\tYou sight down at the foe and squeeze off shots.\n\t*if time =1\n\t\tEight rounds spent, you slap in another clip and resume the work.\n\t*if time =2\n\t\tThe foe keeps coming. You keep shooting.\n\t*if time =3\n\t\tYour rifle kicks in rapid succession at a plethora of targets. \n\t*if time =4\n\t\tEight rounds out, another clip in.\n*if weapon =3\n\t*if time =0\t\n\t\tThis is no time for a flamethrower. Yet.\n\t*if time =1\n\t\tThe enemy grows closer. You prime the ignitor.\n\t*if time =2\n\t\tThe enemy keeps coming. You level the nozzle.\n\t*if time =3\n\t\tThe enemy rushes close. A gout from your flamethrower suggests to them that this is a bad idea.\n\t\t*set resistance -3\n\t*if time >3\n\t\tYour flamethrower sweeps a dragon's breath of flame across the onrushing foe.\n\t\t*set resistance -5\n*line_break\n*line_break\n*if var_a =0\n\t*if resistance \u003c21\n\t\tThere are not so many enemies now.\n\t*if resistance >20 \n\t\tThere are just so many foes...\n\t*if resistance >30\n\t\ttoo many really.\n\t*if resistance >40\n\t\tYou men have their hands full just picking targets.\n*if var_a =1\n\t*if resistance \u003c21\n\t\tThe enemy has thinned out.\n\t*if resistance >20\n\t\t*if resistance \u003c30 \n\t\t\tFewer foes now, but their fire hasn't really lifted.\n\t*if resistance >29\n\t\t*if resistance \u003c39 \n\t\t\tPlenty of enemies and they're not thinning out fast enough.\n\t*if resistance >38\n\t\tEverywhere you look there is an enemy soldier with a rifle, or worse.\n*if var_a =2\n\t*if resistance \u003c21\n\t\tFewer foes now, or at least fewer targets.\n\t*if resistance >20\n\t\t*if resistance \u003c30 \n\t\t\tThe enemy fire slackens, a little.\n\t*if resistance >29\n\t\t*if resistance \u003c39 \n\t\t\tThe enemy just refuses to stay dead.\n\t*if resistance >38\n\t\tThe foe seems to fire from all sides.\n*if var_a =3\n\t*if resistance \u003c21\n\t\tThe odds are almost even.\n\t*if resistance >20\n\t\t*if resistance \u003c30 \n\t\t\tStill three to one odds, but it feels like more.\n\t*if resistance >29\n\t\t*if resistance \u003c39 \n\t\t\tThe enemy still outnumbers your men by four to one.\n\t*if resistance >38\n\t\tThe Japanese seem invincible.\n*set var_a +1\n*if var_a >3\n\t*set var_a 0\n*line_break\n*line_break\n*if time =0\n\tSilence, then the crack-crack of sniper rifles erupts.\n*if time =1\n\tA round thunks into a nearby tree trunk. More follow.\n*if time =2\n\tBullets snap overhead. Trees splinter to shreds.\n*if time =3\n\tThe air is thick with Japanese lead.\n*if time =4\n\tA scream snaps through the air. Another wound, though it is impossible to tell for whom.\n\t*set casualties +1\n*if time =5\n\tSomeone starts cursing, and likely bleeding.\n\t*set casualties +1\n*if time >5\n\tHand long splinters of wood shower you men as the enemy intensifies their fire.\n\t*set casualties +1\t\n*if resistance \u003c5\n\tThe Japanese rushes taper off. After a final volley, they withdraw.\t\n\t*goto victory!\n*line_break\n*line_break\n*if logistics >2\n\tAmmo cans steadily empty as your Marines methodically chew through their ammo.\n*if logistics =2\n\tBandoliers are steadily emptied.\n*if logistics =1\n\tLast mags for the Thompsons. Final bandolier for the rifles. The gunners on the BARs husband their rounds.\n*if logistics \u003c1\n\tYour men are down to their last rounds When those are gone, it will be bayonets and balls.\n*line_break\n*line_break\n*if formation =0\n\t*if time =0\n\t\tThe enemy works around the flank. Baker's fire team blasts them back with well aimed volleys.\n\t\t*set resistance -1\n\t*if time =1\n\t\tThe enemy keeps trying to probe the flanks. Baker dissuades them with bursts from his Thompson.\n\t\t*set resistance -2\n\t*if time =2\n\t\tA Japanese squad rises up as one, and are cut down before they get two steps in.\n\t\t*set resistance -3\n\t*if time >2\n\t\tWith the flanks secured, Baker's fire team concentrates their fire forward.\n\t\t*set resistance -1\n\t*line_break\n\t*line_break\n*set time +1\n*if casualties >5\n\tYour Marines, chewed up by countless little wounds, can't keep up a steady fire. Emboldened, the enemy charges.\t\n\t*set situation 1\n\t*goto hand_to_hand\n*choice\t\n\t#\"Give'm all we've got!\"\n\t\t*if logistics >2\t\n\t\t\tYour raiders keep up a steady fire. The Japanese keep coming.\t\n\t\t\t*set logistics -1\n\t\t\t*set resistance -7\n\t\t\t*goto base_firefight_3\n\t\t*else\n\t\t\tYour fire teams run dry. The Japanese grow bold.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*if time >2\n\t\t\t\tA piercing cry rings out as Private Hagan collapses. The enemy rushes forward with a roar.\n\t\t\t\t*set logistics -1\n\t\t\t\t*set casualties +1\n\t\t\t\t*set resistance -4\n\t\t\t\t*set hagan 3\n\t\t\t\t*goto hand_to_hand\n\t\t\t*else\n\t\t\t\tThe enemy gathers their strength. They will charge. Soon.\t\t\t\n\t\t\t\t*set resistance -4\n\t\t\t\t*goto base_firefight_3\t\t\t\n\t#\"Husband your rounds.\"\n\t\t*if logistics >0\n\t\t\tYour Marines pick their targets with a marksman's eye.\n\t\t\t*set logistics -1\n\t\t\t*set resistance -4\n\t\t\t*goto base_firefight_3\n\t\t*else\n\t\t\tYour Marines empty the last of their ammo pouches. The enemy creeps closer and closer. Then, with a terrible piercing cry, the Japanese rush forward.\n\t\t\t*set logistics -1\n\t\t\t*set casualties +1\n\t\t\t*set resistance -2\n\t\t\t*goto hand_to_hand\t\t\t\t\n\t#\"Retreat!\"\n\t\t*if situation =0\n\t\t\tYou give the order and your Marines fall back by teams, firing as they go until they can break contact.\n\t\t\t*set resistance -3\n\t\t\t*set aa 0\n\t\t\t*set trench 0\n\t\t\t*set battle 0\n\t\t\t*goto withdrawal\n\t\t*if situation =2\n\t\t\tRunning into the surf buys you but a few moments before the enemy reaches the water's edge. A rifle barks and everything goes dark.\n\t\t\t*goto fail\n\t\t*else\n\t\t\tRetreat is simply not an option. The enemy makes that so.\n\t\t\t*goto hand_to_hand\n\n*label road_ambush\nYour Marines hurry down the twin planked road with you at their head.\n\n*if gerhard =1\n\tEven wounded, Gerhard manages to keep up, though his bandages grow steadily darker.\n\t*line_break\n\t*line_break\nYou need to pick a place to fight far enough away from the inner base that the enemy won't be able to call on reinforcements, but not too far else that they'll be dispersed out of column in preparation to attack the bay base. Worse, every minute of waiting increases the risk that you could happen upon one of their scouts, which would make this a bloody meeting engagement instead of an ambush.\n\nAhead lies a bend where the road curves noticeably away from a stand of thick trunked trees. The line of fire here sights a long way down the hacked jungle while a few steps left or right puts you under excellent cover. Not perfect, but it'll do. \n\nBaker eases to your side, clearly of a similar mind. \"How do you want to deploy, LT? I'm thinking we could go to ground in the outer curve here, hit'em with all we've got and then pick up the pieces afterward?\"\n\n*if character =0\n\tYour Sergeant does so like his straight up fights.\n*if character =1\n\tSarge really does like to hit hard.\n*if character =2\n\tTruly, Sergeant Baker possesses a palpable offensive spirit worthy of cultivation, tempered with prudence.\n*choice\n\t#\"Yeah, that's a good plan.\"\n\t\t\"That's the raider spirit for you,\" Baker remarks.\n\t\t*goto road_ambush_1\n\t*if firepower =0\n\t\t#\"We could use one of our three fire teams as bait...\"\n\t\t\tYou lay out a loose plan with one fire-team as bait while the other two prepare to hit the enemy flank.\n\n\t\t\t\"A classic trap,\" Baker admits.\n\t\t\t*goto road_ambush_1\n\t*if firepower =1\n\t\t#\"We could use the other fire team as bait...\"\n\t\t\tYou lay out a loose plan with one fire-team as bait while the other prepares to hit the enemy flank.\n\n\t\t\t\"That'd make the most of our numbers,\" Baker admits.\n\t\t\t*goto road_ambush_1\n\t*if firepower =2\n\t\t#\"I wish we had another fire team...\"\n\t\t\t\"Yeah, about that, LT. Ambush is a good plan,\" Baker says.\n\t\t\t*goto road_ambush_1\n\t#Consider other options.\n\t\tYour initial inclinations might not be the best of them. Baker seems to understand that.\n\n\t\t*if firepower =2\n\t\t\t\"There's not much we can do but hit them hard and fast to break their morale,\" Baker says.\n\t\t\t*goto road_ambush_1\n\t\t*else\n\t\t\t\"We could also stage a baited ambush with a fire team,\" Baker remarks.\n\t\t\t*goto road_ambush_1\n\n*label road_ambush_1\n\"But we could also wait for the Japs to pass by. It'd be dangerous, but if we crumple the rear of their column then they'll be in that much more disorder. Or we might even let them go by entirely and then hit the base while they're away.\"\n\n*set resistance 42\n*choice\n\n\t#Stage the ambush along the outer curve of the road.\n\t\tYour men pick their positions, go into line and wait.\n\t\t*set resistance -4\n\t\t*goto ambush_eats\n\t*if firepower =0\n\t\t#One fire team as bait, the other two on expected flank.\n\t\t\tYour Marines scurry into position and wait.\n\t\t\t*set resistance -7\n\t\t\t*goto ambush_eats\n\t*if firepower =1\n\t\t#One fire team as bait, the other on flank.\n\t\t\tThree men up, four back. Seven men against the world. Your Marines take up positions to do just that.\n\t\t\t*set resistance -6\n\t\t\t*goto ambush_eats\n\t#Wait for the enemy to pass by, then hit their rear.\n\t\tYou give the order and your men take up positions and wait.\n\t\t*set resistance -6\n\t\t*set logistics +1\n\t\t*set situation 1\n\t\t*goto ambush_eats\n\t#Let'em pass, go to the jungle base after they are out of sight.\n\t\tYour men go into hiding deep in the jungle. It isn't long before forty Japanese soldiers hurry into sight in a long and loose column, all headed off to attack a base they've already lost and looking for Marines who aren't there. When the last of those enemies have tromped past, you lead the way down the road.\n\t\t*set time 10\n\t\t*goto 2nd_base\n*comment start here.\n*label ambush_eats\n\nThe corduroy road is empty. Minutes pass. It remains that way.\n\n*choice\n\t#The enemy is disorganized. Have the men smoke or eat while they can.\n\t\t*if eat =0\t\n\t\t\tOf course, there isn't much to eat except crackers. The pockets on your utilities just aren't made for carrying around more than that. But a little water, a little bite and chew of the hardtack followed by a hurried smoke, proves enough to settle twitchy nerves.\n\n\t\t\tMoments after a last puff, the Japanese column marches into view.\n\t\t\t*goto closer?\n\t\t*if eat =1\n\t\t\tPrivate Scott breaks out a full K-ration he's rucked all the way into the jungle. This newly issued wonder is supposed to feed a man for an entire day and that will be enough for several to snack upon.\n\t\n\t\t\t\"Chopped ham and eggs are in the breakfast pack,\" Scott says with a chuckle as he taps the brown lettering of the first box he pulls out. It can't be bigger than a box of crackerjack. \"For dinner there's ham and cheese.\"\n\t\t\t*line_break\n\t\t\t*line_break\t\n\t\t\t*if landry =0\n\t\t\t\t\"And supper is pork with carrots and apples,\" Private Landry notes. \"The Washington Quartermaster must have it in for pigs.\"\n\t\t\t\t*line_break\n\t\t\t\t*line_break\n\t\t\t*if character =0\n\t\t\t\tLooks like a feast compared to some meals you've eaten.\n\t\t\t*if character =1\n\t\t\t\tWholly edible.\n\t\t\t*if character =2\n\t\t\t\tThey must be working through possible variations of these rations. In fact, comprehensive field tests are planned for next year. Down in Panama if your memory is accurate.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t\"Sure, Lt.\" Scott replies. \"What're you hungry for?\"\n\n\t\t\t*choice\n\t\t\t\t#\"Chopped ham and eggs sounds filling.\"\n\t\t\t\t\t\"That'd be my choice too, LT,\" Scott agrees and passes over the tin. There is a twist key to open it up and a little wooden spoon to go with it.\n\n\t\t\t\t\t\"They've really managed to fit a lot into that cracker-jack box,\" Baker puts in as you examine this marvel of modern engineering.\n\t\n\t\t\t\t\tIt doesn't take long to twist open the can and reveal the chopped ham and eggs. It doesn't look too bad, and tastes slightly better. But you are only half done when the Japanese column marches into view.\n\t\t\t\t\t*goto closer?\n\t\t\t\t#\"Pass me a cereal bar.\"\n\t\t\t\t\t\"Didn't know you like the granola, LT,\" Scott says, passes over the small brick of compressed cereal.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tIt is a solid meal and promises to sit in your stomach like nothing else. Except perhaps for whiskey.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tIt can't match cereal with milk and a strawberry on top. But out here a fancy breakfast is just a dream.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe bars promise to travel a great way. You had a chance to sample them while on Annapolis maneuvers.\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese rudely interrupts your reverie when they march into view.\n\t\t\t\t\t*goto closer?\n\t\t\t\t#\"I'll take coffee, even if it is the instant kind.\"\n\t\t\t\t\t\"Shame there's no way to heat it up,\" Scott says as he passes over the packet of instant Nescafe.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tThere certainly is no chance to light a fire. At best you can leave it in the noon sun, but really that's just asking for trouble. With that in mind you dribble the grounds into your canteen.\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese column then marches into view.\n\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThere is a lovely flavor that comes out from boiling it? You get the feeling you'll have grit in your teeth as you pour the grounds into your canteen.\n\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese column then marches into view.\n\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Do you know who invented instant coffee? A chemist by the name of Satori Kato.\"\n\t\t\t\t\t\t\t\t*set morale +1\n\t\t\t\t\t\t\t\t\"He sounds...\" Scott notes in surprise at the Japanese sounding name.\n\n\t\t\t\t\t\t\t\tYou explain that Satori Kato worked in Chicago back at the turn of the century. That he'd figured out how to dehydrate it properly and presented his efforts to the public at the Pan-American World Exposition. You can recall the article on that rather vividly even now. Instant coffee might have caught on more if President McKinley hadn't been assassinated around that time.\n\n\t\t\t\t\t\t\t\t\"Sorry, what?\" Scott asks after you finish the last part of the tale.\n\n\t\t\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\t\tPrivate Landry nudges his fellow Marine ever so lightly. \"Satori didn't shoot the president.\"\n\n\t\t\t\t\t\t\t\t\t\"Oh,\" Scott says and straightens up in understanding. \"Sure.\"\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Let's salute Satori Kato,\" Baker suggests and raises his packet up high to the sky. \"For helping keep United States Marines stay awake during the long hours of this war.\"\n\n\t\t\t\t\t\t\t\tIt is a hilarious salute given the situation, and so you men take up the call with many a grin as they pour the instant coffee grounds into their canteens.\n\n\t\t\t\t\t\t\t\tBut before you can more than sip the resultant mix, the Japanese column marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t\t#Just pour the coffee into my canteen.\n\t\t\t\t\t\t\t\tCold coffee in the hot jungle. What a war.\n\n\t\t\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese column marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe coffee tastes horrible, of course, but thankfully the Japanese column then marches into view.\n\t\t\t\t\t\t*goto closer?\n\t\t\t\t#\"A plain cracker will do fine.\"\n\t\t\t\t\t\"We've got plenty of those,\" Scott notes and passes over a hard biscuit. \"They stuff at least eight in a box no matter if it is breakfast, dinner or supper.\"\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\"Crackers go with everything,\" Baker notes.\n\n\t\t\t\t\t\t\"Wish we had a little jam to go with them,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-ration next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\"Crackers are filing,\" Baker notes. \"Especially with a little jam.\"\n\n\t\t\t\t\t\t\"Wish they had jam in these rations,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-rations next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\"Crackers are the building block of any meal,\" Baker notes. \"They say the Roman legions would march anywhere so long as they had bread.\"\n\n\t\t\t\t\t\tIt's a funny comment, especially since you told him about it.\n\t\t\n\t\t\t\t\t\t\"Wish there was jam,\" Scott says.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\"If it is that important,\" Private Landry begins from his nearby position. \"then swipe a tin of jam from a C-rations pack next time.\"\t\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\t\t\t\t\n\t\t\t\t\tPrivate Scott muses a little more on the subtle differences between raspberry and strawberry jams. Baker comments on cranberries. Simmons chips in on the differences between the bog grown sweet berry and the tart sort gotten from European trees. The Japanese contribute their commentary by marching into view.\n\t\t\t\t\t*goto closer?\n\t\t\t\t#\"How about a stick of gum?\"\n\t\t\t\t\t\"You sure, LT?\" Scott asks as he passes over a slim red pack of Dentyne chewing gum. \"It is just mint.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I happen to like mint.\"\n\t\t\t\t\t\t\t\"Oh, uh, okay,\" Scott manages to say after an apparently harrowing thought.\n\n\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese column soon marches into view.\n\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\t#\"My stomach is the boss right now. What it wants, it gets.\"\n\t\t\t\t\t\t\t\t\"Sure, LT,\" Scott says. \"I get that way too, just not over mint gum.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese column soon marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\t#\"I actually prefer Chiclets.\"\n\t\t\t\t\t\t\t\t\"None of those, LT,\" Scott says. \"Just as much mint gum as you could want, which for me isn't a lot.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese column soon marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\t#\"The preferences of an officer are unfathomable.\"\n\t\t\t\t\t\t\t\t\"Okay, LT,\" Scott says. \"But I don't get how mint gum and sailing on a ship meet up.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese column soon marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t#Chew my gum.\n\t\t\t\t\t\t\tIt's mint gum and it is good, especially out here a thousand miles and more from home.\n\n\t\t\t\t\t\t\tOf course, the Japanese swiftly interrupt that reverie when they marche into view.\n\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t#\"Nothing for now. You eat first.\"\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tOfficers can plan and command, but it is the enlisted ranks who fight, and die when the bullets start to fly. This meal could well be their last.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThe men come first. They have to because they are the ones who will fight, and perhaps die.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe men must come first. A little hunger is nothing in comparison to a \tbullet and, besides, your stomach can always lean against your spine.\t\t\t\t\t\t\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese column soon marches into view.\n\t\t\t\t\t*set morale +1\n\t\t\t\t\t*goto closer?\n\t\t*else\n\t\t\tPrivate Scott slings out a full J-ration he's totted in all the way from the beach and lays it all out. Thin cut, spiced and salted beef. Dried apricots. Dried peaches. Biscuits, of course. Roasted, salted peanuts. Raisins. Instant coffee. Lemon powder. Chewing gum. Fruit bars. Dried porridge. Hard candies. \n\n\t\t\tIt is almost like Christmas. No cocoa packets though.\n\t\t\t*if character =0\n\t\t\t\tThat's probably already in someone's canteen.\n\t\t\t*if character =1\n\t\t\t\tClearly someone has a sweet tooth.\n\t\t\t*if character =2\n\t\t\t\tMust be an oversight. You make a mental note to put that in your report.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*set morale +1\n\t\t\t*choice\n\t\t\t\t#\"Let's have a bit of the beef.\"\n\t\t\t\t\t\"That'd be my choice too, LT,\" Scott says and passes over the waxed box. \"Spiced and salted. Its like something you'd get in a fancy diner.\"\n\t\n\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\"Sure, if that diner is out in the desert,\" Landry chimes in.\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\tA strip of the beef is laced with salt and pepper that all but dances with delight upon your tongue.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Fine dining in the jungle.\"\n\t\t\t\t\t\t\t\"If you have to be in a Pacific jungle, at least you should be able to eat well,\" Baker notes. \"Wonder what they're chewing on in Britain?\"\n\n\t\t\t\t\t\t\tIt is a fair question, but one that must go unanswered because the Japanese column then marches into view.\n\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\t#\"Tasty, is what I'd call it. Like good water buffalo.\"\n\t\t\t\t\t\t\t\t\"If you say so,\" Scott says. \"Would like to try it at least once.\"\n\n\t\t\t\t\t\t\t\tHopefully he'll have that opportunity. But right now, sliced beef will have to do. Or it would except for the fact that the Japanese column then marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\t#\"Good beef is where you find it.\"\n\t\t\t\t\t\t\t\t\"Ground beef,\" Scott replies and that draws a few grins.\n\n\t\t\t\t\t\t\t\tBut the Japanese must hate puns because their column then marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\t#\"Salmon is better, fresh caught, of course.\"\n\t\t\t\t\t\t\t\t\"That would be good,\" Scott says. \"Bet there's some good fishing around here.\"\n\n\t\t\t\t\t\t\t\tIt is a fair question, but one that must go unanswered because the Japanese column then marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t#\"Pass me that cereal bar.\"\n\t\t\t\t\t\"Didn't know you like the granola, LT,\" Scott says, passes over the small brick of compressed cereal.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tIt is a solid meal and promises to sit in your stomach like nothing else. Except perhaps for whiskey.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tIt can't match cereal with milk and a strawberry on top. But out here a fancy breakfast is just a dream.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe bars promise to travel a great way. You had a chance to sample them while on Annapolis maneuvers.\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese rudely interrupt your reverie when their column marches into view.\n\t\t\t\t\t*goto closer?\n\t\t\t\t#\"I'll take coffee of the instant kind.\"\n\t\t\t\t\t\"Shame there's no way to heat it up,\" Scott says as he passes over the packet of instant Nescafe.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tThere certainly is no chance to light a fire. At best you can leave it in the noon sun, but really that's just asking for trouble. With that in mind you dribble the grounds into your canteen.\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese column then marches into view.\n\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThere is a lovely flavor that comes out from boiling it? You get the feeling you'll have grit in your teeth as you pour the grounds into your canteen.\n\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese column then marches into view.\n\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Do you know who invented instant coffee? A chemist by the name of Satori Kato.\"\n\t\t\t\t\t\t\t\t*set morale +1\n\t\t\t\t\t\t\t\t\"He sounds...\" Scott notes in surprise at the Japanese sounding name.\n\n\t\t\t\t\t\t\t\tYou explain that Satori Kato worked in Chicago back at the turn of the century. That he'd figured out how to dehydrate it properly and presented his efforts to the public at the Pan-American World Exposition. You can recall the article on that rather vividly even now. Instant coffee might have caught on more if President McKinley hadn't been assassinated around that time.\n\n\t\t\t\t\t\t\t\t\"Sorry, what?\" Scott asks after you finish the last part of the tale.\n\n\t\t\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\t\tPrivate Landry nudges his fellow Marine ever so lightly. \"Satori didn't shoot the president.\"\n\n\t\t\t\t\t\t\t\t\t\"Oh,\" Scott says and straightens up in understanding. \"Sure.\"\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Let's salute Satori Kato,\" Baker suggests and raises his packet up high to the sky. \"For helping keep United States Marines stay awake during the long hours of this war.\"\n\n\t\t\t\t\t\t\t\tIt is a hilarious salute given the situation, and so you men take up the call with many a grin as they pour the instant coffee grounds into their canteens.\n\n\t\t\t\t\t\t\t\tBut before you can more than sip the resultant mix, the Japanese column then marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t\t#Just pour the coffee into my canteen.\n\t\t\t\t\t\t\t\tCold coffee in the hot jungle. What a war.\n\n\t\t\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese column then marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe coffee tastes horrible, of course. But thankfully the Japanese column then marches into view.\n\t\t\t\t\t\t*goto closer?\n\t\t\t\t#\"A cracker, plain old cracker, will do fine.\"\n\t\t\t\t\t\"We've got plenty of those,\" Scott notes and passes over a hard biscuit. \"They stuff at least eight in a box no matter if it is breakfast, dinner or supper.\"\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\"Crackers go with everything,\" Baker notes.\n\n\t\t\t\t\t\t\"Wish we had a little jam to go with them,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-ration next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\"Crackers are filing,\" Baker notes. \"Especially with a little jam.\"\n\n\t\t\t\t\t\t\"Wish they had jam in these rations,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-rations next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\"Crackers are the building block of any meal,\" Baker notes. \"They say the Roman legions would march anywhere so long as they had bread.\"\n\n\t\t\t\t\t\tIt's a funny comment, especially since you told him about it.\n\t\t\n\t\t\t\t\t\t\"Wish there was jam,\" Scott says.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\"If it is that important,\" Private Landry begins from his nearby position. \"then swipe a tin of jam from a C-rations pack next time.\"\t\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\t\t\t\t\n\t\t\t\t\tPrivate Scott muses a little more on the subtle differences between raspberry and strawberry jams. Baker comments on cranberries. Simmons chips in on the differences between the bog grown sweet berry and the tart sort gotten from European trees. The Japanese contribute their commentary when their column marches into view.\n\t\t\t\t\t*goto closer?\n\t\t\t\t#\"Got any gum?\"\n\t\t\t\t\t\"Sure, LT,\" Scott says as he passes over a slim red pack of Dentyne chewing gum. \"But it's just mint.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I happen to like mint.\"\n\t\t\t\t\t\t\t\"Oh, uh, okay,\" Scott manages to say after an apparently harrowing thought.\n\n\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese column then marches into view.\n\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\t#\"My stomach is the boss right now. What it wants, it gets.\"\n\t\t\t\t\t\t\t\t\"Sure, LT,\" Scott says. \"I get that way too, just not over mint gum.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese column then marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\t#\"I actually prefer Chiclets.\"\n\t\t\t\t\t\t\t\t\"None of those, LT,\" Scott says. \"Just as much mint gum as you could want, which for me isn't a lot.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese column then marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\t#\"The preferences of an officer are unfathomable.\"\n\t\t\t\t\t\t\t\t\"Okay, LT,\" Scott says. \"But I don't get how mint gum and sailing on a ship meet up.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese column then marches into view.\n\t\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t#Chew my gum.\n\t\t\t\t\t\t\tIt's mint gum and it is good, especially out here a thousand miles and more from home.\n\n\t\t\t\t\t\t\tOf course, the Japanese swiftly interrupt that reverie when their column marches into view.\n\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t#\"Dried fruit sounds excellent.\"\n\t\t\t\t\t\"Really? Fresh is better, but I guess that's true for a lot of things,\" Scott says, then inspects two different boxes. \"Apricots or Peaches?\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Apricot.\"\n\t\t\t\t\t\t\t\"There you go,\" Scott says and tosses over a little box. \n\n\t\t\t\t\t\t\tYou snag it out of the air and open it up. Nothing like it in the world when you are out in the jungle. You scarf the apricots down then swig from your canteen afterward. For a moment you feel like you could take on the world.\n\n\t\t\t\t\t\t\tA good thing too because the Japanese column then marches into view.\n\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t#\"Peaches.\"\n\t\t\t\t\t\t\t\"There you go,\" Scott says and tosses over a little box.\n\n\t\t\t\t\t\t\tYou snag it out of the air and dig right in. Nothing like it in the world when you are out in the jungle. You scarf the peaches down then drain your canteen afterward. For a moment you feel like you could take on the world.\n\n\t\t\t\t\t\t\tA good thing too because the Japanese column then marches into view.\n\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t\t\t#\"Surprise me.\"\n\t\t\t\t\t\t\t*rand die_roll 1 2\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if die_roll =1\n\t\t\t\t\t\t\t\tScott tosses a box. Apricot. Should be delicious.\n\t\t\t\t\t\t\t*if die_roll =2\n\t\t\t\t\t\t\t\tScott tosses a box. Peaches. Should be delicious.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tAnd it is. You scarf the dried fruit down and then drain your canteen afterward. For a moment you feel like you could take on the world.\n\n\t\t\t\t\t\t\tA good thing too because the Japanese column then marches into view.\n\t\t\t\t\t\t\t*goto closer?\n\t\t\t\t#\"Peanuts and raisins.\"\n\t\t\t\t\t\"My choice too,\" Scott says and passes over the little delights. \"Just like being at a ballpark.\"\n\n\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\"The song goes 'buy me some peanuts and crackerjack, I don't care if I ever come back...' Private Landry sings pointedly. \"Don't you have baseball in Wisconsin?\"\t\n\n\t\t\t\t\t\t\"Sure, but we also have kielbasa and sauerkraut at the games instead of crackerjack,\" Scott replies.\n\n\t\t\t\t\t\t\"Sauerkraut is called liberty cabbage now.\"\n\n\t\t\t\t\t\t\"No one told me,\" Scott complains halfheartedly.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\tYou manage to wolf down the last of the tasty little feast just before the Japanese column marches into view.\n\t\t\t\t\t*goto closer?\n\t\t\t\t#\"How about some of those hard candies?\"\n\t\t\t\t\t\"There you go, LT,\" Scott says, then tosses the packet of candies over. \"Better than chocolate cause they don't melt in the heat.\"\n\n\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\"Yeah, but the day's not over yet,\" Private Landry chimes in.\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\tWith a bit of sweet in your mouth, nothing feels quite so bad. Even when the Japanese column marches into view it seems like a mere annoyance.\n\t\t\t\t\t*goto closer?\t\t\t\n\t\t\t\t#\"Nothing for now. You eat first.\"\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tOfficers can plan and command, but it is the enlisted ranks who fight, and die when the bullets start to fly. This meal could well be their last.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThe men come first. They have to because they are the ones who will fight, and perhaps die.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe men must come first. A little hunger is nothing in comparison to a \tbullet and, besides, your stomach can always lean against your spine.\t\t\t\t\t\t\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese interrupt this collegial meal when their column marches into view.\n\t\t\t\t\t*set morale +1\n\t\t\t\t\t*goto closer?\n\t#The enemy must be on their way. Stay primed.\n\t\tThere is never enough time, even when there seems to be. Indeed, it is only a short wait until the Japanese column marches into view.\n\t\t*goto closer?\n\n*label injury?\n\nPrivate Hagan suddenly disappears. A harsh grunt is heard from where he was. You rush forward to find the Marine thrown prone, clutching at a leg that the jungle has seemingly swallowed whole. \n\n\"Pig pit,\" Baker remarks as he pulls Hagan out, reveals a patch-work of cut timbers beneath a layer of fronds. \"The Japs must be starving to try eating island bacon.\"\n\n*choice\n\t#\"This wasn't made for us then?\"\n\t\t\"Nah,\" Baker remarks and points to where a tree has been marked with several distinctive cuts into the trunk. \"Or maybe it was the natives who did this. Either way, it's trouble for us.\"\n\t\t*goto injury?_1\n\t#\"Must be some big pigs.\"\n\t\t\"The pit's big, but not the pig. There's not enough to eat on the island to get big,\" Baker notes. \"Not like back in the States.\"\n\t\t*goto injury?_1\n\t*if character =0\n\t\t#I could fit two Cuban hogs down there, and some chickens too.\n\t\t\tThe pit is big, but you have the feeling that's only to make sure the caught pig can't get out. That'd be a sight, a bleeding pig racing around the island, trying to outrun its wounds. Wherever it ended up wouldn't be a convenient place.\n\t\t\t*goto injury?_1\n\t*if character =1\n\t\t#Scott's prize Chicago porkers could fit in there and hardly get their blue ribbons mussed.\n\t\t\tThe pit is big, but you have the feeling that's only to make sure the caught pig can't get out. A wounded pig will run because it is in pain and it will only stop running when it feels safe, or perishes.\n\t\t\t*goto injury?_1\n\t*if character =2\n\t\t#The pit is almost bigger than my old cadet barracks.\n\t\t\tThere's space, but the prospect of injury makes sleeping arrangements difficult to say the least.\n\t\t\t*goto injury?_1\n\t#Check on Hagan.\n\t\t*goto injury?_1\n\n*label injury?_1\n\nScott crouches down beside Hagan, touches a narrow, hand long piece of wood that has plunged through the boot sole, The wounded private muffles a whimper as the stake is slid free. Blood oozes from the wound and slowly fill his clompers with blood. \n\n*if character =0\n\tYou've seen worse back in boot camp.\n*if character =1\n\tIt looks bad and walking on it will only make things worse.\n*if character =2\n\tIts a wonder that Hagan is still conscious after a wound like that.\n*line_break\n*line_break\nScott looks up at you. \"This could take a while.\"\n\n\"I don't want to slow you down, LT,\" Hagan insists through tight teeth. \n\n*choice\n\t#\"Just stuff it with gauze for now.\"\n\t\tHagan will just have to keep walking on it. The mission comes first.\n\n\t\tScott packs the wound with gauze. Hagan grits his teeth as he takes a slippery step, shudders in agony as the march resumes.\n\t\t*set hagan 1\n\t\t*set casualties +1\n\t\t*goto 2nd_base_2\n\t#\"We can pause for a full bandage wrap.\"\n\t\tScott removes the boot, cleans and binds the wound then slips the clomper back on. Hagan grits his teeth as he takes a slippery step, strives to keep up despite the evident pain.\n\t\t*set time +1\n\t\t*set hagan 2\n\t\t*goto 2nd_base_2\n\t#\"Hagan, you're going back to the beach. Pass off your ammo to your fire team. Now.\"\n\t\t\"What?\" Hagan protests. \"But...\"\n\n\t\t\"You heard the Lieutenant,\" Baker growls. \"Get to it.\n\n\t\tPrivate Hagan passes off his ammo, all but a single clip. He grits his teeth and takes a slippery step. With a grunt he hobbles toward the distant beach.\n\t\t*set logistics +2\n\t\t*set morale -1\n\t\t*set hagan 1\n\t\t*set casualties +1\n\t\t*goto 2nd_base_2\n\t#\"No, you won't. Stay here, we'll pick you up after.\"\t\t\t\t\n\t\t\"What? No. Lt...\" Hagan pleads as he tries to stand but can't.\n\n\t\t\"Wait here,\" Baker repeats your order sternly. \"We won't be long.\"\n\t\t\n\t\tYou gesture sharply to the other Marines and resume the march. Many a head turns to regard Hagan in passing as the Private unlaces his boot in abject misery.\n\t\t*set hagan 2\n\t\t*set time -1\n\t\t*set morale -1\n\t\t*goto 2nd_base_2\n\n*label defend_beach_base\n\n*set meta_time 5\n*if situation =0\n\tYou have a little while to prepare and the enemy has done some of the work for you; slit trenches have already been prepared against bombardment and are numerous. There are even several crude traverses to be found.\n*if situation =2\n\tYour defenses continue to improve with each passing minute.\n*line_break\n*line_break\nBaker looks to you. \"Well LT? How do you want us to sweat so we don't bleed?\"\n\n*choice\n\t#\"Move the men into position. Half watch while the others rest.\"\t\n\t\t*set logistics +1\n\t\t*set morale +1\n\t\t*goto base_eats\n\t*if trench =0\n\t\t#\"Improve the trenches. Cover is the surest bet to resist the impending attack.\"\n\t\t\t*set trench 1\n\t\t\t*set time +2\n\t\t\t*set morale +2\n\t\t\t*goto time_enough_to_sweat\n\t*if aa =0\n\t\t#\"Lets see about that AA gun.\n\t\t\tFirepower is useless unless properly applied. You take a moment to make sure the AA gun and the MG's all have clear arcs.\n\n\t\t\t*if character =2\n\t\t\t\tThe type ninety-two machine gun is really an aerial weapon, found on all sorts of IJN planes. Unusual to find it in a ground defending role but then again this is a naval air base. \t\n\t\t\n\t\t\t\tYou set the machine gun back to order, taking care to add oil to the lube reservoir of the ammunition feed lest it jam. A brief lesson in Japanese firearms then makes ${holben_rank} Holben a temporary expert.\n\t\t\t*if character =1\n\t\t\t\tThey're similar weapons. Both need oil for the ammunition feed and a hand load of the first rounds. If the operator doesn't do anything stupid with it, then the weapon will behave.\n\t\t\t\n\t\t\t\tYou put ${holben_rank} Holben on the thing after you've fixed it up and give him a few pointers. Once that is done, the Marine grins over the gun-sights. \"Ready, Lieutenant!\"\n\t\t\t*if character =0\n\t\t\t\tThe AA gun is an old pierce and a copy of a British design besides. Truly it is an old friend. A little oil for the lube reservoir, a little care with feeding in the first round and its ready to go.\n\n\t\t\t\tOf course, like all good friends, you introduce them around. ${holben_rank} Holben gives a brief heft of the barrel then settles in comfortably. \"I like it Lieutenant. Can I keep it? I'll pack it out and everything.\"\n\n\t\t\t\tGiven the weight of the weapon, that's a fine joke indeed.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*set aa 1\t\n\t\t\t*set time +2 \n\t\t\t*set firepower 0\n\t\t\t*goto time_enough_to_sweat\n*comment start here\n*label base_eats\n\nThe surf pounds. The breeze is constant. It'd be easy to just close your eyes and drift off here. Your men have been up since before dawn after all, and have spent the day hacking through the jungle or fighting the enemy.\n\n*choice\n\t#Best break out the rations while there is time for it. \n\t\t*if trench =0\n\t\t\tYour men settle into what few trenches the Japanese have made in the sand.\t\n\t\t*if trench =1\n\t\t\tYour men settle into the trenches they just dug. One member from a fire team takes a breather while the others watch and wait.\n\t\t*line_break\n\t\t*line_break\n\t\t*if eat =0\t\n\t\t\tAlas, there isn't much to eat except crackers. The pockets on your utilities just aren't made for carrying around more than that. But a little water and a long chew of the hardtack is followed by a hurried smoke to settle the twitchy nerves of your men.\n\n\t\t\tNot long afterward the Japanese gather at the jungle-line.\n\t\t\t*goto base_firefight_2\n\t\t*if eat =1\n\t\t\tPrivate Scott breaks out a full K-ration he's rucked all the way into the jungle. This newly issued wonder is supposed to feed a man for an entire day. That should be enough for a few to snack upon.\n\t\n\t\t\t\"Chopped ham and eggs are in the breakfast pack,\" Scott says as he humorously taps the brown lettering of the first box he pulls out. It can't be bigger than a box of crackerjack. \"For dinner there's ham and cheese.\"\t\t\n\n\t\t\t*if landry =0\n\t\t\t\t\"And supper is pork with carrots and apples,\" Private Landry notes. \"The Washington Quartermaster must have it in for pigs.\"\n\t\t\t\t*line_break\n\t\t\t\t*line_break\n\t\t\t*if character =0\n\t\t\t\t\"Looks like a feast compared to some meals we've eaten,\" Baker notes.\n\t\t\t*if character =1\n\t\t\t\t\"I don't care what it is, so long as its edible,\" Baker remarks.\n\t\t\t*if character =2\n\t\t\t\tThey are clearly still working out possible variations of these K-rations. In fact, there will be comprehensive field tests next year if memory serves. Down in Panama somewhere.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t\"So, LT,\" Scott replies. \"What're you hungry for?\"\n\t\t\t*choice\n\t\t\t\t#\"Chopped ham and eggs sounds filling.\"\n\t\t\t\t\t\"That'd be my choice too, LT,\" Scott agrees and passes over the tin. There is a twist key to open it up and a little wooden spoon to go with it.\n\n\t\t\t\t\t\"They've really managed to fit a lot into that cracker-jack box,\" Baker puts in as you examine this marvel of modern engineering.\n\t\n\t\t\t\t\tIt doesn't take long to twist open the can and reveal the chopped ham and eggs. It doesn't look too bad, and tastes slightly better. But you are only half done when the Japanese arrive at the jungle-line.\n\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"Pass me a cereal bar.\"\n\t\t\t\t\t\"Didn't know you like the granola, LT,\" Scott says, passes over the small brick of compressed cereal.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tIt is a solid meal and promises to sit in your stomach like nothing else. Except perhaps for whiskey.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tIt can't match cereal with milk and a strawberry on top. But out here a fancy breakfast is just a dream.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe bars promise to travel a great way. You had a chance to sample them while on Annapolis maneuvers.\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese rudely interrupt when they arrive at the jungle-line.\n\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"I'll take coffee, even if it is the instant kind.\"\n\t\t\t\t\t\"Shame there's no way to heat it up,\" Scott says as he passes over the packet of instant Nescafe.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tThere certainly is no chance to light a fire. At best you can leave it in the noon sun, but really that's just asking for trouble. With that in mind you dribble the grounds into your canteen.\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThere is a lovely flavor that comes out from boiling it? You get the feeling you'll have grit in your teeth as you pour the grounds into your canteen.\n\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Do you know who invented instant coffee? A chemist by the name of Satori Kato.\"\n\t\t\t\t\t\t\t\t*set morale +1\n\t\t\t\t\t\t\t\t\"He sounds...\" Scott notes in surprise at the Japanese sounding name.\n\n\t\t\t\t\t\t\t\tYou explain that Satori Kato worked in Chicago back at the turn of the century. That he'd figured out how to dehydrate it properly and presented his efforts to the public at the Pan-American World Exposition. You can recall the article on that rather vividly even now. Instant coffee might have caught on more if President McKinley hadn't been assassinated around that time.\n\n\t\t\t\t\t\t\t\t\"Sorry, what?\" Scott asks after you finish the last part of the tale.\n\n\t\t\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\t\tPrivate Landry nudges his fellow Marine ever so lightly. \"Satori didn't shoot the president.\"\n\n\t\t\t\t\t\t\t\t\t\"Oh,\" Scott says and straightens up in understanding. \"Sure.\"\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Let's salute Satori Kato,\" Baker suggests and raises his packet up high to the sky. \"For helping keep United States Marines stay awake during the long hours of this war.\"\n\n\t\t\t\t\t\t\t\tIt is a hilarious salute given the situation, and so you men take up the call with many a grin as they pour the instant coffee grounds into their canteens.\n\n\t\t\t\t\t\t\t\tBut before you can more than sip the resultant mix, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t\t#Just pour the coffee into my canteen.\n\t\t\t\t\t\t\t\tCold coffee in the hot jungle. What a war.\n\n\t\t\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe coffee tastes horrible, of course, but thankfully the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"A plain cracker will do fine.\"\n\t\t\t\t\t\"We've got plenty of those,\" Scott notes and passes over a hard biscuit. \"They stuff at least eight in a box no matter if it is breakfast, dinner or supper.\"\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\"Crackers go with everything,\" Baker notes.\n\n\t\t\t\t\t\t\"Wish we had a little jam to go with them,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-ration next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\"Crackers are filing,\" Baker notes. \"Especially with a little jam.\"\n\n\t\t\t\t\t\t\"Wish they had jam in these rations,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-rations next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\"Crackers are the building block of any meal,\" Baker notes. \"They say the Roman legions would march anywhere so long as they had bread.\"\n\n\t\t\t\t\t\tIt's a funny comment, especially since you told him about it.\n\t\t\n\t\t\t\t\t\t\"Wish there was jam,\" Scott says.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\"If it is that important,\" Private Landry begins from his nearby position. \"then swipe a tin of jam from a C-rations pack next time.\"\t\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\t\t\t\t\n\t\t\t\t\tPrivate Scott muses a little more on the subtle differences between raspberry and strawberry jams. Baker comments on cranberries. Simmons chips in on the differences between the bog grown sweet berry and the tart sort gotten from European trees. The Japanese contribute their commentary with a swift arrival at the jungle-line.\n\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"How about a stick of gum?\"\n\t\t\t\t\t\"You sure, LT?\" Scott asks as he passes over a slim red pack of Dentyne chewing gum. \"It is just mint.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I happen to like mint.\"\n\t\t\t\t\t\t\t\"Oh, uh, okay,\" Scott manages to say after an apparently harrowing thought.\n\n\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\t#\"My stomach is the boss right now. What it wants, it gets.\"\n\t\t\t\t\t\t\t\t\"Sure, LT,\" Scott says. \"I get that way too, just not over mint gum.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\t#\"I actually prefer Chiclets.\"\n\t\t\t\t\t\t\t\t\"None of those, LT,\" Scott says. \"Just as much mint gum as you could want, which for me isn't a lot.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\t#\"The preferences of an officer are unfathomable.\"\n\t\t\t\t\t\t\t\t\"Okay, LT,\" Scott says. \"But I don't get how mint gum and sailing on a ship meet up.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t#Chew my gum.\n\t\t\t\t\t\t\tIt's mint gum and it is good, especially out here a thousand miles and more from home.\n\n\t\t\t\t\t\t\tOf course, the Japanese swiftly interrupt that reverie when they swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"Nothing for now. You eat first.\"\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tOfficers can plan and command, but it is the enlisted ranks who fight, and die when the bullets start to fly. This meal could well be their last.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThe men come first. They have to because they are the ones who will fight, and perhaps die.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe men must come first. A little hunger is nothing in comparison to a \tbullet and, besides, your stomach can always lean against your spine.\t\t\t\t\t\t\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\t*set morale +1\n\t\t\t\t\tOf course, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t*goto base_firefight_2\n\t\t*else\n\t\t\tPrivate Scott slings out a full J-ration he's totted in all the way from the beach and lays it all out. Thin cut, spiced and salted beef. Dried apricots. Dried peaches. Biscuits, of course. Roasted, salted peanuts. Raisins. Instant coffee. Lemon powder. Chewing gum. Fruit bars. Dried porridge. Hard candies. \n\n\t\t\tIt is almost like Christmas. No cocoa packets though.\n\t\t\t*if character =0\n\t\t\t\tThat's probably already in someone's canteen.\n\t\t\t*if character =1\n\t\t\t\tClearly someone has a sweet tooth.\n\t\t\t*if character =2\n\t\t\t\tMust be an oversight. You make a mental note to put that in your report.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*set morale +1\n\t\t\t*choice\n\t\t\t\t#\"Let's have a bit of the beef.\"\n\t\t\t\t\t\"That'd be my choice too, LT,\" Scott says and passes over the waxed box. \"Spiced and salted. Its like something you'd get in a fancy diner.\"\n\t\n\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\"Sure, if that diner is out in the desert,\" Landry chimes in.\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\tA strip of the beef is laced with salt and pepper that all but dances with delight upon your tongue.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Fine dining in the jungle.\"\n\t\t\t\t\t\t\t\"If you have to be in a Pacific jungle, at least you should be able to eat well,\" Baker notes. \"Wonder what they're chewing on in Britain?\"\n\n\t\t\t\t\t\t\tIt is a fair question, but one that must go unanswered because the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\t#\"Tasty, is what I'd call it. Like good water buffalo.\"\n\t\t\t\t\t\t\t\t\"If you say so,\" Scott says. \"Would like to try it at least once.\"\n\n\t\t\t\t\t\t\t\tHopefully he'll have that opportunity. But right now, sliced beef will have to do. Or it would except for the fact that the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\t#\"Good beef is where you find it.\"\n\t\t\t\t\t\t\t\t\"Ground beef,\" Scott replies and that draws a few grins.\n\n\t\t\t\t\t\t\t\tBut the Japanese must hate puns because they swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\t#\"Salmon is better, fresh caught, of course.\"\n\t\t\t\t\t\t\t\t\"That would be good,\" Scott says. \"Bet there's some good fishing around here.\"\n\n\t\t\t\t\t\t\t\tIt is a fair question, but one that must go unanswered because the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"Pass me that cereal bar.\"\n\t\t\t\t\t\"Didn't know you like the granola, LT,\" Scott says, passes over the small brick of compressed cereal.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tIt is a solid meal and promises to sit in your stomach like nothing else. Except perhaps for whiskey.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tIt can't match cereal with milk and a strawberry on top. But out here a fancy breakfast is just a dream.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe bars promise to travel a great way. You had a chance to sample them while on Annapolis maneuvers.\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese rudely interrupt your reverie when they swiftly arrive at the jungle-line.\n\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"I'll take coffee of the instant kind.\"\n\t\t\t\t\t\"Shame there's no way to heat it up,\" Scott says as he passes over the packet of instant Nescafe.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tThere certainly is no chance to light a fire. At best you can leave it in the noon sun, but really that's just asking for trouble. With that in mind you dribble the grounds into your canteen.\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThere is a lovely flavor that comes out from boiling it? You get the feeling you'll have grit in your teeth as you pour the grounds into your canteen.\n\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Do you know who invented instant coffee? A chemist by the name of Satori Kato.\"\n\t\t\t\t\t\t\t\t*set morale +1\n\t\t\t\t\t\t\t\t\"He sounds...\" Scott notes in surprise at the Japanese sounding name.\n\n\t\t\t\t\t\t\t\tYou explain that Satori Kato worked in Chicago back at the turn of the century. That he'd figured out how to dehydrate it properly and presented his efforts to the public at the Pan-American World Exposition. You can recall the article on that rather vividly even now. Instant coffee might have caught on more if President McKinley hadn't been assassinated around that time.\n\n\t\t\t\t\t\t\t\t\"Sorry, what?\" Scott asks after you finish the last part of the tale.\n\n\t\t\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\t\tPrivate Landry nudges his fellow Marine ever so lightly. \"Satori didn't shoot the president.\"\n\n\t\t\t\t\t\t\t\t\t\"Oh,\" Scott says and straightens up in understanding. \"Sure.\"\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Let's salute Satori Kato,\" Baker suggests and raises his packet up high to the sky. \"For helping keep United States Marines stay awake during the long hours of this war.\"\n\n\t\t\t\t\t\t\t\tIt is a hilarious salute given the situation, and so you men take up the call with many a grin as they pour the instant coffee grounds into their canteens.\n\n\t\t\t\t\t\t\t\tBut before you can more than sip the resultant mix, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t\t#Just pour the coffee into my canteen.\n\t\t\t\t\t\t\t\tCold coffee in the hot jungle. What a war.\n\n\t\t\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe coffee tastes horrible, of course. But thankfully the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"A cracker, plain old cracker, will do fine.\"\n\t\t\t\t\t\"We've got plenty of those,\" Scott notes and passes over a hard biscuit. \"They stuff at least eight in a box no matter if it is breakfast, dinner or supper.\"\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\"Crackers go with everything,\" Baker notes.\n\n\t\t\t\t\t\t\"Wish we had a little jam to go with them,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-ration next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\"Crackers are filing,\" Baker notes. \"Especially with a little jam.\"\n\n\t\t\t\t\t\t\"Wish they had jam in these rations,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-rations next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\"Crackers are the building block of any meal,\" Baker notes. \"They say the Roman legions would march anywhere so long as they had bread.\"\n\n\t\t\t\t\t\tIt's a funny comment, especially since you told him about it.\n\t\t\n\t\t\t\t\t\t\"Wish there was jam,\" Scott says.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\"If it is that important,\" Private Landry begins from his nearby position. \"then swipe a tin of jam from a C-rations pack next time.\"\t\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\t\t\t\t\n\t\t\t\t\tPrivate Scott muses a little more on the subtle differences between raspberry and strawberry jams. Baker comments on cranberries. Simmons chips in on the differences between the bog grown sweet berry and the tart sort gotten from European trees. The Japanese contribute their commentary when they swiftly arrive at the jungle-line.\n\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"Got any gum?\"\n\t\t\t\t\t\"Sure, LT,\" Scott says as he passes over a slim red pack of Dentyne chewing gum. \"But it's just mint.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I happen to like mint.\"\n\t\t\t\t\t\t\t\"Oh, uh, okay,\" Scott manages to say after an apparently harrowing thought.\n\n\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\t#\"My stomach is the boss right now. What it wants, it gets.\"\n\t\t\t\t\t\t\t\t\"Sure, LT,\" Scott says. \"I get that way too, just not over mint gum.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\t#\"I actually prefer Chiclets.\"\n\t\t\t\t\t\t\t\t\"None of those, LT,\" Scott says. \"Just as much mint gum as you could want, which for me isn't a lot.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\t#\"The preferences of an officer are unfathomable.\"\n\t\t\t\t\t\t\t\t\"Okay, LT,\" Scott says. \"But I don't get how mint gum and sailing on a ship meet up.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t#Chew my gum.\n\t\t\t\t\t\t\tIt's mint gum and it is good, especially out here a thousand miles and more from home.\n\n\t\t\t\t\t\t\tOf course, the Japanese swiftly interrupt that reverie when they swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t#\"Dried fruit sounds excellent.\"\n\t\t\t\t\t\"Really? Fresh is better, but I guess that's true for a lot of things,\" Scott says, then inspects two different boxes. \"Apricots or Peaches?\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Apricot.\"\n\t\t\t\t\t\t\t\"There you go,\" Scott says and tosses over a little box. \n\n\t\t\t\t\t\t\tYou snag it out of the air and open it up. Nothing like it in the world when you are out in the jungle. You scarf the apricots down then swig from your canteen afterward. For a moment you feel like you could take on the world.\n\n\t\t\t\t\t\t\tA good thing too because the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t#\"Peaches.\"\n\t\t\t\t\t\t\t\"There you go,\" Scott says and tosses over a little box.\n\n\t\t\t\t\t\t\tYou snag it out of the air and dig right in. Nothing like it in the world when you are out in the jungle. You scarf the peaches down then drain your canteen afterward. For a moment you feel like you could take on the world.\n\n\t\t\t\t\t\t\tA good thing too because the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t*goto base_firefight_2\n\t\t\t\t\t\t#\"Surprise me.\"\n\t\t\t\t\t\t\t*rand die_roll 1 2\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*if die_roll =1\n\t\t\t\t\t\t\t\tScott tosses a box. Apricot. Should be delicious.\n\t\t\t\t\t\t\t*if die_roll =2\n\t\t\t\t\t\t\t\tScott tosses a box. Peaches. Should be delicious.\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\tAnd it is. You scarf the dried fruit down and then drain your canteen afterward. For a moment you feel like you could take on the world.\n\n\t\t\t\t\t\t\tA good thing too because the Japanese swiftly arrive at the jungle-line.\n\t\t\t\t\t\t\t*goto base_firefight_2\n\t
