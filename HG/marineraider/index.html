to enemy_officer\n\t\t\t\n*label pursuit?\n\n*page_break\n\nThe enemy flees into the Jungle! Private Scott bellows fiercely as he lumbers after them. The other Marines turn to follow.\n\nThis includes Sergeant Baker who belatedly loos to you. \"LT?\"\n\n*choice\n\t#\"Run them down!\"\n\t\t*goto pursuit!\n\t#\"Let them go. We've got to get to the base.\"\n\t\tSergeant Baker summons back the eager Marines with a sharp whistle and commanding bellow. Even the giddy rush of combat can't overwhelm deeply ingrained discipline.\n\n\t\t*if merrik =1\n\t\t\tThere is still Private Merrik to consider. Badly wounded, he'll certainly slow you down.\n\t\t\t*choice\n\t\t\t\t#Have Ransom escort the wounded Private back to the beach.\n\t\t\t\t\t*set merrik 1\n\t\t\t\t\t*set time +1\n\t\t\t\t\t*set firepower 1\n\t\t\t\t\t*goto approach\n\t\t\t\t#Let Merrik walk back alone. Your Marines must press on.\n\t\t\t\t\t*if firepower =1\n\t\t\t\t\t\t*set firepower 0\n\t\t\t\t\t*goto approach\n\t\t*else\n\t\t\t*goto approach\n\t#\"They're gone already. Search the fallen for any intel.\"\n\t\t*if merrik =1\n\t\t\tThere is still Private Merrik to consider. Badly wounded, he'll certainly slow everyone down.\n\t\t\t*choice\n\t\t\t\t#Have Ransom escort him back to the beach.\n\t\t\t\t\t*set merrik 1\n\t\t\t\t\t*set time +1\n\t\t\t\t\t*set firepower 1\n\t\t\t\t\t*goto letters\n\t\t\t\t#Bandage him up and let him walk back alone. We must press on.\n\t\t\t\t\t*if firepower =1\n\t\t\t\t\t\t*set firepower 0\n\t\t\t\t\t*goto letters\n\t\t*else\n\t\t\t*goto letters\n\n*label pursuit!\n\nYour Marines pursue the remnants of the patrol. \n*if ishiro =1\n\tThey pounce on the laggard officer and drag him back before you. A clatter of rifle fire fills the air as the leaderless patrol is run down by the others.\n\t*set resistance -3\n\t*set morale +1\n\t*goto enemy_officer_detained\n*if morale >4\n\tWith boundless zeal Private Scott tackles the officer and swiftly wrestles him into submission. Rifle fire ensures that none of the other enemies escapes.\n\t*set morale +1\n\t*set resistance -3\n\t*goto enemy_officer_detained\n*if morale =4\n\tScott corners an officer, brings him back at rifle-point. Two of the other enemies are dealt with by selective fire.\n\t*set morale +1\n\t*set resistance -2\n\t*goto enemy_officer_detained\n*if morale =3\n\tSeveral of the enemies fall, but at least one, the officer, escapes.\n\t*set resistance -2\n\t*set ishiro 0\n\t*goto letters\n*if morale =2\n\tYour men give it their best, but the jungle proves too thick for rifle fire and only the last laggard foe succumbs.\n\t*set resistance -1\n\t*set time +1\n\t*set ishiro 0\n\t*goto letters\n*else\n\tThe men try to comply but their heart is just not in it after slogging through the jungle. The enemy escapes into the green.\n\t*set ishiro 0\t\n\t*set time +1\t\n\t*goto letters\n\n*label enemy_officer\n\nThe Japanese officer, his distinctive features all but set in stone, shifts his samurai blade to the ready despite the immense firepower arrayed against him.\n\n*choice\n\t#If he's going to resist, shoot him.\n\t\t*set resistance -1\n\t\t*set ishiro_sword 1\n\t\t*goto letters\n\t#Try to talk him down\t\t\n\t\t*goto enemy_officer_talk\n\t*if weapon =3\n\t\t#Prime the ignitor on my flamethrower and threaten him with flaming agony.\n\t\t\tThe enemy officer swallows a gulp of raw fear and drops his sword.\n\t\t\t*set morale +1\n\t\t\t*goto enemy_officer_detained\n\t*if character =1 \n\t\t#Shoot the sword out of his hands with my pistol.\n\t\t\tYour single shot whisks the enemy's blade away. The enemy Officer stares numbly at his now empty hand.\n\t\t\t*set morale +1\n\t\t\t*goto enemy_officer_detained\n\t\n*label enemy_officer_talk\n\n*if character =2\n\tYou begin with conversational Nipponese. \"Ohayou-gozaimasu. Hajimemashite?\" \n\n\tInstead of answering, the Japanese Officer stares warily at you. \n\t*line_break\n\t*line_break\n*if character =0\n\tYou dust off a little of what you learned at Port Arthur. An all-purpose greeting, \"Konnichiwa.\"\n\n\tInstead of answering, the Japanese Officer narrows his eyes at you. \n\t*line_break\n\t*line_break\n*if character =1\n\tThe Japanese officer is oddly silent and still. Hopefully he speaks some English or else this is going to be a one-sided conversation.\n\n*choice\n\t#\"Now look. You can either be a prisoner or a corpse. Your choice.\"\n\t\t\"My name was Ishiro Hasebe, remember that.\" he replies in accented English. Then he charges forward. Then he is gunned down.\n\t\t*set resistance -1\n\t\t*set ishiro_sword 2\n\t\t*set ishiro_name 1\n\t\t*goto letters\n\t#\"Let's be gentlemen about this.\"\n\t\t\"What?\" the Japanese Officer blurts out incredulously.\n\n\t\t*if character =2\n\t\t\tYou explain how the Geneva convention protects the rights of prisoners taken in war. How America signed this and is honor bound to comply.\n\n\t\t\tHe sighs and gives a little sigh. \"I see,\" he says in his native tongue. \"Well, if that is how things are done, then it appears that I have become your rightful prisoner.\"\n\t\t\t*goto enemy_officer_detained\n\t\t*else\n\t\t\tYou start to explain how the Geneva conventions protects prisoners but your Japanese really isn't up to the task.\n\n\t\t\tThe enemy officer stares straight at you, eyes set on some distant field. In English he says, \"My name was Ishiro Hasebe, remember that.\" \n\t\t\n\t\t\tIshiro charges, slashes, and is gunned down in turn. A long streak of red blossoms across your arm. As pain seeps in, you know you will have a long scar to remember him by.\n\t\t\t*set character_condition -1\n\t\t\t*set ishiro_sword 2\n\t\t\t*set ishiro_scar 1\n\t\t\t*set ishiro_name 1\n\t\t\t*set resistance -1\n\t\t\t*goto letters\n\t#\"You have become my prisoner.\"\n\t\t\"No...\" he protests in accented English.\n\t\n\t\tYou beckon for his sword. A mention of the Geneva Convention and how it protects him from this moment on brings his gaze up.\n\t\n\t\t\"Oh, I had not known...\" he mutters under his breath. With profound resignation he hands over his weapon. \"As you say, I have already become your rightful prisoner.\"\n\t\t*set morale +1\n\t\t*goto enemy_officer_detained\n\n*label enemy_officer_detained\n*set ishiro_sword 3\n\n*if interrogation_count =0\n\tPrivate Scott looms behind the bewildered officer as the interrogation begins.\n*if interrogation_count =1\n\tThe interrogation continues.\n*if interrogation_count =2\n\tBaker begins to pace. With a pointed effort he glances eastward into the jungle.\n*if interrogation_count =3\n\tYour men grow edgy as you pepper\n\t*if ishiro_name =0\n\t\tthe enemy\n\t*if ishiro_name =1\n\t\tIshiro\n\twith questions.\n*line_break\n*line_break\n*set interrogation_count +1\n*if interrogation_count >3\n\t*if ishiro_name =0\n\t\tThe enemy officer\n\t*if ishiro_name =1\n\t\tIshiro\n\tis clearly rattled by your questions.\n\t*if float =1\n\t\tAnd why shouldn't he be? You now know about the float-plane base.\n\t*if float =2\n\t\tAnd he should be, because now you know an excellent axis of attack.\n\t*if float =3\n\t\tMention of the villagers has really shaken him up. Why?\n\t*line_break\n\t*line_break\n*if interrogation_count >7\n\tThe interrogation drags on. The day is passing.\n\n\tSergeant Baker sidles up behind you. \"Lieutenant, we need to get going.\"\n\t*set time +1\n*if interrogation_count >10\n\t*set time +1\n\t*goto enemy_officer_away\t\t\n\t\n*choice\n\t*hide_reuse #\"Name and rank.\"\n\t\t\"Ishiro Hasebe, lieutenant, Imperial Japanese navy,\" the officer says in respectable English.\n\t\t*set ishiro_name 1\n\t\t*goto enemy_officer_detained\n\t*hide_reuse #\"How many men do you have?\"\n\t\t\"I had six,\" he says as he stares into the distance. \"Good men too.\"\n\t\t*goto enemy_officer_detained\n\t*hide_reuse #\"What are your defenses?\"\n\t\t\"I refuse to tell you about the sea-plane base,\" he insists.\n\n\t\t\"You just did,\" Private Scott notes from behind the man.\n\t\t*if ishiro_name =0\n\t\t\tThe enemy officer\n\t\t*if ishiro_name =1\n\t\t\tIshiro\n\t\tcurses under his breath.\n\t\t*set float 1\n\t\t*goto enemy_officer_detained\n\t*hide_reuse #\"What were your orders?\"\n\t\t\"To patrol the island paths, keep them clear of animals and villagers,\"\n\t\t*if ishiro_name =0\n\t\t\tThe enemy officer\n\t\t*if ishiro_name =1\n\t\t\tIshiro\n\t\texplains.\n\n\t\t\"Villagers?\" Private Scott asks aloud.\n\n\t\t\"They are on the north coast. There is a small village. Sometimes, we trade for fish,\"\n\t\t*if ishiro_name =0\n\t\t\tThe enemy officer\n\t\t*if ishiro_name =1\n\t\t\tIshiro\n\t\treplies. When your skepticism becomes clear, he adds. \"Our Major, Major Yamamoto, refuses to... Things will not be as they are in China. Things will not be as they are in the army.\"\n\t\t*goto enemy_officer_detained_ask_about_orders\n\t*hide_reuse #\"When will the base be resupplied?\"\n\t\t\"Not for many weeks,\"\n\t\t*if ishiro_name =0\n\t\t\tThe enemy officer\n\t\t*if ishiro_name =1\n\t\t\tIshiro\n\t\tsays. \"And I will not name the date. It would be distasteful to allow you to ambush the submarine as you have done to me.\"\n\t\t*set supply_submarine 1\n\t\t*choice\n\t\t\t#\"Fair enough.\"\n\t\t\t\tYou can't really make him tell you. Or rather, if you made him tell you then he could simply lie. No way to know the truth. Not out here.\n\t\t\t\t*goto enemy_officer_detained\n\t\t\t*if float >1\n\t\t\t\t#\"You just can't help but give away things.\"\n\t\t\t\t\t\"I am a naval officer, not an interrogator,\" he replies with a hint of frost. \"What will you do with me?\"\n\n\t\t\t\t\tThat is a question. One you will have to answer eventually.\n\t\t\t\t\t*goto enemy_officer_detained\n\t\t\t#Submarine? Well, that's a job for the navy.\n\t\t\t\tAs a rule, Marines don't fight submarines. That'd be a bit much to ask of any leatherneck.\n\t\t\t\t*goto enemy_officer_detained\n\t*if interrogation_count \u003c4\n\t\t#\"Tell me about your base.\"\n\t\t\t\"It is on an island,\"\n\t\t\t*if ishiro_name =0\n\t\t\t\tthe enemy officer\n\t\t\t*if ishiro_name =1\n\t\t\t\tIshiro\n\t\t\treplies with a verbal flip.\n\t\t\t*choice\n\t\t\t\t#\"This one?\"\n\t\t\t\t\t\"It is possible,\"\n\t\t\t\t\t*if ishiro_name =0\n\t\t\t\t\t\tthe enemy officer\n\t\t\t\t\t*if ishiro_name =1\n\t\t\t\t\t\tIshiro\n\t\t\t\t\tadmits.\n\t\t\t\t\t*goto enemy_officer_detained\n\t\t\t\t#\"What a coincidence. I'm on an island.\"\n\t\t\t\t\t\"Coincidence... what an interesting word,\"\n\t\t\t\t\t*if ishiro_name =0\n\t\t\t\t\t\tthe enemy officer\n\t\t\t\t\t*if ishiro_name =1\n\t\t\t\t\t\tIshiro\n\t\t\t\t\tnotes. \"I shall remember it.\"\n\t\t\t\t\t*goto enemy_officer_detained\n\t\t\t\t#I need to ask more questions, get him to spill something.\n\t\t\t\t\tThere is an art to interrogation. You haven't been trained in that, but that doesn't mean you can't try it.\n\n\t\t\t\t\tA few more questions might get\n\t\t\t\t\t*if ishiro_name =0\n\t\t\t\t\t\tthe enemy officer\n\t\t\t\t\t*if ishiro_name =1\n\t\t\t\t\t\tIshiro\n\t\t\t\t\tto let something slip.\n\t\t\t\t\t*goto enemy_officer_detained\n\t*if interrogation_count >3\n\t\t#\"How do we avoid trouble with the villagers?\"\n\t\t\t\"The villagers are in the north. There are trails there that they use,\"\n\t\t\t*if ishiro_name =0\n\t\t\t\tthe enemy officer\n\t\t\t*if ishiro_name =1\n\t\t\t\tIshiro\n\t\t\texplains. \"If you avoid those, you should avoid them.\"\n\t\t\n\t\t\tThe Japanese clearly watch the north, which means a southern approach could work.\n\t\t\t*set float 2\n\t\t\t*if time >0\n\t\t\t\t*set time -1\n\t\t\t*if time >0\n\t\t\t\t*set time -1\n\t\t\t*goto enemy_officer_away\n\t#End the interrogation.\n\t\tYou signal to Baker that you are done talking. Now you have to figure out what comes next.\n\t\t*goto enemy_officer_away\n\n*label enemy_officer_away\n\n*if ishiro_name =0\n\t\"My name was Ishiro Hasebe,\" the Japanese officer remarks and lunges to recover his sword.\n\n\tThat doesn't work, but it does get him killed.\n\t*if character_condition >2\n\t\t*line_break\n\t\t*line_break\n\t\t*set character_condition -1\n\t\t*set ishiro_scar 1\n\t\tA long cut across your arm proves to be an apt reminder of his name.\n\t*set ishiro_sword 3\n\t*set ishiro_name 1\n\t*set resistance -1\n\t*goto letters\n*else\n\tIshiro stands with hands neatly folded, as if awaiting execution.\n\n\t*choice\n\t\t#Allow him to leave.\n\t\t\t*set morale -1\n\t\t\t*set ishiro 2\n\t\t\tIshiro stares uncomprehendingly at you. \"I... can go?\"\n\t\t\t*choice\n\t\t\t\t#\"I can't keep you prisoner, and I can't kill you.\"\n\t\t\t\t\t\"A dilemma,\" he admits. \"You make a good point about allowing me to leave my old life behind. Sayonara.\"\n\n\t\t\t\t\tWith that he slips off into the jungle.\n\t\t\t\t\t*goto approach\t\n\t\t\t\t*if character =0\n\t\t\t\t\t#\"If I see you again, and you are armed, then you are done.\"\n\t\t\t\t\t\t\"A fair stipulation,\" he remarks, though his eyes flicker to the blade that is no longer his. \"I understand you. Sayonara.\"\n\n\t\t\t\t\t\tWith that he slips off into the jungle.\n\t\t\t\t\t\t*goto approach\t\n\t\t\t\t*if character =2\n\t\t\t\t\t#\"You heard me. Do you get it? Dai jobu?\"\n\t\t\t\t\t\t\"It is understood,\" he replies and offers over a little nod. \"Sayonara.\"\n\n\t\t\t\t\t\tWith that he slips off into the jungle.\n\t\t\t\t\t\t*goto approach\t\n\t\t\t\t#Nod.\n\t\t\t\t\tHe returns the nod, and slips off into the jungle.\n\t\t\t\t\t*goto approach\t\n\t\t#Send him back with an armed escort.\n\t\t\t\"Of course,\" Ishiro says and folds his hands before him. \"I remain your prisoner.\"\n\n\t\t\tHe remains perfectly still while you call Corporal Ransom forward to have Ishiro escorted back to the beach.\n\t\t\t*set ishiro 1\n\t\t\t*set ransom 1\n\t\t\t*set firepower 1\n\t\t\t*goto approach\n\t\t#Tie him to a tree.\n\t\t\t\"What is this?\" Ishiro cries out in disbelief as the rope is laid on. \"I have not surrendered to a tree. Put a bullet in my heart instead of killing me with shame.\"\n\n\t\t\t\"We'll be back for you. Eventually,\" Private Scott assures him as he knots up the length of good hemp rope. \"There. You're just like one of my Pa's prize hogs that's decided to go feral, again.\"\n\n\t\t\tIt isn't perfect, but it will have to do. Ishiro curses up a storm in two tongues as you leave him bound and behind.\n\t\t\t*set ishiro 3\n\t\t\t*goto approach\n\n\n*label enemy_officer_detained_ask_about_orders\n\n*choice\n\t*hide_reuse #\"Your Major finds 'The Army Way' distasteful?\"\n\t\t\"The actions in China are... excessive,\"\n\t\t*if ishiro_name =0\n\t\t\tThe enemy officer\n\t\t*if ishiro_name =1\n\t\t\tIshiro\n\t\tsays after a moment of thought. Clearly he doesn't want to say the blunt truth, which is indeed very Japanese of him.\n\t\t*goto enemy_officer_detained_ask_about_orders\n\t*if character =2\n\t\t#\"Is your Major any relation to the Commander in chief of your Combined fleet?\"\t\n\t\t\t*if ishiro_name =0\n\t\t\t\tThe enemy officer\n\t\t\t*if ishiro_name =1\n\t\t\t\tIshiro\n\t\t\tshrugs.\n\t\t\t*set interrogation_count +1\n\t\t\t*choice\n\t\t\t\t#\"Yes or no.\"\n\t\t\t\t\t\"Yes, but he does not like to say so,\" he explains.\n\n\t\t\t\t\tIt is a commendable thing, though you do not doubt that the man's superiors know of it and act accordingly.\n\t\t\t\t\t*goto enemy_officer_detained\n\t\t\t\t#\"He doesn't like to trade on his name. Understandable.\"\n\t\t\t\t\t*if ishiro_name =0\n\t\t\t\t\t\tThe enemy officer\n\t\t\t\t\t*if ishiro_name =1\n\t\t\t\t\t\tIshiro\n\t\t\t\t\tgives a brisk little nod. Navies are alike the world over, or so it would seem.\n\t\t\t\t\t*goto enemy_officer_detained\n\t\t\t\t#\"What is he doing out here?\"\n\t\t\t\t\t\"A trusted mission,\"\n\t\t\t\t\t*if ishiro_name =0\n\t\t\t\t\t\tThe enemy officer\n\t\t\t\t\t*if ishiro_name =1\n\t\t\t\t\t\tIshiro\n\t\t\t\t\tremarks. \"Worthy of the name.\"\n\t\t\t\t\t*if interrogation_count \u003c4\n\t\t\t\t\t\t*set interrogation_count 4\n\t\t\t\t\t*goto enemy_officer_detained\n\t*if character !=2\n\t\t#\"Your Major sounds like a good officer.\"\n\t\t\t*set interrogation_count +1\n\t\t\t\"Yes, I thought so,\"\n\t\t\t*if ishiro_name =0\n\t\t\t\tthe enemy officer\n\t\t\t*if ishiro_name =1\n\t\t\t\tIshiro\n\t\t\tremarks. \"Though I am no longer under his command.\"\n\n\t\t\tTrue. Interesting that he felt the need to say it aloud too.\n\t\t\t*goto enemy_officer_detained\n\t#Yamamoto. A common enough name.\n\t\tJapanese names are tricky.\n\t\t*if character =2\n\t\t\tThey always have been.\n\t\tBut now you know who the enemy major is in command of the island garrison.\n\t\t*goto enemy_officer_detained\n\n*label letters\n\nPrivate Scott rushes over to you. In his hands rests a sheaf of paper. \"Lieutenant! I found some weird writing here. Was on a rifleman. It might be in code!\"\n*choice\n\t#\"Code?\"\n\t\t\"Well I can't read it, so... code,\" Private Scott says and rustles in a pocket. \"Oh, and it had a pretty girl's picture with it too.\"\n\t\t*goto letters_1\n\t*if character =2 \n\t\t#\"Those are Kanji, or literally 'Chinese characters'.\"\n\t\t\t\"Chinese code?\" Private Scott asks and rustles in a pocket. \"Oh, and it had a pretty girl's picture with it too.\"\n\t\t\t*goto letters_1\n\t*if character =0\n\t\t#\"Yep, that's Japanese alright.\"\n\t\t\t\"Thought so,\" Private Scott says and rustles in a pocket. \"Oh, and it had a pretty girl's picture with it too.\"\n\t\t\t*goto letters_1\n\t*if character =1\n\t\t#\"It was on a body?\"\n\t\t\tThe strokes of pen are certainly odd. Something tickles in your memory about Japanese writing.\n\n\t\t\t\"Yeah, it was in a little pouch,\" Private Scott says and rustles in a pocket. \"Oh, and it had a pretty girl's picture with it too.\"\n\t\t\t*goto letters_1\n\t#Take a look.\n\t\tThe strokes of pen on paper are bold ones.\n\t\t*if character =2\n\t\t\tThe kanji script is fully legible, though not readily comprehensible.\n\t\t*if character !=2\n\t\t\tSomeone in authority have him these orders.\n\t\t*line_break\n\t\t*line_break\n\t\t\"It was in a little pouch,\" Private Scott says and rustles in a pocket. \"Oh, and it had a pretty girl's picture with it too.\"\n\t\t*goto letters_1\n\n*label letters_1\n\n*if landry =0\n\tPrivate Landry glances over, raises an eyebrow. \"She in code too?\"\n\t*line_break\n\t*line_break\nThe black and white photo Scott thrusts over reveals a lovely little street whose sidewalks are lined with flowers. On either side of the paving, tile roofed houses merrily nuzzle against one another. The girl in the photo is definitely Japanese, young, pretty, and smiling as if only for you. Behind her, in the hazy distance, you can make out the weathered\n*if character =1\n\tcinder\ncone of a volcano. \n\n*choice\n\t#Have Corporal Ransom translate the documents in full.\n\t\tRansom, who really should have gone through OCS or else gone to work for G-2, reads through the letter between cigarette puffs.\n\t\n\t\tAs the third page ends, he shrugs. \"The guy was writing to his sweety. Says things are really bad here. That the Imperial Japanese Navy stuck them way out where they can only get supplied by submarine and that's never enough for the garrison so they're having to fish a lot. He wants to go home next time the sub comes, which should be in a week or so, but thinks he's going to die here. Guess he was right about that.\"\n\t\t*set time +1\n\t\t*if supply_submarine =0\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\tIt is a good that the schedule for the supply submarine is confirmed.\n\t\t\t*set supply_submarine 1\n\t\t*goto imperial_japanese_navy\n\t#Have Ransom concentrate on the first paragraph.\n\t\tRansom, who really should have gone through OCS or else gone to work for G-2, gives it a quick skim as he hurriedly smokes down a cigarette \"Its a personal letter. Young guy telling his sweety how bad things are. He's Imperial Japanese Navy, by the way.\n\t\t*goto imperial_japanese_navy\n\t*if character =2\n\t\t#It appears to be a letter from a young man to his hometown sweetheart and therefore is unlikely to have useful information. \n\t\t\tNaturally the men are impressed that you barely need a moment to translate the kanji. They don't need to know it took you months of intense study to gain that proficiency.\n\t\t\t*set morale +1\n\t\t\t*goto letters_away\n\t#The letters belong to a private and will not be useful.\n\t\t*goto letters_away\n\n*label imperial_japanese_navy\n\nThe Imperial Japanese Navy is running things here, not the Army. Well, that makes sense. The bay could be an emergency landing spot for float-planes. If those aerial scouts are operating near Espiritu Santo, that would mean trouble for future operations in these island chains. \n\n*if merrik =1\n\tRansom tosses his head back toward where Merrik is being bandaged up. \"Guess I best be off.\"\n\n\tWith a nod you let your corporal go. Pale Merrik, no longer the mule, still finds the strength to gripe about how his corporal intends to carry him back to the beach.\n\t*line_break\n\t*line_break\n*goto letters_away\n\n*label letters_away\n\nThe fate of the letters, and the photograph of the girl, remain.\n\n*choice\n\t#Take them with me. They'd just rot in the jungle.\n\t\t*goto approach\n\t#Leave them with the body. That feels more right.\n\t\t*goto approach\n\n*label approach\n\n*set meta_time 2\n*page_break\n\n*if situation =4\n\tYour platoon creeps back through the patch where you struck the patrol.\n\t*if character =0\n\t\tDead foes lay sprawled before you yet again. No time to bury them. One day it might be your turn to forever sleep, but not yet.\n\t\t*page_break\n\t*if character >0\n\t\tThe fallen Japanese lies utterly still, almost as if you could give them a nudge and each would wake from a nap. As the terrifying rush of combat fades, the lull tosses your guts worse than being pounded by high seas. You know deep down that nothing will be the same.\n\t\t*page_break\n\nThe jungle thins as you near the edge. The sparkle of white sands can be seen ahead. The eastern shore, and the Japanese base you've been hunting, are just over there.\n\nYou and Baker edge forward at a slow and steady crawl. There are four rickety huts set above the mark of high tide. Each is crafted from local trees and seems to sway even in a gentle breeze. Two equally dubious latrines complete the occupied arc of a pristine white sand bay.\n\n*if time \u003c1\n\tIt is a quiet, idyllic place not unlike Hawaii. Even the solitary Japanese soldier dozing in the shade of palm fronds that cover an anti-aircraft gun can't upset the tranquility.\n*if time =1\n\tIt is a quiet, idyllic place much like Hawaii. At least, it would be if it were not for a pair of Japanese soldiers who idly flick stones back and forth at one another beneath the shade of palm fronds that cover an anti-aircraft gun.\n*if time =2\n\tIt is an idyllic location except for the squad of six Japanese soldiers who are drawn to order by their Sergeant before a palm frond covered anti-aircraft gun.\n*if time =3\n\tThe idyllic location is spoiled by half a dozen Japanese who labor in the hot sun to complete stretches of trenches between huts while a pair of soldiers laboriously remove a layer of palm fronds from a menacing anti-aircraft gun.\t\n*if time =4 \n\tA dozen foes are hard at work adding traverses to a series of trenches to form a solid sand perimeter around the camp. A single machine gun covers the northern arc. An anti-aircraft gun at center is manned and ready, the two soldiers there ardently watching the eastern sky and sea.\n*if time >4\n\tThe enemy is dug in. A machine gun covers the northern approach and its twin has the southern side. It seems likely that each would be able to shift west toward the jungle as well. An anti-aircraft gun at center is manned, the two soldiers there keeping watch on the eastern sky and sea.\n\t\t\nBaker catches your eye and mouths the obvious question. 'What's the plan?'\n\n*if situation =4\n\t*set situation 5\n*if situation =0\n\t*set situation 4\n\n*choice\n\t#\"We are going to charge straight in. They won't expect it.\"\n\t\t*goto charge_straight_in\n\t#\"Fire and maneuver should clear out the enemy.\"\n\t\t*goto fire_and_manuver\n\t#\"We'd better call in a bombardment from the Schley.\"\n\t\t*goto bombardment\n\t#\"Open fire! All weapons!\"\n\t\t*goto open_fire\n\t*if character =1\n\t\t#\"Follow me! Surprise will be our ally when we overrun their base!\"\n\t\t\t*goto follow_me\n\n*label charge_straight_in\n\n*if time \u003c1\n\tYou and your men descend upon the unsuspecting Japanese soldier. Others emerge from the huts but not a one of them manages to fire more than a wayward shot before you round them up as prisoners.\n\t*set resistance -12\n\t*goto so_many_prisoners\n*if time =1\n\tThe two enemy soldiers lounging beneath the fronds are felled by a hail of bullets as your platoon storms in. After a few long bursts, the whole of it is yours along with a handful of prisoners.\n\t*set resistance -12\n\t*goto so_many_prisoners\n*if time =2\n\tThe enemy on the makeshift parade ground scatters like partridges. A one-sided firefight then erupts as you and your men storm the base.\n\t*set resistance -12\n\t*set logistics -1\n\t*goto base_taken\t\t\t\n*if time =3\n\tThe digging foes scatter back to their rifles at the first sound of gunfire. A fierce firefight erupts as your men push into the camp. \n\t*if morale >2\n\t\tBaker's fire team pours round after round onto the anti-aircraft gun before the crew can traverse it in your direction.\n\t\t*set resistance -12\n\t\t*set logistics -1\n\t\t*goto base_taken\n\t*else\n\t\tThe anti-aircraft gun traverses toward your platoon and spits out round after round. Corporal Gerhard is holed through the arm while leading his fire team forward but his fellow Marines swiftly suppress the final enemy position. \n\n\t\tAnd just as that, the battle is over.\n\t\t*set resistance -12\n\t\t*set logistics -1\n\t\t*goto gerhard_wounded\n*if time =4\n\tA cry goes up as your men emerge from the Jungle. The digging enemy drops into their trenches. Their machine gun traverses toward your attack.\n\t*if morale >4\n\t\tPrivate Scott slams a rifle round into the gunner just as the foe squeezes off a burst. A whistle of rounds fly past. Behind you Corporal Gerhard cries out but lives to curse about his bad luck as the attack carries through with fierce bursts and several judicious grenades.\n\t\t*set logistics -1\n\t\t*set resistance -12\n\t\t*goto gerhard_wounded\t\n\t*else\n\t\tThe burst catches corporal Gerhard full in the chest. With one fire team shattered, you take personal charge of the attack. The sting of flying splinters tears at your cheek when machine gun fire shatters a hut as you sweep in.\n\t\n\t\tYour men pour on the fire until the enemy at last falls silent.\n\t\t*set character_condition -1\t\t\n\t\t*set logistics -2\n\t\t*set resistance -12\n\t\t*goto gerhard_dead\t\n*else\n\tThe dug-in Japanese open fire moments after you emerge from the jungle.\n\t*if morale >4\n\t\tA machine gun burst catches Corporal Gerhard full in the chest and he crumples without a sound. But even with one fire team shattered, your men carry on. \n\n\t\tPrivate Scott slams a rifle round through an enemy gunner and a lob of grenades takes care of the nest. As the smoke settles, a final bullet tugs at your sleeve; hardly worth griping about because the battle is won. \n\t\t*set character_condition -1\n\t\t*set logistics -2\n\t\t*set resistance -12\n\t\t*goto gerhard_dead\n\t*else\n\t\tCorporal Gerhard is cut down just paces out of the Jungle. Hagan takes a round and falters. The other teams bog down without ever reaching the enemy trenches. The enemy just refuses to fold up, even though you trade hundreds of rounds back and forth. \n\n\t\tWith an entire fire team out of action and the enemy snugged up tight, you are forced to recover your badly wounded Marines and withdraw back into the jungle.\n\t\t*if firepower =0\n\t\t\t*set firepower 1\n\t\t*if firepower =1\n\t\t\t*set firepower 2\n\t\t*set gerhard 1\n\t\t*set hagan 3\n\t\t*comment who is the third Marine here?\n\t\t*set casualties +3\n\t\t*set resistance -6\n\t\t*set logistics -3\n\t\t*set situation 2\n\t\t*goto withdrawal\n\n*label fire_and_manuver\t\t\n\n*if time \u003c1\n\tBaker's fire team opens up on the unsuspecting Japanese soldier then rakes each hut in turn with machine gun fire. The other Marines methodically flank the base. It all unfolds like a training exercise and that includes the taking of a handful of prisoners. \n\t*set resistance -12\n\t*goto so_many_prisoners\n*if time =1\n\tThe two enemy soldiers lounging beneath the fronds are torn apart in a hail of bullets as Baker's fire team lay into them. Your foes pour out of the huts and meet the flanking team the hard way. And thus the base is yours.\n\t*set resistance -12\n\t*set logistics -1\n\t*goto base_taken\n*if time =2\n\tThe enemy on the makeshift parade ground scatters like partridges as Baker's team pours on the fire. The other team sweeps the base and routs the remaining defenders into the jungle.\n\t*set resistance -10\n\t*set logistics -1\n\t*goto base_taken\n\t\t\t\n*if time =3\n\tThe digging enemy scatters back to their rifles at the first sound of gunfire. A fierce fight erupts between them and Baker's fire team, but then the third fire team maneuvers into position and folds the enemy up.\n\n\tThe remaining foes break and run for the Jungle under cover of the anti-aircraft gun which spits out a fusillade of rounds in your direction.\n\t*if morale >1\n\t\tAt least, until Private Scott slams a round through the gunner then does the same for when the loader tries to take over.\n\t\t*set resistance -8\n\t\t*set logistics -1\n\t\t*goto base_taken\n\t*else\n\t\tThe anti-aircraft gun traverses toward the nearby fire team and opens up with a savage salvo. Corporal Gerhard takes cover behind a hut but the frail wooden structure collapses atop him. Thankfully Baker's team proceeds to throw enough lead on the enemy position to silence it. \n\n\t\tThe base is yours.\n\t\t*set resistance -8\n\t\t*set logistics -1\n\t\t*goto gerhard_wounded\n*if time =4\n\tThe digging enemies flop into their trenches, one way or another, as your men open fire. The machine gun swivels to face Gerhard's fire team and a fierce exchange begins between them and refuses to\n\t*if morale >2\n\t\tend, until Private Scott slams a rifle round into the gunner.\n\t\t\n\t\tIn the silence that follows, Corporal Gerhard can be heard cursing up a storm. He emerges briefly from cover with a bloodied arm then flops into a better position as your Marines steadily drive the foe deep into the jungle. \n\t\t*set logistics -1\n\t\t*set resistance -6\n\t\t*goto gerhard_wounded\t\n\t*else\n\t\tend.\n\n\t\tA machine gun burst catches corporal Gerhard in the chest. You take command of the shattered fire team and, with Sergeant Baker's help on the flank, drive the enemy into the jungle.\t\t\n\t\t*set logistics -2\n\t\t*set resistance -6\n\t\t*goto gerhard_dead\t\n*else\n\tThe dug-in Japanese exchange fierce fire with your teams.\n\t*if morale >3\n\t\tA machine gun burst catches Corporal Gerhard full in the chest. But even with one fire team shattered, your men carry through with the attack.\t\t\n\t\t*set logistics -2\n\t\t*set resistance -6\n\t\t*goto gerhard_dead\n\t*else\n\t\tCorporal Gerhard is cut down as they emerge from the Jungle. Private Holben staggers when struck. And the fire-fight rages on and on afterward.\n\t\t*if logistics >4\n\t\t\tHundreds of spent casing litter the ground before the enemy breaks and runs for the jungle.\n\t\t\t*if firepower =0\n\t\t\t\t*set firepower 1\n\t\t\t*if firepower =1\n\t\t\t\t*set firepower 2\n\t\t\t*set casualties +2\n\t\t\t*set logistics -2\n\t\t\t*set resistance -6\n\t\t\t*goto gerhard_dead\n\t\t*else\n\t\t\tThere's just no use. Your men are down to their last clip and the enemy refuses to fold up. You are forced to recover your wounded and withdraw into the jungle.\n\t\t\t*set casualties +3\n\t\t\t*set firepower 1\n\t\t\t*set gerhard 1\n\t\t\t*set hagan 3\n\t\t\t*set resistance -6\n\t\t\t*set logistics -3\n\t\t\t*set situation 2\n\t\t\t*goto withdrawal\n\n*label bombardment\n\n*set time +1\nYou summon Private Hagan over with the battered pack-radio and take up the handset.\n\n*choice\n\t#\"Andy Zulu, Andy Zulu, this is Bravo Delta. Repeat, this is Bravo Delta. Fire mission to follow.\"\n\t\tA crisp return crackle tells you that the radio is working just fine.\n\t\t*set signal_intercept 1\n\t\t*goto bombardment_1\n\t#Tap out the request for a fire mission in the proper morse code.\n\t\tIt's a lot of work to dot and dash the message, but it is also more secure. Three return dots tells you the radio is transmitting just fine.\n\t\t*set time +1\n\t\t*set signal_intercept 0\n\t\t*goto bombardment_1\n\n*label bombardment_1\n\nA distant crack of thunder. Then, with a roar, rounds from the Schley streak down into the camp. The first strikes the sea. The next sand brings up a fountain of sand. After a small correction you have the distant destroyer fire for effect. The Japanese base disintegrates under those repeated, mighty blasts. Few of the enemy are struck but all are either forced to cower in a trench or else scatter for the relative safety of the jungle.\n\n*choice\n\t#Call off the bombardment and attack the base.\n\t\t*if morale >=3\n\t\t\tYou catch the enemy still reeling from the barrage and rout them into the depths of the jungle.\n\t\t\t*set resistance -6\n\t\t\t*goto base_taken\n\t\t*else\n\t\t\tCorporal Gerhard advances his fire team quickly. But a laggard shell explodes late and peppers him with shrapnel that leaves him cursing the navy for a long blue streak. The other Marines carry through with the attack and rout the enemy into the jungle.\n\t\t\t*set resistance -6\n\t\t\t*goto gerhard_wounded\n\t#Have the Schley keep it up.\n\t\t*if signal_intercept =0\n\t\t\t*set signal_intercept 1\n\t\tThe Schley, aided by your spotting, lays round after round on the Japanese base until the last of the enemy pull out. That done, you call for the bombardment to end.\n\t\t\n\t\tBut while you wait for the fire to lift, the unmistakable drone of an airplane is heard overhead.\n\t\t*set time +1\n\t\t*set resistance -4\n\t\t*goto float_plane\n\t*if character =2\n\t\t#Shift fire into the jungle. The enemy may think the danger has passed.\n\t\t\t*set time +1\n\t\t\t*if signal_intercept =1\n\t\t\t\t*set signal_intercept 2\n\t\t\t*if signal_intercept =0\n\t\t\t\t*set signal_intercept 1\n\t\t\t*if morale >1\n\t\t\t\tAs the rounds cease, you order the advance. The Japanese are caught as they emerge from cover. After your last shot is fired, the drone of an airplane is heard overhead.\n\t\t\t\t*set resistance -8\n\t\t\t\t*goto float_plane\n\t\t\t*else\n\t\t\t\tCorporal Gerhard advances his fire team. But a laggard final shell explodes and peppers him with shrapnel. As the thunder dies down, he curses the Navy with a terrifying blue streak. \n\n\t\t\t\tThe other Marines carry through with the attack and rout the enemy into the jungle.\n\t\t\t\t*set resistance -8\n\t\t\t\t*set gerhard 1\n\t\t\t\t*goto gerhard_wounded\n\t*if character =0\n\t\t#Have the Schley switch to smoke rounds to conceal our advance.\n\t\t\tIt is a simple order. Willie-Pete requested. The specified rounds land and white clouds of thick smoke begin to billow up. The Japanese don't see your men advance until it is far too late for them to retreat.\n\n\t\t\tWhen the smoke disperses, your men are wholly in possession of the base. Then the unmistakable whine of a propeller is heard overhead.\n\t\t\t*set resistance -6\n\t\t\t*goto float_plane\n\n*label open_fire\n\nYou arrange your fire teams for converging fire and give the order. As one they blast away.\n*if mortar =1 \n\t*line_break\n\t*line_break\n\tThat includes the dull whump of the trench mortar that\n\t*if merrik >0\n\t\tpoor\n\tMerrik lugged in from the beach. 'Old Misery' lives up to her name though and makes things hot for the enemy from the get go.\n\t*set resistance -2\n*line_break\n*line_break\t\n*if time \u003c4\n\tThe Japanese are pinned down with their backs to the beach. Several of them brave the barrage and manage to flee into the jungle, but the rest are cut down where they hunker.\n\t*set resistance -6\n\t*set logistics -2\n\t*goto base_taken\n*else\n\tThe dug-in enemy resists the fusillade of fire and returns its own. Corporal Gerhard curses up a storm as a round snags his arm. But the remainder of your Marines push on and rout the remaining Japanese into the jungle.\n\t*set logistics -3\n\t*set resistance -4\n\t*goto gerhard_wounded\t\n\n*label follow_me\n\nYou lead the way toward the Japanese base. Your men follow.\n*set commendation_2 1\n\n*if time \u003c1\n\tThe largest hut is the obvious target. You kick in the door, find your enemy sitting down to a noon meal.\n\t*choice\n\t\t#\"All this base belongs to the U.S.!\"\n\t\t\tThey are startled by the shouted declaration and surrender.\n\t\t\t*set resistance -12\n\t\t\t*goto so_many_prisoners\n\t\t#\"What's for lunch?\"\n\t\t\tThe enemy blinks at your question. One of them, the youngest, meekly offers you a rice bowl\n\t\t\t*if weapon =0\n\t\t\t\tunder the frown of your BAR.\n\t\t\t*if weapon =1\n\t\t\t\tunder the sway of your Thompson submachine gun.\n\t\t\t*if weapon =2\n\t\t\t\tas your rifle covers the lot of them.\n\t\t\t*if weapon =3\n\t\t\t\tas your flamethrower hisses menacingly.\n\t\t\t*if weapon =4\n\t\t\t\tas your pistol aims at them in turn.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\tAnd so, they surrender.\n\t\t\t*set resistance -12\n\t\t\t*goto so_many_prisoners\n\t\t#Open fire before they can arm themselves.\n\t\t\tTheir weapons could be anywhere.\n\t\t\t*if weapon =0\n\t\t\t\tBut your BAR is firmly in hand. A burst knocks several down. The next doubles it. Your men finish the rest.\n\t\t\t*if weapon =1\n\t\t\t\tBut your Thompson submachine gun is ready. A long burst rakes the table and scatters the enemy. A short follow up puts blood on the floor. Your men finish the rest.\n\t\t\t*if weapon =2\n\t\t\t\tYour rifle barks as the first enemy stands up. When he falls, another shouts in astonishment. He falls too. Your men finish up the rest.\n\t\t\t*if weapon =3\n\t\t\t\tYour flamethrower hisses and spews flames across the table. Several of the enemy are engulfed and the sickly sweet stench of burning flesh rises up.\n\t\t\t\t*set burning 1\n\t\t\t*if weapon =4\n\t\t\t\tYou fire your pistol at the first man. He seems shocked to be shot. The next is less so. Your men finish up the rest.\n\t\t\t*set resistance -12\n\t\t\t*set logistics -1\n\t\t\t*goto base_taken\t\t\t\n\n*if time =1\n\tYou run straight up to the two Japanese soldiers beside the anti-aircraft gun. The first one gets kicked over and you level your weapon at the next.\n\n\tThe rest of your platoon forms up behind you as the enemy scurries about in the hut.\n\t*choice\n\t\t#\"All this base belongs to the U.S.!\"\n\t\t\tThey are startled by the shouted declaration and surrender.\n\t\t\t*set resistance -12\n\t\t\t*goto so_many_prisoners\n\t\t#\"Don't make me come in there!\"\n\t\t\tThe enemies peer out and find themselves\n\t\t\t*if weapon =0\n\t\t\t\tunder the frown of your BAR. And so, they surrender.\n\t\t\t*if weapon =1\n\t\t\t\tunder the sway of your Thompson submachine gun. And so, they surrender.\n\t\t\t*if weapon =2\n\t\t\t\tin the sights of your rifle. And that isn't the only one.\n\t\t\t*if weapon =3\n\t\t\t\tstaring down your hissing flamethrower. And so, they surrender.\n\t\t\t*if weapon =4\n\t\t\t\tfacing your pistol. The rest of the squad is, of course, armed too.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\tAnd so, they surrender.\n\t\t\t*set resistance -12\n\t\t\t*goto so_many_prisoners\n\t\t#Open fire.\n\t\t\tThey will have rifles. You know this.\n\t\t\t*if weapon =0\n\t\t\t\tA burst from your BAR rakes the huts. Your men don't need an order to follow suit.\n\t\t\t*if weapon =1\n\t\t\t\tA burst from your Thompson submachine gun drops the most curious one. Your men join in and finish the rest.\n\t\t\t*if weapon =2\n\t\t\t\tYour rifle barks and the most curious foe drops. Your men join in and finish the rest.\n\t\t\t*if weapon =3\n\t\t\t\tYour flamethrower hisses and spews flames into the brittle wooden structure. Predictably, it burns. The foes who flee are quickly cut down. Those who don't simply burn.\n\t\t\t\t*set burning 1\n\t\t\t*if weapon =4\n\t\t\t\tYou fire your pistol. The enemy seems unimpressed by the single shot. However, your men then join in and finish up the rest.\n\t\t\t*set resistance -12\n\t\t\t*set logistics -1\n\t\t\t*goto base_taken\t\n*if time =2\n\tYou race in, head straight for the enemy soldiers formed up before the anti-aircraft gun.\n\t*if weapon =1\n\t\tA few bursts from your Chicago piano clears the enemy out and fast.\n\t\t*set resistance -12\n\t\t*goto base_taken\n\t*if weapon =2\n\t\tYour rifle bangs out rounds until the empty clip gets ejected with a ting. By then the enemy has scattered, which leaves you and your men in command of the base.\n\t\t*set resistance -8\n\t\t*goto base_taken\n\t*if weapon =0\n\t\tYour BAR barks out a splash of rounds that scatters the Japanese as you fire wildly. A stray round nips at your sleeve as several of the enemy fire parting shots before fleeing into the jungle.\n\t\t*set character_condition -1\n\t\t*set resistance -8\n\t\t*goto base_taken\n\t*if weapon =3\n\t\tThe hiss of your terrible weapon puts a panic to the Japanese that only spreads as you lay down an inferno. They flee into the jungle and the burning base is yours.\n\t\t*set burning 1\n\t\t*set resistance -4\n\t\t*set logistics -1\n\t\t*goto base_taken\n\t*else\n\t\tYour men clear things out, one, two, three in textbook fashion. Only a few of the enemy flee in the jungle.\n\t\t*set resistance -8\n\t\t*goto base_taken\n\n*if time =3\n\tYou race toward the entrenching enemy with your Marines right behind. The Japanese soldiers stare at you in disbelief then belatedly reach for their rifles.\n\t*if weapon =1\n\t\tA burst from your Chicago piano clears out a trench, lets your platoon gain that crucial cover. From there your fire teams set to their lethal task. Raked by accurate fire, the enemy breaks and only a few are able to retreat into the jungle.\n\t\t*set resistance -10\n\t\t*goto base_taken\n\t*if weapon =2\n\t\tYour rifle bangs out until the empty clip springs free with a sharp ting. The foe then returns your fire with some of their own. \n\n\t\tYou hear Corporal Gerhard curse emphatically behind you but he and the others carry through the attack and swiftly rout the enemy into the Jungle.\n\t\t*set resistance -8\n\t\t*goto gerhard_wounded\n\t*if weapon =0\n\t\tYour BAR barks out a splash of rounds against those you can see. But then the enemy responds with a volley of their own. A round creases your leg and leaves you limping.\n\n\t\tCorporal Gerhard curses thoroughly as he too catches a round, but the others carry through with the attack and rout the enemy into the Jungle.\t\t\t\t\n\t\t*set character_condition -1\n\t\t*set resistance -8\n\t\t*goto gerhard_wounded\n\t*if weapon =3\n\t\tThe hiss of your terrible weapon puts a panic to the foe that only spreads as you lay down a blazing inferno into trench and hut alike. The enemy flees into the jungle and abandons the burning base to you.\n\t\t*set burning 1\t\n\t\t*set resistance -4\n\t\t*set logistics -2\n\t\t*goto base_taken\n\t*else\n\t\tYour men clear things out, one, two, three in textbook fashion. Only a few of the enemy flee in the jungle.\n\t\t*set resistance -8\n\t\t*goto base_taken\n*if time =4\n\tYour pulse pounds as the enemy traverses their machine gun your direction.\n\t*if weapon =1\n\t\tA burst of your Chicago piano forces the enemy gunner to duck. But the other foes level their rifles at you. Rounds snap past and from somewhere behind, you hear Corporal Gerhard curse, grunt and falter.\n\t\t*if morale >3\n\t\t\tYou push on, ignore the tug of a bullet to get in amongst the enemy. You empty your entire clip into the nearest cluster of foes and send them sprawling. The rest panic and flee into the jungle.\n\t\t\t*set character_condition -1\n\t\t\t*set resistance -8\n\t\t\t*goto gerhard_wounded\n\t\t*else\n\t\t\tYour men recoil under the lash of the withering fire. Only after an extended exchange do you drive the enemy into the jungle. \n\t\t\t*set resistance -6\n\t\t\t*set logistics -2\n\t\t\t*goto gerhard_wounded\n\t*if weapon =2\n\t\tYour rifle bangs out a staccato of accurate fire that forces the gunner to flinch. The return burst goes wide of you but Corporal Gerhard is not so lucky and screams out in agony. \n\t\t*set casualties +1\n\t\t*if morale >3\n\t\t\tYou and Baker push through the attack and get in amongst the trenches where your precision fire drives the enemy back into the jungle.\n\t\t\t*set logistics -1\n\t\t\t*set resistance -8\n\t\t\t*goto gerhard_dead\n\t\t*else\n\t\t\tYour men falter under the withering storm of lead. A round gouges your arm and you stagger. A glance backward finds that only Baker has stayed with you.\n\n\t\t\t*choice\n\t\t\t\t#Push on.\n\t\t\t\t\tYou stumble forward straight into a machine gun burst.\n\t\t\t\t\t*goto fail\n\t\t\t\n\t\t\t\t#Retreat.\n\t\t\t\t\tYou know that all your bravery will not win this day. At your signal, your men withdraw under a hail of fire. \n\t\t\t\t\t*set casualties +2\n\t\t\t\t\t*set character_condition -1\n\t\t\t\t\t*set resistance -4\n\t\t\t\t\t*set logistics -1\n\t\t\t\t\t*set situation 2\n\t\t\t\t\t*goto withdrawal\n\t*if weapon =0\n\t\tThe BAR barks out a splash of rounds that go nowhere near the target. The enemy machine gun fires a bright burst, and that is the last thing you see.\n\t\t*goto fail\n\t*if weapon =3\n\t\tThe hiss of your terrible weapon puts a panic to the enemy that spreads panic and chaos as you lay down a blazing inferno into trench and hut alike. The enemy flees into the jungle and the burning base is yours.\n\t\t*set burning 1\t\n\t\t*set resistance -4\n\t\t*set logistics -2\n\t\t*goto base_taken\n\t*else\n\t\tYour men engage the enemy in textbook fashion. But under the withering exchange over half of the enemy flees in the jungle.\n\t\t*set resistance -4\n\t\t*goto base_taken\n*else\n\tFear rises in your gut and refuses to be tamped down as you charge the entrenched enemy.\n\n\t*if weapon =0\n\t\tA wild burst accompanies your race forward. The BAR digs deep into your shoulder but a round from the trenches makes that pain a distant thing as it shatters your shoulder and leaves you broken.\n\t\t*goto fail\n\t*if weapon =1\n\t\tAn entire clip rattles from your Chicago piano as you race forward only to run into a wall of enemy rounds that leaves you shattered and broken.\n\t\t*goto fail\n\t*if weapon =2\n\t\tThe rounds from your rifle kick up dirt at the enemy as you race forward. The Japanese reply with a volley that leaves you shattered and broken.\n\t\t*goto fail\n\t*if weapon =3\n\t\tIf ever there was a time for a terrifying gout of flame, now is it. You releasea stream of destruction at the enemy and blanket a whole portion of their trench-line as you stalk forward. Even when an empty hiss sounds out and the flames cease to arc, even after a round rugs at your sleeve, you pull your pistol and lay into the foe. \n\t\t\t\n\t\tYour platoon, in awe, follows in your wake and cleans things up.\n\t\t*set character_condition -1\n\t\t*set logistics -3\n\t\t*set resistance -10\n\t\t*set burning 1\n\t\t*goto gerhard_wounded\n\t*else\n\t\tYour men engage the enemy with grazing fire and gusto. Under the withering exchange over the majority of the enemy flees in the jungle.\n\t\t*set resistance -2\n\t\t*goto base_taken\n\n*label so_many_prisoners\n\n*page_break\n\n*if situation =4\n\t*set situation 0\n*if character =1\n\tYou've heard a great deal about the Japanese. They're supposedly ruthless, arrogant, given to false courtesy and, of course, are hopeless nearsighted and prone to wreck anything they drive or fly. Aside from what happened at Pearl Harbor, of course. But staring into the confused and bewildered faces of the enemy soldiers you have captured, all of that crap goes by the wayside.\n\n\tIf not for your near-bloodless charge, these... men would have died horrible deaths. Not the grab-your-chest-and-collapse like in the movies, but a bloody and screaming demise. That sort of thing no doubt lies ahead, but not for them and not for you. At least you hope not.\n*if character =2\n\tThere is a great deal of propaganda floating around about the Japanese. Some of it is even true. But one glance at the confused and bewildered features of these enemies you've just captured flips all those lies onto their back.\n\n\tIf not for your near-bloodless charge, these... men would have died horrible deaths. Not the grab-your-chest-and-collapse like in the movies, but a bloody, gasping demise. That sort of thing no doubt lies ahead, but not for these Mikado and not for you. At least not yet.\n*if character =0\n\tYou've heard a lot of crap about the Japs since Pearl Harbor and almost none of it is true. They are arrogant and they have done some terrible things, but these confused and bewildered enemy soldiers you have gathered up don't represent any of that.\n\n\tNo, these are just men. Men caught up in a terrible nightmare of charging gaijin. They expect that they will be killed, but are no doubt far more worried about what they have lost; their honor. For them, being captured is worse than death. But now that it is done, it can not be undone. The same can also be said of dying. These soldiers will just have to deal with life's little disappointments. No doubt you'll have to do the same when your last day comes, and it will come for all men great and small.\n*line_break\n*line_break\nBaker gives a whistle of appreciation as he too stares at the startled prisoners. \"That's probably a medal.\"\n*choice\n\t#\"Something to write up later, certainly.\"\n\t\t\"You get to write the report, but they'll ask me for confirmation,\" Baker notes with a brief chuckle. Then he stabs a thumb towards the prisoners. \"What do you want done with them?\"\n\t\t*goto so_many_prisoners_1\n\t*if character =0\n\t\t#\"You mean another one?\"\n\t\t\t\"LT, some of us aren't Old Breed,\" Baker notes, then stabs a thumb towards the prisoners. \"What do you want done with them?\"\n\t\t\t*goto so_many_prisoners_1\n\t*if character =1\n\t\t#\"Good, because I'm not doing that again.\"\n\t\t\t\"Yeah, me either,\" Baker notes, then stabs a thumb towards the prisoners. \"What do you want done with them?\"\n\t\t\t*goto so_many_prisoners_1\n\t*if character =2\n\t\t#\"Not the Navy Cross, since I didn't capture them all myself.\"\n\t\t\t\"That's naval standards for you. Sanity isn't part of things,\" Baker notes, then stabs a thumb towards the prisoners. \"What do you want done with them?\"\n\t\t\t*goto so_many_prisoners_1\n\t#Just nod.\n\t\tWhether it is a medal or not will lie in other hands. Assuming you get back alive.\n\n\t\t\"So, what do you want done with them?\" Baker asks and stabs a thumb toward the prisoners.\n\t\t*goto so_many_prisoners_1\n\n*label so_many_prisoners_1\n\n*choice\n\t#\"We'd better get them back to the Schley.\"\n\t\tIt won't be easy to get them back, but the alternatives are far worse.\n\n\t\t\"I'll have a team escort them back,\" Baker says. \"This ain't a one person job.\"\n\t\t*set commendation_3 1\n\t\t*if firepower =0\n\t\t\t*set firepower 1\n\t\t\t*goto base_taken\n\t\t*else\n\t\t\t*set firepower 2\n\t\t\t*goto base_taken\n\t#\"We've got to let them go once we're done here.\"\n\t\tBaker cocks an eyebrow at you. \"LT? Seriously?\"\n\t\t*choice\n\t\t\t#\"Joking. Of course we take them back to the Schley.\"\n\t\t\t\t\"Funny, LT,\" Baker says and lets out a sigh that isn't exactly filled with mirth. \"I'll have a team escort them back. This ain't a one person job.\"\n\t\t\t\t*set commendation_3 1\n\t\t\t\t*if firepower =0\n\t\t\t\t\t*set firepower 1\n\t\t\t\t\t*goto base_taken\n\t\t\t\t*else\n\t\t\t\t\t*set firepower 2\n\t\t\t\t\t*goto base_taken\n\t\t\t#\"We can't spare the firepower. Our mission comes first.\"\n\t\t\t\t\"Oh,\" Baker says and shrugs. \"When you put it like that...\"\n\n\t\t\t\tThe prisoners are allowed to go. Unarmed, they scatter across the island. With luck they'll stay out of the fighting until it is done.\n\t\t\t\t*goto base_taken\n\n*label gerhard_wounded\n\n*page_break\n\nCorporal Gerhard grinds his teeth as Private Holben tightens a stretch of white gauze about his bloody arm. No morphine appears to have been administered, at least not yet. \n\n\"I'm fine,\" Gerhard insists, eyes dark with agony he can barely hide. \"Just a scratch. I can lead my fire team just fine!\"\n\n*if character =0\n\tYou've certainly seen worse, but getting shot is never a stroll along a boardwalk.\n*if character =1\n\tHe seems to mean it. Then again, any Marine would.\n*if character =2\n\tJudging from the slow drip of blood, the round must have just missed an artery. Flesh wound, two week recovery at least.\n*set casualties +1\n*choice\n\t#\"I'm not going to lose a good man. You're going back to the RP with your team.\"\n\t\t\"But... yes, Lieutenant,\" Gerhard reluctantly agrees. \"I'll pass off our spare ammo first, if that's alright with you.\"\n\n\t\tYou had expected more of an argument. Apparently Gerhard's wound was more painful than he let on.\n\t\t*set logistics +1\n\t\t*if firepower =0\n\t\t\t*set firepower 1\n\t\t\t*if gerhard =1\n\t\t\t\t*goto float_plane\n\t\t\t*else\n\t\t\t\t*set gerhard 1\n\t\t\t\t*goto base_taken\n\t\t*else\n\t\t\t*set firepower 2\n\t\t\t*if gerhard =1\n\t\t\t\t*goto float_plane\n\t\t\t*else\n\t\t\t\t*set gerhard 1\n\t\t\t\t*goto base_taken\n\t#\"You can't fire a BAR one handed. Can you make it back to the RP alone?\"\n\t\tGerhard nods slowly. \"Yeah Lieutenant. I can make it. Keep fighting while I'm sunning myself on the beach.\"\n\t\t*set morale -1\n\t\t*if gerhard =1\n\t\t\t*set gerhard 2\n\t\t\t*goto float_plane\n\t\t*else\n\t\t\t*set gerhard 2\n\t\t\t*goto base_taken\n\t#\"Keep up.\"\n\t\tGerhard manages a pale grin. \"I will. Absolutely Lieutenant. I'm a Marine.\"\n\t\t*set casualties -1\n\t\t*if gerhard =1\n\t\t\t*goto float_plane\n\t\t*else\n\t\t\t*set gerhard 1\n\t\t\t*goto base_taken\n\n*label float_plane\n\n*page_break\n\nThe drone of an unseen engine resonates high above. A float_plane with a distinctive Japanese wing design is silhouetted against a brilliant blue sky. It putters westward, a single black bomb slung onto its undercarriage; no doubt intended for the Schley. \n\t\t\nYou order Private Hagan over and grab the handset to the pack-radio.\n\n*choice\n\t#\"Andy Zulu, Andy Zulu, this is Bravo Delta. You have inbound! Float-plane! over!\"\n\t\tThe radio crackles to life. \"Bravo Delta, Bravo Delta, this is Andy Zulu. In-bound understood. Over.\"\n\t\t*goto float_plane_1\n\t*if signal_intercept \u003c1\n\t\t#Radio southward coordinates to distract the enemy plane.\n\t\t\tThe enemy is hunting for a ship based on prior radio transmissions. You give them another.\n\n\t\t\tAfter a long moment, the plane veers southward toward the Schley's false position.\n\t\t\t*goto base_taken\n\t*if signal_intercept >1\n\t\t#Send a morse signal to the Schley.\n\t\t\tYou begin to tap out a morse signal for the Schley. If the enemy doesn't know exactly where the ship is, then--\n\t\t\t*goto float_plane_1\n\t#I did this. Hopefully the Schley can shoot that plane down.\n\t\tThe float plane is almost impossible to miss. You can only hope that the opposite is true about the Schley.\n\t\t*goto float_plane_1\n\n*label float_plane_1\n\nThe plane begins to descend. A distant patter from the Schley's anti-aircraft guns rises to meet it.\n\nYou watch as little puffs of black bracket the plane as it dips down to complete its attack run, the final part hidden by the jungle.\n\nA deep boom echoes across the island. Holden tries to raise the Schley on the radio, but only static answers.\n*set schley 1\n*goto base_taken\n\t\t\t\n*label gerhard_dead\n\n*page_break\n\nCorporal Gerhard died like a Marine. If you weren't standing amid the smoking ruins of an enemy base, you'd carry him back to Wisconsin with full honors.\n\n*set casualties +1\n*choice\n\t#\"Private Holben, you are acting-jack now.\"\n\t\t*set holben_rank \"Acting-Jack\"\n\t\tHolben gives a simple nod to accept his new rank, though the brevet promotion rings hollow in your throat just now.\n\t\t*goto gerhard_dead_1\n\t#Promote Holben to acting-corporal.\n\t\t*set holben_rank \"Acting-Jack\"\n\t\tYou indicate Holben's new rank, though the brevet promotion rings hollow in your throat just now.\n\t\t*goto gerhard_dead_1\n\t#Holben knows what he needs to do.\n\t\tHolben is a good Marine. He'll take command without you having to make it official.\n\t\t*goto gerhard_dead_1\n\n*label gerhard_dead_1\n\n\"What about Gerhard, Lt?\" ${holben_rank} Holben asks. There is a catch to his voice. A friend lost. \"Do we... what do we do with him?\"\n\n*choice\n\t#\"You and Hagan will carry him back to the retrieval point when the time comes.\" \n\t\tHolben nods, sad but resolute.\n\t\t*set gerhard 3\n\t\t*if firepower =0\n\t\t\t*set firepower 1\n\t\t\t*goto base_taken\n\t\t*else\n\t\t\t*set firepower 2\t\n\t\t\t*goto base_taken\n\t#\"Bury him where he fell. Graves registration can collect him later.\"\n\t\tHolben and Hagan grab their spades. A grave, marker, and a few words for the fallen will have to do.\n\t\t*set gerhard 4\n\t\t*set time +2\n\t\t*goto base_taken\n\t#\"Leave him for now. The enemy won't wait.\"\n\t\tThere's no time to do more than fold Gerhard's arms and take his dog-tags. His mother is listed as next of kin, address 654 Pine Street, Racine, Wisconsin.\n\n\t\tLeaving the body comes hard. Certainly Holben and Hagan let Baker know all about that when they think you aren't listening.\n\t\t*set gerhard 4\n\t\t*set morale -1\n\t\t*goto base_taken\n\n*label base_taken\n\n*page_break\n*set commendation_4 1\n*set meta_time 4\n*if situation =4\n\t*if character =0\n\t\tDead foes lay sprawled before you yet again. One day it'll be your turn to forever sleep, but not yet.\n\t\t*page_break\n\t*if character >0\n\t\tThe fallen Japanese are so utterly still, as if you could give them a nudge and each would wake from a nap. As the terrifying rush of combat fades, the lull tosses your guts and you know deep down that nothing will be the same.\n\t\t*page_break\n*if burning =0\n\tThe enemy base is yours. You walk amongst the ruins, victorious.\n*if burning =1\n\tThe enemy base is yours. You walk amongst the burning ruins, victorious.\n*line_break\n*line_break\n*set situation 0\n*if ransom =0\n\tIn the doorway of the sturdiest hut Corporal Ransom sorts through sheaf after sheaf of \tenemy papers. Nearby, Private Hagan tries to crack the casing of a bulky enemy radio.\n\t*if burning =1\n\t\tHopefully he'll manage that before the hut burns down.\n\t*if landry =0\n\t\tThe Private grunts and groans, but then Private Landry intercedes and offers over his K-Bar. Together they crack the casing in seconds.\n\t\t*set radio_parts 1\n*if ransom =1\n\tPrivate Hagan drags an enemy radio through the doorway of the sturdiest hut, eagerly tries to crack the casing to get a look at the innards.\n\t*if burning =1\n\t\tHopefully before the hut burns down completely.\n\t*if landry =0\n\t\tThe Private grunts and groans, but then Private Landry intercedes, offers over his K-Bar. Together they crack the casing in seconds.\n\t\t*set radio_parts 1\n*line_break\n*line_break\nThere is a simple\n*if character \u003c2\n\tchow-hall \n*if character =2\n\tmess-hall \nwith low seats and a pair of long communal tables. Inside you catch sight of ${holben_rank} Holben as he shoves a cluster of wooden flasks into his satchel. It must be rice-wine,\n*if character =2\n\tand no doubt he will claim the Nipponese sake is for 'medicinal' purposes. Best if served hot so that whatever unfavorable flavor that remains is eliminated. \n*if character =1\n\twhich is not whiskey and never will be.\n*if character =0\n\tand you almost think you should warn him about the taste of it when it is served warm. Almost.\n*line_break\n*line_break\nAt the outskirts are two latrines; the one with fewer gaps and a hint of proper paper is no doubt reserved for the officers.\n*if burning =1\n\tThough the one belonging to enlisted men does have the advantage of not being steadily consumed by an inferno.\n*line_break\n*line_break\nAll this is just as was reported by the surveillance submarine. Oddly, no living quarters can be seen. Did the Japanese sleep in the slit trenches? Officers wouldn't stoop to that. Not when some other accommodation could easily be made.\n\nSomething feels wrong.\n*if float >0\n\tThere's not a mechanic's hootch or box of tools to be seen either. Where did they do their work on the float-planes?\n*goto wooden_road\n\n*label wooden_road\n\nSergeant Baker jogs over. \"LT? You're going to want to have a look at what Simmons found.\"\n*choice\n\t#\"Barracks?\"\n\t\t\"Not yet,\" Sergeant Baker says. \"There's a corduroy of trees. Two paths, side by side. They go into the jungle a fair ways.\"\n\t\t*goto base_taken_1\n\t*if float >0\n\t\t#\"Machine shop?\"\n\t\t\t\"Definitely not,\" Sergeant Baker says. \"There's a corduroy of trees. Two paths, side by side. They go into the jungle a fair ways.\"\n\t\t\t*goto base_taken_1\n\t#\"Armory?\"\n\t\t\"Uh, no,\" Sergeant Baker says. \"There's a corduroy of trees. Two paths, side by side. They go into the jungle a fair ways.\"\n\t\t*goto base_taken_1\n\t#Let him keep talking.\n\t\t\"There's a corduroy of trees. Two paths, side by side. They go into the jungle a fair ways,\" Sergeant Baker explains.\n\t\t*goto base_taken_1\n\n*label base_taken_1\n\nYou follow Baker to the edge of the jungle where Private Simmons has taken cover behind a fallen tree.\n\nOnly the Private's eyes and jungle dabbed forehead rise above the timber as he\n*if eat =0\n\tidly chews on a hard cracker, rifle cradled in hand as he keeps watch.\n*if eat =1\n\tslowly opens one of the new K-ration tins of spam with a twist key, keeps his rifle cradled and ready.\n*if eat =2\n\tidly chews on a dried apricot from the J-ration pack, rifle cradled in hand as he keeps watch.\nThere is clearly no sign of Japanese soldiers, but then he flicks a questioning eye toward you, gestures ahead sharply twice. There, where the jungle starts, you see it.\n\nThe Japanese have indeed arranged a parallel corduroy of felled trees. Roughly ten feet separate each row from each other as they head off into a hacked out green. Both show signs of wear, with numerous scrapes and cracks the entire way. As if thousands of heavy feet had stomped the logs. Indeed, the lane would be just wide enough for...\n\n*choice\n\t#\"Wide enough for float-plane pontoons.\"\n\t\t\"I see it,\" Baker notes, then glances back toward the still smoldering ruin about the bay. \"Why wasn't it out there, though?\"\n\t\t*goto base_taken_2\n\t*if ishiro >0\n\t\t#\"There's more of a base hidden inside the jungle.\"\n\t\t\t\"Okay,\" Baker says and then jerks his head toward the still smoldering ruin about the bay. \"What about that?\"\n\t\t\t*goto base_taken_2\n\t*if supply_submarine >0\n\t\t#\"This is why they rate regular visits from a supply submarine.\"\n\t\t\t\"So, this is more than just an outpost?\" Baker asks and then jerks his head toward the still smoldering ruin about the bay. \"What about that?\"\n\t\t\t*goto base_taken_2\n\t#Wait for him to get the idea.\n\t\t\"They're hiding something,\" Baker notes after a moment of thought. A glance back toward the still smoldering ruin about the bay seems to solidify something. \"Something a lot bigger than an outpost.\"\n\t\t*goto base_taken_2\n*label base_taken_2\n\nTo operate a float-plane base would require machine shops as well as fuel and ammo lockers. Barracks too for the service troops. And why keep anything important where it could be readily bombarded? Heck, after it was bombarded, you'd expect that airforce or the navy would probably figure the job was all done.\n\n*choice\n\t#\"Simmons, how many of the enemy do you figure were here?\"\n\t\t\"Judging from the foot traffic, probably about sixty or so,\" Simmons replies.\n\n\t\tAt the mention of that your Sergeant Baker begins to pat down his ammo pouches. Six enemies means a lot of shooting left to go.\n\t\t*goto base_taken_3\n\t#Calculate the likely number of enemies based on the mess hall arrangement.\n\t\tThe mess hall could hold at most twenty-five. Probably two shifts. Plus officers and maybe orderlies. About fifty, maybe sixty men.\n\t\t*goto base_taken_3\n\t\n*label base_taken_3\n\n*if resistance \u003c42\n\tHowever, the Japanese have taken some serious losses. Those that remain will be reluctant to attack when one in three of them are\n\t*if commendation_3 =0\n\t\talready dead. \n\t*if commendation_3 >0\n\t\talready dead or prisoners.\n*if resistance >41\n\t*if resistance \u003c46\n\t\tThe Japanese have lost a quarter of their men.\n\t*if resistance >45\n\t\t*if resistance \u003c51\n\t\t\tThe Japanese have lost about a sixth of their men.\n\t\t*if resistance >50\n\t\t\t*if resistance \u003c56\n\t\t\t\tThe Japanese have lost about a tenth of their men. \n\t\t\t*if resistance >55\n\t\t\t\tThe Japanese have lost only a few men.\n*line_break\n*line_break\n*if morale \u003c1 \n\tYour men are tired and dispirited with dark, haunted eyes from all they've seen.\n\t*if logistics \u003c0 \n\t\tWorse, they are down to only a handful of rounds.\n\t*if logistics =0 \n\t\tAnd they are now on their last clips, which means any fight could be over just as it starts.\n\t*if logistics =1\n\t\tMoreover there's only enough ammo for a brief skirmish at best.\n\t*if logistics =2 \n\t\tStill, there is enough ammo for a sustained firefight. Likely only during a withdrawal though.\n\t*if logistics =3 \n\t\tOn the bright side, there's enough ammo for a running gun-battle. It's the will that is currently lacking.\n\t*if logistics >3 \n\t\tIf they are forced to engage the enemy again they will almost certainly burn up their ammo at a prodigious rate.\n\t\t*if merrik =0\n\t\t\t*if mortar =1\n\t\t\t\tIn fact, Private Merrik is still toting the company trench mortar. It is likely time to employ that liberally before things come apart.\n\t\t\t*if mortar =0\n\t\t\t\tA pity that Private Merrik didn't carry along the company trench mortar. That would have given them heart. As things are, they might come apart.\n*if morale =1 \n\tYour men are tired and dispirited from what they've endured.\n\t*if logistics \u003c0 \n\t\tAnd they are down to only a handful of rounds.\n\t*if logistics =0 \n\t\tAnd they are on their last clips.\n\t*if logistics =1\n\t\tAnd there's only enough ammo for a brief firefight at best.\n\t*if logistics =2 \n\t\tOn the bright side there is enough ammo for a sustained firefight. But there could still be trouble ahead.\n\t*if logistics =3 \n\t\tOn the bright side, there's enough ammo for a running gun-battle. It's the will that is lacking.\n\t*if logistics >3 \n\t\tIf they engage the enemy again they will almost certainly burn up their ammo at a prodigious rate.\n\t\t*if merrik =0\n\t\t\t*if mortar =1\n\t\t\t\tIn fact, Private Merrik is still toting the company trench mortar. It is likely time to employ that liberally.\n\t\t\t*if mortar =0\n\t\t\t\tA pity that Private Merrik didn't carry along the company trench mortar. That would have given them heart.\n*if morale =2 \n\tYour men are tired but willing to press on despite what they've endured.\n\t*if logistics \u003c0 \n\t\tHowever, they'd have to do that with only a handful of rounds.\n\t*if logistics =0 \n\t\tHowever, they'd have to do that with only a few clips.\n\t*if logistics =1\n\t\tHowever, there is only enough ammo for a brief firefight.\n\t*if logistics =2 \n\t\tThankfully there is enough ammo for one sustained firefight. Anything more than that though and trouble starts.\n\t*if logistics =3 \n\t\tIt is a question of them managing a running gun-battle. There's certainly enough ammo though.\n\t*if logistics >3 \n\t\tThey will almost certainly burn up their ammo at a prodigious rate.\n\t\t*if merrik =0\n\t\t\t*if mortar =1\n\t\t\t\tIn fact, Private Merrik is still toting the company trench mortar. It could be time to employ that liberally.\n\t\t\t*if mortar =0\n\t\t\t\tA pity that Private Merrik didn't carry along the company trench mortar. That would have made things a lot easier.\n*if morale =3 \n\tYour men are still willing to fight.\n\t*if logistics \u003c0 \n\t\tBut they would have to go in with only a handful of rounds.\n\t*if logistics =0 \n\t\tBut they would have to go in with only a handful of rounds.\n\t*if logistics =1\n\t\tIt would have to be a brief firefight though, because there's only rounds enough for that.\n\t*if logistics =2 \n\t\tThere is enough ammo for one sustained firefight, so that is the kind of clash you'll have to find.\n\t*if logistics =3 \n\t\tIt might be a running gun-battle. There's certainly ammo enough for that.\n\t*if logistics >3 \n\t\tThere's certainly enough ammo to do that.\n\t\t*if merrik =0\n\t\t\t*if mortar =1\n\t\t\t\tIn fact, Private Merrik is still toting the company trench mortar. That could make things go easier.\n\t\t\t*if mortar =0\n\t\t\t\tA pity that Private Merrik didn't carry along the company trench mortar. That would have made things easier.\n*if morale =4 \n\tYour men are eager to finish this up.\n\t*if logistics \u003c0 \n\t\tBut they would have to do that with only a handful of rounds.\n\t*if logistics =0 \n\t\tBut they would have to try that with only a handful of rounds.\n\t*if logistics =1\n\t\tThough there is only enough ammo for a brief firefight.\n\t*if logistics =2 \n\t\tIf it would take a sustained firefight, then so be it. There is ammo enough for that.\n\t*if logistics =3 \n\t\tIf it takes a running gun-battle, then so be it. There's ammo enough for that.\n\t*if logistics >3 \n\t\tThere's ammo enough for the rest of the enemy.\n\t\t*if merrik =0\n\t\t\t*if mortar =1\n\t\t\t\tHeck, Private Merrik is still toting the company trench mortar. Would be a shame if that didn't get deployed.\n\t\t\t*if mortar =0\n\t\t\t\tA pity you didn't have Private Merrik carry along the company trench mortar for a day like this.\n*if morale >4 \n\tYour men are ready to take on the world.\n\t*if logistics \u003c0 \n\t\tHowever, they are down to their last rounds.\n\t*if logistics =0 \n\t\tHowever, they have only a handful of rounds.\n\t*if logistics =1\n\t\tThough admittedly they only have enough ammo for a brief firefight.\n\t*if logistics =2 \n\t\tAnd there is certainly enough ammo for a sustained firefight.\n\t*if logistics =3 \n\t\tAnd they have enough ammo to do it in a running gun-battle.\n\t*if logistics >3 \n\t\tAnd they certainly have enough ammo to try that.\n\t\t*if merrik =0\n\t\t\t*if mortar =1\n\t\t\t\tHeck, Private Merrik is still toting the company trench mortar. Would be a shame if that didn't get deployed.\n\t\t\t*if mortar =0\n\t\t\t\tA pity you didn't have Private Merrik carry along the company trench mortar for a day like this.\n*line_break\n*line_break\n*if firepower =0\n\tAll three of your fire teams stand ready.\n*if firepower =1\n\tTwo of your three fire teams stand ready.\n*if firepower =2 \n\tOnly Baker and his fire team are with you.\n*if character_condition >2\n\tYou are in fine shape at least. Luck has favored you so far.\n*if character_condition =2\n\tYour recent injuries continue to ache as you consider what comes next.\n*if character_condition =1\n\tYour wounds growl with agony as you consider what comes next.\n*if character_condition \u003c1\n\tYou feel like you could sleep for a month. Starting now.\n*if ishiro_scar >0\n\tThe wound Ishiro inflicted aches poignantly.\n\n*choice\n\t#We need to finish this.\n\t\t*set battle 1\n\t\t*goto finish_this\n\t#Gather papers, radio, everything we can carry back with us for intel.\n\t\t*set commendation_5 1\n\t\t*set time +3\n\t\t*goto withdrawal\t\n\t#Grab only the important looking papers. Leave the rest behind.\n\t\t*set commendation_5 2\n\t\t*goto withdrawal\n\t#We need to withdraw. Now.\n\t\t*set time -2\n\t\t*goto withdrawal\n\n*label withdrawal\n\nYou take Baker aside and give the orders. He nods along.\n\n\"Yeah, we can't do it, LT,\" Baker says in agreement.\n*if morale \u003c3\n\t*if logistics \u003c3\n\t\t\"We're not fresh, and we don't have the ammo.\"\n*if morale >2\n\t*if logistics \u003c3\n\t\t\"The men would try, but we'd be down to cold steel before too long.\"\n*if morale \u003c3\n\t*if logistics >2\n\t\t\"We've got the rounds, but no one is ready to see a bitter battle through.\"\n*if morale >2\n\t*if logistics >2\n\t\t\"I know our men would do everything they could, but there's a lot of Japanese and they're fortified back in that jungle.\"\n*line_break\n*line_break\n*choice\n\t#\"It's my call make.\"\n\t\t\"I know,\" Baker replies. \"And I'm glad you're making it.\"\n\t\t*goto withdrawal_1\n\t#\"The war isn't going anywhere.\"\n\t\t\"Yeah, not right now it isn't,\" Baker notes. \"But we'll be back.\"\n\t\t*goto withdrawal_1\n\t*if morale \u003c3\n\t\t#\"This is my failure, not yours.\"\n\t\t\t\"You are in command,\" Baker notes. \"Whatever the reason, you take the heat.\"\n\t\t\t*goto withdrawal_1\n\t*if logistics \u003c3\n\t\t#\"We can't fight this out with bayonets.\"\n\t\t\t\"Nobody can, at least not for long,\" Baker remarks. \"And I really don't want to try.\"\n\t\t\t*goto withdrawal_1\n\n*label withdrawal_1\n\n*if morale >2\n\t*if logistics >2\n\t\t*set condemnation_1 1\n*if morale >1\n\t*if logistics >1\n\t\t*if schley =1\n\t\t\t*set condemnation_1 1\n*if morale >0\n\t*if logistics >0\n\t\t*if schley =2\n\t\t\t*set condemnation_1 1\nNo one likes to admit defeat, but this feels like the right call to make.\n*if character =0\n\tDead men don't win wars.\n*if character =1\n\tNext time, you'll lick them.\n*if character =2\n\tThe Japanese aren't going anywhere. They're on an island.\n*line_break\n*line_break\n\nYour men fall-in and march out. It is a quick ascent back to the central plateau. Hagan gripes softly to his fire team as he slings the heavy pack-radio once again, \"It's uphill, both ways...\"\n\n*if situation =2\n\tAs you leave the enemy encampment behind, Private Scott also grouses. \"I think we could have taken them.\"\n\n\t\"LT's call, not yours,\" Baker growls back. \"There are with bars and those with stripes, and you've got the stripes.\"\n\t\n\t\"But...\"\n\t\n\t\"Keep talking like that, Private, and I'll give you a fresh set you won't like.\"\n\n\t*if ishiro =3\n\t\tTo brush away a bit of the gloom you comment on making a diversion to grab Ishiro.\n\t\t*line_break\n\t\t*line_break\n\t\t*goto ishiro?\n\t*else\n\t\t*goto return_to_beach\n*else\n\tAs you leave the destroyed encampment behind, Private Scott asks openly. \"We're... not going to try for 2nd base?\"\n\n\t\"LT's call.\" Baker growls back. \"There are those with bars and those with stripes, and you've got the stripes.\"\n\t\n\t\"But...\"\n\t\n\t\"Keep talking like that, Private, and I'll give you a fresh set you won't like.\"\n\n\t*if ishiro =3\n\t\tTo brush away some of the gloom you comment on making a diversion to grab Ishiro.\n\t\t*line_break\n\t\t*line_break\n\t\t*goto ishiro?\n\t*else\n\t\t*goto return_to_beach\n\n*label ishiro?\n\nIt is the usual slog back through the jungle. But even that can't hide a spring to the Marine step. They know they are going to be leaving with an important prisoner.\n*if gerhard =1\n\t*line_break\n\t*line_break\n\tEven though wounded, Gerhard manages to keep up. Still, his bandages grow steadily darker. \n*line_break\n*line_break\nLieutenant Ishiro Hasebe, of the IJN, is right where you left him. Tied to a tree and definitely unhappy about it. Covered in insect bites, wrists chafed and sore, he greets you with an icy silence that fails to hide a hint of relief.\n\nYou cut the ropes then let him empty a canteen. That done, you position the Japanese officer into column amid your men.\n*goto return_to_beach\n\n*label return_to_beach\n\nYour platoon endures the tiring trek through the jungle. At last the heavy green begins to thin, though the usual grumbles continue.\n\n*if merrik =2 \n\tOn point, Private Scott calls out. \"Sarge! Come quick.\" \n\n\t\"What is it?\" Baker demands but Scott chokes on the answer.\n\n\tPrivate Merrik lies propped against a tree, pale as a sheet. His unblinking eyes stare into an impossible distance. The bullet gash on his thigh is already infested with dark, crawling\n\t*if character =0\n\t\tcritters.\n\t*if character =1\n\t\tvermin.\n\t*if character =2\n\t\tinsects.\n\t*line_break\n\t*line_break\n\tHe never made it back to the beach.\n\n\tThere's nothing you can do but splash rice-wine to clear out the crawlers and then organize a stretcher detail.\n\t*goto the_beach\n*else\n\t*goto the_beach\n\n*label the_beach\n*set meta_time 5\n*page_break\n\nThe western beach is right where you left it, cliffs and all.\n\n*if landry =2\n\tPrivate Landry lies motionless under the palm tree where you left him. Rifle cradled in hand, he could be napping, waiting only for a companion to nudge him awake so he can take his turn as sentry.\n\t*if time \u003c3\n\t\t*line_break\n\t\t*line_break\n\t\tThen Landry draws in a ragged breath and Scott lets out a long sigh of relief that no one mocks him for.\n\t\t*set landry 1\t\t\n\t\t*set morale +1\n\t*if time >2\n\t\tScott nudges Landry's foot but the Private does not stir. He passed quietly, facing the sea. Marines do not cry, but something has clearly gotten into his eye.\n\t*line_break\n\t*line_break\t\n*if ishiro =1\n\tCorporal Ransom stands to attention as you approach. His captive, IJN Lieutenant Ishiro Hasebe, does not look up. Instead he continues to watch the waves roll in.\n\t*choice\n\t\t#\"Any problems?\"\n\t\t\t\"None, Lieutenant,\" Ransom replies, pats the stock of his submachine gun meaningfully.\n\t\t\t*goto the_beach_1\n\t\t#He's clearly looking forward to retirement.\n\t\t\tFor him, the war is over.\n\t\t\t*goto the_beach_1\n*else\n\t*goto the_beach_1\n\n*label the_beach_1\n\n*if gerhard =1\n\tHolben tightens Gerhard's blood soaked bandage yet again. The Corporal's breath has gone shallow and his skin is far too wan. The sooner you get him aboard the Schley, the better.\n\t*line_break\n\t*line_break\n*if gerhard =3\n\t${holben_rank} Holben squats forlornly beside the body of Corporal Gerhard beneath the shade of a palm tree. The dead man's features have been covered respectfully by a bone-white handkerchief but nothing can hide the grief in Holben's eyes.\n\t*line_break\n\t*line_break\nThe Schley waits off in the distance, a dark shape silhouetted against the setting sun.\n*if schley =1\n\tA black cloud of smoke billows from amidships. That float-plane must have done a number on your ride home.\n\t*line_break\n\t*line_break\n*if insert =3\n\tYou order your men to pull the rubber boats from hiding.\n\t*if time \u003c5\n\t\tThey are right where you left them. Your men carry them down to the beach and push them into the foaming surf. A few minutes later you're paddling away from the island.\n\t\t*goto finale\n\t*else\n\t\tBut the boats are mere flabs of rubber, having been slit from stem to stern by an industrious enemy. Utterly useless slabs of rubber now. You will have to contact the Schley and wait for the landing boats.\n\t\t*goto contact_schley\n*else\n\t*goto contact_schley\n\n*label contact_schley\n*page_break Ahoy!\nYou remove the handset from Hagan's pack-radio. The receiver crackles and crackles, but nothing coherent comes from that. The atmospherics must be bad right now.\n*if schley =1\n\tOr the damage the destroyer sustained could be to blame. Either way means the same thin
