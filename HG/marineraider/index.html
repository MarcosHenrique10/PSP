g.\n*line_break\n*line_break\nYou will have to contact the Schley some other way.\n\n*choice\n\t#Use a mirror and Morse code. Its the safest way.\n\t\tMirror, sun, and the proper angle combine to send distinctive flashes to the destroyer. After a few attempts, the prow blinker-light flickers back from the Schley. On and off it flutters until you have the message. 'Landing boats on the way.'\n\t\t*set contact_schley 1\n\t\t*goto landing_boats\n\t#Send up a flare. The enemy will see it, but the landing boats will be here quick.\n\t\tBaker passes over a bulky Very pistol. You slap in a flare and with a pull of the trigger send it burning skyward. A repeated blink of light answers back almost at once from the Schley, telling you 'landing boats are on the way.'\n\t\t*set time -1\n\t\t*set contact_schley 2\n\t\t*goto landing_boats\n\t*disable_reuse #Keep trying the radio. It has got to work sooner or later.\n\t\tNothing but static. Oddly, the Honolulu station comes in fine.\n\t\t*set time +1\n\t\t*if character =2\n\t\t\tA pity the pack-radio doesn't have the range to send to Pearl Harbor. You could then get them to transmit back the Schley and perhaps get around any local atmospheric troubles.\n\t\t*if character =0\n\t\t\tTypical. Time to improvise.\n\t\t*if character =1\n\t\t\tStupid machine. You give it a kick and the darn thing starts to buzz and crackle. Must've just needed some boot-love.\n\t\t\t*set contact_schley 3\n\t\t\t*goto landing_boats\n\t\t*if time >9\n\t\t\tThen something squelches the air and a familiar voice from the Schley rises out from the static. Ever so quickly you relay what you need.\n\t\t\t*set contact_schley 3\n\t\t\t*goto landing_boats\n\t\t*else\n\t\t\t*goto contact_schley\n\n*label landing_boats\n\nTiny black dots detach from the Schley and head toward the island. The Eureka boats, enroute. All you have to do is sit back and--\n\nPrivate Simmons emerges from the Jungle at a run, his features muddled by black and green from a fresh layer war paint. He stumbles to a halt before you. \"LT, we got company out there!\"\n\n*choice\n\t#\"How many?\"\n\t\t*goto landing_boats_1\n\t*if resistance \u003c41\n\t\t#\"Can't be many of them...\"\n\t\t\tThere shouldn't be a lot of Japanese left on the island. Shouldn't be.\n\t\t\t*goto landing_boats_1\n\t*if contact_schley =1\n\t\t#They might have caught the flashes from the Schley.\n\t\t\tThe Japanese are\n\t\t\t*if float =0\n\t\t\t\tprobably aware of the Schley by now.\n\t\t\t*if float >0\n\t\t\t\tundoubtedly aware of the Schley by now.\n\t\t\tIt doesn't take much to figure out the possible landing beaches. Catching a communications flash would just be icing on the cake.\n\t\t\t*goto landing_boats_1\n\t*if contact_schley =2\n\t\t#They must have seen the flare.\n\t\t\tIt was a risk to use the flare. But maybe there aren't a lot of them yet. A small patrol or the like.\n\t\t\t*goto landing_boats_1\n\t*if contact_schley =3\n\t\t#A radio intercept seems unlikely.\n\t\t\tUnless the Japanese have radio detection and triangulation gear, unlikely, the radio message wasn't the tip off. But bad luck can explain a lot.\n\t\t\t*goto landing_boats_1\n\n*label landing_boats_1\n\nSimmons draws in a breath.\n*if time \u003c1\n\t\"Just two, but it looks like they've got themselves a radio.\"\n\t*set resistance 2\n\t*goto jap_bombardment\n*if time \u003c3\n\t\"Patrol. Maybe seven. They've also got themselves an officer and\n\t*if ishiro =0\n\t\ta radio.\"\n\t*if ishiro =1\n\t\ta radio with a captain attached.\"\n\n\t\tIshiro clears his throat politely. \"I imagine that would be Captain Takao. He is rather skilled with indirect fire.\"\n\t*if ishiro =2\n\t\ta radio. They're commanded by our 'buddy' Ishiro.\"\n\t*set resistance 7\n\t*goto jap_bombardment\n\n*if time \u003c5\n\t\"Maybe a dozen. They've also got themselves an officers and\n\t*if ishiro =0\n\t\ta radio.\"\n\t*if ishiro =1\n\t\ta radio with a captain attached.\"\n\n\t\tIshiro clears his throat politely. \"I imagine that would be Captain Takao. He is rather skilled with indirect fire.\"\n\t*if ishiro =2\n\t\ta radio. They're commanded by our 'buddy' Ishiro.\"\n\t*set resistance 14\n\t*goto jap_bombardment\n*if time \u003c8\n\t\"Thirty and change.\n\t*if ishiro =0\n\t\tMaybe some mortars in back. Couldn't be sure.\"\n\t*if ishiro =1\n\t\ta radio with a major attached.\"\n\n\t\tIshiro clears his throat politely. \"I imagine that you have aroused the ire of Major Yamamoto himself. This will not end quietly.\"\n\t*if ishiro =2\n\t\tOur 'buddy' Ishiro is with'em.\"\n\t*set resistance 30\n\t*goto jap_bombardment\t\t\n*else\n\t\"We got beau-coup Japs, LT. Forty and then some.\n\t*if ishiro =0\n\t\tProbably got mortars in back. Couldn't be sure though.\"\n\t*if ishiro =1\n\t\ta radio with a major attached.\"\n\n\t\tIshiro clears his throat politely. \"It sounds as if the entire base has been gathered up by Major Yamamoto himself. This will not end quietly.\"\n\t*if ishiro =2\n\t\tOur 'buddy' Ishiro is one of them.\"\n\t*set resistance 42\n\t*goto jap_bombardment\n\t\n*label jap_bombardment\n\nA low whump coughs out from the deep jungle. Something arcs over and a thunder erupts from the sea. Frothy white spray of sand and salt water spew skyward. \n\nMortars. Enemy mortars.\n*if resistance \u003c30\n\tUnexpected and unwelcome.\n*if resistance >29\n\tBig ones too.\nAnother whump. Then another. Too quick to be just one tube.\n\nThe jungle offers cover, but the beach below the cliff is where the boats will come.\n\n*choice\n\t#Hide in the jungle until the landing boats arrive.\n\t\t*goto defensive_firefight_jungle\n\t#Go into the jungle, eliminate the spotters.\n\t\t*goto offensive_firefight_jungle\n\t#Dig in on the beach.\n\t\t*goto defensive_firefight_beach\n\n*label defensive_firefight_jungle\n\nYou order your men into the jungle as the Japanese mortars walk in. The next rounds fall short and savage the trees into splinters. Then they fall amongst your men and the explosions shakes you like a child's doll. Over and over, the rounds keep crashing down. \n\nPrivate Hagan nearly has his back fileted but the now useless pack-radio saves him from a far worse fate. If you had ten of those you'd build a bunker with them and fast.\n\n*if mortar =1\n\t*if merrik =0\n\t\tThe company trench mortar barks out in reply as Private Merrik hurriedly feeds in round after round for counter-battery fire. The enemy gets their own taste of that indirect terror. It should be a two man job, but Merrik does just fine.\n\t\t*set resistance -3\n\t*if merrik >0\n\t\tToo bad you had to leave the company trench mortar behind when Merrik got hit. It would have given the enemy a taste of their own medicine.\n\t*line_break\n\t*line_break\n*set casualties +1\n*if resistance >13 \n\tThen the bombardment lifts. Ahead, branches and vines stir as Japanese soldiers creep forward, the first of them already have their bayonets fixed.\n\t*choice\n\t\t#\"Give it to them!\"\n\t\t\tAt your order the Marines open fire. Several of the enemy drop but others abruptly scream out a singular cry and charge forward. \n\t\t\t*if logistics >=1\n\t\t\t\tThey race right into your continuous fire. Only a single soldier lives to flee deep into the jungle.\n\t\t\t\t*set resistance -4\n\t\t\t\t*set logistics -2\n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tBut your Marines run out of ammo before the enemy runs out of men.\n\t\t\t\t*set resistance -4\n\t\t\t\t*goto hand_to_hand\t\t\t\n\t\t#Wait for it...\n\t\t\tWith a few fierce hand signals you order your men to stay down, wait for the enemy to reveal themselves in full.\n\t\t\t*if morale >2\n\t\t\t\tThey hold and hold, sweat over each moment of the enemy approach, certain they'll be seen. They have to be seen. Who could miss them? But no. The first of the enemy draws close, utterly ignorant of your position.\n\n\t\t\t\tYou give the signal and your men devastate the Japanese ranks with intensive fire.\n\t\t\t\t*set resistance -8\t\t\n\t\t\t\t*if logistics >0\n\t\t\t\t\tThe remainder of the enemy shouts out a singular cry and charges, straight in. Rifles and BARS do their work and few foes live to flee deep into the jungle.\n\t\t\t\t\t*set logistics -2\n\t\t\t\t\t*goto meet_the_boats\n\t\t\t\t*else\n\t\t\t\t\tBut as your Marines run out of ammo, the Japanese regain heart and charge forward with a singular cry.\n\t\t\t\t\t*goto hand_to_hand\n\t\t\t*else\n\t\t\t\tSomeone's sweat slicked finger brushes against a trigger. No telling who because an instant later every Marine weapon erupts in kind. The Japanese reply with a ragged volley and soon the whole jungle is caught up in the firefight. \n\n\t\t\t\tAs one, the enemy summons up a piercing cry and charges forward.\n\t\t\t\t*if logistics >1\n\t\t\t\t\tThey rush straight into continuous Marine fire. Few of them live to flee deep into the jungle.\n\t\t\t\t\t*set resistance -4\n\t\t\t\t\t*set logistics -2\n\t\t\t\t\t*goto meet_the_boats\n\t\t\t\t*else\n\t\t\t\t\tBut your Marines run out of ammo before your enemy runs out of men.\t\n\t\t\t\t\t*set resistance -4\n\t\t\t\t\t*goto hand_to_hand\t\t\n*else\n\tThe bombardment goes on and on as thunder begets thunder. Private Scott screams when shrapnel chews into his neck but lives to gripe about it.\n\n\tAt last the oncoming landing boats arrive. Their twin thirties lay down a sheet of suppressive fire as your Marines struggle back toward the beach.\n\t*goto meet_the_boats\n\n*label offensive_firefight_jungle\n\nYou lead your men back into the Jungle at a run. Its do or die and you know which side of that you want to be on.\n\n*if situation =0\n\tJapanese mortar rounds explode from sea to sand as they walk in toward your old positions.\n\t*if character =0\n\t\tBut when they pause to reload you lead your men straight into the jungle.\n\t*if character =1\n\t\tBut they are of little concern when your men slip into the jungle.\n\t*if character =2\n\t\tThe Japanese think you will defend an indefensible position. Optimistic, and useless as you lead your men into the jungle.\n\tAfter the incoming mortar fire lifts, an eerie silence falls. The enemy must be close at hand.\n\t*line_break\n\t*line_break\n*if situation =1\n\tYou catch a mortar section moving forward and scatter them like partridges \n\t*if weapon =0\n\t\twith a long burst from your BAR. \n\t*if weapon =1\n\t\twith a long burst from your Thompson. \n\t*if weapon =2\n\t\twith a few rounds from your M1. \n\t*if weapon =3\n\t\tby just hefting your flamethrower in their general direction. \n\tThe crack of an enemy rifle rings out as you kick over the base-plate. More Japanese, straight ahead.\n\t*line_break\n\t*line_break\n*if resistance \u003c3\n\tThe paltry few enemy riflemen fade away before your men take them under fire.\n\t*goto meet_the_boats \n*if resistance \u003c8\n\tThey're patrol strength, just like Simmons said. The Japanese riflemen snap off rounds as your men advance.\n\t*choice\n\t\t#Attack!\n\t\t\t*if morale >2\n\t\t\t\tYour Marines give a yell as they charge the enemy. Long bursts paired with precise rifle fire harry the enemy back into the jungle.\n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tYour Marines, weary and worn, strive to follow through as the Japanese pepper them with rounds.\n\n\t\t\t\t*if hagan >0\n\t\t\t\t\t${holben_rank} Holben has snagged his pack on a vine in mid-charge. You watch, helpless, as he is shot through and through before he can free himself. \n\t\t\t\t\t*set holben 1\n\t\t\t\t*if hagan =0\n\t\t\t\t\tPrivate Hagan snags his pack on a vine in mid-charge. You watch, helpless, as he is shot through and through before he can free himself. \n\t\t\t\t\t*set hagan 4\t\n\t\t\t\t*line_break\n\t\t\t\t*line_break\n\t\t\t\tPrivate Scott reaches the fallen Marine's side and rolls him over. There is blood everywhere. Too much. You know what that means even before Scott calls out, \"He's dead!\" \n\t\n\t\t\t\tEnraged by the sudden loss, your platoon clears out the enemy with a ferocious volley and recovers the body.\n\t\t\t\t*set casualties +1\n\t\t\t\t*goto meet_the_boats\n\t\t#Fire and flank.\n\t\t\tYour men take the enemy under fire and work another around the flank.\n\t\t\t*if logistics >1\n\t\t\t\tIt is a textbook maneuver that tears the enemy in two. The paltry few foes retreat. \n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tIt is a textbook maneuver right up until the flanking fire team runs out of ammo.\n\n\t\t\t\t*if hagan >0\n\t\t\t\t\t${holben_rank} Holben has snagged his pack on a vine in mid-charge. Only Scott's precision fire keeps a nearby enemy from slamming a round through Hagan's chest. As it is, he may lose the arm.\n\t\t\t\t\t*set holben 1\n\t\t\t\t*if hagan =0\n\t\t\t\t\tPrivate Hagan has snagged his pack on a vine in mid-charge. Only Scott's precision fire keeps the nearest enemy from slamming a round through Hagan's chest. As it is, he may lose the arm.\n\t\t\t\t\t*set hagan 3\n\t\t\t\t*line_break\n\t\t\t\t*line_break\n\t\t\t\tBut your platoon still clears out the enemy with a fierce volley.\n\t\t\t\t*set casualties +1\n\t\t\t\t*goto meet_the_boats\t\n\t\t#Return fire!\n\t\t\t*if logistics >2\n\t\t\t\tYour men open fire. Marine BAR's force the enemy to keep their heads down while accurate M1 fire whittles away at the rest. The few remaining foes flee back into the jungle.\n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tLow on ammunition, your men are forced to conserve their fire. The Japanese grow bold. Suddenly, they charge.\n\n\t\t\t\t*if hagan >0\n\t\t\t\t\t${holben_rank} Holben has snagged his pack on a vine in mid-charge. Only Scott's precision fire keeps the nearest enemy from slamming a round through Hagan's chest. As it is, he may lose the arm.\n\t\t\t\t\t*set holben 1\n\t\t\t\t*if hagan =0\n\t\t\t\t\tPrivate Hagan has snagged his pack on a vine in mid-charge. Only Scott's precision fire keeps the nearest enemy from slamming a round through Hagan's chest. As it is, he may lose the arm.\n\t\t\t\t\t*set hagan 3\n\t\t\t\t*line_break\n\t\t\t\t*line_break\n\t\t\t\tBut your platoon swiftly clears out the enemy with a fierce volley.\n\t\t\t\t*set casualties +1\n\t\t\t\t*goto meet_the_boats\n*if resistance \u003c15\n\tYeah, there a lot of them and they've got a machine gun. That weapon pecks up a fuss as your men advance.\n\t*choice\n\t\t#Attack!\n\t\t\t*if morale >3\n\t\t\t\tSimmons picks off the gunner and Scott nails the assistant for good measure. Encouraged, your men charge. Long bursts interwoven by precise single shots harry the survivors back into the jungle.\n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tYour weary Marines try to follow through as the Japanese pepper them with rifle fire.\n\n\t\t\t\t*if hagan >0\t\t\t\t\n\t\t\t\t\t${holben_rank} Holben is pushed from cover by the muffled rumble of a Japanese grenade, takes a burst in the chest that shatters bone and pack-radio alike.\n\t\t\t\t\t*set holben 1\n\t\t\t\t*if hagan =0\n\t\t\t\t\tPrivate Hagan is pushed from cover by the muffled rumble of a Japanese grenade, takes a burst in the chest that shatters bone and pack-radio alike.\n\t\t\t\t\t*set hagan 4\n\t\t\t\t*line_break\n\t\t\t\t*line_break\t\t\n\t\t\t\t\"He's dead!\" Private Scott yells out beside the fallen Marine before he himself is pinned down by the same deadly machine gun.\n\t\t\t\t*set casualties +1\n\n\t\t\t\t*if logistics >0\n\t\t\t\t\t\"Grenades!\" Baker calls out.\n\n\t\t\t\t\tA moment later, half a dozen pineapple bombs go arcing toward the foe. The explosions kick up a forest of foliage and that buys Scott a moment to scamper back.\n\t\t\t\t\t\t\t\n\t\t\t\t\tBut then the enemy comes charging out of the smoke.\n\t\t\t\t\t*set resistance -3\n\t\t\t\t\t*goto hand_to_hand\n\t\t\t\t*else\n\t\t\t\t\tScott screams as he too is hit. \n\n\t\t\t\t\tThe enemy rises up with their bayonets fixed.\n\t\t\t\t\t*set resistance -3\n\t\t\t\t\t*set scott 1\n\t\t\t\t\t*set casualties +1\n\t\t\t\t\t*goto hand_to_hand\n\t\t#Fire and flank!\n\t\t\tYou take the enemy under fire with one team. Baker hits the flank with the other two.\n\t\t\t*if logistics >2\n\t\t\t\tIt is a textbook maneuver that tears the enemy apart, forces the paltry few foes to flee. \n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tIt is a textbook maneuver right up until the holding fire team runs out of ammo.\n\n\t\t\t\t*if hagan >0\n\t\t\t\t\t${holben_rank} Holben has snagged his pack on a vine in mid-charge. You watch, helpless, as he is shot through and through before he can free himself. \n\t\t\t\t\t*set holben 1\n\t\t\t\t*if hagan =0\n\t\t\t\t\tPrivate Hagan has snagged his pack on a vine in mid-charge. You watch, helpless, as he is shot through and through before he can free himself. \n\t\t\t\t\t*set hagan 4\n\t\t\t\t*line_break\n\t\t\t\t*line_break\n\t\t\t\tEmboldened, the enemy charges.\n\t\t\t\t*set casualties +1\n\t\t\t\t*set resistance -3\n\t\t\t\t*goto hand_to_hand\n\t\t#Return fire!\n\t\t\tYour men build up a base of fire.\n\t\t\t*if schley =0\n\t\t\t\tThe BAR's do the heavy lifting as they send burst after burst against the Japanese. You know the ammo won't last and when it is gone... Then the sweetest sound rises up as the cool crescendo of thirty-caliber machine guns join in as the Eureka boats motor close enough to lay down a sheet of suppressive fire.\n\t\t\t\t*set resistance -3\n\t\t\t\t*goto meet_the_boats \t\t\n\t\t\t*else\n\t\t\t\tYour platoon's BARs spit out their final rounds then fall silent. With a singular cry the Japanese rise up with bayonets fixed.\n\t\t\t\t*set resistance -3\n\t\t\t\t*goto hand_to_hand\n\n*if resistance \u003c31\n\tYeah, there's a heck of a lot of Japanese. They've also got at least two machine guns because those kick up a staccato racket as your men creep closer.\n\t*choice\n\t\t#Attack!\n\t\t\t*if morale >3\t\t\t\t\t\t\n\t\t\t\tSimmons picks off one gunner while Scott nails the other. The enemy tries to man those again but your Marines give a harmonious shout as they advance, fire long bursts and single shots as they force the foe to instead flee back into the jungle.\n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tYour weary Marines try to follow through as the Japanese pepper them with rifle fire. A sudden scream rises up. You turn and catch sight of\n\t\t\t\t*if hagan >0\n\t\t\t\t\t${holben_rank} Holben as he tries to unsnag his pack from a vine. You watch, helpless, as he is shot through and through before he can free himself. \n\t\t\t\t\t*set holben 1\n\t\t\t\t*if hagan =0\n\t\t\t\t\tPrivate Hagan as he tries to unsnag his pack from a vine. You watch, helpless, as he is shot through and through before he can free himself. \n\t\t\t\t\t*set hagan 4\n\t\t\t\t*line_break\n\t\t\t\t*line_break\t\t\t\t\t\t\t\n\t\t\t\t\"He's dead!\" Private Scott calls out from beside the fallen Marine before he is pinned down by the same killer machine gun.\n\t\t\t\t*set casualties +1\n\n\t\t\t\t*if logistics >1\n\t\t\t\t\t\"Grenades!\" Baker shouts out.\n\t\t\t\t\t\t\n\t\t\t\t\tA handful of pineapple bombs go arcing toward the foe and the jungle explodes in fragments of foliage that buys Scott a moment to scurry to safety.\n\t\n\t\t\t\t\tBut then the enemy comes charging out of the smoke with bayonets fixed.\n\t\t\t\t\t*set resistance -4\n\t\t\t\t\t*goto hand_to_hand\n\t\t\t\t*else\n\t\t\t\t\tScott's scream is cut short by a burst. Emboldened, the enemy rises up with bayonets fixed.\n\t\t\t\t\t*set scott 2\n\t\t\t\t\t*set casualties +1\n\t\t\t\t\t*set resistance -4\n\t\t\t\t\t*goto hand_to_hand\n\t\t#Fire and Movement\n\t\t\tYou take the enemy under fire with one team. Baker slips around the flank with the other two.\n\t\t\t*if logistics >2\n\t\t\t\tIt is a textbook maneuver that tears the enemy apart. The paltry few foes flee into the jungle.\n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tIt is a textbook maneuver right up until the holding fire team runs out of ammo. \n\t\t\t\t*if hagan >0\n\t\t\t\t\t${holben_rank} Holben nags his pack-radio on a vine in mid-charge. You watch, helpless, as he is shot through and through before he can free himself.\n\t\t\t\t*if hagan =0\n\t\t\t\t\tPrivate Hagan snags his pack-radio on a vine in mid-charge. You watch, helpless, as he is shot through and through before he can free himself. \n\t\t\t\t\t*set hagan 4\n\t\t\t\t\t*set holben 1\t\t\n\t\t\t\t*line_break\n\t\t\t\t*line_break\n\t\t\t\tEmboldened, the enemy charges with bayonets fixed.\n\t\t\t\t*set casualties +1\n\t\t\t\t*set resistance -4\n\t\t\t\t*goto hand_to_hand\t\t\t\t\t\n\t\t#Return fire\n\t\t\tYour men build up a heavy base of fire.\n\t\t\t*if schley =0\n\t\t\t\tYour BAR's do the heavy lifting as they send burst after burst against the Japanese. You know the ammo won't last and when it is gone... Then the sweetest sound rises up as the cool crescendo of thirty-caliber machine guns join in as the Eureka boats motor close enough to lay down a sheet of suppressive fire.\n\t\t\t\t*goto meet_the_boats \t\t\n\t\t\t*else\n\t\t\t\tYour platoon's BARs spit out their final rounds and fall silent. With a singular cry the Japanese rise up with bayonets fixed.\n\t\t\t\t*set resistance -3\n\t\t\t\t*goto hand_to_hand\n*else\n\tOh crap. It is every survivor from the base and their older brothers too. A trio of machine guns begin to tap out a terrible tempest of lead. Meanwhile, a braided major leads a band of twenty plus enemies straight for you with bayonets fixed.\n\n\t*choice\n\t\t#Charge!\n\t\t\t*if morale >4 \n\t\t\t\tSimmons picks off the enemy Major as the Japanese officer pauses to clear a machine gun jam. Meanwhile Scott and Baker each plink a gunner. Without their automatics in support, the enemy riflemen falter. Your Marines give a harmonious shout as they charge forward, firing bursts and single shots as if the devil himself were before them. Stunned, the Japanese flee back into the jungle.\n\t\t\t\t*set commendation_2 1\n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tYour men fire off their rounds but its no use. There's just too many of them. The Japanese close in, arm their grenades with a blow to the striker and then hurl them your way.\n\n\t\t\t\tRepeated explosions shake the trees as your Marines dive for cover to escape the slashing shrapnel.\n\n\t\t\t\t*if hagan >0\n\t\t\t\t\tHolben tries to push Private Scott away from an enemy grenade but is struck by a burst of machine gun fire. He staggers right into a grenade explosion.\n\t\t\t\t\t*set holben 1\n\t\t\t\t*if hagan =0\n\t\t\t\t\tPrivate Hagan tries to push Private Scott away from an enemy grenade but is struck by a burst of machine gun fire. He staggers right into a grenade explosion.\n\t\t\t\t\t*set hagan 4\n\t\t\t\tBoth men go flying.\n\t\t\t\t*set scott 1\n\t\t\t\t*line_break\n\t\t\t\t*line_break\t\t\t\t\t\n\t\t\t\t*set resistance -4\n\t\t\t\t*set casualties +2\n\t\t\t\t*goto hand_to_hand\n\t\t#Fire and Movement.\n\t\t\tYou take the enemy under fire with one team. Baker hits the flank with the other two.\n\t\t\t*if logistics >2\n\t\t\t\tIt is a textbook maneuver that tears the enemy apart. The paltry few foes flee into the jungle.\n\t\t\t\t*goto meet_the_boats\n\t\t\t*else\n\t\t\t\tIt is a textbook maneuver right up until the flanking fire team runs out of ammo.\n\t\t\t\t*if hagan =0\n\t\t\t\t\tPrivate Hagan snags his pack on a vine in mid-charge. You watch, helpless, as he is shot through and through before he can free himself. \n\t\t\t\t\t*set hagan 4\n\t\t\t\t*if hagan >0\n\t\t\t\t\t${holben_rank} Holben snags his pack on a vine in mid-charge. You watch, helpless, as he is shot through and through before he can free himself. \n\t\t\t\t\t*set holben 1\n\t\t\t\t*line_break\n\t\t\t\t*line_break\t\n\t\t\t\tEmboldened, the enemy charges with bayonets fixed.\n\t\t\t\t*set casualties +1\n\t\t\t\t*set resistance -4\n\t\t\t\t*goto hand_to_hand\t\n\t\t#Return fire.\n\t\t\tYour men build up a heavy base of fire.\n\t\t\t*if schley =0\n\t\t\t\tYour BAR's do the heavy lifting as they send burst after burst against the Japanese. You know the ammo won't last and when it is gone...\n\n\t\t\t\tThe cool crescendo of thirty-caliber machine guns abruptly join. You turn to see the Eureka boats motor in close. They lay down a sheet of suppressive fire and the Japanese are stopped cold.\n\t\t\t\t*goto meet_the_boats \t\t\n\t\t\t*else\n\t\t\t\tYour platoon's BARs spit out their final rounds then fall silent. With a singular cry the Japanese rise up with bayonets fixed.\n\t\t\t\t*set resistance -3\n\t\t\t\t*goto hand_to_hand\n\n*label hand_to_hand\n*page_break\nThe Japanese rush your platoon's position with bayonets fixed. Your men rise up to meet them.\n\nRifles bark one last time. A bullet twitters past. Baker fires off an entire clip of his Thompson in a long, terrible burst. Men scream as steel stabs.\n\nThe tip of a bayonet comes straight for your eye.\n*choice\n\t#Parry!\n\t\t*if morale >1\n\t\t\tYou block the thrust and force the enemy to stagger off into the wild melee.\n\t\t*if morale \u003c2\n\t\t\tYou diver the thrust, too late. The enemy's steel slices up your ear. The enemy staggers past and lurches back into the wild melee.\n\t\t*set character_condition -2\n\t\t*goto hand_to_hand_1\n\t#Counter!\n\t\t*if morale >2\n\t\t\tYou slap the bayonet aside then drive your K-bar into the foe. He gives a wet grunt and clutches his stomach as he staggers off into the wild melee.\n\t\t\t*set resistance -4\n\t\t*if morale \u003c2\n\t\t\tYou slap the blade aside but the edge catches your arm. Pain rises up even as you drive your K-bar into the foe. He gives a wet grunt and clutches his stomach as he staggers off into the wild melee.\n\t\t\t*set resistance -2\n\t\t\t*set character_condition -1\n\t\t*goto hand_to_hand_1\n\t#Fall back!\n\t\t*set morale -1\n\t\tYou lurch backward from the bayonet. The enemy comes on... until the jungle trips him up. Staggered, he lurches off into the wild melee.\n\t\t*goto hand_to_hand_1\n\n*label hand_to_hand_1\n\n*if commendation_2 =0\n\t*set commendation_2 1\n*if resistance \u003c11\n\t*line_break\n\t*line_break\n\t*if situation =1\n\t\tThe once mighty enemy has been reduced to a paltry few who scatter before you.\n\t\t*goto victory!\n\t*if battle =1\n\t\tThe once mighty enemy has been reduced to a paltry few who scatter before you.\n\t\t*goto victory!\n\t*else\n\t\tThe enemy, outnumbered and outfought, retreats into the jungle.\n\t\t*goto post_banzai\n*else\n\t*line_break\n\t*line_break\n\t*set resistance -4\n\t*set casualties +1\n\t*if scott =2\n\t\t*goto hand_to_hand_2\n\t*if scott =1\n\t\tThough sorely wounded,\n\tPrivate Scott flings a Japanese soldier into a tree trunk. But a second foe charges across the jungle at his back. The Nipponese bayonet glints cruelly in the setting sun.\n\n\t*choice\n\t\t#\"Scott! Behind you!\"\n\t\t\t*if morale >3\n\t\t\t\tScott turns without pause and casually smacks aside the offending weapon. He follows up with a straight punch with his ham-hock fist that thoroughly decks the enemy.\n\t\t\t\t*set resistance -4\n\t\t\t\t*goto hand_to_hand_2\n\t\t\t*else\n\t\t\t\tScott turns just as the bayonet pierces his side. He screams as he flails at his enemy. Both go down in a heap.\n\t\t\t\t*if scott =1\n\t\t\t\t\t*set casualties +1\n\t\t\t\t\t*set scott 2\n\t\t\t\t\t*goto hand_to_hand_2\n\t\t\t\t*else\n\t\t\t\t\t*set scott 1\n\t\t\t\t\t*set casualties +1\n\t\t\t\t\t*goto hand_to_hand_2\n\t\t#Intercept the enemy.\n\t\t\tYou hurl yourself into the enemy's path and bowl him over. In the fierce wrestle that follows, you earn a year's worth of cuts and bruises before you pummel the foe into oblivion.\n\t\t\t*set resistance -1\n\t\t\t*set character_condition -4\n\t\t\t*goto hand_to_hand_2 \n\t\t*if character =1\n\t\t\t#Fast draw, hip shot!\n\t\t\t\tYou draw with a speed worthy of Hollywood's finest. The charging foe falters as the round strikes true and collapses at Scott's feet.\n\t\t\t\t*set resistance -4\n\t\t\t\t*goto hand_to_hand_2\n\n*label hand_to_hand_2\n\n*if resistance \u003c11\n\t*if situation =1\n\t\tThe once mighty enemy has been reduced to a paltry few who scatter before you.\n\t\t*goto victory!\n\t*if battle =1\n\t\tThe once mighty enemy has been reduced to a paltry few who scatter before you.\n\t\t*goto victory!\n\t*else\n\t\tThe enemy, outnumbered and outfought, retreats into the jungle.\n\t\t*goto post_banzai\n*else\n\tBedlam and confusion reign as men stab, bash and shout at the top of their lungs.\n\t*set casualties +1\n\t*set resistance -4\n\n\tSergeant Baker is having a rough time of it, has only a knife paired against an officer's sword.\n\n\t*choice\n\t\t#Baker needs help. Throw myself into his fight.\n\t\t\tYou hurl yourself at the officer and shove him away from Baker. The enemy blade slashes out in reprisal and creases your thigh. \n\t\t\t*set resistance -4\n\t\t\t*set character_condition -1\n\t\t\t*if character_condition \u003c0\n\t\t\t\t*line_break\n\t\t\t\t*line_break\n\t\t\t\tThe world goes dark as your many wounds catch up with you.\n\t\t\t\t*goto fail\n\t\t\t*else\n\t\t\t\t*goto hand_to_hand_3\n\t\t#My Sergeant can handle himself. Heck, I pity the poor Officer.\n\t\t\tYou turn to find another threat. Behind you a distinctly Japanese and final scream rise up from behind as Baker earns his pay.\n\t\t\t*set resistance -2\n\t\t\t*goto hand_to_hand_3\n\t\t#Snap shot!\n\t\t\t*if character =1\n\t\t\t\tYou slam a pistol round into the Officer's side. Baker, not one to miss an opportunity, dispatches the staggered foe.\n\t\t\t\t*set resistance -4\n\t\t\t\t*goto hand_to_hand_3\n\t\t\t*if weapon =0\n\t\t\t\tYour BAR slams rounds and strikes friend and foe alike.\n\t\t\t\t*set casualties +1\n\t\t\t\t*set baker 1\n\t\t\t\t*set resistance -2\n\t\t\t\t*goto hand_to_hand_3\n\t\t\t*if weapon =1\n\t\t\t\tYour Thompson fires a burst that catches friend and foe alike.\n\t\t\t\t*set casualties +1\n\t\t\t\t*set resistance -3\n\t\t\t\t*set baker 1\n\t\t\t\t*goto hand_to_hand_3\n\t\t\t*if weapon =2\n\t\t\t\tYou slam a single rifle round into the Japanese officer and he goes down. \n\t\n\t\t\t\tBaker tosses you a fierce grin then flicks the blood from his K-Bar's blade before he moves on to the next foe. \n\t\t\t\t*set resistance -4\n\t\t\t\t*goto hand_to_hand_3\n\t\t\t*if weapon =3\n\t\t\t\tYour flamethrower roars into the melee like an angry dragon. The enemy officer is engulfed, but the spray also splatters back onto Baker before you hurriedly shut off the ignitor.\n\t\t\t\t*set resistance -4\n\t\t\t\t*set casualties +1\n\t\t\t\t*set baker 1\n\t\t\t\t*goto hand_to_hand_3\n\t\t\t*else\n\t\t\t\tYou slam a pistol round into the Officer's side. Baker, not one to miss an opportunity, dispatches the staggered foe.\n\t\t\t\t*set resistance -2\n\t\t\t\t*goto hand_to_hand_3\n\n*label hand_to_hand_3\n\n*set var_a 0\nWith knife and pistol in either hand, you square off against the most stalwart foe; \n*goto hand_to_hand_4\n\n*label hand_to_hand_4\n*if resistance >40\n\ta braided Major who utterly refuses to retreat.\n\t*goto hand_to_hand_5\n*if ishiro =2\n\tIshiro himself.\n\t*goto hand_to_hand_5\n*if resistance >40\n\ta braided Major who utterly refuses to retreat.\n\t*goto hand_to_hand_5\n*if resistance >30\n\ta whip-thin Captain who utterly refuses to retreat\n\t*goto hand_to_hand_5\n*if resistance >20\n\ta stern faced Lieutenant who stalks toward you.\n\t*goto hand_to_hand_5\n*else\n\ta grizzled Sergeant who pauses to take up his officer's sword.\n\t*goto hand_to_hand_5\n\n*label hand_to_hand_5\n*line_break\n*line_break\n*if exhaustion =0\n\tAll around this little patch of jungle, Marine and enemy battle with frantic vigor.\n*if exhaustion =1\n\tThis fight just goes on and on.\n*if exhaustion =2\n\tThe enemy's rain of blows proves as unceasing as your own. \n*if exhaustion =3\n\tExhaustion drips down. Every blow is like swinging in deep water.\n*if exhaustion =4\n\tYou can hardly catch your breath.\n*if exhaustion >4\n\tIt seems like this battle will never end.\n*if resistance \u003c11\n\t*if situation =1\n\t\tThe once fierce enemy has been reduced to a paltry few who scatter before you.\n\t\t*goto victory!\n\t*if battle =1\n\t\tThe once fierce enemy has been reduced to a paltry few who scatter before you.\n\t\t*goto victory!\n\t*else\n\t\tThe enemy, outnumbered and outfought, retreats into the jungle.\n\t\t*goto post_banzai\n*line_break\n*line_break\n*if ishiro !=2\n\tThe foe brings his blade up. Blood flicks free with an idle swipe of steel.\n*if ishiro =2\n\tIshiro grips his bloodied blade in both hands, grimly determined to do his duty.\n\t*line_break\n\t*line_break\n*if character_condition \u003c2\n\tYour wounds seem to be filled with fresh salt as you reel back in agony.\t\n*if character_condition \u003c1\n\tThe world is growing dark around you.\n*if exhaustion >4\n\tYour breath comes hard.\n*if exhaustion >6\n\tAnd it is an effort to merely raise your arms.\n*if exhaustion >9\n\tExhausted, you stagger and fall.\n\t*goto fail\n\n*choice\n\t#Shoot him!\n\t\t*if var_a =2\n\t\t\t*set var_a 0\n\t\tYou take aim but the foe slashes first. Fresh blood courses down your arm. \n\t\t*set resistance -3\n\t\t*set exhaustion +1\n\t\t*set character_condition -1\n\t\t*if character_condition \u003c0\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\tThe world turns dark as you bring your weapon up. Your wounds ache with agony as the ground rushes up to meet you.\n\t\t\t*goto fail \n\t\t*else\n\t\t\t*goto hand_to_hand_5\n\t#Stab!\n\t\t*if var_a =2\n\t\t\t*set var_a 0\n\t\tYou exchange blows and blood.\n\t\t*set resistance -4\n\t\t*set exhaustion +1\n\t\t*set character_condition -1\n\t\t*if character_condition \u003c0\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\tYour heart thuds distantly as the world turns dark. Your wounds ache with a distant agony as the ground rushes up to meet you.\n\t\t\t*goto fail\n\t\t*else\n\t\t\t*goto hand_to_hand_5\t\t\n\t#Parry\n\t\t*if var_a =2\n\t\t\t*set var_a 0\n\t\tYou block and drop back.\n\t\t*if ishiro =2\n\t\t\tIshiro keeps pressing.\n\t\t*if ishiro !=2\n\t\t\tThe enemy keeps pressing.\n\t\t*set resistance -2\n\t\t*set exhaustion +1\n\t\t*goto hand_to_hand_5\n\t*if character =0\n\t\t*if var_a =0\n\t\t\t#Counter...\n\t\t\t\tYou divert the next attack and slash in the wake of the blade to draw enemy blood.\n\t\t\t\t*set resistance -4\n\t\t\t\t*set exhaustion +1\n\t\t\t\t*set var_a 2\n\t\t\t\t*goto hand_to_hand_5\n\t*if character =1\n\t\t*if var_a =0\n\t\t\t#Snap shot!\n\t\t\t\t*if logistics >0\n\t\t\t\t\tYou fire from the hip and hit meat.\n\t\t\t\t\t*set resistance -4\n\t\t\t\t\t*set logistics -1\n\t\t\t\t\t*goto hand_to_hand_5\n\t\t\t\t*else\n\t\t\t\t\tClack. Pistol, empty. \n\n\t\t\t\t\tYour enemy slashes and leaves you bloodied.\n\t\t\t\t\t*set resistance -2\n\t\t\t\t\t*set var_a 1\n\t\t\t\t\t*set character_condition -1\n\t\t\t\t\t*if character_condition \u003c0\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\tYour heart thuds distantly as the world turns dark. Your wounds ache with a distant agony as the ground rushes up to meet you.\n\t\t\t\t\t\t*goto fail\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto hand_to_hand_5\n\n*label defensive_firefight_beach\n\n*set var_a 0\nYour men dig in like hedgehogs as incoming enemy mortar rounds crump from sea to shore. Sprays of sand and shale soar skyward as they fall closer and closer.\n\nThe ground lurches beneath you, but stunningly not a one of your men cries out from the onslaught. Not even a groan or cough or that terrible rattling final breath.\n\n\"Just like Dunkirk!\" Baker shouts over to you with uncharacteristic glee as the whump of Japanese mortar rounds signal more incoming fire. \"The sand! Its taking a beating so we don't have to!\"\n*choice\n\t#The mortars are detonating deep inside the beach.\n\t\t*goto defensive_firefight_beach_1\n\t#Dunkirk? He wasn't there.\n\t\t*goto defensive_firefight_beach_1\n\t#Well, alright then.\n\t\t*goto defensive_firefight_beach_1\n\n*label defensive_firefight_beach_1\nYour Old Breed Sergeant grasps up a fistful of the beach and shoves it into a pocket as another impotent volley crashes down. A crazy moment, but then again sanity seems optional just now.\n\nThen, silence. You know what that means.\n\n*set time 0\n*goto last_firefight\n\n*label last_firefight\n*if time =0\n\tDark figures gather at the jungle's edge.\n\t*line_break\n\t*line_break\n*if time =1\n\tThe enemy spread out into an arc that conforms to your mule-shoe formation.\n\t*line_break\n\t*line_break\n*if mortar =1\n\t*if merrik =0\n\t\t*if time =0\n\t\t\tThe company trench mortar barks out as Private Merrik feeds in round after round. The blasts rock the enemy back as 'Old Misery' at last puts a shoulder to the task.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*set resistance -4\n\t\t*if time =1\n\t\t\tMerrik feeds in a final mortar round and shouts \"Rounds Complete!\" Without pause he takes up his rifle before the echo of the raucous blasts fade.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*set resistance -3\n\t*if merrik >0\n\t\t*if time =0\n\t\t\tThis would be the perfect time for the company trench mortar to range in and blast the enemy back. But 'Old Misery' had to be left behind without Private Merrik to carry its bulk.\n\t\t\t*line_break\n\t\t\t*line_break\n*if time =1\n\tGunfire lashes back and forth.\n*if time =2\n\tFigures appear on the cliffs above.\n*if time =3\n\tRifle fire flicks down at your exposed men.\n*if logistics \u003c2\n\t*if var_a =0\n\t\tYour men slap in their last clips.\n\t\t*set var_a 1\n*line_break\n*line_break\n*if time =3\n\t*if schley =0\n\t\tA belch and thunder rumbles from the sea as the Schley opens fire on the jungle to your front. The shells quiver your bones as they pass overhead. The tang of cordite fills the air.\n\n\t\tAnd the Japanese get it worse.\n\t\t*set resistance -3\n\t*if schley =1\n\t\tThe crack of a solitary naval gun roils over the sea behind you. Still smoldering amidships, the Schley's guns belch forth a second round.\n\t\t*set resistance -1\n*if time =4\n\tMore foes gather at the crest of the cliffs.\n*if time =5\n\tA chew of machine gun fire joins in as the Coxswains on the landing-craft open fire with their co-axial guns and rake the enemy positions on the cliffs with helpful lead.\n\t*set resistance -3\n*if time =6\n\t*if schley =0\n\t\tThe Schley opens fire on the enemy again with the same tooth quivering volley.\n\t\t*set resistance -3\n\t*if schley =1\n\t\tThe Schley opens fire again with twin pops of its guns.\n\t\t*set resistance -1\n*if casualties >6\n\t*line_break\n\t*line_break\n\tWhite sands run red with the blood of your Marines. The enemy, invigorated by the sight, pours out of the jungle.\n\t*goto hand_to_hand\n*if time >6\n\t*line_break\n\t*line_break\n\tLike the proverbial cavalry, the landing boats crash through the reef to surge through the surf and onto shore. Their machine guns blaze away at the Japanese with irrepressible suppressive fire.\n\t*goto meet_the_boats\n*if resistance \u003c6\n\t*line_break\n\t*line_break\n\tYour men keep up their fire. The enemy, outnumbered, retreats.\n\t*goto meet_the_boats\n*set time +1\n*choice\n\t#\"Open fire!\"\n\t\t*if logistics >2\n\t\t\tMarine fire keeps the enemy pinned down.\n\t\t\t*set logistics -1\n\t\t\t*set resistance -4\n\t\t\t*goto last_firefight\n\t\t*if logistics =2\n\t\t\tYour men rake the cliffs with fire.\n\t\t\t*set logistics -1\n\t\t\t*set resistance -4\n\t\t\t*goto last_firefight\n\t\t*if logistics =1\n\t\t\tYour men releasea hail of rounds that chews up the enemy and the jungle.\n\t\t\t*set logistics -1\n\t\t\t*set resistance -4\n\t\t\t*goto last_firefight\n\t\t*else\n\t\t\tYour Marines curse as they fire off their last rounds. A Japanese battle-cry erupts from the jungle and the enemy pours out with bayonets fixed.\n\t\t\t*set resistance -4\t\t\n\t\t\t*goto hand_to_hand\t\t\t\t\n\t#\"Hold fire!\"\n\t\t*if time \u003c2\n\t\t\tYour men grit their teeth as the Japanese fire lashes out.\n\t\t\t*goto last_firefight\n\t\t*if time =2\n\t\t\tEnemy rounds flick overhead and greet the sea.\n\t\t\t*goto last_firefight\n\t\t*if time =3\n\t\t\tA scream rips out as an enemy round finds Marine flesh.\n\t\t\t*set casualties +1\n\t\t\t*goto last_firefight\n\t\t*if time =4\n\t\t\tMore rounds. Another cry from your ranks.\n\t\t\t*set casualties +1\n\t\t\t*goto last_firefight\n\t\t*if time =5\n\t\t\tThe Japanese keep firing. Another Marine cries out.\n\t\t\t*set casualties +1\n\t\t\t*goto last_firefight\n\t\t*else\n\t\t\tEnemy rounds flick overhead and greet the sea.\n\t\t\t*goto last_firefight\n\t#\"Charge!\"\n\t\tThe Japanese meet your charge with their own.\n\t\t*goto hand_to_hand \n\n*label post_banzai\n\n*page_break\nNearly all of the Japanese have fallen or fled.\n*if casualties >8\n\t*line_break\n\t*line_break\n\tYou are the last Marine left standing.\n\t*line_break\n\t*line_break\n*if ishiro =2\n\tIshiro, awash in blood, kneels down amid the jungle. \n\n\t\"Please,\" he asks as he absently grips his samurai blade in blood slicked fingers. \"I would rather die here, now, by the hand of an honorable enemy than linger on in shame.\"\n\n\tHe reverses the blade, lays it atop his belly but can't summon the strength to push it through.\n\t*choice\n\t\t#\"As you wish.\"\n\t\t\tHe's an enemy, he's armed, and the Eureka boats are waiting.\n\t\t\t*set ishiro 4\n\t\t\t*goto meet_the_boats\n\t\t#\"Your wants have nothing to do with it. Good-bye.\"\n\t\t\tHe's an enemy, but he's in no condition to defend himself. The Eureka boats are waiting to take you away.\n\t\t\t*goto meet_the_boats\n\t\t#\"You are now my prisoner.\"\n\t\t\t\"No!\" Ishiro cries out and finally finds the strength to stab deep. A wound like that... there is not enough medicine in the world. \n\n\t\t\tThe boats are waiting to take you away.\n\t\t\t*goto meet_the_boats\t\t\t\n\t\t*if character =2 \n\t\t\t#\"It appears you shall have to endure the unendurable.\" \n\t\t\t\tIshiro looks up, thoughts distant and deep as his blade clatters onto the beach.\n\n\t\t\t\tIn the distance you hear the motorized cough of the Eureka boats.\n\t\t\t\t*set ishiro 1\n\t\t\t\t*goto meet_the_boats\n*else\n\t*goto meet_the_boats\n\n*label meet_the_boats\n*if situation =1\t\n\t*goto victory!\n*if battle =1\n\t*goto victory!\n*line_break\n*line_break\nYour Marines wade out to meet the boats. One by one they pile in.\n\n*if ishiro =3\n\tSimmons cries out. You look over to find the Private with a hand plastered to a freshly bloody brow. Ishiro is on a dead run for the jungle, a fistful of rock in hand.\n\t*choice\n\t\t#Shoot to kill.\n\t\t\tYou give the order to open fire. Ishiro is no longer a prisoner, and he's technically armed.\n\n\t\t\tHe also doesn't make it to cover.\n\t\t\t*set ishiro 2\n\t\t\t*goto finale\n\t\t#Fire a warning shot.\n\t\t\t*if weapon =2\n\t\t\t\tThe round ricochets off a nearby rock and smacks into Ishiro's leg. He stumbles, tumbles, and falls. Baker drags the wounded officer back to the landing craft. Only then do you give the order to motor back to the waiting Schley.\n\t\t\t\t*goto finale \n\t\t\t*if weapon =1\n\t\t\t\tYou fire a burst into the air. Ishiro throws himself into the sand and remains there until Baker arrives to escort him back. Incoming mortar rounds begin to rain down once more as your Sergeant tosses him into the boat.\n\n\t\t\t\tYou give the order and leave the hostile island behind.\n\t\t\t\t*goto finale\n\t\t\t*if weapon =0\n\t\t\t\tBy the time you level your BAR, Ishiro has already made it into the jungle. A parting burst is all you can offer.\n\n\t\t\t\t*if character =0\n\t\t\t\t\tIt could take days to find Ishiro in the jungle. No point. Time to go before the Japanese send over a wave of planes or two. You give the order and leave this hostile island behind. \n\t\t\t\t*if character =1\n\t\t\t\t\tNo one wants to go back in and find Ishiro, not with the Japanese already on alert. All it would take is a few planes and the Schley, your ride home, is sunk. You give the order and leave this hostile island behind.\n\t\t\t\t*if character =2\n\t\t\t\t\tIt could take days to find Ishiro in the jungle and that would be a gross violation of raider doctrine. Japanese bombers could arrive soon and in great numbers. You give the order and leave this hostile island behind.\n\t\t\t\t*line_break\n\t\t\t\t*line_break\t\n\t\t\t\t*set ishiro 2\n\t\t\t\t*goto finale\n\t\t\t*if weapon =3\n\t\t\t\tA final sputter from your propellant does no more than smoke the air and set fire to the beach. Ishiro flashes back a crude gesture before he races off into the Jungle.\n\t\t\t\t*if character =0\n\t\t\t\t\tIt could take days to find Ishiro in the jungle. No point. Time to go before the Japanese send over a wave of planes or two. You give the order and leave this hostile island behind. \n\t\t\t\t*if character =1\n\t\t\t\t\tNo one wants to go back in and find Ishiro, not with the Japanese already on alert. All it would take is a few planes and the Schley, your ride home, is sunk. You give the order and leave this hostile island behind.\n\t\t\t\t*if character =2\n\t\t\t\t\tIt could take days to find Ishiro in the jungle and that would be a gross violation of Raider doctrine. Japanese bombers could arrive soon and in great numbers. You give the order and leave this hostile island behind.\n\t\t\t\t*set ishiro 2\n\t\t\t\t*goto finale\n\t\t\t*else\n\t\t\t\tA single round proves to be no deterrence at all. Ishiro disappears right into the jungle.\n\t\t\t\t*if character =0\n\t\t\t\t\tIt could take days to find him. And in the meantime, Japan's navy could send over a wave of planes or two. You give the order and leave this hostile island behind. \n\t\t\t\t*if character =1\n\t\t\t\t\tNo one wants to go back in and find him, not with the Japanese already on alert. All it would take is a few planes and the Schley, your ride home, is sunk. You give the order and leave this hostile island behind.\n\t\t\t\t*if character =2\n\t\t\t\t\tIt could take days to find him in the jungle and that would be a gross violation of Raider doctrine. Japanese bombers could arrive soon and in great numbers. You give the order and leave this hostile island behind.\n\t\t\t\t*set ishiro 2\n\t\t\t\t*goto finale\n\t\t#Let him go\n\t\t\tThere is no point bothering with a pursuit.\n\t\t\t*if character =0\n\t\t\t\tIt could take days to find Ishiro in the jungle. Meanwhile the Japanese Navy could send over a wave of planes or two. You give the order and leave this hostile island behind. \n\t\t\t*if character =1\n\t\t\t\tNo one wants to go back in and find Ishiro, not with the Japanese already on alert. All it would take is a few planes and the Schley, your ride home, is sunk. You give the order and leave this hostile island behind.\n\t\t\t*if character =2\n\t\t\t\tIt could take days to find Ishiro in the jungle and that would be a gross violation of Raider doctrine. Japanese bombers could arrive soon and in great numbers. You give the order and leave this hostile island behind.\n\t\t\t*set ishiro 2\n\t\t\t*goto finale\n*if ishiro =1\n\tYour prize prisoner gazes back toward the island. \"What a shame this will be,\" Ishiro mutters under his breath as he is led to the waiting boat.\n\n\tThe last Marine boot, yours, lifts from the sand. The landing craft swiftly motors your Raiders back toward the Schley.\n\t*goto finale\t\n*if ishiro =2\n\tThe last Marine boot, yours, lifts from the sand. Then you catch sight of a familiar figure at jungle's edge.\n\n\tIshiro stares across the pounding surf at your squad. He snaps off a formal salute and then withdraws from sight.\n\t*goto finale\n*else\n\tThe last Marine boot, yours, lifts from the sand. The landing boat motors your Raiders toward the safety of the Schley.\n\t*goto finale\n\n*comment start here. A choice for talking with the men. Possibly raise morale?\n\n*label finish_this\n\nYou can't leave the Japanese behind to rebuild. This whole mission is supposed to knock the observation base out, regardless of how many of the enemy there are. Twenty, sixty, it doesn't matter. You've got to carry on.\n\nGetting your men to understand that may take a little doing.\n*set var_a 0\n*if landry >0\n\t*set var_a +1\n*if gerhard >0\n\t*set var_a +1\n*if merrik >0\n\t*set var_a +1\n\n*choice\n\t#\"Men, the enemies is here. So are we.\"\n\t\tIt is a simple appeal. To defeat the enemy, you have to find them first. And now you've done that.\n\t\t*goto finish_this_1\n\t*if character =0\n\t\t#\"Grab your rucks and rifles. This mission's not over yet.\"\n\t\t\tThey know how to take orders. They trust you to know how to give them. The mission isn't over until you say so.\n\t\t\t*goto finish_this_1\n\t*if character =1\n\t\t#\"There is another base here. Intact. We have to take it out.\"\n\t\t\tThey didn't sign up to avenge half of Pearl Harbor. They want to see this through just as much as you.\n\t\t\t*goto finish_this_1\n\t*if character =2\n\t\t#\"If we leave now, other Marines will have to clean up this mess.\"\n\t\t\tMarines don't shirk their responsibilities. Let someone else do that. Here, now, on this island, this is what they have trained for.\n\t\t\t*goto finish_this_1\n\t*if var_a >2\n\t\t#\"After all we've been through, to leave now would be a betrayal of honor.\"\n\t\t\t*set var_a 4\n\t\t\tGood blood has been shed to come this far. To leave now is unthinkable.\n\t\t\t*goto finish_this_1\n\t*if var_a =2\n\t\t#\"Others have already paid a price to come this far. Let's honor that by seeing things through.\"\n\t\t\t*set var_a 4\n\t\t\tGood blood has been shed to come this far. To leave now is unthinkable.\n\t\t\t*goto finish_this_1\n\t*if var_a =1\n\t\t#\"We have bled to come this far. Let's honor that by seeing things through.\"\n\t\t\t*set var_a 4\n\t\t\tGood blood has been shed to come this far. To leave now is unthinkable.\n\t\t\t*goto finish_this_1\n\t*if var_a =0\n\t\t#\"We've been lucky so far. Let's stretch it a bit further.\"\n\t\t\tLuck belongs to those who are prepared to seize it. Otherwise it's just a meaningless roll of the dice.\n\t\t\t*goto finish_this_1\n\n*label finish_this_1\n\n\"Well, LT, Marines always try for at least second base. Right?\" Private Scott offers. It is a horrible pun that draws a myriad of chuckles from the platoon and even a grin from Baker. \n*set morale +1\n\nHitting the Japanese hard and fast might work. Unprepared soldiers don't fight well and if you move quickly enough, you could retain the upper hand. If you're quick enough. \n\nHowever, an ambush along their probable line of approach would no doubt cause them a lot of casualties. Maybe enough to let you take the base without a fight. But lying in wait would also mean the Japanese will be gathered up and somewhat ready for a fight. \n\nDigging in here will provide your platoon with plenty of cover. They'll also be well rested when the time comes. Heck, maybe you can even use that anti-aircraft gun as well. All of those advantages come at a hefty price though; allowing the enemy to choose the time and place of the engagement.\n\n*choice\n\t#Attack their second base before they have time to regroup.\n\t\tYou give the order and lead your men back into the jungle.\n\t\t*goto 2nd_base\n\t#Ambush the enemy along the primitive road.\n\t\tYou give the order and lead your men into the hacked jungle.\n\n\t\tYou hear private Scott whisper down the column. \"This, this is how we do it.\"\n\n\t\tTo which Sergeant Baker replies. \"Yes, and shut up.\"\n\t\t*set morale +1\n\t\t*goto road_ambush\n\t#Fortify the beach base.\n\t\tYou give the order and your men start digging in.\n\t\t*goto defend_beach_base\n\t*if var_a =0\n\t\t#On second thought, the best option is to leave before we suffer casualties.\n\t\t\tWith a sigh, you give the order and lead them back the way you came.\n\t\t\t*set battle 0\n\t\t\t*goto withdrawal\t\t\t\n\t*if var_a >0\n\t\t*if var_a \u003c4\n\t\t\t#On second thought, we'd better withdraw before we take more casualties.\n\t\t\t\tWith a sigh, you give the order and lead them back the way you came.\n\t\t\t\t*set battle 0\n\t\t\t\t*goto withdrawal\n\t*if var_a =4\n\t\t#No, it is time for discretion.\n\t\t\tWith a sigh, you give the order and lead them back the way you came.\n\t\t\t*set battle 0\n\t\t\t*set morale -2\n\t\t\t*goto withdrawal\n\n*comment Start here.\n\n*label 2nd_base\n\nThe jungle is not your friend but right now its more of a disliked cousin than anything else; an understandable annoyance that has merely come to visit for a while. Given that your men have suffered one push through the undergrowth, what does a little more of the same matter?\n\n*if gerhard =1\n\tEven wounded, Gerhard manages to keep up. Still, his bandages grow steadily darker.\n\t*line_break\n\t*line_break\nDown the column you hear private Scott whisper. \"Hit them first? Now that's how we do it!\"\n\nTo which Sergeant Baker replies. \"Yes, and shut up.\"\n\n*page_break\n*if casualties =0\n\t*goto injury?\n*else\n\t*goto 2nd_base_2\n\n*label 2nd_base_2\n*set situation 0\nAt last the trees thin out. A hundred yards ahead you sight a shape that has no business being in the jungle; the sharp edged corner of a hut set beneath the jungle canopy.\n\nYou wiggle forward on your belly and take a good look. The enemy base is a tight little affair. Two large barracks hold dozens of hammocks that swing in the slight breeze while a boxy machine shop is sandwiched between them. A battered airframe of a float-plane juts out of there, a radial engine in pieces at the fore. \n\nA mess tent filled with low tables and no chairs takes up one side while at the edge of the other are sited no fewer than four latrines. Every portion of the base lies beneath a canopy of camouflage netting, utterly hidden except by ground approach.\n*goto 2nd_base_setup\n\n*label 2nd_base_setup\n\n*set var_a 0\nFour machine gun pits and connecting trenches surround the place. North, south, east and west.\n*if time \u003c2\n\tThere are no Japanese in them. Instead the soldiers have their rifles idly slung as if your Marines hadn't sacked their bay-base just a little while ago. \n*if time \u003c6\n\t*if time >1\n\t\tThere is a heavy machine gun set near the wood tracks and it is crewed by a pair of soldiers. Thankfully the other three pits are still empty. You hear a sharp shout of Japanese as a Japanese officer leads a dozen enemy soldiers onto the parade ground. A light Lewis machine gun can be seen amongst them.\t\n*if time >5\n\tFour machine guns have likewise been positioned at those four corners, all crewed. Amid the parade ground dozens of Japanese soldiers sling their packs and rifles as they prepare to march. Several light Lewis machine guns are also in evidence amongst the marching group.\n*if time >7\n\tAt a single barked command, the column of enemy soldiers streams out the gate. \n*if time >9\n\tThat swiftly leaves only the four emplacement machine guns and crews behind.\n*goto 2nd_base_setup_1\n\n*label 2nd_base_setup_1\n\t\t\n*choice\n\t#Charge straight in.\n\t\t*if time \u003c2\n\t\t\tYour men, astonished by their good fortune at finding the enemy woefully unprepared, race forward. With just a few bursts your Marines finish off further resistance.\n\t\t\t*set resistance -7\n\t\t\t*goto in_the_base\n\t\t*if time \u003c=4\n\t\t\t*if morale >2\n\t\t\t\tYour men follow as you evade the single machine gun emplacement and wreck havoc on the tidy Japanese ranks.\n\t\t\t\t*set resistance -7\n\t\t\t\t*goto in_the_base\n\t\t\t*else\n\t\t\t\tYour men falter in their assault as an enemy machine gun pecks out a lethal rhythm.\n\t\t\t\t*set resistance -4\n\t\t\t\t*goto in_the_trench\n\t\t*else\n\t\t\t*if time \u003c10\n\t\t\t\tYour men charge, but there's just too many Japanese, soldiers and gunners both. Repulsed by the enemy's copious firepower, you are forced to withdraw.\n\t\t\t\t*set casualties +1\n\t\t\t\t*set resistance -2\n\t\t\t\t*goto withdrawal\n\t\t\t*else\n\t\t\t\tYour men take on the machine guns with a wild charge.\n\t\t\t\t*if morale >4\n\t\t\t\t\tPrivate Scott nails a gunner while Baker sprays another nest. Half the enemy's defense abruptly collapse and the rest scatters swiftly afterward.\n\t\t\t\t\t*set resistance -5\n\t\t\t\t\t*goto in_the_base\n\t\t\t\t*else\n\t\t\t\t\tThe enemy machine gun's woodpecker-like rhythm chews up the attack, and you, to pieces.\n\t\t\t\t\t*goto fail\n\t*hide_reuse #Fire and flank.\n\t\t*if firepower =2\n\t\t\tBaker coughs pointedly. The only two other Marines, Scott and Hagan exchange worried glances as the Sergeant explains, \"we don't have enough men for that.\"\n\t\t\t\t\n\t\t\t*set time +1\n\t\t\t*goto 2nd_base_setup_1\n\t\t*if firepower =1\n\t\t\tBaker coughs softly. \"Little difficult with just two teams, Lieutenant. But we'll manage.\"\n\n\t\t\t*if time \u003c2\n\t\t\t\tYour men, astonished by their good fortune at finding the enemy unprepared, rush forward. With just a few bursts your flankers seize control of the trench and lay a heavy converging fire into the base.\n\t\t\t\t*set resistance -7\n\t\t\t\t*goto in_the_trench\n\t\t\t*if time \u003c4\n\t\t\t\t*if morale >2\n\t\t\t\t\tYour men execute the flank attack flawlessly, seize control of the trench and proceed to lay down a heavy converging fire into the base.\n\t\t\t\t\t*set resistance -7\n\t\t\t\t\t*goto in_the_trench\n\t\t\t\t*else\n\t\t\t\t\tYour men barely reach the trench before the enemy's machine guns commence a lethal rhythm of suppressive fire. The attack has stalled.\n\t\t\t\t\t*set logistics -1\n\t\t\t\t\t*set resistance -4\n\t\t\t\t\t*goto in_the_trench\n\t\t\t*else\n\t\t\t\tYour single flanking fire team pushes hard but there's just too many of the enemy. Baker signals that he can't move forward. There is nothing to do but signal a retreat into the jungle.\t\t\n\t\t\t\t*set resistance -4\n\t\t\t\t*set logistics -1\n\t\t\t\t*goto withdrawal\n\t\t*else\n\t\t\t\"Should work, LT,\" Baker says.\n\n\t\t\t*if time \u003c2\n\t\t\t\tYour men, astonished by their good fortune at finding the enemy unprepared, attacks with gusto. After just a few bursts your Marines clear out the defenders.\n\t\t\t\t*set resistance -7\n\t\t\t\t*goto in_the_base\n\t\t\t*if time \u003c4 \n\t\t\t\t*if morale >1\n\t\t\t\t\tYour men flank and fire against the single machine gun emplacement and then wreck havoc on the tidy Japanese ranks.\n\t\t\t\t\t*set resistance -7\n\t\t\t\t\t*goto in_the_trench\n\t\t\t\t*else\n\t\t\t\t\tYour men falter as the enemy machine gun opens fire with a staccato rhythm. Forced to keep their heads down, your Marines wiggle forward relentlessly like they were back in boot-camp.\n\t\t\t\t\t*set logistics -1\n\t\t\t\t\t*set resistance -4\n\t\t\t\t\t*goto in_the_trench\n\t\t\t*else\n\t\t\t\t*if time \u003c10\n\t\t\t\t\tYour men fire and flank like the professionals they are but there's just too many enemies. For every foe that drops, another opens fire. The Japanese machine guns keep up a steady fire that sucks the momentum out of your Marines before they can reach the protection of the trench.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Tough it out, continue with the attack.\n\t\t\t\t\t\t\t*if morale >3\n\t\t\t\t\t\t\t\tYou signal for them to follow you. A rush forward reaches the protection of the trench as bullets twitter overhead.\n\t\t\t\t\t\t\t\t*set resistance -2\n\t\t\t\t\t\t\t\t*goto in_the_trench\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou signal for them to follow, but as you step forward a round finds your chest and the world tumbles into darkness.\n\t\t\t\t\t\t\t\t*goto fail\n\t\t\t\t\t\t#Withdraw.\n\t\t\t\t\t\t\tYou give the order and your men fade back into the jungle.\n\t\t\t\t\t\t\t*set resistance -2\n\t\t\t\t\t\t\t*goto withdrawal\n\t\t\t\t*else\n\t\t\t\t\tYour men take on the machine guns.\n\t\t\t\t\t*if morale >2\n\t\t\t\t\t\tPrivate Scott nails a gunner while Baker sprays another nest. Half of the enemy defenses abruptly collapse and your Marines make swift work of the rest.\n\t\t\t\t\t\t*set resistance -5\n\t\t\t\t\t\t*goto in_the_base\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe enemy's machine guns open fire as your Marines maneuver. Their deadly rhythm pecks the attack to pieces.\n\t\t\t\t\t\t*goto fail\n\t*if time \u003c10\n\t\t#Wait.\n\t\t\t*if var_a =1\n\t\t\t\tOnce more, you wait.\n\t\t\t*if var_a =0\n\t\t\t\tNever interrupt the enemy while they are making a mistake is an old maxim of war. The only question now is when to capitalize on that.\n\t\t\t\t*set var_a 1\n\t\t\t*choice\n\t\t\t\t#Wait until most of the Japanese have left the base.\n\t\t\t\t\t*if time \u003c2\n\t\t\t\t\t\tIt takes a little bit of forever for an officer to show up, let alone corral the garrison onto the parade ground. There is a dressing down of the ranks followed by a gear check. Only after an interminable wait does the freshly assembled column slog out and down the road.\n\n\t\t\t\t\t\tAnd in the interim four machine guns and their crews have taken up positions to guard the base.\n\t\t\t\t\t*if time >1\n\t\t\t\t\t\t*if time \u003c6\n\t\t\t\t\t\t\tIt takes a while for the rest of the Japanese to assemble on the parade ground. The officer dresses down the ranks and then orders a gear check. Only after all that is done does the freshly assembled column slog out and down the road.\n\n\t\t\t\t\t\t\tThree other machine guns and crews have taken up positions to guard the base.\n\t\t\t\t\t*if time >5\n\t\t\t\t\t\t*if time \u003c8\n\t\t\t\t\t\t\tIt takes a while, and a gear check, until the Japanese officer is satisfied with his men. He gives an order and they stream out of the camp.\n\n\t\t\t\t\t\t\tOnce they are gone, you review your tactical options afresh.\n\t\t\t\t\t*if time >7\n\t\t\t\t\t\tThe Japanese stream out of the gate at a regular pace. There's no rush for them, and none for you either. \n\n\t\t\t\t\t\tOnce they are gone, you review your tactical options afresh.\n\t\t\t\t\t*set time 10\n\t\t\t\t\t*goto 2nd_base_setup_1\n\t\t\t\t*if time >7\n\t\t\t\t\t#Wait until the column is gone.\n\t\t\t\t\t\tThe Japanese stream out of the gate at a regular pace. There's no rush for them, and none for you either. \n\n\t\t\t\t\t\tOnce they are gone, you review your tactical options afresh.\n\t\t\t\t\t\t*set time 10\n\t\t\t\t\t\t*goto 2nd_base_setup_1\n\t\t\t\t*if time >5\n\t\t\t\t\t*if time \u003c8\n\t\t\t\t\t\t#Wait until the column prepares to march.\n\t\t\t\t\t\t\tIt takes a full gear check, until the Japanese officer is satisfied with his men. He gives an order and they begin to march out of the camp.\n\t\t\t\t\t\t\t*set time 8\n\t\t\t\t\t\t\t*goto 2nd_base_setup_1\n\t\t\t\t*if time >1\n\t\t\t\t\t*if time \u003c6\n\t\t\t\t\t\t#Wait until the Japanese form up on the parade ground.\n\t\t\t\t\t\t\tMore and more of the enemy gather on the parade ground. The next thing the Japanese officer does is perform a full dressing of the ranks. Some things never change in the military.\n\t\t\t\t\t\t\t*set time 6\n\t\t\t\t\t\t\t*goto 2nd_base_setup_1\n\t\t\t\t*if time \u003c2\n\t\t\t\t\t#Wait for the Japanese to assemble.\n\t\t\t\t\t\tIt takes a little while for a Japanese officer to show up, let alone corral a portion of the garrison onto the parade ground. But soon enough, there they are.\n\t\t\t\t\t\t*set time 2\n\t\t\t\t\t\t*goto 2nd_base_setup_1\n\n*label in_the_base\n*page_break\nYour Marines have seized the jungle base.\n\nUp close the machine shop is a crude thing, like a plane that crashed into a small-town garage. The air-frame definitely belongs to a float-plane, with a singular float at center and a smaller twin set under the wings. Wait, two sets of wings? A bi-plane where you least expected it, making the frame that of an F1M 'Pete' reconnaissance craft. \n\nThe barracks too are lacking, a flop house arrangement of layered hammocks. Even the mess hall is an empty thing, with only a hint of tinned stock and a strong odor of fish. An errant storm could destroy much of this, as could a few earnest Marines.\n\n*choice\n\t#Prepare for the inevitable counter-attack. We've got minutes at most.\n\t\t*set battle 1\n\t\t*goto counter_attack\t\t\n\t#Plant charges, set fires, and then leave.\n\t\t*set battle 0\n\t\t*if logistics >1\n\t\t\tYou lay demo-cord in the machine-shop and set fire to everything else. A ten second fuse forces Sergeant Baker to run like the devil to get clear before things blow sky high.\n\t\t\t*set time +1\n\t\t\t*set commendation_6 1\n\t\t\t*goto return_to_beach\n\t\t*else\n\t\t\tNo one has any demo cord. Crap. There is enough av-gas to light a few fires but that's only half of things. You might be able to use your grenades to bring things down, but it'll take some time to do things right.\n\t\t\t*set time +1\n\t\t\t*choice\n\t\t\t\t#Stay and fight. Afterward you'll be able to complete the destruction.\n\t\t\t\t\t*set battle 1\n\t\t\t\t\t*goto counter_attack\n\t\t\t\t#Withdraw.\n\t\t\t\t\t*goto return_to_beach\t\t\t\t\n\t*if character =2\t\n\t\t#Salvage one of the Japanese machine guns for use against the counter-attack.\n\t\t\tYou step over to a very pretty type ninety-two machine gun. It is an aerial weapon found on all sorts of IJN planes. It is unusual to find it in a ground defending role, but then again this is a naval air base.\n\t\t\t*if morale >1\n\t\t\t\tYou steadily set the machine gun back to order, take care to fill the lube reservoir with oil so that the ammunition feed won't jam. A brief lesson in Japanese firearms then makes ${holben_rank} Holben a temporary expert.\n\t\t\t\t*set time +1\n\t\t\t\t*set logistics +1\n\t\t\t\t*set aa 1\n\t\t\t\t*set firepower 0\n\t\t\t\t*goto counter_attack\n\t\t\t*if morale \u003c2\n\t\t\t\tAfter only a brief test burst, the weapon jams and won't clear. If you had time to field strip it... but the enemy isn't going to wait for you to finish with that.\n\t\t\t\t*set time +1 \t\n\t\t\t\t*goto counter_attack\n\n*label in_the_trench\nThe firefight with the enemy rages back and forth. Your Marines pop up, spray bursts at the enemy who in turn fire off a few rounds before they too duck back under cover.\n*if character =0\n\tIts like fighting the Great War all over again.\n*if character =1\n\tLike gophers playing tennis.\n*if character =2\t\n\tLike playing handball with a painfully shy partner.\n\n*choice\n\t#Push on through.\n\t\tYour men push on with raw courage and a few judiciously lobbed grenades.\n\t\t*set time +1\n\t\t*set logistics -1\n\t\t*set resistance -2\n\t\t*goto in_the_base\n\t#This is taking too long, retreat.\n\t\tYou give the order and your men withdraw into the jungle.\n\t\t*set battle 0\n\t\t*goto withdrawal\n\n*label counter_attack\n\nYour men take up positions and reload. Thus braced, they settle in for the expected counter-attack. Yet strangely, the Japanese do not come. Your men stare into the jungle, straining to catch sight of the enemy. Yet, nothing comes. \n\nLong minutes pass\n\n*choice\n\t#The enemy is disorganized. Have the men smoke or eat while they can.\n\t\tYour Marines settle into the trenches. One member from a fire team takes a breather while the others watch and wait. \n\n\t\t*if eat =0\t\n\t\t\tOf course, there isn't much to eat except crackers. The pockets on your utilities just aren't made for carrying around more than that. But a little water, a little bite and chew of the hardtack followed by a hurried smoke, proves enough to settle twitchy nerves.\n\n\t\t\tThen, of course, the Japanese commence their attack.\n\t\t\t*goto at_last_they_come\n\t\t*if eat =1\n\t\t\tPrivate Scott breaks out a full K-ration he's rucked all the way into the jungle. This newly issued wonder is supposed to feed a man for an entire day and that will be enough for several to snack upon.\n\t\n\t\t\t\"Chopped ham and eggs are in the breakfast pack,\" Scott says with a chuckle as he taps the brown lettering of the first box he pulls out. It can't be bigger than a box of crackerjack. \"For dinner there's ham and cheese.\"\n\t\t\t*line_break\n\t\t\t*line_break\t\n\t\t\t*if landry =0\n\t\t\t\t\"And supper is pork with carrots and apples,\" Private Landry notes. \"The Washington Quartermaster must have it in for pigs.\"\n\t\t\t\t*line_break\n\t\t\t\t*line_break\n\t\t\t*if character =0\n\t\t\t\tLooks like a feast compared to some meals you've eaten.\n\t\t\t*if character =1\n\t\t\t\tWholly edible.\n\t\t\t*if character =2\n\t\t\t\tThey must be working through possible variations of these rations. In fact, comprehensive field tests are planned for next year. Down in Panama if your memory is accurate.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t\"Sure, Lt.\" Scott replies. \"What're you hungry for?\"\n\n\t\t\t*choice\n\t\t\t\t#\"Chopped ham and eggs sounds filling.\"\n\t\t\t\t\t\"That'd be my choice too, LT,\" Scott agrees and passes over the tin. There is a twist key to open it up and a little wooden spoon to go with it.\n\n\t\t\t\t\t\"They've really managed to fit a lot into that cracker-jack box,\" Baker puts in as you examine this marvel of modern engineering.\n\t\n\t\t\t\t\tIt doesn't take long to twist open the can and reveal the chopped ham and eggs. It doesn't look too bad, and tastes slightly better. But you are only half done when the Japanese inconsiderately begin their attack.\n\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"Pass me a cereal bar.\"\n\t\t\t\t\t\"Didn't know you like the granola, LT,\" Scott says, passes over the small brick of compressed cereal.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tIt is a solid meal and promises to sit in your stomach like nothing else. Except perhaps for whiskey.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tIt can't match cereal with milk and a strawberry on top. But out here a fancy breakfast is just a dream.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe bars promise to traveler a long ways. You had a chance to sample them while on Annapolis maneuvers.\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese rudely interrupt your reverie by commencing their attack.\n\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"I'll take coffee, even if it is the instant kind.\"\n\t\t\t\t\t\"Shame there's no way to heat it up,\" Scott says as he passes over the packet of instant Nescafe.\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tThere certainly is no chance to light a fire. At best you can leave it in the noon sun, but really that's just asking for trouble. With that in mind you dribble the grounds into your canteen.\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese commence their attack before you've taken more than a sip.\t\t\n\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThere is a lovely flavor that comes out from boiling it? You get the feeling you'll have grit in your teeth as you pour the grounds into your canteen.\n\n\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese commence their attack before you've taken more than a sip.\t\t\n\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Do you know who invented instant coffee? A chemist by the name of Satori Kato.\"\n\t\t\t\t\t\t\t\t*set morale +1\n\t\t\t\t\t\t\t\t\"He sounds...\" Scott notes in surprise at the Japanese sounding name.\n\n\t\t\t\t\t\t\t\tYou explain that Satori Kato worked in Chicago back at the turn of the century. That he'd figured out how to dehydrate it properly and presented his efforts to the public at the Pan-American World Exposition. You can recall the article on that rather vividly even now. Instant coffee might have caught on more if President McKinley hadn't been assassinated around that time.\n\n\t\t\t\t\t\t\t\t\"Sorry, what?\" Scott asks after you finish the last part of the tale.\n\n\t\t\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\t\tPrivate Landry nudges his fellow Marine ever so lightly. \"Satori didn't shoot the president.\"\n\n\t\t\t\t\t\t\t\t\t\"Oh,\" Scott says and straightens up in understanding. \"Sure.\"\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t\t\"Let's salute Satori Kato,\" Baker suggests and raises his packet up high to the sky. \"For helping keep United States Marines stay awake during the long hours of this war.\"\n\n\t\t\t\t\t\t\t\tIt is a hilarious salute given the situation, and so you men take up the call with many a grin as they pour the instant coffee grounds into their canteens.\n\n\t\t\t\t\t\t\t\tBut before you can more than sip the resultant mix, the Japanese commence their attack.\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t\t#Just pour the coffee into my canteen.\n\t\t\t\t\t\t\t\tCold coffee in the hot jungle. What a war.\n\n\t\t\t\t\t\t\t\tIt tastes horrible, of course, but thankfully the Japanese commence their attack before you've taken more than a sip.\t\t\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\n\t\t\t\t\t*else\n\t\t\t\t\t\tThe coffee tastes horrible, of course, but thankfully the Japanese commence their attack before you've taken more than a sip.\t\t\n\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"A plain cracker will do fine.\"\n\t\t\t\t\t\"We've got plenty of those,\" Scott notes and passes over a hard biscuit. \"They stuff at least eight in a box no matter if it is breakfast, dinner or supper.\"\n\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\"Crackers go with everything,\" Baker notes.\n\n\t\t\t\t\t\t\"Wish we had a little jam to go with them,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-ration next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\"Crackers are filing,\" Baker notes. \"Especially with a little jam.\"\n\n\t\t\t\t\t\t\"Wish they had jam in these rations,\" Scott replies.\n\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\tPrivate Landry leans over to Scott. \"If it is that important, swipe a tin of jam from a C-rations next time.\"\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\"Crackers are the building block of any meal,\" Baker notes. \"They say the Roman legions would march anywhere so long as they had bread.\"\n\n\t\t\t\t\t\tIt's a funny comment, especially since you told him about it.\n\t\t\n\t\t\t\t\t\t\"Wish there was jam,\" Scott says.\n\t\t\t\t\t\t\n\t\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\t\"If it is that important,\" Private Landry begins from his nearby position. \"then swipe a tin of jam from a C-rations pack next time.\"\t\n\t\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t\t*line_break\t\t\t\t\n\t\t\t\t\tPrivate Scott muses a little more on the subtle differences between raspberry and strawberry jams. Baker comments on cranberries. Simmons chips in on the differences between the bog grown sweet berry and the tart sort gotten from European trees. The Japanese contribute their commentary by commencing their attack.\n\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"How about a stick of gum?\"\n\t\t\t\t\t\"You sure, LT?\" Scott asks as he passes over a slim red pack of Dentyne chewing gum. \"It is just mint.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"I happen to like mint.\"\n\t\t\t\t\t\t\t\"Oh, uh, okay,\" Scott manages to say after an apparently harrowing thought.\n\n\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese interrupt things halfway through.\n\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\t#\"My stomach is the boss right now. What it wants, it gets.\"\n\t\t\t\t\t\t\t\t\"Sure, LT,\" Scott says. \"I get that way too, just not over mint gum.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese interrupt things halfway through.\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\t#\"I actually prefer Chiclets.\"\n\t\t\t\t\t\t\t\t\"None of those, LT,\" Scott says. \"Just as much mint gum as you could want, which for me isn't a lot.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese interrupt things halfway through.\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\t#\"The preferences of an officer are unfathomable.\"\n\t\t\t\t\t\t\t\t\"Okay, LT,\" Scott says. \"But I don't get how mint gum and sailing on a ship meet up.\"\n\n\t\t\t\t\t\t\t\tYour men give a chuckle and dig into their chow. Of course, the Japanese interrupt things halfway through.\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t#Chew my gum.\n\t\t\t\t\t\t\tIt's mint gum and it is good, especially out here a thousand miles and more from home.\n\n\t\t\t\t\t\t\tOf course, the Japanese swiftly interrupt that reverie with their attack.\n\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t#\"Nothing for now. You eat first.\"\n\t\t\t\t\t*if character =0\n\t\t\t\t\t\tOfficers can plan and command, but it is the enlisted ranks who fight, and die when the bullets start to fly. This meal could well be their last.\n\t\t\t\t\t*if character =1\n\t\t\t\t\t\tThe men come first. They have to because they are the ones who will fight, and perhaps die.\n\t\t\t\t\t*if character =2\n\t\t\t\t\t\tThe men must come first. A little hunger is nothing in comparison to a \tbullet and, besides, your stomach can always lean against your spine.\t\t\t\t\t\t\n\t\t\t\t\t*line_break\n\t\t\t\t\t*line_break\n\t\t\t\t\tOf course, the Japanese interrupt this collegial meal halfway through.\n\t\t\t\t\t*set morale +1\n\t\t\t\t\t*goto at_last_they_come\n\t\t*else\n\t\t\tPrivate Scott slings out a full J-ration he's totted in all the way from the beach and lays it all out. Thin cut, spiced and salted beef. Dried apricots. Dried peaches. Biscuits, of course. Roasted, salted peanuts. Raisins. Instant coffee. Lemon powder. Chewing gum. Fruit bars. Dried porridge. Hard candies. \n\n\t\t\tIt is almost like Christmas. No cocoa packets though.\n\t\t\t*if character =0\n\t\t\t\tThat's probably already in someone's canteen.\n\t\t\t*if character =1\n\t\t\t\tClearly someone has a sweet tooth.\n\t\t\t*if character =2\n\t\t\t\tMust be an oversight. You make a mental note to put that in your report.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\t*set morale +1\n\t\t\t*choice\n\t\t\t\t#\"Let's have a bit of the beef.\"\n\t\t\t\t\t\"That'd be my choice too, LT,\" Scott says and passes over the waxed box. \"Spiced and salted. Its like something you'd get in a fancy diner.\"\n\t\n\t\t\t\t\t*if landry =0\n\t\t\t\t\t\t\"Sure, if that diner is out in the desert,\" Landry chimes in.\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t*line_break\n\t\t\t\t\t\t*line_break\n\t\t\t\t\tA strip of the beef is laced with salt and pepper that all but dances with delight upon your tongue.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"Fine dining in the jungle.\"\n\t\t\t\t\t\t\t\"If you have to be in a Pacific jungle, at least you should be able to eat well,\" Baker notes. \"Wonder what they're chewing on in Britain?\"\n\n\t\t\t\t\t\t\tIt is a fair question, but one that must go unanswered because the Japanese inconsiderately commence their attack.\n\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t*if character =0\n\t\t\t\t\t\t\t#\"Tasty, is what I'd call it. Like good water buffalo.\"\n\t\t\t\t\t\t\t\t\"If you say so,\" Scott says. \"Would like to try it at least once.\"\n\n\t\t\t\t\t\t\t\tHopefully he'll have that opportunity. But right now, sliced beef will have to do. Or it would except for the fact that the Japanese have inconsiderately commenced their attack.\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t*if character =1\n\t\t\t\t\t\t\t#\"Good beef is where you find it.\"\n\t\t\t\t\t\t\t\t\"Ground beef,\" Scott replies and that draws a few grins.\n\n\t\t\t\t\t\t\t\tBut the Japanese must hate puns because they inconsiderately commence their attack.\n\t\t\t\t\t\t\t\t*goto at_last_they_come\n\t\t\t\t\t\t*if character =2\n\t\t\t\t\t\t\t#\"Salmon is better, fresh caught, of course.\"\n\t\t\t\t\t\t\t\t\"That would be good,\" Scott says. \"Bet there's some good fishing around here.\"\n\n\t\t\t\t\t\t\t\tIt is a fair question, but one that must go unanswered because the J
