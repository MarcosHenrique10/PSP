<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Marine Raider — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "marineraider", "title": "Marine Raider", "scenes": {"choicescript_description": "Lead a platoon of elite Marine Raiders! Battle an intractable enemy during WW2! Choose your battle-plan, select your personal weapon, and if need be fix bayonets. You'll wade ashore during a daring nighttime landing or plunge into frantic close-quarters fire-fights in this thrilling text-based game.\n\n[i]Marine Raider[/i] is a 45,000-word interactive novel by Allen Gies. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n", "choicescript_stats": "\n*temp current_firepower\n*if firepower =0\n\t*set current_firepower \"All three fire teams stand ready.\"\n\t*goto the_casualties\n*elseif firepower =1\n\t*set current_firepower \"Two fire teams are available.\" \n\t*goto the_casualties\n*elseif firepower =2\n\t*set current_firepower \"You are down to a single fire team.\"\n\t*goto the_casualties\n*else\n\t*goto the_casualties\n\n\n*label the_casualties\n*temp current_casualties\n*if casualties =1\n\t*set current_casualties \"A single Marine is down.\"\n\t*goto meta_clock\n*elseif casualties =2\n\t*set current_casualties \"Two Marines are down.\"\n\t*goto meta_clock\n*elseif casualties =3\n\t*set current_casualties \"Three Marines are down.\"\n\t*goto meta_clock\n*elseif casualties =4\n\t*set current_casualties \"Four Marines have suffered serious injury.\"\n\t*goto meta_clock\n*elseif casualties =5\n\t*set current_casualties \"Half your Marines are out of the fight.\"\n\t*goto meta_clock\n*elseif casualties =6\n\t*set current_casualties \"More than half of your Marines can't fight.\"\n\t*goto meta_clock\n*elseif casualties =7\n\t*set current_casualties \"The majority of your Marines are out of the battle.\"\n\t*goto meta_clock\n*elseif casualties =8\n\t*set current_casualties \"It is just you and Baker.\"\n\t*goto meta_clock\n*elseif casualties =9\n\t*set current_casualties \"You are the last Marine standing.\"\n\t*goto meta_clock\n*else\n\t*set current_casualties \"Zero.\"\n\t*goto meta_clock\n\n*label meta_clock\n*temp meta_time_text\n*if meta_time =0\n\t*set meta_time_text \"Pre-mission planning.\"\n\t*goto morale\n*elseif meta_time =1\n\t*set meta_time_text \"Pre-Dawn.\"\n\t*goto morale\n*elseif meta_time =2\n\t*set meta_time_text \"Morning.\"\n\t*goto morale\n*elseif meta_time =3\n\t*set meta_time_text \"Late Morning.\"\n\t*goto morale\n*elseif meta_time =4\n\t*set meta_time_text \"Afternoon.\"\n\t*goto morale\n*elseif meta_time =5\n\t*set meta_time_text \"Evening.\"\n\t*goto morale\n*else\n\t*set meta_time_text \"Post-mission debriefing.\"\n\t*goto morale\n\n*label morale\n*temp morale_text\n*if morale =10\n\t*set morale_text \"Your Marines have yet to see combat.\" \n\t*goto logistics\n*elseif morale \u003c0 \n\t*set morale_text \"Your Marines are a broken force.\"\n\t*goto logistics\n*elseif morale =0\n\t*set morale_text \"Your Marines are about to break.\"\n\t*goto logistics\n*elseif morale =1 \n\t*set morale_text \"Your Marines are wearied by events.\"\n\t*goto logistics\n*elseif morale =2\n\t*set morale_text \"Your Marines are quiet in their gripes.\"\n\t*goto logistics\n*elseif morale =3\n\t*set morale_text \"Your Marines are ready.\"\n\t*goto logistics\n*elseif morale =4\n\t*set morale_text \"Your Marines are enthused.\"\n\t*goto logistics\n*elseif morale =5\n\t*set morale_text \"Your Marines are energized.\"\n\t*goto logistics\n*elseif morale >5\n\t*set morale_text \"Your Marines feel like they could take on the world.\"\n\t*goto logistics\n\n*else\n\t*goto logistics\n\n\n*label logistics\n*temp logistics_text\n*if logistics =12\n\t*set logistics_text \"Your Marines have only fired practice rounds.\"\n\t*goto character_type\n*elseif logistics \u003c0 \n\t*set logistics_text \"Your Marines are down to harsh language and bayonets.\"\n\t*goto character_type\n*elseif logistics =0\n\t*set logistics_text \"Your Marines are down to last rounds.\"\n\t*goto character_type\t\n*elseif logistics =1\n\t*set logistics_text \"Your Marines have only a single bandolier of ammo.\"\n\t*goto character_type\n*elseif logistics =2\n\t*set logistics_text \"Your Marines have a bandolier and plenty of loose spares.\"\n\t*goto character_type\n*elseif logistics =3\n\t*set logistics_text \"Your Marines have plenty of ammo.\"\n\t*goto character_type\n*elseif logistics =4\n\t*set logistics_text \"Your Marines have lots of ammo.\"\n\t*goto character_type\n*elseif logistics =5\n\t*set logistics_text \"Your Marines have lots and lots of ammo.\"\n\t*goto character_type\n*elseif logistics >5\n\t*set logistics_text \"Your Marines gripe about the ammo cans they have to ruck.\"\n\t*goto character_type\n*else\n\t*goto character_type\n\n*label character_type\n*temp character_text\n*if character =0\n\t*set character_text \"Old Breed\"\n\t*goto character_health\n*elseif character =1\n\t*set character_text \"Hollywood Marine.\"\n\t*goto character_health\n*elseif character =2\n\t*set character_text \"Annapolis Graduate.\"\n\t*goto character_health\n*elseif character =3\n\t*set character_text \"Lieutenant.\"\n\t*goto character_health\n*else\n\t*goto character_health\n\n*label character_health\n*temp character_condition_text\n\n*if character_condition >2\n\t*set character_condition_text \"You are without a scratch.\"\n\t*goto gun\n*elseif character_condition =2\n\t*set character_condition_text \"You have a flesh wound.\"\n\t*goto gun\n*elseif character_condition =1\n\t*set character_condition_text \"Your breath comes hard.\"\n\t*goto gun\n*elseif character_condition =0\n\t*set character_condition_text \"You can barely stand.\"\n\t*goto gun\n*elseif character_condition \u003c0\n\t*set character_condition_text \"All is dark.\"\n\t*goto gun\n*else\n\t*goto gun\n\n*label gun\n*temp character_weapon_text\n*if weapon =0\n\t*set character_weapon_text \"Browning automatic rifle.\"\n\t*goto chart\n*elseif weapon =1\n\t*set character_weapon_text \"Thompson submachine gun.\"\n\t*goto chart\n*elseif weapon =2\n\t*set character_weapon_text \"M1 Rifle.\"\n\t*goto chart\n*elseif weapon =3\n\t*set character_weapon_text \"Flamethrower.\"\n\t*goto chart\n*elseif weapon =4\n\t*set character_weapon_text \"Sidearm.\"\n\t*goto chart\n*else\n\t*goto chart\n\n*label chart\n\nBackground: ${character_text}\n*line_break\nAmmo: ${logistics_text}\n*line_break\nMorale: ${morale_text}\n*line_break\nHealth: ${character_condition_text}\n*line_break\nWeapon: ${character_weapon_text}\n*line_break\nMission-Time: ${meta_time_text}\n*line_break\nCasualties: ${current_casualties}\n*line_break\nFire-Teams: ${current_firepower}\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Remove in-game advertisements and delay timers.\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  Remove in-game advertisements and delay timers.\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nMay fourth, nineteen forty-two. The Pacific Ocean froths with war. The Japanese have made immense gains following their infamous December sneak attack. The Philippines have fallen. Pearl Harbor is a graveyard of sunken ships. Australia faces the grim possibility of invasion.\n\nThe Empire of Japan seem unstoppable.\n\nBut America and her allies fight on.  President Roosevelt has dispatched ships, planes and Marines, such as yourself, to the idyllic South Pacific where the molten sun seems to perpetually linger above a sapphire blue sea. Sometimes, when you listen to the pounding surf and take a breather near the end of the day, it is hard to remember your goal: kick the enemy back to their home islands.\n\nThat will not be an easy task. Most of your men are green, some fresh out of boot with barely two weeks hard field drills here on Espirtu Santo. The army and navy have first call on almost all resources and modern Marine tactics are as of yet untried against the Japanese. It'll take everything you've got and then some to see your platoon through.\n\n*page_break\n*set character 0\n*set logistics 1\n*set morale 6\n*set weapon 0\n*set meta_time 2\n\n*script changeBackgroundColor(\"black\")\n\nThe jungle thins as you near the edge. Ahead the sparkle of white sands can be seen. The eastern shore, and the Japanese base you've been hunting, are just head.\n\nYou and Baker edge forward at a slow and steady crawl, catch sight of four rickety huts set above the mark of high tide. Each are crafted from local trees, seem to sway even in a gentle breeze. Two equally dubious latrines complete the occupied arc of a pristine white sand bay.\n\nA dozen foes are hard at work adding traverses to a series of trenches to form a \t\tperimeter around the camp. A single machine gun covers the northern arc. An \t\t\tanti-aircraft gun at center is manned and ready, the two soldiers there \t\t\tardently watching the eastern sky and sea.\n\t\t\nBaker catches your eye, mouths the obvious question.\n\n*fake_choice\n\t#\"We're going to charge straight in. They won't expect it.\"\n\t#\"Fire and maneuver should clear out the enemy.\"\n\t#\"We'd better call in a bombardment from the Schley.\"\n\t#\"Open fire! All weapons!\"\n\t#\"Follow me!\"\n*set logistics 2\n*set meta_time 4\n*set casualties 2\n*set firepower 1\n\n\n*script changeBackgroundColor(\"sepia\")\nA low whump rises out from the deep jungle. A moment later a sound like a freight train rumbles past. Something splashes into the surf, is followed by a thunder that sends a frothy white spray of sand and sea skyward. \n\nMortars. Enemy mortars. Big ones. Another whump. Then another. Too quick to be just one tube.\n\nThe jungle offers cover, but the beach below the cliff is where the boats will come.\n\n*fake_choice\n\t#Hide in the jungle until the landing boats arrive.\n\t#Go into the jungle, eliminate the spotters.\n\t#Dig in on the beach.\n\nend\n*ending", "startup": "*title Marine Raider\n*author Allen Gies\n*create gender \"lieutenant\"\n*create logistics 12\n*create morale 10\n*create time 0\n*create resistance 60\n*create character 3\n*create character_condition 3\n*create weapon 4\n*comment weapon bar =0, smg =1, Rifle =2, Flamethrower =3, pistol =4.\n*create mortar 0\n*create insert 0\n*create formation 0\n*create firepower 0\n*create commendation 0\n*comment start here. Change this to a status string \"alive\", \"dead\", Maybe with location or cause. Get it all ironed out.\n*create baker 0\n*create merrik 0\n*comment merrik =0 fine, =1 wounded but escorted back to beach (usually with Ransom), =2 sent back alone, he'll perish on beach. =3 Sent back to the beach, will recover in full.\n*create landry 0\n*create scott 0\n*create ransom 0\n*create exhaustion 0\n*create ishiro 0\n*comment ishiro =0 never met. =1 captured, =2 let go/escaped. =3 captured but left tied up, =4 helped him commit hari-kiri on the beach.\n*create ishiro_name 0\n*comment did you learn ishiro's name?\n*create ishiro_scar 0\n*comment if cut by ishiro's blade, you earn a cool scar.\n*create ishiro_sword 0\n*comment =0 nope =1 sword dropped by dead man, =2 taken after personal exchange. =3 taken from a captive.\n*create float 0\n*create gerhard 0\n*create hagan 0\n*create interrogation_count 0\n*create supply_submarine 0\n*create schley 0\n*create signal_intercept 0\n*comment signal_intercept indicates if the Schley will be attached. =0, no. =1, yes, =2, heavily.\n*create contact_schley 0\n*comment contact_schley =1 Morse code mirrors =2 Very Flare, =3 Radio.\n*create radio_parts 0\n*comment Did Hagan recover radio parts from the Japanese radio? Useful intel.\n*create casualties 0\n*create situation 0\n*create commendation_2 0\n*create commendation_3 0\n*create commendation_4 0\n*create commendation_5 0\n*comment commendation_5 =1 A lot of intel stuff. =2 Some intel stuff. Meh.\n*create commendation_6 0\n*create commendation_7 0\n*create commendation_8 0\n*create condemnation_1 0\n*comment a condemnation occurs here if the player leaves but has a degree of logistics and morale left. Not a hard fighter. May cost them their career.\n*create meta_time 0\n*create battle 0\n*create aa 0\n*create trench 0\n*create attention 0\n*create burning 0\n*create holben 0\n*create holben_rank \"Private\"\n*create eat 0\n*create die_roll 0\n*create var_a 0\n*create var_b 0\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n\t\t[i]Marine Raider[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\n\t\t*purchase adfree $4.99 purchased\n\t\t*page_break_advertisement\n\n*label purchased\n\n4th May, 1942. The Pacific Ocean froths with war. The Japanese have made immense gains following their infamous December sneak attack. The Philippines have fallen. Pearl Harbor is a graveyard of sunken ships. Australia faces the grim possibility of invasion.\n\nThe Empire of Japan seems unstoppable.\n\nBut America and her allies fight on. President Roosevelt has dispatched ships, planes and Marines, such as yourself, to the idyllic South Pacific where the molten sun lingers above a sapphire blue sea. Sometimes, when you listen to the pounding surf and take a breather near the end of the day, it is hard to remember your goal: kick the enemy back to their home islands.\n\nThat will not be an easy task. Most of your men are green, some fresh out of boot with barely two weeks hard field drills here on Espiritu Santo. The Army and Navy have first call on resources and modern Marine tactics are as of yet untried against the Japanese. It'll take everything you've got and then some to see your platoon through.\n\n*page_break\n\n\"Lieutenant! We've got trouble!\" An urgent voice calls out and sweeps away your musings. \n\nPrivate Scott, green utilities soiled from a day of field drills, lurches down the beach toward you while waving as if you could somehow miss him. Just twenty years old and he's still got the proverbial hayseeds in his hair. Never been out of Iowa before signing up, let alone seen the sea; and yet it is on his back and those like him that the U.S. Marine Corp is going to war.\n\n*choice\n\t#\"Spit it out Leather-neck.\"\n\t\tAs a member of the Old Breed, you clawed your way up through the ranks, endured hardships over a decade and more in fights from China to Cuba and don't have time for any crap.\n\t\t*set logistics 1\n\t\t*set morale 3\n\t\t*set character 0\n\t\t*goto gender\n\t#\"What's the problem, Scott?\"\n\t\tYou ask, still uncomfortable with the shine of your lieutenant's bars. \n\t\t\n\t\tJust six months ago you were a civilian but now, for a wonder, they expect you to lead men into battle. The only way you can conceive of doing that is as one of them, standing alongside your Marines through every challenge.\n\t\t*set logistics 2\n\t\t*set morale 2\n\t\t*set character 1 \n\t\t*goto gender\n\t#\"Calm yourself Private and summarize the situation.\"\n\t\tYou insist on clarity with a crisp Annapolis clip.\n\t\t\n\t\tThe Marine Corp, as with all branches of service, will have to adapt to the current war. The Naval Academy taught you how iron becomes steel but only the fire of combat will turn out the blade America requires. Strategy and tactics must be refined now so that lives will not be wasted in the battles ahead.\n\t\t*set logistics 3\n\t\t*set morale 1\n\t\t*set character 2\n\t\t*goto gender\n\n\n*label gender\n\n\"Well...\" Scott manages to gasp out.\n\n*choice\n\t#I'm a sir, of course.\n\t\t*set gender \"male\"\n\t\t\"... Sir, Major Carlson wants to see you right away. Something about a raid,\" Scott explains.\n\t\t*goto raid_planning\n\t#No need to get into details, I'm just a lieutenant.\n\t\t*set gender \"lieutenant\"\n\t\t\"... Lieutenant, it's...\" Scott catches sight of your beardless chin in the evening light. That you never have a five o'clock shadow has been a subject of much speculation amongst the platoon. \"Major Carlson wants to see you. There's talk of a raid.\"\n\t\t*goto raid_planning\t\n\t#He'd better call me Ma'am.\n\t\t*set gender \"female\"\n\t\t\"Ma'am.\" Scott steadies himself upon saying the word. \n\n\t\tIt is going to be a long while before women officers are fully accepted into the Marine ranks, no matter what miracles First Lady Roosevelt has engineered back in Washington. \n\t\t*if character =0\n\t\t\tBut at least you no longer have to hide your gender to serve your country.\n\t\t*if character =1\n\t\t\tBut you wanted to serve, and here you are.\n\t\t*if character =2\n\t\t\tAnd it has been a miracle, starting years ago and continuing on to this very day.\n\t\t*line_break\n\t\t*line_break\t\t\n\t\tScott continues on. \"Major Carlson's compliments. He requests your presence concerning the planning of a raid.\"\n\t\t*set morale +1\n\t\t*goto raid_planning\n\n*label raid_planning\n\nThe planning hut is half a tube of corrugated iron cut longways and packed with Marine officers in sweat heavy khaki uniforms. Most of them pour over maps while the rest pause to down pitch black coffee. A handful of enlisted men lean against the ribs of the interior and wait to called forward as messengers. \n\nIn the back a weary Marine specialist tries to tune a radio but gathers only static. The atmospherics must be bad again today. The South Pacific is hard on everything, corrodes wires and morale alike. Supposedly not as bad as the Aleutian command but still, not exactly California.\n\nMajor Carlson looks up at you, a message receipt in hand. As a member of the Old Breed, he's gone from private to officer while serving all over the world. Never quite as tired as he seems either, despite gray hair and dark circles that threaten to pool under somber eyes.\n\n*if character =0 \n\t\"We've got a hot one.\" Carlson says as he waves you over.\n*if character =1\n\t\"Front and center, Lieutenant.\" Carlson orders and holds up the message receipt.\n*if character =2\t\n\t\"Been expecting you, Lieutenant,\" the Major indicates and passes the message receipt over after you complete your crisp salute.\n*page_break\n*goto briefing\n\n*label briefing\n\nCarlson begins to pace, slow and steady. \"A mission has come down from CINPAC and in a flaming hurry. I need your raider platoon to get into the war right now. Word is, submarine reconnaissance out of Espiritu Santo has discovered a Japanese observation position ensconced on an eastern bay of the island of Toga. That's out in the Torres island chain, not far from here. You're going to hit that base. Hard.\"\n\n*choice\n\t#\"Just my men, sir?\"\n\t\t\"Unfortunately, yes,\" Carlson replies. \"Our logistics are limited given the lack of preparation.\"\n\t\t*goto briefing_1\n\t#\"How big of a stick are we swinging here?\"\n\t\t\"A nice bit of oak,\" Carlson replies. \"There will be some weight behind it.\"\n\t\t*goto briefing_1\n\t#Remain silent.\n\t\tCarlson will explain things. Of that much you are certain.\n\t\t*goto briefing_1\n\n*label briefing_1\n\nMarine Raider doctrine calls for small units to strike and withdraw before the Japanese can react and bring their sizable forces to bear. It is a theory that has not been tested yet. Indeed, most of the raider units are still enroute and those that aren't must already be slotted for a different mission. That leaves your men.\n\t\n\"Now, you won't have to swim the whole way. The Navy will be working together with us, in the harmonious spirit of Gung-ho I hope.\" Major Carlson gives a slight grin at the Chinese word before he settles back to his usual grim self, pauses to tap a charcoal sketch from a bygone era. \"Here is Toga island.\"\n\n*choice\n\t#\"Thousands of islands just like it.\"\n\t\t\"That's the nature of the Pacific,\" Carlson notes.\n\t\t*goto briefing_2\n\t#\"Is it the one that looks like a potato with a pair of nubs?\"\n\t\t\"That's the one,\" Carlson says.\n\t\t*goto briefing_2\n\t#\"I think I see it. Not a lot of jungle on it.\"\n\t\t\"That's good, and bad,\" Carlson notes.\n\t\t*goto briefing_2\n\n*label briefing_2\n\"Toga island is only a few miles across but with heavy jungle inland. There could be a few natives. Hopefully they and any civilians have already fled or hid. Now, the Japanese OP is sited on the eastern half but there are cliffs on the west from which they should be able to monitor ships sailing toward the Solomons; where, I might add, substantial Japanese activity has been reported.\" \n\nThe Major traces a nail across a thick swatch of beach to the east. \"The huts are just a little ways out from the jungle, set well back from the surf. Needless to say, a few machine guns there would make it deadly to a direct landing. At least without a bombardment, which you won't have. At center is believed to be a single anti-aircraft gun.\"\n\n*choice\n\t#\"Is that enough to ward off an air attack?\"\n\t\t\"I'd like to have a pair of Air-Cobras make short work of it,\" Carlson notes. \"But they can't spot it, so we can't hit it.\n\t\t*goto briefing_3\n\t#\"Could the AA gun be used as direct-fire?\"\n\t\t\"Can't hit much when surrounded by jungle,\" Carlson notes. \"But if they can see you, assume they will shoot.\n\t\t*goto briefing_3\n\t#\"Why would they build the huts out in the open?\"\n\t\t\"They'll probably camouflage them soon enough, but not yet,\" Carlson says. \"And even if they do, that only works on attacks from the air. \n\t\t*goto briefing_3\n\n*label briefing_3\nNow, G-2 figures the garrison to number twenty.\"\n\nTwenty is a very precise number. You exchange a glance with Carlson and he gives an understanding nod.\n\n\"The submarine commander counted the latrines and then those above your pay grade consulted an Imperial Japanese Army manual. Twenty soldiers would also be just enough for a continuous watch of the approaches to the Solomon islands. Now, the hitch; this base needs to be taken and taken out within three days. Understood?\"\n\n*choice\n\t#\"With transit time, it will be a rush job.\"\n\t\t*goto briefing_4\n\t#\"Yes, Sir.\"\n\t\t*goto briefing_4\n\t#\"Understood.\"\n\t\t*goto briefing_4\n\n*label briefing_4\nA familiar and unwanted sound nearby, of boot leather peeling back. You and Carlson turn to find Private Scott seated at the doorway. The Marine has busied himself with an full adjustment to his laces, which presently resemble spaghetti. The big galoot's rifle leans absently against the hut wall, just out of reach.\n\nCarlson looks back to you and leans forward to ask,\n*if character =0\n\t\"Are your men ready?\"\n*if character =1\n\t\"Will your men be ready before nightfall?\"\n*if character =2\n\t\"Is your platoon prepared to deploy?\"\t\n\n*choice\n\t#\"Sir, if they aren't then they'll answer to me!\"\n\t\t*set morale +2\n\t\t*goto method\n\t#\"I'll see to it personally that they are, Sir!\"\n\t\t*set logistics +1\n\t\t*set morale +1\n\t\t*goto method\n\t#\"Sir, I am certain they are already squared away.\"\n\t\t*set logistics +2\n\t\t*goto method\n\n*label method\n\n\"Glad to hear it.\" Major Carlson says. \"The speed at which this needs to be laid on will be an additional burden your men will just have to bear. You'll be landing at this narrow inlet here on the western side where the cliffs descend but do not merge. Transportation is...\"\n\nHe looks to a young lieutenant\n*if gender = \"male\"\n\twho is not all that different from you.\n*if gender = \"lieutenant\"\n\twho, like you, still does not have to shave every morning.\n*if gender = \"female\"\n\twho's brow is creased with concentration.\n*line_break\n*line_break\n\"Since swimming is out,\" the young lieutenant tries weakly, \"the Destroyer Schley has been commandeered. The hull has been fitted out with the Eureka Landing Craft to get you to shore.\"\n*goto method_2\n\n*label method_2\n*choice\n\t*hide_reuse #\"Support?\"\n\t\t*set var_a 1\n\t\t\"Both the Schley, and to some extent your Eureka boats, can provide considerable direct fire-support,\" the young lieutenant says.\n\n\t\t\"Hopefully you won't need any of that to get ashore,\" Carlson puts in. \"Because if you do then the mission has likely failed already.\"\n\t\t*goto method_2\n\t*hide_reuse #\"Reefs?\"\n\t\t*set var_b 1\n\t\t\"Yes, but we really don't know...\" the young lieutenant indicates regretfully.\n\n\t\t\"The map is the best we have and it is incomplete,\" Carlson says. \"Submarine recon has revealed that the island is surrounded by reef on all but the eastern side, one that broaches at the end of ebb-tide.\"\n\t\t*goto method_2\n\t*hide_reuse #\"Any other support?\"\n\t\t\"No air raids or other surface ships will accompany you. We don't want to overplay our hand here,\" Carlson remarks. \"As far as the Japanese should be concerned, they are going to lose contact with an outpost for unknown and possibly technical reasons. It may be days, perhaps weeks before they grow suspicious.\"\n\n\t\tNo attention, no suspicion. Just another radio issue in the South Pacific.\n\t\t*goto method_2\n\t*if var_b =0\n\t\t#\"Suggested landing beach?\"\n\t\t\t\"Western side. The Schley will try to land you at the height of flow-tide,\" Carlson says. \"The Japanese won't be watching, on account of the reefs. If you can get over those, you may achieve surprise. Of course, I'll leave the timing of the landing to you when the time comes.\"\n\t\t\t*goto method_3\n\t*if var_a >0\n\t\t#\"Given the reef situation, the Japanese may only guard against an eastern landing.\"\n\t\t\t\"Exactly my thinking The Schley will try to land you on the western side at the height of flow-tide,\" Carlson says. \"If you can get ashore intact, you may achieve surprise. Of course, I'll leave the timing of the landing to you when the time comes.\"\n\t\t\t*goto method_3\n\t#Get to the meat of the matter.\n\t\t*goto method_3\n\n\n*label method_3\n*if var_b >0\n\tGiven the tides, the optimal landing to clear the reef would be at midnight. But given how full the moon is, anything up to a dawn landing might be possible.\n*if var_b =0\n\tYou inquire about the tides, and reefs of course. A midnight landing might be best, though given how full the moon is, anything up to a dawn landing might be possible.\n*if var_a =0\n\tThe Schley and the Schley only will take you close to shore. That at least makes coordination easy.\n\n*choice \n\t#\"I'll want a midnight landing to clear the reefs.\"\n\t\t\"That would give you the biggest margin of error to get ashore,\" Carlson says.\n\t\t*set insert 1\n\t\t*goto departure\t\n\t#\"A dawn landing will let us see the landing beaches and reduce the chance of an accident.\"\n\t\t\"Prudent. If you don't get ashore then there is no point going,\" Carlson notes.\n\t\t*set logistics +1\n\t\t*set morale +1\n\t\t*set time +1\n\t\t*set insert 2\n\t\t*goto departure\n\t*if logistics >3\n\t\t#\"I would undertake a night time landing utilizing the rubber boats I requisitioned last month.\n\t\t\tThe rubber boats have a very shallow draft and are nearly silent when propelled by paddle power.\n\n\t\t\t\"Good foresight on your part,\" Carlson notes.\n\t\t\t*set morale +1\n\t\t\t*set time -1\n\t\t\t*set insert 3\n\t\t\t*goto departure\n\t*if character =2\n\t\t#\"A pre-dawn slide and glide. I'd prefer to have a PT boat for that but a destroyer should do.\"\n\t\t\tThe trick with a slide and glide maneuver is to build up enough momentum before cutting the engines, then silently gliding into range. At the drop off point, the landing craft separates and the Schley turns. The enemy should be none the wiser; thinking at most that the Schley is just passing by.\n\n\t\t\t\"I like it,\" Carlson says.\n\t\t\t*set insert 4\n\t\t\t*set logistics +1\n\t\t\t*goto departure \n\t*if morale >2\n\t\t#\"A night landing, but we'll paddle in silently.\"\n\t\t\t\"The engine is loud, and surprise is vital,\" Carlson says.\n\t\t\t*set insert 4\n\t\t\t*set logistics +1\n\t\t\t*goto departure\n\n*label departure\n\"So that is how you'll do it.\"\n\t\n*goto schley\n\n*label schley\n*page_break Gather Your Platoon\nAs the sun dips down, you and your platoon hurriedly change into clean jungle green fatigues, gather your combat gear, and hurry down the pier.\n\nThere at anchor lies the DD-103 Schley, a gray wolf of the sea and with plenty of teeth. Laid down during the first world war, it is three hundred feet of prowl with a lean sloping silhouette that soon slices through seemingly docile waves. Its four main guns and two secondaries, though tiny by naval standards, can throw fifty-five pounds of ordinance upwards of ten miles. \n\n*if insert !=3\n\tThe Eureka landing boats are still tied down on deck; a pair of flat bottomed barges that lack the prow-ramp for a quick embark/disembark. Hopefully there will be no need for that. On the other hand, both hulls do sport a pair of thirty-cal machine guns set on aft pivots.\n*if insert =3\n\tA pair of aging Eureka landing boats are tied down on deck, and will remain there unless things go horribly sideways. By contrast, your new rubber hulled boats are modern things. No need to lunge over the gunnel to disembark, just easy on and easy off anywhere. However, there are also no thirty-cals on pivots. But you can't have everything if you want stealth.\n\n*page_break\nThe deck of the Schley pitches slightly under your feet as you and your men enjoy the seaward sunset. Private Landry and Private Scott share down their stray cigarettes. It will take them a while to do it, talking up a storm between puffs. City boy, country boy, friends for life halfway round the world.\n\n*if character =0\n\tYou'll need to give them a while to finish the cigs up. Half a pack in a rucksack can crackle with every step. The only thing worse is the constant slosh from a half-empty canteen. Men have been shot because of that, by friends and foes alike. \n*if character =1\n\tThey're almost done with the cigarettes and a good thing too. Half a pack in a rucksack will crackle with every step. The only thing worse would be the constant slosh from a half-empty canteen. Bad idea when you are depending on surprise. \n*if character =2\n\tYou make a mental note to have them do a rustle check, make certain their cigarettes don't rustle when they walk. Same with canteens. A half-empty anything will raise a racket and silence could be worth lives.\n\n*page_break Consider My Fire Teams\nCorporal Ransom likewise puffs away on a green pack of Lucky Strikes while he regales Private Hagan and Holben with another tale of college as the three of them sort bandoliers. The Corporal doesn't just talk about the classes either, but also the drinking and dames; everything that goes into it. Both of the H's clearly want a piece of that dream.\n*if character =2\n\t*line_break\n\t*line_break\n\tThat Ransom will eventually matriculate to Yale can't really be held against him. An education is important no matter where it comes from.\n*page_break Consider My Other Fire Team\nCorporal Gerhard briefly belays his barrel cleansing ritual to pass over a two ounce can to Private 'Mule' Merrik. Given that Merrik is the greenest Marine in your team, he all but pours Standard Oil's best lube down the barrel of his M1 rifle. You will have to remind him to discharge the weapon to smoke things out. \n*if character =0\n\tNothing gives a way a position quite like that first puff of white.\n*if character =1\n\tIt will be hard for him to shoot through that much smoke.\n*if character =2\n\tThe manual is quite specific about that.\n*page_break Consider My Scout\nOnly one man stands apart from your tight knit band. Private First Class Simmons has gone forward, takes his ease on deck near the prow. The man deeply misses the Bayou where he grew up and would have returned there just a few months ago, except that the war broke out first. Hopefully he and everyone else will eventually return home, though the odds are against it.\n*if character =1\n\tThen again, you've always been good with dice.\n*if character =0\n\tYou'll do what you can though, you always do.\n*if character =2\n\tBut if odds alone determined the fates of men then the world would be all the poorer for it.\n*line_break\n*line_break\n*page_break Those Are My Marines\n\nOlive-drab battle utilities can't stop a bullet. But neither could the old dough-boy brimmed helmet; which is why Carlson chose not to equip your raiders with the cumbersome and distinctive headgear. He's waiting for the new pot helmet that is supposed to be in the pipeline. For that matter, so are your Marines. The cloth covers you've been issued certainly won't do much more than trim back the sun. \n\n*choice\n\t#\"Okay Baker, assemble the men for a final briefing.\"\n\t\t*set attention 1\n\t\t*goto start_the_talk\n\t#\"Sergeant Baker, have the men stand to order.\"\n\t\t*set attention 2\n\t\t*goto start_the_talk\n\t#\"Baker, give them another minute then we'll start.\"\n\t\t*set attention 3\n\t\t*goto start_the_talk\n\n*label start_the_talk\n\n\"Yes, Lieutenant,\" the burly Sergeant replies. Without pause he sets down the rough island map you had both been studying. \n\nYour old salt of an NCO seems determined to chew through an extra ration of nails today, none too pleased at how quick this operation went into the oven. No one is; not Major Carlson or you for that matter.\n*if character =0\n\tBut it never does any good to let the men know that.\n*if character =2\n\tBut you've got your orders.\n*if character =1\n\tBut this mission is important, you're certain of that.\n*line_break\n*line_break\n*goto prepare_to_pick_a_weapon\n\n*label prepare_to_pick_a_weapon\n*if attention =1\n\tBaker signals Corporals Gerhard and Ransom who in turn gather the men. That done, your Sergeant offers over a familiar nod, steps aside. \"Alright LT, give us the word.\n*if attention =2\n\tBaker barks the order and your men scramble to obey, form their intervals in fine order. Corporals Gerhard and Ransom snap off crisp salutes to their Sergeant who then turns to face you. \"The Platoon is assembled, Lieutenant.\"\n*if attention =3\n\tBaker saunters over to Corporals Gerhard and Ransom. Those two inform their men in turn. That done, your Sergeant catches your eye, steps aside. \"Ready here, LT.\"\n*line_break\n*line_break\nNine men wait on you. Three fire teams of three each. bound up into a tight unit by their disparate weaponry. A Browning Automatic Rifle, Thompson submachine gun and an M1 rifle, all of which when used together properly can overcome an enemy regardless of range or position. At least, that's the theory.\n\nSoon you will lead them onto an enemy island and into the war. You adjust both the Colt forty-five holstered at belt and the lethal K-BAR knife that balances it out, then heft up your... \n\n*goto pick_a_weapon\n\n*label pick_a_weapon\n\n*choice\n\t#Browning Automatic Rifle.\n\t\tThe fiberglass stock of the automatic rifle rests over both shoulders like a drunk friend. Its a heavy and unwieldy beast that is prone to jamming and has a wicked recoil if you don't brace with the bi-pod, but it can spit out five hundred rounds a minute on a target up to three hundred yards away. That kind of fire-power could make all the difference in an extended fire-fight.\n\t\t*set weapon 0\n\t\t*goto weapon?\n\t#Thompson submachine gun\n\t\tYou let the submachine gun ride leisurely on your hip. The 'Chicago Piano' has a long thirty magazine and a hunger to eat it up. When the fighting is close at hand, this masterpiece of Colt engineering will not disappoint.\n\t\t*set weapon 1\n\t\t*goto weapon?\n\t#Rifle, M1. \n\t\tThe newly issued semi-automatic Springfield all but purrs as you sling it back for ease of carry. Drag it across a beach, plunge it into mud or soak it in seawater and the eight round clips will still put round after round on target; four hundred yards downrange whether you are standing, sitting or lying down.\n\t\t*set weapon 2\n\t\t*goto weapon?\n\t#Flamethrower\n\t\tThe damn triple tanked flamethrower threatens to throw out your back each time you pick it up. Seventy pounds of it will give you seven seconds of glory up to thirty paces off. Five gallons of fuel are mixed with propellant and lit by hydrogen to make a lethal dragon's breath. A flick of the ignitor at the end of the nozzle lets you casually light a cigarette from a trickle of clean, sweet flame; a spectacle that draws the platoon's nervous laughter every time. \n\t\t*set morale +1\n\t\t*set weapon 3\n\t\t*goto weapon?\n\n*label weapon?\n\nThere is time to change out your weapon. Once you're on the beach, it'll be too late.\n\n*choice\n\t#Time to speak to the men.\n\t\t*goto speech\n\t#Rethink my choice of weapon for this mission.\n\t\tYour weapon choices are...\n\t\t*goto pick_a_weapon\n\n*label speech\n\nNine men, three teams, one officer. Your men look to you for the word. \n\n*choice\n\t#\"We're gonna hit the beach and head straight into the jungle.\"\n\t\tYou explain the simple facts; the sooner under cover you get, the less chance we'll get caught out in the open. The ammo and extra gear can stay on the boats while the squad moves into the jungle. That will allow us to hit the enemy before they know what... hit 'em.\n\t\t*goto straight\n\t#\"Our enemy has been on the island for a while.\n\t\tYou note that the Japanese have been here for days. They will have lookouts. Your squad may be seen coming ashore. Once on the beach, you will form a perimeter by fire teams to protect the boats while they unload.\n\t\t*set time +1\n\t\t*set eat 1\n\t\t*set logistics +1\n\t\t*goto perimeter \n\t#\"The enemy outnumbers us and likely has fortified their position.\"\n\t\tYou let them know that resistance could be fierce. Which is why you will need to unload additional ammo as well as the company trench mortar. Only then can we show the Japanese what we can do.\n\t\t*set time +2\n\t\t*set mortar 1\n\t\t*set eat 2\n\t\t*set logistics +2\n\t\t*set situation 3\n\t\t*goto perimeter\n\n*label straight\n*if insert =1\n\tThe constellations are out in endless sprawling patterns as the landing boat motors you and your men away from the dark hull of the Schley. The island is just a bit of lone midnight splashed against the horizon that grows steadily larger with each passing minute. \n\t\n\tSoon enough the stars that hang low in the east are blotted out by low cliffs that taper down to a narrow band of sand that forms a skirt above a pounding white sea. The boat swells in a rush as the reef passes beneath. The boat lurches as the prow plows onto the beach. You and your Marines are ashore in a hostile land. \t\n\t*goto in\t\n*if insert =2\n\tIn the gathering light of dawn, you and your men descend the cargo nets into the landing boat. As the last boot touches down, engines purr as the naval Coxswain are steers toward shore. The island is a simple silhouette against the eastern horizon with cliffs that taper down to a narrow band of shale and sand to form a skirt above a pounding white surf.\n\n\t\"Reef,\" the Coxswain calls out above the din. The belted rounds of the thirty-cal beside the navy man tinkle in agreement as the boat rises over top a dark reef and reaches the surf. The prow plows greets the sand with a solid crunch. Toga island, enemy held territory, is right over the gunnel.\n\t*goto in\n*if insert =3\n\tYour requisitioned rubber boats are supposed to be lighter than their wood framed cousins but it sure doesn't seem that way as your men paddle away from the Schley's hull. Everyone sweats as they stroke and strive to make this work. Gung-ho in action, as Major Carlson would no doubt have put it. After all, its this or swim.\n\n\tThe sky is dark, the sea is likewise, and so are your boats. Once away from the din of the Schley's engines, it is clear that the Japanese will never see you coming. From the toothy grins that flash in the night, your Marines agree.\n\n\tThe reef is just a brief rise and rush as you pass over that dark band. Then it is just the matter of a few strokes to reach where the white surf pounds against pale sand between a dark 'V' of cliffs. The boat shudders as rubber meets beach with a soft rasp, and then you're ashore in a hostile land.\n\t*goto in\n*else\n\tThe stars fade as dawn encroaches. Amid the dark sea, your landing boat silently veers away from the equally somber destroyer. \n\n\tIt all seemed simple on paper. But there were hundreds of details that had to be worked out and even after all that, here in the midst of a mission, the simplest thing has proven to be ever so much harder. Thankfully the island is close at hand. The reef is a mere nuisance as the Eureka boat ghosts over that dark band. The crunch of the prow against the sand is a sharp sound that splits the silence. Dawn is about to break in full and you are ashore in hostile territory.\n\t*goto in\n\t\n*label in\n\n*page_break\n\n*if insert =3 \n\tYour Marines hurriedly dig a shallow hole to hide the boats then top them with palm fronds. The pounding of the surf matches the pounding of your heart until it is done. You signal your men and they follow you off the beach.\n\t*goto patrol \n*else\n\tThe pounding of the surf matches the pounding of your heart as you signal your men and lead them off the beach.\n\t*goto patrol \n\n*label perimeter\n\n*if insert =1\n\tThe stars are out in odd clumps and patterns as your landing boat motors away from the dark hull of the Schley. The island, not much more than a dark silhouette set against the horizon, grows steadily larger with each passing minute. \n\t\n\tThe stars that hang low in the east are blotted out by low cliffs. The dark sea rolls toward a narrow band of sand. A white froth rises in the waters ahead and the sudden rise of your boat is followed by the soft scrape of coral beneath. But that passes quickly enough and soon the prow crunches against the beach. With a jangle of spare bandoliers, you and your Marines wade ashore onto a hostile land. \n\t*if situation =3 \n\t\t*goto whale\n\t*else\n\t\t*goto spread\t\n*if insert =2\n\tIn the gathering light of dawn, you and your men descend into the landing boat, stow your spare ammo belts and canteens. Moments later the motors rumble to life and steer you from the shadow of the Schley.\n\n\tThe island is a dark silhouette against the eastern horizon. A narrow band of shale and sand forms a skirt above a pounding white surf.\n\n\t\"Reef,\" a naval Coxswain comments from the helm. The belted rounds of the thirty-cal beside the navy man seem to tinkle in anticipation. A moment later the Eureka boat shudders as the bottom scrapes against the coral. But once clear you are headed straight toward the 'V' of cliffs. \n\n\tWhen the prow crunches against the beach, you heave yourself over the gunnel. Toga island, enemy held territory, lies beneath your boots.\n\t*if situation =3 \n\t\t*goto whale\n\t*else\n\t\t*goto spread\n*if insert =3\n\tWaves heave against the rubber boats as you and your Marines stroke away from the Schley's hull. Every man has a paddle, every man strives to make this work. It is this or swim. \n\n\tThe sky is dark and the sea is likewise. So are you boats for that matter. The Japanese will never see you coming. From the toothy grins that flash in the night, your Marines like that part.\n\n\tYou hardly notice the rise of a wave as you pass over the reef. It's just a dark band amid the waters. The 'V' of cliffs is your true target. There the white surf pounds against the beach instead of lashing against stone. With a soft rasp, rubber meets the sand of a hostile land.\n\t*if situation =3 \n\t\t*goto whale\n\t*else\n\t\t*goto spread\n*else\n\tThe stars fade into the dawn as the laden landing boat veers away from the silent and dark destroyer. And then you and your men are alone amid the dark sea.\n\n\tIt all seemed so simple on paper. But here, with boxed BAR rounds nobbing at your knee, everything is so much harder. Thankfully you soon spy the low cliffs. Those taper down to a narrow band of sand that forms a skirt above a pounding white sea.\n\n\tThe boat rises as the boat scrapes over the reef. Then the prow crunches against the beach with a lurch and you are ashore in hostile territory.\n\t*if situation =3 \n\t\t*goto whale\n\t*else\n\t\t*goto spread\n\n*label spread\n\n*if insert =3 \n\tBaker's fire team hurries to the edge of the jungle and begins to dig a shallow hole to hide the boats. A few hand signals sends your other men back to drag the rubber tubs fully onto the beach. After those are unloaded they will be put in the hole then topped with fronds. But until then you are vulnerable, especially without a perimeter or formation.\n\n*if insert !=3\n\tYour men spread out and form a perimeter. The Small Wars manual suggests a standard line formation so that no enemy can infiltrate and attack the landing boats, but a skirmish formation could allow your men to pick off the enemy well before then. \n\n*choice\n\t#Adopt a standard line formation.\n\t\tEach of your fire teams flops into a portion of a mule-shoe arc. The dark jungle is the primary target while the cliffs to either side receive the rest of their attention.\n\t\t*set formation 1\n\t\t*goto contact\n\t#Send those with rifles out to adopt skirmish positions. \n\t\tEach Marine with an M1 slips into the jungle. The others take up position, set bi-pods for the BARs and mark out firing arcs.\n\t\t*set formation 2\n\t\t*goto contact\n\t*if character =2\n\t\t#One fire team will establish an outpost inside the jungle while the others form the main line of resistance.\n\t\t\tIf the outpost contacts the enemy then they are to fall back toward support. At your signal, Ransom's fire team heads off into the Jungle while those under Baker and Gerhard position their BARs and mark out firing arcs.\n\t\t\t*set formation 3\n\t\t\t*goto contact\n\t*if character =0\n\t\t#Get everyone into the jungle.\n\t\t\tAt your signal your men push into the jungle. Once there, the men hunker down in the thickest patch they can find. The important thing is to stay hidden and not give the enemy a hint of where you are.\n\n\t\t\tTheir olive utilities blend in well enough amongst the jungle, though a little camo netting would be better.\n\t\t\t*set formation 4\t\n\t\t\t*goto contact\n\n*label contact\n*page_break\n\nAs your men settle into position, Sergeant Baker flashes a hand signal. Enemy, spotted!\n\n*if time =0 \n\tTwo figures step into the moonlight atop the cliffs just fifty feet from the beach. The cut of their caps is distinctively Japanese. \n\n\tWith rifles slung, they idly raise up binoculars and begin to glass the sea. \n*if time =1\n\tTwo figures step into the moonlight atop the cliffs just fifty feet from the beach. The cut of their caps is distinctively Japanese. \n\t\t\n\tThe first cradles a rifle while the other raises up a pair of binoculars and begins to glass the sea.\n*if time =2 \n\tTwo figures in olive drab uniforms and khaki trousers emerge from the jungle edge atop the cliffs... and stop dead in their tracks. For a long moment the two Japanese soldiers stare wide eyed at the landing craft that bob in the sunny surf. As one, they raise their rifles.\n\n*choice\n\t#Signal 'Open fire!'\n\t\t*set situation 4\n\t\t*if formation =1\n\t\t\tRifles bark. BARs clatter. The hail of bullets strike down the enemy.\n\t\t\t*set time +2\n\t\t\t*set resistance -2\n\t\t\t*goto patrol\n\t\t*if formation =2\n\t\t\tYour riflemen open fire. The enemy pitches right over.\n\t\t\t*set time +1\t\t\t\t\n\t\t\t*set resistance -2\n\t\t\t*goto patrol \n\t\t*if formation =3\n\t\t\tRifles bark and BARs clatter. The converging fire of the outpost and main line of resistance tears the two enemies apart.\n\t\t\t*set time +2\n\t\t\t*set resistance -2\n\t\t\t*goto patrol\n\t\t*else\n\t\t\tQuick bursts light them up and pitch them over. They never saw it coming\n\t\t\t*set time +1\n\t\t\t*set resistance -2\n\t\t\t*goto patrol\n\t#Signal 'Take them!'\n\t\tYou flash a hand-signal and initiate a silent rush.\n\t\t*set situation 4\n\t\t*if formation =3\n\t\t\tRansom's team spills out of the jungle and plows into the Japanese soldiers from behind. Rifle butts and swift kicks make short work of them without a shot being fire.\n\t\t\t*set resistance -2\n\t\t\t*goto patrol\n\t\t*if formation =4\n\t\t\tYour men work their way forward then rise up from cover and pounce upon the pair before they can rack in a round.\n\t\t\t*set resistance -2\n\t\t\t*goto patrol\n\t\t*if formation =2\n\t\t\tYour skirmishers scramble up the cliff toward the enemy. A shot rings out. Private Landry grunts and collapses. Private Scott gives a shout as he rushes to the top even as more rounds flick down. He grabs one enemy by the wrist and flings him off the cliff.\n\n\t\t\tThe other proves more nimble and the brave Private wrestles with him for long moments until Private Hagan at last climbs up and delivers a solid bayonet thrust to the foe.\n\t\t\t*set resistance -2\n\t\t\t*goto wounded_landry\t\t\t\t\t\t\n\t\t*if time \u003c1 \n\t\t\tYour men plow into the Japanese before the enemy can ready a rifle.\n\t\t\t*set resistance -2\n\t\t\t*goto patrol\n\t\t*if time =1\n\t\t\tA single shot rings out as Sergeant Baker charges up the cliff-side. Baker reaches the Japanese and almost casually knocks one down before the other can rack in another round. Private Scott then plows into the other and sends the foe over the cliff.\n\t\t\t*set time +1\n\t\t\t*set resistance -2\n\t\t\t*goto patrol\n\t\t*else\n\t\t\tThe crack of a rifle breaks the silence as your men rush up the cliff. Private Landry lets out a grunt and collapses. Private Scott gives a shout and rushes to the top as rounds flick down. He grabs one of the Japanese by the wrist and flings him off the cliff.\n\t\t\t\n\t\t\tThe other foe proves more nimble and the brave Private wrestles with him for long moments until Private Hagan at last climbs up and delivers a solid bayonet thrust to the foe.\n\t\t\t*set time +1\n\t\t\t*set resistance -2\n\t\t\t*goto wounded_landry\n\t#Do nothing. Wait for them to leave.\n\t\t*if time \u003c1\n\t\t\tThe two enemy soldiers stare out at the empty sea for long moments. They exchange a few oddly poetic words in Nipponese and then depart.\n\t\t\t*goto patrol\n\t\t*if time =1\n\t\t\tOne of the enemies points toward the distant shape of the Schley and says something sharp to his fellow. Both men then withdraw into the jungle. \n\t\t\t*set time +1\n\t\t\t*goto patrol\t\n\t\t*else\n\t\t\tThe enemy raises their rifles and open fire. Private Landry tumbles and falls with a shocked cry. Private Scott gives a low growl and opens fire. The Japanese swiftly retreat into the jungle.\n\t\t\t*set time +1\n\t\t\t*goto wounded_landry\n\t*if formation =4\n\t\t#Remain hidden.\n\t\t\t*if time \u003c2\n\t\t\t\tThe enemy soldiers watch the sea for long moments. They exchange an oddly poetic comment in Nipponese and then amble back into the jungle.\n\t\t\t\t*goto patrol\t\t\t\n\t\t\t*else\n\t\t\t\tThe enemy soldiers curse at the sight of the Schley in the distance and swiftly withdraw into the jungle. \t\n\t\t\t\t*set time +1\n\t\t\t\t*goto patrol\t\t\t\n\n*label whale\n\n*page_break\n\n*if insert =3 \n\tYour Marines wade onto the beach with your burdened boats in tow. But when the rubber scrapes hard against the sand, it is clear you will have to unload them first. It takes some time to unload them, but once that is done your men dig a shallow hole, drop the boats in, and then top it all with palm fronds to make a hasty hide.\n\t*line_break\n\t*line_break\n*if insert !=3\n\tThe men hurry to unload.\nAmmo boxes, dehydrated J-rations, spare canteens, and the trench mortar. Moment by moment, the pile continues to grow.\n\n*if time \u003c2\n\tA scatter of conversation rolls down from the cliffs as two figures appear in silhouette at the crest. The cut of their caps is distinctively Japanese.\n\t*choice\n\t\t#Open fire!\n\t\t\tAt your signal, your men drop the two unwary foes in a flurry of rifle fire. The foremost foe tumbles down the cliff-side and sprawls on the beach.\n\t\t\t*set time +2\n\t\t\t*set resistance -2\n\t\t\t*set situation 4\t \t\n\t\t\t*goto patrol\n\t\t#Try to remain hidden.\n\t\t\tTwo Japanese soldiers in olive drab tunics and khaki trousers mosey past the beach and then up the other cliff as though they were strolling down Broadway; none the wiser to your presence.\n\t\t\t*goto patrol\n*else\n\tA shout in Nipponese bellows out above the crash of the surf. A pair of the enemy, clad in olive drab tunics and khaki trousers, points down at you from the cliffs above. Despite their astonishment, they unsling their rifles at your toiling men.\n\t*choice\t\n\t\t#\"Open fire!\"\n\t\t\tYou give the signal, but the enemy fires first. Private Landry drops in a heap. The return volley from your eight remaining Marines provides a raucous payback.\n\t\t\t*set time +2\n\t\t\t*set resistance -2\n\t\t\t*set situation 4\n\t\t\t*goto wounded_landry\n\t\t#\"Take cover!\"\n\t\t\tYour men hug the sand as Japanese rounds flick overhead. When the fire abruptly lifts you find that the enemy has retreated into the jungle.\n\t\t\t*set time +1\n\t\t\t*goto patrol\n\t\t*if character =1\n\t\t\t#I rush them.\t\t\n\t\t\t\t*set situation 4\n\t\t\t\t*if weapon =1\n\t\t\t\t\tYour submachine gun hammers in your hands as you charge straight up the slope and drop both with a burst before they get off a shot.\n\t\t\t\t\t*set time +1\n\t\t\t\t\t*set resistance -2\n\t\t\t\t\t*goto patrol\n\t\t\t\t*if weapon =0\n\t\t\t\t\tA low round sends shale chips into your shin as you heft your BAR and walk forward. Without the bi-pod it is not an easy shot even at this range. You squeeze the trigger and the BAR hammers in your hands as you rake a long burst against your foes.\n\n\t\t\t\t\t(Health very slightly reduced)\n\t\t\t\t\t*set character_condition -1\n\t\t\t\t\t*set resistance -2\n\t\t\t\t\t*set time +2\n\t\t\t\t\t*goto patrol\n\t\t\t\t*if weapon =2\n\t\t\t\t\tYou fire off your eight rifle rounds as you charge forward. One enemy sprawls one of the enemies but the other flees into the jungle before you can slap in another clip.\n\t\t\t\t\t*set time +2\n\t\t\t\t\t*set resistance -1\n\t\t\t\t\t*goto patrol\n\t\t\t\t*else\n\t\t\t\t\tThe hiss of your ignitor shakes up the enemy's aim when their wild rounds are met with a spurt of greasy flame that promises fiery death. As you lumber forward with your ersatz dragon, the enemy flees into the jungle.\n\t\t\t\t\t*set situation 0\n\t\t\t\t\t*set time +1\n\t\t\t\t\t*set logistics -1\n\t\t\t\t\t*goto patrol\n\t\t#Retreat into the Jungle!\n\t\t\tYou signal and lead your men into the jungle. Enemy rounds flick down until everyone is safe amid heavy cover. A back at your platoon's supplies finds things still piled up neatly on the beach. \n\n\t\t\tThe cat-calls of a laughing enemy ring in your ears as you lead your men deeper in the jungle.\n\t\t\t*set time +1\n\t\t\t*set eat 0\n\t\t\t*set logistics -1\n\t\t\t*set morale -1\n\t\t\t*goto patrol\n\n*label wounded_landry\n\n*set landry 1\n\n\"Man down!\" Sergeant Baker calls over to you.\n\nYou find Private Landry sprawled on the beach. Blood leaks from his chest. His teeth are clenched in agony. Private Scott, hands shaking from his brush with the enemy, scampers over and tries to staunch the flow. That works, sort of. Even so, the wounded Marine has begun to pale.\n\n\"Its bad, LT!\" Scott calls out over shoulder. Holben pulls out a bandage roll from his pack and settles in beside the other man as both work feverishly to save their fellow Marine.\n\n*set casualties +1\n\n*choice\n\t#\"We'll get him aboard a landing craft. The Schley's corpsman can take care of him.\"\n\t\tYou signal the Schley to send a landing craft. The Eureka boat motors straight in while you rig up a stretcher. Soon enough they lift the wounded man over the gunnel.\n\n\t\t\"Don't you die on me,\" Private Scott murmurs under his breath as the boat departs with Landry at the ebb of the tide. No one disagrees with the sentiment.\n\t\t*set time +1\n\t\t*set landry 1\n\t\t*goto patrol\n\t#\"Finish up. Give him some morphine. We have to leave him on the beach.\"\n\t\t\"LT?\" Scott asks hesitantly. \"He could die.\"\n\t\n\t\t\"You heard him,\" Sergeant Baker says, his voice a low growl to reinforce your tough call. \"The Japs must have heard the shots. We can't wait.\"\n\t\t\n\t\tScott does what he can but Landry can't keep his eyes open. A touch of his wrist finds a thready pulse.\n\n\t\tBut there is nothing to be done for it. Scott nestles a rifle in the wounded private's lap then sets a full canteen at hand. \"For when he wakes up.\"\n\n\t\tBaker nods at that sentiment. \"Yeah, getting shot makes you thirsty.\"\n\n\t\tThe others mutter under their breaths as you give the order to move out. No one, least of all you, wants to leave Landry behind, especially not like this. But the alternative is a delay that might kill you all.\n\t\t*set landry 2\n\t\t*set morale -1\n\t\t*goto patrol\n\n*label patrol\n\n*set meta_time 2\n*page_break\n\n*if situation =4\n\t*if character =0\n\t\tYour foes lay sprawled before you yet again. No time to even bury the unlucky Japanese. One day it will be your turn to forever sleep, but not yet.\n\t*if character >0\n\t\tA fallen Japanese soldier lies utterly still on the sand; as though you could give the foe a nudge and he'd wake right up as if from a nap. As the terrifying rush of combat fades, the lull tosses your guts worse than being pounded by heavy seas. You know deep down that nothing will be the same.\n\n*page_break\n\nYour Marines push on uphill into the heart of the jungle. Every step becomes a chore as vines and tangles snag constantly. But the Japanese are far less likely to see you coming this way than treading over white sands along the shore.\n\nBehind you Private Hagan curses under his breath as the pack-radio slung on his back snags on a wayward vine. Whenever a vine or branch tugs on the harness, the whole thing takes a beating.\n\n*if mortar =1\n\tThings are even worse for Private Merrik as he lugs both the base-plate and tube of the company trench mortar. Dubbed 'Old Misery' by every man whoever had to carry her, each of the three portions weighs forty pounds and that does not include the ammo.\n\t\n\tNext time you'll try to requisition a lighter, more modern replacement;\n\t*if character =2\n\t\tthe M2 perhaps, which is supposed to be a mere third of the weight.\n\t*if character =0\n\t\twhich has to be far lighter than the Great War relic.\n\t*if character =1\n\t\tbecause that'll mean your Marines can carry more important things.\n\t*line_break\n\t*line_break\nThe enemy base should lie on the other side of the island. On the map there are two low hills that form a central plateau. Assuming you landed in the right place, you could be at the enemy base\n*if meta_time =0\n\tby dawn.\n*if meta_time =1\n\ta little after dawn.\n*if meta_time >1\n\tby mid-morning. \n*line_break\n*line_break\nA check of your black cased lensatic compass affirms as much. It certainly has been an earnest navigational friend.\n\n*choice\n\t#I should write a letter to S&W, the Compass maker.\n\t\tS&W, whoever they are, makes an excellent compass. And no doubt they will make plenty more of them before this war is over.\n\t\t*goto patrol_1\n\t#If need be, I could navigate by landmarks.\n\t\tWith two landmarks, triangulation is pretty easy. A compass is just icing on the cake.\n\t\t*goto patrol_1\n\t#Thankfully, this is a small island.\n\t\tThe truth is, no matter where you go, sooner or later there will be beach or cliff. Then it is just a matter of backtracking.\n\t\t*goto patrol_1\n\n*label patrol_1\n\nAt the head of the column Private Simmons, features nearly hidden by a layer of green jungle-paint, abruptly crouches down and signals sharply for everyone to do the same. Your Marines ease down, but all you can hear is the creak and moan of tree, the calls of exotic birds, and the now distant pounding of surf.\n\n*if character =0\n\tFrom Simmons' further furtive hand signals, an enemy patrol is coming straight at you.\tSix riflemen, one officer, and a machine gun.\n*if character =1\n\tSimmons' signal means there is an enemy patrol ahead and that's going to be trouble.\n*if character =2\n\tSimmons has quite the Old Breed accent to his further hand signals. The enemy patrol is ahead and has a machine gun. Perhaps the type eleven, though that was discontinued by the Japanese army last year. The type ninety-six seems more likely; air-cooled, gas-operated and less likely to jam in a jungle. A ninety-two is, of course, also possible. The Japanese copied the design of the Lewis gun, rather well given what you've heard from G-2 last...\t\n\n*line_break\n*line_break\nSergeant Baker over, and silently asks, \"Orders?\"\n\n*choice\n\t#Ambush. That'll be six fewer rifles we have to worry about.\n\t\t*if situation =4\n\t\t\t*set situation 5\n\t\t*if situation =0\n\t\t\t*set situation 4\n\t\t*goto ambush\t\t\n\t#Open fire. They know this jungle too well to wait.\n\t\tBaker flashes the orders and your Marines lay down fire with a will. The Japanese surge forward at the first shot but after three of them fall, the others scatter.\n\n\t\tNot a one of your men has a scratch.\n\t\t*set time +2\n\t\t*if situation =4\n\t\t\t*set situation 5\n\t\t*if situation =0\n\t\t\t*set situation 4\n\t\t*set resistance -3 \n\t\t*goto pursuit?\n\t#Hide. Let them pass. The base is what we're after.\n\t\tBaker flashes that order to your three teams. Each Marine settles in behind copious cover.\n\t\t\n\t\tA rustle rises. Branches snap. The enemy creeps past just a few yards away, utterly oblivious.\n\n\t\tWhen they are gone, you resume the march.\t\n\t\t*if situation =4\n\t\t\t*set situation 5\n\t\t*goto approach\n\n*label ambush\n\nThe jungle green shifts its tangles and one by one the Japanese soldiers creep into view. The patrol's pace proves as slow as that of your Marines. The jungle is not their friend either. \n\nThere prove to be seven of them; six riflemen and a short officer in a crisp tunic who carries one of those slightly curved samurai swords. \n\nIt is clear they do not see you or your men. That means there are plenty of ways to ambush them in the midst of the jungle.\n\n*choice\n\t#Deploy converging fire but hold off until the enemy enters the slot.\n\t\tBaker nods at your simple plan then signals the other two fire teams. Those men slowly arrange themselves on either side of a 'V' formation. \n\n\t\t*if time \u003c2\n\t\t\tThe enemy obligingly walks into the trap. \n\n\t\t\tAt your command a raucous onslaught erupts from rifle, submachine guns, and especially the BAR's. The enemy crumples before you, seven up, seven down.\n\t\t\t*set time +1\n\t\t\t*set resistance -7\n\t\t\t*goto letters\n\t\t*else\n\t\t\tThe enemy approaches the 'V'. Suddenly, its point man abruptly veers toward where Private Merrik is hidden. At least, Merrik would be hidden if it weren't for the lip of his haversack that pokes above cover. The lead foe peers approaches the oddity in the jungle and begins to raise his weapon.\n\t\t\t\n\t\t\tMerrik's rifle barks. The inquisitive enemy drops. Merrik's fire team joins in with long bursts. Several more enemies topple but the rest, including the officer, scatter back into the jungle.\n\t\t\t*set time +2\n\t\t\t*set resistance -3\n\t\t\t*goto pursuit?\n\t#Fix bayonets and take the enemy with silent steel.\n\t\tBaker hesitates when you point to your K-BAR knife. Nonetheless, after a second round of pointing he gets it. The order is passed to the other fire teams with a fierce and decisive emphasis. \n\n\t\t*if time \u003c2\n\t\t\tYour men nervously fix bayonets.\n\t\t\t*if character =2\n\t\t\t\tIt is one thing to do this in practice, it is another to prepare against an approaching enemy. No matter. You give the signal to one and all.\n\t\t\t*if character =1\n\t\t\t\tYou pull out your K-BAR, gesture sharply to the men on either side. Its time to charge.\n\t\t\t*if character =0\n\t\t\t\tYou pull out your K-BAR and give a grin. Ransom shakes his head, would no doubt say it is a display of bravado instead of courage. Little does he know that there's a thin, and bloody, line between the two.\n\t\t\t*line_break\n\t\t\t*line_break\n\t\t\tYour Marines rise up. The enemy startles. Those foes at the front barely have time to lift their rifles. The others, including the officer, flee pell-mell into the jungle without a shot \t\t\t\t\tfired.\n\t\t\t*set resistance -3\n\t\t\t*set morale +1\n\t\t\t*goto pursuit?\n\t\t*else\n\t\t\tSteel clicks in. You give the order and your men rise up. The enemy on point raises his rifle by reflex and fires as Private Merrik charges. The Marine staggers then collapses in a heap. The rest of your men go in before the foe can rack in another round. Half the Japanese fall to the rush of steel. The rest scatter the rest back into the Jungle.\n\t\t\t*set resistance -3\n\t\t\t*set time +1\n\t\t\t*goto wounded_merrik\n\t#Selective fire. Take the officer alive if possible.\n\t\tThe officer knows something. He must. The machine gunners don't.\n\n\t\tBaker nods as you select the targets, quickly arranges things with the other fire times via a flurry of fingers. Your three riflemen make ready and sight down on their designated targets. Then, they wait.\t\n\n\t\t*if time \u003c2\n\t\t\tA long wait, but the enemy obligingly walks into the trap.\n\n\t\t\tAt your command, your riflemen pick off their targets in rapid succession. Only the stunned officer remains standing. \n\t\t\t*set time +1\n\t\t\t*set resistance -6\n\t\t\t*goto enemy_officer\n\t\t*else\n\t\t\tThe enemy creeps into the deadly 'V'. Suddenly, the Japanese point man abruptly raises his rifle up and aims toward where Private Merrik is hidden. \n\n\t\t\tAt least, Merrik would be hidden if the lip of his haversack didn't poke above cover. The foe calls out a word about the oddity in the jungle and sights down.\n\t\t\t\n\t\t\tMerrik hesitates and looks to you. After an awful moment, a single shot rings out. Merrik screams and collapses. His fire team replies with long, lethal bursts. Several of the enemy drop while the others flee despite the shouts and slashes of a thoroughly upset Japanese officer who trails behind.\n\t\t\t*set time +2\n\t\t\t*set ishiro 1\n\t\t\t*set resistance -2\n\t\t\t*goto wounded_merrik\n\n*label wounded_merrik\n\n*page_break\n\n*set casualties +1\n\nThe din of the firefight retreats as you reach Private Merrik's side. The wounded Marine curses and grits his teeth as he tries to slap a fluff of yellow sulfa over a deep, bloody crease. The round missed the main artery but even if you can stop the slow bleed, he's not going to be able to walk very far or fast.\n\n\"I'm okay.\" Merrik grunts out as you apply pressure to the wound. \"Go get those Japs.\"\n\n*choice\n\t#He's right. If the enemy isn't defeated.\n\t\t*set merrik 2\n\t\t*set morale -1\n\t\t*goto pursuit!\n\t#I can't leave a Marine behind. Not here. Best get him back to the beach.\n\t\tDespite Merrik's protests, Ransom escorts the private back to the retrieval area.\n\t\t*set merrik 3\n\t\t*set ransom 1\n\t\t*set firepower 1\n\t\t*goto pursuit?\n\t*if character =0 \n\t\t#Bull-hockey! This is what NCO's are for. I will tend to Merrik while Baker conducts the pursuit.\n\t\t\tYou give the orders. Baker sets off with his fire team in pursuit. With luck the two of you will be done in time for corn-flakes. \n\t\t\t*set merrik 1\n\t\t\t*set time +1\n\t\t\t*goto pursuit!\n\t*if ishiro =1\n\t\t#Corner the officer before he can escape. Merrik can tough things out.\n\t\t\t*set merrik 2\n\t\t\t*set morale -1\n\t\t\t*go
