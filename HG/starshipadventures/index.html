er_pistol 20\n*create flying 20\n\n*create jim 50\n*create sam 50\n*create joe 50\n*create hint 50\n\n*create robotromance false\n\n*create spacesuit_on false\n*create jetpack_on false\n*create boom false\n*create spacesuit_boom false\n*create outfit \"\"\n\n*create sameye \"\"\n*create wep \"\"\n\n*create relations_robots 50\n*create robots_enter_room 0\n*create crew_member 0\n*create lautian_database 0\n*create extra_parts false\n*create sam_knowledge false\n\n*create repairs_needed false\n*create titan_suit 0\n*create bridge_examine 0\n*create bridge_command 0\n*create bridge_log 0\n*create crew_quarters 0\n*create titan_memory_bank 0\n*create crazyman 0\n*create captainlog 0\n*create cargo 0\n*create marshmellows 0\n\n*create special_helmet \"\"\n*create space_sex \"\"\n\n*create extended_scans \"\"\n*create joe_vote \"\"\n*create joe_scan \"\"\n\n*create okbargl false\n\n*create askcrewnanobots \"no\"\n\n*create zork_air false\n\n*achievement conscious visible 10 Conscious\n\tDon't faint!\n\tYou didn't pass out in front of Samantha.\n\t\n*achievement stunning visible 10 Stunning\n\tCan you stun another living creature under difficult circumstances?\n\tYou have stunned a brain leech!\n\n*achievement foiled visible 10 Foiled\n\tAn old aquaintance.\n\tFoiled your arch enemy's dastardly plans.\n\n*achievement spacerobot visible 10 Spaced\n\tFor the good of the many?\n\tYou spaced Hint!\n\n*achievement friendly visible 10 Friendly\n\tAre you charming… or the opposite?\n\tThe robots of Lautus like and respect you.\n\t\n*achievement surgery visible 10 Surgery\n\tCan you perform life-changing surgery in space?\n\tYou have restored Samantha's vision!\n\t\n*achievement romance visible 10 Romance\n\tLove is where you find it.\n\tYour robots have fallen in love.\n\n*achievement enemy visible 10 Fling\n\tSometimes you don't need brains.\n\tYou've had a fling with your enemy!\n\t\n*achievement team visible 10 Team\n\tAre you a great leader?\n\tYour crew trusts you… but can you trust them?\n\t\n*achievement impressive visible 10 Impressive\n\tCan you be impressive when it really matters?\n\tYou are the most awesome space captain ever!\n\t\n*achievement dead visible 10 Finished\n\tHow will you finish the series?\n\tYou have died an epic death!\n\n*achievement winner visible 10 Finisher\n\tHow will you finish the series?\n\tYou beat the Zorks! Take that, skin harvesting aliens!\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tYou’re a naturally heroic and quick-thinking space captain flying a starship from world to world while keeping your hair groomed to perfection. It’s your duty to keep the engine running, the scotch flowing, the crew happy, and your outfit looking fabulous. There’s carnivorous flora, deceptive aliens, space anomalies, horrifying creatures, and too many arch enemies to keep track of them all! Can you survive?\n\n\t[i]Starship Adventures[/i] is a 50s-style sci-fi interactive comedy novel; a collaboration coordinated and edited by Felicity Banks. It’s entirely text-based—60,000 words, without graphics or sound effects–and fueled by the vast, unstoppable power of your imagination.\n\n\t• Enjoy a 60,000­ word retro science fiction adventure.[n/]\n\t• Fight with lazers, a jet pack, or both.[n/]\n\t• Become a well-known hero of the galaxy... or raise the money for a spiffy new paint job.[n/]\n\t• Play as male or female, gay or straight, or non-cisgendered.[n/]\n\t• Explore the universe, meet new creatures... and cheat, befriend, or kill them.\n\n\n\t*if choice_is_advertising_supported\n\t\t[i]Starship Adventures[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\t\t\n\t\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t\t*page_break_advertisement\n\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n\t\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t\t*page_break Play Now for Free\n\n*label purchased\n\n\nIt was a different age… an age of SCIENCE!!!!!\n\nIt was a time when men were chisel-jawed and handsome and straight as arrows… and if they happened to constantly rip off their shirts among friends well why not?\n\nIt was a time when women managed to improvise a beauty routine that could survive lazer fire, jungle escapes, vigorous hair-tossing, and any atmosphere in the universe.\n\nIt was a different age… an age of SCIENCE!!!!!\n\n\n*page_break\n\n[b][i]Incoming message...[/i][/b]\n\nThe following broadcast contains satire of scifi seen in the early years of television, parodying tropes from that era. It contains mild violence and mature themes. Parental guidance is recommended for younger viewers.\n\nYour mission should you choose to accept it: To heroically pilot your spaceship through the galaxy, exploring strange new worlds, meeting new life forms and civilizations...while most importantly of all: keeping your hair groomed to perfection and the bottle of scotch in one piece.\n\nAt the end of each episode, you will have the option to visit the special features which include author commentary, draft versions, and cheat modes. \n\nWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\nWhere to, Captain?\n*choice\n\t#On with the adventure!\n\t\t*finish\n\t#Take me to the Special Features.\n\t\t*goto_scene commentarya\n", "the_lautian_titan_part_one": "*disable_reuse\n*set hair \"glossy\"\n\nAn S.O.S. call rings out across space!!!\n\nWill our heroes save the day… or doom themselves forever?!?!?!\n\nStay tuned for the next astonishing adventure… The Curse of the Lautian Titan!!!!\n\n*page_break The Curse of the Lautian Titan!!!!\nSamantha turns her head away from one of the flashing displays in the cockpit, which she had been inspecting for the past few minutes, and starts talking to you with a look of distress in her eyes. \"Captain, we just received an S.O.S. call from the a ship that has identified herself as \"The Beauty of Scrap\", only a short distance away from here. We should go and help them!\n\nAn S.O.S. call, often the beginning of trouble, yet sometimes also the possibility of earning the odd Zork dollar by towing away a ship, rescuing a crew, or a cheap adrenalin rush escaping a trap by pirates!\n*choice\n\t#Gather the rest of the crew to tell them that I intend to go and check the S.O.S. call.\n\t\t*set crew_morale %+10\n\t\tYou gather the rest of the crew and explain the situation to them. Jim spits on the floor, grunting something about how much time he had to spend repairing the hull after the last fake S.O.S. pirate ambush, while Hint and Fuzzy busy themselves cleaning Jim's spit. Joe looks at you and Samantha, shrugs his shoulders and says \"Whatever, just hope we can make some money out of this ourselves…\"\n\n\t\tWell, anyway you are the captain and you have made up your mind, the possible gains clearly outweigh any dangers, so you set course to the coordinates given in the S.O.S call.\n\t\t*goto titan\n\t#Set course immediately. I don't want Samantha to be upset that I let an S.O.S. call go unanswered!\n\t\t*set sam %+10\n\t\tYou hate it when she gets sentimental, so you automatically set course to the coordinates of the S.O.S. call. \n*label titan\n\nThe coordinates take you to the uninhabited star system of Tritonamar V, to one of the many asteroids that circle its small red star. The main screen in the cockpit shows an image of the ship from which the S.O.S. originated, a rather small ugly piece of what looks like salvaged pieces of various other ships, held together by massive metallic beams that only contribute more to its disjointed look. Probably a scavenger ship, roaming the galaxy seeking whatever can be sold on from abandoned ships, outposts or old mining bases. But, from the looks of it this time they won the jackpot: the ship is attached to one of the biggest warships you have seen in your entire life, probably Titan or Mammoth-class, the kind of stuff that only major Empire-building civilizations attempt to build. By the looks of its exterior this one has probably been lying around for millennia. Asteroid craters punctuate its hull, small in comparison to the other holes that were opened in it by weaponry. The entire thing is a wreck, the most impressive one you have seen.\n\n*label titan_choices\n\n*choice\n\t#It could be a trap, so I attempt communications with the distressed scavenger ship.\n\t\tYou tell Samantha to attempt to establish a communication channel with the mining ship, but after many tries she turns to you, visibly distraught: \n\n\t\t\"Captain, there is no response, why wouldn't they respond to us?\"\n\n\t\t*set idealism %-10\n\t\t*goto titan_choices\n\t#As per the Captain's Manual, I carry out a scan of both ships to see if any life support systems are online.\n\t\tAs soon as you move away from your console, Samantha starts to tap madly at one of your displays, which shows diagrammatic representations of both ships, green for the scavenging ship (indicating all life support systems being online) but mostly red for the Lautian Titan, with the exception of a small pale green area not far from the place where the scavenging ship is attached. \n\t\t*set maverick %-10\n\t\t*goto titan_choices\t\t   \n\t#Ask Samantha if she can tell you anything else about the design of the ships.\n\t\tSamantha presses some of the flashing buttons on one of the spare consoles, which brings up a number of blueprints of various types of warships, which quickly flash in succession before your eyes, as she continues to press different parts of the screen, bringing up even more information. Finally she points at a variety of different designs and says:\n\t\t*if lautian_database \u003c1\n\t\t\t\"Captain, the larger ship is clearly of Lautian design, from their Imperial period, quite a vessel, I have no detailed information about it, yet it looks similar to Class VII or XIII Imperial Titans. It appears that she took quite a battering… Lautians haven't built any warships for millennia now, or been in any recent battles, so she's probably been here for some time…\"\n\t\t\t*goto titan_choices\n\t\t*else\t\t\t   \n\t\t\t\"It's a Lautian design, from their late Imperial period, a Class XXIII Planet Buster Imperial Titan, a warship specialized in planetary bombardment and defenses against biological warfare. Only one was ever built, \"Xeno-extermination Mark I\", likely the ship in front of us. According to the database that we obtained in Lautus it was lost during a major planetary battle in the outskirts of Hugghat III while facing the Azzhrkak Ascendancy, one of the first civilizations that the Zorks helped. The battle went badly for the Lautians and this ship attempted to escape but nothing was ever heard of her again. Almost the entire 7th Lautian Fleet was lost that day, a huge blow to the Lautians, with the loss of life making them rethink their attitudes to war… but… biological warfare… that's just evil!\n\n\t\t\tTears start pouring from her face at the possibility that a race could exterminate entire worlds. \n\t\t\t*goto titan_choices\n\t#Fly around the Lautian Imperial Titan to get a better idea of the magnitude of the damage it took.\n\t\t*set flying %+10\n\t\tYou maneuver your ship around the Lautian Imperial Titan, which reveals that she did indeed take a heavy pounding from all directions. However, while flying around you discover that quite a number of other scavenging ships have also attached themselves to the Titan, with a quick scan indicating that some of them have been there for centuries. Samantha screams as she sees this. You wait patiently for her to finish screeching, at which point she wails, \"Captain I don't like the look of this at all, we should leave immediately! I'm really afraid of this place…\"\n\n\t\tWhat a gal! The high pitch of her voice briefly deafens you, but you have never been one to shy away from danger, and occasions like these do not present themselves every day!\n\t\t*goto titan_choices\n\t#Dock your ship with the scavenging ship, and proceed to board it. It's best to move quickly.\n\t\tYou maneuver your ship until it's aligned with one of the scavenging ship's hatches and proceed down to the main exit hatch of your ship, while the rest of your crew congregates around you. Samantha is crying and hugs you. \"Don't go, captain, I have a really bad feeling about all this!\"\t\t   \n\n\t\tClearly she is in a state, and it's unlikely that you will manage to get her to accompany you. However, maybe you could take one of your other crew members along with you?\n\n\t\t*label choice_member \n\t\t*choice\n\t\t\t#Tell them that they are all useless in these kinds of situations, and enter the ship by yourself.\t   \n\t\t\t\t*set maverick %+10\n\t\t\t\t*set crew_morale %-10\n\t\t\t\t*goto hatch\n\t\t\t#Tell them that it's too dangerous for them, and enter the ship by yourself.\n\t\t\t\t*set crew_member 0 \n\t\t\t\t*set maverick %+10\n\t\t\t\t*set crew_morale %+10\n\t\t\t\t*goto hatch\n\t\t\t#Take Hint and Fuzzy with you, after all they were built by Lautians.\n\t\t\t\t*set crew_member 1\n\t\t\t\tHint buzzes lightly, and uses her monotone voice to tell you, \"Indeed Captain it is wise for me to accompany you. The ship these scavengers were investigating belongs to the ancestors of those who built me, so I could be of help.\"\n\n\t\t\t\tWith that Hint turns towards the hatch and starts to key a number of commands into its console, which bring together a wealth of information and dazzling bright lights into its display. Fuzzy looks at her, emitting beeps of admiration.  \n\n\t\t\t\t*goto hatch       \n\t\t\t#Take Jim with you, he might be useful if there is a mechanical fault that needs to be repaired.\n\t\t\t\t*set crew_member 2\n\t\t\t\tJim grunts and picks up his lazer pistol and a large combat knife. You look at him, and he answers \"What?? Jumping Jupitarians, you never know what is bloody down there. These scavenger characters can be a jumpy bunch!\"\n\n\t\t\t\tWith that he turns his attention towards the hatch and starts to key a number of commands into its console, which bring together a wealth of information and dazzling bright lights into its display. \t\t\t\t \n\n\t\t\t\t*goto hatch\n\t\t\t#Take Joe with you, generally he seems pretty useless but he might be useful as company?\n\t\t\t\t*set crew_member 3\n\t\t\t\tJoe looks really surprised, and quite scared: \"Ehhhhh… well I am not sure I am overly qualified for this type of…\"\n\n\t\t\t\tAt this point Jim thrusts a lazer gun at his chest, blowing all the air out of his lungs and making him cough for several seconds. Jim looks at him, then at you. \"Jumping Jupitarians, that's the problem with kids these days, no sense of duty!\"\n\n\t\t\t\tJoe looks quite hurt, but picks himself up and readies himself to enter the hatch after you. \n\t\t\t\t*set joe %-10\n\t\t\t\t*goto hatch\n*label hatch\n\nThe sensors on the hatch indicate that the air is breathable, and the ship's power and life-support systems are online. However, you tell those remaining to leave the compartment next to the hatch closed, and to pressurize the door behind you just in case\n\n*label boarding_choices\n\n*choice\n\t#Put on a space suit anyway, just in case, and then open the hatch and enter the ship.\n\t\t*set titan_suit 1\n\t\t*set maverick %-10\t\t\t\t\n\t\tYou decide that the precautions you've taken are not enough, and put on a space suit before opening the hatch. You hate how it restricts your movements but safety comes first! It also allows for some especially heroic-looking photos.\n\n\t\t*goto boarding_choices\n\t#Open the hatch and enter the ship.\n\t\tThe hatch gives way to the small shuttle bay of the scavenging ship. \n\n\t\tThe air makes you cough despite your Zork-Air filter, but that's probably just dust.\n\t\t*set health %-10\n*label shuttlebay                 \n*page_break\nWhat horrors await our heroes in the shuttle bay???\n\nWill they find the answers they seek????\n\nStay tuned for the jaw-dropping conclusion!!!\n*page_break\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Starship Adventures[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\n*finish Part Two", "the_lautian_titan_part_two": "*disable_reuse\n*temp bridge_command 0\nThe shuttle bay is rather dirty, littered with a variety of tools and pieces of machinery. Under the shuttle you find the body of one of the crew members, a human who appears to have been brutally murdered based on the hammer protruding from her skull. \n*label shuttle\nFrom the shuttle bay there is a poorly illuminated corridor that appears to lead to the bridge of the ship.\n*choice\n\t*selectable_if (titan_suit \u003c 1) #Have a drink of scotch from your flask to steady your nerves.\n\t\tA good drink always gives you some courage when you need it, and the warmth and light-headedness it gives you makes you think that moving towards the bridge would be a good idea. \n\t\t*goto shuttlep\n\t#Check the corpse to see if you can find any indications of who might have killed her.\n\t\tYou check the body but it does not look like there are many clues, aside from the hammer obviously sticking out of the skull. She appears to have been servicing the shuttle when she was attacked, possibly indicating that she was caught by surprise by whoever attacked her. You decide there is not much else to see, and make your way to the bridge.\t\t\t   \n\t\t*goto shuttlep\n\t#Proceed along the narrow corridor to the bridge.\n\t\t*if crazyman =1\n\t\t\t*goto ship_bridge\n\t\t*else\n\t\t\t*label shuttlep\n\t\t\t*set crazyman 1\n\t\t\tAs you walk along the corridor towards the bridge, suddenly a man dressed in overall rags comes running down the corridor towards you, screaming madly: \"Where is my scotch?? Thieves, you stole my scotch!\" His eyes are bright red, with foam coming out of his mouth and a strange twitch vibrating through one of his arms, with which he wields a screwdriver.\n\t\t\t*choice\n\t\t\t\t*selectable_if (titan_suit \u003c 1) #Throw the man your flask of scotch, and tell him it's all his.\n\t\t\t\t\tThe man catches the flask, and avidly proceeds to open it and drink its entire content in one big gulp, before turning back to you and shouting: \"Where is the rest, and where are my marshmallows??\"\n\n\t\t\t\t\tAh, you forgot to bring any marshmallows, which would appear to make any further appeasement difficult.\n\n\t\t\t\t\t*goto kill_man\n\t\t\t\t#Take out my lazer pistol and shoot him.\n\t\t\t\t\t*if maverick \u003c60\n\t\t\t\t\t\tIt's no use. You raise your weapon but you're just not mad enough to shoot a man who doesn't have a gun. Unfortunately, he doesn't share your qualms—and he has a nice sharp screwdriver, which he uses to stab you in the chest. \n\n\t\t\t\t\t\tYou bleed profusely from the wound, which just aggravates other wounds you received earlier… it seems you have lost too much blood and you lose consciousness as the man continues to stab you in the neck…\n\n\t\t\t\t\t\tYou wake up back on board your own ship with Hint pouring colored liquids from the Auto-Doctor down your throat. She saved your life!\n\t\t\t\t\t\t*set reputation %-10\n\t\t\t\t\t\t*set health 50\n\n\t\t\t\t\t\t*goto spores_decontaminate\t\t\n\t\t\t\t\t*elseif lazer_pistol >28\n\t\t\t\t\t\t*label kill_man\n\n\t\t\t\t\t\tYou fire two quick lazer shots at him, burning holes through his head and torso and sending him flying back towards one of the sides of the corridor. \"Clearly no point talking to him,\" you mutter to yourself while you step over his body and continue on your way to the bridge. \t\t\t\t\t\t\t\t\t  \n\t\t\t\t\t\t*set lazer_pistol %+10\n\n\t\t\t\t\t\t*goto ship_bridge\n\t\t\t\t\t*elseif lazer_pistol >10\n\n\t\t\t\t\t\tYou fire two quick lazer shots at him, burning holes through his leg and torso, making him even more furious until he thrusts his screwdriver into your leg. \n\n\t\t\t\t\t\t*set health %-10\n\t\t\t\t\t\t*if health \u003c5\n\n\t\t\t\t\t\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier… it seems you have lost too much blood and you lose consciousness as the man continues to stab you in the neck…\n\n\t\t\t\t\t\t\tYou wake up back on board your own ship with Hint pouring colored liquids from the Auto-Doctor down your throat. She saved your life!\n\t\t\t\t\t\t\t*set reputation %-10\n\t\t\t\t\t\t\t*set health 50\n\n\t\t\t\t\t\t\t*goto spores_decontaminate\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\tLaughing wildly he steps back, giving you time to shoot several more times till he collapses inert in the floor, allowing you to step over his body and proceed to the bridge. \n\n\t\t\t\t\t\t\t*goto ship_bridge\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou fire two quick lazer shots, with the first one missing and the second hitting him in the leg, making him even more furious until he thrusts his screwdriver into your upper torso. \n\t\t\t\t\t\t*set lazer_pistol %+10\n\t\t\t\t\t\t*set health %-50                      \n\t\t\t\t\t\t*if health \u003c5\n\n\t\t\t\t\t\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier… it seems you have lost too much blood and you lose consciousness as the man continues to stab you in the neck…\n\n\t\t\t\t\t\t\tYou wake up back on board your own ship with Hint pouring colored liquids from the Auto-Doctor down your throat. She saved your life!\n\t\t\t\t\t\t\t*set reputation %-10\n\t\t\t\t\t\t\t*set health 50\n\n\t\t\t\t\t\t\t*goto spores_decontaminate\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\tLaughing wildly he steps back, giving you time to shoot several more times till he collapses inert in the floor, allowing you to step over his body and proceed to the bridge. \n\t\t\t\t\t\t\t*goto ship_bridge\n*label ship_bridge\n\nThe bridge of the scavenging ship is a rather messy and dirty room full of consoles that must have come from of a variety of other ships, made even less organized by their chaotic arrangement. The console lights are clashing horribly, there is smoke drifting by, and there is an unending shower of sparks in the background. \n\nThe bridge appears to have witnessed some fighting, and the main console has been smashed, probably when somebody threw the body of one of the crew members through it. Only the legs of the corpse are sticking out. \n\nThere are three poorly illuminated corridors exiting the bridge, and judging from the inscriptions on top of each they lead to the cargo deck, the crew's quarters or back to the shuttle bay. You could also see if you can operate anything in the ship from here.\n*label bridge_choices\n*choice\n\t*selectable_if (bridge_examine \u003c 1) #See if I can find anything of interest in the room.\n\t\t*set bridge_examine 1\n\t\tThe room is a mess, and the fighting clearly made it worse… however, you encounter a bottle of Hurdassian scotch, aged 100 years!. Not believing your luck you proceed to take a couple of gulps. It's really good stuff! You also find a couple of bags of Marrussian marshmallows next to them, the best in what is clearly one of humanity's favorite sweets, which you take along with you for later consumption.\n\t\t*set marshmellows 1\t\t\t\t\t\t\t\n\t\t*choice\n\t\t\t#Have a sip of the Hurdassian scotch.\n\t\t\t\tYou open the bottle and take a sip, and finally understand what makes their 100 year old stuff famous! What a scotch!\n\t\t\t\t*goto bridge_choices\n\t\t\t#Open one of the bags of Marrussian marshmallows and have one.\t\t\t\t\t   \n\t\t\t\tYou were a big fan of marshmallows as a kid, and these do not disappoint!\t \n\t\t\t\t*goto bridge_choices\t\t\t\t\t\t\t\t\n\t\t\t*selectable_if (bridge_command = 0) #Examine the console and see if it can be repaired.\n\t\t\t\t*set bridge_command 1\n\t\t\t\tYou start to inspect the command control of the ship, but whoever threw that body into it really meant to destroy it, and it is clear that it will take a lot to get this ship moving again.\n\n\t\t\t\t*if crew_member =1\n\n\t\t\t\t\tHint approaches the corpse and says, \"Organic components in the primary console appear incompatible with digital components. Suggest removing organic components if ship needs to be operated.\"\n\n\t\t\t\t\tWell, that would obviously be the start of it, but you doubt that you can be bothered with the mess that would create.\n\n\t\t\t\t\t*goto bridge_choices\t\t\t\t \n\t\t\t\t*else\t\t\t\t\t\t\t\t \n\t\t\t\t\t*goto bridge_choices\n\t*selectable_if (bridge_log \u003c 1) #Access the scavenger captain's log to see if I can find any information.\n\t\t*set bridge_log 1\t\n\t\tYou access the scavenger's log, which has not been damaged. The last entries all appear to relate to the arrival in this system, the discovery of the Lautian Titan and its exploration:\n\n\t\tEntry 234.56: I still cannot believe that we have found this beauty, how come she has been here all this time with nobody finding out about her?\n\t\t\n\t\tEntry 234.57: Rafael and Paolo have gone into the Titan, still can’t believe those idiots risked their life last week in Hurdassian VIII for a couple of packets of Marrussian marshmallows and a bottle of scotch… what a pair of idiots!\n\n\t\tEntry 234.58: Those two are back, seems the ship is a bit of a mess inside, they found a couple of semi-operational defence bots and managed to restore some atmospheric pressure to one of the compartments, the idiots even had a look around in some of the areas with their helmets off! Though they did find a stash of Zork dollars and managed to download some part of the ship's memory banks… I wonder if they're still usable after all this time?\n\n\t\tEntry 234.59: Something is wrong, Rafael has locked himself in the crew’s quarters, and is being very aggressive towards Miss Penny… Paolo appears to have sabotaged our propulsion system and is coming towards the bridge… sending out an S.O.S. signal now, will try to reason with him….\n\n\t\tThat is the last entry, which makes you wonder whether the corpse could actually be that of the ship's captain.\n\n\t\t*set captainlog 1\n\t\t*goto bridge_choices\n\t*if (Titan_memory_bank = 0) #Access the memory banks of the Titan.\n\t\t*set titan_memory_bank 1\n\t\tThe memory banks that the crew brought back appear to only be a fragment of what must have been held in the computer of the Titan ship \"Xeno-extermination Mark I\", an Imperial Lautian flagship. The memory contains information related to its final days, regarding the Lautian attempted assault on Hugghat III, homeworld of the Azzhrkak. Admiral Yargotios, in command of \"Xeno-extermination Mark I\" and the rest of the Lautian fleet, facing unexpectedly strong orbital defences and the entire remnants of the Azzhrkak Ascendancy's fleet, ordered retreat. The main body of the Lautian fleet slowly disengaged and re-assembled around the main gas giant in the system, when unexpectedly a massive cloaked Zork fleet erupted from a nearby moon and destroyed the already demoralized and battered Lautians, with only the \"Xeno-extermination Mark I\" managing to withdraw from the system, pursued by the Zorks. \n\n\t\tYou wonder whether anybody else actually knows that it was the Zorks who ultimately destroyed the Lautian fleet at Hugghat III millennia ago. They always seemed so nice!\n\t\t*goto bridge_choices\n\t#Decide I've had enough of this ship, quickly return to the shuttle bay and then go back to my ship.\n\t\tYou've had enough of this wreck, and you head back towards your own beautiful red vessel. \n\t\t\n\t\t*goto return_ship\n\t*selectable_if (cargo \u003c 1) #Proceed to the cargo deck.\n\t\t*set cargo 1\n\t\tYou proceed to walk down one of the corridors from the bridgeuntil you reach the cargo deck, a vast room that occupies a sizable proportion of the ship. It is almost empty, aside from a pile of empty containers on one side of the room and two containers close to the entrance, with inscriptions that read \"Titan salvage.\"\n\t\t*label cargo_choices\n\t\t*choice\n\t\t\t#Look to see if I can find something of value inside the containers.\n\t\t\t\tYou check the containers and find that one of them holds a stash of Zork dollars, very old ones by the look of them. [i]Could they be thousands of years old?[/i] This is not surprising as already millenia ago Zork dollars were one of the most used currencies in the galaxy, though you wonder whether they can still be used.\n\n\t\t\t\t*if crew_member = 1\n\t\t\t\t\tHint takes a look at the dollars and explains to you, \"Captain, these dollars are from before the time I was built, but Zorks do not retire their old denominations, so they should still be valid.\"\t\t\t\t\t\t\t\t\t\t\t   \n\n\t\t\t\t\t*goto take_money_or_not\n\t\t\t\t*elsif crew_member =2\n\t\t\t\t\tJim takes a look at the dollars and yells, \"Laughing Lautians! That's a big stash of dollars… I once saw somebody pay for a drink with those, so they should still be valid!\"\n\t\t\t\t\t*goto take_money_or_not\n\t\t\t\t*else\n\t\t\t\t\t*label take_money_or_not\t\t\t\t\t\t\t\t\t\t\t   \n\n\t\t\t\t\tHowever, the question is, would it be okay for you to take the money, given that it probably originated from the Lautian Titan?\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Absolutely. What good is money to dead people?\n\t\t\t\t\t\t\tYou put all the Zork dollars in your backpack, smile to yourself about your good fortune and look around for anything else of value, though it seems there is not much else here. \t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t*set maverick %+10\n\t\t\t\t\t\t\t*set wealth +300\n\t\t\t\t\t\t\t*goto cargo_choices\t\t\t\t\t\t\t\t\t\t\t\t   \n\t\t\t\t\t\t#No, regulations state anything originating from an abandoned ship is potentially dangerous.\n\t\t\t\t\t\t\t*set maverick %-10\t\t\t\t\t\t\t\t   \n\t\t\t\t\t\t\t*goto no_money  \n\t\t\t\t\t\t#No, somehow it is immoral to take the possessions of dead individuals, even if they died thousands of years ago.\n\t\t\t\t\t\t\t*set maverick %-5 \n\t\t\t\t\t\t\t*label no_money\n\n\t\t\t\t\t\t\tYou push the container aside, stand up, and see if you can find anything else of interest in the area.  \t\t\t\t\t\t\t\t\t\t\t\t   \n\n\t\t\t\t\t\t\t*if crew_member =2\n\t\t\t\t\t\t\t\tJim looks at you in utter disbelief, and shouts out, \"For all the Gold in Gnassos II, why are we not taking the money??\"\n\n\t\t\t\t\t\t\t\tWith this he kicks one of the boxes, spilling a collection of bric-a-brac throughout the floor of the cargo deck.\n\t\t\t\t\t\t\t\t*set crew_morale %-10\t\t\t\t\t\t\t\t\t\t\t\t\t   \t\t   \n\t\t\t\t\t\t\t\t*goto cargo_choices\n\t\t\t\t\t\t\t*if crew_member =3\n\t\t\t\t\t\t\t\tJoe shouts incredulously at you as you turn your back on the stash of Zork dollars. \"What?? We are not going to take any of this money? Can you explain this to me again??\"\n\t\t\t\t\t\t\t\t*set crew_morale %-10\t\t\t   \n\t\t\t\t\t\t\t\t*goto cargo_choices\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*goto cargo_choices\n\t\t\t#Return to the ship's bridge.\n\t\t\t\t*label return_ship_bridge\t\t\t\t\t\t\t\t\t   \n\n\t\t\t\tYou slowly return to the bridge of the scavenging ship, which looks exactly the same as when you first entered it. From here there are three poorly illuminated corridors that exit from the bridge, leading to the cargo deck, the crew's quarters or back to the shuttle bay where you left your own shuttle. \n\n\t\t\t\t*goto bridge_choices\n\t*selectable_if (crew_quarters \u003c 1) #Proceed to the crew's quarters.\n\t\t*goto crew_quarters\n*label crew_quarters\n*set crew_quarters 1\n\nYou walk along the poorly illuminated corridor until you reach a reinforced door, which would normally open with the help of a small gritty control panel on the wall, but it's been smashed. \n*label crew_quarters_door_choices\n*choice\n\t*selectable_if (crew_member =1) #Ask Hint to see if she can open the door.\n\t\tHint extends one of her arms to the control panel, proceeds to dismantle it and after a few seconds playing around with its interior, the door slowly opens. \n\t\t*set hint %+10\n\t\t*goto enter_crew_quarters\n\t*selectable_if (crew_member =2) #Ask Jim to see if he can open the door.\n\t\tJim grunts, hits the control panel with the side of his lazer gun to expose its interior, and then fires his lazer inside it. Sparks cover the entire area as the door slowly opens. [i]Why hadn't I thought of that? [/i]\n\t\t*set jim %+10\n\t\t*goto enter_crew_quarters\t\t\t   \n\t#Fire your lazer gun at the door.\n\t\tYou fire repeated shots at the door, though it seems to be rather strong and all you manage to do is to make small dents on it. \n\t\t*set lazer_pistol %+10\n\t\t*goto crew_quarters_door_choices\n\t#Return to the bridge.\n\t\tYou give up attempting to open the door and decide to return to the bridge.\t\n\t\t*set curiosity %-10\n\t\t*goto return_ship_bridge\n*label enter_crew_quarters\n\nThe crew's quarters look slightly more hospitable than the rest of the scavenging ship, though it appears there has been some fighting in the area and multitude of objects lie scattered about, with a couple of corpses hanging on various pieces of furniture in impossible postures. \n\nSuddenly, from behind one table a man springs up, dressed in dirty overalls stained with blood:\n\n\"Miss Penny, is that you? Who are you? Where are my marshmallows??\"\n\nThe man dodges the table and starts to approach you, picking up a kitchen knife from the floor. It's stained with blood, making it match the color of his eyes.  \n\n*if crew_member =2\n\tBefore you have any time to act, Jim fires a series of lazer shots that sends him flying backwards till he hits one of the walls. \n\n\t\"Bulging Biltonians! Another one of these lunatics! And what is it with cravings in this ship??\"\n\n\t*goto crew_choices\n*elseif crew_member =3\n\n\tBefore you have any time to act, Joe fires a series of lazer shots at the man, which only appear to enrage him further. Marveling at the complete incompetence of your crewman, you take out your lazer pistol and start firing yourself.\n\n\t*goto crew_charge_choices\n*else\n*label crew_charge_choices\n\n*choice\n\t*selectable_if (marshmellows > 0) #Throw him a packet of the marshmallows you found in the bridge of the ship.\n\t\tThe deranged man catches the packet of marshmallows, opens it and proceeds to place as many as he can inside his mouth, while continuously uttering \"marshmallows\" till he can really not say much. He then looks at you again and tries to speak, though the marshmallows in his mouth prevent you from understanding anything.\n\n\t\t*goto kill_man_crew_quarters\n\t#Take out your lazer pistol and shoot him.\n\t\t*if lazer_pistol >28\n\t\t\t*label kill_man_crew_quarters\n\n\t\t\tYou fire two lazer shots at him, burning a hole through his chest and his neck, sending him flying backwards towards one of the tables, and scattering even more objects around the room. \n\n\t\t\t*goto crew_choices\n\t\t*elseif lazer_pistol >24\n\t\t\tYou fire two lazer shots at him, burning a hole through his leg and arm, making him scream in agony, while he madly thrusts his knife through your arm. \n\n\t\t\t*set health %-10                      \n\t\t\t*if health \u003c5\n\t\t\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier… it seems you have lost too much blood. You lose consciousness as the man continues to stab you in the neck…\n\n\t\t\t\tYou wake up back on board your own ship with Hint pouring colored liquids from the Auto-Doctor down your throat. She saved your life!\n\t\t\t\t*set reputation %-10\n\t\t\t\t*set health 50\n\t\t\t\t*goto spores_decontaminate\n\t\t\t*else \n\t\t\t\tYou proceed to kick him strongly in order to keep him away, while you fire a number of shots that finish him off. \n\n\t\t\t\t*goto crew_choices\n\t\t*else\n\t\t\tYou fire two quick lazer shots, with the first one missing and the second hitting him in the leg, making him scream in agony, while he madly thrusts his knife through your neck.\n\t\t\t*set lazer_pistol %+10  \n\t\t\t*set health %-50                      \n\t\t\t*if health \u003c5\n\n\t\t\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier. It seems you have lost too much blood…\n\n\t\t\t\tYou wake up back on board your own ship with Hint pouring colored liquids from the Auto-Doctor down your throat. She saved your life!\n\t\t\t\t*set reputation %-10\n\t\t\t\t*set health 50\n\n\t\t\t\t*goto spores_decontaminate\n\t\t\t*else \n\t\t\t\tYou proceed to kick him in order to push him away, while you fire a number of shots that finish him off. \n\n*label crew_choices\n\nThe crew's quarters are thus even messier and more cluttered than when you first entered. You notice that from the central area there are a number of small doors that lead into small living quarters for each crew member, all of which are open except for one locked door. However, the security systems on the locks are of quite poor quality and you reckon that given its type you could easily open it if you fired a shot at its control panel.\n\n*label crew_choices2\n*choice\n\t#Look to see if you can find something of value among the corpses and other furniture.\n\t\tYou find a number of magazines, kitchen appliances, lots of (mostly broken) coffee and tea bags, random pieces of clothing and other personal objects, yet nothing of much value. \n\t\t*goto crew_choices2\n\t#Return to the ship's bridge.\n\t\t*goto return_ship_bridge\n\t#Fire a shot at the control panel to open the locked door.\n\t\tThe panel lights up in fire, with sparks spreading throughout the entire area as the door quickly opens, revealing a rather neat and tidy room, with a beautiful blonde woman in rather revealing overalls sitting on the bed. It would be a peaceful scene if it weren't for the fact that the walls of the room have been scribbled on all over with paintings of monstrous figures. \n\n\t\t\"Oh, so nice to have visitors, it's been so long since I've seen anybody….\"\n\n\t\tAs she says this the woman stands up and starts to come closer to you, smiling.\n\n\t\t*if crew_member =2\n\t\t\tBehind you, Jim quietly whispers in your ear, \"Something is really funny here, what was she doing inside here with that other bloody lunatic outside? And what is she carrying in her hand???\"\n\n\t\t\tYou notice that she is indeed carrying something, though you cannot see exactly what it is\n\n\t\t\t*goto blonde_choices\n\t\t*elseif crew_member =3\n\t\t\tBehind you, Joe  whispers in your ear, \"Wow, what a gal! We should take her back, it would be nice to have another girl around rather than just Samantha!\"\n\n\t\t\tYou notice that she is carrying something, though you cannot see exactly what it is.\n\n\t\t\t*goto blonde_choices\n\t\t*else\n\t\t\t*goto blonde_choices\n*label blonde_choices\n*choice\n\t#Ask her what she is doing in here alone.\n\t\tShe continues to smile at you while she comes closer. \"Not much, you know, just killing time by myself… I was a bit bored till you came along… Wow! I did not realize what ${hair} hair you have!\"\t\t\t\t\n\n\t\t*goto blonde_choices\n\t#Ask her who was the crazy guy outside and why he wanted marshmallows.\n\t\tShe continues to smile at you while she comes closer. \"Oh, that? That was Rafael, you know, he goes crazy at times but I can handle him, though this time he was a bit crazier than normal and thought everybody had stolen his marshmallows… which are of course in the bridge, poor thing….\"\t\t\t\t\n\t\t*choice\n\t\t\t#\"Well, it's good to know you are doing well, but please do not come any closer.\" \n\t\t\t\tAs you say this she stops smiling, time enough for you to realize that her eyes look slightly red, as she says, \"But if I don't come closer I cannot use these to open up your veins and drink your blood!\"\n\n\t\t\t\tShe reveals a pair of scissors that she was holding in her hand, and charges at you. \n\n\t\t\t\t*goto kill_blonde\n\t\t\t#\"Marshmallows, why does everybody have a craving for something inside this ship. Do you have a craving for anything?\"\t\t\t\t  \n\t\t\t\tWhen you say this, she smiles and screams, \"Yes, your blood!!!\"\n\n\t\t\t\tAnd with that she charges towards you, using a little pair of scissors that she was holding in her hand as a weapon. \n\n\t\t\t\t*goto shoot_blonde\n\t\t\t#Shoot her.\n\t\t\t\t*label shoot_blonde\n\n\t\t\t\t*if lazer_pistol >28\n\t\t\t\t\t*label kill_blonde\n\n\t\t\t\t\tYou take out your lazer gun and fire a series of three shots at the blonde, burning a hole through her torso as she falls dead on top of the bed. \n\n\t\t\t\t\t*goto kill_blonde_choices\n\t\t\t\t*elseif lazer_pistol >24\n\n\t\t\t\t\tYou take out your lazer gun and fire a series of three shots at the blonde, which create large holes through the legs of her overalls. She screams in pain but she doesn't faint. Instead she thrusts the scissors into your arm and attempts to bite you.  \t\t\t\t\t\t\t\t\t   \t\t\t\t\t\t\t\t\t  \t\t\t\t\t\t\t\t\t  \n\t\t\t\t\t*set health %-10                      \n\t\t\t\t\t*if health \u003c5\n\n\t\t\t\t\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier… it seems you have lost too much blood and you lose consciousness as she continues to stab you in the neck…\n\n\t\t\t\t\t\tYou wake up back on board your own ship with Hint pouring colored liquids from the Auto-Doctor down your throat. She saved your life!\n\t\t\t\t\t\t*set reputation %-10\n\t\t\t\t\t\t*set health 50\n\t\t\t\t\t\t*goto spores_decontaminate\n\t\t\t\t\t*else\n\t\t\t\t\t\tYou are about to punch her back to keep her away from you, before realizing it's impolite to hit a gal, so you push her onto the floor while firing one last shot at her head to keep her down. \n\t\t\t\t\t\t*goto kill_blonde_choices\n\t\t\t\t*else\n\t\t\t\t\tYou take out your lazer gun and fire a series of three shots at her, two of which miss their target and only one hitting her leg. She screams in pain but unlike you would expect from somebody like Samantha, she does not faint but instead thrusts the scissors into your neck, as she tries to bite your arm. \n\t\t\t\t\t*set health %-50                      \n\t\t\t\t\t*if health \u003c5\n\n\t\t\t\t\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier… it seems you have lost too much blood and you lose consciousness as she continues to stab you in the neck…\n\n\t\t\t\t\t\tYou wake up back on board your own ship with Hint pouring coloured liquids from the Auto-Doctor down your throat. She saved your life!\n\t\t\t\t\t\t*set reputation %-10\n\t\t\t\t\t\t*set health 50\n\t\t\t\t\t\t*goto spores_decontaminate\n\t\t\t\t\t*else \n\t\t\t\t\t\tYou are about to punch her back to keep her away from you, before realizing it's impolite to hit a gal, so instead you fire one last shot at her head to keep her down. \n\t\t\t\t\t\t*goto kill_blonde_choices\n*label kill_blonde_choices\n\nYou stare around the room and realize that the strange scribbles on the wall are quite disturbing, so you decide to leave the area. \n*choice\n\t#Return to the ship's bridge.\n\t\t*goto return_ship_bridge\n\t#Make your way back to the cargo deck and return to your own ship.\n\t\t*goto return_ship\n*label return_ship\n*if Titan_suit >0\n\n\tYou re-open the hatch and return to your ship. It always feels good to get back home! You then take off your space suit and return it to its place. While doing this, you think again about the Lautian Titan battleship, and decide to run a scan of the space suit, just in case.\n\n\tThe scan reveals some type of spore attached to its surface. You immediately seal the suit inside a vacuum chamber, and proceed to call Samantha in the cockpit, sending her a scanned sample of the spores. Her face appears in one of the display screens, visibly affected and with tears running from her eyes.\n\t*label spores_decontaminate\n\t\n\t\"Captain,\" says Samantha, \"our close-range scanners show biological warfare spores, which are capable of infecting a wide range of carbon-based life-forms. You might have been infected, and you'll have to be placed in quarantine for a week. I am looking for a remedy in all Zork databanks that we have, and it seems that you are going to have to take some really strong drugs, they might make your trips to the toilet a bit… unpleasant. Sorry, but we have to establish that all the spores are gone or we risk infecting the entire ship.\"\n\t*if crew_member =0\n\n\t\tBiological warfare! You hate that sort of stuff. It's not the first time you've been at risk of such things. You spend a few days playing games on your data pad and staring at the ceiling of the Cargo Bay.\n\n\t\t*set health %+30\n\t\t*goto end\n\t*elseif crew_member =1\n\n\t\tBiological warfare! You hate that sort of stuff. It's not the first time you've been at risk of such things. You spend a few days playing chess with Hint and Fuzzy. \n\n\t\t*set health %+30\n\t\t*goto end\n\t*elseif crew_member =2\n\n\t\tBiological warfare! You hate that sort of stuff. It's not the first time you've been at risk of such things. You spend a few days stuck in quarantine with Jim, who's not the most sociable of characters in any circumstances. He turns a chalky white when he sleeps, which just doesn't look right.\n\n\t\t*set health %+30\n\t\t*goto end\n\t*else\n\n\t\tBiological warfare! You hate that sort of stuff. It's not the first time you've been at risk of such things. You spend a few days listening to Joe's idiotic tales, which almost drive you crazy by the time you can finally get out. \n\n\t\t*set health %+30\n\t\t*goto end\n*elseif captainlog = 1\n\tWhile you return to your ship you remember the voice of the scavenger ship's captain when you accessed his log, and wonder whether something similar could happen to you and your crew. You immediately get an emergency kit and extract some of your blood, sending a scanned sample to Samantha at the cockpit. Her face appears in one of the display screens, visibly affected and with tears running from her eyes.\n\t*goto spores_decontaminate\n*else \n\tYou re-open the hatch and return to the cockpit, where Samantha gives you a massive hug. \"Captain I thought you'd never make it back!\"\n\n\tWhat a gal! You smile back at her and ask her to pass you your flask of scotch. \n\t\n\t\"But, Captain, you always take your flask with you.\"\n\t*set sam %-10\n\t\n\tThis leads to a heated argument regarding the whereabouts of your scotch, which makes you increasingly angry until you realize that she has stolen your scotch. That is the moment at which you take out your lazer pistol and shoot her. Jim and Joe, alarmed, come to the cockpit… maybe they were also part of this scheme to steal your precious liquid? You shoot them both just in case, till you are left only with Hint and Fuzzy. You keep shooting until both of their bodies melt together into one huge lump. They would have liked to see it! Finally you are left by yourself in the ship, wandering around looking for your scotch until you eventually pass out from hunger, with the biological spores you picked up in the scavenging ship slowly consuming your mind.  \t\t\t\t\t\t\t \n\t*page_break\n\tYou wake up with Hint pouring colored liquids from the Auto-Doctor down your throat. She saved your life! Luckily your rampage was just a delusion or someone could have gotten hurt!\n\t*set reputation %-10\n\t*set health 50\n\t*goto end\n*label end\n\nAfter that you decide that the dangers of the wrecked ship clearly outweigh any further exploration and you decide to set course elsewhere. \n*page_break\n*if crew_morale > 70\n\t*achieve team\n\t\n\tThe entire crew gathers in the lounge. \"We need to talk,\" says Samantha. \"All of us. I'm afraid you're all in terrible danger.\"\n\n\t\"We're carrying something more dangerous than spores,\" she says earnestly. \"Knowledge! While you were in the ship I hacked into the Titan's databases. I've suspected for a while now that the Zorks attempted to destroy the Lautian civilization, and now I have proof! All I have to do is finish translating it.\"\n\n\t\"Right,\" you say weakly, wondering what the Jingling Zorks she's talking about. \"Well I for one am in need of a [i]lot[/i] of colored liquids to get me feeling better.\"\n\t*set health 99\n\t*goto bittybit\n*else\n\n\tThe others gather in the lounge but they're clearly waiting for you to leave the room so they can talk about you. After waiting over an hour, you give up and head to the bridge, where Hint immediately surrenders the flashing consoles and zooms away to join the others. [i]What could be so important that they need to talk about it right away? And why didn't they trust me enough to invite me to join them?[/i]\n\n\t[i]Maybe Jim is right. Maybe I'm just not the captain my father was.[/i]\n\n\tYou go and drink a [i]lot[/i] of colored liquids to get yourself feeling better.\n\t*set health 99\n*label bittybit\n*page_break Episode Nine\n\nIf you wish, you may visit the Special Features page now. \n\nWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\nWhere to, Captain?\n*choice\n\t#On with the adventure!\n\t\t*finish Episode Nine\n\t#Take me to the Special Features.\n\t\t*goto_scene commentarya"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
        finished: this.finished, temps: this.temps, _para: this._para,
        _pending_scene: this._pending_scene, _resume: this._resume,
        initial_commands: this.initial_commands, stats: Object.assign({}, this.stats),
      };
      try {
        this.scene = this.load_scene("choicescript_stats");
        this.line_num = 0;
        this.indent = 0;
        this.finished = false;
        this.temps = this._freshTemps();
        this._para = [];
        this._pending_scene = null;
        this._resume = null;
        this._in_stats = true;
        this._runStatsLoop();
      } finally {
        this._in_stats = false;
        this.scene = saved.scene;
        this.line_num = saved.line_num;
        this.indent = saved.indent;
        this.finished = saved.finished;
        this.temps = saved.temps;
        this._para = saved._para;
        this._pending_scene = saved._pending_scene;
        this._resume = saved._resume;
