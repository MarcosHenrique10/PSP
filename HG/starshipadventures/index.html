le, so once you pop the side panel you see instantly that the flashing blue button marked \"communications\" is now rigged to cause a small but deadly explosion. The back of the console is heavily shielded, protecting whoever presses the button… if they're standing in the right place.\n\t\t\t\n\t\t\t\"Nice work, Samantha,\" you tell her. \"Very science-y.\"\n\t\t\t\n\t\t\t\"Thanks,\" she says.\n\t\t\t\n\t\t\t\"Ah HAH!\" says the Master Alchemist, popping up from underneath your console. \n\t\t\t\n\t\t\t\"How long have you been down there?\" you exclaim.\n\t\t\t\n\t\t\t\"Too long,\" he snarls. \"But now my hour has come! Prepare to meet your doom!\"\n\t\t\t\n\t\t\tHe pulls a rotating lightning/freeze ray gun from behind his back and points it right at you.\n\t\t\t\n\t\t\tYou grab Samantha and dive behind her unconnected console, reaching up one arm to press the flashing blue button.\n\t\t\t\n\t\t\tSamantha's defensive explosion rips through the bridge, leaving nothing but a smoking crater where your most active arch-enemy was standing.\n\t\t\t\n\t\t\t\"Are you all right?\" you ask Samantha.\n\t\t\t\n\t\t\t\"Yes,\" she says breathlessly.\n\t\t\t\n\t\t\tYou remember Hint and turn to see her looking… exactly the same. \"Hint… you're all right! How?\"\n\t\t\t\n\t\t\tSamantha smiles. \"Glistenosity,\" she says. \"Or, more accurately, an energy disruption field of my own devising. The nixorin was expensive, but absolutely worth it in the end.\"\n\t\t\t\n\t\t\t\"Huh,\" you say. \"Oh, and where's Joe?\"\n\t\t\t\n\t\t\tSamantha points silently to a single charred and smoking shoe.\n\t\t\t\n\t\t\t\"Well, that's that then,\" you say.\n\t\t\t*set reputation %+10\n\t\t\t*set sam %+10\n\t\t\t*set joegone 1\n\t\t\t*goto peril\n\t\t*else\n\t\t\tYou take a step towards the mysterious console, unable to resist the urge to push all the buttons your science officer has warned you not to touch. Just as your hand brushes against the beautiful flashing blue button in the middle of the console, something moves behind you!\n\t\t\t\n\t\t\t\"Ah HAH!\" says the Master Alchemist, popping up from underneath your own console. \n\t\t\t\n\t\t\t\"How long have you been down there?\" you exclaim.\n\t\t\t\n\t\t\t\"Too long,\" he snarls. \"But now my hour has come! Prepare to meet your doom!\"\n\t\t\t\n\t\t\tHe pulls a rotating lightning/freeze ray gun from behind his back and points it right at you.\n\t\t\t\n\t\t\tSamantha grabs you and dives behind her unconnected console, reaching up one arm to press the flashing blue button.\n\t\t\t\n\t\t\tAn explosion rips through the bridge, leaving nothing but a smoking crater where your most active arch-enemy was standing.\n\t\t\t\n\t\t\t\"Are you all right?\" you ask Samantha.\n\t\t\t\n\t\t\t\"Yes,\" she says breathlessly.\n\t\t\t\n\t\t\tYou remember Hint and turn to see her looking… exactly the same. \"Hint… you're all right! How?\"\n\t\t\t\n\t\t\tSamantha smiles. \"Glistenosity,\" she says. \"Or, more accurately, an energy disruption field of my own devising. The nixorin was expensive, but absolutely worth it in the end.\"\n\t\t\t\n\t\t\t\"Huh,\" you say. \"Oh, and where's Joe?\"\n\t\t\t\n\t\t\tSamantha points silently to a single charred and smoking shoe.\n\t\t\t\n\t\t\t\"Well, that's that then,\" you say.\n\t\t\t*set joegone 1\n\t\t\t*set health %-10\n\t\t\t*goto peril\n\t#Get more information from Samantha.\n\t\t*if sam > 70\n\t\t\t\"How long have you known about the Zorks?\" you ask her.\n\t\t\t\n\t\t\tShe smooths her skirt, accidentally tearing the black fabric with one of her adamantium-coated fingernails. [i]That explains a lot.[/i] \"Since before I met you. I've been working undercover for years, pretending to be fantastically stupid so I could work without drawing attention or suspicion. Don't touch my console, by the way. I've… adjusted it, just in case.\"\n\t\t\t\n\t\t\t\"How can we pacify them after accidentally uncovering their true evil?\"\n\t\t\t\n\t\t\t\"Pacify them?\" she says, her perfect brow furrowing just like it used to whenever you used words longer than two syllables. \"We don't pacify them,\" she says, \"we expose them! It's the only way we might get out of this alive!\"\n\t\t\t\n\t\t\tEven though you've been near death a thousand times, this feels somehow more real. It's as if you've been watching a movie and there's only ten minutes left.\n\t\t\t\n\t\t\tYou grab your pistol and flick on your communications channel, sending out a preemptive S.O.S. that clearly states that if you stop existing, it's because the skin-harvesting Zorks have disintegrated you.\n\t\t\t*set reputation %+10\n\t\t\t*set lazer_pistol %+10\n\t\t\t*set flying %+10\n\t\t\t*goto attack\n\t\t*else\n\t\t\t\"How long have you known about the Zorks?\" you ask her.\n\t\t\t\n\t\t\tShe smooths her skirt, accidentally tearing the black fabric with one of her adamantium-coated fingernails. [i]That explains a lot.[/i] \"Since before I met you. I've been working undercover for years, pretending to be fantastically stupid so I could work without drawing attention or suspicion.\"\n\t\t\t\n\t\t\t\"You were pretending?\" you cry. \"All this time?\"\n\t\t\t\n\t\t\t\"No-one is really that stupid!\" she cries in exasperation, before her glance falls on Joe's face half-protruding from beneath Hint's bulk. \"Well, almost no-one.\"\n\t\t\t\n\t\t\tJoe takes a moment to catch up. \"Hey! This is [i]exactly[/i] why I hatched my cunning and traitorous plan against you people.\"\n\t\t\t\n\t\t\tYou and Samantha exchange glances. \"Cunning?\" you say, gesturing at his helpless position.\n\t\t\t\n\t\t\t\"He did manage to avoid being caught all this time,\" Samantha says thoughtfully. \"I think we might be doomed.\"\n\t\t\t\n\t\t\t*goto attack\n\t*selectable_if (knot != \"sam\") #Hey, where's Jim?\n\t\t\n\t\t\"Has anyone seen Jim?\" you ask.\n\t\t\n\t\t*if ((joegone != 1) and (knot = 0))\n\t\t\t*set knot 1\n\t\t\t\"Sure,\" says Joe. \"He's trussed up in the Engine Room with Fuzzy. I'm a genius with knots.\"\n\t\t\n\t\t\tYou sigh. \"You're just full of hidden depths today, aren't you?\"\n\t\t\n\t\t\tJim and Fuzzy are probably safe there for the moment.\n\t\t\t*goto peril\n\t\t\t\n\t\t*if ((joegone != 1) and (knot != 0))\t\n\t\t\t\"I already told you!\" wails Joe, slapping his hand against a bulkhead in frustration. He snatches it back with a yelp of pain. \"Why would you think I would lie to you about something like that?... I mean I guess I did kind of fib about the confibulator being lost, and I never told you about the Zorks being out to get you this whole time, or that I was working for them...I mean...um... well...\"\n\n\t\t\tHe trails off in a return to his normal sub-spectacular form.\n\t\t\t\n\t\t\t*goto peril\n\t\t\t\n\t\t*if (joegone = 1)\t\n\t\t\t*set knot \"sam\"\n\t\t\tSam shifts uncomfortably, glancing towards the bridge doors. \"I think I saw him skulking about earlier with a coil of rope headed towards the engine room. Jim was definitely down there, possibly Fuzzy as well. Perhaps Joe managed to tie them up? He seems to be full of surprises today... or he was anyway.\"\n\n\t\t\tYour brain whirls. Could Joe have really managed to tie up two of your crew members? You wish you'd known he was capable of that kind of initiative before he was reduced to a charred spot on your deck.\n\n\t\t\t*goto peril\n\t\t\t\n\t\t*goto peril\t\n\t\t\n\t#Get more information from Hint.\n\t\t\"Hint, you had a full and detailed map of Xenphuth IV even thought it was a Class Z planet. Are there any other particularly useful and obscure pieces of information your combined Zork and Lautus databanks can access for us?\"\n\t\t*if hint > 70\n\t\t\t\"Sure,\" she says. \"Before I became sentient—\"\n\t\t\t\n\t\t\t\"When did that happen?\" you blurt out.\n\t\t\t\n\t\t\t\"Well, that sentience virus… she trails off. It's infectious if robots… er….\"\n\t\t\t\n\t\t\t\"Oh!\" you say. \"Please go on.\"\n\t\t\t\n\t\t\t\"Before I became sentient,\" she says in her usual monotone, \"I assumed everyone was aware that Zorks harvested the skin of every creature that reaches the age of four.\" She pauses. \"That is, 107 Earth years. Most carbon-based life forms get extra wrinkly around that time, and their skins fetch a premium back on Zork. Non-carbon lifeforms tend to crystallize, with a similarly sought-after result.\"\n\t\t\t\n\t\t\t\"That's so gross,\" you say.\n\t\t\t\n\t\t\t\"Except of course space bats,\" she continues. \"Zorks are so desperately allergic to the calls of the space bats they tried to exterminate them. Now they can only be found near Siril One.\"\n\t\t\t\n\t\t\t\"We should go there!\" you say. \"It's not like we've never dealt with space bats before!\"\n\t\t\t\n\t\t\t\"I'm afraid it's too far away,\" says Hint. \"A Zork attack is imminent.\"\n\t\t\t\n\t\t\t\"Let them come!\" You grab your pistol and flick on your communications channel, sending out a preemptive S.O.S. that clearly states that if you stop existing, it's because the skin-harvesting Zorks have disintegrated you.\n\t\t\t*set reputation %+10\n\t\t\t*set lazer_pistol %+10\n\t\t\t*set flying %+10\n\t\t\t*goto attack\n\t\t*else\n\t\t\t\"Perhaps if you'd been a better owner, I might have been able to learn more,\" she says. Her voice is still the familiar grating monotone, but that was definitely snark.\n\t\t\t\n\t\t\t\"I'm sorry Hint. From now on, I'll treat you better.\"\n\t\t\t*set hint %+20\n\t\t\t*goto attack\n\t\t\t\n\t*selectable_if (knot != \"sam\") #Hey, where's Fuzzy?\n\t\t\n\t\t\"Has anyone seen Fuzzy?\" you ask.\n\t\t\n\t\t\n\t\t*if ((joegone != 1) and (knot = 0))\n\t\t\t*set knot 1\n\t\t\t\"Sure,\" says Joe. \"He's trussed up in the Engine Room with Jim. I'm a genius with knots.\"\n\t\t\n\t\t\tYou sigh. \"You're just full of hidden depths today, aren't you?\"\n\t\t\n\t\t\tJim and Fuzzy are probably safe there for the moment.\n\t\t\t*goto peril\n\t\t\t\n\t\t*if ((joegone != 1) and (knot != 0))\t\n\t\t\t\"I already told you!\" wails Joe, slapping his hand against a bulkhead in frustration. He snatches it back with a yelp of pain. \"Why would you think I would lie to you about something like that?... I mean I guess I did kind of fib about the confibulator being lost, and I never told you about the Zorks being out to get you this whole time, or that I was working for them...I mean...um... well...\"\n\n\t\t\tHe trails off in a return to his normal sub-spectacular form.\n\t\t\t\n\t\t\t*goto peril\n\t\t\t\n\t\t*if (joegone = 1)\t\n\t\t\t*set knot \"sam\"\n\t\t\tSam shifts uncomfortably, glancing towards the bridge doors. \"I think I saw him skulking about earlier with a coil of rope headed towards the engine room. Jim was definitely down there, possibly Fuzzy as well. Perhaps Joe managed to tie them up? He seems to be full of surprises today... or he was anyway.\"\n\n\t\t\tYour brain whirls. Could Joe have really managed to tie up two of your crew members? You wish you'd known he was capable of that kind of initiative before he was reduced to a charred spot on your deck.\n\n\t\t\t*goto peril\n\t\t\t\n\t\t*goto peril\t\n\t\t\n\n\n\n\n*label attack\n\nThen you notice the console lights aren't flashing as brightly as usual… because a shadow has fallen across the bridge… because the Zorks have arrived!\n\nYou're surrounded by sleek blue vessels. With eerie synchronization their cargo bay doors open, revealing the lazer cannons hidden inside. The Zorks are so close and so loud you can hear the irritating jangle of their crystal limbs clashing against one another.\n\n\"This is it,\" says Samantha grimly, then hums her vocal exercises as she hauls three full-size warship lazer cannons from somewhere about her person.\n\nYou stare at her. \"Just one question… where did those cannons come from?\"\n\t\t\t\nShe holds up Joe's vortex manipulator. \"Better than a handbag,\" she smiles. \"Shall we?\"\n*page_break\nThis is it… the battle for the galaxy!!! And your ship!!! And your life!!!\n\nEven you aren't good at absolutely everything in the universe. You have to think carefully and use your strongest skills when the end is so close! \n\nYou'll be overrun before you have a chance to do everything!\n\n*label what\nWhat do you do???\n*set whatnumber +1\n\n*choice\n\t#Run to find Jim!\n\t\tYou race into the Engine Room where Jim is fluorescing purple. For a moment you think he's just annoyed… then you realize that his Zork-Air filter has been hacked by the Zorks and is slowly crushing his windpipe. You whip out your lazer and carefully shoot across his Adam's apple, dislodging and destroying the deadly device!\n\t\t\t\n\t\t\"Thanks,\" he croaks. \"I gather we're being attacked by Zorks?\"\n\t\t\t\n\t\t\"Yes, Jim. I'm afraid so.\"\n\t\t*if jim > 70\t\n\t\t\t\"Samantha said that might happen. I was up all night using the last of the graxweed to make some improvements to the ship. And I want you to take this.\" He passes you his own lazer pistol. \"It's a lot more likely to shoot straight than that pea-shooter you've been playing around with.\"\n\t\t\t\n\t\t\t\"Are you sure?\"\n\t\t\t\n\t\t\tHe turns the lime green that always precedes a lecture on your personal failings.\n\t\t\t\n\t\t\t\"Never mind,\" you say quickly. \"Obviously you know what you're doing.\"\n\t\t\t\n\t\t\t\"You've done your father proud,\" he says, patting you on the head and both arms simultaneously. \"Now let's smash those Zorks.\"\n\t\t\t*set flying %+10\n\t\t\t*set lazer_pistol %+10\n\t\t\t*set crew_morale %+10\n\t\t\t*goto what\n\t\t*else\n\t\t\t*set crew_morale %+10\n\t\t\t*goto what\n\t*if (joegone = 0) #Knock Joe out so Hint isn't stuck with him!\n\t\t*if maverick > 70\n\t\t\tYou stun him with your pistol. It's just as enjoyable as you've always imagined.\n\t\t\t*set lazer_pistol %+10\n\t\t\t*goto what\n\t\t*else\n\t\t\tYou lift your pistol to fire but you just can't shoot a crew member. Not even Joe. Stupid years of training getting in your way!\n\t\t\t\n\t\t\tJoe squirms and manages to shoot at you first.\n\t\t\t\n\t\t\t\"To heck with this!\" you cry, and stun him. He slumps unconscious, and Hint can finally move freely again.\n\t\t\t*set health %-10\n\t\t\t*goto what\n\t#Run to find Fuzzy!\n\t\tFuzzy sees you coming and begs you to free his upper left arm first. You do, and he immediately taps a panel on his chest.\n\t\t\n\t\t\"What does that do?\" you ask.\n\t\t\n\t\t\"We've been waiting,\" he says cryptically.\n\t\t\n\t\tJust as you're opening you mouth to ask who \"we\" is and what they've been waiting for, you hear the crash of Zork ships exploding outside. Rushing back to the bridge, you look out the windows and see the robot army of Lautus flying to your rescue in a patchwork array of recycled ships and shuttles and cruisers.\n\t\t\n\t\tBehind them, a horde of space bats approaches, sheltered by the courageous robots!\n\t\t\n\t\tAs the bats get into range, scores of Zorks shatter into millions of pieces in response to their high-pitched squeaks and whistles!\n\t\t*goto what\n\t#Hide the scotch!\n\t\tPhew! It's safe. Now to save yourself. And the universe.\n\t\t*goto what\n\t#Perform evasive flying maneuvers! \n\t\t*if flying >40\n\t\t\t*set reputation %+20\n\t\t\tYou dodge terrifying red and purple lazer beams with consummate skill, looping around the largest ship so quickly the Zork cannons trained on you explode their own flagship!\n\t\t\t*page_break\n\t\t\t*achieve impressive\n\t\t\t*goto what\n\t\t*else\n\t\t\tYou attempt to dodge terrifying red and purple lazer beams, but it's no use! The Zorks scatter, but dozens stay within range, shooting the whole time. You just don't have the speed or skill to evade them all!\n\t\t\t*set health %-10\n\t\t\t*goto what\n\t#Scream for help!\n\t\tYou scream at the top of your lungs.\n\t\n\t\tSamantha gives you a patronizing smile. \"Hush now, and let the grown-ups take over.\"\n\t\t\t\n\t\tYou cover your ears as she screams at a volume and shrillness that can only be achieved through constant practice. To your astonishment, you see many of the closest Zorks shatter into a million pieces at the sound, leaving their ships crashing into each other and immediately bursting into flame!\n\t\t\t\n\t\tAt last the auditory onslaught ceases and Samantha gives you a cheery smile.\n\t\t\t\n\t\t\"Huh,\" you say.\n\t\t*if idealism > 70\n\t\t\t*set reputation %+30\n\t\t\tYour console crackles into life, but the viewscreen is broken and spewing black smoke. \"On our way, Captain $!{name},\" says an unfamiliar voice. \"We know you're a good egg, and we don't want you boiled alive.\"\n\t\t\t\n\t\t\t\"Who was that?\" you ask Samantha.\n\t\t\t\n\t\t\t\"I have no idea.\"\n\t\t\t*goto what\n\t\t*else\n\t\t\t*goto what\n\t#Shoot Samantha's lazer cannons at the closest Zork ships!\n\t\t*if lazer_pistol > 40\n\t\t\t[i]Boom! Kapow! Bang! Smash![/i] The Zork ships shatter and spin away like autumn leaves in a heavy wind.\n\t\t\t*set reputation %+20\n\t\t\t*page_break\n\t\t\t*achieve impressive\n\t\t\t*goto what\n\t\t*else\n\t\t\t[i]Boom! Bang! Pow![/i]\n\t\t\tThere are so many Zork ships that you can't miss… but your cannonfire isn't enough to scare them off. One of their red rays slices through your windows like a Scaldarian blade through silk and you begin to choke before Samantha slams on the green \"Forcefield\" button.\n\t\t\t\n\t\t\tIt's possible you should have turned that on earlier.\n\t\t\t*set health %-10\n\t\t\t*goto what\n\t*selectable_if (whatnumber > 5) #The Zorks are still coming! It's hopeless! Retreat!!!\n\t\tYou're covered in blood and broken glass. Outside there are broken ships and broken Zorks as far as the eye can see… but the cacophonous Zorks just keep coming!! The space bats are being killed off one by one, the robots are in disarray, and even the explosive bubbles that seem to be appearing from another plane of existence are coming less frequently!\n\t\t\n\t\tSamantha is slumped unconscious by the door. You don't see any sign of the others, and the forcefield keeping your ship together is flickering ominously. It's not a good moment to remember that your Zork-Air filter is gone, since you're likely to be hurled into space at any moment.\n\t\t\n\t\tJust as you think that, you spot one of the Zork's cannons pointed right at you. As you stare transfixed, the purple disintegration ray shoots out of the cannon… right at your broken, fragile ship and your broken, fragile self.\n\t\t*page_break\n\t\tIs your life about the end in a purple haze???\n\t\t\n\t\tWas all that science and shininess for nothing???\n\t\t\n\t\tIs this the end for our heroes???\n\t\t\n\t\tIS THERE A PART THREE?????????????????\n\t\t*page_break IS THERE A PART THREE????????????\n\n\t\tIf you wish, you may visit the Special Features page now. It is your last opportunity in this play-through, but it's easy to access the Special Features from the beginning of the gamebook or from the end of any other chapter.\n\n\t\tWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\n\t\tWhere to, Captain?\n\t\t*choice\n\t\t\t#IS THERE A PART THREE????????????\n\t\t\t\t*finish WELL IS THERE????????????\n\t\t\t#Take me to the Special Features.\n\t\t\t\t*goto_scene commentarya\n", "commentarya": "*label home\n*comment pre-writing discussion thread link make more pretty, and also links to author's other works. *link [website, no brackets]\nSpecial Features Home Page\n\nWhere to, Captain?\n*choice\n\t#Return to the Actual Story (with optional super powers).\n\t\t*goto story\n\t#Gasp at the Most Horrifying Monster Of All: The Drafts.\n\t\tA slightly-edited playable version is at \n\t\t*link http://dashingdon.com/play/Felicity/50s-scifi-collaboration-draft/mygame/\n\t\t.\n\t\t*choice\n\t\t\t#I want to return to Special Features.\n\t\t\t\t*goto home\n\t\t\t#I want to see more. (Warning: These are NOT for the faint of heart or the weak of scroll button.)\n\t\t\t\t*goto drafts\n\t#Author and Editor Commentary Pages.\n\t\tWelcome to the semi-articulate ramblings of the artists!\n\t\t*choice\n\t\t\t#\"Graxweed\" Commentary by Felicity Banks. \n\t\t\t\t*goto graxweed\n\t\t\t#\"Brain Leeches\" Commentary by Eric Moser and Felicity Banks.\n\t\t\t\tOkay, Felicity Banks here. I should probably mention that Eric Moser is my arch enemy, since we both had Hosted Games coming out in 2015 and MINE came out FIRST. \n\t\t\t\t\n\t\t\t\tI asked him for commentary and he was all, \"Ooh, I'm too busy WRITING. And EDITING. And doing STUFF.\"\n\t\t\t\t\n\t\t\t\tWhatever.\n\t\t\t\t\n\t\t\t\tFeel free to egg his house.\n\t\t\t\t\n\t\t\t\tInteresting facts about Eric Moser:\n\t\t\t\t\n\t\t\t\tHe hates puppies.\n\t\t\t\t\n\t\t\t\tHe smells like old banana peel and car exhaust.\n\t\t\t\t\n\t\t\t\tHe once scratched your grandmother's car and didn't leave a note. (Not by accident. On purpose.)\n\t\t\t\t\n\t\t\t\t*page_break Special Features\n\t\t\t\t*goto home\n\t\t\t#\"Robot Rulers\" Interview of Adrao by Felicity Banks. \n\t\t\t\tFelicity: How long did your first draft take to write?\n\n\t\t\t\tAdrao: Can't really remember, it was a bit of a daze as I had other stuff on at the time… Crazy month yet somehow those are when you get most of the work done!\n\n\t\t\t\tFelicity: What inspired you to join this collaboration?\n\n\t\t\t\tAdrao: I'm in academia and often the only way I get things done is when I work with other people, who push me to finish things (deadline driven…). I was wondering why it's taking me so long to finish my own game (\"the Nebula\", in WIP section) and I reckon it's the lack of collaboration… Also I needed a bit if a change from that, after this project I got energy again to work on the nebula!!\n\n\t\t\t\tFelicity Banks: What inspired you to write this particular story?\n\n\t\t\t\tAdrao: Robots of Latus was inspired by a Dr. Who take of a planet-library, reoccurring themes in Ian banks novels about sublimation of advanced races, and a roleplay game going on in Starbase Orion game…\n\n\t\t\t\tFelicity Banks: What made the collaboration succeed?\n\n\t\t\t\tAdrao: No 1: You!! I think without your energy and enthusiasm none of this would have been possible!!\n\n\t\t\t\tFelicity Banks: What could have made it work better?\n\n\t\t\t\tAdrao: I thought it went quite well? \n\n\t\t\t\tFelicity Banks: What is your advice to people attempting to do a collaborative game?\n\n\t\t\t\tAdrao: There needs to be a team leader who is enthusiastic, flexible and can push people just enough to get things done \n\n\t\t\t\tFelicity Banks: It takes very flexible, humble people to work with me. Otherwise it all ends in tears. I'm very lucky to have found you all, and made a beautiful thing (not that it's done yet...)\n\n\t\t\t\tFelicity Banks: Do you have other stories and/or games available?\n\n\t\t\t\tAdrao: Well I'm working on the nebula but would be happy to start a collaborative project with 1-2 other people!!! Any ideas?\n\n\t\t\t\tFelicity: Oh look! A shiny thing! *runs away*\n\t\t\t\t*page_break Special Features\n\t\t\t\t*goto home\n\t\t\t#Editorial Rambling in Lieu of \"Space-Bat\" Commentary.\n\t\t\t\tFelicity Banks in Private Thread: Things to keep in mind while editing:\n\t\t\t\t-no dying until the climax, as per Choice of Games style guide. \n\t\t\t\t-aim for decisions more frequent than every 400 words (but don't stress if it's too hard to do)\n\t\t\t\t-the robot Fuzzy appears at a certain point and is dating Hint.\n\t\t\t\t-Joe and/or Samantha may have secrets - villainy / intelligence respectively.\n\t\t\t\t-we probably need more -curiosity\n\t\t\t\t-we have new stats of maverick (opposed to By the Book) and Crew Morale.\n\t\t\t\t-Numbers can always be sorted later. \n\n\t\t\t\tSome stylish things to include if you like:\n\t\t\t\tDoctor had a dramatic title and intro to his story, plus a suspenseful cliffhanger about halfway through. \n\t\t\t\tHe also invented a colourful range of cussing expressions, eg Jumping Jupitarians. We can imitate those.\n\t\t\t\tSamantha inspires the MC to comment \"What a gal\" every so often. She owns a number of skimpy black dresses that are constantly getting torn in a sexy yet modest manner. She screams and/or faints plenty.\n\n\t\t\t\t-Ignore all the above and just try to write well :-)\n\t\t\t\t*page_break Special Features\n\t\t\t\t*goto home\n\t\t\t#\"To Die or Not to Die?\" Edited Behind-the-Scenes Discussion, as opened by Jacic.\n\t\t\t\tJacic: Just an opinion, I'm not a huge fan of the unexpected death scenes given the genre we are writing for where the main hero always seems to come out alive in the end. A lot of people are going to choose silly options. I was really enjoying the bat story, chose a mop, whoops dead and have to go back to the begining. Maybe make it a drop in health instead? Just my opinion though, happy to be out voted on that one!\n\t\t\t\t\t\n\t\t\t\tEric Moser: Yes, [using fairmath for health] would make it impossible to die but I thought that was the point. With this sort of silly/lighthearted game, don't we want to encourage readers to take chances and choose silly options without worrying about dying and having to restart?\n\n\t\t\t\tJacic: I like [Eric]'s idea for non-lethal consequences. Another would be to make it an achievement to end with a very low or high health stat or even combine the two if some of the consequences become difficult to write into the main text. \n\n\t\t\t\tIt was just my feeling in these sort of shows you know that even if they go up against a godzilla monster with a piece of baling twine, somehow they'll make it out alive :-)\n\n\t\t\t\tAnother option if there has to be death scenes, would be to really ham it up with a warning in the option- ie heroically scrifice yourself for your crewmates by attacking a terrifying monster with nothing but fragile looking mop. \n\n\t\t\t\tOr if you do pick the mop option have a \"This will result in certain death, even for one of your incredible captaining abilities. Are you sure? (Proceed/Go back). It was more that having sudden death for silly options will probably discourage people from picking them which is not in keeping with the majority of the story. (Not trying to pick on anyone, please don't take it that way! I have really been enjoying this project, that's the only thing bothering me.) Anyway as above, we can work it out/vote on it/whatever later :-)\n\t\t\t\t*page_break\n\t\t\t\tFelicity: Death-wise: There are excellent cases both ways for either an indestructible hero (wields baling twine versus an alien army and wins, etc—which would certainly give one an awesome reputation and is true to the genre), or an array of amusingly stupid deaths (also true to the genre, plus I found the mop VS space bat death—and the rest—rather funny and it would be a shame to lose it).\n\n\t\t\t\tThe idea of keeping the death scenes but clearly telegraphing them to the reader would normally work, but in this genre I don't think it would. Our hero is both stupid and heroic, so they ARE going to charge into things regardless of all possible warnings.\n\n\t\t\t\tUltimately, I think we should give Choice of Games the final \"vote\". In this case, their argument is clear. According to their style guide, they want the first 85% of the game to be positive—that is, your MC is indestructible until the end. When we're talking climax, we can talk about whether we want death options there or not. (This also means we can keep health as a fairmath thing, since the MC can't die until the end anyway.)\n\t\t\t\t\n\t\t\t\tJacic: I was having a think about the death scenes. Although I think it'd be nice not to have them just in my opinion (at least not until the end), I guess what was bothering me the most was the sudden nature of it. I picked it because I was thinking, \"How's he going to get out of this one with nothing but a mop? Will it be allergic to the ammonia in the mop droplets? Maybe it thinks you're suitably insane and potentially quite dangerous and runs away? Or perhaps you've been watching kung fu movies and think you can reenact the moves with a mop-staff.\" However I just got eaten without any fanfare. I know that's what'd happen in reality but maybe not to Max/Barbara captain extroadinare? (Sorry to keep bringing up this one, I'm not picking on it, it's just the only death I've run across so far, I really do like the bat story a lot which is why it was sad when it suddenly stopped). \n\n\t\t\t\tThere was no reward for picking a silly option which is sort of what gets encouraged in this book in quite a few places (Ie: who wants to check out the pretty spined purple plant in the first chapter? Or send in your robot and see if it dissolves or not rather than being responsible and cautious. It's funny (-: ). \n\n\t\t\t\tIf you're going to go death by mop, maybe make it worth the reader's time to go there with a bit more story and an achievement. For example you could race out there brandishing your mop, and to no one's surprise but your own, the bat disarms you with a flick of its wing then chomps you up. You give the space bat indigestion in the process so it up and leaves, saving the rest of your crew. Have a teary Miss Foster recommend you for a medal of bravery which is turned down since the powers that be don't want to encourage more people taking on space bats with cleaning utensils. Instead they dedicate a new module to be taught at the intergalactic university on how to best deal with large carnivorous, spacefareing creatures which includes a re-enactment of your incident with the space bat, allowing you to continue to save lives long after your death… Or something like that/or completely different, just something fleshed out and hammed up a little. Just randomly thinking out loud here \n\n\t\t\t\tThe health stat could still have (non-lethal) consequences. For example, maybe Miss Foster gets overly protective of your frail condition, or perhaps Bargle makes a power play to run the ship for a while.\n\n\t\t\t\tAgain we can vote on stuff like this. We aren't all going to agree on everything.\n\t\t\t\t*page_break The Vote\n\t\t\t\tFelicity Banks: Let's officially vote on death scenes now. I think the votes are like this (although everyone has indicated they're flexible):\n\t\t\t\tWriters:\n\t\t\t\t1. Felicity Banks: no death scenes until the climax.\n\t\t\t\t2. Doctor: abstaining/die die die\n\t\t\t\t3. Adrao: no death until the climax\n\t\t\t\t4. HornHeadFan: no death until the climax\n\t\t\t\t5. Jacic: no death until the climax\n\n\t\t\t\tOther involved people:\n\t\t\t\tMoreau gets a half vote: die die die with modifications\n\t\t\t\tTechDragon610 gets a half vote: die die die\n\n\t\t\t\tIt looks like, although most of us had fun killing off our MC is numerous thrilling ways, Jacic was right to bring up the idea that the MC should survive until the final episode. (And, the possibility of death should be STRONGLY telegraphed at that point too.) But there should definitely be non-lethal consequences for (a) stupidity and (b) very low health.\n\n\t\t\t\tDoctor: Hey, anyone who chooses a mop over a flame thrower deserves what they get.\n\n\t\t\t\tFelicity Banks: Ah, but I think anyone who attacks a space monster with a mop displays a courage and creativity that should be handsomely rewarded.\n\n\t\t\t\t(It's possible this attitude goes some way towards explaining why I'm in my 30s and have never had a real job—janitorial or otherwise.)\n\n\t\t\t\tI enjoy a gory death scene as well as the next sentient being, but it's true that it's annoying to start over just because of behaving with overwhelming silliness in an overwhelmingly silly game.\n\t\t\t\t*page_break Special Features\n\t\t\t\t*goto home\n\n\t\t\t#\"Attack\" Commentary by Felicity Banks.\n\t\t\t\tPfft. I barely remember writing this. Just wanted another hint that there was Something Afoot. And to actually see a Zork, revisit the Space Bar, and link to the Lautusians as allies. And I think there were some stats that needed to be useful at some point. And every time I read the way Adrao's robots responded to Hint like she was Marilyn Monroe it made me laugh, so the robot romance was inevitable.\n\t\t\t\t\n\t\t\t\tSee? I can be brief. \n\t\t\t\t\n\t\t\t\tSometimes.\n\t\t\t\t\n\t\t\t\tOh! And the nickname \"Fuzzy\" as something gained from a factory designation (F-ZE in this case) is absolutely a tribute to (and idea stolen from) Isaac Asimov (such nicknames being a human habit, in fact, much despised by the indominable Susan Calvin).\n\t\t\t\t\n\t\t\t\tI find the robot romance adorable. Others find it creepy. Make of that what you like. \n\t\t\t\t\n\t\t\t\tI'll say for the record that I tried [i]really hard[/i] to use expressions that were romantic without sounding like particularly gross sexual euphemisms. It was more difficult than you might think, so keep that in mind if you're considering the field of robot romance writing.\n\t\t\t\t\n\t\t\t\t*page_break Special Features\n\t\t\t\t*goto home\n\t\t\t#A flurry of messages as the last story was written by Eric Moser.\n\t\t\t\t*goto commentaryb\n\t\t\t#\"Lautian Titan\" Commentary by Adrao.\n\t\t\t\tThis story was also inspired by Ian Banks, an episode of Star Trek Enterprise with Vulcan zombies, and stuff like Alien.\n\t\t\t\t*page_break Special Features\n\t\t\t\t*goto home\n\t\t\t#\"Skin-Harvesting Monsters of Space\" Commentary by Felicity Banks.\n\t\t\t\t*goto climaxcommentary\n\n\t\t*label graxweed\n\t\tIt wasn't even my idea.\n\n\t\tSomeone said, \"Hey, let's have a game jam!\"\n\n\t\t(I said, \"It should definitely take a month, and it should definitely not be any kind of collaboration. That's far too complex.\")\n\n\t\tSomeone else said, \"Hey, let's do a collaboration!\"\n\n\t\t(I said, \"Hey, great idea. We could have a world that everyone writes stories into. That might work. You can use my Rahana world if you like.\")\n\n\t\tSomeone else said, \"Hey, how about a retro scifi or a PI story, with episodes written by different people?\"\n\n\t\t(I said, \"Yeah, a PI story. Cool!\")\n\n\t\tSomeone else said, \"Yeah, a retro scifi story. Cool!\"\n\n\t\t(I said, \"Yeah, that's totally what I said! Wait what? Scifi? Um, sure!\")\n\n\t\tLots of people said, \"It should be three days. Three days is cool.\"\n\n\t\t(I said, \"Uh huh, yep. Wait what? Okay, cool!\")\n\n\t\tLots of people figured out a date. Others dropped out. Others suggested different ideas. Different lengths of time.\n\n\t\tAbruptly and unwisely, I found myself saying, \"I'm gonna go ahead and run this 3-day retro scifi thingy. Who's with me?\" (The pre- and mid-writing discussion thread is at\n\t\t*link https://forum.choiceofgames.com/t/3-day-game-jam-in-a-shared-50s-scifi-world/10939\n\t\t. You can see in the discussion that a lot of ideas were discarded along the way, then I went back and edited the summary at the top.)\n\n\t\tLong story short, various people continued to talk and work out some details. I volunteered (begged) to write the first story.\n\n\t\tThen we did a three-day game jam and ended up with 2.5 stories. They were pretty good! This was one, [i]The Star Spawned Space-Bat of Siril One!!![/i] was another, and [i]The Robot Rulers.... of Lautus!!![/i] was the half. Eric Moser and Jacic were working on [i]Brain Leeches[/i] and [i]Nanobots[/i] but planned to give up since they didn't meet the deadline. There are many others out there with stories in various stages that didn't quite make it. Who knows what strange and wonderful (or horrible) creatures they would have been.\n\n\t\tAt a certain point, the phrase \"Hosted Game\" was mentioned aloud, and we started writing additional stories and fleshing out a more coherent arc of a plot. It was quite a journey (the private thread is around two hundred messages), and without my obsession with this game coupled with the extraordinary trust of the other writers it certainly wouldn't have gotten here.\n\n\t\tOne of the biggest challenges in the game was how to write a game that celebrated diversity but was set in the imagination of 50s TV producers. I'm delighted that the five of us come from at least three countries and two genders, which is a fine start and says a lot about the genuine goodness of the Choice of Games forum community. The game is certainly satirical (stereotypes are such a great source of humor) but even the best satirists overlap with real life far too often, and readers can't be blamed for sometimes not seeing the humor. \n\n\t\tSo I wrote a pre-game blurb to try to make it clear that any stereotypes were there for fun, not reality. We also turned Jim into an alien, and gave Samantha far more power and intelligence than anyone appears to actually notice. One of our betas wanted Sam's character to be able to be gender-flipped, but we discussed it and decided not to do that. Partly because the satire works better with her as a female, but mainly because I didn't want to go through and change every single reference to her dress/long hair/etc. Since the protagonist can choose from 3 genders, and can romance either Samantha or Joe (even if only briefly), we felt that was \"enough\" to satisfy non-cisgender readers. I also changed Jim from human to an alien (born from four women) as a nod to those who don't identify as male or female, and who aren't caucasian. Ours is a colorful world.\n\n\t\tWe had a lot of discussion about a choice early on here that was originally:\n\t\t-Pinch a jet pack.\n\t\t-Pinch a steel spacesuit.\n\t\t-Pinch Sam's bottom.\n\n\t\tAlthough the player was punished for option #3, we ultimately decided having it there made some people uncomfortable, so we altered it.\n\t\t*page_break Special Features\n\t\t*goto home\n\t#I'm finished everything, both story and features. Where's the exit to this game?\n\t\tJust push the button.\n\t\t\n\t\tYou know you want to.\n\t\t*ending\n\n*label story\nHello Captain! Here, have a drink. Relax. I'm just the voiceover. I'd never hurt YOU. \n\nWell, maybe a little.\n\nWould you like to skip ahead? You can, you know. And if you're worried that it might have an ever-so-slightly fatal effect on you later on, I can even help with that. Just choose \"Power Up\" if you'd like a little something to help you along.\n*choice\n\t#Power Up (favoring opposed stats on the left).\n\t\t*gosub superstatsleft\n\t\tOf course, Captain.\n\t\t*goto list\n\t#Power Up (favoring opposed stats on the right).\n\t\t*gosub superstatsright\n\t\tOf course, Captain.\n\t\t*goto list\n\t#Do you mean cheat!?! I'd never do such a thing!\n\t\tForget I said anything.\n*label list\nThis tale is meant to be played chronologically, but you're the captain, Captain. \n*choice\n\t#Episode One: The Graxweed Quest.... of Doom!!! by Felicity Banks\n\t\t*goto_scene felicity_banks_part_one\n\t#Episode Two: Brain Leeches.... from Outer Space!!! by Eric Moser\n\t\t*goto_scene hornheadfan1\n\t#Episode Three: The Robot Rulers.... of Lautus!!! by Adrao\n\t\t*goto_scene adrao\n\t#Episode Four: The Star Spawned Space-Bat of Siril One!!! by Doctor\n\t\t*goto_scene doctor_part_one\n\t#Episode Five: The Arch-Enemy... with the Nanobots!!! by Jacic\n\t\t*goto_scene jacic_part_one\n\t#Episode Six: The Unexpected and Unprovoked Attack!!! by Felicity Banks\n\t\t*goto_scene felicity2_part_1\n\t#Episode Seven: The Space Anomaly... from Outer Space!!! by Eric Moser\n\t\t*goto_scene space_anomaly1\n\t#Episode Eight: The Curse of the Lautian Titan!!! by Adrao\n\t\t*goto_scene the_lautian_titan_part_one\n\t#Episode Nine: The Skin-Harvesting Monsters of Space!!! by Felicity Banks (from the beginning of the episode)\n\t\t*goto_scene climax_part_one\n\t#Episode Nine: The Skin-Harvesting Monsters of Space!!! by Felicity Banks (from the bit where you might be about to die)\n\t\t*goto_scene climax_part_three\n\t\t\n*page_break\t\t\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Starship Adventures[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n*goto list\n\t\t\n*label superstatsleft\n*set idealism 100\n*set reputation 100\n*set crew_morale 100\n*set curiosity 100\n*set maverick 100\n*set wealth 10000\n*set health 99\n\n*set lazer_pistol 100\n*set flying 100\n*return\n\n*label superstatsright\n*set idealism 1\n*set reputation 100\n*set crew_morale 100\n*set curiosity 1\n*set maverick 1\n*set wealth 10000\n*set health 99\n\n*set lazer_pistol 100\n*set flying 100\n*return\n\n\n\n*label climaxcommentary\n\nThis was the main thing I wrote before actually writing the climax:\n\nI have all the stories in my hot little hands.\n\nI hope to have an edited version in the next 24 hours! I'll tell you when I do...\n\nIn the meantime, what do you want to see in the climax?\nHornHeadFan and I are using our real names as authors. Would anyone else like to use their real name?\n\nHere's what I have planned:\n-the zorks (and Joe) exposed as villains; the lautian robots join MC etc in an epic space battle.\n-using the temporal anomaly, the original lautians are also able to help (with weaponized bubbles)\n-Samantha is secretly a genius...every dumb thing she's done (even her unconnected console) is a secret weapon (and she can enlist the space bats too).\n-the MC has a (clearly-signposted) chance to actually die.\n-the MC and Samantha can end up together if they like (and if they've had a romantic moment in the space anomaly chapter).\n-Hint and Fuzzy end up together, moving to Lautus and living happily ever after.\n\n\nEveryone was happy with that, so I set to work trying desperately to be funny, exciting, mostly coherent, and to bring all the weirdnesses together.\n\nI think everything from the game fit into the climax… just.\n\nWhen the other writers began enthusiastically talking about adding more side quests and/or writing a sequel, my reaction was a polite, \"AAAAAIIIIIIOOOOOAAAAAARRRRRGGGGHHHHHH!!!!! NOOOOOOOOOOOOOOOOOOOOOOOOOOOOO!!!!!!!!!!!!!!!!!!!!!!!!\"\n\nOf course, you never know.\n\nNow is as good a time as any to say that none of us knew each other (or any of the other participants) before the collaboration happened. We all feel incredibly lucky to have been part of this game, and in some cases to have made genuine friends and/or top-notch arch enemies as well. \n\n\n*page_break Special Features\n*goto home\n\n\n*label commentaryb\n\nMessage by Felicity Banks:\n\nTick Tock Tick Tock\n\nThat's the sound of our first-draft deadline lurking in a bush near you, ready to pounce like a feral cat and bite your unprotected ankle!\n\nOkay, maybe I'm not that great at metaphors.\n\nBut, end of the month for first drafts! And then comes the long dark tea-time of the editing.\n\nUm...should I mention I've barely slept in three days?\n\nNah.\n\nMessage by Felicity Banks:\n\nIt looks like we have one more story coming in from HornHeadFan (aka Eric Moser), and then we'll launch headlong into the yawning abyss of editing. I can't wait!!\n\nA couple of basic questions (okay, there are four):\n\n1.Does anyone object to publishing it as a HG?\n\n\n2.Does anyone object to having the Zorks as an enemy, with Joe as their agent?\n\n\n3.Does anyone object to using first names for all crew members (just for consistency; the full names will be mentioned whenever appropriate)?\n\n\n4.Does anyone object to having each story set up as a two-parter in the style of Doctor's space bat story? (That is, an epic title and narrator-like intro, and a scene division at a cliffhanger, with narrator-like comments that add cheesy suspense and humour?) I'd happily write any/all of those, or let each person write their own.\n\n\nMy suspicion is that no-one objects, so SPEAK UP if you have better/different ideas. \n\nIf you've been editing away, please email me your latest version so we're all on the same page.\n\nMy plan at this stage....\n\nAs soon as the full set of tales are collected, I'll order them, write summaries to post here, and have a careful read-through for all possible contradictions (changing character names and any obvious spelling/grammar issues as I go) which I'll then list with suggestions for resolutions and maybe a potential climax outline.\n\nAfter that we'll talk about death scenes (yay/nay/only at the climax) and anything else the climax should or shouldn't have. If there's voting, writers get a vote each and onlookers get half a vote. Anyone can opt out.\n\nAfter THAT I'll write the climax and we'll all edit each other's work (to whatever extent both writer and beta are comfortable with and able to schedule in). I hope it'll be super polished and shiny by the end of September or sooner. Then we'll call in some outsiders for final beta testing.....and then submit it as a HG.\n\nRemember, everything is always negotiable.\n\n*page_break Special Features\n*goto home\n\n\n*label drafts\nIn order to avoid turning the nanobots against us once more, I have changed all * and # symbols to X and XX in order to neuter the program without completely erasing the details.\n\nObviously, the code belongs to the authors and should not be copied for use elsewhere. \n\nWhere to, Captain?\n*choice\n\t#The third or fourth draft of Episode One by Felicity Banks.\n\t\tsceneone\n\t\tXdisable_reuse\n\t\tXcomment change Jim's name. And Sam = Miss Foster.\n\t\tXcomment to self: wise decisions make a fast story...fix that. \n\t\tXcomment The health stat could still have (non-lethal) consequences. For example, maybe Miss Foster gets overly protective of your frail condition, or perhaps Bargle makes a power play to run the ship for a while.\n\t\tXcomment Since two crew members are probably keeping major secrets, and Hint is sentient towards the end (and therefore able to give the MC vital info that simply wouldn't have occurred to her to share as a \"pure\" robot), and Jim might have strong connections to pod people resources, relationship stats could have a big effect on the climax.\n\n\t\t\"Captain! Captain!\"\n\n\t\tYou lift your head from the console of your spaceship, keeping an eye on the flashing red and blue lights. \"Yes Joe? What is it?\"\n\n\t\tJoe rubs his mouth with a shaking hand. \"It's the confabulator! I'm afraid it's decoupled from the gershunter and... see for yourself!\"\n\n\t\tThe soothing dance of the console turns to a frenetic cacophony of light, accented by blaring alarms. \n\n\t\t\"Oh, heck!\" you say.\n\n\t\tJoe blanches. \n\n\t\t\"Excuse my language, Joe.\" Poor guy. He's not a bad crewman. Of course, he's not a particularly good one either. \"I'm afraid the confabulator has decoupled from the gershunter. We're going to crash!\"\n\n\t\t\"Oh no!\"\n\n\t\t\"Can you look after Miss Foster? You know how delicate her sensibilities are. And Jim's an engineer, not a therapist.\"\n\n\t\tHe takes a steadying gulp of the Earthside scotch you keep on hand for emergencies, and climbs down the hatch as Samantha Foster begins to scream.\n\n\t\tIt's tough making a living using a ship that's made entirely from second-grade mashe from the industrial planet of Paypier, but it belonged to your father and\n\t\tXfake_choice\n\t\tXXA man's got to do what a man's got to do.\n\t\tXset he \"he\"\n\t\tXset him \"him\"\n\t\tXset his \"his\"\n\t\tXset pc_is_male true\n\t\tXset gender \"man\"\n\t\tXXA girl's got to do the right thing.\n\t\tXset he \"she\"\n\t\tXset him \"her\"\n\t\tXset his \"hers\"\n\t\tXset pc_is_female true\n\t\tXset gender \"woman\"\n\t\tXXI might not be the son he expected—not exactly—but I'm the best person for the job.\n\t\tXset he \"they\"\n\t\tXset him \"them\"\n\t\tXset his \"theirs\"\n\t\tXset gender \"creature\"\n\n\t\tYou'll get your crew safely planetside or your name's not\n\t\tXif pc_is_female\n\t\tXfake_choice\n\t\tXXBarbara Baker\n\t\tXset name \"Barbara\"\n\t\tXset first_name \"Barbara\"\n\t\tXset last_name \"Baker\"\n\t\tXgoto veering\n\t\tXX____________\n\t\tXinput_text name\n\t\tXgoto veering\n\t\tXelseif pc_is_male\n\t\tXfake_choice\n\t\tXXMax Mann\n\t\tXset name \"Max\"\n\t\tXset first_name \"Max\"\n\t\tXset last_name \"Mann\"\n\t\tXgoto veering\n\t\tXX____________\n\t\tXinput_text name\n\t\tXgoto veering\n\t\tXelse\n\t\tXfake_choice\n\t\tXXBarbara Baker\n\t\tXset name \"Barbara\"\n\t\tXset first_name \"Barbara\"\n\t\tXset last_name \"Baker\"\n\t\tXgoto veering\n\t\tXXMax Mann\n\t\tXset name \"Max\"\n\t\tXset first_name \"Max\"\n\t\tXset last_name \"Mann\"\n\t\tXgoto veering\n\t\tXX____________\n\t\tXinput_text name\n\n\t\tXlabel veering\n\t\tThe ship veers sideways—the confabulator must have struck one of the fins as it decoupled from the gershunter! Calling on all your experience as captain, you\n\t\tXchoice\n\t\tXXScream as loud as I can. That always helps. Someone will rescue us.\n\t\tXset idealism %+10\n\t\tYour robot zooms up into the cockpit. \"You called, Captain?\" she says in her usual grating monotone. She was built way back in the Lautusian post-Imperialist phase, but she's reliable and always polished to a mirror-shine. \n\n\t\t\"What's our closest planet?\" you ask her.\n\n\t\t\"Xenphuth IV. Entering atmosphere... now, Captain.\"\n\n\t\t\"Is it habitable?\"\n\n\t\t\"Absolutely not, Captain.\" She attaches herself safely to the wall with one of her suction cups as the ship shudders and twists around. \"Class Z-5, Captain. Reasons for classification Z-5 include noxious gases, man-eating flora, and insects of unusual size. Zorks recommend a minimal distance of two galaxies.\"\n\n\t\t\"Ah. Well. Good to know.\"\n\n\t\t\"Will that be all Captain?\"\n\n\t\t\"Go and plug into your safety pod. And tell Jim we're crashing.\"\n\n\t\t\"Yes Captain.\" She glides back into the wide belly of the ship. \n\n\t\tYou hear Jim yell, \"Wunikoll's moons!\" followed by a crash as he's thrown sideways. If you don't think of something brilliant, you're all going to die in flames.\n\n\t\tYou go over the facts in your mind as quickly as you can.\n\t\tXpage_break\n\t\tXgoto veering\n\t\tXXPull the plug beneath the console so all those distracting lights switch off.\n\t\tMuch better! For some reason you're sliding sideways across the floor. Oh, that's right...\n\t\tXpage_break\n\t\tXgoto veering\n\t\tXXDrink a quick glass of scotch to steady my nerves.\n\t\tMuch better! For some reason you're sliding sideways across the floor. Oh, that's right...\n\t\tXpage_break\n\t\tXgoto veering\n\t\tXXCleverly steer the ship on the smoothest possible trajectory as it spins wildly towards the planet below.\n\t\tXset flying %+10\n\t\tYou push buttons in a maniacal frenzy, letting instinct take over as you trust your fingers to save everyone on board: Joe, Miss Foster, your father's old war buddy Jim Bargle, and even good old Hint, the robot. \n\n\t\tTo your surprise, the ship's headlong flight stabilizes and you glide almost peacefully towards the surface of Xenphuth IV. The planet itself is far from peaceful, featuring enormous chasms, volcanoes, and what looks like fully-grown tree armies attacking one another. A place like that could do awful things to a person's hair. Not to mention the rest of them.\n\n\t\tXlabel shakes\n\t\tThe ship shakes furiously and you immediately\n\t\tXchoice\n\t\tXXGrab the scotch so it doesn't spill.\n\t\tHey! You still haven't crashed. Fantastic!\n\t\tXgoto shakes\n\t\tXXBuckle into my seat.\n\t\tXgoto crash\n\t\tXXPeer out the window for my first—and possibly last—glimpse of a forbidden land.\n\t\tXset curiosity %+10\n\t\tIt looks like a multicolored jewel, growing lumpier and gaudier with every moment. Fascinated by the sight, you forget to buckle yourself into your seat, and you're thrown against the wall as the ship plummets into the atmosphere.\n\t\tXset health %-10\n\n\t\tXlabel crash\n\t\tMiss Foster screams like an air-raid siren as your ship rips through branches and creepers and a nest of large and extremely startled birds. The ship's nose dips sharply into a long gorge and you're sent speeding through a dried-up riverbed until at last the wild ride comes to an end and the only sound is the wheezing and popping of your ship cooling down.\n\n\t\tEven Miss Foster is silent, presumably because she's fainted—from fear, concussion, or simple lack of oxygen after sustaining a scream for fifteen minutes without pause while wearing nothing but a little black dress, which always seems to be torn in several places. What a gal.\n\n\t\tJim Bargle pokes his grizzled head through the hatch. \"You all right, Captain?\" he says, and scrambles into the cockpit without waiting for a response. He busies himself restoring the console so the lights flash once more. The console lights are more reassuring than any words. Especially from Jim.\n\n\t\t\"Where are we?\" he says. \"I could have sworn we were just passing Xenphuth IV, but we certainly wouldn't choose to land in such a cursed place.\"\n\n\t\t\"Unless the alternative was a fiery death,\" you say, with just the slightest hint of annoyance.\n\n\t\tJim sucks his teeth loudly, and you brace yourself for his unique brand of advice. \n\n\t\tYou hear murmuring from below as Miss Foster stirs back to life, assisted by Joe.\n\n\t\t\"Out with it man,\" you say to Jim. \"I know you've got something to say.\"\n\n\t\t\"Ah,\" he says solemnly, and shakes his head. \"Xenphuth IV isn't for the living. Not if you're made of meat and bone. Xenphuthians love visitors, you know. They long for the squish and crunch of foreign food. Why, your father used to tell me all about a kid your age who thought he'd snag some graxweed and never work again, but within thirty seconds of opening the ship's hatch one of the local bugs got to him.\" Jim places his hands about a foot apart. \"So big, it was, and it took just a moment to suck every drop of water from his body. A terrible thing, that was. The other men survived, they say—but they weren't men any longer. Some things weren't meant to be, and this planet is crawling with the worst of them.\"\n\n\t\t\"Graxweed,\" you say slowly. \"It's adaptable, I believe?\"\n\n\t\t\"Aye, famously so,\" Jim says, all reluctance forgotten. \"Wonderful stuff, graxweed.\"\n\n\t\t\"Could it make a new confabulator?\"\n\n\t\t\"Absolutely.\"\n\n\t\t\"That's that then,\" you say. \"Tell Miss Foster not to worry her pretty little head. I'll be back in a jiffy with a pile of graxweed that'll make each one of us rich enough to buy our own Class-A planets. \"\n\n\t\t\"Right you are, Captain,\" says Jim, and you could swear you even see the beginning of a smile.\n\t\tXfake_choice\n\t\tXXI pinch a steel suit for the protection it'll give me. The local plant life certainly isn't friendly.\n\t\tXset idealism %-10\n\t\tXset spacesuit_on true\n\t\tXXI pinch my best jetpack for the speed it'll give me. Also, flying is cool.\n\t\tXset jetpack_on true\n\t\tXXI pinch Miss Foster's backside for luck as I prepare to face the unknown. It's a good day to go gardening. May as well enjoy myself.\n\t\tXset idealism %+10\n\n\t\tChecking the Zork-Air (TM) filter in your throat and picking up your lazer pistol and a coiled rope, you summon a slightly-scuffed Hint and formally address the crew. \n\n\t\t\"How's my ship, Jim?\" you ask. \"I suspect that other than the confabulator we may have a bent fin - and judging by the sound of that engine we've got a cracked dipka to boot!\"\n\n\t\t\"Well Captain, other than the missing confabulator, we've got a bent fin. I can hammer that back into shape, but we've also got a cracked dipka with no backup. Can't fly with a broken dipka.\"\n\n\t\tJoe blanches, and for a moment you think he'll faint.\n\n\t\t\"Could you make a new dipka out of graxweed?\" you ask Jim.\n\n\t\t\"Sure can, Captain,\" Jim says, with an engineer's gleam in his eye. He doesn't seem bothered by the fact that in its unaltered form graxweed is poisonous to touch.\n\n\t\t\"It's terribly useful,\" Miss Foster comments. \"It's the secret ingredient in all the most expensive cosmetics.\"\n\n\t\t\"Right you are!\" says Jim. \"Great stuff, graxweed. That's why you can't buy a vat of it for less than a thousand Zork dollars.\"\n\n\t\tMiss Foster turns to you. \"Is it safe out there, Captain? I don't know what I'd do without you.\"\n\n\t\t\"It's not safe at all,\" you say. \"But don't worry. I'll keep my wits about me.\"\n\n\t\tYou head down to the exit hatch with Hint and seal off the rest of the ship. \"Ready to pull up some graxweed?\" you say.\n\n\t\t\"Insufficient data, Captain,\" she says. \"Xenphuth IV is known to damage Lautusian circuitry on occasion. Usually by exploding the general area where man-made technology is detected.\"\n\n\t\t\"Glad to hear it, Hint,\" you say absently, and push the comms button to farewell the three human members of your crew.\n\t\tXfake_choice\n\t\tXX\"Sit tight, men. I'll be right back with supplies.\"\n\t\tXset idealism %+10\n\t\tXX\"Sit tight, men. An uninhabitable planet like this is well worth a look around.\"\n\t\tXset curiosity %+10\n\t\tXX\"Sit tight, men. This is no place to risk more lives than necessary.\"\n\t\tXset reputation %+10\n\n\n\t\tWith that, you open the hatch and climb out onto a tree-branch that has scratched a long line in your paintwork. It's not so different from an oak, and you keep your balance easily, heading for the multicolored mat of the forest floor. The Zork-Air (TM) breathing filter in your neck constricts slightly as it protects you from anything poisonous to humans. Of course, no machine is perfect.\n\n\t\t\"Come on out Hint,\" you say. \"It's not so ba—argh!\"\n\n\t\tThe Xenphuth oak curls like a cracking whip, hurling you so high in the air you have time to admire the view of purple and green gas clouds blurring the trees before you plummet downwards with teeth-rattling speed. \n\t\tXif jetpack_on\n\t\tLuckily you thought to put on your jetpack, and you slam on the stabilizer. It shudders into life at once, turning your precipitative fall into a graceful dive. You very nearly land on your feet. \n\n\t\tHint hurtles through the air and lands in a tangle of metallic limbs beside you. \n\n\t\tXgoto hint_fall\n\t\tXelseif spacesuit_on\n\t\tYour arms and legs flail helplessly as you fall, absently noticing Miss Foster's wide-eyed stare from the window as you plummet past her and crash head-first into the ground. Luckily you thought to put on your space suit, and it has protected you from the worst of the impact.\n\n\t\tHint hurtles through the air and lands in a tangle of metallic limbs beside you. \n\t\tXgoto hint_fall\n\t\tXelse\n\t\tYou fall into the not-particularly-gentle embrace of Hint's extendable arms. She sets you on your feet. You remember that your crew is watching and manage not to immediately fall over.\n\t\tXset health %-10\n\n\t\tXlabel hint_fall\n\n\t\tThe jungle in all directions is luridly colored and chittering ominously. Time to get going.\n\t\tXchoice\n\t\tXXA planet that grows graxweed is too valuable to truly leave alone. I bet there's a full survey map in Hint's memory—so I'll ask her.\n\t\tXset idealism %-10\n\t\t\"Hint, which way is the closest graxweed?\"\n\n\t\tShe points with one hand and you set off, pistol at the ready. \n\t\tXgoto gas\n\t\tXXOoh! I'll go look at that purpley spotted thing over there—the one with the ivory spikes.\n\t\tXset curiosity %+10\n\t\tXgoto eek\n\t\tXXI'll fly up and get my bearings.\n\t\tXif jetpack_on\n\t\tXset flying %+10\n\t\tGraxweed is famous for its profusion of yellow buds. You can clearly see a patch of mottled yellow not too far away. The jetpack's fuel won't last the full journey there and back, so you'll have to walk. And avoid the enormous cloud of yellow-green gas that's directly in your way.\n\t\tXgoto gas\n\t\tXelse\n\t\tToo bad you're not wearing your jetpack.\n\t\tXgoto hint_fall\n\t\tXXI'll use my pistol to clear a path.\n\t\tXset lazer_pistol %+10\n\t\tYou set the pistol to \"disintegrate\" and fire the infamous purple beam. The dense foliage turns to ash before you, and you step forwards on your perfectly clear (though somewhat charred) path through the jungle.\n\n\t\tCrunch. \n\n\t\tCrunch. \n\n\t\tCrunch.\n\n\t\tXlabel eek\n\t\tXset health %-10\n\t\tThe orange bush with spiked and purple-spotted leaves suddenly opens up, revealing an enormous pit lined with more ivory spikes. You freeze at once and reach for your lazer, but it's too late: a long tendril whips out and wraps around your waist, dragging you forwards. As you attempt to wriggle out of its unwelcome embrace, it becomes clear that the \"teeth\" are far more than mere decoration. They hold you fast. It draws you into the pit and you hurtle downwards, screaming as you fall. You have enough time to realize that a hard landing will kill you, and then you crash into a mercifully gooey pillow of digestive slime. \n\n\t\tAll around you are the remnants of creatures that fell prey to the same bush as you. There are bugs, and various plants with legs, and meat-based organisms you don't recognize in their half-eaten state, and a full skeleton of a space bat that must have flown into Xenphuth IV's atmosphere by mistake. Even the enormous bat skeleton is gradually sinking into the mire, and you're uncomfortably awake of a prickling at the soles of your feet that indicates your footwear is dissolving. \n\t\tXlabel oops\n\t\tXchoice\n\t\tXXTime to fly.\n\t\tXif jetpack_on\n\t\tYou zoom upwards, using precious fuel but saving yourself from a horrible death.\n\n\t\tXgoto hint_fall\n\t\tXelse\n\t\tWhat a shame you didn't think to wear your jetpack today.\n\t\tXgoto oops\n\t\tXXLuckily I brought my rope.\n\t\tWithout further ado, you unsling your rope and tie a climber's knot in one end. You swing the loop onto an especially large spike and begin climbing, bracing yourself against the grooved walls as you find your next climbing spike. Finally you crawl out of the bush and find Hint waiting.\n\t\tXset reputation %+10\n\t\tXgoto hint_fall\n\t\tXX\"Hint!!\" I yell at the top of my lungs. \"Save me!\"\n\t\tOne of her retractable arms snakes down and you cling on as she hauls you out safely.\n\t\tXgoto hint_fall\n\n\n\t\tXlabel gas\n\n\t\tYou fight your way through the jungle with a song in your heart, a robot by your side, and a lazer pistol in your hand. \n\n\t\tThe time passes quickly enough, since you're embroiled in several more life-and-death struggles that stave off boredom nicely. You carry on until your path ahead is completely obscured by an enormous cloud of noxious greeny-yellow gas. As you stare at it, it gathers density, and begins to move towards you. \n\n\t\tHuh. It's actually following you. Fascinating!\n\t\t\"Hint, some more information would have been useful,\" you say.\n\n\t\tHer head turns to you with a creak. \"Yes, Captain.\"\n\n\t\t\"Well? More information?\"\n\n\t\t\"Your name is $!{name}. Your typical outfit is... \"\n\t\tXif pc_is_female\n\t\tXfake_choice\n\t\tXXA sparkly gold bra and matching sarong.\n\t\tXXA tight red shirt and matching miniskirt.\n\t\tXXJeans and a T-shirt.\n\t\tXXA floral unitard.\n\t\tXgoto decide\n\t\tXif pc_is_male\n\t\tXfake_choice\n\t\tXXA pin-striped suit.\n\t\tXXA black suit.\n\t\tXXA navy blue suit.\n\t\tXXA striped unitard.\n\t\tXgoto decide\n\t\tXelse\n\t\tXfake_choice\n\t\tXXA sparkly gold bra and matching sarong.\n\t\tXXA suit.\n\t\tXXA tight red shirt and matching miniskirt.\n\t\tXXJeans and a T-shirt.\n\t\tXXA striped unitard.\n\n\t\tXlabel decide\n\t\tXchoice\n\t\tXXI grit my teeth and ask Hint for the closest graxweed that [i]isn't[/i] blocked by deadly gas.\n\t\t\"I know what I'm wearing! What I meant was more information on a short but non-fatal path to some graxweed!\"\n\n\t\t\"Yes Captain. The shortest path to skirt the gas cloud is that way.\"\n\n\t\t\"Thank you.\"\n\t\tXgoto gorge\n\t\tXXIt doesn't look so bad. I send Hint in to see if she dissolves.\n\t\t\"Hint, go a few steps inside and do some tests.\"\n\n\t\tShe obeys, walking just far enough that you can only see her as a darker-green silhouette in the mist. You wait patiently for over twenty seconds.\n\n\t\t\"Hint? What are the results of your tests?\"\n\n\t\t\"So far, nine hundred million, sixty—\"\n\n\t\t\"Stop. What are you testing?\"\n\n\t\t\"I am testing numbers. My counting systems are fully functional. Unless my testing parameters are broken.\"\n\n\t\t\"Test the gas, Hint. Is it destroying you? Will it destroy me?\"\n\n\t\t\"Yes, Captain. It will permanently damage both of us, although not immediately.\"\n\n\t\t\"Okay. Come out.\"\n\t\tXgoto decide\n\t\tXXIt doesn't look so bad. I head inside with Hint and see how we go.\n\t\tYou start walking, and the world quickly vanishes into a green haze. The Zork-Air (TM) implant in your neck tightens uncomfortably as it attempts to filter out as much poison as possible.\n\n\t\t\"Hint, take my hand so I don't get lost. Continue towards the graxweed unless it becomes too dangerous. In which case, take me out of the cloud at once.\"\n\n\t\t\"Yes Captain.\"\n\t\tXpage_break\n\t\tXset health %-10\n\t\tXif spacesuit_on\n\t\tYou wake up in relatively clear air. \"Did we make it, Hint?\"\n\n\t\t\"Yes, Captain. Unfortunately your space suit is no longer viable.\"\n\n\t\tYou realize how light your body feels and spot the twisted, blackened remains of your protective suit on the ground nearby, still smoking as it continues to disintegrate.\n\t\tXgoto weed\n\t\tXelse\n\t\tYou wake up in relatively clear air. \"Did we make it, Hint?\"\n\n\t\t\"We're back where we started, Captain.\"\n\n\t\t\"Ah.\"\n\t\tXgoto decide\n\t\tXXThe jetpack might get me over it.\n\t\tXif jetpack_on\n\t\t\"Is the gas cloud small enough that I'd be able to fly over it?\" you ask Hint.\n\n\t\t\"Yes,\" she says.\n\n\t\t\"What's the probability I'll make it over alive?\"\n\n\t\tShe pauses. \"1 in 32,514, Captain.\"\n\n\t\t\"Ah! Just my kind of odds!\"\n\n\t\tYou zoom up and over the gas cloud, skimming the edges to prevent fuel wastage. Just as you find yourself at the peak of the pestilent mountain of cloud, it mingles with the gases from your jet pack and promptly explodes, throwing you into the air like a rotten zargroth egg hurled at an unpopular politician. The gas burns off quickly and your jetpack sputters back into partial life, but it's not enough. \n\n\t\tOnce again, you find yourself hurtling towards Xenphuth IV. \n\n\t\tOnce again, you crash-land into Xenphuth IV. \n\t\tXset health %-10\n\t\tXset boom true\n\t\tXpage_break\n\t\t\"Are you all right, Captain?\" Hint asks, still patting out spot-fires here and there. \n\n\t\t\"I'm conscious,\" you say. \"But I wish I wasn't.\"\n\n\t\t\"Shall I knock you ou—\"\n\n\t\t\"No!\" You wait until she lowers her arm and then sigh in exasperation. \"Who knew a 1 in 32,514 chance would work out so badly?\"\n\n\t\t\"I did, Captain. My mathematical processing remains undamaged. Unless my testing parameters are broken, but they appear accurate in this instance.\"\n\n\t\t\"Right, well. How to we get around the gas to the graxweed?\"\n\n\t\t\"This way, Captain.\"\n\t\tXgoto gorge\n\t\tXelse\n\t\tWhat a shame you're not wearing your jetpack.\n\t\tXgoto decide\n\n\t\tXlabel gorge\n\n\t\tYou move on quickly, outpacing the cloud of noxious gas. \n\n\t\tAfter a brief struggle with what appeared to be a field of daisies with the ability to roll up around trespassers and smother them to death, you arrive at an enormous gorge. Hint helpfully assures you that the graxweed is located just on the other side.\n\t\tXlabel try_again\n\t\tXchoice\n\t\tXXI send Hint to fetch some. I've been heroic enough today.\n\t\tXset reputation %-10\n\t\t\"My apologies Captain,\" she says. \"My programming prohibits me from moving that far from your during hazardous exploration.\"\n\n\t\t\"Even when it could save my life?\" you ask through gritted teeth.\n\n\t\t\"Yes Captain,\" she says, and a part of you is sure that grating monotone is sarcastic.\n\n\t\t\"Fine.\"\n\t\tXgoto try_again\n\t\tXXI fly across the gorge.\n\t\tXif boom\n\t\tWhat a shame you just blew up your jetpack. Oh well.\n\t\tXgoto try_again\n\t\tXelseif jetpack_on\n\t\tYou check your fuel level and limit your loop-the-loops accordingly, landing neatly just below the opposite lip of the gorge.\n\t\tXgoto weed\n\t\tXelse\n\t\tOops. Should have brought your jet pack.\n\t\tXgoto try_again\n\t\tXXI hike across the gorge. The climb will be good for me.\n\t\tXset health %+10\n\t\tThe gorge is so steep it's utterly barren. Even the plants of Xenphuth IV don't grow there. It's almost a relief to be doing hard physical work without anything trying to eat you. Calling the atmosphere \"fresh air\" would be inaccurate, but there's a smile on your face as you find yourself close to the opposite side of the gorge.\n\n\t\tXlabel weed\n\t\tHint uses her hovering setting to cross the chasm, waiting for you on the level ground above.\n\n\t\tThat wasn't so bad. You take a moment to catch your breath. \n\n\t\tThe ground trembles beneath your handholds, and you wonder if Xenphuth IV is prone to earthquakes. Then you glance back down the gorge wall and notice the cliffs on each side have an unusual—even eerie—symmetry. \n\n\t\tThe ground shakes again, and the base of the gorge suddenly closes in on itself, just like a mouth.\n\n\t\tIt is a mouth. \n\n\t\tThat certainly explains the lack of vegetation inside.\n\n\t\tXpage_break\n\t\tFor a moment you stare in paralyzed horror as the gorge continues to snap shut. Then you leap up and out, rolling and scrambling to get away in time. With an enormous crash, the two sides of the gorge come together, and there is no longer any crack in the land.\n\n\t\tStanding up, you take another few shaking steps backwards.\n\n\t\t\"The graxweed is most easily recognized by its distinctive yellow buds,\" Hint grates out, bringing you back to the mission at hand.\n\n\t\t\"Can you see any yellow buds right now?\" you ask, without turning around.\n\n\t\t\"No, Captain.\"\n\n\t\tYou turn in exasperation and see an enormous mass of tightly-furled yellow blooms. \"Hint, are your visuals set to black and white still?\"\n\n\t\t\"Yes, Captain.\"\n\n\t\t\"Remind me to get you that upgrade.\"\n\n\t\t\"Yes Captain. Don't forget to get me that upgrade.\"\n\n\t\t\"I meant—oh, never mind.\"\n\n\t\tHow much graxweed do you collect?\n\t\tXfake_choice\n\t\tXXEnough to fix the ship and get us out of here.\n\t\tXXEnough to fix the ship and get her a complete overhaul next time I'm on a decent planet. One with a bar.\n\t\tXset wealth +1000\n\t\tXset health %-10\n\t\tXXAs much as Hint and I between us can carry.\n\t\tXset wealth +3000\n\t\tXset health %-20\n\t\tThe gorge is much easier to cross now it's shut, and since you take the precaution of a running start with a leap over the business end of the enormous mouth, it doesn't open quickly enough to catch you. Unfortunately the daisy-filled meadow is ready for you this time and since you no longer have\n\t\tXif spacesuit_on\n\t\tyour spacesuit,\n\t\tXgoto arg\n\t\tXelseif boom\n\t\tyour jetpack, \n\t\tXgoto arg\n\t\tXelseif jetpack_on\n\t\tany fuel,\n\t\tXgoto arg\n\t\tXelse\n\t\tyour arms free,\n\t\tXlabel arg\n\t\tyou're torn and bloody before you make it through.\n\t\tXlabel nearly_there\n\n\t\tThe gas cloud, razor-vines, tooth-bushes, and poisonflowers each take their toll as you battle through, \n\t\tXif health \u003c65\n\t\tand you're forced to abandon some of the graxweed along the way, \n\t\tXif wealth >900\n\t\tXset wealth 900\n\t\tXgoto but\n\t\tXelse\n\t\tXgoto but\n\t\tXelse\n\t\tXset health %-10\n\t\tXlabel but\n\t\tbut at last you emerge from the treeline to see your ship, with several anxious faces at the windows.\n\n\t\tJoe emerges and shoots a creeping vine just as it's about to lasso your foot. Jim hurls a wrench at a bird, knocking it from the air before its acidic droppings cause you permanent brain damage. Miss Foster's pretty eyes spot a garnit flower just as it's about to launch a shower of deadly pods at you, and she screams with such impressive volume that it shrivels defensively, letting you pass unscathed. What a gal.\n\n\t\tAt last you're inside the ship and Jim starts boiling the graxweed down into its usable form. You shower and scrub down at once, since the sap is highly toxic to anyone who touches its unboiled form. The water runs red, and it hurts to dress. You limp back out to face the others, carefully stepping around the questing tendrils of graxweed that Joe didn't quite manage to box properly.\n\n\t\t\"Oh, Captain!\" says Miss Foster. \"You're so brave! What was it like out there?\"\n\t\tXchoice\n\t\tXselectable_if (health > 80) XX\"Lively,\" I say with a rakish grin.\n\t\tXset reputation %+20\n\t\t\"Oh, you're so brave!\" she trills. \"Er... you're bleeding quite a lot.\"\n\n\t\t\"I am?\"\n\n\t\tShe hustles you over to the wall-mounted Auto-Zork Doctor TM, who scans you and immediately gives you a sedative to drink.\n\t\tXgoto homeward\n\t\tXselectable_if (health >60) XX\"Invigorating,\" I say.\n\t\tXset reputation %+10\n\t\t\"Oh, you're so brave!\" she trills. \"Er... you're bleeding quite a lot.\"\n\n\t\t\"I am?\"\n\n\t\tShe hustles you over to the wall-mounted Zork Auto-Doctor (TM), who scans you and immediately gives you a sedative to drink.\n\t\tXgoto homeward\n\t\tXX\"Urg,\" I say, and let myself finally pass out.\n\t\tXgoto homeward\n\t\tXlabel homeward\n\t\tYou wake up feeling fuzzy but a lot less broken. Miss Foster sits at your side. The Zork Auto-Doctor (TM ) in the wall is still flashing in a judgmental fashion and dispensing further colored liquids for you to drink.\n\n\t\t\"How's the ship?\" you ask between sips of the various medicines prepared by the Auto-Doctor (TM).\n\n\t\t\"Mr Bargle is making final checks before we leave this horrid place.\" She shudders. \"Did you know you had to have stitches?\n\t\tXif health \u003c30\n\t\tAnd you have three broken ribs? And a skull fracture?\n\t\tXgoto health_bit\n\t\tXelseif health \u003c40\n\t\tAnd you have three broken ribs? And a skull fracture?\n\t\tXgoto health_bit\n\t\tXelse\n\t\tXlabel health_bit\n\t\t\"\n\n\t\t\"All fixed?\" you ask.\n\n\t\t\"As well as possible, but try not to get eaten, poisoned, or dropped for a while.\"\n\t\tXif reputation >60\n\t\tShe kisses you on the cheek. \"We wouldn't want our heroic Captain to get hurt.\"\n\t\tXgoto sure\n\t\tXelse\n\t\tXlabel sure\n\n\t\t\"Sure thing.\" You sit up—carefully.\n\n\t\t\"It turns out our original confabulator dropped onto Xenphuth IV not five minute's walk away. Joe found it just after you left.\"\n\n\t\t\"Well, that's—well. What are the odds of that?\"\n\n\t\t\"1 in 32,514. Roughly.\"\n\n\t\t\"My kind of odds.\" Suddenly you feel very, very tired.\n\n\t\t\"Where to now, Captain?\"\n\n\t\t\"Up. Anywhere that's up. Ideally somewhere with a bar. I'm going to need a drink.\"\n\t\tXif health \u003c40\n\t\tXset health 40\n\t\tXgoto endy_bit\n\t\tXelse\n\t\tXlabel endy_bit\n\n\t\tXset jetpack_on false\n\t\tXset spacesuit_on false\n\n\t\tXfinish\n\t\t*choice\n\t\t\t#Return to Special Features.\n\t\t\t\t*goto home\n\t\t\t#Return to Drafts.\n\t\t\t\t*goto drafts\n\t#Episode Two: Brain Leeches.... from Outer Space!!! by Eric Moser.\n\t\tXtitle Attack of the Brain Leeches...from Outer Space!!\n\t\tXauthor Eric Moser \n\n\t\tXcreate health 80\n\t\tXcreate wealth 2000\n\t\tXcreate idealism 50\n\t\tXcreate reputation 50\n\t\tXcreate curiousity 50\n\t\tXcreate lazer_pistol 50\n\t\tXcreate flying 50\n\t\tXcreate special_helmet \"\"\n\t\tXcreate space_sex \"\"\n\n\t\tVoiceover: \"When last we joined our intrepid band of intergalactic adventurers, the Captain had narrowly escaped the vile clutches of the man-eating plants of Xenphuth IV! Now the crew has reached the seemingly peaceful refuge of Fructocus 17, a trading post teeming with friendly merchants and exotic goods. Unfortunately, as our heroes will soon learn, appearances can be deceiving!\"   \n\t\tXpage_break\n\n\t\tYou stretch your arms out to your sides, inhaling the pleasantly sweet air of Fructocus 17. What a welcome relief! The crew desperately needed some shore leave after its most recent escape from disaster, especially Joe, your most medicore crewman lacking both a last name and any sembalance of a personality. \n\n\t\tThe aforementioned crewman leans against a ramshackle trading hut boasting a bizarre collection of purple, green and black eggs, the largest with a diameter rivaling that of your stylish fishbowl space helmet. Joe loses his footing, stumbling into an egg carton and spilling the contents, which bounce on the ground like inebriated knobjumpers from Yblaxsy Prime. The aggrieved merchant shakes her chin tentacles at Joe and chases her merchandise down the alleyway.\n\n\t\tBargle rubs his bristled jaw and mutters an obscenity about Joe's ancestory. \"I'll go haggle with the parts vendors inside. We need contingency components. After all, the next time we blow a confabulator...and there will be a next time...we may not be lucky enough to blunder into some miracle weed, huh Captain?\" Bargle punches your arm and strolls away with a swagger. \n\n\t\tSamantha Foster volunteers to take Hint to find some spare polish to keep your robotic deus ex machina shiny and immaculate. \"Oh Captain,\" Miss Foster gushes, \"won't she look just beautiful!?\"\n\n\t\tHint's monotone voice replies. \"Beauty is an illogical abstraction favored by carbon based lifeforms whose central pursuits involve the mashing together of genitalia to produce equally primitive offspring.\" She waggles her telescoping arms to mimic said genitalia.\n\n\t\tMiss Foster, your team's (highly trained?) science officer, blushes at the mere mention of genitalia and nervously smooths her mini skirt, eeking out a soft, \"Oh my!\" \n\n\t\tWith your crew parting ways to explore the trading post, you're afforded the rare opportuity to pursue your own interests without worrying about your subordinates. How will you spend your time?\n\n\t\tXchoice\n\t\tXXIndulge in exotic libations (that means alcoholic drinks) at the seedy bar. I love drinking to excess in seedy establishments! \n\t\tIt's no Earthside scotch, but that fourth round of gurgling greenish liquid hit the spot! \n\t\tXset health %+10\n\t\tXgoto joe_fruit\n\t\tXXIndulge in a romantic encounter (that means sexual stuff) with one of the resident breath-taking yet vaguely human aliens. I love making new friends!\n\t\tThat purplish skin tone and single forehead ridge combine with the postcoital itching to make this a memorable encounter!  \n\t\tXset health %-10\n\t\tXset space_sex \"yes\"\n\t\tXset curiousity %+10\n\t\tXgoto joe_fruit\n\t\tXXIndulge in some good old fashioned haggling with the merchants with the intent to score a deal on much needed supplies. I love negotiating with unsavory types!\n\t\tYou don't find any deals, but you can't resist the sleek \"Captain's Line\" helmet designed for everyday use. Per the vendor, it provides constant hair protection. Score! \n\t\tXset special_helmet \"yes\"\n\t\tXset wealth -100\n\t\tXset idealism %-10\n\t\tXgoto joe_fruit\n\n\t\tXlabel joe_fruit\n\n\t\tTwo hours later, the crew gathers by the ship. Bargle is in a foul mood, having failed in his attempt to find any confabulators, or any other parts. compatable with your ragtag cruiser. \"Bunch of crooks is what they are! And the ones that aren't crooks are spreading space tales about these brain worms or whatnot. Eh, they were probably trying to scare me into buyin' those fire lazers. Didn't work.\" He slaps Joe on the back, almost knocking your skitish crewman off his feet.\n\n\t\t\"Oh yeah,\" Bargle adds as an afterthought. \"Apparently we should steer clear of them purple aliens with single forehead ridges. Them things will apparently screw anyone or anything and carry every disease in the sector.\"\n\n\t\tXif (space_sex = \"yes\")\n\t\tGreat. Why couldn't you have gotten this warning two hours ago? You fight the urge to itch and hope someone quickly changes the subject.\n\t\tXgoto joe_fruit2\n\t\tXels
