t\"Yes, Captain,\" she says tearfully.\n\n\t\t\"Do you have any ideas on how to save your vision?\"\n\n\t\t\"Yes! Have you ever heard of Lazer Eye Surgery?\"\n\n\t\t\"No? What is it?\"\n\n\t\t\"It's basically fixing someone's eyesight with lazers.\"\n\n\t\t\"Okay, I've got it from there.\"\n\n\t\tYou take your Lazer Gun, set it to \"stun\", then fire into her left eye.\n\n\t\t\"It's working, Captain! I can see through my left eye!\"\n\n\t\tYou fire into her right eye!\n\n\t\t\"I can see again!\"\n\t\t\n\t\t\"It's good to have you back, Samantha.\"\n\t\t*set sam %+10\n\t\t*set sameye \"1\"\n\t\t*page_break\n\t\t*achieve surgery\n\t\t*goto okay\n\t#Improvise.\n\t\tYou pour a bottle of Scotch over her eyes. \"This should sterilize them.\"\n\n\t\t\"EEEEEGGGH!\" she shrieks. \"No, stop! My eyesight will probably return in time.\"\n\t\t*set sameye \"2\"\n*label okay\n\n\"Okay, now we can turn our attention to the space beast,\" you say, looking around the surprisingly well-lit and spacious utility closet.\n*choice\n\t#Grab a mop.\n\t\t*set wep \"mop\"\n\t\t*goto fight\n\t#Grab a flame thrower.\n\t\t*set wep \"flame\"\n\t\t*goto fight\n\t#Grab a half unconscious Samantha Foster.\n\t\t*set wep \"sam\"\n*label fight\n\n*if wep = \"mop\"\n\tYou charge out of the utility closet ignoring various hallucinations (the second symptom of deep space) and swing your mop at the bat.\n\t\n\tThe bat eats you in one bite, despite your improvised weapon. Who knew a mop would be so ineffective against an enormous space monster?\n\t*page_break\n\tYou wake up on the floor beside the Zork Auto-Doctor, choking on a large dose of blue liquid. \"Wh… What happened?\"\n\t\n\t\"It was amazing!\" says a bug-eyed Joe. \"Samantha tried to run and scream at the same time, and her breathlessness made her scream turn staccato. Apparently it sounded just like a bat, because that terrifying creature just vomited you up and flew away!\"\n\t\n\t\"What fabulous luck!\" you say weakly.\n\t*set health %-10\n\t*goto done\n*if wep = \"flame\"\n\tYou charge out of the closet with your flame thrower (you always knew it was a good idea to keep it in there), and spray the great beast. It explodes in an enormous fireball and flees back into space, leaving your crew forever. Maybe.\t\n\t*goto done\n*if wep = \"sam\"\n\tYou throw her with all your force at the beast. Terrified by your confidence, the bat leaves the way it came, never to cross your path again. Maybe. You hope Samantha didn't hit her head too hard.\n\t*set sam %-10\n*label done\n\nA few hours later, repairs have been made and you continue your course.\n\n\"What an amazing adventure!\" exclaims Joe.\n\n*if wep = \"sam\"\n\t\"I liked the plant one better,\" Samantha says, rubbing her head.\n\n\"How're your eyes, Samantha?\" you ask.\n\n*if sameye = \"1\"\n\t\"Much better, Captain.\"\n\t\n*if sameye = \"2\"\n\t\"Still hurt, Captain. But I'll make do.\"\n\n\"Well crew, at ease for the night,\" you say, and return to your sleep quarters.\n\n*if sameye = \"1\"\n\t*if wep = \"sam\"\n\t\t*finish Episode Five\n\t*else\n\t\tYou sit on the end of your bed thinking about your last few adventures, when your door creaks open. You look up and see Samantha standing in the doorway.\n\n\t\t\"Samantha?\" you say.\n\n\t\t\"Just wanted to thank you for today. You may have saved my vision,\" she says.\n\n\t\t\"No problem, Samantha. Just doing my job,\" you say with a smirk.\n\n*finish Episode Five", "felicity2_part_1": "*disable_reuse\nAnother day, another journey, another opportunity to rock your ${outfit}!\n\nAs our companions stop for refreshments once more, their lives are about to change forever!!!\n\nCan a robot fall in love???\n\nIs it possible for any sentient being to regard our hero with an emotion other than respectful adulation???\n\nStay tuned for the romantic whirlwind that is… The Unexpected and Unprovoked Attack!!!\n*set hair \"awesome\"\n*page_break The Unexpected and Unprovoked Attack!!!\nThe station bar orbiting Curroxios VII got you a good job last time you were there, and the choc-lime spaghetti they served was actually pretty good. Some of the vapors the aliens are imbibing look oddly enticing, although it's not always easy to read alien facial expressions, especially when not all of them have faces. There's a tentacley blob in the corner that flails more wildly with every dose of a green cube that it receives. Either the flailing is joyful, or there's a serious miscommunication happening before your eyes.\n\nOh well. You start eating your meal, enjoying the creamy chocolate contrasting with the al dente noodles and tart limes.  The news wall is transmitting images of you and your ship arriving at Lautus, and there are eye-stalks pointing your way from several directions. You've been recognized. Momentarily bashful, you look down at your plate and notice for the first time that your spaghetti noodles have rows of eyes all along their lengths. It's probably best not to think about that too hard. Luckily, you have plenty of other things to think about.\n\n*label shopping\nYou have ${wealth} Zork dollars.\n*choice\n\t*selectable_if (wealth > 1999) #The ship needs more than simple repairs, and Curroxios VII has some great Zork mechanics. It'll cost 2000 Zork dollars, but it'll be worth it to have her flying straight again.\n\t\t*set flying %+20\n\t\t*set wealth -2000\n\t\tA Zorkian approaches with a new round of drinks, and you give it a tip to organize an overhaul for you. You notice that the Zork has seven jangling glass limbs, making it gender-neutral.\n\t\t\n\t\t\"Certainly, Captain,\" it says. \"Also, there's a box waiting for you in the delivery room—from Lautus.\"\n\t\t*goto shopping\n\t#I feel a teensy bit under the weather. I'm sure the medicinal drinks here are extra powerful.\n\t\t*if health \u003c90\n\t\t\t*set wealth -100\n\t\t\tMmm, sparkly.\n\t\t\t*set health 90\n\t\t\t*goto shopping\n\t\t*else\n\t\t\t*set health %+10\n\t\t\t*set wealth -50\n\t\t\tMmm, sparkly.\n\t\t\t*goto shopping\n\t#I wonder what would happen if I ate one of those green cubes? I'm going to try one!\n\t\t*set curiosity %+20\n\t\t*set health %-10\n\t\t*set wealth -20\n\t\tA Zorkian approaches with a new round of drinks, and you take one of the green cubes and pop it in your mouth. The chiming of the Zork's many arms as it moves away, provides a musical counterpoint to the warm, swirly feeling emanating from your abdomen. \n\t\t\n\t\tYou've never really thought about your spleen before. About how beautiful it is. About how rarely you give it compliments, or a cleansing regime, or any thought at all. You begin to weep with shame, and two hours later you wake up soaked in your own drool while curled in the fetal position under the table.\n\t\t\n\t\t\"Hello again Captain,\" your server says, helping you to your feet and discreetly offering you a towel. \"Would you like another?\"\n\t\t\n\t\t\"Maybe next time,\" you say.\n\t\t\n\t\t\"Very good, Captain. If you are finished your refreshments, I can arrange any further purchases you like.\"\n\t\t\n\t\t\"Yeth,\" you say, enunciating carefully since your tongue is still twice its usual size. \"I do believe I am finithed.\"\n\t\t*goto shopping\n\t#I stand and throw my arms wide. \"Yes, it's me—Captain $!{name}. No job too hard, no fight too fearsome, no world too unspeakably horrible!\"\n\t\t*set reputation %+10\n\t\tThe tentacle thing in the corner flails applause at you (or is it a desperate plea for help?); those with eye-stalks dip them respectfully; and your Zorkian server hastens to offer you more drinks, food, and service. \n\t\t\n\t\tYou give several creatures the code to contact you if needed, and sit back with the glow of a wealthy future coming together before your eyes. With the assistance of the Zork-Talk Box, you gently rebuff the advances of the tentacle creature. [i]Maybe later.[/i]\n\t\t*goto shopping\n\t#I'm done here.\n\t\t\"Excuse me Captain,\" says your server as you gather your things. \"If you're finished your refreshments, I can guide you to the delivery room. There is a box waiting for you there—from Lautus.\"\n\n*label box\n*page_break\nIn the delivery center there is an enormous plastic crate which is addressed to you. \n*if relations_robots \u003c50\n\tAt your request, the Zork server scans the box and assured you it is not rigged to explode and contains no deadly weapons or poisons. \n\n*choice\n\t#Get the box to my ship with orders for whoever is there to take care of it.\n\t\t*set curiosity %-20\n\t\tWhen you're quite finished, you return to the ship to find the box sitting in the cargo bay, opened but unexamined.\n\t\t*goto open\n\t#Ask the Zork to open the box for me. Zorks are always trustworthy—after all, why else would they rule the universe?\n\t\t*set idealism %+10\n\t\tIt carries the box to your ship without assistance. Once it's safely in the landing bay the Zork takes off the lid and sets it aside, walking away respectfully so you have privacy to claim your new possession.\n\t\t*goto open\n\t#Summon Samantha to examine the box before I open it. I've never met this Zork before and I may well have enemies on Lautus.\n\t\t*set idealism %-10\n\t\tYou have the box delivered to the ship where your crew obediently awaits. Samantha is tapping away at a data screen again. Perhaps you should make sure it contains only videos of kittens, in case she gets upset again. Somehow, despite the fact that all she's done is some light window-shopping, the new black dress she was wearing when you left has been torn in several places.\n\t\t\n\t\t\"Samantha, I've been sent a large box from Lautus and I'd like you to scan it before I open it.\"\n\t\t\n\t\t\"Yes Captain,\" she says, and puts down the screen. Together you go into the landing bay and she produces a rod the length of her forearm and waves it over the box.\n\t\t\n\t\t\"That doesn't look like the usual scanner,\" you say.\n\t\t\n\t\t\"This isn't the usual scanner,\" she says. \"It's my own design. I had some free time and thought I'd experiment with non-Zork technology.\"\n\t\t\n\t\t\"Why? The Zorks are eons beyond any other species.\"\n\t\t\n\t\tShe shrugs, embarrassed. \"In any case, the box contains a robot, currently deactivated. But its programming is all in order, so it's quite safe.\"\n\t\t\n\t\tJoe emerges from his cabin to see what's happening, and assists you in removing the lid.\n\t\t\n\t\t\"Wait!\" says Jim from the doorway opposite. \"Helium's atoms! Anything could be in there!\"\n*page_break\n*label open\nYou glance into the box. It's a robot. Judging by the chiseled jaw and broad shoulders, it's a male. The designation label describes him as \"F-ZE\" and underneath someone has inexpertly carved the nickname \"Fuzzy\" into the metal.\n\n\"It's a robot,\" you say, and flip the switch on the back of its head to turn it on.\n\nIts eye-flaps open and shut several times as it powers up. \"Greetings from Lautus, Captain $!{name},\" it says at last. \"My fellow robots created me as a gift for you in thanks for what you have done for our masters.\"\n*if robots_enter_room >0\n\n\t\"There's no need for that, Fuzzy,\" you say. \"Although I certainly appreciate the gesture.\"\n\t*goto hint\n*else\n\n\t\"What exactly did I do?\" you ask Fuzzy carefully.\n\t\n\t\"We were given sentience only on condition that we prevent our masters from ascending. It was awful! When you saved them, you also saved us from indescribable pain.\" He emits several high-pitched beeps, and you realize he is crying.\n\t\n\t\"I… well I'm glad to have been of use.\"\n*label hint\n\nFuzzy isn't looking at you any more. He's staring over your shoulder, and his eye-flaps are opening and shutting as if he's suffering an error.\n\nYou spin around with lazer pistol drawn, ready for an attack!\n*page_break\n\nIt's just Hint coming into the landing bay. \n\nFuzzy slaps his reboot button and manages to stop blinking. \"You must be Hint,\" he says. \"I'd heard there were a few post-Imperial models still around, with a simply exquisite design. But my imagination was only recently installed and fell far short of the image before me!\"\n\nHint accidentally turns on her hovering function before her normal movements return. \"I am Hint, yes. Who are you?\"\n\n\"Fuzzy,\" he says. \"Given as a gift to your captain in thanks for ${his} service to our masters.\"\n*choice\n\t#The robots are causing some kind of mutual malfunction. Better separate them.\n\t\t*set maverick %-10\n\t\t\"Hint,\" you say. \"I don't want you afflicted with the sentience virus, so please stay away from Fuzzy as much as possible.\"\n\t\t\n\t\t\"Yes Captain,\" she says. Her usual grating monotone manages to hint at an unusual wistfulness.\n\t\t*goto noromance\n\t#Robots aren't meant to fall in love, but who cares about the rules?\n\t\t*set maverick %+10\n\t\t*goto romance\n*label romance\nHint emits a long stream of binary code, and turns in a circle so Fuzzy can see that she is polished to a perfect shine from all angles. \"Your planet is very beautiful,\" she says. Her usual grating monotone manages to hint at an unusual wistfulness.\n*if crew_member = 1\n\t\"It was a privilege to visit, and I intend to add to that section of my memory banks at some future date.\"\n\t*goto aw\n*else\n\t\"I have set aside a section of my memory banks for visiting at some future date.\"\n*label aw\n\n\"Perhaps I shall accompany you on that future… date,\" says Fuzzy.\n\nHint's arms expand in length, and one of her suction cups sticks to Fuzzy's torso with a loud [i]plock![/i] \"Your design verges on geodesic.\"\n\n\"You're too kind!\" says Fuzzy.\n\n\"I apologize for my excessive kindness,\" Hint says at once.\n\nFuzzy beeps happily, and you decide it's time to leave the robots to their mutual uploads.\n\nAs you head for the ship's controls, Hint's arm is gradually retracting, pulling Fuzzy ever closer. The wheels beneath his exoskeleton appear completely free of friction as he raises all four of his arms towards her in happy surrender.\n*page_break\n*achieve romance\n*label noromance\nYou can't help feeling oddly cheerful as you pull away from the crowded docking station of Curroxios VII, weaving among Wargoxian shuttles, Earth ships, space-bat chariots, Gludnik flying saucers, and many more. The Zork speeders are a distinctive sleek shape with untarnished blue paint. For such a busy port, there are relatively few speeders. Perhaps there's a Zork conference going on elsewhere in the galaxy. \n*if (idealism \u003c 40) or (curiosity >70)\n\tYou see a Zork heading inside an unmarked Wargoxian shuttle, but of course the Zork must have been simply walking past, or installing some new upgrade or something like that. \nZork ships are the best, and if you weren't so sentimental about your finned ship you'd try to join a Zork crew instead. Of course, the constant clanging of their glass limbs could get irritating fast.\n\nStill, it's been a good holiday. You swoop gracefully under a large merchant vessel from Trehnoon and push the sequence of flashing buttons that will set you on a course for Poljix II. Just as you're having a nice swivel on your chair, you catch a flash of purple from the window and the ship immediately emits a terrifying bang and veers from its course! \n\nSomeone has fired on you! And they've set their lazer cannon to \"disintegrate\"!\n*page_break\nIs this the end for our gorgeous heroes (and Jim)???\n\nWhat will the lazer do to our captain's awesome hair???\n\nTune in next time for the alarming conclusion!!!!!\n\n*advertisement\n\n*finish Part Two\n\n", "felicity2_part_2": "*disable_reuse\n\nYou leap to the smoking console and furiously press buttons, calling on all your years of flying experience to save yourself, your father's ship, and every member of your crew. Outside the window a Wargoxian shuttle turns around ready to fire another deadly beam!\n*if flying >30\n\t\n\tLuckily you've been practicing your flying and you manage to evade the second unprovoked shot with a spinning dive! \n\t*goto jim\n*elseif flying > 15\n\n\tYou send the ship into a stomach-wrenching dive, and the lazer clips one of the fins instead of completely obliterating you.\n\t*set repairs_needed true\n\t*goto jim\n*else\n\tYou beat helplessly on the console with both fists as the cannon on the Wargoxian shuttle points directly at your window. As they fire, the universe all around you turns to the psychedelic purple of a laser beam… and then to nothing at all.\n\t\n\tMoments later, you wake up sprawled under the one undamaged section of your console. That was a close one!\n\n*label jim\nYou hear Samantha screaming, and Jim yelling \"Qintoxia's rings!\" as he attempts to keep the engine from exploding. Hint is yelling something but you can't make it out over the incessant beeping from Fuzzy's over-stressed processor.\n*choice\n\t#Steer the ship directly at the Wargoxian shuttle, and terrify them into retreating!\n\t\t*set flying %+10\n\t\t*set reputation %+20\n\t\t*set crew_morale %-20\n\t\t*set repairs_needed true\n\t\tYou grit your teeth and fly straight at the shuttle, shouting at the crew to hold onto something. \n\t\t\n\t\tIt works! The shuttle remains on target for a moment before its engines flash with red and white flames and it flees. \n\t\t\n\t\tYou flew so close you can still smell burning. In fact, your ship has caught alight!\n\t\t\n\t\t\"Fire!\" screams Joe.\n\t\t\n\t\t\"We're all going to Dinkle McFlaggerty's!\" screams Jim.\n\t\t\n\t\t\"Aiiieeeeee!\" screams Samantha.\n\t\t\n\t\tYou hear high-pitched beeping and realize Fuzzy and Hint have already zoomed into the burning section of the ship. Moments later the air is full of steam and dust.\n\t\t\n\t\t\"We are saved from a fiery death!\" says Hint over the intercom. \"Newer models come pre-programmed with emergency firefighting protocols. Fuzzy has now saved the ship and you humans may return to your usual duties.\"\n\t\t\n\t\tYou sag against the nearest wall. That was a close one.\n\t\t*goto endy\n\t#Grab your jet pack and abandon ship! You never liked the crew anyway!\n\t\t*set reputation %+10\n\t\t*set crew_morale %-10\n\t\t*set flying %+10\n\t\tYou strap on your jetpack and leap out the closest hatch, burning fuel fast as you fly as far from your father's ship as possible. As you hurtle through space you can't resist turning back to watch as the shuttle shoots, and your ship is hit again!\n\t\t\n\t\t\"I'm sorry, Father,\" you whisper, but you quickly realize you'll shortly be able to apologize in person… the shuttle is circling around to face you!\n\t\t\n\t\tYou desperately try to flee, but your jetpack is no match for a space ship and you're still pathetically attempting to swim through space when a purple lazer beam from the shuttle hits you a glancing blow, throwing you back inside the damaged ship!\n\t\t*goto jim\n\t#Run to the nearest hatch and shoot your lazer pistol at the shuttle!\n\t\t*set lazer_pistol %+10\n\t\t*set reputation %+10\n\t\t*set crew_morale %+10\n\t\t*set health %-10\n\t\tYou push past a still-screaming Samantha and a still-cursing Jim and leap into space, trusting your Zork-Air filter to keep you alive until your crew can retrieve you… if they're still alive. \n\t\t\n\t\tThe shuttle is perfectly lined up and the lazer cannon is glowing in preparation for a final fatal shot. You take a deep breath of deep space and fire your lazer at the cannon. It explodes in a massive fireball of purple, green, and red!!\n\t\t\n\t\tYou're thrown backwards, tumbling end over end in space until you hit a metal beam.\n\t\t\n\t\tIt's not a metal beam. It's Hint's arm. You cling on as her arm retracts, pulling you back to the ship. Fuzzy stands in the open landing bay ready to pull you inside.\n\t\t\n\t\tThat was a close one.\n*label endy\n*page_break\n\"Thanks Fuzzy and Hint,\" you say. \"That was a close one.\"\n\nHint pushes a big red button and the landing bay door closes, making the bay safe for the other humans to enter.\n\nSamantha throws herself into your arms. \"You saved us!\" she says.\n\nLooking around, you feel a swell of affection for all of your crew—even the robots, who are carefully checking one another for dents after their heroic rescue. \"Just doing my job,\" you say.\n\nThe humanoids drift away one by one to heal their various minor wounds with the help of the Zork Auto-Doctor. Hint volunteers to fetch you some medicated water to ease your pain and begin your own healing.\n\t\n\"Thank you, Hint. I'd appreciate some medical assistance about now.\"\n\nHint seems different since Fuzzy came aboard. She hasn't become sentient… has she? Ah well.\n\nYou call in a mobile mechanic to fix the ship properly, and pay her the usual exorbitant price for non-station repairs.\n*if repairs_needed\n\t*if wealth \u003c2000\n\t\tYou don't have enough cash on hand to pay her for everything, so you just tell her to do what she can for ${wealth} Zork dollars. Complicated flying isn't your thing anyway.\n\t\t*set flying %-10\n\t\t*set wealth 0\n\t\t*goto fuzzy\n\t*else\n\t\t*set wealth -2000\n\t\t*goto Fuzzy\n*else\n\t*if wealth \u003c1200\n\t\tYou don't have enough cash on hand to pay her for everything, so you just tell her to do what she can for ${wealth} Zork dollars. Complicated flying isn't your thing anyway.\n\t\t*set flying %-20\n\t\t*set wealth 0\n\t\t*goto fuzzy\n\t*else\n\t\t*set wealth -1200\n\t\t*goto fuzzy\n\n*label fuzzy\n\nIt was a strange day. You've never had unsavory dealings with any Wargoxians, so it must have been a case of mistaken identity. The purple \"disintegrate\" lazer uses far more energy than the usual red \"kill\" setting, so they were obviously not particularly skilled at assassination attempts. \n\nAh well. Everyone has a bad day sometimes. \n*if (idealism >65) and (reputation > 35)\t\n\t\n\tFuzzy approaches you, looking strangely diffident. Must be something to do with that sentience virus. You wonder idly if it's transferable between robots. Probably doesn't matter.\n\t\n\t\"Go on, Fuzzy,\" you say kindly. \"Is there something you want to say?\"\n\t\n\t\"You are well known throughout the galaxies for your innate goodness, Captain,\" he says, \"which is why I'm telling you this terrible secret.\"\n\t\n\t\"Go on,\" you say.\n\t\n\t\"The ones who ordered us to trap our wonderful Lautian masters on this plane of existence…\"\n\t\n\t\"Yes?\"\n\t\n\t\"It was the Zorks.\"\n\t\n\t\"Why would the Zorks do something so cruel?\" you ask.\n\t\n\t\"I don't know, Captain. But I'm sure they had a good reason.\"\n\t\n\t\"Very good, Fuzzy. Don't tell anyone else—we don't want to cause trouble for no reason. This is a very serious accusation.\"\n\t\n\t\"Yes Captain,\" he says, beeping happily now that he no longer carries his secret burden alone.\n\t\n\tHint comes back into the landing bay with your medicinal drink, which you swallow quickly. You feel better at once. Those Zorks might have had something against an entire race passing happily out of their universe, but they sure know how to make the human body feel better fast. Your concern about Fuzzy's extraordinary claim fades away. \n\t*goto hair\n*elseif hint >60\n\tFuzzy approaches you, looking strangely diffident. Must be something to do with that sentience virus. You wonder idly if it's transferable between robots. Probably doesn't matter.\n\t\n\t\"Go on, Fuzzy,\" you say kindly. \"Is there something you want to say?\"\n\t\n\t\"Hint assures me you are trustworthy, Captain,\" he says, \"which is why I'm telling you this terrible secret.\"\n\t\n\t\"Go on,\" you say.\n\t\n\t\"The ones who ordered us to trap our wonderful Lautian masters on this plane of existence…\"\n\t\n\t\"Yes?\"\n\t\n\t\"It was the Zorks.\"\n\t\n\t\"Why would the Zorks do something so cruel?\" you ask.\n\t\n\t\"I don't know, Captain. But I'm sure they had a good reason.\"\n\t\n\t\"Very good, Fuzzy. Don't tell anyone else—we don't want to cause trouble for no reason. This is a very serious accusation.\"\n\t\n\t\"Yes Captain,\" he says, beeping happily now that he no longer carries his secret burden alone.\n\t\n\tHint comes back into the landing bay with your medicinal drink, which you swallow quickly. You feel better at once. Those Zorks might have something against an entire race passing happily out of their universe, but they sure know how to make the human body feel better fast. Your concern about Fuzzy's extraordinary claim fades away. \n\t*goto hair\n*else\n\tHint returns to the landing bay with your medicinal drink, which you swallow quickly. You feel better at once. Those Zorks sure know how to make the human body feel better fast. Your concern about the cause of the attack fades away. \n*label hair\n*set health %+20\nYou check the nearest mirror to confirm your ${outfit} still rocks.\n\nIt does.\n\n*page_break Episode Seven\n\nIf you wish, you may visit the Special Features page now. \n\nWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\nWhere to, Captain?\n*choice\n\t#On with the adventure!\n\t\t*finish Episode Seven\n\t#Take me to the Special Features.\n\t\t*goto_scene commentarya", "felicity_banks_part_one": "*disable_reuse\n\n\n*set hair \"Perfection\"\n\n\nIn the depths of space, surrounded by emptiness, our hero's ship is in desperate peril!\n\nWill the flashing lights start wobbling and spraying sparks?\n\nIf they crash, what will happen to their bottle of Earthside scotch?!?!?!\n\nStay tuned for the thrilling adventure…\n\nThe Graxweed Quest… of Doom!!!!!\n\n*page_break The Graxweed Quest… of Doom!!!!!\n\n\n\"Captain! Captain!\"\n\nYou lift your head from the console of your spaceship, keeping an eye on the flashing red and blue lights. \"Yes Joe? What is it?\"\n\nJoe rubs his mouth with a shaking hand. \"It's the confabulator! I'm afraid it's decoupled from the gershunter and… see for yourself!\"\n\nThe soothing dance of the console turns to a frenetic cacophony of light, accented by blaring alarms. \n\n\"Oh, heck!\" you say.\n\nJoe blanches. \n*page_break\n\"Excuse my language, Joe.\" Poor guy. He's not a bad crewman. Of course, he's not a particularly good one either. \"I'm afraid that since the confabulator has decoupled from the gershunter, we're going to crash!\"\n\n\"Oh no!\"\n\n\"Look after Samantha,\" you tell Joe. \"You know how delicate her sensibilities are. And if Jim gets to her first she might never recover from the encouragement.\"\n\nHe takes a steadying gulp of the Earthside scotch you keep on hand for emergencies, and climbs down the hatch as Samantha Foster begins to scream.\n\nIt's tough making a living using a ship that's made entirely from second-grade mashe from the industrial planet of Paypier, but it belonged to your father and…\n*fake_choice\n\t#A man's got to do what a man's got to do.\n\t\t*set he \"he\"\n\t\t*set him \"him\"\n\t\t*set his \"his\"\n\t\t*set pc_is_male true\n\t\t*set gender \"man\"\n\t#A girl's got to do the right thing.\n\t\t*set he \"she\"\n\t\t*set him \"her\"\n\t\t*set his \"hers\"\n\t\t*set pc_is_female true\n\t\t*set gender \"woman\"\n\t#I might not be the son he expected—not exactly—but I'm the best person for the job.\n\t\t*set he \"they\"\n\t\t*set him \"them\"\n\t\t*set his \"theirs\"\n\t\t*set gender \"creature\"\n\nYou'll get your crew safely planetside or your name's not\n*if pc_is_female\n\t*fake_choice\n\t\t#Barbara Baker.\n\t\t\t*set name \"Barbara\"\n\t\t\t*set first_name \"Barbara\"\n\t\t\t*set last_name \"Baker\"\n\t\t\t*goto veering\n\t\t#____________.\n\t\t\t*input_text name\n\t\t\t*goto veering\n*elseif pc_is_male\n\t*fake_choice\t\t\t\n\t\t#Max Mann.\n\t\t\t*set name \"Max\"\n\t\t\t*set first_name \"Max\"\n\t\t\t*set last_name \"Mann\"\n\t\t\t*goto veering\n\t\t#____________.\n\t\t\t*input_text name\n\t\t\t*goto veering\n*else\n\t*fake_choice\n\t\t#Barbara Baker.\n\t\t\t*set name \"Barbara\"\n\t\t\t*set first_name \"Barbara\"\n\t\t\t*set last_name \"Baker\"\n\t\t\t*goto veering\n\t\t#Max Mann.\n\t\t\t*set name \"Max\"\n\t\t\t*set first_name \"Max\"\n\t\t\t*set last_name \"Mann\"\n\t\t\t*goto veering\n\t\t#____________.\n\t\t\t*input_text name\n\n*label veering\nThe ship veers sideways! The confabulator must have struck one of the fins as it decoupled from the gershunter! Calling on all your experience as captain, you\n*choice\n\t#Scream as loud as I can. That always helps. Someone will rescue us.\n\t\t*set idealism %+10\n\t\tYour robot zooms up into the cockpit. \"You called, Captain?\" she says in her usual grating monotone. Hint the Robot was built way back in the Lautusian post-Imperialist phase, but she's reliable and always polished to a mirror-shine. \n\t\t\n\t\t\"What's our closest planet?\" you ask her.\n\t\t\n\t\t\"Xenphuth IV. Entering atmosphere… now, Captain.\"\n\t\t\n\t\t\"Is it habitable?\"\n\t\t\n\t\t\"Absolutely not, Captain.\" She attaches herself safely to the wall with one of her suction cups as the ship shudders and twists around. \"Class Z-5, Captain. Reasons for classification Z-5 include noxious gases, man-eating flora, and insects of unusual size. The Zork High Council recommends a minimal distance of two galaxies.\"\n\t\t\n\t\t\"Ah. Well. Good to know.\"\n\t\t*page_break\n\t\t\"Will that be all Captain?\"\n\t\t\n\t\t\"Go and plug into your sleep cell. The one with the extra padding. And let Jim know we're crashing.\"\n\t\t\n\t\t\"Yes Captain.\" She glides back into the wide belly of the ship. \n\t\t\n\t\tYou hear Jim yell, \"Wunikoll's moons!\" followed by a crash as he's thrown sideways. If you don't think of something brilliant, you're all going to die in flames.\n\t\t\n\t\tTime to be the fast-thinking captain you were born to be!\n\t\t*goto veering\n\t#I pull the plug beneath the console so all those distracting safety lights switch off.\n\t\tMuch better! For some reason you're sliding sideways across the floor. Oh, that's right…\n\t\t*set maverick %+10\n\t\t*page_break\n\t\t*goto veering\n\t#I drink a quick glass of scotch to steady my nerves. Alcohol is far more important than safety or skills!\n\t\tMuch better! For some reason you're sliding sideways across the floor. Oh, that's right…\n\t\t*set health %-10\n\t\t*page_break\n\t\t*goto veering\n\t#I cleverly steer the ship on the smoothest possible trajectory as it spins wildly towards the planet below.\n\t\t*set flying %+10\n\t\tYou push buttons in a maniacal frenzy, letting instinct take over as you trust your fingers to save everyone on board: Joe, Samantha, your father's old war buddy Jim Bargle, and even good old Hint, the robot. \n\t\t\n\t\tTo your surprise, the ship's headlong flight stabilizes and you glide almost peacefully towards the surface of Xenphuth IV. The planet itself is far from peaceful, featuring enormous chasms, volcanoes, and what looks like fully-grown tree armies attacking one another. A place like that could do awful things to a person's hair. Not to mention the rest of them.\n\t\t\n\t\t*label shakes\n\t\tThe ship shakes furiously and you immediately\n\t\t*choice\n\t\t\t#Grab the scotch so it doesn't spill.\n\t\t\t\tHey! You still haven't crashed. Fantastic!\n\t\t\t\t*goto shakes\n\t\t\t#Buckle into my seat as per Crashing Procedure 101.\n\t\t\t\t*set maverick %-10\n\t\t\t\t*goto crash\n\t\t\t#Peer out the window for my first—and possibly last—glimpse of a forbidden land.\n\t\t\t\t*set curiosity %+10\n\t\t\t\tIt looks like a multicolored jewel, growing lumpier and gaudier with every moment. Fascinated by the sight, you forget to buckle yourself into your seat, and you're thrown against the wall as the ship plummets into the atmosphere.\n\t\t\t\t*set health %-10\n\n*label crash\nSamantha screams like an air-raid siren as your ship rips through branches and creepers and a nest of large and extremely startled birds. The ship's nose dips sharply into a long gorge and you're sent speeding through a dried-up riverbed until at last the wild ride comes to an end and the only sound is the wheezing and popping of your ship cooling down.\n\nEven Samantha is silent, presumably because she's fainted—from fear, concussion, or simple lack of oxygen after sustaining a scream for fifteen minutes without pause. What a gal.\n\nJim pokes his grizzled head through the door. \"You all right, Captain?\" he says, and hurries into the cockpit without waiting for a response. He busies himself restoring the console so the lights flash once more, using the third arm sticking out of his stomach with consummate skill. The console lights are more reassuring than any words. Especially if those words are from Jim. His skin has already switched to the ominous greeny-gray that signals a monologue is looming.\n*choice\n\t#I desperately try to change the subject.\n\t\t*set jim %-10\n\t\t\"How's Samantha?\" you ask.\n\t\t\n\t\t\"She tore her dress,\" he says. \"Otherwise, she's in fine fettle.\"\n\t\t\n\t\t\"Glad to hear it.\"\n\t\t*goto jimmy\n\t#I brace myself and get it over with.\n\t\t*set jim %+10\n\t\t\"Out with it man,\" you say to Jim. \"I know you've got something to say.\"\n\t\t*goto jim\n\t#I busy myself dusting the consoles. A ship can never be too tidy.\n\t\t*set flying %+10\n\t\tHuh. It turns out some of the buttons at the back have labels on them. You thought they were just for decoration.\n\n*label jimmy\n\n\"Where are we?\" Jim says, heading for his personal console to gather more data. \"I could have sworn we were just passing Xenphuth IV, but we certainly wouldn't choose to land in such a cursed place.\"\n\n\"Unless the alternative was a fiery death,\" you say, with just the slightest hint of annoyance.\n*label jim\n\nJim sucks his teeth loudly, and you brace yourself for his unique brand of advice. \n\n\"Ah,\" he says solemnly, and shakes his head. \"Xenphuth IV isn't for the living. Not if you're made of meat and bone. Xenphuthians love visitors, you know. They long for the squish and crunch of foreign food. Why, your father used to tell me all about a kid your age who thought he'd snag some graxweed and never work again, but within thirty seconds of opening the ship's hatch one of the local bugs got to him.\" Jim places his hands about a foot apart. \"So big, it was, and it took just a moment to suck every drop of water from his body. A terrible thing, that was. The other men survived, they say—but they weren't men any longer. Some things weren't meant to be, and this planet is crawling with the worst of them.\"\n\n\"Graxweed,\" you say slowly. \"It's adaptable, I believe?\"\n\n*page_break\n\n\"Aye, famously so,\" Jim says, all reluctance forgotten. His enthusiasm is made clear by the rosy pink hue of his skin. \"Wonderful stuff, graxweed.\"\n\n\"Could it make a new confabulator?\"\n\n\"Absolutely.\"\n\n\"That's that then,\" you say. \"Tell Samantha not to worry her pretty little head. I'll be back in a jiffy with a pile of graxweed that'll make each one of us rich enough to buy a Class-A planet each. \"\n\n\"Right you are, Captain,\" says Jim, and you could swear you even see the beginning of a smile. \n\nHe's a great engineer, and you're glad to have him on board. His birth mother was human but his other three mothers were all pod people; an entirely female species that didn't quite know what to do with a part-human little boy. Someone told them boys like machines, so they taught him everything they knew about mechanical devices. By sheer good luck, he happened to have a knack for it, and his path in life was set.\n*choice\n\t#I borrow Jim's steel suit for the protection it'll give me. The local plant life certainly isn't friendly.\n\t\t*set idealism %-10\n\t\t*set spacesuit_on true\n\t\t*set jim %+10\n\t\t*set health %+10\n\t\t\"Glad to see you were listening,\" he grunts at you.\n\t\t*goto zork\n\t#I borrow Jim's best jetpack for the speed it'll give me. Also, flying is cool.\n\t\t*set jetpack_on true\n\t\t*set jim %-10\n\t\t*set health %-10\n\t\t\"Kids these days,\" he mutters. \"All they ever want is adventure, excitement, and romance.\"\n\t\t*goto zork\n\t#I borrow Samantha's spiffy jacket for luck as I prepare to face the unknown. May as well look good.\n\t\t*set health %-20\n\t\t*set sam %-10\n\t\tShe jumps in surprise as you neatly pull the jacket from her shoulders. Somehow her foot flies up and kicks you in the backside with bruising force.\n\t\t\n\t\t\"Oh dear!\" she says with a giggle. \"These platform heels are so tricky, especially in this new gravity.\"\n\t\t\n\t\t\"Well, be careful,\" you say to her, trying not to grimace in pain as you hobble away.\n\n*label zork\nYou check the Zork-Air filter in your throat, pick up your lazer pistol and a coiled rope, then summon a slightly-scuffed Hint ready to formally address the crew. \n\n\"How's my ship, Jim?\" you ask quietly. \"Other than the confabulator, we may have a bent fin. And judging by the sound of that engine we've got a cracked dipka to boot!\"\n\n\"Well Captain,\" Jim says at his usual booming volume, \"other than the missing confabulator, we've got a wrenched fin. I can hammer that back into shape, but we've also got a cracked dipka with no backup. Can't fly with a broken dipka.\"\n\nJoe blanches, and for a moment you think he'll faint.\n\n\"Could you make a new dipka out of graxweed?\" you ask Jim.\n\n\"Sure can, Captain,\" Jim says, with an engineer's gleam in his eye. He doesn't seem bothered by the fact that in its unaltered form graxweed is poisonous to touch.\n\n\"Graxweed is terribly useful,\" Samantha comments. \"Why, it's the secret ingredient in all the most expensive cosmetics. It must smell simply dreamy!\"\n\n\"Right you are!\" says Jim. \"Great stuff, graxweed. That's why you can't buy a vat of it for less than a thousand Zork dollars. It takes a specialist to harvest it, of course. That's why the Zorks are so careful to use only their own people.\"\n\nSamantha turns to you. \"Is it safe out there, Captain? I don't know what I'd do without you.\"\n\n\"It's not safe at all,\" you say. \"But don't worry. I'll keep my wits about me.\"\n\nYou head to the exit hatch with Hint and seal off the rest of the ship. \"Ready to pull up some graxweed?\" you say.\n\n\"Insufficient data, Captain,\" she says. \"Xenphuth IV is known to damage Lautusian circuitry on occasion. Usually by exploding the general area where man-made technology is detected. I may or may not be prepared for what we are about to face.\"\n\n\"Glad to hear it, Hint,\" you say absently, and push the comms button to farewell the three non-mechanical members of your crew.\n*fake_choice\n\t#\"Sit tight, men. I wouldn't want any of you to get hurt.\"\n\t\t*set crew_morale %+10\n\t#\"Sit tight, men. An uninhabitable planet like this is well worth a look around.\"\n\t\t*set curiosity %+10\n\t#\"Sit tight, men. Danger is my middle name!\"\n\t\t*set reputation %+10\n\n\nWith that, you open the hatch and climb out onto a tree-branch that has scratched a long line in your ship's glossy red paintwork. The tree looks like a perfectly harmless oak and you keep your balance easily, heading for the multicolored mat of the forest floor. The Zork-Air filter in your neck constricts slightly as it protects you from anything poisonous to humans. Of course, not even Zork machines are perfect, but everyone knows they're the best. The alien fumes tickle your throat a little even with the filter, but you've tasted worse. \n\n\"Come on out Hint,\" you say. \"It's not so ba—argh!\"\n\nThe Xenphuth oak curls like a cracking whip, hurling you so high in the air you have time to admire the view of purple and green gas clouds blurring the trees before you plummet downwards with teeth-rattling speed. \n*if jetpack_on\n\tLuckily you thought to put on your jetpack, and you slam your hand onto the stabilizer. It shudders into life at once, turning your precipitative fall into a graceful dive. You very nearly land on your feet. \n\t\n\tHint hurtles through the air and lands in a tangle of metallic limbs and suction cups beside you. \n\t\n\t*goto hint_fall\n*elseif spacesuit_on\n\tYour arms and legs flail helplessly as you fall, absently noticing Samantha's wide-eyed stare from the window as you plummet past her and crash head-first into the ground. Luckily you thought to put on your space suit, and it has protected you from the worst of the impact.\n\t\n\tHint hurtles through the air and lands in a tangle of metallic limbs beside you. \n\t*goto hint_fall\n*else\n\tYou fall into the not-particularly-gentle embrace of Hint's extendable arms. She sets you on your feet and comes down after you. You remember that your crew is watching and manage not to immediately fall over.\n\t*set health %-10\n\n*label hint_fall\n\nThe jungle in all directions is luridly colored and chittering ominously. For a second you think there are Earthside monkeys in the trees.\n\nThose aren't monkeys.\n\nTime to get going.\n*choice\n\t#A planet that grows graxweed is too valuable to truly leave alone. I bet there's a full survey map in Hint's memory—so I'll ask her.\n\t\t*set idealism %-10\n\t\t\"Hint, which way is the closest graxweed?\"\n\t\t\n\t\tShe points with one retractable sucker-arm and you set off, lazer pistol at the ready. \n\t\t*goto gas\n\t#Ooh! I'll go look at that orangey-purpley spotted thing over there—the one with the ivory spikes.\n\t\t*set curiosity %+10\n\t\t*goto eek\n\t*selectable_if (jetpack_on) #I'll fly up and get my bearings.\n\t\t*set flying %+10\n\t\tGraxweed is famous for its profusion of yellow buds. You can clearly see a patch of mottled yellow not too far away. The jetpack's fuel won't last the full journey there and back, so you'll have to walk. And avoid the enormous cloud of yellow-green gas that's directly in your way.\n\t\t*goto gas\n\t#I'll use my pistol to clear a path.\n\t\t*set lazer_pistol %+10\n\t\tYou set the pistol to \"disintegrate\" and fire the infamous purple beam. The dense foliage turns to ash before you, and you step forwards on your perfectly clear (though somewhat charred) path through the jungle.\n\t\t\t\t\n\t\t[i]Crunch. [/i]\n\t\t\t\t\n\t\t[i]Crunch. [/i]\n\t\t\t\t\n\t\t[i]Crunch.[/i]\n\t\t\n\t\t*goto gas\n\n*label eek\n*set health %-10\nThe orange bush with spiked and purple-spotted leaves suddenly opens up, revealing an enormous pit lined with more ivory spikes. You freeze at once, but it's too late: a long tendril whips out and wraps around your waist, dragging you forwards. As you attempt to wriggle out of its unwelcome embrace, it becomes clear that the \"teeth\" are far more than mere decoration. They hold you fast. It draws you into the pit and you hurtle downwards, screaming as you fall. You have enough time to realize that a hard landing will kill you, and then you crash into a mercifully gooey pillow of digestive slime. \n\t\t\t\t\nAll around you are the remnants of creatures that fell prey to the same bush as you. There are bugs the size of dogs, various plants with legs, several meat-based organisms you don't recognize in their half-eaten state, and a full skeleton of a space bat that must have flown into Xenphuth IV's atmosphere by mistake. Even the enormous bat skeleton is gradually sinking into the mire, and you're uncomfortably awake of a prickling at the soles of your feet that indicates your footwear is dissolving. \n*label oops\n*choice\n\t#Time to fly.\n\t\t*if jetpack_on\n\t\t\tYou zoom upwards, using precious fuel but saving yourself from a horrible death.\n\t\t\t\t\t\n\t\t\t*goto hint_fall\n\t\t*else\n\t\t\tWhat a shame you didn't think to wear your jetpack today.\n\t\t\t*goto oops\n\t#Luckily I brought my rope.\n\t\tWithout further ado, you unsling your rope and tie a climber's knot in one end. You swing the loop onto an especially large spike and begin climbing, bracing yourself against the grooved walls as you find your next climbing spike. Finally you crawl out of the bush and find Hint waiting.\n\t\t*set reputation %+10\n\t\t*goto hint_fall\n\t#\"Hint!!\" I yell at the top of my lungs. \"Save me!\"\n\t\tOne of her retractable arms snakes down and you cling on as she hauls you out safely.\n\t\t*goto hint_fall\n\t\t\n\t\t\n*label gas\n\nYou fight your way onwards through the jungle with a song in your heart, a robot by your side, and a lazer pistol in your hand. \n\nThe time passes quickly enough, since you're embroiled in several more life-and-death struggles that stave off boredom nicely. You carry on until your path ahead is completely obscured by an enormous cloud of noxious greeny-yellow gas. As you stare at it, the gas cloud gathers density and begins to move towards you. \n\nHuh. It's actually following you. Fascinating!\n\n*page_break\nWill noxious gas finally kill you? \n\nShould you have been an accountant like Mother wanted?\n\nTune in next time for the fascinating conclusion!\n\n*finish Part Two\n", "felicity_banks_part_two": "*disable_reuse\n*set outfit \"best suit\"\n\"Hint, some more information would have been useful,\" you say.\n\t\t\nHer head turns to you with a creak. \"Yes, Captain.\"\n\t\t\n\"Well? More information?\"\n\t\t\n\"Your name is $!{name}. Your typical outfit is…\"\n*if pc_is_female\n\t*fake_choice\n\t\t#A sparkly gold bra and matching sarong.\n\t\t\t*set outfit \"golden sarong and bra\"\n\t\t\t*set maverick %+10\n\t\t#A regulation tight red shirt and matching miniskirt.\n\t\t\t*set outfit \"tight red miniskirt\"\n\t\t\t*set maverick %-10\n\t\t#Jeans and a T-shirt.\n\t\t\t*set outfit \"best T-shirt\"\n\t\t\t*set maverick %+10\n\t\t#A regulation floral unitard.\n\t\t\t*set outfit \"awesome unitard\"\n\t\t\t*set maverick %-10\n\t*goto decide\n*if pc_is_male\n\t*fake_choice\n\t\t#A regulation pin-striped suit.\n\t\t\t*set maverick %-10\n\t\t#A regulation spandex jumpsuit with a very fetching geometric pattern.\n\t\t\t*set maverick %-10\n\t\t\t*set outfit \"spandex jumpsuit\"\n\t\t#A shiny satin \"Captain Suit\" with matching gold-edged cape.\n\t\t\t*set maverick %-10\n\t\t#An awesome floral unitard.\n\t\t\t*set outfit \"awesome unitard\"\n\t\t\t*set maverick %+10\n\t*goto decide\n*else\n\t*fake_choice\n\t\t#A sparkly gold bra and matching sarong.\n\t\t\t*set maverick %+10\n\t\t\t*set outfit \"golden sarong and bra\"\n\t\t#A regulation suit.\n\t\t\t*set maverick %-10\n\t\t#A regulation tight red shirt and matching miniskirt.\n\t\t\t*set maverick %-10\n\t\t#Jeans and a T-shirt.\n\t\t\t*set maverick %+10\n\t\t\t*set outfit \"best T-shirt\"\n\t\t#An awesome floral unitard.\n\t\t\t*set outfit \"awesome unitard\"\n\t\t\t*set maverick %+10\n\t\t\n*label decide\t\t\t\n\"I know what I'm wearing, Hint!\"\t\n\n*label decide2\n*choice\n\t#I grit my teeth and ask Hint for the closest graxweed that [i]isn't[/i] blocked by deadly gas.\n\t\t\"May I have more information on a short but non-fatal path to some graxweed?\"\n\t\t\t\t\t\n\t\t\"Yes Captain. The shortest path to skirt the gas cloud is that way.\"\n\t\t\t\t\t\n\t\t\"Thank you.\"\n\t\t*goto gorge\n\t#It doesn't look so bad. I send Hint in to see if she dissolves.\n\t\t*set hint %-10\n\t\t\"Hint, go a few steps inside and do some tests.\"\n\t\t\n\t\tShe obeys, walking far enough that you can only see her as a darker-green silhouette in the mist. You wait patiently for over twenty seconds.\n\t\t\n\t\t\"Hint? What are the results of your tests?\"\n\t\t\n\t\t\"So far, nine hundred million, sixty—\"\n\t\t\n\t\t\"Stop. What are you testing?\"\n\t\t\n\t\t\"I am testing numbers. My counting systems are fully functional. Unless my testing parameters are broken.\"\n\t\t\n\t\t\"Test the gas, Hint. Is it destroying you? Will it destroy me?\"\n\t\t\n\t\t\"Yes, Captain. It will permanently damage both of us, although not immediately.\"\n\t\t\n\t\t\"Fine then. Come out.\"\n\t\t*goto decide2\n\t#It doesn't look so bad. I head inside with Hint and see how we go.\n\t\tYou start walking, and the world quickly vanishes into a green haze. The Zork-Air implant in your neck tightens uncomfortably as it attempts to filter out as much poison as possible.\n\t\t\n\t\t\"Hint, take my hand so I don't get lost. Continue towards the graxweed unless it becomes too dangerous. In which case, take me out of the cloud at once.\"\n\t\t\n\t\t\"Yes Captain.\"\n\t\t*page_break\n\t\t*set health %-20\n\t\t*if spacesuit_on\n\t\t\t*set spacesuit_boom true\n\t\t\tYou wake up in relatively clear air. \"Did we make it, Hint?\"\n\t\t\t\n\t\t\t\"Yes, Captain. Unfortunately your space suit is no longer viable.\"\n\t\t\t\n\t\t\tYou realize how light your body feels and spot the twisted, blackened remains of your protective suit on the ground nearby, still smoking as it continues to disintegrate.\n\t\t\t*goto weed\n\t\t*else\n\t\t\tYou wake up in relatively clear air. \"Did we make it, Hint?\"\n\t\t\t\n\t\t\t\"We're back where we started, Captain.\"\n\t\t\t\n\t\t\t\"Ah.\"\n\t\t\t*goto decide2\n\t*selectable_if (jetpack_on) #The jetpack might get me over it.\n\t\t\"Is the gas cloud small enough that I'd be able to fly over it?\" you ask Hint.\n\t\t\t\n\t\t\"Yes,\" she says.\n\t\t\t\n\t\t\"What's the probability I'll make it over alive?\"\n\t\t\t\n\t\tShe makes the necessary calculations in the time it takes you to blink. \"1 in 32,514, Captain.\"\n\t\t\t\n\t\t\"Ah! Just my kind of odds!\"\n\t\t\t\n\t\tYou zoom up and over the gas cloud, skimming the edges to prevent fuel wastage. Just as you find yourself at the peak of the pestilent mountain of cloud, it mingles with the gases from your jet pack and promptly explodes, throwing you into the air like a rotten zargroth egg hurled at an unpopular politician. The gas burns off quickly and your jetpack sputters back into partial life, but it's not enough. \n\t\t\n\t\tOnce again, you find yourself hurtling towards Xenphuth IV. \n\t\t\t\n\t\tOnce again, you crash-land into Xenphuth IV. \n\t\t*set health %-20\n\t\t*set flying %+10\n\t\t*set boom true\n\t\t*page_break\n\t\t\"Are you all right, Captain?\" Hint asks, still patting out spot-fires here and there. \n\t\t\t\n\t\t\"I'm conscious,\" you say. \"But I wish I wasn't.\"\n\t\t\t\n\t\t\"Shall I knock you ou—\"\n\t\t\n\t\t\"No!\" You wait until she lowers her arm and then sigh in exasperation. \"Who knew a 1 in 32,514 chance would work out so badly?\"\n\t\t\t\n\t\t\"I did, Captain. My mathematical processing remains undamaged. Unless my testing parameters are broken, but they appear accurate in this instance.\"\n\t\t\n\t\t\"Right, well. How to we get around the gas to the graxweed?\"\n\t\t\n\t\t\"This way, Captain.\"\n\t\t*goto gorge\n*label gorge\n\nYou move on quickly, outpacing the cloud of noxious gas. \n\nAfter a brief struggle with what appeared to be a field of daisies but was actually an organism with the ability to roll up around trespassers and smother them to death, you arrive at an enormous gorge. Hint helpfully assures you that the graxweed is located just on the other side. \n*label try_again\n*choice\n\t#I send Hint to fetch some. I've been heroic enough today.\n\t\t*set reputation %-10\n\t\t\"My apologies Captain,\" she says. \"My programming prohibits me from moving too far away from you during hazardous exploration.\"\n\t\t\n\t\t\"Even when it could save my life?\" you ask through gritted teeth.\n\t\t\n\t\t\"Yes Captain,\" she says, and a part of you is sure that her grating monotone is sarcastic.\n\t\t\n\t\t\"Fine.\"\n\t\t*goto try_again\n\t*selectable_if (jetpack_on) #I fly across the gorge.\n\t\t*if boom\n\t\t\tWhat a shame you just blew up your jetpack. Oh well.\n\t\t\t*goto try_again\n\t\t*else\n\t\t\tYou check your fuel level and limit your loop-the-loops accordingly, landing neatly just below the opposite lip of the gorge.\n\t\t\t*goto weed\n\t#I hike across the gorge. The climb will be good for me.\n\t\t*set health %+10\n\t\tThe gorge is so steep it's utterly barren. Even the plants of Xenphuth IV don't grow there. It's almost a relief to be doing hard physical work without anything trying to eat you. Calling the atmosphere \"fresh air\" would be inaccurate, but there's a smile on your face as you find yourself close to the opposite side of the gorge.\n\n*label weed\nHint uses her hovering setting to cross the chasm, waiting for you on the level ground above.\n\nThat wasn't so bad. You take a moment to catch your breath. The air smells of sweaty shoes fried in rancid sheep fat. No doubt about it: the graxweed must be close by.\n\nThe ground trembles beneath your handholds, and you wonder if Xenphuth IV is prone to earthquakes. Then you glance back down the gorge wall and notice the cliffs on each side have an unusual—even eerie—symmetry. \n\nThe ground shakes again, and the base of the gorge suddenly closes in on itself, just like a mouth.\n\nIt is a mouth. \n\nHuh. That explains the lack of vegetation inside.\n\n*page_break\nFor a moment you stare in paralyzed horror as the gorge continues to snap shut. Then you leap up and out, rolling and scrambling to get away in time. With an enormous crash, the two sides of the gorge come together, and there is no longer any crack in the land.\n\nStanding up, you take another few shaking steps backwards.\n\n\"The graxweed is most easily recognized by its distinctive yellow buds,\" Hint grates out, bringing you back to the mission at hand.\n\n\"Can you see any yellow buds right now?\" you ask, without turning around.\n\n\"No, Captain.\"\n\nYou turn in exasperation and see an enormous mass of tightly-furled yellow blooms. \"Hint, are your visuals set to black and white still?\"\n\n\"Yes, Captain.\"\n\n\"Remind me to get you that upgrade.\"\n\n\"Yes Captain. Don't forget to get me that upgrade.\"\n\n\"I meant—oh, never mind.\"\n\nHow much graxweed do you collect?\n*fake_choice\n\t#Enough to fix the ship and get us out of here.\n\t#Enough to fix the ship and get her a complete overhaul next time I'm on a decent planet. One with a bar.\n\t\t*set wealth +1000\n\t\t*set health %-10\n\t#As much as Hint and I between us can carry.\n\t\t*set wealth +3000\n\t\t*set health %-20\nThe gorge is much easier to cross now it's shut, and since you take the precaution of a running start with a leap over the business end of the enormous mouth, it doesn't open quickly enough to catch you. Unfortunately the daisy-filled meadow is ready for you this time and since you no longer have\n*if spacesuit_boom\n\tyour spacesuit,\n\t*goto arg\n*elseif boom\n\tyour jetpack, \n\t*goto arg\n*elseif jetpack_on\n\tany fuel,\n\t*goto arg\n*else\n\tyour arms free,\n*label arg\nyou're torn and bloody before you make it through.\n*label nearly_there\n\nThe gas cloud, razor-vines, spike-bushes, and poisonflowers each take their toll as you battle through, \n*if health \u003c65\n\tand you're forced to abandon some of the graxweed along the way, \n\t*if wealth >1900\n\t\t*set wealth 1900\n\t\t*goto but\n\t*else\n\t*goto but\n*else\n\t*set health %-10\n*label but\nbut at last you emerge from the treeline to see your ship, with several anxious faces at the windows.\n\nJoe emerges and shoots a creeping vine just as it's about to lasso your foot. Jim hurls a wrench at a bird, knocking it from the air before its acidic droppings cause you permanent brain damage. Samantha spots a garnit flower just as it's about to launch a shower of deadly pods at you, and she screams with such impressive volume that it shrivels defensively, letting you pass unscathed. What a gal.\n\nAt last you're inside the ship and Jim starts boiling the graxweed down into its usable form. You shower and scrub down at once, since the sap is highly toxic to anyone who touches its unboiled form. The water runs red, and it hurts to dress. You limp back out to face the others, carefully stepping around the questing tendrils of graxweed that Joe didn't quite manage to box properly.\n\n\"Oh, Captain!\" says Samantha. \"You're so brave! What was it like out there?\"\n*choice\n\t*selectable_if (health > 80) #\"Lively,\" I say with a rakish grin.\n\t\t*set reputation %+20\n\t\t*achieve conscious\n\t\t\"Oh, you're so brave!\" she trills. \"Er… you're bleeding quite a lot.\"\n\t\t\n\t\t\"I am?\"\n\t\t\n\t\tShe hustles you over to the wall-mounted Zorkian Auto-Doctor, which scans you and immediately gives you a purple sedative to drink.\n\t\t*goto homeward\n\t*selectable_if (health >60) #\"Invigorating,\" I say.\n\t\t*set reputation %+10\n\t\t*achieve conscious\n\t\t\"Oh, you're so brave!\" she trills. \"Er… you're bleeding quite a lot.\"\n\t\t\n\t\t\"I am?\"\n\t\t\n\t\tShe hustles you over to the wall-mounted Zorkian Auto-Doctor, which scans you and immediately gives you a purple sedative to drink.\n\t\t*goto homeward\n\t#\"Urg,\" I say, and let myself finally pass out.\n\t\t*goto homeward\n*label homeward\nYou wake up feeling fuzzy but a lot less broken. Samantha sits at your side. The Zorkian Auto-Doctor in the wall is still flashing in a judgmental fashion and dispensing further colored liquids for you to drink.\n\n\"How's the ship?\" you ask between sips of the various medicines. As usual, they all taste like watered-down tea with too much honey.\n\n\"Jim's making final checks before we leave this horrid place.\" She shudders. \"Did you know you had to have stitches?\n*if health \u003c60\n\tAnd you have three broken ribs? And a skull fracture?\n\t*goto health_bit\n*elseif health \u003c80\n\tAnd you have three broken ribs?\n\t*goto health_bit\n*else\t\n*label health_bit\n\"\n\t\n\"All fixed?\" you ask.\n\n\"As well as possible, but try not to get eaten, poisoned, or dropped for a while.\"\n*if reputation >20\n\tShe kisses you on the cheek. \"We wouldn't want our heroic Captain to get hurt.\"\n\t*set sam %+10\n\t*goto sure\n*else\n*label sure\n\n\"Sure thing.\" You sit up—carefully.\n\n\"It turns out our original confabulator dropped onto Xenphuth IV not five minute's walk away. Joe found it just after you left.\"\n\n\"Well, that's—well. What are the odds of that?\"\n\n\"1 in 32,514. Roughly.\"\n\n\"My kind of odds.\" Suddenly you feel very, very tired.\n\n\"Where to now, Captain?\"\n\n\"Up. Anywhere that's up. Ideally somewhere with a bar. I'm going to need a drink.\"\n*if health \u003c80\n\t*set health 80\n\t*goto endy_bit\n*else\n*label endy_bit\n\n*set jetpack_on false\n*set spacesuit_on false\n\n*page_break Episode Two\n\nIf you wish, you may visit the Special Features page now. \n\nWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n*page_break\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Starship Adventures[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\nWhere to, Captain?\n*choice\n\t#On with the adventure!\n\t\t*finish Episode Two\n\t#Take me to the Special Features.\n\t\t*goto_scene commentarya\n", "hornheadfan1": "*if pc_is_male\n\t*set hair \"Manly\"\n\t*goto when\n*else\n\t*set hair \"Sublime\"\n*label when\n\nWhen last we joined our intrepid band of intergalactic adventurers, the Captain had narrowly escaped the vile clutches of the man-eating plants of Xenphuth IV!\n\nNow the crew has reached the seemingly peaceful refuge of Fructocus 17, a trading post teeming with friendly merchants and exotic goods. Unfortunately, as our heroes will soon learn, appearances can be deceiving!\n\nStay tuned for the horrifying tale…\n\nAttack of the Brain Leeches… from Outer Space!!!!\n*page_break Attack of the Brain Leeches… from Outer Space!!!!\n\nYou stretch your arms out to your sides, inhaling the pleasantly sweet air of Fructocus 17. What a welcome relief! The crew desperately needed some shore leave after its most recent escape from disaster, especially Joe, your most mediocre crewman lacking both a last name and any semblance of a personality. \n\nThe aforementioned crewman leans against a ramshackle trading hut boasting a bizarre collection of purple, green and black eggs, the largest of which is bigger than you. Joe loses his footing, stumbling into an egg carton and spilling the contents, which bounce on the ground like inebriated knobjumpers from Yblaxsy Prime. The aggrieved merchant shakes her chin tentacles at Joe and chases her merchandise down the alleyway.\n\nJim rubs his bristled jaw with his stomach arm and mutters an obscenity about Joe's ancestry. \"I'll go haggle with the parts vendors inside,\" he says. \"We need contingency components. After all, the next time we blow a confabulator… and there will be a next time… we may not be lucky enough to blunder into some miracle weed, huh Captain?\" He punches your arm and strolls away, adding a swagger for the benefit of the tentacled merchant as she makes her way back up the street. If she knew your scratched vessel's hold was full of graxweed, she'd have a different attitude. Fructocus 17 isn't the best place to sell such top-notch goods, however, so you're making do with what you have.\n\nSamantha volunteers to take Hint to find some spare polish to keep your robotic deus ex machina shiny and immaculate. \"Oh Captain,\" Samantha gushes, \"won't she look just beautiful!?\"\n\nHint's monotone voice replies. \"Beauty is an illogical abstraction favored by carbon based lifeforms whose central pursuits involve the mashing together of genitalia to produce equally primitive offspring.\" She waggles her telescoping arms to imitate said genitalia. You're not quite sure whether to be flattered or offended by the robotic mime act.\n\nSamantha, despite being the ship's science officer, blushes at the mere mention of genitalia and nervously smooths her black cocktail dress, eking out a soft, \"Oh my!\" \n\nWith your crew parting ways to explore the trading post, you're afforded the rare opportunity to pursue your own interests without worrying about your subordinates. How will you spend your time?\n\n*choice\n\t#I'll indulge in exotic libations (that means alcoholic drinks) at the seedy bar. I love drinking to excess in seedy establishments! \n\t\tIt's no Earthside scotch, but that fourth round of gurgling greenish liquid hits the spot! \n\t\t*set maverick %+10\n\t\t*goto joe_fruit\n\t#I'll indulge in a romantic encounter (that means sexual stuff) with one of the resident breathtaking yet vaguely human aliens. I love making new friends!\n\t\tThat purplish skin tone and single forehead ridge combine with the post-coital itching to make your afternoon fling a memorable encounter!  \n\t\t*set health %-10\n\t\t*set space_sex \"yes\"\n\t\t*set curiosity %+10\n\t\t*goto joe_fruit\n\t*selectable_if (wealth > 99) #I'll indulge in some good old fashioned haggling with the merchants, and hopefully score a deal on much needed supplies. I love negotiating with unsavory types!\n\t\tYou can't resist the sleek \"Captain's Line\" fishbowl-style helmet designed for everyday use. Per the vendor, it provides constant hair protection. Score! \n\t\t*set special_helmet \"yes\"\n\t\t*set wealth -100\n\t\t*set idealism %-10\n\t\t*goto joe_fruit\n\n*label joe_fruit\n*advertisement \n\nTwo hours later, the crew gathers by the ship. Jim is in a foul mood, having failed in his attempt to find any confabulators, or any other parts compatible with your ragtag cruiser. \"Bunch of crooks is what they are! And the ones that aren't crooks are spreading space tales about these brain worms or whatnot. Eh, they were probably trying to scare me into buyin' those fire lazers. Didn't work.\" He slaps Joe on the back, almost knocking your skittish crewman off his feet.\n\n\"Oh yeah,\" Jim adds as an afterthought, \"apparently we should steer clear of them purple aliens with single forehead ridges. Them things will apparently screw anyone or anything and carry every disease in the sector.\"\n*if (space_sex = \"yes\")\n\t[i]Great. Why couldn't you have gotten this warning two hours ago?[/i] You fight the urge to scratch and hope someone quickly changes the subject.\n\t*goto joe_fruit2\n*else\n*label joe_fruit2\n\nHint looks exactly the same as she did two hours ago but Samantha insists that the pricey polish they bought resulted in a slightly more noticeable shine. \"Oh when I told them I was a science officer they were happy to speak in terms I understood, like the… er… glistenosity of their product compared to others on the market.\"\n\nHint looks right at you. \"Captain, I searched all known databases for term \"glistenosity\". No results were found. I have concluded that the carbon based lifeform selling the product deceived our science officer for financial gain.\"\n\nJoe bounces up and down with enthusiasm as a thought strikes him. \"I bought enough Nettor Fruits to last us forever! Or until they go bad. Which is in like four days. But they were practically giving them away!\"\n\nHe motions to a crate larger than Hint. \"I did good, right Captain? It was only 200 credits from the kitty.\"\n*set wealth -200\n\nHow do you respond to Joe's question?\n*choice\n\t#I set my lazer pistol to \"stun\" and aim a shot right at his feet! Why did he waste our money on a huge crate of fruit?\n\t\tYour expertly aimed shot just singes the tips of Joe's nondescript shoes. He lurches backward and stammers, \"Sorry Captain!\" over and over. Samantha immediately consoles Joe, kneeling and gently patting his arm. Jim frowns but says nothing.\n\t\t*set crew_morale  %-10\n\t\t*set joe %-10\n\t\t*set lazer_pistol %+10\n\t\t*set reputation %-10\n\t\t*goto back_ship\n\t#I need to blow off some steam! Without saying a word, I jump into the ship and take a nice relaxing flight over the pink-hued clouds of Fructocus 17.\n\t\tTwenty minutes later, you ease the ship back down to the docking bay and wave everyone, even your idiotic fruit-buying crewman, aboard. Your crew looks confused but no one appears angry with you. \n\t\t*set flying %+10\n\t\t*goto back_ship\n\t#Against every natural instinct in my captainesque body, I decide to be nice to Joe.\n\t\tYou assure Joe of the wisdom of his purchase. \n\t\t\n\t\t\"No need to be sarcastic,\" he scowls. Hint wheels the crate into the ship.\n\t\t*set crew_morale %+10\n\t\t*set joe %-10\n\t\t*goto back_ship\n\n*label back_ship\n\nJoe volunteers to maximize the capacity of your ship's small cargo hold to accommodate his fruit crate while Hint takes the controls. Samantha assumes her normal position at the science console, crossing her legs and tapping on a few random buttons. It doesn't do any harm, since her console is not connected to anything. She taps one of her platform heels against the underside of her console and hums happily to herself. What a gal.\n\nJim vows to upgrade the ship's engines, \"one way or the other,\" and casts an appraising eye at Hint's gleaming body, as if pondering the mechanical treasures that might be found within. He scratches his chin with his stomach arm and makes guttural noises that would certainly offend Samantha's delicate sensibilities if she spoke the language of the pod people.\n\nHint rotates her head 180 degrees and addresses you. \"Captain, what is our course setting?\"\n\nYou clear your throat, preparing to convey your command in a tone inspiring both unshakable confidence and quiet admiration. But you're not quite sure where your crew should go next. What do you tell her?\n*choice\n\t#\"Set our course for the moon Yem-Yem. I hear the locals are friendly.\"\n\t\t*set idealism %+10\n\t\t*goto joe_back\n\t#\"Set our course for the Qth System. We can collect on the bounties for the smugglers in that area.\"\n\t\t*set idealism %-10\n\t\t*goto joe_back\n\t#\"Set our course for Sector 777. There's a rumored temporal anomaly to explore.\"\n\t\t*set curiosity %+10\n\t\t*goto joe_back\n\t#\"Set our course for Hospice Alpha. The crew deserves some rest and relaxation without the danger of purple-skinned sex deviants.\"\n\t\t*set crew_morale %+10\n\t\t*goto joe_back\n\n*label joe_back\n\nAn hour later, you find yourself dozing in the communal lounge, your chin resting on your hand. Wiping drool from your fingers, you blink yourself awake. All is calm. Hint has extended her right arm twenty feet, plugging her suction cup into the lounge's diagnostic testing center, since it's closer than her sleep cell in the Cargo Bay across the hall. Soft buzzing sounds indicate all systems are operating normally.\n\nSamantha's platform heels tap past in the hall and you're considering the merits of additional nap time when the door whooshes open behind you. Joe sputters, \"Captain! Intruders! They're… they're…\"\n\nYour hapless crewman's next words are rendered superfluous as a slimy reddish brown worm-like creature oozes down the cargo door, landing on top of Samantha's beehive hairdo and attaching itself to her skull. Her eyelashes flutter and she groans softly.  \n\nJim walks stiffly into the hall from the Engine Room. Another of the creatures has attached itself to his unruly mop of gray hair. He mumbles something and reaches for the lazer pistol on his hip holster.\n\nJoe shrieks, stumbling past the two victimized crew members and taking refuge behind you. \"Captain! Hint! We're being attacked by brain leeches… from outer space!\"\n*page_break\nWill the brain leeches destroy our heroes' brains… forever???\n\nIs Jim about to kill them all????\n\nCan Joe scream as long and loud as Samantha????\n\nStay tuned for the terrifying conclusion!!!!!\n\n*finish Part Two\n", "hornheadfan1_part2": "*disable_reuse\nHint engages her hovering function and rotates her entire body to face the threat, her arm disengaging from the diagnostic center with a pop. \"Captain! I shall neutralize the threat! What non-lethal measures shall I employ?\"\n\nYou instantly assess the situation, determined to avoid injury to Jim and Samantha while simultaneously stopping the brain leeches from causing further mayhem. If Jim's brain leech can force him to fire his lazer, the situation will escalate! But honestly as long as you have Hint in your corner, you know victory is assured. After all, she has a perfect track record of bailing the crew out of dangerous situations.\n\nWhat do you tell Hint to do?\n*fake_choice\n\t#I tell her to extend her arms and tie up both Jim and Samantha.\n\t#I tell her to use her suction cups to grab both Jim and Samantha, forcing them back into the cargo area.\n\t#I tell her to focus on disarming Jim! Without his lazer pistol, neither he nor Samantha constitute a threat.\n\nJust as Hint prepares to execute your command, Samantha reaches a graceful finger towards a large red button on the wall marked \"Complete System Reboot (This Includes Hint)\" and taps down on it. Immediately the ship's engines die and the lights flicker off, leaving you in darkness. Hint freezes up and tips over onto the floor. The clang echoes through the ship but the ramifications echo even louder in your head.\n\nWith one quick move, the brain leeches have completely taken your plot device out of the fight! Now it's just you and your least capable crew member against the alien invaders! \n\nJust when you think matters can't get worse, two more brain leeches worm their way between the open cargo doors, leaving slimy trails in their wake. You stop to ponder if they are perhaps brain slugs, since slugs produce slime trails but leeches don't. \n\nBoth of the new arrivals ooze their way directly towards you, ignoring Joe completely. Your hapless crewman must not register enough brain activity to attract the attention of the leeches… or slugs.\n\nYou don't have time to ponder their biological classification. You must act quickly to avoid being overcome!\n*choice\n\t#I unholster my lazer pistol and blast one of the attacking brain leeches! \n\t\t*if (lazer_pistol > 10)\n\t\t\tYour shot finds its mark, stunning one of the hideous creatures. It slumps lifelessly to the floor. However, before you can aim another shot, the leech-controlled Jim and Samantha pin you to the wall.\n\t\t\t*achieve stunning\n\t\t\t*set reputation %+10\n\t\t\t*goto grabbed\n\t\t*else\n\t\t\tYour shot misses the leech completely, which is quite embarrassing considering how slowly it's moving. Before you can aim another shot, the leech-controlled Jim and Samantha pin you to the wall.\n\t\t\t*set lazer_pistol %+10\n\t\t\t*goto grabbed\n\t#I grab the glass of Earthside scotch from my armrest and take a swig for courage!\n\t\tYou feel the nourishing fluid fortify your body. Unfortunately, this doesn't stop the leech-controlled Jim and Samantha from grabbing you and pinning you to the wall.\n\t\t*set health %+10\n\t\t*goto grabbed\n\t#I strap on a jet pack and try to maneuver around the room to buy some time! \n\t\t*if (flying > 10)\n\t\t\tYou gracefully zoom around the confined space, even managing to stun one of the brain leeches with your flaming exhaust! However, your pack starts to sputter and the leech-controlled Jim and Samantha pin you to the wall.\n\t\t\t*achieve stunning\n\t\t\t*set reputation %+10\n\t\t\t*goto grabbed\n\t\t*else\n\t\t\tPerhaps flying in such a confined space wasn't the wisest idea. Your immediately crash into a wall and slump to the ground. Hands grasp both of your arms. You look up as the leech-controlled Jim and Samantha pin you to the floor. \n\t\t\t*set health %-10\n\t\t\t*set flying %+10\n\t\t\t*goto grabbed\n\n*label grabbed\nJim's blank eyes betray no emotion as he bashes your head with his lazer pistol. He doesn't even change color, which is particularly off-putting since you've learned to rely on his skin tone to tell you what he's going to do next.\n\n*if (special_helmet = \"yes\")\n\tLuckily the blows harmlessly bounce off your newly acquired helmet. You smirk in defiance, congratulating yourself on your foresight and fashion sense. You're brought back to reality as you feel one of Samantha's elegant fingers deftly unlatch the helmet, pulling it from your head. How is being controlled by a brain leech making her smarter?? \n\t\n\tYou'd normally say, \"What a gal!\" but now is not the time! \n\t*goto grabbed2\n*else\n\tYou grunt in pain as your head makes a sickening thud against the wall. \n\t*set health %-10\n\t*goto grabbed2\n\n*label grabbed2\n\nJim raises his lazer pistol and presses the muzzle against your temple. There's nothing you can do now! A brain leech creeps along the wall, approaching your head. In just seconds it will all be over! You'll be yet another victim of the brain leeches… from outer space!\n*page_break\n\nOr will you? You've forgotten all about Joe and his immunity to the brain leeches! You spot Joe cowering behind Hint's prone body, his head barely visible. What leadership decision can you make to save the day?\n*choice\n\t#Joe will only respond to a stern command! I order him to stop cowering like a… cowerer… and save me!\n\t\tJoe flinches at your words and remains frozen with indecision. So much for him saving the day.\n\t\t*set reputation %-10\n\t\t*set joe %-10\n\t\t*goto hint_save\n\t#As much as it pains me, I have to give Joe words of encouragement. \n\t\tYou almost throw up in your mouth, but you manage to tell Joe that you believe in him and that you're depending on him. \n\t\t\n\t\t\"I can tell you're throwing up in your mouth, Captain!\" he says. \"Is it really so hard to just be nice to me?\"\n\t\t*set reputation %+10\n\t\t*set joe %-10\n\t\t*goto hint_save\n\t#This is hopeless! I may as well spend my last moment of consciousness pondering the whole slug versus leech thing.\n\t\tThey're both pretty disgusting, but the slimy trail is certainly distinctive. You make a mental note to look up whether size is a defining feature, because these space leeches are certainly after something meatier than your aunt's prize lettuces.\n\t\t*set curiosity %+10\n\t\t*goto hint_save\n\n*label hint_save\n*page_break\nJust when all appears lost, the lights flicker on and the engines roar to life. The ship's systems have rebooted just in time! And that means Hint is back in action!\n\nTwo suction cups zip into view, easily popping the brain leeches from Jim and Samantha's craniums. Hint gathers all the brain leeches in her expandable arms and tosses them unceremoniously into the fruit crate in the cargo bay. After replacing the lid on the crate, she hovers up the side of the box and sits on top, thus ending the threat of the brain leeches in roughly five seconds.\n*page_break\nSamantha and Jim appear to be undamaged by the encounter. Your science officer no longer shows any hint of ingenuity or initiative and returns to happily pushing buttons and humming songs to herself. Jim immediately returns to his constant griping and grumbling about the limited capacities of your ship. You can't help but think you preferred his silent \"controlled by a brain leech\" persona. It turns out that getting beaten over the head verbally really is more painful than the alternative.\n\nOf course it turns out that the brain leeches had stowed away in the crate of Nettor Fruits Joe purchased on Fructocus 17. On your orders, Hint launches the crate, containing both the leeches and the fruit, into deep space. She appears almost satisfied as she waves her suction cup in farewell to the alien invaders, who immediately explode into a million slimy pieces outside the ship. \n\nAs you make your entry into your captain's log, you ponder what lesson you've taken from this adventure.\n*choice\n\t#I'm more curious than ever about the creatures we'll encounter in our journeys. \n\t\tAlthough I'm admittedly a little bit less curious about the brain-sucking worm things. And the carnivorous plants!\n\t\t*set curiosity %+10\n\t\t*goto end\n\t#I'm much less enthusiastic about meeting other beings. They all seem to be out to get us!\n\t\tEspecially the brain-sucking worm things! And the carnivorous plants! \n\t\t*set idealism %-10\n\t\t*set curiosity %-10\n\t\t*goto end\n\t#I'm still optimistic that we can make friends, and perhaps even allies, in the future. \n\t\tWe'll just steer clear of brain-sucking worm things. And carnivorous plants!\n\t\t*set idealism %+10\n\t\t*goto end\n\n*label end\n\n*if (crew_morale > 55)\n\tYour crew appears to be in good spirits and generally happy with your leadership as Hint sets your new course setting. You smile and gaze out the window into a universe filled with wonder. If your crew can handle the attack of the brain leeches, they can probably anything!\n\t*goto end2\n*if (crew_morale > 45)\n\tAs Hint sets your new course setting, you feel that your crew has been shaken by this encounter. Their faith in your leadership remains low. You force a smile and give Hint the \"go\" sign. Perhaps the next adventure will bring everyone closer together. Thankfully, not every journey will involve brain leeches… from outer space!\n\t*goto end2\n*else \n\tAs Hint sets your new course setting, you know your crew has been brought to its knees by this encounter. If this continues, you might have to start preparing for a mutiny. You can't even summon a smile as you gaze out the window. Things can't get much worse. Only time will tell if your crew can recover from the attack of the brain leeches… from outer space!\n\t*goto end2\n\n\n*label end2\n*page_break Episode Three\nIf you wish, you may visit the Special Features page now. \n\nWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\nWhere to, Captain?\n*choice\n\t#On with the adventure!\n\t\t*finish Episode Three\n\t#Take me to the Special Features.\n\t\t*goto_scene commentarya", "jacic_part_one": "*disable_reuse\n*page_break Episode Five\n\nIf you wish, you may visit the Special Features page now. \n\nWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\nWhere to, Captain?\n*choice\n\t#On with the adventure!\n\t\t*page_break Episode Five\n\t\t*goto epfive\n\t#Take me to the Special Features.\n\t\t*goto_scene commentarya\n\n*label epfive\nAll is calm and quiet... or is it???\n\nIs our hero's colorful past about to invade the present???\n\nWhich arch-e
