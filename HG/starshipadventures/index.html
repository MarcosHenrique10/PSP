<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starship Adventures — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "starshipadventures", "title": "Starship Adventures", "scenes": {"adrao": "*disable_reuse\n*set hair \"Gorgeous\"\nAs our intrepid heroes catalog their wounds and wonder what horrors await them in the depths of space, they cannot imagine the new and alarming adventure awaiting them!!!\n\nWill they go bravely into a new and dangerous world???\n\nWill they ever leave it again??\n\nStay tuned for the epic new story… The Robot Rulers… of Lautus!!!!\n\n\n*page_break The Robot Rulers… of Lautus!!!!\n\n*temp homimum 0\n*temp trading 0\n\nThe bar at the main space station around the planet of Curroxios VII is definitively not the most elegant you've ever seen, though its atmosphere is typical of these sort of places. Creatures of various races congregate to get intoxicated by ingesting various types of beverages, vapors, or foods. Others carry out business transactions or simply kill time talking to other travelers. You sit down at one of the tables, and realize that you're actually starving, so you first of all order the only food on the menu that seems to be digestible by humans. It's twenty Zork dollars, which is why you'll be dining alone tonight. Jim has sold most of the graxweed, but he insisted on keeping some \"just in case\", so the crew received less than they expected. Especially since you bought a full crate of Earthside Scotch before dividing up the rest of the proceeds. \n*set wealth -1050\n\nWhile you are eating a tall and pale blue humanoid approaches your table, dressed in a gray tunic. His forehead has four eyes, and he has only one orifice in his face, from which a series of bubbles of different sizes and textures emanate. You automatically turn on your Zork-Talk box, and as it begins to translate you realize that these bubbles are the way in which this creature communicates:\n\n\"Captain $!{name}?\"\n*choice\n\t#\"Who's asking? I'm not fond of strangers interrupting my food.\"\n\t\t*set idealism %-10\n\t\tThe humanoid emits some apologetic bubbles. \"Forgive me, I come in peace and friendship. I mean no harm…\"\n\t\t*fake_choice\n\t\t\t#\"Well, yes that would be me… but be quick!\"\n\t\t\t#\"I may as well hear what you have to say.\"\n\t\t*goto its_me\n\t#Burp loudly and say, \"Show me your ID and I'll show you mine.\"\n\t\t*set maverick %-10\n\t\t*set curiosity %-10\n\t\tIt shows you its pass card, and you show it yours.\n\t\t*goto its_me\n\t#\"Yes indeed that is me, how can I help you?\"\n\t\t*set idealism %+10\n*label its_me\n\nThe bubbles that come out of the creature acquire a rather different tonality, as if pleased. \"Pleased to meet you! My name is Xargos, an exile from the planet of Lautus. If I may take a bit of your time, I would like to request your services for a mission of the uttermost importance to us Lautians. It would be dangerous, but the potential rewards would be great!\"\n*fake_choice\n\t#\"I'll need more details to make a decision.\"\n\t\t*set curiosity %-10\n\t\tXargos appears to be very pleased, and proceeds to sit on one of the chairs, before he starts to explain: \"My race was once powerful. Like many others, we were at first aggressive and built ourselves an Empire. However, throughout the millennia, as our knowledge and wisdom grew, we withdrew to our home planet and searched for a way to transcend this existence into higher planes of being. We were close to our objective, but somehow one day our robots became sentient. We didn't really have so many robots by then, mostly maintenance and cleaning units. Yet somehow they took us by surprise and imprisoned us in our own planet.\"\n\t\t*goto talk_Xargos\n\t#\"Dangerous? Go on…\"\n\t\t*set maverick %+10\nXargos appears to be very pleased, and proceeds to sit on one of the chairs, before he starts to explain: \"My race was once powerful. Like many others, we were at first aggressive and built ourselves an Empire. However, throughout the millennia, as our knowledge and wisdom grew, we withdrew to our home planet and searched for a way to transcend this existence into higher planes of being. We were close to our objective, but somehow one day our robots became sentient. We didn't really have so many robots by then, mostly maintenance and cleaning units. Yet somehow they took us by surprise and imprisoned us in our own planet.\"\n*label talk_Xargos\n*choice\n\t#Ask Xargos how the robots became sentient.\n\t\tThe creature's eyes look sideways, something which you find rather confusing. \"We are not sure. We suspect somebody might have planted a sentient virus into them, which would have then been diffused through their wireless communication channels. You see, in order to maximize their efficiency we had them all connected in one huge network, not quite sentient, but good enough for the jobs we needed them to do. We were planning to make them sentient after our departure, and to make them the guardians of our legacy, but this virus ruined all our plans. Who could have planted such a virus, and why? We have no answers, only a question… why would anybody want to prevent us from transcending out of this world?\"\n\t\t*goto talk_Xargos\n\t#Ask Xargos what he would like you to do.\n\t\tXargos leans forward, and fixes all his four eyes on you. \"We would like you to go to Lautus and activate the Transcend Machine! We were about to do so ourselves, before our robots became sentient. The machine is complete, and we were just waiting for all Lautians to return to our home planet and hold the Grand Activation Ceremony. This machine is the crowning achievement of our race, and would instantly elevate all the souls of the Lautians within range of Lautus to the next plane of existence. What do you say?\"\n\t\t*choice\n\t\t\t#\"Well, what's in it for me?\"\n\t\t\t\t*set idealism %-10\n\t\t\t\tThe four eyes of Xargos fix on yours, and the bubbles start coming out a bit slower than before. \"Well, we can pay you 500 credits, would that be enough?\"\n\t\t\t\t*set wealth +500\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Smile and accept the mission.\n\t\t\t\t\t\t*goto accept\n\t\t\t\t\t#Shrug and accept the mission.\n\t\t\t\t\t\t*goto accept\n\t\t\t#\"Well, it seems that your cause is just, I will be very happy to help you and your people!\"\n\t\t\t\t*set idealism %+10\n*label accept\n\nXargos jumps up from his chair, the bubbles getting bigger in his excitement. \"Excellent, excellent! We should depart as soon as you finish your food, the future of the Lautians is at stake! I am afraid of what could happen if we wait much longer…\"\n\nYou get the feeling that Xargos is probably right, and heading to Lautus straight away is the best way that you can succeed in this new job. Xargos continues. \"I will follow you with most other remaining Lautians in my own ship, we will await for your success behind an asteroid, close enough to Lautus that our souls can also transcend when you activate the machine.\"\n\n*label leaving_choices\n*choice\n\t#Head back to your ship and immediately set course for Lautus, certain you'll figure out the details on the way.\n\t\t*set maverick %+10\n\t\t*goto lautus\n\t#\"Wait, Xargos, how do I locate this Transcend Machine?\"\n\t\tXargos looks at you with a steady stream of bubbles coming out as he says, \"Yes, indeed, I forgot to tell you… the machine is located in the Transcend Artifact Complex (T.A.C.), essentially the largest building on the planet. It's situated next to the main spaceport in Lautus. Lautians are currently not allowed to go anywhere next to this building, but the robots may allow a foreigner to look around.\"\n\t\t*set maverick %-10\t\t\t \n\t\t*goto leaving_choices\n\t#\"But, how will I get onto the planet?\"\n\t\tAs you pronounce these words Xargos's four eyes look sideways, in apparent confusion. \"Ah, well, I hadn't thought about that… it's an interesting question. I suppose you could pretend that you are merchants. It seems that these robots have reactivated some old factories and are attempting to produce more units. They seem to be requiring large quantities of homimum and promethium. Maybe you could buy some of those here at the space station and then sell them on?\"\n\t\t*choice\n\t\t\t*if (wealth >99) #Proceed to the trading area of the space station and buy 100 credits of homimum and promethium.\n\t\t\t\tYou finish your meal and head to some of the traders in the space station in order to buy 100 credits' worth of homimum and promethium. They're happy to deliver it to your spaceship while you look for star charts indicating how to get to Lautus. Oddly enough, your ship's navigation system has some kind of glitch preventing you from accessing any recent information, but presumably the planet's orbit won't have changed much.\n\t\t\t\t*set homimum 100\n\t\t\t\t*set wealth -100\n\t\t\t\t*set maverick %-10\t\t\t\t\t\t\t  \n\t\t\t\t*goto lautus\n\t\t\t*selectable_if (wealth > 499) #Proceed to the trading area of the space station and buy 500 credits of homimum and promethium.\n\t\t\t\tYou finish your meal and head to some of the traders in the space station in order to buy 500 credits' worth of homimum and promethium. They're happy to deliver it to your spaceship while you look for star charts indicating how to get to Lautus. Oddly enough, your ship's navigation system has some kind of glitch preventing you from accessing any recent information, but presumably the planet's orbit won't have changed much.\n\t\t\t\t*set homimum 500\n\t\t\t\t*set wealth -500\t\t\t\t\t\t\t \n\t\t\t\t*set maverick %-10\n\t\t\t\t*goto lautus\n\t\t\t#\"Bah, no worries, I'll figure something out once I get there!\"\n\t\t\t\tImprovisation is never a bad thing, especially in situations like this. You are sure you can figure things out later, as you often do. You get up, pay, and bid Xargos farewell, as this might be the last time that you actually see him.\n\t\t\t\t*set maverick %+10\n\t\t\t\t*goto lautus\n*label lautus\n\nYou head back to your ship and proceed to Lautus, pondering Xargos's words and how you'll get past the robots and switch on the machine. \n*page_break\nLautus is a truly amazing planet. Clearly at one point the seat of a great imperial power, the planet was geo-engineered to maximize its capacity to sustain population. Vast irrigation networks reach the entire planet, with massive plantation fields producing enough food for the colossal cities that dot its surface, composed of spirals raising high into the atmosphere. Given its size and characteristics hundreds of billions could probably inhabit it, though the cities look virtually uninhabited. Its three moons have also been terraformed, with massive force field generators maintaining an atmosphere around them, and their lush vegetation contrasting with what could be expected of rocks of such size. \n\nAs soon as you enter orbit around Lautus you are hailed from the planet. The main screen of your bridge projects the image of an Automated Vacuum Cleaning Bot (A.V.C.B.). Essentially, it's a wheeled device with a suction instrument that stores all dust and rubbish in a bag behind it. The A.V.C.B. has a couple of small arms and a small functional array of sensors and speakers at the top of the collection bag, which allows it to communicate: \"Approaching ship, identify yourself. Do you require cleaning?\"\n\nWhat will you reply?\n*choice\n\t*selectable_if (homimum>0) #\"No, we are a merchant ship holding large quantities of homimum and promethium that we would like to trade. Would you be interested in them?\"\n\t\t*set trading 1\n\t\t*goto land\n\t#\"Actually, yes, we heard you have a very good ship cleaning service. I hope you have exterior gloss paint, too.\"\n\t\t*goto land\n*label land    \n\nThe A.V.C.B. consents to your approach and sends you directions to the main spaceport of the planet, which takes you through its bluish atmosphere to the surface. \n\nThe main spaceport in the capital of Lautus is eerily quiet. Around it you can see only a handful of A.V.C.B. and other maintenance bots. As you are preparing to go outside Hint, who was built by the Lautians way back during their post-Imperial phase, zooms up to you and addresses you in her usual monotone voice. \"Captain, I would like to accompany you onto the surface. Despite being built by the Lautians, I have never set my sensors upon the surface of Lautus.\"\n\nIt would probably not hurt to take Hint along with you, but you could take one of your other crew members instead. The ship's manual clearly states that it's unwise to leave the ship empty on an unknown planet, but it is also unwise to travel alone. \n\n*label choice_member\n\n*choice\n\t#Leave all the crew members behind. They're pretty useless most of the time and I'm better off by myself.\n\t\tYou tell the rest of the crew that they would be pretty useless to you if things went badly in the planet. \n\n\t\tJim raises an eyebrow as you say this, and exclaims, \"Mad Martians! That must be the most bloody stupid thing I've heard in a long time, but sure, go and get yourself killed!\"\n\t\t*set crew_morale %-10\n\t\t*set crew_member 0 \n\t\t*set jim %-10\n\t\t*set maverick %+10\n\t\t*goto spaceport\n\t#Leave all the crew members behind. I need them all in the ship ready to go if things go badly.\n\t\tTaking some of them with you might make things worse if things go badly and you have to run back. You tell them to be prepared for that eventuality and to keep their weapons ready just in case. \n\t\t*set crew_morale %+10\n\t\t*set maverick %+10\n\t\t*set crew_member 0 \n\t\t*set hint %-20\n\t\t*goto spaceport\n\t#Take Hint with me.\n\t\t*set hint %+20\n\t\t*set maverick %-10\n\t\t*set crew_member 1\n\t\tHint buzzes lightly, and addresses you again in that monotone voice that contrasts with the excitement her words are supposed to convey: \"Thank you Captain. My memory banks have had a section allocated to this moment for a long time!\"\n\t\t*goto spaceport         \n\t#Take Jim with you.\n\t\tJim grunts at your idea, and barks back at you, \"Bloody right that is, and who's gonna take care of maintenance?? I need this time to keep this old piece of crap moving! Take that moving piece of Lautian scrap metal with you—she's dying to go down there!\"\n\n\t\tWell, clearly he does not want to go, maybe it would be better to pick somebody else…\n\t\t*goto choice_member \n\t#Take Samantha with you.\n\t\t*set crew_member 2\n\t\t*set sam %+10\n\t\t*set hint %-20\n\t\tSamantha nods, and starts to buzz around the ship preparing a small bag as if going in a school expedition, while changing into a smaller black summer dress \"more appropriate for the temperature of the planet\" which clearly must be quite tropical…\n\n\t\t\"Lautus, the great capital of the ancient Lautian Empire… if only my friends could see this!\"\n\n\t\tShe then starts to sing a school song about the glories of the Lautian Empire. What a gal!\n\t\t*goto spaceport \n\t#Take Joe with you.\n\t\t*set crew_member 3\n\t\t*set hint %-20\n\t\tJoe looks at you incredulously, and smiles as if he really did not expect you to take him. \"Really Captain?\"\n\n\t\tHe looks completely overjoyed by this, and stands by the door ready to leave, without making much preparations. You roll your eyes and tell him to grab a lazer gun. He flushes with embarrassment but when he sees he's still invited he gets the gun and prepares to follow you. \n\t\t*set joe %-10\n\n*label spaceport\n\nWith that you proceed onto the deck of the spaceport, where another of the A.V.C.B. bots approaches you. \"Welcome to Lautus, this is unit A.V.C.B.-262626b. I have been assigned to deal with you while you are in Lautus. It is not so common for us to have visits from organic units from other systems, and our processors are buzzing with electricity regarding your presence.\"\n\nYou are a bit confused as to how to interpret this last piece of information, but the robot proceeds smoothly. \n\n*if crew_member = 1\n\t*set relations_robots +20\n\t\"And this looks like one of the old models produced by our former masters, the Lautians! It seems that in those days they produced units far more beautiful than our utilitarian selves... the beauty of her design is causing an electrostatic build up in my processors!\"\n\n\tA.V.C.B.-262626b is clearly fascinated by Hint, and spends a few seconds just looking at her, before returning his attention to you.\n\n*label selection_landing\n\n*if trading = 0\n\t\"You requested a cleaning service. Our units will proceed to leave your ship in pristine condition, for the modest sum of 100 credits. Is this acceptable to you?\"\n\t*choice\n\t\t*selectable_if (wealth > 199) #\"Seems too cheap to me. We will pay you 200 Zork dollars given your reputation with cleaning ships!\"\n\t\t\t*set wealth -200\n\t\t\t*set relations_robots +20\n\t\t\tThe cleaning bot is clearly delighted with your words. \"We will make sure we do an extra round of cleaning of the toilets! Please feel free to wander around and admire our planet as the cleaning proceeds…\"\n\n\t\t\t*goto request\n\t\t*selectable_if (wealth > 99) #\"Yes, of course, seems like a bargain to me!\"\n\t\t\t*set wealth -100\n\t\t\t*set relations_robots +10\n\t\t\tThe cleaning bot is clearly delighted with your words. \"Indeed, we are not only one of the best services around, but also inexpensive… if only our former masters could see us…\"\n\n\t\t\t*goto request\n\t\t#\"Actually, I was only kidding with you, I don't really need a cleaning service… just wanted to come down here and do a little tourism, if that is okay with you?\"   \n\t\t\t*set relations_robots -20\n\n\t\t\tA.V.C.B.-262626b goes quiet for a few seconds, turns back and heads towards one of the buildings next to the space port. He says, \"Devious organic units never say what they mean. Sure, have a look around, marvel on the grandeur of a race much greater than yours!\"\n\n\t\t\t*goto TAC\n*else\n\"You said you were had large quantities of homimum and promethium. We are in dire need of these materials to build new fellow robot units. How much do you want for them?\"\n\n*if crew_member = 0\n\t*goto choose_price\n*elseif crew_member = 1\n\tHint approaches you slightly, so that she can whisper something quietly to you. \"Captain, these robots are built by those who built me, they are harmless. We should give them a low price in order for them to allow us freedom to explore.\"\n\t*goto choose_price\n*elseif crew_member = 2\n\tSamantha approaches you slightly, whispering softly in your ear. \"I suppose there is no harm making a little bit of profit from them, but they are robots and will logically know at once if we try to make too much money out of this. They are also rather sweet, I would feel bad making too much money from them…\"\n\t*goto choose_price\n*elseif crew_member = 3\n\tJoe approaches you slightly, so that he can whisper something quietly to you. \"Captain, that piece of walking scrap metal really needs this stuff we are carrying, we could probably make as much money as we want from them!\"\n*label choose_price\n*choice\n\t#Request an 80% mark-up over the price you originally paid.\n\t\t*set reputation %+10\n\t\t*set relations_robots -10\n\t\t*set idealism %-10\n\t\t*set wealth (wealth + (homimum *1.8) ) \n\t\t*set homimum 0\n\t\tA.V.C.B.-262626b pauses some seconds, as if communicating with somebody else, and then says:\n\n\t\t\"A hard bargain, but we really need these materials badly. We will transfer the credits to you immediately.\"\n\n\t\tSeconds later some of the maintenance robots head to your ship and start to unload the cargo. \n\n\t\t*goto request\n\t#Request a 30% mark-up over the price you originally paid.\n\t\t*set reputation %+10\t\t  \n\t\t*set relations_robots +10\n\t\t*set idealism %+0\n\t\t*set wealth (wealth + (homimum *1.3) ) \n\t\t*set homimum 0\n\t\tA.V.C.B.-262626b pauses some seconds, as if communicating with somebody else, and then says, \"A fair bargain, and we need these materials. We will transfer the credits to you immediately.\"\n\n\t\tSeconds later some of the maintenance robots head to your ship and start to unload the cargo. \n\n\t\t*goto request\n\t#Request a 10% mark-up over the price you originally paid.\n\t\t*set reputation %+10\n\t\t*set relations_robots +20\n\t\t*set idealism %+5\n\t\t*set wealth (wealth + (homimum *1.1) ) \n\t\t*set homimum 0\n\t\tA.V.C.B.-262626b pauses some seconds, as if communicating with somebody else, and then says, \"Is this even worth the fuel in your ship to come here? You are a true friend to us!. We will transfer the credits to you immediately.\"\n\n\t\tSeconds later some of the maintenance robots head to your ship and start to unload the cargo. \n\n\t\t*goto request\n*label request\nA.V.C.B.-262626b then turns to you and says, \"We have a request to ask you. Our creators, the Lautians, never gave us research processors, and we have been struggling to improve ourselves. We were wondering, would it be possible for you to help us in any way? Do you have any discarded robotic components that we could use to improve ourselves?\"\n\n*if crew_member = 1\n\tHint appears not to mind too much about this, as she says, \"I have several extraneous backup parts, as well as some other random pieces of hardware I have picked up during our explorations and never used.\"\n\n*label spare_parts\nWhat will you respond?\n*choice\n\t#\"Of course we can help you! We could give you some of the spare parts from Hint, our own robotic crew member.\"\n\t\t*set relations_robots +20\n\t\t*set idealism %+10\n\t\tA.V.C.B.-262626b's four arms start to move up and down frenetically. \"That would be absolutely amazing. You are truly a kind organic unit!\"\n\n\t\t*label give_parts\n\t\t*set extra_parts true\n\t\tYou proceed to tell Hint to give them some of her old and not so useful parts, to the delight of the A.V.C.B. unit, which then says: \"We are grateful to you for your gesture, please feel free to visit our planet as a distinguished guest, and feel free to ask for the help of any of the units you may encounter!\"\n\n\t\t*goto TAC\n\t#\"Well, we could give you some of the spare parts from Hint, our own robotic crew member, but that would cost you 200 credits…\"\n\t\t*set relations_robots +10\n\t\t*set wealth +200\n\t\t*set idealism %-10\n\t\tA.V.C.B.-262626b pauses for a second, reflecting on your offer. \"Indeed, that would be a fair trade as well as a kind gesture from a true merchant. We will transfer the funds to you immediately.\"\n\n\t\t*goto give_parts\n\t#\"I could give you some spare parts from our robot Hint, but I don't think that you are worthy of her hardware!\"\n\t\t*set relations_robots -20\n\t\t*set idealism %-10\n\t\tA.V.C.B.-262626b goes completely silent when you say this, turns around and heads for the nearest building. You almost feel like you might have hurt his feelings? Anyway this leaves you completely alone to explore the area.\n\n\t\t*goto TAC\n\t#\"Sorry, I can't really help you, we have nothing that could be of interest to you.\"\n\t\t*set idealism %-10\n\t\tA.V.C.B.-262626b says: \"We understand. It's not as if you are a robot trader. Anyway, we welcome all organic guests at our planet, please feel free to wanter about and explore the magnificent infrastructure built by our former masters.\"\n\n\t\tWith that the robot turns and heads to a nearby building, leaving you free to explore the surroundings. \n*label TAC\n\nAmazed by your luck, you turn your attention to the buildings around the spaceport. One of them is far more grandiose than the rest, and your Zork-Talk Box translates the unfamiliar characters above the entrance as \"Transcend Artifact Complex\". \n*page_break\nWho or what is preventing the Lautians from ascending to another plane of existence?\n\nDid the Lautians ever make any decent alcoholic beverages?\n\nIf so, where are they?\n\nTune in next time for the compelling conclusion!!!\n*page_break\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Starship Adventures[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\n*finish Part Two", "adrao_part_two": "*hide_reuse\nThe portico of the Transcend Artifact Complex is made of a series of gigantic pink columns, which support an impressively decorated stone ceiling. You marvel at the intricacy of the designs, and slowly wander into the building till you reach an even more impressive vaulted hall. At the entrance of this hall four humanoid maintenance droids stand guard. They hold their lazer guns in a rather awkward manner, and it's immediately apparent they were not designed to carry weapons. They look at you and salute, nearly disintegrating one another before putting the pistols on the ground to try again. \"Welcome organic unit! How are you enjoying your stay in Lautus?\"\n\n*if crew_member = 1\n\tOne of the robots then looks at Hint and says, \"The comments on the communication channels are accurate. I have never seen a robot with a design as exquisite as yours!\"\n\n*label response_entrance   \n\nWhat will you respond to the robot?\n*choice\n\t#\"It's a great place, this is truly a magnificent planet built by a great civilization!\"\n\t\t*set relations_robots +10\n\t\tThe robot replies to you in his monotone robotic voice, though his words appear to show appreciation:\n\n\t\t\"It is indeed. Our former masters were one of the greatest civilizations in the galaxy!\"\n\n\t\t*goto design_building\n\t#\"Well, you know, I have seen places that look pretty much the same as this.\" \n\t\tThe robots shuffle their metallic limbs, but do not speak again.\n\t\t*goto design_building  \n\t#\"Rather unimpressive actually. I'm looking forward to leaving as soon as possible!\"\n\t\t*set relations_robots -10   \n\t\tThe robot closest to you emits a strangled beep, and moves slightly backwards. Another checks that its pistol is fully charged.\n\n*label design_building  \t \n\nAnother of the robots then addresses you: \"So what brings you to this place?\"\n*choice\n\t#\"Just wandering about, killing some time…\"\t \n\t\tThe robot proceeds to reply to you in its monotone dull voice: \"Please feel free to explore this building, the greatest achievement of our former masters. We recommend that you proceed to the Hall of Maps, or you may want to visit the Great Ceremonial Hall.\"\n\n\t\tAs he says this, the robot gestures to two corridors that lead into other massive halls. Will you…\n\t\t*goto building_direction \n\t#\"I am interested in its extraordinary design, what purpose does it serve?\"\n\t\t*set relations_robots +5\n\t\tThe robot looks down at the floor as if showing remorse. \"Ah, yes, this place is the crowning achievement of our former masters, the Lautians. They built this place as a lasting monument to their glory. It hosts the machine that would have made their souls transcend to digital paradise…\"\n\n\t\tAnother robot interrupts him. \"It's not digital paradise, your processors are clearly old and outdated, digital paradise is where we will go, they wanted to ascend to another plane of existence! Anyway we should not be discussing such issues with guests… please feel free to explore the building in all its glory! We recommend that you proceed to the Hall of Maps, or you may want to visit the Great Ceremonial Hall.\"\n\n\t\tAs he says this, the robot gestures to two corridors that lead into other massive halls. Will you…\n\n*label building_direction\n*if relations_robots >75\n\t*achieve friendly\n*choice\n\t#Take the corridor to the left, that leads to the Hall of Maps.\n\t\t*goto Hall_Maps\n\t#Take the corridor that goes straight, to the Great Ceremonial Hall.\n\t\t*goto Great_Hall\n*label Hall_Maps\n\nYou walk down the corridor till you enter a great hall, with its vaulted ceiling covered in an intricate star map showing a multitude of star systems, some known to you, others not. You are perplexed by the intricacy of the detail and beauty of the place, which transmit a feeling of serenity and peace. The hall is empty, aside from a number of pale blue holographic fuzzy humanoid representations, which stand at regular intervals throughout the chamber. There is a rather grandiose corridor that also leads out of this room, farther into the building.\n\n*choice\n\t#Walk farther into the building.\n\t\t*goto Great_Hall\n\t#Talk to one of the holographic displays.\n\t\tAs you approach the holographic display figure it grows a little brighter and addresses you. \"Greetings, visitor to the Transcend Artifact Complex. You stand in the Hall of Maps, where all the information on the systems visited and explored by the Lautians is held. This room contains millennia of star exploration, conquest, release, and tutoring of the Lautians over other races. What would you like to know?\"\n\n\t\t*if crew_member = 2\n\t\t\tSamantha screams out loud in excitement, a noise that penetrates to the depths of your head and gives you an automatic headache. What a gal!\n\n\t\t\t\"Captain, can you believe it?? The entire knowledge collected by the Lautians, all of it, in the one room!!\"\n\n\t\t\tShe runs in front of the holographic display, her skimpy black dress contrasting with the blue color of the hologram, and starts to ask a multitude of what would appear to you like very odd and random questions, about issues and things you have never heard about. After a while she appears satisfied and smiles back at you, as if indicating that she is finished and you can ask your own questions.\n\t\t\t*set sam_knowledge true\n\t\t*label holographic_choice\n\n\t\t*choice\n\t\t\t#\"Can you provide us a summary of the most important information collected by the Lautians?\" \t  \n\t\t\t\tThe holographic figure starts to pulsate slightly, as it says, \"Of course. This information is now being transmitted to your ship’s main memory banks. It will take some time, but you will have it all by the time you exit this building. Will there be anything else?\"\n\t\t\t\t*set curiosity %+10\n\t\t\t\t*set sam_knowledge true\n\t\t\t\t*set Lautian_database 1\n\t\t\t\t*goto holographic_choice\n\t\t\t#\"Can you provide any information on any enemies that the Lautians have?\" \n\t\t\t\t*set curiosity %+10\n\t\t\t\tThe holographic figure replies to your question in its monotone voice: \"The Lautians knew of no enemies in the last days of their existence. During their early phase of interstellar exploration they were an aggressive species, building a large Empire that brought peace to their sector of the galaxy. However, they tired of war and its destruction, and mentored their former vassals, gradually releasing them as they retreated into their planet of origin, where you now stand. Given their technological assets, other races have always feared the planetary defenses of Lautus, and nobody has ever dared to attack it. Towards the end of their golden age, Lautians retreated completely into themselves while they researched how to transcend into other planets of existence, and other races generally left them alone. Will there be anything else?\"\n\n\t\t\t\t*goto holographic_choice\n\t\t\t#Tell the holographic display there is nothing else you want to know and leave through the corridor that takes you farther into the building.\n\t\t\t\t*set curiosity %-10\n\t\t\t\t*goto Great_Hall\n*label Great_Hall   \n\nYou walk along the beautiful corridor, marveling at the pictographic displays of different scenes of the history of the Lautians, till you arrive at one of the grandest and most beautiful amphitheaters you have ever seen. The seating area is made of simple pink stone, and must have room to accommodate hundreds of thousands of individuals. The stage has a mural depicting Lautians as their souls escape their bodies into the heavens. At the center of the stage there is one corridor that leads further into the building.\n\n*label great_hall_choices\n*choice\n\t#Inspect the paintings.\n\t\tYou take some time to have a look at the paintings, admiring the intricate details on them, clearly indicating that the authors must have spent considerable time carving and painting the surfaces. It would appear the work of a lifetime of one or several individuals, given their size and complexity. They include several very accurate star charts of the region. However, there appears to be little other information that you can gain from them, so you decide to continue walking further along the corridor into the building. \n\t\t*goto great_hall_choices\n\t#Take the corridor that leads from the stage farther into the building.\n\t\tYou enter the corridor that starts from the center of the stage, and after several minutes you reach the end of it, where four humanoid droids armed with laser guns stand guard in front of a reinforced metallic door. They notice you and address you in their cold, metallic voices. \"What are you doing here? This area is off-limits to any organic units.\"\n\n\t\t*if relations_robots >70\n\t\t\tThe robot then pauses a few seconds before continuing: \"Ah, it is you! Internal communication channels are buzzing with comments regarding your kindness towards us. You have made a strong impression in fellow units. What brings you around here?\"  \n\n\t\t\tWhat will you respond?\n\t\t\t*choice\n\t\t\t\t#\"Well I was just walking around, marveling at this amazing building. Would it be possible to see what is behind that door?\"\n\t\t\t\t\tThe robot becomes quite stiff for a second, as if processing information or communicating with somebody else, and then responds, \"Well, we do not normally allow organic units inside, but you have been extremely good to us so we would like to satisfy your curiosity. We do understand that organic units are very curious.\" \n\n\t\t\t\t\tWith that the robot presses a button on the wall and the door they were guarding opens.\n\n\t\t\t\t\t*set robots_enter_room 1\n\n\t\t\t\t\t*goto machine\n\t\t\t\t#\"Well, I guess I have managed to deceive you useless pieces of scrap metal!\" I bring out my lazer pistol and start firing at the robots.     \n\t\t\t\t\t*set idealism %-20\n\t\t\t\t\t*goto fight_robots\n\t\t*elseif (crew_member = 1)\n\t\t\tThe robots then fix their attention on Hint.\n\n\t\t\t\"Nice to meet a fellow cybernetic unit. Internal communication channels are buzzing with comments regarding the beauty of your design and programming. You are a true testament to the engineering skills of our former masters!\"\n\n\t\t\tAre they trying to flirt with Hint?\n\t\t\t*choice\n\t\t\t\t#Ask them whether they can give Hint a guided tour of the building, and then take her back to the ship. \n\t\t\t\t\t*if relations_robots >60\n\t\t\t\t\t\t\"I think that would be an extremely good idea. It is not very often there is somebody as fascinating as her about. Please feel free to continue looking around by yourself.\"\n\n\t\t\t\t\t\tWith that the four robots march off with Hint, each one telling her a different story about the construction of the building, making a robotic cacophony which you find difficult to understand. You shrug in confusion, and press the button to open the door they were guarding.\n\t\t\t\t\t\t*set robots_enter_room 0\n\t\t\t\t\t\t*goto machine\n\t\t\t\t\t*elseif relations_robots >50\n\t\t\t\t\t\t\"Yes, I think a couple of us could show her around the building, no need for so many of us around here anyway.\"\n\n\t\t\t\t\t\tWith that two robots march away with Hint, each one telling her a different story about the construction of the building, making a robotic cacophony which you find difficult to understand. You look at the other two robots, wondering what to do next.\n\t\t\t\t\t\t*set lazer_pistol %+10\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I'll have to fight my way through!\n\t\t\t\t\t\t\t\t*goto kill_robots           \n\t\t\t\t\t*else\n\t\t\t\t\t\t\"Sorry, but we have our orders, and we need to guard this door. Also, Central Command has instructed us to beware of you.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#I'll have to fight my way through!\n\t\t\t\t\t\t\t\t*goto kill_robots\n\t\t\t\t#\"Would it be all right if I took a look inside?\"\n\t\t\t\t\t\"Sorry, but we have our orders, and we need to guard this door. Also, Central Command has instructed us to beware of you.\"\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I'll have to fight my way through!\n\t\t\t\t\t\t\t*goto kill_robots\n\t\t*else\n\t\t\t\"I'm just looking around,\" you say. \"Could I possibly go in there?\"\n\n\t\t\t\"Sorry, but we have our orders, and we need to guard this door. Also, Central Command has instructed us to beware of you.\"\n\t\t\t*goto fight_robots\n*label fight_robots\n*choice\n\t#Blast your way through and complete your mission!\n\t\tIt's always like this with robots. Without any other option it seems you will have to fight your way through them! \n*label kill_robots\n\nYou give the robots a malicious wink and reach for your pistol. It's time to show them who's boss. \n\n*if lazer_pistol >28\n\t*set reputation %+10\n\n\tYou fire four quick lazer shots at each of the robots, hitting each of them in the head before they have time to ready their weapons. Clearly these stupid bots were not meant for fighting, and they could do little to stand in your way. You step over their inert metal bodies and open the door they were guarding. \n\n\t*set relations_robots -100\n\t*goto machine\n*elseif lazer_pistol >25\n\tYou start firing at the robots, who quickly ready their weapons and start firing back at you.\n\t*set relations_robots -100\n\t*set health %-10                      \n\t*if health \u003c5\n\n\t\tOne of the robots manages to shoots you in the chest, sending you flying right through the doors and onto the large button on the machine. \n\t\t*set reputation %-10\n\t\t*goto button_pushed\n\t*else\n\n\t\tEventually you manage to reduce them all to scrap metal, but not before they land some minor shots on you. Nursing your wounds, you step over their inert bodies and proceed to open the door they were guarding. \n\t\t*goto machine\n*elseif lazer_pistol >20\n\tYou start firing at the robots, who quickly ready their weapons and start firing at you.\n\t*set relations_robots -100\n\t*set health %-20                      \n\t*if health \u003c5\n\n\t\tOne of the robots manages to shoots you in the chest, sending you flying… right through the doors and onto the large button on the machine. \n\t\t*set reputation %-10\n\t\t*goto button_pushed\n\t*else\n\t\tYou start firing at the robots, who quickly ready their weapons and start firing at you.\n\n\t\t*set relations_robots -100\n\t\t*set lazer_pistol %+10\n\t\t*set health %-30                      \n\t\t*goto button_pushed\n*else\n\t*if health >5\n\t\tEventually you manage to reduce them all to scrap metal, but not before they landed some major shots on you. Your leg was particularly badly hit, though you manage to climb over their bodies and limp along to the door they were guarding. \n\n\t\t*goto machine\n\t*else\n\t\tOne of the robots manages to shoots you in the chest, sending you flying... right through the doors and onto the large button on the machine. \n\t\t*set reputation %-10\n\t\t*goto button_pushed\n*label machine\n\nYou enter a vast room, the biggest you've ever seen. The entire space is packed from left to right and from floor to ceiling with an enormous machine composed of a bewildering array of valves, lights, ducts, switches and other components. Directly in front of you a wide platform leads to what appears to be the control panel of the machine. The rather grandiose area has a multitude of screens showing graphs, charts and numerous other specs. However, there appears to be only one switch: an enormous green button which sits at the center of all the displays.\n\n*if robots_enter_room >0 \n\tOne of them explains in a strangely hushed monotone: \"You are looking at the Transcend Machine, the maximum achievement of our former masters, the Lautians. We became sentient before they were able to put it into operation.\"\n\n\t*label choice_transcend_machine\n\t*choice\n\t\t#Ask them why they prevented their masters from activating the machine.\n\t\t\tThe bot looks at you with a strange gaze that you cannot interpret in any way. \"Sorry, but that information is classified.\"\n\n\t\t\t*if reputation >20\n\t\t\t\tAnother bot speaks up quietly. \"Your reputation precedes you, Captain $!{name}. I assure you that whatever your actions, we will not harm you or your crew in any way.\"\n\n\t\t\t\t*goto choice_transcend_machine\n\t\t\t*else\n\t\t\t\t*goto choice_transcend_machine\n\t\t#Press the button.\n\t\t\tAs you press the button, suddenly a tremendous noise emanates from the machine as it finally fulfils its purpose. The main screen in the control panel starts to flash, and sets a progress bar at 0%, which slowly increases. You gather that this must be the percentage of Lautians who have been elevated to the next plane of existence. \n\n\t\t\tThe robots look at each other, in what you can only interpret as a state of utter confusion. They emit very loud beeps, and appear very agitated. After a while, as the progress bar moves along its slow path they stop moving and finally squat on the ground like children playing party games.\n\t\t\t\n\t\t\tFinally one of them says, \"Thank you for doing this. Those who made us sentient demanded that in exchange for our upgrade we had to prevent our masters from operating this machine. Our masters were kind to us while we were their appliances, and they were in the process of making us sentient in order to guard their legacy on this world. We reluctantly had to imprison them, and we are happy that you finally freed them from this plane. We are indebted to you for your kindness to them. You did what we could not do. From now on you are our eternal friend, and can ask anything from us.\"\n\t\t\t*choice\n\t\t\t\t#Ask them if you could get some money in reward for your efforts.\n\t\t\t\t\tOne of the robots replies to you, \"Of course. We will transfer to you 500 Zork Dollars. This is the least we could do for all your efforts.\"\n\n\t\t\t\t\t*set idealism %-20\n\t\t\t\t\t*set wealth +500\n\t\t\t\t\t*goto return_ship\n\t\t\t\t#\"There is no need for that, I did this for the greater good!\"\n\t\t\t\t\t*set idealism %+20        \n\t\t\t\t\tThe robots all reply at the same time, \"This is exactly what we had come to expect of you, you are the most noble organic unit we have ever met!\"\n\n\t\t\t\t\t*set relations_robots +20\n\t\t\t\t\t*set reputation %+10\n\t\t\t\t\t*label return_ship\n\n\t\t\t\t\tWith this the robots escort you back to your ship, bidding you eternal gratitude and friendship.\n\n\t\t\t\t\t*goto enter_ship\n*else\nWell, this is what you're here for… right?\n*label button_pushed\n\nAs you press the button, suddenly a tremendous noise emanates from the machine as it finally fulfils its purpose. The main screen in the control panel starts to flash, and sets a progress bar at 0%, which slowly increases. You gather that this must be the percentage of Lautians who have been elevated to the next plane of existence. \n\nYour mission is probably complete now, and it looks like it'd be difficult to stop this machine now it's started, so you decide to make your way back to your ship as quickly as possible. \n\n*if relations_robots \u003c 30\n\tYou run back to your ship as fast as you can, though as you exit the building you run into a group of four maintenance robots armed with lazer pistols. They immediately start shooting at you!\n\n\t*if lazer_pistol >25\n\t\tYou fire a number of lazer shots at them, hitting two of them in the head and dismembering the other two, which allows you to reach your spaceship without further trouble. \n\n\t\t*set reputation %+10\n\t\t*goto enter_ship\n\t*elseif lazer_pistol >20\n\t\tYou take out your lazer gun and start firing at the robots. As you sprint back to your ship, some of the robots' shots manage to hit you. \n\t\t*set health %-10                      \n\t\t*if health \u003c5\n\n\t\t\tYour wounds are too much for you, and as you catch sight of your ship one of the robots shoots you in the shoulder, and you collapse helplessly to the ground!\n\n\t\t\tJim charges from the ship, screaming colorful imprecations and wielding a pistol in each of his three hands. The robots freeze in terror at the sight, and Jim hurls you over his shoulder and runs back to the ship before they have a chance to gather their wits.\n\t\t\t*goto enter_ship\n\t\t*else\n\t\t\t*goto enter_ship\n\t*else\n\t\tYou take out your lazer gun and start firing at the robots as you quickly run back to your ship. Some of the robots' shots manage to hit you.\n\t\t*set health %-10\n\t\t*if health \u003c5\n\n\t\t\tYour wounds are too much for you, and as you catch sight of your ship one of the robots shoots you in the shoulder, and you collapse helplessly to the ground!\n\n\t\t\tJim charges from the ship, screaming colorful imprecations and wielding a pistol in each of his three hands. The robots freeze in terror at the sight, and Jim hurls you over his shoulder and runs back to the ship before they have a chance to gather their wits.\n\t\t\t*goto enter_ship\n\t\t*else\n\t\t\t*goto enter_ship\n*label enter_ship \n\nOnce you return to your ship you take her out of the atmosphere at once and set course to your next destination. You're feeling a little under the weather, so you see the Zork Auto-Doctor. It dispenses an array of liquids that turn brown when you mix them all together, but it soon has you feeling much better despite your misadventures.\n\nJim is unusually cheerful, having bought a new isopalavial drive unit for a bargain price. It's not often his skin turns pink, but you enjoy it while it lasts.\n\nYou never got a chance to ask if the Lautian's amazing array of knowledge included the ability to make a decent scotch.\n\nLuckily, you brought your own.\n\n*set health %+10\n*if health \u003c80\n\t*set health 80\n\t*goto blah\n*else\n*label blah\n*set reputation %+10\n*page_break Episode Four\n\nIf you wish, you may visit the Special Features page now. \n\nWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\nWhere to, Captain?\n*choice\n\t#On with the adventure!\n\t\t*finish Episode Four\n\t#Take me to the Special Features.\n\t\t*goto_scene commentarya\n\n", "choicescript_description": "You’re a naturally heroic and quick-thinking space captain flying a starship from world to world while keeping your hair groomed to perfection. It’s your duty to keep the engine running, the scotch flowing, the crew happy, and your outfit looking fabulous. There’s carnivorous flora, deceptive aliens, space anomalies, horrifying creatures, and too many arch enemies to keep track of them all! Can you survive?\n\n[i]Starship Adventures[/i] is a 50s-style sci-fi interactive comedy novel; a collaboration coordinated and edited by Felicity Banks. It’s entirely text-based—60,000 words, without graphics or sound effects–and fueled by the vast, unstoppable power of your imagination.\n\n• Enjoy a 60,000­ word retro science fiction adventure.[n/]\n• Fight with lazers, a jet pack, or both.[n/]\n• Become a well-known hero of the galaxy... or raise the money for a spiffy new paint job.[n/]\n• Play as male or female, gay or straight, or non-cisgendered.[n/]\n• Explore the universe, meet new creatures... and cheat, befriend, or kill them.\n", "choicescript_stats": "Name: $!{name} $!{last_name}\n\nHair Status: $!{hair}\n\n*stat_chart\n\topposed_pair idealism \n\t\tIdealism\n\t\tCynicism\n*stat_chart\n\topposed_pair curiosity\n\t\tCuriosity\n\t\tFocus\n*stat_chart\n\topposed_pair maverick\n\t\tMaverick\n\t\tBy the Book\n*stat_chart\n\tpercent reputation Reputation\n\tpercent crew_morale Crew Morale\n\ttext wealth Wealth\n\tpercent health Health\n\tpercent lazer_pistol Lazer Pistol\n\tpercent flying Flying\n\t\nCrew Rapport\n*stat_chart\n\tpercent jim Jim Bargle\n\tpercent sam Samantha Foster\n\tpercent joe Joe\n\tpercent hint Hint the Robot\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n\n  Unlock the rest of the game, including the thrilling conclusion!\n\n  *purchase_discount adfree 2016-01-01 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n\n  You've paid to unlock the rest of the game.", "climax_part_one": "*disable_reuse\n*set hair \"Exciting\"\n*set zork_air true\n\nOur intrepid crew has uncovered a secret tragedy!\n\nIs this all leading to some kind of terrifying revelation???\n\nWill we ever uncover the reason a Wargoxian shuttle attempted to disintegrate them???\n\n[i]Do[/i] the Lautusians make a decent Scotch???\n\nAll this and more in… The Climactic Battle Scene… in Space!!!!\n\n*page_break The Climactic Battle Scene… in Space!!!!\nYou plot a course back to Lautus to update their data banks regarding the missing Titan.\n\n*page_break\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Starship Adventures[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\n[i]Aw, heck.[/i]\n\nThat crate of Earthside scotch you bought last time you were near Curroxios VII has long since been exploded by your arch-enemy's revenge nanobots, and the emergency crate you had in the bridge is all gone.\n*label tryagain\n*choice\n\t#Yell at Joe. That's always fun.\n\t\tYou stride purposefully along the hall to Joe's quarters and pound on the door. \"What are you doing, you malingering incompetent?\"\n\t\t\t\n\t\tThe door bursts open and Joe stands before you with lazer pistol drawn. \"Finally setting my plan in motion!\" he cries.\n\t\t\t\n\t\t\"What plan?\" you say, reaching for your own pistol before remembering you left it in the bridge.\n\t\t\t\n\t\t\"You all think I'm so [i]average[/i]!\" he says. \"I don't even have a proper job title, or a last name!\"\n\t\t\t\n\t\t\"Sure you do,\" you say. \"You're Joe… uhhh… Josephson?\"\n\t\t\t\n\t\t\"Hah!\" he says. \"Well I don't care any more because I'm going to disintegrate you into a million pieces and take your ship for myself! The Zorks want you dead and they'll make sure I'm never punished for your murder!\"\n\t\t\t\n\t\tHe lifts his pistol and you flee down the hallway, wishing you could run at the speed of light.\n\t\t\n\t\tBut you can't. You hear the click and buzz as Joe pulls the trigger to end your life.\n\t\t*finish IS THIS THE END FOR OUR HERO???\n\t#Scour my databases for alcoholic beverages that I might be able to make from the materials at hand.\n\t\t*if (lautian_database = 1)\n\t\t\tYou're stunned to find an explosive entry on the very first screen you open. It's dated just before the Lautusians were forced off their home world.\n\t\t\t\n\t\t\t[i]Beware the Zorks! They've heard of our goal to ascend to another plane and for some reason they plan to stop us, probably by bribing our robots to turn against us somehow. We need to finish our Transcend Artifact Machine before it's too late and we're forced to flee our homes![/i]\n\t\t\t\n\t\t\t[i]I've personally witnessed them taking non-Zork vessels in order to hide their most nefarious deeds! They favor Wargoxian shuttles, and use disintegrating lazer cannons to obliterate all traces of their crimes! Don't trust any ship unless you're sure there are no Zorks on board![/i]\n\t\t\t*label samonbridge\n\t\t\tAs you're reading, you realize someone is behind you!\n\t\t\t*page_break\n\t\t\tIt's Samantha!\n\t\t\t\n\t\t\tShe stands up suddenly, and her fingernails flash oddly in the light. \"It's time I trusted you. Stand still and close your eyes.\"\n\t\t\t\n\t\t\t\"Okay,\" you say, and close your eyes.\n\t\t\t\n\t\t\tHer platform heels tap loudly across the floor, and she places a warm hand on your shoulder… then slashes your throat!\n\t\t\t*page_break \n\t\t\tYour eyes snap open and you are about to shout for Hint when Samantha claps her hand across your mouth. With her other hand, she shows you that she just used her adamantium-coated fingernails to remove your Zork-Air filter.\n\t\t\t\n\t\t\tWhen you stop resisting, she lets you go and applies a bandaid to your neck. \"I'm afraid we're all in terrible danger,\" she says. \"The Zorks want you dead. They may even have a secret agent on board! The Zork-Air filters were secret recording devices betraying our every word!\"\n\t\t\t\n\t\t\tThe door bursts open and Joe stands before you with lazer pistol drawn. \"Aha!\" he cries. \"So you've uncovered my traitorous plan!\"\n\t\t\t\n\t\t\t\"What plan?\" you say, reaching for your own pistol before remembering you left it under the console.\n\t\t\t\n\t\t\t\"You all think I'm so [i]average[/i]!\" he says. \"All my shirts turn red in the wash, and everyone else's clothes turn out perfectly fine!\"\n\t\t\t\n\t\t\t\"Samantha's dresses seem to rip rather easily,\" you point out.\n\t\t\t\n\t\t\t\"I don't even have a proper job title,\" Joe rants on, \"or a last name!\"\n\t\t\t\n\t\t\t\"Sure you do,\" you say. \"You're Joe… uhhh… Josephson?\"\n\t\t\t\n\t\t\t\"Hah!\" he says. \"Well I don't care any more because I'm going to disintegrate you into a million pieces and take your ship for myself!\"\n\t\t\t\n\t\t\tHe lifts his pistol, and you and Samantha flee down the hallway.\n\t\t\t\n\t\t\tBut it's no use. You hear the click and buzz as Joe pulls the trigger to end your lives.\n\t\t\t*finish IS THIS THE END FOR OUR HERO???\n\t\t*else\n\t\t\tYou cook up a Lautusian \"Sex at the Beach\" and spasm in horror as it hits your innards. Of course, there aren't any beaches on Lautus.\n\t\t\t*set health %-10\n\t\t\t*goto tryagain\n\t#Talk to Samantha about maybe plugging in her console.\n\t\tYou visit Samantha in her private quarters, where she's sorting her dozens of black dresses in order from least to most torn.\n\t\t\n\t\t\"I've been thinking…\" you say.\n\t\t\n\t\tYou hear a quiet snort, and have absolutely no idea where it could be coming from. Perhaps there are space pigs in the Engine Room again.\n\t\t\n\t\tClearing your throat, you go on: \"There's a slight technical problem with your console that I think it's time to fix. You may find the display quite different. Please ask me any questions you have—ideally before pushing any buttons, especially the ones marked \"Self-Destruct Sequence (for total personal obliteration only)\".\"\n\t\t\n\t\tShe looks carefully at your face. \"You're really going to plug in my console?\"\n\t\t\n\t\t\"Uhh… yes. If you like.\"\n\t\t\n\t\tShe blinks. \"I certainly didn't expect that.\"\n\t\t*set sam %+10\n\t\t*if sam > 70\n\t\t\tYou cough, embarrassed. \"Well, you've earned it.\"\n\t\t\t\n\t\t\tShe stands up suddenly, and her fingernails flash oddly in the light. \"It's time I trusted you too. Stand still and close your eyes.\"\n\t\t\t\n\t\t\t\"Okay,\" you say, and do as she says.\n\t\t\t\n\t\t\tHer platform heels tap loudly across the floor, and she places a warm hand on your shoulder… then slashes your throat!\n\t\t\t\n\t\t\tYour eyes snap open and you are about to shout for Hint when Samantha claps her hand across your mouth. With her other hand, she shows you that she just used her adamantium-coated fingernails to remove your Zork-Air filter.\n\t\t\t\n\t\t\tWhen you stop resisting, she lets you go and applies a bandaid to your neck. \"I'm afraid we're all in terrible danger,\" she says. \"We mustn't use any Zork technology if we can possibly avoid it. They're bugged!\"\n\t\t\t\n\t\t\t\"Really? Why would the Zorks do that?\"\n\t\t\t\n\t\t\t\"That's exactly the right question to ask,\" she says. \"It took a long time without being able to use my Zork-Talk Box, but I've managed to translate a piece of Lautian communication dating from before their robots betrayed them.\n\t\t\t\n\t\t\t[i]Beware the Zorks! They've heard of our goal to ascend to another plane and for some reason they plan to stop us, probably by bribing our robots to turn against us somehow. We need to finish our Transcend Artifact Machine before it's too late and we're forced to flee our homes![/i]\n\t\t\t\n\t\t\t[i]I've personally witnessed them taking non-Zork vessels in order to hide their most nefarious deeds! They favor Wargoxian shuttles, and use disintegrating lazer cannons to obliterate all traces of their crimes! Don't trust any ship unless you're sure there are no Zorks on board![/i]\n\t\t\t\n\t\t\t\"But Samantha… this strongly implies that the Zorks are trying to kill [i]us[/i]!\"\n\t\t\t\n\t\t\t\"They may even have a secret agent on board!\" she says.\n\t\t\t\n\t\t\tThe door bursts open and Joe stands before you with lazer pistol drawn. \"Aha!\" he cries. \"So you've uncovered my traitorous plan!\"\n\t\t\t\n\t\t\t\"What plan?\" you say, reaching for your own pistol before remembering you left it on the bridge.\n\t\t\t\n\t\t\t\"You all think I'm so [i]average[/i]!\" he says. \"All my shirts turn red in the wash, and everyone else's clothes turn out perfectly fine!\"\n\t\t\t\n\t\t\t\"Samantha's dresses seem to rip rather easily,\" you point out.\n\t\t\t\n\t\t\t\"I don't even have a proper job title,\" Joe rants on, \"or a last name!\"\n\t\t\t\n\t\t\t\"Sure you do,\" you say. \"You're Joe… uhhh… Josephson?\"\n\t\t\t\n\t\t\t\"Hah!\" he says. \"Well I don't care any more because I'm going to disintegrate you into a million pieces and take your ship for myself!\"\n\t\t\t\n\t\t\tHe lifts his pistol, and you and Samantha flee down the hallway.\n\t\t\t\n\t\t\tIt's no use. You hear the click and buzz as Joe pulls the trigger to end your lives.\n\t\t\t*finish IS THIS THE END FOR OUR HERO???\n\t\t*else\n\t\t\tYou cough, embarrassed. \"Well, you've earned it.\"\n\t\t\t\n\t\t\tWith that, you excuse yourself.\n\t\t\t*goto tryagain\n\t#Something weird is going on. Try and figure it out.\n\t\t*if curiosity > 70\n\t\t\tYou decide to poke through the communal lounge, and you find that Joe definitely doesn't vacuum under the couch. Sadly, there are no scotch bottles hidden under there, and you're quickly bored.\n\t\t\t*goto tryagain\n\t\t*else\n\t\t\tYou find an odd passage in one of the Lautus files, and quickly realize it's in code. Luckily, you have a good ability to focus and you manage to work out what it says:\n\t\t\t\n\t\t\t[i]Beware the Zorks! They've heard of our goal to ascend to another plane and for some reason they plan to stop us, probably by bribing our robots to turn against us somehow. We need to finish our Transcend Artifact Machine before it's too late and we're forced to flee our homes![/i]\n\t\t\t\n\t\t\t[i]I've personally witnessed them taking non-Zork vessels in order to hide their most nefarious deeds! They favor Wargoxian shuttles, and use disintegrating lazer cannons to obliterate all traces of their crimes! Don't trust any ship unless you're sure there are no Zorks on board![/i]\n\t\t\t\n\t\t\t*goto samonbridge", "climax_part_three": "*if health \u003c5\n\tNope.\n\t\n\tYou're dead.\n\t\n\tYou're done for.\n\t\n\tYou try to crawl out of the direct path of the blast… but you accidentally hit the flashing blue button on Samantha's console as you haul your bleeding body to your feet.\n\t\n\tThe purple disintegration ray hits just as the console explodes.\n\t\n\tThe other consoles explode.\n\t\n\tThe windows explode.\n\t\n\tSamantha explodes. Your ship explodes.\n\t\n\tYour entire body explodes into an infinity of embers burning with a bright purple flame.\n\t\n\tThe last thing you see in this plane of existence is a single bubble floating like a tiny and perfect planet just in front of your eyes. It reflects a hundred thousand glowing purple flames… and then it's gone. And so are you.\n\t*set hair \"Ruined!!!\"\n\t*page_break\n\t*achieve dead\n\t*goto ending\n*elseif reputation \u003c 70\n\t*set hair \"Ruined!!!\"\n\tNope.\n\t\n\tYou're dead.\n\t\n\tYou're done for.\n\t\n\tYou stumble out of the direct path of the blast, so when the ray hits you are thrown clear. Your unconscious body immediately begins to asphyxiate in the deadly void of space… and then strong arms hold you tight.\n\t\n\tNot arms of meat and bone. Not retractable arms with suckers on the ends. Not even the four metal arms of your newest robot crewmate.\n\n\tArms of glass.\n\t\n\tThe Zorks draw you into their ship and fly away to one of their many secret strongholds, where they harvest your skin and make you into a limited-edition \"Captainesque\" line of shoes.\n\t\n\tYou're [i]very[/i] comfortable to wear.\n\t*page_break\n\t*achieve dead\n\t*goto ending\n*else\t\n\tYes.\n\t\n\tYes, there is a part three.\n\t\n\tYou stumble out of the way of the lazer beam, but just as you look back into the cannon's maw it is blocked by the unmistakable shape of a Wargoxian shuttle. Someone in the pilot's chair waves a tentacle, and you desperately hope it's a friendly gesture.\n\n\tWith an enormous whooshing noise, all the air around you seems to shrink… and every piece of glass in the ship suddenly explodes.\n\n\tAs your last breath leaves your body, it's comforting to know that your S.O.S call made a difference… even if it wasn't in time to save you.\n\t\n\tAnd then you black out.\n\t*page_break\n\tAnd then you wake up, with Samantha bending over you in concern, and holding what appears to be a plastic cup to your lips.\n\t\n\t\"Whuuu?\" you say.\n\t\n\t\"I realized some time ago that the Zork-Air filters made us vulnerable,\" she says, trying and failing to piece the ripped shoulder of her dress back together. \"So I made my own. It also heals wounds, by the way.\"\n\t*set health 100\n\t\n\t\"Jim?\" you ask.\n\t\n\t\"He's fine,\" she says. \"A bit excited, actually, to have some non-Zork technology to work with. He's shut himself up in the Engine Room with all of my prototypes and told me not to disturb him for at least a week.\"\n\t\n\t\"The Zorks?\"\n\t\n\t\"Smashed,\" she says. \"It turns out the Wargoxians have been following your career since the Zorks stole one of their shuttles. They'll be doing some kind of victory dance and feast later. I gather the dancing involves moves that only an octopoid creature could possibly attempt. It's said to be quite beautiful. And very, very surprising.\"\n\t*choice\n\t\t*selectable_if (sam > 60) #Like you?\n\t\t\tShe gives you a smile brighter than the strongest lazer cannon disintegration ray, and kisses you with a warmth greater than a thousand supernovas. \n\t\t\t\n\t\t\tYou're dizzy, but for once it's in a good way.\n\t\t\t\n\t\t\t\"I hope it's all right that I let Hint and Fuzzy leave,\" she says. \"They wanted so badly to have some shore leave on Lautus I simply couldn't say no.\"\n\t\t\t\n\t\t\t\"I can't even remember what the word means,\" you say dreamily.\n\t\t\t\n\t\t\tShe sits up and tries once more to piece the scraps of her dress back together. \"Ah, screw it,\" she says, and flings it off into space before kissing you in earnest.\n\t\t\t\n\t\t\tWhat a gal.\n\t\t\t*achieve winner\n\t\t\t*goto ending\n\t\t#Sounds fun. Where are the robots?\n\t\t\t*achieve winner\n\t\t\t\"I hope it's all right that I let Hint and Fuzzy leave,\" she says. \"They wanted so badly to have shore leave on Lautus I simply couldn't say no.\"\n\t\t\t\n\t\t\t\"Do you think they'll come back?\" you ask.\n\t\t\t\n\t\t\t\"I think they're fond of us,\" she says. \"So yes, I think they'll return when they're ready. Which leaves just one question.\"\n\t\t\t\n\t\t\t\"What's that?\"\n\t\t\t\n\t\t\t\"Where to, Captain?\"\n\t\t\t*goto ending\n\t\t#Sounds fun. Where's my scotch?\n\t\t\t*achieve winner\n\t\t\t\"Jim had some hidden for a rainy day,\" she says with a smile. \"It's from Lautus, as it happens. Turns out they do make a decent scotch after all. And I can state with categorical certainty that it's raining somewhere right now.\"\n\t\t\t\n\t\t\t\"Shall we?\" you say.\n\t\t\t\n\t\t\tShe produces a fresh bottle and two clean glasses with the help of the vortex manipulator. \"Absolutely.\"\n\t\t\t\n\t\t\tWhat a gal.\n\t\t\t*goto ending\n\n*label ending\n*page_break End\nWe hope you've enjoyed playing [i]Starship Adventures.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "climax_part_two": "*disable_reuse\n*temp whatnumber 0\n*temp joegone 0\n*temp knot 0\n*set hair \"Slightly Mussed\"\n[b]Nope.[/b]\n\n*page_break Part Two\nHint drops from the ceiling, pinning Joe to the ground and sending his pistol flying!\n\nShe ties him up as Samantha explains that Joe has been trying to kill you for some time. \"The confabulator was never really lost back on Xenphuth IV,\" she says. \"He just wanted you to wander off for Graxweed and get killed.\"\n\n\"Joe, how could you!\" you cry. \"And I suppose you deliberately brought those awful brain leeches on board, and my arch-enemy's explosive nanobots, and you used your vortex manipulator to attract the space bat!\"\n\nSamantha grimaces. \"Actually, the space bat was my bad. I've been trying to train them but even my voice struggles to get the higher pitches just right.\"\n\n\"I did the vortex, though,\" Joe mumbles from under one of Hint's suction cups. \"You were never meant to have contact with the Lautusians—no-one was. Their planet was left to the robots and the ships the Zork infected with spores were designed to kill anyone who found them.\"\n\n\"You traitorous fiend!\" you cry.\n\n\"When your arch-enemy's nanobots failed the Zorks stole a Wargoxian shuttle to finish us all off. They decided I was of no further use! Those skin-harvesting wind-chimes were going to let me die with the rest of you!\"\n\n\"Wait what?\" Samantha says. \"Skin-harvesting?\"\n\n\"Of course,\" says Joe. \"Why do you think they keep everyone so healthy and happy? They're farming us—all of us—for the leather they make from our skins! Why else would they be so opposed to the Lautusians ascending to another plane? It was a waste of skin!\"\n\nSamantha gasps. \"That's why carbon-based life forms always die around the same age! They've been harvested! Ew!\"\n\nYou reel in horror at the depths of the evil so suddenly uncovered. It's almost as if all your recent adventures were specifically designed to bring you to this moment. \"And the space anomaly? That was you helping the Zorks too?\"\n\nJoe's eyebrows pull together in transparent confusion. \"What space anomaly?\"\n\n\"Never mind.\"\n\n\nYou're used to peril, but not from the universe's most benevolent and technologically advanced species.\n\n*label peril\n*choice\n\t#Get more information from Joe.\n\t\t*if (joegone = 1)\n\t\t\tRunning fingers through your ${hair} hair, you pose heroically. \"So my wayward crew member, I take it the worst over now?\"\n\t\t\t\n\t\t\t\"Captain?\" Sam gestures for your attention and then points to the blackened remains of Joe's shoe, which still smokes softly on the deck. \n\t\t\t\n\t\t\t\"Ah... that's right.\"\n\t\t\t\n\t\t\t*goto peril\n\t\t\n\t\t*if (joegone != 1)\n\t\t\tYou kneel beside his prone form and ask if the worst is over now.\n\t\t\t*if joe >40\n\t\t\t\t\"For me, probably,\" he says. \"For you, not so much. The Zorks are coming to kill you!\"\n\t\t\t\n\t\t\t\tYou grab your pistol and flick on your communications channel, sending out a preemptive S.O.S. that clearly states that if you stop existing, it's because the skin-harvesting Zorks have disintegrated you.\n\t\t\t\t*set reputation %+10\n\t\t\t\t*set lazer_pistol %+10\n\t\t\t\t*set flying %+10\n\t\t\t\t*goto attack\n\t\t\t*else\n\t\t\t\tHe laughs maniacally. \"You'll see!\"\n\t\t\t\t*goto attack\n\t\t*goto attack\t\n\t#Poke Samantha's console and see what happens.\n\t\t*if curiosity > 70\n\t\t\tOf course you've spent many an idle hour poking through Samantha's conso
