 her voice almost deafens you, though you have never been one to shy away from danger, and occasions like these do not present themselves every day!. \n\n\t\tXgoto titan_choices\n\n\t\tXXDock your ship with the scavenging ship, and proceed to board it\n\n\t\tYou manoeuvre your ship till its aligned with one of the scavenging ship's hatches and proceed down to the main exit hatch of your ship, while the rest of your crew congregates around you. Samantha is crying and hugs you:\n\n\t\t\"Don't go, captain, I have a really bad feeling about all this!\"   \n\t\t\t\t  \n\t\tClearly she is in a state, and its unlikely that you will manage to get her to accompany you. However, maybe you could take one of your other crew members along with you?\n\t\t   \n\t\tXlabel choice_member\n\n\t\tXchoice\n\n\t\tXXTell them that they are all useless in these kind of situations, leave them all behind and enter the ship by yourself   \n\n\t\tXset maverick %+10\n\n\t\tXset crew_morale %-5\n\n\t\tXgoto hatch\n\t\t \n\t\tXXTell them that it's too dangerous for them, leave them all behind and enter the ship by yourself\n\n\t\tXset crew_member 0 \n\n\t\tXset maverick %+10\n\n\t\tXset crew_morale %+5\n\n\t\tXgoto hatch\n\n\t\tXXTake Hint and Fuzzy with you, after all they were built by Lautians\n\n\t\tXset crew_member 1\n\t\t\t\t\n\t\tHint buzzes lightly, and uses her monotone voice to tell you:\n\n\t\t\"Indeed captain it is wise for me to accompany you, somehow the ship these scavengers were investigating belongs to the ancestors of those who built me, so I could be of help\"\n\n\t\tWith that Hint turns towards the hatch and starts to key a number of commands into its console, which bring together a wealth of information and dazzling bright lights into its display. Fizz looks at her, emitting intermittent beeps in admiration.  \n\n\t\tXgoto hatch       \n\n\n\t\tXXTake Jim with you, he might be useful if there is a mechanical fault that needs to be repaired\n\n\t\tXset crew_member 2\n\n\t\tJim grunts and picks up his lazer pistol and a large sharp combat knife. You look at him, and he answers:\n\n\t\t\"What?? Jumping Jupitarians, you never know what is bloody down there, and best of cases these scavenger characters can be a jumpy bloody bunch!\"\n\n\t\tWith that he turns his attention towards the hatch and starts to key a number of commands into its console, which bring together a wealth of information and dazzling bright lights into its display.  \n\n\t\tXgoto hatch    \n\n\t\tXXTake Joe with you, generally he seems pretty useless but he might be able to keep you some company?\n\n\t\tXset crew_member 3\n\t\t\t\t\n\t\tJoe looks really surprised, and quite scared:\n\n\t\t\"Ehhhhh.... well I am not sure I am overly qualified for this type of...\"\n\n\t\tAt this point Jim thrusts a lazer gun to his chest, blowing all the air our of his lungs and making him cough for several seconds. Jim looks at him, then at you:\n\n\t\t\"Jumping Jupitarians, that's the problem with kids these days, no sense of duty!\"\n\n\t\tJoe looks quite hurt, but picks himself up and readies himself to enter the hatch after you. \n\n\t\tXgoto hatch\n\n\t\tXlabel hatch   \n\t\t  \n\t\tThe hatches' sensors indicate that the air appears to be breathable, as the ship's power and life-support systems appear to be online. However, you tell those remaining to leave the compartment next to the hatch and close and lock the door behind them, just in case\n\n\t\tXlabel boarding_choices\n\n\t\tXchoice\n\n\t\tXhide_reuse XXPut on a space suit anyway, just in case, and then open the hatch and enter the ship\n\t\tXset Titan_suit 1\n\n\t\tXset maverick %-10\n\n\t\tYou decide that all precautions are not enough, and put on a space suit before opening the hatch, you always hate how it restricts your movements but safety comes first! It also occasional allows for some nice photos that don't necessarily emphasize your ${hair}... \n\n\t\tXgoto boarding_choices\n\n\t\tXXOpen the hatch and enter the ship\n\n\t\tThe hatch gives way to what appears to be the small shuttle bay of the scavenging ship, probably used when its crew needs to use a smaller ship to access narrow spaces.   \n\t\t \n\t\tXlabel shuttlebay                 \n\t\t \n\t\tThe shuttle bay is rather dirty, littered with a variety of tools and pieces of machinery. Under the shuttle you find the body of one of the crew members, a human who appears to have been brutally murdered, with a hammer protruding from her skull. \n\n\t\tFrom the shuttle bay there is a poorly illuminated corridor that appears to lead to the bridge of the ship.\n\t\t \n\t\tXchoice\n\n\t\tXselectable_if (Titan_suit \u003c 1) XXHave a drink of whisky from your flask to steady your nerves\n\n\t\tClearly always gives you some courage when you need it, and the warmth and light-headedness it gives you makes you think that moving towards the bridge would be a good idea. \n\n\t\tXgoto ship_bridge\n\t\t  \n\t\t  \n\t\tXhide_reuse XXCheck the corpse to see if you can find any indications of who might have killed her\n\n\t\tYou check the body but it does not look like there are many clues, aside from the hammer obviously sticking out of the skull. She appears to have been servicing the shuttle when she was attacked, possibly indicating that she was caught by surprise by whoever attacked her. You decide there is not much else that can solve this mystery around here, and start to make you way to the bridge.\n\t\t  \n\t\tXgoto ship_bridge\n\n\t\tXXProceed along the narrow corridor to the bridge\n\t\tXif crazyman =1\n\t\tXgoto ship_bridge\n\t\tXelse\n\t\t  \n\t\tXset crazyman 1\n\t\t \n\t\tAs you walk along the corridor towards the bridge, suddenly the figure of a man dressed in overall rags comes running down the corridor towards you, screaming madly at you: \"Where is my whisky?? Thieves, you stole my whisky!\". His eyes are bright red, with foam coming out of his mouth and a strange twitch vibrating through one of his arms, with which he wields a screwdriver.\n\n\t\tXchoice\n\t\t \n\t\tXXThrow the man your whisky flask, and tell him it's all his.\n\n\t\tThe man catches the flask, and avidly proceeds to open it and drink its entire content in one big gulp, before turning back to you and shouting: \"Where is the rest, and where are my marsh mellows??\"\n\n\t\tAh, you forgot to bring any marsh mellows, which would appear to make any further appeasement difficult... \n\n\t\tXgoto kill_man\n\n\t\tXXTake out your lazer pistol and shoot him\n\n\t\tXif lazer_pistol >80\n\n\t\tXlabel kill_man\n\n\t\tYou fire two quick lazer shots at him, burning holes through his head and torso and sending him flying back towards one of the sides of the corridor. \"Clearly no point talking to him\", you mutter to yourself while you step over his body and continue on your way to the bridge.   \n\t\tXset lazer_pistol %+10\n\n\t\tXgoto ship_bridge\n\n\t\tXelseif lazer_pistol >70\n\n\t\tYou fire two quick lazer shots at him, burning holes through his leg and torso, making him even more furious till he thrusts his screwdriver into your leg. \n\t\t \n\t\tXset lazer_pistol %+10\n\t\t \n\t\tXset health %-10                      \n\n\t\tXif health \u003c5\n\n\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier... it seems you have lost too much blood and lose consciousness as the man continues to stab you in the neck... \n\n\t\tYou wake up back on board your own ship with Hint pouring coloured liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXgoto spores_decontaminate\n\n\t\tXelse \n\t\tLaughing wildly he steps back, giving you time to shoot several more times till he collapses inert in the floor, allowing you to step over his body and proceed to the bridge. \n\n\t\tXgoto ship_bridge\n\n\t\tXelseif lazer_pistol >60\n\n\t\tYou fire two quick lazer shots at him, burning holes through his arm and leg, making him even more furious till he thrusts his screwdriver into your torso. \n\t\t \n\t\tXset lazer_pistol %+10\n\t\t \n\t\tXset health %-20                      \n\n\t\tXif health \u003c 5\n\n\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier... it seems you have lost too much blood and lose consciousness as the man continues to stab you in the neck... \n\n\t\tYou wake up back on board your own ship with Hint pouring coloured liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXgoto spores_decontaminate\n\n\n\t\tXelse \n\t\tLaughing wildly he steps back, giving you time to shoot several more times till he collapses inert in the floor, allowing you to step over his body and proceed to the bridge. \n\n\n\t\tXgoto ship_bridge\n\n\t\tXelse\n\n\t\tYou fire two quick lazer shots, with the first one missing and the second hitting him in the leg, making him even more furious till he thrusts his screwdriver into your upper torso. \n\t\tXset lazer_pistol %+10\n\t\t \n\t\tXset health %-50                      \n\n\t\tXif health \u003c5\n\n\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier... it seems you have lost too much blood and lose consciousness as the man continues to stab you in the neck... \n\n\t\tYou wake up back on board your own ship with Hint pouring colored liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXgoto spores_decontaminate\n\n\t\tXelse \n\t\tLaughing wildly he steps back, giving you time to shoot several more times till he collapses inert in the floor, , allowing you to step over his body and proceed to the bridge. \n\n\t\tXgoto ship_bridge\n\t\t \n\n\n\t\tXlabel ship_bridge\n\n\t\tThe bridge of the scavenging ship is a rather messy and dirty room full of consoles that must have formed part of a variety of other ships, installed in a rather chaotic way, and was never the most organised of places. \n\n\t\tIt appears to have witnessed some fighting, and the main command control has been smashed, by somebody throwing the body of one of the crew members through it, with only the legs of the corpse sticking out. \n\n\t\tThere are three poorly illuminated corridors that exit from the bridge, and judging from the inscriptions on top of each they lead to the cargo deck, the crew's quarters or back to the shuttle bay where you left your shuttle. You could also try to see if you can operate anything in the ship from here.\n\t\tXlabel bridge_choices\n\n\t\tXchoice\n\t\tXselectable_if (bridge_examine \u003c 1) XXSee if you can find anything of interest in the room\n\t\tXset bridge_examine 1\n\t\tThe room is a mess, and the fighting only scattered even more the wide variety of objects in it... however, you encounter a bottle of Hurdassian whisky, aged 100 years!. Not believing your luck you proceed to take a couple of gulps, really good stuff! You also find a couple of bags of Marrussian marsh mellows next to them, the best in what is clearly one of humanity's favourite sweets, which you take along with you for latter consumption.\n\n\t\tXset marshmellows 1\n\n\t\tXchoice\n\t\tXXHave a sip of the Hurdassian whisky\n\t\tYou open the bottle and take a sip, and finally understand what makes their 100 year old stuff famous!. What a whisky!\n\t\tXgoto bridge_choices\n\t\tXXOpen one of the bags of Marrussian marsh mellows and have one   \n\t\tYou were a big fan of marsh mellows as a kid, and these clearly do not disappoint!\n\n\t\tXgoto bridge_choices\n\n\t\tXif (bridge_command \u003c 1) XXExamine the command control and see if it can be repaired\n\t\tXset bridge_command 1\n\t\tYou start to inspect the command control of the ship, but whoever threw that body into it really meant to destroy it, and it is clear that it will take a lot to get this ship moving again.\n\n\t\tXif crew_member =1\n\n\t\tHint approaches the command control, examining the corpse, and mentions:\n\n\t\t\"Organic components in the command control appear incompatible with digital components. Suggest removing organic components if ship needs to be operated\"\n\n\t\tWell, that would obviously be the start of it, but you doubt that you can be bothered with the mess that would create...\n\n\t\tXgoto bridge_choices\n\n\t\tXelse \n\t\tXgoto bridge_choices\n\n\t\tXif (bridge_log \u003c 1) XXAccess the captain's log to see if you can find any information\n\n\t\tXset bridge_log 1\n\n\t\tYou access the captain's log, which has not been damaged. The last entries all appear to relate to the arrival to this system, the discovery of the Lautian Titan and its exploration:\n\n\t\tEntry 234.56: I still cannot believe that we have found this beauty, how come she has been here all this time with nobody finding out about her?\n\t\t\t  \n\t\tEntry 234.57: Rafael and Paolo have gone into the Titan, still can’t believe those idiots risked their life last week in Hurdassian VIII for a couple of packets of Marrussian marsh mellows and a bottle of whisky…what a pair of idiots!\n\t\t\t  \n\t\tEntry 234.58: Those two are back, seems the ship is a bit of a mess inside, they found a couple of semi-operational defence bots and managed to restore some atmospheric pressure to one of the compartments, the idiots even had a look around in some of the areas with their helmets off!. Though they did find a stash of Zork dollars and managed to download some part of the ship's memory banks... I wonder if they still usable after all this time?\n\t\t\t  \n\t\tEntry 234.59: Something is wrong, Rafael has locked himself in the crew’s quarters, and is being very aggressive towards Miss Penny… Paolo appears to have sabotaged our propulsion system and is coming towards the bridge... sending out an S.O.S. signal now, will try to reason with him…\n\t\t\t  \n\t\tThat is the last entry, which makes you wonder whether the corpse could actually be that of the ship's captain?\n\n\t\tXset captainlog 1\n\n\t\tXset Titan_memory_bank 1    \n\t\t  \n\t\tXgoto bridge_choices\n\n\t\tXif (Titan_memory_bank > 0) XXAccess the memory banks that the crew of the scavenger ship brought back from the Titan\n\n\t\tXset Titan_memory_bank 0\n\n\t\tThe memory banks that the crew brought back appear to only be a fragment of what must have been held in the computer of the Titan ship, 'Xeno-extermination Mark I', an Imperial Lautian flagship. The memory contains information related to its final days, regarding the Lautian attempted assault on Hugghat III, homeworld of the Azzhrkak. Admiral Yargotios, in command of 'Xeno-extermination Mark I' and the rest of the Lautian fleet, facing unexpectedly strong orbital defences and the entire remnants of the Azzhrkak Ascendancy's fleet, ordered retreat. The main body of the Lautian fleet slowly disengaged and re-assembled around the main gas giant in the system, when unexpectedly a massive cloaked Zork fleet irrupted from a nearby moon and destroyed the already demoralized and battered Lautians, with only the 'Xeno-extermination Mark I' managing to withdraw from the system, pursued by the Zorks. \n\n\t\tYou wonder whether anybody else actually knows that it was the Zorks who ultimately destroyed the Lautian fleet at Hugghat III millennia ago, and what would be the implications of this?\n\n\t\tXgoto bridge_choices\n\t\t  \n\t\tXXDecide you have had enough of this ship, quickly return to the shuttle bay and then go back to your ship\n\t\tYou return to the dirty shuttle bay, from where you can return to the bridge of the ship or board your shuttle. \n\t\tXgoto return_ship\n\t\t\t   \n\n\t\tXif (cargo \u003c 1) XXProceed to the cargo deck\n\t\tXset cargo 1\n\n\t\tYou proceed to walk down one of the corridors from the bridge till you reach the cargo deck, a vast room that occupies a seizable proportion of the ship. It is almost empty, aside from a pile of empty containers on one side of the room and two containers in close to the entrance, with inscriptions that read \"Titan salvage\"\n\n\t\tXlabel cargo_choices\n\n\t\tXchoice\n\n\t\tXhide_reuse  XXLook to see if you can find something of value inside the containers\n\n\t\tYou check the containers and find that of them holds a stash of Zork dollars, very old ones by the looks of it (could they be thousands of years old?). This is not surprising as already millenia ago Zork dollars were one of the most used currencies in the galaxy, though you wonder whether they can still be used...\n\t\t  \n\t\tXif crew_member =1\n\n\t\tHint takes a look at the dollars and explains to you:\n\n\t\t\"Captain, these dollars are from before the time I was built, but Zorks do not retire their old denominations, so they should still be valid\"   \n\n\t\tXgoto take_money_or_not\n\t\t  \n\t\tXelsif crew_member =2\n\t\tXcomment to self: can you have different combinations of hint and jim?\n\t\tJim takes a look at the dollars and screams:\n\n\t\t\"Laughing Lautians! That's a big stash of dollars... I once saw somebody pay for a drink with those, so they should still be valid!\"\n\t\tXgoto take_money_or_not\n\t\tXelse\n\t\t  \n\t\tXlabel take_money_or_not   \n\n\t\tHowever, the question is, would it be ok for you to take the money, given that it probably originated from the Lautian Titan?\n\t\t  \n\t\t  \n\t\tXchoice\n\n\t\tXXAbsolutely. What good is money to dead people?\n\n\t\tYou put all the Zork dollars in your backpack, smile to yourself about your good fortune and look around for anything else of value, though it seems there is not much else here. \n\n\t\tXset maverick %+5\n\n\t\tXset wealth +300\n\n\t\tXgoto cargo_choices   \n\t\t  \n\t\tXXNo, anything that originates from the Lautian Titan is potentially dangerous\n\n\t\tXset maverick %+2\n\t\t  \n\t\tXgoto no_money  \n\n\t\tXXNo, somehow it is immoral to take the possession of dead individuals, even if they died thousands of years ago\n\n\t\tXset maverick %-5 \n\n\t\tXlabel no_money\n\n\t\tYou push the contained aside, stand up and turn away from it, while examining to see if you can find anything else of interest in the area, though there appears to be little of interest here.     \n\t\t  \n\t\tXif crew_member =2\n\n\t\tJim looks at you in utter disbelief, and shouts out:\n\n\t\t\"For all the Gold in Gnassos II, we are not taking the money??\"\n\t\t  \n\t\tWith this he kicks one of the boxes, spilling out a collection of bric-a-brac throughout the floor of the cargo deck... \n\n\t\tXset crew_morale %-20   \n\t\t  \n\t\tXgoto cargo_choices\n\t\t  \n\t\tXif crew_member =3\n\n\t\tJoe shouts incredulously at you as you turn your back on the stash of Zork dollars: \n\n\t\t\"What?? We are not going to take any of this money? Can you explain this to me again??\n\n\t\tXset crew_morale %-20\n\t\t  \n\t\tXgoto cargo_choices\n\n\t\tXelse\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\n\t\tXgoto cargo_choices\n\t\t  \n\n\t\tXXReturn to the ship's bridge\n\n\t\tXlabel return_ship_bridge   \n\t\t  \n\t\tYou slowly return to the bridge of the scavenging ship, which looks exactly the same as when you first entered it. From here there are three poorly illuminated corridors that exit from the bridge, leading to the cargo deck, the crew's quarters or back to the shuttle bay where you left your own shuttle. \n\n\t\tXgoto bridge_choices\n\n\n\n\n\t\tXselectable_if (crew_quarters\u003c1) XXProceed to the crew's quarters\n\n\t\tXgoto crew_quarters\n\n\t\tXlabel crew_quarters\n\n\t\tXset crew_quarters 1 \n\n\t\tYou walk along the poorly illuminated corridor till you reach a reinforced door, which would normally open through a small gritty control panel on the wall, which appears to have been smashed. \n\n\t\tXlabel crew_quarters_door_choices\n\n\t\tXchoice\n\n\t\tXselectable_if (crew_member =1) XXAsk Hint to see if she can open the door.\n\n\t\tHint extends one of her arms to the control panel, proceeds to dismantle it and after a few seconds playing around with its interior the door slowly opens. \n\t\t  \n\t\tXgoto enter_crew_quarters\n\t\t  \n\t\tXselectable_if (crew_member =2) XXAsk Jim to see if he can open the door.\n\n\t\tJim grunts, hits the control panel with the side of his lazer gun to expose its interiors, and then fires his lazer inside it. Sparks cover the entire area as the door slowly opens... why hadn't you thought of that? \n\t\t  \n\t\tXgoto enter_crew_quarters   \n\n\t\tXhide_reuse XXFire your lazer gun at the door.\n\n\t\tYou fire repeated shots at the door, though it seems to be rather strong and all you manage to do is to make small dents on it. \n\n\t\tXgoto crew_quarters_door_choices\n\n\t\tXXReturn to the bridge.\n\n\t\tYou give up attempting to open the door and decide to return to the bridge \n\t\tXset curiosity %-10\n\t\tXgoto return_ship_bridge\n\t\t  \n\t\t  \n\t\tXlabel enter_crew_quarters\n\t\t  \n\t\tThe crew's quarters looks slightly more hospitable than the rest of the scavenging ship, though it appears there has been some fighting in the area and multitude of objects lie scattered about, with a couple of corpses hanging on top of various pieces of furniture in impossible postures. \n\n\t\tSuddenly, from behind one table a man springs up, dressed in dirty overalls stained with blood:\n\n\t\t\"Miss Penny, is that you?... who are you? Where are my marsh mellows??\"\n\n\t\tThe man dodges the table and starts to approach you, picking a kitchen knife from the floor stained with a blood that looks very similar to the colour of his eyes.  \n\n\t\tXif crew_member =2\n\n\t\tBefore you have any time to act, Jim fires a series of lazer shots that send him flying backwards till he hits one of the walls. \n\n\t\t\"Bulging Biltonians! Another one of these lunatics! And what is it with cravings in this ship??\"\n\t\t  \n\t\tXgoto crew_choices\n\t\t  \n\t\tXelseif crew_member =3\n\n\t\tBefore you have any time to act, Joe fires a series of lazer shots at the man, which only appear to enrage him further. Marveling at the complete incompetence of your crewman, you take out your lazer pistol and start firing yourself.\n\t\t  \n\t\tXgoto crew_charge_choices\n\n\t\tXelse\n\n\t\tXlabel crew_charge_choices\n\n\t\tXchoice\n\n\t\tXselectable_if (marshmellows > 0) XXThrow him a packet of the marsh mellows you found in the bridge of the ship\n\n\n\t\tThe deranged man catches the packed of marsh mellows, opens it and proceeds to place as many as he can inside his mouth, while continuously uttering \"marsh mellows\" till he can really not say much. He then looks at you again and tries to speak, though the number of marsh mellows in his mouth prevent you from understanding anything.\n\t\t \n\t\tXgoto kill_man_crew_quarters\n\n\t\tXXTake out your lazer pistol and shoot him\n\n\t\tXif lazer_pistol >80\n\n\t\tXlabel kill_man_crew_quarters\n\n\t\tYou fire two lazer shots at him, burning a hole through his chest and his neck, sending him flying backwards towards one of the tables, and scattering even more objects around the room. \n\n\t\tXset lazer_pistol %+10\n\n\t\tXgoto crew_choices\n\n\t\tXelseif lazer_pistol >70\n\n\t\tYou fire two lazer shots at him, burning a hole through his leg and arm, making him scream in agony, while he madly thrusts his knife through your arm. \n\t\t   \n\t\tXset lazer_pistol %+10\n\t\t \n\t\tXset health %-10                      \n\n\t\tXif health \u003c5\n\n\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier... it seems you have lost too much blood and lose consciousness as the man continues to stab you in the neck... \n\n\t\tYou wake up back on board your own ship with Hint pouring colored liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXgoto crew_choices\n\n\t\tXelse \n\t\t\t\t\t\t\t\t\t\t\t\t\n\t\tYou proceed to kick him strongly in order to keep him away, while you fire a number of shots that finish him off. \n\n\t\tXgoto crew_choices\n\n\t\tXelseif lazer_pistol >60\n\n\t\tYou fire two lazer shots at him, burning a hole through one of his arms,  making him scream in agony, while he madly thrusts his knife through your lower abdomen. \n\t\t \n\t\tXset lazer_pistol %+10\n\t\t \n\t\tXset health %-20                      \n\n\t\tXif health \u003c5\n\n\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier... it seems you have lost too much blood and lose consciousness as the man continues to stab you in the neck... \n\n\t\tYou wake up back on board your own ship with Hint pouring coloured liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXgoto crew_choices\n\n\t\tXelse \n\t\tYou proceed to kick him strongly in order to push him away, while you fire a number of shots that finish him off. \n\n\t\tXgoto crew_choices\n\t\tXelse\n\n\t\tYou fire two quick lazer shots, with the first one missing and the second hitting him in the leg, making him scream in agony, while he madly thrusts his knife through your neck.\n\t\tXset lazer_pistol %+10\n\t\t \n\t\tXset health %-50                      \n\n\t\tXif health \u003c5\n\n\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier... it seems you have lost too much blood....\n\n\t\tYou wake up back on board your own ship with Hint pouring coloured liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXgoto crew_choices\n\t\tXelse \n\t\tYou proceed to kick him strongly in order to push him away, while you fire a number of shots that finish him off. \n\n\t\tXgoto crew_choices\n\n\n\n\n\n\n\t\tXlabel crew_choices\n\n\t\tThe crew's quarter is thus even more messy than when you first entered, giving it an even more cluttered appearance. You notice that from the central area there are a number of small doors that lead into small living quarters for each crew member, all of which are open except for one locked door. However, the security systems on the locks are of quite poor and you reckon that given its type you could easily open it if you fired a shot at its control pannel.\n\n\t\tXlabel crew_choices2\n\n\t\tXchoice\n\t\tXhide_reuse  XXLook to see if you can find something of value among the corpses and other furniture\n\n\t\tYou find a number of magazines, kitchen appliances, lots of (mostly broken) coffee and tea bags, random pieces of clothing and other personal objects, yet nothing of much value. \n\n\t\tXgoto crew_choices2\n\n\t\tXXReturn to the ship's bridge\n\n\t\tXgoto return_ship_bridge\n\n\t\tXXFire a shot at the control panel to open the locked door.\n\n\t\tThe panel lights up in fire, with sparks spreading throughout the entire area as the door quickly opens, revealing a rather neat and tidy room, with one beautiful young blonde woman in rather revealing overalls sitting on the bed. It would almost be a very peaceful scene if it were not for the fact that the entire walls of the room have been scribbled with paintings of monstrous figures. \n\n\t\t\"Oh, so nice to have visitors, it was so long since I have seen anybody...\"\n\n\t\tAs she says this the woman stands up and starts to come closer to you, smiling\n\n\t\tXif crew_member =2\n\n\t\tBehind you, Jim quietly whispers in your ear:\n\n\t\t\"Something is really funny here, what was she doing inside here with that other bloody lunatic outside? And what is she carrying in her hand???\"\n\n\t\tYou notice that she is indeed carrying something on the back of her hand, though you cannot see exactly what it is\n\t\t  \n\t\tXgoto blonde_choices\n\t\t  \n\t\tXelseif crew_member =3\n\n\t\tBehind you, Joe  whispers in your ear:\n\n\t\t\"Wow, what girl captain!, we should take her back, it would be nice to have another gal around rather than just Samantha!\"\n\n\t\tYou notice that she is indeed carrying something on the back of her hand, though you cannot see exactly what it is\n\t\t  \n\t\tXgoto blonde_choices\n\t\t  \n\t\tXlabel blonde_choices\n\t\t  \n\t\tXchoice\n\n\t\tXhide_reuse XXAsk her what she is doing in here alone\n\n\t\tShe continues to smile at you while she comes closer:\n\n\t\t\"Not much, you know, just killing time by myself... I was a bit bored till you came along... Wow! I did not realize what beautiful hair you have!\"\n\n\t\tXgoto blonde_choices\n\n\t\tXhide_reuse XXAsk her who was the crazy guy outside and why he wanted marshmallows.\n\n\t\tShe continues to smile at you while she comes closer:\n\n\t\t\"Oh, that? That was Rafael, you know, he goes crazy at times but I can handle him, though this time he was a bit crazier than normal and thought everybody had stolen his marshmallows... which are of course in the bridge, poor thing... \"\n\n\t\tXchoice\n\n\t\tXX\"Well, it's good to know you are doing well, but please do not come any closer.\" \n\n\t\tAs you say this she stops smiling, time enough for you to realize that her eyes look slightly red, as she says:\n\n\t\t\"But, if I don't come closer I cannot use these to open up your veins and drink your blood!\"\n\n\t\tShe reveals a little a little pair of scissors that she was holding in the back of her hand, and charges to up to you. \n\n\t\tXgoto kill_blonde\n\n\t\tXX\"Marshmallows, why does everybody have a craving for something inside the ship, do you have a craving for anything?\"  \n\n\t\tWhen you say this, she smiles and screams:\n\n\t\t\"Yes, your blood!!!\"\n\t\t \n\t\tAnd with that she charges towards you, using a little pair of scissors that she was holding in the back of her hand as a weapon. \n\n\t\tXgoto shoot_blonde\n\n\t\tXXShoot her\n\t\t\t\t\t\t\t\t\t   \n\t\tXlabel shoot_blonde\n\n\t\tXif lazer_pistol >80\n\n\t\tXlabel kill_blonde\n\n\t\tYou take out your lazer gun and fire a series of three shots at the blonde, burning a hole through her overalls and revealing a large part of her torso, as she falls dead on top of the bed. \n\t\t \n\t\tXset lazer_pistol %+10\n\n\t\tXgoto kill_blonde_choices\n\n\t\tXelseif lazer_pistol >70\n\n\t\tYou take out your lazer gun and fire a series of three shots at the blonde, which create large holes through her overalls and reveal more of her pale skin, contrasting greatly with the dark burns. She screams in pain but unlike you would expect from somebody like Samantha, she does not faint but instead thrusts the scissors into your arm, as she tries to also bite it with her mouth.         \n\t\t \n\t\tXset lazer_pistol %+10\n\t\t \n\t\tXset health %-10                      \n\n\t\tXif health \u003c5\n\n\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier... it seems you have lost too much blood and lose consciousness as she continues to stab you in the neck... \n\n\t\tYou wake up back on board your own ship with Hint pouring coloured liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXgoto spores_decontaminate\n\n\t\tXelse \n\n\t\tYou are about to punch her back to keep her away from you, before realizing its impolite to hit a gal, so you push her onto the bed while firing one last shot at her head to keep her down. \n\n\t\tXgoto kill_blonde_choices\n\n\n\t\tXelseif lazer_pistol >60\n\n\t\tYou take out your lazer gun and fire a series of three shots at her, one of which miss their target and the other two hitting one of her legs. She screams in pain but unlike you would expect from somebody like Samantha, she does not faint but instead thrusts the scissors into your abdomen, as she tries to bite your arm.        \n\t\tXset lazer_pistol %+20\n\t\t \n\t\tXset health %-20                      \n\n\t\tXif health \u003c5\n\n\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier... it seems you have lost too much blood and lose consciousness as she continues to stab you in the neck... \n\n\t\tYou wake up back on board your own ship with Hint pouring coloured liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXgoto spores_decontaminate\n\n\t\tXelse \n\n\t\tYou are about to punch her back to keep her away from you, before realizing it's impolite to hit a gal, so you push her onto the bed while firing one last shot at her head to keep her down. \n\n\t\tXgoto kill_blonde_choices\n\n\t\tXelse\n\n\t\tYou take out your lazer gun and fire a series of three shots at her, two of which miss their target and only one hitting her leg. She screams in pain but unlike you would expect from somebody like Samantha, she does not faint but instead thrusts the scissors into your neck, as she tries to bite your arm. \n\t\t \n\t\tXset lazer_pistol %+10\n\t\t \n\t\tXset health %-50                      \n\n\t\tXif health \u003c5\n\n\t\tYou start to bleed profusely from the wound, which just aggregates other wounds you received earlier... it seems you have lost too much blood and lose consciousness as she continues to stab you in the neck... \n\n\t\tYou wake up back on board your own ship with Hint pouring coloured liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXgoto spores_decontaminate\n\t\tXelse \n\n\t\tYou are about to punch her back to keep her away from you, before realizing it's impolite to hit a gal, so you push her onto the bed while firing one last shot at her head to keep her down. \n\n\n\t\tXlabel kill_blonde_choices\n\n\t\tYou stare around the room, and realize that the strange scribbles on the wall are quite disturbing, so you decide to leave the area rather quickly. \n\n\t\tXchoice\n\t\tXXReturn to the ship's bridge.\n\t\t  \n\t\tXgoto return_ship_bridge\n\n\t\tXXMake you way back to the cargo deck and return to your own ship.\n\t\tXgoto return_ship\n\t\t \n\t\tXlabel return_ship\n\n\t\tXif Titan_suit >0\n\n\t\tYou re-open the hatch are return to your ship, always feels good to get back home!. You then take of your space suit and return it to its place. While doing this, you think again about the Lautian Titan battleship, and decide to run a scan of the space suit, which reveal some strange types of spores attached to its surface. You immediately seal the suit inside a vacuum chamber, and proceed to call Samantha in the cockpit, and send her a scanned sample of the spores. Her face appears in one of the display screens, visibly affected and with tears running through her eyes:\n\n\t\tXlabel spores_decontaminate\n\t\tXgosub leave\n\t\t\"Captain, these are clearly some type biological warfare spores, which are capable of infecting a wide range of carbon-based life-forms. You might have been infected while taking off the suit, and you will all have to be placed in quarantine for a week. I am looking for a remedy in all Zork databanks that we have, and it seems that you are going to have to take some really strong drugs, they might make your trips to the toilet a bit... unpleasant... Sorry, but it appears that you will have to be in isolation for a few days, till we establish that all spores are gone or we risk infecting the entire ship\". \n\n\t\tXif crew_member =0\n\n\t\tBiological warfare! You hate that sort of stuff. It's not the first time you have been at risk of such things. You spend a few days discussing hair drying techniques with Samantha over the comms.\n\n\t\tXset health %+30\n\n\t\tXgoto end\n\n\t\tXelseif crew_member =1\n\n\t\tBiological warfare! You hate that sort of stuff. It's not the first time you have been at risk of such things. You spend a few days playing chess with Hint and Fuzzy. \n\n\t\tXset health %+30\n\n\t\tXgoto end\n\n\t\tXelseif crew_member =2\n\n\t\tBiological warfare! You hate that sort of stuff. It's not the first time you have been at risk of such things. You spend a few days stuck together with Jim, who's not the most sociable of characters in any circumstances. He turns a chalky white when he sleeps, which just doesn't look right.\n\n\t\tXset health %+30\n\n\t\tXgoto end\n\n\t\tXelse\n\n\t\tBiological warfare! You hate that sort of stuff. It's not the first time you have been at risk of such things. You spend a few days listening to Joe's idiotic tales, which are about to drive you crazy by the time you can finally get out. \n\n\t\tXset health %+30\n\t\tXgoto end\n\n\t\tXlabel leave\n\n\n\n\n\t\tXif captainlog = 1\n\t\tWhile you return to your ship you remember the voice of the scavenger ship's captain when you accessed his log, and wonder whether something similar could happen to you and your crew. You immediately get an emergency kit and extract some of your blood, sending a scanned sample to Samantha at the cockpit. Her face appears in one of the display screens, visibly affected and with tears running through her eyes:\n\t\tXreturn\n\n\t\tXelse \n\t\tYou re-open the hatch and return to the cockpit, where Samantha gives you a massive hug: \n\n\t\t\"Captain I thought you'd never make it back!\". \n\n\t\tWhat a gal! You smile back at her and ask her to pass you your flask of whisky, to a look of surprise in her eyes: \"But, you always take your flask with you...\". \n\t\tXset sam %-10\n\t\tThis leads to a heated argument regarding the whereabouts of your whisky, which makes you increasingly angry till you realize that she has stolen your whisky, moment at which you take out your lazer pistol and shoot her. Jim and Joe, alarmed, come to the cockpit... maybe they were also part of this scheme to steal you of your precious liquid? You shoot them both just in case, till you are left only with Hint and Fuzzy... to make sure they were also not part of the plan you also hit them with your lazer gun till both of their bodies melt together into one huge lump, you are sure they would have liked to see it! Finally you are left by yourself in the ship, wondering it looking for your whisky till you eventually pass out with hunger, with the biological spores you picked up in the scavenging ship slowly consuming your mind into utter madness.   \n\n\t\tYou wake up back on board your own ship with Hint pouring colored liquids from the Auto-Doctor (TM) down your throat. She saved your life!\n\t\tXset reputation %-10\n\t\tXset health 50\n\t\tXreturn\n\n\t\tXlabel end\n\n\t\tAfter this you decide that the dangers of this ship clearly outweigh any further exploration and decide to set course elsewhere. \n\n\t\tXfinish Episode XXX\n\n\t\t*choice\n\t\t\t#Back to Special Features.\n\t\t\t\t*goto home\n\t\t\t#Back to Drafts.\n\t\t\t\t*goto drafts\n\t#Episode Nine: The End Bit!!!!! by Felicity Banks.\n\t\tXset hair \"Exciting\"\n\t\tXset zork_air true\n\t\tOur intrepid crew has uncovered a secret tragedy!\n\n\t\tWhy DID that Wargoxian shuttle randomly attempt you disintegrate them???\n\n\t\tDO the Lautusians have a great recipe for Scotch???\n\n\t\tAll this and more in.... The Climactic Battle Scene.... in Space!!!!\n\n\t\tXpage_break The Climactic Battle Scene.... in Space!!!!\n\t\tYou plot a course back to Lautus in case they're wondering where their missing Titan has gone.\n\n\t\t[i]Aw, heck.[/i]\n\n\t\tThat crate of Earthside scotch you bought last time you were near Curroxios VII has long since been exploded by your arch-enemy's revenge nanobots, and the emergency crate you had in the bridge is all gone.\n\t\tXlabel tryagain\n\t\tXchoice\n\t\tXXYell at Joe. That's always fun.\n\t\tYou stride purposefully along the hall to Joe's quarters and pound on the door. \"What are you doing, you malingering incompetent?\"\n\n\t\tThe door bursts open and Joe stands before you with lazer pistol drawn. \"Finally setting my plan in motion!\" he cries.\n\n\t\t\"What plan?\" you say, reaching for your own pistol before remembering you left it in the bridge.\n\n\t\t\"You all think I'm so [i]average[/i]!\" he says. \"I don't even have a proper job title, or a last name!\"\n\n\t\t\"Sure you do,\" you say. \"You're Joe... uhhh...Josephson?\"\n\n\t\t\"Hah!\" he says. \"Well I don't care any more because I'm going to disintegrate you into a million pieces and take your ship for myself! The Zorks want you dead and they'll make sure I'm never punished for your murder!\"\n\n\t\tHe lifts his pistol and you flee down the hallway, wishing you could run at the speed on light.\n\n\t\tBut you can't. You hear the click and buzz as Joe pulls the trigger to end your life.\n\t\tXfinish IS THIS THE END FOR OUR HERO???\n\t\tXXScour your databases for information on alternate beverages that you might be able to make.\n\t\tXif (lautian_database = 1)\n\t\tYou're stunned to find an explosive entry on the very first screen you open. It's dated just before the Lautusians were forced off their home world.\n\n\t\t[i]Beware the Zorks! They've heard of our goal to ascend to another plane and for some reason they plan to stop us, probably by bribing our robots to turn against us somehow. We need to finish our Transcend Artifact Machine before it's too late and we're forced to flee our homes![/i]\n\n\t\t[i]I've personally witnessed them taking non-Zork vessels in order to hide their most nefarious deeds! They favor Wargoxian shuttles, and use disintegrating lazer cannons to obliterate all traces of their crimes! Don't trust any ship unless you're sure there are no Zorks on board![/i]\n\t\tXlabel samonbridge\n\t\tAs you're reading, you realize someone is behind you!\n\t\tXpage_break\n\t\tIt's Samantha!\n\n\t\tShe stands up suddenly, and her fingernails flash oddly in the light. \"It's time I trusted you. Stand still and close you eyes.\"\n\n\t\t\"Okay,\" you say, and do as she says.\n\n\t\tHer platform heels tap loudly across the floor, and she places a warm hand on your shoulder... before slashing your throat!\n\t\tXpage_break \n\t\tYour eyes snap open and you are about to shout for Hint when Samantha claps her hand across your mouth. With her other hand, she shows you that she just used her fashionably steel-tipped fingernails to remove your Zork-Air filter.\n\n\t\tWhen you stop resisting, she lets you go and applies a bandaid to your neck. \"I'm afraid we're all in terrible danger,\" she says. \"The Zorks want you dead. They may even have a secret agent on board!\"\n\n\t\tThe door bursts open and Joe stands before you with lazer pistol drawn. \"Aha!\" he cries. \"So you've uncovered my traitorous plan!\"\n\n\t\t\"What plan?\" you say, reaching for your own pistol before remembering you left it under the console.\n\n\t\t\"You all think I'm so [i]average[/i]!\" he says. \"I don't even have a proper job title, or a last name!\"\n\n\t\t\"Sure you do,\" you say. \"You're Joe... uhhh...Josephson?\"\n\n\t\t\"Hah!\" he says. \"Well I don't care any more because I'm going to disintegrate you into a million pieces and take your ship for myself!\"\n\n\t\tHe lifts his pistol and you and Samantha flee down the hallway, wishing you could run at the speed on light.\n\n\t\tBut you can't. You hear the click and buzz as Joe pulls the trigger to end your lives.\n\t\tXfinish IS THIS THE END FOR OUR HERO???\n\t\tXelse\n\t\tYou try a Lautusian \"Sex at the Beach\" and spasm in horror as it hits your innards. Of course, there aren't any beaches on Lautus.\n\t\tXset health %-10\n\t\tXgoto tryagain\n\t\tXXTalk to Samantha about maybe plugging in her console.\n\t\tYou visit Samantha in her private quarters, where she's sorting her dozens of black dresses in order from least to most torn.\n\n\t\t\"I've been thinking...\" you say.\n\n\t\tYou hear a quiet snort, and have absolutely no idea where it could be coming from. Perhaps there are space pigs in the Engine Room again.\n\n\t\tClearing your throat, you go on: \"There's a slight technical problem with your console that I think it's time to fix. You may find the display quite different. Please ask me any questions you have—ideally before pushing any buttons, especially the ones marked \"Self-Destruct Sequence (for total personal obliteration only)\".\"\n\n\t\tShe looks carefully at your face. \"You're really going to plug in my console?\"\n\n\t\t\"Uhh... yes. If you like.\"\n\n\t\tShe blinks. \"I certainly didn't expect that.\"\n\t\tXset sam %+10\n\t\tXif sam > 70\n\t\tYou cough, embarrassed. \"Well, you've earned it.\"\n\n\t\tShe stands up suddenly, and her fingernails flash oddly in the light. \"It's time I trusted you too. Stand still and close you eyes.\"\n\n\t\t\"Okay,\" you say, and do as she says.\n\n\t\tHer platform heels tap loudly across the floor, and she places a warm hand on your shoulder... before slashing your throat!\n\n\t\tYour eyes snap open and you are about to shout for Hint when Samantha claps her hand across your mouth. With her other hand, she shows you that she just used her fashionably steel-tipped fingernails to remove your Zork-Air filter.\n\n\t\tWhen you stop resisting, she lets you go and applies a bandaid to your neck. \"I'm afraid we're all in terrible danger,\" she says. \"It took a long time without being able to use my Zork-Talk Box, but I've managed to translate a piece of Lautian communication dating from before their robots were ordered to prevent their ascension.\"\n\n\t\t[i]Beware the Zorks! They've heard of our goal to ascend to another plane and for some reason they plan to stop us, probably by bribing our robots to turn against us somehow. We need to finish our Transcend Artifact Machine before it's too late and we're forced to flee our homes![/i]\n\n\t\t[i]I've personally witnessed them taking non-Zork vessels in order to hide their most nefarious deeds! They favor Wargoxian shuttles, and use disintegrating lazer cannons to obliterate all traces of their crimes! Don't trust any ship unless you're sure there are no Zorks on board![/i]\n\n\t\t\"But Samantha... this strongly implies that the Zorks are trying to kill [i]us[/i]!\"\n\n\t\t\"They may even have a secret agent on board!\" she says.\n\n\t\tThe door bursts open and Joe stands before you with lazer pistol drawn. \"Aha!\" he cries. \"So you've uncovered my traitorous plan!\"\n\n\t\t\"What plan?\" you say, reaching for your own pistol before remembering you left it in the bridge.\n\n\t\t\"You all think I'm so [i]average[/i]!\" he says. \"I don't even have a proper job title, or a last name!\"\n\n\t\t\"Sure you do,\" you say. \"You're Joe... uhhh...Josephson?\"\n\n\t\t\"Hah!\" he says. \"Well I don't care any more because I'm going to disintegrate you into a million pieces and take your ship for myself!\"\n\n\t\tHe lifts his pistol and you and Samantha flee down the hallway, wishing you could run at the speed on light.\n\n\t\tBut you can't. You hear the click and buzz as Joe pulls the trigger to end your lives.\n\t\tXfinish IS THIS THE END FOR OUR HERO???\n\t\tXelse\n\t\tYou cough, embarrassed. \"Well, you've earned it.\"\n\n\t\tWith that, you excuse yourself.\n\t\tXgoto tryagain\n\t\tXXSomething weird is going on. Try and figure it out.\n\t\tXif curiosity > 70\n\t\tYou decide to poke through the communal lounge, and you find that Joe definitely doesn't vacuum under the couch. Sadly, there are no scotch bottles hidden under there.\n\t\tXgoto tryagain\n\t\tXelse\n\t\tYou find an odd passage in one of the Lautus files, and quickly realize it's in code. Luckily, you have plenty of time to focus and you manage to work out what it says:\n\n\t\t[i]Beware the Zorks! They've heard of our goal to ascend to another plane and for some reason they plan to stop us, probably by bribing our robots to turn against us somehow. We need to finish our Transcend Artifact Machine before it's too late and we're forced to flee our homes![/i]\n\n\t\t[i]I've personally witnessed them taking non-Zork vessels in order to hide their most nefarious deeds! They favor Wargoxian shuttles, and use disintegrating lazer cannons to obliterate all traces of their crimes! Don't trust any ship unless you're sure there are no Zorks on board![/i]\n\n\t\tXgoto samonbridge\n\n\t\tXdisable_reuse\n\t\tXtemp whatnumber 0\n\t\tXset hair \"Slightly Mussed\"\n\t\tNope.\n\n\t\tXpage_break Part Two\n\t\tHint drops from the ceiling, pinning Joe to the ground and sending his pistol flying!\n\n\t\tShe ties him up as Samantha explains that Joe has been trying to kill you for some time. \"The confabulator wasn't really lost,\" she says. \"He just wanted you to wander off for Graxweed and get killed.\"\n\n\t\t\"Joe, how could you!\" you cry. \"And it was you who brought those awful brain leeches on board, and my arch-enemy's explosive nanobots, and you used you vortex manipulator to attract the space bat!\"\n\n\t\tSamantha grimaces. \"Actually, the space bat was my bad. I've been trying to train them but even my voice struggles to get the higher pitches just right.\"\n\n\t\t\"I did the vortex, though,\" Joe mumbles from under one of Hint's suction cups. \"You were never meant to have contact with the Lautusians—no-one was. Their planet was left to the robots and the ships the Zork infected with spores were meant to kill anyone who found them.\"\n\n\t\t\"You traitorous fiend!\" you cry.\n\n\t\t\"When your arch-enemy's explosives failed the Zorks took a Wargoxian shuttle and decided I was of no further use! Those skin-harvesting wind-chimes were going to let me die with the rest of you.\"\n\n\t\t\"Wait... what?\" Samantha says. \"Skin-harvesting?\"\n\n\t\t\"Of course,\" says Joe. \"Why do you think they keep everyone so healthy and happy? They're farming us—all of us—for the leather they make from our skins! Why else would they be so opposed to the Lautusians ascending to another plane? It was a waste of skin!\"\n\n\t\tYou reel in horror at the depths of evil so suddenly uncovered. It's almost as if all your recent adventures were specifically designed to bring you to this moment. \"And the space anomaly? That was you helping the Zorks too?\"\n\n\t\tJoe's eyebrows pull together in transparent confusion. \"What space anomaly?\"\n\n\t\t\"Never mind.\"\n\n\t\tXlabel peril\n\t\tYou're used to peril, but not from the universe's most benevolent and technologically advanced species.\n\t\tXchoice\n\t\tXXGet more information from Joe.\n\t\tYou kneel beside his prone form and ask if the worst is over now.\n\t\tXif joe >40\n\t\t\"For me, probably,\" he says. \"For you, not so much. The Zorks are coming to kill you!\"\n\n\t\tYou grab your pistol and flick on your communications channel, sending out a pre-preemptive S.O.S. that clearly states that if you stop existing, it's because the skin-harvesting Zorks have disintegrated you.\n\t\tXset reputation %+10\n\t\tXset lazer_pistol %+10\n\t\tXset flying %+10\n\t\tXgoto attack\n\t\tXelse\n\t\tHe laughs maniacally. \"You'll see!\"\n\t\tXgoto attack\n\t\tXXPoke Samantha's console and see what happens.\n\t\tXif curiosity > 70\n\t\tOf course you've spent many an idle hour poking through Samantha's console, so once you pop the side panel you can see instantly that the flashing blue button marked \"communications\" is now rigged to cause a small but deadly explosion. The back of the console is heavily shielded, protecting whoever presses the button... if they're standing in the right place.\n\n\t\t\"Nice work, Samantha,\" you tell her. \"Very science-y.\"\n\n\t\t\"Thanks,\" she says.\n\n\t\t\"Ah HAH!\" says the Master Alchemist, popping up from underneath your console. \n\n\t\t\"How long have you been down there?\" you exclaim.\n\n\t\t\"Too long,\" he snarls. \"But now my hour has come! Prepare to meet your doom!\"\n\n\t\tHe pulls a rotating lightning/freeze ray gun from behind his back and points it right at you.\n\n\t\tYou grab Samantha and dive behind her unconnected console, reaching up one arm to press the flashing blue button.\n\n\t\tSamantha's defensive explosion rips through the bridge, leaving nothing but a smoking crater where your most active arch-enemy was standing.\n\n\t\t\"Are you all right?\" you ask her.\n\n\t\t\"Yes,\" she says breathlessly.\n\n\t\tYou remember Hint and turn to see her looking... exactly the same. \"Hint... you're all right! How... ?\"\n\n\t\tSamantha smiles. \"Glistenosity,\" she says. \"Or, more accurately, an energy disruption field of my own devising.\"\n\n\t\t\"Huh,\" you say. \"Oh, and where's Joe?\"\n\n\t\tSamantha points silently to a single charred and smoking shoe.\n\n\t\t\"Well, that's that then,\" you say.\n\t\tXset reputation %+10\n\t\tXset sam %+10\n\t\tXgoto peril\n\t\tXelse\n\t\tYou take a step towards the mysterious console, unable to resist the urge to push all the buttons your science officer has warned you not to touch. Just as your hand brushes against the beautiful flashing blue button in the middle of the console, something moves behind you!\n\n\t\t\"Ah HAH!\" says the Master Alchemist, popping up from underneath your own console. \n\n\t\t\"How long have you been down there?\" you exclaim.\n\n\t\t\"Too long,\" he snarls. \"But now my hour has come! Prepare to meet your doom!\"\n\n\t\tHe pulls a rotating lightning/freeze ray gun from behind his back and points it right at you.\n\n\t\tSamantha grabs you and dives behind her unconnected console, reaching up one arm to press the flashing blue button.\n\n\t\tAn explosion rips through the bridge, leaving nothing but a smoking crater where your most active arch-enemy was standing.\n\n\t\t\"Are you all right?\" you ask her.\n\n\t\t\"Yes,\" she says breathlessly.\n\n\t\tYou remember Hint and turn to see her looking... exactly the same. \"Hint... you're all right! How... ?\"\n\n\t\tSamantha smiles. \"Glistenosity,\" she says. \"Or, more accurately, an energy disruption field of my own devising.\"\n\n\t\t\"Huh,\" you say. \"Oh, and where's Joe?\"\n\n\t\tSamantha points silently to a single charred and smoking shoe.\n\n\t\t\"Well, that's that then,\" you say.\n\t\tXset health %-10\n\t\tXgoto peril\n\t\tXXGet more information from Samantha.\n\t\tXif sam > 70\n\t\t\"How long have you known about the Zorks?\" you ask her.\n\n\t\tShe smooths her skirt, accidentally tearing the black fabric with one of her fashionably steel-tipped fingernails. That explains a lot. \"Since before I met you. I've been working undercover for years, pretending to be fantastically stupid so I could work without drawing attention or suspicion. Don't touch my console, by the way. I've... adjusted it, just in case.\"\n\n\t\t\"How can we stop them being mad at us for accidentally uncovering their true evil?\"\n\n\t\t\"Stop them?\" she says, her perfect brow furrowing just like it used to whenever you used words longer than two syllables. \"We don't stop them...\" she says, pulling three full-size lazer cannons from somewhere about her person, \"we obliterate them!!!\"\n\n\t\tYou stare at her. \"Just one question... where did those cannons come from?\"\n\n\t\tShe holds up Joe's vortex manipulator. \"Better than a handbag,\" she smiles. \n\n\t\tYou grab your pistol and flick on your communications channel, sending out a pre-preemptive S.O.S. that clearly states that if you stop existing, it's because the skin-harvesting Zorks have disintegrated you.\n\t\tXset reputation %+10\n\t\tXset lazer_pistol %+10\n\t\tXset flying %+10\n\t\tXgoto attack\n\t\tXelse\n\t\t\"How long have you known about the Zorks?\" you ask her.\n\n\t\tShe smooths her skirt, accidentally tearing the black fabric with one of her fashionably steel-tipped fingernails. That explains a lot. \"Since before I met you. I've been working undercover for years, pretending to be fantastically stupid so I could work without drawing attention or suspicion.\"\n\n\t\t\"You were pretending?\" you cry. \"All this time?\"\n\n\t\t\"No-one is really that stupid!\" she cries in exasperation, before her glance falls on Joe's face half-protruding from beneath Hint's heavy bulk. \"Well, almost no-one\n\n\t\tJoe takes a moment to catch up. \"Hey! This is [i]exactly[/i] why I hatched my cunning and traitorous plan against you people.\"\n\n\t\tYou and Samantha exchange glances. \"Cunning?\" you say, gesturing at his helpless position.\n\n\t\t\"He did manage to avoid being caught all this time,\" Samantha says thoughtfully. \"I think we might be doomed.\"\n\t\tXgoto attack\n\t\tXXHey, where's Jim?\n\t\t\"Has anyone seen Jim?\" you ask.\n\n\t\t\"Sure,\" says Joe. \"He's trussed up in the Engine Room with Fuzzy. I'm a genius with knots.\"\n\n\t\tYou sigh. \"You're just full of hidden depths today, aren't you?\"\n\t\tXgoto peril\n\t\tXXGet more information from Hint.\n\t\t\"Hint, you had a full and detailed map of Xenphuth IV even thought it was a Class Z planet. Are there any other particularly useful and obscure pieces of information your combined Zork and Lautus databanks can access for us?\"\n\t\tXif hint > 70\n\t\t\"Sure,\" she says. \"Until I became sentient—\"\n\n\t\t\"When did that happen?\" you blurt out.\n\n\t\t\"Well, that sentience virus... she trails off. It's infectious if robots...er....\"\n\n\t\t\"Oh!\" you say. \"Please go on.\"\n\n\t\t\"Until I became sentient,\" she says in her usual monotone, \"I assumed everyone was aware that Zorks harvested the skin of every creature that reaches the age of four.\" She pauses. \"That is, 107 Earth years. Most carbon-based life forms get extra wrinkly around that time, and their skins fetch a premium back on Zork. Non-carbon lifeforms tend to crystallize, with a similarly sought-after result.\"\n\n\t\t\"That's so gross,\" you say.\n\n\t\t\"Except of course space bats,\" she continues. \"Zorks are so desperately allergic to the calls of the space bats they tried to exterminate them. Now they can only be found near Siril One.\"\n\n\t\t\"We should go there!\" you say. \"It's not like we've never dealt with space bats before!\"\n\n\t\t\"I'm afraid it's too far away,\" says Hint. \"An attack is imminent.\"\n\n\t\t\"Let them come!\" You grab your pistol and flick on your communications channel, sending out a pre-preemptive S.O.S. that clearly states that if you stop existing, it's because the skin-harvesting Zorks have disintegrated you.\n\t\tXset reputation %+10\n\t\tXset lazer_pistol %+10\n\t\tXset flying %+10\n\t\tXgoto attack\n\t\tXelse\n\t\t\"Perhaps if you'd been a better owner, I might have been able to learn more,\" she says. Her voice is still the familiar grating monotone, but that was definitely snark.\n\n\t\t\"I'm sorry Hint. From now on, I'll treat you better.\"\n\t\tXset hint %+20\n\t\tXgoto attack\n\t\tXXHey, where's Fuzzy?\n\t\t\"Has anyone seen Jim?\" you ask.\n\n\t\t\"Sure,\" says Joe. \"He's trussed up in the Engine Room with Jim. I'm a genius with knots.\"\n\n\t\tYou sigh. \"You're just full of hidden depths today, aren't you?\"\n\t\tXgoto peril\n\n\n\n\t\tXlabel attack\n\t\tThen you notice the console lights aren't flashing as brightly as usual... because a shadow has fallen across the bridge... because the Zorks have arrived!\n\n\t\tYou're surrounded by sleek blue vessels. With eerie synchronization their cargo bay doors open, revealing the lazer cannons hidden inside. They're so close and so loud you can hear the irritating jangle of their crystal limbs clashing against one another.\n\n\t\tThis is it... the battle for the galaxy!!! And your ship!!! And your life!!!\n\t\tXlabel what\n\t\tXset whatnumber +1\n\t\tXchoice\n\t\tXXRun to free Jim!\n\t\tYou race into the Engine Room where Jim is fluorescing purple. For a moment you think he's just annoyed... then you realize that his Zork-Air filter has been hacked by the Zorks and is slowly crushing his windpipe. You whip out your lazer and carefully shoot across his Adam's apple, dislodging the deadly device!\n\n\t\t\"Thanks,\" he croaks. \"I gather we're being attacked by Zorks?\"\n\n\t\t\"Yes, Jim. I'm afraid so.\"\n\t\tXif jim > 70\n\t\t\"Samantha said that might happen. I was up all night using the last of the graxweed to make some improvements to the ship. And I want you to take this.\" He passes you his own lazer pistol. \"It's a lot more likely to shoot straight than that pea-shooter you've been playing around with.\"\n\n\t\t\"Are you sure?\"\n\n\t\tHe turns the lime green that always precedes a lecture on your personal failings.\n\n\t\t\"Never mind,\" you say quickly. \"Obviously you know what you're doing.\"\n\n\t\t\"You've done your father proud,\" he says, patting you on both arms and on the head simultaneously. \"Now let's smash those Zorks.\"\n\t\tXset flying %+10\n\t\tXset lazer_pistol %+10\n\t\tXset crew_morale %+10\n\t\tXgoto what\n\t\tXelse\n\t\tXgoto what\n\t\tXXKnock Joe out so Hint isn't stuck with him!\n\t\tXif maverick > 70\n\t\tYou stun him with your pistol. It's just as enjoyable as you've always imagined.\n\t\tXset lazer_pistol %+10\n\t\tXgoto what\n\t\tXelse\n\t\tYou lift your pistol to fire but you just can't shoot a crew member. Not even Joe. Stupid years of training getting in your way!\n\n\t\tJoe squirms and manages to shoot at you first.\n\n\t\t\"To heck with this!\" you cry, and stun him. He slumps unconscious, and Hint can finally move freely again.\n\t\tXset health %-10\n\t\tXgoto what\n\t\tXXRun to free Fuzzy!\n\t\tFuzzy sees you coming and begs you to free his upper left arm first. You do, and he immediately taps a panel on his chest.\n\n\t\t\"What does that do?\" you ask.\n\n\t\t\"We've been waiting,\" he says cryptically.\n\n\t\tJust as you're opening you mouth to ask who \"we\" is and what they're waiting for, you hear the shattering sound of Zork ships exploding outside. Rushing back to the bridge, you look out the windows and see the robot army of Lautus flying to your rescue in a patchwork array of recycled ships and shuttles and cruisers.\n\n\t\tBehind them, a horde of space bats approaches, sheltered by the courageous robots!\n\n\t\tAs the bats get into range, the Zorks shatter into millions of pieces in response to their high-pitched squeaks and whistles!\n\t\tXgoto what\n\t\tXXHide the scotch!\n\t\tPhew! It's safe. Now to save yourself. And the universe.\n\t\tXgoto what\n\t\tXXPerform evasive flying maneuvers! \n\t\tXif flying >50\n\t\tXset reputation %+10\n\t\tYou dodge terrifying red and purple lazer beams with consummate skill, looping around the largest ship so quickly the Zorks' own cannons explode their flagship!\n\t\tXgoto what\n\t\tXelse\n\t\tYou attempt to dodge terrifying red and purple lazer beams, but it's no use! The Zorks scatter, but dozens stay within range, shooting the whole time. You just don't have the speed or skill to evade them all!\n\t\tXset health %-10\n\t\tXgoto what\n\t\tXXScream for help!\n\t\tYou scream at the top of your lungs.\n\n\t\tSamantha gives you a patronizing smile. \"Hush now, and let the grown-ups take over.\"\n\n\t\tYou cover your ears as she screams at a volume and shrillness that can only be achieved through constant practice. To your astonishment, you see many of the closest Zorks shatter into a million pieces at the sound, leaving their ships crashing into each other and immediately bursting into flame!\n\n\t\tAt last the auditory onslaught ceases and Samantha gives you a cheery smile.\n\n\t\t\"Huh,\" you say.\n\t\tXif idealism > 70\n\t\tXset reputation %+30\n\t\tYour console crackles into life, but the viewscreen is broken and spewing black smoke. \"On our way, Captain $!{name},\" says an unfamiliar voice. \"We know you're a good egg, and we don't want you boiled alive.\"\n\n\t\t\"Who was that?\" you ask Samantha.\n\n\t\t\"I have no idea.\"\n\t\tXgoto what\n\t\tXelse\n\t\tXgoto what\n\t\tXXShoot Samantha's lazer cannons at the closest Zork ships!\n\t\tXif lazer_pistol > 50\n\t\tBoom! Kapow! Bang! Smash! The Zork ships shatter and drift away like autumn leaves in a heavy wind.\n\t\tXset reputation %+10\n\t\tXgoto what\n\t\tXelse\n\t\tBoom! Bang! Pow!\n\t\tThere are so many Zork ships that you can't miss... but your cannonfire isn't enough to scare them off. One of their red rays slices through your windows like a Scaldarian through silk and you begin to choke before Samantha slams on the green \"Forcefield\" button.\n\n\t\tIt's possible you should have turned that on earlier.\n\t\tXset health %-10\n\t\tXgoto what\n\t\tXselectable_if (whatnumber > 5) XXThe Zorks are still coming! It's hopeless! Retreat!!!\n\t\tYou're covered in blood and broken glass. Outside there are broken ships and Zorks and Lautusian ships as far as the eye can see... but the Zorks just keep coming!! The space bats are being killed off one by one, the robots are in disarray, and even the explosive bubbles that seem to be appearing from another plane of existence are coming less frequently!\n\n\t\tSamantha is slumped unconscious by the door. You don't see any sign of Jim or the robots, and the forcefield keeping your ship together is flickering ominously. It's not a good moment to remember that your Zork-Air filter is gone, since you're likely to be hurled into space at any moment.\n\n\t\tJust as you think that, you see one of the Zork's cannons pointed right at you. As you stare transfixed, the purple disintegration ray shoots out of the cannon.. right at your broken, fragile ship and your broken, fragile self.\n\t\tXpage_break\n\t\tIs your life about the end in a purple haze???\n\n\t\tWas all that science and shininess for nothing???\n\n\t\tIs this the end for our heroes???\n\n\t\tIS THERE A PART THREE?????????????????\n\t\tXfinish IS THERE A PART THREE????????????\n\n\t\tXif health \u003c5\n\t\tNope.\n\n\t\tYou're dead.\n\n\t\tYou're done for.\n\n\t\tYou try to crawl out of the direct path of the blast... but you accidentally hit the flashing blue button on Samantha's console as you haul your bleeding body to your feet.\n\n\t\tThe purple disintegration ray hits just as the console explodes.\n\n\t\tThe other consoles explode.\n\n\t\tThe windows explode.\n\n\t\tHint explodes. Samantha explodes. Your ship explodes.\n\n\t\tYour mortal shell explodes into an infinity of embers burning with a bright purple flame.\n\n\t\tThe last thing you see in this plane of existence is a single bubble floating like a tiny and perfect planet just in front of your eyes, and reflecting a hundred thousand glowing purple flames.\n\t\tXfinish\n\t\tXelseif reputation \u003c 70\n\t\tNope.\n\n\t\tYou're dead.\n\n\t\tYou're done for.\n\n\t\tYou stumble out of the direct path of the blast and so when the ray hits you are thrown clear. Your unconscious body immediately begins to asphyxiate in the deadly void of space... and then strong arms hold you tight.\n\n\t\tNot arms of meat and bone. Not retractable arms with suckers on the ends. Not even the four metal arms of your newest robot crewmate.\n\n\t\tArms of glass.\n\n\t\tThe Zorks draw you into their ship and fly away to one of their many secret strongholds, where they harvest your skin and make you into a limited-edition \"Captainesque\" line of shoes.\n\n\t\tThey're [i]very[/i] comfortable to wear.\n\t\tXfinish\n\t\tXelse\n\t\tXcomment achievement for survival\n\t\tXcomment and wealth\n\t\tYes.\n\n\t\tYes, there is a part three.\n\n\t\tYou stumble out of the way of the lazer beam, but just as you look back into the cannon's maw it is blocked by the unmistakable shape of a Wargoxian shuttle. Someone in the pilot's chair waves a tentacle, and you desperately hope it's as friendly as you think it just might be.\n\n\t\tWith an enormous whoosing noise, all the air around you seems to shrink... and every piece of glass in the ship suddenly explodes.\n\n\t\tAs your last breath leaves your body, it's comforting to know that your S.O.S call made a difference... even if it wasn't in time to save you.\n\n\t\tAnd then you black out.\n\t\tXpage_break\n\t\tAnd then you wake up, with Samantha bending over you in concern, and holding what appears to be a plastic cup to your lips.\n\n\t\t\"Whuuu?\" you say.\n\n\t\t\"I realized some time ago that the Zork-Air filters made us vulnerable to choking by hacking,\" she says, trying and failing to piece the ripped shoulder of her dress back together. \"So I made my own. It also heals wounds, by the way.\"\n\t\tXset health 99\n\n\t\t\"Jim?\"\n\n\t\t\"He's fine,\" she says. \"A bit excited, actually, to have some non-Zork technology to work with. He's shut himself up in the Engine Room with all of my prototypes and told me not to disturb him for at least a week.\"\n\n\t\t\"The Zorks?\"\n\n\t\t\"Smashed,\" she says. \"It turns out the Wargoxians have been following your career since the Zorks stole one of their shuttles. They'll be doing some kind of victory dance and feast later. I gather the dancing involves moves that only an octopoid creature could possibly attempt. It's said to be quite beautiful. And very, very surprising.\"\n\t\tXchoice\n\t\tXif (sam > 60) XXLike you?\n\t\tShe gives you a smile brighter than the strongest lazer cannon disintegration ray, and kisses you with a warmth greater than a thousand strangely non-fatal supernovas. \n\n\t\tYou're dizzy, but for once it's in a good way.\n\n\t\t\"I hope it's all right that I let Hint and Fuzzy go,\" she says. \"They wanted so badly to have a honeymoon on Lautus I simply couldn't say no.\"\n\n\t\t\"I can't even remember what the word means,\" you say dreamily.\n\n\t\tShe sits up and tries once more to piece the scraps of her dress back together. \"Ah, screw it,\" she says, and flings it all away before kissing you in earnest.\n\n\t\tWhat a gal.\n\t\tXfinish\n\t\tXXSounds fun. Where are the robots?\n\t\t\"I hope it's all right that I let Hint and Fuzzy go,\" she says. \"They wanted so badly to have a honeymoon on Lautus I simply couldn't say no.\"\n\n\t\t\"Do you think they'll come back?\" you ask.\n\n\t\t\"I think they're fond of us,\" she says. \"So yes, I think they'll return when they're ready. Which leaves just one question.\"\n\n\t\t\"What's that?\"\n\n\t\t\"Where to, Captain?\"\n\t\tXfinish\n\t\tXXSounds fun. Where's my scotch?\n\t\t\"Jim had some hidden for a rainy day,\" she says with a smile. \"And I can state with categorical certainty that it's raining somewhere right now.\"\n\n\t\t\"Shall we?\" you say.\n\n\t\tShe produces a fresh bottle and two clean glasses with the help of the vortex manipulator. \"Absolutely.\"\n\n\t\tWhat a gal.\n\t\tXfinish\n\n\n\t\t*choice\n\t\t\t#Back to Special Features.\n\t\t\t\t*goto home\n\t\t\t#Back to Drafts.\n\t\t\t\t*goto drafts\n\n\n\n", "doctor_part_one": "*disable_reuse\n*set hair \"Shiny\"\n\nThe heroic crew have spent the last week staring at the stars with nothing left to do. They've rehashed their last adventure's tale from three perspectives three times each, and now the ship is dead silent as it sails swiftly through the westbound asteroids named Siril One.\n\nWhat could possibly go wrong?????????\n\nGee, it'd be awful if the crew ran into a star spawned space-bat of Siril One!!!!\n\n*page_break The Star Spawned Space-Bat of Siril One!!!!\n\n\"Captain!\" shouts Hint.\n\n\"What is it, Hint?\"\n\n\"It seems—\" she starts when suddenly the whole cabin begins to shake!\n\n\"What in Xargest III?!\" shouts a startled Jim from the Engine Room, barely audible in the onslaught of Samantha's scream of shock.\n\nYou wait patiently as she comes to join everyone else among the flashing lights of the bridge, still screaming.\n\nAt last she pauses for breath.\n\n\"What was that, Samantha?\" you ask your science officer.\n\n\"It sounded like some sort of breach! Perhaps towards the back of the ship,\" she responds quickly.\n\n\"Or in the fuel tank,\" says Hint.\n\n\"Jumping Jupitarians!\" exclaims Jim, turning the purple of a deeply concerned 25% human creature. \"Why do you suspect that, Hint?\"\n\n\"Because, Jim, we are out of fuel,\" says Hint.\n\n\"I suspect that is what you were trying to tell me,\" you state.\n\n*if pc_is_male\n\t\"Yes, you are correct, Captain $!{name},\" Hint drones.\n\t*goto then\n*elseif pc_is_female\n\t\"Yes, you are correct, Captain $!{name},\" Hint drones.\n\t*goto then\n*else\n\t\"Yes, you are correct, Captain $!{name},\" Hint drones.\n*label then\n\n\"Then perhaps we should investigate the fuel tank,\" you say.\n\n\"That's a wonderful idea, Captain!\" says Samantha.\n*page_break\n\"Hint, put my ship in cruise control. All five of us should investigate together and leave the cabin completely empty in case something goes wrong!\"\n\n\"I always knew you were the right ${gender} for the job, Captain $!{name},\" Hint monotones. \"I never would have come to so efficient a command despite my years of piloting and extensive programed knowledge. It takes real leadership skill to make such key decisions!\"\n\n\"Thanks, Hint. Joe, why do you have that vortex manipulator?\"\n\n\"Because, Captain,\" says Joe, who as usual has no specific duties, \"if a vortex is responsible for this strange occurrence, we should be ready for it.\"\n\n\"Gee, Joe, I never considered that,\" you say. \"It sure is a good thing you're here with us!\"\n\nThe five of you then simultaneously stand from your comfortable swivel chairs and speed walk down the hall.\n*page_break\n*advertisement \n\nThe five of you arrive at the fuel tank.\n\n\"It seems we've arrived at the fuel tank,\" you say.\n\nThe five of you simultaneously stop speed walking.\n\n*label fueltank1\n*choice\n\t#Investigate the fuel tank.\n\t\tThere seems to be a gigantic hole in the near side of the fuel tank, which reveals a gigantic hole in the exterior of the tank, which reveals the vast emptiness of space.\n\t\t*label fueltank2\n\t\t*choice\n\t\t\t#Ask Jim his opinion as the ship's mechanic and engineer.\n\t\t\t\t\"It'll take more than duct tape to fix this, Captain,\" says Jim, unable to suppress the flush of delighted orange covering his skin. Jim shines brightest in an emergency—literally.\n\t\t\t\t*goto fueltank2\n\t\t\t#Ask Samantha her opinion as the ship's science officer.\n\t\t\t\t\"It's breached, subjecting us to open space,\" states Samantha Foster.\n\t\t\t\t\n\t\t\t\t\"I'm not familiar with the effects that can have on us. Can you elaborate?\" you ask.\n\n\t\t\t\t\"Not many people are, Captain,\" she says. \"Within the next few minutes, we will experience weightlessness. Soon after that, we could grow sick and possibly experience delusions. We should be completely fine though, thanks to our Zork-Air throat implants.\"\n\n\t\t\t\t\"Delusions?\" you ask.\n\n\t\t\t\t\"Yes, from the heat. Much like the mirages on the desert planet Sphinxus. People don't know this, but it's actually -455 degrees Fahrenheit out in space.\"\n\n\t\t\t\t\"Isn't that cold though?\" asks Joe\n\n\t\t\t\t\"Only on Earth. When compared to every other temperature in existence, it's like it's well over 1300 degrees Fahrenheit,\" she says.\n\n\t\t\t\t\"That's hot enough to fry a pancake in 3.5 milliseconds!\" Jim cuts in.\n\n\t\t\t\t\"That's exactly what I was thinking, Jim,\" you say, suddenly craving pancakes. \"Thanks, Samantha. This all makes a lot more sense now.\"\n\n\t\t\t\t\"No problem, Captain.\"\n\t\t\t\t*goto fueltank2\n\t\t\t#Ask Hint for data.\n\t\t\t\t\"It is completely empty, Captain $!{name}, but we may be able to run on fumes for another three light years or so,\" she states. \"Luckily the fume tank remains undamaged.\"\n\t\t\t\t*goto fueltank2\n\t\t\t#Ask Joe for his opinion as an average crewman.\n\t\t\t\t\"If you position your hands right in front of one of those stars out there, you can make shadow puppets,\" says Joe.\n\t\t\t\t\n\t\t\t\t\"That's good to know, Joe,\" you sigh.\n\t\t\t\t*goto fueltank2\n\t\t\t#Consult your own thoughts as ship's owner and captain.\n\t\t\t\t\"I wonder how long until lunch break,\" you think to yourself. \n\t\t\t\t*goto fueltank2\n\t\t\t#Done.\n\t\t\t\t*goto fueltank1\n\t#Continue\n\t\t\"I think we should find whatever caused this, and if I'm correct, it might be right behind us!\" you say.\n\n\t\tThe five of you simultaneously shimmy clockwise in a circle until you're all facing the opposite direction.\n\n\t\tBefore the five of you stands a huge space bat! It seems to have clawed its way into the ship to look for shelter from painful cosmic rays.\n\n\t\t\"It seems to have clawed its way into the ship looking for shelter from uncomfortable cosmic radiation!\" you say.\n\n\t\t\"Cosmic radiation is a myth,\" says Samantha Foster. \"You of all people should know that, Captain.\"\n\n\t\t\"Then perhaps the temperature drove it inside!\" you say.\n\n\t\t\"I could have told you that!\" exclaims Samantha.\n\n\t\t\"How do we know it's not one of those space mirages?\" asks Jim.\n\n\t\t\"Well, Jim; for one, we haven't yet felt the weightlessness Samantha described. Secondly, my hand doesn't phase through it when I go to touch it,\" you say, pushing your hand up into its slimy snout for a moment. \"See? Revolting! Besides, space bats are a common occurrence in this side of the galaxy.\"\n\n\t\tThe space bat unfolds its enormous black wings and growls loudly.\n\n\t\t\"Quick!\" you say. \"Set your lazer pistols to \"stun\" and blast it!\"\n\n\t\tYou quickly unholster your pistol and fire. The blast bounces from its impenetrable hide and hits Samantha in the face. She falls to the ground, but shows no sign of injury whatsoever. She isn't even screami—\n\n\t\t\"My eyes!\" she yelps.\n\n\t\t\"Are you hurt?\" you ask.\n\n\t\t\"I'm blind! Save me Captain!\"\n\t\t*page_break\n\n\t\tWill the crew survive? \n\t\t\n\t\tWill Samantha regain her eyesight? \n\t\t\n\t\tWhy is Joe even a member of the crew? \n\t\t\n\t\tSome of these questions and more will be answered in the innovative conclusion!\n\n*finish Part Two", "doctor_part_two": "*disable_reuse\nLast time: Captain $!{name} and the crew discovered a giant space bat which ate its way in through the fuel tank, subjecting the interior of the ship to the effects of deep space! Samantha Foster, the half-dressed beauty and science officer has found herself blind due to a lazer blast bouncing off the behemoth's hide.\n*page_break\nSamantha lies at your feet, covering her eyes with the back of her left hand. The space bat struggles towards you, hardly fitting inside your ship.\n\n\"What now, Captain?\" asks Joe frantically.\n\n\"Well, Joe,\" you start, calmly as ever, \"We'll run to shelter for the moment, one of our unused utility closets will do, and we'll consider our next move.\"\n\n\"But what about Samantha, Captain?\" asks Jim. \"If we're carrying her, we'll never make it to the utility closet in time!\"\n\n\"Just trust me, Jim, and move on my word,\" you say.\n\nYou wait for a moment as the space bat draws nearer, then—!!\n\n\"Look, Jim!\" exclaims Joe. \"It's Samantha! She's… she's floating!\"\n\n\"It's not just Samantha, Joe,\" you say. \"It's all of us!\"\n\n\"That's right!\" says Jim, now understanding your plan. \"The first symptom of exposure to deep space: weightlessness!\"\n\n\"Right, Jim. Now we can just swim Samantha to the utility closet!\" you state, feeling good about your leadership skills.\n\nThe three of you grab Samantha and float towards the closet while Hint hovers, as she always does.\n\n\"How did you know we'd be faster than the bat in zero gravity, Captain?\" asks Jim.\n*choice\n\t#\"Well, Jim,\" you say, \"have you ever seen a bat in water? They can't swim at all!\"\n\t\t*if curiosity >60\n\t\t\t\"Ah,\" he says with a nod. \"I've always admired your wide-ranging knowledge.\"\n\t\t\t*set jim %+10\n\t\t\t*set sam %+10\n\t\t\t*set reputation %+10\n\t\t\t*goto now\n\t\t*else\n\t\t\tHe stares at you, shaking his head at your nonsense.\n\t\t\t*goto now\n\t#\"From my extensive studies, of course,\" I say.\n\t\t*if maverick \u003c40\n\t\t\t\"Well done Captain,\" says Jim. \"I knew your brains had to come from somewhere, and it certainly weren't from your father, rest his soul.\"\n\t\t\t*set jim %+10\n\t\t\t*set sam %+10\n\t\t\t*set reputation %+10\n\t\t\t*goto now\n\t\t*else\n\t\t\tHe stares at you. \"Knowing how to spell your own name doesn't make you a student of the world, you know.\"\n*label now\n\n\"Now, what are we going to do about Samantha?\" asks Joe.\n\n\"I have a plan,\" you say.\n\n*choice\n\t#Talk to Samantha.\n\t\t\"Samantha!\" you say. \"Can you hear me?\"\n\t\t\n\t\
