nemy will attack… and how???\n\nStay tuned for the abrupt insertion of backstory!!!!!\n*set hair \"Exquisite\"\n*page_break The Arch-Enemy… with the Nanobots!!!\nYou stifle a yawn as you sit slumped in the captain's chair, tapping away at the computer pad in your hand. Everyone imagines a starship captain's days to be full of heroics and fantastic adventures however the truth is, there's long periods of boredom filled with routine tasks that need to be completed to keep everything running smoothly. \n\nYou wander into the lounge where Samantha is scowling at a screen full of data.\n\n\"What's wrong?\" you ask her.\n\n\"I just can't seem to understand these figures!\" she wails. \"I was thinking of designing some fashion items for older ladies of various species, so I looked up some statistics on life expectancy.\"\n\n\"Statistics,\" you repeat, stunned to hear such a long word from her lips.\n\n\"Yes! And the median and mode are almost exactly the same! The equivalent of 107 Earth years.\" She closes several screens in obvious distress. \"107 and a bit.\"\n\n\"There there,\" you say soothingly, not at all sure why your science officer has suddenly decided to turn intellectual. \"I'm sure whatever's wrong is just a glitch of some kind.\"\n\n\"It doesn't apply to the Zorks,\" she says miserably.\n\n\"Probably because they have the most accurate records. The Zorks are the best, after all!\"\n\n\"You're right, of course,\" she says, displaying her usual vacant smile. \"I think I'd better go and wash my hair.\"\n\nWhat a gal.\n*page_break\nAs Samantha wanders off to have her third shower of the day, you remember you have some real work to do. \n\nRight now you're in the process of logging tedious lists of everything you've brought on and off your craft over the last few months. The Zorks have taken a special… well let's call it \"interest\", in your activities since that unfortunate incident involving:\n*choice\n\t#A consignment of liquor.\n\t\tYes well, you'd taken on one or two crates of Molovian brandy… okay maybe it was a few more than that. But really it was for negotiation and medical purposes only. I mean sometimes you need a few gifts or nice beverages to smooth along proceedings.  \n\t\t\n\t\tThe insinuation that you were trying to get around the strict liquor exporting laws to smuggle the valuable booze off world for a profit, was quite frankly insulting. \n\t\t*choice\n\t\t\t#You'd never sully your good name in that way.\n\t\t\t\t*set idealism %+10\n\t\t\t\tQuite. You're a captain of your word. Someone plainly had it out for you. \n\t\t\t\t\n\t\t\t\tFortunately the investigation cleared you of any criminal charges, however a distressing measure of doubt regarding your character must still remain, since they've become pedantic about receiving and checking over your inventory records. \n\t\t\t\t\n\t\t\t\tYou sigh. Well if it will keep them happy, you'll just have to knuckle down and wade through the paperwork\n\t\t\t\t\n\t\t\t\t*goto story1\n\t\t\t#Even if the accusations were maybe a little true. (Not that I'd ever admit it to the powers that be). \n\t\t\t\t*set idealism %-10\n\t\t\t\tEven starship captains get a bit strapped for cash sometimes. The way you saw it, you were doing a community service getting the booze out to those in need at a competitive cost. \n\t\t\t\t\n\t\t\t\tIt would never be appropriate to be seen bending the rules though. Those Zork regulator types can be notoriously uptight, so you have your story and are sticking to it. \n\t\t\t\t\n\t\t\t\tFortunately your silver tongue managed to keep your record clean of any wrongdoing. They seemed to buy the story you fed them… just enough to prevent any charges from being laid. That doesn't mean you're off their radar. You get the impression you're now watched more closely than you'd like. What's more, you have to fill in these endless inventory reports. [i]Ugh.[/i]\n\t\t\t\t\n\t\t\t\t*goto story1\n\t#Some goods of a deceptively flammable nature.\n\t\tIt was an honest mistake. Transporting some fauna from the Centaurus system, how could you have known of their ability to spit a combination of chemicals that could spontaneously burst into flames. \n\t\t\n\t\tUnknowingly you'd placed the troublesome creatures in the hold, next to some important artifacts from the planet Zebulox... \n\t\t\n\t\tTo your credit, you'd put out the fire before it could cause any significant damage to the ship… however not fast enough to prevent the wooden artifacts from becoming slightly… singed. \n\t\t\n\t\tIt goes without saying that the Zebulox were not happy that their precious objects had been damaged and there was a minor diplomatic mishap over the incident. \n\t\t\n\t\tSince then, the Zork authorities have been annoyingly strict with checking over your cargo arrangements. The amount of extra paperwork it has caused you, means you regret the incident to this day.\n\t\t\n\t\t*goto story1\n*label story1\n*page_break\nGlaring at the glowing pad you wish, not for the first time, that you were on shore leave with Joe. \n\n[i] He's probably sipping margaritas on the beach by now.[/i] you reflect sourly. [i]How many dying Aunt Annabels can a man have, anyway?[/i]\n\nA wailing whistle from the communications panel announces an incoming message. You welcome the distraction. \n\n\"Samantha, if you please?\" You turn to your science officer who glances up from her panel with a quickly suppressed look of annoyance. It's almost as if she knows her own console isn't actually attached to anything. She merely nods with a fixed smile and flicks a few illuminated switches while you simultaneously bring a large view screen at the front of the ship to life. \n\nWhat you see is not at all what you were expecting.\n\n*page_break\n\nA man of about your age fills the screen, a twisted smile pulling at the edges of his lips. Pale skin, short ebony hair and a fitted, midnight black outfit buttoned high up on his neck complete the oddly monochrome appearance. Gray eyes bore into yours. \n\n\"Greetings Captain!\" the clipped voice sounds clearly. \"Listen closely, I am here to state my terms.\"\n\nThe figure gives a melodramatic laugh as he swirls a glittering silver cloak around his shoulders. \n\n*page_break\n\n[i]Terms?[/i] You look the figure over silently for a few seconds. [i]Have I met him before?[/i]\n\nStraightening in your chair, you address the screen. \"I believe some introductions are in order, Mr…?\"\n\nThe mystery man's eyebrows lift. \"You really don't remember me Captain $!{name}? How soon you forget! I am none other than your arch enemy.\" \n\n*choice\n\t#\"Hmm… yes well, could you be a little more specific? I mean I've got so many \"arch enemies\" sometimes I find it hard to keep track.\"\n\t\tYou address him jokingly, knowing it'll only infuriate the self important man even further. \n\t\t\n\t\tSince he believes himself to be your \"arch enemy\", maybe provoking him is a bad idea, but well… stuff it. You're a star ship captain and shouldn't have to take this kind of crap from random crazies. \n\t\t\n\t\tHis face purples with rage at your insolence. The color is so vibrant you get distracted wondering if he's another pod person. \"I should not have to remind you Captain,\" he hisses, \"you ruined my life that day. Remember the nanobots? Ringing any bells yet? This time however, you'll be playing by my rules!\" \n\t\t\n\t\tPausing, he takes a few breaths to restore his composure.\n\t\t*goto goal\n\t#\"I guess you look kind of familiar, but I'm still drawing a blank. Who are you again?\"\t\n\t\tThere is something vaguely familiar about the man who seems intent on threatening you out of the blue. Try as you might, you can't quite place him. \n\t\t\n\t\t\"I'm disappointed you forget so quickly [i]Captain[/i]. I remember [i]you.[/i]\" he replies venomously. \"Does a certain incident involving nanobots ring any bells? You ruined my life that day. It's only fair I return the favor.\" He spits the words at you, calm composure broken. \n\n\n*label goal\n*page_break\n\n[i]Nanobots? Oh dear.[/i] You have a sinking feeling you know where this is going.\n\nYou think back to your time at high school. It was all about a…\n\n*choice\n\t#Boy.\n\t\tIsn't it always? From the first time you'd seen Jess striding down the corridor, laughing with his beautiful smile and flicking brown hair out of his eyes, you'd been hooked. [i]Ah, high school crushes.[/i]\n\t\t\n\t\tUnfortunately, there was a certain individual who felt the same way as you. Your rival. You never got along. \n\t\t\n\t\tHe'd dressed only in his trademark dark colors with heavy makeup even then. Spending long periods of time alone tinkering with his experiments, his intelligence was plain and worse still… Jess liked him. \n\t\t*goto jess\n\t#Girl.\n\t\tIsn't it always? From the first time you'd seen Alice striding down the corridor, laughing with her beautiful smile and flicking long brown hair over her shoulder, you'd been hooked. [i]Ah, high school crushes.[/i]\n\t\t\n\t\tUnfortunately, there was a certain individual who felt the same way as you. Your rival. You never got along. \n\t\t\n\t\tHe'd dressed only in his trademark dark colors and heavy makeup even then. Spending long periods of time alone tinkering with his experiments, his intelligence was plain and worse still… Alice liked him. \n\t\t*goto jess\n\t#Actually no, now that you remember clearly, it hadn't been like that, she'd just been a good friend of yours.\n\t\tYou remember back to your time at high school, it'd all been about a friend of yours, Jess. You remember a certain individual hanging around; a boy who'd dressed in his trademark dark colors with heavy makeup even then. \n\t\t\n\t\tSpending long periods of time alone tinkering with his experiments, his intelligence was plain but he had few friends. Unfortunately Jess was one of them. The little sneak was always trying to poison your friendship with Jess to have her all to himself. Needless to say you didn't get along.\n*label jess\n*page_break\nAnyway… You may have decided to play a small joke on him. You got hold of some nanobots, reprogrammed them and slipped them into his lunch one day. Poor kid. For weeks, he'd come to school in his understated, stylish black clothing… and by the afternoon, the nanobots had rewoven his clothes into bright florals. He never did live it down. \n\nHe knew it was you of course, even though he couldn't prove it. Instead he decided to take a revenge of his own by tampering with your chemistry experiment. Although likely only meant to affect you, he'd obviously miscalculated since the resulting explosion had turned everyone on that side of the room… including the teacher Mr Browning… bright pink. \n\nNeedless to say, old Mr Browning was not impressed. When the offending chemicals were traced back to your nemesis, he'd been immediately expelled. \n\nAt the time, you'd considered having to walk around with pink skin for a week to be a fair trade for that outcome. Now…\n*choice\n\t#I'm still glad it happened. I was obviously right about him. Look at what he does for a career these days: evil mastermind.\n\t\t*set idealism %-10\n\t\tQuite. Look at him with his evil smile, showing up to threaten you and your crew. No regrets, you'd always thought that one had a nasty streak.\n\t\t\n\t\tWhile you've been thinking, the individual on the screen has continued to watch you, a sneer on his features. \n\t\t\n\t\tWhat was his name again? Mike? Matthew? Martian? You can't quite recall. After the chemistry lab \"incident\" people had taken to calling him \"Test-tubes\" though, that much you remember. \n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Ah yes, \"Mister Test-Tubes\" I do remember you now. Long time no see. What have you been up to?\" \n\t\t\n\t\tYour opponent reddens at the comment. \"You will never address me as that again! I am the Master Alchemist!\" He glares, daring you to say otherwise. \n\t\t\n\t\tYou decide to humor him. \"Ok [i]Master[/i] state your terms.\"\n\t\t\n\t\t\"Oh, they're quite simple Captain. I've brought you a gift. After all, I never returned those nanobots you so kindly lent me that day.\" He pauses for dramatic effect. \"The nanotech hidden on your ship is of the explosive variety. I'm nostalgic that way. You have fifteen minutes to find them, before they go BOOM!\" He laughs again as he reaches for a button off screen and his image is replaced by a timer counting down. \n\t\t*goto timer\n\t#I regret my part in the whole saga. It was childish on both sides and a long time in the past. Maybe I can talk him around with an apology.\n\t\t*set idealism %+10\n\t\tWhile you've been thinking, the individual on the screen has continued to watch you, a sneer on his features. \n\t\t\n\t\tWhat was his name again? Mike? Matthew? Martian? Mark maybe? You can't quite recall. \"Ah look… um… Mark?\" \n\t\t\n\t\t\"My name is no longer Mark!\" he snaps. \"You will refer to me as the Master Alchemist!\"\n\t\t\n\t\t\"Okay… Well look, I am sorry about all that unpleasantness at high school. We were both young and stupid. Can't we put that all behind us? How about you come over and we'll have a nice glass of brandy.\"\n\t\t\n\t\t*page_break\n\t\t\"You're [i]sorry[/i]. That's it? Sorry and it's all okay?\" A smile creeps over his features. \"Well I'm glad you're feeling nostalgic Captain, because I have a gift for you. Some nanotech. I though you might like it since I never returned the ones you lent me that day. I'm afraid they're kind of volatile though, we have to keep these things exciting. You have fifteen minutes before they explode. Have fun Captain!\"\n\t\t\n\t\tWith a final insane laugh, he taps a button off screen and his image is replaced by a timer counting down. \n*label timer\t\n\t\n[b]\"15:00....14:59....14:58....14:57....\"[/b]\n\t\t\n\"Captain!\" Samantha's voice is shrill. \"I'm picking up interference on the internal sensors. I think he's actually going to blow the ship up!\"\n\n*page_break\n\n[i]Darn.[/i] You'd hoped he'd been bluffing, and you can already hear your science officer drawing breath for an epic scream. \"Samantha can you locate the source?\"\n\nHer breath huffs out. \"I'm afraid not Captain. The interference is creating havoc with the sensors. I know something is here, but there's no way to localize it.\" Her voice is steadily increasing in pitch.\n\t\t \nYou think rapidly. [i]Where could he have hidden the explosives?[/i] It'd be no good looking for them. Nanobots are microscopically small. You'll have to be smart about this.\n*page_break\n\nHe probably slipped them on the ship at your last port of call where you picked up the current lot of cargo. Knowing Mark, he'd probably want to do as much damage as possible. Where would he hide explosives?\n\n[i]Of course![/i] You open a comm channel to the engineering section. \"Jim, that new isopalavial drive unit you acquired at Lautus? I want it off my ship [i]NOW![/i]\"\n\nOblivious to the conversation that had been going on in the main deck area, Jim is understandably confused. \"But Captain, if I remove that, we'll be stuck at impulse power. It could take us weeks to get anywhere!\"\n\nWith the timer counting down, you're not in the mood for arguments. \"Jim, if you don't want your particles spread all over deep space, just do it now!\"\n\n*page_break\n\nOver the open comm channel, you hear metallic clangs as your engineer gets to work. You wince as something crashes to the floor loudly, followed by a stream of obscenities. Samantha stares fixedly ahead but you notice a blush creeping up her neck. You'll have to talk to Jim about using that kind of language around someone with the Samantha's sensibilities… if you survive long enough. \n\n\"Captain… the interference… it's just gotten stronger!\" Samantha peers over your shoulder to survey the readouts scrolling down your screen.\n\nA red light flashes on your console, indicating the airlock has been activated. Via the view screen, you see the bunch of circuits and wires drifting away into the darkness. You sigh with relief. Now to make sure.\n\nYou tap a few keys and flip open a plastic covering, pressing the large red button. Twin lights streak away from the ship to blow the offending item into non-existence. \n\n*page_break\n\nYou sigh, sinking into your padded chair. [i]Close one, but that's why I'm the captain. I can handle these things.[/i]\n\n\"Samantha, can you open a channel to that Master Chemist guy, let's gloat a little shall we?\" \n\n\"Umm… Captain? I don't think we got it.\" Samantha is close to tears. \n\n\"There's another one?!\" Just how many explosives has that nutter put on your ship anyway?\n\n\"Ah… no. The readings haven't changed Captain, Maybe it wasn't the drive unit?\" her voice quavers, eyes wide.\n\nThe timer continues to tick down. \n\n[b]… 10:02… 10:01… 10:00… [/b]\n\nYou think frantically. Where could it be? Hint already blasted Joe's brain leeches into deep space. You'd loaded up all the usual necessities and then sent Hint back to check you had it all… Wait, Hint. \n\n*page_break\n\n\"Hint,\" you address the robot who has been standing quietly in the corner. \"Did you see or meet anyone unusual when I sent you back for the last of the cargo?\"\n\n\"No Captain. Nothing unusual,\" the flat voice replies. \n\nYou study Hint closely. It would make sense, your enemy would have to know you'd be reluctant to toss one of your crew off the ship. And even if Hint thinks she's telling you the truth, she could have been reprogrammed… or could she?\n*choice\n\t#Ask Jim's advice. He's an engineer, after all.\n\t\t*if jim > 60\n\t\t\tYou grab the comm and describe the situation to Jim. \n\t\t\t\n\t\t\t\"Wait!\" he says. \"I checked Hint over myself just after we left. Everyone knows to scan for explosive nanobots from a forgotten arch-enemy at least twice daily. She's clean.\"\n\t\t\t\n\t\t\t*set askcrewnanobots \"yes\"\n\t\t\t*set okbargl true\n\t\t\t*goto_scene jacic_part_two\n\t\t*else\n\t\t\tYou grab the comm to talk to Jim but he's not at his post. It's as if he doesn't respect you at all!\n\t\t\t\n\t\t\t*goto fail\n\t#Ask Samantha's advice. She's the science officer, after all.\n\t\t*if sam >60\n\t\t\t\"I bought Hint an anti-nanobot spray at Curroxios VII,\" she says. \"Did I not mention that? She's clean. It came with a free makeover!\"\n\t\t\t\n\t\t\t*set askcrewnanobots \"yes\"\n\t\t\t*set okbargl true\n\t\t\t*goto_scene jacic_part_two\n\t\t*else\n\t\t\t\"Hmm?\" she says, twirling her hair around her finger. \"Nanobots? Should I be screaming hysterically now?\"\n\t\t\t\n\t\t\t\"Maybe later,\" you say, wondering if she even heard what you were saying.\n\t\t\t\n\t\t\t*goto fail\n\t#Think!\n\t\t*if idealism \u003c 40\n\t\t\tYou realized long ago that Hint was your greatest strength and your greatest weakness. Which is why you very carefully inspect her for nanobots every time you leave port. She's clean.\n\t\t\t\n\t\t\t*set askcrewnanobots \"yes\"\n\t\t\t*set okbargl true\n\t\t\t*goto_scene jacic_part_two\n\t\t*else\n\t\n*label fail\n\"I'm sorry Hint, I think you could be the bomb. An explosive near that nuclear generator of yours would cause quite the fireball. You'd never want to harm your crewmates right?\"\n\n\"No Captain, of course not.\" Hint replies smoothly.\n\n\"Well, I think we need to put you outside for a while. Just in case. If we find the explosives somewhere else, we'll come and get you of course.\" You continue to watch Hint closely, wondering how she'll react. \n\n*page_break\n\n\"Captain!\" Samantha wails, aghast. \"This is Hint! You can't be suggesting we abandon her? She's so glisteny!\"\n\nAt that moment, the automatic doors hiss open and Jim sweeps into the room. \"Captain, what is going on?\"\n\nHe looks around the deck, taking in the countdown happening on the main screen. \"What is that?!\"\n\n\"That's how long we have before the ship explodes.\" You glance at Samantha as she starts to sniffle. No time to comfort her now. \n\n\"We need to get the nano explosives off our ship,\" you tell Jim. We can't pinpoint the exact location but I think they've been placed in Hint. Please escort her to the airlock.\" \n\n\"Captain, are you sure that's wise?\" Jim gives you a sidelong look. \"Perhaps…\"\n*choice\n\t#Cut him off. You gave an order. \"Hint. Airlock. Now!\"\n\t\t\"Are you going to question my orders too Jim?\" You give the two human crew members a stern look. Samantha wilts under the scrutiny, while Jim merely raises an eyebrow. \n\t\t\n\t\t\"Of course it's a wise idea. We need to do something and there's less than…\" You glance at the screen. \"Eight minutes left. I know how my arch enemy thinks. We need to get Hint off the ship [i]now![/i]\"\n\t\t\n\t\tJim's mouth tightens but he does as you ask. \"Come on ya old rust bucket, let's go take a space walk. You needn't worry, it's just a precaution then we'll come back and get you.\"\n\t\t\n\t\tHint hovers along beside your engineer. \"I don't worry; I don't have that emotion.\"\n\t\t\n\t\tLooking at the retreating robot, you can't help thinking that her posture has a dejected droop to it. It must be your stressed imagination playing tricks on you.\n\t\t*set hint %-20\n\t\t*page_break\n\t\t\n\t\tThe red light flashes on your console again and you toggle the screen to see the silver form of Hint tumbling weightlessly away from the ship. She activates a locater beacon which blinks with a bright green light on her chest. \n\t\t\n\t\t\"Samantha?\" you ask tersely.\n\t\t\n\t\t\"Ah… No change in the readings Captain.\" She flinches away from you as if worried what your next action will be. \n\t\t\n\t\tYour engineer returns stomping onto the deck. \"Well it's done Captain. Are we in the clear?\"\n\t\t\n\t\t\"Well actually, we still seem to have a slight problem with those explosives. Suggestions?\" You look at your crew hopefully.\n\t\t\n\t\tSamantha looks away, sobbing gently. Jim still has a scowl fixed to his orange face. Morale and discipline seem to be at an all time low. Not that you can blame them too much at this point. You did just jettison one of the crew. \n\t\t*set crew_morale %-20\n\t\t*page_break\n\t\t*achieve spacerobot\n\n\t\tLong seconds tick by before Jim decides that saving his skin is more important than his annoyance with you. \"As I was trying to say… I think I can configure my electromagnetic isolator to detect the source of this interference.\"\n\t\t\n\t\tSamantha interjects. \"I've already tried using the sensors to locate the disturbance. The nanobots have been programmed to deliberately jam any attempt to locate them.\"\n\t\t\n\t\tJim gives her a contemptuous look. \"The isolator is a type 4, insulated, engineering diagnostic device. With a bit of tinkering I can get it to work where others fail.\"\n\t\t\n\t\tSamantha looks doubtful but with no other suggestions you don't have any choice. \"Do it Jim.\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tYour engineer pulls out a battered looking black case that sits neatly in the palm of his hand. An array of small dials adorn its surface. He presses a button on the side… and nothing happens. \n\t\t\n\t\t\"Darn piece of junk!\" Jim fumes at the isolator and turns to give it a solid whack on the nearest bulkhead. Samantha winces but stays silent. You…?\n\t\t*goto hintairlock\n\t\t\t\n\t\t\n\t\t\n\t#Allow him to continue. \n\t\t\"Yes Jim?\" you signal for him to continue. \n\t\t\n\t\t\"Well I could try reconfiguring my electromagnetic isolator to detect the source of these nanobots. If they're going to make a big bang, they'd have to be giving off some sort of energy signature. I should have it in my bag.\" Jim starts sorting though his engineering kit.\n\t\t\n\t\tSamantha interjects. \"I've already tried using the sensors to locate the disturbance. The nanobots have been programmed to deliberately jam any attempt to locate them.\"\n\t\t\n\t\tJim gives her a contemptuous look, holding up a small back box. \"The isolator is a type 4 insulated, engineering diagnostic device. With a bit of tinkering I think I can get it to work where others fail.\"\n\t\t\n\t\tSamantha looks doubtful, but Jim is determined. The timer continues to count down…tick…tick…tick…\n\t\t*choice\n\t\t\t#Way too risky. I say we throw Hint out, just to be sure.\n\t\t\t\t\"There's no time to play around, especially if you're not absolutely sure it'll work. Mr Jim, escort Hint to the airlock if you please.\" Jim starts to protest, but you cut him off. What's with the discipline on your ship today?\n\t\t\t\t\n\t\t\t\t\"That's enough Jim. I gave you an order. Take Hint to the airlock [i]now[/i]!\"\n\t\t\t\t\n\t\t\t\tJim's mouth tightens but he does as you ask. \"Come on ya old rust bucket, let's go take a space walk. You needn’t worry, it's just a precaution then we'll come back and get you.\"\n\t\t\n\t\t\t\tHint rolls along beside your engineer. \"I don't worry; I don't have that emotion.\"\n\t\t\n\t\t\t\tLooking at the retreating robot, you can't help think that her posture has a dejected droop to it. It must be your stressed imagination playing tricks on you.\n\t\t\t\t*set hint %-20\n\t\t\t\t*page_break\n\t\t\n\t\t\t\tThe red light flashes on your console again and you toggle the screen to see the silver form of Hint tumbling weightlessly away from the ship. She activates a locater beacon which blinks with a bright green light on her chest. \n\t\t\t\t*achieve spacerobot\n\t\t\t\t\"Samantha?\" You ask tersely.\n\t\t\n\t\t\t\t\"Ah… No change in the readings Captain.\" She flinches away from you as if worried what your next action will be. \n\t\t\n\t\t\t\tYour engineer returns stomping onto the deck. \"Well it's done Captain. Are we in the clear?\"\n\t\t\n\t\t\t\t\"Well actually, we still seem to have a slight problem with that explosive. About that suggestion you had earlier?\" You look at your crew hopefully.\n\t\t\n\t\t\t\tSamantha looks away, sobbing. Jim still has a scowl fixed to his face. Morale and discipline now seem to be at an all time low. Not that you can blame them too much at this point. You did just jettison one of the crew into space. \n\t\t\t\t*set crew_morale %-20\n\t\t\t\t\n\t\t\t\t*page_break\n\t\t\n\t\t\t\tLong seconds tick by before Jim decides that saving his skin is more important than his annoyance with you. Your engineer retrieves the battered looking black case which sits neatly in the palm of his hand. An array of small dials adorn its surface. You hold your breath as he presses a button on the side and… nothing happens. \n\t\t\n\t\t\t\t\"Darn piece of junk!\" Jim fumes at the isolator and turns to give it a solid whack on the nearest bulkhead. Samantha winces but stays silent. You…?\n\t\t\t\t*goto hintairlock\n\t\t\t\n\t\t\t#\"Do it Jim.\"\n\t\t\t\tYou take a deep breath, considering your options. Maybe you owe it to Hint to be sure she's dangerous before throwing her into the endless void of space. \"Okay Jim. Do your thing.\"\n\t\t\t\t*set okbargl true\n\t\t\t\t*goto_scene jacic_part_two\n\t\n\t\n\t\n\n*label hintairlock\n*choice\n\t#Reach for a scotch to settle your nerves.\n\t\tYou reach for your drink, the glass held securely in a holder by your chair. [i]Darn, it's empty![/i] You don't remember drinking the entire contents of the glass. Saving the ship must be thirstier work than you remember. \n\t\t\t\n\t\tTwitching, you watch Jim give the isolator a few more solid thwacks before amazingly enough, the lights flare to life. The machine makes an even pinging sound.\n\t\t*goto giggle\n\t#Reach for the sensitive piece of electrical equipment before Jim can bash it to pieces on the side of the ship.\n\t\t\"Mr Jim, please stop hitting that device…\" You trail off as he shows you the isolator, all the lights shining reassuringly. \n\t\t\t\n\t\t\"It's just a little temperamental,\" he says, patting the black casing. \n\t\t\t\n\t\tThe device that's meant to save you all is temperamental? [i]Fantastic.[/i]\n\t\t\t\n\t\tHe taps the side of the device a few more times until a steady pinging fills the air. \n\t\t\t\n*label giggle\n\"There.\" Jim regards the device with satisfaction. \"Now I just need to make a few adjustments…\"\n\n[b]…2.47… 2:46… 2:45… [/b]\n\n\"Um Jim… Any time you're ready now… \" You fidget anxiously.\n*page_break\nWill Jim save the day???\n\nIs everyone going to die???\n\nWill the nanobots have an effect on your ${hair} hair???\n\nDiscover all those answers and more in the intriguing conclusion!!!\n*page_break\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tCome back in a few minutes to play the next part of [i]Starship Adventures[/i]!\n\n\tOr, you can buy the game now to skip the wait.\n\n\t*purchase_discount adfree 2016-01-01 $3.99 $2.99 purchased\n\t*delay_break 1200\n\n*label purchased\n\n*finish Part Two\n", "jacic_part_two": "*disable_reuse\n*if okbargl\n\t*goto okbargle\n*else\n\t*goto yes\n*label yes\n\n\"Yes, yes… just about done… There!\" says Jim. He waves the crucial piece of equipment around, the pitch of the pings swinging up and down. \"This way!\"\n\nYou follow close behind the engineer, with Samantha bringing up the rear as he strides purposefully out the door. Through the ship you run, arriving at the door of your quarters. When Jim aims the device at the door, the machine gives a high pitched strangled whine. \n\n\"It's in there Captain.\" Jim gestures at your room. You palm the door open and everyone crowds in. Waving the sensor over the objects in your room, he settles on a large crate by the window. \"This is it Captain, it's in here.\"\n\n\"Captain!\" Samantha shrieks. She points at the computer screen on the desk.\n\n[b]… 0.08… 0.07… 0.06… [/b]\n\n\"There's no time!\" you yell. \"Everyone out!\"\n\nEveryone runs for the door into the hallway. With a hiss the door seals shut followed seconds later by a loud explosion which rocks the ship, sending everyone tumbling.\n*set health %-10\n*set reputation %-10\n\n*page_break\n\nYou take a few breaths. No groaning bulkheads. No hissing of escaping oxygen. You may just get out of this alive. \n\nYou look for your crew. Jim is picking himself up from the ground, dusting himself off and only looking slightly more disheveled than usual. Samantha also seems unhurt, although her dress has a long tear up the side. Fleetingly you wonder what could have possibly torn it along the smooth walls of the spaceship. Shaking your head, you decide it's better considered another time. \n\nBooming laughter echoes through the ship through the speaker systems. \"You failed Captain.\"\n\nStraightening yourself up, you address the air. \"It's not me that failed Mister Chemist. Your explosion failed to destroy my ship. It seems you miscalculated, my friend.\"\n\n\"I'm the Master [i]Alchemist[/i],\" the disembodied voice snaps. \"And no, I didn't miscalculate. This was a little test. Just the beginning of what I have planned for you. You'll be seeing me… or my powerful friends soon… very soon.\"\n\nManiacal laughter echoes through the ship again. Jim slaps a switch on the intercom, cutting it off. \n\nYou sigh. \"Thank you Jim.\"\n\n*page_break\n\n\"Friend of yours?\" he asks you curiously. You realize he has no idea what is going on with the entire Master Alchemist affair. \n\n\"Not exactly….\" You grimace. Maybe you'll explain it all later. You activate a screen on the wall and survey the damage. A large gaping hole is present where the wall of your quarters used to be. Twisted pieces of metal stretch jaggedly into space. \n\n\"Samantha, can you please organize a force field for my quarters?\" Before she can comply, Jim interrupts. \n\n\"Captain, the drive unit? We're on reserve power systems at the moment, there's not enough juice to maintain a force field with enough integrity that I'd want to risk my life to it.\"\n\n*page_break\n\n[i]The drive unit. In all the excitement, I'd forgotten about that.[/i] \"Samantha, closest planet or star base for repairs?\"\n\nShe consults the computer pad tucked into her belt. \"There's a star base orbiting Proxima 3 Captain. It's only small though. The others are… significantly further away. As it is, it'll take us about three weeks at our maximum speed to reach it.\"\n\nJim nods. \"I've been there before. It's basic, but they'll have what we need to fix… this.\" He gestures to the ship generally. \"At least, they could patch it up enough to get us back to Curroxios VII.\"\n\n*page_break\n\n\"Well I think we could all use some down time anyway after this.\" You certainly could. \"What's the planet like Jim? Can we organize shore leave there while the ship's under repairs?\"\n\n\"Hmm not good Captain. It's a mining planet you see. The base is just there to service that. Everything's underground on the planet itself.\" Jim pauses for a moment. \"From memory it was a [i]delightful[/i] place. Sulphurous atmosphere, acid rain, Mach 9 winds that could strip the flesh off your bones in seconds….\"\n\n\"Ah yes I get the picture.\" You cut him off. [i]Ugh,[/i] it's going to be a long trip and an even longer stay on the cramped station. Once again you envy Joe and his shore leave. \n\n\"Well let's get under way.\" You head back to the bridge. \"And can someone organize to pick up Hint?\" \n\nYou hope robots don't hold grudges. \n*set wealth -1000\n*page_break Episode Six\n\t\nIf you wish, you may visit the Special Features page now. \n\nWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\nWhere to, Captain?\n*choice\n\t#On with the adventure!\n\t\t*finish Episode Six\n\t#Take me to the Special Features.\n\t\t*goto_scene commentarya\n\n*label okbargle\n\n*if (askcrewnanobots = \"yes\")\n\tHmm so if the explosives aren't hidden on Hint, then where...?\n\n\tDesperate times call for desperate measures. Time to ask the crew. \"Suggestions?\"\n\n\t\"Well I could try reconfiguring my electromagnetic isolator to detect the source of these nanobots. If they're going to make a big bang, they'd have to be giving off some sort of energy signature. I should have it in my bag.\" Jim starts sorting though his engineering kit.\n\t\t\n\t\"I've already tried using the sensors to locate the disturbance,\" Samantha interjects. \"The nanobots have been programmed to deliberately jam any attempt to locate them.\"\n\t\t\n\tJim gives her a contemptuous look, holding up a small back box. \"The isolator is a type 4 insulated, engineering diagnostic device. With a bit of tinkering I think I can get it to work where others fail.\"\n\t\t\n\tSamantha looks doubtful, but Jim is determined. The timer continues to count down…tick…tick…tick…\n\n\t*page_break\n\n\tYou sigh, out of other options. \"Do it Jim.\"\n\t\nYour engineer studies the array of buttons and dials intently for a moment then pushes a button on the side. Nothing happens.\n\n\"Jim?\" You're pretty sure something was supposed to happen. \n\t\t\n\"Darn piece of junk!\" Jim fumes at the isolator and turns to give it a solid whack on the nearest bulkhead. Samantha winces but stays silent. \n\nYou give him a worried look. \"Jim, I'm pretty sure you shouldn't be hitting a sensitive piece of equipment like that.\"\t\n\n\"She's alright Captain, you've just got to have the right touch with this sort of thing.\" [i]Whack![/i] He gives the instrument another solid bang on the wall.\n\nAmazingly enough, lights flare to life and the device starts to make an even pinging noise. \"There.\" Jim regards the object with satisfaction.\n\n*page_break\n\nYou glance at the screen at the front of the bridge.\n\n[b]… 9:26… 9:25… 9:24… [/b]\n\n\"Um..not to hurry you, but any time now would be good.\" You glance across at Samantha who's holding the desk tightly enough that her nails are making small indentations in the surface. It's been a while since she's had a chance to buy Earthside nail polish, and you wonder what she's been using lately.\n\n\"Yes, yes…\" says Jim. \"Almost there… I just need to modulate the frequency of the subspace isolinic detector and… there!\" He waves the device around causing the pitch to oscillate up and down.\n\n\"Are you sure it's working, and you can find the explosives?\" you prompt again.\n\n\"Yah probably… either that or it's picking up interference from the microwave again.\" Seeing Samantha take a deep and shuddering breath he quickly adds, \"Not that that's ever happened….\"\n\n*page_break\n\n\"Alright here we go.\" He places the device in his palm and runs it up and down the stationary robot. The device continues its even comforting ping. \"Think you're in the clear Hint.\"\n\t\n\"Thank you Jim.\" the robot intones emotionlessly.\n\nJim spins in a circle. \"This way.\"\n\nHe leads the crew off the bridge and through the corridor, following the rising tone of the beeping detector. \n\nYou arrive at the door to your quarters. The device give an urgent shrill when pointed at the door. \n\n\"In there Captain.\" The engineer nods his head towards your room. \n\n*page_break\n\nPalming the door open you crowd everyone into the small space. Waving the sensor over the objects in your room, Jim settles on a large crate by the window. \"This is it Captain, it's in here.\"\n\n[i]Of course it would be.[/i] That crate contains some personal supplies you'd picked up to pass the long journeys more pleasantly. To be specific, it's full of scotch. It would not be easy to replace.\n\n\"Are you sure Jim? No way you could be mistaken?\" you ask hopefully.\n\nJim points the sensor at the box. It sounds a high pitched scream. \"Very sure.\" \n\n*page_break\n\n\"Ok, Hint get over here, help me get the lid off this crate.\" [i]Maybe it's the crate itself.[/i]\n\n\"Captain!\" Samantha shrieks. She points at the computer screen on the desk.\n\n[b]… 3.08… 3.07… 3.06… [/b]\n\n\"There's no time!\" Jim yells. \"You'll have to ditch the whole crate!\"\n\n*choice\n\t#Continue to try and pinpoint the explosive device. \n\t\t\"This'll only take a minute. Hint, get this lid off!\" Hint obediently trundles over and uses her suction cups to start undoing the bolts on the airtight container.\n\t\t\n\t\t\"Captain, we don't have a minute!\" Samantha wails, eyes starting to tear up.\n\t\t\n\t\t\"Settle down Samantha,\" you say soothingly. \"Of course we do. We've still got… one minute and twenty two seconds. Hint?\"\n\t\t\n\t\t\"I'm working as fast as I can Captain.\" the robot answers unhurriedly. \"These crates are designed not to come open by accident.\"\n\t\t\n\t\t\"Captain!\" Jim snaps. \"There's not enough time to get the box to the airlock. The bulkheads should contain an explosion here, but if it goes up in the corridor….\"\n\n\t\t*page_break\n\t\t\n\t\tYou could howl with frustration. \"Alright, everyone out now! You too Hint.\"\n\t\t\n\t\tEveryone rushes to the hall with an obedience you rarely see. Jim quickly keys in a sequence to seal the door lock. \n\t\t\n\t\tSamantha takes up the countdown. \"Five… Four… Three… Two… One….\"\n\t\t\n\t\tAn explosion rocks the ship, tossing everyone to the ground. \n\t\t\n\t\t*set health %-5\n\t\t*set reputation %-10 \n\t\t\n\t\t*page_break\n\t\t\n\t\tYou take a few breaths. No groaning bulkheads. No hissing of escaping oxygen. You may just get out of this alive. \n\n\t\tYou look for your crew. Jim is picking himself up off the ground, dusting himself off and only looking slightly more disheveled than usual. Samantha also seems unhurt although her dress has a long tear up the side and one shoulder strap is missing. Fleetingly you wonder what could have possibly torn it along the smooth walls of the spaceship. Shaking your head, you decide it's better considered another time. \n\n\t\tBooming laughter echoes through the ship from the speaker system. \"You failed Captain.\"\n\n\t\tStraightening yourself up you address the air. \"It's not me that failed Mister Chemist. Your explosion failed to destroy my ship. It seems you miscalculated, my friend.\"\n\n\t\t\"I'm the Master [i]Alchemist[/i],\" the disembodied voice snaps. \"And no, I didn't miscalculate. This was a little test. Just the beginning of what I have planned for you. You'll be seeing me… or my powerful friends soon… very soon.\"\n\n\t\tManiacal laughter echoes through the ship again. Jim slaps a switch on the intercom, cutting it off. \n\n\t\tYou sigh. \"Thank you Jim.\"\n\n\t\t*page_break\n\t\t\n\t\tHe merely glares at you in response, obviously blaming you for not getting rid of the crate when you had the chance. You activate a screen on the wall and survey the damage. A large gaping hole is present where the wall of your quarters used to be. Twisted pieces of metal stretch jaggedly into space. \n\n\t\t\"Samantha, can you please organize a force field for my quarters?\" \n\t\t\n\t\tBefore she can comply, Jim interrupts, \"Captain, the drive unit? We're on reserve power systems at the moment. There's not enough juice to maintain a force field with life-saving integrity.\" He gives you a look that says he'd dare you to try.\n\n\t\t*page_break\n\n\t\t[i]The drive unit. In all the excitement, I'd forgotten about that.[/i] \"Samantha, closest planet or star base for repairs?\"\n\n\t\tShe consults the computer pad tucked into her belt. \"There's a star base orbiting Proxima 3 Captain. It's only small though. The others are… significantly further away. As it is, it'll take us about three weeks at our maximum speed to reach it.\"\n\n\t\tJim nods. \"I've been there before. It's basic, but they'll have what we need to fix… this.\" He gestures to the ship generally. \"At least, they could patch us up enough to get back to Curroxios VII.\"\n\n\t\t*page_break\n\t\t\n\t\t\"Well I think we could all use some down time anyway after this.\" You try to put a positive spin on the situation. \"What's the planet like Jim? Can we organize shore leave there while the ship's under repairs?\"\n\n\t\t\"Hmm… not good Captain. It's a mining planet you see. The base is just there to service that. Everything's underground on the planet itself.\" Jim pauses for a moment. \"From memory it was a [i]delightful[/i] place. Sulfurous atmosphere, acid rain, Mach 9 winds that could strip the flesh off your bones in seconds….\"\n\n\t\t\"Ah yes I get the picture.\" You cut him off. [i]Ugh,[/i] it's going to be a long trip with a cranky crew, and a longer stay on the cramped station. Once again you envy Joe and his shore leave. \n\n\t\t\"Well let's get under way.\" You head back to the bridge, crew trailing behind. \n\t\t*set wealth -1000\n\n\t\t*page_break Episode Six\n\n\t\tIf you wish, you may visit the Special Features page now. \n\n\t\tWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\n\t\tWhere to, Captain?\n\t\t*choice\n\t\t\t#On with the adventure!\n\t\t\t\t*finish Episode Six\n\t\t\t#Take me to the Special Features.\n\t\t\t\t*goto_scene commentarya\n\t#Take one for the team and turf the whole crate out the airlock.\n\t\tYou give the crate one last wistful look but Jim's right, you can't risk the ship and crew for the contents. \n\t\t\n\t\t\"Hint.\" You wave the robot over. \n\t\t\n\t\t\"Yes Captain,\" comes the monotone reply. \n\t\t\n\t\t\"Take this box to the nearest airlock and dispose of it please,\" you say, pointing at the offending object. \n\t\t\n\t\t\"Of course Captain.\" Hint trundles over and effortlessly lifts the heavy crate. Slowly she plods back into the corridor. \n\t\t\n\t\t\"Faster Hint, we need it there now!\" You can hear the ominous tick as the clock continues its inevitable countdown.\n\t\t\n\t\t\"I'm already at my maximum recommended speed for my load parameters Captain.\" Hint replies, continuing to hover slowly down the corridor. \n\t\t\n\t\t\"Oh for goodness sake! Jim help me!\" Between the two of you, you manage to heft the heavy item down the corridor, with Samantha yelling directions to stop you crashing into the corners. Finally you shove the crate into the airlock and press the button to open the area to space. \n\t\t\n\t\t*page_break\n\t\t\n\t\tThe rush of air and sudden lack of artificial gravity pulls the box into space. But it's slow, too slow! \n\t\t\n\t\tSamantha starts a countdown. \"Five… Four… Three… Two… One….\"\n\n\t\tWith a blinding flash of light, a shockwave rattles the ship like a tin can. \n\t\t\n\t\tYou look around to see your crew picking themselves up from the floor. Jim is only slightly more disheveled than usual, and Samantha has a surprisingly fashionable tear across the side of her dress.\n\t\t\n\t\tHint seems unconcerned by the commotion and finally appears around the corner. \n\t\t\n\t\t*page_break\n\t\t\n\t\t*Set reputation %+20\n\t\t\n\t\t\"Samantha. Report.\" you ask her, hoping your ship has escaped major damage. \n\t\t\n\t\tBrushing some stray hair from her eyes, she retrieves a computer pad from her belt. Consulting the glowing screen she replies. \"Surprisingly minor Captain, a few small breaches, but nothing too bad. All affected areas are cordoned off and we shouldn't have any trouble sealing the cracks.\"\n\t\n\t\tYou address the air, knowing your nemesis will be listening in. \"Alright Mister Chemist you've failed. Time to go back to school.\"\n\t\t\n\t\tA voice booms loudly over the ship's speakers. \"You may have won this round Captain $!{name} but this is not the last you've seen of me! This was but a test. The next one will be harder. You'll be seeing me… or my powerful friends… very soon!\" The disembodied voice launches into another round of maniacal laughter before suddenly cutting off. You turn to see Jim with with his hand on the intercom switch. \n\t\t\n\t\t\"That's better,\" he states. \"Who is that anyway? An old friend of yours?\"\n\t\t\n\t\tYou realize that your engineer has been running around the ship with you, completely unaware of the Master Alchemist’s presence, having arrived on the bridge after he had already signed off. \n\t\t\n\t\t\"Not exactly… I'll tell you about it later.\" Jim looks at you quizzically but lets it drop. \n\t\t\n\t\t*page_break\n\t\t\n\t\t\"Well let's get going, we've still got a delivery to make.\" You force some enthusiasm into your voice. \n\t\t\n\t\t\"Um Captain.\" Samantha says quietly. \"The drive unit?\"\n\n\t\t[i]The drive unit. In all the excitement, I'd forgotten about that.[/i] \"Closest planet or star base for repairs?\"\n\n\t\tShe consults the computer pad, tucked into her belt. \"There's a star base orbiting Proxima 3 Captain. It's only small though. The others are… significantly further away. As it is, it'll take us about three weeks at our maximum speed to reach it.\"\n\n\t\tJim nods. \"I've been there before. It's basic, but they'll have what we need to fix… this.\" He gestures to the ship generally. \"At least, they could patch us up enough to get us back to Curroxios VII.\"\n\n\t\t\"Well I think we could all use some down time anyway after this.\" You try to put a positive spin on the situation. \"What's the planet like Jim? Can we organize shore leave there while the ship's under repairs?\"\n\n\t\t\"Hmm… not good Captain. It's a mining planet you see. The base is just there to service that. Everything's underground on the planet itself.\" Jim pauses for a moment. \"From memory it was a [i]delightful[/i] place. Sulfurous atmosphere, acid rain, Mach 9 winds that could strip the flesh off your bones in seconds….\"\n\n\t\t\"Ah yes I get the picture,\" you cut him off. [i]Ugh.[/i] It's going to be a long trip and a longer stay on the cramped station. And worst of all… no scotch. Once again you envy Joe and his shore leave. \n\n\t\t\"Well let's get under way,\" you sigh. At least you foiled the Master Alchemist’s plans. You'll have to be on high alert for any more of his dastardly meddling. \n\t\t*achieve foiled\n\t\t*set crew_morale %+10\n\t\t*set reputation %+10\n\t\t*page_break Episode Six\n\t\t\n\n\n\t\tIf you wish, you may visit the Special Features page now. \n\n\t\tWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\n\t\tWhere to, Captain?\n\t\t*choice\n\t\t\t#On with the adventure!\n\t\t\t\t*finish Episode Six\n\t\t\t#Take me to the Special Features.\n\t\t\t\t*goto_scene commentarya", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*comment screenshot file\n\n*set name \"Max Mann\"\n*set hair \"Manly\"\n*set idealism 42\n*set curiosity 59\n*set maverick 69\n*set reputation 59\n*set crew_morale 50\n*set wealth 550\n*set health 78\n*set lazer_pistol 33\n*set flying 15\n*set jim 20\n*set sam 40\n*set joe 20\n*set hint 50\n\t\nYou hear Jim yell, \"Wunikoll's moons!\" followed by a crash as he's thrown sideways. If you don't think of something brilliant, you're all going to die in flames.\n\t\t\nTime to be the fast-thinking captain you were born to be!\n*fake_choice\n\t#I pull the plug beneath the console so all those distracting safety lights switch off.\n\t#I drink a quick glass of scotch to steady my nerves. Alcohol is far more important than safety or skills!\n\t#I cleverly steer the ship on the smoothest possible trajectory as it plummets towards the planet below.\n\n*script changeBackgroundColor(\"black\")\n*set name \"Squarejaw McHandsomepants\"\n*set hair \"Sublime\"\n*set idealism 59\n*set curiosity 42\n*set maverick 62\n*set reputation 45\n*set crew_morale 59\n*set wealth 2100\n*set health 35\n*set lazer_pistol 22\n*set flying 29\n*set jim 30\n*set sam 25\n*set joe 10\n*set hint 50\n\t\nNeeding to blow off some steam, and realizing whatever you do won't have any permanent effect due to the space anomaly, you decide to…\n*fake_choice\n\t#Laser blast both Jim and Hint! They deserve it! \n\t#Hit the thrusters and jettison Joe out of the escape hatch into outer space! He deserves it!\n\t#Declare my love for Samantha and that rather appealing ripped dress of hers. We both deserve it!\n\t#Declare my love for Joe. With a jaw that square and hair that magnificent, who needs brains?\n\t\n\t\n*script changeBackgroundColor(\"sepia\")\t\n*set name \"Barbara Baker\"\n*set hair \"Luscious\"\n*set idealism 29\n*set curiosity 75\n*set maverick 35\n*set reputation 45\n*set crew_morale 69\n*set wealth 1400\n*set health 85\n*set lazer_pistol 49\n*set flying 31\n*set jim 35\n*set sam 22\n*set joe 12\n*set hint 50\n\t\n\nYou automatically turn on your Zork-Talk box, and as it translates you can see that bubbles are the way in which this Lautian creature communicates:\n\n\"Captain Baker?\" it asks you.\n*fake_choice\n\t#\"Who's asking? I'm not fond of strangers interrupting my food.\"\n\t#I burp loudly and say, \"Show me your ID and I'll show you mine.\"\n\t#\"Yes indeed that is me, how can I help you?\"\n\t\n\t\n\t\n*set name \"Georgina Hart\"\n*set hair \"Gorgeous\"\n*set idealism 81\n*set curiosity 60\n*set maverick 69\n*set reputation 70\n*set crew_morale 10\n*set wealth 100\n*set health 30\n*set lazer_pistol 40\n*set flying 22\n*set jim 22\n*set sam 13\n*set joe 15\n*set hint 50\n\t\n\t\n\"Now that we're safe we can decide how to fight that terrifying space bat,\" you say, looking around the surprisingly well-lit and spacious utility closet.\n*fake_choice\n\t#Grab a mop.\n\t#Grab a flame thrower.\n\t#Grab a half unconscious Samantha Foster\n\t\n*set name \"Max Mann\"\n*set hair \"Perfect\"\n*set idealism 22\n*set curiosity 52\n*set maverick 42\n*set reputation 75\n*set crew_morale 29\n*set wealth 1005\n*set health 90\n*set lazer_pistol 49\n*set flying 55\n*set jim 45\n*set sam 45\n*set joe 19\n*set hint 50\n\nEven if Hint thinks she's telling you the truth, she could have been reprogrammed to be unaware of explosive nanobots infesting her hardware… or could she?\n*fake_choice\n\t#Ask Jim's advice. He's the engineer, after all.\n\t#Ask Samantha's advice. She's the science officer, after all.\n\t#Think!", "space_anomaly1": "*disable_reuse\n*set extended_scans \"\"\n*set joe_vote \"\"\n*set joe_scan \"\"\n*set hair \"beautiful\"\n\nOur heroes face their greatest challenge yet… each other!!!\n\nWhy is everyone so angry???\n\nWhy is everyone so angry… again???\n\nDid Joe and/or Samantha just give our captain a flirtatious look?\n\nStay tuned for the paradoxical adventure… The Space Anomaly… from Outer Space!!!\n*page_break The Space Anomaly… from Outer Space!!!\n\"Flolloping Farnusians!\" Jim yells, and uses his stomach arm to hurl an astro wrench at Hint from across the command deck. Hint retaliates with a condescending comment, extending her arms to grasp Jim, who glows a deep red. The wrench bonks harmlessly off Hint's seemingly impervious body, but Fuzzy wails in distress.\n\nSamantha attempts to intervene and implores them to calm down, repeating, \"Joe didn't mean what he said!\" However, the brawling crewmates ignore her pleas, and somehow your science officer's black cocktail dress is ripped several inches down the back even in the absence of any pointy objects.\n\nSpeaking of Joe, he cowers in the back corner by the escape hatch, sobbing about something, his arms wrapped around his knees. It figures Joe would be the cause of this! He's the worst!\n\nYour fingers threaten to pull at your magnificent (and captainesque) hair, but they resist at the last moment, submitting to reason. No situation justifies mussing your hair, although this one comes close. You feel helpless to regain control of your crew, especially since they keep repeating the same infuriating behavior time and time and time again.\n\nIt seems to have been going on for weeks, or perhaps just a few minutes. In these sorts of situations, it's very difficult to tell! Thus far, you've been unable to unravel the mystery of the space anomaly… from outer space!\n*page_break\n\nNothing you've tried over the past weeks or minutes (whichever it is), has worked. It's almost as if the space anomaly is some sort of plot device designed to test every last inch of your mettle. You're trapped in a vicious cycle, and frankly it's getting old. Also, for some strange reason, you seem to be the only person on the ship aware of the predicament! \n\nNeeding to blow off some steam, and realizing whatever you do won't have any permanent effect, you decide to…\n*choice\n\t#Laser blast both Jim and Hint! They deserve it! \n\t\tAlthough your blasts harmlessly bounce off Hint, Jim doubles over as one of your shots finds his ample midsection. Hint looms over Jim ominously, shaking her suction cups as Fuzzy rolls up behind her to assist. \"I have just devised the optimal location to insert your astro wrench.\"\n\t\t*set lazer_pistol %+10\n\t\t*goto before\n\t#Hit the thrusters and jettison Joe out of the escape hatch into outer space! He deserves it!\n\t\tThe ship roars forward, causing your least valuable crew member to slide towards the escape hatch. You peer out the observation deck as Joe's useless body explodes into a million pieces in the dark confines of space. Who knew that the icy touch of space could sometimes cause the human body to instantly explode!\n\t\t*set flying %+10\n\t\t*goto before\n\t#Declare my love for Samantha and that rather appealing ripped dress of hers. We both deserve it!\n\t\t*if sam > 70\n\t\t\tSamantha melts into yours arms and assures you that, \"You're the best captain ever! And your hair is so dreamy!\" A few hours in your private quarters with your very enthusiastic science officer and a bottle of Earthside scotch does wonders for your health. \n\t\t\t\n\t\t\t\"Captain…\" she says.\n\t\t\t\n\t\t\t\"Yes?\"\n\t\t\t\n\t\t\t\"I should probably mention that I've uncovered a major intergalactic plot that puts all of us in dire peril.\"\n\t\t\t\n\t\t\tYou sit bolt upright. \"What?!?\"\n\t\t\t\n\t\t\t\"Listen carefully,\" she says. \"There might not be much time. It's absolutely vital that you follow my instructions exactly.\"\n\t\t\t*set health %+10\n\t\t\t*goto before\n\t\t*else\n\t\t\t\"That's… nice,\" she says. \"Since we're talking, may I ask why [i]Joe[/i] has a console that's actually plugged in, and I don't?\"\n\t\t\t\n\t\t\t\"Umm…\" you say, trailing off as you wait for the time anomaly to set things right.\n\t\t\t*goto before\n\t#Declare my love for Joe. With a jaw that square, and hair that magnificent, who needs brains?\n\t\t*if joe > 40\n\t\t\t*set health %+10\n\t\t\tIt takes a while to explain to the weeping Joe that when you said, \"You're hot\" it wasn't an indication that he needed to see the Auto-Doctor to remedy a fever. You get there in the end, and he gladly follows you to your quarters.\n\t\t\t\n\t\t\tHe's a lot of fun when he's not talking. It turns out there is [i]one[/i] thing he's really quite good at.\n\t\t\t\n\t\t\t\"Err… Captain?\" he says as you're about to fall into a satisfied slumber. \"There's something I really should tell you.\"\n\t\t\t\n\t\t\t\"Mmf?\" you say.\n\t\t\t\n\t\t\t\"Never mind,\" he says. \"When you wake up, I'll be sure to confess everything I've been telling the Zorks about you all this time.\"\n\t\t\t*page_break\n\t\t\t*achieve enemy\n\t\t\t*goto before\n\t\t*else\n\t\t\tHis sobbing only increases in volume. Oh well. He's probably not bright enough to be any fun at the best of times.\n\n*label before\n*line_break\nYour moment of relief is only temporary. Soon you'll be witnessing the same scene again. Hint and Jim will tussle. Samantha will protest. Joe will whimper in the corner. Your razor-sharp mind cuts out all environmental distractions as it races back to the events before encountering the anomaly. Maybe, just maybe, you can figure out a way to save your crew! The distracting voice beside you no longer registers as you apply your genius to the problem.\n*page_break Weeks (or minutes) ago…\n\nHint's voice breaks the relative silence of the command deck. \"Captain. Sensors detect an anomaly .05 parsecs from our current location.\"\n\nSamantha nods in agreement, looking blankly at a screensaver that plays Pong and goes [i]bloop[/i]. \"Affirmative, Captain. I see a white blip, and it's gaining speed.\" What a gal.\n\nYou sit up straighter in your captain's chair. The last few days have been mind-numbingly dull for the crew. No space bats. No brain leeches. No robot armies. It's almost as if you could have skipped right from your last adventure to this very moment without missing anything of interest. Giving a subtle glance to your captain's log you see mostly unflattering doodles of Jim scratching himself with his stomach arm and saying things like, \"When your father ran this ship…\"\n\nIt's a given that you'll order Hint to set course for the anomaly, but why do you give that order?\n*choice\n\t#I'm just naturally curious! Especially about space anomalies… whatever they are.\n\t\t*set curiosity %+10\n\t\t*goto pass_time\n\t#I need a mission to focus on. Drawing doodles of my crusty engineer isn't exactly honing my leadership skills.\n\t\t*set curiosity %-10 \n\t\t*goto pass_time\n\t#I enjoy making snap decisions with very little information!\n\t\t*set maverick %+10\n\t\t*goto pass_time\n\t#My father's ship manual gives me guidance here. See Section 12.8(b) titled \"You Must Investigate Abnormalities!\"\n\t\t*set maverick %-10\n\t\t*goto pass_time\n\n*label pass_time\nHint nods curtly and sets course for the anomaly. She rotates her head 180 degrees to address you. \"Captain, I calculate it will take us 5.0251 hours to reach our destination at current speed.\"\n\nJim rumbles and bangs all three of his fists against the cargo hold doors. \"Mad Martians! I've reconfigured the phobetor couplings three times already! There's nothing else to do until we get more parts.\" \n\nJoe looks bashfully at Samantha and asks, \"Is there anything I can do to help?\"\n\nSamantha studies her main console, which is of course not attached to the rest of the ship. Jim has installed some blinking lights and a few non-operational buttons, along with the monitor that's still playing Pong. She smiles at her crewmate, but in a genuinely friendly, not condescending way. \"Thanks for the offer Joe, but I have everything under control.\" \n\nHmmm… another 5.0251 hours of monotony sounds dreadful. Just as you ponder another Jim doodle, Hint provides additional information about your course setting. \"Captain, we are approaching an asteroid belt. Primitive life signs on several of the larger asteroids. Based on an analysis of the asteroid composition, life forms are mostly likely similar to Earth bacteria. I will have no difficulty navigating our vessel through the belt.\"\n\nSamantha looks intrigued. \"Hint, what are the chances the life forms are more advanced, perhaps even sentient?\"\n\nHint's suction cup taps a few of her own (operational) console buttons and studies the monitor. \"Only a 0.09% chance.\"\n\nIt seems like it's time for some action. What order do you give?\n*choice\n\t#I take control of the ship's laser cannon and practice my aim on those asteroids. Who cares if a few primitive life forms get vaporized?\n\t\tSamantha looks shocked at your nonchalance, covering her mouth with her hand. Even Jim, who generally seems indifferent to the plights of others, frowns at you and glows a soft orange.\n\t\t*set lazer_pistol %+10\n\t\t*set reputation %-10\n\t\t*goto arrive\t\n\t#I relieve the (vastly superior) Hint from her duties and hone my piloting skills while looping around asteroids!\n\t\tYou manage to emerge from the asteroids with your ship mostly intact! However, there was some minor hull damage. Jim grumbles and deducts credits from the general ship account in preparation for the inevitable repairs.\n\t\t*set flying %+10\n\t\t*set wealth -500\n\t\t*goto arrive\n\t#I need to focus on raising the crew's morale, so I suggest a rowdy game of \"Coitus, Cohabitate or Vaporize?\"\n\t\tA few hours around the break room table debating the relative merits of various intergalactic celebrities does wonders for crew morale! And in the process, you discover Joe's hidden love for purple-skinned aliens and Hint's intense dislike of 99 percent of carbon-based lifeforms. \"In the future,\" she says, \"assume my answer will be vaporize. It is more efficient that way.\"\n\t\t\n\t\tFuzzy creaks affectionately at her.\n\t\t*set crew_morale %+10\n\t\t*goto arrive\n\n*label arrive\n*advertisement\n\n5.0251 hours later, your ship arrives at the space anomaly. You stroke your chin in mock confidence, staring at the display screen brimming with dozens of indecipherable measurements, calculations and data. Hint rotates her head again 180 degrees and simply asks, \"Orders, Captain?\"\n\nSamantha speaks up. \"We could run additional scans now that we're closer. They might show something we missed.\"\n\nHint adds, \"Complete additional scans will consume 3.490 hours. Chances of discovering relevant new data are 0.24%.\"\n\nYou spot Joe speaking with Jim by the cargo doors. Waving Joe aside, Jim walks up beside you and wraps a beefy arm around your shoulder. \"Captain, nothing in that anomaly is going to harm our ship. Plus, we're burning fuel just sitting here. We can scan as we go, can't we? Joe over there agrees.\"\n\nWhat's your order?\n*choice\n\t#Run the exhaustive scans. It might be boring but it's the safe way to go.\n\t\tJim grumbles, Joe sighs and even Hint seems annoyed as she responds, \"Yes, Captain. I shall also alert you of any potential threat in a ten parsec radius. I shall include spacedust, astro flowers and celestial rainbows in my analysis.\"\t\n\t\t*set crew_morale %-10\n\t\t*set extended_scans \"yes\"\n\t\t*goto more_scans\n\t#Scan as we go. The crew is bored and there's no point being overly cautious.\n\t\tJim and Joe voice their approval. Jim slaps you on the shoulder and Hint nods in agreement. \"Aye aye, Captain!\" She then pauses and adds, \"I shall refrain from uttering that phrase in the future.\"\n\t\t*set crew_morale %+10\n\t\t*goto anomaly\n\t#Hmmm...I'll take a vote and follow their wishes. It seems so democratic! Plus, I don't have to make a decision this way.\n\t\t*goto vote\n\n*label vote\n*set reputation %-10\n*set joe_vote \"yes\"\n*set crew_morale %+10\nThe crew looks stunned. Samantha furrows her brow and asks, \"But… I thought the captain was the boss?\"\n\nHint taps a suction cup on her console. \"Since the Captain has decided to abandon command responsibilities for this decision, I shall communicate my position. A .24 percent chance of obtaining new relevant data does not statistically justify time and fuel resources involved in maintaining our current position while running additional scans. We should enter anomaly and scan inside.\"\n\nJim looks to Joe and then back at the rest of the group. \"We agree with Hint. We should go.\"\n\nSamantha looks unsure. \"I… suppose I'll vote with the rest of the crew, since they've already agreed.\"\n\nHint nods. \"Setting course to enter the anomaly.\"\n*goto anomaly\n\n\n*label more_scans\n*set joe_scan \"yes\"\nHint initiates the scans as ordered. Samantha's big brown eyes focus like beautiful lasers on the sole blip on her screen. Halfway through the scanning process, Hint excuses herself to run some self-diagnostics and recharge. Joe stands in her during her absence, tapping a few buttons but doing very little (his specialty).\n\nAfter 3.490 hours of scanning, Hint announces the results. \"No new relevant data.\" She tilts her head and taps a few buttons, pausing for a moment as if confirming her conclusion. \"Forgive me, Captain. For a moment I thought I had miscalculated. I have confirmed my initial conclusion. No new relevant data. It is safe to proceed.\"\n\nYou give the go-ahead to enter the anomaly. At least nothing bad can happen inside, right?\n*goto anomaly\n\n\n*label anomaly\n*page_break\nThings get weird very quickly. You remember entering the anomaly but your memories are hazy after that point. It's almost impossible to put events in order, but you sense an overwhelming feeling of desperation. You might call it… futility. Like being trapped on a circular track with no exits. \n\nYou blink and find yourself sitting in your captain's chair. A chaotic scene unfolds before you, and it's a specific type of chaos you've experienced over and over again. \"Flolloping Farnusians!\" Jim yells,  and uses his stomach arm to hurl an astro wrench at Hint from across the command deck. Hint retaliates with a condescending comment, extending her arms to grasp Jim, who glows a deep red. The wrench bonks harmlessly off Hint's seemingly impervious body, but Fuzzy wails in distress at the sight.\n\nSamantha attempts to intervene and implores them to calm down, repeating, \"Joe didn't mean what he said!\" However, the brawling crewmates ignore her pleas, and somehow your science officer's black cocktail dress is ripped several inches down the back even in the absence of any pointy objects. \n\nSpeaking of Joe, he cowers in the back corner by the escape hatch, sobbing about something, his arms wrapped around his knees. It figures Joe would be the cause of this! He's the worst!\n\nHint starts to squeeze Jim, who reaches out with his stomach arm for one of his ominous-looking inventions hanging on a hook you never noticed on the back of the Bridge door. You assume it's a weapon. \n*page_break\nWhat is going on???\n\nWhy is everything happening over and over again?!?!\n\nWhat is going on???\n\nWhy is everything happening over and over again?!?!\n\n*finish Part Two", "space_anomaly2": "*temp usedchoice 0\n\n*disable_reuse\nIt's tough to process everything going on. You take a few seconds to consider your options and then take action. What do you do?\n*choice\n\t#I hit the large button just outside marked \"Complete System Reboot (This Includes Hint).\"\n\t\tYou slap the button and Hint immediately freezes and tips over with a clang. Fuzzy emits a [i]beeeoooooopp[/i] and shuts down in a robotic sulk. Jim smirks and takes the weapon off the hook, aiming it at Joe. \"Those robots can't save you now.\"\n\t\t*goto round_2 \n\t#I kick the potential weapon away from Jim.\n\t\tAs soon as Jim grasps the item, you kick it from his hand, knocking it across the command center. Hint squeezes Jim harder, explaining to you, \"Thank you for the assist, Captain. Jim planned to terminate a crew member.\"\n\t\t*goto round_2 \n\t#I take a tarp and cover Samantha.\n\t\tYour science officer wraps herself in the tarp and points to Jim. \"Captain, we have to stop them! He was going to kill Joe!\"\n\t\t*goto round_2 \n\t#I confront Joe and ask why he's sobbing.\n\t\tJoe just blubbers, \"Captain, Jim said… he was going to… to vaporize me!\"\n\t\t*goto round_2 \n\n*label round_2\n*page_break\n[i]Whoosh![/i] Everything gets blurry… you almost fall to the ground as the temporal cycle restarts. Now you're back in your captain's chair. You blink and you're greeted with the same chaos. You have to figure out a way to escape this cycle before you go mad!\n\nThe cycle only lasts a few moments. If you don't act quickly to find an 'exit,' the cycle will just restart and any progress you will have made will be lost. But first you need to figure out what's going on. Why does Jim want to kill Joe? And what did Joe say that started this scene? If you act immediately, you may gain a few extra seconds!\n\nWhat do you do?\n*choice\n\t#I hit the large red button on the wall marked \"Complete System Reboot (This Includes Hint).\"\n\t\tYou slap the button and Hint immediately freezes and tips over with a clang. Fuzzy emits a [i]beeeoooooopp[/i] and shuts down in a robotic sulk. Jim smirks and takes the weapon off the hook, aiming it at Joe. \"Those robots can't save you now.\"\n\t\t*goto round_3_bargle\n\t#I kick the potential weapon away from Jim.\n\t\tAs soon as Jim grasps the item, you kick it from his hand, knocking it across the command center. Hint squeezes Jim harder, explaining to you, \"Thank you for the assist, Captain. Jim planned to terminate a crew member.\"\n\t\t*goto round_3_hint\n\t#I take a tarp and cover Samantha.\n\t\tYour science officer wraps herself in the tarp and points to Jim. \"Captain, we have to stop them! He was going to kill Joe!\"\n\t\t*goto round_3_foster\n\t#I confront Joe and ask why he's sobbing.\n\t\tJoe just blubbers, \"Captain, Jim said… he was going to… to vaporize me!\"\n\t\t*goto round_3_joe\n\n*label round_3_bargle\n*page_break\nBefore Jim can fire, you leap into his line of fire and urge him to holster his weapon and explain himself.\n\nJim, glowing like a red giant, scowls. \"Captain, Joe said we should stage a mutiny! He said he could get us out of here… wherever here is!\"\n*goto round4\n\n*label round_3_hint\n*page_break\nYou ask Hint why Jim had planned to terminate Joe.\n\nHint's eyes glow as she explains Jim's motivation. \"A simple answer, Captain. Crewman Joe had suggested we participate in a mutiny against you. I suggested he be apprehended and jailed in the cargo hold. Jim had a more… permanent solution.\"\n*goto round4\n\n*label round_3_foster\n*page_break\nYou quickly ask Samantha why Jim is trying to kill Joe.\n\nSamantha gasps her answer in overly dramatic fashion. \"Captain! Joe wanted us to… to… join in a mutiny against you!\"\n*goto round4\n\n*label round_3_joe\n*page_break\nBefore Joe can speak, Samantha gasps in overly dramatic fashion. \"Captain! Joe wanted us to… to… join in a mutiny against you!\"\n\nJim and Hint stop fighting and confirm Samantha's statement. Jim reluctantly holsters his weapon and Hint releases him, advising you, \"It's true, Captain. He planted the seeds of revolt. We declined.\"\n*goto round4\n\n*label round4\n*page_break\n[i]Whoosh![/i] Everything gets blurry… you almost fall to the ground as the temporal cycle restarts. Now you're back in your captain's chair. You blink and you're greeted with the same chaos. But now you know how to quickly resolve the conflict! \n\nYou kick Jim's weapon out of his hand right into the large red button in the hall marked \"Complete System Reboot (This Includes Hint),\" nullifying the immediate threat from both crew members. Tossing a tarp to Samantha, you glance to Joe and tell him…\n\n*choice\n\t#\"I'll try to forgive you.\"\n\t\t*set idealism %+10\n\t\t*goto round5\n\t#\"I'll never forgive you.\"\n\t\t*set idealism %-10\n\t\t*goto round5\n\t#\"I should launch you into outer space and watch you splatter like a brain leech.\"\n\t\t*set maverick %+10\n\t\t*goto round5\n\t#\"When we get out of this, I'm taking you straight to the proper authorities. I promise you that.\"\n\t\t*set maverick %-10\n\t\t*goto round5\n\n*label round5\n*page_break\nYou need to focus on escaping from the anomaly. You only have a few moments. What's your plan?\n\n*choice\n\t#I overload the ship's ion core to cause a massive burst of speed!\n\t\t*if ((flying > 25) or (usedchoice = 2))\n\t\t\t*set maverick %+10\t\n\t\t\t*goto flying_win\n\t\t*else\n\t\t\tYou tumble head over heels as the anomaly fights back!\n\t\t\t*set health %-10\n\t\t\t*set usedchoice +1\n\t\t\t*goto round5\n\t#I use the ship's blasters to create a rift in the temporal anomaly!\n\t\t*if ((lazer_pistol > 20) or (usedchoice = 2))\n\t\t\t*set maverick %+10\t\t\t\n\t\t\t*goto shooting_win\n\t\t*else\n\t\t\tYou tumble head over heels as the anomaly fights back!\n\t\t\t*set health %-10\n\t\t\t*set usedchoice +1\n\t\t\t*goto round5\n\t#I wonder if our science officer can figure a way out of this! We need to put our heads together!\n\t\t*if ((curiosity \u003c 40) or (usedchoice = 2))\n\t\t\t*set maverick %-10\n\t\t\t*goto science_win\n\t\t*else\n\t\t\tSamantha is talking, but her words are so fast and her voice so high-pitched that it's just no use. \n\t\t\t*set sam %-10\n\t\t\t*set usedchoice +1\n\t\t\t*goto round5\n\n*label flying_win\n\n[i]Whoooooooooosh![/i] The crew goes tumbling around the command center as your ship rockets to life. Hint skids across the floor, clanging against your captain's chair. Jim and Joe slam against the cargo doors, pressed against the metal by the sheer force of the rapid acceleration. Samantha manages to hold onto her fake console with barely a hair out of place. What a gal!\n\nThen the engines die. All is quiet, other than the groans of your various crew members attempting to get to their feet. \n\nYour eyes scan the display console. The readings show that you've returned to normal space at exactly the same time and position marking your initial discovery of the space anomaly. You've done it! You've saved your crew! They'll be so thankful!\n*goto end\n\n\n\n*label shooting_win\n[i]Pew! Pew! Pew! Pew![/i] Your ship's lazers create a rift not quite large enough for your ship to enter. But your efforts have drained the blasters' power, and the rift slowly starts to shrink. Joe, ever the coward, covers his ears even though as we all know lasers don't make any real sounds in outer space. Jim, instinctively understanding your strategy, flies into action. \"Routing all auxiliary power to lazers, Captain!\" \n\n[i]Pew! Pew! Pew! Pew![/i] You fire another volley of lazers, creating a larger rift. Samantha jumps to the piloting station and hits the thrusters, shooting your ship through the rift. \n\nYour eyes scan the display console. The readings show that you've returned to normal space at exactly the same time and position marking your initial discovery of the space anomaly. You've done it! You've saved your crew! They'll be so thankful!\n*goto end\n\n\n\n*label science_win\nYou motion for Samantha to come over to Hint's (functional) station. \"Samantha! You're our science officer! Can you find an exit from the anomaly?\"\n\n\"The… what?\" Samantha squints are Hint's console and points to a flashing gold dot. \"I'm not sure what you mean but… that spot right there… it's giving off odd readings. In theory, it could be a rift in a temporal anomaly. That is, if we were trapped in one.\"\n\nYou set the course settings for the rift and hit the thrusters. [i]Whoooooooooosh![/i] Your ship rockets forward as your crew grabs whatever they can grab onto. It just so happens that Samantha grabs ahold of you. The ships rattles and then… silence. \n\nYour eyes scan the display console. The readings show that you've returned to normal space at exactly the same time and position marking your initial discovery of the space anomaly. You and Samantha have done it! You've saved your crew! They'll be so thankful!\n*goto end\n\n\n\n\n\n*label end\n*page_break\nActually, because of how these types of temporal distortions work, they won't be thankful at all. They won't even remember the near disaster or, more tragically, your heroic actions.\n\nYou blink again. Hint's voice breaks the relative silence of the command deck. \"Captain. Sensors detect an anomaly .05 parsecs from our current location.\"\n\nSamantha nods in agreement, looking blankly at a navigation screen. \"Affirmative, Captain. I see a white blip, and it's gaining speed.\" \n\nYou sit up straighter in your captain's chair and glance down to your captain's log you see mostly unflattering doodles of Jim scratching himself with his stomach arm and saying things like, \"When your father ran this ship…\"\n\nHint speaks up. \"Captain, your order?\"\n\n*fake_choice\n\t#\"Ignore the anomaly. Plot our course past Tritonamar V towards Party Planet Alpha. If we want to lose track of time, we can definitely do it there.\"\n\t#\"Keep our current course.\" Then I wink before adding, \"We don't have… time… for that type of distraction.\" \n\t#I glance over at Joe before saying, \"No. We have more pressing matters to address.\"\n\nHint manages a shrug for the first time, and she and Fuzzy head off to the Cargo Bay, saying they \"need to recharge\". Jim goes backs to tinkering and Samantha resumes her focus on her screensaver.\n\nBut Joe seems different. He scowls at you and lurks back to the cargo hold. You have a serious problem on board. Even though he technically never did anything, since the whole incident with the temporal anomaly never actually happened, you know what he tried to do. He tried to rally the crew against you. He tried to take over.\n\n*if (joe_vote = \"yes\")\n\tAnd he also voted in favor of skipping the extra scans that may have prevented your ship from entering the anomaly in the first place.\n\t*goto end2\n*if (joe_scan = \"yes\")\n\tAnd he also seemed to manipulate the second round of scans when Hint temporarily left her station. That seems pretty suspicious. Perhaps he altered the scans so that you would enter the anomaly.\n\t*goto end2\n*else\n\t*goto end2\n\n*label end2\n*page_break\nYou suspect you have a traitor on board. A traitor who was willing to sacrifice his own life to doom your entire crew to the space anomaly… from outer space!\n\n*page_break Episode Eight\n\nIf you wish, you may visit the Special Features page now. \n\nWARNING: Although you can come back into the story from the Special Features, they are packed with spoilers throughout.\n\nWhere to, Captain?\n*choice\n\t#On with the adventure!\n\t\t*finish Episode Eight\n\t#Take me to the Special Features.\n\t\t*goto_scene commentarya\n", "startup": "*title Starship Adventures\n*author Adrao, Doctor, Eric Moser, Felicity Banks, and Jacic\n\n*scene_list\n\tstartup\n\tfelicity_banks_part_one\n\tfelicity_banks_part_two\n\thornheadfan1\n\thornheadfan1_part2\n\tadrao\n\tadrao_part_two\n\tdoctor_part_one\n\tdoctor_part_two\n\tjacic_part_one\n\tjacic_part_two\n\tfelicity2_part_1\n\tfelicity2_part_2\n\tspace_anomaly1\n\tspace_anomaly2\n\tthe_lautian_titan_part_one\n\tthe_lautian_titan_part_two\n\tclimax_part_one\n\tclimax_part_two\n\tclimax_part_three\n\tcommentarya\n\t\n\t\n*create pc_is_male false\n*create pc_is_female false\n\n*create he \"\"\n*create him \"\"\n*create his \"\"\n\n*create name \"\"\n*create first_name \"\"\n*create last_name \"\"\n*create gender \"\"\n\n*create hair \"\"\n\n\n*create idealism 50\n*create reputation 1\n*create crew_morale 50\n*create curiosity 50\n*create maverick 50\n*create wealth 1000\n*create health 99\n\n*create laz
