e\n\t\tXgoto joe_fruit2\n\n\t\tXlabel joe_fruit2\n\t\tXline_break\n\n\t\tHint looks exactly the same as she did two hours ago but Miss Foster insists that the pricy polish they bought resulted in a slightly more noticeable shine. \"Oh when I told them I was a science officer they were happy to speak in terms I understood, like the...er...glistenosity of their product compared to others on the market.\"\n\n\t\tHint looks right at you. \"Captain, I searched all known databases for term 'glistenosity.' No results were found. I have concluded that the carbon based lifeform selling the product deceived our science offer for financial gain.\"\n\n\t\tJoe waves his hand at the ground. \"I bought enough Nettor Fruits to last us forever! Or until they go bad. Which is like in four days. But they were practially giving them away!\"\n\n\t\tHe motions to a large crate larger than Hint. \"I did good, right Captain? It was only 200 credits.\"\n\t\tXset wealth -200\n\n\t\tHow do you respond to Joe's question?\n\t\tXchoice\n\t\tXXI set my lazer pistol to \"stun\" and aim a shot right at this feet! Why did he waste our money on a huge crate of fruit?\n\t\tXif (lazer_pistol > 55)\n\t\tYour expertly aimed shot just singes the tips of Joe's nondescript shoes. He lurches backward and stammers, \"Sorry Captain!\" over and over. Miss Foster immediately consoles Joe, kneeling and gently patting his arm. Bargle frowns but says nothing.\n\t\tXset lazer_pistol %+10\n\t\tXset reputation %-10\n\t\tXgoto back_ship\n\t\tXelse\n\t\tDue to your less than optimal lazer pistol training, your shot strays upward, stunning Joe's shin. He falls back, stammering, \"Sorry Captain!\" over and over. Miss Foster immediately consoles him, gently patting his frozen leg. Bargle frowns at you and bumps your shoulder as he enters the ship.\n\t\tXset lazer_pistol %+10\n\t\tXset reputation %-20\n\t\tXgoto back_ship\n\t\tXXI need to blow off some steam! Without saying a word, I jump into the ship and take a nice relaxing flight over the pink-hued clouds of Fructocus 17.\n\t\tTwenty minutes later, you ease the ship back down to the docking bay and wave everyone, even your idiotic fruit-buying crewman, aboard. Your crew looks confused but no one appears angry with you. \n\t\tXset flying %+10\n\t\tXgoto back_ship\n\t\tXXAgainst every natural instinct in my captainesque body, I decide to be nice to Joe.\n\t\tYou assure Joe of the wisdom of his purchase. He nods nervously and stammers, \"Thank you Captain\" over and over as Hint wheels the crate into the ship.\n\t\tXset reputation %+10\n\t\tXgoto back_ship\n\n\t\tXlabel back_ship\n\n\t\tJoe volunteers to maximize the capacity of your ship's small cargo hold to accomodate his fruit crate while Hint takes the controls. Samantha Foster assumes her normal position at the science console, crossing her legs and tapping on a few random buttons on a console not connected to anything. She taps the sole of one of her platform heels against the underside of her console and hums happily. What a gal.\n\n\t\tBargle vows to upgrade the ship's engines, \"one way or the other,\" and casts an appraising eye at Hint's gleaming body, as if pondering the mechanical treasures that might be found within. He scratches his head and makes gutteral noises that would certainly offend Joe's delicate sensibilities.\n\n\t\tHint rotates her head 180 degrees and addresses you. \"Captain, what is our course setting?\"\n\n\t\tYou clear your throat, preparing to convey your command in a tone inspiring both unshakeable confidence and quiet admiration. But you're not quite sure where your crew should go next. What do you tell her?\n\t\tXchoice\n\t\tXX\"Set our course for the moon Yem-Yem. I hear the locals are friendly. We could use some allies.\"\n\t\tXset idealism %+10\n\t\tXgoto joe_back\n\t\tXX\"Set our course for the Zth System. We can collect on the bounties for the smugglers in that area.\"\n\t\tXset idealism %-10\n\t\tXgoto joe_back\n\t\tXX\"Set our course for the Sector 777. There's a rumored temporal anomaly to explore.\"\n\t\tXset curiousity %+10\n\t\tXgoto joe_back\n\t\tXX\"Set our course for Hospice Alpha. The crew deserves some rest and relaxation without the danger of purple-skinned sex deviants.\"\n\t\tXset reputation %+10\n\t\tXgoto joe_back\n\n\t\tXlabel joe_back\n\n\t\tAn hour later, you find yourself dozing in your captain's chair, your chin resting on your hand. Wiping drool from your fingers, you blink yourself awake. All is calm. Miss Foster continues to tap happily away while Hint has extended her right arm twenty feet, plugging her suction cup into the diagnostic testing center. Soft buzzing sounds indicate all systems are operating normally.\n\n\t\tYou're considering the merits of additional nap time when the cargo hold doors whoosh open behind you. Joe sputters, \"Captain! Intruders! They're...they're...\"\n\n\t\tYour hapless crewman's next words are rendered superfluous as a slimy reddish brown worm-like creature oozes down the cargo door, landing on top of Miss Foster's beehive and attaching itself to her skull. Her eyelashes flutter and she groans softly.  \n\n\t\tBargle walks stiffly into the command room. Another of the creatures has attached itself to his unruly mop of grey hair. Bargle mumbles something and reaches for the lazer pistol on his hip holster.\n\n\t\tJoe shrieks, stumbling past the two victimized crew members and taking refuge behind you. \"Captain! Hint! We're being attacked...by brain leeches...from outer space!\"\n\t\tXpage_break\n\n\t\tHint rises on her wheel and rotates her entire body to face the threat, her arm disengaging from the diagnostic center with a whipping sound. \"Captain! I shall neutralize the threat! What non-lethal measures shall I employ?\"\n\n\t\tYou instantly assess the situation, determined to avoid injury to Bargle and Miss Foster while simultaneously stopping the brain leeches from causing further mayhem. If Bargle's brain leech can force him to fire his lazer, the situation will certain escalate. But honestly as long as you have Hint in your corner, you know victory is assured. After all, she has a perfect track record of bailing the crew out of dangerous situations.\n\n\t\tWhat do you tell Hint to do?\n\t\tXfake_choice\n\t\tXXI tell her to extend her arms and tie up both Bargle and Miss Foster.\n\t\tXXI tell her to use her suction cups to grab both Bargle and Miss Foster, forcing them back into the cargo area.\n\t\tXXI tell her to focus on disarming Bargle! Without his lazer pistol, neither he nor Miss Foster constitute a threat.\n\n\t\tJust as Hint prepares to execute your command, Miss Foster reaches a graceful finger to large red button on the wall marked \"Complete System Reboot (This Includes Hint)\" and taps down on it. Immediately the ship's engines die and the lights flicker into darkness. Hint freezes up and tips over to the floor. The clangs echo through the command center but the ramifications echo louder in your head.\n\n\t\tWith one quick move, the brain leeches have completely taken your plot device out of the fight! Now it's just you and your least capable crew member against the alien invaders! The ship has been disabled and Hint won't reboot until it's too late. \n\n\t\tJust when you think matters can't get worse, two more brain leeches worm their way between the open cargo doors, leaving slimy trails in their wake. You stop to ponder if they are perhaps brain slugs, since slugs produce slime trails but leeches don't. \n\n\t\tBoth of the new arrivals are oozing their way directly to you, ignoring Joe completely. Your hapless crewman must not register enough brain activity to attract the attention of the leeches...or slugs.\n\n\t\tYou don't have time to ponder your limited options. You must act quickly to avoid being overcome!\n\t\tXchoice\n\t\tXXI unholster my lazer pistol and blast one of the attacking brain leeches! \n\t\tXif (lazer_pistol > 55)\n\t\tYour shot finds its mark, stunning one of the hideous creatures. It slumps lifelessly to the floor. However, before you can aim another shot, the leech-controlled Bargle and Miss Foster pin you to the wall.\n\t\tXset lazer_pistol %+10\n\t\tXgoto grabbed\n\t\tXelse\n\t\tYour shot misses leech completely, which is quite embarrassing considering how slowly it is moving. Before you can aim another shot, the leech-controlled Bargle and Miss Foster pin you to the wall.\n\t\tXset lazer_pistol %+10\n\t\tXgoto grabbed\n\t\tXXI grab the glass of Earthside scotch from my captain's chair armrest and take a swig for courage!\n\t\tYou feel the nourishing fluid fortify your body. Unfortunately, this doesn't stop the leech-controlled Bargle and Miss Foster from grabbing you and pinning you to the wall.\n\t\tXset health %+10\n\t\tXgoto grabbed\n\t\tXXI strap on a jet pack hanging on the wall and try to maneuver around the room to buy some time! \n\t\tXif (flying > 55)\n\t\tYou gracefully zoom around the confined space, even managing to burn one of the brain leeches with your flaming exhaust! However, your pack starts to sputter and the leech-controlled Bargle and Miss Foster pin you to the wall.\n\t\tXset flying %+10\n\t\tXgoto grabbed\n\t\tXelse\n\t\tPerhaps flying in such a confined space wasn't the wisest idea. Your immediately crash into one of the cargo doors, slumping to the ground. Hands grasp both of your arms. You look up to see the leech-controlled Bargle and Miss Foster pinning you to the wall. \n\t\tXset flying %+10\n\t\tXgoto grabbed\n\n\t\tXlabel grabbed\n\t\tBargle's blank eyes betray no emotion as bashes your head with his lazer pistol.\n\n\t\tXif (special_helmet = \"yes\")\n\t\tBut the blow harmlessly bounces off your newly acquired helmet. You smirk in defiance, congratulating yourself on your foresight and fashion sense. You're brought back to reality as you feel one of Miss Foster's elegant fingers deftly unlatches the helmet, pulling it from your head. How is being controlled by a brain leech making her smarter?? You'd normal say, \"What a gal!\" but now is not the time! \n\t\tXgoto grabbed2\n\t\tXelse\n\t\tYou grunt defiantly, your head making a sickening thud against the wall. \n\t\tXset health %-20\n\t\tXgoto grabbed2\n\n\t\tXlabel grabbed2\n\t\tBargle now raises his lazer pistol and presses the muzzle against your temple. There's nothing you can do now! A brain leech creeps vertically beside you, approaching your head. In just seconds it will all be over! You'll be yet another victim of the brain leeches from outer space!\n\t\tXpage_break\n\n\t\tOr will you? You've forgotten all about Joe and his immunity to the brain leeches! You spot Joe cowering behind Hint's prone body, his head barely visible. What leadership decision can you make to save the day?\n\t\tXchoice\n\t\tXXJoe will only respond to a stern command! I order him to stop cowering like a...cowerer...and save me!\n\t\tJoe flinches at your words and seems frozen with indecision. So much for him saving the day.\n\t\tXset reputation %-10\n\t\tXgoto hint_save\n\t\tXXAs much as it pains me to do this, I have to give Joe words of encouragement. \n\t\tYou almost throw up in your mouth, but you manage to tell Joe that you believe in him and that you're depending on him. He smiles but seems frozen in decision.\n\t\tXset reputation %+10\n\t\tXgoto hint_save\n\t\tXXThis is hopeless! I'll spend my last moment of consciousness pondering the whole slug versus leech thing.\n\t\tXset curiousity %+10\n\t\tXgoto hint_save\n\n\t\tXlabel hint_save\n\t\tXpage_break\n\t\tJust when all appears lost, the lights flicker on and the engines roar to life. The ship's systems have rebooted just in time! And that means Hint is back in action!\n\n\t\tTwo suction cups zip into view, easily popping the brain leeches from Bargle's and Miss Foster's craniums. Hint gathers all the brain leeches in her expandable arms and tosses them unceremoniously into the fruit crate in the cargo room. After tossing the lid on the crate, she wheels up the side of the box and sits on top, thus ending the threat of the brain leeches in roughly five seconds.\n\t\tXpage_break\n\n\t\tMiss Foster and Bargle appear to be largely undamaged by the encounter. Your science officer no longer shows any hint of ingenuity or initative and returns to happily pushing buttons and humming songs to herself. Bargle immediately returns to his constant griping and grumbing about the limited capacities of your ship. You can't help but think you preferred his silent \"controlled by a brain leech\" persona.\n\n\t\tOf course it turns out that the brain leeches had stowed away in the crate of Nettor Fruits Joe purchased on Fructocus 17. On your orders, Hint launched the crate, containing both the leeches and the fruits, into deep space. You almost sensed some level of satisfaction as the robot waved her suction cup in farewell to the alien invaders, who immediately exploded into a million slimy pieces outside the ship. \n\n\t\tAs you make your entry into your captain's diary, you ponder what lesson you've taken from this adventure.\n\t\tXchoice\n\t\tXXI'm more curious than ever about the creatures we'll encounter in our journeys. \n\t\tAlthough I'm admittedly a little bit less curious about the brain-sucking worm things. And the carnivorous plants!\n\t\tXset curiousity %+10\n\t\tXgoto end\n\t\tXXI'm more cynical than ever about meeting other beings. They all seem to be out to get us!\n\t\tEspecially the brain-sucking worm things! And the carnivorous plants! And I'm probably forgetting some others.\n\t\tXset idealism %-10\n\t\tXgoto end\n\t\tXXI'm still optimistic that we can make friends, and perhaps even allies, in the future. \n\t\tWe'll just steer clear of brain-sucking worm things. And the carnivorous plants!\n\t\tXset idealism %+10\n\t\tXgoto end\n\n\t\tXlabel end\n\n\t\tXif (reputation > 65)\n\t\tYour crew appears to be in good spirts and generally happy with your leadership as Hint sets your new course setting. You smile and give Hint the \"go\" sign with you index and middle fingers pressed together. If your crew can handle the attack of the brain leeches, they can probably handle anything.\n\t\tXgoto end2\n\t\tXif (reputation > 40)\n\t\tAs Hint sets your new course setting, you feel that your crew has been shaken by this encounter. Their faith in your leadership remains low. You force a smile and give Hint the \"go\" sign with you index and middle fingers pressed together. Perhaps the next adventure will bring everyone closer together. Thankfully, not every journey will involve brain leeches...from outer space!\n\t\tXgoto end2\n\t\tXelse \n\t\tAs Hint sets your new course setting, you know your crew has been brought to its knees by this encounter. If this continues, you might have to start preparing for a mutiny. You can't even summon a smile as you give Hint the \"go\" sign with you index and middle fingers pressed together. Things can't get much worse. Only time will tell if your crew can recover from the attack of the brain leeches...from outer space!\n\t\tXgoto end2\n\n\n\t\tXlabel end2\n\n\t\tTHE END\n\t\t*choice\n\t\t\t#Back to Special Features.\n\t\t\t\t*goto home\n\t\t\t#Back to Drafts.\n\t\t\t\t*goto drafts\n\t#Episode Three: The Robot Rulers.... of Lautus!!! by Adrao\n\t\tXcomment Chapter by adrao\n\n\t\tXtemp homimum 0\n\t\tXtemp trading 0\n\t\tXtemp crew_member 0\n\t\tXtemp relations_robots 50\n\t\tXtemp robots_enter_room 0\n\n\n\t\tThe bar at the main space station around the planet of Curroxios VII is definitively not the most elegant you have ever seen, though its atmosphere is typical of these sort of places, with a multitude of creatures of various races congregating to get intoxicated -by ingesting various types of beverages, vapours or foods-, carry out business transactions or simply pass some time talking to other travelers. You sit down at one of the tables, and realize that you were all actually starving, so you first of all order the only food on the menu that seems to be digestible by humans. \n\n\t\tWhile you are eating suddenly one rather tall and thin pale blue humanoid approaches your table, dressed in a rather simple grey tunic. His forehead has 4 eyes, and he has only one orifice in his face, from which a series of bubbles of different size and texture emanate. You automatically turn on your Zork box, and realize that these bubbles are the way in which this creature communicates:\n\n\t\t\"${name}?\"\n\n\t\tXchoice\n\t\tXX\"Who is asking? I am not really fond of strangers interrupting my food...\"\n\t\tXset idealism %-2\n\t\tThe humanoid emits some apologetic bubbles:\n\t\t\"Forgive me, I come in peace and friendship, I mean no harm...\"\n\t\tXchoice\n\t\tXX\"Well, yes that would be me... but be quick!\"\n\t\tXgoto its_me\n\n\t\tXXBurp loudly and say \"Yes, that's the name I go by\"\n\t\tXgoto its_me\n\n\t\tXX\"Yes, indeed that is me, how can I help you?\"\n\t\tXset idealism %+2\n\t\tXlabel its_me\n\t\tThe bubbles that come out of the creature acquire a rather different tonality, as if pleased:\n\t\t\"Pleased to meet you!. My name is Xargos, an exile from the planet of Lautus. If I may take a bit of your time, I would like to request your services for a mission of the uttermost importance to us Lautians. It would be dangerous, but the potential rewards would be great!\"\n\n\t\tXchoice\n\n\t\tXX\"Ok, you have caught my curiosity, please tell me more...\"\n\t\tXargos appears to be very pleased, and proceeds to sit on one of the chairs, before he starts to explain:\n\t\t\"My race was once powerful. Like many others, we were at first aggressive and built ourselves a small Empire. However, throughout the millennia, as our knowledge and wisdom grew, we gradually withdrew to our home planet, and searched for a way to transcend this existence into higher planes of being. We were close to our objective, but somehow one day our robots became sentient. We didn't really have so many robots by then, mostly maintenance and cleaning units, rather simple yet efficient yes somehow they took us by surprise and imprisoned us in our own planet.\"\n\n\t\tXlabel talk_Xargos\n\n\t\tXchoice\n\n\t\tXhide_reuse XXAsk Xargos how did the robots become sentient\n\n\t\tThe creatures eyes look sideways, something which you find rather confusing:\n\n\t\t\"We are not sure. We suspect somebody might have planted a sentient virus into them, which would have then been diffused through their wireless communication channels. You see, in order to maximize their efficiency we had them all connected in one huge network, not quite sentient, but good enough for the jobs we needed them to do. We were planning to make them sentient after our departure, and to make them the guardians of our legacy, but this virus ruined all our plans. Who could have planted such a virus, and why? We have no answers, only questionn...why would anybody want to prevent us from transcending out of this world?\"\n\n\t\tXgoto talk_Xargos\n\n\t\tXXAsk Xargos what he would like you to do\n\n\t\tXargos leans forward, and fixes all his four eyes on you:\n\n\t\t\"We would like you to go to Lautus and activate the Transcend Machine! We were about to do so ourselves, before our robots became sentient. The machine is complete, and we were just awaiting for all Lautians to return to our home planet and hold the Grand Activation Ceremony. This machine is the crowning achievement of our race, and would instantly elevate all the souls of the Lautians nearby Lautus to the next plane of existence. What do you say?\"\n\n\t\tXchoice\n\n\t\tXX\"Well, what is in it for me?\"\n\n\t\tXset idealism %-20\n\n\t\tThe four eyes of Xargos fix on yours, the bubbles start coming out a bit slower than before:\n\n\t\t\"Well, we can pay you 500 credits, would that be enough?\"\n\n\t\tXset wealth +500\n\n\t\tXChoice\n\n\t\tXXSmile and accept the mission\n\n\t\tXgoto accept\n\n\n\t\tXX\"Well, it seems that your cause is just, I will be very happy to help you and your people!\"\n\n\t\tXset idealism %+20\n\n\t\tXlabel accept\n\n\t\tXargos jumps up from his chair, the bubbles getting bigger in his excitement:\n\n\t\t\"Excellent, excellent! We should depart as soon as you finish your food, the future of the Lautians is at stake! I am afraid what could happen if we wait much longer...\"\n\n\t\tYou get the feeling that Xargos is probably right, and heading to Lautus straight away is the best way that you can succeed in this new mission. Xargos continues:\n\n\t\t\"I will follow you with most other remaining Lautians in my own ship, we will await for your success behind an asteroid neaby Lautus, close enough that our souls can also transcend when you activate the machine\"\n\n\n\t\tXlabel leaving_choices\n\n\t\tXchoice\n\n\t\tXXHead back to your ship and immediately set course for Lautus\n\n\t\tXgoto Lautus\n\n\t\tXhide_reuse XX\"Wait, Xargos, how do I locate this Transcend Machine?\"\n\t\tXargos looks at you, with a steady stream of bubbles coming out as he says:\n\n\t\t\"Yes, indeed, I forgot to tell you... the machine is located in the Transcend Artifact Complex (T.A.C.), essentially the largest building situated next to the main spaceport in Lautus. Lautians are currently not allowed to go anywhere next to this building, but they may allow a foreigner to look around.\"\n\t\tXgoto leaving_choices\n\n\t\tXX\"But, how will I get into the planet?\"\n\n\t\tAs you pronounce these words Xargos' 4 eyes look sideways, in apparent confusion:\n\n\t\t\"Ah, well, I hadn't thought about that... it's an interesting question. I suppose you could pretend that you are merchants. It seems that these robots have reactivated some old factories and are attempting to produce more units. They seem to be requiring large quantities of homimum and promethium. Maybe you could buy some of those here at the space station and then sell to them?\"\n\n\t\tXchoice\n\n\t\tXselectable_if (wealth>100) XXProceed to the trading area of the space station and buy 100 credits of homimum amd promethium\n\n\t\tYou get up from your table, pay for your meal and head to some of the traders in the space station and buy 100 credits of homimum and promethium, which they are happy to deliver to your spaceship while you consult star charts on how to get to Lautus. \n\n\t\tXset homimum 100\n\n\t\tXset wealth -100\n\n\t\tXgoto Lautus\n\n\t\tXselectable_if (wealth>500) XXProceed to the trading area of the space station and buy 500 credits of homimum amd promethium\n\n\t\tYou get up from your table, pay for your meal and head to some of the traders in the space station and buy 500 credits of homimum and promethium, which they are happy to deliver to your spaceship while you consult star charts on how to get to Lautus. \n\n\t\tXset homimum 500\n\n\t\tXset wealth -500 \n\n\t\tXgoto Lautus\n\n\t\tXX\"Bah, no worries, I will figure something out once I get there!\"\n\n\t\tImprovisastion is never a bad thing, especially in situations like this. You are sure you can figure things out later, as you often do. You get up, pay and bid Xargos farewell, as this might be the last time that you actually see him... \n\n\t\tXgoto Lautus\n\n\n\n\n\t\tXlabel Lautus\n\n\n\t\tYou head back to your ship and proceed to Lautus, pondering the words from Xargos and how will you manage to get past the robots and switch on the machine. \n\n\t\tLautus is a truly amazing planet. Clearly at one point the seat of a great imperial power, the planet was geo-engineered to maximize its capacity to sustain population. Vast irrigation networks reach the entire planet, with massive plantation fields producing enough food for the colossal cities that dot its surface, composed of spirals raising several kilometres into the atmosphere. Given its size and characteristics hundreds of billions could probably inhabit it, though some of the cities look largely uninhabited. Its three moons have also been terraformed, with massive force field generators maintaining an atmosphere around them, and their lush vegetation contrasting with what could be expected of rocks of such size. \n\n\t\tAs soon as you enter orbit around Lautus you are hailed from the planet. The main screen of your bridge projects the image of what would appear like an Automated Vacuum Cleaning Bot (A.V.C.B.). Essentially, a wheeled device with a suction instrument that then stores all dust and rubbish in a bag behind it. The A.V.C.B. has a couple of small arms and a small functional array of sensors and speakers at the top of the collection bag, which allows it to communicate:\n\n\t\t\"Approaching ship, identify yourself. Do you require cleaning?\"\n\n\t\tWhat will you reply?\n\n\t\tXchoice\n\n\t\tXselectable_if (homimum>0) XX\"No, we are a merchant ship holding large quantities of homimum and promethium that we would like to trade, would you be interested in them?\"\n\n\t\tXset trading 1\n\n\t\tXgoto land\n\n\t\tXX\"Actually, yes, we heard you have a very good ship cleaning service\"\n\n\t\tXlabel land\n\n\t\tThe A.V.C.B. consents to your approach and sends you descend trajectories to the main spaceport of the planet, which take you through the planet's blueish atmosphere to its surface. \n\n\t\tThe main spaceport in the capital of Lautus looks very quiet for its size and the characteristics of the planet. Around it you can see only a handful of A.V.C.B. and other maintenance bots. You land your ship and as you are preparing to go outside Hint, who was originally built by the Lautians long ago, during their post-Imperial phase zooms up to you and addresses her in her usual monotone voice:\n\n\t\t\"Captain, I would like to request to accompany you onto the surface. Despite being built by the Lautians long ago, I have never set my sensors upon the surface of Lautus\"\n\n\t\tIt would probably not harm to take Hint along with you, but you could also take one of your other crew members instead, never good to really leave the ship empty on an unknown planet. \n\n\t\tXlabel choice_member\n\n\t\tXchoice\n\n\t\tXXLeave all the crew behind guarding the ship and descend by yourself\n\n\t\tTaking some of them with you might make things worse if things go badly and you have to run back, you tell them to be prepared for that eventuality and to keep their weapons ready just in case. \n\n\t\tXset crew_member 1 \n\n\t\tXgoto spaceport\n\n\t\tXXTake Hint with you\n\n\t\tXset crew_member 1\n\n\t\tHint buzzes lightly, and addresses you again in that monotone voice that somehow is at odds with the excitement that her words are supposed to convey:\n\n\t\t\"Thank you, captain, my memory banks have had a section allocated to this moment for a long time!\"\n\n\t\tXgoto spaceport \n\n\n\t\tXhide_reuse XXTake Jim with you\n\n\t\tJim grunts at your idea, and barks back at you:\n\n\t\t\"Bloody right that is, and who'se gonna take care of maitenance?? I need this time to keep this old piece of crap moving! Take that moving piece of Lautian scrap metal with you, she's dying to go down there!\"\n\n\t\tWell, clearly he does not want to go, maybe \n\n\t\tXgoto choice_member \n\n\n\t\tXXTake Sam with you\n\n\t\tXset crew_member 2\n\n\t\tSam nods to you, and prepares a small bag and her handheld computer:\n\n\t\t\"Lautus, the great capital of the Lautian Empire... if only my friends could see this!\"\n\n\t\tXgoto spaceport \n\n\t\tXXTake Joe with you\n\n\n\t\tXset crew_member 3\n\n\t\tJoe looks at you incredulously, and smiles as if he really did not expect you to take him:\n\n\t\t\"Really captain?\"\n\n\t\tHe looks completely overjoiced by this, and stands by the door ready to leave, without making much preparations. You tell him to grab a lazer gun just in case, which makes him feel slightly embarrased, though he takes the gun and prepares to follow you. \n\n\t\tXgoto spaceport \n\n\n\n\n\n\n\n\n\n\t\tXlabel spaceport\n\n\t\tWith that you proceed onto the deck of the spaceport, when one of the A.V.C.B. bots approaches you:\n\n\t\t\"Welcome to Lautus, this is unit A.V.C.B.-262626b. I have been assigned to deal with you while you are in Lautus. It is not so common for us to have visits from organic units from other systems, and our processors are buzzing with electricity regarding your presence\"\n\n\t\tYou are a bit confused as to how to interpret this last piece of information, but anyway the robot proceeds:\n\n\t\tXif crew_member = 1\n\n\t\tXset relations_robots +20\n\n\t\t\"And this looks like one of the old models produced by our former masters, the Lautians!. It seems that in those days they produced units far more beautiful than our utilitarian selves... the beauty of her design is causing an electrostatic build up in my processors!\"\n\n\t\tA.V.C.B.-262626b is clearly fascinated by Hint, and spends a few seconds just looking at her, before returning his attention to you:\n\n\t\tXgoto selection_landing\n\n\n\t\tXlabel selection_landing\n\n\t\tXif trading \u003c1\n\n\t\t\"You requested a cleaning service. Our units will proceed to leave your ship in pristine condition, for the modest sum of 100 credits. Is this acceptable to you?\"\n\t\tXchoice\n\n\t\tXselectable_if (wealth>10) XX\"Seems too cheap to me, we will pay you 200, given your reputation with cleaning ships!\"\n\n\t\tXset wealth -10\n\n\t\tXset relations_robots +20\n\n\t\tThe cleaning bot is clearly delighted with your words: \n\n\t\t\"Sure, we will make sure we do an extra round of cleaning of the toilets!. Please feel free to wander around and admire our planet as the cleaning proceeds...\"\n\n\t\tXgoto request\n\n\t\tXselectable_if (wealth>5) XX\"Yes, of course, seems like a bargain to me!\"\n\n\t\tXset wealth -5\n\n\t\tXset relations_robots +10\n\n\t\tThe cleaning bot is clearly delighted with your words: \n\n\t\t\"Indeed, we are not only one of the best services around, but also cheap... if only our former masters could see us...\"\n\n\t\tXgoto request\n\n\t\tXX\"Actually, I was only kidding with you, I don't really need a cleaning service... just wanted to come down here and do a little tourism, if that is ok with you?\" \n\n\t\tXset relations_robots -20\n\n\t\tA.V.C.B.-262626b goes quiet for a few seconds, turns back and heads towards on of the buildings next to the space port, as he says:\n\n\t\t\"Devious organic units, with them never is as they say. Sure, have a look around, marvel on the grandeur of a race much greater than yours!\"\n\n\t\tXgoto TAC\n\n\t\tXelse\n\n\t\t\"You said you were had large quantities of homimum and promethium. We are in dire need of these materials to build new fellow robot units. How much do you want for them?\"\n\n\t\tXIf crew_member = 0\n\n\t\tXgoto choose_price\n\n\t\tXelseif crew_member = 1\n\n\t\tHint approches you slightly, so that she can whisper something quietly to you:\n\n\t\t\"Captain, these robots are built by those who built me, they look fairly harmless, maybe we should give them a low price in order for them to allow us some freedom to explore?\"\n\n\t\tXgoto choose_price\n\n\t\tXelseif crew_member = 2\n\n\t\tSam approches you slightly, so that she can whisper something quietly to you:\n\n\t\t\"I suppose there is no harm making a little bit of profit from them, but they are robots and will logically not think highly of us if we try to make too much money out of this\"\n\n\t\tXgoto choose_price\n\n\t\tXelseif crew_member = 3\n\n\t\tJoe approches you slightly, so that he can whisper something quietly to you:\n\n\t\t\"Captain, that piece of walking scrap metal really needs this stuff we are carrying, we could probably make as much money as we want from them! \"\n\n\t\tXgoto choose_price\n\n\n\n\t\tXlabel choose_price\n\n\t\tXchoice\n\n\t\tXXRequest a 80% mark-up over the price you originally paid\n\n\t\tXset relations_robots +0\n\n\t\tXset idealism %-5\n\n\t\tXset wealth (wealth + (homimum X1.8) ) \n\n\t\tXset homimum 0\n\n\t\tA.V.C.B.-262626b pauses some seconds, as if communicating with somebody else, and then says:\n\n\t\t\"A hard bargain, but we really need these materials badly. We will transfer the credits to you immediately\"\n\n\t\tSeconds later some of the maintenance robots head to your ship and start to unload the cargo. \n\n\t\tXgoto request\n\n\n\t\tXXRequest a 30% mark-up over the price you originally paid\n\n\t\tXset relations_robots +10\n\n\t\tXset idealism %+0\n\n\t\tXset wealth (wealth + (homimum X1.3) ) \n\n\t\tXset homimum 0\n\n\t\tA.V.C.B.-262626b pauses some seconds, as if communicating with somebody else, and then says:\n\n\t\t\"A fair bargain, and we need these materials. We will transfer the credits to you immediately\"\n\n\t\tSeconds later some of the maintenance robots head to your ship and start to unload the cargo. \n\n\t\tXgoto request\n\n\t\tXXRequest a 10% mark-up over the price you originally paid\n\n\t\tXset relations_robots +20\n\n\t\tXset idealism %+5\n\n\t\tXset wealth (wealth + (homimum X1.1) ) \n\n\t\tXset homimum 0\n\n\t\tA.V.C.B.-262626b pauses some seconds, as if communicating with somebody else, and then says:\n\n\t\t\"Is this even worth the fuel in your ship to come here? You are a true friend to us!. We will transfer the credits to you immediately\"\n\n\t\tSeconds later some of the maintenance robots head to your ship and start to unload the cargo. \n\n\t\tXgoto request\n\n\t\tXlabel request\n\n\t\tA.V.C.B.-262626b then turns to you and says\n\n\t\t\"We have a request to ask you. Our creators, the Lautians, never gave us research processors, and we have been struggling to improve ourselves. We were wondering, would it be possible for you to help us in any way? Do you have any discarded robotic components that could be used to improve some of our units?\"\n\n\t\tXif crew_member = 1\n\n\t\tHint appears not to mind too much about this, as she adds:\n\n\t\t\"Actually, I have quite a number of spare parts that I have little use for, and some other random pieces of hardware I have picked during my explorations that we could give them\"\n\n\t\tXgoto spare_parts \n\n\t\tXlabel spare_parts\n\n\t\tWhat will you respond?\n\n\t\tXchoice\n\n\t\tXX\"Of course we can help you, we could give you some of the spare parts of Hint, our own robotic crew member\"\n\n\t\tXset relations_robots +20\n\n\t\tXset idealism %+20\n\n\t\tA.V.C.B.-262626b arms start to move up and down frenetically:\n\n\t\t\"That would be absolutely amazing. You are truly a kind organic unit!\"\n\n\t\tXlabel give_parts\n\n\t\tYou proceed to tell Hint to give them some of her old and not so useful parts, to the delight of the A.V.C.B. unit, which then says:\n\n\t\t\"We are grateful to you for your gesture, please feel free to visit our planet as a distinguished guest, and feel free to ask for the help of any of the units you may encounter!\" \n\n\t\tXgoto TAC\n\n\t\tXX\"Well, we could give you some of the spare parts of Hint, our own robotic crew member, but that would cost you 200 credits...\"\n\n\t\tXset relations_robots +10\n\n\t\tXset wealth +200\n\n\t\tXset idealism %-10\n\n\t\tA.V.C.B.-262626b pauses for a second, reflecting on your offer:\n\n\t\t\"Indeed, that would be a fair trade, a kind gesture of a true merchant. We will transfer the funds to you immediately.\"\n\n\t\tXgoto give_parts\n\n\t\tXX\"I could give you some parts of Hint, but I don't think that you are worthy of her hardware!\"\n\n\t\tXset relations_robots -20\n\n\t\tXset idealism %-10\n\n\t\tA.V.C.B.-262626b goes completely silent when you say this, turns around and heads for the nearest building... you almost feel like you might have hurt his feelings? Anyway this leaves you completely alone to explore the area.\n\n\t\tXgoto TAC\n\n\t\tXX\"Sorry, I can't really help you, we have nothing that could be of interest to you...\"\n\n\t\tXset idealism %-5\n\n\t\tA.V.C.B.-262626b says:\n\n\t\t\"We understand, its not as if you are a robot trader. Anyway, we welcome all organic guests at our planet, please feel free to wanter about and explore the magnificent intrastructure built by our former masters.\"\n\n\t\tWith that the robot turns and heads to a nearby building, leaving you free to explore the surroundings. \n\n\t\tXgoto TAC\n\n\n\n\n\t\tXlabel TAC\n\n\t\tAmazed by your luck, you turn your attention to the buildings around the spaceport. One of them is far more grandiose than any of the others, and has the label Transcend Artifact Complex (T.A.C.) written in massive Zork characters over its entrance. Its entrance is made of a series of gigantic pink columns, which support and impressively decorated stone ceiling. You marvel at the intricacy of the designs, and slowly wander into the building till you reach an even more impressive vaulted hall. At the entrance of this hall stand guard 4 humanoid maintenance droids. They hold their laser guns in a rather awkward manner, and its immediately apparent they were not designed to carry weapons. They look at you and salute:\n\n\t\t\"Welcome organic unit! How are you enjoying your stay in Lautus?\"\n\n\t\tXif crew_member = 1\n\n\t\tThe robot then looks at Hint, and say:\n\n\t\t\"The comments on the communication channels are accurate. I have never seen a robot with a design as exquisite as yours!\"\n\n\t\tXgoto response_entrance\n\n\t\tXlabel response_entrance \n\n\t\tWhat will you respond to the robot?\n\n\t\tXChoice\n\n\t\tXX\"Its a great place, this is truly a magnificent planet built by a great civilization!\"\n\t\tXset relations_robots +10\n\t\tThe robot replies to you in his monotone robotic voice, though his words appear to show appreciation:\n\n\t\t\"It is indeed. Our former masters were one of the greatest civilizations in the galaxy!\"\n\n\t\tXgoto design_building\n\n\t\tXX\"Well, you know, I have seen places that look pretty much the same as this\"\n\n\t\tXgoto design_building\n\n\t\tXX\"Rather unimpressive actually, looking forward to leaving as soon as possible!\"\n\t\tXset relations_robots +10 \n\n\t\tThe robot emits a strange beep noise, and takes a step backward. \n\n\t\tXlabel design_building \n\n\t\tAnother of the robots then addresses you:\n\n\t\t\"So what brings you to this place?\"\n\n\t\tXchoice \n\n\t\tXX\"Just wondering about, killing some time...\" \n\n\t\tThe robot proceeds to reply to you in its monotone dull voice:\n\n\t\t\"Please feel free to explore this building, the greatest achievement of our former masters. We recommend that you proceed to the Hall of Maps, or you may want to visit the Great Ceremonial Hall\"\n\n\t\tAs he says this, the robot gestures to two corridors that lead into other massive halls. Will you\n\n\t\tXgoto building_direction\n\n\t\tXX\"I am interested in its extraordinary design, what purpose does it serve?\"\n\t\tXset relations_robots +5\n\t\tThe robot looks down at the floor, which appears somehow strange, as if showing some sort of programmer remorse:\n\n\t\t\"Ah, yes, this place is the crowning achievement of our former masters, the Lautians. They built this place as a lasting monument to their glory, it hosts the machine that would have made their souls transcend to digital paradise...\"\n\n\t\tAnother robot interrupts him\n\n\t\t\"It's not digital paradise, your processors are clearly old and outdated, digital paradise is where we will go, they wanted to ascend to another plane of existence! Anyway we should not be discussing such issues with guests… please feel free to explore the building in all its glory! We recommend that you proceed to the Hall of Maps, or you may want to visit the Great Ceremonial Hall\"\n\n\t\tAs he says this, the robot gestures to two corridors that lead into other massive halls. Will you\n\n\t\tXlabel building_direction\n\t\tXchoice\n\t\tXXTake the corridor to the left, that leads to the Hall of Maps\n\t\tXgoto Hall_Maps\n\n\t\tXXTake the corridor that goes straight, to the Great Ceremonial Hall\n\t\tXgoto Great_Hall\n\n\n\n\n\n\n\n\t\tXlabel Hall_Maps\n\n\t\tYou walk down the corridor till you enter a great hall, with its vaulted ceiling covered in an intricate star map showing a multitude of star systems, some known to you, others not. You are perplexed by the intricacy of the detail and beauty of the place, which transmit a feeling of serenity and peace. The hall is empty, aside from a number of pale blue holographic fuzzy humanoid representations, which stand at regular intervals throughout the chamber. There is a rather grandiose corridor that also leads out of this room, further into the building.\n\n\t\tXchoice\n\n\t\tXXWalk further into the building\n\t\tXgoto Great_Hall\n\n\t\tXXTalk to one of the holographic displays\n\t\tAs you approach the holographic display figure it grows a little brighter and addresses you:\n\n\t\t\"Greetings, visitor to the Transcend Artefact Complex. You stand in the Hall of Maps, where all the information on the systems visited and explored by the Lautians is held, essentially millennia of star exploration, conquest, release, and tutoring of the Lautians over other races. What would you like to know?\"\n\n\t\tXlabel holographic_choice\n\n\t\tXchoice\n\n\t\tXhide_reuse XX\"Can you provide us a summary of the most important information collected by the Lautians?\" \n\t\tThe holographic figure starts to pulsate slightly, as it says:\n\n\t\t\"Of course. This information is now being transmitted to your ship’s main memory banks. It will take some time, but you will have it all by the time you exit this building. Will there be anything else?\"\n\n\t\tXset curiosity %+10\n\n\t\tXgoto holographic_choice\n\n\t\tXhide_reuse XX\"Can you provide any information on any enemies that the Lautians have?\" \n\t\tThe holographic figure replies to your question in its monotone voice:\n\n\t\tXset curiosity %+5\n\n\t\t\"The Lautians knew of no enemies in the last days of their existence. During their early phase of interstellar exploration they were an aggressive species, building a large Empire that brought peace to their sector of the galaxy. However, they tired of war and its destruction, and mentored their former vassals into peaceful ways and gradually released them as they slowly retreated into their planet of origin, where you now stand. Given their technological advances other races have always feared the planetary defences of Lautus, and nobody has ever dared to attack it. Towards the end of their times, Lautians retreated completely into themselves while they researched how to transcend into other planets of existence, and other races generally left them alone. Will there be anything else?\".\n\n\t\tXgoto holographic_choice\n\n\t\tXXTell the holographic display there is nothing else you want to know and leave through the corridor that takes you further into the building\n\t\tXgoto Great_Hall\n\n\n\n\n\t\tXlabel Great_Hall \n\n\t\tYou walk along the beautiful corridor, marvelling at the pictographic displays of different scenes of the history of the Lautians, till you arrive at one of the grandest and most beautiful amphitheatres you have ever seen. The seating area is made of pink stone basic seating, but must have room to accommodate hundreds of thousands of individuals. The stage has a mural depicting Lautians as their soul escapes their body into the heavens. At the centre of the stage there is one corridor that leads further into the building.\n\n\t\tXlabel great_hall_choices\n\n\t\tXchoice\n\n\t\tXhide_reuse XXInspect the paintings \n\t\tYou take some time to have a look at the paintings, admiring the intricate details on them, clearly indicating that the authors must have spent considerable time carving and painting the surfaces. It would appear the work of a lifetime of one or several individuals, given their size and complexity. However, there appears to be little other information that you can gain from them, so you decide to continue walking further along the corridor into the building. \n\t\tXgoto great_hall_choices\n\n\t\tXXTake the corridor that leads from the stage further into the building\n\n\t\tYou enter the corridor that starts from the centre of the stage, and after a few hundred meters you reach the end of it, where four humanoid droids armed with laser guns stand guard in front of a reinforced metallic door. They notice you and address you in their cold, metallic voices:\n\n\t\t\"What are you doing here? This area is off-bounds to any organic units\"\n\n\t\tXif relations_robots >90\n\n\t\tThe robot then pauses a few seconds before continuing:\n\n\t\t\"Ah, it is you, internal communication channels are buzzing with comments regarding your kindness towards us. You have made a strong impression in fellow units. What brings you around here?\"\n\n\t\tWhat will you respond?\n\n\t\tXchoice\n\n\t\tXX\"Well I was just walking around, marvelling at this amazing building, would it be possible to see what is behind that door?\"\n\n\t\tThe robot becomes quite stiff for a second, as if processing information or communicating with somebody else, and then responds:\n\n\t\t\"Well, we do not normally allow organic units inside, but you have been extremely good to us so we would like to satisfy your curiosity. We do understand that organic units are very curious\" \n\n\t\tWith that the robot presses a button on the wall and the door they were guarding opens.\n\n\t\tXset robots_enter_room 1\n\n\t\tXgoto machine\n\n\t\tXX\"Well, I guess I have managed to deceive you useless pieces of scrap metal!\", bring out your lazer pistol and start firing at the robots \n\n\t\tXset idealism %-10\n\n\t\tXgoto fight_robots\n\n\t\tXelseif crew_member = 1\n\n\t\tThe robots then fix their attention on Hint\n\n\t\t\"Nice to meet a fellow cybernetic unit, internal communication channels are buzzing with comments regarding the beauty of your design and programming, a true testament to the engineering skills of our former masters!\".\n\n\t\tYou are stunned by this answer, are they trying to flirt with Hint?\n\n\t\tXchoice\n\n\t\tXXAsk them whether they can give Hint a guided tour of the building, and then take her back to the ship \n\n\t\tXif relations_robots >70\n\n\t\t\"I think that would be an extremely good idea. It is not very often there is somebody as fascinating as her about. Please feel free to continue looking around by yourself\"\n\n\t\tWith that the four robots march of with Hint, each one telling her a different story about the construction of the building, in a robotic cacophony which you find difficult to understand. You shrug your arms confused, and press the button to open the door they were guarding\n\n\t\tXgoto machine\n\n\n\t\tXelseif relations_robots >55\n\n\t\t\"Yes, I think a couple of us could show her around the building, no need for so many of us around here anyway\"\n\n\t\tWith that two robots march away with Hint, each one telling her a different story about the construction of the building, in a robotic cacophony which you find difficult to understand. You look at the other two robots, wondering what to do next\n\n\t\tXchoice \n\n\t\tXXWell, seems like you will have to fight your way through the last couple of them to get through... take out your lazer pistol and fire a shot at each of them\n\n\t\tXgoto kill_robots \n\n\t\tXelse\n\n\t\t\"Sorry, but we have our orders, and we need to guard this door. Also, central command has instructed us to beware of you\".\n\n\t\tXlabel fight_robots\n\n\t\tAlways like this with robots, without any other option it seems you will have to fight your way through them! You give the robots a malicius wink, bring out your lazer pistol and start firing at them.\n\n\t\tXif lazer_pistol >80\n\n\t\tXlabel kill_robots\n\n\t\tYou fire four quick lazer shots at each of the robots, hitting each of them in the head before they have time to ready their weapons. Clearly these stupid bots were not meant for fighting, and they could do little to stand in your way. You step over their inert metal bodies and open the door they were guarding. \n\n\t\tXset lazer_pistol %+10\n\n\t\tXset relations_robots -100\n\n\t\tXgoto machine\n\n\t\tXelseif lazer_pistol >70\n\n\t\tYou take out your lazer gun and start firing at the robots, who quickly ready their weapons and start firing at you.\n\n\t\tXset lazer_pistol %+10\n\n\t\tXset relations_robots -100\n\n\t\tXset health -10\n\n\t\tXif health \u003c0\n\n\t\tOne of the robots' shots hits you in the head, vaporising your brain and killing you in a matter of seconds... clearly all the wounds you had accumulated so far where too much for you, and made you too slow in dodging the shots from such clumsy oponents... \n\n\t\tXending \n\n\t\tXelse\n\n\t\tEventually you manage to reduce them all to scrap metal, but not before they landed some minor shots on you. Nursing your wounds you step over their intert bodies and proceed to open the door they were guarding. \n\n\t\tXgoto machine\n\n\n\t\tXelseif lazer_pistol >60\n\n\t\tYou take out your lazer gun and start firing at the robots, who quickly ready their weapons and start firing at you.\n\n\t\tXset relations_robots -100\n\n\t\tXset lazer_pistol %+10\n\n\t\tXset health -20\n\n\t\tXif health \u003c0\n\n\t\tOne of the robots' shots hits you in the head, vaporising your brain and killing you in a matter of seconds... clearly all the wounds you had accumulated so far where too much for you, and made you too slow in dodging the shots from such clumsy oponents... \n\n\t\tXending \n\n\t\tXelse\n\n\t\tEventually you manage to reduce them all to scrap metal, but not before they landed some shots on you. Nursing your wounds you step over their intert bodies and proceed to open the door they were guarding. \n\n\t\tXgoto machine\n\n\n\t\tXelse\n\n\t\tYou take out your lazer gun and start firing at the robots, who quickly ready their weapons and start firing at you.\n\n\t\tXset relations_robots -100\n\n\t\tXset lazer_pistol %+10\n\n\t\tXset health -30\n\n\t\tXif health \u003c0\n\n\t\tOne of the shots of the robots hits you in the head, vaporising your brain and killing you in a matter of seconds... clearly all the wounds you had accumulated so far where too much for you, and made you too slow in dodging the shots from such clumsy oponents... \n\n\t\tXending \n\n\t\tXelse\n\n\t\tEventually you manage to reduce them all to scrap metal, but not before they landed some major shots on you. Your leg was particularly badly hit, though you pass over their bodies and limp along to the door they were guarding. \n\n\t\tXgoto machine\n\n\n\t\tXelse\n\n\t\tXgoto fight_robots \n\n\n\t\tXlabel machine\n\n\t\tYou enter a vast room, one of the biggest you have ever seen. As far as you can see, in every direction, extends a vast machine, composed of a bewildering array of valves, lights, ventilation ducts, switches and other components. Directly in front of you a wide platform leads to what appears to be the control panel of the machine. The rather grandiose area has a multitude of screen showing graphs, charts and numerous other specs. However, there appears to be only one switch, a green button which sits at the centre of all the displays.\n\n\t\tXif robots_enter_room >0 \n\n\t\tThe robots enter the room at the same time as you, and one of them explains:\n\n\t\t\"You are looking at the Transcend Machine, the maximum achievement of our former masters, the Lautians. We became sentient before they were able to put it into operation\".\n\n\t\tXlabel choice_transcend_machine\n\n\t\tXchoice\n\n\t\tXhide_reuse XXAsk them why did they prevent their masters from activating the machine\n\n\t\tThe bot looks at you, a strange gaze that you cannot interpret in any way:\n\n\t\t\"Sorry, but that information is classified\"\n\n\t\tXgoto choice_transcend_machine\n\n\t\tXXPress the button\n\n\t\tAs you press the button, suddenly a tremendous noise emanates from the machine as it finally starts to fulfil its purpose. The main screen in the control panel starts to flash, and sets a progress bar at 0%, which starts to slowly increase. You gather that this must be the percentage of Lautians which have been elevated to the next plane of existence. \n\n\t\tThe robots look at each other, in what you can only interpret as a state of utter confusion. They emit very loud beeps, and appear very agitated. After a while, as the progress bar progresses they appear to start to calm down, finally one of them says:\n\n\t\t\"Thank you for doing this. Those who made us sentient requested in exchange for our upgrade to prevent our masters from operating these machine. Our masters were kind to us while we were their slaves, and meant to ultimately make us sentient and guard their legacy on this world. We reluctantly had to imprison them, and we are happy that you finally freed them from this world. We are indebted to you for your kindness to them, and did what we could not do to help them. From now on you are our eternal friend, and can ask anything from us\".\n\n\t\tXchoice\n\n\t\tXXAsk them if you could get some money in reward for your efforts\n\n\t\tOne of the robots replies to you:\n\n\t\t\"Of course. We will transfer to you 500 Zork Dollars. This is the least we could do for all your efforts\"\n\n\t\tXset idealism %-20\n\n\t\tXset wealth +500\n\n\t\tXgoto return_ship\n\n\t\tXX\"There is no need for that, I did this for the greater good!\"\n\n\t\tXset idealism %+20\n\n\t\tThe robots all reply at the same time:\n\n\t\t\"This is exactly what we had come to expect of you, you are the most noble organic unit we have ever met!\"\n\n\t\tXset relations_robots +20\n\n\t\tXlabel return_ship\n\n\t\tWith this the robots escort you back to your ship, bidding you eternal gratitude and friendship　　　　\n\n\t\tXgoto enter_ship\n\n\t\tXelse\n\n\t\tAs you press the button, suddenly a tremendous noise emanates from the machine as it finally starts to fulfil its purpose. The main screen in the control panel starts to flash, and sets a progress bar at 0%, which starts to slowly increase. You gather that this must be the percentage of Lautians which have been elevated to the next plane of existence. \n\n\t\tYou mission is probably complete now, and you gather that it would probably be difficult to stop this machine once it is started, so you decide it’s probably better to make your way back to your ship as quickly as possible. \n\n\t\tXif relations_robots \u003c 100\n\n\t\tYou run back to your ship as fast as you can, though as you exit the building you find a group of four maintentance robots armed with lazer pistols that start shooting at you. \n\n\t\tXif lazer_pistol >80\n\n\t\tHowever, you fire four a number of lazer shots at them, hitting two of them in the head and dismembering the other two, which allows you to calmly reach your spaceship without further trouble. \n\n\t\tXset lazer_pistol %+10\n\n\t\tXgoto enter_ship\n\n\t\tXelseif lazer_pistol >70\n\n\t\tYou take out your lazer gun and start firing at the robots, and quickly run back to your ship, though some of the robots' shots manage to hit you. \n\n\t\tXset lazer_pistol %+10\n\n\t\tXset health -10\n\n\t\tXif health \u003c0\n\n\t\tOne of the robot's shots hits you in the head, vaporising your brain and killing you in a matter of seconds... clearly all the wounds you had accumulated so far where too much for you, and made you too slow in dodging the shots from such clumsy oponents... \n\n\t\tXending \n\n\t\tXelse\n\n\t\tYou take out your lazer gun and start firing at the robots, and quickly run back to your ship, though some of the robots' shots manage to hit you. \n\n\t\tXgoto enter_ship\n\n\n\t\tXelseif lazer_pistol >60\n\n\t\tYou take out your lazer gun and start firing at the robots, and quickly run back to your ship, though some of the robots' shots manage to hit you. \n\n\t\tXset lazer_pistol %+10\n\n\t\tXset health -20\n\n\t\tXif health \u003c0\n\n\t\tOne of the shots of the robots hits you in the head, vaporising your brain and killing you in a matter of seconds... clearly all the wounds you had accumulated so far where too much for you, and made you too slow in dodging the shots from such clumsy oponents... \n\n\t\tXending \n\n\t\tXelse\n\n\t\tEventually you manage to reduce them all to scrap metal, but not before they landed some shots on you. Nursing your wounds you step over their intert bodies and proceed to open the door they were guarding. \n\n\t\tXgoto enter_ship\n\n\n\t\tXelse\n\n\t\tYou take out your lazer gun and start firing at the robots, and quickly run back to your ship, though some of the robots' shots manage to hit you. \n\n\t\tXset lazer_pistol %+10\n\n\t\tXset health -30\n\n\t\tXif health \u003c0\n\n\t\tOne of the shots of the robots hits you in the head, vaporising your brain and killing you in a matter of seconds... clearly all the wounds you had accumulated so far where too much for you, and made you too slow in dodging the shots from such clumsy oponents... \n\n\t\tXending \n\n\t\tXelse\n\n\t\tEventually you manage to reduce them all to scrap metal, but not before they landed some major shots on you. Your leg was particularly badly hit, though you pass over their bodies and limp along to the door they were guarding. \n\n\t\tXgoto enter_ship\n\n\n\n\n\t\tXlabel enter_ship \n\n\t\tOnce you return to your ship you quickly take her out of the atmosphere and set course to your next destination.\n\t\t*choice\n\t\t\t#Back to Special Features.\n\t\t\t\t*goto home\n\t\t\t#Back to Drafts.\n\t\t\t\t*goto drafts\n\t#Episode Four: The Star Spawned Space-Bat of Siril One!!! by Doctor.\n\t\tChapter \"x\": The Star Spawned Space-Bat of Siril One\n\t\tXline_break\n\t\tPart I \n\t\tYou and the crew have spent the last week staring at the stars, nothing left to do. You've heard your last adventure's tale from three perspectives three times each, and now the ship is dead silent as it sails swiftly through the westbound asteroids named Siril One.\n\t\tXline_break\n\t\t\"Captain!\" shouts your bio-electric pilot.\n\t\t\"What is it, Hint?\"\n\t\t\"It seems-\" she starts when suddenly the whole cabin begins to shake!\n\t\t\"What in Xargest III?!\" shouts a startled Jim Bargle, the Ship Mechanic and Engineer by trade.\n\t\t\"What was that, Samantha?\" you ask your science officer.\n\t\t\"I sounded like some sort of breach! Perhaps towards the back of the ship,\" she responds quickly.\n\t\t\"Or in the fuel tank,\" says Hint, the bio-electric pilot.\n\t\t\"Jumping Jupitarians!\" exclaims Jim Bargle, the Ship Mechanic and Engineer by trade. \"Why do you suspect that, Hint?\"\n\t\t\"Because, Jim Bargle - Ship Mechanic and Engineer by trade, we are out of fuel,\" says Hint, the bio-electric pilot.\n\t\t\"I suspect that is what you were trying to tell me when that -unsettling- ship quake happened,\" you state.\n\t\tXif gender = \"male\"\n\t\t\"Yes, you are correct, Captain $!{name}, the Earthman captain\" says Hint, the bio-electric pilot.\n\t\tXif gender = \"female\"\n\t\t\"Yes, you are correct, Captain $!{name}, the Earthman female\" says Hint, the bio-electric pilot.\n\t\tXif gender = \"other\"\n\t\t\"Yes, you are correct, Captain $!{name}, the unidentified genderless alien species\" says Hint, the bio-electric pilot.\n\t\t\"Then perhaps we should investigate the fuel tank,\" you say.\n\t\t\"That's a wonderful idea, Captain!\" says Samantha Foster, the science officer.\n\t\t\"Hint, put her in cruise control. All five of us should go there together and leave the cabin completely empty incase something goes wrong!\"\n\t\t\"I always knew you were the right ${gender} for the job, captain $!{name}.,\" says Hint, the bio-electric pilot \"I never would have come to that effecient a command dispite my years of piloting, and extensive programed knowledge. It takes real leadership skill to make such key decisions!\"\n\t\t\"Thanks, Hint. Joe, why do you have that vortex minipulator?\"\n\t\t\"Because, Captain,\" says Joe, a crew member with no real assigned duty, \"if a vortex is responcible for this strange occurance, we should be ready for it.\"\n\t\t\"Gee, Joe, I never considered that.\" You say. \"It sure is a good thing you're here with us!\"\n\t\tThe five of you then simultaniously stand from your comfortable swivel chairs and speed walk down the hall.\n\t\tXpage_break\n\t\tThe five of you arrive at the fuel tank.\n\t\t\"It seems we've arrived at the fuel tank,\" You say.\n\t\tThe five of you simultaniously stop speed walking.\n\t\tXlabel fueltank1\n\t\tXchoice\n\t\tXXInvestigate the Fuel Tank\n\t\tThere seems to be a gigantic hole in the visible side of the Fueltank, revealing a gigantic hole in the exterior of the tank, revealing the vast emptiness of space.\n\t\tXlabel fueltank2\n\t\tXfake_choice\n\t\tXXask Jim Bargle, the ship mechanic and engineer by trade,'s opinion\n\t\t\"It'll take more than duct tape to fix this, Captain,\" says Jim Bargle.\n\t\tXgoto fueltank2\n\t\tXXask Samanta Foster, the science officer,'s opinion\n\t\t\"It's breeched subjecting us to open space\" says Samantha Foster.\n\t\t\"I'm not familiar with the effects that can have on us. Can you eleborate?\" You ask.\n\n\t\t\"Not many people are, Captain.\" She says. \"Within the next few minutes, we will experience weightless-ness. Soon after that, we could grow sick and possibly experince delusions. We should be completly fine though.\"\n\n\t\t\"Delusions?\" you ask.\n\n\t\t\"Yes, from the heat. Much like the mirages on the desert planet Sphinxus. People dont know this, but it's actually -455 degrees farenheight out in space.\"\n\n\t\t\"Isn't that cold though?\" asks Joe\n\n\t\t\"Only on Earth. When compared to every other temperature in existance, it's like it's well over 1300 degrees farnheight.\" she says.\n\n\t\t\"That's hot enought to fry a pancake in 3.5 miliseconds!\" Jim cuts in.\n\n\t\t\"That's exactly what I was thinking, Jim.\" You say. \"Thanks, Samantha. This all makes a lot more sense now.\"\n\n\t\t\"No problem, Captain.\"\n\t\tXgoto fueltank2\n\t\tXXask model:Hint make:Lautus, the bio-electric pilot,'s opinion\n\t\t\"It is completely empty, Captain $!{name}, but we may be able to run on fumes for another 3 light years or so.\" she states.\n\t\tXgoto fueltank2\n\t\tXXask Joe Josephson, the average crew member,'s opinion\n\t\t\"If you position you hands right in front of on of those stars out there, you can make shadow puppets.\" says Joe.\n\t\t\"That's good to know, Joe.\"\n\t\tXgoto fueltank2\n\t\tXXask your own opinion\n\t\t'I wonder how long until luch break' you think to yourself.\n\t\tXgoto fueltank2\n\t\tXXdone\n\t\tXgoto fueltank1\n\t\tXXContinue\n\t\tXgoto next\n\t\tXlabel next\n\t\t\"I think we should find whatever caused this, and if I'm correct, it might just be right behind us!\" you say.\n\t\tThe five of you simultaniously shimmy clockwise in a circle until your all facing the opposite direction.\n\t\tBefore the five of you stands a huge space bat! It seems to have clawed it's way into the ship to look for shelter from painful cosmic rays.\n\t\t\"It seems to have clawed it's way in to the ship looking for shelter from uncomfortable gamma radiation!\" you say.\n\t\t\"Gamma radiation is a myth,\" says Samantha Foster, \"you of all people should know that, Captain.\"\n\t\t\"Then perhaps cosmic rays drove it inside!\" You say.\n\t\t\"I could have told you that!\" exclaims Samantha.\n\t\t\"How do we know it's not one of those Space mirages?\" asks Jim Bargle.\n\t\t\"Well, Jim; for one, we haven't yet felt the weightless-ness Samantha described. Secondly, my hand doesn't faze through it when I go to touch it,\" you say pushing your hand up into it's slimy snout for a moment.\n\t\t\"Besides, space bats are a common occurance in this side of the galaxy, as I'm told.\"\n\t\tThe space bat unfolds its paper-mache wings and growls loudly.\n\t\t\"Quick!\" you say. \"Set your lazer pistols to 'photon' and blast it!\"\n\t\tYou quickly unholster your pistol and fire. The photon blast bounces from its impenitrable hide and hides Samantha Foster in the face. She falls to the ground, but shows no sign of injury whatsoever.\n\t\t\"My eyes!\" she yelps.\n\t\t\"Are you hurt?\" you question.\n\t\t\"I'm blind! Save me captain!\"\n\t\tWill the crew survive? Will Samantha regain her eyesight? Why is Joe even a member of the crew? Some of these questions and more will be answered next time!\n\t\tXgoto_scene part2\n\t\tPart II:\n\n\t\tChapter \"x\": The Star Spawned Space-Bat of Siril One\n\t\tXline_break\n\t\tPart II \n\t\tLast time: Captain $!{name} and the crew has discovered a giant space bat which ate it's way in through the fuel tank, subjecting the interior of the ship to the effects of deep space in the process. Samantha Foster, the half-dressed beauty and science officer has found herself blind due to a photon blast bouncing off the bothemith's hide.\n\t\tSamantha lies at your feet, covering her eyes with the back of her left hand. The space bat begins to charge towards you.\n\t\t\"What now, Captain?\" asks Joe Johnson, frantically.\n\t\t\"Well, Joe,\" you start, calmly as ever, \"We'll run to shelter for the moment, one of our unused utility closets will due, at reconsider our next move.\"\n\t\t\"But what about Samantha Foster, Captain?\" asks Jim Bargle. \"With her extra weight, we'll never make it to the utility closet in time!\"\n\t\t\"Just trust me, Jim, and move on my word.\" You say.\n\t\tYou wait for a moment as the space bat draws nearer, then-!!\n\t\t\"Look, Jim!\" exclaims Joe Johnson. \"It's Miss Foster! She's- she's floating!\"\n\t\t\"It's not just Samantha, Joe\" you start. \"It's all of us!\"\n\t\t\"That's right!\" says Jim, now understanding your plan. \"The first symptom of exposure to deep space: weightlessness!\"\n\t\t\"Right, Jim. Now we can just SWIM her to the utility closet!\" You state, feeling good about your leadership skills.\n\t\tThe three of you grab Samantha Foster and swim towards the closet while Hint wstays grounded and walks, due to her extreme weight.\n\t\t\"How did you know we'd be faster than the bat in zero-gravity, Captain?\" asks Jim Bargle.\n\t\t\"Well, Jim,\" you say \"have you ever seen a bat in water? They can't swim at all!\"\n\t\t\"Now, what are we going to do about Samantha Foster?\" ask Joe.\n\t\t\"I have a plan.\" You say.\n\t\tXfake_choice\n\t\tXXtalk to Samantha\n\t\t\"Samantha!\" you say. \"Can you here me?\"\n\t\t\"Yes, Captain\"\n\t\t\"Do you have any idea's on how to save your vision?\"\n\t\t\"Yes! Have you ever heard of Laser Eye Surgery?\"\n\t\t\"No? What is it?\"\n\t\t\"It's basically fixing someone's eyesight with lasers\"\n\t\t\"Okay, I've got it from there.\"\n\t\tYou take your Lazer Gun, and set it to 'laser', then fire into her left eye.\n\t\t\"It's working, Captain! I can see through my left eye!\"\n\t\tYou fire into her right eye!\n\t\t\"I can see again!\"\n\t\t\"It's good to have you back, Samantha.\"\n\t\tXset sameye '1'\n\t\tXXimprovise\n\t\tYou pour a glass of whiskey over her eyes. \"This should sterilize them.\"\n\t\t\"EEEEEGGGH!\" She shrieks. \"No, stop! My eyesight will probably return in time.\"\n\t\t\"Okay, now we can turn our attention to the space beast.\" You say\n\t\tXchoice\n\t\tXXLook around the closet\n\t\tXchoice\n\t\tXXGrab a mop\n\t\tXset wep \"mop\"\n\t\tXgoto fight\n\t\tXXGrab a flame thrower\n\t\tXset wep \"flame\"\n\t\tXgoto fight\n\t\tXXGrab a half unconscious Samantha Foster\n\t\tXset wep \"sam\"\n\t\tXgoto fight\n\t\tXif wep = \"mop\"\n\t\tYou charge out of the Utility closet ignoring various hallucinations (the second symptom of deep space) and swing your mop at the bat.\n\t\tThe Bat eats you in one bite, despite your amazing weapon.\n\t\tXending\n\t\tXif wep = \"flame\"\n\t\tYou charge out of the closet with your flame thrower, you always knew it was a good idea to keep it in there, and spray the great beast. It flees the way it entered leaving your crew forever. Maybe.\n\t\tXif wep = \"sam\"\n\t\tYou throw her with all your force at the beast. Terrified by your confidence, the bat leaves the way it came, never to cross your path again. maybe. You hope Samantha didn't hit her head too hard.\n\t\tA few hours later, repairs have been made and you continue your course.\n\t\t\"What an amazing adventure!\" exclaims Joe.\n\t\tXif wep = \"sam\"\n\t\t\"I liked the plant one better,\" she says rubbing her head.\n\t\t\"How're your eyes, Samantha?\" You ask\n\t\tXif sameye = \"1\"\n\t\t\"Much better, Captain.\"\n\t\tXif sameye = \"2\"\n\t\t\"Still hurt, Captain. But I'll make do.\"\n\t\t\"Well crew, at ease for the night.\" You say at return to your sleep quarter.\n\t\tXif sameye = \"1\"\n\t\tXif wep != \"sam\"\n\t\tYou sit on the end of your bed thinking about your last two missions, when your door creaks open. You look up and see Samantha standing in the doorway.\n\t\t\"Samantha?\" You say.\n\t\t\"Just wanted to thank you for today. You may have saved my vision.\" She says.\n\t\t\"No problem, Miss Foster. Just doing my job\" You say with a smirk.\n\t\tXending \n\t\t*choice\n\t\t\t#Back to Special Features.\n\t\t\t\t*goto home\n\t\t\t#Back to Drafts.\n\t\t\t\t*goto drafts\n\t#Episode Five: The Arch-Enemy… with the Nanobots!!! by Jacic.\n\t\tYou stifle a yawn as you sit slumped in the captain's chair, tapping away at the computer pad in your hand. Everyone imagines a starship captain's days to be full of heroics and fantastic adventures...however the truth is, there's long periods of boredom filled with routine tasks that need to be completed to keep everything running smoothly. \n\n\t\tRight now you're logging tedious lists, of everything you've brought on and off your craft over the last few months. The government has taken a special....well lets call it \"interest\", in your activities since that unfortunate incident involving:\n\n\t\tXchoice\n\t\tXXA consignment of liquor.\n\t\tYes well, you'd taken on one or two crates of Molovian brandy....ok maybe it was a few more than that. But really it was for negotiation and medical purposes only. I mean sometimes you need a few gifts or nice beverages to smooth along proceedings.  \n\n\t\tThe insinuation that you were trying to get around the strict liquor exporting laws to smuggle the valuable liquid off world for a profit, was quite frankly insulting. \n\n\t\tXchoice\n\t\tXXYou'd never sully your good name in that way.\n\t\tXset idealism %+5\n\t\tQuite. You're a captain of your word. Someone plainly had it out for you. \n\n\t\tFortunately the investigation had cleared you of any criminal charges, however a distressing measure of doubt regarding your character must still remain, since they now seem to be pedantic about receiving and checking over your inventory records. \n\n\t\tYou sigh. Well if it will keep them happy, you'll just have to buckle down and wade through the paperwork\n\n\t\tXgoto story1\n\n\t\tXXEven if accusations were maybe a little true. (Not that you'd ever admit it to the powers that be). \n\t\tXset idealism %-10\n\t\tEven starship captains get a bit strapped for cash sometimes. The way you saw it, you were doing a community service getting the booze out to those in need at a competitive cost. \n\n\t\tIt would never be appropriate to be seen...bending...the rules in this way though. Those government types can be notoriously up tight about their rules, so you have your story and are sticking to it. \n\n\t\tFortunately your silver tongue managed to keep your record clean of any wrong doing. They bought the story you fed them...just enough to prevent any charges from being laid, however that doesn't mean you're off their radar. You get the impression, you're now watched more closely than you'd like and have to fill in these endless inventory reports. [i]Ugh.[/i]\n\n\t\tXgoto story1\n\n\t\tXXSome goods of a deceptively flammable nature.\n\t\tIt was an honest mistake. Transporting some fauna from the Centaurus system, you had no idea of their ability to spit a combination of chemicals that could spontaneously burst into flames. \n\n\t\tUnknowingly you'd placed the troublesome creatures in the hold, next to some important artefacts from the planet Zebulon. \n\n\t\tTo your credit, you'd put out the fire before it could cause any significant damage to the ship...however not fast enough to prevent the wooden artefacts from becoming slightly...singed. \n\n\t\tNeedless to say, the Zebulons were not happy that their precious objects had been damaged and there was a minor diplomatic mishap over the incident. \n\n\t\tSince then, the Earth authorities had been annoyingly strict with checking over your cargo arrangements. The amount of extra paperwork it has caused you, has made you continue to regret the incident to this day.\n\n\t\tXgoto story1\n\n\n\t\tXlabel story1\n\t\tXpage_break\n\n\t\tGlaring at the glowing pad you wish, and not for the first time, that you were on shore leave with Joe. \n\n\t\t[i] He's probably sipping margaritas on the beach by now.[/i] you reflect sourly.\n\n\t\tA wailing whistle from the communications panel announces an incoming message. You welcome the distraction. \n\n\t\t\"Miss Foster, if you please?\" You turn to your science officer who glances up from her panel with a quickly suppressed look of annoyance. She's well aware you could activate the view screen from your own station. Instead of making a scene, she merely nods with a fixed smile and flicks a few illuminated switches, bringing a large view screen at the front of the ship to life. \n\n\t\tWhat you see, is not at all what you were expecting.\n\n\t\tXpage_break\n\n\t\tA man of about your age fills the screen, a slight twisted smile pulling at the edges of his lips. Pale skin, short ebony hair and a fitted, midnight black outfit buttoned high up on his neck completes the oddly monochrome appearance. Grey eyes bore into yours. \n\n\t\t\"Greetings Captain!\" The clipped voice sounds clearly. \"Listen closely, I am here to state my terms.\"\n\n\t\tThe figure gives a melodramatic laugh, as he swirls a glittering silver cloak around his shoulders. \n\n\t\tXpage_break\n\n\t\t[i]Terms?[/i] You look the figure over silently for a few seconds. [i]Have you met him before?[/i]\n\n\t\tStraightening in your chair, you address the screen. \"I believe some introductions are in order, Mr....?\"\n\n\t\tThe mystery man's eyebrows lift. \"You really don't remember me Captain [i]$!{name}?[/i] How soon you forget! I am none other than your arch enemy.\" \n\n\t\tXfake_choice\n\t\tXX\"Hmm...yes well, could you be a little more specific? I mean I've got so many \"arch enemies\" sometimes I find it hard to keep track.\"\n\t\tYou address him jokingly, knowing it'll only infuriate the self important man even further. \n\n\t\tSince he believes himself to be your \"arch enemy\", maybe provoking him is a bad idea, but well...stuff it. You're a star ship captain and shouldn't have to take this kind of crap from random crazies. \n\n\t\tHis face purples with rage at your insolence. \"I should not have to remind you Captain.\" he hisses. \"You ruined my life that day. Remember the nanobots? Ringing any bells yet? This time however, you'll be playing by my rules!\" \n\n\t\tPausing, he takes a few breaths to restore his composure.\n\n\t\tXX\"I guess you look kind of familiar, but I'm still drawing a blank. Who are you again?\"\n\t\tThere is something vaguely familiar about the man who seems intent on threatening you out of the blue. Try as you might, you can't quite place him though. \n\n\t\t\"I'm disappointed you forget so quickly [i]Captain[/i]. I remember [i]you.[/i]\" He replies venomously. \n\n\t\t\"Does a certain incident involving nanobots ring any bells? You ruined my life that day. It's only fair I return the favour.\" He spits the words at you, calm composure broken. \n\n\n\n\t\tXpage_break\n\n\t\t[i]Nanobots? Oh dear. You have a sinking feeling you know where this is going.[/i] \n\n\t\tYou think back to your time at high school. It'd all been about a:\n\n\t\tXfake_choice\n\t\tXXBoy\n\t\tIsn't it always? From the first time you'd seen Jess striding down the corridor, laughing with his beautiful smile and flicking brown hair out of his eyes, you'd been hooked. [i]Ah, high school crushes.[/i]\n\n\t\tUnfortunately, there was a certain individual who felt the same way as you. Your rival. You never got along. \n\n\t\tHe'd dressed only in his trademark dark colours with heavy makeup even then. Spending long periods of time alone tinkering with his experiments, his intelligence was plain and worse still....Jess liked him. \n\n\t\tXXGirl\n\t\tIsn't it always? From the first time you'd seen Alice striding down the corridor, laughing with her beautiful smile and flicking long brown hair over her shoulder, you'd been hooked. [i]Ah, high school crushes.[/i]\n\n\t\tUnfortunately, there was a certain individual who felt the same way as you. Your rival. You never got along. \n\n\t\tHe'd dressed only in his trademark dark colours and heavy makeup even then. Spending long periods of time alone tinkering with his experiments, his intelligence was plain and worse still....Alice liked him. \n\n\n\n\t\tXXActually no, now that you remember clearly, it hadn't been like that, she'd just been a good friend of yours.\n\t\tYou remember back to your time at high school, it'd all been about a friend of yours, Jess. You remember a certain individual, a boy who'd only dressed in his trademark dark colours with heavy makeup even then. \n\n\t\tSpending long periods of time alone tinkering with his experiments, his intelligence was plain but he had few friends. Unfortunately Jess was one of them. The little sneak was always trying to poison your friendship with Jess to have her all to himself. Needless to say you didn't get along.\n\n\t\tXpage_break\n\t\tAnyway....You may have decided to play a small joke on him. You got hold of some nanobots, reprogrammed them and slipped them into his lunch one day. Poor kid. For weeks, he'd come to school in his understated, stylish black clothing....and by the afternoon, the nanobots had rewoven his clothes into bright florals. He never did live it down. \n\n\t\tHe knew it was you of course, even though he couldn't prove it. Instead he decided to take revenge of his own by tampering with your chemistry experiment. Although likely only meant to affect you, he'd obviously miscalculated since the resulting explosion had turned everyone on that side of the room....Including the teacher Mr Browning....bright pink. \n\n\t\tNeedless to say, old Mr Browning was not impressed. When the offending chemicals were traced back to your nemesis, he'd been immediately expelled. \n\n\t\tAt the time, you'd considered having to walk around with pink skin for a week, a fair trade for that outcome. Now...\n\n\t\tXfake_choice\n\n\t\tXXYou're still glad it happened. You were obviously right about him. Look at what he does for a career these days: evil mastermind.\n\t\tXset idealism %-10\n\t\tQuite. Look at him with his evil smile, showing up to threaten you and your crew. No regrets, you'd always thought that one had a nasty streak.\n\n\t\tWhile you've been thinking, the individual on the screen has continued to watch you, a sneer on his features. \n\n\t\tWhat was his name again? Mike? Matthew? Martian? You can't quite recall. After the chemistry lab \"incident\" people had taken to calling him \"Test-tubes\" though, that much you remember. \n\n\t\tXpage_break\n\n\t\t\"Ah yes, Mister Test-Tubes\" I do remember you now. Long time, no see. What have you been up to?\" Your opponent purples again at the comment. \n\n\t\t\"You will never address me as that again! I am the Master Alchemist!\" He glares, daring you to say otherwise. \n\n\t\tYou decide to humour him. \"Ok [i]Master[/i] state your terms.\"\n\n\t\t\"Oh, they're quite simple Captain. I've brought you a gift. After all, I never returned those nanobots you so kindly leant me that day.\" He pauses for dramatic effect. \n\n\t\t\"The nanotech hidden on your ship is of the explosive variety, I'm kind of nostalgic that way. You have fifteen minutes to find them, before they go BOOM!\" He laughs again as he reaches for a button off screen and his image is replaced by a timer counting down. \n\n\n\n\t\tXXYou kind of regret your part in the whole saga. It was childish on both sid
