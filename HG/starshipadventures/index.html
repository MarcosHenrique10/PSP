es and a long time in the past. Maybe you can talk him around with an apology.\n\t\tXset idealism %+10\n\t\tWhile you've been thinking, the individual on the screen has continued to watch you, a sneer on his features. \n\n\t\tWhat was his name again? Mike? Matthew? Martian? Mark maybe? You can't quite recall. \"Ah look....um....Mark?\" \n\n\t\t\"My name is no longer Mark!\" He snaps. \"You will refer to me as the Master Alchemist!\"\n\n\t\t\"Ok...Well look, I am sorry about all that unpleasantness at high school. We were both young and stupid. Can't we put that all behind us? How about you come over and we'll have a nice glass of brandy.\"\n\n\t\tXpage_break\n\n\t\t\"You're [i]sorry[/i]. That's it? Sorry and it's all ok?\" A smile creeps over his features. \"Well I'm glad you're feeling nostalgic Captain, because I have a gift for you. Some nanotech. I though you might like it since I never returned the ones you leant me that day. I'm afraid they're kind of volatile though, we have to keep these things exciting. You have fifteen minutes before they explode. Have fun Captain!\"\n\n\t\tWith a final insane laugh, he taps a button off screen and his image is replaced by a timer counting down. \n\t\t  \n\n\t\t[b]\"15:00....14:59....14:58....14:57....\"[/b]\n\n\t\t\"Captain!\" Miss Foster's voice is shrill. \"I'm picking up interference on the internal sensors, I think he's actually going to blow the ship up!\"\n\n\t\tXpage_break\n\n\t\t[i]Darn.[/i] You'd hoped he'd been bluffing. \"Miss Foster can you locate the source?\"\n\n\t\t\"I'm afraid not Captain. The interference is creating havoc with the sensors. I know something is here, but there's no way to localise it.\" Her voice is steadily increasing in pitch.\n\t\t \n\t\tYou think rapidly. [i]Where could he have hidden the explosives?[/i] It'd be no good looking for them. Nanobots are microscopically small, you'll have to be smart about this.\n\n\t\tXpage_break\n\n\t\tHe probably slipped them on the ship at your last port of call where you picked up the current lot of cargo. Knowing Mark, he'd probably want to do as much damage as possible. Where would he hide an explosive?\n\n\t\t[i]Of course![/i] You open a comm channel to the engineering section. \"Bargle, that new isopalavial drive unit you installed on Cetus 5? I want it off my ship [i]NOW![/i]\"\n\n\t\tOblivious to the conversation that had been going on in the main deck area, Bargle is understandably confused. \"But Captain, if I remove that, we'll be stuck at impulse power. It could take us weeks to get anywhere!\"\n\n\t\tWith the timer counting down, you're not in the mood for arguments. \"Bargle, if you don't want your particles spread all over deep space, just do it now!\"\n\n\t\tXpage_break\n\n\t\tOver the open comm channel, you can hear metallic clangs as your engineer gets to work. You wince as something crashes to the floor loudly, followed by a stream of obscenities. Samantha stares fixedly ahead but notice a blush creeping up her neck. You'll have to talk to Bargle about using that kind of language around someone with the sensibilities of Miss Foster....If you can survive long enough. \n\n\t\t\"Captain...The interference....it's just gotten stronger!\" Samantha has a panicked expression on her face as she surveys the readouts scrolling down her screens.\n\n\t\tA red light flashes on your console, indicating the airlock has been activated. Via the view screen, you see the bunch of circuits and wires drifting away into the darkness. You sigh with relief. Now to make sure.\n\n\t\tYou tap a few keys and flip open a plastic covering, pressing the large red button. Twin lights streak away from the ship to blow the offending item into non-existence. \n\n\t\tXpage_break\n\n\t\tYou sigh, sinking into your padded chair. [i]Close one, but that's why you're the captain, you can handle these things.[/i]\n\n\t\t\"Miss Foster, can you open a channel to that Master Chemistry guy, let's gloat a little shall we?\" \n\n\t\t\"Umm....Captain? I don't think we got it.\" Miss Foster looks close to tears. \n\n\t\t\"There's another one?!\" Just how many explosives has that nutter put on your ship anyway?\n\n\t\t\"Ah...No the readings haven't changed Captain, Maybe it wasn't the drive unit?\" her voice quavers, eyes wide.\n\n\t\tThe timer continue to tick down. \n\n\t\t[b]....10:02....10:01.....10:00....[/b]\n\n\t\tYou think frantically. Where could it be. You'd picked up the supplies and then sent Hint back.....Wait, Hint. \n\n\t\tXpage_break\n\n\t\t\"Hint.\" you address the robot who has been standing quietly in the corner. \"Did you see or meet anyone unusual when I sent you back for the last of the cargo?\"\n\n\t\t\"No Captain. Nothing unusual.\" the flat voice replies. \n\n\t\tYou study Hint closely. It would make sense, your enemy would have to know you'd be reluctant to toss one of your crew off the ship. And even if Hint thinks it's telling you the truth, it could have been reprogrammed....\n\n\t\t\"I'm sorry Hint, I think you could be the bomb. An explosive near that nuclear generator of yours would cause quite the explosion. You'd never want to harm your crewmates right?\"\n\n\t\t\"No Captain, of course not.\" Hint replies smoothly.\n\n\t\t\"Well, I think we need to put you outside for a while. Just in case. If we find the explosives somewhere else, we'll come and get you of course.\" you continue to watch Hint closely, wondering how it'll react. \n\n\t\tXpage_break\n\n\t\t\"Captain!\" Samantha wails aghast. \"This is Hint! You can't be suggesting we abandon it?\"\n\n\t\tAt that moment, the automatic doors hiss open and Bargle sweeps into the room. \"Captain, what is going on?\"\n\n\t\tHe looks around the deck taking in the countdown happening on the main screen. \"What is that?!\"\n\n\t\t\"That is how long we have before the ship explodes.\" You glance at Miss Foster as she starts to sniffle. No time to comfort her now. \n\n\t\t\"We need to get the nano explosives off our ship. We can't pinpoint the exact location but I think they have been placed in Hint. Please escort it to the airlock.\" \n\n\t\t\"Captain, are you sure that's wise?\" Jim gives you a sidelong look. \"Perhaps...\"\n\n\t\tXchoice\n\n\t\tXXCut him off. You gave an order. \"Hint. Airlock. Now!\"\n\t\t\"Are you going to question my orders too Bargle?\" You give your two crew members a stern look. Miss Foster wilts under the scrutiny, Bargle merely raises an eyebrow. \n\n\t\t\"Of course it's a wise idea. We need to do something and there's less than...\" You glance at the screen. \"Eight minutes left. I know how my arch enemy thinks, we need to get Hint off the ship...[i]Now![/i]\"\n\n\t\tJim's mouth tightens but he does as you ask. \"Come on ya old rust bucket, let's go take a space walk. You needn't worry, it's just a precaution then we'll come back and get you.\"\n\n\t\tHint rolls along beside your engineer. \"I don't worry Mr Bargle, I don't have that emotion.\"\n\n\t\tLooking at the retreating robot, you can't help think that it's posture has a dejected droop to it though. It could just be your imagination though, you're currently under a lot of stress.\n\n\t\tXpage_break\n\n\t\tThe red light flashes on your console again and you toggle the screen to see the silver form of Hint tumbling weightlessly away from the ship. It activates a locater beacon which blinks with a bright green light on it's chest. \n\n\t\t\"Samantha?\" you ask tersely.\n\n\t\t\"Ah....No change in the readings Captain.\" She flinches away from you as if worried what your next action will be. \n\n\t\tYour engineer returns stomping onto the deck. \"Well it's done Captain. Are we in the clear?\"\n\n\t\t\"Well actually, we still seem to have a slight problem with that explosive. Suggestions?\" You look at your crew hopefully.\n\n\t\tMiss Foster looks away, not meeting your eyes. Jim Bargle still has a scowl fixed to his face. Moral and discipline seem to be at an all time low. Not that you can blame them too much at this point. You did just jettison one of the crew into space. \n\t\tXset reputation %-10\n\t\tXachieve spacerobot\n\t\tXpage_break\n\n\t\tLong seconds tick by before Jim decides that saving his skin is more important than his annoyance with you. \"As I was saying....I think I can configure my electromagnetic isolator to detect the source of this interference.\"\n\n\t\tMiss Foster interjects. \"I've already tried using the sensors to locate the disturbance. The nanobots have been programmed to deliberately jam any attempt to locate them.\"\n\n\t\tBargle gives her a contemptuous look. \"The isolator is a type 4, insulated, engineering diagnostic device. With a bit of tinkering I can get it to work.\"\n\n\t\tMiss Foster looks doubtful but with no other suggestions you don't have any choice. \"Do it Bargle.\"\n\n\t\tXpage_break\n\n\t\tYour engineer pulls out a battered looking black case that sits neatly in the palm of his hand. An array of small dials adorn it's surface. He presses a button on the side....and nothing happens. \n\n\t\t\"Darn piece of junk!\" Bargle fumes at the isolator and turns to give it a solid whack on the nearest bulkhead. Samantha winces but stays silent. You...?\n\t\tXgoto hintairlock\n\n\n\n\t\tXXAllow him to continue. \n\t\t\"Yes Bargle?\" you signal for him to continue. \n\n\t\t\"Well I could try reconfiguring my electromagnetic isolator to detect the source of these nanobots. If they're going to make a big bang, they'd have to be giving off some sort of energy signature. I should have it in my bag.\" Bargle starts sorting though his engineering kit.\n\n\t\tMiss Foster interjects. \"I've already tried using the sensors to locate the disturbance. The nanobots have been programmed to deliberately jam any attempt to locate them.\"\n\n\t\tBargle gives her a contemptuous look, holding up a small back box. \"The isolator is a type 4 insulated, engineering diagnostic device. With a bit of tinkering I think I can get it to work.\"\n\n\t\tMiss Foster looks doubtful, Bargle looks determined. The timer continues to count down...tick....tick...tick....\n\n\t\tXchoice\n\t\tXXWay to risky, I say we go with the original plan.\n\t\t\"There's no time to play around, especially if you're not absolutely sure it'll work. Mr Bargle, escort Hint to the airlock if you please.\" Bargle starts to protest, but you cut him off. What's with the discipline on your ship today?\n\n\t\t\"That's enough Bargle. I gave you an order. Take Hint to the airlock [i]now[/i]\"\n\n\t\tJim's mouth tightens but he does as you ask. \"Come on ya old rust bucket, let's go take a space walk. You needn’t worry, it's just a precaution then we'll come back and get you.\"\n\n\t\tHint rolls along beside your engineer. \"I don't worry Mr Bargle, I don't have that emotion.\"\n\n\t\tLooking at the retreating robot, you can't help think that it's posture has a dejected droop to it though. It could just be your imagination though, you're currently under a lot of stress.\n\n\t\tXpage_break\n\n\t\tThe red light flashes on your console again and you toggle the screen to see the silver form of Hint tumbling weightlessly away from the ship. It activates a locater beacon which blinks with a bright green light on it's chest. \n\t\tXachieve spacerobot\n\t\t\"Samantha?\" You ask tersely.\n\n\t\t\"Ah....No change in the readings Captain.\" She flinches away from you as if worried what your next action will be. \n\n\t\tYour engineer returns stomping onto the deck. \"Well it's done Captain. Are we in the clear?\"\n\n\t\t\"Well actually, we still seem to have a slight problem with that explosive. About that suggestion you had earlier?\" You look at your crew hopefully.\n\n\t\tMiss Foster looks away, not meeting your eyes. Jim Bargle still has a scowl fixed to his face. Moral and discipline now seem to be at an all time low. Not that you can blame them too much at this point. You did just jettison one of the crew into space. \n\t\tXset reputation %-10\n\n\t\tXpage_break\n\n\t\tLong seconds tick by before Jim decides that saving his skin is more important than his annoyance with you. Your engineer pulls out a battered looking black case that sits neatly in the palm of his hand. An array of small dials adorn it's surface. You hold your breath as he presses a button on the side....nothing happens. \n\n\t\t\"Darn piece of junk!\" Bargle fumes at the isolator and turns to give it a solid whack on the nearest bulkhead. Samantha winces but stays silent. You...?\n\t\tXgoto hintairlock\n\n\t\tXX\"Do it Bargle.\"\n\t\tYou take a deep breath considering your options. Maybe you owe it to Hint to be sure. \"Do it Bargle.\"\n\n\t\tXgoto okbargle\n\n\n\n\n\t\tXlabel hintairlock\n\t\tXfake_choice\n\n\t\tXXReach for a scotch to settle your nerves\n\t\tYou reach for your drink, the glass held securely in a holder by your chair. [i]Darn, it's empty![/i] You don't remember drinking the entire contents of the glass. Saving the ship must be thirstier work than you remember. \n\n\t\tTwitching, you watch Jim give the isolator a few more solid thwacks before amazingly enough, the lights flare to life. The machine makes an even pinging sound.\n\n\n\t\tXXReach for the sensitive piece of electrical equipment, before Bargle can bash it to pieces on the side of the ship.\n\t\t\"Mr Bargle, please stop hitting that device...\" You trail off as he shows you the isolator, all the lights shining reassuringly. \n\n\t\t\"It's just a little temperamental.\" he says patting the black casing. \n\n\t\tThe device that's meant to save you all is temperamental? [i]Fantastic.[/i]\n\n\t\tHe taps the side of the device a few more times until a steady pinging fills the air. \n\n\n\t\t\"There.\" Bargle regards the device satisfied. \"Now just to make a few adjustments...\"\n\n\t\t[b]....2.47....2:46....2:45....[/b]\n\n\t\t\"Um Mr Bargle...Any time you're ready now...\" you fidget anxiously.\n\n\t\t\"Yes, yes...just about done...There!\" He waves the object around, the pitch of the pings swinging up and down. \"This way!\"\n\n\t\tXpage_break\n\n\t\tYou follow close behind the engineer, with Miss Foster bringing up the rear, as he strides purposefully out the door. Through the ship you run, arriving at the door of your quarters. Aiming the device at the door, the machine gives a high pitched strangled whine. \n\n\t\t\"It's in there Captain.\" Jim gestures at your room. You palm the door open and everyone crowds in. Waving the sensor over the objects in your room, he settles on a large crate by the window. \"This is it Captain, it's in here.\"\n\n\t\t\"Captain!\" Miss Foster shrieks. She points at the computer screen on the desk.\n\n\t\t[b]....0.08....0.07....0.06....[/b]\n\n\t\t\"There's no time!\" you yell. \"Everyone out!\"\n\n\t\tEveryone runs for the door into the hallway. With a hiss the door seals shut followed seconds later by a loud explosion which rocks the ship sending everyone tumbling.\n\t\tXset health %-5\n\t\tXSet reputation %-10\n\n\t\tXpage_break\n\n\t\tYou take a few breaths. No groaning bulkheads. No hissing of escaping oxygen. You may just get out of this alive. \n\n\t\tYou look for your crew. Jim is picking himself up off the ground, dusting himself off and only looking slightly more dishevelled than usual. Miss Foster also seems unhurt, although her dress has a long tear up the side. Fleetingly you wonder what could have possibly torn it along the smooth walls of the spaceship. Shaking your head, you decide it's better considered another time. \n\n\t\tBooming laughter echoes through the ship through the speaker systems. \"You failed Captain.\"\n\n\t\tStraightening yourself up, you address the air. \"It's not me that failed Mister Chemist. Your explosion failed to destroy my ship, you miscalculated my friend.\"\n\n\t\t\"I'm the [i]Master Alchemist[/i]\" the disembodied voice snaps. \"And no, I didn't miscalculate. This was a little test. Just the beginning of what I have planned for you. You'll be seeing me....Or one of my friends soon....very soon.\"\n\n\t\tManiacal laughter echoes through the ship again. Bargle slaps a switch on the intercom cutting it off. \n\n\t\tYou sigh. \"Thank you Jim.\"\n\n\t\tXpage_break\n\n\t\t\"Friend of yours?\" he asks you curiously. You realise he has no idea what is going on with the whole Master Alchemist affair. \n\n\t\t\"Not exactly...\" You grimace. Time to explain later. You activate a screen on the wall and survey the damage. A large gaping hole is present where the wall of your quarters used to be. Twisted pieces of metal stretch jaggedly into space. \n\n\t\t\"Samantha, can you please organise a force field for my quarters?\" Before she can comply, Bargle interrupts. \n\n\t\t\"Captain, the drive unit? We're on reserve power systems at the moment, there's not enough juice to maintain a force field with enough integrity that I'd want to risk my life to it.\"\n\n\t\tXpage_break\n\n\t\t[i]The drive unit. In all the excitement, you'd forgotten about that.[/i] \"Miss Foster, closest planet or star base for repairs?\"\n\n\t\tShe consults the computer pad, tucked into her belt. \"There's a star base orbiting Proxima 3 Captain. It's only small though. The others are...significantly further away. As it is, it'll take us about three weeks at our maximum speed to reach it.\"\n\n\t\tBargle nods. \"I've been there before. It's basic, but they'll have what we need to fix....this.\" He gestures to the ship generally.\n\n\t\tXpage_break\n\n\t\t\"Well I think we could all use some down time anyway after this.\" You certainly could anyway. \"What's the planet like Bargle? Can we organise shore leave there while the ship's under repairs?\"\n\n\t\t\"Hmm not good Captain. It's a mining planet you see. The base is just there to service that. Everything's underground on the planet itself.\" Bargle pauses for a moment. \"From memory it was a [i]delightful[/i] place. Sulphurous atmosphere, acid rain, Mach 9 winds that could strip the flesh off your bones in seconds....\"\n\n\t\t\"Ah yes I get the picture.\" You cut him off. [i]Ugh,[/i] it's going to be a long trip and a longer stay on the cramped station. Once again you envy Joe and his shore leave. \n\n\t\t\"Well lets get under way.\" You head back to the bridge. \"And can someone organise to pick up Hint?\" \n\n\t\tYou hope robots don't hold grudges. \n\t\tXset wealth %-10\n\t\tXfinish\n\n\n\n\n\t\tXlabel okbargle\n\n\t\tYour engineer studies the array of buttons and dials for a moment then pushes a button on the side....Nothing happens.\n\n\t\t\"Mr Bargle?\" You're pretty sure that wasn't what was supposed to happen. \n\n\t\t\"Darn piece of junk!\" Bargle fumes at the isolator and turns to give it a solid whack on the nearest bulkhead. Samantha winces but stays silent. \n\n\t\tYou give him a worried look. \"Ah Mr Bargle, I'm pretty sure you shouldn't be hitting a sensitive piece of equipment like that...\"\n\n\t\t\"She's alright Captain, you've just got to have the right touch with this sort of thing.\" [i]Whack![/i] He gives the instrument another solid bang on the wall.\n\n\t\tAmazingly enough, lights flare to life and the device starts to make an even pinging noise. \"There.\" Jim regards the object seemingly satisfied.\n\n\t\tXpage_break\n\n\t\tYou glance at the screen at the front of the bridge.\n\n\t\t[b]....9:26....9:25....9:24....[/b]\n\n\t\t\"Um..not to hurry you, but any time now would be good.\" You glance across at Miss Foster who's holding the desk tightly enough that her nails are making small indentations in the surface. Fleetingly you wonder what those nails are made of.\n\n\t\t\"Yes, yes...almost there...I just need to modulate the frequency of the subspace isolinic detector and....There!\" He waves the device around causing the pitch to oscillate up and down.\n\n\t\t\"Are you sure it's working, you can find the explosives?\" You prompt again.\n\n\t\t\"Yah probably...either that or it's picking up interference from the microwave again.\" Seeing remaining colour drain from Miss Foster's already pale face. \"Not that that's ever happened....\" he adds quickly and quite unconvincingly.\n\n\t\tXpage_break\n\n\t\t\"Alright here we go.\" He places the device in his palm and runs it up and down the stationary robot. The device continues it's even comforting ping. \"Think you're in the clear Hint.\"\n\n\t\t\"Thank you Mr Bargle.\" the robot intones emotionlessly.\n\n\t\tBargle spins a circle. \"This way.\"\n\n\t\tHe leads the crew off the bridge and through the corridors, always following the rising tone of the beeping detector. \n\n\t\tFinally you arrive at the door to your quarters. The device give an urgent shrill when pointed at the doors. \n\n\t\t\"In there Captain.\" The engineer nods his head towards your room. \n\n\t\tXpage_break\n\n\t\tPalming the door open you crowd into the small space. Waving the sensor over the objects in your room, he settles on a large crate by the window. \"This is it Captain, it's in here.\"\n\n\t\t[i]Of course it would be.[/i] That crate contains some personal supplies you'd picked up to pass the long journeys more pleasantly. It includes old books, the latest trids and a few valuable cases of scotch. The last would be particularly hard to replace.\n\n\t\t\"Are you sure Jim? No way you could be mistaken?\" you ask hopefully.\n\n\t\tBargle points the sensor at the box which sounds a high pitched scream. \"Very sure.\" \n\n\t\tXpage_break\n\n\t\t\"Ok, Hint get over here, help me get the lid of this crate.\" [i]Maybe it won't be the scotch.[/i]\n\n\t\t\"Captain!\" Miss Foster shrieks. She points at the computer screen on the desk.\n\n\t\t[b]....2.08....2.07....2.06....[/b]\n\n\t\t\"There's no time!\" Bargle yells. \"You'll have to ditch the whole crate!\"\n\n\t\tXchoice\n\t\tXXContinue to try and pinpoint the explosive device. \n\t\t\"This'll only take a minute. Hint, get this lid off!\" Hint obediently trundles over and uses its pincers to start undoing the bolts on the airtight container.\n\n\t\t\"Captain, we don't have a minute!\" Miss Foster wails, eyes starting to tear up.\n\n\t\t\"Settle down Miss Foster,\" you say soothingly. \"Of course we do. We've still got...one minute and twenty two seconds. Hint?\"\n\n\t\t\"I'm working as fast as I can Captain.\" the robot answers unhurriedly. \"These crates are designed not to come open by accident.\"\n\n\t\t\"Captain!\" Bargle snaps. \"There's not enough time to get the box to the airlock. The bulkheads should contain an explosion here, but if it goes up in the corridors....\"\n\n\t\tXpage_break\n\n\t\tYou could howl with frustration. \"Alright, everyone out now! You too Hint.\"\n\n\t\tEveryone more than obediently exits to the corridor. Bargle quickly keys in a sequence to seal the door lock. \n\n\t\tSamantha takes up the countdown. \"Five....Four....Three....Two....One....\"\n\n\t\tAn explosion rocks the ship, tossing everyone to the ground. \n\n\t\tXset health %-5\n\t\tXset reputation %-20 \n\n\t\tXpage_break\n\n\t\tYou take a few breaths. No groaning bulkheads. No hissing of escaping oxygen. You may just get out of this alive. \n\n\t\tYou look for your crew. Jim is picking himself up off the ground, dusting himself off and only looking slightly more dishevelled than usual. Miss Foster also seems unhurt although her dress has a long tear up the side and one shoulder strap is missing. Fleetingly you wonder what could have possibly torn it along the smooth walls of the spaceship. Shaking your head, you decide it's better considered another time. \n\n\t\tBooming laughter echoes through the ship through the speaker systems. \"You failed Captain.\"\n\n\t\tStraightening yourself up you address the air. \"It's not me that failed Mister Chemist. Your explosion failed to destroy my ship, you miscalculated my friend.\"\n\n\t\t\"I'm the [i]Master Alchemist[/i]\" the disembodied voice snaps. \"And no, I didn't miscalculate. This was a little test. Just the beginning of what I have planned for you. You'll be seeing me....Or one of my friends soon....very soon.\"\n\n\t\tManiacal laughter echoes through the ship again. Bargle slaps a switch on the intercom cutting it off. \n\n\t\tYou sigh. \"Thank you Jim.\"\n\n\t\tXpage_break\n\n\t\tHe merely glares at you in response, obviously blaming you for not getting rid of the crate when you had the chance. You activate a screen on the wall and survey the damage. A large gaping hole is present where the wall of your quarters used to be. Twisted pieces of metal stretch jaggedly into space. \n\n\t\t\"Samantha, can you please organise a force field for my quarters?\" Before she can comply, Bargle interrupts. \n\n\t\t\"Captain, the drive unit? We're on reserve power systems at the moment, there's not enough juice to maintain a force field with enough integrity that I'd want to risk my life to it.\" He gives you a look that says he'd dare you to try though.\n\n\t\tXpage_break\n\n\t\t[i]The drive unit. In all the excitement, you'd forgotten about that.[/i] \"Miss Foster, closest planet or star base for repairs?\"\n\n\t\tShe consults the computer pad, tucked into her belt. \"There's a star base orbiting Proxima 3 Captain. It's only small though. The others are...significantly further away. As it is, it'll take us about three weeks at our maximum speed to reach it.\"\n\n\t\tBargle nods. \"I've been there before. It's basic, but they'll have what we need to fix....this.\" He gestures to the ship generally.\n\n\t\tXpage_break\n\n\t\t\"Well I think we could all use some down time anyway after this.\" You try to put a positive spin on the situation. \"What's the planet like Bargle? Can we organise shore leave there while the ship's under repairs?\"\n\n\t\t\"Hmm....not good Captain. It's a mining planet you see. The base is just there to service that. Everything's underground on the planet itself.\" Bargle pauses for a moment. \"From memory it was a [i]delightful[/i] place. Sulphurous atmosphere, acid rain, Mach 9 winds that could strip the flesh off your bones in seconds....\"\n\n\t\t\"Ah yes I get the picture.\" You cut him off. [i]Ugh,[/i] it's going to be a long trip with a cranky crew, and a longer stay on the cramped station. Once again you envy Joe and his shore leave. \n\n\t\t\"Well lets get under way.\" You head back to the bridge, crew trailing behind. \n\t\tXset wealth %-10\n\n\t\tXfinish\n\n\n\n\t\tXXTake one for the team and turf the whole crate out the airlock.\n\t\tYou give the crate one last wistful look, but Bargle's right, you can't risk the ship and crew for the contents. \n\n\t\t\"Hint.\" You wave the robot over. \n\n\t\t\"Yes Captain.\" comes the smooth reply. \n\n\t\t\"Take this box to the nearest airlock and dispose of it please.\" you say pointing at the offending object. \n\n\t\t\"Of course Captain.\" Hint trundles over and effortlessly lifts the heavy crate. Slowly it trundles back into the corridor. \n\n\t\t\"Faster Hint, we need it there now!\" You can hear the ominous tick as the clock continues it's inevitable countdown.\n\n\t\t\"I'm already at my maximum recommended speed for my load parameters captain.\" Hint replies continuing to roll slowly down the corridor. \n\n\t\t\"Oh for goodness sake! Bargle help me!\" Between the two of you, you manage to heft the heavy item down the corridor, with Samantha yelling directions to stop you crashing into the corners. Finally you drop the crate into the airlock and press the button to open the area to space. \n\n\t\tXpage_break\n\n\t\tThe rush of air and sudden lack of artificial gravity, pulls the box into space. But it's slow, too slow. \n\n\t\tMiss Foster starts a countdown. \"Five...Four...Three...Two...One...\"\n\n\t\tWith a blinding flash of light, a shockwave rattles the ship like a tin can. \n\n\t\tYou look around to see your crew picking themselves up from the floor, Bargle only slightly more dishevelled than usual, Miss Foster with a surprisingly fashionable tear across the side of her dress.\n\n\t\tHint seems unconcerned by the commotion and finally appears around the corner. \n\n\t\tXpage_break\n\n\t\tXSet reputation %+20\n\n\t\t\"Miss Foster. Report.\" you ask her, hoping your ship has escaped major damage. \n\n\t\tBrushing some stray hair from her eyes, she retrieves a computer pad from her belt. Consulting the glowing screen she replies. \"Surprisingly minor Captain, a few small breaches, but nothing major. All affected areas are cordoned off and we shouldn't have any trouble sealing the cracks.\"\n\n\t\tYou address the air, knowing your nemesis will be listening in. \"Alright Master Alchemist You've failed. Time to go back to school.\"\n\n\t\tA voice booms loudly over the ship's speakers. \"You may have won this round Captain $!{name} but this is not the last you've seen of me! This was but a test. The next one will be harder. You'll be seeing me....or one of my friends....very soon!\" The disembodied voice launches into another round of maniacal laughter before suddenly cutting off. You turn to see Bargle with with his hand on the intercom switch. \n\n\t\t\"That's better.\" he states. \"Who is that anyway? An old friend of yours?\"\n\n\t\tYou realise that your engineer has been running around the ship with you, completely unaware of the Master Alchemist’s presence, having arrived on the bridge after he had already signed off. \n\n\t\t\"Not exactly...I'll tell you about it later.\" Jim looks at you quizzically but lets it drop. \n\n\t\tXpage_break\n\n\t\t\"Well lets get going, we've still got a delivery to make.\" you force some enthusiasm into your voice. \n\n\t\t\"Um Captain.\" Miss Foster says quietly. \"The drive unit?\"\n\n\t\t[i]The drive unit. In all the excitement, you'd forgotten about that.[/i] \"Closest planet or star base for repairs?\"\n\n\t\tShe consults the computer pad, tucked into her belt. \"There's a star base orbiting Proxima 3 Captain. It's only small though. The others are...significantly further away. As it is, it'll take us about three weeks at our maximum speed to reach it.\"\n\n\t\tBargle nods. \"I've been there before. It's basic, but they'll have what we need to fix....this.\" He gestures to the ship generally.\n\n\t\t\"Well I think we could all use some down time anyway after this.\" You try to put a positive spin on the situation. \"What's the planet like Bargle? Can we organise shore leave there while the ship's under repairs?\"\n\n\t\t\"Hmm....not good Captain. It's a mining planet you see. The base is just there to service that. Everything's underground on the planet itself.\" Bargle pauses for a moment. \"From memory it was a [i]delightful[/i] place. Sulphurous atmosphere, acid rain, Mach 9 winds that could strip the flesh off your bones in seconds....\"\n\n\t\t\"Ah yes I get the picture.\" you cut him off. [i]Ugh,[/i] it's going to be a long trip and a longer stay on the cramped station. And worst of all....no scotch. Once again you envy Joe and his shore leave. \n\n\t\t\"Well lets get under way\" you sigh. At least you foiled the Master Alchemist’s plans. You'll have to be on high alert for any more of his dastardly meddling. \n\t\tXachieve foiled\n\t\tXfinish\n\n\t\t*choice\n\t\t\t#Back to Special Features.\n\t\t\t\t*goto home\n\t\t\t#Back to Drafts.\n\t\t\t\t*goto drafts\n\t#Episode Six: The Unprovoked Attack!!! by Felicity Banks\n\t\tAnother day, another journey, another opportunity to have perfect hair. \n\n\t\tThe station bar at Curroxios VII got you a good job last time you were there, and the choc-lime spaghetti they served was actually pretty good. Some of the vapors the aliens are imbibing look oddly enticing, although it's not always easy to read alien facial expressions, especially when not all of them have faces. There's a tentacley blob in the corner that flails more wildly with every dose of a green cube that it receives. Either the flailing is joyful, or there's a serious miscommunication happening before your eyes.\n\n\t\tOh well. You start eating your meal, enjoying the creamy chocolate contrasting with the al dente noodles and tart limes.  The news wall is transmitting images of you and your ship arriving at Lautus, and there are eye-stalks pointing your way from several directions. You've been recognized. Momentarily bashful, you look down at your place and notice for the first time that your spaghetti noodles seem to have rows of eyes all along their lengths. It's probably best not to think about that too hard. Luckily, you have plenty of other things to think about.\n\t\tXchoice\n\t\tXXThe ship could probably do with a service, and Curroxios VII has some great Zork mechanics.\n\t\tXset flying %+20\n\t\tXset wealth -1000\n\t\tA Zorkian approaches with a new round of drinks, and you give it a tip to organize an overhaul for you.\n\n\t\t\"Certainly, Captain,\" it says. \"Also, there is a box waiting for you in the delivery center - from Lautus.\"\n\t\tXgoto box\n\t\tXXI wonder what would happen if I ate one of those green cubes? I'm going to try one!\n\t\tXset curiosity %+20\n\t\tXset health %-10\n\t\tA Zorkian approaches with a new round of drinks, and you take one of the green cubes and pop it in your mouth.\n\n\t\tYou've never really thought about your spleen before. About how beautiful it is. About how rarely you give it compliments, or a cleansing regime, or any thought at all. You begin to weep with shame, and two hours later you wake up soaked in your own drool while curled in the fetal position under the table.\n\n\t\t\"Hello again Captain,\" your server says, helping you to your feet and discreetly offering you a towel. \"Would you like another?\"\n\n\t\t\"Maybe next time,\" you say.\n\n\t\t\"Very good, Captain. If you are finished your refreshments, I can guide you to the delivery center. There is a box waiting for you there - from Lautus.\"\n\n\t\t\"Yeth,\" you say, enunciating carefully since your tongue is still twice its usual size. \"I do believe I am finithed.\"\n\t\tXgoto box\n\t\tXXI stand and throw my arms wide. \"Yes, it's me - Captain $!{name}. No job too hard, no fight too fearsome, no world too unspeakably horrible!\"\n\t\tXset reputation %+10\n\t\tThe tentacle thing in the corner flails applause at you; those with eye-stalks dip them respectfully; and your Zorkian server hastens to offer you more drinks, food, and service.\n\n\t\tYou give several creatures the code to contact you if needed, and sit back with the glow of a wealthy future coming together before your eyes. \n\n\t\t\"Excuse me Captain,\" says your server. If you are finished your refreshments, I can guide you to the delivery center. There is a box waiting for you there - from Lautus.\"\n\n\t\tXlabel box\n\t\tXpage_break\n\t\tIn the delivery center there is an enormous plastic crate which is addressed to you. \n\t\tXif relations_robots \u003c50\n\t\tAt your request, the Zork server scans the box and assured you it is not rigged to explode and contains no deadly weapons or poisons. \n\n\t\tXchoice\n\t\tXXGet the box to your ship and open it right away.\n\t\tXset curiosity %+10\n\t\tXgoto open\n\t\tXXAsk the Zork to open the box for you. Zorks are always trustworthy - after all, why else would they rule the universe?\n\t\tXset idealism %+10\n\t\tShe carries the box to your ship without assistance. Once it's safely in the landing bay she takes off the lid and sets it aside, walking away respectfully so you have privacy to claim your new possession.\n\t\tXgoto open\n\t\tXXSummon Samantha to examine the box before you open it. You've never met this Zork before and you may well have enemies.\n\t\tXset idealism %-10\n\t\tYou have the box delivered to the ship where your crew obediently awaits. Samantha is reading, as usual. Who knew science officers were so bookish? Somehow, despite never leaving the ship, the new black dress she was wearing when you left has been torn in several places.\n\n\t\t\"Samantha, I've been sent a large box from Lautus and I'd like you to scan it before I open it.\"\n\n\t\t\"Yes Captain,\" she says, and puts down the book. Together you go into the landing bay and she produces a rod the length of her forearm and waves it over the box.\n\n\t\t\"That doesn't look like the usual scanner,\" you say.\n\n\t\t\"This isn't the usual scanner,\" she says. \"It's my own design. I had some free time and thought I'd experiment with non-Zork technology.\"\n\n\t\t\"Why? The Zorks are eons beyond any other species.\"\n\n\t\tShe shrugs, embarrassed. \"In any case, the box contains a robot, currently deactivated. But its programming is all in order, so it's quite safe.\"\n\n\t\tJoe emerges from his cabin to see what's happening, and assists you in removing the lid.\n\n\t\t\"Wait!\" says Jim from the doorway opposite. \"Helium's atoms! Anything could be in there!\"\n\t\tXpage_break\n\t\tXlabel open\n\t\tYou glance into the box. It's a robot. Judging by the chiseled jaw and broad shoulders, it's a male. The designation label describes him as \"F-ZE\" and underneath someone has inexpertly carved the name \"Fuzzy\" into the metal.\n\n\t\t\"It's a robot,\" you say, and reach in to flip the switch on the back of its head and turn it on.\n\n\t\tIts eye-flaps open and shut several times as it powers up. \"Greetings from Lautus, Captain $!{name},\" it says at last. \"My fellow robots created me as a gift for you, in thanks for what you have done for our masters.\"\n\t\tXif robots_enter_room >0\n\n\t\t\"There's no need for that, Fuzzy,\" you say. \"Although I certainly appreciate the gesture.\"\n\t\tXgoto hint\n\t\tXelse\n\t\t\"What exactly did I do?\" you ask Fuzzy carefully.\n\n\t\t\"We were given sentience only on condition that we prevent our masters from ascending. It was awful! When you saved them, you also saved us from indescribable pain.\" He emits several high-pitched beeps, and you realize he is crying.\n\n\t\t\"I... well I'm glad to have been of use.\"\n\t\tXlabel hint\n\n\t\tFuzzy isn't looking at you any more. He's staring over your shoulder, and his eye-flaps are opening and shutting as if he's suffering an error.\n\n\t\tYou spin around with lazer pistol drawn, ready for an attack!\n\n\n\n\n\t\tWho or what lurks behind you? Is it an enemy? A bomb? Fuzzy's enemy? Fuzzy's enemy holding a bomb?\n\n\t\tTune in next time for our thrilling conclusion!!!!!!!\n\n\t\tXpage_break Next Chapter\n\t\tLast time....\n\t\tAfter receiving the gift of Fuzzy the robot, you were finally able to relax until something truly shocking appeared behind you!!!\n\n\t\tYou spin around with lazer pistol drawn, ready for an attack!\n\n\t\tIt's just Hint coming into the landing bay. \n\n\t\tFuzzy slaps his reboot button and manages to stop blinking. \"You must be Hint,\" he says. \"I'd heard there were a few post-Imperial models still around, with a simply exquisite design. But my imagination was only recently installed and fell far short of the image before me!\"\n\n\t\tHint accidentally turns on her hovering function before her normal functionality returns. \"I am Hint, yes. Who are you?\"\n\n\t\t\"Fuzzy,\" he says. \"Given as a gift to your captain in thanks for {his} service to our masters.\"\n\n\t\tHint emits a long stream of binary code, and turns in a circle so Fuzzy can see that she is polished to a perfect shine from all angles. \"Your planet is very beautiful,\" she says. Her usual grating monotone manages to hint at an unusual wistfulness.\n\t\tXif crew_member = 1\n\t\t\"It was a privilege to visit, and I intend to add to that section of my memory banks at some future date.\"\n\t\tXgoto aw\n\t\tXelse\n\t\t\"I have set aside a section of my memory banks for visiting at some future date.\"\n\t\tXlabel aw\n\n\t\t\"Perhaps I shall accompany you on that future... date,\" says Fuzzy.\n\n\t\tHint's arms expand in length, and one of her suction cups sticks to Fuzzy's torso with a loud [i]plock![/i] \"Your design is both aerodynamic and geodesic.\"\n\n\t\t\"You're too kind!\" says Fuzzy.\n\n\t\t\"I apologize for my excessive kindness,\" Hint says at once.\n\n\t\tFuzzy beeps happily, and you decide it's time to leave the robots to their mutual uploads.\n\n\t\tAs you head for the ship's controls, Hint's arm is gradually retracting, pulling her companion ever closer. The wheels beneath his exoskeleton appear completely free of friction as he raises his arms towards her in happy surrender.\n\t\tXpage_break\n\t\tYou can't help feeling oddly cheerful as you pull away from the crowded docking station of Curroxios VII, weaving among Wargoxian shuttles, Earth ships, space-bat chariots, Gludnik flying saucers, and many more. The Zork speeders are a distinctive sleek shape with untarnished blue paint. For such a busy port, there are relatively few speeders. Perhaps there's a Zork conference on elsewhere or some such. \n\t\tXif (idealism \u003c 40) or (curiosity >70)\n\t\tYou think you see a Zork heading inside an unmarked Wargoxian shuttle, but of course the Zork must have been simply walking past, or installing some new upgrade or something like that. \n\t\tZork ships are the best, and if you weren't so sentimental about your finned ship you'd try to join a Zork crew instead.\n\n\t\tStill, it's been a good holiday. You swoop gracefully under a large merchant vessel from Trehnoon and push the sequence of flashing buttons that will set you on a course for Poljix II. Just as you're having a nice swivel on your chair, you catch a flash of purple from the window and the ship immediately emits a terrifying bang and veers from its course! \n\n\t\tSomeone has fired on you! And they've set their lazer cannon to \"disintegrate\"!\n\n\t\tYou leap to the smoking console and furiously press buttons, calling on all your years of flying experience to save yourself, your father's ship, and every member of your crew. Outside the window a Wargoxian shuttle turns around ready to fire another deadly beam!\n\t\tXif flying >65\n\n\t\tLuckily you've been practicing your flying and you manage to evade the second unprovoked shot. \n\t\tXgoto jim\n\t\tXelseif flying > 55\n\n\t\tYou send the ship into a stomach-wrenching dive, and the lazer clips one of the fins instead of completely obliterating you.\n\t\tXset repairs_needed true\n\t\tXgoto jim\n\t\tXelse\n\t\tYou beat helplessly on the console with both fists as the cannon on the Wargoxian shuttle points directly at your window. As they fire, the universe all around you turns to the psychedelic purple of a laser beam... and then to nothing at all.\n\n\t\tAnd then you wake up.\n\n\t\tXlabel jim\n\t\tYou hear Samantha screaming, and Jim yelling \"Qintoxia's rings!\" as he attempts to keep the engine from exploding. Hint is yelling something but you can't make it out over the incessant beeping from Fuzzy's over-stressed processor.\n\t\tXchoice\n\t\tXXSteer the ship directly at the Wargoxian shuttle, and terrify them into retreating!\n\t\tXset flying %+10\n\t\tXset reputation %+10\n\t\tXset repairs_needed true\n\t\tYou grit your teeth and fly straight at the shuttle, shouting at the crew to hold onto something. \n\n\t\tIt works! The shuttle remains on target for a moment before its engines flash with red and white flames and it flees. You flew so close you can still smell burning. In fact, your ship has caught alight!\n\n\t\t\"Fire!\" screams Joe.\n\n\t\t\"We're all going to Dinkle McFlaggerty's!\" screams Jim.\n\n\t\t\"Aiiieeeeee!\" screams Samantha.\n\n\t\tYou hear high-pitched beeping and realize Fuzzy and Hint have already zoomed into the burning section of the ship. Moments later the air is full of steam and dust.\n\n\t\t\"We are saved from a fiery death!\" says Hint over the intercom. \"Newer models come pre-programmed with emergency firefighting protocols. Fuzzy has now sealed the ship and you humans may return to your usual duties.\"\n\n\t\tYou sag against the nearest wall. That was a close one.\n\t\tXgoto endy\n\t\tXXGrab your jet pack and abandon ship! You never liked the crew anyway!\n\t\tXset reputation %-10\n\t\tXset flying %+10\n\t\tYou strap on your jetpack and leap out the closest hatch, burning fuel fast as you move as far from your father's ship as possible. As you hurtle through space you can't resist turning back to watch as the shuttle shoots again, and your beloved ship turns into a large pile of atoms that immediately scatters in all directions.\n\n\t\t\"I'm sorry, Father,\" you whisper, but you quickly realize you'll be able to apologize in person... the shuttle is circling around to face you!\n\n\t\tYou desperately try to flee, but your jetpack is no match for a space ship and you're still pathetically attempting to swim through space when a purple lazer beam from the shuttle vaporizes you.\n\t\tXending\n\t\tXXRun to the nearest hatch and shoot your lazer pistol at the shuttle!\n\t\tXset lazer_pistol %+10\n\t\tXset reputation %+10\n\t\tXset health %-10\n\t\tYou push past a still-screaming Samantha and a still-cursing Jim and leap into space, trusting your Zork-Air (TM) to keep you alive until your crew can retrieve you... if they're still alive. \n\n\t\tThe shuttle is perfectly lined up and the lazer cannon is glowing in preparation for a final fatal shot. You take a deep breath of deep space and fire your lazer at the cannon. It explodes in a massive fireball of purple, green, and red!!\n\n\t\tYou're thrown backwards, tumbling end over end in space until you hit a metal beam.\n\n\t\tIt's not a metal beam. It's Hint's arm. You cling on as her arm retracts, pulling you back to the ship. Fuzzy stands in the open landing bay ready to pull you inside.\n\n\t\tThat was a close one.\n\t\tXlabel endy\n\t\tXpage_break\n\t\t\"Thanks Fuzzy and Hint,\" you say. \"That was a close one.\"\n\n\t\tHint pushes a big red button and the landing bay door closes, making the bay safe for the other humans to enter.\n\n\t\tSamantha throws herself into your arms. \"You saved us!\" she says.\n\n\t\tLooking around, you feel a swell of affection for all of your crew - even the robots, who are carefully re-polishing one another after their heroic rescue. \"Just doing my job,\" you say.\n\n\t\tThe humans drift away one by one to heal their various minor wounds with the help of the Zork Auto-Doctor. Hint volunteers to fetch you some yellow water to ease your pain and begin your own healing.\n\n\t\t\"Thank you, Hint. I'd appreciate some medical assistance about now.\"\n\n\t\tYou call in a mobile mechanic to fix the ship properly, and pay her the usual exorbitant price for non-station repairs.\n\t\tXif repairs_needed\n\t\tXset wealth -2000\n\t\tXgoto fuzzy\n\t\tXelse\n\t\tXset wealth -1200\n\t\tXgoto fuzzy\n\n\t\tXlabel fuzzy\n\n\t\tIt was a strange day. You've never had unsavory dealings with any Wargoxians, so it must have been a case of mistaken identity. The purple \"disintegrate\" lazer uses far more energy than the usual red \"kill\" setting, so they were obviously not particularly skilled at assassination attempts. \n\n\t\tAh well. Everyone has a bad day sometimes. \n\t\tXif (idealism >65) and (reputation > 65)\n\n\t\tFuzzy approaches you, looking strangely diffident. Must be something to do with that sentience virus. You wonder idly if it's transferable between robots. Probably doesn't matter.\n\n\t\t\"Go on, Fuzzy,\" you say kindly. \"Is there something you want to say?\"\n\n\t\t\"You are well known throughout the galaxies for your innate goodness, Captain,\" he says, \"which is why I'm telling you this terrible secret.\"\n\n\t\t\"Go on,\" you say.\n\n\t\t\"The ones who ordered us to trap our wonderful Lautian masters on this plane of existence...\"\n\n\t\t\"Yes?\"\n\n\t\t\"It was the Zorks.\"\n\n\t\t\"Why would the Zorks do something so cruel?\" you ask.\n\n\t\t\"I don't know, Captain. But I'm sure they had a good reason.\"\n\n\t\t\"Very good, Fuzzy. Don't tell anyone else - we don't want to cause trouble for no reason.\"\n\n\t\t\"Yes Captain,\" he says, beeping happily now that he no longer carries his secret burden alone.\n\n\t\tHint comes back into the landing bay with your medicinal drink, which you swallow quickly. You feel better at once. Those Zorks might have something against an entire race passing happily out of their universe, but they sure now how to make the human body feel better fast.\n\t\tXgoto hair\n\t\tXelse\n\t\tHint returns to the landing bay with your medicinal drink, which you swallow quickly. You feel better at once. Those Zorks sure now how to make the human body feel better fast.\n\t\tXlabel hair\n\t\tXset health %+20\n\t\tYou check the nearest mirror to confirm your hair still looks sublime.\n\n\t\tIt does.\n\n\t\tXfinish\n\n\t\t*choice\n\t\t\t#Back to Special Features\n\t\t\t\t*goto home\n\t\t\t#Back to Drafts\n\t\t\t\t*goto drafts\n\t#Episode Seven: The Space Anomaly… from Outer Space!!! by Eric Moser.\n\t\tXtitle Mystery of the Space Anomaly...from Outer Space!!\n\t\tXauthor Eric Moser \n\n\t\tXcreate health 80\n\t\tXcreate wealth 2000\n\t\tXcreate idealism 50\n\t\tXcreate reputation 50\n\t\tXcreate curiosity 50\n\t\tXcreate maverick 50\n\t\tXcreate crew_morale 50\n\t\tXcreate lazer_pistol 50\n\t\tXcreate flying 50\n\t\tXcreate extended_scans \"\"\n\t\tXcreate joe_vote \"\"\n\t\tXcreate joe_scan \"\"\n\n\n\t\tBargle yells an obscenity that rhymes with Jupiter and uses his stomach arm to hurl an astro wrench at Hint from across the command deck. Hint retaliates with a condescending comment, extending her arms to grasp Bargle, who glows a deep red. The wrench bonks harmlessly off Hint's seemingly impervious body. \n\n\t\tMiss Foster attempts to intervene and implores them to calm down, repeating, \"Joe didn't mean what he said!\" However, the brawling crewmates ignore her pleas, and somehow your science officer's black cocktail dress is ripped several inches down the back even in the absence of any pointy objects.\n\n\t\tSpeaking of Joe, he cowers in the back corner by the escape hatch, sobbing about something, his arms wrapped around his knees. It figures Joe would be the cause of this! He's the worst!\n\n\t\tYour fingers threaten to pull at your magnificent (and captainesque) hair, but they resist at the last moment, submitting to reason. No situation justifies mussing your hair, although this one comes close. You feel helpless to regain control of your crew, especially since they keep repeating the same infuriating behavior time and time and time again. For what seems to be weeks, or perhaps just a few minutes, as it's very difficult to measure time in these sorts of situations, you've been unable to unravel...\n\n\t\tthe mystery of the space anomaly...from outer space!\n\t\tXpage_break\n\n\t\tNothing you've tried over the past weeks or minutes, whichever it is, has worked. It's almost as if the space anomaly is some sort of plot device designed to test every last inch of your mettle. You're trapped in a vicious cycle, and frankly it's getting old. Also, for some strange reason, you seem to be the only person on the ship aware of the predicament! \n\n\t\tNeeding to blow off some steam, and realizing whatever you do won't have any permanent effect, you decide to...\n\t\tXchoice\n\t\tXXLaser blast both Bargle and Hint! They deserve it! \n\t\tAlthough your blasts harmlessly bounce off Hint, Bargle doubles over as one of your shots finds his ample midsection. Hint looms over Bargle ominously, making a fist with her pinchers. \"I have just devised the optimal location to insert your astro wrench.\"\n\t\tXset lazer_pistol %+10\n\t\tXgoto before\n\t\tXXHit the thrusters and jettison Joe out of the escape hatch into outer space! He deserves it!\n\t\tThe ship roars forward, causing your least valuable crew member to slide towards the escape hatch. You peer out the observation deck as Joe's useless body explodes into a million pieces in the dark confines of space. It's one of those 'addition by subtraction' sort of things.\n\t\tXset flying %+10\n\t\tXgoto before\n\t\tXXDeclare my love for Miss Foster and that rather appealing ripped dress of hers. We both deserve it!\n\t\tMiss Foster melts into yours arms and assures you that, \"You're the best captain ever! And your hair is so dreamy!\" A few hours in your private quarters with your very enthusiastic science officer and a bottle of Earthside scotch does wonders for your health. \n\t\tXset health %+10\n\t\tXgoto before\n\n\t\tXlabel before\n\t\tXline_break\n\n\t\tBut it's only temporary. Soon you'll be witnessing the same scene again. Hint and Bargle will tussle. Miss Foster will protest. Joe will whimper in the corner. Your mind races back to the events before encountering the anomaly. Maybe, just maybe, you can figure out a way to save your crew!\n\t\tXpage_break Weeks (or minutes) ago...\n\n\t\tHint's voice breaks the relative silence of the command deck. \"Captain. Sensors detect an anomaly .05 parsecs from our current location.\"\n\n\t\tMiss Foster nods in agreement, looking blankly at a navigation screen. \"Affirmative, Captain. I see a gold blip.\" What a gal.\n\n\t\tYou sit up straighter in your captain's chair. The last few days have been mindnumbingly dull for the crew. No space bats. No brain leeches. No robot armies. It's almost as if you could have skipped right from your last adventure to this very moment without missing anything of interest. Giving a subtle glance to your captain's log you see mostly unflattering doodles of Bargle scratching himself with his stomach arm and saying things like, \"When your father ran this ship...\"\n\n\t\tIt's a given that you'll order Hint to set course for the anomaly, but why do you give that order?\n\t\tXchoice\n\t\tXXI'm just naturally curious! Especially about space anomalies...whatever they are.\n\t\tXset curiosity %+10\n\t\tXgoto pass_time\n\t\tXXI need a mission to focus on. Drawing doodles of my crusty engineer isn't exactly honing my leadership skills.\n\t\tXset curiosity %-10 \n\t\tXgoto pass_time\n\t\tXXI enjoy making snap decisions with very little information!\n\t\tXset maverick %+10\n\t\tXgoto pass_time\n\t\tXXMy father's ship manual gives me guidance here. See Section 12.8(b) titled \"You Must Investigate Abormalities!\"\n\t\tXset maverick %-10\n\t\tXgoto pass_time\n\n\t\tXlabel pass_time\n\t\tHint nods curtly and sets course for the anomaly. She rotates her head 180 degrees to address you. \"Captain, I calculate it will take us 5.0251 hours to reach our destination at current speed.\"\n\n\t\tBargle rumbles and bangs all three of his fists against the cargo hold doors. \"Mad Martians! I've reconfigured the phobetor couplings three times already! There's nothing else to do until we get more parts.\" \n\n\t\tJoe looks bashfully at Miss Foster and asks, \"Is there anything I can do to help?\"\n\n\t\tMiss Foster studies her 'scientific monitoring station,' which in reality is just a small console not attached to the rest of the ship. Bargle has installed some blinking lights and a few non-operational buttons, along with a monitor that always had a gold blip in the exact same spot. She smiles at her crewmate, but in a genuinely friendly, not condescending way. \"Thanks for the offer Joe, but I have everything under control.\" \n\n\t\tHmmm...another 5.0251 hours of monotony sounds dreadful. Just as you ponder another Bargle doodle, Hint provides additional information about your course setting. \"Captain, we are approaching an asteroid belt. Primitive life signs on several of the larger asteroids. Based on an analysis of the asteroid composition, life forms are mostly likely similar to Earth bacteria. I will have no difficulty navigating our vessel through the belt.\"\n\n\t\tMiss Foster looks intrigued. \"Hint, what are the chances the life forms are more advanced, perhaps even sentient?\"\n\n\t\tHint's claw taps a few of her (operational) buttons and studies the monitor. \"Only a .09 percent chance.\"\n\n\t\tIt seems like it's time for some action. What order do you give?\n\t\tXchoice\n\t\tXXI take control of the ship's laser cannon and practice my aim on those asteroids. Who cares if a few primitive life forms get vaporized?\n\t\tMiss Foster looks shocked at your nonchalance, covering her mouth with her hand. Even Jim, who generally seems indifferent to the plights of others, frowns at you and glows a soft orange.\n\t\tXset lazer_pistol %+10\n\t\tXset reputation %-10\n\t\tXgoto arrive\n\t\tXXI relieve the (vastly superior) Hint from her duties and hone my piloting skills while looping around asteroids!\n\t\tAnd your manage to emerge from the other side with your ship mostly intact! However, there was some minor (moderate?) body damage. Jim grumbles and deducts credits from the general ship account as a sinking fund for inevitable repairs.\n\t\tXset flying %+10\n\t\tXset wealth -500\n\t\tXgoto arrive\n\t\tXXI just need to focus on raising the crew's morale, so I suggest a rowdy game of \"Coitus, Cohabitate or Vaporize?\"\n\t\tA few hours around the break room table debating the relative merits of various intergalactic celebrities does wonders for crew morale! And in the process, you discover Joe's hidden love for purple-skinned aliens and Hint's intense dislike of 99 percent of carbon-based lifeforms. \"In the future, assume my answer will be vaporize. It is more efficient that way.\"\n\t\tXset crew_morale %+10\n\t\tXgoto arrive\n\n\t\tXlabel arrive\n\t\tXline_break\n\t\t5.0251 hours later, your ship arrives at the space anomaly. You stroke your chin in mock confidence, staring at the display screen brimming with dozens of indecipherable measurements, calculations and data. Hint rotates her head again 180 degrees and simply asks, \"Orders, Captain?\"\n\n\t\tMiss Foster speaks up. \"We could run additional scans now that we're closer. They might show something we missed on our initial scans.\"\n\n\t\tHint adds, \"Complete additional scans will consume 3.490 hours. Chances of discovering relevant new data are .24 percent.\"\n\n\t\tYou spot Joe speaking with Bargle by the cargo doors. Waving Joe aside, Bargle walks up beside you and wraps a beefy arm on your shoulder. \"Captain, nothing in that anomaly is going to harm our ship. Plus, we're burning fuel just sitting here. We can scan as we go, can't we? Joe over there agrees.\"\n\n\t\tWhat's your order?\n\t\tXchoice\n\t\tXXRun the exhaustive scans. It might be boring but it's the safe way to go.\n\t\tJim grumbles, Joe sighs and even Hint seems annoyed as she responds, \"Yes, Captain. I shall also alert you of any potential threat in 10 parsec radius. I shall include spacedust, astro flowers and celestrial rainbows in my analysis.\"\n\t\tXset crew_morale %-10\n\t\tXset extended_scans \"yes\"\n\t\tXgoto more_scans\n\t\tXXScan as we go. The crew is bored and there's no point being overly cautious.\n\t\tBargle and Joe voice their approval. Bargle slaps you on the shoulder and Hint nods in agreement. \"Aye Aye Captain!\" She then pauses and adds, \"I shall refrain from uttering that phrase in the future.\"\n\t\tXset crew_morale %+10\n\t\tXgoto anomaly\n\t\tXXHmmm...I'll take a vote and follow their wishes. It seems so democratic! Plus, I don't have to make a decision this way.\n\t\tXgoto vote\n\n\t\tXlabel vote\n\t\tXset reputation %-10\n\t\tXset joe_vote \"yes\"\n\t\tThe crew looks stunned. Miss Foster furrows her brow and asks, almost rhetorically, \"But...I thought the Captain was the boss?\"\n\n\t\tHint taps her claw on her console. \"Since the Captain has decided to abandon command responsiblities for this decision, I shall communicate my position. A .24 percent chance of obtaining new relevant data does not statistically justify time and fuel resources involved in maintaining our current position while running additional scans. We should enter anomaly and scan inside.\"\n\n\t\tBargle looks to Joe and then back at the rest of the group. \"We agree with Hint. We should go.\"\n\n\t\tMiss Foster looks unsure. \"I...supposed I'll agree with the rest of the crew, since they've already agreed.\"\n\n\t\tHint nods. \"Setting course to enter the anomaly.\"\n\t\tXgoto anomaly\n\n\n\t\tXlabel more_scans\n\t\tXset joe_scan \"yes\"\n\t\tHint initiates the scans as ordered. Miss Foster's bight blue eyes focus like beautiful lasers on the sole gold blip on her screen. Halfway through the scanning process, Hint excuses herself to run some self-diagnostics and recharge. Joe stands in her during her absence, tapping a few buttons but having to do very little (his speciality).\n\n\t\tAfter 3.490 hours of scanning, Hint announces the results. \"No new relevant data.\" She tilts her head and taps a few buttons, pausing for a moment as if confirming her conclusion. \"Forgive me, Captain. For a moment I thought I had miscalculated. I have confirmed my initial conclusion. No new relevant data. It is safe to proceed.\"\n\n\t\tYou give the go-ahead to enter the anomaly. At least nothing bad can happen inside, right?\n\t\tXgoto anomaly\n\n\n\t\tXlabel anomaly\n\t\tXpage_break\n\t\tThings get weird very quickly. You remember entering the anomaly but your memories are fuzzy after that point. It's almost impossible to put events in order, but you sense an overwhelming feeling of desparation. You might call it...futility. Like being trapped on a circlular track with no exits. \n\n\t\tYou blink and find yourself sitting in your captain's chair. A chaotic scene unfolds before you, and it's a specific type of chaos you've experienced over and over again. Bargle yells an obscenity that rhymes with Jupiter and uses his stomach arm to hurl an astro wrench at Hint from across the command deck. Hint retaliates with a condescending comment, extending her arms to grasp Bargle, who glows a deep red. The wrench bonks harmlessly off Hint's seemingly impervious body. \n\n\t\tMiss Foster attempts to intervene and implores them to calm down, repeating, \"Joe didn't mean what he said!\" However, the brawling crewmates ignore her pleas, and somehow your science officer's black cocktail dress is ripped several inches down the back even in the absence of any pointy objects. \n\n\t\tSpeaking of Joe, he cowers in the back corner by the escape hatch, sobbing about something, his arms wrapped around his knees. It figures Joe would be the cause of this! He's the worst!\n\n\t\tHint starts to squeeze Bargle, who reaches out with his stomach arm for one of his ominous-looking invention hanging on a hook. You assume it's a weapon. \n\n\t\tIt's tough to process everything going on. You take a few seconds to consider your options and then take action. What do you do?\n\t\tXchoice\n\t\tXXI hit the large red button on the wall marked \"Complete System Reboot (This Includes Hint)\"\n\t\tYou slap the button and Hint immediately freezes and tips over with a clang. Bargle smirks and takes the weapon off the hook, aiming it at Joe. \"That robot can't save you now.\"\n\t\tXgoto round_2 \n\t\tXXI kick the potential weapon away from Bargle.\n\t\tAs soon as Bargle grasps the item, you kick it from his hand, knocking it across the command center. Hint squeezes Bargle harder, explaining to you, \"Thank you for the assist, Captain. Jim Bargle planned to terminate a crew member.\"\n\t\tXgoto round_2 \n\t\tXXI take a tarp and cover Miss Foster.\n\t\tYour science officer wraps herself in the tarp and points to Bargle. \"Captain, we have to stop them! He was going to kill Joe!\"\n\t\tXgoto round_2 \n\t\tXXI confront Joe and ask why he's sobbing.\n\t\tJoe just blubbers, \"Captain, Bargle said...he was going to...vaporize me!\"\n\t\tXgoto round_2 \n\n\t\tXlabel round_2\n\t\tXpage_break\n\t\tWhoosh! Everything gets blurry...you almost fall to the ground as the temporal cycle restarts. Now you're back in your captain's chair. You blink and you're greeted with the same chaos. You have to figure out a way to escape this cycle before you go mad!\n\n\t\tThe cycle only lasts a few moments. If you don't act quickly to find an 'exit,' the cycle will just restart and any progress you will have made will be lost. But first you need to figure out what's going on. Why does Bargle want to kill Joe? And what did Joe say that started this scene? If you act immediately, you may gain a few extra seconds!\n\n\t\tWhat do you do?\n\t\tXchoice\n\t\tXXI hit the large red button on the wall marked \"Complete System Reboot (This Includes Hint)\"\n\t\tYou slap the button and Hint immediately freezes and tips over with a clang. Bargle smirks and takes the weapon off the hook, aiming it at Joe. \"That robot can't save you now.\"\n\t\tXgoto round_3_bargle\n\t\tXXI kick the potential weapon away from Bargle.\n\t\tAs soon as Bargle grasps the item, you kick it from his hand, knocking it across the command center. Hint squeezes Bargle harder, explaining to you, \"Thank you for the assist, Captain. Jim Bargle planned to terminate a crew member.\"\n\t\tXgoto round_3_hint\n\t\tXXI take a tarp and cover Miss Foster.\n\t\tYour science officer wraps herself in the tarp and points to Bargle. \"Captain, we have to stop them! He was going to kill Joe!\"\n\t\tXgoto round_3_foster\n\t\tXXI confront Joe and ask why he's sobbing.\n\t\tJoe just blubbers, \"Captain, Bargle said...he was going to...vaporize me!\"\n\t\tXgoto round_3_joe\n\n\t\tXlabel round_3_bargle\n\t\tXpage_break\n\t\tBefore Bargle can fire, you leap into his line of fire and urge him to holster his weapon and explain himself.\n\n\t\tBargle, glowing like a red giant, scowls. \"Captain, Joe said we should stage a mutiny! He said he could get us out of here...wherever here is!\"\n\t\tXgoto round4\n\n\t\tXlabel round_3_hint\n\t\tXpage_break\n\t\tYou ask Hint why Bargle had planned to terminate Joe.\n\n\t\tHint's eyes glow as she simply explains Bargle's motivation. \"A simple answer, Captain. Crewman Joe had suggested we participate in a mutiny against you. I suggested he be apprehended and jailed in the cargo hold. Bargle had a more...permanent solution.\"\n\t\tXgoto round4\n\n\t\tXlabel round_3_foster\n\t\tXpage_break\n\t\tYou quickly ask Miss Foster why Bargle is trying to kill Joe.\n\n\t\tMiss Foster gasps her answer in overly dramatic fashion. \"Captain! Joe wanted us to...to...join in a mutiny against you!\"\n\t\tXgoto round4\n\n\t\tXlabel round_3_joe\n\t\tXpage_break\n\t\tBefore Joe can speak, Miss Foster gasps in overly dramatic fashion. \"Captain! Joe wanted us to...to...join in a mutiny against you!\"\n\n\t\tBargle and Hint stop fighting and confirm Miss Foster's statement. Bargle reluctantly holsters his weapon and Hint releases him, advising you, \"It is true, Captain. He planted the seeds of revolt. We declined.\"\n\t\tXgoto round4\n\n\t\tXlabel round4\n\t\tXpage_break\n\t\tWhoosh! Everything gets blurry...you almost fall to the ground as the temporal cycle restarts. Now you're back in your captain's chair. You blink and you're greeted with the same chaos. But now you know how to quickly resolve the conflict! \n\n\t\tYou kick Bargle's weapon out of his hand right into the large red button on the wall marked \"Complete System Reboot (This Includes Hint),\" nullifying the immediate threat from both crew members. Tossing a tarp to Miss Foster, you glance to Joe and tell him...\n\n\t\tXchoice\n\t\tXX\"I'll try to forgive you.\"\n\t\tXset idealism %+20\n\t\tXgoto round5\n\t\tXX\"I'll never forgive you.\"\n\t\tXset idealism %-20\n\t\tXgoto round5\n\t\tXX\"I should launch you into outer space and watch you splatter like a brain leech.\"\n\t\tXset maverick %+20\n\t\tXgoto round5\n\t\tXX\"When we get out of this, I'm taking you straight to the proper authorities. I promise you that.\"\n\t\tXset maverick %-20\n\t\tXgoto round5\n\n\t\tXlabel round5\n\t\tXpage_break\n\t\tBut for now, you need to focus on escaping from the anomaly. You only have a few moments. What's your plan?\n\n\t\tXchoice\n\t\tXXI overload the ship's ion core to cause a massive burst of speed!\n\t\tXset flying %+20\n\t\tXset maverick %+20\n\t\tXgoto flying_win\n\t\tXXI use the ship's blasters to create a rift in the temporal anomaly!\n\t\tXset lazer_pistol %+20\n\t\tXset maverick %+20\n\t\tXgoto shooting_win\n\t\tXXI wonder if our science officer can figure a way out of this! It's her area of expertise, after all!\n\t\tXset curiosity %+20\n\t\tXset maverick %-20\n\t\tXgoto science_win\n\n\t\tXlabel flying_win\n\t\tWhoooooooooosh! The crew goes tumbling around the command center as your ship rockets to life. Hint skids across the floor, clanging against your captain's chair. Bargle and Joe slam against the cargo doors, pressed against the metal by the sheer force of the rapid acceleration. Miss Foster manages to hold onto her fake console with barely a hair out of place. What a gal!\n\n\t\tThen the engines die. All is quiet, other than the groans of your various crew members attempting to get to their feet. \n\n\t\tYour eyes scan the display console. The readings show that you've returned to normal space at exactly the same time and position marking your initial discovery of the space anomaly. You've done it! You've saved your crew! They'll be so thankful!\n\t\tXgoto end\n\n\n\n\t\tXlabel shooting_win\n\t\tPew! Pew! Pew! Pew! Your ship's lasers create a rift not quite large enough for your ship to enter. But your efforts have drained the blasters power, and the rift slowly starts to shrink. Joe, ever the coward, covers his ears even though as we all know lasers don't make any real sounds in outer space. Bargle, instinctively undertanding your strategy, flies into action. \"Routing all auxiliary power to lasers, Captain!\" \n\n\t\tPew! Pew! Pew! Pew! You fire another volley of lasers, creating a larger rift. Miss Foster jumps to the piloting station and hits the thrusters, shooting your ship through the rift. \n\n\t\tYour eyes scan the display console. The readings show that you've returned to normal space at exactly the same time and position marking your initial discovery of the space anomaly. You've done it! You've saved your crew! They'll be so thankful!\n\t\tXgoto end\n\n\n\n\t\tXlabel science_win\n\t\tYou motion for Miss Foster to come over to Hint's (functional) station. \"Miss Foster! You're our science officer! Can you find an exit from the anomaly?\"\n\n\t\t\"The...what?\" Miss Foster squints are Hint's console and points to a bleeping gold dot. \"I'm not sure what you mean but...that spot right there...it's giving off odd readings. In theory, it could be a rift in a temporal anomaly. That is, if we were trapped in one.\"\n\n\t\tYou set the course settings for the rift and hit the thrusters. Whoooooooooosh! Your ship rockets forward as your crew grabs whatever they can grab onto. It just so happens that Miss Foster grabs ahold of you. The ships rattles and then...silence. \n\n\t\tYour eyes scan the display console. The readings show that you've returned to normal space at exactly the same time and position marking your initial discovery of the space anomaly. You and Miss Foster have done it! You've saved your crew! They'll be so thankful!\n\t\tXgoto end\n\n\n\n\n\n\t\tXlabel end\n\t\tXpage_break\n\t\tActually, because of how these types of temporal distortions work, they won't be thankful at all. They won't even remember the near disaster or, more tragicaly, your heroic actions.\n\n\t\tYou blink again. Hint's voice breaks the relative silence of the command deck. \"Captain. Sensors detect an anomaly .05 parsecs from our current location.\"\n\n\t\tMiss Foster nods in agreement, looking blankly at a navigation screen. \"Affirmative, Captain. I see a gold blip.\" \n\n\t\tYou sit up straighter in your captain's chair and glance down to your captain's log you see mostly unflattering doodles of Bargle scratching himself with his stomach arm and saying things like, \"When your father ran this ship...\"\n\n\t\tHint speaks up. \"Captain, your order?\"\n\n\t\tXfake_choice\n\t\tXX\"Ignore the anomaly. Plot our course for Party Planet Alpha. If we want to lose track of time, we can definitely do it there.\"\n\t\tXX\"Keep our current course.\" Then I wink before adding, \"We don't have...time...for that type of distraction.\" \n\t\tXXI glance over at Joe before saying, \"No. We have more pressing matters to address.\"\n\n\t\tHint nods and taps her claw on a few buttons. Bargle goes backs to tinkering and Miss Foster resumes her absent-minded focus on her golden blip.\n\n\t\tBut Joe seems different. He scowls at you and lurks back to the cargo hold. And you realize you have a problem onboard. Even though he technically never did anything, since the whole incident with the temporal anomaly never technically happened, you remember what he tried to do. He tried to rally the crew against you. He tried to take over.\n\n\t\tXif (joe_vote = \"yes\")\n\t\tAnd he also voted in favor of skipping the extra scans that may have prevented your ship from entering the anomaly in the first place.\n\t\tXgoto end2\n\t\tXif (joe_scan = \"yes\")\n\t\tAnd he also seemed to manipulate the second round of scans when Hint temporarily left her station. That seems pretty suspicious. Perhaps he altered the scans so that we would enter the anomaly.\n\t\tXgoto end2\n\t\tXelse\n\t\tXgoto end2\n\n\t\tXlabel end2\n\t\tXpage_break\n\t\tYou suspect you have a traitor on board. A traitor who was willing to sacrifice his own life to doom your entire crew to the space anomaly...from outer space!\n\n\t\tTHE END\n\t\tXfinish\n\t\t*choice\n\t\t\t#Back to Special Features.\n\t\t\t\t*goto home\n\t\t\t#Back to Drafts.\n\t\t\t\t*goto drafts\n\t#Episode Eight: The Curse of the Lautian Titan!!! by Adrao.\n\t\tXtemp Titan_suit 0\n\t\tXtemp crew_member 0\n\t\tXtemp crazyman 0\n\t\tXtemp captainlog 0\n\t\tXtemp cargo 0\n\t\tXtemp marshmellows 0\n\t\tXtemp crew_quarters 0\n\t\tXtemp bridge_examine 0\n\t\tXtemp bridge_command 0\n\t\tXtemp bridge_log 0\n\t\tXtemp titan_memory_bank 0\n\n\t\tXset hair \"beautiful\"\n\n\t\tThe Lautian Titan\n\n\t\tSamantha turns her head away from one of the flashing displays in the cockpit, which she had been inspecting for the past few minutes, and starts talking to you with a look of distress in her eyes:\n\n\t\t\"Captain, we just received an S.O.S. call from the a ship that has identified herself as 'The Beauty of Scrap', only a short distance away from here, we should go and help them!\"\n\n\t\tAn S.O.S. call, often the beginning of trouble, yet sometimes also the possibility of earning the odd Zork dollar by towing away a ship, rescuing a crew, or a cheap adrenalin rush escaping a trap by pirates!\n\n\t\tXfake_choice\n\t\tXXGather the rest of the crew to tell them that you intend to go and check the S.O.S. call\n\t\t  \n\t\tXset crew_morale %+5 \n\n\t\tYou gather the rest of the crew and explain the situation to them. Jim spits on the floor, grunting something about how much time he had to spend repairing the hull after the last fake S.O.S. pirate ambush, while Hint and Fuzzy busy themselves cleaning Jim's spit. Joe looks at you and Samantha, shrugs his shoulders and says \"Whatever, just hope we can make some money out of this ourselves...\"\n\n\t\tWell, anyway you are the captain and you have made up your mind, the possible gains clearly outweigh any dangers, so you set course to the coordinates given in the S.O.S call.\n\n\t\tXXSet up course immediately, you don't want Samantha to be upset that you let an S.O.S. call go unanswered!\n\n\t\tYou hate it when she gets sentimental, so you automatically set course to the coordinates of the S.O.S. call. \n\n\t\tThe coordinates take you to the uninhabited star system of Tritonamar V, to one of the many asteroids that circle its small red star. The main screen in the cockpit shows an image of the ship from which the S.O.S. originated, a rather small ugly piece of what looks like salvaged pieces of various other ships, held together by massive metallic beams that only contribute more to its disjointed look. Probably a scavenger ship, rooming the galaxy seeking whatever can be salvaged from abandoned ships, outposts or old mining bases. But, from the looks of it this time they won the jackpot: the ship is attached to one of the biggest warships you have seen in your entire life, probably Titan or Mammoth-class, the kind of stuff that only major Empire-building civilizations attempt to build. By the looks of its exterior this one has probably been lying around for millennia, judging by the small asteroid craters that punctuate its hull, small in comparison to the other holes that were opened in it by a variety of capital ship weaponry. The entire thing is a wreck, yet the most impressive one you have seen so far.\n\n\t\tXlabel titan_choices\n\n\t\tXchoice\n\t\tXhide_reuse XXAttempt to establish communications with the scavenging ship.\n\t\tYou tell Samantha to attempt to establish a communication channel with the mining ship, but after many tries she turns to you, visibly distraught: \n\t\t  \n\t\t\"Captain, there is no response, why wouldn't they respond to us?\"\n\t\t  \n\t\tXset maverick %-5\n\t\tXgoto Titan_choices\n\n\t\t  \n\t\tXhide_reuse XXCarry out a scan of both ships to see if any life support systems are online\n\t\tSamantha starts to tap madly at one of the displays, which shows a diagrammatic representations of both ships, green for the case of the scavenging ship -indicating all life support systems being online- but mostly red for the Lautusian Titan, with the exception of a small pale green area not far from the place where the scavenging ship attached itself to it. \n\t\tXset maverick %-5\n\n\t\tXgoto titan_choices   \n\n\t\tXhide_reuse XXAsk Samantha if she can tell you anything else about the design of the ships\n\t\tSamantha presses some of the flashing lights in one of the consoles, which brings about a number of blueprints of various types of warships, which quickly flash in succession before your eyes, as she continues to press different parts of the screen, bringing up even more information. Finally she points at a variety of different designs and says:\n\t\tXif lautian_database \u003c1\n\t\t\"Captain, it's clearly of Lautian design, from their Imperial period, quite a vessel, I have no detailed information about it, yet it looks similar to Class VII or XIII Imperial Titans. It appears that she took quite a battering... Lautians haven't built any such ships for millennia now, or been in any war that I am aware of, so she has probably been here for some time...\"\n\t\tXgoto titan_choices\n\n\t\tXelse   \n\t\t\"It's a Lautian design, from their late Imperial period, a Class XXIII Planet Buster Imperial Titan, a warship specialized in planetary bombardment and biological warfare. Only one was ever built, 'Xeno-extermination Mark I', likely the ship in front of us... According to the database that we obtained in Lautus it was lost during a major planetary battle in the outskirts of Hugghat III while facing the Azzhrkak Ascendancy, one of the first civilizations that the Zorks helped. The battle went badly for the Lautians and this ship attempted to escape but nothing was ever heard of her again. Almost the entire 7th Lautian Fleet was lost that day, a huge blow to the Lautians, with the loss of life making them rethink their attitudes to war... but... Biological warfare... that's just evil!\"\n\t\t\t\t\t  \n\t\tTears start pouring from her face, visibly moved from the possibility that a race could exterminate entire worlds. \n\n\t\tXgoto titan_choices\n\n\t\tXhide_reuse XXFly around the Lautian Imperial Titan to get a better idea of the magnitude of the damage it took.\n\n\t\tXset maverick %-5\n\n\t\tYou manoeuvre your ship around the Lautian Imperial Titan, which reveals that she did indeed take a heavy pounding from all directions. However, while flying around you discover that quite a number of other scavenging ships have also attached themselves to the Titan, with a quick scan indicating that some of them have been there for millennia, with others being far more recent. Samantha screams as she sees this:\n\n\t\t\"Captain I don't like the look of this at all, we should leave immediately!. I'm really afraid of this place...\"\n\n\t\tWhat a gal! The high pitch of
