er personally recruited Johannes Lenz to Ahnenerbe, specifically for his open-mindedness regarding the possibility of an ancient Nordic \ncivilization that had risen to prominence in Europe and the Americas.  As is well known, Himmler's pursuit to prove the racial superiority of \nthe German people turned to occultism and pseudoscience, and the activities and research conducted at Ahnenberbe reflected this.  \n\nThough Lenz contends that he does not believe in occultism, he was a key researcher at Ahnenerbe.  He led excavations at sites in Norway that \npertained to 17th Century Esotericism.  These sites included the \"Old Trondhjem Church.\"  His most famous paper from that time was on the use of \nthe \"Eye of Providence\" or \"All-Seeing Eye\" in churches in Czechoslovakia, Poland, and Scandinavia.  There is evidence that Lenz was considered \nfor the 1938 SS Ahnenerbe expedition to Tibet led by zoologist Ernst Schafer; Lenz has stated that his disagreements with Hans F. K. Gunther's \nbelief that the Aryans had conquered Asia allowed him to continue his work in Europe.\n\n*page_break\n\nAt the end of the war, Lenz was recruited by the United States through Operation Paperclip.  He was posted at Miskatonic University as a professor \nof archaeology.  After the formation of CIA, State Department funding was granted for his expeditions into South America.  His most effective placement \nhas been in the tropical country of Costaguana where Lenz has spent nearly two decades excavating the so-called \"Eastern City.\"\n\nDr. Lucius Thayer, an American professor at Miskatonic University, has been participating at the dig site for nearly a decade.  As an existing member \nof the project, he is the strongest candidate to replace Lenz.  Agents have been in contact.  With Socialist forces gaining new legitimacy in South America, \nit is imperative that we retain contacts in Costaguana.\n\nQUERY SERA:\n*choice\n\t#Dr. Lucius Thayer\n\t\t*goto_scene Thayer_arrives\n\t#Costaguana - World Factbook\n\t\t*goto_scene Costaguana_Factbook\n\t#Eastern City\n\t\t*goto_scene Eastern_City", "lenz_dies": "*gosub_scene adcheck\n*label Lenz_dies\nletter from Dr. Lenz, J. PhD to Lt. Col. Keegan, S.\n\n30 October 1994\n\nDear Sloane,\n\nI am sick, and I fear I may be dying.  As I write to you about it, I'm beginning to think that you're the only person who would care.  Initially, \nI believed I had the flu, but my symptoms have been getting worse.  The latest gifts from this illness are painful boils all over my skin.  The \nCostaguanan jungle is unforgiving.  Those Americans who say we should \"save the rainforest\" have evidently never had to survive in one.  I should \nthink that most of those overweight, blowhard couch potatoes would demand that we destroy all rainforests if they were forced to spend a week in one.\n\nI fell ill following the discovery of the Labyrinth in the Northwest Gully.  Though the team has been digging in the gully for weeks, I was alone \nwhen I found the Labyrinth.  The Emage were celebrating the Winter Solstice with a fiesta in town, and the celebrations gave me an easy excuse to \nmake Thayer and Cardinale take the day off, along with most of the other diggers.  If, as you say, Isabel Cardinale is a swallow, then Thayer is \ncompromised;  but digging alone was not easy.\n*page_break\nThe Labyrinth itself was a pattern of stone on the ground, not unlike Medieval cathedral labyrinths; however, this pattern lacked the geometric \ndiscipline of those constructions.  The design was more primitive, almost wild.  The lines branch and curl and swirve.  They call to mind the undulating\ntentacles of a squid.\n\nPerhaps it was simply because I am growing old, but I grew more tired and short of breath with every stone of the Labyrinth that I uncovered.  \nStorm clouds began to gather.  The jungle grew oddly quiet.\n\nI had nearly uncovered the entire pattern when it began to rain.  The mud and debris from the outside of the hole began to wash in.  The location \nis a gully after all, and soon I found myself up to my elbows in mud.  That was when my fever first hit, I think.  I became caught up in the delusion \nthat the rain and mud were burying the entire dig site, as if the earth itself were swallowing up the Eastern City.  \n*page_break\nUnbeknownst to me, Jairo was there at the site.  He pulled me out of that bog.  We watched as, in less than an hour, the rain buried the Labyrinth \nall over again.  Such is the result of digging alone.  That was two weeks ago, and digging has halted since then.\n\nI have told no one about the site of the Labyrinth.  I have asked Jairo to tell no one either, but I can't say where his loyalties lie.  I suspect \nthat, more than anything, he is loyal to the Emage, his tribe.  For the time being, they distrust both America and the Communists.  \n*page_break\nThayer is well-positioned to take my place as lead on the dig.  He is the most qualified archaeologist, and he is the most knowledgeable individual \non the dig.  I have my reservations about his association with both Isabel Cardinale and Roberto Puig, but since we cannot confirm if either of them \nare Soviet assets, I will leave that problem to you.  As you so often implied, I have never felt any sense of patriotism for the country of my citizenship, \nand as long as the site is protected, I care little about who takes possession of it.\n\nThis may very well be the last I correspond with anyone, Sloane.  After all the pain we have caused one another, I can hardly count you as a friend, but I have \nno one else to say goodbye to.  I have seen a lot of horror in my life.  I have witnessed enough of it during the war to last me a lifetime.  If I have any \nwisdom to pass on to others from my death bed, it is this: the true nature of the universe is one of horror and chaos;  the pleasant order of civilization \nis merely a veneer that we use to fool ourselves into thinking that it may be otherwise.\n\nJohannes\n\nQUERY SERA:\n*choice\n\t#Labyrinth\n\t\t*goto_scene Labyrinth\n\t#Soviet assets\n\t\t*goto_scene Labyrinth\n\t#Isabel Cardinale\n\t\t*goto_scene Labyrinth\n", "lenz_digs": "*gosub_scene adcheck\n*label Lenz_digs\nletter from Dr. Cardinale, I., to Puig, R., director of the Sulaco Dept. of Antiquities\n\ntranslated from Spanish\n\n7 September 1994\n\nSenor Puig,\n\nAfter all these years, Dr. Lenz is finally digging in the Northwest Gulley.  He blamed the efforts to preserve the bas reliefs as his reason for delaying.  \nI do not doubt his reasoning; the bas reliefs were in a fragile state.  But I get the distinct impression that Dr. Lenz fears what we will find once \nwe dig up the Northwest Gully.  He has some idea of what we will find there, and I think you do, too.\n*page_break\nWhat is buried in the Northwest Gulley?  So many people wanted to dig it up, and the one person who can, the one person with the skill and authority to \ndig there, dreads the thought of uncovering that secret.  I can tell that whatever is down there, a relic, a secret piece of history, whatever the Northwest \nGulley is hiding, it's something powerful enough to ignite the ambition and the fear of so many.  \n\nI will do what I can to get to it.  I don't doubt that Thayer will help me if I ask him, but please don't leave me in a position to ask him.  I need him to \ntrust me, and anything I ask of him that would directly go against what Dr. Lenz wants will cause him to doubt me.\n\n--Isabel\n\nQUERY SERA:\n*choice\n\t#Isabel working for Puig\n\t\t*goto_scene Puig_Isabel\n\t#Roberto Puig, background\n\t\t*goto_scene Soviet_Puig\n\t#Isabel lies to Thayer\n\t\t*goto_scene first_contact\n", "lenz_file": "*gosub_scene adcheck\n*label Lenz_file\nextracted from CIA FILE 998112311(1993):\n\n...Lenz will not admit if one of the chairs at the Round Table belonged to him, but clearly, he was a regular visitor to \nWewelsburg Castle.  With his knowledge of Western esotericism, Lenz was the obvious choice for creating/recreating the \nPagan rituals that Himmler and the SS conducted at Wewelsburg.  Lenz was unwilling to go into detail, but much of the knowledge \nhe gained through his research in Norway informed the rites used by the Nazis.  He has implied that he made Himmler aware \nof the \"Black Sun,\" or \"Sonnenrad,\" symbol that is used in the mosaic on the castle's floor.\n\nNote that, like the Soviet scientists researching the paranormal, Dr. Lenz does claim to be skeptical of magic.  That said, \nLenz is very respectful of the belief in magic, and he has given many the impression that he does believe.  After the war, Lenz \nwas instrumental in giving General Patton access to the Spear of Destiny and the rest of the relics of the Imperial Regalia \n(that were subsequently returned to Austria).  Patton is said to have referred to Lenz as \"that warlock with Paperclip\"...\n\nQUERY SERA:\n*choice\n\t#Soviet paranormal research\n\t\t*goto_scene Russian_bar\n\t#magic in Costaguana\n\t\t*goto_scene plague_2015\n", "lenz_funeral": "*gosub_scene adcheck\n*label Lenz_funeral\nTHE ARKHAM DAILY VOICE\n\n3 November 1994\n\nOBITUARIES\n\nMISKATONIC MOURNS ESTEEMED ARCHAEOLOGIST\n\nArkham, MA. - Students and faculty are mourning the loss of Dr. Johannes Lenz, the esteemed Professor Emeritus of Archaeology at Miskatonic \nUniversity.  Though Dr. Lenz had retired from teaching two years ago, the 87-year-old was still hard at work, excavating the ruins of the \nPre-Colombian \"Eastern City\" in Costaguana, South America.  The Eastern City has become famous in recent years due to the growing popularity of \nthe fringe theory that a Pre-Incan race of giants built that city and other megalithic structures in the region.\n\nDoctors have said that during his latest expedition, Dr. Lenz contracted a particularly aggressive form of Chagas disease, but he did not suffer \nlong.  After a contentious legal battle with Costaguanan government officials, Dr. Lenz's body was released from quarantine and flown back to \nArkham where it arrived yesterday.  Dr. Lucius Thayer, PhD., professor of archaeology at Miskatonic University, has worked with Dr. Lenz for \nmany years, and is now in charge of excavations at the Eastern City, had measured comments regarding Costaguanan officials.\n\n\"It's understandable,\" Dr. Thayer said. \"The government of Costaguana wanted to be sure that the body was safe for transportation.  Luckily, we \nare on friendly terms with officials there, and after the proper paperwork was filed, the body was released.\"\n\nDr. Lenz was married in 1955 to Sloane Keegan, but the childless couple was divorced four years later.\n\nFuneral services will be held tomorrow at 3 p.m. in the Miskatonic University Chapel.\n\nQUERY SERA:\n*choice\n\t#Pre-Incan giants\n\t\t*goto_scene hoax_skulls\n\t#Dr. Thayer's excavations\n\t\t*goto_scene Thayer_dig\n\t#Sloane Keegan\n\t\t*goto_scene presidents\n", "lincoln_giants": "*gosub_scene adcheck\n*label Lincoln_giants\nfrom the writings of Abraham Lincon, circa 25-30 September 1848\n\n\"[Niagra Falls] calls up the indefinite past.  When Columbus first sought this continent - when Christ suffered on the cross - when Moses led Israel \nthrough the Red-Sea, nay, even, when Adam first came from the hand of his Maker - then as now, Niagara was roaring here.  The eyes of that species \nof extinct giants, whose bones fill the mounds of America, have gazed on Niagara, as ours do now.  Co[n]temporary with the whole race of men, and older \nthan the first man, Niagara is strong, and fresh to-day as ten thousand years ago.\"\n*page_break\nMargin notes by Dr. Thayer, L., PhD.\n\nc. June 2002.\n\nA few have contended that the \"extinct giants\" in Lincoln's note on Niagra Falls are actually the \"Mammoth and Mastadon\" that he refers to later in \nthe passage, but the quote specifically refers to bones that \"fill the mounds of America.\"  With so many news articles from the time telling stories of giant \nskeletons found in burial mounds, there is little doubt that Lincoln believed in this race of giants.\n\nThe question now is, do I?  The Vircocha myth is one thing, and the writings of Magellan's man is another.  But Isabel's stone foot is in a league of its own.  \nI have to see this megalith for myself.  I NEED to see it for myself.  \n\nQUERY SERA:\n*choice\n\t#Viracocha myth\n\t\t*goto_scene brainless_giants\n\t#Magellan's giant\n\t\t*goto_scene Patagonia_giant\n\t#Isabel's stone foot\n\t\t*goto_scene Isabel_statue\n", "lower_city": "*gosub_scene adcheck\n*label Lower_City\nfrom the journal of Dr. Thayer, L., PhD.\n\n17 October 1988\n\nI went with Isabel to the Lower City to see this \"Saint of Darkness.\"  Jairo Becker (driver on the dig) accompanied us as kind of security.  The rainy season \nis running late this year, and some of the streets were flooded from the bay.  We were lucky to have Jairo as he knows the neighborhood alarmingly well.  \nI write \"alarmingly\" because it's a well-known fact that the worst kind of street gangs run the Lower City.\n\nAn empty lot in the neighborhood of the area's Catholic Church is the Saint's usual location for sermonizing, but today it was flooded.  Isabel asked the \nlocals where we could find the Saint of Darkness, and after two or three hours, we found her new \"mount\" for sermonizing:  a trash heap that overlooks the ports.\n*page_break\nThere were a few other people who had sought out the Saint, like Isabel and I had.  Isabel knew a man there named \"Puig,\" like the novelist.  But most of \nher congregation were the denizens of the neighborhood who go there to sift through the refuse of more fortunate Costaguanans.  When we arrived, they had all \nbut stopped their work, listening to the preaching of this scrawny, ten-year-old girl.  I hadn't been told about the preaching.  From what I caught there was \nsome syncretic blending of Catholicism and Emage traditions in her sermon.  But she had no visions today.  Apparently, she doesn't have them every time.  I \nsuppose that would be very taxing for such a young girl.  \n\nWe spoke with her after her sermon.  The real name of the Saint of Darkness is Rebelle or something, and she was all smiles and hugs with Isabel.  I know \nIsabel has her charm, and though the girl-saint seems innocent enough, I cannot trust that there is no one goading her on; her father stayed very close to \nher the entire time.  Of course, that may all be due to paternal protection.\n\nQUERY SERA:\n*choice\n\t#Roberto Puig, background\n\t\t*goto_scene Soviet_Puig\n\t#Isabel, Saint of Darkness\n\t\t*goto_scene Lenz_digs\n\t#Emage, Saint of Darkness\n\t\t*goto_scene assassinate_Cabrero", "mib_visit": "*gosub_scene adcheck\n*label MIB_visit\nfrom a report filed by agent call sign SHAMUS\n\n4 September 1995\n\nA pale man in a black suit visited Dr. Thayer at his apartment in Sulaco.  This has to be the individual cited before, \nwho visited Dr. Lenz and possibly was seen with BLACKBIRD in Arkham.\n\nThayer has told me that this person warned him to stop digging in the Eastern City and to stop researching the lost \npeoples of Costaguana.  The pale man told Thayer that there would be \"dire consequences\" if he continued his research.\n\nThayer observed that this individual had no eyebrows.\n*page_break\nThayer said he may have once seen the pale man with Dr. Lenz, but Thayer was unaware of the many other times the man \nhas been sighted.  Thayer believes that the man was just a kook who has read too much \"ancient alien\" literature.\n\nI don't think this kook is harmless.  He's probably working for the same organization as BLACKBIRD.  I didn't have the \nmanpower to tail this pale man in a black suit.  We need more people, or I need authorization to detain this person \nthe next time I see him.  I'd prefer having more people.  Detaining this person would reveal our presence to him and his \norganization, and without knowing the extent of his involvement and knowledge, that's a high risk for very little reward.  \n\nQUERY SERA:\n*choice\n\t#further contact between Thayer and the pale man?\n\t\t*goto_scene MIB_visit_2\n\t#sightings of the pale man in black\n\t\t*goto_scene Mary_Halsey_2\n", "mib_visit_2": "*gosub_scene adcheck\n*label MIB_visit_2\nfrom the CIA interview of Beecher, K., a Miskatonic student under Dr. Thayer, L. at the Eastern City\n\n\nInterview conducted by \"TIM.\"\n\n\nTIM: A pale man in a black suit was talking with Dr. Thayer?  At the dig site?\n\nBEECHER:  Yeah.  He kind of smelled like, I dunno.  Musty.  And he didn't have any eyebrows.\n\nTIM:  How old was he?  About fifty?\n\nBEECHER:  Oh, no way.  He was maybe thirty years old.\n\nTIM:  Maybe it's someone else...\n\nBEECHER:  Who were you expecting?  \n\nTIM:  What did Dr. Thayer say to this pale man?\n\nBEECHER:  Well, I didn't see them at first.  I was over by the Northwest Gulley.  Then I heard Dr. Thayer shouting.  \nI went over and there was that pale guy just standing quiet as Dr. Thayer was shouting in his face.\n\nTIM: About what?\n\nBEECHER:  He was speaking Spanish, so I'm not one hundred percent sure, but I think he was telling him to leave.  \nI thought the pale guy was trespassing or something.  He seemed, y'know.  Kind of stupid.  He didn't leave till he gave me an envelope.\n\nTIM:  An envelope?\n\nBEECHER:  One of those big ones.  Y'know?\n\nTIM:  What was in the envelope?\n\nBEECHER:  I don't know.  I gave it to Dr. Thayer.\n\nTIM:  You have no idea?\n\nBEECHER:  No.  It had his name on it, so I didn't open it.  Geez.\n\n\nQUERY SERA:\n*choice\n\t#spies access Eastern City\n\t\t*goto_scene Sloane_interview_2\n\t#did Thayer work with the man in black?\n\t\t*goto_scene Mary_Halsey_2\n\t#who is the older pale man in black?\n\t\t*goto_scene Mary_Halsey_2", "mary_halsey": "*gosub_scene adcheck\n*label Mary_Halsey\nfrom the CIA interview of Mrs. Thayer, M.\n\nInterview conducted by \"TIM.\"\n\nTIM:  ...and you married in Ninety-Nine?\n\nMRS. THAYER:  In November.  We'd dated for only two years or so.  But I had known Lucius for several years already.\n\nTIM:  Through your father Dean Malcolm Halsey?\n\nMRS. THAYER:  Yes.\n\nTIM:  Did your husband ever speak to you about any enemies he has?  Political enemies in particular.\n\nMRS. THAYER:  Lucius makes no secret about the fact that he hates the Emage rebels.  Maybe \"hate\" is too strong a word.  He is a vociferous \ndetractor of the Emage rebellion.  Especially when it comes to their claim on his Eastern City.\n\nTIM:  Do you know if he received any kind of threats from the Emage?\n\nMRS.  THAYER:  Young man, I want you to understand, my husband bears no ill will to the Emage as a tribe.  The political situation down there \ncan be quite confusing.  Most of the Emage aren't rebels.  Not actively, in any case.  The rest are just indigent tribespeople, like so many other \ndestitute natives living in a Post-Colonial country.\n\nTIM:  Sure.  But did he receive any threats?\n\nMRS. THAYER:  No.\n\nTIM:  Was Dr. Thayer in correspondence with anyone in Costaguana?\n\nMRS. THAYER:  Yes.  Roberto Puig at the Department of Antiquities.  Some drinking buddy of his:  Roger May or Mays or something.  He writes Lucius \nletters from time to time, like he doesn't have an email account or something.\n\nTIM:  What about Dr. Isabel Cardinale?\n\nMRS. THAYER:  Oh, no.  That student of his?  We'd see her on the television sometimes.  You know, they never put her on a show with REAL archaeologists.  \nSome of those programs are strictly about magic.  Not illusion, mind you.  Magic.  Of all the preposterous things.\n\nTIM:  Dr. Thayer wasn't in contact with Dr. Cardinale.\n\nMRS.  THAYER:  Young man, I said, \"No.\"  I did meet her once, you know.  She visited Arkham back when Professor Lenz was still alive.  I was still a teenager.  \nI thought her very exotic.  He fired her, you know.  Lucius did.  Lucius says she was somehow involved with the narco-terrorists down there.  I guess between that \nand her crazy theories, well.  She just wasn't a serious archaeologist.\n\nQUERY SERA:\n*choice\n\t#Isabel Cardinale, magic\n\t\t*goto_scene Isabel_magic\n\t#Isabel Cardinale, Arkham\n\t\t*goto_scene Isabel_Arkham\n\t#narco-terrorists\n\t\t*goto_scene Narco_rebels ", "mary_halsey_2": "*gosub_scene adcheck\n*label Mary_Halsey_2\nfrom the CIA interview of Mrs. Thayer, M.\n\nInterview conducted by \"TIM.\"\n\nTIM:  When was this?\n\nMRS. THAYER:  Oh, I don't know.  Maybe two years ago.  He rang our doorbell, and asked for Professor Thayer.  \nLucius wasn't home, and I wasn't going to let some stranger into my house.  I told him to see Lucius during office hours.\n\nTIM:  This man who visited your house, would you say he was pale?\n\nMRS. THAYER:  Pale?  Young man, we live in Massachusetts.  Everyone's pale.  In Arkham, even people with dark skin are pale.\n\nTIM:  Fair enough.  But he was wearing black.\n\nMRS.  THAYER:  I did notice he had no eyebrows.  I know that can be a thing with you young people these days, but you usually \ndraw them in after you shave them off, don't you?  But this person was definitely not American.  I assumed he was a grad \nstudent from Eastern Europe or something.\n\nTIM:  Eastern Europe?  Did he have an accent?  Maybe a Russian accent?  \n\nMRS. THAYER:  I'd say he had no accent at all.  Nothing regional to the United States or Great Britain.  His English was so \nprecise, it was like he'd learned it from reading the Phonetic alphabet.\n\nTIM:  Phonetic alphabet?  Oh, you mean those little symbols in the dictionary that say how to pronounce words.\n\nMRS. THAYER: Well, that's what the Phonetic alphabet is, isn't it?  I'm shocked young people these days even know what a dictionary is.\t\n\nTIM: If he didn't have an accent, why did you think he was Eastern European?\n\nMRS. THAYER: You do ask the strangest questions.  Roberto Puig recommended some Eastern European students to Miskatonic.  \n\nTIM:  We don't have information on these students.\n\nMRS. THAYER: What business do you have knowing who enrolls at our university?\n\nTIM: Dr. Thayer still should have informed us he was in contact with Roberto Puig.\n\nMRS. THAYER: That was long before he was working with you.\n\nQUERY SERA:\n*choice\n\t#Russian man in black?\n\t\t*goto_scene Russian_bar_2\n\t#Puig, man in black?\n\t\t*goto_scene Puig_stranger\n\t#Thayer working with CIA?\n\t\t*goto_scene Thayer_CIA\n", "mary_letter": "*gosub_scene adcheck\n*label Mary_letter\nletter from Mrs. Thayer, M. to Dr. Thayer, L. PhD.\n5 May 2000\n\nDear Lucius,\n\nI hope this letter finds you well.  I mailed a letter for you to Peru, and it came back to me three days AFTER I received your \nletter from Patagonia.  I know that losing the right to excavate the Eastern City heartbreaking.  We all felt disappointed, but I don't \nthink galivanting across South America should be the answer.  \n\nDaddy defends you, of course.  He tells me that you're \"finding yourself,\" looking for a new purpose after all you went through in \nCostaguana.  I never understood that phrase: \"finding yourself.\"  A person is always with him or herself.  You don't need to take a \nsabbatical or a gap year to \"eat, pray, and love\" until you find yourself.  My mother was one of those people who travelled the world \nin the hope that something she found could somehow serve as a reflection of who she was or wanted to be.  But you don't need refection \nto find your identity, to find you purpose.  You need action.\n*page_break\nDo you remember Dr. Lenz's wife Sloane?  I suppose they were divorced by the time you came to Miskatonic.  She was a severe woman, and \nthere were rumors among the faculty that she'd been a spy during World War Two.  When I was eleven, I cornered her at a faculty party my \nfather was hosting.  I asked her point blank if she was a spy.\n\nShe told me that life itself was probably some chemical accident, that a human life had as much meaning and purpose as a dayfly.  And if \nlife has no meaning, she said, we can give it any meaning we want.\n*page_break\nArrogant brat that I was, I told her she was full of it.  Thankfully, she just laughed.\n\nDarling, you don't need to \"find yourself.\"  You can be whomever you want.  You just have to decide and then do it.  If you are the \narchaeologist discovering the secrets of the Eastern City, be that man.  Find a way back to the Eastern City.  \n\nAnd find your way back home to me and to Brian.  He's always asking for daddy.  We both miss you very much.\n\nLove,\n\nMary and Brian\n\nQUERY SERA:\n*choice\n\t#Sloan Keegan, Miskatonic\n\t\t*goto_scene plague_2017\n\t#How does Thayer return to Costaguana?\n\t\t*goto_scene visas", "mays_one": "*gosub_scene adcheck\n*label Mays_one\nemail from Dr. Thayer, L. PhD. to Thayer, M.\n\nNazca, Peru. 12 March 2000\n\nDear Mary,\n\nI hired an ultralight to take me over the Nazca lines.  Their grandeur is staggering.  In Costaguana we had only one geoglyph to study, but here, there \nare dozens.  More are still being discovered.  Yet, it's all so chaotic.  Perhaps like Troy, buried under the cities that succeeded it, the mix of geoglyphs \nhere are the result of civilizations building on top of one another.\n\nAs wondrous as I find it all, these miracles of forgotten history are not mine; they are not the Eastern City.  I'll study it because it's all I have until \nwe're allowed back into Costaguana, but I must keep pushing for permission to return to my real project.  I know in my brain that it's not my fault we had \nto leave, but in my heart, I feel that I've somehow let Dr. Lenz down.  I don't want his research to die with him.  He died at the Eastern City, rambling \nnonsense about an evil labyrinth, as if he were the Saint of Darkness.\n*page_break\nIn retrospect, I would have been better off if I'd trusted the Saint of Darkness.  Instead, I trusted Roberto Puig.  You're lucky you've \nnever met him.  I haven't told you of the subterfuge I shared with him regarding the discovery of Lenz's geoglyph.  For over a decade, we have told the lie \nthat my friend Roger, the bush pilot, discovered the geoglyph as he flew out of Sulaco.  In truth, it was more likely a pilot flying drugs out of Costaguana who \nfirst sighted the geoglyph.  That pilot then contacted Puig.  I was already friends with Mays, and for a few hundred dollars, he flew me over the sight and \nclaimed to be the geoglyph's discoverer.\n\nI'm bitter and spilling secrets.  I hear that Roberto Puig is becoming something of a political player in Sulaco, and you should not tell anyone the truth \nabout the discovery of the geoglyph.  Telling this story would reveal his ties to narco-traffickers, and I doubt he'd forgive that kind of political scandal.\n*page_break\nI love and miss you.  Give the baby a kiss for me.  In a couple weeks, I'll be able to tell if it's worth it to me to begin any kind study down here, however \nsmall it may be.\n\nLove,\n\nLucius\n\nQUERY SERA:\n*choice\n\t#Roberto Puig\n\t\t*goto_scene El_Viejo\n\t#death of Dr. Lenz\n\t\t*goto_scene Lenz_dies\n\t#Saint of Darkness\n\t\t*goto_scene saint_Lenz", "narco_rebels": "*gosub_scene adcheck\n*label Narco_rebels\nGlobalFactbook.gov profile on the Emage rebel group \n\nThe Costaguanan government and a leftist Emage splinter group have been engaging in bloody conflict since the late 1980's.  Accurate dates are difficult \nto determine due to the decentralized nature of the group, as well as a failure for any group of said actors to name identify themselves as anything other \nthan \"Emage.\"\n\nIn the mid-to-late 1990's, the rebels received substantial Soviet funding, and the group engaged local security forces in many small skirmishes.  The late \n1990's saw the violence peak in a bombing campaign in the capital city of Sulaco.\n*page_break\nThough Costaguana's current head of state, President Jude Gonzalgo, is a member of the Socialist party, Emage politics further prolong the armed conflict \ndue to their strong nationalism, their demands for land reform, and their demands for indigenous privilege.  No longer receiving aid from the now disbanded \nSoviet Union, the Emage rebels have been funding their revolution with the trafficking of illegal cocaine.  The armed conflict with local security forces continues.\n\nQUERY SERA:\n*choice\n\t#Isabel Cardinale, bombings\n\t\t*goto_scene Isabel_bombings\n\t#Isabel Cardinale, Soviets\n\t\t*goto_scene Isabel_magic\n\t#Isabel Cardinale, Emage\n\t\t*goto_scene Isabel_friend\n", "nazca_theory": "*gosub_scene adcheck\n*label Nazca_theory\nfrom the journal of Dr. Thayer, L., PhD.\n\nNazca, Peru.  24 March 2000\n\nThe most shocking aspect of the Nazca lines is also one of its most obvious: there is no order to them.  These huge geoglyphs, that have existed in \nthis desert for millennia, are completely disorganized.  Maria Reiche may have been correct about some of the lines being an astronomical calendar, \nbut surely this theory can only apply to SOME of the lines.\n\nI am discounting the ancient astronaut theory as a matter of course, but any theory of the Nazca lines must take into account the hundreds of pyramids \nthat litter the desert.  I am inclined to believe that many of these pyramids originate with the Paracas culture that pre-dates the Nazca people, and \nif they do, it is easy to believe that many of the geoglyphs predate the Nazca culture as well.  Perhaps the Lenz geoglyph is somehow related to the \nParacas culture?\n*page_break\nIn the absence of science, an ancient culture will only have religion.  These geoglyphs must have been tied to a form of worship.  It would take more \nresearch to determine if that worship relates to astronomical calendars or perhaps something directly to do with water, as indicated by glyphs such as \nthe killer whale.  One thing I can be sure of is that the Nazca culture and the Paracas before it were deeply religious, and that their concept of the \ndivine held it as something grand, an entity or entities that existed on an epic scale.\n\nSearching all these other South American sites makes we feel like a dilettante.  The idea was to find a greater context for the Eastern City since I'm \nnot allowed to dig in the Costaguana.  Instead, I suspect my feelings are not so different than that of a man who, left by a beautiful woman, \nbegins dating women who somehow remind him of her.\n\nQUERY SERA:\n*choice\n\t#theories on the purpose of the Eastern City\n\t\t*goto_scene Sloane_letter\n\t#Lenz geoglyph\n\t\t*goto_scene Mays_one\n\t#Roberto Puig\n\t\t*goto_scene El_Viejo\n", "nephilim_genesis": "*gosub_scene adcheck\n*label Nephilim_Genesis\nfrom the notes of Dr. Thayer, L., PhD.\n\nUndated\n\n\"There were giants in the earth in those days; and also after that, when the sons of God came in unto the daughters of men, and they \nbare children to them, the same became mighty men which were of old, men of renown.\"\n--GENESIS 6:4 (KING JAMES BIBLE)\n\nNewer translations of the Bible often substitute \"Nephilim\" for \"giants.\"  Young's Literal Translation, which, as the name suggests, \nstrives to be a literal translation of the original Hebrew and Greek texts, uses \"fallen ones\" instead of \"giants.\"\n\nAnd like the giants we know from Incan mythology, these Nephilim all died in a great flood.  I keep hearing about a Christian group \ndoing research in Tiwanaku.  Interesting, considering the Vatican's history with giants in South America.\n\nQUERY SERA:\n*choice\n\t#Christian group in Tiwanaku, Peru\n\t\t*goto_scene brainless_giants\n\t#Vatican position on giants\n\t\t*goto_scene Vatican_dig\n\t#Great Flood\n\t\t*goto_scene great_flood\n", "nephilim_theory": "*gosub_scene adcheck\n*label Nephilim_theory\nfrom a report on the Wellingham Christian Foundation by Agent OUTRIDER\n\n24 March 2013\n\n...We cannot underestimate the danger that this group poses to the safety of the region, and, yes, to the world.  This is no hyperbole.  \nThe Wellingham group believes that the Nephilim, the hybrid children of angels and human women, lived in the northern Andean region.  \nThey believe that an astronomical event that they witnessed at Tiwanaku, Peru on 21 December 2012 is confirmation of the Nephilim's history \nin the region.  (I hope I do not need to remind you that 21 December 2012 was the END of the Mayan calendar.)  \n\nAgent SHAMUS also witnessed said astrological event, and he claims the group merely witnessed a meteor.  Please note that, though he is \na capable and dedicated agent, Agent SHAMUS is not a believer.  That this event on Tiwanaku did not make him a believer indicates that it \nwas likely as he described.\n*page_break\nMisguided faith can make the most intelligent individual act naive.  Dozens of normally rational people can see a sign in a simple falling \nstar.  And those who only look for the good in people, as I fear the Wellingham group does, will choose not to believe in evil, even if it \nreaches out and touches them.\n\nThayer is closer to the Labyrinth than he's been in nearly a decade.  The Wellingham group cannot be allowed anywhere near the Eastern City; \nwe do not need them mistaking devils for the kind of angels we need on our side.  If the documentation from the Vatican is correct, we do not \nneed men and women of misguided faith inside the Labyrinth.  I strongly suggest we increase security around the Eastern City.\n\nQUERY SERA:\n*choice\n\t#Nephilim in the bible\n\t\t*goto_scene Nephilim_Genesis\n\t#Wellingham group in Tiwanaku, Peru\n\t\t*goto_scene brainless_giants\n\t#Vatican documents\n\t\t*goto_scene Vatican_dig\n", "patagonia_giant": "*gosub_scene adcheck\n*label Patagonia_giant\nnotes found among the papers of Dr. Thayer, L., PhD.\n\nfrom the 1524 journals of Antonio Pigafetta, Italian explorer, one of Magellan's crew on the first voyage to circumnavigate the globe.\n\n\"Partendo de qui arrivassemo fino a 49 gradi a l'Antartico. Essendo l'inverno le navi intrarono in uno bon porto per invernarse. Quivi stessemo dui \nmesi senza vedere persona alcuna. Un di a l'improvviso vedessemo un uomo, de statura de gigante, che stava nudo ne la riva del porto, ballando, cantando \ne buttandose polvere sovra la testa. Il capitano generale mando uno de li nostri a lui, accio facesse li medesimi atti in segno di pace, e, fatti, lo \ncondusse in una isoletta dinanzi il capitano generale. Quando fu nella sua e nostra presenzia, molto se meraviglio e faceva segni con un dito alzato, \ncredendo venissemo dal cielo...\"\n\nParaphrased, the passage describes the sailors looking at the coast from their boat and suddenly seeing on shore a man with the \"stature of a giant,\" naked, \ndancing, singing, and throwing powder over his head.  Then, the \"capitano generale,\" that is, Magellan, sends a man to shore who brings the giant to a small \nisland.  Magellan befriends the giant, and the giant believes Magellan to be from \"cielo.\"  \"Cielo\" is often translated as \"Heaven,\" as if saying that the \ngiant thought Magellan was a kind of god, but the text says that the giant was \"con un dito alzato,\" \"with finger raised,\" ie, pointing at the sky.  The \npassage then goes on to describe the appearance of this man and his size. \n*page_break\nThose damned ancient astronaut theorists must love that bit about him pointing to the sky.  Why anyone would interpret that giant's motion as pointing to \"Heaven\" \nis beyond me;  what indigenous people had a concept of Christian Heaven?  Even if the translators simply meant to imply that the giant assumed the explorers came \nfrom a \"supernatural place,\" the skyward gesture deposits the event squarely within the realm of ancient astronaut theory.\n\nAnd the giant?  He was undoubtedly one of the now extinct Tehuelche people who were found to measure as tall as 6 foot, 6 inches, incredibly tall for the time \nperiod.  In Incan mythology the god Viracocha created \"brainless giants\" out of stone.  No doubt the Incan \"brainless giants\" were inspired by the Tehuelche, too.\n\nQUERY SERA:\n*choice\n\t#Virachona\n\t\t*goto_scene brainless_giants\n\t#ancient astronauts\n\t\t*goto_scene brainless_giants\n", "proto_tiwanaku": "*gosub_scene adcheck\n*label Proto_Tiwanaku\nfrom the journal of Dr. Thayer, L., PhD.\n\n7 February 2005\n\nI'm grateful to be back, but it's difficult to think that any of the work I do now will have any lasting impact, that it will even be taken \nseriously in the wake of what those rebels have done.  I'm horrified that they occupied the Eastern City for so long.  If they had not adopted \nIsabel's idea of a Proto-Tiwanaku people, co-opted that ancient civilization as an identity and symbol for themselves, were it not for that, \nthey may very well have razed the Eastern City to the ground.\n\nThat might have been desirable in some respects.  Their ham-fisted digging and total lack of organization has left the site a mess.  What's \nworse, the veracity of every new discovery will be questioned.  Is whatever new revelation merely rebel propaganda?  Or even worse, is that \nnew discovery a forgery?  The discoveries we made before being forced to leave were already so far off the beaten path of established history, \nit will take heaps of evidence to convince anyone of anything new that we find.\n*page_break\nAnd this new area they uncovered.  In all the years they were here, why not reveal anything about it?  The mass grave is highly indicative of \na plague.  Maybe it was the relatively normal stature of the skeletons and the significant lack of any elongated skulls;  these are not the remains \nof the giants whom the rebels claimed as their ancestors.  These are just men, women, and children who died horribly and who died together.\nAt least Lenz's geoglyphs have escaped being defaced by rebels.  If we, or any archaeologists who come after us, are lucky, they'll find a \nsite there that will confirm the evidence of plague we've discovered here.\n\nQUERY SERA:\n*choice\n\t#Lenz's geoglyphs\n\t\t*goto_scene geoglyphs\n\t#rebel occupation of the Eastern City\n\t\t*goto_scene rebel_city\n\t#Costaguanan plague\n\t\t*goto_scene Gonzalgo_sick\n", "puig_1997": "*gosub_scene adcheck\n*label Puig_1997\nletter to Ms. Halsey, M., from Dr. Thayer, L., PhD.\n\n15 September 1997\n\nDear Mary,\n\nI'm growing concerned.  One of my contacts in the Department of Antiquities here, Robert Puig, is behaving rather \nerratically.  Though he is basically a government bureaucrat, he has shown up at the excavation site every day that \nwe have been digging.  The first day, it seemed appropriate enough: he was merely checking that we had everything we \nneeded.  But for a paper pusher to come to the site every day since makes me suspicious.  \n\nPuig usually comes alone, and he usually only stays an hour or two.  He will greet us cordially enough, but then he \nwill wander through the Eastern City mumbling to himself in Spanish.  He seems to be looking for something.  This doesn't \nsound like much, once I put it to paper.  Did I mention that I once caught him eating bugs?  \n*page_break\nScouting a new location, I came across Puig to the east of our established site.  He'd found a termite's nest, and he \nwas eating as many of the insects as he could catch - that is, until he realized I was standing there watching him.  Puig \nquickly scarfed down the termites already in his hands, and then he casually walked away.  I was left speechless.\n\nI'm sure you're laughing right now, and no doubt, the sight was ludicrous.  But this man is crucial to our work here.  \nJairo Becker, a man who serves as something as a factotum on the site, assures me that Puig is fine, that he is merely \nrecovering from a slight fever.  We're all doomed if a mere fever can make us act so crazy!  But if it does, it might\nexplain all the psychic phenomenon that have been occurring for decades.\n*page_break\nLet us hope that Puig's insanity is not catching.  Write to me soon.  I miss you terribly.  Your father really should \nlet you come down here, at least for a few days (weeks?)  (months?).\n\nYours,\nLucius\n\nQUERY SERA:\n*choice\n\t#long-term infection of Red Fever\n\t\t*goto_scene interview_beecher_last\n\t#Red Fever and psychic phenomenon\n\t\t*goto_scene saint_dies", "puig_isabel": "*gosub_scene adcheck\n*label Puig_Isabel\nextracted from CIA report 9817239474F(2000):\n\n...despite no known connections between the two prior to 1998.  Dr. Isabel Cardinale's first professional contact with Roberto Puig appears to occur in \nearly 1999.  The contact was clearly professional, as Dr. Cardinale shared Puig's interest in the Eastern City.  The two began working together to end the \nEmage occupation of the excavation site.  \n\nOfficially, Dr. Cardinale's contacts within the Emage rebel group were instrumental to ending the occupation; however, her only official contact in the group \nwas Jairo Becker, formerly a member of the archaeological team led by Dr. Thayer.  Jairo Becker had already worked with the Department of Antiquities \nprior to 1998.  We suspect that Dr. Cardinale has other contacts within the Emage rebel faction.\n*page_break\nIn our analysis, the main factor leading to the end of the Emage occupation of the Eastern City was the death of twelve members of the group due to what \nappears to be carbon monoxide poisoning.  A dozen men and women were sleeping in the area known as the Northwest Gulley.  They did not wake up the next day.  \nGround seeping carbon monoxide had long been suspected in the area, but we believe an ominous prediction by the local prophet known as the \"Saint of Darkness\" \nled the majority of Emage to believe the Eastern City to be cursed...\n\nQUERY SERA:\n*choice\n\t#Thayer, Isabel Cardinale, post-1998\n\t\t*goto_scene Thayer_2000\n\t#Saint of Darkness, Northwest Gully predictions\n\t\t*goto_scene first_night\n\t#Roberto Puig, background\n\t\t*goto_scene Soviet_Puig", "puig_father": "*gosub_scene adcheck\n*label Puig_father\nExtract from a report by agent call sign SHAMUS\n\n31 May 2008\n\nGoing over the transcripts to agent AMETHYST's debrief of the walk-in Cuban agent GOVERNOR, I uncovered the nasty, little \nfact that Roberto Puig's father was NOT killed in a car accident, as stated in the public record.  \n\nRoberto Puig's father, Edward Puig de Carlos was the mayor of San Martin, a small, coastal town.  In 1979, Edward Puig \npublicly accused a business minister in General Wagner Cabrero's administration of taking bribes.  Less than a week later, \nEdward Puig died in that car crash.\n*page_break\nThese were clearly suspicious circumstances, but there was no investigation into the death.  According to the GOVERNOR, in \n1997, the Cubans recruited a police colonel who had served under General Cabrero.  That police colonel informed them that \nEdward Puig had indeed been assassinated, and that Cabrero himself had sent in the order.\n\nI don't doubt that Roberto Puig had an idea that Cabrero was behind his father's death.  It would explain his association with \nthe Soviets.  The only question is why his spying did not abate after Cabrero was ousted.  \n*page_break\nThe working theory is that Puig is working for some non-state actor, an agency or group with some unknown agenda that \nincludes gaining control of the Other World artefacts and possible weapons at the Eastern City.  GOVERNOR theorized that Puig, \nhaving learned of the existence of a possible weapon in the Eastern City, decided to take it for himself.  If there is another \nagency or group at work here, Roberto Puig himself may be its leader.\n\nQUERY SERA:\n*choice\n\t#what did Thayer dig up in the Northwest Gulley?\n\t\t*goto_scene maze_portal\n", "puig_geoglyphs": "*gosub_scene adcheck\n*label Puig_geoglyphs\nrecorded phone conversation between Puig, R. and Dr. Thayer, L., PhD.\n\nSulaco, Costaguana.  2 September 1992\n\nTHAYER:  ...Roberto?  What time is it?\n\nPUIG: Six o'clock.  One of [indecipherable] saw the site two hours ago and radioed in.\n\nTHAYER:  Wait.  Wait a minute.  You're saying someone flying a drug plane discovered ruins?  Ancient ruins?  That's amazing.  That's... But, you know.  \nWhy would he tell you about it?  Why you before, I don't know.  Why did he call you?\n\nPUIG:  Lucius.  The pilot, he, he did not see ruins.  He saw a geoglyph. \n\nTHAYER: A geoglyph.  Here?  In Costaguana?\n\nPUIG:  I don't know.  There has been logging in that area, and the rains.  Last night, I guess, well, the rains appear to have uncovered a large figure.\n\nTHAYER:  A figure.  Like a person figure?  How large?  How does it compare to the Nazca lines?\n\nPUIG:  I don't know, Lucius.  That's why I'm calling.  That's why - I just...  We must make an assessment.  We must, we have to make it NOW.\n\nTHAYER:  It doesn't sound right, Roberto.  A pilot on a drug plane saw this?  And that area you're talking about.  That area.  That's illegal logging we're \ntalking about.  We're talking...  I've - I've got to get a hold of Dr. Lenz.\n\nPUIG:  I've already tried.  I cannot find him.  I believe, that is, he is with his friend, Ms. Keegan, no?\n\nTHAYER:  No.  Maybe.  I don't know.  But he's home.  We're supposed to share a ride this morning.  So.  He's coming here.\n\nPUIG:  Lucius.  Escuche.  Perhaps... perhaps I have been too indirect.  You see, I am aware of Dr. Lenz's strong contacts at the American embassy, \nand with your country's views on the local drug trade... You understand.  It may be \"mutually beneficial\" if we keep Dr. Lenz out of this.  For the time being.\n\nTHAYER:  Roberto.  Please.  Por favor.  It's too early for this nonsense.  You have contacts in the drug trade, and, uh, and you don't want people to \nfind out.  Correct?  Can I assume these contacts are also in the logging business?  \n\nPUIG:  Lucius.  How could I possibly know these people?  How?  I'm just a man behind a desk in the Department of Antiquities.\n\nTHAYER:  Sure, of course...\n\nPUIG:  We need to discreetly distance this new discovery from these, eh, \"family\" organizations.  I called you instead of Dr. Lenz because you have a \nmore, shall we say, \"diplomatic\" view of the world.\n\nTHAYER:  All right.  Fine.  Um...  We re-do the discovery, yes?  Hmm.  I'm acquainted with a bush pilot.  He - I'll have him fly me over the site.  I can \ndo my assessment, and then, I guess we'll say my pilot friend discovered the geoglyph, if that's what it is.\n\nPUIG:  I have been assured that it is.\n\nTHAYER:  And speaking of my \"diplomatic\" view of the world, my pilot friend is going to need some monetary compensation for making this flight.  I might \nneed some of that also...\n\nQUERY SERA:\n*choice\n\t#Costaguanan drug trade\n\t\t*goto_scene Sloane_letter\n\t#Lenz geoglyph assessment\n\t\t*goto_scene Mays_one\n\t#Lenz geoglyphs theory\n\t\t*goto_scene Nazca_theory\n", "puig_stranger": "*gosub_scene adcheck\n*label Puig_stranger\nfrom CIA FILE 986643127(2008):\n\nreport by agent call sign AMETHYST\n\n...The walk-in, designated call sign GOVERNOR, spoke with the OIC in the Austrian Embassy regarding her activities \nas a Cuban agent in South America.  GOVERNOR confirmed that Robert Puig, Director of the Department of Antiquities \nin Costaguana, had previously worked as a Soviet agent.  She further informed the OIC that Puig halted all cooperation \nwith the Russian government in 1994.  The Cuban Direccion General de Inteligencia (DGI) attempted to recruit him to \nspy for them, but Puig refused.\n\nThe DGI kept tabs on Puig over the next several years.  In 2008, GOVERNOR received orders from Castro to surveil Roberto \nPuig.  GOVERNOR did not or could not share with us what motivated Castro's interest in Robert Puig; however, GOVERNOR \npersonally observed several secretive meetings between Puig and a pale man dressed in black.  \n*page_break\nGOVERNER wrongly assumed that the man in a black suit was one of ours.  Her team attempted to tail the man in the black \nsuit, whom they designated EXTRANO.  All attempts to tail and/or definitively identify EXTRANO failed.\n\nGOVERNOR reports that the secretive meetings between Roberto Puig and EXTRANO were frequent and amicable enough to imply \nthat the two men have a working relationship.  When the OIC informed GOVERNOR that EXTRANO was not a CIA asset, she suggested \nthat the relationship between Puig and EXTRANO may be of a romantic nature.\n\nQUERY SERA:\n*choice\n\t#Has EXTRANO contacted Isabel/BLACKBIRD?\t\n\t\t*goto_scene Isabel_stranger\n", "roger_reveals": "*gosub_scene adcheck\n*label Roger_reveals\nfrom the CIA interview of Dr. Thayer, L., PhD.\n\nBoston.  28 December 1997\n\nInterview conducted by agent call sign SHAMUS.\n\nSHAMUS:  Hi, Lucius.\n\nTHAYER: [name redacted]?  What are you doing here?\n\nSHAMUS:  I've kind of been keeping a secret from you.  I work for CIA.\n\nTHAYER:  The Central Intelligence Agency?  Do they know about, you know?  The cargo you were flying?\n\nSHAMUS:  Yeah.  Flying the coke for the rebels is part of this operation.  When we first met, geez, about ten years ago, I was trying to keep tabs on \nSoviet agents working in Costaguana.\n\nTHAYER:  You've been working with the CIA since we met?  Holy--!\n\nSHAMUS:  Look, I would've told you if I could.  But Dr. Lenz advised against it.\n\nTHAYER:  Dr. Lenz worked for CIA, too?  I didn't even know you two knew each other.\n\nSHAMUS:  Well, his role was a little more unofficial.  At first, half of my job was keeping an eye on him.  Making sure the Soviets didn't grab him while \nhe was in South America.  After the fall of Soviet Union in '91, I thought I'd be heading back home, but Communism is still healthy in Latin America.  Then,\nPresident Bush had to keep that War on Drugs going, and Clinton ain't really doing anything different.\n\nTHAYER:  So why am I here?\n\nSHAMUS:  Her.  Isabel Cardinale.\n\nTHAYER:  Isabel?  The \"ex-girlfriend I should hate.\"\n\nSHAMUS:  Yeah.  We think she's working for the Emage rebels.  At first we thought she was a Soviet spy, but we got a little bit of clarity since the Iron Curtain came down.  \nShe was never one of theirs.\n\nTHAYER:  [name redacted], Isabel isn't smart enough to be a spy.\n\nSHAMUS:  She was smart enough to stay on the dig for so many years.  Who has control of the Eastern City now?  Who's going to dig up whatever it was \nDr. Lenz was too afraid to dig up?\n\nTHAYER:  It's - it's - it's just circumstances...\n\nSHAMUS:  Circumstances?  It's circumstances that she was always exactly where she needed to be to get the city in the hands of the Emage?\n\nTHAYER:  I - I don't believe you.  The Emage already had Jairo Becker there.\n\nSHAMUS:  We've got our eye on him, too.  But you would tell Isabel things you wouldn't tell Jairo.  Things about the schedule of the dig.  Things about the meanings \nof different bas reliefs.  And you could convince Lenz to dig in the Northwest Gulley.\n\nTHAYER:  I...  I don't believe you.\n\nQUERY SERA:\n*choice\n\t#Emage rebels in the Eastern City\n\t\t*goto_scene Sloane_interview\n\t#Thayer, in the United States, post-1997\n\t\t*goto_scene Thayer_marries", "russian_bar": "*gosub_scene adcheck\n*label Russian_bar\nfrom the CIA interview of Beecher, K., a Miskatonic student under Dr. Thayer, L. at the Eastern City\n\nInterview conducted by \"TIM.\"\n\nTIM: ...a guy you met in a bar asked you a question?\n\nBEECHER:  You're the one who asked.\n\nTIM:  Okay.  Did he ask you about the Eastern City specifically?\n\nBEECHER:  Well, no.  It was back in, like, September.  I'd just gotten to Sulaco, and this Russian guy asks me what \nI'm doing in the city.\n\nTIM:  Russian.\n\nBEECHER:  He said he was Russian.  I don't know.  Definitely Eastern European.  Pale and skinny.  Short hair.  You know.\n\nTIM: So, what did you tell him?  Actually, just tell me what you told him that he was interested in.\n\nBEECHER:  Well, I told him I had a boyfriend back home, but I think he was just being polite, asking about him.  And \nhe knew a lot about psychic stuff, stuff happening around Costaguana.  He called it \"paranormal.\"  He told me about this one \nguy who can bend spoons with the power of his mind.  I thought he was full of it.\n\nTIM:  About the dig, Ms. Beecher.  What did you tell this Russian about the dig?\n\nBEECHER:  I don't know.  Everything, I guess.  He thought Dr. Cardinale sounded cool.  He, uh, we talked about the Emage \nrebellion a little.  He talked about that, I guess.  I don't really know much about politics.\n\nTIM:  What about Dr. Thayer?  Did he ask about the Northwest Gulley or the Labyrinth?\n\nBEECHER:  I - I can't remember.  It was a long time ago, okay?  It was definitely before we started digging up the Gulley.  \nGeez, I mean, it had to be.  That outbreak, all of that happened, like, the day after we dug up that maze.\n\nTIM:  Did you ever see the Russian again?\n\nBEECHER:  No.  He was just some tourist.  Well.  I didn't really \"see\" him again.  But I saw him in the bar a couple of times.  \nHe might've talked to Mark a couple times, too.  \n\nTIM:  Mark Hartley.  Did Hartley speak with him on his own, or did you both talk to him?\n\nBEECHER:  Like, I don't know.  I can't remember.  That bar can get really crowded.  It gets confusing, okay?  Just give me a \ncouple minutes to remember...\n\nQUERY SERA:\n*choice\n\t#paranormal Costaguana\n\t\t*goto_scene saint_named\n\t#current clandestine ops in Sulaco\n\t\t*goto_scene MIB_visit", "russian_bar_2": "*gosub_scene adcheck\n*label Russian_bar_2\nfrom the CIA interview of Beecher, K., a Miskatonic student under Dr. Thayer, L. at the Eastern City\n\nInterview conducted by \"TIM.\"\n\nBEECHER:  I remember.  The Russian.  He did ask about Dr. Thayer.\n\nTIM:  You could have lead with that.\n\nBEECHER: Wait.  He didn't really ask ABOUT Dr. Thayer.  He asked to meet him.\n\nTIM:  Why did he want to meet Dr. Thayer? I mean, what did he tell you?\n\nBEECHER:  Like, we talked about archaeology a little bit.  He was into that whole ancient aliens thing.  He \nwanted to ask Dr. Thayer if he thought aliens had visited the Andes.  He said he'd heard the aliens were killing \npeople, like, by the dozens\n\nTIM: And you believed him?\n\nBEECHER:  I believe in a lot of things, but I don't believe in aliens.\n\nTIM:  But do you believe he wanted to speak to Dr. Thayer about aliens?\n\nBEECHER:  Well, yeah.  He wasn't the first person to want to talk about Dr. Thayer about aliens.  Everybody in \nSulaco knows about Dr. Cardinale.  She's totally a celebrity, right?  When people start talking, they realize the \nguy who knows everything is Dr. Thayer.\n\nTIM:  So did the Russian talk to Dr. Thayer?\n\nBEECHER:  I don't know.\n\nTIM:  Ms. Beecher.  It's important.  Dr. Thayer had enemies in the Russian government, a government that is not above \nassassinating people.  Did this Russian have direct contact with Dr. Thayer?\n\nBEECHER:  I totally don't know.  I barely remember the guy.  He was just a tourist, all right?  Maybe Mark knows something.  \nHe thinks Dr. Thayer was a CIA agent.\n\nQUERY SERA:\n*choice\n\t#Why would the Russians kill Dr. Thayer?\n\t\t*goto_scene Thayer_sick\n\t#Why would aliens kill people?\n\t\t*goto_scene plague_facts", "saint_mad": "*gosub_scene adcheck\n*label Saint_mad\nLetter from Dr. Cardinale, I. to Dr. Thayer, L. PhD. \n\n15 June 1990\n\nDear Lucius,\n\nThough barely mentioned in the newspapers here, and no doubt completely ignored in the newspapers there, the \nSaint of Darkness was finally released from prison two days ago.   Without notice, she was simply taken out \nthe doors of San Dismas prison and told that she was free to go.  The poor girl had no money.  She didn't even \nhave shoes on her feet.  She had to walk three miles towards Sulaco before a passing farmer took pity on her \nand gave her a ride in his pickup truck.\n\nThe Saint is safe at home with her father now, but she is not the same girl as before.  I didn't wish to ask her \nfor details, but she clearly suffered some abuse while incarcerated at San Dismas.  Her father was clearly distraught \nover her appearance, yet he is also happy just to have her back.  The coming challenges will have more to do with her mind.\n*page_break\nAt times, she's like Ophelia gone mad, muttering secrets to herself in anxious tones.  I half expect her to hand out \nchicken bones like they were daisies.  She keeps raving about the Other World.  About giants trying to come from there \nto Costaguana.\n\nI don't know what to do with her.  She needs professional help, but I fear a professional may try to convince her \nthat her visions are not real.  She needs someone who can help with her trauma without destroying or stifling her \ngift.  She says when she was in prison she spoke with a Padre Ferdinand, that he believed her and her visions.  Perhaps, \nif I can locate him, he can assist her.\n\nLucius, I know you never believed in her, but what if you did?  What if she was real and what if her visions of the \nOther World and giants were authentic?  What would you do?  \n\nThank you,\n\nIsabel\n\nQUERY SERA:\n*choice\n\t#Padre Ferdinand\n\t\t*goto_scene plague_1500s\n\t#giants, other world\n\t\t*goto_scene Emage_1500s                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              \n", "sloane": "*gosub_scene adcheck\n*label Sloane\nFrom the journal of Dr. Thayer, L., PhD.\n\n9 April 1985\n\nThe most severe woman visited Dr. Lenz today.  She was middle-aged, I guess, American; she said her name was \"Sloane Keegan.\"  \nAnd Christ, there are some pieces of stone down here with more life in them than she has.\n\nEven after a few weeks down here, you come to expect Americans to be loud and effusive; it's the annoying way of the expatriate.  Someone with a military background \ncan have a stern demeanor, but even so, through all their gruff cursing, you can find a human being, someone who misses home, someone who wants a drink.  \nSloane Keegan was stern and cold.  Clinical, even.  No, clinical is not the word.  It's as if her face was a wall that couldn't be brought down.  The \nlaborers backed away from her out of instinct, and she and Dr. Lenz went into his tent alone.\n*page_break\nEven after she left, Dr. Lenz made no attempt to explain who she was and what she was doing at the dig.  Harry said he'd seen her come by the year before.  \nHe joked that Dr. Lenz and Sloane are lovers, made some crass joke about his wrinkly body sagging over her or something.  But I don't see Sloane Keegan \nloving anything.  \n\nThe only thing she can be here for is the Eastern City.  My guess is she either has some connection to funding, or she's another archaeologist come to \ncompare notes.  Archaeologists working on Tiwanaku have always had an interest in the Eastern City.  And there are always people searching for El Dorado.  \nIt's so odd that Dr. Lenz won't say who she is.\n\nQUERY SERA:\n*choice\n\t#Eastern City\n\t\t*goto_scene Eastern_City\n\t#Tiwanaku\n\t\t*goto_scene Tiwanaku\n\t#El Dorado\n\t\t*goto_scene El_Dorado_raft\n", "sloane_dies": "*gosub_scene adcheck\n*label Sloane_dies\nMEMO from agent call sign SHAMUS\n\nAgent ${name},\n\nAgent call sign OUTRIGGER, Colonel Sloane Keegan, ex-wife of Dr. Lucius Thayer, was a passenger aboard Flight 781 when it \ncrashed in the Atlantic Ocean two hours ago.  The Coast Guard has already located the wreckage, and they do not expect to \nfind any survivors.\n\nDr. Thayer's disappearance is part of a larger plan that we're still trying to understand, but that plan is gearing up.  \nWhoever they are, they feel like they're close enough to their goal that they can start crashing our planes.  Find out what \nthey want.  Find out who they are.  \n\nIf you can't get it done, we won't be able to stop them.\n\n--Special Agent In Charge Roger Mays\n\nQUERY SERA:\n*choice\n\t#who is behind the group\n\t\t*goto_scene interview_beecher_last\n\t#Isabel, goals of group\n\t\t*goto_scene Isabel_goodbye\n", "sloane_interview": "*gosub_scene adcheck\n*label Sloane_interview\nfrom the CIA interview of Dr. Thayer, L., PhD.\n\nBoston.  30 December 1997\n\nInterview conducted by agent call sign OUTRIDER.\n\nTHAYER:  I know you.\n\nOUTRIDER:  We've met before.  In Costaguana.\n\nTHAYER:  You were working with CIA.  Like [SHAMUS].\n\nOUTRIDER:  Not working with.  We ARE CIA.  \n\nTHAYER:  Well.  I already told [SHAMUS] everything I know.  Then I said it all again to that young guy.  \"Tim.\"\n\nOUTRIDER:  I'm not here to ask questions.  I'm here to tell you.  There is something dangerous underneath the site of the Eastern City.  We're not quite \nsure what it is, but we think it's something biological.\n\nTHAYER:  I've never heard that.  I always thought it was an artefact everybody was looking for.  Why do you think it's biological?\n\nOUTRIDER:  You're not the first person to dig in Costaguana.  Johannes [Lenz] wasn't either.  Do you know about Lenz's past?  You know where he learned his trade?\n\nTHAYER:  With the Nazis.  With Ahnenerbe.  He told me himself.  He was recruited by the OSS through Operation Paperclip and that's how he was able to come \nto the United States.  But he let me believe that his work with the government was over.\n\nOUTRIDER:  You ever wonder why the United States Government would bother with an archaeologist?  Why we would risk the lives of American soldiers to recover \na person who digs up old ruins?  It's because there was a secret world that existed before our own.  We believe it was extraordinarily sophisticated. \nA prehistoric civilization with technology that possibly rivaled our own.  No one knows about it, and those who do, don't talk about it.  There's such \nlittle evidence for this secret world that most people would believe it's just a fairy tale.\n\nTHAYER:  But Lenz knew about it.  What evidence is there of this \"prehistoric civilization\"?\n\nOUTRIDER:  Like I said, not much.  There's a small figurine that the Nazis found in Norway.  A Hospitaller knight apparently carried it to a church there from \na site in Syria.  It's made of a black stone that's not on the periodic table.  You're familiar with the Shore Temple at Mahabalipuram?\n\nTHAYER:  The Indian temple.  Supposedly there are six more of them submerged off the coast.\n\nOUTRIDER:  There are.  We found a spearhead in one of those temples.  It's made of the same black stone.\n\nTHAYER:  You found something made from that stone in the Eastern City?\n\nOUTRIDER:  Yes.  From what our other archaeological teams have told us, this civilization was destroyed some 17 to 14,000 years ago.  We believe the means of \nthat destruction lies underneath your excavation site.\n\nTHAYER:  You're looking for a weapon.  A biological weapon.  Well, it's not my site anymore.  How could you let people dig there at all?\n\nOUTRIDER:  Someone was going to dig up those ruins, Dr. Thayer.  We just wanted them to be American.  Now.  Tell me again about Isabel Cardinale.\n\nTHAYER:  Isabel?\n\nOUTRIDER:  She's working for someone.  Helping someone get this weapon.  We've been trying for ten years to figure out whom.\n\nQUERY SERA:\n*choice\n\t#Who does Isabel Cardinale work for?\n\t\t*goto_scene Puig_Isabel\n\t#Isabel, Eastern City secrets\n\t\t*goto_scene foreplay\n\t#secret world\n\t\t*goto_scene Thayer_2000", "sloane_interview_2": "*gosub_scene adcheck\n*label Sloane_interview_2\nfrom the CIA interview of Dr. Thayer, L.\n\nArkham, Mass.  30 December 1997\n\nOUTRIDER:  If the Russians got a hold of this--\n\nTHAYER:  I thought the Russians were our friends.\n\nOUTRIDER:  No one's our friend.  Especially when it comes to the Eastern City. At least with a nuke, with a nuke there's \nsome kind of control.  With whatever's in the Eastern City, there is no control. If it gets out, it spreads all over the \nworld.  If it's biological, like we think.  Dr. Thayer, you need to understand, we are talking about a weapon or substance \nor SOMETHING that quite literally brought about an apocalypse.  \n\nTHAYER:  I can't see Isabel working with Russia.\n\nOUTRIDER:  We have intel that there was a Soviet agent in the Department of Antiquities starting in the late-Eighties.  \n\nTHAYER:  You think it was Isabel?\n\nOUTRIDER: No.  But we think she may have been working with him or her, and that relationship has simply continued.  She just \nswapped out the Soviet Union and the KGB with Russia and the FSB.  Our problem is one of evidence. \n\nTHAYER:  I know she had ties to the Emage rebellion.\n\nOUTRIDER:  We think those ties were just familial.  The Emage aren't working with the Russians anymore.  And Isabel wasn't \nworking for the Emage, either.  [SHAMUS] has been inside the rebellion.  \n\nTHAYER: Then who else could she be working for?\n\nOUTRIDER: That's the rub, Dr. Thayer.  There's someone else.  Someone behind the scenes, and we believe this organization \nhas been around Costaguana for decades.  They're not a government.  They're a non-state actor, and they want the apocalypse \nto revisit humanity.\n\nTHAYER:  Well, they don't sound very pleasant.\n\nQUERY SERA:\n*choice\n\t#non-state actor in Costaguana\n\t\t*goto_scene MIB_visit\n\t#Isabel's ties to non-state actor in Costaguana\n\t\t*goto_scene MIB_visit\n\t#1980's, Soviet activity in Costaguana\n\t\t*goto_scene saint_rescue\n", "sloane_letter": "*gosub_scene adcheck\n*label Sloane_letter\nletter fragment from Dr. Lenz, J., PhD. to Lt. Col. (Ret.) Keegan, S.\n\n5 May 1985\n\n...The rebels do not have the infrastructure to pursue any strategy other than the most meager of guerilla tactics.  I have heard gossip that they \nare making allies in the drug trade.  These are merely rumors; however, the rebels need to fund their revolution.  Harvesting coca and manufacturing \ncocaine are the types of businesses that would easily fund the larger enterprise they aspire to. The ambitions of these rebels seem petty and small to me; \nbut they are espousing a Communist ideology, and with a little manipulation and a few rifles, the Soviets could very quickly have an armed guerilla force \nin the jungles of Costaguana.\n\nWe have known each other for a long time, and you know that I care very little for political ideologies.  But you must do something about these rebels \nbefore they endanger the dig site.  The location of the Eastern City lies above a valley that is the main pass from Sulaco to the area around Santo Tomas \nwhere the rebels seem to be concentrating their efforts.  One doesn't have to be a soldier to understand the strategic importance this location has for them.\n*page_break\nIt would be a tragedy if one of the oldest cities in the history of mankind was destroyed just so a few barbarians spouting platitudes about \"worker's \nrights\" and \"ending private property\" were allowed to feel significant.  If archaeology has taught me anything, it is that we are NOT significant.  The Earth \nis 4.5 billion years old.  The history of mankind is but a few moments in the calendar of the world.  The life of an individual?  Not even noticed as time \nticks by.  If these criminals are unhappy with their lot in life, they should simply end it.\n\nYou will think me unduly harsh, but I have seen gods rise and thrive and then die.  I have been a party to murder on an industrial scale.  Our lives mean \nnothing.  If we choose to live, instead of the pragmatic choice of suicide, then we must find a purpose to imbue our lives with meaning.  But this purpose \nis private and irrelevant to the movement of time.  Only the weakest of minds adopt the purposes of other people, of political leaders and religious leaders.  \n\nLuckily for those leaders, the world is full of weak minds.  If I can discover Xinnabala, uncover what it means, then perhaps those minds can be liberated.\n\nQUERY SERA:\n*choice\n\t#rebel influence on excavation\n\t\t*goto_scene Labyrinth\n\t#Xinnabala\n\t\t*goto_scene Labyrinth\n", "soviet_puig": "*gosub_scene adcheck\n*label Soviet_Puig\nextract from a report filed by agent call sign OUTRIGGER\n\n4 February 2002\n\nThough the coverage was minimal, given the current attention given to the war in Afghanistan, Costaguanan newspapers reported that newly-released \nSoviet-era documents name Roberto Puig, currently the director of the Department of Antiquities, as a contact for their agents.  You will recall that \nour agents discovered similar documents in a hack in 1999, and we suspected as much since the late 1980s.\n\nThe media and the officials interviewed in the news piece seem to have no qualms with Puig having worked with the Soviets.  Indeed, it is quite possible \nhe was instrumental in laying the foundation of the current Socialist government.  One Costaguanan minister claimed to have known of Puig's Soviet dealings \nfor years, describing Puig's actions during the Cold War as \"heroic.\"\n*page_break\nOur people in Costaguana are keeping a close eye on Puig.  He does not appear to have had any further dealings with Russia.  Dr. Lucius Thayer, a noncompliant \nasset, has attempted to reach Roberto Puig on several occasions.\n\nQUERY SERA:\n*choice\n\t#Thayer, contact with Puig, post-1997\n\t\t*goto_scene Thayer_2000\n\t#Roberto Puig, 1980s\n\t\t*goto_scene first_contact\n\t#Isabel, confirmed as a Russian spy?\n\t\t*goto_scene Roger_reveals", "sulaco_bombings": "*gosub_scene adcheck\n*label Sulaco_bombings\n\"SULACO BOMBINGS CONTINUE\" by B. Crampton \n\nfrom RAFFERTYPOST.com, 8 February 1997\n\n...The bombing of the Banco de Sulaco marks the third such terrorist bombing in three months.  The Emage rebels who have claimed responsibility for the \nprevious two attacks have yet to release a statement on the bank bombing.  This is also the first instance where the rebels have bombed a target that was \nnot an official government building; however, the rebel leader, Hector \"El Caballero\" has often been quoted as naming \"Capitalism\" as the true enemy of his \nrebellion and of the people of Costaguana.\n\nAccording to rebel propaganda found on fliers (and to a lesser extent on the internet - many Costaguanans do not own computers) the Emage come from a long \ntradition of communal living and community ownership of production and product.  This is the professed Socialist ideology that once had the support of the \nSoviet Union.  What is less discussed in Hector \"El Caballero's\" message is that, currently, much of the rebellion's shared product is cocaine.\n*page_break\nPresident General Wagner Cabrero has vowed to bring the terrorist bombers to justice, and he has called on the United States for military assistance.  With \nso many resources in neighboring Colombia already fighting the War on Drugs, there can be little doubt that America will answer Cabrero's request for help...\n\nQUERY SERA:\n*choice\n\t#Hector \"El Caballero\"\n\t\t*goto_scene Hector_el_caballero\n\t#rebel propaganda\t\n\t\t*goto_scene propaganda_flier\n\t#rebel drugs\n\t\t*goto_scene rebel_drugs\n", "thayer_2000": "*gosub_scene adcheck\n*label Thayer_2000\nFrom the journal of Dr. Thayer, L., PhD.\n\n17 July 2000\n\nThese trips to South America were fruitless in the end.  I might not have taken them if I could have admitted to myself what I was looking for.  Having \nbeen forced out of Costaguana, I said the reason for these trips was to find evidence of that \"secret world\" Sloane Keegan spoke of.  But in reality, I was \ntrying to find a new passion, something that could replace Isabel and the Eastern City.\n\nMy obsession with the Eastern City is entangled with my affection for Isabel.  I should know better, but I confuse one passion for the other.  Knowing that \nmy heart is elsewhere gives me no end of guilt when I hold the baby, when I lie in bed next to Mary as she sleeps.  I truly love them in my way, but the deeper love  \nis for Isabel and the mysteries of Costaguana.\n*page_break\nReflecting on my years in Costaguana with what I know now, the country I thought I was living in was so different from reality.  At least I now know about \nthe black stone relics, but I don't even know what secrets Isabel kept from me.  I don't know if what she felt for me was real or if it was all an act to help \nher get something she wanted.  \n\nAfter all the time I've been without her, I realize that I don't care.  I loved her then.  I love her now.  We can never really know what another person \nis feeling or thinking.  We only know what they show us.  That's the reality, isn't it?  What we see and hear and feel?  Everything else is imagination and \nconjecture.\n*page_break\nNow, I don't even know if she survived that eruption of unrest in Costaguana.  There were rumors that the Socialists purged the government of their enemies, of \nthose who assisted the Cabrero regime.  You can never tell who will end up on which side of the firing squad when these things happen. All I know is that I \nhaven't heard from her.  She's published nothing.  It shouldn't matter because I'll probably never see her again whether she's alive or not.\n\nI've written Roberto Puig, now the director of the Department of Antiquities.  Perhaps he will allow me access to the Eastern City again.  Perhaps \nhe's had word of Isabel.\n\nQUERY SERA:\n*choice\n\t#Did Isabel Cardinale care for Thayer at all?\n\t\t*goto_scene first_night\n\t#Isabel Cardinale, post-2000\n\t\t*goto_scene late_Isabel\n\t#\"secret world\", black stone relics\n\t\t*goto_scene Sloane_interview\n", "thayer_cia": "*gosub_scene adcheck\n*label Thayer_CIA\nfrom the CIA interview of Hartley, M., a Miskatonic student under Dr. Thayer, L., PhD., at the Eastern City.\n\nInterview conducted by \"TIM.\"\n\nTIM:  What if I told you that Dr. Thayer was working for CIA?\n\nHARTLEY: I'd probably believe you.  I saw him with some pilot or something, but he was wearing one of those \ntan vests.  You know.  The ones with all the pockets.  Those vests that scream \"CIA\" that people wear when they \nwant to look undercover.\n\nTIM:  (laughs) You mean one of those safari vests?  That always was a giveaway.  In the Eighties.\n\nHARTLEY: Yeah.  I thought so.  Anyhow.  I saw Dr. Thayer with a guy who wore one of those.  A few times, I \nsaw them.  Mostly at the bar.\n\nTIM:  At the bar.  We are aware of that man.  He's a bush pilot who drinks with Dr. Thayer.\n\nHARTLEY:  But he's one of you.\n\nTIM: We don't hire drunks.  Did you tell anyone that you thought Dr. Thayer was CIA?  Someone like Dr. Cardinale?\n\nHARTLEY:  I don't... I don't think so.\n\nTIM:  Funny.  Your classmate Katherine told us you were positive that your professor was working for the CIA.  She \ndidn't believe you, though, so you kept insisting.  She says she got so bored of you talking about how Dr. Thayer was CIA.\n\nHARTLEY: Katherine Beecher is an idiot.  All right?  You don't need to be in a room with her for five minutes to not \nknow right away that she's a total idiot.\n\nTIM:  Who else did you tell?  \n\nHARTLEY:  No one.\n\nTIM:  We've already established that Dr. Cardinale had regular contact with Soviet agents.  Who's she working for now?  Cuba?  Are you two working together?\n\nHARTLEY:  I have no idea what you're talking about!\n\nTIM:  We know someone on the dig helped out whoever snatched Thayer.  And you already said, \"Katherine Beecher is \nan idiot.\"  That leaves you as my prime suspect.\n\nHARTLEY:  That's crazy!\n\nTIM:  Was it the Wellingham Christian Foundation?  You've been in regular contact with them.  Did you tell them of Thayer's \nCIA connections?  What did they say?\n\nHARTLEY:  I swear.  I haven't told anyone anything.\n\nQUERY SERA:\n*choice\n\t#identify Soviet agents in Costaguana\n\t\t*goto_scene Puig_stranger\n\t#identify Soviet assets in Costaguana\n\t\t*goto_scene Puig_father\n\t#other agencies with agents or assets in Costaguana\n\t\t*goto_scene Isabel_stranger", "thayer_arrives": "*gosub_scene adcheck\n*label Thayer_arrives\nfrom the journal of Dr. Thayer, L. PhD.\n\n25 January 1985\n\nComing from New England, the heat and humidity in Costaguana are unbearable.  Even at seven in the morning, as soon as I left the air \nconditioned comfort of the hostel in Sulaco, I was instantly drenched in sweat, my shirt soon hugging me like a wet second skin.  Harry \nFinch was the only other student with me.  He complained about the heat as if it were the end of the world, but he's been here two years \nalready.  I think it will take more than two trips for me to become so jaded that a little heat could ruin my excitement at seeing the \nEastern City.  As for Harry, he says he's done with the tropics, and as soon as he gets his PhD. he's going to head north to Canada, to \nlook for signs of Norse Vikings around the frozen Hudson Bay.\n\nWe took a jeep up the mountain.  Our driver, Jairo, was a stoic Emage with that distinctly aquiline nose of the Andes.  He drove silently, a Baltimore \nOrioles baseball cap sitting high on his head.  I asked him in my broken Spanish if he liked baseball, and, as best as I can understand, \nJairo said he bought the hat for the image of the cartoon bird on the front of it.  I'm learning about the Emage sense of humor.\n*page_break\nThe way up the mountain is rough and muddy, and the jungle seems to be fighting to get back that strip of land we call a road.  After nearly \nthree hours of alternately grumbling and sliding up the mountain, we turned a corner and the trees opened up.  There, still half-buried in the \nside of the mountain, stood the Eastern City.\n\nThe monoliths stand tall and silent.  The grandeur of the place is intimidating.  No carvings have yet  been found anywhere on the stones.  \nThere's a geometric precision to the stones that rivals anything I've seen in South America.  The jungle is as fierce as the ocean, able to \nswallow up entire civilizations the way the sea would claim an Atlantis.\n\nQUERY SERA:\n*choice\n\t#Eastern City\n\t\t*goto_scene Isabel_thesis\n\t#Costaguana - World Factbook\n\t\t*goto_scene Costaguana_Factbook\n\t#Emage people\n\t\t*goto_scene interview_one\n", "thayer_bio": "*gosub_scene adcheck\n*label Thayer_bio\n\nMISKATONIC UNIVERSITY\n\nSCHOOL OF ARCHAEOLOGY\n\nDr. Lucius Thayer, PhD.  Professor of Archaeology & Anthropology\n\nRESEACH INTERESTS\n\nPre-Colombian civilizations;  Indigenous tribal rituals and supernatural beliefs;  Interpretative approaches to architectural culture, landcape, and geoglyphs.\n\nCURRENT PROJECTS\n\nFieldwork in the Costaguanan Emage region.  Excavations in the \"Eastern City\" and near the Lenz Geoglyphs.\n\nSELECTED PUBLICATIONS\n\nThayer, L, Cardinale, I.  \"Investigating the Pre-Colombian roots of traditional ritual and superstition in Costaguana.\" SCIENCE & ARCHAEOLOGY \nTODAY 305, 1618-1621, (1992).\n\nSUMMARY\n\nA New England native, graduate of Stanford U., PhD. from Miskatonic University.  Graduate studies under Dr. Johannes Lenz, participating \nin excavations in Costaguana's \"Eastern City,\" Pre-Colombian ruins discovered by Lenz in 1973.  Took over excavations in 1996 after Dr. Lenz's \nretirement.  Political unrest soon made excavation in Costaguana impossible.  \n\nThayer briefly researched monolithic sites in Bolivia, Ethiopia, and Lebanon.  After the government and the rebels signed a peace treaty, Thayer \nreturned to Costaguana in 2004.  Since that time, Thayer has uncovered more si
