aint_mad\n", "meeting_isabel": "*gosub_scene adcheck\n*label meeting_Isabel\nletter from Dr. Lenz, J. to agent call sign OUTRIDER\n\n12 January 1987\n\nDear [redacted],\n\nA new Costaguanan student has joined the dig to replace Jorge.  My instincts tell me that she is not whom she claims to be, but as you love to point out, \nI don't trust anyone.  Still, after Jorge left the project, I did not expect the Universidad de Sulaco to send a new student until next fall.  Isabel \nCardinale is also quite fetching, and I think the young American men on this project are quite taken with her.  She is not a flirt exactly, but she commands \nall of the graduate student conversations.  This would be fine if she were a brighter student, but she often espouses certain \"fringe\" theories about the \ngiants who inhabited the area before the Emage.\n\nIn the few days since she has arrived, I believe that Isabel Cardinale is one of three things: \n\n1) A beautiful idiot who somehow, perhaps a family connection, connived to find a spot on the Easter City excavation.\n\n2)  A swallow sent by the Soviet Union because they know what we're digging for, and they want it.  Isabel Cardinale will manipulate one of my staff so \nthat the Soviets gain possession of what we hope to find.  The Soviets will use the discovery to tip the balance of the Cold War to their favor.\n\nOr \n\n3) A Costaguanan spy.  The government here either knows what's in the Eastern City, or they know that it's worth grabbing for themselves.  They want eyes \nhere to tell them about it as soon as we find it. \n\nIf she is any of these things, she cannot be trusted, but my younger colleagues are not listening to reason when it comes to this woman.  If anyone knows how \nmuch influence a swallow can have over her target, it's you and me, darling.\n\nEver yours,\nJohannes\n\nQUERY SERA:\n*choice\n\t#Isabel Cardinale, Soviet Union\n\t\t*goto_scene Isabel_friend\n\t#Isabel Cardinale, swallow\n\t\t*goto_scene Isabel_swallow\n\t#Isabel Cardinale, influence\n\t\t*goto_scene Arkham_stranger", "meeting_shamus": "*gosub_scene adcheck\n*label meeting_Shamus\nfrom the journal of Dr. Thayer, L., PhD.\n\n9 January 1987\n\nThe CIA is burning coca fields in Costaguana.  There can't be that many to begin with, but I suppose the United States is \ngiving Costaguana something it needs.  Cash, resources?  \n\nI feel like there must be some ideological reason for fighting drug farming instead of drug trafficking.  Perhaps if we \nfight only the farmers, we're just fighting the Communist rebels.  The actual traffickers who bring the white powder north \nto the U.S., they're profit-driven, stalwart Capitalists, so there's little point--ideologically--to go after them.\n\nI met one of the bush pilots who sprays herbicides on the coca fields.  He's a kind of rakish Southerner who came to hot \nand humid South America for the adventure.  We're somewhat similar in that respect, but Roger has that brand of loquacity \nthat's particular to Southerners.  His listeners are easily carried away in his slow, lyrical tones and his easy laugh, that \nthey're already at the conclusion of the story before they realize how tall the tale has become.  \n*page_break\nFor example, he went on for nearly an hour on some ridiculous story about local police who caught a Soviet diplomat in a \nSulaco whore house with a young woman and a live chicken.  Apparently, the police burst through the door, the chicken flew \ninto the air, and, in swatting it away, one officer accidentally killed the poor animal.  When asked what the chicken was \nfor, they though the Soviet was saying \"ya lo hizo,\" \"you already did it,\" making the police believe the diplomat had intended \nto kill the chicken during the act.  He was beaten for this perversion.  It later came out, after the Soviet consulate \nintervened, that the diplomat was not saying \"ya lo hizo,\" but \"por yaytso,\" which in a mix of Spanish and Russian means \"for the egg.\"\n\nI like Roger.  I've always held a little disdain for Americans abroad who always spend so much time with other Americans \nrather than the locals, but I can understand it now.  When everything is so alien, it;s nice to share that sense of \nestrangement with someone else.\n\nQUERY SERA:\n*choice\n\t#Drug war in Costaguana\n\t\t*goto_scene narco_profile\n\t# Soviets in Costaguana\n\t\t*goto_scene saint_rescue\n\t#Post-Soviet Russians in Costaguana\n\t\t*goto_scene Sloane_interview_2\n", "meeting_saint": "*gosub_scene adcheck\n*label meeting_saint\nletter from Dr. Cardinale, I. to Dr. Thayer, L., PhD.\n\n2 August 1988\n\nDear Lucius,\n\nI admit that it's against what you suggested, but the supernatural phenomenon in the area around Sulaco is too rich to ignore.  I won't bother \nyou with the sightings of duende of the tale of ghost ships that have been reported I the bay.\n\nBut I took a trip to the Lower City this past Sunday.  It's well-known in Sulaco that the local gangs refrain from violence on Sunday.  Tradition \nhas it that the gangsters stay out of trouble out of respect for God and the Church, but I suspect they are simply too hungover to venture out and fight one another.\n*page_break\nI ventured to the area because I'd heard rumors that there was a young girl there who had a kind of second sight.  She has predicted the future more \nthan once, warning of accidents down at the docks, and more than once, she has predicted when an individual would die.  For these dire predictions, she \nhas been called \"La santa de la oscuridad,\" \"The Saint of Darkness.\"\n\nWord about her predictions has spread, and the small group that used to gather on the steps of the church is now a small crowd gathered in an empty lot \nthree blocks from the church.  The crowd was silent, sweating in the hot sun, but as soon as a man lifted a young girl onto a crate, the crowd rippled with \nmurmured prayers. The girl was small, native, and dressed in a Communion gown.  She stood on the crate, and with a voice shrill with immaturity, she spoke.\n*page_break\nIt was remarkable.  She spoke with the fire of a preacher, but without the moralizing bluster.  And what she spoke of brought new meaning to her name.  She \nspoke of a dark world, one of lavender skies and a great city of stone.  And in the city lived fearsome creatures, twice as tall as any man, and there lived \nin the heart of this city, at the center of a maze, a fearsome creature that she would not name.\n\nI could not help but think of the Easter City when she described that city of stone.  She is Emage, and I wonder if there isn't perhaps some memory of the \npast that stays with a family, travelling generation to generation, something in line with Neo-Lamarckian inheritance theories. \n*page_break\nI intend to see her again this Sunday, and I hope that you and Harry will come see her, too, once you return to Costaguana.\n\nBest Regards,\n\nIsabel\n\nQUERY SERA:\n*choice\n\t#Isabel revisits Saint of Darkness\n\t\t*goto_scene Isabel_friend\n\t#Lower City, Sulaco\n\t\t*goto_scene Isabel_swallow\n\t#Harry\n\t\t*goto_scene Arkham_stranger\n", "narco_profile": "*gosub_scene adcheck\n*label narco_profile\nfrom ARKHAM DAILY VOICE online\n\nPROFILE: COSTAGUANA'S EMAGE REBELLION\n\nOVERVIEW\n\nHaving lasted from the mid-1980's through the early 2000's, the rebellion against dictator General Wagner Cabrero was \nrun by a faction of the Emage tribe numbering onto 2,000 to 3,000 member strong.  Led by a man called Hector el caballero, \nthe rebellion officially ended with the 1999 election of Presidente Jude Gonzalgo, but viewing the mestizo government \nas invaders, many of the Emage rebels did not stop fighting.\n\nFUNDING\n\nBeginning with their inception in the mid-1980's through the early/mid-1990's, the Emage rebels received resources and \nfunding from the Soviet Union.  Cuban special forces, the Black Wasps, gave the rebels their training.\n\nACTIVITIES\n\nAfter roughly a decade of low-level conflict, the Emage rebels initiated a bombing campaign in Sulaco.  In the end the \nviolence was not as effective as the eventual, natural death of General Cabrero in 1999.  American diplomatic intervention \nled to a democratic election in that same year.\n\nNOW\n\nPresently, the Emage rebellion seems to have dissipated.  As the Emage have increased their participation in the Costaguanan \ngovernment, they have had less reason to be dissatisfied with their position.\n\nQUERY SERA:\n*choice\n\t#Emage, Soviet Union\n\t\t*goto_scene Sloane_interview_2\n\t#Soviet relations with Costaguana\n\t\t*goto_scene saint_rescue\n\t#current Emage operations\n\t\t*goto_scene Sloane_interview_2", "plague_1500s": "*gosub_scene adcheck\n*label plague_1500s\nfrom the journal of Padre Ganza, Ferdinand\n\n24 April 1597\n\nIf I were so reckless to share the things that I have learned, the things that I have seen, I would no doubt share the \nfate of Giordano Bruno.  Bruno's heresies were merely ideas, flights of fancy that the myriad stars in the sky might be \nother Suns with other plants spinning around them.  For his trouble, they will no doubt burn him.\n\nWhat would the Inquisition do to me if I told them that there were not just other Suns with other planets, but that the \nKingdom of Heaven did not radiate outside of the \"primum mobile\"?  That instead, beyond that outermost layer of our \nuniverse there were more universes, infinitely multiplied like bubbles in foam?  What if I told the Inquisition that those \nother universes house their own gods and their own devils? \n*page_break\nIt matters little now.  A strange pox makes its way through the Emage and the Spanish alike.  In truth, I bear the blame \nfor this disease, for I was the one who walked through the Labyrinth, who passed through the gate to sacred Xinnabala.  \nIt was I who brought the Emage sacrifice back to our world from that Other World.  I saw it as my Christian duty to rescue \nthat Emage youth, that poor soul they chose to feed to their dark gods.  After the grand strangeness that I have seen, Christian \nduty seems rather quaint.\n\nThose quaint notions are killing the people of Sulaco.  Few of those stricken survive, and even then, they are not as they \nonce were.  The only hope for the rest of Gran Colombia is if my brothers and I purge the land of this disease.  As I am already \nstricken, I pray that we are successful.\n\nQUERY SERA:\n*choice\n\t#gate to Xinnabala\n\t\t*goto_scene Emage_1500s\n\t#how \"purge the land\"?\n\t\t*goto_scene Emage_1500s\n\n", "plague_1700s": "*gosub_scene adcheck\n*label plague_1700s\nMEMO from Dr. Thayer, L., PhD. to Dr. Cardinale, I.\n\n14 February 2014\n\nIsabel--\n\nPlease check the records at the Department of Antiquities regarding this event.  The 1765 letter uncovered in California \nclearly states that shipments of silver were not leaving Sulaco due to an outbreak of \"fiebre roja\" at the Gould silver mine.\n\nI seem to recall that your department stores all of the personnel records from that mining company.  If you and Director \nPuig can locate any records from this time period that mention the outbreak, we may have evidence of a kind of virus that \nravages Costaguana in cycles.  This would not be a regular virus, but, like the periodic cicada, it is an organism that only \nemerges from its subterranean gestation after thirteen or seventeen years, this virus only emerges every few hundred years.\n*page_break\nMeet me at the dig tomorrow, and give me an update then.  I ought to be able to speak with my pilot friend Roger Mays before then;  \nhe may be able to schedule us for an aerial survey of the newly logged area near the Northwest Gulley.\n\n--Lucius\n\nQUERY SERA:\n*choice\n\t#Connection with current plague?\n\t\t*goto_scene plague_2017\n\t#Roger Mays returns to Costaguana\n\t\t*goto_scene plague_2017\n", "plague_2015": "*gosub_scene adcheck\n*label plague_2015\nfrom AMERICAN & WORLD REPORT, 19 October 2015\n\n\"UNKNOWN OUTBREAK SWEEPS SULACO\"\n\nBy B. Bryant\n\nThe crisis in Costaguana is being called a plague of biblical proportions.  Over the weekend, people on the streets of Sulaco, \nthe capital of Costaguana, began dying by the dozens, killed by an unknown illness.  Dozens more are bedridden.  The unknown \ndisease affects individuals so quickly that most sufferers do not have the time to seek medical attention before they are unable \nto move of their own volition, or they are dead.\n\nThose affected by the disease first experience flu-like symptoms accompanied by a yellowing of the eyes.  Within hours, a red \nand purple rash appears on the sick person's limbs.  Loss of consciousness soon follows.\n*page_break\nSulaco is currently under quarantine.  There has been no official statement from the Costaguanan government, and even the CDC \nhas been denied access to the city.  Social media accounts have been cut off to everyone in Costaguana.  Some reports are leaking out of \nthe country via telephone, and sources within Sulaco report an unnerving quiet.  Many of the dead and the sick have been left \nin the street as everyone is afraid to come into contact with them.  Most citizens are too afraid to leave their homes, even for food.  \n\nLocals have been known to practice a form of black magic similar to Santeria, and CDC officals have speculated that the consumption \nof improperly prepared animals allowed for a contagion to jump to humans from a species of pig or goat.  Unnamed officials in \nthe United States State Department are speculating that Sulaco is the victim of some kind of biological attack, but with apparently \nno investigation under way by the Costaguanan government or the CDC, there is no way of knowing.  It would appear that the citizens of \nSulaco have been left to live or die on their own.\n\nQUERY SERA:\n*choice\n\t#source of biological attack?\n\t\t*goto_scene Russian_bar\n\t#State Department, plague\n\t\t*goto_scene Cronus\n\t#improperly prepared animals, Sulaco\n\t\t*goto_scene meeting_Shamus\n", "plague_2017": "*gosub_scene adcheck\n*label plague_2017\nreport by call sign SHAMUS\n\nSulaco, Costaguana.  24 April 2017\n\nThough I'm still getting reports of sick people in rural areas, the plague seems to have passed through Sulaco.  Anyone who contracted \nthe disease, the \"fiebre roja\" or Red Fever, has either died or gotten well and suffered a drastic personality change.  Oddly enough, \nsome people who got sick once before, such as Jairo Becker, have gotten sick again.  If this is the same virus or bacteria that hit people before, \nit has mutated.\n\nPresident Jude Gonzalgo is among those who got sick and recovered.  (I don't know if he ever caught this thing before).  He made an \nappearance on television; he just waved from the window of the presidential palace, but, odd for him, he has not made a statement. \nUsually this guy won't shut up.\n*page_break\nThat eerie calm is still all over the city, and the whole of Sulaco is running like a Swiss watch with all the people being the cogs and \nsprockets.  I've kept a log, and for the last three days, the woman across the street leaves her house at exactly 07:30 to get to work.  The \nnumber 23 bus passes through the intersection at 07:42.   The mailman turns the corner at 09:53, without any mail in his bag.  EVERY DAY at \nthe EXACT same times.\n\nIt's literally insane.  What kind of disease can alter a person's behavior so drastically? I advise against agent call sign OUTRIGGER \nreturning to Costaguana.  If this is the effect of the Red Fever, no one else should risk being infected.  I can only imagine what would happen \nif it were to get out of Costaguana.\n\nQUERY SERA:\n*choice\n\t#past infections, altered behavior\n\t\t*goto_scene giants_die\n\t#disease that alters behavior\n\t\t*goto_scene t_gondii", "plague_facts": "*gosub_scene adcheck\n*label plague_facts\nextracted from a report by the Office of Scientific Intelligence (OSI)\n\n2 December 2015\n\n\"RED FEVER\" AT A GLANCE\n\nThe majority of those Costaguanans afflicted with the illness known as \"Red Fever\" succumb within two to seven \ndays; however, a significant number of the sick recover.  Initial estimates are that 20% to 40% of sick individuals \nsurvive.  If the patient does not die within two to three days of the appearance of the boils, the flu-like symptoms \nin these patients subside, and the boils disappear.\n\nOBSERVATIONS\n\nThough the evidence is only anecdotal, some patients who recover appear to be healthier than they were when they \nfell ill.  The changes are most observable in children and the elderly; long-term malnourishment is no longer an \nissue, chronic illness such as tuberculosis are cured, and age-related sarcopenia (loss of muscle mass) has been reversed.  \nRemaining symptoms in these patients are limited to extensive hair loss.  These changes indicated a possibly non-biological \ncause for this \"plague.\"\n\nPOSSIBLE NON-BIOLOGICAL SOURCE\n\nExposure to electromagnetic radiation or to irradiated materials may be responsible for the \"outbreak\" in Costaguana, \nespecially considering the hair loss in survivors.  Airborne, irradiated particles may have been spread across the country.  \nDirty bombs are best-publicized method for dispersing such particles, but they are by no means the only method.  Low flying \nairplanes could have been used.  Given the correct wind conditions, this type of particle may even have been spread from an \nelevated position such as a tall building or a mountain.  \n\nThe OSI has begun modelling possible dispersal origins based on the pattern of the outbreak.  Though more development on our \ncomputer models is needed, initial findings place a dispersal origin in the area of the Emage coca fields, close to the vicinity \nof the Eastern City.  It is the opinion of the OSI that the chemical agents used for the eradication of the coca fields should be investigated...\n\nQUERY SERA:\n*choice\n\t#Eastern City, outbreak origin\n\t\t*goto_scene maze_portal\n\t#hair loss symptoms\n\t\t*goto_scene Puig_stranger\n\n", "president_elect": "*gosub_scene adcheck\n*label president_elect\nfrom THE SULACO SUN TIMES (translated from the original Spanish)\n\n10 November 1999\n\nBy 2 p.m. yesterday, exit polls had made it clear that Jude Gonzalgo would win the presidency by a landslide victory.  By 8 p.m., the streets \nwere filled with revelers celebrating their first elected leader in over thirty years.  \n\nIn Sulaco's Bolivar Square, Gonzalgo addressed a crowd of thousands as their president elect:\n\n\"I am humbled by the trust you put in me, in placing our beloved Costaguana in my hands.  In the past, our country has suffered at the hands of \noutsiders, under the rule of foreigners.  By uniting together against the foreign devils, we will bring a new, glorious age to Costaguana!  We will \nbring a return to the great age of our ancenstors, the engineers, the giants, who created the Eastern City!\"\n*page_break\nThe statement from the United States State Department, which was instrumental in organizing the public election, was less enthusiastic in its praise.\n\n\"We congratulate President-elect Gonzalgo on his election win.  We hope that this will be the first of many democratic elections for the beautiful \ncountry of Costaguana.\"\n\nQUERY SERA:\n*choice\n\t#Gonzalgo, Eastern City\n\t\t*goto_scene seizing_Eastern_City\n\t#Gonzalgo and the State Department/CIA\n\t\t*goto_scene seizing_Eastern_City\n\n", "presidents": "*gosub_scene adcheck\n*label presidents\nreport by CIA agent call sign SHAMUS\n\n3 January 1995\n\nAgent OUTRIDER is blown.  Confirmation came when the Activity working in Colombia intercepted cell phone chatter between two Spanish speakers; a woman on \nthe phone revealed to a man that Sloane Keegan is Agent Outrider.  The woman claimed the Saint of Darkness had a vision that \"lifted the mask off of the \nprofessor's wife.\"  I'm not one to believe in visions, but there may be some connection here to the Saint.\n\nMy personal opinion is that Sloane Keegan got sloppy after the death of her ex-husband Johannes Lenz.  She spent the last month and a half in Sulaco ostensibly \n\"collecting his things\" and \"closing his affairs.\"  With the tax laws in Costaguana, I'm sure it actually takes this long, but I believe that she has inadvertently \nlet someone on the Russian side see Lenz's papers.  \n*page_break\nI strongly suspect this Russian agent to be Isabel Cardinale.  She has been jockeying for a bigger office in Costaguana's Department of Antiquities.  Her relationship \nwith Thayer has been rough.  If she was not a Soviet agent before the fall of the Iron Curtain, she would still have no compunctions about betraying him now.\n\nIt's also possible that Outrider accidentally revealed herself while attempting to claim Lenz's estate.  The Banco de Sulaco has always been corrupt; there must \nbe a Russian team of forensic accountants going through Lenz's finances.  There could be a transaction or ten in there that point to Keegan as a CIA connection.  \nLet me know what direction you want the post-mortem on this to take.  I am in place for whatever you need.\n*page_break\nIn any event, the cutthroats in President General Wagner Cabrero's administration were able to get her to exfil before the Russians or their Costaguanan agents \ncould take any sort of action.  As of this writing, she is en route to Virginia.\n\nQUERY SERA:\n*choice\n\t#Saint of Darkness, visions\n\t\t*goto_scene Blackbird_notes\n\t#Isabel Cardinale, Department of Antiquities\n\t\t*goto_scene Emage_politics\n\t#Banco de Sulaco\n\t\t*goto_scene Sulaco_bombings\n\n", "propaganda_flier": "*gosub_scene adcheck\n*label propaganda_flier\nTranslation of an Emage propaganda banner.  During the rebel bombing campaign of 1998, allegedly funded by a local drug cartel, this \nbanner was raised over Bolivar Square, Sulaco:\n\n\"How is it possible that Costagauna, so rich in silver, so rich in oil and natural gas, has so many citizens living in poverty?  Our \ndictator Wagner Cabrero, who has the gall to call himself \"Presidente,\" has opened the gates of our country to Yankees who would exploit \nour sacred lands and take the profits home with them.  These foreigners are no better than the Spaniards who conquered these lands, who \ntook the jungle and the mountains away from our Emage ancestors, no different than the Cathoic Church who ordered our temples and \ncities destroyed.  The land and its resources belong to the people of Costaguana!  Our ancestors were giants on this earth!  We are \nthe children of gods!  Do not allow yourselves to live as slaves!  Cabrero's reign must end!  \n\n\"Stand with Hector El Caballero, and stand as free men and women!\"\n\nQUERY SERA:\n*choice\n\t#Costaguana drug cartel\n\t\t*goto_scene rebel_drugs\n\t#Catholic Church\n\t\t*goto_scene Vatican_dig\n\t#Hecto El Caballero\n\t\t*goto_scene Hector_el_caballero\n", "psychic_phenomenon": "*gosub_scene adcheck\n*label psychic_phenomenon\nfrom CIA FILE 986643025(1995):\n\nreport by call sign SHAMUS\n\n...These psychic phenomenon began in the early 1980s; however, if the increased cases of psychotic episodes in the local Emage people are taken into \naccount (and I suggest that they should be) the phenomenon began in 1974 with Dr. Lenz's discovery of the Eastern City monoliths.\n\nI'm including the psychotic episodes because several of them happened at the dig site itself.  Most notably, a Costaguanan graduate student named \nJorge had something of a nervous breakdown in the mid-1980s.  You'll remember that's when we believe the Soviets took the opportunity to plant \ntheir agent, the individual we call \"Blackbird,\" on the dig.  (Note: at this time there is no definitive evidence that she was ever a Soviet agent.  \nWe are looking into the theory that she may be working for Castro.) \nAlso, in 1992, when Lenz's people discovered that so-called \"ancient astronaut\" glyph, there was a violent episode in the Eastern City with a \nlaborer named Marco.\n*page_break\nI'm sure an anthropologist would have a field day with all the insanity around here, call it a cultural phenomenon or something.  I'm not one to buy \ninto the local Hoodoo, but it's a local problem.  If their saint is getting political, it's something we need to address.  I'm suggesting the path of \nleast resistance: a regional PSYOP that'll discredit her...\n\nQUERY SERA:\n*choice\n\t#Marco incident\n\t\t*goto_scene crazy_digger\n\t#ancient astronaut glyph\n\t\t*goto_scene ancient_astronauts\n\t#Blackbird\n\t\t*goto_scene keening\n", "rats_run": "*gosub_scene adcheck\n*label rats_run\nfrom the CIA interview of Hartley, M., a Miskatonic student under Dr. Thayer, L. at the Eastern City\n\nInterview conducted by \"TIM.\"\n\nTIM:  Tell me about the rats.\n\nHARTLEY:  Seriously?\n\nTIM:  Yeah.  Seriously.\n\nHARTLEY:  Uh.  We had a rat infestation.  In the Eastern City.  We just figured, I dunno.  The logging.  The logging going on a few \nmiles away had just started driving the rats towards the dig.\n\nTIM:  I heard they were running away from the dig.  As you got closer to the Labyrinth.\n\nHARTLEY:  Yeah.  I mean, it was a coincidence.  Some of the others thought it was that mumbo jumbo \"psychic phenomenon\" stuff.  The \nsite, being so old and creepy, it makes people get imaginative.  That's all.\n\nTIM:  Edify me anyway.  What kind of mumbo jumbo were people talking about?\n\nHARTLEY:  Okay.  You know how there's been all that weird stuff going on with the site, like the Saint of Darkness and everything.  \nSo this area, the Northwest Gully, it's part of all that superstitious stuff.  The Saint of Darkness said to dig there way back when.  \nAnd yeah, when we got close, a bunch of rats came out of the ground.\n\nTIM:  I heard it was thousands of rats.  Was that an exaggeration?\n\nHARTLEY:  No.  Not at all.\n\nTIM:  Have you ever heard of anything like that happening on a dig?  THOUSANDS of rats?\n\nHARTLEY:  I mean.  People have dug up rats before.  Sure, it's a lot of rats, but they were ordinary rats.  They didn't have laser eye \nbeams or anything.\n\nTIM:  Is this funny, Mr. Hartley?\n\nHARTLEY:  Yeah.  I mean, why are you asking me about rats?\n\nTIM:  Because they delayed the dig, Mr. Hartley.  The dig for the Labyrinth has been delayed for decades, and when you and Thayer get \ncloser than ever before, thousands of rats come out of the ground.\n\nHARTLEY:  God.  Can we wrap this up now?  I thought I was annoyed when you were getting confrontational, but now, asking about the rats?  \nThis is plain weird.  \n\nTIM:  That's not what Dr. Cardinale thought about it.\n\nHARTLEY:  She always thought the world was going to pot, didn't she?  I'm not sure if she was just a plain, old pessimist, or if she \nknew something the rest of us didn't.\n\nTIM:  \"She WAS just a plain, old pessimist\"?\n\nHARTLEY:  Huh?\n\nTIM:  You said \"was.\"  You're talking about her in the past tense.  As if Dr. Cardinale is no more.\n\nHARTLEY:  Well.  I don't know if she's still around or not.  I haven't seen her in a few days.\n\nTIM:  Tell me what you know.  Is she dead?...\n\n\nQUERY SERA:\n*choice\n\t#Isabel Cardinale\n\t\t*goto_scene Isabel_fear\n", "rebel_city": "*gosub_scene adcheck\n*label rebel_city\nletter to Mrs. Thayer, M. from Dr. Thayer, L., PhD.\n\n12 December 1997\n\nDear Mary,\n\nThe situation in Costaguana has become untenable.  Roger says I should leave.  I presume the only reason he hasn't left himself \nis that he hopes he can give me a lift.  Sure, the bombings a couple years ago, they were bad.  People were scared, but they were scared of \nthe unknown.  But now the rebels are attacking villages, raiding towns.  Now we're scared because we know what to be scared of, and we know it's coming.\n\nI know you try not to watch the TV news, so if you haven't seen it, the rebels have occupied the Eastern City.  They came in the night, when \nmost of us were sleeping in university housing in Sulaco.  One driver, Jairo, was up there, supposedly for security.  We haven't heard any news of \nhim, but I suspect the bastard is one of the rebels.  We had a fox guarding our henhouse.\n*page_break\nThe rebels claim that as Costaguanans the site belongs to them.  Of course, it belongs to all Costaguanans, but these thugs somehow understand that the \nEastern City belongs to them more than it does other citizens.  The rebels act like they're using the megaliths as a stronghold, but they're actually \nholding it hostage.  They know that General Cabrero won't attack them there for fear of destroying the site.\n\nIf there's any flicker of hope, it's that the rebels don't seem to have the support of public.  The Saint of Darkness has predicted that every man who \ntries to live in the Eastern City will die of boils.  She may be a charlatan and a fraud, but the Saint of Darkness has a talent for voicing public opinion.\n*page_break\nI'm going to stay here, at least for a few more days, to see if there isn't anything I can do.  At the very \nleast, someone needs to remind the government of how precious the Eastern City really is.  If something were to happen to those ruins, if the Eastern City \nitself were to be destroyed, the entire world would lose an important and irreplaceable piece of its heritage.  All those secrets, all that knowledge of our \npast, would be lost forever.\n\nLove,\n\nLucius\n\nQUERY SERA:\n*choice\n\t#Lenz geoglyphs\n\t\t*goto_scene geoglyphs\n\t#Saint of Darkness\n\t\t*goto_scene young_saint\n\t#Jairo, rebel involvement\n\t\t*goto_scene crazy_digger\n", "rebel_drugs": "*gosub_scene adcheck\n*label rebel_drugs\nreport by call sign OUTRIDER\n\n9 October 1997\n\nAgent SHAMUS has been approached by elements of the Emage rebel group to fly shipments of cocaine to a midway point in Central \nAmerica.  Obviously, I have considerable reservations about a CIA officer flying cocaine out of South America, but this is an \nopportunity to infiltrate this Socialist guerilla group.\n\nWith Agent SHAMUS otherwise occupied, I am formally requesting that we recruit Dr. Lucius Thayer as an asset.  I understand that \nhis relationship with BLACKBIRD makes him fundamentally vulnerable, but Agent SHAMUS is of the opinion that Thayer's relationship \nwith BLACKBIRD may soon end due to a professional dispute on the existence of prehistoric giants.\n*page_break\nWe have also collected enough circumstantial evidence that BLACKBIRD is indeed collaborating with the Emage rebels that we can \nexpose her to Thayer.  After their occupation of the Eastern City, I have little doubt that he would be an easy recruit.\n\nQUERY SERA:\n*choice\n\t#Emage rebels\n\t\t*goto_scene propaganda_flier\n\t#BLACKBIRD\n\t\t*goto_scene first_breakup\n\t#OUTRIDER\n\t\t*goto_scene presidents\n", "saint_lenz": "*gosub_scene adcheck\n*label saint_Lenz\nfrom the journal of Dr. Thayer, L., PhD.\n\n27 August 1994\n\nAfter years spent on the geoglyphs, we're finally starting to dig in the Northwest Gully.  Isabel has fought hard for this, but digging where a \nprophet tells us to dig is dangerous public relations.  There are already signs that there may be more structures there.  Still, if we dig and \nfind nothing, we look like fools for listening to a false prophet.  But if we DO find something, the Saint of Darkness will get all the credit.\n\nI don't think Dr. Lenz approves of this dig, but it's getting hard to read his moods.  He's getting so old and frail, and at times he seems so \nunresponsive.  His deafness doesn't help.  Perhaps he simply doesn't care anymore.  I've seen that in older people who have no family.  They stop \ncaring about themselves, about other people.  It's a sad kind of hopelessness, an acceptance of insignificance.\n*page_break\nMy own insignificance has a habit of slapping me in the face when I'm at the Eastern City.  Here was a great, far-reaching civilization, skilled \nat construction, with a deeply involved belief system, and now they're gone.   We don't even have the record of a single individual: no king, no \nqueen, no priest, or priestess.  The stones are all that's left to indicate that there were people here at all.  \n\nAnd the geoglyph.  There are still so many questions about that figure.  Perhaps digging in the Northwest Gully will give us some answers.\n\nQUERY SERA:\n*choice\n\t#geoglyph\n\t\t*goto_scene geoglyphs\n\t#labyrinth\n\t\t*goto_scene Labyrinth\n\t#Saint of Darkness\n\t\t*goto_scene young_saint\n", "saint_dies": "*gosub_scene adcheck\n*label saint_dies\nfrom cellphone surveillance of BLACKBIRD\n\nSulaco.  7 May 2007\n\nBLACKBIRD: Moema is dead. \n\nEXTRANO:  Is this confirmed?\n\nBLACKBIRD:  I saw the body myself.\n\nEXTRANO:  Are you responsible for this death?\n\nBLACKBIRD:  No.  Of course, not.  That would expose us.  The girl killed herself.\n\nEXTRANO:  How did this occur?  How did you allow this to occur?\n\nBLACKBIRD:  I could not stop it.  I don't think it agreed with her.  The fever.  \n\nEXTRANO:  Moema survived the Red Fever.  Her behavior should have fallen within acceptable parameters.\n\nBLACKBIRD:  Then she is an anomaly.  She was acting crazy.  She was living on the street.  She may have been doing drugs.\n\nEXTRANO:  Has this been confirmed?\n\nBLACKBIRD:  No.  This is conjecture.\n\nEXTRANO:  Continue.  How did Moema kill herself?\n\nBLACKBIRD:  She drowned.  She jumped off of the pier into the bay.  This morning, she washed up near the Palafitas.  It's a \nslum south of the city.  A lot of Brazilians live there.\n\nEXTRANO:  Moema accrued some celebrity.  Will we see headlines that the \"Saint of Darkness\" killed herself?\n\nBLACKBIRD:  She was famous in the Lower City a long time ago.  I don't think people care anymore.  There are just a few of \nus from the old days who bothered to keep track of her.  Most people think she was a fraud.\n\nEXTRANO:  Then this is an acceptable loss.  Report again if there are further developments concerning Moema.  Proceed as planned.\n\nBLACKBIRD:  Understood.\n\nQUERY SERA:\n*choice\n\t#Red Fever, mental health effects\n\t\t*goto_scene interview_beecher_last\n\t#YOUR INBOX HAS ONE (1) MESSAGE\n\t\t*goto_scene Beecher_memo", "saint_named": "*gosub_scene adcheck\n*label saint_named\nthe Costaguanan Government's \"Medina Memo,\" 3 August 1989\n\nTOP SECRET\n\nATTEMPT TO LOCATE\n\nMoema Medina, a young woman known as \"The Saint of Darkness,\" is wanted for questioning by Sulaco authorities \nin connection with recent Communist rebel activity.  162 centimeters tall, dark hair, dark eyes, dark complexion, \nMedina was last seen in the Lower City neighborhood.  \n\nKnown for making predictions about the future, Medina is believed to be a tool of the propaganda arm of the anti-government rebels.\n\nRecent CIA investigations have revealed a connection between the rebel forces and the Soviet Union.  Gatherings \naround the so-called \"Saint of Darkness,\" ostensibly for hearing her predictions, were in fact meeting places for \nforeign and local Communists.\n*page_break\nThe source of this information is a Cuban defector who is referred to by the name \"Juan Borrego.\"  Borrego has \nbeen actively operating in Sulaco under the direction of Fidel Castro.\n\nBorrego was also under the impression that a \"pale man in black\" is an American operative.\n\nQUERY SERA:\n*choice\n\t#rebel forces and the Soviet Union\n\t\t*goto_scene narco_profile\n\t#pale man in black\n\t\t*goto_scene MIB_visit\n", "saint_rescue": "*gosub_scene adcheck\n*label saint_rescue\nextract from a report filed by agent call sign OUTRIGGER\t\n\n9 September 1989\n\nOnly three days after the arrest of Moema Medina, aka \"The Saint of Darkness,\" a lethal outbreak of influenza \nhit the Lower City.  The public blamed the outbreak on the Saint's incarceration, and before the week was out, \nthousands of citizens of from the Lower City marched on the Ministry of the Interior building in Sulaco, demanding \nthe release of the Saint of Darkness. \n\nThe crowd was dispersed by force.  Military police forces used tear gas and rubber bullets on the crowd.  The \nprotesters suffered several casualties.  Officially, someone within the crowd initiated the conflict by firing upon \nthe military police.  We have no evidence either that backs or refutes this claim...\n*page_break\n...We have RUMINT that the outbreak of influenza was not a natural occurrence.  Word is that a saboteur used the pretext \nof a flu vaccine to disperse the disease with the goal of agitating the public.  Clearly the ploy worked.  \n\nWe have yet to determine the group behind the outbreak.  They clearly have more resources than the local rebels.  \nThe outbreak is likely Soviet or Cuban intervention; however, one of our Cuban double agents has heard the theory that \nthe biological agent is being spread through aerial spraying, that the planes spraying coca crops as part of the \neradication efforts are also spreading the contagion.\n\nQUERY SERA:\n*choice\n\t#Soviet sabotage\n\t\t*goto_scene Russian_bar_2\n\t#Coca eradication as cover\n\t\t*goto_scene Thayer_CIA\n\t#relation to 2017 outbreak?\n\t\t*goto_scene CIA_conspiracy\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*comment No Stats screen\n\nfrom the CIA interview of Hartley, M., a Miskatonic student under Dr. Thayer, L., PhD., at the Eastern City.\n\nInterview conducted by \"TIM.\"\n\nTIM:  I'm not going to lie, Mark.  Your involvement with the Wellingham Foundation could get you in a lot of trouble.  \nSome of their recent activity has put them under close government scrutiny.\n\nHARTLEY:  What?  What have they done?\n\nTIM:  They're amassing a small army in Ohio.  Didn't you know about their militia?  They're preparing for the End Times.\n\nHARTLEY:  But that's...  Those are just rumors.  That's gossip.\n\nTIM:  I've seen the surveillance photos of their compound.  And I know you've heard the leader's speeches about how the \nU.S. government is \"failing to protect the world.\"  I think he's planning on protecting the world himself, whether the \nworld wants it or not.  All those guns.  Explosives.  The Wellingham Foundation is a hair's breadth from being labelled \na terrorist organization.\n\nHARTLEY:  That's not me, okay?  I know some people there, but I'm not, like, a member of their church.\n\nTIM:  Then help me out.  Tell me something about their part in all of this.\n\nHARTLEY:  The stone axes.  Those axe heads that were stolen from the National Museum in Sulaco.\n\nTIM:  They stole them?\n\nHARTLEY:  No, but they tried to buy them.  That's what I heard.  For years, they tried to buy the stolen axe heads, but \nnone of the usual fences for stolen art had them.  No one in the art smuggling world had any idea of where they were.\n\nTIM:  That's it?  That's supposed to help me?  A bunch of criminals said they didn't see stolen goods?\n\nHARTLEY:  One of the Wellingham people, Birkin or something.  He said he thought that Roberto Puig himself had stolen the axes.\n\nTIM:  What would he do that for?\n\nHARTLEY:  Birkin suspected there was some kind of Emage cult in Costaguana.  He was sure that Puig was part of it.  I never \nheard anything about it, though.\n\nQUERY SERA:\n*fake_choice\n\t#where are the stone axes?\n\t#YOUR INBOX HAS ONE (1) MESSAGE\n\n*script changeBackgroundColor(\"black\")\n\nletter from agent call sign OUTRIGGER to Dr. Lenz, J., PhD. \n\n5 May 1991\n\nDear Johannes,\n\nI might be losing my faith.  I know you never believed in Nazi Germany, but I believe in America.  But when I look at the crime \nin our streets, I look at the work we're doing in South America, the whole damn War on Drugs looks like American Cronus eating \nhis children.  That's all we are sometimes, a giant monster devouring the next generation out of a pathetic hope that we can live forever.\n\nAll right, I'm getting frustrated.  I need too much money to accomplish too little down here.  Chasing after smugglers who get better \nevery year, and burning down coca fields that will just spring up again like weeds, it's taking all my time and resources.  None of \nit amounts to anything because it isn't any kind of real change.\n\nIt's scary to think about, but after it happens, we may wish we had dug up the Labyrinth sooner.  If you think we should dig, tell me, \nbut word from the top is to hold off for now.  The Eastern City is a trump card we want to hold onto.  It's bad enough that the \nRussians know what it is.  Since the USSR broke apart, their intelligence is hitting the black market just as hard as their small arms.  \nWhen word gets around about the arms race between Soviet and Western archaeologists, there are going to be a few more players in Sulaco.  \n\nLove,\n\n[REDACTED]\n\nQUERY SERA:\n*fake_choice\n\t#arms race between Soviet and Western archaeologists\n\t#Costaguanan drug war\n\t#CIA involvement, Costaguana, drugs\n\n*script changeBackgroundColor(\"sepia\")\n\nThe better tactic would be to lead the public towards identifying the rebels with the region's pseudo-archaeological findings and to definitively discredit those \nfindings.  With their insistence that giants once lived at the Eastern City, it would be easy to make flawed reasoning their defining characteristic.    \n\nPresident General Wagner Cabrero is the public figure who should be identified with the Eastern City.  Reclaiming the greatness of Costaguana's history \nin a realistic, dignified manner, as opposed to claiming to be descended from giants, could go a long way in winning public support for the ruling government.\n\nI am by no means a politician, Roberto.  I merely wanted to point out that we have other options than closing down the dig.\n\nThank you,\n\nLucius Thayer\n\nQUERY SERA:\n*fake_choice\n\t#giants evidence\n\t#President General Wagner Cabrero\n\n\nSulaco is currently under quarantine.  There has been no official statement from the Costaguanan government, and even the CDC \nhas been denied access to the city.  Social media accounts have been cut off to everyone in Costaguana.  Some reports are leaking out of \nthe country via telephone, and sources within Sulaco report an unnerving quiet.  Many of the dead and the sick have been left \nin the street as everyone is afraid to come into contact with them.  Most citizens are too afraid to leave their homes, even for food.  \n\nLocals have been known to practice a form of black magic similar to Santeria, and CDC officals have speculated that the consumption \nof improperly prepared animals allowed for a contagion to jump to humans from a species of pig or goat.  Unnamed officials in \nthe United States State Department are speculating that Sulaco is the victim of some kind of biological attack, but with apparently \nno investigation under way by the Costaguanan government or the CDC, there is no way of knowing.  It would appear that the citizens of \nSulaco have been left to live or die on their own.\n\nQUERY SERA:\n*fake_choice\n\t#source of biological attack?\n\t#State Department, plague\n\t#improperly prepared animals, Sulaco\n\n", "seizing_eastern_city": "*gosub_scene adcheck\n*label seizing_Easter_City\nextracted from CIA report 9817239488E(2002):\n\n...Members of Gonzalgo's intelligence services moved in on the excavation site the following week.  At that time, Jairo Becker was the only \nsurvivor.  He was in an emaciated state, but he had already begun to recover from the boils.  The other Emage rebels had long succumbed to Red \nFever.  At the time of the recovery, their corpses had begun to rot.\n\nJairo Becker indicated that the illness had spread to through the camp in a matter of hours.  Let me repeat, the illness spread through the \ncamp in a matter of hours.  Local CIA officers are convinced that the unknown element in the Eastern City is biological.  We do not yet know if \nCostaguanan authorities were able to retrieve a sample.  The results could be catastrophic if they have.\n*page_break\nLocal CIA officers are again requesting more assets.  Agent call sign SHAMUS is suggested that Dr.  Lucius Thayer, professor of archaeology at \nMiskatonic University, be placed in the Easter City.  He was noncompliant when he left Costaguana in 1998.\n\nQUERY SERA:\n*choice\n\t#Thayer's noncompliance\n\t\t*goto_scene Mary_letter\n\t#Why do the Costaguanans allow Thayer to return?\n\t\t*goto_scene visas\n\n\n", "startup": "*create logic 80\n*create paranoia 20\n*title The Spy and the Labyrinth\n*author Lewis Manalo\n*scene_list\n\tCostaguana_Factbook\n\tEastern_City\n\tGonzalgo_sick\n\tinterview_one\n\tIsabel_thesis\n\tLenz_bio\n\tThayer_arrives\n\tThayer_bio\n\tTiwanaku\n\tgeoglyphs\n\tancient_astronauts\n\tcrazy_digger\n\trebel_city\n\tProto_Tiwanaku\n\tEmage_beliefs\n\tkeening\n\tpsychic_phenomenon\n\tSloane\n\tEl_Dorado_raft\n\tyoung_saint\n\tPuig_geoglyphs\n\tsaint_Lenz\n\tLenz_dies\n\tEl_Viejo\n\tSloane_letter\n\tNazca_theory\n\tMays_one\n\tLabyrinth\n\tChapter_2\n\tIsabel_giants\n\tIsabel_statue\n\tPatagonia_giant\n\tLenz_funeral\n\tTiwanaku_PumaPunku\n\tfirst_breakup\n\thoax_skulls\n\tSulaco_bombings\n\tpresidents\n\tEmage_politics\n\tBlackbird_notes\n\tLincoln_giants\n\tThayer_dig\n\tNephilim_theory\n\tNephilim_Genesis\n\tbrainless_giants\n\tpropaganda_flier\n\trebel_drugs\n\tman_in_black\n\tgreat_flood\n\tVatican_dig\n\tHector_el_caballero\n\tduende\n\trats_run\n\tCabrero_holdouts\n\tIsabel_bombings\n\tIsabel_friend\n\tMary_Halsey\n\tmeeting_Isabel\n\tNarco_rebels\n\tIsabel_Arkham\n\tIsabel_magic\n\tmarry_Isabel\n\tmeeting_saint\n\tArkham_stranger\n\tassassinate_Cabrero\n\tdissent_Lenz\n\tfirst_contact\n\tfirst_night\n\tforeplay\n\tIsabel_swallow\n\tlate_Isabel\n\tLenz_digs\n\tLower_City\n\tPuig_Isabel\n\tRoger_reveals\n\tSloane_interview\n\tSoviet_Puig\n\tThayer_2000\n\tThayer_leaves\n\tThayer_loves\n\tChapter_4\n\tCIA_conspiracy\n\tclose_portal\n\tCronus\n\tEmage_1500s\n\tIsabel_stranger\n\tLenz_file\n\tMary_Halsey_2\n\tmaze_portal\n\tmeeting_Shamus\n\tMIB_visit\n\tMIB_visit_2\n\tnarco_profile\n\tplague_1500s\n\tplague_2015\n\tplague_facts\n\tPuig_father\n\tPuig_stranger\n\tRussian_bar\n\tRussian_bar_2\n\tSaint_mad\n\tsaint_named\n\tsaint_rescue\n\tSloane_interview_2\n\tThayer_CIA\n\tinterview_MIB_1\n\tartefact_Puig\n\tartefacts_rumors\n\tartefacts_stolen\n\tBeecher_memo\n\tChapter_5\n\tgiants_die\n\tinterview_beecher_last\n\tinterview_MIB_1\n\tIsabel_goodbye\n\tlast_entry\n\tMary_letter\n\tplague_1700s\n\tplague_2017\n\tpresident_elect\n\tPuig_1997\n\tsaint_dies\n\tseizing_Eastern_City\n\tSloane_dies\n\tt_gondii\n\tvisas\n\n*create abduct false\n*create giants false\n*create labyrinth false\n*create terrorist false\n*create weapon false\n*create MIB false\n*create portal false\n*create helm false\n*create name \"\"\n\n*create adtrack 0\n\n*if not(choice_is_web or choice_is_steam)\n\t*temp skip_description\n\t*config skip_description false\n\t*if skip_description\n\n\t\t*goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n\tFamous archaeologist Dr. Lucius Thayer has gone missing in the Amazon jungle, and the CIA has asked you to find him.  Unfortunately, you’re not the only one interested in Dr. Thayer.  Enter a world of ancient mysteries and modern dangers, of suspicious cults and nefarious secret agents. Remember, you’re not paranoid if the danger is real.\n\n\t[i]The Spy and the Labyrinth[/i] is a 40,000 word interactive fantasy novel by Lewis Manalo, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n\tYour choices determine which document you read next in your ongoing search for clues. Through your investigation of the articles, journal entries, and letters in the missing archaeologist’s files, you will discover the game’s rich story and complex characters. Multiple playthroughs will uncover secrets you previously missed in this engrossing tale of supernatural horror.\n\n\t• A unique narrative experience![n/]\n\t• Horror and espionage collide in a captivating adventure![n/]\n\t• An expansive world, steeped in centuries of real - and imagined - history.[n/]\n\t• An intriguing cast of international characters.[n/]\n\t• Uncover new secrets with each playthrough!\n\n\t*if choice_is_advertising_supported\n\t\t[i]The Spy and the Labyrinth[/i] is supported by advertisements, but you can buy the unlimited version\n\t\tto turn off ads forever.\n\t\t\n\t\t*purchase adfree $4.99 purchased\n\t\t*page_break_advertisement\n\n\t\t*goto purchased\n\t*else\n\t\t[i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n\t\t*purchase adfree $4.99 purchased\n\t\t*page_break Play Now for Free\n\n*label purchased\n\nWelcome to the Secure Evidence Research Archive (SERA).\n\nLAZARUS files attached.  \nDesignation: TOP SECRET, EYES ONLY\n\nAGENT LOGIN\n\nEnter your name to download packet:\n*input_text name\n\n*page_break\nGreetings, Agent ${name}.\n\nSix weeks ago, Dr. Lucius Thayer, professor of archaeology at Miskatonic University, went missing.  A specialist in Pre-Columbian cultures, \nhe'd been living and working at a jungle dig site in the South American Republic of Costaguana.  On the morning of May 14th, the students working \non the dig woke up and could not locate Dr. Thayer.  His tent had been ransacked, but from what the students tell us, nothing other than the \nprofessor is missing.  \n\nCostaguanan officials have not been cooperative.  Their police have done nothing for this case other than \nhem our consulate up in red tape;  they have effectively denied entry to the country for any American law enforcement officials.  \nThe entire situation stinks of foul play and corruption.\n*page_break\nClearly someone in the Costaguanan government has something against Dr. Thayer and his work.  As an archaeologist working in South America \nsince the 1980s, Dr. Thayer encountered quite a few characters working for both sides of the Iron Curtain.  We suspect that someone from \nThayer's Cold War days now occupies a significant government position, and he or she may be collecting on an old grudge.  \n\nWe have some agents in the capital, Sulaco, on the Pacific Coast, but we don't have access to the crime scene.  What we do have, \nwhich you will find attached, are copies of nearly all of Dr. Thayer's files.  Thayer's Miskatonic students made copies of everything they \ncould before they were all deported back to the States.  There are hundreds of documents here.  They include Thayer's research, personal \njournals, notes, and personal letters.  We are currently debriefing Thayer's students and some of his other contacts, and transcripts of \nthose interviews will be uploaded as they occur.  The archive also includes some relevant CIA files and open source documents.  \n\nThese files likely hold clues to where Dr. Thayer may have gone, who may have abducted him, or, worse case scenario, who may have killed him.  \n*page_break\nIn the wake of recent terrorist activity and all the saber-rattling our friends are doing in the East, the head office does not consider Dr. Thayer's \ndisappearance a priority;  but he's had a long career in South America, and he still has a few friends in high places.  Search the files.  Find evidence of foul \nplay so we can force the Costaguanan officials to let us investigate.  Follow any thread you can think of.  With the controversial work Thayer \nwas doing, you never know where the clues might lead.\n\nYou're new to it, but SERA (the Secure Evidence Research Archive) is an easy tool to use.  As you search through the files, SERA suggests keywords for your next \nsearch; select a query, and SERA will find the file most relating to the one you just read.  \n\nUse the utmost discretion with these files.  Like I said, Thayer has friends in high places, but he has enemies there, too.  Make sure that you\nreport directly to me, and only me. \n*page_break\nI'll be tracking your progress, and I'll message you through your terminal if and when I see you making some headway.  I've been there through most of this \ncase, and I'll point you in the right direction if I can.\n\nDr. Thayer's work dealt almost exclusively with Costaguana.  Start your research with the \"Costaguana World Factbook,\" the \"Dr. Lucius Thayer Biography,\" \nor the \"Dr. Johannes Lenz Biography.\"  Lenz was Dr. Thayer's mentor and got Thayer started in Costaguana.  \n\nGood Luck,\n\nSpecial Agent In Charge Roger Mays\n\nPS - PAY ATTENTION TO THE DATES.  These documents cover about thirty years worth of information.  The first agent to look at these\ncouldn't keep her chronology straight, and she wasted a day we could've had looking for Dr. Thayer.\n\nQUERY SERA:\n*choice\n\t#Dr. Lucius Thayer Biography\n\t\t*goto_scene Thayer_bio\n\t#Dr. Johannes Lenz Biography\n\t\t*goto_scene Lenz_bio\n\t#Costaguana - World Factbook\n\t\t*goto_scene Costaguana_Factbook\t\n", "t_gondii": "*gosub_scene adcheck\n*label t_gondii\nextract from a report by the Office of Scientific Intelligence (OSI)\n\nT. GONDII, A CORRELATIVE MODEL FOR RED FEVER\n\nToxoplasma gondii is the most common parasite that affects humans in the developed world.  The parasite causes the disease \ntoxomplasmosis.  Upwards of 50 percent of the human population has been infected, and though flu-like symptoms may occur upon \ninitial infection, most humans experience an asymptomatic state of infection.  Though T. gondii can infect all warm-blooded \nanimals, the parasite most-often reproduces in cats.\n\nRats and other rodents infected with T. gondii are known to exhibit high-risk behavior around cats.  A recent Stanford study \nrevealed that rats infected with the parasite likely have had their brains altered in a way that makes them sexually attracted to \ncat urine.  This mind-altering process is a clever way for the parasite to reach its preferred host.  We suspect that \"Red Fever,\" \nperiodically found in the Costaguana region of South America, may function in a similar manner.\n*page_break\n100 percent of the infected subjects who survive Red Fever experienced altered behavior.  Reports from agent call sign SHAMUS \ndescribe their behavior as zombie-like; however, differing but still altered behavior has been observed in subjects we suspect were also \ninfected with Red Fever: Roberto Puig and the subject known as The Saint of Darkness.  \n\nThe OSI's preliminary hypothesis is that Red Fever is parasite that alters its human hosts' brains in the same manner as T. gondii \nalters the brains of rodents.  Given the variation in the behavior of individuals who may be been infected, without a sample of the \norganism that causes Red Fever, we cannot make a solid conclusion.\n*page_break\nWe will need more data, more observations from SHAMUS, but T. gondii does not alter the behavior of rodents without purpose.  Red Fever \nmust also have a purpose.  This parasite can control a human being's highly-developed brain.  We are dealing with a deadly organism \nthat effectively preys on humans.  \n\nQUERY SERA:\n*choice\n\t#Puig, altered behavior\n\t\t*goto_scene Puig_1997\n\t#Saint of Darkness, altered behavior\n\t\t*goto_scene saint_dies", "visas": "*gosub_scene adcheck\n*label visas\nemail to Dr. Thayer, L., from Puig, R., Director of El Costaguana Departmento de la Antiguidad\n\n7 June 2013\n\nDear Dr. Thayer,\n\nI am happy to inform you that the Direccion Nacional de Migraciones has agreed to issue work visas to you and up to three of \nyour colleagues.  These work visas will need to be renewed every school year.  Due to time constraints, we will need the names of your \ncolleagues by 31 June.  Your visa applications will go directly to me as I am a representative of the Universidad de Sulaco as well as the Departmento \nde la Antiguidad.\n\nIt has been far too long since Miskatonic University has had an archaeological team in Costaguana.  Your expertise has been sorely missed.  \nI look forward to seeing you again, and I look forward to a fruitful collaboration.  \n\nKind regards,\n\nRobert Puig\n\nDirector of El Costaguana Departmento de la Antiguidad\n\nQUERY SERA:\n*choice\n\t#Puig, mind control\n\t\t*goto_scene artefact_Puig\n\n", "young_saint": "*gosub_scene adcheck\n*label young_saint\nfrom the journal of Dr. Thayer, L., PhD.\n\n12 September 1988\t\n\nThese \"Other World\" events, these psychic phenomenon, have reached a new milestone: Sulaco now has its own prophet.  And because of her provincial\nsuperstitions, Isabel is pushing for us to listen to this child seer.\n\nGod.  How I hoped to be spared the humiliation of a prophet.  History has proven that all prophets are false prophets.  It's a wonder these \nCostaguanan charlatans haven't come up with this grift sooner.  Isabel swears by this urchin from the slums.  Stories about the girl with the \nvisions began circulating in June, when Lenz and I were back home in Arkham.  It started with visions of a dark city filled with \"gigante.\"  She \nsaw only the faintest of suns, and there were few stars.  \n*page_break\nLocals were taken with the idea that the dark city the girl saw was Xinnabala, the \"Cave of Fear,\" what the Emage believe to be the final destination \nof the dead.  They now call the girl the \"Saint of Darkness.\"  Soon after that vision of Xinnabala she began to have visions of the future.\n\nFor a girl with such a grand vision of Xinnabala, she's always predicting quaint things, but apparently, she can't predict specific things on command.  \nIf you asked, \"What are tomorrow's lottery numbers?\" she'd have no clue.  But surprisingly she can predict that an accident at the dock will occur.  \nOf course, on the docks of Sulaco, there is an accident almost every day.\n*page_break\nIsabel swears that the Saint of Darkness knows every detail of the dig site without ever having been there.  And now, the Saint is saying that if we dig \nwhere she tells us, near the area we call the \"Northwest Gulley,\" we will uncover something of crucial importance.  \n\nIsabel wants me to go and hear for myself what the Saint of Darkness has to say.  I expect, as with all charlatans, the Saint of Darkness will somehow \nturn the conversation to the topic of money.\n\nQUERY SERA:\n*choice\n\t#Xinnabala\n\t\t*goto_scene Sloane_letter\n\t#Northwest Gulley\n\t\t*goto_scene Labyrinth\n\t#Isabel\n\t\t*goto_scene keening"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
