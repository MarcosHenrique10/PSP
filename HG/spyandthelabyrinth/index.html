<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Spy and the Labyrinth — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "spyandthelabyrinth", "title": "The Spy and the Labyrinth", "scenes": {"arkham_stranger": "*gosub_scene adcheck\n*label Arkham_stranger\nextract from a report by Dr. Lenz, J., PhD.\n\n28 April 1991\n\n...When Thayer and I caught up to Ms. Cardinale, we discovered her engaged in conversation with a pale man in a black suit, tie, and hat.  \nAs soon as the man saws us, he began walking down an alley.  I wanted to pursue, but Ms. Cardinale blocked the alley with effusive greetings.  \nThayer was unaware of the man.  \n\nMs. Cardinale appears to have secret contacts in Arkham.  Meeting in the open does not seem like the Soviet style.  Nor can we be sure that \nthe contact is indeed a Soviet agent.  I understand agent SHAMUS theorizes that she has contacts in the Emage tribe, possibly through a relative.\n*page_break\nA question just as significant as \"who was her contact,\" is the question, \"What could she possibly tell him?\"  There have been no developments \nat the excavation this year that are not public knowledge.  My immediate conclusion is that she is receiving instructions regarding a future matter \nthat may very well be a threat to the project and to America's influence on South America.\n\nI am also beginning to be concerned for Thayer's safety.  Ms. Cardinale's influence on him appears to be total...\n\nQUERY SERA:\n*choice\n\t#Isabel Cardinale, Emage contacts\n\t\t*goto_scene Isabel_bombings\n\t#Isabel Cardinale, known relatives\n\t\t*goto_scene assassinate_Cabrero\n\t#Isabel Cardinale, Lucius Thayer\n\t\t*goto_scene Lower_City\n\n", "beecher_memo": "*gosub_scene adcheck\n*label Beecher_memo\nMEMO from agent call sign TIM\n\nAgent ${name},\n\nDespite passing her initial physical examination, Katherine Beecher, one of Dr. Thayer's Miskatonic students who went with him to \nCostaguana, has been diagnosed with Red Fever.  She has been moved to a medical facility where we can observe her and hopefully \nget a better understanding of this disease.\n\nMs. Beecher is a Red Fever survivor.  Despite no initial indications of mental abnormalities beyond the scope of a normal college-aged \nindividual, a few minutes of questioning uncovered an obsession with returning to Costaguana to continue on the dig.  The medical \nstaff who took Ms. Beecher from me this morning have informed me of additional odd behavior.  Among other things, she attempted to \neat an entire jar of cotton balls.\n*page_break\nWe have yet to determine if Red Fever is still contagious in persons who have survived the initial flu-like stages of the disease.  \nIn our worst-case scenario, the Red Fever parasite is similar to T. gondii, and like that organism, this parasite can be passed on \nfrom asymptomatic carriers.\n\nWith a blood sample for Ms. Beecher, the Office of Scientific Investigation has begun work on a cure for Red Fever.  I will keep you \ninformed of any further developments.  \n\n--Tim\n\nQUERY SERA:\n*choice\n\t#asymptomatic carriers\n\t\t*goto_scene Isabel_goodbye\n\t#cure for Red Fever\n\t\t*goto_scene Isabel_goodbye", "blackbird_notes": "*gosub_scene adcheck\n*label Blackbird_notes\nAgent SHAMUS secured the following notes, contained on several scraps of paper, from target BLACKBIRD's apartment on 5 October 1988.  \n\nAgent SHAMUS is of the opinion that though these notes do not conclusively identify her as an agent of the Soviet Union, they indicate a strong sympathy for \nseditious Emage groups.\n*page_break\n...The Saint of Darkness has seen Xinnabala.  She speaks of giants roaming the black halls of a stone temple.  She speaks of a sky lit with green \nand orange flame.  And she shudders in terror at the sight of the THING WITH NO NAME.  I cannot imagine what kind of horror she must see in her \nvisions, but I can imagine its immense power...\n*page_break\n...Even if they believed her, Cabrero's mestizo government cannot hope to understand the implications of the Saint's visions. This is a power that can only \nbe understood if you have Emage blood running through your veins.  But [indecipherable] is right: to keep this THING out of Cabrero's hands, Dr. Lenz must \ndirect the dig towards the Northwest Gulley.  Then, once the THING is found, we can take it somewhere safe...\n*page_break\n...Isabel, you are well-aware that Lucius is attracted to you.  What harm is there in giving him a little hope if it will help your career?...\n*page_break\n...Sources have told us that the Saint of Darkness is not above taking a bribe...\n*page_break\nQUERY SERA:\n*choice\n\t#Cabrero administration\n\t\t*goto_scene Sulaco_bombings\n\t#seditious Emage groups\n\t\t*goto_scene propaganda_flier\n\t#THING WITH NO NAME\n\t\t*goto_scene first_breakup\n\n", "cia_conspiracy": "*gosub_scene adcheck\n*label CIA_conspiracy\nextracted from TrueAsYourMomma.com\n\n24 October 2015\n\nDID THE CIA CAUSE AN OUTBREAK IN SULACO?\n\nIn recent months, an outbreak in Sulaco, Costaguana has killed hundreds of people.  The illness begins with flu-like \nsymptoms, but quickly--within hours--develops into something much worse.  Details coming out of Costaguana are sketchy, \nas the countrywide quarantine has been accompanied by a near total media blackout.  Most of the information we have was \ngathered from social media accounts belonging to people inside Costaguana.  Now, all of those accounts have been deleted.\n\nFrom one account belonging to American student @KatyDigsRuins, we have a sighting of the mysterious Men In Black.  For \nthose who don't know, the Men In Black show up whenever UFOs have been sighted.  They often harass eyewitnesses into silence.  \nSome UFOlogists theorize that the Men In Black may be aliens themselves.\n*page_break\nWith the recent UFO sightings in Peru, it is this writer's theory that a UFO crashed in Costaguana.  In the worst-case scenario, \nthe disease is a pathogen of alien origin, something completely unlike anything human beings have experienced.  If this is \nthe case, then the human race doesn't stand a chance, and, as a species, we are truly in our last days.\n\nIn an only slightly less scary scenario, to contain the crash site, the CIA needed to close Costaguana's borders in a hurry.  \nThe fasted way to do so was for the planes used in coca eradication to release a plague that motivated the Costaguanan \ngovernment to close its own borders...\n\nQUERY SERA:\n*choice\n\t#UFOs in Costaguana\n\t\t*goto_scene Russian_bar_2\n\t#Men In Black\n\t\t*goto_scene Puig_stranger\n\t#CIA coca eradication\n\t\t*goto_scene Thayer_CIA\n", "cabrero_holdouts": "*gosub_scene adcheck\n*label Cabrero_holdouts\nextracted from CIA FILE 998112324(2005):\n\n...After President Cabrero's death, with no clear successor to take over leadership of the country, and through the efforts of the U.S. State Department, \nCostaguana's first presidential election in over thirty years was held.  The United States government publicly supported humanitarian Greta Marquez \nfor president, but the winner of the 1999 election was Jude Gonzalgo, an indigenous Emage union leader.\n\nMedia reports that former members of Cabrero's regime were planning a coup d'etat proved to be unfounded, and several high-ranking members of the \nmilitary who served under Cabrero publicly voiced their support of the democracy and their acceptance of the election results.  Our research has \nuncovered no significant ties between the remainders of Cabrero's regime and the Emage rebel faction.\n*page_break\nWe did uncover peripheral members of Cabrero's regime who have some significant relationships with the Emage.  Within the Department of Antiquities, \nthe current director Roberto Puig and Dr. Isabel Cardinale, a staff archaeologist, have had an ongoing relationship with the Emage since at least the \nmid-1980s when they worked at the Department under President Cabrero's rule...\n\nQUERY SERA:\n*choice\n\t#Isabel Cardinale, Emage rebels\n\t\t*goto_scene Isabel_bombings\n\t#Roberto Puig, Emage rebels\n\t\t*goto_scene Isabel_bombings\n", "chapter_2": "*gosub_scene adcheck\n*label Chapter_2\n\nfrom the CIA interview of Hartley, M., a Miskatonic student under Dr. Thayer, L. at the Eastern City.\n\ninterview conducted by \"TIM.\"\n\nTIM:  I saw Dr. Cardinale's diagrams of the dig site.  What'd you think of her?\n\nHARTLEY:  What do you mean?\n\nTIM:  Do you know about her theories?  She tell you anything?\n\nHARTLEY:  You mean about the giants?  [Subjects laughs.]  You're kidding me, right?  \n\nTIM:  What did she tell you?\n\nHARTLEY:  I mean, I knew a lot about her already.  She's on those terrible cable tv shows all the time.  You want me to--?  Okay.  \nShe believes that the people who came before the Emage in the Eastern City, the people who predate the construction of Tiwanaku in \nBolivia, Isabel Cardinale thinks that they were giants.  Like, literal, \"fee-fi-fo-fum\" giants.\n\nTIM:  And you do not.\n\nHARTLEY:  No.  I live in the real world.  In a scientific world where we have evidence that proves our theories.\n\nTIM:  But you spoke with her on the dig.  You said so.  Did she have any new theories?\n\nHARTLEY:  I'm just a Miskatonic undergrad, man.  She, uh, she would tell me to get her a pen, or a ruler.  She asked me to get her coffee lots of times.  \n\nTIM: Think hard, kid.  She ever say anything about Roberto Puig or Johannes Lenz?\n\nHARTLEY:  I thought you were trying to find Dr. Thayer.  How are Dr. Cardinale's oddball theories about giants in South America going to help find Dr. Thayer?\n\nTIM:  Did she say anything about Puig or Dr. Johannes Lenz?  Did Puig believe her theories?\n\nHARTLEY:  I don't know.  Maybe.  She said...  No.  I overheard her speaking with him on a cell phone.  In the car.  My Spanish is pretty \nbad, but I know she was talking to Puig.\n\nTIM:  What did she say?\n\nHARTLEY:  I think she used the word, \"creer.\"\n\nTIM:  That's Spanish for \"think,\" or \"believe.\"\n\nHARTLEY:  Then she either said that Dr. Thayer was \"thinking\" about the giants, or that Dr. Thayer was \"believing\" in the giants.\n\nTIM:  There's a big difference there.  Don't they teach Spanish at that university of yours?  Geez.\n\nHARTLEY:  Sorry.\n\nQUERY SERA:\n*choice\n\t#Dr. Isabel Cardinale, giant theory\n\t\t*goto_scene Isabel_giants\n\t#Dr. Lucius Thayer, giant theory\n\t\t*goto_scene Isabel_giants\n\t#Roberto Puig, giant theory\n\t\t*goto_scene Lenz_funeral", "chapter_4": "*gosub_scene adcheck\n*label Chapter_4\n*page_break ALERT: INCOMING MESSAGE\nMEMO from agent call sign SHAMUS\n\nAgent ${name},\n\nJust checking in to say that you're making some real progress.  I'm too close the the case to focus in on \nthe crux of the problem the way you have.  I'm glad we've got your fresh eyes on this.  \n\nIt feels like you're close to identifying the people responsible for Thayer's disappearance.  I'm still \nhopeful that we'll find him alive somewhere.  Keep digging.  \n\n--Special Agent In Charge Roger Mays\n\n*page_break CONTINUE WITH QUERY\n\nletter from agent call sign OUTRIGGER to Dr. Lenz, J., PhD.\n\n23 October 1994\n\nDear Johannes,\n\nIt feels like all the world is out to get us.  I've done what I could to protect the Eastern City, but people here have decided to \nmove on the site now, while everyone's attention is on Saddam in the Persian Gulf.  I've heard rumors that the VP is pushing to take \naction in Costaguana now in case war does break out and all our resources start heading to the Middle East.  Al's always been fascinated \nwith the apocalypse.\n\nYou and your team are to begin digging in the Northwest Gulley as soon as you're able.  I have people running interference on the \nknown Russian agents who are left in the region, but we still have no idea who Blackbird may be working for.  Call sign MONTEGARD \nin Havana hasn't seen a shred of evidence that she's working for Castro.  You'll just have to watch her.  I advise you to keep Blackbird \nand Thayer away from the Labyrinth as much as possible.  \n*page_break\nThat \"mysterious stranger,\" the one in black spotted in Arkham, has been spotted in Sulaco.  Agent SHAMUS is looking into the idea \nthat these men are associated with Nazis hiding out in Argentina and Brazil.  You would know better than anyone that their esotericism \nmay have stoked their interest in the Eastern City.  I'll get word to you if that situation develops.  \n\nAnd for God's sake, be careful.  Some of the legends about the Labyrinth make the Plagues of Egypt sound like a fun Saturday night.\n\nLove,\n\n[REDACTED]\n\nQUERY SERA:\n*choice\n\t#Dangers of the Eastern City\n\t\t*goto_scene plague_2015\n\t#Post-Cold War Russian spies\n\t\t*goto_scene Russian_bar\n\t#Nazi esotericism\n\t\t*goto_scene Lenz_file\n", "chapter_5": "*gosub_scene adcheck\n*label Chapter_5\nfrom the journal of Dr. Thayer, L., PhD.\n\n1999\n\nThe irony is heartbreaking.  In a bid to spread Democracy to the free world, the United States pushed for a free and open election \nin Costaguana.  Who did the newly-free citizens of Costaguana elect?  A Socialist, Jude Gonzalgo.  He's dangerously charismatic, and \neverything he says and does points in the direction of Gonzalgo himself becoming a new dictator.\n\nThe oil industry and the mining industry only just became privately owned, and Gonzalgo won his presidency on a platform of nationalizing \nthose industries.  He's already set in motion a plan to make illegal any political party that is not his Socialist Party.\n*page_break\nAnd the people love him.  It's as if they've been brainwashed.  Every idea he speaks, the people repeat as truth.  Every faux pas, every \nmistake, the people forgive.  He has this tick where he refers to Argentina as a European country.  True, the citizens there are mostly of \nEuropean descent, but the country is in South America.  Its problems are South American.  Calling it part of the E.U. is completely inaccurate.\n\nFor once I'm happy I'm not in Costaguana.  But the rallies in support of this man, the willingness of the people to use their new freedom to \nchoose a leader who will only take that freedom away - there must be some kind of contagious mental illness going around Costaguana, because \nI can think of no other way to explain this hysteria.\n\nQUERY SERA:\n*choice\n\t#hysteria linked to disease?\n\t\t*goto_scene plague_1700s\n\t#more info on Jude Gonzalgo\n\t\t*goto_scene president_elect\n\n\n", "costaguana_factbook": "*gosub_scene adcheck\n*label Costaguana_Factbook\nWORLD FACTBOOK - COSTAGUANA\n\nINTRODUCTION\n\nEmerged in the 1830s after the collapse of Gran Colombia.  Conflict has persisted between the government and various rebel groups who have been funded \nby the Soviets and later the drug trade.  The conflict reached its height in the mid-to-late 1990s when rebels conducted a bombing campaign in the capital \ncity Sulaco.  General Wagner Cabrero, dictator of Costaguana since 1967, died in 1998.  Socialist president Jude Gonzalgo was democratically elected in \n1999.  He has been president ever since.  Despite the 2004 peace treaty, conflicts with rebel groups continue.  President Gonzalgo has been rumored to be in \nbad health.  (2017)\n\nGEOGRAPHY SUMMARY\n\nLocated on the Pacific Coast of South America and with the Andes Mountains on its eastern border, Costaguana has a tropical environment.  Natural resources \ninclude silver and, off the coast, oil.  The country is vulnerable to earthquakes.\t\n\nPEOPLE AND SOCIETY\n\nMestizo and white: 85%, Afro-Costaguanan: 9.5%, Amerindian 3.5%, Unspecified: 2% (2009 Est.)\n\nDEMOGRAPHIC PROFILE\n\nCostaguana's demographics are currently transitioning as many citizens have been leaving the country, legally or illegally, for Colombia, Argentina, and \nthe United States.  Low job growth and poor healthcare are cited as leading causes for the migration.  There is currently (in 2017) an unclassified plague, commonly \nknown as \"Red Fever,\" affecting many regions, but with Andean areas being the hardest hit.  Costaguana's Amerindian population are predominantly of the \nEmage people, residing in the Andean region.  Sometimes referred to as a \"tribe,\" the Emage people are actually several tribal groups with a shared \ncultural identity.\n\nQUERY SERA:\n*choice\n\t#Eastern City\n\t\t*goto_scene Isabel_thesis\n\t#Costaguana Plague\n\t\t*goto_scene interview_one\n\t#President Gonzalgo\n\t\t*goto_scene Gonzalgo_sick", "cronus": "*gosub_scene adcheck\n*label Cronus\nletter from agent call sign OUTRIGGER to Dr. Lenz, J., PhD. \n\n5 May 1991\n\nDear Johannes,\n\nI might be losing my faith.  I know you never believed in Nazi Germany, but I believe in America.  But when I look at the crime \nin our streets, I look at the work we're doing in South America, the whole damn War on Drugs looks like American Cronus eating \nhis children.  That's all we are sometimes, a giant monster devouring the next generation out of a pathetic hope that we can live forever.\n\nAll right, I'm getting frustrated.  I need too much money to accomplish too little down here.  Chasing after smugglers who get better \nevery year, and burning down coca fields that will just spring up again like weeds, it's taking all my time and resources.  None of \nit amounts to anything because it isn't any kind of real change.\n\nIt's scary to think about, but after it happens, we may wish we had dug up the Labyrinth sooner.  If you think we should dig, tell me, \nbut word from the top is to hold off for now.  The Eastern City is a trump card we want to hold onto.  It's bad enough that the \nRussians know what it is.  Since the USSR broke apart, their intelligence is hitting the black market just as hard as their small arms.  \nWhen word gets around about the arms race between Soviet and Western archaeologists, there are going to be a few more players in Sulaco.  \n\nLove,\n\n[REDACTED]\n\nQUERY SERA:\n*choice\n\t#arms race between Soviet and Western archaeologists\n\t\t*goto_scene Russian_bar\n\t#Costaguanan drug war\n\t\t*goto_scene narco_profile\n\t#CIA involvement, Costaguana, drugs\n\t\t*goto_scene meeting_Shamus\n\t\n", "eastern_city": "*gosub_scene adcheck\n*label Eastern_City\n\"Discovery of Lost City in Costaguana\"\n\nBy James Feely\n\nfrom SCIENTIFIC NEWS, July 1975\n\n...the monoliths bear comparison to the great constructions at Tiwanaku in Bolivia.  If the \"Eastern City\" were a part of the Tiwanaku empire, \nthis would be the first time this culture has been seen this far north.\n\nFor his part, Dr. Lenz is cautious in his speculation.  \"I'm not ruling it out, but we need more evidence before we can draw any conclusions,\" \nhe said.  \"I can tell you that aside from the use of monolithic pieces of stone, there is very little evidence that the Eastern City is related \nto Tiwanaku.  Based on depth, we suspect that the site may date back as far as 1400 B.C.  If anything, the people of the Eastern City may be a \nproto-Tiwakan culture.\"\n*page_break\nFor centuries, the Eastern City was considered merely legend.  The indigenous Emage people described the city as the gateway to the River of \nthe Dead.  The Emage believe that this river leads to their version of the Underworld, a place they called Xinnabala, \"The Cave of Fear.\"  Dr. \nLenz has long speculated that the Eastern City was a spiritual center in ancient times.  \"Xinnabala may be an actual cave where perhaps human \nsacrifices were performed.  There is a long tradition of human sacrifice in the region.  Human sacrifice was often part of a ritual for appeasing \nthe gods.  As these stories were passed on generation after generation, the mythology, the stories, may have evolved.  So within this Emage \nlegend, there is a truth.\"\n\nQUERY SERA:\n*choice\n\t#Tiwanaku\n\t\t*goto_scene Tiwanaku\n\t#Xinnabala\n\t\t*goto_scene El_Dorado_raft\n\t#Emage\n\t\t*goto_scene interview_one\n", "el_dorado_raft": "*gosub_scene adcheck\n*label El_Dorado_raft\nfrom the research notes of Dr. Thayer, L., PhD.\n\nUndated\n\n...Of course, any raft sculpture found in the Colombian/Costaguanan area of South America would make a person think of the Muisca or \"El Dorado\" raft, \nbut this piece is entirely different in nature.\n\nTo begin with, the piece was cast in silver.  Note, I must contact a metallurgist for more information on how the processes of casting differs from that \nused to make the Muisca raft.  Maybe a metallurgist familiar with the Pre-Columbian silver casts from Peru.  There is only one figure, and though he is \ndepicted wearing a nobleman's finery - earrings, nose ring - he holds his own oar.\n*page_break\nThe blocky style of the figures and the headdress are clearly of a similar style to that of the civilization that lived in the Eastern City.  Though Lenz's \ngeoglyph is more symbolic that our silver boatman, the similarities are undeniable.  Is this a man going down the River of the Dead to Xinnabala, \"The Cave \nof Fear\"?  Or is this, as Isabel theorized, an artefact from her proto-Tiwanku civilization, and the figure is Viracocha, going back to the sea?   Or one \nof Viracocha's giants going to Xinnabala?\n\nRoberto Puig speculates that the dots on the figure's body are ornamental, but, as in all things Roberto says, I am inclined to doubt him.  The speckles may \njust as easily depict a disease.  After all, we don't know what happened to the people of the Eastern City.  They may have been killed off by some kind of \nplague.  We only know that these people disappeared long before the rise of the Incas.  \n*page_break\nThere's an interpretation that we have not yet entertained.  The Eastern City is the supposed gateway to The River of the Dead, but the River of the Dead itself \ncould be a disease.  The \"river\" part of the name may just be indicative of a symptom, just like \"water\" is for \"blackwater\" fever.  All we've ever heard \nabout the Eastern City is that it's a city of the dead.  \n\nPerhaps the city is a graveyard.\n\nQUERY SERA:\n*choice\n\t#Tiwanaku\n\t\t*goto_scene Tiwanaku\n\t#Pre-Colombian plague\n\t\t*goto_scene Proto_Tiwanaku\n\t#Lenz geoglyphs\n\t\t*goto_scene geoglyphs", "el_viejo": "*gosub_scene adcheck\n*label El_Viejo\nreport by call sign SHAMUS\n\nSulaco, Costaguana.  5 January 2004\n\nThayer reports that Roberto Puig graced the site with his presence yesterday.  In the little pond of Costaguana, he's become a big fish\nThat bastard politician has come a long way in the past - what is it now? - twenty years.  He was such a sloppy, endearing, little man when he \njoined the Department of Antiquities, and now, especially since Latin America's Socialists have come to power in this \"Pink Wave,\" his whole \nmanner has changed.  He's become some kind of precise bean-counter, a transormation that makes me think the whole virginal-bookish-oaf routine was just an act.  \n\nIt's baffling that the Department of Antiquities could hold so much power in any part of the world aside from Egypt with her pyramids.  \nMost school children outside of South America are never taught a single sentence about the Eastern City, but Roberto Puig has somehow managed to \nmake those ruins nearly as important to the Costaguanan government as the Gross National Product.  He runs his department like it's some kind of secret police force, \nwith employees covertly working on digs around Latin America, with assets in governments all over the region;  but as far as I can tell, the \nDepartment of Antiquities does nothing other than ensure that it gets its funding every time the president signs off on a budget.\n*page_break\nPuig has always had vision, hasn't he?  Since their little conspiracy about the discovery of the Lenz geoglyphs, Puig has used Thayer.  Puig always knew \nthat Thayer would end up in charge of the dig.  But with all that funding Puig is securing, the relationship is a little big quid pro quo.\n\nBut Thayer tells me that now, for the first time, Puig has asked him to change something at the dig, to shift its focus.  He wants Thayer to revisit the \nNorthwest Gully, that bog that the Saint of Darkness had all those predictions about twenty years ago.  She spoke about a labyrinth in the Eastern City.  \nThe rain buried the progress Johannes Lenz made in that area, but Thayer says there are some promising signs; apparently he dug up some pottery shards\nwith a labyrinth etched on them.\n*page_break\nPuig is promising Thayer new government funding for the dig.  There's so much money for the government to throw around ever since they nationalized the oil industry, \nI know he's telling the truth.  The question is why should this labyrinth be so important to him?\n\nQUERY SERA:\n*choice\n\t#labyrinth\n\t\t*goto_scene Labyrinth\n\t#Northwest Gully\n\t\t*goto_scene Lenz_dies\n\t#Saint of Darkness\n\t\t*goto_scene saint_Lenz\n", "emage_1500s": "*gosub_scene adcheck\n*label Emage_1500s\nfrom the journal of Padre Ganza, Ferdinand\n\n29 April 1597\n\nI am near death.  This pox will kill me.  What I write here will be my last entry.\n\nMy Jesuit brothers plan to burn the city of Sulaco.  It is barbaric, but it is our only hope of destroying this disease.  \nWith the little faith I can muster, I pray that this effort will be enough to halt this plague from spreading.\n\nTo put the full authority of the Church behind the order, I forged a letter from the Vatican, ordering that the Labyrinth \nand its city be destroyed.  They lack the strength to destroy the ancient city, but the soldiers who have not yet succumbed to the \npox are burying the Labyrinth.  The Emage and the other tribes are joining them in their efforts.  The portal must be closed.  It must never \nbe found again.  If the gods and demons I saw in the Other World were ever to come to ours, our fate would no doubt be worse than this plague.\n\n--Translator's note: Padre Ferdinand Ganza was a Jesuit priest in the town of Sulaco in the region of Gran Colombia that would \nlater become Costaguana.  Historians believe that he died in 1597 during a fire that destroyed half of the city.  There is no \nrecord of a plague in Sulaco in the 1590's.\n\nQUERY SERA:\n*choice\n\t#Did Thayer open the portal?\n\t\t*goto_scene close_portal\n", "emage_beliefs": "*gosub_scene adcheck\n*label Emage_beliefs\nletter to Dr. Thayer, L., PhD. from Dr. Cardinale, I.\n\n25 October 1986\n\nDear Lucius,\n\nThe wet season has been punishing this year.  The winds of Hurricane Roslyn are not affecting us this far south, but she is no doubt \ncontributing to the rain.  The lower barrios of Sulaco are getting more flooded than usual.  Those driven from their homes by the rising \nwater have constructed a small shantytown out of tarps and cardboard in Bolivar Square.  It's filthy and full of crime, but as long as \nthe river seeps into the lower city, no one has the heart to protest the shantytown being there.  Needless to say, I do suggest that this \nyear's dig be delayed.\n\nI have been volunteering, giving aid to the flood victims; handing out water and blankets, collecting clothes and toys for the children.  \nA good number of the flood victims are Emage, and an old man told me a version of their creation story that you may find interesting.  \nIn this version, the First People were a race of giants.  When their creator, El Viejo, was displeased with them and sought to destroy them \nwith a flood, the giants built boats out of stone and sailed down the River of the Dead to create a new home in a cave underground.  \n*page_break\nAfter the flood, El Viejo created the Emage, and the giants became jealous.  El Viejo saw their jealousy and felt sorry for his first children.  \nSo El Viejo told the Emage that every year they must send someone down the River of the Dead to the giants' home, Xinnabala, \"The Cave of Fear.\"  \nThe giants would eat this person, and as long as they were satisfied, they would not return from Xinnabala and eat all of the Emage.\n\nIt's a strange version of the story, and I can't wait to hear what you think of it.  I look forward to seeing you in the coming months.  And not \njust for your thoughts on the myth or so I can get back to the bas reliefs of the Eastern City.  I've come to realize that the few months I get \nto spend with you are the highlight of my year.  I know you don't think much of my theories, that you think I'm just an undergraduate who entertains \nfantastic theories, but I hope you enjoy my company as much as I enjoy yours.\n\nWith affection,\n\nIsabel\n\nQUERY SERA:\n*choice\n\t#Tiwanaku\n\t\t*goto_scene Tiwanaku\n\t#River of the Dead\n\t\t*goto_scene El_Dorado_raft\n\t#Dr. Cardinale's research\n\t\t*goto_scene ancient_astronauts\n", "emage_politics": "*gosub_scene adcheck\n*label Emage_politics\nfrom the CIA interview of Hartley, M., a Miskatonic student under Dr. Thayer, L. at the Eastern City\n\nInterview conducted by \"TIM.\"\n\nTIM:  What do you understand about Emage politics?\n\nHARTLEY:  You mean the rebels?\n\nTIM:  Yes.\n\nHARTLEY:  The rebels.  Honestly?  I don't understand it.  I thought they were Communists or something, but then the whole Soviet Union thing ended.  \nThen there was the drug connection thing.\n\nTIM:  What do you know about the \"drug connection thing\"?\n\nHARTLEY:  Nothing.  Just what's in the papers.\n\nTIM:  Kid, we know what you're into.  You might be able to keep your social life away from your Miskatonic professors, but we dug into all your hidden \nsocial media accounts as soon as we knew you wanted out of Costaguana.\n\nHARTLEY:  Why would you--?  What for?\n\nTIM:  We had to know if you were worth saving, man!  You think you're special just because you're American?  Now, look.  We know your relationship with \nProfessor Isabel Cardinale was more than just sharing a couple rides to the Eastern City.\n\nHARTLEY:  What?\n\nTIM:  Come clean, kid.  Was it the Nephilim?  I know you've read all the Wellingham Christian Foundation crap about the Nephilim.  Did you share Cardinale's\n\"unconventional\" ideas?\n\nHARTLEY:  Are you implying that I--?\n\nTIM:  You know Isabel Cardinale was involved with the Communist rebels?  The ones who worked so hard against President Cabrero?  You know, we even have \ninformation that might link her to the Sulaco bombing campaign.\n\nHARTLEY:  R-r-really?\n\nTIM:  Hartely, are you a Communist?\n\nHARTLEY:  No!  \n\nTIM:  Sure you are.  All you academic types are.  You slap a couple letters at the end of your name, and you're suddenly better than the rest of us.  You call \nyourself a \"Socialist,\" and then you start telling all of us about what our money should be doing.  You guys have a great track record of tricking folks in \nSouth America.  Who are you working with?  Huh?  Venezuela?\n\nHARTLEY:  No one!  I swear!  I just wanted to know more about the Eastern City!  Cardinale has been there almost as long as Dr. Thayer, but she, uh, she thought \noutside the box.\n\nTIM:  We're gonna find out, kid.  It's just going to take a couple of hours...\n\nQUERY SERA:\n*choice\n\t#Emage socialism\n\t\t*goto_scene propaganda_flier\n\t#Sulaco bombings\n\t\t*goto_scene Sulaco_bombings \n\t#Nephilim\n\t\t*goto_scene first_breakup", "gonzalgo_sick": "*gosub_scene adcheck\n*label Gonzalgo_sick\nreport by call sign SHAMUS\n\nSulaco, Costaguana.  5 April 2017\n\nMy sources have confirmed that President Gonzalgo has contracted this mysterious Costaguanan plague.  Most patients tend to reach a very \nbad place before they either suddenly recover or die.  Those who recover are said to behave \"different\" than they did before.  President \nGonzalgo is still in the early stages of the illness, but my sources estimate he will be very ill within the month.\n\nThe general mood in Sulaco is not the civil unrest we might've expected.  Though thousands have died, the city is very orderly and the mood \nis muted.  I feel like this lively Latin American city has suddenly been transformed into the clockwork-like system of a German metropolis.  Even the \ngoddamn buses are on time.  Most people arrive at work at 9 a.m., and then they leave at 5 p.m.  \n*page_break\nI know you've been warning me about editorializing and using vernacular, but Sulaco is downright creepy.  There's no other way to say it.  It's \nlike some alien was told the driest, most clinical description of how a city was supposed to run, and now Sulaco has become that city.  Costaguana \nhas always been \"off.\"  I took the \"supernatural,\" \"Other World\" events in stride as superstition and hoaxes, but the scale of this, the state that\nthe entire city is in?  This is completely different.\n\nAs for the reports of migrants, the people are leaving.  Mostly the indigenous Emage.  If you guys outside of the country can't track them, \nI don't know what to tell you.  I don't see them go, but more and more of them are gone.  The Emage who are still around talk about the River \nof Death and Xinnabala, the \"Cave of Fear.\"  There is a legend about a city the Emage's ancestors escaped to when the Spanish arrived, but I didn't \npay much attention to that malarkey.  Now I wish I had.\n\nIf you see Sloane Keegan, tell her she was right.  This all has something to do with that Thayer dig.  I don't know how she knew.  She always \nsaid she felt it in her gut.  I always told her not to eat the empanadas.\n\nQUERY SERA:\n*choice\n\t#supernatural events\n\t\t*goto_scene psychic_phenomenon\n\t#Emage legend\n\t\t*goto_scene Emage_beliefs\n\t#Sloane Keegan\n\t\t*goto_scene Sloane\n", "hector_el_caballero": "*gosub_scene adcheck\n*label Hector_el_caballero\n\"HUGE MAILBOX BOMB KILLS 8 IN SULACO,\" By H. West\n\nfrom ARKHAM DAILY VOICE, 7 May 1998\n\nA bomb planted inside a mailbox caused a huge explosion in downtown Sulaco, Costaguana, killing eight.  The dead have not yet \nbeen identified, but the group claiming responsibility is a rebellious faction of the indigenous Emage tribe.  Ideologically \nSocialist, the group is allegedly funded through the illegal production and trafficking of cocaine.  One of the group's more \ncolorful characteristics is their belief that the Emage people are descended from giants.  \n\nTheir leader is the charismatic man known only as Hector \"el caballero.\"  Hector's previous tactics have included sabotage and \npossibly murder, but this is the first time Costaguana has seen terrorism of this magnitude.  Officials refused to comment on \nthe possibility that the Emage rebels may now be involved with Communist terror groups in the region such as the Shining Path in \nPeru or the Revolutionary Armed Forces of Colombia (FARC);  however, sources within the Sulaco Police Department's Criminal \nInvestigation Division have revealed that the police are looking into the possibility that locals, such as Hector himself, may \nhave travelled to Peru or Colombia to train with these groups and to learn their terror tactics...\n\nQUERY SERA:\n*choice\n\t#Emage socialism\n\t\t*goto_scene propaganda_flier\n\t#Emage drug trafficking\n\t\t*goto_scene rebel_drugs\n\t#Emage sabotage and murder\n\t\t*goto_scene man_in_black\n", "isabel_arkham": "*gosub_scene adcheck\n*label Isabel_Arkham\nextracted from CIA FILE 998112309(1991):\n\n...BLACKBIRD arrived in Arkham, Mass. on Thursday, 1600 hours in the company of Lucius Thayer and Dr. Johannes Lenz.  Officially a visit to \nfurther the cooperation and collaboration between Miskatonic University and Universidad de Sulaco, the visit has the appearance of being personal \nin nature as Thayer and BLACKBIRD are currently engaged in a romantic relationship.\n\nWe believe that BLACKBIRD is a swallow, targeting Thayer.  Thayer is already supporting the idea to direct the dig to the Northwest Gulley area.  \nThayer believes that the idea to dig in that location came from a prediction by the child seer known as the \"Saint of Darkness,\"  and that BLACKBIRD \nsubsequently heard this prophecy before she convinced Thayer that the location is worth investigation.  We strongly suspect a different source.\n*page_break\nOur sources close to the Emage tribal council suspect that the idea came from a faction within the Emage tribe that wishes to splinter off of the main \ntribe for their own goals.  This idea was fed to the Saint of Darkness and through her to the archaeologists.  Though we have no evidence, we strongly \nsuspect that BLACKBIRD is working with the Emage splinter group that hopes to direct the dig to this location.\n\nBLACKBIRD's presence in Miskatonic is a clear signal of her influence over Thayer.  She has met with the rest of the university's archaeology department, \nDean Malcolm Halsey, and, most-telling, she has met with Thayer's mother...\n\nQUERY SERA:\n*choice\n\t#Emage spinter group\n\t\t*goto_scene Narco_rebels\n\t#Saint of Darkness\n\t\t*goto_scene Isabel_friend\n\t#Northwest Gulley\n\t\t*goto_scene Lenz_digs\n", "isabel_bombings": "*gosub_scene adcheck\n*label Isabel_bombings\nfrom the journal fo Dr. Thayer, L. PhD.\n\n12 February 1998\n\nWhen Roger [Mays] told me Isabel was involved with the bombers, I didn't want to believe him.  But what kind of scientist would I be if I \nignored the evidence?  She kept so many secrets, knew so many people.  It seems like every time we went out she was running into another \n\"amigo.\"  She's friends with the Saint of Darkness, for crying out loud.  How naive was I to believe that Isabel was simply fascinated by the \nyoung woman's paranormal abilities?  \n\nMaybe I just needed the distance to see things are they are.  Maybe now that I'm back in Arkham, barred from returning to Costaguana, maybe \nnow it's easier to admit that she was lying, that from the first time Dr. Lenz and I met her, I suspected that she was lying.\n*page_break\nIt's not even a question of heartbreak anymore.  I'd have to still love Isabel for her to break my heart, but I do feel betrayed.  She was spying \non us the entire time.  To think that I once brought her back to here, to Arkham.  To think that I thought I once loved her enough to ask her to marry me.\n\nThe Saint of Darkness is being manipulated to say the things she says, and Isabel is likely one of her manipulators. \nAnd to what end?  No doubt some Emage agenda.  The prophesies always favor the idea of Costaguana's impressive indigenous history.  The Saint can \nalways sway public opinion on a person or political issue with a simple public prophecy.  Look what Costaguana has become since the Saint \nof Darkness began her prophesying:  a socialist state with an Emage President.\n\nQUERY SERA:\n*choice\n\t#Isabel Cardinale and the Saint of Darkness\n\t\t*goto_scene Isabel_friend\n\t#Isabel Cardinale, marriage proposal\n\t\t*goto_scene marry_Isabel\n\t#first time meeting Isabel Cardinale\n\t\t*goto_scene meeting_Isabel\n", "isabel_fear": "*gosub_scene adcheck\n*label Isabel_fear\n21 September 2001\n\nDear Lucius,\n\nThe world seems so fragile now, doesn't it?  A few bad men take a country by surprise.  The disaster plays live on television, for everyone \nto experience, for everyone to feel.  I'm thousands of miles away, I'm not even an American, but the tragedy makes me want to hold those I \nlove close to me.\n\nWhen I saw those people running from the wreckage of the World Trade Center, those office workers and first responders covered in white dust \nand ashes, squinting through the smoke, searching for any signal of safety, I couldn't help but imagine what I would do in that situation, whom \nI would think of, whom I would want to see after so narrowly escaping death.  And I realized there would never be anyone but you.\n*page_break\nI know you've married, Lucius.  I don't want trouble.  In a way, I send this letter as a final goodbye.  Terrorism has not touched North American \nshores in generations, but it is nothing new to South America.  In Costaguana, terrorism is still fresh in our memories.  And I must confess to \nyou that, though I had no direct involvement in the bombing campaign of Sulaco, I knew what was happening.  I knew what was going to happen.  I knew who \nwas planning the attacks, and I kept my mouth shut.\n\nMy silence may be my greatest sin, but I would commit it again.  President General Cabrero has died.  He may not have paid for his crimes against his own \ncountry, but he is no longer in power.  But there is a greater threat to Costaguana, to the world, than a mere dictator.  I have no illusions \nabout the Socialists who have replaced the tyranny of the past, but they are better equipped to fight the coming battle, if only out of virtue of being Emage.\n*page_break\nWe are archaeologists, elbow-deep in mud, excavating unknown history, but I fear for our future, Lucius.  I don't wish to argue with you about the \nrace of giants who ruled this region, but know that whomever the Proto-Tiwanaku peoples were, they were all wiped out by a force greater than they.  \nI'll refrain from attempting to describe this destructive power to you, for fear that you already think me crazy, but knowing that SOMETHING destroyed \nso sophisticated a civilization as the Proto-Tiwanaku, how can we view our own existence except with fear?\n\nIn the whole expanse of time, Mankind is barely a blemish.  Our greatest wars, terrorism here in South America or there in the North, none of it matters \nto a god as old as time.  How can we move forward if all we see ahead is our own death?\n*page_break\nA human being is little more than the dayfly who live only long enough to find a mate.  The only thing that makes our brief existence any different is Love. \n\nGoodbye, Lucius.  May you have the greatest love.\n\nWith all my heart,\n\nIsabel\n\n*page_break ALERT: INCOMING MESSAGE\nMEMO from agent call sign SHAMUS\n\nAgent ${name},\n\nI've been monitoring your progress through the SERA archives.  Focusing on Dr. Isabel Cardinale, target designation: BLACKBIRD, isn't the worst idea; but whatever \nher involvement in Thayer's disappearance, she's just the tip of the iceberg.  Whether she's still involved with the terrorists, whether she's a Costaguanan agent, \na Cuban agent, or something else entirely, we need to know who that group is.  \n\nI'm going to help move things along by forwarding a transcript of my debrief with TIM.  These people have been running circles around us for decades.  You need to \nhelp us stop them.\n\n--Special Agent In Charge Roger Mays\n\n*page_break OPEN ATTACHMENT\nfrom the debrief of agent call sign SHAMUS, conducted by \"TIM.\"\n\n07:00 hours, EST\n\nTIM:  ...So we're stuck with the question.\n\nSHAMUS:  Yes.\n\nTIM:  Is she, or isn't she?\n\nSHAMUS:  At this point, you know as much as I do.\n\nTIM:  I'd say she is.  She slept with Thayer to get what she wanted.  Probably slept with Puig, too.\n\nSHAMUS:  Lots of women sleep with men to get what they want.  It doesn't mean she's a swallow.\n\nTIM:  You named her \"Blackbird,\" didn't you?\n\nSHAMUS:  Yes.\n\nTIM:  \"Blackbird.\"  A bird.  You were already thinking that she was a swallow.  Right from the beginning.\n\nSHAMUS:  Doesn't mean I was right.\n\nTIM:  I thought Thayer was your friend.  Don't you want to find out what happened to your friend?\n\nSHAMUS:  That's why I'm not jumping to conclusions.\n\nTIM:  We know she was involved with the Emage rebels.\n\nSHAMUS:  She was related to one of the rebels.  By marriage.  \n\nTIM:  She was warned about the bombings in Sulaco.  She knew they were going to happen.  \n\nSHAMUS:  And we're talking about the \"old\" rebels.  These guys are now a legitimate political party.\n\nTIM:  Speaking of Thayer's political enemies, there's Roberto Puig of the Department of Antiquities.  There's that evidence he was working for the \nSoviets in the Nineties--\n\nSHAMUS:  But no evidence he's working with the Russians now.  You've seen the surveillance.  You've seen the results of data mining every kilobyte of \ninformation that passes through that man's computer.  He's not in contact with the Russians.\n\nTIM:  Then who is Blackbird working for?  The Cubans?  You think she's innocent?  She just did all this crazy stuff because she loves the guy?  Thayer leaves the country.  \nHe marries an Arkham blue-blood.  I mean, he really tries to kick the habit of this woman.  And then SHE reaches out to him.\n\nSHAMUS:  Well, people do a whole lot of crazy when they're in love, but no way Blackbird's innocent.  I think there's a third party.\n\nTIM:  Third party?\n\nSHAMUS:  I think they've been there a while.  Not Emage.  Not Russian. \n\nTIM:  You thinking some holdouts from the Cabrero regime?  For a dictator, he had some loyal officers, right?  Upper management types, who stayed in the \narmy after the new government took over.\n\nSHAMUS:  We've kept an eye on them, but they haven't been making any big moves.  I don't see any unified agenda.  But whoever this third party is, Roberto Puig is \nright in the middle of it.  This guy has flipped sides more times than a pancake.  Most guys like that get killed early in the game.  But someone's been \nprotecting him.  \n\nTIM:  So, either this theoretical organization - that might be from Cabrero's regime - or some old Emage rebels took Thayer.\n\nQUERY SERA:\n*choice\n\t#Thayer's marriage\n\t\t*goto_scene Mary_Halsey\n\t#Cabrero regime\n\t\t*goto_scene Cabrero_holdouts\n\t#Emage rebels\n\t\t*goto_scene Narco_rebels", "isabel_friend": "*gosub_scene adcheck\n*label Isabel_friend\nletter from Dr. Thayer, L., PhD., to Dr. Cardinale, I.\n\n4 June 1989\n\nDear Isabel,\n\nThank you for your letters regarding the state of the site, but we're mostly worried about how the site fares when the rainy season comes later \nin the summer.  Naturally, if there are any other issues with the site, do let us know immediately.\n\nRegarding the proclamations of the Saint of Darkness, I am asking on behalf of myself and Dr. Lenz that you let the matter drop.  Dr. Lenz was \nquite insistent on the matter.  The project's standing with our university is tenuous at best, and as we depend on the funding from the school, \nit would be better if the project were not to be associated with any supernatural notions or superstitions.\n*page_break\nHaving met the Saint with you, I do understand the personal connection that you feel with her.  We do, however, insist that your relationship \nremain on a personal level.  Please ensure that the Saint understands that the two of you do not and will not have a professional relationship in \nregards to the excavation.\n\nPlease enjoy the rest of your summer!  I do have to tell you that Harry will probably not join us again in the fall.  He is shifting his focus to \nNeolithic Europe.  I'm sorry the two of you had a misunderstanding, but I do look forward to working with you again in the fall.\n\nBest,\n\nLucius\n\nQUERY SERA:\n*choice\n\t#Dr. Johannes Lenz, the Saint of Darkness\n\t\t*goto_scene dissent_Lenz\n\t#Isabel meeting the Saint of Darkness\n\t\t*goto_scene meeting_saint\n\t#Isabel, Harry\n\t\t*goto_scene Isabel_swallow\n", "isabel_giants": "*gosub_scene adcheck\n*label Isabel_giants\nfrom the journal of Dr. Thayer, L., PhD.\n\n15 May 1988\n\nIsabel is so damned infuriating!  Why can't she let go of this childish fantasy about giants walking the South American countryside?  \nShe and I have BEEN to Tiwanaku and PumaPunku, and yes, those ancient Bolivian megaliths are awe-inspiring and intimidating.  But one \ncan see that it's just as possible for regular-sized human beings to have created those structures as it was for humans to create Stonehenge \nor the heads on Easter Island.\n\nThen she'll cite all the giant tools that have been discovered around the world.  She especially loves the giant double axes from Crete, \ncalled \"labyrs.\"  Or the giant stone axe heads found in North Africa.  But the labyrs can be explained as ceremonial, or even decorative in \ntheir function.  And if you hold those stone axe heads in two hands, well, they become a simple stone tool that you use with two hands.\n*page_break\nThese debates, the endless rehashing of \"evidence,\" whenever they flare up they take such a toll on our relationship.  Usually, things are perfect.  We'll go months \nwithout a mention of giants, then we'll uncover a bas relief that \"must\" be a depiction of a giant.  At times, she's so passionate about these \nthings that I almost believe her.  At times I even WANT to believe her, if only to make our love something easier.\n\nI feel like one of those characters in a Graham Greene novel who's fallen in love with a Catholic and simply can't understand his lover's faith.  \nAnd Isabel's belief in these giants really is nothing other than faith.  There is no hard evidence for these creatures.\n\nQUERY SERA:\n*choice\n\t#Tiwanaku and PumaPunku\n\t\t*goto_scene Tiwanaku_PumaPunku\n\t#evidence of giants\n\t\t*goto_scene Isabel_statue\n\t#Thayer/Cardinale relationship\n\t\t*goto_scene first_breakup\n", "isabel_goodbye": "*gosub_scene adcheck\n*label Isabel_goodbye\nletter from Dr. Cardinale, I. to Dr. Thayer, L., PhD.\n\n24 February 2017\n\nDear Lucius,\n\nMy lucid moments come and go, but they have been growing longer as time passes.  I take these few minutes of clarity to write to \nyou, to apologize for how I treated you, and hopefully to avert a disaster.  \n\nI believe I was infected with that disease we now call \"Red Fever\" during Dr. Lenz last attempt to uncover the Labyrinth.  \nI pushed for that excavation in the Northwest Gulley, and in my arrogance, I brought about my own doom.  For over twenty years, \nthis illness has slowly taken over my mind.  At first, I just seemed to miss moments of time.  As if waking from sleep, I'd find myself \nsomewhere else, in the museum or in my father's house.  But the past few years, something else has been pulling my strings, pulling \nme towards the Eastern City, urging me to dig up the ruins, to dig up the Labyrinth, to find Xinnabala, and to open the door to free \nthe ancient horrors that lie inside.  \n*page_break\nI'm aware while this is happenning.  In many ways, I want to dig up the Labyrinth, too.  This strange disease controls my behavior like an addiction, \nand like an addict, I have carefully managed my urges so that, on the outside, I can appear normal.  But even now, the gnawing ache is there.\n\nI gave up our love for this desire to dig up Xinnabala.  You must stop me, my love.  You must stop us all, me and Puig and that man \nin the black suit, we are just the first.  The disease is spreading.  The creatures within Xinnabala are not the giants I sought \nwhen I was a young archaeology student.  They are the monsters that destroyed them.  If we open the gate to the Cave of Fear, they \nwill destroy Mankind as well.\n\n--Isabel\n\n\nQUERY SERA:\n*choice\n\t#Thayer response?\n\t\t*goto_scene last_entry\n\t#Is Thayers fighting the infected?\n\t\t*goto_scene last_entry", "isabel_magic": "*gosub_scene adcheck\n*label Isabel_magic\nletter from Miner, H. to Dr. Thayer, L., PhD.\n\n23 May 1989\n\nLucius,\n\nI wanted to thank you for everything you've done and for being a friend to me.  They've got me on sertraline, which is keeping me more or less on \nan even keel.  I'm still ashamed of what I've done.  The stitches came out of my wrists last week, but with these scars, I'm going to be wearing \nlong sleeves for a very long time.\n\nI keep thinking that there's something magic about Isabel.  It's something that seems beautiful at first, but there's a dark side to it.  You remember \nthat night when she brought out the Ouija board at the hotel?  I never used to believe in those things.  I always figured the fun that came from those \nthings was trying to figure out which person leaning over the table was moving the planchette around.  But I think she brought something out of it for \nreal that night.  Not because of what the spirits said, but because of how the whole room felt while we were playing.  The whole room was somehow brighter.  \nSmells were sharper.  \n*page_break\nOr maybe it's just the whole damn country of Costaguana is cursed.  What does Lenz think you're really going to find underneath the Eastern City?  The \ngateway to Xinnabala?  Or just more dirt?\n\nI'm not going back in the fall.  Yes, a big reason is the embarrassment of being that guy who tried to kill himself because of Isabel.  But the site \nitself doesn't feel right for me anymore.  I don't agree with Lenz about the direction of the dig, all that supernatural stuff Isabel loved is starting to \nfreak me out, and I just don't think the Eastern City wants me around.  Sounds crazy, right?  Ask my shrink about it.\n\nNothing compares to Miskatonic, but I'm already applying to programs in Scotland.  Maybe we'll see each other again, but if we don't, thanks again.\n\n--Harry\n\nQUERY SERA:\n*choice\n\t#Isabel, dissent with Dr. Lenz\n\t\t*goto_scene dissent_Lenz\n\t#Isabel, Miskatonic\n\t\t*goto_scene Isabel_Arkham\n\t#supernatural Costaguana\n\t\t*goto_scene Isabel_friend\n\n", "isabel_rebel": "*gosub_scene adcheck\n*label Isabel_rebel\n10 May 1998\n\nI knew things were bad when the rebels occupied the Eastern City, but I never imagined the bombings would happen.  How many weeks has the Emage \nbombing campaign carried on?  Three?  Four?  Twenty-five dead and counting on the streets of Sulaco.  It feels like treachery, bombing your fellow \ncountryman.  It IS treachery.  \n\nEveryone else on the dig has gone home, either to Arkham or to their home in Costaguana.  Everyone except Jairo, the traitor who let the wolves \nin through the front gate.  The university has already pulled the funding on the project.  There are no commercial flights to the States, but \nRoger [Mays] keeps offering to fly me out of Costaguana.  I keep saying that I'm still here because I'm advocating for the protection of the dig, \nbut Roberto [Puig] won't even give me an appointment anymore.  \n*page_break\nHe knows.  Roger knows.  Everyone knows.  Everyone knew before I did.  However much I cringe at the thought of the rebels desecrating a piece of \ntheir own heritage, I know that I'm only staying here in Costaguana for Isabel.  I haven't kept track of her since we ended it all.  And I'm not \nlooking, not actively, but we dusty academics travel in all the same circles.  I go to every meeting, if by chance I see a colleague in a café, I \nalways approach him or her with the anticipation that this person may have some news of Isabel.  But still, I have heard nothing.  \n\nI want to know that she's all right.  How could I describe the deep dread I feel that she could be in danger or injured by one of these bombs?  If I \ncould only get the chance to see her again, I'd take it all back.  I'd tell her she was right.  I'd tell her how close we were to uncovering the Labyrinth.  \nI'd tell her I wanted her back.  What is it that Lorca called the feeling?  \"Duende.\"  Without her, all I have left is that dark sound echoing through my heart.  \n*page_break\nI'll give it one more month.  If I see her, I'll take her back to Arkham with me.  Roger will fly us out.  If I don't see her in one month, I'll leave Sulaco.\n\nQUERY SERA:\n*choice\n\t#Isabel, Sulaco bombings\n\t\t*goto_scene Isabel_fear\n\t#Labyrinth\n\t\t*goto_scene rats_run\n\t#duende\n\t\t*goto_scene duende\n", "isabel_statue": "*gosub_scene adcheck\n*label Isabel_statue\n\"The Andean Ozymandias\"\n\nBy Dr. Isabel Cardinale\n\nfrom SCIENTIFICNEWS.com, May 2011\n\n...the stone is nearly 9 meters long and geologists estimate that it weighs 22 metric tons.  Stones of this size can be seen at the Eastern City, \nat Tiwanaku in nearby Bolivia, and in megalithic sites around the world, such as Stonehenge.  But the artefact discovered during the construction of \na building in Sulaco is not a simple block of stone; it is a sculpted stone foot and all that remains of an ancient statue.\n\nAssuming that the statue of this Andean Ozymandias had the normal physiological proportions, we can calculate that the complete figure could \nhave stood at nearly 60 meters tall.  This stone structure would have been taller than the Statue of Liberty in the United States.  \n*page_break\nSuch an enormous statue could only have been built by a civilization in possession of sophisticated construction technology, technology that, unfortunately, \nis now lost to us.  We have yet to uncover any kind of tools or other artefacts at this site; however, last year, while searching the Vatican libraries, the \nWellingham Christian Foundation discovered 18th Century journals written by Spanish Jesuits serving in the region that is now Costaguana.  In his journal, \nFather Guillermo Mendoza Alarcon describes how a coca farmer discovered a three-foot stone axe head buried on his land.  \n\nThough the axe head is now missing, from its description and the location where it was found, we can reasonably conclude that this axe is from the \nsame culture that created this gigantic, Pre-Colombian sculpture.  Additiondally, a three-foot axe head is clearly the tool of a person of considerable \nsize, and though more evidence is needed to irrefutably support this theory, the axe head is at least another indication that tool-using giants may have \nlived in the area prior to the arrival of Conquistadors in the 16th Century.\n*page_break\nMy own research into Pre-Colombian civilizations has uncovered a wealth of evidence that a race of giants flourished in the Americas until \nat least the 1600s (a date that corresponds to the documents discovered by the Wellingham Christian Foundation).  The Costaguanan Eastern City was \nvery likely an early religious and economic center for this race.  Given the aesthetic similarities of the Andean Ozymandias to the bas reliefs of the \nEastern City, as well as the find's proximity to the city, it is reasonably to theorize that this 60-meter-tall \nsculpture was a product of the same civilization, and that giants once roamed the streets and halls of this megalithic wonder...\n\nQUERY SERA:\n*choice\n\t#South American giants\n\t\t*goto_scene Patagonia_giant\n\t#Wellingham Christian Foundation\n\t\t*goto_scene Nephilim_theory ", "isabel_stranger": "*gosub_scene adcheck\n*label Isabel_stranger\nFrom the journal of Dr. Thayer, L., PhD.\n\n25 September 1995\n\nI didn't say a word to anyone other than Roger about the pale stranger in a black suit who visited me earlier this month.  \nThe experience was far too bizarre for me to relate.  A man with no eyebrows came to my door like a Jehovah's Witness, he \nspoke to me in a droning in a monotone, and told me about the glory Xinnabala, \"The Cave of Fear,\" as if he were telling me how \naccepting Jesus into my heart would save my soul.\n\nI should have told Isabel and other people on the dig.  But how could I expect anyone to understand how surreal it was to relate \nto this oddity who seemed to be from another world altogether?  I could tell Roger over beers a funny story about a weird visitor, \nbut to be taken seriously, my listener would need to see this man for him or herself.  No this man has visited Isabel.\n*page_break\nThe pale man in a black suit visited Isabel at her father's house, and he frightened her.  At least, she says he frightened her.  \nShe seemed rather calm, now that I think of it, but perhaps I somehow comforted her?\n\nThe pale man did not approach her with tales of Xinnabala.  Instead, he came to her with some sort of prophecy, laughable tales of \ngreatness to come, a promised place among the chosen few in the grand new world.  That promise of responsibility gave her cause for \nfear, but his promises of a \"grand new world\" cause fear in me.  I don't understand who this pale man is working for, but I sense a \ngreat power is pulling his strings.\n\nQUERY SERA:\n*choice\n\t#pale man, Xinnabala\n\t\t*goto_scene maze_portal\n\t#Soviets behind pale man?\n\t\t*goto_scene Russian_bar_2\n\t#Soviets, unknown agency, Roberto Puig\n\t\t*goto_scene Puig_father\n", "isabel_swallow": "*gosub_scene adcheck\n*label Isabel_swallow\nconversation with Dr. Thayer, L., PhD., recorded by agent call sign SHAMUS\n\n9 December 1997\n\nSHAMUS:  ...It ain't smart to say here, Lucius.  These bombs going off around Sulaco are bad, but they're random.  The real problem, OUR problem, is \nthat folks down here ain't in the mood to be friendly to Americans.\n\nTHAYER:  So I'm just supposed to go home?\n\nSHAMUS:  That's what I'm gonna do.  I know you care about the dig.  I know that.  But, it ain't worth your life, is it?\n\nTHAYER:  The Eastern City isn't the only thing I'm worried about.\n\nSHAMUS:  Really?  Isabel?  You want to risk your life for her?  I thought you broke up already.  I thought you had a new girl up in Arkham.\n\nTHAYER:  That doesn't mean I don't care.\n\nSHAMUS:  She's your ex.  You're supposed to hate her.  I was surprised you hooked up with her after how she broke that other kid's heart.\n\nTHAYER:  Harry?  Harry's ancient history.  The guy isn't even an archaeologist anymore.\n\nSHAMUS:  Dang.  She did a number on him.  Either way, Lucius, I don't think she's one of the people who's in danger.\n\nTHAYER:  What's that mean?\n\nSHAMUS:  It means I don't think she's in danger.\n\nTHAYER:  You think she's a part of this?  Of THIS?\n\nSHAMUS:  I'm not saying she's walking around planting bombs. I'm saying, the Saint of Darkness is her BFF.  She got to work at the Eastern City for \nyears.  Those are things very important to the Emage rebels.  It wouldn't be a great stretch of the imagination to think that she was working with them.\n\nTHAYER:  No.  Not Isabel.  She wouldn't.  Those are innocent people dying out there!\n\nSHAMUS:  Don't forget that mysterious meeting she had in Arkham.  Right?  She's got secrets.  I also heard a thing...\n\nTHAYER:  What \"thing\"?  Where'd you hear it?\n\nSHAMUS:  I heard it at the bar.  I was drinking with some of the locals on the dig.  Isabel Cardinale.  Her brother was Diego Cardinale.  \n\nTHAYER:  He died a while back.  She never talks about him.\n\nSHAMUS:  Well, Diego's brother-in-law Chito Velazquez was supposedly part of some plot to kill el presidente Cabrero back in the Eighties.  Cops took weeks \nto hunt him down.  Unfortunately for Isabel's hermano Diego, he was sitting next to Chito when the cops started shooting.  Diego got shot twelve times.  He \nmade it to the hospital, and he toughed it out for three days before he died.\n\nTHAYER:  I don't believe it.\n\nSHAMUS:  The girl is shady.  I'm flying out soon, man.  You're welcome to hitch a ride.\n\nTHAYER:  I've got to talk to Isabel.  I have to know she's okay.\n\nSHAMUS:  You know where she is?\n\nTHAYER:  Not really.  I think she might be hiding in the Lower City.\n\nSHAMUS:  I gotta hang around for a few more days, but when I go back to the States, you ought to fly back with me...\n\nQUERY SERA:\n*choice\n\t#Lower City\n\t\t*goto_scene Lower_City\n\t#Diego Cardinale\n\t\t*goto_scene assassinate_Cabrero\n\t#Arkham meeting\n\t\t*goto_scene Arkham_stranger", "isabel_thesis": "*gosub_scene adcheck\n*label Isabel_thesis\nfrom the journal of Dr. Thayer, L. PhD.\n\n12 January 1987\n\nComing back from winter break, I expected there to be someone new, considering Jorge's considerable health issues, but I did not \nexpect someone like Isabel Cardinale.  She's an undergraduate at Universidad de Sulaco, one of those fine-boned Mestizos from \na family with money - and probably a title somewhere deep in the family tree.  She's a beautiful young woman.  She has these dark \neyes that seem to look at you from a primitive, primal time, but to keep her from looking too severe, a few well-placed freckles sit on her \nnose.  She also likes to smirk, as if she knows more than you.\n\nShe's young, but she's already on track to become a terrible dilettante.  She's working on her thesis, and, before even having seen \nthe site in person, she's drummed up this idea about the Eastern City being a proto-Tiwanaku civilization that stretched far into Colombia \nand down into Bolivia and Chile.  Her evidence for this theory is thin, and she has a disturbing fascination with lost technology.  \n*page_break\nShe spent nearly an hour talking my ear off about the Antikythera mechanism of ancient Greece.  I think she's been reading all that \"ancient astronaut\" \npseudoarchaeology. She's also well-aware of the strange phenomenon that seem to be happening to many of the Costaguanans near the dig site.  Supposedly \nthese \"psychic phenomenon\" have only been occuring since Dr. Lenz discovered the Eastern City.  I overheard her telling Harry that she went to the slums \non her own, just to hear some indigent who's been speaking in tongues.  Between that and the children with visions, I fear that \nher thesis will plant the seed for a short and embarrassing archaeology carreer.\n\nQUERY SERA:\n*choice\n\t#Tiwanaku\n\t\t*goto_scene Tiwanaku\n\t#psychic phenomenon\n\t\t*goto_scene keening\n\t#ancient astronauts\n\t\t*goto_scene ancient_astronauts\n", "labyrinth": "*gosub_scene adcheck\n*label Labyrinth\narchaeological excavation report filed by Dr. Thayer, L., PhD.\n\n1 November 2016\n\nNorthwest Gully.  Eastern City.  Costaguana.\n\nPrepared for: \n\nRoberto Puig, Director\n\nDepartment of Antiquities \n\n2046 Bolivar St. \n\nSulaco, Costaguana 179111\n\nABSTRACT\n\nUnder the direction and with the consent of the Costaguanan Department of Antiquities, the excavation of the Northwest Gully in the \"Eastern City\" \narea (hereafter \"the site\") was undertaken by a joint effort of the Archaeology Department of Miskatonic Univerity and the Archaeology Department \nof Universidad de Sulaco.  Excavation began in January of 2005.  This report is to cover the period of August 2016 to the present.\n\nThough no structures were found, per se, the \"Labyrinth\" walkway was discovered in mid-September.  Consisting of a pattern of stones set into the ground, \nthe pattern is roughly 60 ft. x 45 ft. and it has a strong correlation to the Pre-Colombian pottery shards discovered in 2004.  The smallest of these stones \nis roughly 2 ft. x 2ft. square.  The largest stone is 8 ft. x 10 ft.  Too small to be a geoglyph, the working theory is that the Labyrinth was used for processions\nthat were part of relgious ceremonies.\n\nGlassware and cans, most-likely from the 1920s or 1930s were also uncovered at the site.  This gives the strong indication that this site was \ndiscovered prior to Dr. Lenz's work here.  No record of this early-20th Century survey is known.  There is a high probability that these findings \nare the refuse of grave robbers or looters.\n\nThe remote sensing specialists will arrive from New Hampshire in the coming days.  Weather permitting, the specialists will conduct a survey of the \narea using ground penetrating radar.  The findings of this survey will help determine future progress of excavations.\n\nOf important note: the morning after the Labyrinth was uncovered, several dozen dead birds were found lying on the site.  The team is formally requesting \nthat the pertinent government agency test the area for carbon monoxide that may be seeping to the surface due to the excavation.  Carbon monoxide on \nthe site could pose a life-threatening risk, not only to those working on the site, but to individuals in the surrounding areas.\n\nACKNOWLEDGEMENTS\n\nThis report was compiled by Mark Hartley.  The finds assessment was conducted by Julio Marquez Somoza.  Photographs were taken by Jairo Becker.  Illustrations \nwere provided by Dr. Isabel Cardinale.  Dr. Lucius Thayer, PhD. is the lead excavator.\n\nQUERY SERA:\n*choice\n\t#Miskatonic excavation\n\t\t*goto_scene Chapter_2\n\t#Mark Hartley\n\t\t*goto_scene Chapter_2\n\t#Isabel Cardinale, current excavation\n\t\t*goto_scene Chapter_2", "lenz_bio": "*gosub_scene adcheck\n*label Lenz_bio\nextracted from CIA FILE 998112311(1993):\n\n...Himml
