tes relating to the \"Eastern City.\"\n\nQUERY SERA:\n*choice\n\t#Dr. Johannes Lenz Biography\n\t\t*goto_scene Lenz_bio\n\t#Costaguana - World Factbook\n\t\t*goto_scene Costaguana_Factbook\n", "thayer_dig": "*gosub_scene adcheck\n*label Thayer_dig\nletter from Dr. Thayer, L. PhD. to Puig, R., Director of El Costaguana Departmento de la Antiguidad\n\n7 July 1997\n\nDear Senor Puig,\n\nI cannot begin to comprehend your reasons for requesting that we suspend the joint excavation between Miskatonic University and the Universidad \nde Sulaco.  Much progress is made at this important archaeological site every year.  Continued research at the Eastern City is vital to our understanding \nof the history of South America and of the entire human race.  If nothing else, the archaeological team needs to revisit the site to ensure that the \nrainy season has not damaged the ruins that are a touchstone to Costaguanan history and culture.\n\nRoberto, I understand that there is some political pressure to bring less attention to the Eastern City.  The Emage rebel group has done a very \nthorough job of ensuring that they are identified with the Pre-Columbian race who once lived at the Eastern City, but, and I realize I write this as an \noutsider, ignoring the Eastern City is not the way prevent the public from identifying the rebels with the ruins that are such a cherished symbol of your country. \n*page_break\nThe better tactic would be to lead the public towards identifying the rebels with the region's pseudo-archaeological findings and to definitively discredit those \nfindings.  With their insistence that giants once lived at the Eastern City, it would be easy to make flawed reasoning their defining characteristic.    \n\nPresident General Wagner Cabrero is the public figure who should be identified with the Eastern City.  Reclaiming the greatness of Costaguana's history \nin a realistic, dignified manner, as opposed to claiming to be descended from giants, could go a long way in winning public support for the ruling government.\n\nI am by no means a politician, Roberto.  I merely wanted to point out that we have other options than closing down the dig.\n\nThank you,\n\nLucius Thayer\n\nQUERY SERA:\n*choice\n\t#giants evidence\n\t\t*goto_scene hoax_skulls\n\t#President General Wagner Cabrero\n\t\t*goto_scene presidents \n", "thayer_leaves": "*gosub_scene adcheck\n*label Thayer_leaves\nfrom the journal of Dr. Thayer, L. PhD.\n\n15 December 1997\n\nThe bombing got bad enough, and personal threats were beginning to appear on my doorstep, or people would call and not speak when I answered the phone.  \nUnable to reach my contacts within the city and with the locals against me as the head of the excavation, it was time to leave Sulaco.\n\nRoger flew me out of Sulaco in that single prop of his.  I was jammed in with the cargo, a few dozen kilograms of cocaine.  Cocaine is not my cup of tea, \nbut the men at the airport shared the tacit understanding that the only way a plane was going to leave Sulaco was if it belonged to that particular trade.\n*page_break\nOur take-off took us on a long arc around the eastern edge of the city, where if you look just beyond the skyscrapers, you can see the Pacific Ocean reaching \nto the hazy horizon.  You can't see the Lower City from the air on that side of Sulaco, and at that altitude all the drabness of the concrete, all the blemishes \nwrought by yearly rainstorms, they all fade from view.  The city you see is glittering and white, hope in the New World.  But as we flew north and Sulaco drifted \nbehind us, the rainforest and steppe seemed to crowd in around the city, and that shine of hope Sulaco seemed to bear revealed that it was nothing but illusion.\n\nI will probably never return to Costaguana.  I will miss Isabel.  I don't propose marriage to just every woman I meet.  And not every woman turns me down in so \ndefinitive a fashion.  It was incredibly unfair to Mary.  To lie to her about why I was staying.  To propose to another woman.  I still haven't told her anything \nabout Isabel and me.  I haven't said anything because I still love Isabel very much.\n*page_break\nI worry for her safety in Sulaco, and my inability to help her is tearing me apart. But though I don't want to believe it, I know Roger is right: she's \nperfectly safe in Sulaco.  There was no fear in Isabel.  She had nothing to fear from the bombings.  She knows something that she wouldn't share.\n\nI love Isabel, and I miss her.  But I cannot trust her.  I never could.  Perhaps this is all for the best.\n\nQUERY SERA:\n*choice\n\t#Thayer returns to United States\n\t\t*goto_scene Sloane_interview\n\t#Roger Mays in the United States\n\t\t*goto_scene Roger_reveals\n\t#Who is Mary?\n\t\t*goto_scene Thayer_marries", "thayer_loves": "*gosub_scene adcheck\n*label Thayer_loves\nfrom the journal of Dr. Thayer, L., PhD.\n\n24 March 2003\n\nRoger Mays has been back to Costaguana.  And he wants me to go back, too.\n\nOf course Roger wants something from me.  He's only returned to Costaguana through his drug trafficking connections.  But if I can set up another excavation \nthrough Miskatonic, CIA can get people in-country with a plausible cover story.\n\nAnother man might have blamed Roger for not telling me he was CIA through our entire friendship, but somehow, I've never blamed him.  I've blamed Isabel for \nlying, but she used me.  And I've always gotten the impression that Roger has protected me.\n*page_break\nHe may be trying to use me now, but ever since Sloane Keegan told me about that Other World, that world that existed before, the great lost civilization, the \nblack stone artifacts - I need to know more.   Those trips to other sites were fruitless.  All they seemed to do was attract the attention of those pale men \nin black suits.\n\nIf Roger uses me, I'll use him, too.  I can give him the cover story he needs to get back to Costguana, and he can give me the means.\n\nQUERY SERA:\n\n*choice\n\t\n\t#Sloane Keegan, CIA\n\t\t*goto_scene Chapter_4\n\t#Roger Mays, CIA\n\t\t*goto_scene Chapter_4\n\t#pale men in black suits\n\t\t*goto_scene Chapter_4\n", "thayer_marries": "*gosub_scene adcheck\n*label Thayer_marries\nYou are Warmly Invited To the Wedding Of Miss Mary Halsey And Dr. Lucius Thayer\n\nSaturday, April 24, 1999\n\n3 O'clock in the Afternoon at\n\nMiskatonic University Chapel\n\n12 University Place\n\nArkham, Mass.\n\nReception to follow.\n\nQUERY SERA:\n*choice\n\t#Did CIA recruit Thayer?\n\t\t*goto_scene Sloane_interview\n", "thayer_sick": "*gosub_scene adcheck\n*label Thayer_sick\nfrom the journal of Dr. Thayer, L., PhD.\n\n14 December 2016\n\nSince our rediscovery of the Labyrinth, I've fallen ill with what locals have begun calling the \"Red Fever.\"  \nThe symptoms are strangely similar to those experienced by Dr. Lenz shortly before he died: flu-like symptoms, \nquickly followed by boils.  The boils are limited to my armpits and upper back.  I appear to be suffering from \nsome kind of respiratory trouble as well.  \n\nNo one else on the dig appears to be exhibiting symptoms. Out of fear of infecting more people, I have kept most \nof the staff off of the Labyrinth.  If we are lucky, the infection will stay and die with just me.\n\nI have no idea regarding how the disease might spread.  I know so little about what's happening, but it would risk \nthe project's security to hire a virologist to examine me or my blood.  It is possible that Red Fever is related to \nthe thing that CIA and the Russians have been racing to reach for all these decades, the horror that they are both \nhoping to turn into a weapon...\n*page_break\nIt's worth noting that the notion that Red Fever is a disease is merely a highly-likely hypothesis.  Most flus are \ncontagious, but since I haven't infected anyone else, it may actually be proximity to the Labyrinth that causes the symptoms.  \nIt could be that I'm suffering from exposure to some type of radiation.  It would explain Dr. Lenz's death and why his \nillness didn't spread to the rest of us.\n\nMostly out of an attempt to stay among the living, but also in an attempt to determine the nature of my illness, Carlo \nNimbus, a physician assistant at Universidad de Sulaco, prescribed me a round of antibiotics.  All I know is that I \nhaven't gotten any worse.\n\nQUERY SERA:\n*choice\n\t#Red Fever facts\n\t\t*goto_scene plague_facts\n\t#Labyrinth and illness\n\t\t*goto_scene maze_portal", "tiwanaku": "*gosub_scene adcheck\n*label Tiwanaku\nresearch notes of Dr. Thayer, L., PhD.\n\nBolivia, 12 May 1999\n\n...The Tiwanaku archaeological site is located high in the mountains of western Bolivia.  It is believed to be the religious and political \ncenter of a Pre-Colombian civilization that reached from modern day Peru, across Bolivia, and into Chile.  Conventional archaeologists date \nthe civilization from 300 A.D. to 1000 A.D.;  however, Arturo Posnansky dated the PumaPunku ruins to roughly 1300 B.C.  Even if Posnansky was \nincorrect, the megalithic stones are impressive in their size, and almost nothing is known about the Tiwanaku people...\n*page_break\n...Locals claim that the site was created by the sea god Viracocha and his giants.  Legend has it that Viracocha was unhappy with the dull-witted \ngiants he had created, and he killed them all in a flood.  Not a nice boss...\n*page_break\n...There is so much talk of giants on the western coast of South America.  That whole region of Patagonia is named for the \"feet of the giants\" \nthere.  I seem to recall the name comes from Magellan's encounters with giants in the region.  Then there are the elongated Paracas skulls of Peru. \nThough I would never think, as some claim, that they are \"alien,\" these skulls are still 25% larger than the average skull found \nin the area, meaning that these individuals were much larger than other indigenous peoples...\n*page_break\n...The blocky-style carvings here remind me of the style of the Lenz geoglyphs...\n*page_break\n...The evidence is thin, but there are enough threads to connect these different areas of South America to suggest that the Eastern City relates \nto this proto-Tiwanaku people.  Isabel's theory warrants more research.  How far did this culture reach?...\n*page_break\nQUERY SERA:\n*choice\n\t#Lenz Geoglyphs\n\t\t*goto_scene geoglyphs\n\t#Proto-Tiwanku\n\t\t*goto_scene Proto_Tiwanaku\n\t#Isabel theory\n\t\t*goto_scene El_Dorado_raft \n", "tiwanaku_pumapunku": "*gosub_scene adcheck\n*label Tiwanaku_PumaPunku\n\nreport by call sign SHAMUS\n\nTiwanaku, Bolivia.  19 December 2012.\n\nThe Wellingham Christian Foundation has rented out several houses in Tiwanaku.  There are maybe two dozen of them here, and they seem intent on spending \n21 December, aka, the End of the World, at PumaPunku.  I'm not sure if their faith in this Mayan calendar and its end on the 21st disqualifies them from \nbeing Good Christians, but they're walking around town with their bland, doe-eyed fanaticism like they own the place.\n\nToday, the Wellingham people are simply harmless kooks.  They believe in Posnansky's dating of the site, that it's 17,000 years old.  I'm pretty sure \nnothing's going to happen, but I have heard a couple different reasons why they're here now.\n*page_break\nOne of them tried to talk to me about the children of angels who lived down here.  A race of giants who lived in this area before the Flood of Noah and all \nthat.  Their evidence was a little far-fetched: the big, weird skulls found in the area, and apparently Magellan discovered giants in South America in the \nregion now called \"Patagonia,\" aka \"the Land of Big Feet.\"\n\nI'll save the analysts some trouble an\"d call it bullshit\", but you ask me to observe and report, so I do.\n\nQUERY SERA:\n*choice\n\t#children of angels\n\t\t*goto_scene Nephilim_theory\n\t#Magellan giants\n\t\t*goto_scene Patagonia_giant\n", "vatican_dig": "*gosub_scene adcheck\n*label Vatican_dig\nletter to Dr. Thayer, L. PhD. from Dr. Cardinale, I.\n\n5 February 1999\n\nDear Lucius,\n\nI know you must hate me, but please believe that I did everything for our work, for the excavation of the Eastern City.  The \npolitics of the situation are harrowing even for me, since I am not a member of the Emage.  You were smart to run, but you really \nhave no idea how dangerous things were for you;  some of the rebels wanted the Americans on the team killed, to make a political \nstatement.  The Emage have murdered before.  Thankfully, cooler heads prevailed.  Jairo was especially passionate about keeping all \nof you alive.  He made all of the rebel leaders aware of the good work you've done on the site.\n\nAnd now, without you here, even with Roberto Puig still the head of the Department of Antiquities, excavation of the Eastern City \nhas ceased.  Our new government, in all its wisdom, has decided to use the Eastern City and the Lenz geoglyph as symbols of our country, but our leaders \ndo not wish to spend money on digging.  At least not yet.  Officially, there is a possible carbon monoxide leak near Easter City, but I suspect \nthat the site in its present state is a better symbol for an indigenous uprising.  \n*page_break\nCurrently, one of the more popular stories about the Eastern City is that in the Seventeenth Century the Vatican ordered Spanish \ncolonist to excavate the site.  A group called the \"Wellingham Christian Foundation\" claims they have discovered a document in the Vatican archives \nthat says as much.  But, the story goes, after some kind of discovery that upset the Church, all digging stopped.  The Vatican ordered \nthe site destroyed, and though the Spaniards tried to destroy it, the Emage managed to protect the city for years.  Eventually, the \nSpanish stopped trying to level the site, but the orders from the Vatican to demolish the Eastern City were never rescinded.\n\nAt present, the Emage wish to exploit the story of the site's preservation as a victory against centuries of oppression \nby foreign powers.  The government doesn't want to discover something that may undo that myth, that might reveal it to be false.\n*page_break\nI suppose I only wanted you to know that I'm sorry about how things happened, and that I'm no better off than you are.  Please find it \nin your heart to forgive me.  For a moment, I did want to leave with you, to spend the rest of my life with you.  I could almost pretend you \ndidn't love someone else.  But Costaguana is my home.  New England is such a faraway place.  Even though I've been to Arkham with you and \nDr. Lenz, your home, the life there, it's a distant fantasy to someone in Costaguana.\n\nIf they ever let us dig again, I'll do what I can to get you on the team, but if I am honest, I don't think we will ever see each other \nagain.  I have loved you as deeply and as truly as a woman could love a man, but our story is over.  A love affair between two dusty \narchaeologists is bound to get lost in the grand saga of history.\n\nEver yours,\nIsabel\n\nQUERY SERA:\n*choice\n\t#Wellingham Christian Foundation\n\t\t*goto_scene great_flood\n\t#Emage murder victims\n\t\t*goto_scene man_in_black", "adcheck": "*if adtrack > 5\n\t*advertisement\n\t*set adtrack 0\n\t*return\n*set adtrack + 1\n*return", "ancient_astronauts": "*gosub_scene adcheck\n*label ancient_astronauts\nfrom the journal of Dr. Thayer, L. PhD.\n\n12 May 1992\n\nWe uncovered more of the new bas relief.  It's surprisingly ornate, considering how austere and, frankly, blank the rest of the Eastern City \nis.  It's not nearly as detailed as, say, Mayan bas reliefs are, but we found the strangest set of figures today; some of them seemed to \nstand a head and shoulders over other, but these shorter figures were definitely not children.  (The women have ample breasts).  Harry thought that \nthe figures were not depicted to scale.  I suspect that there is some attempt at perspective that we don't understand.  But Dr. Lenz was very \nquick to call the larger figures \"giants,\" and he did so without any irony.\n*page_break\nThen there's that odd, central figure with the square head and big eyes.  Harry has started calling him \"The Spaceman.\"  The last thing we need \nis the Department of Antiquities thinking that we're proponents of the ancient astronaut theory.  There's already that odd notion that the dig is \nmaking locals experience psychic phenomenon.  Last week, one old woman had a vision of blood in milk or something, then died.  The idea that it's \nrelated to the Eastern City has people in Sulaco petitioning that we close the dig site.\n\nSpeaking of the Dept. of Antiquities, Jairo, the driver, took some photos, again.  I always assumed that he was a semi-official photographer on this \ndig, but I haven't seen a single photograph that he's taken these past few months.  I asked Dr. Lenz about it, and he said that Jairo provides the \noccasional report on the dig site to the Dept. of Antiquities.  He also implied that, whatever his orders, Jairo only reports to the department what \nLenz tells him to.\n\nQUERY SERA:\n*choice\n\t#Jairo\n\t\t*goto_scene crazy_digger\n\t#psychic phenomenon\n\t\t*goto_scene young_saint\n\t#Department of Antiquities\n\t\t*goto_scene El_Viejo\n", "artefact_puig": "*gosub_scene adcheck\n*label artefact_Puig\nletter from Dr. Cardinale, I. to Dr. Thayer, L. PhD.\n\n19 August 1995\n\nDear Lucius,\n\nI know it's been a few months since I wrote to you.  I felt a great deal of resentment when I let me go from the excavation, but \nin retrospect, leaving the Eastern City has brought me work in broader areas.  Working at the Museo Nacional de Costaguana has \nallowed me to further my research into those areas you so pleasantly call \"pseudoarchaeology.\"  With the contacts I've made, I'm \nuncovering and consolidating research into ancient giants from all over the world.  Colleagues in the Middle East are particularly \ninformative regarding the giants of the Old Testament.\n\nWorking with Robert [Puig] has been edifying, but he does have his quirks.  Do you recall those large axe heads we dig up near the \nLenz geoglyph?  Roberto has been obsessing over them ever since they were put on display in the Museo Nacional de Costaguana.  \nHe lurks in the museum after closing time, spending hours in the room with those axes. Once, I overheard him talking to the artefacts.\n*page_break\nYou'll recall that the artefacts are made of that strange, black stone, the stone that none of the geologists can identify.  Do you \nthink there is something in the element itself that is harming Robert?  That something in this stone could affect him somehow?  It sounds \nridiculous now that I write it down, yet I did hear him speaking to pieces of stone.  \n\nI hope that when you return to Costaguana this fall, you'll stop by the museum to visit me.  I can understand why things between us had \nto end; you must feel so much responsibility for the dig after Dr. Lenz's death, and your girlfriend pushing \"fringe\" theories must \nnot have been helpful.  I hope that we can still remain friends.\n\nLove,\nIsabel\n\nQUERY SERA:\n*choice\n\t#Roberto Puig, ancient axes\n\t\t*goto_scene artefacts_stolen\n\t#Isabel, recent research into giants\n\t\t*goto_scene artefacts_stolen\n", "artefacts_rumors": "*gosub_scene adcheck\n*label artefacts_rumors\nfrom the CIA interview of Hartley, M., a Miskatonic student under Dr. Thayer, L., PhD., at the Eastern City.\n\nInterview conducted by \"TIM.\"\n\nTIM:  I'm not going to lie, Mark.  Your involvement with the Wellingham Foundation could get you in a lot of trouble.  \nSome of their recent activity has put them under close government scrutiny.\n\nHARTLEY:  What?  What have they done?\n\nTIM:  They're amassing a small army in Ohio.  Didn't you know about their militia?  They're preparing for the End Times.\n\nHARTLEY:  But that's...  Those are just rumors.  That's gossip.\n\nTIM:  I've seen the surveillance photos of their compound.  And I know you've heard the leader's speeches about how the \nU.S. government is \"failing to protect the world.\"  I think he's planning on protecting the world himself, whether the \nworld wants it or not.  All those guns.  Explosives.  The Wellingham Foundation is a hair's breadth from being labelled \na terrorist organization.\n\nHARTLEY:  That's not me, okay?  I know some people there, but I'm not, like, a member of their church.\n\nTIM:  Then help me out.  Tell me something about their part in all of this.\n\nHARTLEY:  The stone axes.  Those axe heads that were stolen from the National Museum in Sulaco.\n\nTIM:  They stole them?\n\nHARTLEY:  No, but they tried to buy them.  That's what I heard.  For years, they tried to buy the stolen axe heads, but \nnone of the usual fences for stolen art had them.  No one in the art smuggling world had any idea of where they were.\n\nTIM:  That's it?  That's supposed to help me?  A bunch of criminals said they didn't see stolen goods?\n\nHARTLEY:  One of the Wellingham people, Birkin or something.  He said he thought that Roberto Puig himself had stolen the axes.\n\nTIM:  What would he do that for?\n\nHARTLEY:  Birkin suspected there was some kind of Emage cult in Costaguana.  He was sure that Puig was part of it.  I never \nheard anything about it, though.\n\nQUERY SERA:\n*choice\n\t#where are the stone axes?\n\t\t*goto_scene interview_beecher_last\n\t#YOUR INBOX HAS ONE (1) MESSAGE\n\t\t*goto_scene Sloane_dies", "artefacts_stolen": "*gosub_scene adcheck\n*label artefacts_stolen\nFrom the SULACO SUN TIMES\n\n12 December 2002\n\n\"ANCIENT AXES STOLEN\"\n\nWednesday morning, employees at the Museo Nacional de Costaguana discovered that the museum had been broken into during the \nnight.  The thieves made away with several historical artefacts, most notably the two ancient axe heads found near Costaguana's \ngeoglyph.  The axe-heads are estimated to be nearly 5,000 years old, and are considered a national treasure. \n\n\"The axes are an irreplaceable part of the heritage of Costaguana and all of South America,\" said Roberto Puig, Director of El \nCostaguana Departmento de la Antiguidad.  \"Their theft concerns us all; however, I have faith in our police, and I am confident \nthat the axes will be recovered.\"\n*page_break\nThe large axe heads both weigh roughly twenty-five kilograms each, and some archaeologists such as Dr. Isabel Cardinale promote \nthe idea that the axes were tools used by an ancient race of giants.\n\nFederal and local police are coordinating in the investigation.  Their greatest fear is that the axes will be sold on the \ninternational black market.\n\nIf you have any information regarding the break-in, please contact the Policia Federal at 9905557945529.\n\nQUERY SERA\n*choice\n\t#axes on the black market\n\t\t*goto_scene artefacts_rumors\n\t#YOUR INBOX HAS ONE (1) MESSAGE\n\t\t*goto_scene Sloane_dies", "assassinate_cabrero": "*gosub_scene adcheck\n*label assassinate_Cabrero\nextract from CIA file: 2139510839(1993)\n\n...confirmed that a small group of Emage were behind the failed attempt to assassinate President General Cabrero in 1983.  Chito Velazquez, in \ncollaboration with four to six others, set up an ambush between the presidential palace and the home of Cabrero's mistress, the British citizen \nImogen Paige.  Unbeknownst to them, Cabrero regularly used a decoy car for his secret trips outside of the palace.\n\nThe decoy car was hit, and Cabrero successfully escaped with is life.  The manhunt for the killers lasted less than a week; they had not planned \nfor an escape.  Five members of the assassination plot were killed.  No one was taken alive.  Imogen Paige was deported to Great Britian.  A mestizo \nnamed Diego Cardinale was also killed in the manhunt, and though there is no evidence that he was involved in the plot, Diego Cardinale's sister \nIsabel Cardinale is a suspected Soviet spy.  \n*page_break\nThe Emage conspiracy's goal was to take control of the Costaguanan government.  Logically, the failed assassination attempt was intended as the first \nstep in a revolution.  This would entail a much larger network than the five men who were killed.  \n\nThough largely inactive for the past ten years, new intelligence leads us to expect more violent action from the Emage rebellion...\n\nQUERY SERA:\n*choice\n\t#Isabel Cardinale, Emage spy network\n\t\t*goto_scene Lenz_digs\n\t#Emage rebellion\n\t\t*goto_scene Thayer_leaves", "brainless_giants": "*gosub_scene adcheck\n*label brainless_giants\nconversation with Dr. Thayer, L., PhD., recorded by Agent SHAMUS\n\n5 January 2013\n\nSHAMUS:  --So these Bible-thumpers.\n\nTHAYER:  The Wellingham Christian Foundation.\n\nSHAMUS:  They want to give you two million dollars?\n\nTHAYER:  It would fund the excavation for at least five years.\n\nSHAMUS:  It's a very tempting offer.  And, let me tell you, those Bible-thumpers have a lot of cash.  I'll bet you could hold out for more.\n\nTHAYER:  They certainly have the money.\n\nSHAMUS:  So what's the problem?\n\nTHAYER:  They want me to prove some fringe theory they have.  See, the Incas had this myth that this sea god Viracocha had created this race \nof giants before he created us normal human beings.\n\nSHAMUS:  You want ice?\n\nTHAYER:  Sure.  And, you know.  Then there was a flood and all the giants were killed.  There are legends about giants from all over the world, \nbut the Wellingham Foundation believe, with a great many thanks to my ex-girlfriend Isabel, that actual, physical evidence of giants will be found \nat the Eastern City.\n\nSHAMUS:  You fired Isabel because of these giants.  You broke up because of these giants.\n\nTHAYER:  Yes.\n\nSHAMUS:  I'm starting to see the problem here.  Is Isabel working with these nutjobs?\n\nTHAYER:  No.  I don't think so.  But she's convinced a lot of amateur historians that there was a culture of giants from Peru all the way to Colombia.  \nHer supposed \"evidence\" can be convincing to idiots.  And the Bible-thumpers want definitive evidence.  A skeleton, I suppose.  Something no one can \nexplain away.\n\nSHAMUS:  And why does a \"Christian\" foundation care about South American giants?\n\nTHAYER:  I don't know.  Because there were giants in the Bible, and they want confirmation of their literal interpretation of it, I guess.  You can't \nforget about the flood part of the Viracocha myth.  Noah's flood killed the giants in Genesis, too.  If we can find a skeleton, they'll see that as \nevidence of Noah's flood, which mean it's also evidence of God.\n\nSHAMUS:  I guess we know the best way to kill a giant, then: drown them.\n\nTHAYER:  If you can find an ocean deep enough.  Pour me another one, would you?...\n\nQUERY SERA:\n*choice\n\t#Wellingham Foundation, Noah's flood\n\t\t*goto_scene great_flood\n\t#Isabel, giants evidence\n\t\t*goto_scene Isabel_statue", "choicescript_description": "Famous archaeologist Dr. Lucius Thayer has gone missing in the Amazon jungle, and the CIA has asked you to find him.  Unfortunately, you’re not the only one interested in Dr. Thayer.  Enter a world of ancient mysteries and modern dangers, of suspicious cults and nefarious secret agents. Remember, you’re not paranoid if the danger is real.\n\n[i]The Spy and the Labyrinth[/i] is a 40,000 word interactive fantasy novel by Lewis Manalo, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nYour choices determine which document you read next in your ongoing search for clues. Through your investigation of the articles, journal entries, and letters in the missing archaeologist’s files, you will discover the game’s rich story and complex characters. Multiple playthroughs will uncover secrets you previously missed in this engrossing tale of supernatural horror.\n\n• A unique narrative experience![n/]\n• Horror and espionage collide in a captivating adventure![n/]\n• An expansive world, steeped in centuries of real - and imagined - history.[n/]\n• An intriguing cast of international characters.[n/]\n• Uncover new secrets with each playthrough!\n", "choicescript_stats": "null", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n  *purchase adfree $4.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n", "close_portal": "*gosub_scene adcheck\n*label close_portal\nFrom the journal of Dr. Thayer, L. PhD.\n\n23 November 2016\n\nMy research into Padre Ganza makes it clear:  we must keep the portal from opening.  I have no doubt this epidemic, this plague \nis the same strange \"pox\" suffered by that 16th Century Jesuit.  Dr. Lenz knew that it was a site that should have stayed buried.  \nI was a fool to ignore all of the warnings.  \n\nI've been played.  Someone wants this portal opened.  Someone knew that I could uncover the site without destroying it.  This is \nthe organization that Roger and Sloane Keegan have been looking for.  They knew that Isabel worked for it.  They knew that Roberto \nPuig worked for it.  What they didn't know - that I know now - is that this organization exists for the express purpose of opening that \nportal to the Other World.\n*page_break\nWho on earth would want that?  How could Isabel of all people want that?  True she had her fascination with \"pseudoarcheology,\" much \nof which has proved to be true.  But that does not mean she should believe the world ought to be destroyed by the gods and devils of \nthis other universe.\n\nBut I have never truly known Isabel, have I?  Throughout our entire relationship, she has used me for the Soviets or for the Emage or \nfor whomever this other group is.  Love should be simple.  Perfidy and secrecy always muddy it up.  It makes the love that I've had for \nher a waste of time.  It makes every emotion I've felt for her worthless.  \n\n\n*page_break ALERT: INCOMING MESSAGE\nMEMO from agent call sign SHAMUS\n\nAgent ${name},\n\nThat pale guy whom the Cubans called EXTRANO walked into our Boston office.  Tim is interrogating him now.  Find the first section of the \ninterrogation attached.\n\n--Special Agent In Charge Roger Mays\n\n*page_break OPEN ATTACHMENT\nfrom the CIA interview of  subject call sign EXTRANO\n\nArkham.  07:00\n\nInterview conducted by \"TIM.\"\n\nTIM: We've been looking for you.\n\nEXTRANO:  I have not been hiding.\n\nTIM:  What is your name?\n\nEXTRANO:  The dead have no use for names.\n\nTIM:  You think we're going to kill you?\n\nEXTRANO:  No.  I think that all beings die.  At least, they do on this plane.\n\nTIM:  \"This plane.\"  You mean this plane of existence right?  Where are you from?  Did you come through the portal?\n\nEXTRANO:  Through the portal?  What an odd question.\n\nTIM:  The one in the Eastern City.  In Costaguana.  Are you from the other side of that gateway?\n\nEXTRANO:  I am from Ohio.\n\nTIM:  Of course you are.  Twenty years ago, we saw you in Arkham.  We've seen you around Costaguana, too.  And now you're back here.  \nWho do you work for?  What do you want with the Eastern City?\n\nEXTRANO: Sometimes, a movement, an idea, takes hold of a person.  Though he may not realize it, the idea consumes him.  It takes a \nhold of his life, even to the point where it seems to take control of a person.  And if that idea is strong enough, if that man or \nwoman is strong enough to survive the idea, then it becomes contagious.\n\nTIM:   That just sounds like hysteria to me.\n\nEXTRANO:  The greatest fallacy of the world is Free Will.  Human beings are simple computers made of flesh and bone.  \nTo a computer, an idea that spreads from one unit to another is just another virus.\n\nTIM:  Are you talking about controlling people's minds?\n\nEXTRANO:  It has already happened.  It happened a long time ago.  Why do you think they would give their freedom to a man like Gonzalgo?\n\nQUERY SERA:\n*choice\n\t#mind control, hysteria\n\t\t*goto_scene Chapter_5\n\t#Gonzalgo election\n\t\t*goto_scene Chapter_5", "crazy_digger": "*gosub_scene adcheck\n*label crazy_digger\nfrom the CIA interview of Hartley, M., a Miskatonic student under Dr. Thayer, L., PhD., at the Eastern City.\n\nInterview conducted by \"TIM.\"\n\nTIM: Did you meet Jairo Becker in Sulaco?\n\nHARTLEY:  Becker?  Yeah.  Once or twice.  The short guy who worked for, uh, Roberto Puig.\n\nTIM:  Were you aware of his affiliation with socialist rebels in the 1990s?\n\nHARTLEY:  Well, I mean...  Have you been to Costaguana?  Like, half the people there used to be rebels themselves or they have a cousin or a best\nfriend who's a rebel.  It's kind of crazy.  You get to wondering who they were all rebelling against if they were all rebels.\n\nTIM:  Were Becker and Dr. Thayer friendly?  \n\nHARTLEY:  No.  Actually, he and Dr. Thayer hated each other.  They didn't like argue and stuff, but they didn't like each other.  \nDr. Cardinale--\n\nTIM: Isabel Cardinale?\n\nHARTLEY: Yeah.  We shared a ride back to Sulaco once, and she told me that Dr. Thayer didn't hate Jairo because of the occupying the \nEastern City thing.\n\nTIM: No?\n\nHARTLEY: No.  She said Jairo protected the site from the other rebels.  The dig would've been ruined worse if he hadn't been there.  No, Dr. Cardinale \nsaid that Dr. Thayer hated Jairo because once, like in the early Nineties, this guy at the dig site went crazy.  He started attacking \npeople with a five-inch trowel.  Like, stabbing people.  And to stop him, Jairo killed him.  Hacked him with a machete.\n\nTIM:  Why would Dr. Thayer hate him for that?  It would seem like Senor Becker probably saved some lives.\n\nHARTLEY:  I don't know, but I have a theory.  It's kind of crazy, but the Eastern City's like that.  There's a generally accepted notion \nthat the Emage's ancestors sacrificed humans at the Eastern City.  And out of some kind of superstition, I don't think Dr. Thayer wanted blood \nto be spilled on the site.\n\nQUERY SERA:\n*choice\n\t#Roberto Puig\n\t\t*goto_scene Puig_geoglyphs\n\t#Dr. Isabel Cardinale\n\t\t*goto_scene young_saint\n\t#blood sacrifice\n\t\t*goto_scene Emage_beliefs", "dissent_lenz": "*gosub_scene adcheck\n*label dissent_Lenz\nfrom the journal of Dr. Thayer, L., PhD.\n\n23 September 1989\n\nIsabel has not let go of the idea, based on that child prophet's visions, that we need to dig in the Northwest Gulley.  There really is no rational, \nevidence-based reason that we should dig in that particular area before we dig anywhere else.  If the Eastern City site is as extensive as we believe \nit to be, there is no doubt that we would find SOMETHING in the Northwest Gulley.  If that something might prove significant, we mere mortals have no \nway of predicting;  so we continue to dig where the evidence directs us.\n\nAt least that's what we're supposed to believe.\n*page_break\nDr. Lenz is so vehement in his objections to digging in the Northwest Gulley that I suspect he knows what is there, or at the very least, Dr. Lenz has \na very strong idea about what might be in that location.  And for whatever reason, Dr. Lenz does not want to dig it up, at least not yet.  How he could \nknow such a thing, and what could possibly be dangerous here, I have no idea.  \n\nThe only thing of significance that the Eastern City is said to have is the gateway to Xinnabala, \"The Cave of Fear.\"  What could possibly be so important \nin a thousand-year-old myth?  What about that myth would make Dr. Lenz want to avoid that part of his excavation?  Xinnabala is the point of the dig.  We \nshould be heading straight for it.\n*page_break\nOf course, I could be wrong.  Dr. Lenz might be refusing to dig where the child prophet the Saint of Darkness is telling us dig simply because he doesn't \nwant to look like he's taking instructions from an eight-year-old.  That would be bad PR.\n\nQUERY SERA:\n*choice\n\t#Thayer visits the Saint of Darkness\n\t\t*goto_scene meeting_saint\n\t#Lenz, Northwest Gully\n\t\t*goto_scene Lenz_digs\n\t#Xinnabala site\n\t\t*goto_scene Lenz_digs\n\n", "duende": "*gosub_scene adcheck\n*label duende\nresearch notes by Dr. Thayer, L., PhD.\n\nundated, circa. 2002\n\nDuende - small imps.  Sprites.  People in South America actually believe in them.  Like people believe in Bigfoot.  Most people who believe \nin imps believe these creatures possess magical properties.  Therefore, these people also believe in magic.\n\nThe name \"duende\" at least, comes from Spain, and they have the creatures there, too.  What do they call them in Ireland?  \"Leprechauns.\"  \"Fear \ndearg.\"  That's what I get from listening to my Irish grandmother and her tales about banshees and pookas.  Fairy tales.  What is it \nabout human nature that yearns for something magical?  We've had rational science for thousands of years, yet we choose to reject \nlogic in favor of something unknowable.  We want to have blank spaces in our maps.  We want mystery to exist.  We need the possibility \nof adventure.  Even though most of us won't take that first step into what is unknown, we like to know that it's there.\n*page_break\nIn Spain, in flamenco, \"duende\" has its own meaning.  Frederico  Garcia Lorca called it a \"dark sound.\"  Or was that Nick Cave?  \nDuende must be like Soul.  Flamenco, the Soul Music of Andalusia.  Duende, the dark unknown of the human heart.\n\nDuende.  If I could sing, I would sing with duende now.  I would empty my heart of it.  I love Mary, in a way.  There are so many \npragmatic reasons to be with her, and we have our way of quiet romance.  But I still love Isabel, too.  After all she's done, she's \nthe only woman with whom I've found passion.  There was a time I could have left it all for her.  I would have left the Eastern City, \nleft Costaguana.  I would have left archaeology, if it meant being with her forever.  Now all I have are the memories being with her, artefacts buried in \nmy brain that I dig up over and over again, as I attempt to unravel the mysteries of a long-dead past.\n\nNEW SEARCH:\n*choice\n\t#Isabel\n\t\t*goto_scene Isabel_fear\n", "ending": "*gosub_scene adcheck\n*page_break End\nWe hope you've enjoyed playing [i]The Spy and the Labyrinth.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99", "first_breakup": "*gosub_scene adcheck\n*label first_breakup\ntranscript of a recording by call sign SHAMUS\n\n12 May 1995\n\nSHAMUS: ...Because of giants?\n\nTHAYER: [redacted], I'm a scientist.  I, I can't entertain a theory that has no evidence.  She talks about the testimony of Magellan's sailors \nas if they count just as much as physical evidence.  I thought she would've learned by now.  Learned SOMETHING.  About evidence.  Or logic!  \nHonestly, I'm surprised she's hung on to the idea as long as she has.\n\nSHAMUS: She's had this idea since before you met.\n\nTHAYER: Yes.  This \"Thing Without a Name\" she mentioned was new, but the giants, she's always believed in the giants.  I don't know what I was \nthinking, getting involved with her.  I shouldn't even have let her stay on the dig, knowing how ham-fisted her reasoning was.  Is.  I should \nhave kicked her off after that first semester with Dr. Lenz.\n\nSHAMUS:  But she's got a great body, and you wanted to explore every nook and cranny of it.\n\nTHAYER:  Shut up.  Just...  There will be some kind of political fallout because of this.  If this was the States, if this was Arkham, I'd have been \nhit by sexual harassment charges.\n\nSHAMUS:  Thank God this ain't the States.  And why the hell do you have to break-up with her if you're going to fire her?  You could just--\n\nTHAYER:  Are you kidding me?  She's pissed, that's why.  Y'know, when I threatened to fire her, I really expected her to just, to forget about the \ngiants.  I was giving her - I gave her an ultimatum: me or this childish theory about giants.\n\nSHAMUS:  And she chose the giants.\n\nTHAYER:  She chose the fairy tale.  I tried to reason with her, show her how all her \"evidence\" is wrong.  She started telling me, lecturing me, about \nthe giants of North America.\n\nSHAMUS: Reminds me of this girl I knew when I was in the Air Force.  I was stationed at Hill Air Force Base.  Utah.  That was a while ago.  My first year \nthere, I met this perky, little blonde with curly hair and red lips.  You know.  A girl you prayed you could sin with.  But after a couple dates I was still \ngetting nowhere with this chick.  Forget about home runs.  I barely got to first base.  Then, I take her to a diner one night, she comes out with this great \nrevelation: she's a Mormon.  She up and invites me to church the very next morning.  Can you imagine me in a church?  I spent all that time trying to get \ninto her pants, and she up and tries to convert me.\n\nTHAYER:  I don't get it.\n\nSHAMUS:  You can't convert the missionary, Lucius.  You shouldn't have tried.\n\nTHAYER:  You think I should let her work on the dig?\n\nSHAMUS:  Well.  If you want to keep dating her.  You're in charge, right?  Do what you want.\n\nQUERY SERA:\n*choice\n\t#Magellan testimony\n\t\t*goto_scene Patagonia_giant\n\t#North American giants\n\t\t*goto_scene Lincoln_giants\n", "first_contact": "*gosub_scene adcheck\n*label first_contact\nrecording by agent call sign SHAMUS\n\nInitial contact with subject Dr. Thayer, L., PhD.\n\n7 January 1987\n\nSHAMUS:  Happy New Year.\n\nTHAYER:  What?  Oh.  Yeah.  You, too.  Happy New Year.  You're American?\n\nSHAMUS:  Yeah.  Virginia.  You?\n\nTHAYER:  Massachusetts.\n\nSHAMUS:  Pretty girl.\n\nTHAYER:  Who?  Isabel?  Yeah.  I mean, we just work together.\n\nSHAMUS:  That make her less pretty?\n\nTHAYER:  No.  I suppose it does not.       \n\nSHAMUS:  Oh, I see it.  She's with that guy.\n\nTHAYER:  Harry.  Yeah.  Well.  That's what HE wants, I guess.\n\nSHAMUS:  Y'all are digging up in that old city, right?\n\nTHAYER:  That's right.  \"Ancient\" city, actually.\n\nSHAMUS:  Yeah. I heard stories.  One of the old timers who drinks here.  There are stories that there's something evil up there.\n\nTHAYER: Well, if there is, we haven't dug it up.\n\nSHAMUS:  Not yet, anyway.\n\nTHAYER:  Who are you, exactly?\n\nSHAMUS: I'm [redacted].  I'm a bush pilot.\n\nTHAYER: Lucius.  Nice to meet you.  These, uh, stories about evil.  They say anything specific?\n\nSHAMUS:  Why?  You superstitious?\n\nTHAYER:  No.  Just curious.  Sometimes local legends have some leftover bit of fact.  Your story might have something relevant to the dig.\n\nSHAMUS:  I get it.  Like the Illiad has all that talk about gods and everything, but there really was a city of Troy.\n\nTHAYER:  I guess.\n\nSHAMUS:  Well, this story I heard, man said that a few hundred years ago the Spanish had dug a bunch of treasure out of there.  Gold, he said.  \nBut then some \"old god\" got angry that they were taking all of his loot, and he hit the Spanish with a plague.  The illness made the Spanish all \ncrazy, and they started rounding up the local tribesman, started sacrificing them to this old god.\n\nTHAYER:  The Spanish were?\n\nSHAMUS:  I reckon they hoped the god would appreciate the sacrifices and cure them.  But it didn't work.  Instead, the old god took the Spanish with \nhim to his, what'd he call it?  \"The Cave of Fear.\"\n\nTHAYER:  \"Cave of Fear\"?  That's Xinnabala.  That's in the Emage escatology.  The death part of their mythology.\n\nSHAMUS:  Well. The old god took them to that cave.  The locals who were left alive where afraid of the old city, and after a lot of arguing, they \nburied it best as they could.  And it stayed buried until that old German guy dug it up.\n\nTHAYER:  Dr. Lenz.  The old German guy.  He's my boss.\n\nSHAMUS:  It's a good, little ghost story, ain't it?\n\nTHAYER:  Yeah, but if it's true, it means my boss didn't discover the Eastern City.\n\nSHAMUS:  Good thing you're not superstitious.\n\nQUERY SERA:\n*choice\n\t#who is SHAMUS?\n\t\t*goto_scene Roger_reveals\n\t#Sulaco locals and the excavation\n\t\t*goto_scene Thayer_leaves\n\t#SHAMUS and Isabel\n\t\t*goto_scene Isabel_swallow", "first_night": "*gosub_scene adcheck\n*label first_night\nfrom the journal of Dr. Thayer, L. PhD.\n\n1 November 1991\n\nI feel like an idiot now, but I've avoided getting close to Isabel.  Part of the reason may be an attempt at keeping something resembling a professional \nrelationship.  I've already seen how she wrecked poor Harry.  And then there is some loyalty I feel for Harry, as if becoming involved with Isabel is a \nbetrayal of him.  Not that I've heard from him in months.\n\nBut whatever my actions--or inactions--I have wanted to be close to Isabel for a long time.  Evidently she's felt the same.  I feel like a fool.  Like a \nprude.  But I'm also very happy.  I don't think Isabel is used to pursuing her lovers.  I'm sure she's more used to men vying for her affection.\n*page_break\nA relationship with someone who works with you is, without a doubt, unprofessional.  Once people find out that we're an item, it will color their perception \nof every decision we make.  And it will:  now I'll HAVE to support her when she says we should dig in the Northwest Gully because \"the Saint of Darkness said so.\"\n\nBut I look at my colleagues, especially at Dr. Lenz who has no wife and no children, and I would rather be with the wrong person than with no one.\n\nQUERY SERA:\n*choice\n\t#Thayer, Isabel Cardinale, recent contact\n\t\t*goto_scene late_Isabel\n\t#Isabel Cardinale, further background from CIA?\n\t\t*goto_scene Sloane_interview", "foreplay": "*gosub_scene adcheck\n*label foreplay\nletter from Dr. Cardinale, I. to Dr. Thayer, L., PhD.\n\n7 May 2003\n\nDear Lucius,\n\nI was surprised and overjoyed to receive your letter.  You haven't written it in words plain to see, but I feel that you may have forgiven me.  If you haven't \nyet, please don't let me lose that hope.\n\nDo you realize it's been over fifteen years since we first met?  I miss your friendship even more than I miss your love.  I find as I get older the afterglow \nis more important to me than the foreplay.  When we're young we'll betray our intimate friendships in our rush to find physical intimacy.\n*page_break\nI'm happy you have a son.  I love imagining you with children, doting on them.  Spoiling them.  Does he take after you or Mary?  I remember meeting her when \nI visited Arkham.  She was still mostly a child then herself, but so pretty.\n\nI know that I owe you, Lucius.  I owe you an explanation, and I owe you penance.  You shall have both, though they are not something I can share in a letter.  \nThere are secrets that I need to share with you.  Things I know about the Eastern City that Dr. Lenz may not have revealed to you.  Dangers not unrelated to \nwhat you called my \"wild\" theories. \n*page_break\nAnd there are more secrets that we can uncover together.  Know that the Eastern City has been preserved.  We have not been able to make much progress in our \nresearch; there are funding issues that are somewhat tied to the political climate.  I will have to speak to Director Puig, but I have great hope that we \ncan find a way for you to return to Costaguana.\n\nWarmest regards,\n\nIsabel\n\nQUERY SERA:\n*choice\n\t#Thayer returns to Costaguana\n\t\t*goto_scene Thayer_loves\n\t#Eastern City secrets\n\t\t*goto_scene Thayer_loves", "geoglyphs": "*gosub_scene adcheck\n*label geoglyphs\nFrom \"Figures in the Landscape,\" PERSONS MAGAZINE, December 1992\n\n...years of deforestation, a massive figure in the landscape was uncovered.  Though not quite at the scale of the more famous \nNazca lines, Costaguana's geoglyph is estimated to be ninety feet long, and due to the geography which places the geoglyph in a \nvalley or depression, the image can only be seen from the air.\n\nThe discoverer of the geoglyph, bush pilot Roger Mays, took us on a flight over the site to give us our own look.  A mere \ntwenty minutes flight away from the capital city of Sulaco, we found Lenz's geoglyph looking up at us from the edge of the jungle. \nWith its abstract features and the headdress the figure is wearing, the image bears a strong resemblance to the Kachina figures \nof the Hopi Indians of North America.  Dr. Johannes Lenz is quick to end the comparison.\n*page_break\n\"There is a passing similarity in the abstraction of the facial features,\" Lenz said in a statement to the press.  \"But this figure resembles \nno Kachina of the Hopi people.  My colleagues and I suspect that the figure originates with the ancestral civilization of the local Emage people.\"\n\nNaturally, the citizens of Costaguana are proud of this assessment, and Lenz's geoglyph, dubbed the \"Sun-Head,\" is quickly becoming a symbol of the country...\n\nQUERY SERA:\n*choice\n\t#Nazca lines\n\t\t*goto_scene Nazca_theory\n\t#Sun-Head\n\t\t*goto_scene Sloane_letter\n\t#Roger Mays\n\t\t*goto_scene Mays_one\n", "giants_die": "*gosub_scene adcheck\n*label giants_die\nNotes by Dr. Cardinale, I.\n\nThe following notes were found in a termite-proof suitcase found in Dr. Thayer's tent.  There are no dates on the notes, but \nfrom the differing ages of the paper we can deduce that they spanned several years with the most recent being written sometime \nin early 2017.\n*page_break\n...What catastrophe befell El Viejo's giants?  What caused the flood?  Was it this massive tectonic shift that the Wellingham \nChristian Foundation wrote of?  Or could it possibly be something else?  Is the flood more metaphorical than literal?...\n*page_break\n...Floods cause diseases to spread.  It occurred with the Black Plague.  Did flooding allowed Red Fever to spread throughout the \npopulation of giants?...\n*page_break\n...What is Red Fever making people do?  What is it making them become?  If it did affect El Viejo's giants, what did it make them do?...\n*page_break\n...We must dig up the Labyrinth.  We must find Xinnabala.  We must free Xinnabala...\n\nQUERY SERA:\n*choice\n\t#disease that alters behavior\n\t\t*goto_scene t_gondii\n", "great_flood": "*gosub_scene adcheck\n*label great_flood\nfrom GIANTS AMONG MEN by Janice Wellingham\n\nWellingham Christian Press, (c) 1973\n\n...and even the deepest holes on Earth have failed to reach even a fraction of a percent into our planet's mantle.  If we take as \nfact that the surface of the Earth is made up of several tectonic plates that are able to drift over a more molten substratum of \nthe planet, we find our scientific theory of the Great Flood found in the book of Genesis:  the geological possibility that all of \nthe tectonic plates shifted at the same time in a kind of \"global shift.\"\n\nThere have been theories that the Earth's poles have shifted, but the idea of a \"global shift\" is different in that it is not the poles that move, but \nthe hard exterior land mass of our Earth that has slipped around its molten center.  This slip forces our continents into different relationships with the \nrotation of the Earth as well as with the equator.  Such a shift would put land that was previous beneath the ocean several thousand \nmiles away, possibly above sea level.  It is just one example, but indeed, areas of the Midwest, thousands of \nmiles far from the ocean, are littered with the fossilized remains of sea shells.  Therefore, land, such as that land where Noah \nresided before he built his ark, could also become suddenly flooded. \n*page_break\nThe many other flood myths from around the world support this theory of a global catastrophe.  The Lost City of Atlantis \nis perhaps second in popularity to Noah's story.  The Hindus have Manu, the first man, surviving a flood.  The Chinese have their own \nmyths about a flood that lasted over two generations.  And the Incas in Peru have a myth about their god Viracocha causing a flood to \nwipe out the first race of men, giants whom he found too idiotic and brutal to let live.  It would appear that not only the Hebrew God \ncould be disappointed enough to blot out all He had created...\n\nQUERY SERA:\n*choice\n\t#human extinction\n\t\t*goto_scene human_mistake\n\t#South American giants\n\t\t*goto_scene man_in_black\n\t#connection between Dr. Lenz and Wellingham Christian Foundation?\n\t\t*goto_scene man_in_black\n", "hoax_skulls": "*gosub_scene adcheck\n*label hoax_skulls\nreport by CIA agent call sign OUTRIDER\n\nTOP SECRET\n\n4 March 2014\n\nRE: OPERATION ORIGIN\n\nAs previously reported, our section was too slow to suppress the results of the DNA testing of the 2000-year-old Pucara skulls. Three geneticists \nconducted the blind testing at separate locations, and all three are convinced that the results reveal previously undiscovered human \"mutations.\"  \nThe Wellingham Christian Foundation, who funded the tests, was quick to label these mutations as confirmation that the over-sized and elongated skulls \nare the remains of the human-angel hybrids known as Nephilim.  Though we have no indication that these humanoids were actually the Nephilim of the Bible, the \ngenetic tests are evidence of a race of giants. \n\nWe followed standard procedure for those instances when information cannot be contained: we created a campaign to discredit it.  With the assistance of \na team of analysts at Langley, my section flooded the internet with commentary on the DNA test.  We mostly professed the opinion that the DNA tests of \nthe Pucara skulls are evidence that the Earth was visited by ancient aliens and that these aliens mated with human beings.  There were several variations \non the hybrid alien theme, and we made certain that every article's comment section and every discussion thread contained some mundane reference to sex.  \n\t\n*page_break\nWith the State Department's contacts at the world's largest search engine, we are able to make the articles that our people have written the top search results \nfor any search related to the Pucara skulls.  The misinformation campaign was a success;  no serious news source picked up on the story, and no serious geneticist or \narchaeologist wants anything to do with the skulls.  Furthermore, some fringe news sites cited and linked to our articles, further disseminating the misinformation.  \nNone of the merely curious will have a clear trail to follow to the company.\n\nUnfortunately, my contacts within the Costaguana government are telling me that President Gonzalgo has been informed of the DNA testing.  They also tell me \nthat he is beginning to take the giant theory seriously.  The Saint of Darkness has not made a public statement on the matter, but the notes we copied from Agent \nBlackbird do confirm that the Saint has long had vision of giants in the Eastern City.\n\nQUERY SERA:\n*choice\n\t#giants fringe theory\n\t\t*goto_scene first_breakup\n\t#Saint of Darkness, giants\n\t\t*goto_scene Blackbird_notes\n\t#President Gonzalgo, giants\n\t\t*goto_scene Blackbird_notes", "human_mistake": "*gosub_scene adcheck\n*label human_mistake\nnotes by Dr. Lenz, J., PhD.\n\nundated\n\nLife is absurd.  The very existence of life is absurd.  Why should it exist at all?  That a protozoa should have formed from the primordial slime is \nnothing more than a mere accident.  That intelligent life should evolve from a single cell, ridiculous. \n\nWe believe ourselves to be so grand.  We forge empires, we raise monuments to ourselves, ever more  august, ever more imposing.  When we can no longer \nbuild, we convince ourselves that we are the destroyers of the world.  To think that anything human beings could do to the planet could possibly matter.  \nThe Holocene, the biological existence of Mankind, is nothing but a blink in the history of the 4.5 billion years that the Earth as revolved around the \nSun.  The Milky Way is more than twice that old.  And the Universe?\n\nWhat does the life of a man, all eighty years of it, what does that life amount to in billions of years that have passed and that will come to pass?  \nEvery ounce of human effort, from the pyramids to the symphonies, it's all a vain attempt at convincing ourselves that, in the face of utter absurdity, we matter.  \nIn our heart of hearts, we know that this is not true.  The whole of Life, from the rarest virus to the glory that is Mankind, none of it matters.\n*page_break\nThe notes above were attached to the following letter.\n*page_break\n*goto_scene Isabel_fear\n", "interview_mib_1": "*gosub_scene adcheck\n*label interview_MIB_1\nfrom the CIA interview of  subject call sign EXTRANO\n\nBoston.  07:00\n\nInterview conducted by \"TIM.\"\n\nTIM: We've been looking for you.\n\nEXTRANO:  I have not been hiding.\n\nTIM:  What is your name?\n\nEXTRANO:  The dead have no use for names.\n\nTIM:  You think we're going to kill you?\n\nEXTRANO:  No.  I think that all beings die.  At least, they do on this plane.\n\nTIM:  \"This plane.\"  You mean this plane of existence right?  Where are you from?  Did you come through the portal?\n\nEXTRANO:  Through the portal?  What an odd question.\n\nTIM:  The one in the Eastern City.  In Costaguana.  Are you from the other side of that gateway?\n\nEXTRANO:  I am from Ohio.\n\nTIM:  Of course you are.  Twenty years ago, we saw you in Arkham.  We've seen you around Costaguana, too.  And now you're back here.  \nWho do you work for?  What do you want with the Eastern City.\n\nEXTRANO: Sometimes, a movement, an idea, takes hold of a person.  Though he may not realize it, the idea consumes him.  It takes a \nhold of his life, even to the point where it seems to take control of a person.  And if that idea is strong enough, if that man or \nwoman is strong enough to survive the idea, then it becomes contagious.\n\nTIM:   That just sounds like hysteria to me.\n\nEXTRANO:  The greatest fallacy of the world is Free Will.  Human beings are simple computers made of flesh and bone.  \nTo a computer, an idea that spreads from one unit to another is just another virus.\n\nTIM:  Are you talking about controlling people's minds?\n\nEXTRANO:  It has already happened.  It happened a long time ago.  Why do you think they would give their freedom to a man like Gonzalgo?\n\nQUERY SERA:\n*choice\n\t#mind control, hysteria\n\t\t*goto_scene Chapter_5\n\t#Gonzalgo election\n\t\t*goto_scene Chapter_5", "interview_beecher_last": "*gosub_scene adcheck\n*label interview_beecher_last\nfrom the CIA interview of Beecher, K., a Miskatonic student under Dr. Thayer, L. at the Eastern City\n\nInterview conducted by \"TIM.\"\n\nBEECHER: So, like, are we done yet? \n\nTIM:  You have somewhere better to be?\n\nBEECHER:  Look, I'm kinda worried about Dr. Thayer and everything, too.  But I want to get back to the dig.\n\nTIM:  I'm sorry?  You want to go back to Costaguana?\n\nBEECHER:  What?\n\nTIM:  There's an epidemic down there.  Of a disease that we know very little about.\n\nBEECHER:  Red Fever?  Come on.  I had a fever back in November.\n\nTIM:  You already had the fever? [off-mic] Can we get some medical personnel in here?\n\nBEECHER:  A nurse already saw me yesterday.  I'm totally fine.  So, like, will you fly me back, or do I have to get a flight on my own.\n\nTIM:  There are no flights to Costaguana.  What's so important that you have to go back there?\n\nBEECHER:  The dig.  The Eastern City.  The Northwest Gulley.  There's important stuff down there that we need to dig up.\n\nTIM:  What \"important stuff\"?  Are there more artefacts down there?\n\nBEECHER:  Look, the artefacts, they're important, right?  But they're important in the way a stop sign is important.  Like, \nstopping at a stop sign can completely save your life, y'know?  Say there's a truck coming down the road.  You stop your car, the \ntruck doesn't slam into you.  But if there's no truck, and you don't stop at the stop sign?  Big whoop.  You just drive through the \nintersection.\n\nTIM:  So in this scenario, is there a truck coming down the road?\n\nBEECHER:  I don't know.  It's not the REALLY important thing.  The REALLY important thing is something else back in the Eastern City.\n\nTIM:  Do you mean the portal?  The gateway to Xinnabala?\n\nBEECHER:  We have to dig it up.  If we don't dig it up - and dig it up right - how is he going to get here?\n\nTIM:  How is WHO going to get here?\n\nQUERY SERA:\n*choice\n\t#Eastern City, artefacts\n\t\t*goto_scene artefacts_rumors\n\t#Thayer, Red Fever symptoms\n\t\t*goto_scene last_entry\n\t#YOUR INBOX HAS ONE (1) MESSAGE\n\t\t*goto_scene Beecher_memo", "interview_one": "*gosub_scene adcheck\n*label interview_one\nfrom the CIA interview of Hartley, M., a Miskatonic student under Dr. Thayer, L. at the Eastern City.\n\nInterview conducted by \"TIM.\"\n\nHARTLEY:  ...you mean the people--?\n\nTIM: On the dig.  The Emage people on the dig.  Did they resent something about Thayer?  Did they have something against him.\n\nHARTLEY:  No... Not that I can remember...\n\nTIM: Did he somehow offend them?  The country's on edge, right?  \n\nHARTLEY: You mean the plague or the rebels?\n\nTIM:  Exactly.  The country's on edge, and Thayer's there, leading a group of outsiders, Yanquis, digging up, whachacallit?  \nThe Place of Fear?\n\nHARTLEY: Xinnabala.  The Cave of Fear.  You gotta understand.  The locals, they're Catholic, but they have their own religion, \ntoo, right?  But I've never heard of anyone...  They liked Dr. Thayer.  He took their beliefs seriously, and they respected him.  \n\nTIM: Yeah.  You already told me about the psychic powers mumbo-jumbo.\n\nHARTLEY: \"Psychic phenomenon.\"  Look, that plague has killed his friends, too.  That plague took people he really cared about.  \nI mean, I was only in Costaguana three months.  Not even.  Ten weeks.  But Thayer's been taking trips to Costaguana for, like, \nthirty years almost.  He's been digging there even longer than Johannes Lenz was digging.  Thayer's got roots there.\n\nTIM: That's what we're talking about.  We think those roots got him abducted - or worse.  You know anything about Thayer's political \nconnections in Costaguana?  \n\nHARTLEY: Just, y'know, with the Department of Antiquities.  And there was that woman from TV.  She was there with Universidad de Sulaco.  \nIsabel Cardinale.\n\nTIM: Cardinale?  Did you see her yourself?  She was at the dig site?\n\nQUERY SERA:\n*choice\n\t#Isabel Cardinale\n\t\t*goto_scene Isabel_thesis\n\t#psychic phenomenon\n\t\t*goto_scene psychic_phenomenon\n\t#Emage beliefs\n\t\t*goto_scene Emage_beliefs\n", "keening": "*gosub_scene adcheck\n*label keening\nletter from Dr. Cardinale, I. to Dr. Thayer, L., PhD.\n\n3 August 1993\n\nDear Lucius,\n\nI'm surprised at how much I miss you.  My days feel so empty without hearing your avalanche of a laugh or seeing your face giving me that \nawful, crooked grin.  So I decided to occupy myself with so much work that I would forget all about you.  But you and Dr. Lenz aren't here, \nso there's no dig, and I am left with no work.\n\nRelief from my oh, so tragic loneliness came when Jairo called.  No, I have not begun an affair with one of the drivers at the dig site.  \nHe called to say he'd heard rumors about an \"Other World\" event happening in a village near the Eastern City.  I know you look down on my \ninterest in the local psychic phenomenon, but they happen so frequently around here that they warrant an investigation, even if all that \ninvestigation does is prove that they are a hoax.\n*page_break\nJairo picked me up in Sulaco late the next morning.  He drove like a madman up the mountain.  When I asked him to slow down, he said that \nhe didn't want to miss the event.  It seems our pragmatic, stalwart Jairo has been taken with superstition.  I know you blame him for what happened\nwith Marco last year, but I seriously think the incident was something of a religious epiphany for Jairo.  He approached this new event \nlike it was a religious miracle, and after seeing it, I tend to agree with him.\n\nThe village of Santo Tomas is an Emage village, deep in the jungle, in an area frequented by rebels.  The village is scarcely more than a dozen \nweak, wooden cabins of the type the indigenous build.  You know them: dirt floors, open sewage, goats freely wandering in and out.  They do \nhave a church that the rebels have left alone for now.  (I suspect they're still trying to win over the locals to their cause.) \n*page_break\nSanto Tomas is on a steep slope, so Jairo parked on the edge of the village, but even there, stepping out of the car, we could hear it.  It was \na strange kind of singing.  A chorus, but atonal and without words.  At times the song was a cacophony of voices, like a crowded party where, \ninstead of talking, singers sang their own songs.  And somehow, the voices all blended together into one orchestra of voices.\n\nWe approached the village square, and I saw all of the village's women walking together in a large circle, trudging aimlessly, apparently in a trance.  \nThe youngest girl was probably twelve, but all of the village women from her to the oldest were in this circle.  Most of the village's men and \nprobably all of its children stood around watching and listening to this orbiting chorus.  \n*page_break\nThe village priest stood on the church steps, watching, fascinated.  A Frenchman, he was probably the only other person in the village who was \nnot Emage, and I asked him what was going on.  He told me the women of Santo Tomas had begun droning like that three days prior, and they had not \nstopped for food or sleep since.  At first, the husbands and children had tried to drag their women home, but the women would not be taken away and they \nwould not stop.  \n\nThe men asked the priest to do something about it.  When the women did not respond to him either, he pricked some of them with a needle, to confirm \nthat they were indeed in a deep trance.  The Frenchman said the singing reminded him of a bastardized form of \"keening,\" a pagan Irish mourning ritual, long \noutlawed by the Catholic church.  Some women in Britain would still keen while protesting nuclear arms or something.  But whatever these Emage women were doing, \nthe priest said it was involuntary.\n*page_break\nDarling, I wish you could have seen it.  I know that you won't believe it, or you'll say it was faked.  But if you could have FELT it.  The energy of the \nplace, the emotion that was in the air.  I won't call this a miracle, but I'll say it's something to be revered.  Jairo and I stayed in Santo Tomas till \nthe women stopped singing.  They went on for two more days.  I know it was dangerous with the rebels in the area, but Jairo and I couldn't bring ourselves to leave.\n\nOn our second evening, the singing stopped all at once.  The women were exhausted and hungry, and each woman thought that she'd just woken up.  Not a \nsingle one of them could remember the last five days.  No one could say why they'd all started keening.  No one could say why they'd stopped.  I went \nhome more mystified than I've ever been after visiting one of these psychic phenomenon.  Even that ugly incident with Marco at the dig site didn't \nunsettle me as much as these women did.\n*page_break\nWrite to me.  Tell me how much you miss me.  Tell me how boring that town of Arkham is, and that you wish I was there.  I still have that purple flower \nyou bought me last June.  It's all dry and brittle now, but I'll protect it from crumbling apart.\n\nLove forever,\n\nIsabel\n\nQUERY SERA:\n*choice\n\t#Marco incident\n\t\t*goto_scene crazy_digger\n\t#rebel territory\n\t\t*goto_scene rebel_city\n", "last_entry": "*gosub_scene adcheck\n*label last_entry\nfrom the journal of Dr. Thayer, L., PhD.\n\n[The following undated text constitutes the last entry in Dr. Thayer's journal.]\n\nI MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I \nMUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST \nDIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG \nI MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST \nDIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I \nMUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST \nDIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I \nMUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST \nDIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I \nMUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST \nDIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I MUST DIG I \nMUST DIG I MUST DIG...\n\n*page_break ALERT: INCOMING MESSAGE\nMEMO from agent call sign SHAMUS\n\nAgent ${name},\n\nShelter in place.  The building is under quarantine.  Red Fever is spreading throughout the building.  \nFind the \n\n--MESSAGE BREAK--\n\n*page_break UPDATE: EXTRANO INTERVIEW\nUPDATE. \n \nArkham, 08:00\n\nfrom the CIA interview of  subject call sign EXTRANO\n\nInterview conducted by \"TIM.\"\n\nEXTRANO:  You are too late.  His is already here.\n\nTIM:  We have satellite images of the Eastern City.  There are hundreds of people there.  Digging.  But \nwe've also got Apache attack helicopters coming in from Colombia.  They have orders to take out everyone \nthere.  \n\nEXTRANO:  This will not end the excavation.  There are hundreds of thousands more people who want to dig \nup the Labyrinth to Xinnabala.  They do not understand why they are compelled, but they all want to dig.\n\nTIM:  Then we'll go back.  The Apaches will take them out again.\n\nEXTRANO:  No, they won't.  You could kill every living soul in Sulaco, and it still wouldn't stop him from coming.  \n\nTIM:  He's that powerful, your god?  Your \"El Viejo\"?\n\nEXTRANO:  People are powerful.  \"El Viejo,\" as the Emage call him, he knows how to use people.  He makes \nthem one with him.\n\nTIM:  What does that mean?  Are you talking about the Red Fever?  The fever, and how it leads to mind control?\n\nEXTRANO:  He will make all people one with him.  He consumes their souls, and they belong to him.  I have \nbeen working these past twenty years, ensuring that he has people everywhere.\n\nTIM:  Twenty years.  You been travelling the world, infecting people with Red Fever?\n\nEXTRANO:  Yes.  I know you have seen me in the United States.\n\nTIM:  So, we've all been infected with some version of Red Fever?\n\nEXTRANO:  It was the simplest way to take over the world.  Some individuals are immune, but we effectively took control \nof all the people.  Tell me, agent, if you could go anywhere in the world, where would you go?\n\nTIM:  I... I guess I would go to Costaguana.\n\nEXTRANO:  What for?  The bay?  The women?\n\nTIM: I want to go there... to... to dig.  We must dig up the Labyrinth.\n\nEXTRANO:  We must.  We must find Xinnabala.  We must free Xinnabala.\n\nTIM:  We must open the portal.  We must find Xinnabala.  We must free Xinnabala.\n\n...CONNECTION TO SERA LOST.\n*page_break Please contact tech support.\n*goto_scene ending", "late_isabel": "*gosub_scene adcheck\n*label late_Isabel\nfrom the CIA interview of Beecher, K., a Miskatonic student under Dr. Thayer, L. at the Eastern City\n\nInterview conducted by \"TIM.\"\n\nBEECHER:  ...I dunno.  She was in her fifties, I guess.  She looked like a digger, y'know?  But elegant.\n\nTIM:  I'm sorry?\n\nBEECHER:  A lot of archaeologists, like, they totally get frumpy.  I'm not saying they're not absolutely brilliant, but, like, in middle age, they let \nthemselves go.  Like Professor Thayer.  I'm sure he was cute when he was younger.  Like, you can tell, with his eyes and everything; he was cute.  But he's \nall fat now.\n\nTIM:  And Dr. Cardinale?\n\nBEECHER:  I mean, I wish she was my mom.  She's totally smart, and, like, though she can get all dirty with a trowel and brush, you could totally see her \nin an evening gown going to the opera or something.  She's been on that show \"Mysteries of the Ancients\" for, like, a couple years now.  Totally famous.\n\nTIM:  Did you socialize with her at all?  \n\nBEECHER:  Absolutely.  We talked all the time.\n\n[Duration of silence.]\n\nTIM:  Ms. Beecher.  Can you tell us what you talked about?\n\nBEECHER:  Oh.  Sure. Like, my boyfriend Philip mostly.  He was here in Arkham when I was down in Costaguana, but, like, I had this international plan, so \nwe were texting each other all the time.  He's totally romantic, but he kept asking me to sext.  I know, right?  But--\n\nTIM:  --Did Dr. Cardinale say anything about herself?\n\nBEECHER:  No.  Not really.\n\nTIM:  Anything you can remember would be helpful.\n\nBEECHER:  Like, she said how she used to write letters to an ex-boyfriend.  I thought that was weird because, like, \"email.\"  Hello.\n\nTIM:  Internet access in Sulaco was pretty limited until a few years ago.\n\nBEECHER:  Oh.  I didn't know that.\n\nTIM:  Did she say who the ex-boyfriend was?  Did she say what she told him?\n\nBEECHER:  Umm...  Well...  No.  I don't think so.  Why are you asking about Dr. Cardinale?  She isn't missing, too, is she?\n\nQUERY SERA:\n*choice\n\t#where is Isabel Cardinale\n\t\t*goto_scene Sloane_interview\n\t#Isabel letters\n\t\t*goto_scene foreplay", "man_in_black": "*gosub_scene adcheck\n*label man_in_black\nfrom the journal of Dr. Thayer, L., PhD.\n\n28 January 1988\n\nThe strangest man visited Dr. Lenz today.  Dressed in a cheap, black suit, he said he was a police detective who was investigating \nthe murder of an American missionary.  The woman had been staying with her family in a nearby village.  It's tragic about the woman, \nbut I don't think this man was a policeman - at least not someone local.  His complexion had a sickly, white pallor, and though he \nspoke English with an accent, it was not Costaguanan.  I couldn't identify his accent at all.  Scandinavian, maybe?\n\nThe man asked us a lot about our personnel, as if one of the local Emage we have working on the site might be involved in this \nmissionary's death.  But then he proceeded to ask about the excavation itself.  What areas we were digging in?  How big do we think \nthe site could be?  One could chalk it up to curiosity, but it didn't seem right;  the man was overeager.  \n*page_break\nAfter he left, I told Dr. Lenz of my suspicions, but he brushed me off.  He said men in black suits were never as threatening as they \nfirst appear to be.  But I later overheard him telling someone over the phone about our visitor.  He mentioned the name \"Wellingham.\"  \nWhat is Lenz hiding from me? Is there some secret about this excavation site that I am not privy to?\n\nIsabel thinks this man in black has something to do with the \"psychic phenomenon\" in the area, as if he were a government agent investigating \nall things paranormal.  The lovely girl watches too much television.  I did not mention Lenz's phone call to her because I didn't want to see where the \ninformation would take her imagination.  But I did notice she had a book titled GIANTS AMONG MEN by Janice Wellingham in her tent.  Is there \na connection to the \"Wellingham\" Lenz mentioned on the phone?\n\nQUERY SERA:\n*choice\n\t#Investigations into psychic phenomenon\n\t\t*goto_scene duende\n\t#secret of the Eastern City\n\t\t*goto_scene rats_run\n\t#Was Dr. Lenz religious?\n\t\t*goto_scene human_mistake\n", "marry_isabel": "*gosub_scene adcheck\n*label marry_Isabel\nletter from Dr. Thayer, L., PhD. to Miner, H.\n\n24 January 1993\n\nHarry,\n\nHappy New Year!  It's great to hear from you after so many years.  I can imagine you being the bar of a pub in Edinburgh, the odd American accent \ntaking drink orders among a crowd of Scottish voices.  It sounds like you're having a great time.  I'm happy for you.\n\nAs you can tell, I'm still in Costaguana, working for Dr. Lenz.  I'm a professor at Miskatonic now, too, grading papers and everything.  I hadn't \ncounted on staying with this project for so long, but it can get under your skin.  The so-called \"psychic phenomenon\" are having a bit of a personal \ntoll on me, mainly because of who I'm dating.\n*page_break\nI'm in a relationship with Isabel now.  She hasn't stopped working on the excavation either.  I admit, I was taken with her ever since I first met her.  \nYou just had the courage to ask her out first.\n\nThis thing between her and me, it's nothing casual, and I'm honestly thinking of asking her to marry me.  I know things ended badly between the two of you, \nand I can't help feeling a bit guilty that my love for Isabel might cause you pain.  She's still as strong-willed as ever, and I half welcome and half \ndread a future caught between a woman with her temperament and the stubborn temperament of my mother.\n*page_break\nI hope the years have eased the pain of how your relationship with Isabel ended.  I never knew how or why your relationship ended.  She says it's because \nyou thought she was a \"honey trap,\" a spy sent to seduce you.  You never mentioned that to me, and though I can't believe her, I can't tell her she's \nwrong unless you explain it to me.  Did you call her a \"honey trap\"?  What did you think she was trying to gain from you?\n\nHarry, I'll always be your friend.  I am truly happy that you feel like you've found a place where you belong.  So have I, and it's with Isabel.\n\nBest,\nLucius\n\nQUERY SERA:\n*choice\n\t#Isabel, psychic phenomenon\n\t\t*goto_scene Isabel_friend\n\t#Isabel, honey trap\n\t\t*goto_scene Isabel_swallow\n\t#first meeting with Isabel\n\t\t*goto_scene meeting_Isabel\n\n\n\n", "maze_portal": "*gosub_scene adcheck\n*label maze_portal\nFrom the journal of Dr. Thayer, L. PhD.\n\n2014\n\nWhat if Xinnabala, the Cave of Fear, is not a cave at all?  The Emage legend says that El Viejo asked that every year the \ntribe must send a person down the River of the Dead to Xinnabala.  In the cave lived the first people, giants who had found \ndisfavor with El Viejo.  The giants would eat the traveler whom the tribe had sent, and thus sated, the giants would stay in \nXinnabala and not return to the land of men to eat everyone here.\n\nAll our evidence indicates that the River of the Dead is supposed to begin at the Eastern City.  No archaeologist working on \nthe site has ever considered that there was possibly a real river here.  The name of the area has been staring me in the face \nfor decades:  the Northwest Gulley.\n*page_break\nI have never seen water running through this gulley, but surely when it rains, water must come gushing through there.  Before he died, Dr. Lenz \nsaid that's what happened to the site before, all those years ago; when we first excavated the site, mud from a storm buried it \nall over again. \n\nThe next question would be, what is Xinnabala?  The writings of Padre Ferdinand Ganza, that Jesuit that the Wellingham Foundation uncovered, \nspoke of a path to a supernatural world.  He was dismissed as a raving madman, but the Saint of Darkness also spoke of visions of another world, \none with giants and a sky that was purple or something.\n\nI believe that Xinnabala is this Other World.  And I think that if we excavate the Northwest Gulley, the location for the \"gate\" to the River of the \nDead, we will discover some means, some kind of portal, to pass through to the Other World.\n\nQUERY SERA:\n*choice\n\t#Saint of Darkness, portal\n\t\t*goto_scene Saint_mad\n\t#Padre Ferdinand Ganza\n\t\t*goto_scene S
