0\n\t\t\t\tLooking around, you see plenty of jobs to be done. You're painfully aware that the appearance of chaos could still cause a major dive in profits, so you go to the main entrance and then turn back, trying to see the farm as if you've never seen it before. The wide stretch of semi-sheltered water is filthy with debris, but most of that will simply sink over time. The main observation deck stretches out in a grand hexagon, linking you to the offices, breeding pods, restaurant, and then the very edge of Kota, where the storage sheds bob gently with the greater currents beyond. The main feeding area is front and center, and beneath the water is all the major tek of the farm, monitoring the sharks' health and breeding and also scanning for unfamiliar visitors.\n\n\t\t\t\tThe restaurant, which usually looks like a magnificent, rotund bird overlooking the water, looks like a fragile bubble. It's photogenic, in a tragic way. You go to it at once to gather rogue seaweed from the steps and restore the outer layer of Glass to its usual shininess.\n\t\t\t\t*goto afternoon\n\t\t\t#Go see the supervisor on deck and ask what should be done.\t\n\t\t\t\t*set flexibility %+10\n\t\t\t\tKadek Siti is still the supervisor on deck, and she looks flustered with the number of people asking her for instructions, advice, and interviews. You stride up with your most confident air and select the seven people who are causing the most confusion. They turn to you eagerly, sure that the bosses' kid won't be doing anything too arduous and will know exactly what's going on.\n\n\t\t\t\t\"This way,\" you say and lead them to the restaurant, which is still closed although it's intact. \"Anyone hungry?\"\n\n\t\t\t\t\"Yes?\" someone says timidly.\n\n\t\t\t\t\"Then let's get these stairs clean and clear the dust from the Glass.\"\n\n\t\t\t\tSeveral faces fall at that, but you ignore them and turn to vigorous scrubbing. The staff members fall into line soon enough, discovering that anyone who stands idle is given another task to do.\n\t\t\t\t*goto afternoon\n\t#\"I'm feeling protective of the farm.\"\n\t\t*set empathy %-10\n\t\t\"Cute,\" they say, and it doesn't even sound sarcastic. Nor does it sound sarcastic when they thank you for saving several lives and the farm itself.\n\n\t\tYou never thought being a hero would feel so awkward. Luckily, everyone has seen you around every day for years, so any gloss that might have surrounded you is rubbing away fast.\n\t\t*goto busy\n*label afternoon\n\nThe morning is suddenly midafternoon, and your body is starting to ache with all the delayed stress of the previous day. It's time for a real break and some real food. You're just stretching out for a nice block of doing absolutely nothing when you get a ping from your dad.\n*fake_choice\n\t#\"Dad, I really need to relax now.\"\n\t\t*set curiosity %-10\n\t#\"Are you okay, Dad?\"\n\t\t*set empathy %+10\n\t#\"What's happening?\"\n\t\t*set flexibility %+10\n\"I'm sorry to call you in,\" he says. \"We really need you at the farm.\"\n\n\"What for?\"\n\n\"Press, I'm afraid. You shouldn't have to say anything if you don't want to; just show up and look unruffled.\"\n\n\"I understand the drill, Dad. See you soon.\"\n*fake_choice\n\t#Use my all-purpose legs. They're great tek and worth showing off.\n\t\t*set empathy %-10\n\t\t*set legs 3\n\t#Use my cosmetic legs. I don't want to draw any attention.\n\t\t*set curiosity %-10\n\t\t*set legs 1\n\t#Take my tail. It's not practical today, but it'll distract the press from the bomb.\n\t\t*set flexibility %+10\n\t\t*set legs 4\n\nYou wash your hair and dress neatly before heading off. It's hard not to think your choice of shirt is vitally important. All of Kota will be judging you. You'd prefer to travel the underwater line, but unfortunately now is not the time to risk your hair. Or the farm. Which today is the same thing.\n\nWhen you arrive at the farm, \n*if temp > 1\n\tthere is already a new observation deck in place, slick with newness. \n\t*goto mom\n*else\n\trestaurant staff are serving canapés and drinks.\n*label mom\n\nMom and Dad have spared no expense. You stifle a sigh, knowing that Dad will balance the budget by being stingy at home. But Dad and Mom have often debated over the need to keep costs down versus the need to appear wealthy. You're familiar with having to pretend money is no object. The canapés look delicious, but you're well aware they're not intended for your benefit.\n\nA low stage has been set up beside the water, which is much cleaner now than it was this morning. \n\nYour parents are speaking quietly at one side of the stage, so you go and join them. The three of you spend a few moments agreeing on the answers to likely questions—about repairs, about injuries, and about vegetarians and whom to blame—before walking up the ramp and taking your places, ready for the official press conference to begin.\n\nDad calmly responds to questions about staff safety and points out the tired but necessary fact that he does not hold vegetarians to blame for the actions of a radical few. When asked about his own injuries, he holds up a hand with a single Band-Aid on one finger. The reporters laugh politely, and you know it's going well. Dad is just boring enough to make sure the shark farm attack doesn't attract any more press.\n\nBut then a reporter makes it clear they want something more. They specify that they want Lili to answer, then ask if the farm is likely to survive given the recent odd behavior of the sharks and the possibility of further attacks.\n\n\"My farm is doing very well indeed!\" Mom spits. \"When the time comes, I'll pass my life's work on to my only child.\" She turns to you. \"Tell them!\"\n*choice\n\t#I avoid the question. She should know I'm not the type to make a decision so soon. \n\t\t*set value_farm %-10\n\t\t*if flexibility > 60\n\t\t\t*set connections %+10\n\t\t\t\"The skills I've learned here are useful for any number of careers.\"\n\n\t\t\tMom misses the subtext altogether, as usual—but Dad realizes what you just said. He stares at you while you keep your eyes on the crowd. Ahmed is there, and he gives you a careful nod. He understood you perfectly. He might even be interested in hiring you.\n\t\t\t*goto end\n\t\t*else\n\t\t\t*set connections %-10\n\t\t\t*set value_farm %-10\n\t\t\tYou scramble for something noncommittal to say, but your whole brain is screaming at you to run away. All you come up with is a desperate mumble. Everyone stares at you: Reporters. Crowd. Mom. Dad. Cameras. You can even see Ahmed standing among the tourists, wincing and shaking his head. You meant to keep your options open, but it looks like you've just burned several bridges at once.\n\t\t\t*goto end\n\t#Mom is so upset that I lie and reassure the frightened crowd that the shark farm will soon be mine.\n\t\t*set temp_four 2\n\t\t*set value_farm %-10\n\t\t*if empathy > 60\n\t\t\t*set connections %+10\n\t\t\tThe key to lying is to believe what you're saying, so you take a moment to imagine running the shark farm yourself. No more rubbish runs and lots more time in the water. \"I look forward to taking over,\" you say with genuine if temporary enthusiasm. \"This place supplies thirty percent of the food in Kota…and one hundred percent of the good food.\"\n\t\t\t*goto end\n\t\t*else\n\t\t\t*set connections %-10\n\t\t\tYou try your best to sound like you really want to stay at the farm, but your own future is calling. \"I definitely want to work here. Until the end. I mean, forever. The farm will be here forever, and so will I. Until I die.\"\n\n\t\t\tThere is a horrified silence, and it's all too obvious that you utterly failed to pull that off.\n\t\t\t*goto end\n\t#I tell the truth: I love the shark farm and plan to take it over when I'm of age. Dull but currently helpful.\n\t\t*set temp_four 1\n\t\t*set value_farm %+20\n\t\t*set reputation %+10\n\t\tTelling the truth is easy, but you still take a moment to center yourself before answering. \"I look forward to taking over my farm,\" you say. \"We supply thirty percent of the food in Kota…and one hundred percent of the good food.\"\n\t\t*comment achieve job\n\t\t*goto end\n\t#\"Actually, Mom, I hate the farm and will leave it as soon as possible.\"\n\t\t*set temp_four 5\n\t\t*set value_farm %-20\n\t\t*set connections %-10\n\t\t*set reputation %-10\n\t\tThere is an audible intake of breath, and Dad takes half a step forward as if he's tempted to shove you into the water.\n\n\t\tWell, that's that. You've burned your bridges and burned the farm in such a spectacular fashion that anyone who looks up information on you or the farm will see this video.\n*label end\n\nYour skin is buzzing from the stress of the moment, and the rest of the press conference passes you by. Hopefully no one can tell you've mentally checked out. When it's done, you know what you're meant to do: stick around, nod and smile, and resist the urge to eat too many of those delicious canapés.\n\nOnce you've circled the metaphorical sphere a couple of times, you're free to go, and you head home to take off your legs and wait until Mom and Dad can escape. It'll be a while.\n\nWhen they come home, \n*if temp_four = 1\n\t*set net_worth +350\n\tthey're glowing with triumph. They even bring some leftover food for you, and not just to save a few Glass dollars by not having to make dinner. It's like a party. The best part is that they decide to start paying you. A little.\n\n\tYou just hope that this is the last time the farm is in such danger. It's your life, and you don't want it destroyed.\n\t*finish Chapter Eight\n*if temp_four = 2\n\tyou can see from Dad's face that he knows you were lying. Mom, not so much. But your time of peaceful coexistence is running out. Time to find your path…whatever it is.\n\t*finish Chapter Eight\n*else\n\tDad is very quiet, and you can tell he wants to get Mom alone to talk about you. You pick at your food and wait, and sure enough, they both come out and sit you down for a capital-T Talk.\n\n\t\"What can you possibly hope to do, if you're not working for us?\" Mom bursts out.\n\n\t\"I don't know yet.\"\n\n\t\"Fine,\" she says. \"You can work for us until you realize how lucky you are.\"\n\n\t\"Until you're sure what you want to do,\" says Dad carefully.\n\n\t\"May I be excused?\" you say miserably.\n\n\t\"You might as well,\" says Mom.\n\n\tYou slink away like a disgraced puppy. That could have gone better.\n\t*finish Chapter Eight\n", "chapter_six": "*set somethings_coming 5\n*if facts > 0\n\tIt's hard to believe there's something deeply wrong beneath the ocean when life feels so ordinary. Sharks are fed and bred; teachers are annoyed at you; Kassie is…Kassie.\n\t*goto yunus\n*else\n*label yunus\n\n*if Yunus_love = true\n\tYou have a boyfriend. He fills your thoughts and your dreams, and you meet him whenever you can. Old Sydney becomes familiar, and Yunus grows more used to the sun, although he still trembles if there are clouds. He's not ready to come home to Kota, and you can't go to New Sydney without his parents' permission. Sometimes it feels like you've made him up. But he's real, and warm, and funny. And he's yours.\n\t*goto begin\n\n*if kassie_love > 0\n\tSomething has changed between you and Kassie, and it's not just her obsession with mind implants. Her eyes linger on you, especially when you part ways. She uses tapping way more often than before, her fingers caressing you in a tender form of speech that sends shivers up your spine. You feel her eyes on you even when you're not looking at her. She's always fully dressed when she pings you instead of being in her swimmers or pajamas. \n\t*goto begin\n\n*else\n*label begin\n\nYou're in your room, trying to stay awake long enough to update the breeding charts for the farm, when someone taps on your undersea hatch. At first you assume it's Kassie, but your sphere's ID strip lights up in green. You can't even remember who that is, so you tap on the Glass, turning it one-way transparent to let you see who's there before deciding whether to answer.\n\nIt's Folami.\n*fake_choice\n\t#Stay quiet. Perhaps she'll go away.\n\t\t*set flexibility %-10\n\t\tShe doesn't go away. It's impossible to concentrate on which sharks are committing incest when she keeps on tapping away. Eventually, you let her in.\n\n\t#Let her in at once.\n\t\t*set empathy %+10\n\t#Change into something less comfortable and then let her in.\n\t\t*set empathy %-10\n\t#Ask what she wants.\n\t\t*set curiosity %-10\n\t\t\"What's up?\" you tap to Folami.\n\n\t\t\"Let me in,\" she taps back. \"It's private.\"\n\n\t\tOh good. Some drama you'd managed to miss until now.\n\nIt's immediately obvious that she's on the verge of tears. She's sopping wet, showing that she used the undersea paths without a speeder. Usually Folami does her best to fade into the background. You can't remember the last time she asked you for anything more complicated than a spare pen. Although you do both have trauma relating to giant squids in your recent history.\n\n\"Alive is live,\" she says.\n\n\"Uh…what?\"\n\n\"You don't know about Alive?\" She looks like she's about to bolt.\n\n\"Slow down, please,\" you say. \"What are you telling me? Start from the beginning.\"\n\nShe glances from side to side as if she's expecting a new round of giant squids to leap through the walls at any moment. \"Alive is a…fringe group. They're determined to stop shark farming once and for all. By any means.\"\n\nYou've heard some chatter about that kind of thing, but clearly Folami thinks it's a real threat. \"Which means, specifically?\"\n\n\"I don't know. All I know is that people are tapping, 'Alive is live,' today and I know it's bad. You need to tell your parents to evacuate the farm.\"\n*fake_choice\n\t#\"I need more detail than that.\"\n\t\t*set curiosity %+10\n\t#\"How do I know your mom didn't send you to cause trouble for us?\"\n\t\t*set empathy %-10\n\t#\"We can't just evacuate the farm.\"\n\t\t*set flexibility %-10\n\t#\"I don't even like the farm.\"\n\t\t*set empathy %-10\n\t\tYou hate the farm, but you hesitate. It's a horrid place filled with horrid people, but you don't want anyone to die.\n\nFolami groans in annoyance, shoving back her wet hair. \"Do you even know how much I risked coming here?\"\n\n\"Evacuating the farm is serious,\" you say as gently as possible. \"It hampers business for weeks afterwards—months, if someone reports it to our trading partners. Your mother, for example.\"\n\n\"Mom's fists are a lot scarier than her words,\" Folami shoots back—then snaps her mouth shut as if she's said too much.\n\nYou blink, remembering bruises on her arms and face that always made her blush and say how uncoordinated she is. Surely Kustiani wouldn't hit her own daughter? \n*if self_experimentation = true\n\tYour mind lurches into a new pattern, and Folami's quiet nature is suddenly lit in a whole new way.\n\n\tIt's the implants. They're telling you the truth about Folami's life. The certainty is terrifying.\n\t*goto call\n*else\n\n\tExcept, clearly, she would.\n*label call\n\n\"I'll call the farm myself,\" she spits out.\n\n\"Wait,\" you say. \"I believe you, but my parents won't. Is there anything you can show me—anything that will give us more information about what Alive is going to do?\"\n\nHer eyes glaze over in thought, and the only sound is the dripping of her clothes onto the grate beneath her feet. Then she looks up.\n\n\"Come with me—quickly.\"\n*fake_choice\n\t#Follow her lead and get straight into the water.\n\t\t*set flexibility %+10\n\t\t*set temp 0\n\t#Put on my tail first. It'll help with speed.\n\t\t*set curiosity %-10\n\t\t*set temp 1\n\t#Take a mini speeder.\n\t\t*set empathy %-10\n\t\t*set temp 2\n\nOnce you're out of your room, Folami grabs your wrist and activates your portable map. Her own is deactivated, presumably because it'd be linked to her mom. She's either lost her mind or she's absolutely right to be afraid. Your mind is still reeling with the knowledge that her mom has been violent toward her for years, and you never noticed.\n\nShe taps in a long string of coordinates, and then you both shoot off, following the transport lines under the city. It's not a short journey, and you travel at nauseating speeds, unable to focus on any of the usual underwater landmarks. Your stomach protests, but you've traveled at speed before, and you're able to center yourself enough to avoid throwing up. \n*if temp \u003c 2\n\tYou can't even tap to one another. Your hair swooshes away from your face, and you know it'll be a nightmare to comb later. \n\t*goto there\n*else\n*label there\n\nAt last you arrive at Folami's chosen location, and your automated journey slams you to a halt. Folami grips your arm to get your attention and points directly upward. Then she clips herself to the lines solo and shoots away, elegantly passing the Glass dollar to you. Super helpful.\n\nThe lights under the sphere indicate that it's empty but habitable. Which is interesting since you're in a long-abandoned tendril of the city and none of the nearby spheres are operational. \n*if temp = 2\n\tYou lower the speeder a little in case someone looks down. It's a fair bet that if something shady is happening above you, they'll have the Glass set to one-way visibility.\n\t*goto listen\n*else\n\tYou swim over to one of the neighboring spheres and climb inside, glad to have an ample supply of breathable air.\n*label listen\n\nSecurity is tricky. Too much security draws unwanted attention. You're betting these people relied on their location to protect them—and the bet pays off. You're able to hack into their audio and listen to what they're saying.\n\nYou recognize Kustiani's voice at once but not the voices of the other three people she's speaking to. For a long time, the radical vegetarians discuss how to react when news of Alive's actions hits the networks. One of them has volunteered to take the fall and claim to have perpetrated the attack solo.\n\nThe way they're saying \"attack\" makes you think Folami was right to panic, but there's so much backslapping and rhetoric it's impossible to be sure. \n*choice\n\t#Keep listening.\n\t\t*if flexibility \u003c 40\n\t\t\t*set value_farm %+10\n\t\t\t*set temp_two 1\n\t\t\tIt's not easy to sort out the voices, especially since they keep going over and over the same information. But you know how to be patient when you have to be, so you wait and continue listening. At last your efforts bear fruit: Kustiani specifically thanks Hiram—one of the other voices you don't know—for his work on the explosive device.\n\n\t\t\tExplosive device.\n\n\t\t\tThey're going to bomb the shark farm. You need to go and stop it. Now.\n\t\t\t*goto next_bit\n\t\t*else\n\t\t\t*set folami %-10\n\t\t\tIt's impossible to sort out the voices, and you know time is of the essence. You find it impossible to focus on the increasingly obscure conversation above you, so you decide to head to the shark farm immediately.\n\n\t\t\tOn the way, you ping Folami to say you don't know what kind of attack is coming. She sends you back just one word: \"Bomb.\"\n\t\t\t*goto next_bit\n\t#Try to get a look inside.\n\t\t*if curiosity > 60\n\t\t\t*set value_farm %+10\n\t\t\t*set temp_two 1\n\t\t\tIt's a risky move, but those happen to be your forte. One upside of having significantly less than the usual number of legs is that your silhouette can be altered to look like a sea creature. You know the vegetarians are facing a screen on the east side of their sphere, but better safe than sorry. You adjust your clothes and hair to change your shape and begin climbing the ladder on the sphere's west side. \n\t\t\t*if temp = 1\n\t\t\t\tYou keep your tail on. \n\t\t\t\t*goto prerun\n\t\t\t*else\n\t\t\t*label prerun\n\n\t\t\tOnce you're high enough, you can access the upper emergency hatch and see exactly what's happening. The first thing you see is Kustiani and her compatriots. The second thing you see is a detonator.\n\n\t\t\tThey're going to bomb the shark farm. Time to get moving.\n\t\t\t*goto next_bit\n\t\t*else\n\t\t\t*set folami %-10\n\t\t\tYou've figured out that the vegetarians are facing a screen on the east side of the sphere, and there is an emergency ladder on the west side—but you're so afraid of being seen that your hands are shaking, and you fall off the ladder into the water.\n\n\t\t\tIt's no use staying here. As you leave, you ping Folami to say you don't know what kind of attack is coming. She sends you back just one word: \"Bomb.\"\n\t\t\t*goto next_bit\n\t#See if I can loop Dad into the audio with me.\n\t\tThe easy part is patching in Dad's computer. The hard part is convincing him to listen. He's in a meeting with several local traders, and your interruption could cost him.\n\n\t\t*if empathy > 60\n\t\t\t*set value_farm %+10\n\t\t\t*set temp_two 1\n\t\t\tYou have to get rid of the other traders without hampering Dad's work. \"Dad, I have an emergency message from New Sydney.\"\n\n\t\t\tHe's not fully convinced, but the other traders graciously arrange a new time to meet and then leave.\n\n\t\t\t\"I lied,\" you say without preamble. \"You're actually about to be attacked by Alive. I'm patching you in to their conversation now.\"\n\n\t\t\tDad makes an unhappy noise, but he listens. You both hear Kustiani thanking one of the others for his work on \"the explosive device.\"\n\n\t\t\tYou hear Dad suck in his breath, and you know you've done the right thing. You also know you need to get away before you're discovered.\n\t\t\t*goto next_bit\n\t\t*else\n\t\t\t*set folami %-10\n\t\t\t\"We need to talk, Dad. It's important.\"\n\n\t\t\t\"Absolutely,\" he says, using the tight voice that tells you you're in trouble. \"Talk to you in an hour.\"\n\n\t\t\t\"No, Dad—\" you say, but he's already blocked you.\n\n\t\t\tSo much for that. You may have to convince him face-to-face. Either way, it's time to get moving.\n\n\t\t\tOn the way, you ping Folami to say you don't know what kind of attack is coming. She sends you back just one word: \"Bomb.\"\n*label next_bit\n\nIt's vital that you travel as quickly as possible. \n*if temp = 2\n\tYour speeder is too little to outrun anyone or anything.\n\t*goto hub\n*else\n*label hub\nYou head straight for the nearest transport hub, where you can get a decent-sized speeder and use one of the arterial lines to get to the farm before the Alive crew.\n\nBut your luck has run out. Kustiani herself is pacing you above the water. You've been spotted.\n*fake_choice\n\t#Faster is better. Speed is paramount now.\n\t\t*set flexibility %-10\n\t\t*if temp = 2\n\t\t\tYou turn the speeder to maximum, and the engine noise takes on a high-pitched tone that indicates you won't be able to maintain this speed for long. Sure enough, five minutes later, the engine conks out and you're left drifting. You set the speeder to summon repairs and swim on without it.\n\t\t\t*set temp 0\n\t\t\t*goto hiya\n\t\t*else\n\t\t\tYou adjust the emergency-line settings and rocket through the water. It's hard to get breaths, and you didn't have time to prepare your lungs for a long period underwater.\n\t\t*label hiya\n\t#Go deeper. Hopefully she doesn't know who I am.\n\t\t*set curiosity %-10\n\t\tYou unclip from the line and head down, trusting in the ocean to hide you. It costs you time, and you can't see where Kustiani is. Once you're fairly sure you've lost her, you head back up hurriedly, hoping you're not too late.\n\t#Adjust course to try and throw her off.\n\t\t*set flexibility %+10\n\t\tUnclipping from the line, you head off at a right angle, flying blind in the water as you aim for the next arm of Kota. You find it soon enough and clip onto the line there as quickly as you can. It's impossible to know if you're gotten rid of your shadow or not.\n\nBut you're not far from a decent-sized hub now, and you seem to have drawn ahead for the moment. You aim straight for the hub and hope Kustiani has lost interest.\n\nOh no. She's waiting for you.\n*choice\n\t#Face her. What's she going to do to me?\n\t\t*if curiosity > 60\n\t\t\tIf there's anything you can do, it's jump right into a dangerous situation and deal with whatever happens. You enter through the closest hatch and smile calmly as Kustiani's face passes from rage through recognition and to confusion. \n\n\t\t\tThat works. You continue smiling as you walk past, entering an express speeder heading for the farm.\n\n\t\t\tAs the doors close, Kustiani's confusion wears off, and the rage is back. But you're already inside.\n\t\t\t*goto speeder\n\t\t*else\n\t\t\tYou open the closest hatch with your best innocent expression, but it wilts immediately at the fury on Kustiani's face. She recognizes you, and she knows you're her eavesdropper. \n\n\t\t\tShe's going to hurt you.\n\t\t\t*goto run\n\t#Go around the hub.\n\t\t*if flexibility > 60\n\t\t\tIt's tricky to move freely around the outside of a hub, where there are dozens of prescribed lines of speeder travel that are all busy. Everyone knows their place, and drivers know that no one is stupid enough to get in their way. Except, possibly, you.\n\n\t\t\tLuckily you're good at improvisation, so you can duck and weave around the busy traffic without causing a collision. You enter the hub from the opposite side and hop into an express. But Kustiani spots you just as the doors close.\n\t\t\t*goto speeder\n\t\t*else\n\t\t\tYou carefully observe the main routes of travel away from the hub and prepare to dart between speeders under the water. Unfortunately, spontaneity isn't your forte. You push yourself out into the water a moment too late and get tossed over and over by a speeder's wake. \n\n\t\t\tYou're free hanging in the water, barely able to suppress the instinct to gasp, and you clearly see Kustiani looking right at you through the Glass.\n\t\t\t*goto run\n\t#Hang back and hope she loses interest.\n\t\t*if curiosity \u003c 40\n\t\t\tAs always, you'd grabbed a mini canister of backup air just in case. You hang suspended in the water, far enough back that you'll be nothing but a blur to anyone looking out. But you can still see if Kustiani moves inside.\n\n\t\t\tIt takes forever, but she finally turns and walks away. You move closer bit by bit, but in any case, the hub is crowded and you've lost her. Hopefully she's gone home. It's not worth starving your oxygen for no reason, so you step inside and walk as casually as possible over to the express speeder that's heading your way. You breathe a sigh of relief as the doors close—but then you see Kustiani outside. Her eyes sharpen as she spots you.\n\t\t\t*goto speeder\n\t\t*else\n\t\t\tKeeping as still as possible so you don't draw her eye, you watch Kustiani's face cycle through impatience, rage, worry, and frustration. Given what you've just learned about her, there's a savage satisfaction to it.\n\n\t\t\tUntil she suddenly steps closer to the Glass, cupping her hands around her eyes so she can see more clearly. You're toast.\n\t\t\t*goto run\n*label speeder\n\nKustiani slams her fists on the hatch, but she's too late. A moment later, you're on your way—but you know there will be another express just behind you and Kustiani is fully aware you're heading straight for the farm. For the moment, neither of you can go any faster, but you both know you'll be facing one another at the next hub. There's no time to involve the police; the bomb is already on its way, but it's unlikely they'd believe your word.\n*label go_away\n*choice\n\t#Call Kassie for advice.\n\t\t*set kassandra %+10\n\t\tShe answers right away. It's almost as if she were waiting for your call. \n\n\t\t\"Kass, I'm in trouble,\" you sign, keeping your movements tight so no one eavesdrops on your conversation. \"Folami's mom is…she's chasing me. I think she's going to hurt me. And I know it sounds like I'm making this up, but she's with a group of vegetarian radicals that are attacking the shark farm. Today. Now.\"\n\n\t\t\"Where are you?\" she signs back. \"And where's Kustiani right now?\"\n\n\t\tYou tell her everything and realize as you're talking that she knows Kustiani has been hurting Folami. How long has she known? How is it possible that you didn't know until now?\n\n\t\tKassie is tapping your name on her screen. You must have zoned out.\n\n\t\t\"Go in the opposite direction,\" she signs. \"I'll take care of the farm.\"\n\t\t*goto away\n\t#Call Dad for help.\n\t\t*set sunny %+10\n\t\t*set temp_five 1\n\t\tDad takes a long time to answer, but when he does, you can see his office is empty. \"I'm listening,\" he says, and you can see he means it.\n\n\t\tYou tell him everything, beginning with the moment Folami came to your section of your home sphere—and finishing with the fact that Kustiani is most likely in the express speeder coming in right after yours.\n\n\t\t\"She's really chasing you?\" he says, sounding more alarmed for you than for the entire farm. \"Right now?\"\n\n\t\tYou can't see her, but you remember that glimpse of her face. \"Yes.\"\n\n\t\t\"Get away,\" he orders. \"Jump in the first express you see. Go anywhere. Just not here.\"\n\n\t\t\"But Dad—\"\n\n\t\t\"The farther away you are, the happier I'll be. Don't come back today. I'll take care of the farm.\"\n\t\t*goto away\n\t#Call Diah to get evacuations started.\n\t\t*set diah %+10\n\t\tDiah doesn't answer right away. You know she's at the farm doing her work experience, so of course she's being a model employee and keeping her wrist com on silent. Which is incredibly unhelpful right now. You set the tone to urgent and try again, and she finally answers.\n\n\t\t\"I told your mom I need the bathroom,\" she whispers. \"What's up?\"\n\n\t\tYou tell her everything and watch as she goes very still. \"I need to tell your mom right away!\"\n\n\t\t\"She won't believe you. I'm sorry, Diah, but you need to start the evacuation process by yourself.\"\n\n\t\tShe swallows hard. \"I'll do what has to be done. One condition: you take the first express you find in the opposite direction to Kustiani.\"\n\n\t\t\"Deal.\"\n\t\t*goto away\n*label run\n*set temp_four +1\n*set temp_three + 1\nKustiani comes at you like an arrow, and you jerk backward in the water, flailing in a panic as you try to swim without turning around. \n*if temp = 1\n\tYour one advantage is your tail. You can outswim her.\n\t*goto running\n*else\n*label running\n\nYou turn and stroke through the water, not even aiming for any direction except \"away.\" \n*if self_experimentation = true\n\tYou can actually feel her rage tightening your chest and fists. It's terrifying to feel it coming from both outside and inside you.\n\t*goto still_running\n*else\n*label still_running\n*choice\n\t#Face her. She won't stop until I do.\n\t\tYou turn toward Kustiani, still hoping a glimpse of your frightened face will be enough to stop her. \n\n\t\tIt isn't.\n\t\t*label k_fight\n\n\t\tKustiani grabs you by the collar of your shirt, pulls you close, and headbutts you. If you weren't underwater, she would have broken your nose. You grapple together as you rise into a pocket of moldy air between spheres, where you both make the mistake of gasping and then coughing at the stink. She recovers first and slams your head against the Glass.\n\t\t\n\t\tYou try to keep hold of her, but your fingers go slack despite your best efforts. There are dozens of little sparkles in the air, just like in a cartoon except that it really hurts.\n\n\t\t\"I'm watching you,\" she snarls, banging your head against the unyielding Glass a second time before swimming away.\n\t\t*goto gone\n\t#Film her. Whatever happens to me, Kustiani will be destroyed by the media.\n\t\tYou tap the command to film into the sensor on your wrist and move to twist your arm so that your face and Kustiani's are both clearly shown. But that small movement is enough to let her catch up to you, and she's smart enough and fast enough to slap your wrist and turn the camera off.\n\t\t*goto k_fight\n\t#Swim deeper. I'm younger and my lungs are better suited to long dives.\n\t\tDown. Down is where the monsters live, and you hope there are big enough monsters to scare Kustiani away. Your lungs are already unhappy, but not as unhappy as they could be. So you go down, into the dark.\n\t\t*if temp = 1\n\t\t\t\n\t\t\tYour tail always makes you feel like you belong in the water, and today is no exception. With a few quick flips, you circle below Kustiani and back up underneath the hub. There's an express heading your way, so you come up beneath it and get aboard just in time. As the hatch closes, however, you see Kustiani beneath you, swimming furiously upward.\n\t\t\t*goto speeder\n\t\t*else\n\n\t\t\tThen something crashes into you, and you twist around by instinct.\n\t\t\t*goto k_fight\n*label gone\n*choice\n\t#Call Kassie for advice.\n\t\t*set kassandra %+10\n\t\tShe answers right away. It's almost as if she were waiting for your call. \n\n\t\t\"Kass, I'm in trouble,\" you sign, keeping your movements tight so no one eavesdrops on your conversation. \"Folami's mom is…she hit me. And I know it sounds like I'm making this up, but she's with a group of radicals that are attacking the shark farm. Today. Now.\"\n\n\t\t\"Where are you?\" she signs back. \"Where's Kustiani right now?\"\n\n\t\tYou tell her everything and realize as you're talking that she knows Kustiani has been hurting Folami. How long has she known? How is it possible you didn't know until now?\n\n\t\tKassie is tapping your name on her screen. You must have zoned out. Hopefully it's concern for Folami rather than a concussion.\n\n\t\t\"Go in the opposite direction,\" she signs. \"I'll take care of the farm.\"\n\t\t*goto away\n\t#Call Dad for help.\n\t\t*set sunny %+10\n\t\t*set temp_five 1\n\t\tDad takes a long time to answer, but when he does, you can see his office is empty. \"I'm listening,\" he says, and you can see he means it. His eyes widen in horror as he spots the blood trickling down your face.\n\n\t\tYou tell him everything, beginning with the moment Folami came to your section of your home sphere—and finishing with the fact that Kustiani is most likely in an express speeder coming toward the shark farm right now.\n\n\t\t\"Are you sure she's not going to come back to you?\" he says, sounding more alarmed for you than for the entire farm. \"Right now?\"\n\n\t\tYou can't see her, but you feel confident she knows she's scared you badly. \"Yes.\"\n\n\t\t\"Even so, I want you far away,\" he orders. \"Jump in the first express you see. Go to hospital, or a friend's house if you're sure you're alright. Just not here.\"\n\n\t\t\"But Dad—\"\n\n\t\t\"The farther away you are, the happier I'll be. Don't come back today.\"\n\t\t*goto away\n\t#Call Diah to get evacuations started.\n\t\t*set diah %+10\n\t\tDiah doesn't answer right away. You know she's at the farm doing her work experience, so of course she's being a model employee. Which is incredibly unhelpful right now. You set the tone to urgent and try again, and she finally answers.\n\n\t\t\"I told your mom I need the bathroom,\" she whispers. Then her jaw drops, and you realize you're visibly bleeding. \"What happened to you?\"\n\n\t\tYou tell her everything and watch as she goes very still. \"I need to tell your mom right away!\"\n\n\t\t\"She won't believe you about the farm, and she might get distracted about me. I'm sorry, Diah, but you need to start the evacuation process by yourself. Once it gets started, she can't stop it.\"\n\n\t\tShe swallows hard. \"Alright. One condition: you take the first express you find in the opposite direction to Kustiani.\"\n\n\t\t\"Deal.\"\n*label away\n\nYou make your way to a lesser hub and get on board a random speeder. There's no sign of Kustiani. You calm down and clean yourself up, even spending a few Glass dollars on a lukewarm cup of tea. Still no word on what's happening at the shark farm. Surely a full evacuation would be in the news? \n\nSomething's not right.\n*choice\n\t#Get to the farm. Now.\n\t\t*label homeward\n\n\t\tIt's simple enough to take an express directly to the farm now that Kustiani is off doing…whatever evil is currently occupying her time. But you're stopped by security staff at the outer boundary. Apparently the farm is currently closed to the public due to \"scheduled cleaning.\" Well, that's something.\n\t\t\n\t\tAs soon as you prove you're a staff member, they let you continue inside, and you can see plenty of people at work. Cleaning. Huh.\n\t\t*choice\n\t\t\t#Find Mom.\n\t\t\t\t*set lili %+10\n\t\t\t\tYou automatically head for the water. Then you pause, thinking surely Mom's not swimming at a time like this. Then you realize she definitely is. Whatever threat is approaching, her first move would be to check on the sharks. Of course.\n\n\t\t\t\tSo you pause to grab a swimsuit for yourself—it's mid-afternoon, so the sharks have been fed recently enough to pose no danger to you—and then walk along the water's edge, looking for Mom's slender brown shape in the blue.\n\n\t\t\t\tThere are several people in wet suits swimming along the edge of the main platform. The farm really is just…cleaning. Everywhere. Did they already find and solve the vegetarian problem, or is the farm still in terrible danger?\n\t\t\t\t*choice\n\t\t\t\t\t#Use a tracker to find Mom faster.\n\t\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\t\tNaturally, all the emergency trackers are in Dad's office. \n\t\t\t\t\t\t*gosub climb_to_Dad\n\t\t\t\t\t\tDad's as good as any electronic tracker. \"Where's Mom?\"\n\n\t\t\t\t\t\t\"Nice to see you too,\" he says without rancor. \n\t\t\t\t\t\t*if temp_three = 1\n\t\t\t\t\t\t\tThen his eyes widen, and he's checking your head, spraying a numbing anesthetic with monitoring nanos, and muttering angrily. \n\n\t\t\t\t\t\t\t\"Seriously, Dad. Where's Mom? What's going on, anyway?\"\n\n\t\t\t\t\t\t\t*goto dad_to_mom\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t*label dad_to_mom\n\t\t\t\t\t\t\"Mom's in the water, section Deep-E, checking for vegetarians.\"\n\n\t\t\t\t\t\tYou thank him and head back down the ladder, then dive right into the water.\n\t\t\t\t\t\t*goto dive_in\n\t\t\t\t\t\t*label climb_to_Dad\n\t\t\t\t\t\tYou climb the ladder and curse the architect who agreed to build an upper sphere. \n\t\t\t\t\t\t*if temp_three = 1\n\t\t\t\t\t\t\tYour head aches, and you can feel dark bruises forming where Kustiani hurt you.\n\t\t\t\t\t\t\t*goto up\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t*label up\n\n\t\t\t\t\t\tAt last you're there.\n\n\t\t\t\t\t\t*return\n\t\t\t\t\t#Jump in the water and ask where Mom is.\n\t\t\t\t\t\tYou know where Mom will be—deep. As deep as humanly possible. Any excuse will do. \n\n\t\t\t\t\t\t*goto dive_in\n\t\t\t\t\t#Keep scanning the water until I see her.\n\t\t\t\t\t\tYou watch the staff swimming methodically back and forth, gathering various slimy messes as they go. They all look the same in their company-issue protective wet suits, and the sharks stay out of their way. Mom's not visible, which is weird. Mom is happier in the water than on land, as a rule. And wouldn't she want to stay close to her precious sharks?\n\n\t\t\t\t\t\tThen it hits you: she's gone deeper. Of course. You get your own swimmers on and dive in after her.\n\n\t\t\t\t\t\t*label dive_in\n\t\t\t\t\t\tWhen you're in the water, slicing through the world with your strong arms, you feel like you truly understand Mom for a moment. It feels strong, and silent, and perfect. You don't even need to tell the staff you're looking for her. As soon as they see you, they point the way—down.\n\n\t\t\t\t\t\tYou spot her checking along the lines of the deepest section of the farm, a depth few people her age can even reach. She grew up in Kota, but her generation was only just beginning to understand how to regulate their breathing for longer stints underwater. Your generation mastered the skill. But so did Mom.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Work alongside her.\n\t\t\t\t\t\t\t\t*label alongside\n\t\t\t\t\t\t\t\tYou tap on her arm to say that you'll check the next section along, and she nods in reply.\n\n\t\t\t\t\t\t\t\tLungs protesting, you swim hard along to the next section. You're just about to give up and return to the nearest air supply when you see something that doesn't fit. It's as big as your room, and black, and tied onto the line with rope to prevent it from sinking further.\n\n\t\t\t\t\t\t\t\tThis is it. This is the bomb. And you're right next to it.\n\t\t\t\t\t\t\t\t*set value_farm %+10\n\t\t\t\t\t\t\t\t*set temp_two 1\n\t\t\t\t\t\t\t\t*set temp 1\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#Untie it—quickly.\n\t\t\t\t\t\t\t\t\t\t*set temp_four -1\n\t\t\t\t\t\t\t\t\t\tYou tug at the ropes in a panic and then force yourself to slow down and actually look at the knots. They're not complicated, but they'll still take time to loosen. You get to work, and in a little while you notice Mom has arrived and is working with you. She even has a handy knife.\n\t\t\t\t\t\t\t\t\t\t*label untie\n\n\t\t\t\t\t\t\t\t\t\tYour sight begins to darken for lack of air, but there's no time to get more.\n\n\t\t\t\t\t\t\t\t\t\tAt last, the final knot is undone, and the sphere falls into the dark. Mom doesn't pause to watch it go. She grabs your wrist and swims hard for the surface, skipping the nearby air tanks in her haste. Your limbs are getting weak for lack of air, but you try to kick, wondering how Mom is still able to swim so quickly and why she isn't stopping to round up the sharks too.\n\n\t\t\t\t\t\t\t\t\t\tShe takes a single breath at the surface and then ducks down again to bodily shove you onto the observation platform.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t*selectable_if (athletics > 30) #Pull her out.\n\t\t\t\t\t\t\t\t\t\t\t\tYou grab her and pull with all your might, grateful for your physical strength. \n\t\t\t\t\t\t\t\t\t\t\t\t*label mom_out\n\n\t\t\t\t\t\t\t\t\t\t\t\tShe collapses onto the deck beside you, exhausted. \n\t\t\t\t\t\t\t\t\t\t\t\t*if temp_four > 4\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou have just enough time to notice she's still shielding your body with hers when the water fountains up, drenching you both. Several staff members scream in shock and pain, especially those who were still in the water. Mom counts them off quickly, ignoring their minor wounds until she's sure that's all there is.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou did it. You saved the shark farm.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto cleaning\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\tAfter a moment, she gathers her breath and makes you stand up and move away from the water.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Get away from the water,\" she yells at the nearby staff, signing hugely at the same time and hitting the Underwater Danger lever so that red lights will turn on for the staff who are still cleaning the underside of the deck.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tThe staff listen to her at once and retreat immediately. A few moments later, the water fountains up, drenching those who don't move fast enough. Several people scream, but they're screams of surprise rather than pain. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou did it. You saved the shark farm.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set value_farm %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto cleaning\n\t\t\t\t\t\t\t\t\t\t\t#Gasp for air.\n\t\t\t\t\t\t\t\t\t\t\t\t*set temp_four + 1\n\t\t\t\t\t\t\t\t\t\t\t\tYou lie helpless for a long moment, hugely glad just to be out of the water. \n\t\t\t\t\t\t\t\t\t\t\t\t*label treats\n\t\t\t\t\t\t\t\t\t\t\t\tMom swims away to release treats that will attract the sharks closest to the surface, then gets out and comes back to you.\n\t\t\t\t\t\t\t\t\t\t\t\t*goto mom_out\n\t\t\t\t\t\t\t\t\t\t\t#Roll away from the water's edge.\n\t\t\t\t\t\t\t\t\t\t\t\t*set temp_four + 1\n\t\t\t\t\t\t\t\t\t\t\t\tYou roll away from the water, not knowing how deep the bomb will get before it explodes.\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto treats\n\t\t\t\t\t\t\t\t\t#Get Mom.\n\t\t\t\t\t\t\t\t\t\t*set temp_four +1\n\t\t\t\t\t\t\t\t\t\tYou swim back to Mom, pausing for new oxygen, and sign, \"Bomb,\" as soon as you're close. She follows you back and swims once around the sphere. Then she pulls out a knife to saw through the cords, letting the bomb sink far enough to protect Kota and the farm.\n\t\t\t\t\t\t\t\t\t\t*goto untie\n\t\t\t\t\t\t\t\t\t#Try to defuse it.\n\t\t\t\t\t\t\t\t\t\t*set temp_four +1\n\t\t\t\t\t\t\t\t\t\tYou swim all around the sphere twice, trying to find a way in. There's no handy-dandy red countdown and no sign of anything you can do other than send it deeper into the ocean.\n\t\t\t\t\t\t\t\t\t\t*goto untie\n\t\t\t\t\t\t\t#Tap \"emergency\" on her arm.\n\t\t\t\t\t\t\t\t\"Emergency,\" you tap at her. She shrugs you off. If you weren't underwater, you could scream with frustration. How is Mom so much more stubborn than you? Aren't teenagers meant to be the ones who don't listen to reason?\n\n\t\t\t\t\t\t\t\tThere's only one way to get her out of the water, and that's to help her finish the job. \n\n\t\t\t\t\t\t\t\t*goto alongside\n\t\t\t\t\t\t\t#Wait until she's done and swim up together.\n\t\t\t\t\t\t\t\tYou hover in the water, trying to be patient.\n\n\t\t\t\t\t\t\t\t\"Make yourself useful,\" Mom signs.\n\t\t\t\t\t\t\t\t*goto alongside\n\t\t\t#Find Dad.\n\t\t\t\t*set sunny %+10\n\t\t\t\tYou automatically head for the ladder leading up to his office. It's a pain walking without your prosthetics on, but the ladder will be easier to climb since you're lighter without legs. A couple of staff do double takes when they see you, then flush as they recognize you. You might only reach the height of their stomachs, but you're still the bosses' kid.\n\n\t\t\t\tIt's impossible to tell from your position at the base of the ladder whether Dad really is still in his office or not. Surely not, with all that's happening? Or is the crisis already over, and the major cleaning is just a handy way to take advantage of the interruption to the usual routine?\n\t\t\t\t*choice\n\t\t\t\t\t#Climb.\n\t\t\t\t\t\t*goto uppity\n\t\t\t\t\t#Ask someone where he is.\n\t\t\t\t\t\t*gosub siti\n\n\t\t\t\t\t\t\"Where's Sunny?\" you ask a staff member.\n\n\t\t\t\t\t\tShe flicks her eyes upward, and you sigh inwardly. Of course he's in his office.\n\t\t\t\t\t\t*label uppity\n\t\t\t\t\t\t*gosub climb_to_Dad\n\n\t\t\t\t\t\t\"Hey, Dad,\" you say when you finally reach him. \"What's actually going on?\"\n\n\t\t\t\t\t\t\"Nice to see you too,\" he says without rancor. \n\t\t\t\t\t\t*if temp_three = 1\n\t\t\t\t\t\t\tThen his eyes widen, and he's checking your head, spraying a numbing anesthetic with infection-monitoring nanos, and muttering angrily. \n\n\t\t\t\t\t\t\t\"Thanks, Dad,\" you say, feeling unexpected tears prick your eyes.\n\t\t\t\t\t\t\t*goto muttering\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t*label muttering\n\n\t\t\t\t\t\t\"We're doing a full clean of the farm, which means we can check every corner above- and underground in case there are vegetarians lurking.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"That's not enough!\"\n\t\t\t\t\t\t\t\t\"It has to be,\" he says. \"Our best chance is to locate any vegetarians lurking here and get rid of them.\"\n\t\t\t\t\t\t\t\t*label dad_talk_calm\n\t\t\t\t\t\t\t\t*if temp_two = 1\n\n\t\t\t\t\t\t\t\t\t\"Dad, no! It's a bomb, and it could go off at any moment.\"\n\n\t\t\t\t\t\t\t\t\tHe rubs his face with his hands.\n\n\t\t\t\t\t\t\t\t\t\"Dad!\"\n\n\t\t\t\t\t\t\t\t\t\"Alright,\" he says at last. \"Let's evacuate.\"\n\t\t\t\t\t\t\t\t\t*goto pre_alarm\n\t\t\t\t\t\t\t\t*else\n\n\t\t\t\t\t\t\t\t\t\"I'm not sure this is enough. You didn't see them.\"\n\t\t\t\t\t\t\t\t\t*label softly\n\n\t\t\t\t\t\t\t\t\t\"There are two ways to destroy us,\" Dad says softly. \"One is physically, and one is to destroy our reputation.\"\n\n\t\t\t\t\t\t\t\t\t\"Alright,\" you say, but it still doesn't feel right. You climb down the ladder and stand on the observation platform, wishing you knew exactly what the Alive vegetarians have planned. \n\t\t\t\t\t\t\t\t\t*set temp_four + 1\n\t\t\t\t\t\t\t\t\t*goto boom\n\t\t\t\t\t\t\t#\"This is a real emergency, Dad.\"\n\t\t\t\t\t\t\t\t\"We're doing our best,\" he says.\n\n\t\t\t\t\t\t\t\tYou clench your teeth to keep from saying something you'll regret.\n\t\t\t\t\t\t\t\t*goto dad_talk_calm\n\t\t\t\t\t\t\t#\"Good idea.\"\n\t\t\t\t\t\t\t\t*goto softly\n\t\t\t\t\t\t*label siti\n\t\t\t\t\t\tYou nab a passing staff member you recognize as Kadek Siti. She's sweating and covered in long, slimy tendrils of inedible water weed. You do your best not to show by your facial expression how much she stinks. \n\t\t\t\t\t\t*return\n\t\t\t\t\t#Where else might he have gone?\n\t\t\t\t\t\tYou check around Dad's usual spots: the trading rooms, the main shed, and so on. Eventually you have to let yourself admit he's in his office.\n\t\t\t\t\t\t*goto uppity\n\t\t\t#Tell the staff to leave at once.\n\t\t\t\t*set diah %+10\n\t\t\t\tThere are people everywhere! It's almost as bad as a festival or excursion day. And they're all staff, which makes you indirectly responsible for their wellbeing. You wish you'd brought a pair of prosthetic legs with you because you always feel like a child without them, since you have to look up to meet anyone's eyes. Well, it can't be helped.\n\n\t\t\t\tEveryone is moving quickly and efficiently. If the danger is truly past, doing a major clean is a great way to take everyone's mind off the scare and take advantage of the disruption. It's definitely your parents' idea. Unfortunately, you don't immediately see anyone both senior enough to effect an evacuation and sufficiently familiar for you to predict how they'll respond.\n\t\t\t\t*choice\n\t\t\t\t\t#Choose someone I know, no matter how junior.\n\t\t\t\t\t\t*gosub siti\n\t\t\t\t\t\t*label kadek\n\n\t\t\t\t\t\t\"Kadek Siti, who's the supervisor on deck at present?\" you ask.\n\n\t\t\t\t\t\tShe grimaces. \"I am. Didn't realize when I volunteered that my entire job today would be carting rubbish from the water so the rest don't have to get in and out.\"\n\n\t\t\t\t\t\t\"You need to evacuate. Now. Everyone.\"\n\n\t\t\t\t\t\t\"I can't do that,\" she says. \"Even if I wanted to, I don't know how.\"\n\n\t\t\t\t\t\tIt's up to you.\n\t\t\t\t\t\t*goto pre_alarm\n\t\t\t\t\t#Use the automated evacuation alarm. It's loud and flashy but effective.\n\t\t\t\t\t\t*label pre_alarm\n\t\t\t\t\t\tMom and Dad taught you the full sequence of emergency alarms years ago, and luckily, you do remember them. Of course, anyone who sees you will try and stop you. The official rule is: \"If the entire farm is on fire, then you can evacuate and not before. If half the farm is on fire, that's not enough.\"\n\n\t\t\t\t\t\tMom is going to be so incredibly angry with you. But it has to be done…doesn't it? \n\t\t\t\t\t\t*if temp_two = 1\n\t\t\t\t\t\t\tNo one has found the bomb, so everyone is in terrible danger. Time is running out.\n\t\t\t\t\t\t\t*goto hoice\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t*label hoice\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#Do it.\n\t\t\t\t\t\t\t\t*goto alarm\n\t\t\t\t\t\t\t#Do it and then flee so there's a chance they won't know it was me.\n\t\t\t\t\t\t\t\t*label alarm\n\n\t\t\t\t\t\t\t\tWith an effort, you throw off the powerful instinct to delegate this decision to someone—anyone—else. There's only you.\n\n\t\t\t\t\t\t\t\tYou climb to the secret access panel beneath the restaurant and tap in the various codes to open it. Sure enough, staff are staring up at you. Some are simply curious and glad for any excuse to pause their cleaning duties. Others are frowning, and still others are talking on their wrist coms or even heading over to stop you.\n\n\t\t\t\t\t\t\t\tFocus.\n\n\t\t\t\t\t\t\t\tYou ignore the approach of wrathful staff members and open the access panel. After that, all it takes is your fingerprint and a simple voice command. \n\t\t\t\t\t\t\t\t*label boom\n\n\t\t\t\t\t\t\t\tThe world erupts. \n\t\t\t\t\t\t\t\t*if temp_four \u003c 4\n\t\t\t\t\t\t\t\t\tIt's the alarm. You've never heard it go off, but the sound is so immense it feels like a physical blow.\n\n\t\t\t\t\t\t\t\t\tTime to get out of here.\n\t\t\t\t\t\t\t\t\t*if temp_four \u003c 2\n\t\t\t\t\t\t\t\t\t\t*goto bomb_best_case_scenario\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto bomb_moderate_success\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tThe water explodes, and for a terrified moment, you think it's an even larger deep-sea creature breaching in front of your eyes. But it's much worse. Half the observation deck is blown away, there are bloody chunks of shark on the restaurant windows, Dad's office ladder hangs loose, and even some of the Glass nearby is broken.\n\n\t\t\t\t\t\t\t\t\tIt takes you a long time to realize you're also bleeding. It's hard to focus on where the blood is coming from or what it means. Oh good. You're going into shock.\n\t\t\t\t\t\t\t\t\t*goto bomb_bad\n\t\t\t\t\t\t\t#Don't do it yet. There has to be another way.\n\t\t\t\t\t\t\t\t*set temp_four +1\n\t\t\t\t\t\t\t\t*if temp_two = 1\n\t\t\t\t\t\t\t\t\tIf you can find the bomb, perhaps you won't need to evacuate the farm. But where is it?\n\t\t\t\t\t\t\t\t\t*if self_experimentation = 1\n\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\tFeeling like an idiot, you dunk your head in the water, hoping your shiny new mind implants can tell you if the local sharks have noticed anything.\n\n\t\t\t\t\t\t\t\t\t\tThey have! The bomb is underwater. Somewhere deep. You change into your swimmers at once. \n\t\t\t\t\t\t\t\t\t\t*goto dive_in\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t*goto search\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t*label search\n\n\t\t\t\t\t\t\t\tThe farm is enormous, both underwater and above. \n\t\t\t\t\t\t\t\t*if temp_three = 1\n\t\t\t\t\t\t\t\t\tYou don't even know how big or small the bomb is, and it's bound to be disguised.\n\t\t\t\t\t\t\t\t\t*goto searching\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYou don't even know what you're looking for.\n\t\t\t\t\t\t\t\t*label searching\n\n\t\t\t\t\t\t\t\tIt's no use. You have to set off the evacuation alarm. All you can do is hope it's not too late and hope your estimation of the danger is correct.\n\t\t\t\t\t\t\t\t*goto alarm\n\t\t\t\t\t#Choose someone senior who can order the others around.\n\t\t\t\t\t\tYou look around, but it's hard to tell who's actually the supervisor on deck when everyone's wearing the same uniform and most of them are filthy anyway. You spot someone swathed in green weeds who is walking back and forth from the nonrecyclable rubbish to the main underwater concourse. When she turns toward you, you recognize Kadek Siti. It's not clear why she's acting like a supervisor—and it doesn't look like she's enjoying it.\n\t\t\t\t\t\t*goto kadek\n\t#Call Mom.\n\t\t*set lili %+10\n\t\tShe doesn't respond. What does that even mean? Is she too busy? Is she hurt?\n\n\t\tYou try to let it go. You can't.\n\n\t\tYou have to go home.\n\t\t*goto homeward\n\t#Call Folami.\n\t\t*set folami %+10\n\t\t\"$!{name}!\" she says. \"Are you alright?\"\n\n\t\t\"More or less. What's happening?\"\n\n\t\t\"Why are you asking me?\" she squeaks. \"I'm in hiding. You're meant to be calling the police.\"\n\n\t\t\"That's not what you said!\"\n\n\t\t\"Are you at the farm now?\"\n\n\t\t\"No. But I'm going to go there right now.\"\n\n\t\tYou click off.\n\t\t*goto homeward\n*label out\n\nYou're sitting in the safe zone when there's a massive spout of water. Alive has bombed your farm, and it wasn't a warning shot. Mom's and Dad's faces turn grim, and they don't even let you go with them to check out the damage. \n\nIt's bad. The observation deck itself is shattered, there are shark guts spattered all over the place, and though Dad's office is unharmed, the access ladder is gone.\n\nSeveral staff members you hardly know thank you for saving their lives.\n*set reputation %+10\n*goto cleaning\n*label bomb_best_case_scenario\n*set temp 2\nThe relative serenity of the farm explodes into movement. A few staff members are still heading for you, looking furious—but everyone knows the protocol. If the evac alarm goes off, it must be obeyed immediately. Any other safety issues are instantly deprioritized, and fortunately, so is the trouble you're going to be in when this is over.\n\nThe angry staff members recollect themselves and veer off to yell at stragglers. Which will include you, if you don't hurry up. But you remember belatedly that the person who hits the alarm is meant to be the last to leave the premises.\n*choice\n\t#Check the restaurant. They're semiautonomous and may not all know evac procedure.\n\t\t*set sunny %+10\n\t\tFortunately, you can access the restaurant from underneath, since you're not particularly thrilled at the notion of climbing all the way down and back up again. Presumably, the obscure access hatch before you is specifically designed to help an evacuation work efficiently, since the restaurant is the farthest from the exits.\n\n\t\tYou emerge from the dining floor to find a large number of people attempting to wrap their fish in napkins in order to take their meal with them. The staff are diligently flapping their arms, and there is a clear tide heading for the exit. So that's good. You follow them out and leave the empty farm behind.\n\t\t*goto out\n\t#Check the water. The alarm lights aren't as obvious as the noise on the surface.\n\t\t*set lili %+10\n\t\tYou dive right in and see that the underwater staff are reeling themselves in quite efficiently without you. Excellent. You climb right back out and count off the staff as they step from the water. Then you leave with them, knowing the farm is as empty as can be. Hopefully Mom and Dad obeyed their own alarm.\n\t\t*goto out\n\t#Look for Diah. Her reaction to this is unpredictable.\n\t\t*set diah %+10\n\t\tLast time you saw Diah at the farm, she was cheerfully leading groups of schoolchildren through the usual visitor course, comfortable in the memorized spiel and even adding her own spin on things. But there aren't any visitors here now.\n\n\t\tShe'll be cleaning. Mom wouldn't waste a pair of hands. All you have to do is figure out where a newbie would be placed at such a time.\n\n\t\tThe sheds. They're full of rats and well locked. There's little danger, but every other staff member would volunteer for anything else rather than hit the sheds.\n\t\t\n\t\tYou spot Diah on your way over. \"Evacuation?\" she guesses, and all you have to do is nod confirmation and walk out beside her.\n\t\t*goto out\n*label bomb_moderate_success\n*set temp 3\n*set temp_three +1\n*set value_farm %-10\nThe alarm is so loud you feel your balance waver. You cling on another moment, noticing the evacuation procedure kicking into gear below. Then you start climbing back to the observation deck and out—and that's when the ocean explodes.\n\nSalty water slams into you, throwing you down. You hit the deck just as it cracks in two, dumping you in more water. You claw your way back to the surface, gagging as you realize the warm liquid in the water is shark blood. And there's human blood—your blood—running down your arm. But you're alive and mobile.\n\nYou find a piece of the observation deck that isn't shattered and climb up onto it, lying in a puddle to recover. No need to run; the worst is over.\n*goto wounded\n*label bomb_bad\n*set temp 4\n*set value_farm %-20\n*set temp_three + 2\nYou climb down with exaggerated care, sobbing despite your relative lack of injury. A lot of you hurts, but from your vantage point, you can see at least one person lying unconscious on the remains of the observation deck. This is bad. This is really bad. \n\nIt seems like you should probably go and help someone, but then you realize you're lying down yourself in a safe but damp patch. Wet Glass has never felt so comfy, and moving is too hard right now.\n*label wounded\n\nThen Mom and Dad are with you, yelling for a doctor, and you make yourself sit up and prove you're breathing and conscious. They still refuse to leave your side, even though other people are definitely hurt too. It's oddly comforting to see them so panicked over a bit of blood. Well, a lot of blood. But you'll heal.\n\nYou're not so sure about the farm.\n*label cleaning\n*page_break\n\nThe next few hours pass in a strange world of recovery. Several members of Alive are arrested, even as one continues to insist he was the only person involved. You know better. Somehow Kustiani isn't one of those arrested. Folami goes to stay at Kassie's house. Dad organizes repairs. Mom fusses over you like you've seen other moms do with their kids. It's weird, and you're glad when she calms down.\n\nWhen everything is definitely safe, and it's another normal evening at the farm except for the trauma tourists pretending they just happened to pay a visit on this day, Dad summons you to his office.\n*choice\n\t#Ask what it's about.\n\t\t*gosub new_ladder\n\t\t\"Dad?\" you say, still standing in the doorway. \"What's going on?\"\n\t\t*goto talk\n\t\t*label new_ladder\n\t\t*if temp_three > 0\n\t\t\tYou're still sore, but it feels good to climb.\n\t\t\t*goto climb\n\t\t*else\n\t\t*label climb \n\t\tThe new ladder has an automated option that will be handy someday when you're in a hurry. But this is not that day.\n\t\t*return\n\t#Beg Diah to come with me.\n\t\tYou call Diah and chat for a good five minutes before asking her to come with you.\n\n\t\t\"To see your own dad?\" she signs. \"Uh, nope. He's also my boss. I have more reason to be nervous than you.\"\n\n\t\t\"I hate you.\"\n\n\t\t\"Because you're not my boss,\" she signs placidly and says goodbye.\n\t\t*gosub new_ladder\n\t\t*goto talk\n\t#Meet him there and let him lead the conversation.\n\t\t*label talk\n\n\t\tDad stands up, which is weird. That's what he does when adults enter the room. He motions for you to take a seat. You try to ignore the instinct telling you to run away.\n\n\t\t*if temp_five = 0\n\t\t\t\"Why didn't you tell us that you knew there would be a major incident at the farm today?\"\n\t\t\t*choice\n\t\t\t\t#\"I didn't think you would believe me.\"\n\t\t\t\t\t*label blinks\n\t\t\t\t\t*set sunny %+10\n\t\t\t\t\tHe blinks and sits back in his chair. \"You have not come to me with any other false alarms. If anything like this should happen again, I will certainly believe you.\"\n\n\t\t\t\t\tIt's your turn to be surprised. \"Thank you.\" \n\t\t\t\t\t*finish Chapter Seven\n\t\t\t\t#\"Would you have believed me?\"\n\t\t\t\t\t*goto blinks\n\t\t\t\t#\"You taught me long ago not to bother you at work.\"\n\t\t\t\t\t*set sunny %-10\n\t\t\t\t\tHe shakes his head. \"This was clearly important. You should have used your judgment. That's what adults do.\"\n\n\t\t\t\t\tThat hurts.\n\t\t\t\t\t*finish Chapter Seven\n\t\t*else\n\t\t\t\"I'm sorry,\" he says. \"We should have listened to you when you first came to us saying Alive was planning some kind of attack.\"\n\t\t\t*choice\n\t\t\t\t#\"I wouldn't have listened to me.\"\n\t\t\t\t\t\"Why not?\" he says, jumping on your comment as if it's super meaningful.\n\n\t\t\t\t\t\"Because I'm just…me. You and Mom run the farm, and you have other senior staff.\"\n\t\t\t\t\t*label exoneration\n\n\t\t\t\t\t\"Yes,\" he says and clears his throat. \"It should be noted that you just became more senior around here, and everyone knows you earned it. Because you were right to be alarmed, and you took action. I'm proud of you. What you did changes things. You're going to be an amazing shark farmer.\"\n\t\t\t\t\t*finish Chapter Seven\n\t\t\t\t#\"Why didn't you?\"\n\t\t\t\t\t\"I didn't trust your instincts,\" he says.\n\n\t\t\t\t\t\"You should have.\"\n\n\t\t\t\t\t*goto exoneration\n\t\t\t\t#\"Yes.\"\n\t\t\t\t\tHe blinks at your bluntness, then recovers. \n\t\t\t\t\t*goto exoneration\n", "chapter_ten": "*set somethings_coming 2\n*set temp_two 0\nYour computer doesn't come fully online until you get free of the Old Sydney harbor, at which point you receive seventeen frantic messages from Kassie.\n*choice\n\t#Call her.\n\t\t*set kassandra %+10\n\t\t*label holo\n\t\tYou flick into holo mode, and Kassie's pinched face appears before you in life size. Dad clears his throat loudly and shifts position, making sure he pops briefly into Kassie's field of vision so she remembers he's there and doesn't say anything inappropriate.\n\n\t\t\"Are you hurt?\" she signs frantically. \"I couldn't get through to you, and there was an earthquake, and you were in that hole—\"\n\n\t\tYou laugh, feeling your own shoulders unclench a little more at the sight of her. \"Look at me,\" you sign with a grin. \"I'm fine.\"\n\n\t\tShe scowls in response. \"I can't see all of you at once.\"\n\n\t\t*if temp = 5\n\t\t\tYou glance down at the new hole in your foot but choose not to mention it quite yet. It looks much worse than it is.\n\t\t\t*goto see\n\t\t*else\n\t\t*label see\n\t\t\"You'll see me in glorious 3D soon enough. We're on our way back now.\"\n\n\t\tKassie nods and clicks off, satisfied—for now. \n\t\t*goto dad_talk\n\t#Tell her I'm fine and will meet her at home.\n\t\tYou tap out a quick message, and she responds by requesting a face-to-face call. \n\t\t*goto holo\n\t#She can wait.\n\t\t*set temp_two 1\n\t\t*set kassandra %-10\n\t\tYou flick notifications off and lean back in your chair. Dad gives you a funny look, but he doesn't say anything.\n*label dad_talk\n\nThe sea stretches out all around you, looking perfectly calm and normal. If it weren't for your bumps and bruises, it would be hard to believe an earthquake just happened.\n\nThe other speeder stays within sight this time. It's impossible to tell if it's because you're not trailing nets of sharks this time or because they feel a little safer this way. You definitely feel safer. If you're knocked off course by giant squids again, a second speeder will come in handy.\n\nYou fall into a long, peaceful silence and begin to get drowsy.\n\n\"Huh,\" says Dad, in a voice that is clearly trying to sound casual.\n\nYou open your eyes and look where he's looking. The opalescent shimmer of Kota's spheres is visible ahead. But the orientation is all wrong. For a moment, you think the city must have moved. Then you realize that it's not Kota at all but one of the other cities that are permitted in this ocean region.\n*fake_choice\n\t#\"Awesome, another trading partner.\"\n\t\t*set flexibility %+10\n\t\t*label mmm\n\t\t\"Mmm,\" says Dad with careful neutrality. That can only mean one thing: he knows exactly who it is on your horizon, and he hates their guts.\n\n\t#\"Ugh, I hate it when other cities come so close.\"\n\t\t*set empathy %-10\n\t\t*goto mmm\n\t#\"Huh. Who do you reckon that is?\"\n\t\t*set curiosity %+10\n\t\t\"Arkville,\" Dad says, not looking at you. The name is vaguely familiar—not exactly surprising, since floating cities in the same region tend to cross paths at regular intervals—but Dad's utter lack of comment speaks volumes.\n\nSomething is very wrong with that city. Dad is working so hard on looking casual that tendons are standing out in his neck.\n\nHe sees you staring and sighs. \"Arkville is a great city.\"\n\n\"Uh-huh.\"\n\n\"They have unique challenges.\"\n\n\"Uh-huh.\"\n\n\"Kota was one of the first floating cities built,\" he grinds out. \"It was a heady time, when the world was briefly united in facing climate change—after the denialist phase and before the water wars. Kota Perahu was built properly, and our population was carefully chosen from a mix of refugees and a long line of international applications.\"\n*choice\n\t#Keep quiet. Dad will let slip his real opinion if I let him ramble.\n\t\t*if poise > 60\n\t\t\tDad pauses, and the silence immediately grows uncomfortable. It was all so easy when you were each just lost in your own thoughts, but now you both know Dad is trying to keep a secret. You try to forget the fact that he's your dad, your boss, and still taller than you. He's pretending to have it all together, but you can outpretend him.\n\n\t\t\t\"It's not the city,\" he says at last. \"It's the governor. Banyu. Don't ever trust a word he says, directly or indirectly.\"\n\t\t\t*goto info\n\t\t*else\n\t\t\tYou slam shut your mouth and wait. Dad glances at you, then glances away again as if he feels guilty. You try hard to count in your head so the gaping silence doesn't break you, but it's no use.\n\n\t\t\t\"What is it, Dad?\" you blurt out. \"What aren't you telling me?\"\n\n\t\t\tSomehow, the question actually relaxes him, and you know you've lost your chance before he opens his mouth.\n\t\t\t\n\t\t\t\"Nothing,\" he says. \"It's just another city. Not as nice as Kota, but of course Kota's the best in the world.\"\n\t\t\t*goto info\n\t#Do some online research and read between the lines.\n\t\t*if appraisal > 60\n\t\t\tYou ignore Dad and tap through a few virtual pages using your wrist com. It feels good to spend time rambling about the coms, like you do every day for a million different reasons. You can feel your breath calming and your body relaxing. Then your mind switches on properly, and you start seeing the gaps in the information: articles on trade disputes with no follow-ups. Early praise of the governor followed by an ominous lack of any comments whatsoever.\n\n\t\t\tSo that's what's wrong with Arkville. Its highest official: a man named Banyu.\n\t\t\t*goto info\n\t\t*else\n\t\t\tYou tap open your wrist com and get to researching. Arkville's professional ratios have always been a bit off, and their rate of unemployment is severe. They're badly lacking in medical personnel, and their major statistics show the lack. Infant mortality is high and life expectancy is low. Statistics don't usually make you cringe, but these are awful in how preventable they are.\n\t\t\t\n\t\t\tStill, you knew Arkville was poor. There's something you're not seeing. Unfortunately, you can't parse information as well as you'd like to. Eventually you accept your weakness and give up.\n\t\t\t*goto info\n\t#\"Tell me what you know, and I'll tell you what I know—about the earthquakes.\"\n\t\t*if bargaining > 60\n\t\t\tHe blinks. \"What do you know about the earthquakes?\"\n\n\t\t\tYou smile at him.\n\n\t\t\t\"Ah,\" he says. \"I see what you did there.\"\n\n\t\t\t\"So,\" you say. \"Shall we trade?\"\n\n\t\t\tHe sighs heavily, then finally nods. \"You first.\"\n\n\t\t\tYou oblige, telling him everything that doesn't betray Kassie.\n\n\t\t\tOnce he's digested everything to his satisfaction, he tells you what he wouldn't before: \"It's Governor Banyu. He's not a good man.\"\n\t\t\t*goto info\n\t\t*else\n\t\t\tHe comes perilously close to an eye roll, and you immediately know you've lost him.\n\n\t\t\tYou can't help yourself: you babble frantically, trying to convince him your information really is valuable and good and useful. Bargaining is really not your forte, and this is why. You can't seem to convince anyone to buy what you're selling. It's embarrassing, even in a nearly-empty speeder.\n\n\t\t\tAt last, mercifully, your voice peters off. Dad has long since stopped listening to you.\n*label info\n\nWell, that's that, then. \n\nOnce you're home, you take off your prosthetics at once and carefully examine the ends of your flesh legs for damage. You'll have to stick to your stompers for at least a day to recover from all that running around. \n*if temp = 5\n\tFortunately replacement feet aren't too expensive.\n\t*set net_worth -50\n\t*goto onward\n*else\n*label onward\n\nYou find yourself tired and sore, as if you're recovering from a virus. But you're just exhausted. And scared. You know now how devastating another earthquake would be, and you know that a larger earthquake is coming.\n*choice\n\t#Time to talk to Kassie.\n\t\t*set kassandra %+10\n\t\tYou ping Kassie to check if it's okay to come over, and she accepts. \n\t\t*if temp_two = 1\n\t\t\tBefore you enter the hatch, you tap out an apology. She lets you in but informs you that she expects to be kept up to date on your status after life-or-death experiences in future.\n\t\t\t*goto chatty\n\t\t*else\n\t\t*label chatty\n\t\tOnce you're both inside and seated comfortably on her floor, she makes you go over every detail of your trip to New Sydney, particularly regarding Folami and Yunus. It's strangely therapeutic to put it all into words and sentences and sort it into something coherent, instead of the mishmash of feelings rolled up inside you.\n\n\t\tAt last Kassie nods, satisfied. \n\t\t*if kassie_love > 0\n\t\t\tShe leans forward and kisses you in a businesslike manner. So businesslike, in fact, that you can't stand it. You grab her hand and tap with shaking fingers, \"Properly now.\"\n\t\t\t\n\t\t\tFortunately, she obliges your request. Soon you feel very mellow indeed.\n\t\t\t*goto chatty_on\n\t\t*else\n\t\t*label chatty_on\n\n\t\t\"I don't like this earthquake,\" she says, reminding you of the existence of the rest of the world.\n\n\t\t\"It wasn't fun,\" you agree.\n\n\t\t\"We didn't know it was coming,\" she says, swatting you for your poor attempt at humor.\n\t\t*choice\n\t\t\t#\"That's generally the deal with earthquakes.\"\n\t\t\t\tShe scowls. \"I could—\"\n\n\t\t\t\t\"No,\" you say, all too aware that she'd cheerfully risk her mind and life for more data.\n\t\t\t\t*goto several\n\t\t\t#\"Time for more research—with the implants?\"\n\t\t\t\tKassie's face lights up in a manner that's slightly ominous. \n\t\t\t\t*if k_experimentation \u003c 2\n\t\t\t\t\t\"You'll help me?\" she asks. \"Properly?\"\n\n\t\t\t\t\t\"Yes,\" you say.\n\n\t\t\t\t\t*set k_experimentation 3\n\t\t\t\t\t*set kassie_dies true\n\t\t\t\t\t*goto implants\n\t\t\t\t*else\n\t\t\t\t*label implants\n\t\t\t\tYou can't stop feeling concerned about Kassie's safety, but it's clear that the wider world needs her work—and needs it now.\n\t\t\t\t*goto several\n\t\t\t#\"Time to set up warning systems.\"\n\t\t\t\t\"Agreed,\" she says. \"I'll take care of it.\"\n\t\t\t\t*if facts != 1\n\t\t\t\t\t*set facts 2\n\t\t\t\t\t*goto several\n\t\t\t\t*else\n\t\t\t\t\t*goto several\n\t#Time to talk to Yunus.\n\t\t*set yunus %+10\n\t\tYou settle into your room and ping Yunus. He responds so quickly it's as if he was waiting for you. But he's walking along a corridor, so obviously he has plenty to do.\n\n\t\t\"Talk to me,\" you say. \"What's going on?\"\n\n\t\tHe sighs. \"After terror comes paperwork.\"\n\n\t\t\"Ooh,\" you say. \"Scary.\"\n\n\t\t\"You have no idea. Are you okay?\"\n\n\t\t\"Of course!\" you say. \"It's not my city.\"\n\n\t\t*if temp_four > 2\n\t\t\t\"Not yet,\" he smiles.\n\t\t\t*goto busy\n\t\t*else\n\t\t\t\"It's fine,\" he says. \"Really.\"\n\t\t\t*label busy\n\n\t\t\t\"I'd better let you go,\" you say. \"Clearly you're needed.\"\n\n\t\t\tHe sighs again, but you can see you're right to cut the conversation short.\n\t\t\t*goto several\n\t#Time to talk to Diah.\n\t\t*set diah %+10\n\t\tYou ping Diah, then catch yourself and check with Kassie that it's alright to bring another person into the small group that knows about her mind implants. She gives you the green light at once.\n\n\t\t*if temp_two = 1\n\t\t\tIt seems she's already forgiven you for refusing to answer her call when you were coming back from New Sydney.\n\t\t\t*goto green\n\t\t*else\n\t\t*label green\n\t\tDiah pings back her location—the shark farm. Of course, she's working.\n\n\t\tYou head over to the farm to see her, regaling her with tales of the Drylanders and their earthquake while assisting her with her work. Every time the two of you are alone, you tell her a little more about Kassie's mind implants. In the end, she knows everything you know and is fully aware of the need for secrecy.\n*label several\n\nSeveral days pass as Mom and Dad sit in meetings with major officials and trader leaders, discussing Kota's plans to deal with Arkville. Essentially, it's important to take advantage of their proximity without letting them cause harm. Though how much harm a smaller, weaker, poorer city could do to you is unclear.\n\nAt least your vestigial legs get a chance to heal properly after all the running around during the earthquake. The last thing you need is an infection.\n\nFinally it's time for a group to go and \"welcome\" Arkville to the area. It's a time-honored ritual: a mandatory piece of diplomacy.\n\nIt's also a great chance to scope out the opposition before the trading officially starts, so of course you and Dad will be included. Given how much Dad doesn't want you to go, it should be interesting. He brings Diah, and you get the feeling he's hoping her youthful looks will prevent people from focusing on you as the obvious weakness of the party. It's insulting and worrying at the same time. How bad is this meeting with the Arkvillagers going to be?\n*choice\n\t#I'll watch them carefully.\n\t\t*gosub arkville_intro\n\t\t*if appraisal > 60\n\t\t\t*set value_farm %+10\n\t\t\tYou're taken to a sphere that is clearly also a school gymnasium and assembly hall. The most interesting part of the room is a rubbish bin, so you're careful to veer past it, gleaning a speedy insight into the lives of local teens.\n\n\t\t\tYou spot a couple of crinkled wrappers, but the vast majority of the bin is full of discarded meat. Shark meat. Since when do people throw away the most delicious and expensive part of a meal?\n\n\t\t\tSince it's not. They've overbred their sharks. Ah.\n\n\t\t\tAs soon as you discover that the young person with six braids, Maya, is the head of the trading guild, you put her in touch with Dad so she can arrange to hire some Kota staff to sort out their shark problem.\n\t\t\t*goto meeting\n\t\t*else\n\t\t\tYour speeder is towed to a school, where you're taken through a conveniently-located entryway into a roomy hall. The chairs on each side of the table are the same size, the temperature is comfortable, and nothing has the salty-moldy smell of an overworked desalination machine.\n\n\t\t\tEveryone and everything seems normal. If there are insights to be gleaned here, you're not finding them.\n\n\t\t\tA girl called Maya talks to you, twining three of her six braids around her fingers. She's clearly a weak spot, but unfortunately so are you.\n\t\t\t*goto meeting\n\t#I'll be careful not to give any of our own issues away.\n\t\t*gosub arkville_intro\n\t\t*if poise > 60\n\t\t\t*set connections %+10\n\t\t\tIt's always a tiny bit awkward traveling between spheres, especially in your cosmetic legs, but Dad takes your arm and helps with your gait as you enter the large sphere set aside for your Arkville meeting. The space is large, and there are trestle tables set up with a lot of food.\n\n\t\t\tIt soon becomes clear that one of the Arkvillagers is trying to talk to you alone, so you deliberately walk away from the group as if the fried shark shards are a novelty to you.\n\n\t\t\t\"Hi,\" says the Arkvillager, and blushes. Despite her official-looking clothes, she's your age. \"I'm Maya.\"\n\n\t\t\t\"$!{name}.\"\n\n\t\t\t\"I'm meant to be befriending you,\" she says. \"Scoping out the competition.\"\n\t\t\t*fake_choice\n\t\t\t\t#\"I feel very scoped.\"\n\t\t\t\t\t*set flexibility %+10\n\t\t\t\t\t\"Good,\" she says. \"If anyone asks, you just told me all kinds of devastating secrets about Kota Perahu.\"\n\n\t\t\t\t\t\"Corporate espionage isn't really your strength, is it?\"\n\t\t\t\t#\"Is this how Arkvillagers make friends?\"\n\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\"Usually with less corporate espionage,\" she says. \n\t\t\t\t#Psych her out by not saying a word.\n\t\t\t\t\t*set empathy %-10\n\t\t\t\t\tYou meet her eye and don't say a word.\n\n\t\t\t\"I'm Maya,\" she says again, tugging at one of her six braids. \"They just made me head of the trading guild, so I guess we'll be working together?\"\n\n\t\t\t\"So it would seem.\"\n\n\t\t\t\"I don't know what I'm doing,\" she gushes.\n\n\t\t\t\"You'll be fine.\"\n\n\t\t\tShe nods, apparently reassured. \"Who's that girl?\"\n\n\t\t\t\"Who, her? Diah?\"\n\n\t\t\tMaya blushes again. Interesting.\n\t\t\t*goto meeting\n\t\t*else\n\t\t\tYou wore your cosmetic legs today i
