\t\t\t\t#Search for a keyhole—it's the most practical approach.\n\t\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\t\tThe key is small, so you look for a small hole, circling the ceiling first. There are vents, and a smoke detector, and broken lights. No keyholes.\n\n\t\t\t\t\t\tKassie's circled the desk and found a locked drawer. You can tell from the set of her shoulders that her own breath is in short supply, and she's trying to remain calm to make it last longer.\n\n\t\t\t\t\t\tWhen a massive stream of bubbles escapes from her mouth, you know she's struck gold—probably literally. You also know you both need to get out of there.\n\t\t\t\t\t\t*goto out_of_office\n\t\t\t\t\t#Sign \"let's go\" to Kassie.\n\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\tYou sign, \"Let's go,\" but Kassie is looking at the key and doesn't appear to notice. If you weren't holding your breath, you'd sigh in exasperation. You swim over. \"Let's go,\" you tap on her arm, but she just grins at you and fits the key into a drawer of the desk.\n\n\t\t\t\t\t\tIt fits, and the drawer opens. There are papers (long since rotted to fragments), three staplers bearing the company logo—and a plain gold wedding ring.\n\n\t\t\t\t\t\tGold. Literally.\n\n\t\t\t\t\t\tKassie slips it onto her finger, and then it's time to go.\n\t\t\t\t\t\t*goto out_of_office\n\t\t\t\t\t#Let Kassie do her thing while I imagine where the office manager might live now.\n\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\tMost of Old Sydney moved to New Sydney, a triumph of engineering—especially if you like dirt and darkness. You don't like to think of the office manager losing their glorious views of Sydney Harbour to live in a hole, no matter how fancy that hole might be.\n\n\t\t\t\t\t\tKassie's circled the desk and found a locked drawer. You can tell from the set of her shoulders that her own breath is in short supply, and she's trying to remain calm to make it last longer.\n\n\t\t\t\t\t\tWhen a massive stream of bubbles escapes from her mouth, you know she's struck gold—probably literally. You also know you both need to get out of there.\n\t\t\t\t\t\t*label out_of_office\n\n\t\t\t\t\t\tKassie grabs your hand, and you both swim back the way you came at the fastest speed you can manage with no air. Your vision is turning to sparkles, but it's not much farther to the speeder.\n\t\t\t\t\t\t*goto post_out_of_office\n\n\t#\"I want to be surprised. Let's go somewhere no one else would go.\"\n\t\t*set curiosity %+10\n\t\tKassie nods, looking pleased. She's always game for anything. You both begin the breathing exercises that let you last underwater for minutes at a time and gain some control of your buoyancy. When you feel the heavy sensation that says your lungs are ready, you push the button to open the lower door of the speeder. It always feels like magic to see the water waiting for you, flat and calm, instead of rushing inside.\n\n\t\tYou flop your tail over the edge, shivering as the water rushes through the million cracks and holes in the aluminum, tickling your skin as the tail's cavity fills up.\n\n\t\tThen you push off the edge and fall down into the dark water, twisting around and swimming in a random direction.\n\t\t*choice\n\t\t\t#Check that Kassie is close behind.\n\t\t\t\t*set empathy %+10\n\t\t\t\tYou glance back and see Kassie tapping the code to close the speeder. She twists around and kicks her legs, and the two of you swim deeper side by side. \n\n\t\t\t\tIt feels like home, being surrounded by water, but everything here is square. You instinctively swim to a gap between buildings, finding a muddy sludge of darkness where rotted trees and grass surround you. As you spot a human figure through the murk, you jerk backward in shock, grabbing Kassie at the same time.\n\t\t\t\t*goto apollo\n\t\t\t#Race Kassie to see who can go deeper.\n\t\t\t\t*set empathy %-10\n\t\t\t\tIt feels good to have the water rush past your face and to power your entire body with your hips. The sea is your domain, after all, which means you'll always be on the winning side of nature's wars.\n\n\t\t\t\tIt's like home, being surrounded by water, except everything here is square. You instinctively swim to a gap between buildings, finding a muddy sludge of darkness with rotted trees and grass all around. As you spot a human figure through the murk, you jerk backward in shock, suddenly wishing you were closer to Kassie.\n\t\t\t\t*goto apollo\n\t\t\t#Stick to a steady pace and stay aware of my surroundings.\n\t\t\t\t*set curiosity %-10\n\t\t\t\tYou glance back and see that Kassie's just tapping the code to close the speeder. She twists around and kicks her legs, and the two of you swim deeper side by side.\n\n\t\t\t\tIt feels like home, being surrounded by water, but everything here is square. You instinctively swim to a gap between buildings, finding a muddy sludge of darkness where rotted trees and grass surround you. As you spot a human figure through the murk, you jerk backward in shock, grabbing Kassie at the same time.\n\t\t\t\t*label apollo\n\n\t\t\t\t\"Apollo,\" Kassie taps on your arm. For a moment, you wonder how she could already know someone who lives in Old Sydney—then you realize it's a statue.\n\t\t\t\t*choice\n\t\t\t\t\t#Investigate. After all, that's what I'm here for.\n\t\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\t\tYou swim closer, noting several other classical human figures around a raised border. It takes a moment for you to recognize that this was a fountain. \n\t\t\t\t\t\t*goto fountain\n\t\t\t\t\t#Point at my chest and then upward to indicate I'm running out of breath.\n\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\tKassie just shrugs, softening her lack of consideration with a smile before she swims over to Apollo. You follow her, noting several other classical human figures around a raised border. It takes a moment for you to recognize that this was a fountain. \n\t\t\t\t\t\t*goto fountain\n\t\t\t\t\t#Compliment Kassie on her knowledge.\n\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\tYou sign, \"Clever!\" and she beams at you before swimming over for a closer look. You follow her, noting several other classical human figures around a raised border. It takes a moment for you to recognize that this was a fountain. \n\t\t\t\t\t\t*label fountain\n\n\t\t\t\t\t\tApollo's missing what was once an outstretched bronze arm, but you find it below him, cracked into an elbow piece and a hand piece. You pick them both up, giving Kassie the elbow.\n\t\t\t\t\t\t*goto out_of_office\n\n*label got_it\n\nYou swim upward hard, heading straight for the speeder and air. \n*label post_out_of_office\nAs soon as you're close you panic, not knowing the code to open the lower hatch.\n*fake_choice\n\t#Calm down. I've got this.\n\t\t*set poise %+10\n\t\tYou enter the code like you're done a million times before. It wasn't like you to panic, and it won't happen again.\n\n\t#Swim to the surface and get a breath there.\n\t\t*set athletics %+10\n\t\tIt's a fair way, but that doesn't matter because you're an excellent swimmer. You get a few proper breaths and then dive back to the speeder and climb inside, no problem.\n\n\t#Trust Kassie. She'll do it.\n\t\t*set appraisal %+10\n\t\tYou know Kassie better than you know yourself, and being low on breath is when she's at her best. She enters the code without hesitation, and you both go inside.\n\nKassie holds onto the hatch with one hand and signs, \"Yeah yeah yeah!\" with the other.\n\nIt's a relatively long journey home, so she ducks back under the water to do the usual checks for damage on the speeder's outer shell. It's not the brittle, fragile glass Drylanders use, but it can still be cracked, especially in a crowded and dirty environment like Old Sydney. If there's any damage, she'll give it a temporary patch before the fractures have a chance to get worse.\n*goto post_explore\n\n*label explorethree\nKassie manually steers the speeder toward the hexagonal building, giving the open scaffolding at the top of the Deutsche Bank skyscraper a wide berth. There's no sign of movement there, so it seems the hanging shape is just a warning to stay away. That's a message clear enough that even Kassie obeys. \n\nIt's fun to leave the top of the speeder open and enjoy the hot wind on your face. When you reach what your map tells you is the World Tower, Kassie cuts the engine and takes you on a slow circle around the building. The washing hangs like bunting all the way around the apartments. Most of the clothing is badly faded, turning into shades of gray and brown. You can see faded business suits and pencil skirts, plus a row of oddly-shaped cloths.\n\n\"Nappies,\" Kassie signs. \"Someone's got a baby.\"\n*choice\n\t#\"Kassie, let's go closer—slowly—and I'll keep my head and hands visible.\"\n\t\t*set curiosity %-10\n\t\t\"Okay,\" she taps on your arm, taking the speeder gently toward the building.\n\n\t\tYou wave an arm in what you hope is a nonthreatening manner and scan the windows for faces. You see a hint of movement a couple of floors above you, and as you move closer, you spot two adults standing in the window. It's impossible to see their features.\n\t\t*goto sight\n\t#Grab the trading flag. I bet they lack supplies, and we can make a nice profit out of junk.\n\t\t*set empathy %-10\n\t\tYou rummage around for a moment and then find the yellow-and-blue square of fabric that is the international signal for \"peaceful meeting.\" Holding it high, you wait for a response.\n\n\t\tThere's a hint of movement a couple of floors above you, and as you move closer, you see two adults standing in the window. It's impossible to see their features or even tell if they're male or female or neither. They're holding some kind of cloth, but you can't make out what color it's meant to be.\n\t\t*goto sight\n\t#Shout, \"Hello? Is anyone there?\"\n\t\t*set curiosity %+10\n\t\t\"I'll take us closer,\" Kassie taps on your leg.\n\n\t\tAs the speeder moves in, you keep scanning the waterline, looking for movement. Suddenly you realize you're looking at the wrong place. A couple of floors above the water, two adults stand silhouetted in a window. It's impossible to see their features or even tell if they're male or female or neither.\n\t\t*goto sight\n\n*label sight\n*fake_choice\n\t#\"Make sure you lock the speeder, Kassie. This isn't like home.\"\n\t\t*set empathy %-10\n\t#\"I think they're scared of us.\"\n\t\t*set empathy %+10\n\t#\"Let's just stick to the plan: talk, then go home.\"\n\t\t*set flexibility %-10\n\"Okay,\" she taps on your leg, and she lets the current carry you closer.\n\nOne of the people raises a hand, but it's not clear if they're signaling \"hello\" or \"stop.\" It's almost comforting to see that Drylanders are as useless with nonvocal communication as you've been told. Even back on Kota, the older residents can usually only speak the basics of tapping rather than the full range that comes so naturally to your age group.\n\nFortunately, the Drylanders move across to a smashed window and lower a rope ladder made out of knotted electrical cords. That's definitely an invitation.\n\nYou climb up the swaying ladder, glad for your hard-won upper body strength as your legs dangle uselessly, and find yourself in a large, dimly lit room. There are water damage marks high on the walls, and at least twenty people are looking at you. One of them is a little boy of six or so.\n*choice\n\t*if (legs > 1) #\"Hey, kid. Let me guess: you'd like to look at my awesome legs.\"\n\t\t*set empathy %+10\n\t\tHe looks up at his father, who nods permission. As Kassie comes in the window, the boy is crouched down in front of you, touching your leg so gently it's as if he thinks you could feel pain through all that metal and plastic and Glass. \n\t\t*if legs = 3\n\t\t\tHe gasps in shock as you detach your crutches from their magnets, then claps as you expand them to their full length.\n\n\t\t\tThe adults sidle closer, and you ask Kassie if she'd like you to translate for her. \n\t\t\t*goto chatty\n\t\t*else\n\t\t\tHe laughs as you bounce up and down, showing him the springiness of your running legs and explaining how they work. The crowd parts, and the child leads you to a perfectly long, straight corridor where you can run so fast you feel like you're flying.\n\n\t\t\tYou return, panting, to the large room, where you ask Kassie if she'd like you to translate for her. \n\t\t\t*label chatty\n\t\t\tShe shakes her head, choosing to let you run the conversation while she uses the opportunity to narrowly observe people while they think she's busy lipreading. \n\t\t\t*fake_choice\n\t\t\t\t#Tell them about the tornado Kota Perahu had to race away from last year.\n\t\t\t\t\t*set connections %+10\n\t\t\t\t\tThe Drylanders listen, rapt, as you talk about the hasty firing up of Kota's engines when it was in real physical danger. You thought it might be impolite to tell such a tale to Australia's most fixed community, but they're fascinated.\n\n\t\t\t\t#Listen to them talk.\n\t\t\t\t\t*set foreknowledge %+10\n\t\t\t\t\tThey tell you about a recent spate of earthquakes. You don't experience earthquakes at sea, so it's fascinating to hear all about the experience. They sound like storms but much jerkier.\n\n\t\t\t\t#Take my chance to do some more running.\n\t\t\t\t\t*set athletics %+10\n\t\t\t\t\tYou beg for another lap of the corridor, and the Drylanders laugh and cheer as you run up and down, enjoying the strange experience of running on land.\n\n\t\t\tYou part as friends, and you and Kassie descend the ladder back to the speeder in a cheerful frame of mind.\n\t\t\t*goto post_explorethree\n\t*if (legs = 1) #\"Hey, kid. Wanna see me pull a coin out of my leg?\"\n\t\t*set empathy %+10\n\t\tHe looks up at his father, who nods permission. As Kassie comes in, the boy is crouched down in front of you, touching your leg as gently as if it might dent from the featherlight touch of his fingers. He laughs, realizing the limb isn't made of flesh.\n\n\t\tHe gasps in shock as you pop open the hidden latch and show him your spare change compartment.\n\n\t\tThe adults sidle closer, and you ask Kassie if she'd like you to translate for her. \n\t\t*goto chatty\n\t#I stand tall and openly stare at them. Drylanders don't scare me.\n\t\t*set empathy %-10\n\t\tKassie climbs up behind you and waves at the people. Finally, one of the women greets you and asks where you're from. \n\n\t\t\"Kota Perahu,\" you say, and watch the recognition wash over the room. Back when Kota Perahu was first built, the Australian public donated massive amounts of funding, medical and industrial equipment, and, of course, the Glass that is so essential to every floating city.\n\t\t\n\t\tSomeone whispers, \"First Generation,\" to someone who doesn't know Kota's history, and they immediately look at you with new respect. Kota Perahu is one of the best floating cities in the world, and these people know it.\n\n\t\tYou ask Kassie if she'd like you to translate for her. \n\t\t*goto chatty\n\t#\"Do you all live here? What's it like?\"\n\t\t*set curiosity %+10\n\t\t\"Normal,\" says a man.\n\n\t\t\"Hot,\" says the woman next to him at the same time.\n\n\t\tKassie climbs over the window frame and smiles around at everyone. You ask her if she'd like you to translate for her. \n\t\t*goto chatty\n\n*label post_explorethree\n\nYou speed away from the Drylanders' strange home, but Kassie isn't done yet.\n\n\"Do me a favor?\" she signs with an uncharacteristically bashful smile. \"Put your tail on. I want to show you something.\"\n\nYou detach your legs awkwardly as she hops in the water to get out of your way. It's never easy putting your tail on, but being in a speeder at the same time leaves you hot and sweaty, bruised from banging against the Glass sides.\n\n\"Ready?\" Kassie signs with one hand. Without waiting for an answer, she takes a breath and disappears under the water.\n*goto post_explore\n*label ksharkbitone\n\nKassie pops back up, but something is very wrong. Her pupils are so dilated her eyes look black, and she stares at you as if she's never seen you before.\n\n\"Help,\" she signs at you with eerily robotic movements. \"Stuck. Bleeding. Help.\"\n*fake_choice\n\t#\"Kassie, that's not funny. You're scaring me.\"\n\t\t*set flexibility %+10\n\t\t\"Help,\" she signs again and then blinks. \n\t#\"Whatever's going on in the water, it's nothing to do with us.\"\n\t\t*set empathy %-10\n\t\t\"Yes it is!\" she signs in her own normal style.\n\t#\"Who's stuck?\"\n\t\t*set empathy %+10\n\t\t\"Help,\" she signs again and then blinks. \n\nHer eyes focus on you, but they're still wide and black. \"I'm doing an experiment.\"\n\n\"On me?\" you ask.\n\n\"On myself.\" \n\nIt's your turn to let your hands drop to your sides so you don't say something you might regret.\n\n\"I made tek implants and put them in my head,\" she signs. \"So I can feel…things. Sea creatures. There's one here—\" She waves an arm vaguely at the water. \"It's hurt. I can feel it. Actually it's hard not to feel it. It…feels like it's me.\"\n*fake_choice\n\t#\"You need to get out of the water.\"\n\t\t*set curiosity %-10\n\t#\"What do you want me to do?\"\n\t\t*set flexibility %+10\n\t#\"This isn't anything to do with us.\"\n\t\t*set empathy %-10\n\"I need to stay in the water, so I can still feel it,\" she says. \"Follow me?\" \n*return\n*label ksharkbittwo\n\nThere's a fully-grown shark right in front of her!\n*fake_choice\n\t#I steer the speeder between Kassie and the shark.\n\t\t*set curiosity %-10\n\t\tThe speeder has never been slower, but you manage to block Kassie's access to the open mouth of the enormous Great White.\n\t#I abandon the speeder, swimming over to grab Kassie and get us both safely home.\n\t\t*set flexibility %-10\n\t\tThe lower hatch takes forever to negotiate, but you wriggle through at last and grab Kassie's legs, dragging her away from the open mouth of the enormous shark.\n\t#I crash the speeder into the shark.\n\t\t*set empathy %-10\n\t\tThe speeder has never been slower, and just as you're about to smash into the enormous shark, Kassie realizes what you're doing. She swims right into your path, forcing you to stop.\n\nKassie turns to you in a fury—but at least it's definitely her. \"Stop getting in my way!\" she signs viciously. \"I'm going to help this shark whether you like it or not!\"\n\nShe's running out of air, and she comes through the lower hatch to catch her breath. Her eyes are still badly dilated, and you're not sure if she's capable of being rational or not.\n\nThis shark isn't playing dumb. It's truly stuck, and somehow Kassie's mind is stuck with it.\n*fake_choice\n\t#\"Kassie, slow down and let's talk about this!\"\n\t\t*set curiosity %-10\n\t#\"This isn't right!\"\n\t\t*set flexibility %-10\n\t#\"This is amazing! I'm in!\"\n\t\t*set curiosity %+10\n\"They're coming,\" she signs frantically and ducks back into the water. She swims right at the shark and, at the last moment, kicks her way past its open mouth. To your surprise, it doesn't lunge at her. In fact, it seems to shift its head aside to make room for her.\n*return\n*label post_explore\n*gosub ksharkbitone\nShe drops beneath the surface and hits the switch to close the speeder. \n\nWhatever's causing her weird behavior, she doesn't deserve to die for it. You jab the button to follow her, snaking between ancient power lines and into an underground gap that turns out to be the elaborate entrance hall of an overdecorated office block.\n\nKassie goes straight to the gaping hole where an elevator used to be and reaches out her hands.\n*gosub ksharkbittwo\n\nKassie swims to the place where the shark's tail is caught in the rusted elevator cables, and she pushes at the cables, struggling against the inertia of the water. \n\nThe shark's blood stains the dusty water, and suddenly you know there's a time limit to this rescue. \n\nOther sharks are coming—and they're not coming to help. They're coming to feed.\n*choice\n\t#I dive into the water to force the cables apart—I reckon I'm stronger than Kassie.\n\t\tYou really hope you're not about to get yourself eaten.\n\n\t\tThe shark's enormous head turns to follow you as you swim past, but it doesn't snap its teeth like you expect. Perhaps Kassie has some kind of hold over it.\n\n\t\tShe's tugging at one cable with both hands, angling her body and trying to press her feet against one of the other cables for leverage. As you approach, she moves aside without looking as if she'd sensed you coming. \n\t\t*if athletics > 10\n\t\t\t*set kassandra %+10\n\n\t\t\tYou grab two cables and push them apart. It's not easy, but you can do it. Kassie pushes on the shark's tail, and it swims forward. It's free!\n\t\t\t*goto uhoh\n\t\t*else\n\t\t\tYou grab two cables and try to push them apart, but it's no use. You're not as strong as you thought.\n\t\t\t\n\t\t\tKassie grabs your hands and places them both on a single cable, tapping on your wrist, \"On my signal.\" When she nods, you pull as hard as you can, and Kassie does the same. \n\n\t\t\tThe shark swims free!\n\t\t\t*goto uhoh\n\t#I keep watch for the approaching sharks—I reckon I'm more focused than Kassie.\n\t\tIt's hard to see through the dusty water, but you carefully scan all the entrances. You're growing increasingly uncomfortable with the fact that the entire foyer is a celebration of plate glass, and most of that glass has long since broken, leaving you vulnerable in all directions.\n\n\t\tYou glance at Kassie, who seems to be struggling with separating the elevator cables to free her new shark friend. \n\t\t*if flexibility \u003c 50\n\t\t\t*set kassandra %+10\n\n\t\t\tIt's hard to tear your glance away, but you know you're the only one keeping an eye out, so you force yourself to keep watching for the danger you know is coming.\n\n\t\t\tKassie's head pops back into the speeder, startling you. She gives you a thumbs-up as her shark swims past you to freedom, making the speeder rock from side to side.\n\n\t\t\t\"Thank you,\" Kassie signs.\n\t\t\t*goto uhoh\n\t\t*else\n\t\t\tHow long has she been underwater? You squint, trying to see her more clearly. Is she losing her grip on the cable? \n\n\t\t\tThe shark moves suddenly, startling you. It swims past you and away. Kassie did it!\n\n\t\t\tKassie's head pops back into the speeder, and she gives you a thumbs-up.\n\t\t\t*goto uhoh\n\t#I keep the speeder close by so Kassie can get back in quickly when she's ready.\n\t\t*set curiosity %-10\n\t\tThe whole foyer is made up of plate-glass windows, and most of them are missing. Kassie's injured shark doesn't appear to be a threat, but there are others on the way. They can sense the blood, and they're hungry. Wild sharks are always hungry.\n\n\t\tYou glance at Kassie, who seems to be struggling with separating the elevator cables to free her new shark friend. She angles her body awkwardly, pushing against a cable with her feet until the gap is big enough to let the shark swim free. \n\n\t\tKassie pops her head back into the speeder, and she gives you a thumbs-up before signing, \"Thank you!\"\n\t\t*goto uhoh\n*label uhoh\n\nYou grin at Kassie, but she doesn't grin back. Her eyes are darker than ever, and she cocks her head as if listening to something.\n\nKassie doesn't do that.\n\nYou turn and see two more sharks approaching. The shark you just rescued swims away at top speed, and the other two pause as if thinking before heading straight for you.\n\nKassie's movements are jerky. Instead of climbing inside the speeder with you, she holds her hands out into the water and scrunches her eyes shut, concentrating with all her might. Then suddenly, her whole body goes limp, and she slips downward in the water.\n\nHer mouth hangs open. \n*fake_choice\n\t#I drag her inside as quickly as possible.\n\t\t*set curiosity %-10\n\t#I watch to see what happens.\n\t\t*set flexibility %+10\n\t\tShe drifts lower. The sharks come closer, but they pause as if an invisible barrier is holding them back. You wonder if Kassie is truly controlling them, and you stay as still as possible, watching.\n\n\t\tKassie convulses, and bubbles come from her mouth. The sharks swim forward again!\n\n\t#I dunk my head under the water, since that seems to aid communication.\n\t\t*set empathy %+10\n\t\tKassie drifts lower in the water. The sharks come closer, but they pause as if an invisible barrier is holding them back. You wonder if Kassie is truly controlling them, and you stay as still as possible, watching.\n\n\t\tYou're running out of breath—which means Kassie is too.\n\nYou grab Kassie by the bikini strap and pull as hard as you can. She's light and easy to maneuver until you get her head above the water, and then she's a dead weight. \n\nGasping and groaning with the effort, you haul her up to safety, feeling a burning pain in your shoulders and back because this is such an awkward angle.\n\nThen she's inside, and you slam the hatch closed.\n\nThe two sharks circle beneath the Glass, watching as you slap Kassie's face and check her breathing. They're creepy, but they're not what worries you anymore.\n\nKassie's alive. But she doesn't wake up. \n*finish Chapter Two\n", "chapter_seven": "*set somethings_coming 4\n*comment From now on temp_four = 1 means PC's job is shark farming (2 = lied that it is). temp_four = 3 means shark farmer @ New Sydney; temp_four = 4 means applied for New Sydney job but don't get it until later. temp_four = 5; said publicly (or told Dad) that you hate the farm.\n*comment if facts = 1, there's a shark with mind implants\n*set temp_four 0\n*set reputation %+10\n*set appraisal %+10\n*set value_farm %-10\nIt's night when you're woken by enhanced-volume tapping on the lower hatch of your room. Kassie. \n*choice\n\t#Open the hatch at once.\n\t\t*set empathy %+10\n\t\t*label open\n\t\tYou open the hatch and let Kassie in. She hugs you, making you almost as wet as she is, and then stands back without letting go of your shoulders.\n\t\t*if temp_three > 0\n\t\t\t\n\t\t\t\"Ouch!\" you say, abruptly reminded of your injuries.\n\n\t\t\tKassie's eyes fill with sympathetic tears. \n\t\t\t*goto kass_chat\n\t\t*else\n\t\t\t*goto kass_chat\n\t#Tell her to come back in daylight; I need my rest.\n\t\t*set empathy %-10\n\t\t\"Let me in,\" she taps again, tossing in some cussing.\n\n\t\t\"I've had a long and extremely traumatic day,\" you tap back.\n\n\t\t\"Staying until you let me in,\" she taps, \"or I drown.\"\n\n\t\tUgh.\n\n\t\t*goto open\n\t#Check it's her.\n\t\t*set curiosity %-10\n\t\tYou set the Glass to transparent and see Kassie hanging suspended in the water like some kind of mermaid. Yep, that's her alright.\n\n\t\t*goto open\n*label kass_chat\n\"I felt it,\" she signs, and you don't need the awful gesture of explosion to understand exactly what she means. \"I was so scared, and I didn't know where you were.\"\n\nYou hug her. She's still dripping, and shaking too.\n\n\"It's alright Kassie. I'm alright.\"\n\nShe steps back at last and glares at you. \"Don't ever do that again.\"\n\n\"Save the farm?\" you sign back with vicious strokes of your hands. \"Rescue dozens, perhaps hundreds of people?\"\n\n\"Yes,\" she says. \"That.\"\n*fake_choice\n\t#\"No promises. Being a hero suits me.\"\n\t\t*set empathy %-10\n\t#\"No more heroics. Got it.\"\n\t\t*set curiosity %-10\n\t#\"I was so scared.\"\n\t\t*set empathy %+10\nHer eyes are bright with tears.\n\n\"I'm alright, Kassie,\" you sign again, wrapping a thick towel around her and drawing her into a chair. \"Are you?\"\n\nShe's still visibly shaking. \n\n*if kassie_love > 0\n\tYou feel something in the air, and suddenly you know your friendship with Kassie stands on a knife-edge. If you reach out a hand and touch her, everything will change. If you don't, the moment will be lost forever.\n\t*choice\n\t\t#Stay still. Our friendship is perfect the way it is.\n\t\t\t*set kassie_love 0\n\t\t\tKassie is watching you closely, and she's no longer concerned for your physical welfare. This is something else.\n\n\t\t\t\"How's things with you then?\" you sign with deliberation. \"What's happening with the mind implants?\"\n\n\t\t\tShe pauses for a long moment, and you know you've hurt her. Then she gathers her thoughts and spouts utterly incomprehensible technobabble for over an hour.\n\n\t\t\tAt last she draws to a halt.\n\n\t\t\t\"Feel better?\" you ask.\n\n\t\t\t*goto okay\n\t\t#\"I love you, Kassie. I always have.\"\n\t\t\tYou take Kassie's cold hand and tap the words into her palm.\n\n\t\t\tShe stares at you, and for an awful moment you're certain you've said exactly the wrong thing. Then she smiles, and you explode into a thousand butterflies. Her hand is suddenly holding yours so tightly it hurts in the best possible way. You're pretty sure that if she lets go, you'll float away. And you definitely want to stay here, no matter how terrified you are.\n\n\t\t\t\"Wait,\" she signs suddenly, and your stomach drops horribly. \"You do mean romantically, don't you?\"\n\n\t\t\t\"Yes,\" you whisper, dropping your head in a nod.\n\n\t\t\t\"Good,\" she says, and kisses you.\n\n\t\t\tThis is no gentle brush of lips but an electric shock that shoots through you and sets your whole body on fire. You feel dizzy and cling on to her to keep your balance.\n\n\t\t\tAt last Kassie sits back, grinning calmly. \"Well, it's late. I should be going.\"\n\t\t\t*goto lovey\n\t\t#Reach out to her.\n\t\t\tYour arm weighs more than a central sphere, but you manage to move it, wondering all the while why it's so difficult. Kassie turns her blazing eyes on you and grabs your hand in midair. You freeze like a baby tuna in front of a shark, terrified.\n\n\t\t\tKassie brings your hand to her mouth, keeping her eyes on you. She kisses your fingers, and you huff out a great breath of relief.\n\n\t\t\tThen she leans forward, still watching you for the slightest sign of dismay. You realize suddenly that she's going to kiss you and all your fear returns tenfold, even though it also seems like a very good idea. Kassie pauses, seeing your confusion. She's still holding your hand in hers, so you draw her hand toward you and kiss it.\n\n\t\t\tAll of a sudden, you want to kiss her all over and hug her so hard no one can ever pry you apart. So you kiss her properly, and she kisses you, and it is good. It is so good that the whole world, for a moment, is in a state of perfect bliss. \n\t\t\t*goto lovey\n*else\n\t*label okay\n\t\"Yes,\" she signs at last. \"I just had to see for myself that you were alright.\"\n\n\tWith that, she leaves you alone. You climb back into bed and fall asleep at once.\n\t*goto post_kassie\n*label lovey\n\t\nYou spend a long time clinging together as if either one of you would drown without the other, and then suddenly you notice the sun is rising outside. When did that happen?\n\n\"I should go home,\" says Kassie.\n*fake_choice\n\t#\"Stay with me.\"\n\t\t\"I want to,\" she signs, \"but my parents don't know that Folami's at my place, and she doesn't know they don't know.\"\n\n\t\t\"Yesterday was complicated.\"\n\n\t\t\"Today is better,\" she signs. \"But I still have to go.\"\n\n\t\tYou pout at her until she kisses you again, and then she's gone.\n\t#\"I'll miss you.\"\n\t\t\"I'll miss you too,\" she signs. \n\n\t\tIt's a near thing, but you manage to catch yourself before signing, \"I'll miss you more.\"\n\n\t\tJudging by her expression, she knows you're thinking it. And she still doesn't despise you.\n\n\t\tThe pair of you are disgusting, and it feels amazing.\n\t#\"Are we dating now?\"\n\t\t\"Yes,\" she signs. \"Aren't we?\"\n\t\t\n\t\t\"Yes,\" you say. \"I just wanted to check.\"\n\n\t\t\"I approve,\" she says, then kisses you goodbye and slips away.\n\n*label post_kassie\n\nIt's a new day, and there's a lot to do. Any other day that was so vital for the shark farm would require your presence from dawn, but your parents are still treating you with unusual care. If only you were sufficiently relaxed to continue sleeping all day.\n\nYou feel dazed and blurry, and you spend a good ten minutes staring at your breakfast before you eat it. Bit by bit, you remember how to brush your teeth and hair and get dressed. The shark farm was bombed. It really happened. \n*if kassie_love = 1\n\tYou and Kassie are in love. That was real too.\n\t*goto meh\n*else\n*label meh\n\nIt's too much for you to take in.\n*fake_choice\n\t#Rest.\n\t\tYou go back to bed expecting to fall asleep at once. But as soon as you lie down your mind fills with questions, and eventually they drive you to put on your all-purpose legs and get moving.\n\t#Go to the farm.\n\t\tYou choose your all-purpose legs, not knowing what the day will bring.\n\t#Call Kassie.\n\t\t\"Hey,\" she signs. \"How are you doing?\"\n\n\t\t\"Did you come to my sphere last night?\"\n\n\t\tShe nods. \"That wasn't a dream. How's things at the farm?\"\n\n\t\t\"I don't know. I need to go and find out.\"\n\n\t\t\"Fair enough. Just be careful.\"\n\n\t\tYou agree fervently and then click off to put on your all-purpose legs.\n\nThe short journey to the shark farm feels like it takes a million years. The news cycle is waking up, brimming with so many opinions and counteropinions that it's impossible to tell how Kota as a whole is responding to Alive's attack. The feed is giving you a headache, but you don't switch it off. Surely somewhere in that noise is the answer to your question: Are we okay?\n\nYou walk through the same main entrance as everyone else, bristling at the sight of more terror tourists babbling with pretend fear. They scare themselves into real nerves, like cats jumping at shadows. \n\nThen you spot Ahmed and Musa, the hated dolphin farmers. It's unusual to see them together; one or both is almost always on site at their own farm, if only to make a show of being concerned that your naughty sharks might cause trouble among their sweet, innocent dolphins.\n*fake_choice\n\t#Confront them.\n\t\t*set poise %+10\n\t\tYou push through the crowd, ignoring the whispers that follow you as you're recognized, and stand in front of Ahmed and Musa. \"What are you doing here?\"\n\n\t\t*if connections > 40\n\t\t\t\"Hello, ${name},\" says Musa. \"Are you alright?\"\n\n\t\t\tThe question is so genuine and human you almost burst into tears. You sign, \"I'm fine,\" so you don't have to speak aloud.\n\n\t\t\t*goto nice\n\t\t*else\n\t\t*label nice\n\n\t\t\"We wanted to offer our help,\" says Musa. \"If we can.\"\n\n\t\t\"Oh,\" you say. \"Well, that's nice.\"\n\n\t#Watch them.\n\t\t*set appraisal %+10\n\t\tThey stand a little apart from the tourists, keeping their eyes averted as if they disapprove. Perhaps they're not here to cause trouble after all.\n\n\t#Call Dad to warn him.\n\t\t*set bargaining %+10\n\t\tDad answers right away. It seems your new \"seniority\" means you suddenly have a higher priority than before.\n\n\t\t\"I'm at the door,\" you tap to him. \"The dolphin farmers are here too.\"\n\n\t\t\"It's alright,\" he says. \"They called ahead. It's possible they mean well. In any case, public opinion is on our side.\"\n\nYou follow Ahmed and Musa into the farm, where they head up the ladder to Dad's office. Whatever their plan is, it's not to make a public spectacle. But that doesn't make you any calmer. \n\nThe sun is bright, and there's not a cloud in the sky. Yesterday's attack has become history: a real thing that happened. You wonder if it will change anything about the farm. If people stop eating shark meat, the farm would suffer, but so would Kota. You are painfully aware of the stats about how much food is produced in Kota, and the farm is a crucial piece of the puzzle.\n\nYou shudder to think what could have happened \n*if temp = 0\n\tif you and Mom hadn't managed to lower the bomb into deeper water.\n\t*goto reporters\n*if temp = 1\n\tif you hadn't set off the evacuation alarm.\n\t*goto reporters\n*if temp = 2\n\tif you had put off ringing the alarm for just a few more minutes.\n\t*goto reporters\n*else\n\tif the public had still been inside the farm.\n*label reporters\n\nA gaggle of reporters spots you and starts heading over. If you can convince them everything is under control, then everyone wins. But if you talk like a panicked teenager who nearly died, things will get much worse than they already are. It's vital you don't screw this up.\n*choice\n\t#Talk to them calmly. I got this.\n\t\t*if poise > 40\n\t\t\t*set reputation %+10\n\t\t\t*set value_farm %+10\n\t\t\tYou stand still and let them come to you, taking the time to steady your breathing and mentally rehearse what you will say in answer to the inevitable questions about farm security. \n\n\t\t\tThe reporters gather like fluttering birds, and you realize you have all the power in this scenario. You choose a woman with a blue microphone indicating that she prefers sign language and gesture for her—and only her—to come closer.\n\n\t\t\tThe rest fall back, disappointed, and continue filming as you have a strangely calm signed conversation with the reporter you chose. She is well aware that you have plenty of options, and she keeps her questions polite and on topic. You try not to grin too much as you become increasingly aware that you're benefiting both the farm and yourself. It's actually kind of fun to be the center of attention.\n\t\t\t*goto repairs\n\t\t*else\n\t\t\t*set value_farm %-10\n\t\t\t*set reputation %-10\n\t\t\tAs the mass of shouting reporters and cameras draws closer, you feel horribly like a solo fish being run down by an entire school of sharks. They're going to tear you apart.\n\n\t\t\tYou feel the sweat literally dripping down your forehead and running through your hair, and you already know you're doing badly. Dad's going to be mad at you. You stammer answers to some of the questions they hurl at you before turning and literally running away. The only good news is that your all-purpose legs are faster than theirs.\n\t\t\t*goto repairs\n\t#Avoid them. Better safe than sorry.\n\t\tYou turn and make a beeline for the sheds. Even among a crowd of curious tourists, the stink of the sheds is enough to keep people away. Best of all, the sheds have locks—and you have clearance.\n\t\t\n\t\tYou shut and lock the door behind you and take a calming breath. You immediately regret taking such a deep breath, and you sit on a suspiciously damp-looking crate as you cough and gag.\n\n\t\tSitting and waiting is making you feel worse, so eventually you actually clean a little. When you're sure the press have gone, you emerge. You didn't make a fool of yourself, but it doesn't quite feel like a win either.\n\t\t*goto repairs\n\t#Grab one of the steadier staff members and set the reporters on them.\n\t\tYou recognize several staff members nearby. Not as many as you would have thought. There's Kadek Siti, still looking slightly miffed at dealing with so much slime yesterday. There's Nick—or is it Mike?—who's been around absolutely forever. And the closest person is Jahan, \n\t\t*if appraisal > 30\n\t\t\t*set value_farm %+10\n\t\t\twho once convinced you she was a Nigerian princess. Someone who can lie that well is perfect, as long as she's loyal to the farm. You vaguely remember that her cat is sick. Whatever she feels about her employer, she needs this job. \n\n\t\t\t\"Jahan!\" you tap on her arm in the few seconds before the press is upon you. \"If you can convince Kota the farm is fine, you'll get a pay rise.\"\n\n\t\t\tShe nods once and then steps forward to meet the press. You're left watching a masterclass of fake confidence. She's so charming, even the reporters don't mind that she's not answering all of their questions. Jahan has well and truly earned her pay rise and should probably be assigned to more marketing and press tasks in future.\n\t\t\t*goto repairs\n\t\t*else\n\t\t\t*set value_farm %-10\n\t\t\twho has a massive, bad-tempered, smelly cat. You grab Nick and push him into the path of the reporters. At first, the reporters are hesitant to take the bait. He doesn't look nearly as interesting as you \n\t\t\t*if temp_three > 0\n\t\t\t\tand your obvious injuries.\n\t\t\t\t*goto uhoh\n\t\t\t*else\n\t\t\t\tdo.\n\t\t\t*label uhoh\n\t\t\tBut when he immediately launches into a screed against your parents, they brighten up at once. You watch in horror as he calls your mother \"more shark than human\" and your father \"a profit-obsessed eye in the sky\". This is bad. This is really bad.\n*label repairs\n\nThe reporters take a little more footage of \n*if temp = 0\n\tthe disappointed tourists realizing the farm is just fine, \n\t*goto leave\n*else\n\tthe cracked observation deck and \n*label leave\nthen leave. You head for the staff room and sink into a chair, shocked that it's still morning.\n\nSomeone you don't even know asks you why you came in on such a day. \"Don't you have TV to watch, or a hobby, or a date?\"\n*choice\n\t#\"You're right. I'm out of here.\"\n\t\t*set flexibility %+10\n\t\tIf ever you had an excuse for a paid day off, \"saved the farm from terrorists\" is definitely it. And now that you think of it, you have other places to be. Fun places. Places that smell a lot better. \n\t\t*if (yunus_love = 1) or (kassie_love = 1)\n\n\t\t\tAnd one rather nice-smelling (not to mention nice-looking) individual in particular.\n\t\t\t*goto choose\n\t\t*else\n\t\t*label choose\n\t\t*choice\n\t\t\t#See if Yunus is free.\n\t\t\t\t*set yunus %+10\n\t\t\t\tYou tap out a quick query, and Yunus replies right away, \"Aren't you at work?\"\n\n\t\t\t\t\"I have the day off.\"\n\n\t\t\t\t\"Awesome. Why?\"\n\n\t\t\t\tYou hesitate. \"I should probably tell you in person. Meet at the usual house?\"\n\n\t\t\t\t\"Sure.\"\n\n\t\t\t\tA mere two hours later, you're in Old Sydney, waiting for Yunus. \n\n\t\t\t\tWhen he arrives, you're suddenly shy. \n\t\t\t\t*if temp_three > 0\n\t\t\t\t\tYou brush off his concerns about your bandages.\n\t\t\t\t\t*goto having\n\t\t\t\t*else\n\t\t\t\t*label having\n\n\t\t\t\tIt would be nice to have a conversation with someone who doesn't know about the shark farm, but of course you have to tell him.\n\t\t\t\t*choice\n\t\t\t\t\t#Later.\n\t\t\t\t\t\t*set temp_two 0\n\t\t\t\t\t\t*label chilltime\n\t\t\t\t\t\t\"It's good to see you,\" you say.\n\n\t\t\t\t\t\t\"Same,\" he says. \"Want to go swimming?\"\n\n\t\t\t\t\t\t\"Really?\" you say. \"You're not…concerned about the sunlight?\"\n\n\t\t\t\t\t\t\"I have a plan,\" he says, smiling. There's a flicker of gravity in his face, quickly stifled. \"Do you trust me?\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"A Drylander? Never!\"\n\t\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\t\tHe laughs along a little too hard.\n\t\t\t\t\t\t\t\t*goto pool\n\t\t\t\t\t\t\t#\"Of course.\"\n\t\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\tHe blinks, and you realize he didn't expect such a positive answer.\n\n\t\t\t\t\t\t\t\t*if yunus_love = 1\n\t\t\t\t\t\t\t\t\t\"I wouldn't be dating you otherwise,\" you say gently.\n\t\t\t\t\t\t\t\t\t*goto pool\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\"I'm here, aren't I?\" you say.\n\t\t\t\t\t\t\t\t\t*goto pool\n\t\t\t\t\t\t\t#\"Let's give that a provisional 'yes.'\"\n\t\t\t\t\t\t\t\t*set flexibility %+10\n\t\t\t\t\t\t\t\tHe laughs. \"Fair enough.\"\n\t\t\t\t\t\t\t\t*label pool\n\n\t\t\t\t\t\t\t\tHe invites you into the Drylander equivalent of a speeder. It is made predominantly of metal, and several minutes later, you figure out why it seems familiar: you've seen it in pictures of pre-speeder technology.\n\n\t\t\t\t\t\t\t\tStill, it's clear Yunus is more comfortable in his tin can than your more modern bubblecraft, so you keep your dismay to yourself. It's not easy, as the small, round windows don't let you see much of the world outside. But at last the journey is over, and Yunus releases you from his ancient death trap…into another enclosed space. It's a shame you didn't pack your tail, but at least your all-purpose legs can keep you moving in and out of the water.\n\n\t\t\t\t\t\t\t\tThis structure is large. It clearly used to be an office building, and most of the floor where you are has been sealed by the same makeshift anti-leaking process that had been used in the house where you usually meet with Yunus. But this seal has been repurposed to hold water in instead of out. The space is half full of extremely clear water. You haven't seen water that clear outside of a bath.\n\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t#\"Yunus, you're brilliant.\"\n\t\t\t\t\t\t\t\t\t\tHe smiles modestly, then falters. \n\t\t\t\t\t\t\t\t\t\t*label confession\n\t\t\t\t\t\t\t\t\t\t\"Actually, I was hoping you could give me some pointers.\"\n\n\t\t\t\t\t\t\t\t\t\tYou'd heard that Drylanders couldn't swim, but you'd also been told at various times that they had green skin, a single enormous eye, and horns growing from their shoulders. It's hard for your brain to imagine what it must be like for Yunus to be so disconnected from three-quarters of the world.\n\n\t\t\t\t\t\t\t\t\t\tHe's still looking at you \n\t\t\t\t\t\t\t\t\t\t*if yunus_love = 1\n\t\t\t\t\t\t\t\t\t\t\thopefully with those gorgeous pale eyes.\n\t\t\t\t\t\t\t\t\t\t\t*goto lesson\n\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\thopefully, and you try to conceal how shocked you are.\n\t\t\t\t\t\t\t\t\t\t*label lesson\n\n\t\t\t\t\t\t\t\t\t\tYou take a breath, trying to formulate some kind of advice. It feels like giving someone instructions on how to breathe. Theoretically, everyone in Kota had to learn how to swim at some point, just as they'd learned to talk—long before conscious memory began. You drag up a few memories of parents teaching their babies. First they carry them in their arms, then strap them on their back. Neither of those methods is going to work here.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Look for an online tutorial.\n\t\t\t\t\t\t\t\t\t\t\t\tYou tap the computer on your wrist to search for teaching videos, and Yunus bursts out in incredulous laughter. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\"I know how,\" you retort. \"Teaching is different.\"\n\t\t\t\t\t\t\t\t\t\t\t\t*goto query_yunus\n\t\t\t\t\t\t\t\t\t\t\t#\"I don't know how to teach it.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\"Okay,\" Yunus says slowly. \n\t\t\t\t\t\t\t\t\t\t\t\t*label query_yunus\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Is it true that your people swim for pleasure?\" he asks.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Of course,\" you say. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Can I see what that looks like?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\tIt seems Yunus has as much trouble imagining swimming as you do the lack of it. Well, then.\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto show\n\t\t\t\t\t\t\t\t\t\t\t#Show him.\n\t\t\t\t\t\t\t\t\t\t\t\t*label show\n\t\t\t\t\t\t\t\t\t\t\t\tYou strip down to your underwear like you've done a thousand times with your friends.\n\n\t\t\t\t\t\t\t\t\t\t\t\t*if yunus_love = 1\n\t\t\t\t\t\t\t\t\t\t\t\t\tYunus blushes furiously and turns away.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"You can look, Yunus,\" you tell him. \"I'd be offended if you didn't want to.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Would a wolf-whistle be appropriate?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Maybe a little one.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto dive_in\n\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\tYunus covers his face with his hands. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\tAh. You'd forgotten Drylanders probably don't strip as often as regular people. Too bad for him the water is so clear. He'll have to learn to deal with it. Or perhaps this will be his first and last lesson.\n\t\t\t\t\t\t\t\t\t\t\t\t*label dive_in\n\n\t\t\t\t\t\t\t\t\t\t\t\tYou studiously ignore him and dive neatly into the water, letting yourself glide a long way underwater before you come up.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"That was so fast,\" says Yunus. \"Weren't you scared?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\"Of course not.\" You tread water slowly, trying to find the right words.\n\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"It's like flying.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label really\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Really?\" he says, taking a half step closer.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou swim back and reach out your arms to help him in. He slips in awkwardly, falling against you.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"It's alright,\" you tell him. \"I got you.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe laughs shakily. \"How are you holding me up?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"It's not me. It's the water.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Okay,\" he says. \"And you like the way it pulls your limbs around?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Oh yes,\" you say, not mentioning that this is the stillest water you've ever seen.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Gently loosen his hold on me.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tHe sucks in a breath, but he lets you move a little so you're holding hands instead of clinging together. That's a start.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto soon\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if (yunus_love = 1) #Kiss him.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou move in for a kiss, watching Yunus's face to be sure it's what he wants too. He squeaks a little as his grip on your arms shifts, but the kiss gives him an excuse to hold you tighter. That's not a bad thing. You're feeling suddenly dizzy yourself.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto soon\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Move along the side of the pool.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto soon\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Carefully take him away from the edge and see how he copes.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label soon\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tSoon you're moving gently through the water, bringing Yunus with you, and he's attempting to use his own limbs a little. When you laugh at him, he laughs back and begins to relax at last.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThen, suddenly, a whole crowd of people climbs in through an open window on one side of the pool.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Get out of there.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou tighten your hold on Yunus and kick through the water toward the window where Yunus's primitive speeder is parked. Suddenly he's dead weight, confused by your sudden switch in pace. Then he spots the others.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto oh\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Apologize for using their pool.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Oh…hello?\" you say. \"Are we in your pool? I'm sorry. We'll go now.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYunus twists around to see them over your shoulder.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto oh\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#Quietly tell Yunus we're not alone.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set flexibility %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Yunus, there are people,\" you say under your breath.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label oh\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Oh!\" he says. \"Already?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tThe woman leading the group gives a lazy grin. \"Are we interrupting something?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"This is Florence,\" Yunus explains quickly. \"I paid her to let us have the use of their pool for a bit.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tIt's your turn to feel awkward, and you climb out and struggle to put your clothes back on over your wet skin. The Drylanders are definitely staring at your legs.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYunus casually shifts so he's blocking their view, chatting to them with apparent ease even though he's still wearing nothing but a pair of pants that leave little to the imagination. He's certainly a quick study. Once you're dressed, it's time to go. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou thank Yunus for his tact on the way back to your own speeder. He obviously doesn't think his skills are anything special, but you know better. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I wish I knew my path as well as he knows his.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set flexibility %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I hope I'm as good at shark farming as he is at diplomacy.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set temp_four 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t#I hope my own skills fit my future plans as well as that.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if yunus_love = 1\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tNow that you're definitely alone and Yunus isn't so concerned for his survival, you have plenty of time to show him how much you enjoy being with him. You both smell and taste of chlorine, but on his lips, it tastes good.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto byee\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*label byee\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tEventually you have to admit it's time to head home. \n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*if temp_two = 0\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou give him a much-abbreviated summary of the previous day, and he's suitably appalled. It makes parting strained, but there's nothing you can do about that now.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto afternoon\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto afternoon\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"How long can you hold your breath?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"That is not a reassuring question. I'm normal: a few seconds, maybe a minute.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tYou nod, trying to keep your face neutral. Normal in Kota is five minutes; you can go considerably longer depending on how deep you go. Older people are as bad as Drylanders, so that gives you a baseline.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"That'll do,\" you say.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto really\n\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Water can kill you, but it can also lift you up.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Mmm,\" he says.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\"Swimming lightens the pull of gravity. It feels good when you work with the water instead of against it.\" You don't mention that this strange, chemical-filled water is far clearer than it should be and is a bit creepy.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto really\n\t\t\t\t\t\t\t\t\t#Push him in.\n\t\t\t\t\t\t\t\t\t\tYou trail him to the edge and then give him a gentle shove, just enough to tip him off balance. He shrieks in real terror and clutches at you, digging his fingernails into your arm. You half laugh automatically, thinking he's joining in the game—but this is no game.\n\n\t\t\t\t\t\t\t\t\t\tYou both fall into the water, knocking heads painfully, and Yunus still doesn't let go. It takes you far too long to realize his terror is genuine, and by then, you're both underwater. You shove him away from you and dart backward, getting control of your own body and breath before saving him. It feels cruel, but as soon as you're out of his death grip, you can feel yourself being safer and stronger.\n\n\t\t\t\t\t\t\t\t\t\tYunus hasn't come up. You take a preparatory breath, then grab his shirt and haul him to the edge, doing your best to ignore the way he is suddenly made entirely of elbows and teeth. As soon as his arm touches the side of the pool, you push away from him again and watch anxiously until he manages to grab hold and get his head consistently above water.\n\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t#Keep my distance.\n\t\t\t\t\t\t\t\t\t\t\t\t*label breathing\n\t\t\t\t\t\t\t\t\t\t\t\tYunus remains facing away from you, breathing raggedly. He scoops water into his hands and washes his face, then washes and scrubs it again, and climbs out of the water, dripping and shaking. Finally, he turns toward you and speaks in a strained voice: \"I probably should have mentioned that I was going to ask you for swimming lessons.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto lesson\n\t\t\t\t\t\t\t\t\t\t\t#Apologize.\n\t\t\t\t\t\t\t\t\t\t\t\t\"I am so, so sorry,\" you say.\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto breathing\n\t\t\t\t\t\t\t\t\t\t\t#Change the subject.\n\t\t\t\t\t\t\t\t\t\t\t\tYou scramble for something casual to say. \"How's the weather been lately?\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t*goto breathing\n\t\t\t\t\t\t\t\t\t#\"Can you even swim?\"\n\t\t\t\t\t\t\t\t\t\t*goto confession\n\t\t\t\t\t#Now.\n\t\t\t\t\t\t\"I don't suppose you saw any recent news about Kota,\" you say slowly.\n\n\t\t\t\t\t\t\"No,\" he says, looking alarmed. \"What happened?\"\n\t\t\t\t\t\t*label tell_him\n\t\t\t\t\t\t*set temp_two 1\n\n\t\t\t\t\t\t\"First of all, I'm okay, and so is everyone else.\"\n\n\t\t\t\t\t\tHe sits down, looking more alarmed than ever. \"Start at the beginning.\"\n\n\t\t\t\t\t\tYou tell him everything, and it's clear he's working hard to keep himself from commenting. Finally you're done.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"Most vegetarians aren't like that. At all.\"\n\t\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\t\"Ours aren't,\" he says, sounding dazed.\n\n\t\t\t\t\t\t\t\t*goto chilltime\n\t\t\t\t\t\t\t#\"Kustiani is evil.\"\n\t\t\t\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\t\t\t\tHe is silent for a long time, then says, \"Do you want me to destroy her?\"\n\n\t\t\t\t\t\t\t\tIt takes you a moment to realize he's entirely serious. \"I hate her, but even if vegetarians tend to be bad for the farm, I don't want to mess up food production.\"\n\n\t\t\t\t\t\t\t\t\"Hmm,\" he says. \"That'll be tricky: how to destroy Kustiani without messing with vegetarians as a whole. Leave it with me.\"\n\n\t\t\t\t\t\t\t\tThis conversation is getting weird fast. \"Stop that. Kustiani is Kota's problem.\"\n\n\t\t\t\t\t\t\t\t*goto chilltime\n\t\t\t\t\t\t\t#\"Remember I said no one was hurt? Focus on that.\"\n\t\t\t\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\t\t\t\tHe gives you a long, flat look. \"I would be much angrier if that wasn't the case.\"\n\n\t\t\t\t\t\t\t\tYou don't know how to make him feel better. You don't know how to make yourself feel better.\n\n\t\t\t\t\t\t\t\t*goto chilltime\n\t\t\t\t\t#Tell him to look at the news.\n\t\t\t\t\t\t\"You might want to check on Kota news,\" you say.\n\n\t\t\t\t\t\tHe pulls up a news site on his wrist computer and immediately yelps in shock. \"You were bombed?!\"\n\t\t\t\t\t\t*goto tell_him\n\t\t\t#Set a course for Kassie's place.\n\t\t\t\t*set kassandra %+10\n\t\t\t\tYou grab your tail and take a private speeder, but you pause when you get closer, wondering for the first time if it's still alright to simply wander into her place. Cursing yourself for a coward, you tap your usual code on the main entry portal and wait until there is a positive response from inside before you enter.\n\n\t\t\t\tKassie is sitting in an armchair, eyebrows raised in silent mockery of your sudden nerves. Folami is sitting next to her.\n\n\t\t\t\tYou try not to act surprised at Folami's presence, but she gives you a sardonic grin that shows you failed.\n\n\t\t\t\t*if kassie_love = 1\n\t\t\t\t\t\"Don't worry,\" she says. \"I know when I'm the third wheel.\"\n\t\t\t\t\t*goto awkward\n\t\t\t\t*else\n\t\t\t\t\t\"Surprise,\" she says. \"But don't worry, I'm not reporting on a terrorist attack today.\"\n\t\t\t\t*label awkward\n\n\t\t\t\t\"Actually, I knew you were staying here,\" you say. \"Uh…does Kustiani know?\"\n\n\t\t\t\tFolami shrugs. \"She knows I'm not at home. Kassandra hacked into her wrist computer so an alarm will go off if she comes close to me. That way, I can be elsewhere as required.\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"What can I do to help?\"\n\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\"I'm old enough that I don't have to go back if I don't want to,\" Folami says, \"but I need letters supporting my actions. Could you write one for me?\"\n\n\t\t\t\t\t\t\"Of course!\"\n\t\t\t\t\t#\"Can we have one of those for the shark farm?\"\n\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\"Already done,\" says Kassie. \"It signals both you and your parents, so you should probably tell them about it pretty soon.\"\n\n\t\t\t\t\t\t\"Copy that.\"\n\t\t\t\t\t#\"Is your dad able to help you at all?\"\n\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\"He moved to one of the North American floating cities when I was a kid,\" Folami says. \"I tried telling him what was happening years ago, but he thought I was lying to get him to visit.\"\n\n\t\t\t\t\t\t\"What a piece of piss.\"\n\n\t\t\t\t\t\t\"Indeed.\"\n\n\t\t\t\tThe three of you sit and chat for a while, getting all talk of the shark farm out of your systems and then falling easily into the usual gossip about what your classmates are doing.\n\n\t\t\t\t*if kassie_love = 1\n\t\t\t\t\tFolami gathers the mugs and takes them up to the kitchen before announcing she's going out. \"I'm well aware you two are an item now, so enjoy yourselves. I'll be at least an hour.\"\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"You can stay here. Don't mind us.\"\n\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\"Thanks but no thanks,\" she says. \"I know when I'm not wanted.\"\n\n\t\t\t\t\t\t\tShe's still laughing as she heads out.\n\t\t\t\t\t\t#\"Where are you going to go?\"\n\t\t\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\t\t\t\"I have some interviews,\" she says. \"I don't think I'll be inheriting from Mom after all.\"\n\n\t\t\t\t\t\t\t\"Oh,\" you say. \"I guess not.\"\n\t\t\t\t\t\t#\"Are you sure it's safe for you to go out?\"\n\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\tShe taps her wrist and smiles. \"I'm sure.\"\n\n\t\t\t\t\tWith that, you and Kassie are alone. Suddenly you feel so awkward you can barely move. Luckily Kassie is just fine. She saunters over to you with exaggerated swagger and sits on your lap, kissing you all over your face and hands with the air of someone determined to be thorough. It's a good thing you're sitting down, or you might have fallen over—in the best possible way.\n\n\t\t\t\t\t*goto future\n\t\t\t\t*else\n\t\t\t\t\t*label future\n\t\t\t\t\t\"Does the bomb change things?\" she asks suddenly. \"I mean, in terms of what you want to do as a career?\"\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#\"No, I never wanted to be a shark farmer.\"\n\t\t\t\t\t\t\t\"Have you mentioned that to your parents?\" she asks.\n\n\t\t\t\t\t\t\t\"Not as such.\"\n\n\t\t\t\t\t\t\t\"You may need to do that soon,\" she says. \"Really soon. Diah is doing well. She could replace you.\"\n\n\t\t\t\t\t\t\t\"I hope so.\"\n\t\t\t\t\t\t#\"No, I still want to be a shark farmer.\"\n\t\t\t\t\t\t\t*set temp_four 1\n\t\t\t\t\t\t\t\"Oh,\" she says. \"I thought you were ambivalent.\"\n\n\t\t\t\t\t\t\t\"Maybe.\"\n\n\t\t\t\t\t\t\tShe throws a cushion at you.\n\t\t\t\t\t\t#\"Maybe. I still don't know what I want to do.\"\n\t\t\t\t\t\t\t\"You could be anything,\" she says. \"Teacher, trader, ice cream maker.\"\n\n\t\t\t\t\t\t\t\"Thanks Kassie.\"\n\n\t\t\t\t\t\"Wanna do some science?\" she asks.\n\n\t\t\t\t\t\"Of course I do.\"\n\n\t\t\t\t\t*if facts = 0\n\t\t\t\t\t\tOut come the computers for another mammoth study session, during which you pretend to understand what Kassie tells you and think it's fascinating. It's the least you can do after forcing her to abandon her experiments. Then you realize she's asking you a question.\n\n\t\t\t\t\t\t\"Uh…could you repeat that, but simpler?\" you say.\n\n\t\t\t\t\t\t\"What if we chose one of your parents' sharks to act as a proxy for the wider ocean?\" she says. \"We give it mind implants and then monitor its behavior closely in order to get a sense of what's happening underwater? It's cruel to that shark but could gain important data. I'm sure something significant is wrong on the ocean floor, but that's all the detail I have.\"\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"I'd rather risk a shark than a human any day.\"\n\t\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\t\t*set facts 1\n\t\t\t\t\t\t\t\t\"Now we're getting somewhere,\" she says. \n\t\t\t\t\t\t\t\t*label shark_tracker\n\n\t\t\t\t\t\t\t\tYou spend the next several hours of work adjusting an implant that includes tracking and monitoring tek, then deciding which of the farm's sharks would best represent the herd. Kassie assures you she can design the implant with a remote control and scanner so the shark will swallow it for you, and she can steer it into the brain from there. Her delight is palpable.\n\t\t\t\t\t\t\t\t*goto afternoon\n\t\t\t\t\t\t\t#\"There must be another way.\"\n\t\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\tShe turns away to hide her disappointment, but she's not quite quick enough. After a moment, she's gathered herself, and she turns back to sign, \"I'm sure you're right.\"\n\n\t\t\t\t\t\t\t\tIt makes you a lot less sure, but it can't be helped. You don't want to torture a dumb animal.\n\t\t\t\t\t\t\t\t*goto afternoon\n\t\t\t\t\t\t\t#\"What do you think is best?\"\n\t\t\t\t\t\t\t\t*set flexibility %+10\n\t\t\t\t\t\t\t\t*set facts 1\n\t\t\t\t\t\t\t\t\"You already know what I think,\" she points out with a smile.\n\t\t\t\t\t\t\t\t*goto shark_tracker\n\t\t\t\t\t*else\n\t\t\t\t\t\tKassie monologues delightedly about adjustments she's made to her mind implants lately, and you do your best to follow along with her rapid signing. \n\n\t\t\t\t\t\t\"Of course, by 'farther' I really mean 'deeper,'\" she concludes triumphantly.\n\n\t\t\t\t\t\t\"Of course,\" you echo meekly.\n\n\t\t\t\t\t\t\"Shall we?\"\n\n\t\t\t\t\t\tWithout waiting for a reply, she grabs her swimmers and pops into the next room to change. You've long since started keeping swimmers at her place, so you change into yours as well. Five minutes later, you're both heading through the lower hatch into the water. Kassie laughs at the automatic computer scan for sharks or other predators. \n\n\t\t\t\t\t\t\"I don't need to worry about that anymore,\" she says with just a little more confidence than you think is merited.\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#Stick close to Kassie.\n\t\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\t\tYou watch Kassie's face as it cycles through a range of expressions. There's the joy you know and love mixed with an animalistic hunger and the twitchiness of a prey animal. \n\t\t\t\t\t\t\t#Dive deep.\n\t\t\t\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\t\t\t\tYou set your lungs for a long dive and then plummet downward. You can feel the wildness of the ocean echo your own animal nature as you pump your tail, leaving Kassie behind.\n\t\t\t\t\t\t\t#Listen to the ocean.\n\t\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\t\tThe ocean always feels different when you're underneath the spheres of Kota rather than inside or beside them. It's hushed but in an anticipatory way, like a shark that knows it isn't really caged but is playing along.\n\n\t\t\t\t\t\t*if self_experimentation = true\n\t\t\t\t\t\t\tAfter a moment your new mental senses open up, and you can sense Kassie without looking at her. \n\t\t\t\t\t\t\t*if kassie_love = 1\n\t\t\t\t\t\t\t\tShe's enjoying your swimsuit very much, so you turn to her and return the favor, making her grin.\n\t\t\t\t\t\t\t\t*goto senses\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tShe's keeping an eye on you, making sure you're safe.\n\t\t\t\t\t\t\t*label senses\n\n\t\t\t\t\t\t\tBut there are other creatures in the sea, and those are the ones you're trying to understand. You can distinguish them by species now: pilot fish and shark, tuna and cephalopod. Kassie's abilities are far more detailed, but you're catching up.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tYou focus on the sharks, trying to pick one from another past a growing migraine. As always, there's the sense of a greater threat woven in amongst the usual dance of predator and prey. And it's growing.\n\n\t\t\t\t\t\t\tThere will be another earthquake soon.\n\t\t\t\t\t\t\t*goto afternoon\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tIt's strange watching your best friend commune with sea creatures, but you remind yourself that it's your job to keep thinking human thoughts, and to keep her safe. You scan the water and see nothing, but it's clear Kassie is deeply involved in a communication you can't see or hear. \n\n\t\t\t\t\t\t\tAt last, she opens her eyes and signs, \"It's getting worse. The next major earthquake is getting closer.\"\n\n\t\t\t\t\t\t\tYou spend hours in the water, keeping close while Kassie's mind ranges far and wide. She doesn't gain any more detail, but at least she's content.\n\n\t\t\t\t\t\t*label afternoon.\n\t\t\t\t\t\tSoon enough, it's time to get going before you outstay your welcome.\n\t\t\t\t\t\t*goto afternoon\n\t\t\t#Where's Diah?\n\t\t\t\t*set diah %+10\n\t\t\t\tYou check the usual tour stops, knowing Diah has shown a talent for dealing with tourists. It's easy enough to find tourists, but Diah isn't with them. In fact, the girl leading the largest group of tourists is a staff member notorious for her rambling tangents in any conversation whatsoever. Which explains why your dad assigned her as tour guide today: he knows how to punish people and make it look like a gift. You can only hope to someday be so devious.\n\n\t\t\t\tYou eventually find Diah assisting with directions for contract cleaners and structural assessors. \n\n\t\t\t\t*if temp = 1\n\t\t\t\t\tMost of the damage is deep underwater, so people are taking full oxygen tanks with them, not knowing if the air stations have been damaged. They're also carrying lengths of piping and nets. The sharks aren't ever restrained (unless they're about to be eaten), so the farm has to be attractive enough to keep them around, especially underwater. Your schoolmate has it well in hand, and you tell her so.\n\t\t\t\t\t*goto ta\n\t\t\t\t*else\n\t\t\t\t\tIt's hard to do much with a shattered observation deck, so the major repairs have to be done sooner rather than later. The restaurant owners don't seem to care that there's no easy way to actually get to the restaurant without a safe main deck, and Diah is desperately trying to pacify them without pointing out that they're being ridiculous.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Let her deal with them.\n\t\t\t\t\t\t\t*set flexibility %+10\n\t\t\t\t\t\t\tYou see the moment when Diah notices you and flinches. For her, you're still the bosses' kid, and she knows she's not doing well. But as you watch she lifts her chin and firmly excuses herself, leaving the restaurateurs alone and making sure her face is turned away from them so they can't yell at her. They look cross for a moment but then wander back to their own clean-up tasks.\n\n\t\t\t\t\t\t\t\"Nicely handled,\" you sign to her, shielding your words with your body.\n\t\t\t\t\t\t\t*goto ta\n\t\t\t\t\t\t#Make up something so they go away.\n\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\"Excuse me,\" you say, \"but are your I-97 forms up to date? The ones at the front desk?\"\n\n\t\t\t\t\t\t\tThey blanch and race away.\n\t\t\t\t\t\t\t*goto ta\n\t\t\t\t\t\t#Tell them to stop bothering my staff.\n\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\t\"Please leave Diah alone,\" you say firmly, signing along for Diah's benefit. \"She's not your staff member, as you know perfectly well.\"\n\n\t\t\t\t\t\t\tThey turn on you but hesitate when they recognize you're someone who could make their lives difficult. After some grumbles and posturing, they head off.\n\t\t\t\t\t\t\t*label ta\n\n\t\t\t\t\t\t\t\"Thanks,\" Diah signs.\n\n\t\t\t\t\t\t\t\"It's good of you to come in on a day like today.\"\n\n\t\t\t\t\t\t\t\"Is it?\" she signs. \"I just…I was so scared, and so angry, and I wanted to do something big and fierce. All I could think of was coming in when it was my rostered day off.\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"Same.\"\n\t\t\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\t\t*label really_really\n\t\t\t\t\t\t\t\t\t\"Really?\" she signs. Then she goes still, looking at you in a speculative fashion, as if you're a pair of particularly expensive shoes that she's deciding whether or not to buy. \"Would you do me a favor?\"\n\n\t\t\t\t\t\t\t\t\tHer expression makes you reluctant. \"What exactly are you asking?\"\n\n\t\t\t\t\t\t\t\t\t\"I want to swim,\" she signs. \"Today. With the stock.\"\n\n\t\t\t\t\t\t\t\t\tYou can feel your face trying and failing to stay calm. \"They're all riled up today, Diah. Plus there's debris in the water still.\"\n\n\t\t\t\t\t\t\t\t\t\"I know,\" she signs. \"But if neither of us are meant to be here, we're not shirking anything.\"\n\n\t\t\t\t\t\t\t\t\t\"That's not the point at all, and you know it.\"\n\n\t\t\t\t\t\t\t\t\t\"Yeah. But whenever it's a good time to get in the water, I'm busy doing something I'm supposed to. And now I feel like if I don't face my fear all my bravery will just float away, and I'll never be able to do it.\"\n\n\t\t\t\t\t\t\t\t\tYou don't remember your first time swimming with the sharks. It was far too early. You do remember the first time you were allowed to swim without the bulky safety suit. It felt like you were one with the ocean, at last. \n\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t#\"Okay, but we'll both wear safety suits.\"\n\t\t\t\t\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\t\t\t\t\tIt's clear from her face that she was expecting that. You have to go deep into the sheds to find safety suits in the right size, and since \n\t\t\t\t\t\t\t\t\t\t\t*label since\n\t\t\t\t\t\t\t\t\t\t\tyou didn't bring your tail, you have to face the awkwardness of taking off your legs and then putting on your suit next to the water.\n\t\t\t\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\t\t\t\tThere's no easy or graceful way to remove your legs, but Diah isn't looking at you. She's looking at the water. It looks almost like the filthy water of Old Sydney thanks to that bomb. You can't see more than the length of your body.\n\n\t\t\t\t\t\t\t\t\t\t\tYou throw Diah a smile and slide into the water. A moment later you feel the ripple of her presence. You pop up, treading water.\n\t\t\t\t\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t\t\t\t\t#\"Ready to dive?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"You'll stay with me?\" she signs.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Yes.\"\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Then I'm ready.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*label lungs\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou start preparing your lungs for a deep dive, and Diah follows suit. It's not easy, because this isn't an ordinary day. Your breathing is faster than usual, and it takes all your control to slow it down. Fortunately, Diah seems to be doing well. She gives you a nod to say she's ready, and you flip around and swim together into the murky depths.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tYou've swum with sharks many times, both with Mom and without. \n\t\t\t\t\t\t\t\t\t\t\t\t\t*if self_experimentation = true\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tBut lately you can sense them coming even without the benefit of your usual senses.\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t*goto shark\n\t\t\t\t\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\t\t\t\tUsually you can see them coming, but today is different.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*label shark\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tAn enormous shark swims so close it stirs your hair. Diah clutches your hand, but you don't dare look at her. You have to keep an eye out for more sharks. Not that you can do a great deal if they mistake you for prey. You've told a thousand tourists that sharks don't like to eat humans, but all your calm assurance drains away in an instant.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tAt last you think you're alone, and you face Diah properly. Her face is ablaze with mingled terror and joy. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Enough?\" you tap on her arm.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\tShe nods, and you swim together back to the surface.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Is it always like that?\" she signs as soon as your heads break the surface.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Terrifying? Yes.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"It's different every time.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t#\"Brilliant? Yes.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\tShe breathes deeply, as if even ordinary air has become magical. \n\n\t\t\t\t\t\t\t\t\t\t\t\t\tYour skin itches with the need to shower off the dust you've picked up, so you leave Diah to her happy breathing and head off. You have to double seal your legs to keep them dry, which is a pain, but at least you can take them off as soon as you get home.\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto afternoon\n\t\t\t\t\t\t\t\t\t\t\t\t#\"Can we get out now?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\t\t\t\t\t\t\tHer face falls, and you sigh.\n\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Worth a try.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lungs\n\t\t\t\t\t\t\t\t\t\t\t\t#\"How do you feel?\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\t\t\t\t\t\t\t\"Scared,\" she signs. \"But good scared.\"\n\t\t\t\t\t\t\t\t\t\t\t\t\t*goto lungs\n\t\t\t\t\t\t\t\t\t\t#\"Alright, but we have to start from outside the main perimeter.\"\n\t\t\t\t\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\t\t\t\t\t\"No worries,\" she signs, following you out of the farm and into the closest recreational swimming area, which is lined with enormous signs warning of the farm's proximity. They are all currently red and flashing, indicating that swimming in the area is not recommended. But you both already knew that.\n\n\t\t\t\t\t\t\t\t\t\t\tSince \n\t\t\t\t\t\t\t\t\t\t\t*goto since\n\t\t\t\t\t\t\t\t\t\t#\"Let's do this.\"\n\t\t\t\t\t\t\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\t\t\t\t\t\t\tYou both strip down to your underwear and head straight for the water. Since \n\t\t\t\t\t\t\t\t\t\t\t*goto since\n\t\t\t\t\t\t\t\t#\"You're entirely fierce. I wouldn't mess with you.\"\n\t\t\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\t\t\t*goto really_really\n\t\t\t\t\t\t\t\t#\"Shall I arrange pay for you?\"\n\t\t\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\t\t\tShe shakes her head, clearly frustrated. \"Don't you feel weird at all, after yesterday?\"\n\n\t\t\t\t\t\t\t\t\t\"Of course I do!\"\n\n\t\t\t\t\t\t\t\t\t*goto really_really\n\t#\"To act normal.\"\n\t\t*set flexibility %-10\n\t\t\"Sounds fun,\" they say, drinking their coffee in silence. \n\n\t\tEventually they chuck their cup in the washer and emit the sigh of a person heading back to their work. \"Thanks for saving all our lives, by the way.\"\n\n\t\t\"Uh,\" you say. \"You're welcome?\"\n\n\t\tBut they're already gone.\n\t\t*label busy\n\n\t\tTime to go be useful.\n\t\t*choice\n\t\t\t#Prep for the next feeding time.\n\t\t\t\t*set flexibility %-10\n\t\t\t\tSomeone else is assigned to rubbish duty for once, so it's up to you to do the fun part: making sure the sharks are good and ready to be fed. It'll be a little trickier than usual since they'll be just as twitchy as you are about the farm today, and with just as much reason. \n\n\t\t\t\tYou check the scent lines are all in order and add a little of your own blood here and there to make the smell extra enticing. Then you reel the lines out to maximum, knowing you might need to draw in sharks that have wandered farther afield than usual. In a little while, you see the distinctive arrow-shaped ripples in the water than tell you you're getting a response. It's hard to see well because of the dust and detritus still floating around, but once you spot a couple of fins slicing through the water, you reel the lines back in and set the few unbroken food chutes to their down positions.\n\t\t\t\t*goto afternoon\n\t\t\t#Find something I can fix.\n\t\t\t\t*set empathy %-1
