n\"What was your name again?\" Ester says.\n\n\"$!{name}. My parents are Lili and Sunny.\"\n\n\"Of course,\" she says. You both know that she knew everything about you all along. \n\n\"It's an emergency.\"\n\n\"We're very busy,\" says Yohan. \"I'm sure Yunus can assist you if you need it.\"\n\nYou can feel your grip on the situation slipping away. If you don't get this conversation on track, New Sydney is doomed—and so are you.\n*return\n*label pass_test\n\nYou can see their faces change as they look at their computers, and for an awful moment, you think you've utterly failed.\n\nThen they look up. \"Well. Good then. Carry on.\"\n*return\n*label fail_test\n\nYou can see their faces change as they look at their computers, and you know you've failed utterly even before they look back at you with contempt. \n\n\"I don't know what you're playing at, but you just lost.\"\n*return\n*label earthquake_good\n\nThe city evacuates in every direction except toward Old Sydney, using every possible mode of transport. Some people fly in planes or helicopters, some take boats for deep water, and others take buses into the western mountains. Still others have no choice but to go on foot.\n\nYou can see a fight breaking out in the nearby airport and people trying to keep calm as they run away from the likely damage zone. Some are speaking too loudly, punctuating their speech with forced laughter. Others have brought far too much to carry and are struggling to walk at all. Still others are grimly silent, setting a disciplined method of jogging for half a kilometer, then walking, then jogging again. \n\nYou're in a field of solar panels with a large group of straggling families when the earthquake hits. \n*fake_choice\n\t#Run.\n\t#Grab Yunus.\n\t#Scream for everyone else to run.\nThe earthquake is so fierce it throws you flat on your face at once, badly jarring your prosthetics. Yunus kneels beside you, clinging to your hand as the earthquake goes on, and on, and on. Several children shriek in terror, then scream even louder as they realize they've grazed their hands and knees and no one seems to care.\n\nEveryone is looking back at the two Sydneys. The Old Sydney Tower collapses, and then suddenly New Sydney falls in on itself, making an enormous crater.\n\nYunus doesn't try to hide his crying as his city collapses. \"You saved us,\" he says over and over. \"You saved us.\"\n\nThe ground stops, but it takes you a long time to be sure the earthquake is over. You're shaking too badly. Then you remember the tsunami. \n\n\"Run!\" you shout and immediately scramble to your feet, pulling Yunus along with you. There's no way of knowing how far is far enough.\n\nYunus screams at the others to run, and they scoop up their children and obey. No one is laughing now. Then you hear a roar like that awful Drylander bus. Glancing back, you see a giant wall rising out of the sea, no longer blue or green but black with debris. Yunus yanks you onward, and you keep running until you reach the crest of a hall and look back once more.\n\nThe solar field is covered in water. Several families cling to the panels, which sparkle like ordinary water even as they're surrounded by churning filth. But the water is receding. An emergency broadcast comes through on your wrist com warning everyone in the area to continue moving to higher ground as the tsunami may come in two or three waves.\n\nYou and Yunus stay on and near the hill, helping families wade through the dangerous new lake to safety. The other waves come, but they don't reach you. It's over. You collapse onto the muddy grass next to Yunus and stare out at a changed world. \n\nPeople surround you, all wanting to thank you and shake your hand. It's strange to think that their ancestors built the first floating cities, vastly improving the lives of your grandparents. Now you've returned the favor.\n*label endybit\n\nYour speeder is long gone. It's either at the bottom of the sea or dangling from a derelict skyscraper. Either way, it's not responding to your summons. \n*if temp_two = 3\n\tFortunately you thought to bring a radio. You use it to contact your parents, who say to stay put and they'll come and fetch you. A few hours later, you're at home as if nothing happened. It's eerie.\n\t\n\t*page_break\n\t*goto_scene chapter_thirteen\n*elseif temp_two = 1\n\tYou set to work tending to the hundreds of gashes and cuts of those nearby. A little girl named Essie insists that you kiss each one of her small injuries. You oblige her despite the long line of more seriously injured people. It's clear to you that if you'd made different decisions, Essie would not be alive to order you around. Her mother is crying, barely able to speak.\n\n\tNo one's wrist com can pick up any networks, leaving you strangely alone. Every so often, you check yours, hoping that the networks are working again. They're not.\n\n\tAs the sun sets, you see a single speeder heading toward you, and you stand and wave. It's Mom, and she's come to take you home.\n\t\n\t*page_break\n\t*goto_scene chapter_thirteen\n*else\n\tThe usual jetty is underwater, but you find a relatively dry spot on your hill, and you wait. Every so often you check your wrist com, hoping the networks are working again. They're not.\n\n\tAs the sun sets, you see a single speeder heading toward you, and you stand and wave. It's Mom, and she's come to take you home.\n\t\n\t*page_break\n\t*goto_scene chapter_thirteen\n*label earthquake_medium\n\nYou're in an elevator when the earthquake hits. \n*fake_choice\n\t#Lie on the floor.\n\t#Force the doors open.\n\t#Hold on to Yunus.\nThere's no time to do anything. The earthquake is so fierce that it throws you flat on your face at once, badly jarring your prosthetics. Yunus kneels beside you, clinging to your hand as the earthquake goes on, and on, and on. The other passengers scream and cling to one another as the lights go out. At last, the earthquake is over, and the de-networked wrist coms switch on in torch mode as everyone checks one another for injuries. There are plenty of cuts and bruises, but no one is badly hurt—at least, no one in this exact lift. It's clear that there will be injured people throughout the city, and you wish you hadn't thought of that. A lot of people are deeper underground.\n\nTwo of the other passengers manage to pry the doors open, and you wince at the sudden light. You were two levels from the surface. Thanks to the earthquake, the surface has come to you. This is bad. This is very bad. The shape of the world is all wrong.\n\nYunus doesn't try to hide his crying as he stands in the ruins of his city. \"You saved us,\" he says over and over. \"You saved us.\"\n\nYou and the others carefully climb up out of the wreckage of New Sydney and head \n*if temp_two = 1\n\tinland. You use your first-aid kit here and there along the way. \n\t*goto barely\n*else\n\tinland to safety.\n\t*label barely\n\n\tYou're barely out of the city when you hear a roaring and realize there is a tsunami rushing toward you…and it's far too late to run away. You cling onto Yunus and onto the lee-side wall of a maintenance shed.\n\n\tWater washes around you, and Yunus screams as he's lifted from the ground. But the water drops you almost at once and flows away, pulling people's hastily grabbed luggage away as they sob in a nonsensical mix of relief and terror. Two more waves hit you before it's truly over.\n\n\tPeople surround you, all wanting to thank you and shake your hand. It's strange to think that their ancestors built the first floating cities, vastly improving the lives of your grandparents. Now you've returned the favor.\n\t*goto endybit\n*label earthquake_bad\n*set hospital 1\n\nYou're in an elevator when the earthquake hits. \n*fake_choice\n\t#Lie on the floor.\n\t#Force the doors open.\n\t#Hold on to Yunus.\nThere's no time to do anything. The earthquake is so fierce that it throws you flat on your face at once, tripping the quick release on one of your prosthetics. Yunus kneels beside you, squeezing your hand as the earthquake goes on, and on, and on. The other passengers scream and cling to one another as the lights go out, and then there is a flash of brilliant red and a bang that reverberates through your chest. After that, there is silence, and you don't know if it's actually quiet or if you've gone deaf. \n\nAt last, the earthquake is over. You can't move, and your left arm is trapped under something. You try to shift it, but you're weak and shaking. Using voice commands, you activate the torch on your wrist com. It's the com's only functioning feature, but for a moment, it's all you want.\n\nThe lift is slick with blood. Yunus's blood, and others too. Yours. \n\n\"Is everyone okay?\" you ask, knowing that not everyone will answer.\n\nThree of the seven people in the lift are dead, and Yunus looks like he is bleeding out.\n\n\"Yunus!\" you whisper, suddenly breathless, but he doesn't respond.\n*if temp_two = 1\n\t*set yunus_dies false\n\t\n\tAfter an awful moment, you remember the first-aid kit in your prosthetics. It takes you three tries to get to it in the rubble, but you do, and you're able to bandage Yunus's gashed thigh and inject him with a healers' solution that will hopefully keep him alive until he can be moved to a hospital.\n\n\tIt's going to be a long wait, but you're both going to live. You remember the others and do what you can for them with shaking hands. It's not much, but it's everything.\n\n\tThey thank you with a strange reverence. It's odd to think that their ancestors built the first floating cities, vastly improving the lives of your grandparents. Now you've returned the favor.\n\t*set elevator 1\n\t*page_break\n\t*goto_scene chapter_thirteen\n*elseif temp_two = 3\n\t*set yunus_dies false\n\t\n\tYou get one of the others to apply pressure to the bleeding wound in Yunus's thigh.\n\n\tAfter an awful moment, you remember the radio in your prosthetics. Its manual claims that it will work under a kilometer of water or earth, and you desperately hope that's not a lie. Turning it on and pushing the button to speak takes all your strength.\n\n\t\"Mom?\" you say. \"Mom, can you hear me?\"\n\n\tThe radio crackles to life, and you hear a faint voice. \"$!{name}? I can hear you. Are you alright?\"\n\n\t\"No,\" you say, swallowing sobs. Over the next hour, you give Mom the best directions you can so she can relay them to the rescue teams. And you give her the names of all those in the lift who are still conscious. She connects you directly to Yunus's parents, who are coordinating rescue efforts as others focus on first aid and still others source fresh water. There was a tsunami, and now there's several meters of filthy water and debris between your elevator and the surface.\n\n\tMom makes you stop talking in order to save the battery, and you spend the next hour in a darkness thicker than any you've ever known.\n\n\tThen you hear scraping, and a party of rescuers contacts you through the radio. They're able to give you fresh water and first-aid supplies, and in a few hours, they'll dig you all the way out. Yunus is going to live, but one of your prosthetics is stuck fast. You're able to get out, but it's not easy. It would have been a lot harder if your leg were organic.\n\n\tThe others from the elevator thank you with a strange reverence. It's odd to think that their ancestors built the first floating cities, vastly improving the lives of your grandparents. Now you've returned the favor.\n\t*set elevator 2\n\t*page_break\n\t*goto_scene chapter_thirteen\n*else\n\t*set yunus_dies true\n\n\tYou apply pressure to the bleeding wound in Yunus's thigh, but your wrist coms don't come back online, and you know you're too deep for a quick rescue. The others in the elevator stifle their own weeping and try to encourage you, but words alone can only do so much. Every so often you shake him, and call his name, but it starts to feel cruel so you stop.\n\n\tYou don't know what time it is when Yunus slips from a coma into death. All you know is that he's cold to your touch, and nothing you do can make him warm. You can't stop holding onto him even as his body grows cold, and you can't bear to tell the others that he's gone.\n\n\tIt's so dark.\n\t*set elevator 3\n\t*page_break\n\t*goto_scene chapter_thirteen", "chapter_twelve_b": "*set somethings_coming 0\n*comment ARKVILLE MOVED thematic of helping others. \n*comment d and m are automatically included, with a bit of text to make it so if they don't like you.\n\"Good luck,\" she says and \n*if kassie_love = 0\n\thugs you quickly before heading off.\n\t*goto travel\n*else\n\tkisses you quickly before heading off.\n*label travel\n\nYou have an awful premonition of danger to Kassie, but you shake it off. Kassie has known more about the coming danger than anyone else for months. She's clever. That has to be enough.\n\nThough you're trying to shake off morbid thoughts, you can't help remembering that Kassie has a bad habit of placing her own safety at risk for either of the two things she cares most about: science and other people. Having her attempt to move all the sharks of an entire city—a city far poorer and weaker than Kota—is exactly the kind of thing Kassie jumps into without switching on her considerable brain.\n\nPart of you wants to swim after her and beg her to stay. Force her to stay, if you have to. But of course you can't. She is utterly herself, and there's nothing you can do about it. In fact, she's most definitely the reason you're going to try to get Arkville to shift position out of season. Arkville is nothing to you. Just another floating city, and not an especially good or interesting one. But there are people there, and that's enough for you to risk your own safety. Even the vile Governor Banyu deserves to live.\n\nStupid humanity. Stupid moral conscience. This rescue effort had better not get you trapped on a second-class floating city while it gets enveloped in a tsunami.\n\nYou grab your backpack and check and powder your flesh legs with care before putting on your all-purpose prosthetics. As you begin to open the hatch, you realize you haven't put anything inside the compartments of the legs. There are a few small items in your room that might be handy, especially some from your emergency kit.\n*fake_choice\n\t#Pack extremely basic first-aid supplies.\n\t\t*set temp_two 1\n\t\tYou divvy up the tiny kit so roughly half of it fits into each prosthetic. Under the circumstances, you prioritize wound care and treatments for shock. \n\t#Take the miniature flare gun.\n\t\t*set temp_two 2\n\t\tEven the latest, smallest flare gun is not easy to jam into place, but you remove the flares and put them in the other compartment. \n\t#Bring the two-way long-distance radio that might work if other networks fail.\n\t\t*set temp_two 3\n\t\tThe radio doesn't quite fit, but when you remove the battery—which is fully charged—and put that in the opposite leg, it all works. \nYou're slightly off-balance, but you can manage.\n\nWith that, you jump into your parents' fastest and largest speeder and set a course for Arkville. As soon as the speeder pulls away, you ping Diah. She's obviously expecting you and answers right away.\n\n*if ally_diah_maya = true\n\t\"Kassie says it's time,\" she signs. \n\t*goto mayaa\n*else\n\t\"Kassie talked to me,\" she signs grudgingly. \"She says Arkville's in grave danger, and I have to help you. She was very convincing.\"\n\n\t\"It's all true,\" you sign. \"I'm coming to Arkville right now to try and get it moved to a safer location. If you're not going to help me, I suggest you take anyone you like and get out of there.\"\n\n\t\"We're going to help,\" she signs. \"Because of Kassie.\"\n\n\tYou let your breath out in a relieved huff.\n*label mayaa\n\n\"What do we do?\" Maya chimes in. \"What do I do?\"\n\n*if foreknowledge > 60\n\t\"It's not even four a.m., and Kassie says the earthquake will hit around eleven a.m. We have seven and a bit hours.\"\n\t*goto section_two\n*elseif foreknowledge > 50\n\t\"It's not even six a.m., and Kassie said the earthquake will hit before lunch. That's way too soon.\"\n\t*goto section_two\n*else\n\t\"I don't know,\" you admit. \"I don't even know when or where the earthquake will hit. But I do know Arkville needs to get to deeper water. Right now.\"\n*label section_two\n\n\"Wait!\" says Maya before you end the chat. \"Is this going to work?\"\n*choice\n\t#\"Absolutely.\"\n\t\t*if poise > 30\n\t\t\tMaya's face relaxes at once, and she's smiling as you end the conversation. She even lets go of her braids, leaving her hands relaxed. Your own face feels as if it's turned to Glass. Well, too bad you can't convince yourself it'll all be alright.\n\t\t\t*goto wish\n\t\t*else\n\t\t\tMaya's eyes fill with tears, and she gathers up all her plaits into her hands like a drowning girl clutching at ropes. It seems your attempt at a chipper tone just made her feel worse. Oh well. You're committed to this path now. Hopefully it'll all work out in the end.\n\t\t\t*goto wish\n\t#Pretend I didn't hear her.\n\t\tThere is a very long, very awkward silence as Maya's tragically open face slowly falters. You smile weakly and tap the command to end the conversation.\n\t\t*goto wish\n\t#\"We'll do our best. That has to be enough.\"\n\t\tHer very innocent face turns serious, a look that doesn't suit her at all. She still has one hand wrapped around a braid. Well, so be it. \n\n*label wish\nYou wish you'd spent longer figuring out a solid plan. \n\nThe sea around you is speeding by so fast you can already see Arkville shining on the water ahead. Kota's maps of Arkville are hugely out of date, but surely there haven't been any major structural changes. Unfortunately, you're well aware that even the most life-shattering news about Arkville wouldn't have been in the main streams of Kota. You chew on your lower lip, wishing this day were over. And that nothing bad had happened to anyone, even the Arkvillagers.\n\n*if ally_ahmed = 4\n\tAhmed checks the upper hatch is secure, and then you head underneath the city, aiming for the central sphere. It takes a frantic several minutes to find Diah and Maya, but at last, all four of you are standing in the crowded thoroughfare, waiting for…something.\n\t*goto ohno\n*elseif ally_mom_dad = 6\n\tDad checks the upper hatch is secure, and then you head underneath the city, aiming for the central sphere. It takes a frantic several minutes to find Diah and Maya, but at last, all five of you are standing in the crowded thoroughfare, waiting for…something.\n\t*goto ohno\n*else\n\tYou double-check the upper hatch is secure and head underneath the city, aiming for the center. It takes a frantic several minutes to find Diah and Maya, but at last, you're all standing in the crowded thoroughfare, waiting for…something.\n*label ohno\n\nYou desperately hope that those few wasted minutes weren't crucial. And that any Arkvillagers you talk to are willing to trust that a person from Kota Perahu is really here to help rather than to trick them into some kind of peculiar scam. Now that you've had the thought, you feel sure you look like a con artist.\n\nThe sphere itself is enormous with even more going on beneath the waterline, but it feels small. The whole height of the sphere is divided into levels with metal gratings that make a multilayered cacophony as people hurry up and down and left and right, moving in and out of speeders and the nearby spheres that have been absorbed into one giant complex of shops, markets, traders, and transport.\n\nYour group is quiet, and they're looking at you. Oh no. They're waiting for you to tell them your brilliant plan to get Arkville moved.\n\n\"Who makes the decisions about when and where to move the city?\" you ask Maya.\n\n\"The advisory council,\" says Maya. \"Fifty people.\"\n\n\"Too many,\" you say, biting your lip. \"If they're an advisory council, who are they advising?\"\n\nHer face falls despite your epiphany. \"That would be Governor Banyu.\"\n*choice\n\t#Fake an underwater bomb threat.\n\t\t\"We need an photo,\" signs Diah. \"Something that looks real and shows no sign of image manipulation.\"\n\n\t\t\"The best fakes are real,\" says Maya, signing as she speaks. \"We need to make something.\"\n\n\t\t\"Practical effects,\" signs Diah. \"Got it.\"\n\n\t\t\"Where do we get supplies for something that looks explosive?\" you ask. \"And where would we take the pictures? It has to be somewhere that looks important but has no recognizable features, so no one knows where the bomb is located. That way, the only solution is to move the city.\"\n\n\t\t\"Winifred's Wonders,\" says Maya. \"Uh, that's where Diah and I will get supplies. And if we put it deep enough, the sea all looks the same.\"\n\n\t\t\"Perfect,\" you say.\n\t\t*choice\n\t\t\t#\"I'll see what I can find in the speeder to help us.\"\n\t\t\t\t*if ally_ahmed = 4\n\t\t\t\t\tAhmed heads off to get some supplies from the local dolphin farmers. Apparently they've been frenemies for years.\n\t\t\t\t\t*goto ohn\n\t\t\t\t*elseif ally_mom_dad = 6\n\t\t\t\t\tDad gives you the speeder's key, and he and Mom set off to get some stuff from the local shark farm—assuming they can wrangle help from their competitors.\n\t\t\t\t\t*goto ohn\n\t\t\t\t*else\n\t\t\t\t\tThe group parts ways, leaving you to retrace your route back to your entry point.\n\t\t\t\t*label ohn\n\t\t\t\t\n\t\t\t\tFortunately, you don't get lost this time despite the voice screaming in your head to hurry up. You climb into the speeder, muttering to yourself about fuses and C-4.\n\n\t\t\t\tThis is an emergency speeder. It's bound to have useful stuff. The only question is whether it will have stuff that's useful for faking a bomb threat.\n\n\t\t\t\tYou force yourself to slow down enough to search methodically. There's a whole lot of shark-related equipment: tranquillizer darts, dehydrated meat, waterproof bandages, and so on. Nothing that looks even slightly explosive.\n\n\t\t\t\tBut the speeder does have a backup engine. It's immediately recognizable as a backup engine to you, but speeder tech varies dramatically from city to city. It has a lot of pipes and wires and such that could look ominous in the right light. You take it and go to meet the others. \n\n\t\t\t\t*label test_bit\n\t\t\t\tYou're combining their props with your spare engine when you suddenly realize you're surrounded by black-clad Arkvillagers—and they have some kind of weapon. It's the police, and they've found you far too soon.\n\n\t\t\t\t*label cops\n\t\t\t\tThey take you into a police sphere for questioning. All of you. You can feel Arkville's chance of safety slipping away, and you know you have just one shot to fix this before it's too late. Diah and Maya are holding hands and looking far too much like two lost puppies.\n\t\t\t\t*if ally_ahmed = 4\n\n\t\t\t\t\tAhmed has clearly had a bad experience with police before, and he's shaking. Tears trickle down his cheeks.\n\t\t\t\t\t*goto ninny\n\t\t\t\t*elseif ally_mom_dad = 6\n\n\t\t\t\t\tMom is furious, and she's going to start yelling at them at any moment. She has a gift for language that is sure to get you all officially arrested and charged. Dad is desperately trying to calm her, but she's clearly just getting more annoyed.\n\t\t\t\t\t*goto ninny\n\t\t\t\t*else\n\t\t\t\t*label ninny\n\n\t\t\t\tA pair of police officers scan all your faces, looking for the weakest link. Luckily, they don't appear to speak sign language, or they'd have picked Diah at once.\n\t\t\t\t*choice\n\t\t\t\t\t#Tell them to check up on me so they know I'm not inclined to exaggerate.\n\t\t\t\t\t\tThey both scowl at you and then turn to their wrist computers. You try to stay calm, knowing that their profession is unlikely to make them think the best of people they don't know.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto bad\n\t\t\t\t\t#\"Call the local shark shops to vouch for me.\"\n\t\t\t\t\t\tBoth officers take a step back—blocking your exit—and ping a shop front each, texting back and forth with lightning speed. You try to stay calm, knowing that their profession is unlikely to make them think the best of people they don't know.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto bad\n\t\t\t\t\t#Bribe them.\n\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\tThey scowl at you and then turn to their wrist coms. You try to stay calm, knowing that their profession is unlikely to make them think the best of someone they don't know. Particularly someone who's just attempted to bribe them.\n\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 800)) or (net_worth > 1000)\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*set net_worth 0\n\n\t\t\t\t\t\t\tThank goodness for a decent amount of personal savings—and a relatively strong Glass dollar.\n\n\t\t\t\t\t\t\t*goto good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*set net_worth 0\n\n\t\t\t\t\t\t\t*goto bad\n\t\t\t#\"I'll go to Winifred's Wonders so no one can track the purchases back to you two.\"\n\t\t\t\t*set net_worth -300\n\t\t\t\t*if ally_ahmed = 4\n\t\t\t\t\tAhmed heads off to get some supplies from the local dolphin farmers. Apparently they've been frenemies for years.\n\t\t\t\t\t*goto ohna\n\t\t\t\t*elseif ally_mom_dad = 6\n\t\t\t\t\tDad and Mom set off to get some supplies from the local shark farm—assuming they can wrangle help from their competitors.\n\t\t\t\t*label ohna\n\n\t\t\t\tWinifred's Wonders is well named. It's a treasure trove of unusual fabrics, antiques, tools, clothing, and—for some reason—jam. You grab a staff member with a scanner app in their wrist com and start simply pointing to anything that could look suspicious in the right circumstances.\n\t\t\t\t\n\t\t\t\tAt last you're satisfied. You're particularly pleased with your purchase of several meters of articulated metal pipe, a large mass of wires, and a potbellied stove the size of a small speeder.\n\n\t\t\t\tYou get everything packaged up in an underwater rental, then go to meet the others. The rental speeder is programmed to follow you under the water as you head to your meeting with Diah and Maya. \n\n\t\t\t\t*goto test_bit\n\t\t\t#\"I'll research bomb designs that we can copy.\"\n\t\t\t\t*if ally_ahmed = 4\n\t\t\t\t\tAhmed heads off to get some supplies from the local dolphin farmers. Apparently they've been frenemies for years.\n\t\t\t\t\t*goto ohnax\n\t\t\t\t*elseif ally_mom_dad = 6\n\t\t\t\t\tDad and Mom set off to get some supplies from the local shark farm—assuming they can wrangle help from their competitors.\n\t\t\t\t*label ohnax\n\n\t\t\t\tYou settle down in a relatively quiet corner of the central sphere mass and get to work. There are a lot of cartoonish bomb designs to wade through before you start getting more realistic plans. You're still sorting through images, looking for the most conveniently ominous yet easy-to-fake bomb pics, when a heavy hand falls on your shoulder. You manage to send off the specs to Diah before the police officer who's observed your search pulls you to your feet and slams off your transmitter. \n\t\t\t\t*if ally_ahmed = 4\n\n\t\t\t\t\tThey already have Ahmed.\n\t\t\t\t\t*goto hyow\n\t\t\t\t*if ally_mom_dad = 6\n\n\t\t\t\t\tThey already have your parents.\n\t\t\t\t*label hyow\n\t\t\t\tDiah and Maya are just walking over to you, and unfortunately the police notice them and catch all of you.\n\n\t\t\t\t*goto cops\n\t#Go to the engine room and move the city myself.\n\t\t\"Where's the engine room?\" you ask.\n\n\t\t\"There are three,\" says Maya. \"The biggest is in Sector Twelve, but it's also the most secure. The city can move with just that one, or with both of the other two working together. Usually we use all three together, of course.\"\n\n\t\t\"What kind of secure?\" you ask. \"Physical locks, network locks, or guards?\"\n\n\t\tMaya winces. \"I know there are guards and physical locks. I have no idea about the technological side.\"\n\t\t*choice\n\t\t\t#\"I'll focus on hacking. You should go there.\"\n\t\t\t\t*if ally_ahmed = 4\n\t\t\t\t\tAhmed goes with Diah and Maya.\n\t\t\t\t\t*goto settle\n\t\t\t\t*elseif ally_mom_dad = 6\n\t\t\t\t\tYour parents go with Diah and Maya, leaving you to yourself (except for the hundreds of people around).\n\t\t\t\t\t*goto settle\n\t\t\t\t*else\n\t\t\t\t\t\"Agreed,\" says Maya, and she leads Diah away.\n\t\t\t\t*label settle\n\n\t\t\t\tYou settle down in a relatively quiet corner and get to work. This isn't your city, so you have to waste time reading up on the basics: how the city is set out, where the engines are located, and so on. School excursions are the best source of information, and you try not to let the spelling errors and awkward photos dishearten you. \n\n\t\t\t\tThen, at last, you get to work following the less obvious and more secure trails into the electronic hubs of the city. Thank goodness you've picked up a few tricks from Kassie and Yunus.\n\t\t\t\t\n\t\t\t\tThe others in your group return from their own excursion. They tell you they'll be able to handle the physical locks—but you're the only one who can deal with the virtual barriers.\n\t\t\t\t*gosub engine_room\n\n\t\t\t\t*label screening\n\t\t\t\tYou're still bent over your wrist com when you suddenly realize you're surrounded by black-clad Arkvillagers—and they have some kind of weapon. It's the police, and they've found you far too soon.\n\t\t\t\t*goto cops\n\t\t\t#\"Let's all go there and see what we find.\"\n\t\t\t\t*gosub engine_room\n\t\t\t\tMaya knows whose computer to hack into, which is incredibly helpful. \n\t\t\t\t*goto screening\n\t\t\t#\"Let's split up. I'll take the Sector Twelve room, and you two take one other room each.\"\n\t\t\t\t*gosub engine_room\n\n\t\t\t\tDiah and Maya scare you terribly when they pop up behind you.\n\n\t\t\t\t\"No luck,\" Diah says. \"How's it going here?\"\n\n\t\t\t\t\"No pressure,\" you mutter, then ignore them in order to focus.\n\t\t\t\t*goto screening\n\t#Convince Banyu to move the city.\n\t\t\"Where is Banyu, physically speaking?\" you ask, knowing this is a conversation that will be more compelling in person. You have to hope it's compelling enough that Banyu will hear you out.\n\n\t\t\"Governor Banyu,\" Maya corrects you automatically. \"Sector One. All the major movers and shakers live there.\"\n\n\t\t\"Including you,\" says Diah with a smile that makes Maya blush.\n\n\t\t\"Who does he listen to?\" you ask. \"I mean, obviously the advisory council, but who has the most respected voice on the council?\"\n\n\t\t\"Not me,\" Maya says promptly. \"I still think I got in based on a typo. Neman is an old friend of Banyu's. They're like brothers. Or, if we don't want to immediately get arrested, there's Rehan. He's the only one who's actually nice to me, presumably because he's the second youngest after me.\"\n\t\t*choice\n\t\t\t#Go directly to Banyu.\n\t\t\t\tIt's easy enough to find Banyu's sphere—it has some kind of golden tint infused into the Glass and is somehow lifted slightly from the surface of the water. You tap an urgent request to enter. He comes out scowling.\n\t\t\t\t*label hatch\n\n\t\t\t\t\"Don't close the hatch,\" you say quickly. \"What I have to tell you is extremely important.\"\n\n\t\t\t\t\"I'm not paying you a cent,\" he growls.\n\n\t\t\t\t\"You don't have to,\" says Maya. \"All you need to do is listen to ${him}.\"\n\n\t\t\t\t\"I don't like tricks,\" he says, swinging the full force of his scowl around to you. \"On me, or on my city.\"\n\n\t\t\t\t\"This will make you more than a governor,\" you tell him. \"It will make you the city's savior.\"\n\n\t\t\t\tHe tries to hide it, but you can tell you've got him hooked—for now.\n\t\t\t\t*label hatchtest\n\t\t\t\t*choice\n\t\t\t\t\t#Tell him to check up on me so he knows I'm not inclined to exaggerate.\n\t\t\t\t\t\tHe scowls at you again and then turns to his wrist computer. You try to stay calm, knowing that the enmity between Kota Perahu and Arkville runs deep. It will not be easy for him to believe that a person can do something purely to help strangers.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto bad\n\t\t\t\t\t#\"Call the local shark shops to vouch for me.\"\n\t\t\t\t\t\tHe closes the hatch in your face, but you can hear him making calls and see his face through the Glass. It will not be easy for him to believe that a person can do something purely to help strangers. At least he can look you up and be sure you've never been a liar or a cheat.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto bad\n\t\t\t\t\t#Bribe him.\n\t\t\t\t\t\tHe scowls at you again and then turns to his wrist com. You try to stay calm, knowing that the enmity between Kota Perahu and Arkville runs deep. It will not be easy for him to believe that a person can do something purely to help strangers.\n\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 800)) or (net_worth > 1000)\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*set net_worth 0\n\n\t\t\t\t\t\t\tThank goodness for a decent amount of personal savings—and a relatively strong Glass dollar.\n\n\t\t\t\t\t\t\t*goto good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*set net_worth 0\n\n\t\t\t\t\t\t\t*goto bad\n\t\t\t#Go to Neman.\n\t\t\t\tIt's easy enough to find Neman's sphere and tap an urgent request to enter. He comes out scowling, and that doesn't change as you explain what's going on.\n\n\t\t\t\t\"Don't close the hatch,\" you say quickly. \"What I have to tell you is extremely important.\"\n\n\t\t\t\t\"Maya?\" he growls. \"What is this?\"\n\n\t\t\t\t\"Not my idea,\" Maya says quickly. \"All you need to do is listen to ${him}.\"\n\n\t\t\t\tOh good. It's all up to you. \n\n\t\t\t\t\"This will put you in Governor Banyu's good books forever,\" you tell him. \"It will make you the city's savior.\"\n\n\t\t\t\t\"Go on,\" he says, but you can tell you're on thin ice.\n\t\t\t\t*goto hatchtest\n\t\t\t#Go to Rehan.\n\t\t\t\tIt's easy enough to find Rehan's sphere and tap an urgent request to enter. He comes out and grins at Maya and Diah before quirking an eyebrow at you. \"You're the shark trader, aren't you? $!{name}?\"\n\n\t\t\t\t\"That's me,\" you say, choosing not to mention that it's your parents who own the shark farm.\n\n\t\t\t\t\"We need your help moving the city,\" Maya blurts out.\n\n\t\t\t\tHe laughs at that delightedly, slapping his knee. \n\n\t\t\t\t\"It's true,\" you say sharply. \"And it's urgent.\"\n\n\t\t\t\t\"No,\" he says, sobering up fast. \"That's ridiculous. This is a joke.\"\n\t\t\t\t*goto hatchtest\n*label good\nHaving made one more ally, things move quickly. Or at least that's what Maya tells you as you stand awkwardly, looking out at the sea as if it will supply a convenient display of how bad things are about to get. There is a flurry of calls, but no one requires your input anymore.\n\nAt last, you feel the distinctive rumble of the city beginning to move. But it's not moving fast enough.\n\nYou glance at your wrist com, and it shows you the time: \n*if foreknowledge > 60\n\tit's 8:00 a.m.\n\t*goto aa\n*elseif foreknowledge > 50\n\tit's 9:00 a.m.\n\t*goto aa\n*else\n\tit's 10:00 a.m.\n*label aa\n*choice\n\t#There's no time to do anything more. Get my speeder and get out.\n\t\t*goto earthquake_good\n\t#Go to one of the engine spheres and speed things up.\n\t\t*if foreknowledge > 60\n\t\t\t*goto earthquake_good\n\t\t*elseif foreknowledge > 50\n\t\t\t*goto earthquake_medium\n\t\t*else\n\t\t\t*goto earthquake_bad\n\t#Make some calls to see if I can speed things up.\n\t\t*if foreknowledge > 60\n\t\t\t*goto earthquake_medium\n\t\t*else\n\t\t\t*goto earthquake_bad\n*label bad\nYou complete your original plan while the others stand guard, ready to be arrested. They're trusting you to get the job done, one way or another. \n\nAt last you feel the distinctive rumble of the city beginning to move. But it's not moving fast enough.\n\nYou glance at your wrist com, and it shows you the time: \n*if foreknowledge > 60\n\tit's 9:00 a.m.\n\t*goto aabbcc\n*elseif foreknowledge > 50\n\tit's 10:00 a.m.\n\t*goto aabbcc\n*else\n\tit's 11:00 a.m.\n*label aabbcc\n*choice\n\t#There's no time to do anything more. Get my speeder and get out.\n\t\t*goto earthquake_medium\n\t#Go to one of the engine spheres and speed things up.\n\t\t*if foreknowledge > 60\n\t\t\t*goto earthquake_medium\n\t\t*else\n\t\t\t*goto earthquake_bad\n\t#Make some calls to see if I can speed things up.\n\t\t*if foreknowledge > 60\n\t\t\t*goto earthquake_medium\n\t\t*else\n\t\t\t*goto earthquake_bad\n*label pass_test\nAt last, you're given a nod of acceptance. You take a deep breath and explain that the city must be moved at once.\n\n\"But we need your help,\" you say.\n\n\"You have it.\"\n*return\n*label fail_test\nAt last the wait is over…but it's not good news. You wilt under the glare you receive, and you soon find yourself locked into a police sphere along with the others.\n\nFortunately, the police have a misplaced confidence in their security—and you have your all-purpose prosthetics. It costs you time to take your leg apart and unlock the sphere, and it takes even more time to continue enacting your plan.\n*return\n*label engine_room\n*page_break\n\nThe engine room is much smaller and dirtier than the one you vaguely remember from your school excursions to the Kota engine room many years ago. You ignore the pistons and the impressively large steel rudder and look for a chair. Moving a city takes time and is boring. Whoever does it would be a fool to stand up the whole time—but they would have to stay on site in case of technical issues.\n\nSure enough, there's one chair in the whole engine-room sphere, and there's a nondescript control panel in front of it. That's what you need to deal with. Luckily for you, it's a keypad rather than a key.\n\nNumbers three, five, seven, and eight are noticeably more worn than the rest, which leaves you with ten thousand combinations. You sigh, send the details to Diah and Maya, and start checking underneath and around the panel in case someone has left a handy reminder note. At last, you have to go online and hack into personnel files looking for documents called \"password.\"\n*return\n*label earthquake\nYou're just climbing into your speeder when you feel the ocean turn suddenly, horribly, beneath you. A few seconds later, a swell of water rises like some enormous monster, wider than the horizon and coming toward Arkville. For a moment, you feel as if you've done everything wrong. It feels like madness that you have caused the city to move toward that…thing.\n*fake_choice\n\t#Close the hatch.\n\t#Hook my prosthetics under the seat, ready for impact.\n\t#Get away from that thing. Now!\nYour speeder rises suddenly, pushing you into your seat as speeder and city rise together. \n\nIt's like flying, and dying, and you immediately question the logic that ever led humans to colonize the sea. This is not your home.\n\n*return\n*label earthquake_good\n*gosub earthquake\n\nThen it's over, and you're safe. The speeder alarms go silent, confirming there's no major damage or danger. As you look around, you see—nothing. The sea is as calm and inscrutable as ever. \n\nDid you do it? Did you save Arkville?\n\nYou speed up to the surface and circle the city, looking for damage. There are several cracked spheres on the eastern side of the city, with people inside already attempting to patch the cracks. As far as you can tell, there are no major injuries, and the city proper is intact.\n\nArkville is safe.\n\nYou call the others to check if they want to come back to Kota with you, but they all refuse. They're too busy joining emergency meetings. Suddenly you feel like crying, and most of all, you want to go home. \n\nWith shaking hands, you tap out the order to take you home. The speeder whirs into action, pushing you back into the padded seat, where you let yourself sob in relief.\n*goto_scene chapter_thirteen\n*label earthquake_medium\n*gosub earthquake\n\nThen it's over, and you're alive. You're bruised and bleeding, but nothing feels serious. Except that Arkville definitely wasn't out of the danger zone. You speed up to the surface and circle the city, looking for damage.\n\nThere are several spheres on the eastern side of the city that are utterly smashed, as if they were made of Drylander glass and hit with an enormous hammer. You suppress your own pain and guilt and begin rescuing the wounded.\n\nYou continue shuttling people back and forth from the outskirts of the city into their hospitals, bandaging bad bleeds and injecting people with stasis solutions when necessary for the rest of the day.\n\nIt's hard to bear the suffering you see, but you haven't forgotten that there would be much more if it weren't for you.\n*if temp_two = 1\n\t\n\tYou're glad you packed an extra first-aid kit. \n\n\tWhen you've done everything you can to help out, you go home. Once you're sitting on your bed, it feels as if nothing has happened—but you're so tired you barely manage to remove your prosthetics before falling asleep.\n\t\n\t*page_break\n\t*goto_scene chapter_thirteen\n*elseif temp_two = 3\n\tYou use your radio to let your friends and family know you're safe. \n\n\tWhen you've done everything you can to help out, you go home. Once you're sitting on your bed, it feels as if nothing has happened—but you're so tired you barely manage to remove your prosthetics before falling asleep.\n\t\n\t*page_break\n\t*goto_scene chapter_thirteen\n*else\nWhen you've done everything you can to help out, you go home. \n\nOnce you're sitting on your bed, it feels as if nothing has happened—but you're so tired you barely manage to remove your prosthetics before falling asleep.\n\n*page_break\n*goto_scene chapter_thirteen\n*label earthquake_bad\n*gosub earthquake\n*page_break\n\nYou open your eyes to Dad's anxious face hovering over you. It takes you a long time to figure out that you're in a hospital.\n\n\"Arkville?\" you whisper, surprised at the weakness in your voice and your inability to stand.\n\n\"It…it's badly broken,\" he says. \"But we all know you did your best.\"\n\n\"Not good enough,\" you say, wishing you could sob. But your traitor body is already sucking you down into a healing sleep.\n*set hospital 2\n*page_break\n*goto_scene chapter_thirteen", "chapter_twelve_c": "*set somethings_coming 0\n*comment sharks moved, thematic of SCIENCE and NATURE\n*comment temp_two first aid, flare gun, radio\n*if self_experimentation = true\n\t*goto backpack\n*else\n\t\"Put this on,\" signs Kassie, handing you a swimming cap covered inside and out in wires, suction cups, and pieces of tek—some of them wrapped in cling film. \"You need to put the chin strap on or it won't work.\"\n\n\t\"Uhh…\"\n\n\t\"It's a mind explant,\" she signs. \"That is, a mind implant, but you wear it on the outside. You wanted me to be safe, remember?\"\n\n\tShe helps you put it on, and you feel even more stupid than you thought you would. It's digging painfully into your forehead and scalp, which Kassie says means it's positioned correctly.\n\n\t\"It looks great,\" she signs through her giggles. \n\t*if k_experimentation \u003c 2\n\t\t\"Mine is red with white polka dots.\" It's not a joke. She puts on her own ridiculous cap and grins at you. \"I found a safe way to stay connected with the sharks.\"\n\n\t\t\"Safe?\" you sign at her with eyebrows raised.\n\n\t\tShe waggles a hand vaguely.\n\n\t\tHow very reassuring.\n\t\t*goto backpack\n\t*else\n*label backpack\n\nYou grab your backpack and check your flesh legs with care before putting on your all-purpose prosthetics. The upper half of your tail is folded up around your waist, and the lower half is in your backpack. As you begin to open the hatch, you realize you haven't put anything inside the waterproof compartments of your tail. There are a few small items in your room that might be handy, especially some from your emergency kit.\n*fake_choice\n\t#Pack extremely basic first-aid supplies.\n\t\t*set temp_two 1\n\t\tYou divvy up the tiny kit so roughly half of it fits into each compartment. Under the circumstances, you prioritize wound care and treatments for shock. \n\t#Take a miniature flare gun.\n\t\t*set temp_two 2\n\t\tEven the latest, smallest flare gun is not easy to jam into place, but you remove the flares and put them in the other compartment. \n\t#Bring a two-way long-distance radio that might work if other networks fail.\n\t\t*set temp_two 3\n\t\tThe radio doesn't quite fit, but when you remove its battery—which is fully charged—and put that in the opposite compartment, it all works. \nYou're slightly off-balance, but you can manage.\n\nWith that, you jump into your parents' fastest and largest speeder, sitting next to Kassie, and set a course for Arkville. \n\n*if foreknowledge > 60\n\tIt's not even 4:00 a.m., and Kassie says the earthquake will hit around 11:00 a.m. You have seven and a bit hours.\n\t*label wakey\n\t*goto section_two\n*elseif foreknowledge > 50\n\tIt's not even 6:00 a.m., and Kassie says the earthquake will hit before lunch. That's way too soon.\n\t*goto wakey\n*else\n\tIt's morning. By the time night falls, the earthquake will have done its worst.\n*label section_two\n\nYou wish you'd spent longer figuring out a solid plan.\n\n\"We can do this,\" you sign, to yourself as much as to Kassie. \n\n\"Absolutely,\" she signs. \"But…how?\"\n*choice\n\t#\"Fear is the most effective motivator. Let's scare the sharks away from Arkville.\"\n\t\t*gosub underwater\n\t\tYou have to transmit the right kind of fear. It can't be fear of the sharks or they'll stop respecting you and most likely get confused enough to bite you. But it has to be a strong enough fear to motivate them to move away from Arkville for a few hours—which means leaving behind an easy source of food. You have to convince your own mind that there's a greater threat.\n\t\t\n\t\tFor the first time, you're grateful for your experience with the giant squids. Thinking about that still makes your whole body shake in fear.\n\n\t\tKassie squeezes your hand and taps, \"Good. Let's start,\" on your arm—and then she lets go of you.\n\n\t\tYou move off, a creature of the sea escaping a bigger, badder monster. The fear thrills you and adds speed to the sinuous flip of your tail. Your brothers and sisters are around you, sleek and swift. None of you are going to die today. You are fast, and you are smart, and the food will be there when you come back.\n\t\t*goto go_time\n\t#\"We could lure them to Kota. And if some of them stay there, then so much the better.\"\n\t\t*set value_farm %+10\n\t\t*set diah %-10\n\t\t*gosub underwater\n\t\tIt's incredibly easy to transmit a longing for the less-crowded waters in and around Kota. The only tricky part is thinking like a shark, imagining delicious food and fewer injuries.\n\n\t\tKassie squeezes your hand and taps, \"Good. Let's go,\" on your arm—and then she lets go.\n\n\t\tYou both swim along with the sharks, but with your tail, you quickly outpace her. Puny human. Leave her behind: there'll be more food for you. Your fellow sharks are around you, familiar shadows in the water. It feels good to swim hard, flipping your tail faster and faster in the open ocean, sensing a new and wonderful field of exploration ahead. Being a shark is who you are, and it feels grand.\n\t\t*goto go_time\n\t#\"We could tell them there's a big whale corpse in the open ocean. That should work.\"\n\t\t*gosub underwater\n\t\tYou skipped breakfast, so you're finding it all too easy to relate to the hunger of the sharks. Or is it their emotions transmitting to you? You shake your head to try and get the animal thoughts out, then focus on the idea of a huge mass of food an hour's swim towards the sun.\n\n\t\tKassie squeezes your hand and taps, \"Good. Let's go,\" on your arm—and then she lets go.\n\n\t\tYou both swim along with the sharks, but with your tail, you quickly outpace her. Puny human. Leave her behind: there'll be more tasty food for you. You can already smell some delicious meat. Your sleek gray brothers and sisters are all around you, racing you through the all-embracing sea. Those greedy sharks are going to steal your food! You put on a burst of speed, feeling your stomach longing for an uninterrupted feast.\n*label go_time\n*page_break\n\nThen suddenly you're not swimming any more. You're flying!\n\nFlying is bad. Your tail is all tangled up and you can smell DANGERDANGERDANGER all around. Then you smell WRONGWRONGDEATHWRONG as a giant net lifts you higher into the air. It takes a long moment for you to remember you're human, not shark, and to figure out how to use words again.\n\n\"Stop!\" you yell. \"What are you doing?\"\n\nThe net creaks to a stop, and you're left dangling. It occurs to you to be very, very glad there are no other sharks in your net. You correct the thought with an effort: there are no sharks in your net.\n\nThe net spins gently around until you're facing the boat and the woman who caught you. \"What are you doing? Don't you dare steal my sharks!\" she says.\n\n\"I need to!\" you say. \"I mean, I'm not stealing your sharks. At least, not permanently. It's an emergency. And don't worry, they'll come back. Mostly.\"\n\n\"You're from Kota Perahu, aren't you?\" she snarls.\n\n\"I…yes, but that's not why I'm here. This really is an emergency, and I'm trying to help you.\"\n\n\"Why should I believe Kota Perahu scum?\" she shouts back.\n*choice\n\t#Tell her to check up on me so she knows I'm not inclined to exaggerate.\n\t\tShe scowls at you and then turns to her wrist computer. You recognize it as an obsolete model and try not to show how scared you are. What if there's a firewall that blocks information from Kota? It's impossible to control your emotions when Kassie's tek has you in its grip. Breathing through your nose feels wrong, and the raw hunt-eat-breed instincts of the sharks are making it impossible to focus properly.\n\t\t*if reputation > 50\n\t\t\t*gosub pass_test\n\t\t\t*goto net_good\n\t\t*else\n\t\t\t*gosub fail_test\n\t\t\t*goto net_bad\n\t#\"There are people who can vouch for me.\"\n\t\tShe reluctantly agrees to make some calls and looks at her wrist computer. You recognize it as an obsolete model and try not to show how scared you are. What if there's a firewall that blocks information from Kota? It's impossible to control your emotions when Kassie's tek has you in its grip. Breathing through your nose feels wrong, and the raw hunt-eat-breed instincts of the sharks are making it impossible to focus properly.\n\t\t*if connections > 50\n\t\t\t*gosub pass_test\n\t\t\t*goto net_good\n\t\t*else\n\t\t\t*gosub fail_test\n\t\t\t*goto net_bad\n\t#Bribe her.\n\t\tShe scowls at your promise of payment and then turns to her wrist computer. You recognize it as an obsolete model and try not to show how scared you are. What if there's a firewall that blocks information from Kota? It's impossible to control your emotions when Kassie's tek has you in its grip. Breathing through your nose feels wrong, and the raw hunt-eat-breed instincts of the sharks are making it impossible to focus properly.\n\t\t*if ((value_dollar > 1) and (net_worth > 800)) or (net_worth > 1000)\n\t\t\t*set net_worth 0\n\t\t\tYou attempt to look respectable in your tail as you continue spinning around helplessly in the net, trying to resist the urge to snarl at her.\n\n\t\t\tAfter a long, long moment, she looks back up at you. \"Alright,\" she says. \"What can I do?\"\n\t\t\t*gosub okeydokey\n\t\t\t*goto net_good\n\t\t*else\n\t\t\tAfter a long, long moment, she snorts in derision at her computer and gives you a look of contempt.\n\t\t\t*set net_worth 0\n\t\t\t*gosub nopenope\n\t\t\t*goto net_bad\n*label net_good\n\n\"We have a problem,\" she signs. \"The good news is that a large percentage of the sharks are focused enough to keep going, and there are others following them. The bad news is that there's a splinter group heading back to Arkville.\"\n*choice\n\t#\"It'll be fine. When Arkville moves, they'll move with it. Probably.\"\n\t\t*goto earthquake_good\n\t#\"Let's try to lure them on from here.\"\n\t\t*goto earthquake_medium\n\t#\"We need to go back and get them.\"\n\t\t*goto earthquake_bad\n*label net_bad\n\n\"We have a problem,\" she signs. \"The good news is that a large percentage of the sharks are focused enough to keep going, and there are others following them. The bad news is that there's a splinter group heading back to Arkville.\"\n*choice\n\t#\"It'll be fine. When Arkville moves, they'll move with it. Probably.\"\n\t\t*goto earthquake_medium\n\t#\"Let's try to lure them on from here.\"\n\t\t*goto earthquake_bad\n\t#\"We need to go back and get them.\"\n\t\t*goto earthquake_bad\n*label earthquake_good\nYou're finished with the sharks, more or less, and swimming away from Arkville—and suddenly every neuron in your mind is overwhelmed by a new and total panic. The ocean is breaking. Everything is wrong. You want to dive deep, but the depths are darker and more wrong than the surface. \n\n*gosub panic\n\nThe sharks around you lose their sense of purpose and drift away. Most will return to Arkville—hopefully not all of them.\n*goto ending\n*label earthquake_medium\n*set athletics %-10\nYou're finished with the sharks, more or less, and swimming away from Arkville—and suddenly every neuron in your mind is overwhelmed by a new and total panic. The ocean is breaking. Everything is wrong. You want to dive deep, but the depths are darker and more wrong than the surface. \n\n*gosub panic\n\nThe sharks around you panic as their finely honed senses continue to react to the massive earthquake deep down on the sea floor. They scatter in all directions, hitting one another as well as you in their terrified frenzy. But the earthquake ends, and you're alive.\n\n*goto ending\n*label earthquake_bad\n*set athletics %-20\nYou're still trying to herd the sharks when every neuron in your mind is overwhelmed by a new and total panic. The ocean is breaking. Everything is wrong. You want to dive deep, but the depths are darker and more wrong than the surface. \n\n*gosub panic\n\nThe sharks around you panic as their finely honed senses continue to react to the massive earthquake deep down on the sea floor. They scatter in all directions, hitting one another as well as you in their terrified frenzy. You're tossed back and forth, and a shark bites through your tail with such strength that the prosthetic breaks off in its mouth. \n*if kassie_dies = true\n\tKassie is dead, and so is one of the first perfect examples of her brilliant mind for tek. Everything good is broken.\n\t*goto earth\n*else\n*label earth\n\nBut the earthquake ends, and you're alive.\n\n*goto ending\n*label ending\nYou feel suddenly utterly human, weak, and puny, and it's a struggle to continue maintaining your mental focus enough to keep the sharks from deciding you'd make an excellent snack. It's exhausting to keep swimming, and a part of you simply wants to give up and drift deeper into the ocean. Your whole body aches, and you wish you could stop fighting. \n\n*if kassie_dies = false\n\tYou're desperately glad that Kassie is with you. She is shaking with exhaustion and the aftereffects of adrenaline.\n\n\t\"We're alright, Kassie,\" you sign, struggling to stay above the water so she can see what you're saying. \"All we have to do now is go home.\"\n\t*if kassie_love > 0\n\n\t\tShe grabs your arm so hard you flinch before realizing she has something to say.\n\n\t\t\"I love you,\" she taps into your palm, as lightly as a kiss.\n\n\t\tYou grab her hand. \"I love you too.\"\n\n\t\t*goto homeward\n\t*else\n\t\t*label homeward\n\t\tThe two of you turn and start the long swim back to the speeder, and then home.\n\t\t\n\t\t*page_break\n\t\t*goto_scene chapter_thirteen\n*else\n\tThey've probably already eaten Kassie. You hope they choke on her. Tears run down your face into the water as you force yourself to swim all the way back to the speeder. Before you go through the hatch, you let yourself sink under the water one last time, reaching out desperately with your mind for Kassie.\n\n\tThe ocean was never empty to you before. It's teeming with sharks, fish, whales, dolphins, swimmers, and cities. But today, none of it sings to you the way Kassie's mind once sang to you. The sea is nothing but water now, and undrinkable water at that.\n\n\tYou scream under the water, and only the faintest sound comes out of you. The worst thing about the circle of life is that even the best and brightest person in the world is really just a walking, talking piece of meat.\n\n\tShe's gone. Even if some part of her body still exists, Kassie isn't here. She isn't anywhere anymore.\n\n\tYour tears dry up as you ride the empty speeder home.\n\t\n\t*page_break\n\t*goto_scene chapter_thirteen\n*label underwater\n\"Perfect,\" says Kassie. \"That'll work.\"\n\nThanks to the shark farm's speeder, you reach Arkville in record time. The city is shining in the early morning light, but it looks strange to see a floating city with no one swimming. You remove your all-purpose legs and sit on the speeder's ledge to unroll and adjust your tail. Having a speeder with a ledge is such a luxury that you forget for a moment why you're here.\n\nThen you see about twenty sharks under the water investigating your speeder. These sharks aren't like the ones at your parents' farm. They're hungry, and cranky from overcrowding.\n\nIt hits you yet again how new and experimental Kassie's tek is. If this doesn't work, people will die—and you and Kassie will be the first.\n\nKassie opens both hatches of the speeder so water rushes in. When it's deep enough, Kassie gets on the floor so she can fully immerse herself. She stays there so long you begin to worry. Time drags on, and on, and you get more and more scared for her. At last, she twists so that her head is still underwater but she can take a breath. And she gives you a thumbs-up.\n\n*page_break\n\nFor a long moment, you hesitate. The sharks at your feet are stressed out, and Kassie's tek is extremely new—not to mention illegal. Then you close your eyes and tip forwards into the water.\n\nThere's no graceful way to dive into the sea while wearing a tail, but once you're in the water, everything is different. This time, however, you are painfully aware that a metal tail isn't enough to make you belong in the ocean. As a rule, humans don't do well with the ocean. Especially since the ice caps melted. There's just way, way too much of it.\n\nYou open your eyes to see great, dark sharks swirling around you. Kassie has told you not to think like prey, but it's impossible not to be afraid. You close your eyes, trying not to notice the way the water moves as the sharks pass you, and tune in to the mood. It's just as tense as you expected, but you can sense the thread of Kassie's calm confidence.\n\nYou try to take hold of that confidence, carrying and feeding it. Once you have it steady, Kassie drains the speeder and dives out through the lower hatch. Now the two of you can hold the thread of confidence together, and it's twice as strong.\n\nThe sharks are still hungry, but for now, they believe you aren't food. Time to get moving.\n*fake_choice\n\t#Stay on the edge of the pack and lead them from there.\n\t#Move to the middle of the pack.\n\t#Get them moving and then follow the stragglers.\nYou and Kassie move into position and then hold hands in order to amplify your communication to the sharks. Kassie taps, \"Pause. Breathe.\"\n\nShe's not generally a patient person, and the abnormality of the moment makes it even harder to stay calm. But her unwavering self-confidence helps you. \n\n*return\n*label pass_test\nYou attempt to look respectable in your tail as you continue spinning around helplessly in the net, trying to resist the urge to snarl at her.\n\nAfter a long, long moment, she looks back up at you. \"This is you?\" she says. \"$!{name}, daughter of Lili and Sunny?\"\n\nYou point to your tail. There's only one of those in the world.\n\n\"Alright,\" she says. \"What can I do?\"\n*label okeydokey\n\nYou feel so relieved that for a moment, you feel dizzy. Or maybe that's the spinning net. \"Put me back in the water and stay out of the way.\"\n\n\"Right-oh,\" she says and starts winching you downwards.\n\n\"Oh, and don't panic when Arkville gets moved. It's all part of the same emergency. Maybe you could even help get it moved?\"\n\nShe gives you a thumbs-up as you splash under the water. The blessed cool eases your skin, but the feral thoughts of the sharks hit you so hard that it's difficult to use your hands to untangle yourself. But you manage it in the end and start swimming off—only to be grabbed by Kassie's surprisingly strong hands. At first, you almost bite her, but then you remember who she is and who you are. \n\nYou both stay mainly underwater so you can continue to assure the sharks that you're with them—and you're not food.\n*return\n*label fail_test\nYou attempt to look respectable in your tail as you continue spinning around helplessly in the net, trying to resist the urge to snarl at her.\n\nAfter a nauseating length of time, she looks up at you and scowls. \"I know exactly who you are, ${name}. And I certainly don't want you here.\"\n*label nopenope\n\nShe winds you sideways, above the boat, and then dumps you none too gently on the deck. You rub your bruised elbows and try not to lose your cool over the enormous new dent in your beautiful and one-of-a-kind tail. She doesn't even help you out of the net but turns her boat around and heads back to Arkville. You can see sharks milling around in the water, losing their sense of purpose.\n\nThis is bad. Kassie is in danger, and so is everyone in Arkville. This shark farmer has cost you precious time. You try to block out the realization that it's your own failure to impress that has cost you.\n\nYou struggle out of the net and roll over the side of the boat, hitting the water hard. The feral thoughts of the sharks hit you so hard that it's difficult to remember what you were doing. But you manage it in the end and start swimming off as fast as you can, sharks all around you. Your fast swim is brought to a halt when you see Kassie waiting for you. For a moment, you almost bite her, and then you remember who she is and who you are. \n\nYou both stay mainly underwater so you can continue to assure the sharks that you're with them—and you're not food.\n*return\n*label panic\n\nSomething grabs you.\n*fake_choice\n\t#Bite it.\n\t#Swim away.\n\t#Freeze.\n\nYou take far too long to recognize Kassie and to remember you're in the water because of the earthquake sending everyone around you into a frenzy. When you focus properly on her and tap an apology, she releases you. \n\n*if kassie_dies = true\n\tYou're looking right at her when her eyes roll back in her head and she falls backwards in the water, sinking fast. Worse, you feel her drop from your shark senses. Yours is the only human mind in the area.\n\n\tIf you can't save her, Kassie will drown within moments. She's forgotten she needs to come to the surface regularly to breathe.\n\t*choice\n\t\t#Reach out to her through our emotional connection.\n\t\t\t*if (kassandra > 70) and (empathy > 60)\n\t\t\t\tYou swim after her, consciously opening your mind and radiating your respect and affection for the woman who has been your friend for longer than you can remember.\n\n\t\t\t\t*gosub saves_kassie\n\t\t\t\t*goto abc\n\t\t\t*else\n\t\t\t\tYou swim after her, trying with all your heart and mind to reach the woman who has been your friend for longer than you can consciously remember.\n\n\t\t\t\t*goto loses_kassie\n\t\t#Carefully separate my consciousness from the sharks and try to bring Kassie with me.\n\t\t\t*if (kassandra > 70) and (shark_sense > 60)\n\t\t\t\tYou swim after her, consciously opening your mind and radiating your human intelligence and affection for the woman who has been your friend for longer than you can remember.\n\t\t\t\t*gosub saves_kassie\n\t\t\t\t*goto abc\n\t\t\t*else\n\t\t\t\tYou swim after her, consciously opening your mind and radiating your human intelligence and affection for the woman who has been your friend for longer than you can remember.\n\t\t\t\t*goto loses_kassie\n\t\t#Drag her to the surface, by force if necessary, then wait for her to recover.\n\t\t\t*if (kassandra > 70) and (athletics > 60)\n\t\t\t\tYou ignore the sharks, both physically and mentally, and swim for Kassie with all your might, painfully aware that the tail she made you is the only thing giving you a chance at saving her. When you grab her arm, she jerks in shock and then kicks out at you, narrowly missing your head. \n\n\t\t\t\tYou twist her arms behind her and swim for the surface. As you push her above the surface, she coughs and gasps. Tears run down her face as she recovers from her near drowning.\n\n\t\t\t\t\"I'm human,\" she says, over and over. \"I'm human, I'm human. I'm me.\"\n\n\t\t\t\tIt's awkward to stay afloat while holding her hand, but you don't let her go until she is calm and self-possessed once more.\n\n\t\t\t\t*goto ending\n\t\t\t*else\n\t\t\t\tYou ignore the sharks, both physically and mentally, and swim for Kassie with all your might, painfully aware that the tail she made you is the only thing giving you a chance at saving her. \n\t\t\t\t*goto loses_kassie\n*else\n*label abc\n*return\n*label saves_kassie\n*set kassie_dies false\nAs you touch her, she jerks in shock and then focuses on you with her own eyes. You both swim upwards, and as you break the surface, Kassie coughs and gasps. Tears run down her face as she recovers from her near drowning.\n\n\"I'm human,\" she says, over and over. \"I'm human, I'm human. I'm me.\"\n\nIt's awkward to stay afloat while holding her hand, but you don't let her go until she is calm and self-possessed once more.\n*return\n*label loses_kassie\n\nWhen you grab her arm, she turns on you, kicking you beneath the chin so hard that you black out. You wake on the surface, not knowing how you got there or why your body kept swimming without your help. A headache makes shining lights and blackness take turns ruining your vision.\n\nYou scream her name, ignoring the pain spiking through your skull and ignoring the fact that shouting would be no use even if she were awake and above the surface. The noise of your own voice sets off brilliant white lights in your vision, and you come close to passing out a second time.\n\nKassie is gone.\n\nYour best friend is dead, and you're all alone.\n\n*page_break\n*goto abc", "chapter_twelve_d": "*comment OLD SYDNEY EVACUATION\n*comment thematic of the true end of Sydney; tragedy of global warming.\n\"Good luck,\" she says and \n*if kassie_love = 0\n\thugs you quickly before heading off.\n\t*goto travel\n*else\n\tkisses you quickly before heading off.\n*label travel\n\nYou grab your backpack and check and powder your flesh legs with care before putting on your all-purpose prosthetics. As you begin to open the hatch, you realize you haven't put anything inside the compartments of the legs. There are a few small items in your room that might be handy, especially some from your\t emergency kit.\n*fake_choice\n\t#Pack extremely basic first-aid supplies.\n\t\t*set temp_two 1\n\t\tYou divvy up the tiny kit so roughly half of it fits into each prosthetic. Under the circumstances, you prioritize wound care and treatments for shock. \n\t#Take the miniature flare gun.\n\t\t*set temp_two 2\n\t\tEven the latest, smallest flare gun is not easy to jam into place, but you remove the flares and put them in the other compartment. \n\t#Bring a two-way long-distance radio that might work if other networks fail.\n\t\t*set temp_two 3\n\t\tIt doesn't quite fit, but when you remove the battery—which is fully charged—and put it in the opposite leg, it all works. \nYou're slightly off-balance, but you can manage.\n\nWith that, you jump into a freshly charged speeder and set a course for Old Sydney. \n*if ally_ahmed = 6\n\tYou're deeply glad Ahmed is coming with you, even if he's bringing his own speeder. If all else fails, you can evacuate a small number of people that way.\n\t*goto whoosh\n*else\n\tYou wish you had someone—anyone—to help you. The large speeder feels especially empty, and you half regret taking it. However, it could be useful to evacuate a small number of people.\n*label whoosh\n\n*if foreknowledge > 60\n\tIt's not even 4:00 a.m., and Kassie says the earthquake will hit around 11:00 a.m. You have seven and a bit hours.\n\t*label wakey\n\n\tNot only will you have to convince people to listen to you, you'll have to wake them up too.\n\t*goto section_two\n*elseif foreknowledge > 50\n\tIt's not even 6:00 a.m., and Kassie says the earthquake will hit before lunch. That's way too soon.\n\t*goto wakey\n*else\n\tIt's morning. The earthquake will hit sometime today, but you have no idea whether it'll be morning or afternoon or evening.\n*label section_two\n\nYou wish you'd spent longer figuring out a solid plan.\n\nIt won't be easy to convince people there's an earthquake coming. You'll have to start at the first occupied building you see.\n*choice\n\t#Tell them there's a terrorist threat.\n\t\t*set threat \"a terrorist attack\"\n\t\t*label better_coding\n\t\tYou roar into the harbor and suddenly remember just how big Old Sydney is. The speeder engine cuts out, but the rumble of it still echoes in your mind. You bob up and down, looking at the broken city. Millions of people used to live and work and play here. Until the residents started shooting at tourists, people used to come and see the coat hanger shape of the Sydney Harbour Bridge, even after it was drowned.\n\n\t\tThe city smells of rot and a noticeable lack of plumbing. As you get closer, it smells worse. The city is primed for disease but doesn't even disinfect visitors.\n\n\t\tPart of you wonders if the coming wave could wash it clean, but of course that's not how disasters work. It will be worse afterward. Perhaps a few more of these hardy souls will finally move out, heading to the new cities that have sprung up since the coasts were buried in water. Or perhaps they'll refuse to listen to you and will die here among the shattered ghosts of high-rises and luxury apartments. After the disaster, there will be an outbreak of waterborne disease. That's as predictable as the sun. It's a relief that whatever disease sweeps through the even-dirtier Old Sydney in future will not be yours to deal with. Just today's disasters.\n\n\t\tYou have to turn your head from side to side to see all of the city, and there's much more of it behind the first rash of tall buildings. Panic overwhelms you for a moment, and you want to just speed away.\n\n\t\tLeft. You'll start on the left with the first building you see that has visible washing or any other non-murderous sign of habitation.\n\n\t\tIt's impossible to ignore the Chifley Tower, which has more than half of its considerable height above the water. About two-thirds of the windows are still intact, which is enough on its own to prove the structure is still occupied. There are several boats of various kinds and sizes moored beside or inside the water-level floors, and you can see children swimming in the dirty water.\n\t\t*if ally_ahmed = 6\n\n\t\t\t\"This is not a good place for dolphins,\" Ahmed texts you. \"Or people.\"\n\n\t\t\tYou can only agree.\n\t\t\t*goto choi\n\t\t*else\n\t\t*label choi\n\t\t*choice\n\t\t\t#Talk to the first people I see.\n\t\t\t\t*if ally_ahmed = 6\n\t\t\t\t\tYou ping Ahmed, but he just sends a message back that he'll follow you.\n\t\t\t\t\t*goto aa\n\t\t\t\t*else\n\t\t\t\t*label aa\n\t\t\t\tThe only people you can see are the kids playing in the water around the Chifley Tower. \n\n\t\t\t\tThey spot you coming closer, and suddenly there are no little ones anymore. There must be an opening under the water, because they vanish underneath the surface and don't come back up. It's disorienting to lose sight of them so quickly, making the shallows of Old Sydney feel like the blackest depths. You suppress a shudder. Even someone like you, born and bred on Kota Perahu, avoids the darker parts of the ocean. They're not for humans.\n\n\t\t\t\tThis city is all wrong.\n\n\t\t\t\tA redheaded girl sees you watching and reveals that there's at least one word in sign language that even Old Sydney knows.\n\n\t\t\t\tWhen you don't go away, she signals at someone who starts calling the younger children through an open window into the swamped offices beyond.\n\n\t\t\t\t*label testing_choice_girl\n\t\t\t\t\"What do you want?\" she shouts at you.\n\t\t\t\t*choice\n\t\t\t\t\t#\"I want to talk to you. That's all.\"\n\t\t\t\t\t\t\"Then talk,\" she says.\n\t\t\t\t\t\t*goto talk\n\t\t\t\t\t#\"I want to talk to someone important.\"\n\t\t\t\t\t\t\"I'm important,\" the redhead says.\n\n\t\t\t\t\t\t\"This is an emergency,\" you say, feeling yourself heat up with embarrassment. \"I need someone who can give orders. To adults.\"\n\n\t\t\t\t\t\t\"Tell me first,\" she says. \"I'll decide how important you are.\"\n\t\t\t\t\t\t*goto talk\n\t\t\t\t\t#\"I want to save your lives.\"\n\t\t\t\t\t\t\"Ooh, thank you ever so much,\" she says.\n\t\t\t\t\t\t*label talk\n\n\t\t\t\t\t\t\"I have information,\" you say, resisting the urge to tell her off for being a rude little snot. \"There's ${threat}. Hitting Old Sydney. Today.\"\n\n\t\t\t\t\t\t\"Don't come here and try and scare us,\" she snarls at you.\n\n\t\t\t\t\t\t\"I'm not threatening you! I'm trying to warn you.\"\n\n\t\t\t\t\t\t\"What do you get out of this?\" she says. \"Are you trying to rob us? \n\t\t\t\t\t\t*if ally_ahmed = 6\n\t\t\t\t\t\t\tJust you two?\"\n\t\t\t\t\t\t\t*goto grip\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tJust you?\"\n\t\t\t\t\t\t*label grip\n\n\t\t\t\t\t\tYou can feel your grip on the conversation slipping. This is the moment when everything hangs in the balance.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"You have computers, just like in my city. Look me up. I'm no liar.\"\n\t\t\t\t\t\t\t\tShe glances at her compatriots, and they pull out a mishmash of physical and virtual devices, holding them up to scan your face. You try not to show your nerves as you wonder exactly what they'll find out about you. Can their junk tek even connect to the wider internet? Will the skinny redhead find some long-forgotten school essay of yours about how Old Sydney exemplifies the most stubborn irrationality of those who refused to take climate change seriously?\n\n\t\t\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t\t\t*label winner_girl\n\t\t\t\t\t\t\t\t\t\"Huh,\" she says at last. \"$!{threat}, you say?\"\n\n\t\t\t\t\t\t\t\t\t\"Yes,\" you answer with desperate calm.\n\n\t\t\t\t\t\t\t\t\t\"What do we do?\" she says, dropping her skepticism like an old coat.\n\n\t\t\t\t\t\t\t\t\t\"Evacuate,\" you say. \"The whole building—the whole city. But just for a day.\"\n\n\t\t\t\t\t\t\t\t\tHer eyes widen. \"My uncle trades with the others here. I'll get him.\" She turns to go inside and then pauses. \"When?\"\n\n\t\t\t\t\t\t\t\t\t*if foreknowledge > 60\n\t\t\t\t\t\t\t\t\t\t\"11:00 a.m. Your uncle is welcome to use my speeder.\"\n\t\t\t\t\t\t\t\t\t\t*goto wave_good_a\n\t\t\t\t\t\t\t\t\t*elseif foreknowledge > 50\n\t\t\t\t\t\t\t\t\t\t\"Before lunch. Your uncle is welcome to use my speeder.\"\n\t\t\t\t\t\t\t\t\t\t*goto wave_good_a\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\"I don't know. Soon. Today. I'll help as much as I can.\"\n\t\t\t\t\t\t\t\t\t\t*label wave_good_a\n\n\t\t\t\t\t\t\t\t\t\tShe vanishes inside the building and returns with a man just as redheaded as she is: her Uncle Byron.\n\t\t\t\t\t\t\t\t\t\t*goto wave_good\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*label loser_girl\n\t\t\t\t\t\t\t\t\tThe redheaded girl is the first to laugh at what she sees, and the others soon follow suit.\n\n\t\t\t\t\t\t\t\t\t\"You really had me going for a minute there, ${name},\" she says. \"Now get out of my city before I stop laughing.\"\n\n\t\t\t\t\t\t\t\t\tThe smaller children swim back out of the Chifley building's missing windows and resume playing. They laugh and throw a weighted ball back and forth, diving deep to rescue it whenever someone fumbles a catch.\n\n\t\t\t\t\t\t\t\t\tThis is bad. One of the biggest populations still left in Old Sydney's central zone resides in the Chifley Tower, and you just blew your chance at getting them to evacuate. \n\t\t\t\t\t\t\t\t\t*goto wave_bad\n\t\t\t\t\t\t\t#\"My name is ${name}, from Kota Perahu's shark farm. There must be someone, somewhere who can vouch for me.\"\n\t\t\t\t\t\t\t\tShe glances at her compatriots, and they pull out a mishmash of physical and virtual devices, holding them up to scan your face. You try not to show your nerves as you wonder exactly what they'll find out about you.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tIt's fortunate you didn't lie about your name or family or they'd already know to ignore you. But who do they know who might be connected to you? They live in a different world to you, despite also being surrounded by water. Kota Perahu is the city that science built, and their world is the ruin caused by stubborn ignorance. Food poisoning and premature death are as common here as storms, and the worst part is that the people here have chosen this life on purpose. Somehow, living in Old Sydney has become their identity, and they're rather die than move. The more people that beg them to see sense, the more they dig in their heels. And that skinny redheaded runt is surely just as irrational as the rest.\n\n\t\t\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t\t\t*goto winner_girl\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto loser_girl\n\t\t\t\t\t\t\t#Bribe them.\n\t\t\t\t\t\t\t\t\"Look at me,\" you say. \"You can see I'm no billionaire. But I'll give you all I have if you'll just listen.\"\n\n\t\t\t\t\t\t\t\tThe redhead looks at you with interest for the first time. \"How much?\"\n\n\t\t\t\t\t\t\t\t\"What account shall I transfer it to?\" you ask.\n\n\t\t\t\t\t\t\t\t\"Margaret7092,\" she says.\n\n\t\t\t\t\t\t\t\t\"Alright.\" You try not to wince too hard as you give the girl your entire bank balance.\n\n\t\t\t\t\t\t\t\tShe looks at her wrist, then double taps it to check her newly enhanced finances. You hope the exchange rate works in your favor.\n\n\t\t\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 800)) or (net_worth > 1000)\n\t\t\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\t\t\t*goto winner_girl\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\t\t\t*goto loser_girl\n\t\t\t#Find a way to get up high. That's where the power will be.\n\t\t\t\t*label heights\n\t\t\t\tYou circle the building twice from a safe distance, looking for the best way to get up to the higher levels. Those who designed the building were clearly doing their best to stretch its height to record-breaking levels: the top few floors are only the width of an ordinary house, and there is a ludicrously large antenna on top of that—perfect for gaining a few crucial meters.\n\n\t\t\t\tThose top floors are neatly separated from the lesser floors beneath, and they have a commanding view of the whole city and harbor. The glass has long since been augmented with thick steel bars, making it defensible from either human attacks or superstorms. But not from earthquakes or tsunamis.\n\n\t\t\t\tIt's easy to spot several sets of stairs which
