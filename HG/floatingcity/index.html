ut what's wrong with the kangaroos. \n\t\t*if shark_sense > 60\n\t\t\tKangaroos and sharks aren't all that different. Not really. They're both delicious, for one thing. And neither species copes well with domestication. They need to choose to stay close to humans, and with rational reasons that can overcome the regular loss of some of their members. Food'll do it. And here is food aplenty—grass that wouldn't grow in the heat aboveground. The sunlight is filtered and rationed, too hot to entice people but not so hot the grass dies. \n\n\t\t\tBut these kangaroos aren't enjoying their paradise. Their movements are sluggish, and the bones of their ribs show through their fur. Something has gone wrong in the delicately manufactured ecosystem here, and the kangaroos are dying. The city is built on these half-natural regions, with kangaroos playing a foundational role. Yunus has shown you the cracks at the center of his world: cracks far deeper than the damage from the recent earthquake.\n\t\t\t*goto winner_roo\n\t\t*else\n\t\t\tYou stare at the kangaroos, trying to figure out what Yunus thinks is wrong with them. Surely kangaroos aren't so different to sharks. They're both an excellent source of meat that's handled climate change relatively well. Except you don't know sharks all that well either. For years, you've rebelliously blocked out countless lectures on shark behavior and health. Who knew it'd be useful?\n\n\t\t\tThe longer you stare at the kangaroos, the weirder they look. What's with those tiny little T. rex arms? Why have four legs and then stand up like a human? And the hopping? How is that an efficient mode of travel? \n\n\t\t\tUgh, this is useless.\n\t\t\t*goto loser_roo\n\t#I can figure out what is wrong with the plain.\n\t\t*if appraisal > 60\n\t\t\tIt's warm enough that you can feel the heat through the window. Drylander glass, of course. It's useless. You make yourself scan the plain slowly, side to side, far to near. Drylanders tend to be a bit backward, but it's not a bad piece of engineering. The window slopes down gently from the surface above, latticed to let in enough sunlight to feel natural without scorching the grass to the same brittle consistency as grass on the surface. Little wonder the kangaroos like it. \n\n\t\t\tExcept the area isn't as well engineered as it appears at first glance. There are diagonal patches of dust here and there. One of them is close enough for you to see the way it's rough on the edges. The dust patch growing. The plain's neat design is not enough to keep it green and lush forever. The kangaroo's convenient feeding ground is dying.\n\t\t\t*goto winner_roo\n\t\t*else\n\t\t\tYou're close enough to the surface that you're starting to sweat. Good, you feel like yourself again, at least a little. As usual when you're on land, everything looks and feels somewhat wobbly. For an awful moment you think there is an aftershock happening, and then you realize it's just your landsickness.\n\t\t\t\n\t\t\tOld Sydney certainly doesn't have as much grass as this underground plain. So you guess it must be difficult to make it grow so much. Now that you're looking more critically, you can see diamond-shaped patches of bare dirt where the filtered sunlight is getting through a bit too much. Or maybe there's some purpose to the dust sections—you don't know.\n\n\t\t\tYour ability to assess what you see isn't strong enough to tell you what Yunus is getting at.\n\t\t\t*goto loser_roo\n\t#I can trade information for information.\n\t\t*if bargaining > 60\n\t\t\t\"Spit it out, Yunus,\" you say. \"There's obviously something big going on, and I need you to just tell me.\"\n\n\t\t\t\"I shouldn't,\" he says. \"I wasn't thinking straight. I shouldn't have brought you here.\"\n\n\t\t\t\"You're thinking straight now, and so am I,\" you shoot back. \"Tell me what you wanted to say, and I'll tell you some equally important information in return. Information about earthquakes.\"\n\n\t\t\t\"Agreed,\" he says and takes a deep breath. \"The system here is failing. It requires a certain level of sunshine to function, but the climate is proving too much for the design, and the grass is beginning to die. We've attempted reseeding, and adjusting the filters, but everything is out of kilter. Kangaroos are the protein backbone of New Syd. Without them, there could be a knock-on effect that causes citywide food shortages.\"\n\n\t\t\t\"Oh Yunus,\" you say, trying not to show your dismay. \"That's serious.\"\n\n\t\t\t\"Yes,\" he says and listens attentively as you explain everything Kassie's technology has brought to light thus far.\n\t\t\t*set told_drylanders +1\n\t\t\t*goto winner_roo\n\t\t*else\n\t\t\t\"Come on, Yunus,\" you say. \"You brought us here for a reason, didn't you?\"\n\n\t\t\t\"This was a mistake,\" he says.\n\n\t\t\t\"Can I trade you for…whatever it is?\"\n\n\t\t\tHe shakes his head. \"Just forget we ever came here. Please?\"\n\n\t\t\t\"Alright,\" you say doubtfully. \"Your parents will never know we came.\"\n\n\t\t\t\"Thank you.\"\n\t\t\t*goto loser_roo\n*label winner_roo\n*set foreknowledge %+10\n\n\"I see it,\" you say softly.\n\nYunus gives a tiny nod. A flicker of doubt appears on his face, quickly stifled. He's not sure he's done the right thing in giving you such power.\n*goto endy_bit\n*label loser_roo\n\nYou glance at Yunus and then away again. If this was a test, you failed. Yunus looks relieved. Whatever made him want to spill Drylander secrets, the moment has passed now.\n*goto endy_bit\n*label kangaroo_path\n\"Agreed,\" says Yunus. \"They're really not meant to be on this level, and they're really really not domesticated.\"\n\n\"Could they be dangerous?\" Dad asks.\n\n\"Definitely,\" says Yunus.\n*fake_choice\n\t#\"How do we calm them down?\"\n\t\t\"Sedatives, I suppose,\" says Yunus.\n\n\t#\"How do we keep them from injuring themselves?\"\n\t\tYunus winces. \"Sedatives, maybe.\"\n\n\t#\"Can we get them back up to…wherever they're from?\"\n\t\t\"They're not big on elevators,\" Yunus says. \"Or stairs, for that matter. We'll need to sedate them.\"\n\n\"Where would we find sedatives?\" you ask. \n*if (temp = 1) or (temp = 2)\n\t\"We have them contained, at least. Or at least, we did five minutes ago.\"\n\t*goto right\n*else\n*label right\n\n\"Right,\" says Yunus, regaining his focus. \"This is not my home zone, so I couldn't say where to find a proper vet, but any hospital would have supplies for this kind of thing.\"\n\n\"Lead on,\" Dad says.\n\nYunus takes you on a relatively fast foot journey through the deserted corridors of his home. There are signs of minor damage here and there but nothing as major as the hole in the conference room ceiling. At one stage, Yunus points down a corridor and says, \"That's where most people will be. An emergency chamber. It's designed to withstand fire and provide fresh air. It'll be very hot and crowded in there now, but protocol demands people stay put for an hour after the fire is contained.\"\n\nA few minutes later, you arrive at a hospital. You half expected it to be abandoned, but it's bustling. Competent-looking staff are walking quickly from one frazzled patient to another, bandaging minor wounds and directing those who need more than superficial care into another section.\n*fake_choice\n\t#Find sedatives and steal them. \n\t\t*set flexibility %+10\n\t\t\"We really should have gone to a vet,\" you say.\n\n\t\t\"I know,\" says Yunus. \"Unfortunately, I don't know any in this area and all the navigational computers are down.\"\n\n\t\t\"You'll have to ply your diplomatic skills to fix things up once we've drugged the kangaroos,\" you say. \"There's no way we'll get what we need without stealing.\"\n\n\t\tYunus just nods and leads you through the structure with confidence, explaining along the way that all the hospitals on this level were built at the same time, so a single basic layout is common. \n\t\t*label steal\n\t\tIn all the busyness, it's worryingly easy to steal several trays of emergency syringes intended for dangerous or unruly patients. The trays even come with a handy weight guide on the side. \n\n\t#Ask a nurse to help us.\n\t\t*set empathy %+10\n\t\tIt takes several attempts to get a nurse to give you more than a cursory assessing gaze. The nurses can see immediately that you're not in pain or bleeding. At last, one of them stops, and you blurt out your need for sedatives.\n\n\t\t\"For kangaroos,\" he echoes, obviously already thinking about the likely injuries if you fail. \"You know I can't help you with supplies, and I recommend you leave the animals to animal control.\"\n\n\t\t\"All the animal control people are in the evacuation centers,\" you point out. \"And the computer network is down anyway.\"\n\n\t\t\"Perhaps you would be safer in an evac center too,\" he says, looking over your shoulder at a grown man visibly crying with pain. He takes one more look at you and comes to a decision. \"In any case, the sedatives are in a locked room in Section B-21. But obviously I can't help you.\"\n\n\t\t\"Obviously,\" agrees Yunus, and you all head to Section B-21 to take what you need.\n\t\t*goto steal\n\t#Find an administrative staff member with enough power to sign out sedatives.\n\t\t*set empathy %-10\n\t\t\"We need someone official,\" you say. \"Unless we want to get Yunus arrested.\"\n\n\t\t\"Thanks,\" says Yunus absentmindedly before leading the way to the private offices three levels below. \"Most hospitals have the same layout these days because a lot of New Syd's infrastructure was assigned to a handful of linked companies. It's boring, but convenient.\"\n\n\t\tA lot of the offices are empty, but at last you find someone who is dressed in a suit far too nice for doing any actual medical work. You explain what's happening, and she takes several moments to think before writing you up an official-looking requisition form and sending you on a quest to give your vital piece of paper to the right person—a minor functionary who explains he was too far behind on paperwork to leave his cubicle when the evacuation started. \"And the roof didn't fall in, so I'm fine,\" he says cheerfully.\n\n\t\tHe supplies you with several trays of prepared syringes, pointing out the dosage guide on the side of the tray. \"Not that kangaroos are likely to step on a set of scales for you. I recommend giving them bigger doses than you think they need. A dead kangaroo can be eaten; a dead person is no good to anyone.\"\n\n\t\t\"Uh, thanks,\" says Yunus.\n\nThe kangaroos are all too easy to find once more. If it weren't for the screaming, the stink of their urine could do the job. \n*if (temp > 0) and (temp \u003c 5)\n\tSo much for keeping them contained.\n\t*goto oice\n*else\n\tThey're terrified.\n*label oice\n*choice\n\t#Advise the others to stay back while I subdue the kangaroos one by one.\n\t\t*if athletics > 60\n\t\t\tIn for a dollar, in for a sphere. You set your sights on the biggest, scariest roo. The animal really does look like an actual boxing kangaroo toy. Its biceps are way larger than you're comfortable with. Hopefully you don't end up playing the part of the other boxer. If you move quickly and calmly, everything should be fine. The roo won't know you're there until it's too late.\n\n\t\t\tYou sidle into the thoroughfare, dodging panicked humans and executing a dramatic leap over the back of a kangaroo facing off against an elderly man wielding his cane with consummate skill. The syringe is still in your hand, and you inject the boss roo and then get away before it twists around to find out who jabbed it.\n\n\t\t\tIt works; the kangaroo sits back on its haunches and then lies down and goes to sleep within a few minutes. You continue in the same manner until the roos are all down.\n\t\t\t*goto drug_win\n\t\t*else\n\t\t\tYou're painfully aware that you are weaker and less agile than the kangaroos. But you're pretty certain they won't be expecting you, and they definitely won't be expecting a sedative. Or maybe they will; you don't know how things work here.\n\n\t\t\tThe thoroughfare is a maelstrom of frightened people and frightened kangaroos. You hesitate one last, stomach-churning moment before diving in, stepping left and right in an effort to dodge trouble. It doesn't work: you trip over a tail and get clocked in the kidneys by an elderly man's cane.\n\n\t\t\tYour fingers release the syringe, which smashes on the floor. With no choice, you retreat, covering your head with your hands to protect it from further blows.\n\t\t\t*goto drug_lose\n\t#Pick which people will be best at the complicated task.\n\t\t*if appraisal > 60\n\t\t\tDad is looking disturbed, but he's standing tall. You give him three syringes and wish him luck. \n\n\t\t\tAn elderly man is using his cane to hold off a large kangaroo. \"Keep going!\" you call to him. \"We'll sedate it while you distract it.\"\n\n\t\t\t\"Right you are,\" he puffs, and you dive in and inject the kangaroo while it faces him.\n\n\t\t\tMeanwhile, Dad has used all his syringes and collected more. He's not just an office drone after all. Working with some of the locals, you eventually have all the kangaroos sedated.\n\t\t\t*goto drug_win\n\t\t*else\n\t\t\tThis is Yunus's city, so you pick him to dose the kangaroos since he's the most motivated to prevent further chaos. He stares at you for a long moment and then blinks and says, \"Right. Okay. Yes.\"\n\n\t\t\tHe takes a syringe in each hand and walks into the chaos of the thoroughfare, apologizing with every step. He steps over a roo's tail carefully only to be struck in the chest by the swinging cane of an elderly man. The blow sends him stumbling back into the unexpected embrace of one of the other kangaroos. Both he and the kangaroo are startled, and they spring apart with all the speed of guilty lovers. In the process, Yunus drops both syringes.\n\n\t\t\tIt's possible you didn't pick the best person for the job.\n\t\t\t*goto drug_lose\n\t#Use my animal-handling skills to calm everything down.\n\t\t*if shark_sense > 60\n\t\t\tEven the most solitary animals are creatures of habit. Not to mention humans. The humans and kangaroos are panicking as one mob. If you can shift the behavioral tide, things will change quickly. Too bad you need to get into the fray to do that. Or do you?\n\n\t\t\tOne of the kangaroos nearby has its back to you, facing off with an elderly man swinging his cane with consummate skill. A single sphere can loose a string of pearls, so you might as well start. You edge closer and inject the kangaroo with the sedative successfully before retreating. It goes to sleep, and the man emerges from the fray and tips his hat to you before hobbling away. Then you  find the next exposed kangaroo back, and the next. It's frightening, bruising work, but your methods are effective.\n\t\t\t*goto drug_win\n\t\t*else\n\t\t\tYou're a human. You're smarter than kangaroos. Definitely. That's just science. \n\n\t\t\tBest to disregard the humans in the mix, who are acting precisely as panicked and wild and violent as the trapped animals. Well, not precisely—none of the humans have wet their pants, as far as you can tell. Oh, this is so gross and so scary.\n\n\t\t\tYou dive in, syringes in hand, and try to jab the shoulder of one of the bigger kangaroos. It sees you coming and dodges so smoothly you fall flat on your face. Someone yanks you to your feet moments before you get stepped on.\n\n\t\t\tThis has officially not gone well.\n\t\t\t*goto drug_lose\n*label drug_win\n\nYou're left with a passageway full of bystanders too curious to leave and a whole lot of sleeping kangaroos. Fortunately animal control shows up and takes over, taking the remaining syringes with them.\n*goto endy_bit\n*label drug_lose\n\nYou're still trying to figure out a new strategy that isn't quite so disastrous when the local animal control center shows up, neatly subduing the kangaroos with tranquilizer darts (handy!) and then loading them into vehicles for transport back to where they belong.\n\nAs quickly as that, it's over. \n*label endy_bit\n\n\"Oh!\" says Yunus. \"The computers are back online. Things are working again, and the evacuation centers are letting people go home.\"\n\n\"Is New Sydney going to collapse?\" you ask, pleased to see that your computer is working again, even if it's not connecting to any networks beyond New Sydney yet.\n\n\"Not at all,\" he says. \"We were just lucky to be standing right on the location of the only significant collapse in the city.\"\n*fake_choice\n\t#\"Lucky, lucky us.\"\n\t\tHe laughs, and it's only a little shaky.\n\n\t#\"I'm glad it wasn't worse.\"\n\t\t\"Yes,\" he says, looking more frightened than ever.\n\n\t#\"Are your parents alright?\"\n\t\tHe checks his own wrist com. \"Yes,\" he says, blowing out a sigh of relief.\n\nYunus says he'll organize your bus ride back to the dock and assures you that he has enough influence to get a bus very soon. As you're waiting, you remember Folami isn't coming with you. You may never see her again.\n\n\"Will Folami be okay?\" you ask Yunus.\n\n\"Yes, definitely,\" he says. \"Greta is an honorable woman, and will pay her fairly and make sure no one messes with her.\"\n\n\"Greta is the old lady who said she'd apprentice her?\"\n\n\"That's right. She's head of the agricultural guild and wields considerable power here. They've been together in the evacuation center all this time.\"\n\n\"Good,\" you say, even though Folami betrayed you to gain her spot. She had to carve her own path.\n\n\"What about you?\" says Yunus. \"Are you alright?\"\n*fake_choice\n\t#\"What happens if I say no?\"\n\t\t\"Then I ask what I can do to help,\" he says.\n\n\t\t\"I don't know,\" you tell him sadly.\n\n\t#\"I'm fine. How about you?\"\n\t\t\"Me?\" he says. \"Happy. This is the first time you've come to New Syd knowing who I am.\"\n\n\t\tYou have to laugh at that, considering the literal disaster of a visit.\n\n\t#\"I'm overwhelmed.\"\n\t\t\"Life is changing so quickly,\" he agrees. \"In a good way, mostly, but it's still…a lot.\"\n\nThe bus back to the dock is electric and almost silent, with solar panels on its roof. It's more like home than anything else you've seen here.\n\nYunus manages to join the bus ride without having a panic attack, and you tell him farewell in full sunshine before climbing into your speeder, ready to go home.\n*finish Chapter Ten", "chapter_one": "Chores.\n\nThe sun shines, the ice caps melt, cities rise and fall, and teenagers like you still have to do unpaid work for your parents.\n\nWith a sigh, you tap a familiar sequence on the nearest Glass wall to call up the electronic form that tracks stock feeding times. You might be the bosses' kid, but you're still just a food delivery service for the farm's animals. It's not like the sharks are grateful, either. \n\nThe nearest segment of Glass automatically turns opaque so you can see what you're doing. You tap again to adjust the brightness so you can still see the ocean through the curved wall. The Glass sphere turns semitransparent for you but continues to protect you from excessive heat or UV radiation. As a shark farmers' kid, part of you is always keeping an eye on the water, no matter what direction you're facing or where in the world's oceans your city is currently located. \n\nFirst you have to enter today's date. The computer system cares very much about the time but isn't smart enough to know if you're entering an incorrect date. It's a chance to be subtly rebellious.\n*fake_choice\n\t#Old Style: March 7, AD 2133. It's an old system but universally recognized.\n\t\t*set connections %+10\n\t\tEarth is still Earth, even if half the population now lives in floating cities, like you. \n\t\t*label Glass\n\n\t\tKota Perahu was one of the first floating cities made of the near-indestructible material known as Glass, and it remains one of the best. Glass spheres with diameters ranging between three and three hundred meters ease turbulence, dampen storms, turn sunlight into power, act as computer screens whenever required, and house a million people—including farms, schools, hospitals, and everything else that makes a city a city.\n\n\t\tFrom far away, Kota Perahu looks like a hundred thousand interconnected pearl necklaces laid out in a snowflake shape on the ocean. Whenever you tell your parents you like to travel, they point out that Kota Perahu is always traveling. You've circumnavigated the globe several times. They turn suddenly deaf when you point out that traveling without leaving your home city isn't really traveling at all.\n\n\t#Post Melt: March 7, PM 75. It's worth remembering that humanity tends to screw up.\n\t\t*set foreknowledge %+10\n\t\tWhy not be morbid? Humans tut-tutted as the planet moved toward a preventable, predictable disaster. Whole nations sank under the ocean, and millions of people perished in droughts, floods, fires, war, and overcrowded refugee camps. You learned all about it in school, like everyone else. \n\n\t\tKota Perahu was one of the first floating cities made of the near-indestructible material known as Glass, and it remains one of the best. Glass spheres with diameters ranging between three and three hundred meters ease turbulence, dampen storms, turn sunlight into power, act as computer screens whenever required, and house a million people—including farms, schools, hospitals, and everything else that makes a city a city.\n\n\t\tFrom far away, Kota Perahu looks like a hundred thousand interconnected pearl necklaces laid out in a snowflake shape on the ocean. But that snowflake was perfectly fine when the last great chunks of polar ice disappeared. Boringly fine.\n\n\t#City Local: March 7, KP 96. Mom and Dad's standard practice. Huzzah for Kota Perahu.\n\t\t*set value_farm %+10\n\t\t*goto Glass\n\t#My bionic birthday: 5 November, KP 94. The day I had permanent Glass extensions grafted onto my thigh bones so wearing my above-knee prosthetics got way simpler.\n\t\t*set empathy %-10\n\t\tHumanity has had a Bronze Age, an Iron Age, and so on. Today is part of the Glass Age. Kota Perahu is made of Glass, and ever since your last major surgery, so are your leg bones. The Glass spheres of your city ease turbulence, dampen storms, turn sunlight into power, act as computer screens whenever required, and house a million people—including farms, schools, hospitals, and everything else that makes a city a city.\n\n\t\tWith Glass bones protruding from the ends of your thighs, it's easy to click your prosthetics on or off and to go through your days with minimal skin-to-prosthetic friction. Of course, you still have to wear and maintain all your liners and socks—and keeping them dry in a floating city is not easy.\n\n\t#My birth date: 5 May, KP 79. Screw 'em.\n\t\t*set empathy %-10\n\t\tEveryone is so damn proud of Kota Perahu, one of the first floating cities made of the near-indestructible material known as Glass. Spheres of Glass with diameters ranging between three and three hundred meters ease turbulence, dampen storms, turn sunlight into power, act as computer screens whenever required, and house a million people—including farms, schools, hospitals, and everything else that makes a city a city. From far away, Kota Perahu looks like a hundred thousand interconnected pearl necklaces laid out in a snowflake shape on the ocean.\n\n\t\tWhatever. You're still stuck sorting through rubbish because your parents tell you to.\n\nAt least your parents' farm is marginally more interesting than the ones growing soy, seaweed, neobananas, and all the other Kota Perahu crops. \n\nNow that you've entered the date, you use a pair of tek claws to sort the edible from inedible rubbish and then scan and weigh the pile that you'll actually feed to the stock. Once the rubbish is definitely clear of anything inorganic, you trundle the stinking pile over to the feeding zone. \n*fake_choice\n\t#I swear I'll feed myself to the stock rather than work here a second longer than I have to.\n\t\t*set empathy %-10\n\t#Once I'm the boss of this place, I'm never feeding the stock again.\n\t\t*set flexibility %-10\n\t#It's not so bad here.\n\t\t*set flexibility %+10\n\nYou walk along the feeding platform. The water is churning as the stock gathers in anticipation. Several dorsal fins break the surface briefly, and in the scrum, you recognize lemon sharks, great whites, a medium-sized pack of hammerheads, and of course tiger sharks. They're all delicious, and they're all greedy guts.\n\nYou recognize the great white trying to swim up the food chute: you call him Sweetie because he has an extraordinary ability to know when there's extra sweet potato coming his way. He's blocking all the other sharks, and if he so much as scratches himself on the side of the chute, his entire social circle will eat him.\n\nYou're pretty sure he knows exactly what he's doing and expects you to cave in before it's too late.\n\n\"You're the reason there are bumpers on the sides of the chute,\" you mutter.\n*fake_choice\n\t#I find out how far he can get up the slide in pursuit of a treat.\n\t\t*set curiosity %+10\n\t\tHe wriggles desperately upward and takes the sweet potato right from your hand! You can't help laughing as he slides back down and lands in the water with a splash, gulping down his sweet potato with a look of dopey satisfaction. \n\t\t\n\t\tIt's good to know Sweetie has you so well trained.\n\n\t#I throw a piece of sweet potato farther out so he has to go fetch it before he gets hurt.\n\t\t*set curiosity %-10\n\t\tSweetie gives you the side-eye and swims off to get his treat before someone else steals it.\n\n\t#I hide the sweet potato and give him some meat. It's better for him.\n\t\t*set flexibility %-10\n\t\tSweetie chomps it down as if he's starving, then looks at you like he's just getting started. He's still blocking the chute, and he'll cut himself on the sides any second.\n\n\t\tYou glare at Sweetie for what feels like an eternity. At last, he slides awkwardly off the food chute, and you're able to continue your chores with the satisfaction of knowing you won this round. One point for those who think humanity is still the superior species, despite not being smart enough to prevent world wars or global warming.\n\nBy the time the sharks are fed, Mom is standing by the water in her swimsuit.\n\n\"Hey kid,\" she says.\n\n\"Don't call me that,\" you say automatically. \"I'm seventeen in two months.\"\n\n\"Don't worry, I haven't forgotten. I'm enjoying it while I can.\" She actually looks at you for a moment—really looks at you—and it's the perfect opportunity to tell her everything you want and fear from your future. Self-sustaining cities like Kota Perahu are carefully balanced, so your list of possible careers is small: teacher, trader, shark farmer, tek worker, diplomat, politician, media personality, vet. But even that short list feels overwhelming right now.\n\n*page_break\n\nThe moment passes, and Mom is walking away.\n\nShe's already gathered all her medical tools, ready to do her daily checkup on the sharks. It's little more than an excuse for her to get in the water with her precious fish. She waits until she's sure they're finished eating and dives right into the sea.\n\nThe sharks are full of energy after their feed, and they swim fast and fierce, circling her like prey—except that she notices what they're doing, laughs, and joins the circle with them. They're perfectly safe when they're not hungry, and in any case, every human in the city has a basic wrist computer that will electrocute any shark foolish enough to bite them.\n\nMom can hold her breath for minutes at a time. It's a common skill in your generation but a rare one in hers: the first generation born at sea. It's funny to think that, unlike you, Drylanders can barely last a minute underwater before they need a breath. Humanity hasn't evolved, as such, but life is very different now than it was at the beginning of the twenty-first century. There are plenty of Drylanders still stuck in their anti-oceangoing ways, but you're glad you're not one of them.\n\nYou catch a glimpse of Mom's white swimsuit here and there among the gray bodies of the sharks. Sometimes you see her brown arm slicing through the water or her hand gently touching one of the sharks; she's checking they're well or choosing whom she'll draw away into the harvesting tank to be slaughtered and sold today. Sharks eat sharks, but Mom is the top predator here.\n\nYou're expecting a call from your friend Yunus, so it's time to get moving.\n*fake_choice\n\t#Use Dad's office. I'll be on time to talk to Yunus, and Dad'll be pleased to see me.\n\t\t*set flexibility %-10\n\t\t*set sunny %+10\n\t\tDad's office is on the top floor of a medium-sized sphere overlooking the sharks' main recreational zone. If you squint, you can see him dreamily watching Mom through the Glass. He never gets tired of admiring her or of doing all the boring work of the farm: papers, orders, schedules, trading. You don't think he's been near an actual shark in years.\n\n\t\tFortunately, you wore your lightest prosthetics today: your stompers. They're designed for wet environments, so they have round rubber ends that are more stable than flesh feet, and the legs are extendable, so you can wear them short (making you about stomach-height to most people), medium, or long. They're more comfortable than any of your longer prosthetic legs, and if you set them to their longest length, you're halfway up the ladder to Dad's office before you even begin.\n\n\t\tYou haul yourself the rest of the way up with your arms, enjoying that you know you can make it to the top easily. Dad grins as you come in. \"What's up?\"\n\n\t\t\"Is it okay if I make a call using your wall? Yunus is expecting me.\"\n\n\t\t\"Unfortunately now is no good. I'm about to have a meeting and it's not going to be pretty. You know how Drylanders are.\"\n\n\t\tThere's still time, so you hurry home.\n\n\t#Use a speeder to get home as planned. It's the most reliable way.\n\t\t*set flexibility %-10\n\t\t*set curiosity %-10\n\t\t*set yunus %+10\n\t\tPublic speeders are suspended below any sphere marked with a green band of color, so you head to the water to get to the nearest one quickly. Fortunately, you wore your lightest prosthetics today: your stompers. They're designed for wet environments, so they have round rubber ends that are more stable than flesh feet, and the legs are extendable, so you can wear them short (making you about stomach-height to most people), medium, or long. They're more comfortable than any of your longer prosthetic legs, and you can go down ladders like this one with minimal effort by simply extending and then retracting your legs.\n\n\t\tYou go down another ladder into a public two-person speeder. It's made of Glass and looks very much like any ordinary city sphere, except it's only big enough for a couple of chairs and a basic console. You strap yourself in and tap out the number for home.\n\n\t\tThe jets switch on. You're pressed back into the seat as the speeder rushes through the water, swerving around various structures and creatures—including several other speeders—and then locking onto the lower level of your home sphere.\n\n\t\tYour room is on your house's sublevel, so all you have to do is climb up the ladder into your room. Technically you don't touch the ladder at all, since you stand next to it and extend your legs until you can hold onto the bar on your ceiling. Then you swing forward as you retract your legs, landing neatly on your floor. The nearest moisture sensor automatically turns on a blast of drying air as you click off your stompers one by one and check the liners are still dry.\n\n\t#Go through the spheres. I might run into other friends. Who cares about Yunus, anyway?\n\t\t*set yunus %-10\n\t\t*set folami %+10\n\t\t*set diah %+10\n\t\t*set flexibility %+10\n\t\t*set temp_two 1\n\t\tYou walk over to the flexible passageway between your current sphere and the next, then tap twice to release the door. Since there are no storms in the area, it opens at once, and you hold onto the rope railings as you step through. You've worn your comfiest prosthetics for the short trip from home to the farm, so it's easy to walk on the ridged tunnel floor. Stomper prosthetics are as graceful as rubber-clad table legs, but they're stable in wet environments like Kota. They each have a simple extension system that you couldn't be bothered actually extending right now, so you're currently a little shorter than the average ten-year-old. The railings are above your head, but you like the feeling of having a low center of gravity.\n\n\t\tYou deliberately detour through your friend Diah's home sphere, step tapping the particular rhythm that lets her know you're there. She pops her head up the hatch from her own sublevel room, giggling as your classmate Folami climbs up the ladder with her so that you can see them both.\n\t\t\n\t\tThe three of you chat about the latest UV spikes, your cooking teacher's obsession with glow-in-the-dark food, and the numerous peculiarities of all your parents. It's a typical Kota Perahu mix of sign language, tapping, and speech, since you and Folami speak all three languages, and Diah can read lips as well as sign or tap. Each language has its strengths and weaknesses, and each is commonly known throughout Kota Perahu since about one-third of the population is Deaf or Hard of Hearing, thanks in part to the relatively small gene pool. In any case, sign language and tapping are better suited for communicating when you spend so much time chatting with friends through either water or Glass.\n\n\t\tAfter having a dolphin-milk shake, you head off, passing through several more spheres before you reach your own home.\n\nOnce you're sitting comfortably, you log on, activating one segment of the room's Glass wall. Yunus spots your presence on the interface, and his face pops up in front of you. \"Hey _______, how are you?\"\n*choice\n\t#Eva (female).\n\t\t*set name \"Eva\"\n\t\t*set he \"she\"\n\t\t*set him \"her\"\n\t\t*set his \"her\"\n\t\t*goto post_name\n\t#Heru (male).\n\t\t*set name \"Heru\"\n\t\t*goto post_name\n\t#Dana (nonbinary).\n\t\t*set name \"Dana\"\n\t\t*goto pronouns\n\t#Ester (female).\n\t\t*set name \"Ester\"\n\t\t*set he \"she\"\n\t\t*set him \"her\"\n\t\t*set his \"her\"\n\t\t*goto post_name\n\t#Mohammed (male).\n\t\t*set name \"Mohammed\"\n\t\t*goto post_name\n\t#Charlie (nonbinary).\n\t\t*set name \"Charlie\"\n\t\t*goto pronouns\n\t#Riku (male).\n\t\t*set name \"Riku\"\n\t\t*goto post_name\n\t#Mina (female).\n\t\t*set name \"Mina\"\n\t\t*set he \"she\"\n\t\t*set him \"her\"\n\t\t*set his \"her\"\n\t\t*goto post_name\n\t#Sam (nonbinary).\n\t\t*set name \"Sam\"\n\t\t*goto pronouns\n\t#Xavier (male).\n\t\t*set name \"Xavier\"\n\t\t*goto post_name\n\t#Kiara (female).\n\t\t*set name \"Kiara\"\n\t\t*set he \"she\"\n\t\t*set him \"her\"\n\t\t*set his \"her\"\n\t\t*goto post_name\n\t#Pria (nonbinary).\n\t\t*set name \"Pria\"\n\t\t*goto pronouns\n\t#[Write my own name.]\n\t\t*input_text name\n\t\t*label pronouns\n\t\tWhat pronouns would you like?\n\t\t*choice\n\t\t\t#He/his/him.\n\t\t\t\t*goto post_name\n\t\t\t#She/her/her.\n\t\t\t\t*set he \"she\"\n\t\t\t\t*set him \"her\"\n\t\t\t\t*set his \"her\"\n\t\t\t\t*goto post_name\n\t\t\t#Zhe/zher/zhim.\n\t\t\t\t*set he \"zhe\"\n\t\t\t\t*set him \"zher\"\n\t\t\t\t*set his \"zhim\"\n\t\t\t\t*goto post_name\n\t\t\t#They/their/them.\n\t\t\t\t*set he \"they\"\n\t\t\t\t*set him \"their\"\n\t\t\t\t*set his \"them\"\n\t\t\t\t*goto post_name\n\n*label post_name\n\"Hey, ${name},\" says Yunus. \"How are you?\"\n\n\"Still floating,\" you say. \"Am I late?\"\n\n*if flexibility >= 49\n\t\"Always,\" he says with a grin. \"Luckily I can amuse myself.\"\n*if flexibility \u003c 49\n\tHe laughs. \"You're never late!\"\n\n\"Okay, okay,\" you say, watching as one of the breeding sharks swims right underneath you. \n*fake_choice\n\t#I know I shouldn't, but I sometimes leave a little raw meat in the water nearby.\n\t\t*set curiosity %+10\n\t#It's my job to care for the sphere's submerged algae. I keep forgetting.\n\t\t*set flexibility %+10\n\t#I usually darken my room's Glass in case Mom decides to skinny dip again.\n\t\t*set curiosity %-10\nYou focus back on Yunus's face on the Glass. Sepia skin, straight dark hair falling into his eyes, slightly crooked mouth that makes him look like he's always about to tell a joke.\n\n\"Glass dollar for your thoughts,\" he says.\n\n\"Hmm?\" you say. \"Oh, don't waste a whole dollar. My thoughts are worth twenty cents, if that.\"\n\nHe sticks out his lower lip to blow at his fringe, which stands straight up and then falls back over his dark eyes. \"Listen, there's something I have to tell you. You might be angry. You'll probably be angry. Please don't be angry.\"\n\n\"That sounds serious.\"\n\n\"It is.\" He takes a deep breath and blows it out again. If he doesn't get to the point soon, he'll hyperventilate.\n\nYou've never seen him like this. He's usually so calm.\n*fake_choice\n\t#Is he alright?\n\t\t*set empathy %+10\n\t#If he's done something to hurt me or my family, I'll be furious.\n\t\t*set empathy %-10\n\t#Part of me doesn't want to know.\n\t\t*set curiosity %-10\n\"The truth is—\"\n\n[i]Beep![/i]\n\nSomeone else is trying to connect to you.\n*fake_choice\n\t#\"Just a sec, Yunus. Someone else is calling me and I want to see what they want.\"\n\t\t*set curiosity %+10\n\t\t\"Uh…never mind,\" he says. \"I can say my piece later.\"\n\t#Block the other person. Yunus is talking now.\n\t\t*set flexibility %-10\n\t\tYou raise your hand to signal the network to block the other person, but Yunus sees your movement. \n\n\t\t\"What are you doing?\"\n\n\t\t\"Just blocking someone.\"\n\n\t\t\"Oh,\" he says, suddenly awkward. \"No need. I can say my piece later.\"\n\n\t\t\"But—\"\n\t#Talk to both at once.\n\t\t*set flexibility %+10\n\t\tYou reach for the Glass to open a second conversation, but Yunus sees your movement.\n\n\t\t\"Is someone else trying to call you?\"\n\n\t\t\"Yes, but I can talk to both of you at once.\"\n\n\t\t\"Oh,\" he says, suddenly awkward. \"No need. I can say my piece later.\"\n\n\t\t\"But—\"\n\nHe leans forward and taps his own screen, ending the conversation.\n\nSo much for that ominous-sounding discussion. You allow the second call to go ahead.\n\nYour friend Kassandra's face appears on the screen, and she waves to you before signing, \"Put your best legs on! We're going on an adventure!\"\n*fake_choice\n\t#\"Oh no. Not again.\"\n\t\t*set curiosity %-10\n\t#\"Are you going to get me in detention again?\"\n\t\t*set empathy %-10\n\t#\"Your wish is my command.\"\n\t\t*set kassandra %+10\nShe barely hears you, literally bouncing with excitement as she signs wildly, \"We're going to Old Sydney!\"\n\nYou lift your hands to talk, but she's way ahead of you. Her long fingers make every word look graceful, and her rapid signing short-circuits your ability to argue.\n\n\"It's a beautiful cloudy day,\" she signs, lifting her eyebrows so her eyes are even bigger and brighter. \"Perfect for exploring.\"\n*choice\n\t#\"I love seeing different parts of the ocean.\"\n\t\t*set shark_sense %+20\n\t\t\"Exactly,\" she signs.\n\t\t*goto sydney\n\t#\"Ooh, cool! I love a chance to stretch my legs.\"\n\t\t*set athletics %+20\n\t\tShe taps her chest: \"Me too!\"\n\t\t*goto sydney\n\t#\"I'll do it if you let me keep anything we find.\"\n\t\t*set bargaining %+20\n\t\t\"Deal,\" she says, throwing her arms wide. \"All I want is to try out some new tek.\"\n\t\t*goto sydney\n\t#\"The answer is no, Kassie. Accept it or this conversation is over.\"\n\t\t*set flexibility %-10\n\t\tHer face falls, and she waits for you to change your mind. You don't.\n\n\t\t\"Can I come in?\" she asks.\n\n\t\tYou flip the switch to unlock the hatch, and she comes in, sitting cross-legged on the floor. She's wearing navy board shorts and a matching bikini top, with her hair in a long plait down her back. \"You really don't want to come to Old Sydney?\" she signs. \n\t\t\n\t\t\"The plague-infested city of rats?\" you say doubtfully.\n\n\t\t\"It hasn't had any outbreaks in years,\" she signs with a grin.\n\t\t*choice\n\t\t\t#\"Fine. Let's go see the submerged city.\"\n\t\t\t\t*set flexibility %+10\n\t\t\t\t*set temp 1\n\t\t\t\t*goto grin\n\t\t\t#\"I told you, my answer is no.\"\n\t\t\t\t*set flexibility %-10\n\t\t\t\t*goto nope\n\t\t\t#\"Says you. That city stinks, literally. Want a coffee?\"\n\t\t\t\t*set empathy %-10\n\t\t\t\t*label nope\n\t\t\t\tShe concedes defeat, and you go to rifle the kitchen cupboards for snacks. When you return via the lift, she's idly flipping through pop science sites using your Glass. There are some wild new tek designs surrounding her in high definition, everything from new computer systems to tek that has to be theoretical because human trials would be illegal.\n\n\t\t\t\tAt second glance, it's clear that her tek knowledge is way beyond yours. She's rotating designs and joining in online chats that don't even make sense to you.\n\t\t\t\t*fake_choice\n\t\t\t\t\t#We're not kids any more. Everything is changing—except our friendship.\n\t\t\t\t\t\t*set kassandra %+10\n\t\t\t\t\t#Since when was she so hot?\n\t\t\t\t\t\t*set kassandra %+10\n\t\t\t\t\t#Ugh, boring.\n\t\t\t\t\t\t*set kassandra %-10\n\t\t\t\t\"Is this what you want to do as a job?\" you sign, indicating the walls.\n\n\t\t\t\tShe signs something too quickly for you to follow, then throws the question back at you.\n\n\t\t\t\t\"Early days yet,\" you sign, but of course that doesn't satisfy her.\n\n\t\t\t\t\"Is that so?\" she signs. \"Does tek appeal? And if so, medical, technical, or architectural?\"\n\n\t\t\t\t\"I'm not sure.\"\n\n\t\t\t\t\"This isn't a job interview,\" she signs. \"Don't overthink it, just answer.\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"I'd prefer to work with people. Conscious people.\"\n\t\t\t\t\t\t*set poise %+10\n\t\t\t\t\t\t*set connections %+25\n\t\t\t\t\t\tKassie laughs at that. Jokes are sometimes the only way to get her off topic, and you've learned to handle her over the years. She's stubborn, but so are you.\n\t\t\t\t\t\t\n\t\t\t\t\t\tTek is definitely not your field. Maybe you could teach, or trade, or even work as a politician or diplomat.\n\n\t\t\t\t\t#\"Maybe, if I get paid a lot.\"\n\t\t\t\t\t\t*set net_worth +550\n\t\t\t\t\t\t*set bargaining %+10\n\t\t\t\t\t\tShe looks thoughtful, which makes you wonder exactly what future she has planned—for both of you. You have enough experience with a lack of ready cash to know you don't ever want to struggle financially.\n\n\t\t\t\t\t#\"I'd prefer to work with animals.\"\n\t\t\t\t\t\t*set shark_sense %+10\n\t\t\t\t\t\t*set value_farm %+25\n\t\t\t\t\t\tShe nods, but she looks disappointed. As her gaze shifts away from you into her own thoughts, her hands idly shape the words \"farmer\" and \"vet.\" You know you have the skills to take over the shark farm—if you want to.\n\n\t\t\t\t\"Future's coming,\" Kassie signs at you.\n\n\t\t\t\t\"Not today,\" you sign back.\n\n\t\t\t\t\"Let's go check out the dolphin farm,\" she signs. \"You didn't even come on the excursion.\"\n\n\t\t\t\t\"Because my family hates them.\"\n\n\t\t\t\t\"You're not your family.\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"Sure, let's check it out.\"\n\t\t\t\t\t\t*set connections %+10\n\t\t\t\t\t\tIt feels strange to go into the hated spheres of Kota Perahu's biggest dolphin farm. Kassie seems to know her way around, and you can't help feeling like she's been here more than once.\n\n\t\t\t\t\t\tBut that's not the weird part. The weird part is that it's set out so similarly to the shark farm, despite the fact that dolphins are used almost exclusively for milk rather than meat. There's a string of large spheres in a circle, leaving an open patch of relatively clear water in the center that's lined with a combination of useful and tourist-friendly items such as feeding slides and sheltered seating areas. There's even a restaurant sphere fixed above the others for the best possible view—although here, the restaurant serves desserts rather than mainly fish and chips.\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#Go enjoy some ice cream together.\n\t\t\t\t\t\t\t\tThere's a dizzying array of ice cream flavors, from the sublime (mint chocolate) to the ridiculous (fish and raisin). The staff cheerfully supply you with half a dozen free samples each, and you're thoroughly stuffed before you've stopped enjoying the view over the water.\n\n\t\t\t\t\t\t\t\tEventually, it's time to go.\n\t\t\t\t\t\t\t#Time to go. My parents would be cross if they knew I'd been here.\n\t\t\t\t\t\t\t\tIt doesn't feel right being here. Even when the school came here on an excursion, Mom and Dad wrote you a note to excuse you. You were younger then and knew not to make a fuss. Now that you're older, you seem to have absorbed their hatred of dairy farmers. They don't look evil, but they're still your competition.\n\n\t\t\t\t\t\t\t\tTime to go.\n\t\t\t\t\t\t\t#My knowledge of sharks would translate well into a job here—if I wanted it.\n\t\t\t\t\t\t\t\tThe staff around the place could just as easily be working at the shark farm: cleaning, sorting rubbish into food, more cleaning, taking a school group around. The only difference is that the schoolkids are encouraged to get into the water here, since dolphins are supposedly friendly and good.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tYou know better, naturally. Their cute squeaking and tricks don't fool you. Even the dolphin farmers know to keep the dolphin babies separate in case their own parents get bored and decide to cheerfully kill them. As dolphins do. Which reminds you, it's time to get out of here.\n\n\t\t\t\t\t\tKassie cheerfully hails one of the owners as he passes, and you grab her hand before she tells them exactly who your parents are.\n\n\t\t\t\t\t\tYou head back home together.\n\n\t\t\t\t\t#\"Let's go for a swim instead.\"\n\t\t\t\t\t\t*set athletics %+10\n\t\t\t\t\t\t\"I thought you'd never ask,\" she signs back at you.\n\n\t\t\t\t\t\tYou push her toward the hatch so you can get changed yourself, then set the hatch to autoclose so you can jump in without the awkward process of locking the hatch underwater. It's even more awkward with your tail, a beautiful piece of tek that Kassie designed and built for you. Once you're got it on and you're sitting on the edge of the hatch, you feel more like a water creature than a person.\n\n\t\t\t\t\t\tThen, with a wriggle and a slip, you're in the water. Kassie points in a direction, you nod acceptance, and she kicks off ahead of you. She always tries to race you, and she always loses. Or, as she likes to put it, her tail makes you win. But you know you're more than your tek. Even if it makes you feel like a mercreature.\n\n\t\t\t\t\t\tEventually you head back home.\n\n\t\t\t\t\t#\"Let's record a vid instead.\"\n\t\t\t\t\t\t*set reputation %+10\n\t\t\t\t\t\tHer eyes brighten. \"Singing, dancing, knowledge, or talking?\"\n\n\t\t\t\t\t\t\"All of the above.\"\n\n\t\t\t\t\t\tYou spend a solid several hours prepping and polishing a fun mixed-media visual post and then uploading it. It feels good to do something that's enjoyable for you and Kassie and for whoever ends up watching it.\n\n\t\t\t\t*fake_choice\n\t\t\t\t\t#Okay, that's enough Kassie for one day.\n\t\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\t#Ask Mom and Dad to have Kassie over for dinner.\n\t\t\t\t\t\t*set flexibility %+10\n\t\t\t\t\t\t\"Not today,\" Dad says, not even bothering to say why.\n\n\t\t\t\t\t\tKassie sees the expression on your face and shrugs acceptance.\n\n\t\t\t\t\t#I wish we'd gone to Old Sydney after all. Maybe tomorrow.\n\t\t\t\t\t\t*set curiosity %+10\n\n\t\t\t\tKassie is sitting on the edge of the open hatch of your room with her legs in the water when suddenly her face changes as if she's been punched in the gut.\n\n\t\t\t\t\"Kassie?\" you sign, moving closer and holding out your hand in case she needs help getting out of the water. \"What's wrong?\"\n\n\t\t\t\tWithout giving you an answer, she takes a breath and disappears under the water.\n\t\t\t\t*gosub ksharkbitone\n\n\t\t\t\tShe drops beneath the surface. \n\n\t\t\t\tWhatever she's done to her mind, she's still your friend. You jab the button to follow her, swimming awkwardly around the public speeder she was supposed to ride away to her home.\n\n\t\t\t\tKassie goes straight to the narrow space where the curves of her speeder and your house sphere meet and reaches out her hands.\n\n\t\t\t\t*gosub ksharkbittwo\n\n\t\t\t\tKassie swims to the place where the shark's tail is caught between the two Glass spheres. She turns and braces her legs against your home sphere to try to push the spheres apart, struggling against the inertia of the water. \n\n\t\t\t\tThe shark's blood taints the water, and suddenly you know there's a time limit to this rescue. \n\n\t\t\t\tOther sharks are coming—and they're not coming to help. They're coming to feed.\n\t\t\t\t*choice\n\t\t\t\t\t#I dive into the water to force the spheres apart—I reckon I'm stronger than Kassie.\n\t\t\t\t\t\tYou really hope you're not about to get yourself eaten.\n\n\t\t\t\t\t\tThe shark's enormous head turns to follow you as you swim past, but it doesn't snap its teeth like you expect. Perhaps Kassie has some kind of hold over it.\n\n\t\t\t\t\t\tShe's twisting in the water, trying to get better leverage. As you approach, she moves aside without looking, as if she sensed you coming. \n\t\t\t\t\t\t*if athletics > 10\n\t\t\t\t\t\t\t*set kassandra %+10\n\n\t\t\t\t\t\t\tYou brace yourself and push the spheres apart. It's not easy, but you can do it. Kassie pushes on the shark's tail, and it swims forward. It's free!\n\t\t\t\t\t\t\t*goto uhoh\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou brace your back against the speeder and try to push it away from the home sphere, but it's no use. You're not as strong as you thought.\n\t\t\t\t\t\t\t\n\t\t\t\t\t\t\tKassie grabs your hands and places them on the speeder's external controls, tapping on your wrist, \"On my signal.\" When she nods, you push as hard as you can, and Kassie does the same. \n\n\t\t\t\t\t\t\tThe shark swims free!\n\t\t\t\t\t\t\t*goto uhoh\n\t\t\t\t\t#I keep watch for the approaching sharks—I reckon I'm more focused than Kassie.\n\t\t\t\t\t\tIt's hard to see past the speeder, but you carefully scan all the water you can see, growing increasingly uncomfortable with the fact that you're vulnerable in all directions.\n\n\t\t\t\t\t\tYou glance at Kassie, who is still struggling to separate the spheres and free her new shark friend. \n\t\t\t\t\t\t*if flexibility \u003c 50\n\t\t\t\t\t\t\t*set kassandra %+10\n\n\t\t\t\t\t\t\tIt's hard to tear your glance away, but you know you're the only one keeping an eye out, so you force yourself to keep watching for the danger you know is coming.\n\n\t\t\t\t\t\t\tKassie's head pops back into the speeder, startling you. She gives you a thumbs-up as her shark swims past you to freedom, making the speeder rock from side to side.\n\n\t\t\t\t\t\t\t\"Thank you,\" Kassie signs.\n\t\t\t\t\t\t\t*goto uhoh\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tHow long has she been underwater? You squint, trying to see her more clearly. Is she losing her grip on the speeder? \n\n\t\t\t\t\t\t\tThe shark moves suddenly, startling you. It swims past you and away. Kassie did it!\n\n\t\t\t\t\t\t\tKassie's head pops back into the speeder, and she gives you a thumbs-up.\n\t\t\t\t\t\t\t*goto uhoh\n\t\t\t\t\t#I keep the hatch open so Kassie can get back in quickly when she's ready.\n\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\tKassie's injured shark doesn't appear to be a threat, but there are others on the way. They can sense the blood, and it'll rile them up.\n\n\t\t\t\t\t\tYou glance at Kassie, who is still struggling to free her new shark friend. She angles her body awkwardly, pushing against the speeder with her feet, until at last the spheres separate enough for the shark to swim free. \n\n\t\t\t\t\t\tKassie pops her head back into the speeder, and she gives you a thumbs-up before signing, \"Thank you!\"\n\t\t\t\t\t\t*goto uhoh\n*label grin\n*label sydney\nShe grins and points downward.\n\nYou follow the direction of her finger, seeing your own floor beneath your stomper prosthetics. Looking back up, you see Kassie still pointing down. You flick the switch to turn on the external lights.\n\nAnd there's the real-life Kassie, with her own three-person speeder, directly below you.\n\nIt seems you're going to explore Old Sydney. That means getting some proper legs on.\n\nYou slap your hand on the floor in the \"gimme a sec\" sequence that is as familiar as salt water to everyone in Kota Perahu, then turn the floor dark again as you pull off your stomper prosthetics. Changing legs is as personal as changing clothes.\n\nAll your prosthetics are hanging up in a row. You do a quick check of your flesh legs for scratches, ingrown hairs, or other problems, then slip on your all-purpose plastic seals as you think about which legs to wear. Other than the stompers and the runners, all your prosthetics have small storage compartments.\n*fake_choice\n\t#The cosmetic legs. I want legs that pass for real so we don't attract unwanted attention.\n\t\t*set curiosity %-10\n\t\t*set bargaining %+10\n\t\t*set legs 1\n\t#The all-purpose pair. They're great for physical challenges and spontaneity.\n\t\t*set flexibility %+10\n\t\t*set athletics %+10\n\t\t*set legs 3\n\t#The curved runners. I take advantage of any chance to show how fast I can be.\n\t\t*set empathy %-10\n\t\t*set athletics %+10\n\t\t*set legs 2\n\"Don't forget your tail!\" Kassie taps on the underside of your sphere.\n\nYou clip the heavy metal belt around your waist and push it down until it clicks into first position. Kassie built it for you, designing it to be portable and largely hands free. The lower section of the tail is even heavier, but fortunately, Kota is full of ladders and your upper body strength is epic. You put the tail's bottom half in an expandable string bag and settle the weight on your hip before sitting on your swing lift, then lowering yourself down into the open top of the speeder. You chuck the bag onto the spare seat.\n\n*if temp = 0\n\tKassandra's in navy board shorts and a matching bikini top, with her hair in a long plait down her back.\n\t*goto plait\n*else\n\tShe flips her braid over her back, almost vibrating with excitement.\n*label plait\n*fake_choice\n\t#\"You're looking fit.\"\n\t\t*set kassandra %+10\n\t\tShe passes a critical glance over your own board shorts, tank top, and messy hair and nods approval. \"So do you.\"\n\n\t#\"This was a great idea!\"\n\t\t*set kassandra %+10\n\t\tKassie beams, glad you're encouraging her.\n\n\t#\"Promise me we're not going to do anything stupid.\"\n\t\t*set kassandra %-10\n\t\t\"Could you repeat that please?\" she says, looking innocent as pie. \"I wasn't looking.\"\n\n*set temp 1\nThanks to Kassie's hacked speeder, you reach the center of Old Sydney in a couple of hours. You motor slowly between the ruined islands of what were once busy thoroughfares and major business centers. It's very quiet away from the sloshing of water against Kota's spheres and the staccato rhythm of its desalinators. \n\nFor a moment, you and Kassie just stand on your seats with your heads sticking up through the open roof, watching the water. The sea is different here: bluer in places and a muddy brown in others. Only about twenty buildings are visible above the water in what used to be the CBD.\n\nThen you look down, and there's something there. Something bigger than even a central sphere, shimmering white and sharply pointed in at least a dozen places.\n*fake_choice\n\t#I stay calm and tell Kassie to get back inside.\n\t\t*set poise %+20\n\t\tShe feels the tension of your fingers tapping a danger signal on her arm and immediately ducks back into her seat, strapping in and flipping up the safety switch cover, ready for you to click your own belt and give her the nod to go.\n\n\t\tYou strap in as fast as you can with shaking fingers and sign, \"Go!\"\n\n\t\tShe slams on the button, and you race away at top speed. You're pressed back into your seat. Kassie curves sharply, the force pushing your metal belt sharply into your waist and then your side as she takes you behind one of the enormous struts of the Sydney Harbour Bridge.\n\n\t\t\"Scan for movement?\" you tap on her wrist, and she switches on the scanner. The only reason to use tap signs when you're sitting right next to each other is to communicate privately, so she knows instantly that you think there's someone—or something—out there.\n\n\t\tThe scan comes up clear. You're not being followed.\n\n\t\tYou sag in relief, and Kassandra quirks an eyebrow. Calling up a drawing screen on your side of the speeder, you choose a black and white palette and draw a spiky shape. The computer automatically matches the shape…to the Sydney Opera House.\n\n\t\tKassandra bursts out laughing at you and signs, \"I used the latitude and longitude of the Opera House to program the speeder. It was the first major Sydney landmark I thought of.\"\n\t#Just because something's huge and spiky and directly below us doesn't mean it's going to kill us.\n\t\t*set shark_sense %+20\n\t\tYou slip back down onto your seat and set the motion sensor on. Nothing's moving—yet.\n\n\t\tCalling up a drawing screen on your side of the speeder, you choose a black and white palette and draw a spiky shape. The speeder's computer automatically matches the shape…to the Sydney Opera House.\n\n\t\tIt takes you a moment to figure out what happened. Kassie must have used the latitude and longitude of the Sydney Opera House as a simple way to navigate the speeder into the city.\n\n\t\tYou pop back up and out of the roof, glad you kept your cool.\n\t#I leap out and head for the bridge—I'm fast enough to draw it away from Kassie safely.\n\t\t*set athletics %+20\n\t\tThere's no time to fit your tail, or even remove the awkward weight of your legs. You flop out of the speeder like a dead fish and race away, relying on your powerful upper body to keep you going.\n\n\t\tThere's no doubt in your mind: you're fast, but not undersea-monster fast. You're counting on the monster to hesitate long enough to let you get to safety.\n\n\t\tAt the bridge, you swing up and out of the water, unable to resist a quick glance behind you for that awful ivory shape.\n\n\t\tIt's not there.\n\n\t\tIt terrifies you more than anything, but you look back, hoping against hope that Kassie's okay.\n\n\t\tShe's got the speeder on low speed with the lid still open, puttering across the water toward you. Nothing is disturbing the water, so you just hang on and wait for her.\n\n\t\tWhen she's close enough, you describe what you saw, and she bursts out laughing, tapping on the side of the speeder to give her laughter an audible sound to fit her gasping breaths. \"I used the latitude and longitude of the Opera House to program the speeder,\" she signs for you at last. \"It was the first major Sydney landmark I thought of.\"\t\t\n\n*page_break\n\nNow that you know you're safe, you look around. The top half of the Sydney Harbour Bridge's arch is above the water, looking like the backbone of an enormous metal sea serpent. The closest undamaged skyscraper has an oval feature at its peak. The next closest has a stepped roof, and you see something like an enormous chrysalis dangling inside one of the open white squares.\n\nYou hope it's not a dead body, but you're not close enough to be sure. If there's someone living in that building, you don't want to meet them. A few buildings farther along is a hexagonal block with lights in the windows and what looks like clean washing strung around the sides like an anemic tutu.\n\n\"Do you think you're up to climbing the bridge?\" Kassie asks. \"It'd be epic. Or we could go diving for a glimpse at the past—and possibly pick up something good to sell. Or we could go to those apartments and find some real Drylanders to talk to. I bet they're not nearly as monstrous as everyone says.\"\n*choice\n\t#Climb the bridge. It won't be easy, but it'll be awesome if we can reach the top.\n\t\t*set reputation %+25\n\t\t*goto exploreone\n\t#Go diving. There's probably heaps of cool stuff down there.\n\t\t*set net_worth +550\n\t\t*goto exploretwo\n\t#Take the speeder to the apartments. Let's get to know some real Drylanders.\n\t\t*set foreknowledge %+25\n\t\t*goto explorethree\n\n*label exploreone\nYou unhook your tail and put it on the spare speeder seat. Kassie activates the underwater mooring mechanism, including a time delay so you can both get free of the speeder before it sinks under the water to keep itself hidden until you return.\n\nYou scramble out the top of the speeder and hold onto one of the struts of the bridge. The metal is pitted and rusting, and most of the paint has worn away. It immediately throws your sense of scale out of whack—the smallest rivets are as big as your outspread hand, and the most delicate-looking cables are thicker than your arm.\n\nYou swing across to a V-shaped join, smacking your legs against the steel with a clang that echoes over the water. \n*if legs = 3\n\tIt's a good, solid foothold, thanks to the fact that your feet are presently in their default position: tripod-shaped steel with toughened rubber bases. Still, standing on one leg puts an uncomfortable amount of pressure on that thigh.\n*if legs = 2\n\tIt's difficult to get a foothold with your running blades on. Getting two footholds is out of the question, so your dominant thigh is taking an unhealthy amount of pressure.\n*if legs = 1\n\tIt's difficult to get a foothold with your cosmetic legs on. Getting two footholds is out of the question, so your dominant thigh is taking an unhealthy amount of pressure.\n*fake_choice\n\t#Find my next foothold and get to an access ladder before I hurt myself.\n\t\t*set curiosity %-10\n\t\tYou look around and see that one of the major struts near you is actually latticework, so you swing your other leg over and get a second foothold. With a well-practiced wriggle of your thigh, you get your first foot free and move upward. Next to the strut, there's a sagging metal fence. You use your weight to tug it lower so you can haul yourself over, using your legs for a bit of extra strength here and there. Kassie climbs over the same bit of fence to join you on what is clearly a walkway.\n\t#Glance back to see if Kassie needs help.\n\t\t*set empathy %+10\n\t\tKassie's standing on the Glass roof of the speeder as it descends. You shake your head at her as the water rises to her knees, and she just puts her hands on her hips. At the last moment she grabs a broken cable—nothing structural, or it'd be too big for her to hold—and uses it to climb up and over a sagging fence, landing on what's clearly a walkway. She stands on the fence to keep it down while you climb up and over it to join her.\n\t#Don't let Kassie see I'm finding this awkward. I've had my whole life to practice solving minor mobility hurdles like this one.\n\t\t*set empathy %-10\n\t\tYou let yourself fall backward, grabbing onto a sagging old fence while keeping your face toward the bridge so Kassie doesn't see the panic in your eyes. The fence jerks downward, almost knocking you off, but you keep your grip and then use the fence like a ladder to make your way onto a walkway. Kassie makes it to the walkway a moment later, puffing with the effort of the climb.\n\nThe walkway is quite steep, and it won't be an easy climb. You take a look around, thinking, and see another walkway directly below you, under the water. The road that was once the most important part of the bridge is only ten or twenty meters below, so close that you can see the train tracks and the pedestrian lane clearly. Nowadays, it's an accidental filtering system, holding several cars, sections of broken buildings, and drowned trees. You don't look too closely, since there are probably still some bodies down there.\n\nThe city is old and broken and sad, but it's not your tragedy. It feels amazing to be on land (sort of) and out of the city for once.\n\nYou point upward with a smile, and you and Kassie start walking, bent over because of the slope. An hour passes, and your legs aren't happy. You can't help realizing you're not even halfway to the top, and after that you'll have to come all the way down again.\n*fake_choice\n\t#Persevere. I'm determined to make it all the way.\n\t\t*set flexibility %-10\n\t\tIf pain is gain, you must be the richest person on Earth. \n\n\t\tIt hurts.\n\n\t\tIt really, really hurts.\n\n\t\tEven Glass bone extensions, computerized knees, and vat-grown liners have their limits. You crack out your extendable crutches from their magnets on the side of your legs and lean on them as heavily as possible. It still hurts.\n\n\t\tBut.\n\n\t\tYou reach the top of Sydney Harbour Bridge, and you're on top of the world. Nothing in Kota Perahu is this high, and for a moment, the dizziness almost throws you to the ground. The skyscrapers and islands peeking up from the water vanish against the endless dark blue, and Kota Perahu looks like a distant shimmering jewel.\n\t#Take a break. I don't want to get a blister and get stuck in stompers for a week.\n\t\t*set curiosity %-10\n\t\t\"Let's stop here for a bit,\" Kassie signs to you, anticipating your words in classic Kassie fashion. \"Shall I grab your crutches for you?\"\n\n\t\tYou nod, holding out your legs one at a time so she can unclick your extendable crutches from their magnets and lean them against the fence. She sits down, automatically placing her body so you can lean on her shoulder to lower yourself to ground level.\n\n\t\tOnce you're on the ground, you fiddle with the settings on your legs to change the pressure spots, though it's not possible to get rid of dangerous friction points altogether. At least Kassie's puffed out too. When you're ready, Kassie helps pull you to your feet, and you keep going. \n\n\t\tYou're focusing so hard on keeping your body working that the top of the bridge comes as a surprise. Suddenly you're on top of the world. Nothing in Kota Perahu is this high, and for a moment, the dizziness almost throws you to the ground. The skyscrapers and islands peeking up from the water vanish against the dark blue, and Kota Perahu looks like a distant shimmering jewel.\n\t#Tell Kassie I don't need to go all the way to the top.\n\t\t*set flexibility %+10\n\t\t\"Surely this is high enough?\" Kassie signs. \n\n\t\t\"It's really creepy when you read my thoughts like that,\" you sign back with a smile.\n\n\t\tShe sits down, automatically placing her body so you can lean on her shoulder to lower yourself to ground level.\n\n\t\tOnce you're on the ground, you fiddle with the settings on your legs to change the pressure spots, though it's not possible to get rid of them altogether. At least Kassie's puffed out too.\n\n\t\tYou're focusing so hard on keeping your body working that when you finally look up, the view over the water comes as a surprise. The skyscrapers and islands peeking up look like stones cast on the water, and Kota Perahu looks like a distant pearl necklace.\n\n*fake_choice\n\t#Take my legs off for a bit so my body has a chance to recover before I go back down.\n\t\t*set appraisal %+10\n\t\tIt's a huge hassle, but once you feel the air on your bare skin, you sigh in delight. You've done the right thing.\n\t#Act like nothing hurts.\n\t\t*set poise %+10\n\t\t\"You're a genius, Kassie,\" you sign to her. \"I'll never question you again.\"\n\n\t\tShe laughs at you, slapping the metal you're sitting on to give her laugh an accompanying sound.\n\t#Drink in the view…and the ache of every muscle. I've earned them both.\n\t\t*set athletics %+10\n\t\tThe sea looks flat as Glass from here, and peaceful. You know it better than that. Even so, the beauty of it—and the sheer size—entrances you.\n\nYou and Kassie chat for hours about Old Sydney, annoying parents, and the looming threat of adulthood. At last, you return to the speeder. The return trip is a lot easier, but you're still glad to get off the bridge.\n\n\"Do me a favor?\" Kassie signs with an uncharacteristically bashful smile. \"Put your fin on. I want to show you something.\"\n\n\"Tail,\" you correct her automatically. She might be the inventor, but you're the one who gets to look like a \n*if he = \"he\"\n\tmerman, \n\t*goto calling\n*else\n\tmermaid, \n*label calling\nand calling it a tail still makes you smile.\n\nYou detach your legs as she hops in the water to get out of your way. It's usually easy putting your tail on, but the cramped interior of the speeder is making it tricky.\n\n\"Ready?\" Kassie signs with one hand. Before you can answer, she takes a breath and disappears under the water.\n*goto post_explore\n*label exploretwo\nWhile Kassie manually steers the speeder toward some interesting underwater buildings, you take off your legs and attach the lower half of your tail, banging your elbow as you writhe around. Once the tail is all clicked into place and secure, you can relax and look out through the speeder's Glass walls.\n\nIt's a strange, square world, crumbled and rusted, with gray fish darting in and out of broken windows. It's fundamentally unnatural in shape, and it's hard to believe that your grandparents were born in square-edged dwellings like these. You spot some sharks and remember with a shiver of fear that these aren't your family's half-tame sharks. They're as foreign as Drylanders and just as likely to be hungry—and vicious.\n\nThe speeder beeps to indicate it's reached maximum depth. Kassie shuts off the engine, turns on the magnet so the speeder sticks to a metal-lined wall, and then signs, \"Which way?\"\n*choice\n\t#\"Let's swim deeper and find something really interesting.\"\n\t\t*set flexibility %+10\n\t\tKassie nods, looking pleased. She's always game for anything. You both begin the breathing exercises that let you last underwater for minutes at a time and gain some control of your buoyancy. When you feel the heavy sensation that says your lungs are ready, you push the button to open the lower door of the speeder. It always feels like magic to see the water waiting for you, flat and calm, instead of rushing inside.\n\n\t\tYou flop your tail over the edge, shivering as the water rushes through the million cracks and holes in the aluminum, tickling your skin as the tail's cavity fills.\n\n\t\tThen you push off the edge and fall down into the dark water, twisting around and flipping your tail to build up speed. \n\t\t*choice\n\t\t\t#Check that Kassie is close behind.\n\t\t\t\t*set empathy %+10\n\t\t\t\t*label together\n\t\t\t\tYou glance back and see that Kassie's just tapping the code to close the speeder. She twists around and kicks her legs, and the two of you swim deeper side by side.\n\n\t\t\t\tThe water gets darker much faster than usual, making you realize the city's debris isn't as settled as you thought. Kassie taps the sign for \"metal\" on your arm, and it's not clear if she wants to search for metal artifacts or if she has spotted one. Tapping is designed for fast, basic communication underwater or through Glass, and sometimes you wish the language wasn't so simple.\n\t\t\t\t*choice\n\t\t\t\t\t#Ignore the darkness at the edge of my vision and swim on.\n\t\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\t\tIt feels good to have the water rush past your face and to power your entire body with your hips. Your vision starts to sparkle, and you know you don't have long.\n\n\t\t\t\t\t\tThen you see it: a sign on a stone wall, still readable, saying \"Sydney Cove Jewelers.\" You swim into the mouth of the shop, and it's suddenly dark.\n\t\t\t\t\t\t\n\t\t\t\t\t\tYou swim to the right and feel movement behind you that says Kassie went left. Your hand runs over Glass cases, and you briefly consider smashing them—Drylander glass is terribly fragile—but then your fingers catch on something small and cool. A necklace.\n\n\t\t\t\t\t\tYou scoop up several necklaces blindly, then head for the door before you pass out from lack of air.\n\t\t\t\t\t\t*goto got_it\n\t\t\t\t\t#Let Kassie take the lead. She might risk her own safety, but she won't risk mine.\n\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\tYou hang back, and Kassie nods in understanding and swims harder. It's a long way down, but it's not the first time you've followed her somewhere unexpected.\n\n\t\t\t\t\t\tThen you see it: a sign on a stone wall, still readable, saying \"Sydney Cove Jewelers.\" Kassie swims inside, heading left, so you go in and veer right, groping along the glass wall in the darkness until your hand catches something small and cool. A necklace.\n\n\t\t\t\t\t\tYou scoop up several necklaces blindly, then head for the door before you pass out from lack of air.\n\t\t\t\t\t\t*goto got_it\n\t\t\t\t\t#Beat her to our target.\n\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\tIt feels good to have the water rush past your face and to power your entire body with your hips. Your vision starts to sparkle, and you know you don't have long.\n\t\t\t\t\t\t\n\t\t\t\t\t\tThen you see it: a sign on a stone wall, still readable, saying \"Sydney Cove Jewelers.\" You swim into the mouth of the shop, and it's suddenly dark.\n\t\t\t\t\t\t\n\t\t\t\t\t\tAs you swim to the right, your outstretched hand runs over Glass cases. You briefly consider smashing them—Drylander glass is terribly fragile—but then your fingers catch on something small and cool. A necklace.\n\n\t\t\t\t\t\tYou scoop up several necklaces blindly, then head for the door before you pass out from lack of air.\n\t\t\t\t\t\t*goto got_it\n\n\t\t\t#Race Kassie to see who can go deeper.\n\t\t\t\t*set empathy %-10\n\t\t\t\tIt feels good to have the water rush past your face and to power your entire body with your hips. The sea is your domain.\n\n\t\t\t\tThe water is deeper and darker than you expected, but you're well within your limited time when you reach the ground. There's a staircase with a railing here, so you hold onto that with one hand while looking up toward the surface. You're in a narrow alleyway between two tall buildings, and it reminds you uncomfortably of deep-sea trenches where the wildlife is at its most powerful and peculiar.\n\n\t\t\t\tKassie holds onto the railing from above. For a moment, you're vertically face-to-face, her legs drifting upward and your tail resting on the paved road. Then she points at a still-legible sign immediately across from you: \"Sydney Cove Jewelers.\"\n\t\t\t\t*choice\n\t\t\t\t\t#Ignore the darkness at the edges of my vision and swim inside.\n\t\t\t\t\t\t*set curiosity %+10\t\t\t\t\t\t\n\t\t\t\t\t\tYour vision starts to sparkle, and you know you don't have long.\n\n\t\t\t\t\t\tYou swim into the mouth of the shop, and it's suddenly pitch black. As you swim to the right, you feel movement behind you that says Kassie went left. Your hand runs over Glass cases, and you briefly consider smashing them—Drylander glass is terribly fragile—but then your fingers catch on something small and cool. A necklace.\n\n\t\t\t\t\t\tYou scoop up several necklaces blindly, then head for the door before you pass out from lack of air.\n\t\t\t\t\t\t*goto got_it\n\t\t\t\t\t#Let Kassie take the lead. She might risk her own safety, but she won't risk mine.\n\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\tYou hang back, and Kassie nods understanding and swims inside, heading left. It's not the first time you've followed her somewhere unexpected, so you go inside and veer right, groping along the glass wall in the darkness until your hand catches something small and cool. A necklace.\n\n\t\t\t\t\t\tYou scoop up several necklaces blindly, then head for the door before you pass out from lack of air.\n\t\t\t\t\t\t*goto got_it\n\t\t\t\t\t#Beat her to our target.\n\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\tYour vision starts to sparkle, and you know you don't have long.\n\n\t\t\t\t\t\tYou swim into the mouth of the shop, and it's suddenly dark. As you swim to the right, you feel movement behind you that says Kassie went left. Your hand runs over Glass cases. You briefly consider smashing them—Drylander glass is terribly fragile—but then your fingers catch on something small and cool. A necklace.\n\n\t\t\t\t\t\tYou scoop up several necklaces blindly, then head for the door before you pass out from lack of air.\n\t\t\t\t\t\t*goto got_it\n\n\t\t\t#Stick to a steady pace and stay aware of my surroundings.\n\t\t\t\t*set curiosity %-10\n\t\t\t\t*goto together\n\t#\"I want to know how they lived and worked. Let's explore inside this building.\"\n\t\t*set empathy %+10\n\t\tKassie nods, looking pleased. She's always game for anything. You both begin the breathing exercises that let you last underwater for minutes at a time and gain some control of your buoyancy. When you feel the heavy sensation that says your lungs are ready, you push the button to open the lower door of the speeder. It always feels like magic to see the water waiting for you, flat and calm, instead of rushing inside.\n\n\t\tYou flop your tail over the edge, shivering as the water rushes through the million cracks and holes in the aluminum, tickling your skin as the tail's cavity fills up.\n\n\t\tThen you push off the edge and fall down into the dark water, twisting around and swimming for the gap where one of the windows has long since been smashed to bits. It's surprisingly dark inside.\n\t\t*choice\n\t\t\t#Check that Kassie is close behind.\n\t\t\t\t*set empathy %+10\n\t\t\t\tYou glance back and see Kassie tapping the code to close the speeder. She twists around and kicks her legs, and the two of you swim deeper side by side. \n\n\t\t\t\tIt feels like home, being surrounded by water, but everything here is square. Swimming above a row of cubicles is like looking at a badly-designed toy maze.\n\n\t\t\t\tKassie taps the sign for \"look!\" on your arm and points at an office that has its own glass windows overlooking the rest of this space.\n\t\t\t\t*goto in_office\n\t\t\t#Race Kassie to see who can go deeper.\n\t\t\t\t*set empathy %-10\n\t\t\t\tIt feels good to have the water rush past your face and to power your entire body with your hips. The sea is your domain—building or no building.\n\n\t\t\t\tIt's like home, being surrounded by water, except everything here is square. Swimming above a row of cubicles is like looking at a badly-designed toy maze.\n\n\t\t\t\tYou spot a corner office that has its own glass windows overlooking the rest of the space.\n\t\t\t\t*goto in_office\n\t\t\t#Stick to a steady pace and stay aware of my surroundings.\n\t\t\t\t*set curiosity %-10\n\t\t\t\tYou glance back and see that Kassie's just tapping the code to close the speeder. She twists around and kicks her legs, and the two of you swim inside side by side.\n\n\t\t\t\tIt feels like home, being surrounded by water, but everything here is square. Swimming above a row of cubicles is like looking at a badly-designed toy maze.\n\n\t\t\t\tKassie taps the sign for \"look!\" on your arm and points at an office that has its own glass windows overlooking the rest of the space. \n\t\t\t\t*label in_office\n\n\t\t\t\tYou swim into the office, carefully avoiding the jagged edges of the brittle Drylander glass. Holding onto the flat top of an enormous mahogany desk, you stare through the outside windows at a gray-blue world of water and drowned buildings extending as far as you can see. Inside, there's a rusted empty safe mounted on an inner wall and darker patches on the wall where paintings used to hang.\n\n\t\t\t\tKassie comes in behind you and swims down to pick up a metal key from the floor.\n\n\t\t\t\tYour vision is starting to go black around the edges, but that key has to fit somewhere.\n\t\t\t\t*choice\n\t
