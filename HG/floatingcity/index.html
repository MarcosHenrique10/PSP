\nShe nods. \"The bad news is that something else scared them—all of them. Sharks, dolphins, and cats.\"\n\n\"You're connected to cats, too?\" you ask her.\n\nShe shrugs one shoulder with badly-acted false modesty. \"The point is, whatever scared them isn't gone. They're all fine, for the moment—about as anxious as if the city was moving quickly, or we'd gotten ourselves caught in a major storm—but the fundamental problem is still there. Somewhere.\"\n*fake_choice\n\t#\"What's it like in a cat's brain?\"\n\t\t*set curiosity %+10\n\t\tKassie widens her eyes and hunches her shoulders, glances from side to side jerkily, and then leaps from her bed and falls out of the camera's visual range.\n\n\t\tYou lean forward automatically, as if you could alter the camera's position by moving yourself. \n\n\t\tShe pops back into frame, wild-eyed, with her hands curled like paws beneath her chin. You yelp and jerk backward.\n\n\t\tKassie grins. \"Neurotic. Also greedy, and lazy, and sometimes sublimely comfortable.\"\n\n\t\tYou shake your head at her antics. She just laughs.\n\n\t#\"Whatever it is, Kota can weather it.\"\n\t\t*set empathy %-10\n\t\t\"Is that so?\" Kassie signs. \"Like the Nor-Nor-East Rebellion of 2063?\"\n\n\t\t\"That was ages ago,\" you point out. \"Besides, this sounds like a natural problem, not a political one.\"\n\n\t\t\"Nature and politics go hand in hand when it comes to the worst kinds of change,\" she points out, adding a circular flourish to remind you where you live—and why. \"Besides, the Vegetarian Guild's militant arm is getting more and more popular.\"\n\n\t\t\"A bunch of carrot-lovers,\" you sign. \"Everyone knows they don't have the resources to run Kota, even if they think they do.\"\n\n\t\tKassie sighs. \"I suppose we'll see how strong Kota is, soon enough.\"\n\n\t#\"How dangerous is this thing?\"\n\t\t*set flexibility %-10\n\t\tKassie thinks before she answers. \"Worse than Hurricane 27.\"\n\n\t\tYou aren't old enough to have lived through Hurricane 27, but you've seen some of the places where repairs were impossible. It's a nice grim school excursion each year, seeing that even Glass can break if the weather is bad enough. Kota didn't travel fast enough to escape the full storm, and rumor has it there are still a few body fragments out on the edges of the Nor-East arms of the city.\n\n\t\tYou don't need to say anything. Kassie can see your face.\n\nYou change topics with an effort and discuss your classmates. It seems everyone is already on work experience except the two of you. Kassie's using the time for her solo experiments, and your parents assumed you'd do work experience on the shark farm, so they never even flagged the forms.\n\nKassie rubs her eyes and then yawns tremendously. You can't help it; you yawn back. It's not even dinner time, but it's definitely time for bed. Kassie signs off.\n\nYou make yourself do a full repair routine on your residual limbs, checking every centimeter of thigh skin and washing, patting dry, and powdering yourself thoroughly. By the time that's done, you're too tired to eat any proper food. It's clear Mom and Dad are still at the farm and working hard on damage control. \n\nYou go to sleep.\n\n*page_break\n\nWhen you wake up, you feel like you're being watched. You don't move or even open your eyes. \n\nSomeone is sitting on your chair. You can hear them breathing.\n\nAt last you can't take it anymore, and you roll over, sitting up in the same fast movement.\n\n\"Dad!\"\n\nHe grins at you. \"Do you remember what today is?\"\n\nIt's weird to see him so gleeful, especially first thing in the morning. Is it his birthday or something?\n\n\"Trading Day!\" he says. \"We're going to New Sydney today—Dryland!\"\n*fake_choice\n\t#\"It's just a hole in the ground, Dad, not like Kota. Do I have to get up right now?\"\n\t\t*set empathy %-10\n\t\tHe struggles out of your chair—it's really not ideal for someone with such long legs—and puts your cosmetic prosthetics on your bed. You moan and head off to the bathroom.\n\n\t#\"I can't wait! What's it really like?\"\n\t\t*set curiosity %+10\n\t\t\"Dirty,\" he says. \"But pleasantly cool once you're a few levels down.\"\n\n\t\tHe passes your cosmetic legs over, and you leave them on the bed while you go to the bathroom.\n\n\t#\"How should I dress to make the best trades?\"\n\t\t*set flexibility %-10\n\t\t\"That depends,\" he says, jumping at the chance to talk to you about work. \"What kind of impression do you want to make? Do you want to look wealthy, like you don't really need to trade at all—or do you want to look poor and desperate, so they think they're getting a great deal?\"\n\n\t\t\"I'll look like myself, thanks,\" you say and head for the bathroom as he checks that your cosmetic legs are ready to wear.\n\nMom isn't even home. She must have stayed overnight with the sharks. You don't think anything else has happened—Kassie would have sent you a message.\n\nBreakfast is coconut-milk bubur. Dad always cooks rice porridge when Mom's away, and you've never told him that you don't like it either. He's clearly desperate to get going, so you don't make a fuss.\n\nYou'll have to pick up the others on the way: Diah, since she's doing work experience at the shark farm, and Folami and her mother, Kustiani. Like you, Folami's parents automatically held onto her for work experience. Unlike you, they're Vegetarians with a capital V. They're the only people your family hate more than dolphin farmers. When you were little, the gory protests often scared you, so it took a long time for you to realize that Folami's about as violent as a potato.\n\nIt's clear Dad wants you wearing your cosmetic legs today, presumably so the Drylanders don't spot any hint of weakness they could exploit for a better deal.\n*fake_choice\n\t#I wear them. Dad knows what he's doing. I won't let the shark farm down.\n\t\t*set sunny %+10\n\t\t*set value_farm %+10\n\t\t*set legs 1\n\t#I wear my runners. Maybe Diah and I can race each other on dirt somewhere.\n\t\t*set diah %+10\n\t\t*set connections %+10\n\t\t*set legs 2\n\t#I wear my all-purpose pair. Let the Drylanders see our engineering prowess. It might help Kassie if she wants to trade her tek someday.\n\t\t*set kassandra %+10\n\t\t*set value_dollar +0.2\n\t\t*set legs 3\nOnce you've donned prosthetics and clothes—and have let Dad stew for an extra few minutes just because it's nice to know someone other than you is nervous—you hop in the large-size speeder and tap in Diah's address. Fetching her first is a patently inefficient route, but Dad doesn't say a word. You both want a buffer zone between you and the veggies.\n\nThe speeder turns into a gradual stop. You can see Diah swimming just outside. She has excellent form, and you know she could best your swimming speed if it weren't for your tail.\n*fake_choice\n\t#Ask Dad to send a pulse through the water to remind her to get going.\n\t\t*set flexibility %-10\n\t\t*set sunny %+10\n\t\t\"Hey Dad?\" you say. \"I think Diah's forgotten about us. Better send a pulse.\"\n\n\t\tHe frowns in annoyance as he spots Diah and presses the switch. Diah turns around at once and sees you, signing, \"Sorry,\" before hurrying through the lower airlock of her home.\n\n\t#Distract Dad so he doesn't see how forgetful she is. Young people should stick together.\n\t\t*set empathy %-10\n\t\t*set diah %+10\n\t\t\"Hey Dad,\" you say. \"What are Drylanders like?\"\n\n\t\t\"Pale,\" he says, \"and they speak softly. You'll need to concentrate, without looking like you're concentrating.\"\n\n\t\tOut of the corner of your eye, you see Diah startle and then immediately swim into the lower airlock of her home.\n\n\t#Catch her eye and sign the worst insult I know at her. It'll be hilarious if she panics.\n\t\t*set curiosity %+10\n\t\t*set diah %+10\n\t\tYou wait and watch, and then Diah jerks in shock, noticing your enormous speeder for the first time. \n\n\t\t\"Sorry!\" she signs frantically.\n\n\t\tYou sign back at her with a grin, describing an anatomically unlikely act that's almost as complicated to sign as it would be to perform. Diah wags an admonishing finger and turns to swim into the lower airlock of her home.\n\n\t\t\"Who taught you that?\" Dad asks. His voice is utterly neutral, so you don't know if he's laughing at you or furious.\n\n\t\t\"Sorry, Dad.\"\n\n\t\t\"It's more plausible if you sign it with both thumbs twisted under the—\"\n\n\t\t\"Dad!\"\n\n\t\tHe grins and stops talking.\n\nBy the time Dad has fully latched the speeder onto Diah's house, she's dressed in suit trousers and a sleeveless button-up shirt, ready to go. Her hair is still wet, but Dad doesn't say a word.\n\nAt Kustiani's house, Dad is full of polite conversation and well-mannered phrases spoken as if from a script. Kustiani mirrors him perfectly, except she chooses not to take his hand as she comes inside the speeder. Folami is quiet and already looking queasy. You can't tell if it's just nerves or if she's having a reaction to the anti-UV pills you all took in preparation for the hours you'll spend outside today.\n\nIt's a relief to be out of the city traffic, skimming along the surface of the waves with the entire roof open to keep everyone cool. You, Folami, and Diah exchange careful glances, unable to speak openly about your nerves when the two adults are filling the entire Glass sphere with their own tension.\n*fake_choice\n\t#Talk about how delicious the sharks are this season and see if Kustiani punches me.\n\t\t*set folami %-10\n\t\tYou prattle on about the wonders of the shark farm, feeling only a little sorry for Folami as her mother's hands clench tighter and tighter in her lap.\n\n\t#Talk about Diah's athletic prowess so she sounds employable.\n\t\t*set diah %+10\n\t\tYou go on and on about Diah's amazing training regime and natural talent, and all of it is true.\n\n\t#Talk about the weather so poor Folami can stop flinching at every breath.\n\t\t*set folami %+10\n\t\t\"It's been very hot lately,\" you say cheerfully. \"Dry and hot. And also stormy.\"\n\n\t\tFolami agrees, speaking with the passion born of desperation. \"So, so dry,\" she says. \"When it's not raining.\"\n\nThe sea finally gets rough enough that Dad closes the roof and ups the AC, making it too noisy to talk. You ride in silence until Dad has to slow down to negotiate through the drowned city of Old Sydney. It's strange to think five million people once lived in and around and under the surface of this place. Something like two million are still living in the hill suburbs and in the tops of tall buildings, although there hasn't been an official count since the double flu. It might be as few as half a million left. You forget, sometimes, how narrowly your grandparents escaped a similar fate.\n\nTwo hours later, the ruined city is behind you, and Dad points to what looks like a narrow two-story building covered in dirt. It's a bus, and it will take you from the water's edge to New Sydney—from light to darkness.\n\nDad exchanges signals with a small figure dressed in heat-resistant silver. You climb out of the speeder through a hole in a wooden jetty that was clearly intended to be a temporary structure way back when it was new.\n*fake_choice\n\t#Walk steadily, showing no sign of landsickness.\n\t\t*set empathy %-10\n\t\tDry land always feels weird, especially for the first few steps. You walk over to the bus without disgracing yourself.\n\n\t#Keep an eye on Kustiani's behavior. She could try to undermine our share of the trade.\n\t\t*set curiosity %-10\n\t\tYou can see Kustiani watching Dad like a hawk. If she gets a chance to cause your family harm, she'll take it.\n\n\t#Encourage Diah and Folami.\n\t\t*set empathy %+10\n\t\tYou laugh at your own unsteady footsteps, and Diah laughs with you. Folami gives you a weak smile.\n\nThe bus driver is your age, but he moves awkwardly, swaddled as he is in several layers of reflective material. He communicates in imprecise gestures and doesn't remove his helmet at all. You'd heard the Drylanders feared the sun, but does he know how stupid he looks? Or perhaps it's a quarantine thing. New Sydney is vulnerable to epidemics, so their visitor protocols are the most intense in Australia.\n\nFollowing his instructions, you get on the bus. The windows are so dirty you can barely see out. You can't help feeling a little unsafe when he sits in the captain's seat and turns a key that makes the bus roar into shuddering life.\n\nDad gives you a tiny smile and shows you how to fasten the Drylander-style harness. You stare at the small remaining patch of sky, trying to hold on to its perfection instead of thinking about how you're about to go underground. Drylanders bury their dead, and you have an awful premonition of endless dirt corridors lined with decomposing bodies, so many that they fill the gaps between every home.\n\nThen the bus is heading sharply downhill, and you have only a split second of warning before the cement ceiling shuts out the sky. The air dies around you. It stinks of dust and burning: the result of machinery endlessly cycling the same air around and around and around. The urge to vomit rises in your throat. \n\nYour driver shuffles off, crinkling in his sun suit and leaving you alone. \n\nDad leads the way to a row of tall rectangular hatches—doors—and motions for you to enter the one next to his, which is marked with a disability sticker. \n*fake_choice\n\t#\"Don't leave me.\"\n\t\t*set empathy %+10\n\t#\"What's this for?\"\n\t\t*set curiosity %+10\n\t#Act calm.\n\t\t*set empathy %-10\n\n\"Chemical bath,\" Diah signs to you, shielding her words with her body to protect you from eavesdropping Drylanders.\n\nOh. Of course. Just like Kota.\n\nYou go through the door and let a mechanical arm collect your blood and mucus samples, then offer you a tiny pot for urine that already has your name and details printed on the side. At least your wrist computer is able to link into their system without problems. It lights up in red so everyone you encounter knows you've recently traveled outside Sydney. The wrist coms will also record every location you travel for several weeks as well as every other wrist com that comes within three meters of you during that time. Fun.\n\nOnce you've managed to produce sufficient urine, the robot withdraws, and the opposite door opens. There's a bin for your clothes, another for your prosthetics, and a body-heat camera to ensure your cleaning ritual is up to scratch. It always creeps you out to know someone is watching you shower, and you can't help wondering how many other visitors have sat on the same plastic shower chair before today. You brace yourself for the penultimate step: being doused in one more blast of disinfectant, this time in powder form.\n\nYou shake off as much of the pink dust as you can, wondering as always how a powder can leave you so sticky, and wait for the final shower to commence. Instead, your clothes are returned to you in a plastic bucket, smelling even more strongly of disinfectant powder than you do.\n\nNo shower. Gross. Stupid plague pit of a city. They probably programmed the quarantine blocks to skip water showers just so you'd all feel disgusting during your trade meeting.\n\nYou put your clothes back on, wincing as they stick to your skin. After that, your prosthetics are returned in an identical plastic bucket. You try to remove as much of the chemical powder as possible before putting them back on; the seal feels gritty, but it will have to do.\n\nThe others are already waiting for you outside.\n\nA Drylander in a dusty brown uniform—no helmet this time—approaches the group and says, \"This way, Floaters.\"\n*fake_choice\n\t#Slip her a fifty so she treats me well.\n\t\t*set net_worth -50\n\t\t*set connections %+5\n\t\tShe pockets the cash with a friendly nod. That's probably a good sign.\n\t\t\n\t#Stay calm. No one can tell how I feel from the outside.\n\t\t*set poise %+10\n\t\tYou match the woman's pace, walking a short distance behind her as you get used to the polished concrete under your feet. \n\n\t#Walk with the Drylander, exchanging information through small talk.\n\t\t*set bargaining %+10\n\t\tYou match the Drylander's pace and begin a careful conversation with her. She barely answers at first, but you eventually learn that the Drylander trade delegates are watching you approach, using hidden cameras placed all along your route.\n\n\t#Set a pace faster than hers so she feels off balance.\n\t\t*set athletics %+10\n\t\tYou walk just a fraction faster than the Drylander. When you're a few steps past her, you throw out an innocent smile and watch her scramble up to you before moving on again.\n\nYou're concentrating so hard that you're surprised when the woman pushes a button and twin metal doors open in front of you. She walks away without another word. Kustiani steps through the doors without hesitation, so you follow her—only to find there is no door on the other side, just twin rows of glowing buttons on the near wall.\n\n\"It's alright,\" Dad says quietly. \"This is a Drylander-style elevator. It descends to the deeper levels.\"\n\nThe metal doors close, and your stomach lurches as the tiny room plunges directly downward for what feels like an age. Then the doors open, and Dad carefully angles ahead of Kustiani so he can lead the way down another concrete corridor and through a wide wooden door. It's the first natural material you've seen down here, and you know at once that this is it. This is the room where the shark farm's fortune or failure will be decided for another year. Even something as simple as the way you enter the room might make a difference to Kota's fortunes for years to come.\n\nAnd you're all still covered in sticky, stinking disinfectant powder.\n*choice\n\t#Imitate the way Kustiani moves. She radiates power.\n\t\t*if appraisal > 30\n\t\t\tHer head is high, her movements sure. The looseness of her limbs is the key, so you copy that.\n\t\t\t*set connections %+10\n\t\t\t*goto yunusreally\n\t\t*else\n\t\t\tIt's impossible to tell what it is about Kustiani that makes her so impressive. Whatever it is, all you know is that you don't have it. You've failed the first test.\n\t\t\t*goto yunusreally\n\t#Trust in my poker face.\n\t\t*if poise > 30\n\t\t\tYou take a steadying breath and walk into the room, full of false confidence. False confidence does just as well as the real kind.\n\t\t\t*set value_farm +2\n\t\t\t*goto yunusreally\n\t\t*else\n\t\t\tYou try to take a steadying breath, but it just makes you cough and sputter like an idiot. You've failed the first test.\n\t\t\t*goto yunusreally\n\t#Diah looks strong and confident. Promise her a favor if she goes in before me.\n\t\t*if bargaining > 30\n\t\t\t\"If you go first, I'll talk you up to my parents,\" you tap on her arm.\n\n\t\t\tShe nods agreement and moves in front of you.\n\t\t\t*set foreknowledge %+10\n\t\t\t*goto yunusreally\n\t\t*else\n\t\t\t\"I'll pay you to go first,\" you sign.\n\n\t\t\t\"Absolutely not,\" she signs back to you, standing utterly still until you walk past. It's an awkward look, and you know you've failed the first test.\n*label yunusreally\n\nThe room is much larger than you expected, with a small crowd of Drylanders silhouetted by a floor-to-ceiling window showing the bright sky. After a moment, it's clear that it's not a window but an aggressively backlit screen. It's pathetic and comforting at the same time.\n\nOne of the Drylanders stands up and runs his hands nervously through his hair. He shifts position, trying to find an angle to block enough light so that you can see him clearly. Then he says, \"Welcome to New Sydney,\" and you know exactly who he is.\n\nYunus.\n*fake_choice\n\t#Call attention to his lies at once. Filthy Drylander!\n\t\t*set empathy %-10\n\t\t*set yunus %-10\n\t\t*set folami %+10\n\t\t\"Yunus,\" you snarl at him, hastily trying to think through all your past conversations to guess what he might be able to hold over you. \"I see now that everything I've heard about Drylander tricks was true.\"\n\n\t\tThe man on his left stands up so quickly that his chair clangs onto the concrete. \"How dare you speak to my son in that manner!\"\n\n\t\tYou can see Dad tense up at once, not knowing whether to reprimand you or defend you.\n\n\t\t\"Well, Yunus?\" you say. \"Will you not greet me, after all our many hours of chatting together?\"\n\n\t\tHe hangs his head. \"I'm sorry, ${name}. I'm sorry, Father. I just—\"\n\n\t\tYunus's father cuts him off with a glare and returns to his seat.\n\n\t#Signal to him that I won't betray him.\n\t\t*set empathy %+10\n\t\t*set Yunus %+10\n\t\tIt makes sense now that Yunus is bad at sign language. And now you know what he kept trying to tell you.\n\n\t\tYou sign one of the swear words that is unique to your arm of the Floating City, and you see the ghost of a smile in return. So. He's studied sign language because of you. Interesting.\n\n\t\tHe sits down and stares at his clasped fingers on the table. You'll be having a lively conversation later.\n\n\t#Don't react. The trading is what matters, not Yunus.\n\t\t*set flexibility %-10\n\t\tYou've been drilled on the traditional trading ceremonies of New Sydney a thousand times, but for a moment, you can't remember a word. \n\n\t\tThen the words come to you, and you say them all perfectly. Yunus is irrelevant now.\n\nOne of the Drylanders is clearly in charge of negotiations. He blinks a lot and can't seem to quite look at any of your group. You realize with a shock that he feels as sorry for Kota Perahu as you feel for New Sydney. He introduces the whole group, but you only notice his name—Ernezto—and Yunus.\n\nIt's time for the negotiations to begin.\n\n*page_break\n\nKustiani jumps in quickly, angling her body forward as if she wants to block the Drylanders from speaking to Dad at all. Folami winces sympathetically at you, and you tap, \"Don't worry; be happy,\" on the table for her benefit. Meanwhile, Kustiani is laying out an obviously biased report of the excellence of her excess crops and explaining how much she expects the Drylanders to pay for them.\n\nThe Drylander students—Yunus and one other—look on with carefully neutral expressions while the adults pretend to be startled, shocked, and then frankly offended by Kustiani's opening offers. It's a familiar game, and you start to relax, working out the percentages of the follow-up offers in your head and noticing the parabolic curve forming as the two parties draw ever closer to agreement.\n\nKustiani has schooled her expression to the mandatory anger and despair, but beneath it she's glowing. You've never seen her happy before, and it's fascinating to watch. \n\n\"What about you?\" Ernezto says suddenly, breaking Kustiani's flow and pinning you with a look of frank curiosity. \"Which crop do you most recommend this year?\"\n*fake_choice\n\t#\"The strawberry jam is to die for—which is why it's not for sale,\" I say truthfully.\n\t\t*set connections %+20\n\t\t*set folami %-10\n\t\t*set yunus %+10\n\t\tErnezto's eyebrows lift in surprise. \"Honesty!\" he says. \"I didn't expect that. Your parents own the largest shark farm on Kota, do they not?\"\n\n\t\t\"That's correct,\" you say cautiously.\n\n\t\t\"Then I hope to have the pleasure of trading with you again in future.\"\n\n\t\tFolami's jaw is clenched. You made an unforgettable impression on Ernezto, but you also betrayed a friend.\n\n\t#\"There's been a bumper crop of sweet potato, so there's a lot to sell, and it's tasty too.\"\n\t\t*set value_dollar +0.2\n\t\t*set connections %+10\n\t\tErnezto nods. \"Can't go wrong with sweet potato, but it doesn't grow well under our LEDs. I'll take a double portion, Kustiani—if you'll give me ten percent off.\"\n\n\t\tShe shakes her head sadly, but she can't keep the smile off her face. After a brisk argument, they settle on nine percent less than Kustiani's opening price, and you know you've done the veggies a favor—and benefited both cities in the process. It's a perfect trade.\n\n\t#\"I recommend the brussels sprouts.\" There's no market for the horrid things on Kota.\n\t\t*set value_dollar +0.2\n\t\t*set reputation %+10\n\t\t\"Very well,\" says Ernezto. \"We could all do with more greens in our diet, couldn't we?\"\n\n\t\tYou have no choice but to agree and try to hide your revulsion at the thought of the effect so many brussels sprouts will have on New Sydney's recycled air. \n\n\t\tKustiani is trying to hide her delight. She would have had to donate excess stock to the shark farm at a loss, and you've saved her a bundle—and benefited all of Kota. From now on, you'll be known as the hero who managed to sell brussels sprouts to New Sydney.\n\n\t#\"Shark.\"\n\t\t*set value_farm +2\n\t\t*set folami %-10\n\t\t*set sunny %+10\n\t\t*set lili %+10\n\t\tKustiani scowls at you, which doesn't matter except that you know Folami will suffer too. But Dad is glowing, and even Mom will be proud of you for taking the limelight—and the trading advantage—away from the veggies. \n\n\t\t\"Shark has been at a premium here,\" says Ernezto. \"I'll be glad to buy a double portion, if you can supply it.\"\n\n\t\tKustiani clears her throat loudly. Ernezto apologizes for getting off track. He'll conduct the full negotiations with Dad later, but it's clear the shark farm will do well today.\n\nYou watch as Kustiani continues setting vegetable prices and portions for the Drylanders. Ernezto does most of the talking, but every so often, he pauses to speak to one of the other Drylanders at the table. He never speaks to Yunus. Like you, Yunus is there to learn. You wonder if the Drylander students are all choosing their careers at the moment, just like in Kota. How did you fail to notice that Yunus never talked about what he wanted to do with his life?\n\nAs you sit, bursting with a thousand questions, you slowly realize that all the chairs on the Kota side of the table are slightly smaller than the chairs on the Drylander side. The brilliant false sunshine is giving you a headache, and now you know why all the Drylanders are seated in a row with their backs to the view. It's not to make you feel at home here under the ground. It's another filthy Drylander trick.\n\nKustiani's side of negotiations finally comes to a close, and everyone moves to another room for a lunch break.\n\n*page_break\n\nIt's immediately clear that the Drylanders have decided to impress you with their spread. At first glance, it looks amazing: bright buttery light shining on a massive table of brilliantly-colored fresh produce and crispy fried shark laid out next to a whole roasted kangaroo. As you look closer, the fresh food looks strangely cartoonish. It's too bright, and too round, and too flawless. It looks like plastic, and when you carefully try one of the brightest and smoothest apples, it's so soft and watery you struggle to swallow your mouthful.\n\nKustiani's a horrible person and your family's enemy, but at least she knows how to filter in just the right amount of real sunshine, desalinated water, and even the right amount of insects to produce food that is real and delicious. You sneak a glance over at the Drylanders' table—of course they can't possibly share the same table of food with outsiders, even if there are no active epidemics in the area—and their food has the same eerie perfection as yours. Even their kangaroo looks like the twin of yours.\n\nYunus is coming over to you, hampered by a drink in one hand and a loaded plate of fried shark and potato medallions in the other. There's no one else close by.\n*fake_choice\n\t#\"So it's true. All Drylanders are liars.\"\n\t\t*set empathy %-10\n\t\t*set yunus %-10\n\t\t\"And all Floaters are rude,\" he hisses back, then bites his lip. \"Not all of us are liars. Just me. I tried to tell you, before you came.\"\n\n\t\t\"When you'd already gotten to know me,\" you say. \"And never said a word.\"\n\n\t\t\"I didn't lie,\" he says.\n\n\t\t\"You fooled me,\" you say. \"Carefully and intentionally.\"\n\n\t\tHe lowers his head, staring at the untouched food on his plate. \"I'm sorry.\"\n\n\t\t\"So am I.\"\n\n\t#\"Why didn't you tell me you were a Drylander?\"\n\t\t*set curiosity %+10\n\t\tHe shakes his head, and you see tears in his eyes. \"I was a coward.\"\n\n\t\t\"But why?\" you say. \"Why didn't you simply tell me?\"\n\n\t\t\"Because I wasn't taught how to speak to people from a floating city, and I wanted to know.\"\n\n\t\t\"We're people,\" you say.\n\n\t\t\"I know that now,\" he says. \"Because of you.\"\n\n\t#\"You are my friend. Nothing else matters.\"\n\t\t*set empathy %+10\n\t\t*set yunus %+10\n\t\tHe sags in relief. \"You're not angry?\"\n\n\t\t\"Of course I am,\" you tell him. \"But I know you. You must have had a reason to keep your secrets. How can I resist forgiving you?\"\n\n\t\t\"Thank you so much.\"\n\n\t#\"You'd better not mess up today's trading.\"\n\t\t*set flexibility %-10\n\t\t\"I won't,\" he says with pathetic haste. \"I haven't told anyone anything about you.\"\n\n\t\tIt's strange to see him, knowing he's close enough to touch. You let the silence stretch until he stammers an apology.\n\n\t\tHopefully his nerves will put off the Drylanders and give Dad an edge in the trading room.\n\n\t#\"You look better in three dimensions.\"\n\t\t*set flexibility %+10\n\t\t*set yunus %+10\n\t\t\"I…what?\" he says. \n\n\t\t\"You heard me,\" you say with a smile.\n\n\t\t\"I'm so sorry about all this!\" he says. \"I never meant—\"\n\n\t\t\"It's alright,\" you say. \"I confess I'm curious about—\"\n\nErnezto taps a spoon on a drinking glass, making a musical noise. Regular Glass doesn't do that. It's a signal that negotiations are about to continue, so everyone files back into the meeting room, wincing at the brightness of the false light. At last everyone is seated, and the room falls silent.\n\n\"Go on,\" Dad says to you, eying the Drylanders on the other side of the room. \"Give trading a go. You're here to learn, aren't you? It's time to sell some sharks.\"\n\nYour stomach flips over. Dad planned this all along: a test of your abilities.\n*choice\n\t#I pretend we have somewhere else to sell the sharks in order to get a higher price.\n\t\t*if poise > 50\n\t\t\t*set value_farm +2\n\t\t\t\"We've just had a new market open up in Old Sydney,\" you lie smoothly, \"and we're struggling to meet demand.\"\n\n\t\t\tDad blinks but doesn't say a word.\n\n\t\t\tErnezto nods, biting his lip. It's clear New and Old Sydney aren't in regular communication. \"How about fifty dry dollars per kilo?\"\n\n\t\t\tDad's eyes widen as if he's just seen a chocolate cake.\n\n\t\t\t\"Seventy,\" you say, as nonchalantly as you can.\n\n\t\t\tErnezto sighs deeply, and you haggle until you arrive at sixty dollars.\n\t\t\t*gosub great\n\t\t\t*goto posttrade\n\t\t*elseif poise > 30\n\t\t\t\"We've got a new market this year,\" you say as casually as you can. \"So the demand for our sharks is increasing.\"\n\n\t\t\t\"Really?\" says Ernezto. \"Where?\"\n\n\t\t\tFor a moment your mind blanks out in panic. Then inspiration strikes. \"Old Sydney.\"\n\n\t\t\tErnezto slumps in defeat. It seems New and Old Sydney don't get along. Thank goodness for that.\n\n\t\t\t\"How about sixty dollars per kilo?\" you say, carefully keeping your eyes away from Dad. This is your trade, not his.\n\t\t\t*gosub good\n\t\t\t*goto posttrade\n\t\t*else\n\t\t\t*set value_farm -2\n\t\t\t\"We have another market, of course,\" you say, feeling your eyes widen as you try not to look like a liar.\n\n\t\t\t\"Mmm,\" says Ernezto. It's clear he doesn't believe you. \n\n\t\t\tYou stammer, panicking with the knowledge that you've screwed up a vital trade. \n\n\t\t\t\"Thirty dollars per kilo,\" Ernezto says evenly.\n\n\t\t\tYou bargain him up to forty dollars, but \n\t\t\t*gosub poor\n\t\t\t*goto posttrade\n\t#I drive a hard bargain, showing how tough I can be when Kota's reputation is at stake.\n\t\t*if empathy \u003c 30\n\t\t\t*set value_dollar +0.2\n\t\t\tYou stare at Ernezto, ignoring the harsh light behind him. \"Seventy dollars per kilo.\"\n\n\t\t\tErnezto raises an eyebrow at Dad, but Dad doesn't say a word.\n\n\t\t\t\"Forty,\" says the Drylander.\n\n\t\t\t\"Seventy,\" you say again.\n\n\t\t\tHe glances at Dad again but finds no help there. \"You're meant to change your offer,\" he says.\n\n\t\t\t\"Not if your offer is too low to acknowledge,\" you say, hoping he can't see you sweating. \"Seventy dollars.\"\n\n\t\t\t\"Fifty,\" says Ernezto. \"Fifty is a fair price.\"\n\n\t\t\t\"Sixty-five,\" you say and ignore the angry murmur from the rest of the Drylanders.\n\n\t\t\tErnezto chews on his lip. \"We can stretch to sixty.\"\n\n\t\t\t\"Deal.\"\n\t\t\t*gosub great\n\t\t\t*goto posttrade\n\t\t*elseif empathy \u003c 40\n\t\t\tYou stare at Ernezto, trying to ignore the harsh light behind him. \"Seventy dollars per kilo.\"\n\n\t\t\t\"Forty,\" says Ernezto.\n\n\t\t\t\"Sixty,\" you say.\n\n\t\t\t\"Forty-five,\" says Ernezto, signaling with his offer that you've pushed hard enough. He's either an honest man or an excellent liar. Either quality is useful in a career trader. \n\t\t\t*gosub good\n\t\t\t*goto posttrade\n\t\t*else\n\t\t\t*set value_dollar -0.2\n\t\t\tYou stare at Ernezto, but the light behind him is so bright you can't see his eyes. \"Seventy dollars per kilo.\"\n\n\t\t\t\"No,\" says Ernezto.\n\n\t\t\t\"What do you mean, no?\" you say, knowing at once that you were too ambitious.\n\n\t\t\t\"We are your best market,\" says Ernezto. \"Without us, you have nothing. We will pay you forty dollars. Take it or leave it.\"\n\n\t\t\t*gosub poor\n\t\t\t*goto posttrade\n\t#I watch the faces of the Drylanders for clues about how much I should charge.\n\t\t*if empathy > 70\n\t\t\t*set reputation %+10\n\t\t\tYou stand, forcing the Drylanders to look up at you, waiting for you to speak. Ernezto blinks first, and you realize you're not the only nervous person at the table.\n\n\t\t\tYou examine each face in turn, taking your time. It's obvious they need shark meat here, and you're their biggest supplier. That makes you powerful. The thought gives you a rush, and you feel yourself standing taller.\n\n\t\t\t\"Sixty!\" Ernezto blurts out. \"Sixty is our maximum.\"\n\t\t\t*gosub great\n\t\t\t*goto posttrade\n\t\t*elseif empathy > 60\n\t\t\tBefore you suggest an opening number, you look carefully at Ernezto. It's hard to see with the bright light behind him but not impossible.\n\t\t\t\n\t\t\tHe blinks and looks away. You look at the other Drylanders, and they all show signs of nervousness. \n\n\t\t\tThis trade is as important to them as it is to you. \"Sixty,\" you say.\n\n\t\t\tErnezto hesitates, but you know you picked a good starting position.\n\t\t\t*gosub good\n\t\t\t*goto posttrade\n\t\t*else\n\t\t\t*set value_farm -2\n\t\t\tYou try to read Ernezto's expression, but the light behind him makes it too difficult. All the Drylanders are sitting very still, but you don't know what that means. Are they being polite? Are they afraid? Are they asleep?\n\n\t\t\tErnezto doesn't speak. He's giving you space to make the opening bid. No one's told you what to do.\n\n\t\t\t\"Fifty,\" you blurt out. \"That's what you paid last year, isn't it?\"\n\n\t\t\t\"This year we'll pay forty,\" says Ernezto. You know what he's feeling now: pleased.\n\n\t\t\t*gosub poor\n\t\t\t*goto posttrade\n*label great\n*set sunny %+10\n\nDad beams in delight before quickly schooling his face back to neutrality so the profitable trade doesn't fall through.\n*return\n*label good\n*set sunny %+10\n\nYou haggle Ernezto up to fifty dollars and then let yourself look at Dad. He gives you a satisfied nod. You did fine.\n*return\n*label poor\nDad turns his face away, and you know you've done badly. Unfortunately, a deal is a deal.\n*return\n*label posttrade\n*page_break\n\nThe adults sign various papers organizing payment and delivery dates, and your group is herded back toward the escalator. You can't help longing for real air and real sunshine, and you feel suddenly exhausted. No one commented on your legs, so that's something. \n\nYou stare at the lift doors, longing for them to close and start your journey out of the immense hole that is New Sydney. Then you notice Folami isn't with you. She's talking to Ernezto, babbling away at breakneck speed and clinging on to his arm.\n\nErnezto leads her over to the open lift and puts his free hand out, making the lift doors jerk back instead of closing. \"This young woman is interested in becoming my apprentice. What can you tell me about her?\"\n\nKustiani grabs Folami and wrenches her into the escalator, almost tugging Ernezto inside with her. \"My daughter is a proud citizen of Kota Perahu. She will not work for you.\"\n\nFolami crumples, turning at once into a small child who doesn't dare interrupt the grown-ups' conversation.\n\n\"She will be an adult soon,\" Ernezto says mildly. He turns to you with a questioning look on his face.\n*fake_choice\n\t#\"She's with the vegetarians. I doubt she'll adapt to a kangaroo-based diet.\"\n\t\t*set folami %-10\n\t#\"Folami's good company and adaptable. You should give her a chance.\"\n\t\t*set folami %+10\n\t#\"I'm interested in New Sydney myself.\"\n\t\t*set sunny %-10\n\"Interesting,\" says Ernezto. \"Well, I shall certainly be in touch with you, Folami.\"\n\n\"Thank you,\" she says, signing it nervously at the same time.\n\nThe elevator ride is an exercise in pain. The space is small, the air is old, and the silence simmers with the tension of being trapped in an unfamiliar place with Dad and Kustiani—and Folami, a new addition to the list of most-stressed people in Kota. You begin to think the machine has stopped and the Drylanders have forgotten you and that you're going to die without ever seeing the sky again.\n\nThen the doors open, and you lead the way down the long concrete corridor toward the real world.\n*finish Chapter Four", "chapter_twelve_a": "*set somethings_coming 0\n*comment NEW SYDNEY\n*comment: thematic of enemies/humanity coming together.\nThe group disperses into its component parts. Suddenly you're alone, and the last few hectic hours feel like a dream. A dream that left several dirty coffee cups scattered around your living room.\n\nYou stare at the cups. How can you wash dishes when there's an earthquake coming that could kill tens of thousands of people?\n\nThere's a brief moment when you brighten, thinking you might be able to skip dishes for the foreseeable future. Then reality intrudes, and you take the coffee cups to the kitchen and get to work. The kitchen faces the dining room, which in turn faces the sea toward the shark farm. It's no accident.\n\nYou let your hands keep on washing, rinsing, and drying while you look out at the sea. It's part of your home as much as the sink in front of you. Even now, the sea's danger always seems to apply to other people, other cities—not to you.\n\nFor a moment, you're tempted to forget everything you know about the coming earthquake. Your life would be so much easier, and no one would need to know that you didn't try your best. Kota Perahu is safe, after all. And Arkville and the Sydneys, with a few notable exceptions, are full of horrible people who hate Kota and would let it sink if they had the chance.\n*fake_choice\n\t#I couldn't do that to Yunus.\n\t\t*set yunus %+10\n\t#I couldn't do that to Kassie.\n\t\t*set kassandra %+10\n\t#I would never forgive myself if I did nothing.\n\t\t*set empathy %-10\n\nYou reach for another coffee cup, but they're all clean. Your stomach twists, but you're not hungry. It feels wrong to be standing in your kitchen and looking out at a calm sea when there is chaos and destruction hidden deep under the waves, ready to destroy lives, homes, and cities. The worst part is the waiting. How is it possible to be bored and terrified at the same time?\n\nIt's too early to start putting rescue plans into motion, but it's too late to do much else. You head downstairs to your room and do a thorough check and clean of all your prosthetics, even disinfecting your Glass bones and tightening your screws. It's soothing to step back into the routine, and your heartbeat settles down into a more normal rhythm.\n\nNow that you're calmer, it's easier to think properly. You're going to need to interrupt the normal routine of a city you barely even know, based on a branch of science that isn't meant to exist. Where do you start? You feel saturated with urgent tasks, and none of them are even possible. After some deep breathing, you consider how best to spend your time until Kassie sounds the alarm to charge into action.\n*choice\n\t#Rest while I can. \n\t\t*set athletics %+10\n\t\tYou have a shower and start to feel a little better. Everything is more manageable when you're not covered in your own sticky dried sweat. Showering at night is your normal bedtime routine since you can't do much if your legs are too moist, too dry, or have even the slightest scratch.\n\n\t\tNope, it's no good. Sleep is not happening. Telling yourself to hurry up and fall asleep isn't helping either. You lie on your back and swear quietly. The light is wrong; the temperature feels off; your legs itch.\n\n\t\tUgh. Trying to sleep is a thousand times more stressful than just giving up. \n\n\t\tYou try to trick your body into relaxing by reading a book, but it's no use.\n\t\t*goto test\n\t#Research.\n\t\t*set foreknowledge %+10\n\t\tIt turns out that studying is no easier with a tsunami hanging over your head. You desperately want to understand and absorb what you're reading, but your mind keeps dancing off into worst-case scenarios that are far more gripping than even the most thrilling import-export lists. \n\n\t\tYou study current people of influence, trying hard to memorize their faces just in case you cross paths—or decide to seek them out. The more you know, the more you feel that the task lying ahead of you is literally impossible. Your own life will soon be on the line, but it's not enough to inspire you to focus. \n\n\t\tWhen all else fails, use pretty colors. You design several overlapping maps of information, highlighting anything that might be useful in the most glaring shades available. Soon you have a lot written down. You just hope it's enough.\n\t\t*goto test\n\t#Help Kassie.\n\t\t*set foreknowledge %+10\n\t\tYou ping Kassie, and your wrist com automatically tells you her location: the shark farm. It also tells you her depth: several tiers underwater. Trust Kassie to use every second for extra research.\n\n\t\tYou secure your tail around your waist in its narrowest form—a thick belt—and get going. It's difficult to get to your diving suit because it seems like every staff member has heard rumors of coming trouble, and they all want to hear what you have to say about it. You repeat the same reassurances over and over, then finally get your deep-water gear on, your leg prosthetics off, and your tail fully extended. \n\n\t\tFor the next three hours, you and Kassie work together to take a complicated series of behavioral measurements, testing the baseline she established long ago.\n\t\t*if facts = 1\n\t\t\tYou don't see the shark with the mind implants, but Kassie assures you it's fine and still behaving normally. So far.\n\t\t\t*goto test\n\t\t*else\n*label test\n\nAt last the day passes. You eat a completely normal dinner with your parents, who are annoyingly calm. A part of you wonders if they're thinking about the fact that the Glass dollar is sure to go up if the nearby cities are badly damaged. You feel guilty for even thinking that. Then the evening finally passes and you really manage to go to sleep. \n\nYou dream of sharks. Sharks attacking, sharks swimming, sharks exploding as if they've eaten grenades. Sharks fighting with giant squids, sharks fighting with one another, sharks with dozens of prosthetic legs, sharks calmly discussing sociopolitical currents in the region.\n\nThen you wake up. \n*if facts > 0\n\t*set foreknowledge %+10\n\t*goto test_f\n*else\n*label test_f\n*if foreknowledge > 60\n\tIt's 3:00 a.m.\n\t*goto knock\n*elseif foreknowledge > 50\n\tIt's 5:00 a.m.\n\t*goto knock\n*else\n\tIt's morning.\n*label knock\n\nYour wrist is flashing Urgent, your lower hatch is pulsing red, and Mom is yelling at you from above.\n*fake_choice\n\t#Answer the ping.\n\t#Open the lower hatch.\n\t#Yell, \"Coming, Mom!\"\n\nIn a few minutes, Mom knows you're awake, Kassie is inside, and you've switched off the urgent pings that both of them had sent you.\n\n\"It's time,\" signs Kassie.\n\nYou stare at her, forcing down the panicked urge to argue. \"How long until the earthquake hits?\"\n\n\"Not long enough,\" she signs. \n*if k_experimentation = 0\n\t\"I should have kept going with my experimentation.\"\n\t*goto part_ways\n*elseif k_experimentation = 1\n\t\"I should have done more with my experimentation.\"\n\t*goto part_ways\n*else\n\t\"Thank goodness for all my experimentation.\"\n*label part_ways\n\nYou can't help but agree. \n*if newsyd_saved = 1\n\t*goto join_yunus\n*elseif (oldsyd_saved = 1) or (oldsyd_saved = 6)\n\n\t*goto_scene chapter_twelve_d\n*elseif (arkville_moved > 0) and ((arkville_moved \u003c 3) or (arkville_moved > 4))\n\n\t*goto_scene chapter_twelve_b\n*elseif sharks_moved = 1\n\t*goto_scene chapter_twelve_c\n\t\n*else\n*label join_yunus\n\n\"Good luck,\" she says and \n*if kassie_love = 0\n\thugs you quickly before heading off.\n\t*goto travel\n*else\n\tkisses you quickly before heading off.\n*label travel\n\nYou grab your backpack, then check and powder your flesh legs with care before putting on your all-purpose prosthetics. You realize as you begin to open the hatch that you haven't put anything inside the compartments of the legs. There are a few small items in your room that might be handy, especially in your emergency kit.\n*fake_choice\n\t#Pack extremely basic first aid supplies.\n\t\t*set temp_two 1\n\t\tYou divvy up the tiny kit so roughly half of it fits into each prosthetic. Under the circumstances, you prioritize wound care and treatments for shock. \n\t#Bring the miniature flare gun.\n\t\t*set temp_two 2\n\t\tEven the latest, smallest flare gun is not easy to jam into place, but you remove the flares and put them in the other compartment. \n\t#Take a two-way long-distance radio that might work if other networks fail.\n\t\t*set temp_two 3\n\t\tIt doesn't quite fit, but when you remove the battery—which is fully charged—and put it in the opposite leg, it all works. \nYou're slightly off balance, but you can manage.\n\nWith that, you jump into your parents' fastest and largest speeder and set a course for New Sydney. As soon as the speeder pulls away from Kota, you ping Yunus. He's obviously expecting you and answers right away. \"Kassie said it's time,\" he says. \"What do we do? What do I do?\"\n\n*if foreknowledge > 60\n\tIt's not even 4:00 a.m., and Kassie says the earthquake will hit around 11:00 a.m. You have seven and a bit hours.\n\t*label wakey\n\n\t\"Wake people up,\" you say firmly. \"Starting as deep as you can, since they'll need the most time to evacuate.\"\n\t*goto section_two\n*elseif foreknowledge > 50\n\tIt's not even 6:00 a.m., and Kassie says the earthquake will hit before lunch. That's way too soon.\n\t*goto wakey\n*else\n\tThe sun is already burning off the few clouds that formed overnight.\n*label section_two\n\nYou wish you'd spent longer figuring out a solid plan.\n\n\"Time to save New Sydney,\" you say. \"What would trigger the most complete evacuation procedure?\"\n\n\"Fire,\" he says, without hesitation. \"Even a relatively small fire could cause great harm if it was located at or near a significant structure. Obviously places like air filters have backups, but…well, there are two of us.\"\n\n\"Are you talking about sabotage?\" you ask.\n\n\"Uh…I thought you were.\"\n*choice\n\t#\"I agree. It'll be the best way to get people to evacuate.\"\n\t\t*gosub meeting_yunus\n\t\t\"So…where do we start with the fires?\" he asks you.\n\t\t*choice\n\t\t\t#\"As low as possible so the lower layers evacuate first.\"\n\t\t\t\t*gosub inside\n\t\t\t\t*goto set_fire\n\t\t\t#\"The closest landmark so the evacuation starts ASAP.\"\n\t\t\t\t*gosub inside\n\t\t\t\t*goto set_fire\n\t\t\t#\"In the air-conditioning system so people will smell it and take the alarm seriously.\"\n\t\t\t\t*gosub inside\n\t\t\t\t*goto set_fire\n\t#\"Absolutely not. But we will need your parents to tell people about the earthquake.\"\n\t\t*gosub meeting_yunus\n\t\tHe sighs heavily. \"Right. I have to talk to my parents, and now.\"\n\t\t*choice\n\t\t\t#\"What's the fastest way to meet them?\"\n\t\t\t\t*set foreknowledge %+5\n\t\t\t\t\"Halfway between here and their work,\" he says, already pinging them with an address.\n\n\t\t\t\t*gosub inside\n\t\t\t\tHis parents are waiting on a public bench, talking quietly to one another.\n\n\t\t\t\t*gosub ester_talk\n\t\t\t\t*choice\n\t\t\t\t\t#Tell them to check up on me so they know I'm not inclined to exaggerate.\n\t\t\t\t\t\tThey both scowl at you and then turn to their wrist computers. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto parent_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto parent_bad\n\t\t\t\t\t#Say, \"You know I'm reliable, so trust me: this is an emergency.\"\n\t\t\t\t\t\tThey turn away and talk quietly to one another, checking a few details on their wrist coms. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto parent_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto parent_bad\n\t\t\t\t\t#Bribe them.\n\t\t\t\t\t\tThey both scowl at you and then turn to their wrist computers. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep. \n\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 1000)) or (net_worth > 1500)\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tThank goodness for a decent amount of personal savings—and a relatively strong Glass dollar.\n\n\t\t\t\t\t\t\t*goto parent_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tYour personal savings aren't up to scratch, and the exchange rate between the Glass and Australian dollar isn't helping.\n\n\t\t\t\t\t\t\t*goto parent_bad\n\t\t\t#\"What's the best place to meet them?\"\n\t\t\t\t\"Their work,\" he says.\n\n\t\t\t\t*gosub inside\n\t\t\t\tTheir work hub is an impressively shiny edifice of polished stone and Glass. Yunus leads you through the oversize foyer and up a private lift to their office.\n\t\t\t\t*gosub ester_talk\n\t\t\t\t*choice\n\t\t\t\t\t#Tell them to check up on me so they know I'm not inclined to exaggerate.\n\t\t\t\t\t\tThey both scowl at you and then turn to their wrist computers. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto parent_good\n\t\t\t\t\t\t*else \n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto parent_bad\n\t\t\t\t\t#Say, \"You know I'm reliable, so trust me: this is an emergency.\"\n\t\t\t\t\t\tThey turn away and talk quietly to one another, checking a few details on their wrist coms. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto parent_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto parent_bad\n\t\t\t\t\t#Bribe them.\n\t\t\t\t\t\tThey both scowl at you and then turn to their wrist computers. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep. \n\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 1000)) or (net_worth > 1500)\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tThank goodness for a decent amount of personal savings—and a relatively strong Glass dollar.\n\n\t\t\t\t\t\t\t*goto parent_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tYour personal savings aren't up to scratch, and the exchange rate between the Glass and Australian dollar isn't helping.\n\n\t\t\t\t\t\t\t*goto parent_bad\n\t\t\t#\"Do you want to ping them or shall I do it?\"\n\t\t\t\t\"Ugh,\" he says. \"But seriously, I think you should do it. Sometimes it's easier to see maturity in someone when they're not your own grown-up kid.\"\n\n\t\t\t\tIt's surprisingly difficult to make yourself send the ping, but they respond quickly and even set the visuals on so you're looking at full-size images of them projected onto the wall. It's noticeably less clear than images on Glass.\n\t\t\t\t*gosub ester_talk_online\n\t\t\t\t*choice\n\t\t\t\t\t#Tell them to check up on me so they know I'm not inclined to exaggerate.\n\t\t\t\t\t\tThey both scowl at you and then turn to their wrist computers. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto parent_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto parent_bad\n\t\t\t\t\t#Say, \"You know I'm reliable, so trust me: this is an emergency.\"\n\t\t\t\t\t\tThey turn away and talk quietly to one another, checking a few details on their wrist coms. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto parent_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto parent_bad\n\t\t\t\t\t#Bribe them.\n\t\t\t\t\t\tThey both scowl at you and then turn to their wrist computers. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep. \n\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 1000)) or (net_worth > 1500)\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tThank goodness for a decent amount of personal savings—and a relatively strong Glass dollar.\n\n\t\t\t\t\t\t\t*goto parent_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tYour personal savings aren't up to scratch, and the exchange rate between the Glass and Australian dollar isn't helping.\n\n\t\t\t\t\t\t\t*goto parent_bad\n\t#\"No. We'll disturb the kangaroos to give people an early warning.\"\n\t\t*gosub meeting_yunus\n\t\t\"So how do we make the kangaroos panic?\" he asks. \"And how do we make sure people know to link animal behavior with an earthquake?\"\n\t\t*choice\n\t\t\t#\"Who looks after the kangaroos?\"\n\t\t\t\tYunus's face clears. \"The rangers. The ranger center is on Level Two.\" He checks the location on his wrist com before leading the way.\n\n\t\t\t\t*gosub inside\n\n\t\t\t\tHe takes you to a large wood-clad hall and knocks on the first door. A woman in a beige uniform with a name tag identifying her as \"Ranger Ayeesha\" answers the door. Another ranger (this one labeled \"Martha\") looks at you over her shoulder.\n\n\t\t\t\t\"We're not open for unscheduled visits today, sorry,\" Ayeesha says.\n\n\t\t\t\tYour stomach drops. The fate of New Sydney—and you with it—hangs in the balance.\n\t\t\t\t*choice\n\t\t\t\t\t#Tell them to check up on me so they know I'm not inclined to exaggerate.\n\t\t\t\t\t\tThey both scowl at you and then turn to their wrist computers. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto kangaroo_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto kangaroo_bad\n\t\t\t\t\t#\"Call the local shark shops to vouch for me.\"\n\t\t\t\t\t\tBoth rangers take a step back—blocking your exit—and ping a shop front each, texting back and forth with lightning speed.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto kangaroo_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*goto kangaroo_bad\n\t\t\t\t\t#Bribe them.\n\t\t\t\t\t\tYou ask for the code to donate money to the kangaroo preservation league. Both rangers scowl at you, but they give you the number and then look at their wrist coms. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 1000)) or (net_worth > 1500)\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tThank goodness for a decent amount of personal savings—and a relatively strong Glass dollar.\n\n\t\t\t\t\t\t\t*goto kangaroo_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tYour personal savings aren't up to scratch, and the exchange rate between the Glass and Australian dollar isn't enough to save the day.\n\n\t\t\t\t\t\t\t*goto kangaroo_bad\n\t\t\t#\"Who produces the news?\"\n\t\t\t\t\"The biggest is the [i]Underground[/i]. I think it's on Level Seventeen.\" He checks the location on his wrist com before leading the way.\n\n\t\t\t\t*gosub inside\n\t\t\t\tYou walk through a huge open door into an even bigger foyer. Before you reach the front desk, a security guard approaches and asks for your ID. Your stomach drops. The fate of New Sydney—and you with it—hangs in the balance. Getting into a TV studio is not going to be easy.\n\t\t\t\t*choice\n\t\t\t\t\t#Tell him to check up on me so he knows I'm not inclined to exaggerate.\n\t\t\t\t\t\tHe scowls at you and then turns to his wrist com. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto news_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\n\t\t\t\t\t\t\tThe guard's coworkers grab you and Yunus and take you to a holding cell while they decide what to do with you. You babble apologies and explanations, but they just shake their head at your panic. Once you're locked in, they leave you alone.\n\t\t\t\t\t\t\t*goto news_bad\n\t\t\t\t\t#\"Call the local shark shops to vouch for me.\"\n\t\t\t\t\t\tThe guard steps sideways—blocking your exit—and pings a shop front, texting back and forth with lightning speed.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto news_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\n\t\t\t\t\t\t\tThe guard's coworkers grab you and Yunus and take you to a holding cell while they decide what to do with you. You babble apologies and explanations, but they just shake their heads at your panic. Once you're locked in, they leave you alone.\n\t\t\t\t\t\t\t*goto news_bad\n\t\t\t\t\t#Bribe the guard.\n\t\t\t\t\t\tThe guard scowls at you and then turns to his wrist com. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 1000)) or (net_worth > 1500)\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\t*goto news_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tNow the guard is angry. His coworkers grab you and Yunus and take you to a holding cell while they decide what to do with you. You babble apologies and explanations, but they just shake their head at your panic. Once you're locked in, they leave you alone.\n\t\t\t\t\t\t\t*goto news_bad\n\t\t\t#\"Does New Sydney have a celebrity scientist?\"\n\t\t\t\tHe laughs at once. \"Doctor Karl, of course! Why didn't I think of him?\"\n\n\t\t\t\t\"Who?\"\n\n\t\t\t\t\"It's a kind of honorary title, passed down ever since the original Dr. Karl Kruszelnicki. Er, long story. His address won't be public, but Kassie's not the only person who can hack a system.\" He spends several moments tapping on his wrist com and then grins. \"Level Fourteen. Let's go.\"\n\n\t\t\t\t*gosub inside\n\n\t\t\t\tYou knock on a door that looks exactly like every other door in a long corridor. An older man opens the door, and you can tell by the way Yunus sucks in a breath that this is the famous Dr. Karl. He looks old and cranky, and judging by his pajamas and rumpled gray hair, you woke him up. It's not an auspicious start.\n\t\t\t\t\n\t\t\t\tYou stomach drops. The fate of New Sydney—and you with it—hangs in the balance.\n\n\t\t\t\t\"Who are you, and what do you want?\" he says. \"I do autographs on Thursdays.\"\n\n\t\t\t\t\"People are going to die today, and you can save them,\" you say.\n\n\t\t\t\t\"Is that so?\" he says, visibly repressing the urge to roll his eyes.\n\t\t\t\t*choice\n\t\t\t\t\t#Tell him to check up on me so he knows I'm not inclined to exaggerate.\n\t\t\t\t\t\tHe scowls at you and then turns to his wrist computer. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto karl_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\tHis sentries grab you and Yunus and take you to a holding cell while they decide what to do with you. You babble apologies and explanations, but they just shake their heads at your panic. Once you're locked in, they leave you alone.\n\t\t\t\t\t\t\t*goto news_bad\n\t\t\t\t\t#\"Call the local shark shops to vouch for me.\"\n\t\t\t\t\t\tHe closes the door halfway and pings several shop fronts, texting back and forth with lightning speed.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*goto karl_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\tHis sentries grab you and Yunus and take you to a holding cell while they decide what to do with you. You babble apologies and explanations, but they just shake their heads at your panic. Once you're locked in, they leave you alone.\n\t\t\t\t\t\t\t*goto news_bad\n\t\t\t\t\t#Bribe him.\n\t\t\t\t\t\tHe scowls at you and then turns to his wrist com. You and Yunus exchange glances, knowing that the enmity between Kota Perahu and New Sydney runs deep.\n\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 1000)) or (net_worth > 1500)\n\t\t\t\t\t\t\t*gosub pass_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\t*goto karl_good\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*gosub fail_test\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tHis sentries grab you and Yunus and take you to a holding cell while they decide what to do with you. You babble apologies and explanations, but they just shake their heads at your panic. Once you're locked in, they leave you alone.\n\t\t\t\t\t\t\t*goto news_bad\n*label fire_good\nWith the security guards on your side, you're able to override several fail-safes designed to ensure that the major evacuation alarms don't go off without confirmation of a serious disaster. \n*goto good_timing\n*label fire_bad\n\n\"Well,\" says Yunus. \"The fires we set are still burning, so that's something.\"\n\nYour prosthetics are stronger than any lock, so you get to work smashing the mechanism of your cell. It's bad for your prosthetic and a waste of precious time, but it's better than dying in a cage. At last the door opens just as the evacuation alarms start blaring. Good: you didn't waste your entire morning. Just most of it.\n*goto bad_timing\n*label parent_good\nYunus's parents don't have the ability to start a citywide evacuation, but they know who does. Within fifteen minutes, alarms are blaring on every level.\n*goto good_timing\n*label parent_bad\nYunus's parents make it abundantly clear that they believe you're wasting their time. \n\n\"They're still going to help us,\" Yunus says grimly, taking you to his apartment block. \"They just don't know it yet—and when they do it'll be too late.\" \n\nHe assures you their apartment block is very nice, but it just looks like painted rock and concrete to you. Each apartment is a box carved out of the dirt, with more boxes on every side. There are windows looking on to large communal gardens, but no real sunlight.\n\nYou focus on your breathing while Yunus works on several computers.\n\n\"I did it,\" he says at last. \"I forged Mom's codes and told the mayor to start the alarms.\"\n\nAs he speaks, the blaring sound of the full-evac alarm fills the air.\n*goto bad_timing\n*label kangaroo_good\n\n\"We've been given a direct number for the mayor in case of any animal behavior similar to what was observed before the previous earthquake,\" says Ayeesha. \n\n\"Call it,\" says Yunus with unusual authority. \"Now.\"\n\nYou keep your mouth shut in case you ruin the moment. There's a pause that feels eternal. You think you feel a tiny tremble in the ground under your feet, and you almost squeak in alarm, but the moment passes and you realize you imagined it. Or did you? The real earthquake is coming so very soon, and it was tiny preparatory shocks that alerted the sharks to the danger. Maybe this is another preshock, except that it's big enough for you to feel it.\n\n\"Very well,\" Ayeesha says at last. \"We'll do it.\"\n\nYou and Yunus sag with relief and stumble away, not even sure where you're going.\n\nWithin half an hour, the citywide alarm is blaring, and the evacuation begins.\n*goto good_timing\n*label kangaroo_bad\n\n\"I know what we have to do,\" Yunus says grimly, taking you to his apartment block. He assures you it's very nice, but it just looks like painted rock and concrete to you. Each apartment is a box carved out of the dirt, with more boxes on every side. There are windows looking on to large communal gardens, but no real sunlight.\n\nYou focus on your breathing while Yunus works on several computers.\n\n\"I did it,\" he says at last. \"I forged Mom's codes and told the mayor to start the alarms.\"\n\nAs he speaks, the blaring sound of the full-evac alarm fills the air.\n*goto bad_timing\n*label news_bad\n\n\"Well,\" says Yunus. \"This is bad.\"\n\nYour prosthetics are stronger than any lock, so you get to work smashing the mechanism of your cell. It's bad for your prosthetic and a waste of precious time, but it's better than dying in a cage. At last the door opens, and you're free.\n*goto kangaroo_bad\n*label news_good\n\nThe guard takes you to meet one of the producers, who listens to your story without comment.\n\n\"We've been given a direct number for the mayor in case of another earthquake,\" she says.\n\n\"Call it,\" says Yunus with unusual authority. \"Now.\"\n\nYou keep your mouth shut in case you ruin the moment. There's a pause that feels eternal. You think you feel a tiny tremble in the ground under your feet, and you almost squeak in alarm, but the moment passes and you realize you imagined it. Or did you? The real earthquake is coming so very soon, and it had been tiny preparatory shocks that alerted the sharks to the danger. Maybe this is another preshock, except that it's big enough for you to feel it.\n\n\"Very well,\" the producer says at last. \"We'll do it.\"\n\nWithin half an hour, the citywide alarm is blaring, and the evacuation begins.\n*goto good_timing\n*label karl_good\n\n\"I've been given a direct number for the mayor in case of another earthquake,\" he says. \n\n\"Call it,\" says Yunus with unusual authority. \"Now.\"\n\nYou keep your mouth shut in case you ruin the moment. There's a pause that feels eternal. You think you feel a tiny tremble in the ground under your feet, and you almost squeak in alarm, but the moment passes and you realize you imagined it. Or did you? The real earthquake is coming so very soon, and it had been tiny preparatory shocks that alerted the sharks to the danger. Maybe this is another preshock, except that it's big enough for you to feel it.\n\n\"Very well,\" Dr. Karl says at last. \"I'll do it.\"\n\nWithin half an hour, the citywide alarm is blaring, and the evacuation begins.\n\n*label good_timing\n\nSoon the passageways become crowded with people following the major disaster evacuation procedures. Most are trying to look calm, even sarcastic—but everyone is carrying bags. They haven't forgotten the last quake, or the long waits in the mass panic rooms. This time, they're going to the surface. Even Drylanders don't want to be trapped underground.\n\nYunus checks his wrist com. \"Uh-oh,\" he says. \"The Level Twenty and Level Three alarms aren't working.\"\n\nYou glance at your own wrist com, and it shows you the time: \n*if foreknowledge > 60\n\tit's 7:00 a.m.\n\t*goto aa\n*elseif foreknowledge > 50\n\tit's 8:00 a.m.\n\t*goto aa\n*else\n\tit's 9:00 a.m. If only you knew more about when this earthquake will strike!\n*label aa\n*choice\n\t#\"There's no time to go back. We need to get out right now.\"\n\t\t*goto earthquake_good\n\t#\"Let's go down to Level Twenty and see if we can get them going.\"\n\t\tIt's a long journey to Level Twenty, and you have plenty of time to wonder if the risk to yourself and Yunus is worth it. You set off several manual fire alarms and then join those heading for the surface.\n\t\t*if foreknowledge > 60\n\t\t\t*goto earthquake_good\n\t\t*elseif foreknowledge > 50\n\t\t\t*goto earthquake_medium\n\t\t*else\n\t\t\t*goto earthquake_bad\n\t#\"Let's go to Level Three and see if we can get them going.\"\n\t\tYou manage to set off several manual fire alarms on Level Three and then you head for the surface.\n\t\t*if foreknowledge > 60\n\t\t\t*goto earthquake_good\n\t\t*elseif foreknowledge > 50\n\t\t\t*goto earthquake_medium\n\t\t*else\n\t\t\t*goto earthquake_bad\n*label bad_timing\n\n\"It's not enough,\" says Yunus, frowning at a control panel. \"The Level Twenty and Level Three alarms aren't working.\"\n\nYou glance at your wrist com, and it shows you the time: \n*if foreknowledge > 60\n\tit's 8:00 a.m.\n\t*goto ab\n*elseif foreknowledge > 50\n\tit's 9:00 a.m.\n\t*goto ab\n*else\n\tit's 10:00 a.m. If only you knew more about when this earthquake will strike!\n*label ab\n*choice\n\t#\"There's no time to go back. We need to get out right now.\"\n\t\t*goto earthquake_medium\n\t#\"Let's go down to Level Twenty and see if we can get them going.\"\n\t\tIt's a long journey to Level Twenty, and you have plenty of time to wonder if the risk to yourself and Yunus is worth it. You set off several manual fire alarms and then join those heading for the surface.\n\t\t*goto earthquake_bad\n\t#\"Let's go to Level Three and see if we can get them going.\"\n\t\tYou manage to set off several manual fire alarms on Level Three and then you head for the surface.\n\t\t*if foreknowledge > 60\n\t\t\t*goto earthquake_medium\n\t\t*else\n\t\t\t*goto earthquake_bad\n*label meeting_yunus\nThe farm's emergency speeder is louder than you expected, and looking outside makes you nauseous. The engine is much more powerful than you're used to, and the vibration is off-putting. You set it on fully automatic and close your eyes to focus on steadying your breathing.\n\nEverything feels wrong. People in New Sydney hate the floating cities. Even a wealthy and innovative city like Kota is considered to be full of freeloaders and \"fake\" refugees just because most of the original population was made up of displaced people groups from outside Australia. You've heard the names they call you and seen the sideways looks. How are you going to save them when their first instinct will be to assume you're trying to hurt them?\n\nYou arrive at Sydney far too soon. Stupid fast speeder.\n\nFortunately, Yunus is there to meet you. There's one of New Sydney's awful smoke-belching buses parked at the usual dock, and Yunus is standing ready, a silhouette against the early morning sky. Your speeder is designed to lock onto Glass hatches, so he has to help you get onto land without sliding off the curved roof.\n\nYou set the speeder to submerge until you summon it, then climb into the bus. To your surprise, Yunus gets into the driver's seat. It's hard to fit your terror of his inexpert driving into your mind, which is already overflowing with images of New Sydney collapsing from the inside, but you manage it. He drives fast, and you focus on not screaming aloud.\n\nIt's an enormous relief when the bus pulls into a relatively clean bay in New Sydney and crunches to a halt.\n\n\"I didn't know you could drive,\" you say.\n\n\"It's new,\" he says. \"I was going to surprise you.\"\n\n\"You really did.\"\n\n*return\n*label inside\nAs soon as your entry protocols are done (no time for a shower, of course), Yunus leads you through a dizzying sequence of elevators and hallways. For the first time, you discover the indulgent delight of moving walkways. \n\n\"You Drylanders aren't completely backward after all,\" you say.\n\n\"Thanks ever so much,\" says Yunus with his best attempt at a smile. \n\nYou can see that he's imagining the walls around you crumbling into dust and then getting washed away by the tsunami. The thought of being trapped here, under the earth, stops your breath for a moment before you manage to focus back on the task at hand. You keep moving and hope your legs—both residual and prosthetic—don't get damaged from this adventure.\n\n\"We're here,\" Yunus says suddenly. \n*return\n*label set_fire\n\nHe fishes a surprisingly large set of keys from his backpack and unlocks a nondescript door in the wall of an unremarkable passageway. Apart from the tiny LED lights along the center of the bricked floor, the corridor is dark. You've had a whole lot of nightmares that went exactly like this, and it feels like the walls and ceiling are getting closer and closer. It's getting hard to breathe the stale New Sydney air.\n\nYunus turns a corner and a proper light flickers on. He casts you a sympathetic look, and you nod for him to keep going. His forehead creases in concern, so you nod more sharply. Though he clearly knows you're losing it, he respects your wishes and leads onward.\n\nYou walk through a dusty concrete hall until a large metal gate blocks your way. It looks uncomfortably like a drainage grate, since it reaches all the way to the ceiling. Yunus tries key after key, but none of them fit the padlock.\n\n*if temp_two = 2\n\t*set temp_two 5\n\t\"Do you think this would work?\" you say, opening your prosthetics to reveal the flare gun inside.\n\n\tYou carefully align the flare gun with the lock, breaking off the hinged doors of your leg compartments to make a barrier of sorts to trap the flare gun's heat. And then you fire. \n\n\tThe flare is incredibly bright, and the heat is severe even after you and Yunus take several steps backward. But it works! The padlock melts, and you're able to open the gate.\n\t*goto beep\n*else\n\t\"I was afraid of this,\" says Yunus, tapping a command into his wrist computer. The padlock clicks open.\n\n\t\"Hey, cool!\"\n\n\tHe makes a face. \"My parents never gave me that code. It's possible I'll get arrested for using it. Or Dad will.\"\n*label beep\n\nYou go through the gate, and Yunus produces an array of fire starters and smoke bombs that should work handily. The pair of you set several fires near air conditioning vents that ought to carry the smoke throughout New Sydney. Even as you are sinfully pleased at your ability to quickly throw the whole city into chaos via its ubiquitous vents, you have to admit that having the same temperature throughout the entire city must be incredibly pleasant.\n\nAs you're trying to leave, you walk right into a pair of security guards examining the destroyed gate. Judging by Yunus's expression of shame and horror, a simple explanation isn't going to cut it here. \n\n\"The city is in terrible danger,\" you tell them. \"We had no choice but to set off a major evacuation by any means necessary.\"\n\n\"That's a new one,\" says one of the guards. \"But your story won't get you out of lockup. Evacuations are serious business.\"\n\n\"We know,\" says Yunus. \"Please, you have to believe us. Thousands of lives are at stake, including yours.\"\n\nHe's so earnest they hesitate. Then they look at you, eyebrows raised.\n*choice\n\t#Introduce myself and invite them to research my profile to back up our story.\n\t\tBoth security guards take a step back—blocking your exit—and start looking you up.\n\t\t*if reputation > 50\n\t\t\t*gosub pass_test\n\t\t\t*goto fire_good\n\t\t*else\n\t\t\t*gosub fail_test\n\n\t\t\tThey grab you and Yunus and take you to a holding cell while they decide what to do with you. You babble apologies and explanations, but they just shake their heads at your panic. Once you're locked in, they leave you alone.\n\t\t\t*goto fire_bad\n\t#Invite them to call the local shark shops to vouch for me.\n\t\tBoth security guards take a step back—blocking your exit—and they ping a shop front each, texting back and forth with lightning speed.\n\t\t*if connections > 50\n\t\t\t*gosub pass_test\n\t\t\t*goto fire_good\n\t\t*else\n\t\t\t*gosub fail_test\n\n\t\t\tThey grab you and Yunus and take you to a holding cell while they decide what to do with you. You babble apologies and explanations, but they just shake their heads at your panic. Once you're locked in, they leave you alone.\n\t\t\t*goto fire_bad\t\t\t\t\n\t#Bribe them.\n\t\t\"What are your bank details? I'll pay you to let this happen.\"\n\n\t\tThey glance at one another, clearly understanding that you're offering a bribe, then give you the codes you need to make a deposit.\n\t\t*if ((value_dollar > 1) and (net_worth > 1000)) or (net_worth > 1500)\n\t\t\t*gosub pass_test\n\t\t\t*set net_worth 0\n\n\t\t\tThank goodness for a decent amount of personal savings—and a relatively strong Glass dollar.\n\n\t\t\t*goto fire_good\n\t\t*else\n\t\t\t*gosub fail_test\n\t\t\t*set net_worth 0\n\n\t\t\tYour personal savings aren't up to scratch, and the exchange rate between the Glass and Australian dollar isn't helping.\n\n\t\t\tThe guards grab you and Yunus and take you to a holding cell while they decide what to do with you. You babble apologies and explanations, but they just shake their heads at your panic. Once you're locked in, they leave you alone.\n\t\t\t*goto fire_bad\n*label ester_talk_online\nYunus's parents are intimidating, and you are painfully aware that if you screw this up, thousands of people could die. Worse, you know all too well that trading relations haven't eased their xenophobia. \n*if yunus_love = true\n\tIt's impossible to tell whether you dating Yunus has made them hate floating citizens more or less.\n\t*goto hata\n*else\n*label hata\n\n\"What was your name again?\" Ester says.\n\n\"$!{name}. My parents are Lili and Sunny.\"\n\n\"Of course,\" she says. You both know that she knew everything about you all along. \"Yunus isn't with me.\"\n\n\"Actually, it was you I wanted to talk to.\" Yunus isn't stepping forward into their zone of view, so he clearly thinks you will be more convincing on your own. \"It's an emergency.\"\n\n\"We're very busy,\" says Yohan. \"I'm sure if you ping Yunus directly, he'll answer you promptly.\"\n\nYou can feel your grip on the situation slipping away. If you don't get this conversation on track, New Sydney is doomed—and so are you.\n*return\n*label ester_talk\nYunus's parents are intimidating, and you are painfully aware that if you screw this up, thousands of people could die. Worse, you know all too well that trading relations haven't eased their xenophobia. \n*if yunus_love = true\n\tIt's impossible to tell whether you dating Yunus has made them hate floating citizens more or less.\n\t*goto hat\n*else\n*label hat\n\
