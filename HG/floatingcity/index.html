<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Floating City — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "floatingcity", "title": "The Floating City", "scenes": {"chapter_eight": "*set somethings_coming 3\n*if temp_four = 1\n\tMom and Dad promote you immediately. No more rubbish runs! But it's a little awkward that they make Diah take over for you.\n\t*goto start\n*if temp_four = 2\n\tDad keeps trying to get you alone, presumably to talk about your future. You find all manner of excuses, but you know they won't last forever.\n\t*goto start\n*else\n\tThe next few days pass so slowly that you develop a habit of checking the time several times every hour. Things at home are extremely tense. Dad is grave; Mom is furious. Both are convinced you're trying out some petty teenage rebellion and will soon change your mind and accept that the farm is your destiny. You know better.\n*label start\n\nNaturally, you're on the team selected to deliver the promised crop of sharks to New Sydney, along with Dad. The vegetarians and dolphin farmers will be traveling in a different speeder this time. Dad doesn't know who the vegetarian representative will be, and you have nightmares of Kustiani killing you both. Awesome.\n*choice\n\t#Bribe Folami to tell me which vegetarian will be coming to New Sydney.\n\t\t*set net_worth -50\n\t\t*set folami %+10\n\t\t*gosub kassie_house\n\n\t\t\"Actually, it's you I wanted to talk to.\" You pass her the cash.\n\n\t\t\"Really?\" She looks at the money, growing worried. \"For my sparkling personality, I assume?\"\n\t\t*choice\n\t\t\t#\"Of course. I mean, I thought it'd be fun for the three of us to have breakfast.\"\n\t\t\t\t*set flexibility %+10\n\t\t\t\t\"Sure,\" says Folami. \"What'd you bring?\"\n\n\t\t\t\t\"Uh…my sparkling personality?\"\n\n\t\t\t\t\"You're buying,\" says Kassie. \n\n\t\t\t\t\"That's fair.\"\n\n\t\t\t\tYou treat them to a delivered lunch of dolphin milk and crispy shark-skin chips before bringing the conversation around to the day's trading trip.\n\n\t\t\t\t*goto info\n\t\t\t#\"Actually, I want to know which vegetarian will be trading next to me today.\"\n\t\t\t\t*set flexibility %-10\n\t\t\t\t*label info\n\t\t\t\t\"Yeah, that's got a whole lot of awkward potential,\" says Folami. \"But don't worry, I arranged to sub in for Mom's second-in-command.\"\n\n\t\t\t\t\"So it'll just be you?\"\n\n\t\t\t\t\"Yep,\" she says.\n\n\t\t\t\t\"Oh! Great.\"\n\t\t\t\t*goto home\n\t\t\t#\"I just came to check you were okay.\"\n\t\t\t\t*set empathy %+10\n\t\t\t\t\"I am,\" she says, looking at you strangely. \"Anything else?\"\n\n\t\t\t\t\"Well, I was wondering what you're doing today.\"\n\n\t\t\t\t\"Who told you?\" she says.\n\n\t\t\t\t\"Uh…what? I really don't know what you're talking about.\"\n\n\t\t\t\t\"I'm doing the same thing you are: delivering goods to New Sydney.\"\n\n\t\t\t\t\"Really? But I thought you weren't connected to the vegetarians any more.\"\n\n\t\t\t\t\"Drylanders don't know that, and it's a good opportunity to improve my other career options.\"\n\n\t\t\t\t\"Sure. I mean, great. I'll see you there.\"\n\n\t\t\t\t\"See you,\" she says.\n\t\t\t\t*goto home\n\t\t*label kassie_house\n\t\tYou head over to Kassie's house in a one-person speeder and autolatch onto her lower hatch so you can tap a request for entry without disturbing her parents or getting soaked. Kassie opens it, still in her pajamas.\n\n\t\t*if kassie_love = 1\n\t\t\t\"You can come in,\" she says. \"But it'll cost you.\"\n\n\t\t\t\"Kisses?\" you ask.\n\n\t\t\t\"Lots of them,\" she says, ignoring gagging noises from Folami in the background.\n\n\t\t\tEntry fee paid, you haul yourself inside.\n\t\t\t*goto fee\n\t\t*else\n\t\t\tShe lets you in at once.\n\t\t*label fee\n\n\t\tFolami starts putting on some sunscreen. \"I'll be out of your hair in just a second.\"\n\t\t*return\n\n\t#Ask Kassie if she has any info on the vegetarian I'll have to pretend to be friendly with.\n\t\t*set kassandra %+10\n\t\t*gosub kassie_house\n\t\t\n\t\t\"It's not private,\" you tell her, signing along with your words so Kassie doesn't have to lip read, \"although it does involve vegetarians.\"\n\n\t\t\"Then perhaps I can help,\" she says.\n\n\t\t\"I wondered if Kassie knew who's going to be the vegetarian trader at New Sydney today.\"\n\n\t\t*goto info\n\t#See if Diah has heard anything about who the vegetarian trader will be.\n\t\t*set diah %+10\n\t\tYou tap a message to Diah to check she's free, and she invites you over to her sphere. She lives on the upper level of her family sphere, so you travel aboveground and then go through the main hatch into her family room. \n\n\t\t\"Is this about the shark farm?\" she signs.\n\n\t\t\"Actually, no. I wonder if you know who'll be going with the vegetarian stock to New Sydney today?\"\n\n\t\tShe stares at you. \"Why on earth would I know that?\"\n\n\t\t\"Because…it would be really handy to know?\"\n\n\t\t\"It's not Kustiani, is it?\" she signs.\n\n\t\t\"I really hope not.\"\n\n\t\tShe taps out a question on her wrist com and smiles at you before checking it. \"Huh. Folami's going to do it.\"\n\n\t\t\"Really?\"\n\n\t\t\"That's what she said.\"\n\n\t\t\"Cool, thanks.\"\n\n*label home\n\nYou hurry home and get ready.\n*fake_choice\n\t#Cosmetic legs today. Don't distract anyone from the sharks.\n\t\t*set flexibility %-10\n\t\t*set legs 1\n\t#All-purpose legs today. They're easier to use, especially when getting in and out of water.\n\t\t*set empathy %-10\n\t\t*set legs 3\n\t#Runners. There'll be a lot of walking back and forth, so make it running.\n\t\t*set empathy %-10\n\t\t*set legs 2\n\nDad is already champing at the bit, so you hop into the speeder and settle in for a long trip. You've visited Old Sydney so often lately that it feels odd to be a passenger and to travel in a larger speeder. The speeder moves much more slowly since it's dragging several enormous expanding nets holding live sharks. The nets aren't particularly aerodynamic, as they're designed for the sharks' benefit. When you were first introduced to shark-transporting tek, you were impressed by its complexity. Now that you're trapped in a speeder with Dad for several hours, the tek doesn't feel so amazing.\n\nThe vegetarian and dairy delegations have gone ahead, naturally. They don't have to drug their stock or keep to a speed that doesn't stress out the cheese.\n\n*if temp_four = 1\n\tDad is almost giddy, talking about accounts and insurance and all manner of things that you can tell he's never had such a captive audience for. \n\t*fake_choice\n\t\t#\"You do have this written down, right?\"\n\t\t\t*set flexibility %-10\n\t\t\t\"Of course,\" he says cheerfully and continues discussing the pros and cons of different insurers.\n\t\t#\"Hey, how about this weather?\"\n\t\t\t*set empathy %-10\n\t\t\t\"Hm?\" he says. \"Oh. Yes. Very nice. Got to insure for weather events, of course.\"\n\t\t#\"Were we insured for bomb threats?\"\n\t\t\t*set curiosity %+10\n\t\t\t\"Yes,\" he says. \"I've kept a virtual eye on the radical fringe of the vegetarians for years.\"\n\t*goto sunny\n*elseif temp_four = 2\n\t*set temp_four 1\n\tUnfortunately, that means you are alone with Dad, and there's absolutely nothing you can do about it.\n\n\t\"So,\" he says heavily. \"The farm.\"\n\t*fake_choice\n\t\t#\"I lied. I don't want to take over the farm.\"\n\t\t\t*set flexibility %-10\n\t\t\tHis head bows, and he doesn't say a word.\n\n\t\t\t\"Dad,\" you whisper. \"I'm sorry.\"\n\n\t\t\tHe looks up at that, surprised. \"You are? I am. I didn't talk to you about what you planned to do. I should have noticed how you felt long ago.\"\n\n\t\t\t\"Oh,\" you say. \n\t\t\t*label silent\n\t\t\t*set temp_four 5\n\n\t\t\tYou both fall silent, lost in thought.\n\n\t\t#\"I sure look forward to taking over one day.\"\n\t\t\t*set empathy %+10\n\t\t\t\"Do you,\" he says. \n\t\t\t*label question\n\n\t\t\tIt's not a question. He knows.\n\n\t\t\t\"No,\" you whisper. \"I don't.\"\n\t\t\t*goto silent\n\t\t#\"What about it?\"\n\t\t\t*set curiosity %-10\n\t\t\t\"You don't want it,\" he says.\n\t\t\t*goto question\n\t*goto sunny\n*else\n\tWhich leaves you and Dad alone. Fantastic. For the first hour, neither of you says a word. Then he whispers, \"Why? Why don't you want to carry on your mother's work?\"\n\t*choice\n\t\t#\"Don't you ever wish you got to do something that was just yours instead of hers?\"\n\t\t\t*set empathy %+10\n\t\t\t\"No,\" he says, but his surprise is too much. He's lying.\n\n\t\t\tHe glances at you and then drops his eyes, knowing you know he's lying. \"Okay, the truth. \n\t\t\t*label statistics\n\t\t\tI wanted to be a mayoral statistician.\"\n\n\t\t\tYou blink. \"What is that?\"\n\n\t\t\t\"It's—never mind. The point is that \n\t\t\t*label chose_mom\n\t\t\tI chose to follow your mom. She's…a blazing fire of brilliance and passion, and following her is more fun than doing what I thought I wanted.\"\n\n\t\t\t\"It's not like that for me.\"\n\n\t\t\t\"I know.\"\n\t\t\t*goto sunny\n\t\t#\"I'm my own person.\"\n\t\t\t*set empathy %-10\n\t\t\t\"I know,\" he says. \"However, \n\t\t\t*goto chose_mom\n\t\t#\"You wouldn't understand.\"\n\t\t\t*set flexibility %-10\n\t\t\t\"Try me.\"\n\n\t\t\t\"Alright,\" you say. \"You want honesty? Mom is obsessed. You and I both know it. Just because you think it's fun to devote your whole life to her doesn't mean that I do. I want to be my own person and forge my own path.\"\n\n\t\t\t\"I don't think I ever told you that I altered my own plans. Originally, \n\t\t\t*goto statistics\n*label sunny\n\nFor what it's worth, you understand Dad more now than you did before. He's not boring, exactly. He's just…himself. It's strange to think of him as a young man in love, making decisions he planned to stick with for the rest of his life. So far, he doesn't seem to have any regrets. You hope you can be as satisfied when you're as old as he is.\n\nSuddenly, the speeder stops dead. \n\n\"That's odd,\" Dad says, checking the various dials to try to see what's wrong.\n\nThen the whole speeder starts moving backward. Dad cuts the engine, but you're still moving.\n\nIt's the sharks. They're all pulling back at once, and the nets are automatically shifting to accommodate them. Dad starts frantically flipping switches and checking cameras.\n*choice\n\t#\"I need to call Kassie.\"\n\t\t\"Are you serious?\" Dad yells. \"This is not the time.\"\n\n\t\t\"She…knows things.\" Choosing not to explain further, you tap on your wrist to send an urgent distress call and to switch on the typing-to-speech function since you're bouncing around all over the place.\n\n\t\t\"What's wrong?\" says the computer's artificial rendering of Kassie's response.\n\n\t\t\"The sharks are pulling our entire speeder away from New Sydney.\"\n\n\t\t\"Expletive. Expletive,\" says the computer. \"Give me a second.\"\n\n\t\t\"Hurry!\"\n\t\t\n\t\t*page_break\n\t\t\n\t\tThere's a pause that feels like forever, during which the sharks abruptly stop pulling you. The speeder is left drifting, and you and Dad stare at one another.\n\n\t\t\"It's an earthquake,\" says Kassie. \"It's finished now, but you can expect the sharks to be a bit jumpy.\"\n\n\t\t\"Will there be aftershocks?\"\n\n\t\t*if facts = 0\n\t\t\t\"I have no idea. No more implants, remember?\"\n\t\t\t*goto cont\n\t\t*else\n\t\t\t\"That was a big one, but deep. My guess is that there will be aftershocks, but no longer than ten seconds.\"\n\n\t\t\t\"So if they drag us again, it won't be far?\"\n\n\t\t\t\"Probably not,\" the computer reports.\n\t\t\t*goto still\n\t\t*label cont\n\n\t\tYou switch off the horrid voice and look at the display, giving Kassie a weak smile. \"Thank you for that.\"\n\n\t\t\"I'm sorry I couldn't give you more detail. All I know is that there are more earthquakes to come, but probably no more big ones today.\"\n\t\t*goto still\n\t#\"Activate the life raft.\"\n\t\t\"Take your legs off,\" Dad shouts back. \n\t\t*if legs = 1\n\t\t\tYou remove your cosmetic legs, cursing the skin-colored seals and concealing pads that just get in the way when you need to get rid of them in a hurry. Dad's right, though; they're no use at all in the water and a pain when you're getting in or out of the speeder.\n\t\t\t*goto weight\n\t\t*if legs = 2\n\t\t\tYou take off your runners. They're your most securely-attached legs, for obvious reasons, but running legs are no good for climbing out of a speeder or for sitting in a raft.\n\t\t\t*goto weight\n\t\t*else\n\t\t\tYou hit the quick-release valve on your all-purpose legs, knowing Dad is right: you'll move faster without them.\n\t\t*label weight\n\n\t\tAnd you'll weigh less in the raft too.\n\t\t*goto still\n\t*selectable_if (self_experiment = true) #\"It's an earthquake. The sharks are heading away from land.\"\n\t\t\"How do you know that?\" Dad demands. \"And since when do sharks cooperate?\"\n\n\t\t\"They're not cooperating. It's instinct.\"\n\n\t\t\"Did Mom teach you that?\"\n\n\t\t\"No.\"\n\n\t\t\"Then who? How do you know?\"\n\n\t\t\"It's complicated. But reliable.\"\n\n*label still\n\nThe speeder is still. You twist in your seat and set the Glass of the speeder to transparent so you can see the dark blurs of the sharks behind you. They are moving jerkily, still disturbed, but not actively pulling against you.\n\n\"I wish Mom would let us drug them harder,\" says Dad.\n\n\"I think the Drylanders would have something to say about that,\" you say.\n\n\"Right now, I don't care if they have to wait a little longer to harvest. That was not at all within safety parameters.\"\n*fake_choice\n\t#\"No amount of drugs will fix this.\"\n\t\t*set flexibility %-10\n\t\t\"What will?\" he says, but he's not asking you.\n\t#\"Is that…a joke?\"\n\t\t*set empathy %+10\n\t\t\"Not exactly,\" he says.\n\t#\"It's probably best not to share today's incident with the Drylanders.\"\n\t\t*set empathy %-10\n\t\t\"Agreed,\" he says.\n\nYou fall back into silence, but once you both calm down, it's comfortable. The sea stretches out all around you, as perfectly blue as the sky above. It feels good to be a single sphere on the ocean—and even better to know that you have a decent-sized school of sharks following behind you.\n\nThe dark-blue haze of Old Sydney grows slowly on the horizon, and eventually you can pick out the few remaining buildings of the city center and the half-destroyed suburbs on the hills beyond. It's impossible to distinguish the house where you and Yunus like to meet, although you can trace the line of mud at the ocean's edge.\n\nSlowly, the city resolves into itself. You've grown used to the dust and dirt from storms and the salty air, but you notice Dad shaking his head in disgust as you draw closer. The New Sydney bus is already waiting for you, looking just as ruined as its surroundings. Your stomach tenses up in preparation for that awful petrol stench. The speeder shared by the vegetarians and dairy farmers is ahead of you, a string of storage spheres behind it. Buoys mark the area where the sharks will be stored while the transport drugs leave their system.\n*choice\n\t#\"How do we get the sharks in there?\"\n\t\t*set sunny %+10\n\t\t*set curiosity %+10\n\t\t\"Getting them in is easy,\" Dad says. \"Getting us out is a different matter. Shall I show you?\"\n\n\t\t\"Yes, please.\"\n\t\t*label winch\n\n\t\tHe steers over to the edge of the buoy-marked area, where there is a winch. \"First we unwind that.\" He casts a glance at your legs. \"Want to try it?\"\n\n\t\t*if legs = 1\n\t\t\tFortunately your cosmetic legs are nice and tall, so you can balance on your seat and loosen the buoy line that way.\n\t\t\t*goto buoy\n\t\t*if legs = 2\n\t\t\tYour runners are no good for helping you reach out the top of a speeder, so you shake your head and let Dad do it.\n\t\t\t*goto buoy\n\t\t*if legs = 3\n\t\t\tYour all-purpose legs are fitted with extenders, so it's easy as pie to stand on your seat and loosen the buoy line.\n\t\t*label buoy\n\n\t\tWith the buoy line loosened, Dad extends the speeder's metallic arms to hold the line down while he steers the vessel carefully inside, continuing until the shark nets are fully in and then retracting the arms once more. Then he releases and winds in the nets. The sharks begin to spread out, exploring their new area. You know the vegetarians don't approve of this method, which stresses the sharks, but the area is as big as several city blocks so it will take them time to realize they're trapped.\n\n\t\tJob done, Dad edges the speeder back over the loose section of buoy line before winching the line back to the correct tension.\n\t\t*goto bus\n\t#\"I'd like to go see Folami, if that's okay.\"\n\t\t*set folami %+10\n\t\t*set empathy %+10\n\t\t\"I thought she was staying with Kassandra,\" says Dad.\n\n\t\t\"She is, but she switched out with the person who was going to run the trade. I don't know why.\"\n\n\t\t\"Are you sure you can trust her?\" he says.\n\n\t\t\"Dad! She's the one who warned me about the bomb in the first place.\"\n\n\t\t\"Of course. My apologies.\"\n\n\t\tThe sharks are iffy at the moment, so Dad lets you out at a ramshackle jetty before heading off to unload.\n\n\t\tFolami hops out of her own speeder to chat. \"Nice trip?\" she asks. \"The radar showed you had some trouble.\"\n\n\t\tYou explain about the earthquake frightening the sharks.\n\n\t\t\"So much more complicated than carrots,\" she says reverently.\n\n\t\tWith that, it's time to go to the bus.\n\t\t*goto bus\n\t#\"Are we late?\"\n\t\t*set sunny %+10\n\t\t*set curiosity %-10\n\t\t\"I'm afraid so,\" says Dad. \"The sharks' weird panic slowed us down.\"\n\n\t\t\"Not their fault,\" you point out.\n\n\t\tHe gives you a funny look. \"I didn't say it was. Come on, let's get these creatures stowed.\"\n\t\t*goto winch\n*label bus\n\nThe bus gets packed to the roof with vegetables and preserved dolphin milk, then you and Dad and Folami and Ahmed squeeze into the remaining space. Your combined body odor quickly mixes with the stink of the vehicle.\n\n\"How are you going back there?\" calls the driver.\n*choice\n\t#\"This is too crowded. Go and get another bus.\"\n\t\t*set empathy %-10\n\t\tThere is a long, painful silence. Folami opens her mouth to say something to break the tension, but at a glare from you, she subsides. \n\n\t\t\"Very well,\" says the Drylander. \"I will unload the stock and return for it shortly.\"\n\n\t\tYou all sit and wait while he does so.\n\n\t\t\"Will our stuff be safe here?\" Folami whispers.\n\n\t\t\"Doesn't matter,\" you say. \"It's their responsibility now, so if it's stolen it's nothing to do with us.\"\n\n\t\t\"Typical,\" says the driver under his breath as he climbs back into his seat, and the bus rumbles into life.\n\n\t\tIt's an awkward journey, but at least you can sit properly.\n\t\t*goto old_sydney\n\t#\"Very well, thanks. How are you?\"\n\t\t*set flexibility %+10\n\t\tHe grunts in response. \n\n\t\tOh well. You tried. It seems the Drylanders are sticking to their plan of making you come to them and then making your journey as miserable as possible. You look forward to the day when Yunus changes things. If he really can. You do your best to imagine a journey that doesn't involve soaking through your clothes with sweat. It's not easy.\n\n\t\tThe rest of the journey passes in slow, hot, noisy discomfort.\n\t\t*goto old_sydney\n\t#\"Can we go now?\"\n\t\t*set flexibility %-10\n\t\tHe grunts in response, then leans back his chair and picks his teeth for a solid ten minutes.\n\n\t\t\"Popcorn,\" he says at last. Even his voice is annoying, making you want to scream. \"I've got to stop eating it. But you know I never will.\"\n\n\t\tHe yawns loudly and then finally turns on the bus. The vehicle is impossibly noisy and so slow that even the open windows don't give any relief. In Kota, every speeder must have air conditioning or be decommissioned. But New Sydney is still bent on making your experience of their city as miserable as possible.\n*label old_sydney\n\nThe bus depot is exactly as toxic as you remember. You keep resisting the urge to tap the command to turn the walls transparent. But these walls are dirt, and rock, and clay. For meters and meters and meters on every side.\n*fake_choice\n\t#Focus on Folami.\n\t\tFolami smiles back at you and signs, \"It's so dark. Probably because Drylanders are worms.\"\n\n\t\tShe continues to insult Drylanders, relying on sign language to keep your conversation from them.\n\n\t\tDad stifles a laugh at one of her ruder expressions and tries to look disapproving.\n\t#Ask for a glass of water.\n\t\t\"Excuse me,\" you say to your driver, who is grudgingly unpacking supplies into an elevator, \"can I please have a glass of water?\"\n\n\t\t\"No,\" he says.\n\n\t\tAnd that's that.\n\t#Try to figure out how the buses work.\n\t\tYou walk around the bus, noting the mechanisms that make it go are placed at the front of the vehicle with more tubes and suchlike underneath. They're so hot you back off, sweating.\n\nThe decontamination process is just as awkward and sticky as always. Once again, you're not allowed time to shower.\n\nYour next guide appears and leads you through the long route to another meeting room. For the first twenty minutes, you try to memorize every turn and elevator, but it's impossible to keep track of all of them. You're at the Drylanders' mercy, just as they planned.\n\nBy the time you get to the meeting room, you're just relieved to be able to stop walking. This room has no screen, which is a relief for your eyes and headache, but your heart starts to pound at the unrelieved sense of thousands of tons of rock all around. You try your best not to think of yourself as a rat trapped in a pit, but it's not easy.\n*choice\n\t#I am a citizen of Kota. I'm not scared.\n\t\t*if empathy \u003c 40\n\t\t\tYour pride in your city and in yourself rises up from deep within and calms you. This is no trap. It's just one more opportunity to show Kota's superiority to this hole.\n\t\t\t*set poise %+10\n\t\t\t*goto yunus\n\t\t*else\n\t\t\tYou try to focus on your city pride and quash your fears that way, but thinking about Kota just reminds you how far away from home you are. It's impossible to steady your breathing, and it's galling to know that the Drylanders know how scared you are.\n\t\t\t*goto yunus\n\t#I concentrate on wondering about the details of the underground life.\n\t\t*if curiosity > 60\n\t\t\tThis place is so weird. You're vaguely aware they eat a lot of kangaroo, but surely they don't keep kangaroos underground? At least the temperature is nice here, and not using air conditioning saves a considerable amount of power.\n\t\t\t*set poise %+10\n\t\t\t*goto yunus\n\t\t*else\n\t\t\tYou try to think about how Drylanders manage waste, and then you have to try very hard not to think of it. Is it stored in giant vats underground? Is there one such vat directly above your head?\n\n\t\t\tThis train of thought is not calming. At all.\n\t\t\t*goto yunus\n\t#I focus. I'm here to trade.\n\t\t*if flexibility \u003c 40\n\t\t\tYou've been told the secret of adult behavior is to fake it until you make it. How would you act if you were confident and calm? You glance coolly at the Drylanders nearby and realize they're just as unsure as you are. If they're like Yunus, they're terrified of sunlight. You, however, are doing fine underground. Amazingly, it's true. You're calm now.\n\t\t\t*set poise %+10\n\t\t\t*goto yunus\n\t\t*else\n\t\t\tYou try to think about the excellent crop of sharks you just delivered, but that just makes you think of their panic during the journey, which makes you think about undersea earthquakes and giant squids and earth-shattering disasters to come. Somehow, this doesn't calm you down.\n*label yunus\n\nThe Drylanders file inside. There are loads of them, and you're badly outnumbered. It's hard to remember that this isn't a trap or a kidnapping but a simple trading conference, with prices already set. Just a formality. The Drylanders don't meet your eyes, even though their seats are across from yours. You resist the urge to look at the wall behind you and see what's so fascinating. It's blank, like all the rest.\n\nYunus comes in behind his parents. He pauses in the doorway, and you can see him considering sitting next to you.\n*choice\n\t#Slightly shake my head. I can't risk trouble with his parents today.\n\t\t*set curiosity %-10\n\t\t*label nope\n\t\tYunus accepts your not-so-subtle hint and sits with his mom and dad. It's strange to think that you know so much about the married diplomats but they know so little about you. \n\t\t*gosub description\n\t\t*goto talking\n\t\t*label description\n\n\t\tYunus's mother is much paler than he is; her skin looks nearly transparent. She has white-blond hair, giving her eyes an eerie look. You can see her using her eyes to advantage, staring just a little too long in order to rattle those who sit across from her. \n\n\t\tYunus's father is tall and broad, with dark eyebrows and a thick beard that gives him a domineering air. It's hard not to feel intimidated on an instinctive level.\n\n\t\t*return\n\t#Grin at him, daring him to reveal our friendship and see what happens.\n\t\t*set curiosity %+10\n\t\tYunus meets your grin and comes to sit on your side of the table. \n\n\t\t\"Huh,\" he says. \"These chairs really are shorter. It's different.\"\n\n\t\t*gosub description\n\t\tNeither of them comments on the sudden friendliness of their son, but they turn their considerable powers of silent psyching out on him. He swallows hard and clings onto the sides of his chair as if he's afraid he'll float away.\n\t\t*goto talking\n\t#Stand to shake his hand but don't sit together. Time to trade, not talk.\n\t\t*set flexibility %-10\n\t\t*goto nope\n*label talking\n\nDad clears his throat in an obvious attempt to defuse the tension in the room. It's a hack move and makes him look like a lumberjack compared to the Drylanders' surgical precision. \n\nBut he's not stupid either. You can see Yunus's parents dismiss his input as inconsequential. They don't seem to remember that intimidation isn't the only possible method of manipulation. Dad is playing dumb on purpose.\n\n\"We've brought the sharks and other supplies,\" he says. \"Are you ready to pay the agreed-upon amount?\"\n\n\"Certainly,\" says Yunus's mom—her name is Ester. She pulls out her own computer and taps several buttons. \n\nDad pulls up his wrist com to confirm the transfer, and his whole body stiffens. Glancing over, you can see that the amount transferred is significantly lower than it should be.\n*fake_choice\n\t#\"How about the rest, Ester?\"\n\t\t*set flexibility %-10\n\t\t\"I'm sure I don't know what you mean,\" she says, fixing you with those cold eyes.\n\n\t\t\"I'm sure you do. Don't shirk on our trade, or we'll sell our sharks elsewhere.\"\n\n\t#\"Oh dear. Your computer is glitching.\"\n\t\t*set empathy %+10\n\t\t\"I'm sure our tech is fine,\" she says smoothly. \"Have you had yours checked lately?\"\n\n\t\t\"Yes,\" you say, careful not to lose your temper. \"Our sharks are here. Where's the rest of the money?\"\n\n\t#\"Dad? What just happened?\"\n\t\t*set curiosity %-10\n\t\tHe rolls his eyes. \"They're trying to get out of proper payment. Just like every year.\"\n\n\t\t\"Really?\" you ask. \"And how long will this charade go on?\"\n\n\"Actually,\" says Folami suddenly, staring at her clasped hands on the desk but clearly addressing the Drylanders. \"There's something you should know.\"\n\nA lot of things have been weird lately, Folami included. But when she told you about the Alive bomb, she looked you in the eye and didn't waste any time. Why is she circling the sphere now? And why won't she look at anyone?\n\n\"Go on,\" says Ester. It seems she's the spokesperson of the group today.\n\nFolami's hands are so tightly clenched that her whole upper body is stiff.\n*fake_choice\n\t#Tap to Yunus to tell him something is wrong.\n\t\t\"Yunus,\" you tap, and his eyes sharpen on you. \"Something's wrong here.\"\n\n\t\tHe drops his head in a nod of understanding, but his eyes are wide with helpless concern.\n\t#Tap to Dad to tell him something is wrong.\n\t\t\"Dad,\" you tap, and he raises an eyebrow to show he's watching. \"Something is off.\"\n\n\t\tHe scowls in response. It seems he's as low on ideas as you are.\n\t#Say, \"Folami is ill. She needs help.\"\n\t\tEster brightens, clearly divining that you're trying to stop Folami from being heard. \"Go on, Folami,\" she purrs.\n\nSweet, quiet little Folami is the storm no one saw coming. There's no way to escape. \n\n\"As I made clear previously, I want a job,\" says Folami with studied calm. \"Here, in New Sydney. An apprenticeship, so I can learn the skills I need to become a contributing member of society. Drylander society.\"\n\nAh. Her request for a job last visit wasn't a passing whim. No wonder she decided to come to New Sydney despite being disconnected from the rest of the vegetarians and getting her arm broken last time she went on the open ocean. But it's clear she plans to trade some kind of information for a position. You try to think of any dirt she might have on you or Dad or Ahmed, but nothing comes to mind.\n\n\"Interesting,\" says Ester, who has not missed anything. She casts a glance across to the other Drylanders, opening the floor for one of them to speak.\n\n\"I could take an apprentice,\" says the oldest of the women. \"Can you pull weeds?\"\n\n\"I specialize in botany,\" says Folami. \"So yes, I can pull weeds as long as you like, and do most other farming tasks as needed. Once you have seen how hard I work, I'll need room and board, but I'll soon prove to you that I deserve much more. I can start today. I need to start today.\"\n\nThe woman sniffs, but it's clear she's pleased.\n\n\"You mentioned there was something we should know?\" says Ester with grinding patience.\n\n\"Yes,\" says Folami. \"You should pay less than the agreed price for those sharks. This batch is defective.\"\n\nShe faces the Drylanders steadily. They're her people now, after all. Her whole body is turned away from you and Dad because she knows exactly how badly she's betrayed you. She planned this before you left Kota.\n*choice\n\t#\"She's a liar,\" I say as calmly as I can manage, knowing Kota's entire economy is at stake.\n\t\t*set folami %-20\n\t\t*if (poise + reputation) > 120\n\t\t\t*set connections %+10\n\t\t\t*set value_farm %+10\n\t\t\tFortunately, you have plenty of practice in staying calm while your heart attempts to climb out of your chest. Your voice remains steady, even when Ester openly logs into Kota news channels scanning for your name and image. You have a life full of good choices behind you, and this moment is no different to the rest.\n\t\t\t*label cracks\n\n\t\t\tFolami cracks first. \"I'm not like Mom!\"\n\n\t\t\t\"You're not fired,\" says the older woman. \"But I certainly hope you don't plan to turn on me the way you turned on Sunny and ${name}.\"\n\n\t\t\t\"No, ma'am,\" Folami chokes out. \"I had to bring something with me.\"\n\n\t\t\t\"Learn when to be silent,\" says her new boss. \"Starting now.\"\n\n\t\t\tFolami bows her head in shame. Ester transfers the balance of funds.\n\t\t\t*goto funds\n\t\t*elseif (poise + reputation) > 100\n\t\t\t*set connections %+10\n\t\t\tIt takes everything in you to keep your voice steady, but you manage it. Ester opens her palm computer and scans Drylander news channels for your name. You're grateful that you've mostly kept your mistakes to small or secret incidents. \n\t\t\t*goto cracks\n\t\t*else\n\t\t\t*set connections %-10\n\t\t\t*set value_farm %-10\n\t\t\t*set value_farm %-10\n\t\t\tSo much for calm: your voice cracks. Twice in one sentence. You're telling the unvarnished truth, but you sound like a liar, even to yourself. This is bad. \n\n\t\t\tDad actually shudders. \n\n\t\t\tFolami taps, \"I'm sorry,\" on the table.\n\n\t\t\tYou can't tell if she's doing it consciously or not.\n\n\t\t\tEster names an amount that is better than what she's given so far but not as much as it should be. Dad accepts it.\n\t\t\t*goto funds\n\t#\"The sharks aren't defective,\" I say truthfully, \"and I can prove it.\" \n\t\t*set folami %-10\n\t\t\"Prove it then,\" says Ester. \n\n\t\tYou swallow, knowing you need to tread carefully. \"As you know, Kota was once preeminent in the field of mind implants.\"\n\n\t\t\"Before further experimentation was made illegal,\" Ester points out.\n\n\t\t\"Precisely,\" you say, choosing not to rise to the bait. \"Our existing tek is far beyond any other tek operating in the world today. One of the most brilliant scientists in Kota is focused entirely on the link between geological events and unusual behavior by sea creatures.\"\n\t\t\n\t\tKassie won't mind that description of her—and it's entirely truthful, despite her age—but you need to move on fast before Dad has a chance to wonder which scientist has been confiding in you. \"If you look up your own seismological records from these three dates—\" you tap them out on your wrist com's holographic display, letting everyone see them, \"—then you will notice three quakes occurring on those days.\"\n\n\t\tThe date the sharks attacked Mom, the date the squids panicked, and today.\n\n\t\tSeveral of the Drylanders begin tapping away at their devices while you wait and hope it's enough.\n\n\t\t\"Three dates suggest a pattern but do not prove it,\" says Ester. \"If your scientist is so brilliant, she will have a better data set.\"\n\n\t\t*if (shark_sense + foreknowledge) > 120\n\t\t\t*set connections %+10\n\t\t\t*set value_dollar + 0.1\n\t\t\t\"Of course,\" you say and pull up a dozen more incidents, ten of which include video you or Kassie took of the sharks with time signatures proving the link between earthquakes and shark behavior.\n\n\t\t\t\"Very well,\" Ester says at last, transferring the balance of funds as she speaks. \"Thank you both for your transparency.\"\n\t\t\t*goto tell_drylanders\n\t\t*elseif (shark_sense + foreknowledge) > 100\n\t\t\t*set connections %+10\n\t\t\t\"Of course,\" you say and pull up several more incidents, two of which include video you or Kassie took of the sharks with time signatures proving the link between earthquakes and shark behavior.\n\n\t\t\t\"Hmm,\" Ester says. \"This data isn't conclusive, but it will do for now. Folami, you deserve credit for bringing your suspicions to our attention. However, I shall transfer the balance of funds.\"\n\t\t\t*goto tell_drylanders\n\t\t*else\n\t\t\t*set connections %-10\n\t\t\t*set value_farm %-10\n\t\t\t*set value_dollar -0.1\n\t\t\t\"We…uh…she is working on it,\" you say, feeling your credibility drain away.\n\n\t\t\t\"Mmm,\" says Ester. \"I appreciate Folami's honesty, and her concerns are quite valid. I shall transfer the balance of funds in a week, when the sharks are harvested, assuming I have no further reason to doubt their quality.\"\n\t\t\t*label tell_drylanders\n\n\t\t\tFolami keeps her eyes down, blushing to her ears. Dad's arms are stiff on the table.\n\n\t\t\t\"Now,\" says Ester with false sugar in her voice. \"Tell me more about these earthquakes.\"\n\t\t\t*choice\n\t\t\t\t#Tell her everything I know.\n\t\t\t\t\t*label all\n\t\t\t\t\t*set told_drylanders 1\n\t\t\t\t\tIt's tricky to explain everything without mentioning Kassie \n\t\t\t\t\t*if self_experiment = true\n\t\t\t\t\t\tor your own experiments. \n\t\t\t\t\t\t*goto tell_all\n\t\t\t\t\t*else\n\t\t\t\t\t\tor anything illegal. \n\t\t\t\t\t*label tell_all\n\t\t\t\t\tYou manage to give Ester the most important information: there are more earthquakes coming, perhaps even enough to destroy New Sydney.\n\t\t\t\t\t*goto funds\n\t\t\t\t#Tell her nothing.\n\t\t\t\t\t\"I'll pass your request along to the appropriate department,\" you say with a thin smile.\n\t\t\t\t\t*goto funds\n\t\t\t\t#Charge her for the information I have.\n\t\t\t\t\t*set net_worth +1000\n\t\t\t\t\t*set told_drylanders 1\n\t\t\t\t\t\"I believe I can negotiate a suitable price for you,\" you say with a smile.\n\n\t\t\t\t\tEster hesitates, and in that hesitation, you see you've got her at your mercy. Of course you do—earthquakes would be devastating here. You haggle with serene indifference and gain a considerable sum.\n\n\t\t\t\t\t*goto all\n\t#I might just be able to pull off something spectacular. \"Give me a job too—with sharks.\"\n\t\t*set value_farm %-20\n\t\t*set sunny %-20\n\t\t*set lili %-20\n\t\t*if temp_four > 0\n\t\t\tDad sucks in a breath but doesn't speak. \n\t\t\t*goto testing\n\t\t*else\n\t\t\t*comment I don't think it's possible to reach this, but I'm leaving it in in case I missed something.\n\t\t\tDad's arm suddenly moves toward you as if he has the urge to grab you and pull you away from a marauding great white shark. But he lets his hand drop before he touches you.\n\n\t\t\tThank goodness he already suspected you didn't want to take over the farm.\n\t\t*label testing\n\t\t*set temp_four 4\n\n\t\t\"Preposterous,\" says Ester.\n\n\t\tYunus is blinking hard to hold back tears of joy. He's so overwhelmed you can tell he'll be absolutely no use to you in this crucial moment. That's very sweet, and rather unhelpful.\n\n\t\t\"I grew up on a shark farm,\" you say. \"There's no one better with animals, and I can raise sharks for you here so you don't have to trade with Kota Perahu for them anymore.\"\n\n\t\tEster frowns in thought for what feels like hours. \n\t\t*if ((connections + reputation) + value_farm) > 150\n\t\t\t*set temp_four 3\n\t\t\t*set value_dollar - 0.1\n\t\t\t*set foreknowledge %+20\n\t\t\t\"Alright,\" she says at last. \"I'll make it happen, but I'll need time to prepare.\"\n\n\t\t\t\"Me too,\" you say, struggling to absorb the fact that you've just decided on your future career—and betrayed your parents and your city in the process.\n\t\t\t\n\t\t\t*page_break\n\t\t\t*comment achieve job\n\t\t\t*goto funds\n\t\t*elseif ((connections + reputation) + value_farm) > 130\n\t\t\t*set temp_four 4\n\t\t\t*set foreknowledge %+10\n\t\t\t\"Very well,\" she says at last. \"I'll consider it and be in touch.\"\n\t\t\t*goto funds\n\t\t*else\n\t\t\t\"Our automated systems monitor their health, breeding, and behavior,\" she says at last. \"We don't need you, and it's clear your parents do.\"\n\n\t\t\tYou bow your head, knowing that a door has just slammed in your face. And you've betrayed your parents and the farm too. You gambled and lost.\n\t\t\t*set reputation %-20\n*label funds\n\nOnce all the financial back-and-forths are done, it's time for food and the horrors of smalltalk.\n\nThe Drylanders have set out another epic feast designed to impress. Every so often, political posturing has an upside. You're far less petrified this time despite the unexpected drama, so you sip cheerfully on fruit juice and snack on kangaroo kebabs with finger-lime chutney and dipping salt. Yunus begs you to try some crispy caramel things that he apparently made himself. They're crunchy if you chew on them, but if you place them in your mouth without chewing, they melt in moments. You're experimenting with putting two in your mouth at once when you suddenly notice Ester walking up to you.\n*choice\n\t#Chew. Swallow. Talk.\n\t\tYou understand how bait feels when sharks swim toward it. Ester is surprisingly short, but that doesn't make you feel any better.\n\n\t\t\"What are your intentions with my son?\" she says, her voice deceptively soft. It's the verbal equivalent of a sharp knife hidden in the folds of a silk dress.\n\t\t*choice\n\t\t\t#\"Yunus? He's your son?\"\n\t\t\t\tShe doesn't dignify that with a response but only waits for you to give a proper answer.\n\n\t\t\t\t*goto truth\n\t\t\t#Tell her the truth.\n\t\t\t\t*label truth\n\t\t\t\t\"I care for Yunus and have no intention of harming him,\" you say. \n\t\t\t\t*if yunus_love = 0\n\t\t\t\t\t\"He is my friend.\"\n\t\t\t\t\t*goto uh_oh\n\t\t\t\t*else\n\t\t\t\t\t\"We're dating.\"\n\n\t\t\t\t\t\"I see,\" she says. It's impossible to tell how she feels.\n\t\t\t\t\t*goto uh_oh\n\t\t\t#\"Yunus can speak for himself. If and when he chooses.\"\n\t\t\t\tShe turns to face him. \"Well?\"\n\n\t\t\t\tYunus hesitates, but then he says, \"It's time. We should answer her.\"\n\n\t\t\t\t*goto truth\n\t#Talk to Folami.\n\t\tFolami's sitting on the Drylander side of the table, talking quietly to the old woman who is now her landlady and boss. Her body is curled in on itself, shoulders hunched and voice soft, like always. Yet everything about her is so different. She has transferred her allegiance with devastating skill. At the same time, she has lost everything: her place in the world, her friends, the sun.\n\n\t\tYou walk past Ester and sit in the chair next to Folami. These chairs are much higher than on the Kota side, and you immediately feel taller. At the same time, your feet struggle to touch the ground.\n\t\t*choice\n\t\t\t#\"Goodbye, Folami. Our friendship is over.\"\n\t\t\t\t*set folami 0\n\t\t\t\tThere are tears in her eyes, but she nods her acceptance. \"That's fair.\"\n\t\t\t\t*goto uh_oh\n\t\t\t#\"Good luck, Folami. I wish you well.\"\n\t\t\t\t*set folami %+10\n\t\t\t\tA few stray tears escape and track down her cheeks, even though she looks calm and in control. \"Thank you.\"\n\t\t\t\t*goto uh_oh\n\t\t\t#\"Thank you for saving the farm, Folami.\"\n\t\t\t\t*set folami %+20\n\t\t\t\tHer eyes widen in surprise. She expected you to hate her. \"You're welcome,\" she whispers and hesitates before continuing. \"Will you visit me? Please?\"\n\n\t\t\t\t\"Sure.\"\n\n\t\t\t\t\"You saved the farm?\" the old woman asks her. \"Tell me all about it.\"\n\n\t\t\t\tThat should help Folami in her new life. \n\t\t\t\t*goto uh_oh\n\t#Talk to Yunus.\n\t\tYunus is standing by, watching the room and being watched in turn. His eyes pass neatly over the space, moving back and forth, but they always pause on you. You walk past his mother as if she's invisible and stand next to him.\n\t\t*choice\n\t\t\t#\"How's things?\"\n\t\t\t\tHe bursts out into a surprised laugh. \"Uh…you tell me?\"\n\n\t\t\t\t\"I'm serious. How are you?\"\n\n\t\t\t\tHe winces. \"Holding up, I suppose. These trading things…they were already stressful, but now that you're here, I have a greater stake.\"\n\n\t\t\t\t\"You can't win when you're playing both sides.\"\n\n\t\t\t\t\"I can't lose, though,\" he says. \"That's something.\"\n\t\t\t\t*goto uh_oh\n\t\t\t#\"I need to introduce you to my dad.\"\n\t\t\t\t*label sure\n\t\t\t\t\"Sure,\" he says, with a solid attempt at sounding casual.\n\n\t\t\t\tYou lead him across the room, and suddenly Dad and Yunus are facing each other.\n\n\t\t\t\t\"This is my dad, Sunny,\" you introduce him. \n\t\t\t\t*if yunus_love = 0\n\t\t\t\t\t\"And this is Yunus, my friend.\"\n\n\t\t\t\t\t\"Friend?\" says Dad. \"How?\"\n\n\t\t\t\t\t\"Luck,\" you say. \"And a little hacking.\"\n\t\t\t\t\t*goto uh_oh\n\t\t\t\t*else\n\t\t\t\t\t\"And this is Yunus, my boyfriend.\"\n\n\t\t\t\t\tDad's gaze sharpens on Yunus. \"Is that so?\"\n\t\t\t\t\t*goto uh_oh\n\t\t\t#\"Nice caramels. Now that's diplomacy.\"\n\t\t\t\t\"I do what I can,\" he says. \"It seems wise to lull you into a false sense of security before I strike.\"\n\n\t\t\t\t\"Are you going to strike?\" you ask.\n\n\t\t\t\t\"I like to keep my options open,\" he says with a grin.\n\t\t\t\t*goto uh_oh\n\t#Hide behind Dad.\n\t\tDad is calmly sipping at a local wine, ignoring the fact that no one is talking to him. He stands straight and still, like an oak tree in a pit of snakes.\n\t\t\n\t\tHe appears straightforward, but you know better. He chooses to be underestimated here. Even when Folami betrayed you, he remained silent. It made him appear weak: a man unable to defend himself without assistance from his teenager. But that was all part of his act. And, you realize, part of being a father.\n\t\t*choice\n\t\t\t#\"Are we okay, Dad?\"\n\t\t\t\t\"I think so,\" he says. \"Or at least, we've been through worse.\"\n\n\t\t\t\t\"That's not as reassuring as I was hoping.\"\n\n\t\t\t\t\"Same here.\"\n\t\t\t\t*goto uh_oh\n\t\t\t#\"You should try the caramels.\"\n\t\t\t\t\"Alright,\" he says, looking relieved to have something to do with his hands. \n\n\t\t\t\tHe eats his caramel with uncomfortable speed, but he smiles all the same. \"It's good.\"\n\n\t\t\t\t\"It would taste better if we were home,\" you admit quietly.\n\t\t\t\t*goto uh_oh\n\t\t\t#\"Dad, I need to introduce you to Yunus.\"\n\t\t\t\t*goto sure\n*label uh_oh\n\nYou're so focused on the conversation, it takes you a long time to notice that the ground beneath your feet is shaking. Not to mention the ground above your head.\n\nSomething is very, very wrong.\n*finish Chapter Nine\n", "chapter_eleven": "*set somethings_coming 1\n*set yunus_dies false\n*set foreknowledge %+20\n\"Wait, what?\" you sign.\n\n\"May I?\" she signs, indicating the wall.\n\nYou nod agreement and she taps on her wrist, bringing up a map of the local region's relative depths. It's quite pretty, with a green-blue-black sea and a charmingly optimistic forest green for the land.\n\n\"We're here.\" She draws in a spiked circle, then another. \"Arkville is here.\"\n\n\"Uh-huh,\" you sign. \"I didn't think Arkville's location was one of their issues.\"\n\n\"It's about to be,\" Kassie signs, tapping another command into her wrist com. A large section of the map turns orange, and a smaller section closer to land turns red. The smaller section includes Arkville.\n\n\"Red is bad?\" you sign. \n\n\"Red is the shelf,\" she says, and you see a flash of frustration cross her face. You know that look: even though Kota's sign language dialect is better than most, it still isn't as precise as English for technical terms. Or, more honestly, you're just not as fluent as Kassie when it comes to scientific jargon.\n*fake_choice\n\t#\"Why is the shelf bad?\"\n\t\t*set flexibility %-10\n\t\tShe pauses, finding a way around the limitations of your language skills. \"It's shallower there. Kota is safe from any earthquake; even if there was an epicenter directly below us, there's sufficient water between us and the sea floor that the vibrations would be deadened before they reached us. Even if a tsunami happened, it wouldn't be dangerous until it reached—\"\n\n\t\t\"Land,\" you break in. This is a familiar topic; you've discussed the danger to the Sydneys several times.\n\n\t\t\"Not just land,\" she signs. \"All these red areas are shallow enough to be badly damaged too.\"\n\n\t#\"What should we do to fix…the issue?\"\n\t\t*set flexibility %+10\n\t\t\"Move Arkville,\" she signs promptly. \"To be safe from earthquakes—or more accurately, tsunamis—it needs to be in a deeper area. Specifically, the orange areas on this map. Like us.\"\n\n\t\t\"Ah,\" you say. \n\n\t#\"Shall we type? I want to understand this.\"\n\t\t*set empathy %+10\n\t\tShe pauses and then nods. It's never fun having a conversation via keyboard, but sometimes it can't be helped. You know from experience that the conversational rhythm works better if you both type, so you each tap up a virtual keyboard and get to writing.\n\n\t\tKassie explains that Arkville is located in shallower water where a tsunami will damage it almost as badly as the Sydneys. Or more, given its overpopulation issues. Once you understand exactly what she's saying, you close down the keyboards.\n\n\"We can't tell them,\" you sign, immediately raising both hands at Kassie's furious expression. \"We have to tell them, obviously—but it won't be easy to get them to listen to us.\"\n\n\"What kind of person wouldn't heed a scientist's warning that their city will be destroyed if they don't move two hours to the right?\" she signs.\n\n\"Governor Banyu,\" you say without hesitation. \"He's exactly the type to assume it's a trick or a schoolgirl's delusion. And Arkvillagers as a whole don't know how brilliant you are. Technically the work you've done isn't legal, which is why you've kept it secret all this time.\"\n\n\"I hadn't forgotten,\" she signs, but you both know she's lying.\n*choice\n\t#\"I need to talk to Maya.\"\n\t\t*set connections %+10\n\t\t\"Yes,\" she signs. \"But this is no simple conversation.\"\n\n\t\t\"You'd like Maya, if you met her,\" you sign. \"Anyone would, if they like someone who's honest and friendly.\"\n\n\t\t\"Diah certainly does,\" she signs, smiling. \"Hopefully mutual smoochies are more potent than years of xenophobic paranoia.\"\n\n\t\t*if kassie_love > 0\n\t\t\tThe look in her eye is extremely distracting. \"Yours are pretty potent.\"\n\n\t\t\tShe ducks her head and puts up a hand before you both get severely off topic.\n\t\t\t*goto figurea\n\t\t*elseif yunus_love = true\n\t\t\tSuddenly you're not thinking about tsunamis and millions of people in danger, but just Yunus. Yunus's eyes, Yunus's hands, Yunus's lips on your lips. Where diplomacy might fail, hormones conquer all.\n\n\t\t\tKassie snaps her fingers in your face. \"Come back to me, ${name}. Stop thinking about your Drylander lover boy.\"\n\n\t\t\tYou blush furiously, knowing you deserve it.\n\t\t\t*goto figurea\n\t\t*else\n\t\t\t*goto figurea\n\t#\"Their sharks are massively overpopulated too.\"\n\t\t*set shark_sense %+10\n\t\tKassie bites her lip. \"Don't they know how dangerous that is?\"\n\n\t\t\"No one there is allowed in the water anymore.\"\n\n\t\tShe shakes her head. \"That's nothing. The next earthquake is going to send those sharks into a frenzy.\"\n\n\t\tThe thought leaves you cold. You've already seen sharks attacking spheres, dripping blood on both Glass and water. And you've seen what giant squids do when they're afraid. This is bad, and it's especially bad for Arkville.\n\t\t*goto figurea\n\t#\"Is there any way we can make Banyu believe it's his idea?\"\n\t\t*set poise %+10\n\t\tShe thinks for a long time before answering. \"I'd like to think so, but from everything I've heard he's an expert manipulator.\"\n\n\t\tYou sigh. \"And he knows so much about Kota that he played us like puppets.\"\n\n*label figurea\n\"We can figure this out,\" Kassie signs. You know that expression: it's the one she wears when someone disagrees with her but she's determined to get her way. For once, it's reassuring instead of ominous. \"We just need to think. This coming earthquake is going to devastate the entire region if we don't convince people to prepare for it.\"\n\n\"And we need help,\" you say.\n\nKassie idly flicks through the local news. She's not being rude; it's just part of her process. You can almost see the spheres turning in her mind.\n*if shark_sense > 80\n\n\t\"You're really good with sharks, not to mention other animals,\" she signs. \"That's got to be useful for…something.\"\n\n\t\"Thanks for the vote of confidence,\" you sign. She has a point though: if anyone could calm and control a pack of terrified sharks, it's you.\n\t*goto poise\n*else\n*label poise\n*if poise > 80\n\n\t\"I've seen you speak in some high-pressure situations,\" she signs. \"You're really good at seeming calm and competent.\"\n\n\t\"'Seeming' being the important word there,\" you sign back with a wry smile. But she's right: you've grown good at pretending to know what you're doing.\n\t*goto rep\n*else\n*label rep\n*if reputation > 50\n\n\t\"You have a reputation for being smart and reliable,\" she signs. \"That should help, even in Arkville—since the governor has such great connections here.\"\n\n\tYou nod in agreement. If someone looks up your online footprint, they'll see several of your past successes. \n\t*goto connect\n*else\n*label connect\n*if connections > 50\n\t\n\t\"Actually, I think you're really well-connected,\" she says. \"Both here in Kota, and over in New \n\t*if yunus_love = true\n\t\tSydney. And I'm not just saying that because you're dating Yunus, either.\"\n\t\t*goto abc\n\t*else\n\tSydney.\"\n\t*label abc\n\n\t\"Time to pull some strings,\" you agree. Several people immediately come to mind, and you're glad you've been diplomatic with people you didn't necessarily like.\n\t*goto yun\n*else\n*label yun\n\nAt that moment, you receive a ping from Yunus asking for permission to meet you—in Kota. You shake your wrist and tap the screen, wondering if it's an error. But it looks legit.\n*fake_choice\n\t#\"Are you sure you can deal with being off land for so long?\"\n\t\t\"I have to,\" he says.\n\n\t\t\"Alright then.\"\n\n\t#Verify it's him.\n\t\t\"Who is this?\" you ask.\n\n\t\t\"You got me,\" he says. \"It's Captain Kangaroo.\"\n\n\t\t\"Okay, fine,\" you say. \n\n\t#Tell Kassie.\n\t\t\"It's Yunus,\" you sign. \"He wants to come here.\"\n\n\t\t\"Really?\" she says. \"In 3D? Here in Kota?\"\n\n\t\t\"Apparently,\" you say.\n\nYou send him the exact coordinates of your home sphere. Then you realize he'll be bringing a Drylander vessel that won't be able to lock directly onto your hatch, so you add a note to advise him of the closest multivehicle access point.\n\n\"So this is really happening?\" Kassie signs. \"I'm going to meet your Drylander face to face?\"\n\n\"He's really not that mysterious,\" you say. Saying the words makes you remember how shocked you were to discover Yunus was from New Sydney. Strange to think it wasn't all that long ago. \"Also, he's not 'my' Drylander. He's just…himself.\"\n*if yunus_love = true\n\n\t\"Whatever you say,\" Kassie signs, grinning.\n\n\tYou feel your face heat up, but there's no time to get into your romance right now.\n\n\t*goto whatever\n*else\n*label whatever\n\n\"Why's he coming all this way?\" Kassie asks.\n\n\"I don't know,\" you admit, looking at your com again as if you might have missed something. Yunus is already off-line, presumably because he's getting ready to come to you. Hopefully no one died and New Sydney is still intact. Surely he'd give you more warning if he were delivering bad news. Wouldn't he?\n\nYou give yourself a shake to snap out of the catastrophe-based thoughts. \n*fake_choice\n\t#\"I've been to New Sydney often enough.\"\n\t\t\"Do you think that's all?\" Kassie signs. \"Yunus is just being evenhanded? But isn't he massively phobic of sunlight?\"\n\n\t\t\"He's working on it, but…I don't know if he'll be okay here.\"\n\n\t#\"Do you think there's been another earthquake?\"\n\t\tKassie shakes her head slowly. \"I knew about the one that happened when you were there, even before communicating with you. None of my alerts have been triggered since then. It's technically possible, but very unlikely.\"\n\n\t\t\"One major citywide disaster is enough to inspire a visit,\" you agree.\n\n\t#\"I take it you want to meet him?\"\n\t\tShe smiles, not bothering to reply—at least, not in words. It's clear she's so excited she's practically vibrating.\n\n\t\t\"I don't know what he wants to discuss, but I'm sure you can join us, at least for a bit.\"\n\nKassie looks around your sphere with a speculative eye, and you join her. You've never really thought about what Kota would be like for a Drylander to visit, and it's tricky to shift your brain into the right patterns to be helpful. This must be the kind of thing diplomats like Yunus's parents think about all the time.\n\nIt's bright in Kota compared to New Sydney. The Glass can filter and absorb a lot of light, cutting harmful rays and converting heat energy to air conditioning, but it's never going to be as dark as dirt.\n\nYour room is scattered with dirty clothes; papers that may or may not be important; and assorted prosthetics, powders, and so on. It's not exactly suitable for visitors right now. On the upside, it's largely underwater, so the view is of sea and edible algae rather than the sky, which Yunus still finds very confronting.\n*fake_choice\n\t#Tidy my room and change my clothes.\n\t\t*set empathy %-10\n\t\tKassie watches and cheerfully mocks you as you sort out some of your chaos, line up your prosthetics neatly, and even vacuum the floor.\n\n\t\t\"I didn't think you owned a vacuum,\" she signs.\n\n\t\t\"Feel free to take the rubbish out.\"\n\n\t\t\"I'm fine thanks.\"\n\n\t#Go and prepare the multivehicle entry bay for Yunus.\n\t\t*set empathy %+10\n\t\tKassie comes with you and helps you find the series of access panels that allow you to dim the lights along the entire route.\n\n\t\t\"Not going to do a tour of Kota, are you?\" Kassie signs. Her face says it's a joke, but the precision of her hand movements gives her away: she's genuinely concerned for Yunus. Neither of you has ever seen a Drylander venture into a floating city.\n\n\t\t\"Maybe next time.\"\n\n\t#Spend the wait learning more about New Sydney's geography.\n\t\t*set curiosity %+10\n\t\tLooking up the basic facts of New Sydney feels a little like a school assignment, but you quickly go deeper into natural resources and local government systems. Yunus's parents wield considerable power, but they definitely couldn't evacuate the whole city without support. Still, Yunus is smart, and his parents have a ruthless edge that could be handy—if you can get them on your side.\n\n\t\tKassie is optimistic that Yunus can convince them to take you seriously. You consider how difficult it would be to get your parents to listen to you but choose not to bring that up.\n\nBefore you know it, you get a locational ping to say Yunus is close, and you and Kassie go and sit on the spectacularly uncomfortable molded chairs in the so-called \"welcome bay.\"\n\nSoon Yunus's vehicle comes chugging into sight. It's combustion engines clears the area of dolphins. You blush on his behalf as Kassie casts you a horrified look. She turns to hide her movements as she signs, \"Is that thing even seaworthy?\" \n*fake_choice\n\t#\"It'll make it here. Not sure it'll make it back.\"\n\t\tShe stares at you in horror, which grows stronger as she realizes you're more than half serious.\n\n\t\t\"They have safety protocols if it fails,\" you reassure both her and yourself.\n\n\t\t\"And then what do they do?\" she signs. \"Send them a floatie?\"\n\n\t\tAn image of fold-out inflatable boats springs to mind, and you have a bad feeling there's a factual basis to the image. \"Something like that.\"\n\n\t#\"Want to tinker with it?\"\n\t\t\"Do you think he'll let me?\" she signs, only slightly desperately.\n\n\t\t\"He knows that people who live in a floating city tend to be good at sailing and seafaring, so I'm sure he'll be grateful.\"\n\n\t\tShe nods, relieved—and continues to watch him approach as if she expects the vessel to sink at any moment.\n\n\t\tYou find yourself holding your breath in sympathetic anxiety until Yunus's boat is secured to the mooring platform.\n\n\t#\"A lot of Drylander tek is very primitive.\"\n\t\t\"That's…normal?\" she signs, watching your eyes carefully to see if you're joking.\n\n\t\tYou nod. \"It's standard. His parents are wealthy, but Yunus would be renting it. Drylanders shun the sea, as a rule.\"\n\n\t\t\"With that kind of boat, they should shun it,\" she signs.\n\n\t\tYou don't disagree.\n\nIt's not easy to get the bay's multivehicle hatch to cooperate with Yunus's ship, and you're glad of Kassie's tek savvy. At last, the vessel is secure, and you send out an unrolling jetty so Yunus can come ashore without swimming. You forget to warn him that the jetty is also an isolation chamber, so he shrieks in genuine terror when it rises up around him and snaps closed like a giant flower trapping a bug.\n*fake_choice\n\t#Reassure him.\n\t\t*set empathy %+10\n\t\t\"It's alright, Yunus!\" you yell. \"The protocols are basically the same as yours.\"\n\t#Mock him.\n\t\t*set empathy %-10\n\t\t\"We got the exact same welcome in New Sydney,\" you call out.\n\t#Exchange a smile with Kassie. Drylanders are fun.\n\t\t*set flexibility %+10\n\t\t\"It's exactly the same in New Sydney,\" you say cheerfully.\n\nYou rack your brain, trying to remember whether you were actually telling the truth. There's still a blood test here, and a urine test, and a mucus swab, and his com will have an icon on it for the next six weeks as it automatically tracks his proximity to other people in case of illness. But at least he won't have to have the chemical bath that you go through every time you enter New Sydney. Will he? New Sydney has way more potential to become a plague pit than Kota will ever have. Kota has sunshine.\n\nExcept you can hear the distinctive chemical-bath beeping and automated instructions through the walls. Oh well. After what feels like a lifetime, Yunus is provisionally declared clean and given a shower and air dry, and then the jetty unrolls again to let him out.\n\nHe and his clothes are only slightly damp.\n\n\"Welcome to Kota,\" Kassie signs cheerfully.\n\nHe looks pretty shaky, and you wish the jetty had handrails. It's not clear if Yunus's shakiness is due to seasickness, simple sea movement, or sheer terror. His shoes are not as dry as they should be. As he reaches the relatively solid ground of the bay, he falls awkwardly into your arms.\n\n*if yunus_love = true\n\tKassie flips on her vocal mode and types, \"Get a room,\" including the sarcasm mode that makes it clear the artificial voice is transmitting something humorous.\n\n\t\"Hey, Yunus,\" you say, pulling him upright to embrace him properly. \"If I kiss you, will you fall over?\"\n\n\t\"Maybe,\" he says. \"But it'd be worth it.\"\n\n\t\"Very good,\" you say and kiss him, still holding his arms tightly. They're very nice arms, and you indulge yourself in keeping hold of those very nice muscles for much longer than necessary. In any case, kissing does terrible things to your balance.\n\n\tKassie rolls her eyes at you behind Yunus's back.\n\t*goto kk\n*else\n*label kk\n\nWith a supreme effort, Yunus manages to stand upright. \"Hi ${name}, hi Kassandra. Is it always so wobbly here?\"\n*fake_choice\n\t#\"You're doing great.\"\n\t\tHe smiles weakly. It's clear he knows you're lying, but he's grateful for the attempt all the same.\n\t#Avoid the question, since it's an unusually calm day.\n\t#\"Is it okay if Kassie sticks around for a bit?\"\n\t\t\"Yes,\" he says, careful to face her so she can read his lips. \"In fact, your input is essential.\"\n\n\"My house is this way,\" you say and lead on.\n\nKassie gives you both a wide berth. \n\nYunus tries very hard not to look beyond his own feet, where the water sparkles with reflected sunshine underneath the access passageway. \"It's all set out like a spiderweb here, right?\" he says. \"Larger spheres at the hubs, and recreational areas between, with these mini tunnels going all the way through pretty much everywhere?\"\n\n\"That's right,\" you say. \"For longer trips, we tend to travel on the subroutes using speeder tracks. Or for short trips, you can hook onto the cable without a speeder or just cut across open water by swimming.\"\n\nHe shudders, then makes a noise of new distress. Someone is coming down the corridor toward you, and they look official.\n\nYunus most definitely does not look official. His uneven gait marks him as a Drylander, and his clothes shout it.\n*fake_choice\n\t#Get Kassie to figure out who the new person is.\n\t\t*set curiosity %+10\n\t\t\"Who is that?\" you sign to Kassie, and she gives you a nod before her fingers fly over her wrist com with the speed of an expert.\n\n\t\t\"Postmaster general,\" she says.\n\n\t\tYou have absolutely no idea what the head of the post office would do about a single Drylander in Kota. They might not care, or they might call the police.\n\n\t\t\"Stay cool,\" you whisper to Yunus, signing the words at the same time so Kassie knows what you're doing.\n\n\t\tYour heart is pounding, but the person passes you without even a glance.\n\n\t#Get away before they notice Yunus.\n\t\t*set curiosity %-10\n\t\tThere's a branch in the tunnel, and you take it, tugging Yunus along with you. Kassie comes too, careful to stay behind Yunus to help block him from view.\n\n\t\t\"Don't talk,\" you tell him. \"Just keep walking as smoothly as you can without looking back.\"\n\n\t\tA few minutes later, you judge it's safe and go back to the first passageway. The coast is clear. It's impossible to tell if you just avoided a major incident or wasted ten minutes. \n\n\t#Distract them while Kassie and Yunus get past.\n\t\t*set flexibility %+10\n\t\tYou let the others know what you're doing and hurry ahead in order to look unconnected to them. As you draw closer to the official-looking person, you recognize the distinctive purple and yellow of the postal office.\n\n\t\t\"Excuse me for asking,\" you say. \"Are you the postmaster general?\"\n\n\t\tShe immediately quickens her pace, and you have to twist around to keep in sync with her. \n\n\t\t\"Is that a yes?\" you say. \"I'm not going to hassle you about a lost parcel; I'm just curious.\"\n\n\t\tShe walks even faster, and you let her go. Kassie and Yunus don't even draw a glance. Nothing is better for avoiding notice than pretending you want it.\n\nAt last you make it to your own sphere. You and Kassie and Yunus settle down, and you grab several glasses of ice water and a bowl of shark crisps to share.\n\nYunus crunches loudly through several crisps. \"These are incredible,\" he says. \"How come you never brought them to New Sydney?\"\n\n\"You don't have these?\" Kassie exclaims, remembering to sign slowly so Yunus can keep up.\n\nIt's clear Yunus is reluctant to get into the real reason he's here.\n*fake_choice\n\t#\"Yunus, something's up. What is it?\"\n\t\t*set flexibility %-10\n\t#\"You can trade for them next time, Yunus. I'll give you a discount.\"\n\t\t*set flexibility %+10\n\t#Sit back and see how my two best friends get on.\n\t\t*set curiosity %+10\n\t\tYunus has clearly gotten better with his sign language. Now that he doesn't have to concentrate on walking, he signs along with his speech. \n\n\t\tKassie mocks him for mixing up his signs and corrects him at the same time. Her amusement makes him smile in return even as he apologizes for mangling the language.\n\n\t\t\"So,\" she says at last, \"why did you come all the way out here?\"\n\n\"Yeah,\" he says reluctantly. \"We need to talk—all of us.\"\n\nYou shift over next to Kassie so he doesn't forget himself and turn his head away from her. \n\n\"That last earthquake was almost a three on the Richter scale,\" he says. \"Australia's largest ever earthquake was a six point six, but because it happened in a remote area it didn't cause as much damage as the Newcastle Quake, which was rated a five point six.\"\n\nKassie nods impatiently. None of this is news to her: Australia is geologically stable for the most part, which unfortunately means none of its houses are designed to withstand earthquakes. But the underground cities of New Sydney and New Brisbane are particularly vulnerable.\n\n\"So my question is,\" Yunus signs, \"how big is the next earthquake going to be? Also, when? And most importantly, where?\"\n*fake_choice\n\t#\"This is cutting-edge technology, and it's not as precise as that.\"\n\t\tYunus takes a deep breath. \"You told me there were more coming. How are you so sure? Everyone I've spoken to and every piece of information I can find says that earthquakes cannot be predicted. Ever.\"\n\n\t\t\"Yet here we are,\" you say quietly. \n\n\t#\"Too big, too soon, and too close.\"\n\t\tHe runs his hands through his hair. \n\n\t#\"Do you have video footage of the kangaroo behavior leading up to the last earthquake?\"\n\t\t\"I had a look at it, but as far as I can tell, they were acting normally until about an hour before the earthquake.\"\n\n\t\t\"An hour,\" you repeat. \"That's not enough time to evacuate a city.\"\n\n\"We have to evacuate New Syd,\" says Yunus quietly. \"Don't we?\"\n\nKassie signs, \"Yes,\" without meeting his eyes.\n\n\"It's good that you're here,\" you say to Yunus. \"We need you to make it happen. No one in New Sydney would listen to just Kassie and me.\"\n\nHe shakes his head. \"I'm no one. How am I supposed to order around a million people? How do I convince them that this kind of fantastical science—excuse me, but it is—is reliable?\"\n\n\"It's not,\" Kassie points out. \"This is early days, and my hypothesis could be way off b
