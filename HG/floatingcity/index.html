e what you're about to say. \"You need to listen to me.\"\n\n\t\tHe raises an eyebrow. Before you have a chance to speak, the speeder's proximity alarms all start blaring.\n\n\t#Tell him I have no intention of following in his footsteps.\n\t\t*set empathy %-10\n\t\t\"That's awfully high-handed of you,\" you say.\n\n\t\tDad blinks in confusion. Before he has a chance to ask what you mean, the speeder's proximity alarms all start blaring.\n\n\t#Avoid conflict by saying nothing until I know my own mind better.\n\t\t*set curiosity %-10\n\t\tThe speeder's proximity alarms all start blaring at once.\n\nSomething is coming—something big!\n\nFolami grabs at her unlatched harness, swearing at the tangled straps. Kustiani twists around to help her. You know your harness is secure—no way would Dad start up the speeder if it wasn't—so you watch Kustiani.\n\nShe's unlatching herself.\n\nBefore you can shout a warning, something rams into the speeder from below, sending everyone flying upward. The shoulder straps of your harness dig into you so painfully that you wish they would break just to release you. Your own clawed hand hits you in the cheek, scratching you, and Folami's foot just barely catches the other side of your face as she is thrown up and out of the speeder.\n\nThe speeder crashes back into the water, throwing you forward and making your teeth clash together. As soon as the speeder stabilizes, you look around, noting in passing that the attacker has managed to crack the speeder's Glass. Kustiani is bleeding from a cut lip and bellowing in rage, Dad is pressing buttons for more info, Diah is crying, and Folami is gone. She's in the water.\n\nSomething huge and gray is still stuck to the lower hatch of the speeder, blocking any possible view other than the ignorant sky. You spot a palm-sized ring of serrated gray against the Glass at your side and stare at it, knowing it looks familiar. The serrations look almost like teeth, but it's not a mouth.\n\nIt's a sucker. That's a tentacle. You've been attacked by some kind of cephalopod, except it's enormous. And Folami is out there with it.\n*choice\n\t#I grab a life preserver and dive in after Folami. I'm a better swimmer.\n\t\t*set empathy %+10\n\t\t*gosub legs\n\t\t*if athletics >= 50\n\t\t\t*set folami %+10\n\t\t\t*set reputation %+10\n\t\t\tYou haul yourself over the upper rim of the speeder easily and hesitate for a tiny moment above the churning sea. The shark farm serves up a fair quantity of other fish and squids, but nothing like this. \n\n\t\t\tThere's an underwater city in the shallower water off the coast of Indonesia that is the world leader on deep-sea creatures, and they would definitely know what to do here. Giant squids don't belong in your world.\n\t\t\t\n\t\t\tIt's clear there are at least three creatures, all of them long enough to wrap up the speeder like a gift with far too many ribbons. One of them suddenly turns blue, and you can see it chomping on a tentacle that's spurting oddly-colored blood inside its mouth. If they're so keen to eat one another, Folami is in real danger. \n\t\t\t*choice\n\t\t\t\t#\"Folami!\" I yell.\n\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\tYou faintly hear a voice on the other side of the mass of giant squids. Folami is out there, in the open ocean…with three enormous tentacled monsters that are absolutely capable of killing her.\n\n\t\t\t\t\tThe life preserver seems comically useless, and for a second, you're tempted to accidentally-on-purpose fall back inside the speeder. But at least you can't get your legs bitten off. Unlike Folami.\n\n\t\t\t\t\tWith that sick joke to distract you from the blinding terror, you call out her name one more time and then tip over into the water. You may as well go on rather than back. At least, that's what you tell yourself.\n\n\t\t\t\t\tA stray tentacle hits you in the face, making you gasp and see stars. You can tell there's something warm and wet on your face, and you hope it's your blood rather than something worse. \n\n\t\t\t\t\t\"$!{name}!\" Folami calls back to you. You catch a glimpse of her as the tentacles around you briefly part.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto goodresult\n\t\t\t\t#I watch the squids' behavior. No other human has been so close at such a time.\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\tThere are two—no, three—squids in the water, tangled up and fumbling with their limbs like newborn kittens thrown together in a basket. The squids' eyes are as big as your head but are blinded by the bright lights of the surface world. \n\n\t\t\t\t\tYou pause, life preserver in hand. It doesn't take Kassie's experimental technology to guess that they're afraid. They didn't attack the speeder—in fact, they probably think the speeder attacked them. If they're able to think at all. One is attacking another, slicing through a stray tentacle with its sharp beak.\n\n\t\t\t\t\tThe severed tentacle continues to blindly reach out and curl, looking for some clue about its surroundings even as it is swallowed by one of the other squids. Folami is in real danger of accidental injury. You leap from the speeder's rim and splash into the churning water, knocking yourself in the chin with the life preserver.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto goodresult\n\t\t\t\t#I'll hang on the speeder's rim until I see Folami. \n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\tThe water is a gelatinous horror of tentacles and foam and inhuman eyes the size of your head. For a moment, you are transfixed with fascination, unable to look away as a single tentacle, sawed off its host, coils and twists on top of the bodies of two other squids.\n\n\t\t\t\t\tThey're eating one another.\n\n\t\t\t\t\tFolami! She's just beyond them, wide-eyed with shock but still afloat. For a moment you hesitate, and she is blocked from view and then revealed again as tentacles beat the water into a froth. There are at least two squids in the water, and their sharp beaks aren't selective about what they destroy. Who knows? Perhaps they'd like to eat humans.\n\n\t\t\t\t\tYou flip awkwardly over the speeder's rim, clutching the life preserver, and bounce off a scratchy-suckered tentacle into the sea.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto goodresult\n\t\t*elseif athletics >=35\n\t\t\t*set folami %+10\n\t\t\tIt's not easy to haul yourself up to the upper rim of the speeder, but you manage it. The hard Glass rim cuts painfully into your stomach, making you want to throw up.\n\n\t\t\tAlso, sea monsters. You're no stranger to the range and size variation of sea creatures, so you recognize the mass of giant squids at once. They definitely don't belong on the sea's surface. There are at least two, but it's impossible to tell just how many there are. That particular mystery on its own is off-putting.\n\n\t\t\t\"$!{name}!\" Dad shouts at you. \"Get down before you fall down!\"\n\n\t\t\tTime to go before he grabs you. \n\n\t\t\tYou push yourself forward awkwardly and land face-first on the slick, alien skin of a giant squid before sliding off into the water, gasping and retching in shock.\n\n\t\t\tThe life preserver's rope is still wrapped around your hand. So that's something. Maybe the squid will eat it before it eats you.\n\t\t\t*choice\n\t\t\t\t#Search for Folami.\n\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\tThe engines have long since cut out, and the speeder is dead on the water. The vehicle hits you in the back of the head as you instinctively stay close. You have to get moving, or you'll end up concussed by your own vessel.\n\n\t\t\t\t\tTaking a breath of rank air—who knew giant squids stank of broken toilet?—you aim for a patch of clear water between the writhing mass of tentacles and swim hard, hoping to get through the gap before it closes.\n\n\t\t\t\t\t\"Folami!\" you shout, wishing you'd spent more time swimming so you didn't sound so breathless.\n\n\t\t\t\t\tYou make it, but only just. Something scratchy slices across your shoulder, and you swim farther out with a sudden shot of adrenaline-fueled energy.\n\n\t\t\t\t\t\"$!{name}!\" Folami gasps, and you spot her trying to push away a tentacle. Its thin end is tangled around her arm, and she screams in pain. Her arm is bending more than it should, clearly broken.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto mediumresults\n\t\t\t\t#Watch the squids. No human has swum with giant squids before.\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\tTheir wild flailing is terrifying, but it's clear their movements are panicked and random. The unyielding Glass of the speeder is just as foreign to them as their hundreds of suckers are to you. In fact, as you watch, you can see them wince away from the speeder as if its mere presence is frightening them. \n\n\t\t\t\t\tYou feel a flash of pity, knowing the creatures are unlikely to survive their journey to the surface. A sun that burns humans is far too powerful for them to deal with, and the water pressure is all wrong for them here.\n\n\t\t\t\t\tNo more time for scientific pontification. You paddle gracelessly forward, hearing Folami's call for help just before a stray wave splashes over your head.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto mediumresults\n\t\t\t\t#Don't move away from the speeder until I'm sure I know what to do.\n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\tOh. Ohh! The squids are attacking each other, grasping for advantage with their tentacles and biting with their shark beaks. You spot an awful glimpse of something like a tongue with teeth as one of the squids bites all the way through another squid's tentacle.\n\n\t\t\t\t\tThe severed tentacle flops and quivers as if it's still trying to escape, even as it's ground into smaller pieces by the hunter's beak and sucked into its mouth like a piece of spaghetti.\n\n\t\t\t\t\tThere! Folami is treading water beyond the gelatinous mass of eyes and mantles and tentacles. She's safe for the moment, but one of her arms hangs limp, and her head is jerking back and forth in terror. Shock is setting in, and she's incapable of making rational decisions.\n\n\t\t\t\t\tShe needs help, and she needs it now. There's no more time for caution. You splash awkwardly toward her through the water.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto mediumresults\n\t\t*else\n\t\t\t*set reputation %-10\n\t\t\tGetting up and over the rim of the speeder was a lot easier in your head. It really is very high, and no amount of grunting from you makes it easier. Scrabbling and moaning, you finally manage to get your chest over the upper edge of the speeder.\n\n\t\t\tIt feels like the rim is going to slice you in half. You wriggle forward, trying to find a more comfortable position. Great. Now the sharp rim is cutting into your stomach.\n\n\t\t\tYou're not the brilliant athlete you thought you were. Your flailing dislodges the life preserver, dropping it right near the beak of one of the squids. The squid grabs it in a ball of tentacles and brings the orange ring to its beak, shredding the preserver with something that looks like a tongue lined with razor-sharp teeth.\n\n\t\t\tThe life preserver is dead. This was a bad idea. But Folami is still out there.\n\t\t\t*choice\n\t\t\t\t#Ignore the squids. Folami is what matters.\n\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\tYou try to angle yourself a little higher so you can spot Folami's head bobbing among the waves caused by the flailing squid tentacles. As a result, you fall forward and land face-first in the water. \n\n\t\t\t\t\tIt's dark and strangely cold, as if the squids have brought the ocean depths with them. A gush of cooler water hits you, and you come to the surface gasping and retching.\n\t\t\t\t\t\n\t\t\t\t\tEverything stinks of rotting food—it's not rubbish but the squids. If it's a defense mechanism, it definitely works on you. You can't possibly imagine feeling hungry with giant squids in the vicinity. In that respect, they are unlike any other cephalopods.\n\n\t\t\t\t\tFolami!\n\n\t\t\t\t\tYou flail helplessly, trying to turn around in the water and catch a glimpse of her. All you see is Dad's frantic face looking out of the speeder at you. That and tentacles.\n\t\t\t\t\t*goto inwaterbad\n\t\t\t\t#Giant squids! This is awesome!\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\tYour stomach hurts like you're being operated on, but who cares? There are three prehistoric monsters right below you: three living wonders of the world. Aliens from the dense darkness of the deepest sea.\n\n\t\t\t\t\tThey smell like the back of the restaurant after a busy few days and a garbage-collector's strike. It's genuinely difficult to breathe without throwing up, and your sense of wonder wilts into revulsion. Still, it's possible that no human being has ever been so close to a live giant squid in the open ocean. Except Folami.\n\n\t\t\t\t\tYou have to get down. One way or another. You wriggle awkwardly, trying to twist around so you don't fall into the water face-first. Unfortunately, you're just not that coordinated, and your face hits the water with a slap.\n\t\t\t\t\t*goto inwaterbad\n\t\t\t\t#Nope. I get back into the speeder.\n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\tYou really thought you could play the hero today, but so far, all you've done is hurt yourself and look like a fool. Maybe it's better to let someone else rescue Folami. You've already lost the life preserver. It won't help anyone to have two teenagers in the water instead of one.\n\n\t\t\t\t\tDecision made, you wriggle backward, holding onto the lip of the speeder so you can lower yourself gently back into your seat. Maybe you can pretend you dropped the life preserver on purpose, in order to help Folami without risking yourself.\n\n\t\t\t\t\tYou feel your balance going sideways, and you kick your legs hard to make it better. Except you already took off your legs. With a yelp of surprise, you fall face-first into the water.\n\t\t\t\t\t*goto inwaterbad\n\t#No one knows sea creatures like I do. I'm more useful in the water than anyone else.\n\t\tYou wish you knew more about Kassie's mind implants. That's the kind of thing that could save lives here.\n\n\t\t*gosub legs\n\n\t\tIt's an awkward, painful scramble onto the lip of the speeder. You teeter on the edge as the rim digs into your stomach.\n\t\t*set flexibility %+10\n\t\t*if shark_sense >= 50\n\t\t\t*set reputation %+10\n\t\t\t*set foreknowledge %+15\n\t\t\t*choice\n\t\t\t\t#Physical pain is irrelevant. I have to figure out how to calm the squids.\n\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\tFor a moment, your mind blanks out utterly. You try very hard not to let yourself acknowledge that the easiest way to calm the squids would be to throw Kassie in the sea among them.\n\n\t\t\t\t\tThat is not an option.\n\n\t\t\t\t\tOne of the squids rears back from the speeder right below you. You've got to get the speeder away from it—but first you need to collect Folami. Taking a last deep breath, you dive into the water.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto goodresult\n\t\t\t\t#Giant squids! Awesome.\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\tKassie will be so jealous you got to see their weird beauty in person. You have to pay attention and remember everything for her.\n\n\t\t\t\t\tThey're big, certainly. You can see how they got the \"giant\" part of their name. The largest is at least ten, maybe twenty meters long. Its eyes alone are the size of your head. Their stink is even more amazing, making your eyes stream. It's like standing over a toilet that's been blocked up and then abandoned for a week.\n\n\t\t\t\t\tYou brace yourself and tip forward to fall into the water.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto goodresult\n\t\t\t\t#Maybe this isn't such a good idea.\n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\tYou hang painfully on the speeder's rim, trying desperately to make sense of the whirling mass of tentacles and suckers and eyes and sea all around you. It's hard to remember the giant squids are even more confused and frightened than you are, but intellectually, you know it's true. They wouldn't come to the surface voluntarily.\n\n\t\t\t\t\tYou block out the automatic follow-up question of what could have scared such monsters so badly.\n\n\t\t\t\t\tUnfortunately escape isn't an option, not with Folami stranded out there. If you want to get away from here, you have to get her first. With one last, resigned sigh, you let yourself fall into the sea.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto goodresult\n\t\t*elseif shark_sense >=35\n\t\t\t*set foreknowledge %+10\n\t\t\t*choice\n\t\t\t\t#I have to make the squids go away.\n\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\tSomething frightened the squids. You try not to think about what that could have been. It's impossible to frighten them back into the ocean depths where they belong, but clearly you need to get the speeder away from them—and Folami.\n\n\t\t\t\t\tYou can't see Folami past the writhing mass of squids, but no one's going anywhere until she's back on the speeder. One of the squids chomps right through a stray tentacle. If they weren't so frightened, they'd be focused on more efficiently attacking one another.\n\n\t\t\t\t\tThere's nothing for it: you have to get in the water. You wrinkle your noise at the ammonia stench of the squids and dive into the sea.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto mediumresults\n\t\t\t\t#This is incredible!\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\tYou breathe in deeply and then gag at the horrifying stench of giant squids. Well, that was unexpected. You may never be able to eat squid again. But it's worth it! The squids are right below you, improbably tangled in a mass of mantles and tentacles, still obviously discombobulated from whatever terror brought them to the surface. \n\n\t\t\t\t\tOne massive eye looks up at you, at least twenty centimeters across, and you wonder what it sees. It's not designed for sunlight, so it probably doesn't see much at all. You hope the squids don't see you as a threat, and you take one more mental photograph of the beautiful creatures.\n\n\t\t\t\t\tThen you jump in. \n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto mediumresults\n\t\t\t\t#This is far too dangerous.\n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\tYou watch in horror as one of the squids attacks another, ripping away a tentacle with its beak. Blue blood drips down its side and floats on the water like oil. You shudder to think what that beak could do to Folami if she swims or is pushed into the wrong place.\n\n\t\t\t\t\tIt's hard to make sense of the mass of tentacles and blood and giant eyes frothing around the speeder, but you can tell there are at least three squids present. Judging by their cannibalistic behavior, they're not usually social animals. Something must have frightened them away from the darkness of their normal environment to this painfully bright world.\n\n\t\t\t\t\tYou have to get Folami out of there, so you let yourself fall into the water. The squids might be sea creatures, but so are you.\n\t\t\t\t\t*gosub inwater\n\t\t\t\t\t*goto mediumresults\n\t\t*else\n\n\t\t\tYou don't know enough about giant squids to know if they are the kind of creatures who hunt on the surface in packs, but surely that's something you'd have heard about? If only you could figure out why they came to the surface!\n\t\t\t*choice\n\t\t\t\t#I have to save Folami.\n\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\tWhatever is going on, it's bad. You can't see Folami, but you don't need to see her to know she's in more danger than anyone else. The giant squids are surrounding the speeder on all sides, making it impossible for her to get back to safety. They're sticking up out of the water and constantly moving. In among the waves, Folami probably doesn't even know which way to go.\n\n\t\t\t\t\tYour position isn't much stronger than Folami's, since you're facing unprecedented squid behavior. But at least you should be able to maintain your sense of direction. You'll swim straight out, find Folami, and swim straight back. Fear is irrelevant. All that matters is survival.\n\n\t\t\t\t\tThat's the plan. You dive over the Glass rim and into the sea.\n\t\t\t\t\t*goto inwaterbad\n\t\t\t\t#This is a rare opportunity to observe giant squids at close range.\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\tLooking down at a writhing, stinking mass of tentacles and slick squid skin, you gain a new appreciation for ancient myths of sea monsters and kraken. They're so awful and so beautiful you can't tear your eyes away. It's like watching a fire burn up a sphere.\n\n\t\t\t\t\tYou have absolutely no idea what to make of them. So much for your insider's knowledge about sea creatures. But who cares? You're the first human to swim with giant squids in the open sea without protective equipment. Awesome!\n\n\t\t\t\t\tOther than Folami, who's not having such a great time. This isn't an aquarium visit but a life-or-death situation. Sufficiently frightened now, you tip yourself over and fall into the squids' domain.\n\t\t\t\t\t*goto inwaterbad\n\t\t\t\t#This is a bad idea.\n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\tYou really don't know jack about sea creatures, except possibly what sauces bring out their flavor best. So you've already learned something about giant squids: they smell like rotting fish seasoned with week-old urine. Judging by the stink, these things aren't edible.\n\n\t\t\t\t\tBut you are.\n\n\t\t\t\t\tAs you watch, two of the squids grapple, snapping their beaks and ripping into one another. They bleed blue. One of them gulps down the still-wriggling tentacle of another, crushing and cutting it with something like a tongue covered in teeth. \n\n\t\t\t\t\tYou have to find Folami before she ends up getting chopped into squid chow. So you jump, and the bloodstained water takes you into its embrace.\n\t\t\t\t\t*goto inwaterbad\n\t#I'll patch up the speeder's essential structure—and I'll do it from the water.\n\t\t*set empathy %-10\n\t\t*if appraisal >=50\n\t\t\t*set connections %+10\n\t\t\t*set folami %+10\n\t\t\tYou stand in your seat and give the inside of the speeder a very fast visual inspection. The primary rudder has been sheared nearly in half, and one of the engines is twisted so it's pointing backward. No worries: you'll limp home, but you'll make it safely. There are several spiderweb cracks here and there, with the suggestion of more underneath the speeder where you can't see. \n\n\t\t\tAfter examining the largest fracture, you decide it's stable. It's the lower, smaller, V-shaped crack next to Folami's empty seat that you should worry about. \n\t\t\t*choice\n\t\t\t\t#See what happens if I equalize the pressure on the Glass.\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\tIt's a risky strategy but hopefully one that will make a bad situation slightly less life-threatening. You override the safety codes and set the speeder to take on water. \n\n\t\t\t\t\tThe sea gushes in, making Kustiani shriek as her expensive shoes are ruined in an instant. It's dirty water, tarnished by proximity to Old Sydney's ruins and to unidentifiable biological matter from the squids. In a few seconds, the water is as deep as your chest, and it's hard to concentrate with all the swearing. \n\n\t\t\t\t\tYou take a breath and duck under the water, examining the V-shaped crack with a combination of hands and eyes. It's stable—but not for long. After popping up for another breath, you set the pump to bailing the speeder while you twist open the emergency cupboard and grab the larger bottle of all-conditions sealant. \n\n\t\t\t\t\t*gosub legs\n\n\t\t\t\t\tThen you pop open the lower hatch and swim outside.\n\t\t\t\t\t*goto sealant\n\t\t\t\t#See if it's possible to seal off the crack from inside the speeder.\n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\tIt takes a lot to crack Floating City Glass, but it happens. You reach for the emergency cupboard. It's hard to open, since it's designed to open automatically in a major breach. That hasn't happened yet, and hopefully you can patch things up before it does. \n\n\t\t\t\t\tIt opens at last, and you grab two bottles of sealant, instinctively choosing the smaller bottle for your dominant hand in case your first idea doesn't work. You spray it in a gentle arc above both points of the V-shaped crack, and then watch closely as the crack grows taller…and passes straight under your sealant block.\n\n\t\t\t\t\tIt needs a double block: inside and out working in harmony. You pick a spot several inches higher and do a wider, thicker arc of sealant spray. \n\n\t\t\t\t\t*gosub legs\n\n\t\t\t\t\tThen you drop the empty bottle and take the larger pack of sealant up and over the speeder's rim and into the sea.\n\t\t\t\t\t*goto sealant\n\t\t\t\t#See to the crack immediately and ignore everything else.\n\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\tKustiani is swearing. Dad is flustered.\n\n\t\t\t\t\tNone of that matters.\n\n\t\t\t\t\tYou fight with the clasp of the emergency cupboard and win, finding two packs of emergency sealant inside. Good. Taking the first—the smaller bottle, in case you need the larger bottle for the outside of the crack—you spray over the V-shaped crack. It grows before your eyes despite your efforts, and you join the swearing.\n\n\t\t\t\t\tPlan B. You spray a wide circle all around the jagged ends of the crack, thickening it where the crack is likely to spread next. The bottle is empty, and you throw it aside. This crack needs to be sprayed from both sides of the Glass.\n\n\t\t\t\t\t*gosub legs\n\n\t\t\t\t\tYou take the larger bottle and climb up and over the speeder's rim, falling into the sea. \n\t\t\t\t\t*label sealant\n\t\t\t\t\tThe water feels gritty against your skin, and the ammonia stink of the squids is almost unbearable. You take a deep breath all the same and force your stomach to settle with an effort of will.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I can do this.\n\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\tYou dive under the speeder and twist around so you can check for more cracks underneath. Sure enough, the V-shaped crack traces back to what's clearly the point of impact. The speeder is holding together for now, but not if that crack widens.\n\n\t\t\t\t\t\t\tYou head back for the pointy end of the flaw and spray the sealant generously all over the area you've marked in the inside of the Glass. Dad sees what you're doing and lifts his hand to tap a message on the Glass before he thinks better of it and simply gives you a thumbs-up.\n\n\t\t\t\t\t\t\tThe bottle empties fast, and you're letting yourself move toward the surface when something hits you on the back of the head. For a moment you can't see or swim, then you're coughing and trying to blink seawater out of your eyes. \n\n\t\t\t\t\t\t\tSomething grabs your shoulders.\n\t\t\t\t\t\t\t*goto grabtwo\n\t\t\t\t\t\t#The others will support me from the inside.\n\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\tDad is directly next to you on the other side of the Glass, wide-eyed and trembling but watching you for instructions. For the first time ever, you truly feel like an adult. You point to the patch of sealant on the inside and he nods, bracing himself to add more support to the inside of the speeder as you pile on a corresponding arc of sealant on the outside of the vessel. \n\n\t\t\t\t\t\t\tBoth of you stare at the crack as it splinters still further…and then stops. You've done it!\n\n\t\t\t\t\t\t\tDad punches the air in triumph just as something slams into your hip, pulling you downward. You twist and beat at the stray tentacle, and in a few moments, you're back on the surface, choking and trying to see past the grimy seawater in your eyes.\n\n\t\t\t\t\t\t\tYou're reaching out your hands blindly when something grabs you from behind.\n\t\t\t\t\t\t\t*goto grabtwo\n\t\t\t\t\t\t#This is a terrible idea.\n\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\tThe squids somehow manage to loom over you, wriggle under you, and surround you—all at the same time. They don't belong on the surface, but they can still kill you by accident.\n\n\t\t\t\t\t\t\tIf you don't patch the speeder, everyone is in danger of landing in the drink.\n\n\t\t\t\t\t\t\tWith that heartening thought, you take another breath and dive under the speeder, confirming what you suspected: the lower focal point of the V-shaped crack is ready to split the speeder in half. You pop back up and spray all around the pointy upper end of the V, using up the entire bottle in your effort to keep it from growing any more.\n\n\t\t\t\t\t\t\tJust as you look at a job thoroughly done, the water around you turns cold and black. One of the squids has sprayed ink in an attempt to hide from the rest—and from you. The inky water burns where it touches you, and you have just enough time to realize the substance is toxic before something grabs you with an unbreakable grip.\n\t\t\t\t\t\t\t*label grabtwo\n\n\t\t\t\t\t\t\tIt's Dad! He helps you back into the speeder, and then Folami's close enough that he helps her back inside too. Everyone stares at you until you feel uncomfortable.\n\n\t\t\t\t\t\t\t\"That was clearheaded of you,\" Dad says. \"Thanks to you, we're all safe.\"\n\n\t\t\t\t\t\t\tThe others chime in with agreements, making you wish you were back with the squids. Still, it won't do your future job prospects any harm.\n\t\t\t\t\t\t\t*goto endybit\n\t\t*elseif appraisal >= 35\n\t\t\t*set folami %+10\n\t\t\tYou stand in your seat to look around at the speeder. It's not good. One of the engines looks badly messed up, and the main rudder is missing a huge chunk. There are cracks everywhere. You're fairly sure it's not going to explode, but you don't know if it'll be able to get back to Kota without a major overhaul. \n\n\t\t\tAll you can do is fix what's directly in front of you. You wrench open the emergency cupboard and find some heavy-duty tape and two bottles of all-purpose emergency sealant. The sealant is designed to work wet or dry, but even with two bottles, you can't glue every crack.\n\n\t\t\tOne of the cracks makes a tiny plinking noise and grows longer in front of your eyes. That must be the most dangerous, so you'll start there.\n\t\t\t*choice\n\t\t\t\t#Before I fix anything, I need to gather more information.\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\tYou toss the smaller sealant bottle to Diah and decide to take off your legs.\n\n\t\t\t\t\t*gosub legs\n\n\t\t\t\t\tIt's not easy or graceful to haul yourself up to the rim of the speeder, but it's the best vantage point around. From up there, you can tell the speeder is canted to one side. You catch a glimpse of what might be Folami, but it's impossible to be sure past the waves. And the tentacles.\n\n\t\t\t\t\tThere are at least three giant squids flailing their tentacles and snapping their hard beaks immediately below you. You can't help wondering what it must be like to be in the water with them.\n\n\t\t\t\t\tThen you jump, and find out.\n\t\t\t\t\t*goto sealanttwo\n\t\t\t\t#If I don't fix the speeder, there's no point in saving Folami.\n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\tYour stomach twists with horror at the dangers all around. Folami is in the water with at least three giant squids. Dad is flustered. And the speeder is breaking apart. You try to calm yourself with a deep breath through your nose, and you gag. Unlike their delicious cousins, giant squids smell like week-old shark boiled in human urine. Definitely not edible.\n\n\t\t\t\t\tThis is bad. This is very bad. Getting in the water with them may well be toxic. But you have to try.\n\n\t\t\t\t\tTaking a stronger grip on the precious bottle of sealant, you dive in.\n\t\t\t\t\t*goto sealanttwo\n\t\t\t\t#Ignore Folami's cries for help and focus on the cracking Glass.\n\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\tYou don't bother attempting to deal with the broken rudder and twisted engine. There's no point being able to steer if the speeder can't even float. Unfortunately, there's an excellent chance the worst damage is on the speeder's base, since that's where the squid hit it. \n\n\t\t\t\t\tYou hear Folami faintly calling out behind the trenches and heights of the squids and waves. Well, she's alive then: good.\n\n\t\t\t\t\tTaking a breath almost makes you retch because the squids stink like rot and urine, but you suck in as much air as you can stand and dive headfirst into the water.\n\t\t\t\t\t*label sealanttwo\n\n\t\t\t\t\tThe water is thick, and the smell of it has a physical force that makes breathing difficult.\n\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Luckily I have the skills for this.\n\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\tYou swim under the speeder, stroking hard to keep from floating back up too soon.\n\n\t\t\t\t\t\t\tSure enough, there's a network of cracks radiating out from a point that's just off-center of what should be the lowest point of the speeder. The most dynamic crack is the most dangerous, so you follow it back up to the surface and drown the pointy end in sealant.\n\n\t\t\t\t\t\t\tBy the time you're done, Dad is reaching down to help you back into the vessel, and Folami has made her own way to your side.\n\t\t\t\t\t\t\t*goto mediumresults\n\t\t\t\t\t\t#Folami must be terrified. Maybe the squids are too.\n\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\tYou put aside your own fear, knowing you need to remain calm so you don't do more harm than good. Swimming around the speeder, you can see that one of the smaller cracks is growing bigger. That makes it a greater threat than it appears.\n\n\t\t\t\t\t\t\tYou spray the sealant liberally, noticing Dad doing the same thing from the inside. When at last you're satisfied, you notice something is touching your back, and you turn around and push away part of a stray tentacle.\n\n\t\t\t\t\t\t\tFolami is close by, trembling with shock and cradling a broken arm. The others help you both back inside.\n\t\t\t\t\t\t\t*goto mediumresults\n\t\t\t\t\t\t#I need to be careful but thorough.\n\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\tThe water is filthy. It's thick with pollutants from the drowned city of Old Sydney, and the nearest giant squid is oozing blue blood. There's only a narrow strip of water between the speeder and the squid, and you're terrified that the space will disappear. Nonetheless, you have to take a risk to create safety. You dive under the speeder, observing the fracture pattern where the impact was and then following the most dangerous crack back up and out of the water. \n\n\t\t\t\t\t\t\tUsing the sealant, you temporarily seal the crack so it doesn't grow any bigger. Hopefully it'll last until the speeder gets back to Kota. There's nothing else you can do, and Folami has found her way through the mass of tentacles despite nursing a broken arm.\n\n\t\t\t\t\t\t\tJob done, you help Folami inside and then get inside yourself.\n\t\t\t\t\t\t\t*goto mediumresults\n\t\t*else\n\t\t\tThe speeder is bobbing up and down and from side to side. It's dead in the water, and the water is full of squirming monsters. Since the speeder has lost equilibrium, the damage is even worse than it looks. Probably. You're finding it hard to think straight. \n\n\t\t\tOne of the engines is just…wrong. It's impossible to guess what happened to it or whether it will blow you all up. The rudder is a splintered mess. You open the emergency cupboard and find nothing you recognize as useful. \n\n\t\t\tMaybe the problems will be clearer from the water. \n\t\t\t*gosub legs\n\n\t\t\tYou haul yourself up onto the speeder's rim, ready to dive in.\n\t\t\t*choice\n\t\t\t\t#I've always wanted to get a close look at a speeder engine from the water.\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\tYou memorize the position of the engine relative to your perch and dive in. The water is strangely cold for a second, then warm again. Some of the water must have been carried up by the giant squids and then expelled as they attempt to flee. It's fascinating. You wonder if any human has done what you have done: swum in the open ocean with giant squids.\n\n\t\t\t\t\tTechnically, everyone who has ever swum in the ocean has done so—but not as close as you. Other than Folami. You wonder if she's finding any pleasure in the experience.\n\n\t\t\t\t\tEngine.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#I can do this—and better than anyone else.\n\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\tYou dive under the speeder, but being closer to the engine doesn't give you any idea of how to fix it. It turns out that although you're good at plenty of things, you're not good at this. There's nothing you can do but get back to relative safety inside the speeder.\n\n\t\t\t\t\t\t\t*label Folamicoming\n\t\t\t\t\t\t\tLeaving the engine behind, you stroke hard to get back to the surface, coughing and choking in the awful stink of the nearby squids.\n\n\t\t\t\t\t\t\tFolami has managed to swim toward the speeder with what looks like a broken arm, and the others help you both inside.\n\t\t\t\t\t\t\t*goto fail\n\t\t\t\t\t\t#The squids must be just as afraid of us as we are of them.\n\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\tSomehow, knowing that the writhing mass of jelly-like flesh and sharp-edged tentacle suckers in front of you is filled with blinding terror doesn't make you feel any better. The squids might not be deliberately attacking the speeder, but Folami is still out beyond them, and the speeder is still in serious danger. \n\n\t\t\t\t\t\t\tYou jump into the sea, using the momentum of gravity to get underneath the vessel, where you can confirm your impression that one of the engines is definitely damaged. Unfortunately, that's as far as your knowledge can take you. \n\n\t\t\t\t\t\t\t*goto Folamicoming\n\t\t\t\t\t\t#I need to fix this with as little danger to myself as possible.\n\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\tToo bad there's no easy way out of this one. You carefully orient yourself to the position of the engine and dive into the squid-infested water. The less time you spend in the sea the better, so you stroke hard to go directly underneath the speeder, ignoring the stinging of your eyes as you look more closely at the ruined engine.\n\n\t\t\t\t\t\t\tIt's immediately clear that you have no idea what to do about a broken speeder. You cut your losses and get back to the surface. Folami is there, trying to get back into the speeder with a broken arm.\n\n\t\t\t\t\t\t\tDad helps you both on board.\n\t\t\t\t\t\t\t*goto fail\n\t\t\t\t#We need to get away, and fast. I'm going to fix the rudder.\n\t\t\t\t\t*set flexibility %-10\n\t\t\t\t\tThe thought of accidentally steering straight back toward New Sydney—or remaining dead in the water right next to Old Sydney—is horrifying. You put aside your fears of Drylanders, squatters, and sea creatures, and focus on the rudder. Without a working rudder, you won't be able to get to safety.\n\n\t\t\t\t\tThe rim of the speeder is cutting painfully into your stomach, so you take one last careful look around. There's no sign of Folami past the mass of writhing squids and the rise and fall of the water.\n\n\t\t\t\t\tFolami can take care of herself. You fix the location of the rudder in your mind and dive into the sea. A tentacle rises out of the sea and slaps you, scratching your arm with the sharp-edged suckers.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#It's not attacking me. It's frightened.\n\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\tThe tentacle that struck you continues to flail about wildly until suddenly falling onto the sharp beak of another squid. The beak promptly chomps down and proceeds to eat the entire tentacle, crushing it into an edible size using something like a tongue with teeth. The tentacle continues to wriggle as it is eaten.\n\n\t\t\t\t\t\t\tYou leave the squids behind and swim around to the rudder. Unfortunately, it turns out your assessment of the damage is about as helpful as your (nearly nonexistent) knowledge of giant squids. You haven't the faintest idea of how to fix the problem.\n\n\t\t\t\t\t\t\tOn the upside, Folami has managed to get past the squids, and Dad is able to help both of you back inside.\n\t\t\t\t\t\t\t*goto fail \n\t\t\t\t\t\t#No oversize fish is going to scare me.\n\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\tThe giant squids might look impressive, but for all their size, they're pretty stupid—stupid enough to come to the surface and run into your speeder, all in a wild panic. Since they're too big and random for you to control, you focus on the rudder instead. It's definitely a mess. There are broken pieces in the water and a new sharp edge where a large chunk was broken clean off.\n\n\t\t\t\t\t\t\tUnfortunately, you have no idea where the missing piece has gone. Nor do you have any idea what you can possibly do to fix the rudder. You don't lack courage, but you do lack mechanical skill.\n\n\t\t\t\t\t\t\tFolami swims up beside you, favoring what looks like a broken arm. You help her get back into the speeder before getting back inside yourself.\n\t\t\t\t\t\t\t*goto fail\n\t\t\t\t\t\t#I swim to the rudder before I get seriously hurt.\n\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\tThis is definitely not a safe place to be. You want to get yourself and everyone else away from the terrified squids as soon as possible. Ignoring the stinging pain where the tentacle hit you, you swim to the rudder. \n\n\t\t\t\t\t\t\tGetting under the water is tricky without your tail, but you manage that much. Unfortunately once you see the rudder at close range, you realize you have no idea how to fix it. Your terrifying plunge into the water didn't help anyone.\n\n\t\t\t\t\t\t\tEmbarrassed, you return to the surface. Folami has made her way back to the speeder despite a broken arm, so Dad helps both of you back inside. \n\t\t\t\t\t\t\t*goto fail\n\t\t\t\t#There might be more cracks underneath. I need to check.\n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\tThe rim of the speeder isn't designed to be a comfortable perch, and it cuts uncomfortably into your stomach. On the other hand, it's a whole lot safer than the sea. \n\n\t\t\t\t\tThere are at least three giant squids writhing and flailing in the water. They're attacking one another and churning the ocean into a froth. You see a severed tentacle jinking and curling as if it's still connected to its host.\n\n\t\t\t\t\tThe stink of its blue-colored blood makes you gag. Clearly, giant squids aren't edible like their smaller cousins. If smell is any indication, they're toxic.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#The sooner I jump in, the sooner I can get the speeder out of here.\n\t\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\tYou take a deep breath of the squid-fouled air and leap into the water. The liquid rushes past your skin, feeling thick with oil and scratchy with grit from Old Sydney's proximity. Rather than surfacing only to dive again, you use the momentum gravity gave you to continue swimming below the speeder.\n\n\t\t\t\t\t\t\tSure enough, the most serious cracks radiate out from a specific spot at the speeder's base. Unfortunately, it's impossible to fix them all, and you don't know enough about atmospheric stressors to know where to focus.\n\n\t\t\t\t\t\t\tDefeated, you return to the surface. Folami has made it back to the speeder, and Dad helps you both back on board.\n\t\t\t\t\t\t\t*goto fail\n\t\t\t\t\t\t#I can do this—and better than anyone else.\n\t\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\tIt's frightening to fall forward off your awkward perch into the water and even more frightening to find yourself dwarfed by the giant squids writhing all around you.\n\n\t\t\t\t\t\t\tOne enormous eye points your way—an organ larger than your head.\n\n\t\t\t\t\t\t\tYou don't waste any time popping under the water to take a closer look at the speeder's base. It's much more badly cracked than you expected, and you're faintly surprised the speeder is still holding together. But you lack the expertise to figure out what to do.\n\n\t\t\t\t\t\t\tUnable to improve matters, you return to the surface where Folami is attempting to return to the speeder despite her freshly-broken arm. You help her up and then return inside yourself.\n\t\t\t\t\t\t\t*goto fail\n\t\t\t\t\t\t#Poor things. They must be more scared than I am.\n\t\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t\tThere are at least three giant squids beating the sea into a froth below you, and they're clearly beside themselves. They're way out of the comfort of their deep dark home, and their enormous eyes must be blinded by the sunlight. There's blue blood on the water along with a single severed tentacle, still coiling and uncoiling in a creepy parody of life.\n\n\t\t\t\t\t\t\tStill, you have to check the base of the speeder—so you jump in, striking out hard to get underneath the speeder. There's a clear point of impact and a spiderweb pattern of cracks. It's a frightening sign that the danger isn't over yet. Worse, you have no idea how to fix it, or even where to start.\n\n\t\t\t\t\t\t\tYou return to the surface, where Folami has managed to get past the squids despite a broken arm. Dad helps you both back inside.\n\t\t\t\t\t\t\t*goto fail\n*label legs\n*if legs = 1\n\t*set athletics %-5\n\tYour cosmetic legs are dead weight, and you curse as you go through the laborious process of removing them.\n*if legs = 2\n\tYou're glad you wore your running legs, which you can remove relatively quickly.\n*if legs = 3\n\tFortunately, you wore your all-purpose legs. You hit the emergency quick-release sequence so they drop back into your seat. \n\n*return\n*label inwater\n*choice\n\t#Swim to Folami. I cope with fear better than she does.\n\t\t*set empathy %-10\n\t\tYou set your eyes on Folami and ignore everything else, swimming to her as quickly as you can. You ignore the impression that you're about to feel the cold, sharp suckers of a tentacle wrapping around your waist to drag you under.\n\n\t\tIt's clear from Folami's face that she's barely able to stay afloat, let alone figure out how to get to safety. You squeeze her uninjured arm for reassurance, then gently pull her against your chest in a lifesavers' hold with the life preserver on top. \n\n\t\tWith one arm around Folami and your prosthetics back on the speeder, you have only one full-length limb free for swimming.\n\n\t\t\"Kick!\" you yell in Folami's ear. \"I need your legs.\"\n\n\t\tShe nods against your chest and obediently kicks her legs, moving the pair of you through the water at last. You bump against the gelatinous mass of a giant squid, but it moves out of your way.\n\t\t*goto grab\n\t#\"Folami! Get over here! We need to get back in the speeder.\"\n\t\t*set curiosity %-10\n\t\tShe looks right at you, but her eyes don't meet yours. You see her bob beneath a wave as the tentacles close in again. Despite the blood itching on your face, none of the squids appear to be actively attacking. For Folami, however, the damage is already done.\n\n\t\tKeeping close to the speeder, you hold the end of the life preserver's rope and push the round orange ring toward Folami. It's immediately tangled into a knot of tentacles, and you're forced to let go. Treading water isn't easy without your tail, and you're not sure how long you can last. \n\n\t\t\"Folami!\" you yell again. \"Swim for it. Now!\"\n\n\t\tThe tentacles flow in and out and in again, like a horrible curtain blowing in a storm. Something scrapes your hip, and you scream in shock and pain. \n\n\t\tThen Folami is in front of you, wild-eyed and trailing her broken arm.\n\t\t*goto grab\n\t#\"It's alright, Folami! They're not trying to hurt us.\"\n\t\t*set empathy %+10\n\t\tIt's clear from the blankness of her face that she's in deep shock. You're not sure if she can understand you in such a state, so you yell to her again and again, watching the tentacles writhe in and out of one another. \n\n\t\tYou get another glimpse of Folami, and another, and suddenly the water all around you turns black. It splashes directly upward into your face, filling your eyes and nose. \n\n\t\tAround you, the water bubbles and swells. You're running out of air, and the blinding squid ink burns against your skin. It takes all your willpower to avoid gasping at the ammonia stink of it, but you don't want to find out what it tastes like. Looking around, you see the squids appear to have fled. Folami is swimming toward you across the blackened sea.\n\t\t*goto grab\n*label grab\n\nThen something grabs your shoulders, gripping you with pincer-like strength and pulling you backward. You scream and reach back to fight it, but the angle is awkward, and you know you've lost before you've begun.\n\nA roaring seeps into your consciousness: \"$!{name}! It's me!\"\n\n*page_break\n\nDad!\n\nBeside you, Folami reaches up her good hand, and Diah hauls her aboard as you go limp and let Dad fish you out of the sea like someone's unprocessed rubbish. You and Folami flop half into your seats, sopping wet and hampered further by your discarded legs being in the way.\n*return\n*label goodresult\n\n\"You saved me!\" Folami pants, trying to hug you past your left thigh and the stiff plastic back of the chair. \n\n\"Are you alright?\" you ask her.\n\n\"$!{he} saved my life,\" she says loudly.\n\n\"I…they're squids,\" you say blankly. \"Giant squids.\"\n\n\"Well done!\" Kustiani says.\n\nDad nods, brimming with pride he's barely keeping in. It's clear the tale of your heroics will be all over Kota within the week. You can feel your face heating up with embarrassment—but at least this won't do your career options any harm.\n*goto endybit\n*label mediumresults\n\nFolami bursts into tears. \"I thought I was going to die. Then I thought I was going to get you killed as well.\"\n\n\"It's alright,\" you tell her. \"We're safe now.\"\n\nDad pats you both awkwardly on your damp shoulders. \"$!{name} shouldn't have jumped in, but fortunately, you both made it out.\"\n\n\"Thank you, Dad,\" you say, too glad about being safe to argue over whether you made the right choice. It's clear Folami is glad she wasn't the only human in the water.\n*goto endybit\n*label inwaterbad\n*choice\n\t#Swim for Folami. If I'm scared, she must be terrified.\n\t\t*set empathy %-10\n\t\tYou try to reorient yourself, but the world is full of tentacles and that awful stench. The self-assurance that made you race to the rescue isn't making you a better swimmer, and your earnest paddling only gets you slapped in the face by a wayward tentacle. The suckers are surprisingly sharp, and your own blood drips into one eye, half blinding you.\n\n\t\tStill you try to keep moving, calling out for Folami. Among the terrified squids, you think you hear her calling back, but you can't be sure. There's too much splashing and flailing.\n\n\t\tThe water shifts with strange currents as the squids squirt water at one another, trying to propel themselves away. An underwater blast catches you and flips you over. The world turns to water and fear, and then something grabs your arm.\n\t\t*goto grabbedbyFolami\n\t#Get out of the water. This is too dangerous.\n\t\t*set curiosity %-10\n\t\tYou turn back to return to the speeder just in time to get hit in the face by a tentacle. The suckers scrape across your skin, drawing blood, and you're blinded. You grope through the water, searching for the smooth feel of Glass, but everything is water and blood and the slick wet skin of giant squids.\n\n\t\tIn desperation, you wash out your eyes with seawater, biting back screams of pain and then trying to look around through your tears. There are tentacles rising out of the water like living periscopes, and you can't see the speeder. You can't see anything. Or anyone.\n\n\t\tSomething curls around your wrist and squeezes hard.\n\t\t*goto grabbedbyFolami\n\t#Those poor squids clearly didn't bump into the speeder on purpose.\n\t\t*set empathy %+10\n\t\tYou watch in dazed horror as the enormous face of one of the squids rises from the water in front of you, wreathed in tentacles. It opens its black beak and bites right through another squid's tentacle, spraying blue blood. You barely remember to stay afloat as something like a tongue with teeth crushes and rips apart the tentacle, sucking it into the massive mouth all the while. You can actually see the crushed tentacle going into the body of the dominant squid, even passing directly through the esophageal hole in the donut shape of the squid's brain.\n\n\t\tThe blue blood stinks like an overdue rubbish sphere, and you struggle to keep your mouth closed. Gagging could get you a mouthful of squid-stained seawater, and that's the last thing you need.\n\n\t\tEven with adrenaline flooding your system, you're struggling to stay afloat. You try to turn around and orient yourself, but instead you manage to dunk your head fully under the water. The liquid stings your eyes, revealing that the squids are just as toxic as they smell. Giant squids aren't anything like the kind that occasionally graces your dinner table.\n\n\t\tThen something grabs your arm, tugging you sideways.\n*label grabbedbyFolami\n\nYou instinctively try to pull away, but it's no use. Whatever grabbed you yanks harder, pulling you through the water. You manage to catch a breath, reaching for your attacker with your other arm.\n\nIt's Folami. She's spotted the speeder and is dragging you there despite what looks like a broken arm.\n\n\"You can let go now,\" you tap on her shoulder, knowing you screwed up. \"I'll follow you.\"\n\nThe pair of you make it back to the speeder—the squids are now clearly trying to get away from all signs of humanity as quickly as possible—and Dad helps you both aboard.\n\n*label fail\nYour relief at being safe is quickly overtaken by shame as Dad loudly tells you off for your stupidity in front of all the others. It's even worse knowing that he's right.\n\nFolami gives your hand a squeeze. It's clear she appreciates your attempt to be the hero.\n*label endybit\n\nDad is looking back and forth, checking that everything is holding together and there are no new injuries or threats. You've never seen him move in that breathless, jerky way, and it takes you a moment to see he's afraid.\n\n\"What do you think, ${name}?\" he says, unable to focus well enough to take the lead as he usually does. \"Should we get out of here at top speed, or call for assistance?\"\n*fake_choice\n\t#\"The Drylanders mustn't know we're in trouble. We can make it home.\"\n\t\t*set empathy %-10\n\t\tHe nods, pleased with your response—but you notice he sets a very cautious pace.\n\t#\"I don't think we'll make it all the way back without assistance.\"\n\t\t*set curiosity %-10\n\t\t\"Very well,\" he says, and he emails a distress call to Kota.\n\t#\"Folami needs a doctor as soon as possible.\"\n\t\t*set empathy %+10\n\t\t\"Agreed,\" he says, catching Kustiani's eye as she performs first aid. He sets the speeder moving away from the squids and Old Sydney, then sends a distress email to Kota.\n\nFolami is still trembling, so you twist in your seat and sign whatever minutiae you can think of to help her fully come back to her own mind. Her eyes gradually clear, and you can feel your own shoulders relaxing. On the downside, the speeder is visibly cracking around you, and Dad is having trouble and overcompensating for the various damaged parts.\n\nYour vestigial limbs are too wet to take your liner, so you can't put your prosthetics back on. Ugh. You always feel a little naked when people see the Glass bones protruding from your thighs, even though it's been over a year since you received your best and final mods.\n\nAt last, Kota is a bright sparkle on the horizon, and you can see a larger rescue speeder coming for you. They shout teasing insults about Dad's piloting skills until he shows them the speeder-cam footage of three squids surrounding the vessel. After that, they help you all on board with a hushed reverence, hurrying back to Kota the second your damaged speeder is hooked onto their tow line.\n\nYou made it home. Well done.\n*if legs = 1\n\t*set athletics %+5\n*finish Chapter Five", "chapter_nine": "*set somethings_coming 2\n*set temp 0\n*if told_drylanders = 1\n\t\"What is this, ${name}?\" Dad says. \"Why didn't you tell us there was an earthquake on the way?\"\n\n\t\"I told them everything I know,\" you say.\n\n\t*goto begin\n*else\n*label begin\n\"Yunus, keep the foreigners here,\" snaps Ester. \"The rest of you, use protocols for a major arson event.\"\n\nThe Drylanders scatter, leaving you with Yunus. Folami is gone; her patron must have taken her.\n*fake_choice\n\t#\"Yunus, we need to get out of here.\"\n\t\t\"Mom said to stay,\" he says, looking back and forth between the door and the long central table. \"It's safer. I mean, safer overall.\"\n\n\t\t\"What are the major arson protocols?\" Dad asks, standing and bracing himself against the shuddering table.\n\n\t\tYunus hesitates, and you can see him thinking about lying. \"By 'overall' I meant 'on average.' For the whole city.\"\n\n\t\t\"Not for us,\" Dad says flatly. \n\n\t\t\"If Mom thought it was truly dangerous, she wouldn't have left me with you,\" says Yunus. \"But we don't have earthquake protocols. We have panic rooms in case of a major fire. They're very solid, but they're designed more for airflow than for anything else. That's where everyone will be going.\"\n\n\t\t\"Except us,\" Dad says.\n\n\t\t\"We might be better here,\" Yunus says. \"Sydney isn't a major earthquake area, so I'm sure it'll calm down any second. We're safe here.\"\n\n\t\t\"Kota Perahu is actually safe from earthquakes,\" Dad grinds out. \"How could you not have protocols in place?\"\n\n\t\t\"We also don't have protocols for tiger attacks,\" says Yunus.\n\n\t#\"Don't worry. If it were going to be bad, I would have known it was coming.\"\n\t\t\"This is already bad,\" says Yunus. \"Mom wanted me here because it's safer than running around during an earthquake.\"\n\n\t\t\"Earthquakes are short,\" Dad puts in. \"We just have to hold on for a few moments.\"\n\n\t\t\"Exactly,\" says Yunus, stumbling as the earth shakes beneath the carpeted floor.\n\n\t\t\"I hope the sharks are alright,\" you say, earning yourself a warning look from Dad. \"Er, I mean I'm sure they are.\"\n\n\t\tYunus glances up at the ceiling and then catches himself and fixes his gaze on the table. Even a Drylander is afraid of the weight above their head when there's a chance it will all come crashing down.\n\n\t#\"I need to call Kassie.\"\n\t\t\"I knew it,\" Dad says. \"I knew she was up to something.\"\n\n\t\tYou ignore him and tap an urgent chat request to Kassie. \n\n\t\tShe answers immediately, in full holo mode so you can see her signing without having to go through a computerized interface. \"What's wrong?\"\n\n\t\t\"I'm underground and there's an earthquake! What do I do?\"\n\n\t\t\"How would I know!\" she signs, flickering badly. \"$!{name}? Can you see me?\"\n\n\t\tAnd she's gone. Your wrist com goes blank.\n\nDad puts up one hand, and everyone looks at him. \"It's not stopping,\" he says. \"It's getting worse.\"\n\nHe's right. What are you going to do?\n*choice\n\t#Get everyone under the table; it's enormous, so we can all stay together.\n\t\t*set empathy %+10\n\t\t\"Take shelter under here,\" you say, scrambling beneath the table by way of example.\n\n\t\tDad and Yunus follow you, and the rest crawl beneath the table a moment later.\n\n\t\t*gosub rumble\n\n\t\tThe table cracks into two enormous pieces as steel beams, bricks, and dirt rain down upon it. You are trapped under one side with Dad, while Yunus and the others are trapped on the other. \n\n\t\t\"$!{name}, are you alright?\" Dad asks.\n\n\t\t\"I'm not hurt,\" you say, patting yourself down to check you're telling the truth. You're bleeding in several places, but none of it is serious. \"You?\"\n\n\t\t\"I've been better,\" he says. \"But I'm mobile.\"\n\t\t*goto kangaroos\n\t\t*label rumble\n\t\tThe earthquake has a sound that makes you think of the awful clanking rumble of New Sydney's filthy buses. It rises and falls like an orchestral piece, shaking the whole world and making you clap your hands over your ears as if that could block the sound and therefore stop the endless shaking. It goes on and on, second after second feeling like a million eternities.\n\n\t\tThen there is an enormous crash, and the roof falls in.\n\t\t*return\n\t#Get everyone under the chairs; they're the sturdiest furniture.\n\t\t*set curiosity %-10\n\t\t\"Not the table,\" you say. \"The chairs are sturdier.\"\n\n\t\tYou push two of the Drylander-side chairs together and crawl underneath, keeping your head and torso under the chairs and your legs under the table. It's awkward, but it does make you feel a little safer. The others follow suit.\n\n\t\t*gosub rumble\n\n\t\tA broken steel beam smashes down onto the table, breaking it into two pieces that fortunately fall away from everyone's vulnerable legs. Other structural pieces shower from the ceiling along with thick dust. One by one, everyone calls out to confirm they're not hurt.\n\t\t*goto kangaroos\n\t#Run for the surface; even if we don't make it, we'll be closer to the exit.\n\t\t*set empathy %-10\n\t\t\"This is a dead end,\" you say. \"We should go.\"\n\n\t\t\"No,\" says Yunus. \"Mom said—\"\n\n\t\t\"I'm with ${name},\" Dad says, cutting him off. \"This is a terrible place to be.\"\n\n\t\t\"We don't have enough time to get out,\" says Yunus.\n\n\t\t\"Let's at least try,\" you say, leading the way out the door.\n\n\t\tThe others follow without a word, relieved to at least be moving. Outside, the wide hallway is empty of people, although there is evidence of panicked flight: a scarf trampled into the floor, a child's toy dropped and left behind.\n\n\t\t\"Which way?\" Dad asks.\n\n\t\tYunus stands in the doorway and tries to get everyone to stand with him. The earthquake makes you stumble and fall into him, knocking everyone back into the room like bowling pins.\n\n\t\t*gosub rumble\n\n\t\tYou roll off Yunus and pull yourself up the wall to stand, blinking in the dusty air.\n*label kangaroos\n\nYour throat is thick and dry, making it hurt to swallow and filling your mouth with the taste of brick dust. Everyone is filthy, covered in dust with darker patches of sweat or blood. But everyone can stand, and it seems like the earthquake has done its worst. The ground is still…almost.\n\nAs you stand, taking stock of injuries in the broken room, there is movement above you. At first you think it's people scrambling down from above. Then your eyes sort out the unexpected shapes before you. Long legs, sharp ears, strong tails.\n\nKangaroos. You shout a warning and step back, pressing your body against the wall as terrified kangaroos pour through the ceiling onto the table and then jump around, unable to get back up and too panicked to be still.\n*choice\n\t#Shut the door. They need to be contained.\n\t\t*if shark_sense > 50\n\t\t\t*set temp 1\n\t\t\tYou're vaguely aware that kangaroo farmers in New Sydney have a similar system to the shark farm's feeding and breeding methods: keep the stock wild and unfenced but create a location that they return to willingly due to the easy and nutritious food source. Which means these kangaroos are no more domesticated than your sharks. Letting them into the populated halls of New Sydney would be a disaster.\n\n\t\t\tYou slide along the wall and pull the door closed, jumping out of the way before one of the kangaroos collides with you. It bounces away, and you call for the humans to get out while there's a gap. Your certainty convinces them, and everyone evacuates the room quickly, letting you close the door again with the kangaroos safely inside.\n\t\t\t*goto kangaroo_win\n\t\t*else\n\t\t\t*set temp 2\n\t\t\tYou charge for the door, running right into the extremely large bicep of one of the kangaroos. It's as hard as a rock.\n\n\t\t\tThe kangaroo turns and looks right at you. He does not look happy. In fact, he looks like he's about to punch you in the face. You back off fast, stumbling over rubble and falling on your backside. You scramble sideways and finally reach the door, kicking another chunk of concrete out of the way as you slam the door shut.\n\n\t\t\tAnd you've done it: the kangaroos are safely trapped inside the conference room, away from the large population. With you. Oops.\n\t\t\t*goto kangaroo_lose\n\t#Open the door. Get them out.\n\t\t*if appraisal > 50\n\t\t\tThe door is partially blocked with chunks of concrete and steel, but it won't be long before the kangaroos notice the small gap and make a break for it. Then they'll injure themselves trying to find a larger area—and likely injure the nearby humans at the same time.\n\n\t\t\tYou move slowly and smoothly, keeping an eye on the biggest of the kangaroos to see whether you're causing it to be even more frightened. The others are frozen in place. The kangaroo isn't getting any calmer, but it's not moving to attack you either. That's a good thing, because it's clearly a powerful male. Its arms alone are ridiculously muscled.\n\n\t\t\tBut you make your way to the door and slowly glide it open, pushing the largest obstacles out of the way with your feet and then standing behind the open door in order to make it as accessible as possible. One of the kangaroos bounces over and then out into the hall—and the others follow suit. \n\n\t\t\tYou're safe.\n\t\t\t*goto kangaroo_win\n\t\t*else\n\t\t\tYou have trouble seeing through the dust in the air, but it's immediately clear that the door is blocked by several pieces of concrete. The other people are holding preternaturally still, and the kangaroos are sniffing the air and looking around. They look just as confused as the humans feel. \n\n\t\t\tIf the kangaroos are still, you figure it must be best for you to move quickly. You dive for the door, stumbling over more steel and concrete and an overturned chair and then landing on your face at the feet of one of the kangaroos. It stares down at you with alarming intelligence, and you have absolutely no idea if it's going to punch you or ignore you.\n\n\t\t\tSomething grabs your hair and pulls, dragging you out of the kangaroo's way. It's Dad. You scramble to your feet and crouch beside him, glad you didn't get beaten up for your foolish choice.\n\t\t\t*goto kangaroo_lose\n\t#Climb under the broken table. If I can get past the roos, I'll be safe.\n\t\tThe broken tabletop makes two triangles with the carpet as the third side of each. Those triangles should be reasonably solid.\n\t\t\n\t\tMost of the other humans are safely underneath one side of the table or the other, but there are several rather muscular male kangaroos between you and safety. The roos look at you with the same wary regard you feel for them. \n\n\t\t*if athletics > 50\n\t\t\tYou feint right and then dive left, dodging jagged steel and large lumps of concrete to make your way to safety. One of the kangaroos decides you're a threat and takes a swing at you, but you dodge him handily and slide under the table to join the other humans. Once you're there, the other kangaroos lose interest in you. After a long beat, they head for the door and bounce away to scare the crap out of someone else.\n\t\t\t*goto kangaroo_win\n\t\t*else\n\t\t\tYou try to race past them, but their reflexes are faster than yours. One of the large male kangaroos shifts only slightly, and you're suddenly careering into him. Fortunately your momentum makes you slide off his chest before he grabs you for an impromptu wrestle, but then you're stuck even farther away from the relative safety of the table—and the other people. And you can already feel new bruises blossoming on your face and chest.\n\t\t\t*goto kangaroo_lose\n*label kangaroo_win\n*set reputation %+10\n\n\"Oh!\" says Yunus. \"Nicely done.\"\n*goto calm\n*label kangaroo_lose\n\n\"What did you do that for?\" Dad asks.\n\n\"It didn't work out the way I planned,\" you admit.\n*label calm\n\n\"Shh,\" says Dad. \"Listen.\"\n\nYou can hear screaming somewhere far away, but other than that it's quiet. The earthquake has stopped.\n\nYour breath huffs out in relief. \n\n\"New Sydney isn't structurally sound anymore,\" says Dad. \"We need to get out of here.\"\n\n\"Or…,\" says Yunus. \"I could show you around.\"\n\n\"We've seen the city,\" Dad says flatly, clearly thinking Yunus is in shock and babbling.\n\n\"Not my version of the city,\" says Yunus. \"You'll find my honesty very interesting.\" \n*if temp = 2\n\tHe draws the kangaroos away from the door, and you're all able to get out and close the door behind you. \n\t*goto roo_update\n*label roo_update\n*if temp > 0\n\tYou can hear banging and crashing from inside the conference room.\n\t*goto ch\n*else\n*label ch\n*choice\n\t#\"Take us to the surface, Yunus.\"\n\t\t*set curiosity %-10\n\t\t*set yunus %-10\n\t\t*set sunny %+10\n\t\t*goto surface_path\n\t#\"Lead on, Yunus.\"\n\t\t*set curiosity %+10\n\t\t*set yunus %+10\n\t\t*set sunny %-10\n\t\t*goto yunus_path\n\t#\"We've got to take care of the kangaroos.\"\n\t\t*set empathy %+10\n\t\t*goto kangaroo_path\n*label surface_path\nDad blinks, as if he's on the verge of tears. It's strange to see that he wouldn't have forced you to follow his plan, even though it is clearly the safest and most responsible path. He would have let you go your own way. \n\nIt's in this moment that you suddenly realize he truly sees you as an adult. \n*fake_choice\n\t#About time.\n\t\t*set curiosity %+10\n\t#He really respects me.\n\t\t*set sunny %+20\n\t#How absolutely terrifying.\n\t\t*set curiosity %-10\n\n\"Right,\" says Yunus, fixing his gaze on the wall behind you. You've hurt his feelings, but it can't be helped. \"This way.\"\n\nHe leads you in the exact opposite direction to the way you came. Dad freezes for a moment and then walks after him. Yunus isn't ignoring your request and doing what he wanted to do…is he?\n*fake_choice\n\t#It wouldn't be the first time Yunus has been dishonest.\n\t\t*set yunus %-10\n\t\tUnfortunately, you don't know the entire route to the surface—nor do you have the pass codes required at certain points. You have no choice but to follow Yunus and hope for the best.\n\n\t#Yunus promised to be honest from now on, and I trust him.\n\t\t*set yunus %+10\n\t\tMaybe he figures the elevators will be broken or something. There's bound to be a good reason. Yunus is a good man, and he won't steer you wrong.\n\n\t#\"Why are we going this way?\"\n\t\t*set yunus %-10\n\t\t\"Hmm?\" says Yunus. \"Oh, yes this way is different to the way you usually come. It's less impressive, but simpler and quicker.\"\n\n\t\t\"Good,\" you say, but there's a sadness in Yunus's face as he turns away. He knows you doubted him.\n\nFor some minutes, Yunus leads the group downhill, and then he turns sharply to the left. \"We're close to the surface here,\" he says.\n\n\"How is that possible?\" Dad asks. \"We haven't ascended.\"\n\n\"It's the side of a hill,\" Yunus says, smiling. \"We're almost out.\"\n\nHe's still speaking as he rounds a corner, and the smile drops from his face. A moment later, you all see the rockfall blocking the way ahead. \n*choice\n\t#\"Let's climb over it. I'll go first.\"\n\t\t*if (athletics > 60) and (legs > 1)\n\t\t\tYunus looks dubious but ultimately nods. You spend time discussing the best route with the others. There is a large and jagged piece of concrete forming the main slope, and that must logically be your main avenue of attack. If that's unstable, the whole rockfall will shift. You move forward and try to shift the slab with both hands. It doesn't budge. Well, that's a start.\n\n\t\t\t\"I'll check it's alright,\" you say. \n\n\t\t\tNo one disagrees, so you begin the awkward climb. The concrete's rough edges make it easy to keep your grip, but at the same time, there are exposed steel struts that could easily rip through your foot with one wrong step. You stay calm and rely on your eyesight to know whether each step is safe.\n\t\t\t\n\t\t\tWhen you reach the top of the rock pile, you can see a way to crawl through to the other side. You check your shoes to make sure you haven't been injured without noticing, then help the others up and over the concrete to safety.\n\n\t\t\tThank goodness you didn't wear your cosmetic legs today.\n\t\t\t*goto door\n\t\t*else\n\t\t\t\"I'm not sure you're the best person for that,\" says Yunus, startling a gasp of shock from one of your other companions. \n\n\t\t\tYou ignore him and head for the biggest piece of concrete, hoping it will prove to be an easy ramp to the top of the rockfall. The slab turns out to be quite stable, and the climb is easy until suddenly your right foot refuses to move. Looking down, you see that a steel strut has pierced your foot, effectively nailing you in place. And now you'll have to buy a new foot too.\n\n\t\t\tYunus scrambles up beside you and helps you to brace against him so you can pull your foot free. He doesn't say a word but flushes in embarrassment for your lack of coordination. \n\t\t\t*if legs = 1\n\t\t\t\tWearing your cosmetic legs today was a mistake.\n\t\t\t\t*set temp 5\n\t\t\t\t*goto fail_door\n\t\t\t*else\n\t\t\t\t*goto fail_door\n\t#\"Let's go another way. I'll assess safety as we go.\"\n\t\t*if appraisal > 60\n\t\t\t\"Okay,\" says Yunus, visibly trying to keep from panicking completely. \"Most of the surface tunnels are boarded up for safety, but who knows what condition they're in now. Maybe the earthquake has broken the barriers for us.\"\n\n\t\t\tIt's not exactly a heartening rallying cry, but it'll do. \"The barriers will be a weak point,\" you say confidently.\n\n\t\t\t\"How are you so sure?\" Dad asks.\n\n\t\t\t\"For exactly the same reason we always come to New Sydney instead of bringing them to us: they're scared of sunshine. On a deep, phobic level. No need to beef up security when no one wants to go outside.\"\n\n\t\t\tYunus's face brightens. \"You're right. Let's go.\"\n\n\t\t\tHe leads the way to a mass of planks and splinters that used to be a locked door, easily big enough for two buses to pass through. It's a simple matter to pick your way through the destruction to safety.\n\t\t\t*goto door\n\t\t*else\n\t\t\t\"Let's hope the elevators are working,\" Yunus mutters, leading your whole group back the way you came. You recognize the door of the hated conference room as you pass and wrinkle your nose at the stink of fresh kangaroo droppings.\n\n\t\t\tIt's amazing how the human mind can be terrified and bored at the same time. Your thighs hurt from walking too far, and you wish you could take your legs off and let them air out properly. There's no time for that.\n\n\t\t\tUnfortunately, when you reach the bank of elevators, it is immediately clear that you're stuck. One of them stands open, jammed just below your floor. The rest could be anywhere, since none of the buttons inspire any reaction whatsoever.\n\t\t\t*goto fail_door\n\t#\"We need help. If necessary, we can bargain for it.\"\n\t\t*if bargaining > 60\n\t\t\t\"Agreed,\" says Yunus. \"But…you should know that protocols don't allow for assisting nonlocals.\"\n\n\t\t\t\"I see,\" Dad says stiffly.\n\n\t\t\t\"We're traders,\" you say. \"We'll think of something.\"\n\n\t\t\tYunus leads you deeper into the city, finding the closest emergency compartment and pressing on the intercom until someone responds.\n\n\t\t\t\"We're from Kota Perahu,\" you say firmly. \"We can protect you outside—if you'll show us the way.\"\n\n\t\t\t\"Agreed,\" says a tinny voice, and then the panel opens to a cavernous room filled with tinned food, bottled water, and frightened Drylanders.\n\t\t\t*goto door\n\t\t*else\n\t\t\t\"I don't think anyone will help us,\" Yunus says reluctantly. \"The emergency protocols are…well, xenophobic.\"\n\n\t\t\t\"But won't people listen to you, the diplomat?\" Dad asks.\n\n\t\t\t\"I'm not a diplomat yet,\" says Yunus grimly. \"As far as New Syd is concerned, I'm a child. And a slightly peculiar child at that, who is currently under limited privileges due to a bit of innocent hacking.\"\n\n\t\t\t\"Because of me,\" you say.\n\n\t\t\t\"I'm afraid so.\"\n\t\t\t*goto fail_door\n*label door\n*set reputation %+10\n\nIt's not too long until you're so close to the outside that you can feel the all-over hug of the burning sun. \n*label general\nThere are several scattered groups of Drylanders here and there, looking dirty and frightened. The majority are staring at the ground, too frightened of the open sky to look up.\n*goto endy_bit\n*label fail_door\n\nYou keep walking, miserable and lost, until Yunus finally finds a working vehicle and loads you all aboard. Even after that, it's a long journey to the relative safety of the bus bay, and there are no buses available so you have to leave on foot. When you finally feel clean sunshine on your face, it feels like you're emerging from a tomb.\n*goto general\n*label yunus_path\nYunus grins in response. \n*if yunus_love = true\n\tYou stomach flips over, and before you know it, you've reached out and taken his hand. \n\t*goto beep\n*else\n*label beep\nDad's face goes strangely blank, and you know he's scared and trying hard not to show it.\n\nThe grin melts off Yunus's face as he taps on his wrist device, trying to pull up a map. \"Huh,\" he says. \"Well, that's not good. The central computer network is off.\"\n\n\"You're not kidding about the honesty,\" says Dad. Very calmly.\n\n\"This is my city,\" Yunus says. \"I don't need a map.\"\n*fake_choice\n\t#\"Uh…is there a backup system or something?\"\n\t\t*set curiosity %-10\n\t\t\"Yes,\" says Yunus. \"Me.\"\n\n\t#\"Let's go.\"\n\t\t*set empathy %+10\n\t\t\"Right,\" says Yunus. \"Er…this way.\"\n\n\t#\"Up is good.\"\n\t\t*set curiosity %-10\n\t\t\"Sometimes,\" says Yunus, clearly lost in his own internal calculations.\n\nHe sets off confidently, then backtracks with a sheepish smile and leads your small group in a different direction. The passageway is narrow, no wider than two people standing abreast, and lit by a naked string of LEDs rather than the usual recessed ambient light. The glare hurts your eyes, but when it occurs to you that the lights could flick off at any moment, the thought of darkness makes your heartbeat speed up and your breath shorten.\n\n\"$!{name}?\" Dad says. \"Are you alright?\"\n\n\"I was just thinking about the lights possibly going out.\"\n\nHe moans quietly.\n*fake_choice\n\t#\"Joking! I was thinking about kangaroos. Delicious kangaroos.\"\n\t#\"The lights won't go out.\"\n\t#\"I'm sure we're close to the surface now anyway.\"\n\n\"Very encouraging,\" he says dryly. \"I'm so much calmer now.\"\n\n\"Should I get you surface dwellers a glass of water or something?\" Yunus says.\n\n\"We're fine,\" Dad says. It's almost believable.\n\nYunus pauses and then taps a code into a recessed pad in an apparently empty wall. A door swings open, almost hitting you.\n\n\"Is this a secret passage?\" you ask.\n\n\"Absolutely,\" he says. \"But you should be careful to enjoy this part; the rest isn't as fun.\"\n\nMore LEDs. It's hard to keep from thinking that the hall goes on forever. You focus on Yunus. Then he stops and opens another hidden door. \"This is what I thought you should see.\"\n\nThe space beyond the door is brightly lit, and as you walk inside, you realize it's actual real sunlight. There's a whooshing sound from the air conditioning moving the still air. The only place New Sydney needs air conditioning is near the surface. But that's not what Yunus has brought you to see.\n\nEnormous real windows look out onto a vast, grassy plain that is lit by real—though filtered—sunshine. Several kangaroos nibble at the grass, looking peaceful despite the obvious hole in the ground not far away. Presumably that hole leads down to the conference room where several kangaroos are still trapped.\n\n\"We've seen kangaroos, Yunus,\" you say. \"Today, in fact.\"\n\n\"Look again,\" says Yunus. \"I can't say any more.\"\n*choice\n\t#I can figure o
