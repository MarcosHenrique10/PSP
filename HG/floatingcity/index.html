are largely open to the elements—and to you. You set the speeder to defensive maneuvers and let it sink under the water, tuned to your wrist com for retrieval. Then you step out of your safety bubble into Old Sydney. \n\t\t\t\t*if ally_ahmed = 6\n\t\t\t\t\tAhmed does the same thing with his speeder, and the pair of you enter the building together.\n\t\t\t\t\t*goto wq\n\t\t\t\t*else\n\t\t\t\t*label wq\n\n\t\t\t\tThe missing glass gives the building a derelict look from far away, but close up, it's obvious that the frames have been thoroughly cleared of sharp edges and the stairwell is regularly cleaned. But there's still a whole lot of building above you, and while climbing stairs is good cardiovascular exercise, it's awkward and potentially harmful for your flesh legs.\n\t\t\t\t*label elevator_choice\n\t\t\t\t*if ally_ahmed = 6\n\t\t\t\t\t\n\t\t\t\t\tYou glance at Ahmed, but he just nods back at you to lead the way. Why couldn't someone less humble have come with you?\n\t\t\t\t\t*goto bbb\n\t\t\t\t*else\n\t\t\t\t*label bbb\n\t\t\t\t*choice\n\t\t\t\t\t#Look for a working elevator.\n\t\t\t\t\t\tYou feel anxious being in a closed, windowless space, but the elevator takes you safely to the forty-first floor before grinding to a halt.\n\t\t\t\t\t\t*goto forty_one\n\t\t\t\t\t#Take the stairs.\n\t\t\t\t\t\t*if athletics > 60\n\t\t\t\t\t\t\tThe exercise just pumps you up. \n\t\t\t\t\t\t\t*goto ath\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou start off feeling good but you soon realize how unfit you really are. \n\t\t\t\t\t\t*label ath\n\t\t\t\t\t\tAt the forty-first floor, the stairs are blocked off with large chunks of steel-laced concrete.\n\t\t\t\t\t\t*goto forty_one\n\t\t\t\t\t#Investigate until I find another option.\n\t\t\t\t\t\tYou find a dumbwaiter that was clearly not part of the original design, given that it's literally on a chain. It's not easy to haul yourself up multiple floors, but this has to be better than the stairs—or the metal box of the elevator. \n\t\t\t\t\t\t*if ally_ahmed = 6\n\t\t\t\t\t\t\tAhmed tries to take over hauling for you, but his upper body strength can't beat a lifetime of lifting your entire bodyweight up and down ladders.\n\t\t\t\t\t\t\t*goto yee\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t*label yee\n\n\t\t\t\t\t\tOnce you reach the forty-first floor, however, there's some kind of blockage in the shaft, and you can't go any farther.\n\t\t\t\t\t\t*label forty_one\n\n\t\t\t\t\t\tYou step out carefully into a large, carpeted foyer surrounded by closed doors.\n\n\t\t\t\t\t\t\"Hello?\" you call softly. \"Is anyone there?\"\n\n\t\t\t\t\t\tHalf a dozen people dressed in faded black step out of two doorways and line up across the foyer, pointing real guns at \n\t\t\t\t\t\t*if ally_ahmed = 6\n\t\t\t\t\t\t\tyou and Ahmed.\n\t\t\t\t\t\t\t*goto who\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tyou. \n\t\t\t\t\t\t*label who\n\t\t\t\t\t\tYou automatically raise your arms and try not to wet your pants.\n\n\t\t\t\t\t\t\"Who are you?\" barks a redheaded man who has a second gun in a holster under his arm. \"What are you doing here without a pass?\"\n\n\t\t\t\t\t\t\"I'm ${name},\" you squeak, \"from Kota Perahu. I didn't know this was a bad place to be. Please don't shoot.\"\n\t\t\t\t\t\t*if ally_ahmed = 6\n\n\t\t\t\t\t\t\t\"Ahmed, also from Kota,\" says Ahmed in an impressively steady tone.\n\t\t\t\t\t\t\t*goto whyy\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t*label whyy\n\n\t\t\t\t\t\t\"Why are you here?\"\n\n\t\t\t\t\t\t\"I have information,\" you say. \"There's ${threat}. Hitting Old Sydney. Today.\"\n\n\t\t\t\t\t\t\"Don't come here and try to cause trouble,\" he snarls at you.\n\n\t\t\t\t\t\t\"I'm not the one threatening you! I'm trying to warn you.\"\n\n\t\t\t\t\t\t\"What do you get out of this?\" he says. \"Are you trying to rob us? Where are the rest of you?\"\n\n\t\t\t\t\t\tYou can feel your grip on the conversation slipping. This is the moment when everything hangs in the balance.\n\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t#\"You have computers. Look me up. I'm no liar.\"\n\t\t\t\t\t\t\t\tHe glances at his compatriots, keeping his gun trained on you as they pull out a mishmash of physical and virtual devices and hold them up to scan your face. You try not to show your nerves as you wonder exactly what they'll find out about you. Can their junk tek even connect to the wider internet? Will they find some long-forgotten school essay of yours about how Old Sydney exemplifies the most stubborn irrationality of those who refused to take climate change seriously?\n\n\t\t\t\t\t\t\t\tThe woman next to the redheaded man shows him something on her wrist com.\n\n\t\t\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t\t\t*label winner_man\n\t\t\t\t\t\t\t\t\t\"Huh,\" he says at last, looking at you with newfound respect. \"$!{threat}, you say?\"\n\n\t\t\t\t\t\t\t\t\t\"Yes,\" you answer, with desperate calm.\n\n\t\t\t\t\t\t\t\t\t\"What do we do?\" he says.\n\n\t\t\t\t\t\t\t\t\t\"Evacuate.\" You try not to collapse into a puddle of sheer relief. \"The whole building—the whole city. But just for today.\"\n\n\t\t\t\t\t\t\t\t\tHis eyes widen. \"I have allies across Old Sydney. When will the attack take place?\"\n\n\t\t\t\t\t\t\t\t\t*if foreknowledge > 60\n\t\t\t\t\t\t\t\t\t\t\"11:00 a.m. You're welcome to use my speeder.\"\n\t\t\t\t\t\t\t\t\t\t*goto wave_good\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\t\"Any moment now. You're welcome to use my speeder.\"\n\t\t\t\t\t\t\t\t\t\t*goto wave_good\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*label loser_man\n\t\t\t\t\t\t\t\t\tThe person on his left is the first to laugh at what she sees, and the others soon follow suit.\n\n\t\t\t\t\t\t\t\t\t\"You really had me going for a minute there,\" the redheaded man says. \"Now get out of my city before I stop laughing.\"\n\n\t\t\t\t\t\t\t\t\tSixty seconds later, you're in an elevator heading back to water level.\n\n\t\t\t\t\t\t\t\t\tThis is bad. One of the biggest populations left in Old Sydney resides in the Chifley Tower, and you just blew your chance at getting them to evacuate. \n\t\t\t\t\t\t\t\t\t*goto wave_bad\n\t\t\t\t\t\t\t#\"My name is ${name}, from Kota Perahu's shark farm. There must be someone, somewhere who can vouch for me.\"\n\t\t\t\t\t\t\t\tHe glances at his compatriots, keeping his gun trained on you as they pull out a mishmash of physical and virtual devices to contact people all over the city and region. You try not to show your nerves as you wonder exactly what they'll find out about you.\n\t\t\t\t\t\t\t\t\n\t\t\t\t\t\t\t\tIt's fortunate you didn't lie about your name or family or they'd already know to ignore you. But who do they know who might have connections with you? They live in a different world to you, despite also being surrounded by water. Kota Perahu is the city that science built, and their world is the ruin caused by stubborn ignorance. Food poisoning and premature death are as common here as storms, and the worst part is that the people here have chosen this life on purpose. Somehow, living in Old Sydney has become their identity, and they're rather die than move. The more people that beg them to see sense, the more they dig in their heels. And the redheaded man holding a gun on you is surely just as irrational as the rest.\n\n\t\t\t\t\t\t\t\tThe woman next to him shows him something on her wrist com.\n\n\t\t\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t\t\t*goto winner_man\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*goto loser_man\n\t\t\t\t\t\t\t#Bribe them.\n\t\t\t\t\t\t\t\t\"Look at me,\" you say. \"You can see I'm no billionaire. But I'll give you all I have if you'll just listen.\"\n\n\t\t\t\t\t\t\t\tThe redheaded man looks at you with interest for the first time. \"How much?\"\n\n\t\t\t\t\t\t\t\t\"What account shall I transfer it to?\" you ask.\n\n\t\t\t\t\t\t\t\t\"Yohan2380,\" he says.\n\n\t\t\t\t\t\t\t\t\"Alright.\" You try not to wince too hard as you give the man your entire bank balance.\n\n\t\t\t\t\t\t\t\tHe looks at his wrist and double taps it to check his newly enhanced finances. You hope the exchange rate works in your favor.\n\n\t\t\t\t\t\t\t\t*if ((value_dollar > 1) and (net_worth > 800)) or (net_worth > 1000)\n\t\t\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\t\t\t*goto winner_man\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\t\t\tHe tilts his wrist com to show it to the others. \n\t\t\t\t\t\t\t\t\t*goto loser_man\n\t\t\t#Research the Chifley Tower as the speeder draws closer.\n\t\t\t\t*gosub research\n\t\t\t\t*if ally_ahmed = 6\n\t\t\t\t\tYou ping Ahmed, but he just sends a message back that he'll follow you.\n\t\t\t\t\t*goto lower\n\t\t\t\t*else\n\t\t\t\t*label lower\n\t\t\t\t*choice\n\t\t\t\t\t#Stay low.\n\t\t\t\t\t\t*goto aa\n\t\t\t\t\t#Go high.\n\t\t\t\t\t\t*goto heights\n\t\t\t\t\t#Aim for floor forty-one. Perhaps the leaders of the lower group are located there.\n\t\t\t\t\t\tThe elevators all seem to be working, so it's an easy matter to get up to the forty-first floor.\n\n\t\t\t\t\t\t*goto forty_one\n\t#Tell them the truth.\n\t\t*set threat \"an earthquake and tsunami\"\n\t\t*goto better_coding\n\t#Tell them there's a poisonous gas cloud coming this way that they need to avoid.\n\t\t*set threat \"a poisonous gas cloud\"\n\t\t*goto better_coding\n*label research\nYou check your wrist com's news section as you come in for a closer look at the Chifley Tower. The building is quite impressive up close, even with fifty meters of it underwater. You have to block off thoughts of your own relative insignificance, as this building alone feels like far too much for you to take on—let alone the rest of the city.\n\nAt first, your wrist com focuses on statistics: how many floors, what businesses used to be based there, and how many levels are now suspected to be occupied. Then you delve into a lengthy and somewhat overwritten investigative report on two warring factions within the tower: the upper and lower, divided not by the obvious sections of the tower but by a single empty floor: number forty-two. You try to figure out which floor is number forty-two, but it's unclear whether the narrower section on the roof counts as three, four, or seven floors—and of course the base of the tower is lost in the murky water.\n*return\n*label wave_good\n\nIt only takes a couple of minutes for you and the redheaded Byron to get going. By that time, there are dozens of vehicles heading west. You can clearly see that people are making sure to overfill every vessel, so that's something useful.\n\nA helicopter lifts off from one of the upper balconies, and Byron rolls his eyes. \"I should have just let the upper stories die. That's what they would have done to us.\"\n\nYou spend the next two hours going from building to building, meeting a wild assortment of autonomous groups and watching Byron quickly and cleverly convince each one that they need to evacuate. Between buildings, he makes calls—some with video, some without. This hardened group of determined survivalists isn't as isolationist as you thought.\n\n\"There are more,\" he says at last. \"We haven't traded with them since the—well, never mind. They're not Central Sydney, anyway. Maybe they'll be safe. Or maybe a call will be enough.\"\n\nUntil this moment, Byron had been so sure of himself and utterly convincing. Now he keeps glancing around nervously at the rest of the city, and so do you.\n*choice\n\t#\"There's not enough time to go in person. Let's call them on our way out of here.\"\n\t\t\"Righto,\" he says with a sheepish smile. He starts making calls as you set a course out of Old Sydney.\n\t\t*goto wave_good_good\n\t#\"We need to get all of Sydney evacuated or people could die. Let's go in person.\"\n\t\t\"Alrighty,\" he says, newly galvanized. He directs you to the next building, and the next, and the next. The conversations last longer, but they work. The city is emptier than it's ever been.\n\t\t*if foreknowledge > 60\n\t\t\t\n\t\t\tAt last, you've hit every populated building that Byron knows about. You set a course out of Old Sydney, following the serpentine line of the harbor as it winds deeper inland.\n\t\t\t*goto wave_good_good\n\t\t*elseif foreknowledge > 50\n\t\t\t\"Two more,\" says Byron, \"then I'd sure like to get out of here.\"\n\n\t\t\tYou agree, with feeling.\n\t\t\t*goto wave_medium\n\t\t*else\n\t\t\t\"How many more?\" you ask Byron, feeling a horrible sense that you'll never get out of the city.\n\n\t\t\t\"A few,\" he says. \"We'll do the ones closer to the harbor first.\"\n\n\t\t\tYou steer back toward the city.\n\t\t\t*goto wave_bad\n\t#\"Call them—and let's check for stragglers closer to the harbor.\"\n\t\t\"Deal,\" he says and starts making the calls as you do one last circle around the harbor. There's a broken-down ship with five people trying to bail it out while still rowing away from danger. You load them all aboard and head for safety at top speed. \n\t\t*if foreknowledge > 60\n\t\t\t*goto wave_good_good\n\t\t*elseif foreknowledge > 50\n\t\t\t*goto wave_medium\n\t\t*else\n\t\t\t*goto wave_bad\n*label wave_good_good\n\nYour eyes are on the mountains looming ahead when Byron gasps. He's twisted around in his seat, looking back toward the harbor. \n\n*gosub gasp\n\nAnd then you're alive, and unbroken, and the tsunami has passed.\n\nYou touch your face, your arms, your legs. It hurts, but nothing is broken and none of your bleeding is serious. You head out of the danger zone before the next two tsunamis hit, knowing that they usually come in threes.\n\nIt's alright. You're alright. Old Sydney is alright. Byron is alright. \n*if ally_ahmed = 6\n\tAhmed is alright. It's over.\n\t*goto yeah\n*else\n*label yeah\n\nTwo hours later, you're sitting on your bed as if nothing happened. It all feels like a dream. You thought saving so many lives would make you feel good, but all you can think about is how many people must have been left behind. It feels like you should cry, but you can't. Your hands won't stop shaking.\n\n\"I did my best,\" you whisper to yourself, holding onto rationality with difficulty. \"That's all I was able to do.\"\n\n*page_break\n*goto_scene chapter_thirteen\n*label gasp\n\nOf course you look—just in time to see the Sydney Tower keel over and belly flop into the water.\n*fake_choice\n\t#\"Earthquake!\"\n\t#\"Tell me when the tsunami comes.\"\n\t#Just speed up.\nByron turns to you in horror. His mouth is open with—presumably—many urgent questions. Then he snaps his mouth shut and tightens his harness instead. The speeder is already on maximum, but you push on the lever all the same, then wipe your sweaty hand on your shirt and try again. \n\nIt takes all the self-control you have not to turn around. Your job is to not crash the speeder into any of the semisubmerged houses lining your narrow path. Byron is watching the chaos behind you, whimpering slightly.\n\nThen he stiffens and yells out in shock. \"What is that!\"\n\nYou turn and see a wall of dark brown pouring across Old Sydney, like dirty water washing over sandcastles. It looks so solid that it takes you a full second to realize this is the tsunami. It's here. You have seconds to act.\n*fake_choice\n\t#Dive and set the anchor to keep as stable as possible.\n\t\t\"Hold on!\" you yell, diving deep and releasing the anchor at the same time.\n\n\t#Try to shelter behind something.\n\t\tYou jerk the steering mechanism, heading behind a two-story townhouse that looks solid despite the first floor and a half being underwater.\n\n\t#Speed as far away as possible.\n\t\t\"Come on, come on, come on,\" you growl at the speeder, feeling like the wave will crash down on you any second.\n\nThen the wave hits, and you're thrown against your harness. It cuts into your shoulders and groin, and you strain your neck as your head is thrown forward. You yell in pain and fear as the speeder jerks back and forth, shaking you like a wet rag until you wish it would stop so you could cry.\n*return\n*label wave_medium\nYou're standing upright on your seat, assisting Byron as he speaks to a building representative who is not interested in letting either of you inside—when Byron looks out at the harbor and gasps in horror.\n\nOnly two blocks away, you see the Sydney Tower keel over and belly flop into the water.\n*fake_choice\n\t#\"Earthquake!\"\n\t#\"There's going to be a tsunami!\"\n\t#Just flee.\nYou slam the lid of the speeder, clutching at your hair in frustration as the hatch takes a million years to seal. The man you were speaking to has already vanished, hopefully doing something useful in the short time he has. This was not where you wanted to be when the big one hit.\n\nYou turn and see a wall of dark brown pouring across Old Sydney, like dirty water washing over sandcastles. It looks so solid that it takes you a full second to realize this is the tsunami. It's here. You have moments to act.\n*fake_choice\n\t#Go deep and set the anchor to keep the speeder as stable as possible.\n\t\tYou dive deep, releasing the anchor at the same time.\n\n\t#Try to shelter behind something.\n\t\tYou jerk the steering mechanism and head behind the apartment block, hoping it's as solid as it looks despite half the building being underwater.\n\t\t\n\t#Speed as far away as possible.\n\t\t\"Come on, come on, come on,\" you growl at the speeder, feeling like the wave will crash down on you any second.\n\nThen the wave hits, and you're thrown against your harness. It cuts into your shoulders and groin, and you strain your neck as your head is thrown forward. You yell in pain and fear as the speeder jerks back and forth, shaking you like a wet rag until you wish it would stop so you could cry.\n\nIt does stop, at last, but you can't cry. You're breathing too hard and trying to process what has happened.\n*if ally_ahmed = 6\n\n\tThere's no message from Ahmed. Is he okay?\n\n\t*goto rise\n*else\n*label rise\nByron!\n\n\"Are you okay?\" you say to Byron.\n\nHe doesn't reply. Blood trickles from his nose, and for an awful instant, you think he's dead. You take his pulse, and it's steady, indicating that he's only unconscious. \"Hospital,\" you say, wincing at the shrill note of panic in your voice. \"We need a hospital. Does Old Sydney even have a hospital?\"\n\nIt takes you three tries to get your wrist com to understand you.\n\nAt last, it throws up a map with a glowing line leading you to the closest medical center. There are probably others in need of help, so you open the speeder roof in order to rescue them on your way. Several people flag you down, asking for help, and you soon fill the speeder with wounded people and have to promise the rest that you'll return as soon as you can.\n\nMost of the buildings are still standing, although the water is almost black and much deeper than before. The medical center is overwhelmed, so temporary centers are already springing up in the nearby buildings. Byron and two others are sufficiently wounded to get in, and you take the rest elsewhere before returning to the city to shuttle more people away from unstable locations before the second and third waves of the tsunami hit.\n\nTwenty hours later, you teach a stranger to use the speeder and fall asleep on a pile of damp blankets. The earthquake is over, but the recovery has just begun.\n\nThe next time you're awake, you find yourself in your room at home as if nothing has happened. Someone sent your speeder home, and someone else removed your prosthetics while you slept.\n\nIt's over. You're covered in bruises and your mouth is dry. \n*if ally_ahmed = 6\n\tThere is a message on your wrist com from Ahmed asking if you're alright. He survived. \n\t*goto tiny\n*else\n*label tiny\nYou survived. Others didn't.\n\n*page_break\n*goto_scene chapter_thirteen\n*label wave_bad\n*set oldsyd_saved 0\nYou're trying to gain access to another building when the person you're speaking to gasps and grabs the wall next to him. At the same moment, there are screams from the upper floors.\n\nOnly two blocks away, you see the Sydney Tower keel over and belly flop into the water.\n*fake_choice\n\t#\"Earthquake!\"\n\t#\"There's going to be a tsunami!\"\n\t#Flee immediately.\nYou slam the lid of the speeder, clutching at your hair in frustration as the hatch takes a million years to seal. The man you were speaking to has already vanished, hopefully doing something useful in the short time he has. This was not where you wanted to be when the big one hit!\n\nYou turn and see a wall of dark brown pouring across Old Sydney, like dirty water washing over sandcastles. It looks so solid that it takes you a full second to realize this is the tsunami. It's here. You have moments to act.\n*fake_choice\n\t#Go deep and set the anchor to keep the speeder as stable as possible.\n\t\tYou dive deep, releasing the anchor at the same time.\n\n\t#Try to shelter behind something.\n\t\tYou jerk the steering mechanism and head behind the apartment block, hoping it's as solid as it looks despite half the building being underwater.\n\n\t#Speed away as fast as possible.\n\t\t\"Come on, come on, come on,\" you growl at the speeder, feeling like the wave will crash down on you at any moment.\n\nThen the wave hits, and you're thrown against your harness. It cuts into your shoulders and groin, and you strain your neck as your head is thrown forward. You yell in pain and fear as the speeder jerks back and forth, shaking you like a wet rag until you wish it would stop so you could cry.\n\nYour vision sparkles and then goes black, and you can feel yourself go limp in the instant before you lose consciousness.\n\n*page_break\n\n\"$!{name}?\"\n\n\"Mmm…urg,\" you say, trying and failing to open your eyes.\n\n\"It's okay, ${name},\" says Mom's voice. \"I'm here. You're in hospital.\"\n\n\"Mom?\" Your eyes finally open, and you see her sitting in a cheap plastic chair beside you. Dad is here, too, and you're impossibly relieved to see the curve of Glass behind them. Tears leak from your eyes, and you don't know if it's because of the bright light or because of your relief to be home again. \"What happened?\"\n\n\"You were still in Old Sydney when the earthquake and tsunami hit,\" she says gently. \"The speeder…the speeder kept you alive.\"\n\n\"Old Sydney?\" you whisper. \"All the others…the \n*if ally_ahmed = 6\n\tpeople? Ahmed?\n\t*goto exchange\n*else\n\tpeople?\"\n*label exchange\n\nShe exchanges a look with Dad, whose eyes are bright with unshed tears. \"You did your best. That's all anyone can do.\"\n\nYou forget your embarrassment and cry in earnest, knowing that you failed—and that hundreds or thousands of people are dead as a result.\n*set hospital 4\n*page_break\n*goto_scene chapter_thirteen\n", "chapter_twelve_e": "*comment staying in Kota\nThe group disperses into its component parts. Suddenly, you're alone, and the last few hectic hours feel like a dream. A dream that left several dirty coffee cups around your living room.\n\nYou stare at the cups. How can you wash dishes when there's an earthquake coming that could kill tens of thousands of people?\n\nThere's a brief moment when you brighten, thinking you might be able to skip dishes for the foreseeable future. Then reality intrudes, and you take the coffee cups to the kitchen and get to work. The kitchen faces the dining room, which in turn faces the sea toward the shark farm. It's no accident.\n\nYou let your hands keep on washing, rinsing, and drying while you look out at the sea. It's as much a part of your home as the sink in front of you. Arkville and the Sydneys, with a few notable exceptions, are full of horrible people who hate Kota and would let it sink if they had the chance.\n*fake_choice\n\t#They don't deserve my help.\n\t\t*set evil 2\n\t\t*set empathy %-20\n\t#If they fall, Kota rises.\n\t\t*set evil 1\n\t\t*set empathy %-20\n\t#I'm sure they'll be fine.\n\nYou reach for another coffee cup, but they're all clean. Your stomach twists, but you're not hungry. It feels wrong to be standing in your kitchen and looking out at a calm sea when there is chaos and destruction hidden deep under the waves, ready to destroy lives, homes, and cities. The worst part is the waiting. How is it possible to be bored and terrified at the same time? Kassie thought Kota Perahu would be safe, completely ignoring the possibility of panicked sharks and dolphins wreaking havoc.\n\nIt's too early to start putting rescue plans into motion, but it's too late to do much else. You head downstairs to your room and do a thorough check and clean of all your prosthetics, even hammering out dents and oiling joints. It's soothing to step back into the routine, and your heartbeat settles down into a more normal rhythm. \n\nNow that you're calmer, it's easier to think normally. All your allies will be elsewhere when the earthquake hits, so keeping Kota safe is up to you. Where do you start? You feel saturated with urgent tasks, all of which are impossible. After some deep breathing, you consider how best to spend your time until Kassie sounds the alarm to charge into action.\n*choice\n\t#Rest while I can.\n\t\t*set athletics %+10\n\t\tYou have a shower and feel a little better. Everything is more manageable when you're not covered in your own sticky dried sweat. Then you get into bed and close your eyes, keeping your legs out of the covers so they can air out thoroughly. You can't do much if your legs are too moist, too dry, or have even the slightest scratch.\n\n\t\tNope, no good. Sleep is not happening. Telling yourself to hurry up and fall asleep isn't helping either. The uneven lengths of your legs are making you feel lopsided and off-balance, which is ridiculous. You lie on your back and swear quietly. The light is wrong; the temperature feels off; your legs are itching.\n\n\t\tUgh. Trying to sleep is a thousand times more stressful than just giving up, and turning the Glass to its darkest setting isn't enough. \n\n\t\tYou try to trick your body into relaxing by reading a book, but it's no use.\n\t\t*goto test\n\t#Research.\n\t\t*set foreknowledge %+10\n\t\tIt turns out that studying is no easier with a tsunami hanging over your head. You desperately want to understand and absorb what you're reading, but your mind keeps dancing off into worst-case scenarios that are far more gripping than even the most thrilling import-export lists. \n\n\t\tYou study current people of influence all around Kota, trying hard to memorize their faces just in case you cross paths—or decide to seek them out. The more you learn, the more you feel that the task lying ahead of you is literally impossible. Your own life may soon be on the line, but it's not enough to inspire you to focus. \n\n\t\tWhen all else fails, use pretty colors. You design several overlapping maps of information, highlighting anything that might be useful in the most glaring shades available. Soon, you have a lot written down. You just hope it's enough.\n\t\t*goto test\n\t#Help Kassie.\n\t\t*set foreknowledge %+10\n\t\tYou ping Kassie, and your wrist com automatically tells you her location: the shark farm. It also tells you her depth: several tiers underwater. Trust Kassie to use every second for extra research.\n\n\t\tYou secure your tail around your waist in its narrowest form—a thick belt—and get going. It's difficult to get to your diving suit because every staff member seems to have heard rumors of coming trouble, and they all want to hear what you have to say about it. You repeat the same reassurances over and over, then finally get your deep-water gear on, your leg prosthetics off, and your tail fully extended. \n\n\t\tFor the next three hours, you and Kassie work together to take a complicated series of behavioral measurements, testing the baseline she established long ago. \n\t\t*if facts = 1\n\t\t\tYou don't see the shark that has mind implants, but Kassie assures you it's fine and still behaving normally.\n\t\t\t*goto test\n\t\t*else\n*label test\n\nAt last, the day passes. You eat a completely normal dinner with your parents, who are annoyingly calm. A part of you wonders if they're thinking about the fact that the Glass dollar is sure to go up if the nearby cities are badly damaged. You feel guilty even thinking that. Then it's evening, and you really manage to go to sleep. \n\nYou dream of sharks. Sharks attacking, sharks swimming, sharks exploding as if they've eaten grenades. Sharks fighting with giant squids, sharks fighting with one another, sharks with dozens of prosthetic legs, sharks calmly discussing sociopolitical currents in the region.\n\nThen you wake up. \n*if facts > 0\n\t*set foreknowledge %+10\n\t*goto test_f\n*else\n*label test_f\n*if foreknowledge > 60\n\tIt's 3:00 a.m.\n\t*goto knock\n*elseif foreknowledge > 50\n\tIt's 5:00 a.m.\n\t*goto knock\n*else\n\tIt's morning.\n*label knock\n\nYour wrist com is flashing \"urgent,\" your lower hatch is pulsing red, and Mom is yelling at you down the stairs.\n*fake_choice\n\t#Answer the ping.\n\t#Open the lower hatch.\n\t#Call, \"Coming, Mom!\"\n\nIn a few minutes, Mom knows you're awake, Kassie is inside, and you've switched off the urgent pings that both of them had sent you.\n\n\"It's time,\" signs Kassie.\n\nYou stare at her, forcing down the panicked urge to argue. \"How long until the earthquake hits?\"\n\n\"Not long enough,\" she signs. \n*if k_experimentation = 0\n\t\"I should have kept going with my experimentation.\"\n\t*goto part_ways\n*elseif k_experimentation = 1\n\t\"I should have done more with my experimentation.\"\n\t*goto part_ways\n*else\n\t\"Thank goodness for all my experimentation.\"\n*label part_ways\n\nYou can't help but agree. \n\n\"Good luck,\" she says and \n*if kassie_love = 0\n\thugs you quickly before heading off.\n\t*goto travel\n*else\n\tkisses you quickly before heading off.\n*label travel\n\nYou grab your backpack and check and powder your flesh legs with care before putting on your all-purpose prosthetics. As you open the hatch, you realize you haven't put anything inside the compartments of the legs. There are a few small items in your room that might be handy, especially some from the emergency kit.\n*fake_choice\n\t#Pack extremely basic first-aid supplies.\n\t\t*set temp_two 1\n\t\tYou divvy up the tiny kit so roughly half of it fits into each prosthetic. Under the circumstances, you prioritize wound care and treatments for shock.\n\t#Take the miniature flare gun.\n\t\t*set temp_two 2\n\t\tEven the latest, smallest flare gun is not easy to jam into place, but you remove the flares and put them in the other compartment.\n\t#Bring a two-way long-distance radio that might work if other networks fail.\n\t\t*set temp_two 3\n\t\tThe radio doesn't quite fit, but when you remove the battery—which is fully charged—and put that in the opposite leg, it all works. \nYou're slightly off-balance, but you can manage. Just in case, you also strap on the upper half of your tail in its belt position, dropping the lower half into the vessel to take with you.\n\nWith that, you jump into your parents' fastest and largest speeder.\n\n*if foreknowledge > 60\n\tIt's not even 4:00 a.m., and Kassie said the earthquake will hit around 11:00 a.m. You have seven and a bit hours. \n\t*goto section_two\n*elseif foreknowledge > 50\n\tIt's not even 6:00 a.m., and Kassie said the earthquake will hit before lunch. That's way too soon. \n\t*goto section_two\n*else\n\tThe sun is already burning off the few clouds that formed overnight. \n*label section_two\nYou wish you'd spent longer figuring out a solid plan.\n\nOne thing you know for certain is that underwater creatures will be in a total panic before and during the earthquake.\n*choice\n\t#Make sure the sharks are fed before the quake hits.\n\t\t*gosub shark_farm\n\n\t\tYou sort through the available food and throw out several cardboard boxes. The sharks would definitely eat them, and you know from experience that their digestion can take it—but it seems unwise to push it today.\n\t\t*choice\n\t\t\t#Feed the sharks at once.\n\t\t\t\t*label feed_sharks\n\t\t\t\tThey certainly have an appetite, despite the early hour. Sharks are gluttons at heart, which is why Mom always insists on feeding them at the exact same time each day. Otherwise their feeding time would get earlier and earlier. Hopefully this one exception won't ruin the years of perfect scheduling.\n\n\t\t\t\t*goto pre_test\n\t\t\t#Tell Kadek everything.\n\t\t\t\tYou call for Kadek before she's too far away to hear, and you can see her annoyance before she recognizes you and visibly remembers you're the bosses' kid. She hurries down, and you explain Kassie's mind implants and the connection she's found between shark behavior and earthquakes.\n\n\t\t\t\t*goto pre_test\n\t\t\t#Check the sharks' behavior before feeding them.\n\t\t\t\tYou sit by the water and watch the sharks for a solid half hour. They're a tiny bit agitated. Whatever it is that animals can sense when an earthquake is coming—they're sensing it. Better give them some food ASAP. That always calms them down, and it might stop them chewing things they shouldn't later on.\n\n\t\t\t\t*goto feed_sharks\n\t#Go to the shark farm and make sure it's \"closed for cleaning\" so no one sees the chaos.\n\t\t*gosub shark_farm\n\n\t\tThanks to the vegetarians' bomb, you know exactly where to find all the signage and what the codes are for the staff—both the genuine codes for a cleaning issue and the codes for cleaning as a means to hide a large disaster.\n\t\t*choice\n\t\t\t#Speak to groups one by one.\n\t\t\t\tThere's a school group, so you start there. One of the girls is edging closer and closer to the water, so you're interrupted halfway through your explanation of cleaning procedures by the teacher, who races toward the runaway child before she can jump in.\n\n\t\t\t\t*label pre_test\n\t\t\t\tBefore you can finish your spiel, Kadek grabs your arm and spins you around so fast you feel in danger of hitting the water yourself.\n\n\t\t\t\t\"What do you think you're doing?\" she says, aghast.\n\n\t\t\t\t\"This is an emergency. I'm keeping the farm safe.\"\n\n\t\t\t\t\"Or are you sabotaging the farm?\" she says, her eyes narrowing. \"Or sabotaging my career, which is worse.\"\n\n\t\t\t\t\"None of the above,\" you say with heroic patience. \"This is a genuine emergency, and you need to let me protect this farm.\"\n\n\t\t\t\t\"Why should I believe you?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Surely you know I'm not inclined to exaggerate.\"\n\t\t\t\t\t\tShe scowls at you and then turns away to think about what she knows of you. You can feel your pulse speeding up as you wonder whether your reputation is as stellar as you hope it is.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*goto pass_test\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto fail_test\n\t\t\t\t\t#\"Call anyone you like; they'll vouch for me.\"\n\t\t\t\t\t\tShe turns away and pings someone on her wrist com, talking quietly to the person who answers. You can't help wondering who it is and what they're saying about you.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*goto pass_test\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto fail_test\n\t\t\t\t\t#Bribe her.\n\t\t\t\t\t\tShe scowls at you and turns to her wrist computer. You hold your breath, hoping your cash is enough. \n\t\t\t\t\t\t*if net_worth > 1000\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tThank goodness for a decent amount of personal savings. Hopefully Mom and Dad will reimburse you later.\n\t\t\t\t\t\t\t*goto pass_test\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tYour personal savings aren't up to scratch, so you just gave up everything you had for nothing.\n\t\t\t\t\t\t\t*goto fail_test\n\t\t\t#Go to the restaurant first.\n\t\t\t\t*goto pre_test\n\t\t\t#Speak to Kadek first.\n\t\t\t\t*goto pre_test\n\t#Go to the dolphin farm and help Musa.\n\t\tThe mere act of taking a speeder to the dolphin farm makes you feel deliciously guilty. \n\t\t*if (ally_mom_dad = 1) and (ally_ahmed = 1)\n\t\t\tApparently one emergency meeting wasn't enough to convince you that Mom and Dad are best buddies with Ahmed and Musa.\n\t\t\t*goto blah\n\t\t*else\n\t\t*label blah\n\n\t\tWalking into the dolphin farm shocks you with a sense of déjà vu. Apart from having milking stations rather than a culling tank, it's very like the shark farm: a ring of spheres glinting in the sun around a diamond-studded expanse of water. The dolphin farm even has an eatery on a higher level, although it's a dessert bar rather than a restaurant. A faint whiff of chocolate topping flavors the air, below the smell of salt.\n\t\t*choice\n\t\t\t#Find Musa.\n\t\t\t\tUnlike Dad's office, Musa's is at sea level, along with several others. There are vast refrigerated storage spheres behind the string of offices, but you ignore them and go straight to Musa. \n\t\t\t\t*label pre_test_m\n\n\t\t\t\t\"You need to get the public out of here,\" you tell him bluntly. \"The earthquake won't destroy Kota, but it will greatly disturb your stock.\"\n\n\t\t\t\tHe shakes his head at you, unimpressed. \"Why should I believe you?\"\n\t\t\t\t*choice\n\t\t\t\t\t#\"Surely you know I'm not inclined to exaggerate.\"\n\t\t\t\t\t\tHe scowls, then turns away to think about what he knows of you. You can feel your pulse speeding up as you wonder whether your reputation is as stellar as you hope it is.\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\t*goto pass_test_m\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto fail_test_m\n\t\t\t\t\t#\"Call anyone you like; they'll vouch for me.\"\n\t\t\t\t\t\tHe turns away and pings someone on his wrist com, talking quietly to the person who answers. You can't help wondering who it is and what they're saying about you.\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\t*goto pass_test_m\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*goto fail_test_m\n\t\t\t\t\t#Bribe him.\n\t\t\t\t\t\tHe scowls at you and turns to his wrist computer. \n\t\t\t\t\t\t*if net_worth > 1000\n\t\t\t\t\t\t\tThank goodness for a decent amount of personal savings. Hopefully Mom and Dad will reimburse you.\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\t*goto pass_test_m\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t*set net_worth 0\n\t\t\t\t\t\t\tYour personal savings aren't up to scratch, so you just gave up everything you had for nothing.\n\t\t\t\t\t\t\t*goto fail_test_m\n\t\t\t#Find the tour operator and advise them to close the farm to visitors.\n\t\t\t\tYou find a stressed-looking man attempting to keep a group of rowdy high schoolers enthralled. Dairy isn't a great topic for the task, and he hands the class over to the teachers, looking drained. You take him aside.\n\t\t\t\t*goto pre_test_m\n\t\t\t#Find the person in charge of feeding and advise them to feed the stock ASAP.\n\t\t\t\tIt's easy to spot anyone who works with food: it's messy, and their appearance and uniform will shout who they are no matter where they may be. Within moments, you spot a bald man in thick overalls, and you take him aside.\n\t\t\t\t*goto pre_test_m\n*label shark_farm\n*set value_farm %+10\nThe shark farm is as familiar as your own home. The two spheres of Dad's office and the restaurant look like they're floating; below them, the rest of the spheres make a necklace of enormous glimmering pearls that surround the deceptively calm-looking expanse of water.\n\nYou can see Kadek climbing the ladder to the office. She's settling into her new supervisory role well, and why shouldn't she? Diah's not here.\n*if ally_mom_dad = 0\n\n\tOddly enough, both your parents are also absent. Perhaps if you knew them better, they would have told you they were working elsewhere today.\n\t*goto parents\n*else\n*label parents\n*return\n*label pass_test\nShe meets your eye and gives you a respectful nod. It takes you a moment to realize that yes, this is it—she'll listen to you and do what you say she should do. This might be what adulthood feels like, or at least part of it.\n\nThere's a lot of coordinating to do, and it will take time. Your neck is stiff and sore from the tension. You expect the sharks to go wild at any moment, and it's exhausting.\n\nYou glance at your own wrist com, and it shows you the time: \n*if foreknowledge > 60\n\tit's 7:00 a.m.\n\t*goto aa\n*elseif foreknowledge > 50\n\tit's 8:00 a.m.\n\t*goto aa\n*else\n\tit's 9:00 a.m.\n*label aa\n*choice\n\t#Make sure everyone is a safe distance from the water.\n\t\tYou know you'd be in trouble for tripping an alarm if your parents were here. Fortunately, they're not. It's a simple matter to set off the relatively minor partial-evacuation alarm.\n\t\t*goto earthquake_good\n\t#Check on the dolphin farm.\n\t\tYou head for the dolphin farm, hoping you have time to get out of the submerged speeder before the earthquake hits.\n\t\t*if foreknowledge > 60\n\t\t\t*goto earthquake_medium_underwater\n\t\t*else\n\t\t\t*goto earthquake_bad_underwater\n\t#Tell the staff what is happening.\n\t\tOne by one, you explain the whole situation to the staff. They're edgy since the Alive disaster, but most of them want more detail than you can give, so they end up following you around. Eventually, you realize that the best way to get everyone to safety is to lead the way—so you do, and they follow you.\n\t\t*if foreknowledge > 60\n\t\t\t*goto earthquake_good\n\t\t*elseif foreknowledge > 50\n\t\t\t*goto earthquake_medium\n\t\t*else\n\t\t\t*goto earthquake_bad\n*label fail_test\nShe walks away without another word, and you can see her unconsciously half forming swear words with her hands. Without her help, time is running short.\n\nYou check your wrist com. \n*if foreknowledge > 60\n\tIt's 8:00 a.m.\n\t*goto ab\n*elseif foreknowledge > 50\n\tIt's 9:00 a.m.\n\t*goto ab\n*else\n\tIt's 10:00 a.m.\n*label ab\n*choice\n\t#Make sure everyone is a safe distance from the water.\n\t\tYou know you'd be in trouble for tripping an alarm if your parents were here. Fortunately, they're not. It's a simple matter to set off the relatively minor partial-evacuation alarm. Kadek tries to stop you, but it's too late.\n\ nt. \"Your friend shows signs of untested mind implants. This is very serious, both in terms of her health and in terms of her future. What can you tell me about what has been done to her?\"\n\nFor a moment, your mind blanks out in total terror. Every second counts, but you have no idea how much the doctor needs to know to make it better.\n\nIf you say too much, Kassie will be furious—she might even get a black mark on her permanent record, which would block her from a career in tek. Everything depends on your ability to choose the right strategy for the moment.\n*choice\n\t#Analyze whether the doctor will keep Kassie's experiments secret.\n\t\tThe doctor is young, with tan lines that suggest she \n\t\t*if appraisal > 20\n\t\t\tcan't resist a little too much sunshine now and then. Her office is obsessively tidy, with her medical degree framed on the wall and no other decorations. But her shirt is sleeveless, and she wears gorgeous purple heels that are the exact opposite of regulation. \n\n\t\t\tHer work self and her true self are at odds. She's sympathetic to Kassie but has to keep her professionalism intact. You need to tell her the truth in such a way that she can deny knowledge if necessary.\n\n\t\t\t\"I'm sure Kassie would never do anything illegal,\" you say with a careful lack of sincerity, \"but if she's showing symptoms of illegal mind implants, perhaps you should treat her for that.\"\n\n\t\t\tThe doctor—Doctor Mariam, that's it!—nods at you in shared understanding, and you know you made the right choice.\n\t\t\t*goto recovery\n\t\t*else\n\t\t\t*set kassandra %-10\n\t\t\tgets more sunshine than she should. Her office doesn't even have pictures on the walls, so that's no help. Her shirt is sleeveless, and she wears high purple heels that indicate wealth and a certain lack of practicality. None of that tells you whether she can be trusted.\n\n\t\t\tUnable to risk Kassie's life, you tell the doctor the truth.\n\n\t\t\t\"Kassie has been experimenting on herself. I saw her control a shark with her mind today.\"\n\n\t\t\tThe doctor—Doctor Mariam, that's it!—nods gravely. \"I'll treat her for that, but I'll have to file a report.\"\n\t\t\t*goto recovery\n\t#\"I know Kassie has legal mind implants. Perhaps one is faulty.\"\n\t\tIt's hard to lie to a professional like Doctor Mariam—ah! That's her name. You \n\t\t*if poise > 20\n\t\t\tchoose to believe the lie yourself and manage to speak with perfect sincerity. \n\n\t\t\tDoctor Mariam doesn't necessarily believe you, but the point is that she believes you enough to stop asking questions. After all, the treatment is the same.\n\t\t\t*goto recovery\n\t\t*else\n\t\t\t*set kassandra %-10\n\t\t\tstumble over your words and feel your face heat up in shame.\n\n\t\t\t\"I see,\" she says, and you know right away that she'll be filing a report. Kassie will not be pleased.\n\t\t\t*goto recovery\n\t#\"Can you guarantee doctor-patient confidentiality?\"\n\t\t\"Will you tell me the whole truth?\" asks Doctor Mariam. (Ah! That's her name.)\n\n\t\t*if bargaining > 20\n\t\t\t\"You answer first,\" you say. \"Do you want to work with me or against me?\"\n\n\t\t\tShe raises her eyebrows at you, then nods. \"Deal. Whatever you tell me, I will keep secret.\"\n\n\t\t\tYou tell her everything, knowing you've made an important ally.\n\t\t\t*goto recovery\n\t\t*else\n\t\t\t*set kassandra %-10\n\t\t\t\"Uh…\"\n\n\t\t\tShe folds her arms. \"So, you know she has something to hide—which means she definitely has been trying out unlicensed mind implants. No wonder she ended up here. Obviously I'll have to file a report, for her own good.\"\n\n\t\t\tYou manage not to swear, but you know Kassie will be furious.\n\t\t\t*goto recovery\n\t#Tell the doctor everything I know. Kassie deserves a black mark.\n\t\t*set kassandra %-10\n\t\t*set empathy %-10\n\t\t*set connections %+10\n\t\t*set temp 2\n\t\t\"Kassie has been experimenting on herself. She's been studying illegal stuff online, and today I saw her control a shark with her mind.\"\n\n\t\tThe doctor—Doctor Mariam, that's it!—nods gravely. \"I'll treat her for that, but I'll have to file a report.\"\n\n\t\t\"She wasn't in control of herself half the time. The shark's emotions hit her hard.\"\n\n\t\t\"That's extremely serious. You've done the right thing, telling me all this.\"\n\n\t\tYou don't answer, knowing you could have protected Kassie's mind and dreams at the same time if you'd tried harder.\n*label recovery\n\nNow that she knows the truth, Doctor Mariam snaps into action. She keys commands into the cannula machine so it gives Kassie something that will target the problem with precision.\n\n*gosub trial_end \n\n*page_break\n\nIn less than five minutes, Kassie's breathing takes on a different cadence, and Doctor Mariam looks smug. Kassie's going to be okay.\n\nObviously, once she recovers fully, you'll have to kill her for scaring you so badly.\n\nIn another hour she's awake, and after various tests and promises to take it easy, she's free to go. You walk her home, taking the deep way since the hospital (like all major services) is close to a major hub. The deep way is a network of public speeders that take people down below the city in order to quickly travel long distances.\n*if temp = 2\n\n\tKassie knows what you've done, and she doesn't say a word to you. She's not just angry but desperately sad as well. Something between you has broken forever.\n\t*goto settled\n*else\n*label settled\n\nOnce Kassie's settled in her family's sphere, you go through the surface spheres to get home, taking a break partway through to avoid getting a blister from your prosthetics. You stop at one of the rubbish spheres bordering the near side of the shark farm. It stinks of improperly cleaned filters, and you know there'll be maggots for you to deal with once it comes into the farm for processing.\n*fake_choice\n\t#Glance over the rubbish in case there's something interesting.\n\t\t*set appraisal %+10\n\t\tYou cast your professional gaze over the bags and barrels of food waste. There's a smell of old fish just beginning to turn—perfect. The sharks will love it. \n\n\t\tIt's not your eyes but your nose that tells you someone's screwed up their rubbish disposal. The pile of rubbish doesn't stink as evenly as it should. There's always someone breaking the rules, and it's usually that they've thrown away something disgusting they hope the sharks will just eat.\n\n\t\tWrinkling your nose, you ease open the bag that doesn't smell like food. Inside is a picture of your school friend Folami with her mother Kustiani. It was framed in Drylander glass and has been shattered. Definitely not shark food.\n\t\t\n\t\tYou wrap it and place it in the barrel marked with an [i]X[/i] to indicate that it isn't in the right sphere. The sharks would definitely have eaten it, too.\n\n\t#Chuck some food out the chute so the sharks come and play.\n\t\t*set shark_sense %+10\n\t\tYou cast your professional gaze over the bags and barrels of food waste. There's a smell of old fish just beginning to turn—perfect. The sharks will love it. \n\n\t\tAfter a quick check that the bio-bag of fish scraps is as suitable as it smells, you throw it out the quick-access chute. Seconds later, the sharks swarm around. They're beautiful creatures.\n\n\t#Use the railing for some exercises since I've nothing better to do.\n\t\t*set athletics %+10\n\t\tYour arms are thick with muscle, and you love feeling how strong you are. After checking the railing can hold your weight, you do a bunch of chin-ups and then a few gymnastic exercises you've invented yourself, like \"standing\" on your arms and holding your balance until you can't take it anymore.\n\n\t\tThe pain gives you a high that helps you stop worrying about Kassandra.\n\nYou're ready to head home and itching to check that Kassie's really recovered, but as you stand up, a shark leaps out of the water before your eyes and thumps into the side of the sphere, leaving a smear of blood. Others leap up and crash back into the water, some hitting one another and others diving deep. Then all of them turn and race away as if some greater predator were pursuing them.\n*fake_choice\n\t#Race to tell Mom something's wrong. This is too big to keep secret.\n\t\t*set connections %+10\n\t\tThis close to the farm, the fastest way to get there is through the spheres, so you hurry through the public ways, ignoring the curious glances of passersby. You know better than to think of the sharks as pets—Dad says you shouldn't love something that you're going to eat—but it's genuinely upsetting that they're acting so strangely.\n\t\t\n\t\tOn the way, you spot one of your school friends, Petar, doing work experience at the dolphin farm. He looks as frantic as you feel. When his eyes meet yours, you sign, \"Trouble?\" and he nods. Mom will be furious that you've given away information to someone currently allied with the dolphin farmers—but she'll be pleased to know they're having trouble too.\n\n\t#Continue watching to see if anything else happens.\n\t\t*set foreknowledge %+10\n\t\tOne of the sharks flips over and tries to swim with its white belly pointing to the sky. It looks like a corpse. Even so, the sharks aren't acting as if they're ill or physically hurt. It's as if they know something terrifying that you aren't privy to.\n\n\t\tYou know better than to think of the sharks as pets—Dad says you shouldn't love something that you're going to eat—but it's genuinely upsetting to see something so unnatural. You need Mom.\n\n\t#Act natural as I go to the shark farm. This could harm its reputation.\n\t\t*set value_farm %+10\n\t\tIt's hard to pretend everything's fine when Kassie's experimenting on herself and the sharks are freaking out. You focus on the fact that Kassie is okay and will presumably be more careful in future. The \"presumably\" isn't believable, so you just practice looking bored.\n\n\t#Go to the shark farm to gleefully watch the chaos that will likely unfold.\n\t\t*set value_farm %-10\n\t\tIt's not often you get to see Mom out of her depth (pun intended). She and Dad are always going on about adulthood and responsibility and the innate neatness of nature. It's going to be amazing to see them panicking and lost, and you don't plan to miss it. \n\nAt last you reach the farm and can act like yourself again. Except you can't, because there's a primary school group passing through the shark farm on an excursion. Normally it's fun to see children ooh and aah as they're told of the free-swimming method of shark farming and how all of Kota Perahu would collapse without its main food source. The subtle dig at the Vegetarian's Guild is a classic passive-aggressive move.\n\nThe sharks currently on display look twitchy to you, and you have a quiet word to one of the teachers, suggesting that the kids should be moved on toward the fish-and-chips part of the tour ASAP. Whatever's going on, the viewing area isn't a good place for kids to hang out. Your school friend Diah is with them, on her own work experience, and she comes to say hello.\n\n\"How are the kids?\" you sign to her.\n\n\"I don't think Lili trusts me near the sharks, but at least I'm doing something useful.\"\n\nRealization dawns. \"You're not on work experience at these kids' school, are you?\" you say. \"You're doing work experience here. I mean, as part of the farm.\"\n\n\"That's right,\" she signs, her hands moving so fast she's hard to understand. \"Oh no! You're not angry, are you? Please tell me I'm not stealing the job you want.\"\n*fake_choice\n\t#\"Of course not! You'd make a great shark farmer.\"\n\t\t*set diah %+10\n\t#\"Dad makes the hiring decisions, not me. I trust his judgment.\"\n\t\t*set sunny %+10\n\t#\"Mom's a full-on genius. You'll learn plenty here.\"\n\t\t*set lili %+10\n\t#\"It's really a family farm. But enjoy your work experience while you can.\"\n\t\t*set lili %+10\n\t\t*set sunny %+10\n\t\t*set diah %-10\n\t#\"I don't want to work here. Ew.\"\n\t\t*set value_farm %-5\n\t\t*set sunny %-10\n\t\t*set lili %-10\n\t\t*set diah %+10\n\"Okay then,\" she signs, automatically signing, \"Thank you,\" at the same time before turning to follow the kids. She looks devastated to miss the shark racing, but an athlete like her will appreciate a protein hit.\n\nMom is hanging about near the water, as always when there's a tour. It took you a long time to realize she's never gotten over the day some snotty-nosed brat threw a grappling hook into the inner pool and injured her best breeding female. Mom's always preferred sharks to people, but she reserves her greatest distrust for children. Your relationship will be very different once you come of age. Well, that's what you've always told yourself.\n*fake_choice\n\t#Sign \"danger\" so she comes to me quickly.\n\t\t*set flexibility %-10\n\t#She'll already know something's wrong. Wait for her to come to me.\n\t\t*set empathy %+10\n\t#Closely watch the sharks to see if they're behaving as oddly as the others were.\n\t\t*set curiosity %+10\n\t#Watch and enjoy her dawning panic.\n\t\t*set empathy %-10\nIn moments, Mom is by your side. As usual, she isn't looking at you but at the water. \n\n\"What's going on?\" she asks in a low voice.\n\n\"I'm not sure,\" you admit, and you describe the behavior you witnessed at the rubbish sphere.\n\nMom gives you a skeptical look, and for a moment, you doubt what you saw. You resist the urge to apologize for bothering her. But you know you're right to be concerned. \n\n\"There was blood on the Glass. Go and see it for yourself if you want.\"\n\n\"I won't leave the sharks if there's something wrong under the water,\" she says. \"Can you get rid of the kids?\"\n\n\"They're heading for the restaurant,\" you say, proud of your quick thinking.\n\n\"Really?\" Mom says heavily. \"The restaurant with the fantastic view over the water?\"\n*choice\n\t#\"Don't yell at me. I didn't do anything wrong.\"\n\t\t*set lili %-10\n\t\t*goto mom\n\t#\"I got them away before the sharks had a chance to do something dangerous.\"\n\t\t*set curiosity %-10\n\t\t*label mom\n\t\tMom just shakes her head. Sometimes you feel like the only one in the family who remembers that sharks have teeth and humans are squishy.\n\n\t\t\"Please get rid of the kids,\" she says. \"Properly this time. You know I'm useless with people.\"\n\n\t\tYes, you certainly do.\n\t\t*goto up\n\t#\"The food is seriously delicious, Mom. They won't notice anything else.\"\n\t\t*set empathy %-10\n\t\tMom just shakes her head. She can't imagine anyone could look away from the visual music of her precious sharks, regardless of age or distraction.\n\n\t\t\"If you say so,\" she says at last. \"You know I'm useless with people.\"\n\n\t\tYes, you certainly do.\n\t\t*goto down\n\t#\"I'll go and distract them, if you like.\"\n\t\t*set flexibility %+10\n\t\t\"Go,\" she says. \"Quickly.\"\n\n\t\tMom can't imagine anyone could look away from the visual music of her precious sharks, regardless of age or distraction.\n\t\t*goto up\n\t#\"Forget about the kids. What about the sharks?\"\n\t\t*set flexibility %-10\n\t\tThat gets her attention, and she immediately crouches on the edge of the viewing platform to watch them more closely. Never mind that she's well and truly inside leaping range. At least she's taking you seriously.\n\t\t*goto down\n*label up\n\nThe restaurant is technically part of the shark farm, but your parents leave it to others to actually run. Dad does the books for it but hasn't been inside in years. Your family eats plenty of shark meat at home, but Mom and Dad don't like other people to cook it for them. Besides, the restaurant is far too upscale for their tastes—or at least, it's upscale when it doesn't have a school group booked in for a tour.\n\nYou feel funny when you walk in. The view outside really is stunningly beautiful: high enough that you can see a long stretch of the city drawn out like shining bubbles along the water.\n\nDiah spots you and walks over to say hi.\n*choice\n\t#Tell her there's a gas leak and the children need to leave at once.\n\t\t*set curiosity %-10\n\n\t\t\"$!{name}!\" she signs with an enormous smile. \"How's it going?\"\n\n\t\t\"Not good!\" you say. \"There's a gas leak and you need to get the kids out.\"\n\n\t\t\"Really?\" For a moment, you think she'll burst into tears on the spot. \"But…,\" she signs, \"it's my first day.\"\n\n\t\t\"They come from a school, don't they?\" you say. \"Send them back there.\"\n\n\t\t\"Can you tell the teachers?\" Diah asks pathetically. \"They're mean.\"\n\t\t*choice\n\t\t\t#\"I'll come with you,\" I say. I can play it by ear.\n\t\t\t\t*set flexibility %+10\n\t\t\t\t\"Thanks!\" she signs.\n\n\t\t\t\tYou approach one of the male teachers together. It's clear Diah expects you to do the talking. \n\t\t\t\t*goto upend\n\t\t\t#\"Don't be such a baby.\" I have my pride—why doesn't she?\n\t\t\t\t*set empathy %-10\n\t\t\t\tDiah approaches one of the teachers and turns toward the window so they can sign in private. He scowls at you over her head, then comes to speak to you. \n\t\t\t\t*goto upend\n\t\t\t#\"I'll take care of it,\" I say. I'll be quicker.\n\t\t\t\t*set flexibility %-10\n\t\t\t\t\"Thank you,\" she signs, shamefaced. \n\n\t\t\t\tYou approach one of the male teachers. \n\t\t\t\t*goto upend\n\t#Pretend I don't notice her and announce a Q and A session with the kids.\n\t\t*set empathy %-10\n\t\tDiah is coming over quickly, a big smile on her face. \n\n\t\t\"Hey, kids!\" you say loudly. \"Who knows how many teeth sharks have?\"\n\n\t\tAfter a confused pause, you repeat the question in your most overly cheerful voice with great big sign language gestures. Then the kids start putting up their hands. For once, they're actually answering your question instead of interrupting your talk to ask about your legs.\n\n\t\t\"Forty-five,\" says the first kid.\n\n\t\t\"More,\" you say.\n\n\t\t\"A hundred,\" says another.\n\n\t\t\"More.\"\n\n\t\t\"A thousand?\"\n\n\t\t\"More.\"\n\n\t\t\"Infinity billion?\" one says.\n\t\t*choice\n\t\t\t#\"Less.\" I grin. Teaching is fun!\n\t\t\t\t*set flexibility %+10\n\t\t\t\tYou pause to enjoy their rapt attention.\n\t\t\t\t*goto upend2\n\t\t\t#\"Don't be silly,\" I tell him. This is education, not a comedy show.\n\t\t\t\t*set flexibility %-10\n\t\t\t\tYou pause, making sure they stop wriggling before you tell them the answer.\n\t\t\t\t*goto upend2\n\t\t\t#\"Less,\" I sign. This is a chance to educate kids about how great sharks really are.\n\t\t\t\t*set empathy %-10\n\t\t\t\tYou pause, noticing one girl looking at her grilled shark and putting down her fork. It's possible you just converted her to the Vegetarian Guild, but if she respects sharks, then it's worth it.\n\t\t\t\t*label upend2\n\n\t\t\t\t\"The biggest shark is the whale shark, which has three thousand teeth! But don't worry: whale sharks only eat plankton. Since sharks constantly produce new teeth, they can lose up to twenty thousand teeth in their lifetime.\"\n\t\t\t\t*goto upend\n\t#Tell her something's wrong and ask her to help me keep the children distracted.\n\t\t*set flexibility %-10\n\t\t\"$!{name}!\" she signs with an enormous smile. \"How's it going?\"\n\n\t\t\"I need help,\" you sign. \"Do you think you can keep the kids focused on you for a little while?\"\n\n\t\t\"What's going on?\"\n\n\t\t\"Something not good, and I need to help take care of it—without a whole bunch of nosy kids videoing everything I do.\"\n\n\t\t\"Can I help?\" she asks.\n\t\t*fake_choice\n\t\t\t#\"Yes—by keeping the kids distracted. This is a family matter, so I can't say more.\"\n\t\t\t\t*set empathy %-10\n\t\t\t\t\"Oh!\" she signs. \"Yes of course. You just asked me to do that. Sorry. First day.\"\n\n\t\t\t\t\"It's fine, Diah. I'll write you a reference afterward if you like.\"\n\n\t\t\t\tHer face brightens. \"Will you let me race a shark?\"\n\n\t\t\t#\"I'll let you know as things develop.\"\n\t\t\t\t*set flexibility %+10\n\t\t\t\t\"Once I've gotten rid of the kids, can I race a shark?\" she asks.\n\n\t\t\t#\"Just make sure no one suspects anything is wrong. That's the crucial thing.\"\n\t\t\t\t*set flexibility %-10\n\t\t\t\t\"Right,\" she signs. \"Yep. You just said that. Sorry. First day.\"\n\n\t\t\t\t\"It's fine, Diah. I'll write you a reference afterward if you like.\"\n\n\t\t\t\tHer face brightens. \"Will you let me race a shark?\"\n\n\t\tYou should have known that's what Diah wanted most out of the tour. She's a top-notch athlete with a competitive streak.\n\n\t\t\"Sure,\" you sign and gladly let her get on with kid wrangling. After the first thousand times you've explained your legs to a pack of kids, it gets a little old.\n\n*label upend\nOnce you've told Diah that the kids need to move on, things seem to be under control. You spare a glance down toward the farm proper. Mom is next to the food chute, apparently preparing a feed. Which is your job, and it's almost an hour too early.\n\nEven from above, you can see the sharks aren't rushing in to feed like usual. Some of them swim away as if the food is a threat. Others collide with one another, losing their usual grace. Still others take a bite or two, but no more. Sharks are never finicky like that.\n\nYou see Mom standing by the water, watching them. Then you see her strip down to her swimmers.\n*goto updown\n*label down\nYou and Mom watch the sharks. They aren't behaving normally. More than once, you see them collide with one another as if they've utterly forgotten their usual grace. \n\nMom bites her lip. She's fidgeting, unable to keep still but unable to find a simple solution either. \"Food,\" she says at last. \"They're predators more than anything else. I bet if we feed them they'll snap out of it and go back to normal.\"\n\nYou're not sure if sharks stress eat, but it looks like you're about to find out.\n*choice\n\t#\"Alright, but let's not get too close,\" I say.\n\t\t*set curiosity %-10\n\t\tShe rolls her eyes at you. \"You need to relax! There hasn't been a shark-related accident in over thirty years.\"\n\n\t\t\"Because people are smart enough to take precautions,\" you say. \"You know as well as I do that this isn't a normal day—not anymore.\"\n\n\t\tShe goes to sort the latest delivery of shark food.\n\t\t*choice\n\t\t\t#Follow her lead.\n\t\t\t\t*set flexibility %+10\n\t\t\t\t*gosub shed\n\t\t\t\t*goto downend\n\t\t\t#Keep an eye on the children.\n\t\t\t\t*set flexibility %-10\n\t\t\t\tWhile Mom sorts out the food, you look up toward the restaurant, an enormous Glass bubble that appears to float above the rest. It's technically part of the shark farm, but your parents leave it to others to actually run. Dad does the books for it but hasn't been inside in years. Your family eats plenty of shark meat, but Mom and Dad don't like other people to cook it for them. Besides, the restaurant is far too upscale for their tastes. Or at least, it's upscale when it doesn't have a school group booked in for a tour.\n\n\t\t\t\tThere are a couple of faces turned your way, but most are focused on the food.\n\t\t\t\t*goto downend\n\t\t\t#Mom shouldn't be sorting the rubbish—that's my job.\n\t\t\t\t*set empathy %-10\n\t\t\t\tYou walk quickly and beat her to the shed. Mom directs you to start with a large helping of protein and then grab some of the usual favorites: sardines, sweet potato, and biscuits.\n\n\t\t\t\tYou take the first barrow to the main chute and begin shoveling food into it.\n\t\t\t\t*goto downend\n\t#\"Have you forgotten the schoolchildren?\" I ask.\n\t\t*set flexibility %-10\n\t\t\"Of course I have,\" she says. \"Didn't you take care of them?\"\n\n\t\tYou glance up at the restaurant: an enormous Glass bubble that appears to float above the rest. It's technically part of the shark farm, but your parents leave it to others to actually run. Dad does the books for it but hasn't been inside in years. Your family eats plenty of shark meat, but Mom and Dad don't like other people to cook it for them. Besides, the restaurant is far too upscale for their tastes. Or at least, it's upscale when it doesn't have a school group booked in for a tour.\n\t\t*choice\n\t\t\t#\"I'll go to them now and think of something to keep them happy.\"\n\t\t\t\t*set flexibility %+10\n\t\t\t\tYou feel funny when you walk into the restaurant—a place your parents own but you hardly ever see. It is stunningly beautiful, high enough that you can see a long stretch of the city drawn out like shining bubbles along the water.\n\n\t\t\t\tThe kids are eating happily, so you let yourself glance out the window.\n\t\t\t\t*goto downend\n\t\t\t#\"They're safe. The next most important thing is the farm's reputation.\"\n\t\t\t\t*set flexibility %-10\n\t\t\t\t\"Agreed,\" Mom says absently. \n\n\t\t\t\tIt's clear you'll need to deal with the outside world, so you head up to the restaurant. You feel funny when you walk inside—a place your parents own but you hardly ever see. It is stunningly beautiful, high enough that you can see a long stretch of the city drawn out like shining bubbles along the water.\n\n\t\t\t\tThe kids are eating happily, so you let yourself glance out the window.\n\t\t\t\t*goto downend\n\t\t\t#\"Kids love feeding time. Let's put on a show.\"\n\t\t\t\t*set empathy %-10\n\t\t\t\tMom glows with pride. She loves introducing new people to her beautiful stock.\n\n\t\t\t\t*gosub shed\n\t\t\t\t*goto downend\n\t#\"No one knows them better than you and I,\" I say honestly.\n\t\t*set empathy %-10\n\t\tShe shoots you a smile, the kind that makes you suddenly feel connected and seen. For a moment, you're her one ally in a world that doesn't understand her. \n\n\t\tNothing else makes you feel so adult and equal—or so childishly vulnerable.\n\t\t\n\t\tShe goes to sort the latest delivery of shark food.\n\t\t*choice\n\t\t\t#Follow her lead.\n\t\t\t\t*set flexibility %+10\n\t\t\t\t*gosub shed\n\t\t\t\t*goto downend\n\t\t\t#Continue monitoring the sharks' behavior.\n\t\t\t\t*set flexibility %-10\n\t\t\t\tYou spot Sweetie among the rest. He's attempting to chew on a nearby sphere. It's painful to watch him keep charging the Glass only to bounce off again. In different circumstances, it might be funny, but Sweetie could injure himself.\n\n\t\t\t\tOther sharks are attacking one another, but fortunately they seem to have lost all their skill and none are hurt. Even so, it's only a matter of time before there's blood in the water.\n\t\t\t\t*goto downend\n\t\t\t#Mom shouldn't be sorting the rubbish—that's my job.\n\t\t\t\t*set empathy %-10\n\t\t\t\tYou walk quickly and beat her to the shed. Mom directs you to start with a large helping of protein and then grab some of the usual favorites: sardines, sweet potato, and biscuits.\n\n\t\t\t\tYou take the first barrow to the main chute and begin shoveling food into it.\n*label downend\n\nThe sharks aren't rushing in to feed like usual. Some of them swim away as if the food is a threat. Others move aimlessly. Still others take a bite or two, but no more. Sharks are never finicky like that.\n\nMom emerges from the shed in her swimmers.\n*label updown\n\nShe walks to the water quickly with the spring in her step that always comes when she's about to leap into the sea.\n*fake_choice\n\t#Run to stop her. It's not safe!\n\t\t*set curiosity %-10\n\t\tYou race to stop your mother jumping into an ocean already boiling with crazed sharks. Every part of you is slow and clumsy. Stupid brain should have realized Mom would get in the water. Stupid legs are clumsy and mechanical. Stupid voice isn't enough to cut through Mom's obsession.\n\n\t#She'll fix this. There's no one who knows sharks better.\n\t\t*set empathy %-10\n\t\tYou quash the urge to cry out in horror as Mom heads straight for the frothing water and crazed sharks. She's been alive more than twice as long as you, and she understands sharks better than she understands you. If anyone can figure out what's wrong, she can.\n\n\t#Watch her closely. How will she handle this?\n\t\t*set curiosity %+10\n\t\tMom always moves with such grace and self-assurance. She doesn't know how beautiful she looks, both in and out of the water. After all this time, you still feel a twinge of jealousy for her perfect legs: yours might be more impressive, but hers are so much more straightforward.\n\nShe leaps into the air, curving her body into a dive and hanging above the water for a glittering moment as if she's truly an aquatic creature herself. Then she splashes into the sharks' domain.\n\nNormally the sharks treat her as one of their own: another sleek body among the pack. Not today.\n\nThey collide with her, forcing her deeper and swimming over and under her, swatting her with their tails and then vanishing into the darker depths. Mom's presence is only making the sharks behave more weirdly than ever!\n\nShe swims out beyond them and lifts herself onto the triangle that's formed where three city-supporting wires cross. She's safe for the moment, but she can't balance there for long, and she can't swim back to safety.\n\nYou have to do something, and if you don't get this right—and fast—Mom could be killed in front of you.\n\nMom is too proud to ask for help and risk ruining the shark farm's reputation. But she's in real danger.\n*choice\n\t#I sign \"Danger!\" to Diah and send her to fetch help. Mom will be furious—but safe.\n\t\t*if (poise > 20) and (diah > 50)\n\t\t\t*set lili %+10\n\t\t\t*set connections %+10\n\t\t\t*set reputation %+10\n\t\t\tDiah is visible through the Glass of the restaurant, so you give a giant wave to get her attention. She waves back, and you sign, \"Danger! Come!\"\n\n\t\t\tShe disappears at once and is beside you seconds later. No one runs as fast as Diah—other than you in your runners. \n\n\t\t\t\"Something's wrong with the sharks and Mom's in there with them. I need you to get the dolphin farmers right away.\"\n\n\t\t\tShe hesitates, knowing all about the animosity between the two farms.\n\t\t\t*fake_choice\n\t\t\t\t#\"Don't worry about the farm's reputation—we need help!\"\n\t\t\t\t\t*set empathy %+10\n\t\t\t\t#\"We have to know if the dolphins are affected too.\"\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t#\"It's about time those dolphin lovers did something useful.\"\n\t\t\t\t\t*set empathy %-10\n\t\t\tShe races away at top speed. You stand helplessly by the water, seeing Mom wince in pain as she balances on the wires.\n\n\t\t\tAfter five awful minutes, Diah returns with the couple who own the dolphin farm: Ahmed and Musa. Between them, they're carrying what looks like an articulated plastic sphere filled with metal limbs.\n\n\t\t\tYou point to Mom and tell them what's happening as quickly and coherently as possible.\n\n\t\t\t\"Why is Lili in the water at all?\" Ahmed asks you gruffly.\n\t\t\t*fake_choice\n\t\t\t\t#\"Get her out and I'll tell you.\"\n\t\t\t\t\t*set bargaining %+10\n\t\t\t\t\tMusa claps you on the shoulder. \"Don't worry about him. We're here to help.\"\n\n\t\t\t\t\t*gosub farmers\n\t\t\t\t#\"Don't you give the dolphins manual checkups?\"\n\t\t\t\t\t*set shark_sense %+10\n\t\t\t\t\t\"Not when something's clearly wrong,\" Ahmed says. \"Like today.\"\n\n\t\t\t\t\t*gosub farmers\n\t\t\t\t#Help them haul the equipment.\n\t\t\t\t\t*set athletics %+10\n\t\t\t\t\tIt's rare to see so much metal in one place, and it's heavy, but you lay it out and quickly see what it is: an armored suit designed to cover a person's entire body.\n\n\t\t\t\"You did the right thing, calling us,\" says Musa. \"If you ever need a reference, let me know.\"\n\n\t\t\tMom is so calm she calls Ahmed her knight in dripping armor. He doesn't laugh back, but for once he refrains from sarcastic comments, leaving a space for Musa to compliment you on your decisive response to a potential hazard.\n\t\t\t*label endyshark\n\n\t\t\tWhen Musa and Ahmed are gone and the schoolchildren are finally off the premises, Mom takes you and Diah aside.\n\n\t\t\t\"Never mention this incident again,\" she warns you both. \"You did the right thing under the circumstances, but our reputation is as vital to the survival of the shark farm as the health of the sharks.\"\n\t\t\t*goto endyendyshark\n\t\t*elseif (poise = 50) and (diah > 50)\n\t\t\t*set value_farm %-10\n\t\t\t*set connections %+10\n\t\t\tDiah is visible through the Glass of the restaurant, so you give a giant wave to get her attention. She waves back, and you sign, \"Danger! Come!\"\n\n\t\t\tShe disappears at once and is beside you seconds later. No one runs as fast as Diah—other than you in your runners. \n\n\t\t\t\"Something's wrong with the sharks and Mom's in there with them,\" you tell her. \"I need you to get the dolphin farmers right away.\"\n\n\t\t\tShe hesitates, not convinced the problem is as serious as you say.\n\t\t\t*fake_choice\n\t\t\t\t#\"Don't worry about the farm's reputation—we need help!\"\n\t\t\t\t\t*set empathy %+10\n\t\t\t\t#\"I need to know if the dolphin are affected too.\"\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t#\"It's about time those dolphin lovers did something useful.\"\n\t\t\t\t\t*set empathy %-10\n\t\t\tShe races away at top speed. You stand helplessly by the water, seeing Mom wince in pain as she balances on the wires.\n\n\t\t\tAfter five awful minutes, Diah returns with the couple who own the dolphin farm: Ahmed and Musa. Between them, they're carrying what looks like an articulated plastic sphere filled with metal limbs.\n\n\t\t\tYou point to Mom and try to tell them what's happening as quickly and coherently as possible, but you can hear yourself babbling. If only you were one of those people who could act calm under pressure!\n\n\t\t\t\"Why is Lili in the water?\" Ahmed asks you gruffly.\n\t\t\t*choice\n\t\t\t\t#\"Get her out and I'll tell you.\"\n\t\t\t\t\t*set bargaining %+10\n\t\t\t\t\tMusa claps you on the shoulder. \"Don't worry about him. We're here to help.\"\n\n\t\t\t\t\t*gosub farmers\n\t\t\t\t\t*goto suits\n\t\t\t\t#\"Don't you give the dolphins manual checkups?\"\n\t\t\t\t\t*set shark_sense elp!\"\n\t\t\t\t\t*set empathy %+10\n\t\t\t\t#\"I need to know if the dolphins are affected too.\"\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t#\"It's about time those dolphin lovers did something useful.\"\n\t\t\t\t\t*set empathy %-10\n\t\t\tShe races away at top speed. You stand helplessly by the water, seeing Mom wince in pain as she balances on the wires.\n\n\t\t\tAfter five awful minutes, Diah returns with the couple who own the dolphin farm: Ahmed and Musa. Between them, they're carrying what looks like an articulated plastic sphere filled with metal limbs.\n\n\t\t\tYou point to Mom and try to tell them what's happening as quickly and coherently as possible, but you can hear yourself babbling. If only you were one of those people who could act calm under pressure!\n\n\t\t\t\"Why is Lili in the water?\" Ahmed asks you gruffly.\n\t\t\t*choice\n\t\t\t\t#\"Get her out and I'll tell you.\"\n\t\t\t\t\t*set bargaining %+10\n\t\t\t\t\tMusa claps you on the shoulder. \"Don't worry about him. We're here to help.\"\n\n\t\t\t\t\t*gosub farmers\n\t\t\t\t\t*goto bleeding\n\t\t\t\t#\"Don't you give the dolphins manual checkups?\"\n\t\t\t\t\t*set shark_sense %+10\n\t\t\t\t\t\"Not when something's clearly wrong,\" Ahmed says.\n\n\t\t\t\t\t*gosub farmers\n\t\t\t\t\t*goto bleeding\n\t\t\t\t#Help them haul the equipment.\n\t\t\t\t\t*set athletics %+10\n\t\t\t\t\tIt's rare to see so much metal in one place, and it's heavy, but you lay it out and quickly see what it is: an armored suit designed to cover a person's entire body.\n\t\t\t*label bleeding\n\n\t\t\t*gosub suit\n\n\t\t\tMom is bleeding in several places, but she manages to stand and yell at you, \"What have you done? How could you call the dolphin farmers at such a time!\"\n\t\t\t*gosub fight\n\t\t\t*goto endyendyshark\n\t#I think I can shock the sharks out of their weirdness—but I'll have to risk my own safety. \n\t\t*if shark_sense > 20\n\t\t\t*set lili %+10\n\t\t\t*set reputation %+10\n\t\t\tYou dial for a speeder and take  She's so distracted by the idea that someone might be faster than her that she forgets all about Mom, and sharks, and blood.\n\t\t\t*label leapin\n\n\t\t\tYou squeeze a few more drops from your thumb, just to be sure. It's been a long time since you last swam with sharks, and that was with Mom by your side and Dad standing by with an armored speeder just in case.\n\n\t\t\tThis time is different. This time, you need to be prey.\n\n\t\t\tYou move the speeder away from the platform, knowing the sharks won't be tempted by a fight they know they can't win. When you glance back at Diah, you can see drops of your own blood floating on the water. You unhook your tail and dangle it in the water, wriggling it to get the shark's attention.\n\n\t\t\tThe sharks circle and salivate at the illusion of real live food for a change. \n\n\t\t\tMom leaps off her temporary perch and slices through the water, hauling herself into the speeder with you. Once she's inside, you quickly pull up your tail. It wouldn't be easy to fix.\n\n\t\t\tMom shocks you with an embrace. \"You were brilliant!\"\n\t\t\t\t\n\t\t\tWhen you get back to the platform, she takes you and Diah aside. The schoolchildren are mercifully absent.\n\n\t\t\t\"Never mention this incident again,\" she warns you both. \"Our reputation is as vital to the survival of the shark farm as the health of the sharks.\"\n\t\t\t*goto endyendyshark\n\t\t*else\n\t\t\t*set reputation %-10\n\t\t\t*set lili %-10\n\t\t\tYou dial for a speeder and take off your legs, leaving them abandoned on the platform. Legs aren't any use where you're going.\n\n\t\t\tThe speeder takes you home, creaking ominously when one of the larger sharks crashes directly into it. You grab your tail and a kitchen knife and head straight back to the farm.\n\n\t\t\tBy the time you're back at the platform, Diah is there too. Judging by her face, she's guessed your plan. \"Stop! What are you doing?\"\n\t\t\t*fake_choice\n\t\t\t\t#\"Don't be afraid. I'll be fine!\"\n\t\t\t
