arks won't be tempted by a fight they know they can't win. When you glance back at Diah, you can see drops of your own blood floating on the water. You unhook your tail and dangle it in the water, wriggling it around so it appears alive.\n\n\t\t\tThe sharks circle and salivate at the illusion of real live food for a change. \n\n\t\t\tMom leaps off her temporary perch and slices through the water, hauling herself into the speeder with you. Once she's inside, you quickly pull up your tail. It's an awkward fit, but it has to be done.\n\n\t\t\tMom frantically pushes emergency buttons on the console while telling you off for risking yourself.\n\t\t\t*choice\n\t\t\t\t#\"Shut up, Mom! I'm never listening to you again!\"\n\t\t\t\t\t*set connections %-10\n\t\t\t\t\t\"Hello?\" crackles the radio. \"I'm sorry to let you know your little fight has accidentally been made public.\"\n\n\t\t\t\t\tMom slams off the communicator, realizing too late that your blood is nothing but a minor cut. \n\t\t\t\t\t*goto endysharkk\n\t\t\t\t#\"You made a mistake, Mom, not me!\"\n\t\t\t\t\t*set value_farm %-10\n\t\t\t\t\t\"How dare you!\" she says. \n\n\t\t\t\t\t\"Hello?\" crackles the radio. \"I'm sorry to let you know your little fight has accidentally been made public.\"\n\n\t\t\t\t\tMom slams off the communicator, realizing too late that your blood is nothing but a minor cut. \n\t\t\t\t\t*goto endysharkk\n\t\t\t\t#\"I'm sorry, Mom! I didn't know what to do!\"\n\t\t\t\t\t*set reputation %-10\n\t\t\t\t\t\"You made a terrible, childish mistake,\" she says.\n\n\t\t\t\t\t\"Hello?\" crackles the radio. \"I'm sorry to let you know your little fight has accidentally been made public.\"\n\n\t\t\t\t\tMom slams off the communicator, realizing too late that your blood is nothing but a minor cut. \n\t\t\t*label endysharkk\n\n\t\t\tYou return to the platform in a mutually terrified silence. Mom takes you and Diah aside. The schoolchildren are mercifully absent.\n\n\t\t\t\"Never mention this incident again,\" she warns you both. \"Our reputation is as vital to the survival of the shark farm as the health of the sharks.\"\n\t\t\t*goto endyendyshark\n\t#Kassie can communicate with sharks, but she'll have to risk herself—again.\n\t\t*set kassie_drop_in \"Call Kassie immediately. I can't wait any longer.\"\n\t\t*if kassandra > 50\n\t\t\t*set foreknowledge %+10\n\t\t\t*set lili %+10\n\t\t\tYou dial for Kassie, but she doesn't answer right away. She's long since given you a code that can shake her pillow until she switches it off, and you enter that into your communicator and quickly get a response.\n\n\t\t\tMinutes later, Kassie is by your side. \n\n\t\t\tYou point at the water, and she stares in horror. \"You want me to fix all of that?\" she signs.\n\t\t\t*gosub faker\n\n\t\t\tShe dives into the water, staying close to the platform and holding on with one hand so she can stay as still as possible. Her eyes are closed in concentration, so you watch the sharks for her. \n\n\t\t\tTheir behavior changes before your eyes: they calm down and start swimming normally. Mom spots the change and dives off her temporary perch to swim back to you. Once Mom is out of the water, you tap on Kassie's bare shoulder, \"It's done. Come out.\"\n\n\t\t\tKassie opens her eyes and smiles weakly at you. You and Mom help her out together, and once she's on her feet, she's able to walk away and get dressed. She really did it!\n\n\t\t\tOnce she's back, Mom takes you both aside. \"Never mention this incident again,\" she warns. \"Our reputation is as vital to the survival of the shark farm as the health of the sharks.\"\n\n\t\t\t\"They were afraid,\" Kassie says. \"There's something wrong in their world.\" She heads home, exhausted, but promises to talk to you on-screen within the hour.\n\t\t\t*goto endyendyshark\n\t\t*if kassandra = 50\n\t\t\t*set reputation %-10\n\t\t\t*set lili %-10\n\t\t\tYou dial for Kassie, but she doesn't answer right away. She's long since given you a code that can shake her pillow until she switches it off, and you enter that into your communicator and quickly get a response.\n\n\t\t\tOnce she wakes up properly, Kassie comes quickly. \n\n\t\t\tYou point at the water, and she stares in horror. \"You want me to fix all of that?\" she signs.\n\t\t\t*gosub faker\n\n\t\t\tShe dives into the water, staying close to the platform and holding on with one hand so she can stay as still as possible. Her eyes are closed to concentrate, so you watch the sharks for her. \n\n\t\t\tTheir behavior changes before your eyes: they calm down and start swimming normally. Mom spots the change and dives off her temporary perch to swim back to you. When she's out of the water, you tap on Kassie's bare shoulder, \"It's done. Come out.\"\n\n\t\t\tShe opens her eyes and smiles weakly at you. You and Mom help her out together, and once she's on her feet, she's able to walk away and get dressed. She really did it!\n\n\t\t\tJust as you think the worst is over, you realize you're surrounded by the schoolchildren, and their teachers are holding their phones. They saw everything—and they taped it.\n\n\t\t\tMom turns on you. \"What have you done!\"\n\t\t\t*choice\n\t\t\t\t#\"Me? I can't believe you're blaming me for helping you!\"\n\t\t\t\t\t*set connections %-10\n\t\t\t\t\tYou realize abruptly that some of the teachers are still filming. \n\t\t\t\t\t*goto endokokok\n\t\t\t\t#\"You made a mistake, Mom, not me!\"\n\t\t\t\t\t*set value_farm %-10\n\t\t\t\t\t\"How dare you!\" she says. \n\n\t\t\t\t\tYou realize abruptly that some of the teachers are still filming. \n\t\t\t\t\t*goto endokokok\n\t\t\t\t#\"I didn't know what else to do!\"\n\t\t\t\t\t*set reputation %-10\n\t\t\t\t\t\"You made a terrible, childish mistake,\" she says.\n\n\t\t\t\t\tYou realize abruptly that some of the teachers are still filming. \n\t\t\t*label endokokok\n\n\t\t\tMom turns her back on you and switches on her best reassuring manner for the children and their teachers—and all the people who will watch the videos they made.\n\n\t\t\tWhen they're gone, she takes you and Kassie aside. \"Never mention this incident again,\" she warns you both. \"Our reputation is as vital to the survival of the shark farm as the health of the sharks.\"\n\n\t\t\t\"The sharks were afraid,\" Kassie says. \"There's something wrong in their world.\" She heads home then, exhausted, but promises to talk to you on-screen within the hour.\n\t\t\t*goto endyendyshark\n\t\t*else\n\t\t\t*set reputation %-10\n\t\t\t*set lili %-10\n\t\t\t*set leg_health %-10\n\t\t\t*set athletics %-10\n\t\t\tYou dial for Kassie, but she doesn't answer. She's probably sleeping, which means you need an emergency channel. The closest is in Dad's office—up high—and you're already exhausted.\n\n\t\t\tThere's nothing for it: you climb the steep ladder, ignoring the way your legs bang against the struts. Dad's not here; he's probably off trading.\n\n\t\t\tTaking a deep breath, you enter Dad's password and quickly confirm that you need to send an emergency signal. Whoever is closest to Kassie is legally required to wake her.\n\n\t\t\tBy the time you struggle back down the ladder, a sleepy-eyed Kassie is just arriving. You point at the water, and she stares in horror.\n\n\t\t\t\"You want me to fix all of that?\" she signs.\n\t\t\t*fake_choice\n\t\t\t\t#\"Don't be afraid. You've been altering yourself for this moment.\"\n\t\t\t\t\t*set empathy %+10\n\t\t\t\t#\"Your gift is the only way to understand what's happening.\"\n\t\t\t\t\t*set curiosity %+10\n\t\t\t\t#\"We're about to show everyone that we're not kids any more.\"\n\t\t\t\t\t*set empathy %-10\n\t\t\t\"Get fishing twine from the shed,\" she signs. \"Quickly!\"\n\n\t\t\tYou race to the shed and come back draped in the tough string. Kassie has already stripped off her shoes and outer clothes and is in her underwear.\n\n\t\t\t\"Kassie,\" you sign. \"What are you doing? What do I do with the twine?\"\n\n\t\t\t\"The twine was to distract you,\" she says. \"I have to get in the water.\"\n\t\t\t*choice\n\t\t\t\t#\"No! Let me go instead. Or at least keep your jeans on for some protection.\"\n\t\t\t\t\t*set bargaining %+10\n\t\t\t\t\t\"Sorry,\" she signs. \"I need to have skin in the game. Literally.\"\n\n\t\t\t\t\t\"Kassie, no!\"\n\t\t\t\t\t*goto leappp\n\t\t\t\t#\"Just stay still and upright, if you can, so you don't look like prey.\"\n\t\t\t\t\t*set shark_sense %+10\n\t\t\t\t\t\"Thank you,\" she signs with shaking hands.\n\n\t\t\t\t\tMom sees what's going on and shouts, \"No!\" but of course Kassie doesn't hear her.\n\t\t\t\t\t*goto leappp\n\t\t\t\t#\"If you get in trouble, I'm jumping in after you. You know I'm stronger.\"\n\t\t\t\t\t*set athletics %+10\n\t\t\t\t\t\"I know,\" she signs back at you and turns away to sigh.\n\n\t\t\t\t\t\"Kassie, no!\" you sign—but she's not looking at you.\n\t\t\t*label leappp\n\n\t\t\tShe dives into the water, staying close to the platform and holding on with one hand so she can stay as still as possible. Her eyes are closed to help her concentrate, so you watch the sharks for her. \n\n\t\t\tTheir behavior changes before your eyes: they calm down and start swimming normally. Mom spots the change and dives off her temporary perch to swim back to you. Once she climbs out, you tap on Kassie's bare shoulder, \"It's done. Come out.\"\n\n\t\t\tKassie opens her eyes and smiles weakly at you. You and Mom help her out together, and once she's on her feet, she's able to walk away and get dressed. She really does have power over sharks!\n\n\t\t\tJust as you think the worst is over, you realize you're surrounded by the schoolchildren, and their teachers are holding their phones. They saw everything—and they taped it.\n\n\t\t\tMom turns on you. \"What have you done!\"\n\t\t\t*set temp 4\n\t\t\t*choice\n\t\t\t\t#\"Me? I can't believe you're blaming me for helping you!\"\n\t\t\t\t\t*set connections %-10\n\t\t\t\t\tYou realize abruptly that some of the teachers are still filming. To make matters worse, you've twisted the end of your leg climbing to Dad's office so quickly. This could easily go viral.\n\t\t\t\t\t*goto endokokok\n\t\t\t\t#\"You made a mistake, Mom, not me!\"\n\t\t\t\t\t*set value_farm %-10\n\t\t\t\t\t\"How dare you!\" she says. \n\n\t\t\t\t\tYou realize abruptly that some of the teachers are still filming. To make matters worse, you've twisted the end of your leg climbing to Dad's office so quickly. This could easily go viral.\n\t\t\t\t\t*goto endokokok\n\t\t\t\t#\"I didn't know what else to do!\"\n\t\t\t\t\t*set reputation %-10\n\t\t\t\t\t\"You made a terrible, childish mistake,\" she says.\n\n\t\t\t\t\tYou realize abruptly that some of the teachers are still filming. To make matters worse, you've twisted the end of your leg climbing to Dad's office so quickly. This could easily go viral.\n\t\t\t\t\t*goto endokokok\n*label endyendyshark\n\nYou double-check that Mom and the sharks are alright and slowly make your way home. It's been a while since you ate, so you help yourself to a whole pack of seaweed chips before collapsing into bed.\n*if (leg_health \u003c 50) or (temp = 4)\n\t\n\tYour legs are going to give you trouble for a while.\n\t*goto yarp\n*else\n*label yarp\n*choice\n\t#${kassie_drop_in}\n\t\t*set kassandra %+10\n\t\tYou call Kassie, and she picks up right away. \n\n\t\t\"I was just about to call you,\" she signs. \"Are you okay?\"\n\n\t\t\"Are you?\"\n\n\t\tYour computer beeps to indicate an incoming call, and Kassie sees the light reflecting on the Glass behind you.\n\n\t\t\"Go ahead,\" she says. \"I don't mind.\"\n\n\t\tYou click Merge, and Yunus's face pops into split-screen view with Kassie. You wave hello.\n\t\t*goto yk\n\t#Call Yunus.\n\t\t*set yunus %+10\n\t\tYou call Yunus, who greets you cheerfully and then pauses. \"You look odd.\"\n\n\t\t\"It's been an interesting day,\" you say.\n\n\t\t\"I was just about to call you to finish our conversation.\"\n\n\t\t\"Oh!\" you say, remembering he'd wanted to tell you something. \"Yes, of course.\"\n\n\t\tYou computer beeps to indicate an incoming call, and Yunus sees the light reflecting on the Glass behind you.\n\n\t\t\"Someone's calling,\" he says. \"I'm fine if you want to let them in.\"\n\n\t\tYou tap to merge the callers into a three-way chat, and Kassie's face appears on the Glass.\n\t\t*goto yk\n\t#Call Dad.\n\t\t*set sunny %+10\n\t\tYou call Sunny, who answers right away. \"Good afternoon, ${name},\" he says. \"What's going on?\"\n\n\t\t\"A lot,\" you say. \"Can you see Mom?\"\n\n\t\t\"She's on the main platform, as usual. Why?\"\n\n\t\t\"Ask her,\" you say, and then you excuse yourself gratefully when your computer indicates incoming calls from both Kassie and Yunus. \n\n\t\tYou say goodbye to Dad and accept both of your friends' calls at once. The computer automatically softens their backgrounds to create the illusion that they're sitting side by side.\n*label yk\n\n\"Yunus, this is Kassie—my best friend,\" you say, signing at the same time so Kassie doesn't have to lip-read and so Yunus knows to turn his computer's interpreter on if he's not fluent enough to hold a signed conversation. He's from another arm of the city, after all—you've never even met in person. \"Kassie, this is Yunus.\"\n*finish Chapter Three\n*label shed\nShe goes to the shed and sorts the food into a pair of wheelbarrows, starting with a large helping of protein and then grabbing some of the usual favorites: sardines, sweet potato, and biscuits.\n\nYou take the first barrow to the main chute and begin shoveling food into it.\n*return\n*label farmers\nWith practiced efficiency, the dolphin farmers lay out the metal pieces from the sphere. It's an armored suit designed to cover a person's entire body.\n\n*return\n*label suit\nMusa helps Ahmed into the suit while Diah summons a speeder. Before the speeder arrives, Ahmed climbs awkwardly into the water and then holds the plastic sphere in place so that the speeder shoots up right next to it. He depresses a button on the side that makes the plastic fold out to surround the entire sphere, protecting it from the sharks. Then he signals to Musa.\n\nMusa sends the protected speeder toward Mom while Ahmed holds onto the side. The sharks regain enough of their senses to get out of the way. Ahmed helps Mom get down into the speeder before resealing it and returning to the platform, where he remains between the sharks and the speeder so Mom can get out safely.\n*return\n*label faker\n*fake_choice\n\t#\"Don't be afraid. You've been altering yourself for this moment.\"\n\t\t*set empathy %+10\n\t#\"Your gift is the only way to understand what's happening.\"\n\t\t*set curiosity %+10\n\t#\"We're about to show everyone that we're not kids any more.\"\n\t\t*set empathy %-10\n\t\t\"Get fishing twine from the shed,\" she signs. \"Quickly!\"\n\n\t\tYou race to the shed and come back draped in the tough string. Kassie has already stripped off her shoes and outer clothes and is in her underwear.\n\n\t\t\"Kassie,\" you sign. \"What are you doing? What do I do with the twine?\"\n\n\t\t\"The twine was to distract you,\" she says. \"I thought I'd have found the courage to get in the water by now.\"\n\t\t*choice\n\t\t\t#\"No! Let me go instead. Or at least keep your jeans on so you have some protection.\"\n\t\t\t\t*set bargaining %+10\n\t\t\t\t\"Sorry,\" she signs. \"I need to have skin in the game. Literally.\"\n\n\t\t\t\t\"Kassie, no!\"\n\t\t\t\t*goto leappo\n\t\t\t#\"Just stay still and upright, if you can, so you don't look like prey.\"\n\t\t\t\t*set shark_sense %+10\n\t\t\t\t\"Thank you,\" she signs with shaking hands.\n\n\t\t\t\tMom sees what's going on and shouts, \"No!\" but of course Kassie doesn't hear her.\n\t\t\t\t*goto leappo\n\t\t\t#\"If you get in trouble, I'm jumping in after you. You know I'm stronger.\"\n\t\t\t\t*set athletics %+10\n\t\t\t\t\"I know,\" she signs back at you and turns away to sigh.\n\n\t\t\t\t\"Kassie, no!\" you sign—but she's not looking at you.\n\t\t*label leappo\n*return\n*label fight\n*fake_choice\n\t#\"I hate them too, Mom!\"\n\t\t*set connections %-10\n\t\t\"Good to know,\" says Ahmed, setting his helmet on the ground.\n\n\t#\"You made a mistake, Mom!\"\n\t\t*set value_farm %-10\n\t\t\"How dare you!\" she says as Musa politely pretends he didn't hear you admit the shark farm is in trouble.\n\n\t#\"I didn't know what to do!\"\n\t\t*set reputation %-10\n\t\t\"You made a terrible mistake,\" she says as Musa politely pretends he doesn't hear you getting chewed out in front of him and Ahmed.\n\n*return\n\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\nRemember earlier how we told you that the first chapter is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2020-07-09 $4.99 $2.99 purchased\n*abort\n\n", "choicescript_description": "Choose your career in a post-Climate Change future. Will you follow in your parents' footsteps and run the city's shark farm, or will you break the mold?\n\nThe Floating City is a 130,000 word climate fiction novel by Felicity Banks, where your choices control the story. It's entirely text-based—without graphics or sound effects—and powered by the vast, unstoppable power of your imagination.\n \nYou can explore the drowned city of Old Sydney, the secrets of the underground New Sydney, and travel around your own floating city. The pressure is on to hone your skills and choose your future job, but there is hidden danger far below the surface of the sea. Your friend Kassandra is risking her own life to figure out why the sharks are afraid, and you are the only person she listens to. Will you risk her life to try to save others, or will you beg her to give up her dreams?\n\n• Play as male, female, or non-binary; gay, straight, or asexual and/or aromantic.[n/]\n• Develop a romance with a male or female friend, or neither.[n/]\n• Trade with other cities, and make useful connections.[n/] \n• Build your reputation in order to enhance your career prospects.[n/]\n• Learn more about how sharks behave, and solve the mystery of their unusual behavior.[n/]\n• Save thousands of lives—or abandon them to increase your own profits.[n/]", "choicescript_stats": "Name: $!{name}\n\n*stat_chart\n\topposed_pair Empathy\n\t\tPride\n[i]Do you care more about the individual, or the group?[/i]\n*stat_chart\n\topposed_pair Curiosity\n\t\tCaution\n[i]Do you care more about gaining new information or staying safe?[/i]\n*stat_chart\n\topposed_pair Flexibility\n\t\tFocus\n[i]Can you adapt to new situations, or are you better at sticking to the plan?[/i]\n\n*stat_chart\n\ttext athletics Jock Skills\n\ttext shark_sense Shark Sense\n\ttext poise Poise\n\n*stat_chart\n\tpercent bargaining Bargaining\n\tpercent appraisal Appraisal\n\tpercent connections Connections\n\tpercent foreknowledge Foreknowledge\n\tpercent reputation Reputation\n\tpercent value_farm Value of the Shark Farm\n\n*stat_chart\n\ttext value_dollar Exchange Rate (New Sydney:Kota Perahu) 1 \n\ttext net_worth Savings \n\n[b]Rapport with other characters[/b]\n*stat_chart\n\tpercent lili Mom (Lili)\n\tpercent sunny Dad (Sunny)\n\tpercent kassandra Kassandra\n\tpercent yunus Yunus\n\tpercent folami Folami\n\tpercent diah Diah\n\tpercent maya Maya\n\n\n*stat_chart\n\ttext somethings_coming Something's Coming\n*page_break\nPossible Careers (in Kota Perahu unless specified otherwise):\n\nDiplomat in Kota Perahu, Old Sydney, or New Sydney (requires excellent connections or volunteering to assist refugees as well as having great flexibility and empathy)\n\nDolphin Farmer Path 1 (requires good shark sense and connections)\nDolphin Farmer Path 2 (via veterinary skills, requires exquisite shark sense)\n\nFreelancer (requires good flexibility)\n\nKangaroo Farmer in New Sydn s-eat, but it looks like you're about to find out.\n*fake_choice\n\t#\"All right, but let's not get too close,\" I say.\n\t#\"Have you forgotten the schoolchildren?\" I ask.\n\t#\"No one knows them better than you and I,\" I say honestly.\n\n\n\n\n*set name \"Blaine\"\n\n*set empathy 35\n*set curiosity 55\n*set flexibility 69\n\n*set shark_sense 25\n*set athletics 29\n*set poise 33\n*set bargaining 18\n*set appraisal 15\n*set reputation 23\n*set connections 68\n*set foreknowledge 33\n*set value_farm 15\n\n*set value_dollar 1.2\n*set net_worth 1500\n\n*set somethings_coming 8\n\n*set lili 45\n*set sunny 40\n*set kassandra 60\n*set yunus 55\n*set folami 72\n*set diah 55\n*set maya 45\n\nBut your luck has run out. Kustiani herself is pacing you above the water. You're been spotted.\n*fake_choice\n\t#Faster would be better. Speed is paramount.\n\t#Go deeper. Hopefully she doesn't know who I am.\n\t#Adjust course to try and throw her off.\n\n\n\n\n\n\n*set name \"Umber\"\n\n*set empathy 25\n*set curiosity 55\n*set flexibility 35\n\n*set shark_sense 82\n*set athletics 33\n*set poise 15\n*set bargaining 25\n*set appraisal 23\n*set reputation 30\n*set connections 55\n*set foreknowledge 33\n*set value_farm 35\n\n*set value_dollar 1.3\n*set net_worth 800\n\n*set somethings_coming 7\n\n*set lili 27\n*set sunny 63\n*set kassandra 33\n*set yunus 66\n*set folami 55\n*set diah 40\n*set maya 55\n\nYou spot the dolphin farmers, Ahmed and Musa. It's unusual to see them together, since one or both is almost always on site at their own farm, if only to make a show of being concerned that your naughty sharks might cause trouble among their sweet innocent dolphins.\n*fake_choice\n\t#Confront them.\n\t#Follow them.\n\t#Call Dad to warn him.\n\n\n\n\n*set name \"Zion\"\n\n*set empathy 33\n*set curiosity 50\n*set flexibility 45\n\n*set shark_sense 63\n*set athletics 69\n*set poise 54\n*set bargaining 25\n*set appraisal 33\n*set reputation 15\n*set connections 55\n*set foreknowledge 63\n*set
