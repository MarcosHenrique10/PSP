n order to avoid showing any sign of weakness. Unfortunately Arkville favors stairs over ladders, so you feel off-balance before you've even entered the repurposed gymnasium they're calling the \"conference room.\"\n\n\t\t\tInside, the two groups mill around and snack on the prepared food while eying one another. Someone called Maya comes and introduces herself, twisting three of her six braids around her fingers. She's your age and visibly nervous, but you're still unable to think of anything to say. You introduce yourself, and she tells you her name for the second time in five minutes. The attempt at conversation is excruciating.\n\t\t\t*goto meeting\n\t#I bet I can set up an awesome trade right off the bat.\n\t\t*gosub arkville_intro\n\t\tOne of the Arkville people is your age: a girl with six braids and the kind of impeccable posture that you put on when adults have very recently snarled at you to behave. The adults more or less shove her over to you, and she introduces herself as Maya and then admits with a blush that she's the head of Arkville's trading guild.\n\n\t\t*if bargaining > 60\n\t\t\t*set value_farm %+10\n\t\t\t\"Great!\" you say. \"My parents run the shark farm.\"\n\n\t\t\tHer face visibly falls. \"We don't need sharks. Like, at all. We have too many. A lot too many. No one's allowed to go swimming any more because they're…stroppy.\"\n\n\t\t\t\"Breeding gotten out of whack?\" you say sympathetically. \"You should hire my mom's people to fix that.\"\n\n\t\t\t\"That would be really good,\" she says. \"Seriously, we're desperate.\"\n\n\t\t\tYou steer her over to Dad to hash out the specifics.\n\t\t\t*goto meeting\n\t\t*else\n\t\t\tYour throat closes at once. She's exactly the person you should be talking to, but you can't think of anything intelligent to say. At last, it occurs to you that you're a staff member at the shark farm.\n\n\t\t\t\"Do you like sharks?\" you say helplessly.\n\n\t\t\t\"Well…we have a lot. Too many, actually,\" she says. \"Sorry.\"\n\n\t\t\tSo much for that.\n*label meeting\n\nGovernor Banyu is a tall, painfully thin man who takes the stage by simply standing up. The room falls silent. He begins a speech that is clearly designed to say how wonderful his city is in every possible way, including wealth.\n*fake_choice\n\t#Watch him for a \"tell\" when he's lying.\n\t\tHe talks on and on, mentioning Arkville's very ample shark population—that much is clearly true, based on the spread of food, which is almost entirely shark-based—but focuses on the obvious lie of Arkville's fabulous wealth.\n\n\t\tThat, it seems, is his tell: the more enthusiastically he insists something is true, the more outrageous the falsehood.\n\n\t#Watch the Arkvillagers.\n\t\tThe Arkvillagers never take their eyes off Governor Banyu. It draws your eye automatically to the governor, who is going on and on about how fabulously wealthy Arkville is. No one so much as blinks at the obvious falsehood. It's actually a bit creepy. What happens if someone doesn't lap up his every lie?\n\n\t#Watch Dad.\n\t\tDad's jaw tightens as Governor Banyu's gaze settles directly on him while he talks at length about how they're so self-sufficient they don't even need to buy sharks. \n\n\t\tWell, that's a solid clue about how negotiations are going to go.\n\nA hint of movement in the corner of your eye makes you turn your head to look out the Glass. Several travel-sized speeders are setting off toward the Sydneys. Arkville has deliberately lured all your most important traders to this meeting so they can be sure they won't be disturbed in their impromptu negotiations with New Sydney. That, or they're looting Old Sydney.\n*fake_choice\n\t#Accuse the Arkvillagers of violating trade etiquette. \n\t\t*set empathy %-10\n\t\tYou stand up abruptly, and Banyu stares at you, shocked at your rudeness. \"I don't appreciate your attempt to trade with the Drylanders behind our backs.\"\n\n\t\t\"Sit down, child,\" Banyu growls. \"You are revealing your ignorance, and any further nonsense will be punished.\"\n\n\t#Quietly let Dad know what they're doing.\n\t\t*set flexibility %-10\n\t\tYou move closer to Dad and use tapping to share with him what you're observed. He gives you a slight nod to show he's understood and taps back to advise you not to say anything.\n\n\t#Send a message to Yunus telling him what they've done.\n\t\t*set flexibility %+10\n\t\tYou tap out a message to Yunus, careful to keep your arm turned inward so that the Arkvillagers can't see what you're writing or to whom. \n\n\t\tA tiny vibration lets you know Yunus has received your message.\n\nIt's amazing how quickly you can grow to hate someone just because their first action is to trick you into potentially losing your trade advantage—making you look stupid in the process. But Governor Banyu is just getting started.\n\n\"Thank you, Ahmed, for your earlier communications. What a shame Kustiani couldn't join us.\"\n\nIn two sentences, Banyu has filled you with a blinding rage and taken your breath away. You hear the hissing breaths of the others and realize that Banyu has said exactly the right thing to sow discord between every guild. He's more than a liar; he's a skilled manipulator playing a long game. Even Dad is trembling with rage.\n*choice\n\t#Appeal to Kota Perahu pride to snap everyone out of it.\n\t\t*if empathy \u003c 30\n\t\t\t*set value_dollar +0.1\n\t\t\t*set value_farm %+10\n\t\t\t*set connections %+10\n\t\t\tYou stand up. \"I don't believe for a moment that Ahmed or Kustiani has communicated with you at all. You are an expert liar and manipulator, and I for one am glad I live in a city where lying is considered a flaw rather than an attribute.\n\t\t\t\n\t\t\t\"We came here because of tradition and respect, but you have shown no respect for us, our city, or our intelligence. Goodbye, Governor Banyu and the rest of you. We will return for trade purposes, but I hope we shall never cross paths with your esteemed leader again. I would more readily believe and value the words of my worst enemy in Kota Perahu than the slightest word or action from this man.\"\n\t\t\t*goto awkward\n\t\t*elseif empathy \u003c 40\n\t\t\t*set connections %+10\n\t\t\t\"No,\" you say out loud.\n\n\t\t\tGovernor Banyu shoots you a look of distaste but continues speaking.\n\n\t\t\t\"No,\" you say, more loudly. It's amazingly hard to speak at all, and you're terrified that you're causing some kind of international incident…but no man who lies so much deserves the respect of silence, even if he is the governor. \"No. You've had no dealings with either the dolphin farmers or the vegetarians, either past or present. Kota traders know better than to betray one another for the likes of you.\"\n\t\t\t*goto awkward\n\t\t*else\n\t\t\tYou try to stand and cut off the governor's speech, but you're so terrified you can't get your body to obey you. When you try and shout your defiance, all that comes out is a croak.\n\n\t\t\tGovernor Banyu doesn't appear to notice your attempt at shouting at him. He continues on, speaking with such assurance that you begin to wonder if Arkville really is a lush wonderland of privilege and honor.\n\t\t\t*goto awkward\n\t#Subtly soothe everyone's hurt feelings to help them be themselves again.\n\t\t*if empathy > 70\n\t\t\t*set connections %+10\n\t\t\t*set value_farm %+10\n\t\t\t*set value_dollar +0.1\n\t\t\tYou sidle over to Ahmed and tap on the underside of his arm, \"I know you didn't communicate with him.\"\n\n\t\t\tHe casts you a look of sheer relief. It's strange to see such gratitude on the face of your greatest competitor in the farming sector. But he's no backstabbing liar, and you both know it.\n\n\t\t\t\"Thank you,\" he taps back.\n\n\t\t\tGareth sees you tapping to one another, and his eyes widen. \"Kustiani?\" he signs.\n\n\t\t\t\"No way,\" you sign back. \"The governor is lying. I don't believe a word.\"\n\n\t\t\tHe nods, then turns away as he remembers that you're meant to be enemies. It feels very strange for you, a kid, to be reassuring two real adults. Yet here you are. It feels good, too.\n\t\t\t*goto awkward\n\t\t*elseif empathy > 50\n\t\t\t*set connections %+10\n\t\t\tYou catch Ahmed's eye and sign, \"Liar,\" trying to angle your elbow so Governor Banyu can't see. \n\n\t\t\tAhmed shakes his head fiercely, and you realize your message was ambiguous.\n\n\t\t\t\"Not you,\" you sign hastily. \"Him. Banyu's a liar.\"\n\n\t\t\tHe nods sharply, and you notice Gareth nodding so hard his hair is flopping over his forehead.\n\n\t\t\t\"I don't believe a word he says,\" you sign to both of them and receive grateful smiles in return.\n\t\t\t*goto awkward\n\t\t*else\n\t\t\tYou take Ahmed's arm, meaning to tap him a message of support, but he jerks away in shock and gives you a disgusted look. \n\n\t\t\t\"I didn't—I don't—\" you stutter.\n\n\t\t\t\"Shh!\" he says.\n\n\t\t\tYou look at Dad for support, but he hasn't even noticed your awkward altercation. Gareth, on your other side, has seen everything, and his face is twisted as if he's trying to make sure you know he's silently laughing at you.\n\n\t\t\tYou just made everything worse.\n\t\t\t*goto awkward\n\t#Break the ugly mood—fast. \n\t\t*if flexibility > 70\n\t\t\t*set reputation %+10\n\t\t\t*set value_farm %+10\n\t\t\t*set value_dollar +0.1\n\t\t\tThere's one sure way to derail any conversation, social event, or awkward moment: you remove your right foot with the speed of long practice and send it skidding across the basketball court, shoe and all. People don't recognize what it is until it comes to a halt at the base of Governor Banyu's podium.\n\n\t\t\tMaya shrieks, and Banyu's rising rhetoric grinds to an abrupt halt. He stares at your foot, thoroughly flummoxed.\n\n\t\t\t\"Oops,\" you say and hop over to retrieve it. Everyone except Dad is so terrified of saying or doing the wrong thing that they can't even bear to look at you. Dad, of course, is probably trying not to laugh at their faces. \n\n\t\t\tWell, that certainly worked a treat.\n\t\t\t*goto awkward\n\t\t*elseif flexibility > 50\n\t\t\t*set reputation %+10\n\t\t\t\"Squid!\" you yell.\n\n\t\t\tWell, that worked: everyone is staring at you. Especially Governor Banyu.\n\n\t\t\t\"There's a squid,\" you say. \"Outside. Probably responding to a minor aftershock, but we should definitely check on the Drylanders in case it's more severe there.\"\n\n\t\t\t\"Squid,\" says Dad with a straight face. \"That is very concerning. We should go.\"\n\t\t\t*goto awkward\n\t\t*else\n\t\t\tYou clear your throat and stand to say something to interrupt and correct Governor Banyu, but your throat gets so dry you fall into a fit of coughing. Dad pulls on your arm until you sit down. \n\n\t\t\tNow, not only has Banyu set you up for a killer fight on the way home but you have made yourself look like a bumbling fool as well. There'll be a special lecture just for you.\n*label awkward\n\nThe meeting wraps up fast, and you get the distinct impression that the Arkvillagers want to save the remaining food. \n\nSoon you're all back in the speeder and heading home.\n\n\"Maya seemed nice,\" Diah signs.\n*fake_choice\n\t#\"Too bad she's not the governor.\"\n\t\t\"Do you think she might be governor some day?\" Diah asks, blushing.\n\n\t\t\"I have no idea,\" you answer truthfully. \"She's very young to be the head of the trading guild.\"\n\n\t\t\"And so humble,\" Diah agrees.\n\n\t\tYou hope Banyu doesn't find some way to take advantage of Diah's new crush.\n\n\t#\"Were you at the same meeting I was?\"\n\t\tShe blushes. \"The governor was horrible, and most people went along with it. But didn't you notice Maya shaking her head when he spoke?\"\n\n\t\t\"I didn't actually,\" you admit. \"But I believe you.\"\n\n\t\t\"Do you think I'll be able to make contact with her directly?\" Diah signs.\n\n\t\t\"As long as you're careful,\" you sign while speaking aloud. \"It might actually help us find a way to deal with them without going through Banyu.\"\n\n\t#\"Is everyone okay?\"\n\t\t\"Do you think Maya will get in trouble for helping us?\" Diah signs in alarm.\n\n\t\t\"Uh…what?\" you say.\n\n\t\t\"She was so nice, even though the governor was so horrid,\" she explains.\n\n\t\t\"I don't think he noticed her being friendly,\" you sign, bemused at Diah's concern.\n\nOnce you're home, Dad takes you straight to his office and then pings Mom to join you. You wonder silently if he really expects her to respond in the middle of a work day—and then she arrives, wrapped in a robe and still dripping, less than ten minutes later. It's the first time you've seen Mom in Dad's office, and it feels weird. Mom is water; Dad is paper. They're a team, but their work doesn't overlap.\n\nIt seems Mom is treating this as a real emergency.\n\n\"Alright, ${name},\" Mom says. \"Report.\"\n*choice\n\t#Analyze what I saw in the meeting.\n\t\t*if appraisal > 40\n\t\t\t*label people\n\t\t\tYou think carefully before you speak, then choose to trust in your impressions. \"Governor Banyu is ruthless in looking for an advantage. He has no interest in a mutually beneficial trade, but he's very interested in destroying our advantage, even if it ruins Arkville's own prospects.\"\n\n\t\t\t\"So, he hasn't changed,\" Mom says dryly.\n\n\t\t\t\"Most of his senior personnel are happy to do things his way,\" you say. \"The one exception is the new head of the trading guild, a younger woman named Maya. She and Diah are attracted to one another. Maya seems nice—perhaps too nice to stand up to Banyu for long.\"\n\t\t\t*goto winner\n\t\t*else\n\t\t\tAll you really know about the meeting is that it was a diplomatic ambush. \"Governor Banyu knows so much about Kota politics. He knows exactly how to get us fighting one another, and his presence is…well, scary. I'm not sure how to deal with him, and even Ahmed was shaken from the stuff he said. It went badly. That's all I know.\"\n\t\t\t*goto loser\n\t#Tell her how trading should proceed.\n\t\t*if bargaining > 50\n\t\t\t\"The governor is a liar, a manipulator, and bent on destroying anything to do with Kota—but you knew that already, didn't you?\"\n\n\t\t\tMom nods, waiting for you to add some new information to the situation.\n\n\t\t\tYou can do this. You have the mind of a trader, bent on seeing the cracks where you can make a profit.\n\n\t\t\t\"Maya is the key,\" you say. \"She's young and already half in love with Diah, and she definitely doesn't approve of Governor Banyu's methods. She wants to trade properly and will gladly trade with us on the side if we give her a chance.\"\n\t\t\t*goto winner\n\t\t*else\n\t\t\tUgh. Trading and trading tricks are really not your strength. \"Their clothes weren't that nice,\" you say. \"Even Governor Banyu's clothes were faded and beginning to fray at the edges. It's not a rich city, and Banyu's variety of corruption isn't the monetary kind. I'm…not sure how to exploit him. He's not like other politicians. He just really, really hates us.\"\n\t\t\t*goto loser\n\t#Describe the social patterns I observed. Humans are animals, after all.\n\t\t*if shark_sense > 60\n\t\t\t*goto people\n\t\t*else\n\t\t\t\"Governor Banyu is the boss,\" you say. \"Everyone follows him.\"\n\n\t\t\tMom and Dad look at you expectantly, clearly expecting something less obvious.\n\n\t\t\t\"Uh…Maya seemed nice?\" you say. \"Or possibly just too stupid to realize she has to follow Banyu or die.\"\n\t\t\t*goto loser\n*label winner\n\n*set value_farm %+10\n\"Thank you,\" says Mom. \"That's a solid analysis, and very useful.\"\n*goto mission\n*label loser\n\n\"Mmm,\" says Mom, unimpressed.\n*label mission\n\n\"Maya is the key,\" says Dad. \"Maya and Diah.\"\n\nHe looks faintly exasperated that you weren't the one to catch the eye of the high-ranking Arkvillager. \n\n\"I want you to help them, ${name},\" he says. \"To that end, I'll deposit five hundred Glass in your account for incidentals.\"\n\n\"Um…what?\" you say.\n\n\"It would be inappropriate for me to encourage a romance including my work experience student,\" he says. \"But I imagine you're not averse to playing Cupid.\"\n\n\"They would be cute together,\" you admit, leaving aside any more mercenary reasons.\n\nHe nods at you, then at the door. You head out.\n*set net_worth +500\n*choice\n\t#Go talk to Diah.\n\t\t*set diah %+10\n\t\tDiah has gone straight back to work after the trip to Arkville, except now she's standing at the food chute with her hands full of half-rotted food, staring dreamily into space.\n\n\t\t\"Diah!\" you tap on her arm. \"Chuck the food in the water before the sharks decide to come to you.\"\n\n\t\t\"Huh?\" she signs back, spilling food. \"Oh!\"\n\n\t\tYou help her with the rest of the feeding, and the two of you go together to clean up afterward.\n\t\t*fake_choice\n\t\t\t#\"So…you and Maya?\"\n\t\t\t\t\"What?\" she signs. \"Who told you?\"\n\n\t\t\t\t\"Oh, Diah,\" you sign back with an eye roll. \n\n\t\t\t#Wait for her to bring up her new crush.\n\t\t\t\tIt doesn't take long. She starts daydreaming again before she's even finished washing her hands.\n\n\t\t\t\tYou wait patiently, and sure enough she snaps out of it eventually and immediately confesses, \"I can't stop thinking about Maya.\"\n\n\t\t\t\t\"No kidding.\"\n\n\t\t\t#\"I think Maya likes you. Romantically.\"\n\t\t\t\t\"What? No! Really?\" she says.\n\n\t\t\t\t\"Yes, really.\" You smile at her. \"She's almost as obvious as you are.\"\n\n\t\tDiah blushes. \"What do I do next?\"\n\n\t\tYou've already checked that Arkville's sign language is close enough to Kota's that conversation between the two is possible.\n\t\t*fake_choice\n\t\t\t#\"Impress her with an epic date—my dad will even pay for it.\"\n\t\t\t\t*set net_worth -500\n\t\t\t\t\"That sounds fun, but weird,\" she says.\n\n\t\t\t\tYou shrug. \"He wants to establish ties with Arkville that don't go through Banyu. The money is yours if you want it, but you don't have to have it.\"\n\n\t\t\t\tShe nods thoughtfully. \"If I take it, I'm telling Maya everything.\"\n\n\t\t\t\t\"Sure.\"\n\n\t\t\t#\"You'll figure it out.\"\n\t\t\t\tShe casts you a doubtful look. \"I didn't notice those signs of attraction you say were so obvious.\"\n\n\t\t\t\t\"That's because you don't realize how great you are. But I have now pointed them out, so my job here is done.\"\n\n\t\t\t\tShe claps her hands delightedly. \"Okay, maybe I have some ideas of what might be fun.\"\n\n\t\t\t#\"Tell her how you feel.\"\n\t\t\t\t\"By passing out in front of her, or with words?\" she signs.\n\n\t\t\t\t\"I recommend using words.\"\n\n\t\t\t\t\"Cool,\" she signs. \"I can talk words. More or less.\"\n\n\t\t\t\t\"You'll be spectacular.\"\n\n\t\t*goto date\n\t#Find a way to contact Maya without her superiors knowing.\n\t\t*set maya %+10\n\t\tYou take your time setting up a fresh account that isn't linked to you or to the shark farm. Just for kicks, you make it look like it comes from Old Sydney. You take the time to add some minor activity to the account so it doesn't look glaringly fake or new. Then you spread a wide net via interlinked gaming sites, joining Maya in a game you used to like a few years ago and making some in-game trades before opening a chat link on the side.\n\n\t\t\"This is ${name},\" you say, \"From Kota Perahu. I…well, I'd like to be friends.\"\n\n\t\tThere's a long silence, and you hope you're not talking to some other Maya. \n\n\t\tThen she speaks: \"Is Diah with you?\" She's signing at the same time as speaking, so clearly she's fluent in sign language. And based on that tiny sample, the Arkville dialect is close enough that conversation between the two is possible.\n\t\t*fake_choice\n\t\t\t#\"I can link her directly to you, if you like.\"\n\t\t\t\t\"Really?\" she says. \"But not now! I'm not ready.\"\n\n\t\t\t\tYou flick the sound off so you can laugh without her feeling mocked. \n\t\t\t\t*label cupidness\n\n\t\t\t\t\"You two are so well suited. I'll send you her details and let her know to expect you. In-game is probably the best route to avoid attention from the governor.\"\n\n\t\t\t\t\"Got it,\" she says. \"Thank you.\"\n\n\t\t\t#\"Can I trust you not to report me to Governor Banyu?\"\n\t\t\t\t\"If I say 'yes' will you believe me?\" she says.\n\n\t\t\t\t\"Actually, yes,\" you say. \n\n\t\t\t\t\"Then yes.\"\n\n\t\t\t#\"No…but she's definitely attracted to you.\"\n\t\t\t\t\"She what? Who? Really?\" she says, and you're pretty sure you can hear her blush through the speaker.\n\t\t\t\t*goto cupidness\n\t\t*goto date\n\t#Ask Yunus for advice.\n\t\t*set yunus %+10\n\t\tYou wouldn't put it past Banyu to have someone listening in on your communications, so you take the time to set up a secure link to Yunus before you ping him. He takes a while to answer, but you're content to spend the time just thinking about Arkville, and undersea earthquakes, and your future. While you're waiting, you confirm that Arkville's sign language is close enough to Kota's that the two can communicate easily.\n\n\t\t\"Hey,\" Yunus says at last. \"Why the new link?\"\n\n\t\t\"Arkville is here, and they're…trouble.\" You tell him everything in detail—starting with Dad's opinion of Governor Banyu.\n\n\t\t\"Thank you for this,\" he says at last. \"My parents and I will mitigate the damage, as much as we can.\"\n\t\t*goto date\n\t#Ask Kassie for advice.\n\t\t*set kassandra %+10\n\t\tYou send her a locational ping to show her you're heading over, and she meets you in a random corridor along the way. It goes straight through someone else's house, and why not? It's not like your conversation will turn noisy.\n\n\t\t\"How was Arkville?\" she signs, putting an unnecessary flourish on the \"ark.\"\n\n\t\tYou don't need words for your answer. Kassie knows your face.\n\n\t\tFrom there, you talk about what you want from Arkville and how to get it. Fortunately, Kassie has checked that Arkville's sign language is close enough to Kota's that the two can communicate easily.\n*label date\n\nIt's less than three days later when Kassie shows up at your hatch with that manic gleam in her eye.\n\n\"We have to help them,\" she says.\n\n\"Help who?\"\n\n\"Arkville.\"\n*finish Chapter Eleven\n*label arkville_intro\nThe trip over is a lot shorter than the trip to dry land. Part of that is because Diah's in the speeder along with you, Dad, Ahmed, and a vegetarian man you don't know by the name of Gareth.\n\nIt's clear as you draw nearer that Arkville's allocation of Glass was insufficient. The network of spheres is barely big enough to qualify as a city, and it's immediately obvious that every sphere is occupied—most of them by two or three families. There are rows and rows of washing strung like necklaces around the spheres. The colors are so faded they all look brown and gray.\n*fake_choice\n\t#\"Are they…okay, Dad?\"\n\t\t*set empathy %+10\n\t\t\"That depends entirely on your definition,\" he says. \"Certainly, their local GDP is considerably lower than ours.\"\n\n\t\tDad always gets technical when he's avoiding a question.\n\n\t#\"This place sucks. They can't afford us.\"\n\t\t*set empathy %-10\n\t\tGareth sneers at you. \"Hungry people will pay whatever price we name.\"\n\n\t\tHe's a jerk, but he's right. There are opportunities here.\n\n\t#\"Do they speak all the same languages here?\"\n\t\t*set curiosity %+10\n\t\t\"Fundamentally, yes,\" says Ahmed. \"There are several local dialects since the population was pulled from all of the fullest refugee centers in the Asia Pacific region, but almost everyone speaks English. The degree of fluency varies, but there'll always be someone handy nearby. It's worth noting that the genetic trait that is so prolific in Kota, making around one-third of the population hearing impaired, is recessive here. So sign language is a lot less common, and they haven't evolved their own tapping system.\"\n\n\"Okay,\" you say.\n*return\n", "chapter_thirteen": "*set temp 0\n*set reputation %+20\n*set connections %+10\n*set value_farm %-20\n*comment elevator 1, 2, 3 from bad results in NewSyd 12a\n\n*if elevator > 0\n\tYou wait in the elevator for what feels like forever. No one told you that trying to save a city would end up with you trapped and frightened in a hole in the ground.\n\t*fake_choice\n\t\t#\"Should we sing a song or something?\"\n\t\t\t\"Aren't things bad enough?\" growls one of the Drylanders, and you subside at once.\n\t\t#\"We're going to be all right.\"\n\t\t\tNo one responds, although you can hear from their breathing that they're still both alive and awake.\n\n\t\t\tWell, you tried.\n\t\t#\"I'm sorry I didn't come sooner.\"\n\t\t\t\"Don't be so full of yourself,\" growls one of the Drylanders. \"If you didn't cause the earthquake, you can hardly be blamed for it.\"\n\n\t\t\tIt's more or less comforting.\n\t\t\t*if yunus_dies = true\n\n\t\t\t\tIf only you could have saved Yunus.\n\t\t\t\t*goto rescuers\n\t\t\t*else\n\t*label rescuers\n\n\n\tThe rescuers find you at last, and you are sent home to Kota and taken straight to an emergency ward.\n\n\t*goto hosp\n*else\n*label hosp\n*if hospital > 0\n\tAfter a few days, you are sent home from hospital. You're fundamentally all right, and there are incoming refugees who need care far more than you. Dad takes you home, where Mom is waiting. You see her pacing up and down through the Glass and wonder for a moment if something bad has happened at the farm. But for once it's you she's worried about. Somehow that doesn't make you feel any better. They place dinner in front of you, but you can't eat. Dad eventually notices and tells you to go to sleep.\n\n\tSoon you find yourself sitting on your own bed as if nothing has happened. Everything is as you left it: calm water below and around you, and your own books and clothes and prosthetics strewn about. It feels like the sea should be weeping, or raging, or breaking through the Glass to swallow you.\n\n\tSurely you'll never sleep again.\n\n\t*goto city_data\n*else\n*label city_data\nDamage reports trickle in from around Kota Perahu as well as Arkville and the two Sydneys.\n*if (kassie_dies = true) and (sharks_moved = 1)\n\tEvery time there is a new piece of information you feel like sending Kassie a ping, but you resist. Kassie is gone; killed among the Arkville sharks. It hits you like a punch in the gut every time you forget—and then remember.\n\t*goto fel\n*elseif (kassie_dies = true) and (sharks_moved !=1)\n\t\n\tThe flood of information about the disaster overwhelms you so much that you switch your wrist-com off for the first time in your life. You can't handle seeing one more catastrophic picture or video. Presumably those who need to speak to you will ping you via your home sphere.\n\t*page_break\n\tAfter a full day has passed with an eerie silence from your wrist, you realize Kassie hasn't contacted you. It's possible she thinks you're deliberately blocking her. So you turn your computer back on, meaning to just send a simple text that you're resting and will be in touch soon. But the text bounces. That's never happened before—but of course a lot of networks are having issues.\n\n\tYou ping her house, and wait. It's a long wait. Perhaps she's deliberately blocking you? But why would she do that? You're starting to come up with bizarre theories on how you might have caused offense when your computer finally beeps to say that she has replied—except it's not her, but her mother.\n\n\t\"Why are you calling us?\" her message reads. \"Last time we saw Kassandra, she said she was going to stay with you a few days and not to worry.\"\n\n\tEverything in you freezes as you stare at the message, reading it over and over and hoping it means something different. Kassie went to Arkville, to help move the sharks. Kassie, who nearly died communicating with sharks once before. Kassie, who you encouraged to continue in her illegal mind experiments. Kassie, who dropped off the communication grid just before the earthquake.\n\n\tYou call Folami, who immediately panics at the thought that Kustiani might have hurt Kassie. She goes to check hospital lists of unidentified people who are dead or unconscious. But you already know the truth. You call Maya, who breaks down weeping the second you mention Kassie's name. Maya hasn't seen her either, but she's able to pinpoint the moment Kassie's wrist com stopped working, and then track her location. Kassie vanished while underwater. \n\n\tMaya is still sobbing when she clicks off, and Diah is stroking her hair.\n\n\tYou stare at your wall for a long time, unable to let yourself admit what you already know.\n\t*page_break\n\tKassie is dead.\n\n\tLike a coward, you ask Dad to tell her parents. You turn your computer off again and lie down in bed on your stomach, staring at the hatch as if she'll pop up at any moment and tell you it was all a terrible mistake. But she's never coming back. Not today, not in a little while. She saved thousands of lives, but lost her own.\n\t*goto fel\n*elseif Kassie_dies = false\n\tKassie obsesses over every broken house, and every lost life. But you're thankful every day that she is safe.\n\t*goto fel\n*else\n*label fel\n*set value_dollar + 0.2\nKota is fundamentally fine. It's surreal to overhear people discussing the earthquake as if it happened somewhere far away, to people that are no more than statistics on a screen.\n\n*page_break\n*if (newsyd_saved > 1)\n\t*achieve saved_newsyd\n\tNew Sydney is in bad shape, but most people were evacuated in time thanks to Kassie's \n\t*if ally_folami = true\n\t\twarning—and thanks to Yunus and Folami. Yunus is deeply embarrassed that he is suddenly a hero in his own city. Folami has been given her own private dwelling years before she could have afforded it.\n\t\t*goto city_two\n\t*elseif ally_ahmed = 2\n\t\twarning—and thanks to Yunus, who is deeply embarrassed that he is suddenly a hero in his own city. He keeps insisting that Ahmed's help was crucial, and making your parents wish they were the ones to assist him and reap the profits.\n\t\t*goto city_two\n\t*else\n\t\twarning—and thanks to Yunus, who is deeply embarrassed that he is suddenly a hero in his own city. He keeps insisting that your parents' help was crucial, and recommending that people eat more Kota Perahu shark.\n\t\t*set value_farm %+10\n\t\t*goto city_two\n*elseif newsyd_saved = 1\n\tNew Sydney is in bad shape, but most people were evacuated in time thanks to you and\n\t*if yunus_dies = true\n\t\tYunus. Your counselor tells you that Yunus's death isn't your fault, but you don't believe him. Somewhere, somehow you should have done things differently.\n\t\t*achieve saved_newsyd\n\t\t*goto sleep\n\t*else\n\t\tYunus, who is deeply embarrassed that he is suddenly a hero in his own city. \n\t\t*achieve saved_newsyd\n\t\t*goto city_two\n*else\n\tNew Sydney is in bad shape, and less than half the city was evacuated in time.\n\t*if yunus_dies = true\n\t\tYunus was not one of them. Your counselor tells you that Yunus's death isn't your fault, but you don't believe him. Somewhere, somehow you should have done things differently.\n\t\t*label sleep\n\n\t\tEvery time you sleep, you have nightmares of what his death must have been: most of those who died did not die right away. They were stuck underground for hours or days as their air slowly ran out. The electricity was out for most city levels the whole time. He must have been so scared.\n\n\t\tYou wake screaming, and then remember that you're safe and it was just a dream. Except it wasn't a dream.\n\t\t*if yunus_love = true\n\t\t\tThe man you love is dead, and because of you he died alone.\n\t\t\t*goto city_two\n\t\t*else\n\t\t\tYunus is dead, and you let him die alone.\n\t\t\t*goto city_two\n\t*else\n\t\tYunus is deeply embarrassed that he is suddenly a hero in his own city. \n\t\t*goto city_two\n*label city_two\n\n*if arkville_moved \u003c 2\n\tArkville's water and electricity systems are badly damaged, and dozens of spheres are broken beyond repair. The number of casualties is higher every time you look. Fortunately, Diah and Maya are safe. Diah is acting as Maya's assistant as they both work on putting the city back together. \n\t*goto city_three\n*else\n\tThe head engineer of Arkville is running an investigation into why Arkville was moved without his permission, but he's getting mocked in every news site and radio show in and out of Arkville. Governor Banyu is being hailed as a visionary leader. He's even more powerful than before, but presumably the rest of Arkville would prefer to be alive and under his thumb than dead. Perhaps it's a good thing the population will never know what you did to save them.\n\n\tFortunately, Diah and Maya are safe. Diah is acting as Maya's assistant as they both work on putting the city back together. \n\t*achieve saved_arkville\n*label city_three\n*if sharks_moved = 0\n\n\tAt least Arkville's shark overpopulation problem is solved, in a manner of speaking: so many sharks frenzied themselves to death that the water around Arkville still looks like stew.\n\t*if kassie_dies = true\n\n\t\tEvery time you hear about it from a thousand and one blaring news walls and wrist-coms your breath stops in your chest. Kassie died trying to save those awful sharks, and nothing will ever be the same. She saved so many lives only to lose her own.\n\n\t\tStupid mind-tek.\n\n\t\tStupid Kassie.\n\n\t\tStupid $!{name}, for not being able to save her.\n\t\t*page_break\n\t\t*goto city_four\n\t*else\n\t*goto city_four\n*else\n\tAt least their shark overpopulation problem is solved thanks to your efforts. There are a lot of conspiracy theories about where so many of their sharks disappeared to, but it's unlikely anyone will uncover the truth.\n\t*if value_farm \u003c 20\n\t\t*set value_farm 21\n\t\t*goto city_four\n\t*else\n\t\t*goto city_four\n*label city_four\n\nOld Sydney has once again been shaken, this time literally. And it's been flooded, again. \n*if oldsyd_saved = 0\n\tThings are bad there. As bad as the early days after the Melt, when diseases hit the city in waves and more than half the population died. Of course simply telling Old Sydneysiders of the danger wasn't enough. They have a long history of refusing to listen to scientists, or to anyone trying to help them. You feel a mixture of anger, pity, and frustration.\n\t*goto later\n*else\n\tThanks to Kassie's experiments, it's not as bad as it could have been. Most of the most vulnerable buildings were evacuated to safety, although it remains to be seen whether any of the survivors will accept the offers of permanent residence in New Sydney or Kota. They have a long history of refusing to listen to scientists, or to anyone trying to help them. \n\t*achieve saved_oldsyd\n*label later\n*if value_farm \u003c 20\n\n\tThe shark farm looks all right on the surface, but the sharks frenzied underneath the water and destroyed the infrastructure. Unless there's a miracle, the shark farm is doomed. Kota will have to buy sharks from Arkville.\n\t*set value_dollar -0.3\n\t*achieve kill_farm\n\t*goto find\n*else\n\n\tThe sharks on your home farm were badly shaken by the earthquake, but the damage was minimal.\n\t*achieve saved_farm\n*label find\n\nYou find yourself sleeping more, and having awful dreams of crushing waves and giant-eyed squid wrapping their tentacles around you so that you're helpless to move. \n*if kassie_dies = true\n\tSometimes Kassie is there, under the water. Sometimes she's a squid, terrified and deadly in her dying.\n\t*goto ty\n*else\n*label ty\n*if yunus_dies = true\n\tYunus appears sometimes, trapped in a loop of deadly tentacle and begging you to save him as he's dragged into the depths of the sea.\n\t*goto tyy\n*else\n*label tyy\n\nWhen you wake up, you're exhausted. Dad's eyes are as red as yours, and you have an awful feeling this is what it's like to be an adult. \n\nYou obediently attend all your mandatory counseling sessions, and you learn that you're both wrong and right. The weight of responsibility—both for those you saved and for those you failed to save—is often a part of leaving childhood behind, but you also need to let go of what could have been. You didn't cause the earthquake. And you need to see the up side to your new life. You're stronger now, and better known around both Kota and the nearby cities. Everything has changed, but not all of it is bad.\n\n*if (kassie_dies = true) and (yunus_dies = true)\n\tYes, you have lost two of your closest friends. That is going to hurt like broken Glass in your chest for a long time to come. But you don't have to die with them, and you have other friends, and workmates, and parents. None of that seems worth anything at the moment, but it will one day.\n\t*goto mourning_one\n*elseif (kassie_dies = true) or (yunus_dies = true)\n\tYes, you have lost one of your closest friends. That is going to hurt like broken Glass in your chest for a long time to come. But you don't have to die from pure grief, and you have other friends, and workmates, and parents. None of that seems worth anything at the moment, but it will one day.\n\t*goto mourning_one\n*else\n*label mourning_one\n*if kassie_dies = true\n\t\n\tThere is no one like Kassie, and there never will be. She was brilliant, and stupid, and stubborn. Perhaps you should have tried harder to stop her experimenting on herself—but that might have cost many more lives. \n\n\tNo matter how many times you try to convince yourself that Kassie sacrificed her life to save others, you can't help wishing she'd lived instead.\n\t*goto mourning_two\n*else\n*label mourning_two\n*if yunus_dies = true\n\n\tYunus risked everything to befriend you, and in the process saved some of his city. But he didn't save himself. If you'd made different choices he would be alive, but that doesn't mean his death is your fault. Does it?\n\n\tThat question haunts you, and no amount of counseling can make you feel less of a failure.\n\t*goto mourning_three\n*else\n*label mourning_three\n*page_break\nRecovery from the earthquake will not be easy. Your legs are a mess, and you're confined to stompers for at least three days. It could be a lot worse.\n\nYou're fundamentally all right, at least physically. Others weren't so lucky.\n\nYour local government has made it abundantly clear that no one your age will get a job unless they put in a solid number of hours assisting the nearby cities. So once you're walking easily again, it's time to \"volunteer\".\n*choice\n\t#I'll do something independent, so I can slack off without anyone knowing.\n\t\t*choice\n\t\t\t#I've done enough, and I need a break.\n\t\t\t\tA lot of people are bright with heroic purpose, desperate to help out in any way they can. Not you, though.\n\t\t\t\t*goto slacker\n\t\t\t#I only care about Kota, but I can survive New Sydney.\n\t\t\t\t*label slacker\n\t\t\t\tYou're given a choice of several assignments, and you pick 'Sector Cleanup' partly because it's unsupervised, and partly because you've had practice dealing with the awful darkness and dead air of New Sydney. The New Sydnians are nice enough to give you a section on Level Six, relatively close to the surface.\n\t\t\t\t*if yunus_dies = false\n\n\t\t\t\t\tYunus sends you a message asking if you'd like his company.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#\"No thanks.\"\n\t\t\t\t\t\t\t*set yunus %-20\n\t\t\t\t\t\t\tIt's impossible to read tone through text, but you know he'll feel rejected all the same. Oh well. \n\n\t\t\t\t\t\t\t*label cart\n\t\t\t\t\t\t\tYou've been given a large cart on wheels to fill with whatever small rubbish you find. It has a smaller section for anything that's possibly of value to be sorted by the people whose homes have been damaged. The corridor is dusty and makes you cough, so you soon decide to take a seat and while away the hours reading a book on your wrist-com. \n\n\t\t\t\t\t\t\tFolami drops by to check on you and laughs as she rounds the corner and sees you. \"Being helpful, I see?\"\n\n\t\t\t\t\t\t\t\"Surely I've done enough,\" you retort. \"Saving thousands of lives, and all that.\"\n\n\t\t\t\t\t\t\t\"I won't tell anyone,\" she says. \"I gather you're not having a panic attack?\"\n\n\t\t\t\t\t\t\t\"Not today.\"\n\n\t\t\t\t\t\t\t\"Great. I'll go check the others.\"\n\n\t\t\t\t\t\t\tUnfortunately, the next person assigned to check on Kota's volunteers isn't so casual. Your slacking off is observed and a note is made in your file that may harm your future prospects.\n\t\t\t\t\t\t\t*set reputation %-10\n\t\t\t\t\t\t\t*goto still_deciding\n\t\t\t\t\t\t#Ghost him.\n\t\t\t\t\t\t\t*set yunus %-30\n\t\t\t\t\t\t\tYou set your computer to block all incoming texts and calls from Yunus, and let yourself breathe a long sigh. That's the end of your friendship—such as it was—with Yunus. \n\t\t\t\t\t\t\t*set yunus_love false\n\t\t\t\t\t\t\t*set temp 1\n\t\t\t\t\t\t\t*goto cart\n\t\t\t\t\t\t#\"Sure.\"\n\t\t\t\t\t\t\tYou've been given a large cart on wheels to fill with whatever small rubbish you find. It has a smaller section for anything that's possibly of value to be sorted by the people whose homes have been damaged. The corridor is dusty and makes you cough, so you soon decide to take a seat and wait for Yunus. \n\n\t\t\t\t\t\t\tWhen he finds you, he sits next to you in silence. The sound of his even breathing is more comforting than all your counseling sessions put together.\n\n\t\t\t\t\t\t\tFolami drops by to check on you and laughs as she rounds the corner and sees the two of you simply sitting together, daydreaming. \"Being helpful, I see?\"\n\n\t\t\t\t\t\t\t\"Surely we've done enough,\" you retort. \"Saving thousands of lives, and all that.\"\n\n\t\t\t\t\t\t\t\"I won't tell anyone,\" she says, raising her hands in surrender. \"I gather you're not having a panic attack?\"\n\n\t\t\t\t\t\t\t\"Nope,\" you say. \"And Yunus is fine too.\"\n\n\t\t\t\t\t\t\t\"Great. I'll go check the others.\"\n\n\t\t\t\t\t\t\tUnfortunately, the next person assigned to check on Kota's volunteers isn't so casual. Your slacking off is observed and a note is made in your file that may harm your future prospects.\n\t\t\t\t\t\t\t*goto still_deciding\n\t\t\t\t*else\n\t\t\t\t\t*goto cart\n\t\t\t#I already know what I want to do with my life.\n\t\t\t\t*choice\n\t\t\t\t\t#I want to work at the shark farm.\n\t\t\t\t\t\t*label farm_query\n\t\t\t\t\t\t*if value_farm > 20\n\t\t\t\t\t\t\tFortunately, despite all that has happened the shark farm is recovering just fine.\n\t\t\t\t\t\t\t*goto rapport_parents\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tUnfortunately, when you announce your intentions over dinner Mom stares at you in shock and Dad begins to cry.\n\n\t\t\t\t\t\t\t\"We've failed you,\" he says. \"All your life we planned to give you a thriving business as your career and inheritance, but lately things have changed.\"\n\n\t\t\t\t\t\t\t\"What are you talking about?\" you say, feeling your crispy shark stick in your throat.\n\n\t\t\t\t\t\t\t\"The farm is dying,\" he says. \n\n\t\t\t\t\t\t\t\"No it isn't,\" you say. \"It can't be. We're fine.\"\n\n\t\t\t\t\t\t\t\"We're not fine,\" Mom says, staring at her empty plate. \"The shark farm is failing. We're declaring bankruptcy tomorrow, which unfortunately means giving it up—patents and staff included.\"\n\n\t\t\t\t\t\t\tDad nods, unable to meet your eyes.\n\n\t\t\t\t\t\t\tThis is it. Your oh so stable future just vanished before your eyes.\n\t\t\t\t\t\t\t*goto still_deciding\n\t\t\t\t\t\t*label rapport_parents\n\n\t\t\t\t\t\tYou find yourself weirdly nervous at dinner. You're a shoo-in for the job. . . aren't you?\n\n\t\t\t\t\t\tDinner sticks in your throat. Your mouth is too dry to swallow. \n\n\t\t\t\t\t\tOnce you're over your massive and embarrassing coughing fit, both your parents are ignoring their own food and looking at you expectantly.\n\n\t\t\t\t\t\t\"I want to work at the farm,\" you say at last. \"Please.\"\n\n\t\t\t\t\t\t*if ((lili + sunny) > 60) and (reputation > 30)\n\t\t\t\t\t\t\t\"Of course you do,\" says Mom. \"We've already set it up so ownership transfers to you next birthday.\"\n\n\t\t\t\t\t\t\t\"What?\" you say. \"Really? Just like that.\"\n\n\t\t\t\t\t\t\tDad shakes his head at you. \"You've shown you'll work hard to care for the farm and protect it from harm. Especially these last few weeks. This isn't a gift; it's something you've earned.\"\n\n\t\t\t\t\t\t\t\"I don't know what to say.\"\n\n\t\t\t\t\t\t\t\"You don't have to say anything,\" says Mom, \"Boss.\"\n\t\t\t\t\t\t\t*set net_worth +1000\n\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tMom and Dad exchange a long look, and your stomach clenches with a horrible premonition of what they're about to say.\n\n\t\t\t\t\t\t\t\"All right,\" Dad says slowly. \"If that's what you want to do. But you need to start at the bottom, like anyone else.\"\n\t\t\t\t\t\t\t*choice\n\t\t\t\t\t\t\t\t#\"How could I be lower than unpaid rubbish sorter?\"\n\t\t\t\t\t\t\t\t\t*goto gottit\n\t\t\t\t\t\t\t\t#\"Of course.\"\n\t\t\t\t\t\t\t\t\t*goto gottit\n\t\t\t\t\t\t\t\t#\"Will I be paid?\"\n\t\t\t\t\t\t\t\t\t*label gottit\n\t\t\t\t\t\t\t\t\t\"The pay isn't great,\" says Dad, blushing for you. \"I can't imagine you'll be moving out of home for several years to come. But you'll get sick pay and holidays like everyone else, and a small raise every year. If you do well, you'll be promoted to a higher position. And if you do badly, you will be fired.\"\n\n\t\t\t\t\t\t\t\t\tYou swallow hard. \"I understand.\"\n\n\t\t\t\t\t\t\t\t\t\"Welcome to the team,\" he says, and reaches across the table to shake your hand. He taps his wrist. \"The forms are ready for you to sign as soon as you like.\"\n\n\t\t\t\t\t\t\t\t\tSo that's that. You're still a rubbish sorter, but now you'll be paid. A bit.\n\t\t\t\t\t\t\t\t\t*set net_worth +100\n\t\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t\t#\"No way. I quit.\"\n\t\t\t\t\t\t\t\t\t\"I thought as much,\" Dad says in disgust.\n\n\t\t\t\t\t\t\t\t\t\"Hey!\"\n\n\t\t\t\t\t\t\t\t\t\"What exactly are you objecting to?\" Dad says. \"The fact that you have to earn a living like everyone else, or the fact that I knew you wouldn't want to?\"\n\n\t\t\t\t\t\t\t\t\tMom's face shows how disappointed she is. At least she appears surprised—and betrayed.\n\n\t\t\t\t\t\t\t\t\tYou excuse yourself and get out of there.\n\t\t\t\t\t\t\t\t\t*goto still_deciding\n\t\t\t\t\t#I want to own the shark farm.\n\t\t\t\t\t\t*goto farm_query\n\t\t\t\t\t#As long as I'm off Kota, I don't care what I do.\n\t\t\t\t\t\t*goto out_of_kota\n\t\t\t\t\t#As long as I don't have to move cities, I don't care what I do.\n\t\t\t\t\t\t*label various\n\t\t\t\t\t\t*if connections > 50\n\t\t\t\t\t\t\tYou have solid connections all over Kota, so that'll help.\n\t\t\t\t\t\t\t*goto bit_a\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t*label bit_a\n\t\t\t\t\t\t*if reputation > 50\n\t\t\t\t\t\t\tYou have a decent reputation, so most jobs are open to you.\n\t\t\t\t\t\t\t*goto bit_b\n\t\t\t\t\t\t*label bit_b\n\t\t\t\t\t\t*if (reputation \u003c= 50) and (connections \u003c= 50)\n\t\t\t\t\t\t\tYour reputation isn't strong, and you haven't built up many useful connections in Kota. \n\t\t\t\t\t\t\t*goto bit_c\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t*label bit_c\n\n\t\t\t\t\t\t*if (shark_sense > 50) and (connections > 50)\n\t\t\t\t\t\t\tAhmed and Musa know you, and know you're gifted with animals. \n\n\t\t\t\t\t\t\tYou take a deep breath and ping Ahmed. His face immediately appears before you, shining up from your wrist.\n\n\t\t\t\t\t\t\t\"Hello $!{name},\" he says. \"What can I do for my favorite shark farmer?\"\n\n\t\t\t\t\t\t\t\"Actually, I was wondering if I could become a dolphin farmer.\"\n\n\t\t\t\t\t\t\tHis smile gets even bigger. \"We'd love to have you.\"\n\n\t\t\t\t\t\t\t\"Does that mean I have a job?\"\n\n\t\t\t\t\t\t\t\"You sure do. I'll draw up contracts and send them over to you in the morning. Given your experience with animals, you'd be starting as a mid-level supervisor.\"\n\n\t\t\t\t\t\t\t\"Thank you!\"\n\n\t\t\t\t\t\t\t\"Ditto.\"\n\t\t\t\t\t\t\t*set net_worth + 500\n\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t*elseif (athletics > 50) and ((reputation > 50) or (connections > 50))\n\t\t\t\t\t\t\tYou're great at all kinds of sport, both above and below the water, and everyone knows it. It's not easy to call up your own school principal and ask for a job teaching sports to people barely younger than you, but you make yourself do it, and to your amazement she says yes.\n\n\t\t\t\t\t\t\tIt's a part time job to start off with, including a lot of mentoring and several courses to complete on your spare days—but you've done it. You're a teacher in the making.\n\t\t\t\t\t\t\t*set net_worth +200\n\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t*elseif (poise > 50) and ((connections > 50) or (reporter_friend > 0))\n\t\t\t\t\t\t\tYou're good at keeping it together on the outside no matter what's happening inside you, so you know you could handle a high-pressure public job, and you're pretty sure you know someone who knows someone who could help you out. Schmoozing seems pretty important in the media biz, so you take your reporter friend out to dinner and let them bring up your future.\n\n\t\t\t\t\t\t\t\"I don't suppose you're interested in a career in front of the camera yourself?\" they ask.\n\n\t\t\t\t\t\t\t\"Actually, yes I am,\" you say.\n\n\t\t\t\t\t\t\tThey nod slowly. \"I can get you on a couple of times, on slow news days, when someone's sick. The rest is up to you.\"\n\n\t\t\t\t\t\t\t\"That's fantastic, thank you!\"\n\t\t\t\t\t\t\t*set net_worth +100\n\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t*elseif (bargaining > 60) and (appraisal > 40)\n\t\t\t\t\t\t\tYou have a knack for trading that's more than just being your father's heir. Right now your personal worth is ${net_worth}.\n\t\t\t\t\t\t\t*if net_worth = 0\n\t\t\t\t\t\t\t\tNo problem. You can borrow twenty Glass dollars off a friend and grow from there.\n\t\t\t\t\t\t\t\t*set net_worth + 20\n\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou can grow from there.\n\t\t\t\t\t\t\t\t*set net_worth + 400\n\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t*elseif flexibility > 50\n\t\t\t\t\t\t\tYou're a pretty good all-rounder, so you can be a freelancer who does odd jobs here, there, and everywhere.\n\t\t\t\t\t\t\t*set net_worth + 300\n\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t*else\n\t\t\t\t\t\t\tYou'll have to learn the skills you need on the job. Municipal Services are hiring, so that's where you go.\n\t\t\t\t\t\t\t*set net_worth + 100\n\t\t\t\t\t\t\t*goto got_a_job\n\t#This is my chance to get a job outside of Kota Perahu.\n\t\t*label out_of_kota\n\t\t*choice\n\t\t\t*selectable_if (arkville_moved > 0) #I want to work in Arkville.\n\t\t\t\t\t*choice\n\t\t\t\t\t\t#Every city needs teachers.\n\t\t\t\t\t\t\t*if (connections > 50) and (connections >= reputation)\n\t\t\t\t\t\t\t\tWith your connections and unique knowledge of Kota Perahu, you're hired by the best university in the city after a phone interview.\n\t\t\t\t\t\t\t\t*set net_worth + 400\n\t\t\t\t\t\t\t\t*if ally_diah_maya = true\n\t\t\t\t\t\t\t\t\tDiah and Maya are thrilled.\n\t\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tHopefully you won't run into Diah, since you never liked her.\n\t\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t*elseif (reputation > 50) and (connections \u003c reputation)\n\t\t\t\t\t\t\t\tWith your good reputation and unique knowledge of Kota Perahu, you're hired by the best university in the city by a phone interview.\n\t\t\t\t\t\t\t\t*set net_worth + 400\n\t\t\t\t\t\t\t\t*if ally_diah_maya = true\n\t\t\t\t\t\t\t\t\tDiah and Maya are thrilled.\n\t\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tHopefully you won't run into Diah, since you never liked her.\n\t\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tUnfortunately you don't have any good connections in Arkville, and your reputation isn't enough to pave the way for you. No one will hire a random kid from Kota Perahu to teach their kid ou're hired by one of the biggest trading firms in the city more or less immediately.\n\t\t\t\t\t\t\t\t*set net_worth +600\n\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t*elseif (reputation > 50) and (connections \u003c reputation)\n\t\t\t\t\t\t\t\tWith your reputation and unique knowledge of Kota Perahu, you're hired by one of the biggest trading firms in the city more or less immediately.\n\t\t\t\t\t\t\t\t*set net_worth + 600\n\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tUnfortunately you don't have any good connections in New Sydney, and your reputation isn't enough to pave the way for you. No one will trust a random kid from Kota Perahu to get a fair price for them.\n\t\t\t\t\t\t\t\t*if (bargaining + appraisal) > 60\n\n\t\t\t\t\t\t\t\t\tFortunately you're good at seeing value and getting it. Within a few days you have a 'cage home' to call your own. It's only three meters long and two meters wide, and has no windows, but it's yours. From there you work your way up to a room, and after a few months of work you hire a local builder to excavate a new home on the edge of the city that's all yours. You rent out half of your new home to a family of four and save up for more excavation. It's a growth market.\n\t\t\t\t\t\t\t\t\t*set net_worth 2000\n\t\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tYou try to do a few deals but you barely break even, and soon you have to admit that this just isn't the right job for you.\n\t\t\t\t\t\t\t\t\t*goto still_deciding\n\t\t\t\t\t\t#I could be a diplomat.\n\t\t\t\t\t\t\t*goto diplomat_test\n\t\t\t\t\t\t#I could raise sharks for them.\n\t\t\t\t\t\t\t*if (reputation + shark_sense) > 80\n\t\t\t\t\t\t\t\tYou're well known for being good with sharks, so getting the job is easy. You're uncomfortably aware that you have an advantage, coming from the famously beautiful Kota Perahu, but you know your own skill and you vow to set up a farm with clear water and delicious stock.\n\t\t\t\t\t\t\t\t*set net_worth + 1000\n\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tUnfortunately you're just a kid no one has heard of, so New Sydney politely declines your assistance.\n\t\t\t\t\t\t\t\t*goto still_deciding\n\t\t\t\t\t\t#I can share some tek with them.\n\t\t\t\t\t\t\t*if foreknowledge > 50\n\t\t\t\t\t\t\t\t*if kassie_dies = 0\n\t\t\t\t\t\t\t\t\tKassie's better at tek than you, but she's one in a million. Growing up on Kota has given you an advantage, and you plan to use it to the fullest. Fortunately the New Sydney scientists agree that your knowledge and skills are worthwhile, and they offer both of you a job at once. \n\t\t\t\t\t\t\t\t\t*if kassandra > 50\n\t\t\t\t\t\t\t\t\t\tYou both move to New Sydney.\n\t\t\t\t\t\t\t\t\t\t*set net_worth + 600\n\t\t\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\t\tYou move to New Sydney.\n\t\t\t\t\t\t\t\t\t\t*set net_worth + 600\n\t\t\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\t\tKassie was better at tek than you, but she was one in a million. Growing up on Kota has given you an advantage, and you plan to use it to the fullest. Fortunately the New Sydney scientists agree that your knowledge and skills are worthwhile, and they offer you a job at once.\n\t\t\t\t\t\t\t\t\t*set net_worth + 600\n\t\t\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t\t*else\n\t\t\t\t\t\t\t\tYou're barely an adult, and your tek knowledge isn't good enough to get you a job.\n\t\t\t\t\t\t\t\t*goto still_deciding\n\t#I'll work, but I'd better get paid.\n\t\t*choice\n\t\t\t#I'm a trader, and I know what I'm worth.\n\t\t\t\t*if bargaining > 60\n\t\t\t\t\t*if appraisal > 40\n\t\t\t\t\t\tOne sphere's trash is another sphere's treasure, and there is a world of trash after the earthquake. You set to work salvaging and sorting, finding out what people want, and giving them that plus more of what they didn't know they wanted. It's still technically volunteering when people are so happy they slip you money and gifts. You end up considerably richer, and after a local news channel stars you in a human interest story you're hired by the biggest trading firm in the city.\n\t\t\t\t\t\t*set net_worth + 2000\n\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto nopey\n\t\t\t\t*else\n\t\t\t\t\t*label nopey\n\t\t\t\t\tYou try to do a few deals but you barely break even, and soon you have to admit that this just isn't the right job for you.\n\t\t\t\t\t*goto still_deciding\n\t\t\t#Haven't I done enough to save everyone else?\n\t\t\t\tWhen you meet the woman who is sorting out \"volunteers\" for the billion and one jobs that need doing, you gently point out that you're tired, your legs hurt, and you've already done a huge amount to help.\n\n\t\t\t\t*if reputation > 60\n\t\t\t\t\t\"Oh!\" she says. \"You're really $!{name}? I'll tick you off at once. Go and relax!\"\n\t\t\t\t\t*set connections %+10\n\t\t\t\t\t*goto still_deciding\n\t\t\t\t*else\n\t\t\t\t\t\"Who did you say you were?\" she asks.\n\n\t\t\t\t\t\"$!{name},\" you say proudly. \"From the shark farm.\"\n\n\t\t\t\t\tShe shakes her head. \"Never heard of you. Congratulations, you're on rubbish duty with the other unskilled kids.\"\n\t\t\t\t\t*goto still_deciding\n\t\t\t#I need the cash so I can choose my own future.\n\t\t\t\t\tWhen you meet the woman who is sorting out \"volunteers\" for the billion and one jobs that need doing, you gently point out that you're tired, your legs hurt, you're barely getting by financially, and you've already done a huge amount to help.\n\n\t\t\t\t*if reputation > 60\n\t\t\t\t\t\"Oh!\" she says. \"You're really $!{name}? I'll put you in a paid position then.\"\n\t\t\t\t\t*set connections %+10\n\t\t\t\t\t*set net_worth + 200\n\t\t\t\t\t*goto still_deciding\n\t\t\t\t*else\n\t\t\t\t\t\"Who did you say you were?\" she asks.\n\n\t\t\t\t\t\"$!{name},\" you say proudly. \"From the shark farm.\"\n\n\t\t\t\t\tShe shakes her head. \"Never heard of you. Congratulations, you're on rubbish duty with the other unskilled kids. And no, you will not be paid for helping those less fortunate than yourself.\"\n\t\t\t\t\t*goto still_deciding\n\t#I need to impress the right people if I want to get a job.\n\t\t*if (poise > 50) or (athletics > 50)\n\t\t\tYou choose a location that's nice and public, and then you work like your future depends on it. It's not easy to look cheerful and non-sweaty while lugging broken concrete and bricks from place to place, but you do it—and it pays off. A local media outlet does a human interest story on you, and you know anyone who searches for your name online will find it.\n\t\t\t*set reputation %+10\n\t\t\t*set net_worth + 800\n\n\t\t\t*goto various\n\t\t*else\n\t\t\tYou choose a location that's nice and public, but you're not fit enough to spend a whole day lugging concrete without looking like you're dying. So you work for hours and hours and all you get out of it is sore muscles and blisters that will keep you out of your prosthetics for days. Well, that and personal satisfaction (or whatever).\n\t\t\t*goto still_deciding\n\t#Settling refugees into Kota is perfect work for a future diplomat.\n\t\tYou're assigned to settle a large Drylander family into a hastily-built sphere on the edge of town. There are two fathers, three grandparents, and six children—half of whom are new to the family due to their own parents dying in the earthquake. Every single one is seasick.\n\t\t*if (flexibility > 60) and (empathy > 60)\n\n\t\t\tIt's an enjoyable challenge to try to help them feel better and to teach them how to travel around Kota when they're used to earthen walls and dim lighting. You spend time getting to know them all, helping to unpack their belongings and put them in touch with businesses that can supply what they lack.\n\n\t\t\tYou're having ginger tea with them when one of the grandmothers links you into a phone call.\n\n\t\t\tThat's when the New Sydney ambassador offers you an apprenticeship. \n\t\t\t*set net_worth + 900\n\t\t\t*goto got_a_job\n\t\t*else\n\t\t\tEverything is vomit, crying, and misunderstandings. You finish your brief period of work knowing you don't want to be a diplomat after all.\n\t\t\t*goto still_deciding\n\t#This is a chance to make my mark as a politician—if I partner with the right people.\n\t\tPolitics is all about who you know, and every politician who's up for future election is making sure they're seen in amongst the \"ordinary\" people. You have ordinary written all over you, which means it's easy to get talking to the movers and shakers and making their day less onerous than it has to be. They're pathetically grateful to be able to talk instead of shoveling rubbish, so you make quite an impression. \n\t\t*set connections %+10\n\t\t*choice\n\t\t\t#Kota matters. Nothing else. We need tighter immigration laws.\n\t\t\t\t*if (poise > 50) and ((connections > 70) and (empathy \u003c 40))\n\t\t\t\t\tYou're well-connected, poised, and fiercely proud of your home city, and you manage to get several changes passed. The politician spearheading your reforms hires you as a paid intern. You're on your way.\n\t\t\t\t\t*set net_worth + 900\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tYou thought you were smart enough and proud enough to make real change happen, but it's not as easy as you thought. Maybe politics isn't for you.\n\t\t\t\t\t*goto still_deciding\n\t\t\t#Kota is a great city, and we can and should help more people.\n\t\t\t\t*if (poise > 50) and ((connections > 70) and (empathy > 60))\n\t\t\t\t\tYou're well-connected, poised, and you know the worth of human beings (even those not born in Kota). As a result, you manage to get several changes passed. The politician spearheading your reforms hires you as a paid intern. You're on your way.\n\t\t\t\t\t*set net_worth + 900\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tYou thought you were smart enough and caring enough to make real change happen, but it's not as easy as you thought. Maybe politics isn't for you.\n\t\t\t\t\t*goto still_deciding\n\t\t\t#I want better pay for younger workers.\n\t\t\t\t*if (poise > 50) and ((connections > 70) and (flexibility \u003c 40))\n\t\t\t\t\tYou're well-connected, poised, and focused. As a result, you manage to get several changes passed. The politician spearheading your reforms hires you as a paid intern. You're on your way.\n\t\t\t\t\t*set net_worth + 900\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tYou thought you were smart enough and focused enough to make real change happen, but it's not as easy as you thought. Maybe politics isn't for you.\n\t\t\t\t\t*goto still_deciding\n\t#Time to up my online game. If I get enough followers, I could get a paid media gig.\n\t\tYou volunteer to film a series of human-interest stories about people recovering from the earthquake. It's a lot of work, but fascinating, and you're optimistic as you watch your number of followers rise.\n\t\t*set reputation %+10\n\t\t*choice\n\t\t\t#With Kassie's tek, I can get unique insights into what's happening.\n\t\t\t\t*if (foreknowledge > 50) and ((poise > 50) and (reputation > 50))\n\t\t\t\t\tWith your reputation, tek experience, and ability to look in control even when you're not, you quickly build followers and manage to use your own show as leverage to get an internship at one of Kota's local media centers. You're on your way.\n\t\t\t\t\t*set net_worth + 200\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tYou get a few hundred followers, but then it all plateaus and you're left with no real job.\n\t\t\t\t\t*goto still_deciding\n\t\t\t#I'm not restricted by safety laws, so I can go anywhere and talk to anyone.\n\t\t\t\t*if (foreknowledge > 50) and ((athletics > 50) and (reputation > 50))\n\t\t\t\t\tWith your reputation, tek experience, and athletic skills, you quickly build followers and manage to use your own show as leverage to get an internship at one of Kota's local media centers. You're on your way.\n\t\t\t\t\t*set net_worth + 200\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tYou get a few hundred followers, but then it all plateaus and you're left with no real job.\n\t\t\t\t\t*goto still_deciding\n\t\t\t#I have a unique style that makes me watchable.\n\t\t\t\t*if (foreknowledge > 50) and ((poise > 50) and (reputation > 50))\n\t\t\t\t\tWith your reputation, tek experience, and ability to look in control even when you're not, you quickly build followers and manage to use your own show as leverage to get an internship at one of Kota's local media centers. You're on your way.\n\t\t\t\t\t*set net_worth + 200\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tYou get a few hundred followers, but then it all plateaus and you're left with no real job.\n\t\t\t\t\t*goto still_deciding\n\t#There are a lot of kids who've suddenly lost parents—and teachers. I'll run classes.\n\t\tIt turns out that shocked and traumatised kids are hyperactive, screamy kids. Their carers are desperately grateful for every second you give, and sometimes you manage to make the kids learn a few things. Maybe even feel a little bit normal.\n\t\t*set connections %+10\n\t\t*choice\n\t\t\t#I want to give the kids stability.\n\t\t\t\t*label teacher_test\n\t\t\t\t*if (flexibility \u003c 40) and (reputation > 50)\n\t\t\t\t\tWith your good reputation and ability to keep the kids focused on school instead of their newfound fears, you do a good job with the kids, and when the voluntary period is over you're hired full-time. You're on your way.\n\t\t\t\t\t*set net_worth + 800\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tYou try to keep the kids doing work rather than mucking up, but it's no good. This is not the job for you after all.\n\t\t\t\t\t*goto still_deciding\n\t\t\t#People have jobs to do. I can keep the kids out of their way.\n\t\t\t\t*if (flexibility > 40) and (reputation > 50)\n\t\t\t\t\tWith your good reputation and ability to adapt to the kids' needs, you do a good job with the kids, and when the voluntary period is over you're hired full-time. You're on your way.\n\t\t\t\t\t*set net_worth + 800\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tYou try to keep the kids doing work rather than mucking up, but it's no good. This is not the job for you after all.\n\t\t\t\t\t*goto still_deciding\n\t\t\t#I just love being around kids.\n\t\t\t\t*if (empathy > 60) and (reputation > 50)\n\t\t\t\t\tWith your good reputation and ability to respond with kindness to the misbehavior of the kids, you do a good job, and when the voluntary period is over you're hired full-time. You're on your way.\n\t\t\t\t\t*set net_worth + 800\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tYou try to keep the kids doing work rather than mucking up, but it's no good. This is not the job for you after all.\n\t\t\t\t\t*goto still_deciding\n\t#Trading. I bet I can connect people from the different cities in a lucrative way.\n\t\tPlenty of people are donating items, and not enough people are donating money. You take some of the less popular items from the donations, and sell them. Soon you have a tidy pile of money to donate—and a reputation for generosity.\n\t\t*set reputation %+10\n\t\t*choice\n\t\t\t#I can make a real difference to destabilized communities.\n\t\t\t\t*goto trader_help\n\t\t\t#I can make a fortune from this.\n\t\t\t\t*label trader_help\n\t\t\t\t*if bargaining > 60\n\t\t\t\t\t*if appraisal > 40\n\t\t\t\t\t\tOne sphere's trash is another sphere's treasure, and there is a world of trash after the earthquake. You set to work salvaging and sorting, finding out what people want, and giving them that plus more of what they didn't know they wanted. It's still technically volunteering when people are so happy they slip you money and gifts. You end up considerably richer, and after a local news channel stars you in a human interest story you're hired by the biggest trading firm in the city.\n\t\t\t\t\t\t*set net_worth + 1000\n\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t*else\n\t\t\t\t\t\t*goto nopea\n\t\t\t\t*else\n\t\t\t\t\t*label nopea\n\t\t\t\t\tYou try to do a few deals but you barely break even, and soon you have to admit that this just isn't the right job for you.\n\t\t\t\t\t*goto still_deciding\n\t\t\t#We can all be better off, thanks to my skills.\n\t\t\t\t*goto trader_help\n\t#I'll get started as a vet. There are a lot of injured animals.\n\t\tKangaroos tend not to be so cute and cuddly close up, but you manage as well as you can bandaging minor wounds and dodging the kicks they aim your way. The real veterinarians give you tips, and by the end of three intense days you're getting pretty good at calming injured animals.\n\t\t*set shark_sense %+10\n\t\t*choice\n\t\t\t#I want to restore balance and health to Arkville's sharks.\n\t\t\t\t*goto shark_help\n\t\t\t#I want to prove I'm as skilled as Mom.\n\t\t\t\tYou make sure your volunteer week is at Arkville; the best place to prove your skills.\n\n\t\t\t\t*if shark_sense > 80\n\t\t\t\t\tIt soon becomes clear that you've surpassed even Mom's genius with animals, and you're offered a job as a shark farmer before the week is out.\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#I accept, and move to Arkville.\n\t\t\t\t\t\t\t*set net_worth + 400\n\t\t\t\t\t\t#I decline graciously, and return to Kota's shark farm knowing it wasn't my parents that got me the job.\n\t\t\t\t\t\t\t*set net_worth + 500\n\t\t\t\t\t\t#I decline graciously, and go to work at the dolphin farm where I know my skills will be valued.\n\t\t\t\t\t\t\t*set net_worth + 500\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tAfter a nasty incident with a hammerhead, you realize shark farming isn't for you after all.\n\t\t\t\t\t*goto still_deciding\n\t\t\t#I want to work with New Sydney's kangaroos.\n\t\t\t\t*if shark_sense > 40\n\t\t\t\t\tAfter a few missteps you get a good sense of how to treat kangaroos; understanding their body language and how to soothe them when necessary. By the end of the week you're offered a job in New Sydney.\n\t\t\t\t\t*set net_worth + 500\n\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t#I accept it at once.\n\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t#I decline graciously, and return to Kota's shark farm knowing it wasn't my parents that got me the job.\n\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t\t\t#I decline graciously, and go to work at the dolphin farm where I know my skills will be valued.\n\t\t\t\t\t\t\t*goto got_a_job\n\t\t\t\t*else\n\t\t\t\t\tAfter a nasty incident with a roo boss, you realize working with animals isn't for you after all.\n\t\t\t\t\t*goto still_deciding\n\t#This is a chance to get people hooked on my family's brand of shark.\n\t\tYou've seen both your parents put on a salesman's personality like clothing when it was required, and that's what you do. Shuffling doubts into the back of your mind, you fill your mind with sharks. How great they are. How low in saturated fat. How delicious.\n\t\t*set value_farm %+10\n\t\t*fake_choice\n\t\t\t#Arkville is a great market, and I intend to break into it.\n\t\t\t#I can get Old Sydney eating Kota sharks from now on.\n\t\t\t#I can get New Sydney eating shark more often than their own kangaroos.\n\t\tYou spend your week donating prime shark cuts wherever people are hungry, and talking up the Kota farm until your throat is sore. Then you talk to your parents.\n\t\t*goto farm_query\n\t#Kassie's tek saved thousands of lives. I want to get into tek myself.\n\t\tIt's a fascinating field, with or without Kassie. You use what you know to assist Arkville's shark farmers in their recovery from the tsunami, and in the process you learn a lot about both sharks and tek.\n\t\t*set shark_sense %+10\n\t\t*set kassandra %+10\n\t\t*choice\n\t\t\t#I want to feel what sharks feel.\n\t\t\t\t*label kass_tek\n\t\t\t\t*if (kassie_dies = false) and (kassandra > 60)\n\t\t\t\t\tYou go to Kassie and tell her how you feel. By the time you finish talking, she's taken a piece of tek from a drawer and handed it to you.\n\n\t\t\t\t\t\"What's this?\" you ask.\n\n\t\t\t\t\t\"You're in,\" she signs. \"I was hoping you'd join me.\"\n\t\t\t\t\t*set net_worth + 400\n\t\t\t\t\t*goto got_a_job\n\t\t\t\t*elseif (kassandra \u003c 60) and (kassie_dies = false)\n\t\t\t\t\tYou go to Kassie and tell her how you feel. By the time you finish talking, she's standing up and shaking her head.\n\n\t\t\t\t\t\"I'm sorry,\" she signs. \"This is my thing, not yours. Please don't ask me again.\"\n\t\t\t\t\t*goto without_kass\n\t\t\t\t*else\n\t\t\t\t\t*label without_kass\n\t\t\t\t\tWithout Kassie, you need to approach the research department at your local hospital. As you talk, you can see them restraining laughter. This is a dead end.\n\t\t\t\t\t*goto still_deciding\n\t\t\t*selectable_if (kassie_dies = false) #I want to work with Kassie.\n\t\t\t\t*goto kass_tek\n\t\t\t#I want to learn more about the brain. It's fascinating.\n\t\t\t\t*goto kass_tek\n*label got_a_job\n*page_break\n*achieve got_a_job\n*if net_worth > 3000\n\t*achieve moolah\n\t*goto real\n*else\n*label real\n\nWork—real work—is exhausting. There's so much to learn and at times you're almost overwhelmed. But you keep working, and you apologize when you screw up, and you work harder than you thought was possible. Then one day, it's a little easier. \n\nAt last a day comes when you actually feel on top of things. Then those days come more and more frequently.\n\nThis is it. This is adulthood. It's not so hard (except when it is). \n\nYour last summer as a teenager feels like a strange dream, and all the more so because of that one fateful day when Australia suffered its worst earthquake and you helped save thousands of lives. It feels like a movie you once saw, except for the grief that still rides inside you. Some days it almost crushes you, and other days it barely hurts at all. The worst part is wondering what might have happened if you'd made different choices along the way. But it's already the past, and you have your present and future to take care of.\n*if ((kassie_love = 1) and (kassandra > 70)) and (kassie_dies = false)\n\t\n\tYou and Kassie face it together—kissing and fighting and agreeing and disagreeing and always choosing to keep loving one another no matter how annoying she is. It's hypothetically possible you sometimes annoy her too.\n\t*page_break\n\t*achieve kassie_love\n\t*goto future\n*elseif (kassie_love = 1) and (kassie_dies = true)\n\t\n\tYou will never stop missing Kassie, your first love. That pain is a strange, burrowing secret inside you. It eats away at you sometimes, but it won't kill you. The person Kassie loved is still alive, and you refuse to surrender to the despair that sometimes overwhelms you when you wish you could talk to Kassie one last time.\n\t*goto future\n*elseif (kassie_love = 1) and (kassie_dies = false)\n\t\n\tYou and Kassie continue dating for a while, but eventually you grow apart. First love rarely lasts, after all. Leaving that relationship behind (not entirely voluntarily, since it was her decision) is just another painful step towards your future.\n\t*goto future\n*elseif ((yunus_love = true) and (yunus_dies = false)) and (yunus > 70)\n\n\tYou and Yunus face it together, despite your different worlds. The one thing you have in common is that you love one another. Sometimes he makes you wish you'd never met, and presumably he also finds you gently irritating on occasion. But then it's a new day, and you'd far rather face it together.\n\t*page_break \n\t*achieve yunus_love\n\t*goto future\n*elseif (yunus_love = true) and (yunus_dies = true)\n\n\tYou will never stop missing Yunus, your first love. Because of him, you grew to care for and understand New Sydney. Because of him, you learned to see from other people's perspective. Because of him, you gasp and rush towards anyone with hair falling in their eyes, thinking, \"Oh, I've missed you!\" only to realize it's not Yunus after all. \n\t*goto future\n*elseif (yunus_love = true) and (yunus_dies = false)\n\t\n\tYou continue dating Yunus for several months, but eventually your love grows stale. After all, you're very different people. You part on friendly terms, although you know in your heart that it was Yunus's choice to break off the romance. Well, so what?\n\t*goto future\n*else\n*label future\t\n\nThe future is terrifying, but you're going to face it with courage and hope.\n\nAlways.\n*goto_scene ending\n*label still_deciding\n\n*goto various\n", "chapter_three": "*set somethings_coming 8\nKassandra leans forward in her chair to stare at Yunus. Yunus copies her posture, keeping his expression interested but not aggressive. Kassie narrows her eyes.\n\nThe setup of the chat screens makes it look like your two closest friends are examining you rather than each other. Your face heats up, and you have to remind yourself that you've chatted easily with both Kassie and Yunus a million times. They just haven't talked to each other. \n\nYunus is the first to sit back. \"Interesting,\" he signs with a careful precision that shows he's far from fluent in sign language—an embarrassing and unusual lack in anyone your age. If only he'd also spoken aloud so you could listen to his voice for a better indication of what he's implying.\n\n\"Hmm,\" Kassie signs, her eyes sparkling with some new scheme. \"Very interesting indeed.\"\n\nYou look from one to another: Kassie's plaited hair has gone fluffy, and Yunus looks like he hasn't slept since you last spoke. Neither one is at their best.\n\n\"Should we talk about the…shark thing?\" Kassie signs.\n\nShe's asking whether you want to discuss shark problems with Yunus. It sounds like she knows something.\n*fake_choice\n\t#\"Of course. I trust Yunus completely.\"\n\t\t*set yunus %+10\n\t\tYunus turns red with either embarrassment or guilt. You can clearly see him groping for something just out of frame, and then a beep sounds.\n\n\t\t\"Uh-oh,\" he signs. \"That's Dad. I have to go. Sorry, ${name}. Nice to meet you, Kassandra.\"\n\n\t\tYou raise a hand in farewell, but his screen goes blank before you can even wave.\n\n\t#\"Certainly. Mom won't like it, but you guys mean everything to me.\"\n\t\t*set yunus %+10\n\t\t*set kassandra %+10\n\t\t*set lili %-10\n\t\tYunus shakes his head. \"I don't want to do something to piss off your mom, even if you think it's okay,\" he signs.\n\n\t\tYou sign back, saying the words at the same time: \"She likes you. In fact, I'm pretty sure she likes you better than me.\"\n\n\t\t\"I'd like to keep it that way,\" he signs and switches out of the conversation.\n\n\t#\"We'd better keep it between you and me for now.\"\n\t\t*set kassandra %+10\n\t\tThere's a pause where everyone looks around as if the scenery of their room is suddenly fascinating.\n\n\t\t\"Oh!\" says Yunus, then remembers himself and makes an exaggerated sign for surprise—while Kassie makes a heroic effort not to laugh at his poor signing. \"I'd better go. We'll talk later.\"\n\n\t\tHis screen clicks off.\n\n\"He's a liar,\" Kassie signs, with a steady gaze.\n\n\"You don't like him?\" you sign back.\n\n\"I like him fine, but he's lying, and not a white lie either,\" she signs.\n\n\"He's been trying to tell me something,\" you sign back.\n\nShe closes her eyes for a moment, thinking. \"That might be it,\" she concedes at last. \"Just…\"\n\n\"Be careful?\" you sign with an eye roll you don't bother suppressing.\n\nKassie nods, then flicks her fingers to indicate a new topic. \"It's not only sharks we should be worried about right now.\"\n*fake_choice\n\t#\"What do you know, and how?\"\n\t\t*set curiosity %+10\n\t#\"How worried are you?\"\n\t\t*set empathy %+10\n\t#\"Is Kota in danger?\"\n\t\t*set curiosity %-10\n\"The good news is that there's nothing fundamentally wrong with the sharks,\" she signs. \"Or the dolphins, for that matter.\" She deliberately wiggles her hand insultingly on \"dolphin,\" knowing the rivalry between the two farms.\n\n\"Food sources are still nontoxic,\" you sign back. \"Good to know. But that was so weird.\"\n
