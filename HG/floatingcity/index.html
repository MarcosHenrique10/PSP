ase.\"\n\nYunus buries his head in his hands. After a long silence, he lifts his head. \"Could you be wrong? Could we be okay after all?\"\n\nShe shakes her head, and he drops his face into his hands again. You reach over and rest your hand on his knee, helpless to do more.\n\nKassie eats more crisps, and the noisy crunching fills your room. You see a shark drift by, far below. Mom says it's good luck to see a shark in the wild. Since the farm has an open-fence system, they're all technically wild. Mom must be the luckiest person in the world.\n\n\"Okay,\" says Yunus. \"So what can we do? If I have to ruin my reputation and lose my future career, so be it. I only hope you have a plan, because I don't.\"\n\n\"The three of us are not enough,\" says Kassie. \"We need to gather everyone that we can, no matter how powerless. Someone might know someone who can make all the difference.\"\n*choice\n\t#Call Diah and Maya first so they know I value their input.\n\t\t*set diah %+10\n\t\t*set maya %+10\n\t\t*gosub diah_maya\n\t\t*page_break\n\t\t\n\t\t\"What about your parents?\" Kassie says.\n\n\t\t*gosub mom_dad\n\t\t*if ally_ahmed = 1\n\t\t\t\"Haven't you been keeping the dolphin farm up-to-date with all the earthquake info?\" says Kassie. \n\n\t\t\t\"Oh! Yes.\"\n\t\t\t*gosub ahmed_pro\n\t\t\t*goto plot_talk\n\t\t*else\n\t\t*goto plot_talk\n\t\t*label diah_maya\n\t\tYou ping Diah since you know her better than Maya. Whatever happens, you're pretty sure you'll get two allies or none from this conversation. They're still caught up in the heady first moments of their relationship, and they're inseparable. \n\n\t\tDiah is smart and hardworking, and as far as you can remember, you've told her so. Or have you?\n\n\t\tShe answers with a holo chat window so detailed you can clearly see a rather underdressed Maya in the background.\n\n\t\t\"We need you—both of you,\" you tell them without preamble. \"There's grave danger to Arkville and the Sydneys, and very few of us who know about it. Will you help us?\"\n\n\t\t*if (diah + maya) > 120\n\t\t\t*set ally_diah_maya true\n\t\t\t\"How?\" says Diah.\n\t\t\t\n\t\t\tAt the same time, Maya says, \"Of course.\"\n\n\t\t\tDiah laughs at her. \"Of course. What can we do?\"\n\n\t\t\t\"Uh…come to my place? We're having a kind of meeting.\"\n\n\t\t\t\"See you in a bit,\" she says and clicks off.\n\t\t\t*goto dm_end\n\t\t*else\n\t\t\t\"Uh…,\" says Diah. \"We're actually rather…busy.\"\n\n\t\t\t\"I can see that,\" you say, and wish you could unsay it. \"Please, trust me. This is important.\"\n\n\t\t\t\"So is this,\" says Diah, confident at last—and clicks off.\n\n\t\t\tUh-oh. That's not a good beginning.\n\t\t\t*label dm_end\n\t\t\t*return\n\t#Call Mom and Dad first so they know they matter most.\n\t\t*set lili %+10\n\t\t*set sunny %+10\n\t\t*gosub mom_dad\n\t\t*page_break\n\t\t\n\t\t\"What about Diah?\" says Kassie. \"Or Diah-and-Maya, as she is currently known.\"\n\n\t\t*gosub diah_maya\n\t\t*if ally_ahmed = 1\n\t\t\t\"Haven't you been keeping the dolphin farm up-to-date with all the earthquake info?\" says Kassie. \n\n\t\t\t\"Oh! Yes.\"\n\t\t\t*gosub ahmed_pro\n\t\t\t*goto plot_talk\n\t\t*else\n\t\t*goto plot_talk\n\t\t*label mom_dad\n\t\tYou lift your hand to ping Dad and hesitate automatically. It's been drummed into you not to bother Dad at work. Shaking off the childish hesitation, you decide to ping Mom.\n\n\t\tUgh, that's even worse.\n\n\t\tGritting your teeth against the feeling of wrongness, you ping both of them. And you flag it as urgent. Hopefully they know you well enough to know that you would never interrupt them without a good reason.\n\t\t*if ally_mom_dad = 1\n\n\t\t\tDad answers immediately. \"What is it? Is there another earthquake? Do we need to separate the sharks?\"\n\n\t\t\tYou're distracted by a ping from Mom indicating she's underwater but will respond as soon as she's out.\n\n\t\t\t\"It's not us,\" you say, realizing that the information you've shared from Kassie's research has primed them for this moment. \"Can you come home?\"\n\n\t\t\t\"I'll be right there, as soon as I fetch Mom,\" he says.\n\t\t\t*goto md_end\n\t\t*elseif (lili + sunny) > 120\n\t\t\t*set ally_mom_dad 1\n\n\t\t\tDad calls you back immediately, and Mom sends a ping from underwater to indicate that she's coming up and will call as soon as she's on land.\n\n\t\t\t\"What's wrong?\" Dad asks. You can actually see someone behind him, and you know you've interrupted a meeting. He really respects you. When did he start treating you as an adult?\n\n\t\t\tYou explain as quickly as possible that you're gathering allies to face the coming earthquake, and he says he'll come to you—and bring Mom.\n\n\t\t\tYou're left feeling a horrifying weight of responsibility, and you remind yourself that this earthquake really is important enough to interrupt daily life.\n\n\t\t\tMany lives will be lost or saved based on what you do.\n\t\t\t*goto md_end\n\t\t*else\n\n\t\t\tDad calls you back right away, and for a mind-altering moment, you feel like he sees you as a responsible adult and an equal. You explain as quickly as possible that there's an earthquake coming and you're gathering people for a crucial meeting.\n\n\t\t\t\"I'm already in a meeting,\" he says, indicating the woman politely waiting behind him. \"In any case, earthquakes cannot be predicted in advance. You know that, ${name}. And Kota Perahu is immune to the effects of earthquakes, even if one struck directly beneath us.\"\n\n\t\t\tHe says goodbye and clicks off.\n\n\t\t\tMom doesn't even respond.\n\n\t\t\tWell, that went exactly as you expected. Unfortunately.\n\t\t\t*label md_end\n\t\t\t*page_break\n\t\t\t*return\n\t#Just call everyone.\n\t\t*gosub diah_maya\n\t\t*gosub mom_dad\n\t\t*page_break\n\t\t\n\t\tYou send an urgent ping to Ahmed, not at all sure if he'll answer. He certainly hasn't treated you badly, especially considering the fact that the shark and dolphin farms are constantly clashing over resources, animal behaviors, and feeding grounds.\n\n\t\tTo your surprise, he answers the ping within minutes.\n\n\t\t*if ally_ahmed = 1\n\t\t\t*gosub ahmed_pro\n\t\t\t*goto ahmed_end\n\t\t*else\n\t\t\"What is it? Is there another incident at the shark farm?\"\n\n\t\t\"Not yet,\" you say and explain everything, concluding: \"I hope you and Musa can join us for a meeting. We're deciding how best to move forward and minimize damage.\"\n\t\t*if connections > 45\n\t\t\t*set ally_ahmed 1\n\n\t\t\t\"Of course,\" he says and asks for your location. \"Musa has to stay with our farm, but I'll apprise him of everything we discuss.\"\n\t\t\t*goto ahmed_end\n\t\t*else\n\n\t\t\t\"I appreciate your warning, but I don't see how it has anything to do with us,\" he says.\n\n\t\t\tWell, it was worth a try.\n\t\t*label ahmed_end\n\n\t\tYou shift to the living room. This is too serious for your bedroom. It doesn't seem like the right time for shark crisps any more, but you're not quite sure what one usually serves at an emergency meeting. You settle on tea and coffee with some plain biscuits from the back of the cupboard.\n\n\t\tSo this is your crisis team. The living room feels crowded, but the entire number of people is pathetically \n\t\t*if ally_folami = false\n\t\t\tsmall. \n\t\t\t*goto its\n\t\t*else\n\t\t\tsmall, even with Folami's image projected on the wall.\n\t\t\t*goto folami_end\n\t\t*label its\n\t\tIt's hard to take yourself seriously. You glance at Kassie and see the same doubt reflected in her eyes. But this is real, and it's happening, and it's up to you to deal with it.\n\n\t\t*page_break\n\t\t\n\t\t\"Folami!\" you say suddenly.\n\n\t\t\"Oh!\" says Yunus. \"I forgot about her—and she's hours away.\"\n\n\t\t\"Let's see if we can loop her in,\" you say, sending her a ping.\n\n\t\tIt turns out her Kota com is still active, and she responds in holo mode, popping up in slightly alarming life size on the wall. \"What's happening?\"\n\n\t\t\"Another earthquake,\" you say. \"Do you think you might be able to help us evacuate New Sydney—not today, but soon?\"\n\n\t\t*if folami > 70\n\t\t\t*set ally_folami true\n\t\t\t\"Absolutely,\" she says. \"Thank you for calling. Greta—that is, my boss—is very powerful here. I'm sure she'll be interested in what you have to say.\"\n\t\t\t*goto folami_end\n\t\t*else\n\t\t\tShe shakes her head, blowing out a breath. \"I'm no one. Even if I trusted you, which I don't, I wouldn't be any use to you.\"\n\n\t\t\tWith that, she ends the connection.\n\t\t*label folami_end\n*label plot_talk\n*page_break\n\n\"Listen,\" says Kassie's artificial voice, which she's altered to sound a full octave deeper. \"There are four major issues to address.\"\n\nYou and Yunus wait for her to elaborate, and she pulls up the map of the ocean depths she used for you earlier. She's typed out an entire speech, and she presses Play.\n\n\"Arkville is here, and hostile to us, and a sitting duck for a tsunami despite technically being at sea,\" says her computer's voice. \"That's one problem. The Arkville sharks are another: even before the tsunami hits, their out-of-control population of sharks is going to sense the coming earthquake and go into a frenzy. With that number of sharks, it will be enough to cause significant damage—and with Arkville's overpopulation issue, there will be concentrated casualties.\"\n\nYunus glances at your face to check it's really as bad as she says. All you can do is nod.\n\n\"Then, obviously, there's New Sydney. That's where an earthquake is likely to do the greatest damage.\"\n\nYunus nods so hard it must hurt his neck. \n*if (ally_ahmed = 1) and (ally_mom_dad = 1)\n\tYour parents have gotten out the good snacks and are treating Ahmed like an honored guest. You know it's bad when the shark and dolphin farmers are cooperating.\n\t*goto old\n*else\n*label old\n\n\"And Old Sydney,\" says Kassie's computer. She switches it off, trusting that the most complicated part of the meeting is over and she can sign from now on.\n\nYou stare at one \n*if ally_folami = true\n\tanother and at Folami's image on the Glass. \n\t*goto erg\n*else\nanother. \n*label erg\nOld Sydney is a scattered, largely lawless community in fragile buildings that manages to be right in the worst possible landscape. The earthquake and the tsunami could each destroy the city on their own. And Old Sydney only exists because of the stubbornness of the locals. They're not going to immediately listen to…well, anyone.\n*fake_choice\n\t#\"We can do this.\"\n\t\t*if (ally_folami = false) or (ally_ahmed = 0)\n\t\t\t\"I appreciate your confidence,\" says Yunus. \"But we need more people.\"\n\n\t\t\t*goto more_allies\n\t#\"We're going to need all the help we can get.\"\n\t\t*label more_allies\n\t\t*label try_ahmed\n\t\t*if ally_ahmed = false\n\t\t\t\"Kassie,\" you sign, \"do you think you could get the dolphin farmers on board?\"\n\n\t\t\t\"Sure I can,\" she signs—and immediately pings them, successfully getting Ahmed to join your meeting.\n\n\t\t\t\"That was impressive,\" you sign to her.\n\n\t\t\t\"I know!\"\n\t\t\t*set ally_ahmed true\n\t\t\t*goto hr\n\t\t*elseif ally_folami = false\n\t\t\t\"Yunus, could you recruit Folami?\" you ask. \"I definitely couldn't, I'm afraid.\"\n\n\t\t\t\"I can try,\" he says—and soon her face is on your wall, listening and agreeing with everything Kassie says.\n\t\t\t*set ally_folami true\n\t\t\t*goto hr\n\t\t*else\n\t\t\t\"This is it,\" Kassie signs grimly. \"It has to be enough.\"\n\t\t\t*goto hr\n\t#\"We're going to need to split up.\"\n\t\t*goto more_allies\n*label hr\n*page_break\n\nThe tea is cold, but you can't bear to leave the room to make more.\n\n\"We need teams,\" Kassie announces. \"Divide and conquer. Specifically, we need four teams: one to evacuate New Sydney, one to evacuate Old Sydney, one to move Arkville, and one more to deal with Arkville's sharks.\"\n\n\"There's no way I can figure out how to start a citywide evacuation on my own,\" says Yunus, \"even though New Syd is my city.\"\n\n*if ally_folami = true\n\t*set newsyd_saved 2\n\t\"I'm the obvious offsider,\" says Folami. \"Let's talk to my boss together, and go from there.\"\n\n\t\"Alright,\" Yunus says slowly.\n\n\tYou can't blame him for not cheering ecstatically. Two teenagers isn't exactly a political powerhouse. But hopefully the shock of the recent earthquake will be enough to ensure they get listened to.\n\t*goto doh\n*else\n\tThere is a long silence. No one volunteers to help him.\n\t*choice\n\t\t#\"I'll come with you, Yunus.\"\n\t\t\t*set yunus %+10\n\t\t\t*label volunteer\n\t\t\t*set newsyd_saved 1\n\t\t\tHe sags in relief.\n\t\t\t*goto doh\n\t\t#\"Anyone going to help?\"\n\t\t\t*if ally_ahmed = 1\n\t\t\t\t*label assign_ahmed\n\t\t\t\t*set ally_ahmed 2\n\t\t\t\t*set newsyd_saved 3\n\t\t\t\t\"I'll go,\" says Ahmed slowly. \"We've been trading with New Syd for more than thirty years. I hope I've built up a reputation for honesty, and not for doomsday prophecies.\"\n\n\t\t\t\t\"Thank you,\" Yunus blurts out. \"I'm sure they'll listen to the pair of us together.\"\n\t\t\t\t*goto doh\n\t\t\t*else\n\t\t\t\tThere is an awkward silence.\n\n\t\t\t\t\"Please,\" says Yunus. \"I'll do my best either way, but I'm just one person. I need someone to help me. There are a million lives at stake, including my own. I need you. Any one of you. Please.\"\n\t\t\t\t*label warning\n\t\t\t\t*if (appraisal > 60) or (self_experimentation = true)\n\n\t\t\t\t\tYour stomach drops. He's not wrong. If Yunus tries to evacuate his city alone, he could literally die. Unbidden, you have an image of him trapped underground and slowly suffocating as the air runs out. Two or three people are a thousand times more convincing than just one. But does New Sydney really deserve your help?\n\t\t\t\t\t*goto aa\n\t\t\t\t*else\n\t\t\t\t*label aa\n\t\t\t\t*choice\n\t\t\t\t\t*selectable_if (ally_ahmed = 1) #\"Ahmed?\"\n\t\t\t\t\t\t*goto assign_ahmed\n\t\t\t\t\t*selectable_if (ally_mom_dad = 1) #\"Mom? Dad?\"\n\t\t\t\t\t\t*set newsyd_saved 4\n\t\t\t\t\t\t*set ally_mom_dad 2\n\t\t\t\t\t\t\"I'm not sure we're the best people, but we have to try,\" says Dad.\n\n\t\t\t\t\t\t\"Agreed,\" says Mom.\n\n\t\t\t\t\t\t\"So you'll come with me?\" Yunus asks.\n\n\t\t\t\t\t\t\"Yes,\" they both say.\n\n\t\t\t\t\t\tHe sags in relief.\n\t\t\t\t\t\t*goto doh\n\t\t\t\t\t#\"I'm sorry, Yunus. This one's all yours. It's do or die.\"\n\t\t\t\t\t\t\"Literally,\" he says under his breath.\n\t\t\t\t\t\t*goto doh\n\t\t\t\t\t#\"I'll come with you.\"\n\t\t\t\t\t\t*goto volunteer\n\t\t#\"You can do it, Yunus.\"\n\t\t\tHe shakes his head at you, his mouth a grim line.\n\t\t\t*goto warning\n*label doh\n*page_break\n\n\"Okay,\" says Kassie. \"That's the biggest issue. Next we need to move Arkville.\"\n\nYou get a horrid sense of vertigo at the magnitude of everything your small group of allies needs to accomplish.\n\n*if ally_diah_maya = true\n\tEveryone looks at Maya. \n\n\t\"I'm not enough,\" she says bluntly. \"And I'm afraid the fact that we're dating will make people dismiss Diah as merely my girlfriend, parroting whatever I say. Or vice versa.\"\n\n\t*if ally_ahmed = 1\n\t\t*set arkville_moved 3\n\t\t*set ally_ahmed 4\n\t\t\"Would it help if I came with you?\" Ahmed asks. \"I've never traded falsely, so hopefully I have some measure of respect, even in Arkville.\"\n\n\t\t\"Thank you so much,\" gushes Maya. \"I have some ideas of what to do, but I could use a sounding board.\"\n\n\t\t\"I can do that,\" he says.\n\n\t\tThe three of them leave at once.\n\t\t*goto sharkbait\n\t*elseif newsyd_saved != 1\n\t\tThere is an awkward moment of silence, and then both women look pointedly at you.\n\t\t*choice\n\t\t\t#\"Don't look at me!\"\n\t\t\t\t*label bite\n\t\t\t\tDiah bites her lip, then signs: \"This won't be easy. We need to go talk.\"\n\n\t\t\t\tMaya tries and fails to hide her enthusiasm regarding another chance to be alone with Diah. You hope they're enough to move Arkville without your help.\n\t\t\t\t*goto sharkbait\n\t\t\t*selectable_if (newsyd_saved !=1) #\"I'll come with you.\"\n\t\t\t\t*set arkville_moved 1\n\t\t\t\t\"Thank you, thank you!\" Maya gushes.\n\t\t\t\t*goto sharkbait\n\t\t\t#\"You can do it.\"\n\t\t\t\t*goto bite\n\t*else\n\t\t*goto bite\n\n*else\n\tNone of you are connected to Arkville, but someone has to try and convince them to move before the coming earthquake.\n\t*choice\n\t\t*selectable_if ((newsyd_saved !=1) and (arkville_moved !=1)) #\"I'll go.\"\n\t\t\t*set arkville_moved 1\n\t\t\t*goto sharkbait\n\t\t*selectable_if ((newsyd_saved !=1) and (arkville_moved !=1)) #\"I'll go—but I could use help.\"\n\t\t\t*set arkville_moved 1\n\t\t\tNo one meets your eye. It looks like you're on your own.\n\n\t\t\t*goto sharkbait\n\t\t#\"Anyone?\"\n\t\t\t*label pick_a_winner\n\t\t\t*if (ally_ahmed = true) or (ally_mom_dad = 1)\n\t\t\t\t*set arkville_moved 3\n\t\t\t\t*if ally_ahmed = true\n\t\t\t\t\t*set ally_ahmed 4\n\t\t\t\t\t\"I'll go,\" says Ahmed. \"Musa and I have traded there before, so at least we have some connections. I hope that'll be enough.\"\n\t\t\t\t\t*goto sharkbait\n\t\t\t\t*else\n\t\t\t\t\t*set ally_mom_dad 4\n\t\t\t\t\t\"Alright,\" Dad says heavily. \"We'll go.\"\n\t\t\t\t\t*goto sharkbait\n\t\t\t*else\n\t\t\t\tKassie shakes her head at you.\n\n\t\t\t\tThat's that then. Arkville is on its own.\n*label sharkbait\n*page_break\n\n\"Obviously, I'll be focused on trying to draw Arkville's sharks away,\" says Kassie.\n*if ally_mom_dad = 1\n\t*set sharks_moved 3\n\t*set ally_mom_dad 5\n\n\t\"And we'll obviously assist you,\" says Mom.\n\n\t\"Thank you,\" Kassie signs.\n\t*goto oldsy\n*else\n\t\"But I could use some help.\"\n\t*if ally_ahmed = 1\n\t\t*set ally_ahmed 5\n\t\t*set sharks_moved 3\n\n\t\t\"I'll come too,\" says Ahmed. \"I'm not entirely ignorant of shark behavior.\"\n\n\t\t\"Thank you,\" Kassie signs.\n\t\t*goto oldsy\n\t*elseif (newsyd_saved != 1) and (arkville_moved != 1)\n\t\tShe turns to you and signs, \"Please.\"\n\t\t*fake_choice\n\t\t\t*selectable_if ((newsyd_saved !=1) and (arkville_moved !=1)) #\"Of course I'll help you.\"\n\t\t\t\t*set sharks_moved 1\n\t\t\t#\"You don't need me, Kassie.\"\n\t\t\t#\"I'm sorry, Kassie. I can't help you.\"\n\t\t\n\t\tShe nods acknowledgment.\n\t\t*goto oldsy\n\t*else\n\t\tShe spreads her hands in a wide shrug. You both know there's no one left to help.\n*label oldsy\n*page_break\n\n\"That leaves Old Sydney,\" you muse aloud. \"None of us have a direct connection there, but they must at least have an awareness of their vulnerability. Maybe it won't be so hard after all.\"\n\nKassie gives you a sad smile. You both know that people are likely to die despite your best efforts. But that doesn't mean you can't try.\n\n*if ally_ahmed = 1\n\t*set ally_ahmed 6\n\t*set oldsyd_saved 3\n\t\"I'll go,\" says Ahmed. \"Wish me luck.\"\n\n\t\"Absolutely,\" you say.\n\t*goto bb\n*else\n*label bb\n*if ((newsyd_saved != 1) and (arkville_moved != 1)) and (sharks_moved != 1)\n\t*fake_choice\n\t\t*selectable_if (((ally_ahmed = 6) and (newsyd_saved !=1)) and ((arkville_moved !=1) and (sharks_moved !=1))) #\"I'll go with Ahmed,\" I say.\n\n\t\t\t\"Thank you,\" Kassie signs.\n\t\t\t*set oldsyd_saved 1\n\t\t\t*goto cc\n\t\t*if (((ally_ahmed != 6) and (newsyd_saved !=1)) and ((arkville_moved !=1) and (sharks_moved !=1))) #\"I'll go,\" I say.\n\n\t\t\t\"Thank you,\" Kassie signs.\n\t\t\t*set oldsyd_saved 1\n\t\t\t*goto cc\n\t\t#\"Don't look at me.\"\n\n\t\t\tKassie turns away, but not before you see her disappointment.\n\t\t\t*goto cc\n*else\n*label cc\n\n\"They'll be alright,\" you say firmly. \"They've been through worse than this.\"\n\nKassie frowns in thought. \"So for New Sydney, Yunus \n*if ally_folami = true\n\tand Folami will do their best to get the city to evacuate.\"\n\t*goto part_two\n*elseif ally_ahmed = 2\n\tand Ahmed will do their best to get the city to evacuate.\"\n\t*goto part_two\n*elseif ally_mom_dad = 2\n\tand Sunny and Lili will do their best to get the city to evacuate.\"\n\t*goto part_two\n*elseif newsyd_saved = 1\n\tand ${name} will do their best to get the city to evacuate.\"\n\t*goto part_two\n*else\n\twill do his best to get the city to evacuate.\" Her frown deepens. \"I really don't think one person is enough.\"\n\n\t\"Neither do I,\" says Yunus, keeping his head up so everyone can see the clarity in his eyes. You focus on your biscuit.\n\t*set yunus_dies true\n*label part_two\n\n*if ally_diah_maya = true\n\t\"Diah and Maya will try to move Arkville,\" you say. \n\t*if ally_ahmed = 4\n\t\t\"Along with Ahmed and Musa.\"\n\t\t*goto part_three\n\t*elseif arkville_moved = 1\n\t\t\"And I'll do my best to assist them.\"\n\t\t*goto part_three\n\t*else\n\t\t*goto part_three\n*elseif arkville_moved = 1\n\t\"I will attempt to move Arkville,\" you say. \n\t*if ally_ahmed = 4\n\t\t\"With Ahmed's help.\"\n\t\t*goto part_three\n\t*else\n\t\t*goto part_three\n*elseif ally_ahmed = 4\n\t\"Ahmed will attempt to move Arkville,\" you say.\n\t*goto part_three\n*else\n\t\"Arkville will…hopefully move themselves in response to our strongly worded email,\" you say, trying to keep your voice from showing that you know an email isn't enough.\n*label part_three\n\n\"I'll be dealing with Arkville's sharks,\" Kassie signs, \n*if ally_mom_dad = 5\n\t\"along with Lili and Sunny.\"\n\t*goto part_four\n*elseif ally_ahmed = 5\n\t\"along with Ahmed.\"\n\t*goto part_four\n*elseif sharks_moved = 1\n\t\"along with ${name}.\"\n\t*goto part_four\n*else\n\tvisibly trying not to wince at taking on such a task solo.\n*label part_four\n\n*if oldsyd_saved = 1\n\t\"Which leaves me \n\t*if ally_ahmed = 6\n\t\tand Ahmed to deal with Old Sydney,\" you say.\n\t\t*goto part_five\n\t*else\n\t\tto deal with Old Sydney,\" you say.\n\t\t*goto part_five\n*elseif ally_ahmed = 6\n\t\"Which leaves Ahmed to deal with Old Sydney,\" you say.\n\t*goto part_five\n*else\n\t\"Which means Old Sydney will need to save themselves,\" you say.\n*label part_five\n\n\"Right,\" Kassie signs. \"Everyone knows what to try to do. Good luck. I'll continue monitoring my various alert systems, and if things intensify I'll ping everyone.\"\n\nHer movements are so matter-of-fact, it's almost like this is actually going to work.\n*if ((newsyd_saved = 1) or (oldsyd_saved = 1)) or ((arkville_moved = 1) or (sharks_moved = 1))\n\t*page_break Chapter Twelve\n\t*goto_scene chapter_twelve_a\n*else\n\t*page_break Chapter Twelve\n\t*goto_scene chapter_twelve_e\n*label ahmed_pro\n\n\"What is it, Doctor ${name}?\"\n\n\"Uh…I'm not a doctor,\" you say.\n\n\"You're the only one feeding us information about future earthquakes,\" he says. \"What can I do to help?\"\n\n\"Can you come to a meeting at my house?\"\n\n\"That's the least I can do,\" he says. \"I'll be there right away.\"\n*return\n", "chapter_five": "*set somethings_coming 5\nFolami is at the center of a media storm that she finds frankly bewildering. You and Kassie heartily enjoy watching your newly famous friend try desperately to paint you as a hero while the media thoroughly rejects anything she actually says in all her interviews. At least she gets the best bone-growing treatments for her arm. And it gives you a chance to calm down about her abrupt anti-Kota attitude at trading.\n\nYou think you're safe from the attention after two days, so you go back to your usual chores only to be ambushed by half a dozen reporters with live-stream cameras. You'd been on your way back from loading up at three different rubbish spheres.\n\n\"$!{name}!\" says one of them, tapping on their wrist to zoom in on a strand of refried kelp stuck in your hair. The camera has a two-way screen that lets you see exactly how bad you look. \"Can you comment on the likelihood of the squids attacking Kota?\"\n*choice\n\t#\"I'll do an interview if you let me finish my chores first.\"\n\t\tThey withdraw from the rotting seaweed in your hair. \"An exclusive?\"\n\n\t\t*if bargaining > 30\n\t\t\t*set connections %+10\n\t\t\tYou laugh aloud. \"Anyone who helps me carry and sort this lot can get a one-on-one interview.\"\n\n\t\t\tMost of them drift away, but the one with the wrist cam stays and steers the second trash bubble. It's actually rather helpful, and instead of struggling to maneuver through the various airlocks along the way, you get to chatting.\n\n\t\t\t\"You really jumped in?\" they say. \"On purpose?\"\n\n\t\t\t\"It seemed like a good idea at the time.\"\n\n\t\t\t\"So how would you like me to play this?\" they ask. \"Heroic youth or comedy?\"\n\n\t\t\tYou sigh. \"Thank you for the offer. You're the professional, and fair's fair: go ahead and do the story that works for you.\"\n\n\t\t\t\"I won't forget this,\" the reporter says. \"If you want coverage for something in future, let me know.\"\n\n\t\t\tThe interview isn't so bad, and you've made a friend.\n\t\t\t*goto following\n\t\t*else\n\t\t\t\"I don't know about that,\" you say, hoping they'll suggest some kind of trade.\n\n\t\t\tThe wrist cam doesn't leave its focus on your hair as you bundle up all the rubbish into floating spheres and head awkwardly back in the direction of the shark farm.\n\n\t\t\tLess than half an hour later, you get a message from Kassie featuring a video of your own scowling and dirt-smudged face.\n\n\t\t\t\"Never annoy reporters,\" she writes.\n\n\t\t\tWell, that sucked.\n\t\t\t*goto following\n\t#\"$!{name} who?\"\n\t\t*if poise > 30\n\t\t\t*set reputation %+10\n\t\t\tMost of the reporters give up and go away, but the one with the wrist cam steps out of the way and waits until you're alone.\n\n\t\t\tYou take the chance to remove the kelp from your hair and quickly sit by the Glass so you have a background of ocean and sky instead of rotting food. Then you take several slow breaths, calming yourself and thinking about what you should and shouldn't say.\n\n\t\t\tThe interview isn't so bad, and before you've even finished the feeding session, you get a message from Dad congratulating you on coming across as mature and intelligent. That can only help expand your options for a future career.\n\t\t\t*goto following\n\t\t*else\n\t\t\t\"You,\" says the owner of the wrist cam. \"The heir of Kota's biggest shark farm. Or is there an issue between you and the owners? Is that why you're out here shoveling rubbish?\"\n\n\t\t\t\"I—no!\" you say, wondering how they reached that conclusion from a simple chore when there really is an issue between you and your parents. Your parents just don't know it yet. \"I'm not a child. I mean to say, this is an important job. That's why I'm doing it.\"\n\n\t\t\tThe interview is a shambles, and you know it.\n\t\t\t*goto following\n\t#Shoehorn in an ad for the shark farm.\n\t\t*if shark_sense > 40\n\t\t\t*set value_farm %+10\n\t\t\tYou defiantly leave the seaweed in your hair. It's part of your job, so you're proud of it. The whole crowd hushes attentively as you talk about Dad's exquisite piloting skills and his everyday attention to detail.\n\n\t\t\t\"I'm so glad we were traveling with a sea-life expert during such a freakish and unusual event,\" you say. \"Someone else might have panicked and caused more harm than good, but the squids were just as frightened as we were. And now they're gone. But of course the shark farm is running sea safety tutorials, as always.\"\n\t\t\t*goto following\n\t\t*else\n\t\t\tYou try to say good things about the shark farm, but of course you've spent much of your life deliberately tuning out Mom's enthusiastic lectures. All you're left with is the terrifying moment when you realized Diah was in the water with real-life sea monsters.\n\n\t\t\t\"It was awful!\" you hear yourself saying. \"The thrashing. Those giant eyes. I'll never forget.\"\n\n\t\t\tThe reporters are thrilled at your freakish tale, but you know Dad won't be so impressed.\n*label following\n\nThe following day, you receive a text message from Kassie. It has an address in an arm of Kota that you've never been to before, and it says, \"Make sure you're not followed.\"\n*fake_choice\n\t#Confirm it's her, then go to the address.\n\t\t*set curiosity %-10\n\t\tYou roll your eyes at her lack of caution and type, \"?\"\n\n\t\tShe \n\t\t*label pic\n\t\tsends you a picture so insulting and graphic that there can be no doubt it is her. \n\n\t\tYou give your vestigial legs a thorough check and then put on your all-purpose prosthetics, adding some snacks to the storage compartments just in case. Who knows what Kassie has in mind.\n\t#Go there at once.\n\t\t*set flexibility %+10\n\t\tYou cast aside a boring old breeding diagram you were supposed to fill in weeks ago and get going as soon as you've got your all-purpose legs on.\n\n\t\tTime for some fun.\n\t#Ignore her until she gives me more information.\n\t\t*set empathy %-10\n\t\tYou're partway through a breeding diagram that you were supposed to fill in weeks ago. Now that the future looms, you need to show you can finish the tasks you're given. Even the boring and pointless ones. You and Dad are fully aware that Mom knows exactly which sharks have been making new stock and which are ready for the dining table.\n\n\t\tYou're just finishing up when Kassie \n\t\t*goto pic\t\n\nAfter a long journey, you find yourself in a section of Kota that's used for storage and little else. At the exact sphere Kassie's address indicated, you see a jagged wreck of broken Glass and old seawater.\n\nMoving carefully, you poke at the air in front of you. It's not air. The entire sphere is an illusion, far more effective than any lock. But it's locked too.\n\nYou tap the sequence that makes spheres glow gently for the benefit of those inside who can't hear. To your surprise, the door opens automatically. Kassie's coded the entrance to let you in.\n\nShe's hunched over one of several desks, using tweezers to operate on something that looks like a mechanical spider. Her gaze is fixed on a large magnification screen that faces you.\n*fake_choice\n\t#Look around while she's distracted.\n\t\t*set curiosity %+10\n\t\tThere are wide desks all around the sphere with a huge collection of plastek and metal parts laid out on them, some neatly categorized and others spread out and disassembled. The plastek is almost all of surgical quality, and it's immediately clear that Kassie has been gathering parts for months and spending a small fortune in the process.\n\t#Approach her from the side and observe her without interrupting.\n\t\t*set curiosity %-10\n\t\tShe is so focused that she hadn't even noticed the glow signaling your approach. You've rarely seen her like this, and for a moment, it's as if she's grown into an adult and left you behind. Her movements are sure and steady, and even though it's not your field of expertise, it looks like she knows what she's doing.\n\t#Amuse myself.\n\t\t*set flexibility %+10\n\t\tThis place is an absolute treasure trove of medical devices, tools, and supplies. There's a small fortune in surgical-grade plastek and a neatly labeled array of anesthetics with effects from pleasurable to total. Most of them are illegal outside of a hospital. What has Kassie gotten herself into?\n\nAt last, she puts down her tweezers and rolls her shoulders with a sigh. She turns around and jerks in shock at the sight of you before grinning and giving you a hug. \"What do you think of my lab?\" she signs.\n*fake_choice\n\t#\"Incredible!\"\n\t\t*set kassandra %+10\n\t\t*set empathy %+10\n\t\tShe suddenly relaxes. You hadn't realized how tense she was. It seems your opinion means a great deal, even though she kept this place secret from you for so long.\n\t#\"Where did you get all this stuff?\"\n\t\t*set curiosity %+10\n\t\tShe winces, then flushes with embarrassment that she winced. \"All over the place. Trades, online sales, hospital waste.\"\n\t#\"Kassie, experiments like this could get you killed.\"\n\t\t*set kassandra %+10\n\t\t*set curiosity %-10\n\t\t\"Yes,\" she signs, watching her own hands instead of your face. \"I know. And I appreciate your honesty in pointing it out.\"\n\n\"We need to talk about your mind implants,\" you sign, trying to find the exact right level of hand movement to convey the seriousness of the situation without diminishing all her work and skill.\n\nShe nods once, sharply. \"But first, Yunus.\"\n\n\"This isn't about Yunus.\"\n\n\"Actually, it is,\" she signs. \"This lab is a much bigger secret than your Drylander boy, so I'm offering a trade. If you want to know what I've been up to all this time, tell me about Yunus.\"\n*fake_choice\n\t#\"He tricked me. And he hasn't made contact since I found out.\"\n\t\t*set flexibility %-10\n\t#\"I hate Drylanders more than ever now.\"\n\t\t*set empathy %-10\n\t#\"I understand why he lied. But I can't get through to him now.\"\n\t\t*set empathy %+10\n\n\"Interesting,\" she signs, then types something into a screen built into the desk in front of her.\n\n\"Speaking of which, how did you know he was a Drylander?\" you sign. \"We haven't had a second to talk properly since you half killed yourself rescuing that wild shark in Old Sydney.\"\n\nShe flaps a hand to indicate she'll get around to that soon enough.\n\n\"When you introduced us I knew he was hiding something,\" she signs. It hits you at once that she's been using her mind implants on more than just sharks. \"So I investigated. But by the time I found out he was a Drylander you were already on your way back from New Sydney. Then there were squids, and reporters, and all that.\"\n*fake_choice\n\t#\"I wish I knew why he didn't tell me the truth.\"\n\t\t*set empathy %+10\n\t\t\"That I can tell you,\" signs Kassie. \n\t#\"You're an even greater liar than he is.\"\n\t\t*set flexibility %-10\n\t\t\"Ouch,\" Kassie signs without rancor. \n\t#\"I wonder what else he lied about.\"\n\t\t*set curiosity %-10\n\t\t\"I'm glad you asked,\" signs Kassie. \n\"The truth is, I've been looking into a lot of tek stuff, both medical and otherwise. It wasn't that hard to see where Yunus had patched into the Kota network.\" She sniffs dismissively. \"It wasn't bad work, but it wasn't deeply hidden either. He never intended to hold onto the deception forever, which is a point in his favor.\"\n\n\"He still lied,\" you sign.\n\n\"Yes. His parents are Yohan and Ester Farning.\"\n\nIt takes you a moment to remember who they are. \"We met.\"\n\n\"Of course you did. Those two head up all intercommunity meetings. All. They approve or deny all intercity communications, including the most minor digital contact.\"\n\n\"So he was lying to them too.\"\n\n\"It was the only way for him to meet you without all his chats being recorded. By his parents.\"\n\nYou feel your face heat up, remembering some candid discussions on the nature of parents, Floating City tek, and sex.\n*fake_choice\n\t#\"He still should have told me.\"\n\t\t*set flexibility %-10\n\t#\"So he's a habitual liar, and not just with me.\"\n\t\t*set empathy %-10\n\t\t*set yunus %-10\n\t#\"That would have been awkward at the trading meeting.\"\n\t\t*set flexibility %+10\n\nKassie signs something too vague to make out. \"There's evidence he's truthful in most other aspects of his life—yes, I stalked him a little, but I didn't hack into your personal conversations.\"\n\n\"How could you know him better than me?\"\n\nShe taps the side of her forehead, indicating her mind implants.\n\n\"Are you arguing in his favor?\" you sign, leaving aside the mind implant issue for just a moment.\n\n\"Maybe,\" she signs. \"Until you found out he was a Drylander, he was your best friend. Other than me, obviously.\"\n\n\"It doesn't matter,\" you point out. \"I haven't spoken to him since the trading thing.\"\n\n\"His parents shut down his account,\" she signs. \"Nothing in or out—at least, not from you.\"\n\nThe guilty look on her face is unmistakable, all the more so since she doesn't appear to feel even slightly shy about her secret laboratory.\n\n\"What have you done, Kassie?\"\n\n\"We made friends,\" she signs with a  grin. \"It wasn't that hard to track him down, so I connected with him. And you can too. If you want. He clearly likes you. Like-likes.\"\n\nShe blushes as she signs. Why is she awkward? She's never awkward.\n*fake_choice\n\t#\"Is he sorry?\"\n\t\t*set curiosity %+10\n\t\t\"Yes,\" she signs. \"And he misses you.\"\n\n\t#\"Do you like him?\"\n\t\t*set empathy %+10\n\t\t\"He's funny,\" she says. \"And determined to make his own decisions. I like that.\"\n\n\t#\"His lies aren't as spectacular as yours.\"\n\t\t*set flexibility %-10\n\t\t\"Agreed,\" she signs, without shame.\n\nYou consider asking her why she blushed to ask you about Yunus, but now is not the right time.\n*fake_choice\n\t#I hope she doesn't have feelings for me.\n\t\t*set kassie_love 0\n\t#Could she possibly have feelings for him?\n\t\t\"Kassie,\" you sign slowly, \"do you like him? Romantically?\"\n\n\t\tShe laughs at the very idea. \"No. Not him.\"\n\t#I'll think about this later.\n\n\"Very well,\" you say at last. \"I'll reconnect with him. But first, it's your turn. Tell me what you've been working on. No more lies.\"\n\nShe sighs her reluctance, but there's an excited glimmer in her eye too. It's clear she's dying to tell you all about her work. \"Agreed: no more lies.\"\n\n\"You could have died the other day, chasing that shark,\" you say. \"Don't ever, ever do that to me again.\"\n\nThis time she does show some remorse. \"I'm sorry,\" she signs, \"but I might, one day. This is my calling.\"\n\nHer hands shape the words with care, like a sculpture in the air. Kassie has never been inclined to half measures, but this is something else. She's never kept secrets from you before, and she's never spoken so decisively about her future.\n*fake_choice\n\t#\"Mind tek is an interesting field.\"\n\t\t*set curiosity %+10\n\t#\"Tell me everything.\"\n\t\t*set curiosity %+10\n\t#\"I knew you'd do something amazing with your life.\"\n\t\t*set empathy %+10\n\t#\"Listen to yourself, Kassie.\"\n\t\t*set curiosity %-10\n\t\tApparently she takes that as encouragement.\n\nShe thanks you with a quick gesture that belies the seriousness of the moment. \"It all started with that assignment from Mr. Mesjid, last year—do you remember? The one about deliberately investigating an unexpected future?\"\n\n\"Vaguely,\" you sign back. You recollect Mr. Mesjid telling you that your parents, though guaranteed to hire you once your education was complete, were not going to put you in a position of power unless your skills and leadership were up to it. Nepotism, he said, would only take you so far. It was a shock at the time.\n\n\"I looked into mind implants back then,\" says Kassie, \"and I even took one of the pills they have to imitate the effect in the short term. It changed me. I had to know more, to build more, to be more.\"\n*fake_choice\n\t#\"Is it safe?\"\n\t\t*set curiosity %-10\n\t\tShe chooses not to respond, which makes the answer abundantly clear.\n\t#\"You're incredible.\"\n\t\t*set empathy %+10\n\t\tShe glows. That's exactly the response she was looking for.\n\t#\"What does it feel like, to link minds like that?\"\n\t\t*set curiosity %+10\n\t\t\"Indescribable,\" she signs. \"Love. Savagery. The universe.\"\n\nKassie's openness has given you a heavy responsibility, making you the only person with the knowledge that Kassie has been experimenting on her own mind. Like so many of the world's greatest geniuses, she can be incredibly stupid sometimes.\n\nShe sees something in your face that makes her sign fast. \"I found bits and pieces of medical-grade plastek, here and there. Recycled, mostly, or out of date. But it's not all that hard to upgrade an old implant if you're a half-decent programmer. At first I was just curious, and messing around. Then I realized this wasn't like any other fun side project I'd gotten into. This had gotten into me, heart and soul. That's when I set up the lab and started collection in earnest. But it wasn't enough to tinker around with scraps and write theories. I had to test them out.\"\n\nYour stomach turns, realizing fully that at least one of these greasy, bloodstained scrap machines has been inside Kassie's skull. On purpose, and without professional oversight. No wonder she needed a doctor the other day. You're both lucky she didn't simply drop dead from an electrochemical imbalance or intracranial bleeding.\n\nThere's no doubt about Kassie's brilliance. She could revolutionize the entire field of voluntary implants. But she's experimenting on herself with all the manic glee of a mad scientist and risking that beautiful mind in the process.\n\nShe told you her secret before telling anyone else. What you say right now will make a huge difference to Kassie's safety—and her happiness, and her future. A cold part of you knows that the information she's discovering could be vital in discovering what's wrong with the local sea creatures…but at what cost? This could literally kill her.\n*choice\n\t#I convince her that her safety is worth more than any scientific breakthrough.\n\t\t*if empathy > 60\n\t\t\t*set kassandra %+10\n\t\t\t*set foreknowledge %-20\n\t\t\t*set kassie_dies false\n\t\t\t*comment k_experimentation 0\n\t\t\tYou can't help noticing that there are two chairs in this secret lab. Kassie never planned to do all of this on her own. That means she truly cares what you think. So you'd better express yourself carefully and use what you know of her heart to make her willing to give up the illegal side of her new hobby-slash-career.\n\n\t\t\tSitting on one of the chairs, you wait until she brings the other chair over so you can sit face-to-face, with one of her hands in yours so you can speak in a mixture of standard sign language and the more intimate tapping speak. Her face is grave; she already knows it won't be an easy conversation.\n\n\t\t\tYou take her hand and say the words at the same time as you tap them on her hand, so softly it's more like a caress than speech. \"You are worth more than all the scientific breakthroughs in the universe.\"\n\n\t\t\tHer eyes fill with tears. \"What if I never discover anything at all?\" she taps back. \n\n\t\t\t\"You will,\" you tap back. \"But not so fast that you risk your mind or your self in the process.\"\n\n\t\t\tShe pulls her hand away and turns her back, forcing you to be silent. You wait, knowing you've asked her to give up something that has already become a grand obsession. At last she nods, once, without turning around.\n\n\t\t\tYou creep away, letting her grieve.\n\t\t\t*gosub yunus\n\n\t\t\tYou wonder if repeating your conversation with Yunus will help give Kassie something to think about other than how much she misses her experiments.\n\t\t\t*gosub yunuschatsection\n\n\t\t\tOver time, life returns to normal, except that Kassie is spending most of her days writing applications for a position as a medical technician, plus essays on the usefulness of mind implants, so she can follow a legitimate path to her goal of continuing to invent and test new tek.\n\t\t\t*goto postpostyunuschat\n\t\t\t*label yunuschatsection\n\t\t\t*choice\n\t\t\t\t#Tell her every detail.\n\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t*label yunuschat\n\t\t\t\t\tYou request a chat with Kassie, and she answers immediately. \n\n\t\t\t\t\t\"So I talked to Yunus,\" you sign.\n\n\t\t\t\t\tHer eyes sharpen at once, and she gestures, \"Go on.\"\n\n\t\t\t\t\t\"He asked me out.\"\n\n\t\t\t\t\t\"Hah!\" she signs. \"I told you so.\"\n\n\t\t\t\t\t*if yunus_love = true\n\t\t\t\t\t\t\"I said yes, by the way.\"\n\n\t\t\t\t\t\tKassie jumps up and claps her hands. \"Finally!\"\n\n\t\t\t\t\t\tYou can't help laughing, and then you have to go through the conversation word for word. Life is changing, but you and Kassie are just the same.\n\t\t\t\t\t\t*goto postyunuschat\n\t\t\t\t\t*else\n\t\t\t\t\t\t\"I said no, of course.\"\n\n\t\t\t\t\t\t\"You did?\" she signs. \"But I thought you liked him?\"\n\n\t\t\t\t\t\t\"As a friend, sure.\"\n\n\t\t\t\t\t\t\"And that's all?\"\n\n\t\t\t\t\t\tYou nod. Then you tell her everything, though you get distracted halfway through talking about the stink of New Sydney. Soon you're talking just like normal.\n\t\t\t\t\t\t*label postyunuschat\n\t\t\t\t\t\t*return\n\t\t\t\t#Mention it in passing and see if she wants to know more.\n\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t*goto yunuschat\n\t\t\t\t#Now isn't the time.\n\t\t\t\t\t*set empathy %+10\n\t\t\t\t\tEven without mind implants, Kassie is in tune with you. She messages you asking what's up just as you're staring at the Glass wall about to call her. \n\n\t\t\t\t\t*goto yunuschat\n\t\t*else\n\t\t\t*set k_experimentation 1\n\t\t\t\"You can't do this!\" you sign. \"I won't let you.\"\n\n\t\t\tHer fragile enthusiasm vanishes, and she's made of stone. \"Can't?\" she signs, her fingers stiff with fury.\n\n\t\t\t\"I'm not going to stand by and let you kill yourself,\" you say. \"You are my best friend and one of the smartest people I know.\"\n\n\t\t\t\"Smarter than you.\"\n\n\t\t\t\"Yes,\" you sign, beginning to get annoyed. \"Smart enough to bring me here so I can stop this stupidity before it gets even more out of hand. I'll report you if I have to.\"\n\n\t\t\t\"Get out,\" she signs at once. \"I'm going to move my lab elsewhere. Good luck getting anyone to take you seriously with your wild accusations.\"\n\n\t\t\tIt was a vitally important moment in your friendship and in your life, and you said exactly the wrong thing.\n\t\t\t*gosub yunus\n\n\t\t\tKassie hasn't been speaking to you, but you hope your conversation with Yunus is interesting enough to draw back your best friend.\n\t\t\t*gosub yunuschatsection\n\n\t\t\tThings between you and Kassie will never be the same, but you go back to chatting every day, and you pretend your relationship is fine. Every day, you know Kassie is sneaking away to continue her experiments—and there's nothing you can do about it.\n\n\t\t\tShe tells you her implants have helped her discover that there have been several earthquakes deep under the sea, disturbing both sharks and squids. It's good to know, but you wish there were another way to get the information.\n\t\t\t*set facts 2\n\t\t\t*goto postpostyunuschat\n\t#I want to take the same risks she does, gaining skills in the process. If she trusts me.\n\t\t*set kassie_dies false\n\t\t*set k_experimentation 2\n\t\t\"Let me join you,\" you sign. \n\n\t\tShe doesn't speak but raises her eyebrows.\n\n\t\t\"I mean it,\" you sign. \"Whatever you do, I do. What you risk, I risk. What you discover, I discover.\"\n\n\t\t*if kassandra > 60\n\t\t\t*set shark_sense %+10\n\t\t\t*set foreknowledge %+10\n\t\t\t*set athletics %-10\n\t\t\t*set self_experimentation true\n\t\t\t*set facts 3\n\t\t\t\"I…\" She sits down heavily. \"The experiments feel different, suddenly. I love the idea of you feeling what I've felt, but I don't love the idea of risking your mind.\"\n\n\t\t\tYou roll your eyes at her.\n\n\t\t\tShe sticks out her tongue, admitting her hypocrisy. \"Deal.\"\n\n\t\t\tHalf an hour later, she throws you out, wanting to immediately start work on customizing your own brain implants.\n\t\t\t*gosub yunus\n\n\t\t\tAt last, Kassie is ready to give you mind implants. You cover your sudden terror by babbling about Yunus, telling her that \n\t\t\t*if yunus_love = true\n\t\t\t\tyou're dating now, although you're not quite sure how.\n\t\t\t\t*goto operation\n\t\t\t*else\n\t\t\t\the asked you out but you're fairly sure you smoothed it over enough to stay friends.\n\t\t\t\t*label operation\n\t\t\t\t\n\t\t\t\t\"Interesting,\" she taps on your arm. \"Now stop talking while I strap you down.\"\n\t\t\t\t*fake_choice\n\t\t\t\t\t#\"I changed my mind. I don't want to do this.\"\n\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\tShe backs off immediately, although you can see she's disappointed.\n\t\t\t\t\t\t*goto postpostyunuschat\n\t\t\t\t\t#\"Are you sure this is safe?\"\n\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t\"Your life is as important to me as my own,\" she taps gently.\n\t\t\t\t\t\t*goto operationsleep\n\t\t\t\t\t#\"Will I get a scar?\"\n\t\t\t\t\t\t*set empathy %-10\n\t\t\t\t\t\t\"I would never damage that beautiful face,\" she taps at you.\n\t\t\t\t*label operationsleep\n\n\t\t\t\tYou feel suddenly sleepy, and you let the anesthetic take hold as Kassie's cool hand strokes your arm.\n\n\t\t\t\t\"Well?\" she taps.\n\n\t\t\t\t\"Go ahead,\" you say, struggling to speak clearly. \"I'm ready.\"\n\n\t\t\t\t\"You're done, silly,\" she taps back. \"Don't try to get up. I'll stay here with you until the anesthetic wears off.\"\n\n\t\t\t\tShe gives you a handful of brightly colored pills, advises you to avoid your parents for the next twenty-four hours in case they notice the injection site, and makes you promise not to get in the water until she's there to supervise.\n\n\t\t\t\tThe following week is a nightmare of paranoia and awkwardness as you try to act normal while simultaneously wondering if your nerves are natural or the result of the new mechanism inside your brain. Kassie has your computer set up to monitor your pulse, blood pressure, cranial pressure, and other things she doesn't even list for you. \n\n\t\t\t\tAt last, the full seven days is over, and you and Kassie meet back at her lab. \n\t\t\t\t*choice\n\t\t\t\t\t#\"Can I get in the water now?\"\n\t\t\t\t\t\t*set curiosity %+10\n\t\t\t\t\t\t\"Steady,\" she signs. \n\t\t\t\t\t\t*label anxious\n\t\t\t\t\t\t\"One more set of tests, and then I'll check first to make sure there aren't any giant squids or whatever.\"\n\n\t\t\t\t\t\tYou settle in for another round of high-contrast injections, blood tests, and brain scans that involve keeping very still with your head in a box that Kassie assures you is very high-tek. At last, she's satisfied.\n\n\t\t\t\t\t\t\"If you start bleeding from the nose or ears, let me know immediately,\" she signs.\n\n\t\t\t\t\t\t\"Uh…I could probably figure that out myself.\"\n\n\t\t\t\t\t\t\"A headache is normal, and a faster pulse. But if you see flashing lights, that's bad.\"\n\n\t\t\t\t\t\tYou can feel your heart speeding up more with every instruction. \"If I'm breathing hard, that's just a perfectly normal panic, right?\"\n\n\t\t\t\t\t\t\"Right,\" she signs. \"But try to stay calm.\"\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#\"You're really not helping.\"\n\t\t\t\t\t\t\t#\"I'm completely calm.\"\n\t\t\t\t\t\t\t#\"Is my implant going to explode?\"\n\t\t\t\t\t\tShe looks at you for a long moment, then finally signs, \"I have a permeable tank under this pod. So you can connect with sea creatures mentally but not physically. In case you accidentally summon something. Leave your legs off and let's go.\"\n\n\t\t\t\t\t\tYou both shed your outer clothes and slide into the water. The tank isn't exactly roomy, and with the upper hatch closed, the bubble of air isn't big enough to easily reach. You have to lean your head sideways, hurting your neck. Kassie's face swings between concern and hilarity. Then she starts breathing in the prediving rhythm all Floating City denizens learn from the cradle, and she lets herself sink.\n\n\t\t\t\t\t\tYou close your eyes, willing your heart to slow, and try to remember the familiar breathing that will let you hold your breath for minutes at a time. At last, you fall under the water, settling your vestigial legs on the crosshatched Glass at the bottom of Kassie's tank.\n\n\t\t\t\t\t\tFor a long time, you simply look at one another. Then Kassie's eyes widen, and she grabs your hand and taps, \"Something's coming.\"\n\n\t\t\t\t\t\tYour own thoughts fracture like a kaleidoscope. You are human, half standing and half sitting on uncomfortable squares of Glass. But you're also the scourge of the sea, gliding between the light and the dark and gulping down lesser fish. And you're also those same lesser fish, with tiny shards of thought: fear, and school, and fear again.\n\n\t\t\t\t\t\tSomething's got you! Its teeth cut into your tail.\n\n\t\t\t\t\t\tNot teeth. A hand. Not a tail—your hand. Not something. Kassie.\n\n\t\t\t\t\t\tYou open your eyes and try to focus as she uses her free hand to tap the same thing on your trapped arm, over and over: \"$!{name}. $!{name}. $!{name}.\"\n\t\t\t\t\t\t*fake_choice\n\t\t\t\t\t\t\t#She's made of meat. Eat her.\n\t\t\t\t\t\t\t\tShe's small and quick. Better take a good-sized bite before she gets away. You open wide and crunch down. Before you make contact, something slams you in the face. It's too strong!\n\n\t\t\t\t\t\t\t\tIt hauls you up into the poison of the air.\n\t\t\t\t\t\t\t#She's a predator. Swim away.\n\t\t\t\t\t\t\t\tYou jerk sideways and immediately smash your face against cross-hatched Glass. Flipping around, you shoot off in another direction—and hit your face again. Your fins…arms…are long and unusually dexterous, so you beat them against the Glass, looking for a way out.\n\n\t\t\t\t\t\t\t\tSomething grabs you and pushes you upward, and your mouth and nose break the surface of the water.\n\t\t\t\t\t\t\t#Something's wrong. Freeze.\n\t\t\t\t\t\t\t\tYou stop breathing and stare slightly to the left of the large, hostile creature that's hovering directly in front of you, gripping you like an iron hook.\n\n\t\t\t\t\t\t\t\t\"Good,\" she taps gently on your arm. \"Now stand up, and breathe air.\"\n\n\t\t\t\t\t\t\t\tFor a moment, the beating on your arm is meaningless. Then the words trickle through your mind, and you remember who you are, and stand.\n\n\t\t\t\t\t\tYou use several of Kassie's favorite swear words, trying not to be frightened that your fingers don't feel like they belong to you.\n\n\t\t\t\t\t\t\"It's alright,\" Kassie signs back. \"Just give your mind a minute. The first time is a bit…odd.\"\n\n\t\t\t\t\t\tDay by day, you get better at remembering your humanity while also sorting through the sensations of the sea creatures all around and below you. You and Kassie have never been closer, and you soon realize you can tune into her emotions as well. But there's more.\n\n\t\t\t\t\t\tBeneath the endless dance of eating and sleeping, predator and prey, there is fear. Something is wrong, and the whole ocean knows it. Between the two of you, you figure out that there has been a series of quakes deep under the sea. That's why the sharks were acting so strangely, and that's why the giant squids fled to the surface, crashing into your speeder as you returned from New Sydney.\n\t\t\t\t\t\t*set facts 2\n\t\t\t\t\t\t*goto postpostyunuschat\n\t\t\t\t\t#\"Are you sure nothing's wrong with me?\"\n\t\t\t\t\t\t*set curiosity %-10\n\t\t\t\t\t\t*goto anxious\n\t\t\t\t\t#\"You look more anxious than I do.\"\n\t\t\t\t\t\t*set empathy %+10\n\t\t\t\t\t\t*goto anxious\n\t\t*else\n\t\t\t*set k_experimentation 3\n\t\t\t\"No,\" she signs with the sharp gestures that brook no argument. \"This is my work, and my mind. I want to share all I discover with you, but not the implants themselves.\"\n\n\t\t\tYou try not to show how hurt you are that you're not as close as you thought. But if you want to stay friends, you have to accept her terms. \"Alright.\"\n\n\t\t\tDespite your frustration, you're fascinated by her work. Talking to you gives her more ideas, however, and she eventually throws you out so she can concentrate more fully.\n\t\t\t*gosub yunus\n\n\t\t\tYour mind is reeling after your conversation with Yunus, so as always, you go to talk to Kassie.\n\t\t\t*gosub yunuschatsection\n\n\t\t\tOver time, life returns to normal—except Kassie is continuing to experiment on herself, and there's nothing you can do about it. But you catch her writing an application for plastek courses at the closest medical center, and you know she did take your concerns to heart at least a little.\n\n\t\t\tShe slowly opens back up to you. One day, she tells you she's discovered there has been a series of quakes under the ocean that caused the giant squids to attack and the sharks to behave oddly.\n\t\t\t*set facts 2\n\t\t\t*goto postpostyunuschat\n\t#I worry about Kassie, but I'm too fascinated to limit her experimentation.\n\t\t*set kassandra %+10\n\t\t*set foreknowledge %+20\n\t\t*set facts 3\n\t\t*set k_experimentation 3\n\t\t\"Kassie, this is all utterly fascinating. What can I do to help?\"\n\n\t\tHer whole face lights up. For a moment, you think she's about to kiss you.\n\n\t\t\"Could you possibly go over some lines of code with me?\" she signs.\n\n\t\tYou settle in side by side, examining every letter and space in her code as if Kassie's life depends on it. Because it does. You can't quite repress the nagging sensation at the back of your mind that no amount of care will be enough to save her now.\n\n\t\tNext time you look up, it's night. Time to race home and act innocent.\n\n\t\t*gosub yunus\n\n\t\tAs always when anything interesting happens, you talk to Kassie.\n\t\t*gosub yunuschatsection\n\t\t*label lab_assistant\n\n\t\tOver time, life returns to normal—except that you are suddenly getting trained as a makeshift lab assistant. Kassie teaches you to inject her with contrast solutions, to operate a portable brain scanner, and to take and test blood samples. You become adept with syringes and complicated data charts. Kassie's right: it's really not that hard.\n\n\t\t*label kassieinfotwo\n\t\tBefore long, she tells you that there's something wrong and more and more sea creatures are becoming aware of it. One day she bursts out of the water, signing, \"Earthquake! It's an earthquake. Lots of them, at the bottom of the sea. That's what's wrong. That's why the squids attacked you, and that's why the sharks are afraid.\"\n\t\t*goto postpostyunuschat\n\t#I convince my parents to utilize her new mind implants at the shark farm.\n\t\t*set ally_mom_dad 1\n\t\t*set foreknowledge %+20\n\t\t*set facts 3\n\t\t*set k_experimentation 3\n\t\t\"My parents would kill for this kind of insider knowledge,\" you sign.\n\n\t\t\"I know. The implications go beyond the farm. I think it will benefit all of Kota.\"\n\n\t\t\"But my parents first.\"\n\n\t\t\"But your parents first,\" she agrees.\n\n\t\t*if lili > 70\n\t\t\t*set value_farm %+10\n\n\t\t\tOn your way home, you realize your dad would never allow any kind of experimental tek to tarnish the order of his world. Mom, however, is another matter.\n\n\t\t\tYou go to her and tell her almost everything. She tries to hide it, but you can see the fascination in her eyes. It's so intense you feel a little uncomfortable. She immediately sets up an online bot account so you can feed her information directly without leaving a link back to yourself. \n\n\t\t\tAnd you thought Dad was the computer guy.\n\t\t\t*gosub yunus\n\n\t\t\tAs always when anything interesting happens, you talk to Kassie.\n\t\t\t*gosub yunuschatsection\n\t\t\t*goto lab_assistant\n\t\t*else\n\t\t\tYou haul yourself up to Dad's office, but the surprised pleasure on his face quickly fades as you explain you have a source with illegal mind tek who would like to feed him information that might have an effect on the shark farm. \n\n\t\t\tAs he starts shaking his head, you trail to a halt.\n\n\t\t\t\"Absolutely not,\" he says, sounding hurt that you would even suggest such a thing. \n\n\t\t\tYou mutter something placatory and get out before he realizes the source is Kassie.\n\t\t\t*gosub yunus\n\n\t\t\tAs always when anything interesting happens, you talk to Kassie.\n\t\t\t*gosub yunuschatsection\n\t\t\t*goto lab_assistant\n\t#I suggest she let the dolphin farmers utilize her new insights at the dairy—for a price.\n\t\t*set ally_ahmed 1\n\t\t*set facts 3\n\t\t*set k_experimentation 3\n\t\t\"Can I share your information with the dairy farmers?\" you sign.\n\n\t\tKassie blinks, surprised that you would assist your parents' greatest business competition. \"Yes, if you're sure you can trust them.\"\n\n\t\tOn your way home, you think about what you know of Ahmed and Musa. You feel almost as if you know Ahmed because of all the ads for the farm.\n\n\t\t*if appraisal > 60\n\t\t\t*set net_worth +200\n\t\t\t*set connections %+10\n\t\t\tTherefore, Musa is more likely to be trustworthy when it comes to the not-entirely-legal matter of Kassie's tek. You're concerned about how to draw him aside, but he's walking through the lobby when you arrive and recognizes you at once. Ten minutes later, he's set up a private account for the pair of you to communicate information.\n\t\t\t*gosub yunus\n\n\t\t\tAs always when anything interesting happens, you talk to Kassie.\n\t\t\t*gosub yunuschatsection\n\t\t\t*goto lab_assistant\n\t\t*else\n\t\t\tYou go directly to his personal office and knock on the door. He recognizes you at once. \"$!{name}? Is everything alright?\"\n\n\t\t\t\"I can help you with the dolphins,\" you say. \n\n\t\t\tHe laughs. \"A double agent, is it? No thank you.\"\n\n\t\t\tNo matter what you say, you can't convince him that your offer is genuine.\n\t\t\t*gosub yunus\n\n\t\t\tAs always when anything interesting happens, you talk to Kassie.\n\t\t\t*gosub yunuschatsection\n\t\t\t*goto lab_assistant\n*label postpostyunuschat\n*page_break\n\nTime passes peacefully enough, and you adjust to the changes.\n\nOne day, you're desperately trying to deny that your all-purpose legs need a serious scrub after an especially disgusting feeding run when you get an odd ping from your computer. The message only contains a time and a set of coordinates from Yunus.\n\nFive seconds later, you're standing inside a 3D map of a section of Old Sydney. This particular section is an overgrown mess: a few ruined houses lurk among the mix of greenery and petrified wood where the tree-lined suburbs had changed climates in a matter of a few years. Filthy water laps at the remains of a corner store only meters away.\n\nSo. Yunus wants to meet on neutral ground.\n*fake_choice\n\t*if (yunus_love = true) #This really is a date.\n\t\t*set empathy %+10\n\t#He really is a diplomat.\n\t\t*set empathy %+10\n\t#Is this really Yunus or some trick by his parents?\n\t\t*set curiosity %-10\n\t#How mysterious.\n\t\t*set flexibility %+10\n\nIt takes a few minutes to be sure the message was really from Yunus. Then you slip on your prosthetics, shoot a message to Kassie telling her where you're going, and take a two-person speeder. The luxury of having the extra space for your legs is glorious, and you wish you didn't feel so nervous that it's impossible to enjoy yourself.\n\nIt's not a short journey, but thankfully there aren't any giant squids or cranky vegetarians this time. Just a long silence in which all you can do is think about Yunus and try not to think about your future. It's well over fifty degrees Celsius outside, but the speeder keeps the heat at bay. Your eyes drift closed.\n\nThe awful screech of a tree branch on the Glass wakes you, and you jerk upright in your seat and scrub frantically at your face before realizing you still have a few minutes' travel left.\n*fake_choice\n\t#Check that I don't look like I just woke up.\n\t#Make sure my legs haven't twisted.\n\t#Remind myself not to trust Yunus.\n\nYou switch to manual steering as you spot the scum-lined edge of the water. Yunus is waiting on the shore with a makeshift bridge. The pair of you struggle to line up the speeder and the bridge for several very hot and sweaty minutes, and by the time you're finally able to walk across to him, you're far too tired to feel awkward.\n\n\"Hey,\" says Yunus, spitting out the tube of his hydration device.\n\n\"Hey.\"\n\nHe's shaking, and not from exhaustion. \n\nYou remember suddenly that he's only been outside once in his life. \"Are you okay?\"\n\nHe swallows hard. \"Could we go inside?\"\n\n\"Of course.\"\n\nHe walks past the first two houses before climbing through a large front window that doesn't look particularly special until you follow him inside. You recognize the black-rubber look of a house that was flood proofed in the period between the devastating storms of 2031 and the government-ordered evacuations. \"Climate construction\" was all the rage for a few years, and those who elected to stay in Old Sydney used it as evidence of survivability in their court case.\n\nThe distinctive whir of the solar-powered roof lowering over the whole building shows you why Yunus chose this house. The air conditioning clanks to life, and LEDs blink on as the house turns into a cave. Yunus visibly relaxes.\n*if yunus_love = true\n\t*set kassie_love 0\n\t*fake_choice\n\t\t#Take his hand.\n\t\t\tThe little lights everywhere are like candles, and your heart immediately races as you realize this could be considered romantic lighting. Which obviously wasn't Yunus's intention. Unless it was.\n\n\t\t\tYour arm is made of lead, and it takes a superhuman effort just to lift your hand. It moves through the thick air toward Yunus with all the speed of a shark pregnancy. But just as you think it would be better to turn and run for your speeder rather than deal with the tension a moment longer, Yunus turns and smiles and meets your hand with his own.\n\n\t\t\tYour heart flips over in your chest, but in a good way. How can a simple handclasp feel so much like fireworks?\n\n\t\t#Talk to him about something—anything.\n\t\t\t\"What happens if there's an earthquake under New Sydney?\" you blurt out.\n\n\t\t\tYunus blinks. \"Nothing good,\" he says at last. \"But that's fine, because it's not like we're on a fault line or anything.\"\n\n\t\t\t\"Sure.\"\n\n\t\t\t\"Are you okay?\" he says. \"I thought it was a good idea to come here, and it took me most of a day to find a place with proper shelter that was close to the water and far away from any settlements, but…\"\n\n\t\t\t\"It's good,\" you say, too quickly.\n\n\t\t\t\"I like seeing you in three dimensions,\" he says gently, and you realize that this it is: this is a relationship. A romantic one. It's a carnival ride of terror and nausea and fun.\n\n\t\t#\"Are you alright?\"\n\t\t\t\"Not really,\" he says, shoving his hands in his pockets. \"But I have to get used to all this sooner or later. The sun, I mean.\" He glances at the window where the enclosing roof has come down and shudders.\n\n\t\t\t\"I didn't know how bad it was for you.\"\n\n\t\t\t\"Don't apologize,\" he says. \"This was my idea, and I'm glad I came. Because you're here, and we're together, and you don't hate me for being a Drylander.\"\n\n\t\t\t\"Me too,\" you say. \"I mean, I'm glad that you're here. And that I'm here. Together.\"\n\n\t\t\t\"Together.\" He smiles.\n\n\tYou talk to Yunus in the cool semidarkness until you've both forgotten your nerves and it's suddenly easy. It's just…talking. Except it's also much more. \n\t*goto chattybit\n*else\n*label chattybit\n\n\"What are you going to do?\" he says, meeting your eye steadily. \"When school is over, and you have to choose?\"\n*fake_choice\n\t#\"I don't want to choose.\"\n\t\t*set flexibility %+10\n\t\tHe laughs. \"Neither do I.\"\n\n\t#\"What will you do?\"\n\t\t*set empathy %+10\n\t\t\"I'll be a diplomat, like my parents,\" he says. \"You already know that.\"\n\n\t#\"The choice isn't mine.\"\n\t\t*set empathy %+10\n\t\t\"Isn't it?\" he says, and his eyes fill with sympathetic tears.\n\n\t#\"Whatever happens, we'll still be friends.\"\n\t\t*set flexibility %-10\n\t\t\"That much is true,\" he says.\n\n\"Everything has a cost,\" you say slowly. \"If I choose one path, all the others suddenly vanish.\"\n\nHe doesn't say a word. The pair of you sit in silence, thinking, until you remember to check the time and realize you both need to go home. You rush outside and back to the speeder, grateful that the worst heat of the day has eased.\n\n\"Goodbye, Yunus,\" you say, standing carefully braced on the backs of the speeder chairs so you can still see him through the roof.\n\n\"See you soon,\" he says.\n\n*finish Chapter Six\n*label yunus\n\nWhen you get home, your wall beeps to indicate a chat request.\n*fake_choice\n\t#Leap up and answer. \n\t#Answer it, but not too quickly.\n\t#Make sure I have an excuse ready in case I want to end the conversation.\n\nIt's not Kassie. It's Yunus. Kassie has already reconnected your accounts.\n\n\"Er, hello,\" he says. \"Kassie—\"\n\n\"Yeah,\" you say, forcing yourself to switch gears from one friend to another. \"I know.\"\n\n\"It's untraceable,\" he says, stumbling over his words. \"My parents won't be able to cut us off again.\"\n\n\"Untraceable equals illegal?\" you say.\n\n\"Yes and no,\" he says, taking a deep breath. \"My parents don't approve, and they hold the keys. That is their right as head diplomats for New Sydney. But I believe their position is unethical.\" It's clear he's trying to be straight with you, and it's not easy.\n*fake_choice\n\t#\"How dare you call anyone unethical after you tricked me.\"\n\t#\"So you lied because it was the right thing to do?\"\n\t#\"You're still lying.\"\nHe shrugs helplessly. \"Yes?\"\n\nYou sigh heavily. \"I didn't even know it was illegal to talk to Drylanders. No one I know talked to any Drylanders, but I always thought it was a choice.\"\n\n\"Maybe from your end it's allowed,\" he says. \"But did you ever speak to a Drylander on a public chat? Or even see one available?\"\n\n\"Yes,\" you say. \"You. But of course I didn't know, and I've never seen any others.\"\n\n\"I am so, so sorry about the way the trade was set up—with those piddly little chairs, and the screen set to give you headaches, and using the bus depot entrance, and no post-disinfection showers, and everything.\"\n\n\"Huh. Interesting diplomacy, that's for sure.\"\n\n\"From all of us. Can you ever forgive me? I can't imagine any other scenario in which I'd feel the need—or the desire—to lie to you.\"\n*fake_choice\n\t#\"I hope you're telling the truth this time.\"\n\t\t\"I hope you can get used to it,\" he says.\n\t#\"I forgave you long ago.\"\n\t\t*set yunus %+10\n\t\tHis eyes fill with tears, and you can see him desperately scrambling for some other topic of conversation before he loses it completely. It's actually incredibly endearing.\n\t#\"How can I forgive you when I'm not sure I know you?\"\n\t\t\"Can we start over?\" he asks.\n\n\"What's it like in New Sydney?\" you say quickly, grabbing at the most innocuous question you can think of.\n\n\"Nice and cool,\" he says. \"Last time I went up to the higher levels I was a child. We all have to do it as part of school. That was the same day Dad told me it was my fate to travel.\"\n\n\"It's not so bad.\"\n\n\"Travel, or the floating life?\"\n\n\"Travel, of course,\" you say. \"You do understand by now that it's far more pleasant out here than under there?\"\n\nHe tries and fails to suppress a shudder. Suddenly a whole lot of his odd twitches and neuroses make sense. He's barely seen sky in his entire life.\n*fake_choice\n\t#\"Are you really so terrified of Kota?\"\n\t#\"Are you really fated to become a diplomat?\"\n\t#\"You're right: you really did need contact with the outside world.\"\n\t\t*set yunus %+10\n\nHis face sags in relief. \"You understand.\"\n\n\"More or less.\"\n\nHis face scrunches up in that way of his—exactly the way it scrunched up when he was trying to get up the nerve to tell you he was a Drylander. \"Which is it? More, or less?\"\n\n\"Uh…\"\n\n\"I'm not saying this right,\" he says. \"It used to be so easy to talk to you.\"\n\n\"So talk,\" you say, trying not to sound exasperated.\n\nHe chews on a fingernail and swallows hard. Then he looks straight at you without moving, as if he's hoping you'll simply guess what he's getting at based on his desperate expression.\n\nSuddenly the dollar drops. He has feelings for you.\n*choice\n\t#See if he manages to spit it out.\n\t\t\"I like talking to you,\" he says, twisting and untwisting his fingers. \"Not right now, obviously. This is excruciating.\"\n\n\t\tYou allow yourself a hum of agreement, which makes him more flustered than ever.\n\n\t\t\"Do you…er?\" he says.\n\n\t\t\"Do I what?\" you reply innocently.\n\n\t\t\"Oh!\" he gasps. \"I didn't mean to presume. Although I suppose all of this is presumption. But perhaps that is the very nature of the task?\"\n\n\t\t\"Which task would that be?\"\n\n\t\tHe swallows hard, then has a coughing fit. When he finally regains control, he clutches his hands together in his lap and says, \"I have feelings for you, ${name}. That is the last remaining secret between us. You may re-disconnect us if you wish.\"\n\n\t\tHe reaches out to switch off his screen.\n\t\t*choice\n\t\t\t#Let the conversation end and never bring it up again.\n\t\t\t\t\"Chat tomorrow?\" you say.\n\n\t\t\t\tThere's a flash of relief in his eyes as he ends the conversation.\n\t\t\t\t*goto afterconfession\n\t\t\t#Stop him leaving—and ask him out.\n\t\t\t\t\"Stop,\" you say. \"I like you too.\"\n\n\t\t\t\t*goto yeslove\n\t\t\t#Let him stew for a minute, then ask him out.\n\t\t\t\tYou let the screen fall silent and sit quietly, letting the moment fully sink into you. Yunus likes you. It's real. It's happening. \n\n\t\t\t\tAnd Yunus must be cursing himself for a fool right now.\n\n\t\t\t\tYou quickly tap out: \"Yunus, call me back. I like you too.\"\n\n\t\t\t\tThe screen lights up.\n\n\t\t\t\t*goto yeslove\n\t#Take pity on him and make sure it's clear I'm not interested.\n\t\t\"I'm sorry,\" you say. \"All I want is your friendship.\"\n\n\t\tHis mouth tightens, and then he nods.\n\n\t\t\"Chat tomorrow?\" you say.\n\n\t\tHe nods again and flicks off the screen.\n\n\t\tSo that's that.\n\t\t*goto afterconfession\n\t#\"I like you, Yunus. Like-like.\"\n\t\t*label yeslove\n\t\t*set yunus_love true\n\t\tYunus stares at you for a long moment. \"I can't tell if you're joking. Or perhaps we say things differently here.\"\n\n\t\t\"I am attracted to you,\" you say gently. \"I want to date you. Will you be my boyfriend?\"\n\n\t\t\"This is happening?\"\n\n\t\t\"This is happening.\"\n\n\t\t\"Yes,\" he says gravely. \"I'll be your boyfriend.\"\n\n\t\t\"Good, then,\" you say.\n\n\t\t\"Yes. Good. That's settled then.\" He reaches forward and presses his fingers against the screen.\n\n\t\tYou reach up to press your fingers against his. The Glass is cold.\n\n\t\t\"This is no good,\" you say. \"I want to hold your hand.\"\n\n\t\t\"On it,\" he says and ends the connection.\n\n\t\tYou're left alone, smiling in the dark.\n*label afterconfession\n\nYou keep the room dark, taking a moment to adjust to reality. \n*if yunus_love = true\n\t\n\tSo now you're going out with Yunus. And he doesn't even live in your city.\n\t*goto back\n*else\n\t\n\tSo now you're friends with a Drylander. Weird. But possibly useful if you ever want to leave Kota.\n*label back\n*return", "chapter_four": "*set somethings_coming 7\nYou climb back into the darkness of the bus with a feeling of enormous relief, despite the close air. Even the stench of fuel is welcome, since it's one step closer to outside.\n\nYour shoulders suddenly ache as the adrenaline of the trading wears off. Kustiani sits directly behind you, and you feel anger radiating off her in waves.\n\nFolami moves to the very back seat and hunches over as if trying to disappear.\n\nDad sits next to you but doesn't say anything. You're not free yet.\n\nThe Drylander driver climbs into his seat with a sigh and pulls oversize goggles down over his sunglasses. He crashes through gears, and the bus rumbles into noisy life. A horrendous stink immediately fills the narrow passageway as black smoke pours in through every crack in the windows, doors, and floor.\n*choice\n\t#Don't let the Drylander see I'm afraid.\n\t\t*if empathy \u003c= 50\n\t\t\tYou manage to keep a poker face despite the stink.\n\t\t\t*goto dadtwo\n\t\t*else\n\t\t\tYou try to keep a poker face, but the smoke stings your eyes and it's no use. Despite everything, you double over coughing with tears streaming from your eyes.\n\t\t\t*set reputation %-10\n\t\t\t*goto dad\n\t#Glance at Dad to see if this is normal.\n\t\t*if empathy >= 50\n\t\t\tYou glance at Dad, and it's clear he's doing his best to pretend the smoke doesn't bother him. There's no sign of fear, so it must be a normal Drylander thing.\n\t\t\t*goto dadtwo\n\t\t*else\n\t\t\tYou glance at Dad, but it's impossible to tell if he's even noticed the stinking smoke or not. He catches you staring and whispers, \"Combustion engine.\"\n\t\t\t*set reputation %-10\n\t\t\t*goto dad\n\t#Ask what's wrong.\n\t\t*if curiosity \u003c= 50\n\t\t\t\"Dad?\" you say.\n\n\t\t\t\"Aren't combustion engines fascinating?\" he says at once. \"Although they take some getting used to.\"\n\t\t\t*goto dadtwo\n\t\t*else\n\t\t\t\"Dad?\" you say. \"Uh…\"\n\n\t\t\tHe looks at you in confusion.\n\n\t\t\t\"Are we on fire?\"\n\t\t\t*set reputation %-10\n*label dad\n\nDad and the Drylander both burst out laughing. It would be reassuring if it wasn't so humiliating.\n*label dadtwo\n\nOnce the bus finally leaves the Drylanders' concrete burrow, the smoke dissipates and you're able to breathe easy again. The Drylander glass on the windows somehow manages to let sunshine in without any wind, and you feel like it's all just a horrible trick to kill your entire delegation. But maybe that's the heat-induced delirium talking. \n\nThe bus pulls up at the muddy edge of the water, where a couple of once-grand buildings show tide lines on their outer walls. It feels a little creepy to see someone's living sphere bound in place like that—unable to shift with the sharks or to steer out of the path of a cyclone. And of course it's rectangular instead of spherical, which looks very abrupt against the soft lines of the clouds. But at least it has real air blowing through the smashed windows.\n\nAs soon as the last person steps down from the bus, the driver revs the engine, spins around, and leaves you in an enormous cloud of dust and grit. It's hot, awkward work to bring up the speeder and check all its systems are in working order. At least the Drylander isn't there to see you sniping at one another.\n\nFinally, you're inside with the hatches closed and cool air pouring onto your head and legs. Dad sets a quick pace, and you leave New Sydney far behind. Soon the speeder is cool enough to shut off the artificial air and open the upper hatch once more, making it a kind of boat.\n\n\"Well well!\" says Dad in a hearty tone that usually means something unpleasant is about to occur. \"What did you think of your first trading mission?\"\n*fake_choice\n\t#\"What do you mean, 'first'?\"\n\t\t*set curiosity %-10\n\t\tHe gives you a sharp look. \"New Sydney is one of our best trading partners, as you know very well. Once you're fully trained, you'll be running these negotiations.\"\n\t#\"Thank you for bringing me along.\"\n\t\t*set empathy %+10\n\t\tHe nods, businesslike. \"I couldn't exactly leave my apprentice and heir behind, could I?\"\n\t#\"What a horrid place!\"\n\t\t*set empathy %-10\n\t\t\"Be careful to keep your manners when you come here in future,\" he warns you. \"They're just as proud of their city as we are of ours. Being rude won't help keep the farm in good standing.\"\n\nYou realize the implications of what he's saying and stiffen. It seems your future career has already been decided for you. He spoke so calmly that it's clear he hasn't considered that you might be interested in another path. You mumble something and turn to stare out at the endless blue beyond the speeder's Glass. \n\nDad wouldn't be so sure of anything without Mom being on the same page. You thought you were at a crossroads in life with all the world laid out before you. It turns out you don't have any choices after all.\n\nNo.\n\nYour parents no longer make your decisions for you. Or at least, not for much longer. Whether you choose the family farm or not, the decision is yours, not theirs.\n\nYour throat tightens at the implications of what you're thinking. If you choose to defy Mom and Dad's expectations, they'll be shocked. Possible angry. They might withdraw support from you: emotional, financial, or even professional. \n*fake_choice\n\t#Warn him politely that I haven't decided on my future yet.\n\t\t*set flexibility %+10\n\t\t\"Dad,\" you say gently, pausing to make sure he knows he won't lik
