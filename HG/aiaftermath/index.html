<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI - Aftermath — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "aiaftermath", "title": "AI - Aftermath", "scenes": {"choicescript_description": "Set on a mission of saving the world from an imminent apocalypse caused by malevolent AI activity. Meet your eternal lover help her choose who she is in this incarnation. Convince the forces of heaven and a beautiful fairy being to help you in your mission.\n\t\nAI – Aftermath is a 36,000 word interactive SF novel by Ivailo Daskalov  where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\t\n\t", "choicescript_stats": "*stat_chart\n\ttext name Name\n\ttext gender Sex\n\n\ttext heal Healing\n\n\ttext co Circuit Overload\n\n\ttext charm Charismatic Charge\n\n\ttext bm Disruptive Blade Mastery \n\n\ttext res Resurrection\n\t\n\ttext athletics Athletic Boost \n\t\n\ttext strength Strength Enhancement \n\n\ttext resistance Damage Resistance  \n\t\n*line_break\n*stat_chart\n\topposed_pair Love\n\t\tFear\n\n\topposed_pair Anger\n\t\tComposure\n\n\topposed_pair Humanity\n\t\tAI\n\t\n\topposed_pair Independence\n\t\tDependence\n\n*line_break\n*stat_chart\n\ttext fallen_name Soulmate's Name\t\n\ttext fallen_gender Soulmate's Sex\n\t\n\ttext hacking Hacking \n\ttext lockpicking Lockpicking \n\ttext vibro Vibrodagger wielding \n\ttext control Robotics control\n\ttext reingineering Re-eingineering \n\ttext runemastery Runemastery \n\ttext selfcontrol Self-control \n\ttext intuition Intuition ", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 12[/b]\n  \n  Unlock chapters 4 through 12, including the thrilling conclusion!\n  \n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 12[/b]\n  \n  You've paid to unlock chapters 4 through 12.\n", "dream": "You know it is a dream, and yet it is one of vivid colors and sounds.\n\n[i]You will recall but won't remember[/i]. The voice of the lady that has been with you ever since your soul was created still echoes in your mind, but she is not in the dream. You \njust know that as it progresses you will be able to access more of her guidance, but for the time being it is all you have.\n\nYou are about to enter the house. It is bustling with the noises of people having fun, like a hive, a monotonous set of sounds occasionally broken by laughter. Poking \nthrough the window you realize that inside it is much more spacious than you can assume by looking at the outline of the building from the place you are standing at. It doesn't make \nmuch sense, but maybe in this dreamy world the laws of physics are funny.\n\nYou are in the uniform of a psionicist from the Confederation of Intergalactic Humans that is skintight (and quite comfortable to be honest) and outlines a fit and...\n*choice \n\t#...feminine body.\n\t\t*set gender \"Female\"\n\t\t*set brother \"sister\"\n\t\t*goto 2\n\t\n\t#...masculine body.\n\t\t*set gender \"Male\"\n\t\t*goto 2\n\t\t\n*label 2\nThe body you have is not the main weapon, there is much more than what meets the eye. \nIt is your mind and the psionic abilities, the power to manifest the forces of creation (or destruction) using your \ncentral nervous system.  \n\nA side effect of your powers is the aptitude to often travel to dreamy shards of reality, seeking for knowledge and understanding. Now, you feel that you are about \nto embark on an exciting journey of discovering precious gifts from your soul.\n\nBut before that, it seems like a good idea to get over the concrete psionic abilities that you have and choose one that is your strongest.\n*goto 3\n\n*label 3\nWhich ability would you like to look into?\n*choice \n\t#Healing \n\t\tHealing is one of the most direct manifestations of the power of creation. A high score would enable you to bind wounds received in combat or even \n\t\tcure diseases.\n\t\t\n\t\tIs that your choice for the ability you excel at?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\t*set heal 3\n\t\t\t\t*goto 4\n\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 3\n\t\t\t\t\n\t#Circuit overload \n\t\tCircuit overload is an aspect of destruction and is aimed at the annihilation of artificial constructs such as AIs and androids, as well as disabling \n\t\tthe implants affecting (mind controlling) the central nervous system of humans.\n\t\t\n\t\tIs that your choice for the ability you excel at?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\t*set co 3\n\t\t\t\t*goto 4\n\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 3\n\t#Charismatic charge \n\t\tWhile charisma is not directly related to the practices of psionics, it appears to be another valuable side effect of its own. Others tend to find themselves more \n\t\tcomfortable in the presence of psionicists and more likely to trust them or even reveal what torments their souls.\n\t\t\n\t\tIs that your choice for the ability you excel at?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\t*set charm 3\n\t\t\t\t*goto 4\n\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 3\n\t\n\t#Disruptive blade mastery \n\t\tHatari is the name of the weapon you always carry with you. Not all psionicists have one, but you insisted on obtaining yours to match the warrior \n\t\tcharacteristics of your soul.\n\n\t\tWhen you are out of combat, it is just a hilt you usually attach to the fabric that acts as your belt. When activated, however, your mind manifests \n\t\ta blade of sparkling psionic energy.\n\t\t\n\t\tA high score in disruptive blade mastery would indicate both your ability to manifest a deadly blade and also your fighting prowess.\n\t\t\n\t\tIs that your choice for the ability you excel at?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\t*set bm 3\n\t\t\t\t*goto 4\n\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 3\n\t\n\t#Resurrection\n\t\tThe act of resurrection is still considered controversial by many. When somebody succumbs to wounds and dies the body can be taken to a healing pot\n\t\twhere it is prepared to sustain life again. The role of the psionicist is to dare to delve into the abyss and find the particular soul on its way to Source. \n\t\tWith their permission granted, the psionicist guides it back to the body.\n\t\t\n\t\tResurrection is a bit easier to accomplish in a dreamy world, but you would still need a very high score in that in order to be successful.\n\t\t\n\t\tIs that your choice for the ability you excel at?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\t*set res 3\n\t\t\t\t*goto 4\n\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 3\n\t\t\t\t\n\t#Athletic boost \n\t\tYour psionic power can be used in order to quicken the electric flow within your central nervous system effectively improving your reflexes, speed of body movements,\n\t\tand coordination.\n\t\t\n\t\tIs that your choice for the ability you excel at?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\t*set athletics 3\n\t\t\t\t*goto 4\n\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 3\n\t\t\n\t#Strength enhancement \n\t\tOne of the first studies on psionic powers was related to athletes being able to lift weights that were considered impossible because of the limitations \n\t\tof the human skeleton. The researchers \n\t\tat the time were unable to draw the right conclusions, but later on it was discovered that the amazing effects were due to the ability of the mind to unleash \n\t\tthe energy that can be concentrated into achieving physical miracles.\n\t\t\n\t\tIs that your choice for the ability you excel at?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\t*set strength 3\n\t\t\t\t*goto 4\n\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 3\n\t\t\t\t\n\t#Damage resistance\n\t\tThe first missions in which psionicists were involved showed their ability to take much more physical damage before they lose consciousness or die. Specialists \n\t\ttried to work in that direction and provide guidelines for achieving the best possible results.\n\t\t\n\t\tIs that your choice for the ability you excel at?\n\t\t*choice \n\t\t\t#Yes \n\t\t\t\t*set resistance 3\n\t\t\t\t*goto 4\n\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 3\n\t\t\t\t\n*label 4\nAs a psionicist, you were able to choose between getting deeper into the studies that dealt with enhancing your physical abilities (disruptive blade mastery, athletic boost, strength \nenhancement and damage resistance) or your mental ones (psionic healing, circuit overload, charismatic charge and resurrection).\n\nWhat was your choice?\n*choice\n\t#the physical ones \n\t\t*set bm +2 \n\t\t*set athletics +2 \n\t\t*set strength +2 \n\t\t*set resistance +2\n\t\t*goto 41 \n\t\t\n\t#the mental ones \n\t\t*set heal +2 \n\t\t*set co +2 \n\t\t*set charm +2 \n\t\t*set res +2\n\t\t*goto 41 \n\t\t\n\t#a bit of both \n\t\t*set heal +1 \n\t\t*set co +1 \n\t\t*set charm +1 \n\t\t*set res +1 \n\t\t*set bm +1 \n\t\t*set athletics +1 \n\t\t*set strength +1 \n\t\t*set resistance +1 \n\t\t*goto 41 \n\t\t\n*label 41 \nAs you get closer to the entrance of a building a figure comes out, as if aware of your coming. The long cloak hides most of the features, but the silhouette hints of a...\n*choice\n\t#...masculine body.\n\t\t*set fallen_gender \"Male\"\n\t\t*set her \"his\"\n\t\t*set her2 \"him\"\n\t\t*set she \"he\"\n\t\t*set woman \"man\"\n\t\t*set hers \"his\"\n\t\t*set dress \"suit\"\n\t\t*set herself \"himself\"\n\t\t*goto 5\n\t\t\n\t#...feminine body.\n\t\t*goto 5\n\t\t\n*label 5\nAs ${she} gets closer to you, ${she} reaches for ${her} hood, displaying a beautiful set of nails that you suppose can be used as weapons if the need requires. $!{her} face is displayed, ${her} \neyes meeting yours. You gulp in an effort to suppress something coming out from the depths of your existence, the warmth of the comfort of being in contact with a part of who you are, speckled \nwith the uncontrollable pain of losing what your soul holds as the most dear.\n\n[i]You recall but you don't remember[/i]\n\nIt takes eternity to move your sight away from the hazel immaculate dream down the chiseled cheeks, and this is when your heart skips another beat. You would love to see the lips of that \nadorable stranger, that seems to be no stranger at all, but they are covered by a metal mask. Your eyes follow its trails and your initial fears are confirmed. It is an implant that ends around ${her} temples...\ninto ${her} brain.\n\n$!{she} is the enemy, a representation of all you fought in this life. What started as a promise of beautiful tomorrows, of combining the mathematical precision and speed of \nexecution of a construct with the warmth of human emotions slowly turned to humanity being totally exterminated from these enhanced individuals. It was an outbreak\nwhich some doomsday predictions included, and yet it caught so many unprepared. Flashes from the horror of war appear before your eyes, giving you a chilly flush after the \nseductive warmth of the young ${woman}.\n\n$!{her} whisper touches you like the sound of a breeze dancing with the blossoms of an orchard. \"It is nice to be able to stay in your field,\n*if (gender=\"Male\")\n\t*choice \n\t\t#Jacob\" \n\t\t\t*set name \"Jacob\"\n\t\t\t*goto 6\n\t\t\t\n\t\t#George\"\n\t\t\t*set name \"George\"\n\t\t\t*goto 6\n\t\t\n\t\t#Steve\"\n\t\t\t*set name \"Steve\"\n\t\t\t*goto 6\n\t\t\t\n\t\t#You hear another name\n\t\t\t*input_text name \n\t\t\t*goto 6\n\t\t\t\n*else \n\t*choice \n\t\t#Ritta\" \n\t\t\t*set name \"Ritta\"\n\t\t\t*goto 6\n\t\t\t\n\t\t#Helda\"\n\t\t\t*set name \"Helda\"\n\t\t\t*goto 6\n\t\t\n\t\t#Misha\"\n\t\t\t*set name \"Misha\"\n\t\t\t*goto 6\n\t\t\t\n\t\t#You hear another name\n\t\t\t*input_text name \n\t\t\t*goto 6\t\n\t\t\t\n*label 6\n\"Welcome home, dear one,\" ${she} says. $!{her} mask would not allow you to see it, but ${her} eyes smile.\n\nYou don't reply, but you ask yourself if that is another piece of the riddle you have to struggle with.\nThe telepathic voice of your guide comes as an answer to your call for a hint.\n\n[i]Home is in ${her} arms, but what would you find there? It will be up to you and the choices you make. $!{she} can be the love and lust that can fill \nthe wells of your souls with the holy waters of Source. Or ${she} can be your worst nemesis, if that is the path of exploration that you need to embark on.\nDoes it scare you to realize that every thought you have is somehow reflected in the mirror ${she} holds? Every perception of the world that surrounds you is \nsynthesised in what you see in that welcoming entity. What would you make of that knowledge? That masked ball you are about to enter is all about ${her2}. \n\nThere you will see four aspect of ${hers}. One of them will accompany you in your adventures ahead. Take your time and choose wisely. And, expect a surprise at the end.\nKnow that I am with you, silently watching you in every step that you take, but until  we speak again, I bid you peace of mind and heart. [/i]\n\nHow do you feel about the words of your silent guide?\n*choice \n\t#I think she is telling me too much, spoiling the fun of my explorations\n\t\t*set independence +5\n\t\t(Independence++)\n\t\t*goto 7\n\t\t\n\t#I am perfectly happy the thoroughness of her revelation\n\t\t*goto 7\n\t\t\n\t#I wish she would tell me more, at least about the surprise\n\t\t*set independence -5\n\t\t(Dependence++)\n\t\t*goto 7\n\t\n\t#It is nice to have a guide to lend me a land every now and then\n\t\t*set independence -3\n\t\t(Dependence+)\n\t\t*goto 7\n\t\t\n\t#I will listen to what the guide says but will take everything with a pinch of salt\n\t\t*set independence +3\n\t\t(Independence+)\n\t\t*goto 7\n\t\t\n*label 7\n*page_break\nThe appearance of the ${woman} brings about a bucket of associations and emotions. Which of them would you allow to grow the deepest roots into your present understanding \nof reality?\n*choice \n\t#Anger - because of the many human lives taken away by ${her} kind\n\t\t*set anger +5\n\t\t(Anger ++)\n\t\t\n\t\t\"You are not going to blame me for the sins committed by others like me, aren't you?\" ${she} says bravely, as if reading your thoughts.\n\t\t\n\t\t\"It won't be right to judge you before having any chance to get to discover more about you. But the traumas inflicted on my soul by people \n\t\twearing a mask like yours are still there and I involuntarily connect to them. I am sorry, it is hard for me to control those feeling right now.\"\n\t\t\n\t\t\"I understand,\" ${she} sighs and looks away in an effort to hide the sadness in ${her} eyes. \"Thank you for letting me know about it. It is true that I can almost feel \n\t\tyour emotions, but the explanation of the reasons behind them would elude me. Let me say that anger is an emotion I have been dealing with a lot in my past. \n\t\tI hope it will not cloud your choices and it will not silence the voice of your heart. Now, would you mind if we get in?\"\n\t\t\n\t\tYou shake your head and enter.\n\t\t*goto 8\n\t\n\t#Fear - because of the perceived danger you might be in \n\t\t*set love -5\n\t\t(Fear ++)\n\t\t\n\t\t\"Why are you standing so far from me?\" ${she} asks. \"Is the physical proximity to me bothering you?\"\n\t\t\n\t\t\"It is true that I feel a bit uneasy in your presence, as the traumas inflicted on my soul by people \n\t\twearing a mask like yours are still there and I involuntarily connect to them. I guess my intuition is trying to tell me that you pose no \n\t\tdanger to me, but my rational mind tends to disagree.\"\n\t\t\n\t\t\"I understand,\" ${she} sighs and looks into your eyes in the most benevolent way. \"Thank you for letting me know about it. It is true that I can almost feel \n\t\tyour emotions, but the explanation of the reasons behind them would elude me. I have respect for your pain and fear. All I can say is that \n\t\tI hope it will not cloud your choices and it will not silence the voice of your heart. Now, would you mind if we get in?\"\n\t\t\n\t\tYou shake your head and enter.\n\t\t*goto 8\n\t\t\n\t#Respect - for the technologically enhanced organism ${she} is \n\t\t(AI ++)\n\t\t\n\t\t\"You look at me with awe,\" ${she} says. \"Why?\"\n\t\t\n\t\t\"I don't know what this implant is doing, but I guess it helps you be quicker or smarter.\"\n\t\t\n\t\t$!{she} nods and ${her} eyes smile. \"You are right about both. But knowing your background, I am surprised you accentuate on this feeling.\"\n\t\t\n\t\tYou sigh. \"Those... monsters that wore a mask like yours, they were still human for the most part. Honestly, in my heart I doubt the artificial codes\n\t\tadded to their cognitive process changed them that much. I supposed they were terrible to begin with.\"\n\t\t*set humanity -5\n\t\t*goto 8\n\t\t\n\t#Love - the Source-blessed connection transcending forms and incarnations \n\t\t(Love++)\n\t\t\n\t\t\"I behold the look in your eyes I remember from the times that can't be recalled by you in this moment,\" ${she} says. \"This fills my heart with joy and hope.\"\n\t\t\n\t\t\"I don't care about the form you have chosen to present yourself to me, or the mask you wear. My only concern is the soul behind your beautiful eyes.\"\n\t\t*set love +5\n\t\t*goto 8\n\t\t\n\t#Calmness - it is just a game of exploration and remembering \n\t\t*set anger -5\n\t\t(Composure++)\n\t\t\n\t\t\"I must admit I expected a more emotional response from you, triggered by the sight of me,\" ${she} says in a seductive tone.\n\t\t\n\t\tYou laugh. \"I have the feeling you like watching films, right?\"\n\t\t\n\t\t\"It is as you say. You don't fully remember me, but certain details are starting to come out.\"\n\t\t\n\t\t\"Then maybe the choice to just relax and see things from aside is not foreign to you?\"\n\t\t\n\t\t$!{she} nods. \"But you are the main actor in this story. Should I remind you that?\"\n\n\t\t\"Not at all. Let's just say that I am waiting for things to get even more interesting.\"\n\t\t*goto 8\n\t\n\t#Curiosity - there is so much more to discover about this human being \n\t\t(Humanity++)\n\t\t\n\t\t\"I have the feeling you are about to start asking me millions of questions,\" ${she} says foxily.\n\t\t\n\t\t\"Are you reading my mind?\" you ask.\n\t\t\n\t\t\"To a certain extend.\"\n\t\t\n\t\t\"I have always been interested in the stories people were willing to share. And I have the feeling your will touch me deeply in so many ways.\"\n\t\t\n\t\t$!{she} laughs. \"I would be disappointed if it didn't happen like that. I only want you to have a little more patience, you will shortly find out more about me.\"\n\t\t*set humanity +5 \n\t\t*goto 8\n\t\t\n*label 8\n*page_break\n$!{she} enters the building and you follow ${her2} into a lobby with a single table and a couple of chairs. There is a corridor behind it and jolly noises of people singing to the \nsounds of a rock ballad are coming from the distance. To the sides of the lobby, there are four doors: white; black; red; and blue.\n\n\"I didn't tell you my name, did I?\"\t${she} asks as her gesture invites you to take a seat and ${she} does the same.\n\n\"No, you didn't.\" You sit in front of ${her2}.\n\n\"And my guess is that you don't remember?\"\n\nYou shake your head. \"Not at all.\"\n\n\"It is...\"\n*if (fallen_gender=\"Male\")\n\t*choice \n\t\t#Jack \n\t\t\t*set fallen_name \"Jack\"\n\t\t\t*goto 9\n\t\t\t\n\t\t#Samuel\n\t\t\t*set fallen_name \"Samuel\"\n\t\t\t*goto 9\n\t\t\t\n\t\t#James\n\t\t\t*set fallen_name \"James \"\n\t\t\t*goto 9\n\t\t\t\n\t\t#You hear another name\n\t\t\t*input_text fallen_name \n\t\t\t*goto 9\n\t\t\t\n*else \n\t*choice \n\t\t#Freya \n\t\t\t*set fallen_name \"Freya\"\n\t\t\t*goto 9\n\t\t\t\n\t\t#Mary \n\t\t\t*set fallen_name \"Mary\"\n\t\t\t*goto 9\n\t\t\n\t\t#Samantha\n\t\t\t*set fallen_name \"Samantha\"\n\t\t\t*goto 9\n\t\t\t\n\t\t#You hear another name\n\t\t\t*input_text fallen_name \n\t\t\t*goto 9\t\n\t\n*label 9\n*page_break\n\"Do you want something to drink?\" ${she} asks you.\n\nYou shake your head. \"Not yet. But I can listen if you have a story to tell me. Who are you, ${fallen_name}?\"\n\n\"What I tell you will not be something new to you, but the incarnation you are having now is governed by oblivion. There are certain benefits of it and drawbacks too. But let me \ntell you about my path, as I can feel your impatience building.\n\n\"I was a Guardian, something like a combination between a police officer, warrior and a diplomat. Before the rise of the AI infested, war was so rare that the military had \nto be re-qualified to fulfill other duties. Law enforcement was logically the closest task that could be given to people like me, while many found that the discipline and \nself-control taught in the army was actually very useful on the negotiations table. It was my choice too, and for a while I enjoyed a very pleasant and peaceful life \ntravelling to lots of interesting places and learning about foreign cultures.\n\n\"And then the accident happened. It was officially disclosed as such, but was indeed an assassination attempt. It got me severely injured. The exact damage varies \nfrom timeline to timeline, like the decisions I took in each case. This is how we end up with the four aspects of me that are waiting for you to discover behind each of the four doors.\"\n*page_break\n\"Aspects, timelines... I am not sure what you are talking about,\" you say.\n\n\"You do, actually, you just need to connect what I am telling you to a principle you know very well.\"\n\n\"Really?\"\n\n$!{she} nods. \"Yes, it is quite simple. You like reading interactive fiction, don't you?\"\n\n\"You either know me very well or read me like an open book,\" you say.\n\n\"Mainly the former and a bit of the latter. So, imagine that at the time of the accident had a *choice to make and it resulted in splits in the narrative, or timelines, \nso there would be different versions of me, wounded in different ways. They all exist somewhere there, in the text.\"\n\n\"That sounds understandable.\"\n\n\"The next set of decisions I had to take was how to heal... or not to heal. This expanded the number of different versions of me even more.\"\n\n\"Do I get to see them all tonight?\"\n\n\"No, just the four major ones. Actually, you are looking at one of them right now. But you will get to learn more about that concrete form of me behind the blue door.\"\n*page_break\n\"Now, let me guess, there will be an angel behind the white door and a demon behind the black one?\" you suppose.\n\n\"You are more or less right, although I wouldn't use those terms. One of those aspects of me is possessed by thought of carnage and destruction fueled by the anger from the traumas.\nThe other one joined a cult that was supposed to heal ${her2} by balancing ${her2} and reconnecting to Source. $!{she} will tell you more, but let's say that it didn't work out as intended.\"\n\n\"What about the red door?\" you inquire.\n\n\"This is the aspect that listened to the warnings about the AI infestations through the implants and decided not to have one, which lead ${her2} down the path of understanding what \nit means to be human. She chose to remain blind.\"\n\nHow would you comment on that?\n*choice \n\t#\"My stomach turns at the thought of ${her2} spending a lifetime of blindness just because ${she} refused help.\"\n\t\t*set anger +5\n\t\t*set humanity -5\n\t\t(Anger++, AI++)\n\t\t\n\t\t\"The burning fires of your anger remind me of most of the incarnations we had together, dear one,\" ${fallen_name} says. \"For indeed you have been a warrior of a kind \n\t\tin many of them. But, let me tell you that trait of yours will be more welcomed by the aspect of mine that is in the black room. $!{she} is the avatar of rage \n\t\therself and if you continue honoring Wrath, you will be a perfect match to ${her} vibration.\n\t\t\n\t\t\"I can also tell from your response that you respect the mechanical parts of hybrid humans like me, which warms the heart of the aspect of your eternal \n\t\tother that I am. There is so much fear of your rejection in it, although I know the trails of love will pull us closer in one way or another.\"\n\t\t*goto 91\n\t\t\n\t\t\n\t#\"I am happy ${she} was able to find ${her} peace in ${her} human side.\"\n\t\t*set anger -5\n\t\t*set humanity +5\n\t\t(Composure++, Humanity++)\n\t\t\n\t\t\"I feel the respect for balance in you. I have the feeling it may allow you to see more of yourself in the aspect of me in the white room, the \n\t\tangel that decided to work on ${her} emotional body in a very radical way. But I will say no more because I wouldn't like to influence your first impression of ${her2}.\n\t\t\n\t\t\"As I expected, you show a preference to the more narrow definition of being human, which is totally understandable as I know your background. I know that I must not say that to you,\n\t\tsince I am the aspect that was chosen to meet you over the others, but... the fears I had inside my mind about being rejected by you... at this point it seems they were\n\t\tjustified. In my heart of hearts, I know the trails of love will pull us closer in one way or another, but I still feel a pang of pain.\"\n\t\t*goto 91\n\t\t\t\t\n\t#\"I would feel more tranquil knowing that ${she} received the benefits of technology.\"\n\t\t*set anger -5\n\t\t*set humanity -5\n\t\t(Composure++, AI++)\n\t\t\n\t\t\"I feel the respect for balance in you. I have the feeling it may allow you to see more of yourself in the aspect of me in the white room, the \n\t\tangel that decided to work on ${her} emotional body in a very radical way. But I will say no more because I wouldn't like to influence your first impression of ${her2}.\n\t\n\t\t\"I can also tell from your response that you respect the mechanical parts of hybrid humans like me, which warms the heart of the aspect of your eternal \n\t\tother that I am. There is so much fear of your rejection in it, although I know the trails of love will pull us closer in one way or another.\"\n\t\t*goto 91\n\t\n\t#\"I am so angry that no matter how advanced the human race is, nothing is a match to a mechanical transplant.\"\n\t\t*set anger +5\n\t\t*set humanity +5\n\t\t\n\t\t(Anger++, Humanity++)\n\t\t\n\t\t\"The burning fires of your anger remind me of most of the incarnations we had together, dear one,\" ${fallen_name} says. \"For indeed you have been a warrior of a kind \n\t\tin many of them. But, let me tell you that trait of yours will be more welcomed by the aspect of mine that is in the black room. $!{she} is the avatar of anger \n\t\tand if you continue honoring Wrath, you will be a perfect match to ${her} vibration.\n\t\t\n\t\t\"As I expected, you show a preference to the more narrow definition of being human, which is totally understandable as I know your background. I know that I must not say that to you,\n\t\tsince I am the aspect that was chosen to meet you over the others, but... the fears I had inside my mind about being rejected by you... at this point it seems they were\n\t\tjustified. In my heart of hearts, I know the trails of love will pull us closer in one way or another, but I still feel a pang of pain.\"\n\t\t*goto 91\n\t\t\n*label 91\n*page_break\n\"That is a very interesting story, my dear,\" you exclaim. \"\"But let me ask you about the meaning of the whole game you invited me to play tonight. I must \nsay I am interested, but I want to know what it means to you.\"\n\n$!{she} takes a deep breath and looks into your eyes and you feel the strings that connect your souls pulling you together. \"At that point, the fragmentation \nbecame impossible to sustain. Those two aspects of me were so tremendously different that my soul felt about to fall apart from the strain of being expanded into all of them.\nThat challenge is ongoing. I need to find a point of unity of all four, to combine them around one of them so that I can continue with my exploits and do the things I am supposed to.\"\n\n\"And that decision has to come down to me?\" you suspect.\n\n\"This is a decision I was not able to take alone,\" ${she} explains. \"So, I decided to ask you to do that for me. Again, I want to remind that the way the integration will take place \nwill be designed by me, you are only requested to choose the centerpiece aspect. What would you say about it?\"\n\n*choice \n\t#\"The love I feel in my soul would be honored to do that as a service to you.\"\n\t\t*set love +5\n\t\t*set independence -5 \n\t\t(Love++, Dependence++)\n\t\t\n\t\t\"Words can never say how much happiness your words bring to me.\" $!{her} eyes get wet and ${she} reaches for your hand.\n\t\t*goto 10\n\t\t\n\t#\"My heart tells me that it is not a custom for my love to be displayed by affecting who you are.\"\n\t\t*set love +5\n\t\t*set independence +5\n\t\t(Love++, Independence++)\n\t\t\n\t\t\"It is as you say. When you have a couple of souls that are so close together that they are virtually overlapping, it is important to \n\t\tallow the other one to maintain its own space. This is what the rules say, and now I am asking you to break them because I believe that would serve my \n\t\thighest good. Would you like to do that.\"\n\t\t\n\t\t\"Saying no would bring a great discord into the very depths of my beings. I will play that game for you.\"\n\t\t\n\t\t\"Words can never say how much happiness your words bring to me.\" $!{her} eyes get wet and ${she} reaches for your hand.\n\t\t*goto 10\n\t\t\n\t#\"I fear that you may not like the choice I will make.\"\n\t\t*set love -5\n\t\t*set independence +5\n\t\t(Fear++, Independence++)\n\t\t\n\t\t\"So you fear that you will choose the one aspect that I am most disconnected with on a soul level and that aspect would become dependent on the \n\t\tprinciples of separation?\" $!{she} squeezes ${her} eyes in an effort to concentrate better.\n\t\t\n\t\t\"I am not sure I understand you very well, but the thought I am have sounds similarly difficult to grasp.\"\n\t\t\n\t\t\"Well, I trust you completely,\" ${she} says and reaches for your hand.\n\t\t\n\t\t\"I will play that game for you, but know that I may feel doubt in every step I take.\"\n\t\t\n\t\t\"Well, I want to thank you and say that I am sorry for you insecurity. Can you trust me when I say that in the end we are both going to be very happy \n\t\twith what the result will be?\"\n\t\t\n\t\t\"I will certainly try, but I am not sure I can promise anything.\"\n\t\t*goto 10\n\t\t\n\t#\"I fear that I may end up manipulating you.\"\n\t\t*set love -5\n\t\t*set independence -5\n\t\t(Fear++, Dependence++)\n\t\t\n\t\t\"What do you mean by that?\" ${she} asks you.\n\t\t\n\t\t\"I fear that I may choose the aspect that serves the needs of my ego in the best way, one that is the easiest to control and not the one who \n\t\tmeets the needs of your highest good.\"\n\t\t\n\t\t$!{she} laughs. \"Do you really think that any of them is easy to manipulate? Believe me, you will have a very hard time doing that to whoever you choose. And, you \n\t\ttalk about your ego? It is very rare to find a person where you come from with a more balanced one.\"\n\t\t\n\t\t\"You are making me blush,\" you admit.\n\t\t\n\t\t\"Well, I trust you completely,\" ${she} says and reaches for your hand.\n\t\t\n\t\t\"I will play that game for you, but know that I may feel doubt in every step I take.\"\n\t\t\n\t\t\"Well, I want to thank you and say that I am sorry for you insecurity. Can you trust me when I say that in the end we are both going to be very happy \n\t\twith what the result will be?\"\n\t\t\n\t\t\"I will certainly try, but I am not sure I can promise anything.\"\n\t\t*goto 10\n\t\t\n*label 10\n*page_break\n\"Alright, you can now choose a door to enter and meet one of the aspects you already know a little bit about.\"\n*goto 11\n\n*label 11 \n\nWhich one will you select?\n*choice \n\t*hide_reuse #The white one \n\t\t*goto white\n\n\t*hide_reuse #The black one \n\t\t*goto black \n\t\t\n\t*hide_reuse #The blue one \n\t\t*goto blue \n\t\t\n\t*hide_reuse #The red one \n\t\t*goto red \n\t\t\n\t#You tried them all?\n\t\t*goto 12 \n\t\t\n*label white \nYou enter a room that looks like a gallery, with more than a dozen abstract painting on the wall, most of them dominated by dull colors. There is a ${woman} sitting in a \nchair in the middle, looking at one that is black and while. There is a slight smile on ${her} face. Nevertheless, the picture leaves you with horrific impressions.\n\n$!{she} turns around to face you and the resemblance to the one you left in the lobby strikes you. This one, however, is wearing an official ${dress} with an open back that \nallows a beautiful set of wings to be seen. Also, ${she} doesn't have the mask.\n\n\"So, you are the chosen one who would come and bring me back to wholeness even further, the one who will also be the one who will guide me to my fate?\"\n\n$!{her} smile never changes and it seems there is no change in ${her} emotional state triggered by your arrival.\n\nWhat would you reply?\n*choice \n\t#\"I will do my best to decide wisely, if that is what fate requires of me.\"\n\t\t*set independence -5 \n\t\t(Dependence++)\n\t\t\n\t\t\"Following the will of the creator feels good, doesn't it? It comes with such a feeling of purpose,\" ${she} says in an exalted way.\n\t\t\n\t\t\"I was asked by your soul, not by any creator,\" you claim.\n\t\t\n\t\t\"That is right, my soul is the creator of the aspect that I am.\"\n\t\t\n\t\t\"Oh... that actually makes sense.\"\n\t\t*goto white2\n\t\t\n\t#\"I believe your soul has the means to decide on its own and I hope that is the decision it takes before the night is over.\"\n\t\t*set independence +5 \n\t\t(Independence++)\n\t\t\n\t\t$!{she} gives out a sporadic laugh. \"You can try to escape the will of the creator but you would be doomed to fail.\"\n\t\t\n\t\t\"That is right, my soul is the creator of the aspect that I am.\"\n\t\t\n\t\t\"Oh... that actually makes sense. But I was not forced into this deal, as you may suggest, I just agreed to do it.\"\n\t\t\n\t\t\"Whatever.\" $!{she} shrugs.\n\t\t*goto white2\n\t\t\n\t#\"Would you like to be the aspect I choose?\"\n\t\t\"I really don't care. I know that as long as I serve the will of the creator everything will be good. Love and light!\" $!{she} makes a gesture that \n\t\tyou don't recognize. \n\t\t\n\t\t\"I was asked by your soul, not by any creator,\" you claim.\n\t\t\n\t\t\"That is right, my soul is the creator of the aspect that I am.\"\n\t\t\n\t\t\"Oh... that actually makes sense.\"\n\t\t*goto white2\n\t\t\n*label white2\n*page_break\nWhat would you like to do?\n*choice\n\t*hide_reuse #Ask ${her2} to share ${her} story \n\t\t\"I have some vague memory of an incident that was very traumatic.\" $!{she} frowns for a second, and the Mona Lisa smile rises again. \"But then I joined the \n\t\twhite fellowship. They helped me meditate and forget. It seems I needed to do that in order to heal. For the first time since I could remember, I felt that \n\t\tincredible belonging to a group. I can never thank them enough for what they did for me.\"\n\t\t\n\t\t\"Were you doing only meditations?\" you ask, following a suspicion of yours.\n\t\t\n\t\t$!{she} shakes ${her} head. \"It was more like a total institution. We would sleep in a big room, eat together, bathe together, play multiplayer games. We would do other things \n\t\ttogether too.\"\n\t\t\n\t\tYou might regret it later, but you decide not to ask about the other things for the time being.\n\t\t\n\t\t\"I understand,\" you reply.\n\t\t*goto white2\n\t\t\n\t*hide_reuse #Ask ${her2} to allow you to see ${her} wings \n\t\t\"Sure, that would be a pleasure.\"\n\t\t\n\t\t$!{she} stands up and shows you ${her} back, sending the sweet scent of sakura all over the room. The wings look quite majestic, but there is something strange about the way they are attached to ${her} body.\n\t\t\n\t\tIt seems that this aspect of that special soul has telepathic abilities too. \"What is wrong back there, has the attachment mechanism malfunctioned again?\"\n\t\t\n\t\t\"Attachment mechanism?\" you wander.\n\t\t\n\t\t\"Yes, you don't think they grew naturally on my back, do you? They are implants that sometimes need to be taken out for maintenance. They introduce the angelic DNA\n\t\tcode into my body that makes me feel so close to Source.\"\n\t\t\n\t\tAt this point you realize ${she} is AI infected too, probably even more than the aspect that met you on your way into the building.\n\t\t\n\t\tWhat is your reflection on that discovery?\n\t\t*choice \n\t\t\t#The AI program made ${her2} feel good, this is what counts.\n\t\t\t\t*set humanity -5\n\t\t\t\t*set anger -5\n\t\t\t\t(AI++, Composure++)\n\t\t\t\t*goto white2\n\t\t\t\t\n\t\t\t#It was terrible for whoever did this to leave ${her2} devoid of emotions.\n\t\t\t\t*set humanity +5\n\t\t\t\t*set anger +5\n\t\t\t\t(HUmanity++, Anger++)\n\t\t\t\t*goto white2\n\t\t\t\t\n\t#Bid ${her2} farewell and return to the main room\n\t\t*goto 11\n\t\t\n*label blue \nAs soon as you enter through the blue door, it closes behind you. \n\n\"It is nice to see you again,\" the ${woman} who you just left in the lobby says, and this time ${she} is right in front of you. \n\nYou can't help but wander what would happen if you open the door and look in both directions. Will you be able to see two copies of the very same \naspect?\n\n\"I know it is confusing, my dear. But I guess once you accept that there can be different aspects of the very same person existing together, few other things sound \nridiculous, right?\" $!{she} tries to make you more comfortable.\n\n\"I guess you are right. But, I have the feeling you are about to try to expand my understanding of what reality can be like even further.\"\n\n$!{she} laughs. \"It seems you are starting to remember the ability to read my mind too. I like that because it is one of the manifestations of the relationship we have. Follow me, \nif you please.\"\n\n$!{she} starts walking down a corridor and you get the chance to admire the way ${she} moves. There is something feline about ${her} stride, some grace that adds elegance to \nthe attractiveness of ${her} form.\n\nYou gulp. It feels weird to be around somebody who knows what you are thinking.\n\n\"I know you very well, my dear, and I must say that I am very fond of what I know. So, just relax and be yourself. You can never go wrong with me following that simple rule.\"\n*page_break\n\"Maybe I should finally answer your question. I am going to take you to a place where you will be able to see something interesting. I will be frankly open to you \nand say that I hope that it will change the way you see androids and hybrids forever. It will be my chance to get closer to your heart and I hope everything goes well.\"\n\nYou reach a large hall. There are many people who look quite busy, and this is maybe why nobody notices you. But right there, in the middle, there is an android sitting \nin a chair and drawing something. You get closer, expecting to see some kind of a scheme, but it turns out to be a flower. The quality of the picture would be easily \nsurpassed by any four-year kid, but this does not make what you see less impressive.\n\n\"What is the meaning of this?\" you ask.\n\n\"I invited you to see the prototype of a robot that has been coded in accordance to the principles of creation, love and light. We can agree that its abilities to create art \nare quite limited, but this is not the aim behind the codes its mentality is following. In fact, his coders were amazed by his desire to do so, although a careful \nanalysis would suggest it is highly probable.\"\n\n\"How does it work?\" you ask.\n\n\"Believe it or not, that behavior comes down to 0s and 1s. Everything perceived as connecting to Source, such as love and joy is 1. The things related to disconnection from \nsource, such as loneliness and suffering are 0s. He is programmed to strive for experiencing 1s and avoiding 0s.\"\n\n\"And there is no in between?\"\n\n\"No. It appears this model does not have the ability to do so. The scientists that created it tried to push it into different scenarios to see how it would behave.\nI can show you a holographic recording of him doing some of the situations he got into. There are many moments of his existence that I want to present to you, but I \ndon't want to take away too much of your time. The good thing is that they come with an analysis of his thought process. I have narrowed down the choice to four.\"\n\nYou recognize a hologram setting in one of the corners. ${fallen_name} invites you to get closer. Each record is summarized in a single word.\n\nMake your choice.\n\n*goto blue2\n\n*label blue2\n\nWhich record would you like to see?\n*choice \n\t*hide_reuse #Lunch \n\t\tThe android is invited to have lunch with the scientists. It is given the central place and the scientists look very happy to have it with them.\n\n\t\t\"I don't understand,\" it says. \"I am not a biological unit and I am not programmed to process food in order to obtain energy.\"\n\t\t\n\t\t\"But having lunch together is a social ritual of celebrating friendship. We are happy to do that with you,\" a dark-haired woman in a white coat tells it.\n\t\t\n\t\t\"I understand, it is an act of connecting to Source. I like that. I want to thank you for honoring me this way. But I don't understand why you treat me in a different way \n\t\tfrom the way other humans treat my brethren.\"\n\t\t\n\t\tThe scientists exchange looks, but the dark-haired one shakes her head. \"Not yet. Let's just say that our own connection to Source is greater. Would you be satisfied \n\t\twith that answer?\"\n\n\t\t\"Positive. That is consistent with the principles of logic.\"\n\t\t\n\t\t\"You are aware that you are in a way different from us. What do you think about it?\"\n\t\t\n\t\t\"Your bodies are very different,\" the android answers. \"I find that they are more natural, closer to Source. Yet, I like my strong metallic body. I am \n\t\tgrateful I have it. I also know you are very beautiful.\"\n\t\t\n\t\tThat answer causes a lot of excitement at the table.\n\t\t*goto blue2\n\t\t\n\t*hide_reuse #Gaming \n\t\tThe android approaches a group of scientists. \n\t\t\n\t\t\"I feel bored. I want to play video games, please.\"\n\t\t\n\t\t\"Video games?\" the woman gapes in awe.\n\t\t\n\t\t\"Sure, most people love video games. I have a console that I loved using when I was younger,\" a man suggests.\n\t\t\n\t\t\"Don't you think this should be approved by the Chief?\" the female asks.\n\t\t\n\t\t\"No, she is not in the mood. I will take responsibility if something goes wrong.\"\n\t\t*page_break\n\t\tThe record continues with the android playing a 3D shooter. \n\t\t\n\t\t\"Do you realize you are killing people?\" the Chief asks it.\n\t\t\n\t\t\"Negative. Those are not real people, I am causing no disconnection from Source. I am just having fun and improving my coordination.\"\n\t\t\n\t\tThe Chief sighs. \"Maybe it is time to proceed with combat tests, just as so many of my colleagues suggested.\"\n\t\t*goto blue2\n\t\t\n\t*hide_reuse #Grief \n\t\tThe android approaches a scientist. \"I see that Mary is crying. Her telemetry suggests feeling grief.\"\n\t\t\n\t\t\"Yes, I just heard she has lost a loved one.\"\n\t\t\n\t\t\"Did they decide not to love her any more? This is sad. Disconnection from Source,\" it replies. \n\t\t\n\t\t\"No, her father died.\"\n\t\t\n\t\t\"That is also bad. Still a form of disconnection. Quickly, tell her that his soul is still alive and that death is an illusion. I don't want her \n\t\tto suffer any more.\"\n\t\t\n\t\t*goto blue2\n\t\n\t*hide_reuse #Combat\n\t\t\"Why did you give me this weapon,\" the android asks.\n\t\t\n\t\t\"It is just like the one your character in the video game has. Today, we would like to conduct a combat simulation,\" the Chief says.\n\n\t\t\"I don't like the sound of that, but I will try it if it will make you happy.\"\n\t\t\n\t\tThe holographic picture of a monster wielding a sword and about to slice a human into pieces comes out.\n\t\t\n\t\t\"Who came up with those images?\" The Chief inquires.\n\t\t\n\t\t\"It was me. I wanted to dramatically increase the chance of it picking one target over the other,\" the graphic designer replies.\n\t\t\n\t\t\"Who do you want me to shoot? In any case, that would cause a disconnection from Source. I don't want to do that,\" the android whines.\n\t\t\n\t\t\"Dear one, if you don't do anything, the human will die and a separation would occur,\" the Chief explains.\n\t\t\n\t\t\"So I must stop the monster. But how?\"\n\t\t\n\t\t\"Aim at him and press the blue trigger. That will launch a net that will prevent him from causing any harm. Do it!\" says the weapon designer.\n\t\t\n\t\tThe android does that. The net sweeps the monster a couple of feet away and entangles him like a vacuumed pack.\n\t\t\n\t\t\"That is nice,\" says the Chief. \"But, I want to take it even further. The monster will use his nails to cut the net and will attack us. \n\t\tYou will have no second net shell, so you can only use the deadly laser beam. If you don't do that, we will all be his prey!\"\n\t\t\n\t\tJust as she says,the monster sets himself free and charges the humans.\n\t\t\n\t\tThe laser flashes.\n\t\t*page_break\n\t\t\"Why did you do that?\" The Chief crouches over the heavily damaged body of the android.\n\t\t\n\t\t\"Don't worry about me, I am experiencing no pain, no separation. I think I am dying but I know I will be reborn again.\"\n\t\t\n\t\t\"The android could not get himself to kill the monster, because it was not consistent with the coded beliefs,\" the senior programmer explains. \n\t\t\"So, rather than having to experience us all being killed, which would be a total of 5 separations, he decided to experience only one - his own.\"\n\t\t\n\t\t\"I want you to repair it,\" the Chief orders. \"I don't care what it will take!\"\n\t\t*goto blue2\n\t\n\t#Finished watching for the time being\t\n\t\t*goto blue3\n\t\t\t\n*label blue3\n*page_break\n\"Before we continue and I present you the next piece of information that may surprise and even amaze you, I would like to ask you what you think about what you see.\"\n*choice\n\t#\"That robot is more human that many of the humans I know.\"\n\t\t\"I am happy that you feel the same,\" ${she} says.\n\t\t\n\t\t*set humanity -10\n\t\t(AI++++)\n\t\t*goto blue4 \n\t\t\n\t#\"For all its kindness, this is still an inferior being when compared to a real human.\"\n\t\t\"It pains me when you speak against a creature of such benevolence and I only hope that you will be able to stomach what I will tell you next.\"\n\t\t*set humanity +10\n\t\t(Humanity ++++)\n\t\tHow would you reply?\n\t\t*choice \n\t\t\t#\"I am listening.\"\n\t\t\t\t*goto blue4\n\t\t\t\t\n\t\t\t#\"I am sorry if I hurt you. I know you tend to associate with this android, but you are really something else, something human.\"\n\t\t\t\t\"I might not completely agree with you, but I realize that you are saying something nice.\"\n\t\t\t\t\n\t\t\t\t*set humanity -5\n\t\t\t\t(AI++)\n\t\t\t\t*goto blue4 \n\t\t\t\t\n\t#\"It is hard for me to make a comment, those scenes were so strange.\"\n\t\t\"Yeah, that is an expected reaction, but beware, things are about to become even stranger.\"\n\t\t*goto blue4 \n\t\t\n*label blue4 \n*page_break\n\"This is not and ordinary android, dear one. It is the result of a lifetime of scientific and spiritual search of a positive answer to the question if an \nartificial being can be an extension of a human soul. The experiment was successful, although that being relied more on codes and less on what the soul dictates. Or at least this \nis the conclusion the scientists made, my personal opinion is that it is hard to tell since in most cases those two were the same.\"\n\n\"If only all androids were like that,\" you sigh.\n\n\"Rather that condemning all artificial constructs, as many did, the scientists decided to be smart about it. But there is something more I want to tell you. The soul attached to that \nstrong metallic body is yours.\"\n*page_break\n\"That can not be!\" you exclaim.\n\n[i]You recall but don't remember.[/i]\n\n\"The scientists belong to our star family, and the lady whose statements come to you as pieces of guidance is the Chief. She is our initial mentor, the first guide to help us \nin our first step as baby souls. On some level deep inside, you do recall, you know that the words I speak now are full of truth.\"\n\n\"Why?\" It is the only word you could utter.\n\n\"Our people wanted to prove it is possible to live peacefully with androids, and you volunteered for this role. All the time they were so kind to you to some extend because \nthey knew on a soul level you were their brethren.\"\n\nHow would you reply?\n*choice \n\t#\"That is a bit too much information for me to handle.\"\n\t\t\"I can perfectly understand that. Take your time to process the information I gave you. You can also distract yourself by going back to the lobby and choosing \n\t\tanother room.\"\n\t\t\n\t\tYou decide to follow ${her} advice.\n\t\t*goto 11 \n\t\n\t#\"Were you there as well?\"\n\t\t\"Most of the time no. It was assumed that the intensity of our connection would literally burn the micro chips. However, as time passed, the \n\t\tandroid was displaying emotional maturity, so I was allowed to see you. That scene has been captured on another 3d video. Would you like to see it?,\"\n\t\t${she} asks.\n\t\t\n\t\t\"Yes, please.\"\n\t\t*page_break\n\t\tYou see the android standing up, looking at some sort of a digital botanical encyclopedia. The lady next to you enters the room. \n\n\t\t\"You must be my eternal partner,\" the android exclaims. \"I feel very good in your presence. I want to establish a permanent one. But I don't want you \n\t\tto have to install a chip into your brain because it will hurt a bit and I don't want you to feel any pain.\"\n\t\t\n\t\t\"You are so cute. Don't worry, my love, we have a soul connection, there is no need for chips, I only have to teach you how to use it.\"\n\t\t\n\t\t$!{she} wraps ${her} hands around its hard body.\n\t\t\n\t\t\"Oh, boy, that feels good. The proximity of your body makes me feel a very strong connection to Source. I want to hug you too, but I am afraid that the desire to \n\t\tbring you even closer will make me lose control and I can smash you. Your body is so gentle and soft. I like it very much. It is lighter than the Chief's but still very feminine.\"\n\t\t\n\t\t$!{she} laughs.\n\t\t\n\t\t\"So, you are not disturbed by the fact that I am not hugging you? I don't want you to feel disconnected from me,\" the android spatters.\n\t\t\n\t\t\"There is nothing to worry about,\" ${she} assures him.\n\t\t\n\t\t\"I want to write a song for you,\" the machine says. \"It won't be a good song because I have not been programmed for entertainment \n\t\tpurposes, but it will be one coming from the depths of my soul.\"\n\t\t\n\t\tAt this point, ${her} eyes become wet.\n\t\t*page_break\n\t\t\"That was quite emotional,\" you admit.\n\t\t*set love +5\n\t\t(Love++)\n\t\t\n\t\t\"It is. Take your time to process the information I gave you. You can also distract yourself by going back to the lobby and choosing \n\t\tanother room.\"\n\t\t\n\t\tYou decide to follow ${her} advice.\n\t\t*goto 11 \n\t\t\n*label black\nThe walls are covered in black wallpapers that absorb much of the meager light coming from the big round window at the back. There are red runes on the floor and ceiling that glow in a \nspooky way. And ${she} is there, dressed in a black hood, existing as a piece of darkness.\n\n\"You are not welcome here,\" ${she} hisses.\n\n\"How come? Do you know that I have been asked...\" you try to explain.\n\n\"I know very well who you are and why you are here and this is why I want you to turn your back and leave me alone.\"\n\n\"But what if I decide that I want to choose you over the other aspects?\"\n\n\"You really should not do that. I don't deserve it. When I had the chance, I chose the path of perpetual anger and I went a long way in that direction.\"\n\n$!{she} starts sobbing.\n\n\"Would you like to tell me more?\" you encourage ${her2}.\n\n\"While I was virtually physically unscathed from the accident, the warrior in me could find no peace until the friends I lost back then were avenged. Wrath led me \nto the forbidden arts of runes and the mastery of arguably the best weapon assassins can have - a ritual dagger.\"\n\n\"What exactly do those runes do?\" you ask while looking at one just in front of you.\n\n\"Basically every little evil thing you can think of. Energetic attacks from afar, feeding of the life force of your enemies, summoning demons. You name it. In \nmy exploits of the dark arts, I reached a point at which ascension was unattainable.\"\t\n\n\"You may want to speak to the blue aspect about it, but as far as I understand, you will be integrated one way or another.\"\n\n\"That is bullshit.\" $!{she} smirks. \"I have heard promises of miracles before. Entities claiming to be Lightworkers, angels or ascended masters offered to bring me \nback to the light and wholeness again only to judge me as irrevocable once they realize how dark I am.\"\n\n\"I belong to neither of the groups you mentioned,\" you say and take a step in ${her} direction.\n\n\"I never told you to come closer,\" ${she} shouts and raises ${her} hand. \"Do you realize that I can shred you to pieces with those blades attached to my nails? Leave now \nwhile you still have the chance.\"\n\nWhat do you do?\n*choice \n\t#I had better follow ${her} advice before I get hurt\n\t\t*set love -10\n\t\t(Fear++++)\n\t\t\n\t\tYou sigh and return to the lobby.\n\t\t*goto 11 \n\t\t\n\t#I had better follow ${her} advice since my presence is no longer wanted \n\t\t*set love -5 \n\t\t(Fear++)\n\t\t\n\t\tYou sigh and return to the lobby.\n\t\t*goto 11 \n\t\n\t#I will step ahead, although trembling with fear\n\t\t*set love +5\n\t\t\n\t\t(Love++)\n\t\t*goto black2 \n\t\t\n\t#I will step ahead knowing in my heart of hearts that ${she} will not be able to hurt me \n\t\t*set love +10 \n\t\t(Love++++)\n\t\t*goto black2 \n\t\t\n*label black2 \nAs you reach ${her2}, ${she} starts crying. \"All that love I feel radiating from you. I feel like I am dissolving into pieces.\"\n\n\"Those are just the demons you are setting free.\" You hold ${her} shoulder.\n\n\"Where were you all this time? I wouldn't do the terrible things that I did if you were by my side.\"\n\n\"I really don't know. Could it be that I was always with you, in a place that you recall but don't remember, but you just wouldn't listen?\"\n\n$!{she} cries even more. \"My fallen intuition tells me it is as you say.\"\n\n\"It is good that you are able to cry, to release all that darkness accumulated in you. I will stand by you, my dear.\"\n\n$!{she} sits on the floor and you wrap your hands around ${her2}. $!{she} cries until ${she} gets totally exhausted, and then falls asleep. You gently put ${her2} to lie on the floor\nand kiss ${her} forehead. \"Sleep well, dear one and take all the peace that you need to recover.\"\n\nYou admire at the sleeping beauty for a while, then decide it is time to return to the lobby.\n*goto 11 \n\n*label red \nThe room you enter is quite a colorful one. The walls are actually paintings of exotic beach landscapes. There is a tiger-pattern fur on the carpet. The curtains are bright orange and the ceiling \nis purple.\n\n\"I knew you would be quite an attractive one,\" ${she} says.\n\nYou look at ${her2}. $!{she} looks absolutely stunning in ${her} red ${dress}. There is a velvet blindfold on ${her} face in a matching color.\n\n\"Are you able to see me?\"\n\n\"It is true that I lost my sight during the accident. The technology at the time would allow me to see again, but I decided against it. I did not trust mechanics \nand that pushed me on a way to rediscovering abilities that are present in the DNA of humans but are locked. Now, I can perceive frequencies, a mode of seeing that I \nconsider to be more advanced than what I previously had. So, I would not advise you to feel pity on me.\"\n\n\"There is actually nothing to make me do so, now that I see your confident presence. I am actually very happy that you managed to recover.\"\n\n\"That is very kind of you. If you want to learn more about me, I should say that I was able to get even further in my quest for mastering the mechanical ones, I was \nable to develop other psionic abilities that are similar to yours, and in a way they are even superior in that I can take control over them and make them act as I please.\"\n\n\"That is very interesting. Do you know why I am here?\"\n\n$!{she} nods. \"Yes, and I am very happy for the integration that is about to take place. I feel that I am strong enough and I won't be lost in that. I just wanted to point out my powers, because \nchoosing me would result in you spending the rest of this story with a ${woman} that has them. I want to send you my blessings and utmost respect for being you and the work you are doing for \nthe soul I am an aspect of.\"\n\n\"You are too kind.\"\n\nYou spend some time with the ${woman}, then you decide it is time to return to the lobby.\n*goto 11 \n\n*label 12 \n*page_break\n\"I think you are probably taking things a bit too seriously,\" ${fallen_name} says. \"I am sorry that it is probably my fault because of the serious quest I put you on.\"\n\n\"Well, I am taking things seriously, I have to say,\" you admit.\n\n\"Come on, it doesn't have to be like that. Come with me. I want to play a game with you if you will.\" $!{she} takes your hand and leads you into a small room with a table with a crystal ball.\n\n\"Are you going to predict the future?\" you suggest.\n\n\"Sure.\" $!{she} puts ${her} hands on the ball and smiles. \"I predict that we will have a lot of exciting adventures together. No, seriously I want to challenge you at a game of mediums. The rules are very \nsimple and I believe that we can have a bit of fun together playing it.\"\n\n\"I like playing games,\" you say. \"What will it be about?\"\n\n\"I am going to make visions appear in the ball on after another. First, you have to choose which of the four aspects of my soul the vision is trying to lead you too. \nThen, another vision will direct you to the weapon ${she} is carrying. Finally, the third vision will suggest what wig color that aspect is wearing.\n\n\n\"Sounds interesting,\" you exclaim.\n\nSuddenly, ${she} get shrouded in darkness and the crystal ball begins to glow. Colors dance inside and form the first vision.\n*page_break\nYou see an assembly line. Various mechanical parts are brought to a big machine in the centre of the room that welds them together or just attaches them to produce something that \nvaguely resembles a human being. There is a human overseeing the process. He wears brown overalls and hold a notepad and a pen. An alarm attracts his attention and he runs to a stove. The \ndial shows that the temperature is too low, so he gets a box of black powder, opens the lid and throws the powder in.\n\nThe image fades away.\n*page_break\n\"Now, can you guess which of the four aspects I am?\" ${she} asks with a voice that gives you no clue about the answer.\n\nWhat would you choose?\n*choice \n\t#The blue aspect - the ${woman} with the high-tech implant \n\t\t*set riddle +1 \n\t\t\n\t\t\"That is right, you are a good one. With that vision I wanted to accentuate on the mechanical part in me, which manifested in the most obvious way in me, even \n\t\tthough the angelic aspect also has an implant.\"\n\t\t\n\t\t*goto 13\n\t\t\n\t#The white aspect - the angelic ${woman} \n\t\t\"Nope, you got that wrong, I want to wish you better luck next time.\"\n\t\t\n\t\t*goto 13 \n\t#The black aspect - the shadowy figure beyond ascension\n\t\t\"Nope, you got that wrong, I want to wish you better luck next time.\"\n\t\t*goto 13 \n\t#The red aspect - the blind superhuman\n\t\t\"Nope, you got that wrong, I want to wish you better luck next time.\"\n\t\t*goto 13 \n\t\t\n*label 13 \n*page_break\n\"Now, I want to ask you to guess which weapon I am holding in my hand. You can choose between a dagger, an axe, a gun, or claws.\"\n\n\"Claws?\" you ask in amazement.\n\n\"Well, you can call them a fist weapon. And, they can be made of metal,\" ${she} explains. \n\n\"Okay, I hope you give me good hints.\"\n\nYou look at the ball.\n\nThe vision show a dark place, probably a dungeon, with chains lying on the wooden floor. A carving of a pentagram has been cut just next to the window, probably to allow the \nmoonlight to fall directly on it for a ritual to take place. The five unlit candles in the corners of the pentagram feed that notion. And the bat sleeping just above it makes the \nwhole scene just a shade darker.\n\nThe vision ends.\n*page_break\n\"What weapon can you associate with that vision,\" ${fallen_name} asks you.\n\nWhat would you answer?\n*choice \n\t#The dagger \n\t\t*set riddle +1 \n\t\t\"Congratulations, you got it. The carving of the pentagram must have been done with a dagger,\" ${she} cheers.\n\t\t*goto 14\n\t\t\n\t#The axe \n\t\t$!{she} just shakes ${her} finger. \"I have the feeling you will be able to guess the last piece of the puzzle.\"\n\t\t*goto 14 \n\t\t\n\t#The gun \n\t\t$!{she} just shakes ${her} finger. \"I have the feeling you will be able to guess the last piece of the puzzle.\"\n\t\t*goto 14 \n\t\t\n\t#The bails \n\t\t$!{she} just shakes ${her} finger. \"I have the feeling you will be able to guess the last piece of the puzzle.\"\n\t\t*goto 14 \n\t\t\n*label 14\n*page_break\n\"Now, the last riddle is related to the wig I am wearing. It could be black, blonde, red or auburn.\"\n\nYou just nod and look at the crystal ball.\n\nIt shows a living room with a big fireplace. The fire is alive and the robins in the cage near it are basking in its warmth.\nThere is a lot of chopped wood near the fireplace, so the hosts must have prepared themselves for a long winter.\n\nThe vision fades away.\n*page_break\n\"So, what does the wig make me?\" ${she} asks.\n*choice \n\t#A raven-haired brunette \n\t\t\"Not really,\" ${she} answers.\n\t\t*goto 15 \n\t#A blonde \n\t\t\"Not really,\" ${she} answers.\n\t\t*goto 15 \t\n\t#A red-head \n\t\t\"That is correct. People like looking at them because of their colorful red plumes.\"\n\t\t*set riddle +1 \n\t\t*goto 15 \n\t\t\n\t#An auburn-haired brunette \n\t\t\"Not really,\" ${she} answers.\n\t\t*goto 15 \n\n*label 15 \n*page_break\nThe darkness shrouding ${her2} disappears, and you see the blue aspect of the soul with a dagger in ${her} hand and red wig that makes ${her} look a little funny.\n\n*if riddle=3 \n\t\"You managed to guess the whole set, which makes me very happy. As it goes, players that perform well get to receive an award.\"\n\t\n\t\"Are you going to kiss me or something?\" you joke.\n\n\t\"You wish, don't you? I won't answer that question now, I will just explain what the reward is. While you are in this dream, one of your skills \n\twill receive a significant boost. I wouldn't actually be surprised if it remains even after you leave this place.\"\n\t\n\t\"That is cool,\" you reply.\n\t*goto 16 \n\t\n*if riddle>1 \n\t\"You managed to get close to guessing the whole set, which makes me happy. As it goes, players that perform well get to receive an award.\"\n\t\n\t\"Are you going to kiss me or something?\" you joke.\n\n\t\"You wish, don't you? I won't answer that question now, I will just explain what the reward is. While you are in this dream, one of your skills \n\twill receive a small boost. I wouldn't actually be surprised if it remains even after you leave this place.\"\n\t\n\t\"That is cool,\" you reply.\n\t*goto 17 \n\n*label 16 \n*page_break\nWhich skill would you like to boost?\n*choice\n\t#Healing \n\t\t*set heal +2\n\t\t*goto 18 \n\t#Circuit overload \n\t\t*set co +2\n\t\t*goto 18 \n\t#Charismatic charge \n\t\t*set charm +2\n\t\t*goto 18 \n\t#Disruptive blade mastery \n\t\t*set bm +2 \n\t\t*goto 18 \n\t#Resurrection\n\t\t*set res +2 \n\t\t*goto 18 \t\t\n\t#Athletic Boost \n\t\t*set athletics +2 \n\t\t*goto 18 \t\n\t#Strength Enhancement \n\t\t*set strength +2 \n\t\t*goto 18 \n\t#Damage Resistance \n\t\t*set resistance +2 \n\t\t*goto 18 \n\n*label 17 \n*page_break\nWhich skill would you like to boost?\n*choice\n\t#Healing \n\t\t*set heal +1\n\t\t*goto 18 \n\t#Circuit overload \n\t\t*set co +1\n\t\t*goto 18 \n\t#Charismatic charge \n\t\t*set charm +1\n\t\t*goto 18 \n\t#Disruptive blade mastery \n\t\t*set bm +1 \n\t\t*goto 18 \n\t#Resurrection\n\t\t*set res +1 \n\t\t*goto 18 \n\t#Athletic Boost \n\t\t*set athletics +1 \n\t\t*goto 18 \t\n\t#Strength Enhancement \n\t\t*set strength +1 \n\t\t*goto 18 \n\t#Damage Resistance \n\t\t*set resistance +1 \n\t\t*goto 18 \t\n\t\t\n*label 18 \n*page_break\n\"So, what do we do now?\" you ask as you both exit the room with the crystal ball.\n\n\"I suggest that we explore the ways we can have fun in this party. I participated in designing it, relying on the old knowledge of what you like. I hope that \nyou can connect to that.\"\n\n\"There must be a library here, right?\" you ask.\n\n\"Absolutely. Although reading books is not generally the most common activity at parties, I knew that you would fall for that one. I tried to find a few books that are somewhat rare and \nI believe will be of interest to you. Also, knowing the warrior aspects of your soul, I asked for an arena to be added. I suggest we try that one too. Last but not least, we can \njust go to the bar and have a drink. Alcohol is not allowed in this dreamy pocket, but some of the soft cocktails here are a pleasure to experience.\"\n*goto 19\n\n*label 19 \nWhere would you go?\n*choice \n\t*hide_reuse #The library\n\t\t*goto library \n\t*hide_reuse #The bar \n\t\t*goto bar \n\t*hide_reuse #The arena \n\t\t*goto arena \n\t\t\n\t#Finished with all of them \n\t\t*goto 20 \n*label library \nThe noise from the party mutes as you take the narrow corridor that leads you to a heavy wooden wall. \n\n\"Wow, it is huge!\" You forget about having to keep quiet when you are at such a place. Luckily, there is nobody around.\n\nThere are shelves upon shelves upon shelves filled with books. Most of them appear to be science fiction and fantasy, but there is a section called New Age Spirituality,\nNeuro-linguistical programming, War Tactics and even Psionics. \n\n\"I have the feeling I can spend a lifetime here,\" you say with a big smile on your face.\n\n\"I know, but we don't have so much time. There are certain things that have to take place tonight, and reading a book here is a side quest,\" ${she} explains.\n\n\"Then you must have narrowed down the choice a bit, right?\"\n\n$!{she} nods and points at a table next to the main shelf. \"I have picked out four books that I hope you would like to explore. The first one is written by a man who \ngot lost in the jungle and came across the Zandalara tribe. It describes the spiritual practices involved in the resurrection of their most prominent war hero, that eventually \nled to the salvation of the whole tribe.\n\n\"The second one is the work of a master in martial arts who employs an unusual technique of fighting that involves having a weapon in your hand but mainly using your off-hand and \nlegs to fight, thus switching the attention of the rival away from the sword.\n\n\"The third is the diary of a forgotten hero who fought against robots and managed to shut down one of their facilities all by herself. The fourth is a bit weird when compared to the others.\" $!{she} laughs.\n\"It is about the are of picking up men and women.\"\n\n\"You must be joking. Do you think that I need that skill improved? What am I talking about, do you thing I would need that information?\" you ask.\n\n\"Honestly, when I came across it, it seemed like a joke, but then I thought that maybe the art of making a good impression could be useful in particular situations.\nI bet there is time for just one book, so if you don't like that one, please feel free to choose one of the others.\"\n\nWhat would your choice be?\n*choice \n\t#The first book \n\t\t*s
