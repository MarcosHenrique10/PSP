sleep. This is not necessarily the case with you. Sometimes you happen to manage to get out of bed, have a shower, \nget dressed and even go to work before the dream stops. \n\nWhen that happened to you for the first couple of times, you got worried, but the psionic instructor explained that it was normal and perfectly safe for you.\nYou take that with a pinch of salt but it seems there is little you can do about it.\n\nSo, after the dreamy world where you met the charismatic eternal other of yours dissipates into nothingness, you find yourself sitting next to the desk of your boss.\nRight now, you are not sure whether you have done something wrong and are to be reprimanded or it is a regular meeting.\n\n\"Are you listening to me?\" she asks you, so far no hint of anger in her voice.\n\n\"No, I am sorry, Lagherta, I just woke up from a very interesting dream. I am confused and not very sure what I am doing here,\" you frankly explain.\n\n\"Hm, that is interesting.\" The boss touches her cheek with her favourite fountain pen. \"Would you like to tell me about it?\"\n\nYou sigh and think for a moment. On one hand, the boss is an experienced psionicist herself and might be able to help you find some peace about it. On the other,\nyou are not very sure you want to involve her into that and want to rely on your own.\n\nWhat would you do?\n*choice \n\t#Tell her \n\t\tShe listens to you with interest, occasionally interrupting you to ask seemingly unimportant questions.\n\n\t\t\"My intuition tells me that you will shortly find your way to that person.\" She looks at her watch. \"Like in an hour or so.\"\n\t\t\n\t\tYour eyes open wide. \"What do I need to do?\"\n\t\t*set Independence -5\n\t\t\n\t\t(Dependence++)\n\t\t*goto 2\n\t\n\t#Don't \n\t\t\"Five years ago, I would have taken this as an insult to my efforts to keep a very short distance to the people I work with. Now, I know better.\n\t\tI respect your trust in yourself. Besides, you are the one who is going to walk the path to ${her}, you are the main player in that game.\"\n\t\t\n\t\tYou nod \n\t\t*set independence +5\n\t\t\n\t\t(Independence++)\n\t\t*goto 2\n\t\t\n*label 2\n*page_break\n\"I hope you remember the case you helped the local police close last week, right? The Chief of the Police Department sent me a long letter of appreciation \nas well as a bouquet and a bowl of fruit. It seems you know how to make a good impression.\"\n\nWhat did you actually do?\n*choice \n\t#I healed a heavily wounded officer \n\t\t*set heal +1\n\t\t*goto 3\n\t\n\t#I shut down a dangerous security bot \n\t\t*set co +1\n\t\t*goto 3\n\t\t\n\t#I charmed a double agent into sharing important information with you \n\t\t*set charm +1\n\t\t*goto 3\n\t\t\n\t#I participated in a battle with an armed gang \n\t\t*set bm +1\n\t\t*goto 3\n\t\n\t#I prevented a local cult from resurrecting one of their criminal leaders \n\t\t*set res +1\n\t\t*goto 3\n\t\t\n\t#I arrested a dangerous criminal after a roof chase \n\t\t*set athletics +1 \n\t\t*goto 3 \n\t\t\n\t#I saved an earthquake survivor by removing a huge pile of debris \n\t\t*set strength +1 \n\t\t*goto 3 \n\t\t\n\t#I threw myself in front of a car in order to stop a criminal... and walked away safely \n\t\t*set resistance +1 \n\t\t*goto 3 \n\t\t\n*label 3\n*page_break\n\"Would you like to go back and help the Police Department again, ${name}?\" Lagherta asks you.\n\n\"Sure, I had a lot of fun with them. I am looking forward to it. Did they tell you what the case is about this time?\" you inquire.\n\n\"There is something about a break-in. Apparently somebody made their way into the research facility of BioMech and stole the prototype of a hand implant.\"\n\n\"Oh, boy!\" you exclaim. \"There will be a lot of pressure on the police, knowing the financial might and influence on the company. I wouldn't be surprised \nif their goons actually solve the issue before us. I suppose they didn't say anything about the main suspect?\"\n\nThe boss hands you a sheet of paper, a photo that makes your blood run cold. It is ${fallen_name}!\n\nWhat are your thoughts right now?\n*choice \n\t#I will find my way to ${her2}, that makes me happy \n\t\t*set love +3\n\t\t\n\t\t(Love+)\n\t\t*goto 4\n\t\t\n\t#I am overwhelmed by fear that it is not going to end well for any of us \n\t\t*set love -3\n\t\t\n\t\t(Fear+)\n\t\t*goto 4\n\t\t\n\t#I am proud of ${her2} for striking at the corporation that promotes robotizing\n\t\t*set humanity +3\n\t\t\n\t\t(Humanity+)\n\t\t*goto 4\n\t\t\n\t#I hope that the implant is used for a just cause\n\t\t*set humanity -3\n\n\t\t(AI+)\n\t\t*goto 4 \n\t\t\n*label 4\n*page_break\nHalf an hour later you arrive at the Police Station. Inspector Morales greets you with a huge smile and pours you a big cup of coffee to \ngo with the donuts he offers you. You gladly take a sip, but refuse to even touch the sugary temptation.\n\n\"Oh, I am sorry, I forgot you were health conscious when it comes to food,\" he apologizes.\n\n\"Well, some people can afford not to be so much,\" you reply. \"Others like me really don't.\"\n\n\"Anyway, it is nice to have you here, especially when it comes to a case in which BioTech is involved. I can't say I am very excited about it.\"\n\n\"What if we really make a good job and become heroes along the way?\" you suggest.\n\n\"My fear is related to actually doing a good job and uncovering something we are not supposed to.\"\n\nMaybe he has a point. How do you feel?\n*choice \n\t#Your job is to serve the highest good to society \n\t\t*set love +3\n\t\t(Love+)\n\t\t\n\t\t\"Yes, I agree, but I don't want to be the one to be against the tide. What if actually BioTech is what is good for society? Why would it \n\t\tmake it that powerful by buying their products again and again?\" the inspector asks.\n\t\t*choice \n\t\t\t#\"Dependence rarely leads to something good in the long run.\"\n\t\t\t\t(Independence++)\n\t\t\t\t*set independence +5\n\t\t\t\t*goto 7\n\t\t\t\t\n\t\t\t#\"You might have a good point here.\"\n\t\t\t\t(Dependence++)\n\t\t\t\t*set independence -5\n\t\t\t\t*goto 7\n\t\t\t\t\n\t#You have to be careful not to go against the tide \n\t\t*set love -3\n\t\t*set independence -5\n\t\t(Fear+, Independence++)\n\t\t\"It is good to share the same opinion in the beginning, ${name}, although I realize it may change as the investigation continues.\"\n\t\t*goto 7\n\t\t\n*label 7\n*page_break \n\"You sent a picture of the main suspect to my Boss,\" you say.\n\n\"Yes, I know that psychic specialists tend to be able to tell a lot by seeing a photo. Was it the case this time?\"\n\n\"No, I don't think so...\"\n\nYou are tempted to say that you are related to the suspect, but that would be a reason for you to be dismissed from the role you have to play.\nThen you risk losing the thread to ${her2}, and you can't really do that.\n\n\"What are you thinking about?\" the inspector asks you. Probably his intuition has alerted him something is not quite right.\n*goto 8\n\n*label 8\nWhat do you reply?\n*choice\n\t*hide_reuse #\"I wonder if you know something about the suspect.\"\n\t\t\"It is really hard to tell for sure.\" He sighs. \"However, ${she} somehow reminds me of one night when I was deep into the territory of the the \n\t\tgang of the Purifying Fire. It was very dark and they were shooting at me. A cloaked figure with metallic wings pushed me out of the way of the bullets,\n\t\tsome of them even ricocheting from ${her} wings. That person bought me the time to safely retreat.\"\n\t\t\n\t\t\"You think that may have been ${her2}?\"\n\t\t\n\t\t\"I really don't know.\" He shrugs.\n\t\t*goto 8 \n\t*hide_reuse #\"I wonder if the colleagues from Evidence found anything about the mysterious ${woman}.\"\n\t\tInspector Morales makes a call and asks Susan from Evidence to come and bring the dossier.\n\t\t\n\t\tThe ever smiling woman comes immediately and hands you a folder.\n\t\t\n\t\tYou skim through the pages, but unfortunately you learn nothing new. It is the biography of ${fallen_name} and it includes what ${she} \n\t\ttold you in the dream. \n\t\t\n\t\t\"$!{she} is using angel wings, which suggests some connection to the group of mystics known as the Angels of Mercy. My suggestion would be to \n\t\tvisit them. Another clue that the picture gave us is a sign, which may lead us to the craftsman who installed ${her} wings. They are definitely \n\t\tnot in mass production. The guys from Databases and Profiles are currently trying to see if they can find out more about it. I will give you a call \n\t\tas soon as they unearth something.\"\n\t\t\n\t\tInspector Morales thanks her, she smiles even wider, nods and leaves the room.\n\t\t*goto 8 \n\t\t\n\t*hide_reuse #\"I wonder if the police would be bribed by the big corporation.\"\n\t\t\"I wouldn't be surprised if that was the case. This is why I insist on being careful. It is better to be safe than sorry.\"\n\t\t\n\t\t\"I will keep that in mind,\" you reply.\n\t\t*goto 8\n\t\n\t#\"I am ready to go to the crime scene.\"\n\t\t*goto 9\n\t\t\n*label 9\n\"Sure, let's go.\" He jumps out of his chair, puts on his jacket and leaves for the electric police car. You follow him closely. \n\nHe drives you to the headquarters of BioTech, which is a sight to see. Those guys didn't spare resources when trying to make an impression. The \nmessage is clear. They are filthy rich and super powerful. But once you get the monopoly to produce bionic implants and enjoy it for a few years, it happens.\n\n*page_break\nThere are a lot of armed guards at the place where the suspect entered the facility. A muscular gentlemen with shades and the expression of a \nserial killer introduces himself as Mr Bean, the chief of corporate security. He offers you assistance with a tone that implies that you need to ask \nfor his permission whatever you do.\n\nGetting closer to the door...\n*choice \n\t#... I realize that the suspect made sure to cause the minimal damage necessary.\n\t\t*set selfcontrol +1\n\t\t*goto 10\n\t\t\n\t#... I get to examine the wounds of the guards ${she} went through.\n\t\t*set vibro +1\n\t\tThey seem to be done with a couple of vibro daggers wielded with perfection. Even though the guards are well trained and in perfect shape, they \n\t\tadmit to not having been a match for ${her} speed and coordination.\n\t\t*goto 10 \n\t\t\n\t#... I see a mysterious rune painted near the wall.\n\t\t*set runemastery +1 \n\t\tA janitor is still trying to remove it. Unsuccessfully. Inspector Morales grumbles about him trying to destroy a potentially important piece \n\t\tof evidence, but he is forced to stop as soon as Mr Bean gives him a look set to kill.\n\t\t\n\t\t\"We didn't manage to remove it, so what's the problem?\" He shows you his teeth.\n\t\t\n\t\tThe security chief shows you a video clip from the security cameras that spotted the suspect getting closer to the door at the time when shifts change.\n\t\tDressed in a white lab coat, they didn't pay attention to ${her2} approaching them and when one of them tries to see ${her} id card, ${she} swiftly uses a spray to \n\t\tdraw the rune. An explosion follows. Guards fly away from the door, however, ${she} remains unscathed by it. Then ${she} enters the building.\n\t\t*goto 10\n\t\t\n\t#... I see technicians removing the security cameras.\n\t\t*set control +1\n\t\tApparently, the suspect somehow managed to make them turn away from the door, so they show nothing of her assault.\n\t\t*goto 10 \n\t\t\n\t#... I see software specialists with laptops working on the code of an electronic lock \n\t\t*set hacking +1 \n\t\tApparently, the suspect hacked ${her} way into the building, which is quite impressive guessing the level of protection ${she} might have had to go through. \n\t\t*goto 10 \n\t\t\n\t#... I see no signs of specialists trying to fix anything\n\t\t*set reingineering +1 \n\t\tApparently, whatever way to get in ${she} chose, ${she} made sure to repair all the damage done so as to increase the chances of being undetected for the longest possible time \n\t\tSmart indeed! \n\t\t*goto 10 \n\t\t\n*label 10\n*page_break\nMr Bean welcomes you into the facility with a smile that reassures you that you may not get out if you make a wrong move. He leads you \nthrough a maze of corridors. Here and there, you see artificial body parts and you can't help but think that they can be assembled into androids pretty \nmuch like the ones you fought against. This is madness. The lady you see next does little to ease your fears. \n\nShe is a good-looking brunette, a senior R&D officer called Mandy. She has a nerdy aura and talks about the products she develops with the exaltation of somebody who believes in the domination \nof artificial over natural. \n\n\"What was the object that was stolen?\" Inspector Morales asks and then bites his lips, fearing he is not supposed to mention that.\n\n\"It was the new generation of an artificial leg that is going to allow professional athletes to go back to being competitive and even have an \nedge when compared to non-enhanced competitors,\" she explains.\n\n\"And how does it happen?\" you dare wonder.\t\n\n\"There is an experimental active component that is able to interpret the data coming from the visual receptors in a way that is superior to the \nfunctioning of the central nervous system. Can you imagine how that could improve the performance of a racing driver?\" she looks you in the eyes with \nexaltation.\n\nIn general, you can agree with her enthusiasm, but you see that limb as a form of AI that can potentially override brain functioning.\n\n\"Last week, we got the approval of the International Health Organization. We were going to start mass production next week, but we really needed the prototype \nfor some further testing,\" she says.\n\n\"We really need the prototype,\" Mr Bean stresses out. You can't be sure, but you have the feeling he is trying to tell you that when you find it, you \nare expected to return it to them and not the police headquarters. \"Think of how you can make a positive change for so many people.\"\n\nYeah, there are so many people working in BioTech, plus the shareholders. You are sure the product is going to add millions of credits to the revenue of the corporation.\n*page_break\n\"Can I see the crime scene?\" you ask. \"I bet it would increase our chances of success.\"\n\nMr Bean hesitates for a moment, then nods. \"Sure, follow me.\"\n\nHe leads you down a corridor to a another room. The remains of a disabled android guard occupy most of it.\n*choice \n\t#It has been forced to self-destruct\n\t\t*set control +1\n\t\t*goto 11 \n\t\t\n\t#It has been sliced beyond recognition \n\t\t*set vibro +1 \n\t\t*goto 11 \n\t\t\n\t#It seems to have been cut with an instrument that resembles a bottle cup with a rune drawn on it.\n\t\t*set runemastery +1 \n\t\t*goto 11 \n\t\t\n\t#It has a cup of coffee in its artificial limb \n\t\t*set reingineering +1 \n\t\t\n\t\t\"When we found it, it was trying to prepare coffee for everybody.\" Mandy laughs, but awkwardly stops when Mr Bean looks at her in a threatening way. \n\t\t\"It seems it was reprogrammed.\"\n\t\t*goto 11 \n\t\t\n\t#You can see the hole that was used as a jack for a hacking device \n\t\t*set hacking +1 \n\t\t\n\t\tYou take a look at the cut and marvel at the delicacy of execution.\n\t\t*goto 11 \n\t\t\n*label 11 \nIt occurs to you that the possession of battle android has been illegal ever since the war, however, nobody seems to care about \nexposing this fact. You can only wander how far beyond the law the corporation has gone... or will go.\n\nYour attempts to find any clues fail. It seems the perpetrator knew what ${she} was doing. No foot or fingerprints, nothing to give you a clue.\n\nWell, you realize that the security camera is missing, but you decide against pointing out that fact. Obviously, there is something on that \nvideo that you are not supposed to see.\n\nHalf an hour later, Mr Bean escorts you out of the facility. \n*page_break\nOnce you are in the car and out of range of the corporate guards, you feel a wave of anger forming inside you. So many things put by the goon of BioTech\nseem wrong that you can barely hold it. The question is, would you try to kill the pressure inside, or would you rather let the steam out in front of the \ninspector?\n*choice \n\t#Remain silent\n\t\t*set anger -5 \n\t\t(Composure++)\n\t\t\n\t\tYour experience shows that often times it is better not to allow anger to grow roots inside you. It is what it is, and it doesn't feel nice to be \n\t\tin the situation you are in, but you've managed to handle situations that appeared to be much worse than this.\n\t\t\n\t\tInspector Morales also remains silent as he drives you to the police station.\n\t\t*goto 12\n\t\n\t#Let it all out \n\t\t*set anger +5\n\t\t*set distrust +1\n\t\t(Anger++)\n\t\t\n\t\t\"So many things just suck,\" you shout. \"First, that Mr Bean treats us almost as if we are the criminals. Then, he hints that we should give them \n\t\tthe prosthetic as soon as we find it. I don't know about you, inspector, but I think something is off with them telling us about the additional \n\t\ttests that they needed to perform on it. Why would they need that once they have the permit from the International Health Organization? Plus, \n\t\tI am sure a simple replicator would allow them to produce another one within a few hours. Then, they can test it as much as they want. They want to \n\t\tmake it look like they are really dependent on us finding the implant, just to add pressure on us.\"\n\t\t\n\t\tThe inspector is oddly silent as he drives to the police station. Your intuition tells you that you scared him with the depth of your analysis.\n\t\t*goto 12 \n\t\t\n*label 12\n*page_break\nThe first thing you do when you arrive is to go to Susan's desk and ask her if they have managed to uncover the signature sign on the wings of the \nsuspect.\n\n\"That was a bit tricky,\" she explains. \"The only place where this sign can be found is a massive multiplayer online game. It is one of the 100 \npossible guild emblems and has been used by just two guild founders. One of them committed a suicide five years ago. He was diagnosed with \nbipolar disorder. He had testified to hardly ever going outside or meeting people in the physical.\"\n\n\"This is a sad story,\" you conclude. \"But this is not our guy, is it?\"\n\nSusan shakes her head. \"It doesn't seem so. The other one has a small shop for implants in the suburbs. Here is the address.\" She hands you a small sheet of paper.\n\n\"Bingo.\"\n*page_break\nYou feel quite excited by the prospect of being able to talk to somebody who knows ${fallen_name} and whom ${she} trusted enough to install her the wings.\nMaybe, however, it would be a better idea for you to go there alone. In this way, you would be able to ask more about ${her2} without raising the suspicion \nof the inspector. On the other hand, wanting to speak with a lead on your own would probably be even more suspicious.\n\nYou sit at the desk that has been designated for you (and is just next to the one of Inspector Morales). After briefing him about what Susan and her \nteam...\n*choice\n\t#...I ask him to come with you.\n\t\t*set together true \n\t\t\"Sure, I would love to. Just let me finish my coffee and I will be good to go.\"\n\t\t\n\t\t\"Take your time,\" you reply.\n\t\t*goto 13 \n\t\t\n\t#...I ask him to allow you to speak with him on your own.\n\t\tThe look in his eyes when you request that betrays that he is able to see through you, probably a professionally developed sixth sense.\n\t\tHe doesn't know what you have in mind, but he doesn't trust that you have nothing to hide.\n\t\t*set distrust +2\n\t\t\n\t\tYou explain that sometimes it is easier for you, as a psionicist, to feel the situation when you are not accompanied by anybody, and he \n\t\tverbally agrees with that, even though his body language says otherwise.\n\t\t\n\t\tYou order a taxi and head of to the suburbs.\n\t\t*set not_with_morales true \n\t\t*goto 13 \n\t\t\n*label 13\n*page_break\nYou wonder what kind of clients would choose to use an implant shop that looks so ramshackle from the outside, but when you enter, it is surprisingly tidy and smelling of \ndetergents.\n\n\"Just wait a minute, I will be ready in a minute,\" you hear a male voice coming from the backroom.\n\n\"What do you reply?\"\n*choice \n\t#\"Sure, take your time.\"\n\t\t*set anger -5\n\t\t(Composure++)\n\t\t\n\t\tHe was quite precise when he mentioned one minuted, it really took him that much. You take a suspicious look at the client, who is a fierce looking\n\t\tyoung lady with lots of piercings and tattoos as she leaves.\n\t\t*goto 14 \n\t\t\n\t#\"I don't like waiting.\"\n\t\t*set anger +5\n\t\t(Anger++)\n\t\t\n\t\t\"I don't like keeping customers waiting either,\" the man replies.\n\t\t\n\t\t\"I don't care how you treat customers,\" you say. \"I work with the Police.\"\n\t\t\n\t\tThe door to the backroom opens immediately. You take a suspicious look at the client, who is a fierce looking\n\t\tyoung lady with lots of piercings and tattoos as she leaves.\n\t\t*goto 14 \n\t\t\n*label 14 \n*page_break\n\"Are you David Warrens?\" you ask.\n\n\"Sure. What kind of trouble have I gotten myself into?\" \n\n\"My name is ${name} Eves and I am a psionicist officer. I require you to tell me what you know about this ${woman}\" You hand him the photo.\n\nDavid takes a look and hesitates for a moment, than he looks back at you. It is then that you feel that he decides not to try to fool a psionicist.\n\n\"$!{she} is a client of mine. I have installed her several implants.\"\n\nWhat would you ask him?\n*goto 15 \n\n*label 15\n*choice \n\t*hide_reuse #\"What are the implants?\"\n\t\t*set cl +1\n\t\t$!{she} has a couple of blades retracting into her forearms. They are made of ceramics, which is a strange choice if you ask me, but that was what ${she} wanted and ${she} got it.\n\n\t\tI also installed a pair of angel wings that ${she} brought herself. Those were a big mystery to me, I really have no idea what they do. $!{she} told me what I needed to know was \n\t\thow to attach them to ${her} back, which I did. The material they are made of is a complete mystery to me, but they felt quite bionic to the touch.\n\t\t\n\t\tWhat would you ask next?\n\t\t*goto 15 \n\t\t\n\t*hide_reuse #\"Do you know the suspect personally?\"\n\t\t*set cl +1\n\t\t\"I wouldn't say so, but ${she} did spend some time with me while I was installing the implants, and ${she} was definitely the talkative type. I can't say that I remember much of what I \n\t\twas told since I had to concentrate on the surgical stuff, but there was something about ${her} love finding the trails to ${her2}.\" He shrugs. \"Clients often talk \n\t\tabout love, I guess it is an important topic.\"\n\t\t\n\t\tWhat do you ask next?\n\t\t*goto 15\n\t\t\n\t*hide_reuse #\"When did you see ${her} for the last time?\"\t\n\t\t*set cl +1\n\t\tDavid look at his schedule. \"I installed ${her} wings exactly a couple of weeks ago. Two days later ${she} came for a routine check. Apparently, I \n\t\tcould not find out much about the functionality of the wings, all I could see was that ${she} was able to move them at will. There were no signs of infections, so \n\t\tI just let ${her2} go.\"\n\t\t\n\t\tWhat do you ask next?\n\t\t*goto 15 \n\t\t\n\t#\"What was ${her} physical and emotional status.\"\n\t\tDavid seems a bit amused by the question. \"How do I know? I am not a certified psychologist or doctor.\"\n\t\t\n\t\tThe look in your eyes ensures him that this is a serious question. \n\t\t\n\t\t\"$!{she} was physically okay. $!{she} probably trained a lot. I would guess that ${she} may be an athlete of a kind. Psychologically, there was some sadness \n\t\tin ${her} eyes coupled with determinations to bring justice.\" He seems to be taken aback by his own words. \"Did you make me come to that realization?\"\n\t\t\n\t\tYou nod.\n\t\t*if not_with_morales\n\t\t\t\n\t\t\tWhat would you ask next?\n\t\t\t*goto 15 \n\t\t\t\n\t\t*else \n\t\t\tYou feel that Morales is thinking bad of your idea to ask a question he considers not to be related to the investigation. Despite all the help \n\t\t\tyou have given to the police, he is still suspicious of you and your motives. Maybe you should be more careful, you say to yourself. Or maybe you \n\t\t\tjust don't care? You goto to know that ${she} seemed to be okay less than a couple of weeks ago and maybe it was worth it.\n\t\t\t\n\t\t\t*set distrust +1\n\t\t\tWhat would you ask next?\n\t\t\t*goto 15 \n\t\t\t\n\t#Finished with the questions\n\t\t*goto 16 \n\t\t\n*label 16 \n*if not_with_morales\n\tYou call for another taxi to take you home an bid David farewell. It is time for some rest after the working day is over.\n\t*goto 17 \n\t\t\n*else \n\tYou get into the passenger's place. \"You were quite quiet, Inspector Morales. I didn't quite expect that from you.\"\n\t\n\t\"I just wanted to see if you could get to use what you learned from me and the interrogations conducted by me.\"\n\t\n\t\"Oh, yeah? How did I score?\" you ask.\n\t*if (cl>1)\n\t\t\"You actually did pretty well, you asked all the right questions. You could do a great job as a full time police officer.\"\n\t\t*set distrust -1 \n\t\t\n\t\t\"Thank you very much. I do appreciate it.\"\n\t\t\n\t\tThe inspector stops the hover car near your flat.\n\t\t*goto 17\n\t\t\n\t*else \n\t\t\"Well, you could have asked more questions. It seems as if you were afraid not to breach his privacy. This is not how you ordinary \n\t\tpolice officers like me get things done. But, I don't know, you may get to pull some magic trick later on and lead us to the suspect.\"\n\t\t\n\t\tYour intuition tells you the harshness of his words also harbours some distrust of you. He couldn't say it openly, but deep inside he \n\t\tsuspects that maybe you didn't want to get that information so that you couldn't find the suspect. \n\t\t\n\t\tActually, this would make sense. Would you like to have the police arrest your eternal other?\n\t\tThe inspector stops the hover car near your flat.\n\t\t*goto 17\n\t\t\n*label 17\n*page_break\nYou are about to enter the block of flats when the noise of somebody running on high heels attracts your attention. A feminine silhouette appears \nfrom around the corner. Dashing in your direction, as she comes closer, you see that the immaculate features of a very beautiful redhead woman were getting marred,\nthe lips retract to reveal a little too many teeth for a human, and she has stag horns suddenly appearing on her head. The healthy tan gives way to glowing green, as butterfly wings grow on her back. \n\nInitially, you suppose that she is running towards you, but then a couple of guards chasing her comes into view. You realize whatever camouflage this shape shifter lady had \nfailed her. After the monster (or fairy) in her was revealed, she had no choice but run for her life.\n\nWhile it was not unusual for members of supernatural races to still be spotted here and there, it is the first time you see one of them. And yet, your intuition \nscreams that your soul knows the soul of the lady that somehow manages to look vicious despite the beautiful wings.  \n\nYou look into her yellow eyes and they greet you as she passes by. There is no request for help, no desire to conquer your will, just the reflection of souls \nrespecting each other and willing to coexist in peace and friendship.\n\nOne of the guards spots you. You sense that he wants to take out his pistol and shoot her, but your proximity would make you a likely casualty.\n\nThen you see that the fay lady is leaving a trail of a thick green liquid, which is probably her blood.\n\nThere is a part of you that wants you to help her in some way. The most obvious one would be to try to use your psionic power of healing. It doesn't seem that whatever \nwound she has is affecting her movements, but maybe this is because of a very high pain tolerance. The blood loss would take its toll sooner or later if left unattended. \n\nOn the other hand, you could pretend to be hit by her, which you hope to use as an excuse to slow down her pursuers.  \n\nLast but not least, you can just watch as things unfold.\n*choice \n\t#Heal her \n\t\t*set heal +1 \n\t\t*set trust +1\n\t\tYour mind touches her and in an instant you send your prayer to the all that is to restore the physical wholeness of the creature you are in contact \n\t\twith.\n\t\t\n\t\tYou get her silent thanks, as well as a sense of bliss coming from the received healing.\n\t\t\n\t\tShe continues her flight and you stand to the sides, watching how things will go.\n\t\t*goto 18 \n\t\t\n\t\n\t#Simulate being hurt \n\t\t*set charm +1\n\t\t*set trust +1\n\t\tYou fall to the ground and scream for help, waving your hand in the air. Your efforts to attract their attention have some success. One of the guards \n\t\tcomes to check your condition while the other continues the pursuit. \n\t\t\n\t\tOf course, you are physically unscathed, and the realization that the guard approaching you will soon find that out makes you feel awkward. However,\n\t\the doesn't seem to be surprised.\n\t\t\n\t\t\"You are okay. She might have scared you or even drank some of your energy, but you are going to recover,\" he assures you.\n\t\t\n\t\tThen he starts running again.\n\t\t\n\t\tYou stand up and dust off your clothes as you watch how things would unfold.\n\t\t*goto 18 \n\t\t\n\t#Just watch \n\t\tYou move out of the way and just watch as things unfold.\n\t\t*goto 18 \n\t\t\n*label 18 \n*page_break\nThe lady disappear into a catwalk. You think she has no chance in hell of escaping the guards and your anxiety surges as you expect to hear the sounds of a fight.\n\nHowever, nothing like that happens. They spend some time there, and then come out cursing and gasping for breath.\n\nYou enter the block of flats, not wanting to attract their attention on you, but you wonder what happened with the lady? Maybe it would be a good idea to \nwait for the guards to leave the area and check the catwalk?\n\nYour intuition screams so loudly that you should do exactly that. It is almost as if you are not given a choice.\n*page_break\nYou enter the dirty catwalk without any fear. Now you understand how lucky she was that none of the guards were psionists. You can feel her feminine presence, \nand you are lead to the precise place where she is hiding. \n\n\"It is not as you think, dear brother,\" she telepathically speaks to you. \"They are psionicists just like you, they just don't know as much about the race I \nbelong to.\"\n\nYou lock eyes with her, a cat-like glow in the darkness. \"I know nothing about you and what you are,\" you reply.\n\nShe just smiles. \"You recall but you don't remember.\"\n*goto 19\n\n*label 19\n*page_break\nWhat question would you like to ask her?\n*choice \n\t*hide_reuse #\"Who are you?\"\n\t\t\"My name is Agatha and I work as a reporter in Weekly Gazette. Well, that is when I am able to obtain a human form, which is what I do plan to be able to \n\t\tobtain soon. I believe that next time we meet, we can just drink a cup of coffee in the bistro nearby just like humans do.\"\n\t\t*goto 19 \n\t\n\t*hide_reuse #\"What are you?\"\n\t\t\"I belong to an ancient race that you may call fay. Originally, we were a very benevolent race, however, the seeds of corruption made us a vibrational match to negative thought \n\t\tforms to attach to us. \n\t\tLater on, we evolved, one way or another. We slowly came to realize that experiencing separation from Source no longer served our needs and path as a \n\t\tspecies the way it had before. Some wanted to change, while others decided to cling to the old ways.\n\t\t\n\t\t\"We do not hail from the world of humans. It is just that during an expedition here things got terribly wrong and we were stranded here. Time passed and \n\t\tthe crew started to die one by one. For some, it was a natural death because of the advanced age. Yes, we can live for millenia, but even we can't escape the \n\t\twarm embrace of death. As far as I know, I am the only one who remains from that expedition.\n\t\t\n\t\t\"I have seen eras come and go. In the beginning, we used our natural ability to wield magic to blend in with the people and receive what we needed for \n\t\tour survival and to keep our sanity on a world that is beautiful, but quite different from ours. Then, all of a sudden, it seems that a collective decision \n\t\tfor the disappearance of magic was taken and we were left without what we relied on. We were prosecuted by the people of the dominant religions who saw \n\t\tus not as extensions of the very same Source that we all belong to, but as children of the one causing the separation from it. \n\t\t\n\t\t\"Finally, we saw hope in the invention of neural implants, because they could allow us to use some of what we could no longer have when magic disappeared. I \n\t\tgot an implant that once again, among other things, allowed me to walk among humans and interact with them in lovely ways. Unfortunately, it seems it malfunctioned \n\t\ttoday and I got in trouble.\"\n\t\t*goto 19 \n\t\n\t*hide_reuse #\"Why did you call me a brother?\"\n\t\tShe chuckles. \"It is not because I want to suggest common physical heritage, or to point out that you belong to my species. No, that is not the case, dear one.\n\t\tWhat I meant is a broader definition of the term. I recognized your soul as somebody I have met before on the realm of my people. Back then, you were of that very same \n\t\trace during the darker period and what you wanted to bring to it is the ability to connect better to Source. For that loving service, you have the gratitude of so many of my brethren,\n\t\twe consider you to be one of us.\n\t\t\n\t\t\"It is very interesting that our paths cross now. Usually it means both parties giving each other  a boost on the paths we are walking on, but let's see how thing \n\t\thappen this time.\"\n\t\t*goto 19 \n\t\n\t*hide_reuse #\"Why were those guys chasing you?\"\n\t\t\"They are wearing the uniforms of guards but really are something else. They belong to an organisation that wants to put an end to the existence of our kind.\n\t\tIt is a warfare that started centuries ago. I am quite surprised they reached me so quickly after a security camera showed my appearance going back to what would \n\t\tbe normal for my species. However, I don't think much of them. They wouldn't be able to recognize me if I have shifted into my human form even if I bump into \n\t\tthem. Yet, they take credit for being around and on the lookout even though it is practically just me of my kind remaining.\"\n\t\t*goto 19 \n\t\t\t\n\t#\"What are you going to do now?\"\n\t\tAgatha smirks. \"I don't have much of a choice right now. I can't go out in the open like that. I will have to wait until it gets dark so that I can have \n\t\tits veil as some cover. Then, I can go home and take some rest.\"\n\t\t\n\t\t\"What about the ability to shift into human form? Is there a way to regain it?\" you ask.\n\t\t\n\t\t\"I think so, but I will need a spare part.\" She takes a small metallic capsule from the back of her neck. \"I guess this one just malfunctioned. It \n\t\twon't be very easy to find, but I think I can manage to do that.\"\n\t\t\n\t\tWould you like to help her in any way with that task?\n\t\t*choice\n\t\t\t#Offer her to take the part as a model of what is required, so that you could hopefully find it from somewhere.\n\t\t\t\t*set trust +1\n\t\t\t\t\"That is very kind of you. You can take it. I assume I will be able to obtain another one before you, but who knows. In any case,\n\t\t\t\tyou are still the loving ${brother} I know, no matter what form you have in this incarnation.\"\n\t\t\t\t*set part true \n\t\t\t\t\n\t\t\t\tYou blush but you hope that the dusk hides it. As you take the part from her claws, you are surprised at how warm it feels.\n\t\t\t\t\n\t\t\t\t\"Do you have a fever?\" you ask her.\n\t\t\t\t\n\t\t\t\t\"No, my normal body temperature in this form is about 50 degrees.\"\n\t\t\t\t\n\t\t\t\t\"Then, you are indeed a hot lady, aren't you?\"\n\t\t\t\t\n\t\t\t\t\"I hope so,\" she laughs.\n\t\t\t\t*goto 20 \n\t\t\t\n\t\t\t#Offer her to meet her contacts, assuming it might be easier for somebody who looks human to talk to them.\n\t\t\t\t*set trust +1\n\t\t\t\t\"That is very kind of you. You are still the loving ${brother} I know, no matter what form you have in this incarnation. However,\n\t\t\t\tmy friends know this form of mine as well, there won't be any problem for them to meet me looking like that.\"\n\t\t\t\t*goto 20 \n\t\t\t\t\n\t\t\t#No \n\t\t\t\t*goto 20 \n\t\t\t\t\n*label 20 \n*page_break\nYou can barely see her features in the dark. You guess that she could appear to be quite scary to any person not familiar with her. Probably what inspires \nmost terror is the fact that she resembles a human being so much, except for a few features that make her stand out.\n\nYet, you feel her so close to you, as if you had known her for years. Logically, the question whether this is not some kind of a manipulation, some game of \nmind control. But... you are a psionicist, who could be able to tell better than somebody with your training if an entity is trying to cheat you in such a \nsimple way. On the contrary, you are able to touch her mind and clearly feel her aura. You can't say for sure that she is a very benevolent being in general, \nbut you would expect her to be benevolent towards you.\n\nYou start feeling pity for her. Alone in this world that can sometimes be quiet cruel even to those who belong to it.\n\nWould you like to help her go home or invite her to spend the night in your place?\n*choice\n\t#Invite her to your place \n\t\t*set trust +2\n\t\t*set distrust +2\n\t\t\"No way, you must be joking.\" Her warmly-covered eyes fill with tears. \"I... I can't accept that.\"\n\t\t\n\t\t\"Why? Did you not call me a brother? What kind of a ${brother} would leave a sibling in this condition? Only for tonight.\"\n\t\t\n\t\t\"You live across the street, don't you?\" she asks.\n\t\t\n\t\tYou nod.\n\t\t\n\t\t\"Then maybe I can spend a few hours there but will leave before dawn because I want to use the veil of the night to go home.\"\n\t\t\n\t\t\"Sounds like a good idea,\" you reply.\n\t\t\n\t\t\"I don't know how to thank you.\"\n\t\t\n\t\t\"It is really nothing.\" You shrug.\n\t\t\n\t\t\"Yeah, but I rarely receive such acts of kindness, especially in my true form.\"\n\t\t\n\t\tYou doff your trench coat and put it on her shoulders. The wings stay in the way a little bit but actually manage to hide them pretty well. \n\t\tPoking out of the catwalk, you look around for pedestrians but don't see any. You give Agatha a sign and you rush across the empty street. You quickly \n\t\tunlock the door of the block of flats.\n\t\t\n\t\t\"I think somebody saw us. Somebody you know. I felt it, he was... spying on you,\" she remarks as you both enter your flat.\"\n\t\t\n\t\t\"There is nothing to worry about. I am doing nothing wrong,\" you reply.\n\t\t\n\t\t\"I guess so. Inviting a lady to your place doesn't seem bad... Unless the lady looks as if she has come out of another realm, which is the sinister truth.\"\n\t\tShe shrugs.\n\t\t\n\t\t\"Come on, you look fine even in this form.\" Well, you must admit that a look at her teeth can prove otherwise. \n\t\t*page_break\n\t\tYou invite her on the sofa and ask her if she wants something to eat or drink.\n\n\t\t\"Just a glass of water, thank you,\" she replies.\n\t\t\n\t\t\"If you feel hungry in the middle of the night or something, the fridge is over there.\"\n\t\t\n\t\t\"That is very sweet of you, but this is not the way I feed in this form.\"\n\t\t\n\t\tHonestly, you dare not ask about it. \"Do you think you can get some rest on the couch?\"\n\t\t\n\t\tAgatha laughs. \"Yes. And I certainly don't expect you to invite me into your bed.\"\n\t\t\n\t\t\"This is good since it is a small one and I think your wings will be getting in the way a bit.\"\n\t\t*page_break\n\t\tYou feel tired, so maybe it would be a good idea to go to sleep. As a psionicist, you tend to get emotionally tired very quickly even under \n\t\tcircumstances.\n\n\t\tGetting to fall asleep actually proves difficult. First, you get that mysterious ${woman} who seems to be your eternal other that you don't \n\t\tremember, then this fairy looking lady who appears to be a friend from a past incarnation. It sounds crazy even for a psionicist. Nevertheless,\n\t\tthere is a part inside you that knows that it is the truth. The knowledge without knowledge.\n\t\t\n\t\tWhen you get up, there is no sign of the fay woman. Your ask yourself if she was just a dream, but the refined womanly scent mixed with just a bit \n\t\tof sulphur says otherwise.\n\t\t*goto 22\n\t\t\n\t#Offer to walk her home \n\t\t*set trust +1\n\t\t*set distrust +1 \n\t\t\n\t\tAgatha smiles widely, which actually looks a little bit sinister, but you know you are safe. \"That would be so very cute of you. As a matter of fact, I don't \n\t\tlive very far from here, but I would definitely feel safer having somebody by my side. I guess I would look at least a bit less suspicious.\"\n\t\t\n\t\tYou doff your trench coat and put it on her shoulders. The wings stay in the way a little bit but actually manage to hide them pretty well. \n\t\tPoking out of the catwalk, you look around for pedestrians but don't see any. You give Agatha a sign and she comes out.\n\t\t\n\t\t\"This way.\" She turns to the right. You walk close to her, trying to hide as much of her as possible with your body.  \n\t\t\n\t\t\"I think somebody saw us. Somebody you know. I felt it, he was... spying on you,\" she remarks.\n\t\t\n\t\t\"There is nothing to worry about. I am doing nothing wrong,\" you reply.\n\t\t\n\t\t\"I guess so. Seeing a lady off doesn't seem bad... Unless the lady looks as if she has come out of another realm, which is the sinister truth.\"\n\t\tShe shrugs.\n\t\t\n\t\t\"Come on, you look fine even in this form.\" Well, you must admit that a look at her teeth can prove otherwise.\n\t\t*page_break\n\t\tYou soon arrive at her house. \n\t\t\n\t\t\"The etiquette would require me to offer you to come in for a cup of coffee,\" she says as she opens the door.\n\t\t\n\t\t\"Maybe another time. I don't want to bother you right now,\" you reply.\n\t\t\n\t\t\"Is it not that I am bothering you with the way I look?\" She gives you a wink.\n\t\t\n\t\t\"Well, maybe just a little bit.\" You make a sign with your thumb and a forefinger.\n\t\t\n\t\t\"I can't really blame you for that, you know.\" Agatha steps in and puts the trench coat off and gives it to you. \"It might smell of \n\t\tpeach blossom for a bit, but the scent will fade away.\"\n\t\t\n\t\t\"Oh, don't worry about it.\" You take it back and put it on. \"I wish you good luck with obtaining the look you want and I hope to meet you again.\"\n\t\t\n\t\t\"I will find you,\" she says with a tone that sends slight shivers down your spine.\n\t\t*page_break\n\t\tYou take a slow walk back to your flat. Every now and then, you take your time to smile at the ridiculous encounter you just had. Once home, you \n\t\ttake a shower and immediately go to bed, feeling utterly exhausted.\n\t\t*goto 21 \n\t\t\n\t#Send her your best wishes and go home \n\t\t\"I wish you all the best too, dear one. I am happy I was able to meet you again, brother, it is a rare joy in this cold world. I would like \n\t\tto see you again, if that doesn't bother you. I hope that next time I will look different. It is not that I don't enjoy my racial features, I just \n\t\ttend to scare people.\"\n\t\t\n\t\tShe laughs in a way that appears to be contagious for you. You bid her farewell and return home.\n\t\t*goto 21 \n\t\t\n*label 21\n*page_break \t\t\nGetting to fall asleep actually proves difficult. First, you get that mysterious ${woman} who seems to be your eternal other that you don't \nremember, then this devilish looking lady who appears to be a friend from a past incarnation. It sounds crazy even for a psionicist. Nevertheless,\nthere is a part inside you that knows that it is the truth. The knowledge without knowledge.\n*goto 22 \n\n*label 22 \n*page_break\nYou arrive at the police station and find Inspector Morales in a bad mood, looking at a folder full of reports and photos. He barely takes a look at you.\n\nYou tell him that you think it will be a good idea to try to speak to the angelic group just as Susan suggested. He replies that he would like to leave that to you. \nTaken aback by his reaction, you show a bit of your content. You also get a bit suspicious of why he would not like to meet the Angels of Mercy. Your intuition \ntells you he is hiding something but you can't put your finger on it.\n\nThe coffee you drank before you drank before you left home is starting to take its tall, so you leave your bag on the hanger and head for the bathroom.\n*page_break\nWhen you return you get the suspicion that he searched through the handbag. For a brief moment, you consider trying to take fingerprints, but you have learned to \ntrust your instincts enough to know that you need no more proof for this.\n\n*if part \n\tIn horror, you realize that he must have seen the part the fairy woman gave you. You are not sure what story he can make out of it, but you are sure that \n\twould hardly make a good impression on him.\n\t*set distrust +1\n\t*goto 23 \n\n*else \n\tAs rude of him as it may have been, you know that you have nothing to worry about. There is nothing in your bag that could compromise you.\n\t*goto 23 \n\t\n*label 23 \n*page_break\nSusan gives you the coordinates of the address of the Angels of Mercy. Interestingly enough, it i just a couple of blocks away from the police station, so you \nenjoy the pleasant walk under the sunny sky.\n*page_break\nThe building vaguely resembles a church with its Gothic forms and stained glass windows that make it look like something that came up from a fairy tail. As you wonder how \nyou never came to see this place, the heavy wooden door opens and a hooded figure peeks out. Navy blue eyes speckled with myriads of dots greet you.\n\n\"I expected you. ${name},\" he says.\n\n\"How?\" you reply but he just opens the door wider and invites you in. Following him silently, you enter a big chamber full of lit candles. The stranger sits at one of the pews \nand invites you to do the same.\n\n\"How do you know my name?\" you ask intrigued.\n\n\"We have operatives who are always watching the timelines for ones that come close to ours, about to cross it. We want to know why because we want to help. Our \nmission here is of benevolent nature and we want to make things right. My name is Nathaniel and I am the Chief Coordinator of the Angels of Mercy.\"\n\nYou are not very sure you fully understand what he tries to say but decide that it is more important to switch the topic to the matters of your heart.\n\n\"I came to search for a ${woman}.\"\n\nHe nods. \"Then know that you will meet her much sooner than you realize. But our paths cross for a purpose much greater that what might appear at a first glance. \nIt is not, however, our habit to explain things to come uninvited. So, if your souls says that you should ask me particular questions, please feel free to do so.\"\n*goto 24 \n\n*label 24 \n*page_break\nWhat would you ask Nathaniel?\n*choice \n\t*hide_reuse #Ask bout their mission \n\t\t\"It is quite simple,\" he says. \"We strive to put an end to the eternal conflict between what people call good and evil. The great experiment reached its goal, which \n\t\tis the total integration of the two. As strange as it may sound, both parties became equally evil in their savagery on one another, and the love they opened their hearts to \n\t\tin order to heal made them equally holy. Some of our operatives have gone rogue, unwilling to recognize themselves in the faces of the dark ones. Also, quite a few members \n\t\tof the demonic races decided to stick to their old ways. We are trying to ensure peace.\"\n\t\t\n\t\tYou scratch your head. Yesterday you met a fay lady, which claimed to be the only one remaining. Did she lie to you? Did she not know? And what if all the \n\t\tgibbering of Nathaniel is just the babbling of a lunatic?\n\t\t*goto 24 \n\t\t\n\t*hide_reuse #Inquire about the fay woman you met the previous day \n\t\t\"I can tell that you were close to a one that used to be dark. However, I want to state that I am in no way worried about it. We know of such entities and as time \n\t\tpassed, the seeds of love slowly started appearing between the two factions. I sense the joy of meeting somebody you had grown to love and that makes me happy.\"\n\t\n\t\tYou look at him in awe, not really expecting to hear somebody claiming to be an angel speak in this way about Agatha.\n\t\t*goto 24 \n\t\t\n\t*selectable_if (part) #Ask him if he can help you with the spare part Agatha needs \n\t\t*set particle true \n\t\t\n\t\t\"Do you happen to have one of those?\" you show the broken part to the angel.\n\t\t\n\t\tHe takes it and examines it closely.\n\t\t\n\t\t\"Not really, but I don't need to.\" Energy flashes through his fingers, then he gives it back to you. \"Now it is usable again.\"\n\t\t\n\t\t\"How?\" It feels warm to the touch.\n\t\t\n\t\t\"Energy can be manipulated into matter. What I did is very close to your disruptive blade mastery.\"\n\t\t\n\t\t\"It is not exactly the same,\" you argue. \"The blade is an illusion that tends to do the same results as a material blade.\"\n\t\t\n\t\t\"And did you hear me say that I really repaired it?\" He laughs.\n\t\t*goto 24 \n\t\t\n\t*hide_reuse #Ask him about any impending dangers\n\t\t\"Dancing with dangers is what you do every day. This is how your skills grow and how you learn. Beware, however, that some of them will come \n\t\tfrom the direction you are not supposed to expect. Telling you more would be to take away the pleasure of fully gaining the experience.\"\n\t\t\n\t\t\"I bet that can be a very doubtful experience.\" You chuckle.\n\n\t\t\"It can be, indeed.\" He nods.\n\t\t*goto 24 \n\t\n\t*hide_reuse #Ask him to tell you more about the one you are looking for \n\t\tNathaniel sighs. \"Maybe it should be the other way round - I should be the one to ask you about this enigmatic #{woman}. Your souls knows ${hers}\n\t\tbetter than anybody else, and yet your mind remembers only a little. But this is how it goes sometimes.\n\t\t\n\t\t\"We see the sign of her implanting the wings as a means to getting closer to us, a signal for us to join her on a grand mission. However, we have been \n\t\tquite busy lately, so we haven't been able to concentrate on her lifestream. However, we will keep a close eye on her, as she is a very important player in \n\t\tthe game of gods and you are too, as the one standing next to ${her}.\"\n\t\t\n\t\t\"Will I... really stand next to her?\" Tears suddenly materialize in your eyes.\n\t\t\n\t\t\"It will be as I said, much sooner than you allow yourself to believe.\"\n\t\t\n\t\tYou smile.\n\t\t*goto 24 \n\t\t\n\t#Demand to see her immediately\n\t\t\"So be it. All you need is to walk out the door, turn around and look up.\"\n\t\t\n\t\t\"Is that some kind of a joke?\"\n\t\t\n\t\tNathaniel shakes his head. \"We angels are terrible at joking. This is why we no longer even try. The ${woman} you are looking for appears to be \n\t\ton the roof of the temple. I am happy for the joy you are about to share.\"\n\t\t\n\t\tYour knees feel so soft as you make your way out.\n\t\t*goto 25 \n\t\t\n*label 25\n*page_break\n[i]No, that can't be true[/i], you say to yourself as you do as Nathaniel told you.\n\nBut here ${she} is, standing tall on the roof, ${her} metallic wings sparkling with some kind of electricity. The blindfolds is currently used as a scarf around ${her} neck and you \nare very happy for that because you are able to see ${her} beautiful eyes glowing with opalescence.\n\nYou are not sure about the fabric of the skin-tight costume ${she} is wearing, but it is black and looks comfy.\n\nIt is hard to describe the cocktail of feelings that overwhelm you. There is the infinite love, but there is something about the determination that she radiates, which \ncoupled with the implant wings makes you recall the AI minded androids that you faced in battle.\n\nWhich of the two is stronger?\n*choice \n\t#The love for the AI enhanced human you see \n\t\t*set humanity -3 \n\t\t*set love +3 \n\t\t(AI+, Love+)\n\t\t\n\t\tAs graceful as a bird, ${she} descends before you. Words don't break the beautiful silence of the moment, and the tears make no noise either as the two of you embrace \n\t\tin a hug that nobody wants to end.\n\t\t\n\t\tAnd indeed it feels like that you are shifting to the out of time.\n\t\t*goto 26 \n\t\t\n\t#The fear of the AI part of her that may have affected her \n\t\t*set humanity +5\n\t\t*set love -5 \n\t\t(Humanity+, Fear+)\n\t\t\n\t\t${she} jumps down with the grace of a bird of prey. As ${she} descends right in front of you, you involuntarily take a step back, not sure what to expect. But ${she} \n\t\tjust smiles at you with the warmth of the thousands of years recognized by your soul.\n\t\t\n\t\t\"I understand your fear, dear one, and I am sorry about that. You have seen a lot of violence committed by the mechanical humans. You may not even call them \n\t\thuman, I won't disagree. And it is true that I have a little bit of their characteristics, but in my heart of hearts I believe that the love we share would be much stronger than your fear.\"\n\t\t\n\t\t\"Maybe.\" You clear your throat.\n\t\t*goto 26\n\t\t\n*label 26 \n*page_break\n\"I need your help,\" ${she} says hypnotizing you with the galaxies swimming in ${her} eyes. \"Do you think you can lend me a hand.\"\n\nYou sigh. \"I am not good at remembering things, but my intuition tells me it is something that has been destined to happen. Or I chose it before I \ncame to this life.\"\n\n$!{she} smiles. \"Which of the two, dearest one?\"\n*choice \n\t#\"I believe in fate.\"\n\t\t*set independence -5 \n\t\t(Dependence++)\n\t\t\n\t\t$!{she} shakes ${her} head. \"Sometimes there is fate, but more often than not this has been used by those who wanted by all means to stay in power forever.\n\t\tBe careful with that notion, please.\"\n\t\t\n\t\t\"One way or another, I think I will be willing to help you, one way or another. I just need to learn more.\" You shrug.\n\t\t*goto 27\n\t\t\n\t#\"I believe in the power of free will.\"\n\t\t*set independence +5\n\t\t*set love +2 \n\t\t\n\t\t(Independence++, Love+)\n\t\t\n\t\t$!{she} smiles again. \"I am happy to hear you have not lost the belief that you held so strongly in the majority of the incarnations we had together. I \n\t\tam utterly attracted to that recognition.\"\n\t\t\n\t\t\"So, no matter whether I agreed or not to help you, I have the right to say no. Is that correct?\"\n\t\t\n\t\t$!{she} nods. \"You always have that right.\"\n\t\t*goto 27\n\t\t\n*label 27 \n*page_break\n\"Somehow I don't think this is exactly the place for talking about secret agendas. Besides, you are a suspect, you know?\" you ask.\n\n\"Correct. And that was just the beginning.\"\n\n[i]Oh, my dear, what am I going into[/i], you think in your head. \"I am supposed to be one of the side of the good guys,\" you claim.\n\n\"You would be wrong if you think that I am bad to the bone.\" $!{she} chuckles. \"Now if you will, please, take my hand and I will instantly take you to the place \nwhere I spend most of my night.\"\n\n\"How exactly are you going to get me there?\" You extend your arm. \n\n\"By the power of my mind and the strength of my love for you,\" ${she} replies.\n*page_break\nYou open your eyes to see a room painted in white. It is so clean. The first impression you get is of some kind of a lab, but there is a queen size bed and a sink and a stove in the \ncorner.\n\n\"Welcome to my sanctuary, dear one,\" ${she} says softly.\n\n\"Where are we?\" you ask.\n\n\"It is an interdimensional pocket. It is impossible to get here unless you are looking for it and even then it is extremely difficult. Here I rest, do the work that I must and \noccasionally I send you dreams.\" $!{she} chuckles.\n\n\"Like the one about the masked ball party?\"\n\n$!{she} nods. \"I really enjoyed that. I was at a loss on how exactly to integrate those aspects, which powers to keep and how exactly to combine them into a meaningful whole. \nMy intuition was failing me and this is when you stepped in.\"\n\n\"What is my role in your plans?\" you ask.\n\n\"I ask you to look into your heart for a clue. What lies there?\"\n*choice \n\t#\"You are my soul partner, it is natural for me to be involved in what you do.\"\n\t\t*set love +3\n\t\t\n\t\t(Love+)\n\t\t\n\t\t$!{her} eyes get wet. \"I feared you would not be able to remember. That risk exists every time a soul incarnates in a human with severed DNA strands,\n\t\talthough it is small one. I can now breathe more easily.\"\n\t\t\n\t\t*goto 271\n\n\t#\"I have a karmic obligation to help you, to make up for a time when I wronged you.\"\n\t\t*set love -5\n\t\t(Fear+)\n\t\t\n\t\t\"No, that can not be! What kind of nonsense are you uttering?\" $!{she} glares at you.\n\n\t\t\"You asked and I told you. What is so wrong about it?\"\n\t\t\n\t\t\"What I just heard coming out from you is my nightmare slicing into the reality I live in. I feared you would not be able to remember. That risk exists every time a soul incarnates in a human with\n\t\tsevered DNA strands. It is a small one, but it is always there.\"\n\t\t\n\t\tHow would you reply?\n\t\t*choice \n\t\t\t#\"Why do you have to be so rude?\"\n\t\t\t\t*set anger +3\n\t\t\t\t(Anger+)\n\t\t\t\t\n\t\t\t\t\"So you are basically trying to tell me that I am some kind of a failure, right?\" You snap back.\n\n\t\t\t\t\"This is nowhere near what I said. I never wanted to be rude,\" ${she} claims.\n\t\t\t\t\n\t\t\t\t\"I trust that you didn't want, but it still sounded this way.\"\n\t\t\t\t\n\t\t\t\t\"Oh, I am sorry.\"\n\t\t\t\t*goto 271\n\t\t\t\t\n\t\t\t#\"Don't worry, things will fall into their respective places.\"\n\t\t\t\t*set anger -3\n\t\t\t\t(Composure+)\n\t\t\t\t\n\t\t\t\t\"There is a lot of wisdom in what you say, dear one. I feel I must apologize for jumping to conclusions.\"\n\t\t\t\t\n\t\t\t\t\"What I get is that you take me as somebody who is very close to you and this is why you tend to get overly emotional about my reactions.\n\t\t\t\tJust relax. It seems you know me better than I know myself.\"\n\t\t\t\t*goto 271 \n\t\t\t\t\n*label 271 \n*page_break\n\"So, why are you hiding?\" you change the subject. \"I have the feeling you are involved in something important.\"\n\n$!{she} nods. \"I believe so. Are you familiar with the theory according to which magic was quite common up until a particular moment in history where a \ncollective decision was taken for it to be replaced by technology.\"\n\n\"Last night I met a fay woman who told me about it.\"\n\n\"Oh, really? Would you like to tell me more about it?\"\n*choice \n\t#Tell ${her2} everything you know \n\t\t\"That is very interesting. It is always a special occasion to meet somebody whose soul you know from another time or another world,\" ${fallen_name} comments.\n\t\t\n\t\t\"Do you think you might know her too?\" you ask.\n\n\t\t\"I wouldn't want to turn down this possibility, although I can't always get the soul recognition done. With your soul it was easy because you are just my \n\t\tclosest soulmate.\"\n\t\t*set love +3\n\t\t\n\t\t(Love+)\n\t\t\n\t\tYou can't help but blush.\n\t\t*goto 28 \n\t\t\n\t#Tell ${her2} just the basics\n\t\t\"There is really not much to tell. She was just running from a couple of guys after her masking technology malfunctioned. She hid in a catwalk. I was intrigued, so I \n\t\twent to talk to her.\"\n\t\t\n\t\t\"I might be wrong, but I have the feeling there is something that you don't want to share with me. Maybe it is nothing more than some uneasiness. There \n\t\tmust be some reason for that meeting to take place in such a way \"\n\t\t*set love -3\n\t\t\n\t\t(Fear+)\n\t\t*goto 28 \n\t\t\n*label 28 \n*page_break\n\"Anyway, you were trying to tell me about your mission in the now we are sharing,\" you remind ${her2}.\n\n\"Yes. It is undeniable that the technology that evolved since that period brought a lot of positives to all people. It ensured living better lives. However, the results are \nstill less than satisfactory. Things would have been better if magic was available too. This is what I have been working on.\"\n\n\"If you manage to do that, it would help the fay woman, whose name is Agatha, by the way.\"\n\n$!{she} shakes ${her} head. \"I would be happy for everybody to benefit from what I would like to bring forth. The remaining entities of the fairy folk are expected to be \namong them, but the core group I am trying to help are the Earth humans. Technology lead to a high degree of dependency on artificial constructs. It can be used for malicious \nservice-to-self purposes. Bringing back magic into the equation would bring more options for personal expression and more tools for people to accomplish goals.\"\n\nWhat would be your comment?\n*choice \n\t#\"I love that it would challenge the dependency on AIs\"\n\t\t*set humanity +5\n\t\t*set independence +5 \n\t\t(Humanity++, Independence++)\n\t\t\n\t\n\t\t\"I know you have seen the worst of the AI infested humans and how dangerous they can be. This is my story too. I am sorry for all the suffering that \n\t\tstarted this way, but the result is my inspiration to do my best to bring about a change,\" ${fallen_name} says.\n\t\t\n\t\t\"Sounds like a noble cause,\" you comment.\n\t\t*goto 29\n\t\t\n\t#\"I fear that the core of the problem is the planetary human mindset. What if things get worse as a result of that freedom?\"\n\t\t*set humanity -5 \n\t\t*set independence -5\n\t\t(AI++, Dependence++)\n\t\t\n\t\t\"There is a lot of wisdom in what you say, dear one.\" $!{fallen_name} sighs. \"I can't help humanity change the direction in which they \n\t\thave decided to go. The only thing I can do is present more options so that they can hopefully find a balance within themselves. Miracles can happen \n\t\tafter that. It is true that magic can be used to manipulate people pretty much in the same way technology can, I agree with that.\"\n\t\t*goto 29 \n\t\t\n*label 29 \n*page_break\n\"How exactly are you going to do that?\" you ask ${her2}.\n\n\"You see, when magic disappeared, it didn't do so without a trace. Many technological means still carry some of it. I can detect them, isolate them and bring them into the \nbigger picture. It is pretty much like solving a puzzle. I have discovered some pieces already and I am looking forward to finding more.\"\n\n*if part \n\t\"Do you think that this can be useful?\" You hand ${her2} the part Agatha gave you.\n\t\n\t$!{she} takes it and examines it carefully. \"Yes, I think I know what it is and it is imbibed with magical residues. Most of them are known to me, but there \n\tis something about the way they are combined that I see for the first time. There is also something broken in it that may give me a bit of a challenge.\"\n\t\n\t\"Do you think you can fix it?\" you ask.\n\t\n\t$!{she} nods. \"I am sure Agatha would need it. So, I can either repair it and hand it to you so that you could give it back to her next time you meet her, or \n\tI can use it to learn more about its origin. The choice is yours.\"\n\t\n\tWhich would it be?\n\t*choice \n\t\t#Assisting ${fallen_name}'s research is more important.\n\t\t\t\"Thank you, dear one,\" ${she} says and takes the part to a device. \n\t\t\t\n\t\t\tYou don't know what it does, but it seems fun to see the fairy lights that start dancing all over it. \n\t\t\t*set mana +1\n\t\t\t*goto 30 \n\t\t\n\t\t#There must be many sources for ${fallen_name} to get the info she needs, however, Agatha definitely needs the part.\n\t\t\t*set love +3 \n\t\t\t(Love+)\n\t\t\t\n\t\t\t\"I understand,\" ${she} says. \"You have a big heart. There are moments like that when I realize how hard it would be not to love you.\"\n\t\t\t\n\t\t\tWhile your cheeks redden, she takes the part to a device. \n\t\t\t\n\t\t\tYou don't know what it does, but it seems fun to see the fairy lights that start dancing all over it. \n\t\t\t\n\t\t\t\"It is operational again.\" $!{her} fingers gently touch yours as she puts it into your hand.\n\t\t\t*set particle true \n\t\t\t*goto 30 \n\n*elseif particle \n\t\"Do you think that this can be useful?\" You hand ${her2} the part Agatha gave you.\n\t\n\t$!{she} takes it and examines it carefully. \"Yes, I think I know what it is and it is imbibed with magical residues. Most of them are known to me, but there \n\tis something about the way they are combined that I see for the first time. I am curious what my equipment will tell me,\"\n\t${she} says and takes the part to a device. \n\t\t\t\n\tYou don't know what it does, but it seems fun to see the fairy lights that start dancing all over it. \n\t*set mana +2\n\t*goto 30 \n\t\n*else \n\t*goto 30 \n\t\n*label 30\n*page_break\n\n\"Okay, do you want me to show you where I reside?\" ${she} asks you. \n\n\"Of course,\" you reply.\n\n$!{she} takes your hand and your vision blurs. Your head gets dizzy for a moment. Your stomach turns but just when you think you might vomit the feeling stops and you find yourself \nin another place.\n*goto_scene masquarade\n\t\n\t\n\t\t\t\n\n", "prologue": "You enter the temporal travel pod right after her. The silence seems heavy with anxiety but at least it doesn't last for long. The pod \ncloses and you prepare for the weird feeling of being thrown in the out of time and then spat into the unknown.\n\nAs the gateway opens, she looks into your eyes. You have no idea why she asked you to come and why, but you have a bad presentiment.\n\nShe just nods and steps out, her cloak waving at the wind that greets her.\n\nYou follow her and look around. It seems that place hasn't seen life in centuries. A few buildings remain up by the sheer power of a \nmiracle, dominating the ruins of a city that must have harboured many lives and hopes. The roads between them are covered in \nmore sorts of waste than you can't recognize even with your psychic abilities.\n\n\"Why have you brought me here?\" you ask your soul mentor. \"I am sure you could have chosen a much merrier place.\"\n\nShe sighs. \"I know you miss our true homeworld. It is waiting for you, but your adventure here is not over, and I bet you want to play \nmore of it.\"\n\nYour eyes open wide. \"You want to tell me that this is the end of the world we wanted to protect so badly?\"\n\n\"I am afraid this is the outcome we strived to avoid. You worked diligently. I ask you not to feel guilt. It was not a failure, just an experience.\"\n\nYou bend and try to touch the soil, to connect with whatever is left of the consciousness of the planet and ground. \"What exactly happened?\"\n\n\"History repeated itself several times before it became clear it was pointless. The humans would design war machines and give them unspeakable \npower to ensure they were affective. Then, the AIs would rebel and fight back. Men would come up with even more destructive constructs to protect them, trying \nto overtake the simulated evolution of the androids whose cold silicon minds never slept. In the impasse, there could be no winner, only two losing sides.\"\n\nWhat do you feel?\n*choice \n\t#Anger at the humans who brought it all on themselves \n\t\t*set anger +5 \n\t\t*set humanity -5 \n\t\t\"I understand your point of view,\" your soul mentor says. \"And yet I can't full-heartedly agree with you because it was not the \n\t\tfault of humanity as a whole, but a very small group who started a process that was very difficult to control, much less stop.\"\n\t\t\n\t\t\"Then I am angry at that part of humanity,\" you remark.\n\t\t*goto 2 \n\t\t\n\t\t\n\t#Anger at the AIs \n\t\t*set anger +5 \n\t\t*set humanity +5\n\t\t\"Such cold and heartless minds should have never been allowed to exist.\"\n\t\t\n\t\t\"And yet they were designed by people claiming to be human but very far from the understanding the meaning of the world,\" she replies.\n\t\t\n\t\t\"Yeah, I understand that they were just a product of twisted minds who translated their hurt into code, but it is hard for me to love \n\t\tthat product.\"\n\t\t*goto 2\n\t\t\n\t#Peace. Whatever happened during the conflict is past\n\t\t*set anger -5 \n\t\t\n\t\t\"Is that you really feel?\" she asks you.\n\t\t\n\t\t\"Lashing myself for things that already unfolded themselves would be pointless. We are time travellers and can make miracles happen, right?\"\n\t\t\n\t\tShe raises her eyebrow. \"I know that you are thinking in the right direction but I have the feeling you are vastly overestimating our \n\t\tcapabilities.\"\n\t\t*goto 2\n\t\t\n\t#Regret that we didn't intervene more \n\t\t*set independence -5 \n\t\t\"You know that we can only operate within the intervention rights that we have,\" she reminds you.\n\t\t\n\t\t\"I do but that doesn't mean I like it. If we had more we could have prevented all that madness,\" you remark.\n\t\t\n\t\t\"We still can, dear one, even without overstepping the rules, we just have to be smart about it,\" she assures you.\n\t\t*goto 2 \n\n\t#Understanding that it was an important lesson to learn for the watchers\n\t\t*set independence +5\n\t\tHer fingers run through her hair, a gesture of trying to find comfort in the softness of \n\t\ther locks. \"It was a painful lesson and you know how hard it is when you are given limited intervention right.\"\n\t\t\n\t\t\"I've had a taste of that and this is why I am no longer a watcher,\" you reply.\n\t\t\n\t\t\"I know and understand that too.\"\n\t\t*goto 2\n\t\t\n*label 2 \n*page_break\n\"Would you like to go back in time and change things?\" your soul mentor asks you.\n\n\"How can I say no to that question?\" you answer. \"I have spent many lifetimes trying to prevent cataclysms like this one from happening.\"\n\n\"In order to be able to do so, you have to meet your eternal partner, the one who you abandoned once but who still holds space for you.\"\n\n\"I don't remember...\" you say confused.\n\n\"Listen well and let my words echo in your mind. Together you will heal the wounds of the past and bring hope to this world that you see shattered in that glimpse of the far away future. A long time ago you asked me to let you forget because the burden of your past lives was too great for you to carry any more. You've done well during the many lives you \nhad on this planet, but now it is time for your memories to start returning, slowly but steadily.\"\n\n\"I am up for it,\" you smile.\n\n\"SO be it. Now, will show you a dream your eternal one arranged for you. I bet you will have a lot of fun meeting that soul again,\" she smiles and gets back into the pod.\n\nYou are quick to follow her.\n*goto_scene dream \n\t\t", "screenshots": "*set name \"Adrian\"\n*set gender \"male\"\n*set heal 3 \n*set co 2\n*set charm 1\n*set bm 4 \n*set res 2\n*set athletics 1 \n*set strength 1 \n*set resistance 2 \n*set love 60\n*set anger 40\n*set humanity 63\n*set independence 75\n*line_break\n*set fallen_name \"Lauren\"\t\n*set fallen_gender \"female\"\n*set hacking 4 \n*set lockpicking 3 \n*set vibro 1\n*set control 2\n*set reingineering 3\n*set runemastery 4 \n*set selfcontrol 1\n*set intuition 3 \n*set her \"her\"\n*set her2 \"her\"\n*set she \"she\"\n*set woman \"woman\"\n*set hers \"hers\"\n*set dress \"dress\"\n*set herself \"herself\"\n\n\"History repeated itself several times before it became clear it was pointless. The humans would design war machines and give them unspeakable \npower. Then, the AIs would rebel and fight back. In the impasse, there could be
