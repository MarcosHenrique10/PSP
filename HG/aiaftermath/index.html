et res +1 \n\t\t*goto library2\n\t\t\n\t#The second book \n\t\t*set bm +1 \n\t\t*goto library2\n\t\n\t#The third book \n\t\t*set co +1 \n\t\t*goto library2\t\n\t\t\n\t#The fourth book \n\t\t*set charm +1 \n\t\t*goto library2\n\n*label library2 \nYou are skimming through the book, trying to quickly find out the most important points and spend more time on them. Meanwhile, your partner is sitting patiently next to you and reading comics.\n\nHalf an hour later, ${she} suggests that it is probably time to move on. By that point, your eyes are a bit tired, so you put the book down and follow ${her2} out.\n*page_break\n*goto 19 \n\n*label bar \nThe bar is almost empty, save for a few patrons. The lights are dim and the quiet jazz music creates an intimate atmosphere. You let your partner choose a table \nand you sit down. \n\nA waitress comes immediately. It seems ${fallen_name} is quite familiar with the menu, so you let ${her2} pick a cocktail for you too.\n\nThe drinks come in a couple of minutes. $!{hers} has a straw, that ${she} needs to use in order to be able to drink without removing the mask. However, it seems that ${she} is so \nengulfed by the conversation with you that ${she} probably forgets ${she} is wearing it. The glass shatters in the metal, spilling the cocktail on the table and scratching ${her} palm.\n\n\"Are you okay?\" you ask ${her2}.\n\n\"Sure, it is not a big deal.\" ${fallen_name} covers ${her} palm with a napkin. \n\nMeanwhile, the waitress comes to clean the table.\n\nWhat do you do?\n*choice \n\t#Offer to try to heal ${fallen_name}\n\t\t*set heal +1 \n\t\tYou take ${her} hand and remove the napkin. Concentrating on the thought of ${her} flesh being renewed, your fingers trace around ${her} palm. In a few minutes, there \n\t\tis no trace left.\n\t\t\n\t\t\"Thank you, that was impressive,\" ${she} says. \"But I think we should go.\"\n\t\t*goto 19\n\t\t\n\t#Order ${her2} another drink \n\t\t*set charm +1 \n\t\tAfter the accident, you continue with the friendly banter, enjoying each other's company.\n\t\t\n\t\t\"I think it is time to go,\" ${she} says.\n\t\t*goto 19 \n\t\t\n*label arena \n${fallen_name} leads you to a hall with an octagon cage. About a dozen spectators are cheering as a couple of muscular fighters are engaged in an intense fight. One of them \ndelivers a couple of uppercuts, sending his rival to the floor. The referee waves his hands, a signal that the match is over.\n\n\"It seems that we are a bit late,\" you conclude.\n\n\"Not if we make the main event of the evening.\" $!{she} gives you a vicious smile. \n\n\"You can't possibly be talking serious, can you? Why would we decide to fight each other?\"\n\n\"Because we are warriors and this is what we often do,\" ${she} argues.\n\n\"Fight each other?\"\n\n\"Well, not really. There is a way to change the settings of the arena so that no serious wounds are delivered. I thought it might be fun to try.\"\n\nWhat would you say about it?\n*choice\n\t#\"Okay, let's do it.\" \n\t\tThe crowd cheers as you enter the cage. The referee checks your gloves and gives the starting signal. You approach each other cautiously, and the look in ${her} \n\t\teyes gives you the creeps. \n\t\t\n\t\tWhat would you do?\n\t\t*choice \n\t\t\t#Rely on your battle mastery \n\t\t\t\t${fallen_name} proves to be a skillful fighter, managing to control the fight by always staying out of your reach, except for the times when ${she} goes \n\t\t\t\tberserk.\n\t\t\t\t\n\t\t\t\t$!{she} manages to take you down to your knees, then ${her} hand locks around your neck, giving you no chance to escape. You tap out.\n\t\t\t\t\n\t\t\t\t\"That was a lot of fun. I bet you would ask for a rematch, but we need to go now,\" ${she} whispers in your ear.\n\t\t\t\t*set bm +1 \n\t\t\t\t*goto 19\n\t\t\t\n\t\t\t#Overload ${her} circuit to stun ${her2}\n\t\t\t\t*set co +1 \n\t\t\t\tYou are not sure how well it will go because ${she} is mostly organic, but you presume that the mask is still very important since ${she} never took it off.\n\n\t\t\t\tYou concentrate and send a strong electrical charge right at the mask. The result is instantaneous. $!{she} freezes and fall to the floor. You kneel next to ${her2} \n\t\t\t\tand give ${her2} a kiss on the forehead.\n\t\t\t\t\n\t\t\t\t\"I am not sure if that was fair, but I didn't want to hurt you.\"\n\t\t\t\t\n\t\t\t\tIn a few seconds, ${she} stands up. \"It is okay, you got me. Now, let's move on.\"\n\t\t\t\t*goto 19 \n\t\t\t\t\n\t\t\t#Go for an acrobatic stunt \n\t\t\t\tYou allow ${her2} to take the initiative as you step back towards the cage. Then, you simulate a counter attack in order to destruct her and jump back. As soon as \n\t\t\t\tyour foot hits the cage you spring forward and land behind ${her2}, which allows you to lock your hands around ${her} neck. She tries to escape but fails and immediately\n\t\t\t\ttaps. \n\t\t\t\t\n\t\t\t\t\"That was a bit unexpected,\" ${she} says as ${she} congratulates you for the win. \"Now, let's move on.\"\n\t\t\t\t*set athletics +1 \n\t\t\t\t*goto 19 \n\t\t\t\t\n\t\t\t#Try a throw \n\t\t\t\t$!{she} manages to connect quite a few blows to you before you get your hands on ${her} belt, then you lift her as if she weighs no more \n\t\t\t\tthan a couple of kilograms. \n\t\t\t\t\n\t\t\t\tYou deliberately balance her up in the air for a few seconds in order to give ${her2} time to tap out, which she does.\n\t\t\t\t\n\t\t\t\tYou gently return her to the ground.\n\t\t\t\t\n\t\t\t\t\"That was awesome,\" ${she} says as ${she} congratulates you for the win. \"Now, let's move on.\"\n\t\t\t\t*set strength +1 \n\t\t\t\t*goto 19 \n\t\t\t\n\t\t\t#Attempt to tire your \"opponent\"\n\t\t\t\tThis tactic proves to be quite ineffective as ${she} is very mobile and manages to deliver quite a few blows. However, your appear to be \n\t\t\t\tvirtually unaffected.\n\n\t\t\t\t\"Let's agree on a draw, we don't have a whole day,\" she offers and you happily agree. \n\t\t\t\t*set resistance +1 \n\t\t\t\t*goto 19 \n\t\t\t\n\t\t\t#\"I prefer to try to heal that guy.\"\n\t\t\t\t\"Okay, let's do it,\" ${she} says and follows you as you go next to ring and join the healer in the effort to help the fighter who lost recover. \n\t\t\n\t\t\t\tYou learn quite a lot from the medic, but the procedure takes some time and when the wrestler is on his feet, ${fallen_name} announces it is time to go.\n\t\t\t\t*set heal +1\n\t\t\t\t*goto 19 \t\t\t\n\t\t\t\n\t\t\t\n\t\t\t\t\n\t#\"There is no way I am fighting you!\"\n\t\tThe look she gives you can make even a rock melt.\n\t\t*set love +10 \n\t\t(Love++++)\n\t\t*goto 19 \n*label 20 \n*page_break\n\"Now is the time to make your choice, dear one,\" ${fallen_name}. \"Let's return to the lobby and you shall enter the door of the aspect that will be the base of the image of me that will \nbe with you throughout the rest of the story. Will I be the angry black aspect, who will wield twin daggers with mastery unseen by most and use the wisdom and power of runes?\nOr will you fall for the cold beauty of the white aspect, the angel of harmony and self control? I bet you are also considering engaging with the red fire of the pillar of humanity, the bane \nand mistress of machines. Or will it be me... the blue one, the one who's mission is to integrate human and machine, to bring out the best of the artificial. Follow your \nheart and make your choice.\"\n\nHow would you reply?\n*choice \n\t#\"I am ready to make my choice.\"\n\t\t*goto 203 \n\t\t\n\t#\"I want to know how my decision will affect your abilities.\"\n\t\t*goto 202\n\t\t\n*label 202 \n\"Sure, I should have thought about it earlier.\"\n\t\t\nShe takes out four cards with beautiful drawings of the four aspects of hers and hands them to you. There are skills and numbers next to each of them.\n*goto 205 \n\n*label 205 \t\t\nYou take a look at...\n*choice \n\t#The white one\n\t\tHacking 2\n\t\tLockpicking 3 \n\t\tVibrodagger wielding 1 \n\t\tRobotics control 3\n\t\tRe-engineering 3\n\t\tRunemastery 1  \n\t\tSelf-control 4\n\t\tIntuition 3 \n\t\t\t\t\n\t\tIs the white aspect the one you choose?\n\t\t*choice \n\t\t\t#Yes\n\t\t\t\t*set white true \n\t\t\t\t*set hacking 2 \n\t\t\t\t*set lockpicking 3  \n\t\t\t\t*set vibro 1  \n\t\t\t\t*set control 3 \n\t\t\t\t*set reingineering 3 \t\t\t\t\n\t\t\t\t*set runemastery 1  \n\t\t\t\t*set selfcontrol 4  \n\t\t\t\t*set intuition 3  \n\t\t\t\t*goto 21 \n\t\t\t\t\n\t\t\t\n\t\t\t#No, I would like to see the other cards \n\t\t\t\t*goto 205 \n\t\t\t\t\n\t#The black one \n\t\tHacking 3\n\t\tLockpicking 4 \n\t\tVibrodagger wielding 4 \n\t\tRobotics control 1\n\t\tRe-engineering 1\n\t\tRunemastery 4  \n\t\tSelf-control 1\n\t\tIntuition 2 \n\t\t\t\t\n\t\tIs the black aspect the one you choose?\n\t\t*choice \n\t\t\t#Yes\n\t\t\t\t*set black true \n\t\t\t\t*set hacking 3 \n\t\t\t\t*set lockpicking 4  \n\t\t\t\t*set vibro 4  \n\t\t\t\t*set control 1 \n\t\t\t\t*set reingineering 1 \t\t\t\t\n\t\t\t\t*set runemastery 4  \n\t\t\t\t*set selfcontrol 1  \n\t\t\t\t*set intuition 2  \n\t\t\t\t*goto 21 \n\t\t\t\t\n\t\t\t\n\t\t\t#No, I would like to see the other cards \n\t\t\t\t*goto 205 \t\t\t\n\t#The red one \n\t\tHacking 3\n\t\tLockpicking 2 \n\t\tVibrodagger wielding 2 \n\t\tRobotics control 4\n\t\tRe-engineering 1\n\t\tRunemastery 3  \n\t\tSelf-control 3\n\t\tIntuition 4 \n\t\t\t\t\n\t\tIs the red aspect the one you choose?\n\t\t*choice \n\t\t\t#Yes\n\t\t\t\t*set red true \n\t\t\t\t*set hacking 3 \n\t\t\t\t*set lockpicking 2  \n\t\t\t\t*set vibro 2 \n\t\t\t\t*set control 4 \n\t\t\t\t*set reingineering 1 \t\t\t\t\n\t\t\t\t*set runemastery 3  \n\t\t\t\t*set selfcontrol 3  \n\t\t\t\t*set intuition 4  \n\t\t\t\t*goto 21 \n\t\t\t\t\n\t\t\t\n\t\t\t#No, I would like to see the other cards \n\t\t\t\t*goto 205 \t\t\t\n\t\n\t#The blue one \n\t\tHacking 4\n\t\tLockpicking 2 \n\t\tVibrodagger wielding 3 \n\t\tRobotics control 3\n\t\tRe-engineering 4\n\t\tRunemastery 2  \n\t\tSelf-control 2\n\t\tIntuition 2 \n\t\t\t\t\n\t\tIs the blue aspect the one you choose?\n\t\t*choice \n\t\t\t#Yes\n\t\t\t\t*set blue true \n\t\t\t\t*set hacking 4 \n\t\t\t\t*set lockpicking 2  \n\t\t\t\t*set vibro 3  \n\t\t\t\t*set control 3 \n\t\t\t\t*set reingineering 4 \t\t\t\t\n\t\t\t\t*set runemastery 2  \n\t\t\t\t*set selfcontrol 2  \n\t\t\t\t*set intuition 2  \n\t\t\t\t*goto 21 \n\t\t\t\t\n\t\t\t\n\t\t\t#No, I would like to see the other cards \n\t\t\t\t*goto 205 \t\t\n\t\t\n\t\t\n*label 203 \n*page_break\n$!{she} takes your hand and silently leads you to the lobby. Then, ${she} leaves.\n\nWhat would your decision be?\n*choice \n\t#The white one \n\t\t*set white true \n\t\t*goto 21 \n\t\t\n\t#The black one \n\t\t*set black true \n\t\t*goto 21 \n\t\t\n\t#The red one \n\t\t*set red true \n\t\t*goto 21 \n\t\t\n\t#The blue one \n\t\t*set blue true \n\t\t*goto 21 \n\t\t\n*label 21 \nYour hand rest on the handle of the door of your choice, but as soon as you try to open it, it turns out it us locked.\n\nAt that moment, ${fallen_name} returns. \"I see that you made your choice, now you can witness my transformation. First, the mask should fall...\"\n\n$!{she} takes it down with a brisk move, revealing beautiful lips twisted in an expression of pain.\n\n\"...I am taking those gorgeous wings of the white aspect, they are important for the journey ahead.\"\n\nThey make their way out of ${her} costume and spread widely. Then ${she} produces a velvet shawl and puts it on ${her} eyes for a few seconds before removing it.\n\n\"I want the vision of the red too. In some cases it is so much better. And finally, let's not forget the black.\"\n\n$!{she} takes out a red marker and draws a rune on ${her} face. \n\n\"Now I am finished, now I am whole. The question is what do you do with me?\n*if (love>65)\n\tYou already showed me a lot of love and I am grateful to you.\n\t*if white \n\t\t*if (anger\u003c50)\n\t\t\t*goto 22\n\t\t\t\n\t\t*else \n\t\t\t*goto 23 \n\t\t\t\n\t*elseif black \n\t\t*if (anger>50)\n\t\t\t*goto 22 \n\t\t\n\t\t*else \n\t\t\t*goto 23 \n\t\t\t\n\t*elseif red \n\t\t*if (humanity>50)\n\t\t\t*goto 22 \n\t\t\t\n\t\t*else \n\t\t\t*goto 23 \n\t\t\t\n\t*else\n\t\t*if (humanity\u003c50)\n\t\t\t*goto 22 \n\t\t\t\n\t\t*else \n\t\t\t*goto 23 \n\t\t\t\n*else \n\tI see fear in your eyes. Well, I hope that you will learn to trust me more.\"\n\t\n*label 22 \nI also like how I see my perceptions of the world reflected upon you. It is true that we are partners on a soul level, but I have rarely fallen so deep for you.\"\n\n$!{her} hands perch on the back of your neck and ${she} gently pulls you closer as ${her} soft lips land on yours. Together, the both sets start a slow but very delightful dance. Your \nheart seems to be trying to carry the passion of the moment that is so sweet that you almost forget to breathe.\n\nWould would you do?\n*choice\n\t#I give up to the urge!\n\t\t*goto 221\n\t\t\n\t#I decide to step away from ${her2}\n\t\t*goto 24\n\t\t\n*label 221\n$!{she} pulls away from a second to bathe into your eyes. \"Want me and I will be yours. Do I see the flames of desire in your eyes?\"\n\n\"They feel like a conflagration fueled by the love and lust of thousands of years.\"\n\n\"Then you are remembering. Let the inferno begin.\"\n\nYou gently push ${her2} on the table and your lips make their way down.\n*achieve hot \n*page_break\nAfter the journey to the heaven in each other is over, you get up tired and happy, but unwilling to let ${her} hand go.\n\n\"Please, don't tell me it is time for this dream to end,\" you beg.\n\n\"There is one more event to attend and this time it is a dream of mine I am fulfilling.\"\n*goto 24 \n\n*label 23 \nHowever, we still don't see eye to eye with you on some fundamental topics. There is some resistance that I feel that makes it a bit hard for me to get back \nto the old days when we were one.\"\n\n\"I am sorry,\" you say, not sure if you really are.\n\n\"There is nothing to be sorry about. We laid the foundations of a beautiful story. Now, I suggest we attend the last event for tonight. This time it is a dream of mine \nI am fulfilling.\"\n*goto 24 \n\n*label 24 \n*page_break\n${fallen_name} takes you to a small concert hall. It is already full of excited fans who are screaming and wooing.\n\n\"The name of the band is Sickle and they rock. I came across an album of theirs at a time when they had retired and I never had an incarnation during the \ntime when they were active, so I decided to treat myself, using my rights as a designer of this temporary pocket realm.\" $!{she} gives you a wink.\n\n\"Well, I am happy to see you have some fun and I hope I like them too,\" you remark.\n\n\"Tastes in music tend to be very incarnation specific, it is hard for me to predict whether you will like them or not, but I certainly hope so.\"\n\nThree men dressed in black leather costumes appear on stage. They have helmets on, and you start wondering whether they don't have implants right into their \nbrains, just like the blue aspect of ${fallen_name} had. The rock they perform is quite hard and they manage to pump the adrenaline of the audience. Your partner \nseems to be enjoying herself to the fullest.\n\nAfter the third song, the music stops and the frontman says: \"You were great, guys, it was such a great fun to perform for you tonight, but we are a bit busy and have to go now.\"\nHe disregards the boos from the audience. \"I just want to ask the one who invited us here, ${fallen_name} and ${her} partner backstage to give them proper thanks.\"\n\n${fallen_name} screams and raises ${her} hands, then ${she} holds one of yours while pushing ${her} way to the stage and behind it.\n\nAnd then the frontman violently pushes you into a room, gets into it, waits for the other two band members to come and locks the door.\n*page_break\n\"${fallen_name}, it is time to pay for your sins,\" the frontman says.\n\n\"What are you talking about?\" ${she} asks.\n\n\"You betrayed the AI Empire and you no longer have a place among us. The Great Mind demands that you be taken out.\"\n\nSuddenly, the door flies inside and a couple of guards enter the room. The musicians start firing small fireball at them, and the guards retaliate by shooting.\nA few seconds later, two of the band members are on the floor, heavily wounded, one of the guards appears to be dead and the other seems to have been so badly burnt that \nhe can hardly be of much help.\n\nIt seems to be the perfect time to act.\n*choice \n\t*selectable_if (res>4) #Resurrect the dead guard \n\t\tThe guard starts moving again. He seems pretty weak, but manages to get the gun up and shoot the last musician standing on his feet.\n\t\t*set res +1\n\t\t*goto 25 \n\t*selectable_if (charm>3) #Charm the remaining band member \n\t\tYou look at the place where the eyes of the remaining band member are. Somehow, you know he is going to try to kill your partner. He raises his hand, but it \n\t\tshakes too much. Unable to produce a fire ball, he flees from the room.\n\t\t*set charm +1\n\t\t*goto 25 \n\t\t\n\t*selectable_if (heal>2) #Heal the burned guard \n\t\tYou concentrate on the burnt hand of the guard and it regenerates in seconds. He manages to get the gun up and shoot the last musician standing on his feet.\n\t\t*set heal +1 \n\t\t*goto 25 \n\t\t\n\t*selectable_if (bm>2) #Attack the remaining band member with your sword \n\t\tYou can almost feel your sword begging you to let it see some action. As soon as your hand is on the handle, there is no coming back. You charge and slay the remaining \n\t\tband member.\n\t\t*set bm +2 \n\t\t*goto 25 \n\t\t\n\t*selectable_if (co>2) #Overload his circuits \n\t\tYou gamble that there is a cybernetic element in that man that is so important to his functioning that disabling it would be a major blow to him... and win. He falls \n\t\ton the floor, unable to move.\n\t\t*set co +2 \n\t\t*goto 25 \n\t\t\n\t#Do nothing \n\t\tWhile you are wondering what to do, three more guards enter the room and engage in a battle of bullets and fireballs...\n\t\t*goto 25\n\n*label 25 \n*page_break\n${fallen_name} rushes out and you follow ${her2}. \n\n\"Stop,\" you shout. \"You are fading out... like turning into a ghost.\"\n\n$!{she} halts and turns around to face you. \"The dream is ending. Don't worry, soon you will wake up and return to your normal daily life.\"\n\n\"But what about you? I don't want to lose you,\" you beg and hold ${her} hands.\n\n\"You never had and never will. You will find me soon, but even that short period may feel like eternity. But love will always find the trails to the other.\"\n\n$!{she} just disintegrates and you choose to escape the sorrow by waking up.\n*goto_scene police ", "ending": "*page_break End\nWe hope you've enjoyed playing [i]AI -- Aftermath[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "masquarade": "${fallen_name} sees that you are scanning her place and smiles. \"You can take a closer look and thus learn more about me, don't be shy.\"\n\n\"Do I really look a shy one?\" you ask. \n\n\"I wouldn't say so, actually.\"\n*goto cache \n\n*label cache\n*page_break \nWhat do you want to examine closer?\n*choice \n\t*hide_reuse #The small gadget on the table \n\t\tYou take it in your hand. \"What is it?\"\n\t\t\n\t\t\"Her name is Claudia and she is my best friends when it comes to making my way into a firewalled electronic system.\"\n\t\t\n\t\t\"She has a name?\" you wonder.\n\t\t\n\t\t\"Sure, but not only a name, she has a complete personality. Sometimes she can be sassy, though, so I am not sure how good that is.\" $!{she} laughs.\n\t\t\"I am kidding, I really love her. Would you like to meet her?\"\n\t\t\n\t\t\"She is more than a program, right, an AI?\"\n\t\t\n\t\t$!{fallen_name} nods.\n\t\t\n\t\tWhat would you answer?\n\t\t*choice \n\t\t\t#Sure, I would love to meet your AI friend\n\t\t\t\t*set love +3 \n\t\t\t\t*set humanity -3\n\t\t\t\t(Love+;AI+)\n\t\t\t\t\"Oh, that is so sweet of you,\" {she} says.\n\t\t\t\t*goto claudia\n\t\t\t\t\t\n\t\t\t#Sure, but I would prefer to meet your real human ones \n\t\t\t\t*set love +3\n\t\t\t\t*set humanity +3\n\t\t\t\t(Love+, Humanity+)\n\t\t\t\t\n\t\t\t\t\"Oh, come on,\" $!{fallen_name} remarks. \"She is my friend nevertheless. I must say that she has been with me for so long and saved my ass \n\t\t\t\tso many times that I can't really say that I have somebody closer to my heart... Until now, I mean.\"\n\t\t\t\t\n\t\t\t\t\"Well, it seems I should contest her for a place in your heart?\" you laugh.\n\t\t\t\t\n\t\t\t\t\"Is that jealousy I sense there?\"\n\t\t\t\t\n\t\t\t\t\"Maybe I should have covered it better,\" you reply.\n\t\t\t\t\n\t\t\t\t\"I don't think you need to cover anything, just be open with me and everything will be alright. Do you think you can do that?\"\n\t\t\t\t\n\t\t\t\tYou nod. \"I will do my best,\" you promise.\n\t\t\t\t\n\t\t\t\t\"I can assure you that despite the hardships I have gone through, my heart is big enough for both of you.\"\n\t\t\t\t*goto claudia \n\t\t\t\t\n\t\t\t#No, I don't actually think it is right to call an AI a friend \n\t\t\t\t*set humanity +3\n\t\t\t\t*set love -3\n\t\t\t\t(Humanity+, Fear+)\n\t\t\t\t\n\t\t\t\t\"Come on, why would you say so?\" ${she} asks with a tone that implies that ${she} is insulted.\n\t\t\t\t\n\t\t\t\t\"Because AIs were never supposed to replace the warmth of the contact between humans. The fact that you consider her a friend \n\t\t\t\tprobably speaks of some trauma you are trying to cover up.\"\n\t\t\t\t\n\t\t\t\t\"Oh, and now you are going to put a diagnosis on me, right?\" ${she} snaps back.\n\t\t\t\t\n\t\t\t\t\"I am sorry, I didn't mean to say anything bad or out of place. But I have the feeling I just touched the trauma I mentioned.\"\n\t\t\t\t\n\t\t\t\t$!{she} sighs. \"You may be right. I am sorry I nibbled at you. And, maybe it is really that humans lost the warmth for each other that \n\t\t\t\tthey desperately needed to feel that and so they designed AIs that could fill that void. But it is not really their fault that the problem was there.\"\n\t\t\t\t\n\t\t\t\t\"I guess it would be hard for me not to agree with that logic,\" you admit.\n\t\t\t\t*goto cache \n\t\t\t\t\n\t\t\t#No, I am sorry, I don't think the way you are treating her is right for her  \n\t\t\t\t*set humanity -3 \n\t\t\t\t*set love -3 \n\t\t\t\t(AI+, Fear+)\n\t\t\t\t\n\t\t\t\t\"I am not sure what you are talking about,\" ${she} says.\n\t\t\t\t\n\t\t\t\t\"You call her a friend, but it is obvious to me that you are actually exploiting her,\" you explain.\n\t\t\t\t\n\t\t\t\t\"And how did you come up with that conclusion?\"\n\t\t\t\t\n\t\t\t\t\"It seems pretty obvious to me. What if she is just a tool you use in order to get what you want and your ego masks that as love?\"\n\t\t\t\t\n\t\t\t\t$!{she} raises her palms in front of her chest. \"I would suggest changing the topic and never going back to this one, if that is okay with you.\"\n\t\t\t\t\n\t\t\t\tYou nod.\n\t\t\t\t*goto cache \n\t\t\t\t\n\t*hide_reuse #The corner with a mat and candles \n\t\t\"That looks a bit... spiritual,\" you say as you approach the corner.\n\t\t\n\t\t\"Yeah, this is where I meditate in order to release some of the stress I am often under and get insights on how to proceed. I love \n\t\tlighting the candles and I sometimes even burn some incense sticks. Unfortunately, I ran out of it a few days ago and I couldn't get myself to buy new ones.\"\n\t\t\n\t\t\"Is there any special meaning behind the two candles?\" you ask.\n\t\t\n\t\t$!{she} smiles and avoids eye-contact in a very cute and shy way. \"The twin flames remind me of us. Before you came into my life, I only knew you from \n\t\tmy meditations that would lead to past-life memories and meeting other people from our star family. Like the woman you consider your soul mentor, who could \n\t\tprobably be mine too. I sometimes feel her guiding presence. Anyway, would you like to join me in a meditation?\"\n\t\t\n\t\tWhat would you reply?\n\t\t*choice \n\t\t\t#\"Yes, please.\"\n\t\t\t\t*set selfcontrol +1 \n\t\t\t\t\n\t\t\t\t\"I am sure it will be a lot of fun,\" ${fallen_name} says and adjusts the mat so that both of you can sit on it. \"Can you do \n\t\t\t\tthe lotus position?\" ${she} asks while gracefully demonstrating that she can.\n\t\t\t\t\n\t\t\t\t*if (athletics>3)\n\t\t\t\t\t\"Sure,\" you reply and follow ${her} example with equal easy, much to her dismay. \n\n\t\t\t\t\t\"I could bet that you do that all the time,\" ${she} remarks.\n\t\t\t\t\t\n\t\t\t\t\t\"That and much more,\" you wink.\n\t\t\t\t\t*goto meditate\n\t\t\t\t\t\n\t\t\t\t*else \n\t\t\t\t\t\"I am sorry, I am not good at it,\" you admit.\n\t\t\t\t\t\n\t\t\t\t\t\"That is okay, it is not a requirement. Sometimes when I am tired I would just lie in bed while meditating, but I found out that it is \n\t\t\t\t\ta bit easier for me to concentrate in the lotus position.\"\n\t\t\t\t\t*goto meditate \n\t\t\t\n\t\t\t#\"Maybe another time.\"\n\t\t\t\t\"Yeah, I guess we should concentrate on more important tasks that lay ahead. It is just so tempting to examine a way to connect to you better.\"\n\t\t\t\t\n\t\t\t\t\"I am sure we will have plenty of various opportunities to do that,\" you reply.\n\t\t\t\t\n\t\t\t\tShe nods.\n\t\t\t\t*goto cache\n\t\t\t#\"I am not really into meditations.\"\n\t\t\t\t*set love -2\n\t\t\t\t(Fear+)\n\t\t\t\t\n\t\t\t\t\"Oh, come on, I can teach you,\" ${she} insists. \"It is very easy once you manage to relax and let go of the reality that surrounds you. It can be a lot of fun too.\"\n\t\t\t\t\n\t\t\t\t\"No, I am not really interested, but thank you for the kind offer,\" you reply.\n\t\t\t\t\n\t\t\t\t${she} looks a bit disappointed.\n\t\t\t\t*goto cache\n\t\t\n\t\n\t*hide_reuse #The colorful album on the bookcase \n\t\t\"It doesn't look like an album of kid drawings,\" you remark as you pick the album.\n\t\t\n\t\t\"No, it is definitely not a joke,\" she replies. \"I have some vague memory that the black aspect of mine gave you an explanation of how runes work.\"\n\t\t\n\t\t\"Yeah, she did. She was quite a haunted character. I am so happy I see so much light in you,\" you say. \n\t\t\n\t\t\"Well, I still feel her in me,\" ${fallen_name} says. \"Her pain is my pain too and the burden of her choices will always weigh on me. On the other hand,\n\t\tit is a good way for me to understand what happens when one hold on to anger and pain. It is a very sad place of unlimited fear and darkness.\"\n\t\t\n\t\t\"I am sorry for bringing that memories to you,\" you say frankly.\n\t\t\n\t\t$!{she} shrugs. \"The world can be a cruel place. It is not your fault. You didn't design it that way. We just had to live here and do what we can to \n\t\tpreserve the light that is our light by creation. Some aspects manage to do that better than others. The black one clearly failed, but in that failure ${she} brought incredible \n\t\twisdom and experience to my soul.\"\n\t\t\n\t\tSuddenly, you don't feel like going through the album any more.\n\t\t*goto cache \n\t\t\n\t*hide_reuse #The android toy on the bed \n\t\t\"This is something about me that you may find a bit goofy,\" ${fallen_name} explains. \"I guess it has something to do with my inner child.\"\n\t\t\n\t\t\"It is much more than a toy, right?\" you enquire.\n\t\t\n\t\t\"As a matter of fact it was a Troyan horse. It looks very innocent. To me, it is the ideal gift to a child, probably the best after a classical teddy bear. Who could \n\t\tbelieve that it is actually the biggest threat to any informations system you can think of.\"\n\t\t\n\t\t\"No way?\" you take it in your hands and examine it closely. \"How did it work?\"\n\t\t\n\t\t\"It would make sure everybody is asleep before activating its sensors to locate the nearest jacking point. Then it would release a really nasty virus.\"\n\t\t\n\t\t\"What did you do with it?\" you ask.\n\t\t\n\t\t\"I reprogrammed it to assist me with simple tasks to improve my quality of life, especially in the early morning hours when a significant part of my \n\t\tbrain is still unable to leave dreamland.\"\n\t\t\n\t\t\"And how do you activate it?\" You try your best to see a switch-on button.\n\t\t\n\t\t\"I just use my mind,\" she answers. \"Care for a cup of coffee?\"\n\t\t\n\t\t\"Decaffeinated, no sugar, please.\"\n\t\t\n\t\t\"You really don't drink coffee, right?\"\n\t\t\n\t\t\"Yeah, I rarely do, I guess I just want to see that little fellow in action. But how do you know?\"\n\t\t\n\t\t\"No coffee lover talks like that. Ever.\" She laughs.\n\t\t*page_break\n\t\tYou have a lot of fun as the little robot carries out the request and finally serves you a steaming cup of aromatic coffee. \n\t\t\n\t\t\"Thank you. Why don't you drink with me? There is quite a lot left in the pot?\" you ask ${her}.\n\t\t\n\t\t\"Decaffeinated? Never!\" ${she} laughs.\n\t\t*set control +1\n\t\t*goto cache \n\t\t\n\t*hide_reuse #The dagger on the table \n\t\t\"I am not sure I would touch it if I were you,\" ${fallen_name} says as your fingers are almost on.\n\t\t\n\t\t\"Why, what will happen?\" you wonder.\n\t\t\n\t\t\"Well, with the advancements in prosthetics probably nothing that can't be fixed but there will be lots of pain and blood.\"\n\t\t\n\t\tYou cough and move your hand away from it. She goes to the table and picks it up. \n\t\t\n\t\t\"This is the latest generation of vibro dagger. Its frequency is so high that you can't visibly tell when it is on. No sound lets it out. The \n\t\tsecurity system is so nasty that even I am sometimes afraid for my fingers when I touch it. Well, in my case I can effectively control it before it really goes crazy and removes my \n\t\tfingers, but it is still not fun to be on the wrong side of that deadly melee weapon.\"\n\t\t\n\t\t\"The description you have makes my Hatari seem like a pocket knife,\" you remark and take out the grip, allowing your psionic powers \n\t\tto  display a beautiful glowing blade.\n\t\t\n\t\t$!{fallen_name} shrugs. \"I sense that you can talk about your blade with the passion and dedication that I manifest towards mine. It is just different. I respect you and so I do \n\t\tyour weapon. Something tells me that very soon we will wield them in battle as we did in so many other lifetimes.\"\n\t\t*set vibro +1\n\t\t*goto cache \n\t\n\t*hide_reuse #The weird masterkey on the floor\n\t\t\"I guess you just dropped it,\" you say as you pick up the masterkey.\n\t\t\n\t\t\"Well, not exactly. It has a primitive artificial mind of its own and sometimes starts crawling around. It is a bit eccentric but I don't care as soon \n\t\tas it works.\"\n\t\t\n\t\t\"I am curious who still uses classical locks these days.\" You put it on the table as it starts moving in your hand.\n\t\t\n\t\t\"You will be surprised how often the great treasures are hidden behind plain locks. Probably the owners think that in the era of hacking something\n\t\tsimpler would provide them with better protection. I don't share that opinion,\" ${she} explains.\n\t\t\n\t\t\"Please, say no more, I work with the police.\"\n\t\t\n\t\t\"I have the feeling you have passed credentials at this point,\" ${she} points out and you silently agree.\n\t\t*set lockpicking +1 \n\t\t*goto cache \n\t\t\n\t*hide_reuse #The deck of cards on the nightstand.\n\t\t*set intuition +1\n\t\t\"What are those cards?\" you ask as you take the deck in your hands. The cards look very well taken care of.\n\t\t\n\t\t\"They are from a silly childish game. I had a neighbour who was a little girl and sometimes I would play with her. I know it sounds a bit strange \n\t\tfor a ${woman} in her 30s to play childish games but I really enjoyed the contact with her. There was some rough power in her that was like a phoenix, \n\t\tyou know, waiting to hatch and spread its wings and burn its way into the world. Her family had to move and she wanted me to have that deck as a reminder of her.\"\n\t\t\n\t\t\"Are you crying?\" you ask.\n\t\t\n\t\t$!{she} sighs. \"I guess there is no point in hiding that stuff from you. Sometimes I can be very emotional and I hope you are alright with it.\"\n\t\t\n\t\tHow do you feel about what she says?\n\t\t*choice \n\t\t\t#I think that it is in her best interest not to allow her emotions to take over \n\t\t\t\t\"We live in a world where being emotional is hardly an advantage,\" you say coldly.\n\t\t\t\t\n\t\t\t\t\"So you think that it is in my best interest to control myself better, even in front of you?\" ${she} asks wiping her tears.\n\t\t\t\t\n\t\t\t\t\"I didn't really mean to be rude. You know, sometimes messages are lost in translation,\" you try to explain.\n\t\t\t\t\n\t\t\t\t\"Yeah, I get that.\"\n\t\t\t\t*set independence -4 \n\t\t\t\t*set love -4\n\t\t\t\t(Dependence+, Fear+)\n\t\t\t\t*goto deck \n\t\t\t\n\t\t\t#I find it nice that she is allowing herself to show vulnerability in front of me \n\t\t\t\t\"Yes, of course,\" you assure ${her}. \"I know that emotions are what makes us human.\"\n\t\t\t\t\n\t\t\t\t\"Thank you,\" ${she} says while wiping her tears. \"There were people in my life that would often times criticise me \n\t\t\t\tfor being too emotional.\"\n\t\t\t\t\n\t\t\t\t\"Well, it seems I won't be joining them,\" you assure ${her2}, which allows you to steal a smile from ${her2}.\n\t\t\t\t*goto deck \n\t\n\t#Finish with the observations\n\t\t*goto leave \n\n*label claudia \n$!{fallen_name} connects the gadget to her personal digital assistant and you see a small figure of a female with pointed \nears delicately showing themselves from under a cloak.\n\n\"What do we hack, ${fallen_name}?\" she asks in a high-pitched voice.\n\n\"Nothing at the time, thank you, I just wanted to introduce you to my new friend.\" $!{she} smiles and looks at you. \n\n\"I didn't know you had friends,\" Claudia remarks.\n\n\"You got me here. I guess I am not very social, I guess,\" ${fallen_name} admits.\n\nClaudia fixes you with her glowing eyes. \"Hey, you, what is your name?\"\n\n\"$!{name},\" you answer, trying hard not to laugh at the attempts of hers to sound intimidating. \n*page_break\n\"Listen, $!{name}, if $!{fallen_name} considers you a friend, that makes you a pretty damn special individual. If you are not an AI, which \nwould be my educated guess, that would actually make you unique.\"\n\nYou can't help but blush. \"Thank you, Claudia, I am really honored to be ${her} friend.\"\n\nClaudia clears her throat. \"If I was in your shoes, I would make sure I never break ${her} heart of gold or hurt ${her2} in any way, or else I will find \nyour files. I will take your skeletons from your data banks and show them for the whole world to see, then I will delete everything that you hold dear. So, beware the cyber elf that I am!\"\n\nYou wait for a few seconds. \"Finished?\"\n\n\"Actually yes and thank you for listening to my speech. I think I don't need to consult my tarot card to tell that you are going to make ${her2} smile a lot. And we \ncan be great friends too, now that we have established things between us.\" She looks away in a very successful attempt of manifesting cuteness.\n\n\"Yeah, I think we can be great friends too, Claudia,\" you reply. \"I bet you don't have many friends, do you?\" you ask.\n\nShe shakes her head. \"Not really, but I don't mind because I have $!{fallen_name}.\"\n\n\"Aw, you can be so sweet sometimes,\" $!{fallen_name} exclaims.\n\n\"You didn't tell me about the tarot cards,\" you tell $!{fallen_name}.\n\n\"That is one of her specialities. She is really good but I guess we can leave her readings for another time.\"\n\n\"Sure. Oh, you know what I was thinking of, maybe if you show her to Agatha they will become friends too,\" you say.\n*page_break\n\"Hey, you two, I am still here and listening to you. Why do you talk as if I am offline?\" Claudia objects.\n\n\"I am sorry. We just mentioned somebody ${name} knows,\" $!{fallen_name} explains.\n\n\"Alright, so be it. You know, you two start to bore me. If there is nothing to hack, I would rather return to a stand-by mode,\" she says and \ndisappears. \n\n\"She really loves hacking but has a very short attention spam,\" ${fallen_name} says.\n\n\"I see,\" you reply.\n*goto cache \t\n\n*label meditate \n*set love +4 \n(Love+)\n\n\"Now, close your eyes and give me your hands. Breathe slowly and deeply,\" ${she} guides you.\n\nYou can't help but laugh.\n\n\"What is it?\" ${she} asks with wide open eyes.\n\n\"Do you realize how hard it is to breathe slowly when your heart is racing because I am holding your hand,\" you try to explain.\n\n\"You say that my heart is racing?\" ${she} asks.\n\n\"No, I mean that my heart is racing but I can feel yours too.\"\n\n\"Okay, let's forget about the breathing and continue with the meditation, right?\" ${she} suggests.\n\n\"So be it,\" you agree.\n*page_break\n\"Wow, that was the most intense exchange of energies I have ever experienced in meditation,\" ${fallen_name} exclaims a few minutes later.\n\"You totally blew my mind.\"\n\n\"I am just a psionicist.\" You shrug. \n\n\"Well, I understand that you are a very talented one,\" ${she} says. \"I also think much of what I experienced is due to the connection that we have.\"\n\n\"I must say that what I felt was amazing on my end too,\" you comment.\n*goto cache \n\n*label deck \n*page_break\n\"So, what do you do with those cards?\" you enquire. \n\n\"I would pick a card and try to use my intuition to guess what it is. It was never proved that intuition can actually be trained, so I don't \nknow if I am doing something sensible, but at least it is something that entertains my mind and helps me get through the loneliness.\"\n\nYou examine the cards. Unlike the traditional playing suits, there are ten suits of two cards.\n\nWould you like to ask ${her2} to show you how she is doing it?\n*choice \n\t#Yes \n\t\t\"Would you like to demonstrate how you do it?\" you ask.\n\t\t\n\t\t\"I don't know, I have never done that in front of anybody,\" ${she} blushes.\n\t\t\n\t\t\"I assure you there is nothing to worry about.\"\n\t\t\n\t\t$!{she} agrees and you actually have a lot of fun while watching her concentrate and come up with the suit of the cards. \n\t\t*goto cache \n\t\t\n\t#Yes, but I will try to help her intuition with your psionic abilities \n\t\t\"Would you like to demonstrate how you do it?\" you ask.\n\t\t\n\t\t\"I don't know, I have never done that in front of anybody,\" ${she} blushes.\n\t\t\n\t\t\"I assure you there is nothing to worry about.\"\n\t\t\n\t\t$!{she} agrees and you actually have a lot of fun while watching her concentrate and come up with the suit of the cards. \n\t\t\n\t\tThere is one time when ${she} starts feeling frustrated over failing three times and a row.\n\t\n\t\t\"Let me help you,\" you suggest and concentrate.\n\n\t\t\"It feels as if you are helping me concentrate... like you are pushing me towards the vision of the card,\" ${she} says.\n\t\t\n\t\t\"That is exactly my idea, dear one.\" You laugh.\n\t\t\n\t\tThings improve and ${she} actually manages to get the next five cards right.\n\t\t*set intuition +1 \n\t\t*goto cache \n\t\t\n\t#No, I had better make a better use of my time \n\t\t*goto cache \n\t\t\n*label leave \n\"I think it is time to go,\" you say to ${fallen_name}.\n\n\"I see. Well, it was pleasure for me to have you.\"\n\n\"I enjoyed it very much too. Which way is the exit?\" you ask.\n\n${fallen_name} laughs. \"There is no real exit to this pocket of reality.\"\n\n\"So, you are going to keep me forever here?\"\n\n$!{she} raises her eyebrow. \"Now that you say that, it actually sounds like a good idea. But I know that I am going to meet you again. Now that we've \nmet each other the lonely times are more or less over. Hey, I never asked you if you were going to help me with my task.\"\n\n\"I know very well what my mission here is. I have my memories of meeting my soul mentor and her sharing her belief that I can help you make a \ndifference to this world. I still have no idea how you are going to do this, but I will play along in best possible way.\"\n\n\"We will make it happen, together as one,\" ${she} says. \"I may be one step ahead and may lead the next step in this dance, but I am not going to be the boss, you \nwill be the one taking decisions too, I wanted to say that.\"\n\nYou nod. \"When will I see you again, and how.\"\n\n\"Hm, I bet it will be soon, but I am still not sure how. The telepathic link that we have can notify me when you want to meet me and I will be able to locate you. On \nthe other hand, I can give you a crystal that can teleport you to this location. I am a bit worried that this can be a little bit dangerous in case it falls into \nthe wrong hands, but on the other hand, I really wouldn't want to deny you access to my world. What do you think about it?\"\n*choice \n\t#I want to ask for the crystal\n\t\t*set crystal true \n\t\t\"I will have you on my mind, but I also want to be able to easily reach you. I promise to keep it in a safe place.\"\n\t\t\n\t\t\"I trust you,\" ${she} whispers and hands you a small pink quartz crystal. It feels warm to the touch, and when your fingers meet, they show no \n\t\tdesire to let go.\n\t\t\n\t\t\"Goodbye, my dear,\" you say while forcing yourself to look away from her eyes.\n\t\t\n\t\t\"Farewell,\" ${fallen_name} answers.\n\t\t\n\t\tYou close your eyes and let the crystal take you to your realm.\n\t\t*goto leave2 \n\t\t\n\t#I don't think that is necessary \n\t\t\"I know you are opening your heart to me,\" you say. \"There is no need for you to give me a token to stand for our connection. Besides, as \n\t\tmuch as I wan to be careful, I can't guarantee with absolute certainty that I will be able to keep it protected. I don't want anything bad to \n\t\thappen to you.\"\n\t\t\n\t\t\"Oh, you are so sweet,\" ${she} comes closer and gently touches your cheek for a brief moment. \n\t\t\n\t\t\"Goodbye, my dear,\" you say while forcing yourself to look away from her eyes.\n\t\t\n\t\t\"Farewell,\" ${fallen_name} answers.\n\t\t\n\t\tYou close your eyes and let the crystal take you to your realm.\n\t\t*goto leave2 \n\t\t\n\t\n\t\t\n*label leave2 \n*page_break\nYou get spat into the place that you occupied before you were taken to ${fallen_name}'s hiding place, however, now the sun is about to set. You \nhave the feeling that time there flies much quicker. \n\nAfter looking around and making sure nobody has noticed your sudden appearance, you decide to go to the nearest taxi station. You feel quite tired, mostly \nfrom the strong emotions related to everything that life has been throwing at you. At the same time, you are happy and full of hope, and you know that what you have \nbeen preparing for, probably in the course of many incarnations, is about to begin.\n*page_break\nYou wake up in the morning with the vague feeling that dreams took you to lush plains with glorious dragons and unicorns. As you wash your face with \ncold water and let the veil of sleep fade, you wonder about your next move.\n\nThe dream may actually be a hint for you to contact the fey woman. You are not sure how she is related to your mission, but meeting her at this time \nseems to be a sign from fate. Of course, you would like to take ${fallen_name} with you.\n\nAnother idea that comes to your mind is to go back to Nathaniel. Again, it seems better to meet him in the presence of your eternal partner. He told you \nthe ${her} wings are probably a sign that ${she} wanted to connect to the Angels of Mercy. A part of you regrets not doing that yesterday, since your \npoint of arrival into your realm was right in front of his dwelling place, but you know it was not the time.\n\nLast but not least, you shouldn't forget your responsibility to aiding the police. You guess you were not really expected to participate in solving the case\nthe way you did, so you may have to take a few interesting decisions when you get there.\n\nBut before that, would you like to go for a telepathic contact with my partner to ask her for your insights?\n*choice \n\t#Yes \n\t\t*set independence -4\n\t\t*set love +2 \n\t\t(Dependence++, Love+)\n\t\n\t\tYou think about ${her} and immediately you feel washed in soothing energy. \n\t\t\n\t\t\"It is nice to connect to you again,\" ${she}says and you can almost sense her smile\t.\n\t\t\n\t\t\"The pleasure is all mine,\" you reply. \"Did you have a good night's sleep?\"\n\t\t\n\t\t\"Well, I didn't get much of that, to be honest, but I don't need as much as humans without electronic upgrades. Also, I was busy working on extracting \n\t\tthe magic out of a cuber punk tarot deck and thinking about the clues hidden in the images. What about you?\"\n\t\t\n\t\t\"I don't remember much of my sleep, I was so tired that I drifted away the moment my hit the pillow. Right now I am considering what to do and I wanted \n\t\tto ask you for insights.\"\n\t\t\n\t\tYou briefly explain the options.\n\t\t\n\t\t\"I must admit that I love the fact that you decided to contact me on that. You know, I will contact Claudia, my AI assistant and see what her oracle card \n\t\tsoftware can pull out of her deck, if you would give her permission,\" ${she} explains.\n\t\t\n\t\t\"Sure, you can use whatever tool you need, and thank you in advance.\"\n\t\t\n\t\tYou can feel ${her2} concentrating.\n\t\t\n\t\t*if intuition>2 \n\t\t\t\"I strongly get that it is risky to go back to the police station, although I am not sure why. Nathaniel can potentially be of great help where we are heading to, and \n\t\t\tthe fairy world is where our major challenge will be. This is what the cards show.\"\n\n\t\t\t\"Thank you very much for the insights.\"\n\t\t\t\n\t\t\t\"You are very welcome,\" ${fallen_name} says.\n\t\t\t*goto leave3\n\t\t\t\n\t\t*else \n\t\t\t\"I am sorry, the cards Claudia pulled make very little sense to me. I would say that it doesn't really matter which task you decide to work on, but I guess \n\t\t\tit is not much of a help for you,\" ${fallen_name} says.\n\t\t\t\n\t\t\t\"Well, this is still a useful piece of information, right? Thank you very much.\"\n\t\t\t\n\t\t\t\"I don't know, really, and there is nothing to thank me for.\"\n\t\t\t*goto leave3 \n\t\n\t#Yes, I want to make a contact but I am not interested in the insights \n\t\t*set independence +5 \n\t\t*set love +2\n\t\t(Independence++, Love+)\n\t\t\n\t\tYou think about ${her} and immediately you feel washed in soothing energy. \n\t\t\n\t\t\"It is nice to connect to you again,\" ${she}says and you can almost sense her smile\t.\n\t\t\n\t\t\"The pleasure is all mine,\" you reply. \"Did you have a good night's sleep?\"\n\t\t\n\t\t\"Well, I didn't get much of that, to be honest, but I don't need as much as humans without electronic upgrades. Also, I was busy working on extracting \n\t\tthe magic out of a cuber punk tarot deck and thinking about the clues hidden in the images. What about you?\"\n\t\t\n\t\t\"I don't remember much of my sleep, I was so tired that I drifted away the moment my hit the pillow. Right now I am considering what to do next and I decided that \n\t\tI could give my mind some time to settle while feeding it with your positive energy.\"\n\t\t\n\t\t\"Your words melt me,\" ${she} says.\n\t\t*goto leave3\n\t\t\n\t#No\n\t\t*set independence +5 \n\t\t*set love -2 \n\t\t(Independence+, Fear+)\n\t\t*goto leave3 \n\n*label leave3\n*page_break\nWhat would you choose now?\n*choice \n\t*hide_reuse #I want to go to the police department \n\t\t*goto policed\n\t\n\t*hide_reuse #I want to send a telepathic signal to my partner and meet Nathaniel\n\t\t*goto nathaniel \n\t\n\t#I want to meet Agatha \n\t\t*goto agatha\n\t\t\n\t\t\n\t\t\n*label nathaniel\n\"I would suggest going to see Nathaniel,\" you wrap your thought in a psionic seal and send it ${fallen_name}'s way.\n\n\"That is actually a very good idea,\" ${she} replies immediately. \"I have been thinking about it for a long time, actually. To be honest, when you saw me on top of the \nGothic building, I was going to approach him, but then I saw you.\" $!{she} laughs. \"I got distracted.\"\n\n\"Oh, I am sorry,\" you reply. \"I hope we can do that now together, or I may wait in front if you want to meet him in private.\"\n\n\"Not at all. You know, Claudia's readings were always telling me to wait before talking to him, but she never managed to explain why. My impatience took \nthe best of me. And then I met you.\"\n\nYou feel that she can tell you more about her motives to seek an audience with Nathaniel, or how ${she} thinks he can be useful for her mission, but ${she} \njust wants to jump into the moment when you visit him. \n\nSo, the choice is yours.\n*goto nathaniel2\n\n*label nathaniel2 \nWhat would you enquire?\n*choice \n\t*hide_reuse #I want to ask about her personal reasons for seeking the angel\n\t\t${fallen_name} sighs. \"You know that my white aspect has bionic angel wings,\" ${she} reminds you. \"To be honest, there is something about ${her2} \n\t\tthat doesn't give me peace, which is ironic since it was exactly peace that ${she} was seeking. On the surface, ${she} probably looked very composed and \n\t\tfilled with deeper understanding of what is happening around her. At the same time, there is this very deep sense of apathy regarding what is happening around her, as \n\t\tif the warrior perspective of my souls was abandoned. It is so sad to see somebody who is supposed to be fighting to make the world... and I mean any world I am involved with a better place \n\t\tjust let go with the flow. To me it is a sign of brokenness that was not healed.\"\n\t\t\n\t\t\"Is this why you decided to install the wings?\" you ask.\n\t\t\n\t\t\"Yes, it took me a while to find a pair, you know they are not into mass production. It was also very hard for me to persuade Claudia that I knew what I was doing.\n\t\tI also meditated a lot trying to connect to the mentality of the white aspect.\"\n\t\t\n\t\t\"Hm, did you really know what you were doing?\"\n\t\t\n\t\t\"To be honest, no. I just followed my intuition,\" ${she} admits. \"But I can't say I am sorry.\"\n\t\t\n\t\t\"Did they have any effect on you at all?\"\n\t\t\n\t\t\"Yeah, I can certainly say so. I got closer to obtaining what I would call an angelic vision, which is the aptitude of seeing the best in the people \n\t\taround you. I was also able to control my emotions better and even understood more about how the link between human and AI works. I think it was a useful exercise.\"\n\t\t\n\t\t\"But this is not exactly what you were looking for?\" you ask.\n\t\t\n\t\t\"Not really, but I hope that will change after we visit Nathaniel.\"\n\t\t*goto nathaniel2\n\t\t\n\t*hide_reuse #I am curious how he could help her mission \n\t\t\"What did he tell you about himself when you met him?\" ${she} asks back.\n\t\t\n\t\t\"Something about himself being all about transcending beyond the duality of good and evil and that his organization was supposed to oversee and \n\t\tfacilitate the process.\"\n\t\t\n\t\t\"This is pretty much in line with what I have learned about him. You see, the duality between human and AI is the new way to restate the conflict \n\t\tbetween good and evil. Of course, I wouldn't want to say that all humans are good, or that AIs can only bring negativity to our lives, just as before, \n\t\tthere are so many gray areas to explore. My mission is related to his. What I want is to bring the harmony that was achieved and remained for long in the \n\t\tmagical realms to the situation we have now. Does that make sense to you?\"\n\t\t\n\t\tYou take a pause to think about it. \"It is a bit of an abstract concept, but I think I have to agree with you. Anything else you want to tell me about him?\"\n\t\t\n\t\t\"Not really. I have only heard legends about him that not many people believe. They could very well be totally made up so I see little sense in going over them \n\t\tright now. However, my expectations of finding our interesting stuff about him and my white self are very high.\"\n\t\t\n\t\t\"I will keep my fingers crossed, my dear,\" you reply.\n\t\t*goto nathaniel2\n\t\t\n\t*hide_reuse #I want to ask if you could trust him \n\t\t\"I think this is my position right now,\" ${fallen_name} answers. \"Do you have your doubts?\"\n\t\t\n\t\t\"I really don't know. I can't say that I have a bad feeling about him, but I would expect to find something dark about him.\"\n\t\t\n\t\t\"That is certainly a possibility I wouldn't want to discard. But I still think we should meet him and see what happens next.\"\n\t\t\n\t\t\"I agree with you.\"\n\t\t*goto nathaniel2\n\t\t\n\t#I am ready to go and meet him\n\t\t*goto nathaniel3\t\t\t\t\n\n*label nathaniel3\nYou arrive in front of the chapel and look around, wondering when ${fallen_name} is going to appear.$!{she} doesn't make you wait for long, \nappearing out of thin air a few meters away from you. The sight takes your breath away. $!{she} is wearing a black sports suit that glistens from time and makes \n${her2} look dashing. A cloak covers ${her} head and shoulders in a way that adds mysterious charm to ${her} athletic figure.\n\n$!{she} just smiles when she sees your eyes one open and steps closer to you. The expression on ${her} face reveals that ${she} is just as happy to see you.\n\n\"I hope you didn't have to wait for too long. Synchronising the time in the pocket with the one here can be tricky sometimes,\" ${she} explains.\n\n\"Actually, it was pretty good this time,\" you reply. \"Let's see what we have in store.\" You look at the chapel. \n\n$!{she} looks at you for reassurance.\n\n\"Are you scared?\" you ask ${her2}.\n\n$!{she} nods. \"I must admit I am. You know, I have been trying to connect to the angel guardians of this realm for such a long time. I read all that I could about them from sources \nthat I could try and others that were outright doubtable. Now, I am standing on the threshold, about to meet one of their leaders.\"\n\nWhat would you reply?\n*choice \n\t#\"Have no fear, I am with you.\"\n\t\t*set love +4 \n\t\t*set independence -4 \n\t\t(Love +, Dependence+)\n\t\t\n\t\t$!{fallen_name} touches your hand and squeezes it tightly. \"Thank you for being with me in this moment.\"\n\t\t*goto nathaniel4\n\t\t\n\t#\"Judging from our meeting, there is really nothing to be worried about. You can do it on your own.\"\n\t\t*set love +4\n\t\t*set independence +4 \n\t\t(Love+, Independence+)\n\t\t\n\t\t\"Thank you for the reassurance, ${name}. I can feel that you truly believe in that and I trust your judgment, but I still think it will be pleasant to share this \n\t\tmoment with you,\" ${she} replies.\n\t\t*goto nathaniel4\n\t\t\n\t#\"Nathaniel looked creepy but I will make sure everything is okay.\"\n\t\t*set love -4 \n\t\t*set independence -4 \n\t\t(Fear+, Dependence+)\n\t\t\n\t\t$!{fallen_name} laughs. \"I know that angels can sometimes be strange or even intimidating, but I doubt we will be in danger. But my hero will save me.\" $!{she} \n\t\tpats you on your shoulder. \n\t\t\n\t\tYou are not very sure if you should take offence by ${her} reaction.\n\t\t*goto nathaniel4\n\t\t\n\t#\"I have a bad feeling but I am sure you have what it takes to handle the situation.\"\n\t\t*set love -4\n\t\t*set independence +4\n\t\t(Fear+, Independence+)\n\t\t\n\t\t\"I think what you feel is fear of the unknown.I know that angels can sometimes be strange or even intimidating, but I doubt we will be in danger. But \n\t\tthank you for believing in my abilities. It means a lot to me,\" ${fallen_name} explains.\n\t\t*goto nathaniel4\n\t\t\n*label nathaniel4\n*page_break\nThe door of the chapel opens and you see the hooded figure of Nathaniel. \"Come, dear ones. You are welcome here.\"\n\n${fallen_name} steps ahead of you and you can see that her wings tremble involuntarily as ${she} moves. \n\nAs you enter, you realize that the energy of the place seems warmer than the last time you were here. Could it be because of the presence of ${fallen_name}, you ask \nyourself. There are candles burning virtually everywhere in sight, and the interesting thing is that their flames vary in color. It is something you have never seen before. \n\nNathaniel lowers his hood to reveal harmonic human features. If you were to look at his face, only his navy blue eyes with myriads of dots inside would reveal that he is not completely human.\nOf course, his white-feathered wings are a much more obvious indicator. \n\n\"I am happy to meet you, ${fallen_name},\" he says warmly and smiles at her. \"I have been watching you on every step that you have taken on your mission and it is an honor to \nchoose to associate with us again.\"\n\nYou see tears in ${fallen_name}'s eyes. \"You have been watching me? Why? And what do you mean by \"again?\" \n\n\"Are you not aware of the timeline in which you are an angel yourself? It was just as the humanity on earth was waking up from a shock of war. Many left heaven to come down here but \nthey forgot. It is pleasure for me to greet you as one of us.\" He nods in reverence. \n\n${fallen_name} wipes out ${her} tears. \"I knew it deep inside, but I didn't dare believe in it,\" ${she} says and weeps even more. \n\n\"Listen to the whispers of your soul, dear one, for they are the wise. You have an interesting set of wings. Would you like to tell me more about what they do?\"\n\n*choice \n\t#\"They make my demons run.\"\n\t\t*set selfcontrol +1 \n\t\t\"One of the hardest lessons the volunteers who came from Heaven was that the negative energies here would sometimes sweep them in an unwanted direction. You made \n\t\ta good choice,\" says Nathaniel.\n\t\t*goto nathaniel5 \n\t\t\n\t#\"I can use them for fighting.\"\n\t\t*set vibro +1 \n\t\t\"A warrior angel you were, dear one, and a warrior you are now as well,\" Nathaniel remarks. \n\t\t*goto nathaniel5\n\t\t\n\t#\"Runes come out very strong when I draw them with my wings.\"\n\t\t*set runemastery +1 \n\t\t\"I haven't seen the runes you work with, dear one. I know that many of them are infernal in nature, but you will not hear a word of judgment coming \n\t\tfrom me. I trust the choices you make.\"\n\t\t*goto nathaniel5\n\t\t\n\t#\"They help me connect to my soul.\"\n\t\t*set intuition +1 \n\t\tNathaniel laughs. \"In other words, they help you dismantle the illusion of separation of the self and soul. It was a good choice, I believe.\"\n\t\t*goto nathaniel5\n\t\t\n*label nathaniel5\n*page_break\n\"How do you feel?\" Nathaniel asks ${fallen_name}.\n\n\"Emotional,\" ${she} explains.\n\n\"That is understandable,\" he says. \"I must say that I am happy that you didn't fall on your knees before me. I've had some of our brethren do that and it felt quite \nawkward, I must admit. All creatures are equal as parts of Source but it seems a different ideology has been predominant here.\"\n\n\"Yeah, some of the books I read caused a lot of discord. They spoke of angels looking down on humans. That made me feel uncomfortable.\"\n\n\"It was the angelic in you discontent with what was written,\" Nathaniel concludes. \n\n$!{she} looks up and there are tears in ${her} eyes. You can sense the rush of feelings that flood into ${her}.\n*page_break\n\"Nathaniel, you must understand that I am on a special mission and the stake is the survival of this world. Reuniting with my angelic side is something that \nI am dying to do, but I believe that it will be only after I am done that I will be able to fully involve myself with that.\"\n\nThe angel nods. \"I understand. I am now in a position of a watcher, so I am trained to distance myself from the dramas of this world. And yet, it is hard for \nme not to shed a tear when I am feel the pain that is imbibed in the energies of the realm. Is it that you ask me to help you?\"\n\n${fallen_name} looks at you, as if ${she} expects you to answer the question on behalf of ${her2}.\n\nWhat would you say?\n*choice\n\t#Urge her to accept \n\t\tIt is enough for you to nod in order to show ${her2} your opinion on the matter.\n\t\t\n\t\t\"Yes, Nathaniel. I feel that as so much depends on me, I would be more than willing to accept any bit of help that comes with no strings attached.\"\n\t\t\n\t\t\"I would be glad to help, although I am afraid I can't to much... directly. But I can help you grow in power as you awaken the DNA that is legacy from \n\t\tthe winged ones.\"\n\t\t\n\t\t\"I would be grateful angel,\" ${she} replies.\n\t\t\n\t\tNathaniel raises his hand and a blue beam flows out of it and engulfs ${fallen_name}. \n\t\t\n\t\t\"Are you okay?\" you ask ${her2} when it ends.\n\t\t\n\t\t$!{she} gives you a big smile. \"Yes, I feel wonderful and more powerful than ever.\"\n\t\t*set independence -4\n\t\t*set mana +2 \n\t\t*goto nathaniel6\n\t\n\t*selectable_if (independence\u003c0) #Tell ${her2} that ${she} can manage without his help\n\t\t*set love +4 \n\t\t*achieve might \n\t\t(Love++)\n\t\t\"I believe in you and that you can achieve all of your goals on your own. There is no need to rely on his help.\"\n\t\t\n\t\t\"I believe he is correct.\" Nathaniel smiles.\n\t\t\n\t\t\"I still hope I can count on your help,\" ${fallen_name} tells you.\n\t\t\n\t\t\"Of course!\" You kiss ${her} forehead.\n\t\t*goto nathaniel6\n\t\t\n*label nathaniel6\n\"Now I need to go and attend my duties.\"\n\n\"I believe we should do the same, Nathaniel.\"\n\n\"I wish you the best of luck in your endeavors.\"\n*goto leave3 \n\n*label Agatha \nIt takes you quite a few efforts to get in touch with Agatha. When you reach her, she apologizes for not picking up her phone. You reply that it is \nunderstandable that she is cautions. \n\n\"Agatha, there is somebody that I'd like you to meet. $!{she} is a very special someone and ${she} might need some of your help.\"\n*if trust>2 \n\n\t\"Of course, ${name}, I would be glad to do so after all that you did for me.\"\n\t*page_break\n\tThe three of you meet in your apartment. ${fallen_name} describes in details the place where magic and technology coexist and where you can unleash the \n\tmagic in this world. \n\t\n\tAgatha listens with wide open eyes.\n\t\n\t\"I have the knowledge of this world but I can't go because, as a dweller of this world, the natural king of mojo that still flows into your veins. Please,\n\tAgatha, take me there.\"\n\t\n\tShe nods and her hands start dancing in the air, leaving energetic traces. As her movements become faster, they create a portal.\n\t\n\t\"Thank you so much.\" ${fallen_name} hugs Agatha before ${she} takes your hand and leads you through.\n\t*goto action \n\t\n*else \n\t\"I am sorry, ${name}. I don't think I can help anybody.\"\n\t\n\tShe hangs up.\n\t*page_break\n\t[i] Without Agatha's help you are not able to complete the mission and prevent the apocalypse. Please, try again.[/i]\n\t*goto_scene ending\n\t\n*label policed \n*if distrust>2 \n\tAs soon as you enter the police department, inspector Morales puts handcuff on your wrists and starts reading accusations that seem absurd. Even he must \n\tknow that he can't prove anything. The problem is that you have taken on his dark side and you are now sure he is not absolutely insane. \n\t\n\tThe sad thing is that you are unable to help ${fallen_name} in her mission, which makes her unable to complete it. \n\t\n\tIt is a sad end to this world. \n\t*goto_scene ending \n\t\n*else \n\tThere is nothing interesting going on in the police station. After drinking a cup of coffee and eating a donut, you decide to go back to your \n\tpartner. \n\t*achieve policed \n\t*goto leave3 \n\t\n*label action\n*page_break\nAs soon as the realm materializes around you, you feel like screaming with terror. The two of you find yourselves into a pentagram. Just outside it, a beautiful \nraven-haired priestess dressed in a robe ornamented with crimson runes raises her staff, readying a spell. \n\nWhat would you do?\n*choice \n\t*selectable_if (runemastery>2) #You ask ${fallen_name} to apply ${her} rune mastery ability\n\t\tYou bet that ${fallen_name} is just as good in the craft. $!{her} fingers dance in the air as she draws a sign.\n\t\t\n\t\tThe priestess drops the staff and curses. Then, she is quick to leave the room as $!{fallen_name} erases the pentagram and the two of you \n\t\teasily walk out.\n\t\t*goto action2\n\t\t\n\t*selectable_if (heal>2) #You notice the wound on the left arm of the ritualist and decide to heal it\n\t\tHer green eyes open widely as your energy heals the trauma that probably plagued her for years. Tears roll down her cheeks and you feel her \n\t\trealization that rarely has she been treated so warmly even by her own kin. \n\t\t\n\t\tShe uses her staff to erase a part of the summoning pentagram and set you free. \n\t\t\n\t\tYour thanks make her smile.\n\t\t*goto action2 \n\t\t\n\t*selectable_if (charm>2) #You use your charisma on the priestess \n\t\tHer eyes lock on yours and she finds herself unable to finish her spell. Mesmerized by your power, she uses her staff to erase a part of the summoning pentagram and set you free. \n\t\t\n\t\tYour thanks make her smile.\n\t\t*goto action2 \n\t\t\n\t#You have no choice but to wait for the outcome of her spell \n\t\t*set damage +1 \n\t\tYou grit your teeth as an electric shockwave goes through your body and makes you fall on your knees. \n\t\t\n\t\tLuckily, the blast also destroys a part of the pentagram and now you can leave it.\n\t\t\n\t\tSeeing that, the ritualist quickly leaves the room. \n\t\t*goto action2 \n\t\t\n*label action2\n*page_break\nThere is a chest next to the exit. Would you like to try to open it?\n*choice \n\t#Yes \n\t\t*goto action3 \n\t\t\n\t#No, I'd rather leave asap \n\t\t*goto action10 \n\t\t\n*label action3 \n*page_break\nAs you get close to the chest, the body of your partner tenses and writhes, as if she is unable to control herself. \n\n*if selfcontrol>2\n\tHowever, ${she} is quick to get hold of ${herself}. \n\t\n\t\"Are you okay?\" you ask ${her2}.\n\t\n\t\"Yes, there were residues from a mind-control spell and my vulnerability to such magic made me feel weak.\"\n\t*goto action4 \n\t\n*else \n\t$!{she} takes out her dagger and stabs your forearm.\n\t\n\t*set damage +1 \n\t\n\t\"What's wrong with you?\" you ask. \n\t\n\tIt is only then that ${she} manages to get hold of ${herself}. \n\t\n\t\"What is wrong with you?\" you ask ${her2}.\n\t\n\t\"There were residues from a mind-control spell and my vulnerability to such magic made me feel weak. I am so sorry.\"\n\t*goto action4 \n\t\n*label action4 \n*page_break\nThe chest seems locked. What would you do?\n*choice \n\t*selectable_if (lockpicking>2) #Ask ${fallen_name} to unlock it \n\t\tShe takes out her unlocking kit and quickly does her magic.\n\t\t*goto action5 \n\t\t\n\t*selectable_if (strength>2) #Try to break it\n\t\tYou know that you have the strength to deal with it. It inly takes a concentrated punch. \n\t\t*goto action5 \n\t\t\n\t#You have no way of opening the chest\n\t\t*goto action10 \n\t\t\n*label action5 \n*page_break\nThere is a golden bracelet inside and you can feel the magic sparkling within. It seems a better match to the wrist of your partner, so \n${she} is the one who takes it. \n*set mana +1 \n*goto action10 \n\n*label action10 \nThe door leads to a corridor that seems to be made of ancient stone, like in a castle. You reach a vestibule right before you are attacked by several \nsoldiers wearing full battle costumes. One launches a laser charge at you. \n*choice \n\t*selectable_if (athletics>2) #I manage to dodge the charge \n\t\tYour athletic training allows you to instinctively avoid the damage.\n\t\t*goto action11 \n\t\n\t#I take the hit\n\t\t*if resistance>2 \n\t\t\tLuckily, it causes only an annoying scratch.\n\t\t\t*goto action11 \n\t\t\t\n\t\t*else \n\t\t\tIt leaves an ugly burn on your thigh. \n\t\t\t*set damage +1 \n\t\t\t*goto action11 \n\t\t\t\n*label action11 \n*page_break\nHow would you fight this battle?\n*choice \n\t*selectable_if (bm>2) #I would rely on my disruptive blade mastery \n\t\tThe warriors don't appear to be much of a problem. Most of them fall under your weapon, but your partner also scores a frag. \n\t\t*goto action20 \n\t\t\n\t*selectable_if (vibro>2) #I would rely on my partner's vibro dagger mastery \n\t\tThe warriors don't appear to be much of a problem. Most of them fall under ${her} blade, but you also score a frag.\n\t\t*goto action20 \n\t\t\n\t#None of those would be good enough \n\t\tThe warriors don't appear to be much of a problem, but still they manage to score a shot before you two take them out.\n\t\t*goto action20 \n\t\n*label action20 \n*page_break\nA band of bipedal robots armed with chainguns await you in the next hall. \n\nHow would you deal with them?\n*choice\n\t*selectable_if (hacking>2) #It would be best if your partner hacks them\n\t\tYour partner sees a rooter on the ceiling and ${her} eyes sparkle. ${she} takes out her PDA and a few seconds later all the destructive machines are \n\t\tswitched off. \n\t\t*goto action21 \n\t*selectable_if (co>2) #I will burn their circuits\n\t\tYou concentrate and prepare a formidable thought pattern that you flood their circuits with. The destructive machines wriggle in agony and fall on the floor \n\t\tbefore stopping...forever. \n\t\t*goto action21 \n\t\t\n\t*selectable_if (control>2) #My partner will control them \n\t\tYou see ${her2} concentrate and feel bad that you can't help, but pretty soon you find out there is no reason to. $!{she} takes control of half of the robots, who \n\t\topen fire on the others, effectively terminating them before they can react. Then, the remotely controlled ones lay waste on each other. \n\t\t*goto action21 \n\t\t\n\t#None of the above is available to me \n\t\tThe battle is fierce and you take a lot of damage before you can eliminate the hostiles. \n\t\t*set damage +2 \n\t\t*goto action21 \n\t\t\n*label action21 \n*page_break\nWould you like to examine the machines before leaving the hall?\n*choice \n\t#Yes \n\t\t$!{fallen_name} crouches on the ground, in the mess of molten steel and exposed wires.\n\t\t*if (reingineering>3)\n\t\t\tYou see your partner set to work her miracles. $!{she} combines several parts into a cohesive whole that looks like a beaten crawling drone. \n\t\t\t\n\t\t\t$!{she} tries a few voice commands which show that the little robot follows her orders. $!{fallen_name} seems very proud of ${her} work. \n\t\t\t*set mana +1 \n\t\t\t*goto action30 \n\t\t\t\n\t\t*else \n\t\t\tAfter a few minutes ${her} frustration becomes apparent. You tap on ${her} shoulder and tell ${her2} that you had better go on. \n\t\t\t*goto action30\n\t\t\t\n\t#No \n\t\t*goto action30\n\n*label action30 \n*page_break\nYou come to a big hall with electronic devices covering the walls. In the middle, there is a big red crystal.\n\n\"This is what traps the magic in our world.\" $!{fallen_name} barely holds ${her} excitement. \n\nA creature crawls from behind it. It looks like the result of the passionate love between an octopus and a predatory plant. Myriads of red eyes are set on you \nand it is hard for you not to tremble before the pure hatred that the creature radiates. \n\n\"Do you feel the magic?\" your partner asks you, diverting your attention away from the being. You let your energy dance with ${hers}, allowing her to take the lead and \nattune you to the flaw of magic. \n*if (damage=0)\n\n\tYou take a deep breath and your whole being gets infused with power. \n\t*set mana +2 \n\t*goto action31 \n\t\n*elseif (damage=1)\n\t\n\tAs you take a deep breath, you wince with the pain of a slightly wounded body. Yet, you feel your power increasing. \n\t*set mana +1 \n\t*goto action31 \n\t\n*else \n\t\n\tYou take a deep breath but you only feel the pain of a very battered body. You can only hope that your partner can better infuse ${herself} with magic.\n\t*goto action31\n\t\t\n*label action31 \n*page_break\nThe next few minutes are erased from your memory. You only remember the intensity of a battle that puts you to the limit of your ability. And then, there is an \nexplosion. You blank out. \n*if mana>2 \n\t\n\tWhen you wake up, you see that the red crystal is destroyed and the monster's parts are scattered all over the floor. You crawl to your partner, who is still \n\tlying on the floor. $!{she} is still alive and as you put ${her} head in your lap, ${she} cracks a smile.\n\t*goto epilogues\n\t\n*else \n\tYou don't survive the explosion and you end up as dinner for the monster. \n\t\n\tThis is a sad end of the story. \n\t*goto_scene ending\n\t\n*label epilogues \nAfter magic is unleashed in the earth realm, it leads to many changes. $!{fallen_name} is the one who directs its flow. $!{her} hand is the one \nthat draws the shape of the new world. \n\n*if black\n\t*achieve black \n\tUnfortunately, it is not exactly a very good one. Maybe a few shades better than before. And it never experiences the destruction from your visions. \n\t\n\tBut $!{fallen_name} still has open wounds and her magic reflects that. $!{she} soon becomes the leader of a cult of revering followers who are ready to give \n\ttheir lives for ${her}. $!{she} uses them in order to gain even more power... by violent means. \n\t\n\tOne day, ${she} comes to you.\n\t\n\tWhat would you do?\n\t*choice \n\t\t#Hold ${her} hands and try to kiss ${her2}\n\t\t\t*if anger>50 \n\t\t\t\t\"So many things changes since we fought that battle. And yet I want you even more. I love your anger that shows that the fire in your \n\t\t\t\tsoul is still burning with the fair that makes things happen.\"\n\t\t\t\t\n\t\t\t\t$!{her} arms cross behind your back and your lips dance together. \n\t\t\t\t*achieve together \n\t\t\t\t*goto epi2 \n\t\t\t\t\n\t\t\t*else \n\t\t\t\t$!{she} evades your efforts to get close to her. \n\t\t\t\t\n\t\t\t\t\"So many things changed, my dear. I myself am no longer who I was. I am sorry, ${name}, I don't believe I can play the love story with you \n\t\t\t\tany longer. You have lost your edge, the fire of anger that makes you change the world. I can no longer connect to your energy.\"\n\t\t\t\t\n\t\t\t\t$!{her} words cut your heart to pieces. \n\t\t\t\t*achieve alone\n\t\t\t\t*goto epi2\n\t\t\t\t\n\t\t#Invite ${her2}\tfor a dinner\n\t\t\tYou spend a delightful evening with a lot of laughter. $!{her} non-verbal signals say it all, however. $!{she} is no longer interested in you romantically. \n\t\t\tThere is a part of you that accepts that as it is good to have friends like ${her2} that you can rely on. \n\t\t\t*achieve friends\n\t\t\t*goto epi2\n\t\t\t\n*elseif white\n\t*achieve white \n\tThe world changes in a direction that seems, as if on the surface, much better. $!{fallen_name} uses magic in order to bring more harmony. Technology is \n\tnot abolished, but it is used carefully to ensure the betterment of society. \n\t\n\tAnd yet... that harmony comes at the price of killing something innately human, which is the propensity to feel. But it never experiences the destruction from your visions. \n\t\n\tOne day, ${she} comes to you.\n\t\n\tWhat would you do?\n\t*choice \n\t\t#Hold ${her} hands and try to kiss ${her2}\n\t\t\t*if anger\u003c50 \n\t\t\t\t\"So many things changes since we fought that battle. And yet I want you even more. I love how you manage to bring peace to the anger that was plaguing you \n\t\t\t\tfrom within. Now I can be with you and with the Source at the same time.\"\n\t\t\t\t\n\t\t\t\t$!{her} arms cross behind your back and your lips dance together. \n\t\t\t\t*achieve together \n\t\t\t\t*goto epi2 \n\t\t\t\t\n\t\t\t*else \n\t\t\t\t$!{she} evades your efforts to get close to her. \n\t\t\t\t\n\t\t\t\t\"So many things changed, my dear. I myself am no longer who I was. I am sorry, ${name}, I don't believe I can play the love story with you \n\t\t\t\tany longer. You allowed anger to grow its poisonous seeds inside your soul and that has sealed my heart for you.\"\n\t\t\t\t\n\t\t\t\t$!{her} words cut your heart to pieces. \n\t\t\t\t*achieve alone\n\t\t\t\t*goto epi2\n\t\t\t\t\n\t\t#Invite ${her2}\tfor a dinner\n\t\t\tYou spend a delightful evening with a lot of laughter. $!{her} non-verbal signals say it all, however. $!{she} is no longer interested in you romantically. \n\t\t\tThere is a part of you that accepts that as it is good to have friends like ${her2} that you can rely on. \n\t\t\t*achieve friends\n\t\t\t*goto epi2 \n\t\t\t\n*elseif blue \n\t*achieve blue \n\tTrue to ${her} nature, ${fallen_name} uses magic to improve technology. The purity of her powers ensure that the AIs never take the destructive direction from your visions. \n\tThe world as a whole is as close as it was before and continues the technological advancement, breakthrough after breakthrough.\n\t\n\tOne day, ${she} comes to you.\n\t\n\tWhat would you do?\n\t*choice \n\t\t#Hold ${her} hands and try to kiss ${her2}\n\t\t\t*if humanity\u003c50 \n\t\t\t\t\"So many things changes since we fought that battle. And yet I want you even more. I love how you manage to see my soul behind my partially \n\t\t\t\tcybernized physical self. I know technology made a big mess in another time, but here in my self, I feel in harmony. \"\n\t\t\t\t\n\t\t\t\t$!{her} arms cross behind your back and your lips dance together. \n\t\t\t\t*achieve together \n\t\t\t\t*goto epi2 \n\t\t\t\t\n\t\t\t*else \n\t\t\t\t$!{she} evades your efforts to get close to her. \n\t\t\t\t\n\t\t\t\t\"So many things changed, my dear. I myself am no longer who I was. I am sorry, ${name}, I don't believe I can play the love story with you \n\t\t\t\tany longer. I understand your disdain for technological beings, but at this point, I am pretty much as much human as I am a machine.\"\n\t\t\t\t\n\t\t\t\t$!{her} words cut your heart to pieces. \n\t\t\t\t*achieve alone\n\t\t\t\t*goto epi2\n\t\t\t\t\n\t\t#Invite ${her2}\tfor a dinner\n\t\t\tYou spend a delightful evening with a lot of laughter. $!{her} non-verbal signals say it all, however. $!{she} is no longer interested in you romantically. \n\t\t\tThere is a part of you that accepts that as it is good to have friends like ${her2} that you can rely on. \n\t\t\t*achieve friends\n\t\t\t*goto epi2 \n\t\t\t\n*else\n\t*achieve red \n\t${fallen_name} makes sure she uses her new abilities to fully eradicate all AIs existing in the world. $!{she} doesn't stop there in her quest to put an end of all \n\ttechnology. There is a brief crisis that springs up, but she quickly teaches people the way of her craft. The world soon turns into what would previously be considered \n\ta fantasy. \n\t\n\tOne day, ${she} comes to you.\n\t\n\tWhat would you do?\n\t*choice \n\t\t#Hold ${her} hands and try to kiss ${her2}\n\t\t\t*if humanity>50 \n\t\t\t\t\"So many things changes since we fought that battle. And yet I want you even more. I love how you manage to see the world through my eyes and share my \n\t\t\t\tcontempt for technology.\"\n\t\t\t\t\n\t\t\t\t$!{her} arms cross behind your back and your lips dance together. \n\t\t\t\t*achieve together \n\t\t\t\t*goto epi2 \n\t\t\t\t\n\t\t\t*else \n\t\t\t\t$!{she} evades your efforts to get close to her. \n\t\t\t\t\n\t\t\t\t\"So many things changed, my dear. I myself am no longer who I was. I am sorry, ${name}, I don't believe I can play the love story with you \n\t\t\t\tany longer. I fail to understand your reverence for technology and I wouldn't like to have a partner who would distract me from my beliefs.\"\n\t\t\t\t\n\t\t\t\t$!{her} words cut your heart to pieces. \n\t\t\t\t*achieve alone\n\t\t\t\t*goto epi2\n\t\t\t\t\n\t\t#Invite ${her2}\tfor a dinner\n\t\t\tYou spend a delightful evening with a lot of laughter. $!{her} non-verbal signals say it all, however. $!{she} is no longer interested in you romantically. \n\t\t\tThere is a part of you that accepts that as it is good to have friends like ${her2} that you can rely on. \n\t\t\t*achieve friends\n\t\t\t*goto epi2 \n\t\t\t\n*label epi2 \n*goto_scene ending ", "police": "*page_break\nMost people tend to wake up where they fell a
