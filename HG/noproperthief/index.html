pecially with those deposit boxes back there at the bank. We'd have left with pocket change if it weren't for you.\"\n\n                              \"Thanks.\" Bonnie blushes. \"I've dreamed about breaking into them since I started working there. Minimum wage and inconsiderate bosses lead me to start daydreaming about such a thing. I guess in that way, Narsico, you and I have something in common.\"\n\n                              Narsico grunts, but doesn't deny the idea.\n\n                              \"If it makes you feel any better, everyone is going to get their money back from the bank, only the CEO and investors who spend their days thinking of ways to nickel and dime their patrons will take the hit. Plus, a lot of those papers that got destroyed in the water were probably bank held deeds. A lot of people will be freed of their outrageous mortgage debts and be able to live free. We're kind of like Robin Hood in that way.\"\n\n                              Bonnie takes a deep breath and exhales with a smile. She pinches the edge of he Skeletones band T, admires it a moment while walking at a steady pace behind Narsico and beside you, and suddenly you notice a spring in her step. She's happy. \"That does actually make me feel better. Thanks.\"\n\n                              You feel warm and fuzzy as you watch Bonnie skip around you as you cross the parking lot.\n\n                              Narsico shouts from the SUV, \"let's go love birds.\" Though he tries to be hard you can see even he is biting back a smile.\n                              *page_break\n                              *label on_the_road\n                              It feels good to be back on the road, though it gives you more time to worry about Wesley. You grow more and more concerned wondering if he is still alive, but part of the plan was not to use cell phones other than the prepaids, which are for emergencies, for call logs are evidence.  \n\n                              The car is silent. No one speaks, and somehow using the radio seems disrespectful. \n\n                              The fog appears to have mostly disappeared, but the sky is still overcast and the gray of it make the sky feel shorter, like an individual could actually reach it, plant a flag on the low clouds and claim it as theirs. As you lean back to simple enjoy the view, you catch sight of something in the passenger side mirror. A police cruiser. \n\n                              \"Do you think Mason keeps his plates up to date?\" you ask Narsico. \n\n                              \"Why?\"\n\n                              \"Because we have company.\" You resist the urge to lean back for a better look. \"A cop is tailing us.\"\n\n                              As you say this, you see the cop's sirens light up.\n\n                              \"What do I do?\" Narsico's eyes widen in alarm as he turns to you for an answer.\n                              *choice\n                               #Pull over (plan)\n                                *set trust %+30\n                                Trust: ${trust}\n                                \"Pull over. I'll do most of the talking. You'll be my father. Got it?\" You say to Narsico and he nods. \"Divorced several years ago. Bonnie, you'll play my girlfriend.\"\n\n                                \"How about my young new second wife?\" Narsico jokes. \n\n                                \"No, not believable\" you say. \"She'd be in the passenger seat not the back in that case. Cops notice details like that and discrepancies raise questions and questions we don't need.\"\n                                 \n                                \"What makes either of you think I'd date you.\" Bonnie smiles as she leans up and rests a hand on yours and Narsico's shoulders. \"How about I be your sister?\"\n\n                                \"Couple reasons. One, because you did go on a date with me. Two, because if my plan is going to work, we have to make the cop uncomfortable with PDA, and not so uncomfortable that it's taboo. So, no sibling kissing.\"\n \n                                \"I have to kiss you?\"\n                                *choice\n                                 #\"You get to kiss me\"\n                                  You wink. \"You get to kiss me.\" You think you can see Bonnie blush and your heart flutters a little. \n\n                                  *label kiss_car\n\n                                  \"I'm a little worried.\" Narsico nods towards Bonnie then pull out his pistol and places it in the panel in his door. \"Plan B.\" He pulls over as you explain the rest of the plan. \n\n                                  The cop steps from his car and approaches the driver side window and Narsico rolls it down before returning his hand to the steering wheel to put the cop at ease. The officer is young, probably new to the force, but he doesn't have a partner with him and he doesn't seem to have called for backup\n\n                                  \"Oh my!\" Bonnie plays up her part. Rolling down her window she looks the cop up and down, and sets her eyes in a seductive way, just as planned. \"It feels like we're criminals, getting pulled over like this. You going to arrest us, officer?\"\n\n                                  \"No ma'am.\" The officer already seems uncomfortable. This is going to be easier than you thought. \n \n                                  Still, you say your line, \"Why do you never look at me like that, sweetheart?\"\n\n                                  \"Is my little bubby jealous,\" Bonnie says and then, taking you by surprise, she not only kisses you on the cheeks, but also plows her tongue into your mouth. As first you resist, but soon you give into the pleasure of it, being mindful to keep an ear on the officer's words. \n                                   \n                                  \"I--uh--just--umm--pulled you over to let you know your left tail light--\" Bonnie gives an exaggerated groan of pleasure and you can see the officer adjust his collar as you peek around her hair, which drapes over your face. \"Your left taillight is off--out. It's out.\"\n \n                                  \"Oh, well I'll get that fixed right away, Officer.\" You can hear Narsico's seat creak as he leans towards the officer. \"Sir, I'd like very much if we could hurry this up so I can--\" he drops his voice to a whisper, but you know he's saying what you told him to, \"drop them off at his mother's and be done with them.\"\n\n                                  \"Of course. Ya'll have a wonderful day,\" the officer manages, as Bonnie turns to wink at him. \n\n                                  As you drive off you still feel Bonnie's soft lips on yours. You've never been kissed like that before. Yet, she looks unfazed and you can't help but feel like you've been conned. Even so, you feel that that's just fine. \n\n                                  \"That's my boy,\" Narsico bellows and laughs, patting your leg. \"And the Oscar goes to... Bonnie. Great performance. I almost believed you myself.\"\n\n                                  \"Thanks,\" she giggles. \n\n                                  \"Yeah,\" you exhale in a whisper. \"Me, too.\"\n                                  *choice\n                                   #Head to Mason's\n                                    *finish\n\n                                    \n\n\n                                 #\"Forget it. New Plan.\"\n                                  \"OK. Forget it. New plan: Narsico, you get to kiss me. We'll, be gay lovers--\"\n                                   \n                                  \"Uh, no.\"\n                                    \n                                  \"No? It's either this or jail. I'm sure you'll find worse kissers in there,\" you joke. \n                                   \n                                  \"OK! I'll do it,\" Bonnie says. \"But don't think I'll like it.\"\n \n                                  You think you can see Bonnie blush and your heart flutters a little, knowing that what she just said might just have been a lie. She might very well enjoy it. \n                     \n                                  *goto kiss_car\n                                 \n                               #Accelerate (improvise)\n                                \"Step on it,\" you say before you have a chance to remind yourself that you're in an old Isuzu Amigo not a new Ferrari. \n\n                                Narsico floors it but can't seem to lose the cop tailing you.\n \n                                It could have been a broken headlight for all you know, but stepping on the gas has shown the officer that you have something to hide. You have to lose him soon or backup might arrive, perhaps a helicopter. \n\n                                \"I can't shake him!\" Narsico shouts. \n\n                                You imagine that you can have him make a sharp U-turn, but it would be risky, or you could shoot at the cop and hope to scare him off or maybe blow his tire out, though that too would be risky. \n                                *choice\n                                 #Make a sharp turn\n                                  *set health %-50\n                                  You fasten your self belt and make sure Bonnie and Narsico have done the same. \n                                  \"Make a sharp U-Turn. We can lose him that way.\"\n\n                                  Without hesitation, Narsico spins the steeling wheel a little to the right before spinning it completely to the left. Mid way across the dirt median you can feel the SUV tilting. It's tilting too far! Narsico tries to correct but does so too much, over correcting, sending the SUV tilting the opposite way. He over corrects again, but this proves too much and the SUV rolls. \n\n                                  Everything seems to float for a moment and then gravity kicks back in and finally the SUV comes to a stop back on it's wheels. Narsico steps on the gas and you all sigh in relief when the Amigo still runs. \n                                  \n                                  The cop had pull away for a bit, but he returns.\n          \n                                  [i]What do you do now?[/i]\n                                  *choice\n                                   #Another sharp turn\n                                    *set health %-100\n                                    Health: ${Health}\n\n                                    Perhaps thinking nothing of the first close call with a sharp turn, you call upon Narsico to make another. Dazed, he follows your order, obediently. \n\n                                    Narsico spins the steeling wheel a little to the right before spinning it completely to the left. Mid way across the dirt median you can feel the SUV tilting. It's tilting too far! Narsico tries to correct but does so too much, over correcting, sending the SUV tilting the opposite way. He over corrects again, but this proves too much and the SUV flips on its side. \n\n                                    Everything seems to float for a moment and then gravity kicks back in and finally the SUV comes to a stop. \n                                    \n                                    *image gameover.png\n                                    \n                                    Your life has slipped through your fingers.\n\n                                    [i]Will you start again or go back to the last checkpoint?[/i]\n                                    *choice\n                                     #Start over from the beginning\n                                      *goto_scene end\n                                     #Checkpoint\n                                      *set health %+100\n                                      Health: ${Health}\n                                      *goto on_the_road\n                                    \n                                   #shoot at the cop car\n                                    *goto shoot_car_2\n\n                                 #Shoot at the cop car\n                                  *label shoot_car_2\n                                  You grab your pistol and check to make sure you have it fully loaded, then roll down your window. Peeking back at the officer tailing you, you can see that he is young, probably not much older than you. \n\n                                  [i]Before you take aim, what is your target?[/i]\n                                  *choice\n                                   #The officer\n                                    *set conscience %-30\n                                    *set health %-10\n                                    Conscience: ${conscience}\n                                    Health: ${health}\n\n                                    You get a strange urge to shoot at the officer himself rather than the wheels of his vehicle. It's out of character for you, but desperate times call for desperate measures. You aim and tug your trigger as you see the widening of the officer's eyes. \n\n                                    He ducks as the bullet blows through the windshield and leaves a hole right where his head was. If he didn't react as fast as he did, you would have killed him and the guilt suddenly feels heavy on your conscience. The heat of the moment kept the guilt at bay for a second, but no longer. \n\n                                    \"What are you doing, Rooster?\" Narsico shouts, gouging the guilt in further like salt in a wound, and the fact that he uses your gig name is not a source of pride but rather shame. \n\n                                    The officer is still hot on your trail and he has pulled his own gun. You imagine a more experienced officer, perhaps one with a wife and kids, would have backed off and let you try to outrun the radio, but this one is persistent. He has something to prove and in a begrudging way, you respect that. \n\n                                    [i]What now?[/i]\n                                    *choice\n                                     #Shoot at his tire\n                                      *goto shoot_tire_1\n                                     #Shoot at the officer again\n                                      *set conscience %-100\n                                      conscience: ${conscience}\n                                      Your mean streak is back and you feel a renewed urgency to shoot the officer. He's just doing his job, but he's keeping you from your paycheck. You can see him struggling to steer with one hand and shoot with the other. He wipes his brow with his wheel hand, taking aim with his other and that is when you lean out the window you take your second shot. \n\n                                      If you were on the range you'd be proud of how close to the other hole the second bullet hit. But this isn't a range, and that officer wasn't a paper silhouette.  He was a human being with dreams and aspirations, friends and parents, and a culmination of years of education and unique experience. All that is gone in an instant, by your hands. You've killed a man. An officer of the law, no less, one simply doing his job--a little too overzealously--but just doing his job. \n\n                                      The police cruiser veers off and crashes into a lamp post, as you slump back into your seat. You stare at your hands and can't help but feel they should be red. You feel so heavy. You can't bear to see the disappointed look on Bonnie's face, but something makes you turn back anyway. \n\n                                      Silence. \n\n                                      You turn to find that you were not the only accurate one. The officer had fired a shot and you now see where is struck: right through Bonnie's stomach. She's not moving, and her hands are in fact red as they tried to hold her innards in and stop the blood from flowing. \n\n                                      She's dead. \n                                      *image scale.png\n\n                                      You can't live with this guilt\n\n                                      [i]Will you start again or go back to the last checkpoint?[/i]\n                                      *choice\n                                       #Start over from the beginning\n                                        *goto_scene end\n                                       #Checkpoint\n                                        *set conscience %+100     \n                                        *goto shoot_car_2\n\n\n\n                                   #The front tire\n                                    *label shoot_tire_1\n                                    You have a pretty clean shot of the police cruiser's tire even though he has begun to swerve, probably trying to get to his own gun after seeing you aim yours in his direction. You fire and see the sparks of the bullet hitting the pavement near the tire. You've miss, just barely. \n\n                                    \"We've got a problem,\" Narsico says. \n\n                                    \"What?\" you bark, frustrated in having missed. You try to take aim again. \"What is it?\"\n\n                                    \"A train is coming,\" Narsico warns. You duck back into the SUV. \n\n                                    \"The crossing guards are already down,\" Bonnie shouts from the back of the Isuzu Amigo. \n\n                                    A train approaches from the west. You hear it before you see it--a freight train, and a long one at that. It'll be cutting it close, but you tell Narsico to cross the tracks and have the train cut the officer off. \n\n                                    You can see the lights of the train glaring off the fog you've made on your window from your heavy breathing. It's all up to Narsico, you realize, as you take a deep breath and count. \n\n                                    One. Two. Three. Four--\n\n                                    As you squeeze your eyes tight, you feel the SUV bounce upon hitting the tracks, and hear the crack of the railroad crossing snapping against the hood of the vehicle.\n \n                                    You've made it, you realize. You turn back and see, from the gaps between train carts, the cop car. The officer gets out, talking into his radio.\n\n                                    *goto license_plate\n\n\n                                   \n\n\n                                 #Let Narsico figure it out\n                                  You try to think of some suggestion for Narsico, but you can't think of anything. Your whole life you've thrived in stressful situations, and the first time you have a girl with you that just might appreciate your crooked talents, you choke! Luck is on your side however. A train approaches from the west. You hear it before you see it--a freight train, and a long one at that. It'll be cutting it close, but you tell Narsico to cross the tracks and have the train cut the officer off. \n \n                                  You can see the lights of the train glaring off the fog you've made on your window from your heavy breathing. It's all up to Narsico, you realize, as you take a deep breath and count. \n\n                                  [i]One. Two. Three. Four--[/i]\n\n                                  As you squeeze your eyes tight, you feel the SUV bounce upon hitting the tracks, and hear the crack of the railroad crossing snapping against the hood of the vehicle.\n\n                                  You've made it, you realize. You turn back and see, from the gaps between train carts, the cop car. The officer gets out, talking into his radio. \n\n                                  *label license_plate\n                                  \"He's probably got our license plate,\"  Narsico says. \"Even if they think we stole Mason's car, they're going to go to his house and see that he's there but didn't report it missing.\"\n\n                                  \"Just go and hope we beat them to Mason's.\"\n\n                                  You head back to Mason's taking as many back streets as possible and stop on a side street nearby, where Narsico gets out, as does Bonnie.\n                                  *finish \n\n\n\n                                  \n\n\n                           \n\n                         #Down the south hall where it seems eerily quiet\n                          *label south_hall\n                          You make your way down the south hall where it seems eerily quiet. The silence gives you time to wonder just how many people have died in this hospital. As you roll further down the hallway it seems to grow darker and darker and the din of the cafeteria fades away. \n\n                          After a few turns, you hear a buzzing and see a fluorescent light flickering on and off. The hallway has a strange green glow to it rather than the sterile white of the rest of the hospital. At the end of the hall you see a large metal door with wisps of cold air licking at the bottom, like an ethereal octopus trying to escape. \n\n                          A morgue. \n\n                          Just then you hear footsteps approaching.\n\n                          Do you enter the morgue, stay where you are, or return to find the others? You realize that no medicine will be in there, just preservatives and dead bodies, but it could prove to be a good hiding spot.\n                          *choice\n                           #Go into the morgue\n                            Though you know that Wesley is dying and might be at the morgue himself soon, you make your way down the strange green hallway until your feet bump into the large metal door. You get out of the wheelchair, push it aside and then tug the large metal door open. The footsteps grow louder and you can hear voices, and also the squelch of a radio. \n\n                            A blast of cold air blows passed you, but what really makes you shiver it the awful smell. Formaldehyde and decay.  Just as you close the door behind you, you hear that the voices are on their way to the morgue. You have to think fast. \n\n                            The only hiding spots that you see are a set of large body drawers. They all appear occupied, judging by the labels on each, except for one which has a faded label. Other than this, there is a cabinet below the operating table.\n\n                            [i]Where do you hide?[/i]\n                            *choice\n                             #The body drawer\n                              As you pull the body drawer out, you realize that it isn't empty. Strangely enough there is not a corpse, but rather a skeleton inside. It doesn't smell bad, as the flesh is long rotted and gone. Still it's not an ideal hiding spot. You realize however that you don't have time to find another hiding spot. \n\n                              [i]What do you do?[/i]\n                              *Choice\n                               #Cuddle with the skeleton\n                                *set health %-100\n                                Health: ${health}\n                                With no time to lose, you climb in with the skeleton. It's cramped and dark inside, but you hear the body drawer click closed just as the morgue door is opened. \n\n                                The guards come and go without finding you, but soon you wish they had found you, as the drawer won't open from the inside. You push and strain against the door and the walls, but nothing gives at all. Finally, you position yourself to be as comfortable as you can be on top of a pile of bones. \n\n                                Time goes by slow. You can't tell what time it is, but it seems like forever that you're in the dark. The dark grows warmer and warmer, though, and the warmer it grows the harder it is to breathe. You're running out of air, you realize, and try to slow your breathing despite the sudden panic you feel. \n\n                                You hold your breath until you feel it. Fingers. Bony fingers tickling your sides. You laugh until you cry, terrified that either a skeleton is tickling you or that you are hallucinating, but mainly because you know you haven't long to live. \n\n                                The tickling stops, and the dark seems to grow even darker. You suddenly can't feel a thing, and your worries have slipped away, as well. You no longer fear anything, you just accept it. \n                                \n                                *image gameover.png\n\n                                Your life has slipped through your fingers. Game over. Try again!\n\n                                [i]Will you start again or go back to the last checkpoint?[/i]\n                                *choice\n                                 #Start over from the beginning\n                                  *goto_scene end\n                                 #Checkpoint\n                                  *set health %+100\n                                  *goto south_hall\n\n                               #Pretend to be lost\n                                *goto drugged\n                             \n\n                             #The cabinet\n                              *set sanity %-30\n                              Surely the morgue drawers are full of human remains, so you instead opt to hide in the large space under the operating table. It's cold and hard, made of metal. You smell formaldehyde and decay.\n\n                              Just as you pull the curtain closed to hide yourself, you hear that the voices and the morgue door open. The guards come and go without finding you. You wait a few more minutes until you're sure they've grown bored of, or creeped out by, the morgue hallway, before you crawl out of the cabinet. You see something is different about the room. Nothing is missing, but something has appeared. It's pale, and motionless, as it lies on the operating table. \n\n                              A body. \n\n                              A shiver climbs your spine as you approach the table, your morbid curiosity getting the better of you. Something seems oddly familiar about the body. It's girlish, and though you've never seen this particular body nude before, you can't shake the feeling that you know it. \n\n                              A sheet hangs off the body's head. \n\n                              You should probably leave it be and find the others, but something pulls at you to look at the face. \n\n                              [i]What do you do?[/i]\n                              *Choice\n                               #Lift the Sheet\n                                *set Conscience %-10\n                                conscience: ${conscience}\n\n                                You can't believe your eyes as you lift the sheet from the body. \n\n                                You did recognize the corpse. It's Bonnie Loren's. \n\n                                There is a constellation of bullet wounds over her stomach and chest, one in her arm, and two placed accurately in the middle of her forehead. The wounds seem old, and you know she couldn't possibly be lying on that table, and yet you feel an overwhelming guilt for getting her mixed up in your life of crime. She very well could be on this table soon enough and that thought makes you terribly sad. \n\n                                You rub your eyes and suddenly the table is vacant once more. \n\n                                After a moment your heart stops racing. Shaken, it takes you a moment to remember you have something you need to be doing. \n                                *goto meet_up\n\n                               #Meet up with the others\n                                *goto meet_up\n\n\n                             #Pretend to be lost\n                              *label drugged\n                              You scramble to the middle of the room. letting one side of your face droop as if you're sedated, you begin weakly reaching for flying insects that are not in fact there and mumbling nonsense.\n                              \n                              Even as a couple security guards open the morgue door you maintain character, twisting your whole upper body and not just your neck towards them, and treating the guards to a unsettling, wide smile. \"Visitors?\"\n\n                              The guards first position defensively upon seeing you. Then they come up to you, snapping their fingers near your unresponsive face. You only smile, dumbly.  \n\n                              You see the look of recognition spread from one of their faces to the other as the first says, \"Probably from ICU.\"\n \n                              \"Let's just point him towards the cafeteria and let them deal with him.\"\n\n                              \"Works for me,\" the first guards agrees, and together they guide you until you're in front of the cafeteria.\n\n                              \"Yay!\" you say with sedated enthusiasm. \"I love tea parties.\"\n\n                              When the guards leave, you head out to find the others.  \n                              *goto meet_up\n                              \n                           #Stay where you are    \n                            You're struck with a sudden terror and find that you cannot move. Seeing the cold metal door made you think of your own mortality, and it has terrified you. Even as a couple of security guards approach you, you can seem to move. \n\n                            It's a good thing you've exercised your silver tongue, for you manage to say, \"Thank goodness. I'm trying to find the cafeteria.\"\n\n                            The guards chuckle. One points to the morgue. \"Well, it ain't that way, unless you're Ed Gein.\"\n\n                            You know he's referring to the cannibal serial killer, and almost lose you appetite. The guards point you towards the cafeteria. Your stomach growls, so you decide to grab a bite to eat, even though you feel a bit guilty about it. The food doesn't smell great, especially in comparison to Mason's shish Kabobs, but you're hungry and it smells just appetizing enough. \n\n                            You can see it's school cafeteria style, with a cashier standing sentry at the end where they charge people. You roll your wheel chair to the counter where you see vegetables, tater tots, and some kid of meat, with cartons of orange juice and milk towards the end with a frozen yogurt machine. The swirl is out of order, as it always seems to be. \n\n                            Looking at your choices, you notice that the carrots have liquefied to the point that you can't make out individual pieces anymore, only one large gelatinous glob of orange. Deciding to pass on the carrots, you point to the tater tots and have the chef pile some on your plate. With most of your plate already full you take a slab of the mystery meat, and grab two orange juice cartons, being sure to pocket one.  \n\n                            As you approach the cashier, you begin to pat your pockets. Which each pocket you pat you make sure your eyes widen in alarm. You pat each pocket again, as you place your tray in front of the cashier, leaving the carton of orange juice closet to the cashier and more accessible, as you keep the tray pinned with one hand.\n\n                            The old woman looks at you with a face that tells you she knows this con, but she underestimates you. \n\n                            \"This is so embarrassing,\" you say as you bring you hand to your mouth. Making a stomach grumble sound with your covered mouth and hand, you make sure your eyes have begun to water. \"I haven't eaten all day. I--I,\" you stutter as if holding back tears and see that the woman's stern look has softened. \"I must have left my wallet at home.\"\n\n                            \"Oh, dear,\" the cashier says and you can feel her tug on the tray once before giving up, seeing that it's pinned under your hand. \n\n                            \"It was hard enough to wheel myself down here--\" You look into her eyes and see they have begun to water like yours. \"No, never mind. It's not your problem. I'll managed... somehow. I suppose.\" You give your wheelchair one soft push, then collapse backwards as if exhausted.\n\n                            The woman sighs empathetically. She takes the orange juice, but holds out the food tray to you. \"Take it. Go on. I won't tell. Take the food at least.\"\n\n                            \"You mean it? Thank you.\" You smile as she nods, then wipe a fake tear away and take the food, before rolling away. \"Thank you so much.\"\n\n                            After eating a few tater tots you pull out the orange juice you had hidden and chug it down, and feel a little revived and more energetic. \n\n                            You realize it's been awhile and that you should probably meet back up with Narsico and Bonnie. \n                            *choice\n                             #Meet up with the others\n                              *goto meet_up\n                           #Meet up with the others\n                            *goto meet_up\n\n                       #\"I'll get Wesley's cat\"\n                        *set trust %+40\n                        *set conscience %-10\n                        Trust: ${trust}\n                        Conscience: ${conscience}\n\n                        \"I think we'd better split up,\" you say, feeling a pang of guilt at seeing the disappointment on Bonnie's face. It'll help Wesley, though--getting his cat.  \"You take Narsico to the hospital with you, while I go and fetch Wesley's cat.\"\n\n                        Bonnie sighs, then leaves to find Narsico. \n\n                        You can hear muffled talking through the guestroom wall, and outbursts of \"No way,\" \"Really,\" and finally \"Fine\" from Narsico. \n\n                        \"What's your cat's name?\" you ask Wesley. \n\n                        \"Lucy.\" Wesley smiles, probably thinking of his cat. \"White cat, and you know the address already. Reunite us, lad. This may be my final hour.\"\n\n                        \"Don't be so melodramatic, old man,\" you banter. \"Melissa says you'll pull through. I'm only doing this in hopes you'll not make me split my share of the money alone with Bonnie.\"\n\n                        \"My mind's made up about that. Now, get going. I'd like to rest.\"\n\n                        \"After everything she's done for--\"\n\n                        Wesley cuts you off. \"Get going.\"\n\n                        \"Fine,\" you say and head for the garage after stopping to let Mason know you'll be taking the van. \n\n                        \"At least switch the magnet logos on the sides. Not much you can do about the bullet holes.\" Mason thinks for a moment, holding up his finger to keep you from racing away. He fishes around in his pocket and pulls out some keys. \"On second thought, just take the Isuzu Amigo. It's pink, but it drives great.\"\n\n                        You catch the keys as he tosses them to you and head outside where you spot the pink Amigo. Feeling like a Ken doll, you jump in the driver seat and start the SUV. \n\n                        The drive to Wesley's RV at a nearby trailer park doesn't take long, but finding his cat Lucy does. The white little devil decides to hide apparently, for you can't find her anywhere. After searching everywhere in the RV, twice, you give up, annoyed. \n\n                        Though that took longer than you hope and you have nothing to show for it, you realize that it is still early and that you have time to head over to the hospital. \n \n                        [i]What do you do?[/i]\n                        *Choice\n                         #Meet up with the others\n                          You decide to meet up with the others at the hospital. It isn't far away and you make it in no time.\n\n                          *goto meet_up\n                         #Return empty handed\n                          *set conscience %-10\n                          The hospital sounds like nothing but work, so you decide not to go help your friends. You feel a little guilty about it, but it's not like they'll ever know you had the time to go help. To be sure it looks like you've been busy, you decide to kill some time before returning to Wesley empty handed. \n    \n                          [i]What do you do?[/i]\n                          *choice\n                           #Go to a convenience store\n                            *label convenience_store\n                            You drive around until you find a convenience store. It's empty of people except for the cashier, who sits on the counter reading a magazine. You notice it's a National Geographic and not a muscle builder magazine. Cashiers who read the muscle builder magazine have always given you the most trouble, like they have something to prove. Still, while you may be slim, you're also sly and have never failed to outsmart the wannabe Schwarzeneggers. You've never seen a cashier reading a National Geographic, though. You know you should err on the side of caution, especially in uncharted waters, but that Snickers candy bar you have been eyeing looks awfully good.\n                            [i]what do you do?[/i]\n                            *choice\n                             #Steal the candy bar\n                              *set health %+20\n                              health: ${health}\n                              You've lost count of how many candy bars you've stolen without issue. This time is no different. The cashier doesn't suspect a thing, or doesn't care about a candy bar, so you walk out with your pocketed Snickers and consume it with relish in the Amigo. It pales in comparison to Mason's shish kabobs, but it's filling. \n\n                              [i]what now?[/i]\n                              *choice\n                               #Go to the pool\n                                *goto pool\n                               #Go for a joyride\n                                *goto joyride\n                              \n                             #Buy the candy bar \n                              You have a few dollar bills on you, so you decide to buy the candy bar. It's better not to chance stealing when you don't know a thing about National Geographic readers. \n          \n                              \"Good afternoon,\" you say and the cashier drops his magazine.\n \n                              He forces a smile. \"Just the candy bar?\"\n\n                              You nod. \"Just a little peckish,\" you say, and you immediately wish you'd used a different word, for peckish seems to trigger the words chicken and subsequently rooster in the cashier's mind. You see the cashier mouth the words, then reach under the dcounter for something.\n \n                              \"You're one of those bank robbers, ain't you?\" you hear him say from behind the counter. He could be going for a shotgun.\n                            \n                              [i]What do you do?[/i]\n                              *choice\n                               #Distract the clerk\n                                Thinking quickly, you decide that the best course of action is not to fight fire with fire, but rather fight fire with water. You think back to the sprinklers going off at the bank, and an idea solidifies in your mind.\n                                \n                                After grabbing a newspaper, you rush to the machine that is lazily turning a few gray hotdogs and pull out the oil tray with the newspaper acting as an oven mitt. After putting on a pair of sunglasses from the rotating stand nearby--just to be safe--you fling the oil tray towards a sprinkler on the ceiling. The oil works as you plan and melts the plastic of the sprinkler, setting off the entire fire system. It's raining harder inside than it has outside all day. \n\n                                In the confusion, you slip outside and drive off just as you hear sirens begin to arrive.  \n                                *finish\n\n                               #Pull out your gun\n                                You pull your gun and make for cover. It's a lucky thing you do, for the clerk wastes no time in taking aim and firing at you. \n\n                                *label C_shootout \n                                *set identity %-10\n                                You hear shotgun pellets ricochet off the Slurpee machine. \n                               \n                                You're pinned.\n \n                                [i]What do you do?[/i]\n                                *choice\n                                 #Return fire\n                                  Peeking around the corner, you find the clerk's postion. You aim blindly in that direction and fire a few rounds. \n\n                                  After a few more rounds of this back and forth fire, you her a dry click from the cashier's shotgun. \n\n                                  \"Enough! Enough!\" you hear the clerk cry out. \"I'm sorry!\"\n \n                                  [i]What now?[/i]\n                                  *choice\n                                   #Make your escape\n                                    You waste no time, afraid the cashier might be reloading his gun. You spint from the store and get into the Amigo. Only after speeding off do you allow yourself a breath. \n \n                                    Sirens can be heard back in the direction of the store. \n                                    *Choice\n                                     #Return to Wesley\n                                      *finish\n                                    \n                        \n       \n                                   #Teach the clerk a lesson\n                                    *set identity %-100\n                                    Identity: ${identity}\n                                    You make your way to the counter, wanting to teach the trigger happy cashier a lesson. Finding the man flat on his back, cradling his empty shotgun like a teddybear, you say, \"Give me a reason I should let you live.\"\n \n                                    The man rocks back and forth, whimpering in fear. \n\n                                    Soon, he's not the only one afraid, for you hear and see approaching cops. The police cars pull up to the front of the store and the officers exit with their pistols drawn. \n   \n                                    This is it. They'll pull you in for questioning and track the Amigo's plate back to Mason and his house, finding the others.  \n\n                                    Your identity has been comprimised. \n \n                                    *image rooster.png \n                                    \n                                    [i]Will you start again or go back to the last checkpoint?[/i]\n                                    *choice\n                                     #Start over from the beginning\n                                      *goto_scene end\n                                     #Checkpoint\n                                      *set identity %+100     \n                                      *goto C_shootout\n\n                              \n                               #Run\n                                You run, and you're nearly to the newspapers by the front door when you hear a gun shot. Bags of Corn Nuts and Swedish Fish explode around you and you dive to the floor, where you pull your gun. \n                                \n                                Another shot rings out. More candy showers you. \n                               \n                                You mange to make your way to the cover of the Slurpee machine. \n \n                                *goto C_shootout\n\n                               #Convince the clerk otherwise\n                                You hold your ground. \n\n                                The cashier stands once more, this time holding a shotgun that he points at you.\n \n                                It isn't hard to act terrified as you actually are. \"What are you doing, sir?\" You hold up the candy bar. \"I just want to buy a snickers.\"\n\n                                The cashier loses conviction and lowers his gun.\n\n                                \"I'm really sorry, mister. The bank up the way was just robbed, and I--well, i don't know. I just though you were involved for somereason.\"\n\n                                \"If I robbed a bank,\" you snarl, \"do you think I'd stick around for a snack?\"\n \n                                \"No, sir.\" The cashier looks worried. \"Please don't tell my boss. Just take the candy bar. On me.\"\n\n                                You nod and back away, towards the door. When you feel the front door and hear the jingle of the bell above it, you dash for the Isuzu Amigo. \n                                *choice\n                                 #Return to Wesley\n                                  *finish\n                             \n\n                           #Go to the pool\n                            *label pool\n                            Despite it being overcast and foggy, you decide that a swim is a good idea. You can't help but wonder if you have a fever to want to do such a thing, but you drive to a pool anyway. \n  \n                            The place is empty. Not even a lifeguard is to be found. \n \n                            [i]What now?[/i]\n                            *choice\n                             #Dip your hand in the Water\n                              *set sanity %-30\n                              sanity: ${sanity}\n\n                              After you walk to the pool's edge, you stoop and dip your hand in the cool water. It's too cool to go for a swim in, but you realize you wouldn't want to even if it were warm, for you suddenly see something swimming in it. \n \n                              You nearly tumble backwards, and the blue refracted blob swims up to you. It's a swordfish, you relize, no less confused, as it pops it's beak out of the water and rests on its fin on the concrete edge of the pool. \n\n                              In the swordfish's mouth is a cigarette that burns despite being wet. The creature says, with a huge puff of smoke, \"You don't belong here. Go home.\"\n                       \n                              You nod, for that is all you can do. After collecting yourself, you make your way back to the car and head toward's Mason's house. \n                              *finish\n                             \n                             #Return to Wesley\n                              You decide that the pool was a silly idea after all, and head back towards Mason's house. It's been long enough.\n                              *Finish\n\n                            \n\n                           #Go for a joyride\n                            *label joyride\n                            You decide to take the Isuzu Amigo out for a joyride. It's no sportscar, but you imagine you can still have fun in it.  \n                            \n                            Once you find a long stretch of road that seems to have virtually zero traffic, you slam on the gas petal with your foot. The Amigo manages to get up to eighty miles per hours. It rattles, probably in need of an alignment, but that only adds to the excitement.\n     \n                            You only cease having fun when you catch sight of a police car behind you, with its lights flashing and siren blaring. \n\n                            Theres a crackle on the police crusier's PA system and then you hear the officer say, \"Pull over.\"\n\n                            [i]What do you do?[/i]\n                            *Choice\n                             #Drive into the dry ditch\n                              *set health %-10\n                              Health: ${health}\n                              You don't let up on the gas, and as soon as you see an entrance to a dry concrete ditch that runs alongside the road, you take it. It's a bumpy landing, but the Amigo's suspension proves strong enough to handle the fall. The cop doesn't trust his own car to make the jump, it seems, for he does not follow you.  \n                             \n                              You feel something drip down over your forehead. Touching your fingers to it, you realize it's blood. That's when you feel the pain. You must have hit your head during the landing. With the adrenaline wearing off, you can feel that now. \n                              \n                              Deciding that you've had enough fun for the day, you make your way to the second nearest exit and then towards Mason's house. \n                              *finish\n                             #Shoot at the officer\n                              You grab your pistol and check to make sure you have it fully loaded, then roll down your window. Peeking back at the officer tailing you, you can see that he is older, probably three times your age. Experienced.\n                              [i]Before you take aim, what is your target?[/i]\n                              *choice\n                               #The officer\n                                *set Conscience %-20\n\n                                You get a strange urge to shoot at the officer himself rather than the wheels of his vehicle. It's out of character for you, but desperate times call for desperate measures. You aim and tug your trigger as you see the widening of the officers eyes. \n\n                                He ducks as the bullet blows through the windshield and leaves a hole right where his head was. If he didn't react as fast as he did, you would have killed him and the guilt suddenly feels heavy on your conscience. The heat of the moment kept the guilt at bay for a second, but no longer. \n \n                                The officer pulls off to the side. He's probably calling in your plates. It won't be hard for other cops to locate a flamingo pink car, so you decide to hurry back to Mason's house. \n                                *finish\n \n\n                                \n                               #The front tire\n                                You have a pretty clean shot of the police cruiser's tire even though he has begun to swerve, probably trying to get to his own gun after seeing you aim yours in his direction. You fire and see the sparks of the bullet hitting the pavement near the tire.\n\n                                Nevertheless, the officer pulls off to the side. He's probably calling in your plates and keeping himself safe. It won't be hard for other cops to locate a flamingo pink car, so you decide to hurry back to Mason's house. \n                                *finish\n                             \n                         \n\n\n                     #Grab a plate and eat\n                      *label plate_eat \n                      *set trust %-10 \n                      *set conscience %-10\n                    \n                      Trust: ${Trust}\n                      Conscience: ${conscience}\n\n                      Before Mason has even put the tray of skewered beef down you've grabbed a piece and stuffed it in your mouth. It's savory and perfectly grilled, with the juices held inside.  You reach for the mushrooms, bell peppers, and onions... wait, where are the onions?\n\n                      \"Where are the onions?\" you demand through a mouth full of meat.\n\n                      \"I didn't expect anyone to eat with such vigor,\" Mason looks down the bridge of his nose, over his thick-rimmed glass at you. It's how you imagine your father would look at you had you ever had the chance to meet the man. Mason pulls the plates away when you reach for more. \"Go check on Wesley and give my wife a hand while I clean the grill. The man is dying, for goodness sake.\"\n                      *choice\n                       #Help Melissa with Wesley\n                        *goto melissa\n                       #Return to Narsico on the hammock\n                        *set Conscience -10\n                        Conscience: ${Conscience}\n\n                        \"Melissa needs help,\" you say to Narsico in an attempt to get him to go help in your place. You feel bad about not jumping to help your friend, but that hammock looks awfully comfortable.\n\n                        Narsico swings slightly while holding his Stag mask in both his hands. He doesn't respond to you, just mumbles to himself, \"I've been wearing masks my whole life.\"\n\n                        [i]What now?[/i]\n                        *choice\n                         #Repeat yourself\n                          *set Conscience %-5\n                          Conscience: ${Conscience}\n\n                          \"I said, Melissa needs your help, Narsico.\"\n\n                          \"Huh?\" he jumps as if being startled awake and mumbles something inaudible and waves you off.\n\n                          You realize he isn't going to be moving and that you ought to go help Melissa with Wesley.\n                          *choice\n                           #Go help Melissa with Wesley\n                            *goto melissa\n                           #Run, run, run away\n                            *set sanity %-100\n                            Sanity: ${sanity}\n\n                            Suddenly in the grip of panic, you run, run, run far way from Mason's pleasantly pink house. Away from Narsico, away from Mason and his wife Melissa. Away from the wounded Wesley. Away from the beautiful Bonnie. You feel guilty, but also overwhelmed. Bank robbing might be lucrative, but it's just so stressful. Too stressful! You can't handle it.\n\n                            Houses pass as you sprint, neighborhoods when you slow to a jog, miles as you begin to walk. You're in a strange part of town, but you can take a guess which way your apartment is, so you head that direction.\n\n                            In the midst of the fog, it's hard to see much, and cars come in and out of view as if teleporting. Then you hear a tap of claws on concrete. The sound approaches. Nearer and nearer it comes, until you can make out a four legged animal just in front of you. A dog.\n\n                            The dog passes, and it wouldn't be such a strange sight if that dog didn't say in a husky voice, \"Hungry, hungry, I wish to eat of you.\"\n\n                            You return to a sprint until the talking dog can no longer be seen in the fog, as which point you slow to a stop, grip your knees, and try to catch your breath which seems to have fled from you. The cool air stabs at your lungs. You can't get enough air, and another wave of your panic attack is upon you. \n\n                            It's happening again, you think. Ever since you were a child there have been times when the world ceases to make sense. Sometimes it lasts just a moment and other times it last much longer. \n\n                            You stumble through the streets seeing weird things, like a pack of bipedal cats with puffy pompadours and top hats in the back alleys, and weirder still: a walking skeleton in a poncho and sombrero. If you didn't have to see where you were stepping to avoid the loose cobblestones that suddenly appear underfoot in place of the concrete, you'd close your eyes and plug your ears.\n\n                            \"It's too much,\" you pant. \"Too much!\"\n\n                            Then, just as you're about to give up hope, you see it. A neon light. A familiar one, for it's a neon beer advertisement that belongs to the bar positioned below your apartment building. You see a man big enough to be a competitive eater stumble out of the bar and vomit a rainbow on the sidewalk. Stepping around the mess and ignoring the man's apology, you clamor up the stairwell of your apartment building and unlock your apartment door. All the halls and the stairwells seemed warped, but you made it. \n\n                            Inside, the world goes quiet. You start to feel a bit better as you look around at the normalcy of the apartment. You see the bamboo plant on your counter is just that and not some twisting tree looking to crush you, and that your run sack, a patchwork duffle bag stuffed with essentials, is ready to go.  \n                          \n                            You can't go back. Forget the money. Forget the crew, and Bonnie Loren, too. You'll start a new life again, in a town where no one knows your name, and fewer still know your tricks. A place without fog, and one that will offer a little clarity and maybe a therapist.\n                            *achieve insanity1\n\n                            *image insanity_trophy.png\n\n                            [i] Congratulations! You've found the secret ending number 1. Play again and see if you can make it to the official ending. Also try to find the other two insanity endings.[/i]\n                            *goto_scene end\n\n\n                         #Go help Melissa with Wesley\n                          *goto melissa\n\n\n\n                 #Narsico on the Hammock\n                  *label Narsico_hammock\n\n                  You smell smoke as you approach Narsico. It's different than the smoke from the BBQ coals and you realize it is from a cigarette, as you get closer to the hammock in which Narsico lays. \n\n                  \"I didn't know you smoke,\" you say to get his attention. You watch as the smoke he blows smoothly out of his nostrils rises towards the overcast sky where is seems to disappear, and you wonder if that's how the cops who pursued you will write their reports--they simply disappeared: smoke and mirrors. \n\n                  \"I don't, usually.\" The wood support posts creak as he rolls his body towards you and Bonnie. \"It's not smart bringing her in. This is why I left Maggie out of it completely. Told her I got a gig singing for a rich man at a private party. She thinks Mason and I are playing our songs, not hiding out in Mason's pink house with a few sack of money and a dying friend.\"\n \n                  \"Wesley will be fine,\" Bonnie assures Narsico before you can. \n \n                  Narsico sucks in a breath of smoke and exhales like a dragon with a mean face to match the fire in his eyes. \"You know from your night classes, do you?\"\n\n                  \"Lay off her,\" you say, feeling a little like a white knight, but you're also fed up with Narsico's negativity. \n\n                  \"Shouldn't we tie her up?\"\n\n                  Bonnie recoils. \n\n                  \"She chose to come with us.\"\n\n                  \"Probably to turn us in once she learned the address.\"\n\n                  \"I could have just told the police Clyde was involved and they'd find you through him.\"\n\n                  \"Maybe.\" Narsico scratches his trimmed beard and twists the end of his mustache. \"I knew it was a bad idea to send you on a date with her. Why did you use your real name?\"\n\n                  Instead of answering, you decide to change the subject. \"Why don't you just play music for money? What do you call yourselves--the skeletons?\"\n\n                  Narsico's demeanor brightens a bit. \"Skeletons? No. We aren't Felipe Femur, we're the Skeletones with an E. Get it? It's a play on words.\"\n\n                  \"Yeah,\" you say, \"I get it. Clever.\"\n\n                  Narsico isn't quite fooled by your softened sarcasm. \"Well, more clever than what Mason wanted us to be called. He wanted me to shave my beard and leave only a mustache while he'd grow one on that baby smooth face of his, and we'd call ourselves the Prinstaches.\"\n\n                  \"Like princesses with mustaches?\" You laugh and look at Bonnie for her reaction and see her biting back a smile as well.\n\n                  \"I like that one,\" she says. \n\n                  \"No way!\" Narsico sits up and plants his feet on the ground and puts out his cigarette in a porcelain ashtray shaped like a swordfish. He closes his eyes and mouths the band name a few times silently. \"Yeah, actually. I guess maybe that wouldn't have been such a bad name after all. Still, I like the Skeletones better. Doesn't require me to wear a tiara.\"  \n\n                  \"We were actually interested in why you decided to rob banks,\" you confess.\n\n                  \"Oh yeah?\" Narsico rubs his face, roughly with both hands. \"Well, you probably don't know this about me, kid, but I used to perform as a Lucha libre wrestler during the weekends at a hotel I used to work maintenance for.\" He turns his attention to Bonnie. \"I took college course at night too, once. Got my degree and guess what? It got me nowhere but a four year delay in the work force. It was a lie. Now, nursing is smart. No doubt. Hard work, but a smart choice, yet everyone always told me to be what I wanted to be, but there are so few jobs now that was always an impossibly.  You think the professors would be teaching rather than practicing if there were enough jobs? No. I didn't realize that either until it was too late. On top of that disappointment, all my workforce managers took everything out on those beneath them. I had enough and quit. When my father passed away I inherited his estate: a small cabin, but try as I might, I couldn't live off the land. Too many expensive hunting permits, and too few animals to hunt. Plus, too many people bleeding the world dry. Money is the new beast to hunt, and banks are the biggest game of all, so here I am.\"\n\n                  \"Anyway,\"  Narsico sighs, \"You mind pissing off for awhile?\"\n\n                  \"Uh, sure.\"\n                  *choice\n                   #Visit Mason at the BBQ\n                    You head over with Bonnie to the BBQ and see Mason flipping skewered meat and vegetables. He grins politely when he sees you approaching. \n\n                  \"Quite a day,\" he says. \"Hope Wesley will pull through. Any updates from the missus?\"\n\n                  \"No, not yet,\" you say. Gesturing at Bonnie with your hands, you add, \"I don't believe you've formally met Bonnie.\"\n\n                  \"Bonnie, is it? Mason. Pleasure.\" Mason shakes her hand and chuckles. \"What got you into this shady business?\"\n\n                  \"Fate.\" She looks deep in your eyes, and you feel a tickle in your belly--butterflies fluttering. \n\n                  \"Fate, a cruel mistress.\" Mason nods. \"Kingsford,\" he say, seeing you gaze as the black coals, as you think about all those Christmases where you didn't even receive so much as a lump of the stuff. No presents, no coals, nothing.  \n\n                  \"We were curious what got you into the business yourself,\" you confess.\n\n                  \"Me?\" Mason looks up from the low flame of the coals. \"Long story short: circumstance. I grew up and had a first wife in the beautiful state of Hawaii. Friends there, too. Had to move here for reasons that don't much matter now.  I got tired of a nine to five here on the mainland. I got tired of seeing the unmoving photograph of a Hawaiian beach in my office rather than feeling the tide lap at my bare feet in person. I was tired of laying people off so the shareholders and guys up top could buy a third airplane or a pony that their spoiled daughters would only neglect. I decided to join this crew when Narsico approached me about it. At first, like any reasonable person would, I laughed it off as ludicrous, then my company decided to stop covering health care benefits, and also had me lay off more hardworking employees to simply see that profit line rise a tick. It's like when the body freezes, it shuts down blood flow to the arms and legs. Well, the thing is, you need those extremities to make your way out of the blizzard, and the company needed those men and women to meet deadlines. That's the problem with capitalism; you can only grow so far before you reach the end and that profit line stops rising. Anyway, pretty soon, it was my head on the chopping block, so when I found out my old company kept most of their money in the bank branch we just robbed, I called Narsico up and told him I was game. Seemed like a sign. It wasn't stealing from the company directly, but it still felt good.\"\n                  \n                  \"I know how you feel, even as young as I am.\" Bonnie pats Mason on the arm. You almost expect such a gesture to be awkward, but she moves gracefully, and the intention comes off as genuine. \n\n                  \"I don't doubt it,\" Mason says. \"You young ones got it worst than the rest of us. You have to deal with our mess. Our generation's mess, at least.\" He pulls the meat off the grill rack. \"Food is ready.\"\n\n                  \"Can I get someone in here?\" you hear Melissa call. \n\n                  [i]What do you do?[/i]\n                  *choice\n                   #Help Melissa with Wesley\n                    *goto melissa\n                   #Grab a plate and eat\n                    *goto plate_eat  \n\n\n               #\"I'm scared, yeah.\"\n                *set trust %+10\n\n                trust: ${trust}\n\n                \"To be honest,\" you say, demurely, \"I'm scared. I think we all are. High-risk-high-reward business and all.\"\n\n                Bonnie lets out a laugh. \"It's a relief to hear you say that. You all seem so cool with breaking the law, but I guess you're human after all, huh?\"\n\n                \"Just trying to survive.\" You stare at your shoes, a little ashamed. \n\n                \"Is that everyone's reason for doing this?\"\n\n                You realize you don't really know why everyone else is robbing banks. For you, it's what you're good at: crime. That was your first bank, but you've held up 7 Elevens when you were hungry, stolen bread, conned the rich, had sugar mommas, stolen cars, and wallets, and all sorts of things under the crime umbrella. \"I don't know. For me, I do it to survive. The others... well, maybe we should ask them, huh? It'll let you get to meet everyone and take our minds off Wesley for a moment until we know if he's going to make it.\"\n\n                \"Sure.\" Bonnie claps once. \"Who should we talk to first?\"\n                *choice\n                 #Mason at the BBQ\n                  *goto grill_mason\n                 #Narsico on the Hammock\n                  *goto Narsico_hammock\n\n\n             *selectable_if (persona >54) #Look on with worry\n              *set persona 65\n              *set trust %+10\n\n              trust: ${trust} \n\n              *label concern\n              For once, you don't know what to say. You simply look at Wesley with concern and recite a silent prayer to yourself in hopes it'll help Wesley pull through. But it seems Wesley thinks prayers are just wishes without birthday candles because he furrows his brow, annoyed, and says, \"You're boring holes in me with that look. I'm glad for your concern, but what I could really use is a distraction.\"\n\n              An idea hits you. \n\n              *goto dum_dum\n\n             *selectable_if (persona \u003c31) #Tap your foot, impatiently\n              *label tap_foot\n              *set persona 30\n              You tap your foot impatiently. Looking up you see everyone is looking at you with matching faces of annoyance. You stop immediately. \n\n              \"Am I keeping you, lad?\" Wesley looks at you, bothered. \"How about you wait outside if you're not going to do anything productive?\"\n\n              Embarrassed, you turn to leave. You pause at the door when you get an idea. \n              *goto dum_dum\n\n           #Carry Wesley Inside\n            *set trust %+20 \n            *set conscience %+10\n            *set persona 80\n            Trust: ${Trust}\n            Conscience: ${conscience}\n\n            \"Wesley was shot,\" you say to Mason's wife, Melissa. \n\n            She quickly puts down the drinks in her hands and replaces her happy face with a look of concern. \"What happened?\" you hear her ask but you're already moving to the back of the van, where you pop open the doors and wrap your good arm around Wesley's ankles. You lock eyes with Bonnie and share a smile with her to tell her it's going to be all right. \n\n            \"On the count of three,\" Mason says. He fixes his thick-rimmed glasses to be more snug on his nose, then grips one side of Wesley's upper body.\n\n            You worry about Mason's knees, as he's older than the rest of you, maybe fifty, and compared to the younger, far more muscular Narsico, out of shape. Mason is probably stronger than you, as you're thin and more about agility than brunt force, plus your arm has been shot, but his joints look to pain him. \"You got him, Mason?\"\n\n            Mason nods. \"One. Two. Three. Lift!\"\n\n            You stumble a few times, but Narsico picks up your slack, and together you make it to the guest bedroom where Melissa has peeled back the blankets and laid down towels. \n\n            With a series of grunts and groans you all get Wesley situated and Bonnie comes in with Melissa in tow, carrying a large first aid kit. It looks to be the bomb shelter type, stocked with enough supplies to run a small hospital. \n\n            *choice\n             #Entertain Wesley to distract him\n              *goto dum_dum\n\n             *selectable_if (persona >54) #Look on with worry\n              *set persona 65\n              *goto concern\n\n             *selectable_if (persona \u003c31) #Tap your foot, impatiently\n              *goto tap_foot\n\n\n\n       *selectable_if (conscience \u003c40) #Hesitate\n        You hesitate.\n        *goto panic\n\n\n     #Increase speed\n      *label increased_speed\n\n      You get a better grip on the steering wheel with your good hand and wait until the police car comes up beside the van. You slam the gas pedal to the floor, and slowly the van accelerates. With so much weight it a slow gain, but eventually the cop car is left behind and enveloped in the fog, but before you know it you see more red and blue lights approaching, as the cop car catches up to your van.  \n\n      You could try to ram the police cruiser and risk hurting someone, or try something else. \n\n      [i]What now?[/i]\n      *choice\n       #Ram the car\n        *goto ram_car\n       #Take a Sharp Turn\n        *goto sharp_turn\n       #Panic\n        *goto panic\n\n     *selectable_if (identity \u003c40) #Panic\n      *label panic\n      *set identity %-100\n      Identity: ${identity}\n\n      You panic and take a left turn... straight down a dead end cul-de-sac. \n\n      Before you have a chance to turn the van around you are blocked in the by a police cruiser, then two more. \n\n      You hear an officer shout over a megaphone, \"Step out with your hands up!\"\n\n      You sigh and don't have the courage to look at your team's heartbroken faces except for out of the corner of your eye, as you step from the car with your arms raised as high as you can manage. \n\n      You see a crowd of cops' faces, and you know they all see yours. \n      *achieve lostidentity \n      *image rooster.png\n\n      [i]Will you start again or go back to the last checkpoint?[/i]\n      *choice\n       #Start over from the beginning\n        *goto_scene end\n       #Checkpoint\n        *set identity %+100\n        \n        *goto increased_speed\n\n      \n\n\n\n *selectable_if (Conscience \u003c42) #Surrender\n  *gosub end_trial\n  *set identity %-100  \n  Identity: ${identity}\n\n  You surrender. You simply remove you Rooster mask and put your hands in the air.\n\n  [i]What did you think would happen?[/i]\n  *achieve lostidentity \n  *image rooster.png\n\n  [i]Will you start again or go back to the last checkpoint?[/i]\n  *choice\n   #Start over from the beginning\n    *goto_scene end\n   #Checkpoint\n    *set identity %+100     \n    *goto outside_street_1\n\n*label end_trial\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n  *label purchased\n  *return\nRemember earlier how we told you that the first two chapters are available for free? This is the end of the free content.\n\n[b]To find out what happens next, please purchase the remaining chapters.[/b]\n\n*purchase adfree $3.99 purchased\n*abort", "journey": "Upon arrival to Mason's house, and after exiting the vehicle, you join up with Narsico and Bonnie who you find standing by a bush near Mason's street. You can hear sirens and see the blue and red lights flashing off the pale paint of the surrounding houses. The fog has returned making it relatively easy to keep hidden. \n\n\"What's happening?\" you ask.\n\nNarsico Jumps. \"You scared me.\" He collects himself. \"Looks like the police are searching the perimeter of Mason's house. Wesley, Mason, Melissa--they're probably in custody. And the money.\"\n\n\"Will they talk?\" Bonnie asks. She bites her nails, obviously worried that her brief stint in the life of crime might be coming to an abrupt close.  \n\nAn idea strikes you. \n\n\"They won't have a chance,\" you say. \"We're getting them out of there.\"\n\n\"We are?\"\n\n\"Of course we are. We stole money, we can steal away our friends. That's your bandmate in there.\"\n\nNarsico pulls out his gun. \"You're right.\"\n\n\"Whoa, hold up.\" You place a hand on Narsico's shoulder. \"Let's not rush in there like... like.. like I don't know, but let's not rush this. We have time. You stay here and collect intelligence. Bonnie and I will go get our escape vehicle.\" \n \n\"Barbie's minivan not going to cut it?\"\n\n\"Not with Wesley injured as he is.\" You gesture for Bonnie to come with you as you begin to walk away. \"Use the radio or a prepaid if there is any big changes occur, Narsico.\" \n\n\"Copy that,\" he says and there seems to be a great sadness in his voice. \"Over.\"\n\nYou and Bonnie head plan to grab Wesley's RV. \n \nHow do you plan to get there?\n*choice\n #Drive the pink Amigo\n  It's a risk taking the flamingo-pink Isuzu Amigo, but it'll save you a lot of time and time is something you're running short of. It's foggy and overcast and yet the Amigo is bright like a neon light in the dark, yet you see the SUV as a friend lending a helping hand, or rather four wheels that can spin faster than you can walk. \n\n  You concentrate on the distance as you drive, keeping an eye out for cops, so when Bonnie asks you a question you nearly jump in surprise. \"What's the plan, Clyde?\" Hearing her use your name has a calming effect. You become relaxed enough to lay out the plan for her.\n\n  \"Simple.\" You pause, feeling the silence cut through you. \"Simple, but dangerous. Maybe you should hang back.\"\n\n  \"No. I want to help.\"\n\n  \"Why?\"\n\n  \"I don't know.\" She twists her hands in her lap. \"My daddy was an outlaw, a burglar and smuggler, so I guess it's in my blood. Momma used to tell me stories about him. She'd try to tie a moral into the end of each story and tell me what he did, and the work he was into, was bad and that I should never go down that path, but I could always see a certain kind of pride in her eyes as she talked about him. A little jealousy, too. She wanted to be like him, but she had to take care of me--or maybe she just didn't have it in her.\"\n  *page_break\n\n  \"Maybe she was a smart woman to stay of crime,\" you say, playing devil's advocate. \n\n  \"She wasn't all that smart. Kind and beautiful, but not smart. She got bitter and always seemed bored, though, like her mind was flying free while her body stayed safe in our suburban home. Kind of like the G.I. Joes I used to play with. I could keep them mint condition in the box, but they weren't any fun that way.\"\n\n  You laugh and Bonnie asks you why.  \"I'm just surprised is all. Guess you have thought this through more than I gave you credit for.\"\n\n  \"I've been dreaming my whole life. Just like my mamma. I don't want to stay in the box. I want to have a little fun.\"\n\n  \"All right, then.\" You smile and wink at Bonnie. \"Let's have a little fun.\" You lick your lips in preparation of telling Bonnie the plan. It sounds more stupid the more you think about it, but you say it aloud anyway. \"Like I said, it's simple. We grab Wesley's RV. Radio Narsico to make some noise around the back of the house. Pull up, get everyone into the RV, then swing back around for Narsico.\"\n\n  Bonnie crosses her arms. She seems unimpressed, and honestly you're wondering how good of a chance at success you actually have. \n\n  Bonnie says, \"They'll just blow the tires with a spike strip.\"\n  *choice\n   #\"Not if we have a hostage\"\n    \"Not if we have a cute young hostage to make them second guess their actions.\"\n\n    You can see Bonnie piecing together your sentence after her initial outburst of, \"I am not a hostage!\"\n\n    \"They don't know that.\"\n\n    \"But what if--\" Bonnie cocks her head to the side and looks you in the eyes.  \"Hold on. You think I'm cute?\"\n\n    \"Did I say that?\" You act coy. \"Must have just slipped out--\"\n\n    You stop mid sentence as you see a dog leap out in front of the SUV. You swerve to avoid it, but in doing so, you run over a fire hydrant. You try to reverse after collecting yourself and making sure Bonnie is OK, but the car is stuck, and what's worse, it's being pumped full of water. \n\n    You have to get out before the accident draws attention, plus staying would likely lead to drowning.\n\n    \"That dog came out of nowhere. I--\" Bonnie stops mid sentence. \n    *goto dog_pack\n\n\n   #\"Not if we're quick enough\"\n    *set trust %-10\n    Trust: ${trust}\n\n    \"Not if we're quick enough.\"\n\n    \"Don't be silly. How fast can an RV be? We can't outrun the radio. They'll just call ahead to the next county if we even make it out of this one.\"\n\n    \"Good point,\" you admit.  \"It's a good thing we have a cute young hostage to make them second guess their actions.\"\n\n    You can see her piecing together your sentence after her initial outburst of, \"I am not a hostage!\"\n\n    \"They don't know that. Not for sure.\"\n\n    \"But what if--\" Bonnie cocks her head to the side and looks you in the eyes.  \"Hold on. You think I'm cute?\"\n\n    \"Did I say that?\" You act coy. \"Must have just slipped out--\"\n\n    You stop mid sentence as you see a dog leap out in front of the SUV. You swerve to avoid it, but in doing so, you run over a fire hydrant. You try to reverse after collecting yourself and making sure Bonnie is OK, but the car is stuck, and what's worse, it's being pumped full of water. \n\n    You have to get out before the accident draws attention, plus staying would likely lead to dr
