    You take aim and shoot at a vending machine near the entrance. Even though you feel as if the world is moving in slow motion, you can't see the bullet, but you realize when the man falls heavily to the ground that your bullet ricocheted off the metal of the vending machine and stuck him in the shoulder. \n                 \n               The man is wounded, but he'll likely survive. \n                \n               The man made a conscious choice, despite warning, and he is now dealing with the consequences. You didn't mean to hit him, but you feel horrible about it. \n                 \n               \"Listen up,\" you hear Zebra boom from his place on top of the teller counter, he shakes his head, but makes the best of the situation by capitalizing on the new sense of fear that infects the hostages. \"The next one of you who runs is going to have to race a bullet to the door, as well. This one might be aimed at your head. Also, anyone who makes a cell phone call from this location will trigger a bomb,\" he lies. \"So think twice about doing so.\" He hops down as Marlin and Stag corral everyone together. Many of the hostages are crying now.  \n                 \n               *page_break\n\n               \"You're starting to seem like a loose cannon. That gunshot will have alerted those outside, and the police will be more zealous in trying to find a violent burglar than a passive thief. Use your brain not your bullets.\" Zebra pats you on the back. \n\n               Suddenly, you remember that you left Bonnie in the vault. Alone. She could have already alerted the authorities somehow, pressed a panic button, used a hidden phone, or communicated through the camera to an outside agency. Your stomach drops and you quickly leave the others without a word as they regain control of the hostages. You need to see how much damage Bonnie has done. \n\n               Coming around the bend of the vault door you gulp and take a deep breath and hope the crew won't go too hard on you, and that if they do you'll be able to trade your pudding in prison for some kind of protection from them. \n\n               You spot Bonnie as you enter the vault. She has obviously been busy since you left her, but not in the way you thought. Nearly half of the deposit boxes are opened with a large pile of valuables on one side, and on the other, the useless scraps of paper and sentimental items. \n\n               *goto vault\n           \n              #Tackle him   \n               *goto tackle\n\n\n\n\n         #Let her pick something off your ballistic vest\n           *set Identity %-10\n           \n           *set persona 65\n\n           You feel a warm tingle climb your spine as Bonnie reaches out and pulls a hair off your ballistic vest. A uniquely red-brown hair. She studies it for a moment and you realize she might recognize it as Clyde Lamm's. Yours. Her eyes begin to expand with knowing and she reaches out again, this time towards your mask, but you see it coming and catch her hand, tossing it away with little force. \n\n           \"OK! OK.\" Bonnie submits and backs away from you. \n\n           You make sure that your mask is secure, for you still see that look in Bonnie's eyes that hints she might plan to remove it. You look around the vault and see a camera you hadn't noticed before, and know, with a sinking feeling, that that could have been the end for you. You say, \"I told you not to try anything funny, now didn't I?\" \n\n           \"Yes, sorry.\"\n\n           \"Apology accepted,\" you say coolly and hand her the crowbar, \"this time... Now keep going.\"\n\n           As she returns to her work of prying open deposit boxes, you speak into your radio. \"We got at least $40,000 in cash with this one box, and at least double that in gold and jewels.\"\n\n           \"Excellent!\" You hear Zebra say. \"That's good enough, I'd say. These folks are getting antsy and so am I. The cops could be on their way. Who knows if these hostages have people waiting for them out in their cars, people who are growing worried? We've had two wander into all this already. Let's pack up.\" \n\n           \"It's no million,\" you hear Stag say, \"but it'll have to do for now.\"\n\n           What says you?\n\n           *choice\n            #You have enough\n              \"You're right. We have enough,\" you say. \n\n              \"Agreed,\" Marlin says. \"Over.\"\n\n              \"Marlin, again, you don't have to--\" You hear a commotion from Stag's end of the radio, \"--we've got a runner!\"\n\n              \"Stop him!\" you hear Zebra shout so loud it echoes in the vault without him even using the walkie-talkie. \n\n              You rush to the vault entrance and there you see the man leaping towards the entrance of the bank. He's almost soaring. You need to think quickly. A warning shot would be quickest, but probably the most dangerous solution, but if he gets away that could be very bad for you all, and who knows how much fight he's got in him if you go hands on.\n\n              What do you do?\n              *choice\n               #Shoot a warning shot\n                 *goto shot_1\n               #Tackle him\n                 *goto tackle\n               #Let Him go. You're almost done anyway.\n                 *goto let_go\n\n            #Keep going for more\n              *set trust %-20\n              Trust: ${Trust}\n\n              \"I think we should stay for more,' you say.\n\n              \"Do you want to get caught?\" Zebra asks. \"Know your limits, lad.\"\n\n              \"Seriously. Ignore Rooster. He's the green horn. Let's get--\" You hear a sudden commotion from Stag's end of the radio, \"--we've got a runner!\"\n\n              \"Stop him!\" you hear Zebra shout so loud it echoes in the vault without him even using the walkie-talkie. \n\n              You rush to the vault entrance and there you see the man leaping towards the entrance of the bank. He's almost soaring. You need to think quickly. A warning shot would be quickest, but probably the most dangerous solution, but if he gets away that could be very bad for you all, and who knows how much fight he's got in him if you go hands on?\n\n              What do you do?\n              *choice\n               #Shoot a warning shot\n                 *goto shot_1\n               #Tackle him\n                 *goto tackle\n               #Let Him go. You're almost done anyway.\n                 *goto let_go\n\n\n            *selectable_if (persona \u003c46) #Nothing. Sneak out with the cash      \n             *goto sneak\n\n         *selectable_if (persona \u003c41) #Puff out your chest, muscle man\n           *set Identity %-100\n           *achieve lostidentity\n           \n           You puff out your chest. Despite being in the middle of a heist, you want to make a good impression on the pretty young lady. \n\n           Bonnie cocks an eyebrow at your strange behavior, then plucks what seems to be a hair from your chest, examines the unique reddish-brown color of it for a moment as you just stand there numbly, and then promptly snatches your Rooster mask from your head. Before you even realize what's happened, Bonnie has brought a hand to her mouth is a mix of surprise and disillusionment. She points to a camera you didn't see on your way in. \n           *achieve lostidentity   \n           *image rooster.png\n\n           Your identity has been compromised. \n               \n           [i]Will you start again or go back to the last checkpoint?[/i]\n           *choice\n            #Start over from the beginning\n             *goto_scene end\n            #Checkpoint\n             *set identity %+100\n             *goto checkpoint_1\n             \n\n      *selectable_if (persona \u003c41) #Attack Stag with the crow bar\n\n       Consumed with a sudden anger, you pick up the crowbar that Stag tossed you and then chase him back into the main lobby of the bank. What kind of disrespectful person just tosses a crowbar at you, you fume?\n\n       Stag is twice your size, all muscle from his lucha libre fighting days, but he's short a crowbar and your quick movements. It'll be a tough fight, though.\n\n       [i]Do you really want to fight him?[/i]\n\n       *choice \n        #Yes. Hit the gun from his hand\n         *set trust %-100\n         Trust: ${trust}\n\n         \"Hey! Stag!\" you shout to get his attention. He turns towards you, his antlers flopping a little, and his whole body does the same as you use the crowbar to knock his gun from his hands. \n\n         From what little you can see under your rubber mask, you notice that a hostage grabs the gun. You're preoccupied with dodging the punches Stag is now throwing to be concerned with that, though. The hostages become restless, but you're winning the brawl. \n\n         That is until you here gun fire. Marlin, Zebra and the now armed hostage are in a firefight, but that's the least of your worries as Stag wraps a strong arm around your neck and drops you to the floor. \n\n         You can't breathe, but you can hear as the gun shots stop and Stag yells to Zebra, \"I told you he was a loose cannon.\"\n\n         \"That you did, lad.\" You hear Zebra sigh as your world begins to go black. You no longer have the strength to claw at Stag's strong arms. \n      \n         \"Maybe I'll keep choking you until you can't remember your name,\" Stag whispers in your ear. \"I always knew we couldn't trust you. You FBI? You've got to be crazy or some kind of rat. Doesn't matter. We'll be long gone before you wake up. If you wake up.\"\n\n         Blackness eats away at your vision, until you slip completely into the dark.\n\n         *image rat.png\n\n         Your team no longer trusts you.\n         *achieve rat\n         \n         [i]Will you start again or go back to the last checkpoint?[/i]\n         *choice\n          #Start over from the beginning\n           *goto_scene end\n          #Checkpoint\n           *set trust %+100\n           *goto checkpoint\n\n        #No. He probably meant no offense.\n         He probably didn't mean to be rude, you realize.You return to the vault.\n\n         *goto no_attack\n        \n\n\n  #\"What is your name then, gorgeous?\"\n    *set Identity %-50 \n    *set Trust %-20\n    *set Conscience %-10\n    *set Persona 40\n\n    Identity: ${Identity}\n    Trust: ${Trust}\n    Conscience: ${Conscience}\n    *label crowbar_1\n    \n    'What is your name then, gorgeous?'\n\n    Red scrunches her nose as she did at your Italian dinner date together when straining to remember where she might have dropped that ring you stole. She most certainly suspects that 'Rooster' is the sweet Clyde she went on a date with, the one who never called her back. 'None of your business,' she says, but you already know her name is Bonnie Loren.\n\n    'Get the keys!' Zebra shouts, and there no missing the anger in his voice. You've messed up, but you can redeem yourself, you think. \n\n    You hear the jingle of keys before you see them, as Bonnie pulls them from her blazer pocket. As soon as the girl finds the vault key on the ring, you snatch the lot of them and roughly push her aside. Inside the vault you notice it isn't what you expected. Everything is locked up in deposit boxes, and heavy safes. It's like a nesting doll of security, you realize, without humor.\n\n    'You need two keys to get in the deposit boxes,' Bonnie Loren says, then bows her head, nervous in being unable to read your reaction beneath your mask, and fearing the worst. \n\n    'Nothing's loose,' you speak into your walkie-talkie. 'I need another pair of hands.'\n\n    There's a crackle and then you hear Marlin say, calmly. 'We've got three rooms with windows to watch. Over.' \n\n    'You don't need to say 'Over' Mas- mean Marlin.' You know Stag almost said Marlin's real name, Mason, and wonder if Bonnie or anyone else could decipher the slip. \n\n    'OK. Over.' You hear Marlin again. 'I mean, OK. Just OK.'\n\n    'Get the girl to help,' you hear Stag say and then there's a clamor by the vault entrance that you know to be Stag's crowbar.\n\n    *choice\n\n\n      *selectable_if (persona >54) #Walk the crowbar over to Bonnie\n       *set persona 65\n       Not wanting to hurt Bonnie, you take the time to walk the crowbar over to her. When you reach her, you gesture for her to take hold of it. \n       *goto crowbar\n\n      #Pick up the crowbar.\n        *goto duress\n\n\n      *selectable_if (persona \u003c41) #Attack Stag with the crow bar\n\n       Consumed with a sudden anger, you pick up the crowbar that Stag tossed you and then chase him back into the main lobby of the bank. What kind of disrespectful person just tosses a crowbar at you, you fume?\n\n       Stag is twice your size, all muscle from his lucha libre fighting days, but he's short a crowbar and your quick movements. It'll be a tough fight, though.\n\n       [i]Do you really want to fight him?[/i]\n\n       *choice \n        #Yes. Hit the gun from his hand\n         *set trust %-100\n         Trust: ${trust}\n\n         \"Hey! Stag!\" you shout to get his attention. He turns towards you, his antlers flopping a little, and his whole body does the same as you use the crowbar to knock his gun from his hands. \n\n         From what little you can see under your rubber mask, you notice that a hostage grabs the gun. You're preoccupied with dodging the punches Stag is now throwing to be concerned with that, though. The hostages become restless, but you're winning the brawl. \n\n         That is until you here gun fire. Marlin, Zebra and the now armed hostage are in a firefight, but that's the least of your worries as Stag wraps a strong arm around your neck and drops you to the floor. \n\n         You can't breathe, but you can hear as the gun shots stop and Stag yells to Zebra, \"I told you he was a loose cannon.\"\n\n         \"That you did, lad.\" You hear Zebra sigh as your world begins to go black. You no longer have the strength to claw at Stag's strong arms. \n      \n         \"Maybe I'll keep choking you until you can't remember your name,\" Stag whispers in your ear. \"I always knew we couldn't trust you. You FBI? You've got to be crazy or some kind of rat. Doesn't matter. We'll be long gone before you wake up. If you wake up.\"\n\n         Blackness eats away at your vision, until you slip completely into the dark.\n\n         *image rat.png\n\n         Your team no longer trusts you.\n         *achieve loosecannon\n         *achieve rat\n\n         [i]Will you start again or go back to the last checkpoint?[/i]\n         *choice\n          #Start over from the beginning\n           *goto_scene end\n          #Checkpoint\n           *set trust %+100     \n           *goto crowbar_1\n         \n\n        #No. He probably meant no offense.\n         He probably didn't mean to be rude, you realize. You return to the vault. \n\n         *goto no_attack\n   \n  #Nothing. Just stare.\n    *set Persona 55\n\n    *label crowbar_nothing\n    You say nothing,  just stare at the girl you know to be Bonnie Loren, expectantly. When you look to the vault, then back to Bonnie and make a gesture with your hands as if you're turning a key, she seems to get the message. Your silence seems to frighten her, and you get the feeling that she doesn't suspect you're the sweet Clyde she went on a date with the week before at all. A date for her, a scouting mission for you. An enjoyable one, but still just part of the job. \n\n    The keys, you gesture again with the added emphasis of shrugged shoulders and a brandished pistol.  As she pulls the keys from her  pocket, you hear them jingle and quickly snatch them from her hands, before gesturing her to go first. Inside the vault you notice it isn't what you expected. Everything is locked up in deposit boxes and heavy safes. It's like a nesting doll of security, you realize, without humor. \n\n    \"You need two keys to get in the deposit boxes,\" Bonnie says, then bows her head, nervous in being unable to read your reaction beneath your rooster mask and fearing the worst. \n\n    \"Nothing's loose,\" you speak into your walkie-talkie, blowing your silent guy act. \"I need another pair of hands.\"\n\n    There's a crackle and then you hear Marlin say, calmly. \"We've got three rooms with windows to watch. Over.\" \n\n    \"You don't need to say 'Over' Mas- mean Marlin.\" You know Stag almost said Marlin's real name, Mason, and wonder if Bonnie or anyone else could decipher the slip. \n\n    \"OK. Over.\" You here Marlin again. \"I mean, OK. Just OK.\"\n\n    \"Get the girl to help,\" you hear Stag say and then there's a clamor by the vault entrance that you know to be Stag's crowbar. \n\n    *choice\n\n\n     *selectable_if (persona >54) #Walk the crowbar over to Bonnie\n      *set persona 65\n      Not wanting to hurt Bonnie, you take the time to walk the crowbar over to her. When you reach her, you gesture for her to take hold of it. \n      *goto crowbar\n\n     #Pick up the crowbar.\n      *goto duress\n\n\n     *selectable_if (persona \u003c41) #Attack Stag with the crow bar\n\n      Consumed with a sudden anger, you pick up the crowbar that Stag tossed you and then chase him back into the main lobby of the bank. What kind of disrespectful person just tosses a crowbar at you, you fume?\n\n      Stag is twice your size, all muscle from his lucha libre fighting days, but he's short a crowbar and your quick movements. It'll be a tough fight, though.\n\n      [i]Do you really want to fight him?[/i]\n\n      *choice \n       #Yes. Hit the gun from his hand\n        *set trust %-100\n        Trust: ${trust}\n\n        \"Hey! Stag!\" you shout to get his attention. He turns towards you, his antlers flopping a little, and his whole body does the same as you use the crowbar to knock his gun from his hands. \n\n        From what little you can see under your rubber mask, you notice that a hostage grabs the gun. You're preoccupied with dodging the punches Stag is now throwing to be concerned with that, though. The hostages become restless, but you're winning the brawl. \n\n        That is until you here gun fire. Marlin, Zebra and the now armed hostage are in a firefight, but that's the least of your worries as Stag wraps a strong arm around your neck and drops you to the floor. \n\n        You can't breathe, but you can hear as the gun shots stop and Stag yells to Zebra, \"I told you he was a loose cannon.\"\n\n        \"That you did, lad.\" You hear Zebra sigh as your world begins to go black. You no longer have the strength to claw at Stag's strong arms. \n      \n        \"Maybe I'll keep choking you until you can't remember your name,\" Stag whispers in your ear. \"I always knew we couldn't trust you. You FBI? You've got to be crazy or some kind of rat. Doesn't matter. We'll be long gone before you wake up. If you wake up.\"\n\n        Blackness eats away at your vision, until you slip completely into the dark.\n\n        *image rat.png\n        *achieve rat\n\n        Your team no longer trusts you.\n\n        [i]Will you start again or go back to the last checkpoint?[/i]\n        *choice\n         #Start over from the beginning\n          *goto_scene end\n         #Checkpoint\n          *set trust %+100     \n          *goto crowbar_nothing\n\n       #No. He probably meant no offense.\n        He probably didn't mean to be rude, you realize. You return to the vault. \n\n        *goto no_attack\n   \n\n\n*label vault\nWhen Bonnie hears you enter, she drops the crowbar and bows her head, sheepishly. She balances on a mangled pile of deposit box doors. A strand of her hair sticks to the sweat that dampens her brow. \n \n\"Guess I got carried away.\" She blushes and tucks the strand of hair behind her ear, then something flashes in her eyes--an electricity that shocks you as your two gazes meet. With an uncomfortable giggle, she says, \"Duress?\"\n\n\"Duress,\" you agree with a weak nod. You stare dumbfounded for a moment longer, then squeeze the button on your radio. \"We're going to need more bags in here.\"\n\n[i]A lot of bags[/i].\n\n\"On my way. Over.\" Marlin says after a moment. \n\nThere's got to be near a million if not more in cash and valuables piled in some heap of achievement you could have never hoped to have attained yourself. You're proud of Bonnie and, strangely, part of you wishes she could be part of your team. You almost wouldn't mind splitting the take another way. \n\n\"Wow!\" you hear Marlin exclaim as he drops a few duffle bags. He plays with the eyeholes of his mask trying to get a better view, and looking very tempted to take his swordfish mask off. \n\n*choice\n #\"Quite the haul, huh?\"\n  \"Quite the haul, huh?\" you say.\n\n  \"Better than I had hoped, for sure.\" Marlin chuckles. \n\n  As you're looking at Marlin, enjoying his surprise, the sprinkler system activates, and it's as if Marlin is a real fish then, leaping into the air during a storm. Bonnie shrieks and you tense when the cold water soaks your suit and dress pants. You suddenly feel two times as heavy and you'd like nothing more than to be done with the gig so you and go home take a hot shower, put on dry clothes, and slip into your warm bed.  \n  *goto sprinklers\n *selectable_if (persona \u003c41) #\"It isn't going to move itself.\"\n  *set trust %-10\n  Trust: ${trust}\n  *set persona 30\n  \n  \"It isn't going to move itself.\"\n\n  \"You're a rude one, Rooster.\" Mason shakes his heads and the marlin bill wobbles. \n\n  \"Yeah, well, this needs to get done,\" you say. \"So, get on it.\"\n\n  As you're staring Marlin down--Rooster to Swordfish--the sprinkler system activates, and it's as if Marlin is a real fish then, leaping into the air during a storm. Bonnie shrieks and you tense when the cold water soaks your suit and dress pants. You suddenly feel two times as heavy and you'd like nothing more than to be done with the gig so you and go home take a hot shower, put on dry clothes, and slip into your warm bed.\n  *goto sprinklers\n #Say nothing\n\n  As you're looking at Marlin, enjoying his surprise, the sprinkler system activates, and it's as if Marlin is a real fish then, leaping into the air during a storm. Bonnie shrieks and you tense when the cold water soaks your suit and dress pants. You suddenly feel two times as heavy and you'd like nothing more than to be done with the gig so you and go home take a hot shower, put on dry clothes, and slip into your warm bed.  \n\n  *goto sprinklers\n\n*label sprinklers\n\n\"What happened?\" You radio to Zebra and Stag.\n\n\"Don't know.\" You hear Stag say, and you can hear a chorus of shrieks from the men and women held hostage, as if they were witches melting in the water and not simply getting soaked. \"We were about to ask you the same.\"\n\n\"Raining outside,\" Zebra says, calmly, \"raining inside.\"\n\nMarlin has already begun stuffing cash into a bag, so you go to help him with the others. Looking to Bonnie, you see that she has grabbed two metal deposit box doors and is using them as a very ineffective umbrella. You get her attention and then gesture with your finger to the water spigots, while shrugging. \n \nShe shrugs in response. \"I don't know. Someone in the back office must have triggered the manual activation. Unless there's a real fire somewhere inside.\"\n\n\"Check the offices,\" you say into your radio.\n\n*page_break\n\nYou're growing frustrated with not knowing what caused the sprinklers to go off. It's getting much harder to breath as the running water is blocking off your few breathing holes with solid streams of water. Plus the whole rubber rooster mask is feeling slippery. You gesture again without words for Bonnie to help and she immediately sets to filling a bag. Soon the three of you have four bags full, and Marlin drags two out of the vault. His knees look to be a pain for him, but he manages. \n\n\"We had a stowaway in the manager's office,\" you hear Zebra say over the radio. \"Doesn't look like they had access to a cell phone and Stag cut the phone lines earlier. Guess she was hoping the sprinklers would call for the police.\"\n\n\"Will they?\" you ask. \n\n\"Maybe the fire department. We have to go now!\"\n\n\"OK. I got the last two bags. Coming out.\"\n\n\"Thanks,\" you say to Bonnie. \"You did great.\"\n\nShe smiles, or at least you think she does for at that moment your mask slips off, heavy with the water and slick, too. Water is in your eyes and makes it hard to see even the bags of money inches from your face. You can't feel your mask, only the floor, the cash bags, and an empty duffle bag. \n\n[i]What do you do?[/i]\n\n*choice\n  #Keep your face down and search for the mask\n   Being sure to avoid glancing at the camera or at Bonnie, you fish around for your mask. It's hard as all you feel is the destruction of metal doors and paper work. You can't imagine the mask fell that far away, and yet it's nowhere to be found. All you have is your sense of touch, for the sprinklers make it hard to see. Still, you try to open your eyes, but the water droplets between your eyelashes stretch and bend the vault lights, effectively blinding you. You see something else, too. Something blurry. Something with eyes and a mouth and a frill of red, but it isn't a rooster mask you see but rather a face. Bonnie's face.  \n\n   Stooped down and with a look of surprise on her face, you realize Bonnie has recognized you. She covers her mouth with the same hand that holds your mask. You wipe the water from your eyes, some of which might just be your own tears, for you know you've been had. That, or that you have to dispose of Bonnie, and you don't think you have the strength to do so. Then you realize that killing her would not require strength at all, but rather a great weakness. You're human and you have empathy and you will not make her suffer for your crime more than she already has. \n  \n   *label and_yet\n   \n   [i]And yet.[/i]\n\n   It isn't a look disappointment you see her expression change into from her initial surprise. No, she looks concerned. After looking left and right, as if to make sure the two of you are alone, she slips your mask back over your head. \n\n   \"But why?\" you ask, confused. Relieved, but confused. \"Duress?\"\n\n   \"No,\" she says, \"I don't believe that those who watch the camera recordings will quite believe that.\"\n\n   \"Then why?\"\n\n   \"I don't know, but you have to take me with you.\"\n\n   You feel a sudden stab of fear as you think of how the others will react to taking a hostage. Armed robbery comes with one of the longest prison sentences anyway, and every one held at gunpoint has already been a hostage. Plus, with everything else, what's a little kidnapping?\n\n   \"I suppose we will,\" you say. \n\n   In an attempt to make Bonnie's participation look more forced, you wave your gun around and tell her to pick up a bag of cash. She stifles a laugh, but does as you say, and together you drag the last two bags out of the vault towards the others.\n   *choice\n     #Exit the vault\n      *label exit_vault\n      Together, you and Bonnie drag the heavy bags of money from the vault to the bank counter where Stag, Marlin, and Zebra are waiting, watching the windows, doors, and the hostages. Your stomach again knots seeing the emotionless faces of their deer, swordfish, and zebra masks. They turn and look at you, and the fact that your gun is not on Bonnie after so many runners, does not seem to sit well with them. Their body language tells you that they are on edge. \n\n      \"Got them all?\" Zebra says as you join the rest of your crew with Bonnie right behind you. He seems uneasy with her standing there. \"Good. Get the girl down here with the others and then we'll head out.\"\n \n      [i]What do you do?[/i]\n      *choice\n       #Shout in a commanding voice, \"She's coming with us!\"\n        *set trust %-20\n        Trust: ${Trust}\n\n        \"She's coming with us!\" you shout so loud even your own crew jumps in surprise. They quickly resume their tasks, except for Zebra who cocks his head in a way that makes the jaw of the zebra mask jut out as in if awe. \n\n        \"Don't forget who's in charge here,\" Zebra growls as he approaches you, then his voice softens, \"Still, I think I like you, lad. A hostage ain't such a bad idea, in case we get found by the police on the way to Marlin's.\"\n\n        Despite Zebra's confidence, you can tell by the way Marlin and Stag keep stealing glances at you that they are uneasy and don't fully trust you. You go over to them and help finish prepping for your escape. \n\n        \"She'll run the first chance she gets,\" Stag says. \"She's a shift manager not a pet.\"\n\n        \"No, listen,\" you tug Stag in close, dropping your voice to where you can barely hear yourself. \"She saw my face.\" You tug Stag back in close when he pulls back in surprise. \"Listen. She put my mask back on me before the cameras could see. She wants to come. She asked to. What reason would she have to want to come?\"\n\n        \"Exactly!\" Marlin chimes in. \"What reason. Money maybe?\"\n\n        \"What's one more share when she helped us get so much more that we would have without her help?\"\n\n        Zebra and the others seem to consider this. \n\n        \"OK,\" Zebra says, and you smile, but it turns into a frown as he adds, \"you cut your share in two and split it with her, and she can come.\"\n\n        You think of the alternative, and you're sure Zebra would have no problem shooting her to keep her quiet instead. \"Fine.\"\n        *finish\n\n       #Pull Zebra aside and whisper, \"She's seen my face.\"\n        *set conscience %-100\n\n        You pull Zebra aside and whisper, \"She's seen my face.\"\n\n        Without hesitation Zebra turns, looks Bonnie up and down, takes aim, and shoots her in the head.\n\n        You can't believe it. You knew words were important, and you thought you chose yours wisely, but it would seem Zebra perceived your request as a fear of her letting the truth slip. Your gun slips from your fingers and clacks to the ground. You have no vengeance on your mind, no desire for escape, only for turning back the clocks, but you can't do that. All your feelings churn in your stomach until you feel them erupt and rocket up your throat.  You vomit. You're mask smells so heavily of vomit that you vomit again. Tugging your mask off, you let it slip to the ground with a splat.  \n\n        \"What are you doing, lad?\" You hear Zebra speak, but his words sound more like a distant meaningless whisper. \n\n        Looking at the blood soaking Bonnie's red curls has you imagining part of yourself bleeding away from you, too.  Your soul? Your sense of being the center of the universe, or being invincible? It could have been you he shot, and perhaps that would have been better. Zebra pulled the trigger but it was your choices that lead to Bonnie's untimely demise, as well. He was trying to protect you like you couldn't protect that beautiful, innocent, shift manager, daughter, sister, friend, unique individual that will never again exist. \n        *achieve offbalance\n        *image scale.png\n        You can no longer live with the guilt\n                       \n        [i]Will you start again or go back to the last checkpoint?[/i]\n        *choice\n         #Start over from the beginning\n          *goto_scene end\n         #Checkpoint\n          *set conscience %+100\n          *goto exit_vault\n          \n\n       #Pull Zebra aside and say, \"She can be of great use to us.\"\n        \n        *set trust %+20\n        Trust: ${Trust}\n        *set persona 55\n\n        You pull Zebra aside and say, \"she can be of great use to us.\"\n\n        \"How so?\" he asks.\n\n        \"You should have seen the way she opened those deposit boxes.\"\n\n        \"She'll run the first chance she gets. She's a shift manager not a pet.\"\n \n        \"No, listen,\" you tug Zebra in close, dropping your voice to where you can barely even hear yourself. \"She saw my face.\" You tug Zebra back in close when he pulls back in surprise. \"Listen. She put my mask back on for me before the cameras could see my face. She wants to come. She asked to. What reason would she have to want to come?\"\n\n        \"Exactly!\" Zebra says. \"What reason? Money maybe?\"\n\n        \"What's one more share when she helped us get so much more that we would have without her help?\"\n\n        Zebra seems to consider this. \"OK,\" he says, and you smile, but it turns into a frown as he adds, \"you cut your share in two and split it with her, and then she can come.\"\n\n        You think of the alternative, and you're sure Zebra would have no problem shooting her to keep her quiet instead. \"Fine.\"\n        *finish\n\n       #Tell Bonnie she can't come with you.\n\n        *set identity %-30\n        Identity: ${Identity}\n        *set persona 25\n\n        Discouraged, but unwilling to argue with your crew you walk up to Bonnie and tell her that she cannot come with you and to get down with the other hostages. \n\n        Her face lights up red with anger. \"I'm on video helping you!\"\n\n        \"Duress?\" You shrug. \n\n        \"No, not duress, and the police will know that. Unless--\"\n\n        You cut her off, making sure there is a bit of coldness in your voice. \"Sorry, but you can't come.\"\n\n        \"Fine,\" she says and you sigh in relief, but quickly gasp when she roars, \"Listen up everyone! The man in the rooster mask is--\"\n\n        You quickly slip your hand over her mouth. The soft movements of her lips struggling to make muffled words tickle, but you hold her tight. You hold her waist with your gun hand, and find it is a nice feeling, to be holding her. It would be much nicer if she were squirming for a reason other than trying to get away, though.  As wrong as it feels to be confining her, you have very little doubt that she has put together who you are and would give your identity away the moment you released her. In fact, you might even be wearing the same dress suit that you did on your date with her.  You can imagine in your head Bonnie finishing her confession, \"The man in the rooster mask id Clyde Lamm. Got that? Clyde Lamm. Reddish-brown hair that comes down over his eyes. Ate at Toni's Italian restaurant last Tuesday. Paid with a credit card. A handsome, pretty boy, but dumb.\"\n\n        The others have loaded up with bags in the midst of Bonnie's attempted betrayal, and head towards the doors. Zebra holds his gun on Bonnie. You know he ought to kill you both to keep you quiet, but perhaps he's got a soft spot for a little chicken with his head cut off.\n\n        \"She knows who I am.\"\n\n        \"Then we're taking her with us.\" Zebra sighs. \n\n        You can feel Bonnie's lips curling into a smile against your palm as you lead her to the entrance of the bank. \n        *finish\n\n\n\n     *selectable_if (persona \u003c40) #Ask if Bonnie wants to make out\n      *set persona 30\n\n      \"Do you, like, want to make out or something, doll face?\"\n     \n      \"Like, no.\" Bonnie scowls. \"You're kind of a jerk.\"\n\n      \"Probably not the best time to ask,\" you say, tossing your hands up in mock surrender. \"Sorry. I'll take a raincheck.\"\n \n      \"No, you won't. You won't take more than what's in those bags.\"\n     \n      \"Ouch,\" you say, truely wounded. \n\n      *goto exit_vault\n      \n\n  #Put an empty duffle bag over your head\n   Being sure to avoid glancing at the camera or at Bonnie, you fish around for your mask. It's hard as all you feel is the destruction of metal doors and paper work. You can't imagine the mask fell that far away, and yet it's nowhere to be found. \n\n   For the time being, you grab an empty duffle bag and put it over your head. You feel like an idiot and that feeling only solidifies when you hear a feminine giggle. \n\n   You stop searching and tilt the bad up to see where it came from, but it's hard to get the water out of your eyes. You begin looking for your mask again with your hands. After all, it has your DNA in it--hair, spittle, skin cells.  All you have is your sense of touch, for the sprinklers continue pouring, make it hard to see even under your canvas umbrella. Still you try to open your eyes, but the water droplets between your eyelashes stretch and bend the vault lights. You manage to see something, though. Something with eyes and a mouth and a frill of red, but it isn't a rooster mask you see but rather a face. Bonnie's face.  \n\n   Stooped down and with a look of surprise on her face, you realize Bonnie has recognized you. She covers her mouth with the same hand that holds your mask. You wipe the water from your eyes, some of which might just be your own tears, for you know you've been had. That, or that you have to dispose of Bonnie, and you don't think you have the strength to do so. Then you realize that killing her would not require strength at all, but rather a great weakness. You're human and you have empathy and you will not make her suffer for your crime more than she already has. \n   \n   *goto and_yet\n\n  #Search for your glasses\n   *set sanity %-10\n   sanity: ${sanity}\n\n   You reach out with both hands, fingers raking the floor. \n\n   \"My glasses,\" you say. \"I can't see without my glasses.\"\n  \n   Then you remember that you weren't wearing glasses. Maybe the stress is getting to you. You're starting to lose it. \n\n   Being sure to avoid glancing at the camera or at Bonnie, you fish around for your mask instead, for you know you had a mask. It's hard as all you feel is the destruction of metal doors and paper work. You can't imagine the mask fell that far away, and yet it's are nowhere to be found. All you have is your sense of touch, for the sprinklers make it hard to see. Still, you try to open your eyes, but the water droplets between your eyelashes stretch and bend the vault lights, effectively blinding you. You see something else, too. Something blurry. Something with eyes and a mouth and a frill of red, but it isn't a rooster mask you see but rather a face. Bonnie's face.  \n\n   Stooped down and with a look of surprise on her face, you realize Bonnie has recognized you. She covers her mouth with the same hand that holds your mask. You wipe the water from your eyes, some of which might just be your own tears, for you know you've been had. That, or that you have to dispose of Bonnie, and you don't think you have the strength to do so. Then you realize that killing her would not require strength at all, but rather a great weakness. You're human and you have empathy and you will not make her suffer for your crime more than she already has. \n  \n   *goto and_yet\n\n  #Make it rain\n   You know there is a camera and you can't seem to find your mask, so you grab what you can. Stacks of money. Taking a tip from the rapper scene, you make it rain twenty and hundred dollar bills. The flurry of cash is sure to block out the view of the camera. \n   \n   Yet, you know the cash will drift down eventually, so, being sure to avoid glancing at the camera or at Bonnie, you fish around for your mask once more instead of throwing more cash. It's hard as all you feel is the destruction of metal doors and paper work. You can't imagine the mask fell that far away, and yet it's are nowhere to be found. All you have is your sense of touch, for the sprinklers make it hard to see. Still, you try to open your eyes, but the water droplets between your eyelashes stretch and bend the vault lights, effectively blinding you. You see something else, too. Something blurry. Something with eyes and a mouth and a frill of red, but it isn't a rooster mask you see but rather a face. Bonnie's face.  \n\n   Stooped down and with a look of surprise on her face, you realize Bonnie has recognized you. She covers her mouth with the same hand that holds your mask. You wipe the water from your eyes, some of which might just be your own tears, for you know you've been had. That, or that you have to dispose of Bonnie, and you don't think you have the strength to do so. Then you realize that killing her would not require strength at all, but rather a great weakness. You're human and you have empathy and you will not make her suffer for your crime more than she already has. \n\n   *goto and_yet\n\n\n\n\n", "choicescript_description": "Attempt to survive your first bank heist! Befriend or betray your team of bank robbers, make difficult choices, survive, go insane, fall in love, and get rich if you can in [i]No Proper Thief,[/i] where every choice you make has a consequence.\n\n[i]No Proper Thief[/i] is a 56,000-word interactive novel by Russell J. Dorn. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.\n\nYou never wanted a life of crime, but it's all you know. That doesn't mean transitioning from a life as a cocky con artist to a greenhorn bank robber doesn't scare you.  In [i]No Proper Thief[/i] you are Clyde Lamm, the Rooster, and you have a choice to make. In fact, you have dozens of choices to make throughout your upcoming adventure. Everything has consequences, too. You and your team, consisting of the leader Zebra, the muscle Stag, and the heart Marlin, have many obstacles to overcome. Still, in the midst of all the dark chaos of the initial robbery, there is a flame of positivity: an attractive young bank manager. Sure you stole her gold heirloom ring a while back, but it's a fair trade because that fox is stealing your heart.\n\nCan you make the hard choices and survive your first bank heist?", "choicescript_stats": "If any one of the these four stats (Identity, Health, Trust, or Conscience) fall to 1% it's game over. After all, you can't get away with a crime if everyone know your face, if you bleed out, if your team turns on you thinking you're a rat, or if you can't live with an awful choice or choices you've made. Sanity refers to the three insanity endings and a handful of minor metal breaks throughout the game. Persona (Gentleman - Jerk) is just what type of person you encourage Clyde Lamm to be. \n  \n*stat_chart\n  \n  percent Identity\n\n  percent Health\n\n  percent Trust \n\n  percent Conscience\n\n  percent Sanity\n\n  opposed_pair Persona\n    Gentleman\n    Jerk\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase adfree $3.99 start\n\n*if choice_purchased_adfree\n  You're completely upgraded!", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "desert": "You awake, with a headache, to the sound of wind howling as it slithers across the side of the RV. Touching your forehead, you feel bandages and decide to leave them on. For all you know the bandages could be the only thing holding your brain inside your head. You are having a hard time recalling exactly how you got here. \n\nIt doesn't sound like anyone else is in the RV, and you don't hear traffic outside.\n*choice\n #Try to get up\n  *label get_up\n  You still feel weak and dizzy, but you decide to try and get up anyway. Taking it one leg at a time you twist and drop your right leg to the RV floor; then you twist further until you can simply have gravity pull your other leg to the floor. As you sit up, the world spins, but it is quickly righted. \n\n  The RV is as empty as it sounded. Step by slow step you make your way to the front windows, cracking your back and stretching as you do. \n\n  The sky is still overcast, but that is the only thing that is the same. Outside is a seemingly endless stretch of sagebrush and hills of dirt. You don't even see a road at all. Looking closely, you can make out jackrabbits and a couple of tumbleweeds that break a little more on each violent bounce until they are little more than twigs and powder. These tumbleweed deaths distract you until, in the distance, you make out something that is a brilliant red. It's Bonnie. Her arms are crossed and her head is tilted down as she walks towards the RV, against the wind. \n\n  You make your way out of the RV to meet her. \n\n  \"You're awake,\" she shouts. All tone is lost in the gust of wind. However, her smile is a clear sign that she is glad you're up, as is the hug she gives you.\n\n  \"What happened?\" you ask as soon as you are both back inside. \n\n  \"You got a head injury,\" she points to your bandages. \"I managed to drive us to safety.\"\n\n  \"The others?\"\n\n  \"We imagine Melissa and Mason are in custody.\"\n\n  \"We?\"\n\n  \"I radioed Narsico and managed to pick him up,\" Bonnie explains. \"He's scouting out the situation back in town.\"\n \n  \"How long have I been out?\" you ask.\n\n  \"Three days.\" Bonnie pats you on the shoulder after seeing your face twist with sadness. \"We're working on the plan to get them out.\"\n  *choice\n   #\"Where are we?\"\n    *label where_desert\n    *set health %+100\n    Health: ${health}\n    *set Trust %+10\n    Trust: ${trust}\n\n    \"Where are we?\" you ask. \n\n    \"Far from the city. In the desert, as I'm sure you have guessed.\" She smiles. \"It was my idea, actually. They won't be looking for us out here, not so far out.\"\n\n    Even so brief a conversation has taken it out of you, so you decide to lay down for awhile once more. You awake again to the same howl of the wind. The desert's hills are not tall enough to block the air currents. There is a savory smell in the air as well. Bonnie is at the small stove. \n\n    \"Lentil soup,\" she says without you even having to ask. \"Wesley has jars of dry lentils, and not much else.\"\n \n    Once you've eaten, you feel immensely better. The soup lasts for a couple days, and each day you feel stronger, and each day you feel closer to Bonnie. You spend the mornings planning, but the afternoons waiting for Narsico to return are lazy. You and Bonnie play childish games with one another, such as tag, and thumb wrestling, and hide-'n'-go-seek, even though there are very few places to hide. Thankfully, you don't have to hide from the sun, only the wind when it picks up, for the sky remains overcast, the clouds breaking only very briefly now and then, to reveal a clear blue patch of sky. \n\n    One afternoon as the two of you are fishing in a tiny puddle and a bathtub dumped in the desert long ago, filled by a brief desert shower; with poles you found in the RV's storage compartment, you remark on how you enjoy Bonnie's company.  In your head you're thinking that in a world that has been so gray, it's a pleasure to have someone so colorful--colorful in terms of her beautiful red hair, glowing face and smile, and her joyous personality. However, what you say comes out much less poetic and much more caveman like, \"I like this. This here, you, me.\"\n\n    \"Me, too.\"\n\n    Before you can say anything more, you hear a radio crackle, then shortly after you hear Narsico say, \"I'm nearly back.\"\n\n    The radio signal only goes so far, so he must be fairly close. Sure enough, looking to the horizon you can see a dust cloud trailing behind a truck. In a matter of moments, Narsico pulls up in a truck, worn with good use.\n\n    \"Good to see you, sleeping beauty.\" He tosses you a padded envelope. Opening it, you see it contains a pair of license plates. \"Traded ours from a car in a decent neighborhood. Probably have clean record and probably won't notice for months seeing as they can't even be bothered to clean the fast food garbage from their interior. Bonnie. You look well, and so does the home front.\" Narsico looks back to you. \"Bonnie patched you up real nice. Anyway, I'm starving. What do we have to eat?\"\n\n    \"Lentils.\"\n\n    \"Lentils? Again? Fine. I'll explain everything at dinner.\"\n    *choice\n     #Help set the table\n      *set Trust %+10\n      Trust: ${trust}\n      \n      Heading inside you put the pot of lentils on the stove to warm and grab some dishes, as Narsico settles in. \n\n      \"I'm thankful that at least the three of us got out of that mess to fight another day.\" He raises his cup of water. \"The three amigos.\"\n\n      \"The three amigos,\" you and Bonnie echo the sentiment.\n      *choice\n       #Talk about the plan\n        *label talk_plan\n        \"So, about this plan,\" you inquire.\n\n        \"Right, right.\" Narsico says after gulping down his water. \"It goes down tonight.\"\n        *label plan_tonight\n\n        \"Tonight?\" Bonnie chokes on her sip of her own water. \"So soon?\"\n\n        \"The sooner the better,\" you say. \n\n        \"Right.\" Narsico nods in agreement. \"The sooner the better. Besides. Our train comes in tonight and won't for another three days after that, and the others are going to be moved from the county jail any day now. The trial is probably going to be an open and shut kind of deal, so if we don't strike soon, they'll be moved to separate prisons and it'll become impossible to get them out. The plan is simple: we take the RV to the freight train tracks, ride in on the freight train as it goes right by the jail, hide out in the weekly motel room I've rented out until the end of the week, then make our way to the first passenger train that runs in the morning.\"\n\n        \"And our get away vehicle?\"\n\n        \"Oh!\" Bonnie grasps at the air in a way that tells you she forgot to tell you something. She turns to Narsico.\"I didn't tell him.\"\n\n        \"Oh no? Good news, friend. Wesley is a free man.\" Everyone shares a smile. \"They had him under minimal security at the hospital they took him to. I did a repeat of our earlier excursion and managed to get him out.\" \n\n        You ask, \"Where is he?\"\n\n        \"At the motel, right under the pig's noses. He'll be driving the getaway vehicle. Said he had just the thing.\"\n\n        After a few more run-throughs of the plan, you all suit up. \n\n        Narsico pulls out your rooster mask and tosses it to you, then pulls out another mask. It's green and scaly. A crocodile. \"I was going to be Crocodile once, but decided I liked my old wrestling name better after all.\" He tosses the crocodile mask to Bonnie, who is now dressed in all black. \"So, welcome to the team officially, Crocodile.\"\n\n        Bonnie smiles almost as wide as the sharp grin of the crocodile mask in her hands. \n        *choice\n         #Suit up and head out\n          You slip on your suit, despite it being a little dirty with some speck of blood on the collar of your dress shirt where your head wound must have dripped. You also decide to leave the bandages on your head once you find that your rooster mask fits over them just fine. \n\n          The trip to the tracks is surprisingly rough without a road to travel on. Narsico parks the RV behind a cliff side probably created long ago with dynamite. The track is nearby, but the RV remains outside the view of any train that may pass. You all rest until you hear the sound of the freight train approaching, after unloading some tires and the bathtub onto the track, from the truck bed hitched to the RV. The empty bathtub and spare tires should be visible enough to the conductor, you assume. Sure enough, you hear the train conductor sound his horns and then the hiss of the brakes as he realizes the objects on the tracks are not an animal, but rather a pile of unmoving junk. \n\n          As the train stops, you, Narsico, and Bonnie board a far cart that seems will provide the most shelter for the ride.\n\n          \"Must have been the wind,\" you hear a man on the crew shout, as he pulls the debris away from the track. It isn't long after that the train begins to move again. \n\n          \"Now, remember.\" Narsico says over the rattle of the train. \"There is a good spot to jump off after the Shell gas station. Don't miss it.\"\n\n          The trip is long and your legs begin to ache by the time you near the jump spot. The train slows while going through town and there aren't many people out driving to spot you at the intersections, especially with your dark clothing. \n\n          \"I'm scared.\" Bonnie says. \"This still feels so fast.\"\n\n          \"We have to jump in five seconds.\" Narsico warns and points to an approaching yellow sign that depicts a seashell. \"The Shell station is there.\"\n          *choice\n           #Jump and hope Bonnie follows\n            *set conscience %-10\n            conscience: ${conscience}\n            *set persona 40\n\n            Looking at the grassy slope slip by, you don't hesitate for a moment. You jump. The landing isn't exactly soft, but it's not as painful as you were expecting, despite rolling a few times. As you stand and dust yourself off you see that Bonnie is still on the train, but finally jumps off just before the end of the jump area. \n\n            \"Well, Clyde Lamm, you are far from being a gentleman. I leapt first to give you the chance to jump with her.\" Narsico tsks, then adds a sarcastic, \"Nice going, Romeo.\"\n            *choice\n             #Head to the meeting spot\n              *label meeting_spot\n              Dusting yourself off and picking the few foxtails you can make out in the dark off your overcoat, you join the others at the meeting spot: an outcropping of weeds and large boulders. \n\n              \"The control room is there.\" Narsico points to the second nearest roof of the county jail. \"From what I've gathered, we can enter through that first building.\"\n\n              \"How did you 'gather' all this?\" you ask, unconvinced of Narsico's knowledge. \"You're a hunter not a gatherer after all.\"\n\n              \"I staked out at the motel, like I said. The motel behind us. Room 17, by the way.\" Narsico hands you a card key. \"In case we get separated. Anyway, I did a little digging in the library as well as online. Much of the logged data was confidential, but I know a guy who got me access, and another guy doing time who used to be a prospective band member. He gave me a rough map of the inside, and where Melissa and Mason are being holed up.\"\n              \n              Narsico pulls his backpack off his shoulder.\n\n              \"Plan B?\" you ask.\n\n              \"Plan B.\" Narsico nods, lifting the flap and revealing a block of C4 and wires.\n\n              You all shift uncomfortably at the thought of blowing a hole in the side of a jail. \n\n              \"You've had time to think about it,\" Narsico whispers. \"Do you want to go in the quiet way, or with guns blazing. The dangerous way, that is, the I-have-nothing-left-to-lose way. I like plan A, because honestly, I still have some living I want to do.\"\n\n              \"Either way,\" Bonnie says, \"but I'd prefer the quiet way, as well, even with as much as I like explosions.\" \n \n              \"What's it going to be, Clyde? You're the con artist. Can you pull off plan A? Both ways are dangerous.\"\n              *choice\n               #The quiet way\n                *set Trust %+20\n                Trust: ${trust}\n\n                \"The quiet way.\"\n\n                \"Good. We're agreed, then. Hand me a prepaid,\" Narsico says to Bonnie and she quickly digs a cheap cell phone out of her backpack, then hands it over to Narsico who dials a number. \"Zebra, it's Stag. Going plan A. Rendezvous at the spot in about thirty minutes.\"\n\n                You wish you could simply hear Wesley's voice, but it does you good to know he's alive and free, not to mention well enough to drive.\n\n                \"Clyde, the woman manning the check-in desk should go by Betty or rather officer Carlos. If it isn't Carlos there, it's probably best you abort and we'll go with plan B. If it is Betty, she's a young officer with a rough married life. She's talked to my guy inside at some length and he's relayed her situation to me--seems she has an unappreciative husband. Use your sweet talk to get her to let you behind the desk, then take control. This all comes down to you. Don't get too nervous, though. If you screw up, plan B might just get you out of a pickle. Take this extra prepaid, and text every five minutes that you're OK. Numbers are programmed in. Seven minutes pass and we're blowing the wall. Got it?\"\n\n                You nod and straighten you suit. \n\n                Your heartbeat rises with each step you take towards the front doors and you take a deep breath as you grab the door handle and pull.\n\n                At the desk is a fairly pretty young officer, who could very well be Betty Carlos according to Narsico's description. You approach with a confident stride. She's alone, and you imagine the other two officers on duty are either both in the command center, or eating lunch. That'll make things much easier.\n\n                However, when you get close enough to her to read her badge, it does not say Carlos, but rather Reichenberg.\n\n                [i]What do you do?[/i]\n                *Choice\n                 #Wing it\n                  \"Hi, there, Officer--\" though you try your best to pronounce the name on the tag above her badge, you fail, \"-- Reich-ton--Wreck-ball--Re-kitchen-berg. I'm sorry. I'm terrible with names and that was nothing short of a train wreck.\"\n\n                  \"Most people do.\" A smile spreads across the officer's lips, as she looks up and admires your handsome facial features. \"To tell you the truth, I'm not quite used to the name myself.\"\n\n                  \"After your whole life having it?\" you laugh.\n\n                  Officer Reichenberg laughs as well, \"Well, yes and no. I was Carlos for a few years and recently switched back.\"\n\n                  \"I'm sorry to hear that?\" you put a bit of a coy spin on your words making it a question. She is Carlos. It's a good thing you stayed. \n\n                  \"Don't be. But thanks. We're better off apart.\"\n\n                  \"I'm sure he begs to differ.\" You lean closer to the window between you and officer, and notice that she subconsciously nears it as well. A good sign. Even better, you see her pupils dilating wildly as she looks into yours. You were always told that was a sign of being attractive to someone, and in your con artist career it has almost always proved true.  If she is attracted to you, this will be much easier. In a bold move, you add, \"What with a woman of your authority and dare I say it...?\"\n\n                  \"What?\" The officer looks at you with a mix of suspicion and intrigue. \n\n                  \"Beauty.\"\n\n                  \"Oh, stop--\" the officer shuffles papers as if she actually means to do something with them, but you take it for what it is: a sign that you have her hooked already, that she is pleasantly nervous. \n\n                  \"Nicolas Reed.\" you offer an alias. \n\n                  \"Betty,\" she reveals. You share a good laugh when she jokes, \"Betty Wreckingball.\"\n\n                  \"That was so bad,\" you reveal weakness, referring to your massacring her name, something for her to empathize with. \"You here alone tonight, Betty. Can I call you Betty?\"\n\n                  \"Sure, as long as the other officers aren't around. And no. Two others here, Officer Stevens and Connors.\" Betty clears her throat, \"What--um--what brings you in, at this hour anyway?\"\n\n                  Even with all your planning, you hadn't thought this far out. You figured you could wing it, but you can't think all that clearly. Two ideas come to your mind, though. You could tell her you're new to town and lost, without any plans on where to stay, in hopes of taking advantage of her sympathy, or you could tell her that your friend is here and you're hoping to you could see him before you have to leave town on an early bus.\n                  *choice\n                   #Lost\n                    \"Well, it's a bit embarrassing to admit, Betty, but I just got in on a bus and I'm sort of lost.\"\n \n                    \"What are you looking for?\" Betty asks. \"A motel?\"\n\n                    You scratch your head and try to look even more embarrassed and pathetic than you just were. \"I would if I wasn't mugged at the bus stop. Took my credit cards. Everything.\"\n\n                    \"Yikes. So, you want to file a report?\"\n\n                    \"Unfortunately, I didn't get a good look at the guy, or woman for all I know. Nothing to go off of. I'll cancel my cards as soon as a find a phone. I'm honestly just feeling defeated right now. Thinking maybe you could point me to a shelter that would have some gruel or something to eat and cot for the night.\"\n\n                    \"You poor thing.\"\n\n                    \"It happens.\" You sigh. \"I'm sure you see this sort of stuff every day.\"\n\n                    \"Usually doesn't happen to good people.\" She looks behind her as if questioning herself. \"I'm going to buzz you in. At least get some food in you before we figure out where you're staying tonight. I have a roast beef sandwich right here.\" She buzzes you in and you know she would invite you home with her if you suggested it. \"Come on in.\"\n\n                    You enter after texting Narsico \"I'm in. come,\" but instead of meeting Betty's smile with one of your own, you pull your gun. \"Sorry Betty. Nothing personal, but I'm going to need you to help me release a couple of inmates.\" You gesture for her not to make a sound when she looks as if she's about to yell for help. \"I've killed people for less. You want to live to see dawn, you do exactly as I say.\"\n\n                    She nods and you wait for Bonnie and Narsico to join you. \n\n                    \"Now,\" you say to Betty. \"Where are the other officers again?\"\n\n                    \"Connors is in control room and I honestly don't know where Stevens is.\"\n\n                    \"You'd better start knowing,\" Narsico growls.\n\n                    \"He--sometimes--um--spends time in the woman's ward.\"\n\n                    \"Jesus.\" Narsico stands up violently, and paces. \n\n                    Bonnie looks up from the computer and says, \"Found their cells.\"\n\n                    \"We need to split up,\" you say, taking control.\n \n                    [i]What should Narsico do?[/i]\n                    *choice\n                     #Take control of the Command Room\n                      \"Stag,\" you say. \"Take Betty and get to the control tower.\"\n\n                      Narsico jumps into action, grabbing Officer Reichenberg by the hair at the nape of her neck. It's wound up tight already, so she shrieks in pain, but you don't feel too bad seeing as she looks the other way as officer Stevens takes advantages of female inmates. \n\n                      \"Cell 3A in the woman's ward,\" Bonnie calls out to Narsico before he's out of earshot. \"Cell 2B in the men's.\"\n\n                      Narsico gives a thumbs up then returns his hand roughly to Betty's neck. It's the lucha libre wrestler in him. You have full confidence he'll gain control of the control room, as you head off down the cell corridors with Bonnie.  \n\n                      \"You want to get Mason or Melissa?\"\n\n                      If Narsico pops the wrong door, you'd feel better having yourself in the men's ward.\n \n                      [i]What's it going to be?[/i]\n                      *choice\n                       #Get Mason\n                        *set trust %+20\n                        trust: ${trust}\n\n                        \"I'll go get Mason.\"\n\n                        You both head to your respective cellblocks, and almost immediately upon entering the men's cellblock, you hear a door unlock. You realize this is not just one lock, but all of them. Narsico has unlocked all the men's cells. Rough men, with crude tattoos and uncommon haircuts emerge. \n\n                        One of the toughest ones yells out, \"Mason, Mason, Mason. Looks like it's time for pay back.\"\n\n                        You imagine Mason is in the only cell that remains closed so you call out, \"Mason! It's Rooster. Let's go.\"\n\n                        \"Thank goodness!\" Mason rockets out from his cell in the blink of an eye and is behind you before the other prisoners realize what happened. \n\n                        \"Everybody. Back in your cells,\" you demand. You watch as they all reluctantly walk back to their cells after seeing your gun pointed at them. \n\n                        After another moment Narsico gets the cells to lock once more, and you and Mason head out to meet up with the others.\n                        *finish\n\n\n                       #Get Melissa\n                        \"I'll go get Melissa. You find Mason.\"\n\n                        You both head to your respective cellblocks, and almost immediately upon entering the women's cellblock, you hear a door unlock. You realize this is not just one lock, but all of them. Narsico has unlocked all the women's cells. Rough women, with crude tattoos and uncommon haircuts emerge. \n\n                        \"Who's the cutie?\" one of the women says to the others. \n\n                        \"Out of my way,\" you hear Melissa bellow. She shoves a couple of the smaller women from her path, showing surprising strength. \"So glad to see you, Clyde.\"\n\n                        \"We're getting you out of here.\"\n\n                        \"Freeze,\" you hear a man's voice say. You see an officer has emerged from a cell with his taser raised higher than his pants, which cling to his knees.\n \n                        \"Lower your gun, hon.\" Melissa urges you. \"Trust me.\"\n\n                        You do as she says, but you don't completely drop your gun, just let it hang at your side. You hear the taser fire, but a few of the female prisoners knock the officer's aim off, so it doesn't hit you. Then, a group of the largest women wrestle the officer into a cell and you hear him screaming. \n\n                        \"He deserves it,\" Melissa says. \n\n                        You nod, at a loss for words, and together, you go out the way you came in. \n                        *finish\n                      \n\n                     #Search for Mason and Melissa\n                      \"Stag, go with Crocodile and find the cells. I'll take Betty to the control room and pop the locks.\" \n\n                      \"Cell 3A in the woman's ward.\" Bonnie calls out to you before you're out of ear shot. \"Cell 2B in the men's.\"\n\n                      \"Got it,\" you say then give Betty a little shove towards the control room. \"Remember Betty: if Connors sounds an alarm or calls for help, you're going to wish he hadn't.\"\n\n                      \"He won't.\"\n\n                      \"You sure?\" you put a step between you and Betty, suddenly worried she might try and wrestle your gun from you. \"Willing to bet your life on it?\"\n\n                      \"Yes,\" Betty bows her head. \"We had a thing awhile back. He cares about me.\"\n\n                      *page_break\n\n                      You come to the last bend before the control room. Peeking around the corner you see that Connors is busy eating with his legs kicked up for comfort. You also see the glow of a TV. He doesn't suspect a thing. \n\n                      Being sure you have your gun hidden behind Betty's back you tell her to walk naturally towards the control room. \"Make it look like I'm in for booking.\"\n\n                      Betty sighs, but does as you say. It's a good sign that she seems frustrated. Perhaps she's given up hope of regaining control. \n\n                      You're all the way up to the glass door before Connors notices you. He smiles seeing Betty, then frowns as you cleary aim your pistol at her so that he can see it. He instinctively reaches for a panic button, but thinks better of it and asks instead, through an intercom, \"What's going on here?\"\n\n                      [i]What do you say?[/i]\n\n                      *choice\n\n                       #\"Open up or she dies\"\n\n                        \"Open the door, or sweet Betty here dies.\"\n\n                        \"It's against protocol,\" Conners can't quite keep his voice from quivering. \"I'm sounding the alarm.\"\n\n                        You shove Betty to get her to speak. \n\n                        \"Please, don't! He'll kill me.\"\n\n                        Conners slams his fist on the control panel, but not to sound an alarm, just to make his frustration known. \"Who's to say he won't just kill us both?\"\n\n                        \"I won't,\" you promise, \"I'm here to save two lives, not take them.\"\n\n                        \"Please,\" Betty pipes as you nudge her with your pistol. Conners face softens and you know you've just about got him.\n\n                        *goto suggestopen\n\n                       #Suggest that you know about his love for her\n                        *label suggestopen\n\n                        \"You and Betty here can have plenty more hours together if you simply do what I say. Open the door.\"\n\n                        Connors hesitates, then opens the door. He has pulled his tazer by the time you and Betty enter.\n                        *choice\n                         #talk him down \n\n                          \"Drop it,\" you say firmly. When he doesn't, you shove Betty roughly. \"You ready for some lonely nights, Connors?\"\n\n                          The [i]Price is Right[/i] plays on the TV you notice as Connors lowers his weapon, drops it, and kicks it to you. After a moment, you have both Officers stripped of their radios and wepons, and handcuffed to a radiator. Defeated, Connors walks you through opening cells 2B and 3A. \n                           \n                          *label camerastevens\n\n                          You can see on camera as Mason and Mellissa are collected. But something else appears on screen. Bonnie and Mellissa are suddenly confronted by who you assume is officer Stevens. \n\n                          [i]You have to think quick! What do you do?[/i]\n\n                          *Choice\n                           #Use the intercom to talk to him\n                            *set trust %+20\n                            Trust: ${trust}\n\n                            \"The intercom for the women's ward, how do I use it?\"\n\n                            Officer Conners remains silent. \n\n                            \"One of those two dies and you'll be quick to join them.\" It's not hard to set your face with a scowl. You hit the officer hard in the shoulder blade.  \n\n                            The officer cries out and says, \"the square button under the label A.\"\n\n                            You push the button. \"I suggest you put your gun down, Officer, or your comrade will pay for it.\" You see Stevens lose a little conviction hearing a voice from the control that isn't his coworker's. \"Drop your gun and let the lovely ladies go.\"\n\n                            After a moment of tense silence, the officer does as you say and Bonnie gets him to handcuff himself to a guardrail. Bonnie and Melissa head out towards the way you came in and you join them after dealing with the control room officer. \n                            *finish\n                        \n                           #Rush to your friends\n                            *set Health %-20\n                            Health: ${health}\n                            *set conscience %+50\n                            Conscience: ${conscience}\n\n                            You waste no time and dart from the control room, making it to the women's ward in a matter of seconds. Having flanked the officer, you aim your gun and yell to the officer, \"Drop it.\"\n\n                            Startled, the officer turns and fires off a taser cartridge in your direction. The one wire grazes your thigh, but the other prong misses. You return fire, as does Bonnie. Together, you kill the sexually devious officer. You would almost feel bad if it were for a chorus of female prisoners cheering and thanking you from their cells. It seems the man was a monster and had it coming. \n\n                            The three of you head out the way you came in.\n                            *finish\n\n                         #Open fire\n                          Wasting no time you shove Betty aside, aim, and fire, hitting Connors in the arm. He drops his tazer and grips his arm after falling to the ground. \n\n                          Betty rushes to Conner's and holds him, and together they cower under the barrel of your gun.\n                        \n                          \"You ready for some lonely nights, Connors?\"\n\n                          \"I'm sorry,\" he yelps. \"I'll do whatever you say. Please!\"\n\n                          Holding your gun on him, you hesitate a moment to make him believe that it's a hard choice for you to not want to kill him. You certainly don't want to, but he can't know that.  \n\n                          The [i]Price is Right[/i] plays on the TV you notice. \n\n                          \"Handcuff yourselves to that radiator,\" you say and they do.\n\n                          Defeated, Connors walks you through opening cells 2B and 3A. \n\n                          *goto camerastevens\n\n\n\n                   #Here to see a friend\n                    *set Conscience %-30\n                    conscience: ${conscience}\n\n                    \"I know these aren't your typical visiting hours. But I just got news my friend is here, and I have to leave too early tomorrow on a bus to see him then. I was hoping, Betty, that I might get to see him.\"\n\n                    \"You're right about the hours, but for someone as sweet as you, I might be able to work something out.\"\n\n                    \"Great.\" You smile wide, just now realizing the flaw in this plan. Plus, it's nearly time for you to text Narsico.\n \n                    \"And your friends name?\"\n\n                    You can't think of anyone else in this jail and spit out the first name you can think of. \"Mason Edilberg.\"\n\n                    \"Mason Edilberg? The suspected bank robber.\" Betty looks at you confused, then at something on the window that looks to be a wanted poster. \"Hold on.\" She looks from you to the poster. \"You're Clyde Lamm.\"\n\n                    She presses a button and you hear the front doors lock, but still you rush towards them.It isn't until you reach the doors and rattle them to make sure they won't open that you realize that you haven't contacted Narsico in quite some time. In your panic, you can't think exactly how long it's been, but, with your heart fluttering in the pit of your stomach, you imagine they've already set up the bomb. An explosion confirms yours suspicion. The wall beside Betty blows out and you know for certain that plan B is in effect. The deafening blast is long in dying, and there is a ringing in your ears. Though you are a little banged up by the blast, you see through the dust that Betty is much worse off. In fact, she's dead, crumpled in a fleshy pile under debris. Your hesitation and slip up got someone killed, but at least you're still a free man. \n\n                    As Narsico wanders in from the new door he made in the wall, you see he appears a little disorientated. You need to take charge. No time for regrets just yet. \n\n                    [i]What do you tell Narsico to do?[/i]\n                    *Choice\n                     #Take control of the Command Room\n                      *goto control_room\n                     #Search for Mason and Melissa\n                      *goto Mason_Melissa\n\n\n\n\n\n                 #Abort and proceed with Plan B\n                  *set Trust %-10\n                  Trust: ${trust}\n                  *set conscience %-30\n                  Conscience: ${conscience}\n\n                  \"It wasn't Betty,\" you say as you return to the others. \n\n                  Narsico kicks the dirt in anger. \"You could have still tried.\"\n\n                  \"Sorry. Let's light them up. Cook some bacon,\" you say hoping to also ignite Narsico's more positive side. \"We'll use the confusion of the explosion to our advantage. Besides, the guards have to lock up their weapons before entering.\" You've been to jail enough times to know that they have only their tasers, batons, and their hands. \n\n                  \"Not my first choice, but it's a solid plan. Hand me the prepaid,\" Narsico says to Bonnie and she digs a cheap cell phone out of her backpack, then hands it over to Narsico who dials a number. \"Zebra, it's Stag again. Going plan B, after all. Rendezvous at the spot in about five minutes.\"\n\n                  You wish you could simply hear Wesley's voice, but it does you good to know he's alive and free, not to mention well enough to drive.\n\n                  The three of you wait until the road is clear then slink across it with your gear. Being mindful of cameras, you work your way around the exterior until you come to the yard that is supposedly just between the men's and women's cell blocks and right by the command center. \n\n                  Narsico rids the C4 in less than thirty seconds, and after he puts distance between him and the bomb, he blows it. The deafening blast is long in dying, and there is a ringing in your ears, but Narsico seems to get the worst of the blast, and he appears a little disorientated. Still, none of you waste any time, and instead rush in as a team with your guns drawn. \n\n                  Narsico still seems a little confused and there is the body of what looks like a young female officer laying lifeless on the floor. Officer Reichenberg, you're sure. Your choice got someone killed.\n\n                  You need to take charge, not time for regrets just yet. \n\n                  [i]What do you tell Narsico to do?[/i]\n                  *Choice\n                   #Take control of the Command Room\n                    *goto control_room\n                   #Search for Mason and Melissa\n                    *goto Mason_Melissa\n\n\n               #Guns blazing\n                *set Conscience %-30\n                Conscience: ${conscience}\n\n                \"Let's light them up. Cook some bacon,\" you say. \"We'll use the confusion of the explosion to our advantage. Besides, the guards have to lock up their weapons before entering.\" You've been to jail enough times to know that they have only their tasers, batons, and their hands. \n\n                \"Not my first choice, but it's a solid plan. Hand me a prepaid,\
