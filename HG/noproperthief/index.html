<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>No Proper Thief — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "noproperthief", "title": "No Proper Thief", "scenes": {"bank": "\"Rooster!\" you hear your crew leader, Wesley Richards, shout. It's obvious that he is more concerned than angry with you. You can't see his face under the zebra mask, but you know his voice well enough to know what he's feeling. You know that you haven't messed up just yet. \"Get your head in the game!\"\n\n \n[i]How do you respond?[/i]\n\n*choice\n #\"I'm on it!\"\n  \"I'm on it!\" you say. \"Relax.\"\n\n  You've grown to hate that Zebra makes things like this out to be a game. You want to show him you're worthy of the name Rooster, and not some chicken with your head cut off, but he needs to take a step back and let you work.\n  *page_break\n  *goto heads_cower\n #\"Chill out, old man!\"\n  *set trust %-10\n  Trust: ${trust}\n  *set persona 40\n  \n  \"Chill out, old man!\"\n\n  Zebra grumbles, \"Who you calling an old man?\"\n  \n  Though you still can't see his facial expression under his zebra mask, you know you've angered Wesley a little. On your first bank hiest it's probably best to be on your best behavior. Still, he started it--calling you lad and such. You can be the bigger person, though. \"Sorry, gramps,\" you say.\n\n  Wesley shakes his head, causing the jaw of the zebra mask to twist, comically. He busies himself with securing hostages, leaving you to do your job.\n\n  You've grown to hate that Zebra makes things like this out to be a game. You want to show him you're a man worthy of the name Rooster, and not some chicken with your head cut off, but he needs to learn that respect earns respect; you don't give it freely.\n  *page_break\n  *goto heads_cower\n\n #Say nothing\n\n  You've grown to hate that Zebra makes things like this out to be a game, but you only nod. You want to show him you're a man worthy of the name Rooster, and not some chicken with your head cut off. \n  *page_break\n  *goto heads_cower\n  \n\n   \n  \n\n\n*label heads_cower\nLooking at the back of several peoples' heads as they cower in fear, you grip your pistol tighter and kick the girl nearest you lightly to get her attention. You pretend not to recognize her, though you had dinner with her a few nights before--Fettuccine Alfredo, if you're remembering correctly. Whatever you had,  you know the girl carries bank keys while working, and used to wear a nice gold ring before you swiped it at the end of your date. Habits die hard... \n\n\"Hey!\" you say, being sure to disguise your voice with a type of violence you wish you never had to use with her. \"You, Red, get up.\"\n\nThe girl looks through the panicked pretzel of her arms, and with a puff of breath blows a strand of her red hair out of her face. You realize again why you automatically called her \"gorgeous\" at dinner: she is. Her red hair falls in waves around the sharp, purposeful angles of her face. \n\n\"Yes.\" You nod now that she sees you, feeling the rubber of your rooster mask slide a little, as a warm glob of saliva rolls down your throat. \"Get up, Red.\"\n\nShe slowly sits up, then stands and pats her tweed dress suit smooth. She sets her face with a toughness and says, \"Name's not Red, all right?\"\n\nYou want to smile at her sudden bravery, and your rooster mask would probably hide it, but you're afraid it will make you sound too happy. So you bite your lip until it hurts and say:\n\n\n*choice\n  #\"Don't get smart. Just give me the keys to the vault!\"\n\n    \"Don't get smart. Just give me the keys to the vault.\"\n    \n    It seems for a moment that there is a flicker of recognition in her eyes, but it quickly dulls. She doesn't recognize you, but you certainly know her name is not Red, but rather Bonnie Loren. \n    \n    'The keys,' you say again with emphasis. \n \n    As she pulls the keys from her  pocket, you hear them jingle. You snatch them from her hands and gesture her to go first. Inside the vault you notice it isn't what you expected. Everything is locked up in deposit boxes and heavy safes. It's like a nesting doll of security, you realize, without humor. \n       \n    \"You need two keys to get in the deposit boxes,\" Bonnie says, then bows her head, nervous in being unable to read your reaction beneath your rooster mask and fearing the worst. \n       \n    \"Nothing's loose,\" you speak into your walkie-talkie. \"I need another pair of hands.\"\n \n    There's a crackle and then you hear Marlin say, calmly. 'We've got three rooms with windows to watch. Over.' \n       \n    \"You don't need to say 'Over' Mas- mean Marlin.\" You know Stag almost said Marlin's real name, Mason, and wonder if Bonnie or anyone else could decipher the slip. \n \n    \"OK. Over.\" You hear Marlin again. \"I mean, OK. Just OK.\"\n\n    \"Get the girl to help,\" you hear Stag say and then there's a clamor by the vault entrance that you know to be Stag's crowbar. \n\n   *choice\n\n      *selectable_if (persona >54) #Walk the crowbar over to Bonnie\n       *set persona 65\n       *label no_attack\n       Not wanting to hurt Bonnie, you take the time to walk the crowbar over to her. When you reach her, you gesture for her to take hold of it. \n       *goto crowbar\n\n      #Kick the crowbar over to Bonnie\n        *label duress\n        Keeping Bonnie in your line of sight, you back up to where you heard the crowbar stop sliding. When you see it, you kick it towards Bonnie. You realize it might have hurt her exposed ankles if she didn't hop out of her heels to avoid it, but rather than show alarm or apologize, you keep your cool as if you wouldn't care if you maimed her. With her shoes knocked off in surprise, you now tower over her when you return to her side. \n        \n        \"Pick it up,\" you snarl. \n        \n        *label crowbar\n        \n        She shakes her head, vehemently. Shrinking, she says, barely more audible than a whisper, \"No way. I can't.\" \n\n        \"You'll be acting under duress. No trouble for you.\" You soften your voice and notice Bonnie suddenly seems a little less nervous. Worried she might be planning something you look her up and down, making sure you know where her hands are, but nothing seems odd or out of place, save for her toe nails being painted all different colors. Blue, purple, red, yellow, orange--everything but a natural color. A rainbow of toes. \n\n        \"What do you care?\" She sounds upset, angry, but there is also a genuine curiosity in her voice. \n        *choice\n         #Comfort her\n          \"I know I wouldn't want to be between a rock a hard place, or rather the law and a crew of men with guns and demands. But I'll tell you the law will be a lot more lenient on a pretty girl like you than a group of desperate men.\" You see the she blushes, listening to the smooth tones of your voice, then clears her throat shaking off her sudden symptom of Stockholm syndrome.  You add, \"Why don't we make a game out of it? Have a little fun while playing outlaw for a few minutes. Five minutes--whoever has opened the most deposit boxes wins.\"\n\n          She nods without a word, then bends, holding her tweed skirt down modestly with her hand and picks up the crowbar. \n\n          \"You start over there on that side. I'll start here,\" you point to the far side of the vault, furthest from the vault door and watch her walk to it. To sound more intimidating you add, \"Don't try anything funny and I won't have to hurt you.\"\n\n          *goto rock_hard\n\n         *selectable_if (persona \u003c41) #Fight anger with anger\n          *set persona 30\n  \n          \"I don't care!\" you shout. \"The only thing you should be caring about right now is staying alive, and the only way you'll do that is by doing as I say. Without question. Got it?\"\n\n          \"Got it.\" Bonnie whimpers.\n\n          *goto rock_hard\n\n         #Say nothing\n\n          You stare at her with an sharp intensity. Eventhough she only sees the dead stare of a rubber rooster mask, she gets the message. \n\n          \"I'll just start over here, then,\" she says. \n          *goto rock_hard\n\n        *label rock_hard\n        *page_break\n        *label checkpoint_1\n        Wasting no more time, you jam the end of your crowbar in the first deposit box you see. It's tougher to open than you imagined it would be and you struggle. A moment later you hear an elated giggle and you look over at Bonnie and see that she has two boxes opened already. You observe her for a moment, the way she flows, the way she seamlessly pushes her entire body weight into the crowbar. It's like she's dancing, springing off unperceivable stools, gliding on invisible pulleys. You're spellbound, pulled towards her like a moth to the flame. Closer, you move towards her. Closer still, you move until you're right behind her.\n\n        She sees you, stops, and brings her hand to her lips to hide a smile. Your mask hides your own, but you get the feeling Bonnie can see your grin right through the rubber. \n\n        \"It's fun,\" she says.\n\n        \"You're good at this. Who would have thought?\" You pull the boxes from their slots. \"Let's see what we've got.\"\n\n        As you pull the lid off the first of the boxes, you're disappointed to find a bunch of sentimental junk: a postcard, a baseball that looks to be signed by a child, as well as some paperwork that's useless to you. Opening the second box is quite different. You're eyes go wide, as do Bonnie's. It's too good to be true. You see jewels, gold, and a few stacks of large bills. You admire the bounty for a moment.\n\n        \"You've got something there,\" Bonnie says obscurely, and points to your chest before suddenly reaching out. \n\n        What do you do?\n\n        *choice\n         #Slap her hand away.\n           *set Conscience %-10 \n           *set Persona 45\n \n           Conscience: ${Conscience}\n\n           You slap Bonnie's hand away, and try to comfort yourself in the knowledge that it was a reflex, but you still feel bad about it. \n\n           \"Ouch!\" Bonnie yelps and backs away from you. \n\n           You make sure that your mask is secure, for you see a look in Bonnie's eyes that hints she might plan to remove it. You look around the vault and see a camera you hadn't noticed before, and know, with a sinking feeling, that that could have been the end for you. You say, \"I told you not to try anything funny, now didn't I?\" \n \n           \"Yes, sorry.\"\n\n           \"Apology accepted,\" you say coolly and hand her the crowbar, \"this time... Now keep going.\"\n\n           As she returns to her work of prying open deposit boxes, you speak into your radio. \"We got at least $40,000 in cash with this one box, and at least double that in gold and jewels.\"\n\n           \"Excellent!\" You hear Zebra say. \"That's good enough, I'd say. These folks are getting antsy and so am I. The cops could be on their way. Who knows if these hostages have people waiting for them out in their cars, people who are growing worried? We've had two wander into all this already. Let's pack up.\" \n\n           \"It's no million,\" you hear Stag say, \"but it'll have to do for now.\"\n\n           What says you?\n\n           *choice\n            #You have enough\n              *set trust %+10\n              \n              \"You're right. We have enough,\" you say. \n\n              \"Agreed,\" Marlin says. \"Over.\"\n\n              \"Marlin, again, you don't have to--\" You hear a commotion from Stag's end of the radio, \"--we've got a runner!\"\n\n              \"Stop him!\" you hear Zebra shout so loud it echoes in the vault without him even using the walkie-talkie. \n\n              You rush to the vault entrance and there you see the man leaping towards the entrance of the bank. He's almost soaring. You need to think quickly. A warning shot would be quickest, but probably the most dangerous solution, but if he gets away that could be very bad for you all, and who knows how much fight he's got in him if you go hands on.\n\n              What do you do?\n              *choice\n               #Shoot a warning shot\n                 *label shot_1\n                 *set trust %-30\n                 *set Conscience %-50\n                 *set Persona 35\n            \n                 Trust: ${Trust}\n                 Conscience: ${Conscience}      \n\n                 You take aim and shoot at a vending machine near the entrance. Even though you feel as if the world is moving in slow motion, you can't see the bullet, but you realize when the man falls heavily to the ground that your bullet ricocheted off the metal of the vending machine and stuck him in the head. \n          \n                 The man is dead. You killed him, and you know it, for even from your distance you can see he isn't breathing. Being a con-artist and thief is one thing, a dreadful yet lucrative thing, but murder is almost too much for you to deal with. You know you have to face the music and repent for what you've done. After all, the man probably had a family, kids, a loving dog, a routine, a mother, a father, siblings, friends, coworkers, hobbies. You could almost see all the man's years of education, memories and thoughts flowing from the wound and blackening in mere evidence of your crime.  A pool of blood crawls out in every direction from the wound. \n\n                 Still, the man made a conscious choice, despite warning, and you simply made a mistake. You didn't mean to kill him, but you feel horrible about it. Plus, looking at the shocked body postures of Zebra and Stag, and worse yet, the fact that Marlin is bent double looking short of breath and ready to vomit, you can't help but imagine that you've lost quite a bit of their trust. \n\n                 *page_break\n \n                 \"Listen up,\" you hear Zebra boom from his place on top of the teller counter, he shakes his head, but makes the best of the situation by capitalizing on the new sense of fear that infects the hostages. \"The next one of you who runs is going to have to race a bullet to the door, as well. Also, anyone who makes a cell phone call from this location will trigger a bomb,\" he lies. \"So think twice about doing so.\" He hops down as Marlin and Stag corral everyone together. Many of the hostages are crying now.  \n\n                 \"You're starting to seem like a loose cannon, lad. That gunshot will have alerted those outside, and the police will be more zealous in trying to find a murderer than a thief. Use your brain not your bullets.\" Zebra pats you on the back. \n\n                 You feel sick with guilt. \n\n                 Suddenly, you remember that you left Bonnie in the vault. Alone. She could have already alerted the authorities somehow, pressed a panic button, used a hidden phone, or communicated through the camera to an outside agency. Your stomach drops and you quickly leave the others without a word as they regain control of the hostages. You need to see how much damage Bonnie has done. \n\n                 Coming around the bend of the vault door you gulp and take a deep breath and hope the crew won't go too hard on you, and that if they do you'll be able to trade your pudding in prison for some kind of protection from them. \n\n                 You spot Bonnie as you enter the vault. She has obviously been busy since you left her, but not in the way you thought. Nearly half of the deposit boxes are opened with a large pile of valuables on one side, and on the other, the useless scraps of paper and sentimental items. \n                 *goto vault\n\n               #Tackle him\n                 \n                 *label tackle\n                 *set trust %+30\n                 *set Conscience %+10\n            \n                 Trust: ${Trust}\n                 Conscience: ${Conscience}\n\n                 You un-cock your pistol and run at the man, leaping just as he makes it to the door. Together, in a twisted flurry of arms and legs, you tumbled to the ground where your gun slips from your fingers. The man reaches for it, but you grab his arm and pin him down. He struggles and reaches for his pocket with his other hand, and you recoil, fearing he's reaching for a knife, but he instead pulls out is wallet and shows you a picture of his kids. \n\n                 \"I could have killed you,\" you bark.\n\n                 \"Please,\" the man pleads as you tug him to his feet in a fumbling mess, then grab your gun. \"Please don't. I have kids who need me.\" \n\n                 \"If you want to be around for them, don't ever try running again. I have half a mind to make an example out of you.\"\n\n                 \"Please!\" He shields his face, afraid of being shot or beaten.\n\n                 \"Listen up,\" you hear Zebra boom from his place on top of the teller counter. \"The next one of you who runs is going to have to race a bullet to the door.\" \n \n                 He hops down as Marlin and Stag corral everyone together. \n\n                 \"Quick thinking, lad. A gunshot would have alerted those outside.\" Zebra pats you on the back. It feels good to be a appreciated. One of the few good aspects of being on a team, you think. The ideas of splitting the goods and relying on someone else have never much appealed to you.  \n\n                 Suddenly, you remember that you left Bonnie in the vault. Alone. She could have already alerted the authorities somehow, pressed a panic button, used a hidden phone, or communicated through the camera to an outside agency. Your stomach drops and you quickly leave the others without a word as they regain control of the hostages. You need to see how much damage Bonnie has done. \n\n                 Coming around the bend of the vault door you gulp and take a deep breath and hope the crew won't go too hard on you, and that if they do you'll be able to trade your pudding in prison for some kind of protection from them. \n\n                 You spot Bonnie as you enter the vault. She has obviously been busy since you left her, but not in the way you thought. Nearly half of the deposit boxes are opened with a large pile of valuables on one side, and on the other, the useless scraps of paper and sentimental items. \n                \n                 *goto vault\n\n               #Let Him go. You're almost done anyway.\n                 *label let_go\n                 *set trust %-20\n\n                 Trust: ${Trust}\n                 \n                 The man is nearly to the door when he slips on an ink pen someone didn't return to the check counter. He tumbles to the ground and grips his head, then remains trembling in the fetal position as you walk up to him.  He reaches for his pocket and you step on his wrist, but he reaches with his other one, and you aim your pistol at him incase he's got a gun or a knife, but he instead pulls out is wallet and shows you a picture of his kids. \n\n                 \"I could have killed you,\" you bark.\n\n                 \"Please,\" the man pleads as you tug him to his feet in a fumbling mess, then grab your gun. \"Please don't. I have kids who need me.\"\n \n                 \"If you want to be around for them, don't ever try running again. I have half a mind to make an example out of you.\"\n\n                 \"Please!\" He shields his face, afraid of being shot or beaten.\n\n                 \"Listen up,\" you hear Zebra boom from his place on top of the teller counter. \"The next one of you who runs is going to have to race a bullet to the door.\"\n\n                 He hops down as Marlin and Stag corral everyone together. \n\n                 \"That could have been the end of us, lad. A gunshot would have alerted those outside but so would a man running around calling for help. You have to think quick and act quicker.\" Zebra pats you on the back. You can tell he's disappointed in you. \n\n                 Suddenly, you remember that you left Bonnie in the vault. Alone. She could have already alerted the authorities somehow, pressed a panic button, used a hidden phone, or communicated through the camera to an outside agency. Your stomach drops and you quickly leave the others without a word as they regain control of the hostages. You need to see how much damage Bonnie has done. \n\n                 Coming around the bend of the vault door you gulp and take a deep breath and hope the crew won't go too hard on you, and that if they do you'll be able to trade your pudding in prison for some kind of protection from them. \n\n                 You spot Bonnie as you enter the vault. She has obviously been busy since you left her, but not in the way you thought. Nearly half of the deposit boxes are opened with a large pile of valuables on one side, and on the other, the useless scraps of paper and sentimental items. \n                 \n                 *goto vault\n\n\n            #Keep going for more\n              *set trust %-20\n              Trust: ${Trust}\n\n              \"I think we should stay for more,' you say.\n\n              \"Do you want to get caught?\" Zebra asks. \"Know your limits, lad.\"\n\n              \"Seriously. Ignore Rooster. He's the green horn. Let's get--\" You hear a sudden commotion from Stag's end of the radio, \"--we've got a runner!\"\n\n              \"Stop him!\" you hear Zebra shout so loud it echoes in the vault without him even using the walkie-talkie. \n\n              You rush to the vault entrance and there you see the man leaping towards the entrance of the bank. He's almost soaring. You need to think quickly. A warning shot would be quickest, but probably the most dangerous solution, but if he gets away that could be very bad for you all, and who knows how much fight he's got in him if you go hands on?\n\n              What do you do?\n              *choice\n               #Shoot a warning shot\n                 *goto shot_1\n           \n               #Tackle him\n                 *goto tackle\n\n        \n\n            *selectable_if (persona \u003c46) #Nothing. Sneak out with the cash      \n             *label sneak\n\n             You've never been much for teamwork. You've gotten this far in life on your own, after all, and with the cash in front of you, you can start living much better, especially if you keep it all for yourself. \n\n             You could carry a lot more if you had a second pair of hands, though. \n\n             Eyeing Bonnie, you see that she looks fit enough to carry a few bags, even if she whines the entire time. You need only make it to the getaway car you set up behind Zebra, Stag, and Marlin's backs. They would probably find a way to screw you over if you decided to help them anyway. You repeat this to yourself to cover up the guilt you are beginning to feel in deciding to leave them high and dry. \n\n             You hear a sudden commotion from Stag's end of the radio, \"--we've got a runner!\" \n             *label checkpoint  \n             \n             \"Stop him!\" you hear Zebra shout so loud it echoes in the vault without him even using the walkie-talkie. \n\n             You rush to the vault entrance and there you see the man leaping towards the entrance of the bank. He's almost soaring. You need to think quickly. \n\n             This is your chance. Your chance to escape with the cash, or your chance to turn back and help your crew. You know helping will ruin your plan of a sneaky escape, but Zebra has been good to you. Marlin and Stag seem like good guys, too.\n\n             [i]What do you do?[/i]\n             *choice\n              *selectable_if (persona \u003c46) #Nothing. Sneak out with the cash \n               It's your chance to sneak out with the cash and not have to worry about the others. It's a chance that you're not going to miss. Trying not to think of the disappointed faces of your now former crew, you load up a duffle bag.  It's a lot of money for the limited amount of time it took to pull the heist off. Two sets of hands are better than one, though. Bonnie could still be of use to you while not being much of a drain on your loot. \n\n               \"Grab what you can,\" you say to her.  \"We're leaving.\"\n\n               \"Didn't your friends just ask for help?\"\n\n               \"They aren't my friends. Now, do you want to help me, or be stuck with those three desperate, soon to be very angry, men?\" She nods so you repeat, \"Grab a bag.\"\n\n               Once you're both loaded up with all the cash and valuables you can carry, you peek your head around the vault entrance. You see Stag struggling with an apparent runner. \n              \n               [i]What do you do?[/i]\n               *choice\n                #Go out emergency exit\n\n                 The nearby emergency exit looks like the path of least resistance, and you decide to take it. It's outside of view of Marlin and Zebra, and the unruly hostage demands Stag's full attention.\n \n                 You signal for Bonnie to follow and then push open the emergency exit. Your heart sinks to the pit of your stomach when you hear the alarm sound, as you know that it's loud, annoying beeping will not go unnoticed by Zebra and Marlin. \n\n                 [i]You have to think fast. What will you do?[/i]\n                 *choice\n                  #Run\n                   \n                   *set trust %-90\n                   Trust: ${trust}\n\n                   \"Where are you going, Rooster?\" you hear Marlin shout, almost innocently. \n\n                   \"He's betraying us!\" Stag says and punctuates his words with what sounds like a left hook to the hostage's face. It sounds like he is growing nearer. Then, to your relief, you hear air escaping his lungs and assume he's been tripped. You don't stop to see if anyone else is following you, as you rush through the front doors. \n\n                   It's foggy outside, hard to see, especially with a rubber rooster mask on, but you know just where you parked your getaway car. \n\n                   \"This can't be happening,\" you hear Bonnie say. \"This is crazy.\"\n\n                   \"This way,\" you command and head towards the grocery store nearby. \"Look for the Cadillac with the Chinese delivery sign on top. With the chicken logo.\"\n\n                   In under a minute you make it to your car. A black 1990 Cadillac Deville. It's reliable, doesn't stand out too much,  and no one probably gave it a second thought as to why it was parked there with the delivery sign on top. \n\n                   Popping the tuck you toss the duffle bags of money in, tell Bonnie to get in the passenger seat, and then hop in yourself. \n                   \n           \n                   [i]What now?[/i]\n                   *Choice\n                    #Speed off\n                     You waste no time. \n                     *goto speed_off\n                    #Wait and watch for a moment\n                     *goto wait_watch\n\n                  #Fight\n\n                   Without the element of stealth, you have little faith you can make it away by just running, especially since you're not leaving without your heavy sacks of cash. Instead, you drop a bag and pull out your pistol. \n\n                   Even though you can only see their animal masks and not their faces, you sense they are hesitant to shoot their youngest member. They are thieves not killers.\n\n                   You don't want to hurt them either, but you have to escape. \n\n                   *choice\n \n                    #Shoot at Stag\n                     *set conscience %-30\n                     Conscience: ${conscience}\n                     You take aim and fire at Stag, hitting him squarely in the chest. You laughed at him earlier for wearing a bulky ballistics vest, but suddenly you're thankful he has it on. He falls to the floor and groans in pain, but he's alive. Still, his sounds of agony tear at your conscience. You have to get out now!\n                     *goto fight_run\n\n                    #Shoot the sprinkler overhead\n                     *set conscience %+10\n                     Conscience: ${conscience}\n\n                     To avoid possible killing someone, you shoot the sprinkler overhead. Immediately it and all the others in the building begin spraying water. \n\n                     You stay dry from your place by the door, but Stag and the others seem to suddenly find it very difficult to see, water surging over their eye holes. Stag also finds it difficult to mantain his balance, for when he lunges in your direction, he slips and falls to the wet floor. \n                     *label fight_run\n\n                     You gesture for Bonnie to follow as you head for your escape vehicle, after you shove your pistol in the back of your pants and pick up your duffle bags of cash.  \n\n                     \"Where are you going, Rooster?\" you hear Marlin shout from within the bank, almost innocently. \n\n                     \"He's betraying us!\" Stag says and punctuates his words with what sounds like a left hook to the hostage's face. It sounds like he is growing nearer. Then, to your relief, you hear air escaping his lungs and assume he's been tripped. You don't stop to see if anyone else is following you, as you rush through the front doors. \n\n                     It's foggy outside, hard to see, especially with a rubber rooster mask on, but you know just where you parked your getaway car. \n\n                     \"This can't be happening,\" you hear Bonnie say. \"This is crazy.\"\n\n                     \"This way,\" you command and head towards the grocery store nearby. \"Look for the Cadillac with the Chinese delivery sign on top. With the chicken logo.\"\n\n                     In under a minute you make it to your car. A black 1990 Cadillac Deville. It's reliable, doesn't stand out too much,  and no one probably gave it a second thought as to why it was parked there with the delivery sign on top. \n\n                     Popping the tuck you toss the duffle bags of money in, tell Bonnie to get in the passenger seat, and then hop in yourself. \n                     \n           \n                     [i]What now?[/i]\n                     *Choice\n                      #Speed off\n                       You waste no time. \n                       *goto speed_off\n                      #Wait and watch for a moment\n                       *goto wait_watch\n\n\n                    #Shoot at Marlin and Zebra\n                     *set conscience %-60\n                     Conscience: ${conscience}\n\n                     Seeing Zebra raise his gun, quickens your heart and your actions. You aim in his direction and fire. Two shots miss, and you hear the bullets sinking into the drywall and splitting a support beam when Zebra returns fire. Bonnie screams along with the hostages, hugs her bag of cash, and backs into a corner. You fire again, as you wonder why Marlin isn't firing back at you, as well. Then you see why, as he grabs his side and bends over double. \n\n                     He's been hit! You hit him. \n \n                     \"Damn you!\" you hear Stag bellow. A gunshot sounds and you know he's firing at you. \n\n                     You back up towards Bonnie after glancing to see Zebra go to Marlin's aide, then take aim and fire at Stag, hitting him squarely in the chest. You laughed at him earlier for wearing a bulky ballistics vest, but suddenly you're thankful he has it on. He falls to the floor and groans in pain, but he's alive. Still, his sounds of agony tear at your conscience, as does the thought of Marlin possibly dying at your hand. You have to get out now!\n      \n                     *goto fight_run\n           \n                   \n\n\n                #Run around Stag to the front door\n                 \n                 You signal to Bonnie that the time is now. Both of you take a deep breath and you focus on the light coming through the front door. It's a little difficult as you can't really adjust your mask with duffle bags in your hands. Still, you run. Darting towards the front door, you can hear Bonnie's bare feet slapping against the bank floor tiles behind you, which comes as a relief as it informs you that she is following closely. \n\n                 Looking to the counter, you see Marlin and Zebra are occupied with keeping the hostages under control. The hostages writhe as they watch Stag and the runner fight. You turn back to watch where you're running. \n\n                 To your dismay, you see that Stag has the upper hand, and has almost gotten the hostage under control. \n\n                 [i]What do you do? [/i]  \n                 *choice   \n \n                  #Run straight for the door\n                   *set trust %-100\n                   Trust: ${trust}\n\n                   You're nearly to the door when you feel a hand on your ankle, leading you to trip and drop your bags of money. You scramble to your feet and catch sight of Bonnie. Her eyes are wide with fear. She's knows as well as you that the plan has failed.\n\n                   \"Where are you scurrying of to?\" you hear Stag snarl.\n \n                   From what little you can see under your rubber mask, you notice that the hostage on the floor grabs Stag's gun. You're preoccupied with dodging the punches Stag is now throwing to be concerned with that, though. The hostages become restless, but you're winning the brawl. \n\n                   That is until you here gun fire. Marlin, Zebra and the now armed hostage are in a firefight, but that's the least of your worries as Stag wraps a strong arm around your neck and drops you to the floor. \n\n                   You can't breathe, but you can hear as the gun shots stop and Stag yells to Zebra, \"I told you he was a loose cannon.\"\n\n                   \"That you did, lad.\" You hear Zebra sigh as your world begins to go black. You no longer have the strength to claw at Stag's strong arms. \n      \n                   \"Maybe I'll keep choking you until you can't remember your name,\" Stag whispers in your ear. \"I always knew we couldn't trust you. You FBI? You've got to be crazy or some kind of rat. Doesn't matter. We'll be long gone before you wake up. If you wake up.\"\n\n                   Blackness eats away at your vision, until you slip completely into the dark.\n\n                   *image rat.png\n\n                   [i]Your team no longer trusts you.[/i]\n                   *achieve rat\n         \n                   [i]Will you start again or go back to the last checkpoint?[/i]\n                   *choice\n                    #Start over from the beginning\n                     *goto_scene end\n                    #Checkpoint\n                     *set trust %+100     \n                     *goto checkpoint\n\n                  #Knock Stag off balance\n\n                   *set trust %-90\n                   Trust: ${trust}\n\n                   Your hands are full of money, so you can't use your hands to grab your pistol or shove Stag, but the bags do give you a lot of weight. Enough weight to knock Stag over as you ram your shoulder into him. \n\n                   Stag topples over and you see the hostage leap on top of him before you turn your attention back to the front door.\n\n                   \"Where are you going, Rooster?\" you hear Marlin shout, almost innocently. \n\n                   \"He's betraying us!\" Stag says and punctuates his words with what sounds like a left hook to the hostage's face. \n\n                   You don't stop to see if anyone is following you, as you rush through the front doors. \n\n                   It's foggy outside, hard to see, especially with a rubber rooster mask on, but you know just where you parked your getaway car. \n\n                   \"This can't be happening,\" you hear Bonnie say. \"This is crazy.\"\n\n                   \"This way,\" you command and head towards the grocery store nearby. \"Look for the Cadillac with the Chinese delivery sign on top. With the chicken logo.\"\n\n                   In under a minute you make it to your car. A black 1990 Cadillac Deville. It's reliable, doesn't stand out too much,  and no one probably gave it a second thought as to why it was parked there with the delivery sign on top. \n\n                   Popping the trunk you toss the duffle bags of money in, tell Bonnie to get in the passenger seat, and then hop in yourself. \n                  \n           \n                   [i]What now?[/i]\n                   *Choice\n                    #Speed off\n                     You waste no time. \n                     *label speed_off\n\n                     Starting the Cadillac, you slam on the gas and speed out of the parking lot. Bonnie spreads out over as many surfaces as she can, trying to steady herself. She grips the passenger window, the roof, and presses hard against the floor as if trying to find her set of brakes. \n\n                     You slow down to a normal speed as you approch an intersection. The light is red.\n\n                     *choice\n                      #Stop at the light\n                       *label red_light\n\n                       You stop at the stop light, and turn to see a kid staring out of the back seat window of the car in the next lane over. He hops up and down with excitement and says something to his parents in the front seats. \n\n                       The mother finally concedes and turns to look. Her frown turns into a smile when she sees a rooster driving. She rolls down her window and gestures for you to do the same. \n               \n                       *choice\n                        #Roll your window down\n                         You roll your window down after glancing at Bonnie, trying to judge whether or not she'll scream for help. To be clear, you hold your index finger to the beak of the rooster mask in a [i]shush[/i] gesture, making sure only Bonnie can see, then nod towards your pistol. \n\n                         Bonnie nods in understanding, still breathing heavily from the speed in which you got to the stop light.\n\n                         \"Aren't you just adorable!\" the woman exclaims, as you turn towards her again. She squints as she reads the delivery sign on top of your car. \"Where is the Chinese Chicken restaurant located?\"\n\n                         Your mouth suddenly feels dry. You can think. This stupid question can't be the one to stump you. It's going to look so suspicious not knowing where it's located. Pick somewhere! you shout in your head, but nothing comes out of your mouth. \n\n                         \"Just take this street\" Bonnie leans over you and points behind the car to a street, \"all the way south until it ends, and then turn left.\"\n\n                         The woman thanks you both as the light turns green. As you continue straight, the family beside you makes a U-turn, apparently believing Bonnie. \n \n                         \"But that street never ends,\" you say. \"It's a loop.\"\n\n                         \"I know.\" Bonnie begins to laugh. \"That's the best part.\"\n\n                         Bonnie laughs for a brief moment longer, alone, before you seem to catch her fit of giggles like a disease and laugh too. Soon you are both laughing more than you should be, but it feels too good to stop just yet. \n\n                         Laughing makes your mask unbearably hot, though. It's a risk to remove it, but Bonnie did just get you out of a pickle...\n\n                         *choice\n                          #Take your mask off\n                           *set conscience %+10\n                           Conscience: ${conscience}\n                           \n                           You remove the rooster mask and feel the fresh, cool air on your face.\n\n                           \"About time you take that stupid thing off,\" Bonnie says. \"Hard enough to see in this fog without a mask on.\"\n\n                           You give her a moment to recognize you, but she doesn't seem fazed at all to find out that the Rooster is none other than Clyde lamm. \n\n                           \"Do you not remember me?\" you ask. \n\n                           \"Oh, I remember you, Clyde Lamm.\" Bonnie crosses her arms. \"Never heard from you after our date.\"\n \n                           Though you suddenly feel horrible about making Bonnie feel unwanted, you simply say, \"Business.\"\n\n                           There is a sound of disapproval for her, then nothing but silence. \n\n                           *choice\n                            #Head to your motel hideout\n                             *label motel_hide\n                             Getting into the motel room you rented earlier proves easy. Bonnie still hasn't been talking to you much, and you've allowed her to take a shower as there is no window in the bathroom of the motel room from which to escape or call for help, though you doubt she would. This getaway seems exciting to her. When she asked to take a shower, you agreed to begin gaining her trust, hoping like a mad man that the steam from the water would loosen the hold she has on her tongue. \n\n                             It's hard to stop thinking about the heist and all the choices you could have made differently. Perhaps if you stayed with the others, you'd feel something greater than the guilt you do at hurting them like you did. You don't know why you miss them, but you do. \n                              \n                             You have to take your mind off things or you'll go crazy, you realize, feeling the onset of cabin fever already.\n\n\n                             [i]What will you do?[/i]\n                             *choice\n\n                              #Check social media websites\n                               You open up your laptop, the one you bought for planning and writing, but use more to surf the web with. \n\n                               You have a few notifications, but they turn out to be invitations to farm and candy related browser games. You go to pin a few things on your digital pin boards, but realize you already have. There are also a few posts on your feeds that have a bunch of likes and comments that simply tag other friends, including a selfie of an acquaintance putting a quarter in a homeless man's paper cup, and a couple pictures of chicken salads that don't look much more exciting than the bowl of ramen noodles that stagnates on the coffee table in front of you. Everything else is people complaining about how their lives are ruined because they ran out of toothpaste or because their celebrity crush tied the knot with a French model--that, or pictures in group settings, where everyone forces a smile and poses in unnatural ways to hide their double chins or to look more petite. You realize that those people are probably more excited about putting the photos on their profiles to show that they are social just like society tells them they should be, than they are actually being around other people.\n\n                               It's sick and sad. You see it all for what it is and yet it's still hard to look away from when there is so little else to do.\n\n                               You close the laptop, willing yourself away from its empty but alluring glow. \n\n                               [i]What now?[/i]\n                               *choice\n\n                                #Watch TV\n\n                                 You feel around for a moment before finding the remote. Clicking the ON button, you hear the TV power up to an infomercial. The next three channels are similar, and in fact one is playing the exact same infomercial. When you finally find a movie on, it changes to a four minutes commercial segment. \n\n                                 \"Come on!\" you say, frustrated. More than a third of the programming is advertisements. The stations should be paying [i]you[/i] to watch the stuff.  \n\n                                 Finally, you come to something interesting. A news caster explains that three men had been arrested earlier, accused of attempting to rob a bank. Your heart sinks, knowing you probably helped get them caught. Your blood boils when you discover that that is all the reporter has to say on the matter, as the cameras shift to another caster talking about a celebrity tripping in public, as if that is news worthy.\n\n                                 You turn the TV off, bored and annoyed. \n\n                                 [i]What now?[/i]\n                                 *Choice\n                                  #Grab a snack\n                                   *goto grab_snack\n\n\n                                #Grab a snack\n                                 *label grab_snack\n\n                                 Considering the fact that she's had a crazy experience, you suspect Bonnie will be in the shower for awhile still, if only to avoid you for as long as possible. Long enough for you to grab a snack from the vending machine in the ice room a few rooms down and get a little fresh air, at least. \n                                 \n                                 Quietly you pocket the smallest bill you can from your heist booty, and silently closing the door behind you, you head towards the vending machine. You don't bother to slip your shoes on, so you can feel the heat of the cement on your bare feet. The fog has lifted, only to figuratively drift into your mind. You're confused. The whole day blends into a hazy blur. \n\n                                 You don't know if you're hungry, or if you're simply trying to stuff full the hole you created in the pit of your stomach when you betrayed your team. You knew there was a good reason you always worked alone before: relationships are complicated. So complicated you never saw this feeling of guilt coming. \n\n                                 The walk isn't long enough, you blaspheme under your breath. \n\n                                 Looking at the vending machine contents, you see that it isn't kept well stocked.\n\n\n                                 [i]What will you purchase?[/i]\n                                 *Choice\n                                  #A small apple pie \n                                   You decide that the apple pie, which is likely more of a pocket of dough and sugar than it is a real pie, looks all right. \n\n                                   After studying the selection grid of letters and numbers, and double checking, you press C7. \n\n                                   The coil behind the apple pie twists a rotation and a half, dropping the pie into the collection pit with a [i]thunk[/i]. You bend and pick it up.\n\n                                   The knowledge that you can buy a hundred-thousand more of these pies with the money you stole does nothing to make it taste any sweeter. In fact, the pie is sour as you bite into it, and you doubt that's because it's expired. \n\n                                   You might be a proper thief, but you feel like a terrible human being. Marlin, Stag, and Zebra are going to jail because of you. You probably could've had a family in those men; gone on a real adventure, but instead you're stuck babysitting a girl and sitting on a pile of cash you no longer want to spend. Maybe this depression will pass as quickly as it has developed, but you can't be certain of that. Part of you hopes you'll choke on the apple pie then and there, but you consume the whole thing without issue.  The pie is more filling than it would have been if you'd shared it, but you never much liked being stuffed anyway, you realize. \n\n                                   *achieve capitalist\n\n                                   [i]Congratulations! You have completed the lone wolf, capitalist track of the game. Play again to go on the bigger adventure with your team, or search for the three insanity endings.[/i]\n\n                                   *goto_scene end\n\n\n\n                                  #A candy bar\n                                   You decide the candy bar looks all right. \n\n                                   After studying the selection grid of letters and numbers, and double checking, and inserting your money, you press B3. \n\n                                   The coil behind the candy bar twists a rotation, then stops. It fails to drop the dessert into the collection pit.\n\n                                   *choice\n\n                                    #Shake the vending machine\n\n                                     *set health %-100\n                                     Health: ${health}\n                                  \n\n                                     You paid for it, even if it was with stolen money. It's your candy bar, and you mean to eat it. You're the only thief here! \n\n                                     Grabbing the sides of the machine you begin to rock the hulking machine.You let go as soon as you see the candy bar beginning to fall.Something is wrong, though. It's not just the candy bar falling, but rather the entire machine. There's no time to leap out of the way, you realize, as the heavy thing falls on top of you. You feel it snap the bones of your knees and ribcage, and the top edge of it cut into your throat. \n\n                                     You turn your head sideways as the world beging to go dark, and the pain begins to dull. A foot from your nose is an apple pie. It's as if it's taunting you. The thing is, you'd laugh if you could. It's just such a fitting end for you, you think, and then there is nothing at all. \n                                     \n\n                                     *image gameover.png\n                               \n                                     *achieve capitalist\n\n                                     [i]Congratulations! You have completed the lone wolf, capitalist track of the game. Play again to go on the bigger adventure with your team, or search for the three insanity endings.[/i]\n\n                                     *goto_scene end\n\n\n\n                                    #Try for the apple pie instead\n\n                                     After studying the selection grid of letters and numbers once more, and double checking, you press C7. \n\n                                     The coil behind the apple pie twists a rotation and a half, dropping the pie into the collection pit with a [i]thunk[/i]. You bend and pick it up.\n\n                                     The knowledge that you can buy a hundred-thousand more of these pies with the money you stole does nothing to make it taste any sweeter. In fact, the pie is sour as you bite into it, and you doubt that's because it's expired. \n\n                                     You might be a proper thief, but you feel like a terrible human being. Marlin, Stag, and Zebra are going to jail because of you. You probably could've had a family in those men; gone on a real adventure, but instead you're stuck babysitting a girl and sitting on a pile of cash you no longer want to spend. Maybe this depression will pass as quickly as it has developed, but you can't be certain of that. Part of you hopes you'll choke on the apple pie then and there, but you consume the whole thing without issue.  The pie is more filling than it would have been if you'd shared it, but you never much liked being stuffed anyway, you realize. \n\n                                     *achieve capitalist\n\n                                     [i]Congratulations! You have completed the lone wolf, capitalist track of the game. Play again to go on the bigger adventure with your team, or search for the three insanity endings.[/i]\n\n                                     *goto_scene end\n\n\n\n\n\n                                  #Nothing. Just punch the machine in frustration\n                                   *set health %-100\n                                   Health: ${health}\n                                  \n\n                                   You punch the vending machine in frustration--frustration with yourself. Just as you wind up to hit it again, the pain sets in. Your hand throbs with pain and you clutch it. On the bright side, an apple pie is knocked loose from its place in the machine, and falls into the collection pit with a thunk. You stoop and pick it up.\n                                   \n                                   Being the thief that you are, you decide you want more. Perhaps a candy bar.\n\n                                   Grabbing the sides of the machine you begin to rock the hulking mass of it.You let go as soon as you see the candy bar beginning to fall. Something is wrong, though. It's not just the candy bar falling, but rather the entire machine. There's no time to leap out of the way, you realize, as the heavy thing falls on top of you. You feel it snap the bones of your knees and ribcage, and the top edge of it cuts into your throat. \n\n                                   You turn your head sideways as the world begins to go dark, and the pain begins to dull. A foot from your nose is the apple pie. It's as if it's taunting you for being selfish. The thing is, you'd laugh if you could. It's just such a fitting end for you, you think, and then there is nothing at all. \n                                     \n\n                                   *image gameover.png\n                               \n                                   *achieve capitalist\n\n                                   [i]Congratulations! You have completed the lone wolf, capitalist track of the game. Play again to go on the bigger adventure with your team, or search for the three insanity endings.[/i]\n\n                                   *goto_scene end\n                                    \n\n\n                              #Watch TV\n                               You feel around for a moment before finding the remote. Clicking the ON button, you hear the TV power up to an infomercial. The next three channels are similar, and in fact one is playing the exact same infomercial. When you finally find a movie on, it changes to a four minutes commercial segment. \n\n                               \"Come on!\" you say, frustrated. More than a third of the programming is advertisements. The stations should be paying [i]you[/i] to watch the stuff. \n\n                               Finally, you come to something interesting. A news caster explains that three men had been arrested earlier, accused of attempting to rob a bank. Your heart sinks, knowing you probably helped get them caught. Your blood boils when you discover that that is all the reporter has to say on the matter, as the cameras shift to another caster talking about a celebrity tripping in public, as if that is news worthy. \n\n                               You turn the TV off, bored and annoyed. \n\n                               [i]What now?[/i]\n                               *Choice\n\n\n                                #Check social media websites\n                                 You open up your laptop, the one you bought for planning and writing, but use more to surf the web with. \n\n                                 You have a few notifications, but they turn out to be invitations to farm and candy related browser games. You go to pin a few things on your digital pin boards, but realize you already have. There are also a few posts on your feeds that have a bunch of likes and comments that simply tag other friends, including a selfie of an acquaintance putting a quarter in a homeless man's paper cup, and a couple pictures of chicken salads that don't look much more exciting than the bowl of ramen noodles that stagnates on the coffee table in front of you. Everything else is people complaining about how their lives are ruined because they ran out of toothpaste or because their celebrity crush tied the knot with a French model--that, or pictures in group settings, where everyone forces a smile and poses in unnatural ways to hide their double chins or to look more petite. You realize that those people are probably more excited about putting the photos on their profiles to show that they are social just like society tells them they should be, than they are actually being around other people.\n\n                                 It's sick and sad. You see it all for what it is and yet it's still hard to look away from when there is so little else to do.\n\n                                 You close the laptop, willing yourself away from its empty but alluring glow. \n                                 \n                                 [i]What now?[/i]\n                                 *choice\n                                  #Grab a snack\n                                   *goto grab_snack\n\n                                #Grab a snack\n                                 *goto grab_snack\n\n\n                                \n\n\n\n\n                          #Leave the mask on\n                           You decide you'll leave the mask on, but soon you find yourself wiping sweat from your neck. \n\n                           Bonnie seems to take notice as well, for she says, \"Just take it off, Clyde.\"\n\n                           She's right. It's as dangerous as it is uncomfortable to drive around in a rubber mask.  Plus it's a danger to your freedom, seeing as the police might have already been alerted to a bank robbery with a crew of farm animals. [i]Wait![/i] Bonnie said your name, Clyde.\n\n                           \"Clyde?\" you play dumb.\n\n                           \"Don't play dumb,\" she calls you out. \"I'm not stupid. I had a whole dinner with you a few nights ago. I know your body shape and voice.\"\n\n                           \"Is that why you helped me back there?\" you ask as you remove the rooster mask and feel the fresh, cool air on your face.\n\n                           \"I don't know why I helped you. You're kind of a maniac.\"\n\n                           \"But a cute maniac, right?\"\n \n                           Bonnie tries to hide her smirk by staring out her window, but you saw it. \n           \n                           The car grows silent for a while. \n\n                           *choice\n                            #Head to your motel hideout\n                             *goto motel_hide\n\n                        #Run the red light\n                         You don't want to take the chance of the cops catching up to you, so you run the red light. \n\n                         It's hard to see in the fog, but you don't hear anything other than the revving of your engine. Midway through the intersection, however, you do hear something else: a police siren. A police officer has seen you blow through a red light and is now in pursuit.\n                          \n                         [i]What now?[/i]\n\n                         *choice\n                          #Pull over\n                           Your Deville might be fast, but you're not confident it could outrun a police cruiser, so you decide to pull over. After you do, you see the officer approaching. It's only then that you remember your mask is on. \n\n                           \"You really going to leave that on, Clyde?\" Bonnie says...\n\n                           She's right. That would be bad seeing as the police might have already been alerted to a bank robbery with a crew of farm animals. [i]Wait![/i] She said your name, Clyde.\n\n                           \"Clyde?\" you play dumb.\n\n                           \"Don't play dumb,\" she calls you out. \"I'm not stupid. I had a whole dinner with you a few nights ago. I know your body shape and voice.\"\n\n                           You have no more time to argue. The officer is nearly to your window, so you rip the mask off. Bonnie snatches it from you and kicks it under her seat, just as the officer taps on your window. You roll it down. \n\n                           \"You ran a red light, sir.\"\n\n                           \"Sorry, officer,\" you say. \"It's hard to see in the fog.\"\n\n                           \"It is, indeed. You need to drive defensively. And did I see you wearing a mask?\"\n       \n                           You shake your head as if lost, and when the officer looks at Bonnie and continues with \"red colored?\" she shakes her head, too, to your relief. \n \n                           \"My boyfriend is still blushing with embarrassment from a botched lunch with my family,\" Bonnie says. \"Perhaps that's what you saw.\"\n\n                           \"Ah.\" The officer nods and pats your shoulder. \"We've all been there, son. I don't want to ruin your day further, so just drive safe and get on out of here, all right.\"\n  \n                           \"All right. Thank you, officer,\" you say. Only after you've put some distance between you and the officer, can you breathe again.\n                           \n                           *choice\n                            #Head to your motel hideout\n                             *goto motel_hide\n\n                          #Speed away\n                           *set conscience %-100\n                           Conscience: ${conscience}\n\n                           You punch the gas pedal into the floor with both feet, and for a moment it seems as if you'll get away, but in the next instant a child is in front of your car. There is no time to stop. Time all but freezes as your heavy metal car collides with the fragile young boy--a boy not constructed on an assembly line and easily replaced, but rather a unique individual loved by his family. \n\n                           The boy soars overhead. \n \n                           Slamming on the brakes, it seems to take forever to stop, but finally the car stops rolling. You get out as soon as it does. \n\n                           Even from twenty feet away you can see it's bad. Mangled, and bloody, and bad. You can't even bear to take a step closer once you realize there is no saving the child. Your legs go numb and give out beneath you. A fire burns at your conscience, just as the blue and red lights of an approaching police cruiser burn your eyes, magnified by the tears.       \n\n \n                           *image scale.png\n                           *achieve offbalance\n\n                           [i]You can't live with this guilt.[/i]\n                    \n                           [i]Will you start again or go back to the last checkpoint?[/i]\n                           *choice\n                            #Start over from the beginning\n                             *goto_scene end\n                            #Checkpoint\n                             *set conscience %+100     \n                             *goto speed_off\n                            \n \n \n                           \n                         \n\n                      #Run the light\n                       *set health %-100\n                       Health: ${health}\n\n                       You don't want to take the chance of the cops catching up to you, so you run the red light. \n\n                       It's hard to see in the fog, but you don't hear anything other than the revving of your engine. Midway through the intersection, however, you do see something: a pair of lights. They are yellow not red, but far less welcome. A truck barrels in on you from the driver side, and you have no time to move. The truck slams into your Cadillac, instantly crushing it and you with it. \n\n                       When you finally come to a stop, you find the only thing you can move is your right hand. You strain and twist it in an expression of the pain the rest of your body feels, but a moment later you can't even move that. You're bleeding out, and you're pretty sure Bonnie is already dead, as you don't hear a thing from her.  \n                    \n                       [i]Your life has slipped through your fingers[/i]\n\n                       *image gameover.png\n                       *choice\n                        \n                        #Start over from the beginning\n                         *goto_scene end\n                        #Checkpoint\n                         *set health %+100     \n                         *goto speed_off\n\n\n                    #Wait and watch\n                     *label wait_watch\n                     You decide to wait, watch, and listen for a moment, feeling secure in the deep fog. Not a moment later you hear shouting, only it isn't your old crews' voices. It sounds like the police.\n\n                     \"Freeze!\" the voices shout. \"Drop your weapons.\"\n\n                     Red and blue lights suddenly appear in the distance, diffused by the fog. \n\n                     You have to get out of there. You waste no more time.\n                     \n                     *goto speed_off\n         \n                    \n\n\n                   \n                  \n\n                  #Shoot Stag\n                   \n                   *set health %-100\n                   Health: ${health}  \n                   *set trust %-99\n                   Trust: ${trust}\n\n                   You drop a duffle bag of cash and pull your pistol, all while running. Taking aim when Stag raises his head, you almost laugh as he looks like a deer in headlights, only it's a tiny bullet he finds coming at him when you pull the trigger, not a semi-truck. You don't laugh when you see the crater in his face--the one you made. You've graduated from thief to murderer, and feel no sense of satisfaction. In fact, it's quite the opposite. You feel guilty and sick.   \n                    \n                   With no choice now, you continue running, leaving the bag of money as payment for something you can never truly make right.\n\n                   The others are shouting from behind you and the hostages gasp in unison. \n\n                   \"Stop!\" you hear Marlin call out, the heartbreak in his voice is hard to miss. Stag was his best friend. He trusted you. \n\n                   \"Don't let him get away,\" Zebra shouts. \n  \n                   The first shot misses you, but the sound it makes doesn't go missed by your ears. The others are shooting at you. \n\n                   You fire blindly as you run for the door. \n\n                   A sharp pain explodes in the left side of your stomach. You've been shot. \n\n                   You power on towards the front door. It's very bright outside, and you want nothing more than to be outside. Live or die, you want to make it outside where there are birds despite it being foggy, and hopefully a breeze. \n\n                   Hand on the handle, you push, but there comes a whack at the back of your head. Then there is only black. You and stag will never get outside again. At least not outside a pair of body bags.\n\n                   *image gameover.png\n\n                   [i] Your life has slipped through your fingers.[/i]\n\n                   [i]Will you start again or go back to the last checkpoint?[/i]\n                   *choice\n                    #Start over from the beginning\n                     *goto_scene end\n                    #Checkpoint\n                     *set health %+100\n                     *set trust %+99     \n                     *goto checkpoint\n\n                 \n               \n              #Shoot a warning shot\n\n
