owning.\n\n    \"That dog came out of nowhere. I--\" Bonnie stops mid sentence. \n    *goto dog_pack\n\n\n #Head to the RV park on foot\n  *label dogs_dogs\n  Taking the pink Isuzu Amigo would be too much of a risk, so you decide to walk to the RV park instead. It'll cost you time, but it might choice be a choice that saves you from spending a lot of time behind bars. \n\n  You concentrate on the distance as you walk, keeping an eye and ear out for cops, so when Bonnie asks you a question you nearly fall into a bush in surprise. \"What's the plan, Clyde?\" she asks. Hearing her use your name has a calming effect. You become relaxed enough to lay out the plan for her.\n\n  \"Simple.\" You pause feeling the silence cut through you. \"Simple, but dangerous. Maybe you should hang back.\"\n\n  \"No. I want to help.\"\n\n  \"Why?\" you ask, genuinely curious.\n \n  \"I don't know.\" She twists her hands in her lap. She spends a moment thinking about it as she steps around cracks in the sidewalk.  \"My daddy was an outlaw, a burglar and smuggler, so I guess it's in my blood. Momma used to tell me stories about him. She'd try to tie a moral into the end of each story and tell me what he did, and the work he was into, was bad and that I should never go down that path, but I could always see a certain kind of pride in her eyes as she talked about him. A little jealousy, too. She wanted to be like him, but she had to take care of me--or maybe she just didn't have it in her.\"\n\n  \"Maybe she was a smart woman to stay of crime,\" you say, playing devil's advocate. \n\n  \"She wasn't all that smart. Kind and beautiful, but not smart. She got bitter and always seemed bored though, like her mind was flying free while her body stayed safe in our suburban home. Kind of like the G.I. Joes I used to play with. I could keep them mint condition in the box, but they weren't any fun that way.\"\n\n  You laugh and Bonnie asks you why.  \"I'm just surprised is all,\" you confess. \"Guess you have given this more thought than I gave you credit for.\"\n\n  \"I've been dreaming my whole life. Just like my mamma. I don't want to stay in the box. I want to have a little fun.\"\n\n  \"All right, then.\" You smile and wink at Bonnie. \"Let's have a little fun.\" You lick your lips in preparation of telling Bonnie the plan. It sounds more stupid the more you think about it, but you say it aloud anyway. \"Like I said, it's simple. We grab Wesley's RV. Then we radio Narsico to make some noise around the back of the house. Pull up, get everyone into the RV while the cops are distracted, then swing back around for Narsico.\"\n\n  Bonnie crosses her arms. She seems unimpressed, and honestly you're wondering how good of a chance at success you actually have. \n\n  Bonnie says, \"They'll just blow the tires with a spike strip.\"\n\n  *choice\n   #\"Not if we have a hostage\"\n    \"Not if we have a cute young hostage to make them second guess their actions.\"\n\n    You can see her piecing together your sentence after her initial outburst of, \"I am not a hostage!\"\n\n    \"They don't know that.\"\n\n    \"But what if--\" Bonnie cocks her head to the side and looks you in the eyes.  \"Hold on. You think I'm cute?\"\n\n    \"Did I say that?\" You act coy. \"Must have just slipped out.\" \n\n    \"But do you--\" Bonnie stops mid sentence. \n \n    *label dog_pack\n\n    Standing before you both is a pack of dogs. Some of the dogs wear collars, others chains, and still others wear nothing except the same vicious snarl on their muzzles as all the others. \n\n    [i]What do you do?[/i]\n    *choice\n\n\n     #Push Bonnie down and make a run for it\n      *label push_bonnie\n      *set Conscience %-40\n      Conscience: ${conscience}\n      *set persona 35\n\n      Without hesitation you push Bonnie down and make a run for it. It must just be in your nature. You're a survivor, after all. You don't like to gamble with your own life.\n\n      To your relief, the dogs don't follow you, but in the end something worse does: Bonnie's screams of agony. She's being ripped apart and you hear all of it--the wails, the growls, the tearing of flesh, the slosh of blood. You swear you can hear the dogs swallowing chunks of Bonnie once her screaming has died down to a whimper.\n\n      Still, you know her howls of pain will haunt you forever. \n\n      You decide to walk back into the pack of dogs just to make sure there's nothing you can do for the sweet Bonnie Loren. Just how sweet, you don't know--only the dogs do. You're a monster. Seriously...\n\n      \"You monster!\" you hear Bonnie shout, but it isn't a ghostly sound. She's alive. She's made it over the fence. \"You pushed me down!\"\n\n      You scramble over the fence yourself to escape the dogs that have turned their attention to you.\n\n      You decide to lie, for what's a little lying compared to attempted murder? \"I must've tripped and fell into you, and I figured you'd get up and be right behind me. I'm so sorry, Bonnie. I came back for you as soon as I realized you weren't behind me.\"\n\n      \"What a gentleman...\" Bonnie says, heavy on the sarcasm. \n\n      The dogs eventually run off, in pursuit of a squirrel, and you begin again towards the RV park, Bonnie's anger slowly subsiding, but the guilt you feel lingers much longer. \n      *finish\n\n     #Jump over the nearby chain link fence\n      You gesture to the fence, hoping Bonnie looks to where you point, as the dogs all keep their noses pointed at you. You ask, \"Think you can scale that fence?\"\n\n      \"Yeah. I think so,\" Bonnie says. \n\n      \"You go ahead. I'll keep my eyes on the dogs.\"\n\n      A second later you hear the rattle of metal and a chorus of growls. The dogs are not happy. \n      *choice\n       #Hurry and climb the fence yourself\n        *label climb_fence\n        *set trust %+20\n\n        You feel the adrenaline pumping through you to the point that you feel like you could simply leap over the chain link fence in a single bound. It takes more than a single jump however, but you do scramble over it in a matter of seconds. You can feel the dog nipping at the cuffs of your pants, hear them slamming against the fence and barking. \n\n        You tumble to the grass on the other side of the fence and take a moment to catch your breath. \n\n        \"Thank you,\" Bonnie says. \n\n        You take a deep breath, thankful not to be dog food, before you ask, \"for what?\"\n\n        \"For making sure I got over the fence first.\"\n\n        \"Anytime.\" You smile. \n\n        The dogs eventually run off, in pursuit of a squirrel, and you begin again towards the RV park. \n        *finish\n\n       #Fight the dogs\n        *label fight_dogs\n        *set health %-30 \n        *set Conscience %+20\n        Health: ${health}\n        Conscience: ${conscience}\n\n        Slowly you take off your jacket and wrap one sleeve around your left hand.  Like a matador, you hold your jacket to the pack of dogs, which look so much more dangerous to you then, than a bull. The pack send a golden retriever to test you it seems. The dog leaps at you, but you're ready for it. As it leaps you wrap your jacket around it and make sure it can't bite you and then flip it as hard as you can, as if in a wrestling match.  The golden retriever yelps and then limps back to the pack. \n\n        Rather than give you the win, the rest of the pack attacks all at once. You whip the jacket around creating a pocket of space between you and most of the dogs. One dares to jump at you from the backside, biting your elbow, but you shake it off, and kick a dog that is trying to bite your shin. \n\n        One by one you scare the dogs off, sending them to the other side of the street, until it's just you and the large German Sheppard. \n\n        The dog jumps at you just as the golden retriever did and you manage to get it in a headlock. You twist around and get the German Sheppard in a more manageable position, keeping the dog locked down with your arm. The dog begins to whine, and you take that as a sign of surrender. \n\n        [i]What do you do?[/i]\n        *choice\n         #Let it go with a stern \"no!\"\n          *set Conscience %+40\n          conscience: ${conscience}\n          *set trust %+40\n          Trust: ${trust}\n\n          *label bad_dog\n          After slapping the German Sheppard on the nose and yelling \"No! Bad Dog\" you let it go. The dog runs to his pack, looking defeated with its tail between its legs. The animal likely won't attack anyone ever again. After all, you aren't the toughest of guys and you managed to take on and defeat a whole pack. Chances are all the dogs will be returned to their owners in time. \n\n          It feels good that you only had to take and dole out a few bruises and taught a group of dogs a valuable lesson in the process of doing so. \n\n          \"I don't know if fighting them was necessary. You looked awesome though,\" Bonnie says. \"Thank you.\"\n\n          You take a deep breath, thankful not to be dog food and for gaining the admiration of Bonnie, before you ask, \"for what?\"\n\n          \"For making sure I got over the fence first.\"\n\n          \"Anytime.\" You smile. \n\n          You and Bonnie begin again towards the RV park.\n          *finish \n\n         #Snap its neck\n          *set conscience %-20\n          conscience: ${conscience}\n          *set trust %+20\n          trust: ${trust}\n\n          You could just let the dog go with a stern warning, but it did try to kill you. To send a more final message to the rest of the dogs you decide to kill the leader. You're blood boils, a broth of adrenaline and anger. Still, something tells you that killing the dog is a bad idea, but still you strain to apply enough pressure to do so. \n\n          The German Sheppard whines and you look into its panicked eyes. \n\n          You can't do it. The fact that you even considered killing the dog eats away at your conscience, imagining that you went through with killing the dog leaves you feeling ill.  \n          *goto bad_dog\n     \n     #Stand still\n      *label stand_still\n      *set health %-100\n      Health: ${health}\n\n      You freeze. For your whole life you've thought of dogs as only man's best friend, but something about all these dogs grouped together has you thinking about how awful people can be when grouped in a similar fashion--telling suicidal people to \"jump! jump!\" or looting stores, or burning cars. These dogs look just as hungry for carnage and violence. Or maybe they are just hungry for you. \n\n      As neither you nor Bonnie move a muscle, the dogs seem to decide that you are not a threat. But you realize they now definitely consider you a meal as the whole lot of them leap at you. Before you even have a chance to reach for your gun there is a dog pinning you at either wrist. \n\n      Almost as if it is savoring the look of fear in your pained eyes, the leader of the pack, a German Sheppard, eyes you for a moment before digging its sharp fangs into your neck. \n\n      *image gameover.png\n\n      Your life has slipped through your fingers.\n\n      [i]Will you start again or go back to the last checkpoint?[/i]\n      *choice\n       #Start over from the beginning\n        *goto_scene end\n       #Checkpoint\n        *set health %+100     \n        *goto dogs_dogs\n\n\n       \n     #Shoot at the lead dog\n      *label shoot_dog\n      It's a reflex now. Pulling your gun is a reflex and you aren't sure how that makes you feel overall, but in the moment, holding the gun in your hand makes you feel a whole lot more secure. \n\n      You take aim at the lead dog, a German Sheppard, but just as you pull the trigger a small Chihuahua nips at your ankle and causes you to miss your target. You only graze the German Sheppard at the head of the pack. The dog sniffs his side where there is a little blood and shakes his head as a few of the other dogs do, irritated by the loud bang of your gun. The leader of the pack turns and trots away and the others follow, as does the Chihuahua, after it tries to bite you a few more times. \n\n      At first you think it's your ears ringing from the blast of the gun, then you realize there is also the sound of approaching sirens. They grow louder and louder until you can see the red and blue of the lights. \n\n      \"Hands where I can see them, folks.\" You here a police officer over his cruiser's speaker system.\n\n      [i]What do you do?[/i] \n      *choice\n       #Shoot your way out\n        *set health %-100\n        Health: ${health}\n\n        Pulling you gun has truly become a bad habit for you. You take aim and fire at the officer before he even has time to get out of his car to question you. He probably would have known you had something to hide anyway. Better to use what little advantage you have by using of the element of surprise. \n\n        You get two shots off as the officer opens his door, and the mustached man falls immediately to the ground. \n\n        You lower your gun a little and approach the downed officer. He looks dead and you turn back to Bonnie to tell her so. She points behind you but before you have time to turn around you feel something blow through your heart. From your chest splatters a beautiful array of red liquid drops. Time slows and the drops of what you realize are your blood seem to hover mid air. \n\n        You can see Bonnie draw her hands over her mouth in shock, and then there is nothing. \n\n        *image gameover.png\n\n        Your life has slipped through your fingers.\n\n        [i]Will you start again or go back to the last checkpoint?[/i]\n        *choice\n         #Start over from the beginning\n          *goto_scene end\n         #Checkpoint\n          *set health %+100     \n          *goto shoot_dog\n\n\n\n       #Talk your way out\n        *set identity %+20\n        Identity: ${identity}\n\n        After tucking your pistol into the back of your pants, you raise your hand in greeting and make sure to smile. You put in a great effort to make it seem like a positive smile and not an eerie one, even though seeing a cop makes you anything but happy. \n\n        The officer gets out and you notice he does not have a weapon drawn--no baton, no taser, no pistol. It's a good sign and you take advantage of the situation. \n\n        \"You here about that gun shot a minute ago, officer?\"\n\n        \"Yes, sir,\" the officer says. \"What do you know about it?\"\n\n        \"Why, we were just fixing to call 911. We heard the shot and we looked to where it came from we saw what looked like a couple of young men, not much younger than me, running that way.\" You point the opposite way that you are headed. \"They were wearing hoodies. We didn't get a good look at their features.\"\n\n        \"Do you mind if I get your name and number?\" The officer pulls out a note pad. \"In case there ends up being charges pressed. I'd like a witness.\"\n\n        \"Certainly.\" You give him a fake number tell him your name is \"James Nichols. With an O, not like the coin. Can't tell you how many people get that wrong. In fact, funny story there was this--\"\n\n        \"You'll have to save that story for another time, son.\" The officer turns to leave. \"I'm on the hunt.\"\n        *finish\n\n       \n\n\n     #Throw what is in your pocket in hopes the dogs will fetch\n      *label throw_pocket\n      You fish around in your pocket for something suitable to throw. All you can find is keys and a Zippo lighter. You wind your arm up after shaking the lighter in front of the dogs and seeing some of their tongues droop and wag. Throwing the lighter as hard as you can, you see only a couple of the dogs chase after it. The majority of the dogs remain staring at you, growling. \n      \n      [i]What now?[/i]\n      *choice\n       #Hurry and climb the fence\n        *goto climb_fence\n       #Fight the dogs\n        *goto fight_dogs\n       #Stand still and hope the dogs leave\n        *goto stand_still\n\n\n\n   #\"Not if we're quick enough\"\n    *set trust %-10\n    Trust: ${trust}\n\n    \"Not if we're quick enough.\"\n\n    \"Don't be silly. How fast can an RV be? We can't outrun the radio. They'll just call ahead to the next county if we even make it out of this one.\"\n\n    \"Good point,\" you admit.  \"It's a good thing we have a cute young hostage to make them second guess their actions.\"\n\n    You can see her piecing together your sentence after her initial outburst of, \"I am not a hostage!\"\n\n    \"They don't know that.\"\n\n    \"But what if--\" Bonnie cocks her head to the side and looks you in the eyes.  \"Hold on. You think I'm cute?\"\n\n    \"Did I say that?\" You act coy. \"Must have just slipped out.\" \n\n    \"But do you--\" Bonnie stops mid sentence. \n\n    Standing before you both is a pack of dogs. Some of the dogs wear collars, others chains, and still others wear nothing but the same vicious snarl on their muzzles as all the others. \n\n    [i]What do you do?[/i]\n    *choice\n     #Jump over the nearby chain link fence\n      *goto climb_fence\n     #Push Bonnie down and make a run for it\n      *goto push_bonnie\n     #Shoot at the lead dog\n      *goto shoot_dog\n     #Throw what is in your pocket in hopes the dogs will fetch\n      *goto throw_pocket\n     #Remain still\n      *goto stand_still\n\n", "rv": "Coming into the RV park, you spot Wesley's RV straight away. It's easy to do so. Not only because you've visited a hundred times, but because his is the only RV on the entire RV park property with no live plants, lawn flamingos, or wind chimes around it. The rest of the RVs all have a surplus of these things and you hear hundreds of wind chimes clanging in the wind that seems to be picking up. The lawn flamingos and even the few heavy lawn gnomes shake as if shivering in the cold breeze. \n\nYou head straight to Wesley's RV, avoiding the office, because you know the landlord recognizes you as Wesley's nephew (a lie) and you aren't positive Wesley has been paying to dues. \n\nInside the RV you see the bed in the back and instantly feel tired, but you have work to do and friends to save, so instead of hoping in bed, you hop in the driver seat. You find that you can't step on the gas, and it isn't until you hear a cat hiss that you realize that Wesley's cat was sleeping under the pedals. It slinks out, looking angry and heads for the couch. \n\nJust as you're about to leave the RV park, you notice sirens. At the entrance you see three cop cars blocking the entrance. They're likely here for Wesley's RV. \n\nYou slam you hands on the steering wheel. \n\n\"What isn't going to go wrong today?\" you shout. \n\n\"Think, Clyde,\" Bonnie says calmly from the passenger seat. \"There's got to be a way out of here.\"\n\n\"Only the one entrance to the park.\" You point towards the cops. \"Wesley liked it because it was less to watch.\"\n\n\"We have to think outside the box.\"\n\nThinking hard, you come up with two ideas. You could ram the cop cars and hope to decommission them or you could try to get enough speed to jump the hedge of trimmed juniper bushes near the entrance. \n*choice\n #Jump the junipers\n  *label junipers\n  \"We're going to jump the junipers,\" you say in warning to Bonnie.\n\n  Bonnie laughs. \"I hope that isn't as ridiculous as it sounds.\"\n\n  You take the longest way around the RV park in order to build up speed. As you near the entrance you grip the steering wheel tighter. You can see the landlord smoking a cigarette while talking to the cops, probably telling them everything she knows about Wesley Richards. When she spots the RV coming at them, she rushes towards you waving her arms. To her this is a routine stop so the cops can investigate. It isn't until you shift to fourth and she hears you honking and sees you're not going to stop that she leaps out of the way. \n\n  You aim the RV at the three-foot high hedge of trimmed juniper bushes. You brace for impact, hoping there is no concrete hidden beneath the leaves. \n\n  Just as the RV touches the bushes, you hold your breath, then exhale a moment later. To your relief, the RV easily cuts through the bushes. The act probably also easily got the attention of the cops at the park entrance. Sure enough, only a few seconds later, you hear sirens approaching. \n\n  All three cop cars have followed you. \n\n  \"What do we do?\" Bonnie runs back up from the back bedroom where she had gone to get a better look a moment before. \"We'll never outrun them.\"\n\n  \"Take the wheel,\" you say. \"If I know Wesley, he's prepared the RV for this exact scenario.\"\n\n  You and Bonnie switch places quickly, not losing much speed at all, but certainly not gaining any distance from the cop cars either. You head to the bedroom, trying to remember if Wesley ever mentioned anything. It isn't until you step on a cat food kibble that you remember he installed a caltrop mechanism in the back. The little spikes will stop the police cruisers for sure, if you can find the switch that is, but that might be easier said than done. \n\n  You could also take the less tactful route and simply shoot at the cops, but that would probably be more dangerous because they may shoot back, plus shooting from a moving vehicle will mean you won't be fastened in and near an open window. \n\n  [i]What's it going to be?[/i]\n  *choice\n   #Find the caltrop switch\n    You struggle to keep your balance as you search for the caltrops switch. Bonnie serves to avoid a line of traffic and it's hard for you to stand. \n\n    The sirens sound louder, and as you peek out the window you realize the cops are about to try to pass the RV. You have to find that switch. \n  \n    Just as you're about to give up hope, Wesley's cat leaps from its place on the bed and knocks a book from its place on the nightstand. The caltrop button is revealed and you press it quickly. \n\n    You hear the sprinkling of metal spikes falling to the road, and then swerving. You struggle to the window and see that the caltrops worked just as planned, as the cops swerve back and forth before coming to a stop and finally fade into the distance. \n\n    As you walk back to the front to tell Bonnie the good news she swerves a little to avoid something in the road and you hit your head hard on a wooden cabinet. Feeling dizzy, you fall to the couch. \n    *choice\n     #sleep it off\n      *finish\n\n   #Shoot at the police\n    *set health %-20\n    Health: ${health}\n\n    Screw it, you think. There is no time to look for the cool caltrop switch that you're not even sure wasn't just a joke. You pull your gun and peek a couple times out the back window. The three cop cars are still following you. \n\n    You shoot at the leading car's front tire and amazingly you hit it, sending the car spinning off to the side of the road. Unfortunately, the other two cars are unaffected. You take aim and shoot again, but miss. You simply need a better position to shoot front, so you open the window all the way. \n\n    The air whips about you. \n\n    As you take aim a third time, you realize something is wrong. You've lost your balance. Yes, that's it.  \n\n    You fall face first out the back of the RV, the gray-black of the asphalt rushes up to meet you, filling your vision, until suddenly it is much darker. Your face hurts, and you feel a tug on your left leg. You're still moving, and the air is spinning around you. \n\n    Looking back up from where you fell with blurring eyes, you notice that your pant leg and shoelaces have saved you from certain death. You're injured, but alive.\n    *choice\n     #Sleep it off \n      *finish\n\n   #Do nothing\n    You don't act, and by not acting you've given the police time to act. \n\n    You hear and feel the tires of the RV blowing out over a spike strip.  Then you feel the RV slow to a stop, and hear the police shouting over a megaphone to exit with your arms raised high. \n    *choice\n     #Do as the police say\n      *set Identity %-100\n      Identity: ${identity}\n\n      It's over. You know that, and judging by the look on Bonnie's face, she knows it, too. \n\n      Dropping your gun and knife in the RV sink, you lead Bonnie out of the vehicle with your arms raised. \n      *achieve lostidentity \n      *image rooster.png\n\n      Your identity has been compromised.\n\n      [i]Will you start again or go back to the last checkpoint?[/i]\n      *choice\n       #Start over from the beginning\n        *goto_scene end\n       #Checkpoint\n        *set identity %+100     \n        *goto junipers\n\n\n     #Go out fighting\n      *set trust %+20\n      trust: ${trust}\n\n      You've been afraid for so long, and yet in knowing this will be your final few moments, you obtain a deep peace of mind. The sky seems to darken from what you can see outside the RV windows. With the darkness comes a sense of closeness, as if there are not seven billion other people in the world, but rather only you, Bonnie, and the police officers. \n\n      You find another pistol in Wesley's nightstand, hoping to duel wield, but Bonnie puts her hand out for it. \n\n      \"This isn't your fight,\" you say. \"Stay low and remember me.\"\n\n      \"I'm not letting you do this alone.\" Bonnie gestures for the gun again, this time more aggressively, so aggressively that you almost dare not deny her of her desire. Almost. \n\n      \"Sorry, gorgeous, I got us into this--I'll pay the price.\" You pause to admire her beauty one last time.  The hot red of her hair ignites your sense of confidence. She'll remember you. \"See you, outlaw.\"\n\n      Bonnie nods, suddenly choking back tears. \n\n      You don't bother to hide your guns as you step out of the RV. Though there is only the howl of the wind and the officers' commands of \"drop the guns,\" you imagine hearing Mason and Narsico's band play. You would have liked to have heard them play for real. \n\n      Though it's cloudy, it feels like high noon. You have to aim true. There may still be a way out of this. You wonder if luck is on your side, and decide that it is. That's why they call you Rooster--because even in the most dire of situations you keep your chest puffed up and your head held high. \n\n      The officers have their guns pointed at you, but they probably won't shoot until you point your in their direction.\n      *Choice\n       #Shoot the officers\n        *set Health %-100\n        Health: ${Health}\n\n        You side step as you raise your guns to shoot, anticipating return fire.\n\n        [i]Bang![/i]\n\n        You hit an officer in his vest and he goes down.\n \n        [i]Bang, bang![/i]\n \n        The remaining officers fire back, one manages to hit you, but the bullet only grazes your arm. \n\n        [i]Bang![/i]\n\n        You shoot another officer in the leg, and he goes down. \n\n        You don't even hear the last bang. The bullet blows through your head before the sound can reach you. \n\n        Your life has slipped through your fingers.\n        *image gameover.png\n\n        \n        [i]Will you start again or go back to the last checkpoint?[/i]\n        *choice\n         #Start over from the beginning\n          *goto_scene end\n         #Checkpoint\n          *set health %+100     \n          *goto junipers\n\n\n       #Shoot at the nearest cruiser's gas tank\n        *set health %-10\n        Health: ${health}\n \n        Anticipating return fire, you side step as you raise your guns to shoot.\n\n        [i]Bang![/i]\n\n        The explosion happens so fast you aren't even sure what happened. Luck really is on your side. The cops all dive to the ground and stay there, but you only see this from your own place on the ground. \n\n        You black out. \n        *choice\n         #Sleep it off\n          *finish\n\n       #Cock-a-doodle-do     \n        \"Cock-a-doodle-doo!\" you holler, and as if on cue the pack of dogs appear from the fog, like farm dogs ready to pounce on the foxes in the chicken coop. \n\n        You lower your guns and place them on the ground as if in surrender, but really you don't want the cops to have a heads up about getting jumped by the pack. As strange of a sight as it is to see, you can see how the pack of dogs is a ticket out of this mess.\n\n        \"Hands in the--\" one of the officers cries out in pain as a pit-bull bites his elbow. You don't know what else happens as in the officer's surprise he fires a shot, which grazes your forehead, rendering you unconscious. \n        *choice\n         #Sleep it off\n          *finish\n\n      \n\n\n\n\n\n #Ram the cop cars\n  *label RV_ram\n  *set health %-20\n  health: ${health}\n  \"We're going to ram the cop cars,\" you say in warning to Bonnie. \"Hopefully we'll put them out of commission and make it so they can't chase us.\"\n\n  Bonnie laughs. \"You took the words right out of my mouth.\"\n\n  You take the longest way around in order to build up speed. As you near the entrance you grip the steering wheel tighter. You can see the landlord smoking a cigarette while talking to the cops, probably telling them everything she knows about Wesley Richards. When she spots the RV coming at them, she rushes towards you waving her arms. To her this is a routine stop so the cops can investigate. It isn't until she hears you honking and sees you're not going to stop that she leaps out of the way. \n\n  The cops barely have time to register what is happening before you plow through two of their cars. You see that the car you hit on the right spins and hits the third cop car, but the last thing you see is the steering wheel. After that, everything is black. You forgot your seatbelt and have smacked your head hard on the steering wheel. \n  *choice\n   #Sleep it off\n    *finish\n  \n #Remain silent in the RV\n  *label silent_RV\n  You can't see either of those plans working out too well, so you do the only other thing you can think of. You wait. \n \n  Several minutes pass. \n  \n  \"We can't just wait here. We're wasting time.\" Bonnie says, and you realize, of course, that time is of the essence. Each minute waiting feels like an eternity. Bonnie adds, \"They'll probably be looking for this RV. They probably have a warrant to search it.\"\n \n  \"I'm not so sure that they do,\" you say. \"They'd be here in a heartbeat if that were true. Cops get hard-ons for non-violent crimes.\"\n \n  \"Non-violent?\" Bonnie scoffs. \"You call that bank job non violent?\"\n\n  \"Relative to senseless gang violence, yes.\"\n  \n  Bonnie goes to argue but you both go silent and fall to the floor of the RV. The cops voices grow nearer.\n \n  \"What do we do?\" Bonnie asks.\n  *choice\n   #Jump the junipers\n    You start the RV, refusing to wait any longer. You see that the cops are walking back towards the entrance, but that they do not look like their leaving anytime soon.\n    *goto junipers\n   #Ram the police cars\n    You start the RV, refusing to wait any longer. You see that the cops are walking back towards the entrance, but that they do not look like their leaving anytime soon.\n    *goto RV_ram\n   #Wait it out\n    The cops voices come closer, but then grow more distant. Peeking out the window, you see that the officers return to their postions at the only entrance to the RV park.\n    \n    Perhaps they are simply blocking traffic for a funeral procession, you reason, or investigating a domestic violence call. \n\n    You decide to wait a little longer, but as the cops don't leave, you finally decide to start the RV up. \n    \n    [i]What's the plan?[/i]\n    *choice\n     #Jump the junipers\n      You start the RV, refusing to wait any longer. You see that the cops are walking back towards the entrance, but that they do not look like their leaving anytime soon.\n      *goto junipers\n     #Ram the police cars\n      You start the RV, refusing to wait any longer. You see that the cops are walking back towards the entrance, but that they do not look like their leaving anytime soon.\n      *goto RV_ram\n     #Wait a little longer\n      You decide to wait a little longer.\n      \n      A few more minutes pass before Bonnie says what you, too, are thinking, \"We have to get back. Maybe we can talk ourselves out of here.\"\n\n      As you're thinking of what to say, you take the wheel. \n      *Choice\n       #Talk your way out\n        You drive the RV over to the entrance. As you near the police officers, you grip the steering wheel tighter, nervous. \n \n        You can see the landlord smoking a cigarette while talking to the cops. Perhaps she's telling them everything she knows about Wesley Richards and his bland RV, perhaps not. When she spots you and the RV approaching, she rushes towards you waving her arms. To her this is a routine stop so the cops can investigate and that's exactly how you have to play it off.\n\n        Rolling down the window, you say:\n        *choice\n         #\"Is this for a funeral procession?\"\n          \"Who died?\"\n\n          \"Sorry?\" the landlord says.\n\n          \"Oh,\" you feign surprise. \"I figured these cops were here for a funeral procession--like for a chief or something.\"\n\n          \"Oh, no.\" The landlord puffs on her cigarette while looking around a bit nervously. \"Fugitives.\"\n\n          \"Fugitives?\" you raise your eyebrows, animatedly. \"Am I in danger?\"\n\n          \"Probably not, but it's best you get on out of here soon.\"\n\n          \"Can I get though here?\"\n\n          \"Hold on, dear.\" The landlord calls out to an officer, \"Can this young man get through?\"\n\n          \"You know him?\" you hear the officer ask.\n\n          The landlord glances at you and nods, \"You're Gladus' boy, aren't you?\"\n     \n          You nod in return, playing along with the case of mistaken identity.\n\n          \"Alone?\" \n\n          \"Yup,\" you say. \"Picking my mom up from work if I can.\"\n \n          \"Don't want to keep that woman waiting,\" the landlord agrees, and calls to the cop as if he'd know the network of tenants at the RV park, \"He's Gladus' boy. No relation to Richards.\"\n\n          You heart beat races hearing the name. They know Wesley is involved. You can barely keep it together as the cops open up a space for you to fit the RV through, but you make it through without issue. \n          \n          You're a couple streets away and your heart is still racing, though. You feel dizzy. Blackness eats away at the edges of your vision, and the losing control, you see the steering wheel rushing up to meet your falling head. \n          *choice\n           #Sleep it off\n            *finish\n\n          \n         #\"What's going on?\"\n          \"What's going on here?\"\n          \n          \"Looking for a suspected felon or felons.\"\n          \n          It's just as you feared.\n          \n          *goto can_we\n         #\"Can we get through?\"\n          *label can_we\n          \"Can we get through here?\"\n         \n          The landlord exhales smokes as she responds, \"Depends on who 'we' is.\"\n\n          Bonnie reveals herself and says, \"Hi.\" She takes your place in the driver's seat as you prepare for plan B. \n\n          The landlord furrows her brow. \"officers. We've got a pretty young red head here. Maybe she's the one you're looking for?\"\n\n          The officers shuffle over, probably more interested in seeing a 'pretty young redhead' than finding a fugititve. They look at what seems to be a photo and then at Bonnie. You know you're in trouble when they place their hands on their firearms and ask you to step out of the vehicle. \n          *choice\n           #Do as the police say\n            *set Identity %-100\n            Identity: ${identity}\n            It's over. You know that, and judging by the look on Bonnie's face, she knows it, too. \n\n            Dropping your gun and knife in the RV sink, you lead Bonnie out of the vehicle with your arms raised. \n            *achieve lostidentity \n            *image rooster.png\n\n            Your identity has been compromised.\n\n            [i]Will you start again or go back to the last checkpoint?[/i]\n            *choice\n             #Start over from the beginning\n              *goto_scene end\n             #Checkpoint\n              *set identity %+100     \n              *goto can_we\n\n\n           #Go out fighting\n            *set trust %+20\n            trust: ${trust}\n            You've been afraid for so long, and yet in knowing this will be your final few moments, you obtain a deep peace of mind. The sky seems to darken from what you can see outside the RV windows. With the darkness comes a sense of closeness, as if there are not seven billion other people in the world, but rather only you, Bonnie, and the police officers. \n\n            You find another pistol in Wesley's nightstand, hoping to duel wield, but Bonnie puts her hand out for it. \n\n            \"This isn't your fight,\" you say. \"Stay low and remember me.\"\n\n            \"I'm not letting you do this alone.\" Bonnie gestures for the gun again, this time more aggressively, so aggressively that you almost dare not deny her of her desire. Almost. \n\n            \"Sorry, gorgeous, I got us into this--I'll pay the price.\" You pause to admire her beauty one last time.  The hot red of her hair ignites your sense of confidence. She'll remember you. \"See you, outlaw.\"\n\n            Bonnie nods, suddenly choking back tears. \n\n            You don't bother to hide your guns as you step out of the RV. Though there is only the howl of the wind and the officers' commands of \"drop the guns,\" you imagine hearing Mason and Narsico's band play. You would have liked to have heard them play for real. \n\n            Though it's cloudy, it feels like high noon. You have to aim true. There may still be a way out of this. You wonder if luck is on your side, and decide that it is. That's why they call you Rooster--because even in the most dire of situations you keep your chest puffed up and your head held high. \n\n            The officers have their guns pointed at you, but they probably won't shoot until you point your in their direction.\n            *Choice\n             #Shoot the officers\n              *set Health %-100\n              Health: $ {health}\n\n              You side step as you raise your guns to shoot, anticipating return fire.\n\n              [i]Bang![/i]\n\n              You hit an officer in his vest and he goes down.\n \n              [i]Bang, bang![/i]\n \n              The remaining officers fire back, one manages to hit you, but the bullet only grazes your arm. \n\n              [i]Bang![/i]\n\n              You shoot another officer in the leg, and he goes down. \n\n              You don't even hear the last bang. The bullet blows through your head before the sound can reach you. \n\n              Your life has slipped through your fingers.\n              *image gameover.png\n\n              [i]Will you start again or go back to the last checkpoint?[/i]\n              *choice\n               #Start over from the beginning\n                *goto_scene end\n               #Checkpoint\n                *set health %+100     \n                *goto silent_RV\n\n\n\n             #Shoot at the nearest cruiser's gas tank\n              *set health %-10\n              Health: ${health}\n \n              Anticipating return fire, you side step as you raise your guns to shoot.\n\n              [i]Bang![/i]\n\n              The explosion happens so fast you aren't even sure what happened. Luck really is on your side. The cops all dive to the ground and stay there, but you only see this from your own place on the ground. \n\n              You black out. \n              *choice\n               #Sleep it off\n                *finish\n\n             #Cock-a-doodle-do     \n              \"Cock-a-doodle-doo!\" you holler, and as if on cue the pack of dogs appear from the fog, like farm dogs ready to pounce on the foxes in the chicken coop. \n\n              You lower your guns and place them on the ground as if in surrender, but really you don't want the cops to have a heads up about getting jumped by the pack. As strange of a sight as it is to see, you can see how the pack of dogs is a ticket out of this mess.\n\n              \"Hands in the--\" one of the officers cries out in pain as a pit-bull bites his elbow. You don't know what else happens as in the officer's surprise he fires a shot, which grazes your forehead, rendering you unconscious. \n              *choice\n               #Sleep it off\n                *finish\n\n  \n       \n       \n\n    \n  \n\n\n", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n*set identity 90\n*set health 100\n*set trust 83\n*set conscience 87\n*set sanity 100\n*set persona 70\n\n\"Apology accepted,\" you say calmly and hand her the crowbar, \"this time... Now keep going.\"\n\nAs she returns to her work of prying open deposit boxes, you speak into your radio. \"We got at least $40,000 in cash with this one box, and at least double that in gold and jewels.\"\n\n\"Excellent!\" You hear Zebra say. \"That's good enough, I'd say. These folks are getting antsy and so am I. The cops could be on their way. Who knows if these hostages have people waiting for them out in their cars, people who are growing worried? We've had two wander into all this already. Let's pack up.\" \n\n\"It's no million,\" you hear Stag say, \"but it'll have to do for now.\"\n\n[i]What says you?[/i]\n\n*fake_choice\n #You have enough\n #Keep going for more\n #Nothing. Sneak out with the cash\n\n*script changeBackgroundColor(\"black\")\n*set identity 100\n*set health 80\n*set trust 90\n*set conscience 65\n*set sanity 90\n*set persona 65\n\n\"Agreed,\" Marlin says. \"Over.\"\n\n\"Marlin, again, you don't have to--\" You hear a commotion from Stag's end of the radio, \"--we've got a runner!\"\n\n\"Stop him!\" you hear Zebra shout so loud it echoes in the vault without him even using the walkie-talkie. \n\nYou rush to the vault entrance and there you see the man leaping towards the entrance of the bank. He's almost soaring. You need to think quickly. A warning shot would be quickest, but probably the most dangerous solution, but if he gets away that could be very bad for you all, and who knows how much fight he's got in him if you go hands on.\n\n[i]What do you do?[/i]\n*fake_choice\n #Shoot a warning shot\n #Tackle him\n #Let him go. You're almost done anyway\n\n*script changeBackgroundColor(\"sepia\")\n*set identity 100\n*set health 70\n*set trust 83\n*set conscience 22\n*set sanity 90\n*set persona 45\n\n\n\"Not if we have a cute hostage to make them second guess their actions.\"\n\nYou can see her piecing together your sentence.\n\n\"But what if--\" Bonnie cocks her head to the side and looks you in the eyes.  \"Hold on. You think I'm cute?\"\n\n\"Did I say that?\" You act coy. \"Must have just slipped out.\" \n\n\"But do you--\" Bonnie stops mid sentence. \n\nStanding before you both is a pack of dogs. Some of the dogs wear collars, others chains, and still others wear nothing except the same vicious snarl on their muzzles as all the others. \n\n[i]What do you do?[/i]\n\n*fake_choice\n #Push Bonnie down and make a run for it\n #Jump over the nearby chain link fence\n #Stand still\n #Shoot at the lead dog\n #Throw what is in your pocket in hopes the dogs will fetch\n\n*set identity 60\n*set health 100\n*set trust 35\n*set conscience 90\n*set sanity 100\n*set persona 50\n \nFrom what little you can see under your rubber mask, you notice that the hostage on the floor grabs Stag's gun. You're preoccupied with dodging the punches Stag is now throwing to be concerned with that, though. The hostages become restless, but you're winning the brawl. \n\nThat is until you here gun fire. Marlin, Zebra and the now armed hostage are in a firefight, but that's the least of your worries as Stag wraps a strong arm around your neck and drops you to the floor. \n\nYou can't breathe, but you can hear as the gun shots stop and Stag yells to Zebra, \"I told you he was a loose cannon.\"\n\n\"That you did, lad.\" You hear Zebra sigh as your world begins to go black. You no longer have the strength to claw at Stag's strong arms. \n      \n\"Maybe I'll keep choking you until you can't remember your name,\" Stag whispers in your ear. \"I always knew we couldn't trust you. You FBI? You've got to be crazy or some kind of rat. Doesn't matter. We'll be long gone before you wake up. If you wake up.\"\n\nBlackness eats away at your vision, until you slip completely into the dark.\n\n*image rat.png\n\n[i]Your team no longer trusts you.[/i]\n         \n[i]Will you start again or go back to the last checkpoint?[/i]\n*fake_choice\n #Start over from the beginning\n #Checkpoint\n\n*set identity 50\n*set health 100\n*set trust 53\n*set conscience 41\n*set sanity 100\n*set persona 50\n\n\nTogether, you and Bonnie drag the heavy bags of money from the vault to the bank counter where Stag, Marlin, and Zebra are waiting, watching the windows, doors, and the hostages. Your stomach again knots seeing the emotionless faces of their deer, swordfish, and zebra masks. They turn and look at you, and the fact that your gun is not on Bonnie after so many runners, does not seem to sit well with them. Their body language tells you that they are on edge. \n\n\"Got them all?\" Zebra says as you join the rest of your crew with Bonnie right behind you. He seems uneasy with her standing there. \"Good. Get the girl down here with the others and then we'll head out.\"\n \n[i]What do you do?[/i]\n*fake_choice\n #Shout in a commanding voice, \"She's coming with us!\"\n #Pull Zebra aside and whisper, \"She's seen my face.\"\n #Pull Zebra aside and say, \"She can be of great use to us.\"\n #Tell Bonnie she can't come with you.\n\n\n\n", "selections": "[i]Before we begin, which of the following do feel most represents you?[/i]\n\n[i]The \"Human\" option is the basic story, while the \"Alien (Body Snatcher)\" option serves as a brief prologue.[/i] \n*choice\n #Human\n  *finish\n\n #Alien (Body Snatcher)\n  \n  You stir, awakening after an extended stasis.\n\n  The matter around you feels dense on the wisps of your outer tissue. Your optical feelers sense no light. You aren't afraid, or at least you tell yourself you're not. You were trained from fusion not to be, after all. \n\n  All your studies of what the current residents call Earth have suggested that the humans are easily manipulated. That has always served as a relief. Besides, others have come before you, and for much more intimidating missions. You simply need to take this one phase walk at a time. You need to make it out of what you assume is the outer crust of the planet and find a body to control. \n\n  [i]What's the plan?[/i]\n  *Choice\n   #Phase walk opposite the pull of gravity\n    *label phase_walk\n    After getting a feel for the magnetic pulls of the planet, you decide to phase walk away from the pull of gravity. Between each short burst of movement, you stop to listen, look, and feel for life forms. After several phase walks, you feel a powerful force drilling through the earth. The being is huge, imposing. \n\n    Closer and closer the creature comes until it is right upon you. Crunching, digesting, it swallows up huge chunks of the soil, leaving a shoddy tunnel behind it. \n\n    [i]What do you do?[/i]\n    *Choice\n     #Tame this beast\n\n      You realize there is very little choice in the matter and that you must conquer this great beast's mind. Besides, this subterranean monster might prove to be a better host than a human being ever could. The humans would cower in fear at the power you control. Which of their puny armies could destroy that which can burrow so efficiently under their feet, after all?  World domination is not your mission, but you're sure that if the elders knew about such power at your disposal, they would give you the go ahead. \n\n      You rocket into the beast's gaping mouth and search the cavern of its massive body for its complex predator brain, but find only a disappointing nerve center. \n\n      It is easy to control and moving through the earth becomes easy. You steer the beast until you can feel the soil loosening. You're near the surface and you double your speed in your excitement. \n\n      \"Fear me, humans,\" you project, as the beast's head breaks the surface.\n\n      However, in the open atmosphere where light is far more present, you suddenly find it very hard to control the beast and its upper portion of its linear body slams into a hard grey surface. Some wet substance, clear, not particularly acidic nor alkaline, coats the grey surface, you notice before a thundering clap nearly deafens you and shakes your tissues, consuming your full attention. It takes you a moment to realize that the object that has suddenly blotted out the light is that of a human shoe. \n\n      \"Why do worms always suicide like this?\" the owner of the shoe says and his voice booms overhead, though you understand it is a mere whisper to himself.\n\n      You realize that you have been controlling an earth worm.\n\n      *choice\n       #Find a more suitable host\n        After the stomping human passes, thankfully not stepping on the worm your inhabit, you disconnect from the nerve center and go in search of a more suitable host. You have a new sense of scale, and the embarrassment of your misunderstanding begins to fade. \n\n        *label in_air\n        You find it easier to travel through the air, thrusting off dust particles to move quickly. You enter what must be a building where you hear humans speaking. \n\n        \"This place is haunted,\" one says to another. \"Watch. I'll show you.\"\n\n        A bright light washes over you and you hear a click. You think of what it can be and realize that it was a camera. The elders warned you not to get captured on photo. You're not off to a great start... \n\n        The human with the camera shakes what must be a photo, then says excitedly to his cohort, \"Look there! see?\"\n\n        The other shakes his massive head and you can feel the movement of it rippling through the space around you. \"That's just the flash reflecting off dust.\" \n\n        \"Don't be daft!\" the camera holder hisses and scowls. [i]Anger[/i], you remind yourself, proudly, [i]That facial expression means anger[/i]. \"That's a spirit orb.\"\n\n        *choice\n\n         #Move to the next room\n          You decide to keep moving as the two humans begin to argue.            \n          *goto host\n         #Find a more suitable host\n          \n          You decide you can find a better host and keep moving as the two humans begin to argue. \n          *label host\n\n          Moving through a few more expansive rooms, you finally come to two potentially suitable hosts. Young. One male, one female, as far as you can guess--both of their appearances disgust you equally. They both rest in seated positions with a platform of consumables between them. Their hearts race with nervousness, and you've been informed that that always make them easier to control. \n\n          You sense that the male is putting on an act and has an ulterior motive for being with the girl--something exciting. He's your mark, you decide. \n\n          *choice\n           #Snatch the male's body\n            You decide to enter the male subject. He seems to be more in control of the situation, after all, knowing something that the female does not.  From what you gather, the male has just slipped the female's golden ring off her appendage, and she is none the wiser.\n\n            You drift into the male's ear and are pleased to find a large brain. Hooking up to the brain stem you test the primal bodily functions. You lift a--[i]what's the word[/i]--fist, yes a fist. You slam a fist on the table. Linked up to the human's eyes you see the female across from you look surprised. It was always your favorite of the human facial expressions. \n\n            You test the tongue, \"Sorry.\"\n \n            As soon as you try tapping into the frontal lobes you are filled with a stream of images and sounds--memories. They are almost overwhelming. Suddenly, you find it hard to tell where your tissue ends and the grey matter of the boy's--Clyde Lamm's--brain begins. There is pain and joy and anger and sadness in the folds. Folded in neatly--neat like when your father used to fold your laundry for you. \n\n            [i]No![/i] That isn't your memory. It's his. It's Clyde's. You have no use for clothes.\n\n            Buried in seemingly every other fold of the brain is a familar feeling. There  is so much frustration towards the world he calls home. You realize that you and Clyde Lamm are not so different, at least not in your distaste for the current condition of the planet. The waste, the greed, the selfishness of mankind. \n\n            You find yourself fizzling, fading into a lower consciousness, and yet you do not fear. Not only because you were conditioned to quiet your sense of fear since fusion, but because you know Clyde Lamm is one of the good ones. \n\n            You're in good hands.\n            *choice\n             #Fizzle\n              You fizzle into a stasis, practically becoming one with Clyde Lamm. \n\n              For the next few days you travel through his memories--not because you want to, but because you can't seem to help it. You witness the good and the bad. The simplest of memories seem to resonate with you most. Perhaps this is what the humans call sentimentality? \n\n              A memory of a tire swing in particular plays over and over. A man with jagged blue tattoos pushes you on the swing, and at the highest point you lose your grip and begin to fall. Rather than smacking your head on the packed dirt below, you fall into a cradle made by the man's arms. \n\n              Your father. The man is your father, you realize, as you see his smile. You want to say it's Clyde's father, not yours, but there is something about the man and the light in his eyes and makes rejecting him seem so much less appealing.\n\n              You frequent another memory. A sadder memory. Clyde's father--your father--is taken away in cuffs, but he manages to shoot you a smile and wink before his head is tucked into the police cruiser. You hate the law in that moment. \n\n              Your father is a good man, you scream, A good man! How dare they take him away. \n\n              You're angry enough to shake the world, and yet you can even manage to disconnect from this human brain, much less control it. You're no proper thief after all, but in a way, just letting go doesn't seem so bad. There is passion in this being, and the coming ride ought to be what these humans call fun. \n\n\n              *achieve alien\n              *finish\n\n       \n\n     #Follow the tunnel in search of an exit\n      Your mission is not to conquer but to learn and retrieve something, so you decide it would be best not to utilize the beast to defeat mankind. You phase walk a little bit away from the beast and then return to its tunnel when it has burrowed even deeper into the planet. \n\n      The tunnel crumbles here and there, as you travel along it. It is filled with a thin form of matter, a gas that makes travel much easier.  After a large number of turns, dips, and steep inclines, you sense light. \n\n      You emerge from the depths of the planet, and immediately slip back into the tunnel when something blots out the light. A shoe. A human shoe. It's huge, and you realize the beast you had thought could possibly be used to conquer the humans was nothing more than an earthworm. \n\n      After the stomping human passes, you go in search of a more suitable host. You have a new sense of scale, and the embarrassment of your misunderstanding begins to fade.\n \n      *goto in_air\n\n\n\n\n\n\n\n   #Fizzle to lower conciousness and drift\n    You decide to fizzle and enter a lower consciousness, then drift. It isn't long before you realize, even in your lesser state of being, that the matter around you is growing more and more dense. \n\n    Perhaps it would be best to take control and head to less dense matter, you realize, as that is probably towards the surface where you ought to be going. \n    *choice\n     #Keep drifting\n      You ignore the warnings of your sixth sense and continue drifting.\n \n      The matter around you begins to get warmer and warmer. You are either approaching the surface of the planet, or more likely the molten core of it. \n\n      [i] What now?[/i]\n      *choice\n       #Keep drifting\n        The matter around you is getting very hot now, and very dense. Then suddenly, the matter changes from solid to something like plasma, but very hot. You slip into it. The heat does not burn your kind, but rather empowers you. You soak it in, the warmth. \n\n        When you have enough, you test your strength. You feel more powerful. \n\n        After getting a feel for the magnetic pulls of the planet, you decide to phase walk polar north. The trip flashes by in a instant, but the strength the core gave you begins to fade with your exertion, the cold soil of the planet raking it from your tissue. \n\n        Feeling weak, you fear you won't make it but rather slip into a stasis, yet you break through the surface of the planet and enter a gas. Sunlight shines on you, returning some of your strength. Air is what the human call it, this gas, and though you don't breath, you find it to be refreshing. Compared to the unforgiving earth, the air is pleasant. \n\n        *goto in_air\n\n       #Phase walk opposite the pull of gravity\n        *goto phase_walk\n\n     #Phase walk polar north\n      *goto phase_walk\n\n    ", "startup": "*title No Proper Thief\n*author Russell J. Dorn\n*scene_list\n  startup\n  selections\n  bank\n  house\n  $ journey\n  $ rv\n  $ desert\n  $ ending\n  $ death\n\n*create Identity 100\n*create Health 100\n*create Trust 100\n*create Conscience 100\n*create Sanity 100\n*create Persona 50\n\n*achievement capitalist visible 10 Capitalist\n   Share with no one.\n   The pie is more filling when you eat it alone.\n\n*achievement lostidentity visible 10 Identity Loss\n   Get identity stat to 1%\n   Not stolen, just discovered\n\n*achievement insanity1 visible 10 Insanity (1)\n   Find insanity ending number 1.\n   Mind is running wild.\n  \n\n*achievement insanity2 visible 10 Insanity (2)\n   Find insanity ending number 2.\n   All rest and no play.\n\n*achievement insanity3 visible 10 Insanity (3)\n   Find insanity ending number 3.\n   Choo Choo!\n\n*achievement loosecannon visible 10 Loose Cannon\n   Show you're a loose cannon.\n   You're a loose cannon.\n\n*achievement offbalance visible 10 Off Balance\n   Get concience stat to 1%\n   Unbalanced.\n \n\n*achievement alien visible 10 Out of this World\n   Play alien prologue\n   Fizzle!\n\n\n*achievement rat visible 10 Rat\n   Get trust stat to 1%\n   Dirty Rat.\n\n\n*achievement officalend visible 10 Witness Statement\n   Witness the entire story.\n   Bore Witness.\n\n\n\n\n\n*image title_NPT.png  \n\nAttempt to survive your first bank heist! Befriend or betray your team of bank robbers, make difficult choices, survive, go insane, fall in love, and get rich if you can in [i]No Proper Thief[/i], where every choice you make has a consequence.  \n\nYou never wanted a life of crime, but it's all you know. That doesn't mean transitioning from a life as a cocky con artist to a greenhorn bank robber, on your first bank heist, doesn't scare you. \n\nIn [i]No Proper Thief[/i] you are Clyde Lamm, the Rooster, and you have a choice to make. In fact, you have dozens of choices to make throughout your upcoming adventure. Everything has consequences, too. You and your team, consisting of the leader Zebra, the muscle Stag, and the heart Marlin, have many obstacles to overcome. For one, you have to convince them, as the new team member, that you're trustworthy and that you'll watch their backs, for if one of you goes down the rest of you will too. Still, in the midst of all the dark chaos of the initial robbery, there is a flame of positivity: an attractive young bank manager. Sure you stole her gold heirloom ring a while back, but it's a fair trade because she's stealing your heart.\n\n[b]Warning[/b]: contains scenes of violence.\n\nCopyright 2015 by Russell J. Dorn.\nArt by David V. Dorn\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n  [i]You can play the first two chapters of the game for free. Purchase the rest of the game below.[/i]\n  *if choice_is_advertising_supported\n    [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n  *purchase adfree $3.99 purchased\n  *if choice_is_advertising_supported\n    *page_break_advertisement\n  *if not(choice_is_advertising_supported)\n    *page_break Play Now for Free\n\n\n*label purchased\n\n\n\n*Choice\n #Play\n  *finish\n #Directions\n  [b]Directions[/b]\n\n  Playing [i]No Proper Thief[/i] is easy. Here are the directions you'll need to know to get started:\n\n  1.) Use your finger, thumb, or a stylus to navigate through pages. (Or your mouse/keyboard on computers)\n\n  2.) Read each page and then make your choice at the bottom of the page and select NEXT or NEXT CHAPTER, but beware the consequences of your actions or lack thereof. Some choices will lead to an immediate game over. Consider the possible risks and rewards for taking an action or the consequences of taking no action. The number of choices at each choice junction ranges from one to five.  \n\n  3.) If any one of your stats drops to 1%, you lose. \n       \n  o [b]Identity[/b] refers to those outside your crew and trusted circle learning your secret identity. \n\n  o [b]Health[/b] is determined by the damage you do or do not take. \n\n  o [b]Trust[/b] is how your crew feels about you--if your trust drops to 1% they'll assume you're a rat. \n\n  o [b]Conscience[/b] is how you feel about yourself. Clyde Lamm, the Rooster (a.k.a. you, the player), is a good person in a bad line of work, and killing the wrong person could tear away at him with guilt.\n\n  [b]Try to find the three hidden insanity endings, if you can. Also, see if you can unlock all ten achievements![/b]\n  *image insanity_trophy.png\n  \n \n  [i]If you enjoy the game, please leave a review. Thank you for playing![/i]\n\n\n \n \n\n\n\n"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
