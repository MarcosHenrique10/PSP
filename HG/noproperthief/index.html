" Narsico says to Bonnie and she digs a cheap cell phone out of her backpack, then hands it over to Narsico who dials a number. \"Zebra, it's Stag. Going plan B. Rendezvous at the spot in about five minutes.\"\n\n                You wish you could simply hear Wesley's voice, but it does you good to know he's alive and free, not to mention well enough to drive.\n\n                The three of you wait until the road is clear then slink across it with your gear. Being mindful of cameras, you work your way around the exterior until you come to the yard that is supposedly just between the men's and women's cell blocks and right by the command center. \n\n                Narsico rigs the C4 in less than thirty seconds, and after he puts distance between him and the bomb, he blows it. The deafening blast is long in dying, and there is a ringing in your ears, but Narsico seems to get the worst of the blast, and he appears a little disorientated. Still, none of you waste any time, and instead rush in as a team with your guns drawn. \n\n                Narsico still seems a little confused and there is the body of what looks like a young female officer laying lifeless on the floor. Your choice got someone killed.\n\n                You need to take charge. No time for regrets just yet. \n\n                [i]What do you tell Narsico to do?[/i]\n                *Choice\n                 #Take control of the Command Room\n                  *label control_room\n                  \"Stag, you need to take control of that control room.\"\n\n                  Narsico gives a thumbs up then jumps into action, grabbing the taser from the dead officer. His stride shows strength. It's the lucha libre wrestler in him. You have full confidence he'll gain control of the control room, as you head off down the cell corridors with Bonnie.  \n\n                  \"You want to get Mason or Melissa?\"\n\n                  If Narsico pops the wrong door, you'd feel better having yourself in the          \"We're getting you out of here.\"\n\n                    \"Freeze,\" you hear a man's voice say. You see an officer has emerged from a cell with his taser raised higher than his pants, which cling to his knees.\n \n                    \"Lower your gun, hon.\" Melissa urges you. \"Trust me.\"\n\n                    You do as she says, but you don't completely drop your gun, just let it hang at your side. You hear the taser fire, but a few of the female prisoners knock the officer's aim off, so it doesn't hit you. Then, a group of the largest women wrestle the officer into a cell and you hear him screaming. \n\n                    \"He deserves it,\" Melissa says. \n\n                    You nod, at a loss for words, and together, you go out the way you came in. \n                    *finish\n\n\n                 #Search for Mason and Melissa\n                  *label Mason_Melissa\n                  \"Stag, Crocodile, find Melissa and Mason's cells.\"\n\n                  Once they leave, you glance once more at the officer killed in the explosion. The dead officer has a baton and taser. They might come in handy. Do you take the time to collect them? \n                  *choice\n                   #Yes. Collect the weapons\n                    You take the time to collect the deceased officer's baton and taser, hoping they might come in handy when getting into the control room. \n\n                    You slink down the hall until you come to the last bend before the control room. Peeking around the corner, you see that the control room officer is busy eating with his legs kicked up for comfort. You also see the glow of a TV. He doesn't suspect a thing and has somehow missed the blast that killed his coworker. \n\n                    You're all the way up to the glass door that has thin metal wires running through it. The officer hasn't noticed you. You're still not inside, though. You see a keypad that you can maybe fry with the taser, or you can try to break the thick glass on the door with the baton.  \n                    *choice\n                     #Use taser\n                      Using the taser on the keypad works. The door pops open, and the officer says, \"Hey, Betty. Break time already?\" He doesn't look away from the Price is Right on the TV until he doesn't get an answer. \n\n                      You cock your gun and he instinctively reaches for his taser, but thinks better of it after seeing your rooster mask in the reflective surface of the surrounding windows. \n\n                      \"Pop the cells for Mason and Melissa Edilberg.\" You shove him to demonstrate the urgency of the demand. \"Now!\"\n\n                      Watching the camera feeds, you see Narsico get Mason out without a problem, but Bonnie and Melissa are suddenly confronted by another officer in the women's cellblock. \n\n                      [i]You have to think quick! What do you do?[/i]\n                      *Choice\n                       #Use the intercom to talk to him\n                        *label intercom\n                        *set trust %+20\n                        Trust: ${trust}\n\n                        \"The intercom for the women's ward, how do I use it?\"\n\n                        The officer in the chair remains silent. \n\n                        \"One of those two dies and you'll be quick to join them.\" It's not hard to set your face with a scowl. You hit the officer hard in the shoulder blade.  \n\n                        The officer cries out and says, \"the square button under the label A.\"\n\n                        You push the button. \"I suggest you put your gun down, Officer, or your comrade will pay for it.\" You see Stevens lose a little conviction hearing a voice from the control that isn't he coworker's. \"Drop your gun and let the lovely ladies go.\"\n\n                        After a moment of tense silence, the officer does as you say and Bonnie gets him to handcuff himself to a guardrail. Bonnie and Melissa head out towards the way you came in and you join them after dealing with the control room officer. \n                        *finish\n                        \n                       #Rush to your friends\n                        *label rush_friends\n                        *set Health %-20\n                        Health: ${health}\n                        *set conscience %+50\n                        Conscience: ${conscience}\n\n                        You waste no time and dart from the control room after knocking out and handcuffing the control room officer to a radiator. You make it to the women's ward in a matter of seconds. Having flanked the officer, you aim your gun and yell to the officer, \"Drop it.\"\n\n                        Startled, the officer turns and fires off a taser cartridge in your direction. The one wire grazes your thigh, but the other prong misses. You return fire, as does Bonnie. Together, you kill the sexually devious officer. You would almost feel bad if it were for a chorus of female prisoners cheering and thanking you from their cells. It seems the man was a monster and had it coming. \n\n                        The three of you head out the way you came in.\n                        *finish\n\n\n                       #Just watch\n                        *label just_watch\n                        *set Conscience %-100\n                        Conscience: ${conscience}\n\n                        You don't know what to do. You can only watch as Bonnie and officer Stevens act. You watch as Bonnie lifts her gun, but Officer Stevens is a better shot and lands his taser. Bonnie goes down and Stevens rushes Melissa with his baton, cracking her across the head. Showing his true nature, officer Stevens bashes Bonnie's head in, as well. \n\n                        As you look down in horror, you see an intercom that you could have used to talk him down. You can't live with your inaction. Bonnie and Melissa's blood is on your hands. \n                        \n                        *achieve offbalance\n\n                        *image scale.png\n                        You can no longer live with the guilt.\n\n                        [i]Will you start again or go back to the last checkpoint?[/i]\n                        *choice\n                         #Start over from the beginning\n                          *goto_scene end\n                         #Checkpoint\n                          *set conscience %+100     \n                          *goto Mason_Melissa\n\n\n\n\n\n\n                     #Use baton\n                      You slam the baton into the window and the officer inside the control room jumps to attention, but the glass neither budges nor breaks.  \n                      *choice\n                       #Use the taser\n                        Using the taser on the keypad works. The door pops open, but the officer inside has pulled his tazer. \n                      \n                        He fires, but misses you. \n\n                        Keeping your pistol pointed at him, you tell him to sit. \n \n                        He sits. \n\n                        \"Pop the cells for Mason and Melissa Edilberg.\" You shove him to demonstrate the urgency of the demand. \"Now!\"\n\n                        Watching the camera feeds, you see Narsico get Mason out without a problem, but Bonnie and Melissa are suddenly confronted by another officer in the women's cellblock. \n\n                        [i]You have to think quick! What do you do?[/i]\n                        *Choice\n                         #Use the intercom to talk to him\n                          *goto intercom\n                         #Rush to your friends\n                          *goto rush_friends\n                         #Just watch\n                          *goto just_watch\n\n                        \n\n                       #Use your gun\n                        *set Identity %-100\n                        Identity: ${identity}\n\n                        You pull your gun and shoot but it too does nothing to the apparently bulletproof glass.\n\n                        The officer inside sounds an alarm and you know the gig is up when a second officer rushes your way from the direction of the women's cellblock. He hits you with his taser before you can shoot him.  You're handcuffed before you can even move again and your rooster mask is ripped off.\n\n                        Your identity has been compromised.\n                        \n                        *image rooster.png\n\n                        [i]Will you start again or go back to the last checkpoint?[/i]\n                        *choice\n                         #Start over from the beginning\n                          *goto_scene end\n                         #Checkpoint\n                          *set identity %+100     \n                          *goto Mason_Melissa\n\n\n\n\n\n                   #No. Hurry to the control room\n                    *set identity %-100\n                    identity: ${identity}\n\n                    You don't waste any time and instead head to the control room as quick as you can, but you've run into a dead end when you realize that the control room is secured by a heavy lock. \n\n                    As a last resort you shoot at the glass, but it is bullet proof. The officer inside sounds an alarm and you know the gig is up when a second officer rushes your way from the direction of the women's cellblock. He hits you with his taser before you can shoot him.  You're handcuffed before you can even move again and your rooster mask is ripped off. \n\n                    Your identity has been compromised.\n\n                    *image rooster.png\n\n                    [i]Will you start again or go back to the last checkpoint?[/i]\n                    *choice\n                     #Start over from the beginning\n                      *goto_scene end\n                     #Checkpoint\n                      *set identity %+100     \n                      *goto Mason_Melissa                   \n\n\n\n\n\n             *selectable_if (persona \u003c7) #Harrass a nearby jack rabbit\n              *label Rabbit\n              You spot a jack rabbit in the dark. He scrunches up his face a few times, and stares at you. \n\n              You get an urge to harass it. You are the type of person that would shove the girl you like off a fast moving train, after all. \n\n              Stomping over to the creature, you find that it doesn't move, either stupid or in shock. \n\n              When you're standing right above it, it simply sniffs at your shoes and then begins nibbling on some dry grass. You make a loud noise and perform a jerking motion towards it in order to frighten it, but still it does not move. Curious, you bend over double to look the rabbit in the eye. \n\n              It doesn't have a glaze over its eyes--it doesn't seem blind. And it has ears that can hear for miles. In fact, looking at the rabbit's eyes again you see an evil glint in them. Before you have time to react, the rabbit has leapt at you and clamped onto your nose with its teeth. \n  \n              In agony, you flail about, trying not to scream, but the rabbit holds tight. You roll on the ground, tug at the creature, and finally in desperation blow in its face. \n\n              It releases you and runs to a burrow entrance, where it pauses a moment. You swear it winks before going underground. You decide it's best not to talk about the fight with Bonnie or Narsico and head over to meet them.\n\n              *goto meeting_spot\n              \n              \n\n           #Encourage Bonnie to jump with you\n            *set trust %+30\n            Trust: ${trust}\n            *set persona 90 \n \n            \"We'll jump together, all right?\" You extend your hand. \n\n            Bonnie grabs it.  \"All right.\"\n\n            You both jump. The landing isn't exactly soft, but it's not as painful as you were expecting despite siding over some good-sized rocks. Holding one another makes you more stable and keeps you from tumbling. \n\n            \"Thanks.\" Bonnie smiles and you return the gesture. \n            *choice\n             #Head to the meeting spot\n              *goto meeting_spot\n             *selectable_if (persona \u003c6) #Harrass a nearby jack rabbit\n              *goto rabbit\n             \n\n           #Push Bonnie off\n            *set Conscience %-20\n            Conscience: ${conscience}\n            *set health %-30\n            Helath: ${health}\n            *set persona 5\n\n            You recognize that Bonnie is afraid and probably won't jump so you make your way over to her and shove her off. You see she tumbles hard, and you tumble yourself after losing your balance, falling from the train and landing crookedly on your arm. You tumble down what must be the rockiest part of the slope. \n\n            You feel sore and beat up as you struggle to stand and brush yourself off. \n\n            \"What is wrong with you?\" Bonnie shouts before Narsico hushes her with a hiss, urging her to be quiet. \n\n            Bonnie stomps off to the planned meeting spot, leaving you to feel ashamed and bruised. \n            *choice\n             #Head to the meeting spot\n              *goto meeting_spot\n             *selectable_if (persona \u003c6) #Harrass a nearby jack rabbit\n              *goto rabbit\n\n           #Lay back and enjoy the ride to come\n            *set sanity %-100\n            Sanity: ${sanity}\n\n            Narsico jumps, and though Bonnie at first seems reluctant, she too jumps. But you can't find the strength to do so. Something anchors you to the train. Perhaps it's the realization of how pointless everything is, for everyone dies, taking nothing material with them, if they ever even go anywhere further than a casket or urn. You're tired, too. Tired of scrambling around with everyone else as the rich get richer and poor get poorer. You just want a little space and food, comfort really. You're tired of seeing people screw over other people just to get a few more bucks that they'll never even be able to spend. You're tired of stealing, and conning, and pretending that you're OK. \n\n            You're far from OK. You're sick. Sick of what the world has become. You're not even sure there's a single habitable plot of land left for you. A debt is due, amassed by the generations before you, and you feel like you've been paying it off your whole life. \n\n            [i]No more![/i]\n\n            You know a place that has plenty of space. You've been there before. It seems crazy and impossible sometimes, the things that happen there, but it's just as real as here and now--just as real as the hard metal of the train you sit on, just as real as the horn the conductor blows.  \n\n            You have to tell the conductor where to go, you realize and slowly make your way to the front of the train, hanging by your hands when you have to, balancing on ledges, ducking, climbing. Finally you make it, and it's a comfort to find that the conductor has been expecting you. \n\n            \"Now you're on the trolley,\" the conductor says with enthusiasm. \"Name's Francis. Francis Rouse.\"\n\n            \"Are you like a ferryman?\" you ask.\n\n            \"Yes, almost exactly like that, only there's not a drop of water around.\" Francis chuckles. \"You won't need it where you're going though. A place wider than the widest sea, and infinitely bountiful.\"\n\n            Leaning out of a side window, you see the tracks sink into a tunnel in the earth. The tunnel is lit up brilliantly with purple light. \n \n            \"There,\" you say.\n\n            Francis nods, knowingly. \"Right away, sir.\"\n            *achieve insanity3\n\n            *image insanity_trophy.png\n\n            (Congratulations! You've found the secret ending number 3. Play again for the official end.)\n            *goto_scene end\n\n            \n\n            \n\n \n\n       #Stare at Narsico\n        *label stare_Narsico\n        As you eat your food, you stare at Narsico expectantly.\n\n        \"What?\" he asks when he finally notices. You simple stare more, certain he'll get the idea. He does. \"Oh, right. The plan.\" After taking a gulp of his water, he says, \"It goes down tonight.\" \n        *goto plan_tonight\n       \n\n     #Remain fishing\n      *set Conscience %-10\n      Conscience: ${conscience}\n      *set trust %-10\n      Trust: ${trust} \n\n      You head back to the bathtub to fish even though you know there are no fish in it. As soon as you feel relaxed your heart rate jumps, for out from the tub you thought was empty, you see the head of a swordfish pop out, smoking a cigarette. \n\n      The swordfish exhales smoke and then speaks. \"You'll only catch a cold out here.\" An eerie wail follows these strange words, and then the swordfish says in a sing-song manner, \"Going to drag us away, as you just waste away.\" Then the marlin leaps into the air and dives into the impossible depths of the bathtub. \n\n      You awake from dozing off with a start and head inside after shaking the disturbing dream from your head. Feeling guilty, you enter the RV and sit down to the dinner you didn't help prepare. \n\n      Narsico scowls at you. \n      *choice\n       #Talk about the plan\n        *goto talk_plan\n       #Stare at Narsico\n        *goto stare_Narsico\n\n\n   \n\n   #\"And the money?\"\n    *set trust %-10 \n    Trust: ${trust}\n    *set Conscience %-10\n    Conscience: ${conscience}\n\n    \"And the money?\"\n \n    \"How can you think of money at a time like this?\" Bonnie frowns, disappointed in your materialism. \"You're friends need help.\"\n\n    She's right and you suddenly feel terrible. \n    *choice\n     #\"Where are we?\"\n      *goto where_desert\n    \n\n\n #Rest\n  Still tired, you rest for what feels like a few minutes but could be hours. You awake to the same empty RV. \n  *choice\n   #Try to get up\n    *goto get_up\n   #Call out for Bonnie\n    *goto call_Bonnie\n\n\n\n #Call out for Bonnie\n  *label call_Bonnie\n  \"Bonnie?\" you call out the name of the last person you remember being with. \n\n  No answer comes. You hear only the steady howl of the wind against the metal side of the RV. \n  *Choice\n   #Try to get up\n    *goto get_up\n   #Rest\n    Still tired you rest for what feels like a few minutes but it could be hours. You awake to the same empty RV, feeling warm and relaxed. Something feels off. There's a voice in your head that whispers \"get up now.\"\n    *choice\n     #Try to get up\n      *goto get_up\n     #Rest some more\n      *set sanity %-100\n      sanity: ${sanity}\n\n      Still tired, you rest for what feels like a feel minutes but could be hours. Time suddenly means so little to you. For the longest time after you awake from a nap you stare at the ceiling of the RV. It seems to change--slowly at first. It grows subtly more transparent as time goes on, until you can see through it to the storm clouds above. \n\n      Stranger than this oddity is the creatures swimming through the air as if it were an ocean. Swordfish travel in twos talking about BBQs and music. A herd of zebras gallop from the west, and as they travel to the eastern most portion of your vision they become but lines--black lines on the gray sky. In between these lines are antlers that curve into the shape of musical notes. \n\n      An ethereal reverb sounds out, wailing like sirens, but even if they were sirens, you have nothing to fear. You are free. Free to fly among the creatures of the sky for eternity. Looking down, you see your body. At peace. Dead or in a coma, it doesn't seem to matter.\n      *achieve insanity2\n\n\n      *image insanity_trophy.png\n\n      (Congratulations! You've found the secret ending number 2. Play again for the official end.)\n      *goto_scene end\n\n\n\n\n", "end": "*page_break End\nWe hope you've enjoyed playing [i]No Proper Thief.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "ending": "*set trust %+10\nTrust: ${trust}\n\nSeeing Mason and Melissa hug brings a smile to everyone's' faces, but you have very little time to celebrate as you all make your way to the pickup spot. \n\n\"I thought we were done for,\" Mason says. \"I don't think I would survive in prison. Jail was bad enough.\"\n \n\"We're not out of the woods yet,\" you say. You turn to Narsico. \"Where is Wesley?\"\n\n\"Should be here any moment.\" Just as Narsico says this, you see a limousine pull up to the crates you've all hid out by.  As Narsico pops the door you see purple lights, and champagne in an ice bucket.\n \n\"Get in, lads and lasses,\" you hear Wesley's voice call out and it is an immediate comfort to have the mastermind back with the group. You handled yourself well, but having Wesley makes everything feel better.\n  \nWesley drives off as soon as you've all piled in. \n\nYou all watch in silence as a swarm of cops descend upon the jail. No one takes notice of the limousine. You've escaped and together you all head for Arizona. \n\n\"I'd like to see the grand Canyon.\" Mason says while holding his wife. \"Think we could do that?\"\n\n\"I say we all pick a land mark,\" you say, struck by a sudden desire to see the entire world, \"and we see them all together.\"\n\n\"Sounds mighty fine to me, lad.\" Wesley says from the driver seat, sounding proud. \n\n\"Sounds great to me, too.\" Bonnie slips her hands into yours.\n*Choice\n #Spend time with the others\n  *label quality_time\n  With Bonnie on the team and with her knowledge of money transfer times, manager names, and basics of the banks, robbing a couple more branches proves to be a breeze. Melissa helps too, and scares the hostages with her aggressive behavior more than the muscular Narsico ever did. She chooses a flamingo  mask for the heists.\n\n  In less than a week, you all have enough money to make your trip around the country, from the Grand Canyon, to Rachel, Nevada where you heard tales of aliens, to New York City, to the bayous of Louisiana and Alabama where you heard rumor of a beast, to Gulf of Mexico for some festival.\n \n  Driving a new RV the whole way makes it take a long time but there are fun things to do along the road and when the long stretches come, you have the company of your friends to keep you entertained. Narsico has plenty of odd stories to tell, and you and Bonnie are always fascinated by his tales of his time as El Ciervo, The Stag, wrestling on the weekends. His girl Maggie is left in the dark, as that's how Narsico wanted it. She's a pleasure, but is under the impression that Narsico and Mason got the money from a handful of gigs and an inheritance. \n\n  You're glad you have Bonnie to share your experiences with, and don't have to lie while around her like you do with Maggie. \n\n  Finally, you all take a barge across the ocean from California to Hawaii with the RV,  your home for months. You meet Mason's good friend Ka'aona at the docks, a large man who wears little more than a perpetual smile and swimming trunks. You all use his home and the RV for sleeping until Mason and Narsico each get their own places.\n\n  Each night is relaxing, but in a way, dissatisfying. It's boring. \n \n  This night is no different. You stare at the ceiling, feeling the sting of sunburn on your face and forearms. The mug of hot coco Ka'aona made you has long cooled. \n\n  You can hear a party in the distance as you rest on Narsico's couch. \n  \n  *disable_reuse\n  *choice\n   *allow_reuse #Go to the party\n    *label Hawaii_party\n    Though it isn't exactly your thing, you decide to head to the party. \n\n    *goto head_party\n\n\n   *allow_reuse #Seek out Bonnie\n    *Label Hawaii_Bonnie\n    You decide to seek out Bonnie.\n\n    You know she isn't at Narsico's, so you head outside and begin walking down the road towards the beach. \n    *label head_party\n\n    Between the clack of your footsteps on the street, you can hear the party at the beach in the distance. There is very little traffic--little enough that you can walk down the yellow line between lanes safely, and little enough that you can hear the party without issue, but still the party is just a chaotic garble of  cheers and laugher. You can't make out conversations, or even distinct voices, but that might be because you haven't cared to meet too many new people. It just isn't your thing.\n\n    *label pebble\n    You hear something crack against the asphalt near you. You're sure it's a coconut or some pebble you mistakenly kicked until you feel something hit your shoulder. You turn and look up to see Bonnie sitting on the ledge of a low billboard about to toss what looks like a another pebble. You barely notice that it's a billboard for sunscreen, as you're focused on Bonnie. She doesn't look angry, but she certainly isn't happy. \n\n    \"Come on up,\" she says to you. \n    *choice\n     #Keep walking towards the party\n      *set persona 40\n \n      \"I'm just going to head to the party, actually.\"\n\n      You keep walking, shoving your hands in your pocket. As you kick a pebble in the road, you hear a thud and the crackle of gravel. Then footsteps approach you quickly. Bonnie grabs your shoulder and spins you around. \n      \n      *label miserable\n      \"Look at you,\" she says. \"You're as miserable as me here.\"\n\n      You shrug.\n\n      \"I think we should--\" she pauses to think and you raise your head, suddenly struck by a desire yourself. You both say at the same time, \"go back to robbing banks.\"\n\n      \"Yes.\" You laugh with excitement and joy. \"Yes, I think we should.\"\n\n      \"We could head out tonight.\"\n\n      \"Tonight?\" You are unsure if you should just spontaneously leave, or give it more time for planning. \"Shouldn't we say goodbye to the gang?\"\n\n      \"They might try to stop us,\" Bonnie warns, \"but it's up to you.\"\n      *choice\n       #Say goodbye\n        *label the_party\n\n        Together, you and Bonnie walk the rest of the way to the party. Even before you arrive you can smell the food: pig and pineapple, fruit punch and grilled onions. It smells delicious, but actually seeing the food on the long raffia skirted tables makes your stomach growl. Upon witnessing the glaze of the roasted pig, you can't help yourself and rush over for a serving with Bonnie. \n\n        It tastes even better than it looks and smells and for a moment you think you could actually be happy here, but then you realize that the parties always end. \n\n        There is a squeal from the amp as Narsico plugs in his guitar, which pulls your attention to the stage. You notice that Mason has already set to tuning his ukulele. It would seem that Mason's good friend Ka'aona has been recruited as a drummer as he stands behind a large traditional drum and nods that he is ready to the other two on stage.\n\n        \"Good evening everyone,\" Mason says into a microphone and everyone cheers. \"Is everyone having a good time?\" The party explodes in cheers. \"Great! Glad to hear it, friends. We,\" Mason gestures to Narsico and Ka'aona, \"are the Skeletones, and we're going to play a few songs for you tonight. The first is a cover song by the band [i]Shanked by Aliens[/i]. It's called [i]Skeleton, Be Still[/i].\"\n\n        The song begins slowly with drumming, but soon the ukulele and guitar come in at the same time that Narsico begins singing a deep voice. Mason and Ka'aona provide backing vocals and by the third verse the whole party is singing along, including you, even though you don't know all the words. \n\n        After the set and after the crowd as split off a bit, you and Bonnie approach Narsico. \n\n        \"Very good show,\" you say.\n\n        \"Thank you.\" Narsico smiles proudly. \"It feels good to be doing what I love.\"\n\n        You don't hesitate. \"About that. Bonnie and I are leaving.\"\n\n        It takes a moment to register in Narsico's busy mind. \"Wait, what?\"\n\n        \"This life--it just isn't for us,\" Bonnie says. \n\n        Narsico sighs, but he nods his head, knowingly. \"I can't say I didn't see this coming. Have you told Mason?\"\n\n        \"Not yet.\"\n\n        \"Don't,\" Wesley says, stepping out from the shadows. \"He'll only try to stop you.\"\n\n        \"But--\"\n\n        \"No buts, lad. I'd leave too if I were a younger man. I'll tell him when you're gone.\" Wesley pulls you and Bonnie in for a group hug. \"I'll be easier this way.\"\n\n        Narsico nods in agreement. \"Don't be afraid to write him, though.\"\n\n        \"We'll write,\" you promise. \n\n        You finish out the night parting with Mason and Melissa and Wesley and all the others. Dancing, eating, cheering. \n\n        In the small hours of the morning, you decide to leave without a word to Mason, and though it pains you to do so, you know it'll be for the best.\n        *choice\n         #Roger that. Over.\n          *goto Halloween\n\n         \n       #Leave without a word\n        You decide to leave without a word, and though it pains you to do so, you know it'll be for the best.\n \n        *choice\n         #Roger that. Over.\n          *goto Halloween\n\n     #Climb up to Bonnie\n      \"Be right up,\" you say as you search for the ladder. You find it along the far side and quickly climb up it. The glow of the billboard light is warm against your exposed skin. You hear the flapping of a moth's wings as you make your way down the platform towards Bonnie. Sitting down very close to Bonnie, you're pleased to find that she doesn't pull away in the slightest. The light at this end of the billboard platform is blown out and you can see the glistening of broken glass when you look down. You imagine Bonnie broke the bulb to be in darkness, and it's a darkness you can only really appreciate when you look up and see a night sky full of stars.  \n\n      With your sides touching you stare out into the galaxies beyond, feeling small and insignificant. \n\n      You sigh and realize Bonnie notices as she turns towards you.  \n\n      *goto miserable\n\n     *selectable_if (persona \u003c41) #Pull Bonnie off the Billboard\n      *set persona 20\n      *set conscience %-30\n      Conscience: ${conscience}\n\n      \"I have a better idea,\" you say as you grab hold of Bonnie's dangling legs. \"Why don't you come down?\"\n\n      \"No! Doooon't--\" Bonnie shouts as you tug her down. She face plants in the gravel below and goes silent. \n\n      You suddenly feel like a real jerk. \n\n      Several minutes pass after you determine she is still breathing. You see glass shards sticking out of her exposed legs and begin picking them out. The busted billboard light bulb must have fell to the ground below. Perhaps you should have thought about your actions more, you think. You sit to contemplate your actions and hear Bonnie groan as you decided to sit on her rather than the ground. \n\n      \"Get off me!\" she groans and shoves at you until you stand once more. \n\n      \"I'm sorry--\" you begin, but Bonnie cuts you off.\n\n      \"Don't.\" Bonnie scowls. \"I don't want to hear it.\"\n\n      You both sit in silence for awhile until you sigh. \n\n      *goto miserable\n\n\n   #Check social media websites\n    *label social_media\n    You open up the laptop you bought for research purposes, but only really use to surf the web with. \n\n    You have a few notifications, but they turn out to be invitations to farm and candy related games. You go to pin a few things on your digital pin boards, but realize you already have. There are also a few posts on your feeds that have a bunch of likes and comments that simply tag other friends, including a selfie of an acquaintance putting a quarter in a homeless man's paper cup, and a couple pictures of chicken salads that don't look much more exciting than your cold cup of hot chocolate that stagnates on the coffee table in front of you. Everything else is people complaining about how their lives are ruined because they ran out of toothpaste or because their celebrity crush tied the knot with a French model--that, or pictures in group settings, where everyone forces a smile and poses in unnatural ways to hide their double chins or look more petite. You realize that those people are probably more excited about putting the photos on their profiles to show that they are social, just like society tells them they should be, than they are actually being around other people.\n\n    It's sick and sad. You see it all for what it is and yet it's still hard to look away from when there is so little else to do but be perfectly happy and safe on the Hawaiian islands. You're happy for your friends. Happy that they smile so much and never have to worry, but you miss the excitement. \n\n    You close the laptop, willing yourself away from its empty but alluring glow. \n\n    [i]What now?[/i]\n    *disable_reuse\n    *choice\n     #Watch TV\n      *goto watch_TV\n     *allow_reuse #Seek out Bonnie\n      *goto Hawaii_Bonnie\n     *allow_reuse #Go to the party\n      *goto Hawaii_party\n\n\n   #Watch TV\n    *label watch_TV\n    You feel around for a moment before finding the remote. Clicking the ON button, you hear the TV power up to an infomercial. The next three channels are similar, and in fact one is playing the exact same infomercial. When you finally find a movie on, it changes to a four minutes commercial segment. \n\n    \"Come on!\" you say, frustrated. Narsico pays for the channels and yet he has to watch commercials too? More than a third of the programming is advertisements. The stations should be paying [i]him[/i] to watch the stuff.  \n\n    You turn the TV off, bored and annoyed. \n\n    [i]What now?[/i]\n    *disable_reuse\n    *Choice\n     *allow_reuse #Go to the party\n      *goto Hawaii_party\n     *allow_reuse #Seek out Bonnie\n      *goto Hawaii_Bonnie\n     #Check social media websites\n      *goto social_media\n\n #Ugh. Just get to the end\n  Fine. You sure you want to miss out on the Skeltones concert, the food, the laughter, the good times at the beach?\n  *Choice\n   #Yes. Come on! \n    *Label Halloween\n\n    [i]Several Months Later[/i]\n\n    \"Maybe we ought to have just stayed in Hawaii with the others,\" you say as you reload your gun. A can of Campbell's soups splatters against the wall beside you, disemboweled by a bullet, and orange Cheeto powder drifts down around you and Bonnie, like a well themed Halloween snow. It all goes well with the jazz playing over the store speakers. Even the tiny decorative skeletons and ghosts hanging from the panels of the ceiling seem to dance with excitement. A black cat cleans itself calmly, resting on a half-empty, low, nearby shelf of cranberry sauce cans.\n\n    The police sirens howl like werewolves outside the convenience store. \n\n    It's the perfect Halloween.\n\n    \"Pff! and missed all this fun?\" Bonnie stands up from the counter and fires a few rounds. She squats back down as the police return fire. \n\n    \"I'm sure they are all having a blast. Performing as the Skeletones, drinking margaritas, swimming and surfing.\" You cock your gun.\n\n    \"Tell you the truth, love,\" Bonnie kisses your cheek. \"That all sounds awfully boring.\"\n    *Choice\n     #\"Does it?\"\n      \"Does it?\" you wonder. Then you think about the boredom of long days, repeated trips to the same beaches, jobs, hours of tedious work. Admittedly, you have to agree with Bonnie, after all. \"I guess you're right, it does.\"\n      *goto live_fast\n\n     #\"I guess you're right, it does.\"\n      You have to agree with her. It does sound boring. \"I guess you're right, it does.\"\n      *label live_fast\n  \n      \"Live fast.\" Bonnie chants.\n\n      \"Die young,\" you chant in return and you both rise to fire off a clip at the officers. This is your last stand and you both know it. In a way it's a relief. No more running for either of you. It's also a blessing, you think--to go down in a blaze of fire, to not have to grow old and be sucked dry by relatives and the government. To not have to suffer through ailments, or watch your future children suffer, and not have to watch your friends pass away one by one. Best of all, you think, the both of you are going to be remembered for a long while. Bonnie and Clyde, the young brave thieves. \n\n      \"In the end,\" you say to Bonnie as you both duck down to reload your last two clips, \"we may not be proper thieves, seeing as we've been cornered and nearly caught, but I must say, you've stolen my heart.\"\n\n      \"That--\" You see Bonnie repeat the words in her head. \"That's actually really sweet, Clyde.\"\n \n      You share a deep kiss and tight embrace.\n      *choice\n       #Give her that ring you stole\n        *label ring_give\n        \"I--uhh--I want to give you something,\" you say, as you pull out the ring you stole from Bonnie on your first date. It is fitting of your relationship.\n   \n        She cracks up laughing when she recognizes it. \"No proper thief, huh?\"\n\n        \"No proper thief.\"\n\n        \"Well, Clyde Lamm.\" She waits for the police to ease their rate of fire before saying, \"You've stolen my heart, too.\"\n\n        You grab the ring and Bonnie's hand. \"Be mine?\"\n\n        \"Until the end, and ever after,\" she says. Happy tears fill both your eyes as you slip the ring on her finger. \n\n        \"What better day to die than Halloween?\" You take a deep breath and wait for Bonnie to do the same. \"Ready?\"\n\n        Bonnie Nods. In sync you and Bonnie burst from your place behind the counter of the convenience store you fled to after your last bank job went bad. Stepping around a graveyard of Twinkies, Sun Chips, and Slurpees on the floor, you rush the cops while firing. Glancing to your right, you see Bonnie Loren, the most beautiful girl you've even known and ever will know. \n\n        You couldn't be happier. \n      \n        *image rooster.png\n        *achieve officalend\n       \n\n        (Congratulations! You've made it to the official ending of [i]No Proper Thief[/i]. You might very well end up looking like Swiss cheese in the firefight to come, but you got here in one piece, watched your friends live happy lives playing music and relaxing in Hawaii, even seen them play as the Skeletones if you weren't the impatient type who would click to skip all that. Plus, got to know Bonnie Loren as she transformed from boring bank manager to impulsive, exciting bank robber. Play again and see if you can find the three hidden insanity endings. If you'd like, send a message or describe in your review, how you think their last stand--if it truly was their last stand--turned out.)\n\n        [i]Bang, Bang[/i], Outlaw.\n\n        *goto end\n\n       #Hold your tongue\n        There is so much you want to say, but perhaps you're afraid to say it. You hold your tongue. \n     \n        The ring is cheap, no real use hanging onto it, especially  considering the current circumstances. \n\n        [i]Are you sure?[/i]\n        *choice\n         #Give Bonnie her ring back\n          *goto ring_give\n         #\"No, it's my precious ring!\"\n          *set conscience %-10\n          conscience: ${conscience}\n          *set persona 15\n\n          \"No, it's my precious ring!\" you hiss under your breath so that half of it can't even be heard. You can't help but hold the ring in your fingers. You're a bit disgusted by your own materialism and selfishness.  \n\n          \"Precious?\" Bonnie asks in a confused manner, startling you. She notices the ring.\n\n          \"Is that my ring?\"\n  \n          It's too late to hide it now... \n\n          *goto ring_give\n\n       \n\n   #Fine. Show me.\n    *goto quality_time\n  \n   \n*label end\n*goto_scene end", "house": "*label outside_street_1\nOutside, the streets are quiet, save for the pitter-patter of rain on the asphalt. There is a fog like haze, making it hard to see too far ahead, but it is all gray. No red or blue lights flash through it, meaning the cops still have no idea what you've done.  \n\n\"They say it rains when the blessed die,\" Stag says, and chuckles to himself. \"Good thing we're all sinners and not saints, or this might be a bad omen.\"\n\n\"They say the smart bank robbers pick the foggy days,\" Zebra says, \"because the helicopters have a harder time finding the getaway van.\"\n\n\"I like that one better.\" Stag laughs.\n\nYou and Marlin are too busy peeking into the fog, attempting to clearly see what can only be described as black shadows darting by, to find any humor in anything. Marlin has a wife at home, and you, you're young. Too young to die, and too young to rot in prison. Bonnie sticks close to you. \n\n\"Looks like you lied to me, Clyde Lamm,\" Bonnie says. \"If that is your real name.\"\n\n\"You used your real name?\" Stag snorts.\n\n\"Didn't feel like lying to her more than I had to,\" you admit. \n\n\"That's good. I rather like the name Clyde,\" Bonnie says in a tone you can't quite recognize as good or bad. \"Not a financial advisor either, I see.\"\n\n\"Well, not exactly,\" you confess, hearing stifled laughs from Stag and Marlin. \"But then again, financial advisors aren't much better than bank robbers. They're taking others money, too.\" \n\nBonnie gives you a smirk then turns her attention to the distant fog. \n\nWhen you make it to the large white van with carpet cleaner logo magnets stuck to the side, you pop the back door and toss your heavy bag of cash in, feeling an immediate relief, for it suddenly feels as if you're walking on the moon--light at a feather. As soon as you convince yourself not to attempt a moonwalk, you turn and grab Marlin's bag. It's a bit of a hassle as Marlin's is not paying attention. Instead his marlin bill juts out towards a tree. The fog swallows the tree's higher leaves and branches, but Marlin is looking at its trunk, where you too see shadow movement. \n\nThen you hear it: a static heavy voice in the distance, by the tree. \"Do--repea--not engage. Units in route--code 3. 10-76.\"\n\nThe police jargon escapes no one's attention, even though the message isn't entirely clear, and you all scramble into the large white van. Zebra fumbles the keys, as you all pull and cock your guns. \n\nThe heavily armored cop whose radio gave him away reacts in what seems like a panic. \"Freeze! Police! Don't move.\"\n\n[i]What do you do?[/i]\n*choice\n #Supply cover fire as Zebra starts the van\n  *gosub end_trial\n  *set trust %+20\n  Trust: ${Trust}\n  \n  You slide open the van's sunroof, take aim, and fire towards the cop. You don't necessarily want to hurt or kill the officer, just scare him, so you shoot the pavement around him. You still have plenty of directions to go in the van and aren't fully backed into a corner yet, after all.\n\n  The cop fires back and judging by the way he fires with precision tells you he aims to kill. You notice fire from other directions to. As such, you duck back in the van.\n\n  *goto bullet\n\n\n #Yell at Zebra to hurry\n  *gosub end_trial\n  *label bullet\n\n  \"Hurry up! Start the van!\" you shout, causing Zebra to drop the keys. \n\n  \"Shut your mouth!\" Zebra shouts back. \"You're only making this harder.\"\n\n  You feel the bullet graze your arm before you hear gunshot or the windshield cracking. Everybody ducks as you fall to your back, and Zebra manages to find the keys. Starting the van he drives in reverse over what feels like a series of speed bumps. With each bump you feel blood flow down your arm and between your fingers. \n\n  \"We have a hostage!\" You hear Marlin shout. He struggles to stand as the van bounces over sidewalks and bushes, then opens the sunroof and opens fire to provide cover until you are all well out of the cop's reach. \n\n  Without hesitation, Bonnie rips a piece of her undershirt and applies it to your wound, with a stiff stack of money, as a tourniquet. A several-thousand-dollar tourniquet.\n\n  Stag peers out the passenger side window, his mask pulled up off his face and resting on his forehead, and listens for sirens, while Marlin watches the rear via the sunroof. Zebra drives but you notice that your speed is steadily slowing. \n\n  \"Zebra?\" you say, and then when you fail to get his attention you call him by name, \"Wesley, are you all right?\"\n\n  He mumbles, \"Don't use my name, lad.\"\n\n  \"Why are you slowing down so much?\" you say. \"We are under the speed limit. That's just as suspicious as over it.\"\n\n  \"I think I need to lay down,\" he says before collapsing, slumping over in the driver seat. \n\n  You spring up and grab the steering wheel to steady the car. \n\n  \"He's been shot,\" Stag says. \"Take the wheel.\"\n  *choice\n   #Give a related speech about the nuisances of capitalism and taking the wheel\n    *set trust %-20\n    Trust: ${trust}\n\n    \"Take the wheel,\" you repeat. Though you look at the steering wheel, you don't even think to grab it. \"It is essential that we all do our part to no longer do our part in a capitalist country. Basic income. Yes, basic income would probably save us all from this line of work. Did you know that poverty has been linked to crime--\"\n\n    \"What are you talking about?\" Narsico shouts as he grips the wheel, getting read to take over. \"If you won't take the wheel, give some cover fire.\"\n\n    \"Oh, sorry,\" you say. \"I'll drive.\"\n    *goto take_wheel\n \n   #Take the wheel\n    *label take_wheel\n    You manage your way into the driver seat and steer with your good arm, thankful that your legs still work as you punch the gas pedal. \n\n    \"I won't sugar coat it,\" you hear Mason say after pulling off his marlin mask and examining Wesley's wound. \"The bullet might have hit something vital. A hospital might be your only option.\"\n\n    \"No.\" Zebra says. \"No hospital. Too many,\" he groans in pain, \"too many questions.\"\n\n    \"The cops will be looking for bullet wound patients,\" Narsico adds as he pulls off his stag mask, and you see as you adjust your rearview mirror that Wesley points at him in agreement. \n\n    \"We don't have any other options--\" Mason begins. \n\n    \"Actually,\" you hear Bonnie say, \"I'm taking night classes. Nursing night classes. I could take a look.\"\n\n    \"Fine. Let's give 'em some room, Mason.\" Narsico says and then hops up into the passenger seat once more, dropping his stag mask near his feet. He looks you up and down. His eyes come to rest on your arm. \"You OK driving like that?\"\n\n    \"Better I drive than shoot. I've never been much of a shot with my left hand.\"\n\n    As soon as you say this you hear sirens fast approaching. Everyone fall quiet, except for Bonnie who whispers to Wesley over and over, \"Does this hurt?\" \n\n    Looking into your mirrors you can see the red and blue of the sirens diffused in the fog. The sound of them gets louder and louder until you can see the police cruiser.  \n\n    You have to think fast. \n\n    [i]What do you do?[/i]\n    *choice\n     #Ram the Police Car\n      *label ram_car\n      *set Conscience %-10\n      Conscience: ${Conscience}\n\n      You get a better grip on the steering wheel with your good hand and wait until the police car comes up beside the van. Swerving to the side, you brake briefly until you're tailing the police cruiser, at which point you ram the car's back corner, causing the officer to spin off. The cop car is enveloped in fog, but the sounds of the crash are not. \n\n      You realize that worked better than you thought it would, and that the officer could be really injured. But before you have time to really worry about the crash, you see more red and blue light approaching, as another cop car catches up to your van.  \n\n      You could try to ram the second police cruiser and risk hurting someone, or try something else. \n\n      [i]What now?[/i]\n      *choice\n       #Ram the second car\n\n        *set health %-100\n        Health: ${Health}\n\n        You wait until the police car comes up to the van. Swerving to the side, you brake briefly until you're tailing the police cruiser, at which point you ram the car's back corner, sending the cop car spinning away behind you, but the officer corrects his spin and catches back up to the van. \n\n        You can feel the cop smash into the van's back bumper. The sound of scraping metal on metal howls through the inside of the van. Then you feel a loss of control. It all happens so fast that you have little time to react as the van swerves to the left. You steer right, but too hard so that you over correct and the van swerves to the right, then you do the same to the left again and the van rolls. \n\n        Everything is in slow motion. You even see the lucky penny Stag at put on the dash board floating in mid air for a second before everything slams onto the roof of the van. The entire van crunches in a bit and you can see your crew bloody and battered as you lift your head.\n\n        You should be dangling from your seatbelt, but you're held too stiffly in place for that. In fact, you recall you didn't even put on your seatbelt in your hurry. No, it's not a seat belt that holds in place, but rather a large tree branch. You are impaled through the stomach by a tree. \n\n        Blood leaks from you and you desperately try to catch it until the strength in your arms fails.\n\n        *image gameover.png\n\n        You life has slipped through your fingers.        \n               \n        [i]Will you start again or go back to the last checkpoint?[/i]\n        *choice\n         #Start over from the beginning\n          *goto_scene end\n         #Checkpoint\n          *set health %+100\n          Health: ${Health}\n          *goto bullet\n\n       #Take a sharp turn\n        *label sharp_turn\n\n        It hard to see in the fog, but you make out a sharp turn ahead. To throw the cop chasing the van off, you make as if you're going to turn left all the up until you take a sharp right. Even the rest of your crew didn't see it coming. Narsico's eyes go wide, and Bonnie seems to have tumbled on top of Wesley who groans in agony. You can see Bonnie's arm is now red with Wesley's blood, but everyone is still alive, and you've evaded the police for now. \n\n        You decide to hide out for a few minutes below an underpass. When the sirens overhead seem to have traveled far away you correct your path and held towards the hide out: Mason's house.\n\n        *choice\n         #Head to Mason's house\n\n          After a few more nerve-racking moments, you pull up to Mason's house. The house doesn't seem to suit the man very well, but rather a Barbie doll. It's a dull flamingo pink with white trim and a white picket fence. Surely, only an upstanding citizen would own such a place.  \n          \n          Mason works his way to the front of the van where he pulls a garage door opener from his pocket and presses the button. As you wait for the garage door to open, you admire the white and tan bed of rocks Mason has in his front yard in lieu of more demanding grass. The instant the garage door has raised up completely, you pull into the neat two-car garage. A poster of a Hawaiian island, and well as the tiki party supplies hanging on the back wall, relaxes you a bit and you allow yourself a deep breath as the garage door closes behind you. \n\n          You exchange a look with Narsico and then Mason and see the smiles playing at the corners of their mouths; you let out a joyous laugh. You did it! You pulled off a bank heist. Still, Wesley is wounded and needs to be taken inside. \n\n          Suddenly you see a light for the door to the house. Mason's wife, Melissa, is standing there holding a couple of lemonades she apparently promised you upon your return. \n\n          [i]What do you do?[/i]\n          *choice\n           #Take a lemonade\n\n            You all but leap from the van and grab an icecold lemonade with your good arm.\n\n            You take a moment to let your eyes enjoy the condensation on the glass, and your ears, the tink of ice, the slosh of refreshing lemonade. Then you raise the glass to your lips and taste the both tart and sweet beverage, swallowing it in invigorating gulps. But the drink is soured when you suddenly remember that Wesley is bleeding out in the back of the van. Guilty. You feel guilty. So, you gingerly walk back to the van after putting your drink down. \n\n            \"Did that quench your thirst, lad?\" Wesley glowers at you, and you wipe a little lemon pulp from your upper lip. Wesley winces as Mason and Narsico lift him. \"Maybe you ought to get a straw and drink my blood, too, you little bloodsucker. I took you in!\" As he is carried off towards the bedroom you hear him mutter, \"my life is less important than a glass of lemonade. Imagine that.\"\n\n            You wander to the guest bedroom where Melissa has peeled back the blankets and laid down towels that Wesley now lays on. \n\n            \"Sorry, Wesley,\" you say. \n\n            Wesley grunts and closes his eyes. \n\n            Bonnie comes in with Melissa in tow, carrying a large first aid kit. It looks to be the bomb shelter type, stocked full of enough supplies to run a small hospital. \n            *choice\n             #Entertain Wesley to distract him\n              *label dum_dum\n\n              \"You know,\" you begin, raising your finger to get Wesley's attention as Melissa gets what she needs from the first aid kit. \"I have picked up a few magic tricks in my studies of thievery. Both fields require sleight of hand. Thieves and magicians--one takes your money with the use of a few shady tricks, the other is a thief. If the thief is good, you'll never know he took anything at all. At least not until he's long gone.\"   \n\n              \"Sorry.\" Wesley groans in pain. \"I'm in no mood for magic, lad.\"\n\n              \"Oh no? How about a mystery favored,\" you reach behind Wesley's ears and he rolls his eyes, \"Dum Dums sucker?\" Wesley's eyes widen with desire, and you hand him the sweet. \"I stole a few from the bank counter at the start of the heist. I know how much you like them.\"\n\n              Wesley is too busy unwrapping the candy to say anything, but you know he's thankful. \n\n              \"I have a little bit of nursing experience,\" Melissa says after clearing her throat. She ties back her long blonde hair in a ponytail. She has a generous chest and stomach and presses them against Wesley as she gets close and examines him. \"Mason, dear, why don't you start the Shish Kabobs on the BBQ. I'm sure everyone is hungry. The rest of you clear out for a bit. Let's give old Wesley some air. I'll see if I can't dig that bullet out.\"\n\n              As Mason and Narsico head outside towards the BBQ, you are in a position to talk to Bonnie for what seems like the first time in forever. You're stuck in an awkward mindset of somewhere between charming first date and violent bank robber. You really don't know what to say to her, so you simply ask, \"Do you regret coming with us?\"\n\n              She takes a moment to think it over. \"In a way, the boredom of the bank was a comfort, but it was just that: boring. This has been the most thrilling day of my life, and I like it. It's scary and fun and, well, aren't you scared?\"\n\n              You could play it cool and lie or show her your vulnerable side. \n\n              [i]What do you say?[/i]\n              *choice\n               #\"Nah, nothing scares me.\"\n                *set trust %-5\n\n                Trust: ${trust}\n\n                You puff up your chest and jut out your chin trying to look as much like Clint Eastwood as you can. You know you're not half the man he is, and only half his age, but you think you can pull off the cool attitude in front of Bonnie. \n\n                \"I ain't afraid of nothing.\" You purposely forget your grammar because you think it sounds cooler that way. \n\n                Unfortunately, the only reaction you get out of Bonnie is a soft scoff and a cocked eyebrow. You've embarrassed yourself, and now you look like a fake, a liar. \n\n                \"OK, fine.\" You relent. \"To be honest,\" you say, demurely, \"I'm scared. I think we all are. High-risk-high-reward business and all.\"\n\n                Bonnie lets out a laugh. \"It's a relief to hear you say that. You all seem so cool with breaking the law, but I guess you're human after all, huh?\"\n\n                \"Just trying to survive.\" You stare at your shoes, a little ashamed. \n\n                \"Is that everyone's reason for doing this?\"\n\n                You realize you don't really know why everyone else is robbing banks. For you, it's what you're good at: crime. That was your first bank, but you've held up 7 Elevens when you were hungry, stolen bread, conned the rich, had sugar mommas, stolen cars, and wallets, and all sorts of things under the crime umbrella. \"I don't know. For me, I do it to survive. The others--well, maybe we should ask them, huh? It'll let you get to meet everyone and take our minds off Wesley for a moment until we know if he's going to make it.\"\n\n                \"Sure.\" Bonnie claps once. \"Who should we talk to first?\"\n                *choice\n                 #Mason at the BBQ\n                  *label grill_mason\n                  You walk over to the grill and see Mason scraping away at the BBQ grate with a metal brush. He grins politely when he sees the two of you approaching. \n\n                  \"Quite a day,\" he says. \"Hope Wesley will pull through. Any updates from the missus?\"\n\n                  \"No, not yet,\" you say. Gesturing at Bonnie with your hands, you add, \"I don't believe you've formally met Bonnie.\"\n\n                  \"Bonnie, is it? Mason. Pleasure.\" Mason shakes her hand and chuckles. \"What got you into this shady business?\"\n\n                  \"Fate.\" She looks deep in your eyes, and you feel a tickle in your belly--butterflies fluttering. \n\n                  \"Fate, a cruel mistress.\" Mason nods and ignites the newspaper he stuffed under the coal in the grill. \"Kingsford,\" he say, seeing you gaze as the black coals, as you think about all those Christmases where you didn't even receive so much as a lump of the stuff. No presents, no coals, nothing.  \n\n                  \"We were curious what got you into the business yourself,\" you confess.\n               \n                  \"Me?\" Mason looks up from the low flame of the coals. \"Long story short: circumstance. I grew up and had a first wife in the beautiful state of Hawaii. Friends there, too. Had to move here for reasons that don't much matter now. I got tired of a nine to five here on the mainland. I got tired of seeing the unmoving photograph of a Hawaiian beach in my office rather than feeling the tide lap at my bare feet in person. I was tired of laying people off so the shareholders and guys up top could buy a third airplane or a pony that their spoiled daughters would only neglect. I decided to join this crew when Narsico approached me about it. At first, like any reasonable person would, I laughed it off as ludicrous, then my company decided to stop covering health care benefits, and also had me lay off more hardworking employees to simply see that profit line rise a tick. It's like when the body freezes, it shuts down blood flow to the arms and legs. Well, the thing is, you need those extremities to make your way out of the blizzard, and the company needed those men and women to meet deadlines. That's the problem with capitalism; you can only grow so far before you reach the end and that profit line stops rising. Anyway, pretty soon, it was my head on the chopping block, so when I found out my old company kept most of their money in the bank branch we just robbed, I called Narsico up and told him I was game. Seemed like a sign. It wasn't stealing from the company directly, but it still felt good.\"\n\n                  \"I know how you feel, even as young as I am.\" Bonnie pats Mason on the arm. You almost expect such a gesture to be awkward, but she moves gracefully, and the intention comes off as genuine. \n\n                  \"I don't doubt it,\" Mason says. \"You young ones got it worst than the rest of us. You have to deal with our mess. Our generation's mess, at least.\" He blows on the coals. \"Coals are about ready. Excuse me as I go get the shish kabobs.\"\n                  *Choice\n                   #Visit Narsico on the Hammock\n                    You smell smoke as you approach Narsico. It's different than the smoke from the BBQ coals and you realize it is from a cigarette, as you get closer to the hammock in which Narsico lays. \n\n                    \"I didn't know you smoke,\" you say to get his attention. You watch as the smoke he blows smoothly out of his nostrils rises towards the overcast sky where is seems to disappear, and you wonder if that's how the cops who pursued you will write their reports--they simply disappeared: smoke and mirrors. \n\n                    \"I don't, usually.\" The wood support posts creak as he rolls his body towards you and Bonnie. \"It's not smart bringing her in. This is why I left Maggie out of it completely. Told her I got a gig singing for a rich man at a private party. She thinks Mason and I are playing our songs, not hiding out in Mason's pink house with a few sack of money and a dying friend.\"\n\n                    \"Wesley will be fine,\" Bonnie assures Narsico before you can. \n\n                    Narsico sucks in a breath of smoke and exhales like a dragon with a mean face to match the fire in his eyes. \"You know from your night classes, do you?\"\n\n                    \"Lay off her,\" you say, feeling a little like a white knight, but you're also fed up with Narsico's negativity. \n\n                    \"Shouldn't we tie her up?\"\n                    \n                    Bonnie recoils. \n\n                    \"She chose to come with us.\"\n\n                    \"Probably to turn us in once she learned the address.\"\n\n                    \"I could have just told the police Clyde was involved and they'd find you through him.\"\n\n                    \"Maybe.\" Narsico scratches his trimmed beard and twists the end of his mustache. \"I knew it was a bad idea to send you on a date with her. Why did you use your real name?\"\n\n                    Instead of answering, you decide to change the subject. \"Why don't you just play music for money? What do you call yourselves--the skeletons?\"\n\n                    Narsico's demeanor brightens a bit. \"Skeletons? No. We aren't Felipe Femur, we're the Skeletones with an E. Get it? It's a play on words.\"\n\n                    \"Yeah,\" you say, \"I get it. Clever.\"\n\n                    Narsico isn't quite fooled by your softened sarcasm. \"Well, more clever than what Mason wanted us to be called. He wanted me to shave my beard and leave only a mustache while he'd grow one on that baby smooth face of his, and we'd call ourselves the Prinstaches.\"\n\n                    \"Like princesses with mustaches?\" You laugh and look at Bonnie for her reaction and see her biting back a smile as well.\n\n                    \"I like that one,\" she says. \n\n                    \"No way!\" Narsico sits up and plants his feet on the ground and puts out his cigarette in a porcelain ashtray shaped like a swordfish. He closes his eyes and mouths the band name a few times silently. \"Yeah, actually. I guess maybe that wouldn't have been such a bad name after all. Still, I like the Skeletones better. Doesn't require me to wear a tiara.\"  \n  \n                    \"We were actually interested in why you decided to rob banks,\" you confess.\n\n                    \"Oh yeah?\" Narsico rubs his face, roughly with both hands. \"Well, you probably don't know this about me, kid, but I used to perform as a Lucha libre wrestler during the weekends at a hotel I used to work maintenance for.\" He turns his attention to Bonnie. \"I took college course at night too, once. Got my degree and guess what? It got me nowhere but a four year delay in the work force. It was a lie. Now, nursing is smart. No doubt. Hard work, but a smart choice, yet everyone always told me to be what I wanted to be, but there are so few jobs now that was always an impossibly.  You think the professors would be teaching rather than practicing if there were enough jobs? No. I didn't realize that either until it was too late. On top of that disappointment, all my workforce managers took everything out on those beneath them. I had enough and quit. When my father passed away I inherited his estate: a small cabin, but try as I might, I couldn't live off the land. Too many expensive hunting permits, and too few animals to hunt. Plus, too many people bleeding the world dry. Money is the new beast to hunt, and banks are the biggest game of all, so here I am.\"\n\n                    \"Food is ready,\" you hear Mason call from the grill. \n\n                    At roughly the same moment you hear Melissa call for help.\n                    *choice \n                     #Help Melissa with Wesley\n                      *label Melissa\n                      *set conscience %+30\n                      conscience: ${conscience}\n                      \n                      The closer you come to the guest bedroom the lighter your conscience feels. You're helping rather than sitting around doing nothing like Narsico or stuffing your face.\n\n                      You open the bedroom door with a creak and you're surprised to see Wesley not only alive, but looking healthy. He's sitting up in bed and when he sees you he gestures for you to take a seat next to him. He looks behind you to Bonnie who enters as well. \"You, too. Bonnie, is it?\"\n                  \n                      \"Yes, sir.\"\n\n                      \"Sir? No need to call me sir. You helped save my life, miss.\" Wesley turns towards Melissa. \"Mrs. Edleberg, do you have something more comfortable for Bonnie to wear. That tweed dress suit can't be comfortable.\"\n\n                      \"I'll see what I can dig up. Mason might have to go in the crawl space.\"\n\n                      \"Oh, it's no problem--\" Bonnie begins, but Melissa cuts her off.\n\n                      \"No. Not a problem at all, dear.\"\n\n                      You see Wesley wince in pain, the wrinkles at the corners of his eyes deepening. His jaw clenches so hard you can see the muscles of it got taut under his thick, dark gray mutton chops. He always did remind you of a sailor from some Moby Dick movie or another, but in that moment he looks like a sailor getting his leg sawed off.\n\n                      \"No morphine in that bucket of first aid?\" you ask.\n\n                      \"Afraid not, lad. No antibiotics either.\"\n\n                      Before you have a chance to apologize for something out of your control you hear Bonnie say, \"I can get you some morphine. Penicillin, too.\"\n\n                      \"I'm starting to like this girl.\" Wesley coughs. \"Medicine would be great. So would having my cat here with me. Did you know a cat's purr is therapeutic?\"\n\n                      Bonnie ignores what she must assume are Wesley's rantings, and says to you, \"Will you come with me?\"\n                      *choice\n                       #\"I'd love to\"\n                        *set Conscience %+20\n                        conscience: ${conscience}\n\n                        \"Good idea,\" you say. \"It's best you and I stick together.\"\n\n                        Seeing her smile with relief lifts a weight from your conscience. \n\n                        \"Peas in a pod,\" you and Bonnie say in unison, then laugh.\n \n                        \"Well, I'll be one feverish vegetable if you don't get me those meds,\" Wesley says.\n \n                        Before you stand to leave the room, Melissa calls Bonnie into the hall, a neat stack of clothes in her hands. You wait for Bonnie \n\n                        \"I can feel the fever.\" Wesley feigns a whimper. \"It makes death's cold fingers that much colder.\"\n \n                        \"Don't be so melodramatic, old man,\" you banter. \"Melissa says you'll pull through. I'm only doing this in hopes you'll not make me split my share of the money with Bonnie alone.\"\n\n                        \"My mind's made up about that. Now, get going. I'd like to rest.\"\n\n                        \"After everything she's done for--\"\n\n                        Wesley cuts you off. \"Get going.\"\n\n                        \"Fine,\" you say and head for the garage after stopping to let Mason know you'll be taking the van. \n\n                        \"At least switch the magnet logos on the sides. Not much you can do about the bullet holes.\" Mason thinks for a moment, holding up his finger to keep you from racing away. He fishes around in his pocket and pulls out some keys. \"On second thought, just take the Isuzu Amigo. It's pink, but it drives great.\"\n\n                        You catch the keys as he tosses them to you and head outside, but stop when you hear Bonnie clear her throat. You turn to see her changed out of her stiff tweed dress suit, and into a dark pair of blue jeans--nicely fitting, you notice--some boots, and Skeletones band T-shirt that consists of a skeleton playing his ribs like a xylophone. Mason probably has a stock of the shirts laying around for the times he actually plays a gig with Narsico. You can't imagine what the T-shirt logo would have looked like if they had chosen the name, Princstaches. Together you and Bonnie head outside where you spot the pink Amigo, and that's when you hear someone with a deeper voice clear his throat. \n\n                        \"I'm going as well,\" Narsico says. \n\n                        Looking like a Ken doll and rock concert Barbie with a GI Joe in tow, you jump in the driver seat and start the SUV. \n\n                        The drive to the hospital isn't long and you park where you don't think the cameras can make out the license plate, even though a pink Isuzu Amigo isn't exactly the most common SUV. Still a little uncertain of Bonnie, you follow her closely as you enter the hospital. Finding a dressing room near a janitor's closet, you watch as Bonnie slips a doctor's white over coat over her Skeletone's T-shirt. Being the con artist that you are, you recall the few times you had to sneak into a hospital. Once to steal your patient files and the other, well it's been so long you can't quite recall the details. You grab a hospital wheel chair and have Narsico wheel you around after he's slipped into some nursing scrubs. \n\n                        \"I'm not a hundred percent on where the pharmacy is,\" Bonnie admits. \n\n                        \"We should split up then,\" you suggest, a little hesitantly. \n\n                        \"Oh, no, no, no.\" Narsico shakes his head. \"This is the part where our hostage runs for help.\"\n\n                        \"She's not a hostage,\" you say, feeling weak sitting in the wheel chair and having Narsico loom over you as he pushes. \n\n                        \"Either way, one of us is sticking with her.\"\n\n                        \"You'd better do so, then. I'm better at thinking on my feet. Plus I can use my good looks to sway any nosy nurses.\"\n\n                        \"I see your nickname fits you, you arrogant little--\"\n\n                        \"Hurry up!\" Bonnie cuts Narsico off. \"Let's get this over with before Wesley gets any sicker.\"\n\n                        Bonnie and Narsico take off down the north hallway. Which way do you go?\n                        *choice\n                         #West, towards the cafeteria. You're hungry\n                          *set Conscience %-10 \n                          Conscience: ${conscience}\n                          *set Health %+30\n                          Health: ${health}\n                          *label cafeteria\n                          Your stomach growls, so you decide to make your way towards the cafeteria, even though you feel a bit guilty about it. The food doesn't smell great, especially in comparison to Mason's shish Kabobs, but you're hungry and it smells just appetizing enough. \n\n                          You can see it's school cafeteria style, with a cashier standing sentry at the end where they charge people. You roll your wheel chair to the counter where you see vegetables, tater tots, and some kid of meat, with cartons of orange juice and milk towards the end with a frozen yogurt machine. The swirl is out of order, as it always seems to be. \n\n                          Looking at your choices, you notice that the carrots have liquefied to the point that you can't make out individual pieces anymore, only one large gelatinous glob of orange. Deciding to pass on the carrots, you point to the tater tots and have the chef pile some on your plate. With most of your plate already full you take a slab of the mystery meat, and grab two orange juice cartons, being sure to pocket one.  \n\n                          As you approach the cashier, you begin to pat your pockets. Which each pocket you pat you make sure your eyes widen in alarm. You pat each pocket again, as you place your tray in front of the cashier, leaving the carton of orange juice closet to the cashier and more accessible, as you keep the tray pinned with one hand.\n\n                          The old woman looks at you with a face that tells you she knows this con, but she underestimates you. \n\n                          \"This is so embarrassing,\" you say as you bring you hand to your mouth. Making a stomach grumble sound with your covered mouth and hand, you make sure your eyes have begun to water. \"I haven't eaten all day. I--I,\" you stutter as if holding back tears and see that the woman's stern look has softened. \"I must have left my wallet at home.\"\n\n                          \"Oh, dear,\" the cashier says and you can feel her tug on the tray once before giving up, seeing that it's pinned under your hand. \n\n                          \"It was hard enough to wheel myself down here--\" You look into her eyes and see they have begun to water like yours. \"No, never mind. It's not your problem. I'll managed... somehow. I suppose.\" You give your wheelchair one soft push, then collapse backwards as if exhausted.\n\n                          The woman sighs empathetically. She takes the orange juice, but holds out the food tray to you. \"Take it. Go on. I won't tell. Take the food at least.\"\n\n                          \"You mean it? Thank you.\" You smile as she nods, then wipe a fake tear away and take the food, before rolling away. \"Thank you so much.\"\n\n                          After eating a few tater tots you pull out the orange juice you had hidden and chug it down, and feel a little revived and more energetic. \n\n                          You realize it's been awhile and that you should probably meet back up with Narsico and Bonnie. \n                          *choice\n                           #Check out the south hall\n                            *goto south_hall\n                           #Meet up with the others\n                            *label meet_up\n                            Making your way through hospital hallways, while hiding your face in a clipboard you picked up along the way, and pretending to look like you know where you're going, you realize that nothing looks familiar. \n\n                            \"You,\" you hear a deep male voice say and you stiffen. The guards you passed earlier might have recognized you as a suspicious character. Your heartbeat quickens, and you find it's hard to breath, hard to move, hard to think. You slowly turn to see Narsico and find that you can breathe again. \n\n                            You grumble, \"Don't do that!\"\n\n                            \"Sorry,\" Narsico laughs. He pulls out a pill bottle. \"Look what we got. We're all set.\"\n                            *choice\n                             #Head out\n                              \"Let's just get going before something goes wrong,\" you say. You wait for Narsico to head out in the lead, so you can fall in step with Bonnie. \"Everything go OK? Did he treat you with respect?\"\n\n                              \"Respect enough, I suppose.\" She smiles, weakly, and tucks a strand of hair behind her ear. \"He still doesn't trust me.\"\n\n                              You recognize something in the expression of her face. It would seem she is feeling how you felt in your early days of crime. Through her, you feel the guilt yourself once more, until you remind yourself it's a dog eat dog world and that you're a survivor. Still, Bonnie is new to this and probably feeling alone. \n\n                              \"I know you're probably wondering if you made the right decision. This goes against what society has always taught you.\" Having a hard time putting your thoughts into words, you shove your hands in your pockets and add, \"It's not dull work.\"\n\n                              \"No, not at all. I like it, though.\" You remain silent until she breaks and says, \"well, OK. It's a bit scary.\"\n\n                              \"It always will be, but you should know, you're a natural. Es
