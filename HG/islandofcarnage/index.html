<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Island Of Carnage — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "islandofcarnage", "title": "Island Of Carnage", "scenes": {"story_notes": "1*****B = 2 coins / 2*****C = 3 coins / S = Solo / NK = No Kid /  K = Kid / T = Thumb or Flash Drive\n\n\n\n\n", "cap_stats": "*label cap_stats\n\n*if health > 100\n    *set health 100\n*if health \u003c 0\n    *set health 0\n*return\n*finish", "choicescript_description": "Survival, horror, and an interactive adventure await those who travel to the dangerous Island of Carnage. Will you escape the bloody carnage that plagues the island, or will you fall victim to it?\n \nThe story [i]Island Of Carnage[/i] is an interactive journey that thrusts you into a world of horror and adventure. The story written by Theodore Nolan is entirely text-based, with around 50,000 words. There aren't any graphics or sound effects, but that's okay. All you need is your imagination and the power of choice to enjoy this adventure. But choose wisely because the wrong choice could cost you your life.\n \nIn this game, you start as a struggling journalist who has a tip for a big story that could launch your career. You travel to a remote island in the middle of the Atlantic Ocean, fraught with seismic activity, to begin your investigation of a company known as OWL.\n \nYour goal on the island is to gather enough evidence to try and expose OWL for its exploitation of the island for its resources. But survival and escape quickly supersede your initial journalistic endeavors.\n \nSurvival and escape from what? Earthquakes? Yes, but besides the deadly seismic activity, your encounters with some unexpected inhabitants on the island also threaten your life. Or, more accurately said, your life is in danger because of the hordes of bloodthirsty mutated cannibals stalking the island in search of human flesh.\n \nYour journey will take you across an island filled with peril, adventure, and life-and-death choices. Survival won't be easy, but with new friends and your trusty weapon for protection, escape from the island might be possible. Can you escape the Island Of Carnage, or will you end up as a meal for a hungry horde of red-eyed cannibals?\n\n[b]Content Warning:[/b] The story [i]Island Of Carnage[/i] contains blood, violence, and gore. The flesh-eating creatures, you, and anything else alive on the island can die in this adventure/horror game of survival.\n", "choicescript_stats": "[b]Vital Statistic[/b]\n*stat_chart\n  percent Health\n[b]Your Inventory[/b]\n*stat_chart\n text SilverCoins Silver Coins\n*temp inventory\"\"\n*temp comma false\n*if (backpack)\n    *set inventory &\"Backpack\"\n    *set comma true\n*if (pen)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Pen\"\n    *set comma true\n*if (journal)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Journal\"\n    *set comma true\n*if (waterbottle)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Bottle Of Water (+15 Health)\"\n    *set comma true\n*if (trailmix)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Trail Mix (+15 Health)\"\n    *set comma true\n*if (banana)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Banana (+6 Health)\"\n    *set comma true\n*if (flashlight)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Flashlight\"\n    *set comma true\n*if (phone)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Phone\"\n    *set comma true\n*if (walkingstick)\n    *if comma\n         *set inventory &\", \"\n    *set inventory & \"Walking Stick\"\n    *set comma true\n*if (anchovies)\n    *if comma\n         *set inventory &\", \"\n    *set inventory & \"Can Of Anchovies (+6 Health)\"\n    *set comma true\n*if (antiseptic)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Bottle Of Antiseptic\"\n    *set comma true\n*if (gauze)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Gauze\"\n    *set comma true\n*if (bandages)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Bandages\"\n    *set comma true\n*if (firstaidkit)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"First Aid Kit\"\n    *set comma true\n*if (flashdrive)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Flash Drive\"\n    *set comma true\n*if (chart)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Medical Chart\"\n    *set comma true\n*if (boyaddress)\n    *if comma\n        *set inventory &\", \"\n    *set inventory & \"Boy's Address\"\n    *set comma true\n        \n    \n${inventory}\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n  \n  Turn off all ads and delays.\n  \n  *purchase_discount adfree 2023-07-13 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n  \n  You've paid to turn off all ads and delays.\n", "done": "*page_break\nOuch! \n\nYour health just hit 0%.\n\nThat means you're dead!\n\nWould you like to play again?\n*advertisement 1200\n*page_break Play Again\n*restart", "ending": "*page_break End\nWe hope you've enjoyed playing [i]${choice_title}.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*delay_ending 1200 $4.99 $0.99", "islandofcarnage": "*label islandofcarnage\n*image A-Shaky-Start.png\n\nDim candlelight flickers at the end of a long dark tunnel.\n\nThe distant flame casts a yellow glow onto an old wooden door behind it.\n\nYou peer over your shoulder into the darkness.\n\n[i]What is this place?[/i]\n\n\"Hello…\"\n\nYour voice echoes into the pitch-black recesses of the corridor behind you.\n\nCrack.\n\nThe floor buckles with a violent upheaval of the ground, and the force throws you into a wall.\n\n[i]I need to get out of here![/i]\n\nYou turn and break into a sprint toward the wooden door at the end of the tunnel.\n\nCrack.\n\nThe ground buckles again and knocks you onto the floor.\n\nWhoosh.\n\nA gust of wind rushes past you, and your eyes dart to the dim flame at the end of the tunnel.\n\nIt flickers wildly, and poof, darkness fills the tunnel.\n\n*page_break\n\nWhat's your first name?\n*input_text  player_name\n*set player_name \"$!{player_name}\"\n\nYou stare blindly into the darkness on your hands and knees.\n\nThe ground continues to crack and crumble, but a man's voice cuts through the noise.\n\n\"$!{player_name}!\"\n\n\"I'm here,\" you shout back to him.\n\n\"Get up,\" his voice calls out from somewhere in the darkness.\n\nYou try to climb to your feet, but the tremors make it impossible to stand.\n\n\"I can't,\" you shout back.\n\nYou reach out and blindly search for the man.\n\n\"Where are you?\" you cry out to him.\n\n\"Get up, $!{player_name}!\"\n\nHis voice startles you this time, and your eyes snap open.\n\n*page_break\n\nYou stare blankly up at a bright blue sky.\n\nA motorboat engine purrs somewhere behind you, and the gentle hum begins to lull you back to sleep.\n\nYour mind drifts…\n\n\"I said, get up!\"\n\nYour eyes dart to Mateo, a burly middle-aged man who peers down at you from his captain's chair.\n\nIt was his gruff voice you heard in your dream.\n\n\"I'm up,\" you say to him with a yawn.\n\nMateo slows the engine and says, \"Good because we're here.\"\n\n*page_break\n\n*image The-Island.png\n\nYou sit up and peer out at a lush tropical island.\n\nThe distant mountains look like a painting with wispy clouds brushed across their peaks, and the white sand on the beach sparkles like glitter…\n\n[i]It's beautiful.[/i]\n\nYou stare in awe but quickly remember you're not here to sightsee.\n\nYour eyes dart to the trees just beyond the uninhabited beach.\n\n\"Where's the path to the village?\" you ask.\n\nMateo slows the boat to a stop and points to a small gap between the trees. \n\n\"Right there,\" he says. \"Just follow it straight through the woods.\"\n\n*page_break\n\nThe reality that you're about to travel alone on a remote island in the middle of the Atlantic Ocean sends a wave of anxiety through your body.\n\nYour mind starts to race. \n\n[i]Why am I doing this? I'm not even a real journalist. A real journalist would get paid to do this.[/i]\n\nYou glance at Mateo, and your brain screams, [i]\"Tell him you want to go back!\"[/i]\n\nHe looks at you and says, \"I admire what you're about to do, $!{player_name}.\"\n\nYou're shocked. Mateo hasn't uttered a positive thing since you hired him. He even seemed indifferent when he heard about why you're going to the island.\n\nMateo grabs your backpack and says, \"The world needs to know what's been happening here.\"\n\nHis words seem to calm your nerves.\n\nMateo hands you your backpack and says, \"Now get off my boat.\"\n\nA big grin forms on his face, and you smile back.\n\nMateo glances at his watch and says, \"I'll meet you here at eight tomorrow morning, and don't be late. I'm charging you double if I've got to go on the island to get you.\"\n\n\"Don't worry,\" you say to him. \"I'll be here at eight.\"\n\nThen you climb over the boat railing and hop into the water.\n\n*page_break\n\nYour original plan was to stay three days on the island so you could gather enough information to write a solid exposé. \n\nBut your plan changed yesterday when you learned silver is the only currency used on the island.\n\nIn other words, your credit card won't fund this venture, so you'll only stay on the island for a day. \n\nHopefully, it's enough time to gather the information needed for your story.\n\nYou only have five silver coins, but you plan to rough it while you're on the island. \n\nA couple of coins for transportation and maybe one for a hot meal should be all that you'll need…\n\n*page_break\n\nMateo calls down to you, \"Be safe, my friend.\"\n\nYour first impression of Mateo was wrong. He's much nicer than you initially thought…\n\n[i]If Mateo went with me to the island, it would make my life a lot easier.[/i]\n\nYou quickly think of a deal to offer him.\n\n[i]Two silver coins upfront and a bonus credit card payment later should be enough to get him to go with me.[/i]\n\nThe question is, do you want to deplete the small amount of silver you have? You might need it…\n\n*choice\n    #Save your silver coins and go onto the island by yourself.\n        \"I'll see you tomorrow,\" you say to Mateo. \n       \n        He nods and says, \"I'll see you at eight.\"\n       \n        Mateo revs the boat engine…\n       \n        And a few seconds later, he speeds away.\n       \n        You turn and peer out at the island…\n       \n        And the anxiety you felt earlier returns as you set off toward it alone.\n        *goto islandstart\n       \n    #See if Mateo will go onto the island with you without payment.\n        \n        \"I've got to ask. Would you consider going onto the island with me?\"\n        \n        Mateo raises an eyebrow…\n        \n        And you quickly add, \"It's only for a day.\"\n        \n        Mateo shakes his head and says, \"Sorry, but I'm going to have to pass on that.\"   \n        \n        *choice\n            #Save your silver coins and go onto the island by yourself.\n                \n                \"All right,\" you say to Mateo. \"Then I guess I'll see you tomorrow.\"\n       \n                He nods and says, \"I'll see you at eight.\"\n       \n                Mateo revs the boat engine…\n       \n                And a few seconds later, he speeds away.\n       \n                You turn and peer out at the island…\n       \n                And the anxiety you felt earlier returns as you set off toward it alone.\n                *goto islandstart            \n           \n            #Offer Mateo two silver coins and a bonus payment to go onto the island with you.\n                \n                You offer Mateo two silver coins and also a bonus payment. His eyes light up, but he suddenly looks conflicted.\n        \n                Mateo rubs his forehead and says, \"I can't.\"\n        \n                \"Why?\" you ask. \"Because of the earthquakes?\"\n        \n                \"No,\" he says. \"Because of my wife. She's afraid of the rumor.\"        \n                \n                \"What rumor?\"  \n       \n                Mateo shakes his head and says, \"That Red Eyes are on this island. I know it sounds stupid, but --\"\n        \n                \"-- What are Red Eyes?\"\n        \n                *set mateoredeyes true                \n        \n                *page_break\n         \n                \"They're made up creatures from stories we heard as children,\" Mateo scoffs. \"Make-believe monsters. Nothing you need to worry about.\"  \n        \n                Mateo glances at his watch and says, \"My wife, on the other hand. That's something to worry about, which is why I need to get going.\"\n        \n                Questions about the Red Eyes race through your head, but Mateo doesn't give you a chance to ask them.\n                \n                Mateo revs the boat engine…\n                \n                And he shouts, \"I'll see you tomorrow morning at eight.\"\n                \n                \"Okay,\" you shout back…\n                \n                And a second later, Mateo speeds away.\n                \n                You turn and peer out at the island…\n       \n                And the anxiety you felt earlier returns as you set off toward it alone.\n                \n                *goto islandstart        \n        \n    #Offer Mateo two silver coins and a bonus payment to go onto the island with you.\n        You offer Mateo two silver coins and also a bonus payment. His eyes light up, but he suddenly looks conflicted.\n        \n        Mateo rubs his forehead and says, \"I can't.\"\n     \n        You turn away from the gaunt woman and spot more faces behind the windows of the nearby houses.\n\n        Their eyes follow you as you travel up the street toward the motorbike.\n        \n        *page_break\n        \n        *goto villagewalk      \n\n*label villagewalk\n\nAs you approach the motorbike, the boy who sits on it looks like he's about to flee.\n\n\"It's okay,\" you say to him with a gentle smile. \"I just want to check out your awesome bike.\"\n\nYour words seem to relax the boy...\n\nAnd you slow to a stop a few steps away from him.\n\n\"I bet your bike is the fastest thing in town.\"\n\nThe boy smiles…\n\nAnd you ask, \"Do you think I could talk to your --\" \n\n\"-- Hey!\"\n\nYour eyes dart to a muscular guy who runs down the street toward you.\n\n\"Get off my bike!\"\n\nThe boy scrambles off the bike and limps away toward the back of one of the houses.\n\nA second later, he disappears behind it, out of sight.\n\n*page_break\n\nThe muscular guy runs up to the motorbike and pulls a machete out of the open side compartment.\n\nYou back away with your eyes locked on his weapon, and he says, \"The stupid kid could've gotten hurt by this.\"\n\nHe slides the machete into his leg sheath and glances at you.\n\n\"And who are you?\" he asks.\n\nYou relax at the sight of his sheathed machete and reply, \"My name's $!{player_name}.\"\n\nYou reach out for a handshake…\n\nBut he doesn't shake it.\n\n\"Are you from the lab?\" he asks.\n\n\"No. I'm actually a journalist.\"\n\n\"A journalist?\" His demeanor softens, and he says, \"I'm, Álvaro.\"\n\nHe smiles and shakes your hand.\n\n\"How did you get here?\" he asks.\n\n\"By boat. I was dropped off on the beach and took the trail.\"\n\n*page_break\n\n\"Well,\" Álvaro says. \"I hope you've also got a ride off the island because you won't find one here.\"\n\n\"Yeah, I've got one,\" you say. \"I'm getting picked up tomorrow morning.\"\n\nÁlvaro peers past you and shouts, \"We’re good here. This one's not from the lab.\"\n\nYou glance back at the portly man in the doorway…\n\nAnd Álvaro says, \"Our people are suspicious of outsiders.\"\n\n\"Yeah, I see that.\"\n\nThe portly man gives you one last look before he walks back into his house…\n\nAnd Álvaro says, \"Most of them just want answers.\"\n\n\"I might be able to answer some of their questions,\" you say to him. \"Do your people know what's causing the earthquakes?\"\n\n\"I don't have a clue,\" Álvaro says with his eyes on the crowd of people near the end of the street. \"But our elders believe the ancient island spirits are to blame.\"\n\nThe people drop to their knees at the gathering and raise their hands to the sky.\n\nYou glance at Álvaro and ask, \"Are they praying to the island spirits to try and stop the earthquakes?\"\n\nÁlvaro's eyes narrow, and he snaps back, \"Is that what you came here to write about? Our foolish belief system?\"\n\n\"No,\" you respond defensively. \"I'm not here to write about that!\"\n\n*page_break\n\n\"Then why are you here?\" Álvaro asks with the same aggressive tone.\n\n\"I'm writing an article about the OWL corporation. It's an exposé.\"\n\nYou take off your backpack…\n\nAnd Álvaro grabs the hilt of his machete.\n\n\"Take it easy,\" you say as you pull out your journal. \"I just want you to read this.\"\n\nYou hand the journal to him, and he starts to read through it…\n\nThe people at the gathering rise to their feet like one cohesive unit, and they break into a rhythmic dance to the beat of the drums.\n\n\"I knew that lab was bad news from day one,\" Álvaro says…\n\nAnd he peers over at you.\n\n\"So you think your story could help us?\" he asks.\n\n\"I do, but I'll need your help.\" \n\nYou glance at his bike and ask, \"Will you drive me to the lab?\"\n\n*page_break\n\nÁlvaro hands the journal back to you.\n\n\"I'm sorry, but it's too dangerous.\"\n\nHe glances at his bike and says, \"Besides, I need fuel, and it's not cheap on our island.\"\n\n\"But I can pay you for the fuel and the ride.\"\n\nÁlvaro shakes his head and says, \"You wouldn't like my price.\"\n\n\"Tell me how much?\"\n\n\"Six silver coins.\"\n\n\"Six coins?\"\n\n\"I said you wouldn't like my price.\"\n\n[i]I don't even have six coins.[/i]\n\n*page_break\n\nYour eyes scour the main street for another vehicle, but there are none.\n\nÁlvaro grabs your shoulder and says, \"Listen… It's a dangerous trip to the lab, but I can cut the price in half on one condition.\"\n\n\"What is it?\"\n\n\"You take my wife and me with you tomorrow. Get us off the island on that boat of yours, and we've got a deal.\"\n\nÁlvaro grins and says, \"You can even stay at my place overnight, and we can leave together in the morning. Does that work for you?\"\n\nYou let out a sigh of relief.\n\nTransportation to the lab and a place to stay overnight sounds like a good deal to you.\n\n*page_break\n\nYour brain kicks into action…\n\n[i]Mateo won't mind the extra passengers as long as he gets paid. And I can use my credit card to pay him once we get back to the main island.[/i]\n\nDo you want to take Álvaro's deal for three silver coins, or would you like to haggle with him?\n\n*choice\n    #Agree to his deal of three silver coins.\n        \"All right, Álvaro. That sounds fair to me.\"\n        \n        You pull three silver coins out of your backpack and hand him the money. \n        \n        Then he says, \"We'll need to make a quick stop for the fuel before we go to the lab.\"\n        \n        *set silvercoins - 3\n        *set silvercoins2 true\n        \n        *page_break\n        *goto donedeal\n    #Tell him you'll do the deal if it's for two silver coins.\n        \"I'll need to pay the captain extra money if you and your wife travel with me on the boat. Drop your price to two silver coins, and we've got a deal.\"\n        \n        \"All right,\" he says. \"I can do it for two, but don't expect any free meals at my house.\"\n        \n        You pull two silver coins out of your backpack and hand him the money. \n        \n        Then he says, \"We'll need to make a quick stop for the fuel before we go to the lab.\"\n        \n        *set silvercoins -2\n        *set silvercoins3 true\n        \n        *page_break\n        *goto donedeal\n    \n    \n*label donedeal\n\nYou peer up the street at the crowd of villagers.\n\n\"I want to interview a few people before we leave.\"\n\n\"Sure,\" he says. \"But I doubt they'll want to talk to you.\" \n\nThe two of you set off toward the gathering…\n\nAnd Álvaro says, \"If you were here a couple of weeks ago, every person in this village would've talked to you.\"\n\n\"Why? What happened?\" \n\n\"A lot,\" he says. \"A few months ago, the lab you want me to take you to hired some people from our village to work there.\"\n\n\"Really? I want to interview them.\"\n\nÁlvaro shakes his head and says, \"You can't. They went to the lab to live there, but we lost contact with them a couple of weeks ago. It's one of the reasons why our people are on edge.\"\n\nYou catch a glimpse of two long gray-haired men through the gap in the crowd…\n\nAnd Álvaro continues, \"Last week, there was an attack on a few villagers who went to the lab to visit their relatives.\"\n\n\"Who attacked them?\"\n\nA distressed look flashes across his face, and he says, \"We call them… Red Eyes.\"\n\n*if mateoredeyes      \n       *goto mateoredeyes2\n*else \n       *goto nomateoredeyes2\n   \n       *label mateoredeyes2     \n      \n       \"Red Eyes? The captain of my boat said they're just make-believe monsters from children's stories. You're telling me they're real?\"\n       \n       \"They're very real,\" Álvaro says with a stern look on his face.\n       \n       \"What exactly are they then? Some kind of rabid animal?\"\n       \n       The two of you reach the gathering, and Álvaro says, \"I'll tell you after the ceremony.\"\n       \n       *goto done2         \n     \n       *label nomateoredeyes2\n       \"Red Eyes? What are they erately needs the prickly pears to grow faster.\"\n                \n                \"The red fruit on the cactus?\"\n                \n                \"Yeah.\"\n                \n                Álvaro turns and says, \"I don't think anyone's here, but I know where they keep the fuel. Come on.\"\n                \n                He heads back down the steps, and you follow him…            \n                \n                *page_break\n                \n                You and Álvaro walk toward the barn…\n                \n                And you ask, \"Why are the prickly pears so important to your village?\"\n                \n                Álvaro says, \"The elders believe the fruit can protect our people.\"\n                \n                \"Protect them from what?\"\n                \n                \"The island spirits,\" he says.                \n                               \n                A heavy gust of wind whips across the plains, and you peer up at the rusty weather vane on top of the barn.\n                \n                Its arrow spins west, and you catch a whiff of a foul odor.\n                \n                Álvaro pulls out his machete and asks, \"Do you smell that?\"\n                \n                \"Yeah… It smells like something died.\" \n                \n                The stench of death lingers for a few seconds, and then it's gone…\n                \n                \"Keep your guard up,\" Álvaro says.   \n                \n                You nod and follow him toward the barn…\n                \n                *page_break               \n                              \n                When you reach the barn, Álvaro grabs the door handle and says, \"Stand your ground if we get attacked.\"                     \n                \n                You tighten your grip around your walking stick…\n                \n                And Álvaro asks, \"Are you ready?\"              \n                       \n ue\n                                                                        \nYou and Brenna travel down the street past more yellow-eyed villagers stuck in rigid, contorted poses...\n\nAnd a shriek erupts somewhere behind you.\n\nYou peer back at the collapsed house where the creature was feeding, but it's gone.\n\nA body off to your left starts to twitch and spasm.\n\n\"Brenna, look.\"\n\nShe glances at the body and says, \"We need to go!\"\n\nBrenna breaks into a sprint toward the trail in the woods…\n\nBut just as you're about to follow her, you spot a small child.\n\nIt's the boy you saw on Álvaro's motorbike yesterday. \n\nHe limps across the street and disappears behind a collapsed house.\n\nA second later, a red-eyed creature darts across the street and follows the boy.\n\n[i]He might need my help...[/i]\n\n*fake_choice\n    #Help the boy.\n    \n    #Follow Brenna.\n        \n*set Health 85\n*set silvercoins 3\n*set backpack true\n*set trailmix true\n*set waterbottle false\n*set pen true\n*set journal true\n*set flashlight true\n*set phone true\n*set walkingstick true\n*set banana false\n*set firstaidkit false\n*set antiseptic false\n*set gauze false\n*set bandages false\n*set flashdrive false\n        \n\nYou travel east through the woods for nearly ten minutes without incident, but the snap of a tree branch off to your left stops you in your tracks.\n\nYou shine your flashlight into the northern woods…\n\nAnd a gaunt man in tattered clothes darts out of the dense brush.\n\nHe races east through the woods…\n\nShriek.\n\nA stocky red-eyed creature bursts through the thicket and chases the man.\n\nAnother creature rushes out of the brush, and it turns its sight on you.\n\nShriek.\n\nYour light hits it in the eyes, and the creature breaks into a blind sprint toward you.\n\n*fake_choice\n    #Attack.                                                                       \n                               \n    #Defend.          \n        \n    #Flee.\n        \n* ivity, your encounters with some unexpected inhabitants on the island also threaten your life. Or, more accurately said, your life is in danger because of the hordes of bloodthirsty mutated cannibals stalking the island in search of human flesh.\n \n  Your journey will take you across an island filled with peril, adventure, and life-and-death choices. Survival won't be easy, but with new friends and your trusty weapon for protection, escape from the island might be possible. Can you escape the Island Of Carnage, or will you end up as a meal for a hungry horde of red-eyed cannibals?\n\n  [b]Content Warning:[/b] The story [i]Island Of Carnage[/i] contains blood, violence, and gore. The flesh-eating creatures, you, and anything else alive on the island can die in this adventure/horror game of survival.\n\n  *if choice_is_advertising_supported\n      [i]${choice_title}[/i] is supported by advertisements, but you can buy the unlimited version to turn off ads forever.\n\n      *purchase_discount adfree 2023-07-13 $4.99 $2.99 purchased\n      *page_break_advertisement\n  *if choice_is_advertising_supported = false\n      *check_purchase adfree\n      [i]You can play through the game once for free, or purchase unlimited replays below.[/i]\n\n      *purchase_discount adfree 2023-07-13 $4.99 $2.99 purchased\n      *page_break Play Now for Free\n\n*label purchased\n*if choice_is_omnibus_app\n      [b]Content Warning:[/b] The story [i]Island Of Carnage[/i] contains blood, violence, and gore. The flesh-eating creatures, you, and anything else alive on the island can die in this adventure/horror game of survival.\n\n*finish\n\n      \n", "subroutines": "*bug\n*label hit\n*params damage\n*set health - damage\n*if health \u003c= 0\n  *set health 0\n  *goto_scene done\n*else\n *return\n          \n\n"}};
