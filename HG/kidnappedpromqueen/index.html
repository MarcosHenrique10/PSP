But if you had stayed to argue with Mallory, you both would have been trapped,\" Jessica says.\n\n \"That is a small comfort,\" Smothers says.\n\n Do you think Smothers made the wrong choice?\n\n *choice\n  #Yes\n   \"You made a mistake, and that's okay,\" you say. \"At least you're admitting it.\"\n\n   \"Besides, it sounds like you didn't have enough time to think things over,\" Jessica says. \"You did what Mallory told you to do. It's understandable.\"\n\n   *if chapter_7_where_to_go = \"storeroom\"\n    \"I don't want to talk about it,\" Vice-Principal Smothers says. \"What happened in the cafeteria?\"\n\n    *goto 1_1_1\n   *else\n    \"I don't want to talk about it,\" Vice-Principal Smothers says. \"Let's discuss something else.\"\n\n    \"Like what?\" $!{J_nickname} asks.\n    \n    *goto 1_3\n  #No\n   \"I think you did the right thing,\" you say. \"Thanks to you, we got the clue that Mallory found. It could be vital to our survival.\"\n\n   *if chapter_7_where_to_go = \"storeroom\"\n    \"I don't want to talk about it,\" Vice-Principal Smothers says. \"What happened in the cafeteria?\"\n\n    *goto 1_1_1\n   *else\n    *goto 1_3\n\n\n*label 1_3\n\"I think we have a good idea of what happened in both rooms now,\" Smothers says, changing the topic. \"Let's go over the evidence.\"\n\nHe takes the phone out of his pocket and shows it to everyone else. The phone is clearly dead, as pressing the buttons does nothing to change the black screen.\n\n\"I don't suppose anyone has a charger with them,\" Jessica says.\n\n\"Nope,\" you say.\n\n\"I don't even [i]own[/i] a charger,\" Smothers says. \"I use the charger that's in the teacher's lounge.\"\n\n\"Why don't we use the speaker system?\" $!{J_nickname} asks.\n\nEveryone stares at ${J_him}. \"Mallory connected the audio player to the speakers, earlier,\" ${J_he} says. \"Maybe we can connect the phone to the speakers. Charge it that way.\"\n\n\"Worth a shot, I suppose,\" you say.\n*page_break\nThe four of you head over to the speakers. As $!{J_nickname} thought, the phone connects to them easily. A picture of a battery appears onscreen.\n\n\"Is it charging?\" you ask.\n\n\"No idea,\" $!{J_nickname} says. \"I don't own this type of phone.\"\n\n\"Well, while we're waiting, let's talk about the other clue,\" Jessica says. \"What's up with the intercom switch?\"\n\n\"Like I said, there's one in my office,\" Smothers says. \"There's one in the front office and one in the principal's office.\"\n\n\"The principal's office is the only one connected to this building,\" Jessica says. \"Maybe Elena is inside there.\"\n\n\"Impossible. How could the kidnapper keep Elena in an office all day long?\" Smothers asks. \"Even if she was tied up underneath the desk or something, someone would have noticed.\"\n\n\"Well, maybe there's a clue inside the intercom system, then,\" you say. \"Like a message plays, when you attach the switch to it.\"\n\n\"That cannot be right,\" Smothers says. \"If we had access to the intercom, we could turn it on and call for help. The kidnapper wouldn't want [i]that[/i]. I'm fairly certain this is not the clue the kidnapper wanted us to find.\"\n\n\"We lost Bruce, trying to get this,\" you say. \"We can't ignore it.\"\n\n\"The [i]phone[/i] is the clue, because it was protected by a puzzle!\" Smothers argues. \"The intercom was randomly discarded in the kitchen! It's a piece of trash, not a vital clue!\"\n\n\"But you just said we could use it to access the intercom!\" you argue back. \"We can use it to try to escape!\"\n\n\"The intercom is in the office, and we don't have a way to get there!\" Smothers says.\n\n\"I think we do,\" $!{J_nickname} says.\n*page_break\n$!{J_nickname} points to the phone. \"While you were, um, discussing the intercom switch, the phone turned on.\"\n\nEveryone crowds around the phone. It is at one percent, and on the screen is a notification from Queen Cinderella.\n\nMESSAGE\n*line_break\n[b]Queen Cinderella[/b]\n*line_break\nTime for Round Three. The clue you found will lead you to the room with Elena. But which one is it? I put locks on [i]all[/i] the rooms in the building, just to make it hard on you.\n\nThe code to get into the hallway is zero-zero-zero. Just like before, you have a five minute time limit. Get out and save Elena in time, or else the door to her room will be locked forever. In her pocket is the code to unlock this phone. If you don't make it, then\n\n---\n\nThe rest of the message is cut off. $!{J_nickname} taps on it, only to get a three-digit numeric password screen.\n\n\"Try zero-zero-zero,\" you say.\n\n$!{J_he} does, but it doesn't work. \"And the emergency call feature has been disabled,\" ${J_he} says.\n\n\"Crap,\" you say. \"Queen Cinderella thought this through. We can't read the rest of the message without the passcode.\"\n\n\"And if we don't save Elena and get the passcode?\" Jessica asks.\n\n\"Then maybe Queen Cinderella will send us another message,\" $!{J_nickname} says. \"This seems like an automated system. In theory, it should be easy enough to have it automatically send a specific message to the phone in five minutes, if no one opens the door to Elena's room.\"\n\n\"And that's the next question,\" you say. \"Where is Elena?\"\n*page_break\n\"Sounds like it's one of the rooms connected to the hallway,\" Smothers says. \"But which one?\"\n\n\"It has to be the principal's office,\" Jessica says. \"That's where the intercom switch goes.\"\n\n\"I told you, I don't think that's the clue,\" Smothers says. \"The clue is this phone.\"\n\n\"'The clue you found will lead you to the room with Elena',\" you read out loud. \"What room does the phone point to? It's not like there's a designated phone room or something. Phones aren't allowed in school.\"\n\n\"It's the teacher's lounge,\" $!{J_nickname} says.\n\n\"What?\" Smothers asks.\n\n\"You said it yourself that there's a phone charger there,\" $!{J_nickname} says. \"I can't think of any other places that work.\"\n\n\"Not even a science classroom?\" Smothers asks. \"Phones are very scientific.\"\n\n\"If the clue was a periodic table, a science classroom would make sense,\" Jessica says. \"But it's a phone, and $!{J_nickname}'s right. The teacher's lounge is the only place in school where phone use is permitted.\"\n\n\"It sounds like we have two places we should search,\" you say. \"The teacher's lounge and the principal's office. And I want to search...\"\n\n*choice\n #The teacher's lounge\n  *goto 1_4\n #The principal's office\n  *goto 1_5\n\n\n*label 1_4\n*set chapter_7_where_to_go \"teacher's lounge\"\n\"I want to go to the teacher's lounge,\" you say.\n\n\"And I want to go to the principal's office,\" Jessica says.\n\nSmothers and $!{J_nickname} look at each other. \"Do you have a preference?\" $!{J_nickname} asks.\n\n\"The principal's office,\" Smothers says. \"I know how to operate the intercom switch.\"\n\n\"You attach it to the intercom, right?\" Jessica asks. \"It doesn't seem all that complicated.\"\n\n\"It's harder than it looks,\" Smothers says. \"If you try to put it in upside-down, it doesn't work at all.\"\n\n\"[i]Anyway[/i], it looks like we have our two teams,\" you say. \"$!{J_nickname} and I go to the teacher's lounge; Jessica and Vice-Principal Smothers go to the principal's office. Let's meet back here in five minutes...hopefully with Elena.\"\n*finish\n\n*label 1_5\n*set chapter_7_where_to_go \"principal's office\"\n\"I want to go to the principal's office,\" you say.\n\n\"I want to go there, too,\" Jessica says. \"Are you two okay with going to the teacher's lounge?\"\n\n\"I would prefer the science classroom,\" Smothers says weakly.\n\n\"That's close to the teacher's lounge,\" $!{J_nickname} says. \"We can try the lounge first, and if that's wrong, we'll try the classroom.\"\n\n\"Great, it's decided,\" you say. \"Jessica and I will go to the principal's office. $!{J_nickname} and Vice-Principal Smothers will go to the teacher's lounge. Let's meet back here in five minutes...hopefully with Elena.\"\n*finish\n\n\n\n\n*label 2\nYou and Smothers cross the gym, to meet with the others. It looks like your group isn't the only one that suffered casualties, so to speak. Bruce is visibly absent, leaving only $!{J_nickname} and Jessica.\n\n\"You lost someone, too,\" you say to them.\n\n\"You lost two people,\" Jessica says. \"This is not good.\"\n\n\"Half of us are gone now? Yeah, I'd say that's pretty terrible,\" you say. \"At this rate, only two of us will be left standing after the next round.\"\n\n\"But didn't Queen Cinderella warn something like this would happen?\" $!{J_nickname} asks. \"She said something like, 'I thought only half of you would escape the rooms'.\"\n\n\"Just because it was expected, that doesn't make it any better,\" you say.\n\n\"I believe we are doing better than expected, all things considered,\" Smothers says. \"Our success rate has been much higher than that of Algebra II students, facing an unscheduled pop quiz.\"\n\n\"This isn't a test,\" Jessica says.\n\n\"I would argue that's [i]exactly[/i] what this is,\" Smothers says. \"Queen Cinderella is testing us, to see if we are worthy of escaping her punishment.\"\n\n\"That's a bit dramatic,\" you say. \"Maybe we should back up a bit and talk about what just happened in the rooms.\"\n\nWhat room do you want to discuss first?\n\n*choice\n #The cafeteria\n  *set chapter_7_where_to_go \"cafeteria\"\n  *goto 2_1\n #The storeroom\n  *set chapter_7_where_to_go \"storeroom\"\n  *goto 2_2\n\n*label 2_2\n\"Before we entered the storeroom, we decided to divide it up into quarters,\" Vice-Principal Smothers says. \"Each one of us searched a different area. That way, we could make sure everywhere was searched.\"\n\n\"That's a good idea,\" Jessica says. \"We should have decided where to search, before entering the kitchen.\"\n\n*if (storeroom_back = \"Player\")\n \"I took the back wall with Mr. Smothers,\" you say.\n\n \"Vice-Principal Smothers,\" Smothers says automatically.\n\n \"Right,\" you say. \"I looked around a bit, when I heard one of the others shout that they found the clue, and they needed help solving the puzzle.\"\n\n \"Hmph,\" Smothers says. \"I didn't hear that.\"\n\n That would explain why he didn't show up to solve the puzzle, like you did. \"Well, I went there right away,\" you say. \"There was a pencil box, with a touchscreen on top. I had to solve the Shakespeare puzzle on the touchscreen, to open the box. This phone was inside.\"\n\n You hand the phone to Jessica. She tries pressing the buttons on it, but nothing happens. \"It's out of battery,\" she declares.\n\n \"After I got the phone, I thought I was alone in the room,\" you say. \"I didn't see Mallory, Steve or Vice-Principal Smothers anywhere.\"\n\n *if (storeroom_door = \"Steve\") or (storeroom_side = \"Steve\")\n  \"I was with Miss Ramsey,\" Smothers says. \"Or I should say I [i]found[/i] her, lying on the ground. I checked her pulse to make sure she was still alive, and I shouted a thirty second warning.\"\n\n  \"I heard that,\" you confirm. \"I started to run out of the room, when I found Steve on the ground. He was also unconscious. I wanted to check him, but Smothers forced me to leave.\"\n\n  \"And it's a good thing I did, because otherwise, there would have been [i]three[/i] people trapped inside, not just two,\" Smothers says.\n\n  *goto accuse\n *else\n  \"I was with Steve,\" Smothers says. \"Or I should say I [i]found[/i] him, lying on the ground. I checked his pulse to make sure he was still alive, and I shouted a thirty second warning.\"\n\n  \"I heard that,\" you confirm. \"I started to run out of the room, when I found Mallory on the ground. She was also unconscious. I wanted to check her, but Smothers forced me to leave.\"\n\n  \"And it's a good thing I did, because otherwise, there would have been [i]three[/i] people trapped inside, not just two,\" Smothers says.\n\n  *goto accuse\n*if (storeroom_door = \"Player\")\n *if storeroom_side = \"S ound. I checked his pulse to make sure he was still alive, and I shouted a thirty second warning.\"\n\n  \"I heard that,\" you confirm. \"I started to run out of the room, when I found Mallory on the ground. She was also unconscious. I wanted to check her, but Smothers forced me to leave.\"\n\n  \"And it's a good thing I did, because otherwise, there would have been [i]three[/i] people trapped inside, not just two,\" Smothers says.\n\n  *goto accuse\n\n*if (storeroom_side = \"Player\")\n \"I didn't take the area by the door, but I took the area next to it,\" you say. \"There was a bunch of art supplies everywhere, and I found a bunch of pencil boxes. One had a touchscreen lock on top, just like the rooms from earlier. I shouted that I found the clue.\"\n\n \"You did? I didn't hear you say anything,\" Smothers says.\n\n \"Maybe you were too focused on searching your own area,\" you say. \"Steve and Mallory didn't come to help me, either. I had to solve the puzzle by myself. It was this dumb Shakespeare thing. Anyway, when I solved it, I got this phone.\"\n\n You hand the phone to Jessica. \"It's not working,\" you say. \"I think it needs to be plugged in or something.\"\n\n *if (storeroom_door = \"Steve\") or (storeroom_side = \"Steve\")\n  \"By the time I finished searching my area, I moved onto the next one,\" Smothers says. \"I found Miss Ramsey, lying on the ground. I checked her pulse to make sure she was still alive, and I shouted a thirty second warning.\"\n\n  \"I heard that,\" you confirm. \"I started to run out of the room, when I found Steve on the ground. He was also unconscious. I wanted to check him, but Smothers forced me to leave.\"\n\n  \"And it's a good thing I did, because otherwise, there would have been [i]three[/i] people trapped inside, not just two,\" Smothers says.\n\n  *goto accuse\n *else\n  \"By the time I finished searching my area, I moved onto the next one,\" Smothers says. \"I found Mr. Stevens, lying on the ground. I checked his pulse to make sure he was still alive, and I shouted a thirty second warning.\"\n\n  \"I heard that,\" you confirm. \"I started to run out of the room, when I found Mallory on the ground. She was also unconscious. I wanted to check her, but Smothers forced me to leave.\"\n\n  \"And it's a good thing I did, because otherwise, there would have been [i]three[/i] people trapped inside, not just two,\" Smothers says.\n\n  *goto accuse\n\n*label accuse\n\"That's terrible,\" Jessica says. \"Who do you think attacked them?\"\n\n*choice\n #Queen Cinderella\n  \"Isn't it obvious?\" you say. \"Queen Cinderella must be the one who attacked them!\"\n\n  \"Since we don't know who Queen Cinderella is yet, that doesn't really answer the question,\" Jessica says.\n\n  \"Also, why would she attack Mallory and Steve?\" $!{J_nickname} asks. \"Did they pose a threat to her plans?\"\n\n  \"I don't know!\" you say. \"All I know is that the crazy kidnapper is my #1 suspect for everything that goes wrong around here, okay?\n\n  *if chapter_7_where_to_go = \"storeroom\"\n   \"Calm down,\" Smothers says. \"Let's talk about the search in the kitchen, now.\"\n\n   *goto 2_1\n  *else\n   \"Don't worry. We'll get to the bottom of this mystery,\" Jessica says.\n\n   [i]Or die trying[/i], you think grimly.\n\n   *goto 2_3\n #Someone from the other group\n  \"It wasn't me or Smothers, so it must be someone from the other group,\" you say.\n\n  \"You think one of us ran across the gym, knocked out two people, then ran back without being noticed?\" Jessica asks. \"Hmmm...do you think it was Bruce?\"\n\n  \"Not really,\" $!{J_nickname} says. \"If he wanted to knock someone unconscious, I think he would have gone after us first, not Steve and Mallory.\"\n\n  \"Yeah, I'm definitely higher up on Bruce's hit list,\" Jessica says. \"And since $!{J_nickname} and I were together the whole time, that means neither of us did it.\"\n\n  So either they're lying, or Mr. Smothers is lying, or an outside third party did he intercom switch. Smothers recognizes it immediately. \"That's the switch I use to connect to the PA system!\" he says. \"It was in the [i]kitchen[/i]?\"\n\n\"Yes,\" $!{J_nickname} says.\n\n\"Well, it's not [i]mine[/i],\" Smothers says. \"At least, I think it's not. Maybe Queen Cinderella took it, when she captured all of us, in my office.\"\n\n\"After we found it, I called out to Bruce,\" Jessica says. \"He didn't answer. I thought it was one of his stupid jokes, but as we were leaving, I found him on the ground.\"\n\n\"And we only had thirty seconds left,\" $!{J_nickname} says. \"There was a timer on the door's touchscreen. Lucky for us, Bruce was near the door. Otherwise, I wouldn't have seen we were running out of time, and we would have been trapped.\"\n\n\"I think we could have gotten him outside, if we had picked him up immediately and ran,\" Jessica said. \"But I tried to find a pulse instead. It was a dumb decision on my part.\"\n\nWas that a dumb decision?\n\n*choice\n #Yes\n  \"Yeah, it would have been better if you got Bruce out right away,\" you said. \"But like you said, there were thirty seconds left. You didn't exactly have a lot of time to think it over.\"\n\n  \"We barely got out of our room in time, too,\" Smothers says. \"No doubt that's what Queen Cinderella wanted to happen. Why else would she set an unnecessary time limit?\"\n\n  *if chapter_7_where_to_go = \"cafeteria\"\n   \"I still feel bad about it,\" Jessica says. \"You barely got out of your room, you say? Tell me more.\"\n\n   *goto 2_2\n  *else\n   \"I agree with them,\" $!{J_nickname} says. \"If you made a mistake in not saving Bruce, I did, too.\"\n\n   *goto 2_3\n #No\n  \"I think you made the right choice,\" you say. \"I read somewhere that you're not supposed to move someone, if they're unconscious.\"\n\n  *if chapter_7_where_to_go = \"cafeteria\"\n   \"Vice-Principal Smothers, what exactly happened in the storeroom?\" Jessica asks.\n\n   *goto 2_2\n  *else\n   *goto 2_3\n\n*label 2_3\n*goto 1_3\n", "route_2_chapter_8": "[b]Chapter 8[/b]\n\n*if chapter_7_where_to_go = \"teacher's lounge\"\n *goto teacher_start\n*else\n *goto principal_start\n\n\n*label teacher_start\nOf course, the principal's office and the teacher's lounge are in totally different hallways. Once again, you'll be out of sight of the other group. Although, really, \"group\" is probably not the correct word to use here, when you're only talking about two people.\n\n[i]What if someone attacks us?[/i] you wonder. There's no way the other two could notice, much less help.\n\nLuckily, there is less urgency this time around. True, there's still a five minute time limit, but all you have to do is walk down the hall and open a door. You could do that in one minute, easily.\n\nWhile you and $!{J_nickname} walk together, ${J_he} starts a conversation. What does ${J_he} ask about?\n\n*choice\n #Elena\n  *if gender = \"male\"\n   \"How well do you know Elena?\" $!{J_nickname} asks.\n\n   \"She's my best friend,\" you say. \"She's the most wonderful girl I know.\"\n\n   \"Oh,\" $!{J_nickname} says softly. She looks somewhat upset.\n\n   \"I don't mean that as an insult to you!\" you say. \"I mean, we met each other for the first time, what, thirty minutes ago? I'm sure you and I will be great friends, too.\"\n\n   \"If we ever get out of here alive,\" $!{J_nickname} mutters.\n\n   *goto teacher_1\n  *else\n   \"How well do you know Elena?\"  $!{J_nickname} asks.\n\n   \"She's my best friend,\" you say. \"I swear, if Queen Cinderella has hurt her...\"\n\n   \"Queen Cinderella hasn't hurt [i]us[/i] so far,\" $!{J_nickname} says. \"Besides for trapping us and making us solve puzzles.\"\n\n   \"It's possible that Queen Cinderella was the one who attacked Bruce,\" you say. \"In which case, she [i]is[/i] hurting us. And let's not forget, Elena was kidnapped first.\"\n\n   *goto teacher_1\n #Jessica\n  \"I'm worried about Jessica,\" $!{J_nickname} says. \"I think she's Queen Cinderella.\"\n\n  \"What makes you say that?\" you ask.\n\n  *if gender = \"male\"\n   \"She's the only female left,\" $!{J_nickname} says. \"Who else could it be?\"\n\n   \"It's possible Queen Cinderella is male,\" you say. \"But you're right about Jessica being a suspect. She's the only person I know who's organized enough to pull off a plot like this.\"\n\n   *goto teacher_1\n  *else\n   \"She yelled a lot at Bruce, and now he's unconscious,\" $!{J_nickname} says. \"It's suspicious.\"\n\n   \"Personally, I'd be suspicious of anyone who [i]doesn't[/i] get upset when they're kidnapped by a maniac,\" you say.\n\n   \"Some of us do a better job of hiding our feelings, I guess,\" $!{J_nickname} says.\n\n   *goto teacher_1\n #Smothers\n  \"Do you think Vice-Principal Smothers was acting oddly?\" $!{J_nickname} asks.\n\n  \"He certainly seemed angry about that intercom switch,\" you say.\n\n  \"That's because it makes him look guilty,\" $!{J_nickname} says. \"All of you [i]were[/i] kidnapped in his office, right?\"\n\n  \"And somehow we were all moved to this building complex without anyone noticing,\" you say. \"I know school is over for the day, but still. You'd think [i]someone[/i] would be around to see six bodies being dragged halfway across the school.\"\n\n  *goto teacher_1\n\n*label teacher_1\nThe two of you reach the door to the teacher's lounge. You knock on the door. \"Elena? Are you in there?\"\n\nYou hear a female voice cry from inside, but you can't understand the words she's saying. You are 90% certain that it's Elena's voice.\n\n\"It's $!{first_name}! Don't worry, we're coming to save you!\" you shout as loudly as possible. You look at $!{J_nickname} and smile. \"We're almost done. Let's kick this puzzle's butt.\"\n\n[i]Is this the right room? Could it be that your search is finally over? You won't know until you figure out what these four words have in common![/i]\n\n[i]Introspective[/i]\n*line_break\n[i]Rectangular[/i]\n*line_break\n[i]Independent[/i]\n*line_break\n[i]Consubstantial[/i]\n\n[i]What word fits the pattern?[/i]\n\n*choice\n #Another\n  *goto teacher_puzzle_2\n #Entertainment\n  *set puzzle_13_answered true\n  *set puzzle_13_answer \"Entertainment\"\n  *goto teacher_puzzle_finished\n #Intimidating\n  *goto teacher_puzzle_2\n #Sacrifice\n  *goto teacher_puzzle_2\n\n*label teacher_puzzle_2\n[i]Wrong, you moron! I sure hope Elena doesn't die, due to your stupidity! Have four more words. Figure out what they have in common![/i]\n\n[i]Sacrificial[/i]\n*line_break\n[i]Antimatter[/i]\n*line_break\n[i]Librarian[/i]\n*line_break\n[i]Influential[/i]\n\n[i]What word fits the pattern?[/i]\n\n*choice\n #Library\n  *goto teacher_puzzle_3\n #Generosity\n  *goto teacher_puzzle_3\n #Generous\n  *goto teacher_puzzle_3\n #Education\n  *set puzzle_13_answered true\n  *set puzzle_13_answer \"Education\"\n  *goto teacher_puzzle_finished\n\n\n*label teacher_puzzle_3\n[i]Better hope you have the wrong room, because you seem incapable of deciphering the pattern! What do these four words have in common?[/i]\n\n[i]Alligator[/i]\n*line_break\n[i]Binoculars[/i]\n*line_break\n[i]Helicopter[/i]\n*line_break\n[i]Fascinating[/i]\n\n[i]What word fits the pattern?[/i]\n\n*choice\n #Programmer\n  *goto teacher_puzzle_3\n #Society\n  *goto teacher_puzzle_3\n #Exemplary\n  *set puzzle_13_answered true\n  *set puzzle_13_answer \"Exemplary\"\n  *goto teacher_puzzle_finished\n #Anthropology\n  *goto teacher_puzzle_3\n\n\n*label teacher_puzzle_finished\n*if gender = \"male\"\n After you select the word with four syllables, the door opens. Elena is standing on the other side, hands held up in victorious anticipation, a wide smile on her face.\n\n \"$!{first_name}!\" she cries.\n\n \"Elena!\" you respond.\n\n The two of you hug joyfully and then--you're not quite sure how it happened--your faces are pressed together, and both of you are kissing passionately. This continues for several seconds, but when she runs her hand down your back, you suddenly remember where you are and take a step backwards.\n\n \"I missed you,\" you say.\n\n \"[i]Clearly[/i],\" $!{J_nickname} mutters.\n\n \"I'm sorry,\" Elena says. \"It's just...I thought I was going to die here. That's what he said.\"\n\n \"That's what [i]who[/i] said?\" you ask.\n\n \"Vice-Principal Smothers,\" Elena says. \"He's the one who kidnapped me.\"\n *goto teacher_2\n*else\n After you select the word with four syllables, the door opens. Elena is standing on the other side, hands held up in victorious anticipation, a wide smile on her face.\n\n \"$!{first_name}!\" she cries.\n\n \"Elena!\" you respond.\n\n The two of you hug joyfully. \"I thought I was going to [i]die[/i] here, you have no idea!\" she says. \"How on Earth did you find me?\"\n\n \"I followed the cell phone clue,\" you say.\n\n \"I have no idea what you're talking about,\" Elena says.\n\n \"Your phone. Queen Cinderella left it for us to find,\" you say.\n\n \"Queen Cinderella?\" Elena asks. Her face falls. \"Please tell me I'm not hallucinating nonsense.\"\n\n \"This is real. I'm here,\" you say.\n\n \"Have some water,\" $!{J_nickname} suggests, pointing to a sink.\n\n \"No thanks,\" Elena says. \"We should get out of here before he returns.\"\n\n \"He?\"\n\n \"Vice-Principal Smothers,\" Elena says. \"He's the one who kidnapped me.\"\n\n *goto teacher_2\n\n*label teacher_2\n*page_break\n\"Vice-Principal Smothers is our kidnapper?\" $!{J_nickname} asks.\n\n\"I'm sorry. [i]Our[/i] kidnapper?\" Elena asks. She looks at you for an explanation. \"Who is ${J_he}?\"\n\n\"This is $!{J_first} Takeuchi,\" you say. \"$!{J_he} helped me find you.\"\n\n\"You can call me $!{J_nickname},\" $!{J_nickname} says. \"We were kidnapped shortly after school ended today.\"\n\n\"For real?\" Elena asks. \"This isn't a prank or something?\"\n\n\"Why would you think this is a prank?\" you ask. \"You just said you were kidnapped, too!\"\n\n\"I...hold on, let me start from the beginning,\" Elena says. She sits down on a couch and motions for the two of you to do likewise. \"When I came home from school yesterday, I had, like, a thousand messages on my phone. Everyone wanted to talk to me about being the new prom queen.\"\n\n\"I thought the police said you never made it home,\" you say.\n\n\"Well, I don't know why, because I did,\" Elena says. \"I was there for about an hour, then I left to...um...okay, before I tell you, do you promise not to get mad?\"\n\n*choice\n #Yes\n  \"Of course I won't get mad,\" you say. \"I'm just glad you're okay.\"\n\n  \"Great,\" Elena says. \"So, one of the messages I got was from Derek.\"\n\n  \"Oh, no freaking way,\" you say. \"You didn't respond, did you?\"\n\n  \"You just said you wouldn't get mad!\" Elena says.\n\n  \"That was before you mentioned Derek,\" you say grumpily.\n\n  \"Who's Derek?\" $!{J_nickname} asks.\n\n  \"Elena's evil ex-boyfriend,\" you say. \"He almost got her kicked out of school two years ago. Of [i]course[/i] he's involved in this somehow.\"\n\n  \"I know, I know, it was stupid of me to read his message,\" Elena says. \"I should have deleted it right away. But he said he was sorry, and he just wanted to talk.\"\n\n  \"Like the time he just wanted to [i]talk[/i], after he was caught cheating on you with--\" you begin to say angrily.\n\n  \"I'd rather not go over my entire relationship history in front of a stranger, thanks,\" Elena says. \"Derek wanted to meet at the school. He heard about the prom queen stuff, like everyone else in the world. He said he just wanted to talk. So I went to the school to talk to him.\"\n\n  \"Oh, brother,\" you say. \"I know [i]exactly[/i] what he wanted to talk about...\"\n\n  *goto teacher_3\n #No\n  \"In other words, you're about to say something that's going to make me furious,\" you say.\n\n  Elena sighs. \"Derek sent me a message.\"\n\n  \"Oh, no freaking way,\" you say. \"You didn't respond, did you?\"\n\n  \"He wanted to meet with me in private, so I left without telling anyone,\" Elena says. \"You [i]know[/i] what my parents would say, if they knew I saw him again.\"\n\n  \"They'd be furious at you for doing something [i]so stupid[/i]!\" you shout. \"They'd probably rather have you get kidnapped than have you meet up with [i]him[/i]!\"\n\n  \"Uh, time out,\" $!{J_nickname} says. \"Who's Derek?\"\n\n  \"Elena's evil ex-boyfriend,\" you say. \"Think Bruce, but a million times worse. Derek almost got her kicked out of school two years ago, after he--\"\n\n  \"I'd rather not go over my entire relationship history in front of a stranger, thanks,\" Elena says. \"Derek wanted to meet at the school. He heard about the prom queen stuff, like everyone else in the world. He said he just wanted to talk.\"\n\n  \"Oh, don't tell me you fell for that!\" you say.\n\n  \"Will you please calm down?!\" Elena asks. \"I know you hate Derek, but I swear, this was the first time I heard from him in over a year!\"\n\n  \"Yeah, and I know [i]exactly[/i] what he wanted to talk about...\" you say.\n\n  *goto teacher_3\n\n*label teacher_3\n*choice\n #He wanted to get back together\n  \"He wanted to get back together with you, now that you're the prom queen,\" you say.\n\n  \"Well...yes,\" Elena says.\n\n  \"I have never met either of you before, but I am fairly confident that is a terrible idea,\" $!{J_nickname} says.\n\n  \"I told him no, okay?\" Elena says. \"I told him there was no way we would ever get back together, and if he contacted me again, I'd call the police.\"\n\n  \"And then he kidnapped you,\" you say.\n\n  \"[i]No[/i], he left,\" Elena says. \"I went inside to think. I must have lost track of the time, because the doors were locked by the time I tried to leave. I was about to call for help, when Vice-Principal Smothers attacked me.\"\n\n  *goto teacher_4\n #He wanted to kidnap her\n  \"He tried to kidnap you,\" you say.\n\n  \"No,\" Elena says. \"Derek's stupid, but not [i]that[/i] stupid. He said he wanted to go to prom with me.\"\n\n  \"It sounds like he only said that, because you were picked as prom queen,\" $!{J_nickname} says.\n\n  \"Pretty much,\" Elena says. \"I told him that I would rather go to prom alone than with him, and he got angry.\"\n\n  \"And [i]that's[/i] when he tried to kidnap you?\" you ask.\n\n  \"No, that's when he left,\" Elena says. \"I was still mad, so I went inside to think. I must have lost track of the time, because the doors were locked by the time I tried to leave. I was about to call for help, when Vice-Principal Smothers attacked me.\"\n\n  *goto teacher_4\n\n*label teacher_4\n\"But why? What did he say?\" you ask.\n\n\"He didn't say anything at all,\" Elena says. \"He snuck up on me from behind, then knocked me out. I only know it was him, because I saw his reflection a second or two before he hit me. I'm 90% sure he doesn't know that I saw him.\"\n\n\"Did he say anything afterwards?\" you ask, at the same time $!{J_nickname} asks, \"Is it possible you were mistaken?\"\n\n\"I guess it's possible someone else attacked me,\" Elena says. \"But whoever attacked me was bald. I know [i]that[/i] for certain. And when I woke up, I was in a closet filled with ugly suits. That's a perfect match for Smothers.\"\n\n\"What happened next?\" you ask.\n\n\"I was tied up and gagged,\" Elena says. \"I tried escaping and making noise, but nothing worked. So I sat there and waited for what felt like hours. Then I got knocked out by some kind of weird smoke or something, and I woke up here in the teacher's lounge.\"\n\n\"The culprit--Smothers--used smoke to knock us out, too,\" you say.\n\n\"This is bad,\" $!{J_nickname} says. \"If Mr. Smothers [i]is[/i] the culprit, then he's alone with Jessica right now. She's in danger.\"\n\nWhat do you want to do?\n\n*choice\n #Go save Jessica\n  \"We have to save Jessica,\" you say. \"The three of us should be able to overpower Smothers, right?\"\n\n  \"I'm not gonna be much help,\" Elena says. \"I haven't eaten all day. I've only had water from the faucet.\"\n\n  \"Smothers probably has a weapon,\" $!{J_nickname} says. \"It sounds like he's knocked out multiple people already. Maybe we should escape, instead.\"\n\n  \"You know, that wasn't the heroic response I was expecting,\" you say.\n\n  \"I'd rather be smart than dead,\" $!{J_nickname} says. \"Elena, do you have a paper in your pocket?\"\n\n  Elena is surprised at the question and even more surprised to find that she [i]does[/i] have a paper. $!{J_nickname} quickly grabs it and uses it to unlock the cell phone.\n\n  \"Are you calling for help?\" you ask.\n\n  \"Well, I'm not calling for a pizza, if that's what you were thinking,\" ${J_he} says. \"Let's get help, then hide together. That's the safest course of action.\"\n\n  [i]Definitely[/i] not the heroic response you were expecting.\n  *finish\n #Find a way to escape\n  \"Escape is our #1 priority,\" you say. \"Elena, do you have anything in your pocket? Like a code or something?\"\n\n  Elena reaches into her pocket and pulls out a small scrap of paper. \"Uh, yeah,\" she says. \"I didn't have that before. What is it?\"\n\n  \"It's the final clue,\" you say. Sure enough, the number on the paper is the code that unlocks the cell phone. Needless to say, the first thing you do is call the police.\n  *finish\n\n\n\n\n*label principal_start\n\"This is a complete waste of time,\" Vice-Principal Smothers says, as the two of you head to the principal's office.\n\n\"Oh?\" you say.\n\n\"The intercom switch is obviously not a clue,\" Smothers says. \"The phone is the clue. It was hidden by a puzzle, and it has a note from the kidnapper on it. What more do you kids need?\"\n\n\"Maybe the culprit left behind more than one clue,\" you say.\n\n\"If I was the culprit, I would leave exactly [i]zero[/i] clues behind,\" Smothers says.\n\n\"Clearly, Queen Cinderella disagrees,\" you say. You gesture down the hallway. \"There's a touchscreen puzzle on every door. I bet her fingerprints are all over this place.\"\n\n\"And that's another thing,\" Smothers says. \"Who has that many touchscreens? It's not normal, I tell you! Give me a good, old-fashioned dial any day of the week!\"\n\nYou don't answer Vice-Principal Smothers, and a few seconds later, the two of you are at the principal's office.\n\nWho should solve the puzzle?\n\n*choice\n #You\n  *goto principal_puzzle\n #Smothers\n  \"You can solve the puzzle,\" you say.\n\n  \"Me? No way!\" Smothers says. \"I just finished saying how much I hate these blasted touchscreens! [i]You[/i] can solve it!\"\n\n  \"But the interface doesn't have anything to do with the puzzle itself,\" you protest. \"It's not like it's any different on a touchscreen or a piece of paper!\"\n\n  \"Solve the puzzle, or it's detention!\" Vice-Principal Smothers says.\n\n  Okay, whatever. He's clearly being an idiot about this. You decide to ignore him and solve the puzzle yourself. But this is obviously [i]your[/i] decision, not his. No one's going to accuse you of giving in to Smothers, just because he threw a giant hissy fit.\n\n  *goto principal_puzzle\n\n\n*label principal_puzzle\n\n[i]Is this it? Is this the room with Elena inside? The only way to learn that is to solve my puzzle![/i]\n\n[i]1. Clover always stays with her brother.[/i]\n*line_break\n[i]2. Ace and Flynn avoid each other, whenever they can. If one is inside, the other is outside.[/i]\n*line_break\n[i]3. Flynn is not Clover's brother.[/i]\n*line_break\n[i]4. Flynn is outside.[/i]\n\n[i]Where is Clover?[/i]\n\n*choice\n #Inside\n  *set puzzle_13_answered true\n  *set puzzle_13_answer \"Inside\"\n  *goto principal_puzzle_finished\n #Outside\n  That's not correct. If Clover is outside, she'd be outside with Flynn, but Flynn is not her brother, and she [i]always[/i] stays with her brother. Perhaps you should try again.\n\n  *goto principal_puzzle\n\n*label principal_puzzle_finished\nThe door beeps and unlocks. You and Smothers both step inside the principal's office. At first glance, it seems normal, although you haven't been inside here before, so you can't be certain.\n\n\"Is anything out of place?\" you ask.\n\n\"No,\" Smothers says. \"I'm sure that if Elena was being held captive in the principal's office, she would have noticed. Do you want to try the switch?\"\n\n\"Sure,\" you say. You take the intercom switch from Smothers and huddle over the principal's desk, when you see Smothers' reflection in the glass front of a cupboard. He's standing behind you, holding his right hand above his head, like he's getting ready to hit something.\n\n*choice\n #Dodge left\n  *goto principal_1\n #Dodge right\n  *goto principal_1\n #Stay in place\n  You don't have time to react. Pain erupts in the back of your head, and you fall unconscious.\n \n  *finish\n\n\n\n*label principal_1\nYou dodge to the side, and Smothers smashes a sock into the principal's desk. The desk cracks, and it takes you a second or two to realize there's a blunt weapon hidden inside the sock.\n\n\"Oops,\" Smothers says. \"You weren't supposed to do that.\"\n\nYou jump backwards, as far away from Smothers as possible. \"[i]You're[/i] the kidnapper!\" you say.\n\n\"Congratulations, you're the only one smart enough to have figured it out,\" Smothers says. \"Although, really, is that so much of an accomplishment? You only got it, because you caught me red-handed.\"\n\n\"You won't get away with this!\" you say.\n\n\"Why is that? Are you going to stop me, by spouting overused lines from bad movies?\" Smothers asks. Smothers reaches behind him and closes the door to the principal's office. \"There. Now there's no way for you to escape.\"\n\nWell, this is a bad situation. You probably have enough time to talk to Smothers about one, maybe two things, before he knocks you unconscious.\n*set route_youre_on 0\n\n*goto principal_2\n\n*label principal_2\n*set route_youre_on + 1\n*if route_youre_on = 2\n *goto principal_over\n\nWhat do you ask?\n\n*choice\n *hide_reuse #Where's Elena?\n  \"Where's Elena?\" you ask.\n\n  \"She really [i]is[/i] in \n\n  \"The idiot didn't come to my office, like he was supposed to,\" Smothers says. \"So I went straight to his room and kidnapped him.\"\n\n  \"But you got the wrong person,\" you say.\n\n  \"I [i]was[/i] working under a time limit,\" Smothers says. \"There was barely enough time to get $!{J_nickname} to the gym. That's why ${J_he} was the first out of ${J_his} room. But I suppose it ended up working in my favor. Everyone focused all their suspicion on $!{J_nickname}, the one who wasn't supposed to be there. No one at all thought it was actually me.\"\n\n  *goto principal_2\n *hide_reuse #Why'd you attack the others?\n  \"Why'd you attack the others?\" you ask.\n\n  \"I'm hurt,\" Smothers says. \"You say that like I'm the only person in the world who's ever wanted to smash Bruce in the head with a blunt object.\"\n\n  \"Did he figure out you're the culprit?\" you ask.\n\n  *if chapter_5_knocked_out = \"true\"\n   \"No, of course not,\" Smothers says. \"It was always the plan for half of you to be knocked out, during the room search. It would have been too obvious if I only attacked Steve and Mallory, so I ran across the gym, knocked out both you and Bruce, then ran back to the storage room.\"\n\n   *goto I_am_making_a_separate_scene_just_for_one_line\n  *else\n   \"No, of course not,\" Smothers says. \"It was always the plan for half of you to be knocked out, during the room search. It would have been too obvious if I only attacked Steve and Mallory, so I ran across the gym, knocked out the first person I saw, then ran back to the storage room.\"\n\n   *goto I_am_making_a_separate_scene_just_for_one_line\n  *label I_am_making_a_separate_scene_just_for_one_line\n  \"I can't believe no one noticed,\" you say.\n\n  \"Mallory noticed,\" Smothers says. \"That's why I had to knock her unconscious.\"\n\n  \"That's not what you said before!\" you say.\n\n  \"Wow, you really [i]are[/i] stupid,\" Smothers says. \"I lied about what happened in the storage room. Duh.\"\n\n
