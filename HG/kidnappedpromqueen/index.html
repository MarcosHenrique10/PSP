ystem[/b]: System for breaking down food and absorbing it in the body. Major parts include the mouth, esophagus, stomach and intestines.\n\n• [b]Endocrine System[/b]: System for releasing hormones and chemicals through the body. Major parts include thyroid, pituitary gland and the islets of Langerhans.\n\n• [b]Hematopoietic System[/b]: System for creating blood cells, from stem cells. Major parts include spleen, liver and lymph nodes.\n\n• [b]Integumentary System[/b]: This is a fancy word for skin. Major parts include dermis and epidermis.\n\n• [b]Respiratory System[/b]: System for gas exchange, primarily the flow of oxygen to the rest of the body. Major parts include nose, lungs and larynx.\n\n\n*choice\n #Read your English notes\n  *goto english_notes\n #Read your Greek Mythology notes\n  *goto greek_notes\n #Read your history notes\n  *goto history_notes\n #Go back to the start of your notebook\n  *goto start_of_screen\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2020-04-09 $4.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n", "final": "*achieve completionist\nA few days later, you find a strange piece of paper in your locker. On it is written the phrase \"come see me\".\n\nYou open up your notebook, which is kept under the \"show stats\" button. That makes three anonymous notes you've gotten: \"anagram\", \"acrostic\" and \"come see me\". You've been keeping them as clues, but what are they clues for? Is this the final puzzle?\n\nYou know that an acrostic is a type of puzzle, where you have to take note of the first letter of each line. For example, this poem is an acrostic for the word \"what\":\n\nWill we go to the zoo?\n*line_break\nHey, I want to go, too!\n*line_break\nAnimals are really nice.\n*line_break\nThe penguins walk upon the ice!\n\nThat is, the first letter of each line is W, H, A and T. Coincidentally, \"what\" is the word most people say, after reading that poem.\n\nAs for anagrams, you know an anagram is when letters are moved around, to form new words. For example, \"scare\" and \"races\" are anagrams. They have the same five letters, in a different order. There are other anagrams. For example, \"The Kidnapped Prom Queen\" can be rearranged to spell \"drink a pepped queen moth\" or \"equipped mend, then a pork\".\n\n\"It can't be a coincidence that anagram and acrostic are put together,\" you say. \"They're both word puzzles, just like the ones I solved when I was kidnapped!\"\n\nDo you think you can solve this final puzzle?\n\n*choice\n #Yes\n  *goto anagram_solve\n #No\n  *goto help_1\n\n*label help_1\nYou flip open your notebook, where you wrote down the solutions to every puzzle you encountered. Until now, you never thought about the fact that they're all capitalized.\n\n\"It's an acrostic all right,\" you say.\n\nThe letters you get are H, E, J, T, C, N, S, ', R, I, A, M, E, I, T, P, U, N, U, L, and S. That's a lot of letters! Do you want to make an anagram out of them?\n\n*choice\n #Yes\n  *goto anagram_solve\n #No\n  *goto help_2\n #Give me some help\n  *goto help_3\n\n*label help_2\nAw, don't be lazy! Here, let me give you some help.\n\n*goto help_3\n*label help_3\nThe first two words of the anagram are \"the culprit's\".\n\nSo you have \"the culprit's\", followed by the letters J, N, A, M, E, I, N, U, and S, in some order. You'll have to figure out the rest from there.\n\n*goto anagram_solve\n*label anagram_solve\nWhat is the anagram?\n\n*choice\n #The manicure's puns jilt\n  I'm pretty sure there are no manicures in this story. Try again.\n\n  *goto anagram_solve\n #The camel's Jinn pursuit\n  Camels? What do camels have to do with this?\n\n  *goto anagram_solve\n #The culprit's minus jeans\n  You honestly could not care what kind of pants the culprit is wearing today. You're more concerned with their identity.\n\n  *goto anagram_solve\n #The culprit's name is Jun\n  *goto puzzle_solve\n #The canine's jurist plum\n  What? That doesn't even make sense! Try again.\n\n  *goto anagram_solve\n\n*label puzzle_solve\n*achieve puzzlemaster\nThe culprit's name is Jun! And now that you know this, it's time to follow the final clue: \"come see me\".\n\nYou find $!{J_nickname} waiting outside the building where the foreign exchange students live. $!{J_he} frowns slightly at you. \"Hi, $!{first_name}. Is this a social call?\" ${J_he} asks hopefully.\n\n\"Nope,\" you say. \"I got your message.\"\n\n\"I thought so,\" $!{J_nickname} says. $!{J_he} gestures to a nearby bench. \"Come. Let's sit down and see if anyone else figures it out.\"\n\nThe two of you sit down. \"Anyone else?\" you ask. \"I take it I'm not the only one who got a message in their locker.\"\n\n\"I sent them to everyone who was kidnapped,\" $!{J_nickname} says. \"Slipped them in their lockers during lunch, and under the door to Mr. Smothers' office. Maybe they thought it was just random trash.\"\n\n\"Maybe,\" you say. \"So, about the message...\"\n\n\"It's not true,\" $!{J_nickname} says. \"I mean, it's kind of true, but it's not. What I mean to say is...this is difficult to explain, especially to you. You're the one I...I mean, I hope we can still be friends when this is over.\"\n\n\"$!{J_nickname}...\" you say. \"I don't know what to think, just now. Yes, we're friends, but I just got a message saying you're the one responsible for kidnapping everyone, and you're acting squirrelly about it. I promise to hear you out, but if you're going to confess that you're a criminal mastermind...\"\n\n$!{J_nickname} nods grimly and...\n\n*choice\n #Confesses ${J_he} is the culprit\n  *goto culprit\n #Explains this is a misunderstanding\n  *goto misunderstanding\n\n*label misunderstanding\n\"I'm sorry,\" $!{J_nickname} says. \"I'm doing a terrible job of explaining. I am trying to say that...I'm the one who made all the touchscreens and the puzzles.\"\n\n\"What?\" you cry.\n\n\"I didn't know they would be used for evil!\" $!{J_nickname} says. \"It was a project I was making for the school science fair! I was trying to create an automated escape room game. One that would work entirely on its own, without any human supervision.\"\n\n\"Oh,\" you say.\n\n\"That's why the puzzles spell out 'the culprit's name is Jun',\" $!{J_nickname} says. \"It was a little joke, for the judges. And now I'm terrified the police will figure it out, and I'll be arrested.\"\n\n\"Well, if you keep leaving messages about it being an acrostic puzzle, then yeah, people are going to catch on eventually,\" you say.\n\n\"I know, but I...I felt like I had to tell [i]someone[/i], you know?\" $!{J_nickname} says.\n\n\"Do you have any idea how the kidnapper got their hands on your project?\" you ask.\n\n\"No, but it's not like I kept it locked up or anything,\" $!{J_nickname} says. \"They probably broke into my room, when I was in class or something. I'm more curious how they found out about it. I didn't tell anyone besides the teachers and some students who aren't related to the kidnapping at all.\"\n\n\"Huh,\" you say. \"Well, at least this explains why [i]you[/i] were kidnapped, instead of Alejandro.\"\n\n\"Yeah,\" $!{J_nickname} says. \"The kidnapper was trying to send me a message: [i]tell anyone, and you're dead[/i].\"\n\n\"Well, I'm glad you told [i]me[/i], even if you did it with a secret puzzle,\" you say. \"But you know what you have to do now?\"\n\n\"Come up with a new project for the science fair?\" $!{J_nickname} asks.\n\n\"Tell Mr. Smothers,\" you say, getting up from the bench. \"Come on, I'll help you. You'll feel better once you confess everything.\"\n\n\"You're right, but I don't like it,\" $!{J_nickname} groans. $!{J_he} stands up beside you. \"Thanks. I don't think...no, I [i]know[/i] I don't have the courage to do this alone.\"\n\n\"What are friends for?\" you ask.\n\n$!{J_nickname} smiles at you. \"Maybe, when this is all over, if you don't have a prom date...\" ${J_he} says.\n\n\"Yes?\"\n\n\"...Never mind,\" $!{J_nickname} says quickly. \"Let's go see Smothers.\"\n\n[b]The End[/b]\n*page_break\nWould you like to see the ending, if $!{J_nickname} confesses to being the culprit?\n\n*choice\n #Yes\n  *goto culprit\n #No\n  In that case, thanks for playing!\n  *goto actual_end\n\n\n*label culprit\n\"I'm the one who planned the kidnapping,\" $!{J_nickname} says. \"Nancy, Claudia, Smothers...they were just tools. They thought they were acting of their own accord, but they weren't. They were following my plan.\"\n\n\"How...how is that possible?\" you ask.\n\n\"I sent Nancy a box, with all the touchscreens inside,\" $!{J_nickname} says. \"She turned on the touchscreen, and up popped a series of instructions, explaining how she could use them to get revenge on the prom committee that wronged her.\n\n\"It was the same way with Smothers. I sent a box to his office, with fake letterhead from the principal, saying it was new security equipment to be installed in the gym,\" $!{J_nickname} says. \"Sure, it was [i]his[/i] idea to kidnap everyone, but I planted the seed that made it possible.\n\n\"As for the Claudia timeline, that required a bit more work,\" $!{J_nickname} says. \"No matter how hard I tried, I couldn't find a way to manipulate her so she was both angry enough to want revenge, but clear-headed enough to see the plan through. That's why I tricked Alejandro into thinking the two of them are related. It was the only way to make the plan succeed.\"\n\n\"I don't understand,\" you say. \"Timeline? Are you saying you can jump through timelines?\"\n\n\"Timelines, universes, branching pathways, whatever you want to call it,\" $!{J_nickname} says. \"It's all the same to me, at this point. Do you know how long this has been going on?\"\n\n\"How long [i]what[/i] has been going on?\" you ask.\n\n\"Hm,\" $!{J_nickname} says. \"Strange. When I told you three times ago, you figured it out right away. I guess all the pieces aren't in place, this time around. I wonder what changed that...\"\n\n\"$!{J_nickname}, if this is some kind of joke, it's not funny,\" you say.\n\n\"No, it's [i]not[/i] funny,\" ${J_he} says. \"I've been repeating the last five months of high school, for years now. Every time I make it to May 11th, the day after the prom, I wake up in my bed on January 1st. I'm trapped in a time loop, and this is the only way I can escape.\"\n*page_break\n\"You think you can change the timeline by [i]kidnapping[/i] people?\" you ask.\n\n\"No, by going to prom,\" $!{J_nickname} says. \"I didn't go, the first time around. We don't have prom culture in my country. But I figured, hey, if the time loop resets the day after the prom, that's gotta mean prom is important, right? So I started going to prom, and nothing changed.\"\n\n\"You kept repeating the year from the beginning again,\" you say.\n\n*if (gender=\"male\")\n \"Exactly,\" $!{J_nickname} says. \"At this point, I've been to prom with every guy in school, including you. But nothing's changed. I'm still here, trapped in the same time loop. And that's when it finally hit me: prom queen.\"\n\n \"You think becoming prom queen will break the time loop?\" you ask.\n\n \"Why not?\" $!{J_nickname} asks. \"I've tried everything else! But as it turns out, getting a foreign exchange student elected as prom queen is a bit impossible. I already missed the chance to submit my name at the start of the year, after all. Every time I've tried to become prom queen, I've been foiled by three people: Smothers, Claudia and Nancy.\"\n\n \"The three people you set up to be kidnappers,\" you say.\n\n \"Exactly,\" $!{J_nickname} says. \"If I can get all [i]three[/i] of them arrested as kidnappers in the same time loop, they'll be out of my way for good, and I can finally become prom queen!\"\n\n \"What about Elena?\" you ask. \"She's also a prom queen candidate.\"\n\n \"That's where you come in,\"$!{J_nickname} says. \"You're going to convince her to turn down the nomination and offer it to me, instead. We'll say it's compensation for all the trauma I endured by being kidnapped by a maniac.\"\n\n \"What makes you think I'll hijack the nomination to make sure you win?\"\n\n \"Because we're [i]friends[/i],\" $!{J_nickname} says, smiling at you.\n\n \"Friends don't kidnap each other.\"\n\n \"Friends don't [i]normally[/i] kidnap each other,\" $!{J_nickname} corrects you. \"I have a pretty good idea of how your mind works, after all this time. I'm fairly confident you'll do it. And if not? I'll just try again, with Jessica or Bruce or whoever. Probably Elena.\"\n\n \"I can't believe you're so devious and manipulative,\" you say.\n\n \"If [i]you[/i] were forced to relive high school for years, you'd understand,\" $!{J_nickname} says. \"So, do I have your vote?\"\n\n \"No,\" you say. \"I think being a kidnapper is disqualifying for being the prom queen.\"\n\n \"Suit yourself,\" $!{J_nickname} shrugs. \"I'll figure it out eventually. Just wait and see.\"\n *page_break\n [i]Twenty loops later[/i]\n\n Smothers gives everyone a stern look, as if daring them to interrupt. When nobody says anything else, he lets out a sigh of relief. \"Good, so we have all three candidates for prom queen. Write your choice down on these pieces of paper, and I'll collect them shortly.\"\n\n Smothers hands out a scrap of paper to everyone in the room. It's a blank piece of paper with a line on it, nothing else. You fish a pen out of your backpack and write down $!{J_first} Takeuchi, without thinking.\n\n You blink at the paper. Why did you just write that? Who is $!{J_first} Takeuchi? You've never heard of her before!\n\n Your confusion only increases, when $!{J_first} wins the vote, unanimously. What is going on?\n\n [b]The End[/b]\n *page_break\n That's the ending, but there is a slightly different ending, where $!{J_nickname} is male, and you are female. Would you like the opportunity to see that ending?\n\n *choice\n  #Yes\n   *set gender \"female\"\n   *goto puzzle_solve\n  #No\n   In that case, thanks for playing!\n   *goto actual_end\n*else\n \"Exactly, \"$!{J_nickname} says. \"At this point, I've been to prom with every girl in school, including you. But nothing's changed. I'm still here, trapped in the same time loop. And that's when it finally hit me: what if I became prom king?\"\n\n \"You're crazy,\" you say. \"Why would you becoming prom king break the time loop?\"\n\n \"Why not?\" $!{J_nickname} asks. \"I've tried everything else! But as it turns out, becoming prom king is a bit more complicated than you'd expect. I figured dating Elena would be enough, but no! Her prom king ended up being Bruce, of all people. [b]Bruce[/b]!\n\n \"So I tried again. And again. Do you knew the crazy part? [i]You[/i] are the decider, in every time loop.\" $!{J_nickname} shakes ${J_his} head. \"Don't ask me why, because I don't know. But every time I try to manipulate the prom queen vote, the person [i]you[/i] vote for is the winner.\"\n\n \"You mean Elena doesn't always win?\" you ask.\n\n \"Not at all,\" $!{J_nickname} says. \"I spent about ten cycles as Claudia's boyfriend, with her as the prom queen. I even figured out how to get Nancy and Steve to break up--so I could date her--without him sabotaging the vote against her. But it had no effect. No matter [i]what[/i] I did, I never became prom king. Three people always, always stand in my way: Smothers, Claudia and Nancy.\"\n\n \"The three people you set up to be kidnappers,\" you say.\n\n \"Exactly,\" $!{J_nickname} says. \"With them out of the way, I can finally become prom king!\"\n\n \"That doesn't make sense,\" you say. \"You got rid of them in three separate time loops? Unless there's a way to make the time loops merge, it won't work.\"\n\n \"[i]You're[/i] the way to make the time loops merge,\" $!{J_nickname} says. \"The acrostic puzzle you just solved proves it. Your notebook contains the answer to the puzzles you solved, right?\"\n\n \"Yeah...\" you say.\n\n \"Did you ever wonder how you have the solutions to twenty-one puzzles, when you only solve seven puzzles per time loop?\" $!{J_nickname} says. \"You've got the answers from when Smothers was the kidnapper, when Claudia was the kidnapper, and when Nancy was the kidnapper.\"\n\n \"I...I don't know how that happened,\" you say, honestly. You don't remember writing all of them. It's like the clues magically appeared in there!\n\n \"I don't know if it's you or your notebook that breaks the time loop,\" $!{J_nickname} says. \"It doesn't matter, I suppose. What you're going to do now is write a message to your past self. One that you'll instantly believe, when you read it on the first week of January. And here's what I want it to say...\"\n *page_break\n [i]January 10[/i]\n\n \"Our first prom committee of the year,\" Vice-Principal Smothers says. \"I hope you're ready, because from here on out, the work begins in earnest. We need everyone to--Mr. Wilkins, pay attention, or it's detention!\"\n\n \"Aw, man,\" Bruce says, putting away the magazine he was trying to read secretly.\n\n \"Miss Moore, you have the floor,\" Smothers says.\n\n \"Thank you, Vice-Principal Smothers,\" Jessica says. \"As always, we're going to start by taking roll call. Then we can discuss the updated agenda I made for the rest of the year, which I think will--\"\n\n \"I have an announcement!\" you shout, standing up suddenly. \"Sorry to interrupt, Jessica, but it's important that we do this before the meeting officially starts.\"\n\n \"What is it?\" Jessica asks.\n\n \"Yeah, what's up?\" Steve asks.\n\n \"I'm quitting the prom committee!\" you say.\n\n A ripple of surprise goes across the room. \"Why?\" Mallory asks.\n\n \"Because I'm running for prom queen!\" you say.\n\n This time, there are surprised gasps. \"That's impossible!\" Smothers says. \"A member of the prom committee cannot be considered for prom queen! It's in the rules!\"\n\n \"If you double-check the rules, you'll find that they say someone cannot be prom queen or king and a member of prom committee [i]in the same year[/i],\" you say. \"That's why I'm quitting [i]now[/i], before the first prom committee meeting of the year!\"\n\n \"But...but the nominations were held long ago!\" Smothers says. \"You weren't nominated!\"\n\n \"My nomination was made, but withheld, because I was on the committee at the time,\" you say. That's technically a lie, but you're willing to bet you can get away with it. \"Now that's no longer an issue, I expect it to be reinstated.\"\n\n \"But...but...\" Smothers sputters.\n\n \"Sounds legit to me,\" Bruce says.\n\n \"We'll add looking at your application to the agenda,\" Jessica says hesitantly.\n\n \"Great,\" you say, pulling out a piece of paper. \"I know you probably don't have all the applications anymore, so here's a second copy of mine. And...I guess that's it. Bye, everyone! It was fun working on the prom with you.\"\n\n You leave the room, smiling. Waiting for you, outside the door, is $!{J_nickname}.\n\n \"Everything go okay?\" he asks.\n\n \"No problems at all,\" you smile. \"Soon, you and I will be prom king and queen. And if not? Well, at least I have the lottery numbers for prom day.\"\n\n \"I don't remember you putting any numbers in the letter you wrote yourself,\" $!{J_nickname} says.\n\n You wink at him. \"You're not the only one who's good at hiding puzzles in plain sight,\" you say.\n\n [b]The End[/b]\n *page_break\n You just finished reading the true ending of the game. There is a different ending, where $!{J_nickname} is female, and you are male. Would you like the opportunity to see that ending?\n\n *choice\n  #Yes\n   *set gender \"female\"\n   *goto puzzle_solve\n  #No\n   In that case, thanks for playing!\n   *goto actual_end\n\n*label actual_end\n\n*page_break End\nWe hope you've enjoyed playing [i]Kidnapped Prom Queen.[/i]\n\n*feedback\n\nHosted Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n\n", "route_1_chapter_10": "[b]Chapter 10[/b]\n\n*if chapter_7_where_to_go = \"escape\"\n *goto escape_1\n*else\n *goto escape_2\n\n*label escape_1\n\"After her!\" Steve cries.\n\n\"There's no point,\" Alejandro says. \"Weren't you paying attention? All the doors are locked for a half-hour, after she sets the alarm.\"\n\n\"And what happens then?\" Jessica asks.\n\n\"Wait and find out,\" Alejandro taunts.\n\nSteve presses harder on Alejandro, and he cries out in pain. \"Okay, okay! Stop!\" he says. \"I get it! You win, I lose! Just...let me go, already! I promise I won't try to escape!\"\n\nSteve steps away from Alejandro, and Alejandro sits up. He remains sitting on the floor, warily eyeing Nancy, who is now holding the knife.\n\n\"I don't know for sure,\" Alejandro says. \"Claudia didn't tell me [i]everything[/i]. But I'm guessing that once the half-hour is over, the game continues like normal. You solve the puzzles and go through all the rooms, until you get the code for the exit. It'll be like you were never interrupted.\"\n\n\"You're going to tell us all the puzzle solutions,\" Bruce says dangerously. \"[i]Now[/i].\"\n\n\"I don't know them,\" Alejandro says. \"I mostly helped with cleaning out the rooms, planting the clues and attaching some of the touchscreens. Your friend Mallory here helped out with the actual kidnapping. Why don't you ask [i]her[/i] for help?\"\n\n\"Nice try,\" Elena says. \"We're not going to turn on Mallory. When the moment came, she helped us stop Claudia. You, on the other hand, were waving a knife around like a maniac.\"\n\nAlejandro laughs. \"Stop Claudia?\" he asks. \"In case you haven't noticed, she's not here! By the time you get out, she'll be gone. [i]Long[/i] gone. That's kind of the point of giving herself a half-hour to escape.\"\n\n\"You sound pretty confident for someone who got left behind,\" you say.\n\n\"I knew the risks when she forced me into this,\" Alejandro says. \"If I have to go to jail, then so be it.\"\n*page_break\nAlejandro refuses to say anything more, beyond laughing over the fact that no one in the group knows which room goes with the TV remote or the water bottle.\n\nOnce the half-hour is up, you leave Alejandro in the gym and purposely try to open the wrong door. That way, all the doors in the building will remain locked for another half-hour, leaving Alejandro trapped. You take some delight in using the kidnapper's trap against him, while everyone leaves through the window of the principal's office.\n\nYou're worried a half-hour might not be enough time, but it is. When the police arrive, they catch Alejandro red-handed, so to speak. He surrenders peacefully, and even helps them free Vice-Principal Smothers. Mr. Smothers isn't dead, after all; the electric shock merely knocked him unconscious. He spent the rest of the night sleeping peacefully, blissfully unaware of what was going on, outside his door.\n\n\"He didn't wake up when we were fighting in the gym?\" Bruce asks. \"All that shouting, and he was fast asleep?\"\n\n\"Smothers must be a sound sleeper,\" Elena says.\n\nAlejandro also helps the police locate Mallory's three-year-old sister, Valerie, who is in the basement of the Barrett house. As a reward for his \"good behavior\", Alejandro is not charged with any crimes. Instead, he is immediately sent back to his home country without a formal punishment.\n\nNancy is furious. \"He held a knife to my throat!\" she cries. \"He could have [i]killed[/i] me!\"\n\n\"Hey, I wasn't the one who made the decision!\" you protest. You take another sip of your soda. \"I'm just as mad about it as you are!\"\n\n\"I cannot [i]believe[/i] that--no, no, I'm not even going to think about it,\" Nancy says. \"This isn't the time to think about the kidnapping. This is the time to [i]party[/i]!\"\n\nYes, you finally made it to one of Nancy's wild parties! You and everyone else on the prom committee are the guests of honor. Funny how being kidnapped improved your social life.\n\n*goto party\n\n\n\n*label escape_2\nEveryone rushes to the exit, but no one is fast enough. The door shuts, and there is a clanking of chains. You pull on the door that the culprits just used, but it is firmly shut.\n\nBruce starts cursing. \"What [i]now?[/i]\" he asks. \"That's the only exit!\"\n\n*if chapter_7_where_to_go = \"principal's office\"\n \"Not the [i]only[/i] one,\" Elena says. \"Don't you remember? There's a huge window in the principal's office.\"\n\n \"And we propped open the door!\" Bruce says, eyes lighting up. \"Elena, you're a genius!\"\n\n \"There's one problem,\" Jessica says. \"To get to the principal's office, we have to go through the hallway, and the door to the hallway [i]isn't[/i] propped open.\"\n\n \"So we're stuck here until the touchscreens reset?\" you ask. \"How much longer is that?\"\n\n \"The touchscreen said it'll be thirty minutes, before we can try opening another door,\" Mallory says. \"But it's been a while since then. Maybe it won't be much longer.\"\n\n *goto escape_2_1\n*else\n \"Not the [i]only[/i] one,\" Jessica says. \"We were smart enough to prop open the door to the principal's office. All we have to do is climb out through the window and go home.\"\n\n \"Excellent!\" Steve says. \"Let's go!\"\n\n \"And how are we going to [i]get[/i] to the principal's office, genius?\" Bruce asks. \"The door to the hallway is closed!\"\n\n \"Not a big deal,\" Elena says. \"It's only thirty minutes before we can try opening another door. In fact, [i]less[/i] than thirty minutes now. We can easily wait it out.\"\n\n *goto escape_2_1\n\n*label escape_2_1\nThe group is forced to wait another twenty minutes or so, before the touchscreen to the hallway works again. Everyone goes through it and out the principal's window.\n\nIt's liberating to finally be outside of the building, but you're still at school, in the middle of the night, with no obvious way of leaving besides for walking. \"What now?\" you ask.\n\n\"I've got a backup phone in my locker, for emergencies,\" Mallory says. \"Let's go get it and call the police.\"\n*page_break\nThe police are on high alert, because of the phone call you and Elena made about Nancy, at the start of the evening. They quickly arrive, but your hopes of getting back home soon are dashed. The seven of you spend the next several hours at the police station, which is ironically longer than you spent kidnapped.\n\nThe police insist on questioning everyone separately. While Bruce is being questioned, two officers come in with Vice-Principal Smothers and a curly-haired three-year-old.\n\n\"Valerie!\" Mallory cries. The little girl, who must be Mallory's little sister, gives a happy cry and toddles over to her for a hug.\n\n\"Mr. Smothers!\" Steve cries. \"You're not dead!\"\n\n\"I am aware of that information, thank you,\" Smothers says.\n\n\"But we heard you get murdered!\" Jessica says.\n\n\"No, you heard me get knocked out,\" Smothers says. \"I spent the next few hours, resting comfortably in the storage closet. Judging from what I've been hearing, that is perhaps for the best. I understand I missed a [i]lot[/i] of excitement.\"\n\n\"You can say that again,\" you mutter.\n\n\"What about Valerie?\" Mallory asks. \"Why do you have her?\"\n\n\"This little girl was in the storage closet with me, when I woke up,\" Smothers says. \"She was the one who woke me up, in fact. We were sleeping side by side on the gym shorts, when she kicked me in the face.\"\n\n\"She does that,\" Mallory says.\n\n\"You were sleeping on a pile of gym shorts?\" Steve asks. \"Yuck!\"\n\nPerhaps it's just your imagination, but the police seem more willing to believe your wild story, now that they've searched the school and found Mr. Smothers held captive inside.\n\nUnfortunately, Claudia and Alejandro had enough time to make their getaway. Alejandro is never seen again; the police suspect he fled the country. Claudia isn't caught until ten years later, when she visits the DMV to renew her driver's license.\n\n\"If you ask me, they're [i]lucky[/i] they haven't been found,\" Nancy says. \"If I ever get my hands on Claudia or Alejandro, oh...they're going to [i]wish[/i] they had been arrested!\"\n\n\"Please tell me you're not considering becoming a vigilante superhero,\" you say.\n\n\"The whole thing makes me so angry!\" Nancy says. \"I just want to--no, no, I'm not even going to think about it. Tonight isn't about what happened last week. Tonight is the night to [i]party[/i]!\"\n\nYes, you finally made it to one of Nancy's wild parties! You and everyone else on the prom committee are the guests of honor. Funny how being kidnapped improved your social life.\n\n*goto party\n\n*label party\nWho do you want to talk to?\n\n*choice\n *hide_reuse #Bruce\n  *goto Bruce\n *hide_reuse #Elena\n  *goto Elena\n *hide_reuse #Jessica\n  *goto Jessica\n *hide_reuse #Mallory\n  *goto Mallory\n *hide_reuse #Steve \n  *goto Steve\n *hide_reuse #No one\n  *goto end\n\n\n*label main_menu\nWho else do you want to talk to?\n\n*choice\n *hide_reuse #Bruce\n  *goto Bruce\n *hide_reuse #Elena\n  *goto Elena\n *hide_reuse #Jessica\n  *goto Jessica\n *hide_reuse #Mallory\n  *goto Mallory\n *hide_reuse #Steve \n  *goto Steve\n *hide_reuse #No one else\n  *goto end\n\n\n*label Bruce\nBruce is wearing a leather jacket and tight jeans. His bottom lip is extended in a half-pout, as he shakes his head in time with the music.\n\n\"You look like you're audition for the role of a high school bad boy,\" you note.\n\n\"Oh, yeah?\" Bruce asks. He takes a comb from his pocket and runs it through his hair. \"Maybe I like that way. I'm a pretty mysterious guy, you know.\"\n\n\"Nah, after spending all that time with you, I've got you pegged,\" you say.\n\n\"Oh?\" Bruce asks, raising an eyebrow. \"Do tell.\"\n\n\"You just like picking fights with other people,\" you say. \"Especially Vice-Principal Smothers. You think it's fun.\"\n\n\"Shows how much [i]you[/i] know,\" Bruce says. \"I rarely disagree with other people.\"\n\n\"You're disagreeing with me right now,\" you say.\n\n\"I [i]rarely[/i] disagree with other people, unless they're stupid,\" Bruce says. \"No offense. I'm too laid back to pick fights.\"\n\n\"You were the [i]least[/i] laid back person last week,\" you say.\n\n\"Now, if you [i]excuse me[/i], I'm busy,\" Bruce says. He stands in place, smirking at himself.\n\n\"What are you busy doing?\" you ask.\n\n\"Stuff,\" Bruce says. \"Go away.\"\n\nYou shrug, wondering if you'll ever understand Bruce.\n\n*goto main_menu\n\n*label Elena\n\"Elena?\" you ask. \"What are [i]you[/i] doing here?\"\n\n\"Nice to see you, too,\" Elena quips.\n\n\"I thought this party was just for the prom committee,\" you say.\n\n\"Uh, no, this is Nancy's big party to celebrate being made prom queen,\" Elena says. \"Haven't you noticed half the cheerleading squad is here?\"\n\nNow that she mentions it, there are about twenty people in the house right now. There are definitely plenty of people here who aren't on the prom committee.\n\n\"Oh,\" you say. \"Great. I'm at a party where I don't know anyone.\"\n\n\"You know me, and I'm clearly the important one,\" Elena says. \"Why don't you try talking to Alysia Jacks at the food table? Or Roy Porter there, by the window? He seems lonely.\"\n\n\"Are you trying to get rid of me?\" you ask.\n\n\"No, I just don't want this to be another--oh, crap, Bruce is here,\" Elena says. She turns around at light speed, avoiding Bruce's line of sight. \"Change of plans. Follow me all night and make sure Bruce never talks to me.\"\n\n\"I'm guessing something happened between the two of you,\" you say.\n\n\"He asked me out,\" Elena says.\n\n\"[i]What[/i]?\" you ask.\n\n\"And that's why I didn't tell you!\" Elena says. \"I knew you'd react like that. I turned him down, and it got really awkward, so now I'm avoiding him, okay?\"\n\n\"Okay,\" you say, secretly feeling a little pleased. \"I'll come and save you if Bruce tries talking to you, but you owe me one.\"\n\n*goto main_menu\n\n\n*label Jessica\n\"What's wrong, Jessica?\" you ask.\n\n\"What do you think?\" she asks. \"The school wants to cancel prom this year.\"\n\n\"[i]What[/i]?\" you ask. \"After all we've been through?\"\n\n\"More like [i]because[/i] of all we've been through,\" Jessica says. \"The school's worried about any more incidents.\"\n\n\"How many crazed kidnappers do they think there are at Franklin High?\" you ask.\n\n\"I don't know,\" Jessica says. \"It just seems silly to have a party for the prom committee, when there might not even [i]be[/i] a prom.\"\n\n\"Is there anything we can do?\" you ask. \"It's a total waste for us to plan prom for months, only for it to get cancelled.\"\n\n\"Tell me about it,\" Jessica says. \"They could at least wait for us to finish college applications before cancelling prom. There's going to be a huge gap in my extracurricular activities section, if I can't put down 'Prom Committee Leader'.\"\n\nJessica sighs. \"Vice-Principal Smothers will update us on the situation at next week's meeting,\" she says. \"I kind of wish he hadn't told me, because now I'm in this awful state of suspense.\"\n\n\"How [i]is[/i] Smothers doing?\" you ask, in a not-so-subtle attempt to change the topic away from \"all of you wasted your time for the entire school year\".\n\n\"He's upset that he wasn't able to stop the kidnapping,\" Jessica says. \"It looks really bad for him that he was there the entire time, and spent most of it asleep. I hope he's not fired over this.\"\n\n\"Me too,\" you say. \"Smothers may not be the best vice-principal ever, but he certainly doesn't deserve to get fired for failing to solve a riddle.\"\n\nJessica sighs again. \"Sorry, I'm being a downer. This is supposed to be a party, so we can [i]forget[/i] what happened,\" she says.\n\n\"It's fine,\" you say. \"We'll deal with it at the meeting, okay?\"\n\nJessica nods at you.\n\n*goto main_menu\n\n\n*label Mallory\nMallory is in the corner of the room, playing with her phone, not joining the party in the slightest.\n\n\"You okay?\" you ask.\n\n*if chapter_7_where_to_go = \"cheeseburger\"\n \"Huh?\" Mallory asks. She puts her phone away in her pocket. \"Oh, yeah. I'm fine. I just feel kind of awkward.\"\n\n \"Because of the party?\" you ask.\n\n \"Because of the crowd,\" Mallory says. \"Honestly, I can't believe you're still talking to me. Don't you hate me forever for what I did?\"\n\n \"You didn't do anything wrong,\" you say.\n\n \"I helped the kidnappers!\" Mallory says. \"I knew it was Claudia all along, and I said nothing!\"\n\n \"You were being blackmailed,\" you say. \"It wasn't your fault.\"\n\n \"But I could have fought back,\" Mallory says. \"I could have stood up for myself and refused to go along with it. Instead, I helped fight you and Bruce in the gym! Doesn't that [i]prove[/i] I'm a villain?\"\n\n \"No, because you were trying to save your sister,\" you say. \"I'm not going to hold what happened against you, okay? So stop beating yourself up over the mistakes you made. I'm sure all of us would act differently, if we could go back and relive that night.\"\n\n Mallory smiles slightly. \"Thanks for trying to cheer me up,\" she says.\n\n She goes back to playing with her phone, while you return to the party.\n\n *goto main_menu\n*else\n \"Huh?\" Mallory asks. She puts her phone away in her pocket. \"Oh, yeah. I'm fine. I just feel kind of awkward.\"\n\n \"Because of the party?\" you ask.\n\n \"Because of the crowd,\" Mallory says. \"Honestly, I can't believe you're still talking to me. Don't you hate me forever for what I did?\"\n\n \"You didn't do anything wrong,\" you say.\n\n \"I helped the kidnappers!\" Mallory says. \"I knew it was Claudia all along, and I said nothing!\"\n\n \"You were being blackmailed,\" you say. \"It wasn't your fault.\"\n\n \"But I could have fought back,\" Mallory says. \"I could have stood up for myself and refused to go along with it.\"\n\n \"But you [i]did[/i] fight back against Claudia,\" you say. \"In the end, you sided with us instead of her.\"\n\n \"Yeah, and she took me out of the fight without even trying,\" Mallory mutters. \"I wasn't any help at all.\"\n\n \"Look, nobody's mad at you,\" you say. \"Everyone understands you were trying to protect your little sister, and there's nothing wrong with that. So stop hiding in the corner and join the party. Okay?\"\n\n Mallory smiles slightly. \"Thanks for trying to cheer me up,\" she says. \"But I'm not ready to celebrate yet. Not while Claudia is still out there.\"\n\n She goes back to playing with her phone, while you return to the party.\n\n *goto main_menu\n\n\n*label Steve\nSteve and Nancy are the two people at the party who seem to be having the most fun. They're laughing with a group of friends.\n\n\"You look like you're doing better!\" you say to Nancy.\n\n\"You mean, now that I no longer have a knife to my throat?\" Nancy asks. \"Yeah, I'm doing great! But I...well, I'm surprised to hear you say that.\"\n\n\"Huh?\" you ask.\n\n\"I called $!{first_name} for help, when I heard an intruder in the house,\" Nancy says, explaining to the group. \"I mean, I called Steve first, but he didn't answer his phone.\"\n\n\"Mainly because I was unconscious at the time,\" Steve says. \n\n\"So what'd you do?\" a girl asks.\n\n\"Nancy was attacked, while on the phone with me and Elena,\" you say. \"Honestly? The first thing I did was think [i]this can't be happening[/i]. Then I called the police.\"\n\n\"And thanks a lot for that,\" Nancy says. \"You're a good friend.\"\n\n\"To $!{first_name}!\" Steve says, raising his glass towards you.\n\n\"To $!{first_name}!\" everyone else says, raising their respective beverages.\n\n\"And to not being kidnapped again!\" Nancy says.\n\n\"Yes!\" Steve says.\n\nYou can definitely toast to that.\n\n*goto main_menu\n\n\n\n*label end\n*set evidence_1_found false\n*set evidence_1 \"nothing\"\n*set evidence_2_found false\n*set evidence_2 \"nothing\"\n*set evidence_3_found false\n*set evidence_3 \"nothing\"\n*set route_youre_on 0\n*set chapter_4_who_is_first \"none\"\n*set chapter_5_what_is_first \"nothing\"\n*set chapter_7_item_looked_at_first \"none\"\n*set route_3_mallory_unconscious false\n*set chapter_5_was_with_bruce_when_Mallory_was_attacked \"false\"\n*set chapter_7_where_to_go \"nowhere\"\n*set chapter_2_you_tell_elena \"false\"\n*set storeroom_back \"none\"\n*set storeroom_door \"none\"\n*set storeroom_side \"none\"\n*set chapter_5_knocked_out false\n*set route_1_done true\n\n*if (gender=\"male\")\n You head towards the food table, when an extremely perky girl steps in front of you. \"Hi!\" she says, smiling broadly.\n\n \"Hello?\" you say.\n\n \"I'm Carolyn!\" she says. \"Nancy promised to introduce us?\"\n\n \"Oh! Oh, yeah!\" you say. You vaguely remember Nancy saying that, when she tried to convince you to vote for her as prom queen. To be honest, you haven't thought about it since that day.\n\n \"Is it true you were kidnapped?\" Carolyn asks. \"That's [i]sooo[/i] interesting! You [i]have[/i] to tell me all about it!\"\n\n \"Well, it was about a week ago, and--\"\n\n \"Not [i]here[/i],\" Carolyn says. \"It's too loud! Let's go some place more quiet! Like one of the rooms upstairs?\"\n\n \"I'm pretty sure we're not supposed to--\" you begin to say.\n\n Elena pops out of nowhere, as if by magic. \"$!{first_name}, there you are!\" she says, grabbing your arm possessively. \"I've been waiting forever for you to get me a drink!\"\n\n \"Sorry, I got distracted,\" you say. \"Carolyn, this is Elena. She's my best friend.\"\n\n \"We've met,\" Carolyn says. Suddenly, she doesn't seem so bubbly. \"I just remembered, I have to go to the bathroom. Later!\"\n\n She gives a half-wave, and leaves as if she's trying to avoid catching a disease.\n\n *page_break\n You glance at Elena. \"What was [i]that[/i] about?\"\n\n \"Trust me, you don't want to date Carolyn,\" Elena says. \"She has the imagination of a grapefruit. You'd be better off going to prom with someone awesome, like me.\"\n\n \"Are you trying to ask me to prom, without doing it directly?\" you ask.\n\n \"Maaaybe,\" Elena says, drawing the word out. \"I've heard that being kidnapped can really bring two people together, you know? It's a shared experience we have that no one else but us can understand.\"\n\n \"Really? Because I heard the opposite,\" you say. \"I heard that it's a terrible idea to start a new relationship after a traumatic experience.\"\n\n Elena frowns at you. \"Are you trying to say you don't like me, in that way?\" she asks.\n\n \"You're my best friend,\" you say. \"And I'll be honest, I got a little jealous when I saw Bruce flirting with you, earlier. But...this is not the right time.\"\n\n \"But I don't want to wait,\" Elena says. \"I know it's a cliche, but almost dying made me realize how short life is. I don't want to waste any more time, pretending I'm not into you.\"\n\n \"I don't want to hurt you,\" you say. \"But can we please just wait a month, before making any big decisions like this? At least until the nightmares stop?\"\n\n \"You have nightmares, too, huh?\" Elena asks.\n\n \"Yeah,\" you say.\n\n The two of you fall silent.\n\n \"Okay,\" Elena says at last. \"I'll give you a month, but then, you're [i]mine[/i]!\" she says teasingly.\n\n \"I can't wait,\" you respond, smiling at her. She really is your best friend.\n\n *page_break\n *goto end_1\n*else\n You head towards the television, where a group of people are watching a sports game. A guy with extremely large hair taps you on the shoulder. \"Hey...\" he says.\n\n You look confused. \"Uh, do I know you?\"\n\n \"I'm Tommy,\" he says. \"Tommy Oliver. From the football team?\"\n\n \"Oh,\" you say. \"Sorry, I haven't been to many of the games this year.\"\n\n \"You and everyone else,\" Tommy says. \"Anyway, Nancy said you wanted to talk to me about something?\"\n\n \"She did?\" you ask. \"I don't have any idea what--\"\n\n Suddenly, you remember a conversation from last week. You were in the hallway, talking to Nancy.\n\n [i]\"Elena didn't tell you?\" Nancy said. \"Tommy Oliver likes you.\"\"[/i]\n\n [i]\"Who?\" you asked.\"[/i]\n\n [i]\"He's one of the football players,\" Nancy said. \"I guess you don't know him. He's the one with the giant hair. If you want, I can introduce you to him. I'm having a party this weekend.\"[/i]\n\n \"You're the giant hair guy!\" you say suddenly.\n\n Tommy looks taken aback. \"Giant hair guy?\" he asks. \"Is [i]that[/i] what people call me?\"\n\n \"Not [i]everyone[/i],\" you say. \"Just some of the--you know what, it doesn't matter. Hi! It's nice to meet you. I'm $!{first_name}.\"\n\n \"Nice to meet you, too,\" he says coldly. \"If you don't mind, I have to leave to go get a haircut.\"\n\n [i]Ouch,[/i] you think, as he leaves. You've either got to work more on your flirting or your memory. You're not sure which.\n *page_break\n *goto end_1\n\n\n\n\n*label end_1\n*page_break\n*achieve routeone\n*if (route_3_done = \"false\") and (route_2_done = \"false\")\n *set end_clue_1 \"Anagram\"\n A few days after the party, you find a strange piece of paper in your locker. On it is written a single word: \"Anagram\".\n\n *goto end_clue_set\n*elseif ((route_3_done = \"true\") and (route_2_done = \"false\")) or ((route_3_done = \"false\") and (route_2_done = \"true\"))\n A few days after the party, you find a strange piece of paper in your locker. On it is written a single word: \"Acrostic\". That makes two pieces of paper you've received. \"Anagram\" and \"Acrostic\". What could it mean?\n\n *set end_clue_2 \"Acrostic\"\n *goto end_clue_set\n\n*elseif (route_3_done = \"true\") and (route_2_done = \"true\")\n *set end_clue_3 \"Come see me\"\n *goto_scene final\n*else\n *bug\n\n\n*label end_clue_set\n---\n\nYou've reached the end of the story, but it is not the end of the game! You can go back to the beginning and choose a different prom queen. This results in a whole new storyline with different puzzles and a different culprit. If you play through all the storylines, you get a bonus ending!\n\nBut if this is where you're going to stop, then we'd like to thank you for playing.\n\nWhat do you want to do?\n\n*choice\n #Go back to the beginning\n  *goto_scene chapter_1\n #Finish the game\n  *goto_scene final actual_end\n\n", "route_1_chapter_2": "*if (route_youre_on = \"1\")\n *goto stay_right_here\n*if (route_youre_on = \"2\")\n *goto_scene route_2_chapter_2\n*if (route_youre_on = \"3\")\n *goto_scene route_3_chapter_2\n\n*label stay_right_here\n[b]Chapter 2[/b]\n\nAs you write down Nancy's name, your mind goes back to earlier that day, when she made a point of stopping by your locker. \"Hi, $!{first_name}!\" she said enthusiastically.\n\n\"Um...hi, Nancy,\" you said.\n\n\"Are you all ready for the prom committee meeting today?\" she asked. \"I heard you missed the last one, and I just wanted to make sure you didn't miss this one, too! It would be a [i]big[/i] shame if you missed two meetings in a row! You're not sick, are you?\"\n\nAt the time, you didn't know about the vote, so your reaction was more confusion than suspicion. Why was a cheerleader asking you about your health? \"No, I'm not sick,\" you say.\n\n\"Great!\" Nancy said. She smiled, tilted her head and gave you a double thumbs-up. \"Also, I've heard you've done a really great job with the decorations, so keep up the good work! Okay? Bye!\"\n\nShe made to leave, when you stopped her. \"Whoa, hold up!\" you said. \"What's going on?\"\n\n*if (gender=\"male\")\n \"Okay, you caught me,\" Nancy said. \"My friend Carolyn wanted to talk to you, only she's too shy to do it herself, so she asked [i]me[/i] to do it for her.\" Nancy flung her hair over her shoulder in a distracting fashion. \"Are you single?\"\n\n \"Wha-what?\" you gasped.\n\n \"Are you dating anyone right now?\" Nancy asked. \"Carolyn wants to know.\"\n\n \"No!\" you said quickly.\n\n \"Good,\" Nancy said. \"I'll pass the information on, then. You know, if you want, I can introduce you to her. I'm having a party this weekend.\"\n\n \"Sure,\" you said.\n\n \"Great!\" Nancy said, smiling again. \"Bye!\"\n\n *goto Nancy_over\n*else\n \"Nothing,\" Nancy said. \"I just thought...Elena didn't tell you?\"\n\n \"Tell me what?\" you asked.\n\n \"Tommy Oliver likes you,\" Nancy said.\n\n \"Who?\" you asked.\n\n \"He's one of the football players,\" Nancy said. \"I guess you don't know him. He's the one with the giant hair. If you want, I can introduce you to him. I'm having a party this weekend.\"\n\n \"Um...maybe,\" you said. You wanted to check him out online, before officially agreeing to anything.\n\n \"Cool,\" Nancy said, smiling again. \"Bye!\"\n\n *goto Nancy_over\n\n*label Nancy_over\nIn retrospect, Nancy must have known the prom queen vote was taking place that day, and she was probably trying to butter you up, so you'd vote for her. If that was her plan, it worked. You write her name down on your ballot. [i]Sorry, Elena.[/i]\n*page_break\n\"Question!\" Bruce says.\n\n\"Yes, Mr. Wilkins?\" Vice-Principal Smothers asks.\n\n\"What's the criteria for prom queen, here?\" Bruce asks. \"Am I supposed to pick the hottest chick, or the one most likely to go out with me, or what?\"\n\n\"Absolutely none of them would date a slimeball like you,\" Jessica says.\n\nBruce grinned. \"You never know. The winner might be [i]super grateful[/i] to me for picking them, and--\"\n\n\"That does it,\" Vice-Principal Smothers says. \"You have just forfeited your right to vote in this election.\"\n\n\"Aw, come on!\" Bruce says.\n\n\"Any more backtalk, and you'll get detention,\" Smothers says. \"Now, then, has everyone voted?\"\n\nThere's a general murmur of assent, as Smothers collects all the votes. He doesn't take Bruce's vote, but considering that Bruce voted for \"your mom\", it's unlikely that his vote would have made much of a difference.\n\nSmothers shuffles the votes. \"Okay, we have a vote for Nancy, a vote for Claudia, a vote for--\"\n\n\"Whoa, you can't do it like that!\" Steve interrupts. \"You have to read them one at a time, slowly!\"\n\n\"This isn't a TV show, Mr. Stevens,\" Smothers says. \"And there's no one here, but us. What would be the point?\"\n\n\"You could at least [i]try[/i] to be dramatic,\" Steve says.\n\nWhat do you think Smothers should do?\n\n*choice\n #Be as dramatic as possible\n  *goto 1_1\n #Skip the drama and declare the winner\n  *goto 1_2\n\n*label 1_2\n\"Just tell us who won,\" you say.\n\n\"In that case, Nancy Spier wins with three votes,\" Smothers says. He holds up the votes so people can see he's not lying. \"Claudia and Elena both got one vote apiece.\"\n\n\"Yes! Yes!\" Steve cries. \"My girlfriend is prom queen! That makes me prom king!\"\n\n*goto 1_3\n\n*label 1_1\nYou try to convince Smothers to read the votes as dramatically as possible, but he shoots down your request. So, as he reads the votes aloud, you decide to pretend he's announcing them for a reality TV show.\n\n\"Nancy and Claudia are both tied with one vote apiece. The next vote is for...\" Smothers pauses, as the music gets loud. \"Elena.\"\n\nHe holds up Elena's vote. \"This means we have one vote for all three candidates, with only two votes left. This next vote is [i]crucial[/i]. It could be the one that decides the entire election. And it's for...\"\n\nSmothers waves his fingers above the ballot before turning it over. \"Nancy,\" he says.\n\n\"Yes!\" Steve cries.\n\n\"But there is one vote left,\" Smothers says. \"If it's for Elena or Claudia, that means we have a tie, and the faculty will decide the tiebreaker. If not, it means Nancy wins, three to one to one. So...here it is. Your next prom queen will be...\"\n\nHe picks up the ballot, pretends to be shocked by its contents, then re prom night.\"\n\nRight, you remember now. Alejandro ends the school year early, due to a scheduling difference between the two countries. You're not sure why the school went through all the trouble of setting up an exchange student program, when the students don't stay for a full school year.\n\n*goto 1_9\n\n*label 1_8\n\"I think if you're on the prom committee, you can't be prom king,\" you say. \"That's only fair. You can't be on the committee and be the prom queen at the same time. The same thing should go for prom king.\"\n\n\"Yeah, having a different set of rules for the king and queen is totally sexist,\" Mallory says.\n\n*goto 1_9\n\n*label 1_9\n\"[b]As I was saying[/b],\" Smothers says loudly, \"all this information was contained in the email I sent. The vote for prom king doesn't happen for another month.\"\n\n\"Why the long wait?\" Alejandro asks.\n\n\"Because the prom queen is involved in the selection process,\" Smothers says. \"There is also the fact that Nancy has not formally accepted the prom queen position. She might turn us down.\"\n\n\"No way! She'll accept!\" Steve says.\n\n\"I hope so,\" Smothers says. \"One year, we had five separate people refuse to be prom queen. We ended up not having any prom queen at all.\"\n\n\"Weird,\" Mallory says.\n\n\"I hope that will not happen again,\" Smothers says. \"Now that Nancy is our official prom queen elect, our final order of business today is to determine who tells her the happy news.\"\n\n\"Me, duh,\" Steve says.\n\n\"As head of the prom committee, I believe [i]I[/i] should do it,\" Jessica says.\n\n\"Any other volunteers?\" Smothers asks. Nobody responds, and after a few seconds he says, \"Fine. The three choices are Steve, Jessica and myself. We'll vote with a show of hands.\"\n\nWho do you think should tell Nancy that she's the prom queen?\n\n*choice\n #Steve\n  *goto 2\n #Jessica\n  *goto 2\n #Vice-Principal Smothers\n  *goto 2\n\n*label 2\n*temp random_gender\n*rand random_gender 1 3\n*if random_gender = 1\n *set chapter_2_you_tell_elena \"Steve\"\n The vote is one-sided, as most of the people raise their hands when Steve's name is called.\n\n \"Very well, Mr. Stevens,\" Smothers says. \"You have the honor of informing Ms. Spier. Let me know her decision before the end of the day tomorrow.\"\n\n \"Will do,\" Steve says.\n\n \"Then we have nothing more to discuss,\" Vice-Principal Smothers says. \"I hereby bring this week's prom committee meeting to an end. Let's go home.\"\n\n *goto 2_1\n*if random_gender = 2\n *set chapter_2_you_tell_elena \"Jessica\"\n Jessica wins the vote, by one person. That makes two pretty close votes, in one day. Maybe there should be more people on the prom committee.\n\n \"Very well, Ms. Moore,\" Smothers says. \"You have the honor of informing Ms. Spier. Let me know her decision before the end of the day tomorrow.\"\n\n \"Understood,\" Jessica says.\n\n \"Then we have nothing more to discuss,\" Vice-Principal Smothers says. \"I hereby bring this week's prom committee meeting to an end. Let's go home.\"\n\n *goto 2_1\n*if random_gender = 3\n *set chapter_2_you_tell_elena \"Smothers\"\n Jessica gets two votes, while Steve gets two votes. Unless someone votes twice, that means Smothers will get two votes, and there will be a three-way tie. Smothers seems to realize this, as he does not even bother to hold a vote for himself.\n\n \"That's enough,\" he says. \"[i]I[/i] will tell Ms. Spier, and let you know the results next week. I hereby bring this week's prom committee meeting to an end. Let's go home.\"\n\n *goto 2_1\n\n*label 2_1\nEveryone starts packing up their things, including you. If you want, you probably have an opportunity to talk to someone, before leaving. Who will you talk to?\n\n*choice\n #Steve\n  *goto 2_2\n #Mallory\n  *goto 2_3\n #Vice-Principal Smothers\n  *goto 2_4\n #Jessica\n  *goto 2_5\n #Alejandro\n  *goto 2_6\n #Bruce\n  *goto 2_6_1\n #No one\n  You decide not to talk to anyone. As a general rule, you like to to 2_7\n\n\n*label 2_3\n\"So, what'd you think of the election?\" you ask Mallory.\n\n\"The cheerleader won,\" Mallory said. \"Totally predictable. I don't know why I even bothered voting, except--hey, wait a minute. I voted for Elena. Why didn't you?\"\n\n\"I...\" you say.\n\n\"I thought you were gonna vote for her, because you're best friends and all,\" Mallory said. \"That's why [i]I[/i] voted for her! I figured it'd be the best chance for us to have a prom queen who's not a total stereotype.\"\n\n\"Sorry,\" you say. \"You're not gonna tell her, are you?\"\n\n\"Well, I probably won't, because I don't really know her, but I'm still curious,\" Mallory says. \"Why'd you do it?\"\n\n\"I figured Nancy was going to win, so I voted for her,\" you say. \"It's nothing against Elena.\"\n\n\"Shoot,\" Mallory says. \"Sounds like we both knew Nancy would win, and we made totally opposite votes as a result.\"\n\n*if vague_love_interest=\"Mallory\"\n \"Let's work together next time, okay?\" you say, smiling at Mallory.\n\n She doesn't notice, as she is typing on her phone. \"Whatever,\" she mumbles.\n\n You sigh to yourself.\n *page_break\n *goto 2_7\n*else\n \"Funny how that happens,\" you agree.\n *page_break\n *goto 2_7\n\n\n*label 2_4\n*if chapter_2_you_tell_elena = \"Smothers\"\n \"Vice-Principal Smothers, when are you planning to ask Nancy about being prom queen?\" you ask.\n\n \"In a few days,\" Smothers says. \"It would be easiest to call her to my office over the PA system, but there is no way I can do that without the whole school knowing.\"\n\n \"You don't want the school to know?\" you ask.\n\n \"Trust me. Every year, I attempt to keep the prom queen decision a secret, and every year, the rumors get the students worked up into a state of minor chaos,\" Smothers says.\n\n \"Then why keep it a secret?\" you say. \"If everyone's gonna find out about it anyway, I mean.\"\n\n Smothers looks annoyed. \"As I said in my email, it is entirely possible that Nancy might not want to be the prom queen,\" he says. \"How would it look if we announced that Nancy is the prom queen, only to come back two days later and say, oops, sorry, the prom queen is someone else? I am [i]trying[/i] to run this in a [i]respectable[/i] manner.\"\n\n You suppose that makes sense, but it also seems weird. Nancy had to submit her name for consideration, right? Why would she run for prom queen, if she didn't actually want the job?\n\n \"Maybe you could send a note to her homeroom teacher,\" you say. \"Instead of calling her on the PA, I mean. That way, you can talk to Nancy about the prom queen decision, without anyone else knowing.\"\n\n \"A good idea,\" Smothers says. \"Thank you.\"\n *page_break\n *goto 2_7\n*else\n \"Hey, Vice-Principal Smothers,\" you say. \"What if Nancy doesn't want to be the prom queen?\"\n\n \"Then we have a second vote next week, between Elena and Claudia,\" he says.\n\n \"And if the winner of [i]that[/i] vote doesn't want to be prom queen either?\"\n\n \"Then we offer it to the second-runner-up,\" Smothers says.\n\n \"I don't get why we have to wait a week in between votes,\" you say. \"Couldn't we have ranked them in first place, second place and third place today, with just one vote?\"\n\n \"That would have been a bad idea,\" Smothers says. \"We keep the voting results a secret, for good reason. Imagine how the third-place candidate would feel, if she knew she was everyone's last choice, and she only got to be prom queen because the others turned it down.\"\n\n \"Oh,\" you say. That makes more sense.\n\n \"This year was somewhat unconventional,\" Smothers says. \"Normally, we have more than five people voting for prom queen. I remember one year, all four candidates got ten votes each. Sorting [i]that[/i] out was impossible.\"\n\n \"How'd you do it?\" you ask.\n\n \"That was when we instituted the rule that I have tiebreaker power, in addition to veto power,\" Smothers says.\n\n \"Veto power?\" you ask.\n\n \"One year, the entire committee voted for a student, as part of a cruel prank that I immediately ended,\" Smothers says. \"That was when the faculty and I started coming up with a shortlist of approved candidates, ahead of time.\"\n\n Jeez, you had no idea picking a prom queen was so complicated.\n *page_break\n *goto 2_7\n\n\n*label 2_5\n*if chapter_2_you_tell_elena = \"Jessica\"\n \"So, when are you going to tell Nancy the good news?\" you ask Jessica.\n\n \"We have a math class together, so I was probably going to tell her then,\" Jessica says. \"I'd do it sooner, but I don't have her phone number, so I can't text her.\"\n\n \"Why not email her?\" you ask. Everyone at Franklin High has a school email address.\n\n \"An email would be too impersonal,\" Jessica. \"But let's be honest, Steve is gonna tell her in the next five minutes anyway, so why even bother? Nancy will probably track me down for official confirmation, long before tomorrow.\"\n\n \"You really think he's gonna go against the vote like that?\" you ask.\n\n Jessica gives you a \"no duh\" look. \"I understand, though,\" she says. \"If he tells her, I won't report him to Smothers. No point in him getting detention over this.\"\n\n That's nice of Jessica to avoid getting Steve in trouble. You turn to ask Steve if he's planning to tell Nancy first, but he has long since left the room.\n *page_break\n *goto 2_7\n*else\n \"Some meeting, huh?\" you ask Jessica.\n\n \"Oh, yes, what a great meeting. Super important. A meeting that will be forever remembered in the history of Franklin High School,\" she says.\n\n \"Is everything okay?\" you ask.\n\n Jessica casts a look at Vice-Principal Smothers, before speaking to you in a low voice. \"I don't understand why Smothers is the one who's making all the decisions here,\" she says. \"[i]I'm[/i] the head of the prom committee. I should be running all the meetings.\"\n\n \"He didn't do this last month,\" you say. \"Maybe he just took over for today, because of the vote. It's pretty important.\"\n\n \"That's all the more reason why [i]I[/i] should have been in charge,\" Jessica says. \"What's the point of letting me run things, if it doesn't count for the important stuff? It's like the adults are just [i]pretending[/i] to give me control.\"\n\n \"I don't know,\" you say. \"Maybe you should ask Mr. Smothers.\"\n\n \"But he's the one I'm having issues with,\" Jessica says. \"Plus, Bruce...ah, never mind. Smothers can give Bruce detention, and I can't. That [i]kind of[/i] keeps him in line.\"\n\n You're not sure what Bruce has to do with anything, but it's certainly true that Bruce annoys Smothers and Jessica the most. He has problems with authority figures, but does Jessica honestly count as an authority? She's the head of the prom committee, not anything fancy. So why does Bruce go out of his way to cause her problems?\n\n *if vague_love_interest=\"Jessica\"\n  \"I think you're doing a great job as the prom committee leader, and if Vice-Principal Smothers doesn't recognize that, he's wrong,\" you say. \"I'm behind you, 100%.\"\n\n  Jessica looks mildly surprised, but pleased. \"Thanks,\" she says.\n  *page_break\n  *goto 2_7\n *else\n *page_break\n *goto 2_7\n\n\n\n*label 2_6\n\"What do you think of the vote?\" you ask Alejandro.\n\n\"Kinda bummed,\" he says. \"I was the one who voted for Claudia.\"\n\nYou wouldn't have guessed that. \"Why?\" you ask.\n\n\"I know her,\" he says simply.\n\n\"There's gotta be more to it than that,\" you say. \"Just because you know her, it doesn't mean she'd be a good prom queen. Why would you pick her over the others? Did she ask you to do it?\"\n\n\"Nah, I think that's against the rules,\" Alejandro says. \"I just voted for her, that's all.\"\n\n\"But why?\" you ask.\n\nAlejandro shrugs. \"Sorry. Personal choice.\"\n\nYou notice he hasn't answered [i]any[/i] of your questions. Is he hiding something, or is he just too ashamed to admit why he voted for the losing candidate?\n\n*page_break\n*goto 2_7\n\n\n\n*label 2_6_1\n\"Hey, Bruce,\" you say. \"How about the prom queen vote? Pretty unexpected.\"\n\n\"I wouldn't know, because I wasn't allowed to vote,\" Bruce says.\n\n\"Well, it's not like it would have made a difference,\" you say. \"Nancy won by two votes.\"\n\n\"'[i]Well, it's not like it would have made a difference[/i],'\" Bruce mimics back at you. \"Listen, [i]everything[/i] I do makes a difference! You know what? You should have refused to vote, until Smothers gave me my vote back.\"\n\nUm, okay. It's not like you were responsible for Bruce losing his vote. \"That still wouldn't have made a difference,\" you say. \"Nancy would have won, even if I didn't vote for her.\"\n\n\"Then [i]everyone[/i] should have refused to vote!\" Bruce says. \"Where's the justice, I ask you? There should be equal voting rights for all!\"\n\n\"You honestly care that much about prom queen?\" you ask.\n\n*if vague_love_interest=\"Bruce\"\n \"Yeah,\" Bruce says. \"I wanted to pick [i]you[/i] as prom queen.\"\n\n \"[i]Me?[/i]\"\n\n \"Let's go together, baby,\" he says. \"You and I, we can make our own prom. I bet I can--\"\n\n \"Mr. Wilkins!\" Vice-Principal Smothers says harshly. \"Stop harassing the other students!\"\n\n \"Whatever!\" Bruce says. He goes out the door and doesn't look back, leaving you to wonder if he was serious just now.\n\n *page_break\n *goto 2_7\n*else\n \"Heck no,\" Bruce says. \"But everyone else cares, so [i]I[/i] care. You know?\"\n\n You don't know, but it's probably best not to ask any more questions of Bruce.\n\n *page_break\n *goto 2_7\n\n\n*label 2_7\nYou leave the classroom and head down the hallway, in the general direction of the parking lot. It doesn't take long before Elena appears. She must have been waiting for you.\n\n\"So, what happened?\" Elena asks eagerly. \"Did I win? Did I--oh. I lost.\"\n\n\"Sorry,\" you say. \"How'd you know?\"\n\n\"Your face is a dead giveaway,\" Elena says. \"So who won?\"\n\n\"Nancy Spier,\" you say. \"There's a chance you can still win, though. It sounds like she has the opportunity to turn down the prom queen title, if she wants.\"\n\n\"Yeah, that's never gonna happen,\" Elena says. \"Knowing her, she's going to throw a huge party as soon as she hears the news.\"\n\n\"She [i]is[/i] having a party this weekend,\" you say.\n\n\"How'd you know?\" Elena asks.\n\n\"She invited me,\" you say.\n\n\"[i]What?[/i]\" Elena asks. \"That is so obviously a bribe, to get you to vote for her! Please tell me you said no.\"\n\n\"It's a free party invite,\" you say.\n\n\"Oh, very nice,\" Elena snorts. \"Maybe you can walk yourself home today. You're not getting a ride from me!\"\n\n\"Don't be like that!\" you say. \"You lost by two votes! You wouldn't have--\"\n\n\"Only one person voted for me?\" Elena asks.\n\nYou're taken aback by how quickly she realized that. \"Wait, you can do that math in your head?\" you respond.\n\n\"Yeah, it's one of the reasons why I should be prom queen,\" Elena says. \"I would have killed it, in the basic arithmetic challenge.\"\n\n\"I'm pretty sure that's not one of the requirements for becoming prom queen,\" you say.\n\nElena sighs. \"Well, at least [i]you[/i] supported me,\" she says. \"Changed my mind. I'll give you a ride home, after all. Let's go.\"\n\nYou give a forced smile and hope with all your heart that Elena never learns you voted for Nancy.\n*page_break\nA few hours later, you and Elena are in her bedroom, pretending to do homework, when your phone rings.\n\n\"It's Nancy Spier,\" you say.\n\n\"She's one of your phone contacts? Seriously?\" Elena asks.\n\n\"Oh yeah, I have [i]all[/i] the cheerleaders as phone contacts,\" you say sarcastically. \"You think she's found out yet?\"\n\n\"Definitely,\" Elena says.\n\nYou answer the call. \"Hello?\" you say.\n\n\"Thank God!\" Nancy says, in a strained voice. \"You've got to come over right away! Steve won't pick up his phone.\"\n\n\"What?\" you ask. \"What's wrong?\"\n\nElena looks curious, and she leans in to listen. You put the phone on speaker, just in time to hear Nancy say, \"Robbed!\"\n\n\"You've been robbed?\" you ask.\n\n\"I don't [i]know[/i], but the front door was broken into, and the entryway is trashed!\" Nancy says. \"I'm scared to turn on the lights or go to my room. What if the thief is still here?\"\n\n\"You should probably leave the house, until you know it's safe,\" you say. \"Go back to your car or wherever.\"\n\n\"Did you call your parents?\" Elena asks.\n\n\"They're on vacation,\" Nancy says. She sounds more worried than ever now. \"And like I said, Steve's not picking up!\"\n\n\"Look, call the police or a neighbor, okay?\" Elena says. \"You sound really freaked out, and I don't think--\"\n\nNancy screams.\n\n\"What's wrong?\" you cry.\n\n\"He's still here!\" Nancy screams. \"He's in the house! It's aaaaaaaa!\"\n\nYou gasp, as Nancy's voice disappears. For a few seconds, you hear the sounds of a scuffle, a loud grunt, and the call ends. You and Elena both look into each other's eyes, shocked.\n\n\"Do you have any idea where Nancy's house is?\" Elena asks.\n\n\"Nope,\" you say.\n\nElena says a bad word. \"We should probably call the police,\" she says.\n\nYou nod as you pick up your phone and dial 9-1-1.\n*finish", "route_1_chapter_3": "[b]Chapter 3[/b]\n\n\"9-1-1. What's your emergency?\" the operator asks.\n\n\"Hello, I think...I think I, uh...\" you say.\n\n\"We just heard someone get attacked, and we're calling to report it,\" Elena says, in a business-like voice.\n\n\"An attack?\"\n\n\"Yeah,\" you say. You take a breath and start talking. \"I was on the phone with Nancy Spier just now. She said she thought someone else was in her house, and then she screamed. It sounded like she was fighting with someone, and then the line went dead. She could be in danger!\"\n\n\"Please, calm down,\" the 9-1-1 operator says. \"Did you call her back to see if she was okay?\"\n\n\"No, I called you right away,\" you say.\n\n\"Do you have her phone number or address?\"\n\n\"Just the phone number,\" you say. You don't have Nancy's number memorized, obviously, but you pull it up on the phone and read it off.\n\n\"Thank you. We'll send someone to check on her,\" the operator says. \"You said you heard her fighting someone. Did you actually [i]hear[/i] another person?\"\n\nYou look at Elena. \"I just heard the phone being dropped and some scuffling sounds.\"\n\n\"I heard a grunt,\" Elena says. \"I don't know who it was, though. It could have been Nancy or someone else.\"\n \n\"And can I have your names, please?\" the operator asks.\n\nThe two of you give the operator your names and basic contact information.\n\n\"Am I correct in assuming all three of you are teenagers?\" asks the operator. \"At Franklin High?\"\n\n\"Yes...\" you say skeptically. \"Why?\"\n\n\"We've had some trouble with juveniles there, this year,\" the operator says. \"Two months ago, one of the sports teams thought it would be a hilarious prank, to pretend to kidnap people. We got over a dozen false emergency calls, as a result. Maybe this is a part of that.\"\n\n*choice\n #This isn't a joke.\n  *goto 1_1\n #Maybe...\n  *goto 1_2\n\n\n*label 1_1\n\"This isn't a joke,\" you say. \"Please, this is serious! Nancy could be in real danger!\"\n\n\"We [i]are[/i] taking this seriously,\" the operator says. \"Now, can you think of any more information that might be useful?\"\n\n*if (gender=\"male\")\n \"Nancy sent him a text today,\" Elena says.\n\n \"That's not important,\" you say.\n\n \"A text which you didn't let me see,\" Elena insists. \"Maybe it's relevant.\"\n\n \"I'm pretty sure a 9-1-1 call is not the time to be bringing this up!\" you say hotly.\n\n \"I'll be the judge of that,\" says the operator.\n\n You're forced to open the text message. [i]Hey $!{first_name}! Crazy day, huh? So the party is gonna be at my house at Saturday. 4 Maplecake Avenue. It starts at nine. Carolyn says she can't wait to see you there![/i]\n\n \"Who's Carolyn?\" Elena asks.\n\n \"I dunno, just some girl who wants to meet me,\" you mumble.\n\n \"There's gotta be more to the story than that,\" Elena says. \"I wanna know [i]exactly[/i] what Nancy said to you this morning.\"\n\n \"I'm sorry, but this is getting off topic,\" says the operator. \"You two can work out your relationship issues later. For now, I need--\"\n\n \"We're not dating!\" you say.\n\n \"And we never will, if girls like your beloved [i]Carolyn[/i] is in the picture!\" Elena says.\n\n \"I've never met her before!\" you say.\n\n \"Thank you for being concerned citizens and calling 9-1-1. You have a nice day,\" says the operator, before hanging up.\n\n \"Great, now the police hate me,\" you say.\n\n \"Sorry,\" Elena says. \"I just...never mind.\"\n\n \"I guess it doesn't matter,\" you sigh. \"What should we do now?\"\n\n *choice\n  #Go to Nancy's house\n   *goto 2_1\n  #Wait for more information\n   *goto 2_2\n*else\n \"Nancy sent her a text today,\" Elena says.\n\n \"That's not important,\" you say.\n\n \"A text which you didn't let me see,\" Elena insists. \"Maybe it's relevant.\"\n\n \"I'm pretty sure a 9-1-1 call is not the time to be bringing this up!\" you say hotly.\n\n \"I'll be the judge of that,\" says the operator.\n\n You're forced to open the text message. [i]Hey $!{first_name}! Crazy day, huh? So the party is gonna be at my house at Saturday. 4 Maplecake Avenue. It starts at nine. Tommy says he can't wait to see you there![/i]\n\n \"Tommy? Tommy [i]Oliver[/i]?\" Elena asks. \"You [i]like[/i] him? How is that even possible? Have you [i]seen[/i] his hair?\"\n\n \"No, I have no idea who he is,\" you say. \"But Nancy said he was into me, so--\"\n\n \"You can do so much better,\" Elena says. \"That does it. I'm coming with you to the party, to make sure Tommy stays away from you.\"\n\n \"If you could save your party plans for later, that would be great,\" the 9-1-1 operator says. \"Thank you for giving me Nancy's address. Do you have any other relevant information to share?\"\n\n \"Uh...no, I think that's it,\" you say.\n\n \"Then thank you for calling 9-1-1. You have a nice day,\" says the operator.\n\n The phone hangs up, and you look at Elena. \"What do we do now?\" you ask.\n\n *choice\n  #Go to Nancy's house\n   *goto 2_1\n  #Wait for more information\n   *goto 2_2\n\n*label 1_2\n\"Nancy's boyfriend is on a sports team,\" Elena says. \"Steve Stevens. He's a bit of a joker.\"\n\n\"No way!\" you say. \"I mean, I don't know them that well. Yeah, I wouldn't be surprised to hear he's pranked people before, but I don't think he'd go so far as to pretend to kidnap his own girlfriend, just to get a laugh over some people he barely knows.\"\n\n\"You don't know them?\" the operator asks. \"Then why would Nancy call [i]you[/i] if she's being attacked?\"\n\nThat's the question you were wondering, to be honest.\n\n\"Uh...she said something like her parents are gone, and she couldn't get through to her boyfriend's phone,\" Elena says.\n\n\"She mentioned her boyfriend during the call? The possible prankster?\" the operator asks.\n\n\"Yes, but he wasn't there,\" Elena says. \"If he was pranking us, you'd think [i]he[/i] would make the call, not his girlfriend.\"\n\nSuddenly, the answer comes to you. If Nancy was truly panicked, she would call her first phone contact without thinking. Maybe Nancy's phone auto-suggested you as a contact, because she sent you the details about her party earlier today.\n\n\"I have her address!\" you say. \"She texted it to me an hour ago! Let me pull that up.\"\n\n\"That's not necessary,\" says the 9-1-1 operator. \"We already have someone going to her house. Did you call her back?\"\n\n\"No,\" you say.\n\n\"I recommend doing so,\" the operator says. \"If this turns out to be a misunderstanding, please call us back immediately. Now, is there any more relevant information you can think of?\"\n\n\"No,\" you say.\n\n\"Thank you for all your help,\" Elena says.\n\n\"You're welcome, and thank you for calling 9-1-1,\" the operator says, before hanging up.\n\nNeedless to say, you call Nancy's number right away. The phone goes directly to voicemail without ringing, like it's been turned off, or maybe destroyed.\n\n\"What should we do?\" you ask.\n\n*choice\n #Go to Nancy's house\n  *goto 2_1\n #Wait for more information\n  *goto 2_2\n\n*label 2_1\n\"Is that even a question?\" Elena asks. \"We're going to Nancy's house to make sure she's okay!\"\n\n\"Your parents are going to notice if you take the car out,\" you say.\n\n\"I'll just say I'm dropping you off at home,\" Elena says. \"Come on, it's not like we'll be in any danger. The police will be there!\"\n\n\"You're right!\" you say. \"It won't hurt to take a quick look.\"\n\nTwenty minutes later, the two of you are driving on Maplecake Avenue. Is it usually so dark, this early in the night? Sure enough, there's a police car in the driveway of Nancy's house. One officer is inside, typing on a laptop. The other is leaning up against the hood of the car, looking bored.\n\n\"Elena? $!{first_name}? What are you two doing here?\" a voice asks.\n\nIt's Mr. Warren, your history teacher. He's wearing a hideous flannel jacket--clearly something he wears [i]outside[/i] of school hours--and looks concerned. \"You must have heard about Nancy,\" he says.\n\n\"What happened to her?\" Elena asks.\n\n\"That's what everyone wants to know, isn't it?\" Mr. Warren asks. \"She's missing. The police have been asking us neighbors if we've seen anything, but I don't think they've had any success.\"\n\n\"We...heard she was attacked,\" you say carefully, not wanting to reveal that you were the ones on the phone with Nancy.\n\n\"Now, now, that's probably just a silly rumor,\" says Mr. Warren. \"I'm sure there will be a hundred different theories as to what happened, by the time classes start tomorrow.\"\n\n\"You don't think they'll find her by then?\" Elena asks.\n\n\"I didn't mean to imply that,\" Mr. Warren says. \"I'm sure she's safe, and there's no need to worry. She's probably just out celebrating, or something. You heard she was picked to as the prom queen today, right? I don't blame her for wanting to stay out a bit late.\"\n\n\"Yeah, we heard,\" you say.\n\n\"$!{first_name}'s on the prom committee,\" Elena says.\n\n\"Good for you,\" Mr. Warren says. \"Still...you two should move along home. No need to hang around here.\" And with that, he gives you his best stern teacher look, which would probably be more intimidating if had hadn't spent the last two minutes gossiping about a student.\n\nYou turn to Elena and shrug. \"I guess we're going back to my house, then,\" you say.\n*page_break\n*goto 2_3\n\n\n*label 2_2\n\"I dunno. I guess we wait and see what happens,\" Elena says.\n\n\"Does 9-1-1 call people back?\" you ask.\n\n\"You didn't exactly give them your number,\" Elena says.\n\n\"Crap, you're right,\" you say.\n\nThe next half-hour is spent uneasily checking your phone, while trying to do homework. You only make your way through three math questions, before giving up and deciding to go home. There's no way you can concentrate.\n\n*goto 2_3\n\n\n\n*label 2_3\nIt's darker by the time you reach your house. None of the lights are on, and there aren't any cars.\n\n\"Uh, where are my parents?\" you ask.\n\n\"Maybe they kidnapped Nancy,\" Elena says.\n\n\"Don't make jokes like that,\" you say. \"I'm sure she's safe and--\"\n\n\"Has she called you back yet?\" Elena asks.\n\nYou check your phone. \"No.\"\n\n\"Exactly,\" Elena says. \"Let me walk you to the door.\"\n\n\"Nancy was attacked [i]inside[/i] her house,\" you say.\n\n\"Are you asking me to come inside and check your house, just in case there's a kidnapper waiting for you?\" Elena asks. \"Next thing I know, you'll be asking me to check the closets for monsters.\"\n\n\"Like you're not freaked out, too,\" you say. \"Come on, it'll be--\"\n\nYou stop talking, when the lights to the living room flicker on and off twice.\n\n\"See, your parents are home,\" Elena says.\n\n\"Why would my parents play with the lights?\" you ask. \"That doesn't make sense.\"\n\nElena shivers. \"It's too cold to stay out here arguing,\" she says. \"Let's go in.\"\n*page_break\nElena purposely makes a lot of noise, while entering the house. \"If there are any burglars in here, now would be a good time for you to escape out the back!\" she calls loudly.\n\n\"Ha ha,\" you say to her. You call out, \"Mom? Dad? Are you here?\"\n\nThere is no response. You say a curse word.\n\n\"What is it?\" Elena asks.\n\n\"My parents aren't answering,\" you say.\n\n\"So they're not here,\" Elena says.\n\n\"Then who turned on the lights in the living room?\" you ask.\n\n\"Uh...maybe your parents turned off the lights, then went to their room to sleep,\" Elena says.\n\n\"They don't go to bed this early,\" you say. \"And they'd never go to sleep before I came home. One of them always stays up and waits for me. They're annoying like that.\"\n\n\"Then, I dunno, just [i]call[/i] them or something,\" Elena says. \"You're freaking me out, acting like this.\"\n\n\"Good idea,\" you say. \"I'll call. You check the living room.\"\n\n\"No way,\" Elena says. \"Have you [i]seen[/i] any scary movies? When the beautiful girl goes off by her own, she always gets killed.\"\n\n\"So you [i]do[/i] think there's a killer in the house!\" you say.\n\n\"Kidnapper!\" Elena says. \"I mean, not a kidnapper! Look, Nancy is probably playing a prank, like the 9-1-1 person said.\"\n\n\"But earlier, you said she wasn't playing a prank,\" you say.\n\n\"That was when we were nice and safe in [i]my[/i] house, not here in your creepy, dark house with no adults around!\" Elena says. \"Look, if we're checking the living room, we'll do it together. Okay?\"\n\n*choice\n #Check the living room\n  *goto 2_4\n #Call your parents\n  *goto 2_4\n\n*label 2_4\nBefore you can say anything, there is a loud thud from the other side of the room. You and Elena immediately turn around, but no one is there.\n\n\"Mr. $!{last_name}?\" Elena ask
