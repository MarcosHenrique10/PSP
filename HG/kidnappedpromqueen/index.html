would go out with you if you asked me, prom queen or no prom queen,\" you say honestly. \"You're wonderful.\"\n\n   \"Aw, thanks,\" Elena says. \"You're such a good friend!\"\n\n   Friends. Right.\n\n   *goto 3_2\n  *if (gender = \"male\")\n   \"If it's a choice between you and Claudia...well, that's not a choice,\" you say. \"I don't know anything about Claudia, and I know everything about you. But if it's a choice between you and being the prom king...\"\n\n   \"You know the prom queen's date doesn't automatically become the prom king, right?\" Elena asks.\n\n   \"He doesn't?\" you ask. What if someone else's date is picked as prom king? That would be awkward.\n\n   *goto 3_2\n  *else\n   \"I don't think you have anything to worry about,\" you say. \"Prom queen notwithstanding, your dating prospects are still a hundred times better than mine.\"\n\n   \"You are 100% wrong, but now is not the time to go into it,\" Elena says. \"For now, I'll say we [i]have[/i] to go shopping for prom dresses together, and leave it at that.\"\n\n   \"Done,\" you say.\n\n   *goto 3_2\n\n #Change the topic\n  You decide not to press for more information. Instead, you change topics. \"Any idea who Claudia's prom date will be?\"\n\n  \"Maybe someone else from the debate team?\" Elena guesses. \"I know Claudia, but I don't really know who she hangs out with.\"\n\n  \"Me, neither,\" you say. \"If she's smart, she'll find a date right away, instead of dragging it out.\n\n  \"I'm pretty sure she doesn't have a steady boyfriend,\" Elena says. \"Otherwise, he'd be bragging all over social media right now.\n\n  *goto 3_2\n\n*label 3_2\nYour conversation is interrupted, when someone runs up to you. It's...\n\n*choice\n #Mallory\n  \"Do you know where Claudia is?\" Mallory asks breathlessly.\n\n  \"No. Why?\" you ask.\n\n  \"She's missing!\" Mallory says. \"Nobody's seen her since last night! There are rumors she's been kidnapped!\"\n\n  \"Kidnapped? No way,\" Elena says. \"She's probably just trying to avoid being hassled.\"\n\n  \"That's not what Bonnie says,\" Mallory says, shaking her curly head of hair. \"They were getting pizza together last night, when Claudia left early. When Bonnie left a half-hour later, Claudia's car was still in the parking lot, with no sign of her anywhere.\"\n\n  \"That's strange, but it doesn't mean she was kidnapped,\" you say.\n\n  \"Her parents say she never came home last night,\" Mallory says.\n\n  \"Huh,\" Elena says. \"If she [i]has[/i] disappeared...well, maybe I'm not jealous of her anymore.\"\n  *goto 5_1\n #Bruce\n  \"Well, if it isn't suspect numero uno,\" Bruce says. \"Why'd you do it, Elena?\"\n\n  \"Uh, who are you, again?\" Elena asks.\n\n  \"And what are you talking about?\" you ask.\n\n  Bruce looks suspiciously at both of you, for a moment. \"I'm talking about Claudia's kidnapping,\" he says.\n\n  \"[i]What[/i]?!\"\n\n  \"I heard the police are investigating, so if you're guilty, you should turn yourself in,\" Bruce says. \"Maybe they'll go easy on you.\"\n\n  \"Spoken like a true criminal,\" you say. \"Go bother someone else with your stupid jokes, Bruce. We don't want to hear it.\"\n\n  Bruce makes a rude face at you, then leaves. The second he's out of eyeshot, you turn to Elena. \"Do you think Claudia was kidnapped?\" you ask.\n\n  \"I don't know,\" she says. \"I hope not. [i]Who[/i] was that guy, again?\"\n\n  \"He's on the prom committee,\" you say. \"The one who's always trying to get a rise out of Mr. Smothers. We should probably ignore him. He's always trying to cause trouble.\"\n  *goto 5_1\n #Steve\n  \"You're safe!\" Steve says.\n\n  \"Uh, should we not be?\" you ask.\n\n  \"I dunno. Did you hear about Claudia?\" Steve asks.\n\n  \"Yeah, I know she's prom queen,\" Elena says. \"No need to rub it in.\"\n\n  \"No, that's not it,\" Steve says. \"Claudia is missing! I was worried that--well, everyone is worried.\"\n\n  \"You make it sound like she disappeared on purpose,\" Elena says.\n\n  \"No one knows why she's gone,\" Steve says. \"Craig says there's a stalker out there who's taking prom queen candidates.\"\n\n  \"That sounds ridiculous,\" Elena says. \"I'm sure Claudia will show up at first period, as usual.\"\n\n  \"Yeah,\" you agree. It's hard to believe someone would purposely take Claudia.\n\n  *goto 5_1\n #Jessica\n  \"Have either of you seen Claudia today?\" Jessica asks.\n\n  \"No. We just got here,\" you say. \"Why?\"\n\n  \"She's missing, and no one knows why,\" Jessica says.\n\n  \"How do you know she's missing?\" Elena asks. \"School hasn't started yet.\"\n\n  \"Apparently, she didn't come home last night,\" Jessica says. \"I heard her parents are just about ready to call the police.\"\n\n  \"Wow,\" you say. \"That sounds bad. Anything we can do to help?\"\n\n  \"Just keep an eye for her, and if you see her, send her to the office right away,\" Jessica says. \"There are about five of us looking for her. I'm sure we'll find her soon.\"\n\n  \"Good luck,\" Elena says. Jessica nods, then walks over to another group of students, to ask them about Claudia. They shake their heads in response.\n\n  \"Where do you think Claudia is?\" you ask.\n\n  \"No clue,\" Elena says. \"It's weird that she's missing. You'd think she'd be at school early today.\"\n\n  *goto 5_1\n #Vice-Principal Smothers\n  \"$!{last_name}, Adams,\" Smothers greets the two of you. \"I don't suppose either of you know anything about Miss Barrett, do you?\"\n\n  \"Our new prom queen?\" Elena asks. \"No. Why?\"\n\n  \"She failed to return home to her parents' house last night,\" Smothers says. \"If she doesn't show up to her first period class, I'm going to put the school on alert.\"\n\n  \"You think she's missing?\" Elena gasps.\n\n  \"I do. The timing can't possibly be a coincidence,\" Smothers says. \"Hopefully I'm wrong, but just in case this is related to the prom committee vote, you should watch your back.\"\n\n  Your mouth goes dry. It's not every day that the Vice-Principal warns you of possible danger.\n\n  Once Smothers is gone, you turn to Elena. \"What's going on?\" you ask.\n\n  \"I don't know, but I don't like it,\" she says.\n  *goto 5_1\n\n\n\n*label 5_1\n*page_break\nBy the end of the school day, all anyone can talk about is Claudia's kidnapping. It's hard to separate fact from rumor in this case.\n\nRumor: Claudia disappeared before school today.\n*line_break\nFact: Claudia didn't return home last night.\n\nRumor: She ran away from home.\n*line_break\nFact: Her car was found untouched in the parking lot.\n\nRumor: Elena did it, because she's the runner-up for prom queen.\n*line_break\nFact: You threatened to punch the person who said that to you.\n\nAfter lunch, the principal comes on the PA system and asks all students with information about Claudia's whereabouts to visit her office immediately. After fifth period, the principal comes back on the PA.\n\n\"We take the safety of our students very seriously here at Franklin High,\" she says. \"Until Claudia Barrett is found, there will be no more after-school activities. Anyone with any information is encouraged to come to me, or the police. [i]Immediately[/i].\"\n\nSo the police are involved, now?\n\n\"The buildings will be securely locked at all times, when school is not in session,\" the principal says. \"Once classes are over for the day, please leave immediately. There will be a teacher conference today at 3:15 to discuss the situation. Any students still on campus at the time will be given detention. Thank you.\"\n\nIn other words, the school is going on lockdown, because the prom queen was kidnapped. Why didn't they just cancel school for the rest of the day? There's no way anyone can focus, after an announcement like that.\n\n*finish", "route_3_chapter_3": "[b]Chapter 3[/b]\n\nThe teachers strongly recommend that no student should go home alone. \"If at all possible, take the bus or carpool,\" Mrs. Kim, your English teacher, says. \"If you're alone, that could put you in possible danger.\"\n\n\"Why?\" Bruce asks. \"The kidnapping took place at night, not during the afternoon!\"\n\n\"That is irrelevant,\" Mrs. Kim says. \"If you are not concerned for your own safety, I can always call your mother and arrange to have [i]her[/i] pick you up.\"\n\nBruce slumps in his seat and mutters something to himself.\n\n\"So it [i]is[/i] a kidnapping? It's official?\" another student asks.\n\n\"We are studying Shakespeare right now, not current events,\" Mrs. Kim says. \"Let's return to the order his plays were written in. The chronology is not agreed upon by all scholars, but most believe--\"\n\nYou stop paying attention at that point. How can you focus on some dead guy's bibliography? You're more concerned with the fact that Mrs. Kim  didn't deny it was a real kidnapping.\n\nOnce classes are over, you go to Elena's locker. She's talking to Nancy and looking nervous.\n\n\"--Could have been either of us!\" Elena says.\n\n\"It [i]should[/i] have been me,\" Nancy says. Seeing the look on Elena's face, Nancy immediately stops. \"No, I didn't mean it like that! I meant, [i]I[/i] should have been prom queen, not Claudia!\"\n\n\"I can't believe you'd say something like that!\" Elena says.\n\n*choice\n #Agree with Elena\n  \"I agree,\" you say. \"You shouldn't insult Claudia, not now. I'm sure she'd change places with you in an instant, if she could.\"\n\n  \"That's not what I--look, I'm sorry,\" Nancy said. \"I didn't mean to insult Claudia. It's just...I came in second place for prom queen. As the runner-up, I feel like--\"\n\n  \"That's not true,\" you say.\n\n  \"Excuse me?\" Nancy asks.\n\n  \"There was no runner-up in the prom queen vote,\" you say. \"You both tied with one vote apiece.\"\n\n  \"That's not what Steve said,\" Nancy says. Her eyes flare up. \"He [i]lied[/i] to me?\"\n\n  \"Uh...sounds like it,\" you say. \"He probably wanted to spare your feelings, and--\"\n\n  \"I'm going to destroy him!\" Nancy says. She storms off, presumably to confront her lying boyfriend.\n  *goto 1_1\n\n #Come to Nancy's defense\n  \"I'm sure Nancy's not thinking clearly,\" you say. \"I know [i]I'm[/i] not.\"\n\n  \"Hi, $!{first_name},\" Elena says. \"Yeah, I'm not thinking clearly either. This entire situation is...it's awful.\"\n\n  \"I know,\" Nancy says. \"I hope they find her soon, but what if they don't? What if...I dunno, prom is cancelled because of this?\"\n\n  \"It wouldn't seem right to have prom, while Claudia is missing,\" Elena says. \"Even if they find her quickly, it'd [i]still[/i] feel a little weird to have a prom.\"\n\n  Nancy's eyes light up. \"Is there a backup prom queen?\" she asks. \"Maybe I could--\"\n\n  \"No! How could you even think of that, at a time like this?!\" Elena asks.\n\n  Nancy tosses her reddish hair over her shoulder, with a flick of her head. \"I'm the [i]only[/i] person who's thinking clearly, thank you very much. Once you stop letting your emotions run wild, you'll see I'm right. Yeah, this situation is garbage, but we have to keep going on with our lives.\"\n\n  It should probably be noted that Nancy didn't use the word \"garbage\". She used a much more colorful term to describe the situation. Personally, you agree with her assessment.\n\n  \"If you were thinking clearly, you wouldn't say that!\" Elena says. \"Keep talking like that, and people will think [i]you're[/i] the kidnapper!\"\n\n  \"Whatever. You don't get it,\" Nancy says. \"Look, they'll probably find her tonight, and you can stop worrying then, okay? I've got my own stuff to deal with. Later.\"\n\n  You and Elena watch Nancy march down the hallway, unsure what her deal is.\n  *goto 1_1\n\n*label 1_1\n*page_break\n\"You want to go home together?\" you ask Elena.\n\n\"I was going to ask you the same thing,\" Elena said. \"I don't think my brother will be home yet--not like a fourth-grader is going to help stop a kidnapper--but I'd rather not be home alone.\"\n\n*if gender = \"male\"\n \"I thought your parents had a rule against guys in the house when you're home alone,\" you say.\n\n \"Yeah, but that doesn't apply to [i]you[/i],\" she says. You're...you.\"\n\n *if vague_love_interest = \"Elena\"\n  You know what she means, but you can't help but feel a little disappointed that one of the cutest girls in school invited you over to her house, just to wait for her brother. Not that you haven't been to her house before, but...\n\n  You shake your head. Now you're feeling slightly mixed up.\n  *goto 1_2\n *else\n  Hopefully her parents agree with this assessment, or else you could get grounded. Granted, you'll probably be put under curfew until the kidnapper is caught, but still.\n\n  *goto 1_2\n*else\n \"Okay,\" you say. \"Then let's go.\"\n\n *goto 1_2\n*label 1_2\nThe two of you go to Elena's house together, talking about the local sports team's chances of making the playoffs this year.\n\nJust kidding. The two of you start a half-hearted conversation about Claudia's kidnapping, but not much gets said, because you don't know her, and Elena is clearly worried she could be the kidnapper's next target. The conversation quickly turns into silence, and you walk quietly to Elena's house.\n\nElena's mother is on the porch, waiting for you two. She runs over and hugs Elena.\n\n\"Mrs. Adams? What are you doing here?\" you ask.\n\n\"The school called all the parents,\" she explains. \"I took off early from work, to make sure you were okay.\"\n\n\"I'm fine, Mom,\" Elena says. \"Just...just a little worried.\"\n\nAnd that is a mistake. Elena is not the one who should be worried. [i]You[/i] are. I am sorry to be the one who has to tell you this, but you will soon be the kidnapper's next victim.\n\nBut where will the kidnapping happen?\n\n*choice\n #At home\n  *goto 2_1\n #At school\n  *goto 2_2\n #Right here\n  *goto 2_3\n\n*label 2_1\nElena's mom refuses to let you go home alone, so you soon find yourself piled into the back of the Adams Family Minivan. Mrs. Adams isn't sure about leaving you home by yourself, but you swear that you'll be fine.\n\n\"I'll keep the door locked, and I won't answer it for anyone,\" you promise. After several assurances like that, she finally agrees to let you stay.\n\n\"Phew,\" you say, dropping onto the couch. \"That was the worst day ever.\"\n\nYou could swear you hear a chuckle, from the corner of the room. Sitting up quickly, you ask, \"Who's there?\"\n\nNo one answers, and you debate whether to go investigate, when your phone buzzes. Maybe [i]that's[/i] what caused the noise.\n\nYou pick up the phone. It's a text from an unknown number. [i]What if the kidnapper is already in the house?[/i] the text reads.\n\nYour face falls. Is this a prank? No, you can't take any chance--\n\nThat's when someone tackles you from the side. You fall back on the couch, your face shoved against the pillows. Before you can say anything, your attacker shoves a cloth against your face.\n\nYou lash out wildly, connecting with the attacker's body. They hit you back, or at least, it [i]feels[/i] like you've been punched. You squirm around, trying to free your mouth, but the attacker is sitting on you at this point, and you can't throw them off...\n\n\"[i]Breathe, you idiot[/i]!\" the attacker growls. You don't have time to wonder if you know the voice, before your body instinctively takes a breath, and you smell chloroform.\n\nA part of you remembers a lecture from your science teacher, two years ago. \"Yes, chloroform can be used to knock someone unconscious in real life,\" the teacher said. \"But it takes a few minutes, at least. I know it only takes a few seconds in TV and the movies, but that's artistic license, not science. Of course, if the movies were closer to real-life science, almost every action hero would die in the first ten minutes.\"\n\nA small part of you wonders if you're going to spend your last few moments of life remembering a science lecture, before you fall unconscious.\n*goto 3_1\n\n\n*label 2_2\nAs Elena talks to her mother, you suddenly realize you left your backpack at school. You check your phone to see the time. 3:10.\n\n[i]School closes at 3:15. I have just enough time to make it[/i], you think to yourself.\n\n\"I gotta go!\" you say quickly, and you take off running at full speed. Elena calls after you, but you don't have time to respond. You've got to get there soon, or you'll risk getting detention.\n\nThe possibility that you might be in danger never crosses your mind. Why would it? Everyone at school is on high alert, and there are plenty of teachers. You're eighteen years old, not a child yourself, but you can't help but feel safer knowing there are [i]adult[/i] adults around.\n\nYou burst into the school at 3:14 and stop to catch your breath. No one else is around. Good. That means you won't get caught.\n\nYou start a brisk jog down the hallway, making sure to peek around to corners for any teachers. Absolutely no one is there. It's actually a little eerie. You've never seen the school this empty before, never heard it so [i]quiet[/i].\n\nBy the time you reach your locker, it's 3:16, and still as silent as a graveyard. You figure the teachers are already at their meeting by now, so you'll be safe from being caught as you leave the building.\n\nBut you're not safe. While your locker is open, someone roughly grabs you and slams your head against the locker door. Pain searing through your forehead, blurry-eyed, you turn around to see who--\n\nBefore you can finish your thought, the attacker hits you again. The back of your head hits the locker door, and you lose consciousness.\n*goto 3_1\n\n\n\n*label 2_3\n\"[i]You're[/i] worried?\" Mrs. Adams asked. \"How do you think [i]I[/i] feel? My own daughter is the target of a kidnapper!\"\n\nElena refuses to believe it. \"We don't know for sure that the kidnapper is going after the prom queen candidates,\" she says. \"Maybe they only wanted to take Claudia.\"\n\n\"Normally, I'd admire you for having a positive attitude, but you need to wake up and smell the hostile vibes,\" Mrs. Adams says. \"There's no way that--\"\n\nShe is interrupted by an explosion.\n\n\"What was [i]that[/i]?\" you gasp.\n\nA thick cloud of smoke quickly appears, by the end of the street. \"I'm going to see if anyone is hurt,\" Mrs. Adams says, running towards the smoke. \"You two get inside, quickly!\"\n\nBut Elena is already at her side. \"No way, I'm coming, too!\" she says.\n\n\"Fine, but don't leave my sight!\" her mom says.\n\nYou're about to follow them, when you hear a loud thump behind you. You turn around and have a half-second to register the car in the driveway before a dark shape jumps at you. It grabs your head, and you realize it's a person.\n\nYou try shoving your attacker sideways, but they were prepared for this fight, and you weren't. You fall over, but the attacker keeps their hands on your head. Feeling dizzy, you open your mouth to scream, only to realize they've been holding a rag to your nose and mouth.\n\n[i]It's that knock-out stuff,[/i] you think. [i]Chloro-something. Chloro-ro-ro...[/i]\n\nFaster than you can say \"row, row, row your boat,\" you lose consciousness. \n*goto 3_1\n\n*label 3_1\n*page_break\nYou wake up later. Days later? Hours later? You're not sure how much time has passed. Sitting up, you realize you're in a small room. A closet, from the size of it.\n\nThere are two shelves on the back wall. Both empty, of course. Your kidnapper wouldn't want to leave you in a room with any useful items.\n\nYou realize with a jolt that you [i]have[/i] been kidnapped. Someone kidnapped you, presumably the same person that kidnapped Elena. But why? What are they planning?\n\nYour body feels sore, but your hands and feet are free. This surprises you. In the mystery books you've read, kidnapping victims are always tied up, to keep them from escaping. Why didn't your kidnapper do this? Do they think you're not a flight risk?\n\nYou eye the door. Maybe you could knock it down, or bang on it to attract the attention of a passerby. Before you decide on a course of action, you notice something strange about the door's lock: it's covered with a computer screen. The screen isn't terribly big, and it has several paragraphs of text on it.\n\n[i]If you want to escape, you'll have to solve my puzzle.[/i]\n\n[i]After voting for prom queen, everyone but you decides to switch votes. Bruce trades votes with Mallory, who traded with Alejandro. Steve trades with Jessica, and Jessica trades with Bruce.[/i]\n\n[i]When you reach into your pocket to see if your vote is safe, you notice Steve's vote is in there. He must have stolen your vote at the start, without you noticing.[/i]\n\nYou resist the urge to drop your jaw in amazement. It's a brainteaser! Why on Earth would someone kidnap you, then force you to solve a brainteaser? This is the dumbest, most ridiculous thing you've ever heard of!\n\nAt the bottom of the screen is a single sentence with two options.\n\n[i]Bruce now has your vote.[/i]\n\n*choice\n #True\n  *goto puzzle_solved  \n #False\n  *goto puzzle_wrong_1\n\n*label puzzle_wrong_1\n[i]Wrong, you fool! I'll give you two more chances, but it's three strikes, you're out![/i]\n\n[i]After voting for prom queen, everyone but you decides to switch votes. Bruce trades votes with Mallory, who traded with Alejandro. Steve trades with Jessica, and Jessica trades with Bruce.[/i]\n\n[i]When you reach into your pocket to see if your vote is safe, you notice Steve's vote is in there. He must have stolen your vote at the start, without you noticing.[/i]\n\n[i]Jessica has Alejandro's vote.[/i]\n\n*choice\n #True\n  *goto puzzle_solved  \n #False\n  *goto puzzle_wrong_2\n\n*label puzzle_wrong_2\n[i]I knew you were dumb, but this is ridiculous! This is your last chance! If you don't solve the puzzle now, the door will never unlock![/i]\n\n[i]After voting for prom queen, everyone but you decides to switch votes. Bruce trades votes with Mallory, who traded with Alejandro. Steve trades with Jessica, and Jessica trades with Bruce.[/i]\n\n[i]When you reach into your pocket to see if your vote is safe, you notice Steve's vote is in there. He must have stolen your vote at the start, without you noticing.[/i]\n\n[i]Alejandro has Mallory's vote.[/i]\n\n*choice\n #True\n  *goto puzzle_solved  \n #False\n  You're about to press the false button, when you realize that might be the wrong answer. Maybe re-reading the puzzle is in order.\n\n  *goto puzzle_wrong_2\n\n\n*label puzzle_solved\n*set puzzle_15_answered true\n*set puzzle_15_answer \"True\"\nYou press the button for \"true\". The screen flashes twice, and you hear a clicking sound.\n\n[i]The door is unlocked, but don't worry. You'll never escape the building. You'll never save her. You and the others will pay for what you did.[/i]\n\nThe others? What others? There are more kidnapping victims, besides you and Claudia? You throw open the door and step outside.\n*finish\n\n", "route_3_chapter_4": "[b]Chapter 4[/b]\n\nA bright light momentarily blinds you, as you step forward. As your eyes adjust, you find yourself in the school gym.\n\nAnd you're not alone.\n\nMallory and Jessica are standing in the center of the gym, talking. They rush over to you, and you instinctively clench your fists, preparing for a fight.\n\n\"$!{first_name}, are you okay?\" Mallory asks.\n\n*choice\n #Yes\n  You have a slight headache, and your body hurts all over, sort of like it was dragged a few hundred feet. In fact, there's a good chance that's probably what happened. But are you seriously injured? No.\n\n  \"My body hurts, but I'll be fine,\" you say. \"I'm more concerned about what the heck is going on here.\"\n\n  *goto 1_1\n\n #No\n  \"No, I'm [i]not[/i] okay,\" you say. \"I've just been kidnapped by a random psycho!\"\n\n  \"Join the club,\" Mallory mutters.\n\n  \"I'm not in the mood for games,\" you say dangerously. \"What's happening? Why are we in the gym? Where's the kidnapper?\"\n\n  *goto 1_1\n\n*label 1_1\n\"That's what we were just trying to figure out,\" Jessica says. \"At this point, I think it's safe to guess that all the prom committee members were kidnapped.\"\n\n\"Only half of us are here,\" you say. \"Where are the others?\"\n\n\"Still locked in their rooms, I guess,\" Mallory says. She gestures towards the back of the gym, where there is a series of doors. \"I tried them all, before you came out. They're locked.\"\n\nYou count seven doors. Three of them are opened, including the one you just came out of. You ask...\n\n*choice\n #Did you two come out of the doors, too?\n  \"Did you two come out of the doors, too?\" you ask.\n\n  \"Yep,\" Jessica said. \"The kidnapper probably chose this area, because it has a ton of doors that are all right next to each other.\"\n\n  *goto 1_2\n #What are these doors for?\n  \"What are these doors for?\" you ask. \"Mine looked like a closet.\"\n\n  \"I think it's a broom closet,\" Mallory says. \"Mine was the room where they keep the basketballs.\"\n\n  \"And I got the one with the volleyball equipment,\" Jessica says. \"When I saw the net, I thought I was tied up or something.\"\n\n  *goto 1_2\n\n*label 1_2\nOne of the doors opens, and Bruce comes out. \"What the [b]flibber-flobber[/b] is going on here?!\" he shouts, only he doesn't use the word \"flibber-flobber\". In fact, Bruce and the other high schoolers will be using a fair amount of coarse language, for the rest of the night. For the sake of our more delicate readers, these curse words will be replaced with less offensive terms, like \"golly gee\", \"wowzers\" and \"bass herd\".\n\n\"Golly gee, Bruce, it's great to see you, too,\" Jessica says.\n\nBruce looks like he's ready to beat the wowzers out of her. \"You have ten seconds to explain what's going on, before I start throwing punches,\" he warns.\n\n\"We've been kidnapped,\" Mallory says. \"All of us on the prom committee.\"\n\n\"How do I know you're not trying to trick me?\" Bruce asks.\n\n\"Oh, yeah, because people fake-kidnap themselves all the time,\" Jessica says sarcastically. \"Get real, Bruce. We're victims, just like you.\"\n\n\"You don't [i]seem[/i] very victimized,\" Bruce says. He raises his fists. \"But I can change that!\"\n\n\"Bring it on, jerk!\" Jessica screams. Apparently, the situation has both of them a bit more stressed out than you expected.\n\nLuckily for everyone, you are all interrupted by...\n\n*choice\n #Steve\n  Another door opens. Steve barrels out, ready to fight. \"You messed with the wrong--\" he shouts, then he stops short. \"What's going on? I heard yelling.\"\n\n  \"That's because Bruce is a total butthead,\" Jessica says.\n\n  \"Bruce? Jessica?\" Steve asks. \"Hey, wait. Everyone on the prom committee is here! But why? What's going on?\"\n\n  \"Are we going to go through this, every time someone comes out a door?\" Mallory wonders.\n\n  As the others bring Steve up to speed, you go towards the gym exit. It's locked with a thick chain and bolt. There's no way you can take it off, even if everyone pulled together. The bathrooms by the door are unlocked, although you don't know what good that'll do anyone.\n\n  Finally, the door to the hallway is also locked, with a simple number lock. Too bad you don't know the four-digit code.\n\n  Finished with your preliminary investigation, you go back to the others to report that the obvious exits are locked. You're all trapped in here. With some surprise, you see that Vice-Principal Smothers has joined the group.\n\n  *goto 1_3\n #Alejandro\n  You look at one of the closed doors, expecting someone to burst out at any second. To your surprise, the door remains firmly shut.\n\n  Jessica hits Bruce on the chest. He blocks her next punch and pushes her backwards. \"Chill out, Captain Crazy!\" he shouts.\n\n  \"Killing Bruce won't help anything!\" Mallory says.\n\n  Jessica glares at Bruce and puts her hair back into place. \"You're still at the top of my suspect list,\" she says.\n\n  Bruce says nothing, but he makes a rude gesture at her. \"Why are we in the gym?\" he asks.\n\n  \"Don't ask me. Ask the kidnapper,\" Jessica says. She mutters something about how she'd rather be trapped in a room again, rather than be stuck with Bruce. Bruce is about to respond when Mallory interrupts.\n\n  You and Mallory end up playing referee in the verbal battle between Bruce and Jessica, until two more doors open. Steve and Vice-Principal Smothers both come out.\n\n  *goto 1_3\n\n #Vice-Principal Smothers\n  \"Break it up!\" Vice-Principal Smothers yells. \"If you don't stop right now, you're all getting detention!\"\n\n  Everyone stops and stares at Vice-Principal Smothers.\n\n  \"You honestly expect us to care about detention when we've been [i]kidnapped[/i]?!\" Mallory asks.\n\n  \"No, I expect you to be [b]expelled[/b],\" Smothers says. \"This senior prank is crossing the line! I refuse to--\"\n\n  \"It's not a prank! Are you crazy?!\" you ask.\n\n  Smothers' face turns pale. \"You mean, it's...real?\"\n\n  \"No duh,\" Bruce says.\n\n  Smothers walks off by himself for a while, muttering about detention and kidnappers. By the time he rejoins you all on Planet Earth, Steve has also left his room.\n\n  *goto 1_3\n\n*label 1_3\n*page_break\nEveryone is quickly brought up-to-date with the situation. From what you can tell, it sounds like the same thing happened to all of you: attacked unexpectedly, knocked unconscious, woke up trapped in a tiny room. One detail you don't remember is the bell.\n\n\"What do you mean, the bell rang?\" you ask Jessica.\n\n\"You didn't hear it?\" Steve asked. \"That was what woke me up.\"\n\n\"Me, too,\" Bruce says.\n\n\"Mallory and I were already awake when the bell went off,\" Jessica says. \"I assume the kidnapper did it, to make sure everyone would wake up around the same time.\"\n\n\"The school bell isn't scheduled to go off at nighttime,\" Smothers says. \"Does that mean the kidnapper managed to break into the school office? That's unthinkable!\"\n\n\"You're more concerned about the office security than about the kidnapping?!\" Bruce asks.\n\n\"I'm [i]trying[/i] to figure out what time it is!\" Smothers says. \"If you were paying attention, you probably noticed that everyone was taken shortly after school ended. In fact...was anyone taken after 4 PM?\"\n\nEveryone shakes their heads no.\n\n\"Then it's reasonable to assume it's still the same day,\" Smothers says.\n\n\"Well, duh! Nobody stays unconscious that long!\" Bruce argues. \"It's not like it's going to be a week later.\"\n*page_break\n\"Fighting isn't going to help,\" you say diplomatically. \"We need to figure out a way to get out of here.\"\n\n\"Who put [i]you[/i] in charge?\" Bruce asks.\n\n\"I'm the adult, so [i]I'm[/i] in charge,\" Vice-Principal Smothers says.\n\n\"I'm the head of the prom committee, so I think that I--\" Jessica begins, before Bruce interrupts her. She responds by insulting his family members.\n\nYou step away from them, moving closer to Steve and Mallory. \"This is ridiculous,\" you say. \"They'd rather fight than save our lives.\"\n\n\"Let them burn off steam,\" Steve suggests. \"They'll cool down, when it's time to get started.\"\n\n\"Get started?\" you ask.\n\nSteve gestures towards the remaining closed door. \"When Alejandro gets here, I mean. It's gotta be him in that room, right? Everyone else is here.\"\n\n\"Either he didn't wake up when the bell went off, or he's got a really tricky word puzzle,\" Mallory says.\n\n\"Word puzzle?\" you ask. \"I had a trading puzzle.\"\n\n\"Like trading cards?\" Steve asks.\n\n\"Like, everyone swapped votes for prom queen, and I had to figure out which vote was with which person. It was weird,\" you say.\n\nIt soon becomes obvious that everyone had a different puzzle to solve, in order to leave their room. Bruce insists on hearing what everyone's puzzle was like, and Smothers insists on hearing the puzzles in chronological order. You don't understand what either of them is thinking, but you don't argue.\n\nWhose puzzle do you want to hear first?\n\n*choice\n #Jessica's Puzzle\n  *set chapter_4_who_is_first \"Jessica\"\n  *goto Jessica_puzzle\n #Mallory's Puzzle\n  *set chapter_4_who_is_first \"Mallory\"\n  *goto Mallory_puzzle\n\n*label Jessica_puzzle\n\"I had a simple word puzzle,\" Jessica says. \"I had to choose the answer from a list.\"\n\n[i]If you want to escape, you'll have to solve my puzzle.[/i]\n\n[i]Which word comes next in this series?[/i]\n\n[i]•Lemon\n*line_break\n•Mango\n*line_break\n•Nectarine\n*line_break\n•Orange[/i]\n\n*choice\n #Apple\n  *goto Jessica_puzzle_2\n #Pony\n  *if chapter_4_who_is_first = \"Jessica\"\n   *set puzzle_16_answered true\n   *set puzzle_16_answer \"Pony\"\n   *goto Jessica_puzzle_over\n  *else\n   *set puzzle_17_answered true\n   *set puzzle_17_answer \"Pony\"\n   *goto Jessica_puzzle_over\n #Dragon fruit\n  *goto Jessica_puzzle_2\n\n*label Jessica_puzzle_2\n[i]Wrong! You get two more chances, but if you get them both wrong, you'll be trapped in here forever![/i]\n\n[i]Which word comes next in this series?[/i]\n\n[i]•Louisiana\n*line_break\n•Michigan\n*line_break\n•New Hampshire\n*line_break\n•Oregon[/i]\n\n*choice\n #California\n  *goto Jessica_puzzle_3\n #New York\n  *goto Jessica_puzzle_3\n #Pennsylvania\n  *if chapter_4_who_is_first = \"Jessica\"\n   *set puzzle_16_answered true\n   *set puzzle_16_answer \"Pennsylvania\"\n   *goto Jessica_puzzle_over\n  *else\n   *set puzzle_17_answered true\n   *set puzzle_17_answer \"Pennsylvania\"\n   *goto Jessica_puzzle_over\n\n\n\n*label Jessica_puzzle_3\n[i]Wrong! Last chance, you fool![/i]\n\n[i]Which word comes next in this series?[/i]\n\n[i]•Litmus\n*line_break\n•Mars\n*line_break\n•Nowhere\n*line_break\n•Octagon[/i]\n\n*choice\n #Princess\n  *if chapter_4_who_is_first = \"Jessica\"\n   *set puzzle_16_answered true\n   *set puzzle_16_answer \"Princess\"\n   *goto Jessica_puzzle_over\n  *else\n   *set puzzle_17_answered true\n   *set puzzle_17_answer \"Princess\"\n   *goto Jessica_puzzle_over\n #Credit\n  Jessica didn't answer \"credit\". Try again.\n\n  *goto Jessica_puzzle_3\n #Fingers\n  Jessica didn't answer \"fingers\". Try again.\n\n  *goto Jessica_puzzle_3\n\n*label Jessica_puzzle_over\n\"The pattern was easy enough to figure out,\" Jessica says. \"It was an alphabetical list of words.\"\n\n*if puzzle_17_answered =  \"true\"\n *goto both_puzzles_done\n*else\n \"That's really similar to my puzzle!\" Mallory says.\n\n \"What was it?\" you ask.\n\n *goto Mallory_puzzle\n\n\n*label Mallory_puzzle\n\"Just like everyone else, my door was locked with a computer screen puzzle,\" Mallory said. \"It reminded me of my phone, and that's when I realized the kidnapper stole my phone, the jerk. Anyway, the puzzle in my room was like this...\"\n\n[i]If you want to escape, you'll have to solve my puzzle.[/i]\n\n[i]Which word comes next in this series?[/i]\n\n[i]•Aardvark\n*line_break\n•Elephant\n*line_break\n•Iguana\n*line_break\n•Orangutan[/i]\n\n*choice\n #Parrot\n  *goto Mallory_puzzle_2\n #Dog\n  *goto Mallory_puzzle_2\n #Urial\n  *if chapter_4_who_is_first = \"Mallory\"\n   *set puzzle_16_answered true\n   *set puzzle_16_answer \"Urial\"\n   *goto Mallory_puzzle_over\n  *else\n   *set puzzle_17_answered true\n   *set puzzle_17_answer \"Urial\"\n   *goto Mallory_puzzle_over\n\n*label Mallory_puzzle_2\n[i]Wrong! You get two more chances, but if you get them both wrong, you'll be trapped in here forever![/i]\n\n[i]Which word comes next in this series?[/i]\n\n[i]•Alphabetical\n*line_break\n•Eerie\n*line_break\n•Incision\n*line_break\n•Octopus[/i]\n\n\n*choice\n #Escape\n  *goto Mallory_puzzle_3\n #Vice-Principal Smothers\n  *goto Mallory_puzzle_3\n #Umbrella\n  *if chapter_4_who_is_first = \"Mallory\"\n   *set puzzle_16_answered true\n   *set puzzle_16_answer \"Umbrella\"\n   *goto Mallory_puzzle_over\n  *else\n   *set puzzle_17_answered true\n   *set puzzle_17_answer \"Umbrella\"\n   *goto Mallory_puzzle_over\n\n\n*label Mallory_puzzle_3\n[i]Wrong! Last chance, you fool![/i]\n\n[i]Which word comes next in this series?[/i]\n\n[i]•Anderson\n*line_break\n•Enderson\n*line_break\n•Inderson\n*line_break\n•Onderson[/i]\n\n*choice\n #Flabbergasted\n  Mallory didn't answer \"flabbergasted\". Try again.\n\n  *goto Mallory_puzzle_3\n #Umpire\n  *if chapter_4_who_is_first = \"Mallory\"\n   *set puzzle_16_answered true\n   *set puzzle_16_answer \"Umpire\"\n   *goto Mallory_puzzle_over\n  *else\n   *set puzzle_17_answered true\n   *set puzzle_17_answer \"Umpire\"\n   *goto Mallory_puzzle_over\n #Elmo\n  Mallory didn't answer \"Elmo\". Try again.\n\n  *goto Mallory_puzzle_3\n\n\n*label Mallory_puzzle_over\n\"I realized that every word started with a vowel,\" Mallory says. \"First it was A, E, I, and O. The last one had to start with U.\"\n\n\"Right on!\" Steve cheered. \"Wish my puzzle was that easy.\"\n\n*if puzzle_17_answered =  \"true\"\n *goto both_puzzles_done\n*else\n \"My puzzle also had to deal with the first letter in the words,\" Jessica says.\n\n \"Oh?\" Smothers asks.\n\n *goto Jessica_puzzle\n\n\n*label both_puzzles_done\nBefore anyone else can say anything, the door to Alejandro's room slowly opens. \"Hello?\" a voice calls out.\n\nA person tentatively steps out into the gym. It is not Alejandro.\n*finish\n", "route_3_chapter_5": "[b]Chapter 5[/b]\n\nThe stranger slowly walks towards everyone else. $!{J_he} is a short student, with long black hair, and ${J_he} wears a look of supreme confusion on ${J_his} face. \"What's going on? I was taken and locked in that...that puzzle...I don't understand!\"\n\n*if gender = \"female\"\n Everyone looks at each other. \"Does anyone know this guy?\" Bruce asks.\n\n *goto first_decision_done\n*else\n Everyone looks at each other. \"Does anyone know this girl?\" Bruce asks.\n\n *goto first_decision_done\n*label first_decision_done\nNo one responds.\n\n\"Where's Alejandro?\" Steve asks.\n\n\"Uh...I don't know,\" the stranger says. \"Alejandro lives in the room next to me, with all the other foreign exchange students.\"\n\n\"You're a foreign exchange student?\" you ask.\n\n\"Yes, I'm from Japan,\" ${J_he} says. \"My name is $!{J_first} Takeuchi.\"\n\n\"Jun...could you repeat the last part?\" Steve asks.\n\n\"$!{J_first} Takeuchi,\" $!{J_first} says. \"My American friends sometimes call me 'Jun-kun'. It's a nickname.\"\n\nYou decide to call ${J_him}...\n\n*choice\n #$!{J_first}\n  *set J_nickname \"$!{J_first}\"\n  \"If your name is $!{J_nickname}, then that's what we'll call you,\" you say.\n\n  $!{J_nickname} smiles at you gratefully.\n\n  *goto 1_1\n #Jun-kun\n  *set J_nickname \"Jun-kun\"\n  \"Then we'll call you Jun-kun,\" Jessica says. \"After all, we're friends. Bonded by trauma and all that.\"\n\n  \"Trauma?\" Jun-kun asks.\n\n  *goto 1_1\n #J-Dogg\n  *set J_nickname \"J_Dogg\"\n  \"J-Dogg,\" Steve says. \"Nice to meet you.\"\n\n  You give Steve a minor glare. \"That's not ${J_his} name,\" you say.\n\n  \"I honestly do not care right now,\" $!{J_nickname} says. \"I just want to know what's happening.\"\n\n  *goto 1_1\n #Something else\n  What do you want to call $!{J_first}?\n  *input_text J_nickname\n  *if (J_nickname=\"Junshiro\") or (J_nickname=\"Junshi\")\n   *achieve badnickname\n   \"How about we call you $!{J_nickname}?\" you ask. Nobody seems to have any objections.\n\n   *goto 1_1\n  *else\n   \"How about we call you $!{J_nickname}?\" you ask. Nobody seems to have any objections.\n\n   *goto 1_1\n\n\n  *goto 1_1\n*label 1_1\n\"Now then, $!{J_nickname},\" Smothers says. \"Tell us exactly how you were kidnapped. This could be important.\"\n\n\"Yes, Mr. Smithers,\" $!{J_nickname} says.\n\n\"That's Vice-Principal Smothers,\" Smothers says.\n\n\"Sorry,\" $!{J_nickname} says. $!{J_he} takes a small step away from Smothers, closer to you.\n\n$!{J_his} story is pretty similar to everyone else's. $!{J_he} returned home, entered ${J_his} room, then was knocked unconscious by a stranger.\n\n*if gender = \"male\"\n You look ${J_him} over, while ${J_he}'s talking. $!{J_he}'s wearing a light green shirt, with three bows on the sleeves. It looks surprisingly cute, and it matches ${J_his} hair perfectly. It's surprising, because before today, you had no idea that sleeves could match hairstyles.\n\n *goto 1_2\n\n*elseif gender = \"female\"\n You look him over, while he's talking. $!{J_nickname} is wearing a collared shirt with buttons, tucked into some pants. He almost looks as professional as Jessica, or at least he would, if his pants didn't have a giant smudge all over the right thigh. Maybe they were messed up, during the kidnapping.\n\n You take look at your own clothes for the first time. They are...not in the best shape. The culprit clearly dragged you some distance, and the stain on your butt will probably never come off. You try to brush it off without being too obvious.\n\n *goto 1_2\n*label 1_2\n\"You're the only one here who wasn't part of the prom committee,\" Jessica says. \"I think you might have been taken by mistake.\"\n\n\"You mean the kidnapper took someone from the wrong room?\" $!{J_nickname} asks. \"That's...I got kidnapped [i]by accident[/i]?\"\n\n\"Looks like it,\" Bruce says.\n\n$!{J_nickname} starts talking in Japanese, and you're pretty sure ${J_he}'s not saying anything polite.\n*page_break\nEventually, $!{J_nickname} stops. \"If I was taken by mistake, that makes sense,\" ${J_he} says. \"The puzzle to open the door was about Spanish words.\"\n\nDefinitely sounds like a puzzle for Alejandro. \"Is that why it took you so long to figure it out?\" you ask.\n\n\"Yes,\" ${J_he} says. \"I...I had to guess what the answer was, and I really, [i]really[/i] didn't want to get it wrong.\"\n\n\"Random guessing for the win!\" Steve says. \"But what do we do now?\"\n\n\"That should be obvious, Mr. Stevens,\" Smothers says. \"We escape from the gym, find whoever did this to us, and we have them arrested.\"\n\n\"But how?\" Jessica asks. \"All the exits are locked!\"\n\n\"There was a key in my room, behind the touchscreen,\" Smothers says. \"Unless I'm mistaken, it's the key to the cafeteria.\"\n\n\"There was a key in my room, too,\" Steve says. He gives it to Smothers, who identifies it as belonging to the storeroom.\n\n\"Those are both rooms that connect to the gym we're in,\" Smothers says. \"We should explore them both.\"\n\nThat sounds...\n\n*choice\n #Like a great idea\n  \"That's great!\" you say. \"Maybe we can find an exit in one of those rooms!\"\n\n  \"A+ deduction,\" Smothers says. \"Exactly what I was thinking.\"\n\n  *goto 2_1\n\n #Like a setup\n  \"The kidnapper left behind two keys that we can use?\" you say. \"That sounds like a setup.\"\n\n  \"I agree,\" $!{J_nickname} says. \"No way would someone create such a complicated plan, then make a simple mistake like leaving behind keys, by accident.\"\n\n  \"You think they [i]want[/i] us to explore those rooms?\" Bruce asks. \"Maybe. That'd explain why there wasn't a key in [i]my[/i] room.\"\n\n  *goto 2_1\n\n*label 2_1\n\"We're not out of danger yet,\" Jessica says. \"We should be on high alert while we're searching.\"\n\n\"How should we split up?\" Steve asks.\n\n*if gender = \"female\"\n \"I want to go with Claudia,\" $!{J_nickname} says.\n\n \"Claudia?\"\n\n \"You're the prom queen, right?\" he asks, blushing slightly. \"I mean...you're the most beautiful girl here.\"\n\n Mallory looks slightly offended, and she runs a hand through her curly hair, which only messes it up further.\n\n \"My name is actually $!{first_name},\" you say. $!{J_nickname} blushes even more and looks away.\n\n *goto 2_2\n\n*else\n \"I want to go with $!{first_name},\" $!{J_nickname} says. You're kind of surprised she remembers your name, out of a group of six strangers.\n\n *goto 2_2\n*label 2_2\nSmothers shakes his head. \"We shouldn't split up into groups. That just puts us at risk.\"\n\n\"But the culprit is probably expecting us to stick together!\" Bruce says. \"If we split up, we'll surprise them!\"\n\nWhat do you think should be done?\n\n*choice\n #Stick together as a group\n  \"We should all stick together,\" you say. \"There's safety in numbers.\"\n\n  \"We certainly shouldn't let anyone wander off by themselves,\" Jessica agrees. \"Let's put it to a vote. Who thinks we should stay as a group of seven?\"\n\n  Both you and Smothers raise your hands, but no one else does.\n\n  \"Two votes for staying together, five votes for splitting up,\" Jessica says. \"We'll have a group of three and a group of four. Who wants to be in what group?\"\n\n  *goto 2_3\n #Split up into groups\n  \"Okay, gang, let's split up and search for clues,\" you say. \"It's faster that way.\"\n\n  \"I agree,\" Steve says. \"I want to get out of here as soon as possible.\"\n\n  \"Who's going where?\" Jessica asks.\n\n  *goto 2_3\n\n*label 2_3\n\"I don't want to be with you,\" Bruce says quickly.\n\n\"You are [i]so[/i] immature,\" she responds.\n\n\"I want to go to the storage area,\" Steve says.\n\n\"I've been inside the cafeteria before, so I should probably go there,\" $!{J_nickname} says.\n\n\"I want to be with Smothers, if possible,\" Jessica says.\n\n\"Whoa, hold on,\" you say. Keeping track of everyone's requests is starting to feel like another puzzle! \"Let's make this simple. Who wants to search the cafeteria?\"\n\n$!{J_nickname}, Smothers and Jessica raise their hands.\n\n\"And who wants to search the storeroom?\"\n\nSteve, Mallory and Bruce raise their hands.\n\n\"What about you?\" $!{J_nickname} asks.\n\nYou realize you forgot to vote yourself. You want to search...\n\n*choice\n #In the cafeteria with $!{J_nickname}, Smothers and Jessica\n  *set chapter_5_what_is_first \"cafeteria\"\n  *goto 3_1\n\n #In the storeroom with Steve, Mallory and Bruce\n  *set chapter_5_what_is_first \"storeroom\"\n  *goto storeroom_start\n\n\n\n*label 3_1\n\"I want to go to the cafeteria,\" you say. \"Is that okay with everyone?\"\n\n\"It's great,\" Jessica says.\n\n\"It's more than okay,\" $!{J_nickname} says, smiling at you.\n\n\"I have no objections,\" Vice-Principal Smothers says. \"Let's check out the rooms and meet back here in ten minutes.\"\n\n\"Uh, none of us have watches,\" Mallory says.\n\nSmothers groans. \"Right. Then let's just try to regroup as soon as possible. The less time we spend apart, the fewer opportunities our attacker will have to strike again.\"\n\nOn that grim note, everyone splits into two groups. Smothers gives the storeroom key to Steve, then he leads everyone to the cafeteria. You note with some dismay that the cafeteria and storeroom are on opposite sides of the gym. If there's a problem with one of the groups, it'd probably take more than a minute for the other group to realize it and come running.\n\nFor a second, you wonder if there should be a runner, someone to go between the two groups to make sure they're both okay. But then who would protect the runner?\n*page_break\nSmothers opens the cafeteria door with his key. He flips on the light switch, revealing a hooded figure holding a knife.\n\nJust kidding. It appears to be a perfectly normal cafeteria, which is divided into several rows. One row has a power dishwasher, along with a ton of trays, plates and utensils. Another row has ovens and sinks, and the third row has large fridges. You think you can see a walk-in freezer in the back.\n\n\"So...we just search everywhere?\" Smothers asks.\n\n\"Let's split up,\" you say.\n\n\"We just went through that!\" Smothers says. \"It's dangerous to split up, and--\"\n\n\"We're all in the same room, so it should be fine,\" $!{J_nickname} says. \"I'll take the dishes.\"\n\n\"I'll take the ovens,\" Jessica says.\n\n\"I'll take the fridges, then,\" Smothers says.\n\nThat leaves you with the walk-in freezers. Is that okay?\n\n*choice\n #Yes\n  Everyone splits up, and you go to the walk-in freezer. You warily eye the heavy door, which could easily slam shut behind you and trap you inside forever.\n\n  \"Could someone hold the door ]this[/i] far,\" you say. \"And what would be his motive? I don't think he cares about prom.\"\n\n \"If he doesn't care about prom, why is he on the prom committee?\" Jessica asks. \"Yeah, I know it's stupid of me to suspect Bruce just because he hates me, but...I dunno. Whoever did it isn't working alone.\"\n\n \"What makes you say that?\"\n\n \"One single person cannot kidnap seven different people, all in the same hour,\" Jessica says. \"Plus, I could have sworn there were two people there when I was taken, not just one. My memory might be fuzzy, but I know--\"\n\n \"Stop!\" you say suddenly.\n\n Jessica stops. \"What's wrong?\" she asks, worried.\n\n You point to the final oven in the row. \"Doesn't that lock look familiar?\"\n *page_break\n Jessica calls the others over, while you examine the lock. No doubt about it; it's one of those puzzle screens that was used to keep the doors locked earlier. Only this one seems less like a puzzle and more like a trivia question.\n\n *goto puzzle\n*elseif vague_love_interest = \"Jessica\"\n \"Hey,\" you say to Jessica. \"Found anything yet?\"\n\n \"These ovens haven't been cleaned in forever,\" Jessica says.\n\n You chuckle. \"We can tell the janitor about it, after we escape.\"\n\n \"[i]If[/i] we escape,\" Jessica says.\n\n \"With you helping us?\" you say. \"I'm surprised we haven't escaped already. You're the most competent person I know.\"\n\n \"I'm not that great,\" Jessica says.\n\n \"I'm serious,\" you say. \"I'm about two steps away from hiding in the corner and crying, but you're already taking charge, like it's no big deal. You're a natural leader.\"\n\n \"I...thank you,\" Jessica says. \"But the truth is, I'm distracting myself by focusing on the search. I'm worried that if I stop and truly think about what's going on, I'll start freaking out.\"\n\n \"That makes two of us,\" you say. \"Do you think that--after this is over, I mean--we could...\"\n\n \"[b]Found it[/b]!\" Jessica calls loudly. \"Everyone, check this out!\" She points to the last oven, which has a familiar-looking lock on it. Then she turns to you. \"Sorry. What were you saying?\"\n\n \"Never mind,\" you say.\n *page_break\n The other two come over and check out the lock. It's definitely the same kind of puzzle screen that was used to lock you inside your room, but this one doesn't have a puzzle on it. It has...a piece of trivia?\n\n *goto puzzle\n*elseif vague_love_interest = \"Bruce\"\n \"Hey,\" you say to Jessica. \"Found anything yet?\"\n\n \"No, but you can help me look,\" she says. \"I've already checked these two.\"\n\n The two of you look in silence for a while, until Jessica sighs. \"I can't focus on searching,\" she says. \"I'm too busy trying to figure out who the kidnapper is.\"\n\n \"You mean, maybe if we figure out who it is, we can figure out how to escape?\"\n\n \"Something like that,\" Jessica says. \"I can't stop thinking that Bruce knows more than he lets on.\"\n\n \"Bruce wouldn't kidnap a group of people!\" you say. \"That's not his style.\"\n\n \"Yeah, I know his style is mouthing off to teachers in class, not actual crimes,\" Jessica says. \"But out of all of us, he's most likely to do something crazy.\"\n\n \"You think one of us is the kidnapper?\" you ask. \"But we're the victims!\"\n\n \"Yeah, but no one else but us has a motive,\" Jessica says. \"What's the connection between us? The prom committee. It only makes sense that the culprit is going after prom committee members.\"\n\n \"But why?\"\n\n \"I don't know,\" Jessica says. \"I wish I did.\"\n\n The two of you lapse into silence again, until you glance right and see a big obvious clue. \"Whoa, check it out!\" you say. \"It's another puzzle lock!\"\n\n *page_break\n Jessica calls the others over, while you examine the puzzle lock, which is connected to the final oven in the row. It looks exactly the same as the one you saw earlier, only this one seems has a single question on it.\n\n *goto puzzle\n\n*label 3_3\n\"Can I look with you?\" you ask $!{J_nickname}. $!{J_he} quickly agrees.\n\nThe two of you open a cabinet with six sliding drawers. The first drawer has nothing but forks inside.\n\n\"Do you know the girl who was kidnapped?\" ${J_he} asks.\n\n\"Claudia, you mean? No,\" you say. \"I never met the prom queen.\"\n\n\"Me, neither,\" $!{J_nickname} says. \"Of course, I didn't know--that is, I don't--\" $!{J_nickname} looks around furtively, to make sure no one else is listening. \"Can you do me a huge favor?\" ${J_he} asks.\n\n\"What is it?\" you ask.\n\n$!{J_nickname}'s voice goes low. \"I don't want to sound stupid, but...I have no idea what a prom is. We don't have proms in Japan. People talk about it like it's some kind of big party, but I don't understand what that has to do with queens.\"\n\n\"Oh,\" you say. \"Well...a prom is like a big dance, to celebrate the end of the school year. Everyone dresses up in fancy outfits, and usually, people go with dates.\"\n\n*if gender = \"male\"\n \"You mean, like a boyfriend,\" $!{J_nickname} says. She blushes slightly and seems to shrink a bit. \"That explains it. I don't have a boyfriend, so I'm not invited to prom.\"\n\n \"That's not how it works,\" you explain. \"Prom is for [i]all[/i] students. If you don't have a date, you can go with your friends. Nobody will think that's weird.\"\n\n $!{J_nickname} seems unsure. \"Do [i]you[/i] have a girlfriend?\" she asks.\n\n *choice\n  #Yes\n   *goto relationship_question_1\n  #No\n   *goto relationship_question_2\n\n*else\n \"You mean, like a girlfriend,\" $!{J_nickname} says. His eyebrows lower, as he raises his shoulders slightly. \"That explains it. I don't have a girlfriend, so I'm not invited to prom.\"\n\n \"That's not how it works,\" you explain. \"Prom is for [i]all[/i] students. If you don't have a date, you can go with your friends. Nobody will think that's weird.\"\n\n $!{J_nickname} seems unsure. \"Do [i]you[/i] have a boyfriend?\" he asks.\n\n *choice\n  #Yes\n   *goto relationship_question_1\n  #No\n   *goto relationship_question_2\n\n*label relationship_question_1\nYou decide to lie to $!{J_nickname}. \"Yes, I do,\" you say.\n\n\"Then the two of you are going to prom together?\" $!{J_nickname} asks.\n\n\"I wouldn't miss it for anything,\" you say. \"Er, anything besides being kidnapped by a creepy weirdo who likes making high schoolers solve puzzles.\"\n\n\"I am sure we will get out of here in time for prom,\" $!{J_nickname} says. \"Er...when [i]is[/i] prom?\"\n\n\"At the end of the school year,\" you say. \"Like I said, it's sort of a celebration for all the graduating students. Normally, it's only seniors who are allowed to go. Some schools have junior proms, though.\"\n\n\"Interesting,\" $!{J_nickname} says. \"Well, I will be sure to check out the prom, after this.\"\n\n\"I'm sorry it took kidnapping to get you interested in prom!\" you joke. $!{J_nickname} laughs in response.\n*page_break\nYou and $!{J_nickname} are doing more talking than searching, but the two of you are brought back to reality when Jessica calls. \"You guys, check this out!\"\n\nYou, $!{J_nickname} and Smothers come over to her. \"What is it?\" you ask.\n\nShe points at one of the ovens. \"It's a puzzle lock, just like the ones we had to solve to open the doors!\" she says.\n\nYou take a closer look. The puzzle lock has a one sentence question.\n\n*goto puzzle\n\n*label relationship_question_2\n\"No, I don't,\" you say. \"Why do you ask? Are you looking for a prom date?\"\n\n\"No!\" $!{J_nickname} says quickly, waving ${J_his} hands. \"I just meant, you do not have a date, either.\"\n\n\"That's right, but I'm still planning to go to prom,\" you say. \"I'll go with Elena or another friend, probably. See? It's totally normal. Not strange at all. Nope.\"\n\nWhy do you feel so embarrassed, all of a sudden? $!{J_nickname} seems equally embarrassed, or maybe just shy. Either way, $!{J_he} changes the subject. \"And what does prom have to do with queens?\"\n\n\"That's...it's sort of like a popularity contest,\" you say. \"The most popular girl in school is crowned as the prom queen. They give her a crown to wear, and she gets to take fancy pictures. It's not [i]really[/i] that important, and we don't have to do it, it's just...sort of a tradition.\"\n\n\"So the prom queen doesn't get to make laws or anything?\" $!{J_nickname} asks.\n\n\"No,\" you say. \"It's just for fun. It's not serious. Definitely not worth kidnapping eight people for.\"\n\n\"That was going to be my next question,\" $!{J_nickname} says. \"I don't understand why there is a kidnapping, over a party.\"\n\n\"I don't understand myself,\" you say. \"But I can assure you right now that this is [i]not[/i] normal. I've never heard of this happening before, ever.\"\n*page_break\n$!{J_nickname} appears to have several more questions to ask about prom, but the two of you are interrupted by a shout from another part of the room.\n\n\"You guys, check this out!\" Jessica calls.\n\n\"Let's go,\" $!{J_nickname} says.\n\n\"Right, we can talk more later,\" you say. Like when you're not kidnapped.\n\nYou and $!{J_nickname} reach Jessica, around the same time as Smothers does. \"What have you found?\" Smothers asks.\n\nShe points at one of the ovens. \"It's a puzzle lock, just like the ones we had to solve to open the doors!\" she says.\n\nYou take a closer look. The puzzle lock has a one sentence question.\n\n*goto puzzle\n\n*label puzzle\n[i]What year did the Great Depression begin?[/i]\n\n\"Not much of a puzzle,\" Smothers says.\n\n\"Nope,\" you say. Maybe you remember the answer from your United States history class. If not, you're sure the answer is in your notebook, which is under the \"show stats\" tab.\n\n*choice\n #1927\n  *goto puzzle_1  \n #1928\n  *goto puzzle_1  \n #1929\n  *set puzzle_18_answered true\n  *set puzzle_18_answer \"Nineteen Twenty-Nine\"\n  *goto puzzle_solved\n #1930\n  *goto puzzle_1  \n\n*label puzzle_1\nThat's not the correct answer.\n\n[i]What year did the Great Depression begin?[/i]\n\n*choice\n #1927\n  *goto puzzle_1  \n #1928\n  *goto puzzle_1  \n #1929\n  *set puzzle_18_answered true\n  *set puzzle_18_answer \"Nineteen Twenty-Nine\"\n  *goto puzzle_solved\n #1930\n  *goto puzzle_1  \n\n*label puzzle_solved\nThe lock opens up when you press the correct answer. You can now open the oven door. As you do so, a stench fills the room.\n\n\"Someone used this recently,\" you say.\n\n\"They were trying to burn something!\" Smothers says. \"Look!\"\n\nHe reaches into the oven and pulls out the dark item that was sitting on the middle rack. It smells of burnt paper and coffee.\n\n\"It is...one of those cheerleader things,\" $!{J_nickname} says.\n\n\"A pom-pom,\" you say. \"I think the culprit was trying to destroy it.\"\n\n$!{J_nickname} shakes ${J_his} head. \"No, they locked the oven with a puzzle. They wanted to make sure we found it.\"\n\n\"But what's so special about it?\" Jessica asks. \"It's a half-burnt pom-pom that smells of stale coffee.\"\n\nSmothers sniffs it. \"Someone spilled coffee on this,\" he confirms. \"Smells like the cheap stuff they have in the teacher's lounge.\"\n\n*set evidence_1_found true\n*set evidence_1 \"pom-pom with coffee stains\"\n\"This is evidence,\" you say. \"We should hold onto it.\"\n\nEveryone agrees, and you all go back to searching. Sadly, you don't find any evidence as compelling as the strangely-located pom-pom.\n*finish\n\n\n\n*label storeroom_start\n\"I want to search the storeroom,\" you say. \"Is that okay with everyone?\"\n\n\"That's great!\" Steve says.\n\n\"Fine by me,\" Mallory says.\n\n*if vague_love_interest = \"Bruce\"\n \"Whatever,\" Bruce says. You're pretty sure he's only pretending not to care.\n\n *goto b_alt1_1\n*else\n \"Whatever,\" Bruce says.\n\n *goto b_alt1_1\n*label b_alt1_1\n\"Then it's decided,\" you say. \"We'll split up and meet back here as soon as possible. If there are any problems, you know where to find us.\"\n\nSmothers nods and gives you the key to the storeroom. He takes the others to the cafeteria, and the instant they go through the door, Bruce turns on you.\n\n\"Give me the key,\" he demands.\n\n*choice\n #Yes\n  \"Uh...okay,\" you say. You hand the key over to Bruce, who smiles triumphantly.\n\n  \"Great,\" he says. \"Now, I'm going in the room first. You all stay behind for a few moments, okay?\"\n\n  \"Uh, why?\" Mallory asks.\n\n  \"I just want to make sure it's...safe,\" Bruce says slowly.\n\n  \"You realize how suspicious that sounds, right?\" Mallory asks. \"Maybe you should give the key back.\"\n\n  \"No!\" Bruce says. \"Look, use your brain! The culprit is probably behind the door right now with an axe, ready to kill whoever goes through the door first.\"\n\n  *goto b_alt1_4\n #No\n  \"No,\" you say. \"Smothers gave it to [i]me[/i].\"\n\n  \"You're not in charge, and neither is that blithering idiot,\" Bruce says. \"Give me the key!\"\n\n  \"No way!\" you say.\n\n  \"We are in serious danger here!\" Bruce says. \"The kidnapper is probably hiding in there, waiting for their next victim! Do you [i]really[/i] want to be the first inside?\"\n\n  *goto b_alt1_4\n*label b_alt1_4\n\"Oh, so you're being [i]noble[/i] by demanding that you go through the door first?\" Mallory asks.\n\n\"Golly gee, nobody asked for your opinion, Mule-lory,\" Bruce says.\n\n\"Do you think it could be dangerous?\" Steve asks.\n\n*choice\n #Yes\n  \"It's possible, I guess,\" you say. \"Although if the kidnapper wanted to kill us, wouldn't they have done it earlier?\"\n\n  \"Not if they want to kill us one by one and drive us all crazy,\" Bruce says. \"I saw a TV show where that happened.\"\n\n  \"This is real life,\" Mallory says. \"This isn't a TV show, where everyone works together and stops the bad guy with the power of friendship or whatever.\"\n\n  \"Actually, everyone died on the show,\" Bruce says. \"The killer got away with it.\"\n\n  \"Oh, shut up,\" you mutter, but you no longer feel like opening the storeroom door. row has ovens and sinks, and the third row has large fridges.\n\n\"So...we just search everywhere?\" Smothers asks.\n\n\"Let's split up,\" Jessica says.\n\n\"We just went through that!\" Smothers says. \"It's dangerous to split up, and --\"\n\n\"We're all in the same room, so it should be fine,\" $!{J_nickname} says. \"I'll take the ovens.\"\n\n\"I'll take the dishes,\" Jessica says.\n\n\"I'll take the fridges, then,\" Smothers says. He is not a very good searcher. He opens the door to a fridge, quickly scans the shelves, then shuts it without touching anything inside. He finishes his search in under a minute, then moves onto the walk-in freezer.\n\nSmothers hesitates, as he holds the door open. He takes a quick look inside, then moves to leave, when he slips and almost falls down. When the students ask if he's okay, he snaps at them, angrily.\n*page_break\n$!{J_nickname} walks over to Jessica. \"Hi,\" ${J_he} says quietly. \"Can I search with you? I don't want to do this alone.\"\n\n\"Sure,\" Jessica says. \"I understand.\"\n\n\"I don't know anyone here,\" ${J_he} says. \"Being kidnapped with strangers...I don't like it.\"\n\n\"You can trust us,\" Jessica says.\n\n\"I want to believe that, but I have no way of knowing if that's true,\" $!{J_nickname} says. \"What if one of you is the kidnapper?\"\n\n\"If I was the kidnapper, I wouldn't waste time with stupid games,\" Jessica says. \"I'd talk to my victims outright. And I wouldn't let my victims join up in a large group. I'd keep them separated from each other at all times, to minimize the chances of them escaping.\"\n\n\"You have thought a lot about this,\" $!{J_nickname} says.\n\n\"Can you blame me? I want to figure out what our kidnapper is thinking,\" Jessica says. \"If we know what they're doing, and why, we can anticipate their next move.\"\n\n\"What they are doing is making us search a stupid kitchen with nothing useful inside,\" $!{J_nickname} says, shutting a drawer of spoons. \"I cannot tell you why, or who.\"\n\n\"Why? Because they're crazy,\" Jessica says. \"Someone wants revenge on the prom committee, because we elected Claudia as prom queen.\"\n\n\"But Claudia was already kidnapped,\" $!{J_nickname} says. \"Why wasn't that enough for the culprit?\"\n\n\"Maybe there are two sets of culprits,\" Jessica says. \"That's a terrible thought, but it'd explain why Claudia isn't here with us. Maybe if we figure out who the one culprit is, we'd figure out the identity of the other one.\"\n*page_break\n$!{J_nickname} and Jessica's search comes to a quick end, when Smothers yells for them. \"How did you miss this?!\" he barks.\n\n\"What is it?\" Jessica asks.\n\nSmothers points to one of the ovens. On the door is a touchscreen, just like the ones from earlier. $!{J_nickname}'s eyes widen. \"I could have sworn there was nothing there earlier...\" he says.\n\n\"Are you saying one of us put this on the oven, while the others weren't looking?\" Smothers asks.\n\nJessica looks at her two companions. $!{J_nickname} could be mistaken, or ${J_he} could be lying. If ${J_he} was the culprit, it would be so easy for ${J_him} to put a puzzle screen up, then create an alibi by talking to her. By the same token, if Smothers was the culprit, it'd be easy for him to put the screen up, while she was talking to $!{J_nickname}...\n\n\"I...I'm not sure,\" $!{J_nickname} says weakly.\n\n\"Wait,\" Jessica says. \"If one of us is the culprit, where did the touchscreen come from? A screen that big can't fit inside someone's pockets!\"\n\n\"Maybe the culprit hid it in one of the ovens,\" Smothers says.\n\n\"That makes no sense,\" Jessica says. \"Why hide a touchscreen in an oven ahead of time, just to put it on a different oven?\"\n\n\"I don't know!\" Smothers snaps. \"We're clearly not dealing with a rational person, here!\"\n\n\"Um...I hate to interrupt, but I do not know the answer to this question,\" $!{J_nickname} says, pointing to the puzzle. The puzzle is a single question, one which you could easily answer with the help of your school notebook. In case you've forgotten, your notebook is kept under the \"show stats\" tab.\n\n*goto a_alt_puzzle\n\n*label a_alt_puzzle\n[i]What year did the Great Depression begin?[/i]\n\n*choice\n #1927\n  *goto a_alt_puzzle_1  \n #1928\n  *goto a_alt_puzzle_1  \n #1929\n  *set puzzle_19_answered true\n  *set puzzle_19_answer \"Nineteen Twenty-Nine\"\n  *goto a_alt_puzzle_solved\n #1930\n  *goto a_alt_puzzle_1  \n\n*label a_alt_puzzle_1\nThat's not the correct answer.\n\n[i]What year did the Great Depression begin?[/i]\n\n*choice\n #1927\n  *goto a_alt_puzzle_1  \n #1928\n  *goto a_alt_puzzle_1  \n #1929\n  *set puzzle_19_answered true\n  *set puzzle_19_answer \"Nineteen Twenty-Nine\"\n  *goto a_alt_puzzle_solved\n #1930\n  *goto a_alt_puzzle_1  \n\n*label a_alt_puzzle_solved\nWhen the puzzle is solved, the oven door is unlocked. As Jessica pulls the oven open, a stench fills the room. \"Someone used this recently,\" she says.\n\n\"They were trying to burn something!\" Smothers says. \"Look!\"\n\nHe reaches into the oven and pulls out the dark item that was sitting on the middle rack. It smells of burnt paper and coffee.\n\n\"It is...one of those cheerleader things,\" $!{J_nickname} says.\n\n\"A pom-pom,\" Jessica says. \"I think the culprit was trying to destroy it.\"\n\n$!{J_nickname} shakes ${J_his} head. \"No, they locked the oven with a puzzle. They wanted to make sure we found it.\"\n\n\"But what's so special about it?\" Jessica asks. \"It's a half-burnt pom-pom that smells of stale coffee.\"\n\nSmothers sniffs it. \"Someone spilled coffee on this,\" he confirms. \"Smells like the cheap stuff they have in the teacher's lounge.\"\n\n*set evidence_2_found true\n*set evidence_2 \"pom-pom with coffee stains\"\n\"This is evidence,\" Jessica says. \"We should hold onto it.\"\n\nEveryone agrees, and the group goes back to searching the room. Sadly, they don't find anything else of interest, besides the strangely-located pom-pom.\n\n*finish\n", "route_3_chapter_7": "[b]Chapter 7[/b]\n\nAfter the storeroom and cafeteria are thoroughly searched, the members of the prom committee regroup in the gym. In an ideal world, everyone would sit down and carefully go over all the evidence, working together to figure out who the culprit is.\n\nSadly, this isn't an ideal world. This is high school.\n\n\"What did you [i]do[/i] to her?\" Smothers screams, as Bruce and Steve carry Mallory's body over to the others.\n\n\"Someone attacked her,\" Steve says. \"We think it was whoever kidnapped us.\"\n\n\"Well, of [i]course[/i] it was the kidnapper,\" Jessica says. \"Who else could it be?\"\n\n\"Impossible!\" Smothers says. \"I kept a watch on the door the entire time!\"\n\n\"You did?\" you ask.\n\n\"I did,\" Smothers says smugly. \"I know for a fact that nobody in our group left the cafeteria, at any point. I would have seen them.\"\n\n\"So all of us have an alibi!\" $!{J_nickname} says. $!{J_he} looks extremely relieved.\n\n\"How do we know you're not lying?\" Bruce asks. \"How do we know [i]you[/i] didn't sneak across the gym to attack Mallory?\"\n\n\"I was watching the door, too,\" Jessica says. \"I was...worried something like this might happen. Poor Mallory! I wonder who did it.\"\n\n*if chapter_5_what_is_first = \"cafeteria\"\n Steve turns pale. \"If it's someone in our group, that only leaves two choices,\" he says...\n\n *choice\n  #Bruce\n   *goto 1_1\n  #Steve\n   *goto 1_2\n*else\n Steve turns pale. \"If it's someone in our group, that only leaves three choices,\" he says...\n\n *choice\n  #Bruce\n   *goto 1_1\n  #Steve\n   *goto 1_2\n  #You\n   *goto 1_3\n\n*label 1_1\n\"It's Bruce,\" Jessica says.\n\n\"He's the one with a history of misbehavior,\" Smothers agrees.\n\n\"Golly gee, that's wrong,\" Bruce says. \"Just because I mess around in class, you can't accuse me of assault!\"\n\n\"Language, Mr. Wilkins,\" Smothers says. \"If you're willing to break the rules of polite society, who knows what [i]other[/i] rules you're willing to break?\"\n\n\"Okay, hold on,\" you say. \"Just because Bruce curses, it doesn't mean he's a kidnapper. Half the kids in school swear.\"\n\n\"Not in [i]my[/i] classes,\" Smothers says.\n\n\"Well, of course they don't do it in [i]your[/i] classes,\" Steve says. \"Only an idiot would swear in front of the Vice-Principal.\"\n\n\"So I'm innocent by virtue of being stupid?\" Bruce asks. He smirks. \"Not exactly the exoneration I was hoping for, but I'll take it.\"\n\n\"Don't get ahead of yourself!\" Smothers says. \"You have yet to prove your innocence! You remain the most likely suspect!\"\n*goto 1_4\n\n*label 1_2\n\"It's Steve,\" Bruce says.\n\n\"No way!\" Steve says. \"I wouldn't hurt a fly!\"\n\n\"That's a lie!\" Bruce says. \"You're the football captain. You play a sport where you literally smash into other people over and over!\"\n\n\"Mallory wasn't tackled, she was smashed on the head from behind!\" Steve says.\n\n\"And that proves you did it,\" Bruce says. \"Steve knew if he tackled Mallory, everyone would instantly know it was him. So he used a [i]different[/i] attack, and we should be grateful! Not only does it mean Mallory is still alive, it means we know who the culprit is! Steve Stevens!\"\n\n\"You're talking nonsense!\" Steve says. \"You say I'm guilty if she was tackled, and I'm guilty if she's not tackled. Did you forget that [i]quarterbacks don't tackle people[/i]?\"\n\n\"Exactly my point!\" Bruce says. \"You tried to throw suspicion off yourself, by doing something different! I'm not fooled, and neither is anyone else!\"\n\n\"This isn't a final exam, Bruce,\" Jessica says. \"You can't just make up crap as you go along and hope it works!\"\n\n\"That's not at all how final exams work!\" Vice-Principal Smothers says, aghast.\n\n\"Thanks, Jessica,\" Steve says. \"There is no proof at all that I did it.\"\n\n\"I don't need proof, when I have a gut feeling,\" Bruce says. \"You're lying to us!\"\n*goto 1_4\n\n*label 1_3\n\"It's $!{first_name}!\" Bruce says, pointing an accusing finger at you.\n\n\"What?\" you ask. \"I would never attack Mallory! She's my friend!\"\n\n\"Exactly!\" Bruce says. \"You're friends. Mallory let her guard down around you. A fatal mistake! While her back was turned, you issued the fatal blow!\"\n\n*if chapter_5_was_with_bruce_when_Mallory_was_attacked = \"true\"\n \"I was with you the entire time, you idiot!\" you shout at him. \"Mallory was searching with Steve!\"\n\n Bruce turns on Steve. \"What do you have to say for yourself?\" he says.\n\n \"I told you, the kidnapper ran through the door and ran out, before I got a good look at them!\" Steve says.\n\n \"Oh, wow, that's [i]suuuper[/i] convenient,\" Bruce says. \"I bet the two of you are working together on this. You probably planned to go after me, once you got rid of Mallory!\"\n *goto 1_4\n*else\n \"The two of you [i]were[/i] alone together,\" Steve says.\n\n \"Excuse me?\" you ask. \"I was busy solving the puzzle that the culprit left behind, when she was attacked! I missed the whole thing.\"\n\n \"Exactly!\" Bruce says. \"The [i]culprit[/i] left behind the puzzle. You probably left it for yourself on purpose, just to give yourself an alibi!\"\n\n \"You watched me solve the puzzle, you moron!\" you shout at Bruce.\n*goto 1_4\n\n\n*label 1_4\n*page_break\n\"Excuse me,\" $!{J_nickname} says quietly. \"But there is a possibility no one is considering.\"\n\n\"[i]What?[/i]\" Bruce shouts.\n\n\"The culprit doesn't have to be one of us,\" $!{J_nickname} says. \"It sounds like it's possible that the culprit is someone else, who came from the outside, and attacked Mallory while the others were distracted.\"\n\n\"That must be it!\" Steve says quickly.\n\n*if gender = \"male\"\n Bruce picks up $!{J_nickname} and gives ${J_him} a hug. \"Exactly!\" he says. \"I love you! Let's go out sometime!\"\n\n $!{J_nickname} looks terrified at the suggestion. \"Oh! I...please put me down,\" she says.\n\n Bruce does so. \"All right, but you don't know what you're missing,\" he says. \"None of the girls in school do.\"\n\n Jessica frowns at Bruce. \"Are you seriously complaining that nobody wants to date you? How can you worry about your pathetic love life, when there's a kidnapper on the loose?\"\n\n It certainly did not take much to convince Steve and Bruce that Mallory's attacker was a completely different person. But are [i]you[/i] convinced they're both innocent?\n\n *choice\n  #Yes\n   Steve would never attack anyone from behind. He's too nice to do anything like that. Bruce [i]might[/i] attack someone if the situation called for it, but he certainly wouldn't do it without good reason, like Mallory's attacker did. Speaking of which...\n\n   *goto 2_1\n  #No\n   You know the saying is \"innocent until proven guilty\", but this is not the time to assume anyone's innocence. [i]Everyone[/i] is a suspect, especially the people who can't prove their innocence. You decide to tackle the question of guilt from a different angle.\n\n   *goto 2_1\n\n*else\n \"Yes!\" Steve says.\n\n Bruce picks up $!{J_nickname} and gives ${J_him} a hug. \"Exactly!\" he says. \"I love you, dude! We should hang out sometime.\"\n\n $!{J_nickname} looks terrified at the suggestion, and he casts a glance at you, as if expecting you to rescue him. \"Oh! I...please put me down,\" he says.\n\n Bruce does so. \"You find a way to get us out of here, and I'll give you a ride on my motorcycle,\" Bruce promises. You suspect $!{J_nickname} would rather be kidnapped again, then go for a ride with Bruce.\n\n It certainly did not take much to convince Steve and Bruce that Mallory's attacker was a completely different person. But are [i]you[/i] convinced they're both innocent?\n\n *choice\n  #Yes\n   Steve would never attack anyone from behind. He's too nice to do anything like that. Bruce [i]might[/i] attack someone if the situation called for it, but he certainly wouldn't do it without good reason, like Mallory's attacker did. Speaking of which...\n\n   *goto 2_1\n  #No\n   You know the saying is \"innocent until proven guilty\", but this is not the time to assume anyone's innocence. [i]Everyone[/i] is a suspect, especially the people who can't prove their innocence. You decide to tackle the question of guilt from a different angle.\n\n   *goto 2_1\n\n*label 2_1\n\"Wild accusations aren't getting us anywhere,\" you say. \"So far, nobody has asked the obvious question. [i]Why[/i] did the culprit attack Mallory?\"\n\n*if chapter_5_what_is_first = \"cafeteria\"\n \"It's 'cause of this,\" Bruce says, holding up a stylized key. \"I found it in Mallory's hand. I figure she got it, after solving the puzzle.\"\n\n *goto 2_2\n\n*else\n \"You already know that,\" Bruce says. He pulls out the key that he took from Mallory's hand. \"Mallory had a key on her. She must have found it, when we were busy with the puzzle.\"\n\n *goto 2_2\n\n*label 2_2\n\"What puzzle?\" Jessica asks.\n\n\"There was one of those touchscreen puzzles in the storeroom,\" Steve explained. \"We found it right by Mallory.\"\n\n\"There was one in our room, too!\" $!{J_nickname} says excitedly. \"We got a pom-pom for solving it!\"\n\n\"A pom-pom?\" Steve asks. \"That's...let me see it!\"\n\n\"We should look at the key first,\" Smothers says. \"If it's worth attacking someone over, then it [i]must[/i] be important!\"\n\nWhat evidence do you want to look at first?\n\n*choice\n #The pom-pom\n  *set chapter_7_item_looked_at_first \"pom-pom\"\n  \"I want to see the pom-pom,\" you say.\n\n  *goto pom_pom\n #The key\n  *set chapter_7_item_looked_at_first \"key\"\n  \"Let's see if the key can tell us anything,\" you say. \"Are there any markings on it?\"\n\n  *goto key\n\n*label key\n\"Nah,\" Bruce says. \"I mean, not really.\"\n\nJessica snorts. \"Yes and no? That's not even [i]kind of[/i] helpful.\"\n\n\"See for yourself,\" Bruce says. Everyone crowds in, as Bruce shows off the key. The top of the key is protected by a ring of hard, red plastic, and some kind of monkey is inscribed on the side.\n\n\"What's that?\" Jessica asks.\n\n\"It's a plastic ring,\" Steve says. \"You use it to prevent the key from scraping against other things your pocket.\"\n\n\"Not that, the iguana!\" Jessica says.\n\n\"I thought it was a monkey,\" you say.\n\n\"No, it's totally a wolf,\" Bruce says.\n\n$!{J_nickname} gets it right. \"I think it's a bird,\" ${J_he} says. \"Because we are the Franklin Falcons?\"\n\nSteve shakes his head. \"C'mon guys, where's your school spirit?\"\n\n\"We've been kidnapped, you idiot,\" Jessica snaps.\n*page_break\n\"If that's a falcon...\" Smothers says. \"Let me have the key!\"\n\n\"Why?\" Bruce asks.\n\n\"Because I think I recognize it,\" Smothers says. He takes the key from Bruce and looks closely at it. \"Yes, yes! Unless I'm mistaken, this is the key to the principal's office!\"\n\n\"That must be where the kidnapper wants us to explore next!\" $!{J_nickname} says.\n\n\"Maybe the opposite,\" Smothers says. \"Remember, the culprit attacked Mallory, to stop her from getting the key. I wonder why they were so desperate to keep her out of the office.\"\n\n\"Maybe there's something in there that the culprit doesn't want us to find,\" Jessica says. \"Like proof of their guilt!\"\n\n\"Or maybe that's where they've been hiding,\" Steve says. \"They're using the principal's office as a home base!\"\n\n\"You're overthinking things,\" Smothers says. \"There's a phone in Principal Jones' office. Clearly, the culprit doesn't want us to get inside and use the phone to call for help.\"\n\n\"Well, what are we waiting for?\" Bruce asks. \"Let's go to the principal's office!\"\n\n*if chapter_7_item_looked_at_first = \"key\"\n \"Not so fast,\" you say. \"We still have to look at the pom-pom.\"\n *page_break\n *goto pom_pom\n*else\n *page_break\n *goto items_examined\n\n*label pom_pom\nJessica holds out the pom-pom, so everyone can see it.\n\n\"Why is it so dirty?\" Steve asks.\n\n\"We found it in an oven
