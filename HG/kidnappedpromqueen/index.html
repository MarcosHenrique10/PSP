<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Kidnapped Prom Queen — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "kidnappedpromqueen", "title": "The Kidnapped Prom Queen", "scenes": {"chapter_1": "[b]Chapter 1[/b]\n\nYou always knew senior year of high school was going to be tough, but you never thought you'd be [i]kidnapped[/i].\n\nWhen the prom queen was kidnapped, that was bad enough. The entire student body of Franklin High was rocked to its core. Who would hurt someone over [i]prom[/i]? What person was so desperate that they would resort to kidnapping the prom queen? Was it a kidnapping, or was it...something worse?\n\nYou tried to comfort yourself, tried to trick yourself into thinking you were safe. Yes, there was a kidnapper on the loose, but the police would catch them soon. The prom queen would be rescued and brought home safely. The culprit would go to jail, and that would be the end of the story.\n\nBesides, it's not like the culprit would go after [i]you[/i], right? You didn't do anything wrong! You were just trying to do your job!\n\n[i]When I signed up for prom committee, no one mentioned I'd become a potential target for crazy kidnappers...[/i] you think to yourself.\n\nIt all started with last week's prom committee meeting. As usual, you are...\n\n*choice\n #Early\n  As usual, you're early to the meeting. The meetings take place in Room 303 every Monday, ten minutes after school ends. Your locker is only a few spots away, so there's never any danger of you being late.\n\n  When you arrive, the only other people there are Vice-Principal Smothers and Jessica Moore. Jessica is doing something with the books in her backpack, while Smothers is sitting behind a desk, looking annoyed. That seems to be his default mood, ever since Principal Jones announced her retirement at the end of the year.\n\n  \"Hi,\" Jessica says. \"We missed you, last week.\"\n\n  \"Sorry I couldn't make it,\" you say. \"What are you doing?\"\n\n  \"Trying to get these stupid books to all fit,\" Jessica says. \"I either need a bigger backpack or a smaller laptop.\"\n\n  \"No using computers at school without permission,\" Vice-Principal Smothers says automatically.\n\n  \"I'm not using it. I'm putting it in my backpack,\" Jessica says, annoyed.\n\n  Smothers frowns at her disrespectful tone, but he doesn't say anything.\n\n  A few minutes later, Mallory slips in the door. Both the guys come in together, as usual. Alejandro is laughing his head off at some joke that Steve just told. When they see Vice-Principal Smothers, their laughter gets even louder.\n\n  Smothers checks his watch. \"It's 3:10. Is everyone here?\" he asks.\n\n  \"Bruce isn't,\" you say.\n\n  \"I think I saw him talking to Brittany or something,\" Steve says.\n\n  \"He shouldn't be [i]talking[/i] when we have a [i]meeting[/i],\" Smothers says. \"I expect members of a school committee to be a little more responsible than that.\"\n\n  Needless to say, Smothers is unhappy when Bruce shows up five minutes late.\n\n  *goto 1_1\n #Late\n  You're late, as usual. It's not that you don't [i]care[/i] about prom, it's just that...okay, maybe you don't care all that much about prom. The only reason you joined the prom committee is because you were pressured into doing it, by your best friend Elena. She would [i]not[/i] take \"no\" for an answer.\n\n  \"You [i]have[/i] to be on the prom committee!\" she says. \"How else are we going to have the best prom ever?\"\n\n  \"I think the school can put on a prom without me,\" you say.\n\n  \"But your mom works at that party supplies store!\" Elena says. \"She can get us streamers for super cheap.\"\n\n  \"Maybe,\" you say. \"I can ask, but...\"\n\n  \"But what?\"\n\n  \"But I don't have to join the prom committee to do that,\" you say. \"I could just volunteer Mom's help.\"\n\n  Elena groans. \"Why don't you want to be on prom committee?\"\n\n  [i]Because it's your idea, not mine?[/i] you think to yourself. Out loud, you say, \"I don't have time to join a committee and go to meetings every week.\"\n\n  \"It won't take up that much of your time,\" Elena promises. \"Please, please, [i]please?[/i]\"\n\n  This is going beyond the normal realm of begging. \"If it matters that much to you, why aren't [i]you[/i] on the prom committee?\" you ask.\n\n  \"I'm ineligible, because I'm in the running for prom queen,\" she says.\n\n  \"Ah.\" That explains why she cares so much. She clearly wants you...\n\n  *choice\n   #To make sure she becomes prom queen\n    \"You want me to make sure you become prom queen, don't you?\" you ask.\n\n    \"I'm not asking you to cheat, if that's what you're asking,\" Elena says. \"I just want you to make sure no one [i]else[/i] cheats. Remember the year that Thomas triplets were on the prom committee?\"\n\n    \"Not really,\" you say. That was, what, three years ago?\n\n    \"All three of them were on the committee, and they were the final three choices on the ballot,\" Elena says. \"Totally fishy. I want you to make sure nothing underhanded like that happens again.\"\n\n    \"Well, if it means that much to you...sure,\" you say.\n\n    \"Thank you, [i]thank you[/i]!\" Elena says, hugging you.\n\n    *page_break\n    *goto 1_2\n   #To ensure the prom isn't a disaster, if she wins\n    \"You want me to make sure prom isn't a total disaster,\" you say.\n\n    \"Exactly,\" Elena says. \"What if I become prom queen, and the dance ends up being a complete failure? It'd ruin the whole night!\"\n\n    \"And what if I'm on the committee, but you don't become prom queen?\" you ask.\n\n    \"Then I get an amazing prom either way,\" Elena says. \"It's a win-win scenario! Come on, you know you're perfect for this party planning stuff!\"\n\n    You shake your head, fairly certain that you'll never hear the end of it, if you don't sign up for prom committee immediately.\n\n    *page_break\n    *goto 1_2\n\n*label 1_2\nThat was several months ago. Today, you're late for a prom committee meeting. By the time you enter the room, everyone else is already there. The room falls silent, and a few people turn to look at you.\n\n\"You're late,\" Vice-Principal Smothers says. \"That's the third time this month.\"\n\n\"Sorry,\" you mumble.\n\n\"What was that?\" Smothers asks sharply.\n\nHow do you respond?\n\n*choice\n #Apologize\n  \"I'm sorry, Mr. Smothers,\" you say. \"It won't happen again.\"\n\n  \"That's Vice-Principal Smothers, not [i]Mr.[/i] Smothers,\" Smothers says, crossing his arms. \"Don't forget, I have the ability to remove you from this committee if you do not properly fulfill your duties.\"\n\n  \"I'm only five minutes late,\" you say.\n\n  \"Punctuality is important,\" Vice-Principal Smothers says. \"What would happen if you showed up late for your wedding? Your spouse will assume you stood them up at the altar, and they'd run away in tears! Do you want to destroy your marriage like that?\"\n\n  You're [i]pretty[/i] sure you'd never marry someone who'd run away after five minutes, but you're smart enough not to say this to Vice-Principal Smothers' face. \"No, sir.\"\n\n  \"In fact, there was a class a few years ago, where—\" Smothers launches into a boring lecture about a group of students who assumed class was cancelled, because the teacher was ten minutes late. The entire class was put into detention, where they learned a valuable lifelong lesson about punctuality. You suspect Smothers made up the story on the spot. Even if the Smothers' story is true, you know one person who did [i]not[/i] learn his lesson about showing up on time...\n\n  \"What's up, my dudes?\" a voice calls.\n  *goto 1_1\n  \n #Make up an excuse\n  \"Sorry. My English teacher wanted to talk to me after class about a book report,\" you say.\n\n  Your excuse isn't entirely false. It's just that meeting happened last week, not today.\n\n  Vice-Principal Smothers looks like he doesn't quite believe you. \"And what did your teacher have to say?\"\n\n  \"She wants me to pick a different book to read,\" you say. \"She thinks the one I chose is 'too easy'.\"\n\n  \"Oh, yeah, I had Mrs. Kim last semester,\" Mallory says. \"She does that to everyone who picks a book that's under 200 pages.\"\n\n  \"Is that what her problem is?\" you ask.\n\n  \"Uh huh. I know 'cause I got the same book, but the large print edition,\" Mallory shrugged. \"When Mrs. Kim saw how big it was, she approved it.\"\n\n  Vice-Principal Smothers has exchanged his look of skepticism for a look of annoyance. You strongly suspect that once the committee meeting is over, he's going to warn Mrs. Kim that students have found a way to game her system. But hey, at least he's not angry with you anymore.\n\n  Grateful to Mallory for her help, you take a seat next to her. Mallory doesn't seem to notice, since her attention is on her phone.\n\n  The door slams open. \"Dudes!\" a voice calls.\n  *goto 1_1\n\n #Tell Vice-Principal Smothers to chill out\n  \"Chill out. It's no big deal,\" you say.\n\n  \"I beg your pardon!\" Smothers says.\n\n  Steve laughs. \"Ah, lighten up! It's not like you're the last one here!\"\n\n  Smothers crosses his arms. \"Hmph. I suppose you're right. Mr. Wilkins has yet to appear. But just because someone else is tardy, that doesn't give you the right to be late, too.\"\n\n  You flash a grateful smile at Steve, and he winks back at you. You take a seat in between Jessica Moore and Mallory Ramsey. As usual, Mallory is playing on her phone. She doesn't seem to have noticed the situation at all.\n\n  \"Where is Bruce, anyway?\" you wonder.\n\n  \"No idea,\" Jessica says. \"Knowing him, he'll probably—\"\n\n  That's when the door opens, and Bruce strolls in.\n  *goto 1_1\n\n*label 1_1\n*page_break\n\"Finally, he arrives,\" Vice-Principal Smothers says. \"You're late, Mr. Wilkins.\"\n\n\"Not by my watch,\" Bruce says.\n\n\"You're not wearing a watch,\" Jessica points out.\n\n\"The only watch I need is in here,\" Bruce says, tapping his forehead.\n\n\"Then perhaps you should take your brain to a repair shop,\" Smothers says. \"Did you forget that we need [i]all[/i] the committee members here today? Now sit down, so we can take roll.\"\n\n\"Why?\" Bruce asks. \"Everyone's here already. It's not like there's—\"\n\n\"Sit down!\" Smothers snaps.\n\nYou notice Bruce purposely takes his time, picking out a chair and sitting down. Smothers clears his throat and calls roll. \"Alejandro Gomez?\n\n\"Here,\" Alejandro says.\n\nAlejandro is one of the school's foreign exchange students. He's from Spain, with dark skin and even darker blue eyes. You don't know much about him, since he generally keeps to himself. You haven't had any interactions with him, outside of the prom committee.\n\n\"Jessica Moore?\"\n\n\"Here,\" Jessica says.\n\nShe might not be prom queen material, but Jessica would win your vote for \"most likely to succeed after graduation\". In fact, she already has a job lined up after graduation, with an international corporation.\n\nJessica [i]loves[/i] businesses. She's the only high schooler you know who follows the stock market. She tends to dress formally, with ironed pants, blazers, and her hair in a bun. Half the time, it looks like she's on her way to a job interview. While some people might be turned off by her professional look and attitude, you've found her to be a generally nice person. She's definitely your first pick to partner with, whenever there's a group project.\n\nSmothers calls your name next, and I just now realized that I don't know your name or gender yet. How terribly rude of me not to ask you sooner. What is your gender? \n\n*choice\n #Male\n  *set gender \"male\"\n  *set J_first \"Junshi\"\n  *set J_he \"she\"\n  *set J_him \"her\"\n  *set J_his \"her\"\n  *goto gender_picked\n #Female\n  *set gender \"female\"\n  *set J_first \"Junshiro\"\n  *set J_he \"he\"\n  *set J_him \"him\"\n  *set J_his \"his\"\n  *goto gender_picked\n #Pick for me\n  You want me to pick a gender for you? Okay.\n  *temp random_gender\n  *rand random_gender 1 2\n  *if random_gender=1\n   In that case, you are male.\n   *set gender \"male\"\n   *set J_first \"Junshi\"\n   *set J_he \"she\"\n   *set J_him \"her\"\n   *set J_his \"her\"\n   *goto gender_picked\n  *if random_gender=2\n   In that case, you are female.\n   *set gender \"female\"\n   *set J_first \"Junshiro\"\n   *set J_he \"he\"\n   *set J_him \"him\"\n   *set J_his \"his\"\n   *goto gender_picked\n\n*label gender_picked\nAnd what is your name?\n*if (gender=\"female\")\n *choice\n  #Akimi Karashi\n   *set first_name \"Akimi\"\n   *set last_name \"Karashi\"\n   *goto name_picked\n  #Victoria Miller\n   *set first_name \"Victoria\"\n   *set last_name \"Miller\"\n   *goto name_picked\n  #Katie Henderson \n   *set first_name \"Katie\"\n   *set last_name \"Henderson\"\n   *goto name_picked\n  #Pick your own name\n   *goto name_choice\n*if (gender=\"male\")\n *choice\n  #Akira Karashi\n   *set first_name \"Akira\"\n   *set last_name \"Karashi\"\n   *goto name_picked\n  #Billy Butler\n   *set first_name \"Billy\"\n   *set last_name \"Butler\"\n   *goto name_picked\n  #Michael Nickerson\n   *set first_name \"Michael\"\n   *set last_name \"Nickerson\"\n   *goto name_picked\n  #Pick your own name\n   *goto name_choice\n*label name_choice\nWhat is your [b]first[/b] name?\n*input_text first_name\nAnd what is your [i]last[/i] name?\n*input_text last_name\nSo your name is $!{first_name} $!{last_name}. Is that correct?\n*choice\n #Yes\n  *goto name_picked\n #No\n  Then let's pick a different name for you.\n  *goto name_choice\n\n*label name_picked\n*if (first_name=\"Wilberforce\") and (last_name=\"Smothers\")\n *achieve nametwin \n *goto achievement_check_over\n*elseif (first_name=\"Steve\") and (last_name=\"Stevens\")\n *achieve nametwin \n *goto achievement_check_over\n*elseif (first_name=\"Bruce\") and (last_name=\"Wilkins\")\n *achieve nametwin \n *goto achievement_check_over\n*elseif (first_name=\"Alejandro\") and (last_name=\"Gomez\")\n *achieve nametwin \n *goto achievement_check_over\n*elseif (first_name=\"Jessica\") a ore impartial.\"\n\nYou say...\n\n*choice\n #Give Steve a chance \n  \"Give Steve a chance,\" you say. \"He's been working on the committee all year. He deserves to vote, no matter who's on the ballot.\"\n\n  \"Exactly!\" Steve says. \"It's not a conflict of interest that I know Nancy. She knows, like, everybody in the school.\"\n\n  \"I'd say dating her is a little bit more than just [i]knowing[/i] her,\" Jessica says.\n\n  \"Aw, c'mon! It's not like I joined the committee to help her win prom queen or anything!\"\n\n  \"When did the two of you start dating?\" Jessica asked.\n\n  \"I know what you're getting at, and no, we didn't start dating until [i]after[/i] I joined the committee,\" Steve says. He smiles. \"So she's totally innocent!\"\n\n  Jessica mouths the words \"convenient timing\", but Steve doesn't seem to notice.\n  *goto 1_4\n #Pick someone else\n  \"We can't rig the prom queen vote in Nancy's favor,\" you say. \"Letting her boyfriend vote is practically guaranteeing that she'll win.\"\n\n  \"That could be why she started dating Steve in the first place,\" Jessica says.\n\n  \"You're making her sound sneaky and devious,\" Steve says. \"She's not like that! She would never date me, just to help her chances of becoming prom queen!\"\n\n  \"Yeah, if she [i]really[/i] wanted to rig the vote, she would have flirted with all the guys, not just Steve,\" Alejandro says. \"She hasn't talked to me. What about you, Bruce?\"\n\n  Bruce chuckles. \"Normally, I'd say it'd be hard to find a cheerleader on the squad who [i]doesn't[/i] flirt with me,\" he says. \"But in this case, yeah. Nancy hates my guts. Hasn't talked to me in months.\"\n\n  *if (gender=\"male\")\n   \"What about you, $!{first_name}?\" Bruce asks. \"Has Steve's girlfriend been making moves on you?\"\n\n   \"No, because if a cheerleader tried to seduce me, I'd probably run screaming in the other direction\" would be the honest answer. Instead, you say, \"No. Definitely not.\"\n\n   \"See?\" Steve say te words without apostrophes, but whatever.\n*line_break\n2. Apostrophes are used to indicate possession. When I say \"Elena's purse\", the \"apostrophe s\" means the purse belongs to Elena.\n*line_break\n3. Just to make things confusing, \"apostrophe s\" is a contraction for is. So \"Elena's getting Elena's purse\" means \"Elena is getting the purse that belongs to Elena.\"\n*line_break\n4. I bet $50 bucks that the final is going to have a question about \"its\" and \"it's\", because the teacher wouldn't shut up about it, today. \"It's\" means \"it is\", and \"its\" means \"belonging to it\".\n*line_break\n5. Ditto for \"your\" and \"you're\".\n\n[i]Periods[/i]\n\n1. A period is used at the end of a sentence. Duh.\n*line_break\n2. A period is used at the end of \"Mr.\", \"Dr.\", \"Mrs.\" and other titles. It's because they're short for other words, only people don't use the longer words anymore, so what's the point?\n*line_break\n3. You use periods after the numbers, on a bulleted list. Like I'm doing here.\n*line_break\n4. Periods are used as decimal points, because let's get our math confused with our English. Yeah. That's great.\n*line_break\n5. Three periods together are called an \"ellipsis\". You use them...to indicate a pause.\n\nThat's the end of your English notes. What do you want to do now?\n\n*choice\n #Read your Greek Mythology notes\n  *goto greek_notes\n #Read your history notes\n  *goto history_notes\n #Read your science notes\n  *goto science_notes\n #Go back to the start of your notebook\n  *goto start_of_screen\n\n\n*label greek_notes\n[i]Hercules[/i]\n\nHercules, also known as Heracles, was the child of Zeus and Alcmene. Zeus' wife Hera was furious that he had a child with another woman, and she spent most of Hercules' life tormenting him. She tried to kill him with various monsters, gave him fits of madness and punished him by forcing him to perform twelve labors for his nemesis, King Eurystheus. Mr. Sullivan indicated we have to remember all twelve of them for the final exam.\n\nHe slayed the Nemean Lion, a monster with claws that could cut through anything, and skin so thick, nothing could cut it. Hercules was clever enough to figure out a loophole to these rules, and he used the lion's claws to cut off its head. Similarly, Hercules slayed the hydra with arrows coated in the hydra's poisonous blood.\n\nThen, he caught the golden hind of Artemis and the Erymanthian Boar. He had to chase both monsters for a full year, before he caught them. He caught the Cretan bull, a giant monster on the island of Crete. He captured Cerberus, the three-headed dog that guards the land of the dead. He killed a three-headed giant named Geryon and took his cattle. Basically, half of his labors was fighting random monsters.\n\nIn order to kill the Stymphalian birds, he shook a magic rattle. That scared the birds so they flew away from him, and he shot them at a distance. He did the same basic thing with the mares of Diomedes, a bunch of wild horses that ate people. He fed Diomedes to them as a distraction.\n\nHercules' next labor was to clean the Augean stables in a single day, which was supposed to be impossible, because there were three thousand cows there. He picked up two rivers and ran them through the stables to wash them. He stole the girdle from Hippolyta, the warrior queen of the Amazons. His last labor was stealing the golden apples of the Hesperides. The tree was guarded by a fearsome dragon, but Hercules had more trouble finding the island than defeating the dragon.\n\n\n[i]Jason and the Argonauts[/i]\n\nKing Pelias conquered Thessaly and killed the entire royal family, except for Queen Alcimede, who was pregnant. After she gave birth to Jason, she had him secretly sent away and told Pelias that the baby died in childbirth. Jason returned as an adult, and Pelias agreed to give the throne back to him, if he captured the golden fleece.\n\nJason and a group of other heroes sailed across the sea on a ship called the Argo. Jason and the Argonauts had many adventures along the way. They fought harpies and sirens. They killed a mechanical giant named Talos, whose weak point was a nail connected to his only blood vessel. On Doliones, they were attacked by giants with six arms. They left on good terms with King Cyzicus, but they got lost at sea and landed back at Doliones, without knowing where they were. They got into a battle with the natives and accidentally killed their friend, the king.\n\nThey finally arrive in Colchis, where Jason had to perform three tasks to get the fleece. The local princess Medea fell in love with Jason and gave him potions, to help him survive the tasks. He captured fire-breathing oxen and plough a field with them, because Medea gave him a fireproof potion. He got past an unsleeping dragon, because Medea gave him sleeping potion. He defeated an army of skeleton warriors by throwing a rock behind them. The skeletons got confused and attacked each other, instead of Jason. Sounds to me like these skeletons were real boneheads.\n\n\n[i]Alcestis[/i]\n\nAlcestis was one of many princesses of Iolcus, along with Evadne, Acastus, Pisidice, Pelopia and Hippothoe. Her father, King Pelias, promised that she would marry the man who could yoke a lion and a boar to a chariot. Naturally, no one wanted to try this. The god Apollo yoked the animals, as a special favor to his friend, King Admetus, and so Admetus and Alcestis were married.\n\nLater on, Admetus was informed that he was going on a specific day, a week away. Again, the god Apollo helped him and proclaimed that Admetus would live, if he could find someone willing to die in his place. This led to a huge fight between Admetus and his elderly father Pheres, who refused to die in his place. Nobody else wanted to die for Admetus, and just when he became resigned to his fate, Alcestis accepted the god's offer.\n\nAdmetus and their children were heartbroken, to watch Alcestis die. The entire town mourned her death. Luckily, the warrior Hercules decided to visit that day. Hercules had a great time, completely unaware that Alcestis was dead. When he learned the truth, Hercules marched to the graveyard and wrestled Death. He brought Queen Alcestis back to life, as thanks for their friendship and hospitality over the years.\n\n\nWhat do you want to do now?\n\n*choice\n #Read your English notes\n  *goto english_notes\n #Read your history notes\n  *goto history_notes\n #Read your science notes\n  *goto science_notes\n #Go back to the start of your notebook\n  *goto start_of_screen\n\n\n\n*label history_notes\n\n[i]The first forty Presidents of the United States[/i]\n\n1.   George Washington\n*line_break\n2.   John Adams\n*line_break\n3.   Thomas Jefferson\n*line_break\n4.   James Madison\n*line_break\n5.   James Monroe\n*line_break\n6.   John Quincy Adams\n*line_break\n7.   Andrew Jackson\n*line_break\n8.   Martin Van Buren\n*line_break\n9.   William Henry Harrison \n*line_break\n10.  John Tyler\n*line_break\n11.  James Knox Polk\n*line_break\n12.  Zachary Taylor\n*line_break\n13.  Millard Fillmore\n*line_break\n14.  Franklin Pierce\n*line_break\n15.  James Buchanan\n*line_break\n16.  Abraham Lincoln\n*line_break\n17.  Andrew Johnson\n*line_break\n18.  Ulysses Simpson Grant\n*line_break\n19.  Rutherford Birchard Hayes\n*line_break\n20.  James Abram Garfield \n*line_break\n21.  Chester Alan Arthur\n*line_break\n22.  Grover Cleveland\n*line_break\n23.  Benjamin Harrison\n*line_break\n24.  Grover Cleveland\n*line_break\n25.  William McKinley\n*line_break\n26.  Theodore Roosevelt\n*line_break\n27.  William Howard Taft\n*line_break\n28.  Woodrow Wilson\n*line_break\n29.  Warren Gamaliel Harding\n*line_break\n30.  Calvin Coolidge\n*line_break\n31.  Herbert Clark Hoover\n*line_break\n32.  Franklin Delano Roosevelt\n*line_break\n33.  Harry S. Truman\n*line_break\n34.  Dwight David Eisenhower\n*line_break\n35.  John Fitzgerald Kennedy\n*line_break\n36.  Lyndon Baines Johnson\n*line_break\n37.
