andles. At least you [i]assume[/i] that's what she's doing. You can't see from the inside of the room. After a few moments, she says, \"Done. Let's go.\"\n\nAlejandro gives everyone a final glare, then leaves through the door. The last thing you see before it closes is the gleam of his knife.\n*finish\n", "route_2_chapter_10": "[b]Chapter 10[/b]\n\n*if chapter_7_where_to_go = \"teacher's lounge\"\n There isn't any time to waste. You, Elena and $!{J_nickname} have to leave the teacher's lounge--immediately. Smothers could come back at any second now.\n\n $!{J_nickname} turns left and runs down the hallway. You nod in approval. Splitting up is probably the best way to go, in this situation. That way, it's less likely Smothers can find and attack all of you, before the police arrive.\n\n It's only later that you learn $!{J_nickname} picked a less than noble hiding spot: the bathroom. In a way, it makes sense. The door is so loud, Smothers won't be able to enter without being heard. Still, it's a weird choice for a hiding spot. Not many heroic stories involve hiding in bathrooms.\n\n Your first instinct is to go as far away as possible, so you head straight for the gym. Elena follows after you, and as the door shuts, you hear Smothers' voice. \"Hello?\" he asks.\n\n Elena turns to you, face pale. \"Hide!\" you hiss.\n\n Elena dives for the closest hiding spot: underneath the stage. You go through the nearest doorway, which is for one of the small rooms that people first woke up in. You close the door behind you, just as Smothers opens the gym doors.\n\n \"Hello?\" he calls. \"Anyone here?\"\n\n Listening through the door, you hear him take several steps forward. He must be only a few feet away from the stage. You pray that Elena crawls backwards to hide herself from view, but...is there enough room under the stage? Can she crawl, without making any noise?\n\n \"You've got to come help me!\" Smothers pleads. \"Queen Cinderella just attacked Jessica! I barely managed to escape with my life. Please! $!{J_nickname}? $!{first_name}? Where are you?\"\n\n Smothers sounds sincere, but you know better. Even if he's innocent, and this is all a big misunderstanding, it's safer to remain hidden.\n\n Smothers starts walking again, and his voice becomes louder as he draws closer to you. \"We're in danger!\" he says. \"I can't be the only one left! $!{J_nickname}? $!{first_name}?\"\n\n You hold your breath. Smothers must be right outside your door, because you can hear him swear under his breath. \"Those stupid teenagers!\" he says. \"They must be hiding near the teacher's lounge! When I find them, I'll take care of them...[i]permanently[/i].\"\n\n You hear Smothers walk away and open the gym doors, but you don't move. A few long seconds later, you hear the gym doors close, and you let out a sigh of relief.\n *goto I_am_making_a_separate_scene_just_for_one_line\n*else\n \"We have to hide, [i]now[/i],\" Jessica says. She throws open the door to the teacher's lounge. \"If Elena's right, Smothers knows she's in here, and he's not gonna let us save her.\"\n\n Elena and $!{J_nickname} rush out the door. \"I'll go this way!\" $!{J_nickname} says. $!{J_he} turns left and runs down the hallway.\n\n Jessica grabs Elena's arm and pulls her right. \"We should go the other way,\" she says.\n\n \"We should stick together,\" Elena protests.\n\n \"We have to split up,\" Jessica says. \"He can't find [i]all[/i] of us before the police come!\"\n\n It's only later that they learn $!{J_nickname} picked a less than noble hiding spot: the bathroom. In a way, it makes sense. The door is so loud, Smothers won't be able to enter without being heard. Still, it's a weird choice for a hiding spot. Not many heroic stories involve hiding in bathrooms.\n\n Jessica and Elena head for the gym. Jessica starts to explain that they should hide in the room she first woke up in, because it's the last place Smothers will look for them. Her explanation is cut off, by a voice from the other side of the door.\n\n \"Hello?\"\n\n \"It's Smothers!\" Jessica says. She pushes Elena towards the closest door, glances around desperately, then drops to the ground and crawls under the stage. She just about gets herself all the way under, when Smothers opens the gym doors.\n\n \"Hello?\" he calls. \"Anyone here?\"\n\n Jessica freezes, unsure if she should risk making a sound by going further under the stage. [i]If only I was facing the other direction![/i] she thinks. [i]I could trip Smothers as he passes by![/i]\n\n Smothers takes several steps towards the center of the gym. \"You've got to come help me!\" he pleads. \"Queen Cinderella just attacked $!{first_name}! I barely managed to escape with my life. Please! $!{J_nickname}? Jessica? Where are you?\"\n\n Jessica slowly drags her legs underneath her, while Smothers is talking, desperately hoping that the sound of his voice will muffle any noise she makes. It seems to work, and she's now better hidden. Not [i]completely[/i] hidden. Just better hidden.\n\n Smothers starts walking again, and his voice becomes slightly fainter as he walks away from Jessica. \"We're in danger!\" he says. \"I can't be the only one left! $!{J_nickname}?! Jessica?!\"\n\n He sounds sincere. Is it possible there's a mistake somewhere? What if Elena lied?\n\n After a few moments of silence, Smothers mutters angrily. Jessica hears him walking quickly to the gym doors. He opens them and calls out their names one more time, before leaving. At least, Jessica [i]hopes[/i] he left. He could have pretended to leave, just to lure them out of hiding. She doesn't dare turn around to look.\n *goto I_am_making_a_separate_scene_just_for_one_line\n\n\n*label I_am_making_a_separate_scene_just_for_one_line\n*page_break\nThe police show up, shortly afterwards. Smothers keeps up his act of being an innocent victim, until they slip a pair of handcuffs on him. At that point, Smothers completely loses it and starts cursing out every single student in the entire school. This, and Elena's earlier statements, are more than enough evidence to have Smothers arrested.\n\nIt takes a while to reconstruct the exact series of events. Elena returned to school around four o'clock, to talk with Derek. They talk for about a half hour, and she stays behind.\n\nIncidentally, Derek heard that Elena was missing, and deliberately decided [i]not[/i] to tell anyone, for fear that he'd be accused. The fact that he cares more about his own comfort than Elena's safety makes you all the more convinced that he was all wrong for Elena.\n\nAround five o'clock, Elena's parents came home and found her missing. They raised the alarm immediately, and Vice-Principal Smothers talked to the police shortly before six. Somewhere between six and seven o'clock, Smothers discovered Elena and knocked her out.\n\nIn order to mask Elena's true location, Smothers dropped her backpack by the side of the highway and hid her car. He spent most of the next day preparing for the group kidnapping, which mainly involved setting up touchscreen locks and reprogramming the doors in the gym with new instructions. Only one person noticed that Smothers seemed preoccupied that day; when questioned, he explained his odd behavior as concern for Elena.\n\nSmothers was instrumental in getting all school activities cancelled for the day; he knew that an empty school would make it easier for him to pull off his crime, undetected.\n*page_break\nIt was easy enough for Smothers to summon the prom committee members to his office. He only pretended to fall victim to the knockout gas, having taken an antidote in advance. After that, he loaded everyone's bodies onto a gardening cart, covered them with a tarp, and took all of you to the gym.\n\nOnce everyone was in their respective rooms, he faced a choice: he could either try to get Alejandro or leave the seventh room empty. According to his watch, he had about eleven minutes left before the first person would wake up. Smothers decided to risk it. Smothers accidentally got $!{J_nickname} instead of Alejandro, but he didn't have enough time to correct the mistake. It was either $!{J_nickname} or no one, and Smothers went with $!{J_nickname}.\n\nSmothers got $!{J_nickname} inside the room with a minute to spare. He entered his own room and triggered all the touchscreen locks with the press of a button. Then he waited for the games to begin.\n\n\"I thought only half of the students would solve their puzzles,\" Smothers admits. \"That was the plan. Half of them lose in round one, the other half lose in round two, leaving me as the winner who saves Elena. If I saved her, no one would suspect me of being the real kidnapper. Of course, it didn't work out like that.\"\n\nSmothers had originally planned to give the messages from \"Queen Cinderella\" over the PA system, but he figured that might be too much of a giveaway. He hid the intercom switch inside the cafeteria's kitchen, but never expected anyone to actually find it.\n\n\"That group was supposed to run out of time and get trapped inside the room,\" Smothers said. \"It wouldn't have been a big loss, because the [i]real[/i] clue was the phone in the storage room. But I was, ah, nervous that no one had been eliminated yet, so I decided to...move things along.\"\n\n*if chapter_5_knocked_out = \"true\"\n Smothers snuck across the gym, into the kitchen. He knocked out Bruce and you, for no reason other than the fact that you were both close to the door. You've heard about being in the wrong place at the wrong time before, but that seems like terrible luck on your part.\n\n *goto I_am_making_a_separate_scene_just_for_one_line_2\n*else\n Smothers snuck across the gym, into the kitchen. He knocked out Bruce, who was more or less doomed to be the first casualty, since he is Smothers' least favorite student. \"I tried to give him the hardest puzzle,\" Smothers says. \"I don't know how he solved it. Maybe he's just a lucky guesser.\"\n\n *goto I_am_making_a_separate_scene_just_for_one_line_2\n\n*label I_am_making_a_separate_scene_just_for_one_line_2\nSmothers was caught, when he made it back to the storage room. Mallory saw him, coming inside. She confronted him immediately, but after knocking out Bruce, Smothers had no reservations about knocking out teenagers. He knocked her out, and when the noise startled Steve, he knocked Steve out, too.\n\nAs a result, only you, $!{J_nickname}, Jessica and Smothers made it to the third and final round, which was getting Elena from the teacher's lounge. \"I was surprised they got the right room on the first try,\" Smothers confesses. \"I thought it would have taken them several attempts to get it. I even had a clever back-up plan to keep the game going, in case they failed.\"\n*page_break\n*if chapter_7_where_to_go = \"teacher's lounge\"\n Smothers' purposely chose to be on the team that wasn't going to the teacher's lounge, as a bluff. He knocked Jessica out, planning to blame Queen Cinderella for the attack. It was one final trick, to ensure that the authorities would search for an outside culprit.\n\n *goto I_am_making_a_separate_scene_just_for_one_line_3\n*else\n Smothers' purposely chose to be on the team that wasn't going to the teacher's lounge, as a bluff. He knocked you out, planning to blame Queen Cinderella for the attack. It was one final trick, to ensure that the authorities would search for an outside culprit.\n\n *goto I_am_making_a_separate_scene_just_for_one_line_3\n\n*label I_am_making_a_separate_scene_just_for_one_line_3\nLittle did he know that Elena had seen him, when he first grabbed her. From the very beginning, Smothers' plot to kidnap the prom queen had been doomed to failure. There was no way he could have arranged things, to avoid Elena instantly identifying him as the culprit.\n\nAs for [i]why[/i] Smothers went through so much trouble to torture some teenagers, it was clear that something terrible like this was on his mind, ever since he was passed over for a promotion, for the fourth and last time. You can't blame the school board for picking someone other than Smothers to be the principal, but you can't exactly blame him for assuming he'd get the job, after decades as vice-principal.\n\nDoes that justify him getting upset? Yes. Does that justify kidnapping seven students and forcing them to play a weird game? No. Smothers will be lucky if he sees the outside of a jail cell, at any point during the rest of his life.\n\nSo much for Smothers. Is there anyone else you want to learn about?\n\n*choice\n *hide_reuse #Alejandro\n  *goto Alejandro\n *hide_reuse #Bruce\n  *goto Bruce\n *hide_reuse #Elena\n  *goto Elena\n *hide_reuse #Jessica\n  *goto Jessica\n *hide_reuse #$!{J_nickname}\n  *goto Jun\n *hide_reuse #Mallory\n  *goto Mallory\n *hide_reuse #Steve \n  *goto Steve\n *hide_reuse #No one\n  *goto end\n \n\n*label main_menu\nWho else do you want to hear about?\n\n*choice\n *hide_reuse #Alejandro\n  *goto Alejandro\n *hide_reuse #Bruce\n  *goto Bruce\n *hide_reuse #Elena\n  *goto Elena\n *hide_reuse #Jessica\n  *goto Jessica\n *hide_reuse #$!{J_nickname}\n  *goto Jun\n *hide_reuse #Mallory\n  *goto Mallory\n *hide_reuse #Steve \n  *goto Steve\n *hide_reuse #No one\n  *goto end\n\n\n*label Alejandro\nThe next time you see Alejandro is at prom committee on Monday.\n\n\"So, um...I heard about everything,\" Alejandro says. \"Sorry you all had to go through that. Good thing I wasn't in my room that day, huh?\"\n\n\"Where [i]were[/i] you?\" Mallory asks.\n\n\"I had, um...a date,\" Alejandro says. \"Yeah. A date. I was with a girl.\"\n\n\"There was a kidnapper on the loose, everyone in school was in danger, and you got summoned to the Vice-Principal's office,\" Jessica summarizes. \"With all that going on, you ditched school to go on a [i]date[/i]?\"\n\n\"Makes sense to me,\" Bruce says.\n\n\"Shut up, Bruce!\" Jessica says.\n\n\"Okay, I was with Claudia,\" Alejandro says. \"She was scared she would be kidnapped next, and she didn't want to be alone, so I...went to be with her. Happy now?\"\n\n\"I didn't know he was dating Claudia,\" Steve says.\n\n\"It's not [i]dating[/i] dating,\" Alejandro says. \"I mean, it's not romantic or anything, and it never will be. It's just...complicated.\"\n\n\"All right, then,\" you say. \"Keep your secrets. I don't need to know about your love life.\"\n\n*goto main_menu\n\n*label Bruce\nBruce tracks you down the next day. \"Hey,\" he says. \"I'm sorry about what happened.\"\n\nThere are a lot of things he could be apologizing for. \"Sorry, but you'll have to be more specific,\" you say.\n\n\"I'm sorry you got kidnapped,\" Bruce says.\n\nThat's a minor surprise. \"It's not your fault I was kidnapped,\" you say. \"It was Smothers who did it, not you.\"\n\n\"Yeah, but it's [i]my[/i] fault he was so angry,\" Bruce says. \"I've been messing with him all year. It's been like a game to me, you know? Seeing how far I can push Smothers until he explodes.\"\n\n\"Is [i]that[/i] why turned in a blank ballot during the prom queen vote?\" you ask. \"Just to make Smothers mad?\"\n\n\"Nah, that was because I didn't know who to vote for,\" Bruce says. \"But when Smothers asked me about it? Yeah, I was just screwing with him. If I had known he was going to go psycho and kidnap us all, I never would have done it.\"\n\n\"You couldn't have known that,\" you say.\n\n\"Will you just accept my apology, instead of arguing with me?\" Bruce snaps. \"I made a mistake, being such a huge jerk to Smothers. I've kind of been a huge jerk to everyone, so I'm sorry, now you can forget about it and leave me alone!\"\n\nBruce walks away angrily. \"You're forgiven!\" you shout at his retreating back. He waves him hand in thanks, but doesn't turn around to keep talking to you.\n\n*goto main_menu\n\n*label Elena\n*if chapter_7_where_to_go = \"teacher's lounge\"\n *if gender = \"male\"\n  *goto elena_with_shipping\n *else\n  *goto elena_without_shipping\n*else\n *goto elena_without_shipping\n\n*label elena_without_shipping\n\"Don't bother calling me for the next week,\" Elena says. \"My parents have grounded me.\"\n\n\"Because you tried to run away from home?\" you ask.\n\n\"I didn't run away from home!\" Elena says. \"I just left home without telling anyone where I was going...and stayed out for two and a half hours.\"\n\n\"You forgot to mention you were meeting with your terrible ex-boyfriend who you've been forbidden to see,\" you say.\n\n\"Okay, fine, maybe I deserve to be grounded, but I thought they'd go easy on me,\" Elena says. \"It's not like secretly meeting your ex is the [i]worst thing ever[/i].\"\n\n\"I totally get why your parents are overreacting, though,\" you say. \"When I thought you were kidnapped for real...I was terrified. I thought I lost my best friend forever. It was the worst moment of my life.\"\n\n\"Even worse than being kidnapped yourself?\" Elena asks.\n\n\"What Smothers put us through was honestly not that bad,\" you say. \"He forced us to solve dumb school puzzles for, like, fifteen minutes. That's way better than being tied up all day, waiting for your kidnapper to return.\"\n\n\"I guess...\" Elena says. She's silent for a moment, then looks at you. \"Are you having nightmares about it?\"\n\n\"Yeah,\" you admit. \"I haven't had a good night of sleep, ever since. Hopefully the nightmares will be gone, by the time prom comes around.\"\n\n\"Hopefully I'll get to [i]go[/i] to prom,\" Elena says. \"I might be the first prom queen who had to miss her own prom, because she was grounded.\"\n\n*goto main_menu\n\n*label elena_with_shipping\n\"Don't bother calling me for the next week,\" Elena says. \"My parents have grounded me.\"\n\n\"Because you tried to run away from home?\" you ask.\n\n\"I didn't run away from home!\" Elena says. \"I just left home without telling anyone where I was going...and stayed out for two and a half hours.\"\n\n\"You forgot to mention you were meeting with your terrible ex-boyfriend who you've been forbidden to see,\" you say.\n\n\"Okay, fine, maybe I deserve to be grounded, but I thought they'd go easy on me,\" Elena says. \"It's not like secretly meeting your ex is the [i]worst thing ever[/i].\"\n\n\"I totally get why your parents are overreacting, though,\" you say. \"When I thought you were kidnapped for real...I was terrified. I thought I lost my best friend forever. It was the worst moment of my life.\"\n\n\"But I'm back now,\" Elena says simply. \"You saved me.\"\n\n\"Yeah...are we going to talk about that?\" you ask.\n\n\"I guess it depends,\" Elena says. \"Are you embarrassed that we kissed?\"\n\n\"I'm more confused than anything else,\" you say. \"I mean, are we still best friends? Do you still like me? Is it weird that we kissed?\"\n\n\"Oh, it's weird,\" Elena says. \"But that doesn't mean I didn't like it. You're a great guy, $!{first_name}. Any girl would be lucky to date you. If you need someone to go to prom with...let me know, okay?\"\n\nYou wrap your arm around Elena and squeeze her. \"That's assuming you're not still grounded by then,\" you say.\n\n*goto main_menu\n\n*label Jessica\nAt the next prom committee meeting, Jessica stands up. \"I don't know how to say this delicately, so I'm just gonna go ahead and say it,\" she says. \"The school is thinking about cancelling prom.\"\n\n\"What?\" Steve asks. \"Why?\"\n\n\"Because seven students and a teacher were kidnapped over it, doofus,\" Mallory says.\n\n\"There's also the problem that we lost our faculty advisor,\" Jessica says. \"Someone's going to have to step up and take control of things, or we lose prom this year.\"\n\n\"But aren't [i]you[/i] the one who's in control of things?\" Mallory asks. \"You're the head of the prom committee.\"\n\n\"Not anymore,\" Jessica says. \"I'm not going to prom this year. I...I don't think I can handle the memories.\"\n\n\"You can't quit,\" you say. \"You're the only one of us who knows what they're doing!\"\n\n\"Look, I can try to set things up for prom, but I can't actually [i]go[/i] to prom, okay?\" Jessica asks. \"After everything that happened, I...I can't do it.\"\n\n\"Me neither,\" Steve says. \"If it wasn't for my girlfriend, I'd have already quit the committee.\"\n\n\"Yeah, I was thinking of quitting, too,\" Mallory says. \"But I don't want to let down the rest of the school.\"\n\n\"Can we make Alejandro do everything?\" Bruce asks. \"He's the only one of us who wasn't kidnapped. He shouldn't have any hang-ups about it.\"\n\n\"Thanks for volunteering me,\" Alejandro says sarcastically.\n\n\"Please, Alejandro,\" Jessica says. \"You're the only one who can do it.\"\n\n\"Fine,\" he says, reluctantly.\n\nJessica hugs him.\n\n*goto main_menu\n*label Jun\nThe next time you see $!{J_nickname} is in the hallway at school. \"$!{J_nickname}!\" you cry.\n\n\"$!{first_name}!\" ${J_he} says happily. \"I...it's good to see you again.\"\n\n\"Yeah, it's too bad we don't have any classes together,\" you say. \"Hey, maybe you can give me your phone number, and we could--\"\n\n\"I'm sorry,\" $!{J_nickname} says seriously. \"But I cannot talk to you.\"\n\n\"What's wrong?\" you ask.\n\n\"My parents want me to return home to Japan,\" ${J_he} says. \"I leave tomorrow morning.\"\n\n\"[i]Really?[/i]\" you ask. \"But we were just--I mean--you explained to them that most kids in our country [i]don't[/i] get kidnapped, right?\"\n\n\"I'm not the only one going home,\" $!{J_nickname} says. \"Mr. Smothers was in charge of the foreign exchange student program. Now that he's been arrested...\"\n\n\"The program has been cancelled forever,\" you say. \"Well, shoot. I know we didn't know each other very long, but I'm gonna miss you.\"\n\n\"Me too,\" $!{J_nickname}. \"Maybe I can send you an email sometime?\"\n\n\"Sure,\" you smile.\n\n*goto main_menu\n\n*label Mallory\nYou expect Mallory to be distraught over everything that happened, but the next time you see her, she has a huge smile on her face. It's disturbingly huge, in fact.\n\n\"Are you sneaky about it. Don't let her know that's what you're doing.\"\n\nThat's an odd request, to say the least. \"Um...why?\" you ask.\n\n\"Because I'm going to propose, and I need to make sure the engagement ring will fit her,\" Steve says.\n\n\"What?!\" you shout.\n\n\"I know! It's amazing!\" Steve says. \"Being kidnapped made me realize there's no time to waste! I want to spend every second of the rest of my life with Nancy! You have to help me!\"\n\n\"No way,\" you say. \"I'm no expert, but I'm pretty sure getting married after a huge tragedy is a terrible idea.\"\n\n\"Why, do you hate weddings or something?\" Steve asks. \"It'll be great! We can get married at prom! Elena can be the maid of honor!\"\n\n\"Nobody gets married at prom!\" you say. \"I will have no part in this--are you [i]laughing[/i]?\"\n\nSteve can't hold back anymore. He bends over and laughs his head off. \"Gotcha!\" he says. \"You totally thought I was going to do it! This is--ha ha ha--hilarious!\"\n\n\"Glad to see [i]you're[/i] handling things well...\" you mutter.\n\n*goto main_menu\n\n\n\n*label end\n*achieve routetwo\n*set evidence_1_found false\n*set evidence_1 \"nothing\"\n*set evidence_2_found false\n*set evidence_2 \"nothing\"\n*set route_youre_on 0\n*set chapter_4_who_is_first \"none\"\n*set chapter_5_what_is_first \"nothing\"\n*set chapter_7_item_looked_at_first \"none\"\n*set route_3_mallory_unconscious false\n*set chapter_5_was_with_bruce_when_Mallory_was_attacked \"false\"\n*set chapter_7_where_to_go \"nowhere\"\n*set chapter_2_you_tell_elena \"false\"\n*set storeroom_back \"none\"\n*set storeroom_door \"none\"\n*set storeroom_side \"none\"\n*set chapter_5_knocked_out false\n*set route_2_done true\nThe last person to talk about is you. You're doing as well as can be expected, after the kidnapping. You still feel uncomfortable, every time you enter the school gym, but to be fair, gym class made you feel uncomfortable long before you were kidnapped. Luckily, your best friend Elena knows [i]exactly[/i] what you're going through, which is a major help.\n\n\"Do you regret joining the prom committee?\" Elena asks.\n\n\"I don't know,\" you say. \"You're the only reason I joined the committee to begin with.\"\n\n\"I know, and I'm sorry,\" Elena says. \"I shouldn't have forced you to do something you didn't really want to do, just to help me become prom queen.\"\n\n\"You don't have to apologize,\" you say. \"I don't blame you. I blame [i]Smothers[/i].\"\n\n\"But it's my fault you were there to begin with!\" Elena says. \"And the terrible part is, you didn't have to be! What if you had gotten killed because of me?\"\n\n\"What if I hadn't joined prom committee?\" you respond. \"You still would have won the prom queen election. You still would have been kidnapped. The only difference is that there would have been one less person looking for you.\"\n\n\"Do you think I still would have been saved, if you weren't there?\" Elena asks.\n\n\"I don't know,\" you say honestly. \"There are probably a hundred different ways that things could have played out differently, but I can't focus on what-ifs. All I know is that we're safe now, and I'm glad.\"\n\n\"Me, too,\" Elena says. \"I know you didn't choose it, but I'm glad you were one of the people who had a chance to save me. I'd much rather have [i]you[/i] work to rescue me than someone like Bruce.\"\n*page_break\n*if (route_1_done = \"false\") and (route_3_done = \"false\")\n *set end_clue_1 \"Anagram\"\n A few days later, you find a strange piece of paper in your locker. On it is written a single word: \"Anagram\".\n\n *goto end_clue_set\n*elseif ((route_1_done = \"true\") and (route_3_done = \"false\")) or ((route_1_done = \"false\") and (route_3_done = \"true\"))\n A few days later, you find a strange piece of paper in your locker. On it is written a single word: \"Acrostic\". That makes two pieces of paper you've received. \"Anagram\" and \"Acrostic\". What could it mean?\n\n *set end_clue_2 \"Acrostic\"\n *goto end_clue_set\n\n\n*elseif (route_1_done = \"true\") and (route_3_done = \"true\")\n *set end_clue_3 \"Come see me\"\n *goto_scene final\n*else\n *bug\n\n\n*label end_clue_set\n---\n\nYou've reached the end of the story, but it is not the end of the game! You can go back to the beginning and choose a different prom queen. This results in a whole new storyline with different puzzles and a different culprit. If you play through all the storylines, you get a bonus ending!\n\nBut if this is where you're going to stop, then we'd like to thank you for playing.\n\nWhat do you want to do?\n\n*choice\n #Go back to the beginning\n  *goto_scene chapter_1\n #Finish the game\n  *goto_scene final actual_end\n\n", "route_2_chapter_2": "[b]Chapter 2[/b]\n\nVice-Principal Smothers lays the six papers down on the teacher's desk. \"All right, let's count the votes,\" he says.\n\n\"Okay!\" Steve says. He reaches towards the votes, but Smothers slaps his hand away.\n\n\"[i]I[/i] will be reading these votes out loud, thank you very much!\" Smothers says. \"I want to ensure there is no cheating in this delicate matter.\"\n\n\"I wasn't going to cheat...\" Steve mutters.\n\nSmothers' fingers dance, as he moves his hand over the various papers. He picks one up at random. \"The first vote is for...no one?\"\n\nHe shows the paper to the room. Sure enough, the ballot is blank. \"Who didn't vote?!\" Smothers snaps.\n\nBruce groans. \"That was me,\" he admits.\n\n\"Why didn't you vote? It's your patriotic duty!\" Smothers says.\n\n\"I wanted to...to protest the idea of prom queens!\" Bruce says. \"It's outdated and sexist, and I refuse to be a party to such a degrading event! No girl should be forced to be a school's prom queen!\"\n\nThat's a surprising argument, coming from him. \"Really?\" you ask.\n\n\"Nah, not really,\" Bruce says. \"I couldn't think of anyone good, so I left it blank. I do the same thing with tests.\"\n\nThat explains his terrible grades.\n\n\"What do you mean, you couldn't think of anyone?\" Jessica asks. \"You didn't [i]have[/i] to think of anyone! The three nominees were already decided! All you had to do was pick the one you like best.\"\n\n\"Well, maybe I didn't like any of them, huh?\" Bruce says. \"It wouldn't have been fair to them if I voted, so I didn't.\"\n\n\"That's a stupid excuse,\" Jessica says. \"You just hate following rules!\"\n\n\"Maybe I just hate you!\" Bruce says.\n\n\"That was harsh,\" Mallory mutters, as Bruce and Jessica start yelling at each other. They don't stop, until Smothers threatens to throw them both in detention.\n*page_break\nThe vote tally continues. \"The second vote is for...Elena Adams,\" Smothers says. It's not your handwriting on that vote, so that means someone besides you voted for her. That's a good sign.\n\n\"Third vote...Elena Adams,\" Smothers says. That's an even better sign! Elena has two votes, and the other two candidates have zero. She's practically guaranteed to win, now.\n\nSmothers' forehead wrinkles in confusion. \"The fourth vote is...uh...\" He holds it up, for everyone to see. \"Can anyone read this person's handwriting?\"\n\nThat's [i]your[/i] handwriting! You slink down in chair, hoping no one will notice.\n\n\"Nancy?\" Steve guesses.\n\n\"Claudia?\" Alejandro says.\n\nSmothers squints at it. \"No, that's definitely an 'E', I think. Maybe.\"\n\nThis is embarrassing. You decide to...\n\n*choice\n #Admit it's your vote\n  \"That's my vote, okay?\" you say. \"I voted for Elena.\"\n\n  \"You don't know how to spell your best friend's name?\" Alejandro asks.\n\n  \"I [i]do[/i]!\" you say hotly. \"I was...I was just in a rush, okay? I didn't know anyone else would see these ballots!\"\n\n  Alejandro shakes his head at you. \"You gotta work on your penmanship,\" he says.\n\n  \"Or use a computer all the time,\" Mallory says. \"That's what [i]I[/i] do.\"\n\n  *goto 1_1\n #Pretend you can read it\n  \"I'm pretty sure that's a vote for Elena,\" you say. \"See how the second letter is the same height as the first letter? It's clearly an 'l'.\"\n\n  \"Yeah, but 'l' is the second letter in Claudia's name, too,\" Steve says.\n\n  \"'Claudia' has way more letters than 'Elena',\" you say. \"It's a five letter name with an 'l' in it, so it's Elena. Case closed!\" You fold your arms over your chest, to discourage further discussion.\n\n  \"I say we put that vote aside and come back to it at the end,\" Steve says.\n\n  \"We cannot discount two different votes, in a five-vote election!\" Jessica says. \"What's the point of even having a vote, if we're going to ignore half of them?\"\n\n  \"I agree with Jessica! This is getting a little too difficult for us,\" Mallory says. \"Maybe next time, there should be boxes for us to check off.\"\n\n  *goto 1_1\n\n*label 1_1\nSmothers sighs deeply and rubs his forehead. \"Could we get through the rest of the votes [i]without[/i] any drama? Please?\"\n\nIf Smothers doesn't like high school drama, he picked the wrong job.\n\nSteve throws up his hands. \"Why bother? Elena already won!\" he says. \"She's winning three to nothing, with two votes left!\"\n\n\"What do [i]you[/i] know about winning?\" Bruce asks. \"Your team lost every game this year!\"\n\n\"Shut up, Bruce!\" Steve says.\n\nSmothers makes an angry growling sound, then flips over the last two votes. \"One vote for Nancy, one vote for Elena, Elena wins,\" he says, as quickly as possible. \"Hooray. We're done. We have our new prom queen. I declare this meeting officially over. [i]Everyone go home[/i].\"\n\n\"Wait! We can't finish yet!\" Jessica says. \"Who tells Elena the good news?\"\n\n*choice\n #Volunteer to do it yourself\n  *set chapter_2_you_tell_elena true\n  \"Can [i]I[/i] tell her?\" you ask. \"She's my best friend.\"\n\n  \"Technically, [i]I'm[/i] supposed to do it,\" Jessica says, \"since I'm the head of the prom committee.\"\n\n  \"No, [i]I'm[/i] the head of the committee!\" Smothers says, in a savage voice. Everyone is so surprised by his viciou n who says they saw her after school. Maybe you--\"\n\n\"She was kidnapped, right after talking to me?\" you ask.\n\n\"We don't know that yet,\" Officer Drew says. \"Why don't you tell us what you said to her, and we can figure out our next step from there?\"\n\n*choice\n #Recap the conversation\n  *goto 1\n #Accuse Claudia\n  \"Claudia Barrett did it,\" you say. \"She was there, when I talked to Elena. She's mad that Elena was picked as prom queen, instead of her.\"\n\n  \"Pretend we don't know anything about high school politics, and start at the beginning,\" Officer Drew says.\n\n  *goto 1\n\n*label 1\nYou tell the officers what happened that day. It's not until much later, when the entire affair is over, that you learn that the officers already talked to Vice-Principal Smothers. They're just using you to confirm information they already know.\n\nThey're not the only ones trying to get information. You try to learn as much as you can from them. It turns out that Elena never made it home, after she talked to you. The police are unofficially treating it as a missing persons case.\n\n\"But she [i]is[/i] missing, right?\" you ask.\n\n\"We won't know for sure, until we finish our preliminary investigation,\" Officer Hardy says.\n\n\"But you're already investigating!\" you say. \"That means you have reason to believe something bad happened to her, right?\"\n\n\"We can't say,\" Officer Hardy says.\n\nUgh, he sounds like Smothers, refusing to reveal the results of the prom queen vote. Why would Elena go missing, if there's no foul play involved? You try your hardest to remember, but there is no new information to be found in your memory. The last time you saw Elena, she was headed in the general direction of the school parking lot.\n\nNo one was near her, although it's not like someone would kidnap her, in plain view. Was she kidnapped? Is that why no one knows where she is?\n\n\"Can you think of any reason she'd run away?\" Officer Drew asks.\n\n*choice\n #Yes\n  \"Like I said, she was just voted prom queen,\" you say. \"Maybe the pressure was too much for her?\"\n\n  \"She wouldn't be the first high schooler to run away, due to school pressure,\" Officer Hardy says. \"Do you think she was under a lot of stress?\"\n\n  \"Honestly, no,\" you say. \"She was interested in prom, yeah, but that's not worth [i]kidnapping[/i] someone over!\"\n\n  *goto 2\n\n #No\n  \"Are you [i]crazy?[/i]?\" you ask. She was just voted prom queen! She was excited! Happy! Why would she run away from that?\"\n\n  \"When I was in second grade, I was picked to be the narrator in a class play,\" Officer Hardy says. \"At first, I was so excited! It was my dream to perform in front of the rest of the class. But when the day came, I was so nervous, I faked sick to get out of it. Do you know what I mean?\"\n\n  \"Elena is not the kind of person to run away,\" you say. \"If she's gone, someone took her. End of discussion.\"\n\n  \"And where were you, this afternoon?\" Officer Drew asks.\n\n  \"Am I a suspect?\" you ask. \"I'd [i]never[/i] take my best friend!\"\n\n  \"And you just said she'd never disappear on her own,\" Officer Drew says. \"We're still trying to find out what happened. Hopefully, this is all a big misunderstanding.\"\n\n  *goto 2\n\n*label 2\nThe officers leave you their contact information, just in case you think of anything that might be relevant to the case. They hint that they might return tomorrow, once Elena has officially been missing for twenty-four hours. No matter what their assurances are, that sounds like a kidnapping to you.\n\n*if vague_love_interest = \"Elena\"\n You start to seriously worry about Elena. What if she's in serious danger? What if she dies, before you get the chance to tell her how you feel about her?\n\n Heck, how [i]do[/i] you feel about her? Yes, she's gorgeous and wonderful, and the two of you connect on so many levels, but she's your best friend, not your girlfriend. [i]Could[/i] she be your girlfriend? Or would that ruin your relationship forever? Yes, a girlfriend would be nice, but is that worth sacrificing a best friend? This isn't chess, where you sacrifice one piece for another. This is real life.\n\nElena's image haunts your dreams that night. You see her, standing on the edge of cliff, in a flowing white gown. \"Save me,\" she begs. \"Don't let me fall off!\"\n\n\"Elena!\" you cry.\n\nShe jumps off and spreads her gown out, like a hang glider. For a moment, she is flying towards you! Then a dark shadow grabs her, and she veers off course. She cries your name, as she crashes to the ground.\n\n\"Elena!\" you cry again, but it's too late. You run to the crash site, where her bruised body is lying on the ground. \"This is...our fault...\" she says.\n\nYou wake up screaming. What did she mean? [i]Our[/i] fault? You didn't kidnap her, did you? This isn't some strange world, where you kidnapped someone without knowing it!\n\nYou shake your head and try to go back to sleep, but sleep is elusive. All you can think about is Elena, Elena crying, Elena scared, Elena gone forever.\n\nYour parents make a half-hearted attempt to convince you to stay home from school that day, but there is no way you're staying home. Not when Elena is still out there, missing.\n\nYou've thought about it, of course. (What else [i]can[/i] you think about? Your best friend is missing!) And you think you know who did it.\n\nWho kidnapped Elena?\n\n*choice\n #Bruce\n  Bruce did it, not doubt about it. That's why he didn't vote for prom queen yesterday. He was planning to kidnap the winner! Voting could have changed the victim's identity, so he abstained.\n\n  But why would he [i]kidnap[/i] someone? You're not sure if he's ever met Elena before. Would he kidnap a stranger? It only makes sense, if he was planning to kidnap the prom queen, no matter who won. But why? What does he have against prom queens?\n\n  You plan to confront Bruce as soon as possible, but he is suspiciously missing from school that day. You're not sure if that's a sign of guilt, or something else. The police [i]have[/i] to suspect him too, right? There's no way that Smothers wouldn't finger Bruce as the most likely suspect.\n\n  *goto 3\n #Steve\n  Steve did it. Either him, or his girlfriend. Who else would have a motive? They lost the vote, and Elena won. They couldn't handle it! They decided to kidnap her, so they could get revenge and steal her title! After all, Nancy [i]was[/i] the runner-up. If Elena disappears, Nancy wins by default.\n\n  The only confusing thing is the timing. Why kidnap her, right after the decision is made? Wouldn't it make more sense to kidnap her right before prom? Yes, this is a gruesome possibility, but kidnapping someone for months is obviously harder than kidnapping them for a single night. If they were thinking clearly, they would have taken more time to plan the kidnapping.\n\n  Maybe that proves their guilt. It was a spur-of-the-moment decision, and that's why they made mistakes. But who [i]kidnaps[/i] someone without planning? What if the kidnapping was well-planned, but the culprit only made it [i]seem[/i] otherwise, in order to frame Steve and Nancy?\n\n  That would mean the kidnapping was planned long in advance, long before the prom queen vote. Did the culprit plan three kidnapping schemes, one for each prom queen candidate? Who would [i]do[/i] that? And what is the possible timeframe? When did the three candidates get announced? You didn't know the final three, until yesterday, but then again, you weren't there last week. Is a week long enough to plot a kidnapping? What was the process for picking the top three candidates, anyway?\n\n  You try to banish these grim thoughts from your mind, but you can't. You're haunted by the kidnapping, the entire day.\n\n  *goto 3\n #Smothers\n  Smothers was extremely upset yesterday. In retrospect, it makes perfect sense. He was planning to kidnap someone. Who [i]wouldn't[/i] be stressed, when they were planning a major crime?\n\n  But if he were planning a crime, would he be so obvious about it? Wouldn't he pretend everything is normal, instead? Then again, being angry for no reason [i]is[/i] normal for Smothers. Maybe he didn't want to throw everyone off, by acting happy.\n\n  No, this is stupid. You can't accuse someone of kidnapping, just because they were having a bad day. Besides, Smothers is the only adult in the equation. Not just any adult! He's the [i]Vice-Principal[/i]. The police are going to trust him, over a bunch of high school kids.\n\n  *goto 3\n #Claudia\n  Claudia was there when you told Elena the good news, and Claudia was visibly upset that she lost. Yeah, she [i]pretended[/i] to be happy, but that was clearly an act.\n\n  It's still a big leap to go from \"I'm upset that I lost\" to \"I am going to kidnap the winner\". No one in their right mind would do that, but what if she wasn't in her right mind? She wasn't thinking clearly. That'd explain why she'd commit a crime, when she is obviously the main suspect.\n\n  You are 90% sure that the police went to question Claudia, after they talked to you. She's in school the next day, so clearly, they didn't have enough evidence to prove her guilt. Or maybe she's [i]not[/i] guilty. Maybe you're just being paranoid.\n\n  You try to get to Claudia, so you can talk to her in private, but both times you see her that day, she's surrounded by a group of worried people. You'd bet anything they're worried about the kidnapping. It's all anyone can talk about.\n\n  *goto 3\n #Someone else\n  You have no idea who kidnapped Elena. None of your friends could have done it. Granted, you're not the best of friends with anyone on prom committee, but you know them well enough to say none of them would have taken Elena. Not only would that be reprehensible, but it would have been stupid. The prom committee members would be the number three suspects, after the two who didn't win prom queen.\n\n  Mallory tracks you down at school that day. \"Is it true?\" she asks. \"Is Elena gone?\"\n\n  \"She's not gone,\" you say. \"She's [i]missing[/i].\"\n\n  \"Like that's at all different!\" Mallory says. \"I bet Nancy or Claudia did it. They're mad they lost, and they want to take her place.\"\n\n  \"Would that work, though?\" you ask. \"I don't know the rules. What's the process for picking a second prom queen, if the first one isn't available?\"\n\n  \"I have no idea,\" Mallory says. \"Ask Smothers. He'd know. Maybe we do a second vote or something.\"\n\n  \"We can't accuse the runners-up of kidnapping the winner, if we don't know how the replacement is chosen,\" you point out. \"Do you think Elena would be okay, if she hadn't been picked as prom queen?\"\n\n  \"Does it matter?\" Mallory asks. \"I don't care [i]who[/i] the creepy kidnapper is. I just care that they're caught and arrested! Elena's not my best friend or anything, but she doesn't deserve this! [i]No one[/i] does!\"\n\n  *goto 3\n\n*label 3\n*page_break\nNeedless to say, it's impossible to focus on school that day. You're grateful when the final period is cancelled, until you learn that it's cancelled for a school assembly.\n\nThe assembly is brief. The principal explains that Elena has been missing ever since the end of school yesterday, then she begs anyone with information about Elena to come forward to her, or the police.\n\nSchool is cancelled for the rest of the day, along with all after-school activities. A part of you wonders if there will be school the following day, when there is little reason to assume things will change. No one knows when or where Elena was kidnapped. How on Earth are they going to find the culprit?\n\nThere are rumors about what happened to her, of course, but they are total nonsense. You hear that she ran away to a different state, that her kidnapper is a disgruntled ex-boyfriend, and that Smothers kidnapped her, because he wants prom to be cancelled this year. None of that sounds right to you.\n\nPeople know that you're Elena's best friend, and you're pestered with questions all day. Even the police weren't [i]that[/i] interested in what you have to say! After repeating the story for the twentieth time, you are officially sick of talking about it. You said goodbye to Elena, and she went to her car. What else is there to say?\n\nHer car is missing, too, but so what? It's not like the kidnapper stole her, just to get at her car. You refuse to believe that the timing is just a coincidence. She was picked as the prom queen, and she disappeared less than an hour later. That [i]can't[/i] be a coincidence.\n\nLittle do you know that the horror isn't over.\n*page_break\nVice-Principal Smothers asks to see you in his office, before school ends for the day. You are not surprised to see the other members of the prom committee are there: Steve, Jessica, Mallory, Bruce and...uh...\n\n\"Where's Alejandro?\" you ask.\n\n\"I told him to come here immediately after school,\" Smothers says, annoyed. \"Why isn't he here yet?\"\n\n\"Well, school ended early today,\" Steve says. \"Maybe he thought you meant to show up when school [i]normally[/i] ends.\"\n\n\"That's ridiculous!\" Smothers snaps. \"I see no reason why he wouldn't want to see me right away, given the circumstances.\"\n\n\"What circumstances?\" Jessica asks.\n \n\"Elena's kidnapping,\" Vice-Principal Smothers says.\n\n\"So it's official, then?\" you ask. \"She's not just missing? She was [i]kidnapped[/i]?\" You knew in your heart that was the case, but hearing it said aloud is still a shock.\n\n\"Her backpack was found by the side of the highway,\" Smothers says. \"The police are searching the area for more clues as we speak.\"\n\n\"Where?\" you ask.\n\n\"I wouldn't tell you where, even if I knew,\" Smothers says. \"The [i]last[/i] thing any of you need to do right now is interfere with the police investigation. Do you understand why?\"\n\n*choice\n #All of you are suspects\n  \"We're all suspects,\" Jessica says.\n\n  \"The [i]prime[/i] suspects,\" Smothers says. \"One might say the [i]only[/i] suspects. Both Nancy Spier and Claudia Barrett have alibis.\"\n\n  \"My girlfriend didn't do it!\" Steve protests.\n\n  \"That's what the word 'alibi' means, you idiot,\" Bruce says.\n\n  \"I'm sorry, I have no idea what you're all talking about,\" Mallory says. \"Why would any of us kidnap Elena? We just voted her as prom queen!\"\n\n  \"It's a bluff,\" Bruce says automatically. \"Someone voted for her, to throw us off their trail.\"\n\n  \"Who? None of the votes were labelled,\" Steve says.\n\n  \"Well, [i]I[/i] didn't vote, so I must be innocent,\" Bruce says. \"Guess that means one of you is a psycho kidnapper. Cool. I'm gonna play it safe and avoid all of you, until they figure out who it is. So don't try to talk to me. Okay? Thanks.\"\n\n  \"You know that you're the most suspicious out of all of us, right?\" Jessica asks. \"You refuse to vote, you refuse to say [i]why[/i], and now you're treating a kidnapping like some kind of joke.\"\n\n  Smothers steps in, at this point. \"I did [i]not[/i] call you here, just so you could fight over who's guilty or not,\" he says. \"That's for the police to decide, not a bunch of teenagers.\"\n\n  \"Then why [i]did[/i] you bring us here?\" you ask.\n \n  *goto 4\n #All of you are potential victims\n  \"We could be next,\" you say.\n\n  \"Oh, give me a break,\" Bruce says. \"Who'd want to kidnap us?\"\n\n  \"The culprit kidnapped Elena, because she's the prom queen,\" you argue. \"It would make sense if they went after us, too. We're the ones who [i]made[/i] her the prom queen!\"\n\n  \"I get it,\" Bruce says. \"The culprit is kidnapping anyone and everyone who's connected to Elena's election. Great theory. There's just one problem: [i]No one cares about prom that much![/i]\"\n\n  \"If you honestly don't care about prom, why are you on the prom committee?\" you ask.\n\n  \"I have my reasons,\" Bruce said.\n\n  \"Let me guess. You're not going to tell us what they are,\" Jessica says. \"Just like how you refused to vote for the prom queen in the first place!\"\n\n  \"You can't make me tell, if I don't want to. You're not my mom,\" Bruce says.\n\n  \"And what, you always do what your mom tells you to?\" Steve asks.\n\n  \"[i]No[/i]!\" Bruce says hotly.\n\n  Smothers steps in. \"I did not bring you all here, just so you could fight about Mr. Wilkins' mother.\n\n  \"Aw, but it's so much fun!\" Mallory smiles.\n\n  *goto 4\n\n*label 4\n\"I just want to say...be careful, and if the police have any questions, I expect you all to [i]fully[/i] cooperate,\" Smothers says, giving a pointed look at Bruce. \"If you have any ideas about what happened to Elena, my door is always open.\"\n*page_break\nSmothers' concern is mildly touching. As far as you know, this is the only time he's expressed any emotions besides anger, frustration and annoyance. You open your mouth to thank him, when a strange hissing noise fills the room.\n\n\"What's that?\" you ask.\n\n\"What's what?\" Jessica asks.\n\n\"That hissing noise,\" you say.\n\n\"I hear it, too,\" Steve says. He turns his head, trying to hear better.\n\n\"Is my phone okay?\" Mallory cries. She reaches into her pocket and pulls out her phone with both hands.\n\nVice-Principal Smothers gasps. \"Smoke!\" he says. \"Quick, get out before--\"\n\nHe gasps, covers his throat and falls to the ground, unconscious. \"Smothers!\" you cry.\n\nBruce bends down next to Smothers. \"Dude, are you okay?\"\n\nA patch of green enters your vision. You try to bat it away, but your hand touches nothing but air. You realize it's smoke, but whoever heard of green smoke before? It's clearly not--\n\nJessica starts coughing and falls to her knees.\n\n[i]It's not smoke! It's knockout gas! Or...something...like...[/i] you think to yourself.\n\nWhat do you want to do?\n\n*choice\n #Open the window\n  You stumble towards the window, when Steve grabs you by the shoulders. \"Don't! Breathe!\" he screams. \"You'll waste the air!\"\n\n  Immediately, you want to slap him and say that yelling just uses up [i]more[/i] air, but you don't. You try to sidestep him, when he shakes your shoulders harder.\n\n  \"It's! The! Aiiiiiir!\" he screams, then he falls forward onto you. You struggle to move away from him, but it's too late. You breathe in the green smoke and lose consciousness.\n\n  Thanks, Steve.\n  *goto 5\n\n #Leave through the door\n  You turn around to leave the room, and you stumble into Mallory, who is doing the exact same thing.\n\n  \"GET OFF ME!\" she screams, trying to push you backwards.\n\n  \"I'm not--aaaugh!\" you cry. Is she [i]trying[/i] to stop you from leaving?\n\n  \"No...signal...\" Mallory grunts, as she falls to the ground, unconscious. You make a valiant effort to keep going forward, but in a few seconds, you fall victim to the smoke, too.\n\n  Thanks, Mallory.\n  *goto 5\n\n*label 5\n*page_break\nYou wake up in a small room with no windows. Feeling dizzy, you try to put a hand to your head, only to discover your hands are tied together.\n\nYou start to panic, until you realize your hands aren't tied with rope or tape or something sturdy. They're tied together with a shoelace. [i]Your[/i] shoelace, by the looks of it.\n\n\"And the award for laziest kidnapper goes to...\" you mutter, as you work your hands free of the shoelace. It takes about a minute for you to get out. Ironically, it takes longer than that to put the shoelace back into your shoe.\n\nYou eye your surroundings carefully. There is absolutely nothing in here besides a deflated football and an old poster of a cat, hanging from a tree branch. The door, on the other hand...\n\nThere is a small computer screen above the doorknob, where you would normally expect to see a lock or a keyhole. It appears to be connected to the doorknob. You stare at it for a few seconds, before touching the screen.\n\nText appears.\n\n[i]Welcome, $!{first_name}. Ready to play a game?[/i]\n\nThere are two buttons: yes and no. Which one do you press?\n\n*choice\n #Yes\n  [i]A willing volunteer? I hope you won't regret your choice. It's almost too easy when the victims offer themselves freely.[/i]\n\n  *goto 6\n #No\n  [i]I'm sorry, but you don't have a choice. If you have any hope of getting out of here alive, you'll have to solve my puzzles.[/i]\n\n  *goto 6\n\n*label 6\n[i]Let's start with an easy one. Have you been paying attention in English class? If not, you might be stuck here forever! What punctuation mark is wrong in this sentence: Its a dangerous, cruel world.[/i]\n\nA question about grammar? You wonder if you're hallucinating. Maybe some kind of side effect of the smoke. Surely no one would kidnap you, then ask about grammar! But just in case this is real...good thing you have some notes about grammar in your notebook, which can be found under the \"show stats\" tab.\n\nWhat punctuation mark has a problem in that sentence?\n\n*choice\n #Comma\n  *goto puzzle_wrong_1\n #Apostrophe\n  *goto puzzle_solved  \n #Period\n  *goto puzzle_wrong_1\n\n*label puzzle_wrong_1\n[i]Tsk, tsk. Your teacher would be mad at you, for missing that one. I'll give you two more chances, but it's three strikes, you're out![/i]\n\n[i]What's wrong in this sentence: Dr. Bill, Mrs. Rowling and Luigis brother got socks for Christmas.[/i]\n\n*choice\n #Comma\n  *goto puzzle_wrong_2\n #Apostrophe\n  *goto puzzle_solved  \n #Period\n  *goto puzzle_wrong_2\n\n\n*label puzzle_wrong_2\n[i]I knew you were dumb, but this is ridiculous! This is your last chance! If you don't solve the puzzle now, the door will never unlock![/i]\n\n[i]What's wrong in this sentence: This is'nt what you expected, $!{first_name}.[/i]\n\n*choice\n #Comma\n  You're about to press the comma button, when you realize that might be the wrong answer. Maybe re-reading the puzzle is in order. Don't forget, you can always check your notebook, which is under the \"show stats\" tab.\n\n  *goto puzzle_wrong_1\n #Apostrophe\n  *goto puzzle_solved  \n #Period\n  You're about to press the period button, when you realize that might be the wrong answer. Maybe re-reading the puzzle is in order. Don't forget, you can always check your notebook, which is under the \"show stats\" tab.\n\n  *goto puzzle_wrong_2\n\n\n*label puzzle_solved\n*set puzzle_8_answered true\n*set puzzle_8_answer \"Apostrophe\"\nYou press the button for \"Apostrophe\". The screen flashes twice, and you hear a clicking sound.\n\n[i]The door is unlocked, but don't get cocky. You're not going to escape from here. You and the others are doomed.[/i]\n\nThe others? Does that mean the rest of the prom committee? Were you all kidnapped at the same time?\n*finish\n", "route_2_chapter_4": "[b]Chapter 4[/b]\n\nYou take a deep breath and step through the door, into another world. It's the night you've been waiting for, for so long: [i]Prom night![/i]\n\nThe gym looks fantastic, with all the decorations proudly in place. Your banner is hanging directly over the stage, with streamers running down the left and right sides. The band is underneath the banner, playing a soft love song, but since prom hasn't officially started yet, only one or two of the couples have started dancing.\n\nAlmost everyone is milling around, talking to each other. You can see Steve and his teammates, trying to eat everything at the refreshments table. His girlfriend Nancy is tugging at his arm, trying to get him to join her in a group photo with some of her friends.\n\n\"Are you going to stand in the doorway all night?\" your date jokes.\n\n*if gender = \"female\"\n You turn towards him and smile. \"Not unless you want me to!\"\n\n \"What I want is to be with you forever and always,\" he says, smiling back at you. \"I can't believe the kidnapping brought us together!\"\n\n [i]Kidnapping...[/i] The word pounds in your head like a drum. Something about this situation is wrong.\n\n You take a step backwards and look at your date. Instead of a friend, you see a stranger, someone you've never seen before. \"Who are you?\" you ask.\n\n \"Are you okay, love?\" he asks. \"I was the one who saved you. Save you. Help. Save.\"\n\n Your vision goes blurry, as darkness closes in. What is...?\n\n *goto 1\n*else\n You turn towards Elena and smile. \"I just can't believe it's finally here,\" you say.\n\n \"Me neither,\" Elena says, snuggling into your shoulder. \"But next time, just ask me out, okay? There's no need to kidnap me, to get me to date you.\"\n\n \"I had to do something big to get your attention,\" you chuckle. \"Faking a kidnapping, just so I could save you? Now [i]that's[/i] romantic!\"\n\n \"I love you so much,\" Elena says. \"But I'm still a captive of your heart. Help me. Save me. Help. Save.\"\n\n Your vision goes blurry, as darkness closes in. What is...?\n\n *goto 1\n\n*label 1\n*page_break\n\"Help me, help me!\" a voice cries.\n\nYour eyes pop open, and immediately, your head starts hurting. What did you just see? A vision? A daydream? Some weird after effect of the knockout gas?\n\nUnsteadily, you pick yourself off of the ground. You note with some surprise that you [i]are[/i] in the school gym, and a few prom decorations are on the walls. And yes, there is some love music playing on the speakers, but there's nobody here besides you and...\n\n\"Kidnapper!\" Smothers cries.\n\n*if gender = \"female\"\n \"I don't know what you're talking about!\" the boy cries.\n\n *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line\n*else\n \"I don't know what you're talking about! Please stop yelling at me!\" the girl cries.\n\n *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line\n\n*label it_is_stupid_I_have_to_make_a_scene_just_for_one_line\n\"What's going on here?\" you ask.\n\n\"$!{first_name}!\" Smother cries. \"Are you okay? Where are the others?\"\n\n\"I don't know,\" you say. \"Where are we? I mean, I know we're in the gym, but we were in your office, and...\"\n\n\"[i]Someone[/i] used gas to knock us out,\" Smothers says. \"And I think I know who!\"\n\n*if gender = \"female\"\n \"I told you, I didn't do it!\" the boy cries. \"I'm a victim, just like you!\" He turns towards you, a desperate look in his eyes. \"Please believe me!\"\n\n *choice\n  #Ask who he is\n   *goto 1_1\n  #Ask Smothers for information\n   *goto 1_2\n\n*else\n \"I told you, I didn't do it!\" the girl cries. \"I'm a victim, just like you!\" She turns towards you, a desperate look in her eyes. \"Please believe me!\"\n\n *choice\n  #Ask who she is\n   *goto 1_1\n  #Ask Smothers for information\n   *goto 1_2\n\n\n*label 1_1\n\"I hate to be rude, but who are you, and what are you doing here?\" you ask.\n\n\"My name is $!{J_first} Takeuchi,\" ${J_he} says. \"I have no idea what I'm doing here. I was going to Alejandro's room to ask him about the missing girl. I know he's on the prom committee, so I thought he might know something. But as soon as I entered his room, it filled with smoke that made me pass out.\"\n\n\"Alejandro's room?\" you ask. \"How do you know where--\"\n\n\"All the foreign exchange students live together in the same building,\" Smothers interrupts. \"It's the most convenient way to keep track of all of them.\"\n\n\"You're a foreign exchange student like Alejandro?\" you ask. \"Where from?\"\n\n$!{J_first} nods. \"Japan,\" ${J_he} says. \"What is your name?\"\n\n\"I'm $!{first_name} $!{last_name},\" you say. \"It's nice to meet you, $!{J_first}...I think. You were kidnapped, too?\"\n\n\"I do not know!\" $!{J_first} exclaims. \"When I woke up, I was trapped inside a small, empty room. The door was locked with a science puzzle. I solved it and found myself here in the gym, alone. I was frightened. So frightened. And confused!\"\n\n\"It's okay, $!{J_first},\" you say. \"The same thing happened to me. Er, mostly the same thing. I had an English puzzle, not a science one. What about you, Mr. Smothers?\"\n\n\"I had a logic puzzle in my room, but yes, it sounds like the same thing,\" Vice-Principal Smothers says. \" word \"track\" in big letters. In the corner, in smaller writing, is \"clue 2\".\n\nWhat do you think this means?\n\n*choice\n #You must track something\n  \"We have to track something, but what?\" you ask.\n\n  \"I'd like to track down whoever did this to us!\" Smothers says angrily.\n\n  \"Perhaps the clue refers to track, the sport,\" $!{J_first} says. \"Does anyone on the prom committee do track?\"\n\n  \"Not that I know of,\" you say.\n\n  \"Me, neither,\" Smothers says. \"This is why I didn't mention the clue earlier. It makes no sense at all! I bet the kidnapper put it there to torment us!\"\n\n  You're about to suggest putting the clue aside for a moment, in order to focus on something else, when you realize that there [i]is[/i] nothing else to focus on. You have no clues, no help, no idea what to do. All you have is an angry high school vice-principal, a friendly foreign exchange student, and one big mystery.\n  *finish\n\n #There are more clues\n  \"If this is clue 2, then presumably there's a clue 1,\" you say. \"But where?\"\n\n  \"This one was in Mr. Smothers' room,\" $!{J_first} says. \"Perhaps there are clues hidden in the other rooms?\"\n\n  \"But my room was empty, and so was yours,\" you say.\n\n  \"Let's double-check,\" Smothers says.\n\n  The three of you return to the rooms, but your initial impression is correct: there is nothing of interest, hidden inside there. And so, you find yourselves stuck, trapped in a gym by an unknown person, with no clues or hope of escape.\n  *finish\n\n\n\n*label 1_2\n\"I'm sorry, my head still hurts from the knockout gas,\" you say. \"What is happening?\"\n\nSmothers' angry look softens. \"I'm not entirely sure myself,\" he says. \"The last thing I know, I was in my office with you and the rest of the prom committee. There was some sort of smoke that made me pass out.\"\n\nYou nod. \"I think it made everyone pass out,\" you say, although you can't be entirely sure, because you were too busy trying to escape to take note of everyone else.\n\n*if gender = \"female\"\n \"I woke up inside one of the storage rooms here, and I had to solve a strange puzzle to unlock the door,\" Smothers says. \"I found Mr. Takeuchi here, fiddling with one of the other doors. Naturally, I accused him of being the culprit.\"\n\n *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line_3\n*else\n \"I woke up inside one of the storage rooms here, and I had to solve a strange puzzle to unlock the door,\" Smothers says. \"I found Miss Takeuchi here, fiddling with one of the other doors. Naturally, I accused her of being the culprit.\"\n\n *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line_3\n\n*label it_is_stupid_I_have_to_make_a_scene_just_for_one_line_3\n\"You yelled at me!\" the unknown teenager--Takeuchi--says. \"I thought [i]you[/i] were the kidnapper!\"\n\n\"I am not in the habit of kidnapping students, especially ones I barely know,\" Vice-Principal Smothers says.\n\n\"I don't know ${J_him} at all,\" you say. \"Do you honestly think a stranger would kidnap multiple people? I think ${J_he}'s telling the truth when ${J_he} says ${J_he}'s a victim.\"\n\n\"But why would a kidnapper take the prom queen, two members of the prom committee, and an unrelated person?\" Smothers asks. \"It makes no sense.\"\n\n\"I...I think I know what happened,\" Takeuchi says. \"I was taken by accident.\"\n*page_break\n\"What do you mean?\" you ask.\n\n\"I went into Alejandro's room, to ask him about Elena,\" ${J_he} says. \"I knew he was on the prom committee, and everyone was talking about Elena, after the assembly. I was...hoping to get some good gossip, as people say.\"\n\n\"How do you know where Alejandro lives?\" you ask.\n\n\"All the foreign exchange students live in the same building,\" Vice-Principal Smothers says. \"That way, it's easier to keep track of everyone.\"\n\n\"I am from Japan,\" ${J_he} says. \"My full name is $!{J_first} Takeuchi.\"\n\n\"I'm $!{first_name} $!{last_name},\" you say. \"Nice to meet you, officially. What happened after you went into Alejandro's room?\"\n\n\"It was a trap!\" $!{J_first} says. \"I saw the room was empty, and was going to leave, when smoke came out of nowhere. Before I realized what was happening, I fell unconscious and woke up in that room over there.\" ${J_he} points to the room next to the one you exited.\n\n\"So it was all a mistake?\" Smothers asks. \"The kidnapper wanted Alejandro, but got you by accident?\"\n\n\"That is the only explanation I can think of,\" $!{J_first} says.\n\nYou find ${J_his} explanation to be...\n\n*choice\n #Convincing\n  *goto 2_1\n #Unconvincing\n  *goto 2_2\n\n*label 2_1\n\"If $!{J_first} is right, then the kidnapper is targeting all the members of the prom committee,\" you say. \"It's the only thing all three of us have in common.\"\n\n\"Technically, [i]you[/i] are the only prom committee member here,\" Vice-Principal Smothers says. \"Unless the others are behind those doors.\"\n\nNow that he mentions it, you notice there are many doors connected to the gym, most of them closed. You try opening the closest one, but it is firmly locked.\n\n\"Are we going to have to check them all?\" you ask.\n\n\"We will, if we have to get out of here,\" Smothers says with a sigh. \"Let's work together. I don't want either of you two leaving my sight.\"\n\nThe three of you work in silence for a while, until $!{J_first} suggests the others haven't solved the puzzle locks yet. You are somewhat surprised to learn that all three of you had completely different puzzles locking your doors; you had assumed the puzzle was the same for everyone.\n\nWhose puzzle lock do you want to hear about first?\n\n*choice\n #$!{J_first}\n  *set chapter_4_who_is_first \"J\"\n  *goto J_puzzle\n #Vice-Principal Smothers\n  *set chapter_4_who_is_first \"Smothers\"\n  *goto Smothers_puzzle\n\n\n*label 2_2\n\"I'm sorry, but I find it hard to believe the kidnapper would take the wrong person,\" you say. \"They clearly went through a lot of trouble, planning this.\"\n\n\"I'm not so sure,\" Vice-Principal Smothers says. \"How did the kidnapper know in advance that we would all be in my office at the same time? How did they know Alejandro wouldn't be with the rest of the prom committee?\"\n\n\"But it's the truth!\" $!{J_first} insists. \"Look, when were you kidnapped? I was taken about a half-hour after school ended.\"\n\nSmothers looks surprised. \"I asked everyone to meet in my office, immediately after school ended.\"\n\n\"So there's a half-hour gap in between the two kidnappings,\" you say. \"After the culprit finished with us, they went after Alejandro. Only they didn't have much time to spare. How long does knockout gas keep someone unconscious?\"\n\n\"I'm not a science teacher. I don't know,\" Smothers says.\n\n\"Not long?\" $!{J_first} guesses.\n\n\"If the culprit was in a hurry, it makes more sense that they'd make a mistake,\" you say. \"Although kidnapping the wrong person is way more than just a minor mistake. I don't know why the culprit didn't just leave you there, in Alejandro's room.\"\n\n\"Perhaps they grabbed me, took me to the gym, and discovered the mistake too late,\" $!{J_first} says. $!{J_he} shudders. \"I'm sorry. I don't like talking about myself, like this. I'm just...a mistake? An accident? Someone who was in the wrong place at the wrong time?\"\n\n\"This entire situation is a mistake,\" Smothers says. \"And I'm going to use my correcting pen to bring the culprit to justice! ...Once I figure out how to get out of here, that is.\"\n\n\"His correcting pen?\" $!{J_first} asks.\n\n\"The pen he uses to grade tests,\" you say. \"I, uh, think Smothers was trying to sound cool, there.\"\n\n\"It didn't work,\" $!{J_first} says.\n*page_break\n\"Our first course of action should be finding a way to escape,\" Smothers says. \"$!{J_first}, you tried to open one of the doors. Did it work?\"\n\n\"No, it was locked,\" $!{J_first} says. \"Perhaps the doors stay locked, until the person inside solves the science puzzle.\"\n\n\"Science puzzle?\" you ask. \"You mean an English puzzle.\"\n\n\"I had a math and logic puzzle,\" Smothers says. \"Well, well. Clearly, the culprit gave each of us a different puzzle to solve.\"\n\nThe three of you quickly agree to exchange stories, while checking all the doors to the gym. You tell your story first. Who do you want to hear from next?\n\n*choice\n #$!{J_first}\n  *set chapter_4_who_is_first \"J\"\n  *goto J_puzzle\n #Vice-Principal Smothers\n  *set chapter_4_who_is_first \"Smothers\"\n  *goto Smothers_puzzle\n", "route_2_chapter_5": "[b]Chapter 5[/b]\n\nA sad air hangs over your little trio for a brief moment, until one of the doors opens, and Jessica Moore steps out.\n\n\"She's on the prom committee, too,\" you tell $!{J_first}.\n\nJessica smiles at you. \"Hello, $!{first_name}! You're just the person I was looking for,\" she says. \"Do you think you can explain what's going on, before I rip off a table leg and use it to bludgeon everyone here?\"\n\nYou [i]think[/i] she's joking, but you don't want to take that chance. \"Mr. Smothers, would you like to help?\" you ask, taking a discreet step backwards.\n\n\"It's [i]Vice-Principal[/i] Smothers,\" he responds automatically. \"It appears that someone has kidnapped all the members of the prom committee and trapped us in the gym.\"\n\nJessica's smile gets bigger. \"Do I have permission to say bad words, without being punished for it?\" she asks.\n\n\"Absolutely not,\" Smothers says. \"I do not care if these are extenuating circumstances. I will give you detention for any foul language you use here.\"\n\n\"[i]Then what the sugar-fanny is going on?[/i]\" Jessica screams.\n\nSomehow, you had a feeling Jessica wouldn't keep a hold on her self-control for very long. She does much better than Bruce, who is the next one to exit a room. It takes approximately 1.5 seconds before Bruce starts cussing out everyone in sight. For a few tense moments, it seems as if Bruce is angry enough to hit someone, but he settles down after a lot of shouting and several detentions from Smothers.\n\nThe next person to leave their room is...\n\n*choice\n #Steve\n  *goto 1_1\n #Mallory\n  *goto 2_1\n\n*label 1_1\n\"That was. The worst! Puzzle ever!\" Steve shouts. \"And the part two? Took forever!\"\n\n\"Part two?\" you ask.\n\nSteve waves around an index card, which looks similar to the one from Smothers' room, although it's hard to tell from a distance. \"This thing! I spent ten minutes looking for it in the sports equipment, and all it says is the word 'play',\" Steve says. \"I am [i]beyond[/i] furious! I never would have joined prom committee, if I knew--oh, hey, J-dogg.\"\n\n\"Hey, Steve,\" $!{J_first} says.\n\n\"J-dogg?\" you ask.\n\n\"It's a nickname,\" $!{J_first} says. \"We have gym class together.\"\n\n\"Don't be modest!\" Steve says. \"J-dogg and I are the best partners ever! We [i]killed it[/i] in two-on-two basketball!\"\n\n\"Too bad you've never 'killed it' on the football field,\" Jessica mutters.\n\n\"Let me get this straight,\" Vice-Principal Smothers says. \"Mr. Stevens is the only one here who knew, er...'J-dogg' before today?\"\n\nThere is a general murmur of agreement. You turn to $!{J_first}. \"You didn't tell us that your nickname was J-dogg.\"\n\n\"Steve is the only one who calls me that,\" $!{J_first} says. \"My real nickname is 'Jun-kun'. Or at least, Americans like to call me that, because it rhymes. 'Jun-chan' is probably more appropriate, but I don't have time to explain the Japanese honorific system right now.\"\n\nYou decide to call ${J_him}...\n\n*choice\n #$!{J_first}\n  *set J_nickname \"$!{J_first}\"\n  \"If your name is $!{J_nickname}, then that's what we'll call you,\" you say.\n\n  $!{J_nickname} smiles at you gratefully.\n\n  *goto 1_2\n #Jun-chan\n  *set J_nickname \"Jun-chan\"\n  \"Jun-chan works,\" Jessica says.\n\n  *goto 1_2\n #Jun-kun\n  *set J_nickname \"Jun-kun\"\n  \"Then we'll call you Jun-kun,\" Jessica says. \"After all, we're friends. Hopefully.\"\n\n  *goto 1_2\n #J-Dogg\n  *set J_nickname \"J_Dogg\"\n  \"We're using J-dogg,\" Steve says. \"It's too late for me to change my mind.\"\n\n  You give Steve a minor glare. \"That's not ${J_his} name,\" you say.\n\n  \"Sorry,\" Steve says.\n\n  *goto 1_2\n #Something else\n  What do you want to call $!{J_first}?\n  *input_text J_nickname\n  *if (J_nickname=\"Junshiro\") or (J_nickname=\"Junshi\")\n   *achieve badnickname\n   \"How about we call you $!{J_nickname}?\" you ask. Nobody seems to have any objections.\n\n   *goto 1_2\n  *else\n   \"How about we call you $!{J_nickname}?\" you ask. Nobody seems to have any objections.\n\n   *goto 1_2\n\n*label 1_2\n\"I don't care what we call the suspicious little punk,\" Bruce says. \"I don't trust ${J_him}. $!{J_he}'s probably working with the kidnapper.\"\n\n\"Do we have to go through this [i]every[/i] time someone new comes out a door?\" $!{J_nickname} asks, looking upset. \"I've already explained multiple times that I was kidnapped by accident!\"\n\n\"Because that's [i]sooo[/i] believable,\" Bruce says. \"You think you would have thought up a better lie, after all this time!\"\n\n\"Hey, don't trash $!{J_nickname},\" Steve says. \"$!{J_he}'s my friend.\"\n\n\"Dude, you would make friends with a baloney sandwich, and I smell a [i]load of baloney[/i] right now!\" Bruce says, although he doesn't use the word \"baloney\". He uses a more colorful term.\n\n\"Detention, Mr. Wilkins!\" Vice-Principal Smothers says.\n\nThe pointless bickering comes to an end, when the last door opens, and Mallory comes out. Everyone explains what they know so far, which is precious little. Fortunately, Mallory has the third clue.\n\n\"That's what took me so long,\" Mallory said. \"It was stuck in a crack between two bricks. I have no idea how they got it in there, in the first place.\"\n\n\"Quick, put the clues together!\" you say.\n\n*goto 3\n\n\n*label 2_1\nMallory bursts out of the room, triumphantly. \"I finally got it out!\" she says. \"It was stuck in a crack between two bricks, but I finally got it!\"\n\n\"What is it?\" you ask.\n\n\"What? No 'Hello, Mallory'?\" Mallory asks. \"No, 'Hi, it's nice to see you're still alive'? No 'Thank you for saving our butts with your all important clue'? How ungrateful!\"\n\n\"You seem unsurprised to find us here,\" Vice-Principal Smothers says.\n\n\"I'm not,\" Mallory says. \"The lock on the door said everyone on the prom committee was kidnapped, and we were all together when the smoke--hey, who's that?\"\n\n\"I'm $!{J_first} Takeuchi, playing the role of Victim #2,\" $!{J_first} says.\n\n\"As far as we can tell, ${J_he}'s substituting for Alejandro,\" you say.\n\n\"That sounds like the worst substitution ever,\" Mallory says. \"I think I've heard of you, before. You're the Japanese exchange student, right? Jun-chun?\"\n\n\"No,\" $!{J_first} says emphatically. \"I mean, yes, that's me, but you got it wrong. It's either Jun-kun or Jun-chan, not Jun-chun!\"\n\n\"Sorry,\" Mallory says. \"I guess my Japanese is a little rusty.\"\n\nWhat name would you like to use for $!{J_first}?\n\n*choice\n #$!{J_first}\n  *set J_nickname \"$!{J_first}\"\n  \"I think we should stick to using $!{J_first},\" you say. \"That's ${J_his} name, after all.\"\n\n  $!{J_nickname} smiles at you gratefully.\n\n  *goto 2_2\n #Jun-chan\n  *set J_nickname \"Jun-chan\"\n  \"Jun-chan works,\" Jessica says.\n\n  *goto 2_2\n #Jun-kun\n  *set J_nickname \"Jun-kun\"\n  \"Jun-kun sounds best to me,\" Jessica says. \"It rhymes.\"\n\n  *goto 2_2\n #Something else\n  What do you want to call $!{J_first}?\n  *input_text J_nickname\n  *if (J_nickname=\"Junshiro\") or (J_nickname=\"Junshi\")\n   *achieve badnickname\n   \"How about we call you $!{J_nickname}?\" you ask. Nobody seems to have any objections.\n\n   *goto 2_2\n  *else\n   \"How about we call you $!{J_nickname}?\" you ask. Nobody seems to have any objections.\n\n   *goto 2_2\n\n  *goto 2_2\n\n*label 2_2\n\"Okay,\" Mallory says. \"Sorry for the confusion. Anyway, I got this clue in my room. That's why it took me so long to get out.\"\n\n\"What does your clue say?\" you ask eagerly.\n\nMallory takes a card out of her pocket and waves it importantly before reading \"two clue three\".\n\n\"[i]That's[/i] your important clue?\" Bruce asks. \"It's just a bunch of stupid numbers!\"\n\n\"Well, yeah, but I bet it goes together with other clues to give us a phone number,\" Mallory says.\n\n\"Why would the kidnapper leave their phone number for us to find?!\" Bruce exclaims. \"That's just stupid!\"\n\n\"Excuse [i]me[/i] for never having been kidnapped before!\" Mallory says. \"So where's Steve?\"\n\n\"He's the only one who hasn't come out of their room yet,\" Jessica says.\n\n\"Probably too stupid to solve the puzzle on his own,\" Bruce mutters.\n\n\"If Mr. Stevens [i]doesn't[/i] exit his room, we're stuck,\" Vice-Principal Smothers says. \"Thanks to the process of elimination, we know that the third and final clue is in his room.\"\n\nA few tense moments follow, as everyone stares at the only unopened door. Jessica suggests banging on it and talking to Steve through the door, just to see if he's okay. Fortunately, it isn't much longer before Steve opens the door on his own.\n\nEveryone else explains the situation to Steve, while you take his clue and match it with the others.\n*goto 3\n\n\n\n*label 3\n*page_break\nPutting the clues together is simplicity itself. Even if they weren't labelled with numbers, you'd be able to figure out the correct order. There is only one way to arrange the words so they make sense: \"Play track two\".\n\n\"What's on track two?\" Steve asks.\n\n\"Presumably a message from the culprit,\" Jessica says. \"Well, at least this explains why they've been playing crappy elevator music on the speaker system, this whole time.\"\n\n\"I actually kind of like this song,\" $!{J_nickname} says softly.\n\nMallory is already on top of things. She scrambles to the stage and finds a music player, in the band area. She sets it to the second track of the playlist.\n\n\"Hello, my little victims,\" a voice says. The person is using a voice-changer, so you can't recognize whose voice it is. \"If you're hearing this, then at least three of you made it past the first round of puzzles. Congratulations. I expected half of you to be stuck in those rooms forever.\"\n\n\"Who are you?\" Smothers yells.\n\n\"Dude, this is a pre-recorded message. They can't hear you,\" Bruce says.\n\n\"Who am I, you ask?\" the voice asks. \"I'm the person who [i]should[/i] have been picked as prom queen! You can call me...Queen Cinderella.\"\n\n\"Is that supposed to be scary?\" Bruce asks. \"Because it's not.\"\n\n\"I'm tired of taking your orders! I'm tired of living in the shadow of my ugly stepsisters!\" Queen Cinderella yells. \"My heart has grown black as cinders, thanks to you, and now I am getting my revenge. You [i]will[/i] pay for the way you treated me! And I guarantee that there's no fairy godmother who will come to save you.\"\n\nYou shake your head. Queen Cinderella sounds disturbed. What else would you expect from someone who kidnapped a large group of people?\n*page_break\n\"Of course, I [i]could[/i] have killed you right away, but where would be the fun in that?\" Queen Cinderella asks. \"So I set up this little game for you. The goal is simple: find Elena. Whoever is first to find Elena wins the game, and the two of you will go home, happy and safe. The others...will not be so lucky.\n\n\"Now for round two of our little game. As you have no doubt noticed by now, the door to the kitchen is locked, as is the door to the main storage room. I took the liberty of reprogramming the doors. The code to open them is zero-zero-zero. I left a clue to Elena's location in one of the rooms...but which one?\"\n\n\"Kitchen,\" Bruce says automatically.\n\n\"Storage room,\" says Smothers, at the same time.\n\n\"You'll only have five minutes to search the roo
