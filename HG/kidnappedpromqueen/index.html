s hesitantly.\n\nSomething hits you in the back of the neck. Hard. As you collapse to the ground, you realize someone just tricked you into looking the wrong way, so you would be an easier target. And boy, did you fall for it.\n\n\"$!{first_name}!\" Elena screams. \"Wha--\"\n\nYou hear Elena falling next to you. Struggling to fight the pain, you push yourself up to your elbow and turn around, trying to get a look at your attacker. It's...\n\nYou can't see. It's too blurry. Someone tall? Hard to tell when you're lying on the ground. Hard to focus. Hard to...\n\nYou close your eyes and let unconsciousness take its hold over you. Next to you, Elena has already passed out.\n*page_break\nYou wake up in the dark. It takes a few seconds for you to realize you're in a small room with blankets. There's no light at all, except from the door.\n\n\"Elena? Hello?\" you ask.\n\nNo response.\n\nYour eyes start to focus, and you see that what you first thought were blankets are clothes. Gym clothes. This room--no, more like a closet--is filled with gym clothes. There's a single lightbulb on the ceiling, but either it's burned out or turned off.\n\nThe door has a computer touchscreen on it. It's about the size of a standard piece of paper. It's dimmed, but it's the only light source in the room. You tap it, and the screen quickly brightens, revealing some text.\n\n[i]Welcome, $!{first_name}. Sorry I didn't have enough time to introduce myself earlier. I'm on a tight schedule tonight, and you didn't help by showing up late. Although it [b]was[/b] helpful of you to bring your friend along. Unexpected, but helpful. Saves me the time of getting her separately.[/i]\n\n[i]I'm sorry to inform you that you and others made the wrong choice, when picking the prom queen today. And for that, you will all have to be punished. Dearly.[/i]\n\n[i]Don't worry [b]too[/b] much. You might be able to escape punishment...if you're smart enough. Let's start with a simple puzzle, shall we? Pick the correct answer from the list.[/i]\n\n[i]\"Escape\" is to \"outbreak\" as \"psychotomimetic\" is to...[/i]\n\n*choice\n #Pyrotechnic\n  *goto puzzle_wrong_1\n #Eschewal\n  *goto puzzle_wrong_1\n #Hallucinogenic\n  *set puzzle_1_answered true\n  *set puzzle_1_answer \"Hallucinogenic\"\n  *goto puzzle_right\n #Cheeseburger\n  *goto puzzle_wrong_1\n\n*label puzzle_wrong_1\n[i]Are big words too difficult for you? Here's an easier one. \"Gala\" is to \"prom\" as \"damage\" is to...[/i]\n\n*choice\n #Harm\n  *set puzzle_1_answered true\n  *set puzzle_1_answer \"Harm\"\n  *goto puzzle_right\n #Help\n  *goto puzzle_wrong_2\n #Sympathize\n  *goto puzzle_wrong_2\n #Cheeseburger\n  *goto puzzle_wrong_2\n\n*label puzzle_wrong_2\n[i]This is your last chance! If you don't solve this puzzle, you'll die right now![/i]\n\n[i]\"Big\" is to \"small\" as \"goodbye\" is to...[/i]\n\n*choice\n #Hello\n  *set puzzle_1_answered true\n  *set puzzle_1_answer \"Hello\"\n  *goto puzzle_right\n #Farewell\n  You are about to tap the word \"Farewell\", when you stop. That's not the right answer. The puzzle is clearly asking you to find the opposite of the word \"goodbye\".\n\n  *goto puzzle_wrong_2\n #Dead\n  You are about to tap the word \"Dead\", when you stop. That's not the right answer. The puzzle is clearly asking you to find the opposite of the word \"goodbye\".\n\n  *goto puzzle_wrong_2\n #Lady\n  You are about to tap the word \"Lady\", when you stop. That's not the right answer. The puzzle is clearly asking you to find the opposite of the word \"goodbye\".\n\n  *goto puzzle_wrong_2\n #Cheeseburger\n  You are about to tap the word \"Cheeseburger\", when you stop. That's not the right answer. The puzzle is clearly asking you to find the opposite of the word \"goodbye\".\n\n  *goto puzzle_wrong_2\n\n\n*label puzzle_right\n[i]There! See how easy that was? Now the door has been unlocked for you! If you can continue to solve the puzzles, you can save Nancy and escape unharmed. If not, you'll die with the rest.[/i]\n\nThere is a clicking noise, and the touchscreen goes blank. Confused as to what's going on, you open the door and step outside.\n*finish", "route_1_chapter_4": "[b]Chapter 4[/b]\n\nYou're in the gym. The school gym.\n\nThat, at least, explains the uniforms in the room you just left. There are ten small closet-sized rooms attached to the gym, which are used to hold uniforms and balls and other gym supplies. You think it's weird the school has so many of them, but obviously, you didn't design the gym.\n\nThe lights are on, and judging from the windows by the ceiling, it's nighttime. Hopefully that means you weren't unconscious for very long. The gym is empty, except for Steve, Bruce and Jessica, who are against the side wall, yelling at each other.\n\n\"You're an idiot!\"\n\n\"No, [i]you're[/i] an idiot!\"\n\n\"No, you!\"\n\n\"You're [i]both[/i] idiots!\" Jessica says.\n\nThere's a slam, as Elena steps out through the doorway next to yours. \"Hey, idiots!\" she yells. \"If you don't stop right now, I'm going to break your--\"\n\n\"Elena!\" you cry.\n\n\"$!{first_name}!\" she says. \"Oh, thank God, you're not dead!\"\n\n\"Not yet,\" you say. \"What's going on?\"\n\n\"That's what I've been asking this punk,\" Steve says, gesturing at Bruce. \"Like someone would actually kidnap a bunch of students and lock us in the gym!\"\n\n\"I told you, I didn't do it!\" Bruce said. \"I'm a victim, just like you! Someone is clearly kidnapping everyone on the prom committee, and uh...whoever she is.\"\n\nIt looks like introductions are in order, so the two of you join up with the others. \"This is Steve Stevens, you know, Nancy's boyfriend. This is Bruce Wilkins and Jessica Moore. They're both on the prom committee with me. Everyone, this is my friend, Elena.\"\n\n\"Wait, Elena [i]Adams?[/i] As in, the prom queen candidate?\" Bruce asks. He looks at her with surprise. \"You don't look anything like the picture they showed us today.\"\n\n\"They used my freshman photo for the prom queen vote?\" Elena asks. \"Ugh. No wonder I lost.\"\n\n\"No, I meant that in a nice way,\" Bruce says. \"You're a lot different than I expected, that's all.\"\n\n\"That's because I always try to look my best whenever I'm kidnapped,\" Elena says, smiling.\n\n*if (vague_love_interest = \"Bruce\") or (vague_love_interest = \"Elena\")\n You frown. Is Elena flirting with Bruce? [i]Now[/i], of all times? Your best friend with Bruce sounds like a disaster waiting to happen!\n\n *goto minor_if_scene_over\n*else\n Your forehead crinkles in confusion. Is Elena trying to be funny, or sarcastic, or what? And is Bruce, the bad boy loner, really flirting with your best friend? [i]Now[/i] of all times?\n\n *goto minor_if_scene_over\n\n*label minor_if_scene_over\n*page_break\nElena starts explaining how you and she were kidnapped together and woke up here. Steve interrupts to say that he was kidnapped over an hour earlier, shortly before six. That would explain why he didn't pick up his phone, when Nancy tried to call him.\n\n\"What time were [i]you[/i] kidnapped, Bruce?\" Elena asks.\n\n\"I don't have a watch. I have no idea,\" Bruce says.\n\n\"You should use your phone to check the time,\" a voice calls. It's Mallory, who is leaving one of the rooms on the far side of the gym.\n\n\"So, do we just sit here and wait for everyone on the prom committee to leave their rooms or what?\" Bruce asks.\n\n\"We could try checking the exits,\" Elena says.\n\n\"Already did that,\" Jessica says. \"They're all locked with touchscreens, just like the doors in the rooms, only these ones don't respond when you tap them. I don't know how to turn them on. And as for the main exit...\" She gestures towards it. The doors are closed with two heavy chains. An imposing-looking combination lock is on top of them.\n\n\"Boy, am I glad to see someone else here,\" Mallory says, rubbing her head. \"I need to see a doctor, or something. The kidnapper smashed me on the head, three times, before I fell unconscious. It still hurts like crazy.\"\n\nSteve examines Mallory's head, while you do a quick count. \"We're still missing Alejandro and Vice-Principal Smothers,\" you say. \"But that makes eight people overall, and there are ten doors here.\"\n\n\"Maybe the kidnapper isn't using two of the rooms,\" Steve says.\n\n\"I already said I checked all the doors,\" Jessica says. \"That includes the small storage closets. Trust me, they're locked up tight.\"\n\n\"I think the last two rooms are holding Claudia and Nancy,\" Elena says. \"That's what the biology puzzle indicated.\"\n\n\"Biology puzzle?\" Jessica asks. \"My door was locked with a word puzzle. You had something else?\"\n\n\"Yeah,\" Elena says. \"It was...hmmm...it went something like this...\"\n\n[i]How does it feel to be a failed prom queen candidate? Do you feel ashamed? Embarrassed? Or do you feel relieved, because deep down, you know you're not good enough?[/i]\n\n[i]I don't think [b]any[/b] of you three are good enough. Certainly not smart enough. Prove me wrong, by identifying where you'd find the islets of Langerhans.[/i]\n\nThat seems like a ridiculous request to you. You wouldn't be able to figure that out, without checking your notebook, which is under the \"show stats\" tab.\n\n*choice\n #Circulatory System\n  *goto puzzle_1\n #Respiratory System\n  *goto puzzle_1\n #Digestive System\n  *goto puzzle_1\n #Endocrine System\n  *goto puzzle_1_solved\n #Integumentary System\n  *goto puzzle_1\n #Hematopoietic System\n  *goto puzzle_1\n\n*label puzzle_1\n[i]Wrong! But I like seeing you morons squirm, so I'll give you another chance! Which system includes the thyroid?[/i]\n\n*choice\n #Circulatory System\n  *goto puzzle_2\n #Hematopoietic System\n  *goto puzzle_2\n #Integumentary System\n  *goto puzzle_2\n #Digestive System\n  *goto puzzle_2\n #Endocrine System\n  *goto puzzle_1_solved\n #Respiratory System\n  *goto puzzle_2\n\n\n*label puzzle_2\n[i]Too bad you didn't pay attention in biology class, huh? This is your last chance! If you don't answer this correctly, you'll die here![/i]\n\n[i]Which system releases hormones and chemicals through the body?[/i]\n\n*choice\n #Integumentary System\n  That is incorrect. Try checking your notebook, under the \"show stats\" tab.\n\n  *goto puzzle_2\n #Hematopoietic System\n  That is incorrect. Try checking your notebook, under the \"show stats\" tab.\n\n  *goto puzzle_2\n #Endocrine System\n  *goto puzzle_1_solved\n #Respiratory System\n  That is incorrect. Try checking your notebook, under the \"show stats\" tab.\n\n  *goto puzzle_2\n #Circulatory System\n  That is incorrect. Try checking your notebook, under the \"show stats\" tab.\n\n  *goto puzzle_2\n #Digestive System\n  That is incorrect. Try checking your notebook, under the \"show stats\" tab.\n\n  *goto puzzle_2\n\n*label puzzle_1_solved\n*set puzzle_2_answered true\n*set puzzle_2_answer \"Endocrine system\"\n[i]Either you're a lucky guesser, or you deserved to be prom queen, after all. Only time will tell which one of you survives, if any.[/i]\n\n\"That sounds like the kidnapper also took Nancy and Claudia, and they're being subjected to the same thing we are,\" Elena says.\n\n\"But [i]why[/i]?\" Jessica asks. \"Who would kidnap ten people and force them to solve multiple choice puzzles?\"\n\n\"Sounds a lot like my math teacher,\" Bruce says. \"And seriously, what is taking the others so long with their puzzles? If you don't know the answer, just guess!\"\n\n\"Are you nuts, dude?\" Steve asks.\n\n\"Only an idiot would guess randomly, when death is on the line,\" Mallory says.\n\n\"Whatever,\" Bruce says. \"I don't think they're [i]dead[/i], but I'm gonna check on them.\"\n\nBruce heads over to one of the closed doors, which are all next to each other. The rest of the group follows after him. He bangs on one door and calls out, \"Hey! Anybody in there?\"\n\nSomeone calls from the other side. It's...\n\n*choice\n #Alejandro\n  *goto Alejandro\n #Claudia\n  *goto Claudia\n #Vice-Principal Smothers\n  *goto Smothers\n\n*label Alejandro\n\"Who is it? Help me!\" Alejandro cries.\n\n\"Alejandro? That you?\" Bruce asks.\n\n\"Of course it's me!\" Alejandro says. \"I was watching a movie at home, and I woke up here with some...I don't know what this even is!\"\n\n\"It's a puzzle,\" Jessica says. \"And don't worry, there are six of us here. We can help you figure it out!\"\n\n\"Good, because I got it wrong twice, and it says if I don't get it right this time, I die!\" Alejandro says. \"I don't want to die, and I don't even know what this is! I didn't take that class!\"\n\n[i]Which Greek myth features harpies and a skeleton army?[/i]\n\n*choice\n #Alcestis\n  *goto Alejandro_wrong\n #The twelve labors of Hercules\n  *goto Alejandro_wrong\n #Jason and the Argonauts\n  *goto Alejandro_right\n\n*label Alejandro_right\n*set puzzle_3_answered true\n*set puzzle_3_answer \"Jason and the Argonauts\"\n\"It's Jason and the Argonauts!\" you say.\n\n\"No way, it's Hercules!\" Steve says. \"He fought monsters all the time!\"\n\nElena shrugs. \"I think we were supposed to read about Alcestis in English class, but I didn't read that chapter,\" she says.\n\n\"Good thing you got put in another room, then,\" Bruce says. \"Go with Alcestis. He sounds heroic.\"\n\n\"[i]She[/i],\" you correct him. \"And the answer is Jason and the Argonauts.\"\n\n\"I picked that one last time, and it was wrong,\" Alejandro says. \"I'm going with Alcestis. It should--AAAAAA!\"\n\nAlejandro screams, and the gym falls silent. Bruce starts slamming on the door to Alejandro's room, but nothing happens.\n\n\"I guess he chose the wrong answer,\" Steve says unnecessarily.\n\nWhat should you do now?\n\n*choice\n #Try to help one of the other victims\n  *goto Alejandro_1\n #Do nothing\n  *goto Alejandro_2\n\n\n*label Alejandro_2\nNobody feels like trying to open any of other doors, and all of you stand in silence for a while, until another door opens. You've never met Claudia Barrett before, but you recognize her immediately. Her face is red, and a stream of furious words flows from her mouth as she marches towards your group.\n\n\"Uh...what's she's saying?\" Steve whispers.\n\nBruce rolls his eyes. \"Dude, she's swearing in Spanish.\"\n\n\"You know Spanish?\" Elena asks.\n\n\"Just the swear words,\" Bruce says.\n\nClaudia reaches the group. \"What is going on?!\" Claudia yells. \"Who's responsible for this?!\"\n\n\"That's what [i]we[/i] want to know!\" Mallory says. \"We've all been kidnapped, too!\"\n\nClaudia eyes your group warily, and she must decide you're safe, because she unclenches her firsts. \"You. You're in my math class,\" she says to Jessica. \"And Elena? You're here, too?\"\n\n\"Yes, and I have no idea why,\" Elena says. \"I had nothing to do with Nancy being elected prom queen.\"\n\n\"Prom? Is [i]that[/i] what this is all about?\" Claudia asks.\n\n\"We're all on prom committee,\" you explain. \"The only ones not here yet are Nancy Spier and Vice-Principal Smothers.\"\n\n\"The bald guy? [i]He[/i] kidnapped us?\" Claudia asks.\n\n\"No way!\" Jessica says. \"A teacher wouldn't have done this!\"\n\n\"I dunno,\" you say. You hadn't thought about the possibility of Smothers being the culprit, but it makes sense. \"It's someone with the ability to lock all the gym doors. It makes sense if it's a teacher, and no one would be suspicious to see Smothers by the gym.\"\n\n\"The culprit could have stolen the keys from a coach or something,\" Steve says. \"Coach Franzen usually leaves his out on a bench or wherever. I don't think [i]he's[/i] the culprit, though. Coach doesn't seem like the type to care about prom.\"\n\n\"Wait, you forgot about Alejandro,\" Jessica says. \"We heard him--\"\n\n\"AAAAAAUGH!\" a voice screams.\n\n\"...scream like that,\" Jessica says.\n\n\"That was Smothers!\" Bruce says. \"Either that, or Steve's girlfriend is way more--\"\n\n\"Shut up, that wasn't Nancy!\" Steve says.\n\n\"I guess that means Nancy is in there,\" Elena says, gesturing towards the final closed door. As if in response to her statement, the door opens by itself. Everyone waits for a moment, but no one exits.\n*finish\n\n\n*label Alejandro_1\n\"We've got to help the others!\" you say.\n\nEveryone splits into groups of two. You and Elena pair together, naturally, and the door you pick has Claudia Barrett on the other side. Together, the three of your figure out the math puzzle that keeps her door locked. Unlike Alejandro, she gets the right answer.\n\nYou've never met Claudia before, but you recognize her immediately, even with the angry expression and messed-up hair. \"When I find out who did this, I am going to [i]kill[/i] them,\" she vows.\n\n\"Get in line,\" Elena says. The two of you quickly explain the situation to her, and the three of you join up with the others, who are all huddled by one door.\n\n\"What's going on?\" you say.\n\n\"Smothers is behind that door,\" Mallory explains. \"Bruce and I checked out the other door, but nobody answered, no matter how loud we knocked.\"\n\n\"Smothers? The bald weirdo?\" Claudia asks.\n\n\"What kind of puzzle does Smothers have?\" Elena asks.\n\n\"I guess it's a tough one, because no one can figure it out,\" Mallory says. \"Maybe one of you can--\"\n\n\"NOOOOOOO!\" Smothers screams from inside the room. There is a loud thud, immediately afterwards.\n\n\"...Never mind,\" Mallory says.\n\n\"Dios mio, is he dead?\" Claudia gasps.\n\n\"Hopefully just unconscious,\" you say. \"There's no way to know without breaking the door down.\"\n\n\"Then break the door down!\" Claudia says.\n\nBefore anyone can say something else, there is a loud click, and the final door opens by itself. \"But there was no one inside that room!\" Mallory gasps softly.\n\nEveryone waits for a moment, but no one exits.\n*finish\n\n\n*label Alejandro_wrong\n*set puzzle_3_answered true\n*set puzzle_3_answer \"Jason and the Argonauts\"\n\"I have no idea!\" you say.\n\n\"Hercules?\" Steve guesses. \"He fought monsters all the time!\"\n\nElena shrugs. \"I think we were supposed to read about Alcestis in English class, but I didn't read that chapter,\" she says.\n\n\"We have no idea!\" Bruce says. \"Just cheat and press two of them at the same time!\"\n\n\"Okay,\" Alejandro says. \"I picked Jason and the Argonauts last time, and that didn't work, so I'll pick the other two, this time. It should--AAAAAA!\"\n\nAlejandro screams, and the gym falls silent. Bruce starts slamming on the door to Alejandro's room, but nothing happens.\n\n\"I guess he chose the wrong answer,\" Steve says unnecessarily.\n\nWhat should you do now?\n\n*choice\n #Try to help one of the other victims\n  *goto Alejandro_1\n #Do nothing\n  *goto Alejandro_2\n\n\n*label Claudia\n\"Nancy? Is that you?\" Elena asks.\n\n\"No, that's not Nancy,\" Steve says. \"It must be Claudia.\"\n\n\"I don't know anything about Greek mythology! Please help me!\" Claudia cries.\n\n\"Don't worry, Claudia!\" Jessica says. \"There are six of us here, and we can help you get out! What's the question?\"\n\n\"$!{first_name} just studied mythology, I think,\" Elena says. Everyone immediately turns to you for the answer.\n\n*goto Claudia_puzzle\n*label Claudia_puzzle\n\n[i]Which Greek myth features harpies and a skeleton army?[/i]\n\n*choice\n #Alcestis\n  \"Is it Alces...Alcesti...\"\n\n  \"Alcestis? No,\" you say. \"That was about a queen who died, so her husband could live longer. There aren't any monsters in that one.\"\n\n  \"Except for the husband,\" Mallory mutters.\n\n  \"What's the next option?\" you ask.\n\n  *goto Claudia_puzzle\n #The twelve labors of Hercules\n  \"The twelve labors of Hercules,\" Claudia says. \"That's one of the options.\"\n\n  \"He gave birth twelve times?\" Steve asks.\n\n  \"No, that's just a fancy name for a bunch of jobs that Hercules was forced to do,\" you say. \"He fought lions, dogs, birds, boars, a hind...\"\n\n  \"A what?\" Bruce asks.\n\n  \"Yeah, I don't remember Hercules fighting any skeleton army in those myths,\" you say. \"Not Hercules! Is there someone else on the list?\"\n\n  *goto Claudia_puzzle\n #Jason and the Argonauts\n  *goto Claudia_right\n\n*label Claudia_right\n*set puzzle_3_answered true\n*set puzzle_3_answer \"Jason and the Argonauts\"\n\"What about Jason and the Argonas?\" Claudia says.\n\n\"Argonauts,\" you say. \"And I think that's it! Jason definitely fought harpies, in order to get directions from Phineas!\"\n\n\"Wow,\" Steve says. \"He fought bird women, just to get directions? I'll never complain about my GPS again!\"\n\n\"And the skeleton army came from dragon's teeth, or something like that,\" you say. \"That was one of the challenges to get the golden fleece. Yes, it's definitely Jason!\"\n\nThere is a beep, and the door opens. Claudia stumbles outside, her blonde hair a mess. \"Thank you,\" she says.\n\n\"You did it!\" Elena says. \"Way to go!\"\n\n\"Now to save the other three,\" Jessica says.\n\n\"Can I maybe sit down a bit first? And maybe someone can explain to me what's going on?\" Claudia asks politely, only she [i]doesn't[/i] ask politely. She uses three loud swear words when asking what's going on, and you can't exactly blame her.\n\nYou and Elena stay behind to talk to Claudia, while the others check out the three remaining doors. Claudia seems to know Elena best, and while she's clearly not [i]happy[/i] about the situation, she seems less willing to cuss out Elena than anyone else.\n\n\"Why would someone kidnap the prom committee and all three prom queen candidates?\" Claudia asks. \"That makes no sense!\"\n\n\"Tell me about it,\" you say. \"This is the weirdest revenge scheme I've ever heard of.\"\n\n\"Maybe it's a joke?\" Elena asks. \"Nobody has been seriously injured so far. That's a good sign.\"\n\n\"Wrong,\" a voice says.\n*page_break\nYou look up to see Steve, looking forlorn.\n\n\"What's wrong?\" you ask.\n\n\"Alejandro,\" Steve says. \"He...he didn't make it.\"\n\n\"What do you mean?\" Elena asks.\n\n\"He answered the question on his door incorrectly,\" Steve says. \"We heard him scream, and then...nothing. He doesn't respond, no matter what we do. Same with the other door. Whoever's behind there must have been killed, too.\"\n\n\"Maybe he's just unconscious,\" Elena says.\n\n\"Yeah, if you haven't seen him, you don't know for sure that he's dead,\" you say.\n\nClaudia doesn't seem to be paying attention. She's focusing on the other people, who are all gathered near a door. \"What about them?\" she asks.\n\n\"They're with Vice-Principal Smothers,\" Steve says. \"He, um...started yelling at Bruce, when he heard Bruce was on the other side of the door. They're trying to get Smothers to calm down and solve the puzzle, but no luck so far.\"\n\nThe four of you go towards the door to see if you can help, but you're too late. As you approach, you hear a scream from the other side of the door.\n\n\"No, I said [i]not[/i] that one!\" Bruce yells. \"Can't you listen?\"\n\nThere is no response. Bruce slams on the door, but nothing happens. He starts cussing loudly. \"What now?\" he asks.\n\n\"There's only one door left,\" Jessica says. \"We should try again to--\"\n\nAs if in response to her statement, there is a beep, and the final door opens. Everyone waits to see who comes out.\n*finish\n\n\n*label Smothers\n\"Let me out!\" Smothers says. \"I have had [i]more[/i] than enough of this! You are all getting detention!\"\n\n\"Smothers? That you?\" Bruce asks.\n\n\"Mr. Wilkins! I should have known!\" Smothers says. \"Let me out of here! I know nothing about Greek mythology!\"\n\n\"Maybe you should--\" Bruce says.\n\n\"The entire prom committee is here, Mr. Smothers,\" Jessica interrupts. \"We were all kidnapped, too.\"\n\n\"Miss Moore? You're in on this prank? Unbelievable!\" Smothers says.\n\n\"What's this about Greek mythology?\" you ask.\n\n\"Like you don't already know, you cruel monsters!\" Smothers says. \"It's written here on the screen!\"\n\n[i]Wrong again! This is your final chance. You've heard of three strikes, and you're out? This is three strikes, and you're dead! Get this one wrong, and it's bye-bye Smothers![/i]\n\n[i]Which Greek myth features harpies and a skeleton army?[/i]\n\n*choice\n #Alcestis\n  *goto Smothers_wrong\n #The twelve labors of Hercules\n  *goto Smothers_wrong\n #Jason and the Argonauts\n  *goto Smothers_right\n\n*label Smothers_right\n*set puzzle_3_answered true\n*set puzzle_3_answer \"Jason and the Argonauts\"\n\"It's Jason and the Argonauts!\" you say.\n\n\"No way, it's Hercules!\" Steve says. \"He fought monsters all the time!\"\n\nElena shrugs. \"I think we were supposed to read about Alcestis in English class, but I didn't read that chapter,\" she says.\n\n\"Detention for not doing your homework!\" Smothers says. \"Detention for all of you!\"\n\n\"It's Jason,\" you insist. \"He fought harpies, in order to save Phineas the seer, in order to get directions to Colchis, in order to--\"\n\n\"Okay, we get it, you know the answers,\" Bruce says. \"It's Jason and the Argo-whatevers!\"\n\n\"Good!\" Vice-Principal Smothers says. \"Now I know which one [i]not[/i] to pick!\"\n\n\"But that's the right answer!\" you cry.\n\n\"If you think I'm trusting the word of a bunch of teenage kidnappers, you are sadly mist-AAAAAAA!\" Smothers screams.\n\nThe gym falls silent. \"He chose...poorly,\" Bruce says.\n\n\"Stuff it, Bruce,\" Jessica says. \"Smothers could be dead right now. Nancy and Alejandro could be next.\"\n\nWhat should you do now?\n\n*choice\n #Try to help one of the other victims\n  *goto Smothers_1\n #Do nothing\n  *goto Smothers_2\n\n\n*label Smothers_2\nNobody feels like trying to open any of other doors, and all of you stand in silence for a while, until another door opens. You've never met Claudia Barrett before, but you recognize her immediately. Her face is red, and a stream of furious words flows from her mouth as she marches towards your group.\n\n\"Uh...what's she's saying?\" Steve whispers.\n\nBruce rolls his eyes. \"Dude, she's swearing in Spanish.\"\n\n\"You know Spanish?\" Elena asks.\n\n\"Just the swear words,\" Bruce says.\n\nClaudia reaches the group. \"What is going on?!\" Claudia yells. \"Who's responsible for this?!\"\n\n\"That's what [i]we[/i] want to know!\" Mallory says. \"We've all been kidnapped, too!\"\n\nClaudia eyes your group warily, and she must decide you're safe, because she unclenches her firsts. \"You. You're in my math class,\" she says to Jessica. \"And Elena? You're here, too?\"\n\n\"Yes, and I have no idea why,\" Elena says. \"I had nothing to do with Nancy being elected prom queen.\"\n\n\"Prom? Is [i]that[/i] what this is all about?\" Claudia asks.\n\n\"We're all on prom committee,\" you explain. \"The only ones not here yet are Nancy Spier and Alejandro Gomez.\"\n\n\"Alejandro?\" Claudia asks. \"He wouldn't kidnap anyone!\"\n\n\"You think one of [i]us[/i] is the kidnapper?\" Mallory asks. \"No way, we're the victims!\"\n\n\"Sorry, but I'm not about to trust a bunch of near-strangers about my kidnapping,\" Claudia says. \"How do I know this isn't some kind of stupid prank?\"\n\n\"This is serious,\" Jessica says. \"We just heard Vice-Principal Smothers get attacked.\"\n\n\"The bald guy? What does [i]he[/i] have to do with this?\" Claudia asks.\n\n\"He's in charge of the prom committee,\" Jessica says. \"Well, technically, he's the prom advisor, but he can veto any--\"\n\n\"AAAAAAUGH!\" a voice screams.\n\n\"It came from there!\" Jessica says, pointing at one of the three closed doors.\n\n\"That was Alejandro!\" Bruce says. \"Either that, or Steve's girlfriend is way more--\"\n\n\"Shut up, that wasn't Nancy!\" Steve says.\n\nClaudia's eyes are wide. \"Is he...I mean...did he just [i]die?[/i]\" she gasps.\n\n\"The only way to find out is to go along with this weird game,\" Elena says. She gestures towards the final closed door. \"That's the last door. Only one person left.\"\n\n\"But is Nancy really--?\" Claudia begins to say. She falls silent as there is a beep, and the door opens by itself.\n*finish\n\n\n*label Smothers_1\n\"We've got to help the others!\" you say.\n\nEveryone splits into groups of two. You and Elena pair together, naturally, and the door you pick has Claudia Barrett on the other side. Together, the three of your figure out the math puzzle that keeps her door locked. Unlike Smothers, she gets the right answer.\n\nYou've never met Claudia before, but you recognize her immediately, even with the angry expression and messed-up hair. \"When I find out who did this, I am going to [i]kill[/i] them,\" she vows.\n\n\"Get in line,\" Elena says. The two of you quickly explain the situation to her, and the three of you join up with the others, who are all huddled by one door.\n\n\"What's going on?\" you say.\n\n\"Alejandro is behind that door,\" Mallory explains. \"Bruce and I checked out the other door, but nobody answered, no matter how loud we knocked.\"\n\n\"Alejandro Gomez?\" Claudia asks. \"From Spain?\"\n\n\"That's him,\" Mallory says. \"Are any of you good at math? His puzzle is some kind of quadratic equation thing. Maybe you--\"\n\n\"NOOOOOOO!\" Alejandro screams from inside the room. There is a loud thud, immediately afterwards.\n\n\"...Never mind,\" Mallory says.\n\n\"Dios mio, is he dead?\" Claudia gasps.\n\n\"Hopefully just unconscious,\" you say. \"There's no way to know without breaking the door down.\"\n\n\"Then break the door down!\" Claudia says.\n\nBefore anyone can say something else, there is a loud click, and the final door opens by itself. \"But there was no one inside that room!\" Mallory gasps softly.\n\nEveryone waits for a moment, but no one exits.\n*finish\n\n\n*label Smothers_wrong\n*set puzzle_3_answered true\n*set puzzle_3_answer \"Jason and the Argonauts\"\n\"I have no idea!\" you say. \"I didn't know there was going to be a quiz on this!\"\n\n\"Is it Hercules?\" Steve says. \"He fought monsters all the time!\"\n\nElena shrugs. \"I think we were supposed to read about Alcestis in English class, but I didn't read that chapter,\" she says.\n\n\"Detention for not doing your homework!\" Smothers says. \"Detention for all of you!\"\n\n\"I think it's Jason and the Argonauts, maybe,\" you say. \"He created a skeleton army out of dragon's teeth. I don't remember him fighting any harpies, though. The chapter about him was really long.\"\n\n\"Good!\" Vice-Principal Smothers says. \"Now I know which one [i]not[/i] to pick!\"\n\n\"What?\" you ask.\n\n\"If you think I'm trusting the word of a bunch of teenage kidnappers, you are sadly mist-AAAAAAA!\" Smothers screams.\n\nThe gym falls silent. \"He chose...poorly,\" Bruce says.\n\n\"Stuff it, Bruce,\" Jessica says. \"Smothers could be dead right now. Nancy and Alejandro could be next.\"\n\nWhat should you do now?\n\n*choice\n #Try to help one of the other victims\n  *goto Smothers_1\n #Do nothing\n  *goto Smothers_2\n", "route_1_chapter_5": "[b]Chapter 5[/b]\n\nEveryone watches the door for a few moments, but nothing happens.\n\n\"Hello?\" you call. \"Nancy?\"\n\nThere is no response.\n\n\"No one's in there,\" Bruce says.\n\n\"Nonsense,\" Jessica says. \"Someone [i]must[/i] be in there. Locked doors don't open on their own.\"\n\n\"Doors with locks controlled by computers do,\" you say. \"But there's only one way to be sure.\"\n\nYou head towards the open door, but Steve beats you there. \"It's empty!\" he calls.\n\nEveryone jogs over, and it looks like Steve is correct. This particular supply closet is completely empty, with nothing inside but a layer of dust and an orange stain near the corner.\n\n\"Why was the door locked, if it's empty?\" Jessica asks.\n\n\"Maybe you were wrong about it being locked,\" Bruce says. \"You sure you checked this one?\"\n\n\"I checked every door, Bruce,\" Jessica says, shooting him a death glare. \"Don't you dare suggest I'm not taking this seriously.\"\n\n\"Wait. There's a touchpad on the door,\" Mallory says. Sure enough, on the inside of the door is a touchpad, just like the supply closet you escaped from. The only difference is what's written on the screen.\n\n[i]I suppose congratulations are in order. The seven of you made it past the first round of our game. Your reward is the first digit to the combination lock: 4. Too bad Alejandro and Mr. Smothers aren't alive to see this.[/i]\n\nWhat can you conclude from this message?\n\n*choice\n #The kidnapper is watching you\n  \"The kidnapper is watching us right now,\" Claudia says. \"They're probably using the school's security cameras!\"\n\n  \"I thought those were supposed to be impossible to hack,\" Mallory says.\n\n  \"Kidnapping a bunch of people is supposed to be impossible, too, but they found a way to do it,\" Bruce says.\n\n  Claudia smashes her fist against the door. \"Stop spying on us! You hear that, you psycho?\"\n\n  *goto 1\n #The kidnapper knows what's going to happen in advance\n  \"The kidnapper wrote this message in advance,\" Steve says. \"That means they [i]know[/i] what's going to happen in advance. You know what that means?\"\n\n  \"We've been kidnapped by a time traveler?\" Elena asks. \"Get real.\"\n\n  \"I was going to say we've been kidnapped by a psychic,\" Steve says. \"Now I'm worried we're kidnapped by a time travelling psychic. Thanks a lot, Elena.\"\n\n  \"I don't care [i]who[/i] kidnapped us, as long as they [i]let us go![/i]\" Claudia cries. She hits the door with her fist. \"You hear that, you psycho?\"\n\n  *goto 1\n\n*label 1\nThe text on the screen disappears and is replaced with new text.\n\n[i]I can hear you just fine, Claudia. I've been watching you--all of you--for a long time now. And I must say, it's disappointing how easy it was to capture you. I expected a bit more of a challenge.[/i]\n\n[i]Speaking of challenges, it's time for round two of our game! This time, you'll have to split up into two different groups. Won't that be fun?[/i]\n\n[i]But what's this? There are seven of you, and that's an odd number. Oh, dear! It wouldn't be fair, to split you up into a group of four and a group of three. There must be a way to make the groups even. Anyone want to sit this round out?[/i]\n\n\"Stop messing with us, and tell us who you are!\" Claudia shouts. She continues pounding the door. \"Why are we here? [i]Show yourself![/i]\"\n\nClaudia switches back to swearing in Spanish, and new text appears.\n\n[i]Thank you for volunteering, Claudia.[/i]\n\nYou don't quite see what happens next, as the screen flashes bright white, momentarily blinding you. Claudia screams, stumbles backwards and collapses on the ground. Steve immediately kneels down next to her and examines her neck.\n\n\"What happened?\" Jessica gasps. \"Is she okay?\"\n\n\"Is she dead?\" Elena asks.\n\nSteve looks up. \"I can feel her pulse,\" he says. \"She's unconscious. Did anyone see what happened to her?\"\n\n\"Everyone saw, you idiot,\" Bruce says. \"We were all looking at the screen. It electrocuted her!\"\n\n\"Touchscreens can't do that!\" Mallory says. \"They're specifically designed [i]not[/i] to hurt users!\"\n\n\"And they're not supposed to give death quizzes, either!\" Bruce says. \"This isn't a normal situation!\"\n*page_break\nThe touchscreen changes one last time.\n\n[i]Poor Claudia. Unless you want to end up like her, I suggest you split up into two groups. No cheating. Don't forget that I'll be watching.[/i]\n\n[i]As you probably know, the gym connects to the locker rooms. Did you notice I put touchscreens on the locker room doors? You have five minutes to split yourself into two groups. Each group will search a different room. Touch the screen on the door, to begin.[/i]\n\n[i]Remember, you have five minutes. If you take too long to start the challenge, you'll receive a shocking surprise, like Claudia did. What are you doing, standing around here? Time's wasting![/i]\n\nA few people swear, and you can't exactly blame them. The kidnapper is not answering any questions, and they're purposely not giving you enough time to make decisions.\n\nEveryone heads towards the locker room doors. Years ago, the locker rooms used to be separated by male and female, but now they're labelled as \"Home Team\" and \"Away Team\".\n\n\"I'm searching Home,\" Steve says. \"I'm more familiar with that one.\"\n\n\"Typical jock, trying to get the home team advantage,\" Elena jokes.\n\n\"I'll go with Steve,\" Mallory says. \"Sorry, but if anything bad happens, I want the big football player on my side.\"\n\n\"Elena and I can go Away,\" Bruce says. \"I mean, not [i]go away[/i], but...you know what I mean.\"\n\n\"I want to search the Away rooms, too,\" Jessica says.\n\nSo that's Bruce, Jessica and Elena in the Away Team Locker Room, leaving you, Steve and Mallory in the Home Team Locker Room. Are you okay with that?\n\n*choice\n #You're fine with that\n  *goto home_start\n\n #Switch with Elena\n  *goto away_start\n\n*label away_start\n*set chapter_5_what_is_first \"away\"\nBruce and Elena together? That sounds like trouble waiting to happen. \"I want to search the Away Team Locker Room,\" you say. \"Switch with me, Elena.\"\n\n\"Are you sure?\" she asks. \"I thought I would...\"\n\n\"It's the one I use in gym class,\" you say. \"I'm more familiar with it.\"\n\n\"Really?\" Mallory asks. \"My class uses the Home room. Why would they change rooms, for different classes?\"\n\n\"We don't have time to discuss this,\" Jessica says. \"Remember, the kidnapper said we have less than five minutes to pick rooms, otherwise we get electrocuted like Claudia.\"\n\n\"Fine, I'll switch,\" Elena says quickly. She glares at you, letting you know that she's not happy about the situation. You smile apologetically at her, but she doesn't seem mollified.\n\nElena and the other two go away, while you, Bruce and Jessica group around the door. The touchscreen by the doorknob is blank, until you reach out and tap it.\n\n[i]Good, you can follow directions. That will make things easier for you![/i]\n\n[i]There are two special items for you, hidden inside this locker room. Can you find them within ten minutes? If you're not out of the room by then, this door will lock automatically, trapping everyone inside. I wonder how many people will be caught unaware [b]this[/i] time?[/i]\n\n[i]No. I wonder if you'll even be able to [b]enter[/b] the room in time! This puzzle is particularly tricky![/i]\n\n[i]Elena Adams, Claudia Barrett, Alejandro Gomez, Jessica Moore, Mallory Ramsey, Mr. Wilberforce Smothers, Steve Stevens, and Bruce Wilkins are all standing in line. They are standing in alphabetical order, by first name.[/i]\n\n[i]The second place person swaps with the last place person. Claudia and Elena swap. Jessica swaps with a teacher. Mr. Smothers goes back one. Steve goes four ahead in line. Where is he?[/i]\n\n*choice\n #First\n  *goto away_puzzle_2\n #Second\n  *goto away_puzzle_2\n #Third\n  *goto away_puzzle_solved\n #Fourth\n  *goto away_puzzle_2\n #Fifth\n  *goto away_puzzle_2\n #Sixth\n  *goto away_puzzle_2\n #Seventh\n  *goto away_puzzle_2\n #Eighth\n  *goto away_puzzle_2\n\n\n*label away_puzzle_2\n[i]WRONG! You just wasted some of your time! Ha ha ha! Try again![/i]\n\n[i]Elena Adams, Claudia Barrett, Alejandro Gomez, Jessica Moore, Mallory Ramsey, Mr. Wilberforce Smothers, Steve Stevens, and Bruce Wilkins are all standing in line. They are standing in alphabetical order, by first name.[/i]\n\n[i]The second place person swaps with the last place person. Claudia and Elena swap. Jessica swaps with a teacher. Mr. Smothers goes back one. Steve goes four ahead in line. Where is he?[/i]\n\n*choice\n #First\n  *goto away_puzzle_3\n #Second\n  *goto away_puzzle_3\n #Third\n  *goto away_puzzle_solved\n #Fourth\n  *goto away_puzzle_3\n #Fifth\n  *goto away_puzzle_3\n #Sixth\n  *goto away_puzzle_3\n #Seventh\n  *goto away_puzzle_3\n #Eighth\n  *goto away_puzzle_3\n\n*label away_puzzle_3\n[i]Wrong again! You're just randomly guessing, aren't you? I'll make the puzzle simpler, but this is the last time! Get this wrong, and you'll be electrocuted![/i]\n\n[i]Elena Adams, Claudia Barrett, Alejandro Gomez, Jessica Moore, Mallory Ramsey, Mr. Wilberforce Smothers, Steve Stevens, and Bruce Wilkins are all standing in line. They are standing in alphabetical order, by first name.[/i]\n\n[i]The second place person swaps with the last place person. Claudia and Elena swap. Jessica swaps with a teacher. Where is Elena standing?[/i]\n\n*choice\n #First\n  No, Elena isn't standing there. Try again!\n\n  Hint: Elena only moves once.\n\n  *goto away_puzzle_3\n #Second\n  No, Elena isn't standing there. Try again!\n\n  Hint: Elena only moves once.\n\n  *goto away_puzzle_3\n #Third\n  *goto away_puzzle_solved\n #Fourth\n  No, Elena isn't standing there. Try again!\n\n  Hint: When last place swaps with second place, that is Bruce swapping with Mr. Smothers.\n\n  *goto away_puzzle_3\n #Fifth\n  No, Elena isn't standing there. Try again!\n\n  Hint: Elena starts in fourth.\n\n  *goto away_puzzle_3\n #Sixth\n  No, Elena isn't standing there. Try again!\n\n  Hint: Elena starts in fourth.\n\n  *goto away_puzzle_3\n #Seventh\n  No, Elena isn't standing there. Try again!\n\n  Hint: The last swap doesn't affect Elena at all.\n\n  *goto away_puzzle_3\n #Eighth\n  No, Elena isn't standing there. Try again!\n\n  Hint: The last swap doesn't affect Elena at all.\n\n  *goto away_puzzle_3\n\n*label away_puzzle_solved\n*set puzzle_4_answered true\n*set puzzle_4_answer \"Third\"\n[i]You got it correct? Bah, humbug! You just got lucky. You won't be as lucky, finding the two items in this room. Time is running out![/i]\n\n[i]How much of your ten minutes remain? I know, but I'm not telling! Good luck, fools![/i]\n\n\"Whoever this kidnapper is, they're a jerk,\" Bruce says.\n\n\"Yeah, I figured that out,\" you say.\n\nThe door clicks, and the three of you enter the locker room. The room is made up of eight rows of lockers, along the walls and in the middle. The wall to your left has a row of bathroom stalls, while the wall in the far back is an open shower area, complete with some dirty graffiti that the school janitors have never been able to remove.\n\n\"Let's split up,\" Jessica says. \"I'll take the left, and--\"\n\n\"Who put [i]you[/i] in charge?\" Bruce asks.\n\n\"Everyone did,\" Jessica says. \"You all voted to put me in charge of the prom committee, remember?\"\n\n\"That was at the beginning of the school year!\" Bruce says. \"It doesn't mean you get to boss me around for the rest of your life!\"\n\n\"That wouldn't be a bad idea, because your life is an aimless mess!\" Jessica says. \"That's why I broke up with you, loser!\"\n\n\"Broke up?\" you ask.\n\n\"We used to date, and it was the worst week of my life!\" Bruce says. \"I know I'm the most awesome guy in school, but you seriously need to [i]get over it![/i]\"\n\nBruce angrily marches to the right side of the room, so the lockers are in between him and Jessica. This doesn't stop her from glaring in his direction. You decide to...\n\n*choice\n #Search with Jessica\n  *goto away_1\n #Search with Bruce\n  *goto away_2\n\n*label away_1\n\"Where should we search first?\" you ask.\n\nJessica snaps to attention. \"We can get the stalls and the shower area,\" she says. \"Let's work from the outside in. I'll get the far side.\"\n\nYou take the first stall, searching in and around the toilet. You also stick your hand in the toilet paper holder, but there's nothing there. \"This one's empty,\" you say, moving on to the next one.\n\n*if vague_love_interest = \"Jessica\"\n \"So...you used to date Bruce?\" you ask.\n\n \"Our friends set us up,\" Jessica says. \"I knew it was a terrible idea, and I shouldn't have gone through with it. He's not my type at all.\"\n\n \"What [i]is[/i] your type?\" you ask, hoping to sound casual.\n\n \"Someone who's not completely irresponsible,\" Jessica says. \"I mean, you've seen Bruce. He tries to fight people on [i]everything[/i]! It's his way of hiding his insecurities.\"\n\n \"I'm not insecure!\" Bruce yells from the other side of the room.\n\n \"Yes, you are, if you're spying on us!\" Jessica yells back.\n\n \"Stop talking so loud, and I won't overhear!\" Bruce yells.\n\n On second thought, maybe trying to talk to Jessica through multiple bathroom stalls is a bad idea.\n\n *goto away_1_1 \n*else\n \"This one's clean, too!\" Jessica says back. \"Well, not [i]clean[/i], but you know what I mean.\"\n\n \"Should I check inside the water tank, too?\" you ask.\n\n \"Of course!\" Jessica says. \"There aren't [i]that[/i] many hiding places in a locker room! Check everywhere!\"\n\n You sigh a little. Great. Now you'll have to go back to the first stall and double-check the water tank.\n\n *goto away_1_1 \n\n*label away_1_1\n\"Wait! I think I found it!\" Jessica says. \"It was on the lid of the toilet in the third stall. The kidnapper didn't even [i]try[/i] to hide it!\"\n\n\"What is it?\" you ask.\n\n\"Some numbers,\" she says. \"I'll show you when we're done. Keep searching! I don't know how much time we have left!\"\n*page_break\nYou and Jessica finish searching the toilet stalls and move on to the shower area. You're not sure what the point of searching here is, because it's an open area. There's no place to hide anything, except maybe in the empty towel rack.\n\n\"Got it!\" Bruce calls from the locker area.\n\n\"You sure?\" Jessica asks.\n\n\"Yeah, it's a name plate,\" Bruce says. \"Let's go!\"\n\nThe three of you jog to the door and go through it. Nobody is electrocuted by the doorknob, so presumably, you're within the time limit.\n\nJessica and Bruce show off the items they found. Jessica has a paper with \"4 2 _ _\" written on it, while Bruce has a name plate with the principal's name on it. \"The kidnapper must have taken this from her desk,\" he says.\n\n\"Why?\" you ask. \"Did the principal get taken, too?\"\n\n\"Maybe it'll make more sense, when we see the other group's clues,\" Jessica says. \"This is clearly [i]half[/i] a clue, not a full one. Where are the others?\"\n\n\"I don't know, but they'd better finish soon...\" you say.\n*set evidence_1_found true\n*set evidence_1 \"name plate\"\n*finish\n\n*label away_2\nYou follow after Bruce, in the locker area. He seems mildly surprised to see you.\n\n\"You take the ones on the left, I'll do the ones on the right,\" he says.\n\n\"Sure,\" you say.\n\nYou open the first locker and check inside. Nothing. You check the second locker, which is empty except for a dirty sock. Gross. You check the third locker, when Bruce says, \"Freaking Jessica is such a control freak! I can't stand her. I avoid her whenever I can.\"\n\n\"Then why are you on prom committee?\" you ask. It's not the first time you've wondered that, as he has shown zero interest in the committee all year long.\n\n\"I have my reasons,\" Bruce says.\n\n\"And they are?\" you ask.\n\n\"Secret,\" Bruce says. \"Mind your own business! Jeez, you're just as bad as Jessica!\"\n\nHuh. You wonder if you're just being paranoid, or if Bruce is overreacting. Is he only [i]pretending[/i] to hate Jessica? Why would he do that? Are they secretly still dating, or something? That'd be strange, but it'd make more sense than Mr. Loner being part of a prom committee run by his ex-girlfriend and least favorite teacher.\n\n[i]What if they're hiding their relationship, because they don't want people to know they're connected?[/i] you wonder. [i]What if they're the culprits, and they've been working together all year to plan this massive kidnapping?[/i]\n\nThe only question is \"why?\". Why would Bruce and Jessica kidnap everyone? Why would [i]anyone[/i] want to kidnap the prom committee? It makes no sense! Kidnapping high schoolers and forcing them to solve weird puzzles? Killing two of them? What kind of maniac [i]does[/i] something like that?\n*page_break\nYou continue searching the lockers while you think. It's boring work, but at least it's easy. It doesn't take long to confirm that a locker is empty.\n\n\"I got something,\" Bruce says. He reaches to the bottom of a locker and pulls out a silver rectangle. He turns it over, and you see that it's actually a name plate, with the principal's name on it.\n\n*set evidence_1_found true\n*set evidence_1 \"name plate\"\n\"Uh...was that taken from the principal's office?\" you ask.\n\n\"Looks like it,\" Bruce says. \"I've been in her office twice. She keeps it on her desk.\"\n\n\"Jessica, we found something!\" you call.\n\n\"Great!\" she calls back. \"Keep searching the lockers! I'm almost done with the toilets!\"\n\n\"This isn't the time to use the bathroom!\" Bruce calls.\n\n\"SHUT UP, BRUCE!\" Jessica calls back.\n\nYou go back to searching lockers, but less than ten seconds later, Jessica says, \"Wait! I got the second clue! Let's leave before the time runs out!\"\n\nYou can't help but feel slightly happy about the situation. Yeah, you're still kidnapped, but your team beat the locker room search challenge with flying colors! Not that searching a locker room is all that complicated, but you'll take your victories where you can get them.\n\nThe three of you go through the door, back to the gym. Jessica's clue is a piece of paper with \"4 2 _ _\" written on it. \"Clearly half of a code,\" Jessica says. \"I'm betting it's the code to the hallway.\"\n\n\"Where's the other half?\" you ask.\n\n\"Probably in the other group's locker room,\" Bruce says. \"Where are they, anyway?\"\n\n\"I don't know, but they'd better finish soon...\" you say. If they don't find the clue and get out in time, they won't be the only ones to get stuck.\n*finish\n\n\n*label home_start\n*set chapter_5_what_is_first \"home\"\n\"Good. Let's go,\" you say.\n\nYou, Steve and Mallory split off from the others and head to the door of the Home Team Locker Room. Steve gets there first and claps his hands excitedly.\n\n\"Okay, team!\" he says. \"We finished the first quarter! They may have gotten two of our players, but we can recover! We're gonna dominate this next part, so we can start the second half strong! Who's with me?\"\n\nYou and Mallory just stare at him.\n\n\"Is that some kind of football thing?\" Mallory asks.\n\nSteve's face falls. \"The team captain always gives a pep talk before we head into the locker room,\" he says. \"Don't they do that for all sports?\"\n\n\"I don't play sports,\" Mallory says.\n\n\"Prom Committee is my main extracurricular activity,\" you say. \"You should know that.\"\n\n\"I'm just trying to help,\" Steve says. He sighs, then presses the touchscreen.\n\n[i]One, two, three...good, you're here. And you made it within five minutes, too! As a reward, you get ten minutes to search this locker room. But first, a word puzzle![/i]\n\n• [i]Green[/i]\n*line_break\n• [i]Yellow[/i]\n*line_break\n• [i]Apple[/i]\n*line_break\n• [i]Egg White[/i]\n\n[i]What color comes next in the series?[/i]\n\n*choice\n #Orange\n  *goto home_puzzle_1\n #Copper\n  *goto home_puzzle_correct\n #Blue\n  *goto home_puzzle_1\n #Magenta\n  *goto home_puzzle_1\n\n*label home_puzzle_1\n[i]Wrong, you fools! You just wasted some of your ten minutes. Now try again![/i]\n\n• [i]Green[/i]\n*line_break\n• [i]Yellow[/i]\n*line_break\n• [i]Apple[/i]\n*line_break\n• [i]Egg White[/i]\n\n[i]What color comes next in the series?[/i]\n\n*choice\n #Orange\n  *goto home_puzzle_2\n #Copper\n  *goto home_puzzle_correct\n #Blue\n  *goto home_puzzle_2\n #Magenta\n  *goto home_puzzle_2\n\n*label home_puzzle_2\n[i]And now you've wasted even more of your time. Congratulations! There will probably be no time left, when you've solved this puzzle![/i]\n\n• [i]Green[/i]\n*line_break\n• [i]Yellow[/i]\n*line_break\n• [i]Apple[/i]\n*line_break\n• [i]Egg White[/i]\n\n[i]What color comes next in the series?[/i]\n\n*choice\n #Orange\n  No, orange is not the correct answer.\n\n  *goto home_puzzle_2\n #Copper\n  *goto home_puzzle_correct\n #Blue\n  Blue is not the correct answer.\n\n  *goto home_puzzle_2\n #Magenta\n  Sorry, but magenta is wrong. Try again!\n\n  *goto home_puzzle_2\n\n\n*label home_puzzle_correct\n*set puzzle_4_answered true\n*set puzzle_4_answer \"Copper\"\n[i]Copper, yes! All of those words have the same letter repeat twice in a row. The fact that they were all colors is completely irrelevant, just like your futures![/i]\n\n[i]There are two clues, hidden inside this locker room. Can you find them both? If you can, you get to move on to the next round of our little game! If not, you'll die like the other losers. Speaking of losers, tell Steve how impressed we all are that he managed to lose every single game of the season! Way to embarrass Franklin High! I'll bet some students are secretly [b]glad[/b] you were kidnapped![/i]\n\nSteve swears and kicks the door open. You take a step backwards, shocked. \"Whoa!\" you say.\n\n\"Sorry,\" Steve says. \"Let's go.\"\n\nYou've never been in the Home Team Locker Room before. It looks just like the Away Team Locker Room that your gym class used, except the final row of lockers are three times as wide as normal.\n\n\"What's with the huge lockers?\" you ask.\n\n\"Those are for the football equipment,\" Steve says.\n\n\"The football team gets its own lockers?\" Mallory asks. \"That's so not fair. All the other teams have to use the gym storerooms.\"\n\n\"The ones we woke up in?\" you ask.\n\n\"Yeah,\" Mallory says. \"Mine had a bunch of rackets in it. Maybe I should have taken one for self defense.\"\n\n\"Enough talk,\" Steve says. \"What do you want to check?\"\n\n*choice\n #The big football lockers\n  *goto home_1\n #The normal lockers\n  *goto home_2\n #The shower and bathroom stalls\n  *goto home_3\n\n*label home_1\n\"I'm checking those big football lockers,\" you say.\n\n\"Aw, I wanted to check those!\" Steve says. \"Fine, I'll do the normal lockers, but let me know if you have any questions.\"\n\n[i]Questions about how to look inside a locker?[/i] you wonder, but you don't say it out loud. As you just saw, Steve can get a little touchy about his football team.\n\nYou examine the big lockers. They contain typical football equipment: a helmet, shoulder pads, pants, shoes, and three different sets of jerseys. How lucky that the football stars get plenty of room for [i]their[/i] stuff, you think. Your gym locker was so tiny, you had to work to shove a single change of clothes in there, along with your backpack and shoes.\n\nNothing looks out of place, but you double-check by putting your hands in the shoes and moving the jerseys aside, just in case there's something behind them. You go through the next few lockers in turn, but there's nothing out of the ordinary. You start throwing the helmets away, in case there's something inside them.\n\n\"Be careful with those!\" Steve scolds.\n\nYour search is boring and fruitless, until you reach the final locker, which has a letter \"C\" on it. \"C\" for \"Captain\", you suppose, meaning it is Steve's locker. Inside is a small photograph of him and Nancy, which is admittedly kind of sweet. Some of the other football players had photographs in their lockers, too, but those were of the less appropriate variety.\n\nAt the bottom of the locker, in between Steve's shoes, is a remote. You pick it up. It appears to be a TV remote. That's not something you'd expect to find in a locker room!\n\n\"Steve, is this [i]your[/i] TV remote?\" you ask.\n\n\"No,\" he says. \"Was it in my locker?\"\n\n\"Yep,\" you say, smugly. \"I think we just found the first clue.\"\n\n\"Second clue,\" Steve corrects you. \"I found this piece of paper with numbers on it.\"\n*set evidence_1_found true\n*set evidence_1 \"TV remote\"\n*page_break\nSteve shows you the paper, which has \"_ _3 2\" written on it.\n\n\"Weird,\" you say. \"Is it part of a combination? Maybe someone forgot their locker code?\"\n\n\"None of the lockers are locked,\" Steve points out. \"I wonder if the kidnapper cut off all the locks.\"\n\n\"Nah, if that was the case, there'd be dirty gym clothes in every locker,\" you say. \"Unless the kidnapper got rid of those, too. Let's keep looking.\"\n\n\"But we found both clues!\" Steve says.\n\n\"Maybe one of them isn't a clue, though,\" you say. \"Maybe it's just random garbage.\"\n\n\"Well...we have ten minutes,\" Steve says. \"It'd be dumb for us to not check everywhere. Here, you can do the next row of lockers.\"\n\nThe two of you search the other lockers in silence. Unlike the football lockers, these ones are totally empty. That makes searching easier, but way more boring. Soon enough, the two of you have checked every locker.\n\n\"You want to look under the benches?\" you ask.\n\n\"I guess,\" Steve says, getting down on his hands and knees. \"There's nowhere else to check.\"\n\nYou get onto a bench and jump up, to see if there's anything on top of the lockers. Nothing but dust and an old sticker. You catch a glimpse of Mallory's curly hair, on the other side of the room. \"Any luck, Mallory?\" you ask.\n\n\"I found something, but it's weird!\" she says. \"I'm just about done here. Let me wrap up, and I'll show it to you.\"\n\nMallory finishes soon enough. She meets you and Steve by the exit door. \"It's a wedding announcement,\" she says. \"And it's old.\"\n\nThe wedding announcement is cut out of a newspaper, and it's dated twenty-five years ago. \"Local businessman Franklin Barrett marries Claudia Gomez, of Spain\" reads the caption to the black-and-white photograph of a bride and groom.\n\n\"Claudia?\" you ask. \"Is this Claudia's mom? Is she named after her mom?\"\n\n\"She looks more like the guy,\" Mallory says. \"I think this is her father. They have the same last name.\"\n\n\"And Gomez is Alejandro's last name,\" you say. \"He's from Spain, too. I...does this mean he's related to Claudia?\"\n\n\"No idea,\" Steve says. \"Earlier today, he acted like he didn't know her.\"\n\n\"Weird,\" you say, unsure what to make of this new clue.\n*set evidence_3_found true\n*set evidence_3 \"wedding announcement\"\n*finish\n\n*label home_2\n\"I'll take the normal lockers,\" you say.\n\n\"I call the football lockers!\" Steve says quickly.\n\n\"Is that the reason why you wanted to check the Home Team Locker Room?\" Mallory asks. \"You wanted to make sure no one took your stuff?\"\n\n\"No,\" Steve says, in a voice that doesn't quite convince you.\n\nYou start searching the lockers closest to you, going through the top lockers first, and the bottom lockers second. They're empty, except for the occasional stain or piece of gum. One locker has a shirt inside. You get excited as you unfold it, only to find that it's a blank white shirt. Pinned to the front is a note with the words \"Fooled you!\" printed on it.\n\n\"Jerk,\" you mutter to yourself. Childish pranks like that make you slightly less terrified of your murdering captor.\n\nThe next row of lockers is also empty, but you find what you're looking for in the middle row. Well, kind of. It's another piece of paper, except it has \"_ _3 2\" written on it. What does [i]that[/i] mean? Is it a clue, or just random garbage from a student?\n\nYou decide to hang on to it, as you keep searching.\n*page_break\n\"Any luck?\" Steve asks.\n\n\"I found this weird paper,\" you say, giving it to him. \"Are you done already?\"\n\n\"Yeah,\" he says. He holds out a remote control. \"I found this in my locker. It can't be a coincidence that the kidnapper used [i]my[/i] locker to hide something.\"\n\n*set evidence_1_found true\n*set evidence_1 \"TV remote\"\n\"Uh...what's a TV remote have to do with anything?\" you ask.\n\n\"Heck if I know,\" Steve says. \"Maybe we have to use the batteries inside for a puzzle later on, or something.\"\n\n\"Well, let's keep looking,\" you say. \"I've been working towards the wall in that direction.\"\n\nSteve gives you a thumbs-up and starts searching with you. When the two of you are almost done, Mallory appears.\n\n\"I found a wedding announcement,\" she says. \"And that's it. I don't know if it's a clue or not. I think it's Claudia's parents.\"\n\nYou take the paper from Mallory's hands. It's a short article, cut out of a newspaper from twenty-five years ago. \"Local businessman Franklin Barrett marries Claudia Gomez, of Spain\" reads the caption to the black-and-white photograph. The article itself goes into details about the family of the bride and groom, and when and where the wedding took place.\n\n\"We have a Claudia and a Mr. Barrett in this article,\" you say. \"What are the odds that it's not [i]our[/i] Claudia Barrett?\"\n\n\"Look at the name of the bride's father,\" Steve says. \"Alejandro Gomez. Alejandro is Claudia's grandfather?!\"\n\n\"Don't be stupid,\" Mallory says. \"That guy must be at least fifty by now. He's probably her grandfather.\"\n\n\"Alejandro and Claudia have the same grandfather?\" you ask. \"That'd make them cousins, or something, wouldn't it? He's from Spain, just like Gomezes.\"\n\n\"But earlier today, he acted like he didn't know her,\" Steve says. \"I can't believe that's true, if they're cousins.\"\n\n\"Weird,\" you say, unsure what to make of this new clue.\n*set evidence_3_found true\n*set evidence_3 \"wedding announcement\"\n*finish\n\n*label home_3\n\"I'll take the shower and the bathroom stalls,\" you say.\n\n\"I'll do the lockers,\" Mallory says.\n\n\"Then I'll get the football lockers,\" Steve says. \"If the kidnapper touched my lucky socks, they're gonna be in for a world of hurt!\"\n\nYou break away from the others and check the shower stalls. Well, [i]stall[/i], really. There's a flimsy plastic divider in the middle of the shower area, effectively cutting it in half. You push it aside, but it's not covering anything.\n\nThere are ten shower heads. You have to stand on your tiptoes to check them, but they all seem perfectly normal. None of them are loose or holding secret compartments. Underneath the third shower head is some old graffiti about a student who has long since graduated from the school. It almost matches the graffiti in the Away Team Locker Room.\n\nConfident that the shower heads hold no secrets, and not willing to risk getting wet by turning them on, you decide to check the drains. They are likewise empty, except for--ah! One has a crumpled-up paper on it!\n\nYou pick it up and roll it out. It's a short article, cut out of a newspaper. \"Local businessman Franklin Barrett marries Claudia Gomez, of Spain\" reads the caption to the black-and-white photograph. The photograph has a smiling woman and a serious-faced man who looks a lot like Claudia.\n\n\"This must be the clue,\" you say. If this paper is as old as it seems, the couple would be the same age as Claudia's parents, right? And if Mr. Barrett is her father, that'd explain why they look similar. This must be the wedding announcement for her parents!\n\nYou read the attached article, which is fluff about when and where the wedding took place, as well as details about the family of the bride and groom. The date is twenty-five years ago, definitely when her parents would have been married. Maybe. It's not like you know the wedding dates of your classmates' parents.\n\nYou're so distracted by the Claudia connection, you almost miss the other one. It only hits when you read the names of the bride's parents: Maria and Alejandro Gomez. [i]Alejandro[/i]. Is...is he related to Claudia? Do they share a grandparent? If so, why are they keeping it a secret?\n*set evidence_3_found true\n*set evidence_3 \"wedding announcement\"\n*page_break\nYou move on to the bathroom stalls. For some reason, they are about twice as large as the stalls in the Away Team Locker Room, and one of them has a sink. Why would they put a sink in one stall, but none of the others? It's strange.\n\nYou don't find anything interesting the toilets, not unless you count the one that was filled with toilet paper. Gross.\n\nYou give up and head to the others. \"Any luck?\" you ask.\n\n\"I found this paper,\" Mallory says, showing it to you. It has \"_ _3 2\" written on it. You have no idea why there are lines before the numbers. Maybe it's an incomplete code.\n\n\"And I found this in my locker,\" Steve says. He holds out a remote control. \"It can't be a coincidence that the kidnapper used [i]my[/i] locker to hide something.\"\n\n*set evidence_1_found true\n*set evidence_1 \"TV remote\"\n\"Uh...what's a TV remote have to do with anything?\" you ask.\n\n\"Heck if I know,\" Steve says. \"Anyway, we're pretty sure those are the two clues.\"\n\n\"I found something, too,\" you say, giving them the newspaper clipping. \"It's about Claudia's parents getting married. Her mom was part of the Gomez family. Maybe she's related to Alejandro.\"\n\n\"If he has family here, it'd explain why he came to our town as an exchange student,\" Mallory says. \"But why didn't he say anything when we voted for prom queen?\"\n\n\"I don't know,\" Steve says.\n\n\"What [i]I[/i] don't know is why we found three clues, when there are only supposed to be two,\" you say. \"Did the kidnapper leave one of these clues by accident? Or is this just another attempt at toying with us?\"\n*finish\n\n\n", "route_1_chapter_6": "[b]Chapter 6[/b]\n\n*if chapter_5_what_is_first = \"home\"\n *goto away_start\n*else\n *goto home_start\n\n*label away_start\nWhile you search the Home Team Locker Room, the others go to the Away Team Locker Room. They don't have to go far, as the door is less than five feet away. Bruce, Jessica and Elena group around the door. The touchscreen by the doorknob is blank, until Elena reaches out and taps it.\n\n[i]Good, you can follow directions. That will make things easier for you![/i]\n\n[i]There are two special items for you, hidden inside this locker room. Can you find them within ten minutes? If you're not out of the room by then, this door will lock automatically, trapping everyone inside. I wonder how many people will be caught unaware [b]this[/i] time?[/i]\n\n[i]No. I wonder if you'll even be able to [b]enter[/b] the room in time! This puzzle is particularly tricky![/i]\n\n[i]Elena Adams, Claudia Barrett, Alejandro Gomez, Jessica Moore, Mallory Ramsey, Mr. Wilberforce Smothers, Steve Stevens, and Bruce Wilkins are all standing in line. They are standing in alphabetical order, by first name.[/i]\n\n[i]The second place person swaps with the last place person. Claudia and Elena swap. Jessica swaps with a teacher. Mr. Smothers goes back one. Steve goes four ahead in line. Where is he?[/i]\n\n*choice\n #First\n  *goto away_puzzle_2\n #Second\n  *goto away_puzzle_2\n #Third\n  *goto away_puzzle_solved\n #Fourth\n  *goto away_puzzle_2\n #Fifth\n  *goto away_puzzle_2\n #Sixth\n  *goto away_puzzle_2\n #Seventh\n  *goto away_puzzle_2\n #Eighth\n  *goto away_puzzle_2\n\n\n*label away_puzzle_2\n[i]WRONG! You just wasted some of your time! Ha ha ha! Try again![/i]\n\n[i]Elena Adams, Claudia Barrett, Alejandro Gomez, Jessica Moore, Mallory Ramsey, Mr. Wilberforce Smothers, Steve Stevens, and Bruce Wilkins are all standing in line. They are standing in alphabetical order, by first name.[/i]\n\n[i]The second place person swaps with the last place person. Claudia and Elena swap. Jessica swaps with a teacher. Mr. Smothers goes back one. Steve goes four ahead in line. Where is he?[/i]\n\n*choice\n #First\n  *goto away_puzzle_3\n #Second\n  *goto away_puzzle_3\n #Third\n  *goto away_puzzle_solved\n #Fourth\n  *goto away_puzzle_3\n #Fifth\n  *goto away_puzzle_3\n #Sixth\n  *goto away_puzzle_3\n #Seventh\n  *goto away_puzzle_3\n #Eighth\n  *goto away_puzzle_3\n\n*label away_puzzle_3\n[i]Wrong again! You're just randomly guessing, aren't you? I'll make the puzzle simpler, but this is the last time! Get this wrong, and you'll be electrocuted![/i]\n\n[i]Elena Adams, Claudia Barrett, Alejandro Gomez, Jessica Moore, Mallory Ramsey, Mr. Wilberforce Smothers, Steve Stevens, and Bruce Wilkins are all standing in line. They are standing in alphabetical order, by first name.[/i]\n\n[i]The second place person swaps with the last place person. Claudia and Elena swap. Jessica swaps with a teacher. Where is Elena standing?[/i]\n\n*choice\n #First\n  No, Elena isn't standing there. Try again!\n\n  Hint: Elena only moves once.\n\n  *goto away_puzzle_3\n #Second\n  No, Elena isn't standing there. Try again!\n\n  Hint: Elena only moves once.\n\n  *goto away_puzzle_3\n #Third\n  *goto away_puzzle_solved\n #Fourth\n  No, Elena isn't standing there. Try again!\n\n  Hint: When last place swaps with second place, that is Bruce swapping with Mr. Smothers.\n\n  *goto away_puzzle_3\n #Fifth\n  No, Elena isn't standing there. Try again!\n\n  Hint: Elena starts in fourth.\n\n  *goto away_puzzle_3\n #Sixth\n  No, Elena isn't standing there. Try again!\n\n  Hint: Elena starts in fourth.\n\n  *goto away_puzzle_3\n #Seventh\n  No, Elena isn't standing there. Try again!\n\n  Hint: The last swap doesn't affect Elena at all.\n\n  *goto away_puzzle_3\n #Eighth\n  No, Elena isn't standing there. Try again!\n\n  Hint: The last swap doesn't affect Elena at all.\n\n  *goto away_puzzle_3\n\n*label away_puzzle_solved\n*set puzzle_5_answered true\n*set puzzle_5_answer \"Third\"\n[i]You got it correct? Bah, humbug! You just got lucky. You won't be as lucky, finding the two items in this room. Time is running out![/i]\n\n[i]How much of your ten minutes remain? I know, but I'm not telling! Good luck, fools![/i]\n\n\"Whoever this kidnapper is, they're a jerk,\" Bruce says.\n\n\"Yeah, I figured that out,\" Elena says. \"I wonder why everyone besides $!{first_name} was part of that puzzle.\"\n\nThe door clicks, and the three of them enter the locker room. The room is made up of eight rows of lockers, along the walls and in the middle. The wall to the left has a row of bathroom stalls, while the wall in the far back is an open shower area, complete with some dirty graffiti that the school janitors have never been able to remove.\n\n\"Let's split up,\" Jessica says. \"I'll take the left, and--\"\n\n\"Who put [i]you[/i] in charge?\" Bruce asks.\n\n\"Everyone did,\" Jessica says. \"Remember the vote to put me in charge of the prom committee?\"\n\n\"That was at the start of the school year!\" Bruce says.\n\n\"And I'm not on prom committee,\" Elena says.\n\nJessica is visibly annoyed. \"Okay. Do you want to waste everyone's time having a second vote, or do you want to get out of here alive?\" she asks. \"All I said was that we should split up!\"\n\n\"We already did that, remember?\" Bruce asks.\n\n\"Oh my God, are you bringing that up [i]now[/i]?\" Jessica asks. \"Are you [i]trying[/i] to waste everyone's time?\"\n\n\"The only waste here is [i]you[/i]!\" Bruce says. \"I bet you're the one who kidnapped us! It's your psycho plan for getting revenge!\"\n\n\"Okay, hold up,\" Elena says. \"I have no idea what either of you is talking about. Are you saying...?\"\n\n*choice\n #Jessica is the kidnapper?\n  *goto away_3_1\n #The two of you used to date?\n  *goto away_3_2\n #You don't want to split up?\n  *goto away_3_3\n\n\n*label away_3_1\n\"Are you saying that Jessica is the kidnapper?\" Elena asks Bruce.\n\n\"That is 100% what I'm saying,\" Bruce says. \"She's the only one who's evil and methodical enough to do it.\"\n\n\"Just because I like to plan things in advance, it doesn't make me a kidnapper,\" Jessica says. \"And if this entire thing was a plan to get revenge on [i]you[/i], Bruce, why would I kidnap all these other people?\"\n\n\"Trying to make yourself look innocent,\" Bruce says. He starts pantomiming Jessica, in a high-pitched voice. \"Oh, I can't [i]possibly[/i] be the culprit! I'm an innocent victim!\"\n\n\"But why would she want revenge on you?\" Elena asks. \"Did you do something really terrible to her?\"\n\n\"[i]No![/i] Bruce says. \"All I did was tell a few of my buddies about her, and she broke up with me! Total overreaction!\"\n\n\"You spread malicious gossip about me, after our first date!\" Jessica says. \"You lied and told everyone that I--well, I won't say it in front of a stranger like Elena, but it was bad, and I [i]still[/i] have to deal with those rumors, after all this time!\"\n\n\"Don't blame me, blame my friends!\" Bruce says. \"They're the ones who said it, not me!\"\n\n\"Quit acting like you're innocent in all this!\" Jessica says. \"Augh! Quit wasting my time! We have a challenge to complete!\"\n\n*goto away_3_4\n\n*label away_3_2\n\"Are you saying the two of you used to date?\" Elena asks.\n\n\"Yes, and it was a terrible mistake,\" Jessica says. \"As you can see, he's a terrible person who picks fights all the time!\"\n\n\"I'm wonderful! [i]She's[/i] the one with problems!\" Bruce says. \"For our second date, she sent me a calendar invite with five different notifications! Like I need to be told [i]five times[/i] about it!\"\n\n\"You showed up twenty minutes late to our first date!\" Jessica says. \"You're lucky I even agreed to a second one!\"\n\n\"Like you didn't [i]beg[/i] me for a second chance!\" Bruce says.\n\n\"I didn't!\" Jessica says.\n\n\"Okay, let's just stop,\" Elena says. \"We don't have time for couples therapy right now, okay? In case you've forgotten, we have to find clues in this room.\"\n\n\"I haven't forgotten!\" Jessica says. \"I'm going to find a way out of here, if it's the last thing I do. Bruce, I don't care what you do. You can sit and complain all you want. You're such a big baby, it should be easy for you. \"\n\n*goto away_3_4\n\n*label away_3_3\n\"You don't want to split up?\" Elena asks. \"You want us all to search together?\"\n\n\"Yeah, well, now I'm not so sure,\" Bruce says. \"I don't want to search with Jessica anymore.\"\n\n\"I'd rather take my chances alone,\" Jessica says. \"Being electrocuted would be better than searching with [i]you[/i].\"\n\n\"So you [i]do[/i] want to split up?\" Elena asks.\n\n\"Yes,\" Jessica says. \"We'll cover more ground that way, and it's faster.\"\n\n\"If she says yes, then I say no,\" Bruce says. \"What if one of us overlooks the clue? We should stick together and double-check every area.\"\n\n\"Quit disagreeing with everything I say!\" Jessica snaps. \"It's super annoying, just like you!\"\n\n*goto away_3_4\n\n*label away_3_4\nShe storms over to the bathroom stalls, while Bruce glares at her. He slinks over to the lockers, getting as far away from her as possible. Elena decides to...\n\n*choice\n #Search with Jessica\n  *goto away_1\n #Search with Bruce\n  *goto away_2\n\n*label away_1\nElena goes to the bathroom stalls. \"Let me help you search,\" she says.\n\n\"We don't need two people checking the same stall at once,\" Jessica says. \"Check the farthest one, and we'll both move towards the middle.\"\n\nIt's strange. Elena is kidnapped by an unknown person, trapped with a bunch of relative strangers, in constant danger of death, but still, her first reaction is [i]check the locker room toilet? Yuck![/i] It isn't hard to search, as there aren't many places to hide something in and around a toilet, but Elena can't help but wish she could solve another puzzle, instead.\n\nTo take her mind off what she's doing, Elena tries to start up a conversation with Jessica.\n\n\"So...you used to date Bruce?\" Elena asks.\n\n\"Our friends set us up,\" Jessica says. \"I knew it was a terrible idea, and I shouldn't have gone through with it. Neither should you.\"\n\n\"Me?\" Elena asks.\n\n\"I've seen you two looking at each other,\" Jessica says. \"Bruce might seem like a cool bad boy type at first, but he [i]acts[/i] just like a little boy, and that's bad.\"\n\nElena personally agrees. Yelling at Jessica earlier sure doesn't win Bruce any points on the maturity scale. Then again, Bruce doesn't seem to get that mad at anyone else. Maybe it's just Jessica who sets him off like that. \"Do you know--\" Elena begins to say.\n\n\"Wait! I think I found it!\" Jessica says. \"It was on the lid of the toilet in the third stall. The kidnapper didn't even [i]try[/i] to hide it!\"\n\n\"Yes!\" Elena says. \"What's the clue?\"\n\n\"Some numbers,\" she says. \"I'll show you when we're done. Keep searching! I don't know how much time we have left!\"\n*page_break\nElena and Jessica finish searching the toilet stalls and move on to the shower area. Elena's not sure what the point of searching here is, because it's an open area. There's no place to hide anything, except maybe in the empty towel rack or inside the drains on the floor.\n\n\"Got it!\" Bruce calls from the locker area.\n\n\"You sure?\" Jessica asks.\n\n\"Yeah, it's a name plate,\" Bruce says. \"Let's go!\"\n\nThe three of them jog to the door and go through it. Nobody is electrocuted by the doorknob, so presumably, they're within the time limit. Safe for the moment, they check the items.\n\nJessica has a paper with \"4 2 _ _\" written on it, while Bruce has a name plate with the principal's name on it. \"The kidnapper must have taken this from her desk,\" he says.\n\n\"Why?\" Elena asks. \"Did the principal get taken, too?\"\n\n\"Maybe it'll make more sense, when we see the other group's clues,\" Jessica says. \"This is clearly [i]half[/i] a clue, not a full one. Where are the others?\"\n\n\"I don't know, but they'd better finish soon...\" Elena says.\n*set evidence_2_found true\n*set evidence_2 \"name plate\"\n*finish\n\n*label away_2\nElena follows after Bruce, in the locker area. \"You come to yell at me, too?\" he asks.\n\n\"I'm here to help,\" Elena says. \"I'll check the lockers on the left, you check the ones on the right. Okay?\"\n\n\"Sure,\" Bruce says.\n\nElena opens the first locker and checks inside. Nothing. The second locker is also empty, except for a gross dirty sock. She opens the third locker, when Bruce says, \"Jessica thinks she knows everything about me, but she's wrong. There's more to me than meets the eye.\"\n\n\"Oh, so you secretly have a sensitive side?\" Elena asks. \"Do you kiss puppies and cry at romance movies?\"\n\n\"I only watch comedies, actually,\" Bruce says. \"I watch movies for fun, you know? If a movie's not gonna make me laugh, then I don't bother with it.\"\n\n\"Huh,\" Elena says. That was a surprisingly serious answer to a joke question. Maybe there [i]is[/i] more than meets the eye, when it comes to Bruce.\n\n\"Also, I'm a cat person,\" Bruce says. \"Dogs creep me out.\"\n\nOr maybe Jessica is right, and Bruce just likes to disagree with everyone else, about everything, all of the time. Hard to tell.\n\nElena is searching through a row of lockers the whole time, when she finds something, attached to the backside of a locker door. \"There's something here in locker 69,\" she says.\n\n\"Nice job,\" Bruce says. \"What is it?\"\n\n\"It's a silver rectangle?\" Elena guesses. She pulls at the corner, and it easily comes off, as it was attached by magnets. The rectangle is actually a name plate, with the principal's name on it.\n\n*set evidence_2_found true\n*set evidence_2 \"name plate\"\n\"Uh...was that taken from the principal's office?\" Elena asks.\n\n\"Looks like it,\" Bruce says. \"I've been in her office twice. She keeps it on her desk.\"\n\n\"Jessica, we found something!\" Elena calls.\n\n\"Great!\" she calls back. \"Keep searching the lockers! I'm almost done with the toilets!\"\n\n\"This isn't the time to use the bathroom!\" Bruce calls.\n\n\"SHUT UP, BRUCE!\" Jessica calls back.\n\nBruce and Elena go back to searching lockers, but less than ten seconds later, Jessica says, \"Wait! I got the second clue! Let's leave before the time runs out!\"\n\nElena can't help but feel slightly happy about the situation. Yeah, she's still kidnapped, but her team beat the locker room search challenge with flying colors! That's not easy to do, when the other two team members are more interested in arguing that helping.\n\nThe three of them go through the door, back to the gym. Since the other team hasn't arrived yet, they have a few moments to look at the clues. Jessica looks over the name plate, while Bruce checks out Jessica's clue. It's a piece of paper with \"4 2 _ _\" written on it.\n\n\"Clearly half of a code,\" Jessica says. \"I'm
