m, before the door automatically relocks,\" Queen Cinderella says. \"Whoever's not outside by then will be trapped there forever, another victim of our little game. Oh, and did I mention that both doors must be opened at the same time, or else it won't work? You'll have to split up into two groups, to search the rooms.\n\n\"One final warning. Elena was kidnapped, yes, but not by me. So be on your guard. Elena's kidnapper is still out there somewhere...as am I.\"\n\nThe track ends at this point, and the music player switches to track three, which is a power ballad about the dangers of love. Mallory turns it off and rejoins the group.\n\nYou ask...\n\n*choice\n #\"Does anyone know who Queen Cinderella is?\"\n  \"Does anyone know who Queen Cinderella is?\" you ask.\n\n  \"No, but I have a good guess,\" Jessica says. \"She's upset that she didn't get picked as prom queen, right? It stands to reason that she was one of two candidates who lost.\"\n\n  \"It's Claudia, then,\" Steve says. \"It can't be Nancy. My girlfriend would never kidnap me!\"\n\n  \"It could be a bluff,\" Mallory says. \"She kidnapped you, to make herself look innocent. Not to mention, it'd be a huge giveaway if she kidnapped everyone on prom committee [i]but[/i] you.\"\n\n  Bruce shakes his fist at Steve. \"That's why she's letting one of us live!\" Bruce says angrily. \"It's so [i]you[/i] can escape unharmed! She gave you all the puzzle solutions ahead of time, so you can win!\"\n\n  \"You're crazy!\" Steve says, just as angrily. \"Kidnapping is [i]not[/i] part of a normal relationship!\"\n\n  \"You're both assuming the kidnapper is female, because they're using the name 'Queen Cinderella',\" Jessica says. \"They used a voice changer. We have no idea what their gender is.\"\n\n  \"Have you seen one of those mysteries where a large group of people is kidnapped?\" $!{J_nickname} asks. \"The culprit always pretends to be one of the victims. That way, they can make sure everything goes according to plan.\"\n\n  \"Are you saying Queen Cinderella is one of us?\" you ask.\n\n  \"Yes,\" $!{J_nickname} says. \"That's why they used a voice changer and automated locks. Or at least, that's what they would do, if this was a movie.\"\n\n  You look around warily. Could one of the people here be the kidnapper? Or working with the kidnapper?\n  *page_break\n  \"This isn't a movie,\" Vice-Principal Smothers says. \"All this fighting and questioning is getting us nowhere. Right now, we need to focus on escaping.\"\n\n  \"Agreed,\" Jessica says. \"What's our first step?\"\n\n  *goto 3_1\n #\"What do we do now?\"\n\n  \"What do we do now?\" you ask.\n\n  *goto 3_1\n\n\n*label 3_1\n\"It sounds like we don't have a choice,\" Smothers says. \"We have to search the kitchen and the main storage area. And we have to split up to do it.\"\n\n\"I got kitchen,\" Bruce said.\n\n\"I think the kitchen is the most likely place to hide a clue, too,\" Jessica says.\n\n\"Uh, no, that's the storage room,\" Mallory says. \"It's filled with junk! There's lots of places to hide something.\"\n\n\"I have no idea where,\" $!{J_nickname} says. \"I've never been to either place before.\"\n\n\"Let's put it to a vote,\" Smothers says. \"Who wants to go to the storage room?\"\n\n$!{J_nickname}, Vice-Principal Smothers, Mallory and Steve all raise their hands.\n\n\"Oh, no way!\" Jessica says. \"I am [i]not[/i] going alone with Bruce! $!{first_name}, you have to come with us.\"\n\n*if (gender = \"female\")\n \"If she comes with you, then I'm coming, too,\" $!{J_nickname} says. You look at him questioningly. He blushes slightly and looks away quickly.\n\n *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line\n*else\n \"I can change spots, to make the teams even,\" says $!{J_nickname}. \"If that helps, I mean.\"\n\n *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line\n\n*label it_is_stupid_I_have_to_make_a_scene_just_for_one_line\nWhich group do you want to join?\n\n*choice\n #Go to the kitchen with Bruce, Jessica and $!{J_nickname} \n  *set chapter_5_what_is_first \"cafeteria\"\n  *goto cafeteria_start\n #Go to the storage room with Steve, Mallory and Smothers\n  *set chapter_5_what_is_first \"storeroom\"\n  *goto storeroom_start\n\n\n\n*label cafeteria_start\n\"I'll search the cafeteria kitchen,\" you say.\n\n\"Good,\" Vice-Principal Smothers says. \"We have to split up into a group of three and a group of four. Since I'm the only adult, it makes sense that I am in the smaller group.\n\n\"What's that supposed to mean?\" Bruce asks. \"I'm an adult! I'm eighteen!\"\n\n\"Me too,\" Steve says.\n\n\"We're [i]all[/i] the same age, geniuses,\" Jessica says. \"We're in the same grade.\"\n\n\"I'm nineteen,\" $!{J_nickname} says.\n\nSmothers groans. \"Then let's say I am the only adult who is over the age of twenty [i]and move on[/i],\" he says. \"Mr. Stevens, Miss Ramsey, you're with me.\"\n\nThe two doors are located on opposite sides of the gym. You are, in effect, isolated from other group. If there's a problem, they won't be able to come running to your rescue. Not without running the risk of breaking the five minute time limit.\n\nEveryone gathers by the door. \"You ready?\" Jessica shouts to the other group.\n\n\"Ready!\" Smothers shouts back.\n\nAt the same time, Jessica and Smothers type in the passcode zero-zero-zero. There are two beeps, and the door remains closed.\n*page_break\nBruce swears. \"Why didn't it open?\"\n\n\"The other group's door opened,\" $!{J_nickname} notices. \"They're going inside, now. Should I run to them and see--?\"\n\n\"It's another puzzle!\" Jessica shouts, and sure enough, it is. The screen of the digital lock disappears, only to be replaced with a puzzle similar to the ones from earlier.\n\n*goto cafeteria_puzzle\n*label cafeteria_puzzle\n[i]I'm sorry! It looks like the other team entered their code a second faster than you did! As punishment, I'm giving you another puzzle. Solve it quickly! Your five minutes have already started![/i]\n\n[i]Hope you paid attention in history class! Which one of these was not a United States President?[/i]\n\n[i]Quincy John Adams[/i]\n*line_break\n[i]John Fitzgerald Kennedy[/i]\n*line_break\n[i]James Abram Garfield[/i]\n*line_break\n[i]Warren Gamaliel Harding[/i]\n\nThere is a timer at the bottom of the screen, counting down seconds, from three hundred.\n\n*choice\n #Quincy John Adams\n  *set puzzle_11_answered true\n  *set puzzle_11_answer \"Adams\"\n  *goto cafeteria_puzzle_solved\n #John Fitzgerald Kennedy\n  *goto cafeteria_puzzle_again\n #James Abram Garfield\n  *goto cafeteria_puzzle_again\n #Warren Gamaliel Harding\n  *goto cafeteria_puzzle_again\n\n*label cafeteria_puzzle_again\n[i]Wrong! Try again! Chop chop, time's a-wasting! Which one of these was not a United States President?[/i]\n\n[i]Quincy John Adams[/i]\n*line_break\n[i]John Fitzgerald Kennedy[/i]\n*line_break\n[i]James Abram Garfield[/i]\n*line_break\n[i]Warren Gamaliel Harding[/i]\n\n*choice\n #Quincy John Adams\n  *set puzzle_11_answered true\n  *set puzzle_11_answer \"Adams\"\n  *goto cafeteria_puzzle_solved\n #John Fitzgerald Kennedy\n  *goto cafeteria_puzzle_again\n #James Abram Garfield\n  *goto cafeteria_puzzle_again\n #Warren Gamaliel Harding\n  *goto cafeteria_puzzle_again\n\n*label cafeteria_puzzle_solved\nCorrect! There was a President John Adams, and a President John Quincy Adams, but there was never a President Quincy John Adams. If you make it out of this situation alive, you should get an automatic \"A\" in U.S. History class.\n\n\"Okay, two of us take the front half, two of us take the back half,\" Jessica says.\n\n\"You can't tell me what to do!\" Bruce says. \"I'm going to search by myself!\"\n\n\"Are you an idiot?!\" Jessica asks. \"We literally don't have time to argue over this!\"\n\n\"Then you'll just have to go along with my decision,\" Bruce says, grinning. \"I search here, you get the back half. [i]Someone[/i] has to keep an eye on the timer, right?\"\n\nWhat do you want to do?\n\n*choice\n #Search here with Bruce\n  *goto cafeteria_1\n #Search in the back half\n  *goto cafeteria_2\n\n\n*label cafeteria_1\n\"I'll search here,\" you say.\n\n\"Guess it's you and $!{J_nickname} in the back!\" Bruce says happily. Jessica makes a hand gesture which would almost certainly get her detention, if Smothers was around to see it, then she dashes for the back. $!{J_nickname} follows reluctantly.\n\nThis section of the kitchen has a power dishwasher, which must not have been used today, since there are dirty dishes everywhere. There are also a lot of trays, as well as two trays for holding trays. If you had more time, you'd probably make a joke about it.\n\nBruce ducks down under the counter and grabs a can of forks. He turns it upside-down on the ground.\n\n\"You're making a mess,\" you note.\n\n\"There's no time to be clean,\" Bruce says. \"If you're not gonna help, then leave me alone.\"\n\n*if (vague_love_interest = \"Bruce\")\n \"Don't be that way, Bruce,\" you say. \"Let's look together. I'm sure we'd make great partners.\"\n\n \"I'm not trusting anyone right now,\" Bruce says. \"Until I know for sure you're not the kidnapper, I'm not working with you. Go work over there.\"\n\nShrugging, you go to the far corner, where there are some cupboards. The first cupboard is filled with bowls. You move the stacks of bowls around, in hopes of finding a clue hidden between them.\n\nYou decide to...\n\n*choice\n #Ask Bruce for help\n  \"A little help here?\" you ask.\n\n  There is no response. You turn around, to discover that Bruce is not there. Strange. Did he move on to another area?\n\n  \"Bruce, where are you?\" you call.\n\n  Jessica calls something back at you, but you can't hear it. You take a step forward, when you notice the timer on the door.\n\n  \"TWO MINUTES LEFT!\" you yell, at the top of your voice. You turn back to the cabinets and throw the doors open. No time to be delicate. You shove a stack of cups aside, and in your haste, you fail to notice someone is standing directly behind you.\n\n  They swing a frying pan at the back of your head. You don't see it coming, but you feel it. Pain explodes in your head for a brief second, before you immediately lose consciousness.\n\n  *set chapter_5_knocked_out \"true\"\n  *finish\n\n #Dump the bowls on the ground\n  You dump the plastic bowls on the ground, in case there's a key or something, hidden between two of them. The bowls make a lot of noise and spread all over the ground. Great. Now you have to move them around, to make sure there's nothing hidden under them.\n\n  You kneel down and start picking through the bowls, but no luck. You open the bottom cabinet, when you hear a crunching sound behind you.\n\n  \"Bruce?\" you ask.\n\n  Someone swings a frying pan at the back of your head. You don't see it coming, but you feel it. Pain explodes in your head for a brief second, before you immediately lose consciousness.\n\n  *set chapter_5_knocked_out \"true\"\n  *finish\n\n*label cafeteria_2\nYou grab $!{J_nickname}'s arm and pull ${J_him} with you. \"We've got the back area!\" you say.\n\n\"Bruce, you idiot!\" Jessica yells. \"See what you've done?\"\n\nThe back area of the kitchen is a storage area, with giant containers of food, along with several refrigerators. You try moving the containers around, in case there's something hidden between them. $!{J_nickname} looks in the fridges.\n\n\"Any idea what we're looking for?\" $!{J_nickname} asks.\n\n\"Nope,\" you say, as you toss an economy-sized hamburger bun container to the side. \"I guess anything that's out of place.\"\n\n$!{J_nickname} holds up a frozen roll of sausage. \"Maybe we should take this for protection,\" ${J_he} says. \"We can use it as a baseball bat.\"\n\n\"That sounds incredibly gross,\" you say. \"There's got to be a better weapon in here. Kitchens have knives, right?\"\n\n\"I doubt the culprit would overlook such an obvious weapon,\" $!{J_nickname} says, as he goes through milk containers. \"But we might get lucky.\"\n\nThe two of you work as quickly as possible, although not as thoroughly as you would like. Soon, you've both moved about six feet, working your way through the last two fridges.\n\n\"Did you hear that?\" $!{J_nickname} asks.\n\n\"What?\" you ask.\n\n$!{J_nickname} turns and looks behind ${J_him}, towards the door. \"I thought I heard someone,\" he says. \"You didn't hear it?\"\n\n*choice\n #Investigate the noise\n  \"Let's go check,\" you say. \"I don't trust--\"  \n\n  \"Wait!\" $!{J_nickname} says, pointing at a large salad bowl. \"What's that?\"\n\n  *goto cafeteria_switch_find\n #Ignore the noise\n  \"I think you're just a little jumpy,\" you say. \"I'm scared, too, but we can't--\"\n\n  \"Look!\" $!{J_nickname} says, pointing at a large salad bowl. \"What is that thing?\"\n\n  *goto cafeteria_switch_find\n\n*label cafeteria_switch_find\n*set evidence_1_found true\n*set evidence_1 \"intercom switch\"\nThe noise forgotten, the two of you rush to the bowl. Inside it is a small, metallic device, with an on/off switch at the top. You were never big on electronics, so you can't tell if this device is called a switch or a plug. You [i]can[/i] tell that it's meant to connect to something. Two somethings. One end looks like it connects to a standard power cord, for charging. The other end has a hole for a cable.\n\n\"I have no idea what it is,\" you confess.\n\n\"It's an intercom switch,\" $!{J_nickname} says.\n\n\"Like for calling people?\" you ask.\n\n\"I don't know the English word for it,\" $!{J_nickname} says. \"It connects to a microphone, for making announcements.\"\n\n\"So this is part of the PA system,\" you say. \"What's it doing here in the kitchen?\"\n\n\"This must be the clue Queen Cinderella wanted us to find,\" $!{J_nickname} says. \"But I don't know why.\"\n\n\"We can figure that out later,\" you say. \"Right now, we should--\"\n\nJessica screams from the other side of the room.\n\n\"Bruce!\" she says. \"He's unconscious!\"\n\n\"What?!\" you ask.\n\nYou slip the intercom switch into your pocket and rush to Jessica. She's right. An unconscious Bruce is lying on the ground, with a frying pan next to his head. Did someone attack him? You lean in for a closer look, and...\"\n\n\"Fifteen seconds left!\" $!{J_nickname} screams.\n\nYou make a move towards Bruce, but Jessica grabs your hand and runs. Together, the two of you make it outside the door in time. There is an angry beeping sound, and the door slams shut.\n\n\"We did it!\" $!{J_nickname} says.\n\n\"But Bruce!\" Jessica says. \"Someone must have attacked him, when our backs were turned! But who? Why?\"\n\n\"Was that the noise I heard?\" $!{J_nickname} asks. \"Someone coming into the room to attack Bruce?\"\n\n\"Hold on,\" you say. \"Let's talk to the other group and trade stories. We can figure everything out, then.\"\n*finish\n\n\n\n\n*label storeroom_start\n\"I'll help search the storeroom,\" you say.\n\n\"Then you'll be with us,\" Vice-Principal Smothers says. \"Let's go.\"\n\nSince the storage room and the cafeteria's kitchen are on opposite sides of the gym, everyone is forced to split up into groups. You worry that there will be no way to get to the other group in time, if there's a problem. What if they're in danger of all being stuck?\n\nWhen the four of you reach the door, Mallory holds up the music player and says, \"Okay, ready.\"\n\n\"You took the music player?\" you ask. \"Why?\"\n\n\"We need [i]some[/i] way to keep track of the time,\" Mallory says. \"This is the best way to do it. I'll play a song that's four and a half minutes long. When the song ends, that's our cue to leave.\"\n\n\"Awesome thinking!\" Steve says.\n\nYou're not so enthusiastic about having a soundtrack for your potential death, but it's a better plan than having everyone count down from 300, in their heads.\n\n\"There are four of us,\" Vice-Principal Smothers says. \"I recommend we each search a quarter of the storeroom.\"\n\n\"Awesome thinking, too!\" Steve says. Smothers frowns at him, as if he's not quite sure if Steve is being sarcastic. \"Can I get the section by the door?\"\n\n\"If no one else wants it,\" Smothers says. \"I will take the section in the far back corner, farthest from the door.\"\n\n\"But that's the most dangerous area,\" Mallory says. \"If anything happens, you'll have the hardest time, getting back to the door before it closes.\"\n\n\"That's why I'm taking it,\" Smothers says. \"In a worst case scenario, your lives matter more than mine.\"\n\nThat seems uncharacteristically nice of Smothers. You wonder if the kidnapping is making him a better person.\n\n\"No way, we're a team!\" Steve says. \"We're all going in together, and we're all going out together! By working together, we can do this!\"\n\n\"This isn't a football game,\" Mallory says.\n\n\"It's even [i]better[/i] than a football game,\" Steve says. \"This time, we have a chance to win!\"\n\nYou decide to say...\n\n*choice\n #\"Steve, your football team is terrible.\"\n  *set storeroom_back \"Steve\"\n  *set storeroom_door \"Mallory\"\n  *set storeroom_side \"Player\"\n  \"Steve, your football team is terrible,\" you say.\n\n  \"What? Say that to [i]my face[/i], punk!\" Steve says.\n\n  \"I just did,\" you say. \"Can't you hear anything? Is [i]that[/i] why your team lost every single game this year?\"\n\n  Steve snarls and motions towards punching you, with a ferocity he never showed on the playing field this year. Vice-Principal Smothers steps in.\n\n  *if gender = \"female\"\n   \"I think it will be best, if the two of you are separated,\" Smothers says. \"Mr. Stevens, you get the area by the door. Miss $!{last_name}, you search the back with me.\"\n\n   *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line_2\n  *else\n   \"I think it will be best, if the two of you are separated,\" Smothers says. \"Mr. Stevens, you get the area by the door. Mr. $!{last_name}, you search the back with me.\"\n\n   *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line_2\n\n  *label it_is_stupid_I_have_to_make_a_scene_just_for_one_line_2\n  \"I guess that means I get the area by the door,\" Mallory says. \"Cool.\"\n\n  *goto storeroom_split_decided\n #\"I want to search the back area, too.\"\n  *set storeroom_back \"Player\"\n  *set storeroom_door \"Steve\"\n  *set storeroom_side \"Mallory\"\n  \"I want to search the back area, too,\" you say.\n\n  \"I just said [i]I'm[/i] searching the far back area,\" Vice-Principal Smothers says. \"It's more efficient if we split up, that way.\"\n\n  \"I mean the back area that shares a wall with the door,\" you say, feeling kind of stupid. Too bad nobody has a map of the room, because that'd make splitting up easier.\n\n  \"Look, when the door opens, you go straight forward, to the wall,\" Smothers says. \"Search there. I'll go straight forward to the wall, then left to the corner.\"\n\n  \"I already called the area by the door,\" Steve says.\n\n  \"Then I'll search the area that's left over. Whatever. I don't care,\" Mallory says. \"Let's just go already.\"\n\n  *goto storeroom_split_decided\n\n #\"Give me the area by the door!\"\n  *set storeroom_back \"Mallory\"\n  *set storeroom_door \"Player\"\n  *set storeroom_side \"Steve\"\n  \"Give me the area by the door!\" you say.\n\n  \"No way, I called it!\" Steve says. \"Why do you want it?\"\n\n  \"Same reason as you,\" you say. \"I want to be closest to the exit when time runs out.\"\n\n  \"That's not true!\" Steve says. \"I, uh, want to be able to keep an eye on the other team!\"\n\n  \"Across the gym, through two doors? No way,\" you say. \"You can't see them from the storeroom. You're just too scared to admit you want an easy exit.\"\n\n  \"I demand an area by the door!\" Steve says.\n\n  \"We don't have time for stupid arguments,\" Mallory says. \"Look, $!{first_name} has the door, Steve gets the area next to it. Okay? I'll be in the back with Smothers.\"\n\n  \"That's Vice-Principal Smothers,\" Smothers says automatically.\n\n  *goto storeroom_split_decided\n\n #\"I'll take the area next to the door.\"\n  *set storeroom_back \"Mallory\"\n  *set storeroom_door \"Steve\"\n  *set storeroom_side \"Player\"\n  \"I'll take the area next to the door,\" you say.\n\n  \"Where does that leave me?\" Mallory asks.\n\n  \"In the back, with me,\" Smothers says. \"As I said, I'll take the far corner. You take the near corner.\"\n\n  *goto storeroom_split_decided\n\n*label storeroom_split_decided\n\"You ready?\" Jessica shouts from the other side of the gym.\n\n\"Affirmative!\" Smothers shouts back. \"One, two, three!\" He and Jessica both enter the code zero-zero-zero, and the door opens. All four of you rush inside, to your designated spots.\n*page_break\nThe storeroom is mostly filled with large shelves and cabinets, containing all sorts of discarded school material, ranging from used notebooks to confiscated items to the old school mascot costume.\n\n*if storeroom_back = \"Player\"\n You take the back corner, which is filled with pencils, pencils and more pencils. You start sifting through the pencil boxes, wondering how on Earth a clue could be hidden in here, when you cast a glance to the left.\n\n No one is there.\n\n \"Smothers?\" you ask. That was [i]his[/i] section to search, right? You take a few steps towards the other corner--maybe he's behind a filing cabinet or that six-foot-tall pile of boxes--when you hear a shout from the other side of the room.\n\n *if storeroom_side = \"Steve\"\n  \"I found the puzzle! Quick, someone solve it!\" Steve shouts.\n\n *if storeroom_side = \"Mallory\"\n  \"I found the puzzle! Quick, someone solve it!\" Mallory shouts.\n\n You drop a box of pencils and try to make your way to the others. \"Keep talking!\" you say. \"I don't know where you are! This place is a maze!\"\n\n \"The corner! The corner!\" Mallory says. \"Just follow the music player!\"\n\n [i]Why didn't they arrange these shelves in orderly rows?[/i] you wonder. Now that you're actually [i]trying[/i] to get somewhere and failing, it makes more sense that you weren't able to see Smothers, earlier. Navigating this room is impossible.\n\n You break through a bunch of empty binders, to Steve and Mallory. \"Thank God,\" Mallory says. \"You know Shakespeare, right, $!{first_name}?\"\n\n You look at her, confused, until she hands you a small box. It's locked with a familiar-looking touchscreen.\n\n *goto storeroom_puzzle\n\n*if storeroom_door = \"Player\"\n You take the area by the door, which quickly proves to be a terrible decision. It is filled with disorganized junk, scattered inches high on shelves. Clearly, teachers prefer to step in the storeroom, dump stuff here, then leave, instead of putting everything in its proper location.\n\n [i]Ugh, I sound like Smothers,[/i] you think. [i]\"If you fail to put things away in the correct spot, it is detention for you!\"[/i]\n\n You glance to the side, but three filing cabinets piled on top of each other block your view. Smothers was right. It's almost like the room is divided into four separate areas, and you can't see any of the other areas from where you are. Why couldn't they have smaller shelves? Or more see-through shelves? You'd feel a lot better if you could see the others.\n\n *if storeroom_side = \"Steve\"\n  You squat down to look at the bottom shelf, when there's a shout from next to you. \"I found the puzzle! Quick, someone solve it!\" Steve shouts.\n\n  You step around the three filing cabinets and see Steve, looking confused. He hands you a small box, locked with a familiar-looking touchscreen. \"I have no prayer of getting this,\" Steve says.\n\n  *goto storeroom_puzzle\n *if storeroom_side = \"Mallory\"\n  You squat down to look at the bottom shelf, when there's a shout from next to you. \"I found the puzzle! Quick, someone solve it!\" Mallory shouts.\n\n  You step around the three filing cabinets and see Mallory, looking confused. She hands you a small box, locked with a familiar-looking touchscreen. \"Here,\" she says. \"You solve it, and I'll get the others.\"\n\n  *goto storeroom_puzzle\n\n*if storeroom_side = \"Player\"\n You enter the room and immediately turn left. There isn't a straight pathway to the corner. You have to get there, by dodging past three filing cabinets piled on each other and a tall pile of what looks like art projects. From where you're standing, it's impossible to see of the others or what they're doing.\n\n [i]Great. I'm alone,[/i] you think.\n\n You instantly see that this is the art section of the storeroom. There are sketchpads and brushes and paints, all thrown on metallic shelves with not even the slightest attempt at organizing them. The shelf below has colored paper, and the shelf below has plastic boxes.\n\n Wait.\n\n You bend down. Those aren't plastic boxes. They're pencil containers. And one of them has a touchscreen on top. You reach to the back and pull it out.\n\n [i]Congratulations![/i] the screen reads.\n\n \"I found the puzzle!\" you shout. \"It's a puzzle box! I'm gonna try to solve it!\"\n\n You can hear the others making their way towards you, as focus on the puzzle.\n\n *goto storeroom_puzzle\n\n\n*label storeroom_puzzle\n[i]Congratulations! If you're reading this, then you're one step away from finding Elena! Hidden inside this box is a clue, which should lead you to the room where Elena is. At the very least, it should make Mallory happy.[/i]\n\n[i]Let's see if you've been paying attention in English class. What is the name of William Shakespeare's twelfth play?[/i]\n\nGood thing you have this information in your notebook, because you doubt even the most enthusiastic theater student would have this information memorized. Your notebook, in case you've forgotten, is under the \"show stats\" tab.\n\n*choice\n #Twelfth Night\n  *goto storeroom_puzzle_2\n #Henry IV, Part I\n  *goto storeroom_puzzle_2\n #Merry Wives of Windsor\n  *goto storeroom_puzzle_2\n #Cymbeline\n  *goto storeroom_puzzle_2\n #Midsummer Night's Dream\n  *set puzzle_11_answered true\n  *set puzzle_11_answer \"Midsummer Night's Dream\"\n\n  *goto storeroom_puzzle_solved\n #Othello\n  *goto storeroom_puzzle_2\n #Henry VI, Part I\n  *goto storeroom_puzzle_2\n #Love's Labour's Lost\n  *goto storeroom_puzzle_2\n #Henry V\n  *goto storeroom_puzzle_2\n #Timon of Athens\n  *goto storeroom_puzzle_2\n #Pericles\n  *goto storeroom_puzzle_2\n #Troilus and Cressida\n  *goto storeroom_puzzle_2\n #Henry VI, Part II\n  *goto storeroom_puzzle_2\n #Comedy of Errors\n  *goto storeroom_puzzle_2\n #Tempest\n  *goto storeroom_puzzle_2\n #Measure for Measure\n  *goto storeroom_puzzle_2\n #Romeo and Juliet\n  *goto storeroom_puzzle_2\n #Merchant of Venice\n  *goto storeroom_puzzle_2\n #King John\n  *goto storeroom_puzzle_2\n #Titus Andronicus\n  *goto storeroom_puzzle_2\n\n*label storeroom_puzzle_2\n[i]Wrong! Let's cut the list of answers in half, and try again. What is Shakespeare's fourteenth play?[/i]\n\n*choice\n #Pericles\n  *goto storeroom_puzzle_3\n #Troilus and Cressida\n  *goto storeroom_puzzle_3\n #Henry VI, Part II\n  *goto storeroom_puzzle_3\n #Comedy of Errors\n  *goto storeroom_puzzle_3\n #Tempest\n  *goto storeroom_puzzle_3\n #Measure for Measure\n  *goto storeroom_puzzle_3\n #Romeo and Juliet\n  *goto storeroom_puzzle_3\n #Merchant of Venice\n  *set puzzle_11_answered true\n  *set puzzle_11_answer \"Merchant of Venice\"\n  *goto storeroom_puzzle_solved\n #King John\n  *goto storeroom_puzzle_3\n #Titus Andronicus\n  *goto storeroom_puzzle_3\n\n\n*label storeroom_puzzle_3\n[i]Wrong again! Time is running out! Can you answer the puzzle, before you're trapped in the room forever?[/i]\n\n[i]I will do you a favor and cut the list of possible answers in half, one more time. Don't say that Queen Cinderella is a mean-spirited host. Now, can you tell me, what is the title of William Shakespeare's twenty-seventh play?[/i]\n\n*choice\n #Measure for Measure\n  *set puzzle_11_answered true\n  *set puzzle_11_answer \"Measure for Measure\"\n  *goto storeroom_puzzle_solved\n #Romeo and Juliet\n  That's not correct. You decide to try another answer.\n\n  *goto storeroom_puzzle_3\n #Merchant of Venice\n  That's not correct. You decide to try another answer.\n\n  *goto storeroom_puzzle_3\n #King John\n  That's not correct. You decide to try another answer.\n\n  *goto storeroom_puzzle_3\n #Titus Andronicus\n  That's not correct. You decide to try another answer.\n\n  *goto storeroom_puzzle_3\n\n*label storeroom_puzzle_solved\n*set evidence_1_found true\n*set evidence_1 \"phone\"\nThe lid to the box opens, once you solve the puzzle. \"Got it!\" you say.\n\nInside is Elena's phone. You pick it up and start pressing buttons. Nothing happens. Is it locked, or broken, or just out of battery? Either way, this explains why the puzzle screen mentioned Mallory. You turn to ask her expert advice, and realize you're alone.\n\n\"Mallory? Steve?\" you ask.\n\nNo response. \"Vice-Principal Smothers?\" you call.\n\nThere is a muffled sound from somewhere in the room, and a chill goes down your spine. Where is everyone else?\n\nYou try to look down the next row of shelves, when the music comes to an end. That's the cue to leave. But where [i]is[/i] the music player? Mallory had it, so if you find it, you find her, right?\n\n\"[i]Time to leave![/i]\" Smothers shouts from somewhere in the room. You let out a sigh of relief. At least someone else is still in here with you!\n\n*if (storeroom_door = \"Steve\") or (storeroom_side = \"Steve\")\n Grabbing the puzzle box, you make your way to the exit. Once you pass the filing cabinets, you step on something and fall forward. You immediately turn your head around to see what tripped you up.\n\n It's Steve's body.\n\n You gasp in horror for a second. Is he dead? He's not moving. He didn't react when you stepped on him, so he's either unconscious, or...\n\n Smothers grabs your arm from behind and pulls you towards the exit. \"Come on!\" he shouts.\n\n \"But Steve!\" you say.\n\n \"There's no time!\" he says. \"Move!\"\n\n You reluctantly stop fighting and go through the exit door. Two seconds later, it beeps and closes shut behind you. Steve is now trapped on the other side, beyond your help.\n\n \"Is Steve dead?\" you ask.\n\n \"Unconscious, I think,\" Smothers says.\n\n \"We can't take that chance!\" you say. \"And where's Mallory? Did she make it out?\"\n\n Smothers shakes his head. \"I found her, lying on the ground, too,\" he says. \"She was breathing slightly, so she wasn't dead. I was about to try shaking her awake, when the song ended.\"\n\n \"So...you're saying someone attacked Mallory and Steve?\" you ask. That's impossible! They were right behind you when you were solving the puzzle box, weren't they? Yeah, you were focused on the puzzle, but did you seriously not notice someone attack two people in the room?\n\n \"I don't like this, either,\" Vice-Principal Smothers sighs. \"Come on. Let's meet with the other group.\"\n\n *finish\n*else\n Grabbing the puzzle box, you make your way to the exit. Once you pass the filing cabinets, you step on something and fall forward. You immediately turn your head around to see what tripped you up.\n\n It's Mallory's body.\n\n You gasp in horror for a second. Is she dead? She's not moving. She didn't react when you stepped on her, but that doesn't mean she's dead. You hold a finger under her nose and place your other hand on her chest, to check for breathing.\n\n Smothers pulls at your clothes from behind. \"Come on!\" he shouts.\n\n \"But Mal!\" you say.\n\n \"There's no time!\" he says. \"Move!\"\n\n You pull your arms away from Mallory and get up. At the last second, you [i]think[/i] you feel warm breath on your finger. If only there was more time! You scamper through the door, then turn to take a final glance at Mallory Ramsey.\n\n \"I think she's--\" you begin to say, when there are two beeps. The door closes shut, blocking Mallory from your view.\n\n \"This is terrible,\" Smothers says. \"Two attacks.\"\n\n \"Two?\" you ask. \"Does that mean Steve was...?\"\n\n \"Yes,\" Smothers says. \"I saw him on the ground, as I was leaving. If only we had enough time to check if they were still alive!\"\n\n \"But that's impossible!\" you say. They were right behind you when you were solving the puzzle box, weren't they? Yeah, you were focused on the puzzle, but did you seriously not notice someone attack two people in the room?\n\n \"I don't like this, either,\" Vice-Principal Smothers sighs. \"Come on. Let's meet with the other group.\"\n\n *finish\n", "route_2_chapter_6": "*if chapter_5_what_is_first = \"storeroom\"\n *goto cafeteria_start\n*else\n *goto storeroom_start\n\n\n*label storeroom_start\n[b]Chapter 6[/b]\n\nWhile you search the cafeteria, the other group searches the storeroom. Before they enter, Mallory unveils her plan to get everyone out in time.\n\n\"Check it out,\" Mallory says. She holds up the music player.\n\n\"Uh, why did you steal that?\" Steve asks.\n\n\"It's a timer!\" she says. \"Look, this song is four and a half minutes long. I'll play it as soon as the door opens. When it stops, that's our cue to leave.\"\n\n\"Awesome thinking!\" Steve says.\n\n\"A stellar plan,\" Vice-Principal Smothers says. \"But we also need to plan the search. I say that we each search a third of the storeroom.\"\n\n\"Makes sense,\" Steve says. \"Can I get the third that's closest to the door?\"\n\n\"I have no objections,\" Smothers says. \"I was going to search the far end of the room. That leaves Miss Ramsey to take the middle.\"\n\n\"You're going to the back?\" Mallory asks. \"But that's the most dangerous area! If anything happens, you'll have the hardest time, getting back to the door before it closes.\"\n\n\"That's why I'm taking it,\" Smothers says. \"In a worst case scenario, your lives matter more than mine.\"\n\n\"No way, we're a team!\" Steve says. \"We're all going in together, and we're all going out together! By working together, we can do this!\"\n\n\"This isn't a football game,\" Mallory says.\n\n\"It's even [i]better[/i] than a football game,\" Steve says. \"This time, we have a chance to win!\"\n\nMallory decides...\n\n*choice\n #To search in the middle area\n  *set storeroom_back \"Smothers\"\n  *set storeroom_door \"Steve\"\n  *set storeroom_side \"Mallory\"\n  \"I can search the middle area,\" Mallory says. \"It's not like I have a favorite part of the storeroom to search. I've never been here before.\"\n\n  \"Excellent,\" Smothers says. \"Then that's what we'll do.\"\n\n  *goto storeroom_split_decided\n #To search in the back area\n  *set storeroom_back \"Smothers\"\n  *set storeroom_door \"Steve\"\n  *set storeroom_side \"Mallory\"\n  \"I want the back area,\" Mallory says.\n\n  \"Impossible!\" Smothers says. \"I said [i]I[/i] would search there!\"\n\n  \"I think it would be better if someone else searched there,\" Mallory says.\n\n  \"And why is that?\" Vice-Principal Smothers asks. \"I'm the only one who's familiar with the storeroom. Students aren't allowed in here. Therefore, it's only logical that [i]I[/i] search the toughest part of the room.\"\n\n  \"What makes the back so tough?\" Steve asks. \"Is there, like, weird stuff in there?\"\n\n  \"Or something you don't want us to see?\" Mallory asks.\n\n  \"I am searching the back of the room, and that is final,\" Smothers says. \"If you question me again, you will both get detention.\"\n\n  *goto storeroom_split_decided\n\n #To search near the door\n  *set storeroom_back \"Smothers\"\n  *set storeroom_door \"Mallory\"\n  *set storeroom_side \"Steve\"\n  \"I want to search by the door, actually,\" Mallory says.\n\n  \"Why?\" Steve asks.\n\n  \"Because I'm the one with the music player,\" Mallory says. \"If I'm closest to the exit, that means it's a good chance at least one of us makes it out alive.\"\n\n  \"You're just trying to save yourself, because you're scared,\" Steve says.\n\n  \"I think [i]you're[/i] the scared one, who wants to hide by the exit!\" Mallory says. \"I'm just trying to make sure there's a way out, in case there's a problem with the music!\"\n\n  \"Fine, whatever,\" Steve says. \"I can search the middle area, but leave the music player by the door, okay? That way all of us can hear it.\"\n\n  Smothers mutters something about not being able to hear the music by the door, when he's in the back part of the room.\n\n  *goto storeroom_split_decided\n\n*label storeroom_split_decided\n\"You ready?\" Jessica shouts from the other side of the gym.\n\n\"Affirmative!\" Smothers shouts back. \"One, two, three!\" He and Jessica both enter the code zero-zero-zero, and the door opens. All three of the people on the team rush to their designated spots.\n\nThe storeroom is mostly filled with large shelves and cabinets, containing all sorts of discarded school material, ranging from used notebooks to confiscated items to the old school mascot costume.\n*page_break\n*if storeroom_door = \"Steve\"\n Steve takes the area by the door, which quickly proves to be a terrible decision. It is filled with disorganized junk, scattered inches high on shelves. Clearly, teachers prefer to step in the storeroom, dump stuff here, then leave, instead of putting everything in its proper location.\n\n [i]At least it's not laundry...[/i] Steve thinks.\n\n He looks for something useful in the garbage, but nothing pops out at him as a clue. He steps farther away from the door, past a stack of three filing cabinets, piled on top of each other. The cabinets block his view, so he can't see the rest of the room.\n\n [i]Is this on purpose, or is it a trap?[/i] Steve wonders.\n\n That's when he hears a brief scream. It sounds female. \"Mallory?\" he asks.\n\n There's no response. Steve starts to get worried, when something flashes at him. His head snaps around, and he sees the telltale glare of a touchscreen, on a shelf of art equipment. \"I think I found it!\" he calls loudly.\n\n Steve reaches for the touchscreen. It's attached to the top of a pencil box, on a shelf full of art supplies. When Steve starts to read the puzzle, his face falls. How is he supposed to know the answer?\n\n *goto storeroom_puzzle\n*if storeroom_door = \"Mallory\"\n Mallory takes the area by the door, which quickly proves to be a terrible decision. It is filled with disorganized junk, scattered inches high on shelves. Clearly, teachers prefer to step in the storeroom, dump stuff here, then leave, instead of putting everything in its proper location.\n\n [i]And they say [b]students[/b] are lazy...[/i] Mallory thinks.\n\n She paws through the debris for a few seconds, hoping to find something of value. She looks up on another shelf, but it's just more junk. The shelves on the other side look equally useless, so she moves onward.\n\n The walkway is blocked by a stack of three filing cabinets, piled on top of each other. She's forced to step around them to keep going. The cabinets effectively cut her off from the rest of the room, so she can't see or hear the others. She wonders if the room is normally like this, or if the culprit set it up that way, when she hears a brief scream.\n\n \"Everything okay?\" Mallory calls.\n\n There's no response. Mallory decides to ignore it and move on. Steve probably just bumped his toe against a desk or something. She goes through a section of art supplies, when she sees a touchscreen. She immediately grabs for it, to discover it's connected to the top of a pencil box. A locked pencil box.\n\n \"I found the clue!\" Mallory calls. \"It's locked with another one of those dumb puzzles!\"\n\n *goto storeroom_puzzle\n\n\n\n*label storeroom_puzzle\n[i]Congratulations! If you're reading this, then you're one step away from finding Elena! Hidden inside this box is a clue, which should lead you to the room where Elena is. At the very least, it should make Mallory happy.[/i]\n\n[i]Let's see if you've been paying attention in English class. What is the name of William Shakespeare's twelfth play?[/i]\n\nGood thing you have this information in your notebook, because you doubt even the most enthusiastic theater student would have this information memorized. Your notebook, in case you've forgotten, is under the \"show stats\" tab.\n\n*choice\n #Twelfth Night\n  *goto storeroom_puzzle_2\n #Henry IV, Part I\n  *goto storeroom_puzzle_2\n #Merry Wives of Windsor\n  *goto storeroom_puzzle_2\n #Cymbeline\n  *goto storeroom_puzzle_2\n #Midsummer Night's Dream\n  *set puzzle_12_answered true\n  *set puzzle_12_answer \"Midsummer Night's Dream\"\n  *goto storeroom_puzzle_solved\n #Othello\n  *goto storeroom_puzzle_2\n #Henry VI, Part I\n  *goto storeroom_puzzle_2\n #Love's Labour's Lost\n  *goto storeroom_puzzle_2\n #Henry V\n  *goto storeroom_puzzle_2\n #Timon of Athens\n  *goto storeroom_puzzle_2\n #Pericles\n  *goto storeroom_puzzle_2\n #Troilus and Cressida\n  *goto storeroom_puzzle_2\n #Henry VI, Part II\n  *goto storeroom_puzzle_2\n #Comedy of Errors\n  *goto storeroom_puzzle_2\n #Tempest\n  *goto storeroom_puzzle_2\n #Measure for Measure\n  *goto storeroom_puzzle_2\n #Romeo and Juliet\n  *goto storeroom_puzzle_2\n #Merchant of Venice\n  *goto storeroom_puzzle_2\n #King John\n  *goto storeroom_puzzle_2\n #Titus Andronicus\n  *goto storeroom_puzzle_2\n\n*label storeroom_puzzle_2\n[i]Wrong! Let's cut the list of answers in half, and try again. What is Shakespeare's fourteenth play?[/i]\n\n*choice\n #Pericles\n  *goto storeroom_puzzle_3\n #Troilus and Cressida\n  *goto storeroom_puzzle_3\n #Henry VI, Part II\n  *goto storeroom_puzzle_3\n #Comedy of Errors\n  *goto storeroom_puzzle_3\n #Tempest\n  *goto storeroom_puzzle_3\n #Measure for Measure\n  *goto storeroom_puzzle_3\n #Romeo and Juliet\n  *goto storeroom_puzzle_3\n #Merchant of Venice\n  *set puzzle_12_answered true\n  *set puzzle_12_answer \"Merchant of Venice\"\n  *goto storeroom_puzzle_solved\n #King John\n  *goto storeroom_puzzle_3\n #Titus Andronicus\n  *goto storeroom_puzzle_3\n\n\n*label storeroom_puzzle_3\n[i]Wrong again! Time is running out! Can you answer the puzzle, before you're trapped in the room forever?[/i]\n\n[i]I will do you a favor and cut the list of possible answers in half, one more time. Don't say that Queen Cinderella is a mean-spirited host. Now, can you tell me, what is the title of William Shakespeare's twenty-seventh play?[/i]\n\n*choice\n #Measure for Measure\n  *set puzzle_12_answered true\n  *set puzzle_12_answer \"Measure for Measure\"\n  *goto storeroom_puzzle_solved\n #Romeo and Juliet\n  That's not correct. You decide to try another answer.\n\n  *goto storeroom_puzzle_3\n #Merchant of Venice\n  That's not correct. You decide to try another answer.\n\n  *goto storeroom_puzzle_3\n #King John\n  That's not correct. You decide to try another answer.\n\n  *goto storeroom_puzzle_3\n #Titus Andronicus\n  That's not correct. You decide to try another answer.\n\n  *goto storeroom_puzzle_3\n\n*label storeroom_puzzle_solved\n*set evidence_2_found true\n*set evidence_2 \"phone\"\n*if (storeroom_door = \"Steve\")\n The lid to the box opens up. Steve reaches inside and grabs a cell phone. He tries turning it on, but the screen remains black.\n\n \"I think it's out of power,\" Steve says to himself. He calls out to the rest of the room. \"Guys, I found the clue! Let's get out of here!\"\n\n Again, there is no response.\n\n \"Mallory? Mr. Smothers?\" Steve asks. He steps towards the middle of the room, and as soon as he gets past the next aisle of boxes, he sees Mallory lying on the ground, the music player lying next to her.\n\n \"Mallory? Mallory!\" he cries.\n\n Vice-Principal Smothers pops through two stacks of textbooks. \"You found the clue?\" he asks.\n\n \"It's a phone,\" Steve says, throwing the phone at him. \"Mallory's been hurt!\"\n\n Smothers drops the phone and picks it up, while Steve checks for a pulse. \"She's not dead!\" he says. \"Thank God! Quick, we have to take her out of--\"\n\n \"No!\" Smothers screams.\n\n Steve looks up, confused, but Smothers doesn't seem to notice. He's pointing at the music player next to Mallory. \"The song was put on loop! Run!\"\n\n Steve looks at the music player, and sees that they are about twenty-two seconds into the song. That's obviously incorrect, and he wonders what's going on, until things click into place for him. The song must have finished and started playing a second time. And since Mallory said the door would close thirty seconds after the song stopped...\n\n Steve swears and scrambles for the exit, but he's too late. By the time he's there, the door is already closed. He slams against it and swears louder.\n\n \"At least Smothers got out with the phone,\" Steve says to himself. He turns around and sadly walks back to Mallory, hoping he can wake her up. And then...well...Steve and Mallory will just have to hope that someone comes to rescue them soon.\n *finish\n*else\n The lid to the box opens, once Mallory solves the puzzle. \"Ha!\" she cries. Inside is a phone that's turned off. \"I [i]am[/i] pleased with this turn of events!\" she says.\n\n \"Excellent work, Miss Ramsey!\" Vice-Principal Smothers says from behind her. \"We can use this to call the police!\"\n\n \"Where's Steve?\" Mallory asks.\n\n \"I thought he was with you,\" Smothers says. \"I didn't see him, while I--\" \n\n That's when the song comes to an end.\n\n \"Crap, thirty seconds left,\" Mallory says. \"Let's look for him, quick!\"\n\n \"Run through the aisle!\" Smothers says, as he dashes off. Mallory and Smothers both shout Steve's name, as Smothers goes through the middle aisle, and Mallory goes through the aisle along the same wall as the door.\n\n They meet up again, on the other side of the room. \"Did you see him? Mallory throws the phone through the doorway, just in case.\n\n \"Did you see him?\" Smothers asks.\n\n \"No!\" Mallory says. \"He must be in the back of the--\"\n\n A groan comes from behind Smothers. \"Steve?\" Mallory asks.\n\n She rushes towards the sound, but Smothers grabs her. \"There's no time, we have to go!\" he says.\n\n \"I can't!\" Mallory says. She throws her phone through the open doorway. \"You give them the phone! I'll save Steve!\"\n\n Smothers nods at Mallory, then runs through the door with two seconds to spare. Mallory hears the door slam shut, as she goes to Steve. He's lying on the ground in the back aisle, with a visible bump on his head. He groans again.\n\n \"Are you okay?\" Mallory asks.\n\n \"Someone...hit me...\" Steve moans. He tries to push himself off of the ground, then collapses. Mallory kneels next to him.\n\n \"Don't move,\" she says. \"I'll help you.\"\n\n \"But...we have to leave...\" Steve says.\n\n \"It's too late,\" Mallory says. \"We ran out of time. But at least we got the clue to the others! With any luck, they'll figure it out and save us in no time.\"\n\n \"I...hate...prom...\" Steve groans.\n\n \"Tell me about it,\" Mallory agrees.\n\n *finish\n\n\n\n*label cafeteria_start\n[b]Chapter 6[/b]\n\nThe other group is made up of $!{J_nickname}, Jessica and Bruce. In retrospect, leaving Bruce and Jessica together was a terrible idea. Those two couldn't work together, if their lives depended on it.\n\nThis is especially unfortunate, because their lives [i]do[/i] depend on it.\n\nThings instantly go wrong for them, when Jessica types in the passcode zero-zero-zero. There are two beeps from the lock, but the door remains closed.\n\nBruce swears. \"Why didn't it open?\"\n\n\"The other group's door opened,\" $!{J_nickname} notices. \"They're going inside, now. Should I run to them and see--?\"\n\n\"It's another puzzle!\" Jessica shouts, and sure enough, it is. The screen of the digital lock disappears, only to be replaced with a puzzle similar to the ones from earlier.\n\n*goto cafeteria_puzzle\n*label cafeteria_puzzle\n[i]I'm sorry! It looks like the other team entered their code a second faster than you did! As punishment, I'm giving you another puzzle. Solve it quickly! Your five minutes have already started![/i]\n\n[i]Hope you paid attention in history class! Which one of these was not a United States President?[/i]\n\n[i]Quincy John Adams[/i]\n*line_break\n[i]John Fitzgerald Kennedy[/i]\n*line_break\n[i]James Abram Garfield[/i]\n*line_break\n[i]Warren Gamaliel Harding[/i]\n\nThere is a timer at the bottom of the screen, counting down seconds, from three hundred.\n\n*choice\n #Quincy John Adams\n  *set puzzle_12_answered true\n  *set puzzle_12_answer \"Adams\"\n  *goto cafeteria_puzzle_solved\n #John Fitzgerald Kennedy\n  *goto cafeteria_puzzle_again\n #James Abram Garfield\n  *goto cafeteria_puzzle_again\n #Warren Gamaliel Harding\n  *goto cafeteria_puzzle_again\n\n*label cafeteria_puzzle_again\n[i]Wrong! Try again! Chop chop, time's a-wasting! Which one of these was not a United States President?[/i]\n\n[i]Quincy John Adams[/i]\n*line_break\n[i]John Fitzgerald Kennedy[/i]\n*line_break\n[i]James Abram Garfield[/i]\n*line_break\n[i]Warren Gamaliel Harding[/i]\n\n*choice\n #Quincy John Adams\n  *set puzzle_12_answered true\n  *set puzzle_12_answer \"Adams\"\n  *goto cafeteria_puzzle_solved\n #John Fitzgerald Kennedy\n  *goto cafeteria_puzzle_again\n #James Abram Garfield\n  *goto cafeteria_puzzle_again\n #Warren Gamaliel Harding\n  *goto cafeteria_puzzle_again\n\n*label cafeteria_puzzle_solved\nJessica is the one who solves the puzzle correctly. She realizes that this is a trick question. There was a President John Quincy Adams, but not a President Quincy John Adams. If she makes it out of the situation alive, she should get an automatic \"A\" in U.S. History class.\n\n\"Okay, let's search from the back of the room, to the front,\" Jessica says. \"That way, we finish as close to the exit as possible.\"\n\n\"You can't tell me what to do!\" Bruce says. \"I'm going to search by myself!\"\n\n\"Are you an idiot?!\" Jessica asks. \"We literally don't have time to argue over this!\"\n\n\"Then you'll just have to go along with my decision,\" Bruce says, grinning. \"I search here, you get the back half. [i]Someone[/i] has to keep an eye on the timer, right?\"\n\nJessica decides to...\n\n*choice\n #Go along with Bruce's plan\n  *goto cafeteria_1\n #Make Bruce search in the back half\n  *goto cafeteria_2\n\n\n*label cafeteria_1\nJessica tells Bruce to do something that is both rude and physically impossible, then she goes to search the back part of the kitchen. $!{J_nickname} follows her, partially because ${J_he} likes her plan of finishing as close to the exit as possible, and partially because ${J_he} doesn't want to be alone with an angry Bruce.\n\nThe back part of the room has a row of refrigerators and a door. $!{J_nickname} pulls at the door handle, but it doesn't budge.\n\n\"It's locked,\" ${J_he} says.\n\n\"Of course it is,\" Jessica says, as she opens a fridge and starts pushing aside milk cartons. \"Did you think the kidnapper would overlook such an obvious escape route?\"\n\n\"Queen Cinderella said she wanted one of us to escape with Elena,\" $!{J_nickname} says, as ${J_he} searches another fridge. \"So it's reasonable to assume there is [i]some[/i] exit here.\"\n\n\"Yeah, but that door probably leads to the freezer,\" Jessica says. She shuts the fridge door and moves on to the next one. \"No clues, here.\"\n\n$!{J_nickname} finishes his search, too, and starts looking in the fourth fridge, the one that hasn't been searched yet. $!{J_he} asks Jessica about...\n\n*choice\n #$!{J_nickname} asks about you\n  *goto talk_about_you\n\n #$!{J_nickname} asks about Alejandro\n  \"Do you know much about Alejandro?\" $!{J_nickname} asks.\n\n  \"No. He doesn't talk much,\" Jessica says. \"I'm not sure why he joined the prom committee, to be honest. Most meetings, he sits there and says nothing. Do [i]you[/i] know him?\"\n\n  \"No, he's on a different floor than me,\" $!{J_nickname} says. \"I only found his room today, because his name was on the door.\"\n\n  \"Then why did you go to see--\" Jessica starts to ask.\n\n  \"I found something!\" $!{J_nickname} cries.\n\n  *goto cafeteria_switch_find\n #$!{J_nickname} asks about Jessica\n  \"Are you always in charge of everything?\" $!{J_nickname} asks.\n\n  \"Pretty much,\" Jessica says. \"People say I'm a 'natural leader', but I don't think that's true. I just have a hard time saying no when someone volunteers me for something.\"\n\n  \"People volunteer you to run things a lot?\"\n\n  \"All the time,\" Jessica says. \"Like, prom committee. Nobody else wanted to be in charge, so when Smothers asked me to do it, I said yes. I feel like a [i]real[/i] leader would have volunteered without being asked, you know?\"\n\n  \"I wish I was more of a leader,\" $!{J_nickname} says. \"Maybe then I wouldn't--wait! I found something!\"\n\n  *goto cafeteria_switch_find\n\n\n*label talk_about_you\n\"Do you know $!{first_name} very well?\" $!{J_nickname} asks.\n\n*if gender = \"female\"\n \"Not really,\" Jessica says. \"I only know her from prom committee, and she seems responsible. She doesn't try to interrupt or disrupt things all the time like Bruce does. Why?\"\n\n \"No reason,\" $!{J_nickname} says quickly.\n\n \"Do you [i]like[/i] her?\" Jessica asks. \"In case you haven't noticed, this isn't the time or place to--\"\n\n \"I found something!\" $!{J_nickname} cries.\n\n *goto cafeteria_switch_find\n\n\n*label cafeteria_switch_find\n*page_break\n*set evidence_2_found true\n*set evidence_2 \"intercom switch\"\nJessica rushes to $!{J_nickname}. He points to something on the top shelf of the fridge.\n\n\"It was hidden under a cup,\" ${J_he} says. \"It's a...um...thingy.\"\n\nIt is a small metallic device, with an on/off switch at the top. One side has an audio jack, while the other side has a port, so it can charge with a standard power cord.\n\n\"I know that!\" Jessica says. \"It connects to the microphone, for the school's PA system.\"\n\n\"What is the English word for it?\" $!{J_nickname} asks.\n\n\"An intercom switch? I don't know,\" Jessica says. \"Either way, we found the clue! Now let's get out of here, before the door closes.\"\n\nThe two of them go to the door. \"Bruce, we found the clue! We're leaving!\" Jessica calls.\n\nThere is no response.\n\n\"Bruce?\" Jessica asks. \"If this is a joke, it's not--Bruce!\"\n\nBruce is lying on the ground, four steps away from the door. He's clearly unconscious, and a frying pan is next to his head. Did someone attack him? Jessica leans in for a closer look, and...\"\n\n\"Thirty seconds left,\" $!{J_nickname} says.\n\n\"Someone hurt Bruce!\" Jessica says. She slaps his face, but Bruce doesn't react. She feels his neck for a pulse.\n\n\"Fifteen seconds left!\" $!{J_nickname} screams.\n\n\"Gaaaa!\" Jessica cries. For a few seconds, she wonders if she can pull Bruce through the door in time, then she turns around and bolts through the door. There is an angry beeping sound, and the door slams shut behind her.\n\n\"He's alive,\" Jessica says. \"But I didn't have enough time to figure out what happened to him.\"\n\n\"It looked like someone knocked him out,\" $!{J_nickname} says.\n\n\"I agree,\" Jessica says. \"And we were together the whole time, so it wasn't one of us. So it must have been someone from the other group.\"\n\n\"Then we must ask them and find out who,\" $!{J_nickname} says grimly.\n*finish\n\n\n*label cafeteria_2\n\"No way,\" Jessica says. \"I don't know what your deal is, but [i]you[/i] can search the back part of the room. Now stop wasting time, before you get trapped in here.\"\n\nBruce glares at Jessica and storms off without saying anything.\n\nThis section of the kitchen has a power dishwasher. Several trays of dirty dishes are lined up by the dishwasher, waiting for their turn to be cleaned. A large trashcan filled with leftover food stands nearby.\n\n\"Any idea what we're looking for?\" $!{J_nickname} asks.\n\n\"Nope,\" Jessica says, as she shakes a coffee can full of forks. \"I guess anything that's out of place.\"\n\n$!{J_nickname} heads for the cupboards, which are full of bowls. $!{J_he} moves them around and asks Jessica about...\n\n*choice\n #$!{J_nickname} asks about Smothers\n  \"What do you think about Smothers?\" $!{J_nickname} asks.\n\n  \"He's boring and easily annoyed,\" Jessica says. \"That's about it.\"\n\n  \"Do you think he could be the kidnapper?\" $!{J_nickname} asks.\n\n  \"Not unless he's good at acting,\" Jessica says. \"He's not even [i]trying[/i] to hide how mad he is.\"\n\n  \"Mad people can be dangerous,\" $!{J_nickname} says. \"I hope he does not make any rash decisions.\"\n\n  \"You should have seen him at the meeting yesterday,\" Jessica says. \"He was--hey, I think I found something!\"\n\n  *goto cafeteria_convo_2\n #$!{J_nickname} asks about Bruce\n  \"What's the deal with you and Bruce?\" $!{J_nickname} asks.\n\n  \"Is it [i]that[/i] obvious?\" Jessica asks.\n\n  \"It's obvious that you hate each other,\" $!{J_nickname} says.\n\n  \"We dated each other for a while,\" Jessica says. \"We broke up last year, and we've hated each other ever since.\"\n\n  $!{J_nickname} says nothing.\n\n  \"Aren't you going to ask [i]why[/i] we broke up?\" Jessica asks.\n\n  \"That would be rude,\" $!{J_nickname} says.\n\n  Jessica doesn't appear to hear $!{J_him}. \"He cheated on me! With some bimbo who--\"\n\n  \"I do not wish to hear this!\" $!{J_nickname} protests.\n\n  \"--so I slashed the tires on his motorcycle--Hey! I think I found something!\"\n\n  *goto cafeteria_convo_2\n #$!{J_nickname} asks about Mallory\n  \"What do you think about Mallory?\" $!{J_nickname} asks.\n\n  \"She seems nice. This is the longest I've seen her go without a phone,\" Jessica says. \"Why?\"\n\n  \"We have math class together,\" $!{J_nickname} says, \"but she didn't seem to recognize me.\"\n\n  \"I can't think of any reason why she'd pretend not to know you, unless she's the kidnapper,\" Jessica says. \"And even then, it'd be weird for her to pretend that you're strangers.\"\n\n  \"I know I do not talk much during class, but I like to think I am not so unmemorable that--\" $!{J_nickname} starts to say.\n\n  \"Wait, I think I found it!\" Jessica interrupts.\n\n  *goto cafeteria_convo_2\n\n*label cafeteria_convo_2\n*set evidence_2_found true\n*set evidence_2 \"intercom switch\"\n$!{J_nickname} walks over. Jessica points to an empty salad bowl, which contains a small metallic device. It has an on/off switch at the top. One side has an audio jack, while the other side has a port for charging.\n\n\"I know that!\" Jessica says. \"It connects to the microphone, for the school's PA system.\"\n\n\"What is the English word for it?\" $!{J_nickname} asks.\n\n\"An intercom switch? I don't know,\" Jessica says. She glances at the exit door. \"Less than a minute left. Let's grab it and go.\"\n\n$!{J_nickname} takes the intercom switch, and Jessica calls to the back of the room. \"Bruce, we found the clue! We're leaving!\"\n\nThere is no response.\n*page_break\n\"Bruce?\" Jessica asks, as she walks to the exit. \"If this is a joke, it's not--Bruce!\"\n\nBruce comes into Jessica's line of sight. He is lying on the ground, eyes closed. A frying pan is lying on top of his unmoving body.\n\n\"Wake up, Bruce!\" Jessica yells at the top of her voice. He doesn't react.\n\n\"Thirty seconds left,\" $!{J_nickname} says.\n\n\"I think he's been knocked out!\" Jessica says. She runs to Bruce and tries to find a pulse.\n\n\"Fifteen seconds left!\" $!{J_nickname} says.\n\n\"Gaaaa!\" Jessica cries. She kicks Bruce, then turns around and bolts through the door. She makes it through with seconds to spare. Before she's caught her breath, there's a beeping sound, and the door slams shut behind her.\n\n\"Is he dead?\" $!{J_nickname} asks softly.\n\n\"I couldn't tell,\" Jessica says. \"I hope not. Was he breathing?\"\n\n\"I couldn't see,\" $!{J_nickname} says. \"I was too distracted, trying to get you out of there in time.\"\n\n\"Thanks,\" Jessica says. \"If I had been trapped inside with him...well...I don't want to think about it.\"\n\n\"Let's see if anything happened to the other group,\" $!{J_nickname} says grimly.\n\n*finish", "route_2_chapter_7": "[b]Chapter 7[/b]\n\n*if chapter_5_what_is_first = \"cafeteria\"\n *goto 1\n*else\n *goto 2\n\n\n*label 1\n*if chapter_5_knocked_out = \"true\"\n Your body feels like it's floating, like you're half-asleep. Is this what prom feels like? Is this what love feels like?\n\n *if gender = \"female\"\n  You look at your date, and this time, you recognize him. It's $!{J_nickname}. \"I'm glad we made it out alive,\" he says.\n\n  \"I still feel terrible about Elena,\" you say.\n\n  \"We had no choice,\" $!{J_nickname} says. \"Queen Cinderella said only two of us could get out alive. We had to leave her behind, to get out ourselves.\"\n\n  \"I keep telling myself that, but I can't convince myself we didn't betray her,\" you say. \"She's my best friend. I should have sacrificed myself in her place.\"\n\n  \"What else could we have done?\" $!{J_nickname} asks. \"She couldn't leave by herself. She was unconscious. Unconscious. Unconscious...\"\n\n  *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line\n *else\n  You smile at Elena. \"I am so glad you agreed to be my date,\" you say.\n\n  \"I'm just glad you saved me,\" she says. \"Could you imagine if [i]Smothers[/i] had saved me? Yuck!\"\n\n  You laugh. \"I feel terrible that none of the others made it, though.\"\n\n  \"Queen Cinderella said only two people would escape alive,\" Elena says. \"Do I feel guilty that it wasn't any of the others? Yes. But does that make it wrong for me to be glad that [i]we[/i] survived?\"\n\n  \"But they didn't have to die!\" you say. \"Bruce wasn't dead! He was still unconscious. Unconscious. Unconscious...\"\n\n  *goto it_is_stupid_I_have_to_make_a_scene_just_for_one_line\n *label it_is_stupid_I_have_to_make_a_scene_just_for_one_line\n Your eyes snap open. \"I'm not unconscious!\" you shout.\n\n \"$!{first_name} is awake!\" $!{J_nickname} says happily. $!{J_he} helps you get up, off of the ground. \"We found you unconscious in the kitchen,\" ${J_he} says. \"Jessica and I got you out of the room, just in time.\"\n\n \"Thanks,\" you say, as you stand up. The memories flood back into you. Knockout gas. Kidnapping. A puzzle about United States Presidents. \"Someone knocked me out!\" you say.\n\n \"Both you and Bruce,\" Jessica says grimly. \"He's still in the kitchen, hopefully sleeping peacefully.\"\n\n \"I'm glad at least one of you made it out okay,\" Vice-Principal Smothers says.\n *page_break\n *goto 1_1\n*else\n You, Jessica and $!{J_nickname} cross to the other side of the gym, to meet with the other group.\n\n *goto 1_1\n\n\n*label 1_1\nYou blink your eyes. That's not the other group! That's...one person.\n\n\"Where are Steve and Mallory?\" you ask.\n\n\"They didn't make it,\" Smothers says.\n\nYou take a quick headcount. There are only four people left standing: you, Jessica, $!{J_nickname} and Vice-Principal Smothers.\n\n\"There were six other people here, five minutes ago,\" you say. \"Are you telling me half of us didn't make it?\" \n\n\"But didn't Queen Cinderella warn something like this would happen?\" $!{J_nickname} asks. \"She said something like, 'I thought only half of you would escape the rooms'.\"\n\n\"She also talked about 'round one' and 'round two',\" Smothers says. \"If she expected three people to fail each round, that would leave us with one person here at the end.\"\n\n\"Are you saying this is the end?\" Jessica asks.\n\n\"How should I know?\" Smothers asks. \"Queen Cinderella said one person would be left standing at the end! Maybe she overestimated how tricky her puzzles are, or maybe we have to keep going until three more people are eliminated!\"\n\n\"How can we keep going? Is there an unlimited number of rooms here?\" $!{J_nickname} asks.\n\n\"Okay, let's back up,\" you say, shaking your head. \"We're getting ahead of ourselves. Let's talk about what happened in the rooms, starting with...\"\n\nWhat room do you want to discuss first?\n\n*choice\n #The cafeteria\n  *set chapter_7_where_to_go \"cafeteria\"\n  *goto 1_1_1\n\n #The storeroom\n  *set chapter_7_where_to_go \"storeroom\"\n  *goto 1_2\n\n\n*label 1_1_1\n\"I went into the cafeteria with Bruce, Jessica and $!{J_nickname},\" you say. \"The door was locked with a puzzle about United States Presidents. We had to solve it, in order to get inside.\"\n\n\"Odd,\" Smothers says. \"There wasn't anything like that on the storeroom door.\"\n\n*if chapter_5_knocked_out = \"true\"\n \"Once the door opened, I said we should split up into groups of two,\" Jessica says. \"Only Bruce was a total jerk and insisted on searching the front part of the kitchen by himself. There wasn't any time to argue, so $!{J_nickname} and I went to the back part of the room.\"\n\n \"We found the clue inside a fridge, underneath a cup,\" $!{J_nickname} says. He holds out a small metallic device. \"Here it is.\"\n\n *set evidence_1_found true\n *set evidence_1 \"intercom switch\"\n \"That's the switch for the intercom,\" says Vice-Principal Smothers, looking disturbed. \"I use it every day, to make announcements from my office. What was it doing in the kitchen?\"\n\n \"Once we got it, we headed back to the exit,\" Jessica says. \"That's when we saw Bruce and $!{first_name}, lying unconscious on the ground. We only had enough time to grab one of them. Did you see who attacked you?\"\n\n \"No,\" you say. \"Bruce told me to search by myself, in the corner. I was going through the cupboards, when someone hit me from behind.\"\n\n \"Who do you think attacked you?\" Smothers asks.\n\n *choice\n  #Queen Cinderella\n   \"It has to be Queen Cinderella,\" you say. \"Who else would knock one of us out? She set up this entire kidnapping as a revenge scheme.\"\n\n   \"Yes, but we still don't know who she is,\" Smothers says. \"And it sounds like she didn't leave behind any clues when attacking you and Bruce. Nobody even saw her do it!\"\n\n   \"That's probably why she attacked both of us,\" you say. \"She was covering her tracks, in case I saw something important.\"\n\n   \"She's clever and secretive,\" $!{J_nickname} says. \"But we already knew that before searching the cafeteria.\"\n\n   *if chapter_7_where_to_go = \"cafeteria\"\n    \"Vice-Principal Smothers, what happened in the storeroom?\" Jessica asks.\n\n    *goto 1_2\n   *else\n    *goto 1_3\n\n  #Bruce\n   \"Bruce could be the one who attacked me,\" you say. \"He was the closest to me, and it seems unlikely that someone could have attacked him, without me hearing it.\"\n\n   \"Hmmm...\" Jessica says. \"You're saying Bruce attacked you, then someone else attacked Bruce. That's possible.\"\n\n   \"But why would Bruce attack you?\" $!{J_nickname} asks. \"And who attacked him?\"\n\n   \"I have no idea,\" you say. \"I'm just pointing out that both Bruce and I could have been attacked by totally different people.\"\n\n   \"If that's true, we have an overabundance of violent attackers,\" Smothers says. \"Perhaps one of us is desperate to ensure they are the only one who makes it out alive.\"\n\n   \"Or perhaps the culprit is getting desperate,\" Jessica says.\n\n   *if chapter_7_where_to_go = \"cafeteria\"\n    \"We need more information,\" $!{J_nickname} says. \"What happened in the storeroom?\"\n\n    *goto 1_2\n   *else\n    *goto 1_3\n\n  #Jessica or $!{J_nickname}\n   \"There were only two other people in the room with me and Bruce,\" you say. \"$!{J_nickname} and Jessica.\"\n\n   \"But we were with each other the whole time,\" $!{J_nickname} says. \"I couldn't have snuck away without her noticing.\"\n\n   \"Same goes for me,\" Jessica says. \"We're each other's alibi.\"\n\n   \"So you were side-by-side, the whole time?\" Smothers asks.\n\n   \"Yes,\" Jessica says firmly.\n\n   It sounds like they're backing each other up. If one of them [i]did[/i] attack you, that means the other one is lying. But why?\n\n   *if chapter_7_where_to_go = \"cafeteria\"\n    \"Let's change topics,\" you say. \"What happened in the storeroom?\"\n    \n    *goto 1_2\n   *else\n    *goto 1_3\n\n  #Someone from the other team\n   \"I think it was someone from the other team,\" you say.\n   \n   \"But we were all on the other side of the gym!\" Smothers says.\n\n   \"Five minutes is enough time for someone to leave the storeroom, attack Bruce, then go back to the storeroom,\" you argue. \"Bruce and I were the closest to the door, right? That made us the easiest target.\"\n\n   \"Impossible,\" Smothers says. \"I was preoccupied with searching, true, but I think I would have noticed if someone else had disappeared for more than a minute.\"\n\n   You realize there is no way to confirm or deny what Smothers is saying, since he's the only one who made it out of the storeroom. If he's the culprit, then of course he's lying about what happened. But if he's innocent...\n\n   *if chapter_7_where_to_go = \"cafeteria\"\n    \"Vice-Principal Smothers, what exactly happened in the storeroom?\" Jessica asks.\n\n    *goto 1_2\n   *else\n    *goto 1_3\n*else\n \"Once the door opened, I said we should split up into groups of two,\" Jessica says. \"Only Bruce was a total jerk and insisted on searching the front part of the kitchen by himself. There wasn't any time to argue, so I stayed there with him.\"\n\n \"$!{J_nickname} and I went to the back part of the room,\" you say. \"We went through the fridges and the boxes. There was probably a minute left, when we found the clue.\"\n\n \"You found the clue?\" Jessica gasps. \"Why didn't you say that right away?! [i]That's vital information![/i] What is it?\"\n\n \"It was inside a salad bowl,\" $!{J_nickname} says. He holds out a small metallic device. \"Here it is.\"\n\n *set evidence_1_found true\n *set evidence_1 \"intercom switch\"\n \"That's the switch for the intercom,\" says Vice-Principal Smothers, looking disturbed. \"I use it every day, to make announcements from my office. What was it doing in the kitchen?\"\n\n \"Maybe we plug it into the speaker system that Mallory was using earlier?\" Jessica guesses.\n\n \"Right after we found this, Jessica screamed,\" you say. \"What happened?\"\n\n \"I was searching the cupboards by the corner,\" Jessica says. \"I turned around and saw Bruce on the floor, so I screamed for help. There was a frying pan, so I figured someone knocked him out from behind. But by the time $!{J_nickname} and $!{first_name} got there, we were almost out of time.\"\n\n She nods at $!{J_nickname}. \"Thanks for checking the time,\" Jessica says. \"If it hadn't been for you, we would have all been trapped inside.\"\n\n \"You're welcome,\" $!{J_nickname} says.\n\n \"Did you get a look at Bruce's attacker?\" Smothers asks.\n\n \"No,\" Jessica says. \"I was too focused on searching the cabinets. I [i]tried[/i] searching with Bruce, but he didn't want the help, so I left him alone. I'm not his baby-sitter.\"\n\n \"Then who attacked Bruce?\" Smothers asks.\n\n Who do [i]you[/i] think did it?\n\n *choice\n  #Queen Cinderella\n   \"It has to be Queen Cinderella,\" you say. \"Who else would knock one of us out? She set up this entire kidnapping as a revenge scheme.\"\n\n   \"Yes, but we still don't know who she is,\" Smothers says. \"And it sounds like she didn't leave behind any clues when attacking Bruce. Nobody even saw her do it!\"\n\n   \"She's clever and secretive,\" $!{J_nickname} says. \"But we already knew that before searching the cafeteria.\"\n\n   *if chapter_7_where_to_go = \"cafeteria\"\n    \"Vice-Principal Smothers, what happened in the storeroom?\" Jessica asks.\n\n    *goto 1_2\n   *else\n    *goto 1_3\n  #Jessica\n   \"I'm sorry, Jessica, but you're the prime suspect,\" you say. \"You were alone with Bruce when he was knocked out, and the two of you hate each other.\"\n\n   \"How dare you accuse me!\" Jessica says. \"I would never hurt someone else, not even a scumbag like Bruce!\"\n\n   \"I'm just trying to be logical!\" you protest. \"If it was the other way around, and [i]you[/i] were the unconscious one, you'd want me to accuse Bruce, right?\"\n\n   \"It [i]does[/i] seem unlikely that someone could be knocked out a few feet from you, without your noticing,\" Smothers says.\n\n   Jessica looks furious. \"I was...I was talking to myself, okay?\" she says. \"I know it sounds stupid. That's why I didn't mention it earlier. But I started talking, so I wouldn't have to hear Bruce's dumb voice anymore! He was saying--he said some terrible things, and I wanted to drown him out!\"\n\n   You glance at the others. Yes, it sounds plausible that Bruce said something to offend Jessica. But it seems immature for her to stick her fingers in her ears and say, \"La la la la la, I can't hear you!\"\n\n   \"Yes, I hate Bruce, but I'm not stupid,\" Jessica says. \"I want to get out of here alive, as quickly as possible. Attacking one of my teammates only makes that harder. I wouldn't sabotage my chances of escape, just to get Bruce to shut up.\"\n\n   [i]But if Jessica is Queen Cinderella, getting out of here isn't a concern for her[/i], you realize. [i]She already knows where all the clues are. She's probably got a secret escape route for herself that she can use, no matter what happens.[/i] \n\n   *if chapter_7_where_to_go = \"cafeteria\"\n    \"Perhaps it would be best if we switched topics,\" $!{J_nickname} says. \"Vice-Principal Smothers, what happened in the storeroom?\"\n\n    *goto 1_2\n   *else\n    \"Accusing each other is unproductive,\" $!{J_nickname} says. \"We have no proof. We should talk about something else.\"\n\n    *goto 1_3\n  #Smothers\n   \"I think it was Mr. Smothers,\" you say.\n\n   \"I was on the other side of the gym!\" Smothers says.\n\n   \"Five minutes is enough time for you to leave the storeroom, attack Bruce, then go back to the storeroom,\" you argue. \"Bruce was the closest to the door, right? That made him the easiest target.\"\n\n   \"I couldn't have done that, without anyone in my group noticing,\" Smothers says, as if that is absolute proof of his innocence. Since nobody else from his group made it out of the storeroom, you have no way of knowing for sure what they did or did not notice.\n\n   *if chapter_7_where_to_go = \"cafeteria\"\n    \"What [i]did[/i] happen in the storeroom?\" you ask.\n\n    *goto 1_2\n   *else\n    \"Sorry,\" you say. \"That was out of line.\"\n\n    *goto 1_3\n  #Someone from the other team\n   \"I think it was someone from the other team,\" you say.\n   \n   \"But we were all on the other side of the gym!\" Smothers says.\n\n   \"Five minutes is enough time for someone to leave the storeroom, attack Bruce, then go back to the storeroom,\" you argue. \"Bruce was the closest to the door, right? That made him the easiest target.\"\n\n   \"Impossible,\" Smothers says. \"I was preoccupied with searching, true, but I think I would have noticed if someone else had disappeared for more than a minute.\"\n\n   You realize there is no way to confirm or deny what Smothers is saying, since he's the only one who made it out of the storeroom. If he's the culprit, then of course he's lying about what happened. But if he's innocent...\n\n   *if chapter_7_where_to_go = \"cafeteria\"\n    \"Vice-Principal Smothers, what exactly happened in the storeroom?\" Jessica asks.\n\n    *goto 1_2\n   *else\n    *goto 1_3\n  #Bruce\n   \"Bruce could have knocked himself out,\" you say. \"Or he was [i]pretending[/i] to be knocked out.\"\n\n   \"Why would he do that?\" $!{J_nickname} asks. \"Because he's the kidnapper?\"\n\n   \"Yes, and he wanted us to become suspicious of each other,\" you say. \"He was trying to trick us into fighting.\"\n\n   \"While that sounds like a prank Mr. Wilkins would find amusing, I fail to see the point,\" Smothers says. \"Now he's trapped in the kitchen, separated from the rest of us. What does he benefit from it?\"\n\n   \"If he's the kidnapper, he probably has an escape route that only [i]he[/i] knows about,\" you argue. \"That would explain why he was so insistent on searching the front part of the kitchen by himself.\"\n\n   \"Or he's just a jerk,\" Jessica says.\n   \n   *if chapter_7_where_to_go = \"cafeteria\"\n    \"Bruce isn't the only victim, it looks like,\" $!{J_nickname} says. \"Vice-Principal Smothers, what happened in the storeroom?\"\n\n    *goto 1_2\n   *else\n    \"Too many possibilities, not enough answers,\" $!{J_nickname} says.\n\n    *goto 1_3\n\n\n*label 1_2\n\"As you all know, the storeroom search was conducted by myself, Mr. Stevens and Miss Ramsey,\" Vice-Principal Smothers says. \"The storeroom can be divided into three parts, although not perfectly. I figured all three of us could search a different part.\"\n\n\"That's a good idea,\" Jessica says. \"We should have decided where to search, before entering the kitchen.\"\n\n*if (storeroom_door = \"Steve\")\n \"I took the back area, farthest from the door,\" Smothers says. \"My search was unfruitful. Mr. Stevens took the area near the door, and towards the end of our time, I heard him calling out. I went over to see him standing over Miss Ramsey's body.\"\n\n \"Where?\" you ask.\n\n \"In the middle of the room. That's where she was searching,\" Smothers says. \"She was lying down, apparently unconscious. Mr. Stevens threw the clue at me, so he could examine her. That's why I saw I had less than fifteen seconds left, so I ran for the exit.\"\n\n \"Didn't you tell Steve that time was running out?\" Jessica asks.\n\n \"I did, but he must not have understood,\" Smothers says. \"Or he was too distracted, trying to help Miss Ramsey. I...I am ashamed to admit I did not look back, as I ran to the exit. I should have insisted that Mr. Stevens leave first.\"\n\n \"But then you might have both gotten trapped,\" you say.\n\n \"That's preferable to failing in my duties as Vice-Principal!\" Smothers cries. \"My job is to protect students, and what happened? Six students kidnapped on my watch, and three of them gone!\"\n\n Do you think Smothers made the wrong choice?\n\n *choice\n  #Yes\n   \"You made a mistake, and that's okay,\" you say. \"At least you're admitting it.\"\n\n   \"Yes, it sounds like you didn't have enough time to think things over,\" Jessica says. \"You had to make a snap decision, and you chose flight, rather than fight. It's understandable.\"\n\n   *if chapter_7_where_to_go = \"storeroom\"\n    \"I don't want to talk about it,\" Vice-Principal Smothers says. \"What happened in the cafeteria?\"\n\n    *goto 1_1_1\n   *else\n    \"I don't want to talk about it,\" Vice-Principal Smothers says. \"Let's discuss something else.\"\n\n    \"Like what?\" $!{J_nickname} asks.\n    \n    *goto 1_3\n  #No\n   \"I think you did the right thing,\" you say. \"Thanks to you, we got the clue that Steve found. It could be vital to our survival.\"\n\n   *if chapter_7_where_to_go = \"storeroom\"\n    \"I don't want to talk about it,\" Vice-Principal Smothers says. \"What happened in the cafeteria?\"\n\n    *goto 1_1_1\n   *else\n    *goto 1_3\n\n*else\n \"I took the back area, farthest from the door,\" Smothers says. \"Miss Ramsey took the area near the door. She shouted that she found the puzzle, and she must have solved it herself, because by the time I got there, she had a phone in her hand.\"\n\n \"There were about thirty seconds left at that point, and naturally, we were worried because Mr. Stevens wasn't with us,\" Smothers says. \"I ran down one aisle, and Miss Ramsey ran down another. She found Steve in the corner, groaning.\"\n\n \"He wasn't unconscious?\" you ask.\n\n \"No, but he wasn't moving,\" Smothers says. \"Miss Ramsey--Mallory, I mean--she threw the phone out the door and told me to leave. She...sacrificed herself to help Steve.\"\n\n \"Wow,\" you say. You had no idea Mallory was so heroic.\n\n \"It should have been me!\" Smothers says. \"I'm the one who's responsible for student safety! I'm the Vice-Principal!\"\n\n \"
