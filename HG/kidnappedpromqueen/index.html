 betting it's the code to the hallway.\"\n\n\"Where's the other half?\" Elena asks.\n\n\"Probably in the other group's locker room,\" Bruce says. \"Where are they, anyway?\"\n\n\"I don't know, but they'd better finish soon...\" Jessica says. \"If they don't get the second half of the code in time, we're [i]all[/i] going to be stuck.\"\n*finish\n\n\n*label home_start\nWhile you search the Away Team Locker Room, the others search the Home Team. They have to walk across the shorter side of the gym, in order to reach the door. Steve stops Elena and Mallory, just as they reach it.\n\n\"Okay, team!\" he says. \"We finished the first quarter! They may have gotten two of our players, but we can recover! We're gonna dominate this next part, so we can start the second half strong! Who's with me?\"\n\n\"Uh...go team?\" Elena asks.\n\n\"Is that some kind of football thing?\" Mallory asks.\n\nSteve's face falls. \"The team captain always gives a pep talk before we head into the locker room,\" he says. \"Don't they do that for all sports?\"\n\n\"I don't play sports,\" Mallory says.\n\n\"I personally don't think kidnapping is a game, thank you very much,\" Elena says.\n\n\"Never mind,\" Steve sighs. \"Just trying to bring some humor to the situation.\"\n\n\"Try a knock-knock joke next time,\" Elena suggests, as she activates the touchscreen.\n\n[i]One, two, three...good, you're here. And you made it within five minutes, too! As a reward, you get ten minutes to search this locker room. But first, a word puzzle![/i]\n\n• [i]Green[/i]\n*line_break\n• [i]Yellow[/i]\n*line_break\n• [i]Apple[/i]\n*line_break\n• [i]Egg White[/i]\n\n[i]What color comes next in the series?[/i]\n\n*choice\n #Orange\n  *goto home_puzzle_1\n #Copper\n  *goto home_puzzle_correct\n #Blue\n  *goto home_puzzle_1\n #Magenta\n  *goto home_puzzle_1\n\n*label home_puzzle_1\n[i]Wrong, you fools! You just wasted some of your ten minutes. Now try again![/i]\n\n• [i]Green[/i]\n*line_break\n• [i]Yellow[/i]\n*line_break\n• [i]Apple[/i]\n*line_break\n• [i]Egg White[/i]\n\n[i]What color comes next in the series?[/i]\n\n*choice\n #Orange\n  *goto home_puzzle_2\n #Copper\n  *goto home_puzzle_correct\n #Blue\n  *goto home_puzzle_2\n #Magenta\n  *goto home_puzzle_2\n\n*label home_puzzle_2\n[i]And now you've wasted even more of your time. Congratulations! There will probably be no time left, when you've solved this puzzle![/i]\n\n• [i]Green[/i]\n*line_break\n• [i]Yellow[/i]\n*line_break\n• [i]Apple[/i]\n*line_break\n• [i]Egg White[/i]\n\n[i]What color comes next in the series?[/i]\n\n*choice\n #Orange\n  No, orange is not the correct answer.\n\n  *goto home_puzzle_2\n #Copper\n  *goto home_puzzle_correct\n #Blue\n  Blue is not the correct answer.\n\n  *goto home_puzzle_2\n #Magenta\n  Sorry, but magenta is wrong. Try again!\n\n  *goto home_puzzle_2\n\n\n*label home_puzzle_correct\n*set puzzle_5_answered true\n*set puzzle_5_answer \"Copper\"\n[i]Copper, yes! All of those words have the same letter repeat twice in a row. The fact that they were all colors is completely irrelevant, just like your futures![/i]\n\n[i]There are two clues, hidden inside this locker room. Can you find them both? If you can, you get to move on to the next round of our little game! If not, you'll die like the other losers. Speaking of losers, tell Steve how impressed we all are that he managed to lose every single game of the season! Way to embarrass Franklin High! I'll bet some students are secretly [b]glad[/b] you were kidnapped![/i]\n\nSteve swears and kicks the door open. Elena takes a step backwards, shocked. \"Whoa!\" she says.\n\n\"Sorry,\" Steve says. \"Let's go.\"\n\nUnsurprisingly, the Home Team Locker Room is pretty much the same as the Away Team Locker Room, except the bathroom stalls are bigger, and the lockers in the final row are three times as wide as normal.\n\n\"What's with the huge lockers?\" Mallory asks.\n\n\"Football lockers,\" Elena says.\n\n\"For people on the football team,\" Steve says.\n\n\"The football team gets its own lockers?\" Mallory asks. \"That's so not fair. All the other teams have to use the gym storerooms.\"\n\n\"The ones we woke up in?\" Elena asks.\n\n\"Yeah,\" Mallory says. \"Mine had a bunch of rackets in it. Maybe I should have taken one for self defense.\"\n\n\"Enough talk,\" Steve says. \"What do you want to check?\"\n\n*choice\n #The big football lockers\n  *goto home_1\n #The normal lockers\n  *goto home_2\n #The shower and bathroom stalls\n  *goto home_3\n\n*label home_1\n\"I'm checking those big football lockers,\" Elena says.\n\n\"Aw, I wanted to check those!\" Steve says. \"Fine, I'll do the normal lockers, but let me know if you have any questions.\"\n\n\"Questions about how to look inside a locker?\" Elena asks. \"I think I can handle it, thanks.\"\n\n\"That's not what I--whatever,\" Steve says. \"Just don't say I didn't warn you about Johnson's locker.\"\n\nElena searches the lockers, which are filled with typical football gear. She's no expert, but she wonders why every locker has three different sets of jerseys. Wouldn't they only wear their home team jerseys, if they're gearing up in the Home Team Locker Room?\n\nShe goes through the jerseys and the equipment. It doesn't take long to identify Johnson's locker, which is filled with dirty magazines. Elena makes a mental note to tell the teachers, whenever the kidnapping is over.\n\nThe search is boring and fruitless, until she reach the final locker, which has a letter \"C\" on it. It's Steve's locker, judging from the small photograph of him and Nancy, inside. Elena wonders whose idea it was to put the picture inside.\n\nAt the bottom of the locker, in between Steve's shoes, is a remote. Elena picks it up and looks at it. \"Any reason why there's a TV remote in your locker?\" Elena asks.\n\n\"That's not mine,\" Steve says. \"Awesome! I think you found our second clue!\"\n*set evidence_2_found true\n*set evidence_2 \"TV remote\"\n*page_break\n\"Second clue?\" Elena asks. \"What was the first one?\"\n\n\"This,\" Steve says. He shows her a paper, which has \"_ _3 2\" written on it.\n\n\"Weird,\" Elena says. \"Is it part of a combination? Maybe someone forgot their locker code?\"\n\n\"None of the lockers are locked,\" Steve points out. \"I wonder if the kidnapper cut off all the locks.\"\n\n\"Why would they do that?\" Elena asks. \"To make it harder for us to find the correct locker?\"\n\n\"I don't know,\" Steve says. \"Let's just leave. We have the two clues.\"\n\n\"No, let's keep looking,\" Elena says. \"Maybe this is random garbage, designed to throw us off or something.\"\n\n\"I guess it'd be dumb to not check [i]all[/i] the lockers,\" Steve says. \"I'll keep looking at this row. You take the next one.\"\n\nThey search the other lockers in silence. Unlike the football lockers, these ones are totally empty. That makes searching easier, but way more boring. Soon enough, the two teenagers have checked every locker.\n\n\"Nothing here,\" Elena says. \"You want to look under the benches?\"\n\n\"I guess,\" Steve says, getting down on his hands and knees. \"There's nowhere else to check.\"\n\nElena gets onto a bench and jumps up, to see if there's anything on top of the lockers. There's nothing on them but dust and a random sticker. Elena sees Mallory on the other side of the room. \"Did you find anything?\" she asks.\n\n\"Yeah, but it's weird!\" Mallory says. \"I'm just about done here. Let me wrap up, and I'll show it to you.\"\n\nMallory finishes soon enough. She meets Elena and Steve by the exit door. \"It's a wedding announcement,\" she says. \"And it's old.\"\n\nThe wedding announcement is cut out of a newspaper, and it's dated twenty-five years ago. \"Local businessman Franklin Barrett marries Claudia Gomez, of Spain\" reads the caption to the black-and-white photograph of a bride and groom.\n\n\"Claudia?\" Elena asks. \"Is this Claudia's mom? Is she named after her mom?\"\n\n\"She looks more like the guy,\" Mallory says. \"I think this is her father. They have the same last name.\"\n\n\"And Gomez is Alejandro's last name,\" Elena says. \"He's from Spain, too. Are they related?\"\n\n\"No idea,\" Steve says. \"Earlier today, he acted like he didn't know her.\"\n\n\"Weird,\" Elena says, unsure what to make of this new clue.\n*set evidence_3_found true\n*set evidence_3 \"wedding announcement\"\n*finish\n\n*label home_2\n\"I'll take the normal lockers,\" Elena says.\n\n\"I call the football lockers!\" Steve says quickly.\n\n\"Is that the reason why you wanted to check the Home Team Locker Room?\" Mallory asks. \"You wanted to make sure no one took your stuff?\"\n\n\"No,\" Steve says, in an unconvincing voice.\n\nElena starts searching the lockers closest to the door, doing the top lockers first and the bottom lockers second. They're empty, except for the occasional stain or piece of gum. One locker has a shirt inside. Elena unfolds it quickly, only to find that it's a blank white shirt. Pinned to the front is a note with the words \"Fooled you!\" printed on it.\n\n\"Really? How dumb is this?\" Elena asks, losing all sense of respect for the kidnapper. Not that she had much respect for the kidnapper, to begin with.\n\nThe next row of lockers is also empty, but the middle row has something. It's a piece of paper with \"_ _3 2\" written on it. Elena thinks for a second, but she can't recognize the handwriting, nor does she understand what it means.\n\n\"I think I found a clue, but it could just be garbage,\" Elena announces. \"I also found a blank t-shirt.\"\n*page_break\nSteve walks up to her. \"Weird,\" he says.\n\n\"It gets weirder,\" Elena says, handing him the paper. \"What about you? Are you done already?\"\n\n\"Yeah,\" he says. He gives her a remote control. \"I found this in my locker. It can't be a coincidence that the kidnapper used [i]my[/i] locker.\"\n\n*set evidence_2_found true\n*set evidence_2 \"TV remote\"\n\"A TV remote? You watch a lot of TV in the locker room?\" Elena asks.\n\n\"There aren't any TVs in here,\" Steve says. \"I don't know what the remote or this paper means. Sorry.\"\n\n\"Well, we've still got a few minutes left,\" Elena says. \"Let's check the other lockers. I've been working towards the wall in that direction.\"\n\nSteve gives Elena a thumbs-up and starts searching with her. Mallory appears, when they two of them are almost finish with their search.\n\n\"I found a wedding announcement,\" she says. \"And that's it. I don't know if it's a clue or not. I think it's about Claudia's parents.\"\n\nElena takes the paper from Mallory's hands. It's a short article, cut out of a newspaper from twenty-five years ago. \"Local businessman Franklin Barrett marries Claudia Gomez, of Spain\" reads the caption to the black-and-white photograph. The article itself goes into details about the family of the bride and groom, along with when and where the wedding took place.\n\n\"The article mentions a Claudia and a Mr. Barrett in this article,\" Elena says. \"What are the odds that it's not [i]our[/i] Claudia Barrett?\"\n\n\"Look at the name of the bride's father,\" Steve says. \"Alejandro Gomez. Alejandro is Claudia's grandfather?!\"\n\n\"Don't be stupid,\" Mallory says. \"That guy must be at least fifty by now. He's probably her grandfather.\"\n\n\"Alejandro and Claudia have the same grandfather?\" Elena asks. \"Hm...I guess it's possible she has a Spanish mother. Just based on this picture, I'd say Claudia looks like her dad, not her mom.\"\n\n\"But what does this have to do with our kidnapping?\" Steve asks.\n\n\"I have no idea,\" Elena says. \"Nothing about this situation makes any sense.\"\n*set evidence_3_found true\n*set evidence_3 \"wedding announcement\"\n*finish\n\n*label home_3\n\"I'll take the shower and the bathroom stalls,\" Elena says.\n\n\"I'll do the lockers,\" Mallory says.\n\n\"Then I'll get the football lockers,\" Steve says. \"If the kidnapper touched my lucky socks, they're gonna be in for a world of hurt!\"\n\nElena breaks away from the others and check the shower stalls. Well, [i]stall[/i], really. There's a flimsy plastic divider in the middle of the shower area, effectively cutting it in half. Elena checks both sides of the divider, but there's nothing attached to it.\n\nThere are ten shower heads. Elena gives them a brief inspection, but nothing is out of the ordinary. None of them are loose or holding secret compartments. Underneath the third shower head is some old graffiti about a student. Judging from the age of the graffiti, the student who wrote it has long since graduated, but their rude observation lives on.\n\nElena checks the drains next. Jackpot! One has a crumpled-up paper on it!\n\nShe picks it and rolls it out. It's a short article, cut out of a newspaper. \"Local businessman Franklin Barrett marries Claudia Gomez, of Spain\" reads the caption to the black-and-white photograph. The photograph has a smiling woman and a man who looks a lot like Claudia.\n\n\"Claudia Barrett looks exactly like Mr. Barrett,\" Elena says. \"That has to be her father. Which means this paper is...twenty years old?\"\n\nShe reads the attached article, which is full of details that are no longer important, twenty years later. It talks about the bride's family and the groom's family, as well as when and where the wedding took place. It's more like twenty-five years ago, not twenty, but it's still likely these are Claudia's parents.\n\nThe bride's parents are Maria and Alejandro Gomez. Elena's eyes narrow in suspicion. Someone from Spain named Alejandro Gomez? Is this Alejandro's grandfather? Is Alejandro related to Claudia?\n*set evidence_3_found true\n*set evidence_3 \"wedding announcement\"\n*page_break\nElena moves on to the bathroom stalls. For some reason, they are about twice as large as the stalls in the Away Team Locker Room. That makes searching the toilets somewhat easier, and there's nothing interesting in the stalls, except a toilet that is completely filled with toilet paper.\n\nFairly confident she missed nothing, Elena goes to the others. \"Any luck?\" she asks.\n\n\"I found this paper,\" Mallory says, holding it up. It has \"_ _3 2\" written on it. Elena has no idea why there are lines before the numbers. Maybe it's an incomplete code.\n\n\"And I found this in my locker,\" Steve says. He holds out a remote control. \"It can't be a coincidence that the kidnapper used [i]my[/i] locker.\"\n\n*set evidence_2_found true\n*set evidence_2 \"TV remote\"\n\"Uh...what's a TV remote have to do with anything?\" Elena asks.\n\n\"Heck if I know,\" Steve says. \"Anyway, we're pretty sure those are the two clues.\"\n\n\"I found something, too,\" Elena says, giving them the newspaper clipping. \"It's about Claudia's parents getting married. Her mom was part of the Gomez family. Maybe she's related to Alejandro.\"\n\n\"If he has family here, it'd explain why he came to our town as an exchange student,\" Mallory says. \"But why didn't he say anything when we voted for prom queen?\"\n\n\"I don't know,\" Steve says.\n\n\"What [i]I[/i] don't know is why we found three clues, when there are only supposed to be two,\" Elena says. \"Did the kidnapper leave one of these clues by accident? Or is this just another attempt at toying with us?\"\n*finish\n", "route_1_chapter_7": "[b]Chapter 7[/b]\n\nThe two groups rejoin in the gym. First, Jessica gives a quick explanation of what happened in the Away Team Locker Room, which is followed by Steve's recap of the Home Team Locker Room search.\n\n\"It sounds like both groups did the exact same thing,\" Bruce says. \"Big whoop.\"\n\n\"It [i]is[/i] a big deal,\" Jessica says. \"I'll bet our sets of numbers go together. We have the first two digits of a code.\"\n\n\"And we have the last two digits of a code!\" Mallory says. \"Put them together, and it's 4 2 3 2!\"\n\n\"But what is it the code [i]for[/i]?\" Elena asks. \"The combination lock on the exit?\"\n\n\"No, that's five digits,\" Jessica says. \"It's gotta be the door to the hallway. That's the door in the gym that's normally locked with a passcode, not locked with these weird touchscreen puzzles.\"\n\n\"Excellent!\" you say. \"We can go in the hallway! Uh...what do we do there?\"\n\nEveryone falls silent.\n\n\"We didn't get any instructions about what to do next,\" Mallory says.\n\nBruce swears. \"Great! Now we can't do anything besides sit and wait for the kidnapper to contact us again!\"\n\n\"Don't worry, Bruce,\" Elena says. \"I'm sure we can think of something to do.\"\n\n\"I can think of a lot of things I'd like to do with you, Elena,\" Bruce smiles.\n\n\"You're such a pig, Bruce,\" Jessica says. \"Can you focus on helping us get out of here, first?\"\n\n\"What more do you want?\" Bruce asks. \"We're screwed. There's no way out of here. Just accept it.\"\n\n\"No way,\" you say. \"We haven't even talked about the clues yet. I want to talk about...\"\n\n*choice\n #The nameplate\n  *goto nameplate_1\n #The TV remote\n  *goto remote_1\n #The newspaper article\n  *goto newspaper_1\n\n*label nameplate_1\n\"The principal's nameplate,\" you say. \"Where does that belong? Not in the locker rooms, that's for sure.\"\n\n\"It goes in the principal's office, I guess,\" Elena says.\n\n\"Which is connected to the hallway!\" Jessica says. \"That must be it! We unlock the hallway and go to the principal's office next! Good thinking, $!{first_name}!\"\n\n\"You're welcome,\" you say graciously.\n\nWhat next?\n\n*choice\n #Talk about the remote\n  *goto remote_3\n #Talk about the newspaper\n  *goto newspaper_2\n #Leave for the principal's office\n  *goto talk_over\n\n*label nameplate_2\n\"The principal's nameplate,\" you say. \"Where does that belong? Not in the locker rooms, that's for sure.\"\n\n\"It goes in the principal's office, I guess,\" Elena says.\n\n\"Which is connected to the hallway!\" Jessica says. \"That must be it! We unlock the hallway and go to the principal's office next! Good thinking, $!{first_name}!\"\n\n\"You're welcome,\"  chokes. \"I'm just worried about Nancy. What if we haven't seen her because she's dead, like Smothers and Claudia?\"\n\nThe others look upset, which slightly confuses you. \"But she's still alive,\" you say.\n\n\"How do you know?\" Steve asks.\n\n\"That's what it said on my touchscreen,\" you say. \"After I solved the puzzle, to get out of the storage closet. It said we have to solve all the puzzles to save Nancy.\"\n\n\"Really?\" Elena asks. \"Mine was about Claudia and me. The kidnapper made a mean remark about how the two of us weren't good enough to be picked as prom queen.\"\n\n\"Did [i]everyone's[/i] touchscreen say something different?\" Steve asks.\n\nJessica slaps her forehead. \"That's probably a major clue, and [i]we missed it[/i]!\" she says. \"I bet if we put them all together, it'd reveal something big!\"\n\n\"Then let's go back and check them!\" Mallory says excitedly.\n\n\"We can't,\" Jessica says. \"Haven't you noticed? All the doors are closed.\"\n\nShe gestures towards the gym, and sure enough, all the doors are now shut. Since the touchscreens are on the insides of the doors, you can't see them anymore. There's something else you can't see anymore, which is slightly more concerning.\n\n\"Claudia's body!\" you say. \"It's gone!\"\n*page_break\n\"Impossible!\" Bruce says. \"Unconscious people don't get up and walk away!\"\n\n\"Uh, yes they do,\" Steve says. \"Happened in the second football game of the year. Ned got a concussion and woke up ten minutes later.\"\n\n\"Claudia was electrocuted, not concussed,\" Bruce says. \"That's different.\"\n\n\"And you're an expert on how long people recover from being electrocuted?\" Jessica asks.\n\n\"No, but...look, it doesn't matter if she woke up on her own or not,\" Bruce says. \"The important thing is that she's [i]not here[/i]. You really think she woke up and found her way out of the gym? Someone took her, and I'm betting it's the kidnapper.\"\n\n\"Which means the kidnapper sent us into the locker rooms as a distraction,\" Elena says. \"They purposely got us out of the way, so they could take Claudia.\"\n\n\"That doesn't make sense,\" you argue. \"They already kidnapped Claudia. You think they kidnapped her a second time?\"\n\n\"Maybe it has something to do with Alejandro,\" Mallory says. \"He's secretly related to Claudia, and they're both not here. Coincidence?\"\n\n\"Smothers isn't here, either, and he's not related to them,\" Bruce says. \"Or at least, I really, [i]really[/i] hope he's not secretly their father or something. That'd be the freakiest thing I've ever heard.\"\n\n\"I agree with Elena,\" Jessica says. \"This is all a distraction. We can't start focusing on theories about Claudia, especially when she's not here. We need to focus on escaping.\"\n\n\"I agree,\" Steve says. \"Escape first. Questions later. Especially if escaping is the only way to save Nancy.\"\n\nWhat do you want to do?\n\n*choice\n #Escape first\n  *goto door_scene\n #Try to find Claudia\n  \"We were in the locker rooms for ten minutes,\" you say. \"Claudia's body disappeared, during that time. Therefore, she and/or the person who took her can't be [i]that[/i] far away. We should look for them.\"\n\n  \"Where?\" Bruce asks. \"The gym is completely empty, genius.\"\n\n  \"Check the doors!\" you say. You go to the nearest storage closet and try to pull it open, but it's locked. A few of the others try different doors, but they also don't open.\n\n  \"They're all locked,\" Bruce says.\n\n  \"Probably to prevent us from going back and re-reading the clues on the touchscreens,\" Jessica gripes.\n\n  \"We could probably break down the doors, if we tried hard enough,\" Steve says.\n\n  \"Why would we?\" Elena asks. \"There's nothing interesting inside them besides the touchscreens. And we probably can't break the doors without hurting the touchscreens.\"\n\n  \"True,\" Steve allows.\n\n  \"This is a dead end,\" Jessica says. \"Let's check out the hallway door, now.\"\n  *page_break\n  *goto e punished. It will be a half-hour before you can open the locker room doors and search them again.[/i]\n\n[i]Both of your clues lead to a different place in the hallway. Once again, you'll have to split up into groups of two and explore both rooms. But if you get it wrong? Again, your stupidity will be punished, and it will be a half-hour before you can try again.[/i]\n\n[i]Your ten minutes starts now. But first, a puzzle![/i]\n\n[i]The leader is a dealer. The teacher is a cheater. The salesmen are...[/i]\n\n*choice\n #Liars\n  *goto puzzle_1\n #Measles\n  *goto puzzle_1\n #Hidden\n  *goto puzzle_1\n #Nameless\n  *set puzzle_6_answered true\n  *set puzzle_6_answer \"Nameless\"\n  *goto puzzle_solved\n\n*label puzzle_1\n[i]Wrong! Try again![/i]\n\n[i]The teacher is a cheater. The student is stunted, and the parent is a panter. Anoint is...[/i]\n\n*choice\n #Disappoint\n  *goto puzzle_2\n #Stunted\n  *goto puzzle_2\n #Nation\n  *set puzzle_6_answered true\n  *set puzzle_6_answer \"Nation\"\n  *goto puzzle_solved\n #Painter\n  *goto puzzle_2\n\n\n*label puzzle_2\n[i]Wrong again! This is your last try! Too bad I can't electrocute all of you at once for such stupidity![/i]\n\n[i]The dancer is craned. The singer reigns. The player is pearly, and the lights are slight. The slain are...[/i]\n\n*choice\n #Nails\n  *set puzzle_6_answered true\n  *set puzzle_6_answer \"Nails\"\n  *goto puzzle_solved\n #Dead\n  You pause for a moment. That doesn't sound right. You decide to re-read the puzzle, instead.\n\n  *goto puzzle_2\n #Luminescent\n  You pause for a moment. That doesn't sound right. You decide to re-read the puzzle, instead.\n\n  *goto puzzle_2\n #Alight\n  You pause for a moment. That doesn't sound right. You decide to re-read the puzzle, instead.\n\n  *goto puzzle_2\n\n\n*label puzzle_solved\nYou realize this puzzle is a simple anagram, where the letters of a word are switched around, to form a new word. This allows you to find the correct answer.\n\n\"So, what teams do we want?\" Steve asks.\n\n\"I'm not going with Bruce this time,\" Jessica says.\n\n\"I'll keep an eye on Bruce,\" Elena says.\n\n\"Me, too,\" Steve says.\n\n\"So, me, Jessica and $!{first_name},\" Mallory says. \"Unless you have a problem with it?\"\n\n\"I'm good,\" you say. There's no time to argue the point, even if you had an issue with Mallory and Jessica. \"But where do we go? Obviously, the principal's nameplate goes with the principal's office, but the TV remote?\"\n\nEveryone falls silent, wondering where the TV remote could belong. After ten seconds, you speak up. \"We should search...\"\n\n*choice\n #The principal's office\n  *set chapter_7_where_to_go \"principal's office\"\n  \"We should search the principal's office,\" you say. \"Your group can figure out where the remote goes.\"\n\n  \"Yeah, maybe we'll figure it out, when we see the hallway,\" Steve says. His voice does not sound very hopeful about this possibility.\n\n  \"Great, then let's go!\" you say, opening the hallway door.\n\n  *finish\n #The teacher's lounge\n  *set chapter_7_where_to_go \"teacher's lounge\"\n  \"We should search the teacher's lounge,\" you say. \"There's usually a TV in there, right?\"\n\n  Jessica shrugs. \"I wouldn't know. I've never been in there.\"\n\n  \"Might as well try it,\" Mallory says. \"Sounds like nobody else has any better ideas.\"\n\n  \"Then let's go,\" you say, opening the hallway door.\n\n  *finish\n #The science room\n  *set chapter_7_where_to_go \"science room\"\n  \"We should search the science room,\" you say. \"TVs are kind of scientific, right?\"\n\n  Jessica shrugs. \"I don't normally associate TVs with science,\" she says.\n\n  \"Might as well try it,\" Mallory says. \"Sounds like nobody else has any better ideas.\"\n\n  \"Then let's go,\" you say, opening the hallway door.\n\n  *finish\n #The science lab\n  *set chapter_7_where_to_go \"science lab\"\n  \"We should search the science lab,\" you say. \"That's the best place to hide something.\"\n\n he filing cabinets. It takes a few moments for you to realize that only one drawer can be opened at a time, otherwise the other drawers remain shut.\n\n  The first drawer has files on all the various teachers in school, including their names, addresses and employment history. The second drawer has files on all the classes the school has taught, with descriptions and syllabi. In the back are some more unusual classes from twenty years ago, like Shakespeare and Rap, Underwater Basket Weaving and Studies in Elephant Art.\n\n  Under any other circumstances, these files would probably make for amazing gossip, but you go through them quickly, hoping to find a clue.\n\n  *goto Mal_found\n #The desk\n  *goto desk_search\n #The trash can\n  The trash can has two pieces of paper in it. One is an email from a parent, who is complaining about the traffic when dropping kids off at school. The other is a take-out menu from a nearby Chinese restaurant.\n\n  Well, that was pointless.\n\n  You decide to search the filing cabinet next to Mallory. The first drawer you check has a list of all the current students and their emergency contact information.\n\n  *goto Mal_found\n\n*label Mal_found\n\"Got it,\" Mallory says. \"It's just like the paper from the locker rooms, only it says blank blank two nine.\"\n\n\"So we can assume there's a similar one in the other room,\" Jessica says. \"Whatever that room may--aha! Got it!\" She holds up large water bottle.\n\n\"Are you sure that's a clue?\" you ask. \"Maybe the principal keeps that in her desk, normally.\"\n\n\"Nope, this is a clue,\" Jessica says. She shows off the sticker on the side, which reads \"Property of Nancy Spier\".\n\n\"Excellent!\" Mallory says. \"We found both clues in record time!\"\n\n\"Yeah!\" you say. \"I hope the other team was just as successful!\"\n\n*set evidence_1 \"TV remote\"\n*set evidence_2 \"newspaper article\"\n*set evidence_3 \"water bottle\"\n*finish\n\n*label desk_search\nThe principal's desk has several ther room,\" Steve says. \"Whatever that room may--aha! Got it!\" He holds up large water bottle.\n\n\"Are you sure that's a clue?\" Elena asks. \"Maybe the principal keeps that in her desk, normally.\"\n\n\"Nope, I recognize it,\" Steve says. \"This is Nancy's water bottle. See?\" He turns it around and shows off the sticker, which reads \"Property of Nancy Spier\".\n\n\"Excellent!\" Elena says. \"We found both clues in record time!\"\n\n\"Yeah!\" Steve says. \"I hope the other team was just as successful!\"\n\n*set evidence_1 \"TV remote\"\n*set evidence_2 \"newspaper article\"\n*set evidence_3 \"water bottle\"\n*finish\n\n*label desk_search_alt\nThe principal's desk has several writing utensils and a computer. Elena tries logging on with her school ID and password, but it's not accepted. Apparently, the principal has her own private computer, separated from the school's network.\n\n\"Shoot,\" Elena mutters.\n\nShe starts searching the drawers. There are lots of envelopes and paper with the school letterhead. There are some pictures of babies and a copy of the school handbook. Nothing looks remotely like a clue.\n\nThe bottom drawer is the largest, containing binders and a pink plastic water bottle. Elena reaches for the first binder, which is labelled \"Budget Reports\", when the name \"Nancy Spier\" catches her eye.\n\nShe takes a closer look at the water bottle. On the side is a sticker which reads \"Property of Nancy Spier\". Looks like Nancy didn't want any of the other cheerleaders sharing her water.\n\n\"I've got a clue,\" Elena says. \"It's Nancy's water bottle! It has her name on it, and everything.\"\n\n\"Good,\" Steve says. \"I'm finding nothing in this filing cabinet.\"\n\n\"I found a paper,\" Bruce says. \"It's like the one from the locker rooms, only it says blank blank two nine.\"\n\n\"Why didn't you say something when you found it?\" Steve asks.\n\n\"Didn't feel like it,\" Bruce says.\n\n\"Well, we found both clues,\" Elena says. \"And without much trouble, either. I hope the other team was just as successful!\"\n\n*set evidence_1 \"TV remote\"\n*set evidence_2 \"newspaper article\"\n*set evidence_3 \"water bottle\"\n*finish\n", "route_1_chapter_9": "[b]Chapter 9[/b]\n\nAgain, everyone regroups in the gym. The good news about finding Nancy's water bottle is immediately overshadowed by the bad news about the rooms being locked for a half hour.\n\n\"So we have thirty minutes, before we can try again?\" Jessica asks. \"This is nonsense! None of the rooms in the hallway have anything to do with a TV remote!\"\n\n\"They also don't have anything to do with a water bottle,\" Elena says. \"Not unless there's a secret, third locker room that the cheerleaders use.\"\n\nSteve appears to be the only one who takes her remark seriously. \"No, I think they use the Away Team Locker Room,\" he says. \"They keep their equipment in one of the storage closets, here. Maybe that's what the clue refers to!\"\n\n\"The rooms we woke up in, you mean?\" you ask. You look around. \"Did anyone's storage closet have cheerleader stuff inside?\"\n\n\"What, like a pile of pom-poms or something?\" Bruce asks. \"No, my room just had smelly old equipment inside. It was gross.\"\n\n\"Great, so we have nothing to do!\" Jessica says. \"We wait for thirty minutes, just we can have another one-in-ten chance of guessing what the TV remote room is! How terrible is that?\"\n\n\"If [i]you're[/i] so smart, tell us the puzzle solution already,\" Bruce says.\n\n\"Shut up, Bruce!\" Jessica says. \"I swear, I will shove this TV remote down your throat!\"\n\n\"I'd like to see you try!\" Bruce says.\n\n\"Stop fighting, already!\" Elena says. \"We get it, you're mad. [i]Everyone[/i] here is mad. But try channeling your anger into something useful!\"\n\nSomething like...\n\n*choice\n #Cracking the exit door lock\n  \"We have the first two digits to the lock on the exit door,\" you say. \"Maybe we can guess the last three.\"\n\n  \"You want us to try every combination, until we get the right one?\" Bruce asks. \"That'll take [i]forever[/i]!\"\n\n  \"Yeah, there's a hundred--no, a thousand possibilities!\" Steve says.\n\n  \"But when we get the third digit, that's a good idea,\" Jessica says. \"It'd probably be faster to try a hundred combinations than to solve two more rounds of this terrible game.\"\n\n  \"In the meantime, I was thinking we could talk about everything that's happened,\" Elena says. \"Not everything makes sense to me.\"\n\n  *goto clues\n #Go over the clues\n  \"We should go over the clues,\" you say. \"You know, discuss everything that's happened so far and figure out what it means.\"\n\n  *goto clues\n*label clues\n\"Nothing that's happened makes sense,\" Bruce complains.\n\n\"I disagree,\" you say. \"Everything has been planned out, in ridiculous detail. Our kidnapper has been very careful. Why?\"\n\n\"Because they're a deranged psycho?\" Bruce asks. \"We're talking about a person who made over thirty multiple choice word puzzles, here!\"\n\n\"If the kidnapper is following a plan, that must mean they have a specific goal in mind,\" you say. \"If we can figure out the kidnapper's plan, then maybe we can stop them.\"\n\n\"But what [i]is[/i] the plan?\" Steve asks. \"Right now, it looks like the only plan is to waste as much time as possible, with all these half hour penalties.\"\n\n\"Maybe that's the goal,\" Elena says. \"Maybe they want to take up a lot of time, in order to make their getaway.\"\n\n\"That's impossible,\" Jessica says. \"The kidnapper is here, watching us. They haven't left the building.\"\n\nYou're not entirely sure that assumption is justified. Is there a piece of evidence which indicates if the culprit is here or not?\n\n*choice\n #The water bottle\n  \"The water bottle proves the culprit is here with us!\" you say.\n\n  \"Why?\" Elena asks.\n\n  \"Because only the culprit could drink the liquid in this bottle,\" you say. \"I recognize it, by its smell. This isn't water. It's [i]Culprit Cola[/i], the perfect beverage for all your greatest revenge schemes!\"\n\n  Everyone stares at you like you've lost your mind.\n\n  \"Haven't any of you seen the ads for Culprit Cola?\" you ask. \"It's the hottest new beverage on the market for villains!\"\n\n  \"$!{first_name}, I think maybe you should sit down,\" Elena says. \"You're not thinking clearly.\"\n\n  \"Noooo!\" you shout. \"You're only saying that because you prefer Detective Drink, the #1 soda designed to capture culprits!\"\n  *page_break\n  Okay, just kidding. What you [i]actually[/i] said was this:\n\n  *goto touchscreen\n #The TV remote\n  \"The TV remote proves that the culprit isn't here!\" you say. \"They're watching us on TV!\"\n\n  \"Like, through the security cameras?\" Jessica asks. \"I thought we already decided that was the case.\"\n\n  \"No, I mean, like a TV show!\" you say. \"This must be a wacky new show called [i]Help! My Prom Queen Was Kidnapped![/i]\"\n\n  \"What?\" Steve asks.\n\n  \"Think about it,\" you say. \"Each round of this game is a different episode. That's why they split us into groups of two and gives us ten minutes to solve a challenge! That makes for better TV!\"\n\n  \"And it explains why Smothers and Alejandro were eliminated!\" Bruce says enthusiastically. \"The audience voted them off!\"\n\n  \"What's the prize for winning the contest?\" Elena asks.\n\n  \"A free prom shopping spree, of course!\" you say.\n  *page_break\n  Okay, just kidding. What you [i]actually[/i] said was this:\n\n  *goto touchscreen\n #The touchscreens\n  *goto touchscreen\n\n\n*label touchscreen\n\"Remember the touchscreen that opened the hallway?\" you ask. \"It said we found two big clues in the locker rooms, when we actually found three. It's not a [i]big[/i] mistake, but it's still weird.\"\n\n\"Yeah, it's not like we hid the clues,\" Mallory says. \"We talked about them openly. Why didn't the kidnapper know we found three?\"\n\n*if chapter_7_where_to_go = \"principal's office\"\n \"That's not the only mistake,\" Jessica says. \"The touchscreen at the principal's office mentioned Bruce, even though he wasn't there.\"\n\n *goto separate_scene_for_just_one_line\n*else\n \"That's not the only mistake,\" Elena says. \"The touchscreen at the principal's office mentioned Jessica, even though she wasn't there.\"\n\n *goto separate_scene_for_just_one_line\n\n*label separate_scene_for_just_one_line\n\"Right,\" you say. \"So there were multiple touchscreens that had mistakes on them. That must mean...\"\n\n*choice\n #The kidnapper is lazy\n  \"The kidnapper must have written the touchscreen text in advance, and they never bothered to update it,\" you say. \"How lazy! If they're [i]going[/i] to kidnap a bunch of people, the least they could do is put some effort into it!\"\n\n  \"But didn't you just say the kidnapper planned everything out in great detail?\" Elena asks.\n\n  \"Yes,\" you say. \"I was joking when I called the kidnapper lazy. Try to keep up.\"\n\n  \"Maybe [i]you[/i] should try to have better jokes,\" Elena says. You pretend not to hear her and go back to your explanation.\n\n  *goto lazy_joke_over\n\n #The kidnapper isn't watching us\n  *goto lazy_joke_over\n\n*label lazy_joke_over\n\"The kidnapper made two mistakes,\" you say. \"They didn't know about the newspaper clipping we found, and they didn't know who went into the principal's office. That has to mean the kidnapper isn't watching us.\"\n\n\"But they [i]are[/i] watching us,\" Jessica says. \"They knew Smothers and Alejandro never came out of their rooms.\"\n\n\"What if that was fake?\" you ask.\n\n\"You mean Smothers and Alejandro are working with the culprit?\" Mallory asks.\n\n\"Or what if the puzzles in their rooms were rigged?\" Elena asks. \"The kidnapper programmed it so they would lose, no matter what option they picked! That way, they could trick us into thinking that we're being watched!\"\n\n\"If that's true, it means the culprit has never been here, the whole time!\" Steve says excitedly. \"That's why everything follows a ten minute timer! It's all been programmed in advance!\"\n\n\"Wrong,\" Bruce says. \"What about Claudia? The touchscreen responded to what she said, before electrocuting her. There's no way the culprit could have guessed that.\"\n\n\"Not unless [i]she's[/i] the culprit,\" you say.\n\n\"You mean she [i]pretended[/i] to be electrocuted?\" Steve asks. \"That's crazy!\"\n\n\"It fits the evidence,\" Jessica says. \"That's why the touchscreen didn't mention the newspaper article. She never expected us to find it! She must have dropped it by accident or something.\"\n*page_break\n\"No, no, no!\" Mallory says. She grimaces and grabs her forehead. \"Don't do this! Please stop!\"\n\n\"Huh?\" Steve asks. \"What's wrong?\"\n\n\"I'm sorry,\" Mallory says. \"But I have to do this.\"\n\n\"Do [i]what?[/i]\" Steve asks. \"You're really starting to confu--\"\n\nMallory hits Steve in the jaw with a sudden uppercut punch. Steve falls over backwards, while Mallory backs away, eyes furious. \"You see what you made me do?\" she cries. \"Just stop with this questioning, okay? I don't want to hurt you!\"\n\n\"You're the kidnapper!\" Bruce says.\n\n\"No, I'm not!\" Mallory says. Tears are pouring down her cheeks. \"She's got my sister, and unless I--I--\"\n\n\"What is Claudia making you do?\" Jessica asks.\n\n\"Don't say her name!\" Mallory says. \"Otherwise I have to--\"\n\n\"Claudia! Claudia! Claudia!\" Bruce taunts.\n\nMallory charges at Bruce, fists flying. His eyes go wide in shock as she punches him in the face.\n\n*choice\n #Stop Mallory\n  *goto fake_choice\n #Save Bruce\n  *goto fake_choice\n #Do nothing\n  Do nothing? Are you crazy? There's no choice about it! You've got to stop Mallory!\n\n  *goto fake_choice\n\n*label fake_choice\nYou run at Mallory and try to grab her from behind. Next to you, Elena grabs Mallory, too. Jessica hesitates for a second, before joining the fight. Mallory is screaming, crying and flailing wildly, while Bruce shouts and tries to get her off of him.\n\nEventually, the three of you pull Mallory off of Bruce. Bruce's nose is bleeding, and Mallory isn't in much better shape. Her wild curly hair is now a total mess.\n\nSteve gets up, from the ground. \"Ow,\" he says, rubbing his chin. \"What's going on?\"\n\n\"I'm sorry!\" Mallory sobs. \"I didn't want to hurt you! I didn't have a choice!\"\n\n\"What are you talking about?\" Steve asks. \"No choice?\"\n\n\"I can't explain! It's part of the rules!\" Mallory sobs. \"Please, just...just leave me alone!\"\n\nYou shake your head. \"I think it's obvious what's happening here,\" you say. \"The culprit is blackmailing Mallory.\"\n\n\"She's got my sister Valerie,\" Mallory says in a small voice. \"She said...she said she would kill Valerie, unless I follow her orders.\"\n\n\"Let me guess,\" Jessica says. \"One of Claudia's orders was to attack anyone who accused her of being the culprit.\"\n\nMallory nods. \"I can't take the risk of Valerie getting hurt. If there's even the slightest chance that Claudia is listening to us right now...\"\n\n\"What else does she want you to do?\" you ask.\n\n\"I'm supposed to delay the group that goes into the French classroom,\" Mallory says. \"Make sure they stay in there for more than ten minutes, that way they're trapped. Obviously, that didn't happen.\"\n\n\"The TV remote leads to the French classroom?\" Elena asks. She looks confused, and nobody else seems to understand, either. You suppose it's a puzzle that only make sense to the kidnapper.\n\n\"But the most important thing is--\" Mallory starts to say.\n\n\"That's enough out of you,\" a cold voice says.\n*page_break\nEveryone whirls around to see Claudia standing there, wearing a prom dress. Behind her is Alejandro, who is holding a knife to Nancy's throat. His other arm is wrapped around her body, holding her in place.\n\n\"Nancy!\" Steve cries.\n\n\"Don't take another step closer, or she dies,\" Alejandro warns.\n\n\"I never expected you to betray us like this,\" Claudia says. \"And you were doing so well, too! You almost made it halfway through our little game.\"\n\n\"Where's Valerie?\" Mallory cries. \"Where's my sister?\"\n\n\"Ah, ah, ah!\" Claudia says, wagging her finger at Mallory. \"We had a deal. I let her go, if you follow my rules. You broke the rules, so you don't get to see Valerie again. Such a shame! Relatives [i]are[/i] important, aren't they, Alejandro?\"\n\n\"Yes,\" Alejandro says. \"More than you'll know.\"\n\n\"We already know you two are related,\" Jessica says. \"You can stop this game.\"\n\nThe childish grin disappears from Claudia's face. \"How did you know that?\" she asks.\n\n\"The newspaper article about your father's marriage,\" Jessica says. \"We found it in the locker room.\"\n\n\"I told you to get rid of that!\" Claudia says to Alejandro.\n\n\"I did!\" Alejandro said. \"I've been keeping it in my pocket this whole time!\"\n\n*if chapter_7_where_to_go = \"principal's office\"\n \"It clearly fell out!\" Claudia says. \"You complete moron! Can't you follow my simple directions? And you!\" she turns on Bruce. \"Why didn't you go to the principal's office, like I thought you would?\"\n\n Bruce shrugs. \"You're not the boss of me,\" he says.\n\n *goto separate_scene_for_just_one_line_1\n*else\n \"It clearly fell out!\" Claudia says. \"You complete moron! Can't you follow my simple directions? And you!\" she turns on Jessica. \"Why didn't you go to the principal's office? I thought for [i]sure[/i] you would!\"\n\n \"I...why would you think that?\" Jessica asks.\n\n *goto separate_scene_for_just_one_line_1\n\n*label separate_scene_for_just_one_line_1\nClaudia screams. \"All my plans, ruined by you idiots! Do you know how long I worked to set this up? And it all goes to pieces, because you made dumb mistakes!\"\n\nWhat do you say?\n\n*goto culprit_confrontation\n*label culprit_confrontation\n*choice\n *hide_reuse #\"How long did you work to set this up?\"\n  \"How long did you work to set this up?\" you ask. \"Nancy was picked as prom queen earlier today!\"\n\n  \"Would you believe that all of you have been unconscious for a week?\" Claudia asks.\n\n  \"Uh, no,\" Elena says. \"That's impossible.\"\n\n  \"Yeah,\" says Steve. \"My deodorant is still fresh. It can't have been more than a day.\"\n\n  \"Dude, we were kidnapped and you checked to see if your [i]deodorant[/i] is working?\" Bruce asks.\n\n  \"Uh...yes?\" Steve says.\n\n  \"Can we stop talking about your smelly armpits?\" Claudia asks. \"Okay, so you're right. You haven't been unconscious for a week. But I [i]did[/i] plan this out, long in advance. Just in case I didn't win the prom queen vote.\"\n\n  \"You should have voted for her,\" Alejandro says grimly. \"I did.\"\n\n  What do you want to say now?\n\n  *goto culprit_confrontation\n *hide_reuse #\"Where did you come from?\"\n  \"Where did you come from?\" you ask.\n\n  \"We were in the storage closet here,\" Claudia says, pointing at the storage closet that Alejandro was in, earlier. \"I locked all the closet doors and went inside, while you were messing around in the locker rooms.\"\n\n  \"So the locker room challenge was just a distraction?\" Jessica asks.\n\n  \"Yes, and it worked perfectly,\" Claudia says. \"I was [i]going[/i] to pretend to wake up, after you finished Round Three of the game, but obviously, that didn't happen.\"\n\n  \"And where was Nancy?\" asks Steve. \"Was she in there with you, the whole time?\"\n\n  \"Of course not,\" Claudia says. \"We didn't want her to know our identities, after all. But we decided to bring her out, now that we need a little [i]extra[/i] persuasion.\"\n\n  \"You do anything wrong, Nancy dies,\" Alejandro agrees. He tightens his grip on the knife.\n\n  What do you want to say now?\n\n  *goto culprit_confrontation\n *hide_reuse #\"Why do you want to be prom queen so badly?\"\n  \"Why do you want to be prom queen so badly?\" you ask. \"Why would you possibly care [i]this much[/i] about prom?\"\n\n  \"Hm, that's a good question,\" Claudia says. \"Who is so obsessed with prom that she'd kidnap a host of people and torture them so? Is a silly crown really worth it?\"\n\n  \"It's not about prom,\" Alejandro says. \"Not anymore.\"\n\n  \"Exactly,\" Claudia says. \"This is about [i]revenge[/i]. At this point, all I want is to see you suffer.\"\n\n  \"Revenge for what?\" Elena asks. \"What did we ever do to you?\"\n\n  \"You don't remember humiliating me, at the first school dance?\" Claudia asks. \"Of course you don't! Nobody remembers that, but me! It's so unimportant to you, so insignificant that [i]you can't even remember what happened![/i]!\"\n\n  You strain your memory. Maybe you remember hearing [i]something[/i] about a girl leaving the dance in tears, but mostly, all you can remember is Mr. Smothers punishing twenty students for inappropriate behavior. They were given a lifetime ban from dances. It was quite the gossip at the time.\n\n  \"That wasn't us, though,\" Steve says. \"Wasn't that Chad Dixon and Ryan Parette?\"\n\n  \"It doesn't matter who did it, anymore,\" Claudia says. \"It only matters that [i]someone[/i] is punished for it. That someone is you six.\"\n\n  What do you want to say now?\n\n  *goto culprit_confrontation\n\n *hide_reuse #Stop talking\n\n  *goto culprit_confrontation_over\n\n*label culprit_confrontation_over\n\"That's enough,\" you say. \"Give up. There's no way you can get away with this. Not when all of us know who you are!\"\n\n\"And what? You want us to give up and turn ourselves into the police?\" Claudia asks. \"Or maybe you're going to think of a clever trick to defeat us? Not this time.\"\n\n\"Not a chance,\" Alejandro agrees.\n\n\"Here's what's going to happen,\" Claudia says. \"All of you will sit on the ground. [i]Now[/i].\"\n\nEveryone sits.\n\n\"Aw, what obedient little puppies you are!\" Claudia says, clapping her hands together. \"Now, Alejandro and I are going to leave. We'll be taking Nancy with us, to ensure we're not followed.\"\n\n\"Not like there's any point in following us, anyway,\" Alejandro says. \"We're the only ones who know the password.\"\n\n\"Yep, I built in a secret escape code, just in case things went wrong,\" Claudia says. \"Good thing I did, huh? Once we're gone, you six are going to keep playing the game. As you've so cleverly deduced, the touchscreens and everything else is programmed to work automatically. We don't need to be here to run them.\"\n\n\"Why do you want us to play the game?\" you ask.\n\n\"It's fun!\" Claudia says. \"And more than that, it'll slow you down. By the time you escape, we'll be long gone, and Nancy will be dead!\"\n\nNancy whimpers.\n\n\"Oh, don't worry,\" Claudia says. \"Maybe I'm just saying that, to make sure everyone follows my orders. Or maybe I'll kill you now! Who knows?\"\n\nThis is a bad situation, to put it mildly. What do you do?\n\n*if gender = \"male\"\n *choice\n  #Offer yourself in Nancy's place\n   *goto offer\n  #Attempt to seduce Claudia\n   *goto seduce_1\n  #Try to reason with Claudia\n   *goto reason\n*else\n *choice\n  #Offer yourself in Nancy's place\n   *goto offer\n  #Attempt to seduce Alejandro\n   *goto seduce_2\n  #Try to reason with Claudia\n   *goto reason\n\n\n\n*label reason\nYou try to remember everything you can from last year's psychology class. The first thing you do is stand up, so you can look Claudia in the eye. That places the two of you on equal footing. \"Claudia, I understand you're upset right now,\" you say. \"But you don't want to do this.\"\n\n\"Yes, I do,\" Claudia says.\n\n\"Deep down, you're a good person,\" you say. \"You would never [i]kill[/i] anyone. It's not in your nature.\"\n\n\"What are you talking about?\" Claudia asks. \"Have you not been paying attention, this entire time?\"\n\n\"I [i]was[/i] paying attention,\" you say compassionately. \"And what I heard was a lonely person, crying for help. I know you're hurt and rejected, but you don't have to lash out like this. It's not too late to stop.\"\n\n\"Are you trying to psychoanalyze me, or what?\" Claudia asks. \"This is literally the first time we've ever spoken to each other! You don't know me at all!\"\n\n\"But I [i]want[/i] to know you,\" you say. \"I want to be friends with you, Claudia. But not if you continue down this destructive path.\"\n\n\"Are you joking?\" Claudia laughs. \"You're the most shallow person in this entire room! You voted for Nancy as prom queen, because she [i]invited you to a party[/i]. How low can you get?\"\n\n\"Look, we've all made mistakes,\" you say. \"I'm willing to put the past behind me and move on. Are you?\"\n\n\"I have no idea what you're trying to do, but it's not going to work,\" Claudia says. \"If you don't shut up [i]right now[/i], Alejandro is going to kill Nancy. Got it?\"\n\nYou frown. No wonder you didn't pass your final exam in psychology.\n*page_break\n\"Good!\" Claudia says. \"Now, any last words before you die?\"\n\n\"I thought you said you don't want us to talk,\" Jessica mutters.\n\n\"That rule was for the wannabe police negotiator,\" Claudia says.\n\n\"I am [i]not[/i] a wannabe--\" you begin to say.\n\n\"What did I tell you?!\" Claudia snaps, giving you a furious glare.\n\nWhile Claudia is distracted, Steve throws Nancy's water bottle at Claudia's head. As you'd expect from a football quarterback whose team lost every game this year, his aim is off, and he misses her head by a few inches.\n\n*goto steve_missed\n\n\n*label seduce_1\nYou stand up slowly, and Claudia looks at you with a calculating glare. \"Yes?\" she asks.\n\n\"This is probably a bad time to bring this up,\" you say. \"But I haven't had a good opportunity to say this before now. Claudia Barrett, will you go to prom with me?\"\n\nYou can feel the confusion in the air, as everyone looks at you, shocked.\n\n\"What?!\" Claudia asks.\n\n\"Go to prom with me,\" you say. \"I can see you've already got the dress, and it looks [i]awesome[/i] on you, by the way! We should definitely go together. It'd be great!\"\n\n\"But...but...I have to get revenge on the prom committee...\" Claudia mutters.\n\n\"Who cares how these other losers voted?\" you ask. \"Be [i]my[/i] prom queen.\"\n\n\"But...you didn't vote for me as prom queen!\" Claudia says. \"Alejandro did!  He was the only one!\"\n\n\"He lied. [i]I[/i] voted for you,\" you say. \"You're already the prom queen...of my heart.\"\n\n\"Give me a break,\" Elena mutters.\n\nClaudia slowly approaches you, a distrustful look in her eye, but then she grabs your head and kisses you passionately. Everyone starts clapping and cheering, celebrating what is sure to be the greatest romance in the history of Franklin High School.\n*page_break\n...Just kidding.\n\nWhat [i]actually[/i] happens is that you stand up and cry, \"No, Claudia! I like you!\"\n\n\"We've never met each other before now,\" Claudia says.\n\n\"I've admired you from afar,\" you say. \"I watch you in the hallways sometimes, and I check your social media pages constantly.\"\n\n\"Stalker,\" Mallory mutters.\n\nClaudia walks over to you, slowly, deliberately. She raises her hands up, and for a half-second, you wonder if she's [i]actually[/i] going to kiss you, but instead, she slaps you in the face.\n\n\"How dumb do you think I am?\" Claudia asks. \"Like I'm going to fall for an obvious trick like--\"\n\nWhile Claudia is distracted, Steve throws Nancy's water bottle at Claudia's head. As you'd expect from a football quarterback whose team lost every game this year, his aim is off, and he misses her head by a few inches.\n\n*goto steve_missed\n\n*label seduce_2\n\"Um, excuse me, can I say something?\" you say, standing up.\n\nClaudia looks at you with a calculating glare. \"Yes?\" she asks.\n\n\"Not to [i]you[/i],\" you say. \"I want to talk to Alejandro. Alejandro, if you let Nancy go, I'll...I'll go to prom with you.\"\n\n\"What?\" Alejandro asks.\n\n\"Hey, Elena and Nancy aren't the [i]only[/i] ones who would be fun prom dates!\" you say. \"I know how to have a good time! Honest, I do!\"\n\nYou give Alejandro a saucy wink and smile widely, trying your hardest not to slap yourself in embarrassment. Flirting is hard enough for you normally, but it turns out you're [i]terrible[/i] at flirting in a hostage situation.\n\n\"Have you forgotten that I'm not going to prom?\" Alejandro asks. \"I'll be back home in Spain by then.\"\n\n\"Oh,\" you say quietly. \"Never mind, then. I...I'll just be quiet.\" You start to sit back down, but suddenly straighten up. \"Wait, do you have any guy friends who need dates?\"\n\n\"Actually, my roommate Jun--\" Alejandro starts to say.\n\n\"[i]Everyone shut up![/i]\" Claudia cries. \"This is not a high school soap opera!\"\n\n\"Hey, don't talk trash about soap operas like that,\" you say.\n\nClaudia marches to you, her right arm raised, her face furious. While she's distracted, Steve throws Nancy's water bottle at Claudia's head. As you'd expect from a football quarterback whose team lost every game this year, his aim is off, and he misses her head by a few inches.\n\n*goto steve_missed\n\n\n*label offer\nYou stand up. \"Don't hurt Nancy!\" you say. \"Take me instead!\"\n\n\"$!{first_name}, what are you doing?\" Elena gasps.\n\n\"All you need is a hostage,\" you say. \"It doesn't matter who it is, right?\"\n\n\"Hmmm...\" Claudia says. \"This is a trick, isn't it? You think you can overpower me!\"\n\n\"With what?\" You hold up your hands. \"I don't have any weapons.\"\n\nClaudia walks closer to you, eyes narrowed in suspicion. While Claudia is distracted, Steve throws Nancy's water bottle at Claudia's head. As you'd expect from a football quarterback whose team lost every game this year, his aim is off, and he misses her head by a few inches.\n\n*goto steve_missed\n\n*label steve_missed\nIt's close enough to draw Claudia's anger. \"Augh!\" she cries, and proceeds to cuss Steve out.\n\n\"What do I do?\" Alejandro asks. His eyes dart around, slightly panicked. You notice that his grip on the knife has loosened. Now it's an inch or two away from Nancy's throat, instead of directly against it. You hope this means he's not going to hurt Nancy, except on Claudia's orders.\n\nAs Claudia turns to Alejandro, you grab her arm and yank, trying to pull her to the ground. She shrieks, but she doesn't lose her footing. She kicks you in the back of the shin, and you fall down on your knee.\n\nElena is the person closest to you and Claudia. She gets up and dashes forward. Claudia rotates her position, so you are between her and Elena. She kicks you, presumably trying to send you flying into Elena, but all you do is fall down. Elena jumps over you and grabs Claudia.\n\n\"What do I do?!\" Alejandro screams.\n\nSensing a fight, everyone else stands up. Bruce and Mallory run at Claudia, while Steve and Jessica cautiously approach Alejandro. \"Put the knife down,\" Jessica says.\n\n\"Stay back!\" Alejandro says. The knife in his hand wavers slightly.\n\n\"Remember my birthday party accident?\" Steve asks. \"You should do that again.\"\n\n\"What are you talking about?\" Alejandro asks, but he's not the one Steve is talking to. Nancy's eyes open in recognition, and she throws her head backwards, hitting Alejandro on the chin. He throws his arm out, and, taking advantage of the distraction, Nancy immediately leans forward and bites the hand holding the knife.\n\nJessica looks confused at Steve. \"What kind of weird birthday parties do [i]you[/i] have?\" she asks.\n\nAlejandro cries out in pain and lets go of the knife. Steve leaps forward and kicks the knife away, to the far side of the room, while Jessica grabs for the arm that's holding Nancy.\n\nAlejandro takes a step backwards, then lets go of Nancy to backhand Jessica in the face. He turns around Nancy to grab Steve by the shoulders. The two of them start pushing at each other, trying to bring the other one down.\n\nNancy stumbles a bit, but regains her balance quickly. She turns around, jumps at Alejandro and delivers a roundhouse kick to his back. \"Don't screw with cheerleaders!\" she cries.\n\nAlejandro flinches, giving Steve the upper hand. He pushes Alejandro down, falling on top of him, so he is pinning Alejandro to the floor. Alejandro struggles to flip himself over, and Steve takes advantage of the opportunity to twist Alejandro's arm behind his back. Alejandro cries in pain.\n\n\"Give up, or I'll break your arm!\" Steve says.\n\n\"You wouldn't dare,\" Alejandro says.\n\n\"You were about to stab my girlfriend,\" Steve says dangerously.\n\n\"...Okay, maybe you [i]would[/i] dare,\" Alejandro says.\n*page_break\nWhile they fight Alejandro, you fight Claudia. Elena is holding Claudia's right arm with both hands, while Claudia uses her left arm to smash Elena's shoulder repeatedly.\n\nYou pick yourself up off the ground and lunge at Claudia's left arm. Seeing you coming, Claudia tries to jump backwards, pulling Elena back with her. You smash into Elena, who falls over, trying and failing to grab Claudia's legs as she lands on the ground.\n\n\"Clumsy idiot,\" Elena moans.\n\n\"Sorry,\" you say. You help her get back up to her feet, and by this time, Bruce and Mallory have arrived. The four of you turn on Claudia, who takes a quick glance at Alejandro. Seeing that he's too busy fighting to help her, Claudia refocuses her attention on you.\n\n\"Let's fight one-on-one,\" she says.\n\n\"Do we look stupid?\" Bruce asks. \"This is a four-on-one fight. You're going down!\"\n\n\"Three-on-two fight,\" Claudia corrects him. \"Mallory's fighting on [i]my[/i] side. I still have her sister, remember?\"\n\n\"No,\" Mallory breathes. \"I can't fight my friends!\"\n\n\"You helped me kidnap Elena and $!{first_name}, earlier,\" Claudia says. \"Remember how easy it was to knock them out? We can do it again!\"\n\nMallory looks pained. \"I...\"\n\n\"And if not, think of the fact that you'll be arrested along with me, if I don't escape!\" Claudia says. \"Kidnapping, fraud, all the crimes you committed! If I'm going down, I'm bringing you down with me! And then you'll [i]never[/i] see Valerie again!\"\n\nMallory decides to...\n\n*choice\n #Attack Claudia\n  *set chapter_7_where_to_go \"escape\"\n  *goto mallory_attack_1\n #Attack Bruce\n  *set chapter_7_where_to_go \"cheeseburger\"\n  *goto mallory_attack_2\n\n\n*label mallory_attack_1\nMallory heroically decides to side against the kidnapper. She lunges for Claudia. Claudia easily steps aside and hits Mallory in the back, as she runs past. Mallory collapses on the ground, and Claudia kicks her.\n\n\"Valerie dies tonight!\" Claudia cries.\n\n\"That went badly,\" Elena says.\n\n\"We still have the advantage,\" Bruce says. \"All of us need to attack at once. Go!\"\n\nThe three of you go forward as a group, with Bruce in the middle, you on the left, and Elena on the right. Claudia tries hitting Bruce's hands, but instead of recoiling in pain, he makes a grab for her fingers. Claudia quickly runs to the side, away from all of you.\n\n\"See?\" Bruce says. \"She can't take all of us on at once!\"\n\nClaudia slowly backs away from the three of you, towards one of the storage closets. \"I'm not finished yet,\" she warns. Too late, you realize it's the storage closet that she and Alejandro came out of. Claudia quickly opens the door, puts her hand against the touchscreen and shouts, \"Claudia alpha bravo, go!\"\n\nAll the touchscreens in the gym start emitting a loud siren noise, and the lights blink on and off. Claudia takes advantage of the confusion and bolts for the door to the hallway.\n\n\"Later, losers!\" she cries, as she slams the door behind her. The sirens immediately stop, and for some reason, they're replaced by a pop song about basketball.\n\n\"I'm guessing that was the secret escape passcode she mentioned,\" Jessica says grimly.\n\n*finish\n\n\n*label mallory_attack_2\nMallory whimpers slightly. \"Sorry,\" she says. \"I have to do what she says.\"\n\nMallory hits Bruce in the shoulder, and Claudia grins. She tackles Elena, and the two start rolling on the floor, trading punches.\n\nBruce punches at Mallory, but she ducks under his outstretched arm and hits him in the side. Face screwed up in concentration, she kicks him in the shins.\n\nYou rush at Mallory, aiming a punch with your right hand. She blocks it, then cries in pain as Bruce yanks her hair. \"Ow, stop!\" she cries.\n\n\"Not unless you surrender,\" Bruce says threateningly. Mallory swings her arms around wildly. You grab her right arm and hold it, so she can't use it to hit anyone.\n\nSeeing both of her accomplices have been stopped, Claudia lets out a hiss and smashes Elena's head into the ground, momentarily stunning her. Claudia makes a mad dash for the far end of the gym, where Steve kicked the knife. Sliding like a baseball player, she picks it off of the ground before anyone has a chance to stop her.\n\n\"Nobody move!\" Claudia cries, waving the knife threateningly.\n\nThe gym falls silent. Even Alejandro stops his half-hearted attempts to get away from Steve.\n\n\"Good,\" Claudia says. She pats down her hair and continues. \"All of you stay where you are. I am leaving this gym. Now. Anyone who tries to follow me will be stabbed.\"\n\nShe walks backwards towards the exit, warily watching all of you, as if expecting to be ambushed at any second.\n\n\"What about me?\" Alejandro asks.\n\n\"You can stay here and get arrested, for all I care!\" Claudia cries. \"You're the most useless assistant ever! You brought a knife to a fist fight, [i]and you still lost[/i]!\"\n\n\"But what about Valerie?\" Mallory asks.\n\n\"Do you even have to ask?\" Claudia cries. \"She'll be dead! Dead like all of you!\"\n*page_break\nClaudia goes to the exit doors and starts undoing the combination lock. Jessica tries approaching her, but Claudia snarls and holds the knife threateningly, until Jessica backs away.\n\nKnowing that Claudia has to be stopped [i]now[/i], you go to the door that leads to
