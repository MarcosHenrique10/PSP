puzzle's butt.\"\n\n[i]Is this the right room? Could it be that your search is finally over? You won't know until you figure out what these four words have in common![/i]\n\n[i]Introspective[/i]\n*line_break\n[i]Rectangular[/i]\n*line_break\n[i]Independent[/i]\n*line_break\n[i]Consubstantial[/i]\n\n[i]What word fits the pattern?[/i]\n\n*choice\n #Another\n  *goto teacher_puzzle_2\n #Entertainment\n  *set puzzle_14_answered true\n  *set puzzle_14_answer \"Entertainment\"\n  *goto teacher_puzzle_finished\n #Intimidating\n  *goto teacher_puzzle_2\n #Sacrifice\n  *goto teacher_puzzle_2\n\n\n*label teacher_puzzle_2\n[i]Wrong, you moron! I sure hope Elena doesn't die, due to your stupidity! Have four more words. Figure out what they have in common![/i]\n\n[i]Sacrificial[/i]\n*line_break\n[i]Intentional[/i]\n*line_break\n[i]Librarian[/i]\n*line_break\n[i]Influential[/i]\n\n[i]What word fits the pattern?[/i]\n\n*choice\n #Library\n  *goto teacher_puzzle_3\n #Generosity\n  *goto teacher_puzzle_3\n #Generous\n  *goto teacher_puzzle_3\n #Education\n  *set puzzle_14_answered true\n  *set puzzle_14_answer \"Education\"\n  *goto teacher_puzzle_finished\n\n\n*label teacher_puzzle_3\n\n[i]Better hope you have the wrong room, because you seem incapable of deciphering the pattern! What do these four words have in common?[/i]\n\n[i]Alligator[/i]\n*line_break\n[i]Binoculars[/i]\n*line_break\n[i]Helicopter[/i]\n*line_break\n[i]Fascinating[/i]\n\n[i]What word fits the pattern?[/i]\n\n*choice\n #Programmer\n  *goto teacher_puzzle_3\n #Society\n  *goto teacher_puzzle_3\n #Exemplary\n  *set puzzle_14_answered true\n  *set puzzle_14_answer \"Exemplary\"\n  *goto teacher_puzzle_finished\n #Anthropology\n  *goto teacher_puzzle_3\n\n\n*label teacher_puzzle_finished\n\"I don't understand that puzzle,\" $!{J_nickname} says.\n\n\"All the words were four syllables long,\" Jessica says, as the door opens. Elena is standing on the other side, hands held up in victorious anticipation, a wide smile on her face. The smile disappears when she sees her rescuers.\n\n\"Who are you?\" she asks, confused.\n\n\"I'm Jessica Moore, the head of the prom committee,\" Jessica says. \"And this is $!{J_first} Take...what was your last name, again?\"\n\n\"Takeuchi,\" $!{J_nickname} says. \"You can call me $!{J_nickname}. That's what everyone else is calling me.\"\n\nElena takes a step backwards. \"Are you working with Smothers?\" she asks suspiciously.\n\nJessica pales. \"Is Smothers the one who kidnapped you?\" she asks.\n\n\"Yes,\" Elena says. \"Vice-Principal Smothers is the kidnapper.\"\n*page_break\n\"Impossible!\" $!{J_nickname} says. \"A teacher would never hurt a student!\"\n\n\"Oh, believe me, it's possible,\" Elena says grimly. She gestures to a set of chairs. \"Here, let's sit and talk. It sounds like we've got a [i]lot[/i] of catching up to do.\"\n\n\"You've got [i]that[/i] right,\" Jessica says. \"$!{J_nickname}, would you mind keeping a watch on the hallway? Let us know if anyone comes into sight.\"\n\n\"That's exactly what I was going to suggest,\" $!{J_nickname} says. $!{J_he} stands where ${J_he} can see the entire hallway, while still being close enough to hear the conversation.\n\n\"It all started when I was named prom queen,\" Elena says. \"Thanks for that, by the way. By the time I got home, I had, like, a thousand messages on my phone.\"\n\n\"The police said you never made it home,\" Jessica says.\n\n\"Then they're wrong,\" Elena says. \"Nobody else was at my home, just me. I was there for about an hour, then I left to meet with Derek.\"\n\n\"Who?\"\n\n\"He's my ex-boyfriend,\" Elena says. \"He was bad news. I guess I should say he [i]is[/i] bad news. He said he heard about the election, and he wanted to talk to me at school. So...I went back to school to talk to him.\"\n\n\"That must be why the police thought you never went home,\" Jessica says. \"They found your car at school and assumed you never left.\"\n\n\"What did Derek want to talk about?\" $!{J_nickname} asks.\n\n*choice\n #He wanted to get back together\n  \"Let me guess,\" Jessica says. \"He wanted to get back together with you, now that you're the prom queen.\"\n\n  \"Well...yes,\" Elena says.\n\n  \"I have never met either of you before, but I am fairly confident that is a terrible idea,\" $!{J_nickname} says.\n\n  \"I told him no, okay?\" Elena says. \"I told him there was no way we would ever get back together, and if he contacted me again, I'd call the police.\"\n\n  \"Good for you,\" Jessica says.\n\n  \"He left after that, and I went inside to sort out my feelings,\" Elena says. \"I must have lost track of the time, because the doors were locked by the time I tried to leave. I was about to call for help, when Vice-Principal Smothers attacked me.\"\n\n  *goto teacher_4\n #He wanted to kidnap her\n  \"He tried to kidnap you,\" Jessica says.\n\n  \"No,\" Elena says. \"Derek's stupid, but not [i]that[/i] stupid. He said he wanted to go to prom with me.\"\n\n  \"It sounds like he only said that, because you were picked as prom queen,\" $!{J_nickname} says.\n\n  \"Pretty much,\" Elena says. \"I told him that I would rather go to prom alone than with him, and he got angry.\"\n\n  \"And [i]that's[/i] when he tried to kidnap you?\" Jessica asks.\n\n  \"No, that's when he left,\" Elena says. \"I was still mad, so I went inside to think. I must have lost track of the time, because the doors were locked by the time I tried to leave. I was about to call for help, when Vice-Principal Smothers attacked me.\"\n\n  *goto teacher_4\n\n*label teacher_4\n\"But why? What did he say?\" Jessica asks.\n\n\"He didn't say anything at all,\" Elena says. \"He snuck up on me from behind, then knocked me out. I only know it was him, because I saw his reflection a second or two before he hit me. I'm 90% sure he doesn't know that I saw him.\"\n\n\"Did he say anything afterwards?\" Jessica asks, at the same time $!{J_nickname} asks, \"Is it possible you were mistaken?\"\n\n\"I guess it's possible someone else attacked me,\" Elena says. \"But whoever attacked me was bald. I know [i]that[/i] for certain. And when I woke up, I was in a closet filled with ugly suits. That's a perfect match for Smothers.\"\n\n\"A bald guy with a bad suit sounds like the villain in a low-budget movie,\" Jessica says. \"What happened next?\"\n\n\"I was tied up and gagged,\" Elena says. \"I tried escaping and making noise, but nothing worked. So I sat there and waited for what felt like hours. Then I got knocked out by some kind of weird smoke or something, and I woke up here in the teacher's lounge. I got out of the ropes, and I spent several [i]more[/i] hours waiting here.\"\n\n\"Sounds like the culprit went out of their way to keep their identity a secret from you,\" Jessica says. \"Well, I have a million more questions for you, but that will have to do for now. Let's focus on escaping.\"\n\nHow?\n\n*choice\n #Attack Vice-Principal Smothers\n  \"The three of us should go after Vice-Principal Smothers,\" Jessica says. \"I think if we all attack at once, we have a good chance of defeating him.\"\n\n  \"I'm not gonna be much help,\" Elena says. \"I haven't eaten all day. I've only had water from the faucet.\"\n\n  \"I'm not very good at fighting, either,\" $!{J_nickname} says.\n\n  \"Are you two crazy?\" Jessica asks. \"He's, like, fifty or sixty years older than us! We can take him, easily!\"\n\n  \"Yeah, I think we'd [i]win[/i]. I just don't think we'd win without any injuries,\" Elena says.\n\n  \"Not to mention, Smothers probably has a weapon hidden in his pocket or somewhere,\" $!{J_nickname} says. \"Just in case one of us figured out he's the culprit.\"\n\n  \"Fine. If we're not gonna fight, I say we run and hide,\" Jessica says. \"But let's at least call the police first. Elena, do you have a paper in your pocket?\"\n\n  Elena is surprised at the question and even more surprised to find that she [i]does[/i] have a paper. $!{J_nickname} quickly grabs it and uses it to unlock the cell phone.\n\n  \"How did you know I had a paper in my pocket?\" Elena asks.\n\n  \"Queen Cinderella said so,\" Jessica says.\n\n  \"What?\" Elena asks. \"[i]Cinderella[/i]?\"\n\n  \"That's the name our kidnapper's been using,\" Jessica says.\n\n  \"[i]Our[/i] kidnapper?\" Elena asks. \"I think you should back up and explain things from the beginning.\"\n\n  $!{J_nickname} interrupts. \"The police are on their way,\" $!{J_he} says, handing the phone to Elena. \"They want to talk to you.\" $!{J_he} gives Jessica a pointed look. \"Next time, we should probably try the phone [i]first[/i].\"\n\n  \"Let's hope there [i]isn't[/i] a next time,\" Jessica says.\n\n  *finish\n #Use the phone to call for help\n  \"Crap, I'm an idiot!\" Jessica says. \"The phone! What did it say about Elena?\"\n\n  $!{J_nickname} takes out the phone and reads the message. \"--the door to her room will be locked forever. In her pocket is the code to unlock this phone. If you don't make it, then--\" ${J_he} reads.\n\n  \"Is there a paper in your pocket?\" Jessica asks quickly, but there's no need to ask. Elena is already checking.\n\n  \"Here,\" she says, handing the paper to Jessica. Jessica calls the police immediately.\n\n  \"Is that [i]my[/i] phone?\" Elena asks. \"Where did it come from?\"\n\n  \"We found it in the gym storeroom,\" $!{J_nickname} says. \"The culprit--Smothers--hid it there.\"\n\n  \"And then he hid the password in my pocket?\" Elena asks. \"I already [i]know[/i] what my password is.\"\n\n  \"I don't understand what Smothers was thinking,\" $!{J_nickname} says. \"He's been toying with us, ever since the start.\"\n\n  Jessica hands the phone to Elena. \"They want to talk to you,\" she says. She smiles at $!{J_nickname}. \"I think it's finally going to be over.\"\n\n  *finish\n\n\n*label principal_start\n\"This is a complete waste of time,\" Vice-Principal Smothers says, as he and Jessica head to the principal's office.\n\n\"Oh?\" Jessica says.\n\n\"The intercom switch is obviously not a clue,\" Smothers says. \"The phone is the clue. It was hidden by a puzzle, and it has a note from the kidnapper on it. What more do you kids need?\"\n\n\"At this point, I don't think we can risk overlooking any potential clues, no matter how irrelevant they may seem,\" Jessica says.\n\n\"If I was the culprit, I would leave exactly [i]zero[/i] clues behind,\" Smothers says.\n\n\"Clearly, Queen Cinderella disagrees,\" Jessica says. She gestures down the hallway. \"There's a touchscreen puzzle on every door. I bet her fingerprints are all over this place.\"\n\n\"And that's another thing,\" Smothers says. \"Who has that many touchscreens? It's not normal, I tell you! Give me a good, old-fashioned dial any day of the week!\"\n\nJessica makes a vague comment about how long it must have taken the culprit to set up all the touchscreens, and the conversation ends, as the two of them arrive at the principal's office.\n\nIt took about a minute to get there, so there is little danger of running up against the five minute time limit. Who should solve the puzzle?\n\n*choice\n #Jessica\n  *goto principal_puzzle\n #Smothers\n  \"You can solve the puzzle,\" Jessica says.\n\n  \"Me? No way!\" Smothers says. \"I just finished saying how much I hate these blasted touchscreens! [i]You[/i] can solve it!\"\n\n  \"That makes no sense. The interface doesn't have anything to do with the puzzle itself,\" Jessica says. \"If you had to solve it on a piece of paper, it'd still be the exact same puzzle.\"\n\n  \"Solve the puzzle, or it's detention!\" Vice-Principal Smothers says.\n\n  Okay, whatever. He's clearly being an idiot about this. Jessica decides to ignore him and solve the puzzle herself. But if anyone asks, she's going to say it was [i]her[/i] decision, not his. There's no way Jessica will admit to giving in to Smothers, just because he threw a giant hissy fit over touchscreens.\n\n  *goto principal_puzzle\n\n\n*label principal_puzzle\n[i]Is this it? Is this the room with Elena inside? The only way to learn that is to solve my puzzle![/i]\n\n[i]1. Clover always stays with her brother.[/i]\n*line_break\n[i]2. Ace and Flynn avoid each other, whenever they can. If one is inside, the other is outside.[/i]\n*line_break\n[i]3. Flynn is not Clover's brother.[/i]\n*line_break\n[i]4. Flynn is outside.[/i]\n\n[i]Where is Clover?[/i]\n\n*choice\n #Inside\n  *set puzzle_14_answered true\n  *set puzzle_14_answer \"Inside\"\n  *goto principal_puzzle_finished\n #Outside\n  That's not correct. If Clover is outside, she'd be outside with Flynn, but Flynn is not her brother, and she [i]always[/i] stays with her brother. Perhaps you should try again.\n\n  *goto principal_puzzle\n\n*label principal_puzzle_finished\nThe door beeps and unlocks. Jessica and Smothers both step inside the principal's office. They scan the room quickly.\n\n\"No Elena,\" Jessica says. \"Does anything look out of place to you?\"\n\n\"I haven't exactly memorized the layout of my boss' office,\" Smothers says. \"But I think it's safe to say that no one has been held hostage here, recently. Do you what to try the switch?\"\n\n\"Sure,\" Jessica says. She takes the intercom switch from Smothers and reaches over the principal's desk to reach the intercom. An unfortunate image appears in the glass front of a cupboard, on the other side of the room. Jessica sees Smothers standing behind her, holding his right hand above his head, like he's getting ready to hit something.\n\nWhat should she do?\n\n*choice\n #Dodge left\n  *goto principal_1\n #Dodge right\n  *goto principal_1\n #Stay in place\n  Jessica doesn't have time to react. Smothers smashes her in the back of the head, and she falls unconscious, the latest victim of his kidnapping scheme.\n \n  *finish\n\n*label principal_1\nJessica dodges to the side, and Smothers smashes a sock into the principal's desk. The desk cracks, and she instantly realizes there's a blunt weapon hidden inside the sock.\n\n\"Oops,\" Smothers says. \"You weren't supposed to do that.\"\n\nJessica jumps backwards, as far away from Smothers as possible. \"[i]You're[/i] the kidnapper!\" Jessica says.\n\n\"Congratulations, you're the only one smart enough to have figured it out,\" Smothers says. \"Although, really, is that so much of an accomplishment? You only got it, because you caught me red-handed.\"\n\n\"It's not [i]my[/i] fault you're stupid enough to give yourself away,\" Jessica shoots back.\n\n\"It's sad,\" Smothers says. \"I actually liked you the most, out of the entire prom committee. But you just [i]had[/i] to be the one to figure out my secret.\" Smothers reaches behind him and closes the door to the principal's office. \"There. Now there's no way for you to escape. Might as well give up.\"\n\nWell, this is a bad situation. Jessica probably has enough time to talk to Smothers about one, maybe two things, before he knocks her unconscious.\n*set route_youre_on 0\n\n*goto principal_2\n\n*label principal_2\n*set route_youre_on + 1\n*if route_youre_on = 2\n *goto principal_over\n\nWhat does Jessica ask?\n\n*choice\n *hide_reuse #Where's Elena?\n  \"Where's Elena?\" Jessica asks.\n\n  \"Believe it or not, she's in the teacher's lounge,\" Smothers says. \"She's been there for several hours now.\"\n\n  \"Hours?\" Jessica asks. \"Don't you mean a day?\"\n\n  \"See, that's the funny thing,\" Smothers says. \"Elena wasn't kidnapped. She just ran away from home. Probably overwhelmed by being nominated as prom queen. I found her in the hallways after hours, perfectly safe. If I hadn't done anything, she probably would have returned on her own.\"\n\n  \"You saw she was okay, so you decided to [i]kidnap[/i] her?\" Jessica asks. \"That doesn't make sense!\"\n\n  \"Heh heh,\" Smothers laughs. \"I had already talked to the police at that point. They thought she was kidnapped, so I figured, hey, why not kidnap her for real?\"\n\n  *goto principal_2\n *hide_reuse #Why are you doing this?\n  \"Why are you doing this?\" Jessica asks.\n\n  \"It's nothing personal,\" Smothers says. \"It's just that teenagers have [i]ruined my life[/i], and it's time for them to pay for what they've done to me.\"\n\n  \"Maybe the prom committee got a little out of control sometimes, but this is taking things too far!\" Jessica says.\n\n  \"That's Reason #4 on the list of why I hate teenagers,\" Smothers says. \"You're so self-absorbed. You can't imagine anything going on in the world, which doesn't affect [i]you[/i]. Did you know that the principal is retiring this year?\"\n\n  \"Yes,\" Jessica says. \"They're bringing in someone else to replace her.\"\n\n  \"[i]I[/i] deserve to be principal!\" Smothers says angrily. \"I've spent almost fifty years in this job! You can't possibly know what it's like to be in the second-place position for half a century. So when I got the chance to get revenge on the kids who made my life a hotbed of suffering? I decided to finally take it.\"\n\n  \"Just because you didn't get a job promotion, that's no reason to take things out on us!\" Jessica says.\n\n  *goto principal_2\n *hide_reuse #What happened with Alejandro?\n  \"What happened with Alejandro?\" Jessica asks.\n\n  \"The idiot didn't come to my office, like he was supposed to,\" Smothers says. \"So I went straight to his room and kidnapped him.\"\n\n  \"But you got the wrong person,\" Jessica says.\n\n  \"I [i]was[/i] working under a time limit,\" Smothers says. \"There was barely enough time to get $!{J_nickname} to the gym. That's why ${J_he} was the first out of ${J_his} room. But I suppose it ended up working in my favor. Everyone focused all their suspicion on $!{J_nickname}, the one who wasn't supposed to be there. No one at all thought it was actually me.\"\n\n  *goto principal_2\n *hide_reuse #Why'd you attack the others?\n  \"Why'd you attack the others?\" Jessica asks.\n\n  \"I'm hurt,\" Smothers says. \"You say that like I'm the only person in the world who's ever wanted to smash Bruce in the head with a blunt object.\"\n\n  \"I can sympathize, but there's a pretty big difference between getting mad at Bruce and physically attacking him,\" Jessica says. \"Were you trying to cover your tracks? Did he figure out you're the culprit?\"\n\n  *if chapter_5_knocked_out = \"true\"\n   \"No, of course not,\" Smothers says. \"It was always the plan for half of you to be knocked out, during the room search. It would have been too obvious if I only attacked Steve and Mallory, so I ran across the gym, knocked out $!{first_name} and Bruce, then ran back to the storage room.\"\n\n   *goto I_am_making_a_separate_scene_just_for_one_line\n  *else\n    \"No, of course not,\" Smothers says. \"It was always the plan for half of you to be knocked out, during the room search. It would have been too obvious if I only attacked Steve and Mallory, so I ran across the gym, knocked out the first person I saw, then ran back to the storage room.\"\n\n   *goto I_am_making_a_separate_scene_just_for_one_line\n  *label I_am_making_a_separate_scene_just_for_one_line\n  \"I can't believe no one noticed,\" Jessica says.\n\n  \"Mallory noticed,\" Smothers says. \"That's why I had to knock her unconscious.\"\n\n  \"So, basically, everything you told us about what happened in the storeroom is a total lie,\" Jessica says. \"And you only got away with it, because no one was there to contradict you.\"\n\n  *goto principal_2\n *hide_reuse #What is your plan?\n  \"What is your plan?\" Jessica asks.\n\n  \"I knock you out, then join the others in the teacher's lounge,\" Smothers says. \"The three of us save Elena and look like heroes.\"\n\n  \"Your plan is to [i]save[/i] Elena?\" Jessica ask.\n\n  \"Think about it,\" Smothers says. \"They're not going to accuse Elena's rescuer of being her kidnapper. By setting things up so [i]I'm[/i] the one who saves her, I trick everyone into thinking I'm innocent.\"\n\n  \"And you would have been the [i]only[/i] one to save her, if we hadn't done so well with your dumb puzzle locks,\" Jessica says.\n\n  \"I'm perfectly fine with sharing the glory of saving Elena,\" Smothers says. \"As it is, I'm going to get all the credit. I can see the headlines now! 'Heroic Vice-Principal Saves Kidnapped Prom Queen! ...and two other students were there, too.'\"\n\n  \"And you insisted on coming here to the principal's office as a bluff,\" Jessica says.\n\n  \"It worked, didn't it?\" Smothers asks. \"You'd never know that I knew Elena's location ahead of time.\"\n\n  *goto principal_2\n *hide_reuse #Why are you trying to attack me?\n  \"Why are you trying to attack me?\" Jessica ask.\n\n  \"I need a credible alibi,\" Smothers says. \"If Queen Cinderella attacks while I'm in the principal's office with you, then I can't [i]possibly[/i] be Queen Cinderella, could I?\"\n\n  \"No one's gonna buy that excuse,\" Jessica says. \"Two people go into a room alone. One's attacked, one comes out fine. It'll be obvious to everyone who did it.\"\n\n  \"Normally, you'd be right,\" Smothers says. \"But I didn't attack everyone in the kitchen, did I? It won't seem so strange that Cinderella left someone behind a second time, and quite frankly, it makes more sense that the culprit would go after you, instead of me. You're the easier target.\"\n\n  \"And yet you've had a harder time with me than any of your other victims,\" Jessica says.\n\n  \"Don't get confident,\" Smothers says. \"You got lucky, that's all. Anyone can dodge an attack, if they see it coming. Not anyone can outsmart a criminal mastermind.\"\n\n  \"Sounds like [i]you're[/i] the overconfident one,\" Jessica says.\n\n  *goto principal_2\n\n\n*label principal_over\nJessica throws a book at Smothers' head, hoping to catch him off guard. Smothers smashes it with his weapon.\n\n\"Is that your best strategy?\" Smothers asks. \"Try to attack me while I'm distracted?\"\n\nJessica grimaces. [i]I was actually hoping to distract you long enough, until the others come to save me, but it looks like that's not happening,[/i] she thinks. [i]Time for Plan B: buy them as much time as possible.[/i]\n\nJessica throws another book, and another. And that's all she can do. There are only three books on the principal's desk.\n\n\"Pathetic,\" Smothers says. \"My turn!\"\n\nJessica is not able to fully dodge Smother's attack, and she falls to the ground. She is not able to dodge his second attack at all.\n\n\"Once again, I win,\" Smothers says, with all the confidence of a man who has no idea he's already lost.\n\n*finish\n", "route_3_chapter_10": "[b]Chapter 10[/b]\n\nAnd thus, the kidnapping of the prom queen comes to an end. The police arrive promptly, and the situation is resolved in under a half hour.\n\nSteve and Nancy are arrested. You suspect their relationship is not as solid as they pretend it is, because they both immediately turn on each other.\n\n\"It was all her!\" Steve says. \"[i]She[/i] did the planning!\"\n\n\"It was all him!\" Nancy says. \"[i]He[/i] kidnapped everyone!\"\n\n\"Only because you told me to!\" Steve says.\n\n\"It was a joke, I swear!\" Nancy says. \"I said something like, 'Gee, the only way I'll be prom queen now is if Claudia is kidnapped!', and the crazy psycho went out and did it! You've got to lock him up, because he's dangerous!\"\n\n\"She threatened to dump me if I didn't go along with it,\" Steve says. \"Have you ever been dumped? It's the worst. But now I seriously wish I had never agreed to go out with her in the first place!\"\n\n\"You asked [i]me[/i] out on our first date, you jerk!\" Nancy says.\n\n\"I'm sorry, I didn't mean to forget,\" Steve apologized. \"It's just that it's been a really rough night.\"\n\n\"I understand. I forgive you,\" Nancy says.\n\n\"I forgive you, too,\" Steve says. \"Even if you got me arrested.\"\n\n\"It was [i]not[/i] my fault!\" Nancy cries.\n\nThe police officers later say it was one of the strangest interrogations they had ever done. Fortunately, there is no lack of evidence, and the two teenagers are soon found guilty.\n\n*goto main_menu\n*label main_menu\nWho else do you want to hear about?\n\n*choice\n *hide_reuse #Alejandro\n  *goto Alejandro\n *hide_reuse #Bruce\n  *goto Bruce\n *hide_reuse #Claudia\n  *goto Claudia\n *hide_reuse #Jessica\n  *goto Jessica\n *hide_reuse #$!{J_nickname}\n  *goto Jun\n *hide_reuse #Mallory\n  *goto Mallory\n *hide_reuse #Nancy\n  *goto Nancy\n *hide_reuse #Steve \n  *goto Steve\n *hide_reuse #Vice-Principal Smothers\n  *goto Smothers\n *hide_reuse #No one\n  *goto end\n\n\n*label Alejandro\nThe next Monday, Alejandro quits the prom committee.\n\n\"What do you mean, you [i]quit[/i]?\" Jessica asks.\n\n\"You can't quit!\" Bruce says.\n\n\"I am quitting for my own personal safety,\" Alejandro says.\n\n\"But you're the only one who [i]wasn't[/i] kidnapped,\" you say.\n\n\"And I never will be, as long as I stay as far away as possible from your American proms,\" Alejandro says. \"Besides, it was always weird for me to help plan a prom that I won't be attending. Adios.\"\n\nAlejandro waves as he leaves the room.\n\n\"Well, this is an unqualified disaster,\" Vice-Principal Smothers says. \"With Alejandro and Steve gone, we're down to four prom committee members! I don't know if we can continue under these circumstances!\"\n\n\"No way!\" Mallory says. \"After all I've sacrificed for this prom? I'm going to make sure it goes on, if it's the last thing I do!\"\n\n\"This is only a minor setback,\" Jessica says, pulling out some papers. \"I've got a list of everyone's duties, here. I was going to redistribute all of Steve's duties, since he is...uh...no longer helping. We can take care of Alejandro's duties, too. Anyone want to take over Steve's publicity work?\"\n\nBy the time the meeting is over, all the duties have been reassigned, and prom is still on. Jessica is [i]great[/i] at organizing.\n\n*goto main_menu\n\n*label Bruce\nBruce misses the next two days of school, and he comes back on Friday. His hair is a mess, and he looks like garbage. \"Bruce, are you okay?\" you ask.\n\n\"Whatever,\" Bruce says.\n\n\"No, seriously, you look like you haven't slept all week,\" you say.\n\n\"I haven't,\" Bruce says. \"I keep having nightmares. I know everyone thinks I'm a big tough guy, but I have nightmares too, okay? You try laughing at me, and you'll be sorry!\"\n\n\"I'm not laughing,\" you say. \"I understand. I'm having problems, too.\"\n\n\"Yeah, well, at least [i]you're[/i] not in trouble,\" Bruce says. \"Mr. Smothers gave me detention for the rest of the year! I'll probably miss graduation, because I'll be in the detention hall!\"\n\n\"I'm sure if you ask nicely, Smothers will cancel the detentions,\" you say. \"Just tell him you were under extenuating circumstances, and you didn't mean what you said.\"\n\n\"Nuh uh,\" Bruce says. \"That sounds way too much like an apology, and besides, it's my own personal policy never to be nice to Smothers.\"\n\n\"Did you consider the possibility that Smothers might be having nightmares, too?\" you ask.\n\n\"What's [i]he[/i] got to be scared of?\" Bruce asks.\n\n\"You weren't there for it, but Steve hit Smothers,\" you say. \"Beat him up pretty badly. It's probably going to be a while before he's healed, you know? Smothers [i]is[/i] in his sixties.\"\n\n\"Huh,\" Bruce says. \"Maybe...maybe I should visit him. Not to apologize like a sissy! Just to...see how he's doing.\"\n\n\"That sounds like a great idea,\" you say.\n\n*goto main_menu\n\n*label Claudia\nClaudia immediately resigns her prom queen crown. \"There is [i]no way[/i] I can go to prom,\" she says. \"Not after everything that's happened.\"\n\nWith one prom queen quitting, and another prom queen in jail, that only leaves one choice. Your best friend Elena becomes the prom queen.\n\n*if (gender = \"male\")\n \"Oh, my gosh! Thank you, thank you, [i]thank you[/i]!\" Elena says. She grabs your head and kisses you on the cheek. \"You have no idea how much this means to me!\"\n\n You almost fall over in shock. \"Elena, are you all right?\"\n\n \"I'm [i]better[/i] than all right! I'm great!\" Elena says, practically bouncing for joy. \"The only thing that could make this better is if--wait. Do you want to go to prom with me?\"\n\n \"Excuse me?\" you ask.\n\n \"Oh no! I'm sorry! Forget I said that,\" Elena says. \"I just thought, it'd be better if I had a prom date. If you don't want to, I totally get it. We're friends. I can build up the courage to ask the guy from third period if he--\"\n\n \"I would love to go to prom with you, Elena,\" you say.\n\n \"Eeeeee!\" Elena squeals. \"You won't regret this, $!{first_name}, I promise! We're going to look so cute in our matching outfits!\"\n\n [i]Matching outfits?[/i] you wonder. Maybe this isn't such a good idea after all...\n\n *goto main_menu\n*if (gender = \"female\")\n \"Okay, I don't want to complain--that's great news--but I'd rather win prom queen because people like me, and not because you ran out of other options,\" Elena says.\n\n \"You are [i]not[/i] the last resort,\" you say. \"Smothers wanted to do another vote with some of the other candidates, but I convinced him to give the crown to you.\"\n\n \"You did? You are the best friend ever!\" Elena says. \"How'd you convince Mr. Stickler for the Rules?\"\n\n \"I told him the truth,\" you say. \"You were really scared when Claudia got kidnapped, because you knew it could have been you. Smothers agreed you deserved to be 'compensated for emotional trauma'.\"\n\n \"Hey, [i]you[/i] were the one who was traumatized, not me,\" Elena says. \"Oh, I can't believe it! I get to be prom queen after all! This is so exciting! We [i]have[/i] to go dress shopping together.\"\n\n \"Definitely,\" you agree.\n\n *goto main_menu\n\n*label Jessica\nJessica stops by your locker, three days later. \"Hi,\" she says. \"I have a questionnaire for you.\"\n\n\"A questionnaire?\" you ask.\n\n\"It's about the kidnapping,\" Jessica says. \"I want to make sure we have all the details correct.\"\n\nYou glance over the multiple page questionnaire, which has questions like \"How many times did you incorrectly answer a puzzle?\", \"What items did you find while searching the cafeteria and/or storage room?\" and \"Would the experience have been any different with Alejandro there? Why or why not?\"\n\n\"Um, what is this for, again?\" you ask.\n\n\"I want to have a thorough record, for the police and anyone else who's curious,\" Jessica says. \"I can remember [i]most[/i] of what people said, but I'm pretty terrible at the details. I can't even tell you what color clothes Steve was wearing!\"\n\n\"I don't think that's important,\" you say.\n\n\"But if I compile answers from everyone and analyze them, I can use this for my AP Psychology report!\" Jessica says. \"Mr. Meyers already said I could do a twenty-page essay on our experiences, in lieu of a final exam!\"\n\n\"See, [i]that's[/i] a much better explanation,\" you say. \"After everything you did to keep us safe, I'll gladly answer your questions.\"\n\n\"Thanks, but you did more than me,\" Jessica says. \"All [i]I[/i] did was boss people around. You actually solved puzzles and found things.\"\n\n\"We all played to our strengths,\" you agree.\n\n*goto main_menu\n*label Jun\nYou visit $!{J_nickname} in the building where all the foreign exchange students live. You've never been in here before. It's actually quite nice, although you wouldn't like living so close to school.\n\n\"$!{first_name}! You came to see me!\" $!{J_nickname} says happily.\n\n\"Hi, $!{J_nickname},\" you say. \"I wanted to make sure you were okay, after everything that happened.\"\n\n$!{J_nickname} chuckles. \"Mr. Smothers did the same thing. He told me that kidnapping is not part of the normal exchange student experience, and he tried to convince me to give Franklin High a good review when I leave.\"\n\n\"That sounds like something he would do,\" you say. \"Have you told anyone in Japan about what happened?\"\n\n\"No, are you crazy?\" $!{J_nickname} says. \"If I told my parents, they'd take me back home, right away! And my friends there, they'd think I was making it all up!\"\n\n\"It [i]is[/i] a little hard to believe,\" you say. \"But isn't the school supposed to contact your parents in case of an emergency?\"\n\n\"Yeah. I'm not looking forward to that phone call,\" $!{J_nickname} says. \"But I prefer to think positive. The kidnapping was kind of fun! Like an escape room game, almost. If you ignore the whole possibility of dying, that is.\"\n\n\"That's putting it nicely,\" you say. \"But it wasn't [i]all[/i] bad, right? You got to make new friends.\"\n\n\"I'm glad for that,\" $!{J_nickname} says. \"I'm not good at meeting new people. In fact, Bruce told me that I should...\"\n\n\"Yes?\" you ask.\n\n$!{J_nickname} gulps. \"Never mind,\" $!{J_he} says. \"No matter what, I'm glad we're friends now. You are a good person, $!{first_name}.\"\n\n*goto main_menu\n\n*label Mallory\nMallory cries when she is reunited with her phone. \"I love you so much, my beautiful baby,\" she says.\n\n\"Maybe her head injury is more serious than we thought,\" a police officer says.\n\n\"No, she's normally like this when her phone is taken away from her,\" you say.\n\n\"I am going to find a way to glue my phone to my brain, so I never lose it again,\" Mallory says. \"Do you know how many notifications I missed while I was kidnapped?\"\n\n\"Um...seven?\" you guess.\n\n\"More like seven hundred!\" Mallory says. \"My followers knew right away that something was wrong, when I didn't do my regularly-scheduled posts. They were so worried! I'm pretty sure that's why the police are here. They [i]knew[/i] something terrible happened to me!\"\n\n\"We were already in the area because of the kidnapping,\" the officer says.\n\n\"[i]My[/i] kidnapping!\" Mallory says. \"Now hold on, I have to tell everyone that I'm okay.\"\n\n\"Perhaps you should put your phone away, until we take your statement,\" the officer says.\n\n\"Let's [i]livestream[/i] it!\" Mallory says. \"That'll save lots of time, and I'm sure my followers have questions about what it's like to be a police officer!\"\n\n\"Please put the phone down,\" the police officer says politely.\n\n\"[i]Never again[/i]!\" Mallory shouts.\n\nTwo more police officers rush over, ready for trouble. \"Is there a problem here?\" one asks, reaching for his gun.\n\n\"No problems. It's just Mallory being Mallory,\" you say.\n\n*goto main_menu\n*label Nancy\nNancy claims the entire kidnapping was a \"misunderstanding\".\n\n\"Nobody was seriously hurt, were they?\" she says. \"All I did was make people solve puzzles. It was a fun scavenger hunt. What a great team-building exercise! Now everyone is closer friends than they were before.\"\n\nNancy is very insistent that the entire ordeal was supposed to be a scavenger hunt.\n\n\"See, everyone solves a puzzle, and they go to the cafeteria,\" she says. \"In there, they find a puzzle that leads to the storeroom. In there, they find a puzzle for the English classroom, then the science room. They go from spot to spot, until they find Claudia safe and sound in the teacher's lounge! See? No harm done!\"\n\nNancy's story quickly changes, when she is pressed for more details, like \"why did it happen at night?\" or \"why kidnap people to do the game, if it's just harmless fun?\"\n\n\"Someone left a box for me at my house, with all the school keys and puzzle touchscreens set up,\" Nancy says. \"[i]They're[/i] the real culprit! I'm innocent in all of this. I was just following the culprit's suggestions.\"\n\n\"Who left the box for you?\" you ask.\n\n\"I dunno,\" Nancy says.\n\n\"[i]Why[/i] did they leave the box?\" you ask.\n\n\"I dunno,\" Nancy says. \"Probably to make it easier for me to set up the game. I wouldn't have been able to come up with twenty puzzles on my own! Believe it or not, I don't know how to program touchscreens.\"\n\nNeedless to say, nobody believes that a total stranger just happened to give Nancy everything she needed for a kidnapping scheme. She breaks down crying at this point.\n\n\"No one was supposed to be hurt!\" she says. \"I didn't want to [i]kill[/i] anyone! I just wanted them to try to save Claudia and fail! Is that so wrong? I wanted them to know what true disappointment feels like! You [i]have[/i] to go easy on me! I'm not a bad person!\"\n\nYou doubt that the judge will agree with her assessment.\n\n*goto main_menu\n*label Steve\nYou visit Steve at the jail, later that week.\n\n\"Hi,\" he says. \"You know you're the first person from school who's come to visit me?\"\n\n\"None of the others have come by?\" you ask.\n\n\"Nah, nobody wants to see the guy who kidnapped them,\" Steve says. \"I didn't mean for this to happen, you know? I actually [i]like[/i] everyone on the prom committee! But Nancy insisted she needed my help, and by the time I figured things out, it was too late.\"\n\n\"How did it happen?\" you ask.\n\n\"When Claudia was named as the prom queen, Nancy was furious,\" Steve says. \"She yelled at me so much, I thought she was going to dump me or something. But then she came by later that night and said we needed to kidnap Claudia.\"\n\n\"And you [i]agreed?[/i]\" you ask.\n\n\"No, you don't understand!\" Steve says. \"Nancy and I fake-kidnapped six different girls this year. It's a hazing ritual for new members of the cheerleading squad! We don't [i]actually[/i] kidnap them. We just drive them out of town ten miles and force them to go back home! It's just a harmless prank!\"\n\n\"It sounds wrong to me,\" you say. \"Do the teachers know?\"\n\n\"No, of course not,\" Steve says. \"We'd probably get in trouble, if they did. Nancy said we were going to do the same thing to Claudia, to initiate her as the new prom queen. I know it sounds fishy, but I thought it was okay because we did it before, and I--I know this is stupid--I was happy Nancy wasn't angry with me anymore, so I didn't ask any questions.\"\n\n\"So you're saying Nancy tricked you into kidnapping Claudia,\" you say.\n\n\"All I did was knock Claudia out and load her in the car,\" Steve says. \"Nancy said she'd take it from there. I didn't know she was [i]actually[/i] kidnapping her, until school the next day. I tried to tell myself it was a mistake, maybe something just went wrong with the hazing ritual, but then I saw Nancy.\n\n\"She was...totally nuts,\" Steve says. \"Completely crazy. She wanted me to kidnap everyone else on the prom committee. I said no way, but she threatened to tell the police that I kidnapped Claudia. I couldn't say no!\"\n\nAnd that, more or less, is the story of why Steve helped kidnap everyone, and then moved everyone into place. He claims it was all done on Nancy's orders. You can't help but hope he'll get a reduced sentence [i]if[/i] he's telling the truth.\n\n*goto main_menu\n*label Smothers\nVice-Principal Smothers summons you to his office the next day, at 11:00 AM. When you enter, he is busy writing on a piece of paper. \"Ah, $!{first_name},\" he says. \"It's good to see you again. How are you holding up?\"\n\nYou notice he's stopped calling you by your last name. \"I'm doing well, sir,\" you say. \"Why did you wish to see me?\"\n\n\"I'm meeting with all the prom committee members today,\" Smothers says. \"As Vice-Principal, it is my duty to make sure that all members of the school live up to our high expectations and standards of behavior.\"\n\nYou're not sure what he's talking about. \"Uh...okay,\" you say.\n\n\"As you know, Franklin High School expects its students to behave at all times, even after school hours,\" Smothers says. \"Just like in real life, there are no extenuating circumstances.\"\n\n\"I'm sorry, Vice-Principal Smothers, but where are you going with this?\" you ask.\n\nSmothers hands you a piece of paper. \"Here is a list of all the detentions that you earned last night,\" he says. \"While you did not swear as much as [i]some[/i] of the others, you were still unmannerly at times, and spoke at unacceptably high levels.\"\n\n\"[i]Are you crazy[/i]?\" you ask. \"We were kidnapped, and--\"\n\n\"Yes, that is exactly the kind of shouting you are being punished for,\" Smothers says smoothly. \"I have determined that this comes out to three detentions. Do you wish to dispute any of the charges?\"\n\nYou read the paper more closely. It contains a list of every time you broke a school rule last night, adding up to over ten infractions. Smothers must be taking it easy on you to only give three detentions for this, not that you appreciate the gesture.\n\n\"No,\" you say. If you argue, he's probably going to give you [i]more[/i] detention.\n\n\"Also, I wish to give you this,\" Smothers says. He pulls out some yellow papers that you don't recognize. \"These are certificates of merit, which I have signed and dated. You may turn them in at the dean's office at your leisure.\"\n\n\"Thanks, but I don't need any 'good job' certificates,\" you say.\n\n\"You misunderstand,\" Smothers says. \"This are, ah, 'get-out-of-detention free' cards. You may have one for your excellent work last night, and an additional one for every puzzle you solved.\"\n\nYou take four of the cards, which is more than enough to cancel out your detentions. \"Thank you, sir,\" you say.\n\n\"You're welcome,\" Vice-Principal Smothers says. \"And if you, ah, need me to write a letter of recommendation for college, I would be more than happy to do so.\"\n\nYou smile. Maybe Vice-Principal Smothers isn't as bad as you thought.\n\n*goto main_menu\n\n*label end\n*achieve routethree\n*set evidence_1_found false\n*set evidence_1 \"nothing\"\n*set evidence_2_found false\n*set evidence_2 \"nothing\"\n*set route_youre_on 0\n*set chapter_4_who_is_first \"none\"\n*set chapter_5_what_is_first \"nothing\"\n*set chapter_7_item_looked_at_first \"none\"\n*set route_3_mallory_unconscious false\n*set chapter_5_was_with_bruce_when_Mallory_was_attacked \"false\"\n*set chapter_7_where_to_go \"nowhere\"\n*set chapter_2_you_tell_elena \"false\"\n*set storeroom_back \"none\"\n*set storeroom_door \"none\"\n*set storeroom_side \"none\"\n*set chapter_5_knocked_out false\n\nThe last person to talk about is you. You're doing as well as can be expected, after the kidnapping. The fact that the culprits are in jail makes you feel a [i]lot[/i] better, and everyone is giving you credit for solving most of the culprit's puzzles by yourself. You never expected to get a reputation as the smartest kid in school, but it's actually kind of nice!\n\n*if (end_clue_1 = \"none\")\n *set end_clue_1 \"Anagram\"\n A few days later, you find a strange piece of paper in your locker. On it is written a single word: \"Anagram\".\n\n *goto end_clue_set\n*elseif (end_clue_2 = \"none\") and (end_clue_1 = \"Anagram\")\n A few days later, you find a strange piece of paper in your locker. On it is written a single word: \"Acrostic\". That makes two pieces of paper you've received. \"Anagram\" and \"Acrostic\". What could it mean?\n\n *set end_clue_2 \"Acrostic\"\n *goto end_clue_set\n*elseif (end_clue_3 = \"none\") and (end_clue_2 = \"Acrostic\")\n *set end_clue_3 \"Come see me\"\n *goto_scene final\n*else\n *bug\n\n\n*label end_clue_set\n---\n\nYou've reached the end of the story, but it is not the end of the game! You can go back to the beginning and choose a different prom queen. This results in a whole new storyline with different puzzles and a different culprit. If you play through all the storylines, you get a bonus ending!\n\nBut if this is where you're going to stop, then we'd like to thank you for playing.\n\nWhat do you want to do?\n\n*choice\n #Go back to the beginning\n  *goto_scene chapter_1\n #Finish the game\n  *goto_scene final actual_end\n\n", "route_3_chapter_2": "[b]Chapter 2[/b]\n\n\"Very good,\" Smothers says. \"I will count the ballots and cast the final vote, in case of a tie.\"\n\n\"Because [i]that's[/i] fair,\" Bruce mutters.\n\n\"A three-way tie would be nuts,\" Steve says.\n\nSmothers turns over the first piece of paper. \"One vote for Nancy,\" he says.\n\n\"All right!\" Steve cheers.\n\nYou're pretty sure the vote came from him; it looks like his giant handwriting. It's no surprise he would vote for his girlfriend, but did anyone else vote for her? After all, you didn't.\n\n\"A vote for Claudia,\" Smothers says, and you recognize the handwriting as your own. Hopefully no one else will recognize it, because there'd be awkward questions if Elena ever found out you voted for someone else.\n\nIn your defense, Claudia was the safe choice. She was the only candidate you knew nothing about. No one can accuse you of favoritism in this election!\n\n\"A vote for Elena,\" Smothers says. Nobody in the room reacts, and you're left to wonder who picked your friend.\n\nSmothers pauses for a moment. \"So all three candidates have one vote apiece. This next vote could decide the winner.\" He slows picks it up and reads it.\n*page_break\nVice-Principal Smothers frowns. \"Who put [i]my[/i] name down on the ballot?!\" he yells.\n\nThe entire room bursts into laughter.\n\n\"Oh, you think you're [i]so[/i] funny, Mr. Wilkins!\" Smothers says. \"You're getting detention for that!\"\n\nBruce doesn't even try to deny that he's the one who did it. All he does is laugh harder.\n\n\"Since you're not even [i]trying[/i] to take this seriously, I won't, either,\" Smothers says angrily. He quickly flips over the last two votes. \"The two remaining votes are for Claudia. She wins.\"\n\n\"[i]What[/i]?\" Steve gasps.\n\n\"See for yourself,\" Smothers says. He flashes the votes at everyone for a few seconds, long enough for you to see Claudia's name written twice, but not long enough for you to recognize anyone's handwriting. You can't help but feel surprised. Everyone voted for Claudia, besides for Steve and whoever voted for Elena.\n\nYou look at the other students, trying to figure out who voted for your friend. You know it has to be either Mallory, Jessica or Alejandro. Jessica is wearing her best poker face, while Alejandro looks bored, and Mallory is on her phone. None of them gives any indication that their candidate just lost.\n\nSteve starts berating Bruce for wasting his vote on a joke. Bruce says it doesn't matter, because Nancy wouldn't have won anyway. That just makes Steve angrier, and the two boys start bickering.\n\n\"Stop. Stop! Act like adults for once!\" Smothers says. \"The vote is over, and Claudia won. There will be no more arguments!\"\n\nSteve grunts, and now he looks more worried than angry. He's definitely going to have a hard time explaining the results of the vote to his girlfriend.\n\nSmothers adjusts his tie. \"I wish to remind all of you that the results are top secret. The only person who's allowed to know is the prom queen, and I shall inform her myself.\"\n\n\"Oops,\" Mallory says.\n\n\"Oops? What does 'oops' mean?\" Smothers asks dangerously.\n\n\"Don't worry. I'll delete it before anyone sees...and it's got ten likes already.\"\n\n\"[i]You posted the results on social media[/i]?!\" Smothers gasps. \"Detention for you, too!\"\n\n\"It's not my fault I have a lot of followers!\" Mallory says.\n\n\"Um, it kind of is,\" Bruce says.\n\nYou say...\n\n*if (vague_love_interest != \"Mallory\")\n *choice\n  #\"Give Mallory a break!\"\n   *goto 1_1\n  #Nothing at all\n   *goto 1_3\n*else\n *choice\n  #\"Give Mallory a break!\"\n   *goto 1_1\n  #\"How could you mess up like that?\"\n   *goto 1_2\n  #Nothing at all\n   *goto 1_3\n\n*label 1_1\n\"Give Mallory a break!\" you say. \"The news was going to get out anyway. I wouldn't be surprised if someone was spying on us right now.\"\n\n\"That's ridicu--\" Smothers begins to say, when the door to the room slams shut. A look of horror appears on Smothers' face, and he runs towards the door. He bangs his foot on the side of a desk and falls down.\n\n\"Are you okay?\" Jessica asks.\n\n\"Forget me! STOP THE SPY!\" Smothers yells.\n\n\"I'm on it!\" Steve says. He leaps out of his seat and bolts through the door with astonishing speed. Too bad he never runs that quickly during football games, because otherwise, the team might have won a game this year.\n\n*if (vague_love_interest = \"Mallory\")\n \"Is it just me, or is everyone overreacting?\" Mallory says. \"It's just prom queen.\"\n\n \"I agree,\" you say. \"It's not like we're protecting a big government secret or anything.\"\n\n \"That doesn't excuse [i]spying[/i]!\" Smothers says loudly. \n\n *goto tackle_joke\n*else\n \"Yeesh,\" you say. What is Steve going to do? Tackle the perpetrator?\n\n *goto tackle_joke\n*label tackle_joke\nTwo minutes later, Steve comes back inside the room. \"They got away,\" he said. \"Sorry.\"\n\n\"Great,\" Smothers says. \"Now the entire school will know the results of the vote, and I'll probably get a dozen phone calls from angry parents who want to know why their child wasn't picked.\"\n\nSteve attempts to explain that it's really hard to catch a particular student, when you don't know which student you're looking for, or what direction they went in. Smothers refuses to listen, and he treats the entire prom committee to a ten-minute lecture on responsibility.\n\nLovely.\n*goto 1_4\n\n*label 1_2\n\"How could you mess up like that?\" you ask Mallory. \"This was obviously a secret ballot. You know what 'secret' means, right?\"\n\n\"Excuuuse me,\" Mallory says. \"It can't be [i]that[/i] secret, if Mr. Smothers is showing us people's votes!\"\n\n\"That's Vice-Principal Smothers to you!\" says Mr.--I mean, Vice-Principal--Smothers. \"I have half a mind to kick you off the prom committee right now!\"\n\n\"And who's going to organize the social media campaign, if I'm not here?\" Mallory asks.\n\nUnder his breath, Smothers mutters something about putting up posters. Nobody else is stupid enough to interrupt the angry conversation, and it ends there.\n*goto 1_4\n\n\n*label 1_3\n*if (vague_love_interest = \"Mallory\")\n You decide to say nothing. Your parents always warned you to stay out of trouble, and an angry Vice-Principal definitely counts as trouble.\n\n You feel kind of bad for Mallory, though. She probably wasn't trying to spoil the prom queen decision for everyone.\n\n *goto vague_Mallory_aside\n*else\n You decide to say nothing. Your parents always warned you to stay out of trouble, and an angry Vice-Principal definitely counts as trouble.\n\n *goto vague_Mallory_aside\n*label vague_Mallory_aside\nSmothers chews Mallory out and takes her phone. He attempts to delete her social media apps, but it's pretty obvious he has no idea how to do it. He gives Mallory the phone back, threatening that next time, he'll delete her info \"for real\".\n\nNo one is fooled by this act.\n*goto 1_4\n\n*label 1_4\n*page_break\nVoting for the prom queen was the last item on the agenda, so the prom committee meeting ends shortly after that.\n\nNormally when the meetings end, everyone leaves right away. This time, however, Alejandro is the only one who rushes to leave. Everyone else sticks around for a while.\n\nBruce goes up to the front of the room to talk to Mr. Smothers, while Jessica and Mallory start talking to each other. Steve doesn't talk to anyone. He just pulls out his phone and starts furiously typing out a message.\n\nYou're about to go out the door, when you realize this is a good chance to talk to someone. Who do you want to talk to?\n\n*choice\n #Bruce and Vice-Principal Smothers\n  You approach Bruce and Vice-Principal Smothers. For once, Bruce doesn't appear to be disrespectful.\n\n  \"--how they were picked,\" Bruce says.\n\n  \"All students who wished to be in the running for prom queen had to submit their names in October,\" Smothers says.\n\n  \"That's not what I'm saying,\" Bruce said. \"I bet, like, a hundred girls signed up to be prom queen. How did we get from a list of a hundred candidates to just three?\"\n\n  \"That's confidential information,\" Smothers says.\n\n  \"I knew it,\" Bruce says. \"The teachers picked the final three candidates, didn't they? You're just [i]pretending[/i] the students got to choose.\"\n\n  \"Just because you wasted your vote, it doesn't mean you get to contest the results of the election,\" Smothers says. \"If you wanted someone besides Claudia to win, you should have voted differently.\"\n\n  \"Oh yeah? And what if all six of us voted for someone who wasn't in the final three?\" Bruce asks. \"What if we all voted for Katie Wells or someone else, huh?\"\n\n  \"The school would take that into consideration,\" Smothers says.\n\n  \"You mean they'd ignore what we said and pick the winner themselves,\" Bruce says hotly. He turns to you. \"Can you believe this?\"\n\n  *choice\n   #Agree with Bruce\n    \"It [i]does[/i] seem a little unfair that we weren't brought in, until most of the candidates had been eliminated,\" you say.\n\n    \"And the fact that this was a [i]secret[/i] vote makes the entire thing feel underhanded,\" Bruce says.\n\n    \"Trust me, Mr. Wilkins,\" Vice-Principal Smothers says. \"I have been at this school longer than you have been alive. I honestly do not care enough about the prom queen, in order to sabotage the vote.\"\n\n    \"Prove it,\" Bruce says.\n\n    \"The fact that you are still on the prom committee is proof enough,\" Smothers says.\n\n    He has a point. If Smothers was trying to manipulate the committee's decision, he wouldn't let Bruce vote. In fact, if Smothers had his way, Bruce probably wouldn't have been on the committee to begin with.\n\n    *if (vague_love_interest = \"Bruce\")\n     \"I think you're both right,\" you say. \"I don't think the school is trying to pick the prom queen for us, but there could be a little more...uh, transparency with the voting.\"\n\n    \"This is ridiculous,\" Bruce says. He turns and leaves in a huff.\n\n    *if (gender = \"male\")\n     \"Do [i]you[/i] have any complaints, Mr. $!{last_name}?\" Smothers asks.\n\n    *if (gender = \"female\")\n     \"Do [i]you[/i] have any complaints, Miss $!{last_name}?\" Smothers asks.  \n\n     *goto name_change\n    *label name_change\n    \"Me? No,\" you say.\n\n    \"Then you should probably get back home. School is over for the day,\" Vice-Principal Smother says, making it clear that the conversation is over.\n\n    *goto 2_1\n\n   #Agree with Smothers\n    \"I think Vice-Principal Smothers has a point,\" you say. \"There's only six of us on the committee. If we had to vote on a hundred candidates, we'd only end up with a six-way tie.\"\n\n    \"And keeping the votes a secret?\" Bruce asks. \"What about that? I thought we were voting for the prom queen, not for the next Pope!\"\n\n    \"Yeah, but I know for a fact that Elena knows who's on the prom committee,\" you say. \"I bet Nancy and Claudia do, too. If they knew who everyone voted for, things could get nasty.\"\n\n    \"Exactly,\" Smothers says. \"There have been...incidents, in the past. Keeping the prom queen nomination process a secret is for your own safety, as well as that of your fellow students.\"\n\n    \"Whatever,\" Bruce says. He turns and leaves.\n\n    *if (vague_love_interest = \"Bruce\")\n     \"Bruce!\" you call out, but either he doesn't hear, or doesn't care. He ignores you and keeps walking.\n    \n    Smothers shakes his head. \"This happens every year, without fail,\" he says. \"No matter who the prom queen is, someone is angry about it. If you ask me, we should just save everyone the hassle and stop picking prom queens.\"\n\n    *goto 2_1\n   #Question why Bruce cares so much\n    \"Why do you care so much, Bruce?\" you ask.\n\n    \"I always care about rules and justice!\" Bruce says hotly.\n\n    \"Uh huh,\" you say. \"And [i]how[/i] many detentions have you gotten this year?\"\n\n    \"Fine,\" Bruce says. \"My younger sister was thinking of running for prom queen next year. I wanna make sure the process isn't rigged against her.\"\n\n    You didn't know Bruce had a sister.\n\n    \"Your brotherly concern is touching,\" Vice-Principal Smothers says. \"However, I assure you that Miss Wilkins will be given a fair chance, just like every other candidate. Now, if there are no further questions, I would like to remind both of you that today's meeting is [i]over[/i].\"\n\n    Everyone else has left the room at this point, so you decide to leave, too. Bruce looks like he wants to argue some more, but once you start to leave, he gives up and follows after you.\n\n    *goto 2_1\n\n #Jessica and Mallory\n  You go towards Jessica and Mallory. \"--tell her?\" Jessica asks.\n\n  \"I'm sure she already knows,\" Mallory says.\n\n  \"About the prom queen vote?\" you say.\n\n  \"How'd you know?\" Mallory asks.\n\n  \"It was pretty easy to guess what you were talking about,\" you shrug. \"So, are you both happy with the outcome?\"\n\n  \"Why are [i]you[/i] asking that?\" Jessica asks. \"You're the one who should be disappointed. Your friend lost.\"\n\n  \"Yeah, Elena's going to be really bummed out,\" you say. \"But it sounds like it was a unanimous decision besides for--\"\n\n  \"Oh my gosh!\" Mallory says suddenly. \"Jessica's right! You didn't vote for Elena!\"\n\n  *choice\n   #Admit it\n    \"I...you're right. I didn't vote for her,\" you say. \"How'd you know?\"\n\n    \"Because [i]I[/i] voted for her,\" Mallory says.\n\n    \"Are you sure it's okay to reveal your vote like that?\" you ask.\n\n    \"I guess it doesn't matter now that everyone knows Claudia won,\" Mallory says glumly.\n\n    Jessica shrugs. \"The vote was three to one to one,\" she says. \"It's pretty easy to figure out who voted for who. That's just how the math works out.\"\n\n    \"Please don't tell Elena the truth,\" you say. \"If she finds out I didn't vote for her, she'll be furious.\"\n\n    \"Why didn't you vote for her, then?\" Jessica asks.\n\n    *if (gender = \"male\")\n     \"I didn't want to ruin our friendship,\" you say. \"If she becomes the most popular girl in school, then she won't want to hang out with me anymore. I'll be shoved a online. Gosh. Sorry for accusing you like that.\"\n\n     \"It's no worse than what Elena would say if she found out,\" you say. \"You two aren't going to tell her, right?\"\n\n     Both Mallory and Jessica swear to keep your secret.\n\n     *goto 2_1\n    *else\n     \"She's always been nice to me,\" Mallory says. \"Gosh, $!{first_name}. I never pegged you for the kind of guy who'd vote against his best friend, then lie about it.\"\n\n     \"Yeah, me neither,\" Jessica says. \"Why would you do that?\"\n\n     *if (vague_love_interest = \"Elena\")\n      \"Because I...kind of like her,\" you admit.\n\n      \"So you didn't vote for her? That doesn't make sense,\" Jessica says.\n\n      \"No, it makes perfect sense,\" Mallory says. \"If Elena became prom queen, practically every guy in school would be lining up to ask her out. $!{first_name} wants to make sure she stays single, so he made sure she didn't win.\"\n\n      \"That still seems dumb to me,\" Jessica says. \"If he wants to date her, he should ask her out directly, instead of wimping out and sabotaging other guys.\"\n\n      \"Um, I'm right here...\" you mutter.\n\n      \"Guys are weird like that, sometimes,\" Mallory says. \"Especially if he's known Elena for a long time.\n\n      *goto 2_1\n     *else\n      \"Because...I don't know. I thought it'd be unfair for me to vote for my best friend, so I picked the girl I don't know. Besides, if Elena [i]did[/i] win, she'd probably...want me to go with her.\"\n\n      \"And you don't want to go to prom with your friend?\" Jessica asks.\n\n      \"Oh, no. I'd love to go with Elena, except for the fact that it'd be weird and awkward the whole time,\" you say.\n\n      Mallory checks her phone. \"$!{first_name} is right. He doesn't know Claudia. They're not friends online.\"\n\n      \"Wow,\" Jessica says. \"So you threw away your vote because you didn't want to hurt your friend's feelings, and you ended up electing someone else by mistake.\"\n\n      \"Which is sure to hurt Elena's feelings even more!\" Mallory says.\n\n      \"You two are not exactly making me feel any better about this...\" you say.\n\n      \"We're sorry,\" Jessica says. \"We won't tell anyone. Right, Mallory?\"\n\n      \"I think Elena deserves to know the truth, but fine, I won't tell her,\" Mallory says.\n\n      \"Thank you,\" you say.\n\n      *goto 2_1\n #Steve\n  Steve looks up from his phone as you approach. \"Just broke the bad news to Nancy,\" he said.\n\n  \"Sorry the vote didn't go your way,\" you say.\n\n  \"It's okay,\" he says. \"You voted for your best friend. I get it. It's all the others I'm mad at! How could they vote for Claudia over Nancy?\"\n\n  You wisely decide not to mention that you were one of Claudia's voters. \"I don't know,\" you say honestly. \"I don't know anything about Claudia.\"\n\n  \"She's a nice girl, I guess,\" Steve says. \"Way more into artsy stuff than I am. But now it's gonna be hard to talk to her without feeling weird. I'm pretty sure Nancy won't talk to her again.\"\n\n  \"You don't...[i]have[/i] to tell you girlfriend what happened,\" you say. \"I mean, tell her that Claudia won. Don't give any other details.\"\n\n  \"Yeah, that's impossible,\" Steve says. \"She'd drag the entire story out of me, one way or another. I figure, might as well tell her the truth from the start. You know?\"\n\n  *choice\n   #Try to comfort Steve\n    *if vague_love_interest = \"Steve\"\n     \"I'm sorry you got put in this position,\" you say. \"Maybe Nancy isn't the right girl for you.\"\n\n    *if vague_love_interest != \"Steve\"\n     \"I'm sorry you got put in this position,\" you say. \"Too bad your girlfriend isn't more understanding.\"\n\n    \"No, you're getting the wrong idea,\" Steve says. \"She's a great girl! She's just going to be...disappointed. [i]Super[/i] disappointed.\"\n\n    As if on cue, Steve's phone starts buzzing. You can see Nancy's picture on the screen.\n\n    \"I gotta take this,\" Steve says. \"Later w.\n\n  By the time you get to the fifth email, you've stopped caring. You just copy/paste the same message every single time. Only about half the people respond, so you figure no one noticed your lack of effort.\n\n  *goto 2_2\n #Post online\n  On your social media pages, you post a generic \"congratulations to Claudia Barrett, our new prom queen\" message. You stop getting emails shortly after that, although now you're getting a lot of notifications for comments like \"OMG, really?\" and \"Yay, congrats!\".\n\n  *goto 2_2\n\n*label 2_2\n* * *\n\n[b]Six hours later...[/b]\n\nClaudia takes a swig of her drink and yawns as she puts it down on the table.\n\n\"You're not tired already, are you?\" Bonnie says. \"It's not even ten o'clock yet!\"\n\n\"It's been a busy day!\" Claudia says. \"[i]You[/i] try becoming the most popular girl in school overnight and see if you can stay awake!\"\n\n\"Ha, I wish!\" Bonnie says. \"Seriously, you can't leave early. I bet the guys are going to show up any minute now.\"\n\n\"Nah, I gotta go home,\" Claudia says. She pulls out a bill and tosses it on the table. \"Here's my share of the pizza.\"\n\nBonnie refuses to accept it. \"No way. The food is on me tonight. You deserve it, Queen Claudia the First.\"\n\nClaudia chuckles and waves off her best friend. She shivers slightly, as she heads across the mostly empty parking lot. It's darker than she expected. [i]Must be shadows from the tree[/i], she thinks to herself.\n\nWhen she's about five feet away, she realizes with a start that the dark shape on the side of her car isn't a shadow. It's a person, leaning casually against Claudia's car. It's impossible to tell who it is; they're wearing dark jeans and a hooded jacket. Even though their face isn't visible, Claudia knows exactly where the person is looking: right at her.\n\nWhat should she do?\n\n*choice\n #Go back inside\n  Claudia takes a step backwards, then turns to run back inside.\n\n  \"Wait,\" the person says. \"It's just me!\"\n\n  Claudia stops, upon hearing the familiar voice. \"Sorry,\" she says. \"I thought you were--\"\n\n  \"Some kind of creepy weirdo?\" the other person says. \"I get it. [i]I[/i] wouldn't want to run into some hooded stranger in a parking lot, either. But you don't have to worry about me! I just wanted to say--\"\n\n  Claudia never gets to hear what the other person wanted to say. A second person she didn't notice jumps out from behind the tree and grabs her from behind. Before she can do anything, a rag soaked with chloroform is shoved against her mouth.\n\n  \"Yes, don't worry about me,\" the person says. \"My partner, on the other hand? Shoulda looked out for that. Sweet dreams, Queenie.\"\n  *goto 3_1\n #Confront the stranger\n  \"Can I help you?\" Claudia asks. She casts a quick glance over her shoulder to see if anyone else is around, but no. She is alone.\n\n  The stranger steps towards Claudia, and she resists the urge to jump backwards. The stranger lowers their hood, revealing that they're not actually a stranger at all. It's someone Claudia knows very well.\n\n  \"Sorry to spook you,\" they say. \"I just wanted to congratulate you.\"\n\n  Claudia lets out a sigh of relief. \"Thanks,\" she says. \"But how did you know I would be here?\"\n\n  \"Lucky guess,\" the other person says. \"I thought about going in to talk to you, but I wanted to speak in private. You see, a terrible mistake has been made.\"\n\n  Claudia tries to laugh, to hide her nervousness. Talking in the cold in dark is a little too weird for her. \"A mistake? I don't see what's terrible about me being the prom queen.\"\n\n  \"You don't understand, but you will soon,\" the other person says. \"A lot of terrible things are going to happen.\"\n\n  \"I don't--\" Claudia begins to say, when a hand clamps over her mouth. Caught completely off guard, she quickly falls victim to the chloroform-coated rag.\n\n  \"Terrible things,\" the other person repeats, as Claudia's unconscious body falls to the
