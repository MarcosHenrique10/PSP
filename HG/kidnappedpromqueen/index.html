,\" Jessica says. \"I think the culprit was trying to burn it.\"\n\n\"Why would someone want to burn a pom-pom?\" Steve asks. \"That makes no sense.\"\n\n\"I think the better question is, 'Why does the culprit have a pom-pom in the first place?',\" Bruce says. \"Gee, is there someone in this room who's dating a cheerleader?\"\n\n\"Don't bring Nancy into this!\" Steve says. \"She has nothing to do with this!\"\n\n\"First Mallory is attacked when you're close by, now we find your girlfriend's pom-pom!\" Bruce says. \"You're looking pretty guilty, Steve!\"\n\n\"I swear, I have no idea how this got here!\" Steve says. \"I'm being framed! You gotta believe me!\"\n\nBruce snaps his fingers. \"I got it!\" he says. \"You used your girlfriend's pom-pom to kidnap us, then tried to burn it in the oven to destroy the evidence! But you ran out of time, before you could finish the job!\"\n\n\"I'm sorry, but I have to stop you before you go any further,\" Vice-Principal Smothers says. \"You just said the culprit used [i]a pom-pom[/i] to kidnap seven people. Are you aware of how ludicrous that sounds?\"\n\nBruce looks slightly abashed, but he recovers quickly. \"We know the culprit knocked us out with chloroform,\" he says. \"Maybe the pom-pom was covered with chloroform.\"\n*page_break\n\"Use your brain for once,\" Jessica says. \"Does it [i]smell[/i] like the pom-pom was covered with chloroform?\"\n\n\"I don't know what burnt chloroform smells like,\" Bruce says. \"But it kinda smells like coffee to me.\"\n\n\"It smells exactly like the coffee that we have in the teacher's lounge,\" Smothers says.\n\n\"Maybe this is a clue that we have to go there next,\" you say. \"The pom-pom [i]was[/i] protected by a puzzle, after all. And the teacher's lounge is pretty close to the gym.\"\n\n\"I doubt it,\" Steve says. \"No offense, but that's a pretty big leap in logic. We go to the teacher's lounge because it smells like coffee?\"\n\n\"Perhaps there is something inside the pom-pom,\" $!{J_nickname} says. $!{J_he} takes the pom-pom and shakes it vigorously. A fair amount of ashes fall out, along with a half-burnt slip of paper.\n\nJessica pounces on it. \"[i]This[/i] has to be what the culprit was trying to destroy!\" she says excitedly. \"It's the code to the hallway door! We can use it to leave the room!\"\n\n\"Yes!\" Bruce cheers.\n*if chapter_7_item_looked_at_first = \"pom-pom\"\n *page_break\n \"I think that's all we can get out of the pom-pom,\" you say. \"Let's move on to the key. Are there any markings on it?\"\n\n *goto key\n*else\n *page_break\n *goto items_examined\n\n*label items_examined\n\"Let's not be too hasty,\" Vice-Principal Smothers says. \"Remember, we don't want a repeat of what happened to Mallory. She's lucky she's not dead right now. If we go charging off, we might not be so lucky.\"\n\n\"What should we do?\" $!{J_nickname} asks.\n\n\"Hmmm...\" Jessica says. \"It looks to me like we've got the same situation as we did twenty minutes ago. The culprit is leading us to two different areas: the principal's office and the teacher's lounge.\"\n\n\"So we split up into two groups again?\" Bruce asks.\n\n\"I want to go to the principal's office,\" Steve says.\n\n\"[i]I[/i] should go to the principal's office,\" Smothers says. \"Seeing as I'm the one who's most familiar with the location.\"\n\n\"You're also the one who's most familiar with the teacher's lounge,\" you point out.\n\n\"Well, [i]I'm[/i] not going with Steve,\" Bruce says. \"He's the one who attacked Mallory.\"\n\n\"I did not!\" Steve says angrily.\n\n\"I want to go the office, too,\" Jessica says.\n\n\"We can't [i]all[/i] go to the office,\" you say. \"Doesn't anyone want to go to the teacher's lounge?\"\n\n\"I'll go, if we need someone,\" $!{J_nickname} volunteers.\n\n\"I said I'm not going with Steve, so I'll go with $!{J_nickname},\" Bruce says.\n\nSo that's Bruce and $!{J_nickname} going to the Teacher's Lounge, with Jessica, Steve and Vice-Principal Smothers going to the Principal's Office. Which group do [i]you[/i] want to join?\n\n*choice\n #Bruce and $!{J_nickname} at the Teacher's Lounge\n  *set chapter_7_where_to_go \"teacher's lounge\"\n  \"It's safer if we go in two groups of three,\" you say. \"I'll go to the teacher's lounge.\"\n\n  $!{J_nickname} smiles at you, while Bruce rolls his eyes. \"Whatever,\" he says.\n\n  \"Then it's decided,\" you say. \"Let's go.\"\n\n  *finish\n #Jessica, Steve and Smothers at the Principal's Office\n  *set chapter_7_where_to_go \"principal's office\"\n  \"There's safety in numbers,\" you say. \"I want to go with everyone else. $!{J_nickname}, will you be okay with Bruce?\"\n\n  \"Nobody messes with me,\" Bruce says.\n\n  $!{J_nickname} nods. \"I will be fine, as long as I'm not alone,\" ${J_he} says.\n\n  \"Then it's decided,\" you say. \"Let's go.\"\n\n  *finish\n", "route_3_chapter_8": "[b]Chapter 8[/b]\n\n*if chapter_7_where_to_go = \"teacher's lounge\"\n *goto teacher_start\n*else\n *goto principal_start\n\n*label teacher_start\nWith the decision made, everyone goes to the door that leads to the hallway. \"What's the code?\" Smothers asks.\n\nJessica checks the piece of paper that fell out of the pom-pom. \"Uh...1-1-1-1,\" she says.\n\nSmothers face-palms. \"The kidnapper didn't bother changing the code?\" he asks. \"If I had known that, we could have gotten out of here, much sooner!\"\n\n\"The hallway code is 1-1-1-1?\" Bruce asks. \"Are you [i]serious?[/i]\"\n\n\"I'm not in charge of the codes!\" Vice-Principal Smothers says. \"I would have picked a code that's more difficult to guess, like 1-5-7-9.\"\n\n\"What was that, the year you graduated?\" Bruce taunts.\n\n\"You are going to be in detention for the rest of your life, with [i]that[/i] attitude!\" Smothers says. He unlocks the door and stuffs the lock in his pocket. \"Let's go.\"\n\nTo get to the teacher's lounge, you have to go left from the gym doors, about five feet. To get to the principal's office, you have to go about twenty feet to the right, turn the corner, then continue on for fifty feet.\n\n\"We're being separated again,\" Jessica says. \"I don't like it.\"\n\n\"Yeah,\" you say. If someone gets attacked like Mallory did, there's no way the other group will know about it in time. \"Maybe we shouldn't split up.\"\n\n\"Ooo, yeah, let's all go to the teacher's lounge,\" Steve says. \"I'm sure that's more important than the principal's office, anyway.\"\n\n\"I'm afraid we don't have the luxury of time,\" Smothers says. \"Our kidnapper has been two steps ahead of us, the entire night. Now that we finally have a chance to get the jump on them, we have to take it.\"\n\nYou decide to...\n\n*choice\n #Stick to the original plan\n  *goto 1_1\n #Ask the others to stay\n  *goto 1_2\n\n*label 1_1\n\"You're right,\" you say. \"Good luck!\"\n\nSmothers, Steve and Jessica wish you luck in return, as they go down the hallway. Soon, they are out of sight.\n\n\"Scared?\" Bruce asks.\n\n\"No,\" $!{J_nickname} says. \"I have $!{first_name} here to protect me.\"\n\n\"Gee, thanks,\" you say.\n\n\"Hey! What about me?\" Bruce asks.\n\n\"You'll make a good diversion if the culprit is waiting for us in the teacher's lounge,\" you say.\n\nBruce makes a rude gesture at you and marches towards the teacher's lounge. He stops short of the door and points at the lock. \"We got trouble,\" he says grimly.\n\n\"It's another lock!\" $!{J_nickname} says, and ${J_he}'s right. It's one of the touchscreen locks that you are becoming increasingly familiar with.\n\n*goto 1_3\n\n*label 1_2\n\"Please stay with us,\" you say. \"At least until we know it's safe.\"\n\n\"We should stay with $!{first_name},\" Steve says. \"At least for a little bit.\"\n\nBruce mutters something about how you're a huge wimp.\n\n\"Why don't we compromise?\" $!{J_nickname} says. \"You can at least accompany us to the door.\"\n\n\"Fine,\" Jessica says. \"It'll be quicker to go along, rather than argue about it for ten minutes.\"\n\nAs a group, everyone goes towards the teacher's lounge. Vice-Principal Smothers is the first to notice that the door's lock has been replaced with one of the touchscreens.\n\n\"Aha!\" he says. \"We were right! The culprit deliberately led us to the teacher's lounge!\"\n\n\"No way!\" Bruce says. \"Coffee stains on a pom-pom were a legitimate clue? This is ridiculous!\"\n\n\"Excellent,\" Jessica says. \"Now we know for sure this room should be searched! You three can do that, while we go to the principal's office.\"\n\n\"Aren't you going to stay here and help search?\" you ask.\n\n\"What if the culprit is still inside?\" $!{J_nickname} asks.\n\n\"The culprit can't be inside, if the lock is on the [i]outside[/i] of the door,\" Jessica explains. \"I'm sure you're perfectly safe.\"\n\n\"I agree,\" Smothers says. \"Best of luck! Come join us in the principal's office, as soon as you're done searching!\"\n*page_break\nSteve, Smothers and Jessica say goodbye, and they head down the hallway. Pretty soon, they turn the corner and go out of sight.\n\n*goto 1_3\n*label 1_3\nBruce examines the touchscreen. \"It's another word puzzle,\" he says. \"What is this, spelling class? I'm not solving it.\"\n\n\"English is not my native language,\" $!{J_nickname} says. \"You should solve it, $!{first_name}.\"\n\n\"I'll try...\" you say.\n*goto puzzle\n\n*label puzzle\n[i]What word matches the others on this list?[/i]\n\n[i]•Civic[/i]\n*line_break\n[i]•Solos[/i]\n*line_break\n[i]•Anna[/i]\n*line_break\n[i]•Madam[/i]\n\n*choice\n #Label\n  *goto puzzle_2\n #Level\n  *set puzzle_20_answered true\n  *set puzzle_20_answer \"Level\"\n  *goto puzzle_solved\n #Shovel\n  *goto puzzle_2\n\n*label puzzle_2\n[i]Wrong, you fool! You have two more chances! What word matches the others on this list?[/i]\n\n[i]•Sagas[/i]\n*line_break\n[i]•Racecar[/i]\n*line_break\n[i]•Mirror rim[/i]\n*line_break\n[i]•Kayak[/i]\n\n*choice\n #Love devil\n  *goto puzzle_3\n #Live evil\n  *set puzzle_20_answered true\n  *set puzzle_20_answer \"Live evil\"\n  *goto puzzle_solved\n #Long drivel\n  *goto puzzle_3\n\n*label puzzle_3\n[i]Wrong, wrong, wrong! Last chance! What word matches the others on this list?[/i]\n\n[i]•Won't it, now?[/i]\n*line_break\n[i]•Taco cat[/i]\n*line_break\n[i]•My gym[/i]\n*line_break\n[i]•Don't nod[/i]\n\n*choice\n #Llama mall\n  *set puzzle_20_answered true\n  *set puzzle_20_answer \"Llama mall\"\n  *goto puzzle_solved\n #Constantinople\n  You are about to press the button for \"Constantinople\", when you hesitate. This isn't a time for guessing. You decide to re-read the puzzle.\n\n  *goto puzzle_3\n #Indigo\n  You are about to press the button for \"Indigo\", when you hesitate. This isn't a time for guessing. You decide to re-read the puzzle.\n\n  *goto puzzle_3\n\n*label puzzle_solved\n\"I get it,\" you say. \"The trick was to find the word that's spelled the same forwards and backwards.\"\n\n\"It was clever of you to figure it out,\" $!{J_nickname} says. \"I don't think I could have done it.\"\n\n\"I wouldn't have had the patience to figure it out,\" Bruce says. That's almost a compliment, coming from him.\n\n\"Thanks, you two,\" you say. \"Shall we go in?\"\n\nYou pull open the door to the teacher's lounge and step inside. You flip on the light. The teacher's lounge isn't impressive. It's got a table, some chairs, a sink near some food cabinets, and a mangy old sofa which would be entirely unremarkable if there wasn't a tied-up blonde student lying on top of it.\n\n\"Claudia!\" you cry.\n\nClaudia must have been sleeping, because she awakes with a jolt and rolls over to see you. \"MMMMMMM!\" she cries through a gag.\n\n\"We found her!\" $!{J_nickname} cheers.\n\n\"Don't worry, we're here to save you,\" you say.\n\n\"If you don't count the fact that we've been kidnapped too,\" Bruce says, but he can't hide the happiness in his voice, which takes all the bite out of his sarcastic comment.\n\nYou kneel down by Claudia and take the gag off of her mouth. \"Are you okay?\" you ask.\n\n\"Water,\" Claudia says.\n\n\"I'm on it,\" $!{J_nickname} says. $!{J_he} goes to the cabinets and looks for a glass, then fills it in the sink. While $!{J_nickname} does this, you untie the ropes on Claudia. She sits up weakly, and she eagerly drinks the water when it's offered.\n\n\"Thank you,\" she whispers. \"Who are you? How did you find me?\"\n\n*choice\n #Say who you are\n  *goto 2_1\n #Explain what's been happening\n  *goto 2_2\n\n*label 2_1\nAt first, you're a little surprised that Claudia has no idea who any of you are, but upon further reflection, it makes sense. You didn't know who [i]she[/i] was at the prom committee meeting, $!{J_nickname} is an exchange student, and Bruce...maybe Bruce didn't know who she was, either. After all, he didn't vote for her.\n\nIt's hard to believe that the prom committee meeting was less than three days ago. It feels like it was three [i]weeks[/i] ago, at this point.\n\n\"I'm $!{first_name},\" you say. \"That's $!{J_nickname}, and this is Bruce.\"\n\n\"We're from the prom committee,\" Bruce says. \"So it was our sworn duty to save you, my queen.\"\n\nThat's not exactly the introduction you would have gone for, but you decide not to argue. \"Everyone in school has been in a panic, ever since you were kidnapped,\" you say.\n\n\"Do you have a phone? We have to call the police,\" she says.\n\n\"We don't have phones,\" Bruce says. \"The kidnapper took them.\"\n\n\"The kidnapper?\" Claudia asks.\n\n\"It's a long story,\" $!{J_nickname} says. \"Can you tell us what happened to you?\"\n\n\"It's [i]not[/i] a long story,\" Claudia says. \"I was kidnapped by the crazy cheerleader! Nancy Spier. The one with red hair.\"\n*goto 2_3\n\n\n*label 2_2\n\"I apologize in advance, because this is going to sound nuts,\" you say. \"Everyone on the prom committee was kidnapped today. Even Vice-Principal Smothers.\"\n\n\"The kidnapper knocked us out, then locked us in closets,\" Bruce says. \"They were locked with stupid puzzles.\"\n\n\"It took me [i]forever[/i] to solve mine,\" $!{J_nickname} says.\n\n\"Once everyone solved their puzzles, we found ourselves in the gym,\" you say. \"The kidnapper left the keys for the cafeteria and the storage room, so we split up into two groups and searched the rooms separately.\"\n\n\"I was in the group that searched the cafeteria,\" $!{J_nickname} says. \"Well, it was more like the kitchen, to be honest. Maybe I have the wrong word. Anyway, we found another puzzle, which hid a pom-pom with coffee stains.\"\n\n\"That's how we knew we had to come here and search the teacher's lounge,\" you say. \"Oh, and there was also a paper inside, which gave us to code to get into the hallway.\"\n\n\"I was in the other group,\" Bruce says. \"We were in the storage room, where Mallory found the key to the principal's office. We think the culprit left it there, by accident. Everyone else is checking out the principal's office now.\"\n\n\"That's the short version of what happened,\" you say. \"Any questions?\"\n\nClaudia looks slightly disoriented. \"I don't understand anything you just said,\" she confesses.\n\n\"Neither do we,\" Bruce says. \"Isn't life fun?\"\n\n\"I...it sounds like she moved me here, so you could find me,\" Claudia says. \"And it's all part of some weird game, right?\"\n\n\"Who is 'she'?\" you ask.\n\n\"The kidnapper,\" Claudia says. \"Her name is Nancy Spier. She's captain of the cheerleading squad, or something like that.\"\n*goto 2_3\n\n*label 2_3\n*page_break\n\"Nancy Spier? Steve Steven's girlfriend?\" you ask.\n\nClaudia nods. \"I think they're working together,\" she says. \"Nancy wasn't alone when she kidnapped me. She had a partner who attacked me from behind, while she distracted me.\"\n\nWithout hearing any more details, you have a feeling Claudia's kidnapping story is a lot like everyone else's.\n\n\"When I woke up, I was inside a car,\" Claudia says. \"I was tied up and gagged, so I couldn't move or call for help. Nancy came back for me in the morning--there wasn't any point in trying to disguise herself, since I knew she did it--and she gave me some food. She said I'd have to wait for the others, then I was trapped in the car again.\"\n\n\"You spent the whole day in a car?\" $!{J_nickname} asks.\n\n\"It's not like I had a choice!\" Claudia says. \"I [i]tried[/i] to get out by breaking the windows or something, but I was tied up!\"\n\n\"Hm,\" Bruce says.\n\n\"I don't know how much later it was, when she drove the car somewhere else,\" Claudia says. \"She was talking to someone, but I didn't see who it was. Probably Steve. They took me through the empty school and gave me a chance to use the bathroom. Then they stuffed me in here, and I've been here ever since you three arrived.\"\n\nWhat do you think you should do now?\n\n*choice\n #Warn the others\n  \"We need to warn the others,\" you say. \"I have a feeling they're walking into a trap.\"\n\n  \"I have a feeling [i]this[/i] is a trap,\" $!{J_nickname} says. \"There is no way Nancy would let us find Claudia and live.\"\n\n  Bruce goes to the chairs and picks one up. \"What are you doing?\" you ask.\n\n  \"Getting the heck out of here,\" he says. He throws the chair through the window, and it breaks instantly. \"Claudia gave me the idea.\"\n\n  \"Oh,\" Claudia says.  \n\n  *goto 3\n #Find a way to escape\n  \"We have to find a way to escape,\" you say. \"Maybe there's a key or an emergency phone or--\"\n\n  Bruce picks up a chair and throws it through the window. It breaks with a mighty crash.\n\n  \"Or we could do it the violent way,\" you say, rolling your eyes.\n\n  *goto 3\n\n*label 3\n\"Let's go,\" Bruce says. He goes over to the window and pushes the glass aside to make it safer. \"They said there were cops watching the school tonight, right? Let's get them.\"\n\n\"But the others...\" you say.\n\n\"We'll come back for them with the police,\" Bruce says. \"We have to leave, before Nancy shows up!\"\n\n\"Why are you so sure we're in danger?\" $!{J_nickname} asks.\n\n\"Because she's watching us,\" Bruce says. He points to the ceiling of the room, which has a security camera in the corner. \"Haven't you noticed the cameras in all the rooms we've been in?\"\n\nYou honestly had no idea about the security cameras in the school, but you are not at all surprised to learn your kidnapper has been watching you the entire time. \"Let's run,\" you say.\n\nBruce goes through the window first. You and $!{J_nickname} help get Claudia through, and the two of you follow. Luck must be on your side, because nobody comes to stop you. You just hope the others in the principal's office are equally lucky...\n*finish\n\n\n*label principal_start\nSmothers confidently leads everyone to the door that goes to the hallway. He stands in front of it for a few seconds, then turns around. \"Um...I don't know the code,\" he says.\n\n\"Oh,\" Jessica says. She fishes it out of her pocket. \"It's 2019.\"\n\nSmothers enters in the combination, and the lock comes undone. He stuffs it in his pocket. \"Let's go,\" he says.\n\n\"What about Mallory?\" you ask. Mallory is still lying unconscious on the gym floor, since all of your prior attempts to wake her up have been fruitless.\n\n*choice\n #Take her with you\n  \"$!{first_name}'s right, we can't just [i]leave[/i] her here,\" Jessica says. \"What if the kidnapper comes back?\"\n\n  \"And what, they'd kidnap her?\" Bruce says. \"News flash: we're [i]already[/i] kidnapped! So what if Mallory gets kidnapped again? It's not that different.\"\n\n  \"I hate to abandon her, but I think she's probably safer here,\" Steve says. \"[i]We're[/i] the ones who are in danger.\"\n\n  \"There is also the logistical problem of bringing her along,\" Smothers says. \"We need at least two people to carry her, which leaves us defenseless in case of problems.\"\n\n  \"I agree with $!{first_name},\" $!{J_nickname} says. \"Let's vote.\"\n\n  The vote is a tie, with you, $!{J_nickname} and Jessica voting to bring Mallory. You're pretty sure Mallory would vote to bring herself along as a tiebreaker, but Smothers pulls rank as the Vice-Principal and insists on leaving her.\n\n  \"She's much happier in her dreams than she'd be awake,\" Smothers says.\n  *page_break\n  *goto 4\n #Leave her here\n  \"I know we can't bring her with us, but we should at least move her against a wall or something,\" you say.\n\n  \"Why, you think someone's going to trip over her?\" Bruce asks.\n\n  \"[i]No[/i],\" you say. \"I mean, what if the kidnapper comes back? We shouldn't leave her out in the open.\"\n\n  \"It's probably not gonna matter where Mallory is, if the kidnapper has it out for her,\" Bruce mutters to himself. Smothers and Steve seem to agree with you, and they move Mallory to the side of the gym.\n\n  *goto 4\n*label 4\nAfter that, everyone enters the hallway. To get to the teacher's lounge, you have to go left from the gym doors, about five feet. To get to the principal's office, you have to go about twenty feet to the right, turn the corner, then continue on for fifty feet.\n\n\"I guess this is where we split up,\" you say.\n\n\"Goodbye, $!{first_name},\" $!{J_nickname} says. \"See you soon.\"\n\n\"I like the positive attitude!\" Smothers says. \"Keep it up, and we'll be out of here in no time!\"\n\nHe leads you, Steve and Jessica to the principal's office. \"Is this going to be [i]your[/i] office next year?\" Steve asks. \"With the principal retiring and all?\"\n\n\"Uh...no,\" Smothers says. \"The school board wants to bring in someone from outside to replace her.\"\n\n\"So you're not getting promoted?\" Jessica asks.\n\n\"It was decided that I am, ah, too close to retirement for a promotion,\" Smothers says. \"And no, I don't want to discuss the topic any further.\"\n\nSteve looks like he's on the verge of snickering, while Jessica looks concerned. You feel slightly bad for Smothers. He's spent his whole life working this job, only to miss out on the big promotion to principal when the time finally comes.\n*page_break\n\"Here we are,\" Smothers says. He points to the door, which has a touchpad on the lock. \"It appears to be locked with another puzzle. This must be a sign that we're on the right track.\"\n\n\"Maybe we should go through all the other rooms in the hallway first,\" Steve says. \"Just in case.\"\n\n\"We don't have time for that now,\" Jessica says. \"We're at the locked door. This is clearly the right spot.\"\n\nSteve tries to convince the others to look in a different room, to no avail. You go to the touchscreen and look at the puzzle.\n\n*goto principal_puzzle\n*label principal_puzzle\n\n[i]Eeny, meeny, miny moe, who will be the next to go?[/i]\n*line_break\n[i]$!{first_name}'s gone with Alejandro.[/i]\n*line_break\n[i]Either Smothers or Bruce knocked the other one out.[/i]\n*line_break\n[i]The women left to scream and shout.[/i]\n*line_break\n[i]Steve and Bruce both said goodbye.[/i]\n*line_break\n[i]Who is last, and next to die?[/i]\n\n*choice\n #Alejandro\n  According to the second line, Alejandro is already gone. Try again.\n\n  *goto principal_puzzle\n #Bruce\n  According to the fifth line, Bruce already said goodbye. Try again.\n\n  *goto principal_puzzle\n #$!{first_name}\n  According to the second line, $!{first_name} is already gone. Try again.\n\n  *goto principal_puzzle\n #Jessica\n  According to the fourth line, the women already left. Try again.\n\n  *goto principal_puzzle\n #Mallory\n  According to the fourth line, the women already left. Try again.\n\n  *goto principal_puzzle\n #Smothers\n  *set puzzle_20_answered true\n  *set puzzle_20_answer \"Smothers\"\n  *goto principal_puzzle_done\n #Steve\n  According to the fifth line, Steve already said goodbye. Try again.\n\n  *goto principal_puzzle\n\n*label principal_puzzle_done\nThe touchscreen falls to the floor, revealing the lock to the principal's office. \"Can I have the key?\" you ask Smothers.\n\nAs Smothers reaches into his pocket, Steve shouts, \"No, you can't!\" Steve shoves you aside from behind and tries to steal the key.\n\n\"What on Earth?\" Smothers asks, struggling to free his hand from Steve's grip.\n\n\"Steve, what the wowzers are you--?\" Jessica shouts from behind you. She is cut off by a loud thud. You turn to look, and to your complete shock, Steve's girlfriend Nancy is standing there, holding a large book like a weapon. Jessica's eyes roll up, and she falls to the ground.\n\n\"[i]Nancy[/i]?\" you ask.\n\n\"Surprise!\" she says.\n\nYou instinctively step backwards. Nancy grins evilly and takes two steps forward when Jessica's leg shoots up and trips her. As Nancy falls, you jump at her and shove her down to the ground. Jessica rolls over and helps you push Nancy down.\n\n\"You okay?\" you ask Jessica.\n\n\"No, but I will be soon,\" Jessica says, struggling to keep her grip on Nancy. Nancy makes a failed attempt to grab her book, which only gives you time to slam against her.\n\nSoon, Nancy is now lying face down on the ground, and you are sitting on top of her. You wouldn't win any prizes in a wrestling competition, but at least it's holding her down. Nancy struggles to break free, and you land several punches to the back of her shoulders.\n\n\"Stop, or I'll knock you out,\" you order her.\n\nNancy screams and kicks her legs ferociously, trying to dislodge you. Jessica kicks Nancy directly in the thigh, then jumps on her legs. Nancy stops kicking after that.\n*page_break\nA few feet away, Vice-Principal Smothers is not doing well in the fight against Steve. His face is bloody, and he is staggering. Steve shoves him against the wall.\n\n\"Stop!\" Jessica orders.\n\n\"Oh, wowzers,\" Steve says. \"Nancy, I thought you weren't supposed to come out!\"\n\n\"I was waiting by the door, to knock out the first person who came in!\" Nancy says.\n\n\"Then why did you tell me to make sure no one went in?!\" Steve shouted.\n\n\"You were supposed to attack the survivors!\" Nancy screams. \"While I hit $!{first_name}, you knock out Jessica from behind, and together we get Smothers!\"\n\nSmothers slumps down against the wall. \"You are...working together?\" he asks weakly.\n\nSteve steps towards you and Jessica. \"Let her go,\" he orders. \"Or [i]you're[/i] next.\"\n\n*choice\n #Yes\n  *goto 5_1\n #No\n  *goto 5_2\n\n*label 5_1\n\"We'll let her go, if you let [i]us[/i] go,\" you say.\n\n\"Are you stupid?\" Steve says. \"We can't let you escape! You know too much.\"\n\n\"What if we promise to keep your secret?\" Jessica says.\n\nNancy says something incredibly impolite in response.\n\n\"You're right,\" Jessica says. \"I was gonna go straight to the police. But I can finish things right now. Give me the book, $!{first_name}.\"\n\n\"What are you doing?\" Steve asks.\n\n\"Your stupid girlfriend hit me in the back of the head with this book,\" Jessica says. \"I'm going to return the favor!\"\n\n\"NO!\" Steve shouts.\n\n\"[i]No no no[/i]!\" Nancy screams.\n\n\"You did worse to Mallory!\" Jessica says. \"You deserve to suffer for what you did!\"\n\n\"I surrender! I give up!\" Nancy begs. \"Just please, don't hurt me!\"\n\n\"No!\" Steve gasps.\n\n*goto 5_3\n\n*label 5_2\n\"No,\" you say. \"Leave us alone, or [i]she'll[/i] be next!\"\n\n\"You wouldn't hurt her,\" Steve says.\n\n\"You wanna make that bet?\" Jessica asks. \"You take one step closer, and WHAM! I'll smash Nancy's head flat!\"\n\n\"You touch her, and you won't make it out of here alive,\" Steve promises.\n\n\"There's two of us, and one of you,\" you say. \"No matter who you attack first, the other one is going to run back and get Bruce and $!{J_nickname}. Then it'll be [i]three[/i] against one.\"\n\n\"I wouldn't be surprised if they show up soon, anyway,\" Jessica says. \"We've made more than enough noise to draw their attention.\"\n\n*goto 5_3\n\n*label 5_3\n\"It's over, Steve,\" Nancy says. \"We lost.\"\n*page_break\n\"No! I am [i]not[/i] going to jail for this!\" Steve says. He charges at the two of you. Jessica quickly grabs the heavy book off the ground and throws it at Steve's face. This doesn't stop him, and he tackles her to the ground.\n\nNancy starts to push herself back up, now that Jessica is no longer helping keep her on the ground. You wrap your arm around her neck, praying that you're remembering how to do a sleeper hold correctly.\n\nMaybe your memory is good, or maybe Nancy is too exhausted to fight any more. Either way, it works. Nancy quickly falls to the ground, unconscious.\n\n\"I got her!\" you say.\n\nSteve stops mid-punch to look at Nancy. \"NO!\" he screams. He grabs his head and starts crying. \"It wasn't supposed to be like this...it was all her idea...\"\n\nJessica takes advantage of the distraction to get a safe distance away from Steve. You move towards Smothers, who is still lying against the wall. \"Excellent...work...\" Smothers says.\n\n\"Give up now!\" Jessica orders, but there is no longer any need. Steve is sitting on the ground, shaking.\n\n\"I'll call the police,\" Jessica says.\n\n\"I'll watch Steve,\" you say.\n\nJessica nods at you and ducks into the principal's office. The door has been open, even since Nancy used it. Steve stops crying and looks at the ground sadly.\n\n*choice\n #Ask about Mallory\n  \"Was Nancy the one who hurt Mallory?\" you ask.\n\n  *if chapter_5_what_is_first = \"storeroom\"\n   \"That was me,\" Steve says. \"I screwed up. I screwed up bad.\"\n\n   \"How?\" you ask.\n\n   \"The touchscreens,\" Steve says. \"There are, like, twenty of them. I got a few of them mixed up. No one was supposed to get the one for the key to the principal's office.\"\n\n   \"Because that's where Nancy was hiding,\" you say.\n\n   \"Watching,\" Steve says. \"You know they have security cameras all over the school, right? She was watching everything that happened and sending me messages.\"\n\n   \"How?\" you ask.\n\n   \"Easy, she moved the cameras,\" Steve says. \"Up and down twice means danger, attack. We had a whole system of messages.\"\n\n   *goto 6_1\n  *else\n   \"That was me,\" Steve says. He reaches into his pocket and pulls out a key ring, which he tosses at you. All of the keys have red rubber covers protecting them. \"She recognized the key to the principal's office as one of mine.\"\n\n   \"How?\" you ask.\n\n   \"I guess she's seen my key ring before,\" Steve says. \"I dunno. It was stupid of me to put covers on the keys to the school, in the first place. When Mallory figured out the key belonged to me, she confronted me. Accused me of being the culprit.\"\n\n   \"Well, you [i]are[/i] the kidnapper,\" you say.\n\n   \"I couldn't let her tell the others, so I had to knock her unconscious,\" Steve says. \"I made up a bogus story about the kidnapper showing up. Nobody seemed to question it except Bruce.\"\n\n   *goto 6_1\n #Ask about Nancy\n  \"Has your girlfriend always been this crazy?\" you ask.\n\n  \"Being prom queen is really important to her,\" Steve says.\n\n  \"She kidnapped seven people!\" you say loudly.\n\n  \"Eight,\" Steve says. \"You forgot Claudia. Oh, wait. I guess she technically didn't kidnap me. So make that seven.\"\n\n  \"Kidnapping [i]anyone[/i] because of the prom is crazy,\" you say.\n\n  \"And is it crazy for me to love her?\" Steve asks. \"To do whatever she wants, because I want to be with her?\"\n\n  \"When she wants you to kidnap people, then yeah. You should stop,\" you say. \"This should not be a difficult concept.\"\n\n  *goto 6_1\n #Ask why they were doing this\n  \"Why?\" you ask. \"Why did you do this?\"\n\n  \"Revenge,\" Steve says simply.\n\n  \"Because we picked Claudia as the prom queen instead of Nancy?\" you ask.   \"That's crazy!\"\n\n  \"It was mostly Nancy's idea,\" Steve says. \"She said kidnapping was the only way to make you understand her pain.\"\n\n  \"But why the puzzles? What was [i]that[/i] about?\" you ask.\n\n  \"You know, we didn't expect everyone to make it out, at the beginning?\" Steve says. \"We thought a few people would get tripped up by the puzzles, and they'd be stuck. The survivors would go from room to room, solving puzzle after puzzle, but the puzzles would get more difficult, and one by one, they'd all fail.\"\n\n  So they left the puzzles, just to torture everyone. Too bad they underestimated your puzzle-solving skills.\n\n  \"We messed up, big time,\" Steve says. \"You know there was a key in [i]your[/i] closet, too? You just never noticed it.\"\n\n  \"No way, I searched--\"\n\n  *goto 6_1\n\n*label 6_1\nThe conversation ends, when Jessica steps out of the office. \"The police are on their way,\" she says. \"It's over. It's finally over.\"\n\nSteve slams his fist against the ground.\n\n*finish", "route_3_chapter_9": "[b]Chapter 9[/b]\n\n*if chapter_7_where_to_go = \"teacher's lounge\"\n *goto principal_start\n*else\n *goto teacher_start\n\n*label teacher_start\nOf course, yours is not the only group in the school at the moment. While you, Jessica and Vice-Principal Smothers are stopping the culprits, Bruce and $!{J_nickname} are at the teacher's lounge.\n\n\"Bruce? Can I ask you a question?\" $!{J_nickname} asks.\n\n\"Yeah, whatever,\" Bruce says.\n\n\"Do you think $!{first_name} likes me?\" $!{J_nickname} asks.\n\n\"That question is so loaded, you won't be able to take it through airport security,\" Bruce says. \"Luckily for you, I have a PhD in L-U-V, so I can explain everything.\"\n\n\"L-U-V?\" $!{J_nickname} asks. \"What does--is that even a word?\"\n\n*if gender = \"male\"\n Bruce rolls his eyes. \"It's slang for 'love'. Try to keep up, okay? Now, look. You're a shy chick. I get that. You're in a totally different country, surrounded by strangers and one of them is probably a kidnapper. Definitely not the right place for romance.\"\n\n \"So I should give up?\" $!{J_nickname} asks.\n\n \"I'm coming to that,\" Bruce says. \"Your main problem isn't the kidnapping. It's Elena. You probably don't know this, but $!{first_name} is best friends with a super-hot babe. We're talking [i]prom queen[/i] hot. [i]And[/i] she's available. I bet you ten to one that $!{first_name} would have asked her out, if she won the prom queen vote.\"\n\n \"Oh,\" $!{J_nickname} says. \"There's another woman involved.\"\n\n \"Aw, don't look so bummed out!\" Bruce says. \"You still have a chance, but you gotta act quickly. As soon as we get out of here, you need to ask $!{first_name} to prom. Do it, [i]before[/i] he gets a chance to see Elena again.\"\n\n \"You think that'll work?\" $!{J_nickname} asks.\n\n \"It's your best shot,\" Bruce says. \"The only thing that could make it better is if you're the one who solves the mystery and gets us all out of here. You think $!{first_name}'s gonna turn down the guy who saved her life? No way!\"\n\n *goto 1_1\n*else\n Bruce rolls his eyes. \"It's slang for 'love'. Try to keep up, okay? Now, I don't [i]normally[/i] give away my love secrets, but you seem like a pretty cool dude, and $!{first_name} isn't my type. So here's some free advice: chicks dig danger.\"\n\n \"Danger?\" $!{J_nickname}\n\n \"That's why I've got a motorcycle,\" Bruce says. \"Chicks [i]love it[/i] when I take them riding on my bike. It's terrifying the first time. They get scared they're gonna crash or fall off, especially the way [i]I[/i] drive. They can't get enough of it.\"\n\n \"I don't understand,\" $!{J_nickname} says. \"Why would someone [i]want[/i] to do something terrifying?\"\n\n \"For the same reason people go to see scary movies,\" Bruce says. \"They like it! An element of danger makes things exciting. That's why I act like a bad boy all the time. I'm telling you, chicks dig scary stuff.\"\n\n \"I'm sorry, but I do not think that makes sense,\" $!{J_nickname} says. \"Being kidnapped is scary enough.\"\n\n \"[i]Exactly[/i],\" Bruce says. \"$!{first_name}'s scared right now, and you gotta take advantage of that! If you find a way to get her out of this mess, she'll love you forever!\"\n\n *goto 1_1\n\n\n*label 1_1\nDo you think $!{J_nickname} has a chance for romance?\n\n*choice\n #Yes\n  \"I...yes!\" $!{J_nickname} says. \"I will find a way out of here and save us all! If that doesn't impress $!{first_name}, nothing will!\"\n\n  \"Good plan!\" Bruce says. \"You can start with the puzzle.\"\n\n  *goto puzzle\n #No\n  \"No,\" $!{J_nickname} says. \"$!{first_name} is a genuine person, who won't fall for tricks or manipulation. The best way thing to do is for me to be honest.\"\n\n  \"What? Turning down my amazing love advice?\" Bruce asks.\n\n  \"I thank you very much for trying to help me,\" $!{J_nickname} says. \"But I must do things my own way.\"\n\n  \"Whatever,\" Bruce says. \"If you're [i]going[/i] to ignore me, why don't you make yourself useful and solve that puzzle?\"\n\n  *goto puzzle\n\n*label puzzle\n\"Puzzle?\" $!{J_nickname} asks.\n\n\"Yeah,\" Bruce says, pointing at the door to the teacher's lounge. \"See? It's locked with one of those weirdo puzzle things. If you solve it, I'll make sure to tell $!{first_name}.\"\n\n\"Uh, okay,\" $!{J_nickname} says. Unluckily for $!{J_him}, it's a word puzzle. Solving word puzzles in your native language is hard enough, but solving them in a foreign language? $!{J_nickname} gulps.\n\n[i]What word matches the others on this list?[/i]\n\n[i]•Civic[/i]\n*line_break\n[i]•Solos[/i]\n*line_break\n[i]•Anna[/i]\n*line_break\n[i]•Madam[/i]\n\n*choice\n #Label\n  *goto puzzle_2\n #Level\n  *set puzzle_21_answered true\n  *set puzzle_21_answer \"Level\"\n  *goto puzzle_solved\n #Shovel\n  *goto puzzle_2\n\n*label puzzle_2\n[i]Wrong, you fool! You have two more chances! What word matches the others on this list?[/i]\n\n[i]•Sagas[/i]\n*line_break\n[i]•Racecar[/i]\n*line_break\n[i]•Mirror rim[/i]\n*line_break\n[i]•Kayak[/i]\n\n*choice\n #Love devil\n  *goto puzzle_3\n #Live evil\n  *set puzzle_21_answered true\n  *set puzzle_21_answer \"Live evil\"\n  *goto puzzle_solved\n #Long drivel\n  *goto puzzle_3\n\n*label puzzle_3\n[i]Wrong, wrong, wrong! Last chance! What word matches the others on this list?[/i]\n\n[i]•Won't it, now?[/i]\n*line_break\n[i]•Taco cat[/i]\n*line_break\n[i]•My gym[/i]\n*line_break\n[i]•Don't nod[/i]\n\n*choice\n #Llama mall\n  *set puzzle_21_answered true\n  *set puzzle_21_answer \"Llama mall\"\n  *goto puzzle_solved\n #Constantinople\n  $!{J_nickname} is about to press the button for \"Constantinople\", when $!{J_he} hesitates. This isn't a time for guessing. $!{J_nickname} decides to re-read the puzzle.\n\n  *goto puzzle_3\n #Indigo\n  $!{J_nickname} is about to press the button for \"Indigo\", when $!{J_he} hesitates. This isn't a time for guessing. $!{J_nickname} decides to re-read the puzzle.\n\n  *goto puzzle_3\n\n*label puzzle_solved\n\"That was a mean trick,\" $!{J_nickname} says. \"You have to find the word that's spelled the same forwards and backwards.\"\n\n\"Good job, figuring it out,\" Bruce says. \"I wouldn't have had the patience to solve that one.\" Coming from him, that's almost a compliment.\n\n$!{J_nickname} opens the door to the teacher's lounge and steps inside. $!{J_he} flips on the light. The teacher's lounge isn't impressive. It's got a table, some chairs, a sink near some food cabinets, and a mangy old sofa which would be entirely unremarkable if there wasn't a tied-up blonde student lying on top of it.\n\n\"There's someone in here!\" $!{J_nickname} cries.\n\n\"It's Claudia!\" Bruce says.\n\nClaudia must have been sleeping, because she awakes with a jolt and rolls over to see them. \"MMMMMMM!\" she cries through a gag.\n\n\"Don't worry, I came to save you!\" Bruce says. He kneels down next to Claudia and undoes her gag. \"I didn't let anything get in the way of your safety, not even word puzzles!\"\n\n\"What?\" $!{J_nickname} asks. \"But I was the one who--\"\n\n\"Who are you?\" Claudia asks. Her voice is raspy.\n\nBruce's big smile falls. \"Uh, Bruce Wilkins? From the prom committee?\"\n\n\"I...I don't know who you are,\" Claudia says.\n\n\"She needs water,\" $!{J_nickname} says. \"Could you get her some?\"\n\n\"Yeah, whatever,\" Bruce mutters. He goes to the cabinets and looks for a glass, then fills it in the sink. While he's doing that, $!{J_nickname} unties the ropes on Claudia and helps her sit up on the couch. She eagerly drinks the water when it's offered.\n\n\"Thank you,\" she whispers. \"Who are you? How did you find me?\"\n\n*choice\n #Say who you are\n  *goto 2_1\n #Say how you found her\n  *goto 2_2\n\n*label 2_1\n\"I'm $!{J_first} Takeuchi,\" $!{J_nickname} says. \"I'm a foreign exchange student.\"\n\n\"And like I said, we're from the prom committee,\" Bruce says. \"So it was our sworn duty to save you, my queen.\"\n\n\"More like [i]you're[/i] the reason I was kidnapped in the first place,\" Claudia says. \"If you hadn't elected me as prom queen, none of this would have happened!\"\n\n\"No, it's not like that!\" Bruce says. \"I voted for Smothers, not you! I mean, I'm sure you'll be a great prom queen, but I didn't vote for you directly, so you can't blame [i]me[/i] for--\"\n\n\"Please, now is not the time for that,\" $!{J_nickname} says. \"The entire school has been in a panic, ever since you were kidnapped. I'm glad we found you before it was too late.\"\n\n\"We're not safe yet,\" Bruce says. \"We still have to figure out how to get out of here.\"\n\n\"Out of here?\" Claudia asks. \"Can't we leave the normal way?\"\n\n\"No, we cannot. It's a long story,\" $!{J_nickname} says. \"Can you tell us what happened to you?\"\n\n\"It's [i]not[/i] a long story,\" Claudia says. \"I was kidnapped by the crazy cheerleader! Nancy Spier. The one with red hair.\"\n*goto 2_3\n\n\n*label 2_2\n\"I have a sixth sense for saving people,\" Bruce brags. \"As soon as I heard you were in trouble, I swore to do everything in my power to locate you! I searched the gym, the storeroom, even the cafeteria!\"\n\n\"Um, [i]I[/i] was in the group that searched the cafeteria,\" $!{J_nickname} says.\n\n\"Same difference,\" Bruce says. \"I risked many dangers to find you, and that's no lie. One person in our group was attacked! I'm pretty sure she's still unconscious. Any moment, she's probably going to wake up in the gym and be super confused.\"\n\n\"I know the feeling,\" Claudia says dryly.\n\n\"Bruce is trying to say that whoever kidnapped you left a series of clues and puzzles,\" $!{J_nickname} says. \"They were all most peculiar, but now that we have found you, I am hopeful that things are at an end.\"\n\n\"What do you mean, you [i]hope[/i] things are at an end?\" Bruce asks.\n\n\"We don't know who the culprit is, and we still do not have a way to leave the building,\" $!{J_nickname} says.\n\n\"Wowzers,\" Bruce says. \"You're right.\"\n\n\"I know who the culprit is!\" Claudia says. \"The girl who took me is Nancy Spier. She's captain of the cheerleading squad, or something like that.\"\n*goto 2_3\n\n*label 2_3\n*page_break\n\"Nancy Spier? Steve Steven's girlfriend?\" Bruce asks.\n\nClaudia nods. \"I think they're working together,\" she says. \"Nancy wasn't alone when she kidnapped me. She had a partner who attacked me from behind, while she distracted me.\"\n\n\"That sounds similar to what happened to us,\" $!{J_nickname} says.\n\n\"When I woke up, I was inside a car,\" Claudia says. \"I was tied up and gagged, so I couldn't move or call for help. Nancy came back for me in the morning--there wasn't any point in trying to disguise herself, since I knew she did it--and she gave me some food. She said I'd have to wait for the others, then I was trapped in the car again.\"\n\n\"You spent the whole day in a car?\" $!{J_nickname} asks.\n\n\"It's not like I had a choice!\" Claudia says. \"I [i]tried[/i] to get out by breaking the windows or something, but I was tied up!\"\n\n\"Hm,\" Bruce says.\n\n\"I don't know how much later it was, when she drove the car somewhere else,\" Claudia says. \"She was talking to someone, but I didn't see who it was. Probably Steve. They took me through the empty school and gave me a chance to use the bathroom. Then they stuffed me in here, and I've been here ever since you three arrived.\"\n\nWhat do you think they should do now?\n\n*choice\n #Warn the others\n  \"I think we need to warn the others,\" $!{J_nickname} says. \"I'm worried they are walking into a trap.\"\n\n  \"The others?\" Claudia asks.\n\n  \"$!{first_name}, Vice-Principal Smothers, Jessica and...Steve,\" $!{J_nickname} says. \"Steve! If he is truly working with Nancy, then the others are in danger!\"\n\n  Bruce has picked up a chair at this point, and he is pulling on its legs.\n\n  \"Are you making a weapon?\" $!{J_nickname} asks.\n\n  \"Claudia gave me an idea just now,\" Bruce says. He throws the chair at the window, and it shatters.\n\n  \"That is extremely violent, but it works,\" $!{J_nickname} says.\n\n  *goto 3\n #Find a way to escape\n  \"We have to find a way to escape,\" $!{J_nickname} says. \"Maybe there's a key or an emergency phone or--\"\n\n  Bruce picks up a chair and throws it through the window. It breaks with a mighty crash.\n\n  \"Or you could destroy school property,\" $!{J_nickname} says.\n\n  *goto 3\n*label 3\n\"Let's go,\" Bruce says. He goes over to the window and pushes the glass aside to make it safer. \"They said there were cops watching the school tonight, right? Let's get them.\"\n\n\"But the others...\" $!{J_nickname} says.\n\n\"We'll come back for them with the police,\" Bruce says. \"We have to leave, before Nancy shows up!\"\n\n\"What makes you so sure that she's going to show up?\" Claudia asks. \"It sounds like she's busy with these other people.\"\n\n\"Nancy's probably watching us now,\" Bruce says. He points to the ceiling of the room, which has a security camera in the corner. \"Haven't you noticed the cameras in all the rooms we've been in?\"\n\n\"Oh,\" $!{J_nickname} says. \"The kidnapper has been watching our every move, without our knowledge. That...explains a lot.\"\n\nBruce goes through the window first, to make sure it's safe. He and $!{J_nickname} help get Claudia through, and $!{J_nickname} is last out the building. Safe at last, the three of them rush to get the police.\n*finish\n\n\n\n*label principal_start\nYou don't know it at the time, but the group that's going to the principal's office is the one that's in [i]true[/i] danger. They are walking, unknowingly, into the culprit's lair.\n\n\"Whoa, hey,\" Steve says. \"There are a lot of other rooms in this building.\"\n\n\"Yeah? So?\" Jessica asks.\n\n\"We should search them, too,\" Steve says. \"In fact, let's search every room from here to the office.\"\n\n\"That'll take forever,\" Jessica says.\n\n\"They're probably locked,\" Vice-Principal Smothers says. \"We have the key for the office, so it's only logical to check the office.\"\n\n\"But...but...I have to go to the bathroom!\" Steve says quickly.\n\n\"You should have used the bathroom in the gym when you had the chance,\" Smothers scolds.\n\n\"But I have to go [i]really[/i] bad,\" Steve says.\n\n\"You know, if I didn't know any better, I'd say you're purposely trying to delay us,\" Jessica says. \"What's up?\"\n\nSteve sighs loudly. \"Okay, you're right,\" he says. \"I don't want us to leave Mallory alone in the gym. I'm worried about her.\"\n\nWhat should they do with Mallory?\n\n*choice\n #Take her along\n  \"We should take her along,\" Steve says. \"What if the kidnapper comes back for her?\"\n\n  \"She might be safer in the gym,\" Jessica says. \"There's no one there who can hurt her.\"\n\n  \"Maybe the kidnapper is hiding in one of the closets,\" Steve says. \"I bet that's how they were able to appear and disappear so quickly, when they hit Mallory the first time.\"\n\n  \"While I feel bad for Miss Ramsey's situation, I must point out that there is a logistical problem in moving her,\" Vice-Principal Smothers says. \"We need at least two people to carry her, which leaves us defenseless in case of problems.\"\n\n  *goto 4\n #Leave her behind\n  \"Don't be worried,\" Jessica says. \"She's safer in the gym.\"\n\n  \"But the culprit is probably still there!\" Steve says.\n\n  \"The culprit attacked Mallory to stop her from getting this key,\" Jessica says. \"Therefore, there's something in the principal's office that the culprit doesn't want us to see. Like their hideout!\"\n\n  \"You agree with me, don't you, Mr. Smothers?\" Steve asks. \"We should make Mallory our top priority.\"\n\n  \"That's [i]Vice-Principal[/i] Smothers,\" Smothers says. \"And I believe you both make valid points. While it would be cruel to abandon Miss Ramsey, it would also be foolish not to follow our best hope of stopping the culprit.\"\n\n  *goto 4\n*label 4\n\"We should vote on it,\" Steve says. He is quickly outvoted, 2-to-1.\n\n\"Aw, at least we should leave her a note, so she knows where to find us if she wakes up!\" Steve says.\n\n\"How?\" Smothers asks. \"We don't have any paper!\"\n\n\"We can go back to the storeroom to get paper and pens,\" Steve says. \"It'll only take a few minutes!\"\n\n\"No more delays!\" Smothers says. \"We are going to the principal's office right now!\"\n\nSmothers marches off, with Jessica on his heels. Steve stays back for a bit, before jogging to catch up with them.\n*page_break\n\"Here we are,\" Smothers says. He points to the door, which has a touchpad on the lock. \"It appears to be locked with another puzzle. This must be a sign that we're on the right track. Who wants to solve it?\"\n\n\"I do,\" Jessica says.\n\n*goto principal_puzzle\n*label principal_puzzle\n\n[i]Eeny, meeny, miny, moe, who will be the next to go?[/i]\n*line_break\n[i]$!{first_name}'s gone with Alejandro.[/i]\n*line_break\n[i]Either Smothers or Bruce knocked the other one out.[/i]\n*line_break\n[i]The women left to scream and shout.[/i]\n*line_break\n[i]Steve and Bruce both said goodbye.[/i]\n*line_break\n[i]Who is last, and next to die?[/i]\n\n*choice\n #Alejandro\n  According to the second line, Alejandro is already gone. Try again.\n\n  *goto principal_puzzle\n #Bruce\n  According to the fifth line, Bruce already said goodbye. Try again.\n\n  *goto principal_puzzle\n #$!{first_name}\n  According to the second line, $!{first_name} is already gone. Try again.\n\n  *goto principal_puzzle\n #Jessica\n  According to the fourth line, the women already left. Try again.\n\n  *goto principal_puzzle\n #Mallory\n  According to the fourth line, the women already left. Try again.\n\n  *goto principal_puzzle\n #Smothers\n  *set puzzle_21_answered true\n  *set puzzle_21_answer \"Smothers\"\n  *goto principal_puzzle_done\n #Steve\n  According to the fifth line, Steve already said goodbye. Try again.\n\n  *goto principal_puzzle\n\n*label principal_puzzle_done\nBefore Jessica finishes the puzzle, Steve grabs her from behind and throws her against the door to the office. \"Ow!\" she says. \"Steve, what the wowzers?\"\n\n\"Sorry about this!\" he says.\n\n\"Now see here!\" Smothers says, when Steve nails him with a mighty uppercut.\n\n\"Steve's the kidnapper!\" Jessica gasps.\n\nThe door to the principal's office flies open unexpectedly, smashing against Jessica at top speed. She falls to the ground, in pain.\n\n\"He's not the only one,\" a female voice says cruelly. Steve's girlfriend Nancy steps out of the office. \"Hi, Jessica. I don't think we've met, officially.\"\n\n\"It is not nice to meet you,\" Jessica says. She grabs onto the door handle to pull herself back up, when Nancy slams the door shut. Jessica falls forward to the ground.\n\n\"Oopsies,\" Nancy says. \"Were you using that? Sorry. People can be just so darn inconsiderate sometimes! Like when they pick the wrong prom queen, for example!\"\n\nFor the first time that night, Jessica considers that she might not come out of the situation alive.\n*page_break\nVice-Principal Smothers quickly loses the fist fight against Steve. Perhaps Smothers would have stood a chance, if he wasn't in his sixties, going up against an eighteen-year-old who regularly does weight training. Smothers slumps to the floor and doesn't get up again.\n\n\"Ugh...\" he groans. \"Detention for life...\"\n\nSteve joins up with Nancy, and the two of them stand side-by-side, facing Jessica. \"I kept them out of the office, like I promised,\" he says.\n\n\"That's great, honey,\" Nancy says. \"But you also promised not to give us away.\"\n\n\"I tried to stop them from coming here,\" Steve says. \"There was no way for me to do it, without resorting to violence.\"\n\n\"The important thing is that we're still in control of the situation,\" Nancy says. \"What should we do now?\"\n\n\"I say we knock them both out,\" Steve says. \"I can go running to the other group, and act like a fight broke out between them. Or blame the culprit, like last time.\"\n\n\"Not what I meant,\" Nancy says. \"I mean, what do we do now that they know we're the kidnappers?\"\n\n\"I'm not killing anyone,\" Steve says. \"You promised.\"\n\n\"And I meant it,\" Nancy says. \"But there's no way we can expect them to keep our secret. Once this is over, they'll go straight to the police, and we'll be arrested.\"\n\n\"Not if we frame them,\" Steve says. \"If we make it look like [i]they[/i] did it, the police will think they're lying when they accuse us!\"\n\n\"Genius!\" Nancy says. \"Framing two people can't be much harder than framing one, can it?\"\n\n\"Sorry to break up the party,\" Jessica says. \"But I have some [i]major[/i] questions.\"\n\n*choice\n #How did they do this?\n  \"How did you do this?\" Jessica asks. \"This would probably take [i]weeks[/i] of planning, and you only had one day!\"\n\n  \"Less than a day, actually,\" Nancy says. \"The original plan was to kidnap Claudia, until prom was over. I wasn't expecting to get the rest of you, but the perfect opportunity fell into my lap. The puzzle screens, the school keys, the schedules...\"\n\n  \"Someone gave you schedules?\" Jessica asks, but the two kidnappers ignore her.\n\n  \"I can't believe those schedules were right,\" Steve says, shaking his head. \"Do you [i]always[/i] go to the same coffee shop after school, every Tuesday?\"\n\n  \"I go there after school every day,\" Jessica says.\n\n  \"Predictable people are the easiest to kidnap,\" Nancy says. \"There's no challenge to it, when you know where your victim is going to be at all times. Now Bruce and $!{first_name}, they were surprises...\"\n\n  \"Don't forget Alejandro,\" Steve says. \"I still have no idea where he could be. We'll find out once we get out of here.\"\n\n  *goto 6_1\n #Why did they do this?\n  \"Why did you do this?\" Jessica asks.\n\n  \"Revenge, mostly,\" Nancy says. \"The entire prom committee deserves to suffer, for making the wrong choice! If you had picked me as the prom queen, we wouldn't be having this conversation.\"\n\n  \"I voted for you,\" Steve says loyally. \"And even then, they tried to disqualify me from voting.\"\n\n  \"Life is so terribly cruel,\" Nancy says. \"The way I see it, there are two ways the situation can play out. One, we keep Claudia as our hostage until prom is over. Steve and I get picked as prom queen and king in her place, and we live happily ever after.\"\n\n  \"What's the second possibility?\" Steve asks.\n\n  \"Steve is the hero, who solves all the puzzles and saves Claudia today,\" Nancy says. \"In gratitude, the school makes him prom king, and I still get to be prom queen. Everybody wins!\"\n\n  \"You see? It's foolproof.\" Steve says. \"Why'd you have to interfere with the plan, Jessica? Why didn't you fail your puzzle, like you're supposed to?\"\n\n  \"You planned on having me fail the puzzles?\" Jessica asks.\n\n  \"If you get three wrong answers, you're electrocuted and pass out,\" Nancy says. \"But [i]nobody[/i] failed any puzzles! I was expecting that there would only be one or two people in the final round.\"\n\n  \"That's why I was late, coming out of my closet,\" Steve says. \"I was going to pretend I failed my puzzle, like everyone else. But you all solved it!\"\n\n  \"How can you be so smart with puzzles, and so stupid when it comes to picking prom queens?!\" Nancy asks.\n  *goto 6_1\n\n #Framing two people\n  \"What do you mean, framing two people can't be much harder than framing one?\" Jessica asks.\n\n  \"I was hoping not to frame anyone tonight, to be honest,\" Nancy says. \"You would all fail in your little adventure to save the prom queen, and no one would ever know who the culprit is.\"\n\n  \"An unsolved mystery,\" Steve says.\n\n  \"Yeah, but I'm not stupid,\" Nancy says. \"I need someone to take the fall for me, in case there are any problems. I was going to frame Alejandro, but, well, he's not here.\"\n\n  \"I still don't see why we can't frame him,\" Steve says. \"He's the only prom committee member who's not here! That should make him the prime suspect.\"\n\n  \"It'd be easier to frame Jessica and Smothers,\" Nancy says. \"After all, I'm sure they left DNA evidence, all over the place. We don't even have to [i]try[/i] to prove they were here!\"\n\n  *goto 6_1\n\n\n*label 6_1\n*page_break\n\"Enough talk,\" Nancy says. \"We have to take care of Jessica, now.\"\n\n\"One last question,\" Jessica says. \"What about Mallory?\"\n\nSteve shrugs. \"She got the key to the principal's office by accident. I tried to knock her out to cover up my tracks, but it didn't work.\"\n\n\"So you [i]hit her on the head from behind[/i]?\" Jessica asks pointedly.\n\n\"Yeah, she's taking a little nap now,\" Steve says. \"What's the big deal? She'll wake up in an hour or so. Of course, she'll have a killer headache, but she'll be fine.\"\n\n\"She could have a concussion!\" Jessica says. \"And so will you!\"\n\n\"What?\" Steve asks. Two seconds later, Mallory smashes him in the back of the head. Steve crumples to the ground, unconscious.\n\n\"See how much [i]you[/i] like it!\" Mallory says, putting her weapon down. \"Good thing they didn't clear out any of the sports equipment in the gym, huh?\"\n\n\"Good thing Steve didn't remember how long people normally stay unconscious,\" Jessica says.\n\n\"No!\" Nancy screams. \"[b]Noooo[/b]!\"\n\n\"You want me to hit you, too?\" Mallory asks. \"Because from what I heard, you are just as guilty as your loser boyfriend.\"\n\nNancy keeps screaming.\n\n\"Watch her,\" Jessica says. \"I'm going to use the phone in the principal's office to call the police.\"\n\n\"Sounds like a plan,\" Mallory says. \"And hey, thanks for distracting them for me.\"\n\n\"It was nothing,\" Jessica says. \"I was trying to trick them into monologuing, to waste time until the other group came back. Good thing you returned first.\"\n\n*finish\n", "screenshots": "*set first_name \"Akimi\"\n*set last_name \"Karashi\"\n*set evidence_1_found \"true\"\n*set evidence_1 \"paper clip\"\n*set evidence_2_found \"false\"\n*set end_clue_1 \"none\"\n*set end_clue_2 \"none\"\n*set end_clue_3 \"none\"\n*set puzzle_1_answered \"true\"\n*set puzzle_1_answer \"Hercules\"\n*set puzzle_2_answered \"true\"\n*set puzzle_2_answer \"Soda can\"\n*set puzzle_3_answered \"true\"\n*set puzzle_3_answer \"Intriguing\"\n*set puzzle_4_answered \"false\"\n*set puzzle_5_answered \"false\"\n\n[b]Chapter 3[/b]\n\n\"9-1-1. What's your emergency?\" the operator asks.\n\n\"Hello, I think...I think I, uh...\" you say.\n\n\"We just heard someone get attacked, and we're calling to report it,\" Elena says, in a business-like voice.\n\n\"An attack?\"\n\n\"Yeah,\" you say. You take a breath and start talking. \"I was on the phone with Nancy Spier just now. She said she thought someone else was in her house, and then she screamed. It sounded like she was fighting with someone, and then the line went dead. She could be in danger!\"\n\n\"Please, calm down,\" the 9-1-1 operator says. \"Did you call her back to see if she was okay?\"\n\n\"No, I called you right away,\" you say.\n\n\"Do you have her phone number or address?\"\n\n\"Just the phone number,\" you say. You don't have Nancy's number memorized, obviously, but you pull it up on the phone and read it off.\n\n\"Thank you. We'll send someone to check on her,\" the operator says. \"You said you heard her fighting someone. Did you actually [i]hear[/i] another person?\"\n\nYou look at Elena. \"I just heard the phone being dropped and some scuffling sounds.\"\n\n\"I heard a grunt,\" Elena says. \"I don't know who it was, though. It could have been Nancy or someone else.\"\n \n\"And can I have your names, please?\" the operator asks.\n\nThe two of you give the operator your names and basic contact information.\n\n\"Am I correct in assuming all three of you are teenagers?\" asks the operator. \"At Franklin High?\"\n\n\"Yes...\" you say skeptically. \"Why?\"\n\n\"We've had some trouble with juveniles there, this year,\" the operator says. \"Two months ago, one of the sports teams thought it would be a hilarious prank, to pretend to kidnap people. We got over a dozen false emergency calls, as a result. Maybe this is a part of that.\"\n\n*fake_choice\n #This isn't a joke.\n #Maybe...\n\n\n*set first_name \"Ned\"\n*set last_name \"Gray\"\n*set evidence_1_found \"true\"\n*set evidence_1 \"newspaper clipping\"\n*set end_clue_1 \"none\"\n*set end_clue_2 \"none\"\n*set end_clue_3 \"none\"\n*set puzzle_1_answered \"true\"\n*set puzzle_1_answer \"Alone\"\n*set puzzle_2_answered \"true\"\n*set puzzle_2_answer \"Ghost\"\n*set puzzle_3_answered \"true\"\n\"We should all stick together,\" you say. \"There's safety in numbers.\"\n\n\"We certainly shouldn't let anyone wander off by themselves,\" Jessica agrees. \"Let's put it to a vote. Who thinks we should stay as a group of seven?\"\n\nBoth you and Smothers raise your hands, but no one else does.\n\n\"Two votes for staying together, five votes for splitting up,\" Jessica says. \"We'll have a group of three and a group of four. Who wants to be in what group?\"\n\n\"I don't want to be with you,\" Bruce says quickly.\n\n\"You are [i]so[/i] immature,\" she responds.\n\n\"I want to go to the storage area,\" Steve says.\n\n\"I've been inside the cafeteria before, so I should probably go there,\" Junshi says.\n\n\"I want to be with Smothers, if possible,\" Jessica says.\n\n\"Whoa, hold on,\" you say. Keeping track of everyone's requests is starting to feel like another puzzle! \"Let's make this simple. Who wants to search the cafeteria?\"\n\nJunshi, Smothers and Jessica raise their hands.\n\n\"And who wants to search the storeroom?\"\n\nSteve, Mallory and Bruce raise their hands.\n\n\"What about you?\" Junshi asks.\n\nYou realize you forgot to vote yourself. You want to search...\n\n*fake_choice\n #In the cafeteria with Junshi, Smothers and Jessica\n #In the storeroom with Steve, Mallory and Bruce\n\n\n\n*set first_name \"Alfred\"\n*set last_name \"Wayne\"\n*set evidence_1_found \"true\"\n*set evidence_1 \"loudspeaker\"\n*set evidence_2_found \"true\"\n*set evidence_2_found \"phone\"\n*set end_clue_1 \"Anagram\"\n*set end_clue_2 \"Acrostic\"\n*set puzzle_1_answered \"true\"\n*set puzzle_1_answer \"Midsummer Night's Dream\"\n*set puzzle_2_answered \"true\"\n*set puzzle_2_answer \"Ninteen Twenty-Nine\"\n*set puzzle_3_answered \"true\"\n*set puzzle_3_answer \"Apostrophe\"\n*set puzzle_4_answered \"true\"\n*set puzzle_4_answer \"Fourth\"\n*set puzzle_5_answered \"true\"\n*set puzzle_5_answer \"Stage\"\n*set puzzle_6_answered \"true\"\n*set puzzle_6_answer \"Auditorium\"\n\nElena and the others cautiously approach the door, hoping that it isn't booby-trapped. While it's not trapped in the traditional sense, it [i]is[/i] locked with a puzzle and another note from the kidnapper.\n\n[i]Good, you can follow directions. That will make things easier for you![/i]\n\n[i]There are two special items for you, hidden inside this room. Can you find them within ten minutes? If you're not out of the room by then, this door will lock automatically, trapping everyone inside. I wonder how many people will be caught unaware [b]this[/i] time?[/i]\n\n[i]No. I wonder if you'll even be able to [b]enter[/b] the room in time! This puzzle is particularly tricky! Here are the rules. Read carefully, then answer the question, if you can![/i]\n\n[i]1. Four students each bought a textbook. One cost $20,000, and one cost $30,000.[/i]\n*line_break\n[i]2. Beatrice spent half as much as Mason.[/i]\n*line_break\n[i]3. Beatrice spent twice as much as Ingrid.[/i]\n*line_break\n[i]4. The price of all the textbooks, put together, is $100,000. No two students spent the same amount of money.[/i]\n*line_break\n[i]5. The price of Ingrid's textbook, plus the price of Beatrice's textbook, equaled the price of Andy's textbook.[/i]\n*line_break\n\n[i]Who bought the $10,000 textbook?[/i]\n\n*fake_choice\n #Mason\n #Ingrid\n #Andy\n #Beatrice\n\n\n\n\n*set first_name \"Victoria\"\n*set last_name \"Butler\"\n*set evidence_1_found \"true\"\n*set evidence_1 \"fingerprints\"\n*set evidence_2_found \"false\"\n*set end_clue_1 \"notebook\"\n*set end_clue_2 \"none\"\n*set end_clue_3 \"none\"\n*set puzzle_1_answered \"true\"\n*set puzzle_1_answer \"Helium\"\n*set puzzle_2_answered \"true\"\n*set puzzle_2_answer \"Danger\"\n*set puzzle_3_answered \"true\"\n*set puzzle_3_answer \"Copper\"\n*set puzzle_4_answered \"true\"\n*set puzzle_4_answer \"Freshman\"\n*set puzzle_5_answered \"true\"\nVice-Principal Smothers frowns. \"Who put [i]my[/i] name down on the ballot?!\" he yells.\n\nThe entire room bursts into laughter.\n\n\"Oh, you think you're [i]so[/i] funny, Mr. Wilkins!\" Smothers says. \"You're getting detention for that!\"\n\nBruce doesn't even try to deny that he's the one who did it. All he does is laugh harder.\n\n\"Since you're not even [i]trying[/i] to take this seriously, I won't, either,\" Smothers says angrily. He quickly flips over the last two votes. \"The two remaining votes are for Claudia. She wins.\"\n\n\"[i]What[/i]?\" Steve gasps.\n\n\"See for yourself,\" Smothers says. He flashes the votes at everyone for a few seconds, long enough for you to see Claudia's name written twice, but not long enough for you to recognize anyone's handwriting. You can't help but feel surprised. Everyone voted for Claudia, besides for Steve and whoever voted for Elena.\n\nYou look at the other students, trying to figure out who voted for your friend. You know it has to be either Mallory, Jessica or Alejandro. Jessica is wearing her best poker face, while Alejandro looks bored, and Mallory is on her phone. None of them gives any indication that their candidate just lost.\n\nSteve starts berating Bruce for wasting his vote on a joke. Bruce says it doesn't matter, because Nancy wouldn't have won anyway. That just makes Steve angrier, and the two boys start bickering.\n\n\"Stop. Stop! Act like adults for once!\" Smothers says. \"The vote is over, and Claudia won. There will be no more arguments!\"\n\nSteve grunts, and now he looks more worried than angry. He's definitely going to have a hard time explaining the results of the vote to his girlfriend.\n\nSmothers adjusts his tie. \"I wish to remind all of you that the results are top secret. The only person who's allowed to know is the prom queen, and I shall inform her myself.\"\n\n\"Oops,\" Mallory says.\n\n\"Oops? What does 'oops' mean?\" Smothers asks dangerously.\n*page_break\n\n\n\n*set first_name \"Andy\"\n*set last_name \"Carson\"\n*set evidence_1_found \"true\"\n*set evidence_2_found \"true\"\n*set evidence_1 \"drawing\"\n*set evidence_2 \"pencil\"\n*set end_clue_1 \"phone number\"\n*set end_clue_2 \"blurry photograph\"\n*set puzzle_1_answered \"true\"\n*set puzzle_1_answer \"Taco cat\"\n*set puzzle_2_answered \"true\"\n*set puzzle_2_answer \"Parade\"\n*set puzzle_3_answered \"true\"\n*set puzzle_3_answer \"Outside\"\n*set puzzle_4_answered \"true\"\n*set puzzle_4_answer \"Understanding\"\n*set puzzle_5_answered \"true\"\n*set puzzle_5_answer \"Merchant of Venice\"\n*set puzzle_6_answered \"true\"\n*set puzzle_6_answer \"Jason and the Argonauts\"\n\n\"You think one of [i]us[/i] is the kidnapper?\" Mallory asks. \"No way, we're the victims!\"\n\n\"Sorry, but I'm not about to trust a bunch of near-strangers about my kidnapping,\" Claudia says. \"How do I know this isn't some kind of stupid prank?\"\n\n\"This is serious,\" Jessica says. \"We just heard Vice-Principal Smothers get attacked.\"\n\n\"The bald guy? What does [i]he[/i] have to do with this?\" Claudia asks.\n\n\"He's in charge of the prom committee,\" Jessica says. \"Well, technically, he's the prom advisor, but he can veto any--\"\n\n\"AAAAAAUGH!\" a voice screams.\n\n\"It came from there!\" Jessica says, pointing at one of the three closed doors.\n\n\"That was Alejandro!\" Bruce says.\n\nClaudia's eyes are wide. \"Did he just...I mean...is he okay?\" she gasps.\n\n\"The only way to find out is to go along with this weird game,\" Elena says. She gestures towards the final closed door. \"That's the last door. Only one person left.\"\n\n\"But is Nancy really--?\" Claudia begins to say. She falls silent as there is a beep, and the door opens by itself.\n*page_break End Chapter\n\n\n*set first_name \"Katie\"\n*set last_name \"Drew\"\n*set evidence_1_found \"true\"\n*set evidence_2_found \"false\"\n*set evidence_1 \"magnifying glass\"\n*set evidence_2 \"false\"\n*set end_clue_1 \"none\"\n*set end_clue_2 \"none\"\n*set end_clue_3 \"none\"\n*set puzzle_1_answered \"true\"\n*set puzzle_1_answer \"Radon\"\n*set puzzle_2_answered \"true\"\n*set puzzle_2_answer \"Adams\"\n*set puzzle_3_answered \"true\"\n*set puzzle_3_answer \"Fourteen\"\n\n[b]Chapter 3[/b]\n\nThe teachers strongly recommend that no student should go home alone. \"If at all possible, take the bus or carpool,\" Mrs. Kim, your English teacher, says. \"If you're alone, that could put you in possible danger.\"\n\n\"Why?\" Bruce asks. \"The kidnapping took place at night, not during the afternoon!\"\n\n\"That is irrelevant,\" Mrs. Kim says. \"If you are not concerned for your own safety, I can always call your mother and arrange to have [i]her[/i] pick you up.\"\n\nBruce slumps in his seat and mutters something to himself.\n\n\"So it [i]is[/i] a kidnapping? It's official?\" another student asks.\n\n\"We are studying Shakespeare right now, not current events,\" Mrs. Kim says. \"Let's return to the order his plays were written in. The chronology is not agreed upon by all scholars, but most believe--\"\n\nYou stop paying attention at that point. How can you focus on some dead guy's bibliography? You're more concerned with the fact that Mrs. Kim  didn't deny it was a real kidnapping.\n\nOnce classes are over, you go to Elena's locker. She's talking to Nancy and looking nervous.\n\n\"--Could have been either of us!\" Elena says.\n\n\"It [i]should[/i] have been me,\" Nancy says. Seeing the look on Elena's face, Nancy immediately stops. \"No, I didn't mean it like that! I meant, [i]I[/i] should have been prom queen, not Claudia!\"\n\n\"I can't believe you'd say something like that!\" Elena says.\n\n*fake_choice\n #Agree with Elena\n #Come to Nancy's defense\n", "startup": "*title The Kidnapped Prom Queen\n*author Michael Gray\n*scene_list\n  startup\n  chapter_1\n  $ route_1_chapter_2\n  $ route_1_chapter_3  \n  $ route_1_chapter_4  \n  $ route_1_chapter_5  \n  $ route_1_chapter_6  \n  $ route_1_chapter_7  \n  $ route_1_chapter_8  \n  $ route_1_chapter_9  \n  $ route_1_chapter_10\n  $ route_2_chapter_2  \n  $ route_2_chapter_3  \n  $ route_2_chapter_4  \n  $ route_2_chapter_5  \n  $ route_2_chapter_6  \n  $ route_2_chapter_7  \n  $ route_2_chapter_8  \n  $ route_2_chapter_9  \n  $ route_2_chapter_10\n  $ route_3_chapter_2  \n  $ route_3_chapter_3  \n  $ route_3_chapter_4  \n  $ route_3_chapter_5  \n  $ route_3_chapter_6  \n  $ route_3_chapter_7  \n  $ route_3_chapter_8  \n  $ route_3_chapter_9  \n  $ route_3_chapter_10\n  $ final\n\n*create gender \"male\"\n*create J_first \"Junshi\"\n*create J_he \"she\"\n*create J_him \"her\"\n*create J_his \"her\"\n*create J_nickname \"J-dogg\"\n*create vague_love_interest \"Elena\"\n*create route_youre_on 0\n*create first_name \"Akimi\"\n*create last_name \"Karashi\"
