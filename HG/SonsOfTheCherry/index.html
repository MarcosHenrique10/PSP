<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Sons of the Cherry — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "SonsOfTheCherry", "title": "The Sons of the Cherry", "scenes": {"ch1": "*if title = \"Greenthumb\"\n The loamy smell of leaves on dirt pervades this place, a sunny clearing deep in the woods.  While the city smells like war, like metalsmiths and manure and fire, the air in this dot of earth bears no odors but those of the trees.  It is your favorite place, a haven about which you have informed no one.\n\n*if title = \"Watcher\"\n The loamy smell of leaves on dirt pervades this place, a tiny clearing deep in the woods.  A still place where you can sit and drink your tea in peace, far from the interruptions of a city in wartime.  It is your favorite place, a haven about which you have informed no one.\n\n*if title = \"Scrivener\"\n The loamy smell of leaves on dirt pervades this place, a tiny clearing deep in the woods.  A soft, undulant place.  In the city the lines sharpen daily, all edges and corners.  No surprise for a city at war;  sharpness is valued there.  This grove is your favorite place, a private haven where you can sit and sketch in silence. \n\nA developing wind rustles the heavy bed of ferns at your feet, and it carries with it a voice.  A voice that sounds troubled.\n\n*Choice\n #Go help\n  *set preservation +5\n  You wander in the direction of the voice.\n  *goto thechild\n #Leave it be.\n  *set preservation -5\n  Probably for the best.  As you head for home, though, the voice gets louder. \n  *goto thechild\n \n*label thechild\nBefore long you see a child crying on the ground.  The poor little one must be lost.\n\n*if preservation > 50\n \"What is the trouble?\" you ask in the kindest voice you can manage.  \"Can I help you?\"\n\n*if preservation \u003c 50\n Tempted as you are to leave the child be -- it could have some sort of disease, after all -- you clear your throat and wait for a response.\n\nThe child turns towards you, revealing a network of dark symbols scratched into her face.  Her ankles and wrists have been tied with some kind of vine.  The eyes have neither pupil nor cornea, and an ichorous fluid pours from the mouth.  It screeches at you, an unnatural sound, high and pained.  \n\n*if physicality > 50\n Fascinating.  Startling, but fascinating.  \n\n*if physicality  \u003c 50\n Through no small effort, you suppress the urge to run.  It's just a little girl.\n\n*goto x_girl\n\n*label x_girl\nThe tormented girl collapses, and you move to help.  She is quite passed out; drugged, perhaps.  You remove the vines and chafe her wrists in an attempt to wake her.\n\n*if title = \"Greenthumb\"\n These vines... you recognize them.  Creeping Charlie, a common plant in these parts.  Most just say it's an annoyance, and a threat to crops and lawns alike.  You've heard some say it can be used for divination.  Witchcraft.\n\n*if title = \"Watcher\"\n This girl, this moment... you remember it.  A dream?  A daydream?  Either way, you think you may know what's going to happen next.  Men with guns.\n\n*if title = \"Scrivener\"\n The symbols on her face... you recognize them.  Some distant memory of a few lines etched somewhere.  That and you were just doodling the same shapes in your sketchbook....    \n\n\n*Choice\n #Time to make your exit.  Whatever is happening to this girl, it's beyond your ken and doesn't exactly seem normal.\n  *set preservation -5\n  You rise and start to head back towards town.\n  *goto themen\n #You must stay with this girl.  She's helpless here, no matter what her appearance and behavior.\n  *set preservation +5 \n  You continue to try to wake the girl.  It seems pointless, but at least it's something to do other than fret.\n\n*label themen\n\n*if preservation > 50\n Three men in slipshod uniforms come running towards you through the brush, making no attempt at stealth. You decide to avoid any confusion and leave before they reach you.  As you pivot to run, the girl comes to and grabs your ankle.  She grins up at you with white eyes.\n\n*if preservation \u003c= 50\n Three men in slipshod uniforms come running towards you through the brush, making no attempt at stealth. Whoever they are, they don't seem very well-intentioned; you rise to defend the girl.\n\n\"What goes on here?\" the tallest man asks, his hand on the well-worn stock of his rifle.  The other two run to the slavering girl and pick her up with gentle care.\n\n\"I don't know,\" you reply.  \"I just found her like this.\"\n\nOne of the men carrying the girl gasps and swears.  \"Look at her, sir\" he says with a tremble.  \"Look at her face.\"\n\n\"Those vines...\" the other mumbles.\n\n*if spooky \u003c 50\n The tall man turns back to you with a sneer.  \"You're coming with us, witch.\"   \n\n*if spooky >= 50\n The tall man turns back to you, puzzled.  \"Best you join us back in town so we can sort this out,\" he says.\n\nHe grabs your arm, and doesn't seem like he's going to let it go any time soon.\n\n*finish", "ch10": "*if savedmiranda = \"N\"\n  *if status = \"Associate\"\n   Ottone does not bother to hide his derision about your failure.  \"You would have benefited from our training,\" he says.  \"If our numbers were not so thin, I would not dream of sending you on this next task.\"\n\n   *choice\n    #\"Is it too late? Can I join the Filii Cerasi now?\n     Ottone smiles like a hungry cat. \"If you would like.\"\n     *set status \"Son of the Cherry\"\n     *goto task\n\n    #\"Tell me about this task.\"\n     *goto task\n\n    #\"I have had enough if this. I am leaving.\"\n     Ottone does not stop you.\n     *goto_scene ch13\n\n  *else  \n   Ottone barely looks up from his desk.  \"So you were unable to reclaim our dear Miranda?\"\n\n   \"Correct.\"\n\n   \"I feel no strong desire to hide my disappointment in you,\" Ottone says.  \"This perhaps you lack the stomach for this kind of work.  I can only hope you do better with this next task.\"\n   *goto task\n*else\n \"Thank the gods,\" Ottone says, obviously relieved at the sight of Miranda.  He stands and embraces her, not waiting for consent.  \"Let us not allow that to happen again, eh?\"\n\n Miranda smirks, wrestling her way out of the hug. \"They knew why I was there, Ottone,\" she says.\n\n Ottone strokes his chin dramatically.  \"Hmm... let us then accelerate our plans.\"\n\n*choice\n #What plan?\n  *set preservation +5\n  \"Allow me to explain,\" Ottone says.\n  *goto task\n #What about me?  I want to find Keitch, not do more errands.\n  *set preservation -5\n  \"We may find the two purposes are combined,\" Ottone says.  He does so enjoy acting mysterious.\n  *goto task\n\n*label task\n*if status = \"Member\"\n *if savedmiranda = \"N\"\n  *goto theplan\n *else\n  \"But first a ritual must be observed.\"\n\n  Lien enters Ottone's office with implements in hand.  Not half of an hour passes before the cherry blossom on your arm becomes surrounded by a quarter-inch of shining new ink in a latticework pattern.  You wonder how many successes Miranda has had to merit her extensive tattoos.\n  *goto theplan\n*else\n *goto theplan\n\n*label theplan\n\n\n\"The plan is as follows,\" Ottone begins.  \"You will have heard of General Washington?\"\n\n*if physicality >50\n \"Of course,\" you reply.  \"I read of his exploits during the French and Indian War.\"\n\n Ottone smiles sardonically.  \"Yes, what a humble and dutiful man, sending his journals to the newspapers.\"\n\n \"What about him?\" \n\n *goto severalof\n\n*else\n \"Sure,\" you reply.  \"He's in charge of the war.\"\n\n Ottone's mouth wriggles into a moue. \"Something like that, yes.\"\n \n \"What about him?\" \n\n *goto severalof\n\n*label severalof \n\"Several of our experienced watchers have seen Mr. Washington.  They see him having a great influence on the spirit of this western land, an idolized -- even deified -- figure. We must approach him.  He needs to be made aware that not everyone on this continent is enamored of the Nazarene blood god.  Whether the crown wins this conflict or not, stories of Washington will spread and grow.  Our touch must be made if we are to survive.\"\n\n*if savedmiranda = \"N\"\n \"You must understand,\" Ottone adds, \"it is very unlikely you will succeed in this task without the help of Miranda.\"\n *choice\n  #\"I volunteer.\"\n   *set preservation +5\n   *set sunlit +5\n   Ottone smiles in response.  \"I was hoping you would.  After all, I have reason to believe there is a person in Washington's camp who may be of interest to you.\"\n\n   \"Truly?\" you prod.  \n   *goto yourememb \n\n  #\"I will, but what has this to do with me?\"\n   *set preservation -5\n   *goto yourememb \n\n*if savedmiranda = \"Y\"\n *choice\n  #\"I volunteer.\"\n   *set preservation +5\n   *set sunlit +5\n   Ottone smiles in response.  \"I was hoping you would.  After all, I have reason to believe there is a person in Washington's camp who may be of interest to you.\"\n\n   \"Truly?\" you prod.  \n   *goto yourememb \n\n  #\"I will, but what has this to do with me?\"\n   *set preservation -5\n   *goto yourememb \n\n  \n*label yourememb\n\n\"General Washington recently employed an advisor by the name of William Keitch.\"\n\nYou remember the name.  \"Pastor Keitch?\"\n\n*if savedmiranda = \"N\"\n \"Indeed,\" Ottone replies.  \"The man himself.  We believe the pastor of your little town to be associated with a group who would stamp out our kind.   \n *goto thehyp\n*else\n  \"Indeed,\" Ottone replies. \"The man himself.  We believe the pastor of your little town to be associated with the organization which imprisoned Miranda.  \n *goto thehyp\n\n*label thehyp\nThe hypocrites use the same methods we do, \n*if title = \"Watcher\"\n watchers \n *goto likeyou\n*if title = \"Scrivener\"\n scriveners \n *goto likeyou\n*if title = \"Greenthumb\"\n greenthumbs \n *goto likeyou\n*label likeyou\nlike yourself for instance, but consider them sins nonetheless.  It is likely that Keitch was at the very least involved your framing, and where goes Washington so goes the good pastor.\"\n\n*if savedmiranda = \"Yes\"\n Miranda steps forward.  \"And so go we.\"\n *finish\n*else\n *finish\n", "ch11": "These poor fools.  The shivering is the only sign some of them are even alive.  The sizzle of a paltry dab of flour and water on a hot plate is the only sound, the wet snow dampening any forest noises.  General Washington's men are poorly supplied and barely trained; this is the army which sets out to defeat the Crown?\n\nWashington is in one of the scattering of canvas tents, presumably the largest.  Keitch will be with him.  But how to get to him without being seen?  \n*if savedmiranda = \"Yes\"\n Miranda, crouching next to you behind a bit of scrub, is happy to let you take the lead.\n *goto magic\n*else\n *goto magic\n\n*label magic\n\n*if status = \"Associate\"\n *goto assoc\n*else \n *goto magicsuccess\n\n\n*label assoc\n*if title = \"Greenthumb\"\n You pull a pouch of herbs from your belt and cast the needles of a spruce on the snow.  They tell you nothing.\n\n *goto fail\n*if title = \"Scrivener\"\n You break a small twig off the scrub in front of you and draw a glyph in the unbroken snow.  Your figure is a meaningless shape.\n\n *goto fail\n*if title = \"Watcher\"\n You look deep inside yourself for a vision, but nothing comes.\n\n *goto fail\n\n*label fail\n*if physicality \u003c50\n You might as well go right for it.  You rise from your hiding spot, draw a loaded pistol, and run towards the largest tent.  You nearly make it before you feel somthing blunt on the nape of your neck.  Night falls immediately and sleep takes you.\n\n *goto failwash\n*else\n You think that perhaps if you watch the movements of the guards you will find an opening.  Unfortunately, one of those movements leads them right to you.\n\n *goto failwash\n\n*label failwash\nGeneral Washington is remarkably tall, and appears even larger in the confines of his tent.  He carries himself with grace and strength, and you are surprised neither that he has come so far in life nor that he will have such an auspicious future.  To see him is to trust him, and to want to follow where he leads.  You are sure that the two heavy-breathing men behind would do anything he were to ask.\n\n\"What to do with you,\" Washington says, leaning close to your chair, eyes leaving yours just long enough to glance at the ropes keeping you bound.\n\n*choice\n #I came with a message for you.\n  Washington frowns.  \"I read it.  Very odd\".\n  *goto next\n #Let me go.\n  \"I think not,\" Washington replies.  \"Though I did read that letter you brought for me.\"\n  *goto next\n*label next\n\n*if spooky \u003c50\n \"Then you know you must release me,\" you threaten.  \"I have powers.\"\n *goto next1\n*else\n \"Then you know I come here with peaceful intent.  Will you free me?\"\n *goto next1\n \n*label next1\n\n\"No,\" the General replies, straightening.  \"No, I have another purpose for you.\"\n\n*choice\n #Where's Keitch?\n  \"Who?\"  Washington looks genuinely confused.\n  \n  \"William Keitch.  Your new advisor.\"\n\n  \"I don't know anyone by that name.  But I suppose it doesn't matter.\"\n  \n  Washington nods to the men behind you and turns away.\n  *goto_scene traitordeath\n\n*label magicsuccess\n*if spooky \u003c50\n *if title = \"Greenthumb\"\n  You brought a carefully prepared mix of herbs with you in a clay jar.  The wind happens to be perfect for your task; you open the jar and cast handfuls of the chopped leaves and petals into the air.\n\n  The camp is asleep in seconds.\n  *goto next2\n *if title = \"Scrivener\"\n  You pull a bag of stones from your belt and reach in, feeling for the glyph you need. You find the marked pebble, a rounded bit of shale with a sigil scratched into it, and bury it in the snow with a prayer.\n  Within minutes a brutal ice storm descends on the camp, sending the troops to find any cover they can.\n  *goto next2\n *if title = \"Watcher\"\n  Breathing deeply, you enter the dream-trance.  With your soul's vision you see a cloud pass through a valley of thorns.\n\n  When you wake, you creep along the border of the camp and find what you seek: a great white stag.  The beast snorts and paws the ground, sending up a terrifying amount of frozen earth.  A whistle and a shout sends the stag running into the camp.\n\n  The troops scatter, some afraid of being trampled, others grabbing rifles in hope of a warm dinner.\n  *goto next2\n*if spooky \u003c=50\n *if title = \"Greenthumb\"\n  A small pouch is fastened to your belt.  You reach into it and produce a small phial containing a poultice of herbs and blessed waters.  You drop in on the frozen ground and mash it with your heel.\n  Not two minutes later, the clouds break and hot rays of sun pour onto the camp.  The troops cheer and even dance, basking in the warmth they so desperately need.  \n  The entire camp falls asleep within the hour.\n  *goto next2\n *if title = \"Scrivener\"\n  You pull a bag of stones from your belt and reach in, feeling for the glyph you need. You find the marked pebble, a rounded bit of shale with a sigil scratched into it, and bury it in the snow with a prayer.\n  Not two minutes later, the clouds break and hot rays of sun pour onto the camp.  The troops cheer and even dance, basking in the warmth they so desperately need.  \n  The entire camp falls asleep within the hour.\n  *goto next2\n *if title = \"Watcher\"\n  Breathing deeply, you enter the dream-trance.  With your soul's vision you see a cloud pass through a valley of thorns.\n\n  When you wake, you creep along the border of the camp and find what you seek: a great white stag.  The beast snorts and paws the ground, sending up a terrifying amount of frozen earth.  A whistle and a shout sends the stag running into the camp.\n\n  The troops scatter, some afraid of being trampled, others grabbing rifles in hope of a warm dinner.\n  *goto next2\n\n*label next2\nYou enter Washington's camp unhindered and walk directly towards his tent.\n*if savedmiranda = \"Yes\"\n\n \"Not bad,\" Miranda chuckles.  \"A tad dramatic, but not bad.\"\n *goto tent\n*else\n *goto tent \n\n*label tent\n*choice\n #Go on.\n  *goto goon\n\n*label goon\nGeneral Washington is remarkably tall, and appears even larger in the confines of his tent. He is busy writing, and even seated he carries himself with grace and strength. You are surprised neither that he has come so far in life nor that he will have such an auspicious future.  To see him is to trust him, and to want to follow where he leads.\n\nYou can't help but notice that Pastor Keitch is not present.\n\n\"Who are you?\" Washington asks, more curious than startled.\n\n*if savedmiranda = \"N\"\n *goto nomiranda\n\n*if savedmiranda = \"Yes\"\n Miranda takes a step forward, a loaded pistol in her hand.  \"George Washington, I am here to make an accounting for Loggs Town,\" she says, a darkness taking hold of her features.\n\n Washington rises, ignoring the weapon.  \"I spent some time in Loggs Town, yes,\" he says.  \"What offense did I commit to you there?\"\n\n \"You ordered an attack on a group of innocents.\"\n\n A humorless smile of recognition reaches the General's eyes.  \"They were no innocents.  Witches and worshippers of the Devil. They were in the midst of some dark ritual.\"\n\n \"The raising of a tree,\" Miranda counters.  \"They were planting a cherry tree in the forest, nothing more.\"\n\n *choice\n  #What is this about?\n   *set preservation -5\n   *goto growl\n  #You do not deny it then?\n   *set preservation +5\n   *goto growl  \n\n*label growl\nMiranda growls, barely controlling her rage.  \"He ordered the assassination of members of the Filii Cerasi.  When he was a puerile, ambitious fool.  And what did they give you, murderer?  Did you attack those people to further your career?\"\n\n\"Do not be coarse,\" Washington says.  \"We are building a new civilization here.  A civilization of Reason.  For the first time in history, a nation will be built not on superstitions or the power of corrupt ancient families, but on equality and representation.  The Christian religions are completely democratic; we are all the same in God's eyes.\"\n\nMiranda does not lower the pistol.  \"All except those who see the spirit in the forest and not in some old black book,\" she says.  \"Did you do it, Washington?  Did you try to chop down the Sons of the Cherry as they planted a sacred tree?\"\n\nWashington smiles, browned teeth bared.  \"I cannot tell a lie.\"\n\nMiranda takes a deep breath.\n\n*choice\n #Stop her.\n  This is not the way. You grab Miranda's forearm just as she fires, sending the bullet harmlessly through the side of the tent.\n  Washington's sword is drawn and pointed at her throat.  \"Leave this place,\" he commands.  \"Leave and tell your friends to stay in the shadows if they want to survive.\"\n  *goto yessir\n #Let her kill the evil cad.\n  The tent fills with sound and smoke.  By the time your senses return, Washington in face-down in the snow. \n  *goto end\n\n*label yessir\n*choice\n #Yes, sir.\n  You usher a stunned Miranda out into the snow.\n  *finish\n #Where's Keitch? \n  \"Who?\"  Washington looks genuinely confused.\n  \n  \"William Keitch.  Your new advisor.\"\n\n  \"I don't know anyone by that name.  Leave off your tricks and be gone.\"\n  *finish\n\n*label nomiranda\n\n\"I have come to you with a message,\" you say, holding out a parcel.  \"Do read it when you can.\"\n\nWashington takes the parcel, eyeing you warily.  \"I surely shall,\" he says.  \"Who is the sender?\"\n\n\"All is explained within, sir.  Now, may I ask you a question?\"\n\n\"You may ask,\" the general says.\n\n\"Where's Keitch? \n \n\"Who?\"  Washington looks genuinely confused.\n  \n\"William Keitch.  Your new advisor.\"\n\nWashington frowns. \"I must admit, you have me baffled.  If you're a spy or an assassin, you're the strangest I have ever heard of.  I don't know anyone by the name Keitch.\"\n\nYou make your exit with no further conversation.\n\n\n\n*label end\nMiranda spits on the general's dying body. \"Come on,\" she says. \"We need to be gone from here. You did a good thing today; Washington needed to pay for his crimes, and his elimination shall make our task easier. I look forward to working with you again.\"\n\nWhat have you agreed to? A secret war of the occult?  How may things have been different, both for you and for the nation, if you had made other choices? \n*goto_scene ending\n", "ch12": "*if physicality \u003c50\n You nearly break the hinges from Ottone's door as you burst into his chamber.  \"Where is he?\" you shout.  \"Where's Keitch?\"\n\n \"Still on about that are you?\" Ottone says with a sigh.  \"By now you must realize that it was not he who framed you?  Hmm?\"\n\n Ottone waits as the truth slowly works its way into your mind.  \"You must forgive me,\" he says.  \"It seemed the best way to get you on our side\".\n *goto spooky\n\n*else\n You enter Ottone's chamber, not waiting to be invited.  His look betrays only mild amusement.\n\n \"How did it go?\" Ottone asks with a sly smirk.\n\n \"It was you, wasn't it,\" you say.  \"You framed me to force me into joining you.  Joining the Filii Cerasi.\"\n\n Ottone merely sighs.  \"Didn't find what you were looking for out on the front?  Ah well.  I'm sure you got our message across anyway\".\n *goto spooky\n\n*label spooky\n\n*if spooky \u003c50\n \"You are no friend,\" you spit.  \"Your deception is unforgivable.\"\n\n \"So you'll be leaving, then?\"\n\n *goto pres\n\n*else\n \"I cannot say I approve of your methods, but I am glad you found me,\" you say.  \"The talents I have acquired under your tutelage... I am a new person\".\n\n \"So you'll be staying, then?\"\n\n *goto pres\n\n*label pres\n*if preservation \u003c50\n\n The abruptness of the question gives you pause.  How will you end this unusual tale?\n\n \"I will take my leave of you, Ottone, and of the Filii Cerasi.  With what I have learned, I shall do well on my own.\"\n \n *goto_scene ending\n\n*else\n *if spooky \u003c50\n  The abruptness of the question gives you pause.  How will you end this unusual tale?\n\n  \"I will stay on, but not for you.  I will remain here to learn and grow more powerful, but know that you will never have my trust again.\"\n\n  What have you agreed to? A secret war of the occult?  How may things have been different, both for you and for the nation, if you had made other choices? \n\n  *goto_scene ending\n *else\n  The abruptness of the question gives you pause.  How will you end this unusual tale?\n  \n  \"If you will have me, I shall stay to further our noble goals.\"\n\n  What have you agreed to? A secret war of the occult?  How may things have been different, both for you and for the nation, if you had made other choices? \n \n  *goto_scene ending\n\n \n", "ch13": "*if metnewguards = \"Yes\"\n \n You have turned your back on the world. Good luck on your own.\n\n *goto_scene ending\n\n*else\n\n You have left Ottone and his promises behind you. What will you find as you face this world alone?\n\n*finish", "ch14": "Monstrous beasts stalk the foggy, untouched forests of this new England. Bear, stags, wide-antlered moose; any of these could -- and would -- kill you with ease. Yet they seem less of a threat than the people of the cities and towns; old lamplight stories of the tortures inflicted upon those accused of witchcraft seep into your dreams.\n\n*if title = \"Greenthumb\"\n A campfire laced with spearmint and birch bark (always gathered from the ground, never cut from a living tree) keeps you relatively safe. \n\n*if title = \"Watcher\"\n You trust in your dream visions to keep you relatively safe through the night. You see new faces, gunfire... but never any attacking animals. Yet.\n\n*if title = \"Scrivener\"\n A ring of glyphs scratched in the leaf-covered earth around your camp make you feel a little safer. You did not recognize the odd symbols as your hand wrote them.\n\nWould Ottone have taught you more about your weird art?\n\nHoofbeats clatter through the stillness. The road is not far from here -- you could go and see who it is.\n\n*choice\n #Let's have a look.\n  *goto look\n\n #It's no concern of mine.\n  *goto_scene ending\n\n*label look\n\nYou find an obscured spot behind a shaggy beech tree and wait. Charging through the fog is a horse bearing a man in black riding clothes. It stops nearby.\n\n\"Come out, come out, where e'er you be,\" the man says, his sing-song tone not matching his rough voice. \"I've a message for you.\"\n\nA slip of paper drops from his hand and glides to the road. In an explosion of hoofs and whinnying, he races off.\n\n\nThe paper bears a printed message: \"ALL True Men of the New Guards are desired to meet on THE MORROW under the SILENT BRIDGE at XI O'Clock. If your eyes perceive this Message, we know WHAT YOU ARE.\"\n\n\n*choice\n #I shall meet with these New Guards.\n  *goto_scene ch_plot2 \n\n #I shall continue to live in these woods, alone.\n  *goto_scene ending", "ch2": "You wipe the spittle from your face with your sleeve and sit back down on the jail cell's bed.  The girl's mother storms out, sated that she has abused her child's kidnapper enough for today.\n\n*if title = \"Greenthumb\"\n A little sprig of green is pushing its way through the crack between the wall and the floor.  Blueberry, of all things.  You break off a tiny leaf and tuck in a fold of your shirt for protection.\n\n*if title = \"Watcher\"\n Now that she's gone you can get back to your nap.  You had been in the middle of a dream in which you were wandering in a cave, lost.  A raccoon appeared with a torch... and then you woke up to someone screeching at you.\n\n*if title = \"Scrivener\"\n The men took your journal and pen, leaving you with little to do.  You grab a hard pebble from a corner and scratch designs into the brick next to your bed.  The bed.  Best not to think of it as yours.  \n\nJail might not be so bad, come to think of it.  At the very least it would keep you from General Washington's war.  As if there was any chance of a few farmers defeating the greatest military force the world has ever known.  It takes more than a declaration.... \n\n\"...to make a nation independent.\"\n\nYou sit up with a start and see a man standing on the other side of the bars.  He is dressed like the villain in an opera, flowing black coat and a black masque around his eyes.  \n\n\"I... I'm sorry,\" you blurt.  \"I was just thinking out loud.\"\n\n\"No, you were not,\" the man says.  \n\n\"Do I know you?\"\n\n*if title = \"Watcher\"\n \"Perhaps.  Do you recognize me?  From one of your dreams?\"\n\n*if title = \"Greenthumb\"\n \"I doubt it.  You won't find me growing in a forest, or in a book of herbs.\"\n\n*if title = \"Scrivener\"\n \"No.  I must be a complete mystery to you -- I wear no symbols for you to decipher.\"\n\nNow how would he know that about you?\n\n*choice\n #\"What do you want from me?\"\n  *set physicality +1\n  *goto window\n\n #\"Why don't you stand a little closer, where I can reach you?\"\n  *set physicality -1\n  *goto window\n\n*label window\nThe man turns and faces the window on the opposite wall.  \"How is it, you think, I was able to complete your thought?\" he asks.\n\n*if physicality >= 50\n \"Simple,\" you reply.  \"What other thought could be on the mind of a young man in jail these days?\"\n\n*if physicality \u003c 50\n Enough talk. You grab a pebble and toss it at the back of the stranger's head.  He whirls around a grabs it before it finds home.\n\n\"A nice try,\" he says.  \"I am going to go and convince the warden to release you.\"\n\nYou scowl.  \"And how will you manage that?\"\n\nFor the first time, the man smiles.  It does not suit him.  \"I have a feeling we can come to an understanding,\" he chuckles.\n\nMoments later you are walking down the central road in town next to this odd masked fellow. A free man.  \n\n\"Don't enjoy this freedom too much,\" your liberator warns.  \"The townspeople will recognize you and put you right back in jail, or worse.  Pastor Keitch will certainly see to that.  They think you're a witch, you know.\"\n\n*choice\n #\"What?  Why?\"\n  *set spooky +5\n  \"Because they found you in the woods with a girl who was clearly part of some strange ritual,\" the man says with a shrug.\n  *goto mob\n\n #\"Good.  That is sure to come in handy.\"\n  *set spooky -5\n  \"Perhaps,\" the man says.  \"But they are sure to dislike someone found in the woods with a girl who was clearly part of some strange ritual.\"\n  *goto mob\n\n*label mob\n\n\"I had nothing to do with that,\" you say, noticing that some of the passers-by are looking at you.\n\n\"I doubt they will see it that way, and the pastor certainly will not. But where are my manners?  You may call me Ottone. I am part of an organization which would like to recruit you. And now I recommend we leave town with great haste.\"\n\nOttone's assessment of the situation is accurate; a knot of people has formed behind you, and some are armed.\n\n*choice\n #Run with Ottone.\n  *set preservation -5\n  \"This way,\" Ottone whispers, disappearing down an thin alley.  You follow. \n  *goto oshouse\n\n #Run to the forests alone.\n  A fellow in an opera mask who breaks people out of jail is probably not to be trusted. You'll do better on your own.\n  *goto alone\n  \n #Fight.\n  *set physicality -5\n  \"Who sets at me?\" you scream to the gathering crowd. Some of them have picked up rocks.\n\n  *if physicality \u003c 50\n   No person ever realizes he is part of a mob. The thrill of anonymity and the diffusion of personal responsibility goes to one's senses like strong Kentucky whiskey, masking both conscience and fear. The best way to break this spell is to single a man out and beat him senseless before anyone can stop you.\n\n   *if title = \"Greenthumb\"\n    The trees of the woods which surround this little town sway in the wind. You take a deep breath, taking strength from the green.\n    *goto ff\n\n   *if title = \"Watcher\"\n    This looks familiar. Cela a été déjà vu. You remember what to do.\n    *goto ff\n\n   *if title = \"Scrivener\"\n    You trace a symbol in the air in front of you. An arrow, bright red in your mind.\n    *goto ff\n\n\n  *if physicality >= 50\n   Something dull hits your forehead before you even get close to the nearest man. Gravity changes direction.\n\n   As blackness fills your eyes, you hear Ottone chanting.\n\n\n\n   You awaken in the forest, Ottone crouching near you. \"Wake up, fool,\" he whispers. \"I have stalled them, but they seek us even now.\"\n   *goto oshouse\n\n\n*label ff\nYou select the hardiest man of the group and lunge at him. The eruption of blood from his nose and mouth as you smash his face into the street stills the crowd's anger for a moment, which is all you need. After a few more broken noses, the streets empty.\n\nOttone claps mildly. \"Well, let us be off then, before they return with muskets.\"\n\nYou cross your arms and do not move. \n\n\"Need convincing, then?\" Ottone asks. \"That little trick you used before your attack was... effective, I suppose. But I can teach you to do much, much better. And how long do you imagine you will last, an escaped convict and known witch?\"\n\n*choice\n #\"Let us away.\"\n  *goto oshouse\n\n #\"I will make do on my own.\"\n  Ottone makes a small bow. \"Until next time, then.\"\n  *goto_scene ch13\n\n\n\n*label alone\n*goto_scene ch13\n\n\n*label oshouse\n*if physicality >=50\n \n Ottone is possessed of great speed, and you are hard put to keep up with him as you bolt through the forest. Every time you consider asking him to stop so you can rest, he slows down a little.\n\n*if physicality \u003c 50\n\n As you dart through the forest, you see that Ottone is possessed of great speed; it isn't often you have to push to keep up with someone.  He seems to feel competitive, leaping forward a little every time you consider passing him.\n\nAfter several hours of running, you reach the back of a stately country home.  Ottone's pace slackens, and he walks directly towards one of the doors.\n\n*set beentohouse \"Yes\"\n\n*if title = \"Watcher\"\n You get the familiar feeling of having been here before.  A memory of safety and warmth. \n\n*if title = \"Greenthumb\"\n You notice that the doors and windows all have bloodroot growing around them.  Bloodroot for protection.\n\n*if title = \"Scrivener\"\n A faint symbol was etched in the door some time ago.  It has been painted over many times and is barely visible.  You suddenly feel very safe.\n\n*finish\n\n", "ch3": "*if beentohouse = \"Yes\"\n *goto house\n*else \n A little luck and magic bring you to a dark mansion in the woods. Ottone's place.\n\n \"Welcome.\" Ottone opens the door before you knock. \"I'm glad you found your way here.\"\n\n*label house\n*set beentohouse \"Yes\"\nThe house is very well-appointed, with lush carpets and many tapers burning against the dimness.  Ottone motions towards a velvet-lined chair in a sitting room and you take it.  He removes his mask and robes, revealing a surprisingly normal-looking fellow of fifty years.  He has the bearing and floridity of a man of means who spends more time at the club than the church.\n\n\"You are now persona non grata, young man,\" Ottone states as he pours some wine into heavy crystal goblets.  \n\n*if physicality >=50\n You gulp.  He's right, of course.  You'll never be welcome in your hometown again.\n\n*if physicality \u003c50\n He waits for you to respond, but seeing the lack of understanding on your face he moves on.  \"You will not be able to set foot in your hometown for a very long time, if at all\".\n\nYour head falls into your hands.  \"I can't figure this,\" you say.  \"What was that girl doing in the woods?  What happened to her?\"\n\nOttone smiles, an expression more suited to his undisguised face.  \"She was placed there to catch you,\" he declares through his wine glass.  \"The girl was bait\".\n\n*if spooky \u003c 50\n \"Bait?\" you exclaim.  \"My demeanor makes some people feel out-of-sorts, surely, but why would anyone want to bait me?\"\n\n*if spooky >= 50\n \"Why would anyone be setting bait for me?\"\n\n\"Because of your... talents, shall we call them?\" Ottone replies.  \"Someone knows your secret, my boy, and set a trap for you.  An individual such as yourself espied in the woods with a kidnapped child, glyph-covered and bound in sacred vines?  You would hang in hours, if the town didn't stone you to death first.  That Pastor Keitch isn't really known for his leniency, is he?\"\n\nYour host is correct, of course.  Pastor Keitch has spewed brimstone from the pulpit as long as you've been alive.\n\n*choice\n #\"You're a fool.  I have no secrets\".\n  *set preservation -5\n  \"Ah, but you do,\" Ottone says.  \"Denying it will gain you nothing\".\n  *goto workforme\n  \n #\"That girl suffered because of me?\"\n  *set preservation +5\n  \"Yes,\" Ottone says with a disdainful shake of his head.  \"Someone wants to get to you very badly\".\n  *goto workforme\n\n*label workforme\n\nYou sink into the chair.  Framed as a witch.\n\n*if title = \"Watcher\"\n \"Can you really say you are framed?\" Ottone asks.  \"What other than witchcraft could you allow you to dream the future?\"\n\n*if title = \"Greenthumb\"\n \"Can you really say you are framed?\" Ottone asks.  \"Who but the devil's own has such a knowledge of the mystical properties of plants?\"\n\n*if title = \"Scrivener\"\n \"Can you really say you are framed?\" Ottone asks. \"Those symbols you draw, what are they but witchcraft?\"\n\n*if physicality \u003c 50\n You rise from the chair and shatter your wine glass on the table.\n\n\"I've had enough of this,\" you cry.  \"I need to find out who is so set against me.  I am leaving.\"\n\n\"Nonsense,\" Ottone says in a frustratingly calm voice. \"I am the only person in days who wouldn't turn you in.  And I am the only person in many more days who can help you.  Now sit down and I will explain to you my proposition.\"\n\nDefeated, you comply.\n\nOttone sits back in his chair and takes a deep sip from his glass.  \"It is nearly midnight, and after today's events it seems likely you are in no mood to sleep.  Instead, I have a task for you.  I would like you to deliver something for me.\"\n\n*choice\n #\"All I want is to know who did this to me. What will I get in return if I help you?\"\n  *set preservation -5\n  \"Oh, I think you will be happy with the results.\"\n  *finish\n\n #\"You've been so kind to me.  How can I help?\"\n  *set preservation +5\n  \"Allow to me explain....\"\n  *finish\n\n #\"I have no interest in your foolishness. I am taking my leave.\"  \n  You assume the look on Ottone's masked face is meant to convey disappointment. \"You will not last long on your own, I fear,\" he says. You exit without argument.\n  *goto_scene ch13", "ch4": "*label ch4start\nMidnight finds you standing on the overgrown shore of a small lake holding a broom handle.  You have the distinct feeling that this Ottone his having you on.  \n\nYour instructions were to head northeast until you found the lake and then drive the stake into the mud where the water meets the land at precisely midnight.  \n\n*choice\n #Follow the instructions.\n  With an utter lack of ceremony, you push the end of the broom handle into the muck. \n  *goto huntersmoon\n\n #Abandon Ottone and all his nonsense.\n  You toss the stake into the water and head off.  This Ottone is either toying with you or simply mad. You will be far better off making do on your own.\n  *goto_scene ch13\n\n\n*label huntersmoon\n\nYou turn to leave, but you see something which makes you stay.  \n\n*if title = \"Watcher\"\n A reflection in the lake.  A reflection over the entire lake.  Not a reflection, an image.  \n\n*if title = \"Greenthumb\"\n The weeds are moving around the stake.  A thin shrub grows in a spiral around it and blooms a flower.  Impossible.  You've seen the plant before in books.  Dwayberry.  The Devil's Cherries.  Deadly Nightshade.  Poisonous, but producing visions.  You take a leaf and place it on your tongue. \n\n*if title = \"Scrivener\"\n There are symbols on the wood now, glowing a strange blue.  Not in reality, of course, but in your mind.  You can see them burning themselves into the stake.  Rapt, you trace the symbols into the mud with your finger.\n\nYou see families forced from their homes by men with torches, men sent to their death in gruesome combat, innocent people harassed in the street by people with bibles.  Many things, before you pass out.\n\n*goto whatnow\n\n*label whatnow\n\nYou wake to see Ottone standing over you, the elaborate ceiling of his home above him.  He appears to be thinking very deeply.  You cough, and he comes to life. \"Welcome back!\" he says.  \"I was beginning to become concerned.  Not too concerned, though;  Thressa would have healed you.\"\n\nYou look around and see several people in the room, men and women of various ages and colors.  \n\nOttone drags you up.  \"Yes, welcome back and welcome to our little club.  You have proven yourself worthy of admission into Filii Cerasi.  I have gathered some of the local members to commemorate the occasion.\"\n\n*choice\n #This is getting crazy.  Leave.\n  *set preservation -5\n  *goto_scene ch14\n\n #How odd.  I wonder what this is all about?\n  *set physicality +1\n  \"Who are you people?\" you ask.   \n  *goto tattoo\n \n*label tattoo \n\nOttone gives you a teasing wink and turns dramatically to the table behind him.  A long needle and an inkpot are laid out.\n\n\"Do you know what Filii Cerasi means, son?\" Ottone asks.\n\n*if physicality > 80\n \"It's Latin,\" you reply.  \"Children of... something.\"\n\n*if physicality \u003c= 80\n \"No clue.\"\n\nOttone smirks.  \"Sons of the Cherry,\" he says.  \"We are the descendants of the first spiritualists to set foot on the New World.  And you have passed the test required for membership.  The second will be administered by Lien here.\"\n\nA woman of Oriental descent approaches you and motions for you to sit.  She picks up the needle and ink and waits as Ottone continues.\n\n\"You are not alone, son,\" Ottone declares.  \"We all pursue various of the arts the pulpit-bangers would call 'dark'.  We can teach you to refine your skill, and we ask nothing in return.  And we will help you find whoever is trying to trap you.\"\n\n*Choice\n #You don't need any help.  \"Get away from me with that needle.\"\n  *set status \"Associate\"\n  *goto decline\n\n #Accept the offer, and learn from them.  \"I am honored to join you.\"\n  *set status \"Son of the Cherry\"\n  Lien rolls up your right sleeve and sits you down.  Using the needle, she the pokes ink under your skin in a strange design: a tiny five-petaled flower within a triangle.\n  *goto blossom\n\n\n*label blossom\n\"This is the blossom of the cherry tree,\" she explains.  \"It has five petals and resembles the five-pointed star, a symbol sacred to the ancients.  Each petal represents one of the disciplines of the Filii Cerasi.\"\n\n\"Disciplines?\" you ask.\n\nOttone steps forward and answers.  \"Yes.  You, for example, are\n*if title = \"Watcher\"\n a Watcher.  You can see how events will play out.\n*if title = \"Greenthumb\"\n a Greenthumb.  You study all forms of plantlife and their peculiar properties.\n*if title = \"Scrivener\"\n a Scrivener.  You can affect change via glyphs and symbols.\n\nWe will school you in this discipline, provide you with the proper guidance to use this talent towards better ends.\"\n\n\"Like what?\"\n\nOttone smiles his enigmatic smile once again.  \n*goto notto\n\n\n\n*label decline\n\n\"You would decline membership?\" Ottone asks, feigning surprise.  \"So be it.  But now that you know of our existence, we can not ever be truly parted. We shall consider you an associate. And how will you ever find out who it is that framed you for witchcraft?  Surely that must be of some interest to you.\"\n\nYou scowl; he's right.  Someone out there wants you imprisoned or worse, and you won't be able to rest until you find out who.  \"I suppose so,\" you say.\n\n\"Then I offer the following,\" Ottone replies.  \"You will take part in neither the benefits nor the responsibilities of membership in the Filii Cerasi, but will enjoy a relationship of mutual benefit until your enemy is found.  I will assign you certain tasks, and in exchange for their completion we will turn our considerable forces towards solving your little mystery.\"\n\n*if preservation \u003c= 50\n \"What kind of tasks, exactly?\"\n\n*if preservation >50\n \"Seems fair.\"\n\nOttone extends a hand to be shaken.\n\n*choice\n #Accept.\n  *if physicality \u003c 50\n   \"Good firm grip,\" he states with a smile.\n   *goto notto\n  *else\n   *goto notto\n\n #Decline, and make do on your own.\n  *goto_scene ch14\n \n*label notto\n\"Not to worry.  You won't be given anything to do which you can't handle.\"\n*finish", "ch5": "*if status = \"member\"\n Philadelphia is bigger than you expected, and nothing in the last three months of training prepared you for the crush of people.  Arcane powers?  Yes.  Street-smarts?  Not hardly.\n\n*if status = \"associate\"\n Philadelphia is bigger than you expected, and you wonder if accepting a place in the Filii Cerasi and getting their training might have prepared you for the crush of people.  Three months doing the odd chores and errands certainly hadn't.  \n\nYou have been sent here to find a woman, a member of the society who has not responded to summons, either paper ones or the magick kind.  (Ottone informed you early on that 'magic' was to be spelled with a 'k' in his presence.)  They gave you no information other than that her last known address was in this city, but they couldn't even name a street.\n\nEven someone as unfamiliar with city life as yourself knows that if you want information, you must head to the pub.\n\n*goto_scene ch6", "ch6": "The Drowning Mouse can be identified by odor long before you can see it as you walk through the busy street.  The oily smell of hot butter and meat likely serves as better advertisement than the faded sign which teeters above the door.  \n\nNo one takes any particular notice as you walk in.  The patrons seem occupied with games, drunkenness, or politics, and in many cases all three.  You take a seat at one of the tables for some pocher, a new version of the card game bragg.  A few of the coins Ottone lent you jingle on the table, and the players are clearly ready for some fresh blood.\n\nAfter a few rounds you've lost most of your money, which endears you to the other men.  As bar conversations often do, the topic moves to women.  Sweethearts, prostitutes, wives, and infatuations.  Time to start poking around.\n\n\"I used to know a girl named Miranda,\" you say offhandedly.  \"Finest woman I ever knew, if a little odd.  I'd lose ten times as much as I have tonight to see her again.\"\n\nThe men go silent, barely grunting their bets for the next few hands.  They know something.\n\n*if status = \"Associate\"\n *goto asso\n\n*if title = \"Greenthumb\"\n *goto gt\n\n*if title = \"Watcher\"\n *goto wt\n\n*if title = \"Scrivener\"\n *goto sc\n  \n*label gt\n*choice\n #You have just the right concoction for this problem.  Drug the men into talking.\n  *Set physicality -5\n  Surreptitiously applying a little powder to a few of the cards does the trick.  As the cards are shuffled and passed, everyone gets a little on his fingers.  This being a pub, it doesn't take long for the substance to go from hand to mouth, so to speak.\n\n  \"Know a girl names Miranda,\" one of the smaller men slurs.  \"Works at the print shop.\"\n  *goto endch6\n\n #Reach into your bag and wear a little clover for luck.\n  *Set physicality +5\n  You take a tiny sprig of clover and push it through your lapel.  \"Maybe this will help my odds,\" you say with the grin of a tyro.  The men fall for it and start bidding more aggressively.  Before long, you are in a position to start forcing each man out of the game in turn.\n\n  \"The first man who tells me where I can find Miranda gets all his losses back,\" you declare.  \n\n  Two men are bankrupted before the someone finally gives in.  \"There's a girl named Miranda down at the printing shop,\" he says, eyeing your money.\n  *goto endch6\n\n*label sc\n*choice\n #Use a sigil to force someone to talk.\n  *set preservation -5\n  You play off your carving a symbol into the table as a nervous tic, and the men seem to fall for it.  You imbue the shape with the power to loose these mens' lips, and in minutes they are fighting over who will give you what you want first.\n\n  \"The printing shop,\" the loudest man says.  \"Miranda's at the printing shop.\"\n  *goto endch6\n\n #No need for that.  A tiny symbol to grant you some luck should do it.  \n  *set preservation +5\n  You play off your carving a symbol into the table as a nervous tic, and the men seem to fall for it.  Before long the stack of coins in front of you is ready to tip over.  \n\n  \"The first man who tells me where I can find Miranda gets all his losses back,\" you declare.  \n\n  Two men are bankrupted before the someone finally gives in.  \"There's a girl named Miranda down at the printing shop,\" he says, eyeing your money.\n  *goto endch6\n\n*label wt\n*choice\n #Let's give them a scare.\n  *set spooky -5\n  You graze the hand of one of the other players and gaze into your drink.  You see something, shapes at first, and then a man dying of disease.\n\n  \"Would you like to know how you will die?\" you ask, nonplussed.\n\n  The man starts to stammer, and you continue before he can answer.  \"You will breathe your last breath in a room with blue wallpaper.  A woman missing an earlobe will be tending to you, but she secretly wishes you dead.\"\n\n  The blood leaves his face in seconds, and he leaves the pub directly, not bothering with his money.\n\n  \"How about you, then?\" you ask, turning towards another player.\n\n  \"The printing shop,\" he shouts.  \"Miranda's at the printing shop.\"\n\n  *goto endch6\n\n \n #These are betting men.  Use that to your advantage.\n  *set spooky +5\n  \"All right,\" you say, playing up inebriation.  \"Let's make a wager.  I will call three cards in a row correctly.  If I do, you tell me where I can find her.  If not, you get all my money, plus my horse, my coat, my hat, and my shoes.\"\n\n  The men would be foolish not to take this sucker's bet.  At least that's what they thought until you called the first two cards.  \n\n  \"How are you doing that?\" one of them asks.\n\n  \"Does it matter?\" you reply casually.  \"Even if I win, you lose nothing but a little information I could have gleaned from anyone.  Eight of diamonds.\"\n\n  The last card is turned.  \"The printing shop,\" the dealer mumbles.  \"Miranda's at the printing shop.\"\n  *goto endch6\n\n*label asso\n\n*if title = \"Greenthumb\"\n You try a little clover in your lapel to bring you luck, but it doesn't seem to work.  You leave with neither information nor coin.\n\n*if title = \"Watcher\"\n You close your eyes and focus, but you've never seen this moment before. You leave with neither information nor coin. \n\n*if title = \"Scrivener\"\n You try to carve a symbol in the table, but nothing appropriate comes to mind.  You leave with neither information nor coin. \n\n*set failedinphilly \"Yes\"\n*label spyoffer\n\nOne of the gamblers follows you out. \"A moment, friend?\" he says. He seemed completely inebriated before, but now stands straight and speaks without slurring.\n\n*choice\n #\"Yes? Can I help you?\"\n  *set preservation +5\n  *set spooky +5\n  *goto spy2\n \n #\"Goodnight again. I'm off.\"\n  *set preservation -5\n  *goto spy2\n\n #Give him your scariest glare.\n  *set spooky -5\n  *goto spy2\n\n\n*label spy2\n\nThe man pulls the collar of his cloak up against the cold, obscuring his face a little. He hands you a scrap of paper. \"Read it,\" he says.\n\nThe paper bears a printed message: \"ALL True Men of the New Guards are desired to meet on THE MORROW under the SILENT BRIDGE at XI O'Clock. If your eyes perceive this Message, we know WHAT YOU ARE.\"\n\nWhen you look up, the messenger is gone. \n\n*choice\n  #This does not sound promising. Go back to Ottone.\n   *goto_scene ch10\n\n  #Ottone's help has yielded nothing. Let us see who these Double-Lanterns are.\n   *goto_scene ch_plot2\n\n\n*label endch6\n\n*finish", "ch7": "Beggars, drunks, and surreptitious conspirators fill the nighttime streets, slowing your progress to the print shop.  When you finally find the place, you are surprised to see a taper burning inside; it is far too late for anyone to be working.\n\n*choice\n #Knock on the door.\n  It seems almost silly calling on a business at this late hour, but it's worth a go.  As your knuckles make contact with the door, it swings open a little.\n  *goto window\n #Peer through the window.\n  The candle is obscured by the massive lines of the press; you cannot see anything of note.  The only other illumination is a lace of moonlight drawing its way across the room from the front door.  \n  *goto window\n\n*label window\n*if physicality >50\n It must be open a little.  You try it, and find that you were right.\n\n*if physicality \u003c=50\n Not much else to do but try the door, which surprises you by being unlocked.\n\n\nThe sputtering light of the candle reveals a well-worn and functional workspace; austere tables and cabinets encircle the unforgiving form of the printing press, acolytes at the temple.  Smells of paper and old sweat hang in the warm air and sting the back of your mouth.  Every surface feels smooth and burnished by years of labor.  This is a place of few comforts save those which come from hard physical work.\n\nYou work your way towards the candle, feeling your way along benches and racks with your hands and, too often, shins. The fluttering light casts strange shadows, toying with your perceptions and attenuating your already overtightened nerves.  \n\n*if title = \"Watcher\" \n Shapes of alternating dark and light dance around the still room.  A boy swinging an axe.  A bald man with a key.  A grim crowd surrounding a boulder.  A man tossing appleseeds.  \n\nA figure has collapsed on the workbench which holds the candle.  She looks all the world like a bored student, seated on an uncomfortable-looking chair with her hands folded on top of a book and her forehead resting on her knuckles.  But she is too old for studies -- forty, maybe -- and this is no school.\n\nHer tan, rough skin emits a faint acidic odor which you assume to be related to the printing process.  A wiry frame speaks a history of vital activity.  She does not seem to belong indoors at all, let alone asleep on a desk.\n\n\n\"Miranda?\" you try softly.  No way of telling what a powerful magus will do when woken suddenly.\n\nThe woman wakes slowly and sits up, her face tan and wrinkled.  \"We're closed,\" she mumbles.\n\n*choice\n #\"Never mind that.  The time has come to leave.\"\n  *set physicality -5\n  *goto laugh\n #\"Miranda, I am here to help you.  Let us go.\"\n  *set preservation +5\n  *goto laugh\n #\"I know who you are, Miranda Magus, and I have come to reclaim you.\"\n  *set spooky -5\n  *goto laugh\n #\"Sleeping in a print shop is not normal, Miranda.  Don't you think you should come with me?\"\n  *set physicality +5\n  *goto laugh\n #\"I don't intend to upset you, but will you come with me?\"\n  *set preservation -5\n  *goto laugh\n #\"Come with me, friend.  I have been searching for you.\"\n  *set spooky +5\n  *goto laugh\n\n*label laugh\n\nMiranda laughs.  \"Why would I leave?  And who are you, anyway?\"\n\n\"I am a member of the Filii Cerasi,\" you reply, rolling up your sleeve to reveal your tattoo.\n\nAny doubts that this woman is Miranda are quickly dispelled; her expression drops slightly at the sight of the insignia on your arm.  Her gaze goes distant, as if remembering an old dream.  She pulls up her own sleeve, and her arm is a network of intricate designs with a cherry blossom at the center.  \n\n\"I cannot leave,\" she whispers, more to herself than to you.\n\n\"Why not?\"\n\n\"I... I could not say. I tried. A great number of times early on.  My work is here.\"  \n\n*choice\n #\"You are a printer?\"\n  *goto bench\n\n #\"For whom do you work?\" \n  *goto bench\n\n*label bench\n\nMiranda turns towards a workbench and runs her hand along it.  \"I set the type,\" she says.  \"This shop, it's owned by the ambassador to France.  Mr. Franklin.  But that's not why I came, I don't think.\"\n\n*if physicality \u003c50\n Clearly the woman is distessed in some way.  You take her by the arm and lead her towards the door.  \"We can discuss this on the road,\" you offer.\n\n*if physicality >= 50\n \"Let us continue this conversation later, hmm?\" you say, indicating the door.  \n\nMiranda steps toward the exit, her eyes blank and her arms held out from her sided with fingers splayed, like a lost child's.  She stops at the threshold.\n\nYou prompt her with a light press on the small of her back, and even through the coarse clothing you can feel her skin turn icy-cold.  She turns to face you, her expression one of utter horror and pain.  The veins of her chin and cheel turn a necrotic black and a thin stream of bile drips from one of her eyes.\n\n\"I musn't,\" she croaks, crumpling to the sandy floor.\n\n*finish", "ch8": "It soon becomes evident that no amount of wrist-chafing is going to bring Miranda back to consciousness.  Her color has returned, though, and her breathing is steady and deep.\n\nSome eldritch force is preventing this woman from leaving this building, and you will not be able to complete your mission until you determine what it is.  \n\n*if title = \"Greenthumb\"\n You think on your training, and remember an herbalist hex which may suit the purpose.  You pull your implements from a pouch and set to work.\n\n A minute with a mortar and pestle yields a fine powder of various leaves and weeds.  You hold your breath, focus deeply, and exhale.  The explosion of dust colors the room for a few moments, flecks of the powder catching the light as they fall.  A single panel of the floorboard attracts your attention through the haze.\n *goto pullup\n\n*if title = \"Scrivener\"\n\n Glyphcrafting works best with native materials, a point made clear in your training.  You pull a full sheet of paper from a rack, empty some of the printer's ink into your inkwell, and set to the task.\n\n Entering a state of deep focus, you allow your pen to cross the page with little instruction or limitation from your conscious mind.  When the time feels right, you open your eyes and examine your soul's handiwork: a simple sigil composed of various letters and shapes surrounding a great eye.  You tear off the corner of paper containing the glyph and hold it into the candle's flame, sealing the spell in change and ash.\n\n As you rise from your seat, your gaze falls on a single floorboard.\n *goto pullup\n\n*if title = \"Watcher\"\n\n An odd reflection in the window takes hold of your attention.  You feel it pull your consciousness in.  The rest of the world pulls away, giving you the feeling of coming out of a covered bridge.  The see the floor of the printshop, and the inconsistent grain of one particular floorboard.\n *goto pullup\n\n*label pullup\n\nMiranda comes to, showing no surprise at your presence.  She does not speak.\n\n*choice\n #Pull up the floorboard. \n  *set physicality -5\n  *goto pullitup\n\n #Ask Miranda about the floorboard.\n  *set physicality +5\n  \"A strange question, to be sure,\" Miranda says, wrinkling her forehead.  \"I know some work was done on the floor shortly after I arrived.\"\n\n  \"Why did you start working here?\" you ask.\n\n  \"I... I can't recall,\" Miranda replies.  \"Very strange.  I can't remember much from before.  My work is all which matters on this earth.\"\n\n*label pullitup\n\nYou grab a metal bar from the printing press and worry the edges of the floorboard.\n\nMiranda shrieks, doubling over and pulling at her hair.\n\n\"Stop it,\" she cries.  \"You mustn't!\"\n\n*choice\n #Keep at it.  This mission must be completed.\n  *goto pulledup\n #Stop.  You can beg Ottone's forgiveness later.\n  At Miranda's behest, you let the floorboard lie.  The next hour is spent trying to help her remember why she will not leave.  You set out for Ottone's house in the cold crisp night, failed.\n\nAs you walk through the dark street, a man approaches you. One of the gamblers from the Drowned Mouse. \"A moment, friend?\" he says. He seemed completely inebriated before, but now stands straight and speaks without slurring.\n\n*set failedinphilly \"Yes\"\n\n*choice\n #\"Yes? Can I help you?\"\n  *set preservation +5\n  *set spooky +5\n  *goto spy2\n \n #\"Goodnight again. I'm off.\"\n  *set preservation -5\n  *goto spy2\n\n #Give him your scariest glare.\n  *set spooky -5\n  *goto spy2\n\n*label spy2\n\nThe man pulls the collar of his cloak up against the cold, obscuring his face a little. He hands you a scrap of paper. \"Read it,\" he says.\n\nThe paper bears a printed message: \"ALL True Men of The Double-Lanterns are desired to meet on THE MORROW under the SILENT BRIDGE at XI O'Clock. If your eyes perceive this Message, we know WHAT YOU ARE.\"\n\nWhen you look up, the messenger is gone. \n\n*choice\n  #This does not sound promising. Go back to Ottone.\n   *goto_scene ch10\n\n  #Ottone's help has yielded nothing. Let us see who these Double-Lanterns are.\n   *goto_scene ch_plot2\n\n*label pulledup\n*set savedmiranda \"Yes\"\nMiranda jumps at you, tearing at your throat and trying to displace you with her considerable strength.  \n*if physicality \u003c 25\n Her efforts are for naught, and you force the board up with ease.\n *goto pulledup2\n*else\n She shoves you away several times, but eventually you manage to get the board loosened.\n *goto pulledup2 \n\n*label pulledup2\n\nAs soon as the floorboard is pried free, Miranda stops abruptly.  Something beneath it enamors her.  No... it's something on the bottom side of it. You brush off the cobwebs and dirt to reveal an intricate glyph burned into the wood and chased with some kind of pigment.  \n\n*if title = \"Scrivener\"\n You can feel the Scrivener's hand moving over the wood, expertly crafting this advanced symbol.  The skill is far beyond you, and a mix of jealousy and terror knots itself behind your navel.\n\nThis is powerful magick.  Someone highly capable in the spiritual arts put this here to control Miranda.   \n\n*choice\n #Destroy it.  Set this poor woman free.\n  *set spooky +10\n  *set preservation +10\n  You shatter the plank over your knee, splintering the wood through the center of the glyph.  Miranda reacts immediately, blinking repeatedly as if waking up.  \n\n  \"What...\" she begins, confused.  \"Is that what it appears to be?\"\n\n  \"It was a very strong sigil,\" you explain.  \"And I believe it was placed to contain you.  Will you come with me now?  Your friends are waiting.\"\n  *goto nextch\n\n #Leave and bring it with you.  Always having a magus nearby is sure to come in handy.\n  *set spooky -10\n  *set preservation -10\n  *set haveglyph \"Yes\"\n  You drop the square of wood into a deep coat pocket, a satisfying new weight and shape against your hip. As you step outside into the night, Miranda follows.  \"Where are you going?\" she asks, pleading.  \"I cannot stray too far from that sigil.\"\n\n  \"I am returning to Ottone,\" you say with an ominous grin.  \"And you are coming with me.\"\n\n  *goto nextch\n\n*label nextch\n\n*finish\n\n\n\n\n", "ch9": "The smoke of Philadelphia finally fades from the air, replaced by the lonely cold of a country road.  Miranda walks beside you in silence, making the slightest hint of a sigh from time to time.\n\n\"Let me see that tattoo again,\" she says at last.\n\nYou roll your sleeve up enough to reveal the tiny cherry blossom, and Miranda clucks her tongue.  \"That's all I'm worth?\" she mutters.\n\n*if spooky \u003c 50\n \"You're out aren't you?\"\n *goto doyouhave\n*else\n \"Apparently they had faith in me.\"\n *goto doyouhave\n\n*label doyouhave\n\n\"Do you have any idea why I was in there?\" Miranda asks.  \"That place has an important future.  The man who owns it, he's already a legend.  The Lightning's Master.  Inventor, writer, romantic.  If the Filii Cerasi wants a place in this new world, we must keep the histories of people like him, people who will form the mythology of the States United, pure.\"\n\n\"Pure?  How?\"\n\n\"There are those who would make this nation a place for the followers of Christ only.  They detest anyone who believes differently from them, especially those of us who respect the old magicks.\"\n\n*choice\n #\"What about the glyph?\"\n  Miranda smiles sadly.  \"As I said, our organization is not the only one which understands that this continent's spirit will be changed by the stories which are told about this current conflict.  The hypocrites do not mind the use of magick when it suits their ends.  They were quite ingenious, actually; they trapped me in the very place I meant to be.  Before long I forgot why I was there.\"\n\n  *if haveglyph = \"Yes\"\n   A break in the trees allows a thin moonbeam to reveal Miranda's face to you for a moment, and the cold in her eyes is obvious.  \"One prison to another,\" she says.  \"Now that you are in possession of that glyph, I can never leave your side.  Just know that is you use this boon in a way I do not care for, I will find a way to kill you, though it likely means I too would die.\n  \n   *if spooky \u003c50\n    \"Let us hope it does not come to that.\"\n    *goto ch9end\n   *else\n    \"Have no fear, friend.\"\n    *goto ch9end\n  *else\n   *goto ch9end  \n #\"I do not care to discuss this.\"\n  *goto ch9end\n\n*label ch9end\n\n\"When did you fall in with the Filii?\" Miranda asks, clearly more to distract herself than out of any true desire to know.\n\nYou humor her.  \"A few months ago,\" you say.  \"I was framed for performing witchcraft and Ottone saved me.\"\n\nMiranda takes a sudden interest.  \"Framed?  By whom?\"\n\n\"This I do not know,\" you reply. \"Someone from my town, perhaps.  Or maybe the same people who trapped you.\"\n\nYou spend the rest of the journey in silence.  \n\n*finish\n", "ch_p2_mission": "\nYou and your companion, a seasoned New Guard named Blane, clamber through the rough northern forest. You have been tasked with recovering an item from some kind of camp in the wild mountains of New Hampshire, and after a week or so of travelling along the Merrimac River and through the farms and forests of that colony, you near your destination.\n\nGreene pauses in a clearing, turning his worn face up to the sun. He points through a break in the trees. \"See that? Looks like a man's face, does it not?\"\n\nYou follow his finger and see a massive rock formation which does indeed resemble a human profile. \n\n\"Still secret,\" Blane says. \"No one comes up here.\"\n\n\"And that's where this item can be found?\"\n\nBlane nods and walks off, the tall ferns bending to clear a way for him.\n\n*choice\n #Continue.\n  *goto_scene ch_p2_mission2\n\n", "ch_p2_mission2": "Evening's orange sunlight pours through the leaves as you reach a natural cave in the mountainside. Blane takes his rifle in his hands and winks at you. \"Better safe,\" he says. \n\n\n*if title = \"Scrivener\"\n The cave walls have been carved with runes and symbols, which you identify as wards for protection. You feel them working against you; your chest feels tight, and visions of collapsing rock enter your mind. \n *goto psg\n\n\n*else\n The cave walls have been carved with unidentifiable runes and symbols. Your chest feels tight, and visions of collapsing rock enter your mind. What magicks are at work here?\n *goto psg\n\n*label psg\n\n*if title = \"Greenthumb\"\n The passage opens to a massive candle-lit chamber. A thin strip of riverwater flows from a wall into a pool at the center. Around this shining pool are people in dark dress. They wear blanks masks made from the bark of the various trees native to the region, each with its own fey properties. \n *goto scn\n\n*else\n The passage opens to a massive candle-lit chamber. A thin strip of riverwater flows from a wall into a pool at the center. Around this shining pool are people in dark dress. They wear strange blank masks. \n *goto scn\n\n*label scn\n\nOne of the men holds a pyramid-shaped statuette above his head and begins to speak. \"Spirit of the mountain, we beg your aid.\"\n\nYou recognize the voice immediately: it is Ottone.\n\nBlane kneels and points his rifle at Ottone's arm. \"If this were Loggs Town, we'd kill each one of 'em,\" he mutters. \"Orders are to just wing this one. Got a knack like yours, but for sharpshooting. With your help, no pagan witchery can stop this shot.\"\n\n*choice\n #Call out to Ottone, warning him.\n  The men below hear your cry and turn their eerie masked faces towards you. Blane curses and fires, but Ottone has already started running towards a passage across the chamber. By the time Blane has poured more gunpowder into the bowl, the men are gone.\n   \n  Blane bashes your head with the butt of his rifle and runs back to the cave entrance.\n  *goto failchoice\n \n #Help Blane take the shot.\n  *goto magickhelp\n\n #Use your magick to stop Blane without him realizing.\n  *goto magickstop\n\n*label magickstop\n\n*if title = \"Scrivener\"\n You don't have time for ink and paper, so you scratch a sigil into the wet ground with your fingernail. It's enough to make him miss.\n *goto failure\n\n*if title = \"Greenthumb\"\n Not much grows this far down, so you have to make do with your herb pouch. A pinch of St. John's Wort in the air is just enough to make Blane miss.\n *goto failure\n\n*if title = \"Watcher\" \n You've s
