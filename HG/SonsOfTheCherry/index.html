een all this before, of course, and have seen what happens if you kick a pebble against the wall just as Blane fires. It's not much, but the well-timed distraction is enough to make him miss.\n *goto failure\n\n*label failure\nThe men below hear the shot and turn their eerie masked faces towards you. Blane curses and starts to reload, but Ottone has already started running towards a passage across the chamber. By the time Blane has poured more gunpowder into the bowl, the men are gone.\n\n\"Back we go, I suppose,\" Blane says with a sigh.\n\n*finish\n\n*label magickhelp\n\n*if title = \"Scrivener\"\n You take ink, pen, and paper, from your satchel and scratch out a guiding sigil.\n *goto failure\n\n*if title = \"Greenthumb\"\n Not much grows this far down, so you have to make do with your herb pouch. A pinch of dried bittercress in the air helps guide Blane's bullet.\n\n*if title = \"Watcher\"\n \n You've seen all this before, of course, and give Blane the word at the perfect moment.\n\nOttone's forearm explodes in blood, and the masked men bolt for a passage across the chamber before the echoing of the rifle's report has stopped. The pyramid sits on a side, unharmed.\n\n*set haveseal \"Yes\"\n\n*finish\n\n*label failchoice\n\n*choice\n #Try to catch up with Ottone.\n  When you explain what happened, Ottone agrees to take you back. \"You belong with us, and I do hope you can see that more clearly now. I could use you for something, actually,\" he says.\n  *goto_scene ch10\n\n #Forget all this. I'm better off alone.\n  *goto_scene ch13\n\n\n\n\n", "ch_p2_wash": "These poor fools.  The shivering is the only sign some of them are even alive.  The sizzle of a paltry dab of flour and water on a hot plate is the only sound, the wet snow dampening any forest noises.  General Washington's men are poorly supplied and barely trained; this is the army which sets out to defeat the Crown?\n\nWashington is in the largest of the scattering of canvas tents. He is writing a letter and cursing. You stand nearby, ready for action if necessary. Washington does not like to see you perform your art -- indeed, he does not particularly enjoy being around you at all -- but you have heard him tell his officers that he acknowledges your utility. \n\nGeneral Washington is remarkably tall, and appears even larger in the confines of his tent.  He carries himself with grace and strength, and you are surprised neither that he has come so far in life nor that he will have such an auspicious future.  To see him is to trust him, and to want to follow where he leads.  \n\n*if haveseal = \"Yes\"\n\n The pyramid sits on Washington's desk, inert. The general has spent many hours staring into it, entering a fugue of learning. What worked in the empire of Egypt shall work here.\n *goto magic\n\n\n*label magic\n\n*if title = \"Greenthumb\"\n You smell something unusual. Something green. There is someone using your craft nearby.\n\n You peek outside the tent to find the entire camp is asleep.\n\n *goto next\n\n*if title = \"Scrivener\"\n Your fingers trace lines in the fabric of your coat without your command. There is someone using your craft nearby.\n \n Within moments, a brutal ice storm descends on the camp, sending the troops to find any cover they can.\n\n *goto next\n\n*if title = \"Watcher\"\n\n A great white stag crashes into the camp.  The beast snorts and paws the ground, sending up a terrifying amount of frozen earth. The troops scatter, some afraid of being trampled, others grabbing rifles in hope of a warm dinner.\n\n You have seen this magnificent creature in a dream, and in the dream dangerous people followed him.\n\n *goto next\n\n*label next\n\nA figure steps through the empty camp, a woman in a green cloak. Complicated tattoos cover her bare right arm.\n\nShe walks directly up to Washington, a loaded pistol in her hand.  \"George Washington, I am here to make an accounting for Loggs Town,\" she says, a darkness taking hold of her features.\n\nWashington rises, ignoring the weapon.  \"I spent some time in Loggs Town, yes,\" he says.  \"What offense did I commit to you there?\"\n\n\"You ordered an attack on a group of innocents.\"\n\nA humorless smile of recognition reaches the General's eyes.  \"Ah. You must be one of Ottone's cohorts. Those people were no innocents.  Witches and worshippers of the Devil. They were in the midst of some dark ritual.\"\n\n\"The raising of a tree,\" Miranda counters.  \"They were planting a cherry tree in the forest, nothing more.\"\n\n*choice\n #What is this about?\n  *set preservation -5\n  *goto growl\n #You do not deny it then?\n  *set preservation +5\n  *goto growl  \n\n*label growl\nMiranda growls, barely controlling her rage.  \"He ordered the assassination of members of the Filii Cerasi. When he was a puerile, ambitious fool.  And what did they give you, murderer?  Did you attack those people to further your career?\"\n\n\"Do not be coarse,\" Washington says. \"We are building a new civilization here. A civilization of Reason. For the first time in history, a nation will be built not on superstitions or the power of corrupt ancient families, but on equality and representation. The Christian religions are completely democratic; we are all the same in God's eyes.\"\n\nMiranda does not lower the pistol. \"All except those who see the spirit in the forest and not in some old black book,\" she says. \"Did you do it, Washington?  Did you try to chop down the Sons of the Cherry as they planted a sacred tree?\"\n\nWashington smiles, browned teeth bared. \"I cannot tell a lie.\"\n\nMiranda takes a deep breath.\n\n*choice\n #Stop her.\n  The new America must be forged. No time for magicks here -- you lunge forward and grab the woman's forearm just as she fires, sending the bullet harmlessly through the side of the tent. Washington's sword is drawn and pointed at her throat.  \"Leave this place,\" he commands.  \"Leave and tell your friends to stay in the shadows if they want to survive. Let her go.\"\n  *goto yessir\n #Let her kill the evil cad.\n  Washington would build a world in which your kind are reviled. He takes a step back and reaches a hand towards you, asking for aid. The tent fills with sound and smoke, and by the time your senses return Washington is face-down in the snow. The woman is gone.\n  *goto finalchoice\n\n*label yessir\n\nYou let the witch skitter away. Who knows what her dark band will do to her for her failure. Either way, your decision has kept Washington alive. As the woman disappears into the thick forest, he turns to you with a sneer.\n\n\"There will be no place for her in our new nation,\" he says. \"Stay with the New Guard, and you shall have purpose.\"\n\nWhat have you agreed to? An America in which your kind are hated? A democracy in which only some may participate? How may things have been different, both for you and for the nation, if you had made other choices? \n\n*goto_scene ending\n\n*label finalchoice\n\nYou have allowed Ottone's agent to kill George Washington, a man who would have been vital in the forging of this new nation.  How shall your story end?\n\n*choice\n #I shall join Ottone. His deception had good intentions.\n  *goto sotc\n\n #I shall return to the New Guards. \n  *goto ng\n \n #I shall go it alone henceforth.\n  *goto alone\n\n\n*label sotc\nWhen you explain what happened, Ottone agrees to take you back. \"You belong with us, and I do hope you can see that more clearly now. Washington needed to pay for his crimes, and his elimination shall make our task easier. I look forward to making use of your services again.\"\n\nWhat have you agreed to? A secret war of the occult?  How may things have been different, both for you and for the nation, if you had made other choices? \n\n*goto_scene ending\n\n\n*label ng\nThe New Guards need not know what happened in the forest. Perhaps you will be able to do some good for your kind from this position. At the very least, you will be safer in this new American nation.\n\nBut how may things have been different, both for you and for the nation, if you had made other choices? \n\n*goto_scene ending\n\n\n*label alone\n*goto_scene ch13", "ch_p2_washsetup": "The New Guards meet in a Philadelphia tavern, by all appearances just another group of thirsty patrons. \n\n*if haveseal = \"Yes\" \n *goto gotit\n*else\n *goto ng\n\n\n*label gotit\n*if spooky\u003c50 \n You place the brass pyramid on the table in front of the other men with a sinister glare. \"So what is it?\" you ask.\n *goto vision\n*else \n You place the brass pyramid on the table in front of the other men with a smile. \"Had a bit of excitement, but we got it. So what is this thing?\" you ask.\n *goto vision\n\n*label vision\nOne of the men places a hand on one of the statue's faces. The peak begins to glow with a faint yellow light. The light draws you in, warms you. You see a river dotted with sails. Fields of corn. A great city of painted stone built up from a desert land.\n\nThe vision stops. \"The wisdom of the pharoahs is contained in this artifact,\" the man says. \"Great leaders whose empire lasted for countless centuries. Through this, you can see what they saw, how they kept their civilization strong and vital. The leaders of our new nation would do well to see what this eye to past will show them.\"\n\n*goto welcome\n\n\n*label ng\n\nThey are disappointed to not have the artifact, and putative plans for another mission are made.\n\n\n*label welcome\n*set status \"New Guard\"\n\nThe elder from the Silent Bridge raises a pewter tankard to you. \"Welcome to the New Guards. We sent you along with Blane to test your loyalty, and there can now be no doubts. Now, it is time we told you about Keitch.\"\n\n\"Keitch?\" The man who framed you. How could they know about him?\n\n\"Ottone told you that your pastor framed you as witch, yes? But what sense does this make? If Keitch thought you to be in alliance with the architect of Original Sin, he would simply call you out, would he not?\"\n*if preservation \u003c 50 \n\n \"What are you saying?\"\n\n\n *goto thenwhy\n*else\n\n \"If he thought it was for the good of the community, I suppose he would,\" you say.\n\n\n*label thenwhy\n\"Then why,\" the elder asks, \"would he go through all that trouble? Kidnapping some poor girl and leaving her in the woods? No, this was done by someone who wanted you to be at risk, alone in the world. Ottone knew that if you were accused of witchcraft, you would need aid to survive. It is a recruitment method we have seen him make use of in the past.\"\n\nOttone. That over-dramatic fiend. \n\n\"The next task awaits. Your assignment is to act as General Washington's personal bodyguard. Our Watchers have seen his future, and we must ensure his safety.\"\n\n*finish", "ch_plot2": "More secrets. You have to assume that divining the location of this \"silent bridge\" is some sort of test. \n\n\n*if title = \"Greenthumb\"\n The trees turn the undersides of their leaves upwards at your bidding, forming a grass-green path for you to follow.\n\n*if title = \"Watcher\"\n You stare into a bowl of water for an hour before a road marker appears in your mind's eye.\n\n*if title = \"Scrivener\"\n A few minutes with a map, a candle, some ink, and the odd runes of your art allows you to determine the precise spot.\n\n\nThe northeastern colonies build roofs over their bridges, forming unnatural tunnels along any path. With the stern granite peaks and the ubiquitous cover of the trees, sky is at a premium in New England.\n\n\"Silent Bridge\" seems a bit of an oxymoron as you approach; A river roars and hisses beneath it loud enough for you to hear it a half-mile off. Picking your way through the starlit forest, you see the outlines of a few men leaning against one of the latticed walls. You cannot hear them speak over the sound of rushing water, even as you reach the bridge's entrance.\n\n*choice\n #Walk right up to them.\n  *goto meet\n\n #Keep to the shadows.\n  *if spooky \u003c 50\n   Creeping along the wall, you hear a few words. \"Initiate.\" \"Sin.\" \"General.\"\n   One of the men tilts his head toward you.\n\n   *goto meet\n\n*label meet\n*set metnewguards \"Yes\"\nThe men wear smart dress, but with buttons and buckles of a dark metal instead of brass. Each wears an identical tri-corned hat without embroidery or decoration. They have the bearing of military men -- actual regulars, not the ragged band the papers call \"Washington's army\". The man who delivered the invitation to you is among them.\n\n\"Well met by moonlight, friend,\" the eldest man says. His deep voice rises above the thrashing of the river. \"If I may call you 'friend'. Be sure that we wish such of you.\n\n\"My fellow agents and I would like to offer you an opportunity to use your rare abilities for good. Yes, we know who you are and know of the dark arts you employ. Too many men of our kind fall prey to Man's baser, selfish desires. Yet how can one pursue happiness when one's brother suffers?\n\n\"To work with us is to use your gifts for the betterment of all. As Washington fights to form our new nation, he gathers a group of men skilled in the weird arts to combat the witches who would use their evil gifts for themselves. We are the New Guards, and we would have you among us.\n\n\"There is a particular task with which we would ask your help. Something has been stolen from us, and we would like it returned. If you succeed, there will be a place for you at our table.\" \n\n\n*choice\n #\"I shall do as you ask.\"\n  *goto_scene ch_p2_mission\n\n #\"This is not my first offer.\"\n  *goto ForG  \n\n #\"I'm looking for a man who framed me. I will help you if you aid me in finding him.\"\n  The elder smiles. \"We are not deaf to the needs of our agents. If your personal wishes align with the greater goal, we shall help you.\"\n  *goto_scene ch_p2_mission\n\n\n*label ForG\n\"Mmm. Ottone's little band,\" the man says. \"We cannot offer you than they can, except perhaps the safety of your eternal soul.\"\n\n*choice\n #\"I shall take up with him, I believe.\"\n  *goto Fgo\n\n #\"I shall do this task for you.\"\n  *goto_scene ch_p2_mission\n\n\n*label Fgo\nYou walk away, wondering if these New Guards will let you be now that you are aware of them.\n*set metnewguards \"Yes\"\n\n*if beentohouse = \"Yes\"\n *goto_scene ch13\n\n*if failedinphilly = \"Yes\"\n *goto_scene ch10\n*else\n *goto_scene ch3\n\n\n", "choicescript_description": "Espionage and arcane magic in the American Revolution. Choose a side or go it alone in the secret war for the soul of the new nation. Use multiple magic disciplines to reach your goals and change history. Part of the Waking Cassandra series.\n\n[i]The Sons of the Cherry[/i] is a 15,000-word interactive novel by Alex Livingston. It's entirely text-based, without graphics or sound effects, and fueled by the vast, unstoppable power of your imagination.", "choicescript_stats": "This is who you are.\n\n*stat_chart\n text Title\n text Status\n opposed_pair Spooky \n  Sunlit\n opposed_pair Preservation \n  Altruism\n opposed_pair Physicality \n  Intellect\n\n", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n  *purchase adfree $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Remove Advertising[/b]\n\n  Remove in-game advertisements and delay timers.\n\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]The Sons of the Cherry.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing! This game is part of the Waking Cassandra series.  If you are interested in related content, please go to http://wakingcassandra.weebly.com\n\n*ending", "screenshots": "screenshots\n*script window.animateEnabled = false;\n*page_break\n\n*script changeBackgroundColor(\"sepia\")\n\nYou wipe the spittle from your face with your sleeve and sit back down on the jail cell's bed.  The girl's mother storms out, sated that she has abused her child's kidnapper enough for today.\n\nNow that she's gone you can get back to your nap.  You had been in the middle of a dream in which you were wandering in a cave, lost.  A raccoon appeared with a torch... and then you woke up to someone screeching at you.\n\nJail might not be so bad, come to think of it.  At the very least it would keep you from General Washington's war.  As if there was any chance of a few farmers defeating the greatest military force the world has ever known.  It takes more than a declaration.... \n\n\"...to make a nation independent.\"\n\nYou sit up with a start and see a man standing on the other side of the bars.  He is dressed like the villain in an opera, flowing black coat and a black masque around his eyes.  \n\n\"I... I'm sorry,\" you blurt.  \"I was just thinking out loud.\"\n\n\"No, you were not,\" the man says.  \n\n\"Do I know you?\"\n\n\"Perhaps.  Do you recognize me?  From one of your dreams?\"\n\nNow how would he know that about you?\n\n*set title \"Watcher\"\n*set spooky 30\n*set preservation 75\n*set physicality 25\n*fake_choice\n\t#\"What do you want from me?\"\n\t#\"Why don't you stand a little closer, where I can reach you?\"\n\n*script changeBackgroundColor(\"black\")\n\nEvening's orange sunlight pours through the leaves as you reach a natural cave in the mountainside. Blane takes his rifle in his hands and winks at you. \"Better safe,\" he says.\n\nThe cave walls have been carved with unidentifiable runes and symbols. Your chest feels tight, and visions of collapsing rock enter your mind. What magicks are at work here?\n\nThe passage opens to a massive candle-lit chamber. A thin strip of riverwater flows from a wall into a pool at the center. Around this shining pool are people in dark dress. They wear blanks masks made from the bark of the various trees native to the region, each with its own fey properties.\n\nOne of the men holds a pyramid-shaped statuette above his head and begins to speak. \"Spirit of the mountain, we beg your aid.\"\n\nYou recognize the voice immediately: it is Ottone.\n\nBlane kneels and points his rifle at Ottone's arm. \"If this were Loggs Town, we'd kill each one of 'em,\" he mutters. \"Orders are to just wing this one. Got a knack like yours, but for sharpshooting. With your help, no pagan witchery can stop this shot.\"\n\n*set title \"Watcher\"\n*set spooky 80\n*set preservation 25\n*set physicality 77\n*fake_choice\n\t#Call out to Ottone, warning him.\n\t#Help Blane take the shot.\n\t#Use your magick to stop Blane without him realizing.\n\n*script changeBackgroundColor(\"sepia\")\nYou wander in the direction of the voice. Before long you see a child crying on the ground. The poor little one must be lost.\n\n\"What is the trouble?\" you ask in the kindest voice you can manage. \"Can I help you?\"\n\nThe child turns towards you, revealing a network of dark symbols scratched into her face. Her ankles and wrists have been tied with some kind of vine. The eyes have neither pupil nor cornea, and an ichorous fluid pours from the mouth. It screeches at you, an unnatural sound, high and pained.\n\nThrough no small effort, you suppress the urge to run. It's just a little girl.\n\nThe tormented girl collapses, and you move to help. She is quite passed out; drugged, perhaps. You remove the vines and chafe her wrists in an attempt to wake her.\n\nThis girl, this moment... you remember it. A dream? A daydream? Either way, you think you may know what's going to happen next. Men with guns.\n\n*set status \"Associate\"\n*set title \"Watcher\"\n*set spooky 50\n*set preservation 80\n*set physicality 25\n*fake_choice\n\t#Time to make your exit. Whatever is happening to this girl, it's beyond your ken and doesn't exactly seem normal.\n\t#You must stay with this girl. She's helpless here, no matter what her appearance and behavior.\n\nProbably for the best. As you head for home, though, the voice gets louder. Before long you see a child crying on the ground. The poor little one must be lost.\n\nTempted as you are to leave the child be -- it could have some sort of disease, after all -- you clear your throat and wait for a response.\n\nThe child turns towards you, revealing a network of dark symbols scratched into her face. Her ankles and wrists have been tied with some kind of vine. The eyes have neither pupil nor cornea, and an ichorous fluid pours from the mouth. It screeches at you, an unnatural sound, high and pained.\n\nFascinating. Startling, but fascinating.\n\nThe tormented girl collapses, and you move to help. She is quite passed out; drugged, perhaps. You remove the vines and chafe her wrists in an attempt to wake her.\n\nThe symbols on her face... you recognize them. Some distant memory of a few lines etched somewhere. That and you were just doodling the same shapes in your sketchbook....\n\n*set title \"Scrivener\"\n*set spooky 30\n*set preservation 20\n*set physicality 75\n*fake_choice\n\t#Time to make your exit. Whatever is happening to this girl, it's beyond your ken and doesn't exactly seem normal.\n\t#You must stay with this girl. She's helpless here, no matter what her appearance and behavior.\n\nMiranda jumps at you, tearing at your throat and trying to displace you with her considerable strength. She shoves you away several times, but eventually you manage to get the board loosened.\n\nAs soon as the floorboard is pried free, Miranda stops abruptly. Something beneath it enamors her. No... it's something on the bottom side of it. You brush off the cobwebs and dirt to reveal an intricate glyph burned into the wood and chased with some kind of pigment.\n\nYou can feel the Scrivener's hand moving over the wood, expertly crafting this advanced symbol. The skill is far beyond you, and a mix of jealousy and terror knots itself behind your navel.\n\nThis is powerful magick. Someone highly capable in the spiritual arts put this here to control Miranda.\n\n*set status \"Son of the Cherry\"\n*set title \"Watcher\"\n*set spooky 35\n*set preservation 25\n*set physicality 87\n*fake_choice\n\t#Destroy it. Set this poor woman free.\n\t#Leave and bring it with you. Always having a magus nearby is sure to come in handy.", "startup": "*title The Sons of the Cherry\n*author Alex Livingston\n\n*scene_list\n  startup\n  ch1\n  ch2\n  ch3\n  ch4\n  ch5\n  ch6\n  ch7\n  ch8\n  ch9\n  ch10\n  ch11\n  ch12\n  ch13\n  ch14\n  ch_plot2\n  ch_p2_mission\n  ch_p2_mission2\n  ch_p2_washsetup\n  ch_p2_wash\n  ending\n\n\n\n*create title \"none\"\n*create status \"Unawakened\"\n*create spooky 50\n*create sunlit 50\n*create preservation 50\n*create altruism 50\n*create physicality 50\n*create intellect 50\n*create savedmiranda \"N\"\n*create haveglyph \"N\"\n*create metnewguards \"N\"\n*create beentohouse \"N\"\n*create failedinphilly \"N\"\n*create haveseal \"N\"\n\n*if not(choice_is_web or choice_is_steam)\n  *temp skip_description\n  *config skip_description false\n  *if skip_description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and (not(choice_purchased_adfree) and not(choice_is_web))\n  This game is supported by advertisements, but you can buy the unlimited version\n  to turn off ads forever.\n\n  *purchase adfree $4.99 purchased\n  *page_break_advertisement\n\n*label purchased\n\nThe loamy smell of leaves on dirt pervades this place, a tiny clearing deep in the woods...\n\n...but before we begin, a few questions.\n\nWhat color shirt are you wearing?\n*choice\n #Black\n  *set spooky -20\n  *goto hornet\n #Red  \n  *set spooky -10\n  *goto hornet\n #Blue \n  *goto hornet\n #Green \n  *goto hornet\n #Yellow \n  *set spooky +10\n  *goto hornet\n #White\n  *set spooky +20\n  *goto hornet\n\n\n*label hornet\nA hornet lands on your hand.\n*choice  \n #Slap at it before it bites you.\n  *set preservation -25\n  *goto job_pick\n #Let it fly off. \n  *set preservation +25\n  *goto job_pick\n \n*label job_pick\nWhich do you prefer?\n*choice\n  #Moss. I am a Greenthumb, and use the natural world to work my magics.\n   *Set title \"Greenthumb\"\n   *goto brainbrawn\n  #Water. I scry the future, a Watcher.\n   *Set title \"Watcher\"\n   *goto brainbrawn\n  #Ink. Sigils and arcane signs are my trade. Call me Scrivener.\n   *Set title \"Scrivener\"\n   *goto brainbrawn\n\n\n*label brainbrawn\nYou have been here before.  How did you find the place today?\n*choice\n  #I walked until I recognized it.\n   *set physicality -25\n   *goto endch1\n  #I have the way memorized.\n   *set physicality +25\n   *goto endch1 \n\n*label endch1\n\nNow, then. Where were we?\n\n*finish\n", "traitordeath": "*choice\n #Continue\n  *goto scn\n\n*label scn\n\nA few hours later, you are standing in the snow with three other men.  Deserters.\n\n\"The old man needs to make an example,\" one of the doomed explains.  \"Keep the others from trying to escape this hell.\"\n\nThe rest of Washington's army gathers around, the general himself standing by a line of soldiers.  They're armed.\n\nWith a flare and a pop, your life is taken. You die without fully understanding the mysteries this tale has present to you.\n\n\nHow may things have been different, both for you and for the nation, if you had made other choices? \n\n*choice\n #Continue\n  *goto_scene ending"}};
