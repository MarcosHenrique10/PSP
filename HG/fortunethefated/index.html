 a gift or a burden, a wonderful destiny or a doomed duty? \n\nAnd honestly, if you are fated to be hated and feared for who you are, should you just embrace that? Or should you try to change the narrative?\n\n*page_break\n\nThese are the questions you ask yourself every day, underneath all the taunts and triggers. \n\nThese are the questions you know you must answer as a growing person…\n\nBut so often, you find yourself unable to grasp any of the answers.\n\nThis is the familiar swirl you spiral down as Brit enters your room. You know she is here to check on you. Boris likely sent her, because conversation isn't his strongest suit. You know you can trust Brit, or at least trust her more than anyone else in your life.\n\nBut what you [i]know[/i] and how you [i]feel[/i] don't always seem to get along.\n\n*page_break\n\n\"I know you probably want to be alone right now…\" Brit begins, dripping with hesitancy.\n\nYou sigh. Even Brit fears your wrath, on some level. How could she not? \n\nAfter all, Brit's mother is one of the most famous heroes in Blende's history: the legendary and beloved Proudest, master of bombastics and barricades. \n\nSometimes you think Brit is your friend just to play into her rebel-against-thy-mother routine, and others you think she is just drawn to your power. Brit is fiercely ambitious herself, aiming to eclipse her mother's career as a hero of Blende.\n\nThen again, being your friend doesn't exactly come with many other perks. You're probably being too hard on Brit, but trusting people's intentions doesn't exactly come easily to you…\n\n*page_break\n\n\"I wanted to check on you. And…\" Brit tries, trailing off again.\n\nWhen she doesn't actually finish, once again your emotions flare.\n\nPeople really shouldn't ever leave you to fill in their blanks.\n\n*choice\n\t#\"And you wanted to make sure I didn't hurt or destroy anything,\" I spit. [i](Gain Powerful, Reckless)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\n\t\tYou hate that you always feel threatened, even by your friends.\n\n\t\tBut then again…\n\n\t\tThat's probably only because they also seem to feel so threatened by you.\n\t\t*goto eightinterrupt\n\t#\"And you needed to summon me for the finals grade panel, to collect the gold star I won you,\" I spit. [i](Gain Powerful, Responsible)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\n\t\tYou already know that Brit cares about her grades and living up to her mother's heroic legacy more than just about anything else…\n\n\t\tIncluding you, her supposed best friend.\n\n\t\tIn this moment you're just a means to an end, one Brit needs to keep happy.\n\t\t*goto eightinterrupt\n\t#\"And you feel bad for pitiful little me, who stole your thunder once again,\" I mumble. [i](Gain Powerless, Reckless)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\n\t\tBrit thinks you can't see how much she pities you…\n\n\t\tJust like she thinks you can't tell how jealous she is of your power.\n\n\t\tBrit needs you, to keep up her grades and the heroic legacy of her mother.\n\n\t\tYou just wish she needed you because you're her best friend, nothing more or less.\n\t\t*goto eightinterrupt\n\t#\"And you need something from me,\" I sigh back. [i](Gain Powerless, Responsible)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\n\t\tYou know Brit is your friend, truly.\n\n\t\tBut if someone doesn't hate you just for being born the way you were, they seem to want to leverage your strength to get something they need.\n\n\t\tPeople can't help themselves. \n\n\t\tEven people who are your true friends. \n\t\t*goto eightinterrupt\n\n*label eightinterrupt\n*page_break\n\nYour conversation—if you can even call it that—is suddenly interrupted as a dark green light flashes outside in the dorm courtyard.\n\nAt first you think it's just your emotion flaring in your vision, seeing literal green. But Brit seems to see it too.\n\nSo you both rush to the window.\n\nAnd you don't know how to describe the sights you see below.\n\n*page_break CHAPTER III\n\n[b]CHAPTER III[/b]\n*line_break\nYour brain struggles to make sense of what you see in the courtyard—which is really saying something, for someone who is used to bending reality itself. \n\nOnce the forest-green light fully dissipates, it leaves a gathering of ten beings, not a single one remotely like the others. Immediately, two of these beings break away and stride toward the exit gate: a rugged soldier-witch in robed fatigues sporting a jade facial scar, and a portly man wearing a vest made of interlocking technology.\n\nYou tense, seeing this man. So does Brit beside you at the window. \n\nYou might not know who most of these mysterious visitors are, but you do recognize that the portly vested man is The Native, one of the most infamous domestic terrorists from your home planet, Blende.\n\n*page_break\n\nThe Verses Galaxy is vast and wide and filled with thousands of planets. Not all of these planets are aware of life beyond their own worlds, but your former home Blende serves as a central hub for all those who have joined the interplanetary community of the Galactic Council. \n\nThis means you're quite used to the idea of aliens—and are quite used to encountering them. However, given the brand-new status of Distopia as a recently settled refuge planet, your leadership has established a period of strict anti-alien intrusion laws. This Disrep-only policy has been enforced on a temporary preliminary basis, so your people can properly heal, build, and begin to establish your own culture.\n\nAll of this means that this obviously alien gathering must be illegally trespassing. And that, arriving the way they have, they must intend to do harm—in the Distopia Academy student dorms, no less.\n\nEspecially because one among this gathering—a tall womanly creature with seafoam skin and the biggest sword you've ever seen—points directly up to the window where you and Brit stand.\n\n*choice\n\t#Turn to Prouder and nod. I'm going to enhance and protect her, then drop her on the gathering like a human explosion. [i](Test Prouder or Destructive. Gain Enhancement)[/i]\n\t\t*if (prouder > 80) or (destructive > 50)\n\t\t\t*set enhancement +4\n\t\t\t*set potency +2\n\t\t\t\n\t\t\tProuder nods right back at you. \n\n\t\t\tIt's a potent reminder that when the chips are down…\n\n\t\t\tYou two can always count on one another.\n\n\t\t\t[i](Boosted Bonus Enhancement, Potency)[/i]\n\t\t\t*goto leadersarrive\n\t\t*else\n\t\t\t*set enhancement +2\n\t\t\t*set potency +1\n\t\t\t\n\t\t\tHowever, Prouder shakes her head back at you.\n\n\t\t\tIt's yet another sign she doesn't trust you fully.\n\n\t\t\tThen again, you guess most people wouldn't leap at the idea of being turned into your living weapon?\n\n\t\t\t[i](Gained Enhancement, Potency)[/i]\n\t\t\t*goto leadersarrive\n\t#Hack The Native's tech vest to activate his signature drone weaponry in max-attack mode. [i](Test Constructive or Unleash. Gain Technology)[/i]\n\t\t\n\t\tThe Native is rumored to have the sharpest-edge technology in this entire galactic quadrant.\n\n\t\tYou cannot wait to get your spellcrafting hands on that kind of tech.\n\n\t\t*if (destructive \u003c 50) or (unleash > 50)\n\t\t\t*set technology +4\n\t\t\t*set potency +2\n\t\t\t\n\t\t\tLuckily, your constructive unleashing skills are perfectly prepared for this moment. The robotics on The Native's vest begins to awaken, as you reach out to them with your subtle spell-touch.\n\n\t\t\t[i](Boosted Bonus Technology, Potency)[/i]\n\t\t\t*goto leadersarrive\n\t\t*else\n\t\t\t*set technology +2\n\t\t\t*set potency +1\n\t\t\t\n\t\t\tHowever, your constructive unleashing skills are a little shaky…\n\n\t\t\tEnough for The Native to immediately sense what you're up to and move to stop you.\n\n\t\t\t[i](Gained Technology, Potency)[/i]\n\t\t\t*goto leadersarrive\n\t#Talk before attacking, but let these intruders know who here is boss. [i](Test Powerful or Responsible. Balance Belonging-Independence)[/i]\n\n\t\t\"I don't know who you think you are, waltzing in here like this,\" you begin.\n\n\t\t\"But you're trespassing on a private planet, so you'd better have a flirping good explanation.\"\n\n\t\tThe gathering turn to one another, considering your words…\n\n\t\t*if (powerful > 55) or (reckless \u003c 45)\n\t\t\t*set belonging 50\n\t\t\t*set becoming +4\n\n\t\t\tAnd actually seeming to respect your authority?\n\n\t\t\t[i](Boosted Bonus Becoming. Balanced Belonging-Independence)[/i]\n\t\t\t*goto leadersarrive\n\t\t*else\n\t\t\t*set belonging 50\n\t\t\t*set becoming +2\n\t\t\t\n\t\t\tBut they don't exactly seem to quake under the weight of your authority.\n\n\t\t\t[i](Gained Basic Becoming. Balanced Belonging-Independence)[/i]\n\t\t\t*goto leadersarrive\n\n*label leadersarrive\n*page_break\n\nBefore anyone can move another muscle, everyone's attention is turned upward. Then everyone's hands raise to cover their respective ears as a familiar grating sound slices through the courtyard. \n\nThese trespassers might not know what this signature sound signals, but everyone on Distopia certainly does…\n\nIt heralds the arrival of your Prime Administrators, Tellie and Disreguardian. \n\nTellie, born with the galactically rare power to create portals, is the one making this unnatural shearing noise. Others always say they hate the sound of Tellie's portals, which feel like reality ripping itself open. \n\n*fake_choice\n\t#But I actually find the sound of things breaking quite comforting.\n\t\tIt's music to your ears, mostly.\n\t#But I love Tellie's portals because teleporting is one power area I've never been able to access. \n\t\tSo the rare portals that Tellie can create always fascinate you.\n\t#Mostly, I just like the sound because Tellie happens to be my personal hero.\n\t\tShe is exactly the kind of person you want to grow into, for about a hundred reasons.\n\t#Mostly, I just like the sound because Tellie happens to be the closest thing I've ever had to a mother.\n\t\tReally, she is more like a mentor or a big sister. But still, she is one of the few people whom you respect, because she is one of the few people to actually look at your power as potential.\n\nHowever, as usual, it's Disreguardian who strikes first. For her, seeing trespassers on this sacred land always warrants attacking first and asking questions later. \n\nAs she drops gracefully to the ground, two of her signature psychic-bond weapons appear from her amputated arms: the squall mallet and the force mace. She hurtles both at the unwelcome gathering, her ponytail-hawked hair slapping against her brown-and-orange bodysuit.\n\nThe trespassers move to defend themselves, but it turns out they don't need to. Disreguardian's weapons sail into one of Tellie's portals with a shorn slicing…then out of another portal that faces the ground.\n\nEveryone turns to Tellie with bewildered looks, but a calm understanding shines from her glowing emerald eyes.\n\n*page_break\n\nImpossibly, this entire alien gathering holds still, with all eyes on Tellie. She and Disreguardian share equal power as leaders, but everyone usually defers to Tellie. She just radiates with warmth and wisdom, from the clean lines of her tailored linen suit to her collection of rare galactic jewels, Tellie inherently commands consideration.\n\nThat, and she wears the experiences of her many lives on her tattooed arm-sleeve. Raising her right arm now, Tellie points to one tattoo in particular, at the base of her wrist: two interlocking Vs. \n\nOf all Tellie's storied accomplishments, this is the most impressive: being Reborn from planet Versus, the mysterious gladiatorial crux that seems to produce the Galaxy's foremost thought leaders.\n\nTellie could point to that tattoo to gain authority on any grounds, but you guess she does so now for a more specific reason. It's the first clue as to who these surprise trespassers might be. \n\n*page_break\n\nAs your senses return to normal in this stillness, you realize an audience of other students has gathered in the courtyard windows. Most of them are supposed to be at their respective finals, but obviously word of this dorm drama has spread quickly.\n\n\"Thank you, Tellie,\" one of the trespassers says, a gray woman with bulbs of light nestled in her mane of white curls. \"We hoped we might encounter you first upon our arrival here. We understand you've enacted strict immigration and visitation laws for Distopia.\"\n\n\"[i]We[/i] have done so, together,\" Disreguardian snaps, her psychic weapons now floating at her sides. \"Not one of you is welcome here, but especially not you.\"\n\nDisreguardian speaks directly to an older woman in the center of the gathering—a woman you instantly recognize as Chalice, of the infamous Arcana Four. She is one of the few Disreps to leave your kind behind and seek additional power in the Galaxy beyond. This makes Chalice quite a…controversial figure among Disreps.\n\n*page_break\n\n\"Wonderful to see you too, Mathilda, oh mighty Disreguardian,\" Chalice replies. \"I do love what you've done with the place.\"\n\n\"Ladies, we have an audience,\" Tellie interrupts, before Disreguardian can respond. \"Disreguardian, your concern is warranted and noted. But if you'll allow it, can you trust that I know this particular group must come in peace. And for a good reason?\"\n\nDisreguardian frowns, crossing her arms. But she does not challenge Tellie further…for now.\n\n\"If we didn't come in peace, you'd already be leveled,\" a new voice speaks from the gathering. It belongs to a young man who looks like some kind of model, groomed and coiffed to unsettling perfection.\n\n*page_break\n\n\"Forgive us,\" another voice speaks immediately—one belonging to the sworded seafoam woman. \"Some of the newbies still follow the 'destroy unto rebuild' Destructive mantra a bit too over-zealously.\"\n\nTellie's entire face changes hearing this woman. It's almost as if she is dying to say [i]like I'd ever trust a word you have to say.[/i] But Tellie holds her tongue, probably for many reasons. \n\nStill, by now, one notion has become crystal clear.\n\nThis group must have some connection to Tellie from planet Versus.\n\n*page_break\n\n\"I suggest we discuss your business here in private,\" Tellie says, already generating a portal beside the gathering with a disconcerting rip. \"I'll escort you to our capitol building.\"\n\n\"That one must come with us,\" the light bulb lady then says—pointing directly up at you.\n\nTellie's eyebrow raises, hearing this. Distopia's leadership is…familiar with your power set. And your reputation. \n\n\"Why?\" Tellie asks.\n\n\"We will explain what we can,\" the light bulb lady answers. \"But the one named Babe ${babename} Fortune must join us.\"\n\n*choice\n\t#\"What makes you think you can make me do anything?\" I declare. [i](Gain Powerful, Reckless, Independence)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t*set belonging %-5\n\n\t\tThe light bulb lady just stares back at you, seeming to glow a bit more intensely. \n\n\t\tShe then turns to Tellie, who nods.\n\n\t\t\"${babename}, might you join us?\" Tellie asks. \"I'd consider it a personal favor.\"\n\n\t\tYou sigh. Tellie just pulled the ace card, because you'd do most things she considers a good idea. \n\n\t\tBesides, part of you is deeply curious to see what all this fuss is about…\n\t\t*goto timeforfour\n\t#\"I will join you because I am intrigued,\" I clarify, \"not because anyone commands me to.\" [i](Gain Powerful, Responsible, Belonging)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\t\t*set belonging %+5\n\n\t\tThe light bulb lady just stares back at you, seeming to glow a bit more intensely. \n\n\t\tTellie finds your eye, and she nods at you.\n\n\t\tYou're obviously both deeply curious to see what all this fuss is about…\n\t\t*goto timeforfour\n\t#I know this sounds strange, but seeing this gathering feels like I've suddenly met some bizarre surrogate family. [i](Gain Powerless, Reckless, Belonging)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t*set belonging %+5\n\n\t\tYou already know you have so many questions that need answering about your origins, and about your powers.\n\n\t\tCould this be the start to finding some of those answers? \n\n\t\tThe light bulb lady just stares back at you, seeming to glow a bit more intensely. Tellie finds your eye, and she nods at you.\n\n\t\tYou're obviously both deeply curious to see what all this fuss is about…\n\t\t*goto timeforfour\n\t#I already understand this is something I cannot refuse or escape, as much as I might want to. [i](Gain Powerless, Responsible, Independence)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t*set belonging %-5\n\n\t\tYou already know you have so many questions that need answering about your origins, and about your powers. Could this be the start to finding some of those answers?\n\n\t\tRegardless, you're outranked and outgunned here. \n\n\t\tThe light bulb lady just stares back at you, seeming to glow a bit more intensely. Tellie finds your eye, and she nods at you.\n\n\t\tYou're obviously both deeply curious to see what all this fuss is about…\n\t\t*goto timeforfour\n\n*label timeforfour\n*page_break TO THE CAPITOL\n\nThe capitol building room they place you in is meant for meetings, with a long central table and one wall of glass. Through this glass you can see the remainder of the trespassing gathering, guarded closely by Tellie and Disreguardian. \n\nThe tension between them is still palpable. Disreguardian remains furious about the allowances Tellie has offered, plus the unofficial rank she has pulled. The rage practically rises off Disreguardian's brown skin like steam.\n\nYou feel heightened yourself, half-watched through this partition by the alien gathering. Some of them seem to eye you with interest, some with caution, and some with disdain. All of this you're used to, except for one…\n\nThe most inhumanoid serpentine being among them, who doesn't regard you with the slightest interest at all.\n\n*page_break\n\nYou decide to return your focus to this conference room, since Tellie has allowed two members from this alien gathering to occupy this soundproofed space with you. The reverence Tellie shows her fellow Versian Reborn is both comforting and…chilling. \n\nShe trusts their mission so inherently, she even allowed The Native to depart with that soldier-witch unaccompanied.\n\nTellie finds your eyes once again through the glass wall now and nods. Her meaning is clear. [i]Listen and learn. I'll be right here if you need me.[/i] \n\nThere are few individuals, even among Disreps, whose abilities you respect and admire. Tellie stands tall among them, so you nod in response.\n\n*page_break\n\nBack inside the conference room, your eyes then can't help but fall on Chalice, the infamous Disrep. She takes in her surroundings with casual amusement. You can tell her sleek lavender hair and ice-blue skin are not Disrep traits—these features must have changed when she and the other Arcana Four unlocked their infamously cosmic powers. No one actually knows what Chalice's original Disrep powers are, since she has focused on using only her immense TarotCup water-based abilities since unlocking them.\n\nChalice stands here now with shocking ease and arrogance, given that she and her family might be even more hated on Distopia than you. You have to admit, she looks resplendent in her crisp glacier bodysuit and dark purple boots-and-gloves combo. The metallic silver of her belt gleams under the lights, matching the water molecule emblems on her upper chest.\n\nDespite her confidence, Chalice still seems to defer to the alien gathering's de facto leader, the light bulb lady. You must admit, it's hard not to feel the need to defer to her too. \n\nShe stands nearly eight feet tall, even taller with her wild cascades of light-bulb-strung white hair. Her gray skin catches the light, speckled like stone, and her flowy, pale yellow jumpsuit seems to glow with light all its own. Completing the glow up are additional bulbs that hang from her utility belt and piles of illuminated jewelry.\n\n*page_break\n*set spellodexhunteresschalice true\n*achieve spellodexconstructed\n\nBefore she begins speaking, you decide to cast a new spell. Something tells you that you'll need to keep track of all these new beings you are meeting.\n\nSo you construct a mental catalogue, your \"Spellodex,\" which you can access any time in your Stats screen.\n\n\"Babe ${babename} Fortune, I am Hunteress,\" the light bulb lady begins. \n\n\"Just ${babename} is fine,\" you interject, before this goes any further. You worked too hard for that name to answer to anything else.\n\n*page_break\n\n\"Very well, ${babename},\" Hunteress continues. \"I have been chosen to speak with you here because I am a regent-level sectarian of the yellow shade. Which, if you are unfamiliar with the structure of the shades sects, means that I am one of the highest level trained guides. Though I am told you are quite familiar with the shade energies themselves, via your abilities.\"\n\n\"And I am here because it was assumed you'd relate better to one of your own Disrep kind,\" Chalice adds, a devious grin on her lips. \"I tried to tell them that your people charmingly nicknamed me the Chalice of Malice, and that you're just as likely to despise me. But words of the wise falling on deaf ears and all that jazz.\"\n\nListening to both of these intimidating figures, you know exactly how to respond.\n\n*choice\n\t#\"I have some experience being a despicable Disrep. And the only thing I despise is a crude nickname.\" [i](Gain Chalice)[/i]\n\t\t*set chalice %+15\n\n\t\tAt your response, Chalice's smile shifts. It goes from devious to charmed—and somehow you can tell that does not happen very often.\n\t\t*goto carriesforwardhun\n\t#\"I only recently learned about my connection to the shades, but no one I've met has much personal experience with the organized religion part.\" [i](Gain Hunteress)[/i]\n\t\t*set hunteress %+15\n\n\t\tHunteress nods, resonating a deep sense of respect and understanding. It's…not an experience you're particularly accustomed to.\n\t\t*goto carriesforwardhun\n\t#I flick my wrist and cast a shade-laden spell. I sky-write Chalice's nickname, lit with sunlight and coursing with one emotion: [b]Do not presume to know me.[/b] [i](Gain Shades)[/i]\n\t\t*set shades +4\n\n\t\tAt your response, Chalice's smile shifts. It goes from devious to charmed—and somehow you can tell that does not happen very often. Hunteress simply breathes in, maintaining her patience.\n\t\t*goto carriesforwardhun\n\n*label carriesforwardhun\n\nStill, Hunteress presses forward, a woman obviously on a mission. \"Ordinarily we'd proceed slower to properly orient you, but time is incredibly short. And you're obviously not like most others. So I will relay our situation to you plainly.\n\n\"As you've no doubt gathered, we are Reborn from planet Versus. Those who earn this honor also earn a purpose: to carry out missions of galactic importance. Normally this fact and these missions are kept secret at all costs, but you must know both for a very dire reason.\n\n\"Our Galaxy faces an insidious alien invasion, the likes of which have never been seen before.\"\n\n*page_break\n\nHearing these words, you can't help it. An automatic, primordial panic seizes your insides. You can't hide the streak of fear that breaks across your face. \n\nWhile you might be quite accustomed to interplanetary life [i]within[/i] the Verses Galaxy, intergalactic alien life [i]outside[/i] has never been proven to exist. \n\nBut these two are telling you some foreign race has made first contact? And not just that—they're coming to invade? And you have something to do with it?\n\nYou're used to thinking the unthinkable, but this news makes you dizzy enough to want to pass out. Even Chalice has lost her smirk. \n\nIf these two seem so grim, just how [i]insidious[/i] are these…invaders?\n\n*page_break\n\n\"Your reaction is appropriate, and your restraint is impressive,\" Hunteress continues. \"The powers that be understand an even-keeled reaction like yours will be rare among the thousands of planets comprising the Verses Galaxy. The outbreak of panic will be devastating once news of this invasion reaches the masses. Accordingly, preparations are being made by we few in the know as quietly as possible before the news breaks, to get ahead of this threat in every way possible.\n\n\"So you will understand, as you are drawn into these war preparations, the utmost need for confidentiality. Just as you will understand that you must also not learn the full scope of details at once, for your own protection and for the safety of all.\"\n\nThese are not requests that Hunteress issues. You're not fond of anyone issuing commands, but you can at least begin to understand these mandates. Besides, you're too busy trying to keep up to argue, since Hunteress does not relent in her pace.\n\n\"In fact, not one of us gathered here today actually knows the full scope of details, but we are privileged to know a great deal more than most. This precious intelligence has been gathered at great cost, in order to give our Galaxy a fighting chance. To honor the sacrifices already made, each of us knows only what is required to carry out our work. And you, ${babename}, must know the following.\"\n\n*page_break\n\n\"The invasion we face is from a neighboring Galaxy, named Contest. A parasitic race has conquered the entire Contest Galaxy—every last planet—subsuming all sentient life into their hive mind. \n\n\"The 'Blots,' as they are known, have one relentless imperative: to consume all life in a never-ending expansion. We actually do not know if life beyond our two neighboring galaxies exists—but if it does, the Blots will steamroll it all, if left unchecked.\"\n\n\"What are these Blots like?\" you ask, already sensing Hunteress's displeasure. Too many question-interruptions will not be tolerated, and even fewer will be answered.\n\n\"Enormous zombified slugs with razor-sharp vampiric tusks and sense-overwhelming muck-tar, which completely overwrites everything you are,\" Chalice cuts in. \"Oh look, I made a terrifying little rhyme.\"\n\nChalice's answer might be straightforward, but that only makes it all the more chilling.\n\n*page_break\n\n\"If we perform up to expectations, you will never have to meet a Blot,\" Hunteress adds, noting your alarm. \"Other preparations are being made for this invasion, all via assemblages of Elite Eight warriors collected from across the Verses Galaxy. Our particular assemblage, known as the Destructive Eight, have been given a unique mission of the utmost importance. \n\n\"We've been tasked with unearthing long-lost weapons, unleashing long-dormant power sources, and uncovering long-forgotten ancient spells. All in the hopes of mounting an unimpeachable offense against the Blots.\"\n\nIn the midst of all these world-shattering revelations, your potential purpose here suddenly begins to crystallize. You don't need Hunteress to explain this next part. \n\nThese Destructive Eight likely require your reality-snapping ${babegwitchlock} spell-skills to break these deadly resources free.\n\nAnd the true nature of their \"Destructive\" name—just like the true nature of your powers—does not escape you.\n\n*page_break\n\n\"So you're about to tell me I'm some kind of chosen one?\" you reply.\n\n\"Oh, little ${babename}, that's so cute,\" Chalice chuckles. \"But this is war. You're a weapon, one of mass destruction. And if you forget that for one second, you will be used all the way up.\"\n\nHearing this, you lock eyes with Chalice, trying to match every ounce of her trademark malice.\n\n*choice\n\t#\"Chosen one. Useful weapon. Tired cliché. I already know how to use what people expect from me against them.\" [i](Gain Powerful, Reckless, Independence)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t*set belonging %-5\n\n\t\tChalice looks quite pleased, hearing your proclamation. Meanwhile, Hunteress remains far more…impassive.\n\t\t*goto manythemotivations\n\t#I've always known I was meant for more, meant to belong to something—a cause, a family—larger than myself. [i](Gain Powerful, Responsible, Belonging)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\t\t*set belonging %+5\n\n\t\tYou know everyone probably feels this way on some level, but the reality of the power you possess makes this desire feel even bigger.\n\t\t*goto manythemotivations\n\t#\"I've never had a choice in the way I'm treated. But I'm ready to go after the things I want. And this, I already know I want.\" [i](Gain Powerless, Reckless, Belonging)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t*set belonging %+5\n\n\t\tGiven the scope of your powers, you've always known it's your calling to become a galactic icon. Now it's just time for everyone else to find out.\n\t\t*goto manythemotivations\n\t#They don't understand what my powers can do. I fear the solutions they seek will be worse than the problem. [i](Gain Powerless, Responsible, Independence)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t*set belonging %-5\n\n\t\tHowever, you will not burden them with this reality yet. Besides, you need to maintain enough freedom to act how you see fit, to protect everyone from what you can do.\n\t\t*goto manythemotivations\n\n*label manythemotivations\n\nReally, more than anything, it stuns you how quickly you accept every scandalous and mind-blowing thing you have just been told. \n\nJust like it stuns you how ready you feel to leave, to be a part of this Destructive mission, wherever it may take you. \n\nYou already know there isn't really anything for you here on Distopia. Meanwhile, it feels like [i]everything[/i] potentially awaits elsewhere. \n\nHonestly, it's hard not to feel like every turmoil in your life has actually been preparing you for this [i]exact[/i] this moment.\n\n*page_break\n\nThen you dig a bit deeper beyond this initial reaction. You might already know that you need to do this, but the [i]why's[/i] of it all still seem endless. \n\nTo save lives? To stop an impending war? To make a better name for Disreps? To earn respect? To gain a surrogate destructive family? To become famous and influential? To change the Galaxy forever? To learn how to become omnipotently powerful? \n\nOne of these things could motivate you or all of them could, as a budding hero or villain—or as something far less clear in between. Once again, these considerations lead you to ask the same fundamental questions you've always pondered.\n\nIs there some deeper root to your power, one connecting you to all this in some way you don't yet understand? Do you break things, or do you maybe put them back together?\n\n*page_break\n\n\"If you're here to recruit me, why wasn't I Selected for Versus like the rest of you?\" you ask, internalizing all your other considerations for now.\n\nHunteress looks to Chalice, surprised this is your next question instead of a million more obvious reactions—like asking more about the Blots, or refusing to accept this, or demanding they share more secrets. \n\n[i]Good[/i]. You like surprising people. \n\n\"Who knows,\" Chalice answers. \"Maybe you're too important to risk dying in the deadly Versus gauntlet. Or maybe you're too weak-willed and need eight galactic bodyguards to protect you. Or you're too dangerous and need to be kept in check. Or you're so essential that you need eight mentors to show you the way. Only time will tell.\"\n\n\"Our assemblage and our missions go beyond us Destructive Reborn,\" Hunteress interjects, glaring over at Chalice over her candor. \"There is also a Constructive Eight, tasked with complementary-yet-opposing agendas. The Machi Witch you saw leave the courtyard earlier, Trig, is one among that Constructive group. She was actually the one to escort us to recruit you, but she has her own designated mission involving The Native.\"\n\n*page_break\n*set spellodextrig true\n*achieve encountertrig\n\nNoting that your Spellodex now automatically self-updates with this information in your mental Stats screen, you remain present in the moment.\n\n\"It doesn't bother you that The Native is a known Repo terrorist?\" you ask, knowing what a leading question this is. \n\nThe Native, viewed one way, is a villainous and opportunistic revolutionary. Viewed another, he is a freedom fighter striving for the equality of another oppressed population—the indigenous Repo people of planet Blende.\n\n\"Oh, grow up,\" Chalice answers, before Hunteress can. \"If we're going by such reductive terms, then you're about to join a league of assassins, hunters, murderers, bullies, and thieves. \n\n\"And by reputation alone, you'd fit right in with us as a terrifying freak of nature, yes?\"\n\n*page_break\n\n\"What Chalice means,\" Hunteress interjects again, \"is that we Destructive Eight are, above all else, highly trained agents. And we do what must be done for the greater good, regardless of how we might be perceived.\"\n\nListening to these words, you know Hunteress is right. You also know this same mantra, [i]it must be done for the greater good,[/i] is one often used by heroes, soldiers, despots, and killers alike.\n\n\"But you can consider the broader implications later,\" Hunteress continues. \"For now, time is short and we still must relay the particulars of our mission before we depart. That is, assuming you accept.\"\n\n\"I didn't realize I had a choice whether to accept or not,\" you reply.\n\n*page_break\n\n\"The Galaxy might provide us all keen insight and branched opportunity, but we must always choose the paths forward for ourselves,\" Hunteress answers. \"You always have a choice, ${babename}. \n\n\"However, let me be perfectly clear at this juncture. You could indeed choose to refuse this calling. However, that does not mean we would, in turn, choose to [i]honor[/i] that decision.\"\n\n\"In other words, you'd try to [i]force[/i] me to cooperate?\" you respond, trying not to laugh.\n\nNo one has ever—or will ever—be powerful enough to force you to do anything you don't want to do.\n\n*page_break\n\n\"Will it come to that?\" Hunteress returns, her stony gaze set ablaze with conviction.\n\nYou suppose, really, that's the more important question. And you already have your answer.\n\n\"No, it won't,\" you declare. \"So, tell me…\"\n\nYou then drag your eyes from Hunteress to Chalice, matching their stern determination equally.\n\n\"What comes next?\"\n\n*page_break CHAPTER IV\n\n[b]CHAPTER IV[/b]\n*line_break\nWhat comes next, as it turns out, is actually up to you.\n\nHunteress went on to explain the particulars, or at least the particulars she was enabled to. Apparently, in the months during their post-Versus Reborn Training, the Destructive Eight were \"advised\" on methods to slow, stop, and prepare for this fast-approaching Blot invasion.\n\nYou've been downloaded on all of these preparations and plans, and you've tried to sort them for yourself in more digestible portions.\n\n*label partonemissionreadouts\n*choice\n\t#The [b]first potential mission path[/b] is to learn what became of an ancient \"machine magic\" Machi Witch named Binaria. \n\n\t\tApparently, this Binaria once cast a mega Compuspell to create the only known android sentience in the Verses Galaxy: the Binarians. She did so in a solar system named the Nagoll Rim, which is completely isolated behind a naturally occurring, impenetrable black hole perimeter. \n\n\t\tIn the Nagoll Rim, on Binaria's home planet, humans and androids are locked in a perpetual civil war…\n\n\t\tOne the Binarian androids are winning brutally, to the tune of mass genocide. \n\n\t\tBinaria vanished after casting this spell generations ago, allegedly killed from the strain. However, it is believed she actually went into hiding. Some believe the now-ancient Binaria exiled herself, while others believe she did so to protect the secrets of her master spell—which unleashed so much strife and destruction with its unbridled creative force.\n\n\t\t*page_break\n\n\t\tBut apparently, after a deeply rare and treacherous Galaxy-wide search was conducted, it was proven that the most effective form capable of combating the insidious Blots are actually humanoid-android hybrids: \n\n\t\t\"Binumans.\" \n\n\t\tNow, in order to forge an army of such Binumans, you need to find Binaria and replicate her Compuspell source code.\n\n\t\tWhich means your first potential mission would take you to the galactically unaware gothic crime planet where Binaria is believed to have exiled herself. To uncover Binaria's secret identity, you must become slick urban detectives.\n\t\t*goto partonemissionreadouts\n\t#The [b]second potential mission path[/b] investigates the question of how the Blots found a way to cross and travel through the Galactic Barrier, which is supposed to be physically impossible. \n\n\t\tApparently, not long ago, an exploratory Blot battalion already arrived on the fringes of the Verses Galaxy via an anomalous wormhole. \n\n\t\tThat opening has since been sealed, but Hunteress said that the epic tale of this opening and closing was not one she is permitted to tell—just like she was unable to tell you the full tale of the Binuman army-sourcing search. \n\n\t\tShe just assured you that the intel she summarized so concisely was gained by the most [i]extreme[/i] of efforts and at the [i]highest[/i] of mirrored costs.\n\n\t\tAt any rate, now you all need to find a high-powered vessel capable of replicating the Blots' Galactic Barrier travel, along with an equally high-powered weapon to meet the Blot Armada as it travels towards your Galaxy. \n\n\t\t*page_break\n\n\t\tBasically you need to find a fast ship and a big gun, then an untapped power source to fuel both. \n\n\t\tIf that happens, then some future suicide-mission squad might have a shot of stopping the Blots inside the Galactic Barrier before they arrive in full force. If not, hopefully this future squad can at least fire a very loud warning shot.\n\n\t\tThis ancient, untapped power source is said to be hidden at the heart of a long-secluded paradise planet, one teeming with gemlike artifacts and bright cartoon splashiness. \n\n\t\tPerhaps most fitting of all, unearthing this power will apparently require the completion of some fantastical mythic quest.\n\t\t*goto partonemissionreadouts\n\t#The [b]third and fourth potential mission paths[/b] beyond these initial options are actually viewed as contingency plans.\n\n\t\tThese third and fourth potential contingency paths are extensions that will be entered based on the success rates of the first two missions. \n\n\t\tApparently solving the mystery of the disguised mother-of-machines or completing the Quest to tap the power paradise have been deemed your best bets…\n\n\t\tBut there might be other ways to recreate lost spell scrolls and fuse raw power sources, if need be. \n\n\t\tThese other ways remain \"need-to-know\" for now, but Hunteress hinted that they'd involve winning the Galaxy's most prestigious competitive gauntlet and breaking into uncharted shaded space for a high-speed heist. \n\t\t*goto partonemissionreadouts\n\t#I'm finished downloading the mission debrief.\n\t\t*goto uptoyoubabe\n\n*label uptoyoubabe\n\nHunteress saved one last bit for last, once you had a moment to process. She advised you not to get too caught up thinking too far into the future…\n\nBecause your mind would no doubt remain full deciding [i]which[/i] of these first two mission paths you think is more worthy of pursuing.\n\nSince these mysteries will lead you to obscure places long guarded by powerful protections, you are likely the only one with the abilities to break any ancient safeguards wide open. \n\nAnd as the resident reality-breaker, the choice of which mission path to pursue will be left to you.\n\n*page_break\n\n\"You do realize how ridiculous that sounds, right?\" you say now, as your first response to this debriefing download. \"You're all wizened warriors trained by the fabric of the Galaxy itself. But it's up to me, a student whose only qualification is ripping apart said fabric, to set our course?\"\n\n\"Grace can often appear akin to madness,\" Hunteress answers. \"While some mountains require the boldness and innocence of the youthfully uninitiated to be climbed. Those of us who [i]know[/i] better might not [i]do[/i] this better.\"\n\nTranslation: [i]You're dumb and desperate enough to fall for all of this…but your eyes will also remain the clearest.[/i] \n\n\"However, you have been given us Destructive Eight mentors to guide you,\" Hunteress continues. \"This kind of duality is sown into the way of all things, in the inextricable way of Versus. The experienced and the uninitiated, side by side. We have been given invaluable potential directions, but great mysteries must still be solved. For all Versus has equipped us with, it must also set unseen forces against us. Maintaining balance is…everything.\"\n\n*page_break\n\n\"Right,\" you reply. Parables are nice, but there's something Hunteress doesn't want to tell you outright. \"Let's hear more about these unseen forces, maybe?\"\n\nHunteress sighs. \"We have been given a head start, but we also face a time constraint. I don't know if you've heard, but a galaxy-wide harmonic convergence is approaching, a once-in-a-generation event. If we have any hope of harnessing and equipping the resources we unlock, we must do so using the amplified consonances during this brief window.\n\n\"Time runs short, so the Destructive Eight must split up to pursue four paths concurrently. You, ${babename}, cannot join all four before the harmonic convergence arrives. So you will have important choices to make, in this regard.\"\n\nYou open your mouth to say how absurd this once again sounds, like the Galaxy is setting up a video game adventure instead of properly defending itself.\n\n*page_break\n\n\"These are war games we're playing,\" Chalice then says, like she reads your mind. \"And no, I'm not a telepath. I actually can read emotions, but with you, I don't need to dig very deep beyond your damn face. You should learn to wear a better mask.\"\n\nChalice approaches you, clearly growing tired of this astonishing orientation. She comes close enough that you can smell her, all saltwater and snowfall.\n\n\"The final duality Hunteress dances around is the real kicker,\" she says, staring right into your eyes. \"We are among the very few who know about the Blot invasion. So to the outside Galaxy, we will appear to be loose cannons seeking to unlock vast destructive powers for our own selfish reasons. \n\n\"We might think ourselves the defenders of the Verses Galaxy, but make no mistake: we will be seen—and treated—like despicable villains. Isn't it such fun to be reviled and misunderstood?\"\n\n*choice\n\t#\"I'm completely comfortable with being seen as a villain, for so many wonderful reasons,\" I reply. [i](Gain Powerful, Reckless, Chalice. Lose Hunteress)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t*set chalice %+20\n\t\t*set hunteress %-20\n\n\t\tHearing your words, Chalice offers another self-satisfied smirk. Beside her, however, Hunteress looks far less amused. \n\n\t\tIn fact, she looks somewhat…troubled by your reaction.\n\t\t*goto brightherodarkagent\n\t#\"These galactic powers and secrets must be hidden for a good reason,\" I reply. \"But I believe we must have been entrusted to unlock them for a good reason as well.\" [i](Gain Powerful, Responsible, Hunteress. Lose Chalice)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\t\t*set chalice %-20\n\t\t*set hunteress %+20\n\t\t\n\t\tHearing your words, Hunteress offers the slightest of smiles—almost as if she is somehow proud of you, despite having just met you.\n\n\t\tBeside her, however, Chalice rolls her eyes. Remaining on brand, she seems both bored and annoyed.\n\t\t*goto brightherodarkagent\n\t#\"I've always been seen as a villain, but I know who I am and what must be done,\" I reply. \"Heroes are meant to do better, not to be liked.\" [i](Gain Powerless, Reckless, Chalice. Lose Hunteress)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t*set chalice %+20\n\t\t*set hunteress %-20\n\n\t\tHearing your words, Chalice offers another self-satisfied smirk. Beside her, however, Hunteress looks far less amused. \n\n\t\tIn fact, she looks somewhat…troubled by your reaction.\n\t\t*goto brightherodarkagent\n\t#\"What if, in striving to win, we become more destructive than our enemies?\" I reply. \"What if these things we unleash create terrors worse than these Blots?\" [i](Gain Powerless, Responsible, Hunteress. Lose Chalice)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t*set chalice %-20\n\t\t*set hunteress %+20\n\t\t\n\t\tHearing your words, Hunteress offers the slightest of smiles—almost as if she is somehow proud of you, despite having just met you.\n\n\t\tBeside her, however, Chalice rolls her eyes. Remaining on brand, she seems both bored and annoyed.\n\t\t*goto brightherodarkagent\n\n*label brightherodarkagent\n\n\"Those who try to stop us will be the Verses Galaxy's brightest, noblest heroes and its darkest, deadliest agents,\" Hunteress evidently concludes, standing and striding towards the door. \n\n\"But our own Destructive Eight can also be described similarly as such. It's beyond time you met them.\"\n\n*page_break MOMENTS LATER\n\nYou actually stay put, watching through the glass as Chalice has some kind of heated discussion with Tellie and Disreguardian. \n\nMeanwhile, Hunteress calls the other six of the Destructive Eight to come inside to meet you.\n\nThese beings now gather around the table like a deadly menagerie. \n\nSitting before them, you feel both deeply settled and wildly unsettled at the same time.\n\n*page_break\n*set spellodexchantusevortal true\n\nHunteress first introduces you to the seafoam sword woman and the serpentine creature that lurks behind her—the one who has expressed zero interest in you. \n\n\"${babename}, meet ChantuSe, the most revered tracker from Cuttara of the Nagoll Rim,\" Hunteress begins.\n\nLooking over ChantuSe, your eyes stretch all the way up her six-feet seafoam stature. Though you can only tell her skin color from her bald head and stern face, since the rest of her athletic body is covered in angular metallic armor pieces. This aesthetic comes complete with an enormous tech-broadsword strapped to her back, making her look like a sculptural form come to life.\n\n\"And Vortal, the only known surviving refugee from the blotted Contest Galaxy.\"\n\nBehind her, Vortal seems to seethe at this acknowledgment. He appears like a species you've never seen before, which makes sense now, given his origins. Vortal looks like an enormous snakelike humanoid. He is actually quite eerily gorgeous: his bulbous, pale-green skull is adorned with a crown-net of glittering emerald scales and his features are exaggerated, almost as if applied with hunter green paint. His slender body is then entirely encrusted with deep, dark green gems, from the tips of his adorned fingernails to the razored end of his body-stalk tail.\n\n*page_break\n\nTo your surprise, you feel drawn to this odd pairing. Maybe it's something about their restraint, or their shadowy nature…Either way, you note that each new being you meet will be automatically added to your Spellodex.\n\n\"We will be assigned to the missing person's case on the urban gothic planet,\" ChantuSe speaks, her voice soft and direct. \"Our tracking and detecting expertise will be at your service, should you choose our mission path.\"\n\n\"But should warn,\" Vortal suddenly adds, his voice sharp as glass and reverberating with clicks. Apparently everyone is shocked to hear him speak, as they all swivel to face him with surprised looks. \n\nThough something also seems off, as he speaks. The standard Versian galactic language translator that lets the rest of you understand one another doesn't seem well calibrated to Vortal.\n\n*page_break\n\n\"League 'great heroes' already hunt,\" Vortal purrs. \"Aim capture us. Lethal, if need.\"\n\nYou want to ask Vortal why these \"heroes\" are already on the hunt, but then you have a better idea. \n\nYou'll just take what you need using your spells. \n\nThis gesture can also double as a powerful message to the entirety of this somewhat-intimidating gathering.\n\n*choice\n\t#Search galactic servers for reasons ChantuSe and Vortal would be hunted. [i](Gain Technology)[/i]\n\t\t*set technology +2\n\n\t\tTwitching your fingers behind your back, two informational hits return. \n\n\t\tBoth light up your brain in magically bite-sized technological bits.\n\n\t\t[i]ChantuSe is wanted for committing Cuttaran war crimes.[/i]\n\n\t\t[i]Vortal is wanted for charges associated with mass murder.[/i]\n\n\t\t*goto chantuvortalmyste\n\t#Actually, reading how these two perceive me should tell me everything I need to know. [i](Gain Perception)[/i]\n\t\t*set perception +2\n\n\t\tTwitching your fingers behind your back, two emotional hits return. \n\n\t\tBoth light up your brain in magically bite-sized perceptive bits.\n\n\t\t[i]ChantuSe, having been shamed into Destructive Eight service after committing heinous crimes on Cuttara, doesn't regard you as more than part of her dutiful repentance.[/i] \n\n\t\t[i]Vortal simply wants to murder you, just like he has murdered any others who have stood in the way of his freedom.[/i]\n\n\t\t*goto chantuvortalmyste\n\t#Actually, discerning this duo's particular abilities should tell me everything I need to know. [i](Gain Enhancement)[/i]\n\t\t*set enhancement +2\n\n\t\tTwitching your fingers behind your back, two physical ability hits return. \n\n\t\tBoth light up your brain in magically bite-sized enhancement bits.\n\n\t\t[i]ChantuSe is a Cuttaran shapeshifter, but specializes in enhanced tracking. She hasn't shifted her form fully in years, an act of penance for the great crimes of her people.[/i] \n\n\t\t[i]Vortal creates portals, fueled purely by --REDACTED CLASSIFIED--[/i]\n\n\t\t*goto chantuvortalmyste\n\n*label chantuvortalmyste\n*page_break\n\nGleaning these scandalous tidbits, more questions immediately follow. \n\nHow did Vortal survive the Contest Galaxy's Blot obliteration? Is he fouler than the Blots, to have escaped them? And why is he so full of murderous disdain? As for ChantuSe, what crimes is she so ashamed of? You know she must be one of only a few to emigrate beyond the Nagoll Rim, so what secrets does she carry?\n\nYou realize the only way you'll learn the answers is if you join ChantuSe and Vortal on their gothic detective mission path, for suddenly you feel them both block themselves against you. ChantuSe shifts internally into some private-mode, and Vortal feels like he girds himself with slippery mental portals.\n\nYou could probably push beyond both easily enough, but you can already tell how angered and volatile this pair feels. For now, you've made enough of an impression and know enough about them to make a semi-informed decision.\n\n*page_break\n*set spellodexsavagespears true\n\n\"Next,\" Hunteress interrupts, obviously feeling the same way. \"Meet P.Savage and F.Spears, the almighty defenders of the Nexus.\"\n\nHunteress rolls her eyes ever so slightly as she finishes, as if even she doesn't believe what she's saying. It's an uncharacteristic move, but you find it hard to blame her. This next pair look more like they're dressed to attend a fashion show than defend the Galaxy.\n\nP.Savage is the male model–looking dude, with flawless porcelain skin exposed all the way down his worn-open blue blazer-vest. A necklace of atom-rings rests against his clean-shaven chest and his white linen pants don't sport a single wrinkle. His perfect presentation strikes you as instantly eerie, in a plastic kind of way. That said, it's hard to argue that he is—objectively speaking—stone-cold gorgeous.\n\nBeside him stands F.Spears, who is equally striking. Her sleek black hair is wet down and feathered up in an offbeat-but-flattering mullet, glowing against her dark brown skin. She wears an intricate lace bodysuit with sheer boning panels, a dramatic collar that drapes into a cape, and an intricate hair-ornament crown.\n\nWhere P.Savage is all loftiness and snobbery, there's a quiet nobility to F.Spears. Either way, both of these \"defenders\" clearly think very highly of themselves. \n\n*page_break\n\n\"We'll be guiding you along the power paradise quest, should you choose it,\" F.Spears begins, her voice both warm and commanding. \"We are well-equipped to complete fantastical adventures, but mostly this wellspring paradise has a connection to our…origins. One we must investigate.\"\n\n\"Assuredly additionally because this mission path will be most perilous,\" P.Savage adds, speaking in some affected accent you can't quite place—one likely no one could place, actually. \n\n\"We understand we'll be pursued by Tori Reece, the latest chosen principal avatar of the pink shade. She extrapolates, via her misguided sectbook awareness, that our gathering seeks power to become omnipotent and shatter the Galaxy. \n\n\"I shall at least give her misguided visage this much: she indeed is not totally incorrect on all assumptions.\"\n\n*page_break\n\n\"Tori will be sending contracted shade agents to stop us, but won't fear getting involved herself if necessary,\" F.Spears interrupts, visibly vexed by P.Savage's words.\n\n\"Certainly. As it happens, Tori also holds that it is sacrilegious the way you, B.${babename}, can twist the shades to your clearly abundant will,\" P.Savage then shares with glee. \"How Tori seems to glean so much about us without knowing anything at all will be a top priority. For I do hate idle gossip.\"\n\nWell then, P.Savage won't like this next part one bit, you think.\n\n*choice\n\t#Search galactic servers for reasons these two would be hunted. [i](Gain Technology)[/i]\n\t\t*set technology +2\n\n\t\tTwitching your fingers behind your back once again, two informational hits return. Both light up your brain in magically bite-sized technological bits.\n\n\t\t[b]Defenders of the Nexus[/b]\n\n\t\t[i]F.Spears is famous on her home planet as a prized member of an iconic team of heroes.[/i]\n\n\t\t[i]P.Savage is infamous from the same planet for switching between being this team's most powerful member and its most powerful villain.[/i]\n\n\t\t*goto timetomeetwicked\n\t#Reading how these two perceive me should tell me everything I need to know. [i](Gain Perception)[/i]\n\t\t*set perception +2\n\n\t\tTwitching your fingers behind your back once again, two emotional hits return. Both light up your brain in magically bite-sized perceptive bits.\n\n\t\t[b]Defenders of the Nexus[/b]\n\n\t\t[i]P.Savage loves your destructive potential and wants to help bolster it…but for his sake or yours?[/i] \n\n\t\t[i]F.Spears relates to your orphan origins, for she doesn't know her true lineage either and suspects she is a hybrid of two races like you.[/i]\n\n\t\t*goto timetomeetwicked\n\t#Discerning this duo's particular abilities should tell me everything I need to know. [i](Gain Enhancement)[/i]\n\t\t*set enhancement +2\n\n\t\tTwitching your fingers behind your back once again, two physical ability hits return. Both light up your brain in magically bite-sized enhancement bits.\n\n\t\t[b]Defenders of the Nexus[/b]\n\n\t\t[i]P.Savage can telekinetically control energy, which he can redirect on micro and macroscopic scales. This manipulation simultaneously charges his body, which can be expelled via flight, shows of strength, or pulse charges.[/i] \n\n\t\t[i]F.Spears possesses high levels of strength, energy generation, and intelligence. She can also cast manipulative charms and weave psionic threads.[/i]\n\n\t\t*goto timetomeetwicked\n\n*label timetomeetwicked\n*page_break\n\nYet again, more questions populate. \n\nThese two obviously have a history—you get the vibe of former best friends who are now bitter rivals, for some reason. But where are they really from? What is this Nexus no one else seems to know about? You've also never heard of anything like it, in all your studies. \n\nPerhaps most importantly, do you care more about unlocking potential with P.Savage, or learning the deeper roots of your origins with F.Spears?\n\nAt any rate, unlike ChantuSe and Vortal, neither P.Savage nor F.Spears seem to detect the informational spell you just cast in the same way. This might make them easier to operate alongside.\n\n*page_break\n*set spellodexwickedwone true\n\n\"Moving on,\" Hunteress steps in again. \"Meet The Wicked Wone, Dread Draining Deity; Wraith of Death & Gode of Vampiricism.\"\n\nThe Wicked Wone does not blink at this quartet of introductory titles. They appear generally unbothered, like they are probably quite accustomed to intimidating others. \n\nWhich makes sense, given their frighteningly elegant visage: their bloodred skin, their royal armor of skeletal frames, and most shockingly, their literally exposed bleeding heart centered in a gilded rib cage. \n\nMore than anything, however, your eye is drawn to the ornate trident The Wicked Wone grasps, which beats like an exposed organ and sports two razor-sharp teeth-prongs.\n\n*page_break\n\n[i]Should you deem necessary, my ever-so-fortunate one, you will join the Chalice of Malice and myself on the ever-annoying Blende. There, we will do all it takes to win an empowering tournament of champions.[/i]\n\nIt takes you a moment to realize The Wicked Wone has spoken these words inside your head. Clearly, they must have some kind of telepathic prowess to be able to do so—but how far does this ability reach? You cast a quick mental ward, just in case. \n\nOnce this is taken care of, you recall that The Wone fancy themselves Gods, Godes, and Goddesses of The Verses Galaxy. Whether that's an appropriate title or not is a hotly debated topic, but there is no denying the Wone's evolutionary immortality and creashionist capabilities; they possess the deitechnology engines to literally create entire worlds, many of which have even evolved enough to join the larger galactic community.\n\nYou also now recall that The Wicked Wone in particular actually fought here in the Distopian Civil War. This planet was not settled without conflict—one that drew in many competing galactic agendas. That's a story for another day, but what matters for your cause is remembering that The Wicked Wone actually fought on the [i]losing[/i] side of the Distopian Civil War.\n\n*page_break\n\nYou can already tell how handy your galactic historical studies are going to prove.\n\nSpeaking of, should you choose, you could probably learn much about the history of your Disrep people by joining Chalice and The Wicked Wone on Blende, your home planet. \n\nEspecially because the contest of champions they describe must be TRAINING GROUNDS, the reality competition to gain membership to the legendary team of heroes, The Representatives. \n\nBut is there some deeper empowerment that winning this gauntlet awards, one that remains a galactic secret?\n\n*page_break\n*set spellodexsquimli true\n*achieve deightcards\n\n\"Finally, please meet Squimli, the most feared hero of Carnager Station,\" Hunteress says.\n\nLocking with Squimli's all-black eyes, something happens that you cannot quite describe. \n\nIt's like a wave crashes all the way through you—a wave of recognition and…\n\nPotential attraction? \n\n*choice\n\t#I am attracted to all types of beings. Gender, or lack thereof, doesn't concern me.\n\t\t*comment Base coding in startup reflects this setting\n\t\t*goto squimlidescriber\n\t#I am attracted to male beings.\n\t\t*set attractedpan false\n\t\t*set attractedmen true\n\t\t*set squimlinb false\n\t\t*set squimlimale true\n\t\t*set squimlize \"he\"\n\t\t*set squimlihis \"his\"\n\t\t*set squimlihir \"him\"\n\t\t*goto squimlidescriber\n\t#I am attracted to female beings.\n\t\t*set attractedpan false\n\t\t*set attractedwomen true\n\t\t*set squimlinb false\n\t\t*set squimlifemale true\n\t\t*set squimlize \"she\"\n\t\t*set squimlihis \"her\"\n\t\t*set squimlihir \"her\"\n\t\t*goto squimlidescriber\n\t#I am most attracted to androgyny and uncategorizable identities.\n\t\t*set attractedpan false\n\t\t*set attractednb true\n\t\t*goto squimlidescriber\n\n*label squimlidescriber\n\n*if attractedmen\n\t*set leighnb false\n\t*set leighmale true\n\t*set leighze \"he\"\n\t*set leighhis \"his\"\n\t*set leighhir \"him\"\n\t*set princese \"Prince\"\n\t*set gode \"God\"\n\n\t*set oftnb false\n\t*set oftmale true\n\t*set oftze \"he\"\n\t*set ofthis \"his\"\n\t*set ofthir \"him\"\n\n*if attractedwomen \n\t*set leighnb false\n\t*set leighfemale true\n\t*set leighze \"she\"\n\t*set leighhis \"her\"\n\t*set leighhir \"her\"\n\t*set princese \"Princess\"\n\t*set gode \"Goddess\"\n\n\t*set oftnb false\n\t*set oftfemale true\n\t*set oftze \"she\"\n\t*set ofthis \"her\"\n\t*set ofthir \"her\"\n\nThis instant attraction to Squimli is not something you're used to…especially since you can somehow tell that ${squimlize} feels it, too. \n\nIt's like you can sense, without words or knowledge, that Squimli is a kindred spirit.\n\nIt can't be because of Squimli's clothes, which are a school-like uniform colored shades of candy yellow and teal. Or ${squimlihis} skin, which is jet-black and covered with jagged spikes and tattoos, all written in some foreign language in white ink.\n\nIt must be the energy you receive from Squimli: young, deeply misunderstood, and caught irrevocably between what it means to be a murderous monster and an idealistic hero. To say you are drawn to ${squimlihir} is a…rather troubling understatement.\n\n\"Depending on how your initial objectives play out, you will join Squimli and me for a classified mission,\" Hunteress concludes, leaving Squimli in silence. Which is probably for the best, given how…nervous ${squimlize} makes you feel.\n\n*page_break\n\nReturning your focus to Hunteress instead, you suddenly sense something you missed before. \n\nYou've been able to glean that all of these Destructive Eight seem to be disguising layers of themselves. However, you can suddenly see that Hunteress is actually hiding the [i]biggest[/i] secret of them all, glowing just under her skin like one of her many light bulbs.\n\nYou didn't notice this emanating from Hunteress before, but with your senses heightened from your recent spellcasting, you certainly detect it now.\n\n\"You do realize everyone here is keeping some dangerous secret, right?\" you say. \"Especially you, Hunteress.\"\n\n*page_break\n\n\"Of course I am,\" Hunteress answers. \"It's safe to say the mysteries we are each entrusted with could unleash chaotic potential heretofore unforeseen in the Verses Galaxy. We Destructive Eight may not know all of each other's secrets, but we all trust in our joint mission. And furthermore, we trust that you've been uniquely empowered to unlock the [i]correct[/i] secrets.\n\n\"And it's also safe to say that I find the burden I personally carry to be incredibly heavy,\" Hunteress sighs. \"Just as I will admit freely that I am terrified of everything we are called to do, not least of which is amplifying the unsettling abilities you yourself possess, ${babename} of Distopia.\"\n\nWell, you asked the question—you guess you can't begrudge the honest answer. Especially since you carry a burdensome secret of your own: the truth of how your powers operate. \n\nAnd your fears about the consequences of leaving behind blueprints for breaking the most fundamental laws of reality. \n\n*page_break\n\nThen again, perhaps this singular mystery is exactly what makes you worthy of charting these mission paths, despite your relative lack of experience.\n\nPerhaps, most of all, this makes you [i]just[/i] like the Destructive Eight—unsure whether your secrets will save the Galaxy or potentially destroy it.\n\nThis last thought is the one that affirms this world-shaking calling for you, yet again.\n\nThese beings—empowered, enlightened, damned, revered, feared, deceitful, revealing, arrogant, humble, murderous, righteous…\n\nThese beings are [i]your[/i] kind, through and through.\n\n*page_break CHAPTER V\n\n[b]CHAPTER V[/b]\n*line_break\nBack in your dorm room, you're told to pack only what you can carry on your back. The truth is, you don't need to pack much, not when you can conjure whatever you need on the spot. \n\nInstead, you use this brief moment of solitary time to try and unpack your thoughts.\n\nTellie teleported you back here alone, likely knowing that you needed this quick break to gather yourself. \n\nBut really, you need to gather yourself far less than you'd think. \n\n*page_break\n\nBecause deep down, this all feels [i]right[/i]—like you're a person finally meeting your purpose. \n\nWhat really needs sorting and solidifying are the stakes and secrets at hand. \n\nSorting through all of them, you try to decide what feels most vitally important to you.\n\nWhich objective might potentially motivate your future actions most?\n\n*choice\n\t#Overcoming the dire stakes we face to empower our offense against the Blot invasion; unlocking the powers and resources before the galactic harmonic convergence. [i](Gain Destructive, Reckless)[/i]\n\t\t*set destructive %+15\n\t\t*set reckless %+15\n\t\t*goto allthemysteries\n\t#Learning how to become as powerful as possible from these Destructive Eight mentor-guides. [i](Gain Unleash, Powerful)[/i]\n\t\t*set unleash %+15\n\t\t*set powerful %+15\n\t\t*goto allthemysteries\n\t#Discovering the truest roots and origins of my own mystifying powers. [i](Gain Constructive, Powerless)[/i]\n\t\t*set destructive %-15\n\t\t*set powerful %-15\n\t\t*goto allthemysteries\n\t#Ensuring the things we break and unlock are used only for their intended purpose, that they do not fall into the wrong hands. [i](Gain Limit, Responsible)[/i]\n\t\t*set unleash %-15\n\t\t*set reckless %-15\n\t\t*goto allthemysteries\n\n*label allthemysteries\n\nAlong the paths to this all-important goal, there are so many additional mysteries to solve…\n\nIs this Machi Witch Binaria really alive—and if so, where and why is she hiding? What is this ancient mythic weapon and power source—and why has no one successfully unearthed it before? What are these latter-stage gauntlets and ventures into uncharted space—and will you even make it there? \n\nWhat paths will you choose, and what other difficult decisions will you face on those paths? What new and uncharted planets will you explore? Will your noble ends justify your inevitably messy means? Will you succeed in the ticking time frame allotted before this once-in-a-generation galactic harmonic convergence? Why does everyone involved—including you—seem to have something deep and damning to hide?\n\n[i]Do you break things, or do you maybe put them back together?[/i]\n\n*page_break\n\nJust as these unanswered questions swirl and settle, there's a knock at your door. Taking a breath, you open it to find…Tellie.\n\n\"I know this is a lot, but it's already time to go,\" she says. \"And you need to know a few things first.\"\n\nStepping inside and closing the door, Tellie then stands before you, trying her best to put on a maternal, big-sisterly expression. \n\n\"I just need you to know, I'd never send any of our Disrep kind—or any of our Academy students, let alone one as special as you—out there into this unknown space if I didn't believe, with all of my heart, that it's the right thing to do.\"\n\n*page_break\n\n\"I didn't need your validation to know that,\" you reply. \"But it does help. A lot.\"\n\nTellie smiles then. \n\nIt's pained and tight, but it's still a smile. \n\n\"Good. I'd expect nothing less,\" she says. \"But there are still a couple other things you should know, before you go.\"\n\n*page_break\n\n\"You already understand this in part, since your powers don't extend to teleportation,\" Tellie begins. \"But generating portals is one of the trickiest and rarest talents in our Galaxy. I have…well, let's just say I've learned the hard way that it's a privilege usually reserved for galactic custodial purposes. \n\n\"That's why teleportation has been so tricky to crack technologically as well. There are precious few ways to create portals, and even fewer of us who are born with the natural talent to do so.\n\n\"This is why you must beware of the one they call Vortal. You've seen that I'm capable of opening portals across the span of thousands of miles, but that is my limitation. \n\n\"Vortal, however, seems capable of opening portals across the span of the entire Galaxy. That kind of power, at least here in Verses, is…\n\n\"Deeply unprecedented.\"\n\n*page_break\n\nTellie then reaches inside her linen blazer and produces three gleaming jade gems. She holds them out for you to take.\n\n\"Hunteress also asked me to check these out before I gave them to you,\" Tellie continues. \"Vortal created them, apparently at great personal cost, specifically for your mission. They are Portal Jewels, meant to allow you to move between mission paths when deemed absolutely necessary. \n\n\"From what I can tell, they will work as intended. And from what I can tell, they are invaluable. The resources that went into making them…\"\n\nTellie hands you the Portal Jewels, as if the burden of holding them one second longer is too great. \n\n*page_break\n\n\"Protect those at all costs,\" Tellie warns. \"Because we cannot allow another one to be made. [i]Ever[/i].\"\n\nYou nod at Tellie, desperately wanting to ask her more. But you know if there was more she could divulge, she would. \n\nFor now, ignorance might be bliss anyway. \n\nSo you cast a quick spell to store the Portal Jewels…\n\n*choice\n\t#In an earring I wear to match my tattoo: an infinity symbol with a pentacle set in its central crux.\n\t\t*set portaljewels \"earring\"\n\t\t*goto telliekeepsonsingin\n\t#Hidden away safely in a pocket-of-space inside my uniform.\n\t\t*set portaljewels \"uniform pocket\"\n\t\t*goto telliekeepsonsingin\n\t#In my favorite piercing, which matches my tattoo: an infinity symbol with a pentacle set in its central crux.\n\t\t*set portaljewels \"piercing\"\n\t\t*goto telliekeepsonsingin\n\t#Hidden away safely in a simple silver bracelet I always wear.\n\t\t*set portaljewels \"bracelet\"\n\t\t*goto telliekeepsonsingin\n\n*label telliekeepsonsingin\n\n\"Good,\" Tellie sighs. \"Now, since we're talking unprecedented levels of power, there's something else you need to understand about your own. \n\n\"As you know, Distopia Academy regularly measures the ability levels of all our students. Usually we can chart the limits of individual powers and classify their levels generally. \n\n\"In the past we've charted you at peak levels of power, in the Classification of [i]World-Level Agent, Highly Powered[/i]. However, I'm sorry to tell you now, that's never been true.\n\n\"The truth is that we've actually never been to measure the limits of your power, ${babename}.\"\n\nYou try to absorb these words. They feel both foreign and familiar, in the same breath.\n\n*page_break\n\n\"We thought about putting you in the Classification of [i]Galactic-Level Agent, Near Omnipotent[/i], but we avoided doing so to protect you, both from yourself and the other students,\" Tellie continues. \"However, it's important you know as much as possible about your powers before embarking on these 'missions.' Hunteress and Chalice couldn't tell me what they were, but they did tell me how dangerous and important they will be.\n\n\"So you must now know: there is no discernible meter to chart your power levels or life force. This does not mean you are omnipotent or immortal, but it does mean your abilities far exceed the limits of most. So I tell you the following to properly arm and prepare you…\n\n\"I do not think there is anything that can kill you, as long as you remain aware enough to protect yourself. Which, in turn, means that I believe you are indeed capable of the enormous tasks that will likely be asked of you.\"\n\n\"That said, your life might not be on the line, if you remain alert. However, what [i]is[/i] on the line is whether you can harness your powers to complete these missions within the given time frame. If you do not succeed, I am told that billions will die. And I don't think I need to tell you, millions of lives could be on the line if you ever lose control of your own power.\"\n\n*page_break\n\nTellie lets these…sobering words settle a moment before she continues.\n\n\"While you might not need to worry about life meters and power costs like the rest of us, using the correct skills and strengthening those skills over a short amount of time will be crucial. The Destructive Eight will be guiding you and protecting you, but you're the one who holds all the cards.\"\n\nYou stare back at Tellie, trying to decide how to respond. \n\nWhat is there to say when someone reveals that, for you, the limit does not exist?\n\n*page_break\n\n\"This all seems so…elaborately constructed,\" you try. \n\n\"You just said something deeply profound,\" Tellie says, smiling a bit more earnestly this time. \"The universe exists to balance the scales, to give each of us the most even shot possible to overcome our personal obstacles. And if I've learned anything, it's that the universe grades on a curve. The higher the stakes, the more elaborate the test becomes.\n\n\"The good news is that your training here at Distopia Academy has prepared you for this. You've already learned how to separate and hone your personal spellcasting skills. Just stay the course and keep applying what you've learned in bigger and bolder ways. I have no choice but to leave you to sort it out yourself, because it is your calling to do so. But I will say this: \n\n\"I have nothing but faith in you, ${babename}. I know you can do this.\"\n\n*page_break\n\nLooking back at Tellie, all you can do is nod meaningfully. \n\nTo say you're not used to people expressing belief in you is…quite an understatement. Especially because, even underneath this astounding faith in you, you can see the same old familiar feeling: \n\n[i]Fear[/i]. \n\nTellie is afraid, not just for you, but [i]of[/i] you. \n\n*fake_choice\n\t#If I'm really going to pull this off, the fear I instill in others might end up being my greatest weapon.\n\t\tPeople will always fear you, even the people who care most about you. Why keep feeling terrible about it when you can simply count it as an advantage?\n\t#I can't believe Tellie has been lying to me since I've arrived here at Distopia Academy.\n\t\tWas that lie really to protect you…or simply to cage you?\n\t#I know Tellie is relieved. It is now officially no longer her problem to decide what to do about my vast power.\n\t\tYour power is now the problem of Tellie's fellow Reborn in the Destructive Eight. And it probably takes one more enormous target off the backs of the Disreps trying so desperately to establish Distopia as a home.\n\t#I know Tellie is disappointed, too. I wasn't just a protégé to her, I was also poised to become a powerful ally.\n\t\tWell, you still can be both. In fact, perhaps you'll even become better at both, once you've returned from these galactic adventures.\n\n\"Now, we really do have to get going,\" Tellie concludes, thankfully before you can react visibly. \n\n\"But you do have enough time for one goodbye, if you want.\"\n\nYour heart sinks, hearing this.\n\nBecause Tellie obviously refers to Brit and Boris. Which means the first of many tough decisions coming your way has arrived.\n\n*choice\n\t#I am grateful for my time with Brit and Boris. They deserve a proper goodbye, even if I have to lie to them about where I'm going. [i](Test Powerful)[/i]\n\t\t*gosub trial_end\n\t\t*set bbpropergoodbye true\n\n\t\tTellie isn't happy about doing so, but she manages to get Brit and Boris into your dorm room after a quick campus search.\n\n\t\t\"You have two minutes,\" Tellie says once you've all gathered. \"And no, I'm not waiting outside while you all say goodbye.\"\n\n\t\t\"${babename}, where are you going?\" Brit immediately asks, reflecting in Boris's fishbowl ticker tape. \"Who were those beings in the courtyard?\"\n\n\t\t\"I can't answer those questions,\" you say, glancing up at Tellie standing guard. \"But I had to say goodbye to you both before I was called away.\"\n\n\t\t\"Wait, you're leaving already?\" Brit cries. \"But what about graduation?\"\n\n\t\t*page_break\n\n\t\tYou wish you could stay for graduation. \n\n\t\tYou also wish you could tell Brit and Boris there might not even be a Galaxy to graduate into if you [i]did[/i] stay. \n\n\t\tBut Tellie's eyes bore into you. \n\n\t\tYou can't, for their own safety.\n\n\t\t*page_break\n\n\t\t\"You'll have to celebrate for me,\" you reply. \"Look, you both know I never really belonged here anyway. But…\n\n\t\t\"You two are the closest I've ever felt to belonging anywhere.\"\n\n\t\t\"We're your family,\" Brit says, fighting back tears. \n\n\t\tYou know she must also be fighting a pang of jealousy, wishing she was the powerful and chosen hero. You're not sure you'd trade places with her, but it does make you feel lucky.\n\n\t\tBrit always manages to make you feel special, whether she intends to or not.\n\n\t\t*page_break\n\n\t\t[b]We'll save a bedroom for you in our apartment, just like we planned,[/b] Boris writes across his fishbowl.\n\n\t\tYou break forward to hug Boris and Brit at same time, a rare show of affection that catches them both by surprise. \n\n\t\tStill, they squeeze you right back.\n\n\t\t*page_break\n\n\t\t\"I'm counting on filling that spot the moment I'm back,\" you say.\n\n\t\tYou're not sure if you can actually deliver on this promise of coming back…\n\n\t\tBut you need to convince yourself that's what will happen, for now.\n\n\t\t*if (powerful > 50)\n\t\t\t*gosub bbgbyepositive\n\t\t\t*goto thegreatbeyond\n\t\t*else\n\t\t\t*gosub bbgbyenegative\n\t\t\t*goto thegreatbeyond\n\t#Brit and Boris would never understand what little I could tell them. Saying goodbye would be too hard anyway, so I leave behind a spell creation for them instead. [i](Test Powerless)[/i]\n\t\t*gosub trial_end\n\t\t*set bbleavecreation true\n\n\t\tYou cast a quick spell to bend one of the metal buttons on your uniform into a new shape. \n\n\t\tThe button twists and sucks, popping off to the ground. You cast another spell to lift the button into Tellie's hands.\n\n\t\t\"A letter 'B' for Brit and Boris and Babe,\" you explain. \"This is the only goodbye I think I can stomach.\"\n\n\t\tTellie fingers the B button, then grips it tightly.\n\n\t\t*page_break\n\n\t\t\"I understand,\" Tellie replies. \"I'll make sure they know the position you're in as best I can.\"\n\n\t\t\"Thank you,\" you respond.\n\n\t\tThere's so much more to say, but you tell yourself you can fill in Brit and Boris about it when you've accomplished your missions.\n\n\t\tAt least you need to convince yourself that's what will to happen, for now.\n\n\t\t*if (powerful \u003c 50)\n\t\t\t*gosub bbgbyepositive\n\t\t\t*goto thegreatbeyond\n\t\t*else\n\t\t\t*gosub bbgbyenegative\n\t\t\t*goto thegreatbeyond\n\t#I am saying goodbye to my friends before I go. And I am telling them whatever truths about my departure I see fit. [i](Test Reckless)[/i]\n\t\t*gosub trial_end\n\t\t*set bbgoodbyeasfit true\n\n\t\tTellie isn't happy about doing so, but she manages to get Brit and Boris into your dorm room after a quick campus search.\n\n\t\t\"You have two minutes,\" Tellie says once you've all gathered. \"And no, I'm not waiting outside while you all say goodbye.\"\n\n\t\t\"${babename}, where are you going?\" Brit immediately asks, reflecting in Boris's fishbowl ticker tape. \"Who were those beings in the courtyard?
