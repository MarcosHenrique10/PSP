aS.\n\n\t\tIt's the perfect moment to end this far-from-final night together on. \n\n\t\tAt least, the part of the night where you talk.\n\n\t\tBecause you have a feeling there will be a lot more kissing in store for this moonbeam-skied, starry-eyed midnight. \n\t\t*goto enteringtrialthree\n\t#I want to only be emotionally romantic with Leigh.\n\t\t*set leighromance true\n\n\t\t\"I'm thankful for your insight, and for your concern,\" you continue, building your courage to say what you really feel next. \n\n\t\t\"You're shaping up to maybe be the love of my life, and it's only been a day… \n\n\t\t\"Isn't that sad?\"\n\n\t\tYou speak the words with your heart in your throat, feeling heat and nerves and love flush through your entire body. It seems like an entire lifetime passes as you wait for Leigh's response.\n\n\t\t*page_break\n\t\t*achieve leighsteamy\n\n\t\t\"No, I don't think that's sad at all,\" Leigh replies. \"Because I actually feel the same way.\"\n\n\t\tYou almost look away to hide the blush that covers your cheeks, but then you remember once again that Leigh can't actually see that. \n\n\t\tAnd besides, ${leighze} seems able to [i]intuit[/i] everything that matters about you anyway.\n\n\t\tLike how, to you, a true romance needs to start like this, with honesty and an unbreakable bond. For now, that's so much more than enough—and it's so much more than you've ever truly had before.\n\n\t\t*page_break\n\n\t\t\"It really sucks that I probably have to leave here tomorrow,\" you then say. \"Like, it [i]really[/i] flirping sucks.\"\n\n\t\t\"Maybe, yes,\" Leigh responds. \"But a bond like this doesn't get built every day. We'll find our way back to each other. I know that much down to my very heart.\"\n\n\t\tHearing Leigh's words, you find yourself terrified by the hope that blooms in your chest.\n\n\t\tBut then you just feel [i]safe[/i]. Like, somehow, you also know in your own heart that Leigh is right.\n\n\t\tBesides, you'd move spell-mountains to do what it takes to reunite with Leigh, after this day.\n\n\t\t*page_break\n\n\t\t\"So I just want to say, I know there are big things at stake here,\" Leigh continues. \"But I [i]do[/i] trust you to do the right thing.\"\n\n\t\tYou feel bad for a moment. Because you wish you could tell Leigh you knew for sure what the \"right\" thing was—and what it might spell for ${leighhis} beautiful world.\n\n\t\tBut then, you think of something far better to say.\n\n\t\t\"Well, I trust myself to do the right thing if I have you by my side,\" you reply. \"If I can trust your honest advice as my…partner?\"\n\n\t\tAt this, Leigh smiles brighter than any cartoon gleam you've seen so far on SeaS.\n\n\t\tIt's the perfect moment to end this far-from-final night together on.\n\t\t*goto enteringtrialthree\n\t#Actually, I want to be more like Leigh's best friend.\n\t\t\"I'm thankful for your insight, and for your concern,\" you continue. \"You're shaping up to be one of the best friends I've ever had, and it's only been a day. Isn't that sad?\"\n\n\t\t\"No, I don't think that's sad at all,\" Leigh replies. \"I feel the same way.\"\n\n\t\tYou almost look away to hide the blush that covers your cheeks, but then you remember once again that Leigh can't actually see that. And besides, ${leighze} seems able to [i]intuit[/i] everything that matters about you anyway.\n\n\t\t\"So I just want to say, I know there are big things at stake here,\" Leigh continues. \"But I [i]do[/i] trust you to do the right thing.\"\n\n\t\t*page_break\n\n\t\tYou feel bad for a moment. Because you wish you could tell Leigh you knew for sure what the \"right\" thing was—and what it might spell for ${leighhis} beautiful world.\n\n\t\tBut then, you think of something far better to say.\n\n\t\t\"Well, I trust myself to do the right thing if I have you by my side,\" you reply. \"If I can trust your honest advice as a friend.\"\n\n\t\tAt this, Leigh smiles brighter than any cartoon gleam you've seen so far on SeaS.\n\n\t\tIt's the perfect moment to end this perhaps-final night together on.\n\t\t*goto enteringtrialthree\n\n\n*label enteringtrialthree\n*page_break AT SUNRISE\n\nAs the sun rises over the Isle of QueS, you feel you must have the best view in all of SeaS. \n\nFrom this high perch on QueSummiT, you can see the entire vibrant paradise island stretched out underneath you…\n\nThe lush landscape and charming buildings that lead up to the great lake and castle. The shimmering seas that stretch out in every direction, dazzling blue against the lightening sky. \n\nYou even swear you can see the pillars of a pantheon dipping out of a large cloud beyond the castle. You wonder if that's where Leigh's mother lives, among the other deities of SeaS. \n\n*page_break\n\nEvery part of you wishes you could fly yourself to that cloud, that you could spend a lifetime exploring the wonders of SeaS.\n\nBut you know that you don't even have the time to spend this glorious morning soaking in this view, let alone anything more. \n\nSo with a deep breath, you allow yourself to absorb this spectacular, colorful view a few more seconds before standing.\n\nOnce you do, you find Leigh ready as well. Which means there is nothing else to do but gather what few things you have. QueSummiT provides fresh clothes as part of their camp rations, but you've been able to refresh your party thanks to your spellpower. \n\n*page_break\n\nFeeling both refreshed and exhausted from your night of open-air mountain sleep, you finally approach the gates of Trial Three alongside Leigh.\n\nUnlike the previous gates, this one does not automatically swing open to grant you entrance. Instead, your eyes fall on a heavy lock in the center of the gates—one that has a thin slot in its golden face…\n\nWhere you are clearly meant to deposit Quest Coins. \n\nYou then see there is a cost listed beside the slot: the amount of coins required to enter the third trial. \n\nTaking another deep breath, you read the cost…\n\n*page_break\n\n[b]7 Quest Coins[/b].\n\n*if (questcoins >= 7)\n\n\tYour chest loosens with an exhale of relief.\n\n\tYou have ${questcoins} Quest Coins. Which means you have enough to enter Trial Three.\n\n\tThen, right on cue, your chest tightens right back up. \n\n\tFor now you must hope you have what it takes to actually complete this final trial.\n\t*goto accesstrialthree\n*else\n\n\tBut you have only earned ${questcoins} Quest Coins. Which means you do not have enough to enter Trial Three.\n\n\tYou feel your heart sink all the way down to your feet. \n\n\tThis means you won't be able to complete your Quest.\n\n\tSo what happens now?\n\t*goto trialthreeskipped\n\n\n*label accesstrialthree\n*page_break\n*achieve gainaccesstrialthree\n\nOnce you've deposited enough of your earned Quest Coins, the gates churn and swing open in a mechanical whir. \n\nAs usual, you first set your eyes on a banner streaming above a large labyrinth. It reads:\n\n[b]TRIAL THREE[/b] \n*line_break\n[b]Race of Knowledge[/b]\n\nImmediately, you realize you're going to be entering some kind of maze-race, probably made easier if you have trivia-like knowledge. For a bookworm like you, that actually sounds like [i]fun[/i].\n\nAt least, it does until you lay eyes upon your challengers for this trial.\n\n*page_break\n\nFirst you see a tall figure standing upright, despite having a reptilian body—almost like an alligator standing on its hind legs. Except this one stands replete in elegant robes and lush velvet straps, with a gleaming gem-encrusted crown upon his head. Which, speaking of, sports one of the most beautiful humanoid faces you've ever seen. \n\nThough your instincts once again detect perceptive treachery afoot there, like anyone who gazes upon this mythic-feeling creature sees a custom-tailored object of desire.\n\n\"That's the Pyre of Desyre,\" Leigh whispers, through gritted teeth. \"I'd recognize his scent anywhere.\"\n\nNow that Leigh mentions it, you do smell the heady scent of musk and oil in the air. \n\nThough you're distracted from all this by the sight that surrounds Leigh's lifelong albatross… \n\n*page_break\n\nNearly a dozen creatures you guess must qualify as Monstia from The MainlanD. \n\n\"Look what I have assembled in your honor, my dearest darling,\" the Pyre purrs, his voice hiccuping and reverberating. \n\n\"QueSummiT summoned you all here to challenge us,\" Leigh shouts back. \"Your lies get worse and worse each time we have the displeasure of meeting.\"\n\nThe Pyre laughs a throaty guffaw, like anything and everything Leigh does delights him. Though you're still too distracted scanning the army of Monstia assembled around Pyre.\n\n*page_break\n\nYou see a canine creature covered in coursing ribbons of water. A dragonette with the spindly hair of a granny. An antlered thing armored like a knight. An insectoid with iridescent lantern bulbs. Each one of them looks deadly—though some look savagely wild, while others appear to be in complete control of their faculties.\n\n\"Well, the honor of being summoned here to a third trial—on a Quest of galactic significance, no less—will be an opportunity for my greatest show of devotion yet,\" the Pyre of Desyre orates, like he is in some kind of ancient stage play.\n\n\"Me and these lovely Monstia will chase you through this maze and attempt to maim and expel you from QueSummiT,\" the Pyre continues. \"We know you will love whoever bests you the most fiercely, so I shall try my hardest to ensure your defeat!\"\n\n\"Oh, wow,\" you whisper to Leigh. \"He's out there.\"\n\n\"Welcome to my world,\" Leigh replies, all ${leighhis} muscles tensing. \n\n*page_break\n\nIn the next second, Leigh goes entirely limp. \n\nBut that's because ${leighhis} arms and legs are suddenly bound by vines that grow out of the ground. A third vine then slithers across Leigh's lips, making it impossible for ${leighhir} to speak. \n\nYou immediately react, twitching your spell-fingers to slice through the vines.\n\nBut, perhaps unsurprisingly in this enchanted place, you find that the vines are spell-proof. Leigh has obviously been taken off the trial board very purposefully by QueSummiT.\n\n\"I'm afraid no guides are allowed in the final trial,\" Pyre of Desyre chants at you. \"We are all bound by the rules of nature, in our own ways.\"\n\n*page_break\n\n[i]Fine[/i]. Hitting a wall like this just means you aren't headed in the right direction. \n\nThinking fast, you flick your fingers to construct a wheelchair. That way you can roll Leigh alongside you in the upcoming trial.\n\n\"How clever!\" Pyre purrs. \"For that, I will grant you a five-second head start. Then I and my Monstia friends will hunt you down like the savage beasts we truly desire to be!\"\n\nThat's something you don't need to be told twice. In the next instant you turn, taking off at a sprint while spell-pushing Leigh's wheelchair in front of you.\n\nThis trial might be down to just you, but that doesn't mean you're leaving Leigh behind—or that ${leighze} might not come in handy in some turn yet to come.\n\n*page_break INTO THE LABYRINTH\n\nYou enter the labyrinth just in time to hear the Monstia breaking forward behind you. You turn a corner and disappear from sight.\n\nYou have three paths in front of you, which is a small relief, since it will force Pyre and the Monstia to split up to try and find you. Especially because you can tell, from the fallen leaves strewn across the ground, this labyrinth appears capable of rearranging its walls. One probably never enters the same maze twice, if one even gets this labyrinth as their third trial to begin with.\n\nYou wish Leigh could offer you more guidance, but ${leighze} has no way of communicating. Come to think of it, ${questhing} has also fallen quiet, floating at your side. Your Questhing must be equally silenced for the duration of this final trial.\n\nSo it really is down to just you. Which means you'd better choose which path to take swiftly.\n\n*temp mazeonepath 0\n*rand mazeonepath 1 3\n\n*choice\n\t#I go left.\n\t\t*if (mazeonepath = 1)\n\t\t\t*goto bypassmazeonequiz\n\t\t*else\n\t\t\t*goto entermazeonequiz\n\t#I go straight.\n\t\t*if (mazeonepath = 2)\n\t\t\t*goto bypassmazeonequiz\n\t\t*else\n\t\t\t*goto entermazeonequiz\n\t#I go right.\n\t\t*if (mazeonepath = 3)\n\t\t\t*goto bypassmazeonequiz\n\t\t*else\n\t\t\t*goto entermazeonequiz\n\n*label bypassmazeonequiz\n\nAs you head in that direction, you realize you must have reached a rare corner in this labyrinth. Before you even reach your first test of knowledge, you come upon a wall that reads:\n\n[b]The Barrier of Temptation.[/b]\n\nInstantly, the choice before you clarifies itself in your mind. \n\nIf you break the wall on the right, you can gain a surge of strength that will boost your levels of Potency and Becoming to maximum levels…\n\n*page_break\n\nHowever, it means you will instantly fail the third trial.\n\nAlternatively, you can break the wall on the left and continue through the trial with your current levels.\n\nSo what matters more? \n\nThe wonder of guaranteed future strength, or an unsure path to potential present victory? \n\n*choice\n\t#Go left and keep running the maze. I need to win this trial and complete my Quest.\n\t\tYou'll find other ways to strengthen yourself.\n\n\t\tYou won't be tempted by individual power.\n\n\t\tYou've got a larger mission to focus on.\n\n\t\t*page_break\n\t\t*goto entermazeonequiz\n\t#Go right and take the chance to grow as strong as possible. That will prove more important than completing this Trial and this Quest.\n\t\t*achieve trialthreewonder\n\t\t*set potency 10\n\t\t*set becoming 32\n\n\t\tYour instinct tells you, against all reason, to take this temptation.\n\n\t\tSo as you bash your fist into this wall, you feel your most important levels strengthen—the levels that will determine your ultimate success in this crucial prewar push.\n\n\t\tYou can only hope you made the right call…\n\n\t\t[i]Gained Max Potency, Becoming[/i]\n\n\t\t*page_break\n\n\t\tEspecially as the heavily antlered Monstia suddenly springs out behind you. \n\n\t\tYou turn to defend yourself, but the antlers pin you to the ground before you can. As it knocks all of the air from your lungs, you can't help but think…\n\n\t\t[i]This is the fate you chose.[/i]\n\n\t\tNow you have to live with the consequences.\n\t\t*goto failedtrialthree\n\n\n*label entermazeonequiz\n*temp mazeonetrivia 0\n*rand mazeonetrivia 1 3\n\nYou come to a locked gate with a question inscribed upon it. Immediately, you realize these trivial trial obstacles are going to be about testing the knowledge you've acquired here on SeaS.\n\nYou better hope your scholar-brain has been paying attention.\n\nUnderneath the question, there are a list of multiple choice answers, each one connected to a lever. You need to choose a correct answer-level to advance…\n\nAnd you better do so quickly, because you can still hear the clicks and slurps of many Monstia at your heels.\n\n*if (mazeonetrivia = 1)\n\n\t[b]Select one Sector of the SeaS MainlandD.[/b]\n\t\n\t*choice\n\t\t#SoU.\n\t\t\t*label mazeonequizwrong\n\n\t\t\tYou pull the lever for this answer…\n\n\t\t\tBut the gate clicks and locks. Then all of the other levers retract. \n\n\t\t\tYou must have chosen a wrong answer.\n\n\t\t\t[i]No![/i]\n\n\t\t\t*page_break\n\n\t\t\tIn the next second, that insectoid Monstia jumps up behind you. \n\n\t\t\tYou spin to defend yourself, but…\n\n\t\t\tThe insectoid is too fast. \n\n\t\t\tIt's already on top of you, pinning you to the ground. Its slimy antennae gropes at your face, trying to find entry.\n\t\t\t*goto failedtrialthree\n\t\t#WiN.\n\t\t\t*label mazeonequizcorrect\n\n\t\t\tYou pull the lever for this answer…\n\n\t\t\tAnd the gate suddenly clicks and swings open.\n\n\t\t\tYou must have chosen a correct answer.\n\n\t\t\tIn the same moment, two enormous Monstia round a corner behind you. So without hesitation, you very-gratefully take off deeper into the labyrinth.\n\t\t\t*goto mazeroutetwo\n\t\t#SpriN.\n\t\t\t*goto mazeonequizcorrect\n\t\t#StA.\n\t\t\t*goto mazeonequizwrong\n\t\t#StO.\n\t\t\t*goto mazeonequizwrong\n\t\t#SuM.\n\t\t\t*goto mazeonequizcorrect\n\t\t#AcE.\n\t\t\t*goto mazeonequizwrong\n\t\t#TuM.\n\t\t\t*goto mazeonequizcorrect\n*elseif (mazeonetrivia = 2)\n\t\n\t[b]Select the capital of the SeaS MainlandD.[/b]\n\n\t*choice \n\t\t#The SeaSon.\n\t\t\t*goto mazeonequizwrong\n\t\t#The NexuS.\n\t\t\t*goto mazeonequizwrong\n\t\t#The NexiT.\n\t\t\t*goto mazeonequizcorrect\n*else\n\t\n\t[b]Select the number of deities that comprise the pantheon of the Isle of QueS.[/b]\n\n\t*choice \n\t\t#Seven.\n\t\t\t*goto mazeonequizwrong\n\t\t#Nine.\n\t\t\t*goto mazeonequizcorrect\n\t\t#Twelve.\n\t\t\t*goto mazeonequizwrong\n\n\n*label mazeroutetwo\n*page_break\n\nYou race further into the labyrinth, ignoring the sound of growling and roaring and howling all around.\n\nYou come to another fork in the path, which you are actually thankful for. \n\nIt will be good to potentially further diverge from the unleashed Monstia chasing you…\n\nBut then again, it's just another chance to choose a potentially more difficult path.\n\n*temp mazetwopath 0\n*rand mazetwopath 1 4\n\n*choice\n\t#I go left.\n\t\t*if (mazetwopath = 1)\n\t\t\t*goto bypassmazetwoquiz\n\t\t*else\n\t\t\t*goto entermazetwoquiz\n\t#I go straight.\n\t\t*if (mazetwopath = 2)\n\t\t\t*goto bypassmazetwoquiz\n\t\t*else\n\t\t\t*goto entermazetwoquiz\n\t#I go right.\n\t\t*if (mazetwopath = 3)\n\t\t\t*goto bypassmazetwoquiz\n\t\t*else\n\t\t\t*goto entermazetwoquiz\n\t#I tap a stone I see on the ground in front of me, a one-in-four chance to win it all in a blaze of wonder.\n\t\t*if (mazetwopath = 4)\n\t\t\t*page_break\n\n\t\t\tYou tap the stone, bracing yourself for what might come next.\n\n\t\t\tBefore you can take another step, suddenly the dragranny Monstia drills up from out of the ground in front of you.\n\n\t\t\tIt sends earth churning in an upturned fury, with none other than Pyre of Desyre riding on its bent back.\n\n\t\t\t\"You've stumbled upon a rare corner indeed, one few have ever laid eyes upon!\" Pyre sings out. \"Ordinarily we'd tear you limb from limb—and we still reserve the right to do so at some soon juncture.\n\n\t\t\t\"However, we will not only let you pass unimpeded. We will offer you this…\"\n\n\t\t\t*page_break\n\n\t\t\tAs Pyre reaches behind his back, you resist the urge to scream and dart down another path.\n\n\t\t\tInstead, you fight against your hammering heart as Pyre presents you with…\n\n\t\t\tThe Diamond of Desyre.\n\n\t\t\tAnd as it evaporates into your hand…\n\n\t\t\t*page_break\n\t\t\t*achieve trialthreewonder\n\t\t\t*set technology 50\n\t\t\t*set perception 50\n\n\t\t\tYou feel your two Seas-specialized spells skills suddenly boost in Potency, to levels you could never have achieved on your own. \n\n\t\t\tThen, before you can even process this wonderful revelation, the labyrinth walls beside you shift and open…\n\n\t\t\tUnearthing a path to the end of this third trial, unobstructed and unquestioned.\n\n\t\t\tToday, the luck of the universe was definitely on your side.\n\n\t\t\t[i]You also feel an address open in your mind: VersusTheEchelon@gmail.com. If you send a message there with the password \"The Diamond of Desyre\" and a mental screenshot of this page, you might find additional insightful treasures.[/i]\n\t\t\t*goto mazeroutethree\n\t\t*else\n\t\t\tYou tap the stone, bracing yourself for what might come next…\n\n\t\t\tBut nothing happens. \n\n\t\t\tSo deciding not to dawdle, you keep sprinting forward while pushing Leigh.\n\n\t\t\t*page_break\n\t\t\t*goto entermazetwoquiz\n\n\n*label bypassmazetwoquiz\n\nAs you head in that direction, suddenly the labyrinth walls shift and open.\n\nLucky you, it seems you chose an ever-changing path without a trivia obstacle to overcome.\n\nChoosing not to question your instincts or your luck, you keep moving as fast as you can while rolling Leigh.\n\nAfter all, you can still hear the clicks and slurps of many monsters at your heels.\n*goto mazeroutethree\n\n\n*label entermazetwoquiz\n*temp mazetwotrivia 0\n*rand mazetwotrivia 1 3\n\nYou come to another locked gate with a question on it.\n\nYou dare not look behind you, for fear of what grim creature might be about to pounce and attack.\n\nInstead, you put your full focus on the ever-shifting question you must answer to keep pushing forward.\n\n*if (mazetwotrivia = 1)\n\n\t[b]Select one Elemental Council of the SeaS MainlandD.[/b]\n\t\n\t*choice\n\t\t#SoU.\n\t\t\t*label mazetwoquizcorrect\n\n\t\t\tYou pull the lever for this answer…\n\n\t\t\tAnd the gate suddenly clicks and swings open.\n\n\t\t\tYou must have chosen a correct answer.\n\n\t\t\tSo you sprint forward as fast as you can, still refusing to look over your shoulder.\n\t\t\t*goto mazeroutethree\n\t\t#WiN.\n\t\t\t*goto mazeonequizwrong\n\t\t#SpriN.\n\t\t\t*goto mazeonequizwrong\n\t\t#StA.\n\t\t\t*goto mazetwoquizcorrect\n\t\t#StO.\n\t\t\t*goto mazetwoquizcorrect\n\t\t#SuM.\n\t\t\t*goto mazeonequizwrong\n\t\t#AcE.\n\t\t\t*goto mazetwoquizcorrect\n\t\t#TuM.\n\t\t\t*goto mazeonequizwrong\n*elseif (mazetwotrivia = 2)\n\t\n\t[b]Select the number of Foundational Artifacts that bond to QuiX members.[/b]\n\n\t*choice \n\t\t#Seven.\n\t\t\t*goto mazeonequizwrong\n\t\t#Eight.\n\t\t\t*goto mazetwoquizcorrect\n\t\t#Nine.\n\t\t\t*goto mazeonequizwrong\n*else\n\t\n\t[b]Select the only Foundational Artifact type that represents the full color spectrum, instead of a more limited set.[/b]\n\n\t*choice \n\t\t#WiN.\n\t\t\t*goto mazeonequizwrong\n\t\t#SpriN.\n\t\t\t*goto mazeonequizwrong\n\t\t#SuM.\n\t\t\t*goto mazeonequizwrong\n\t\t#TuM.\n\t\t\t*goto mazetwoquizcorrect\n\n\n*label failedtrialthree\n*page_break\n\nYou close your eyes and brace yourself for the worst…\n\nBut then you hear a pop of sound, followed by a sudden rush of weightlessness.\n\nYou open your eyes and find yourself back outside the gates of Trial Three…\n\nAlongside a fully freed Leigh and ${questhing}.\n\n*page_break\n\nThis must mean you didn't pass this final Trial Three. \n\nWhich further means you will not access the ancient power source you traveled so far to unearth.\n\nBut you refuse to accept this reality so easily. \n\nReacting quickly, you twitch your fingers to cast a tech-laced probing spell, to see if you can locate any weaknesses within the trial gate.\n\n*page_break\n\nBut immediately, a burst of pain shoots through your entire hand, forcing you to stop. \n\nYou've rarely ever felt spell-blowback like that. It always signals one thing…\n\nThat some forces cannot be magically meddled with. \n\nYou will not be able to bend QueSummiT so easily to your will.\n*goto outcometwotwo\n\n\n*label mazeroutethree\n*page_break\n\nIn one final push forward, you emerge into an actual clearing. You are startled by the view from this open space, which is still relatively limited… \n\nGiven that you've just reached the true diamond peak of QueSummit.\n\nYou are overcome by the view, but even more so by the fact that [i]you did it[/i]. You [i]actually[/i] completed all three trials in this Quest, against all odds.\n\nBeside you, you watch as the vines binding Leigh begin to fall away, finally freeing ${leighhir}. \n\n*page_break\n\nSomewhere back inside the labyrinth, you can hear the tortured cries of the Pyre of Desyre and the howling wails of his Monstia army. \n\nThey've all been deprived of their one opportunity to terrorize and run freely without consequence, within the confines of a QueSummiT trial.\n\nToo bad everyone who hoped to see you fail will have to wait for some other day. \n\nThough, standing here atop this mountain, you truly doubt that day will ever come.\n\n*page_break\n*achieve wontrialthree\n\nYou turn to Leigh and ${questhing}, both looking a bit proud, but also a bit timid…\n\nBecause now that you've achieved the rare feat of completing all three trials, it will come time to claim your prize:\n\nThe ancient power source that might very well be the saving grace of the Verses Galaxy. \n\nNow all that remains is learning how you will obtain this sacred source. \n\nThough something tells you this final step will have to do with the altar, gilded and glowing, that sits at the very diamond peak of QueSummiT. You'd bet the spoils and treasures of every Quest are gifted from that shining shrine.\n\n*page_break\n\nJust then, ${questhing} stops floating forward, stopping in place. And it doesn't exactly have expressions, but you can suddenly tell that something terrible grips ${questhing} in place.\n\n[i]The unimaginable power source you seek resides within that PeakShrine,[/i] ${questhing} projects, clearly into your mind—and apparently into Leigh's mind simultaneously, from the look on ${leighhis} face. \n\n[i]The power source you seek is now yours to take, for proving yourself worthy.[/i] \n\n[i]However, your worthiness does not mean you can take something so precious without accruing a cost.[/i] \n\n*page_break\n\nJust then, turning back towards the shrine, its central core opens as two intricate doors swing open. \n\nInside, you see the power source you seek. \n\nIt glows so brightly, you cannot look directly at it. Still, you force yourself to absorb this rare revealed spectacle.\n\nThe source actually shines like a gemstone heart, beating in tune with QueSummiT via sparkling veins that run down into the dirt.\n\n*page_break\n\n[i]You can simply take the power source, but doing so will be akin to ripping free the heart of the Isle of QueS,[/i] ${questhing} continues. [i]The rest of SeaS will be unaffected, but as for the Isle of QueS… [/i]\n\n[i]All of its signature vibrancy and light will slowly diminish and deplete without this core source.[/i]\n\n[i]Eventually, the Isle of QueS will go entirely dark. And doing so will also weaken the defenses that currently surround the Nexus.[/i]\n\nHearing this…\n\n*fake_choice\n\t#My own heart nearly stops beating in my chest. \n\t#I should have known the truest test was yet to come, even if reaching this peak was a nearly impossible task. \n\t#My immediate reaction is that I [i]cannot[/i] do this…Can I?\n\t#My immediate reaction is calmness. I knew this power source would come at a cost, regardless of the Quest to reach it.\n\nYou try to keep your face free of this reaction, despite the emotion this news brings. Because the only reaction that will matter is the ultimate choice you make, faced with this impossible decision.\n\nHowever, Leigh feels no such need to hide ${leighhis} reaction. \n\n$!{Leighze} grips your shoulder, ${leighhis} fingers digging into your shoulder with urgency, a look of abject horror plastered on ${leighhis} face.\n\n\"${babename}, listen to me. That price is too high. Nothing can be worth destroying this sacred Isle,\" Leigh tries. \"Please. I trusted you.\"\n\n*page_break\n\nHearing Leigh's plea, you can't help think of all the beauty you've seen here on SeaS, specifically on this Isle of QueS. You think of how sheltered and unique this pocket planet is, perhaps the most beautiful untouched reserve in all of the Verses Galaxy. \n\nThen you think of the Nexus, the fate of which might still be battled for down below. \n\nYou also think of all the help ${princese} Kyleigh has offered you, without expecting anything in return. \n\nCould you really threaten all that?\n\n*page_break\n\nOn the other hand, you then force yourself to picture those horrid Blots running this radiant world ragged in some sad future to come. Not just the Isle of QueS, but all of SeaS. \n\nAnd every other potential beautiful and terrible world alike. \n\nIf you don't somehow find a way to combat the Blots, some deep way to counter this imminently incoming threat…\n\nEvery single world won't just be dimmed—they'll be blotted out entirely.\n\n*page_break\n\nBeside Leigh, ${questhing} remains absolutely still. \n\nThe silence of your Questhing speaks volumes. \n\n${questhing} cannot speak up or intervene. But it also will not help guide you to the demise of its beloved, sacred home. \n\nThis gesture weighs…more heavily on you that you expect.\n\n*page_break\n\nBut you don't have the luxury of time. You don't have the luxury of foresight or hindsight. You don't have the luxury of burdening someone else with this decision. \n\n[i]Cosmic capabilities, cosmic consequences.[/i] Those were Leigh's words, and they've turned out to be more true than either of you could have ever anticipated.\n\nAnd for better or worse, you've earned the right to make this call entirely on your own.\n\nSo, taking the deepest breath of your entire life, weighing all of the galactic factors and internal intentions and self-possessed definitions…\n\nWhat ultimate call are you going to make, standing here atop the rarest peak in all of the Verses Galaxy?\n\n*choice\n\t#I have to take the ancient power source, despite the consequences it will spell for the Isle of QueS. [i](Test Destructive or Low ${princese} Kyleigh)[/i]\n\t\t*set seasobtainsource true\n\n\t\tTaking a breath and steeling yourself, you walk forward up that hill to take the power source.\n\n\t\tYou wish there was another way. But you know you have to do this. \n\n\t\tIt's what the entire flirping Galaxy conspired for you to do.\n\n\t\tYou have to believe it's what's right in the long term, no matter how wrong it might seem to others in the short term.\n\n\t\t*page_break\n\n\t\tAs you approach the PeakShrine, you expect Leigh to try and stop you. But as ${leighze} already said, ${leighze} couldn't hope to do such a thing, even if ${leighze} tried ${leighhis} hardest. \n\n\t\tAnd after all, QueSummiT itself has made this costly acquisition possible.\n\n\t\tSo you reach forward, expecting to have to cast some kind of complex spell, or perform one final show of strength.\n\n\t\tBut then you simply rip the ancient power source gem loose like some still-beating heart, tearing it free with ease. \n\n\t\tYou suppose it's one of the most awesome and incriminating shows of strength in the history of the Verses Galaxy.\n\n\t\t*page_break\n\n\t\tYou hold the still-pulsing power source heart for a moment.\n\n\t\tBut then you feel compelled to quickly stash it in the same safe space you've stored Vortal's Portal Jewels.\n\n\t\tHonestly, it feels a lot like…\n\n\t\t*fake_choice\n\t\t\t#Stashing away the evidence of a heinous crime.\n\t\t\t#Prizing one of the rarest treasures in known existence.\n\t\t\t#Acquiring the most powerful artifact ever sourced.\n\t\t\t#Storing your own heart, ripped out for having to perform this awful task.\n\n\t\tNext, you expect some massive reaction to happen. Some earthquake, avalanche or volcanic eruption…but there isn't one.\n\n\t\tInstead, you can already tell what you've doomed the Isle of QueS to…\n\n\t\tA slow death, like a battery draining and dimming.\n\n\t\tUntil the lights of this beautiful place go out completely.\n\n\t\t*page_break\n\t\t*achieve stolepowersource\n\n\t\t*if ((kyleigh \u003c= 20) or (destructive >= 80))\n\t\t\t*set potency +4\n\t\t\t*set belonging %-5\n\n\t\t\tWhatever else it might mean in some tomorrow, today you've done the hard thing.\n\n\t\t\t*if (kyleigh \u003c= 20)  \n\n\t\t\t\t${princese} Kyleigh begins to cry silently behind you, dripping shimmering emerald tears. \n\n\t\t\t\tBut really, you kept your distance from ${leighze} for this precise reason.\n\n\t\t\t*if (destructive >= 80)\n\n\t\t\t\tAnd whatever else it might mean for tomorrow, today you've fully embraced a more Destructive way. \n\n\t\t\t\tIf you're deciding whether you break things, or maybe you put them back together, you just took a significant step in the breaking direction.\n\t\t\t\t*page_break\n\t\t\t\n\t\t\tYou just hope you've somehow made the right choice. \n\n\t\t\tThat, in being strong enough to destroy what you must…\n\n\t\t\tYou will somehow save countless more lives in some distant tomorrow than you potentially destroyed here today.\n\n\t\t\t[i](Gained Independence, Boosted Bonus Potency)[/i]\n\t\t\t*goto outcometwothree\n\t\t*else\n\t\t\t*set potency +2\n\t\t\t*set belonging 50\n\n\t\t\tWhatever else it might mean in some tomorrow, today you've done the hard thing.\n\t\t\t\n\t\t\tAnd you didn't do this because of your relationship with Leigh. Nor did you do this because of a particularly high penchant for Destructiveness.\n\n\t\t\tYou did this because you have to believe it's the right thing.\n\n\t\t\t*page_break\n\n\t\t\tYou have to hope you've somehow made the right choice. \n\n\t\t\tMost of all, you have to make this power mean something. All the the loss that will happen here has to count for something.\n\n\t\t\tYou just hope you might save an exponentially higher number of lives than you just potentially destroyed.\n\n\t\t\t[i](Balanced Belonging-Independence. Gained Basic Potency)[/i]\n\t\t\t*goto outcometwothree\n\t#I refuse to rip loose this sacred power source. Some prices are just too high to pay, so I must believe there will be some other way to fight back. [i](Test Constructive or High ${princese} Kyleigh)[/i]\n\t\t*set seasdenysource true\n\n\t\tNo matter how you slice it, you cannot drain this sacred, glowing place of its vitality.\n\n\t\tThat kind of destruction is [i]exactly[/i] what you're fighting so hard to prevent. \n\n\t\tYou cannot become the evil you wish to banish. \n\n\t\tYou must strive to be better. You'll have to find some other way.\n\n\t\t*page_break\n\n\t\tSo you turn away from the PeakShrine, your head hanging. You don't know if this is a display of incredible strength or incredible weakness…\n\n\t\tBut either way, you can feel the relief radiating from both Leigh and ${questhing}.\n\n\t\tYou just truly hope, from the bottom of your heart, that by not destroying things today…\n\n\t\tYou didn't just doom them both to some even more terrible fate in the times to come.\n\n\t\t*page_break\n\t\t*achieve preservepowersource\n\n\t\t*if ((kyleigh >= 80) or (destructive \u003c= 20))\n\t\t\t*set potency +4\n\t\t\t*set belonging %+5\n\n\t\t\tWhatever else it might mean in some tomorrow, today you've done the hard thing. Or the easy thing? It's impossible to tell.\n\n\t\t\t*if (kyleigh >= 80) \n\n\t\t\t\tRegardless, today you've certainly done right by your high relationship with ${princese} Kyleigh. \n\n\t\t\t\tAnd from the look ${leighze} currently gives you, full of respect and gratitude and adoration, you don't need to speak a single word to understand what it means to ${leighhir}.\n\n\t\t\t*if (destructive \u003c= 20)\n\n\t\t\t\tToday you've also fully embraced a more Constructive way. \n\n\t\t\t\tIf you're deciding whether you break things, or maybe you put them back together, you just took a significant step in the Constructive direction.\n\t\t\t\t*page_break\n\t\t\t\n\t\t\tYou just hope you've somehow made the right choice.\n\n\t\t\tBecause if you haven't… \n\n\t\t\t[i]So very many[/i] lives will be lost.\n\n\t\t\t[i](Gained Belonging, Boosted Bonus Potency)[/i]\n\t\t\t*goto outcometwotwo\n\t\t*else\n\t\t\t*set potency +2\n\t\t\t*set belonging 50\n\n\t\t\tWhatever else it might mean in some tomorrow, today you've done the hard thing. Or the easy thing? It's impossible to tell.\n\n\t\t\tRegardless, you didn't do this because of your relationship with Leigh. Nor did you do this because of a high penchant for Constructiveness.\n\n\t\t\tYou did this because you have to believe it's the right thing, despite the potential costs.\n\n\t\t\tYou just hope you've somehow made the right choice.\n\n\t\t\tBecause if you haven't, [i]so very many[/i] lives will be lost.\n\n\t\t\t[i](Balanced Belonging-Independence. Gained Basic Potency)[/i]\n\t\t\t*goto outcometwotwo\n\n\n*label outcometwothree\n*page_break\n*set madeleighvillain true\n\nYou open your mouth to say some version of this to Leigh, but ${leighze} waves you off.\n\n\"Go. Now,\" ${leighze} speaks, through gritted teeth. \"Honor prohibits me from tampering with the rightful outcome of a Quest. But know this much…\"\n\n\"I don't care how long it takes, or what I must do,\" Leigh vows. \n\n\"One day, I will find you and make you [i]pay[/i] for what you've done here today.\"\n\n*page_break\n*achieve kyleighvillain\n\nThe words send a chill up your spine, despite all your power. \n\n*if leighromance\n\tThe words also break your heart right in two. Gone is the Leigh who maybe once could have loved you. That Leigh is dead forever. In taking this source, you just killed any chance you two might have had. You hoped for more, but you're not sure any bond could survive this kind of a breach, this kind of betrayal. It makes you feel all the way rotten for another reason…\n\nBecause you think you just witnessed the birth of a true hellbent villain…\n\nOne whose origin story you just had a very direct hand in creating.\n\nSomething tells you the enemies you make on this journey will someday come back to settle their debts—Leigh now included.\n\n*fake_choice\n\t#Well, let ${princese} Kyleigh of the lost Isle of QueS come. Let them all come.\n\t\tIf you've proved anything here today, it's that nothing—and no one—can stand in the way of you achieving the goals you set your mind to.\n\t#Fine. They can thank me for their continued freedom while I take them down one by one.\n\t\t[i]Hero. Villain. Anti-Hero. Savior. Tyrant. Saint.[/i] It doesn't matter what they call you. All that matters is possessing the strength to get the job done.\n\t#And they have every right to come after me, after what I've done here today.\n\t\t[i]Hero. Villain. Anti-Hero. Savior. Tyrant. Saint.[/i] Depending on the perspective, they have a right to call you by any of these names.\n\t#Maybe everyone always did have reason to fear me? \n\t\tMaybe it's you? Maybe you are the problem? Maybe you are the villain? The part that you might have to reconcile, really, is that you're not sure you actually [i]care[/i].\n\t*if (leighromance) #I don't think I could hate myself any more than Leigh now does, breaking our relationship this way.\n\t\tBut you did what you had to do. And the fact that taking the source trumped your love for Leigh probably speaks all the volumes necessary.\n\nSo, turning away from a devastated and tearstained Leigh, you know it's time to leave. \n\nThen, the moment this determination blooms in your chest, you feel something else. \n\nA new light suddenly emanates, shining directly from the ${portaljewels} where you have stored the Vortal Portal Jewels given to you by Tellie and the Destructive Eight. \n\nNow that these Jewels are nestled beside the QueS power source heart, new instructions are beamed out to you in a projection readout.\n\n*page_break\n\n[b]DESTRUCTIVE EIGHT LEAGUE: AUTO-UPDATE PROTOCOL[/b]\n*line_break\n[b]Babe ${babename} Fortune:[/b] Procure Ancient Power Source: MISSION SUCCESS (Awaiting Further Instruction)\n*line_break\n[b]P.Savage & F.Spears:[/b] Battling for Fate of the Nexus (Occupied)\n*line_break\n[b]ChantuSe & Vortal:[/b] Locate Binaria: MISSION FAIL. Alternative: Locate Compuspell: MISSION SUCCESS (Vortal: At Large, ChatuSe: In Pursuit)\n*line_break\n[b]Chalice & The Wicked Wone:[/b] Participating in TRAINING GROUNDS (Occupied)\n*line_break\n[b]Hunteress & Squimli:[/b] Procuring Unique Ship, Mystically Guarded (Occupied) \n*line_break\n[b]Trig & The Native:[/b] Procuring Unique Weapon Blueprints (Occupied)\n\n[b]Babe ${babename} Fortune: Instructional Algorithmic Protocol[/b]\n*line_break\n--[i]${babename} needs further strengthening to cast final spells. Must use one Vortal Portal Jewel to rendezvous with Chalice & The Wicked Wone to participate in TRAINING GROUNDS.[/i]\n*line_break\n--[i]Once adequately strengthened, ${babename} must rendezvous with Hunteress & Squimli to equip ancient power source to unique ship (and presumably unique WMD) before the time of harmonic convergence.[/i]\n*line_break\n--[i]Bonus Objective: If crowned sole winner of TRAINING GROUNDS, will be secretly granted the answer to one galactic-level question. Asking how to procure the ancient ship would be of great—and potentially crucial—aid to Hunteress & Squimli.[/i] \n*line_break\n--[i]New Contingency Path: While the location of Binaria was not procured, the location of the Compuspell to create a Binuman army has been procured. An ancient ship of equal specs is required to reach the hidden location of this Compuspell. This ship can and should be used for both above directives, so pirating it remains a mission path of absolute importance.[/i]\n\n[b]Time to Harmonic Convergence:[/b] \n*line_break\nApproximately 14 Days, Depending on Galactic Factors.\n\n*page_break\n\nWell, your missions are clearer than ever. \n\nThe plan is to send you to a gauntlet that will test and strengthen every one of your skills. And if you are able to beat all the odds and win, you can boost the chances of finding and pirating the ancient ship you need to carry you to the Compuspell, then into the Galactic Barrier beyond. \n\nHunteress and Squimli may be able to procure the ancient ship you require on their own. But if you've learned anything after this Quest…\n\n*fake_choice\n\t#It's that I cannot rely on my Destructive Eight allies to get the job done.\n\t#It's that I need to do whatever I can to stack the odds in our favor.\n\t#It's that I am the key to ensuring these missions finish successfully.\n\t#It's that working fully alone doesn't actually work. I only got here with lots of help.\n\t#It's that I'm simply proud of how much I've already grown and defined here on SeaS.\n\n*goto departintopartthree\n\n\n*label trialthreeskipped\n*page_break\n*set noaccesstrialthree true\n\n\"Is there anything we can do?\" you ask, turning to Leigh.\n\n\"No,\" Leigh says. \"Not all Quests are destined to succeed.\"\n\nYou turn away, wondering if Leigh is telling you the truth. \n*if (kyleigh >= 60)\n\tGiven the relationship you've built, it would sting if ${leighze} lied to you now. Even if ${leighze} has expressed some doubts about the consequences of your Quest.\n*if (kyleigh \u003c 60)\n\tWould ${leighze} have any reason to tell you about potential loopholes, if they did indeed exist? You haven't exactly built the closest of relationships, and ${leighze} has made it clear ${leighze} fears the consequences of your Quest.\n\nThen you think, what if QueSummiT never wanted you to complete this Quest in the first place? Could it have been sabotaging you with low Quest Coin rewards for every test and trial?\n\n*page_break\n\nWell, you tell yourself, if the rules of the game are rigged to begin with…\n\nWith the hand opposite Leigh, you twitch your fingers to cast a tech-laced probing spell, to see if you can locate any weaknesses within the trial gate.\n\nBut immediately, a burst of pain shoots through your entire hand, forcing you to stop. \n\nYou've rarely ever felt spell-blowback like that. It always signals one thing…\n\n*page_break\n\nThat some forces cannot be magically meddled with. \n\nYou will not be able to bend QueSummiT so easily to your will.\n\nAnd in that same moment, your sense finds you. After all the entrances QueSummiT has already granted, it would be highly unlikely for this impartial cosmic force not to operate within the rules it established now. \n\nReally, you realize, this Quest might have turned out differently had you and your party made different choices along the way.\n*goto outcometwotwo\n\n\n*label outcometwotwo\n*page_break\n*set seasfailquest true\n*comment Remember, routed here readers could have skipped trial three, participated in part of trial three and failed, or won trial three and decided not to take source\n\nThat's when the realization finally settles over you…\n\nThis Quest has ended. \n\nYou will not be unearthing the ancient power source you came to SeaS to acquire after all.\n\n\"I know your Quest means much, both to you and many others,\" Leigh then offers. \"But perhaps this outcome is for the best. Some forces are not meant to be tampered with. I believe that you—that we [i]all[/i]—will find another way to fight and defend ourselves. Perhaps this is the necessary step in that direction.\"\n\n*page_break\n\nYou'd like to find comfort in Leigh's words, you really would.\n\nBut right now, you just fear the consequences of not completing this Quest.\n\nFor now you stand here alone, without your Destructive Eight guides, faced with the decision of what to do next.\n\nAnd you find yourself without many clear answers.\n\n*fake_choice\n\t#I feel myself descending into a pit of very justified despair. \n\t#I feel the tug of failure pulling me under, imploring me to give into my doubts, to give up.\n\t#I feel rage bubbling all the way through me. This Quest now feels rigged from the start.\n\t#I feel disappointed and let down. This should never have boiled down to rest purely on my shoulders.\n\nBut that's also when you force yourself to snap all the way out of it.\n\nThis didn't work as planned? [i]Fine[/i]. \n\nThat just means it's time to pivot to a new plan. \n\nBecause no matter what obstacles you face or what mistakes you might make, you are far from helpless.\n\n*page_break\n\nThe moment this determination blooms in your chest, you feel something else. \n\nA new light suddenly shines from the ${portaljewels} where you have stored the Vortal Portal Jewels given to you by Tellie and the Destructive Eight.\n\n[b]DESTRUCTIVE EIGHT LEAGUE: AUTO-UPDATE PROTOCOL[/b]\n*line_break\n[b]Babe ${babename} Fortune:[/b] Procure Ancient Power Source: MISSION FAIL (Awaiting Further Instruction)\n*line_break\n[b]P.Savage & F.Spears:[/b] Battling for Fate of the Nexus (Occupied)\n*line_break\n[b]ChantuSe & Vortal:[/b] Locate Binaria: MISSION FAIL. Alternative: Locate Compuspell: MISSION SUCCESS (Vortal: At Large, ChatuSe: In Pursuit. Occupied)\n*line_break\n[b]Chalice & The Wicked Wone:[/b] Participating in TRAINING GROUNDS (Occupied)\n*line_break\n[b]Hunteress & Squimli:[/b] Procuring Unique Ship, Mystically Guarded (Occupied) \n*line_break\n[b]Trig & The Native:[/b] Procuring Unique Weapon Blueprints (Occupied)\n\n[b]Babe ${babename} Fortune: Instructional Algorithmic Protocol[/b]\n*line_break\n--[i]Location of Compuspell to create Binuman army procured by ChantuSe. Like Galactic Barrier entry, this location can only be reached by unique ship. Hunteress & Squimli currently seeking this ship.[/i]\n*line_break\n--[i]${babename} needs further strengthening to cast final spells. Must use one Vortal Portal Jewel to rendezvous with Chalice & The Wicked Wone on Blende to participate in TRAINING GROUNDS.[/i]\n*line_break\n--[i]Once adequately strengthened, ${babename} must rendezvous with Hunteress & Squimli to procure/fly ship to location of Compuspell.[/i]\n*line_break\n--[i]Bonus Objective: The sole winner of TRAINING GROUNDS is secretly granted the answer to one galactic-level question. Asking how to procure the ship would be of great—and potentially crucial—aid to Hunteress & Squimli.[/i] \n\n[b]Time to Harmonic Convergence:[/b] \n*line_break\nApproximately 14 Days, Depending on Galactic Factors.\n\n*page_break\n\nReading all of this, hope blooms once again inside your chest.\n\nYou should have known there would be contingency plans for a mission this complex and important. Perhaps you won't be able to power this unique ship and weapon by the time of the harmonic convergence—and perhaps ChantuSe and Vortal didn't succeed in finding Binaria, either.\n\nHowever, you can still find the means to spell-create an army capable of defending the Galaxy, if your \"League\" finds this ship and the Compuspell by the time of the harmonic convergence. \n\nThen you can still send this ship—and whatever weapon Trig and The Native find—into the Galactic Barrier, hoping it'll still do some damage. Even if it's only fueled by a fraction of the power you could have sourced here on SeaS.\n\n*page_break\n\nYou might have \"lost\" this leg, but the prewar marathon still races. \n\nYou can already tell the spells that are going to be required of you in the endgame—especially this remarkably wide-reaching Compuspell—will require much more power than you currently possess. You won't have power from this ancient source, nor will you have access to Binaria's powerful knowledge. \n\nIn the end, now it will come down to your own power, hopefully boosted by the harmonic convergence—which you must also be strong enough to channel. So it makes sense the plan is to send you to a gauntlet that will test and strengthen every one of your skills, preparing you to channel levels of power perhaps unseen in the entire Verses Galaxy.\n\nMeanwhile, Hunteress and Squimli may be able to procure the ancient ship you require on their own. But if you've learned anything after this Quest…\n\n*fake_choice\n\t#It's that I cannot rely on my Destructive Eight allies to get the job done.\n\t#It's that I need to do whatever I can to stack the odds in our favor.\n\t#It's that I am the key to ensuring these missions finish successfully.\n\t#It's that working fully alone doesn't actually work.\n\t#It's that I'm simply proud of how much I've already grown and defined here on SeaS.\n\nNow you need to make actually winning TRAINING GROUNDS an even larger priority.\n\nBecause as you've now experienced, once an window of opportunity closes… \n\nIt will be sealed shut. \n\nAnd you don't know how many second chance contingencies you're going to get.\n\n*page_break\n\n*if leighromance\n\t\"I know it goes without saying,\" Leigh begins, sensing the time for your departure has arrived.\n\t*if seasdenysource\n\t\t\"But I am so beyond proud of you for not taking the source. I know how hard that decision must have been. But like I said, we will find another way.\"\n\t*if (seasdenysource = false)\n\t\t\"But I am proud of you, of us, for all we accomplished together. We might not have completed the Quest, but like I said, we will find another way.\"\n\n\t\"I hope you're right,\" you reply, finding it hard to know what to say. \n\n\tBefore these past few days, you've never had to say many goodbyes.\n\n\tYou're not sure if it's a blessing or a curse, having so many people to have to say goodbye to now…\n\n\tEspecially a person you now consider your romantic partner.\n\t\n\t*page_break\n\n\t\"You don't have to say goodbye,\" Leigh then says, walking forward. \n\n\tTo your surprise, leaf-colored droplets fall from Leigh's emerald eyes. You're not sure if these are tears, but they certainly spring stinging emotion to your own eyes.\n\n\t\"If I have my way, I'll be there to fight alongside you, when the time comes. When it matters most,\" Leigh concludes. \n\n\t\"And then we will be together, once and for all.\"\n\n\t*page_break\n\n\tHearing Leigh's words, you pull ${leighhir} into a hug. Burying your face in ${leighhis} shoulder, you force yourself not to cry.\n\n\tBecause those words mean more to you than Leigh could ever know.\n\n\tAnd in this moment, you decide for yourself: \n\n\tYou [i]will[/i] see ${princese} Kyleigh of QueS again.\n\n\tEven if you have to move planets and break reality to make it so.\n\t*page_break\n\t*goto departintopartthree\n*elseif (kyleigh > 75)\n\t\"I know it goes without saying,\" Leigh begins, sensing the time for your departure has arrived.\n\t*if seasdenysource\n\t\t\"But I am so beyond proud of you for not taking the source. I know how hard that decision must have been. But like I said, we will find another way.\"\n\t*if (seasdenysource = false)\n\t\t\"But I am proud of you, of us, for all we accomplished together. We might not have completed the Quest, but like I said, we will find another way.\"\n\n\t\"I hope you're right,\" you reply, finding it hard to know what to say. \n\n\tBefore these past few days, you've never had to say many goodbyes.\n\n\tYou're not sure if it's a blessing or a curse, having so many friends to have to say goodbye to now.\n\t\n\t*page_break\n\t*achieve kyleighally\n\n\t\"You don't have to say goodbye,\" Leigh then says, walking forward to shake your hand. \"If I have xt world. To face your next gauntlet.\n\n*if unlockedquesthing\n\tAnd ${questhing} floats beside you. \n\n\tWhatever your Questhing thinks of your successes and failures here today, it is clearly bonded with you for life. \n\n\tSo it will be joining you on your next Quest…and every other Quest yet to come.\n\t*page_break\n\nAnd your next adventure will bring you, of all places, to the planet you fled as a Disrep refugee. \n\nThis new mission will bring you back \"home\" to Blende.\n\nYou can't imagine anyone is ready for your homecoming…\n\nEspecially since you're not entirely sure you're ready yourself, in the first place.\n\n*page_break\n\nFor better or worse, your objectives are clearer than ever. \n\nAnd the stakes somehow feel even higher than ever.\n\nWhich means your fate—and the fate of the entire Galaxy… \n\nStill remains yours to be written.\n\n*page_break\tEPILOGUE\n*goto_scene ftf_epilogue\n", "screenshots": "*set potency 4\n*set destructive 73\n*set unleash 27\n\n*stat_chart\n\ttext potency Potency\n\topposed_pair Destructive\t\n\t\tConstructive\n\topposed_pair Unleash\n\t\tLimit\n\nVortal stands silent, seething as he must open up several portals at your whim. \n\nThe Destructive Eight all stand ready, separated into pairs. Obviously, you are meant to join one of the designated initial pairs.\n\nSo, knowing the fate of so much rests on this decision…\n\nWhich path do you choose?\n\n*fake_choice\n\t#Become a quester on the fantasy paradise planet to unearth the ancient sourcing weapon alongside P.Savage and F.Spears, keepers of the secret origins and the most mysteriously mighty beings here. [i](Auto-Boost Powerful/Powerless, Unleash/Limit. Gain Technology, Perception, P.Savage, F.Spears)[/i]\n\t#Become a detective on the gothic crime planet to investigate the particulars of Binaria's exile alongside ChantuSe and Vortal, keepers of galactic secrets and the most dangerous fugitive agents here. [i](Auto-Boost Reckless/Responsible, Destructive/Constructive. Gain Enhancement, Shades, ChantuSe, Vortal)[/i]\n\n*set becoming 16\n*set powerful 88\n*set reckless 12\n\n*stat_chart\n\ttext becoming Becoming\n\topposed_pair Powerful\t\n\t\tPowerless\n\topposed_pair Reckless\n\t\tResponsible\n\n\"I am Princese Kyleigh of the SeaS Isle of QueS, but my friends call me Leigh.\"\n\nLearning this shining Princese's name, you suddenly know exactly who you want to be to them.\n\n*fake_choice\n\t#I am incredibly attracted to Princese Leigh. I want to call them a name that'll only answer to me. [i](Gain Reckless, Belonging, Max Princese Kyleigh)[/i]\n\t#Leigh strikes me instantly as a kindred spirit, bound by birthright. I want to be their friend indeed. [i](Gain Responsible, Belonging, Mid Princese Kyleigh)[/i]\n\t#I might call this Princese \"Leigh\" to fool them, but they just remind me of all the \"pure-born\" kinds who always judge me most harshly. [i](Gain Responsible, Independence, Min Princese Kyleigh)[/i]\n\n*set enhancement 4\n*set perception 4\n*set technology 2\n*set shades 0\n\n*stat_chart\n\tpercent enhancement Enhancement\n\tpercent perception Perception\n\tpercent technology Technology\n\tpercent shades Shades\n\nYou don't really understand how your powers work—no one does, so far. All you know is that you can cast what others call \"spells\" automatically, pulling from all different kinds of sources. \n\nSo for this defensive maneuver, you cast one of your signature spells.\n\n*fake_choice\n\t#I create the illusion that volcanic geysers are erupting all around our crest. [i](Gain Destructive, Unleash, Perception)[/i]\n\t#I temporarily enlarge my muscles so that I'm strong and invulnerable enough to smash anyone who comes near our crest. [i](Gain Destructive, Limit, Enhancement)[/i]\n\t#I use the spare parts I keep in my belt to create and animate a deadly destroyer drone. [i](Gain Constructive, Unleash, Technology)[/i]\n\n\n*set becoming 10\n*set powerful 42\n*set reckless 74\n\n*stat_chart\n\ttext becoming Becoming\n\topposed_pair Powerful\t\n\t\tPowerless\n\topposed_pair Reckless\n\t\tResponsible\n\n\"These are war games we're playing,\" Chalice says. \"We might think of ourselves the defenders of the Verses Galaxy, but make no mistake: we will be seen—and treated—like despicable villains. Isn't it such fun to be reviled and misunderstood?\"\n\n*fake_choice\n\t#\"I'm completely comfortable with being seen as a villain, for so many wonderful reasons,\" I reply. [i](Gain Powerful, Reckless, Chalice. Lose Hunteress)[/i]\n\t#\"These galactic powers and secrets must be hidden for a good reason,\" I reply. \"But I believe we must have been entrusted to unlock them for a good reason, as well.\" [i](Gain Powerful, Responsible, Hunteress. Lose Chalice)[/i]\n\t#\"I've always been seen as a villain, but I know who I am and what must be done,\" I reply. \"Heroes are meant to do better, not to be liked.\" [i](Gain Powerless, Reckless, Chalice. Lose Hunteress)[/i]\n\t#\"What if, in striving to win, we become more destructive than our enemies?\" I reply. \"What if these things we unleash create terrors worse than these Blots?\" [i](Gain Powerless, Responsible, Hunteress. Lose Chalice)[/i]\n\n\nThis chosen name means so much to you that you recently got it tattooed on your wrist, in fine print. Beside it, you also got an infinity symbol with a pentacle set in its central crux.\n\nThis tattoo represents everything you have been, everything you are now, and everything you hope to someday become. Of course, both names also reflect your gender identity.\n\n*fake_choice\n\t#I'm cis-female: assigned as female at birth, which matches my gender identity.\n\t#I'm cis-male: assigned as male at birth, which matches my gender identity.\n\t#I'm trans-female: assigned as male at birth, but confirmed as female.\n\t#I'm trans-male: assigned as female at birth, but confirmed as male.\n\t#I was born with intersex characteristics.\n\t#I don't identify with binary gender categories.\n\t#None of these options suit me, so I'd like to enter my own vocabulary.\n\n*label questioning_purchased\n*check_purchase questioning\n[b]Questhing Bonding[/b]\n\nBond to your unique Questhing! Not only will you customize the name and appearance of this rare pet, your Questhing will provide strategy tips and boost the necessary Stats at key points, while accompanying you on all your adventures across worlds.\n*purchase questioning $0.99 questioning_purchased\n*page_break No, Thanks\n\n*label database_purchased\n*check_purchase database\n[b]Spanbook Bonding[/b]\n\nBond to your unique Spanbook! Not only will you customize the name and appearance of the book's avatar, it will provide strategy tips and boost the necessary Stats at key points, while also providing rare historical timeline readouts about the Verses Galaxy.\n*purchase database $0.99 database_purchased\n*page_break No, Thanks\n\n*label boost_purchased\n*check_purchase boost\n[b]Representatives Declassified[/b]\n\nRead the ultra-classified Case Log of one of the galaxy's most successful heroic team. Declassify 15K words worth of bonus story and learn the state of the infamous assemblage you seek to impress, while also gaining the chance to bonus-boost your Character Stats.\n*purchase boost $1.99 boost_purchased\n*page_break No, Thanks\n*ending", "startup": "*title Fortune the Fated\n*author Zachary Sergi\n\n*scene_list\n\tstartup\n\tftf_partone\n\t$ ftf_parttwo_seas\n\t$ ftf_parttwo_gothika\n\t$ ftf_epilogue\n\t$ ending\n\n*product questioning\n*product database\n*product boost\n\n*comment STATS\n*create becoming 0\n*create powerful 50\n*create reckless 50\n*create belonging 50\n*create potency 0\n*create destructive 50\n*create unleash 50\n*create enhancement 0\n*create perception 0\n*create technology 0\n*create shades 0\n*create prouder 80\n*create flecks 80\n*create thewickedwone 50\n*create chalice 50\n*create hunteress 50\n*create chantuse 50\n*create vortal 50\n*create psavage 50\n*create fspears 50\n*create kyleigh 50\n*create
