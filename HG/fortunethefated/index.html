n*page_break\n\nInstead you see what lies beneath.\n\nUnderneath it all, Bombats is revealed to actually be one of those Bominate monstrosities. She simply wears a skin suit and a wig to [i]appear[/i] like a humanoid. \n\nBeside this frightening visage, Bombs the giant bat turns out to be some kind of android-bat hybrid experiment—a Bomibat, in the same signature twisted style of its owner.\n\nYou gasp out loud. You can't help it.\n\nYou already felt queasy and on edge, but seeing these two deadly monsters, known only for their putrid ability to maim and kill…\n\n*fake_choice\n\t#It fully turns my stomach. \n\t#It sets my fears ablaze.\n\t#It makes me wonder—was this just a trap laid by Binaria, to kill anyone who dares to come looking for her?\n\t#It makes me wonder—could this just be one more step in the search to finally find Binaria?\n\n\"Please, it's not what you think,\" the Bombats-Bominate speaks, which startles you even more. \n\nFrom what you've been told and witnessed in memoriam, Bominates are [i]certainly[/i] not supposed to be able to communicate verbally this way. \n\n\"I don't know how you found us here, but since you have, you must be from galactically abroad. But despite appearances, we are not Bominates. Please, hear me out.\"\n\nListening to this plea, you remind yourself that you have no actual ability to fight these Bominates here in the spell-proof crystal temple. \n\nSo if the Bombats-Bominate wants to speak to you instead of flay you alive where you stand, then hearing her out sounds like a flirping swell idea.\n\n*page_break\n\n\"Well, we are [i]technically[/i] still Bominates, I guess,\" the Bombats-Bominate continues. \"But we don't identify as Bominates. Bats and I were placed here in protective hiding by Binaria herself, after she cured us. Or rather, after she evolved us. \n\n\"You see, we're many generations beyond the primitive Bominates you must have encountered. We still have a…taste for violence, but that's why Binaria put us here on Gothika. It's a galactically unaware planet where violence is commonplace, where we can actually do good by murdering murderers.\n\n\"All we really want is to live our lives here in peace.\"\n\nListening to the Bombats-Bominate, you have dozens of questions. You decide to start with the most relevant to your cause. \n\n\"Why did Binaria do this?\"\n\n*page_break\n\n\"Binaria isn't exactly big with the explanations,\" the Bombats-Bominate answers. \"But I asked the very same question, once I was able. \n\n\"Binaria said she wanted to cure a Bominate, to prove that she could. And when it came to Bats, she wanted to experiment with animal-android hybridizations. In doing so, she claimed to hope to begin the work of rebuilding her tarnished legacy. After that, Binaria stashed us here and went back into hiding.\"\n\n\"Well, in that case, you'll be happy to know we aren't here to kill you, or to even disturb your peace,\" you reply, feeling some tension leave your body. \"We're simply looking for Binaria. We thought you were actually her in disguise, but obviously our intel wasn't complete. Long story short, we need Binaria's help to save the entire Verses Galaxy.\"\n\nYou expect the Bombats-Bominate to appear relieved, hearing all this. Instead she looks away, her cybernetic eyes seeming to brim with secret knowledge.\n\n*page_break\n\n\"In all our time spent as Gothika Rogues, we've always known One-Fourteen there to be a true hero,\" the Bombats-Bominate continues, stroking the head of the Bats-Bomibat to try and soothe it.\n\nShe nods at One-Fourteen, who does ${ofthis} best to appear grateful without actually responding. $!{Ofthis} crystal bindings still remain, so obviously the temple doesn't want ${ofthir} interfering.  \n\n\"If you've come this far to find Binaria beside One-Fourteen, you'll be able to learn the truth soon enough, whether we try to stop you,\" the Bombats-Bominate says. \"So we choose to help you. And leave the final decision of what to do with the harsh truth to you.\"\n\nThe Bombats-Bominate then sighs. Or rather, their hollow chest-cage rattles with vacuumed air. \n\n\"The reason you were sent here must be because Binaria did embed her ultra-hidden location within us. Taking it from us is the only way to find her, actually.\"\n\n*page_break\n\nYou don't understand why the Bombats-Bominate looks and sounds so grim. \n\nThat's pretty good news, no?\n\n\"Great,\" you reply. \"So how do we extract the location from you?\"\n\n\"There's the hitch,\" the Bombats-Bominate replies. \n\n\"You have to kill me to extract Binaria's ultra-protected location.\"\n\n*page_break\n\n\"I don't know what game Binaria is playing by writing the rules this way, but I know this sad truth to my core,\" the Bombats-Binaria states. \"It's written in my very DNA-code. But I have evolved to know this much…\n\n\"If killing me is what you decide must ultimately be done, I will not fight you. I won't be the monster they made me to be. I vowed never to claim the life of another innocent soul. And if finding Binaria will truly save the whole galaxy, I cannot in good faith stand in your way.\"\n\nSuddenly, realization runs all the way through you. This is yet another cosmic test, written in the stars by a cosmic-level being. \n\nYou can find Binaria's location, it's standing right in front of you.\n\nAll you have to do is murder the Bombats-Bominate in cold blood to do it.\n\n*page_break\n\nYou turn to One-Fourteen to see what ${oftze} thinks. And you see it in ${ofthis} eyes, one moment before the temple slides a crystal mask over ${ofthis} face… \n\n[i]Don't do it, ${babename}. We'll find another way.[/i]\n\nTurning away, you can't help but immediately think of Bombats and Bombs the bat, supposed \"monsters\" living their happy second lives in Gothika. You think of Boomkat and Lucy Marbles, and the love they've all found together. \n\nYou think of the Bominates you saw in Versian memory, and you think of how powerful an example the Bombats-Bominate could serve in the Verses Galaxy—for she isn't really abominable at all.\n\nIn the same moment, you think of the Blots you saw in Versian memory. And you think of how they will end all life on every planet, if you don't take drastic measures to stop them.\n\n*page_break\n\nThen you think of ChantuSe and Vortal, and you nearly laugh out loud. You think of the murders they both committed, in the name of progress and self-preservation. \n\nIf you do this, will you be just like them? Is that the last thing you want…or exactly what you want for your destiny?\n\nYou suppose you already know the answer, written in your own genes. \n\nAll that's left to do is make your true nature known.\n\n*choice\n\t#Kill the Bombats-Bominate to obtain the location of Binaria. Entering the land of monsters, perhaps I must become one to stop them all. [i](Test Destructive or Low One-Fourteen)[/i]\n\t\t*set gothikaobtainlocation true\n\n\t\tYou've broken a lot of things in your time, but you've never taken a life like this.\n\n\t\tDoing so isn't even as hard as you thought it might be.\n\n\t\tThe moment you make your choice, a crystal spear appears in your right hand. One that seems tipped with some kind of special vibrating tip, perfect for slicing metal.\n\n\t\tWhatever else it might mean, this sacred temple on this ruthless and brutal world seems to agree with your decision.\n\n\t\tYou're not sure if that's a blessing or a condemnation.\n\n\t\t*page_break\n\n\t\tStepping forward, you decide to be merciful. \n\n\t\tYou strike with the spear in one quick, clean thrust.\n\n\t\tAnd you pierce the Bombats-Bominate through the heartbomb, knowing that it takes a very rare and special being to be capable of killing a Bominate.\n\n\t\tYou now rank as one among them.\n\n\t\tThe Blots have no flirping idea who they're dealing with, coming to mess with your Galaxy.\n\n\t\t*page_break\n\t\t*achieve murderbomats\n\n\t\tYou pull the spear back with a sickening crunch. \n\n\t\tAnd when you do, you see something written across the heart you just pierced…\n\n\t\tThe coordinates for the long-lost hidden location of Binaria. \n\n\t\tThe prized information that has been obscured for many generations, uncovered only by the most worthy, now rests in your hands.\n\n\t\tThe means to find the most powerful magic-wielder who ever lived…\n\n\t\tUntil you were born, of course.\n\n\t\t*page_break\n\n\t\tIn the next moment, you find yourself blinked back outside the Temple of Cluedom gates, just like that.\n\n\t\tTurning your head, you see One-Fourteen standing beside you, ${ofthis} crystal bindings finally gone. \n\n\t\tBut you don't need ${ofthir} to speak a single word to know what ${oftze} thinks of your decision. \n\n\t\tOne-Fourteen's eyes darken with only disappointment and disgust.\n\n\t\t*if ((onefourteen \u003c= 20) or (destructive >= 80))\n\t\t\t*set potency +4\n\t\t\t*set belonging %-5\n\n\t\t\t*if (onefourteen \u003c= 20) \n\n\t\t\t\tBut really, this is exactly why you kept One-Fourteen at a distance. You always knew ${oftze} would never be strong enough to get the job done.\n\n\t\t\t*if (destructive >= 80)\n\n\t\t\t\tAfter all, you've fully embraced your true Destructive nature.\n\n\t\t\t*page_break\n\t\t\t\n\t\t\tYou just hope you've somehow made the right choice…\n\n\t\t\tThat, in being strong enough to destroy what you must, you will still save countless lives.\n\n\t\t\tOtherwise, you've now become another heartless monster holding someone else's heart…\n\n\t\t\tJust as ruthless as the monsters you aim to someday stop.\n\n\t\t\t[i](Gained Independence, Boosted Bonus Potency)[/i]\n\t\t\t*goto outcometwoone\n\t\t*else\n\t\t\t*set potency +2\n\t\t\t*set belonging 50\n\t\t\t\n\t\t\tBut you didn't do this because of your relationship with One-Fourteen. Nor did you do this because of a particularly high penchant for Destructiveness.\n\n\t\t\tYou did this because you have to believe it's the right thing, ultimately.\n\n\t\t\tYou just hope you've somehow made the right choice. That you can somehow make this information count, that you can turn this impossible knowledge into improbable power. \n\n\t\t\tOtherwise all the the loss you inflicted here today will have been for nothing.\n\n\t\t\t[i](Balanced Belonging-Independence. Gained Basic Potency)[/i]\n\t\t\t*goto outcometwoone\n\t#I refuse to kill this innocent being. What's the point of fighting monsters if I'm just going to become one? [i](Test Constructive or High One-Fourteen)[/i]\n\t\t*set gothikadenymurder true\n\n\t\tYou've already witnessed the toll this kind of killer instinct took on ChantuSe, who now tries so hard to repent. And you've certainly seen what this kind of killer instinct made of Vortal.\n\n\t\tIf you've learned anything on this journey, it's that there has to be a better way. \n\n\t\tSo with one blink, you know what you're going to do. \n\n\t\tYou make the only decision you know how to make.\n\n\t\tAnd in the next moment, you find yourself transported outside the Temple of Cluedom gates.\n\n\t\t*page_break\n\t\t*achieve refusemuderbombats\n\n\t\tTurning your head, you see One-Fourteen standing beside you, ${ofthis} crystal bindings finally gone. \n\n\t\tBut you don't need ${ofthir} to speak a single word to know what ${oftze} thinks of your decision.\n\n\t\tOne-Fourteen's eyes shine with pride, relieved and thankful for the choice you've made.\n\n\t\t*if ((onefourteen >= 80) or (destructive \u003c= 20))\n\t\t\t*set potency +4\n\t\t\t*set belonging %+5\n\n\t\t\t*if (onefourteen >= 80) \n\n\t\t\t\tAnd certainly, your strong relationship with One-Fourteen was a factor in your decision. You don't know if you could have stomached the way ${oftze} would have looked at you, had you chosen to murder the Bombats-Bominate.\n\n\t\t\t*if (destructive \u003c= 20)\n\n\t\t\t\tAfter all, you've fully embraced a more Constructive way during your life-changing time spent here on Gothika.\n\n\t\t\t*page_break\n\n\t\t\tWhatever else it might mean in some tomorrow, today you've done the hard thing. Or the easy thing? It's impossible to tell.\n\t\t\t\n\t\t\tYou just hope you've somehow made the right choice.\n\n\t\t\tBecause if you haven't… \n\n\t\t\t[i]So very many[/i] lives will be lost.\n\n\t\t\t[i](Gained Belonging, Boosted Bonus Potency)[/i]\n\t\t\t*goto outcometwotwogothika\n\t\t*else\n\t\t\t*set potency +2\n\t\t\t*set belonging 50\n\t\t\t\n\t\t\tBut you didn't do this because of your relationship with One-Fourteen. Nor did you do this because of a particularly high penchant for Constructiveness.\n\n\t\t\tYou did this because you have to believe it's the right thing.\n\n\t\t\t*page_break\n\n\t\t\tWhatever else it might mean in some tomorrow, today you've done the hard thing. Or the easy thing? It's impossible to tell.\n\t\t\t\n\t\t\tYou just hope you've somehow made the right choice.\n\n\t\t\tBecause if you haven't… \n\n\t\t\t[i]So very many[/i] lives will be lost.\n\n\t\t\t[i](Balanced Belonging-Independence. Gained Basic Potency)[/i]\n\t\t\t*goto outcometwotwogothika\n\n\n*label outcometwoone\n*page_break\n\nJust then, you hear a screech in the sky. Looking up, you see the Bombs-Bomibat soaring up high. \n\nBut before it departs, it sets its cybernetic eyes directly upon you. \n\nOn the person who just killed its caretaker, likely the oldest friend it has ever known.\n\nAnd the look of steely determination sends a chill up your spine, despite all your power. \n\n*page_break\n*set madebatsvillain true\n*achieve batsvillain\n\nBecause you just witnessed the birth of a true villainous force, hellbent on revenge—a villain you now had a direct hand in creating. \n\nAnd you have a feeling Lucy Marbles and Boomkat will be equally vengeful, once they learn what happened here today.\n\nIn fact, something tells you that [i]all[/i] the potential enemies you make on this journey will someday come back to settle their debts.\n\n*fake_choice\n\t#Well, let them all come.\n\t\tIf you've proved anything here today, it's that nothing—and no one—can stand in the way of you achieving the goals you set your mind to.\n\t#Fine. They can thank me for their continued freedom while I take them down one by one.\n\t\t[i]Hero. Villain. Anti-Hero. Savior. Murderer.[/i] It doesn't matter what they call you. All that matters is possessing the strength to get the job done.\n\t#And they have every right to come after me, after what I've done here today.\n\t\t[i]Hero. Villain. Anti-Hero. Savior. Murderer.[/i] Depending on the perspective, they have a right to call you by any of these names.\n\t#Maybe everyone always did have reason to fear me? \n\t\tMaybe it's you? Maybe you are the problem? Maybe you are the villain? The part that you might have to reconcile, really, is that you're not sure you actually [i]care[/i].\n\nAfter that, you turn to see One-Fourteen already walking away from you. \n\nWell, if ${oftze} was ever planning on joining you before, obviously ${oftze} won't be now. One-Fourteen clearly doesn't have anything to say to you. At least, nothing you'd want to hear.\n\n*if onefourteenromance\n\tThe sight breaks your heart right in two. You think maybe, after the night you shared, there are some words you can find to make One-Fourteen stay. \n\n\tBut then you remember how good with words One-Fourteen has always proven to be. \n\n\tAnd you're terrified that if you force ${ofthir} to speak, the honest words ${oftze} would utter might haunt you for the rest of your days.\n\t*page_break\n\nWhether you want a different goodbye, this non-event has to be fine. \n\nIt has to be enough for you.\n\nBecause you're leaving with the only thing you really came here for, the thing you sacrificed so much to obtain: the long-lost hidden location of Binaria.\n\n*achieve onefourteenawatching\n*page_break\n\nWithout question, you now know it's time to leave. \n\nSo you store the Binaria coordinate-heart in the safe ${portaljewels} where you have stored the Vortal Portal Jewels given to you by Tellie and the Destructive Eight. \n\nAnd the moment you do, you feel something else. A new light shines from this same pocket.\n\nNow that these Jewels are nestled beside the Binaria coordinate-heart, new instructions are beamed out to you in a projection readout.\n\n*page_break\n\n[b]DESTRUCTIVE EIGHT LEAGUE: AUTO-UPDATE PROTOCOL[/b]\n*line_break\n[b]Babe ${babename} Fortune:[/b] Locate Binaria: MISSION SUCCESS (Awaiting Further Instruction)\n*line_break\n[b]ChantuSe & Vortal:[/b] Vortal: At Large, ChantuSe: In Pursuit (Occupied)\n*line_break\n[b]P.Savage & F.Spears:[/b] Procure Ancient Power Source: MISSION FAIL (Battling for Fate of the Nexus, Occupied)\n*line_break\n[b]Chalice & The Wicked Wone:[/b] Participating in TRAINING GROUNDS (Occupied)\n*line_break\n[b]Hunteress & Squimli:[/b] Procuring Unique Ship, Mystically Guarded (Occupied) \n*line_break\n[b]Trig & The Native:[/b] Procuring Unique Weapon Blueprints (Occupied)\n\n[b]Babe ${babename} Fortune: Instructional Algorithmic Protocol[/b]\n*line_break\n--[i]Location of Binaria procured. Like Galactic Barrier entry, this secret & secure location can only be reached by unique ship. Hunteress & Squimli currently seek this ship.[/i]\n*line_break\n--[i]${babename} needs further strengthening to cast spells necessary. Must use one Vortal Portal Jewel to rendezvous with Chalice & The Wicked Wone to participate in TRAINING GROUNDS.[/i]\n*line_break\n--[i]Once adequately strengthened, ${babename} must rendezvous with Hunteress & Squimli to procure/fly ship to location of Binaria.[/i]\n*line_break\n--[i]Bonus Objective: If crowned sole winner of TRAINING GROUNDS, will be secretly granted the answer to one galactic-level question. Asking how to procure the ship would be of great—and potentially crucial—aid to Hunteress & Squimli.[/i] \n\n[b]Time to Harmonic Convergence:[/b] \n*line_break\nApproximately 14 Days, Depending on Galactic Factors.\n\n*page_break\n\nWell, your mission is clear. \n\nTo get to this rare, secure Binaria location you sacrificed so much to uncover, you will apparently need a special ship to make it past some serious mystic barriers. Luckily, this meets the requirements of the same ancient ship that Hunteress and Squimli already search for. \n\nAfter you make it to Binaria, you can still send this ancient ship—and whatever weapon Trig and The Native manage to find—into the Galactic Barrier. Hopefully it can still do some damage, even if it'll only be fueled by a fraction of the power P.Savage and F.Spears apparently failed to source.\n\nHunteress and Squimli may be able to procure the ancient ship you require on their own. But if you've learned anything after this Quest…\n\n*fake_choice\n\t#It's that I cannot rely on my Destructive Eight allies to get the job done.\n\t#It's that I need to do whatever I can to stack the odds in our favor.\n\t#It's that I am the key to ensuring these missions finish successfully.\n\t#It's that working fully alone doesn't actually work. I only got here with lots of help.\n\t#It's that I'm simply proud of how much I've already grown and defined here on Gothika.\n\nSo it makes sense the plan is to send you to a gauntlet that will test and strengthen every one of your skills. \n\nThis mission might have ended in technical success…\n\nBut you can already tell you're going to need every inch of power and endurance to complete the missions yet to come.\n\nEspecially if Binaria puts up any kind of resistance in recreating her sacred life-giving Compuspell.\n*goto departintopartthreegothika\n\n\n*label finaltempleskipped\n*page_break\n*set noaccesstemple true\n\nYou already predict what the outcome of your next move will be, but you have to try anyway.\n\nWith the hand opposite One-Fourteen, you twitch your fingers to cast a pink shades-laced probing spell. \n\nYou hope to see if you can locate any weaknesses within the temple gate…\n\nBut immediately, a burst of pain shoots through your entire hand, forcing you to stop. \n\n*page_break\n\nYou've rarely ever felt spell-blowback like that. \n\nIt must mean that, in addition to the dampening effects of the crystals, there must be some very old mystical protections placed upon this space. \n\nEven you, breaker and builder of spells, know that some forces cannot be magically meddled with. \n\nWhich means this investigation is officially over. \n\nYou don't have more time to spend circling the globe to look for Binaria in hiding. She has succeeded in slipping through your spell-fingers.\n*goto outcometwotwogothika\n\n\n*label outcometwotwogothika\n*page_break\n*set gothikafailinvestigation true\n*comment Remember, routed here readers could have not entered temple, participated in part investigative questions and failed, or uncovered Bombats as Bominate and decided not to murder\n\nThat's when the realization finally settles over you in full force…\n\nThis case window has closed. \n\nYou will not be uncovering Binaria's location after all.\n\n*fake_choice\n\t#I feel myself descending into a pit of very justified despair. \n\t#I feel the tug of failure pulling me under, imploring me to give into my doubts, to give up.\n\t#I feel rage bubbling all the way through me. This case now feels destined to fail from the start.\n\t#I feel disappointed and let down. This should never have boiled down to rest purely on my shoulders.\n\nBut that's also when you force yourself to snap all the way out of it.\n\nThis didn't work as planned? \n\n[i]Fine[/i]. \n\nThat just means it's time to pivot to a new plan. \n\nBecause no matter what obstacles you face or what mistakes you might make, you are far from helpless.\n\n*page_break\n\nThe moment this thought plays across your face, something suddenly rolls out from under the temple gate. It stops in front of One-Fourteen, who bends down to pick it up.\n\nLooking over, you see it is a rose quartz orb that has words carved across the front. Once One-Fourteen reads it, ${oftze} hands it to you. \n\nTaking the orb, first you read the label: \n\n[b]The Location of the Compuspell Source Code.[/b]\n\nThen, the moment the orb is held in your hands, coordinates appear in your mind as clear as day.\n\n*page_break\n\n\"Did it give you the location?\" One-Fourteen asks.\n\nYou nod. \"But why did the temple give this to us? And can we trust it?\"\n\n\"Ancient magics rule this temple, all predating the rise of Gothikite civilization,\" One-Fourteen answers. \"You must have noticed this yourself, even in your short time here—there's something special happening on this planet, something that connects magic and technology in a profoundly…lost way. Maybe this was all even set up by Binaria herself, some test or experiment… \n\n\"Either way, this special connection hasn't been properly studied by the locals yet, and I haven't had much spare time to do so myself. But in my day, I have seen a few rare phenomena in the Verses Galaxy…\n\n\"And the sacred and sadistic vibes here on Gothika has always reminded me so much of Versus, it nearly hurts.\n\n*page_break\n\n\"So to answer your question, yes,\" One-Fourteen concludes. \"I think you can definitely trust the intel embedded in that ancient crystal. It might be a cliché, but while the universe might not always give you what you seek…\n\n\"It usually gives you exactly what you prove yourself worthy of.\"\n\nTurning over One-Fourteen's words, however loaded they might be, it all sounds…[i]right[/i] to you.\n\n\"But before you get too excited,\" One-Fourteen adds. \"I actually recognize those source code coordinates. And getting to that particular corner of the Verses Galaxy will…well, it won't be easy, I'll say that much.\"\n\n*page_break\n\nHearing this, you immediately stash the rose quartz location orb in the same ${portaljewels} where you stored Vortal's Portal Jewels, the ones given to you by Tellie and the Destructive Eight. \n\nBecause while you might not have gotten what you actually came to Gothika for, perhaps these source code coordinates are what you were always really meant to unearth. Actually, the location of the Compuspell might prove to be even more useful than finding Binaria herself? \n\nSure, it might have been nice to have this ancient Machi Witch's power and experience on your side—but there was never any guarantee you'd actually be able to convince her to aid you. She might not have even given you the Compuspell to begin with. Or who knows, she might have tried to stop you from magnifying her Compuspell source code to create a Binuman army. Anything is possible in the space of could've would've should've…\n\nBut instead, you now have the first step you need to cast this all-important spell [i]yourself[/i]. \n\n*page_break\n\nHowever, there are now several steps to potentially accomplishing this new, equally daunting goal.\n\nYou're going to need whatever resources it will take to reach this Compuspell location, and to fight whatever battles there will inevitably be to unearth it.\n\nAnd you're going to need to do all this before the harmonic convergence arrives.\n\nThen finally, you'll need to be strong enough to harness the powers and cast the spell that will create the Binuman army the Verses Galaxy so desperately needs. You're going to need to be at least as skilled and powerful and strong as one of the Verses Galaxy's most ancient Machi Witches.\n\nSo it's a good thing your next stop is supposed to be a skills-strengthening gauntlet, huh?\n\n*page_break\n\nThe moment this determination blooms in your chest, you feel something else. A new light, which shines from the ${portaljewels} where you have stored the Vortal Portal Jewels and now the rose quartz Compuspell location orb.\n\n[b]DESTRUCTIVE EIGHT LEAGUE: AUTO-UPDATE PROTOCOL[/b]\n*line_break\n[b]Babe ${babename} Fortune:[/b] Locate Binaria: MISSION FAIL. Alternative: Locate Compuspell: MISSION SUCCESS (Awaiting Further Instruction)\n*line_break\n[b]ChantuSe & Vortal:[/b] Vortal: At Large, ChantuSe: In Pursuit (Occupied)\n*line_break\n[b]P.Savage & F.Spears:[/b] Procure Ancient Power Source: MISSION FAIL (Battling for Fate of the Nexus, Occupied)\n*line_break\n[b]Chalice & The Wicked Wone:[/b] Participating in TRAINING GROUNDS (Occupied)\n*line_break\n[b]Hunteress & Squimli:[/b] Procuring Unique Ship, Mystically Guarded (Occupied) \n*line_break\n[b]Trig & The Native:[/b] Procuring Unique Weapon Blueprints (Occupied)\n\n[b]Babe ${babename} Fortune: Instructional Algorithmic Protocol[/b]\n*line_break\n--[i]Location of Compuspell to create Binuman army procured. Like Galactic Barrier entry, this location can only be reached by unique ship. Hunteress & Squimli currently seeking this ship.[/i]\n*line_break\n--[i]${babename} needs further strengthening to cast final spells. Must use one Vortal Portal Jewel to rendezvous with Chalice & The Wicked Wone to participate in TRAINING GROUNDS.[/i]\n*line_break\n--[i]Once adequately strengthened, ${babename} must rendezvous with Hunteress & Squimli to procure/fly ship to location of Compuspell.[/i]\n*line_break\n--[i]Bonus Objective: If crowned sole winner of TRAINING GROUNDS, will be secretly granted the answer to one galactic-level question. Asking how to procure the ship would be of great—and potentially crucial—aid to Hunteress & Squimli.[/i] \n\n[b]Time to Harmonic Convergence:[/b] \n*line_break\nApproximately 14 Days, Depending on Galactic Factors.\n\n*page_break\n\nReading all of this, hope blooms again inside your chest.\n\nYou should have known there would be contingency plans for a mission this complex and important. Perhaps the primary missions of your Destructive \"League\" failed across the board, but you can still find the means to spell-create an army capable of defending the Galaxy…\n\nThat is, if those of you who remain find this designated ancient ship and the Compuspell by the time of the harmonic convergence. \n\nThen afterwards, you can still send this ancient ship—and whatever weapon Trig and The Native find—into the Galactic Barrier. Hopefully it can still do some damage, even if it'll only be fueled by a fraction of the power P.Savage and F.Spears apparently failed to source.\n\n*page_break\n\nYou might have lost this leg, but the prewar marathon still races. \n\nWithout Binaria, you can already tell the spells that are going to be required of you in the endgame—especially this remarkably wide-reaching Compuspell—will require much more power than you currently possess. And will require you to be strong enough to channel and harness the amplified energies of the harmonic convergence.\n\nYou need to somehow prepare yourself to channel levels of power perhaps unseen in the entire Verses Galaxy.\n\nMeanwhile, Hunteress and Squimli may be able to procure the ancient ship you require on their own. But if you've learned anything after this Quest…\n\n*fake_choice\n\t#It's that I cannot rely on my Destructive Eight allies to get the job done.\n\t#It's that I need to do whatever I can to stack the odds in our favor.\n\t#It's that I am the key to ensuring these missions finish successfully.\n\t#It's that working fully alone doesn't actually work.\n\t#It's that I'm simply proud of how much I've already grown and defined here on Gothika.\n\nNow you need to make actually winning TRAINING GROUNDS an even larger priority.\n\nBecause as you've now experienced, once an window of opportunity closes… \n\nIt will be sealed shut. \n\nAnd you don't know how many second chance contingencies you're going to get.\n\n*page_break\n\n*if onefourteenromance\n\n\t\"${babename}.\"\n\n\tOne-Fourteen says your name. And you can tell just by the way ${oftze} speaks it what's coming next.\n\t\n\t*if gothikadenymurder\n\t\t\"I'm so proud of the decision you made. Of who you proved yourself to be. It's who I've known you to be from the first moment I laid eyes on you.\n\t*if (gothikadenymurder = false)\n\t\t\"I need you to know how proud of you, of us, I am. For all we accomplished together. We might not have completed the investigation, but I believe you—that we all—will find another way.\n\n\t\"I would be honored to follow your lead, to follow you anywhere,\" One-Fourteen continues, reaching the point you know has been coming. \"But even if I was allowed to, I can't. Not yet. Not until I make things right with Thatbee. Not just for her, but for myself, for closure. And to make sure the things you revealed to her don't break this world wide open.\"\n\n\t\"I understand,\" you reply. Because you do. You know One-Fourteen is right…\n\n\tBut that doesn't mean you have to like it.\n\n\t*page_break\n\n\tAll you can do is hug One-Fourteen, while you hold back your tears. \n\n\tYou wanted to tell yourself otherwise, but deep down, you knew the idea of One-Fourteen coming with you always felt too much like a fantasy. \n\n\tBesides, you're not sure you'd want to subject ${ofthir} to the dangers you're bound to face. Better One-Fourteen stay safe here. You'd be so preoccupied trying to protect ${ofthir} if ${oftze} came with you right now.\n\n\tFor better or worse, this will leave you clear-headed and focused enough to get the perilous jobs ahead done.\n\n\tAnd will give you something to fight for. Someone to come [i]home[/i] to, whatever that ends up meaning.\n\n\t*page_break\n\n\t\"I will come find you,\" One-Fourteen then says, stepping up to hold you. \"I promise. Wherever you are, I will come find you. And we will be partners. Equals.\"\n\n\t\"Not if I find you first,\" you whisper.\n\n\tThen you turn away, before you crack in two. \n\n\tBefore you crack reality itself, breaking all the rules to bring One-Fourteen with you.\n\n\t*page_break\n\n\tBut deep down, that's not the way you want ${ofthir}.\n\n\tAnd you know it's worth waiting for the day when being together won't mean breaking anything…\n\n\tIt will mean [i]building[/i] something.\n\n\tAnd now One-Fourteen has given you all the more reason to fight like hell, to make sure that day comes.\n\t*goto departintopartthreegothika\n*elseif (onefourteen > 60)\n\t\"${babename}.\"\n\n\tOne-Fourteen says your name. And you can tell just by the way ${oftze} speaks it what's coming next.\n\t\n\t*if gothikadenymurder\n\t\t\"I'm so proud of the decision you made. Of who you proved yourself to be. It's who I've known you to be from the first moment we met.\n\t*if (gothikadenymurder = false)\n\t\t\"I need you to know how proud of you, of us, I am. For all we accomplished together. We might not have completed the investigation, but I believe you—that we all—will find another way.\n\n\t\"I would be honored to follow your lead, to follow you anywhere,\" One-Fourteen continues, reaching the point you know has been coming. \"But even if I was allowed to, I can't. Not yet. Not until I make things right with Thatbee. Not just for her, but for myself, to gain some closure. And to make sure the things you revealed to her don't break this world wide open.\"\n\n\t\"I understand,\" you reply. Because you do. You know One-Fourteen is right…but before these past few days, you've never had to say many goodbyes.\n\n\tYou're not sure if it's a blessing or a curse, having so many strange allies to have to say goodbye to now.\n\t\n\t*page_break\n\t*achieve onefourteenally\n\n\t\"You don't have to say goodbye,\" One-Fourteen then says, walking forward to shake your hand. \"If I have my way, I'll be there to fight alongside you, when the time comes. When it matters most.\"\n\n\tHearing One-Fourteen's words, you take ${ofthir} up on that handshake.\n\n\tBecause during this investigation, One-Fourteen has proven to be your true friend. So those words still mean more to you than ${oftze} could ever know. Or actually, perhaps ${oftze} is one of the few people who [i]does[/i] really know.\n\n\tAnd in this moment, you decide for yourself: \n\n\tYou [i]will[/] fight alongside One-Fourteen again, someday. And you will be proud to do so.\n\t*goto departintopartthreegothika\n*else\n\t\"I hope it goes without saying,\" One-Fourteen begins, knowing the time for your departure has arrived.\n\t*if gothikadenymurder\n\t\t\"But I'm so proud of the decision you made. Of who you proved yourself to be. I believe you—that we all—will find another way.\"\n\t*if (gothikadenymurder = false)\n\t\t\"But I am proud of all we accomplished together. We might not have completed the investigation, but I believe you—that we all—will find another way.\"\n\n\t\"I hope you're right,\" you reply, finding it hard to know what to say. \n\n\tBefore these past few days, you've never had to say many goodbyes.\n\n\tYou're not sure if it's a blessing or a curse, having so many strange allies to have to say goodbye to now.\n\t\n\t*page_break\n\t*achieve onefourteenally\n\n\t\"You don't have to say goodbye,\" One-Fourteen then says, walking forward to shake your hand. \"If I have my way, I'll be there to fight alongside you, when the time comes. When it matters most. But for now, I need to stay here, to make sure things are right with Thatbee, and that there's no fallout in the world of Gothika.\"\n\n\tHearing One-Fourteen's words, you take ${ofthir} up on that handshake.\n\n\tBecause while you've kept your relative distance from One-Fourteen during your investigation, those words still mean more to you than ${oftze} could ever know. Or actually, perhaps ${oftze} is one of the few people who [i]does[/i] really know.\n\n\tAnd in this moment, you decide for yourself: \n\n\tYou [i]will[/] fight alongside One-Fourteen again, someday. And you will be proud to call ${ofthir} an ally.\n\t*goto departintopartthreegothika\n\n\n*label departintopartthreegothika\n*page_break\n\nWith one final exhale, you spell-reach into your ${portaljewels} and pull out one of the heinously precious few Vortal Portal Jewels stored there.\n\nIt's time to walk into your next world. To face your next gauntlet.\n\nAnd your next adventure will bring you, of all places, to the planet you fled as a Disrep refugee. This new mission will bring you back \"home\" to Blende.\n\nYou can't imagine anyone is ready for your homecoming…\n\nEspecially since you're not entirely sure you're ready yourself, in the first place.\n\n*page_break\n\nFor better or worse, your objectives are clearer than ever. \n\nAnd the stakes somehow feel even higher than ever.\n\nWhich means your fate—and the fate of the entire Galaxy… \n\nStill remains yours to be written.\n\n*page_break EPILOGUE\n*goto_scene ftf_epilogue\n", "ftf_parttwo_seas": "*comment é\n\n*image ftfseasbanner.jpg center Part Two\n\n[b]PART TWO[/b]\n*line_break\nThe Quests of SeaS\n\n*page_break CHAPTER I\n\n[b]CHAPTER I[/b]\n*line_break\nYou step out of the jagged portal, which feels not unlike stepping through some kind of cracked mirror. Your stomach lurches—this is nothing like moving through Tellie's fluid portals. \n\nThen again, you think of how many light-years you likely just traversed and become even more queasy.\n\nThen you catch your first glimpse of this new world you've stepped into. You actually gasp out loud, but the sound is drowned out by the portal shattering behind you. \n\nYou glance back to see the fluid shards dissipating, wilting the grass where they melt. Deciding to let that troubling sight go, along with the worry of about what this toxic portal might have done to your own organic matter, you turn to take in the view more properly.\n\n*page_break\n\nYou stand on a grassy hill scattered with purple and yellow and blue wildflowers—all in a distinctly bright, neon-dayglow shade you've never seen occur naturally before. \n\nBeyond the hill stretches a shimmering lake, colored a deep blue with crystal whitecaps from a steady breeze. \n\nYou taste salt in the wind and think you can hear waves crashing in the distance behind the green mountains surrounding the lake. The mountains are also shaded with green and brown trees that seem too bright, like a saturated cartoon come to life.\n\nBut somehow, this stunning landscape still pales in comparison to the focal point towering before you…\n\n*page_break\n\nIn the center of the enormous lake, on a large amethyst island, sits a literal castle. Its turrets and domes stretch up into an impossibly blue sky, one shining with the bright gleam of several moons, which reflect the light from a close-burning sun. \n\nFlags of many colors flap from each peak, set above large windows of stunningly intricate glasswork. A winding path leads up to the castle gate, raised high under dozens of flat-topped trees and smaller cottages. This path extends across the lake, connecting to the landmass where you stand.\n\nImpossibly, the features that truly take your breath away are the fighter jets that streak the sky around the castle like sentries. These jets are either built to look like dragons, or actually [i]are[/i] some kind of military-grade dragon type you've never seen before.\n\nIn fact, you've never seen anything quite like this entire technicolor-splendor landscape. And for someone who has studied the Verses Galaxy as meticulously as you have, that's truly saying something.\n\n*page_break\n\n\"It's even more beautiful in person,\" F.Spears says, stepping beside you. Her lace draperies flap beautifully in the wind alongside her tightly cropped hair. \"No wonder the natives never leave.\"\n\n\"How have I never heard of this place before?\" you ask, trying to regain your breath.\n\n\"Almost no one in the Verses Galaxy has,\" F.Spears answers. \"We Destructive Eight only learned about it because of our Reborn briefing. But right now we're on planet SeaS, which is apparently tucked in a pocket dimension, unreachable by off-worlders except by portal.\"\n\n\"Is that why the natives never leave?\" you ask. \"And why is the planet located in a pocket dimension? Wait, what does that even mean?\"\n\n*page_break\n\n\"Apparently the people of SeaS have achieved galactic awareness, but have no desire to travel or foster visitation,\" F.Spears answers. \"I think, given what we have been sent here to find, the Galaxy has hidden this resource-rich planet for good reason.\"\n\nLooking at F.Spears, you can tell she knows much more than this vague answer she has provided. Which means there is more information for you to potentially mine…\n\nEntering this mission, you know there will be advantages to building trust with these new allies. On the other hand, keeping a firm working-distance between you might also be ideal, to succeed in such dire wartime endeavors. \n\nHowever you choose to handle the potential guards of F.Spears, you should focus on building high trust or low distance with your companions. \n\n*choice\n\t#I read her mind, even if I can't do so without her being able to tell. [i](Test Reckless)[/i]\n\n\t\tThis is different from the kinds of perceptive, ability-reading spells you performed earlier on Distopia. You can cast surface-level probing spells like those usually without detection. \n\n\t\tBut you're not a proper telepath, so you're not able to enter actual minds uninvited without them knowing. \n\n\t\tAt least, not yet.\n\n\t\tStill, you twitch your fingers to cast the spell…\n\n\t\t*page_break\n\n\t\tBut the moment you begin to probe, you immediately encounter an armored wall circling the mind of F.Spears. You guess, as part of their galactic briefing and training, the minds of all the Destructive Eight must have been shielded, given the sensitive intel they all carry.\n\n\t\t*if (reckless > 60)\n\t\t\t*set fspears %+15\n\t\t\t*set belonging %-5\n\t\t\t*set becoming +4\n\n\t\t\t\"I would have tried the same thing,\" F.Spears responds, winking at you with an impressed smirk. \n\n\t\t\tYou suppose it's a good thing she finds your reckless side charming.\n\n\t\t\t[i](Gained F.Spears)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Independence, Boosted Bonus Becoming)[/i]\n\t\t\t*goto psavageenough\n\t\t*else\n\n\t\t\t\"Let's not try something like that again?\" F.Spears responds, a tight look on her face. \n\n\t\t\tIt appears she doesn't find your reckless break all that charming.\n\n\t\t\t*gosub limitsbad\n\t\t\t*goto psavageenough\n\t#I respect her boundaries in order to preserve our relationship. [i](Test Powerless)[/i]\n\n\t\t\"I can tell you know more than you're telling me,\" you begin. \"But I'm choosing to respect your boundaries, given everything at stake.\"\n\n\t\t\"That's a very good idea,\" F.Spears responds. \"I know you believe you could do otherwise.\"\n\n\t\t*if (powerful \u003c 40)\n\n\t\t\tF.Spears then offers you a warm smile, respecting your move at self-restraint.\n\n\t\t\t*gosub limitsgood\n\t\t\t*goto psavageenough\n\t\t*else\n\n\t\t\tF.Spears almost looks disappointed at your display of powerless restraint, to your surprise.\n\n\t\t\t*gosub limitsbad\n\t\t\t*goto psavageenough\n\t#I simply ask directly for more details. [i](Test Balanced Belonging-Independence)[/i]\n\n\t\t\"Is that vague response really all you think I deserve to know?\" you follow up. \"I'm risking my life just as much as you two.\"\n\n\t\tF.Spears stares back at you with a regretful look, like she agrees.\n\n\t\t*if (belonging = 50)\n\n\t\t\t\"You're right, you are one of us, ${babename}\" she says. \"But you're also more important than any of one of us, at the same time. So not telling you more [i]is[/i] protecting you.\"\n\n\t\t\t*gosub limitsgood\n\t\t\t*goto psavageenough\n\t\t*else\n\t\t\t\n\t\t\t\"That may be,\" she says. \"But I don't write all of the rules. You are both one of us Destructive Eight and apart from us, ${babename}.\"\n\n\t\t\t*gosub limitsbad\n\t\t\t*goto psavageenough\n\n*label limitsgood\n*set fspears %+15\n*set belonging %+5\n*set becoming +4\n\n[i](Gained F.Spears)[/i]\n*line_break\n[i](Gained Belonging, Boosted Bonus Becoming)[/i]\n*return\n\n*label limitsbad\n*set fspears %-30\n*set belonging 50\n*set becoming +2\n\n[i](Lost F.Spears)[/i]\n*line_break\n[i](Balanced Belonging-Independence. Gained Basic Becoming)[/i]\n*return\n\n*label psavageenough\n*page_break\n\n\"Enough,\" P.Savage interrupts. \"These are the Galaxy's best-guarded secrets, and knowing them comes at a lethal cost. It is a burden you must only carry if you absolutely need to.\"\n\n\"And who decides that status?\" you push back.\n\n\"Circumstance,\" P.Savage answers. \"We will inform you of what you need to know in order to accomplish our mission. Whether or not you can handle the necessary knowledge will not stop us.\"\n\n\"I can handle it,\" you reply, with some force.\n\nP.Savage looks away, but his thoughts play clearly across his scoffing face. [i]We'll see[/i].\n\n*page_break\n\n\"Before we get started, we do have some clarifications for you,\" F.Spears offers, shooting P.Savage a reproachful look. \"First, to reiterate, our mission here is to unlock an ancient power source. \n\n\"We believe that, if this power source is equipped and amplified properly during the harmonic convergence, it will be capable of fueling both a rare ship and a rare weapon. Both will then be sent into the Galactic Barrier, to head off the incoming Blot armada.\n\n\"Hunteress and Squimli have gone into deep space to find the most durable ship ever built, or so legend has it. Meanwhile, Trig and The Native have been dispatched to procure the technology for a forbidden weapon of mass destruction. Obviously, each of us needs to find the components of this unholy trinity before the harmonic convergence.\"\n\n\"And when does that happen?\" you ask, trying to hide the sarcasm in your voice. This would all still feel mildly absurd, if the stakes weren't so flirping high.\n\n*page_break\n\n\"In about two weeks, based on unpredictable galactic factors,\" F.Spears answers. \"Less time than I'd prefer, but still enough to make success possible. Probably even enough time to allow you to meet Chalice and The Wicked Wone, who have been dispatched to Blende to procure spots in the TRAINING GROUNDS competition. This arena might be the only gauntlet capable of strengthening your spellcasting power enough for the final tests that lie ahead. But that remains a decision to be made later.\"\n\n\"We shall have access to far better options if we succeed in our designated mission here,\" P.Savage picks up, haughtily as ever. \"If we fail, there are contingency plans. Many of which unfortunately require hoping that cuckolded ChantuSe and that vile Vortal actually succeed in locating Binaria. But I trust neither of them to accomplish much of anything. And I guarantee you won't like the contingency plans. So let's not fail?\"\n\n\"I don't fail,\" you say, but you lack some of your usual bite. \n\nHonestly, you don't love the sound of all that.\n\n*page_break\n\n\"Good,\" P.Savage retorts. \"So then you won't mind if we show you how to harness some of the power you've recently unlocked?\"\n\n\"What P.Savage means is that we've learned a meditative practice to hone our own skills,\" F.Spears cuts in. \"We can show you how to apply this to your own abilities, depending on what areas you'd like to strengthen.\"\n\nThinking this offer over, you reach for the edges of your spells skills. Strangely, you feel your access to the shades has been completely cut off, like a dried-out well. Clearly, something about being in this pocket dimension has severed the connection to the shades.\n\nWhile fascinating, that's a phenomenon you can explore later. For now, this simply serves as a very good reason to strengthen your other spells skills. \n\n[i](This is a benchmark opportunity to apply your Becoming to strengthen your spells skills.)[/i]\n*line_break\n[i](For this mission path, Perception and Technology will be most useful.)[/i]\n*line_break\n[i](You have ${becoming} Becoming out of a possible 20.)[/i]\n\n*choice\n\t#Focus my Becoming into Perception under the tutelage of F.Spears. [i](Gain Constructive, F.Spears, Perception)[/i]\n\t\t*set destructive %-15\n\t\t*set fspears %+15\n\t\t*achieve pupilperception\n\n\t\t*gosub fspearssouping\n\n\t\tSo, with the guidance of F.Spears's charms, you push forward all of your Perception skills, feeling them strengthen in alignment with your experience level.\n\n\t\t*if (becoming > 15)\n\t\t\t*set perception +10\n\n\t\t\t[i](Becoming High: Gained Max Perception)[/i]\n\t\t\t*goto wheredowestart\n\t\t*elseif (becoming > 11)\n\t\t\t*set perception +6\n\n\t\t\t[i](Becoming Medium: Gained Standard Perception)[/i]\n\t\t\t*goto wheredowestart\n\t\t*else\n\t\t\t*set perception +4\n\n\t\t\t[i](Becoming Basic: Gained Min Perception)[/i]\n\t\t\t*goto wheredowestart\n\t#Focus my Becoming into Perception under the tutelage of P.Savage. [i](Gain Destructive, P.Savage, Perception)[/i]\n\t\t*set destructive %+15\n\t\t*set psavage %+15\n\t\t*achieve pupilperception\n\n\t\t*gosub psavagesouping\n\n\t\tSo, with the explosion of P.Savage's pulse, you push forward all of your Perception skills, feeling them strengthen in alignment with your experience level.\n\n\t\t*if (becoming > 15)\n\t\t\t*set perception +10\n\n\t\t\t[i](Becoming High: Gained Max Perception)[/i]\n\t\t\t*goto wheredowestart\n\t\t*elseif (becoming > 11)\n\t\t\t*set perception +6\n\n\t\t\t[i](Becoming Medium: Gained Standard Perception)[/i]\n\t\t\t*goto wheredowestart\n\t\t*else\n\t\t\t*set perception +4\n\n\t\t\t[i](Becoming Basic: Gained Min Perception)[/i]\n\t\t\t*goto wheredowestart\n\t#Focus my Becoming into Technology under the tutelage of F.Spears. [i](Gain Limit, F.Spears, Technology)[/i]\n\t\t*set unleash %-15\n\t\t*set fspears %+15\n\t\t*achieve pupiltechnology\n\n\t\t*gosub fspearssouping\n\n\t\tSo, with the guidance of F.Spears's charms, you push forward all of your Technology skills, feeling them strengthen in alignment with your experience level.\n\n\t\t*if (becoming > 15)\n\t\t\t*set technology +10\n\n\t\t\t[i](Becoming High: Gained Max Technology)[/i]\n\t\t\t*goto wheredowestart\n\t\t*elseif (becoming > 11)\n\t\t\t*set technology +6\n\n\t\t\t[i](Becoming Medium: Gained Standard Technology)[/i]\n\t\t\t*goto wheredowestart\n\t\t*else\n\t\t\t*set technology +4\n\n\t\t\t[i](Becoming Basic: Gained Min Technology)[/i]\n\t\t\t*goto wheredowestart\n\t#Focus my Becoming into Technology under the tutelage of P.Savage. [i](Gain Unleash, P.Savage, Technology)[/i]\n\t\t*set unleash %+15\n\t\t*set psavage %+15\n\t\t*achieve pupiltechnology\n\n\t\t*gosub psavagesouping\n\n\t\tSo, with the explosion of P.Savage's pulse, you push forward all of your Technology skills, feeling them strengthen in alignment with your experience level.\n\n\t\t*if (becoming > 15)\n\t\t\t*set technology +10\n\n\t\t\t[i](Becoming High: Gained Max Technology)[/i]\n\t\t\t*goto wheredowestart\n\t\t*elseif (becoming > 11)\n\t\t\t*set technology +6\n\n\t\t\t[i](Becoming Medium: Gained Standard Technology)[/i]\n\t\t\t*goto wheredowestart\n\t\t*else\n\t\t\t*set technology +4\n\n\t\t\t[i](Becoming Basic: Gained Min Technology)[/i]\n\t\t\t*goto wheredowestart\n\n\n*label fspearssouping\nF.Spears nods, clearly pleased to have been chosen. \n\nShe then wastes no time, reaching out her hand to you and extending golden wisps of charm energy. \n\nYou tense up for a moment…\n\nBut as soon as the charms reach the skin of your forehead, you realize F.Spears intends to show you how to focus and sharpen what you're Becoming.\n\n*page_break\n\nAs this happens, you can tell that P.Savage finds this delicate exercise silly on the surface, wanting to push to the more brutal point. \n\nHowever, you can also sense a haze of jealousy radiating from someplace deeper inside him. The truth is, P.Savage doesn't know how to do what F.Spears is about to teach you nearly half as well. \n\nYou can also immediately tell that this practice very clearly comes from the half of F.Spears that is of a different heritage that P.Savage. You still don't even know the actual planet these two come from, but that also seems to remain need-to-know information. \n\nWhich means you'll just have to make sure you somehow [i]need[/i] to know.\n\n*page_break\n\nF.Spears then lights you up with her golden charms and you close your eyes. \n\nYou feel yourself starting to get souped up, like you can translate your experience into accrued mental resources, now ready to be spent.\n*return\n\n\n*label psavagesouping\nP.Savage nods, clearly pleased to have been chosen. \n\nHe then wastes no time, clapping his hands together to release a pent-up pulse of raw psionic energy. \n\nYou tense up for a moment, but then doubly so as this pulse reaches the skin of your forehead. \n\nIt's going to sting, but P.Savage will force you to sharpen into what you're Becoming.\n\n*page_break\n\nAs this happens, you also feel a burst of something unexpected from P.Savage: \n\nHe learned this exact exercise from F.Spears, even if his blunt-force application lacks any of her potential nuance. \n\nYou can also immediately tell that this practice very clearly comes from the half of F.Spears that is of a different heritage than P.Savage. You still don't even know the actual planet these two come from, but that also seems to remain need-to-know information. \n\nWhich means you'll just have to make sure you somehow [i]need[/i] to know.\n\n*page_break\n\nP.Savage then lights you up with his psychic pulse and you close your eyes. \n\nYou feel yourself starting to get souped up, like you can translate your experience into accrued mental resources, now ready to be spent.\n*return\n\n\n*label wheredowestart\n*page_break\n*if (becoming = 20)\n\t*achieve parttwobecomingmax\n\n\"So where do we start?\" you ask.\n\n\"We were instructed to locate a specific being here on SeaS,\" F.Spears replies. \"One deemed capable enough to aid in our mission as a local guide.\"\n\n\"And where is this special snowflake?\" you return.\n\nP.Savage floats forward, the folds of his costume flowing elegantly in the wind as an arrogant smile crosses his face.\n\n\"They happen to be the ${princese} of that very castle.\"\n\n*page_break ONE WINDING JOURNEY LATER\n\n[b]CHAPTER II[/b]\n*line_break\nGaining entry into the castle proves to be far easier than you expect. All it takes is one little invisibility-bubble Perception spell and a lot of steps. \n\nYour trio decided it was probably smarter to find some side entrance, but it turned out this castle only has two doors: a grand front gate and a slimmer back entrance. You all agreed to try the latter.\n\nIt's actually F.Spears who now takes the initiative to cajole the door open, pressing her palm flat against the wooden surface. Lacy wisps of golden energy emanate from her hand, like spiderwebs. \n\nYou can't quite explain it, but the door then seemingly [i]decides[/i] to click and swing open.\n\n*page_break\n\nWanting very much to learn how F.Spears did that, it suddenly—and somewhat randomly—occurs to you that yesterday, you were still living your simple cursed life. \n\nWhile today, you find yourself on a secret, vibrant planet with two galactically ordained mystery warriors seeking out the devastating means to protect all known life.\n\nYou could cry out loud, feeling the ensuing rush of giddiness and anxiety and importance and smallness. This all just somehow seems…meant for you? Whether you want it or not.\n\nBabe ${babename} Fortune the fated, always parsing the line between a life calling and a life sentence.\n\n*page_break\n\nEntering the back of the castle, you are met with the cool dampness of air trapped between stone. You are also met with an unexpected greeting party glittering so brightly, you have to fight to not look away.\n\nYou narrow your eyes to make out an assemblage of guards. At least, that's what you assume they are, these jagged human-shaped sentries seemingly compiled of crystalline shards. They're all different angles and sizes, but they all wear some kind of royal sash and cape, plus they all carry glacier-like swords.\n\nThe skin of the sharded sentries reflects across the stone walls of this cavernous entry foyer, glittering in constellations of speckled points. Once your eyes adjust, you can make out your reflection captured in their surfaces—but [i]only[/i] your own reflection. P.Savage and F.Spears still stand at your side, but you can only see yourself in the sentries. \n\nAnd not just that—impossibly, you see [i]different[/i] reflections of yourself in each one.\n\n*page_break\n\nBefore you can absorb these mirrored visages, you realize that the light that the sentries reflect actually emanates from one central source. \n\nThat's when you realize that the sentries all flank…\n\nThe most radiant ${princese} you have ever seen.\n\n*page_break\n\n$!{Leighhis} entire personage just screams youthful royalty. First there's ${leighhis} uniform: starched white, accented with royal green military stripes, and embossed with a bejeweled jade crest over ${leighhis} heart. Then there's the fact that ${leighze} wears a literal crystal crown nestled in ${leighhis} flowy pale-green hair.\n\nBut really, there's something about the commanding way ${leighze} holds ${leighhis} head high that just projects full ${princese} energy. \n\nAnd just like everything else on this planet, ${leighhis} colors feel super-saturated and rainbow-bright. Light shines from a scepter ${leighze} holds, one you can feel thrumming with power just under its prismatic, diamond-tipped surface. This light makes the ${princese}'s smooth skin sparkle like limestone, but perhaps most striking of all are ${leighhis} sharp emerald eyes. \n\n[i]Literally[/i]. The ${princese} appears to have shimmering emeralds for eyes.\n\n*page_break\n\n\"You are trespassing,\" the ${princese} announces, ${leighhis} voice humming like plucked harp strings. \"Our light penetrates your otherworldly guise.\"\n\nThat's when you remember you're still supposed to be invisible.\n\nThat's also when the ${princese} raises ${leighhis} scepter an inch, causing the sharded sentries to surge forward.\n\nAs the attack forms, you assess the best way to respond to this situation. \n\n*choice\n\t#Nudge along F.Spears and P.Savage to handle this one. I need to see what they're capable of. [i](Gain Limit, Half Perception, Half Technology)[/i]\t\n\t\t*set unleash %-15\n\t\t*set technology +2\n\t\t*set perception +2\n\n\t\tExcept that, of course, P.Savage steps forward to take the full charge—once again, quite literally.\n\n\t\tAccessing his energy storage and telekinetic abilities, P.Savage claps his hands together and lets off a stored-up energetic pulse.\n\n\t\tThis pulse takes out only a third of the sentries. So next, P.Savage begins to manipulate and bend the light energy in the foyer to brighten and surge, taking out another third. \n\n\t\tNow that he has sufficiently shown off his ample abilities, P.Savage stands poised to take out the final third of the sentries.\n\t\t*goto fightnotneeded\n\t#Conjure an illusory hammer-headed shark to spook the glass sentries enough to stop and avoid an unnecessary fight. [i](Gain Constructive, Perception)[/i]\n\t\t*set destructive %-15\n\t\t*set perception +4\n\n\t\tYou cast the spell with a pop of light from your twitching fingers, and suddenly an enormous shark seems to swim over your head. It has a literal hammer for a head, perfect for smashing things made of glass.\n\n\t\tThe sentries all freeze, and its like you can feel heightened fear emanating off of them.\n\n\t\tCould it be that sharks carry some kind of extra symbolic weight on this planet?\n\n\t\tEither way, your illusory frontal assault works like a charm.\n\t\t*goto fightnotneeded\n\t#Code a sentient virus to shatter the sentries. [i](Gain Destructive, Technology)[/i]\n\t\t*set destructive %+15\n\t\t*set technology +4\n\n\t\tYour fingers twitch at your side as you write magical lines of invisible code.\n\n\t\tOnce you are finished, the front half of the sentries all freeze. \n\n\t\tThe light they reflect seems to dim, then drain entirely until their bodies shatter apart.\n\n\t\tThe other half of the sentries cease their forward march, seeing the others scattered at their feet.\n\t\t*goto fightnotneeded\n\n*label fightnotneeded\n*page_break\n\n\"We didn't come here to fight,\" you finally shout, your group's point properly made. \"At least, not to fight you. We were called here to find the ${princese} of this castle and ask for their help in a search of dire importance.\"\n\nYou're not quite sure where your mythic-leaning vocabulary suddenly comes from, but you suppose it feels fitting. Or at least, you hope it does.\n\nThe ${princese} tilts ${leighhis} scepter ever-so-imperceptibly again, causing the remaining sentries to stand still. As they do, you finally catch clear glimpses of your reflections in their bodies. You see yourself differently in each one: \n\n[i]A war-sung hero. A grim reaper. A breathing weapon. A chaotic superstorm.[/i]\n\nIt makes your head hurt so much, you have to look away.\n\n*page_break\n\nThe ${princese} watches you carefully, seeming to ruminate over your words. Though really, watching isn't the right word. It's like ${leighhis} emerald sockets process information, reflecting through these crystalline sentries.\n\nSeeming to make up ${leighhis} mind, ${leighze} shifts ${leighhis} scepter once more. This time, the remaining sentries about-face and clink out of the stone foyer, their glittering reflections receding as they go. Only once they are gone does the ${princese} speak.\n\n\"I am ${princese} Kyleigh of the SeaS Isle of QueS, but my friends call me Leigh.\"\n\nLearning this shining ${princese}'s name, you suddenly know exactly who you want to be to ${leighhir}.\n\n*choice\n\t#I am incredibly attracted to ${princese} Leigh. I want to call ${leighhir} a name that'll only answer to me. [i](Gain Reckless, Belonging, Max ${princese} Kyleigh)[/i]\n\t\t*set reckless %+15\n\t\t*set belonging %+5\n\t\t*set kyleigh 80\n\n\t\tYou can already tell—if you're not careful, your feelings for this ${princese} could potentially supersede this mission. You suppose you'll have to decide just how much you care to be careful.\n\n\t\t\"What if I want to call you by my own name?\" you ask.\n\n\t\tLeigh turns ${leighhis} head once again, ever so slightly. And…receptively?\n\n\t\t\"I guess we'll have to find out,\" ${leighze} replies.\n\n\t\t*goto allrighttwo\n\t#Leigh strikes me instantly as a kindred spirit, bound by birthright. I want to be ${leighhis} friend indeed. [i](Gain Responsible, Belonging, Mid ${princese} Kyleigh)[/i]\n\t\t*set reckless %-15\n\t\t*set belonging %+5\n\t\t*set kyleigh 60\n\n\t\tBesides, you can already tell you're going to need Leigh's help to finish this mission, one way or another. Which will require not getting too close or too distant—just the right balance, as friendly allies.\n\n\t\t\"In that case, then we'd very much like to call you Leigh,\" you say.\n\n\t\tLeigh turns ${leighhis} head once again, ever so slightly. And…receptively?\n\n\t\t\"Good to know,\" ${leighze} replies.\n\n\t\t*goto allrighttwo\n\t#I might call this ${princese} \"Leigh\" to fool ${leighhir}, but ${leighze} just reminds me of all the \"pure-born\" kinds who always judge me most harshly. [i](Gain Responsible, Independence, Min ${princese} Kyleigh)[/i]\n\t\t*set reckless %-15\n\t\t*set belonging %-5\n\t\t*set kyleigh 40\n\n\t\tYou can already tell it will be good to keep your distance from Leigh. After all, ${leighze} will be a means to an end. Getting too close might interfere with your mission. Better to set the precedent now, so you'll perform to peak expectations later.\n\n\t\t\"Leigh it is,\" you announce, daring ${leighhir} to challenge you.\n\n\t\tLeigh turns ${leighhis} head once again, ever so slightly. And…receptively?\n\n\t\t\"Good to know,\" ${leighze} replies.\n\n\t\t*goto allrighttwo\n\n*label allrighttwo\n*page_break\n\n\"All right, you two,\" P.Savage says, in the cool tone of an annoyed uncle. \"Is there someplace we might convene to converse? Preferably a space far more private and far less…dingy?\"\n\nLeigh doesn't even bother glancing in P.Savage's direction, perhaps to ${leighhis} credit. \"We can talk in my quarters.\"\n\n\"That would be wonderful,\" F.Spears replies, pouring on the sugar to coat P.Savage's saltiness. \"You're the one we were told to find, so you being the first to find us is quite serendipitous.\"\n\nLeigh twitches a small smile. \n\n\"We SeaSons don't believe in serendipity. Come with me.\"\n\n*page_break SEVERAL STAIRCASES LATER\n\n\"So you're here for a Quest.\"\n\nLeigh doesn't ask it like a question, but ${leighze} does wait for your confirmation. However, you're a little busy soaking your surroundings. \n\nYou've entered ${princese} Leigh's private quarters, which feel straight out of a fantasy novel. These chambers come complete with gilded walls and a high-arched view of the glistening lake shimmering outside beneath the cloudless sky. \n\nThe only thing to break up all the bright gleams is the occasional streaking dragon-jet.\n\n*page_break\n\n\"[i]They[/i] wouldn't have let you pass if you weren't at least initially worthy, invisible or not,\" Leigh says, nodding towards the latest flapping jet, but still focused on you. \n\nOr at least, you think so. Leigh's head is angled toward you, but ${leighhis} emerald eyes have no pupils. \n\n\"We are worthy,\" P.Savage answers for you, settling into a plush throne-like chair. It's annoying how at-home he seems around all this golden finery. \"Are we correct to assume you are one worthy enough to help [i]us[/i]?\"\n\n\"Maybe,\" Leigh answers in a kind of sigh. \"At this stage, I'm obliged to give you the standard orientation for making it this far.\"\n\n*page_break\n\n\"So this isn't your first Quest?\" F.Spears asks in a gentle voice. It's soothing, but intentionally so. You're starting to see how F.Spears catches all her flies with honey.\n\nShifting your focus to P.Savage, their good-cop/bad-cop routine starts to clarify. It leaves you to wonder—how long have they potentially been working that angle on you?\n\n\"Everyone who lives on The Isle of QueS eventually gets pulled into a Quest. Some are worthier than others,\" Leigh replies. \"Let's begin.\"\n\nLeigh then blinks—the first time you've seen ${leighhir} do so, now that you think about it—and two beams of light suddenly shine from ${leighhis} emerald eyes. They project onto the nearest wall like a holographic screen. Somehow, soft music begins to play, though you can't quite pinpoint where the sound comes from.\n\n*page_break\n\n\"Please make your selections,\" a smooth, genderless voice then speaks alongside the music. \n\nAs it does, an interactive menu appears on the screen.\n\nYou stand, looking to F.Spears and P.Savage as you approach the screen. Not for permission, but rather daring them to challenge your lead.\n\nBoth simply look on, so you handle the holographic orientation. \n\n*label seasorientation\n*choice\n\t#[i]Where am I?[/i]\n\n\t\t[b]SeaS Geography[/b]\n\t\t*line_break\n\t\t--A galactically aware planet hidden and isolated in a pocket dimension.\n\t\t*line_break\n\t\t--The central landmass of SeaS, The MainlanD, is broken into four nations with vastly different resources, climates, and cultures: WiN, SpriN, SuM, and TuM. \n\t\t*line_break\n\t\t--The central point where these four nations meet is home to a politically neutral capital city, The NexiT.\n\t\t*line_break\n\t\t--The rest of the planet is covered in water, and rumored to be populated with secretly accessible islands.\n\t\t*line_break\n\t\t--The opposite spherical point from The MainlanD on the SeaS globe houses one large island, The Isle of QueS. [i](See Option: \"Why Am I Here?\")[/i]\n\n\t\t[b]MainlanD Wildlife[/b]\n\t\t*line_break\n\t\t--The MainlanD is teeming with unique and naturally evolving \"Monstias\": phobia-based beings (of varying levels of sentience) who only want to destroy and consume--and show you your own fears.\n\t\t*line_break\n\t\t--The MainlanD is also populated by a race known as \"Shards\": mindless automatons whose glass is easily shattered, whose masses are easily manipulated--and whose surfaces reflect your deepest insecurities.\n\t\t*line_break\n\t\t--The people of SeaS require constant defending from the roving populations of Monstias and Shards.\n\n\t\t[b]MainlanD Technology[/b]\n\t\t*line_break\n\t\t--SeaS is home to many galactic treasures, the most visible of which remains its artifact-rich deposits. \n\t\t*line_break\n\t\t--For reasons unknown, this paradise planet is brimming with ancient, empowered artifacts that are still being mined to this day.\n\t\t*line_break\n\t\t--These artifacts grant each user different abilities and resources based on unique genetic matching, so SeaS technology is always ebbing and flowing with the tide of artifact possession and inheritance.\n\t\t*line_break\n\t\t--The acquisition and mining of artifacts is the primary political, economic, and social driver on SeaS. It also plays a key role maintaining defenses against wild Monstia and Shards.\n\n\t\t*goto seasorientation\n\t#[i]Who lives here?[/i]\n\n\t\t[b]The MainlanD Population[/b]\n\t\t*line_break\n\t\t--The humanoids of the SeaS MainlanD live very differently and have developed distinct cultures based on their nation's unique climates and geographic patterns.\n\t\t*line_break\n\t\t--Markers of WiN: ice, water, snow, harshness, perseverance, festivities.\n\t\t*line_break\n\t\t--Markers of SpriN: flowers, forests, blooms, allergies, birth, sexuality.\n\t\t*line_break\n\t\t--Markers of SuM: desert, volcanoes, beaches, fatigue, ease, vacation.\n\t\t*line_break\n\t\t--Markers of TuM: foliage, gardens, harvest, withering, crisp-clarity, education.\n\t\t*line_break\n\n\t\t[b]The MainlanD Lawful[/b]\n\t\t*line_break\n\t\t--Based in the political capital, one special, mythic team is empowered to protect all four sectors, with members equitably representative of each one.\n\t\t*line_break\n\t\t--The [b]QuiX[/b] are the most famous and revered heroes on the planet, with heavy duties and legacies to live up to.\n\t\t*line_break\n\t\t--Each member of the QuiX is entrusted with one of the Eight Foundational Artifacts as their signature weapon.\n\t\t*line_break\n\t\t--In general, MainlanD law regulates the trade of artifacts and prohibits the use of Monstia or Shards for personal motives.\n\n\t\t[b]The]MainlanD Lawless[/b]\n\t\t*line_break\n\t\t--Despite governing laws, a dark market for the illegal trade of artifacts has always existed in some form, no matter how it is regulated.\n\t\t*line_break \n\t\t--This is partially because The MainlanD is home to a religious subset, believers in embracing the chaotic and ever-changing evolutions of artifacts. \n\t\t*line_break\n\t\t--These agents of chaos, some independent and some belonging to an ancient system of cults, exist forever locked in conflict with the QuiX.\n\t\t*line_break\n\t\t--These agents also believe in the use of Monstia and Shards for personal motives, despite the prevailing laws.\n\t\t*line_break\n\t\t--Some agents are even highly-evolved Monstia themselves, intelligent creatures who serve as destructive agents instead of mindless destroyers.\n\n\t\t*goto seasorientation\n\t#[i]Why am I here?[/i]\n\n\t\t[b]The Isle of QueS[/b]\n\t\t*line_break\n\t\t--Off-world non-SeaSons are only ever granted access to SeaS by being summoned to The Isle of QueS, a separate and secluded nation-state entirely isolated from The MainlanD.\n\t\t*line_break\n\t\t--Similarly, MainlanDers are only ever granted access to The Isle of QueS when summoned to Quest or to assist/resist in a trial of mettle.\n\n\t\t[b]QueS Wildlife[/b]\n\t\t*line_break\n\t\t--The Isle of QueS is home to its own ecosystem of artifacts, often of the most ancient and powerful variety.\n\t\t*line_break\n\t\t--The Shard population of QueS actually reflect the aspirations of onlookers, not their insecurities.\n\t\t*line_break\n\t\t--There are no Monstia native to QueS. Instead, there is rather a rich ecosystem of mysterious Questhings and mischievous mythological beasts.\n\n\t\t[b]QueS Culture[/b]\n\t\t*line_break\n\t\t--There is no formal political governing body on The Isle of QueS. \n\t\t*line_break\n\t\t--Instead, the questing capital, The QueSummiT, governs all Quests. \n\t\t*line_break\n\t\t--Beyond this, QueS is home to a pantheon of nine godes/gods/goddesses who rule the Isle and inspire various religious practices all across SeaS.\n\t\t*line_break\n\t\t--The pantheon also exists in tandem with generations of aforementioned mythological beasts, whose life purpose always remains to test the worthiness of aspiring royalty.\n\n\t\t*goto seasorientation\n\t#I've completed my orientation.\n\t\t*goto endtheorientation\n\n*label endtheorientation\n\nLeigh blinks again and the projection lights vanish. \n\n\"If your Quest is deemed true, our party will be granted access to QueSummiT to obtain what you have been called to seek,\" Leigh explains. \"Three trials of mettle will be arranged against us. Whether we succeed or fail in our custom-tailored odyssey, you three will then depart SeaS, with or without what you came for.\"\n\n\"And how do we know if our Quest will be deemed worthy?\" you ask. Despite yourself, you feel nervous about revealing the true reasons you've come here. Not that you're allowed to say much, but something tells you [i]unearthing an ancient energy source to power an unprecedented and highly mobilized weapon[/i] probably wouldn't go over too well. \n\n\"That isn't up to me,\" Leigh answers. \"I am honor bound to guide you no matter what your goals or motivations are. My cooperation beyond that duty, and how hard I fight on your behalf, is left up to my own discretion. Which, as you might guess, depends heavily on how much you decide to share with me.\"\n\n*page_break\n\nThere it is, right on cue. You resist the urge to slide your eyes to P.Savage or F.Spears for guidance, at least for now. Their silence so far feels like it speaks volumes about your role here.\n\n\"Have you led Questing parties before?\" you ask, in return.\n\n\"Once. More often I've been called to serve in an opposition obstacle,\" Leigh answers. \"This would be my first Quest with off-worlders, though. That doesn't happen often. And rarely ever for reasons that benefit the interests of SeaS.\"\n\nYou stare back at Leigh's unflinching face. You're probably going to need all the help you can get to complete this Quest, and obviously a local's knowledge could prove vital to your success. \n\nSo how are you going to make sure Leigh wants to fight on your side?\n\n*page_break\n\n\"We have been told to use our own discretion when working with our designated local guides,\" P.Savage finally cuts in, working to match every ounce of Leigh's authority. \"${babename}, you're the one who can rewrite reality rules. Do what must be done.\"\n\nThe subtext of P.Savage's words becomes immediately clear to you: he wants you to compel Leigh to cooperate using your spellpower, one way or another.\n\n\"Yet we've also been taught to respect the power inherent only in free will,\" F.Spears adds calmly. \"No force in the Galaxy can ever stamp that will out entirely.\"\n\nIn turn, F.Spears's subtext becomes equally clear: forcing someone to comply will never be as effective as inspiring them to do so. \n\nThe real question…\n\n*page_break\n\nWhat subtext do you believe?\n\nYou [i]cannot[/i] tell Leigh the core truth of why you're Questing—to stave off the alien Blot invasion. However, you [i]can[/i] tell ${leighhir} you're looking for an ancient power source to help protect the Galaxy.\n\nSo how should you handle unspooling this truth, knowing it will heavily affect all your relationships here?\n\nEspecially since, so far, you've been casting simple spells that build your skills. But this will be the first complicated spell that will [i]test[/i] your skills instead.\n\n*choice\n\t#Tell Leigh everything you are allowed to, but implant a chip in ${leighhis} brain that forbids ${leighhir} from ever speaking out loud about it to anyone but those present here. [i](Test Technology)[/i]\n\t\t*set chipkyleigh true\n\n\t\tYou have to close your eyes for this spell, because it's one of the most complicated you've ever executed. \n\n\t\tThe code scrawls across your mind—code that you magically transcribe onto a microchip, which you build circuit-by-circuit inside Leigh's brain. It is tricky and delicate work, but you've studied your flirping butt off for years to get this good.\n\n\t\tOnce the work is done, Leigh's face changes, buckling under the weight of this new knowledge—and the realization of what you've done. \n\n\t\tWith another wave of your hand, you bring P.Savage and F.Spears up to perceptive speed about the spell you just cast.\n\n\t\t*page_break\n\n\t\tF.Spears appears troubled, P.Savage appears pleased, while Leigh appears disgusted with you. This might have been a ruthless and forceful route to take, but you also know it's what's best for the mission.\n\n\t\tLeigh will certainly feel motivated to see your Quest finished successfully, knowing now what you are capable of—and what kind of stakes you're dealing in. It's better to be safe and distant than sorry.\n\n\t\t*if (technology > 15)\n\t\t\t*set potency +2\n\t\t\t*set belonging %-5\n\t\t\t*set kyleigh %-30\n\t\t\t*set fspears %-30\n\t\t\t*set psavage %+30\n\t\t\t\n\t\t\tBesides, flexing your skills and knowledge this way feels really good. Not only that, you can tell how much it frightens and impresses the others—some more than others, clearly.\n\n\t\t\t[i](Boosted Bonus Potency. Gained Independence, P.Savage. Lost ${princese} Kyleigh, F.Spears)[/i]\n\t\t\t*goto nobettertime\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set belonging 50\n\t\t\t*set kyleigh %-15\n\t\t\t*set fspears %-15\n\t\t\t*set psavage %+15\n\n\t\t\tHowever, your proficiency with Technology isn't quite where it needs to be for a spell this complicated. You still manage to pull it off, but strain and sweat drip across your overly reddened face. \n\n\t\t\tUnfortunately, this causes the others to visibly doubt not just your skill, but also your judgment.\n\n\t\t\t[i](Gained Basic Potency. Balanced Belonging-Independence. Gained P.Savage. Lost ${princese} Kyleigh, F.Spears)[/i]\n\t\t\t*goto nobettertime\n\t#Tell Leigh everything you are allowed to by implanting a mental Perception bubble—one that will burst and evaporate on its own or at your specific command. [i](Test Perception)[/i]\n\t\t*set bubblekyleigh true\n\n\t\tYou have to close your eyes for this spell, because it's one of the most complicated you've ever executed.\n\n\t\tIt requires delicate perceptive and mental threading that is as easy to rupture as—well, a bubble. It is tricky and delicate work, but you've studied your flirping butt off for years to get this good.\n\n\t\tOnce the work is done, Leigh's face changes, buckling under the weight of this new knowledge—and the realization of what you've done. As violated as ${leighze} might feel, you can also tell ${leighze} immediately understands your need for secrecy. And maybe even feels relieved not to have to carry this knowledge one minute longer than necessary.\n\n\t\tWith another wave of your hand, you bring P.Savage and F.Spears up to perceptive speed about the spell you just cast.\n\n\t\t*page_break\n\n\t\tF.Spears and P.Savage both also appear to think this compromise is satisfactory. It balances relationships and mission objectives in a move that makes no one completely happy, but no one completely disgusted either.\n\n\t\t*if (perception > 15)\n\t\t\t*set potency +2\n\t\t\t*set belonging %-5\n\t\t\t*set kyleigh %+20\n\t\t\t*set fspears %+20\n\t\t\t*set psavage %+20\n\t\t\t\n\t\t\tBesides, flexing your skills and knowledge this way feels really good. \n\n\t\t\tNot only that, you can tell how much it frightens and impresses the others—some more than others, clearly.\n\n\t\t\t[i](Boosted Bonus Potency. Gained Independence, ${princese} Kyleigh, F.Spears, P.Savage)[/i]\n\t\t\t*goto nobettertime\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set belonging 50\n\t\t\t*set kyleigh %+10\n\t\t\t*set fspears %+10\n\t\t\t*set psavage %+10\n\n\t\t\tHow
