I have been insulated and protected…\"\n\n*page_break\n\n\"But once you leave here with The Spanbook, others might come after you for it in the Verses Galaxy at large.\" \n\nHearing this, you realize this gift will be just like any other rare power source, coming with built-in advantages and obstacles. \n\nSo do you take what One-Fourteen is offering?\n\n*label tick\n*check_purchase database\n*choice\n\t#Yes, I'll accept The Spanbook as a skills-boosting database guide I can further explore. [i](Balance Belonging-Independence)[/i]@{choice_purchased_database | [i](Requires In-App Purchase)[/i]}\n\t\t*check_purchase database\n\t\t*if choice_purchased_database\n\t\t\t*label database_purchased\n\t\t\t*set belonging 50\n\t\t\t*set unlockedspanbook true\n\t\t\t*goto postsbookoffer\n\t\t*else\n\t\t\t[b]Spanbook Bonding[/b]\n\n\t\t\tBond to your unique Spanbook! Not only will you customize the name and appearance of the book's avatar, it will provide strategy tips and boost the necessary Stats at key points, while also providing rare historical timeline readouts about the Verses Galaxy.\n\t\t\t*purchase database $0.99 database_purchased\n\t\t\t*page_break No, Thanks\n\t\t\t*goto tick\n\t#I appreciate the offer, but I don't need to add any additional risk to our mission. [i](Gain Belonging)[/i]\n\t\t*set belonging %+5\n\t\t*goto postsbookoffer\n\t#I don't trust this offer, so I won't take it. [i](Gain Independence)[/i]\n\t\t*set belonging %-5\n\t\t*goto postsbookoffer\n\n*label postsbookoffer\n\n*if unlockedspanbook\n\tYou take the flashstick from One-Fourteen's hand, nodding a thank-you. As you do, the flashstick suddenly melts into your hand, literally becoming one with you. \n\n\tYou'd be startled, if you weren't already keenly accustomed to organic-tech-magic-merges.\n\n\t\"You can re-solidify The Spanbook flashstick when you know it's time to pass it along,\" One-Fourteen explains. \"Until then, The Spanbook will sense when you need assistance and automatically activate.\"\n\n\tAs One-Fourteen explains this, suddenly a virtual avatar appears in your mind. Clearly it's the manifestation of your unique interface, so naturally you can customize it.\n\n\t*choice\n\t\t#My Spanbook interface avatar is a glowing figure of blue-white light. [i](Boost Bonus Shades)[/i]\n\t\t\t*set shades +10\n\t\t\t*set spanbookglowing true\n\n\t\t\tThe avatar rearranges its shape to fit your custom vision, like it has been born straight out of your imagination as an extension of your own self.\n\n\t\t\tIt's the most dignified sight you've ever encountered.\n\t\t\t*goto namespanbook\n\t\t#My Spanbook interface avatar is a fierce general made of mirrors. [i](Boost Bonus Enhancement)[/i]\n\t\t\t*set enhancement +10\n\t\t\t*set spanbookgeneral true\n\n\t\t\tThe avatar rearranges its shape to fit your custom vision, like it has been born straight out of your imagination as an extension of your own self.\n\n\t\t\tIt's the bravest and most reflective sight you've ever encountered.\n\t\t\t*goto namespanbook\n\t\t#My Spanbook interface avatar is a ring of silver and ruby. [i](Boost Bonus Shades)[/i]\n\t\t\t*set shades +10\n\t\t\t*set spanbooksilvered true\n\n\t\t\tThe avatar rearranges its shape to fit your custom vision, like it has been born straight out of your imagination as an extension of your own self.\n\n\t\t\tIt's the most balanced, silvered sight you've ever encountered.\n\t\t\t*goto namespanbook\n\t\t#My Spanbook interface avatar is a living, breathing triquetra. [i](Boost Bonus Enhancement)[/i]\n\t\t\t*set enhancement +10\n\t\t\t*set spanbooktriquetra true\n\n\t\t\tThe avatar rearranges its shape to fit your custom vision, like it has been born straight out of your imagination as an extension of your own self.\n\n\t\t\tIt's the fiercest and most versatile sight you've ever encountered.\n\t\t\t*goto namespanbook\n\n\t*label namespanbook\n\n\tIt's a form that takes on even more significance when this avatar asks you for a name.\n\n\tThinking carefully, you decide to name your Spanbook avatar:\n\n\t*choice\n\t\t#Kiht Nahd.\n\t\t\t*set spanbook \"Kiht Nahd\"\n\t\t\t*goto spanbookspeaks\n\t\t#Limoht.\n\t\t\t*set spanbook \"Limoht\"\n\t\t\t*goto spanbookspeaks\n\t\t#Resir.\n\t\t\t*set spanbook \"Resir\"\n\t\t\t*goto spanbookspeaks\n\t\t#Tcesretni.\n\t\t\t*set spanbook \"Tcesretni\"\n\t\t\t*goto spanbookspeaks\n\t\t#I'd like to input a custom name.\n\t\t\t*input_text spanbook\n\t\t\t*goto spanbookspeaks\n\n\t*label spanbookspeaks\n\t*achieve spanbookguide\n\t*set spellodexspanbook true\n\n\t[i]${spanbook}[/i] your Spanbook avatar says out loud. \n\n\tOr no, its voice projects into your mind, more as a feeling than with words.\n\n\tIt's a clear sign you are now telepathically bonded to ${spanbook}, your Spanbook avatar.\n\n\tIn fact, your Spellodex even pings with a new entry. ${spanbook} will appear to boost your stats at pivotal moments, but if you ever want to dive deeper into The Spanbook on your own time, the portal to do so now exists in your Spellodex.\n\t*goto arrivalwreedlair\n*else\n\t*set spellodexspanbook true\n\n\tOne-Fourteen nods, understanding your decision.\n\n\tHowever, as ${oftze} puts The Spanbook flashstick away, your Spellodex actually pings with a new entry.\n\n\tThanks to One-Fourteen's generosity, you have been granted rare galactic remote access. You might not have The Spanbook custom-bonded to you to boost your stats at pivotal moments… \n\n\tBut you can see that if you ever want to dive deeper into The Spanbook on your own time, the portal to do so now exists in your Spellodex.\n\t*goto arrivalwreedlair\n\n*label arrivalwreedlair\n*page_break\n\nBefore you can say more to One-Fourteen, a loudspeaker crackles above your heads in this passenger hangar. \n\n\"We're about to arrive at The Wreeduletta Residence In Hiding,\" Thatbee speaks over the intercom. \"Tighten up your buttons, kiddos.\" \n\nAs the loudspeaker cuts out, One-Fourteen turns to you. And the sudden look of meaning and depth in ${ofthis} eyes threatens to knock you right out of your seat.\n\n\"In case this wasn't already clear,\" ${oftze} begins, \"I will do everything I can to make sure this investigation goes smoothly, and to lessen the potential impact your work here will have on Gothika.\"\n\n*fake_choice\n\t#I'm not usually one to accept such direct kindness and support—I actually don't really know what to do with it.\n\t\tSo you simply nod your thanks. \n\n\t\tReally, it would be nice to leave this planet with what you came for and without catching any galactic criminal charges.\n\n\t\tAnd if One-Fourteen is in a position to help you with that, regardless of your personal relationship or ${ofthis} complicated history with your Versian allies…\n\n\t\tThen you're not in a position to turn down that kind of support.\n\t#I give One-Fourteen one quick nod. I don't need to reveal more than necessary.\n\t\tThough really, it would be nice to leave this planet with what you came for and without catching any galactic criminal charges.\n\n\t\tAnd if One-Fourteen is in a position to help you with that, regardless of your personal relationship or ${ofthis} complicated history with your Versian allies…\n\n\t\tThen you're not in a position to turn down that kind of support.\n\n\t\tBut [i]${oftze}[/i] doesn't need to know that.\n\t#I smile at One-Fourteen as graciously as I can manage, even though I'm not very used to doing so.\n\t\tStill, you try your best to express some gratitude, even if you're out of practice.\n\n\t\tBecause it would be nice to leave this planet with what you came for and without catching any galactic criminal charges.\n\n\t\tAnd if One-Fourteen is in a position to help you with that, regardless of your personal relationship or ${ofthis} complicated history with your Versian allies…\n\n\t\tThen you're not in a position to turn down that kind of support.\n\n*page_break\n\nNext, the door to the passenger hangar opens and ChantuSe alone appears. Looking between you and One-Fourteen, she makes some kind of quick assessment.\n\n\"I see you two are up to speed. Good,\" she says. \"Before we arrive, you both need to know what we're really looking for here. I was able to single out five suspects with extraterrestrial galactic energy on them. Obviously this could be possible for other reasons. It [i]will[/i] be for other reasons for four of our five suspects. But for one of them, this exotic energy signature will hopefully signal that they are Binaria in hiding.\n\n\"That said, I haven't yet discerned how to identify beyond Binaria's disguise. Vortal and I are pooling our sense-resources to work on that one. But if that's not enough, ${babename}, it might fall to your spellpower to shatter Binaria's illusion and expose her true self.\"\n\nYou nod. ChantuSe's update only offers further proof that building your spells skills will be more and more important as you progress along this fated journey.\n\n*page_break\n\n\"To this end, it's time you knew more about the threat we're facing, and the forces we aim to unlock,\" ChantuSe then says. \"It's a good thing One-Fourteen is here. You can read some of our aggregated memories from Versus, cross-referenced for corroboration, so you can get up to speed. I've taken the liberty of shifting to declassify some relevant memory images.\"\n\n\"So, ${babename},\" ChantuSe concludes. \"Are you prepared to glimpse the most destructive and constructive forces in the known universe?\"\n\nWell, when ChantuSe puts it that way…\n\nYou have no choice but to snap your spell-fingers to take a look.\n\n*temp whatblots true\n*temp whatbins true\n*temp whatblotsbins true\n\n*label learnblotsbins\n*choice\n\t*selectable_if (whatblots) #What is a Blot really like? [i](Gain Enhancement)[/i]\n\t\t*set enhancement +2\n\t\t*set whatblots false\n\n\t\tEnhancing the offered memory image from ChantuSe and One-Fourteen's joint mental custody, you begin to see a series of events unfolding on a battlefield.\n\n\t\t[i]Each Blot stands eight feet tall, a tower of rotten black flesh that slimes and decays as it moves. Blots have no eyes or ears, no nose or mouth, just featureless black heads spiked with two protruding blacknamel tusks. They are like giant slugs with limbs, except they happen to smell ten times worse.[/i]\n\n\t\t[i]A Blot then lurches violently and overwhelms a humanoid soldier, stabbing him with its long tusks. Blots are generally slow, but once in proximity to their prey, they experience surges of speed to stab mercilessly. The stricken soldier's skin begins to turn a purplish-grey within seconds, as the Blot drains the blood from his veins through its tusks.[/i]\n\n\t\t[i]The soldier is then tossed away, his body already beginning to bloat black, transforming into another number in the soulless Blot army.[/i]\n\n\t\t*page_break\n\n\t\tScrolling forward, you then see images of what must be some kind of Blot leader-being. Especially because one name echoes inside your mind: \n\n\t\t[i]Empress Vaccus.[/i]\n\n\t\t[i]It sloshes across the field, but not the way a normal Blot does. It moves with purpose, its nimble limbs littered with dozens of blacknamel tusks. It's twice the size of an ordinary Blot, its towering head adorned with a crown of spikes. Though all focus is pulled to the red V painted in blood across its chest.[/i]\n\n\t\tClosing this mental imagery, you try not to shiver in your seat. You know the Destructive Eight attempted to impart the terror of the Blots upon you…\n\n\t\tBut seeing them in the putrid flesh sends a fresh chill up your spine. Especially knowing that an entire galaxy-of-worlds' worth of Blots now hurtle toward the Verses Galaxy.\n\t\t*goto learnblotsbins\n\t*selectable_if (whatbins) #What are the machine-human hybrids we aim to create really like? [i](Gain Enhancement)[/i]\n\t\t*set enhancement +2\n\t\t*set whatbins false\n\n\t\tEnhancing the offered memory image from ChantuSe and One-Fourteen's joint mental custody, you see a series of events unfold from a summit held on an advanced spaceship. A glowing figure gives a speech before a diverse crowd of hesitant diplomats.\n\n\t\t[i]\"Humanoid bodies are built to heal, allowing them to recover from imperfection. Binarian android bodies, conversely, are built to be indestructible, but remain incapable of healing—if any imperfection is found, they are discarded…I do not believe, as many of you do, that either life-form is superior to the other. But I do believe that a superior form of life is possible here, in a way that I have found is impossible in the galaxy beyond.[/i]\n\n\t\t[i]\"It is my belief that the perfect being lies somewhere in the middle, a combination of android awareness and control with human individuality and spontaneity. A combination of android indestructibility with human healing. A combination of android preservation with human urgency. Thus, I believe wholeheartedly in androids with souls, in humans with coding. I believe in the perfect evolution into Binumanity.[/i]\n\n\t\t[i]\"Combining the elusive soul with coded control is the only true way to create these ideal Binumans. This combination must be made with great urgency, for there is a terrible threat coming, one that we all must unite to fight. I have traveled your galaxy far and wide to find the perfect life-form capable of leading the charge against this indomitable foe. I now believe that Binumans are the only life-forms truly capable of evolving to a plane of existence equipped to oppose these beings, who threaten the very fabric of this galaxy and every galaxy hereafter.\"[/i]\n\n\t\t*page_break\n\n\t\t[i]\"Since it will surely not be enough to simply tell you, I shall now show you.\"[/i]\n\n\t\t[i]The being's skin shimmers for a moment, as if made of liquid, then begins to slide and rearrange until becoming something entirely new: as a perfect humanoid, muscled and lean, with metal seams running throughout like steel veins. Their eyes glow a bluish white and they have no hair, just a bundle of wires that fall that way.[/i]\n\n\t\t[i]This must be what a human-Binarian android hybrid would look like, in its most ideal form: The Binuman.[/i]\n\n\t\tTaking a moment, you realize this is the surprisingly beautiful form you're seeking Binaria out to create. Suddenly, it feels infinitely more worthwhile to do so. Why would Binaria exile herself for coding the spell to create something so…transcendent? \n\n\t\tThough you remind yourself, long before this Binuman vision, Binaria actually cast the Compuspell to create Binarian androids in the first place, a race that later sought to annihilate humanity. However, if this vision of advanced Binumanity is shown to the long-hiding Binaria, could she be compelled to recreate her sourcing spell?\n\n\t\t*page_break\n\n\t\tThe mental page turns to a new chapter and the answer to your last question becomes murkier. You see a different version of the Binuman, one that has been customized for maximum abominable carnage. And indeed, you hear its hauntingly appropriate name echo in your mind: [i]Bominate[/i].\n\n\t\t[i]You see its rusted metal joints first, pieced together under globs of hanging flesh that are putrid and oily. Blue interior lights shine through a human face, one that appears to have been sliced off and stretched over a metal skull. Sparse black tendrils of hair hang from the rotting scalp, falling all the way to the thing's waist, which is covered with loose denim jeans. \n\n\t\t[i]You then see another version which seems to be several inches taller, with spiked clumps of reddish hair and human eyeballs dangling from its metal sockets. You also see that it sports acid cannons and retractable blades in addition to its Binuman invincibility, regeneration, speed, and strength.[/i]\n\n\t\tGlimpsing this horrifying and warped creation, you see that Binaria must have always understood the underside of her Binarian creation. You also understand more keenly now that, in seeking the spell to create a Binuman army…\n\n\t\tYou also seek the spell that could potentially create a legion of these deadly Bominate killing machines. \n\t\t*goto learnblotsbins\n\t*selectable_if (whatblotsbins) #What happens when these beings face one another? [i](Gain Double Shades)[/i]\n\t\t*set shades +4\n\t\t*set whatblotsbins false\n\n\t\tThe memory you enter now feels like a different shade—while the others were gifted to ChantuSe and One-Fourteen secondhand, this one feels more directly firsthand by ChantuSe herself. Potentially even from her own experience on planet Versus?\n\n\t\t[i]In a contained arena, you see the Blot Empress Vaccus facing off against a warped-Binuman Bominate. Your eyes shift from the Bominate's putrid globs of flesh stretched over its rusted metallic frame to the Blot royal's blacknamel tusks and sluglike flesh and blood-soaked fury. Seeing these unnatural beings in one space makes your skin crawl all over.[/i]\n\n\t\t[i]It's hard to make out much in the eruption of limbs and sand that ensues, but you focus on the Bominate's movements as much as possible, hoping it might prove capable of defeating the Blot. The Bominate first tries frying Empress Vaccus with streams from its acid cannons. When Empress Vaccus proves too fast and durable for these acidic washes, the Bominate starts hacking away with its retractable wrist blade. Unfortunately, Empress Vaccus quickly snaps that blade in two with its bare hands. The Bominate begins punching wildly then, until Empress Vaccus quite literally bites off both of its arms.[/i]\n\n\t\t[i]As a seemingly desperate resort, the Bominate tries to activate some kind of exposed nuclear heartbomb. The intense blasts that suddenly emanates from the Bominate's chest seems to actually singe and sear Empress Vaccus…[/i]\n\n\t\t*page_break\n\n\t\t[i]Until Empress Vaccus recovers, unhinging its ungodly jaw and consuming the Bominate's entire body whole, nuclear heartbomb and all. With its once-indestructible shell so thoroughly devoured and defiled, it seems the Bominate can't regenerate.[/i]\n\n\t\tThe constructive, consumptive fury with which Empress Vaccus subsumes the Bominate…it creates a pit of dread so dense, it feels like a vortex inside of you.\n\n\t\tHowever, you understand why ChantuSe shared this particularly grim memory with you. If you aim to ask Binaria to take her Binarian creation into its next logical steps, you will need to show her you aim to create Binumanity. And since this memory serves as proof that the twisted, mindless Bominate cannot overcome Blots, it will prove to Binaria that you truly aim to create Binumans.\n\n\t\tYou only hope the radiant, sentient Binumans actually stand a chance against the average Blot. Otherwise, it might fall to more powerful beings to take down the more insidious Blot royals…\n\n\t\tBeings like you?\n\t\t*goto learnblotsbins\n\t#I'm finished learning.\n\t\t*goto warnedgalagents\n\n*label warnedgalagents\n*set spellodexbominatevaccus true\n*achieve learnbombinatevaccus\n\nAs these visions recede, your Spellodex pings with another entry update. Knowing that's there for you when you have more time, you fight not to visibly shudder in front of ChantuSe and One-Fourteen as your sight reengages the blimp's passenger hangar.\n\n\"I know that is a lot to absorb,\" ChantuSe offers. \"For what it is worth, we spent…more time than I'd have preferred with the Bominate on Versus. Even without the ability to communicate, it was truly one of the most vile creatures I've ever encountered. We would never, ever seek to create such a thing using Binaria's Compuspell source code.\"\n\nYou don't quite know why ChantuSe speaks on this matter with such emphasis, but One-Fourteen seems to sense how intense she has become as well.\n\n\"That said, the Bominate kept those of us on the Destructive side safe for many, many Versus matches,\" ${oftze} jumps in. \"It was certainly the big bad for a long time, until it ran across an even bigger bad. But the Bominate was also pretty mindless, like a zombie itself. I'd bet a Binuman would indeed stand a far better chance.\"\n\nYou fight to react visibly, but underneath…\n\n*fake_choice\n\t#I am truly haunted by the specific awareness of these terrifying beings.\n\t\tThe concept of them was terrifying enough. But seeing actual Blots in the putrid flesh was…traumatizing.\n\t#I fully realize that what we aim to unleash might be as horrifying as the Blot threat we hope to fight.\n\t\tThat is, if this Compuspell somehow begets more Bominates instead of the intended Binumans.\n\t#I actually relate to these beings. \n\t\tI am a hybrid stronger than my own kind, reviled and rejected as inherently evil for possessing that strength.\n\t#Blots and Bominates have never met a being quite like me.\n\t\tNo one has. Your power is singular. And if it comes to it, you aim to show these vile creatures how it feels to be terrified.\n\nHowever, you don't feel prepared to speak this sentiment out loud. \n\nInstead, you speak a few simple words to these two Destructive Versians, these beings who shared these unfathomable sights with you. \n\nBecause right now, all you hope to project is confidence.\n\n\"Well, if that doesn't convince Binaria to come out of retirement, I don't know what will.\"\n\n*page_break LANDING AT THE WREEDULETTA RESIDENCE\n\nThatbee's blimp lands in a clearing beside a darkening forest, as the sun sets somewhere behind the cloud cover. The spires of Gothika loom in the distance, as you find yourself in some kind of wealthy suburb. The houses here all feel like mini-mansions, in some architectural style obviously unique to planet Gothika. \n\n\"This isn't exactly the secret bunker hideout I was expecting,\" you say, regathering with the others in the field. To your right stands another large, castle-style house complete with turrets and stained glass windows.\n\n\"Our suspects feel fine hiding in plain sight, since no one has what it takes to bring in wanted Genies besides #TeamThatbee,\" Thatbee explains. \"And we don't bring anyone in unless we're paid to. Well, usually.\"\n\nThatbee looks both disgusted and overwhelmed for a moment, but then forces herself to swallow both emotions.\n\n*page_break\n\n\"As you probably already know, these two suspects are some of our toughest bounties,\" One-Fourteen jumps in. \"It costs a lot to take them in. You three must have a lot to offer.\"\n\nClearly, One-Fourteen is trying to warn you in code. After all, ${oftze} has decided to still play the part of the innocent local Gothikite, for Thatbee's sake.\n\n\"So we're all on the same page, let me tell you about our suspects,\" Thatbee picks up. \n\nYou then realize she also thinks she needs to pretend your party are local clients, for One-Fourteen's sake. This deceptive layering is almost enough to make your head hurt. For a planet that is famously sensitive to its perceptions being played with, its residents still seem rather good at it.\n\n*page_break\n\n\"Wreed is one of the original Genies, and believe it or not, once upon a time he was actually the most revered hero of Gothika,\" Thatbee continues. \"But when the truth of all Genie abilities was revealed, it turned out that the more noble Wreed's deed, the more that just meant he had stolen what meant most to someone. In other words, Wreed stole the strongest talent of any person whose life he saved, subsequently ruining most of them.\n\n\"Meanwhile, Wreed's wife, Amuletta, was once respected as a kind of first lady of Gothika's charity circuit. However, when it all came tumbling down, it was revealed that the worst of Wreed's thefts were committed to keep Amuletta's insatiable appetite for finery at bay. \n\n\"It turns out she had been hoarding tech-laced antiquities from every charitable board she chaired. The most precious of which was actually a skill-soaked amulet, for which she renamed herself. This amulet was—and remains—able to contain and channel the most precious talents stolen by Wreed. As a result, Amuletta is able to muster feats of great talent and skill at her personal whims. \n\n\"She also still has blood-bonded possession of a bejeweled teleportation javelin that makes the couple particularly hard to keep in place.\"\n\nHearing all this…\n\n*fake_choice\n\t#I think of the Vortal Portal Jewels Tellie warned me about. Could the price to pay for such transportive treasures always be paid in blood?\n\t#It makes me understand what my guides meant by \"unique magic-tech\" all around on Gothika. \n\t#It helps me understand why toying with perceptions would not be a way gain to any trust on this particular planet.\n\t#It makes me respect Wreed and Amuletta's hustle. True power always comes at a cost, usually to others.\n\n\"Always delighted to know our infamy burns brightly in the minds of the lesser.\"\n\nYou hear a deep, raspy female voice speak these words and look up to find a woman who must be Amuletta standing in the doorway. She appears to be in her late forties, but peppered generously with cosmetic surgery and contoured makeup. She is also dressed not unlike a dominatrix, covered in midnight leather, dark gems, and black diamonds—no doubt her most prized antiquity possessions. \n\nSpeaking of, she wears a large amulet in the center of her chest, which you now know is filled with the stolen talents of countless tragic victims. All this darkness contrasts her near-white alabaster skin and long platinum-blond hair.\n\nBeside her, Wreed stands a little less tall, a man clearly nearing his seventies. He still wears all spiked and studded black, like a sad rock star past his prime. He has sagging and spotted and sallow beige skin, which actually matches the sunken grounds around his hideout. \n\nIn fact, your spell awareness lets you notice that the entire property is laced with underground spikes, ready to protrude like land mines. It must be another example of the unique magic-tech here on Gothika.\n\n*page_break\n\n\"You must be drawing your wordplay from some second-rate hack, Amuletta,\" Thatbee returns. \"Your quips used to be as legendary as your looks.\"\n\nAt this, you actually see a frown twitch at the corners of Amuletta's plump-filled lips. Without another word, she simply turns to her husband and nods. With the push of a stud on his leather jacket, the ground all around you begins to rumble. The spikes start to drill their way out of the dirt, erecting a deadly obstacle course between your group and the house.\n\nJust before a spike obscures your vision, you see Amuletta reaching for a sparkling javelin. Laying your eyes upon it, it's like your spell-senses can feel the depths of its darkness from this far away. You have the distinct feeling that a plane full of crash victims' blood went into procuring this antiquity. \n\nIt makes you quake with anger down to your bones. You dabble in rule-breaking magic, but the magic wrought by this couple is downright [i]devious[/i].\n\n*page_break\n\nQuickly, you decide three things.\n\nFirst, given how quickly Wreed and Amuletta might manage to escape, you understand Thatbee and One-Fourteen's warnings much more keenly.\n\nSecond, you will need to move exceedingly fast to get close enough to stop and spell-read this dastardly couple.\n\nAnd third, you will [i]enjoy[/i] taking these two down.\n\n*page_break\n\n*if unlockedspanbook\n\n\tIn the split seconds before this first case is engaged, The Spanbook avatar ${spanbook} appears in your mind. \n\n\tKnowing what you must accomplish, it offers you some sacred nuggets of expansion, specifically on the state of Powerfulness and Powerlessness…\n\n\tThe effects of which will expand your horizons and also the abilities most needed for this upcoming battle. So you check your levels and decide to read:\n\n\t*temp urnofunpredictabilityd 0\n\t*rand urnofunpredictabilityd 1 4\n\n\t*choice\n\t\t#Representative of the Powerless and the Powerful. [i](Auto Boost Stronger Stat)[/i]\n\n\t\t\t[b]Span The Sergiverses[/b]\n\t\t\t*line_break\n\t\t\t[b]Entry:[/b] Year 2100\n\t\t\t*line_break\n\t\t\t[b]Location:[/b] Sorrel Fork, Blende\n\t\t\t*line_break\n\t\t\t[b]Relevant Event:[/b] A team of powerful beings is founded on the central trade-hub planet Blende, eventually considered to be the most iconic heroes in the Verses Galaxy: The Representatives. \n\n\t\t\t*if (powerful >= 50)\n\t\t\t\t*set powerful %+30\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Powerful level rise higher.\n\n\t\t\t\t[i](Powerful Represented)[/i]\n\t\t\t\t*goto caseonesusread\n\t\t\t*else\n\t\t\t\t*set powerful %-30\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Powerless level rise higher.\n\n\t\t\t\t[i](Powerless Represented)[/i]\n\t\t\t\t*goto caseonesusread\n\t\t#Representative of the Responsible and the Reckless. [i](Auto Boost Stronger Stat)[/i]\n\n\t\t\t[b]Span The Sergiverses[/b]\n\t\t\t*line_break\n\t\t\t[b]Entry:[/b] Year 2101\n\t\t\t*line_break\n\t\t\t[b]Location:[/b] Sorrel Fork, Blende\n\t\t\t*line_break\n\t\t\t[b]Relevant Event:[/b] The Representatives welcome, and then dismiss, the traitorous Repo member Riptide after he is revealed to be an agent of The Native. Two replacement members, Waverunner and Ava, are initiated instead. \n\n\t\t\t*if (reckless >= 50)\n\t\t\t\t*set reckless %+30\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Reckless level rise higher.\n\n\t\t\t\t[i](Reckless Represented)[/i]\n\t\t\t\t*goto caseonesusread\n\t\t\t*else\n\t\t\t\t*set reckless %-30\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Responsible level rise higher.\n\n\t\t\t\t[i](Responsible Represented)[/i]\n\t\t\t\t*goto caseonesusread\n\t\t#Representative of Unpredictability. [i](Double-Strength Boost, But Randomly Applied)[/i]\n\n\t\t\t[b]Span The Sergiverses[/b]\n\t\t\t*line_break\n\t\t\t[b]Entry:[/b] Year 2102\n\t\t\t*line_break\n\t\t\t[b]Location:[/b] Sorrel Fork, Blende\n\t\t\t*line_break\n\t\t\t[b]Relevant Event:[/b] The Representatives are called off-world to save the imperiled home planet of a young hero named Reme, who is eventually invited to join The Representatives. This sparks a new young adult team initiative, heralded by new members Damp and Mantle. \n\n\t\t\t*if (urnofunpredictabilityd = 1)\n\t\t\t\t*set powerful %+60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Powerful level rise exponentially higher.\n\n\t\t\t\t[i](Powerful Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityd = 2)\n\t\t\t\t*set powerful %-60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Powerless level rise exponentially higher.\n\n\t\t\t\t[i](Powerless Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityd = 3)\n\t\t\t\t*set reckless %+60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Reckless level rise exponentially higher.\n\n\t\t\t\t[i](Reckless Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityd = 4)\n\t\t\t\t*set reckless %-60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Responsible level rise exponentially higher.\n\n\t\t\t\t[i](Responsible Double Boosted)[/i]\n\n\t\t\t*goto caseonesusread\n*else\n\tAs you prepare to act, you suddenly feel a dull ache in the back of your mind…\n\n\tAlmost as if longing to be filled with The Spanbook One-Fourteen offered you earlier. \n\n\tSomething tells you that if you had accepted it, there would be upgrades and information brimming at your spellcasting fingertips.\n\n\tBut you shake off that feeling, because you have work to do with the resources currently at your disposal.\n\t*goto caseonesusread\n\n*label caseonesusread\n*page_break\n\n\"Aiming for Amuletta,\" Thatbee calls out, once again breaking forward with astonishing reflexes.\n\nOne-Fourteen follows, breaking left with eyes set on Wreed. Perhaps predictably, ChantuSe follows ${ofthir}, while Vortal speed-slithers behind Thatbee.\n\nYou might not be able to spell-read both suspects in time, so you need to make a fast judgment call. Could the presence of these powerful antiquities be the galactic energy that ChantuSe is picking up on both suspects? Or could only someone like Binaria in hiding have enough knowledge to understand the value of such rare antiquities in the first place?\n\nWhatever you decide, you prepare to cast another straightforward spell, to build your skills.\n\n*temp cluecredits 0\n*temp wreedulettaread false\n*temp wreedread false\n*temp amulettaread false\n\n*choice\n\t#Power up Vortal and Thatbee so they can do their worst to Amuletta. [i](Test Powerful. Gain Enhancement, Thatbee. \"Gain\" Vortal)[/i]\n\t\t*set enhancement +4\n\n\t\tUsually, to cast truly powerful temporary Enhancements, you need specific knowledge of the subject's physicality and abilities. However, you clearly don't have time for that, so a general burst of overall abilities is the name of this particular game. It's a raw and dirty spell, and it leaves the subjects feeling a little depleted afterwards, but it'll do the trick.\n\n\t\tWith a snap of your fingers, you cast a general Enhancement boost over Thatbee first. Maybe if she can extend her pain-reinflicting abilities further, she can distract Amuletta from focusing enough to escape. In the next second, you see Thatbee begin to run twice as fast, and you know your spell has worked. \n\n\t\tThen Thatbee extends a lavender haze from her forehead, heading straight for Amuletta—whose own head is then surrounded by a similar purple cloud. \n\n\t\tThen Amuletta screams at the top of her lungs, feeling the full weight of pain she has caused others cascading through her own body.\n\n\t\t*page_break\n\n\t\tTrying to take advantage of this strike, you then snap your fingers again, casting a general Enhancement boost over Vortal. You expect him to perhaps create a portal to get to Amuletta faster, but instead he begins slithering forward with astonishing speed—and he even smashes directly through one of the vibrating spikes like a serpentine wrecking ball. \n\n\t\tYou had no idea how fast and strong and durable Vortal could be, especially with your Enhancements. It's startling, but certainly good to know. \n\n\t\tVortal actually reaches the porch first, as a still-screaming Amuletta grasps for her portal javelin. You expect him to grab her next…\n\n\t\tBut instead, a set of enchanted chains spring from the steps, shattering the wood and wrapping around Vortal to hold him at bay.\n\n\t\t*page_break\n\n\t\tThatbee arrives to begin slashing open the chains with her razor-sharp nails, also far faster than One-Fourteen and ChantuSe have been moving, thanks to you now. But you can already see Amuletta straining to open the escape portal.\n\n\t\t*if (powerful > 65)\n\t\t\t*set thatbee %+20\n\t\t\t*set vortal %-20\n\t\t\t*set amulettaread true\n\n\t\t\tBut you've created enough of an opening to cast your reading spell. \n\n\t\t\tRaising your hands and wiping them across the air in front of you, you create a screen through which to view the true Amuletta.\n\n\t\t\tAnd you see quite clearly: Amuletta is many, many other foul things…\n\n\t\t\tBut Amuletta [i]is not[/i] Binaria.\n\n\t\t\t*gosub wreedulettapositive\n\t\t\t*goto wreedulettaoverout\n\t\t*else\n\t\t\t*set thatbee %+10\n\t\t\t*set vortal %-10\n\n\t\t\tYou raise your hands to cast your reading spell. But before you can wipe a true-view screen…\n\n\t\t\tWreed and Amuletta stumble through the portal opening behind them, escaping your spell-read window.\n\n\t\t\tNone of you were enhanced enough to corner this devious duo.\n\n\t\t\t*gosub wreedulettanegative\n\t\t\t*goto wreedulettaoverout\n\t#Destroy the spikes blocking ChantuSe and One-Fourteen's path to Wreed. [i](Test Powerless. Gain Shades, ChantuSe, One-Fourteen)[/i]\n\t\t*set shades +4\n\n\t\tSometimes the fastest way to get the job done is to take advantage of the path of least resistance. And sometimes you need to create that path—especially for the allies you know you can trust most.\n\n\t\tAs ChantuSe and One-Fourteen sprint forward, you cast a white wind shade spell to lift yourself into the air to look ahead at their path. Then, going with the stormy vibes, you use a similar white lightning spell to start striking at the spikes blocking their way.\n\n\t\tOne by one, you call down potent strikes of lightning to obliterate the spikes in their path.\n\n\t\tYou can tell this display of focused power rattles everyone, but thankfully ChantuSe and One-Fourteen keep their eyes on the prized pair. Though behind them, Vortal and Thatbee nearly stop in their tracks, distracted by your stormy strikes and falling behind their intended mark.\n\n\t\t*page_break\n\n\t\t*if (powerful \u003c 35)\n\t\t\t*set chantuse %+20\n\t\t\t*set onefourteen %+20\n\t\t\t*set wreedread true\n\n\t\t\tFortunately, your spellcasting is precise enough to allow ChantuSe to reach the porch double-time. Unexpectedly, a set of enchanted chains spring from the steps, shattering the wood and wrapping around ChantuSe to hold her at bay.\n\n\t\t\tIn the next moment, One-Fourteen launches into the air and does an impressive mid-jump somersault to reach the porch. $!{Oftze} gracefully drops onto the porch behind Wreed, just as a portal opens beside them. \n\n\t\t\tWhich means you've created enough of an opening to cast your reading spell. \n\n\t\t\tRaising your hands and swiping them across the air in front of you, you create a screen through which to view the true Wreed.\n\n\t\t\t*page_break\n\n\t\t\tAnd you see quite clearly: Wreed is many, many other foul things…\n\n\t\t\tBut Wreed [i]is not[/i] Binaria. \n\n\t\t\tBefore you can process this information, Amuletta jabs at One-Fourteen with some new baton-like weapon, batting ${ofthir} aside. \n\n\t\t\tAnd this devious duo dash toward the portal.\n\n\t\t\t*gosub wreedulettapositive\n\t\t\t*goto wreedulettaoverout\n\t\t*else\n\t\t\t*set chantuse %+10\n\t\t\t*set onefourteen %+10\n\n\t\t\tUnfortunately, your spells are a bit too powerful for your own—or anyone else's—good. The spikes explode with enormous force, spraying metallic tech shards everywhere.\n\n\t\t\tChantuSe and One-Fourteen are forced to jump to the side to avoid being struck by the shrapnel.\n\n\t\t\tAs this happens, you raise your hands to cast your reading spell, as a last-ditch effort. But before you can swipe a true-view screen…\n\n\t\t\tWreed and Amuletta stumble through the portal opening behind them, escaping your spell-read window.\n\n\t\t\t*gosub wreedulettanegative\n\t\t\t*goto wreedulettaoverout\n\t#Take a chance at balancing both spells at the same time to spell-read both. [i](Test Balanced Belonging-Independence. Gain Half Stats Both Sets)[/i]\n\t\t*set enhancement +2\n\t\t*set shades +2\n\n\t\tUsually, to cast truly powerful temporary Enhancements, you need specific knowledge of the subject's physicality and abilities. However, you clearly don't have time for that, so a general burst of overall abilities is the name of this particular game. It's a raw and dirty spell, and it leaves the subjects feeling a little depleted afterwards, but it'll do the trick.\n\n\t\tWith a snap of your fingers, you cast a general Enhancement boost over Thatbee first. Maybe if she can extend her pain-reinflicting abilities further, she can distract Amuletta from focusing enough to escape. In the next second, you see Thatbee begin to run twice as fast, and you know your spell has worked. \n\n\t\tThen Thatbee extends a lavender haze from her forehead, heading straight for Amuletta—whose own head is then surrounded by a similar purple cloud. \n\n\t\tThen Amuletta screams at the top of her lungs, feeling the full weight of pain she has caused others cascading through her own body.\n\n\t\t*page_break\n\n\t\tTrying to take advantage of this strike, you then snap your fingers again, casting a general Enhancement boost over Vortal. You expect him to perhaps create a portal to get to Amuletta faster, but instead he begins slithering forward with astonishing speed—and he even smashes directly through one of the vibrating spikes like a serpentine wrecking ball. \n\n\t\tYou had no idea how fast and strong and durable Vortal could be, especially with your Enhancements. It's startling, but certainly good to know. \n\n\t\tRedirecting your attention, as ChantuSe and One-Fourteen sprint forward further behind, you cast a white wind shade spell to lift yourself into the air to look ahead at their path. Then, going with the stormy vibes, you use a similar white lightning spell to start striking at the spikes blocking their way.\n\n\t\tOne by one, you call down potent strikes of lightning to obliterate the spikes in their path.\n\n\t\t*page_break\n\n\t\t*if (belonging = 50)\n\t\t\t*set thatbee %+10\n\t\t\t*set vortal %-10\n\t\t\t*set chantuse %+10\n\t\t\t*set onefourteen %+10\n\t\t\t*set wreedulettaread true\n\n\t\t\tVortal actually reaches the porch first, as a still-screaming Amuletta grasps for her portal javelin. You expect him to grab her next…But instead, a set of enchanted chains spring from the steps, shattering the wood and wrapping around Vortal to hold him at bay.\n\n\t\t\tThatbee arrives to begin slashing open the chains with her razor-sharp nails. She is quickly followed by ChantuSe, hacking away with her broadsword.\n\n\t\t\tIn the next moment, One-Fourteen launches into the air and does an impressive mid-jump somersault to reach the porch. $!{Oftze} gracefully drops onto the porch behind Wreed, just as a portal opens beside them. \n\n\t\t\tWhich means you've created enough of an opening to cast your reading spell.\n\n\t\t\t*page_break\n\n\t\t\tRaising your hands and wiping them across the air in front of you, you create a double-wide screen through which to view the true nature of this devious duo.\n\n\t\t\tAnd you see quite clearly: Wreed and Amuletta are both many other foul things…\n\n\t\t\tBut [i]neither[/i] is truly Binaria. \n\n\t\t\tBefore you can process this information, Amuletta jabs at One-Fourteen with some new baton-like weapon, batting ${ofthir} aside and dashing toward the portal.\n\n\t\t\t*gosub wreedulettapositive\n\t\t\t*goto wreedulettaoverout\n\t\t*else\n\t\t\t*set thatbee %+5\n\t\t\t*set vortal %-5\n\t\t\t*set chantuse %+5\n\t\t\t*set onefourteen %+5\n\n\t\t\tUnfortunately, your spells are a bit too unbalanced for your own—or anyone else's—good. The spikes explode with enormous force, spraying metallic tech shards everywhere.\n\n\t\t\tChantuSe and One-Fourteen are forced to jump to the side to avoid being struck by the shrapnel. Vortal and Thatbee must do the same from further up ahead, but they're so juiced-up, they jump farther than they truly intend.\n\n\t\t\tAs this happens, you raise your hands to cast your reading spell, as a last-ditch effort. But before you can wipe a true-view screen…\n\n\t\t\tWreed and Amuletta stumble through the portal opening behind them, escaping your spell-read window.\n\n\t\t\t*gosub wreedulettanegative\n\t\t\t*goto wreedulettaoverout\n\n\n*label wreedulettapositive\n*page_break\n*set belonging %+5\n*set becoming +4\n*set cluecredits +3\n\nIn the next moment, three square credits suddenly drop out of the sky and into your palm. Looking down, you see Gothika's skyline etched into their dull surfaces. \n\nAs this happens, you hear a voice in your mind, clear as a bell:\n\n[i]You will need us credits to solve your investigation—in this case, to identify and break down a carefully crafted illusion. You have earned the maximum credits currently available.[/i]\n\nKnowing you'll ask Thatbee and One-Fourteen about these later, you stash the credits in the safe ${portaljewels} hiding spot.\n\n[i](Gained 3 Clue Credits)[/i]\n*line_break\n[i](Gained Belonging, Boosted Bonus Becoming)[/i]\n*return\n\n\n*label wreedulettanegative\n*page_break\n*set belonging 50\n*set becoming +2\n*set cluecredits +1\n\nIn the next moment, one square credit suddenly drops out of the sky and into your palm. Looking down, you see Gothika's skyline etched into its dull surface. \n\nAs this happens, you hear a voice in your mind, clear as a bell:\n\n[i]You will need us credits to solve your investigation—in this case, to identify and break down a carefully crafted illusion. You have earned the minimum credits currently available.[/i]\n\nKnowing you'll ask Thatbee and One-Fourteen about these later, you stash the credit in the safe ${portaljewels} hiding spot.\n\n[i](Gained 1 Clue Credit)[/i]\n*line_break\n[i](Balanced Belonging-Independence, Gained Basic Becoming)[/i]\n*return\n\n\n*label wreedulettaoverout\n*page_break\n\nWith one last brightly bejeweled flash, the javelin opens a portal that pulls only Wreed and Amuletta through. \n\nFor all the combined power of your current squad, no one seems able to fully stop the wretched couple. Obviously, they were quite well prepared to escape at a moment's notice, given their elaborate preparations and traps.\n\n\"Can't follow,\" Vortal grunts. \"Wish could.\"\n\n\"It's fine,\" you call out.\n*if wreedulettaread\n\t\"I was able to spell-read them both beforehand. Neither Wreed nor Amuletta are our true suspect in hiding.\"\n\n\tYou then pull out a clue credit from your secure hiding place.\n\t*goto stayherenight\n*elseif wreedread\n\t\"I was able to spell-read Wreed beforehand. He isn't our true suspect in hiding.\"\n\n\tYou then pull out a clue credit from your secure hiding place.\n\t*goto stayherenight\n*elseif amulettaread\n\t\"I was able to spell-read Amuletta beforehand. She isn't our true suspect in hiding.\"\n\n\tYou then pull out a clue credit from your secure hiding place.\n\t*goto stayherenight\n*else\n\t\"I wasn't able to spell-read either before they got away, but I'd bet the energy signature ChantuSe picked up came from those antiquities.\" \n\n\tAt least, you hope so. And you hope the next part of this investigation goes better, to increase your process of elimination. As a consolation, you pull out the clue credit from your secure hiding place.\n\t*goto stayherenight\n\n*label stayherenight\n\"I also received this. The credit…spoke to me? It said I'd need more to close the case?\"\n\n*page_break\n\n\"This can't be your first time encountering sentient credits?\" Thatbee asks, actually surprised by your unknowing expression. \"Well, clue credits allow you to complete important endeavors. The fact that they've shown up here means that you'll need a certain amount to shatter the final illusion-guise of your hidden target.\"\n\nYou nod, trying to hide how fascinating you find this. Tech really is unique here on Gothika—you wish you had more time to study and master its enchantments more properly. Maybe if all this goes well, someday you'll have the freedom to return and do so, in a future less grim…\n\n\"I actually have a location on our next three suspects,\" Thatbee continues as you all regather beyond the field of spikes. \"Convenient that we're investigating two romantically linked sets, but I guess we have the energy signature rub-off to thank for that.\" \n\n*if (wreedulettaread = false)\n\t\"Anyway, let's hope one of the other three is our target. If not, there is a…mildly forbidden way to find Wreeduletta, should we need. But let's cross that catastrophic bridge only if we need to.\"\n\n\"Great,\" you reply. \"Let's get moving.\"\n\n*page_break\n\n\"Oh, we can't fly anywhere once the sun sets,\" Thatbee replies, her eyes shifting to One-Fourteen. She must be wondering what ${oftze} thinks about us \"fellow locals\" knowing seemingly nothing about how Gothika works. If only she knew the whole One-Fourteen truth…\n\n\"The live moonblimps and nighthawks would tear us apart this far outside the city,\" she continues. \"We can fly again first thing at sunrise. For tonight, I suggest we make use of this vacated Wreeduletta Residence.\"\n\nHearing this, you realize how nice a break sounds. This day has been…a lot, all at once.\n\n\"I guess it can't hurt to be here, in case Wreed and Amuletta return,\" you reply.\n*if wreedulettaread\n\t\"Neither might not be our actual suspect, but it would be nice to arrest them all the same.\"\n\n\"Oh, they definitely won't be returning tonight. They've got safe houses everywhere,\" Thatbee sighs. \"And this house is probably full of stranger-danger brand booby traps, so let's get ourselves set somewhere relatively safe?\"\n\n*page_break CHAPTER IV\n\n[b]CHAPTER IV[/b]\n*line_break\nIt took more time than any of you anticipated, but you managed to de-trap three bedrooms in the castle-house enough for you all to attempt to get some sleep. You were the only one to get assigned your own room, which you valued at first. \n\nAt least, until you realized that you haven't slept in a room without Brit and Boris in a very long time—and before that, mostly in group-home bedrooms.\n\nAdd in the idea that this room might attack you at any moment with hidden defenses, plus the amount of events to process from this momentous day…\n\nYou realize you won't be getting much sleep tonight. \n\n*page_break\n\nInstead, you sit on your canopy bed and stare at the city skyline in the distance out the nearest stained-glass-framed window.\n\nWhen you woke up this morning, your biggest concern was passing your finals without making many new enemies.\n\nTomorrow morning, the fate of the literal galaxy rests on the success of an investigation on this uninitiated foreign planet.\n\n\"I was actually hoping I'd find you asleep.\"\n\n*page_break\n\nYou look to the entrance of your room, the door now open to reveal ChantuSe standing there. You must be more tired than you think, because you find yourself exceedingly annoyed to be bothered again, no matter the reason. \n\n\"I don't need as much sleep as most, thanks to my powers,\" you reply. \"But you shouldn't let that stop you.\"\n\n\"My body can shift enough to sleep in sections while I remain awake,\" ChantuSe says. \"It's not comfortable, but someone needs to stand guard.\"\n\n\"From this house?\" you ask. \"Or our own allies inside?\"\n\n*page_break\n\n\"From the house, yes, but mostly from Vortal,\" ChantuSe sighs. \"He doesn't sleep much either. And we can't have him slitting your throat in your sleep, so he can be freed from the bounds of this obligation.\"\n\n\"I know how to defend myself,\" you reply, snappier than you intend. If ChantuSe was aiming to protect your peace, she has only succeeding in disturbing it so far. \n\n\"You don't really know me. And we've already established that I don't know much about your cryptic self. So forgive me if I'm not bursting with trust for your concern.\"\n\nChantuSe takes a breath, then responds calmly. \"If you don't mind me joining you, I'd be happy to tell you about my past. I can only warn you, however: it is not a pretty picture.\"\n\n*fake_choice\n\t#However much I might feel like being alone, I find myself far too curious to pass this offer up.\n\t#Even if I might be overtired, I would actually like the company.\n\t#I place my guard back up, hoping to get more out of ChantuSe in this vulnerable state.\n\t#I'm just thankful for the chance to get to know ChantuSee better, regardless of how exhausted I feel.\n\nYou nod at ChantuSe's offer, so she treads slowly and carefully across the room, avoiding two visibly loose floorboards in her path. She then sits on the edge at the foot of your enormous bed. You were already sitting, but you straighten up a bit as well.\n\n\"As you already know, I am from planet Cuttara in the Nagoll Rim,\" ChantuSe begins. \"The very solar system where Binaria is from. It's isolated by an impenetrable barrier and home to the war raging between humanoid Rutonians and android Binarians.\"\n\nIn all the rapid movement and information processing of the day, you didn't quite discern this connection that ChantuSe's home of Cuttara is a secluded neighbor to the birthplace to the Binuman army you're all aiming to create. Between her roots and Vortal's own Blot-related experience, their placement in this particular mission suddenly takes on much more clarity.\n\n\"My race, the ShapeShifters of Cuttara, are quite private. That's because we're also quite ruthless. What I am about to tell you very few in the Verses Galaxy know.\"\n\n*page_break\n*set spellodexmamana true\n\n\"There is no easy way to say this, so I will just be blunt,\" ChantuSe sighs. \"The ShapeShifters of Cuttara are actually secretly responsible for engineering the first Bominates, as a way to keep war raging between the Rutonians and Binarians. Both races buy our weapons in great quantities—and their capabilities would assuredly surpass our own were they ever to join together in peace. \n\n\"Meanwhile, as we indirectly support the near-genocide of the humanoid Rutonians, we simultaneously subjugate a minority race on our own planet, the Cuttaran EmPaths, to the point of near-genocide as well.\n\n\"I know all of this because, before my time on Versus, I was a high-ranking enforcer of the Cuttaran government, specializing in hunting and exterminating EmPaths who attempted to fight for greater freedom from our oppression.\"\n\nChantuSe lets this grim reality settle over you for a moment. Which is good, because it hits you with mind-numbing force. It also gives you a mental moment to check the new Spellodex entry that populates.\n\n*page_break\n\n\"I was indoctrinated to believe I was acting in the best interests of my people,\" ChantuSe continues. \"It wasn't until I was Selected for Versus that I saw my people—and myself—for who we really are. Still, there is no suitable excuse or justification for the crimes I committed. This is why I seek to atone for the many sins my people and I are jointly responsible for.\"\n\nPutting aside the Bominate creation of it all for now—and putting aside how that might impact your mission to recover and inspire Binaria—you focus first on ChantuSe's active role in the EmPathic genocide.\n\nFirst, because back on your original home planet Blende, the most famous heroes in the Galaxy, The Representatives, currently have two beloved members who always claimed to be refugees from the Nagoll Rim. There's Pocket, a \"Multinarian\" Binarian android, and Nifty Eons, a Cuttaran EmPath. Neither have ever been particularly forthcoming about their pasts, and now you understand why.\n\nThis truth would incite public outcry large enough to drive the Galactic Council to find some way to intervene in the Nagoll Rim. It certainly incites some strong emotions in you. Because it also reminds you all too closely of the treatment of your Disrep people back on Blende.\n\n*choice\n\t#It reminds me of a passage from The Representatives Case Log, which is rarely declassified and released to the public.\n\t\t*set spellodexgothikareps true\n\t\t*achieve encounterkidhalo\n\n\t\tThis portion of The Representatives Case Log was specifically declassified by Kid Halo, the team's first-ever Disrep leader. You always wished you could read more, so you keep the exact file spell-stored away. It sits alongside a supplemental photographic entry now populated in your Spellodex.\n\n\t\t[b]The Representatives Case Log: Kid Halo[/i]\n\n\t\t[i]Wherever there are fairy tales, you can always expect grim tragedies. Once upon a time, one people conquered another. The Repletes overtook the native Repos of Blende, and all these years later the Repo people have never recovered. Equal on paper, deeply disadvantaged in practice. But as in all great love stories, great divides are always bridged. Repletes and Repos are both only humanoid, after all—they are drawn to one another. Forbidden love and the promise of power gained and power lost, a tale as old as time. When Repos and Repletes finally have their first interspecies children, they are called Disreps.[/i]\n\t\t\n\t\t[i]Our name is not an accident. Disdain, dislike, disembody, disappoint, discomfort, distract, disregard. Disease. It turns out this last one is what we’ll be known for. “Unnatural” as we are believed to be, as the first of us come of age, something troubling develops. It turns out when a Disrep sleeps specifically with a Replete, we can deliver a disease dubbed The Distortion. This affliction robs a Replete of their powers and their sanity, and it is only sexually transmitted via Disrep sperm. The universe does have a wicked sense of humor.[/i]\n\t\t\n\t\t[i]Pandemic protocols are invoked. Interspecies sexuality laws are written. Mandatory vasectomies are called for, because the few babies born of The Distortion aren’t really babies at all. Above all, Disreps—not just our men, but also our women, nonbinaries, and every other kind—are disdained, feared, stigmatized. It doesn’t make logical sense, but there’s not much room for rational discernment when the frenzy of terrified self-preservation enters the picture. We Disreps, all of us, are “getting what we deserve” for the mistake of being born this way. The Repletes who lie with us are damned for their “sins,” but the blame never falls on them. We Disreps are solely at fault.[/i]\n\n\t\t[i]And so the treadmill turns, like a great flat wheel, and quickly the “powerless” Repos show indifference. This is not their fight, and besides, so many of the them welcome this new class that has been created under them.\n\t\tA cure for The Distortion is eventually found, laws are eventually rewritten, but the damage is done. Generations of trauma is inherited. We Disreps are marred, forevermore.[/i]\n\n\t\t*page_break\n\n\t\t[i]But we Disreps are powerful, too. More powerful by nature than our Replete mothers and fathers, it seems. Maybe even doubly powerful, once Disreps begin to have second-generation children of their own. No one likes that, not the Repletes, and especially not the still-giftless Repos. So along the way, we Disreps learn to blend—it’s in our planet’s name, after all. One can't usually tell if someone is a Disrep just by looking at them—our skin isn’t only either pastel pink or purple, like Repos. Of course, branding Disreps at birth was once legitimately discussed, and only narrowly voted down.[/i]\n\n\n\t\t[i]Eventually, we Disreps become a subculture. Then, a movement. By the time I come of age as a generations-deep Disrep, new things seem possible. A Disrep politician here, a Disrep Representative member there. I am emboldened. I gobble up this possibility like a meal. I start my first team, The Disassembly, and we are an unexpected sensation. I am soon invited, along with a few others cherry-picked from this first incarnation, to become a Representative. It is unprecedented, and it is controversial, and it is fraught. Still, I leave my people behind, one of the chosen ones, for grander dreams come true. I prove myself. I break barriers. Eventually, I achieve the unthinkable: I become leader of The Representatives.[/i]\n\n\n\t\t[i]There is love and hate, heroes and villains, triumph and tragedy, shining spotlights and overlooked shadows. No matter how much I achieve, none of it is ever really enough. I am expected to represent everyone—it’s in the team’s name, after all—but that’s impossible. Most of my original Disrep allies think I’ve left them behind. Half my people put me on the highest pedestal, the other half think I’m a sellout. Still, I keep running, always sprinting the marathon.[/i]\n\n\t\tRe-reading this in a flash, it brings up all the triggers and trauma you've experienced as a Disrep—especially as one who isn't even accepted by other Disreps themselves.\n\n\t\t*page_break\n\t\t*goto chanturesponse\n\t#I don't need a reminder of this passage.\n\t\t*goto chanturesponse\n\n*label chanturesponse\n\n\"You do know I come from Blende, right?\" You mean this as a leading question, because it's all your brain can process through a surge of contempt and rage.\n\n\"I know what it means to be a Disrep from Blende, yes,\" ChantuSe answers. \"I know you must also be aware of Nifty Eons and Pocket, in part. And that you likely know my own history with Tellie too. I understand this added layer of truth gives you even more reason to hate me than trust me. All I can hope is that my actions since my awakening speak louder than any words. But if it is additional words you require, here they are.\n\n\"In you as a Disrep, I see what my oppression must have done to the EmPaths. How hardened you were forced to become to survive. The anger at feeling marginalized and less-than. How your world made it impossible to love yourself. And how all the internalized discrimination has taught other Disreps, your own kind, to fear and outcast you instead of embracing you for your differences.\n\n\"I also now understand how oppressed individuals are always made to consider the feelings of their oppressors, how you constantly have to justify and explain their aggressions to them in order for them to learn to do better. So I want to say this to you: I have already done the work. You don't have to do a thing to explain yourself to me. I see you. I understand you. And I will accept whatever judgment you return upon me, without argument.\"\n\n*page_break\n\nYou didn't think anything could stun you more than ChantuSe's original revelations, but these words startle you even more deeply. Because they really…matter. \n\nThey are words you realize you have been waiting your entire life to hear.\n\n*temp chantusehookuppossible false\n\n*if (babemale = false)\n\tSo then it is additionally startling to somehow sense that ChantuSe is attracted to you. She must emit some subtle pheromone to let you understand she is pansexual, but that lately, specifically male energy tends to turn her off. \n\n\tChantuSe simultaneously communicates that she may use female pronouns herself, but she identifies more privately as intersex. Which, you suppose, makes sense for a shapeshifter.\n\n\t*if ((attractedwomen) or (attractedpan)) or (attractednb)\n\t\t*set chantusehookuppossible true\n\t\t\n\t\tBut that only raises the question…Could you ever be interested in ChantuSe, in return?\n\n\t\t*page_break\n\t\t*goto chantusementorly\n\t*else\n\n\t\tToo bad ChantuSe isn't remotely the type you identified. For you, that's a nonstarter.\n\n\t\t*page_break\n\t\t*goto chantusementorly\n*else\n\t*goto chantusementorly\n\n*label chantusementorly\n\nYou try to absorb everything ChantuSe just offered you.\n\nAnd you try to decide what judgment—what acceptance or rejection—you are most compelled to extend.\n\nYou also need to decide how your reaction will affect your working relationship with ChantuSe. As you've already deduced, growing close or keeping a distance will surely both have their unique advantages moving forward.\n\n*choice\n\t#I don't have any energy to offer ChantuSe. Wrap myself in a shrouded shade haze so she can't bother me anymore. [i](Gain Constructive, Limit, Shades. Lose ChantuSe)[/i]\n\t\t*set destructive %-20\n\t\t*set unleash %-20\n\t\t*set shades +4\n\t\t*set chantuse %-25\n\n\t\tAs you are suddenly obscured from sight, ChantuSe must receive the message you intend to send.\n\n\t\tAfter that, she stands up and leaves you alone. And you don't see or hear anything from her for the rest of the night.\n\n\t\t[i]Good.[/i] \n\n\t\tWhatever your feelings on ChantuSe's admissions, you will process them on your own. You don't owe the likes of her a damn thing. And after this leg of your mission is complete, you hope to never see her again. \n\n\t\tEver.\n\t\t*goto thesunwillrisetb\n\t#\"If you give people a reason to hate you, at least it hurts a little less when they inevitably do,\" I say, shading the room with raging red energy. [i](Gain Destructive, Unleash, Shades, ChantuSe)[/i]\n\t\t*set destructive %+20\n\t\t*set unleash %+20\n\t\t*set shades +4\n\t\t*set chantuse %+25\n\n\t\tAs the room swirls with deadly crimson shade energy, so many meanings are conveyed to ChantuSe.\n\n\t\t[i]What you did was unacceptable.[/i]\n\n\t\t[i]I am hated because of people like you.[/i]\n\n\t\t[i]I'm in no position to judge anyone else's destructive behavior.[/i]\n\n\t\t[i]We have more in common than you think.[/i]\n\n\t\t*page_break\n\n\t\t\"I understand,\" ChantuSe speaks, standing from your bed. \"But you have to know that I do not hate you.\"\n\n\t\t\"I don't hate you either,\" you reply. \"But I have a question for you… \n\n\t\t\"If you believed so fully before that your enforcer duties were for the greater good, how do you know now that we truly fight for the greater good…and not something equally evil?\"\n\n\t\t\"Simple,\" ChantuSe responds. \"Because I now fight beside beings like you.\"\n\n\t\t*page_break\n\n\t\tWith that, ChantuSe turns to leave you alone for the night.\n\n\t\tBut her words stay with you far longer than you expect.\n\n\t\tBecause as much as you want to judge her harshly for her past deeds, or as much as you want to believe her presently hopeful sentiments…\n\n\t\tYou can't be sure that your presence alone denotes a just cause. \n\n\t\tAnd that realization scares you more than anything else, so far.\n\t\t*goto thesunwillrisetb\n\t#Boost your feelings to project at ChantuSe, making it very clear that you disapprove of her admissions. [i](Gain Destructive, Limit, Enhancement. Lose ChantuSe)[/i]\n\t\t*set destructive %+20\n\t\t*set unleash %-20\n\t\t*set enhancement +4\n\t\t*set chantuse %-25\n\n\t\tYou funnel all of your emotions—your rage, your disgust, your shame, your pain—into a fine point.\n\n\t\tAnd then you point that emotional bullet at ChantuSe and pull the trigger.\n\n\t\tShe nearly falls off the bed, receiving the reality of your reaction in full force.\n\n\t\tYou have to admit, even though ChantuSe isn't responsible for the crimes specifically against your people, it is a remarkably cathartic release.\n\n\t\t*page_break\n\n\t\tAfter that, ChantuSe stands up and leaves you alone. \n\n\t\tAnd you don't see or hear anything from her for the rest of the night.\n\n\t\t[i]Good.[/i] \n\n\t\tYou might need her to carry out this investigation, but after that, you want nothing to do with the likes of ChantuSe.\n\t\t*goto thesunwillrisetb\n\t#Enhance the frequency of my voice so that I can speak truths about my powers without anyone but ChantuSe hearing. [i](Gain Constructive, Unleash, Enhancement, ChantuSe)[/i]\n\t\t*set destructive %-20\n\t\t*set unleash %+20\n\t\t*set enhancement +4\n\t\t*set chantuse %+25\n\n\t\tYou cast a spell to alter your voice, staring directly into ChantuSe's eyes.\n\n\t\t\"For the next few minutes, no one in the Galaxy can hear what I'm about to say,\" you begin. \"So I'm going to tell you something I've never told another solitary soul.\"\n\n\t\t*gosub chantusecircletrust\n\n\t\tStaring back at ChantuSe, you nod. And despite the intense difficulties presented in this conversation, against all odds you somehow find yourself feeling…better?\n\n\t\tBetter enough that, once ChantuSe leaves, you actually find a way to sleep.\n\t\t*goto thesunwillrisetb\n\t*selectable_if (chantusehookuppossible) #Wrap this room in a shrouded shade haze so that I can have an honest conversation with ChantuSe. And so we can become as [i]physically intimate[/i] as possible. [i](Gain Constructive, Unleash, Shades, ChantuSe)[/i]\n\t\t*set destructive %-20\n\t\t*set unleash %+20\n\t\t*set shades +4\n\t\t*set chantuse %+25\n\t\t*set chantusehookup true\n\n\t\tYou cast a spell to wrap the bedroom in a shrouded haze, staring directly into ChantuSe's eyes.\n\n\t\t\"For the next few minutes, no one in the Galaxy can hear will be able to see or hear us,\" you begin. \"So I'm going to tell you something I've never told another solitary soul.\"\n\n\t\t*gosub chantusecircletrust\n\n\t\t\"I want to be there for you,\" you reply. \"In [i]every[/i] way.\"\n\n\t\t*page_break\n\n\t\tIn the next moment, ChantuSe does something you don't expect—but that you very much want. That you very much [i]welcome[/i].\n\n\t\tChantuSe kisses you on the mouth, soft and hard at the same time.\n\n\t\tShe tastes like steel, but she also tastes like honey. \n\n\t\tShe feels like solid muscle, but also like the softest skin.\n\n\t\tShe makes you feel sliced to ribbons, but she also makes you feel fully whole.\n\n\t\t*page_break\n\n\t\tYou've never been with a shapeshifter before.\n\n\t\tThe surprises ChantuSe has in store for you…\n\n\t\tIt's like all your fantasies come true in one single night.\n\n\t\tIt's all too good for words.\n\n\t\tAnd it all blows your world wide open.\n\n\t\t*page_break\n\t\t*achieve chantusesteamy\n\n\t\tIt isn't until the dim haze of predawn arrives that you and ChantuSe finally separate. \n\n\t\tAnd it isn't until she is redressed that she finally speaks again.\n\n\t\t\"For the sake of the others, I believe we should pretend this never happened,\" she begins. \"But know that I will remember this night for all of my days to come.\"\n\n\t\tWith that, ChantuSe turns and walks a careful path back towards your door.\n\n\t\tIn this moment, not telling anyone feels fine. It feels like you get to keep something secret and private and wonderful all to yourself.\n\n\t\tBesides, ChantuSe has left you feeling truly speechless.\n\t\t*goto thesunwillrisetb\n\n*label chantusecircletrust\n\nChantuSe listens intently, looking both hesitant and receptive at the same time.\n\nYou take one long, ragged breath.\n\n*page_break\n\n\"Every time I cast a spell, it breaks some fundamental rule of reality,\" you relay. \"I don't know if all the undoing can be repaired. And worst of all…?\"\n\n\"I'm not sure I care.\"\n\nChantuSe looks away, processing as quickly and carefully as she can.\n\nThen she turns to you, intensity burning deep in her eyes. \"Why did you choose to share that with me?\" \n\n*page_break\n\n\"After what you told me about your own past, I think I can trust you,\" you answer. \"I think you might understand, that you won't judge. And most of all, I think someone on this galactic mission should know. In case…\"\n\nYou don't finish that sentence. But you don't need to.\n\n\"I do understand,\" ChantuSe says. \"And I promise if I ever think you are crossing a line, to tell you. I wish someone had been there to do that for me.\"\n*return\n\n*label thesunwillrisetb\n*page_break AFTER SUNRISE\n\nYou step up to a warehouse-like building on the outskirts of the city of Gothika, having just parked Thatbee's blimp at a port on the nearby river. At first you think this warehouse is a storage space or another secret lair of operations, until you see the neon sign above the entrance:\n\n[b]Museum of Arcade Games.[/i]\n\n\"Our suspects are in there?\" you ask.\n\n\"They own and operate the museum,\" Thatbee answers. \"It's their attempt to walk the straight and narrow path. They succeed…well, for the most part.\"\n\n\"Great. So who are we dealing with this time?\"\n\n*page_break\n\n\"These three are also Genies, though they're not currently wanted for any crimes,\" Thatbee explains. \"Actually, they've been known to sometimes collab with #TeamThatbee based on…I don't know, the whims of a stiff breeze? Honestly, I never know what I'm going to get with these three. They're eccentric, to say the least.\n\n\"First there's Boomkat, a scientist who once specialized in antiquity-tech fusion, until they key-coded the world's largest cannon to respond only to their genetic triggers. When Boomkat is in charge, they are lovely and mild-mannered. When the cannon is in charge, it's a…different story.\n\n\"Then there's Bombats, a former government ballistics expert who also double-specialized in bat drone deployment tech. She was dishonorably discharged when she gene-bonded with a giant bat she outfitted with a self-generating bomb womb, named Bombs the Bat. She's honestly usually a really fun time, always looking to maximize her joy in her 'second lease on life.' While I love the spirit, that endeavor doesn't always align with the letter of the law.\n\n\"Last but not least, there's the mega-influencer Lucy Marbles, a cartoonish pop star. She used to use two ancient wrecking balls in her act, until she fell in love with Boomkat and they laced the balls with gene-bonding tech. Lucy's mood 'swings' are legendary, pun intended.\"\n\n*page_break\n\n\"Obviously all three are tech-Genies, unlike vampiric-thieving Genies like me and Wreed. However, this level of gene-bonding experimentation altered all of their minds, which is why such practices have also become illegal.\"\n\nAbsorbing all this, you're starting to feel like everyone in Gothika seems a little bit like a fun-house mirror person, a kaleidoscope of kooky trauma. Honestly, you don't [i]not[/i] fit in, in your own way.\n\n\"Boomkat and Lucy Marbles have been together what seems like forever, but they're just coming on three years since adding Bombats as a throuple. So we're facing the end of that particular trilogy era,\" Thatbee finishes. \"Oh, I forgot to mention, they're kind of obsessed lately with doing things in threes.\"\n\n\"I might actually be a little sad to break them up, if one ends up being our suspect,\" you offer. \"They sound like a real party. But I guess all their tech-related stuff makes them all especially likely potentials, given the background of our suspect-in-hiding.\"\n\n\"Only one way to find out,\" Thatbee says, striding up to the locked entrance, which reads [b]CLOSED[/b]. She points one particular nail forward and unlatches a lockpick charm like a pro.\n\n*page_break INTO THE MUSEUM\n\nInside, you find almost exactly what you expect: room after room of brightly flashing, colorful arcade games. You don't recognize any of these clearly Gothikite classics, but you feel drawn to all the blinking lights and resounding buzzers.\n\nThatbee clacks past all of them, strutting with purpose. Beside her, One-Fourteen looks even more mesmerized than you, clearly dying to stop and play. Meanwhile, both ChantuSe and Vortal look pained, like their respective tracking senses are currently overwhelmed.\n\nIt isn't long before you enter a large central room that holds an actual carousel. The ride whirs in a slow circle, with animal seats that depict various tech-antiquity hybrids.\n\nThat's also where you find three men tied up at different posts, bloodied and bruised.\n\n*page_break\n\n\"It's that bitch!\" a voice calls from behind the carousel. \n\nIn the next moment, a strikingly tall woman walks out with a giant bat perched on her broad shoulder. She wears a brown jumpsuit with orange-and-red stripes, which matches her dyed-bright-red hair. In an adorable and terrifying twist, the giant bat wears an exactly matching style.\n\n\"Did we send out invitations to this soiree that I forgot about?\" continues the woman you deduce must be Bombats. \"I do love a surprise party!\"\n\n\"We most certainly did not,\" another voice sounds, rounding the opposite side of the carousel.\n\n*page_break\n\nThis next woman must be Lucy Marbles, who looks almost comically short compared to the near seven-foot stature of Bombats. Even more mismatched are the enormous wrecking balls that float behind Lucy like balloons, tied to her wrists with chains. She wears a yellow jumpsuit to match her braided blond pigtails. She also wears a mask studded with canary-yellow diamonds.\n\n\"I really HATE uninvited guests,\" she seethes, quaking with anger.\n\n\"Deep breaths, my dearest.\" \n\nThis final voice belongs to Boomkat as they emerge from the shadows, actually riding on a retro-futuristic cannon the size of a tank. Boomkat wears green fatigues, a full buzz cut, and ballistic-shell jewelry of every fathomable kind.\n\n*page_break\n\n\"I'm sure #TeamThatbee just came to join our anniversary celebration,\" Boomkat adds. \"We're murdering one known murderer for every year we've been with Bombats.\"\n\nThatbee lets out a tiny sigh, tensing up. Obviously she didn't anticipate that you'd be walking into an active crime scene.\n\n\"Ooh, have you been recruiting?\" Bombats then asks, looking over you, Vortal, and ChantuSe. \"I swear, I wish I knew where you always manage to find such colorful characters. Hey there, One-Fourteen. Looking sharp as ever.\"\n\nOne-Fourteen actually blushes, waving back at Bombats. \n\n*fake_choice\n\t#I force myself not to smile. \n\t#It's fairly hard to believe one of these three vibrant rogues could be Binaria in hiding.\n\t#Actually, Binaria might be completely eccentric, despite the severity of her constructions.\n\t#I brace myself. Something tells me these three are far more deadly than they want anyone to think.\n\n\"As much as I adore you three Boof Riders, I came here on separate #TeamThatbee business,\" Thatbee continues. \"And I don't mean to rain on anyone's parade, but you know I can't let you actually kill anyone. No matter how much they might deserve it.\"\n\n\"Every party needs a pooper, so we [i]didn't[/i] invite you,\" Bombats sings, rolling her eyes. \"Maybe we should take this celebration to a less chilly climate?\"\n\n\"She's trying to spoil EVERYTHING,\" Lucy screams. \"I won't let her!\"\n\n\"Yes, love, but remember,\" Boomkat speaks in a soothing voice. \"We planned for party crashers. So if you'll excuse us…\"\n\n*page_break\n\n\"We need to use the Slide-A-Ride,\" Boomkat finishes. \"And we need to go through you to do so.\"\n\nIn the next second, Boomkat fires a blast from her cannon so hot, you can feel it on your skin the moment it charges. \n\nYour team scatters in time to avoid being hit, but surely any one of you would have been incinerated if you were any slower. \n\n\"The Slide-A-Ride vanishes after it is used,\" Thatbee shouts over the sudden din. \"If they reach it, they'll be able to escape faster than we can follow!\"\n\n*if unlockedspanbook\n\t*page_break\n\n\tIn the split seconds before this next battle is joined, The Spanbook avatar ${spanbook} once again appears in your mind. \n\n\tKnowing what you must accomplish, it offers you some sacred nuggets of expansion, specifically on the state of Limiting and Unleashing…\n\n\tThe effects of which will expand your horizons and also the abilities most needed for this upcoming battle. So you check your levels and decide to read:\n\n\t*temp urnofunpredictabilitye 0\n\t*rand urnofunpredictabilitye 1 4\n\n\t*choice\n\t\t#The Blotted Unleashing and Limiting. [i](Auto Boost Stronger Stat)[/i]\n\n\t\t\t[b]Span The Sergiverses[/b]\n\t\t\t*line_break\n\t\t\t[b]Entry:[/b] Year 2104\n\t\t\t*line_break\n\t\t\t[b]Location:[/b] The Galactic Barrier\n\t\t\t*line_break\n\t\t\t[b]Relevant Event:[/b] The Blots send their first armada into The Galactic Barrier to begin the twelve-year journey from The Contest Galaxy into The Verses Galaxy. Simultaneously, a small faction is sent through an experimental wormhole under the leadership of Empress Vaccus and establishes a beachhead on the fringe-isolated mirrored planet, Prisca.\n\t\t\t*if (unleash >= 50)\n\t\t\t\t*set unleash %+30\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Unleash level rise higher.\n\t\t\t\n\t\t\t\t[i](Unleash Blotted)[/i]\n\t\t\t\t*goto decidethrouplecase\n\t\t\t*else\n\t\t\t\t*set unleash %-30\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Limit level rise higher.\n\n\t\t\t\t[i](Limit Blotted)[/i]\n\t\t\t\t*goto decidethrouplecase\n\t\t#Representative of Construction and Destruction. [i](Auto Boost Stronger Stat)[/i]\n\n\t\t\t[b]Span The Sergiverses[/b]\n\t\t\t*line_break\
