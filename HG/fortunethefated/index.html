 An oldie but a goodie. [i](Test Limit. Gain Perception)[/i]\n\t\t\n\t\tP.Savage steps forward to attack, but you raise your hand to give him pause. \n\n\t\tNo doubt he aims to unleash some kind of full-frontal assault.\n\n\t\tBut you intend to show him the power of restraint.\n\n\t\tAs your challengers prime their attacks, you twitch the fingers on both hands to cast dual illusory spells. First, you make it so that the QuiX heroes and the artifact agents see each other as you and P.Savage. Then you make it so they both see you and P.Savage as their dubious SeaS allies.\n\n\t\t*page_break\n\n\t\tAce Whole stands with his legs firmly planted, firing up his enormous cannon-gun. It charges some kind of black hole blast, aimed directly at Sprin Ter. \n\n\t\tMeanwhile Sprin Ter darts into the air above, treading on the air with jade energy pulses that snap from her belt. Barely able to keep up following her quick kick-flips, suddenly the name QuiX makes a lot more sense.\n\n\t\tBoth of them see the other as P.Savage, so in the next moment they make their moves. Ace Whole fires a terrifyingly potent black hole blast, while Sprin Ter claps her hands together to fire a burst of jade energy. Both challengers are fast enough to evade these attacks…\n\n\t\tBut you nod at P.Savage and he instantly understands. Raising his hands, he uses his energy telekinesis to redirect these barrages so they they find their intended targets.\n\n\t\t*page_break\n\n\t\tWhile P.Savage does this, you turn your attention to Sum Bom darting around the sky like a red-and-orange flash. She keeps hurtling gemstone heat bombs as she moves, raining down on Sou Vox—who Sum Bom believes is you.\n\n\t\tBeneath her on the ground, Sou Vox might not be nearly as quick, but her sharpshooting is impeccable. She fires up at Sum Bom—who she also thinks is you—with precision amethyst rounds.\n\n\t\tSum Bom isn't fast enough to outmaneuver Sou Vox's direct shots, while Sou Vox isn't fast enough to avoid the field of explosions from Sum Bom's bombing. Both challengers fall in quick succession…\n\n\t\tWhile you just look on, your arms crossed over your chest.\n\n\t\t*page_break\n\n\t\tAs you survey the field, all four of your challengers lie unconscious on the ground, smoking respectively in red and green and black and purple.\n\n\t\tNot even this world's greatest heroes can stand up against the might of you and P.Savage combined.\n\n\t\t*if (unleash \u003c 30)\n\t\t\t*set perception +6\n\t\t\t*set potency +2\n\t\t\t*set questcoins +3\n\n\t\t\tIt would seem QueSummiT agrees with your devastatingly impressive show of restraint. \n\n\t\t\tIn the next moment, three platinum Coins suddenly materialize in your palm. [i]Perfection.[/i]\n\n\t\t\t[i](Gained 3 Quest Coins)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Perception, Potency)[/i]\n\t\t\t*goto trialoneover\n\t\t*else\n\t\t\t*set perception +3\n\t\t\t*set potency +1\n\t\t\t*set questcoins +1\n\n\t\t\tEven though it works, QueSummiT doesn't seem as impressed with your restraining maneuver. \n\n\t\t\tIn the next moment, only one platinum Coin drops into your palm. You'll have to make sure you score higher in the next trial, analyzing your skills.\n\n\t\t\t[i](Gained 1 Quest Coin)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Perception, Potency)[/i]\n\t\t\t*goto trialoneover\n\n*label trialoneover\n*page_break\n\nWhether anyone is happy about it or not, your challengers have been defeated—far more singularly and swiftly than anyone, especially Leigh, seems to have expected.\n\nYou can see it once again, the familiar looks of fear and awe mixed together on the faces of your allies. It bristles your bones, same as it always has.\n\n\"We're done here,\" you say, stepping forward before anyone else can speak up. \"Let's keep moving.\"\n\nYou try to sound assured, but something tells you that entering this second trial, the united front your party has presented so far might be on the verge of breaking down…\n\n*page_break CHAPTER V\n\n[b]CHAPTER V[/b]\n*line_break\nFor worse or perhaps better, it doesn't seem you'll be granted any respite between your first and second trials. \n\nAs you walk forward through the champions arena of Trial One, the gates open to another battle grounds.\n\nFirst, you see another banner, this one streaming above a life-size game board. \n\nThis banner reads…\n\n*page_break\n\n[b]TRIAL TWO[/b] \n*line_break\n[b]Battle of Wits[/b]\n\nClearly, this is a trial of political and social maneuvering. Perhaps that's why QueSummiT has left you no time to debate the actions and events of Trial One—because sorting that conflict might be at the heart of your second trial?\n\nNext, you see that this game board is already filled with Shards, arranged like pawn pieces. Their mirrored bodies are not uniform, standing in many varying shapes and sizes. \n\nWhich feels fitting, since you glimpse yourself differently in each Shard. And unlike the sentries from the QueS castle, these bodies do not reflect your aspirations. These must be MainlanD shards, because instead they reflect your greatest insecurities. \n\nYou cannot help but focus on seeing yourself reflected as…\n\n*choice\n\t#A despotic monarch. [i](Gain Powerful, Reckless)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t*goto trialtwothestart\n\t#An authoritarian ruler. [i](Gain Powerful, Responsible)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\t\t*goto trialtwothestart\n\t#A deadly assassin. [i](Gain Powerless, Reckless)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t*goto trialtwothestart\n\t#A chained animal. [i](Gain Powerless, Responsible)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t*goto trialtwothestart\n\t#An obliterating comet. [i](Gain Destructive, Unleash)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %+15\n\t\t*goto trialtwothestart\n\t#A loaded weapon. [i](Gain Destructive, Limit)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %-15\n\t\t*goto trialtwothestart\n\t#A fatal virus. [i](Gain Constructive, Unleash)[/i]\n\t\t*set destructive %-15\n\t\t*set unleash %+15\n\t\t*goto trialtwothestart\n\t#A smashing hammer. [i](Gain Constructive, Limit)[/i]\t\n\t\t*set destructive %-15\n\t\t*set unleash %-15\n\t\t*goto trialtwothestart\n\n*label trialtwothestart\n\nIt's a vision that chills you to the bone. Not just that—focusing on this reflection actually seems to [i]affect[/i] you, unlike most of your other internal recognitions. Obviously, the influence of these Shards must run deeper than the supposed surface level…\n\nBut you try to shake it off, immediately wondering instead how you might use these reflective visions against your latest challengers, potentially.\n\nSpeaking of these challengers, at first you see only two beings standing on the opposite end of the game board. \n\nYou turn to Leigh, F.Spears, and P.Savage for input. But unlike every instance before, none of them seem to recognize these beings either. That'll make spellcasting to identify them much trickier, not having some starting point to hook into. \n\n*page_break\n\nHowever, one being steps forward in the next moment, looking quite eager to introduce and explain themselves. \n\nSomething about their appearance seems to ping your memory, but you can't quite place their race. \n\nThis being stands unusually tall, with light brown skin that glows against a white bodysuit, which is both flowy yet adapted for space travel. They have cropped blond hair that is studded with simple gold jewelry. \n\nYour eyes are drawn, however, to the wings that grow out of this being's collarbones. The wings swoop across their shoulders and continue to crease their exposed back, studded with more golden military decorations.\n\n*page_break\n\n\"We've only been here an hour, yet already I've seen more artifacts than I have ever in my long life,\" this being begins. \"It's a very good thing this planet is hidden…\" \n\nThe being then shudders, causing light to reflect off their layers of golden jewelry. It's almost like they glow from within, projecting an inner light outward. The name of this being's race feels on the tip of your mind, hovering just out of reach.\n\n\"If the Accursiques from my world were ever to find their way here, I'd fear for the fate of the entire Verses Galaxy.\"\n\nHearing these last few words, information finally clicks into place in your brain. \n\n[i]Of course.[/i] \n\n*page_break\n\nThis winged being must be an Angelique from the famed planet Fated. \n\nFated is an ancient world of vast galactic significance, rivaled in importance and infamy perhaps only by the so-called deities of planet Wone.\n\nYou've never met one of these rare and mythic beings in person, but you've certainly read plenty about their iconic races in your studies.\n\n*choice\n\t#I prepare a quick informational readout for myself on planet Fated, as a refresher.\n\t\t*goto fatedintro\n\t#I remember all I need to about planet Fated and its beings.\n\t\t*goto fatedintroover\n\n*label fatedintro\n\nToggling all your accumulated information, you focus on:\n\n*choice\n\t#[i]The Geography of Fated.[/i]\n\n\t\tIn your mind's eye, brought alive with brimming spellpower, you recall a 3D tour you once took in one of your Distopia Academy Galactic History lessons on Fated.\n\n\t\t[i]You briefly find yourself in a high tower of a sprawling city. This city, despite its density, feels like it thrums with light and order. You could spend hours going over the details of this gleaming metal-and-marble metropolis, but your eye is drawn to one remarkable feature: the fact that this city seems to float, impossibly, on some kind of cloud.[/i]\n\n\t\t[i]Underneath this floating city, you see a flat expanse of land that stretches down at its ends, almost like its own globe in the same atmosphere. This land is too far in the distance for you to make out much detail, but it looks almost patchwork, like squares of farmland laced with small bodies of water.[/i]\n\n\t\t[i]Miles and miles beneath both the cloud-city and the plain-globe rages an endless sea. It churns violently, a fury of gray froth and slate-blue waves seemingly the size of mountains. Despite its distance, the enormity of this sea threatens to overwhelm you, like it could somehow engulf you and trap you in its depths forevermore.[/i]\n\n\t\tOf course, this unique geography has bled—both purposefully and ambiently—into the mythologies of countless cultures, with their distinct feelings of heaven, purgatory, and hell. \n\t\t*goto fatedintro\n\t#[i]The Babel of Fated.[/i]\n\n\t\tIn your mind, brought alive with brimming spellpower, you recall a lecture read aloud by your Professor of Galactic History at the Distopia Academy.\n\n\t\t[i]\"The foundation of Fated is an ancient biological technology rooted in its three planes, a technology that has been advanced meticulously over many centuries. The core of this organic tech remains unchanged, much like the Wone Creashon wave. The Babel of Fated discerns and predicts the lessons each unique being in the Verses Galaxy must learn to become their truest selves.[/i]\n\n\t\t[i]\"According to legend, the Fated Babel works somewhat like a database. Its storage banks reside within the core of the planet, a divine source of information aggregation that is said to be plugged into the Verses Galaxy itself. Once this information is collected, the Babel's predictive engines are then powered by some of the most complex naturally occurring and artificially coded algorithms in existence.[/i]\n\n\t\t[i]\"The races of Fated have spent lifetimes decoding and refining this one-of-a-kind natural resource. However, the beings of Fated have always differed greatly on the best intended use of the Fated Babel. Many world wars have been waged over its intended functions, most recently Fated World War V, which erupted over alleged Accursique violation of treaties regarding use of the Fated Babel.\"[/i]\n\n\t\t*goto fatedintro\n\t#[i]The Races of Fated.[/i]\n\n\t\tIn your mind's eye, brought alive with brimming spellpower, you recall a projected lecture from your Distopia Academy Galactic History lesson on Fated.\n\n\t\t[i]The Angelique race of the Cumulus Metropolis believe in serving the Fated Babel and correcting those in the Verses Galaxy who stray too far from their designated paths of growth. Historically, these vengeful enforcers have worked closely with Wone Creashonists.[/i]\n\t\t\n\t\tYou recall drawings of typical Angeliques, channeling golden-white light halos and possessing wings that enable flight even through space.\n\n\t\t[i]The Abnormalique race of the Plain State do not believe in or trust the Fated Babel, denouncing it as false predestination. Historically, these agents of freewheeling independence have attempted to destroy the Babel. Abnormaliques are adept at acquiring special abilities based on their chosen training, often ascending or descending.[/i]\n\t\n\t\tYou don't even need to recall drawings of typical Abnormaliques, who look like completely average humanoids.\n\n\t\t*page_break\n\n\t\t[i]The Accursique race of the Churning Nation believe access to the Fated Babel entitles them to rule the Verses Galaxy as its rightful deities. Historically, these subversive forces have embedded themselves in the underbelly of nearly every planet in the Galaxy. Accursiques excel in empathetic manipulation and channeling energetic mysticism.[/i]\n\n\t\t[i]Living only for themselves, individual Accursiques travel to unsuspecting planets and find the slimiest underbellies of each society. Once they've learned the local customs and blended in appropriately, they use their natural intuition and access to the Fated Babel to exploit and expand the insecurities of beings, solely to promote their own wealth. The expression 'making a deal with the devil' actually refers to the common dealings of the Accursique diaspora.[/i]\n\n\t\tYou finally recall drawings of typical Accursiques, who range in humanoid appearance but all seem to possess the same pinkish-purple glowing eyes and bodies capable of surviving extreme conditions.\n\n\t\t*page_break\n\n\t\tIt is a well-known secret that Accursiques have established a far-reaching ancient organized crime syndicate on your original home planet, Blende. It's highly likely you've met several Accursiques there without even knowing it. \n\n\t\tIn fact, particularly cruel children would claim you as the bastard child of an Accursique, given your purple eyes and penchant for spellpower.\n\n\t\tYou almost believed this foul insult to be true yourself, secretly. Except for the fact that your genetics were reported as firmly Repo and Replete.\n\n\t\tStill, you've always wondered…could one of your parents secretly have been one of these Accursique agents, posing as a native Repo or Replete? Honestly, it would explain a great deal about your natural abilities…but you've never had any way to confirm or deny these deeply embedded suspicions. Besides, that's what Accursiques are most known for: sowing seeds of doubt and discontent.\n\t\t*goto fatedintro\n\t#I'm finished refreshing my knowledge.\n\t\t*goto fatedintroover\n\n*label fatedintroover\n\n\"You two still glow with the ambient aura of those Reborn from Versus,\" the Angelique says, focused specifically on P.Savage and F.Spears. \"My partner, Beyhalo, was also recently Reborn. Though we haven't been partners, not really, since our children were killed in our Fated World War V. My name is Flowe, former Chief Officer of the Angelique Enforcement Bureau.\"\n\nFlowe reaches behind her back and dislodges a rod that must have been stored there. With a flick of her wrist, the shortened stick glows and elongates into a gorgeously crafted staff, tipped with an orb of softly glowing light. Along the staff's post are several military decorations to match the ones on Flowe's wings.\n\n\"I fled Fated many moons ago, to begin life anew in search of my half brother, the Fallen Fated Wone. He was framed for murder to hide the truth of his birthright.\"\n\nThis is the moment when Flowe's partner chooses to step forward beside them. \n\n*page_break\n\nYou'd guess this partner is a Fated Abnormalique, and not the kind who subscribes to the Angelique way. She is much shorter and dressed in all-black leather and sleek armored pieces. She has a shaved-bald head of dark brown skin and her thick hips house two of the scariest-looking telescopic star-scope guns you've ever seen.\n\nHer only truly distinguishing features are the long silver scar that runs from her left eye down to her chin and an enormous mercury-encircled onyx stone that hangs around her neck on a chain.\n\n\"Flowe [i]believes[/i] her half brother was framed,\" the Abnormalique begins. \"But I'm just a hired gun. What do I know?\"\n\n\"Don't mind Clip,\" Flowe tries, their lips drawing tight. \"She doesn't really believe in anything.\"\n\n*page_break\n\n\"False,\" Clip shoots back. \"I believe in hunting down the Angeliques ordered to carry out the most vengeful sentences from that archaic, corrupt Babel. But the tools to keep clipping their wings are expensive, so here we are, on the weirdest bounty hunt of my life.\"\n\nFlowe sighs and looks exhausted, like she's been dealing with Clip's outbursts for weeks. \"Clip's mouth is almost as sharp as her instincts for tracking and sensing Angeliques. Which is the only reason I've employed her.\"\n\n\"Whatever, let's cut to the chase,\" Clip says, a hand on her hip. \"Here's why Flowe has been trying to butter you up with their warm and fuzzy routine. To find their brother, we were told to seek out those recently Reborn from Versus. Apparently only they could have the pieces to the puzzle his cold trail together. We've been halfway across the damn Galaxy and back tracking down you mysterious cruds to learn just this much: \n\n\"Finding Flowe's half brother will require 'opening the Nexus,' whatever that means.\"\n\n*page_break\n\nHearing this last bit, you turn to P.Savage and F.Spears. And you aren't surprised to find very different looks on their faces. \n\nP.Savage looks wild, with almost giddy eagerness burning in his eyes. Beside him, F.Spears looks full of dread. It sounds like all this mysterious Nexus nonsense is indeed about to come to a head in this second trial.\n\n\"Now, just as we were arguing about how to figure out that latest enigma, we were zapped here and told we were to 'participate in a Quest Trial that would determine the fate of the Nexus.' Then you four—a Blende Disrep, two Versian Reborn, and a local royal—walk right on in. So here's our question…\n\n\"What's the punchline of this particular joke going to be?\"\n\n*page_break\n\n\"My half brother is not only innocent,\" Flowe adds, deliberately swallowing their frustration towards Clip. \"The blood in his veins might be the key to unlocking a new era for the entire Verses Galaxy. Finding him is a matter of grave importance.\"\n\n\"Part of our own Reborn mission has been participating in this Quest,\" F.Spears replies, taking equal care with the first words she speaks. \"But we have also been named Defenders of the Nexus. My partner here believes that means opening the Nexus, in order to fully understand it. \n\n\"I, however, believe that means keeping the secrets of the Nexus sealed from all.\"\n\nAh, so there it is. The crux of the disagreement you've sensed brewing between F.Spears and P.Savage since you met them.\n\n*page_break\n\n\"And that includes keeping the Nexus sealed from us,\" Clip replies. \"Which puts us at an impasse. Except, I've got some information I don't think you do…Farrah Spears, is it?\"\n\nF.Spears opens her mouth to ask how Clip could know this, but there's something about the way Clip then looks her over—like she is using her aforementioned \"tracking sense\" on her.\n\n\"Flowe's half brother is obviously half Fated Angelique, sharing one parent,\" Clip continues. \n\nFlowe seems to want to stop her, but Clip waves her off. Why Flowe lets her continue isn't fully clear. But your gut tells you…\n\n*fake_choice\n\t#That this might be a carefully curated routine between them, to get what they want from particularly empowered beings. I should be wary of it.\n\t#That this information costs them nothing to share—and that it's worth it to do so, if it avoids a massive fight.\n\t#That it actually feels like Flowe genuinely wants to hear what Clip has to say, despite their visible disdain.\n\t#That why they tell you things doesn't matter, as long as they keep talking. Information is power.\n\n\"But it turns out that Flowe's brother's other parent was actually Wone,\" Clip continues, causing your entire party to tense—including you. \n\n\"Ah. I see you know what that means. Yes, that makes Flowe's half brother the only Fated-Wone hybrid in known history, given the…difficulties surrounding interspecies mating.\"\n\n\"This truth was kept hidden from my brother and me our entire lives,\" Flowe cuts in, with a heavy sigh. \"Once the truth was revealed to a small circle on our parent's deathbed, the very next day my brother was accused of a murder by the Fated Babel—a murder I know he could not possibly have committed. \n\n\"I believe he was framed so that the truth of his birth might never be revealed. I didn't know why then, and neither did he. So he fled to some corner of the Galaxy no one could ever find.\n\n*page_break\n\n\"It has taken me many years and all of my life savings to learn the singular answer to those two questions,\" Flowe continues. \"[i]The Nexus[/i]. I don't know what that is, but I know it is the key to every mystery surrounding Venge. And that the oldest powers in the Galaxy have gone to great lengths to keep this hidden. After all, the search to solve that mystery has led us here, to this paradise planet hidden in its own pocket dimension, to a forbidden summit on a secluded isle, accessed by invitation only…\n\n\"Face to face with a diverse and powerful gathering I pray will not stand in our way.\"\n\n\"Yes, which returns us to my point about Farrah here,\" Clip cuts back in. \"To be clear, I have no skin in this game other than getting paid. So you can believe me when I tell you that you, tall and gorgeous one…\"\n\nClip looks straight as F.Spears as she speaks her next words.\n\n\"We believe Flowe's brother's unique hybrid genetics are what allowed him to pass into the Nexus. I've been studying those genetics to track him, and let me tell you, F.Spears… \n\n*page_break\n\n\"You're a rare hybrid, too.\" \n\nBefore Clip can say another word, F.Spears turns directly to you. And you don't need any spoken words to understand the meaning conveyed in her blazing eyes, carried on her signature mental wisps.\n\n[i]You're from an entire race of the Galaxy's most controversial hybrids, and you've still always had questions about why you stand out from them. About where you might really come from. About where you truly belong, just like me.[/i] \n\n[i]Am I ready to learn the truth? Would you be?[/i]\n\nMatching F.Spears's gaze, you relay your answer.\n\n*choice\n\t#[i]Don't be so weak. Claim your birthright.[/i] [i](Gain Powerful, Reckless. Lose F.Spears)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t*set fspears %-30\n\n\t\tF.Spears receives your message like a blow.\n\n\t\tWell, too bad. If she was looking for sympathy for being told she is special, she'll have to go elsewhere.\n\n\t\tBesides, you know exactly where you come from. \n\n\t\tAnd you couldn't be more proud to be a \"hybrid,\" no matter what controversy surrounds it.\n\t\t*goto theladyarrives\n\t#[i]You're ready for this. You can handle the truth.[/i] [i](Gain Powerful, Responsible, F.Spears)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\t\t*set fspears %+30\n\n\t\tF.Spears receives your message with a burst of gratitude.\n\n\t\tBecause she is right. You do know all about the burdens of birthright, about being dubbed a \"hybrid\" or \"uniquely rare.\"\n\n\t\tAnd you realize with a burst of your own how [i]proud[/i] you actually are of both of those things. \n\n\t\tSo F.Spears should feel the same.\n\t\t*goto theladyarrives\n\t#[i]Could I also be a hybrid in a way other than what I've been told?[/i] [i](Gain Powerless, Reckless, F.Spears)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t*set fspears %+30\n\n\t\tHowever, you immediately dismiss this notion. \n\n\t\tYou've been genetically confirmed as a Disrep. Besides, this Clip being probably would have sensed the same cross-genetics on you, if you were some more rare sort of mix.\n\n\t\tSo returning your focus to F.Spears, you send a burst of pride back to her.\n\n\t\tBecause, with the threat of those titles being changed, you realize with a burst of your own how [i]proud[/i] you actually are to be dubbed a \"hybrid\" or \"uniquely rare.\" \n\n\t\tSo F.Spears should feel the same.\n\t\t*goto theladyarrives\n\t#By looking away. F.Spears and I aren't the same at all. [i](Gain Powerless, Responsible. Lose F.Spears)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t*set fspears %-30\n\n\t\tIf F.Spears was looking for sympathy for being told she is special, she'll have to go elsewhere.\n\n\t\tBesides, you know exactly where you come from. \n\n\t\tAnd you couldn't be more proud to be a \"hybrid,\" no matter what controversy surrounds it.\n\t\t*goto theladyarrives\n\n*label theladyarrives\n*page_break\n\nJust then, you're all distracted as a new figure steps out from behind one of the Shards on the game board. She must have been here the entire time, but you have no idea how she wasn't yet seen. \n\nThen you get a good look at this new player and understand someone like her is probably only ever seen if she wants to be. She glows with residual charm energy—the kind that reminds you distinctly of F.Spears's spindly wisps, in fact.\n\nThis new challenger stands tall and regal, with shimmering golden-brown skin and jet-black hair chopped at shoulder length. She wears a black pantsuit with wide-cut legs and an open blazer, displaying an intricate gold and canary-diamond chain-bodice underneath. Most of all, this queenly-seeming woman feels charged with power and purpose.\n\n\"The time has arrived for me to introduce myself…\"\n\n*page_break\n*set spellodexvenuma true\n*achieve encountervenuma\n\n\"I am Lady Venuma Grecca, Demigoddess of The Wone. I am also recently Reborn of Versus, where I fought on the Constructive half alongside Beyhalo. Both P.Savage and F.Spears should also recognize me from our galactic reintroduction training.\"\n\nAs a new entry populates in your Spellodex, you look to the Destructive Eight pair and they both confirm this with a nod. Though neither look particularly warm or fuzzy to see this Lady Venuma.\n\n\"Our halves remained mostly separated, which is why neither of us knew until now that I was also named a Protector of the Nexus. And hearing what I already have here today, it is now clear to me why I have been summoned to this place.\"\n\nLady Venuma then turns and sets her golden gaze directly on F.Spears. \n\n*fake_choice\n\t#And I actually feel a little envious. I'm quite used to being the center of attention.\n\t#Mostly it's nice to have all the attention and pressure off of myself for a minute.\n\t#I actually wish I had a bucket of snacks. Because this is shaping up to be downright [i]entertaining[/i].\n\t#All my muscles tense. I can tell this is just the prelude to one mightily epic battle to come.\n\n\"What Clip states is true,\" Lady Venuma continues. \"You, Farrah Spears, are a rare hybrid being. One not of the home world where you were raised. Your true mother was the Wone goddess Madame Venume. I know this because I was once her apprentice. She spoke of a daughter she birthed, one whose fatherhood would damn her here in the Verses Galaxy. So she cast you into the Nexus, to a faraway world where you could be raised in peace.\"\n\n\"Your strength, your flight, your skin tone, your weblike charms—you got all of that from your Wone mother. You are descended of deity royalty. I believe I would have been your godmother, had your mother been able to keep you.\"\n\nF.Spears appears thunderstruck. Though that makes sense. What troubles you far more is the look of pure jealousy that seethes its way across P.Savage's face.\n\n\"Who was my father?\" F.Spears asks, barely above a whisper.\n\n*page_break\n\n\"That privileged information Madame Venume never dared disclose to me before her…untimely death,\" Lady Venuma sighs, delivering that news as gently as she seems able. \"She claimed it was a truth that would shake worlds. She believed you'd never return from your homeworld within the Nexus. Indeed, had you not been Selected for Versus, you might never have returned to Verses Galaxy space.\"\n\nAll eyes shift back to Flowe and Clip, hearing these details—especially the one involving a potential murder.\n\n\"My brother did not kill any Wone,\" Flowe says. \"Besides, his father was Wone, not our mother.\"\n\n\"And F.Spears's other half is not of Fated,\" Clip adds, once again seeming to scan and sense. \"I actually can't place it.\"\n\n*page_break\n\n[i]Great.[/i] More mysteries. Not to mention that none of these beings have actually divulged what this Nexus might be or why it's so allegedly vital. But feeling the new charge of tension that hangs in the air, you have a feeling the conflict surrounding these mysteries is about to escalate.\n\n\"Regardless, F.Spears, my fellow Wone demigoddess, I have been summoned here to support and protect you,\" Lady Venuma then declares. \"Like Flowe's brother, you are one of a precious few beings in the Verses Galaxy empowered enough to be capable of entering the Nexus. I was heartened to hear you do not wish to open this gateway. It is my sworn duty to ensure that threshold is never crossed again.\"\n\nWith these words, clarity seems to settle over the players in this trial. \n\nLady Venuma and F.Spears will fight to keep the Nexus sealed. P.Savage and Flowe will fight to open it, now knowing that F.Spears is the living key to do so. And Clip will do what she is paid most to do.\n\n*page_break\n\nWhich suddenly clarifies your own role to play here. In fact, it's almost like the Quest Coins you have stashed away thrum this same sentiment up to you: \n\n[i]This conflict will be fought outside of your own Quest. Your trial here is simply to be judged for casting the first die roll in this separate conflict.[/i]\n\nThe power source you seek still lies ahead, but that will be a Quest completed by [i]only[/i] you and Leigh. ${questhing} floats to your side as this realization settles, confirming your suspicions.\n\nThe success of your trial will be determined by how you weigh the social and political factors at play here.\n\n*if unlockedquesthing\n\t*page_break\n\n\t${questhing} knows this as well, so it presents you with another all-important toothy artifact boost.\n\n\tThis time, ${questhing} then conveys that your aptitude for your skill with Technology and Perception spells will prove most crucial in this trial.\n\n\tSo you check your levels and decide to accept:\n\n\t*temp urnofunpredictabilityc 0\n\t*rand urnofunpredictabilityc 1 2\n\n\t*choice\n\t\t#The Pearls of Perception. [i](Auto Boost Perception)[/i]\n\t\t\t*set perception +5\n\n\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\tInstantly, you feel your Perception spells skill sharpen.\n\n\t\t\t[i](Perception Pearly)[/i]\n\t\t\t*goto decidesupportwonefated\n\t\t#The Tools of Technology. [i](Auto Boost Technology)[/i]\n\t\t\t*set technology +5\n\n\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\tInstantly, you feel your Technology spells skill sharpen.\n\n\t\t\t[i](Technology Tooled)[/i]\n\t\t\t*goto decidesupportwonefated\n\t\t#The Urn of Unpredictability. [i](Double-Strength Boost, But Randomly Applied)[/i]\n\n\t\t\t*if (urnofunpredictabilityc = 1)\n\t\t\t\t*set perception +10\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your skills to raise at random.\n\n\t\t\t\tInstantly, you feel your Perception spells skill sharpen twice as potently.\n\n\t\t\t\t[i](Double Perception Pearly)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityc = 2)\n\t\t\t\t*set technology +10\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your skills to raise at random.\n\n\t\t\t\tInstantly, you feel your Technology spells skill sharpen twice as potently.\n\n\t\t\t\t[i](Double Technology Tooled)[/i]\n\n\t\t\t*goto decidesupportwonefated\n*else\n\t*goto decidesupportwonefated\n\n*label decidesupportwonefated\n*page_break\n\nF.Spears turns to you, offering one last look, accompanied by another message. This message is yet again carried on the wisps of her weblike charms only visible to you—charms you now know are of Wone descent.\n\n[i]I hoped to speak of this to you in private, but our time together might be about to end. So forgive my bluntness. Everyone has an agenda for you, ${babename}, but what do you want? Because it doesn't matter where you come from; it matters where you're going. And all the power in the universe is useless if you don't wield it with purpose.[/i]\n\n[i]I have seen it; you are angry. Whether you have seen it or not, I carry the same anger, in this moment more than ever. I believe you are like me in more ways than this. So I ask you this. What will you do with all your justified rage—destroy or create?[/i]\n\nHearing F.Spears's silent message rings other questions in your ears…\n\n*page_break\n\n[i]You break things, or maybe you put them back together? And is there some deeper truth in your own hybrid heritage, one no one in the Galaxy is capable of placing quite yet?[/i]\n\nThese are questions you will clearly have to answer for yourself. \n\nAnd you can start right now.\n\nLooking over the various Shards assembled on the game board, you realize the perfect way to tip the scales of this trial—and this conflict that will ensue without you.\n\n*choice\n\t#Reveal the Sharded insecurities of P.Savage, Flowe, and Clip to give F.Spears and Lady Venuma the upper hand in keeping the Nexus hidden. Some powers are best left limited, building defenses. [i](Test High F.Spears. Gain Limit)[/i]\n\t\t*set babenexuslimit true\n\n\t\tYou might not be fighting for the ultimate fate of the Nexus, but your decision will certainly tip the scales…\n\n\t\tAnd signal quite a bit about who you are and who you want to become.\n\n\t\tWith another twitch of your fingers, you cast a potent perceptive spell to amplify the individual reflections within several Shards. \n\n\t\tThen you swipe your hands to select the visions you wish to project for all to see.\n\n\t\t*page_break\n\t\t*achieve hidethenexus\n\n\t\tIlluminated above the party first is a refraction of P.Savage appearing as a little boy, the words [b]insecure[/b] and [b]unloved[/b] lit up and circling him.\n\n\t\tBeside that, a projection of Flowe populates, standing completely alone and circled by the words [b]you always lose those you love[/b]. \n\n\t\tFinally, a reflection of Clip appears, with her appearing savage and winged—and every bit as cruel as those she hunts, circled by the words [b]judge, jury, executioner[/b].\n\n\t\tYou watch as these visions freeze this trio in place, caught in the glare of their deepest insecurities writ large.\n\n\t\t*page_break\n\n\t\tThen you look to F.Spears.\n\n\t\t*if (fspears > 70)\n\t\t\t*achieve fspearsbond\n\t\t\t*set potency +2\n\t\t\t*set questcoins +3\n\t\t\t*set unleash %-30\n\n\t\t\tShe gives you a nod of deep gratitude, understanding the significance of your gesture.\n\n\t\t\tAnd QueSummiT seems to approve of your show of close solidarity with F.Spears, because in the next moment, three platinum Coins suddenly materialize in your palm.\n\n\t\t\t[i](Gained 3 Quest Coins)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Potency, Limit)[/i]\n\t\t\t*goto trialtwoover\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set questcoins +1\n\t\t\t*set unleash %-15\n\n\t\t\tShe gives you the briefest of nods, grateful for this small display of solidarity. It's obviously more than she expected, given the relative distance of the relationship you've built.\n\n\t\t\tUnfortunately, QueSummiT seems less supportive of your decision, because in the next moment only one platinum Coin drops into your palm.\n\n\t\t\t[i](Gained 1 Quest Coin)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Potency, Limit)[/i]\n\t\t\t*goto trialtwoover\n\t#Reveal the Sharded insecurities of F.Spears and Lady Venuma to give P.Savage, Flowe, and Clip the upper hand in opening the Nexus. Some old barriers are meant to be broken in the name of progress. [i](Test Low F.Spears. Gain Unleash.)[/i]\n\t\t*set babenexusunleash true\n\n\t\tYou might not be fighting for the ultimate fate of the Nexus, but your decision will certainly tip the scales…\n\n\t\tAnd signal quite a bit about who you are and who you want to become.\n\n\t\tWith another twitch of your fingers, you cast a potent perceptive spell to amplify the individual reflections within several Shards. \n\n\t\tThen you swipe your hands to select the visions you wish to project for all to see.\n\n\t\t*page_break\n\t\t*achieve openthenexus\n\n\t\tIlluminated above the party first is a refraction of F.Spears appearing completely alone, the words [b]doesn't belong[/b] lit up and circling her.\n\n\t\tBeside that, a projection of Lady Venuma populates, showing the emptiest of night voids under her shining golden surface. \n\n\t\tShe is circled by the words [b]ruthless, ambitious, killer[/b].\n\n\t\tYou watch as these visions freeze these two in place, caught in the glare of their deepest insecurities writ large.\n\n\t\t*page_break\n\n\t\tThen you focus on F.Spears, tears filling her eyes.\n\n\t\t*if (fspears \u003c 30)\n\t\t\t*achieve fspearsdistance\n\t\t\t*set potency +2\n\t\t\t*set questcoins +3\n\t\t\t*set unleash %+30\n\n\t\t\tShe shifts her gaze to you. Despite the pain and realization there, she understands. You were never closely aligned on much of anything.\n\n\t\t\tAnd QueSummiT seems to approve of your decision, because in the next moment, three platinum Coins suddenly materialize in your palm.\n\n\t\t\t[i](Gained 3 Quest Coins)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Potency, Unleash)[/i]\n\t\t\t*goto trialtwoover\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set questcoins +1\n\t\t\t*set unleash %+15\n\n\t\t\tShe shifts her gaze to you. She hits you with a look of pain and betrayal so deep, you almost flinch.\n\n\t\t\tAnd QueSummiT seems to feel much the same about your decision, because in the next moment only one platinum Coin drops into your palm.\n\n\t\t\t[i](Gained 1 Quest Coin)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Potency, Unleash)[/i]\n\t\t\t*goto trialtwoover\n\t#Reveal the Sharded insecurities of everyone to create a level playing field. The fate of this conflict is not central to my Quest. [i](Test Perception and Technology. Gain Auto Limit-Unleash)[/i]\n\n\t\tThis fight is merely a distraction from the power source you seek. \n\n\t\tThis might be an important battle, but it's only a minor one compared to the Galaxy-spanning war you face. \n\n\t\tSo your decision will certainly signal quite a bit about who you are and who you want to become.\n\n\t\tWith another twitch of your fingers, you cast a potent perceptive spell to amplify the individual reflections within several Shards. \n\n\t\t*page_break\n\n\t\tIlluminated above the party first is a refraction of P.Savage appearing as a little boy, the words [b]insecure[/b] and [b]unloved[/b] lit up and circling him.\n\n\t\tBeside that, a projection of Flowe populates, standing completely alone and circled by the words [b]you always lose those you love[/b]. \n\n\t\tNext, a reflection of Clip appears, with her appearing savage and winged—and every bit as cruel as those she hunts, circled by the words [b]judge, jury, executioner[/b].\n\n\t\tF.Spears then also appears completely alone, the words [b]doesn't belong[/b] lit up and circling her. \n\n\t\tFinally, a projection of Lady Venuma populates, showing the emptiest of night voids under her shining golden surface. She is circled by the words [b]ruthless, ambitious, killer[/b]. \n\n\t\t*page_break\n\n\t\tYou watch as these visions freeze these all five challengers in place, caught in the glare of their deepest insecurities writ large.\n\n\t\tYou don't focus on F.Spears in particular, even though you can feel her eyes shift to you. This isn't about you or her. It's about the mission, about fights for causes far larger.\n\n\t\t*if (technology > 25) and (perception > 25)\n\t\t\t*set potency +2\n\t\t\t*set questcoins +3\n\t\t\t*if (unleash >= 50)\n\t\t\t\t*set unleash %+30\n\t\t\t*if (unleash \u003c 50)\n\t\t\t\t*set unleash %-30\n\n\t\t\tQueSummiT seems to approve of your decision and your application of skills, because in the next moment, three platinum Coins suddenly materialize in your palm.\n\n\t\t\t[i](Gained 3 Quest Coins)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Potency, Auto Unleash-Limit)[/i]\n\t\t\t*goto trialtwoover\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set questcoins +1\n\t\t\t*if (unleash >= 50)\n\t\t\t\t*set unleash %+15\n\t\t\t*if (unleash \u003c 50)\n\t\t\t\t*set unleash %-15\n\n\t\t\tUnfortunately, QueSummiT must not be impressed with this application of your skills, because in the next moment only one platinum Coin drops into your palm.\n\n\t\t\t[i](Gained 1 Quest Coin)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Potency, Auto Unleash-Limit)[/i]\n\t\t\t*goto trialtwoover\n\n*label trialtwoover\n*page_break\n\nAfter this, the Trial Two exit gates swing open. \n\nYou know that you and a shell-shocked Leigh need to move on and leave the others to battle here without you…\n\nQueSummiT has confirmed this instinct over and over.\n\nSo however you might feel about this abrupt separation, you leave P.Savage, F.Spears, Flowe, Clip, and Lady Venuma to fight for the fate of the Nexus. \n\n*page_break\n\nWhat exactly is the Nexus, why is it so important, and will it remain closed or be opened? \n\nThese are questions you sense will be answered in a [b]separate fated odyssey to come.[/b]\n\nSo perhaps your paths will cross again. \n\nOr perhaps, if you complete your own mission, you'll [i]make[/i] it so your paths cross again.\n\n*page_break\n*set spellodexvenge true\n*achieve encountervenge\n\nEither way, as you prepare to leave, your Spellodex suddenly pings with a new entry. It seems Flowe has sent you something, as a kind of parting gift.\n\nOr rather, as a kind of parting request.\n\n[i]If I fail, you now have the breadcrumbs you'll need to follow the fraught trail of my half brother, Venge. And I implore you to make sure the right ears hear the story of the Fallen Fated Wone.[/i]\n\nReceiving this message, you file it away for now. That's definitely a saga some future version of you can deem potentially worthy, someday.\n\n*page_break CHAPTER VI\n\n[b]CHAPTER VI[/b]\n*line_break\nIt takes until sunset once again for you and Leigh to reach the next rest camp. \n\nBy now you've spiraled up most of QueSummiT, a grueling trek along the platinum-and-bronze road that took all of your combined focus and energy.\n\nYou and Leigh have barely spoken more than a few words on your long climb. Which felt fine, at the time. \n\nYou both obviously had quite a bit to process from all you learned and witnessed during the first two trials.\n\n*page_break\n\nNow you both sit beside a campfire, having ravenously inhaled the rations provided here. \n\nYou could conjure more food, but your spell foodstuffs never taste quite right and usually leave you with a stomachache.\n\nBesides, your gut already feels all twisted in knots, anticipating the conversation you know you need to have with Leigh before your third and final trial. \n\n\"So exactly how many Quest Coins will we need to enter the last trial?\" you ask, trying not to sound as hesitant as you feel.\n\n*page_break\n\n\"We'll find out at sunrise,\" Leigh replies, ${leighhis} voice tightly wound. \"Though honestly, after everything I've learned today, I don't know what I want for tomorrow. I just keep wondering what you've brought to my world… \n\n\"And whether helping you makes me a hero or a villain.\"\n\nYou take a beat, chewing over Leigh's loaded sentiments.\n\n\"I hate those words, 'heroes and villains.' They're so reductive,\" you reply carefully. \"We are champions. Warriors. Saviors. Agents. Concepts like good and evil are too simplistic when it comes to waging a war.\"\n\n*page_break\n\n\"I want to believe you,\" Leigh says. \"I want to believe you are fighting to defend the Galaxy, even if you can't tell me exactly who or what you're fighting, Or even if I'm destined to quickly forget. From what I've witnessed, your word seems true…\n\n\"But there's one part I can't quite reconcile.\"\n\nLeigh pauses, ${leighhis} emerald eyes cast down at the floor, even though they cannot see. \n\n\"Is the price we might have to pay for this defense too great?\" Leigh asks. \"Will opening the Nexus rip apart my home? Will finding your power source destroy my planet?\"\n\n*page_break\n\nYou fight to keep your voice steady as you speak your answer aloud. \n\n\"I don't know. But I do know that if I do nothing, or if I fail? Every planet in our Galaxy will eventually be consumed and destroyed. \n\n\"No cost could be higher than that.\"\n\n\"I know you believe that. Truly,\" Leigh replies, tilting ${leighhis} head. \"But…\"\n\n*page_break\n\n\"I have seen what it means to be blinded by power and by purpose. When the means are as costly as the alternate ends, all we have to rely on is our morals.\"\n\n\"And you don't trust my morals?\" you ask, giving life to Leigh's core question.\n\n\"I was born to be tempted and tested. [i]Literally[/i]. On some level, I believe we all are. So perhaps this is your test, ${babename}. Cosmic capabilities, cosmic consequences. It doesn't ultimately matter if I trust your morals, because I have no ability to stop you.\n\n\"But I can ask you this much. Is there any line you wouldn't cross, any rule you wouldn't break, to become who you feel you must?\"\n\n*page_break\n\nThinking over Leigh's question… \n\nIt actually surprises you how quickly you formulate an answer.\n\nSo you don't hesitate to speak your truth aloud.\n\n*choice\n\t*selectable_if (kyleigh > 60) #\"There's nothing I wouldn't do to impress or protect you, ${princese} Kyleigh of QueS. I've never felt about anyone the way I feel about you.\" [i](Test/Gain ${princese} Kyleigh)[/i]\n\t\t*set becoming +6\n\t\t*set kyleigh  %+40\n\n\t\t[i](Gained ${princese} Kyleigh, Becoming)[/i]\n\t\t*goto romantickyleighpaths\n\t#\"I have no choice but to do what is required of me. No matter the cost.\" [i](Test Powerless or Reckless. Lose ${princese} Kyleigh)[/i]\n\n\t\t\"I am as necessary as a storm,\" you add. \"I am built to destroy. \n\n\t\tAnd I won't be diminished or judged for becoming what I was born to be.\" \n\n\t\t*if (powerful \u003c 25) or (reckless > 75)\n\t\t\t*set kyleigh %-30\n\t\t\t*set belonging %-5\n\t\t\t*set becoming +8\n\n\t\t\t\"I do not seek to diminish you,\" Leigh replies. \"But no living being is above being judged.\"\n\n\t\t\t\"Then I guess you have nothing to worry about,\" you conclude.\n\n\t\t\t*page_break\n\n\t\t\tLeigh falls silent. You can tell there is [i]much[/i] ${leighze} worries about when it comes to you. \n\n\t\t\tWhich means there is nothing left to do but endure this last sleep together.\n\n\t\t\t[i](Lost ${princese} Kyleigh)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Independence, Boosted Bonus Becoming)[/i]\n\t\t\t*goto enteringtrialthree\n\t\t*else\n\t\t\t*set kyleigh %-15\n\t\t\t*set belonging 50\n\t\t\t*set becoming +4\n\n\t\t\t\"Excellent villain monologue, really A-plus stuff,\" Leigh cracks. \"All you narcissists with too much power are exactly the same.\"\n\n\t\t\tLeigh tries to speak with confidence, but you can still hear the fear ${leighze} tries to cover in ${leighhis} shaking voice.\n\n\t\t\t*page_break\n\n\t\t\tWell, you don't owe Leigh any comforts, or any further responses. \n\n\t\t\tWhich means all that's left to do is endure this last sleep together.\n\n\t\t\t[i](Lost ${princese} Kyleigh)[/i]\n\t\t\t*line_break\n\t\t\t[i](Balanced Belonging-Independence. Gained Basic Becoming)[/i]\n\t\t\t*goto enteringtrialthree\n\t#\"My power allows me to do almost anything. I would be a fool not to understand that I'd go mad if I don't establish some personal boundaries.\" [i](Test Powerful or Responsible. Gain ${princese} Kyleigh)[/i]\n\t\t\n\t\t\"I'm starting to see that destroying is far easier than creating,\" you continue. \"Just like I'm starting to learn that if I break things, it is also my duty to put them back together. Stronger, if possible. \n\n\t\t\"But I also must take care with what I choose to break in the first place.\"\n\n\t\t*if (powerful > 75) or (reckless \u003c 25)\n\t\t\t*set kyleigh %+30\n\t\t\t*set belonging %+5\n\t\t\t*set becoming +8\n\n\t\t\t\"I can't begin to tell you how heartening it is to hear that,\" Leigh replies, with a heavy exhale of a sigh. \"Powers like yours need checks and balances. It's so much better if you do that for yourself. \n\n\t\t\t\"Because if not, I fear you might have it done for you. [i]To[/i] you.\"\n\n\t\t\t*page_break\n\n\t\t\tLeigh says all this and means it as a friend…but the sentiment does send a chill up your spine, all the same. \n\n\t\t\tYou've been judged for your powers your entire life.\n\n\t\t\tSo will creating some personal boundaries only lessen or increase that judgment?\n\t\t\t\n\t\t\tIt's a question that makes you fall silent. \n\n\t\t\tLong enough that Leigh eventually drifts to sleep, leaving you to contemplate these questions deep into the night.\n\n\t\t\t[i](Gained Belonging, ${princese} Kyleigh, Boosted Bonus Becoming)[/i]\n\t
