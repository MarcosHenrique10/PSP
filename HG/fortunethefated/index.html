<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fortune the Fated — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>

    </aside>
  </div>

window.__CS_OFFLINE__ = {"game": "fortunethefated", "title": "Fortune the Fated", "scenes": {"choicescript_description": "TO UNLOCK ANCIENT SPELLS NEEDED TO DEFEND THE GALAXY, CAN YOU NAVIGATE FANTASY QUESTS, NOIR CASES, HEROIC COMPETITIONS, DYSTOPIAN WORLDS & SPACE HEISTS?\n \nIn a galaxy that faces an insidious invasion, an elite squad has been trained to scour remote and exotic planets for the secret powers capable of destroying the invaders. The key to unlocking these mysterious and destructive forces rests in one young adult with unthinkable magical powers—and whether you become the galaxy’s greatest hope or its most wretched threat is up to you. Can you navigate fantasy anime quests, noir detective investigations, heroic reality competitions, dystopian world explorations, and deep space heists to unlock the ancient spell-power needed to defend the galaxy—or will you self-destruct everything in the process? To save everything, is there anything you wouldn't destroy?\n \n\"FORTUNE the FATED\" is an interactive novel that allows you to make character choices, assemble plot parts in customized order from several genre-spanning stories, and unlock alternate endings based on your chosen readings. It is a standalone work, perfect for new readers, but also serves as a companion novel to \"The Versus Trilogy\" & continues the story of The Sergiverse. (Book One in the \"FORTUNE the FATED\" Duology).\n", "choicescript_stats": "*label display\n\n*label officialstatchart\n\n*image fortunethefatedbanner.jpg center Fortune the Fated\n\nBabe \"${babename}\" Fortune\n\n[b]PERSONALITY[/b]\n*stat_chart\n\ttext becoming Becoming\n\topposed_pair Powerful\t\n\t\tPowerless\n\topposed_pair Reckless\n\t\tResponsible\n\n*if ((parttwogothika = false) and (parttwoseas = false)) and (spellodexhunteresschalice = false)\n\n\t[b]RELATIONSHIPS: DISTOPIA[/b]\n\t*stat_chart\n\t\topposed_pair Belonging\t\n\t\t\tIndependence\n\t\tpercent prouder Brit \"Prouder\"\n\t\tpercent flecks Boris \"Flecks\"\n\n*if ((parttwogothika = false) and (parttwoseas = false)) and (spellodexhunteresschalice)\n\n\t[b]RELATIONSHIPS: DISTOPIA[/b]\n\t*stat_chart\n\t\topposed_pair Belonging\t\n\t\t\tIndependence\n\t\tpercent prouder Brit \"Prouder\"\n\t\tpercent flecks Boris \"Flecks\"\n\t\tpercent hunteress Hunteress\n\t\tpercent chalice Chalice\n\n*if (parttwoseas) and (enteredblendetg = false)\n\t\n\t[b]RELATIONSHIPS: SEAS[/b]\n\t*stat_chart\n\t\topposed_pair Belonging\t\n\t\t\tIndependence\n\t\tpercent fspears F.Spears \n\t\tpercent psavage P.Savage\n\t\tpercent kyleigh ${princese} Kyleigh\n\n*if (parttwogothika) and (enteredblendetg = false)\n\n\t[b]RELATIONSHIPS: GOTHIKA[/b]\n\t*stat_chart\n\t\topposed_pair Belonging\t\n\t\t\tIndependence\n\t\tpercent chantuse ChantuSe\n\t\tpercent vortal Vortal\n\t\tpercent thatbee Thatbee\n\t\tpercent onefourteen One-Fourteen\n\n*if enteredblendetg and (britborisreveal = false)\n\n\t[b]RELATIONSHIPS: TRAINING GROUNDS[/b]\n\t*stat_chart\n\t\topposed_pair Belonging\t\n\t\t\tIndependence\n\t\tpercent chalice Chalice\n\t\tpercent thewickedwone The Wicked Wone\n\n*if britborisreveal\n\n\t[b]RELATIONSHIPS: TRAINING GROUNDS[/b]\n\t*stat_chart\n\t\topposed_pair Belonging\t\n\t\t\tIndependence\n\t\tpercent chalice Chalice\n\t\tpercent thewickedwone The Wicked Wone\n\t\tpercent prouder Brit \"Prouder\"\n\t\tpercent flecks Boris \"Flecks\"\n\n[b]SPELLS[/b]\n*stat_chart\n\ttext potency Potency\n\topposed_pair Destructive\t\n\t\tConstructive\n\topposed_pair Unleash\n\t\tLimit\n\tpercent technology Technology\n\tpercent perception Perception\n\tpercent enhancement Enhancement\n\tpercent shades Shades\n\n*choice\n\t#The Spellodex of Babe \"${babename}\" Fortune.\n\t\t*goto officialspellodex\n\t*if (spellodextgrounds) #The Spellodex of the TRAINING GROUNDS Avatar.\n\t\t*goto avatarspellodex\n\t#Stat Explanations.\n\t\t[b]PERSONALITY[/b]\n\t\t*line_break\n\t\t[b]Becoming[/b]:\n\t\t*line_break\n\t\tSuccess Meter, Unlocks Bonuses.\n\n\t\t[b]Powerful vs. Powerless[/b]:\n\t\t*line_break\n\t\t[i]--Powerful meaning empowered and purposeful OR Powerless meaning humble and heroic.[/i]\n\t\t*line_break\n\t\t--Is power a privilege OR a burden? \n\t\t*line_break\n\t\t--Does calling feel like destiny OR like duty?\n\t\t*line_break\n\t\t--Want respect via wielding power OR enforcing justice?\n\t\t*line_break\n\t\t--Feel more like a leader OR a soldier?\n\n\t\t[b]Reckless vs. Responsible[/b]:\n\t\t*line_break\n\t\t[i]--Reckless meaning brutally honest with desires and emotions, not full of shame OR Responsible meaning fully aware of consequences, and therefore withholding.[/i]\n\t\t*line_break\n\t\t--More messy witchy OR boss bitchy?\n\t\t*line_break\n\t\t--Channel righteous anger OR sober understanding?\n\t\t*line_break\n\t\t--Want to do harm OR to protect?\n\n\t\t[b]RELATIONSHIPS[/b]\n\t\t*line_break\n\t\t[i]Individual relationships affect the outcomes of important decisions and missions.[/i]\n\n\t\t[b]Belonging vs. Independence[/b]:\n\t\t*line_break\n\t\t[i]--Ideally kept in balance at 50.[/i]\n\t\t*line_break\n\t\t--Want a chosen family OR to be free of broken families?\n\t\t*line_break\n\t\t--Belonging too high means forced into a unit and bending too much to their will. \n\t\t*line_break\n\t\t--Independence too high means too separate from a necessary unit.\n\n\t\t[b]SPELLS[/b]\n\t\t*line_break\n\t\t[b]Potency[/b]:\n\t\t*line_break\n\t\tSuccess Meter, Determines Ability to Cast Crucial Spells.\n\n\t\t[b]Destructive vs. Constructive[/b]:\n\t\t*line_break\n\t\t--Destroy to rebuild OR protect existing structures?\n\t\t*line_break\n\t\t--Break apart OR create anew?\n\n\t\t[b]Unleash vs. Limit[/b]:\n\t\t*line_break\n\t\t--Want to embrace power OR control it?\n\t\t*line_break\n\t\t--As a necessary function, letting loose OR harnessing?\n\n\t\t[b]Technology[/b]: Enhancing, tampering, destroying, malwaring technological functions.\n\t\t*line_break\n\t\t[b]Perception[/b]: Mind control, empathic manipulation, illusions, altering reality.\n\t\t*line_break\n\t\t[b]Enhancement[/b]: Boosting the powers of self, others, and energy sources (from simple strengthening to explosively destructive leveling up).\n\t\t*line_break\n\t\t[b]Shades[/b]: Wielding the entire spectrum of elements and energies.\n\t\t*line_break\n\t\t[i]Goal: focus on strengthening two of these four.[/i]\n\t\t\n\t\t*page_break\n\t\t*goto officialstatchart\n\t#Achievement Structure.\n\t\tOnce you have unlocked every Achievement, you have fully experienced every variation of [b]FORTUNE the FATED[/b]. \n\n\t\t[i]Tip:[/i] this will require multiple read-throughs.\n\n\t\t*page_break\n\t\t*goto officialstatchart\n\n*label officialspellodex\n\n[b]The Spellodex of Babe \"${babename}\" Fortune[/b]\n\nNew entries will appear as relevant subjects are encountered.\n\nPlease make a selection:\n\n*choice\n\t*if ((spellodexhunteresschalice) and (spellodexdeightparttwo = false)) #The Destructive Eight.\n\n\t\t[b]Hunteress[/b]\n\n\t\t*image hunteress.jpg center Hunteress\n\n\t\t[b]Chalice[/b]\n\n\t\t*image chalice.jpg center Chalice\n\n\t\t*if spellodexchantusevortal\n\n\t\t\t[b]ChantuSe[/b]\n\n\t\t\t*image chantuse.jpg center ChantuSe\n\n\t\t\t[b]Vortal[/b]\n\n\t\t\t*image vortal.jpg center Vortal\n\n\t\t*if spellodexsavagespears\n\t\t\t*link https://linktr.ee/paintimenti Galactic Artist Credit: Paintimenti\n\t\t\t*line_break\n\t\t\t*link https://zacharysergi.com/interactive-novels#/fortune-the-fated/ Additional Authorial Resources\n\t\t\t\n\t\t\t*page_break The Other Half\n\n\t\t\t[b]P.Savage[/b]\n\n\t\t\t*image psavage.jpg center P.Savage\n\n\t\t\t[b]F.Spears[/b]\n\n\t\t\t*image fspears.jpg center F.Spears\n\n\t\t*if spellodexwickedwone\n\n\t\t\t[b]The Wicked Wone[/b]\n\n\t\t\t*image wickedwone.jpg center The Wicked Wone\n\n\t\t*if spellodexsquimli\n\n\t\t\t[b]Squimli[/b]\n\n\t\t\t*image squimli.jpg center Squimli\n\n\t\t*link https://linktr.ee/paintimenti Galactic Artist Credit: Paintimenti\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-novels#/fortune-the-fated/ Additional Authorial Resources\n\t\t\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\n\t*if (spellodexdeightparttwo) #The Destructive Eight.\n\n\t\t[b]ChantuSe[/b]\n\n\t\t*image chantuse.jpg center ChantuSe\n\n\t\t[b]Vortal[/b]\n\n\t\t*image vortal.jpg center Vortal\n\n\t\t[b]P.Savage[/b]\n\n\t\t*image psavage.jpg center P.Savage\n\n\t\t[b]F.Spears[/b]\n\n\t\t*image fspears.jpg center F.Spears\n\n\t\t*link https://linktr.ee/paintimenti Galactic Artist Credit: Paintimenti\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-novels#/fortune-the-fated/ Additional Authorial Resources\n\t\t\t\n\t\t*page_break The Other Half\n\n\t\t[b]Chalice[/b]\n\n\t\t*image chalice.jpg center Chalice\n\n\t\t[b]The Wicked Wone[/b]\n\n\t\t*image wickedwone.jpg center The Wicked Wone\n\n\t\t[b]Hunteress[/b]\n\n\t\t*image hunteress.jpg center Hunteress\n\n\t\t[b]Squimli[/b]\n\n\t\t*image squimli.jpg center Squimli\n\n\t\t*link https://linktr.ee/paintimenti Galactic Artist Credit: Paintimenti\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-novels#/fortune-the-fated/ Additional Authorial Resources\n\t\t\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\n\n\t*selectable_if (spellodextrig) #The Constructive Eight: Trig.\n\n\t\t[b]Trig[/b]\n\n\t\t*image trig.jpg center Trig\n\n\t\t*link https://twitter.com/artingpidgeon Galactic Artist Credit: ArtingPidgeon\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-novels#/versus-the-lost-ones-book-one/ Read the Origins of Trig\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\n\t*if (spellodexpinkuju) #The Constructive Eight: Pinkuju.\n\n\t\t[b]Pinkuju[/b]\n\n\t\t*image pinkujuone.jpg center Pinkuju\n\n\t\t*image pinkujutwo.jpg center Pinkuju\n\n\t\t*link https://urmaj35ty.tumblr.com/ Galactic Artist Credit: YourMajesty\n\t\t*line_break\n\t\t*link https://www.instagram.com/birbwaifu13/ Galactic Artist Credit: Birbwaifu\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-novels#/versus-the-deathscapes-book-three/ Read More About the Rise and Return of Pinkuju\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\t\n\t*if (spellodexgloves) #The Constructive Eight: Gloves.\n\n\t\t[b]Gloves[/b]\n\t\t*line_break\n\t\t[i]As a baby, Gloves was mysteriously dropped on the rich trade planet Blende, his spine broken and rendered completely paralyzed. After being nursed in an orphanage for years, Gloves was adopted by a wealthy scientist who had retired on Blende. She believed Gloves was the product of illegal genetic experimentation, since no one could place his unique appearance or genetics with any cataloged species in the Verses Galaxy.[/i]\n\t\t\n\t\t[i]While Gloves and his adoptive mother were never able to unlock the secrets of his origins, they did cultivate his considerable aptitude for robotic science. Before reaching adulthood, Gloves developed a unique personalized hovercraft, fused to his nervous system and controlled by permanent bio-tech gloves. This hovercraft wheelship is powered by an artificial intelligence companion and is capable of transforming into nearly any form of transportation.[/i]\n\t\t\n\t\t[i]Gloves might remain physically paralyzed, but his ingenuity and fearless thirst for adventure made him one of the fastest and most respected pilots in the Verses Galaxy. Gloves dreamed of one day becoming a charter member of Blende's ultra-famous team of heroes, The Representatives, but he was first recruited to become Blende's representative on The Delegates—a highly coveted and competitive position, given Blende's powerful and resourceful population.[/i]\n\n\t\t*image gloves.jpg center Gloves\n\n\t\t*link https://twitter.com/artingpidgeon Galactic Artist Credit: ArtingPidgeon\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-novels#/versus-the-deathscapes-book-three/ Read More About the Rise and Return of Gloves\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\t\n\t*if (spellodexvenuma) #Versian Reborn: Lady Venuma.\n\n\t\t[b]Lady Venuma[/b]\n\n\t\t*image ladyvenuma.jpg center Lady Venuma\n\n\t\t*image versustwo.jpg center Lady Venuma\n\n\t\t*link https://urmaj35ty.tumblr.com/ Galactic Artist Credit: YourMajesty\n\t\t*line_break\n\t\t*link https://tagalialex.com/ Galactic Artist Credit: TagaliAlex\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-novels#/versus-the-elite-trials-book-two/ Read the Origins of Lady Venuma\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\n\t*if (spellodexmamana) #Cuttaran Versian: MamaNa.\n\n\t\t[b]MamaNa[/b]\n\n\t\t*image mamana.jpg center MamaNa\n\n\t\t*image versusthree.jpg center MamaNa\n\n\t\t*link https://urmaj35ty.tumblr.com/ Galactic Artist Credit: YourMajesty\n\t\t*line_break\n\t\t*link https://tagalialex.com/ Galactic Artist Credit: TagaliAlex\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-novels#/versus-the-deathscapes-book-three/ Read the Origins of MamaNa\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\t\n\t*if (spellodexbominatevaccus) #Abominable Versians: The Bominate & Empress Vaccus.\n\n\t\t[b]One Whose Eyes Saw & Lived To Tell[/b]\n\n\t\t*image versusone.jpg center The One Who Saw\n\n\t\t*link https://tagalialex.com/ Galactic Artist Credit: TagaliAlex\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-novels#/versus-the-lost-ones-book-one/ Read the Origins of The Bominate & Empress Vaccus\n\t\t\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\t\n\t*if (spellodexvenge) #The Fallen Fated Wone: Venge.\n\n\t\t[b]Venge[/b]\n\n\t\t*image venge.jpg center Venge\n\n\t\t[b]The Slayer Gang[/b]\n\n\t\t*image slayergang.jpg center The Slayer Gang\n\n\t\t*link https://www.instagram.com/birbwaifu13/ Galactic Artist Credit: Birbwaifu\n\t\t*line_break\n\t\t*link https://linktr.ee/paintimenti Galactic Artist Credit: Paintimenti\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-series#/demonique/ Read the Lost Story of Venge\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\t\n\t*if (spellodexgothikareps) #The Representatives: Nifty Eons, Pocket, Kid Halo.\n\n\t\t[b]Nifty Eons[/b]\n\n\t\t*image cardniftyeons.jpg center Nifty Eons \n\n\t\t*image niftyeons.jpg center Nifty Eons\n\n\t\t[b]Pocket[/b]\n\n\t\t*image cardpocket.jpg center Pocket\n\n\t\t*image pocket.jpg center Pocket\n\n\t\t*image pocketniftyeons.jpg center Pocket and Nifty Eons\n\n\t\t[b]Kid Halo[/b]\n\n\t\t*image cardkidhalo.jpg center Kid Halo\n\n\t\t*image kidhalo.jpg center Kid Halo\n\n\t\t*link https://tagalialex.com/ Galactic Artist Credit: TagaliAlex\n\n\t\t*page_break Kid Halo Case Log Entry\n\n\t\t[b]DECLASSIIFIED[/b]\n\t\t*line_break\n\t\t[b]The Representatives Case Log: Kid Halo[/i]\n\n\t\t[i]Wherever there are fairy tales, you can always expect grim tragedies. Once upon a time, one people conquered another. The Repletes overtook the native Repos of Blende, and all these years later the Repo people have never recovered. Equal on paper, deeply disadvantaged in practice. But as in all great love stories, great divides are always bridged. Repletes and Repos are both only humanoid, after all—they are drawn to one another. Forbidden love and the promise of power gained and power lost, a tale as old as time. When Repos and Repletes finally have their first interspecies children, they are called Disreps.[/i]\n\t\t\n\t\t[i]Our name is not an accident. Disdain, dislike, disembody, disappoint, discomfort, distract, disregard. Disease. It turns out this last one is what we’ll be known for. “Unnatural” as we are believed to be, as the first of us come of age, something troubling develops. It turns out when a Disrep sleeps specifically with a Replete, we can deliver a disease dubbed The Distortion. This affliction robs a Replete of their powers and their sanity, and it is only sexually transmitted via Disrep sperm. The universe does have a wicked sense of humor.[/i]\n\t\t\n\t\t[i]Pandemic protocols are invoked. Interspecies sexuality laws are written. Mandatory vasectomies are called for, because the few babies born of The Distortion aren’t really babies at all. Above all, Disreps—not just our men, but also our women, nonbinaries, and every other kind—are disdained, feared, stigmatized. It doesn’t make logical sense, but there’s not much room for rational discernment when the frenzy of terrified self-preservation enters the picture. We Disreps, all of us, are “getting what we deserve” for the mistake of being born this way. The Repletes who lie with us are damned for their “sins,” but the blame never falls on them. We Disreps are solely at fault.[/i]\n\n\t\t[i]And so the treadmill turns, like a great flat wheel, and quickly the “powerless” Repos show indifference. This is not their fight, and besides, so many of them welcome this new class that has been created under them.\n\t\tA cure for The Distortion is eventually found, laws are eventually rewritten, but the damage is done. Generations of trauma is inherited. We Disreps are marred, forevermore.[/i]\n\n\t\t[i]But we Disreps are powerful, too. More powerful by nature than our Replete mothers and fathers, it seems. Maybe even doubly powerful, once Disreps begin to have second-generation children of their own. No one likes that, not the Repletes, and especially not the still-giftless Repos. So along the way, we Disreps learn to blend—it’s in our planet’s name, after all. One can't usually tell if someone is a Disrep just by looking at them—our skin isn’t only either pastel pink or purple, like Repos. Of course, branding Disreps at birth was once legitimately discussed, and only narrowly voted down.[/i]\n\n\t\t[i]Eventually, we Disreps become a subculture. Then, a movement. By the time I come of age as a generations-deep Disrep, new things seem possible. A Disrep politician here, a Disrep Representative member there. I am emboldened. I gobble up this possibility like a meal. I start my first team, The Disassembly, and we are an unexpected sensation. I am soon invited, along with a few others cherry-picked from this first incarnation, to become a Representative. It is unprecedented, and it is controversial, and it is fraught. Still, I leave my people behind, one of the chosen ones, for grander dreams come true. I prove myself. I break barriers. Eventually, I achieve the unthinkable: I become leader of The Representatives.[/i]\n\n\t\t[i]There is love and hate, heroes and villains, triumph and tragedy, shining spotlights and overlooked shadows. No matter how much I achieve, none of it is ever really enough. I am expected to represent everyone—it’s in the team’s name, after all—but that’s impossible. Most of my original Disrep allies think I’ve left them behind. Half my people put me on the highest pedestal, the other half think I’m a sellout. Still, I keep running, always sprinting the marathon.[/i]\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\t\n\t*if (spellodexepiloguereps) #The Representatives: Full Roster.\n\n\t\t*image cardrepresentativeslogo.jpg center The Representatives\n\n\t\t*image repslineup.jpg center The Representatives\n\n\t\t*image cardcollettescratch.jpg center Collette Scratch\n\n\t\t*image cardretina.jpg center Retina\n\n\t\t*image cardniftyeons.jpg center Nifty Eons\n\n\t\t*image cardpocket.jpg center Pocket\n\n\t\t*image cardluge.jpg center Luge\n\n\t\t*image cardkidhalo.jpg center Kid Halo\n\n\t\t*image cardpearl.jpg center Pearl\n\n\t\t*link https://tagalialex.com/ Galactic Artist Credit: TagaliAlex\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\n\t*if (spellodexepiloguepearltorque) #The Representatives: Mysterious Origins.\n\n\t\t[b]Pearl[/b]\n\n\t\t*image pearl.jpg center Pearl\n\n\t\t[b]Torque[/b]\n\n\t\t*image torque.jpg center Torque\n\n\t\t*image repscover.jpg center The Representatives\n\n\t\t*image repspageone.jpg center The Representatives\n\n\t\t*image repspagetwo.jpg center The Representatives\n\n\t\t*link https://tagalialex.com/ Galactic Artist Credit: TagaliAlex\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-series#/the-representatives/ Continue Reading the MOST UPDATED Recent Case Log of The Representatives\n\t\t\n\t\t[b]Sergiversian Authorial Addendum:[/b] \n\t\t*line_break\n\t\t--[i]The Destructive & Constructive Eight were Dispatched back into the Verses Galaxy simultaneously.[/i]\n\t\t*line_break\n\t\t--[i]The arrival of Gloves in The Representatives Case Log Issue #8 coincides with the arrival of the Destructive Eight on Distopia, two days before the TRAINING GROUNDS S.14 Opening Ceremony.[/i]\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\n\t*if (spellodexspanbook) #The Spanbook.\n\n\t\t[b]The Spanbook[/b]\n\n\t\t*image sts.jpg center Span The Sergiverses\n\n\t\t*link https://urmaj35ty.tumblr.com/ Galactic Artist Credit: YourMajesty\n\t\t*line_break\n\t\t*link https://zacharysergi.com/interactive-series#/span-the-sergiverses/ Read Span The Sergiverses\n\n\t\t[b]Sergiversian Authorial Addendum:[/b] \n\t\t*line_break\n\t\t[i]Head here to gain access to the full Spanbook, with a full historical timeline of relevant Verses Galaxy events (updated regularly).[/i]\n\n\t\t*page_break Return to Spellodex\n\t\t*goto officialspellodex\t\t\n\t#Return to the Stats Screen.\n\t\t*goto officialstatchart\n\n\n*label avatarspellodex\n\n[b]The Spellodex of ${babename}'s TRAINING GROUNDS Avatar[/b]\n\nNew entries will appear as relevant subjects are encountered.\n\nPlease make a selection:\n\n*choice\n\t#Season Competition Structure.\n\n\t\t[b]TRAINING GROUNDS: SEASON STRUCTURE[/b]\n\n\t\t[i]10 Pairs Enter Competition, Split into 2 Squads of 10[/i]\n\t\t*line_break\n\t\t[b]SQUAD ROUNDS:[/b] Squads Compete in Challenges. Winning Team Safe, Losing Team Votes Out 1 Pair\n\t\t*line_break\n\t\t[b]Round 1:[/b] Pitch Personas & Motivation (25%), Pair vs. Pair Battles (75%)\n\t\t*line_break\n\t\t[b]Round 2:[/b] The Great Relay Race\n\t\t*line_break\n\t\t[b]Round 3:[/b] Hover-Platform Super Melee *Highest Performing Finalist on Losing Squad Casts Sole Elimination Vote\n\t\t*line_break\n\t\t[b]Round 4:[/b] Villain/Rescue Mission Simulation\n\n\t\t[i]Remaining 6 Pairs Combine into One Squad of 12[/i]\n\t\t*line_break\n\t\t[b]FINALIST ROUNDS:[/b] Finalists Compete Individually in Challenges. Loser Eliminated, Winner Safe as 1 Finalist then Voted Out\n\t\t*line_break\n\t\t[i]Note: Finalist Cumulative Challenge Scores Now Kept, Factor in Round 7 Seeding and Round 8 Elimination/Safety[/i]\n\t\t*line_break\n\t\t[b]Round 5:[/b] Round-Robin Battle Selections\n\t\t*line_break\n\t\t[b]Round 6:[/b] Villain/Rescue Mission Live\n\t\t*line_break\n\t\t[b]Round 7:[/b] Seeded Tournament of 8 *Tournament-Winning Finalist Casts Sole Elimination Vote\n\t\t*line_break\n\t\t[b]Round 8:[/b] Obstacle Course *Elimination/Safety Determined by Cumulative Score\n\n\t\t[i]4 Finalists Enter The Finale[/i]\n\t\t*line_break\n\t\t[b]TWO-PART FINALE:[/b] Finalists Test Membership in The Representatives\n\t\t*line_break\n\t\t[b]Round 9:[/b] Participate in a Live Mission with The Representatives, Who Vote To Eliminate 1 Finalist\n\t\t*line_break\n\t\t[b]Round 10:[/b] 3 Finalists Interview Ceremony with The Representatives, Who Select 2 Winners to Join Next Roster\n\t\t\n\t\t*page_break Return to Avatar Spellodex\n\t\t*goto avatarspellodex\n\t*selectable_if (spellodexyoursquad) #Contestant Pairs: My Squad.\n\n\t\t*label spellodexpairsmenu\n\n\t\t[b]Select A Pair:[/b]\n\n\t\t*choice\n\t\t\t#Lord Sheer & ShadeStreak.\n\n\t\t\t\t[b]LORD SHEER[/b]\n\t\t\t\t*line_break\n\t\t\t\t[b]Background:[/b] Home planet origins unknown. Once a loyal lieutenant in the foulest brigade there ever was, Lord Sheer broke off to create his own following. However, after a self-professed change of heart (and rumors of being Reborn from planet Versus), he is claiming to seek heroic redemption—and some deeper truth he refuses to name.\n\t\t\t\t*line_break\n\t\t\t\t[b]Powers:[/b] Intense white shade power; rocket propulsion, force blasts, storm fists.\n\t\t\t\t*line_break\n\t\t\t\t[b]Weapons:[/b] None.\n\t\t\t\t*line_break\n\t\t\t\t[b]Classification:[/b] Galactic-Level Agent, Near Omnipotent.\n\n\t\t\t\t[b]SHADESTREAK[/b]\n\t\t\t\t*line_break\n\t\t\t\t[b]Background:[/b] Born from a crumbling home planet now deemed unfit for life, ShadeStreak was born of trauma and neglect. With an ambitious streak as wide as his mean streak, he has vowed to become the most powerful and respected being in the Verses Galaxy. Winning TRAINING GROUNDS and rising to lead The Representatives are just two more items to check off his List of Ascension.   \n\t\t\t\t*line_break\n\t\t\t\t[b]Powers:[/b] Intense red shade power; solar absorption and redirection.\n\t\t\t\t*line_break\n\t\t\t\t[b]Weapons:[/b] Solar-storing armor.\n\t\t\t\t*line_break\n\t\t\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\t\t\t*goto spellodexpairsmenu\n\t\t\t#Summonice & Blue Sliver.\n\n\t\t\t\t[b]SUMMONICE[/b]\n\t\t\t\t*line_break\n\t\t\t\t[b]Background:[/b] A Disrep of Blende born with the ability to summon Accursique frost demonsters. After taking many years to study abroad and master zir powers, ze has returned to Blende with a hidden agenda—one that includes joining The Representatives to stave off a major incoming threat.\n\t\t\t\t*line_break\n\t\t\t\t[b]Powers:[/b] Summons Accursique frost demonsters.\n\t\t\t\t*line_break\n\t\t\t\t[b]Weapons:[/b] Summoning Staff, as a necessary focal point.\n\t\t\t\t*line_break\n\t\t\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\t\t\t[b]BLUE SLIVER[/b]\n\t\t\t\t*line_break\n\t\t\t\t[b]Background:[/b] A Disrep of Blende who has always dreamed of mainstream heroic success and who aims to bring a specific mission to life: expanding The Representatives into a vast-reaching network of specialized rosters, much like the Delegates.\n\t\t\t\t*line_break\n\t\t\t\t[b]Powers:[/b] Lunar absorption and redirection.\n\t\t\t\t*line_break\n\t\t\t\t[b]Weapons:[/b] Lunar-storing gauntlets and helmet.\n\t\t\t\t*line_break\n\t\t\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\t\t\t*goto spellodexpairsmenu\n\t\t\t#Clast & Fracture.\n\n\t\t\t\t[b]CLAST[/b]\n\t\t\t\t*line_break\n\t\t\t\t[b]Background:[/b] Unknown origins. A galaxy-spanning agent who has vowed fidelity to serve their beloved, the new high aspect of the pink shade: Tori Reece.\n\t\t\t\t*line_break\n\t\t\t\t[b]Powers:[/b] Purple/Pink shade scholar of royalty, politics, and coercion.\n\t\t\t\t*line_break\n\t\t\t\t[b]Weapons:[/b] A full suite of knightly weapons.\n\t\t\t\t*line_break\n\t\t\t\t[b]Classification:[/b] Local-Level Agent, Low Powered, Highly Skilled.\n\n\t\t\t\t[b]FRACTURE[/b]\n\t\t\t\t*line_break\n\t\t\t\t[b]Background:[/b] A Disrep of Blende who has a history of political dissidence and Disrep freedom fighting. Claims to be shedding light on a brewing Disrep underground movement.\n\t\t\t\t*line_break\n\t\t\t\t[b]Powers:[/b] Strength, agility, and razor-sharp energy-absorbing claws.\n\t\t\t\t*line_break\n\t\t\t\t[b]Weapons:[/b] None.\n\t\t\t\t*line_break\n\t\t\t\t[b]Classification:[/b] Local-Level Agent, Low Powered, Highly Skilled.\n\n\t\t\t\t*goto spellodexpairsmenu\n\t\t\t#Scabbard & Panic Attack.\n\n\t\t\t\t[b]SCABBARD[/b]\n\t\t\t\t*line_break\n\t\t\t\t[b]Background:[/b] A Disrep of Blende and member of the infamous Arcana Four, one of the few Disreps to leave Blende and Distopia behind to seek additional power in the Galaxy beyond. She claims to have returned to Blende to usher in a new era of peace and prosperity, also claiming to have been Reborn from Versus.\n\t\t\t\t*line_break\n\t\t\t\t[b]Powers:[/b] Disrep abilities unknown. Cosmic TarotSword wind-based abilities.\n\t\t\t\t*line_break\n\t\t\t\t[b]Weapons:[/b] Wields the TarotSword.\n\t\t\t\t*line_break\n\t\t\t\t[b]Classification:[/b] Galactic-Level Agent, Near Omnipotent.\n\n\t\t\t\t[b]PANIC ATTACK[/b]\n\t\t\t\t*line_break\n\t\t\t\t[b]Background:[/b] A Disrep of Blende who has actually been a long-running infamous adversary of The Representatives, because of an anxiety-power that builds up into panic attacks, which are only alleviated by turning into rage-monster form. She has tried to tame wild power and find a more productive outlet by joining The Representatives.\n\t\t\t\t*line_break\n\t\t\t\t[b]Powers:[/b] Anxiety-attack rage-monster form.\n\t\t\t\t*line_break\n\t\t\t\t[b]Weapons:[/b] When not transformed, exoskeleton to channel anxiety in smaller power doses.\n\t\t\t\t*line_break\n\t\t\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\t\t\t*goto spellodexpairsmenu\n\t\t\t#My Partner, Waverly Tide.\n\n\t\t\t\t[b]WAVERLY TIDE[/b]\n\t\t\t\t*line_break\n\t\t\t\t[b]Background:[/b] Unknown origins. A galaxy-spanning agent who claims to operate under the guidance of a tidal deity. Hir latest mandate is to win TRAINING GROUNDS and serve the Galaxy as a member of The Representatives.\n\t\t\t\t*line_break\n\t\t\t\t[b]Powers:[/b] Telepathic vibes that flow like water.\n\t\t\t\t*line_break\n\t\t\t\t[b]Weapons:[/b] Tele-drop gemstones and The Staff of Cups.\n\t\t\t\t*line_break\n\t\t\t\t[b]Classification:[/b] Local-Level Agent, Low Powered, Highly Skilled.\n\n\t\t\t\t*goto spellodexpairsmenu\n\t\t\t#Return to Avatar Spellodex\n\t\t\t\t*goto avatarspellodex\n\t#Return to the Stats Screen.\n\t\t*goto officialstatchart\n", "choicescript_upgrade": "*label start\n*check_purchase adfree questioning database boost\n\n*if choice_purchased_adfree = false\n  [b]Rest of the Game[/b]\n  \n  Unlock the rest of the game, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2023-01-26 $4.99 $2.99 start\n\n*if choice_purchased_boost = false\n  [b]Representatives Declassified[/b]\n\n  Read the ultra-classified Case Log of one of the galaxy's most successful heroic team. Declassify 15K words worth of bonus story and learn the state of the infamous assemblage you seek to impress, while also gaining the chance to bonus-boost your Character Stats.\n\n  *purchase boost $1.99 start\n\n*if choice_purchased_questioning = false\n  [b]Questhing Bonding[/b]\n\n  Bond to your unique Questhing! Not only will you customize the name and appearance of this rare pet, your Questhing will provide strategy tips and boost the necessary Stats at key points, while accompanying you on all your adventures across worlds.\n\n  *purchase questioning $0.99 start\n\n*if choice_purchased_database = false\n  [b]Spanbook Bonding[/b]\n\n  Bond to your unique Spanbook! Not only will you customize the name and appearance of the book's avatar, it will provide strategy tips and boost the necessary Stats at key points, while also providing rare historical timeline readouts about the Verses Galaxy.\n\n  *purchase database $0.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Rest of the Game[/b]\n  \n  You've paid to unlock the rest of the game.\n\n*if choice_purchased_boost\n  [b]Representatives Declassified[/b]\n\n  You purchased permanet access to the Case Log.\n\n*if choice_purchased_questioning\n  [b]Questhing Bonding[/b]\n\n  You bonded to your unique Questhing!\n\n*if choice_purchased_database\n  [b]Spanbook Bonding[/b]\n\n  You bonded to your unique Spanbook!\n", "ending": "*page_break End\nWe hope you've enjoyed playing [i]FORTUNE the FATED.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "ftf_epilogue": "*comment é\n\n*image ftfparttwobanner.jpg center Fortune the Fated\n\n[b]EPILOGUE[/b]\n*line_break\nEnter The Grounds of Training\n\n*page_break CHAPTER I\n\n[b]CHAPTER I[/b]\n*line_break\nYou step out of the bejeweled portal and can't help feeling sick all over again. \n*if parttwogothika\n\tNot just from the disorienting and jagged experience…\n\n\tBut also now knowing the hordes of slain lives that it must have taken for Vortal to fuse the Portal Jewel you just used.\n\n\tYou wish there was another way…\n\n\tBut that just seems to remain the refrain of these dire days.\n\n\t*page_break\n*if parttwoseas\n\tYou're not sure you'll ever get used to that disorienting and jagged experience.\n\nAs the portal buckles and crackles like popping joints behind you, a different wave of nausea presses through you. Breathing in the air on this planet, you recognize its signature smell in an instant.\n\nYou have indeed arrived back on Blende, the dazzling home world you once left as a reviled refugee, fleeing to Distopia and now beyond. \n\nAnd your next task is to prove yourself as one of its mightiest heroes in its highest rated and revered competition?\n\n*fake_choice\n\t#I don't know whether to laugh or cry.\n\t#I cannot believe I'm back here. I vowed to myself I'd never return.\n\t#I always said I'd return to Blende as a being of great galactic importance. That's certainly true now.\n\t#I can't let being back on Blende distract me from what really matters. The mission.\n\n\"Ah, the prodigal spellcaster returns.\"\n\nYou try to absorb your new surroundings and are first met with the sight of Chalice standing in some makeshift living room. Really, you meet her in more of a bunker, with low ceilings and banks of advanced-looking computer systems everywhere. \n\nYou spot The Wicked Wone at one such databank, their organ-trident hooked into the computing ports via vein-wires.\n\n[i]Ah, do forgive the state you've found us in, most fortunate one,[/i] The Wicked Wone projects into your mind in their elegantly mannered voice. [i]We've been busy as bussits preparing for your arrival. So I'm afraid we've lacked adequate time to brighten up this drearily dingy safe house.[/i]\n\n*set enteredblendetg true\n*page_break\n\n\"Though you are right on time, so to speak,\" Chalice picks up. \n\nTurning your focus to her, you realize Chalice is wearing some kind of intricately wired bodysuit over her usual clothes. \n\n\"Dare we ask whether you succeeded in your chosen task?\" she asks. \"And why you've arrived here…all alone?\"\n\nYou take a deep breath, deciding quickly how much Chalice and The Wicked Wone really need to know about the first fraught leg of your galactic mission.\n\n*page_break\n\n*if parttwoseas\n\t*if seasobtainsource\n\t\t\"I have the power source safe and guarded,\" you answer as simply as possible. \"While I did that, F.Spears and P.Savage got wrapped up in their own drama surrounding the Nexus.\"\n\n\t\tHearing you out, Chalice and The Wicked Wone exchange a loaded glance. \n\n\t\tThen they turn back to you, processing quickly. Chalice is the first to speak.\n\n\t\t\"Those two never could resist that particular obsession. Regardless, you've done well.\"\n\n\t\t*page_break\n\n\t\tYou didn't expect an earnest compliment like this from Chalice, so you're not sure how to respond in your currently disoriented state. \n\n\t\tYou simply nod. \n\n\t\tIf only these two knew exactly how [i]well[/i] you did back on The Isle of QueS…\n\t\t*goto strangecompliment\n\t*else\n\t\t\"Obtaining the power source proved impossible,\" you begin as simply as you can manage. \"But we all must have received the same update that ChantuSe and Vortal were able to acquire the location of the Compuspell source code. It might not be as good as locating Binaria herself, but it should still be enough to create the Binuman army we need. \n\n\t\t\"So we know our contingency mission now: power me up as much as possible, then find the ship that Hunteress and Squimli currently search for. That vessel should be capable of carrying us to the Compuspell's secure location. Then I just need to be powerful enough to cast the spell myself. \n\n\t\t\"And speaking of doing things myself, F.Spears and P.Savage got…wrapped up in their own drama surrounding the Nexus.\"\n\n\t\tHearing you out, Chalice and The Wicked Wone exchange a glance, loaded with some mix of disappointment and determination. \n\n\t\t*page_break\n\n\t\tThen they both turn back to you, processing quickly.\n\n\t\t\"Those two never could resist that particular obsession,\" Chalice replies. \"Regardless, we must carry on.\"\n\t\t*goto strangecompliment\n*else\n\t*if gothikaobtainlocation\n\t\t\"It turns out Binaria wasn't hiding out on Gothika, but I did find out where she [i]is[/i] hiding,\" you answer, trying to remain as straightforward as possible. \"We'll still need a special ship to reach her hiding spot, like the kind Hunteress and Squimli already search for. So the next steps of the mission remain the same. \n\n\t\t\"Oh and while I did that, Vortal got busy becoming a galactic fugitive. And ChantuSe insisted on chasing him down.\"\n\n\t\tHearing you out, Chalice and The Wicked Wone exchange a loaded glance. \n\n\t\tThen they turn back to you, processing quickly. Chalice is the first to speak.\n\n\t\t*page_break\n\n\t\t\"Those two never could seem to get out of their own ways. Regardless, you've done well.\"\n\n\t\tYou didn't expect an earnest compliment like this from Chalice, so you're not sure how to respond in your currently disoriented state. You simply nod. \n\n\t\tIf only these two knew exactly how [i]well[/i] you did back on Gothika…\n\t\t*goto strangecompliment\n\t*else\n\t\t\"Locating Binaria proved impossible,\" you begin as simply as possible. \"However, I was able to acquire the next best thing: the location of the Compuspell source code to create Binumanity. We'll need a special ship to reach its hiding spot. It might not be as good as locating Binaria herself, but it should still be enough to create the Binuman army we need. \n\n\t\t\"So we know our contingency mission now: power me up as much as possible, then find the ship that Hunteress and Squimli currently search for. That vessel should be capable of carrying us to the Compuspell's secure location. Then I just need to be powerful enough to cast the spell myself. \n\n\t\t\"And speaking of doing things myself, Vortal got busy becoming a galactic fugitive. And ChantuSe insisted on chasing him down.\"\n\n\t\tHearing you out, Chalice and The Wicked Wone exchange a glance, loaded with some mix of disappointment and determination. \n\n\t\t*page_break\n\n\t\tThen they both turn back to you, processing quickly.\n\n\t\t\"Those two never could resist that particular obsession,\" Chalice replies. \"Regardless, we must carry on.\"\n\t\t*goto strangecompliment\n\n*label strangecompliment\n\nAs this all settles, you have one spare moment to process your first mission experience. Doing so, you can't help but feel…\n\n*fake_choice\n\t#Proud.\n\t#Conflicted.\n\t#Ashamed.\n\t#Disappointed.\n\t#Empowered.\n\n[i]I'm afraid we do not currently have the time to luxuriate in hearing the gloriously gory details of your adventures,[/i] The Wicked Wone follows up, interrupting your emotional moment.\n\n[i]The opening ceremony of TRAINING GROUNDS is about to commence. We were going to enter without you, but now that you're indeed present and accounted for, you may enter yourself. Unless you do require a rest?[/i]\n\nThe idea of sitting quietly with your thoughts is definitely not terribly appealing at the moment. You shake your head.\n\n\"Let's go,\" you reply. \"What do I need to know?\"\n\nThe Wicked Wone's lips curl into a delighted smile, hearing your response. But Chalice simply steps forward toward you, remaining all business.\n\n*page_break\n\n\"You know I'm a fellow Blende native,\" Chalice tags in, with a hint of disgust in her voice. \"These days no one within a twenty-solar-system radius can grow up without being aware of TRAINING GROUNDS, the televised competition to win a roster spot on The Representatives. \n\n\"However, we've learned there is a galactic blip hiding in plain sight within this competition—one only very privileged few ever get to learn. Luckily, we Destructive Eight fit the bill.\n\n\"Apparently, if you do the slim-to-impossible and win a season of TRAINING GROUNDS, you are temporarily transported to a rare pocket dimension where you can ask one galactic-level question that must be answered—kind of like rubbing an ancient genie lamp,\" Chalice explains, oddly bemused. \n\n\"It's not clear if this is a galactic consonance or just some ancient djinn-thing attaching itself to modern trends, but either way, you forget the answer if you ever repeat it out loud.\"\n\n*page_break\n\n\"So obviously, we're here to make sure you win and ask the one question we still need an answer to.\n*if seasobtainsource\n\t[i]Where do we find the rare ship we need to equip with this ancient power source?[/i]\n*if gothikaobtainlocation\n\t[i]Where do we find the rare ship we need to carry us to Binaria's guarded location?[/i]\n*if (seasfailquest) or (gothikafailinvestigation)\n\t[i]Where do we find the rare ship we need to carry us to the Compuspell's guarded location?[/i]\nApparently, Hunteress and Squimli have been having a hellishly difficult time trying to track it down.\"\n\nHearing this, it sounds simple enough. \n\nExcept you did indeed grow up watching TRAINING GROUNDS, just like everyone else. Getting selected to compete is a one-in-a-billion shot. \n\nHaving what it takes to survive round after round of this cutthroat gauntlet is…\n\nEven less likely.\n\n*page_break\n\n\"Short of winning, there's no better place for you to build up your spells skills as fast as we need before the harmonic convergence,\" Chalice continues. \"And we've rigged up a rather ingenious way for you to do that, if I do say so myself.\"\n\n[i]The official arrival taping for this season of TRAINING GROUNDS actually started yesterday,[/i] The Wicked Wone picks up. [i]But that's absolutely fine, seeing as we already have two slots in the competition filled. That's what all this virtual hardware and organic software is for.[/i]\n\nThe Wicked Wone gestures around the room, their dark eyes lighting up as they land on four monitors in the corner. Two of these screens display a surveillance camera view of a couple figures standing still in the wings of a backstage area. \n\nThe other two screens display a point-of-view fish-eye lens presumably from these figures, currently gazing out at the darkened stage. \n\n*page_break\n\n[i]This mission has been in the works and properly prepared for quite some time by now. To make an exceedingly long story short, we have primed two remotely controlled automaton drone avatars that have survived all the preliminary screenings to make it into the Final 20 of this season of TRAINING GROUNDS. \n\n[i]These avatars are currently running in autopilot basic-interaction/function mode, but we will be able to control them via virtual reality simulators without ever setting foot outside this underground safe house.[/i]\n\n\"The Wicked Wone and I have gotten the avatars through the casting and pre-competition rounds by playing the 'mysterious one' card as often as possible,\" Chalice explains. \"Of course, we've been helped along by some particularly deep and need-to-know Reborn connections. It always helps to know the right puppets, when you know what strings need pulling. \n\n\"But I'm afraid that tactic has taken us as far as we can go. From here on out, at the start of the competition in earnest, we'll actually have to make the cuts on our own.\"\n\nChalice looks particularly disgusted to have to deliver this news, but then she finds her excitement again. \"Lucky for us, competing and conniving and surviving are our unique specialties.\"\n\n*page_break\n\n[i]One of us will play as your partner in the competition. We have established this secondary automaton as a Disrep with telepathic and empathic abilities, which matches quite nicely with our overlapping power profiles,[/i] The Wicked Wone explains. [i]We took the liberty of leaving your own drone as shrouded in mystery as possible, so that you can customize your avatar as you see fit in the competition.[/i]\n\n\"Oh, and you'll be physically connected via The Wicked Wone's organic exoskeletal deitechnology,\" Chalice picks up. \"So you'll be able to experience the physical strengthening firsthand, despite operating remotely. Downright diabolical, no?\"\n\n[i]I must say, even as a galactic Gode, it is quite nice to operate with the universe on our side,[/i] The Wicked Wone practically sings, another signature smile curling across their lips.\n\nAbsorbing this information, you try to decide if you feel quite as delighted. This prospect sounds both incredibly cool and incredibly eerie. It also is another opportunity to set some intentions that will drive your actions within this next TRAINING GROUNDS chapter.\n\n*choice\n\t#I wish I could compete as my actual self, to show everyone on this planet and beyond exactly what I'm made of. [i](Gain Powerful, Reckless)[/i]\n\t\t*set powerful %+30\n\t\t*set reckless %+30\n\n\t\tHowever, you suppose that being free of personal consequences, you'll actually be able to be as fully powerful and reckless as your heart desires.\n\t\t*goto tgsuitup\n\t#With my identity completely masked, I'll actually get to let completely loose. [i](Gain Powerful, Responsible)[/i]\n\t\t*set powerful %+30\n\t\t*set reckless %-30\n\n\t\tBeing free of personal consequences, you'll actually be able to be as fully powerful as your heart desires, while still remaining responsible.\n\t\t*goto tgsuitup\n\t#The details don't matter. All that matters is winning. [i](Gain Powerless, Reckless)[/i]\n\t\t*set powerful %-30\n\t\t*set reckless %+30\n\n\t\tYou've been summoned here because you have an all-important job to do. Now freed of personal consequences, you have free rein to act as recklessly as you need to ensure victory.\n\t\t*goto tgsuitup\n\t#I actually love the idea of entering this competitive game of power and politics as someone else. [i](Gain Powerless, Responsible)[/i]\t\n\t\t*set powerful %-30\n\t\t*set reckless %-30\n\n\t\tFor once, this obligatory duty might actually give you the runway to let loose and have some fun, despite being summoned and responsible. It's kind of the best of both worlds.\n\t\t*goto tgsuitup\n\n*label tgsuitup\n\nAnd whether you'd choose it or not, this will be a chance to build a new persona in a blank slate. Not to mention a chance to channel your spells skills to mimic a natural power set in whatever ways you wish. Both to strengthen your abilities and your chances at winning. \n\nReally, it's like you get to build your very own video game avatar—but actually in real life. \n\nWhatever else is happening, you understand Chalice and The Wicked Wone's self-satisfaction. \n\nThat is pretty flirping cool.\n\n*page_break\n\n[i]The competition's opening ceremony is quite literally about to start,[/i] The Wicked Wone continues. [i]So we need to get you suited up like Chalice here, posthaste.[/i]\n\n\"While my especially Wicked Wone rigs you up, there are two things you should know,\" Chalice picks up. \"This tech is all pretty cutting-edge, but that also means it's as glitchy as it is witchy. The bodysuit and headset will make it so the avatar mimics your motion and voice, but the experience can feel a bit like a simulation on our end. It dips in and out, aggregating sounds and visuals with informational inputs. \n\n\"It's a bit hard to describe, other than that it'll feel a bit like being in a video game? I don't know, you'll have to tell me what you think when we reach our first break.\n\n\"Regardless, you have to remember that, to everyone else, this will be real life. The avatar has to feel real to do its job. We've initially played your avatar's personality as a bit quiet and spacey, so you'll have some breathing room. The Wicked Wone will be able to watch everything from the monitors and my avatar will be your partner in the competition, so you'll have lots of support. But still, you're going to have to adapt pretty damn fast.\"\n\n*page_break\n\n\"Good thing adapting fast is my specialty,\" you reply. \"And I'm quite used to forcing the unreal to become real.\"\n\nSpeaking this aloud, that familiar question replays in your mind: [i]You break things, or maybe you put them back together?[/i] You suppose this will be yet another sterling opportunity to further solidify the answer to this question.\n\nNot wasting another moment, The Wicked Wone approaches you next with an ornately complicated virtual cybernetic bodysuit. Your eyes then settle on devices you've only read about in your vast studies: ancient Wone magical conduits and meatsuit organ harnesses and telepathic telescopics, oh my.\n\nSlipping into this invaluable suit, you can only think one thing…\n\nStepping into the shoes of someone else for this next adventure, you might actually get infinitely closer to defining who you are once and for all.\n\n*page_break INSIDE THE SIMULATION\n\n[b]CHAPTER II[/b]\n*line_break\nYou blink your eyes inside the snug virtual reality helmet, and ahead of you, your avatar blinks a beat behind sync on a screen. You're seeing through its eyes, but on a kind of funneled movie projection canvas. Beside this projection screen you see all kinds of statistical readouts. \n\nYou feel queasy once again. Existing in your own body and projected virtually into this meta-avatar body is definitely going to take some getting used to.\n\n[i]Most fortunate one, I will try not to interrupt you too often, I know it is jarring in that space,[/i] The Wicked Wone mind-speaks inside your helmet. \n\n[i]Your avatar will react to your movements, which is why you and Chalice are in separate, large rooms with padded walls. The avatar's senses are also plugged into yours via the bodysuit, so you'll feel what it feels.[/i]\n\n*page_break\n\n[i]As for the readouts beside your view-screen, a few things of note. First, there's a private chat with Chalice connected to her own avatar simulation-connection. Second, a biometric scan of the avatar's health and power-channeling aptitude.[/i] \n\n[i]And…ah. That final informational screen appears to be syncing with some mental catalogue you…rather charmingly refer to as the \"Spellodex.\" You can access those readouts in private-mode with direct mental commands at any time. Any questions?[/i]\n\nYou have about a thousand questions, but you figure the best way to adjust to operating this \"simuconnection\" avatar is to just dive into it headfirst.\n\n[i]I'll let you know,[/i] you mental-command back at The Wicked Wone. \n\nThen you direct your attention fully to the view-screen.\n\n*page_break\n\nThe lights are dimmed as your avatar waits backstage. It's hard to see much, plus you still feel a bit like you're walking underwater in a scuba suit. \n\nSo you shift your focus back to the readouts while your Spellodex finishes syncing.\n\n--[b]TRAINING GROUNDS now has two seasons every year.[/b]\n*line_break\n--[b]You are about to enter the January season. Pre-taped over the course of ten days, it airs fully edited weekly in the following months.[/b]\n*line_break\n--[b]This season features pairs, and its two winners typically join The Representatives active duty in May.[/b]\n\n[b]Addendum:[/b] \n*line_break\n--[b]The second September season runs for months and features weekly live episodes voted on by the public.[/b]\n*line_break\n--[b]It also features individual contestants, and its sole winner typically joins The Representatives active duty in January, before the next season begins.[/b]\n\n*page_break\n*set spellodexepiloguereps true\n\nReading this, you realize The Representatives must have just inducted its latest TRAINING GROUNDS winning member. \n\nAnd you also realize this particular readout screen must be responding to events in real time, because through the view-screen you suddenly see the lights on the stage beyond light up. \n\nDozens of cameras then roll and rotate to capture none other than… \n\nThe Representatives themselves, walking out from the other backstage wing.\n\n*page_break\n*set spellodexepiloguereps true\n\nAs you take in the sight of their bright costumes and alien forms, your Spellodex finishes syncing—and pings with a new entry, now saved and available in your Stats screen simultaneously. \n\nHowever, growing up on Blende, you recognize the most famous members instantly. You've just never seen them \"in person\" like this before. \n\nDespite the many complicated layers at play here, you still get a bit of a thrill, being this close to such famous legends—and potential legends in the making.\n\n*label seeingrepsloop\n\nYou decide to focus on…\n\n*choice\n\t#Founding members Collette Scratch and Retina.\n\t\tCollette Scratch and Retina appear married as ever in their matching blue-and-white costumes.\n\n\t\tThough you do note an air of unusual…distance between this usually inseparable pair.\n\t\t*goto seeingrepsloop\n\t#Another infamous pair, Nifty Eons and Pocket. \n\t\tNifty Eons and Pocket are reputable refugees from the Nagoll Rim.\n\n\t\t*if parttwogothika\n\t\t\tYou have so many questions for both of them, especially after all you learned about Cuttarans and Binarians back on Gothika.\n\n\t\t\tAnd, of course, given your ultimate Binuman-creation mission.\n\t\t*if seasfailquest\n\t\t\tYou'd love to talk to Pocket especially as a Binarian android, given your newly pivoted Binuman-creation mission.\n\t\t*goto seeingrepsloop\n\t#Newer members Luge and Kid Halo.\n\t\tYou start by spotting Luge, a famous athlete and prince of the Blende Replete royal family. \n\n\t\tOf course you then recognize Kid Halo, the very first Disrep leader of The Representatives. You'd love to have a conversation with him, for about a million reasons.\n\t\t*goto seeingrepsloop\n\t#A new member I don't actually recognize, Pearl Bellamy.\n\t\tThis newest member must have just won the last season of TRAINING GROUNDS.\n\n\t\tYou feel oddly drawn to Pearl…especially once you glean that her powers also seem to encompass an \"impossible\" mastery of the entire shades spectrum.\n\t\t*goto seeingrepsloop\n\t#I'm finished eyeing these Representatives.\n\t\t*goto morerepsrollout\n\n*label morerepsrollout\n\nYou focus on Pearl another few seconds. Apparently you're not the only one who has accessed unprecedented amounts of prowess over the shades spectrum. \n\nYou could probably learn a ton speaking to Pearl about her shades mastery—and how you're both treated, as a result. Not to mention that Pearl is a Blende Repo, so she understands some part of what social oppression is like on this complicated planet. \n\nYou also can't help but wonder if you and this young auto-spellcaster Pearl might have even more in common—something that explains your shade-shifting magical roots? Even if Pearl [i]does[/i] only possess a fraction of your own power, since the shades only account for one-fourth of your own full spellcasting range.\n\nIn this moment, your intentions suddenly crystallize. Obviously you need to win TRAINING GROUNDS for grand galactic reasons, but you've also just isolated lots of personal reasons to gain access to more personal conversations with The Representatives. And you've watched enough seasons to know that will only happen if you progress deep into the final rounds of the competition.\n\n*page_break\n*set spellodexgloves true\n*achieve encountergloves\n\nThat's when you realize there are actually [i]nine[/i] Representatives on stage, instead of the usual \"magic rule\" of seven members. You don't immediately recognize the last two on this expanded roster.\n\nSo you open your Spellodex to first identify Gloves, whom you immediately remember as the former official Delegate for Blende. Reading his entry, you add yet another reason to gain access to The Representatives…\n\nBecause Gloves is yet another Versian Reborn among the Constructive Eight. Not to mention that he also appears to be another android-enhanced organic being.\n\nYou and Gloves would probably have endless things to discuss, given the events of your own past couple days. You assume Gloves was added to the current Representatives roster as part of his Reborn mandate, since all the Constructive Eight you've encountered seem to be spreading through the Verses Galaxy to prepare various war defenses. \n\n*page_break\n\nYou then shift your scope-eyes to to the final new member, who is dressed head to toe in shades of purple. \n\nYou don't recognize her at all, so you first wonder how she came to be a member. \n\nAs you do, you receive an avatar notification for something entirely unexpected. In order to learn the origins of Gloves, Pearl, and this new mystery member, you have been granted access to…\n\nThe most recent case logs of The Representatives—which are usually very highly classified.\n\n*page_break\n\nYou're not sure how this could be possible, but leave it to Chalice and The Wicked Wone to somehow gain access to these classified files as part of your debriefing process. \n\nYou've always wanted to read more than the bits of the case log that are occasionally declassified, especially ever since Kid Halo became the team's very first Disrep leader. \n\nAs it happens, The Representatives on stage have begun giving some standard introductory speeches. Which means you [i]do[/i] have some time to read and catch yourself up.\n\n*comment NEEDS IAP CODING, $1.99 for Yes (first option)\n*label tick\n*check_purchase boost\n*choice\n\t#Unlock this declassified case log to learn the origins of Gloves, Pearl, and this new mystery member. [i](Opportunity to Boost Stats)[/i]@{choice_purchased_boost | [i](Requires In-App Purchase)[/i]}\n\t\t*check_purchase boost\n\t\t*if choice_purchased_boost\n\t\t\t*label boost_purchased\n\t\t\t*set unlockedrepscaselog true\n\t\t\t*achieve encounterreps\n\t\t\t*goto repslogreadingtime\n\t\t*else\n\t\t\t[b]Representatives Declassified[/b]\n\n\t\t\tRead the ultra-classified Case Log of one of the galaxy's most successful heroic team. Declassify 15K words worth of bonus story and learn the state of the infamous assemblage you seek to impress, while also gaining the chance to bonus-boost your Character Stats.\n\t\t\t*purchase boost $1.99 boost_purchased\n\t\t\t*page_break No, Thanks\n\t\t\t*goto tick\n\t#I don't need to read this case log, I already know enough to proceed.\n\t\t*set spellodexepiloguepearltorque true\n\n\t\tA notification pings, letting you know that there is at least an updated Spellodex entry available for you. \n\n\t\tAccessing this entry will allow you read the case log elsewhere at your own pace, if the desire ever arises.\n\n\t\tFor now, you are simply alerted to the name of this mystery ninth Representative member:\n\n\t\t[b]Torque.[/b]\n\t\t*goto meetyoursquad \n\n*label repslogreadingtime\n\nFeeling giddy, you place your avatar on autopilot. Then your view-screen shifts into a new meta-space where you can read the declassified Representatives Case Log all you want.\n\nLearning the origins of Gloves, a member of the Constructive Eight, and Pearl, the most recent TRAINING GROUNDS winner, and of course this final new mystery member will only serve you well in the competition to come. Obviously, the inner bookworm researcher in you lights all the way up.\n\nAs you scroll the table of contents, you read a warning at the top: \n\n*temp retinalogone true\n*temp retinalogtwo false\n*temp retinalogthree false\n*temp retinalogfour false\n*temp retinalogfive false\n\n*label repscaseloglooping\n\n--[b]This Case Log will be experienced linearly, in chronological order.[/b]\n*line_break \n--[b]Access to files will self-destruct once they have been read.[/b]\n*line_break\n--[b]Once you select \"Finished Reading,\" you will leave this meta-space and this file will be deleted entirely.[/b]\n*line_break\n[i](If you reach the end, you will be given a chance to weigh in on what you've read and custom-boost your Stats.)[/i]\n\n*choice\n\t*selectable_if (retinalogone) #Case Log File One.\n\t\t*set retinalogone false\n\t\t*set retinalogtwo true\n\n\t\t*gosub repsiaplogone\n\t\t\n\t\t*page_break CONTINUE TO FILE TWO\n\t\t*goto repscaseloglooping\n\t*selectable_if (retinalogtwo) #Case Log File Two.\n\t\t*set retinalogtwo false\n\t\t*set retinalogthree true\n\n\t\t*gosub repsiaplogtwo\n\n\t\t*page_break CONTINUE TO FILE THREE\n\t\t*goto repscaseloglooping\n\t*selectable_if (retinalogthree) #Case Log File Three.\n\t\t*set retinalogthree false\n\t\t*set retinalogfour true\n\n\t\t*gosub repsiaplogthree\n\n\t\t*page_break CONTINUE TO FILE FOUR\n\t\t*goto repscaseloglooping\n\t*selectable_if (retinalogfour) #Case Log File Four.\n\t\t*set retinalogfour false\n\t\t*set retinalogfive true\n\n\t\t*gosub repsiaplogfour\n\n\t\t*page_break CONTINUE TO FILE FIVE\n\t\t*goto repscaseloglooping\n\t*selectable_if (retinalogfive) #Case Log File Five.\n\t\t*set retinalogfive false\n\n\t\t*gosub repsiaplogfive\n\n\t\t*page_break\n\n\t\tAs you finish the Case Log final entry on this cliffhanger, you can't help but wonder…\n\n\t\tWhat do you think Retina chose to do? And how would you handle this decision, if you were in his shoes?\n\n\t\tThinking it over, you consider an answer to the former question [b]first[/b].\n\n\t\t[i]What do you think Retina will choose to do?[/i]\n\n\t\t*choice\n\t\t\t#Agree with Nifty Eons and Collette Scratch: The corrupt officer should pay with his life. [i](Bonus Powerful, Reckless)[/i]\n\t\t\t\t*set powerful %+30\n\t\t\t\t*set reckless %+30\n\t\t\t\t*goto secondfollowupq\n\t\t\t#Agree with Pearl and Luge: Enforce the law and trust the justice system. [i](Bonus Powerless, Responsible)[/i]\n\t\t\t\t*set powerful %-30\n\t\t\t\t*set reckless %-30\n\t\t\t\t*goto secondfollowupq\n\t\t\t#Agree with Pocket and Kid Halo: Perform vigilante citizen's arrest on officer. [i](Bonus Powerful, Responsible)[/i]\n\t\t\t\t*set powerful %+30\n\t\t\t\t*set reckless %-30\n\t\t\t\t*goto secondfollowupq\n\t\t\t#Something no one else sees coming. [i](Bonus Powerless, Reckless)[/i]\n\t\t\t\t*set powerful %-30\n\t\t\t\t*set reckless %+30\n\t\t\t\t*goto secondfollowupq\n\n\t\t*label secondfollowupq\n\n\t\tNext, you consider the perhaps even-more-important second question…\n\n\t\tIf you were in Retina's shoes…\n\n\t\t[i]What would you choose to do?[/i]\n\n\t\t*choice\n\t\t\t#Agree with Nifty Eons and Collette Scratch: The corrupt officer should pay with his life. [i](Bonus Destructive, Unleash)[/i]\n\t\t\t\t*set destructive %+30\n\t\t\t\t*set unleash %+30\n\t\t\t\t*goto exitcaselogentry\n\t\t\t#Agree with Pearl and Luge: Enforce the law and trust the justice system. [i](Bonus Destructive, Limit)[/i]\n\t\t\t\t*set destructive %+30\n\t\t\t\t*set unleash %-30\n\t\t\t\t*goto exitcaselogentry\n\t\t\t#Agree with Pocket and Kid Halo: Perform vigilante citizen's arrest on officer. [i](Bonus Constructive, Unleash)[/i]\n\t\t\t\t*set destructive %-30\n\t\t\t\t*set unleash %+30\n\t\t\t\t*goto exitcaselogentry\n\t\t\t#Something no one else sees coming. [i](Bonus Constructive, Limit)[/i]\n\t\t\t\t*set destructive %-30\n\t\t\t\t*set unleash %-30\n\t\t\t\t*goto exitcaselogentry\n\n\t#I'm Finished Reading. [i](Final Exit Option)[/i]\n\t\t*label exitcaselogentry\n\t\t*set spellodexepiloguepearltorque true\n\n\t\tReading this much, you feel like you have only just scratched the surface…\n\n\t\tBut you receive a notification that it's time to return to the TRAINING GROUNDS present and lift out of autopilot.\n\n\t\tHowever, another notification pings, letting you know that there is an updated Spellodex entry on what you have just read.\n\n\t\tIf the desire ever arises when you have future time, you can continue reading the Case Logs in full—and as they are updated—by following the access links saved there. This will be your way to learn what ended up happening in the time between this Case Log and the Opening Ceremony you currently attend.\n\n\t\tFor now, you hold tight to the treasured classified information you have acquired.\n\t\t*goto meetyoursquad \n\n*label repsiaplogone\n\nWe watch people.\n\nWe watch people, We learn, and We try to help. We've spent a lifetime doing it, because it's Our calling, Our gift, Our way to change the world.\n\nBut lately, We don't know why We watch. Lately, We fear the watching is only…hurting.\n\nMaybe that's why We can't stop.\n\n*page_break\n\nToday, We watch Pearl Bellamy as she moves into her bedroom suite in The Representatives mansion. Her entire life, Pearl has only ever wanted to be one thing: a hero. And right now she certainly looks the part, posing in the mirror in her brand-new costume. The white spandex stretches along her lean limbs, popping against her pastel-pink skin and white-blonde hair. This bodysuit and the varsity jacket covering it are lined with clean rainbow stripes, so Pearl appears every inch as bright and youthful as her 22 years suggest. The rainbows represent so much more, though—for Pearl, they reflect her unprecedented access to the shaded spectrum: red laser force and purple psychic projection and all the rest. Most people who study the mystic arts only master the skills of one hue in a lifetime, but Pearl is a prodigy able to wield all of them effortlessly.\n\nIt's cause for concern.\n\nStill, Pearl undoubtedly looks the part of the hero, raising her hand in the air and imagining herself flying on white winds, immortalized by adoring camera flashes. Pearl's expression lets on that this pose isn't right, but she'll find it. After all, Pearl was only ever meant to be this one thing—it never even occurred to her to take on a codename. She has always just been Pearl, the girl who wanted to save, and to soar.\n\nPearl's posing practice is interrupted, however, as a slice of green energy bursts open across her new bedroom.\n\"Knock knock,\" a voice calls out from the other end of the green portal.\n\n*page_break\n\nPearl immediately crouches next to a half-full cardboard box, pretending she's been unpacking all along.\n\n\"Pocket, is everything okay?\" she calls out as she rifles through a pile of framed family photographs. \n\n\"Just a delicious gossip delivery!\" Pocket answers, thrusting his metallic hand through the glowing green portal. His fist clutches the latest issue of The Daily Mask magazine.\n\n\"Oh my goodness!\" Pearl shouts, jumping back to her feet. \"Get in here right now. Is that what I think it is?\"\n\n\"The latest Representatives roster-change special, with a delectable feature on our new ingénue?\" Pocket says, leaning his entire torso through the portal. \"Why yes, it is.\"\n\n*page_break\n\nUnlike Us, Pocket isn't human. Still, how he manages to balance the rationality of his Binarian android physicality and the genuine warmth of his personality is a trick We've been studying—and failing to emulate—for years. Even now, Pocket's body is all cold grey steel and coursing with green teleportation fluid, but his soft-screen faceplate radiates with emotion: Excitement. Happiness. Pride.\n\nThere are many who would argue Pocket's emotion is merely a simulation, zeroes and ones strung together and preprogrammed, embodied with circuits and synapses. But We'd argue the same can be said of us humanoids in all our varied forms—we're just organically coded sets of genes and instincts and chemical reactions. \n\nAt any rate, We've served on The Representatives long enough to know Pocket is one of the greatest heroes planet Blende and the central galactic quadrant has ever seen.\n\n\"Living for this new lewk, by the way,\" Pocket says, his eye-lights scrolling up and down Pearl's six-foot stature.\n\"Collette worked with the in-house designer to update my look. Something about ‘bridging my unique heroic persona with the branded Representatives future,'\" Pearl explains absently, tearing the magazine from Pocket's grasp. \"Have you looked at it yet? Oh gosh, am I a total disaster?\"\n\n*page_break\n\n\"Never, my little lamb. But I'll leave you to peruse in private,\" Pocket says, retreating back inside his portal. \"I know you're probably dying to add the latest insert to your cutesy collection before our first briefing.\"\nPearl swallows audibly, looking both excited and terrified by this prospect.\n\n\"Don't worry, you'll fit right in,\" Pocket finishes, projecting a reassuring smile on his faceplate screen. \"Seriously, Pearl. Soak it all up. You've earned this.\"\n\nPearl projects a smile of her own, until Pocket's portal dissipates into a fine green fizzle. Pearl wants to soak this all up, it's so clear. She wants to enjoy this meteoric rise more than anything, but We know there's so many reasons she can't, not truly.\n\nOne reason is because she has not actually \"earned this,\" not all the way. And that's the reason We watch.\n\n…One reason, anyway.\n\n*page_break\n\nPearl immediately flops down on her new four-poster bed, which is littered with half-unpacked things. She falls closest to her most prized possession: a three-ring binder full of The Daily Mask Representatives trading cards. She must have started collecting these cards as a little girl, since she even has a coveted set of founding roster cards. Pearl clearly knew this special was releasing today, because she has already pulled the most recent cards featuring her six teammates. They all sit neatly arranged, ready to be placed in the current-roster front page of this official collector's binder. \n\nThe only card missing is Pearl's own—the one featured as an insert in that magazine. Pearl takes a deep breath, then flips to the center page where, indeed, her own trading card is nestled. \n\"Oh, shut the high-flying frigg up,\" Pearl whispers, disbelief and giddiness playing across her face as she looks down at the glossy rectangle. \n\nBut then, as We might have predicted, Pearl's wonder lasts only a few moments before she begins scrutinizing the image. She no doubt sees the small crease in the right leg of her costume, which was unveiled to her the day of the photo shoot and had yet to be fully tailored. She studies the lines of her face and
