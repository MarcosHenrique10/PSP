\"\n\n\t\t\"I've been selected for a very important mission, because of my powers,\" you explain, already seeing how displeased Tellie is with you saying even this much. \"For everyone's safety, I can't say more. But I needed to tell you that much before I leave.\"\n\n\t\t\"Wait, you're leaving already?\" Brit cries. \"But what about graduation?\"\n\n\t\t*page_break\n\n\t\tYou wish you could stay for graduation. \n\n\t\tYou also wish you could tell Brit and Boris there might not even be a Galaxy to graduate into if you [i]did[/i] stay. \n\n\t\tBut Tellie's eyes bore into you. \n\n\t\tYou can't, for their own safety.\n\n\t\t*page_break\n\n\t\t\"You'll have to celebrate for me,\" you reply. \"Look, you both know I never really belonged here anyway. But…\n\n\t\t\"You two are the closest I've ever felt to belonging anywhere.\"\n\n\t\t\"We're your family,\" Brit says, fighting back tears. \n\n\t\tYou know she must also be fighting a pang of jealousy, wishing she was the powerful and chosen hero. You're not sure you'd trade places with her, but it does make you feel lucky.\n\n\t\tBrit always manages to make you feel special, whether she intends to or not.\n\n\t\t*page_break\n\n\t\t[b]We'll save a bedroom for you in our apartment, just like we planned,[/b] Boris writes across his fishbowl.\n\n\t\tYou break forward to hug Boris and Brit at same time, a rare show of affection that catches them both by surprise. \n\n\t\tStill, they squeeze you right back.\n\n\t\t*page_break\n\n\t\t\"I'm counting on filling that spot the moment I'm back,\" you say.\n\n\t\tYou're not sure if you can actually deliver on this promise of coming back…\n\n\t\tBut you need to convince yourself that's what will happen, for now.\n\n\t\t*if (reckless > 50)\n\t\t\t*gosub bbgbyepositive\n\t\t\t*goto thegreatbeyond\n\t\t*else\n\t\t\t*gosub bbgbyenegative\n\t\t\t*goto thegreatbeyond\n\t#I don't want to lie. Let Tellie say my goodbyes for me. She'll be better at it anyway. [i](Test Responsible)[/i]\n\t\t*gosub trial_end\n\t\t*set bbtellieforme true\n\n\t\t\"I understand,\" Tellie replies, once you've communicated your thoughts. \"I'll make sure they know the position you're in as best I can.\"\n\n\t\t\"Thank you,\" you respond.\n\n\t\tThere's so much more to say, but you tell yourself you can fill in Brit and Boris about it when you've accomplished your missions.\n\n\t\t*page_break\n\n\t\tAt least you need to convince yourself that's what will to happen, for now.\n\n\t\t*if (reckless \u003c 50)\n\t\t\t*gosub bbgbyepositive\n\t\t\t*goto thegreatbeyond\n\t\t*else\n\t\t\t*gosub bbgbyenegative\n\t\t\t*goto thegreatbeyond\n\n*label bbgbyepositive\n*set prouder %+30\n*set flecks %+30\n*set belonging %+5\n*set becoming +8\n*achieve bbgoodybye\n\nBesides, Brit and Boris know you better than anyone else on the planet. This type of goodbye is exactly what they'd expect from you, no matter how much they'll miss you.\n\n[i](Gained Prouder, Flecks)[/i]\n*line_break\n[i](Gained Belonging, Boosted Bonus Becoming)[/i]\n*return\n\n*label bbgbyenegative\n*set prouder %-15\n*set flecks %-15\n*set belonging 50\n*set becoming +4\n\nBut really, there's nothing you can say or do to make Brit and Boris feel good about saying goodbye to the friend they've come to know. Because you have a feeling you're about to become someone—and something—very different.\n\n[i](Lost Prouder, Flecks)[/i]\n*line_break\n[i](Balanced Belonging-Independence. Gained Basic Becoming)[/i]\n*return\n\n\n*label thegreatbeyond\n*page_break ON THE PRECIPICE\n*set spellodexdeightparttwo true\n\nYou stand on a seaside cliff, on the border of Perpetual Autumnaland, which you've never visited before. There's still so much of this unsettled and unsettling planet you didn't ever explore. Perhaps it's because, on some deeper level, you always knew you wouldn't stay here for very long. Distopia was never your home—it was always a means to an end.\n\nYou're not sure this sentiment qualifies as a goodbye, but it's the best you have to offer. \n\nYou now stand alone with the Destructive Eight. Tellie dropped you off here before departing back to the capitol building herself, no doubt to deal with a still-furious Disreguardian.\n\nSo it seems the first pivotal moment in this surreal journey has arrived already.\n\nBecause all eyes of the Destructive Eight have now settled on you, waiting to decide which initial mission direction to set.\n\n*page_break\n\nYou thought you'd maybe be given more information, more direction…\n\nBut it looks like this first crucial mission-path choice must be made with just the knowledge and intuition you possess at this moment. \n\nGiven the ticking clock and teleporting resource constraints, you'd better make a wise one.\n\nVortal stands silent in front of the gathering, seething, as he must open up several portals at your whim. \n\nThis is all…really happening.\n\n*page_break\n\nThe Destructive Eight all stand ready, separated into pairs. \n\nObviously, you are meant to join one of the designated initial pairs.\n\nSo, knowing the fate of so much rests on this decision…\n\nWhich path do you choose?\n\n*image ftfparttwobanner.jpg center Teleportation Choice\n\n*choice\n\t#Become a quester on the fantasy paradise planet to unearth the ancient sourcing weapon alongside P.Savage and F.Spears, keepers of the secret origins and the most mysteriously mighty beings here. [i](Auto-Boost Powerful/Powerless, Unleash/Limit. Gain Technology, Perception, P.Savage, F.Spears)[/i]\n\t\t*set parttwoseas true\n\t\t*if (powerful >= 50)\n\t\t\t*set powerful %+25\n\t\t*if (powerful \u003c 50)\n\t\t\t*set powerful %-25\n\t\t*if (unleash >= 50)\n\t\t\t*set unleash %+25\n\t\t*if (unleash \u003c 50)\n\t\t\t*set unleash %-25\n\t\t*set technology +4\n\t\t*set perception +4\n\t\t*set psavage %+15\n\t\t*set fspears %+15\n\n\t\tMaking your decision, you step up to P.Savage and F.Spears.\n\n\t\tOnce you do, you're not even sure why, but you glance over at Hunteress and Chalice. \n\n\t\tYou wouldn't say you're looking for their approval, exactly…\n\n\t\t*page_break\n\t\t*achieve enterseas\n\n\t\tBut still, you feel better as they both nod in your direction. \n\n\t\tWhether or not that means you really made the \"right\" choice, it is now done.\n\n\t\tYou're about to embark on the greatest and most grueling adventure of your life, the one you feel you were made and meant for.\n\n\t\tAnd it all starts on the fantasy paradise planet you're about to teleport into.\n\t\t\n\t\t*page_break PART TWO\n\t\t*goto_scene ftf_parttwo_seas\n\t#Become a detective on the gothic crime planet to investigate the particulars of Binaria's exile alongside ChantuSe and Vortal, keepers of galactic secrets and the most dangerous fugitive agents here. [i](Auto-Boost Reckless/Responsible, Destructive/Constructive. Gain Enhancement, Shades, ChantuSe, Vortal)[/i]\n\t\t*set parttwogothika true\n\t\t*if (reckless >= 50)\n\t\t\t*set reckless %+25\n\t\t*if (reckless \u003c 50)\n\t\t\t*set reckless %-25\n\t\t*if (destructive >= 50)\n\t\t\t*set destructive %+25\n\t\t*if (destructive \u003c 50)\n\t\t\t*set destructive %-25\n\t\t*set enhancement +4\n\t\t*set shades +4\n\t\t*set chantuse %+15\n\t\t*set vortal %-15\n\n\t\tMaking your decision, you step up to ChantuSe and Vortal.\n\n\t\tOnce you do, you're not even sure why, but you glance over at Hunteress and Chalice. \n\n\t\tYou wouldn't say you're looking for their approval, exactly…\n\n\t\t*page_break\n\t\t*achieve entergothika\n\n\t\tBut still, you feel better as they both nod in your direction. \n\n\t\tWhether or not that means you really made the \"right\" choice, it is now done.\n\n\t\tYou're about to embark on the greatest and most grueling adventure of your life, the one you feel you were made and meant for.\n\n\t\tAnd it all starts on the gothic crime planet you're about to teleport into.\n\n\t\t*page_break PART TWO\n\t\t*goto_scene ftf_parttwo_gothika\n\n*label trial_end\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*label purchased\n\t*return\n*page_break\n*check_purchase adfree\n*if choice_purchased_adfree or not(choice_purchase_supported)\n\t*return\nRemember earlier how we told you that the first chapter is available for free? This is the end of the free content.\n\n*if choice_prerelease and choice_is_web\n\t*subscribe {\"allowContinue\": false}\n\n[i]To find out what happens next, please purchase the remaining chapters.[/i]\n\n*purchase_discount adfree 2023-01-26 $4.99 $2.99 purchased\n*abort\n", "ftf_parttwo_gothika": "*comment é\n\n*image ftfgothikabanner.jpg center Part Two\n\n[b]PART TWO[/b]\n*line_break\nThe Rogues of Gothika\n\n*page_break CHAPTER I\n\n[b]CHAPTER I[/b]\n*line_break\nYou step out of the jagged portal, which feels not unlike stepping through some kind of cracked mirror. Your stomach lurches—this feels nothing like moving through Tellie's fluid global portals. \n\nThen again, you think of how many light-years you likely just traversed through Vortal's portal and become even more queasy.\n\nThen you catch your first glimpse of this new world you've stepped into. You actually gasp out loud… \n\nBut the sound is drowned out by the portal shattering behind you.\n\n*page_break\n\nYou glance back to see the fluid portal shards dissipating, cracking and staining the pavement where they melt. \n\nLooking up, you then see that Vortal is busy stretching and popping his vertebrate joints. He seems to ripple with some mix of pain and satisfaction, like after a good workout…\n\nOr a good meal. \n\nDeciding to let that troubling sight go—along with the worry of about what this toxic portal might have done to your own organic matter—you turn to take in the view more properly. \n\n*page_break\n\nYou stand on a darkened bridge, lit by flickering lamplight and stretched over a sludgy river. It's still afternoon, but the sky is coated with grey clouds. \n\nIn fact, everything you see feels cast in greyscale, even the sepia-toned metropolis that towers in the near distance. The skyline feels both impressive and imposing, all peaks and valleys of gleaming chrome skyscrapers and gothic cathedral towers. \n\nThe only color comes from the neon glow of buzzing billboards and signage, reflecting off the mist and smog rising from dozens of smokestacks.\n\nYou then feel a low rumble, building in your chest louder and louder. You look up and force yourself not to totally freak out…\n\n*page_break\n\nAs a massive blimp flies above the bridge, far too close for comfort. \n\nEspecially because this blimp seems to be made of organic material: a skeletal rib cage of bones grasping a lung-like membrane. A spotlight shines from some eyeball-like orb, temporarily illuminating a tent city erected on the riverbanks.\n\n\"Worlds your Galaxy, worst to worst,\" Vortal utters, in his cut-glass staccato. \"Smell alone makes yearn Blot ruin.\"\n\nSomething like a smile curls across Vortal's serpentine lips.\n\n*fake_choice\n\t#And I am reminded with a shudder that he is a true alien to the Verses Galaxy. \n\t#And I remind myself that I still have no clue how he became a rarefied survivor of his home Galaxy's Blot empire.\n\t#And I remind myself I still have no idea how he has been compelled to aid in our cause.\n\t#And I resist the urge to smile myself. I like Vortal, but he doesn't need to know that yet.\n\t#And I don't react. Vortal doesn't scare me in the slightest.\n\n\"Watch your mouth,\" ChantuSe says to Vortal, stern as the steel strapped to her back. \n\nThis response reminds you that you know equally as little about this stoic warrior, or the secret shame she seems to carry like a fueling torch.\n\nPerhaps it's your surroundings, but suddenly you feel incredibly on guard. Which is good, as you're about to engage in the hunt for an \"architect of genocide\" who hides out in an industrial megacity, guided by two known galactic-level \"Destructives.\" You resolve to demand some answers, sooner than later…\n\nBut you pause when you see the pearls studded on ChantuSe's skin begin to shift and pool. They rearrange themselves around her nose, shifting its shape. ChantuSe then sniffs the air with her newly enhanced nose, closing her eyes as she does.\n\n\"A local guide has been designated for us,\" she says, opening her eyes. \"I have their scent. We should move before we're seen.\"\n\n*page_break\n\nIf these two think you're about to follow their lead blindly, you'll have to inform them otherwise.\n\n\"First, you're going to tell me where we are. And why we even require a local guide,\" you begin, mustering as much command as you can. \"Then while we're at it, I'd like to know why you both are helping in this mission in the first place.\"\n\n\"Very well,\" ChantuSe responds calmly. \"We are on planet Gothika, outside its capital city of the same name. Gothika is located on the eastern fringe of the Verses Galaxy and is not yet galactically aware that life exists beyond its solar system.\"\n\n\"So according to Galactic Council law, we're forbidden from telling anyone here we're aliens,\" you expand. \"Except, I can't imagine all three of us will blend in with the local population.\" \n\n*page_break\n\nYou might sound annoyed, but mostly because it bothers you to not recall anything about Gothika from your extensive studies. Then again, you prioritized reading about planets that have evolved enough to join the greater galactic community, so you can't be too hard on yourself.\n\n\"Given the rate of genetic experimentation on Gothika, we actually should be able to blend in quite easily. So long as we keep a relatively low profile,\" ChantuSe explains. \"Though it has been left to our discretion how deeply to educate and inform our local guide about the broader galaxy, since her aid has been deemed necessary to facilitate and expedite our investigation.\"\n\n\"Thank you,\" you reply, once ChantuSe seems to have finished speaking. \"But what about my final question about why you both are helping in this mission?\"\n\n\"Vortal and I have both told you all we are obligated to about ourselves,\" she answers plainly. \"More than that, you will have to earn.\"\n\n*page_break\n\nVortal hiccups beside ChantuSe, perhaps his version of a laugh. \n\n[i]Earn[/i]. \n\nFine. If that's how they want to play this, you can think of some creative ways to prove yourself.\n\nEntering this mission, you know there will be advantages to building trust with these new allies. However, on the other hand, keeping a firm working distance between you might also be ideal for such dire wartime endeavors. \n\nEither way, you should focus on building high trust or low distance with your companions.\n\n*choice\n\t#I read ChantuSe's mind, even if I can't do so without her being able to tell. [i](Test Reckless)[/i]\n\n\t\tThis is different from the kinds of perceptive, ability-reading spells you performed earlier on Distopia. You can cast surface-level probing spells like those usually without detection. \n\n\t\tBut you're not a proper telepath, so you're not able to enter actual minds uninvited without them knowing. \n\n\t\tAt least, not yet.\n\n\t\tStill, you twitch your fingers to cast the spell…\n\n\t\t*page_break\n\n\t\tBut the moment you begin to probe, you immediately encounter an armored wall circling the mind of ChantuSe. \n\n\t\tYou guess, as part of their galactic briefing and training, the minds of all the Destructive Eight must have been shielded, given the sensitive intel they all carry.\n\n\t\t*if (reckless > 60)\n\t\t\t*set chantuse %+15\n\t\t\t*set belonging %-5\n\t\t\t*set becoming +4\n\n\t\t\t\"I understand why you tried that,\" ChantuSe responds, clearly finding respect for your more commanding, reckless side. \n\n\t\t\t\"If it's so important to you, you may know that I joined in this venture because I want to atone for my past life. I am grateful to have been afforded this opportunity to make grand amends, and to use my hunting nature for good.\"\n\n\t\t\t[i](Gained ChantuSe)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Independence, Boosted Bonus Becoming)[/i]\n\t\t\t*goto vortalenough\n\t\t*else\n\n\t\t\t\"I understand why you tried that, but do not do so again,\" ChantuSe challenges, a tight look remaining on her face. It seems like she doesn't find your reckless break all that charming. \n\n\t\t\t\"If it's so important to you, you may know that I joined in this venture because I want to atone for my past life. I am grateful to have been afforded this opportunity to make grand amends, and to use my hunting nature for good.\"\n\n\t\t\t*gosub limitsbad\n\t\t\t*goto vortalenough\n\t#I respect her boundaries to begin \"earning,\" as ChantuSe put it. [i](Test Powerless)[/i]\n\n\t\t\"Very well,\" you say. \"I have no trouble earning anything I need. Ever.\"\n\n\t\t\"That's good to hear,\" ChantuSe responds. \"Because I know that you believe you could acquire what you desire by force.\"\n\n\t\t*if (powerful \u003c 40)\n\n\t\t\tChantuSe then offers you a tight smile, respecting your move at self-restraint. \n\n\t\t\t\"I am fine with you knowing that I have joined in this venture because I want to atone for my past life. I am grateful to have been afforded this opportunity to make grand amends, and to use my hunting nature for good.\"\n\n\t\t\t*gosub limitsgood\n\t\t\t*goto vortalenough\n\t\t*else\n\n\t\t\tChantuSe almost looks…let down by your display of powerless restraint, to your surprise. \n\n\t\t\t\"Still, you should know that I joined in this venture because I want to atone for my past life. I am grateful to have been afforded this opportunity to make grand amends, and to use my hunting nature for good.\"\n\n\t\t\t*gosub limitsbad\n\t\t\t*goto vortalenough\n\t#I simply ask directly for more details. [i](Test Balanced Belonging-Independence)[/i]\n\n\t\t\"Is that vague response really all you think I deserve to know?\" you follow up. \"I'm risking my life just as much as you.\"\n\n\t\t*if (belonging = 50)\n\n\t\t\tChantuSe stares back at you with an intense look, like she agrees. And like she is impressed with the balance you've decided to strike here.\n\n\t\t\t\"You're right, you are one of us,\" she says. \"But you're also more important than any of one of us, at the same time. So you deserve to know that I joined in this venture because I want to atone for my past life. I am grateful to have been afforded this opportunity to make grand amends, and to use my hunting nature for good.\"\n\n\t\t\t*gosub limitsgood\n\t\t\t*goto vortalenough\n\t\t*else\n\n\t\t\tChantuSe stares back at you with an intense look, like she agrees. But also like she is far from impressed with the balance you've tried to strike here.\n\t\t\t\n\t\t\t\"That may be,\" she says. \"But I don't write all of the rules. You are both one of us and apart from us Destructive Eight. Still, you should know that I joined in this venture because I want to atone for my past life. I am grateful to have been afforded this opportunity to make grand amends, and to use my hunting nature for good.\"\n\n\t\t\t*gosub limitsbad\n\t\t\t*goto vortalenough\n\n*label limitsgood\n*set chantuse %+15\n*set belonging %+5\n*set becoming +4\n\n[i](Gained ChantuSe)[/i]\n*line_break\n[i](Gained Belonging, Boosted Bonus Becoming)[/i]\n*return\n\n*label limitsbad\n*set chantuse %-30\n*set belonging 50\n*set becoming +2\n\n[i](Lost ChantuSe)[/i]\n*line_break\n[i](Balanced Belonging-Independence. Gained Basic Becoming)[/i]\n*return\n\n*label vortalenough\n*page_break\n\n\"I trap by Versus forces until you complete,\" Vortal then adds, guttural as ever. \"If simply kill you, I escape. Could. Would.\"\n\nThe look of disgust and disdain Vortal then hits you with is so potent, it almost makes you flinch. He looks at you as if you are the one holding the key to his current cage…which is actually quite good to know.\n\n\"Vortal knows what would happen if he dared to even touch a single hair upon your head,\" ChantuSe cuts in, sending a deadly look of her own his way.\n\n\"He wouldn't get very far, even if he did try,\" you posture, doing your best to seem unafraid. \n\nBut the truth is, you don't really know what Vortal is truly capable of. It gives you extra reason to keep your eyes open and your guard up.\n\n*page_break\n\nJust then, a rickety van approaches the bridge, sputtering and spinning. \n\nYour party instinctively steps into the nearest shadows, gathering behind one of the bridge's beams. This close, you can smell ChantuSe's unexpectedly floral smell against Vortal's formaldehyde antiseptic scent. You take a couple small steps back.\n\n\"We should get moving,\" ChantuSe says. \"But first, now that we have arrived, we are cleared to share some updates with you. On the task of establishing a frontal assault within the Galactic Barrier, Hunteress and Squimli have gone into deep space to find the most durable ship ever built. \n\n\"Simultaneously, Trig and The Native have been dispatched to procure the technology for a forbidden weapon of mass destruction. Finally, F.Spears and P.Savage have been sent to unlock an ancient power source capable of fueling both. All of which can only be fused together by harnessing the energies of the harmonic convergence.\"\n\n*page_break\n\n\"Our objective is separate, but our timeline is identical. As a reminder, our mission here is to uncover the hidden location of the most powerful Machi Witch who ever lived, Binaria. We believe she has remained in a self-imposed exile, hiding on this planet in alternate local guises for generations.\n\n\"Once we locate Binaria, our goal is to compel her to replicate the casting of the Compuspell that created sentient androids, known as Binarians. The theory is that the source code for this lost Compuspell will be capable of creating humanoid-android hybrids, known as Bimunans. We need these durable, adaptive hybrid beings to begin building a defensive army capable of combating the Blots. \n\n\"To boost this Compuspell to the magnitude necessary to create mass Binuman life, we will also need to harness the energies of the harmonic convergence—even if Binaria herself agrees to cast the spell. If she refuses, we must at least prioritize obtaining the Compuspell source code, so that we may attempt the spell ourselves.\" \n\n\"And when does the harmonic convergence happen?\" you ask, not speaking aloud the part ChantuSe likely omits: that should Binaria refuse to cooperate, [i]you[/i] will likely be the one tasked with casting this spell of mass construction.\n\n*page_break\n\n\"In about two weeks, based on unpredictable galactic factors,\" ChantuSe replies. \"Less time than we'd like, but still enough to make success possible. \n\n\"It should even be enough time to allow you to meet Chalice and The Wicked Wone, who are dispatched to Blende to procure spots in TRAINING GROUNDS. The goal there would be to strengthen your spellcasting enough to properly harness the harmonic convergence.\"\n\nAh yes, and there the truth is, just as you suspected. However, you are distracted as Vortal's throaty voice sounds again.\n\n\"You must stronger,\" Vortal grunts. \"If fail, options bad.\"\n\n\"I don't fail,\" you say, while one thought plays on repeat in your mind…\n\n*fake_choice\n\t#Honestly, I don't love the sound of everything that was just laid out. How can this be the best plan? \n\t#This all just sounds so…cosmically enormous. So much bigger than just me, no matter how powerful I become. \n\t#If I work very hard and focus, I know I can get strong enough to channel these kinds of forces in such a short time.\n\t#Bring it on. I can handle anything.\n\n\"Good,\" Vortal snorts. \"Then like we boost you.\"\n\n\"What Vortal means is that all we Reborn learn various meditative practices to hone our own skills,\" ChantuSe cuts back in. \"We can show you how to apply this practice to your own abilities. \n\n\"And I should add, you should avoid casting any technological spells here on Gothika. Technology has merged with the organics of this planet in a way you'd need to study further to master. \n\n\"We have also been told this planet's people have a long history of their perceptions being badly tampered with, so casting spells in that space likely won't win us any allies.\"\n\n*page_break\n\n\"In other words, you want me to focus on the shades and Enhancement?\" you extrapolate. \n\nIt's not your favorite idea, but you'll have to take ChantuSe's advice until you can prove otherwise to yourself.\n\n\"Gothikites love enhancements. And they have not harnessed the shades yet,\" ChantuSe answers. \"Focusing on both spells' specialties are sure to dazzle and entice them. So, where would you like us to start?\"\n\n[i](This is a benchmark opportunity to apply your Becoming to strengthen your spells skills.)[/i]\n*line_break\n[i](For this mission path, Enhancement and Shades will be most useful.)[/i]\n*line_break\n[i](You have ${becoming} Becoming out of a possible 20.)[/i]\n\n*choice\n\t#Focus my Becoming into Shades under the tutelage of ChantuSe. [i](Gain Constructive, ChantuSe, Shades)[/i]\n\t\t*set destructive %-15\n\t\t*set chantuse %+15\n\t\t*achieve pupilshades\n\n\t\t*gosub chantusesouping\n\n\t\tSo, with the guidance of ChantuSe's shifting, you push forward all of your Shades skills, feeling them strengthen in alignment with your experience level.\n\n\t\t*if (becoming > 15)\n\t\t\t*set shades +10\n\n\t\t\t[i](Becoming High: Gained Max Shades)[/i]\n\t\t\t*goto wheredowestartgoth\n\t\t*elseif (becoming > 11)\n\t\t\t*set shades +6\n\n\t\t\t[i](Becoming Medium: Gained Standard Shades)[/i]\n\t\t\t*goto wheredowestartgoth\n\t\t*else\n\t\t\t*set shades +4\n\n\t\t\t[i](Becoming Basic: Gained Min Shades)[/i]\n\t\t\t*goto wheredowestartgoth\n\t#Focus my Becoming into Shades under the tutelage of Vortal. [i](Gain Destructive, Vortal, Shades)[/i]\n\t\t*set destructive %+15\n\t\t*set vortal %-15\n\t\t*achieve pupilshades\n\n\t\t*gosub vortalsouping\n\n\t\tSo, with the alien slither of Vortal's transportive tentacles, you push forward all of your Shades skills, feeling them strengthen in alignment with your experience level.\n\n\t\t*if (becoming > 15)\n\t\t\t*set shades +10\n\n\t\t\t[i](Becoming High: Gained Max Shades)[/i]\n\t\t\t*goto wheredowestartgoth\n\t\t*elseif (becoming > 11)\n\t\t\t*set shades +6\n\n\t\t\t[i](Becoming Medium: Gained Standard Shades)[/i]\n\t\t\t*goto wheredowestartgoth\n\t\t*else\n\t\t\t*set shades +4\n\n\t\t\t[i](Becoming Basic: Gained Min Shades)[/i]\n\t\t\t*goto wheredowestartgoth\n\t#Focus my Becoming into Enhancement under the tutelage of ChantuSe. [i](Gain Limit, ChantuSe, Enhancement)[/i]\n\t\t*set unleash %-15\n\t\t*set chantuse %+15\n\t\t*achieve pupilenhancement\n\n\t\t*gosub chantusesouping\n\n\t\tSo, with the guidance of ChantuSe's shifting, you push forward all of your Enhancement skills, feeling them strengthen in alignment with your experience level.\n\n\t\t*if (becoming > 15)\n\t\t\t*set enhancement +10\n\n\t\t\t[i](Becoming High: Gained Max Enhancement)[/i]\n\t\t\t*goto wheredowestartgoth\n\t\t*elseif (becoming > 11)\n\t\t\t*set enhancement +6\n\n\t\t\t[i](Becoming Medium: Gained Standard Enhancement)[/i]\n\t\t\t*goto wheredowestartgoth\n\t\t*else\n\t\t\t*set enhancement +4\n\n\t\t\t[i](Becoming Basic: Gained Min Enhancement)[/i]\n\t\t\t*goto wheredowestartgoth\n\t#Focus my Becoming into Enhancement under the tutelage of Vortal. [i](Gain Unleash, Vortal, Enhancement)[/i]\n\t\t*set unleash %+15\n\t\t*set vortal %-15\n\t\t*achieve pupilenhancement\n\n\t\t*gosub vortalsouping\n\n\t\tSo, with the alien slither of Vortal's transportive tentacles, you push forward all of your Enhancement skills, feeling them strengthen in alignment with your experience level.\n\t\t\n\t\t*if (becoming > 15)\n\t\t\t*set enhancement +10\n\n\t\t\t[i](Becoming High: Gained Max Enhancement)[/i]\n\t\t\t*goto wheredowestartgoth\n\t\t*elseif (becoming > 11)\n\t\t\t*set enhancement +6\n\n\t\t\t[i](Becoming Medium: Gained Standard Enhancement)[/i]\n\t\t\t*goto wheredowestartgoth\n\t\t*else\n\t\t\t*set enhancement +4\n\n\t\t\t[i](Becoming Basic: Gained Min Enhancement)[/i]\n\t\t\t*goto wheredowestartgoth\n\n*label chantusesouping\nChantuSe nods, clearly pleased you chose to trust her over Vortal. \n\nShe then wastes no time, reaching out her hand to you. Her studded body pearls begin to shift once again, collecting and re-pooling at her fingertips. \n\nYou tense up for a moment, but as soon as the cool pearls touch the skin of your own forehead… \n\nYou realize ChantuSe intends to show you how to focus and sharpen what you're Becoming.\n\n*page_break\n\nAs this happens, you can practically feel Vortal's resistance and disgust for this process seeping in from across the bridge. \n\nBut you also can sense something you don't expect… \n\nA desire to be chosen. \n\nAt the same time, you sense that the best way to build a relationship with Vortal will be to [i]lower[/i] it, which goes against all usual intuition. You suppose you're going to have to get used to that trend, when it comes to Vortal's alien ways.\n\n*page_break\n\nThat's also when you suddenly realize two things about your situation. \n\nFirst, that the best way to work with these two will be to show them you are [i]just like them[/i]—to prove your strength to them. \n\nSecond, you realize with a sudden burst of clarity that, on this particular planet, working alongside these particular allies, you might very well be empowered to become your mightiest self, without needing to hold back. \n\nThis might be the way to truly remove the blocks you've kept in place your entire life in order to fit in—or rather, to not become a completely isolated outcast.\n\n*page_break\n\nChantuSe then lights you up with her shapeshifting abilities and you close your eyes. \n\nYou feel yourself starting to get souped up, like you can translate your experience into accrued mental resources, now ready to be spent.\n*return\n\n*label vortalsouping\nVortal slides closer to you, seeming disgusted to be chosen for this process. \n\nHe then wastes no time, turning sideways beside you and opening up some brightly colored, armored mollusk shell nestled at the base of his neck. Two tentacles extend from this retracting shell, reaching towards you. \n\nYou tense up for a moment, but then doubly so as these tentacles touch the skin of your forehead. \n\nIt's going to sting, but Vortal is going to force you to sharpen into what you're Becoming.\n\n*page_break\n\nBut as this happens, you can also sense something you don't expect: actual gratitude from Vortal to be chosen, signified by the lowering of your relationship. \n\nYou suddenly sense that the best way to build a relationship with Vortal will be to actually [i]lower[/i] it, which goes against all usual intuition. You suppose you're going to have to get used to that trend, when it comes to Vortal's alien ways.\n\nThat's also when you suddenly realize two things about your situation. First, that the best way to work with both Vortal and ChantuSe will be to show them you are [i]just like them[/i]—to prove your strength to them. \n\nSecond, you realize with a sudden burst of clarity that, on this particular planet, working alongside these particular allies, you might very well be empowered to become your mightiest self, without needing to hold back. \n\nThis might be the way to truly remove the leash you've kept tight your entire life in order to fit in—or rather, to not become a completely isolated outcast.\n\n*page_break\n\nVortal then lights you up with his connected tentacles and you close your eyes. \n\nYou feel yourself starting to get souped up, like you can translate your experience into accrued mental resources, now ready to be spent.\n*return\n\n\n*label wheredowestartgoth\n*page_break\n*if (becoming = 20)\n\t*achieve parttwobecomingmax\n\n\"All right, where do we start?\" you ask, stepping back to regain some authority here. \"If we need this local guide to help us locate Binaria, how do we find them?\"\n\n\"I already have our designated guide's scent,\" ChantuSe repeats, twitching her still-enhanced nose. \"I can lead us to her through the shadows and back alleys of this city. The less we are seen, the better.\"\n\n\"Why not just have Vortal here open a portal to the right location?\" you ask.\n\n\"No,\" ChantuSe replies, a little too quickly and sharply. \n\n\"Vortal's portals are only to be used when absolutely necessary,\" she adds, trying to cover her initial reaction. \"Let's get going.\"\n\n*page_break\n\nAs ChantuSe starts moving, your eyes shift to Vortal. \n\nBut all you receive in the way of an answer is another deeply unsettling grin forming across his silvery lips.\n\nEveryone keeps warning you about Vortal's portals—so that's yet another mystery to add to your growing list. \n\nFor now, you suppose it's time to walk the narrow corridors of Gothika to find your chosen guide.\n\n*page_break MANY SHADOWY BLOCKS LATER\n\n[b]CHAPTER II[/b]\n*line_break\nYour home planet might be full of thriving cities, but you've still never experienced one quite like this. \n\nAs you followed ChantuSe and Vortal through the labyrinthine back alleys and side streets of this urban megacenter, you were met with all kinds of unique sights, sounds, and smells. Most weren't particularly pleasant, but somehow you didn't seem to mind.\n\nSomething about Gothika's energy seems to ignite a new feeling inside you, a kind of charged energy. The city's thrumming pulse feels like a living thing: all raw meat and strained muscle and beating heart. \n\nSomehow, you feel like you could actually [i]belong[/i] here.\n\n*page_break\n\nThen it occurs to you suddenly—and somewhat obtusely—that yesterday you were still living your simple cursed life. \n\nYet today, you find yourself on an untouched planet with two galactically ordained, super-deadly mystery warriors playing detective to solve the case of a generations-old missing person capable of spawning a Galaxy-saving army.\n\nYou could cry out loud, feeling the ensuing rush of giddiness and anxiety and importance and smallness. This all just somehow seems…meant for you? Whether you want it or not.\n\nBabe ${babename} Fortune the fated, always parsing the line between a life calling and a life sentence.\n\n*page_break\n\nChantuSe stops ahead of you, as you round the corner of a building carved with low-perched stone gargoyles. Around this bend you find a vacant basket-baller court, one with cracked asphalt and plastic crates for hoops. ChantuSe holds up her fist, a universal military sign to hold steady.\n\n\"The guide we seek should be there,\" she says, nodding toward the court. \n\nBefore you can ask what she means, a new voice sounds behind your trio.\n\n\"Everyone in Gothika knows that very few players can ball through this court,\" the female voice says, low-pitched and rapid-fire. \"Move a muscle and I will light you losers all the way up.\"\n\n*page_break\n\nYou then hear the clicking of some weapon and decide to follow this new woman's command to remain still. However, you still need eyes on her, so you twitch two fingers to cast a quick Enhancement spell, giving you very temporary eyes in the back of your head.\n\nBehind you stands an incredibly physically fit woman in her thirties, with dark brown skin and shoulder-length, midnight-blue-black shimmering hair. She is dressed like a character from one of your favorite fighter video games, in shiny black patent thigh-high boots with neon-purple laces up the front and a matching one-piece bathing suit. Neon-blue fishnet mesh covers her exposed upper chest and arms, which sport matching elbow-length, black patent fingerless gloves also stitched with neon-purple lacing.\n\nHer exposed nails are long and sharp and seemingly made of a deep-purple gemlike enamel, adorned with an arsenal of charms. She wears a pointed black patent mask, almost like animal ears, and holds a slim tech-laced katana in her hand. \n\nActually, this blade is the same deep-purple gemstone as her nails, like the weapon was somehow extracted from a singular tip.\n\n*page_break\n\nLocking in eye contact through your temporary back-sight, this badass cosplay lady doesn't even flinch. \n\n\"Boof Ridin, what nastiness did you pull to geneify those peepers?\"\n\nGiven the way that Vortal and ChantuSe also appear physically at face value, the fact that this woman doesn't immediately freak out speaks volumes about the potential population here on Gothika. You mostly saw standard humanoids walking the city, and your trio made sure that no one saw you. But you're wildly curious how a snake-alien and a pearlescent hunter are both seemingly able to fit right in.\n\n\"We're here to ask for your help,\" you reply, remaining still in an attempt to be respectful. \n\nThe truth is, any one of your trio could likely take this sniper out. \n\n*page_break\n\n\"Everyone wants the help of Thatbee,\" she immediately laughs back. \"And no one trespasses on my grounds uninvited.\"\n\nWith a lightning quickness, Thatbee then darts forward to attack.\n\nLuckily, you're just as fast.\n\n*choice\n\t#Yell at ChantuSe and Vortal to handle this one. I need to see what they're capable of. [i](Gain Limit, Half Enhancement, Half Shades)[/i]\t\n\t\t*set unleash %-15\n\t\t*set enhancement +2\n\t\t*set shades +2\n\n\t\tReacting with speed of your own, you cast a quick yellow shades sunlight spell. The sudden flash forces Thatbee to stop for a moment, temporarily blinded.\n\n\t\t\"Go,\" you then shout to ChantuSe and Vortal, snapping your fingers to cast a speed Enhancement spell on them both.\n\n\t\tChantuSe reaches Thatbee first, unsheathing her own broadsword. Thatbee recovers far faster than you anticipate, parrying with ChantuSe in an doubly impressive display.\n\n\t\tIt's a close call who'd win, but Vortal slithers behind Thatbee quickly to strike her from behind, creating some kind of mini-vortex around his balled-up fist.\n\t\t*goto fightnotneededtb\n\t#Create a shield to show Thatbee that she can't touch us. [i](Gain Constructive, Shades)[/i]\n\t\t*set destructive %-15\n\t\t*set shades +4\n\n\t\tThatbee is about to strike at you, with impressive agility and precision. However, you work your magic to cast a purple Shades shield just in time. \n\n\t\tThatbee's katana clangs against the surface, unable to break through.\n\n\t\tRealizing this, she steps back and suddenly a purple-blue haze begins to buzz around her head. \n\n\t\tWhatever she is attempting to do as this haze projects forward, it is also unable to break through your shield. Seeming surprised—and impressed—Thatbee dissipates the lavender cloud.\n\t\t*goto fightnotneededtb\n\t#Slow Thatbee's reflexes so she can't attack and we can talk instead. [i](Gain Destructive, Enhancement)[/i]\n\t\t*set destructive %+15\n\t\t*set enhancement +4\n\n\t\tYour fingers twitch at your side as you cast a quick reverse-Enhancement spell.\n\n\t\tThatbee tries to move forward, but her reflexes react like molasses.\n\n\t\tShe can't swivel her neck quickly to react, but her eyes at least shift to you quickly in their sockets. Though them, you can tell how completely alarmed Thatbee feels.\n\n\t\tSo you simply smirk back in return, letting her know this is fully your doing.\n\t\t*goto fightnotneededtb\n\n*label fightnotneededtb\n*page_break\n\n\"So, can we talk now?\" you ask, though it's really more of a command.\n\nRecovering from your initial engagement, Thatbee licks her lips, looking both frustrated and curious. \n\nAnd like she actually [i]adores[/i] a good challenge.\n\n\"You're not from around here, are you?\" Thatbee asks. \n\n\"It depends what you mean by 'here,'\" you reply. \"But the short answer? No. So is there someplace private we can go to explain ourselves?\"\n\n*page_break\n\n\"I dunno, boss,\" a new voice speaks, emerging from the shadows under the nearest gargoyle. \"I say they've proven themselves worthy of our standard meet and greet, wouldn't you?\"\n\nThe person this voice belongs to then steps forward and your heart skips a beat, for a couple reasons.\n\nFirst, because a flash of recognition definitely passes between this new person and ChantuSe. It's quickly covered, but you clock it—like they've both just seen a ghost from a past life.\n\nSecond, because this person couldn't be more your type. You know exactly the kind you're most attracted to, the offbeat energy and unique characteristics that make your knees weak. Whoever this person is, ${oftze} possesses all the vibes and charms you love most. \n\nIt almost makes you feel like some kind of perceptive magic is at play here, but a quick spell-scan doesn't pick anything up.\n\n*page_break\n\n\"They've certainly piqued my interest, my dear One-Fourteen,\" Thatbee says, moving to join this new person. In a show of good faith, Thatbee collapses her katana rather improbably to the size of a charm, then places it back on one vacant nail.\n\nDespite that nifty sight, your eyes remain glued on this One-Fourteen person. $!{Oftze} wears simple clothes, a black spandex athleisure situation and combat boots, with just an ocean-blue enamel pin across ${ofthis} chest that reads [b]#114[/b]. There's a pack on ${ofthis} back, with two black leather straps crossing ${ofthis} chest. That pack also seems to contain an entire arsenal of collapsible weapons.\n\nOne-Fourteen seems to be of average height, average fitness, and nondescript except for the defining characteristics ${oftze} has altered on ${ofthis} face and hair. $!{Oftze} feels distinctly like someone who wouldn't stand out in a crowd…\n\nSo why are you so flirping drawn to ${ofthir}? And how is it possible ChantuSe could know ${ofthir} too?\n\n*choice\n\t#All I care about is getting to know One-Fourteen as intimately as possible. [i](Gain Reckless, Belonging, Max One-Fourteen)[/i]\n\t\t*set reckless %+15\n\t\t*set belonging %+5\n\t\t*set onefourteen 80\n\n\t\tYou can already tell—if you're not careful, your feelings for One-Fourteen could potentially supersede this mission. You suppose you'll have to decide just how much you care to be careful.\n\n\t\t\"And have we piqued your interest?\" you ask, looking directly at One-Fourteen. \n\n\t\t$!{Oftze} returns your gaze, locking all the way in.\n\n\t\t\"Oh, absolutely.\"\n\t\t*goto allrighttwooft\n\t#In this dangerous setting, One-Fourteen just feels like someone I can actually trust. [i](Gain Responsible, Belonging, Mid One-Fourteen)[/i]\n\t\t*set reckless %-15\n\t\t*set belonging %+5\n\t\t*set onefourteen 60\n\n\t\tUnlike ChantuSe, Vortal, and Thatbee, there's just a warmth that radiates from One-Fourteen. \n\n\t\tYou can already tell you're going to need ${ofthis} help to finish this mission, one way or another. Which will require not getting too close or too distant—just the right balance, as friendly allies.\n\n\t\t\"Thanks for vouching for us,\" you offer. \"My name is ${babename}.\"\n\n\t\t\"It's very nice to meet you, ${babename},\" One-Fourteen replies.\n\t\t*goto allrighttwooft\n\t#I don't trust this feeling of familiarity One-Fourteen seems able to project. [i](Gain Responsible, Independence, Min One-Fourteen)[/i]\n\t\t*set reckless %-15\n\t\t*set belonging %-5\n\t\t*set onefourteen 40\n\n\t\tYou can already tell it will be good to keep your distance from One-Fourteen, especially if ${oftze} is so immediately capable of disarming people. \n\n\t\tAfter all, One-Fourteen will be a means to an end. Getting too close might interfere with your mission. Better to set the precedent now, so you'll perform to peak expectations later.\n\n\t\t\"Is someone going to show us inside?\" you ask, remaining pointed.\n\n\t\t\"Ah, someone who knows exactly what they want,\" One-Fourteen responds with a smile. \"Good.\"\n\t\t*goto allrighttwooft\n\n*label allrighttwooft\n*page_break\n\n\"We'd be happy to tell you everything we can about why we're here,\" ChantuSe cuts in, focusing only on Thatbee. \n\nIf she does indeed know One-Fourteen somehow, she isn't saying so. [i]Yet.[/i]\n\n\"Then I guess you should come visit the BeeHive,\" Thatbee replies, stepping forward on her impressively high heels. She clicks a button on another one of her nails and suddenly the basket-baller court begins to rumble.\n\nYou turn to find the court sliding sideways, slowly revealing a subterranean staircase.\n\nThatbee then struts past you to lead the way, heading down into what must undoubtedly be her secret lair.\n\n*page_break INTO THE BEEHIVE\n\n\"So, you want to hire us for a case.\"\n\nThatbee issues this like a statement instead of a question, but you're too busy taking in your surroundings. \n\nThe BeeHive has turned out to be much more like a bunker basement, but one with high ceilings and even higher tech. Screens and gadgets and wires run everywhere, all connected to a central hologram-generating pillar.\n\nYour eye is also drawn to a trophy case against one corner wall, which is bursting with press clippings and civic awards. One glance tells you Thatbee and her \"team\" are famous and infamous detectives and crime-catchers here in Gothika.\n\n*page_break\n\n\"In a way, yes, we do want to work with you for a case,\" you answer, remaining purposefully vague.\n\n\"Great,\" Thatbee replies, before you can turn to ChantuSe for guidance on how much more to reveal. \"We have an interactive orientation video for that.\"\n\nBefore revealing your own intentions, learning more about Thatbee's operation and this city in general is possibly an ideal place to start. So you nod.\n\nWith a few console clicks, One-Fourteen fires up the central holographic pillar. Inside, a cartoon bee appears, wearing glasses and a little bonnet.\n\n*page_break\n\n\"I'm That Bee In Your Bonnet,\" the orientation bee begins. \"How can I buzz you up to date?\"\n\nYou walk forward, looking to ChantuSe and Vortal as you approach a touch screen menu that appears. Not for permission, but rather to dare them to challenge your lead. \n\nChantuSe simply nods, while Vortal barely seems to be paying attention. His slippery eyes survey the bunker lair, like he is probing for potential escape routes.\n\nSo you take charge of leading this #TeamThatbee orientation.\n\n*label thatbeeorientation\n*choice\n\t#[i]What are Gothika's Genies?[/i]\n\n\t\tThat Bee In Your Bonnet begins buzzing around several images in the holographic pillar, speaking through some accompanying narration.\n\n\t\tFirst, you see an image of the city of Gothika. Then, in what looks like B-roll from some corporate orientation film, you see stock images of spandex-clad heroes. \n\n\t\t\"As was widely known and televised, our grand central metropolis was once home to a whole cast of colorful heroes. Every single hero, and some sponsored villains, were created by one corporate juggernaut: Genie Labs and Operations. \n\n\t\t\"The genetic modifications required to become a powered 'Genie' were controlled by Genie Labs, but many copycats soon emerged. Still, only those with enormous wealth or a lucky few lottery winners were able to get Geniefied.\"\n\n\t\t*page_break\n\n\t\t\"It took the better part of a decade for this bright heroic facade to crumble,\" That Bee In Your Bonnet continues. \"After a remarkable feat of rather deadly and multiyear investigative journalism, a massive corporate coverup was finally exposed… \n\n\t\t\"Revealing that all sets of Genie powers were, in fact, forms of vampirism. \n\n\t\t\"While some heroes did draw power from literal blood, the term was more loosely applied to the psychic and physical theft of all kinds of mental and organic material from others in order to fuel their powers. \n\n\t\t\"Every single Genie hero was revealed to have leeched various essences from hordes of ordinary citizens, in order to power their feats of justice.\n\n\t\t\"And it turned out that the more successful the hero, the more heinous the lengths they went to to fuel their powers.\"\n\n\t\t*page_break\n\n\t\t\"It's safe to say the structure of Gothika took a serious hit with this revelation. \n\n\t\t\"Both the city and the planet lacked adequate resources to police these now-ruined Genies—especially since all Genie technology was destroyed and outlawed, at least in legally approved circles. \n\n\t\t\"As a result, many Genies turned to outright villainism to survive—and in some cases, thrive.\n\n\t\t\"For many months, there seemed no way to remedy the chaotic era brought about after the Fall of the Heroes.\"\n\t\t*goto thatbeeorientation\n\t#[i]Why choose TeamThatbee?[/i]\n\n\t\tThat Bee In Your Bonnet buzzes around several new images, still narrating. The first image populates, a shining and dramatic headshot of Thatbee striking a commanding pose.\n\n\t\t\"The only hero who remained among the entire original Genie population was Thatbee, solely because of the unique nature of her power set: she can absorb and redirect the amount of pain a person has inflicted in their lifetime, either emotional or physical.\n\n\t\t\"It turns out this unique pain-vampirism made Thatbee just about the only Genie whose powers were deemed socially and morally acceptable. Thatbee was thus flooded with requests to help law enforcement somehow police the out-of-control Genie population…\n\n\t\t\"And Thatbee turned that work into her own influential corporate empire.\"\n\n\t\t*page_break\n\n\t\tThe next photo that populates is a full-company portrait of every member of #TeamThatbee.\n\n\t\t\"Thatbee herself is, of course, a trained fighter. Between her physical prowess and her powers, she doesn't require any assistance to take down the rogue Genies she is hired to bring in.\"\n\n\t\t\"However, every boss bee needs a support staff. Thus #TeamThatbee focuses on hiring exclusively from the latest wave of non-Genie, technologically enhanced bounty hunters.\"\n\n\t\tLooking over the members of the support staff, you do note that most of them have some kind of tech-enhancements or specialization. You are quite curious to learn how and why technology operates differently here on Gothika… \n\n\t\tEspecially given your Binaria-finding mission mandate. Obviously, there must be a reason she'd choose to hide here, out of all planets in the Verses Galaxy.\n\t\t*goto thatbeeorientation\n\t#[i]So what we're not going to do…[/i]\n\n\t\tThat Bee In Your Bonnet buzzes around one image, of ten Genies scattered around a smoking battleground.\n\n\t\t\"#TeamThatbee has three rules. One, no other Genies will be hired.\"\n\n\t\t\"Two, we never work for free.\"\n\n\t\t\"And finally, we will never again take cases that involve the Genie Pneumatic, should he ever return. The losses incurred during The Pneumatic Crucible were too great to measure, not limited to but also including the disappearance of eight of our strongest and most deranged Genie targets and valued tech staff.\"\n\n\t\tHearing this, you avoid shifting your eyes to the others. Because hearing about another \"Elite Eight\" called together is starting to be a trend, surrounding the preparations for this Blot War…\n\t\t*goto thatbeeorientation\n\t#I've completed my orientation.\n\t\t*goto endtheorientationtb\n\n*label endtheorientationtb\n\n\"Well, according to this, it sounds like we've come to the right place,\" you respond. \"We're looking to find a missing fugitive who is hiding in disguise as someone else.\"\n\n\"Ah, perhaps our most common type of case,\" Thatbee replies, activating a new menu to display pricing and packages. \"What kind of budget are you working with?\"\n\nLooking over the percentages, each tier offers a different number and rank of #TeamThatbee support staff and varying levels of access to Thatbee's trademarked \"Rogues Gallery Database.\" Naturally, the most expensive packages grant full access to the full files and Thatbee's involvement herself.\n\n\"I am also a tracker-hunter,\" ChantuSe jumps in. \"Finding our target eludes even my senses, but I have narrowed our search to five potential suspects.\"\n\n*page_break\n\nThatbee stares ChantuSe down, effectively sizing her up.\n\n\"Okay, who exactly are you three?\" she asks. \"And who exactly are you looking for?\"\n\nSensing the moment of potential truth has arrived, ChantuSe shifts her eyes to One-Fourteen. $!{Oftze} simply raises ${ofthis} hands, playing innocent. But you can still tell that, somehow, One-Fourteen seems to have more in common with your galactically aware trio than the planetary-sheltered #TeamThatbee.\n\nStill, that's a potential mystery to be solved separately. There are strict Galactic Council laws to prevent aliens from tampering with galactically unaware planets, to avoid evolutionary displacement and exploitation. \n\nSo what you say in this bunker lair could very well have far-reaching consequences, both for your trio and this entire world.\n\n*page_break\n\n\"Told use discretion guide truth,\" Vortal suddenly speaks, his clicking growl startling Thatbee. \"Do worst.\"\n\n\"So the snake-Genie speaks,\" Thatbee challenges. \"I was starting to wonder if he was just some kind of overgrown pet.\"\n\nIgnoring Thatbee's jab, you turn over Vortal's statement. While he might be a snake-thing of few words, his intended meaning is actually quite clear: compel Thatbee to cooperate, no matter the cost.\n\n\"Yet he never speaks for us all,\" ChantuSe cuts back in. \"And we should never break rules simply because we can.\"\n\n[i]Great[/i]. Even if she is still speaking in code, ChantuSe is clearly offering the exact opposite advice as Vortal.\n\n*page_break\n\nJust then, One-Fourteen stands and starts walking across the bunker. \"I can already tell this one is above my pay grade. Call me when you need me. But boss, I'd love to run point or second seat on this case, depending on whether you decide to get involved.\"\n\nThatbee nods, staying strangely silent. You can tell the time for hardball negotiations have arrived. As One-Fourteen leaves the central hub, you're thankful. At least that slightly simplifies the choice taking shape before you.\n\nThe decision on how to inform Thatbee clearly falls to your discretion. Before deciding, you cast a quick purple Shades spell, boosted with Enhancement magic, to wrap this hub in a surveillance-free bubble. \n\nFor the next two minutes, nothing you do can be seen, heard, or recorded.\n*page_break\n\nSo, with the clock now ticking, you weigh your options. You [i]cannot[/i] tell Thatbee the core truth of why you're launching this investigation—you can't tell anyone about the impending Blot invasion without potentially inciting a full panic. \n\nHowever, you feel like the only way Thatbee might understand the full gravity of this situation is if you expose the existence of the Verses Galaxy beyond Gothika's confines. If you do that, then you [i]can[/i] at least impress upon her that the fate of all worlds hinges on your success here on this one planet.\n\nWith this decision settled, now you must consider how to handle unspooling this delicate truth. Because as you've already deduced, it will heavily affect all your relationships here.\n\nEspecially since, so far, you've been casting simple spells that build your skills. But this will be the first complicated spell that will [i]test[/i] your skills instead.\n\n*choice\n\t#Tell Thatbee everything you are allowed to, but implant a mental block in her brain that forbids her from ever speaking out loud about it to anyone outside this circle. [i](Test Shades)[/i]\n\t\t*set thatbeeshadeblock true\n\n\t\tYou have to close your eyes for this spell, because it's one of the most complicated you've ever executed.\n\n\t\tThankfully mental manipulation and shielding fall under the same shades discipline, so your hands and eyes begin to radiate with purple energy.\n\n\t\tThen, as swiftly as you can, you twitch and weave this ultra-complicated spell. \n\n\t\tIt is tricky and delicate work, but you've studied your flirping butt off for years to get this good.\n\n\t\t*page_break\n\n\t\tOnce the work is done, Thatbee's entire face changes, buckling under the weight of this new galactic knowledge. \n\n\t\tAnd then her expression falls further, realizing what you've also done to limit her ability to share this awareness with anyone else.\n\n\t\tSo you witness as Thatbee realizes, in the full force of a moment, that life beyond Gothika exists—vast and far-reaching life. And then as she attempts to grapple with the severity and gravity of your mission. \n\n\t\tAnd finally as she really begins to understand that, once you leave, she'll never be able to talk to anyone about it. Ever.\n\n\t\tThatbee remains speechless, for far more reasons than one.\n\n\t\t*page_break\n\n\t\tWith another wave of your hand, you bring ChantuSe and Vortal up to purple-shaded speed about the spell you just cast. \n\n\t\tChantuSe appears troubled, while Vortal appears absolutely delighted. Meanwhile, Thatbee still appears overwhelmed and disgusted with you. \n\n\t\tThis might have been a ruthless and forceful route to take, but you also know it's what's best for the mission. Thatbee will certainly feel motivated to see your investigation finished successfully, knowing now what you are capable of and what kind of stakes you're dealing in. It's better to be safe and distant than sorry.\n\n\t\t*if (shades > 15)\n\t\t\t*set potency +2\n\t\t\t*set belonging %-5\n\t\t\t*set thatbee %-30\n\t\t\t*set chantuse %-30\n\t\t\t*set vortal %-30\n\t\t\t\n\t\t\tBesides, flexing your skills and knowledge this way feels really good. Not only that, you can tell how much it frightens and impresses the others—some more than others, clearly.\n\n\t\t\t[i](Boosted Bonus Potency. Gained Independence. \"Gained\" Vortal. Lost Thatbee, ChantuSe)[/i]\n\t\t\t*goto nobettertime\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set belonging 50\n\t\t\t*set thatbee %-15\n\t\t\t*set chantuse %-15\n\t\t\t*set vortal %-15\n\n\t\t\tHowever, your proficiency with the shades isn't quite where it needs to be for a spell this complicated. You still manage to pull it off, but strain and sweat drip across your overly reddened face, causing the others to visibly doubt not just your Skill, but also your judgment.\n\n\t\t\t[i](Gained Basic Potency. Balanced Belonging-Independence. \"Gained\" Vortal. Lost Thatbee, ChantuSe)[/i]\n\t\t\t*goto nobettertime\n\t#Tell Thatbee everything you are allowed to by implanting a temporary mental Enhancement boost—one that will expire on its own or at your specific command. [i](Test Enhancement)[/i]\n\t\t*set thatbeeenhancementbubble true\n\n\t\tYou have to close your eyes for this spell, because it's one of the most complicated you've ever executed. It requires delicate perceptive and mental threading that is as easy to rupture as a bubble. It is tricky and delicate work, but you've studied your flirping butt off for years to get this good.\n\n\t\tOnce the work is done, Thatbee's entire face changes, buckling under the weight of this new knowledge. And then realization of what you've done to limit her ability to share it.\n\n\t\tShe realizes, in the full force of a moment, that life beyond Gothika exists—vast and far-reaching life. She understands the severity and gravity of your mission. And she understands, once you leave, this knowledge will disappear from her mind…at least until she potentially discovers it on her own, someday.\n\n\t\tThatbee remains speechless, for far more reasons than one.\n\n\t\t*page_break\n\n\t\tWith another wave of your hand, you bring ChantuSe and Vortal up to speed about the temporary Enhancement spell you just cast. Both appear to think this compromise you've made is satisfactory. It's balancing your relationships and your missions in a move that makes no one completely happy, but no one completely disgusted either.\n\n\t\tIncluding Thatbee, who appears both overwhelmed and relieved at the same time. This knowledge is a heavy burden to carry—but also one she will get to be rid of eventually.\n\n\t\t*if (enhancement > 15)\n\t\t\t*set potency +2\n\t\t\t*set belonging %-5\n\t\t\t*set thatbee %+20\n\t\t\t*set chantuse %+20\n\t\t\t*set vortal %-20\n\t\t\t\n\t\t\tMore than all of this, flexing your skills and knowledge this way feels really good. Not only that, you can tell how much it frightens and impresses the others.\n\n\t\t\t[i](Boosted Bonus Potency. Gained Independence, Thatbee, ChantuSe. \"Gained\" Vortal)[/i]\n\t\t\t*goto nobettertime\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set belonging 50\n\t\t\t*set thatbee %+10\n\t\t\t*set chantuse %+10\n\t\t\t*set vortal %-10\n\n\t\t\tHowever, your proficiency with Enhancement isn't quite where it needs to be for a spell this complicated. \n\n\t\t\tYou still manage to pull it off, but strain and sweat drip across your overly reddened face, causing the others to visibly doubt not just your Skill, but also your judgment.\n\n\t\t\t[i](Gained Basic Potency. Balanced Belonging-Independence. Gained Thatbee, ChantuSe. \"Gained\" Vortal)[/i]\n\t\t\t*goto nobettertime\n\t#Tell Thatbee everything you are allowed, trusting that she will be inspired to do the right thing and keep this knowledge a guarded secret. [i](Test Limit)[/i]\n\t\t*set thatbeetelltruth true\n\n\t\tYou don't close your eyes to cast any complex spells. Instead, you aim to enchant and charm with an open exchange of information. With a simple snap of your fingers, you begin downloading the relevant galactic awareness and mission specs you are allowed to into Thatbee's mind.\n\n\t\tOnce the work is done, Thatbee's entire face changes, buckling under the weight of this new knowledge. She realizes, in the full force of a few life-changing moments, that life beyond Gothika exists—vast and far-reaching life. She understands the severity and gravity of your mission. \n\n\t\tAnd she understands, once you leave, she'll never be able to talk to anyone about it. Ever. Or else she might face punishment on a galactic level. \n\n\t\tThatbee remains speechless, for far more reasons than one.\n\n\t\t*page_break\n\n\t\tLooking to ChantuSe, you can tell she steadily approves of your kind and diplomatic move. But beside her, Vortal appears completely disgusted. This is clearly not the tactic he would have taken.\n\n\t\tBut you're fine with that. This might not be a move that prioritizes the mission in cold, hard terms. But you believe focusing on building trust will help your team morale in the long run. And while Thatbee appears overwhelmed and burdened, she also appears deeply thankful you've trusted her with this potentially world-shattering information.\n\n\t\t*if (unleash \u003c 40) \n\t\t\t*set potency +2\n\t\t\t*set belonging %+5\n\t\t\t*set thatbee %+30\n\t\t\t*set chantuse %+30\n\t\t\t*set vortal %+30\n\t\t\t\n\t\t\tBesides, showing this kind of restraint when you could have done [i]literally[/i] anything else to get your way or your point across? That's a move that is both impressive and inspiring—to some more than others, clearly.\n\n\t\t\t[i](Boosted Bonus Potency. Gained Belonging, Thatbee, ChantuSe. \"Lost\" Vortal)[/i]\n\t\t\t*goto nobettertime\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set belonging 50\n\t\t\t*set thatbee %+15\n\t\t\t*set chantuse %+15\n\t\t\t*set vortal %+15\n\n\t\t\tThough you imagine everyone would have expected you to unleash your might a bit more, so this decision takes them by surprise. Still, it's a move that impresses exactly who you want.\n\n\t\t\t[i](Gained Basic Potency. Balanced Belonging-Independence. Gained Thatbee, ChantuSe. \"Lost\" Vortal)[/i]\n\t\t\t*goto nobettertime\n\n*label nobettertime\n*page_break\n\n\"Well, I'm gonna need a moment,\" Thatbee then says, plopping into a throne-like chair that is obviously intended solely for her. \n\n\"Rogues Gallery, open,\" she says to the holographic pillar. \"Full access, voice recognition password: [i]I'm That Bitch[/i].\"\n\nWith Thatbee's words, the central pillar lights up with the full files of Thatbee's collected rogues. \n\nChantuSe quickly steps up to it, knowing exactly which five suspects she needs to narrow your list down to. How she knows this is yet another question you'll need to have clarified, but that can come later.\n\n*page_break\n\nFor now, you simply watch as ChantuSe works. \n\nAnd in a matter of minutes, she has your suspect list compiled.\n\nThatbee sighs loudly. She clearly would have preferred to have lots more time to process the revelations you hurled at her. She stands and sighs once again, with heavily exaggerated effort.\n\n\"In that case, I know where we need to start,\" she replies, attempting a half-hearted strut. \"But I'll tell you this much…\n\n\"You're going to have to answer a [i]lot[/i] of questions on the ride there.\"\n\n*page_break CHAPTER III\n\n[b]CHAPTER III[/b]\n*line_break\nThatbee has a last known location on your first set of suspects, who happen to be married to each other. \n\nThey apparently recently escaped prison for a [i]third[/i] time, but Thatbee hasn't been hired to track them down again yet. Since no one else has the resources to re-arrest them, the couple has remained free and in hiding.\n\nYou can't help but think how this poor world obviously hasn't figured out how to govern itself or harness its resources fully quite yet. Everyone still seems to squabble with each other for scraps they consider riches. \n\nNot that either of your home planets are perfect, but they at least have systems in place to hold lawbreakers accountable—systems that aren't tied to privatized wealth.\n\n*page_break\n\n\"So, want to know who I really am?\"\n\nOne-Fourteen sits next to you and ${ofthis} words pull you out of your thoughts. \n\nYou currently ride in Thatbee's private blimp, which actually feels more like an airborne submarine. ChantuSe and Vortal are seated with Thatbee in the cockpit, allegedly to answer any galactic questions they can separately from One-Fourteen. \n\nHowever, this arrangement felt like a purposeful move to leave the two of you alone as well.\n\n*page_break\n\nYou've mostly been focusing on the view outside your porthole window so far, because you haven't known what to say to One-Fourteen. \n\n$!{Oftze} still makes you…nervous.\n\n\"As long as you don't expect me to reciprocate,\" you reply, trying to play this cool.\n\n\"But I already know who you are,\" One-Fourteen replies. \"Or at least I can guess, since you've shown up here with a Destructive Versian escort.\"\n\nYou freeze. What the actual flirp? \n\n*page_break\n\n\"I thought Gothikites weren't supposed to know about things like that?\" you try.\n\n\"Before today, I thought I was the only galactically aware being sent by Versus to Gothika to pose as a local,\" One-Fourteen continues. \"But today, the puzzle that has been my life becomes a little clearer.\"\n\n\"Is that why you always seem to speak in riddles?\" you reply, trying to hide your shock over this enormous revelation. \"Puzzles have never taken me very long to complete.\"\n\nOne-Fourteen laughs, somehow charmed by your directness. \n\n\"You want clarity? You got it. The truth no one on Gothika knows, especially not Thatbee, is that I was really born on a planet named Ferve Foree, in the Mibra solar system.\"\n\n*page_break\n\n\"I've read about it,\" you cut in, unable to stop yourself. \"It's infamous for its constant interplanetary civil wars. And it's the first and only system in the known Galaxy that has perfected the process of simple humanoid cloning, thanks to Ferve Foree's specific atmosphere and geographic resources.\"\n\n\"I knew you were a fellow bookworm,\" One-Fourteen chuckles. \"Guilty as charged. You're looking at one of the only clone soldiers to ever defect.\"\n\n\"Wait, what?\" you blurt. \"Isn't that supposed to be genetically impossible, since you clones were literally encoded for loyalty and conformity?\"\n\n\"Ha, well you've just entered a whole planet full of genetic defection and geneifying, so I suppose I'm a good introduction,\" One-Fourteen sighs. \"I actually fit right in here on Gothika, in that regard…\"\n\n*page_break\n\n\"I don't know why I was born different than by clone-siblings, but my brain never quite functioned the way it was supposed to,\" One-Fourteen continues. \"My body is the same as theirs though, built to be expendable: I barely feel any pain, and my vital organs and arteries all instinctively shift away from damage. Plus, I was just as good at the military and weapons training as my clone-siblings.\n\n\"But I could never really fit in, because I always wanted more—and I could never understand why my clone-siblings didn't. In some ways, I was so jealous of their contented complacency. \n\n\"It took some excruciating years, but eventually I made plans to desert during a tactical excursion. It was actually way easier than I expected, because there were no security protocols in place for clone desertion—it had never happened before. \n\n\"I'm sure there are protocols now. Sometimes I wonder if I've doomed another clone-defect like me to a life of forced service…\n\n*page_break\n\n\"Anyway, I stole a ship and fled into the Galaxy. To survive, I then became a bounty hunter/gun for hire and managed to scrape by. All the money I made in first those days actually went to body mods, to express my individuality.\"\n\nAbsorbing this information, you try to bypass the idea that there is a whole planet full of people who look [i]exactly[/i] like One-Fourteen out there. \n\nInstead, you focus on the changes ${oftze} has made to ${ofthis} appearance that you are drawn to most…\n\n*fake_choice\n\t#One-Fourteen has focused on jagged piercings and chaotic tattoos, the hardness of it all contrasting the softness of ${ofthis} features.\n\t#One-Fourteen has focused on platinum and diamond piercings and geometric tattoos, projecting control and clarity.\n\t#One-Fourteen has focused on growing out ${ofthis} hair long and dying it wild colors, to match ${ofthis} bright makeup.\n\t#One-Fourteen has gone for subtle changes, small accessories and inks, to still retain individuality while blending in as much as possible.\n\n\"I always told myself I wanted a little life, the simple things,\" One-Fourteen continues, glossing over the way you drink in ${ofthis} appearance. \"A good home, some friends, a real way to do my part, and to never be called into forced service again. But either it's something inside me, or something the universe has out for me, but I always seem to choose the complicated thing. The chaotic path. The larger call to arms.\n\n\"Long story short, not too far into my period of galactic freedom, I was Selected for Versus. That's how I know ChantuSe; we actually worked pretty closely together for several Cycles. Today, we only had a second to chat privately, while getting ready to board this blimp. But she told me why you're here. Who you are. And…the things you revealed to Thatbee.\"\n\nSaying this, a new emotion passes over One-Fourteen's face, revealing exactly what ${oftze} thinks of the way you decided to handle Thatbee:\n\n*if thatbeeshadeblock\n\tDisapproval.\n\n\t*set onefourteen %-30\n\t[i](Lost One-Fourteen)[/i]\n\n*if thatbeeenhancementbubble\n\tUnderstanding.\n\t\n\t*set onefourteen %+20\n\t[i](Gained One-Fourteen)[/i]\n\n*if thatbeetelltruth\n\tRespect.\n\n\t*set onefourteen %+30\n\t[i](Gained One-Fourteen)[/i]\n\n*page_break\n\nFor better or worse, One-Fourteen keeps talking before you have a chance to explain your decision. Which actually, for now, is probably for the best.\n\n\"Once I had the honor of being Reborn from Versus, I was sent here to Gothika to help prepare the planet for galactic awareness. I've been here for a while, posing as a native, working #TeamThatbee in more ways than one. I was starting to think I had stalled out here, or that the universe had forgotten about me. But then you all showed up and now everything makes a bit more sense.\"\n\nOne-Fourteen looks temporarily serene, saying this. But then ${ofthis} face shifts again.\n\n*if thatbeeshadeblock\n\t\"Once you're gone, I'm going to have to tell Thatbee who I really am. She's going to need someone to talk to, after what you did. Perhaps you can let me into her shade-telling circle?\"\n\n\t\"Hearing all this, the choice I made now makes even more sense,\" you reply, refusing to back down. Still, you snap your spell-fingers. \"But yes, Thatbee should be able to talk freely to you. It's done.\"\n\n\tOne-Fourteen's mouth falls open. Perhaps from shock, perhaps to thank you. Either way, ${oftze} shifts, deciding to drop this particular subject.\n\n*if thatbeeenhancementbubble\n\t\"Once you're gone, it might be time to tell Thatbee the truth about me, about the Galaxy. It'll depend on how she handles the truths you revealed to her. Before she inevitably forgets, of course.\"\n\n\t\"Then my instincts were right, handling that situation,\" you reply, secretly thankful One-Fourteen is in a position to educate Thatbee more properly, when the time comes.\n\n*if thatbeetelltruth\n\t\"Now that Thatbee knows the truth about the Galaxy, it's time to tell her who I really am. Though I'll wait until you're gone. She has enough mind-breaking revelations to cope with for now.\"\n\n\t\"That sounds like the right idea,\" you reply, thankful Thatbee will have someone to guide her through the aftermath of the truths you revealed, when the time comes.\n\n*page_break\n\n\"Thatbee is a fascinating being, a whole bundle of contradictions,\" One-Fourteen muses. \"Ambitious and aimless, desperate for fame and militantly private, morally driven and vacuously greedy, prided as a soloist and still surrounding herself with an army of followers. I really believe in Thatbee. That once she finds her real purpose, she'll be able to lead a more fulfilling life.\" \n\nOne-Fourteen sighs again then. \"Honestly, she reminds me a lot of myself.\"\n\n\"But enough about us,\" One-Fourteen shifts, yet again. \"While we can talk openly, you need to know that I understand the basics about why you're here, and what we must do while you are. I don't need all the details, it'd be dangerous to tell me. But you should know that you have my full support during this investigation, regardless.\"\n\nStaring back at One-Fourteen, so many thoughts and emotions compete for dominance in your mind. However, you try to let the most important sentiment you're feeling rise to the top.\t\n\n*choice\n\t#Tell One-Fourteen that I understand all about what it's like to have birthright obstacles and callings arranged against me—but I also choose chaos to overcome it all. [i](Gain Powerful, Reckless, One-Fourteen)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t*set onefourteen %+20\n\n\t\t*label connectofta\n\n\t\tAs you continue to fly through this perilous, purposeful path, you turn to One-Fourteen to tell ${ofthir} all about your past.\n\n\t\t$!{Oftze} has done the same for you, so you decide to match the same level of breadth of detail ${oftze} offered.\n\n\t\tOne-Fourteen listens intently and with a slight smile on ${ofthis} face, never missing a step or a beat.\n\n\t\t*page_break ONE HISTORY LESSON LATER\n\n\t\tOne-Fourteen takes a moment to consider the highlights—and lowlights—of the brief personal history you've just shared. $!{Oftze} turns the details over a moment or two.\n\n\t\t\"We have a lot in common, don't we?\" One-Fourteen finally replies.\n\n\t\t\"I don't know, I'm not exactly a rebel clone,\" you sigh. \"I'm much more of an outcast, and not by choice.\"\n\n\t\t\"I'm not sure there was lots of choice in my own path, looking back,\" One-Fourteen says. \"Besides, we're both outliers. Both set apart. Both called to something greater by a fluke of birth, validated by the stars themselves. How many people can say all that?\"\n\n\t\t*page_break\n\n\t\tOne-Fourteen's words offer such a forceful sentiment, it almost takes your breath away. \n\n\t\tEspecially because it makes you wonder…\n\n\t\tCould One-Fourteen, this supposed-to-be-infinitely-replicable person, named for a number in an assembly line…\n\n\t\tCould ${oftze} be the first individual in the Galaxy who truly understands what it's like to be you?\n\t\t*goto stsoffer\n\t#Tell One-Fourteen this investigation is just one insignificant part of what I've been called to do in larger service of the Galaxy. [i](Gain Powerful, Responsible. Lose One-Fourteen)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\t\t*set onefourteen %-20\n\n\t\t*label retractofta\n\n\t\tOne-Fourteen turns over your words carefully, as your blimp bumps and turns in the smoggy wind.\n\n\t\t\"I wish you could have met my younger self, the one who was still on the run,\" One-Fourteen finally says. \"You two would have really gotten along.\"\n\n\t\tEven though you're tempted to engage further hearing these words, you leave it at that. After all, you and One-Fourteen are, once again, more like drafted soldiers than kindred spirits. Whatever attraction you might feel—or perhaps even because of that attraction—it's better you keep your distance.\n\n\t\tYour lives might depend on temporarily trusting each other, but you'd also better not get too close.\n\t\t*goto stsoffer\n\t#Tell One-Fourteen I know what it's like to be trapped and outcast—but that I'd never yield the way ${oftze} seems to have. [i](Gain Powerless, Reckless. Lose One-Fourteen)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t*set onefourteen %-20\n\t\t*goto retractofta\n\t#Tell One-Fourteen my full history, so ${oftze} knows I understand the pressures of service and specialized deviation. [i](Gain Powerless, Responsible, One-Fourteen)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t*set onefourteen %+20\n\t\t*goto connectofta\n\n*label stsoffer\n*page_break\n\n\"Well, before we arrive, there are two more things you should know,\" One-Fourteen pivots. \"I don't know what Tellie might have told you back on Distopia about her history with ChantuSe, but I have to say that I'd trust ChantuSe with my life. And I think you can, too.\"\n\n\"You mean Tellie's history on Versus?\" you ask, pretending to know what One-Fourteen is talking about, even though you definitely don't.\n\n\"Yeah, ChantuSe's blindside, the one that got Tellie voted into a Match and nearly killed,\" One-Fourteen alludes, dancing around the edges of the question. It's enough for you to get the basic gist. \n\n\"Right,\" you say. \"Well, for better or worse, I like to make my own judgments of everyone I come across. I respect Tellie, but no one influences my opinions that heavily.\"\n\n*page_break\n\nYou say the words, but you also catalogue this new information away for later. \n\nConsidering Tellie didn't think that \"ChantuSe's betrayal\" was important enough to tell you about, perhaps you really can take One-Fourteen's word for it on trusting ChantuSe. After all, Tellie was fine warning you pretty harshly against Vortal, so you'd think she'd extend that warning to ChantuSe, if she felt the need…\n\n\"The second thing I have for you might help you navigate quite a bit on this galactic journey,\" One-Fourteen moves on.\n\n$!{Oftze} then pulls something out of ${ofthis} uniform and holds it in front of you. From this angle, it looks like some kind of futuristic memory flashstick.\n\n*page_break\n\n\"I was given this gift on Versus,\" One-Fourteen continues. \"I was told it would help me learn more about how to grow into myself on an individual level, while learning about the Galaxy on a cosmic level. I was also told that I'd know exactly who to pass it along to, when the time was right. It's obviously meant for you. Don't ask me how I know, I just do.\"\n\n\"What is it?\" you ask instead.\n\n\"It's a special database called The Spanbook, written by an unknown historian-author who took on the pseudonym 'The Sergiversian Record-Keeper,'\" One-Fourteen answers. \n\n\"If you accept it, you'll be given guidance and tidbits custom-directed at you. However, you might also be given galactically privileged information that others will no doubt desire. Remaining here on Gothika,
