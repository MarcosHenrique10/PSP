ever, your proficiency with Perception isn't quite where it needs to be for a spell this complicated. Thankfully, you still manage to pull it off…but just barely.\n\n\t\t\tStrain and sweat drip across your overly reddened face, causing the others to visibly doubt not just your skill, but also your judgment.\n\n\t\t\t[i](Gained Basic Potency. Balanced Belonging-Independence. Gained ${princese} Kyleigh, F.Spears, P.Savage.)[/i]\n\t\t\t*goto nobettertime\n\t#Tell Leigh everything you are allowed to and trust ${leighze} will be inspired to do the right thing. [i](Test Limit)[/i]\n\t\t*set truthkyleigh true\n\n\t\tYou don't close your eyes to cast any complex spells. Instead, you aim to enchant and charm with your words alone.\n\n\t\tOnce you've finished explaining the basics that you can, Leigh's face changes, buckling under the weight of this new knowledge. $!{Leighze} doesn't exactly look [i]glad[/i] to know this dire information, but ${leighze} certainly understands the stakes now. \n\n\t\tLooking to F.Spears, you can tell she heartily approves of your kind and diplomatic move. \n\n\t\tBeside her, P.Savage looks somewhat disgusted. This is clearly not the tactic he would have taken.\n\n\t\t*page_break\n\n\t\tBut you're fine with that. This might not be a move that prioritizes the mission in cold, hard terms. However, you believe focusing on building trust will help your team morale in the long run.\n\n\t\t*if (unleash \u003c 40) \n\t\t\t*set potency +2\n\t\t\t*set belonging %+5\n\t\t\t*set kyleigh %+30\n\t\t\t*set fspears %+30\n\t\t\t*set psavage %-30\n\t\t\t\n\t\t\tBesides, showing this kind of restraint when you could have done [i]literally[/i] anything else to get your way or your point across?\n\n\t\t\tThat's a move that is both impressive and inspiring—to some more than others, clearly.\n\n\t\t\t[i](Boosted Bonus Potency. Gained Belonging, ${princese} Kyleigh, F.Spears. Lost P.Savage)[/i]\n\t\t\t*goto nobettertime\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set belonging 50\n\t\t\t*set kyleigh %+15\n\t\t\t*set fspears %+15\n\t\t\t*set psavage %-15\n\n\t\t\tThough you imagine everyone would have expected you to unleash your might a bit more, so this decision takes them by surprise.\n\n\t\t\tStill, it's a move that impresses exactly who you want.\n\n\t\t\t[i](Gained Basic Potency. Balanced Belonging-Independence. Gained ${princese} Kyleigh, F.Spears. Lost P.Savage)[/i]\n\t\t\t*goto nobettertime\n\n*label nobettertime\n*page_break\n\n\"Well, couldn't have timed that better.\"\n\nAt first you don't know who Leigh is talking to, until suddenly something floats around the doorway and into the room. It definitely feels like Leigh has some kind of sixth sense about presences somehow, perhaps even instead of traditional sight? You'll have to keep an eye out to investigate, no pun intended.\n\nYou turn your attention to the arriving entity, which you can really only describe as a hovering amorphous orb. But not an orb of energy—more a shell of unshaped physical potential. \n\n\"Meet your Questhing,\" Leigh announces. \"They're the only animals native to QueSummiT and the only ones who can grant entry there. They only show up if your Quest has been deemed worthy. So congratulations are in order, I suppose.\"\n\nExcept something in Leigh's tone feels far more foreboding than congratulatory.\n\n*page_break\n\nThe Questhing then floats beside you. You'd be startled, but its presence just feels warm and protective and nourishing. That feeling only expands as the Questhing nudges you ever so gently on the shoulder. \n\n\"Oh wow,\" Leigh says. \"That's…super rare. It wants to bond with you.\"\n\n\"What does that mean?\" you ask.\n\n\"Usually Questhings just guide questers to the base of QueSummiT and then go about their anonymous business. Occasionally if a Quest is deemed important enough, they offer to bond with a quester to offer them sourcing support. It's a rare honor, especially because the process allows you to help shape and reveal their truest physical form. It's also a bond that can last a lifetime, even outside SeaS.\"\n\n*page_break\n\nHearing all this, it basically sounds like the process of adopting a pet. Or really, like adopting a service pet that will offer protection, strength, and guidance.\n\nBut one that will also probably know you inside and out, for as long as either of you live.\n\nIs that something you want to let into your life, given all the turmoils you face?\n\n*label tick\n*check_purchase questioning\n*choice\n\t#Yes, I'd like to bond with this Questhing as a skills-boosting companion I can further customize. [i](Balance Belonging-Independence)[/i]@{choice_purchased_questioning | [i](Requires In-App Purchase)[/i]}\n\t\t*check_purchase questioning\n\t\t*if choice_purchased_questioning\n\t\t\t*label questioning_purchased\n\t\t\t*set belonging 50\n\t\t\t*set unlockedquesthing true\n\t\t\t*goto postquesthing\n\t\t*else\n\t\t\t[b]Questhing Bonding[/b]\n\n\t\t\tBond to your unique Questhing! Not only will you customize the name and appearance of this rare pet, your Questhing will provide strategy tips and boost the necessary Stats at key points, while accompanying you on all your adventures across worlds.\n\t\t\t*purchase questioning $0.99 questioning_purchased\n\t\t\t*page_break No, Thanks\n\t\t\t*goto tick\n\t#No, bonding wouldn't be fair to this Questhing given the tasks I face. [i](Gain Belonging)[/i]\n\t\t*set belonging %+5\n\t\t*goto postquesthing\n\t#No, bonding with this Questhing would reveal too much about me. [i](Gain Independence)[/i]\n\t\t*set belonging %-5\n\t\t*goto postquesthing\n\n*label postquesthing\n\n*if unlockedquesthing\n\n\tThe Questhing hovers at your shoulder, its shell opening to you as if it has already registered your decision.\n\n\tSomehow, you can tell that the bonding process serves two functions:\n\n\tFirst, to boost your own inherent skills, as an opening gift.\n\n\tSecond, to give your Questhing uniqueness and independence by helping shape its own physical form.\n\n\t*choice\n\t\t#My Questhing will be a tarsier, cute and cunning. [i](Boost Bonus Perception)[/i]\n\t\t\t*set perception +10\n\t\t\t*set questhingtarsier true\n\n\t\t\tAs your Questhing's shell retracts fully, it finally falls off.\n\n\t\t\tUnderneath, you find a floating tarsier, shaded in your favorite colors. It's the cutest creature you've ever encountered, like it has been born straight out of your imagination, as an extension of your own self.\n\t\t\t*goto namequesthing\n\t\t#My Questhing will be a griffin, cutting and fierce. [i](Boost Bonus Technology)[/i]\n\t\t\t*set technology +10\n\t\t\t*set questhinggriffin true\n\n\t\t\tAs your Questhing's shell retracts fully, it finally falls off.\n\n\t\t\tUnderneath, you find a floating griffin, shaded in your favorite colors. It's the mightiest creature you've ever encountered, like it has been born straight out of your imagination, as an extension of your own self.\n\t\t\t*goto namequesthing\n\t\t#My Questhing will be a spider, shadowy and silent. [i](Boost Bonus Perception)[/i]\n\t\t\t*set perception +10\n\t\t\t*set questhingspider true\n\n\t\t\tAs your Questhing's shell retracts fully, it finally falls off.\n\n\t\t\tUnderneath, you find a floating spider, shaded in your favorite colors. It's the fiercest creature you've ever encountered, like it has been born straight out of your imagination, as an extension of your own self.\n\t\t\t*goto namequesthing\n\t\t#My Questhing will be a shark, fast and deadly. [i](Boost Bonus Technology)[/i]\n\t\t\t*set technology +10\n\t\t\t*set questhingshark true\n\n\t\t\tAs your Questhing's shell retracts fully, it finally falls off.\n\n\t\t\tUnderneath, you find a floating shark, shaded in your favorite colors. It's the deadliest creature you've ever encountered, like it has been born straight out of your imagination, as an extension of your own self.\n\t\t\t*goto namequesthing\n\t\n\t*label namequesthing\n\n\tWhich takes on even more significance when it asks you for a name.\n\n\tThinking carefully, you decide to name your Questhing:\n\n\t*choice\n\t\t#Otish.\n\t\t\t*set questhing \"Otish\"\n\t\t\t*goto questhingspeaks\n\t\t#Rosalea.\n\t\t\t*set questhing \"Rosalea\"\n\t\t\t*goto questhingspeaks\n\t\t#Renai Seance.\n\t\t\t*set questhing \"Renai Seance\"\n\t\t\t*goto questhingspeaks\n\t\t#Lvck.\n\t\t\t*set questhing \"Lvck\"\n\t\t\t*goto questhingspeaks\n\t\t#Fver.\n\t\t\t*set questhing \"Fver\"\n\t\t\t*goto questhingspeaks\n\t\t#Nightmid.\n\t\t\t*set questhing \"Nightmid\"\n\t\t\t*goto questhingspeaks\n\t\t#Loneli.\n\t\t\t*set questhing \"Loneli\"\n\t\t\t*goto questhingspeaks\n\t\t#I'd like to input a custom name.\n\t\t\t*input_text questhing\n\t\t\t*goto questhingspeaks\n\n\t*label questhingspeaks\n\t*achieve questthingguide\n\n\t[i]${questhing}[/i], it says out loud. \n\n\tOr no, that voice projects into your mind, more as a feeling than with words.\n\n\tIt's a clear sign you are now telepathically bonded to ${questhing}, your Questhing companion…\n\n\tFor this Quest, and every future one to come.\n\n\t*page_break\n\t*goto bodingover\n*else\n\t*goto bodingover\n\n*label bodingover\n\n\"Well, the time has come,\" Leigh says, moving towards the door with a great sigh.\n\nWhich makes sense, because ${questhing} also turns and floats back out the grand doors.\n\nObviously, you're about to be led to this grand Quest.\n\nYou're not sure if you should be excited or terrified by the fact that you have absolutely zero idea what comes next.\n\n*page_break CHAPTER III\n\n[b]CHAPTER III[/b]\n*line_break\nIt turns out QueSummiT is on the opposite end of The Isle of QueS, facing the ocean on the tip of the island.\n\nApparently there are extensive banishment protocols in place for any off-world beings who land on SeaS uninvited, but even questing visitors who have been summoned to QueS are barely deemed legal. \n\nAs a result, sightings or interactions between locals and off-worlders, even invited ones, are out of the question. \n\nThis is why ${questhing} has led you on a trail around the rim of QueS, through a series of forest bluffs overlooking the most vibrant turquoise ocean you've ever seen.\n\n*page_break\n\nYou've kept pace with Leigh while P.Savage and F.Spears trail behind, seeming to want to give you some space on purpose. \n\nThat, and they seem to be fighting about something in harsh whispers on their own.\n\nYou can't hear much over the sound of the waves crashing against amethyst and jade rocks, or the wind rattling the auburn and violent trees along the path. \n\nThe salt air feels wonderful, almost balancing out the ache in your legs from this lengthy hike. You have no choice but to trudge on, following the steady lead of ${questhing} up ahead.\n\n*page_break\n\n\"So what, you don't have transport vehicles on SeaS?\" you ask Leigh.\n\n\"I'm told The MainlanD has plenty,\" Leigh answers. \"But The Isle of QueS is small enough to traverse by foot. Plus, most of us QueSons have artifacts that aid in motion.\"\n\n\"Is that what your scepter does?\"\n\n\"Sceptleigh is capable of dozens of functions, as one of the most ancient artifacts on QueS,\" Leigh begins. \"But its functions sharpened once it bonded to my unique genetic map.\"\n\n\"Do artifacts choose their hosts, like Questhings?\" you ask, your voice earnestly curious. The nerdy student in you is showing, the part of your brain that demands to know exactly how things like this work.\n\n*page_break\n\nLeigh seems able to tell. \"Not that we know of. But there are customs and traditions surrounding artifact ownership, plus there's the matter of natural compatibility. In this case, Sceptleigh was passed down to me from my Mother.\"\n\n\"Ah, so a royal inheritance,\" you reply. \"Is your mother the Queen of QueS?\"\n\n\"We have no monarchy,\" Leigh answers. \"But we do have a pantheon that informs the religions across all of SeaS. My Mother is the Goddess of Light, perhaps one of the most important positions on the planet. The children of all the pantheonic deities are given royal titles and reside in the Castle of Ascension.\"\n\nSo many questions buzz through your brain, you don't even know where to begin. Once again, Leigh seems able to tell, genuinely tickled by your curiosity.\n\n*page_break\n\n\"I am not my Mother's only child, nor would my ascension to become the ${gode} of Light be guaranteed, even if I were,\" Leigh continues for you. \"Still, there are many perks to being a child of the pantheon, as you've seen. Sceptleigh, which went by a different name before our era together, might be my favorite.\"\n\n\"The perks of a birthright are always easy to see,\" you reply. \"The downsides? Not as much. I'm more curious about those.\"\n\nLeigh doesn't smile, but the expression ${leighze} shares with you is far warmer and runs much deeper. \n\n\"Pantheonic children are born to prove our worthiness. We are given obstacles to overcome, some more purposeful than others. My obvious obstacles? I was born blind, but with a sixth sense to glimpse refractions and auras. Learning how to use my emerald eyes, Sceptleigh, and the Shard sentries to 'see' has been my life's work so far.\n\n\"That, and surviving the entrapments of the Pyre of Desyre, the mythical beast of lust and longing that has set his ravenous eyes upon me since birth. He is always enacting these elaborate plans and grand gestures to win my love, most of which are twisted and villainous by any standards.\"\n\n*page_break\n\n\"So why haven't you killed the mother-flirper yet?\" you ask.\n\nLeigh laughs. \"Would that I could. Mythical beasts are about as difficult to kill as they are impossible to appease. Figuring out how to defeat the Pyre of Desyre is definitely part of my obstacle of worthiness.\"\n\n\"So why not just leave?\" you pose. \"Ignore the traps they set for you and start a new life on The MainlanD. Or on another planet altogether?\"\n\n\"I have never left The Isle of QueS and I have no desire to, no pun intended,\" Leigh answers. \"There is no more perfect place in all the Galaxy.\"\n\n*page_break\n\n\"And you know this because…?\" you begin, already second-guessing your own question. \n\nYou can already sense yourself how special this island paradise is—thriving and teeming with lush vibrancy, a rare place hidden away on an equally rare planet.\n\n\"We are a people taught to be content with knowing that we are where we're supposed to be, that all we seek is right here. Because everything that we protect here is also deeply vital. So we are content with our resources, our beauties, our artifacts, our obstacles, our trials, and our Quests. We believe in the inherent power of one's home.\"\n\nYou've always heard there are two ways to be wealthy: to get everything you want, or to want what you already have. You suppose the latter is slightly easier on a paradise planet like SeaS, for the ${princese} of a magical and mythical island.\n\n*page_break\n\n\"Besides, everyone on SeaS is taught all about the planets of the Verses Galaxy in our primary education,\" Leigh adds. \"Tell me, why did you leave a haven like Distopia, after all that your people sacrificed to gain their autonomy from Blende?\"\n\nThe question nearly stops you in your tracks. \n\nIt tells you vast amounts about the things Leigh can [i]really[/i] see.\n\n*choice\n\t#Tell Leigh all about the birthright obstacles arranged against me—and how I will shatter them all with my unprecedented power. [i](Gain Powerful, Reckless, ${princese} Kyleigh)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t*set kyleigh %+20\n\n\t\t*label connectleigha\n\n\t\tAs you continue to walk this perilous, purposeful path, you turn to Leigh to tell ${leighhir} all about your past.\n\n\t\t$!{Leighze} has done the same for you, so you decide to match the same level of breadth of detail ${leighze} offered.\n\n\t\tLeigh listens, never missing a step or a beat.\n\n\t\t*page_break ONE HISTORY LESSON LATER\n\n\t\tLeigh takes a moment to consider the highlights—and lowlights—of the brief personal history you've just shared.\n\n\t\t\"We have a lot in common, don't we?\" ${leighze} replies.\n\n\t\t\"I don't know, I'm not exactly a young royal,\" you sigh. \"I'm much more of a young rebel, and not by choice.\"\n\n\t\t\"Sometimes those two can be the same thing,\" Leigh says. \"Besides, both of us just want to be seen and loved for who we are, not because of how we were born.\"\n\n\t\t*page_break\n\n\t\tLeigh's words, however delicately delivered, nearly knock you off the trail. \n\n\t\tIt's such a forceful statement, it almost takes your breath away. \n\n\t\tEspecially because it makes you wonder…\n\n\t\tCould Leigh be the first person in the Galaxy who truly understands what it's like to be you?\n\t\t*goto briderarrival\n\t#Tell Leigh this Quest is just a small part of what I've been called to do in service of the Galaxy. [i](Gain Powerful, Responsible. Lose ${princese} Kyleigh)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\t\t*set kyleigh %-20\n\n\t\t*label retractleigha\n\n\t\tLeigh turns over your words as carefully as each step ${leighze} takes along this path.\n\n\t\t\"It's a shame you see things that way,\" Leigh finally says. \"But I can't say I don't understand, on some level.\"\n\n\t\tHearing these words, you leave it at that. After all, the two of you are more like drafted soldiers than anything else. Your lives might depend on temporarily trusting each other, but you'd also be better off not getting too close in the long run.\n\n\t\tWhen the time inevitably comes to make some tough calls, you'll thank yourself for keeping things untangled.\n\t\t*goto briderarrival\n\t#Tell Leigh I can recognize someone trapped in a gilded cage when I see it, because I have been there myself. [i](Gain Powerless, Reckless. Lose ${princese} Kyleigh)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t*set kyleigh %-20\n\t\t*goto retractleigha\n\t#Tell Leigh my history so ${leighze} knows I understand the duty and pressure of wielding such power. [i](Gain Powerless, Responsible, ${princese} Kyleigh)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t*set kyleigh %+20\n\t\t*goto connectleigha\n\n*label briderarrival\n*page_break\n\n${questhing} stops floating in front of you, and that's when you pause and finally look up.\n\nIt turns out QueSummiT is a literal mountain, towering high and mighty. Especially because it is a mountain made entirely of silver and gold.\n\nA bronze road with a platinum rail guard spirals around and around up the entire mountain, until finally reaching a diamond peak. \n\nQueSummiT shines so brightly with all its precious gleams, you have to almost immediately look away once again.\n\n*page_break\n\n\"Take a moment to catch your bearings and your breath,\" Leigh says as P.Savage and F.Spears catch up. \"It might look accessible from here, but reaching the base of QueSummiT is actually one of the trickiest endeavors on all of SeaS, even with the guidance of a Questhing.\"\n\n${questhing} turns to your party, seeming to almost…shrug? You can read its expression: \n\n[i]Pray to whatever deities you believe in for luck and strength…[/i]\n\n[i]Because we're going to need an abundance of both.[/i]\n\n*page_break THE CROSSING OF TREACHERY\n\nYou used to love playing \"the floor is lava\" when you were a little kid, but it turns out you have a different feeling about the experience in real life.\n\nAs you amble across a series of increasingly narrow footbridges and ledge-paths, you keep glancing down at the deadly liquid ground hundreds of feet below. It happens to also be absolutely stunning, all moving rivers of sparkling glacial masses in a kaleidoscope of jewel tones.\n\nYou have to take Leigh's word for it that this world wonder is molten-hot and coursing with its own mega-dense gravitational pull. Falling would apparently prove deadly, even for someone who could fly.\n\nYou try to return your focus to your feet, but you are distracted once again as something howls above you. Looking up into the bright blue sky studded with distant daytime moons, you have to blink to try and believe what you see.\n\n*page_break\n\nAbove you flies a large, human-shaped whaleshark. It has pastel scales that glitter in the sunlight and razor-sharp teeth made of gemstones. \n\nOn its back sit two humanoid figures wearing breathing-helmets, signalling that they must have descended through the atmosphere from a ship. \n\nUnless they rode this swimming beast through space itself?\n\n\"It can't be…\" Leigh says from ${leighhis} spot leading the party, raising a hand to cover ${leighhis} shock-struck mouth.\n\n*page_break\n\nBefore Leigh can explain, one of the figures removes her helmet to reveal cascading lavender hair. \n\nShe then jumps gracefully from the beast's back and flips into a floating position, suspended in midair by a lattice of energy that extends from an enormous bejeweled necklace across her chest. \n\nShe wears a delicate all-pink lace bodysuit over her heavily pierced purple skin. She is also covered with statement jewelry and accessories from the tip of her crown to the soles of her sky-high heels. \n\n\"How in all accursed hell did Empiria Bloom find a way here?\" P.Savage curses at F.Spears. \"And since when does she work alongside her archnemesis?\"\n\n*page_break\n\n\"The Night Orchid goes where the money sends 'em,\" the second humanoid responds, removing their helmet while still atop the swimming beast. \n\nThey have spiky dyed-neon-pink hair and they also wear a black bodysuit, but theirs is covered with spiraling orchids, coated in a midnight-sky sheen. \n\n\"The high aspect of the pink shade is paying handsomely enough for us to put aside our petty differences,\" they finish.\n\n\"But you three I'd hunt for free, alongside the devil himself,\" Empiria Bloom adds. \"You foul Destructives scouring the Galaxy for weapons of mass destruction to become omnipotent. And your pet freak of nature, whose very existence insults the rules of harmonic reality.\"\n\n*page_break\n\nHearing these words, you feel a familiar heat burn under your skin. \n\nAs always, these flung insults ring with half-truths, fully misunderstanding the fundamentals at hand here. You find your eyes settling on F.Spears, who stands nearest.\n\n\"There's no use convincing them otherwise,\" she whispers, also seeming to bristle under the weight of these accusations. \"Take what you need to know.\"\n\nUnderstanding, you blink your eyes to cast another simple spell.\n\n*temp treece true\n*temp ebloom true\n*temp norchid true\n\n*label learnshadesfoes\n*choice\n\t*selectable_if (treece) #Glean multiple perceptions of this high aspect of the pink shade. [i](Gain Double Perception)[/i]\n\t\t*set perception +4\n\t\t*set treece false\n\n\t\tSuddenly, a scene flashes in your mind, pulled from the collective perceptions of the Destructive Eight. You can tell this is a memory, but one that F.Spears and P.Savage also witnessed secondhand, just as you are now. Whether it belongs to ChantuSe, Chalice, Hunteress, The Wicked Wone, Squimli, or all of them, you cannot tell.\n\n\t\tWhat you can glean is a muscled woman standing in some foreign arena. She is clad in an ever-shifting fluid pink bodysuit and symbols swirl across her skin—hearts and brains and crowns—in random patterns. \n\n\t\tThat is, until she is brutally slayed by a rival goddess, burned up in a bright flash of unyielding Wone fury.\n\n\t\tYou can only imagine this is a glimpse into the ultra-secretive planet Versus. But before you can process that awe-inspiring revelation, you are confronted with an image of the replacement for this once-mighty high aspect…\n\n\t\t*page_break\n\n\t\tTori Reece, the new principal avatar and high aspect of the pink shade. You try to catch a glimpse of her, but your mind only processes pink-hued shapes: organs and emojis and thrones.\n\n\t\tThen you receive a blast of perceptive feeling from Tori Reece: that she is too fresh to understand what the sectbooks have to say about the Blots. She believes that the Destructive Eight, whom she holds responsible for the demise of her predecessor, are seeking galactic power for purely selfish reasons.\n\n\t\tAnd most of all, the new high aspect believes your ability to twist and defy the shades is pure sacrilege.\n\n\t\tFor better or worse, her newly adopted pacifist code prevents her from acting on these beliefs…So she has hired dubious shade agents to do the bidding too dark for her this mandated code. \n\t\t*goto learnshadesfoes\n\t*selectable_if (ebloom) #Aggregate a readout on Empiria Bloom, agent of the pink and purple shades. [i](Gain Technology)[/i]\n\t\t*set technology +2\n\t\t*set ebloom false\n\n\t\t[b]EMPIRIA BLOOM[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] Once a ruthless monarch of her native homeworld, Empiria gave up her throne after converting to the way of shades. Given her formerly wicked ways, she has agreed to repent by becoming a knife to stop injustice against the shades, allowing countless others to maintain a pacifist code. \n\t\t*line_break\n\t\t[b]Powers:[/b] A pink shade specialist of superior force blasts. A purple shade specialist of royal command.\n\t\t*line_break\n\t\t[b]Weapons:[/b] A vast array of accessories and jewelry collected throughout the Galaxy that serve various offensive and defensive purposes.\n\t\t*line_break\n\t\t[b]Classification:[/b] Galactic-Level Agent, Near Omnipotent.\n\n\t\t*goto learnshadesfoes\n\t*selectable_if (norchid) #Aggregate a readout on The Night Orchid, agent of the pink and black shades. [i](Gain Technology)[/i]\n\t\t*set technology +2\n\t\t*set norchid false\n\n\t\t[b]THE NIGHT ORCHID[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] Once a ruthless assassin and bounty hunter, they reformed after converting to the way of the shades. Inspired by the agency of Empiria Bloom, The Night Orchid follows her missions to clean up any loose ends too frayed for her to finish. They hope to someday win Empiria's love by proving to be her equal, an endeavor that stokes the flames of competition for shade-related missions between these two.\n\t\t*line_break\n\t\t[b]Powers:[/b] A pink shade specialist of hypnosis and symbiosis. A black sect specialist of predatory nature.\n\t\t*line_break\n\t\t[b]Weapons:[/b] Often bonds by force with deadly space predators.\n\t\t*line_break\n\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\t*goto learnshadesfoes\n\t#I'm finished learning.\n\t\t*goto warnedgalagents\n\n*label warnedgalagents\n\nYou were warned that galactic agents and heroes would be sent to stop you, thinking their cause profoundly just and your own intentions disturbingly foul. You didn't know they'd be as powerful as your spell-research makes this pair sound, however.\n\n\"Whoever you are,\" Leigh begins shouting. \n\nYou expect ${leighhis} fury to be directed at you, given the accusations of these shade agents. Instead, ${leighze} points upwards at the newly arrived pair, shaking with rage. \n\n\"You sit upon the most revered champion of the deep, the long-lost SeaSovereign, the greatest hero this world has ever known, whose disappearance has been mourned daily. And you have used some foul magic to tame him, so you may gain entry onto our sacred world. You are decidedly unwelcome here.\"\n\n*page_break\n\nThat's when you notice that one of The Night Orchid's midnight stems is attached to this SeaSovereign like an umbilical cord, clouding the beast's enormous eyes in a milky swirl. \n\nThat's also when you notice this stem suddenly begins to retract and shrivel to stardust before your eyes.\n\nIn that same moment, you remember that shade magic doesn't seem to work here in this particular pocket dimension. You still don't know why—perhaps it's all the artifact interference—but this restriction might actually give you a fighting chance against these all-powerful beings if utilized properly. \n\nQuickly, you blink again to cast another spell, one that will allow your party to communicate mentally, lacing everyone with perceptive tech.\n\n*page_break\n\n\"They don't know yet that they can't access their shade expertise here,\" you project silently.\n\n\"We know about the shades and Wone creashionism here on SeaS,\" Leigh replies in your minds. \"But neither hold any power on our planet. No one knows why for sure.\"\n\n\"Be that as it may,\" P.Savage begins, \"Empiria Bloom still remains loaded with enough accessory-weaponry to take you all out. Except for me, of course.\"\n\n\"I can use The Night Orchid's persuasive charms against him, if I have the upper hand,\" F.Spears then adds, not bothering to quibble with P.Savage.\n\n*page_break\n\n\"I have to make sure the SeaSovereign is safe and severed from influence first,\" Leigh states. \"But then I can invoke the SeaS banishment protocols to expel any uninvited beings.\"\n\nYou nod, and within the next second your allies spring into the sky. \n\nAs they do, ${questhing} floats beside you.\n*if unlockedquesthing\n\n\tIn the split seconds before this first battle is joined, ${questhing} opens its mouth quite widely. And it appears as if its very teeth might be made of…\n\n\tArtifacts?\n\n\t*page_break\n\n\tSaving that nugget for later, you happily accept the help.\n\n\tEspecially feeling how ${questhing} then conveys that your Powerfulness and Powerlessness will matter most in the fight you face. \n\n\tStill, you check your levels and decide to accept:\n\n\t*temp urnofunpredictabilitya 0\n\t*rand urnofunpredictabilitya 1 4\n\n\t*choice\n\t\t#The Patch of the Powerless and the Powerful. [i](Auto Boost Stronger Stat)[/i]\n\t\t\t*if (powerful >= 50)\n\t\t\t\t*set powerful %+30\n\n\t\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Powerful level rise higher.\n\n\t\t\t\t[i](Powerful Patched)[/i]\n\t\t\t\t*goto decidesupportagents\n\t\t\t*else\n\t\t\t\t*set powerful %-30\n\n\t\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Powerless level rise higher.\n\n\t\t\t\t[i](Powerless Patched)[/i]\n\t\t\t\t*goto decidesupportagents\n\t\t#The Ringlet of the Responsible and the Reckless. [i](Auto Boost Stronger Stat)[/i]\n\t\t\t*if (reckless >= 50)\n\t\t\t\t*set reckless %+30\n\n\t\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Reckless level rise higher.\n\n\t\t\t\t[i](Reckless Ringlet)[/i]\n\t\t\t\t*goto decidesupportagents\n\t\t\t*else\n\t\t\t\t*set reckless %-30\n\n\t\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Responsible level rise higher.\n\n\t\t\t\t[i](Responsible Ringlet)[/i]\n\t\t\t\t*goto decidesupportagents\n\t\t#The Urn of Unpredictability. [i](Double-Strength Boost, But Randomly Applied)[/i]\n\n\t\t\t*if (urnofunpredictabilitya = 1)\n\t\t\t\t*set powerful %+60\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Powerful level rise exponentially higher.\n\n\t\t\t\t[i](Powerful Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilitya = 2)\n\t\t\t\t*set powerful %-60\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Powerless level rise exponentially higher.\n\n\t\t\t\t[i](Powerless Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilitya = 3)\n\t\t\t\t*set reckless %+60\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Reckless level rise exponentially higher.\n\n\t\t\t\t[i](Reckless Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilitya = 4)\n\t\t\t\t*set reckless %-60\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Responsible level rise exponentially higher.\n\n\t\t\t\t[i](Responsible Double Boosted)[/i]\n\n\t\t\t*label decidesupportagents\n\t\t\t*page_break\n\n\t\t\t${questhing} then separates from you, seeking shelter from the battle about to rage overhead.\n\n\t\t\tWith a thankful nod, you turn your newly equipped self to fight.\n\t\t\t*goto decidesupportagentssecond\n*else\n\tSomehow you can tell it would help you, if you were bonded. Instead, it just watches on and waits for your party to be ready for forward progress again.\n\t*goto decidesupportagentssecond\n\n*label decidesupportagentssecond\n\nLooking up, you must decide where to lend your necessary support, casting another straightforward spell to build your skills.\n\n*temp questcoins 0\n\n*choice\n\t#Create a massive energy cannon to help fuel P.Savage's energy telekinesis. [i](Test Powerful. Gain P.Savage, Technology)[/i]\n\t\t*set technology +4\n\n\t\tP.Savage flies up at Empiria, lifted telekinetically by a thin layer of energy he pulse-generates around his body. In response, she raises her hands to throw some shade magic down at him. But all that forms around her many-ringed fingers are pinkish-purple sparks.\n\n\t\tSeizing upon this moment of shade-shortout confusion, P.Savage reaches out with his energy telekinesis to remove the lattice-net that keeps Empiria afloat. Except, as he nudges the energy strings, they suddenly snap back and instead of dissipating, forming a shield around Empiria.\n\n\t\tIt looks like the energy from her accessories behaves differently, enchanted as it is. Well, that's fine. Breaking enchantments is your whole gig.\n\n\t\tIt's time to show everyone just how Powerful you can be.\n\n\t\t*page_break\n\n\t\tWith one hand, you cast a Technology spell to construct a proton energy cannon. With the other, you find the root connection binding this magical tech's lattice strings.\n\n\t\tFirst, you open your palm to detach those defensive strings, dismantling the shield lattice. Then you close your other fist to fire a wide beam from the proton cannon.\n\n\t\tHowever, Empiria drops out of the sky, no longer held afloat by her latticework. Which means your shot misses her, despite its staggering width. \n\n\t\tThankfully, that's what P.Savage is here for. Using his energy telekinesis, he redirects your beam to slam Empiria into the bridge-ground from above.\n\n\t\tShe crunches hard into the path, though you imagine P.Savage intended to send her into the lava glaciers below. Either way, some new shielding jewel kicked in eventually to protect her from the brunt of these blows.\n\n\t\t*page_break\n\n\t\t*if (powerful > 65)\n\t\t\t*set psavage %+20\n\t\t\t*gosub shadeagentspositive\n\t\t\t*goto shadeagentsover\n\t\t*else\n\t\t\t*set psavage %+10\n\t\t\t*gosub shadeagentsnegative\n\t\t\t*goto shadeagentsover\n\t#Enhance F.Spears's charms with supplemental illusions. [i](Test Powerless. Gain F.Spears, Perception)[/i]\n\t\t*set perception +4\n\n\t\tF.Spears takes flight off the path—you almost forgot she could fly in the first place. \n\n\t\tIn response, The Night Orchid grips the SeaSovereign to maneuver into an offensive position. Except they don't yet realize their shaded connection has rotted away here on SeaS.\n\n\t\tBefore they can get any kind of bearings, you twitch your fingers to cast an illusory spell. You project a swarm of giant wasps around The Night Orchid, causing them to lose their balance and fall off the SeaSovereign.\n\n\t\tWhile Leigh moves to procure the SeaSovereign, F.Spears reaches out to The Night Orchid with her signature golden web-wisps. The Night Orchid then focuses on swatting the wasps midair, so F.Spears easily grabs hold of them…\n\n\t\t*page_break\n\n\t\tAnd slams them down using her strength and strings.\n\n\t\tThe Night Orchid smashes into the ground of the path with a thud.\n\n\t\tPart of you wishes you'd let loose on them more…\n\n\t\tBut given the perilous perch of this path and the deadly molten flow below, showing restraint was probably very smart. \n\n\t\t*page_break\n\n\t\t*if (powerful \u003c 35)\n\t\t\t*set fspears %+20\n\t\t\t*gosub shadeagentspositive\n\t\t\t*goto shadeagentsover\n\t\t*else\n\t\t\t*set fspears %+10\n\t\t\t*gosub shadeagentsnegative\n\t\t\t*goto shadeagentsover\n\t#Help ensure the SeaSovereign's magical bonds are fully broken. [i](Test Balanced Belonging-Independence. Gain ${princese} Kyleigh, Half Technology, Half Perception)[/i]\n\t\t*set technology +2\n\t\t*set perception +2\n\n\t\tThe chord that controls the SeaSovereign may be decaying, but not fast enough. So with one hand, you cast a technological spell to build an automatic scythe, buzzing like a chainsaw.\n\n\t\tWith the other hand, you cast a perceptive spell that lights up a sign only the SeSovereign can see:\n\n\t\t[b]You are free.[/b]\n\n\t\tThen you flick your wrist, getting the scythe to slice through the remainder of the controlling chord.\n\n\t\t*page_break\n\n\t\tIn the next moment, the SeaSovereign twists and bucks, sending The Night Orchid flying off.\n\n\t\tBeside you, Leigh shines a light from Sceptleigh, a beacon shining towards the ocean beyond.\n\n\t\tAs The Night Orchid falls onto the path with a crunching thud, the SeaSovereign—now fully freed—swims with ease up through the sky…\n\n\t\tExperiencing a perfect balance of belonging and independence.\n\n\t\t*page_break\n\n\t\t*if (belonging = 50)\n\t\t\t*set kyleigh %+20\n\t\t\t*gosub shadeagentspositive\n\t\t\t*goto shadeagentsover\n\t\t*else\n\t\t\t*set kyleigh %+10\n\t\t\t*gosub shadeagentsnegative\n\t\t\t*goto shadeagentsover\n\n*label shadeagentspositive\n*set belonging %+5\n*set becoming +4\n*set questcoins +3\n*achieve shadeagentshandled\n\nIn the next moment, three platinum coins suddenly materialize in your palm. \n\nLooking down, you see QueSummiT's mountainous ridges etched into their shiny surfaces. \n\nObviously, these have been awarded for your flawless preliminary efforts at this base state. You have a feeling you're going to need as many of these coins as you can earn to succeed in your Quest.\n\n[i](Gained 3 Quest Coins)[/i]\n*line_break\n[i](Gained Belonging, Boosted Bonus Becoming)[/i]\n*return\n\n*label shadeagentsnegative\n*set belonging 50\n*set becoming +2\n*set questcoins +1\n\nIn the next moment, one platinum coin suddenly materializes in your palm. Looking down, you see QueSummiT's mountainous ridges etched into its shiny surface. \n\nYou've only been granted this single coin, however. Somehow you can feel this lonesome QueSummiT coin feels you didn't play into your greatest strengths with this preliminary salvo. It's a good warning for how to go about procuring more coins in the future trials to come. You have a feeling you're going to need as many of these coins as you can earn to succeed in your Quest.\n\n[i](Gained 1 Quest Coin)[/i]\n*line_break\n[i](Balanced Belonging-Independence, Gained Basic Becoming)[/i]\n*return\n\n*label shadeagentsover\n*page_break\n\nLooking around, you see the others all held their own. The SeaSovereign already swims higher up into the sky to escape the fray, now that they have been freed. Empiria Bloom and The Night Orchid are temporarily stunned, though you can tell that won't last for long.\n\nLuckily Leigh stands ready. Next, you assume ${leighze} begins to invoke the SeaS banishment protocols ${leighze} mentioned, for ${leighze} chants words that not even the translators can relay. \n\nLight then shines from Sceptleigh, and far more quickly than you expect, an energy dragnet drops out of the sky. It tightens around Empiria Bloom and The Night Orchid, stretching taught.\n\nThen, in the blink of an eye, this net flings both of their bodies back out into space. \n\n[i]Literally.[/i]\n\n*page_break\n\nYour first thought is whether these two shade agents will survive this brutal planetary ejection process. \n\nThough the answer is probably yes, given all the resources at their disposal. \n\nEither way, they're no longer your problem. They can't re-access SeaS now without the SeaSovereign.\n\n*fake_choice\n\t#So if they do indeed survive, it'll be a problem to solve later. \n\t\tOr maybe even a problem for the others in the Destructive Eight to solve.\n\t#Good riddance. I'll be happy to never think of the preposterous posers ever again.\n\t\tThey were as misinformed as they were overestimated.\n\t#Unfortunately, the sting of these agents' judgment will probably stick with me far after their ejection.\n\t\tThose familiar looks they hit you with cut deep, sizing you up as nothing but a villain. You just wish you could argue with their logic…\n\t#I can't help but feel like we just got really lucky, dodging that particularly loaded bullet.\n\t\tAnd you can't help but wonder if this is only the first wave of agents sent to try and stop you.\n\nYour attention is quickly drawn away, however, to the SeaSovereign as he hovers a bit lower to swoop by your party. \n\nHe doesn't speak, but his restored eyes do seem to brim with clarity and realization and… \n\nGratitude. \n\nThen, in the next moment, the SeaSovereign swims back through the air towards the ocean.\n\n*page_break\n\n\"That's going to change a lot here,\" Leigh then says, both joy and sorrow ringing in ${leighhis} voice. \"I might have just become a legend of SeaS and a war criminal at the same time.\"\n\nBefore you can ask Leigh what this means, the gates to QueSummiT just ahead suddenly swing open. \n\n${questhing} turns and floats forward, continuing right where you left off.\n\nYou don't have many other options than to simply follow. Despite the somewhat-alarming implications of this surprise intrusion-ambush, you still have an entire Quest to complete.\n\nSo all of that can be unpacked later, spiraling somewhere up this lofty and deadly mountain.\n\n*page_break CHAPTER IV\n\n[b]CHAPTER IV[/b]\n*line_break\nBy nightfall, your party reaches a small encampment space just above the base of QueSummiT. \n\n${questhing} stopped here as the sun was hanging low on the horizon, and Leigh explained you'll face your first trial once the sun rises again. Apparently these obstacles are only ever challenged in the bright light of day.\n\nHowever, you still find night on SeaS to be quite bright. \n\nThat's part of why you currently sit on a ledge looking out at the view. You're not sure you could sleep anyway. To be honest, you're not sure how the others seem able. \n\n*page_break\n\nHow could they possibly not absorb this view—the night sky lit up by more moons and stars than you've ever seen? This star-scape reflects off the undulating ocean, creating a vast canvas of glittering constellations.\n\nIt's a view—and a moment—you won't be forgetting anytime soon.\n\n\"You should get some sleep.\"\n\nYou hear P.Savage's voice behind you, and you know he'll be joining you on this ledge whether you like it or not. \n\n*fake_choice\n\t#Luckily I don't mind the company.\n\t\t\"I've never needed as much sleep as everyone else,\" you reply. \"Though not to be rude, but you look like you could use some sleep.\"\n\t#Why can't I be left in peace just a little longer?\n\t\t\"I've never needed as much sleep as everyone else,\" you reply with an edge in your voice. \"Besides, you're the one looking a little worn.\"\n\t#I'm too tired and at peace right now to put up much of a fight.\n\t\t\"I've never needed as much sleep as everyone else,\" you sigh. \"Though honestly, you're the one looking a little worn.\"\n\nP.Savage laughs, to your surprise. Then, less surprisingly, he joins you on the ledge.\n\n\"You remind me so much of myself sometimes,\" P.Savage says as he sits.\n\n\"I'm not sure that's a compliment,\" you say. \"Unless you're actually proud of being mostly smug and arrogant?\"\n\n*page_break\n\n\"I am,\" P.Savage replies. \n*if (powerful > 50)\n\t\"And from what I have witnessed, you are just as commanding about your power.\"\n*if (powerful \u003c= 50)\n\t\"And from what I have witnessed, you could stand to shine with more pride in your power.\"\n\n\"Can we please not turn this into some teachable moment?\" you groan. P.Savage might think of himself as some kind of tough-love mentor to you, but you'd much rather he treat you closer to what you really are—a peer.\n\n\"I simply emerged here because I cannot sleep either,\" P.Savage replies. \"I suppose no matter how I act, I am not certain that I will ever grow accustomed to being treated like a pure villain.\"\n\nHearing this, you can't help but flash back to the crossing of treachery—to the look in Empiria Bloom and The Night Orchid's eyes. \n\nBoth agents were full of such self-righteous assurance that they were the heroes—and that you were the sinful monsters. \n\n*page_break\n\nYou wish, from the bottom of your soul, that you could have screamed at them about how they are playing by an outdated rule book. That they're blind to the realest truth…\n\nThere are no saints or sinners, only the flawed doing what must be done.\n\n\"So my guess was right,\" you say instead, aiming to take advantage of  P.Savage's rare show of vulnerability. \"You [i]were[/i] considered a villain, wherever you and F.Spears come from. And she was considered a hero. And you don't agree about this whole 'defenders of the Nexus' duty you keep alluding to.\"\n\n\"You shall not trick me into telling you my secret origin,\" P.Savage says, grinning. \"I am not actually a super villain, after all. And as far as Farrah and I are concerned, we settled our debts on Versus together. Really, I only I have one interest when it comes to you, ${babename}.\"\n\nYou look to P.Savage's pretty-boy face, contemplative and slightly sinister in the moonlight, and await his answer.\n\n*page_break\n\n\"I know what it feels like to be the most powerful of your kind,\" he continues. \"I can teach you how to embrace all that anger and use it to unlock your fullest potential and strength.\"\n\nP.Savage's words drop something into your body as you listen. It feels something like a seed, shriveled and dense.\n\n*temp savagehookuppossible false\n\n*if babemale\n\tAs P.Savage turns to you, you also see something else revealed on his face. He is [i]attracted to men[/i], and he is also attracted to [i]you[/i]. And why not? You're beyond old enough, and he's not that many years older than you.\n\n\t*if (attractedpan) or (attractedmen)\n\t\t*set savagehookuppossible true\n\t\t\n\t\tBut that raises the question: are you interested in P.Savage?\n\n\t\t*page_break\n\n\t\tShifting focus, you return to the other offer P.Savage is making here, the seed of curiosity it planted.\t\n\t\t*goto psavagementorly\n\t*else\n\n\t\tToo bad P.Savage isn't remotely your type. For you, that's a nonstarter.\n\n\t\t*page_break\n\n\t\tShifting focus, you return to the other offer P.Savage is making here, the seed of curiosity it planted.\n\t\t*goto psavagementorly\n*else\n\t*goto psavagementorly\n\n*label psavagementorly\n\nYou register this seed planting in your gut, feeling both revolting and tempting at the same time. You realize it is now fully up to you to decide how to let it grow, here under the starlit sky.\n\nYou need to decide what's best, not just for your own strengthening, but also your working relationship with P.Savage. As you've already deduced, growing close or keeping a distance will surely both have their unique advantages moving forward.\n\n*choice\n\t#Everyone always just wants something from me. Wrap myself in a bubble of invisibility so P.Savage can't bother me anymore. [i](Gain Constructive, Limit, Perception. Lose P.Savage)[/i]\n\t\t*set destructive %-20\n\t\t*set unleash %-20\n\t\t*set perception +4\n\t\t*set psavage %-25\n\n\t\tAs you suddenly vanish from sight, P.Savage must get the message. After that, he stands up and leaves you alone.\n\n\t\tAnd you don't see or hear anything from him for the rest of the night.\n\n\t\t[i]Good.[/i] \n\n\t\tYou won't be influenced or coerced by anyone, let alone the likes of him.\n\t\t*goto thesunwillrise\n\t#\"If you give people a reason to hate you, at least it hurts a little less when they inevitably do,\" I say as I create the illusion of a massive explosion ripping this world apart. [i](Gain Destructive, Unleash, Perception, P.Savage)[/i]\n\t\t*set destructive %+20\n\t\t*set unleash %+20\n\t\t*set perception +4\n\t\t*set psavage %+25\n\n\t\tViolent bursts of violet-and-crimson flames unfurl across the sky, accompanied by the piercing crack of ruptured earth and the rush of gushing water. \n\n\t\tIt's all a perceptive illusion spell, of course, but it takes P.Savage a few startled moments to realize. \n\n\t\tOnce he does, he smiles broadly.\n\n\t\t\"Marvelous,\" he whispers, barely able to rip his eyes away from the crescendo of cataclysm to turn to you.\n\n\t\t*page_break\n\n\t\t\"I understand your words completely,\" he goes on. \"But the reasons others might hate you only draw me to you. So please promise me one thing?\"\n\n\t\tYou turn to P.Savage, keeping the spell spectacle going strong.\n\n\t\t\"No matter what happens on our journey, together or apart,\" P.Savage begins. \"Do not let anyone hold you back. Ever.\"\n\n\t\tYou nod at P.Savage, understanding the full meaning of his words. \n\n\t\tBecause that's a promise and a threat you can definitely keep.\n\t\t*goto thesunwillrise\n\t#Display a holographic readout to show I could learn anything I want about P.Savage's past, if I cared enough. [i](Gain Destructive, Limit, Technology. Lose P.Savage)[/i]\n\t\t*set destructive %+20\n\t\t*set unleash %-20\n\t\t*set technology +4\n\t\t*set psavage %-25\n\n\t\tWith a few hand gestures, a readout suddenly appears holographically before you. Unsurprisingly, it's a WANTED poster:\n\n\t\t[b]WANTED[/b]\n\t\t*line_break\n\t\tPeter Savage\n\t\t*line_break\n\t\t[i]For terrorist acts in the name of Extra freedom.[/i]\n\n\t\tYou feel P.Savage's entire body tense up next to you. He must know the same thing that you do… \n\n\t\t*page_break\n\n\t\tYou're only scratching the surface here with this poster. If you wanted, you could keep digging deeper and deeper, until P.Savage is left entirely exposed.\n\n\t\tSeeing this, P.Savage stands up and leaves you alone.\n\n\t\tAnd you don't see or hear anything from him for the rest of the night.\n\n\t\t[i]Good.[/i] \n\n\t\tYou won't be influenced or coerced by anyone, let alone the likes of him.\n\t\t*goto thesunwillrise\n\t#Flex my strengths to create a truly private, unwatchable circle to talk about whatever I want with P.Savage. [i](Gain Constructive, Unleash, Technology, P.Savage)[/i]\n\t\t*set destructive %-20\n\t\t*set unleash %+20\n\t\t*set technology +4\n\t\t*set psavage %+25\n\n\t\t*gosub psavagecircletrust\n\n\t\t*goto thesunwillrise\n\t*selectable_if (savagehookuppossible) #Flex my strengths to create a truly private, unwatchable circle so I can hook up with P.Savage. [i](Gain Constructive, Unleash, Technology, P.Savage)[/i]\n\t\t*set destructive %-20\n\t\t*set unleash %+20\n\t\t*set technology +4\n\t\t*set psavage %+25\n\t\t*set psavagehookup true\n\n\t\t*gosub psavagecircletrust\n\n\t\t*page_break\n\n\t\tIf P.Savage doesn't want you to hold back, then you know exactly what to do next. You lean forward and grab his collar, pulling him in to kiss you.\n\n\t\tP.Savage immediately opens his mouth to yours. He tastes salty as he kisses you with urgent force. The kiss feels instantly…well, [i]savage[/i].\n\n\t\tNext thing you know, P.Savage pushes himself on top of you. You lie back, letting the weight of him press down on you. He begins to kiss and bite at your neck, and you can feel how hard he is grinding against your thigh.\n\n\t\tYou rip your fingers down his back, running the tips across the coils and ridges of his muscles.\n\n\t\t*page_break\n\n\t\tP.Savage then pulls away from you to stand, but only so he can take his clothing off. Watching him bathed in moonlight, you suddenly crave every inch of him. His full lips. His pecs, dusted with hair. His flat stomach. The surprisingly sized heat between his legs.\n\n\t\tYou stand too, your own clothes gone just as fast. Then you pin P.Savage against the nearby rocky wall. He groans from the cool thud, then from your warm skin connecting with his.\n\n\t\tYou kiss again, even deeper this time, and P.Savage reaches down between your legs. You moan, returning the favor. Your other hand runs up and down P.Savage's torso, grabbing hair and muscle with each grip. His spare hand remains cupped on the curve of your ass, slapping and probing.\n\n\t\tIt isn't long before you're both sweating, your slick skin slippery and sliding.\n\n\t\t*page_break\n\n\t\tP.Savage then drops to his knees, taking you in his mouth. \n\n\t\tYou shudder, his hands and lips beginning to work perfectly in sync. \n\n\t\tSomewhere along the way, P.Savage takes one hand to begin to pleasure himself. \n\n\t\tSoon after, you can feel it all building, pleasure pooling in every part of your body.\n\n\t\tWhen you finally do peak, you do so at the same time as P.Savage.\n\n\t\t*page_break\n\t\t*achieve psavagesteamy\n\n\t\tYou get dressed in relative silence, finally feeling ready for some sleep.\n\n\t\t\"We shouldn't tell the others,\" P.Savage says, once fully redressed.\n\n\t\t\"I couldn't agree more,\" you reply.\n\n\t\tThis was fun, but it was just a fleeting moment of connection and release. Tomorrow, you return to the fight at hand. \n\n\t\tAnd you can already tell you will both be adept at pretending nothing ever happened between you, here in the sparkling starlight.\n\t\t*goto thesunwillrise\n\n*label psavagecircletrust\n\nYou wave your hand, coding some tech to create a true circle of surveillance-free trust.\n\n\"For the next few minutes, no one in the Galaxy can see or hear us,\" you say. \"So I'm going to tell you something I've never told another solitary soul.\"\n\nP.Savage listens intently, looking both hesitant and eager at the same time.\n\nYou take one long, ragged breath.\n\n*page_break\n\n\"Every time I cast a spell, it breaks some fundamental rule of reality,\" you begin. \"I don't know if all the undoing can be repaired. And worst of all…?\"\n\n\"I'm not sure I care.\"\n\nP.Savage turns over your words, processing them as quickly and carefully as he can.\n\nThen he turns to you, intensity burning like power in his transfixed eyes.\n\n*page_break\n\n\"You were born this way, made to be exactly what you are, empowered to do precisely what you do,\" P.Savage begins.\n\n\"If the universe made you to be a galactic wrecking ball, I say why fight against it? \n\n\"Embrace it.\"\n\nListening to P.Savage's words, they are so tempting to swallow whole, to embrace wholeheartedly…\n\nBut they also strike you as the most dangerous words you might ever hear, for your entire life.\n\n*page_break\n\n\"But for someone who can do anything, sometimes doing nothing can hold the most power,\" P.Savage then adds. \"Or so I'm told. Seems wasteful, if you ask me. But regardless, you must promise me one thing, ${babename}.\"\n\nYou turn to P.Savage, keeping your silent circle of trust going strong.\n\n\"No matter what happens on our journey, together or apart,\" P.Savage begins. \"Do not let anyone hold you back. Ever.\"\n\nYou nod at P.Savage, understanding the full meaning of his words. \n\nBecause that's a promise and a threat you can definitely keep.\n\n*return\n\n*label thesunwillrise\n*page_break AT SUNRISE\n\nYou don't feel nervous standing at the gilded gates of your Quest's first trial. You're not sure if it's confidence or hubris, but you suppose you're about to find out.\n\n\"There's no telling who or what QueSummiT has summoned to participate in the three trials arranged against us,\" Leigh begins. \"If the challengers are from SeaS, I'll do my best to offer what insight I can via ${babename}'s mental spell-link. \n\n\"If not, you should know the banishment protocols I used to expel those shade agents won't work against beings rightfully invited on-planet. The only way to earn victory will be to defeat our opponents in whatever metric QueSummiT designates.\n\n\"Lastly, you should know, it will not simply be enough to succeed in the first two trials. Along our journey, QueSummiT will award us Quest Coins, based on our evaluated performance. We will need a certain number of Coins to gain entry to the third and final trial.\"\n\n*page_break\n\nYou reach the place where you've stored your Quest Coin stash, which currently numbers ${questcoins}. Sounds like you'll have two more chances to accrue enough Coins to enter the third trial.\n\nSo you nod at Leigh, along with P.Savage and F.Spears, because you've already filled them in on this preliminary base-battle count. \n\nLooking over your assembled allies, even though you have yet to see Leigh fully in field action, you doubt there's much that could give your combined might much trouble.\n\nThen the Trial One gates open and you immediately question that notion.\n\n*page_break\n\nFirst, you see a banner, flapping with clear and concise words:\n\n[b]TRIAL ONE[/b] \n*line_break\n[b]Contest of Champions[/b]\n\nThis banner streams above a massive arena ring. \n\nClearly, this trial is going to be a knock-down, drag-out brawl.\n\nSo next, you eye the opponents stacked against you. \n\n*page_break\n\nThe first two are young women who appear even more rainbow-bright than ${princese} Leigh somehow. \n\nInstantly, they register to you as two members of this legendary team from The MainlanD, the QuiX.\n\nOne is dressed entirely in vibrant shades of red, sporting two long fiery orange pigtails and a backpack that appears to be made of…gemstone bombs? She is fairly short and stocky, with one red eye and one orange eye that look enhanced by contact lenses. \n\nThe other wears cooler shades of green, in colors less royal and more natural than Leigh's own stripes. She sports close-cropped mint-green hair and a belt made of sparkling gemstone leaves. She is equally short as her companion, but with a willowy frame and enhanced light-and-dark green eyes.\n\n*page_break\n\nBeside them stand two equally glowing figures, except lit up in the shades of the bright and dark night sky. \n\nIn contrast, this pair instantly registers to you as potential MainlanD chaotic artifact agents.\n\nAnother much-taller young woman wears a deep midnight-purple bodysuit, sporting straight amethyst hair and two ancient-looking pink opal pistols. Her own eyes are both cloudy grey and swirling with intensity.\n\nBeside her stands a masked male figure, decked out in midnight-black robes and wielding an enormous gun that matches his swirling silver mask. \n\n*page_break\n\nBefore these pairs can even register your party, you notice they seem particularly shocked to see…\n\nEach other? \n\nTurning to Leigh, you can automatically tell there's some bad blood between these pairs. \n\nSo you'd better learn why, if you're going to use it to your advantage in this combative trial.\n\n*temp quixredout true\n*temp agentsinfo true\n*temp quixinfo true\n\n*label learnquixagentsfoes\n*choice\n\t*selectable_if (quixredout) #Aggregate informational readouts on the QuiX as an organization. [i](Gain Double Technology)[/i]\n\t\t*set technology +4\n\t\t*set quixredout false\n\n\t\t[b]The Legend of the QuiX[/b]\n\t\t*line_break\n\t\t--The QuiX are the most famous and revered team of heroes on SeaS, with heavy duties and legacies to live up to.\n\t\t*line_break\n\t\t--They are the front line of defense, fighting against the Shards and Monstia, regulating artifact trade, and policing the vast network of chaotic artifact agents.\n\t\t*line_break\n\t\t--Each member of the QuiX is entrusted with one of the Eight Foundational Artifacts as their signature weapon, which grant each user a vast array of light and speed-based powers.\n\t\t*line_break\n\t\t--While there are Eight Foundational Artifacts, only five are ever active on the QuiX roster at a time.\n\t\t\n\t\t[b]Membership Selection[/b]\n\t\t*line_break\n\t\t--No one fully understands the selection of new QuiX members, but some standard practices have been documented.\n\t\t*line_break\n\t\t--The Eight Foundational Artifacts of SeaS determine when it is time to move on from an existing member and select a new one. These Artifacts are not sentient, but this process is entirely self-regulated and spiritually revered. Some even believe the Artifacts serve as a kind of collective consciousness for SeaS.\n\t\t*line_break\n\t\t--Once a selection is made, each Artifact enters a new era, empowering each new QuiX member with a fresh set of abilities. \n\t\t*line_break\n\t\t--There are no stronger artifacts in all of SeaS that the Eight Foundationals. Each is powered by a unique gem-heart that evolves to a become bio-attuned weaponized expression of each selected user.\n\t\t*line_break\n\t\t--It has been observed that the Artifacts only ever select young women from their own SeaSonal sectors, always with an eye to creating the most diverse roster possible.\n\t\t\n\t\t[i]Addendum A:[/i] \n\t\t*line_break\n\t\t--[i]Since childbirth is revered as the most sacred act on SeaS, females generally experience an elevated position in society. \n\t\t*line_break\n\t\tTo protect the sanctity of childbirth, vasectomies are mandatory for all males until a child is desired. The reversal process requires the acquisition of a special license (which is generally easy to obtain, given a base level of housing and income).[/i]\n\t\t*line_break\n\t\t--[i]Males are not considered unequal, but given their historically lessened position in society and in the grand QuiX tradition, a disproportionate number become agents of chaos.[/i]\n\n\t\t*page_break\n\n\t\t[b]The QuiX Eight Foundational Artifacts[/b]\n\t\t*line_break\n\t\t--[i]Each Artifact hails either from one Sector of SeaS or one Elemental Council of SeaS, with shifting potential to represent the full spectrum between foundational dichotomies.[/i]\n\t\t*line_break\n\t\t--[i]A core SeaSonal principle is that two opposing halves joined in harmony is the strongest possible expression of any force.[/i]\n\t\t*line_break\n\t\t--Winter (Win): water (flow) vs. ice (solid); (blue vs. white)\n\t\t*line_break\n\t\t--Spring (Sprin): earth (grounded) vs. tree (reaching); (brown vs. green)\n\t\t*line_break\n\t\t--Summer: (Sum) fiery heat (burn destroy) vs. bright light (relax create); (red vs. orange)\n\t\t*line_break\n\t\t--Autumn: (Tum) breath wind (change clarity) vs. stagnant decay (death rebirth); (full spectrum)\n\t\t*line_break\n\t\t--Storm (Tor): electric (sight touch) vs. thunder (sound smell); (blue vs. grey)\n\t\t*line_break\n\t\t--Space (Ace): black hole gravity (the finite) vs. expansiveness (the infinite); (black vs. grey)\n\t\t*line_break\n\t\t--Soul (Sou): love (support) vs hate (superiority); (pink vs. purple)\n\t\t*line_break\n\t\t--Star (Sta): solar (day) vs lunar (night); (yellow vs. white)\n\t\t\n\t\t[b]Sourcing Trends[/b]\n\t\t*line_break\n\t\t--Tum is unique among all sources in its breadth, but many believe its lack of specificity lends its possessors to deceit, endlessly capable of shifting with the winds.\n\t\t*line_break\n\t\t--Outside of Tum's broad spectrum, the only spectral overlap exists between Win, Tor, and Ace—another occurrence rife with historical/cultural currency.\n\t\t*line_break\n\t\t--The Tor and Ace source have not been Artifact-matched or active on the QuiX roster in many generations, and very rarely before then.\t\n\n\t\t[i]Addendum B:[/i] \n\t\t*line_break\n\t\t--[i]The five roster slots generally fill five interrelated roles: Genius/Global, Blaster/Energy, Bruiser/Strength, Protector/Support, Striker/Brawler.[/i]\n\n\t\t*page_break\n\t\t\n\t\tAbsorbing this information, you pause to consider the consonances here that remind you of the shades spectrum. \n\n\t\tPerhaps this is part of why shade energy doesn't reach this pocket dimension planet? Because it has its own unique expression of this universal system?\n\n\t\tThat said, the spectral delineations are slightly different. Plus brown and grey aren't expressed in the shades…\n\n\t\tAt least, not yet.\n\t\t*goto learnquixagentsfoes\n\t*selectable_if (quixinfo) #Glean perceptions of the two QuiX members present. [i](Gain Perception)[/i]\n\t\t*set perception +2\n\t\t*set quixinfo false\n\n\t\tFlashing directly from Leigh's mind, you glean all you need to know about these very famous heroes of SeaS.\n\n\t\tFirst there is the red-clad Sum Bom, famously a rebellious troublemaker and drama queen of the QuiX. Her passion and anger spill over into her wielding of the Sum Artifact, which has transformed into the Backpack of Bombing. This grants her a full Blaster arsenal of heat and light bombs, circle blasts, and jetpack speed boosts.\n\n\t\tNext there is the evergreen Sprin Ter, the newest and youngest member of QuiX, having recently replaced former member Sou Vox. She is viewed as an innocent child of spring, but has proven herself quickly to be far more wise and capable underneath her bright exterior. Entering her era, the Sprin Artifact has become the Belt of Brightness. This grants her a full Striker arsenal of lightfoot clapbacks, healing and decaying sprays, and charged flash leaping.\n\n\t\tThese QuiX members appear both infinitely young and wise at the same time, while also projecting an air of breezy lightness and heavy firepower.\n\t\t*goto learnquixagentsfoes\n\t*selectable_if (agentsinfo) #Glean perceptions of the two chaotic artifact agents present. [i](Gain Perception)[/i]\n\t\t*set perception +2\n\t\t*set agentsinfo false\n\n\t\tFlashing directly from Leigh's mind, you glean all you need to know about these apparently infamous artifact chaos agents.\n\n\t\tThere's Ace Whole, of the Ace Elemental Order, who leads an ancient cult named The Blackwholes. This cult sect apparently worships something called \"Nexus artifacts.\" This cult apparently has some long-fought agenda, and Ace Whole, as the latest leader, has inherited the Blackwhole suite of artifacts.\n\n\t\tApparently Ace Whole has recruited Sou Vox, a former QuiX member who recently—and very scandalously—left the team of her own accord to pursue the cultist agenda. Many believe she lost her mind or was corrupted because of her shadowy Soul wilderness upbringing. However, an equal number believe Sou Vox's willing conversion and participation lends the secret agenda of The Blackwholes major credibility.\n\n\t\tSou Vox no longer possesses the Sou Foundational Artifact, but has acquired a new artifact that has yet to be used publicly. Obviously, this also explains the tense animosity you sense burning between the two QuiX members and Sou Vox.\n\t\t*goto learnquixagentsfoes\n\t#I'm ready to face Trial One.\n\t\t*goto trialonebegins\n\n*label trialonebegins\n\n\"We have been informed you seek to disturb the source and expose the Nexus,\" Ace Whole begins, priming his alarmingly large weapon. \"That cannot be allowed.\"\n\n\"Usually any enemy of Sou Vox's would be a friend of mine,\" Sum Bom jumps in, turning redder by the second. \"But if she and us have been called together to stop you, the situation must be hella dire.\"\n\n\"Right. But it doesn't actually matter who is right or wrong,\" Sprin Ter adds, wind seeming to permanently rustle her hair. \"All that matters is serving our duty to QueSummiT.\"\n\n\"You're wrong,\" Sou Vox deadpans, deathly serious as she fingers her pistols. \"It matters a great deal that we do not lose this trial. The fate of SeaS depends upon it.\"\n\n*page_break\n\nHearing this, you can already feel P.Savage priming his energies beside you. However, you don't feel the same vibes from F.Spears, who seems hesitant. Beside her, Leigh appears even less sure.\n\nSeeing F.Spears freeze up this way, you have one grand guess as to why. She and P.Savage are supposed to be the \"Defenders of the Nexus.\" And you'd bet what your challengers just said strikes at the core of their disagreement about what this duty might mean.\n\nIt makes you wonder—does fighting in this trial truly go against the best interests of this Nexus and SeaS both? Or do these challengers have it wrong, just like the shade agents you encountered at the base of QueSummiT?\n\nYou then remind yourself that the particulars here don't really matter. You need to complete this Quest to find the power source that will defend the entire Galaxy and protect billions of lives. Whatever the consequences might be here on SeaS, that can't be of your concern…at least, not until you know more.\n\n*if unlockedquesthing\n\t*page_break\n\n\t${questhing} knows this, as well.\n\n\tBefore this first trial battle is joined, it opens its mouth to present you with more of its artifact teeth.\n\n\tThis time, ${questhing} then conveys that your ability to Unleash or Limit your spellpower will prove most crucial in this trial.\n\n\tSo you check your levels and decide to accept:\n\n\t*temp urnofunpredictabilityb 0\n\t*rand urnofunpredictabilityb 1 4\n\n\t*choice\n\t\t#The Lashes of Unleashing and Limiting. [i](Auto Boost Stronger Stat)[/i]\n\t\t\t*if (unleash >= 50)\n\t\t\t\t*set unleash %+30\n\n\t\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Unleash level rise higher.\n\t\t\t\n\t\t\t\t[i](Unleash Lashed)[/i]\n\t\t\t\t*goto decidesupportquixers\n\t\t\t*else\n\t\t\t\t*set unleash %-30\n\n\t\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Limit level rise higher.\n\n\t\t\t\t[i](Limit Lassoed)[/i]\n\t\t\t\t*goto decidesupportquixers\n\n\t\t#The Blocks of Construction and Destruction. [i](Auto Boost Stronger Stat)[/i]\n\t\t\t*if (destructive >= 50)\n\t\t\t\t*set destructive %+30\n\n\t\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Destructive level rise higher.\n\t\t\t\n\t\t\t\t[i](Destructive Building Blocked)[/i]\n\t\t\t\t*goto decidesupportquixers\n\t\t\t*else\n\t\t\t\t*set destructive %-30\n\n\t\t\t\t${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Constructive level rise higher.\n\n\t\t\t\t[i](Constructive Building Blocked)[/i]\n\t\t\t\t*goto decidesupportquixers\n\t\t#The Urn of Unpredictability. [i](Double-Strength Boost, But Randomly Applied)[/i]\n\n\t\t\t*if (urnofunpredictabilityb = 1)\n\t\t\t\t*set unleash %+60\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Unleash level rise exponentially higher.\n\n\t\t\t\t[i](Unleash Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityb = 2)\n\t\t\t\t*set unleash %-60\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Limit level rise exponentially higher.\n\n\t\t\t\t[i](Limit Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityb = 3)\n\t\t\t\t*set destructive %+60\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Destructive level rise exponentially higher.\n\n\t\t\t\t[i](Destructive Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityb = 4)\n\t\t\t\t*set destructive %-60\n\n\t\t\t\t${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Constructive level rise exponentially higher.\n\n\t\t\t\t[i](Constructive Double Boosted)[/i]\n\n\t\t\t*goto decidesupportquixers\n*else\n\t*goto decidesupportquixers\n\n*label decidesupportquixers\n*page_break\n\nLetting go of the hatred seeping off these QuiX heroes and artifact agents, and bypassing the hesitance of F.Spears and Leigh, you prime yourself to attack.\n\nYou'll discuss what the flirp this \"Nexus\" is and just what it means to truly \"defend\" it after this trial is won. \n\nEven if that means, for now, it's down to just you and P.Savage to take your challengers down.\n\nWhat matters right now is winning this first trial.\n\n*choice\n\t#Work with P.Savage to take all four of these challengers out. [i](Test High or Low P.Savage. Gain Half Technology, Half Perception)[/i]\n\n\t\tP.Savage focuses on Ace Whole and Sprin Ter, so you focus on Sou Vox and Sum Bom. However, they seem far more focused on arguing with each other than on you.\n\n\t\t\"I can take this fraud down on my own,\" Sum Bom shouts as her jetpack rockets her up into the air. \"I will never need your help again, you traitor!\"\n\n\t\t\"If you knew the truth that I do,\" Sou Vox mutters under her breath, \"you'd fight alongside me too.\"\n\n\t\t\"Never!\" Sum Bom shouts, and you're amazed she could hear Sou Vox over the din of the erupting battle.\n\n\t\t*page_break\n\n\t\tYou decide to take advantage of their distraction. You tech-code a spell to construct an army of simple robots, all equipped with basic battle weaponry. Then you cast an illusory spell to make these bots look way more powerful and scary than they actually are, taking on various animalistic qualities. \n\n\t\tHowever, neither opponent seems particularly intimidated. Which is fine, because it gives you a few moments to spell-code the bot you truly intend to use.\n\n\t\tSum Bom darts around the sky like a red-and-orange flash, and suddenly the name QuiX makes a lot more sense. She keeps hurtling gemstone heat bombs as she moves, exploding your faux-bots with ease.\n\n\t\tBeneath her on the ground, Sou Vox might not be nearly as quick, but she doesn't need to be. Her sharpshooting is impeccable, taking out bots with precision amethyst rounds.\n\n\t\t*page_break\n\n\t\tSum Bom and Sou Vox have downed your bots in short order, but you notice that P.Savage has also managed to already take out both Sprin Ter and Ace Whole somehow. \n\n\t\tThey both lie unconscious on the ground, smoking respectively with green-and-black afterburn. P.Savage must have turned their own outputs against them with his energy telekinesis.\n\n\t\tWell, good thing the bot you've been spell-coding is designed to be a miniature solar engine. With one thought to P.Savage, your intended finishing combo-move becomes clear.\n\n\t\tWith a swing of his hands, P.Savage pulls the solar flare out of your bot…\n\n\t\tAnd washes it over Sum Bom and Sou Vox in a sweeping, wide-arc blast.\n\n\t\t*page_break\n\n\t\t*if (psavage > 70)\n\t\t\t*achieve psavageaccomplice\n\n\t\t\tYou and P.Savage have bonded so closely on your journey together so far, this combo-move works flawlessly. \n\n\t\t\t*label psavagereadoutpositive\n\t\t\t*set technology +3\n\t\t\t*set perception +3\n\t\t\t*set potency +2\n\t\t\t*set questcoins +3\n\n\t\t\tBoth Sum Bom and Sou Vox are taken out with this attack, unable to dodge or evade. They both fall to the floor in unconscious heaps. \n\n\t\t\tNot even this world's greatest heroes can stand up against the might of you and P.Savage combined.\n\n\t\t\tIn the next moment, three platinum Coins suddenly materialize in your palm. [i]Perfection.[/i]\n\n\t\t\t[i](Gained 3 Quest Coins)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Technology, Perception, Potency)[/i]\n\t\t\t*goto trialoneover\n\t\t*elseif (psavage \u003c 30)\n\t\t\t*achieve psavageadversary\n\t\t\t\n\t\t\tKeeping P.Savage at a distance on your journey allows there to be no personal feelings to get in your way. Your work together is all business, and your business is victory.\n\n\t\t\t*goto psavagereadoutpositive\n\t\t*else\n\t\t\t*set technology +1\n\t\t\t*set perception +1\n\t\t\t*set potency +1\n\t\t\t*set questcoins +1\n\n\t\t\tHowever, you and P.Savage aren't used to working together this way. \n\n\t\t\tThe second of delay coordinating your efforts gives Sum Bom enough time to jet-dart high above P.Savage's blast.\n\n\t\t\tReacting just as quickly, you twitch your fingers to command your bot to direct the last dregs of its charge at Sum Bom. This unexpected shot connects with Sum Bom, sending her smoking to the ground beside Sou Vox in an unconscious heap.\n\n\t\t\tEven slightly out of sync, not even this world's greatest heroes can stand up against the might of you and P.Savage combined.\n\n\t\t\t*page_break\n\n\t\t\tEven though it works, QueSummiT doesn't seem as impressed with your choice. \n\n\t\t\tIn the next moment, only one platinum Coin drops into your palm. \n\n\t\t\tYou'll have to make sure you score higher in the next trial, analyzing your relationships more carefully.\n\n\t\t\t[i](Gained 1 Quest Coin)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Technology, Perception, Potency)[/i]\n\t\t\t*goto trialoneover\n\t#Create a virus to infect these challengers' artifacts and temporarily interfere with their connections. [i](Test Unleash. Gain Technology)[/i]\n\t\t\n\t\tP.Savage focuses his attacks on Sum Bom and Sou Vox, who already seem embroiled in some kind of argument. Leaving those two to him, you focus on Sprin Ter and Ace Whole.\n\n\t\tThese two don't argue like the former QuiX teammates, but they don't seem too interested in working together, either. Ace Whole stands with his legs firmly planted, firing up his enormous cannon-gun. It charges some kind of black hole blast, aimed directly at you.\n\n\t\tMeanwhile Sprin Ter darts into the air above, treading on the air with jade energy pulses that snap from her belt. Barely able to keep up following her quick kick-flips, suddenly the name QuiX makes a lot more sense.\n\n\t\tBut it doesn't matter how powerful or fast these two are if they're separated from the source of their abilities.\n\n\t\t*page_break\n\n\t\tWith a twitch of your left hand fingers, you begin coding a tech-spell to interfere with the connection between these warriors and their artifacts. The signal jam will only work temporarily, but that'll distract them long enough for you to use the ion cannon you code with your right spell-hand.\n\n\t\tYou snap your left fingers, just as both challengers prepare to fire on you. Suddenly, the black hole tipping Ace Whole's weapon twists and sucks, collapsing in on itself. It releases a localized pulse as it does, knocking Ace Whole backwards with its force.\n\n\t\tAbove him, the lightfoot air-sprinting of Sprin Ter shorts out, as her belt sparks with jade energy. Caught off guard, Sprin Ter falls out of the sky and lands beside Ace Whole with a thud. \n\n\t\tTo your surprise, you don't even need to launch a follow-up attack. Both have been knocked unconscious by the temporary severing of their artifact connections.\n\n\t\t*page_break\n\n\t\tQuickly looking across the field, you see that P.Savage has also already managed to take out both Sum Bom and Sou Vox somehow. They both lie unconscious on the ground, smoking respectively with red-and-purple afterburn. P.Savage must have turned their own outputs against them with his energy telekinesis.\n\n\t\tNot even this world's greatest heroes can stand up for long against the might of you and P.Savage combined.\n\n\t\t*if (unleash > 70)\n\t\t\t*set technology +6\n\t\t\t*set potency +2\n\t\t\t*set questcoins +3\n\n\t\t\tIt would seem QueSummiT agrees with your joint-unleashing ways.\n\n\t\t\tIn the next moment, three platinum Coins suddenly materialize in your palm. [i]Perfection.[/i]\n\n\t\t\t[i](Gained 3 Quest Coins)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Technology, Potency)[/i]\n\t\t\t*goto trialoneover\n\t\t*else\n\t\t\t*set technology +3\n\t\t\t*set potency +1\n\t\t\t*set questcoins +1\n\n\t\t\tEven though it works, QueSummiT doesn't seem as impressed with your joint-unleashing. \n\n\t\t\tIn the next moment, only one platinum Coin drops into your palm. You'll have to make sure you score higher in the next trial, analyzing your skills.\n\n\t\t\t[i](Gained 1 Quest Coin)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Technology, Potency)[/i]\n\t\t\t*goto trialoneover\n\t#Turn these challengers against each other, making them see each other as the enemy.
