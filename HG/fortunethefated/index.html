break\n[b]Round 1:[/b] Pitch Personas & Motivation (25%), Pair vs. Pair Battles (75%)\n*line_break\n[b]Round 2:[/b] The Great Relay Race\n*line_break\n[b]Round 3:[/b] Hover-Platform Super Melee *Highest Performing Finalist on Losing Squad Casts Sole Elimination Vote\n*line_break\n[b]Round 4:[/b] Villain/Rescue Mission Simulation\n\n[i]Remaining 6 Pairs Combine into One Squad of 12[/i]\n*line_break\n[b]FINALIST ROUNDS:[/b] Finalists Compete Individually in Challenges. Loser Eliminated, Winner Safe as 1 Finalist then Voted Out\n*line_break\n[i]Note: Finalist Cumulative Challenge Scores Now Kept, Factor in Round 7 Seeding and Round 8 Elimination/Safety[/i]\n*line_break\n[b]Round 5:[/b] Round-Robin Battle Selections\n*line_break\n[b]Round 6:[/b] Villain/Rescue Mission Live\n*line_break\n[b]Round 7:[/b] Seeded Tournament of 8 *Tournament-Winning Finalist Casts Sole Elimination Vote\n*line_break\n[b]Round 8:[/b] Obstacle Course *Elimination/Safety Determined by Cumulative Score\n\n[i]4 Finalists Enter The Finale[/i]\n*line_break\n[b]TWO-PART FINALE:[/b] Finalists Test Membership in The Representatives\n*line_break\n[b]Round 9:[/b] Participate in a Live Mission with The Representatives, Who Vote To Eliminate 1 Finalist\n*line_break\n[b]Round 10:[/b] 3 Finalists Interview Ceremony with The Representatives, Who Select 2 Winners to Join Next Roster\n\n*page_break\n*set spellodextgrounds true\n\nKnowing you'll need this information mostly later, you save it to your Spellodex in a new [b]TRAINING GROUNDS Avatar[/b] menu for future reference.\n\nNext, you turn your attention to the nine other contestants you'll be working with on your Squad. All of them have entered in pairs, like you and Chalice. \n\nIt's perfect you're all gathered silently and in a separate backstage wing from your rival Squad, while The Representatives film the introduction. \n\nIt gives you time to properly absorb your teammates, who are also still technically your competitors.\n\n*page_break\n\nAt first glance, it's a show in the signature TRAINING GROUNDS diversity representation. These seasons have come to operate around a general casting theme, but you don't pick out any particular trends at first. \n\nSo you decide which pair to dive deeper into first, based on who you feel you will potentially relate to most as you enter the competition. \n\nPlus, you'll have a lot to decide in terms of how you play the social politics side of this crucible. So this is a good chance to flag a pair you might like to potentially work alongside.\n\n*choice\n\t#Lord Sheer & ShadeStreak, who terrify with unbridled force. [i](Gain Destructive, Unleash)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %+15\n\n\t\t[b]LORD SHEER[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] Home planet origins unknown. Once a loyal lieutenant in the foulest brigade there ever was, Lord Sheer broke off to create his own following. However, after a self-professed change of heart (and rumors of being Reborn from planet Versus), he is claiming to seek heroic redemption—and some deeper truth he refuses to name.\n\t\t*line_break\n\t\t[b]Powers:[/b] Intense white shade power; rocket propulsion, force blasts, storm fists.\n\t\t*line_break\n\t\t[b]Weapons:[/b] None.\n\t\t*line_break\n\t\t[b]Classification:[/b] Galactic-Level Agent, Near Omnipotent.\n\n\t\t[b]SHADESTREAK[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] Born from a crumbling home planet now deemed unfit for life, ShadeStreak was born of trauma and neglect. With an ambitious streak as wide as his mean streak, he has vowed to become the most powerful and respected being in the Verses Galaxy. Winning TRAINING GROUNDS and rising to lead The Representatives are just two more items to check off his List of Ascension.   \n\t\t*line_break\n\t\t[b]Powers:[/b] Intense red shade power; solar absorption and redirection.\n\t\t*line_break\n\t\t[b]Weapons:[/b] Solar-storing armor.\n\t\t*line_break\n\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\tReading these over, you realize there might be much to learn about the shades from this pair…And how to potentially exceed the limitations the current sects have placed on its various studies.\n\t\t*goto finishfirstpair\n\t#Summonice & Blue Sliver, who aspire to build something better. [i](Gain Constructive, Limit)[/i]\n\t\t*set destructive %-15\n\t\t*set unleash %-15\n\n\t\t[b]SUMMONICE[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] A Disrep of Blende born with the ability to summon Accursique frost demonsters. After taking many years to study abroad and master zir powers, ze has returned to Blende with a hidden agenda—one that includes joining The Representatives to stave off a major incoming threat.\n\t\t*line_break\n\t\t[b]Powers:[/b] Summons Accursique frost demonsters.\n\t\t*line_break\n\t\t[b]Weapons:[/b] Summoning Staff, as a necessary focal point.\n\t\t*line_break\n\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\t[b]BLUE SLIVER[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] A Disrep of Blende who has always dreamed of mainstream heroic success and who aims to bring a specific mission to life: expanding The Representatives into a vast-reaching network of specialized rosters, much like the Delegates.\n\t\t*line_break\n\t\t[b]Powers:[/b] Lunar absorption and redirection.\n\t\t*line_break\n\t\t[b]Weapons:[/b] Lunar-storing gauntlets and helmet.\n\t\t*line_break\n\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\tReading these over, you realize there might be much to learn, especially from Summonice, about what it's like to be a Disrep abroad. Not to mention an opportunity to speak with a Disrep who ignored the invitation to emigrate to Distopia, instead remaining on Blende—with the aspiration to succeed big here, no less.\n\t\t*goto finishfirstpair\n\t#Clast & Fracture, who intimidate with their fierce calculations. [i](Gain Destructive, Limit)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %-15\n\n\t\t[b]CLAST[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] Unknown origins. A galaxy-spanning agent who has vowed fidelity to serve their beloved, the new high aspect of the pink shade: Tori Reece.\n\t\t*line_break\n\t\t[b]Powers:[/b] Purple/Pink shade scholar of royalty, politics, and coercion.\n\t\t*line_break\n\t\t[b]Weapons:[/b] A full suite of knightly weapons.\n\t\t*line_break\n\t\t[b]Classification:[/b] Local-Level Agent, Low Powered, Highly Skilled.\n\n\t\t[b]FRACTURE[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] A Disrep of Blende who has a history of political dissidence and Disrep freedom fighting. Claims to be shedding light on a brewing Disrep underground movement.\n\t\t*line_break\n\t\t[b]Powers:[/b] Strength, agility, and razor-sharp energy-absorbing claws.\n\t\t*line_break\n\t\t[b]Weapons:[/b] None.\n\t\t*line_break\n\t\t[b]Classification:[/b] Local-Level Agent, Low Powered, Highly Skilled.\n\n\t\t*if parttwoseas\n\t\t\tReflecting first on Clast, you obviously recognize the name Tori Reece. While placing a mole in TRAINING GROUNDS might be a stretch, this certainly wouldn't be the first time she went to great lengths to send shade agents after you. \n\t\t*if parttwogothika\n\t\t\tReflecting first on Clast, you recall the name Tori Reece from your \"orientation\" with the Destructive Eight back on Distopia. If you remember correctly, she intended to send shade agents to stop you. Could that include sending an actual mole into this galactic competition?\n\n\t\tAs for Fracture, you're quite intrigued by this supposed \"mysterious Disrep underground\" brewing on Blende.\n\t\t*goto finishfirstpair\n\t#Scabbard & Panic Attack, who frighten with displays of mass power. [i](Gain Constructive, Unleash)[/i]\n\t\t*set destructive %-15\n\t\t*set unleash %+15\n\n\t\t[b]SCABBARD[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] A Disrep of Blende and member of the infamous Arcana Four, one of the few Disreps to leave Blende and Distopia behind to seek additional power in the Galaxy beyond. She claims to have returned to Blende to usher in a new era of peace and prosperity, also claiming to have been Reborn from Versus.\n\t\t*line_break\n\t\t[b]Powers:[/b] Disrep abilities unknown. Cosmic TarotSword wind-based abilities.\n\t\t*line_break\n\t\t[b]Weapons:[/b] Wields the TarotSword.\n\t\t*line_break\n\t\t[b]Classification:[/b] Galactic-Level Agent, Near Omnipotent.\n\n\t\t[b]PANIC ATTACK[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] A Disrep of Blende who has actually been a long-running infamous adversary of The Representatives, because of an anxiety-power that builds up into panic attacks, which are only alleviated by turning into rage-monster form. She has tried to tame wild power and find a more productive outlet by joining The Representatives.\n\t\t*line_break\n\t\t[b]Powers:[/b] Anxiety-attack rage-monster form.\n\t\t*line_break\n\t\t[b]Weapons:[/b] When not transformed, exoskeleton to channel anxiety in smaller power doses.\n\t\t*line_break\n\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\tReading these over, you see two Disreps who have most often been seen as outcasts and villains because of their choices and their powers. You'd relate to them already as allies, but you have a feeling the fact that Scabbard and Chalice are married members of the Arcana Four will bond you even tighter…\n\n\t\tAssuming they haven't become fully estranged lovers. And assuming you ever reveal the true identities under your avatars to either.\n\t\t*goto finishfirstpair\n\n\n*label finishfirstpair\n*set spellodexyoursquad true\n\n*page_break\n\n*if (destructive > 75) and (unleash > 75)\n\t*achieve epiloguedestructiveunleash\n\n*if (destructive > 75) and (unleash \u003c 25)\n\t*achieve epiloguedestructivelimit\n\n*if (destructive \u003c 23) and (unleash > 75)\n\t*achieve epilogueconstructiveunleash\n\n*if (destructive \u003c 25) and (unleash \u003c 25)\n\t*achieve epilogueconstructivelimit\n\nThe stage lights shift and you realize you should return to the present. \n\nThe remaining contestant readouts are now saved to your Avatar Spellodex however, so you can read through them whenever you want or need. \n\nBut even from the few you were able to glimpse, you've noticed a consonance of rebellious Disreps, cosmic seekers, and shade agents. \n\nYou're not quite sure what seasonal theme this casting might service, but you and Chalice certainly fit into this list. \n\nOr at least, your true selves behind your avatars do.\n\n*page_break\n\nSpeaking of, you turn to Chalice's avatar to catch a glimpse. \n\nThis avatar inhabits a nonbinary body, one covered in shades of blue and dripping with ocean diamonds and droplet sapphires. A readout quickly accompanies your focus:\n\n[b]WAVERLY TIDE[/b]\n*line_break\n[b]Background:[/b] Unknown origins. A galaxy-spanning agent who claims to operate under the guidance of a tidal deity. Hir latest mandate is to win TRAINING GROUNDS and serve the Galaxy as a member of The Representatives.\n*line_break\n[b]Powers:[/b] Telepathic vibes that flow like water.\n*line_break\n[b]Weapons:[/b] Tele-drop gemstones and The Staff of Cups.\n*line_break\n[b]Classification:[/b] Local-Level Agent, Low Powered, Highly Skilled.\n\nObviously this avatar will suit Chalice's true identity and TarotCup powers quite nicely—but you do wonder if this also has any relation to the Disrep abilities she keeps so secret? You know it will likely suit The Wicked Wone and their own godly abilities, if need be.\n\n*page_break\n\nAll of this makes you realize that you'll now have to customize your own avatar. \n\nWhich is a perfectly timed realization, as the stage lights shift once again. \n\nThe Round 1 heroic pitch presentations are about to begin, so what better time to define your own contestant avatar? \n\nAn avatar you realize has been quite aptly named for you as:\n\n[b]The Babel.[/i]\n\n*page_break\n\nAs The Representatives take their seats along a Judges Panel table, you make your first customization. \n\nWhile still in the backstage dark, you can cast a quick spell to redesign your avatar's costume as The Babel. And while you're at it, why not ensure that this appearance reflects the powers you aim to lean into?\n\nRemembering Tellie's advice to hone two skill areas—which was certainly followed during your first leg of this journey—you cast a spell to project the spell powers you'll focus on in TRAINING GROUNDS. \n\nYou give The Babel the appearance of…\n\n*choice\n\t*selectable_if (parttwogothika) #A double-shaded mage. [i](Gain Shades, Enhancement)[/i]\n\t\t*set avatarshademage true\n\t\t*set shades +4\n\t\t*set enhancement +4\n\n\t\tYou think of your encounter with Pinkuju, all decked out in black and pink. \n\n\t\tBecause really, two shades are far better than one.\n\n\t\tWhich makes you think—why limit yourself to just two?\n\n\t\tYou then enhance your costume to change its two-toned display every so often, indicating that your power set rotates through the shades at regular intervals.\n\t\t*goto stormthestage\n\t*selectable_if (parttwoseas) #An ancient artifact wielder. [i](Gain Technology, Perception)[/i]\n\t\t*set avatarartifactwielder true\n\t\t*set technology +4\n\t\t*set perception +4\n\n\t\tYou think of your time on SeaS, feeling inspired by the many artifacts you encountered on the Isle of QueS.\n\n\t\tBesides, if you claim all of your power comes from some ancient artifact, you can still wield a wide array.\n\n\t\tIt might be a bit of technology you create, but a quick perception spell will make it fully believable. \n\n\t\tYou also decide to pitch your artifact forgery as a malleable one, so that it can change shape according to your powered whims and needs.\n\t\t*goto stormthestage\n\t*selectable_if (parttwoseas) #A shaded Wone. [i](Gain Shades, Perception)[/i]\n\t\t*set avatarshadedwone true\n\t\t*set shades +8\n\t\t*set perception +8\n\n\t\tYou think of your encounter with Lady Venuma, but take her rebellious energy one step further.\n\n\t\tYou decide to make everyone perceive you as Wone who has adopted the shades—a blasphemous combination of competing spiritual systems.\n\n\t\tThis powerful combo will also allow you to access many different spells skills without arousing suspicion, keeping your powers flexible and wide-ranging.\n\n\t\tPlus it will just piss a whole lot of people off.\n\t\t*goto stormthestage\n\t#A Machi $!{Babegwitchlock}. [i](Gain Shades, Technology)[/i]\n\t\t*set avatarmachiwitch true\n\t\t*set shades +8\n\t\t*set technology +8\n\n\t\t*if parttwogothika\n\t\t\tYou think first and foremost of Binaria, the lost and most powerful Machi Witch who ever lived. But then you also think of your brief encounter with Trig, a Machi Witch who has trained in the more modern art of Compuspells. \n\n\t\t*if parttwoseas\n\t\t\tYou think of your brief encounter with Trig, a Machi Witch who has trained in the art of Compuspells.\n\n\t\tObviously that's an art the Verses Galaxy is going to need very soon, one way or another.\n\n\t\tSo you give yourself the same mage-soldier energy as Trig, blending soft and hard, magic and machine.\n\n\t\tIt's a combination that is sure to rock the competition.\n\t\t*goto stormthestage\n\t*selectable_if (parttwogothika) #A shapeshifter, to become what they want and what I need. [i](Gain Enhancement, Perception)[/i]\n\t\t*set avatarshapeshifter true\n\t\t*set enhancement +8\n\t\t*set perception +8\n\n\t\tYou think of your time with ChantuSe and what she told you of her Cuttaran home world, full of cunning and adaptive beings like MamaNa.\n\n\t\tUsing a special blend of Enhancement and Perception to present as a shapeshifter will give you all the flexibility you need to access the full range of your powers, while also protecting the true layers of your identity.\n\n\t\tThough you have another idea, for a twist reveal for this character you're creating.\n\n\t\tWhat if, deep in the season or if you're potentially eliminated, you reveal that truly you are some kind of villainous blotted mage, as a way to introduce the galactic audience to the threat you'll all soon face?\n\t\t*goto stormthestage\n\t#A technopath who uses machine-creations to enhance functions. [i](Gain Enhancement, Technology)[/i]\n\t\t*set avatarbinuman true\n\t\t*set enhancement +8\n\t\t*set technology +8\n\n\t\tSo the Verses Galaxy is going to need Binumans?\n\n\t\tWhy not flex as the early example of one right now, displaying how technology can enhance humanoid functions?\n\n\t\tIf you can present as the ultimate hero, perhaps the Galaxy can get used to the idea of Binumanity.\n\n\t\tPlus, this form will give you all the flexibility you need to access the full range of your powers.\n\t\t*goto stormthestage\n\n*label stormthestage\n*if (shades > 40)\n\t*achieve epiloguedeshades\n\n*if (enhancement > 40)\n\t*achieve epilogueenhancement\n\n*if (perception > 40)\n\t*achieve epilogueperception\n\n*if (technology > 40)\n\t*achieve epiloguetechnology\n\n*page_break\n\n*if (potency > 12)\n\t*achieve epiloguepotency\n\nDespite the spells skills you've already worked so hard to build, you can already tell the chapter to come will be all about further honing these skills. After all, that's what TRAINING GROUNDS is for: to take novices and sharpen them into experts…if you're cut out to be one, that is.\n\nSpeaking of, you're quite proud of the Potency you've managed to acquire so far. You've reached a level of ${potency} out of a possible 15 by this juncture in your journey.\n\nYou know that, when you reach the end of this adventure, you're going to be called to cast enormous spells of one kind or another. Crafting the spells Potency necessary to do so needs to become one of your primary objectives, alongside all the rest.\n\nBecause it would be unthinkable to gather all the secrets and spells and resources needed to defend the Verses Galaxy, only to be unable to fuse, create, and destroy the necessary elements when the big moment arrives.\n\n*page_break\n\nWith your avatar costume and powers set, you actually hear your name, The Babel, called out on stage to present first.\n\nMoving your real legs, you experience the bizarre sensation of your avatar also stepping forward. You can't tell if the floor you feel beneath your suited feet is in the padded bunker room or the stage floor, but you do feel the heat of the stage lights on your skin and hear the whir of dozens of cameras swiveling to film you. \n\n[i]Wild[/i].\n\nAs you approach a microphone in the center of the stage, you feel a little bit like you're in that dream where you need to present to the class, but didn't prepare the assignment. \n\n*if unlockedquesthing\n\t*page_break\n\n\tLuckily, ${questhing} has chosen to follow you into the adventures to come. And as always, your Questhing has your back. It's a deep comfort, to have this kind of supportive companion, given all the new and foreign challenges you will no doubt face.\n\n\tBefore this first presentational round is engaged, ${questhing} opens its mouth to show you a familiar set of artifact teeth.\n\n\tAs with your first bonding, it conveys that the intersection of your Powerfulness/Powerlessness and Responsibility/Recklessness will matter most in this \"presentation of identity and intent\" you are about to craft. \n\n\tSo you check your levels and decide to accept:\n\n\t*choice\n\t\t#The Purse of the Powerless and the Powerful. [i](Auto Boost Stronger Stat)[/i]\n\t\t\t*if (powerful >= 50)\n\t\t\t\t*set powerful %+40\n\n\t\t\t\tAs always, ${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Powerful level rise higher.\n\n\t\t\t\t[i](Powerful Pursed)[/i]\n\t\t\t\t*goto finalpresentation\n\t\t\t*else\n\t\t\t\t*set powerful %-40\n\n\t\t\t\tAs always, ${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Powerless level rise higher.\n\n\t\t\t\t[i](Powerless Pursed)[/i]\n\t\t\t\t*goto finalpresentation\n\t\t#The Rosary of the Responsible and the Reckless. [i](Auto Boost Stronger Stat)[/i]\n\t\t\t*if (reckless >= 50)\n\t\t\t\t*set reckless %+40\n\n\t\t\t\tAs always, ${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Reckless level rise higher.\n\n\t\t\t\t[i](Reckless Risen)[/i]\n\t\t\t\t*goto finalpresentation\n\t\t\t*else\n\t\t\t\t*set reckless %-40\n\n\t\t\t\tAs always, ${questhing} presents you with your artifact of choice.\n\n\t\t\t\tInstantly, you feel your Responsible level rise higher.\n\n\t\t\t\t[i](Responsible Risen)[/i]\n\t\t\t\t*goto finalpresentation\n\t\t#The Urn of Unpredictability. [i](Double-Strength Boost, But Randomly Applied)[/i]\n\t\t\t*temp urnofunpredictabilityz 0\n\t\t\t*rand urnofunpredictabilityz 1 4\n\n\t\t\t*if (urnofunpredictabilityz = 1)\n\t\t\t\t*set powerful %+60\n\n\t\t\t\tAs always, ${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Powerful level rise exponentially higher.\n\n\t\t\t\t[i](Powerful Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityz = 2)\n\t\t\t\t*set powerful %-60\n\n\t\t\t\tAs always, ${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Powerless level rise exponentially higher.\n\n\t\t\t\t[i](Powerless Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityz = 3)\n\t\t\t\t*set reckless %+60\n\n\t\t\t\tAs always, ${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Reckless level rise exponentially higher.\n\n\t\t\t\t[i](Reckless Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityz = 4)\n\t\t\t\t*set reckless %-60\n\n\t\t\t\tAs always, ${questhing} presents you with your artifact of choice, selecting which of your levels to raise at random.\n\n\t\t\t\tInstantly, you feel your Responsible level rise exponentially higher.\n\n\t\t\t\t[i](Responsible Double Boosted)[/i]\n\n\t\t\t*goto finalpresentation\n*if unlockedspanbook\t\n\t*page_break\n\n\tIn the split seconds before this presentation begins, The Spanbook avatar ${spanbook} once again appears in your mind. You are so glad to have this special guide come along for your journey, as a very comforting constant and secret weapon.\n\n\tKnowing what you must accomplish, it offers you another curated entry, specifically on the intersection of your Powerfulness/Powerlessness and Responsibility/Recklessness.\n\n\tAs always, the effects will expand your horizons and your abilities. \n\n\tSo you check your levels and decide to read:\n\n\t*choice\n\t\t#Representative of the Powerless and the Powerful. [i](Auto Boost Stronger Stat)[/i]\n\n\t\t\t*gosub stsspecialentry\n\n\t\t\t*if (powerful >= 50)\n\t\t\t\t*set powerful %+40\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Powerful level rise higher.\n\n\t\t\t\t[i](Powerful Represented)[/i]\n\t\t\t\t*goto finalpresentation\n\t\t\t*else\n\t\t\t\t*set powerful %-40\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Powerless level rise higher.\n\n\t\t\t\t[i](Powerless Represented)[/i]\n\t\t\t\t*goto finalpresentation\n\t\t#Representative of the Responsible and the Reckless. [i](Auto Boost Stronger Stat)[/i]\n\n\t\t\t*gosub stsspecialentry\n\n\t\t\t*if (reckless >= 50)\n\t\t\t\t*set reckless %+40\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Reckless level rise higher.\n\n\t\t\t\t[i](Reckless Represented)[/i]\n\t\t\t\t*goto finalpresentation\n\t\t\t*else\n\t\t\t\t*set reckless %-40\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Responsible level rise higher.\n\n\t\t\t\t[i](Responsible Represented)[/i]\n\t\t\t\t*goto finalpresentation\n\t\t#Representative of Unpredictability. [i](Double-Strength Boost, But Randomly Applied)[/i]\n\t\t\t*temp urnofunpredictabilityy 0\n\t\t\t*rand urnofunpredictabilityy 1 4\n\n\t\t\t*gosub stsspecialentry\n\n\t\t\t*if (urnofunpredictabilityy = 1)\n\t\t\t\t*set powerful %+60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Powerful level rise exponentially higher.\n\n\t\t\t\t[i](Powerful Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityy = 2)\n\t\t\t\t*set powerful %-60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Powerless level rise exponentially higher.\n\n\t\t\t\t[i](Powerless Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityy = 3)\n\t\t\t\t*set reckless %+60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Reckless level rise exponentially higher.\n\n\t\t\t\t[i](Reckless Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityy = 4)\n\t\t\t\t*set reckless %-60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Responsible level rise exponentially higher.\n\n\t\t\t\t[i](Responsible Double Boosted)[/i]\n\n\t\t\t*goto finalpresentation\n*else\n\t*goto finalpresentation\n\n\n*label stsspecialentry\n\n[b]Span The Sergiverses[/b]\n*line_break\n[b]Entry:[/b] Year 2103\n*line_break\n[b]Location:[/b] Sorrel Fork, Blende\n*line_break\n[b]Relevant Event:[/b] The Representatives face their first crossover epic, The Consortium Crucible. This same year, the reality competition to earn membership on The Representatives premiers to smash ratings: TRAINING GROUNDS. The winners of the first season are the legendary pair of Pocket and Nifty Eons, both escaped from the Nagoll Rim.\n*return\n\n\n*label finalpresentation\n*page_break\n\nTaking a breath, you remind yourself that The Babel avatar character was built by Chalice and The Wicked Wone to be a brooding and mysterious competitor of few words.\n\nSo that means you need to keep this speech short and straightforward, especially since you're already debuting a brand-new costume in this presentation—one that clearly communicates your powers and your general vibe. \n\nKnowing this, you only have one thing to say to fully sharpen your identity as The Babel during this first introduction.\n\n\"I am The Babel…\"\n\n*choice\n\t#\"And I am the ultimate Chaotic Disruptor.\" [i](Test Powerful and Reckless)[/i]\n\t\t*set avatarchaoticdisruptor true\n\n\t\tThis one proclamation says it all. \n\n\t\tYou might be entitled and unruly and forceful, but you don't need to [i]tell[/i] anyone that. \n\n\t\tYou fully intend to [i]show[/i] them all.\n\n\t\t*if (powerful > 80) and (reckless > 80)\n\t\t\t*achieve epiloguepowerfulreckless\n\t\t\t*gosub finalrepsentationpoisitive\n\t\t\t*goto thebecomingfinale\n\t\t*else\n\t\t\t*gosub finalrepsentationnegative\n\t\t\t*goto thebecomingfinale\n\t#\"And I will be your Grim Reaper.\" [i](Test Powerful and Responsible)[/i]\n\t\t*set avatargrimreaper true\n\n\t\tThis one proclamation says it all. \n\n\t\tYou might be empowered and necessary and exacting, but you don't need to [i]tell[/i] anyone that. \n\n\t\tYou fully intend to [i]show[/i] them all.\n\n\t\t*if (powerful > 80) and (reckless \u003c 20)\n\t\t\t*achieve epiloguepowerfulresponsible\n\t\t\t*gosub finalrepsentationpoisitive\n\t\t\t*goto thebecomingfinale\n\t\t*else\n\t\t\t*gosub finalrepsentationnegative\n\t\t\t*goto thebecomingfinale\n\t#\"And I will serve as the ultimate Weapon for Vindication.\" [i](Test Powerless and Reckless)[/i]\n\t\t*set avatarvindicatingweapon true\n\n\t\tThis one proclamation says it all. \n\n\t\tYou might be burdened and lashing out and fighting for freedom, but you don't need to [i]tell[/i] anyone that. \n\n\t\tYou fully intend to [i]show[/i] them all.\n\n\t\t*if (powerful \u003c 20) and (reckless > 80)\n\t\t\t*achieve epiloguepowerlessreckless\n\t\t\t*gosub finalrepsentationpoisitive\n\t\t\t*goto thebecomingfinale\n\t\t*else\n\t\t\t*gosub finalrepsentationnegative\n\t\t\t*goto thebecomingfinale\n\t#\"And I will serve as your Proudest Hero.\" [i](Test Powerless and Responsible)[/i]\n\t\t*set avatarproudesthero true\n\n\t\tThis one proclamation says it all. \n\n\t\tYou might be humble and pained and impactful, but you don't need to [i]tell[/i] anyone that. \n\n\t\tYou fully intend to [i]show[/i] them all.\n\n\t\t*if (powerful \u003c 20) and (reckless \u003c 20)\n\t\t\t*achieve epiloguepowerlessresponsible\n\t\t\t*gosub finalrepsentationpoisitive\n\t\t\t*goto thebecomingfinale\n\t\t*else\n\t\t\t*gosub finalrepsentationnegative\n\t\t\t*goto thebecomingfinale\n\n\n*label finalrepsentationpoisitive\n*set belonging 50\n*set becoming +8\n\nAfter all, this is the person you've been Becoming all along.\n\n[i](Balanced Belonging-Independence. Boosted Bonus Becoming)[/i]\n*return\n\n*label finalrepsentationnegative\n*set becoming +4\n\nThis might not be exactly in alignment with the persona you've been building, but now is the time to start Becoming exactly who you aim to be.\n\n[i](Gained Basic Becoming)[/i]\n*return\n\n\n*label thebecomingfinale\n*page_break\n\n*if (becoming > 35)\n\t*achieve epiloguebecomingmax\n\nYou are then directed to the back of the stage, where twenty stools have been arranged. You take a seat as Chalice's avatar, Waverly Tide, comes out to speak next.\n\nSettling into your stool, you try to calm your hammering heartbeat. But all you can think about are the grueling rounds of competition you're about to enter, the difficult challenges and treacherous political votes you'll need to survive. And you haven't even glimpsed the ten competitors on the opposing Squad yet.\n\nCurious, you then glance at the opposite backstage wing and indeed see a huddle of the other Squad's contestants waiting there. \n\nHowever, your eyes are only able to absorb one completely shocking sight…\n\n*page_break\n*set britborisreveal true\n\nNone other than Brit and Boris at the head of the Squad pack, dressed in full costume as Prouder and Flecks.\n\nWhat the flirping flirp are they doing here as contestants on TRAINING GROUNDS? \n\nHow did they manage to get here in the two days since your finals back on Distopia? \n\nShouldn't they be at the Distopia Academy graduation ceremony right now?\n\n*fake_choice\n\t#Unless…they somehow entered weeks ago and never told me? \n\t\tThe thought bakes your bones in an instant.\n\t#I tell myself there must be some other explanation.\n\t\tThere must have been some last-minute casting switch and some recent Distopia Academy grads were plucked as replacements.\n\t#It doesn't matter why they're here, really.\n\t#I'm just so excited that my two best friends are really here.\n\nAfter all, being on TRAINING GROUNDS represents every single one of Boris and Brit's wildest dreams coming true. \n\nYou can't help the burst of pride you feel for them, no matter the circumstances. \n\nIn fact, you wish you could run to them and tell you that you've found your own way here as well. After all, nothing could be more unexpected or circuitous than the path that led you to here at the last minute as well.\n\nHowever, a new readout flashes across your screen next. \n\nAnd reading it, Boris and Brit's unexpected presence here on TRAINING GROUNDS takes on some potential new clarity.\n\n*page_break\n\n*image gcseal.jpg center Seal of the Galactic Council\n\n[b]Galactic Council Emergency Broadcast: Override Alpha[/b]\n*line_break\n[b]CRIMSON ALERT[/b]\n*line_break\nPERSON OF INTEREST: CURRENTLY MOST WANTED IN THE GALAXY\n*line_break\n[b]Babe \"${babename}\" Fortune[/b]\n\nWanted for Questioning for:\n*line_break\n*if parttwogothika\n\t--Breaking Galactic Awareness Laws\n\t*line_break\n\t--Illegal Traveling with Known Fugitives Wanted for Murder\n\t*line_break\n\t--Seeking spells of Mass Destruction & Abominable Construction\n*if parttwoseas\n\t--Seeking spells of Mass Destruction & Abominable Construction\n\t*line_break\n\t--Classified Galactic Tampering\n\t*if seasobtainsource\n\t\t*line_break\n\t\t--Defiling & Weaponizing Ancient Power Sources\n*line_break\n[i]Please Call Official GC Hotline With Any Sightings or Tips[/i]\n\n*image gcseal.jpg center Seal of the Galactic Council\n\n*page_break\n\nThe seal of the Galactic Council sears itself into your retinas as you read this push notification. \n\nAnd you instantly think of\n*if parttwoseas\n\tTori Reece and her shade agents, Empiria Midnight and The Night Orchid, reporting your \"crimes\" to the GC.\n\n\tYou think of the other Destructive Eight hearing this news, and you feel an odd sense of relief. At the very least, these beings will know the truth about you.\n\n\tBecause thinking about everyone you've met back on Distopia, you know they're already inclined to believe the worst about you—so why wouldn't they believe this?\n\n\t*if seasobtainsource\n\t\tJust like somewhere back on SeaS, ${princese} Kyleigh must be believing the worst about you as well.\n\t\t*goto youarthefug\n\t*else\n\t\tYou just hope, somewhere back on the Isle of QueS, Leigh knows better than to believe this galactic slander.\n\t\t*goto youarthefug\n*else\n\tThe Delegates Shadow reporting your \"crimes\" to the GC.\n\n\tYou think of the other Destructive Eight hearing this news, and you feel an odd sense of relief. At the very least, these beings will know the truth about you.\n\n\tBecause thinking about everyone you've met back on Distopia, you know they're already inclined to believe the worst about you—so why wouldn't they believe this?\n\n\t*if gothikaobtainlocation\n\t\tJust like somewhere back on Gothika, One-Fourteen and so many others must be believing the worst about you without even having heard this galactic slander.\n\t\t*goto youarthefug\n\t*else\n\t\tYou just hope that somewhere back on Gothika, if One-Fourteen finds a way to keep tabs on you, that ${oftze} knows better than to believe this galactic slander.\n\t\t*goto youarthefug\n\n*label youarthefug\n*page_break\n\nFinally, you can't help but think—perhaps Brit and Boris have been cast here on TRAINING GROUNDS for a very good reason…\n\nBecause their best friend is now infamous across the entire galactic span.\n\nBecause [i]you[/i], ${babename}, infamous Disrep ${babegwitchlock} of Blende and Distopia…\n\nAre now the [b]Most Wanted Fugitive in the Verses Galaxy[/b].\n\n*page_break FAR FROM THE END\n\n*image fortunethefatedcover.jpg center FORTUNE the FATED\n\n*page_break A NOTE FROM THE AUTHOR\n\n[b]AUTHOR'S NOTE[/b]\n\nDearest Reader,\n\nCan't wait to see what happens next? Neither can I! \n\nIn Book Two of the [b]FORTUNE THE FATED Duology[/b], we'll continue with a fully gamed-out season of TRAINING GROUNDS, where elimination or being voted out is always a possibility—and the honor of winning will only be achieved by a harrowed few. Then we'll engage in an epic space ship heist chase, before we enter our ultimate galaxy-spanning endgame. And all the while, we'll be on the fugitive run from the most powerful agents in the Verses Galaxy, who have no idea you're trying to save them all…or who somehow know enough to think you'll do more harm than good.\n\nWhat other cosmic characters will you encounter? Will you be able to do what you must to save the Verses Galaxy? To save everything, is there anything you wouldn't destroy? Do you break things, or do you maybe put them back together? As always, the answers to these questions will be up to YOU!\n\nThis Duology has been written and produced entirely independently for Hosted Games. I'll only be able to write Book Two with your support on Patreon…\n\nBut that also means you'll have the unprecedented ability to help me shape the story as I write! I've intended FORTUNE THE FATED to be an introduction to many worlds and characters in the Verses Galaxy, so I need your help choosing where to return and which characters to continue to feature.\n\n*link https://www.patreon.com/posts/fortune-fated-74099854 Click Here To Shape the Future of FORTUNE THE FATED Stories\n*line_break\n[i]NOTE: Polls and Feedback might contain SPOILERS if you haven't explored every outcome of Book One yet.[/i]\n\n*page_break\n\nSpeaking of, have you managed to explore every world and mission available in FORTUNE THE FATED Book One? You can use the Achievements list in your Stats screen to find out. \n\nIn the meantime, there are also lots of story extensions to explore in your Spellodex! Most of them lead to your portal to the rest of the Sergiverse: \n*line_break\n*link https://zacharysergi.com/interactive-novels Full List of Novels\n*line_break\n*link https://zacharysergi.com/interactive-series Full List of Series\n\nUntil next time…\n\nEternally Grateful,\n*line_break\nZachary Sergi (aka Babe \"Read\" Fortune)\n*line_break\n*link https://zacharysergi.com/interactive-novels#/fortune-the-fated/ Click Here For Most Recent Updates on FORTUNE THE FATED Projects\n\n*image zslogo.jpg center Zachary Sergi\n\n*comment We need to add the SAVE GAME coding here please!\n\n*goto_scene ending\n", "ftf_partone": "*comment é\n\n*image zslogo.jpg center Zachary Sergi\n\n*page_break\n\n*image fortunethefatedbanner.jpg center Fortune the Fated\n\n[i]Author's Foreword[/i]\n\nDearest [b]NEW[/b] Reader: FORTUNE the FATED is a standalone work and requires no previous experience, either with existing novels or interactive reading.\n\nDearest [b]FAITHFUL[/b] Reader: FORTUNE the FATED, while a new and separate story, still serves as a companion novel to The Versus Trilogy & The Heroes Rise Series, carrying forward the story of The Sergiverse.\n\nFORTUNE the FATED is designed to be the perfect introduction OR the perfect reintroduction (full of familiar faces).\n\nFor a full listing of my interactive novels, head to\n*line_break\n*link https://zacharysergi.com/interactive-novels ZacharySergi.com\n\nHope you're ready for one epic adventure…\n*line_break\nZS\n\n*page_break\n\n*image fortunethefatedcover.jpg center FORTUNE the FATED\n\n*image ftftitlewhite.jpg center Fortune the Fated\n\n*page_break\n\n*image ftftitleblack.jpg center Fortune the Fated\n\n[b]BOOK ONE[/b]\n*line_break\n[b]TABLE OF CONTENTS[/b]\n\n[b]PART ONE:[/b] The Destructive Constructions of Babe Fortune\n*line_break\n[b]PART TWO:[/b] [i](To Be Determined By Reader)[/i]\n*line_break\n[b]EPILOGUE:[/b] Enter The Grounds of Training \n\n[b]Author's Note[/b]\n*comment *line_break\n*comment [b]Short Story Annex[/b] [i](Forthcoming)[/i]\n\n*page_break\n\n*image fortunethefatedbanner.jpg center Fortune the Fated\n\n[b]PART ONE[/b]\n*line_break\nThe Destructive Constructions of Babe Fortune\n\n*page_break CHAPTER I\n\n[b]CHAPTER I[/b]\n*line_break\nYou break things, or maybe you put them back together?\n\nIt's the same internal war you wage every day, but this morning the battle carries extra weight. This morning you face the finals. These grueling tests are crafted to simulate the kind of battles you will inevitably encounter, being born as you are. And while your life might not actually hang in the balance yet, your final grades certainly do.\n\nYou're not sure grades matter to you—but they definitely matter to your best friends. These two stand by your side now, waiting for the foghorn to sound. You will win for them, but you will also win because you must.\n\nFor you cannot lose.\n\n*page_break\n\nYou steel yourself as you fix your eyes on the horizon. This refuge planet still feels new and unfamiliar to you, but then, it feels this way to [i]all[/i] of your displaced people. Just like everyone else these past couple years, you've found things to like about this resettled planet.\n\nFor example, the fact that The Distopian Academy was built here, in the Perpetual Autumnaland sphere. You always enjoy letting the crisp air and crunching leaves clear your mind, forever in free fall. The rolling hills beyond the athletic fields remain littered burnt orange and warm yellow…\n\nThough hearing new words waft over on the winds, you suddenly picture adding the red blood of your enemies to the landscape.\n\n\"Oh, great. Of course they pit us against the freak.\"\n\n\"Whatever. If we're the ones who take the ticking timebabe out, we'll be heroes all break long.\"\n\n*page_break\n\nThey're talking about you, of course. \n\nOnce upon a time, you were meant to belong here among your own people—the Disreps, hybrids from planet Blende born with special powers. \n\nYou chose to follow the bold leaders of your kind who paved the way here. Just like them, you traveled the stars to escape the hate, the jealousy, and the fear that plagued you on your home planet. \n\nBut this animosity just followed [i]you[/i] here to the supposed heavens, the way it always has.\n\nThe way you know it always will.\n\n*page_break\n\n\"Ignore them,\" Brit whispers beside you. \n\nYou should listen to her. Brit knows better. You should listen…\n\nBut that familiar feeling has already baked its way into your bones.\n\n[i](For Character Stats, open the Show Stats screen. For Strategy Guidance, follow the prompts formatted like this.)[/i]\n\n*choice\n\t#\"I'm going to ruin them,\" I whisper back, anger quaking through my clenched teeth. [i](Gain Powerful, Reckless)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t\n\t\t*gosub borisdown\n\n\t\t[b]No, WE'RE going to ruin them.[/b]\n\t\t*goto foghornblares\n\t#I nod, not needing to say a thing. Defeating and embarrassing my opponents is now a sure thing. [i](Gain Powerful, Responsible)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\n\t\t*gosub borisdown\n\n\t\t[b]Remember, A+ stands for ass-plus-kicking.[/b]\n\t\t*goto foghornblares\n\t#I ball my hands into fists. I may not have asked for my cursed power, but today I will enjoy using it. [i](Gain Powerless, Reckless)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t\n\t\t*gosub borisdown\n\n\t\t[b]Oh, this is going to be FUN.[/b]\n\t\t*goto foghornblares\n\t#\"They're just afraid,\" I say, with understanding. Because my own power frightens me, too. [i](Gain Powerless, Responsible)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t\n\t\t*gosub borisdown\n\n\t\t[b]Then let's give them enough fear to crap their tacky uniforms.[/b]\n\t\t*goto foghornblares\n\n\n*label borisdown\nBeside Brit, Boris looks down at you through his fishbowl helmet. His mouth moves a mile a minute, but the sound is muffled silent.\n\nBoris's power makes it so that he can't help speaking every word of his inner monologue. You can only imagine what he'd be saying if his soundproof helmet didn't mute his constantly whirring voice.\n\nBut then you don't have to imagine, because Boris types out some words through his suit. His chosen message scrolls across his fishbowl like ticker tape.\n*return\n\n\n*label foghornblares\n*page_break\n\nBrit and Boris are the flirping best. You'd be truly lost without them.\n\nBut then, as the finals foghorn blares, you remember they are no longer Brit and Boris. In the field, they now become Prouder and Flecks, called only by their chosen Disrep names.\n\nProuder, the pale girl with the explosive touch—and the unbearable weight of maternal legacy on her shoulders. She bursts forward in a blur of color-blocked fury. The clean lines of Prouder's black-and-white costume, accented with flashes of pink and orange, feels just like her personality: bouncing between proper and explosive.\n\nBeside her lumbers Flecks, the boy genius made of over-flexed muscles—the biggest being his brain. He rumbles along in the skintight stretch-blend he created himself, all five-hundred pounds of muscle straining for release. Flecks has felt much more comfortable bodybuilding since his gender confirmation last year, his brown skin rippling with newly bulging muscle.\n\n*page_break\n\nThen there's you, lifted into the sky behind your squad. \n\nYou, the infamous witchlock, defined by everything and limited by nothing.\n\nYou, the orphan cliché, wanted by no one and feared by everyone.\n\nYou, whose chosen name hangs on everyone's silenced lips.\n\nYou, ready to show them all what you're really made of.\n\n*page_break\n\nYour assignment for this final is painfully straightforward: win a game of Capture The Crest. Simple enough, at least until the complications arise—mostly from the reality that students can all utilize the unique powers you've been born with as Disreps.\n\nFortunately, you know what to expect from the opposing squad. They're the Academy-student-body-dubbed \"Hottie Trinity,\" popular athletes gifted with strength, speed, and stamina—along with their annoying conventional beauty.\n\nDouble fortunately, no one knows what to expect from your squad, the Academy-student-body-dubbed \"Busted Trinity,\" not-so-cleverly named for the \"B\" in your first names.\n\nWell, for better or worse, your first choice in this finals test will be how to handle the hottie-B-notties.\n\n*choice\n\t#\"You two stay here and defend our crest,\" I command, taking the lead as usual. \"I'll handle the offensive.\" [i](Test Powerful)[/i]\n\t\t*if (powerful > 50)\n\t\t\t*gosub happycommand\n\t\t\t*goto babeonoffense\n\t\t*else\n\t\t\t*gosub unhappyfollow\n\t\t\t*goto babeonoffense\n\t#I nod when Prouder tells me to stay behind on defense while she and Flecks handle the offense. [i](Test Powerless)[/i]\n\t\t*if (powerful \u003c 50)\n\t\t\t*set prouder %+15\n\t\t\t*set flecks %+15\n\t\t\t*set belonging %+5\n\t\t\t*set becoming +4\n\t\t\t[i](Gained Prouder, Flecks)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Belonging, Boosted Bonus Becoming)[/i]\n\n\t\t\tYou might be the most powerful in your trio, but Prouder is the born leader among you.\n\t\t\t*goto babeondefense\n\t\t*else\n\t\t\t*set prouder %-5\n\t\t\t*set flecks %-5\n\t\t\t*set becoming +2\n\t\t\t[i](Lost Prouder, Flecks)[/i]\n\t\t\t*line_break\n\t\t\t[i](Balanced Belonging. Gained Basic Becoming)[/i]\n\n\t\t\tWhen Prouder takes the lead like this, you're always tempted to remind her that you're the most powerful here. She can tell you're about to say something, but Flecks shoots you a silencing motor-mouthed look. So you stay quiet, mostly because this is the call you would've made anyway.\n\t\t\t*goto babeondefense\n\t#Just let it rip. Don't consult anyone or give our opponents any warning. [i](Test Reckless)[/i]\n\t\t*if (reckless > 50)\n\t\t\t*set prouder %+15\n\t\t\t*set flecks %+15\n\t\t\t*set belonging %-5\n\t\t\t*set becoming +4\n\t\t\t[i](Gained Prouder, Flecks)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Independence, Boosted Bonus Becoming)[/i]\n\n\t\t\tProuder and Flecks know you can handle this all on your own, especially if you maintain the element of surprise.\n\t\t\t*goto babeonoffense\n\t\t*else\n\t\t\t*set prouder %-5\n\t\t\t*set flecks %-5\n\t\t\t*set becoming +2\n\t\t\t[i](Lost Prouder, Flecks)[/i]\n\t\t\t*line_break\n\t\t\t[i](Balanced Independence. Gained Basic Becoming)[/i]\n\n\t\t\tProuder and Flecks don't like it when you go rogue like this, but they'll be thanking you after you win this.\n\t\t\t*goto babeonoffense\n\t#\"I'll set up a defensive perimeter,\" I command, taking the lead as usual. \"You two focus on capturing their crest.\" [i](Test Responsible)[/i]\n\t\t*if (reckless \u003c 50)\n\t\t\t*gosub happycommand\n\t\t\t*goto babeondefense\n\t\t*else\n\t\t\t*gosub unhappyfollow\n\t\t\t*goto babeondefense\n\n*label happycommand\n*set prouder %+15\n*set flecks %+15\n*set belonging %+5\n*set becoming +4\n[i](Gained Prouder, Flecks)[/i]\n*line_break\n[i](Gained Belonging, Boosted Bonus Becoming)[/i]\n\nProuder and Flecks both nod at you, moving to fulfill your command without hesitation.\n*return\n\n*label unhappyfollow\n*set prouder %-5\n*set flecks %-5\n*set becoming +2\n[i](Lost Prouder, Flecks)[/i]\n*line_break\n[i](Balanced Independence. Gained Basic Becoming)[/i]\n\nProuder hesitates a moment, wanting to question your command. She hates it when you assume the lead—and Flecks hates it when there's friction between you two. Still, they both know your command is correct, so they both move to fulfill it.\n*return\n\n\n*label babeonoffense\n\nYou fly forward across the field, your only goal to get the enemy team's crest—and tear through anyone stupid enough to get in your way.\n\nYou don't really understand how your powers work—no one does, so far. All you know is that you can cast what others call \"spells\" automatically, pulling from all different kinds of sources. \n\nSo for this offensive barrage, you cast one of your favorite signature spells.\n\n*choice\n\t#I create the illusion that volcanic geysers are erupting along my flight path. [i](Gain Destructive, Unleash, Perception)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %+15\n\t\t*set perception +4\n\n\t\tUsually no one can tell the difference between the times your spells are real and the times you're altering their perceptions—at least, not until it's too late.\n\n\t\tCase in point: the enemy team running and ducking and covering as your spell tricks them into seeing volcanic geysers. These illusion-geysers burst from the ground all around and the enemy team tries to move away frantically. Meanwhile, you fly forward through the illusory explosions with ease. \n\n\t\tThe best part?\n\n\t\tThe audience of students and teachers aren't affected by your perception spell, so it looks to them like the enemy team is fleeing for no reason at all—other than to avoid you at all costs.\n\n\t\t*label spelloffenseoutcome\n\t\t*page_break\n\n\t\tYour spell works exactly as intended, clearing you a clean path to the enemy crest. \n\n\t\tOnce you snatch it, you turn to fly back into your team's territory for the win.\n\n\t\tHowever, you quickly find that your first spell has already worn off. Which means all three of the Hottie Trinity have recovered…\n\n\t\tAnd now focus the full breadth of their attacks on you.\n\t\t*goto bigfinale\n\t#I cause the communicators on the enemy team's uniforms to explode. [i](Gain Destructive, Limit, Technology)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %-15\n\t\t*set technology +4\n\n\t\tYou're not sure what move the enemy team would make first, but it doesn't matter.\n\n\t\tOnce their communicators explode in unison, they're all too distracted by the flames to do much of anything. \n\n\t\tSince you've also taken away their ability to coordinate, you are able to fly forward unimpeded.\n\t\t*goto spelloffenseoutcome\n\t#I temporarily enhance my own durability to nearly invulnerable levels. [i](Gain Constructive, Unleash, Enhancement)[/i]\n\t\t*set destructive %-15\n\t\t*set unleash %+15\n\t\t*set enhancement +4\n\n\t\tLet the enemy team try to stop you all they want.\n\n\t\tIn fact, that's exactly what all three of them aim to do. The Hottie Trinity remains purely on defense, to attempt to overwhelm you.\n\n\t\tGood thing you're able to bowl through them like a human battering ram, not taking even a lick of damage.\n\t\t*goto spelloffenseoutcome\n\t#I create bubbles of purple shielding energy around the enemy team members. [i](Gain Constructive, Limit, Shades)[/i]\t\n\t\t*set destructive %-15\n\t\t*set unleash %-15\n\t\t*set shades +4\n\n\t\tYou're not sure what move the enemy team would make first, but it doesn't matter.\n\n\t\tOnce all three of them are encased in bubbles of purple energy, they're all too distracted trying to break free to do much of anything. \n\n\t\tSince you've just also taken away their ability to coordinate, you are able to fly forward unimpeded.\n\t\t*goto spelloffenseoutcome\n\n\n*label babeondefense\n\nYou hang back to set up a defensive perimeter around your crest.\n\nYou don't really understand how your powers work—no one does, so far. All you know is that you can cast what others call \"spells\" automatically, pulling from all different kinds of sources. \n\nSo for this defensive maneuver, you cast one of your favorite signature spells.\n\n*choice\n\t#I create the illusion that volcanic geysers are erupting all around our crest. [i](Gain Destructive, Unleash, Perception)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %+15\n\t\t*set perception +4\n\n\t\tUsually no one can tell the difference between the times your spells are real and the times you're altering their perceptions—at least, not until it's too late.\n\n\t\tCase in point: the enemy team running and ducking and covering as your spell tricks them into seeing volcanic geysers. These illusion-geysers burst from the ground all around as the enemy team tries to move. \n\n\t\tThe best part?\n\n\t\tThe audience of students aren't affected by your perception spell, so it looks to them like the enemy team is fleeing for no reason at all.\n\n\t\t*label spelldefenseoutcome\n\t\t*page_break\n\n\t\tYour spell works exactly as intended, leaving Prouder and Flecks a clear path to obtain the enemy crest. \n\n\t\tHowever, you quickly find that your first spell has already worn off. Which means all of the enemy Hottie Trinity team members have recovered…\n\n\t\tAnd now refocus the full breadth of their attacks on you.\n\n\t\tThey must think they can overwhelm you and steal your crest before Flecks and Prouder can make it back.\n\t\t*goto bigfinale\n\t#I temporarily enlarge my muscles so that I'm strong and invulnerable enough to smash anyone who comes near our crest. [i](Gain Destructive, Limit, Enhancement)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %-15\n\t\t*set technology +4\n\n\t\tLet the enemy team try to steamroll you all they want.\n\n\t\tIn fact, that's exactly what all three of them aim to do, remaining purely on the offensive to attempt to overwhelm you.\n\n\t\tGood thing that, as they try to approach the crest separately, you're strong enough to swat each one of them away with ease.\n\n\t\tIt feels like child's play, honestly.\n\t\t*goto spelldefenseoutcome\n\t#I use the spare parts I keep in my belt to create and animate a deadly destroyer drone. [i](Gain Constructive, Unleash, Technology)[/i]\n\t\t*set destructive %-15\n\t\t*set unleash %+15\n\t\t*set technology +4\n\n\t\tLet the enemy team try to steamroll you all they want.\n\n\t\tIn fact, that's exactly what all three of them try to do, remaining purely on the offensive.\n\n\t\tGood thing the drone you assemble with your flexing, twitching fingers is more than capable of defending against them. Your spell-drone is able to electrocute and rubber-bullet and hose-blast each of the enemy team members as they try to approach the crest separately.\n\n\t\tIt feels like child's play, honestly.\n\t\t*goto spelldefenseoutcome\n\t#I create a bubble of purple shielding energy around our crest. [i](Gain Constructive, Limit, Shades)[/i]\t\n\t\t*set destructive %-15\n\t\t*set unleash %-15\n\t\t*set shades +4\n\n\t\tYou wrap the crest in a bubble of purple shielding energy, then step out of the way.\n\n\t\tEach of the enemy team members attempt to crack through the shades energy with their respective powers…\n\n\t\tAnd each one of them is knocked backwards, stunned with a charge of defensive backlash energy.\n\n\t\tIt feels like child's play, honestly.\n\t\t*goto spelldefenseoutcome\n\n\n*label bigfinale\n*page_break\n\nWithin the span of seconds, the Hottie Trinity has you surrounded. You've always looked down on these pretty idiots, because they seem to share one brain between the three of them. However, you have to hand it to them now…\n\nSharing one brain is a pretty useful trait in a team combat scenario.\n\nAs all three of them begin to press in around you, you are engulfed in a swirl of square jaws and exposed muscles. \n\nBut no one touches you unless you want them to.\n\n*choice\n\t#Pull Flecks over and drop him on top of the enemy team like a muscled bomb, enhancing his strength and durability massively. [i](Test Flecks. Gain Enhancement)[/i]\n\n\t\tWith a flick of your wrist, you cast another spell to enhance Flecks, loading him up like a coiled spring.\n\n\t\t*if (flecks > 80)\n\t\t\t*set enhancement +4\n\t\t\t*set potency +2\n\n\t\t\tGiven your connection, all it takes is one look between you and Flecks for him to understand what you're up to.\n\n\t\t\tWhich is why he reacts seamlessly, coordinating with your enhancements to lift into the air…\n\n\t\t\tAnd drop down in the middle of the Hottie Trinity like a pile of bricks, sending them scattering.\n\n\t\t\t[i](Boosted Bonus Enhancement, Potency)[/i]\n\t\t\t*goto horrorandterror\n\t\t*else\n\t\t\t*set enhancement +2\n\t\t\t*set potency +1\n\n\t\t\tFlecks begins to fly through the air, but you can tell your move takes him by surprise. At first, he fights against it.\n\n\t\t\tIt's too late to stop your spell now, so Flecks spins through the air while flailing, his limbs flapping to gain back some control.\n\n\t\t\tYou drop Flecks down in the middle of the Hottie Trinity like a pile of bricks, sending them scattering. The maneuver works, but it didn't look the slightest bit coordinated or graceful.\n\n\t\t\tNor does Flecks appear particularly pleased with you.\n\n\t\t\t[i](Gained Enhancement, Potency)[/i]\n\t\t\t*goto horrorandterror\n\t#Cast an illusion to make the enemy team fight each other. [i](Test Constructive or Limit. Gain Perception)[/i]\n\n\t\tWhy do any heavy lifting at all when you can just convince the Hottie Trinity to take themselves out like a bunch of morons?\n\n\t\tWith a flick of your wrist, you cast a spell to make this enemy team see each other as Flecks, Prouder, and you. \n\n\t\tWithin the span of a few seconds, they react on instinct, attacking one another.\n\n\t\t*if (destructive \u003c 50) or (unleash \u003c 50)\n\t\t\t*set perception +4\n\t\t\t*set potency +2\n\n\t\t\tWith almost comically flawless precision, the Hottie Trinity then takes themselves fully out, thanks purely to your bewitching, warlocked ways.\n\t\t\t\n\t\t\t[i](Boosted Bonus Perception, Potency)[/i]\n\t\t\t*goto horrorandterror\n\t\t*else\n\t\t\t*set perception +2\n\t\t\t*set potency +1\n\n\t\t\tHowever, you're not quite as skilled in this kind of focused, constructive attack, so the spell breaks down after the first punch is thrown.\n\n\t\t\tLuckily Flecks and Prouder were able to swoop in while the enemy team was distracted, and they finish the job you somewhat sloppily started.\n\t\t\t\n\t\t\t[i](Gained Perception, Potency)[/i]\n\t\t\t*goto horrorandterror\n\n\t#Just blast them away. [i](Test Destructive or Unleash. Gain Shades)[/i]\n\n\t\tAll you really need is one powerful blast of energy to knock the Hottie Trinity completely off the board.\n\n\t\tCharging up, you cast a spell for pink shades energy to start coursing around your hands. You aim to sap the enemy team of their consciousness with a powerful mental-energy-wiping blast.\n\n\t\tOne moment later, you unleash the torrent of charged pink shades energy at the enemy team.\n\n\t\t*if (destructive > 50) or (unleash > 50)\n\t\t\t*set shades +4\n\t\t\t*set potency +2\n\n\t\t\tAnd this spell blast works just like a charm, exactly as intended.\n\n\t\t\t[i](Boosted Bonus Shades, Potency)[/i]\n\t\t\t*goto horrorandterror\n\t\t*else\n\t\t\t*set shades +2\n\t\t\t*set potency +1\n\n\t\t\tThis spell blast works just like a charm, exactly as intended. However, you also destroy a good chunk of the Academy sporting fields with the spell backwash…\n\n\t\t\tAnd these fields are still needed for dozens of finals today.\n\n\t\t\t[i]Whoops[/i]. Guess you need to practice your destructive unleashing a bit more.\n\n\t\t\t[i](Gained Shades, Potency)[/i]\n\t\t\t*goto horrorandterror\n\n*label horrorandterror\n*page_break\n*achieve passthefinals\n\nThe foghorn blares through the air for a second time, indicating that your team has won. It turns out, if the other team has been knocked out entirely, failing to retrieve their crest becomes a foregone conclusion.\n\nAs Prouder and Flecks jog to you, you expect to see looks of pride and celebration on their faces. Winning this game of Capture the Crest guarantees a baseline of a 90% on your finals grade. You expect to hear cheers and applause.\n\nBut you should know better. \n\nLooking at Prouder and Flecks, you see their faces are preoccupied with the reaction from the crowd of students and teachers in the stands. \n\n*page_break\n\nTurning your attention there, you see why.\n\nAll you find in the faces of your peers and mentors are looks of fear and intimidation. \n\nInstead of impressed, they all appear horrified. Those who don't look outright terrified or disgusted simply offer jealous sneers.\n\nAnd you're far too accustomed to knowing how this reaction makes you feel.\n\n[i](Only choices that drive action or set intention will affect Stats.)[/i] \n*line_break\n[i](Internal monologue choices allow for freed character-building, not needing to factor external effects on Stats.)[/i]\n\n*fake_choice\n\t#I suppose I [i]did[/i] just wipe my opponents clean off the board without breaking a sweat.\n\n\t\tAnd you didn't exactly care about the collateral damage done in your direct path to victory, did you? You acted without caring what anyone thinks of you or your actions.\n\n\t\tSo then it follows that you shouldn't care about anyone seeing you sweat them.\n\n\t\tYou might feel anger flooding your entire system over their reactions…\n\n\t\tBut no one will get the satisfaction of getting a rise out of you. \n\n\t\tSo you walk off the field with your back turned and your head held high.\n\n\t#I am powerful and exceptional, and I always have been. Shouldn't that be celebrated?\n\n\t\tApparently not. \n\n\t\tInstead of idolizing or respecting you, most usually choose to despise you. To fear you. \n\n\t\tBut you will always have the one thing they cannot take from you…\n\n\t\tYour dignity.\n\n\t\tSo despite the anger flooding your system, you walk off the field with your back turned and your head held high.\n\n\t#They all hate that I won, because it reminds them how small they are compared to the enormity of my abilities. \n\n\t\tHow cold they must feel, standing in the shadow you cast.\n\n\t\tNo wonder they choose to fear you.\n\n\t\tBut you will always have the one thing they cannot take from you…\n\n\t\tYour personal power.\n\n\t\tSo despite the anger flooding your system, you walk off the field with your back turned and your head held high.\n\n\t#I [i]should[/i] know better. I [i]should[/i] expect this. I [i]should[/i] be over this… \n\n\t\tSo then why do tears sting the corners of your eyes, all the same?\n\n\t\tRegardless, you refuse to allow anyone to see that you are affected by their misguided reactions to your performance. \n\n\t\tYou might feel anger flashing hot through you, but you will always have the one thing they cannot take from you…\n\n\t\tYour dignity. \n\n\t\tSo despite the emotion flooding your system, you walk off the field with your back turned and your head held high.\n\n*page_break CHAPTER II\n\n[b]CHAPTER II[/b]\n*line_break\nYou just barely manage to make it back to your dorm room before the explosion arrives.\n\nYou've never understood how anyone can hide their emotions. How do other people bury them or ignore them? What a luxury.\n\nWhen you feel something, it's like the emotion overrides everything and anything else. \n\nIt already begins spilling over, just as you get the door closed.\n\n*choice\n\t#Alter the sights in the room around me to match my blind fury. [i](Gain Perception)[/i]\n\t\t*set perception +4\n\n\t\tFor a moment, the entire room becomes a scene straight from your brain.\n\n\t\tA pure expression of your pain, real and alive.\n\n\t\tReal enough for you to bash at with your flirping fists for a good stretch.\n\t\t*goto worstpasses\n\t#Create a soundproof tech helmet to absorb my tears and screams. [i](Gain Technology)[/i]\n\t\t*set technology +4\n\n\t\tYou cast a spell to animate the tech parts you keep in your utility belt.\n\n\t\tQuickly, a soundproof type of space helmet forms around your head.\n\n\t\tWhich gives you all the freedom you need to scream your flirping lungs out.\n\t\t*goto worstpasses\n\t#Numb my emotion with a pink energy spell. [i](Gain Shades)[/i]\n\t\t*set shades +4\n\n\t\tSome people scream, some people drink, some people take pills.\n\n\t\tBut when your emotion feels like it's just too flirping much…\n\n\t\tYou wash yourself in a soothing pink shades spell, sending your emotion on a smooth current out of your body.\n\t\t*goto worstpasses\n\n*label worstpasses\n*page_break\n\nOnce the worst of it passes, you sit on your bed and attempt to steady your breathing. You try to focus on this room you share with Brit and Boris, to let the details fill your mind with anything except stinging emotion. \n\nYou soak up Brit's corner first, all neat and eerily tidy, with color-coded bookshelves and neatly folded bed corners. She has framed art on her walls, all originals purchased from up-and-coming contemporary artists here on Distopia.\n\nFeeling both calmed and confined, you then turn to Boris's corner. Everything there is exaggerated to accommodate his size, but it all still bulges and overflows. Even though Boris attempts to organize his things, his corner remains cluttered with all the notes and experiments his brain constantly churns out.\n\nThen you return to your own corner, the one you've designed to match your style. There are precious few domains you have control over in your life: your chosen Disrep name, your unique uniform, your dorm space. And you've made sure they all scream exactly who you are. \n\n*choice\n\t#My style is all metal and rock. Black and red, steel and chrome, fire and sharpness. [i](Gain Powerful, Reckless)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\n\t\tThe basic message? You're a complete badass.\n\t\t*goto speaksofhist\n\t#My style is all control and clean lines. White and black, diamond and platinum, clarity and pristine shine. [i](Gain Powerful, Responsible)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\n\t\tThe basic message? You're a complete boss.\n\t\t*goto speaksofhist\n\t#My style is all witchy and kitschy. Bright colors and messy mismatching, wood and earth, chaos and freedom. [i](Gain Powerless, Reckless)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\n\t\tThe basic message? You defy whatever rules you can.\n\t\t*goto speaksofhist\n\t#My style is all about blending in. Muted tones and classic cuts, simplifying and quieting my otherwise complicated and loud life. [i](Gain Powerless, Responsible)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\n\t\tThe basic message? You just want some peace.\n\t\t*goto speaksofhist\n\n*label speaksofhist\nThankfully this styling also complements your eyes, which are colored a deep and rare shade of purple.\n\nOf course, this styling also speaks to your history. [i]The abandoned orphan. The reviled refugee. The anomalous Disrep. The empowered witchlock.[/i]\n\nYour clothes and your room represent not just your personality, but all the burdens you carry. Not to mention all of the things you've overcome…\n\nAnd will have to continue overcoming, it seems.\n\n*page_break\n\nAll Disreps are the children of two cold-warring races on planet Blende, the Verses Galaxy's central commerce and entertainment hub. For generations on Blende, there have been the empowered Replete colonists and the repossessed Repo natives. \n\nDisreps are the offspring of forbidden Replete and Repo love, so your kind is hated for the unions you represent—and feared for the unprecedented powers you also happen to be born with. \n\nOn your darker nights, you tell yourself that's why your parents placed you in an orphanage at birth—to escape the persecution their union would bring them in a cruel world. And not because they didn't love you…\n\nYou only wish you had gotten to meet them for a moment. Flirp, you'd even settle for learning their actual [i]names[/i]. But you don't know anything about your parents, other than the confirmation that one must have been Repo and one must have been Replete, given your Disrep genetics.\n\n*page_break\n\nYou were dealt a tough hand from the start, but not just because you were born with outcast genetics and immediately orphaned. \n\nIt turned out that, even among the unprecedented abilities of most Disreps, your powers proved to be particularly potent. Disrep orphans are hard enough to place with prospective adoptive parents, but no one wanted a growing child with powers as off-the-charts as yours kept proving to be.\n\nThat's where the real trouble of your life began: with the vast powers you were born with. Everyone thinks you can alter reality in discrete portions—or spells, for lack of a better term. But if everyone knew the true nature of your powers, you wouldn't just be hated. You'd be exiled or imprisoned.\n\nThat's why you've never told another living soul what you know about your powers, deep down…\n\n*page_break\n\nThat once you learn how something works, you can break it. \n\nOnce you learn how something is done, you can undo it. \n\nEven when it looks like you're creating something out of thin air, really you're just breaking the rules of reality.\n\nHence the lingering existential question: \n\n[i]You break things, or maybe you put them back together?[/i]\n\n*page_break\n\nYou've also realized that the more you learn, the more powerful you become. \n\nOr rather, the more fundamental laws of reality you master, the more easily you can break them.\n\nEveryone thinks you're such a voracious student and researcher because it distracts from your social-outcast status. \n\nBut really, to you, knowledge is quite literally power. \n\n*fake_choice\n\t#If I want to know how to trick the eye or the mind… \n\t\tYou study anatomy or psychology. \n\t#If I want to know how to manipulate elements or energies… \n\t\tYou study meteorology or physics. \n\t#If I want to know how to make muscles stronger or boost powers…\n\t\tYou study physiology or genetics. \n\t#If I want to know how to animate robotics or break into servers… \n\t\tYou study coding or hacking.\n\nSure, you came here to Distopia to escape persecution, to be among your Disrep kind, and to maybe find the kind of family you never got to have. \n\nBut really, you came here because the Academy was the best school that would give you a full scholarship. Moving to Distopia and attending its Academy was your strongest shot to learn and grow into your full potential.\n\nPerhaps that's why you've rarely left the Distopia Academy grounds. Your people are still settling and building up this once-foreign planet, but you have everything you need to expand your horizons right here.\n\nBesides, this shared Academy dorm room is the closest thing you've ever had to a real home. \n\n*page_break\n\nSince living and studying at Distopia Academy, you've also started to realize how your powers seem to tap into bigger things. \n\nYou've learned that some of your spellcasting fits into existing mystical systems. And that you can master and channel these arts in ways that astonish and terrify their existing experts.\n\nThe prime example has been your mastery over the shades. This is a color-based system that unlocks inner potential across all races in the Verses Galaxy by tapping into universally flowing energies. The shades cover a wide breadth of powers to channel, but the colored sects tend to encompass general themes.\n\nYou often find yourself drawn to the shade of…\n\n*fake_choice\n\t#Red/orange heat and passion. \n\t#Yellow/green virility and fertility.\n\t#Blue freeze and depth. \n\t#Purple/pink fortification and connection.\n\t#Black predators and prayers. \n\t#White storms and strikes.\n\nThese shade energies have always existed, but only in recent generations has a network of semi-spiritual sects emerged. This decentralized shades system has begun to codify studies and practices to harness the shades spectrum. As the shades sects' pillared gospel spreads, entire planets have joined as a kind of religious practice. \n\nShaded students can eventually unlock the specific powers of the single shade that they vibe with most, a rigorous endeavor that sometimes takes a lifetime. Only the most ambitious and gifted shade sectarians are able to master channeling the energies and abilities of [i]two[/i] shades.\n\nHowever, since you've begun studying the shades, you've accessed [i]every[/i] spectral element almost instantly. The only limitation to your growth seems to be how fast you can amass and absorb information. Which makes you wonder…\n\nHow many other existing practices and systems of magic have you mastered without even knowing it?\n\n*page_break\n\nYou feel like you've only just begun answering this question. \n\nPart of you hesitates to continue answering it, because instead of inspiring everyone around you, the answers only seem to incite terror. Is it really jealousy, or does this fearful reaction stem from some more…fundamental instinct in those around you?\n\nThis leads you to another question no one has ever been able to answer. Are your Disrep powers graced—or cursed—by some deeper source?\n\nSince this isn't a question anyone seems capable of answering, you instead have focused on the question you have the most control over. \n\nHow do you shape these spellcasting powers as they expand?\n\n*page_break\n\nTo begin to answer this foundational identity question, you considered your chosen Disrep name carefully. \n\nAfter all, unlike Brit and Boris, this is the name you prefer—and demand—that everyone call you all the time, on and off the call-sign field. \n\nSo when the time came, you chose:\n\n*choice\n\t#Bitters.\n\t\t*set babename \"Bitters\"\n\t\t*goto babegender\n\t#Moré.\n\t\t*set babename \"Moré\"\n\t\t*goto babegender\n\t#HellSpell.\n\t\t*set babename \"HellSpell\"\n\t\t*goto babegender\n\t#Less.\n\t\t*set babename \"Less\"\n\t\t*goto babegender\n\t#Shade-Haze.\n\t\t*set babename \"Shade-Haze\"\n\t\t*goto babegender\n\t#Glitch.\n\t\t*set babename \"Glitch\"\n\t\t*goto babegender\n\t#Midnight-Reign.\n\t\t*set babename \"Midnight-Reign\"\n\t\t*goto babegender\n\t#Anti-Hero.\n\t\t*set babename \"Anti-Hero\"\n\t\t*goto babegender\n\t#I crafted a different custom name.\n\t\t*input_text babename\n\t\t*goto babegender\n\n*label babegender\n\nThe chosen name ${babename} means the world to you. In fact, it means so much that you recently got it tattooed on your wrist, in fine magical print. Beside it, you also branded your personal crest: an infinity symbol with a pentacle set in its central crux.\n\nThis tattoo represents everything you have been, everything you are now, and everything you hope to someday become. \n\nIt's also the only representation, physical or written, of the secret power origins that you keep from everyone else.\n\nOf course, both names—Babe and ${babename}—also reflect your gender identity.\n\n*choice\n\t#I'm cis female: assigned as female at birth, which matches my gender identity.\n\t\t*set babecis true\n\t\t*set babetrans false\n\t\t*set babefemale true\n\t\t*set babemale false\n\t\t*set babeintersex false\n\t\t*set babenonbinary false\n\t\t*set babeze \"she\"\n\t\t*set babehir \"her\"\n\t\t*set babehis \"her\"\n\t\t*set babegwitchlock \"witch\"\n\t\t*goto sittingsimmering\n\t#I'm cis male: assigned as male at birth, which matches my gender identity.\n\t\t*set babecis true\n\t\t*set babetrans false\n\t\t*set babefemale false\n\t\t*set babemale true\n\t\t*set babeintersex false\n\t\t*set babenonbinary false\n\t\t*set babeze \"he\"\n\t\t*set babehir \"him\"\n\t\t*set babehis \"his\"\n\t\t*set babegwitchlock \"warlock\"\n\t\t*goto sittingsimmering\n\t#I'm trans-female: assigned as male at birth, but confirmed as female.\n\t\t*set babecis false\n\t\t*set babetrans true\n\t\t*set babefemale true\n\t\t*set babemale false\n\t\t*set babeintersex false\n\t\t*set babenonbinary false\n\t\t*set babeze \"she\"\n\t\t*set babehir \"her\"\n\t\t*set babehis \"her\"\n\t\t*set babegwitchlock \"witch\"\n\t\t*goto sittingsimmering\n\t#I'm trans-male: assigned as female at birth, but confirmed as male.\n\t\t*set babecis false\n\t\t*set babetrans true\n\t\t*set babefemale false\n\t\t*set babemale true\n\t\t*set babeintersex false\n\t\t*set babenonbinary false\n\t\t*set babeze \"he\"\n\t\t*set babehir \"him\"\n\t\t*set babehis \"his\"\n\t\t*set babegwitchlock \"warlock\"\n\t\t*goto sittingsimmering\n\t#I was born with intersex characteristics.\n\t\t*set babeintersex true\n\n\t\tYou are ease with this element of your identity and know yourself to be:\n\n\t\t*choice\n\t\t\t#Male.\n\t\t\t\t*set babecis false\n\t\t\t\t*set babetrans false\n\t\t\t\t*set babefemale false\n\t\t\t\t*set babemale true\n\t\t\t\t*set babenonbinary false\n\t\t\t\t*set babeze \"he\"\n\t\t\t\t*set babehir \"him\"\n\t\t\t\t*set babehis \"his\"\n\t\t\t\t*set babegwitchlock \"warlock\"\n\t\t\t\t*goto sittingsimmering\n\t\t\t#Female.\n\t\t\t\t*set babecis false\n\t\t\t\t*set babetrans false\n\t\t\t\t*set babefemale true\n\t\t\t\t*set babemale false\n\t\t\t\t*set babenonbinary false\n\t\t\t\t*set babeze \"she\"\n\t\t\t\t*set babehir \"her\"\n\t\t\t\t*set babehis \"her\"\n\t\t\t\t*set babegwitchlock \"witch\"\n\t\t\t\t*goto sittingsimmering\n\t\t\t#Intersex.\n\t\t\t\t*goto babepronounchoice\n\t\t\t#I don't identify with binary gender categories.\n\t\t\t\t*goto babepronounchoice\n\t\t\t#None of these options suit me, so I'd like to enter my own vocabulary.\n\t\t\t\t*goto babeselfentry\n\t#I don't identify with binary gender categories.\n\t\t*label babepronounchoice\n\t\t*set babenonbinary true\n\t\t*set babecis false\n\t\t*set babetrans false\n\t\t*set babefemale false\n\t\t*set babemale false\n\n\t\tYou have also chosen to identify with these pronouns:\n\n\t\t*choice\n\t\t\t#Ze and hir.\n\t\t\t\t*set babeze \"ze\"\n\t\t\t\t*set babehir \"hir\"\n\t\t\t\t*set babehis \"hir\"\n\t\t\t\t*goto sittingsimmering\n\t\t\t#They, them, and their.\n\t\t\t\t*set babeze \"they\"\n\t\t\t\t*set babehir \"them\"\n\t\t\t\t*set babehis \"their\"\n\t\t\t\t*goto sittingsimmering\n\t\t\t#Zhe, zhim, and zhir.\n\t\t\t\t*set babeze \"zhe\"\n\t\t\t\t*set babehir \"zhim\"\n\t\t\t\t*set babehis \"zhir\"\n\t\t\t\t*goto sittingsimmering\n\t\t\t#I'm still comfortable using she and her.\n\t\t\t\t*set babeze \"she\"\n\t\t\t\t*set babehir \"her\"\n\t\t\t\t*set babehis \"her\"\n\t\t\t\t*goto sittingsimmering\n\t\t\t#I'm still comfortable using he, him, and his.\n\t\t\t\t*set babeze \"he\"\n\t\t\t\t*set babehir \"him\"\n\t\t\t\t*set babehis \"his\"\n\t\t\t\t*goto sittingsimmering\n\t\t\t#I'd like to input my own pronouns.\n\t\t\t\tInstead of he, she, or they, you prefer:\n\n\t\t\t\t*input_text babeze\n\n\t\t\t\tInstead of him, her, or them, you prefer:\n\n\t\t\t\t*input_text babehir\n\n\t\t\t\tInstead of his, her, or their, you prefer:\n\n\t\t\t\t*input_text babehis\n\n\t\t\t\t*goto sittingsimmering\n\t#None of these options suit me, so I'd like to enter my own vocabulary.\n\t\t*label babeselfentry\n\t\t\n\t\tYou identify as:\n\n\t\t*input_text babegenderinput\n\t\t\n\t\t*goto babepronounchoice\n\n\n*label sittingsimmering\n\nToday, sitting here simmering, you contemplate the realities of your existence. This is you, the true ${babename}, destroyer of fundamental things and creator of spells that don't yet exist in the known Galaxy.\n\nDeep down, you understand that you are breaking things that cannot be put back together. That you are unleashing forces that cannot be contained. That you are a blueprint for chaos, a template for destruction.\n\nThese are things you feel deeply, and that you've vowed to tell no one. At least, not until you've made some big decisions for yourself, underneath it all…\n\nLike, are you meant to embrace this potential, or are you meant to fear it like everyone else? Is this power a calling or a curse,
