n\t\t\t[b]Entry:[/b] Year 2104\n\t\t\t*line_break\n\t\t\t[b]Location:[/b] Sorrel Fork, Blende\n\t\t\t*line_break\n\t\t\t[b]Relevant Event:[/b] The Representatives, rocked by scandal on Blende, head into space to search for their missing founding member, Prey. On this journey, they encounter the custodial being named JJE, who temporarily joins the team. A long-time TRAINING GROUNDS contestant, Anville, finally wins membership this year. \n\n\t\t\t*if (destructive >= 50)\n\t\t\t\t*set destructive %+30\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Destructive level rise higher.\n\t\t\t\n\t\t\t\t[i](Destructive Represented)[/i]\n\t\t\t\t*goto decidethrouplecase\n\t\t\t*else\n\t\t\t\t*set destructive %-30\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Constructive level rise higher.\n\n\t\t\t\t[i](Constructive Represented)[/i]\n\t\t\t\t*goto decidethrouplecase\n\t\t#A Tale of Unpredictability. [i](Double-Strength Boost, But Randomly Applied)[/i]\n\n\t\t\t[b]Span The Sergiverses[/b]\n\t\t\t*line_break\n\t\t\t[b]Entry:[/b] Year 2105\n\t\t\t*line_break\n\t\t\t[b]Location:[/b] Galactic Council Space\n\t\t\t*line_break\n\t\t\t[b]Relevant Event:[/b] After six years of bloody battle and victory in The Undertow, the illegal ring of gladiatorial combat they were kidnapped into, Glorya and Superb are rescued. After a decade of investigative work, agents of the GCC finally discover and shut down The Undertow and its shadow entertainment servers. Glorya and Superb are told by the GC, however, that they are not allowed to return to their planet Earth, given their new galactic knowledge (unaware planets are protected by the GC for evolutionary purposes). In conjunction with GC recommendations, Glory and Superb choose a new place that reminds them most of home: Blende. The couples promptly aim to return to their super-heroic roots by entering TRAINING GROUNDS. Thanks to their time in The Undertow, they win their first season to join The Representatives. \n\n\t\t\t*if (urnofunpredictabilitye = 1)\n\t\t\t\t*set unleash %+60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Unleash level rise exponentially higher.\n\n\t\t\t\t[i](Unleash Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilitye = 2)\n\t\t\t\t*set unleash %-60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Limit level rise exponentially higher.\n\n\t\t\t\t[i](Limit Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilitye = 3)\n\t\t\t\t*set destructive %+60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Destructive level rise exponentially higher.\n\n\t\t\t\t[i](Destructive Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilitye = 4)\n\t\t\t\t*set destructive %-60\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Constructive level rise exponentially higher.\n\n\t\t\t\t[i](Constructive Double Boosted)[/i]\n\n\t\t\t*goto decidethrouplecase\n*else\n\t*goto decidethrouplecase\n\n*label decidethrouplecase\n*page_break\n\nYou hang back a beat behind the others to survey the scene once again, needing to make another judgment call on who to spell-read in your limited time. \n\nThatbee heads straight on for Boomkat, while One-Fourteen moves to engage Bombats. Vortal slithers around Lucy Marbles, while ChantuSe drops back to cover the only exit behind you.\n\nThinking fast, you need to decide how to make the most of this rapidly deteriorating situation.\n\n*temp lucyboomkatread false\n*temp lucyread false\n*temp boomkatread false\n\n*choice\n\t#Work with ChantuSe to block the exit long enough to spell-read all three suspects. [i](Test High or Low ChantuSe. Gain Half Enhancement, Half Shades)[/i]\n\n\t\tKnowing this will all happen very fast, you try to get ahead of the split-second action. \n\n\t\tFirst, you cast a shades spell with your right hand to create a purple-force shield in front of the exit. \n\n\t\tSecond, you snap your left fingers to do a quick general-enhancement boost on ChantuSe. \n\n\t\t\"Block the exit long enough for me to spell read them!\" you then shout at ChantuSe, moving sideways to give yourself enough distance to create a spell-reading window.\n\n\t\t*page_break\n\n\t\t*if (chantuse > 70)\n\t\t\t*achieve chantusebond\n\n\t\t\tYou and ChantuSe have bonded so closely on your journey together so far, this combo-move should work flawlessly. Which is good, because the others have already been forced to take temporary cover from this trio's deadly barrage of attacks.\n\n\t\t\t*label chantusereadoutpositive\n\t\t\t*set lucyboomkatread true\n\t\t\t*set enhancement +3\n\t\t\t*set shades +3\n\t\t\t*set potency +2\n\t\t\t*set cluecredits +3\n\n\t\t\tYou watch as ChantuSe uses her sword to stave off the attacks from Lucy and Bombats and Bombs the giant bat with impressive defensive maneuvers. Meanwhile, your shade-shield holds while Boomkat tries to blast the doors open.\n\n\t\t\tThough you can tell it won't hold for long, so you raise your hands and swipe them across the air in front of you. \n\n\t\t\tYou create a double-wide screen through which to view the true nature of this threatening throuple.\n\n\t\t\tIn this swiped screen, you are able to first glimpse that Boomkat is [i]not[/i] Binaria in hiding. Scrolling across, you can then ascertain that Lucy Marbles is also [i]not[/i] Binaria.\n\n\t\t\t*page_break\n\n\t\t\tHowever, Bombats and Bombs the giant bat remain out of view, given this screen's orientation. \n\n\t\t\tYou wash away the spell-screen to cast another…\n\n\t\t\tBut before you can, Boomkat blasts through your shade-shield. ChantuSe is then forced to jump away to avoid being battered…\n\n\t\t\tAnd in the same moment, you are distracted as three new clue credits drop into your outstretched palm.\n\n\t\t\t[i](Gained 3 Clue Credits)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Enhancement, Shades, Potency)[/i]\n\t\t\t*goto throuplemuseumover\n\t\t*elseif (chantuse \u003c 30)\n\t\t\t*achieve chantusedistance\n\t\t\t\n\t\t\tYou have been sure to keep ChantuSe at a distance on your journey so far, not allowing personal feelings to get in your way. That means your work together is all business, and your business is victory. Which is good, because the others have already been forced to take temporary cover from this trio's deadly barrage of attacks.\n\t\t\t*goto chantusereadoutpositive\n\t\t*else\n\t\t\t*set enhancement +1\n\t\t\t*set shades +1\n\t\t\t*set potency +1\n\t\t\t*set cluecredits +1\n\n\t\t\tBut you and ChantuSe haven't developed the kind of relationship where you're used to working in sync. Instead of blocking the exit, she goes after Boomkat, who is already blasting her cannon to pierce the shield. \n\n\t\t\tWhich would be fine, except the others have already been forced to take temporary cover from this trio's deadly barrage of attacks. So you're on your own for the ensuing seconds.\n\n\t\t\tChantuSe's assault might distract Boomkat, but it leaves Lucy Marbles the chance to swing at the shield with her giant wrecking balls.\n\n\t\t\tYou can tell it won't hold for long, so you raise your hands and swipe them across the air in front of you. You create a double-wide screen through which to view the true nature of this threatening throuple.\n\n\t\t\t*page_break\n\n\t\t\tHowever, before you can, Lucy succeeds in smashing through your shield.\n\n\t\t\tThe carnage breaks apart your spell-screen before you can read anyone. \n\n\t\t\tUnfortunately, it seems you bit off more than you can chew, playing your cards this way.\n\n\t\t\tAnd this is only confirmed as a single clue credit drops into your palm.\n\n\t\t\t[i](Gained 1 Clue Credit)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Enhancement, Shades, Potency)[/i]\n\t\t\t*goto throuplemuseumover\n\t#Boost my own spell-reading to use on Lucy and Bombats at the same time. [i](Test Unleash. Gain Enhancement)[/i]\n\n\t\tYou hang back, snapping your fingers to enhance your own spell-reading abilities. The goal is to cast a double-wide true-view spell-screen to glimpse the true natures of your most-likely suspects.\n\n\t\tWhile you do this, the other four engage their targets in a flurry of explosions and shouts and bone-shattering crunches.\n\n\t\tNot wasting a moment, you raise your hands and swipe them across the air in front of you. You create a double-wide screen through which to view the true nature of this threatening throuple.\n\n\t\t*if (unleash > 70)\n\t\t\t*set lucyread true\n\t\t\t*set enhancement +6\n\t\t\t*set potency +2\n\t\t\t*set cluecredits +3\n\n\t\t\tIn this swiped screen, you are able to first glimpse that Lucy Marbles is [i]not[/i] Binaria in hiding. You then scroll your eyes across to read Bombats…\n\n\t\t\t*page_break\n\n\t\t\tHowever, Bombs the giant bat suddenly swoops out of nowhere. \n\n\t\t\tYou jump back to avoid being slashed, but Bombs does succeed in slicing through your true-view spell-screen.\n\n\t\t\tNext thing you know, you hear another massive explosion near the exit.\n\n\t\t\tAnd in the same moment, you are further distracted as three new clue credits drop into your outstretched palm.\n\n\t\t\t[i](Gained 3 Clue Credits)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Enhancement, Potency)[/i]\n\t\t\t*goto throuplemuseumover\n\t\t*else\n\t\t\t*set technology +3\n\t\t\t*set potency +1\n\t\t\t*set cluecredits +1\n\n\t\t\tHowever, you're not quite used to unleashing your abilities this much. The screen glitches and fades out, so you recalibrate to channel this upped level of power.\n\n\t\t\t*page_break\n\n\t\t\tYou get another screen up, but the moment you do, Bombs the giant bat suddenly swoops out of nowhere. \n\n\t\t\tYou jump back to avoid being slashed, but Bombs does succeed in slicing through your true-view spell-screen.\n\n\t\t\tNext thing you know, you hear another massive explosion near the exit.\n\n\t\t\tAnd in the same moment, you are further distracted as one solitary clue credit drops into your outstretched palm.\n\n\t\t\t[i](Gained 1 Clue Credit)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Technology, Potency)[/i]\n\t\t\t*goto throuplemuseumover\n\t#Hold the leader and biggest threat, Boomkat, with shades blocks to spell-read them. [i](Test Limit. Gain Shades)[/i]\n\t\t\n\t\tKnowing this will all happen very fast, you try to get ahead of the split-second action that erupts all around you, with everyone engaging their targets. Especially as you see Thatbee forced to take cover from the powerful blasts of Boomkat. \n\n\t\tFirst, you cast a shades spell with your right hand to create a purple-force shield in front of the exit. \n\n\t\tSecond, you twitch the fingers in your left hand to create a similar shield-cap around Boomkat's cannon-firer. \n\n\t\tBoomkat screams bloody murder while they try to blast through your various spells.\n\n\t\t*page_break\n\n\t\tYour shade-shields hold, though you can tell they won't hold for long. \n\n\t\tSo you raise your hands and swipe them across the air in front of you. \n\n\t\tYou create a double-wide screen through which to view the true nature of this throuple's clear leader.\n\n\t\t*if (unleash \u003c 30)\n\t\t\t*set boomkatread true\n\t\t\t*set shades +6\n\t\t\t*set potency +2\n\t\t\t*set cluecredits +3\n\n\t\t\tIn this swiped screen, you are able to glimpse that… \n\n\t\t\tBoomkat [i]is not[/i] Binaria in hiding.\n\n\t\t\t*page_break\n\n\t\t\tThanks to the limitations you placed, you were able to glean this much before all flirping hell breaks loose.\n\n\t\t\tBefore you can wash away the spell-screen to cast another reoriented one, Boomkat finally blasts through your shade-shields. \n\n\t\t\tAnd in the same moment, you are distracted as three new clue credits drop into your outstretched palm.\n\n\t\t\t[i](Gained 3 Clue Credits)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Shades, Potency)[/i]\n\t\t\t*goto throuplemuseumover\n\t\t*else\n\t\t\t*set shades +3\n\t\t\t*set potency +1\n\t\t\t*set cluecredits +1\n\n\t\t\tHowever, you're not quite used to limiting the focus of your abilities this much. \n\n\t\t\tBefore you can spell-read anything, Boomkat quickly blasts through your shade-shields. \n\n\t\t\t*page_break\n\n\t\t\tYou jump aside, now having to shield yourself from being battered by the rubble.\n\n\t\t\tNext thing you know, you hear another massive explosion near the exit.\n\n\t\t\tAnd in the same moment, you are further distracted as one solitary clue credit drops into your outstretched palm.\n\n\t\t\t[i](Gained 1 Clue Credit)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Perception, Potency)[/i]\n\t\t\t*goto throuplemuseumover\n\n*label throuplemuseumover\n*page_break\n\nThis series of events creates the window that this throuple needs to rush through the exit. Thatbee and Vortal actually attempt to follow…\n\nBut for good measure, after they rush through, Lucy turns and collapses the doorway behind them with her massive wrecking balls.\n\nEveryone is forced to remain clear of the wreckage, to avoid heinous injury.\n\nAnd when the dust settles, you realize even if you blasted through the rubble, this throuple will already be long gone.\n\n*page_break\n\n\"I cannot believe they also got away,\" One-Fourteen says through heaving breaths, a bit shell-shocked. \"I swear our cases aren't usually so chaotic.\"\n\nOne-Fourteen then pauses, like ${oftze} doesn't actually stand behind those words, upon second thought.\n\n\"Whatever. We have a backup plan,\" Thatbee rolls on. \"Like I said before, there's a way we can get to anyone on Gothika. It's an old temple, very temperamental, so we only ever use it as a last resort. If we make it inside, we'll get one shot to be transported to one suspect. We'll have to be incredibly specific, which means we'll need to identify who we think Binaria really is. Asking to get to the entire throuple or couple won't work, absurdly.\"\n\n*if lucyboomkatread\n\t\"Well, I ruled out Boomkat and Lucy Marbles,\" you reply. \"But Bombats got away before I could spell-read her. Oh and her giant bat too, I guess.\"\n\t*goto templeruntomorrow\n*elseif lucyread\n\t\"Well, I ruled out Lucy Marbles,\" you reply. \"But Boomkat and Bombats got away before I could spell-read either. Oh and the giant bat too, I guess.\"\n\t*goto templeruntomorrow\n*elseif boomkatread\n\t\"Well, I ruled out Boomkat,\" you reply. \"But Lucy and Bombats got away before I could spell-read either. Oh and the giant bat too, I guess.\"\n\t*goto templeruntomorrow\n*else\n\t\"Well, that might be tough,\" you reply. \"Because all three got away before I could spell-read any of them. Not even the damn giant bat.\"\n\t*goto templeruntomorrow\n\n*label templeruntomorrow\n*page_break\n\nWith that, you cast a quick shades display spell to populate your current suspect list:\n\n[b]Amuletta:[/b]\n*if (amulettaread) or (wreedulettaread)\n\tSpell-Ruled Out\n\t*goto nextsuspa\n*else\n\tActive Suspect\n\t*goto nextsuspa\n\n*label nextsuspa\n*line_break\n[b]Wreed:[/b]\n*if (wreedread) or (wreedulettaread)\n\tSpell-Ruled Out\n\t*goto nextsuspb\n*else\n\tActive Suspect\n\t*goto nextsuspb\n\n*label nextsuspb\n*line_break\n[b]Bombats:[/b] Active Suspect (and her giant bat, too)\n*line_break\n[b]Lucy Marbles:[/b]\n*if (lucyread) or (lucyboomkatread)\n\tSpell-Ruled Out\n\t*goto nextsuspc\n*else\n\tActive Suspect\n\t*goto nextsuspc\n\n*label nextsuspc\n*line_break\n[b]Boomkat:[/b]\n*if (boomkatread) or (lucyboomkatread)\n\tSpell-Ruled Out\n\t*goto nextsuspd\n*else\n\tActive Suspect\n\t*goto nextsuspd\n\n*label nextsuspd\n\n*if (wreedulettaread) and (lucyboomkatread)\n\t*achieve perfectinvestigation\n\n\t\"Actually, that narrows it down to just Bombats. Or Bombs the giant bat, if we're being thorough,\" you extrapolate, impressed with your own handiwork.\n\n\"Well, we'll have to use our investigative powers of deduction once we reach the temple,\" Thatbee says. \"The clue credits you've been granted will no doubt come in handy there. It's a one-day ride away, so we'd better get moving.\"\n\nYou all move to follow Thatbee…until just then, the carousel room flashes with a sudden bright light—as the roof is ripped right open.\n\n\"You're not going anywhere.\"\n\n*page_break CHAPTER V\n\n[b]CHAPTER V[/b]\n*line_break\nYou look up into the still-dim early morning sky to find four beings floating there. \n\nOne glance at them tells you that this quartet very likely has more in common with your Destructive Reborn than Thatbee's native Genies or Gothikites.\n\nClocking Thatbee's awed expression only confirms this. \n\nThen you look to your other more galactically experienced allies…\n\n*page_break\n\nAnd your suspicions seems completely confirmed.\n\nYou spot the looks of recognition—and trepidation—that pass over the faces of both One-Fourteen and ChantuSe. Meanwhile, beside them Vortal snarls even meaner than usual.\n\nBefore…whatever this new twist might be begins to unravel, you need to get yourself up to speed.\n\nSo you cast the spells you need to get yourself in the know.\n\n*temp pinkujusongsnowreadout true\n*temp omegablackreadout true\n*temp ryuushimareadout true\n\n*label learndelegatesshadow\n*choice\n\t*selectable_if (pinkujusongsnowreadout) #The two women on the left appear to be laced with shade energy. Cast a corresponding spell to learn about them. [i](Gain Double Shades)[/i]\n\t\t*set shades +4\n\t\t*set pinkujusongsnowreadout false\n\n\t\tThe first woman you focus on swirls with white shade energy, which glows brightly against her brown skin and vaguely avian features. She wears a tiara in her cascading blue ombré locs, which are all tipped with icicles. In fact, everything from this woman's fingertips to her all-white eyes are tipped with icicles. \n\n\t\tOnce your own hands flash white, you populate a readout on this icicle princess.\n\n\t\t[b]SONGSNOW[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] Born of Blarfngardian Airfolken Royalty, Princess Bluey Songsnow was raised in a tight-knit royal family—until they were murdered in a botched kidnapping attempt carried out by a Groggian slave rebellion cell. Songsnow was Selected for Versus shortly thereafter, and was subsequently Reborn.\n\t\t*line_break\n\t\t[b]Powers:[/b] A white shade specialist of wind and ice call. The calm eye of a freezing thunderstorm. The juxtaposition of soft trustworthiness and frigid distrust.\n\t\t*line_break\n\t\t[b]Weapons:[/b] None.\n\t\t*line_break\n\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\t*page_break\n\n\t\tThe second woman is far shorter, suspended in midair by unsheathed BlackMettle wings. She wears an armored racing jumpsuit that is black with pink stripes, complete with a matching helmet. She takes a beat to remove that helmet, displaying more edge-cut black-and-pink hair.\n\n\t\tOnce your own hands flash black and pink, you populate a readout on this racing warrior.\n\n\t\t[b]PINKUJU[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] Born on planet Brite, Shiro Demon fled her home for the racing planet Resu after revealing her gender-confirming trans identity and a desire to abandon standard Wone worship to study the shades. Taking on the chosen name Pinkuju, she was eventually Selected for Versus and subsequently Reborn.\n\t\t*line_break\n\t\t[b]Powers:[/b] A dual pink and black shade specialist of empathy and speed. Weapons Expertise. Racing Expertise. Martial Arts Expertise.\n\t\t*line_break\n\t\t[b]Weapons:[/b] Various. A set of mentally-bonded BlackMettle wings.\n\t\t*line_break\n\t\t[b]Classification:[/b] Local-Level Agent, Low Powered, Highly Skilled.\n\t\t*goto learndelegatesshadow\n\t*selectable_if (omegablackreadout) #Cast an Enhancement spell to assess the monochromatic dude floating between two black holes. [i](Gain Enhancement)[/i]\n\t\t*set enhancement +2\n\t\t*set omegablackreadout false\n\n\t\tThis rather grim guy sports short stark-white hair with a fade. His left eye is cybernetic and colored black with a silver pupil, while his right eye is a humanoid light blue. His costume is an all-black one-piece tactical combat suit, with a silver omega symbol on the right shoulder.\n\n\t\tUsing your Enhancement assessment, you aggregate a mental readout on this stoic figure.\n\n\t\t[b]OMEGA BLACK[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] The origins of the one known as Rozz Orns are to be glimpsed only by his maker, the one known only as Rozzar. \n\t\t*line_break\n\t\t[b]Powers:[/b] Black hole fists.\n\t\t*line_break\n\t\t[b]Weapons:[/b] None.\n\t\t*line_break\n\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\t*goto learndelegatesshadow\n\t*selectable_if (ryuushimareadout) #Cast an Enhancement spell to assess the fiery figure held afloat on a cloud of flames. [i](Gain Enhancement)[/i]\n\t\t*set enhancement +2\n\t\t*set ryuushimareadout false\n\n\t\tThis fiery figure sports bloodred hair and bright green eyes. He appears to be a male humanoid, though you can tell he might also sometimes be considered female. His long hair matches a very mischievous glint in his eye, making him seem as wicked and unpredictable as a living flame.\n\n\t\tUsing your Enhancement assessment, you aggregate a mental readout on this flaming figure.\n\n\t\t[b]RYU USHIMA[/b]\n\t\t*line_break\n\t\t[b]Background:[/b] For Ryuta Ushima, a tragic past fuels him. An unknown assailant assassinated all those he loves, and now he just wants everyone to pay. His parents were master thieves and taught him their trade. His one lesson in life: never take anything too seriously, because you can lose it all in an instant.\n\t\t*line_break\n\t\t[b]Powers:[/b] Fire generation and control.\n\t\t*line_break\n\t\t[b]Weapons:[/b] None.\n\t\t*line_break\n\t\t[b]Classification:[/b] World-Level Agent, Highly Powered.\n\n\t\t*goto learndelegatesshadow\n\t#I've finished my spellcasting review.\n\t\t*goto thedelegatesmission\n\n*label thedelegatesmission\n*set spellodexpinkuju true\n*achieve encounterpinkuju\n\nYou were warned that galactic agents and heroes would be sent to stop you, thinking their cause profoundly just and your own intentions disturbingly foul. You didn't know they'd be as powerful as your spell-research makes them sound, however. \n\nYou have yet to learn why they've really come here, but given their looks of intensity, you can already guess they're here to interfere somehow.\n\n\"We aren't used to announcing our intentions,\" Pinkuju begins as this intimidating quartet lowers to the carousel gallery floor. \"But we're hoping you won't fight us if we tell you what we're here to do. Those of you who need to know who we are already do. There are only two other details you need. \n\n\"One, we are The Delegates Shadow, and you've never heard of us because we're not supposed to exist. In fact, we didn't exist in this form until…very, very recently.\"\n\n*page_break\n\nYou process that tidbit a moment. Cross-referencing a new Spellodex entry on Pinkuju that populates in your psychic Stats screen, you recall The Delegates are a powerful team of peacekeepers associated with the Galactic Council, with one member from every participating planet. \n\nJoining The Delegates is supposed to mean you are the most powerful and exemplary representative of your entire planet. The organization thus have many squads and rosters with specific mission statements, so it actually makes sense they'd have some more secretive wetwork squad…\n\nBut the fact that a recent Versian Reborn like Pinkuju ranks among this squad must mean some very complicated things for your own mission.\n\n\"And two,\" Pinkuju continues, \"we have been granted special dispensation from several galactic powers to carry out the arrest of the war criminal known as Vortal.\"\n\n*page_break\n\nAnd there it is, the complication you were expecting. Hearing this, a shot of tension ripples through your team. \n\nEven Thatbee seems stunned—though that's because she must think One-Fourteen's mind should be blown by this revelation. You realize this is about to get really messy, really quickly.\n\n\"Well, then you must know the number of galactic laws you broke just by appearing here,\" you return, trying to project as much confidence as possible. \"And I gather that two among you have also been Reborn from Versus. So you must recognize the importance of why we've been sent here?\"\n\n\"We could return those questions right to you,\" Songsnow replies, her tone as cold as ice. \"But the differences between Constructive and Destructive Versians remain as separately-balanced as ever.\"\n\n*page_break\n\n\"Funny, I just learned all about that Blot Empress being Constructive,\" you shoot back with equal chilliness. \"Are all you confused about the real enemy we're facing here?\"\n\n\"There is no confusion,\" Omega Black steps up, his closed fists beginning to twist and snap with swirling force. \"Vortal is one of [i]them[/i].\"\n\n\"I've got this,\" Pinkuju says, stepping up to remain at the point. \n\nShe then clicks at a panel on her wrist to project an image.\n\n*page_break\n\n*image gcseal.jpg center Seal of the Galactic Council\n\n\"You'll recognize the official Seal of the Galactic Council, signed by Commander Gadget. \n\n\"You'll also note the signature of Tori Reece, the high aspect of the pink shade sect, which I humbly serve. \n\n\"I also serve the black shade sect, and while their high aspect, the shroud, hasn't signed, he happens to be my romantic partner. \n\n\"Not to mention that I'm one of the Constructive Eight, Reborn before your own Destructive Eight. I'm guessing that list proves enough authority for you all?\"\n\n*page_break\n\nPinkuju then closes the seal, taking a breath. \"Look, we all have our roles to play and designated missions to fulfill. I can't say I love the kinds of mass destruction you lot seem so fond of, but we are [i]not[/i] here to stop your larger mission. Instead, it is our own mission to contain the very present threat that Vortal presents to our entire Galaxy. Trust me, you'll be just fine carrying on without him.\"\n\nYou don't need to say this out loud, but you do think of the Portal Jewels stashed in your ${portaljewels}—you technically [i]have[/i] been set up to proceed without Vortal. Plus, he has made his desire to murder you and be free quite clear. Still, Vortal has also been named one of your allies—should that count for anything?\n\n\"I'm from a planet that very recently gained galactic awareness. Like, very recently,\" Ryu Ushima then says, his tone soft and playful. \"No one here has seen us yet but you five, right? So why not let us leave in peace, so we can keep it that way?\" \n\nAs he speaks, Ryu generates a circle of fire with a peace sign flaming inside. But despite his playful tone, there's a layer of inherent judgment in this statement: [i]you've already broken the galactic awareness laws, but without the benefit of GC dispensation this squad obviously first obtained[/i].\n\n*page_break\n\nThatbee takes her moment next, approaching One-Fourteen. \"Why don't you seem very shocked by any at this?\" she asks, her voice on the edge of trembling.\n\nOne-Fourteen sighs a deep breath. \"Because I'm like them. I was sent here to help this planet strive towards galactic awareness. Or so I thought, until all of this began. Thatbee, I would have told you if I could.\"\n\nThatbee takes several steps back, almost like she has been physically assaulted.\n\n\"Except all of your 'peers' seemed just fine telling me,\" she slices, her words cutting and quaking. \"And you could have told me the truth yesterday.\"\n\n*page_break\n\n\"I was going to, when they all left,\" One-Fourteen tries. \"I was just trying to protect you, like I already have for years.\"\n\n\"By lying to me? By deceiving me?\" Thatbee nearly shouts. \"On this planet, with our history, you [i]know[/i] how unforgivable that is.\"\n\nAs riveting and heartbreaking as this exchange might be, you actually keep one eye on Vortal while it happens. You can tell his mind is racing, looking for ways to do what he does best: [i]survive[/i]. \n\nBeside him, ChantuSe maintains a careful watch. She hasn't met your gaze, but you can only imagine she might feel torn about this turn of events as well.\n\n*page_break\n\nPerhaps this is why you don't see it coming when Thatbee suddenly screams at the top of her lungs. At the same time, she releases a pulse of pure purple-blue energy.\n\nAs this pulse washes over you, you experience Thatbee's Genie ability for the first time. Your body lights up, feeling all at once every shred of pain you've ever inflicted on another. \n\nIt's…obscenely and exquisitely agonizing.\n\nYou'd close your eyes, but as the pulse passes through you, suddenly you see visions of yourself reflected in its plum-azure haze that you cannot resist. You fully absorb yourself as…\n\n*choice\n\t#A ruthless ruler. [i](Gain Powerful, Reckless)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t*goto thatbeevisions\n\t#A stringent monarch. [i](Gain Powerful, Responsible)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\t\t*goto thatbeevisions\n\t#An agent of assassination. [i](Gain Powerless, Reckless)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t*goto thatbeevisions\n\t#A living weapon. [i](Gain Powerless, Responsible)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t*goto thatbeevisions\n\t#A ticking bomb. [i](Gain Destructive, Unleash)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %+15\n\t\t*goto thatbeevisions\n\t#A swirling thunderstorm. [i](Gain Destructive, Limit)[/i]\n\t\t*set destructive %+15\n\t\t*set unleash %-15\n\t\t*goto thatbeevisions\n\t#An unstoppable wave. [i](Gain Constructive, Unleash)[/i]\n\t\t*set destructive %-15\n\t\t*set unleash %+15\n\t\t*goto thatbeevisions\n\t#A precision targeting system. [i](Gain Constructive, Limit)[/i]\t\n\t\t*set destructive %-15\n\t\t*set unleash %-15\n\t\t*goto thatbeevisions\n\n*label thatbeevisions\n\nAnd you can sense how this reflection alters your own sense of self, even shifting your Stats. It's yet another sign how these Genie powers can really impact perceptions in a fundamental way.\n\nTrying to shake off the residual stinging sensation and emotion from Thatbee's mass read, you look across the carousel gallery…and you have an idea. One that might help settle this dispute brewing over the matter of Vortal's arrest.\n\nBefore this revealing haze fades, you cast a quick spell to capture Vortal's clouded-surroundings a few lingering moments. Then you cast a second spell, this one to make Vortal's pain-reflections actually visible to everyone else.\n\nAnd there, plain as day, you see the magnified enormity of Vortal's crimes. \n\n*page_break\n\nA sea of tiny red beads begins to swirl within the cloud, one bloody droplet for each life Vortal has taken…\n\nAnd there are [i]thousands[/i]. \n\nIn the next moment, each of these dropped lives transform into either jagged portals or fused jewels. It only takes a couple droplets to form a portal, but to fuel a jewel…\n\nIt takes [i]hundreds and hundreds[/i] of lives.\n\nThen your eyes fall on Vortal himself. You expect him to be writhing in agony, forced to witness and absorb all of this accumulated pain…\n\nBut instead he seems awash in a blast of pure [i]ecstasy[/i].\n\n*page_break\n\nYou've been wondering just how Vortal managed to be the sole survivor of the Blot invasion of the Contest Galaxy. \n\nYou've been wondering why Tellie reviled Vortal's invaluable Portal Jewels so much.\n\nAnd now you know. \n\nIt's all because Vortal commits mass murder in order to generate his portal escapes.\n\n*fake_choice\n\t#Suddenly, the Portal Jewels I carry in my ${portaljewels} begin to feel a whole lot heavier. \n\t\tThinking back to the jagged portal that carried you here makes you sick to your stomach all over again.\n\t#All power has its cost, but not everyone is strong enough to grasp it.\n\t\tBut Vortal is strong enough. Just like you know you would be, if you needed to be.\n\t#I am too numb and angry to think much at all. \n\t\tVortal is just as bad as the vampiric Genies here on Gothika. [i]Worse[/i].\n\t#This power cost makes my own look like child's play. \n\t\tWhich, moving forward, could make Vortal a very effective decoy and shield for you.\n\nThen, in the next moment, you lock eyes with Vortal.\n\nProcessing everything you just uncovered, one feeling clicks into place.\n\nAnd it flows between you and Vortal like an electric river.\n\n*choice\n\t#People hate us and fear us because they cannot control us. [i](Gain Powerful, Reckless. \"Gain\" Vortal)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %+15\n\t\t*set vortal %-30\n\n\t\tThe way Vortal has been judged for doing what he must to survive—everyone has judged you just as harshly, and for far less.\n\n\t\tYou've always been seen as some kind of monster for the way you were born, because of the things you're capable of doing. \n\n\t\tAnd looking at Vortal now, you can see he understands. And that to survive, he has adopted another practice…\n\n\t\t[i]Embrace the mess. Embody the drama.[/i]\n\t\t*goto vortalbattlebreaks\n\t#I might be destructive by nature, but Vortal is an entirely selfish, utterly sadistic sociopath. [i](Gain Powerful, Responsible. \"Lose\" Vortal)[/i]\n\t\t*set powerful %+15\n\t\t*set reckless %-15\n\t\t*set vortal %+30\n\n\t\t*label wonttakelives\n\t\tYou might break the laws of reality, but you've never taken a life to fuel your own power. Vortal must think the universe made him this way, that other beings shaped his trauma into a fine sharp edge—you've certainly felt that way yourself. \n\n\t\tBut you see now: there's always a choice to be made about who you really want to be, despite everyone else. In this moment, it becomes clear to you the line you've already drawn inside yourself, one you didn't even know existed.\n\n\t\tHowever destructive or disruptive, you want to use your powers to protect lives, not end them.\n\n\t\tIt's a rare comfort, in the middle of this fraught day.\n\t\t*goto vortalbattlebreaks\n\t#I might not love my calling and I might break the rules, but I do so for a greater good than myself. [i](Gain Powerless, Reckless. \"Lose\" Vortal)[/i]\n\t\t*set powerful %-15\n\t\t*set reckless %+15\n\t\t*set vortal %+30\n\t\t*goto wonttakelives\n\t#When you're born a living weapon, you have no choice but to advocate for yourself. [i](Gain Powerless, Responsible. \"Gain\" Vortal)[/i]\t\n\t\t*set powerful %-15\n\t\t*set reckless %-15\n\t\t*set vortal %-30\n\n\t\tThe way Vortal has been judged for his powers, the way he has been exiled for doing what he must to survive…everyone has judged you just as harshly.\n\n\t\tYou've always been seen as some kind of weapon for the way you were born, because of the things you're capable of doing. And looking at Vortal now, you can see he understands. \n\n\t\tEven today, standing among a gathering of divine scalpels, you both remain more like messy bombs. \n\t\t\n\t\tAnd both have their purposes.\n\t\t*goto vortalbattlebreaks\n\n*label vortalbattlebreaks\n*page_break\n\nOnce this connective moment passes, you recognize a shift in Vortal. He suddenly looks at you with only lustful greed in his beady eyes.\n\nBecause if he murders you right now, he'll be freed from whatever obligatory blocks Versus has placed upon him. \n\nAnd then he can use your carcass to create a portal that will take him wherever his vacant heart desires.\n\nAs Vortal springs at you, one thought consumes you…\n\n[i]You've had just about enough of escaped targets and murderous counterparts.[/i]\n\n*if unlockedspanbook\n\t*page_break\n\n\tIn the split seconds before this next battle is joined, The Spanbook avatar ${spanbook} once again appears in your mind. \n\n\tKnowing what you must accomplish, it offers you some sacred nuggets of expansion, specifically on the state of your skill with Enhancement and Shades…\n\n\tThe effects of which will expand your horizons and also the abilities most needed for this upcoming battle. So you check your levels and decide to read:\n\n\t*temp urnofunpredictabilityf 0\n\t*rand urnofunpredictabilityf 1 2\n\n\t*choice\n\t\t#Representative of Enhancement. [i](Auto Boost Enhancement)[/i]\n\t\t\t*set enhancement +5\n\n\t\t\t[b]Span The Sergiverses[/b]\n\t\t\t*line_break\n\t\t\t[b]Entry:[/b] Year 2105\n\t\t\t*line_break\n\t\t\t[b]Location:[/b] Central Galactic Space\n\t\t\t*line_break\n\t\t\t[b]Relevant Event:[/b] The Reps continue their galactic tour and spend another year abroad, combating new villains and despots galore. The team accepts two new winning members from TRAINING GROUNDS: Glorya and Superb.\n\n\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Enhancement Skill rise higher.\n\n\t\t\t[i](Enhancement Represented)[/i]\n\t\t\t*goto battleforvortalsoul\n\t\t#Blended Shades. [i](Auto Boost Shades)[/i]\n\t\t\t*set shades +5\n\n\t\t\t[b]Span The Sergiverses[/b]\n\t\t\t*line_break\n\t\t\t[b]Entry:[/b] Year 2105\n\t\t\t*line_break\n\t\t\t[b]Location:[/b] Blende\n\t\t\t*line_break\n\t\t\t[b]Relevant Event:[/b] Given The Representatives’ prolonged absence on Blende, new heroic teams rise to replace them, both in the capital Sorrel Fork and other cities across the planet. The two most prominent teams become The Disassembly, the first-ever team of Disreps, and The News, a group of heroes who met as non-winning finalists on TRAINING GROUNDS.  \n\n\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice. Instantly, you feel your Shades Skill rise higher.\n\n\t\t\t[i](Shades Represented)[/i]\n\t\t\t*goto battleforvortalsoul\n\t\t#Blotted Unpredictability. [i](Double-Strength Boost, But Randomly Applied)[/i]\n\n\t\t\t[b]Span The Sergiverses[/b]\n\t\t\t*line_break\n\t\t\t[b]Entry:[/b] Year 2106\n\t\t\t*line_break\n\t\t\t[b]Location:[/b] The Galactic Barrier\n\t\t\t*line_break\n\t\t\t[b]Relevant Event:[/b] Empress Vaccus remains unable to return/send word through the wormhole, which remains open but unused. The Blots know their invasion will happen through the Galactic Barrier regardless, just at a slower rate. Empress Vaccus, according to plans, does send its own scouts into Galactic Barrier to meet the incoming Armada. These scouts are smaller vessels with less powerful engines, and will take approximately seven years to meet the full Blot Armada moving towards them.\n\n\t\t\t*if (urnofunpredictabilityf = 1)\n\t\t\t\t*set enhancement +10\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Enhancement Skill rise exponentially higher.\n\n\t\t\t\t[i](Enhancement Double Boosted)[/i]\n\t\t\t\n\t\t\t*if (urnofunpredictabilityf = 2)\n\t\t\t\t*set shades +10\n\n\t\t\t\tWhile displaying this entry, ${spanbook} presents you with your boost of choice, selecting which of your levels to raise at random. Instantly, you feel your Shades Skill rise exponentially higher.\n\n\t\t\t\t[i](Shades Double Boosted)[/i]\n\n\t\t\t*goto battleforvortalsoul\n*else\n\t*goto battleforvortalsoul\n\n*label battleforvortalsoul\n*page_break\n\nSurveying the scene, you see Vortal coming straight at you. \n\nThen you see ChantuSe and One-Fourteen stepping to defend you, while The Delegates Shadow also prime themselves to attack.\n\nWhich means the time has come for you to cast the first roll of the die…\n\nThat begins this battle for the mortal soul of Vortal.\n\n*choice\n\t#Help The Delegates Shadow arrest Vortal. [i](Test High Vortal. Gain Limit)[/i]\n\t\t*set babevortalarrest true\n\n\t\tThe next moments bring a cacophony of sound and light. Still, your eyes stay focused on Vortal slithering towards you like a serpentine bullet. \n\n\t\tHe is showered with blaster shots and fire streams and icy winds, alongside black holes and unsheathed broadswords and clenched fists that all block his path…\n\n\t\tBut nothing stops Vortal as he dodges attack after barrage after obstacle, heading straight on for you.\n\n\t\tWhich just means you're going to have to take him down on your own.\n\n\t\t*page_break\n\n\t\tObviously, no run-of-the-mill spell is going to be enough to stop and contain Vortal. You're going to need something extra-special, and extra-focused.\n\n\t\tSo you snap out a quick self-enhancement, then twitch your spare fingers to conjure a pellet of tracking energy so potent, it would knock out a spacelephant.\n\n\t\tYou wait until the last possible second, with Vortal bearing down at you…Then you release the supercharged orb of swirling shade energy.\n\n\t\t*if (vortal > 70)\n\t\t\t*achieve vortalmortal\n\t\t\t*set potency +2\n\t\t\t*set cluecredits +3\n\t\t\t*set unleash %-30\n\n\t\t\tThe orb shoots at Vortal and, as expected, he dodges it with frightening speed. However, he doesn't see as the orb doubles back like a boomerang, returning to connect with the back of his head. He is then lit up with crackling shade energy, riddling his entire snake-stalked body like lightning.\n\n\t\t\t*page_break\n\n\t\t\tYou de-tense, expecting Vortal to hit the dirt. Instead, he stares you down, panting.\n\n\t\t\tImpossible. That should have nearly killed Vortal. How is he still upright? \n\n\t\t\tJust how strong is this thing?\n\n\t\t\tYou brace yourself for another attack, but instead you watch as Vortal generates one of his costly portals beside him. That's when you can tell—he might still be conscious, but he is injured.\n\n\t\t\tInstead of coming for you, Vortal decides to cut his losses and sacrifice his reserve resources to make a fresh portal on his own.\n\n\t\t\t*page_break\n\t\t\t*achieve attemptarrestvortal\n\n\t\t\tYou rush forward to stop Vortal, but so do The Delegates Shadow and ChantuSe and One-Fourteen. \n\n\t\t\tMost of the attacks cancel each other out, but the attacks that do manage to make it through also miss Vortal, as he dodges and weaves his way into his portal. \n\n\t\t\tYou watch in disbelief as Vortal then slithers into the portal, escaping into flirp-knows-where across the entire Galaxy. \n\n\t\t\tIn the same moment, three new clue credits drop into your hand. At the very least, it's nice confirmation you made the right call here and did everything you possibly could have.\n\n\t\t\t[i](Gained 3 Clue Credits)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Potency, Limit)[/i]\n\t\t\t*goto chantusemustfollow\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set cluecredits +1\n\t\t\t*set unleash %-15\n\n\t\t\tThe orb shoots at Vortal, and as expected, he dodges it with frightening speed. However, he doesn't see as the orb doubles back like a boomerang…\n\n\t\t\t*page_break\n\n\t\t\tExcept he actually must see this coming somehow, because he then bends his neck so the orb misses him.\n\n\t\t\tThen he creates the tiniest of portals as the orb swings back around, its path taking it directly into Vortal's portal.\n\n\t\t\tVortal knew what you would do. \n\n\t\t\tAnd now he is going to come to try and kill you.\n\n\t\t\t*page_break\n\n\t\t\tHowever, a new deluge of attacks from The Delegates Shadow and ChantuSe and One-Fourteen rain down on him before he can. \n\n\t\t\tYour attack might not have stopped him entirely, but it did at least slow him down. Instead of coming for you, Vortal decides to cut his losses and sacrifice his reserve resources to make a fresh portal on his own.\n\n\t\t\tYou rush forward to stop him, but so do The Delegates Shadow and ChantuSe and One-Fourteen. \n\n\t\t\tMost of the attacks cancel each other out, but the attacks that do manage to make it through also miss Vortal, as he dodges and weaves his way into his portal. \n\n\t\t\t*page_break\n\t\t\t*achieve attemptarrestvortal\n\n\t\t\tYou watch in disbelief as Vortal then slithers into the portal, escaping into flirp-knows-where across the entire Galaxy. \n\n\t\t\tIn the same moment, only one new clue credit drops into your hand, telling you exactly what the universe thinks of your efforts against Vortal.\n\n\t\t\t[i](Gained 1 Clue Credit)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Potency, Limit)[/i]\n\t\t\t*goto chantusemustfollow\n\t#Help Vortal escape. Beings like us cannot be caged. [i](Test Low Vortal. Gain Unleash.)[/i]\n\t\t*set babevortalescape true\n\n\t\tThe next moments bring a cacophony of sound and light. Still, your eyes stay focused on Vortal slithering towards you like a serpentine bullet. \n\n\t\tHe is showered with blaster shots and fire streams and icy winds, alongside black holes and unsheathed broadswords and clenched fists that all block his path…\n\n\t\tBut nothing stops Vortal as he dodges attack after barrage after obstacle, heading straight on for you.\n\n\t\tWhich means you're going to have to hope your bond with Vortal is strengthened enough that he understands your true intentions.\n\n\t\t*page_break\n\n\t\tYou act quickly. \n\n\t\tYou cast a shades spell of purple energy, the kind that usually looks like a shield. It probably looks to everyone else like you're trying to protect yourself from Vortal…\n\n\t\tInstead, you send that shade energy forward, making it look like an attack.\n\n\t\tBut really, as Vortal slides under the purple shielding energy, you intend for it to shield him from the attacks.\n\n\t\tNow you can only hope Vortal understands this is what you've aimed to do.\n\n\t\t*page_break\n\n\t\t*if (vortal \u003c 30)\n\t\t\t*achieve vortalpartner\n\t\t\t*set potency +2\n\t\t\t*set cluecredits +3\n\t\t\t*set unleash %+30\n\n\t\t\tIndeed, because of the close understanding you've built over the course of your short-but-intense journey with Vortal, he understands.\n\n\t\t\tSo instead of coming to kill you to create his next portal…\n\n\t\t\tVortal shoots sideways around you. \n\n\t\t\tAs he does, he dips into his reserve resources to create a fresh portal.\n\n\t\t\tWhile he does this work, the others have to cease their attacks temporarily, with you standing in the way.\n\n\t\t\t*page_break\n\t\t\t*achieve helpvortalescape\n\n\t\t\tTurning as if to protect yourself, you instead find Vortal's face. \n\n\t\t\tAnd you both indulge in a private smirk as Vortal slithers through his portal into the Galaxy beyond.\n\n\t\t\tYou then spin, trying to make it look like you are totally surprised and meant to stop Vortal…\n\n\t\t\tIn the same moment, three new clue credits drop into your hand. At the very least, it's nice confirmation you made the right call here…according to this deadly and lawless planet, at least.\n\n\t\t\t[i](Gained 3 Clue Credits)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted Bonus Potency, Unleash)[/i]\n\t\t\t*goto chantusemustfollow\n\t\t*else\n\t\t\t*set potency +1\n\t\t\t*set cluecredits +1\n\t\t\t*set unleash %+15\n\n\t\t\tUnfortunately, Vortal doesn't seem to understand. Or if he does, he certainly doesn't seem to care. \n\n\t\t\tHe comes at you with his full speed and force, aiming to turn your carcass into his latest means of escape.\n\n\t\t\tYour next move is to create another purple-shades shield, this time around yourself—one enhanced and re-enhanced as you snap your desperate fingers.\n\n\t\t\tVortal then rams into your shield with the full force of his strength…\n\n\t\t\t*page_break\n\n\t\t\tAnd shatters all your spell-work with one resounding strike from his bulbous head.\n\n\t\t\tYou are sent reeling from the force of Vortal's blow, pain radiating throughout your body to have been defiled so deeply. \n\n\t\t\tIf this was all about a show of strength amidst this galactically empowered assemblage, Vortal just made an incredibly alarming point…\n\n\t\t\tThat he might just be the most powerful among you all?\n\n\t\t\tAnd now he is going to come to try and kill you.\n\n\t\t\t*page_break\n\n\t\t\tHowever, a new deluge of attacks from The Delegates Shadow and ChantuSe and One-Fourteen rain down on him before he can. \n\n\t\t\tYour shielding might not have stopped him entirely, but it did at least slow him down. \n\n\t\t\tInstead of coming for you, Vortal decides to cut his losses and sacrifice his reserve resources to make a fresh portal all on his own.\n\n\t\t\tAnd, of course, he slithers behind you to do so, using you as a kind of human shield from the continued attacks. \n\n\t\t\t*page_break\n\t\t\t*achieve helpvortalescape\n\n\t\t\tDespite your near-murder, you actually turn and indulge in a private smirk as you watch Vortal slither through his portal into the Galaxy beyond.\n\n\t\t\tIt might have looked like you were trying to stop him, but this was what you wanted all along. Even if it didn't go exactly to plan.\n\n\t\t\tIn the same moment, only one new clue credit drops into your hand, perhaps telling you exactly what the universe thinks of your efforts to support Vortal.\n\n\t\t\t[i](Gained 1 Clue Credit)[/i]\n\t\t\t*line_break\n\t\t\t[i](Gained Basic Potency, Unleash)[/i]\n\t\t\t*goto chantusemustfollow\n\t#Just protect ChantuSe, Thatbee, One-Fourteen and myself. The fate of this conflict can't affect our mission here on Gothika. [i](Test Enhancement and Shades. Gain Auto Limit-Unleash)[/i]\n\n\t\tThis fight is merely a distraction from the true suspect you seek. This might be an incredibly important battle, but it's still only a minor one compared to the Galaxy-spanning war you face. \n\n\t\tYour decision will certainly signal quite a bit about who you are and who you want to become. \n\n\t\tSo let The Delegates Shadow take Vortal, or let him escape. Either way, you can finish this mission without his serpentine glare on your back.\n\n\t\tYour next move is to create a purple-shades shield around your party, one enhanced and re-enhanced as you snap your fingers. Vortal can come for you all he wants.\n\n\t\tThere's no way he is breaking through that shield.\n\n\t\t*page_break\n\n\t\tThe next moments bring a cacophony of sound and light. Still, your eyes stay focused on Vortal slithering towards you like a serpentine bullet. \n\n\t\tHe is showered with blaster shots and black holes, alongside fire streams and icy winds that all block his path…\n\n\t\tBut nothing stops Vortal as he dodges attack after barrage after obstacle, heading straight on for you.\n\n\t\tIt's going to be Vortal versus the strength of your spells.\n\n\t\t*page_break\n\n\t\tVortal rams into your shield with the full force of his strength…\n\n\t\t*if (shades > 25) and (enhancement > 25)\n\t\t\t*set potency +2\n\t\t\t*set cluecredits +3\n\t\t\t*if (unleash >= 50)\n\t\t\t\t*set unleash %+30\n\t\t\t*if (unleash \u003c 50)\n\t\t\t\t*set unleash %-30\n\n\t\t\tBut your spells hold, keeping him out. \n\n\t\t\tAnd if this was all about a show of strength amidst this galactically empowered assemblage, you certainly just made your own point crystal clear.\n\n\t\t\tNo one is more powerful than you. Period.\n\n\t\t\t*page_break\n\t\t\t\n\t\t\tInstead of coming for you, Vortal decides to cut his losses and sacrifice his reserve resources to make a fresh portal on his own.\n\n\t\t\tThe Delegates Shadow all rush to stop him. Most of their attacks cancel each other out, but the attacks that do manage to make it through also miss Vortal, as he dodges and weaves his way into his portal. \n\n\t\t\tYou watch as Vortal then slithers into the portal, escaping into flirp-knows-where across the entire Galaxy. \n\n\t\t\tIn the same moment, three new clue credits drop into your hand. At the very least, it's nice confirmation you made the right call here for your case.\n\n\t\t\t[i](Gained 3 Clue Credits)[/i]\n\t\t\t*line_break\n\t\t\t[i](Boosted y Vortal is the sole survivor of his entire galactic population.\n\nHowever, something happens next that [i]does[/i] surprise you. \n\nWith an enormous guttural cry, Omega Black generates a black hole inside the remaining slim-sliver of Vortal's closing portal. He then screams, expanding his black hole creation and opening the portal enough for actual bodies to slip through.\n\n\"Can't hold for long,\" Omega Black grunts through gritted teeth. \"Go.\"\n\n*page_break\n\n\"ShitoShae, get a lock on our location,\" Ryu speaks into some kind of comm-system on his wrist. \"We're about to teleport in pursuit. Omega Black will rendezvous with you in orbit, then you can fly the ship to meet us wherever we end up.\" \n\nIn the next second, Pinkuju leads the charge into the portal, clearly always the one to race in first.\n\n*if babevortalescape\n\tBut before she departs, Pinkuju turns to you and the look she sends you speaks volumes…\n\n\t[i]I'm going to remember what you did here today. In the worst way.[/i]\n\t*goto chantusegoodbye\n*elseif babevortalarrest \n\tBut before she departs, Pinkuju turns to you and the look she sends you speaks volumes… \n\n\t[i]I'm going to remember what you did here today. Thank you.[/i]\n\t*goto chantusegoodbye\n*else\n\tAnd she doesn't even give you a second glance before she goes. \n\n\tFor better or worse, you didn't factor yourself into this equation. So you can't be upset about being left out of its aftermath.\n\t*goto chantusegoodbye\n\n*label chantusegoodbye\n*page_break\n\n\"I'm coming with you,\" ChantuSe then calls out, just before Pinkuju vanishes through the portal. \"I cannot let Vortal take any more lives.\"\n\nChantuSe then catches your eye, knowing your time is seconds short. But in that moment, you can see so much of her motivation in her determined eyes. She can't explain it, but to atone for her many sins, she feels she must make Vortal her personal responsibility. \n\nYou're not sure that's right, but you don't have time to [i]make[/i] it so your paths cross again.\n\n*page_break\n\nOn this thought, you realize that means it's now down to just you, One-Fourteen, and Thatbee. \n\nExcept, when you turn to them, you only see One-Fourteen.\n\n\"Thatbee must have run, in all the chaos,\" ${oftze} sighs, looking around the ripped-open room…\n\nWhich is now strewn and littered with broken carousel parts. \n\nIt's a sad and strange sight, like a children's party has been ruined. \n\n*page_break\n\n\"Thatbee probably was overwhelmed by everything. Most of all my…betrayal.\" \n\nOne-Fourteen takes another heavy breath before continuing. \"But I can sort that out once we've finished this investigation. Thatbee left the keys to the blimp in my backpack. And I know where the temple we need to access is located.\"\n\n\"Then we should be on our way,\" you say with as much steel as you can muster. \n\nRight now, the only way out is through. \n\nAnd the only way you'll keep from thinking too much about everyone who just left is to keep moving.\n\n*page_break CHAPTER VI\n\n[b]CHAPTER VI[/b]\n*line_break\nYou and One-Fourteen flew the entire rest of the day, mostly in silence. \n\nWhich ended up being fine by you. \n\nNot because the views out the blimp window were particularly appealing—they were mostly dull landscapes of ashen forests and wilting farmland as you flew away from the Gothika metropolis. \n\nInstead your mind whirred and buzzed trying to process this morning's events, after yesterday's already-unprecedented kick start.\n\n*page_break\n\nRight now, you and One-Fourteen have set down the blimp in a vacant field, where ${oftze} promised you'd be safe for the night if you remained grounded. So you've set up a makeshift bedroom in the passenger hold, after feasting on a dinner of bagged snacks and sodas.\n\n\"Clue credit for your thoughts?\" One-Fourteen asks, stretched across the floor under a throw blanket.\n\n\"I could certainly use some more credits,\" you reply from your own spot lying on the single passenger bench. \n\nTheses are the first non-logistical words you two have spoken all day.\n\n\"But I'd rather hear how you're feeling about Thatbee,\" you pivot, meaning it.\n\n*page_break\n\n\"Well, I'm glad we're leading with softball questions,\" One-Fourteen cracks, hiding a frown. But then ${oftze} pulls ${ofthir}self together, attempting to answer your question. \n\n\"I truly didn't think I had a choice in hiding so much from her,\" One-Fourteen begins. \"But we really have become best friends over the years. And then you strangers swoop in and tell her the truth, like it's nothing. Given the traumas of this world, hiding who I really am from her is just about the worst betrayal she could probably imagine. I wish I had better answers for her.\"\n\nThinking this over, you formulate your own response.\n\n\"The answer is that, when I leave like everyone else did earlier today, [i]you[/i] are the one responsible for the aftermath. You are the one who is going to stay and handle the fallout.\" You pause, second-guessing yourself as you see the look on One-Fourteen's face. \"Right?\"\n\n\"I honestly don't know,\" One-Fourteen sighs. \"We Reborn might receive these sweeping mission statements, but how to live them out kind of falls to us. Not that I'm complaining. Having the universe assign you a purpose is way more than most get to work with. But if you're asking me how I'm supposed to handle all this, I have no freaking clue yet.\"\n\n*page_break\n\nOne-Fourteen then catches the look on your face. \"What?\"\n\n\"It's just, you Reborn all seem so sure of yourselves,\" you answer. \"Hearing you admit that you still have to figure things out for yourselves…\n\n\"I don't know if it's the biggest relief or the most terrifying truth?\"\n\n\"Oh, no one told you all adults are just overgrown kids winging it?\" One-Fourteen laughs. \"Well, welcome to the party. Actually, I kind of deserve a party. Yesterday happened to be my birthday. 1/14.\"\n\n*fake_choice\n\t#\"What, this hasn't been enough of a party for you?\" you crack.\n\t\t\"I'm not sure 'party' is the word I'd use. But it certainly proved to be my most memorable birthday in a very long time,\" One-Fourteen laughs.\n\t#\"Another year older,\" you reply. \"Do you feel more freed or trapped?\"\n\t\t\"Both?\" One-Fourteen replies, looking both pained and pleased again.\n\t#\"Well, in that case, happy birthday,\" you offer, raising a can of soda to toast.\n\t\tOne-Fourteen smiles, raising ${ofthis} own bottle to toast.\n\t#\"Are all clone-kind named after your birthdays?\" you ask.\n\t\t\"Indeed we are. And don't ask me why I never took on a chosen name. I don't know the answer. It just felt…right to keep that one part of my history in place,\" One-Fourteen answers.\n\n\"Anyway, it's the same old story with Thatbee,\" ${oftze} pivots back, seeming to want to avoid the topic of ${ofthis} birthday—even if ${oftze} was the one to bring it up. \n\n\"Just when I thinking I'm choosing peace, it turns out I'm really just choosing chaos again.\"\n\nYou turn over One-Fourteen's words, processing your response for a moment. \n\n\"Well, if it makes you feel better, since this all started, I was actually starting to think I might have finally found where I belong. But as usual, even among this galactic gathering, I'm still considered apart. Special and different, but still left all alone.\"\n\n*page_break\n\n\"Less-than from the jump, then eventually because you're actually greater-than,\" One-Fourteen replies. \"Story of my life. Same way that my life has always seemed about being the sidekick. Clone soldier, hired gun, Versian alliance supporter, member of #TeamThatbee. Forever and always the support staff.\"\n\n\"Except here you and I are,\" you pick up. \"The ride-along secret weapons suddenly handed the steering wheel.\"\n\nHearing this, One-Fourteen's entire face changes. You've done your best to ignore how impossibly adorable ${oftze} remains, or how attracted you are to ${ofthir}. \n\nBut that face right now, full of hope and admiration, makes it really flirping hard.\n\n*page_break\n\n\"Maybe that's the message I'm supposed to be interpreting here,\" One-Fourteen says. \"Maybe it's time I stopped accepting the missions of others and finally set one for myself?\"\n\nThat sentiment is nice, and you hope it might be true for One-Fourteen. But given your own current situation—the burdens of responsibility placed upon you—it hits you a little sideways. Because you don't have that luxury.\n\nBut then you remind yourself, no matter how much you and One-Fourteen might have in common, you've led very different lives so far. $!{Oftze} might only be a few years older than you, but ${oftze} has paid quite a few more dues. \n\nMeanwhile, all you've ever wanted was to find the life that was waiting for you, out beyond and away from the people who make you feel small. You realize now you've only just started living that life, even if it's in a way you could never have expected—or in service of a mission you didn't ask for.\n\n*page_break\n\n\"Maybe the mission I choose has to do with helping you,\" One-Fourteen then adds, ${ofthis} eyes on the floor of the blimp hangar.\n\nDespite yourself, the meaning in ${ofthis} words sending fireworks through your mind.\n\nBut you try to retain your composure enough for a proper response. \n\n*choice\n\t*selectable_if (onefourteen > 60) #I need to tell One-Fourteen how much this—how much [i]${oftze}[/i]—already means to me. [i](Test/Gain One-Fourteen)[/i]\n\t\t*set becoming +6\n\t\t*set onefourteen  %+40\n\n\t\t[i](Gained One-Fourteen, Becoming)[/i]\n\t\t*goto romanticonefourteenpaths\n\t#\"I appreciate it, but that would just make you the support squad again. And honestly, I don't need a partner in crime.\" [i](Test Powerful or Responsible. Lose One-Fourteen)[/i]\n\t\t\n\t\t\"Well, I have my answer then,\" One-Fourteen replies.\n\n\t\tAfter that, ${oftze} stands and heads towards the hangar light switch. \n\ tures to come. \n\t\t*goto sunriseatthetemple\n\t#Actually, I want to be more like One-Fourteen's best friend.\n\t\t\"I know I should probably encourage you to spread your wings and fly solo,\" you say. \"But I would actually really like having you as my partner in crime…or whatever it is we're called to do.\" \n\n\t\tOne-Fourteen smiles from ear to ear, one of the biggest and most earnest grins you've ever seen.\n\n\t\t\"Honestly, I don't mind being a sidekick. It suits me,\" ${oftze} replies. \"But until now, that role has been born of necessity, or from commands. I'd just love, for the first time, to [i]choose[/i] which mission to serve. Which leader to follow.\"\n\n\t\t\"And you're choosing me?\" you reply, sounding snarkier than you intend. \n\n\t\tIt's just, you are far more used to people running away from you, not wanting to follow behind. \n\n\t\t*page_break\n\n\t\t\"I think a decision like that requires more time than I've given it,\" One-Fourteen answers. \"But yes, I would like to choose a lot of what you stand for. What you fight for.\"\n\n\t\tNow it's your turn to grin from ear to ear. It's not your usual style, but this one time, you allow it. \n\n\t\tYou and One-Fourteen both know it'll be time to sleep very soon, to catch whatever rest you can before the next world-shattering day arrives. Tomorrow, you will work together to finish this case as best you can.\n\n\t\tBut for right now, you allow yourself to believe that One-Fourteen might really come with you for all the adventures to come. \n\t\t*goto sunriseatthetemple\n\n\n*label sunriseatthetemple\n*page_break AT SUNRISE\n\nOnce the sun climbed high enough in the sky, you and One-Fourteen finished your flight. \n\nThen once you got close enough, you quickly found a clearing wide enough to park the blimp. Your ensuing trek to the temple was short enough, but also exceedingly treacherous.\n\nThis trek was through what you can only describe as a \"crystal forest,\" with trees and plants made of all kinds of precious stones. What you expected might be bright and gleaming and clear was instead dim and opaque and jagged, full of dark-toned crystals solid as rocks. Every new step brought the possibility of being sliced or impaled.\n\nAnd you couldn't even rely on your spells to shield or guide your way. One-Fourteen told you from the start that this temple was built in the center of a crystal overgrowth for a very purposeful reason…\n\nTo negate all supernatural talents, including your Disrep magic manipulation.\n\n*page_break\n\nThe thought of entering this final leg stripped of your spells is the most terrifying notion you've encountered so far, to your surprise. But there was no time to dwell on your potential powerlessness.\n\nLuckily, One-Fourteen was skilled enough to guide you through the crystal forest with only a few minor slashes and pricks. \n\nSo you now stand in front of a modestly sized temple, one that is also made entirely of crystals. Its base structure is all geometric shapes carved from agate, beryl, and carnelian. In its frontal face, there is a gate made of hematite, jasper, and moonstone. Finally, there are several spiked towers made of black obsidian, pink opal, and rose quartz. Then, above the front gate reads a sign carved in goldstone: \n\n[b]The Temple of Cluedom.[/b]\n\nIt's perhaps one of the most gorgeous and intimidating sights you've ever seen.\n\n*page_break\n\nThat said, you also try to ignore the feverish feelings of fatigue radiating through you. One-Fourteen said this would be a symptom of the dampening crystals all around you, working their limiting ways on your magical body. You feel pretty awful, and that's just standing outside the temple.\n\nThe idea that next you must enter a temple with the most potent crystal concentrations—it's not high on your list. But if you want to complete this investigation, you have don't have a choice.\n\nThat is, until you realize your entrance into this temple isn't going to be entirely up to you. Or rather, it'll be up to a judgment of your execution of this case so far…\n\nBecause beside the gate, you see a jade slot with an amethyst cost that reads: \n\n[b]Entry Requires 7 Clue Credits.[/b]\n\n*page_break\n\n*if (cluecredits >= 7)\n\tYou exhale a sigh of relief, but then inhale another breath of tension right after.\n\n\tBecause you indeed have ${cluecredits} clue credits. Which means you've done enough to gain entry to this crystalline Temple of Cluedom.\n\n\tBut it also means that now you indeed [i]must[/i] enter this dangerously dampening space.\n\n\tYou turn to One-Fourteen, who looks far less fatigued than you. \n\n\t$!{Oftze} shrugs ${ofthis} shoulders, as if to say [i]I guess we should do what we came here to do.[/i]\n\t*goto enterfinaltemple\n*else\n\tYou know very well that you have only earned ${cluecredits} clue credits from your case work. \n\n\tWhich means you do not have enough to enter The Temple of Cluedom.\n\n\tYou exhale a sigh of relief, but then inhale another breath of tension right after. Because while this indeed means that you don't have to enter this dangerously dampening space after all…\n\n\tIt also means you won't be able to complete your investigation. You feel your heart sink all the way down to your feet.\n\n\tWhat happens now?\n\t*goto finaltempleskipped\n\n\n*label enterfinaltemple\n*page_break\n*achieve gainaccesstemple\n\nWalking through the now-opened gates to enter the temple, you actually find that, inside, there's really only one central shrine-like altar room. Actually, this space strikes you to be a bit like a mausoleum.\n\nDespite this sense of uneasy familiarity, you've never really felt anything quite like the sensation of standing in this room. It's like you feel depleted and numb, yet vibrating and buzzing, at the same time. \n\nYou…don't think it's a healthy combination.\n\nSo you waste no time in stepping up to the shrine. It's comprised of a large jade altar, with the largest amethyst geode you've ever seen hanging above. You actually suspect this spectacular geode must double as the portal window that will deliver you to your chosen suspect.\n\n*page_break\n\nYou turn to One-Fourteen to confirm this suspicion, but you are startled to find ${ofthis} mouth covered with a crystal ball and ${ofthis} hands bound with beaded ropes. \n\nOne-Fourteen doesn't seem able to nod, but ${oftze} blinks at you with calm eyes, as if to say [i]it's okay[/i]. \n\nObviously, whatever comes next, this temple doesn't want One-Fourteen able to communicate anything to you. You turn away, worried that even this blink might elicit some kind of bejeweled eye mask to cover ${ofthis} eyes.\n\nInstead, you turn to the altar and see the amethyst geode begin to glow. Its purple cloud circles you a moment, then returns to the geode.\n\nIn the next moment, instructions light up in lavender illumination…\n\n*page_break\n\n[b]You must identify the suspect you wish to locate.[/b]\n\n[b]Each suspect guess will cost you 2 Clue Credits.[/b]\n\n[b]Once your suspect is successfully exposed, an identifying marker will then be required.[/b]\n\n[b]Each identifying marker guess will cost you 1 Clue Credit.[/b]\n\n[b]Once this winning pair has been compiled, We the Geode will teleport your suspect here.[/b]\n\n[b]Finally, you will then need 3 Clue Credits to fully break the illusory disguise spell constructed by your suspect.[/b]\n\n*page_break\n\nReading these instructions as they scroll by, first you realize Thatbee and One-Fourteen were wrong about one thing—you will not be sent to your suspect. Instead, they will be called here to you…\n\nBut only if you sift through the many clues to completely crack the case. Only if you fully answer the question of who Binaria in hiding really is.\n\nAnd it sounds like this disguise spell might run even deeper than you all thought, if it requires 3 clue credits for this ancient temple to break. Perhaps it's even possible that Binaria doesn't actually [i]know[/i] she is in hiding, kept in some kind of self-protective, authentically deep-faked persona here. \n\nSomething like this would certainly explain why your own basic spell-work couldn't expose her.\n\n*page_break\n\nProcessing all this, you then do some quick math. \n\nIf you need to save 3 clue credits for the illusory-breaking end-spell,\n*if (cluecredits = 7)\n\tthis means that out of 6 suspects, you'll only have 1 guess to identify the correct one. \n\n\tThis will then leave you with 5 clue credits. Which means you'll then have 2 chances to select a correct identifying detail, whatever that ends up meaning.\n\n\tHowever, if you don't correctly identify the right suspect on your first try, you won't even have to worry about this second part…\n*if (cluecredits = 9)\n\tthis means that out of 6 suspects, you'll only have 2 guesses to identify the correct one. \n\n\tIf it does take you the maximum 2 tries, this will leave you with 5 clue credits. Which means you'll then have 2 chances to select a correct identifying detail, whatever that ends up meaning. \n\n\tHowever, if you don't correctly identify the right suspect on your first 2 tries, you won't even have to worry about this second part…\n\nBecause you'll already have run out of the necessary clue credits to run the endgame.\n\n*page_break\n\nYou then lift your fingers to generate a rundown of your case results, to remind yourself of which suspects you may have potentially ruled out…\n\nUntil a sharp ache in your hand reminds you that you can't cast any spells in here.\n\nIt looks like this is all going to come down to your memory, especially with One-Fourteen unable to communicate with you.\n\nThis Temple of Cluedom certainly is going to make you earn this, stripped of all advantages and guidance.\n\nYou're on your own, ${babename}. \n\nBut that's okay. In all the ways that count, you always have been.\n\n*page_break\n\nNext, a lavender list of suspects populates in the amethyst geode. \n\nLooking over the names, you try to remember who you've already potentially ruled out. \n\nBeyond that, you're going to have to rely on your deductive reasoning. \n\nYou try to think of the defining characteristics of each suspect, their power sets and history, and compare it all against Binaria's own details. \n\nThen you reach forward to identify who you think which suspect Binaria is really hiding under, trying not to think about how much weight this single choice might carry.\n\n*temp finalguesswreed true\n*temp finalguessamuletta true\n*temp finalguessboomkat true\n*temp finalguesslucy true\n\n*label guessthatbinaria\n*choice\n\t*selectable_if (finalguesswreed) #Wreed.\n\t\t*set finalguesswreed false\n\t\t*goto templefirstwrong\n\t*selectable_if (finalguessamuletta) #Amuletta.\n\t\t*set finalguessamuletta false\n\t\t*goto templefirstwrong\n\t*selectable_if (finalguessboomkat) #Boomkat.\n\t\t*set finalguessboomkat false\n\t\t*goto templefirstwrong\n\t#Bombats.\n\t\t*set cluecredits -2\n\n\t\tYou make your selection…\n\n\t\tAnd all the other names fade away in a red flash. \n\n\t\tOnly Bombats's name remains.\n\n\t\t*page_break\n\n\t\tWhich means you did it. \n\n\t\tYou cracked the case. \n\n\t\tBinaria is hiding as Bombats!\n\n\t\tThat's…quite the revelation. But you suppose, weighing all of the biographical factors, this does make a certain degree of sense.\n\n\t\t*page_break\n\n\t\tExcept, you then realize that \"Bombs the giant bat\" also remains lit up in lavender inside the geode, right underneath Bombats. \n\n\t\tYou're not sure why, but perhaps it's because this pair comes together. Could it be that Bombats is really Binaria, and Bombs the giant bat is simply an extension?\n\n\t\tWhatever the answer, you might be about to find out.\n\n\t\tBecause you just took another major step forward in finally solving this case.\n\t\t*goto templequestionone\n\t#Bombs the giant bat.\n\t\t*set cluecredits -2\n\t\t\n\t\tYou make your selection…\n\n\t\tAnd all the other names fade away in a red flash. \n l of jewel-toned options.\n\nYou already know the geode-portal will require some kind of \"identifying marker\" to bring your now-targeted suspect here, delivered into the walls of this very temple.\n\nSo now you must see: which randomized slot-wheel question are you going to have to answer?\n\n*label thetemplequizrun\n*rand templecluedomquiz 1 4\n*page_break\n\nYou now have ${cluecredits} clue credits remaining.\n\nYou need to save 3 clue credits for the final illusory-breaking enchantment, \n*if (cluecredits = 7)\n\twhich means you have 4 guesses left.\n\t*goto makethatguessagain\n*elseif (cluecredits = 6)\n\twhich means you have 3 guesses left.\n\t*goto makethatguessagain\n*elseif (cluecredits = 5)\n\twhich means you have 2 guesses left.\n\t*goto makethatguessagain\n*elseif (cluecredits = 4)\n\twhich means you have 1 guess left.\n\t*goto makethatguessagain\n*else\n\twhich means you won't have enough credits to guess again and also finish this investigation. You'd need another credit to guess, which would leave you with 2 clue credits…\n\n\tAnd you need at least 3 for the temple to cast the final de-disguising spell. \n\n\tSo does that really mean game over?\t\n\t*goto failedtemplerun\n\n*label makethatguessagain\n\nAs this realization settles, the geode slot wheel finishes spinning and presents you with another lavender-lit question.\n\n*if (templecluedomquiz = 1)\n\t*page_break\n\t*achieve finaltemplewonder\n\n\t[b]You have achieved a rare wonder.[/b]\n\n\t[b]The universe thanks you for your service.[/b]\n\n\tActually, it looks like you won't have to answer another question, after all. \n\n\t*page_break\n\n\tThe cosmic roulette wheel has spun in your favor, it seems.\n\n\tThe geode is going to pull Bombats and her giant bat here to you, with the clue credits to spare.\n\n\tYou just hope this gift isn't actually coming with some kind of curse…\n\n\tOr maybe, just maybe, you really are simply worthy of some good fortune?\n\t*goto templebringshere\n*elseif (templecluedomquiz = 2)\n\n\t[b]What kind of place has your suspect fled to?[/b] \n\t\n\t*choice\n\t\t#A less humid climate.\n\t\t\t*label templequizincorrect\n\t\t\t*set cluecredits -1\n\n\t\t\tYou make your selection…\n\n\t\t\tBut the entire geode simply flashes red. \n\n\t\t\tClearly, this was not the correct identifying detail to hook the geode's search engine into.\n\n\t\t\tSo you'll have to take another spin.\n\t\t\t*goto thetemplequizrun\n\t\t#A less chilly climate.\n\t\t\t*label templequizright\n\t\t\t*set cluecredits -1\n\n\t\t\tYou make your selection…\n\n\t\t\tAnd all the other options fade away in a red flash. \n\n\t\t\tWhich means you did it. \n\n\t\t\tAgain. \n\n\t\t\t*page_break\n\n\t\t\tYou not only solved the case, but you cracked the final detailed steps to bring the investigation to a complete close.\n\n\t\t\tBefore you, the amethyst geode begins to swirl with potent light. Like it is…\n\n\t\t\tBecoming a portal. \n\n\t\t\tOne that will pull Binaria-in-hiding straight to you in these Temple of Cluedom crystalline walls.\n\t\t\t*goto templebringshere\n\t\t#A less urban space.\n\t\t\t*goto templequizincorrect\n\t\t#A less hostile space.\n\t\t\t*goto templequizincorrect\n\n*elseif (templecluedomquiz = 3)\n\n\t[b]What ranks among your suspect's greatest likes?[/b] \n\n\t*choice\n\t\t#Surprise parties.\n\t\t\t*goto templequizright\n\t\t#Sneaky moles.\n\t\t\t*goto templequizincorrect\n\t\t#Crashing parties.\n\t\t\t*goto templequizincorrect\n\t\t#Colorful characters.\n\t\t\t*goto templequizright\n*else\n\n\t[b]What detail best describes your suspect?[/b] \n\n\t*choice\n\t\t#Has dyed-bright-red hair.\n\t\t\t*goto templequizright\n\t\t#Has dyed-bright-orange hair.\n\t\t\t*goto templequizincorrect\n\t\t#Wears a brown jumpsuit with orange-and-red stripes.\n\t\t\t*goto templequizright\n\t\t#Wears a brown jumpsuit with yellow-and-red stripes.\n\t\t\t*goto templequizincorrect\n\n\n*label failedtemplerun\n*page_break\n\nIn the blink of an eye, you and One-Fourteen are suddenly expelled to the outer gates of the temple. And the gates once opened quickly swing shut with an echoing clang.\n\nTrying to gain your bearings, you do the desperate thing. You're pretty sure of the results it will yield, but you have to try anyway.\n\nAs One-Fourteen's binding crystals dissolve, you twitch your fingers to cast a pink shades-laced probing spell. \n\nYou hope to see if you can locate any weaknesses within the temple gate.\n\n*page_break\n\nBut immediately, a burst of pain shoots through your entire hand, forcing you to stop. \n\nYou've rarely ever felt spell-blowback like that. \n\nIt must mean that, in addition to the dampening effects of the crystals, there must be some very old mystical protections placed upon this space. \n\nEven you, breaker and builder of spells, know that some forces cannot be magically meddled with. \n\n*page_break\n\nWhich means this investigation is officially over. \n\nYou don't have more time to spend circling the globe to look for Binaria in hiding. \n\nShe has succeeded in slipping through your spell-fingers.\n*goto outcometwotwogothika\n\n\n*label templebringshere\n*page_break\n*achieve solvedthecase\n\nThe geode then shines so brightly, you have to look away.\n\nAs you do, you feel the final 3 necessary clue credits drain from your supply.\n\nForcing yourself to look back, you squint through the dazzling lavender brilliance to find…\n\nBombats and Bombs the giant bat materializing on the crystallized floor before the altar, beamed out of the amethyst geode. \n\nThey look quite surprised to be here, wearing swimsuit versions of their usual costumes. Obviously, wherever they fled, they must have been near the shore or a pool.\n\n*page_break\n\nHowever, the geode beam then intensifies and these swimsuit-costumes also begin to fade away.\n\nIn fact, the very skin on Bombats and Bombs the bat begins to fade away, dissolving into something else entirely…\n\nBut what you see before you isn't Binaria.\n\nNot at all.\n\
