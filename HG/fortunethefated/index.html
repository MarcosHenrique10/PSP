 analyzes her pose—the photographer was going for energized and poised, so Pearl chose to channel a ray of yellow sunlight. From the look on her face now, We surmise this pose isn't quite the right fit yet, either.\n\nWe then zoom in Our vision to see that Pearl focuses next on the gemstone shining from atop her left wrist. She must be questioning whether it looks convincing—after all, she has told everyone discovering this rare, ancient artifact is what makes her special, what helps her clarify and amplify her studied powers. She says the gemstone revealed itself to her as the chosen one, so she had it set in a gold cuff she never removes.\n\n*page_break\n\nHowever, We know Pearl never removes this cuff because the gemstone is permanently bonded with the flesh of her wrist. And if everyone knew that, they'd start asking all the same questions We have. Pearl clutches this gemstone now, an absent-minded habit that was her first tell. The gem swirls and courses with colorful power, a rainbow mash of the deadliest and most potent energies in the entire galaxy. We often wonder if it scares her as much as it scares Us.\n\nPearl does not dwell on this moment for long, even though she has dreamed about it her entire life. How could she, when she has no sense of how to live in the present? Like so many others, Pearl's entire life is spent looking forward or looking back. So forward she goes, tearing the perforated edge of the trading card as carefully as she can manage. Once the  card is removed, it reveals a button set into the page underneath, which reads: Watch Pearl's first exclusive interview since being drafted into The Representatives! \n\nPlacing her trading card with the others, Pearl then presses the button on the flat page. This triggers an embedded circuit to project a holographic screen several inches above the magazine. Pearl stares down at this miniature image of herself, half awed and half mortified.\n\n\"How does it feel to be the only Repo member of this latest roster?\" a reporter's voice asks from somewhere behind the camera. \n\n*page_break\n\nThe question seems light enough, but every living soul on Blende understands its weight—and the history it carries. Centuries ago, Blende was an unremarkable planet populated by ordinary humans. That is, until it was discovered in a key position along a developing intergalactic trade route. Blende's powerless natives were quickly \"Repossessed\"—a euphemistic word for colonized and enslaved—by an advanced extra-human race: The Repletes. \n\nThankfully, Pearl is ready for the reporter's loaded question. She delivers an answer she has likely practiced her entire life: \"Well, we Repos have always been underrepresented when it comes to the hero field, being born without powers. I've had to work twice as hard as any Replete to be here today, but that's something all Repos understand.\"\n\nWatching herself back on the projected holographic screen, Pearl seems content enough. But that's only until her eye catches the ticker scroll at the bottom, a line of text that reads Live Comments. Pearl's face falls as she reads the first:\n\n@brotein420 They only added a Repo to check some nonsense \"diversity\" box. Plus she's not even THAT hot.\n\n*page_break\n\n\"So how do you feel about Collette Scratch's recent statement,\" the reporter continues, \"that she fears your mastery over the shaded spectrum came too fast for your age?\"\n\n\"She…? I hadn't heard that yet,\" Pearl stumbles on-screen. The doubt on Pearl's projected face matches her real-life expression—mirrored masks of surprise and panic. But at least on the screen, Pearl rebounds beautifully.\n\"As a founding member, Collette has always been my own personal icon. If she feels that way, I look forward to working together and earning her trust,\" Pearl spins, hitting every point from The Representatives' interview-pivot media training.\n\nMeanwhile, real-life Pearl remains stuck reading the next Live Comment: @PearlyGirly Pearl is so the new Collette. Out with the OLD and in with the NEW!\n\n\"In other words, you look forward to proving Collette wrong,\" the reporter pushes back. \"Do you think she's still upset you won the new member slot over her draft pick? Or maybe she's afraid of being replaced by a younger—\"\n\n*page_break\n\nThe interview cuts out, suddenly, as a new finger presses the button on the magazine. We look up to find this finger belongs to Blende royalty, Luge. He also wears his costume: a sleek orange-and-brown armored suit that helps him slide along his self-generated rocket-paths and channel the excess energy cleanly. We realize Luge is here as part of a time-honored Representatives tradition: the second-newest member escorting the newest to their first briefing meeting.\n\n\"Please don't tell me you're addicted to this garbage like Pocket?\" Luge sighs, offering a hand to help Pearl off the bed. \"At least he claims it helps him understand human behavior. What's your excuse?\"\n\n\"Isn't it my responsibility to know what people are saying about me?\" Pearl asks.\n\n\"Actually, no,\" Luge answers, nodding his head towards the door. His costume's helmet remains cradled under his arm, revealing his brown skin, curly black hair, and trademark former-teen-heartthrob looks.\n\n*page_break\n\nPearl follows Luge out into the hallway through the mansion's member residence wing, which is located on Torrington House's upper back floors. It's a relatively short walk to the mission control wing just a few floors down…so We'd better get moving to the meeting while We watch, Ourself. \n\n\"Easy for you to say,\" Pearl returns. \"You've been famous since before you were born.\"\n\n\"Exactly. That's why you should listen to me on this,\" Luge says. \"I'm going to tell you the same thing my mom told me the day I was old enough for my first smart phone.\"\n\nPearl listens eagerly, her eyes wide. She grew up reading about Luge in her beloved tabloid magazines, so We can only imagine how surreal this moment must feel to her. Luge is a prince of the Blendian royal family, so to hear private words of wisdom from Luge's mother—the current Queen—must be exhilarating for Pearl.\n\n*page_break\n\n\"What anyone says about you in the public isn't actually about you, it's only ever about the person speaking. It's easy to sit on the sidelines and judge, but if you're the one in the arena doing the damn thing, the only voices that matters are yours and those of your peers.\"\n\nPearl listens to this and We can tell it soaks all the way into her. \n\nBut alas, she is only 22, and her well of experience only runs so deep. Even though these wise words resonate with Pearl, We expect tonight when she is alone again in her room, she'll still turn that interview back on and read every single comment written about her. It takes time for wisdom to sink deep enough to drive action—We've had to learn this the hard way, just like everyone else.\n\n\"Okay, wow. Well, instead of totally freaking out about that, I've been dying to ask you,\" Pearl chatters, still buzzing. \"Is there any truth to the rumors that you and Kid Halo finally went out on a proper date?\"\n\n*page_break\n\n\"Um, didn't we just talk about the whole gossip thing?\"\n\n\"I'll take that as a yes.\" Pearl smiles, nudging Luge's shoulder.\n\n\"How about this,\" Luge sighs once again. \"If you see any signs of our fearless leader unclenching and actually taking a night off, you let me know?\n\n\"Ah,\" Pearl answers. \"Noted.\"\n\n*page_break\n\nOnce we've all settled in the briefing room, Kid Halo stands at the head of the conference table. As usual, he seems most at home there—he makes leading look effortless, with his spotless alabaster skin and shining blue eyes, which glow almost as brightly as the yellow halo bands of his costume. But We've known Kid Halo long enough to understand he did not just wake up like this—his flawlessness as a leader comes from years of hard-earned work and rigorous self-examination.\n\nWe glance across the briefing table at Pearl, who quite literally looks up to Kid Halo, and think of how much she stands to learn from him about success. Part of Us believes Pearl still deserves this opportunity to learn and grow, despite Our other…reservations.\n\n\"Welcome, all of you, to this latest incarnation of The Representatives,\" Kid Halo begins. \"I hoped to plan an easy opening mission for us, to field-test all the training we've done as a new roster. However, we've got a lead on the recent string of beatings targeting Galactic Council officers. The GC sent us this manifesto video.\" \n\nKid Halo steps aside from the wall-sized screen behind him, which currently bears the seal of the Galactic Council—the governing body that partially oversees our team. The Representatives actually operate autonomously based on our own charter, but maintaining healthy relationships with Blende's government, the royal family and the Galactic Council offers us greatly improved operating ability.\n\nOf course, in all our years defending Blende, The Representatives have faced innumerable threats, each seemingly more dire than the last. However, when We see the face that appears on the briefing screen next, We fear this new threat might be the one that unravels us from the inside.\n\n*page_break\n\nAt first glance, the woman staring back through the camera looks ordinary enough. Her light-purple skin suggests she's a Repo, most of whom usually present pastel-toned appearances. The woman's suit of body armor and her cropped, one-sided haircut suggests an affiliation with Blende local law enforcement, but there's only one detail We need to tell Us who she is: the amethyst gemstone fixed at the base of her throat, identical in size and shape to Pearl's…and coursing with the same raw power.\n\nThen one remaining detail demonstrates how potentially dangerous she is: she stands with one foot resting on the unconscious body of a Galactic Council Corps officer.\t\n\n\"You must be wondering why I have attacked all these officers, but they all have one thing in common,\" the woman begins, in a voice both strong and resolute. \"Each is responsible for the unlawful death of an innocent Repo citizen. And each incident has gone unpunished.\"\n\nHearing this, all eyes at the briefing table slide to Pearl, since she is the only Repo in the room. If only they knew how much deeper Pearl's connection runs…but We suppose they will soon enough, now. \n\n*page_break\n\n\"We Repos are told we are no longer second-class citizens, that we now have the same rights as every shining, powerful Replete,\" the woman on-screen continues. \"And that against any ‘lingering' oppression, we Repos must seek justice in nonviolent resistance. But until violence is removed from our oppression, it must be employed in our revolution.\"\n\nWe should be continuing to watch this manifesto video along with everyone else, but Our eyes shift focus to Pearl. She stares at the screen, frozen, unable to hide the horror on her face.\n\n\"So I call upon The Representatives to live up to their name. Will you join me in bringing these corrupt officers to justice?\" the woman asks, still staring straight back into the camera. \"And if you find yourself asking who I am, look around…because one of you knows me quite well.\"\n\nWith this final proclamation, the screen cuts to black. Kid Halo steps back front and center to address the team, but before he can say a word, Pearl audibly chokes back a sob.\n\n\"I…I need…\" she whispers, one hand to her mouth. \"Excuse me.\"\n\n*page_break\n\nPearl then stands and runs from the room. The rest of The Representatives are left stunned, which distracts them enough for Our eyes to flash blue, accessing Our secondary vision once again. In Our mind's eye, We watch Pearl as she flees back to her bedroom suite, wiping away tears. Back in the briefing room, there is chatter about who should follow her. Sadly, the answer presented does not surprise l city of Sorrel Fork, rolls by underneath—its high rises and sprawling streets, the greatest trade hub and cultural epicenter in all the Verses Galaxy. Perhaps We're biased, but We've also traveled with The Representatives long and far enough to know there's no place quite like Sorrel Fork—a melting pot in the center of our galaxy, home to dozens of intergalactic races and a thriving ground zero for all of Blende's interplanetary commerce, politics, and entertainment arts. One brilliant chunk of ordered chaos unlike any other.\n\nWe were born here in Sorrel Fork, as a young boy to an unremarkable, middle-class Replete family. Of course, unremarkable Repletion still carries many social privileges on Blende, not to mention unique extra-human abilities. Our abilities manifested in Our teenage years, but it took until Our twenties to truly learn to master them. Before then, We fear We were considered quite insane.\n\nWe were born with the ability to see more than most—\"surveillance vision,\" a Specialist once called it. But it took some time for anyone, including Us, to understand Our gifts ran so much deeper than this surface-level use. When focused on a population of people, Our vision allows Us to \"see\" their aggregated groupthink: to grasp the history of urban folklore, or communicate with local cultural myth. And when focused on an individual, We can see personal mythology, or commune with self-perceived history.\n\n*page_break\n\nAs one might imagine, coming to understand this unique gift was far more difficult than learning to fly or shoot beams of energy. In fact, the process of mastering this power looked much like losing Our mind. After all, to gaze at a person and understand them completely is a revealing, startling thing—especially when a person has yet to understand themselves. Or to look at an entire society and see it so clearly, when so few others seem able to—that's a maddening thing.\n\nSo We removed ourselves from other people for many years in Our troubled teens, living in a monastery to master Our gifts and hone many martial arts disciplines. That's actually when We began thinking in The Royal We. After We aligned with Our truest core self—with Our inner purpose made practice—We realized something fundamental about humanity: No one soul matters more than another, because every soul holds infinite worth.\n\nOnce We began living from this place, once this single mantra became Our personal mission statement, everything in Our life flowed forth. It's what inspired Us to become a hero, to use Our gifts to protect, serve, and empower others. It's what crafted the infamous persona of Retina, the Seer of the Streets. It's what led Us, as Retina, to fight in the legendary battle that founded The Representatives, all those years ago. And it's what brought Us to meet Collette, the woman We've loved every single day since.\n\nIn this moment, We look down at Sorrel Fork, Our home, which feels so much like an extension of Our soul. It's fitting to look at the city through Our own reflection in the tinted window: Our creased dark-grey skin and blackened eyes, Our armored costume in navy and white, designed to match Collette's…\n\nCollette Scratch and Retina, the iconic heroic couple.We look at us now and hardly recognize who We see.\n\n*page_break\n\n\"Okay, so this is actually good,\" Kid Halo begins, standing in the center of the hull lounge, where The Representatives sit arranged in armchairs and sofas. \"I didn't want to have this conversation in front of the full mission control staff and the recording drones.\"\n\n\"Actually, they prefer the term ‘memory betches,'\" Pocket chimes in, his android faceplate displaying exclamation points. \"Even drone bots have feelings, you know.\"\n\n\"No, they do not,\" Nifty Eons adds next, predictably. Ze is not only Pocket's covert partner from long before their time on The Representatives, ze is an empathetic expert and an inscrutable literalist. \"Obviously Pocket is cracking a joke to ease the tension surrounding Pearl's visible distress, which we must address if we are to have any hope of success in this mission.\"\n\n\"Yes, as always, Nifty cuts right to the chase,\" Kid Halo says. As he speaks, Pocket changes his faceplate to a pixelated hand making an L shape, his marker for Lame/Loser. In response, Nifty turns hir antlered head sideways, sticking out hir serpentine-split tongue.\n\n*page_break\n\n\"Pearl, what do we need to know here?\" Kid Halo continues.\n\nPearl takes a breath, dread emanating out of her. She does not want to speak, but she also knows she no longer has a choice in the matter.\n\n\"Hurry along, dear,\" Collette says. \"Not all of us have such youth to burn.\"\n\nThe jab suggests Collette has already seen Pearl's debut interview and that she read the comments as well. We used to urge Collette not to, but unlike Pearl internalizing this feedback, Collette has learned to wield public opinion like a weapon. It's one of the things We grew to admire most about her—the claws that cut through inauthenticity. \n\nWhy Collette uses them on Pearl this way seems…puzzling, given the secret truth of their relationship. Or, perhaps, it is simply the greatest show of faith Collette knows to offer, to care enough to challenge.\n\n*page_break\n\n\"Easy, Collette,\" Luge jumps in. \"Our first case seems to include a ghost from Pearl's past. We've all been through that—but none of us ever had to face it on day one.\"\n\n\"No, Collette is right,\" Pearl says. \"I had no reason to share this before, but for the good of the team I have to now.\"\nPearl takes another deep breath before carrying on, once again absent-mindedly clutching her gemstone cuff.\n\n\"You all know I always dreamed of becoming a member of The Representatives, to be a role model empowering other Repos. I studied abroad for years to learn the mystic arts, and while on a pilgrimage I discovered—or was chosen to discover—the gemstone that boosted my learned powers. I then returned to Blende and you all know how hard I worked to make it here…but there's a part of the story no one knows.\"\n\nPearl pauses, trying to gather herself. She finally realizes she still clutches her wrist cuff and lets go.\n\"I had a partner in my studies…another Repo who was also chosen to receive a second gemstone—the only other of its kind, a balanced complement to my own. That partner is the woman you see in the video—she goes by the alias Torque, ‘the twist that forces movements.' We used to dream of all the same things, but while the power of my gemstone amplified my access to the shaded spectrum and my desire to inspire others, Torque's gemstone only amplified her physical strength and her rage.\n\n*page_break\n\n\"Once we both found the power we sought, all I could think about was returning to Blende and using this newfound power to inspire other Repos as their Representative. But after accepting her gemstone, Torque became obsessed with returning to Blende to destroy the powers that be, in order to make amends for all Repos had lost. Everything I wanted to protect and progress, Torque wanted to destroy and replace. But more than that, her power—Torque was so strong. She was so intense, it…scared me. So I did something I thought I'd never have to tell another living soul…\n\n\"I used my mystic mastery to send Torque far away, and then I cast a protective spell when I came back to Blende that was meant to keep her from ever returning. How she managed to get back on Blende without me knowing…I have no clue. It shouldn't be possible.\"\n\nAs Pearl finishes her story, a look of genuine fear remains etched on her face. But the fear looks different to Us—not focused on Torque, but rather focused on the prospect of losing her coveted spot on The Representatives.\nWe have questions—many questions—but Luge is the first to speak.\n\n\"It sounds like you did the right thing, Pearl,\" he says, placing a hand on her shoulder. \"Classic archenemy origin stuff.\"\n\n\"Unfortunately, the right thing would have also been disclosing the full origins of your abilities from the start,\" Collette says. \"That way, we could have prepared for this.\"\n\n*page_break\n\n\"Now is not the time to point fingers,\" Kid Halo jumps in. \"Pearl, we'll need to know everything you do about Torque. But first, do our three global-powereds sense anything unusual?\"\n\n\"There have been no notable disruptions in Blende's teleportation field,\" Pocket answers first. \"So however Torque shantayed to stay, she was properly smuggled.\"\n\n\"Now that I know to look for it, I do detect a considerable shift in the righteous-anger quotient within Sorrel Fork,\" Nifty adds. \"And if this shift is at all proportionate to Torque's personal power levels, Pearl is correct to fear her.\"\n\nThe Representatives look to Us next to offer insight, because of Our special connection to the city. We learned a long time ago to be mostly silent, to remain comfortable in stillness—when everything you say inevitably unsettles someone, it's important to choose your words carefully. So for all of Our wisdom and understanding, We have grown somewhat…removed. Perhaps this is part of why Collette has fallen out of love with Us? Or at least decided We are no longer enough? \n\n*page_break\n\nWe choose to let these troubling thoughts—and their accompanying emotions—pass, because We must still exercise restraint. Instead, Our eyes flash orange as We access Our urban folklore vision. From this high up, We are able to glimpse the haze of fresh anger and power surging through the city. To think Torque's effect is this prominent, even before her manifesto goes public… \n\n\"Nifty's assessment rings true,\" We say out loud. \"And what Pearl says also rings true.\"\n\nWe rarely feel compelled to lie—though this was not technically a lie. It is Our understanding that everything Pearl said has been true—it's just that she continues to omit so much else.\n\n\"Okay, of course I'll tell you everything I know about Torque's power and motivations,\" Pearl says next, almost clipping the end of Our statement. Clearly, We make her nervous.\n\nGood.\n\n*page_break\n\n\"But first, you have to know the most important part,\" Pearl continues, taking another deep breath. \"Torque is also my…She's my older sister.\"\n\nA bombshell of stunned silence rocks the hull, but We don't need anyone to speak to know what Our teammates are thinking. Luge must be weighing whether exiling a sibling this way is a sign of great heroism, or great selfishness. Pocket no doubt tries to understand why humanoids place such weight on these familial connections in the first place, when all humans share 99.9% of the same genetic makeup. \n\nNifty the spy must be deciding that Pearl is no longer to be trusted—for as ze always says, dishonesties are like cockroaches: where there's one, there's bound to be more. Kid Halo is likely running scenarios on the public relations implications when this untold story inevitably goes viral. Collette must be feeling boundless sympathy and support for Pearl, underneath her visible frustration. \n\nAfter all, Collette knows this is exactly the kind of scandal that could end Pearl's run on The Representatives before it even begins. And what would it mean for Collette, if all Pearl's scandals started coming out?\n\n*page_break\n\nFrom the moment We met Pearl, Our Retina vision communicated her personal mythology clearly. It's hard to describe how these powers work. We can sift through the visions, attempt to guide them, but to say We have control over what We see would be inaccurate. It's much like asking an artist how they paint or a writer where their ideas come from—accessing Our power is a combination of trained discipline and inexplicable inspiration. So it's impossible to describe how We see what We see…and sometimes it's impossible to decide what We see. \n\nWe vowed many years ago to never use Our Retina vision on Collette purposefully—this is part of why she remains Our blind spot. And perhaps why Collette believes We do not see her affair. Unless she does not care that We can see, somehow…\n\nThis is another part of why We have opened this Case Log, to reflect and find answers to important questions of Our own: do We distrust Pearl because she's having an affair with Our wife? Or do We distrust Pearl because of Our knowledge of her powers and her connection to this new challenger?\n\nThere are so many reasons Pearl fears Torque's return, but we know the part she still has yet to tell anyone, the part she hopes she'll take to her grave…\n\nPearl's darkest secret still remains hidden—and Torque is the only other person in the galaxy, aside from Us, who knows it.\n\n*page_break\n\nIf you're reading this Case Log, you must be wondering why We have chosen to guard Pearl's secret. Of course, Pearl obviously has a side of her that's willing to go to great lengths to empower herself. You might ask: what good is it being a hero if you must do villainous things to get there?\n\nIf We've learned anything in Our many years, it's that no hero—no person—is perfect. For all her flaws, Pearl's presence on The Representatives indeed means the world to so many Repo citizens, in a time when they need inspiration the most. And earning an appointment on The Representatives is a monumental feat—Pearl had to prove herself a thousand ways to get here. But most importantly, Pearl also understands her mission, her heroic purpose, so much more clearly than others her age.\n\nMost humans fail to see two fundamental truths about their own selves and the societies they build. First, that every living soul is a unique reflection of the same source; that each of us is connected. The second fundamental truth is the one Pearl sees far more clearly—that modern humans have access to the solutions and tools capable of fixing most global problems: wealth divides, social inequality, climate change and the like. The question of why humanity does not utilize these tools fully remains confounding. \n\n*page_break\n\nOne theory posits human \"egos\" require superiority, causing us to resist any change that impacts our short-term profit or power: getting rich quickly at any cost, then ignoring any consequences to maintain these riches. Another theory posits humans are only able to grow through suffering—success teaches us nothing. \n\nWe have many more thoughts to share on these theories (and will disclose these in future Case Logs), but for now We've arrived at one conclusion: being human means being constantly complicit in the suffering of others. \nHowever, if We believe that being human means enduring inevitable suffering—and humans only grow through suffering—then being human must also mean always seeing the potential for growth. \n\nPearl worked this truth out for herself during her studies, and her definition of being a hero is simple: she believes the hero's job is not to solve humanity's problems, but rather protect and empower those who can. Another reason We opened this Case Log is because We sense Pearl will soon face a question that will define her: what matters more to Pearl, her ideals or her power? And which is she willing to sacrifice to become a hero?\n\nWe know Our fate—and the fate of The Representatives—depends upon Pearl's answer.\n\n*page_break\n\nThese are the thoughts that fill Our mind as the transport chopper arrives at our destination—a rooftop on the outskirts of Sorrel Fork, home to an automated manufacturing factory…the perfect place for a civilian-free fight. The Representatives drop down in defensive formation, since Torque herself waits for us there. \n\nOur first impression of Torque is that she indeed courses with raw power, also focused through a keen understanding of her own purpose. While Pearl's definition of a hero focuses on growth, Torque's focuses on suffering. Torque believes it's the hero's job to pick up the problem-solving tools and use them to break that which is corrupt, then build anew.\n\nSeeing Torque now, We assume many of Our teammates must be feeling the same way We do: unsure of who is truly right, Pearl or Torque. While We're not sure We agree with Torque's methods, We certainly understand her argument—especially if what she says of these GCC officers is true. Naturally, the GCC has vehemently denied all such accusations…but we Representatives know what it means to protect our own. Look what We've already done for Pearl. \n\nThings have moved so quickly, The Representatives haven't been given the chance to discuss any potential dissent—and We fear this doubt is the mightiest potential weapon Torque can use against us. Of course, this fact is not lost on any of us as a pair of Network NewsBots fly into the air nearby, to capture this standoff. For all we know, Torque called them here.\n\n*page_break\n\n\"The Representatives. I've waited a very long time to meet you,\" Torque says, her voice projecting loud and clear across the roof. Her eyes remain trained on Kid Halo, not once even glancing at Pearl. \"But are you here to help me bring these corrupt officers to justice, or to stand in my way?\"\n\n\"We're here to talk, hopefully,\" Kid Halo answers.\n\n\"Actions speak louder,\" Torque says. \"And your actions suggest you came here to fight.\"\n\n\"We know who you are and how powerful you've become\" Kid Halo counters. \"But even you can't take all seven of us. Please come back with us to Torrington House, so we can begin to sort this out diplomatically?\"\n\nTorque's anger flares visibly hearing this, a purple current pulsing through her. Instinctively, We clench Our fists. \n\n*page_break\n\n\"I have no reason to trust you,\" Torque says, finally turning her attention to Pearl. \"You know exactly why.\"\n\nUnder the weight of her sister's gaze, Pearl visibly flinches. \n\n\"But you don't know a thing about the new me. Or what I'm capable of,\" Torque concludes. \"For example: what makes you think I'd face you alone?\"\n\nAs Torque finishes speaking, three figures suddenly emerge from the stairwell behind her. We should be using Our vision to identify the others, but all We can focus on is the man who stands shoulder to shoulder with Torque, that same self-satisfied smile plastered on his face…\n\n*page_break\n\nIt belongs to The Native—The Representatives' very first enemy. \n\nInstantly, two things become clear: We understand exactly how Torque was able to return to Blende unnoticed….\n\nAnd this situation just grew much, much worse.\n*return\n\n\n*label repsiaplogthree\n\n\"So, to be clear…\" Torque begins, now joined by her reinforcements. \"You're not here to support our cause—you're here to stop us?\"\n\nThe Representatives all tense. Whatever hope there might have been to sort this out diplomatically went out the window the moment The Native appeared. And it only takes another moment of silence for Torque to understand.\n\n\"Then let's do this,\" she says, mashing her fists together.\n\nIn the next instant, all hell breaks loose. \n\n*page_break\n\nTorque's quartet goes on the offensive, but Kid Halo reacts just as quickly. He speaks into the secure comm-link patches The Representatives all wear hidden inside our ears.\n\n\"Pocket and Luge, take The Native. Nifty and Collette, the new pair. Pearl, you're with me on Torque.\"\n\nThe Representatives react on command, breaking forward. We, however, fall back—Kid Halo need not communicate Our rather well-practiced role: watch, assess, and assist. It's standard procedure whenever engaging unknown opponents.\n\nSo Our eyes flash green as We access Our localized-group vision. Instantly, the connections between our foes becomes clear, but that matters less right now than understanding their abilities. \n\n*page_break\n\nWe focus first on The Native—familiar as he may be, his arsenal usually proves ever evolving and deadly. Looking at The Native himself, he appears unremarkable as usual on the outside, with his greying hair, soft body and pastel-purple skin. The Native's true danger has always laid in his ideology: he believes in using radical terrorism to free his fellow Repos from oppression. \n\nWhile The Representatives believe in upholding Blende's principle of unity and progress through diversity, The Native believes in Repos reclaiming their natural-born planet and overthrowing its oppressors.\nThe Native isn't just a radical thinker, he is also a savant when it comes to technology. This technological genius makes him near impossible to detain for long. As such, The Native rarely makes appearances in person, usually choosing to speak remotely through drones and screens. His presence here on this rooftop is startling for many reasons—but We know if he is here, it's because he must have come well-armed. \n\nThis is why We focus on The Native first—or rather, on the swarm of airborne drones he releases from his tech-vest. The Native is partial to drones and loves designing new, wicked applications for his \"pet death-birds.\" However, one glance at The Native tells us these mini-drones are his standard-issue model.\n\nWhy in the universe above would The Native come here so ill-equipped? \n\n*page_break\n\n\"Pocket. Luge. These are standard aerial death-drones,\" We speak into our comm-link in a whisper. Without a telepath on the roster, this is our most effective method of covert communication. It's perhaps less seamless, but We prefer it—telepaths are hard to come by, and even then remain moody and generally terrible for team morale. \"But be careful. This only means The Native must have something up his sleeve We cannot yet see.\"\n\n\"Copy that,\" Luge responds first. He already careens through the sky on one of his self-generated rocket paths, streaking like a jet with clear-blue contrail. His flight pattern eliminates a dozen drones within seconds. When he stops hurtling like a human bullet, Luge drops down onto the roof in a blaze of excess clear-blue energy. He then uses that energy in a flurry of attacks, punching and kicking his way through drones in a melee of kinetic fury.\n\nBack up in the sky, Pocket surrounds himself with a series of defensive portals that redirect the drones' laser blasts back on one another. He simultaneously accesses the hover-chopper's blasters to fry more drone swarms. The Native might have programmed his death-birds to resist Pocket's control long ago, but Pocket, transport specialist that he is, can still interface with any tech-vehicle.\n\n\"We'll clear a path to The Native right quick, okurr?\" Pocket chirps into comms. \"Will shout a holler at any nasty surprises, but Retina, you're good to assist the others.\"\n\n*page_break\n\nWe still fear The Native's dubious intentions, but with this clearance granted, We shift Our vision across the roof. Next We spot Nifty and Collette engaging the new pair of opponents. We cannot see their abilities clearly until this new pair uses them, which Nifty and Collette know—so they maneuver to draw the pair out.\n\nNifty faces off against a tall Repo man, whose thickly layered pink muscles are covered in a custom-fit suit of microfiber-mesh armor. He throws the graceful punches of a highly trained boxer, and one blue-eyed flash tells Us The Native has equipped him with reflex-enhancing alloy boxing gloves. \n\nIn another blue flash, we glean that the equally athletic Repo woman squaring off against Collette is this man's girlfriend. They are Bianca and The Fist, streetwise vigilantes of Sorrel Fork's Repo slums and The Native's newest recruits. This makes perfect sense—The Native believes in demonstrating Repo excellence and militarizing its underappreciated talent. Bianca wears a matching black-armored bodysuit and moves with the skill of an expert martial artist, wielding a sword laced with some unknown technology.\n\nCollette is gifted with natural-born Replete agility and is a trained gymnast herself, but We can already tell she is physically outmatched in this fight. Our blind instinct is to protect Collette first, but We resist this primal urge and rely on our tactical experience instead. \n\n*page_break\n\n\"Nifty, We can handle this man, The Fist,\" We say into comms. \"Assist Collette. Her opponent Bianca has grade-A fighting skill and unknown weapon upgrades.\"\n\n\"Affirmative,\" Nifty responds. \"The Fist's rage is off the charts. Let's put it to good use.\"\nAs The Fist throws another expertly placed punch, Nifty ducks and tucks hir four-and-a-half-foot body into a tight ball. Ze tumbles forward under The Fist, hir rounded antlers rolling forward neatly and springing Nifty back to hir feet. Ze then twists and pulls the bio-blaster from hir hip-holster. \n\nAs we dash forward Ourself, We watch as Nifty activates hir empathetic abilities. The diamond-shaped jewels that adorn Nifty's forehead, floppy ears and sleek costume belt all glow the same maroon as hir skin, causing the diamond tip of hir blaster to glow, too. The Fist is momentarily distracted, no doubt feeling it as Nifty drains a drop of his rage and charges hir blaster with his excess emotion. Over the years We've seen Nifty convert all kinds of feelings into emotional bullets and blasts, weaponizing hir empathetic intuition. \n\nWe use this momentary distraction to move across the roof and charge The Fist. He reacts quickly and throws a defensive jab, but We are arguably the most diversely trained hand-to-hand combatant on Blende…\n\n*page_break\n\nNeedless to say, We see this coming.\n\nOne pivot and two well-placed strikes later, The Fist falls to the floor. Unfortunately, this happens just in time for Us to see Collette fall across the roof. She created two of her signature rip-shards—Collette can \"scratch\" the air and create energized crystal-daggers from the tears in reality. Bianca must have cornered Collette's acrobatics, so Collette struck with her shards—however, We can see now that Bianca's sword is modified to absorb energy attacks.\n\nHaving blocked Collette's stabs, Bianca's blade pulses with newly charged energy…which now slices through Collette's chest.\n\n*page_break\n\nWe nearly scream aloud, until We realize the damage is impermanent—clearly, these adversaries are not out to kill. This once again begs the question of their motives, but this thought is interrupted by another voice in Our ear:\n\n\"Retina, we need you,\" Kid Halo says.\n\n\"Go,\" Nifty adds. \"I've got Collette covered.\"\n\nIndeed, at the same moment, Nifty fires a rage-charged bullet into Bianca's back. The bullet dissipates on contact, supercharging Bianca with blind anger. She races at Nifty—which is perfect, because We can tell this anger will cloud Bianca's disciplined training. Knowing Nifty (superspy that ze is) will now have Bianca well in hand, and seeing Collette (resilient as they come) already climbing to her feet, We feel comfortable shifting Our focus to Kid Halo and Pearl.\nThough nothing much could prepare Us for what We see next…\n\n*page_break\n\nWhat We glimpse on the surface does not shock us, the fairly straightforward battle unfolding: Kid Halo circles in the air, lifted by the white-light halo bands around his wrists. From these bands, Kid Halo also fires concussive blasts down at Torque. These blasts hit her easily, for Torque is clearly an undisciplined fighter—but she's strong enough to brush off even the most direct hits. We are also not surprised to see Pearl backed into a corner, as Torque assaults her with thunderous punches. The punches reverberate against the yellow hard-light shield Pearl has spellcast around herself—so loudly, We cannot hear what either sister says.\n\nIt matters not, for We are too surprised by what Our blue-flashing eyes see under Torque's indestructible surface.\n\"Retina, I can't slow Torque down at all. And she obviously only has eyes for Pearl,\" Kid Halo speaks through comms. \"Can you get a read on any potential weaknesses?\"\n\nWe do read something, instantly. Torque's gemstone, much like Pearl's, clarifies her studied power and amplifies it. While Pearl had been an ambitious multi-disciplinarian jack-of-all-trades and master of none, Torque specialized in the purple-shaded arts. We can see purple has always meant much in Torque's own personal mythology: among Repos, purple-toned skin has been deemed less desirable than pink (perhaps because it was the unfortunately chosen color of the first social-welfare stamps). \n\nIt wasn't until Torque traveled abroad from Blende that she learned purple is actually used to signify royalty on many other planets. Deciding to reclaim her identity, Torque studied the purple-shaded arts surrounding psychic control, leadership, and destruction. Torque's amethyst gemstone then allows her to channel all her conviction into physical strength. So the more sure she is of herself, the stronger and more invulnerable she becomes. \n\n*page_break\n\nKid Halo likely paired himself with Pearl because they're the team's heaviest hitters and to match his experience with her inexperience, or to utilize Pearl's personal history with Torque. However, We understand now that none of us can defeat Torque in this state. The only thing that can truly weaken Torque is doubt, and We can see clearly she has the truth on her side.\n\n\"Kid Halo,\" We begin, unsure of how to vocalize what We've seen without inciting cataclysm. \"What Torque says about these violent officers…she is telling the truth. And she has proof.\"\n\nWe choose not to speak the final part aloud: that this proof makes Torque virtually unbeatable. Not just that—it perhaps makes her (and even her questionable colleagues) the heroes in this fight…\nAnd The Representatives the villains. \n\nDoubt suddenly pierces the rest of the team. For a moment, we all freeze in unison…and The Native smiles.\n\"Retina has glimpsed the truth,\" The Native shouts across the roof, even though he has been detained by Pocket and Luge. \"Our work here is done.\"\n\nWith these words, a new nano-drone detaches from The Native's tech-vest and reattaches itself to Pocket's chest. In the next instant, Pocket's faceplate pixelates involuntarily and his body surges with green energy. Four portals suddenly open underneath each of our foes and they all drop down inside. One second later, the portals disappear and they are gone.\n\n*page_break\n\nThe nano-drone then falls limply off Pocket, whose faceplate and body-lights go dark. Creating that many portals, going who-knows-how far, has obviously drained his batteries. Pocket's body clangs down onto the roof…but, thank the universe above, his faceplate projects his standard reboot status bar.\n\nIt will be minutes before Pocket recharges. But even if he is able to track where Torque and The Native teleported, they might be practically anywhere else in Blende by the time we could follow.\n\n\"Representatives, time to regroup,\" Kid Halo says quietly, his eyes turning to see NewsBots—which film one last defeated image before spinning and flying off. \"I'm getting reports from mission control that a new manifesto video just got blasted publicly to every available stream. This one features The Native and…like I said, we'd better get back to the mansion.\"\n\nSuddenly The Native and Torque's intention for this encounter becomes crystal clear: they never meant to defeat us. Instead, they wanted to give The Representatives the chance to join their cause, then publicly shame us in our refusal—which would, of course, be the perfect moment to go public with their proof…and likely go viral, as a result.\n\nAnd by spending our prep time sorting through Pearl's secrets instead of debating our intentions, the team sped right into the trap.\n\n*page_break\n\nIt seems We were right to fear this mission might tear us apart from the inside out…especially since that happens to be The Native's specialty. \n\nThe Native actually had a hand in creating The Representatives, as our true original adversary. The team formed when a hostile invading race attempted to conquer Blende and cut us off from the rest of the Verses Galaxy beyond. It was The Native, formerly a high-ranking government official, who colluded with the would-be conquerors. He provided them with intelligence and access to security networks in exchange for the future establishment of an autonomous Repo nation on Blende. It was this, The Native's first near-successful attempt at global genocide, that made him infamous. \nSince then, his attempts to restore Repo dominance and destroy The Representatives have remained constant, as today's events have proven.\n\n\"Wow, is this what a hangover feels like?\" Pocket groans, one hand clutching the metal above his faceplate. \"I take back everything I ever said about you humans being weak and squishy.\"\n\n\"We're just happy you're awake,\" Kid Halo says, crouching beside Pocket. The Representatives have all returned to the chopper, on the way back to the mansion. \"Everything feeling okay?\"\n\n\"Still running a full diagnostic check, but there's no permanent damage so far,\" Pocket answers. \"I think our best frenemy just devised a way to hijack my system this one time. I'll have to write some protections against that cheap trick. And to answer your likely next question: no, I have no idea where they teleported themselves, because of the forced reboot.\"\n\n*page_break\n\nKid Halo sighs. \"At least The Native didn't try to kidnap you this time.\"\n\nThe Native has indeed always been obsessed with Pocket, since the Nagoll Rim (where Pocket's home planet, Binaria, is located) is the only solar system in the known galaxy to crack the creation of fully evolved android life. The Nagoll Rim is near impossible to reach, given the fortification of its naturally occurring black hole border, so Pocket is a rather rare being here in the central galactic quadrant. And The Native has been dying to crack the secrets of Pocket's consciousness ever since he joined The Representatives—to the tune of several abduction attempts.\n\n\"Trust me, if I believed in hell, it would look something like The Native's little workshop of horrors.\" Pocket shudders. \"Now, what did I miss?\"\n\nA heavy silence drops into the hull lounge then—we had been waiting until Pocket rebooted to watch Torque's newly public manifesto video. Pearl hugs her arms to her chest in the corner, looking particularly ashen. We can't help but feel somewhat bad for her—as far as first missions go, this one is rather overwhelming.\n\nThen again, we all reap what we sow. Pearl may have worked hard to get here, but she also cut the line to get ahead. \nAnd the universe never forgets.\n\n*page_break\n\n\"Let's get this over with,\" Kid Halo sighs, turning to the screen wall inside the hull lounge. Torque suddenly appears there, joined by The Native and his newest disposable disciples. \n\nThe first part of Torque's speech We know all too well, adapted from the last video she sent The Representatives directly. This new version then continues, expanding upon Torque's already-given mission statement:\n\n\"Despite popular opinion, we Repos still do not experience equal treatment on Blende. Commonly thought of as primitive and powerless, we have less access to jobs and opportunity. This history of subjugation has forced us to become scrappy and industrious—but these traits are somehow twisted publicly as inherently criminal and untrustworthy. As a result, we are targeted disproportionately by Blende's law enforcement and its Galactic Council collaborating officers. \n\n\"This brand of blatant discrimination can only be combatted over time, but what we will not stand for is excessive violence against our people—especially by those entrusted to protect us, and whose crimes go unpunished. Some might say answering violence with violence is not the answer, but to them I say this: the media continues to reinforce the narrative that Repos deserve unjust policing by our very natures, then simultaneously demands we turn the other cheek in our resistance.\n\n\"If a Replete's powers backfire or if they use their gifts selfishly, the media says Blende society failed them, or that mental illness plagued them. Such excuses don't extend to Repos: if we defend ourselves, protest, or circumvent the system in the same ways, we are perceived as born criminals, or rioters, or a threat to society. This way of forcing Repo submission ends today, with us. Civil disobedience has its place, but we believe when demanding change, stirring your survival instinct will be more effective than appealing to your consciences.\"\n\n*page_break\n\nAs Torque finishes speaking, her words shoot straight through us. We can tell it moves all of The Representatives similarly: Replete, Repo, alien, android and all. After all, the doctrine of intersectionality remains a pillar of The Representatives' charter: the notion that when multiple webs of discrimination oppress certain people, it is our responsibility to listen to the most marginalized voices and amplify them. For the inequality of anyone threatens the equality of everyone.\n\nWe might not be Repo Ourself, be We still believe it's Our responsibility to use our Replete privilege to spread awareness and affect change. As heroes, The Representatives all believe this. It is why we pushed to recruit Pearl—we believed having a Repo member would help us begin to address so many issues we were likely blind to…just like this one. Could Pearl's recruitment have been too little too late? Or did we simply recruit the wrong Repo member…one whose newfound power removes her from her own people?\n\nAnd once again, can We personally judge this matter clearly, given all We know of Pearl?\n\n\"I have long stood for demanding Repo justice,\" The Native says next, on-screen. \"When Torque came to me with her cause, I had to come out of hiding to help. You see, what humble Torque has not told you is that she is Zalo Bellamy, sister of The Representatives' Pearl Bellamy. Torque and Pearl left Blende together with one goal: gain enough power to return to Blende as Repo champions. Torque was gifted with a matching gemstone to Pearl's, but instead of returning home to sell out, Torque took more time abroad to hone her powers. Now that she is back, Torque stands ready to fight all of the injustices she could not before—and the injustices her sister and The Representatives are all too privileged to witness.\"\n\n*page_break\n\n\"Before leaving Blende, I was a local law enforcement officer,\" Torque picks back up. \"That's how I became aware of the massive cover-up of cases, including GCC officers using excessive force against Repo citizens. Before, I had no way to combat this injustice—but now I have the power to stop it. My first step was the attacks you've no doubt heard about, against the corrupt officers themselves. After these attacks—and thanks to The Native's technological gifts—we have been able to recover proof of these violations: body-cam footage that was previously and purposefully deleted.\"\n\nA compilation of these videos then begins to play, all first-person perspective views of officer after officer using shows of excessive force against Repo citizens. As We watch, any question of innocence vanishes—no living soul deserves to be treated with this…indignity. We then must resist the urge to turn and look away, as the final video plays. We keep Our eyes wide open, bearing witness to every horrific emotion as one last GCC officer uses his light-based weaponry to flash-fry a young Repo man to ashes.\n\nThe horror of this video, of all of them, is…unimaginable.\n\nUnbearable.\n\n*page_break\n\n\"Now that the officers have been served proportional justice, it is now our goal to expose all those involved in this Galactic Council cover-up,\" Torque concludes. \"And we have saved this final outright murderer for last. This officer still walks free on Blende—but with him, we plan to take a life for a life.\"\n\nAs the manifesto video ends, Our mind reels with reactions. Still, We know We must be the first to speak.\n\"We must clarify, before discussion opens,\" We begin. \"Most of what Torque said in this manifesto is historically accurate, at least according to Our vision. Torque excluded only two parts We can discern: after her long travels back to Blende, she found a way to contact The Native, who then used his signature smuggling technology to circumvent Pearl's mystic protections. And, of course, the fact that Pearl exiled Torque in the first place. The rest of what she said—including the validity of these recovered videos—is unfortunately true, in Our estimation.\"\n\n\"So why didn't they expose Pearl in this manifesto?\" Luge asks first. \n\n\"Easy,\" Collette answers. \"Torque either didn't tell The Native the whole truth, or she forced him not to expose Pearl. Her goal seems pretty clear here—stop injustice against Repos. If you ask me, all the high drama and PR machinations positively reeks of The Native.\"\n\n*page_break\n\n\"Yes, I surmise there was some compromise made,\" Nifty adds. \"My bet is that Torque would have released this reclaimed video proof from the start, likely to little media coverage. But it's just like The Native to draw in The Representatives blindly first with anonymous attacks, then make us look bad by releasing the proof afterwards—all to capture Blende's full attention.\"\n\n\"The Zalo I knew would have done anything to protect me,\" Pearl says next, her voice monotone as she stares into space. \"But when she became Torque, I thought…She was just so…Oh god, what have I done?\"\nLuge rushes to Pearl's side and hugs her. She clearly appreciates the gesture, but to Pearl's credit, she resists the urge to break down in tears. \n\n\"I'm so sorry,\" Pearl tries. \"If I had told you all the truth sooner, we might've been able to uncover The Native's involvement before he sucker punched us…\"\n\n*page_break\n\n\"We can sort that out later,\" Kid Halo interrupts. \"Right now, we need to figure out where we stand—fast. Because you can be sure our Galactic Council liaison will be making contact soon. And we will no doubt be asked to take action when it comes to this guilty officer, Torque, and The Native.\" \n\nGood. \n\nThis is exactly the conversation we should have had at the start. \n\nAnd it's exactly the conversation The Representatives need to have to find a way to make this right.\n*return\n\n\n*label repsiaplogfour\n\n\"I say we help Torque kill this last officer,\" Nifty begins. We are unsurprised by this reaction—Nifty is a former gun for hire, a spy who was forced into the profession out of necessity. On hir native planet Cuttara, Nifty was born to a minority population persecuted by a majority race of shapeshifters…and eventually exiled for hir efforts at rebellion. \"Then I say we kill The Native for his own crimes, while we're at it.\"\n\n\"While I appreciate your candor as always, Nifty, The Representatives obviously do not apply unnecessary lethal force,\" Kid Halo answers. \"If I may guide the discussion though, first I think we should discuss Torque's mental state, since it seems to have shifted from Pearl's initial estimation?\"\n\n\"Yes. Well, Torque was angry, that's for sure…but she has good reason to be,\" Pearl says next. \"Maybe she has learned to master her anger and channel it with more control?\"\n\n\"She has done so,\" We add. \"We have seen it. Torque's gemstone channels her anger directly into physical strength—the more assured she is of her convictions, the stronger she becomes. This indeed requires remarkable control. We believe Torque's mental state is clear.\" \n\n*page_break\n\nWe stop Ourself then, before We say what We'd like to add next: if Torque's mental state ever required questioning in the first place. Revealing this thought at this current juncture would prove…unproductive.\n\n\"In that case, my answer is clear,\" Pearl says, obviously trying to take similar command of herself. \"We follow Blende law, because it exists for a reason. We expose the Galactic Council cover-up, we arrest this guilty officer and The Native, and we bring Torque in to question her properly. Trust me, no one wants justice for Repos more than me. And no one wants to believe my sister has returned—really returned—more.\"\n\nThere it is, finally—Pearl the Hero, the one The Representatives thought we had recruited. We were wondering if she'd show up…and We suppose now the question remains: will she stick around?\n\n\"I might not be up for killing like my bestie Nifty here, but I've seen laws fail my people time and time again,\" Pocket says next. He and Nifty actually fled the Nagoll Rim together—Pocket's own \"Multinarian\" beliefs on consciousness (the radical thought that Binarian android sentience could somehow mimic the human notion of unique souls inhabiting bodies) got him exiled from his home planet. Nifty and Pocket left the Nagoll Rim as refugees, eventually becoming a spy-for-hire duo renowned the entire Verses Galaxy over, before joining The Representatives.\n\n*page_break\n\n\"Sadly, I don't think the Galactic Council can be trusted to do the right thing here. I think we'll have to bring this officer to justice with Torque, even if it means temporarily…\"\n\nPocket pauses, projecting the word gagging across his faceplate as he finishes speaking: \"Even if it means temporarily working alongside that Native booger, too.\"\n\n\"Well, for the record, I'm with Pearl,\" Luge speaks up. \"We're heroes, not vigilantes. We don't take justice into our own rogue hands. Using our own excessive force makes us no better than these disgusting officers, whether we're right or wrong. We can't solve the problem by becoming part of it.\"\n\n\"Okay, well, speaking temporarily as an equal member and not team leader,\" Kid Halo begins, curiously avoiding eye contact with Luge. \"I actually think Pocket has the right idea here. When common sense justice overrides the law, our responsibility as both heroes and citizens is to engage in civil disobedience.\"\n\n*page_break\n\n\"Well, I think you're all delusional,\" Collette scoffs. \"Our dear Nifty has the right idea, as usual. We should kill the corrupt bastards. Or at the very least, we should allow Torque to proceed unobstructed and award her a bloody medal of honor. Who knows, she might even hand us The Native too, when she's through with him.\"\n\nAfter Collette's startling offering, the hull lounge lapses back into silence. Which makes sense, because after hearing all these expressed opinions, the team is split evenly: Nifty and Collette, Kid Halo and Pocket, Pearl and Luge. Unsurprisingly, the entire team looks to Us next. And not just because Our own opinion will now become the tiebreaker—We are already accustomed to being seen as the team's voice of reason.\n\nBut before We can utter a word, the rumbling sound of a clamping mechanism penetrates the hull lounge. Another transport has docked to our chopper, but we all know exactly what that means: only one ship has the clearance to do so unannounced. Sure enough, in the next moment a beam of yellow light shines up through the floor hatch. The light then hardens into the shape of a humanoid woman: Captain Jayna Bright, our operating GCC liaison.\n\n\"Sorry to interrupt the party,\" Captain Jayna says. \"But you had to know the GC would send me right away. What a yellz-ugly mess, huh?\"\n\n*page_break\n\nCaptain Jayna tries to laugh, but she knows there's nothing funny here. She was appointed GCC liaison last year, an honorable reassignment after her partner Cadet Gadget was (allegedly) Selected by planet Versus. Others have their doubts about the legends told of Versus, but the red-light teleportation signature is unmistakable. We've seen it Ourself: when two of The Representatives' own, Glorya and Superb, were Selected.\n\nThere's so much mystery surrounding Versus, the purgatory-like training grounds where the elite few are called to find their galactic purposes. The rare beings Reborn from this planet are sworn to secrecy, so most of the rumors relating to Versus are hearsay…\n\nPart of Our fascination with Versus is its seeming connection to Our own spiritual calling—though almost everyone relates the open-ended mystery of The Verses to their own beliefs. On a more practical level, it's astoundingly significant that so many Versians have been potentially summoned from such a localized area—it suggests greater galactic importance might be coming Our way, should Glorya, Superb, or Cadet Gadget ever be Reborn. We do hope all three (or at least one) will be…though really, most who are Selected by Versus never return.\n\nAt any rate, Captain Jayna, with her close-cropped luminescent hair and white microfiber GCC uniform, has earned the trust of The Representatives. Which makes what she has come here to say quite important.\n\n*page_break\n\n\"I'll get right to it,\" she continues. \"The GC is releasing a statement denying all of Torque's allegations, claiming these videos have been falsified. They're also placing the accused officer in protective custody. Officially, I'm under orders to request The Representatives protect this officer and arrest Torque's team. Unofficially, I'm here to tell you: screw that.\n\n\"I'm not from here, so the local politics don't mean much to me—but I know injustice when I see it. I'll support your team in whatever you decide, even if it costs me my badge. If this is what it stands for, then I don't want it anymore.\"\n\nEveryone stares at Captain Jayna in awed silence. As always, she remains a ray of light in what might otherwise seem like complete darkness.\n\n\"Okay, you can stop ogling me now,\" Captain Jayna adds. \"If you're so impressed, you can offer me a roster slot when I get fired for this. That is, assuming you're not all out of jobs soon enough, too. I have to warn you: this cover-up reaches shockingly high in the GCC's ranks.\" \n\n*page_break\n\n\"Well, this horrifying update aside, we were actually just in the middle of deciding what we stand for,\" Kid Halo answers. \"Thank you Captain Jayna, as always, for your support. So…what'll it be, Representatives?\" \n\nAs Kid Halo finishes speaking, all eyes in the hull lounge once again turn to Us. That is, all eyes except for Collette's…which remain trained on Pearl, filled with near-visible anger and passion.\n\nThe sight is…\n\nDifficult.\n\n*page_break\n\n\"Before locking in our strategy, might We recommend taking a small amount of time to process this new GC complication?\" We say, struggling to let Our emotions pass once again. \"We personally would like to consult the public crowd-thought on this matter before deciding a course of action.\"\n\nThe Representatives nod, as if Our suggestion for patience and rational thought sounds wise. If only they knew We are simply stalling…\n\nBecause if We remain the tiebreaker vote, We need to make this decision with a completely clear head. \n\nAnd right now all We can think of is wiping Pearl out of existence.\n\n*page_break\n\nSo, for the remainder of the trip back to the mansion, We will ask for the strength to decide what to do. We will ask for the clarity of conviction.\n\nAnd we only hope this silent prayer is heard by someone who cares…\n\nFor our decision could affect the lives of millions of souls.\n*return\n\n\n*label repsiaplogfive\n\nTo know what We really think—or how We really feel—about something, We know there is only one thing to do: reflect in silence. There are endless variations on such contemplative practices: prayer, journaling, meditation, services, even therapy. We try to utilize them all, but time is short, so We must take the most direct route.\n\nWe currently sit in the lofted attic of Torrington House, a space We long ago claimed as Our sanctuary. The room has next to nothing in it, save for some couches, candles, pens, and paper. We chose it years ago because this space was unused and removed, but also because it has spectacular views of the mansion's backyard gardens. We believe there is no better way to feel in sync than to be reminded of nature, to immerse oneself in its flow of life.\n\nSurveying the vibrant colors of this garden, We try to quiet Our churning thoughts. Indeed, We actually have a mantra for this task: GLOSS. It's an acronym for five steps proven to generate contentment—which people so often confuse with happiness. Happiness is built to be fleeting—a burst of emotion that is impossible to sustain. However, We've found it's possible to always find contentment, to access that calm center that resides in us all, even when suffering.\nWhich is fortunate, for right now We suffer greatly.\n\nWe begin these five steps with G: Gratitude. It would be quite easy to lose Ourself in Our feelings of jealousy and betrayal towards Collette's infidelity, or Our anger and disgust towards Pearl's actions, or Our outrage and helplessness towards Torque's cause. \n\n*page_break\n\nBut to gain perspective We must remember what We can instead be grateful for, starting with the very gift of being alive: Our current health and ability to draw breath. Then We remind Ourself We have a safe home and food to eat. Then, of course, We have friends We consider family, and We have a purpose. \n\nIt's so easy to take such simple things for granted, but none of these foundations are guaranteed. Focusing on them, We take a breath and feel the gratefulness flow from Our chest out into our body, like a calm wave washing away everything else. Only then are We able to process Our more complex gratitudes…\n\nThat yes, something between Collette and Us must obviously be broken, but we are both still capable of trying to repair it. That yes, Pearl might threaten much We hold dear, but We must always remember to be thankful for such challenges—they are life's way of showing Us what We must learn next. That yes, the battles We face are complicated and heavy, but We are still enabled to do the kind of heroic work We believe in.\n\nWe think of all we have to be grateful for and We try to focus on all the opportunity in front of Us, instead of the potential for loss. And in this space, We finally ask Ourself: How must The Representatives act when it comes to Torque? What must be done about the secrets Pearl still keeps? And how must We handle the delicate reality of Our wife's affair?\n\n*page_break\n\nTo find the answers, We try to focus not on Our own desires, but rather on the inner voice We've come to trust most. The voice that belongs both uniquely to Us and to everyone else at the same time. The one that ignores Our own ego and tells Us instead what the universe, the creator, the force, the flow would have us do. \n\nFor a moment We consider accessing Our groupthink power to boost this voice, but within the span of several breaths, We already process Our thoughts. And once We do, the answers settle in Our gut, the place where Our head meets Our heart. \n\nWe take another few beats to be once again thankful for this guidance, from whatever source it springs.\n\nAnd then We stand, because there's so much work to do.\n\n*page_break\n\nOn our way down from the attic, We remind Ourselves of the second letter in Our steps to contentment: Living in the moment. This seems simple enough, but it's one of the first things we humans forget to do. Only when we forget past pain and let go of future worry, only when we make peace with and are fully aware of the exact moment we are in, do we take another step closer to contentment.\n\nToday this step feels especially important, for the first challenge We must face is talking to Collette. Getting the affair out in the open will no doubt prove painful, but not as painful as continuing to suffer in silence—or contemplating all the potential reasons why Collette has stopped loving Us. And of course, whatever we decide as a couple, we can also sort out what to do about Pearl. \n\nTogether.\n\nThe way it should be.\n\n*page_break\n\nWe could access Our visionary power to locate Collette, but we both prefer I don't. Instead, We look for Collette in the most obvious place: the palatial walk-in closet attached to our master suite. Like Our own attic, this is the space Collette usually goes to process her thoughts, running her sharp fingers over the glossy patent leathers and precious jewels and delicate silks she has collected there. \n\nHowever, when We do not find Collette in her closet, Our stomach drops. For there is one other place We can think to look…and We dread finding her there. So We take one more deep breath before Our eyes flash blue, accessing Our individual surveillance vision. We do not focus this vision on Collette, however—instead, We focus Our vision once again on Pearl…\n\nAnd sadly, We find Collette standing in the corner of Pearl's half-unpacked bedroom suite. \n\nPearl herself sits on her bed, on a holo-call with two people We recognize as her parents. They are in tears—they must be just as stunned by their eldest daughter Torque's return. We know We should turn Our vision off, now that We know where Collette is—but in this light, We can see Pearl so clearly. Talking to her parents peels back so many of her outer layers, as it does for most of us—all of Pearl's rawest nerves are exposed for Us to see.\n\n*page_break\n\nPearl's purest desire, the one that burns the fuel driving her to become a hero, is to make her family proud—and to take care of them. It's why she sends her parents a deposit every month, so they can retire from their minimum-wage jobs and eventually move to a house in a better neighborhood. Pearl hangs all her self-worth on success as a hero—it's the magic bullet that's meant to solve all her problems, to make her happy, to make all the sacrifice worthwhile.\n\nSeeing Pearl laid bare this way, it reminds us of only one thing: a young Collette Scratch, when We first met her. \nThe similarities are…striking. \n\nAnd suddenly Our thoughts—once so centered—spiral back out of the moment. We were so sure, just minutes ago, that We had found all the answers. But what are We to do now?\n\n\"I'm finding your pain very distracting,\" a voice suddenly speaks behind us, from across Collette's master closet. \"We should talk.\"\n\nWe turn to find Nifty standing in the doorway, hir intense black eyes trained on Ours. \"Follow me.\"\n\n*page_break\n\n\"That's much better,\" Nifty says, settling in hir seat. \"There's far too much heightened emotion flying around today.\" \n\nWe sit next to Nifty, feeling equally calmed. We don't get to visit this room as much as We'd like, since it's Nifty's own private sanctuary. It's a space in the bunker basement level lined with a rare double-thick ore—and it's probably the only place in Sorrel Fork where Nifty can get some peace and quiet from hir empathetic senses. \n\nWe feel Our own sight temporarily dulled, silencing that background buzz We always experience, like a constant motion in Our peripheral vision.\n\nIt helps that Nifty has arranged this space like a museum, with an expert gallerist's eye for neoclassical Blende paintings. Nifty might not be native to Blende, but hir grasp on local culture surpasses most. We currently sit on a bench in front of an abstract painting made with a kind of luminescent dirt found in Blende's farming district, all pastel blobs and blurs.     \n\n*page_break\n\n\"The fact that I could sense your distress so clearly speaks to its strength,\" Nifty continues. \"That, or I'm just so unaccustomed to feeling anything from you, it hit me with a fresh whiff.\"\n\n\"Do you still experience emotion with hints of odor, after that mission on Resu?\"\n\n\"We don't have time for you to change the subject,\" Nifty answers. \"You're having a problem with Collette. What is it?\"\n\nWe immediately freeze. It's so easy to forget how violating a power set like Nifty's can be…or Ours, for that matter. We instantly wonder what else ze has intuited about Our situation.\n\n*page_break\n\n\"I'm sorry, you know how it is, I couldn't help sensing it,\" Nifty sighs. \"I don't know the details and honestly, I'd rather not. I came to you because The Reps need your head clear for this mission and I could tell it's definitely not. And I know you well enough to know you'd never talk about it unprompted.\"\n\nWe close Our eyes, because We feel emotion welling in Our chest. All the pain and fear finally surface, yes—but also a pulsing warmth. We can get so lost in Our own contemplative states sometimes, We forget how much we actually have in common with Nifty.\n\n\"So here I am. Prompting,\" Nifty adds, tapping hir foot with some measure of impatience. We nearly laugh—for a pair of empathetic seers, we don't like being vulnerable much, do we?\n\n\"Until two days ago, We were happy as ever with Collette, and We though that she was too,\" We begin, the words feeling difficult to form. \"Then We saw something We didn't want to see, and now…\n\n\"Now We fear We've lost Collette without even knowing it.\"\n\n*page_break\n\n\"Yes, that fear is quite…pungent,\" Nifty answers, turning to another painting We know she finds particularly soothing, of three gophers eating cake. \"Do you still love Collette?\"\n\n\"Yes, of course,\" We say.\n\n\"Why?\"\n\nThe question is impossible to answer. Or rather, to list the reasons we love Collette would take far longer than We have.\n\n\"I'll settle for your top three reasons,\" Nifty says, fighting an eye roll.\n\n*page_break\n\n\"Collette is a force of nature—she is blunt and passionate and brilliant,\" We begin. \"She is everything We are not, even though we both want the same things from life. She pushes Us, while We ground her. Together, we are…balanced.\"\n\n\"Good answers,\" Nifty says. \"But all balances eventually need recalibration. Retina, you are a wise man, perhaps the wisest I've known. And like me, you often understand things exactly as they are, in a world where most still remain blindfolded. That requires some degree of…separation. Removal. That can make us both seem…foreign. Or superior.\n\n\"It's clear you rely on Collette as a tether to your humanity. Where you are calm and rational, she is wild and unpredictable. But tell me, do you ever crave being the emotional one—the one who must be tamed?\"\n\nThe question strikes a nerve in Us so deep, We cannot speak. Instead, We simply nod, because being untamed is not a thought We have the luxury of actually entertaining—not if We want to remain particularly sane.\n\n*page_break\n\n\"Well, if I had to bet, Collette probably wants to feel like the wise and mature one every once in a while. And I'd venture she also wants to feel young and beautiful every so often…and Retina, you're many things, but you're not usually bursting with effusive compliments.\"\n\nIt's as if Nifty's words clears a fog in Our mind. They also feel quite like blunt punches to Our gut, but We are nonetheless thankful for each blow.\n\n\"You've evolved much as a spiritual teacher, but you're still human,\" Nifty continues. \"Emotions aren't always meant to be managed. And you'll never mature out of experiencing them—trust an expert on the subject. So my advice? \n\n\"Feel your feelings. And instead of sitting here with me waiting for the perfect uninterrupted moment to talk to Collette, go grab your wife and tell her how you feel. Surprise her. Be the messy one for a change. And she might just surprise you, too.\"\n\n*page_break\n\nTears well in Our eyes—We could kiss Nifty, this means so much to Us. For all Our wisdom, for all Our experience, for all Our calm reflection, sometimes there's simply no replacement for the frank words of a true friend. Suddenly We feel the next contentment step wash over us: Observe your thoughts, do not blindly obey them. It's often possible for Us to do this on Our own, but sometimes the only way to objectively observe one's thoughts is through the eyes of another.\n\nThis, We should know better than anyone.\n\nBut how easily we can forget…\n\nHow easily we can forget we humans all need one another, as inconvenient and risky and sloppy as that reality remains.\n\n*page_break\n\n\"If you try to hug me right now I will blast you with your own epiphany juices,\" Nifty says, sliding further down the bench away from Us. \"Seriously, you smell like a wet dog.\"\n\n\"Thank you, Nifty,\" We say, still smiling. \"We know Pocket has been your best friend for many years, but We—\"\n\n\"You Blendians and your bests,\" Nifty snaps. \"Where I'm from, we believe love doesn't divide, it multiplies. It's possible to have more than one best friend, Retina.\"\n\nWe smile a bit wider, registering the truth under Nifty's scolding tone. And We know We don't need to say a thing for Nifty to register Our complete and total agreement.\n\n\"Though it looks like your Collette talk will have to wait after all,\" Nifty says next, as both of our comms begin to ping. \"They found Torque.\"\n\n*page_break\n\nThe fourth step to contentment is perhaps the most essential: Service for others. As We are reminded today, everyone has pain—the human condition demands it. And sometimes the only way to ease your own suffering is to bear witness to another's and do what you can to remedy it. This is why We are comfortable delaying Our talk with Collette until after the mission—being of service to others always comes first. \n\nCome to think of it, if there was ever a universal definition of hero, this is perhaps it.\n\n\"Torque and The Native's team have just attacked the obviously-not-secure compound where the offending officer is being protected,\" Kid Halo begins, once again standing at the head of the mission control briefing room. \"We predict we have only a few more minutes before they break through the remaining defenses, so Pocket will teleport us directly in this time. But before we set our strategy, has anyone changed their votes?\"\n\nKid Halo surveys the room, but no hands raise—it seems the Galactic Council's infuriating denial of Torque's truth has not changed anyone's minds.\n\n*page_break\n\n\"Then Retina remains the deciding vote,\" Kid Halo continues. \"To review, Nifty and Collette want to let Torque proceed with her application of lethal force unobstructed. Pocket and I believe in arresting and detaining all those involved as a first step into investigating apparent GC corruption. Lastly, Pearl and Luge advocate for following the law and using the systems in place to expose any potential GC corruption.\n\n\"So Retina, what will The Representatives be doing?\"\n\nKid Halo finishes and We feel all eyes in the room turn to Us once again. This question returns Us to the foundational question We first posed in this Case Log: given the tools available to fix society's problems, does the hero protect and enable those more capable of employing the tools (as many Representatives, including Pearl, believe), or does the hero use the tools themselves (as many Representatives believe, alongside Torque)?\n\nAfter much consideration, We believe the answer—as it so often does—resides somewhere in the middle of these opposite ends.\n*return\n\n\n*label meetyoursquad \n*page_break\n\nShifting your focus, you return to your avatar-eye view-screen. \n\nThat's when you realize, here backstage, you're actually surrounded by other contestants. With your eyes adjusting to the dim lighting and trying to get your bearings in general, you didn't notice sooner. \n\nBut you also realize how easily you'll be able to dip out of the present in this simuconnection mode, toggling through informational readouts and pop-up windows.\n\nIn fact, more such information collates as a readout on this season's competition structure collates…\n\n*page_break\n\n[b]TRAINING GROUNDS: SEASON STRUCTURE[/b]\n\n[i]10 Pairs Enter Competition, Split into 2 Squads of 10[/i]\n*line_break\n[b]SQUAD ROUNDS:[/b] Squads Compete in Challenges. Winning Team Safe, Losing Team Votes Out 1 Pair\n*line_
