ait!\" shouts the Lady, freezing you all. The big python Loa emerges from the cauldron again and coils around her. \"The Loa Simbi wishes to warn you. Never run out of [b]Mojo[/b], or you'll be sorry!\"\n*fake_choice\n    #What's Mojo?\n    #As long as we've got rum, we won't fear anything!\n        *set Aristocrat %-10\n        The Lady laughs. \"Rum won't save you from this curse. But it will help you make it more bearable. I concede this.\"\n    #O powerful Lady, don't you realize we are already sorry?\n        *set Aristocrat %+10\n        \nThe Lady becomes serious. \"Mojo is the positive energy of life. The more you are successful, lucky, and performing, the more your Mojo increases. On the contrary, if you fail in your endeavors or bad luck strikes you, your Mojo decreases while the Curse becomes stronger. This also happens if you anger the Loa, of course. Since your destinies are intertwined, you all share the same Mojo. So beware: should you run out of your shared Mojo, the curse will strike you all down with full force. Nobody can fathom what would happen then, but I would avoid that if I were you.\"\n \nYou see everyone is frightened at the idea of being struck by the curse's full force.\n \n\"By the way…\" the Lady adds, \"…using Voodoo Magic in this condition will negatively affect your Mojo. The more often you use Voodoo Magic, the quicker your Mojo will drain up. You get it, [i]Laura?[/i]\"\n \nMama Zouzou nods.\n*page_break That's not good news.\n\n\"Perfect.\" Voodoo Lady kisses the python Loa. \"One last advice: since your destinies are intertwined, and you should fulfill this mission together, I would recommend you to become a [b]crew[/b] under the command of a worthy [b]captain[/b].\"\n \nYou reluctantly agree.\n \nThe Lady continues: \"The best captain would probably be the one who's got the highest Mojo or the one who contributed most offerings to the cauldron. Each one of you will vote: the one who gets the highest number of preferences will be the captain. Choose wisely, or you will never fulfill this ritual, and I won't be able to collect your money from the cauldron.\"\n \nEveryone looks puzzled. Who should you vote as your captain?\n*fake_choice\n    #I vote for Slash, the undead rocker.\n        *set Slash %+10\n        You are the first one to vote.\n         \n        \"I vote for Slash!\" you say. \"In this creepy adventure, I cannot imagine a better leader than an undead rocker.\"\n         \n        Slash looks at you and smiles, making the sign of the horns. He is flattered by your words.\n         \n        \"Wise choice!\" Voodoo Lady laughs. \"Let's see what the others say.\"\n    #I vote for Will Sparrow. He'll keep up the morale of the crew.\n        *set Will %+10\n        You are the first one to vote.\n         \n        \"I vote for Will!\" you say. \"He will be our beacon of fun in this ocean of sorrow.\"\n         \n        Will looks at you and smiles, gesticulating as usual. He is flattered by your words.\n         \n        \"Wise choice!\" Voodoo Lady laughs. \"Let's see what the others say.\"\n    #I vote for Mama Zouzou, the Voodoo witch. We need her guidance.\n        *set Mama %+10\n        You are the first one to vote.\n         \n        \"I vote for Mama Zouzou!\" you say. \"We need a Voodoo practitioner to guide us safely.\"\n         \n        Laura looks at you and grins a toothless smile. She is flattered by your words.\n         \n        \"Wise choice!\" Voodoo Lady laughs. \"Let's see what the others say.\"\n    #I vote for me! These landlubbers won't stand any chance by themselves.\n        *set Aristocrat %-10\n        \"Well, I vote for me!\" your words surprise even you. \"I am the one who contributed most to the ritual. Moreover, I feel a lot of Mojo inside me!\"\n         \n        You turn to the others and say: \"What are you waiting for, landlubbers? Waste no more time and vote for me!\"\n         \n        Voodoo Lady laughs. \"You got guts, $!{name}. Let's see what the others say.\"\n    #I vote for Sam, the Gorilla. We need a big and mean captain!\n        *set Sam %+10\n        You are the first one to vote.\n         \n        \"I vote for Sam!\" you say. \"We need a strong and fearsome leader!\"\n         \n        Sam looks at you and smiles, flexing his big gorilla biceps. He is flattered by your words.\n         \n        \"Wise choice!\" Voodoo Lady laughs. \"Let's see what the others say.\"\n        \nEverybody points their finger at you.\n \n\"Well, it's decided!\" Voodoo Lady says. \"Congratulations, $!{name}. You are now the captain of this motley crew. Guide them to success, or you'll drown together into Davy Jones' Locker.\"\n*page_break What a responsibility!\n\n\"Come here now!\" Voodoo Lady orders.\n \nYou all gather around the cauldron.\n \n\"O mighty Loa!\" the matron starts chanting \"We are now pausing this ritual to allow these unfortunate souls to find the missing ingredients. They now agree to share the same Mojo and to follow their captain to the end of the world if need arises. By the power of the Loa, you all now [b]swear this binding oath[/b] or be damned forever!\"\n \nYou suddenly fear for the consequences of swearing such an oath. Are you sure you want to tie your destiny to those of these strangers? Are you sure you want to be the captain of such a weird crew?\n*fake_choice\n    #I'd rather be forever damned than be the captain of this awful lot.\n        *set Mojo %-10\n        *set Aristocrat %+20\n        \"No way!\" you say \"I don't…\"\n         \n        Before you can end the phrase, visions of dozens of terrible deaths engulf your mind. The Loa are very angry at you!\n         \n        You immediately change your mind: better be the captain of this awful lot than die now of a horrible death.\n         \n        \"I don't… want to go to the end of the world!\" you say, catching your breath while the terrible visions fade away \"I just want to end this curse together!\"\n         \n        Everyone cheers and swears the oath after you.\n    #I just can't wait to have a crew! And a ship! Let's do this!\n        *set Mojo %+10\n        *set Aristocrat %-20\n        \"Of course I am in!\" you say \"Crew! Get ready to set sail! We are going to lift this curse lightning fast!\"\n         \n        Everyone cheers and swears the oath after you.\n    #I just cannot make up my mind!\n        Too many things happened too fast. You feel dazzled and confused.\n         \n        \"You know what they say…\" Voodoo Lady whispers \"Silence equals assent. Let's move onwards.\"\n         \n        Everyone swears the oath after you.\n        \n\"Very well.\" Lady Voodoo smiles, kissing the python Loa again. \"Now you're bond by a oath. Obey your captain, retrieve the missing ingredients and bring them here as soon as possible. This is the first time I cannot finish a ritual, and this unsettles me and the Loa.\"\n*page_break Sorry, Lady!\n\n\"We will be as fast as a pirate vessel chased by the navy!\" chuckles Will Sparrow.\n \n\"We won't disappoint you, Madam!\" utters Mama Zouzou.\n \n\"Well, you better!\" replies Voodoo Lady \"I sincerely can't wait for you to get back here soon, safe and sound.\"\n \n\"How sweet!\" Slash giggles \"You're caring for us as if we were [i]sweet children of yours[/i]\".\n \n\"No way, skeleton!\" the Lady replies bitterly \"I am rooting for you only because if you fail, the Loa won't allow me to collect [i]my[/i] money from the cauldron! So you'd better succeed and you'd better do it fast. I hate waiting!\"\n*page_break Understood.\n\n\"Listen, $!{name}!\" Voodoo Lady startles you \"Your grandfather Guy was a good friend of mine. For this reason, I'm going to give you some unrequested advice, unsettling as it might be.\"\n \n[i]Unrequested advice?[/i] You wonder. [i]What the…[/i]\n \n\"I can see you've been trapped until now into a life that you did not choose. Someone misguided you, turning you into a rich, spoiled kid. Or should I say [i]puppet[/i]?\"\n*fake_choice\n    #This is nonsense!\n    #You know nothing of me! I was happy with my former life!\n        *set Aristocrat %+10\n    #Tell me who misguided me, and I will make him walk the plank!\n        *set Aristocrat %-10\n\nVoodoo Lady continues: \"The Loa don't allow me to say more than this. Just listen to my advice: break free from your former life! Seize this chance to start a new, free one! You can be anything you want to be! Don't be limited by some useless stereotypes that do not belong to you. Look deep into yourself: you'll eventually discover the real you!\"\n*fake_choice\n    #Why not? Different body, different friends, different life!\n        *set Aristocrat %-10\n    #Thank you, but I'd rather not follow advices coming from [i]alleged friends[/i] of that [i]awful person[/i].\n        *set Aristocrat %+10\n    #Thank you for the advice. I'll think it over.\n\n*if ((ACON) and (hard >3))\n    *goto diff01\n*else\n    *goto nodiff\n\n*label diff01\n*if (hard >7)\n    *achieve hard02\n    *set deathmode true\n    *goto nodiff\n*else\n    *achieve hard01\n    *set hardmode true\n    *goto nodiff\n    \n*label nodiff\n\"It was fun talking with you.\" Voodoo Lady smiles while the huge python crawls back into the cauldron. \"Now, begone! I have more urgent matters to attend.\"\n \nThe Lady soundly claps her hands and suddenly you see the world spinning around.\n \nWhile your head aches and your vision blurs, you can't help but think about the Lady's final advice.\n \nWhat if she's right?\n \nWhat if you've been a puppet for all your life?\n \nBut more importantly…\n*finish Who is the [i]real me[/i]?", "03_scum_bar": "*comment *finish\n*set meeting true\n*image 03_hangover.png center Chapter three: the hangover\nThe world stops spinning.\n \nWhile your headache fades, you realize you're outside the swamp where the Voodoo Lady lives. Voodoo traveling could be the next breakthrough in the transportation industry.\n \nEverybody seems to be ok: Mama Zouzou complains about her backache, Slash counts his bones, Will gesticulates nervously while Sam collects his books with his huge gorilla hands.\n \nThe sun begins to set on the horizon.\n*page_break Everybody's here. Good.\n\nYou get on your feet, still wondering about Voodoo Lady's final advice. You can't help questioning yourself about your past, your choices and who you really are.\n \nFor the first time in your life, you think that [i]perhaps[/i] marrying Alfred and becoming a princess [i]could not[/i] be the best option for the [i]real you[/i].\n \nPerhaps, you could pursue a different goal in your life.\n \nWho are you? Who is the [i]real[/i] you? What do you really want?\n\n\"Ahem…\" Will interrupts your thoughts \"Sir? I mean, Ma'am? Sorry, Captain? Can I have your attention please?\"\n*page_break What's up?\n\n\"Ma'am… I mean, sir!\" Will is visibly awkward \"Since we are a crew now, we were wondering…\"\n \n\"Relax, Will!\" you say with a smile \"What's going on?\"\n \n\"Everyone here wants to know…\" the others crew members join Will \"What should we call ourselves.\"\n \n\"Let me see…\" you answer \"Since when using each other's name became old fashioned?\"\n \n\"No, sir…\" everyone laughs \"I mean, Captain. We thought choosing a new, cool name for our crew would boost everyone's morale.\"\n*page_break Good idea!\n\n\"Good idea, Will\" you say. Acting like a leader you address everyone: \"Fellow crew members! We have to choose a new name that reflects our awesomeness and instills fear in our enemies. Do you already have something on your mind?\"\n \n\"I say [i]Paradise Citizens[/i]!\" shouts Slash, playing his guitar. \"Cool and groovy!\"\n \n\"What about [i]Loavengers[/i]?\" proposes Mama Zouzou \"A Mojo injection!\"\n \nSam shows you his notepad. You read: [i]Odds Defiers[/i]. Not bad!\n \n\"And what about you, Will?\" you ask.\n \n\"Me?\" he giggles \"I'd say: [i]Salty Dandies[/i]. How do you like it, Ma'am?\"\n \nEveryone awaits your answer. What name will you choose for the crew?\n*choice\n    #I choose Paradise Citizens.\n        *set Slash %+10\n        *set Crew_Name \"Paradise Citizens\"\n        \"Our name will be Paradise Citizens!\" you shout, rising your hands up to the sky.\n         \n        Slash smiles and keeps playing his guitar.\n        *goto okcname\n    #I like Loavengers.\n        *set Mama %+10\n        *set Crew_Name \"Loavengers\"\n        \"Our name will be Loavengers!\" you shout, rising your hands up to the sky.\n         \n        Mama Zouzou smiles. \"The Loa will be happy\" she adds.\n        *goto okcname\n    #Odds Defiers sounds cool.\n        *set Sam %+10\n        *set Crew_Name \"Odds Defiers\"\n        \"Our name will be Odds Defiers!\" you shout, rising your hands up to the sky.\n         \n        Sam nods his gorilla head and adjusts his monocle.\n        *goto okcname\n    #Salty Dandies is just perfect.\n        *set Will %+10\n        *set Crew_Name \"Salty Dandies\"\n        \"Our name will be Salty Dandies!\" you shout, rising your hands up to the sky.\n         \n        \"Thank you Sir.\" Will bows before you\n        *goto okcname\n    #I just thought of a name that is perfect for all of us!\n        *label input_cname\n        \"Hear me out. Here's the name I thought\" you say.\n        *input_text Crew_Name\n        You want to call your crew \"The $!{Crew_Name}\", right?\n        *choice\n           #Yes.\n               *set Crew_Name \"$!{Crew_Name}\"\n               \"Our name will be $!{Crew_Name}!\" you shout, rising your hands up to the sky.\n                \n               Everyone cheers.\n               *goto okcname\n           #No, I just thought of a better name.\n               *goto input_cname\n*label okcname\nThe new name actually raised up everyone's morale. So far, you're doing a good job as a captain.\n\n\"Well my hearties\" you say \"Let's head to the Scum Bar. We've got a mission ahead of us.\"\n \n\"If I may, Ma'am\" Will steps forward, red-faced \"I'd like to solve an urgent, awkward issue before we proceed.\"\n \n\"Again?\" you ask, surprised \"What's bothering you this time?\"\n \nWill comes near to you and whispers in your ear: \"It's not just me. Everyone wishes to solve this delicate issue before we proceed. It's about you, sir.\"\n*page_break What's wrong with me?\n\n\"Nothing, sir…\" Will replies awkwardly \"There's absolutely nothing wrong with you.\"\n \nYou notice that everyone looks at you with a fake smile. The crew seems uncomfortable for some unknown reason.\n \nWill whispers in your ear: \"You know, Ma'am… I don't know how to say this…\" He's gesticulating more than usual and his face blushes. \"Ok, I'll get straight to the point. The crew wants to know [i]which is the right way to address you[/i], captain.\"\n \n\"I… understand your situation.\" you sigh. The awful curse weighing on you is difficult for you to understand, even more difficult for other people.\n \n\"Everyone of us wishes to avoid disrespect.\" Mama Zouzou steps forward \"But we don't know if you prefer to be called Sir, Ma'am o in another way. Please tell us the proper way to address you and we will go that way.\"\n \nSlash and Sam gather round. You see everyone feels relieved now.\n*page_break Thank you for asking!\n\n[i]Which is the right way to address me?[/i] Your new crew is gathered around you, waiting for your answer.\n \nYou take a moment to think about all that's happened so far. You have to admit that your life has changed in a significant way.\n \nWhy did this curse fall on you?\n \nDoes this body define who you are now?\n \nOne thing is sure: you are not the same person as you were before. Who is the real you now?\n \nStep by step, you'll have to find proper answers to all these questions. In the meantime, choose the way your crew members (and the whole world) will address your new self.\n*fake_choice\n    #You can call me Ma'am, Sir or Captain. Each one of them is appropriate.\n        *set Salutation \"Ma'am, Sir, Captain\"\n        \"You can call me Ma'am, Sir or Captain.\" you answer \"Each one of them is appropriate.\"\n    #I'd like to be called Ma'am or Captain.\n        *set Salutation \"Ma'am, Captain\"\n        \"I'd like to be called Ma'am or Captain.\" you answer.\n    #Sir or Captain is good.\n        *set Salutation \"Sir, Captain\"\n        \"Sir or Captain is good.\" you answer.\n    #No Sir nor Ma'am please. Just call me Captain.\n        *set Salutation \"Captain\"\n        \"No Sir nor Ma'am please.\" you answer \"Just call me Captain.\"\n \n\"Aye, Captain!\" shouts Slash, making a military salute.\n \n\"Yo ho ho!\" echo the other crew members.\n \n\"Tell me, Will\" you ask \"Got any more urgent matters to attend to?\"\n \n\"The only entry on our schedule is…\" Will replies \"…lifting a nasty curse, Captain!\"\n \n\"Well said, Will.\" you reply. \"Now, anyone here knows the way to this Scum Bar?\"\n \nSam raises his gorilla arm.\n \n\"Perfect.\" you say \"Show us the way, professor Rottentooth!\"\n \nThe elegant gorilla moves and you all follow him.\n*page_break Scum Bar, here we come!\nThe elegant gorilla guides you through marshes, forests and rocky cliffs.\n \nFinally, you arrive in sight of a town. Sam writes something on his notebook: [i]This is Scuffle Town. Scum Bar is in its middle[/i].\n \nYou lean over the cliff and look: Scuffle Town looks like a dangerous nest of salty dogs and scurvy pirates. The Scum Bar is nowhere to be seen.\n*fake_choice\n    #Follow me, let's find this bar.\n        Everyone nods.\n         \n    #Why did you stop, you lazy ape? Lead us to the Scum Bar at once!\n        *set Sam %-10\n        *set Aristocrat %+10\n        The huge gorilla closes his notebook and punches his chest defiantly.\n         \n    #Well done, Sam! You know, you could be a good navigator for the $!{Crew_Name}. What do you say?\n        *set Sam %+10\n        *set Aristocrat %-10\n        Sam smiles and blushes a little.\n         \n        \n\"Shiver me timbers!\" boasts an [b]unknown voice[/b].\n \nYou all turn around and see an elegant female pirate coming out from the bushes, unsheathing her sword. She's staring at you menacingly.\n \n\"You showed guts coming back, [i]Guy Brushwood[/i]\" she threatens you. \"My family has a score to settle with you, bilge sucker! Come on, face me in a Sword-Fight, and we'll settle this once and for all.\"\n \nOnce again, your grandfather's name pops out and brings problems.\n \nYour crew members look at you, puzzled.\n*fake_choice\n    #I am NOT the man you're looking for. Begone.\n        *set Aristocrat %+10\n        The lady cackles: \"I won't fall for such a cheap trick. I know your face very well, you son of a biscuit eater! Stop your pointless lying and face me!\"\n    #Lady, you don't stand a chance against the five $!{Crew_Name}. Run away, or die a horrible death!\n        *set Wit %-10\n        \"My father warned me against your lily-livered sattitude\" the lady replies \"But I didn't think you were SUCH a cowardly landlubber. Face me: just you and I.\"\n    #Who are you?\n        *set Wit %+10\n        \"Can't you tell?\" the lady asks \"I am Anne Longbrand, daughter of Sheldon Longbrand, a.k.a. [i]Smelly Shelly[/i]. Now, it's time to cross swords!\"\n \nThe lady seems determined to fight you no matter what. But the curse weighing on you leaves no time for distractions.\n \n\"Sorry, lady.\" you answer \"But we're in a hurry. No time to waste in [i]pointless swordplay[/i].\"\n \n\"You're not getting away, [i]Brushwood the Beardless[/i]!\" the lady threatens \"I will give you no quarter!\"\n \nMama Zouzou approaches you: \"Captain, remember the [b]Mojo[/b]! The Loa sent us this challenge: we should face it and triumph, or the curse will become stronger!\"\n*page_break Quite a nuisance!\n\nYou have no choice but to face this lady pirate somehow.\n \nSince you don't know how to handle a sword, the most comfortable option would be letting one of your crew members deal with her.\n \nMama Zouzou's magic would probably be the best option, but you remember that the Voodoo Lady warned you against abusing of Voodoo Powers.\n \n\nThen again, since the pirate lady challenged you to a duel, is letting your crew members dealing with her actually a good idea? Perhaps you should face this challenge one on one, although the chances of winning seem nearly inexistent.\n \nEveryone looks at you, waiting for your decision.\n*choice\n    #Mama Zouzou, show her how dangerous your Voodoo is!\n        *set Mama %+10\n        *set Wit %-10\n        *set Mojo -20\n        The old lady slowly steps forward to defend you from the pirate's attack.\n         \n        \"Running away, [i]beardless[/i]?\" the pirate lady mocks you \"I won't stop until I get my revenge!\"\n         \n        Mama Zouzou closes her eyes and recites in French: \"[i]Par le pouvoir du Loa, transforme sa chair en pierre![/i]\"\n         \n        Before everyone's eyes, the pirate lady's movements become slower and slower until she completely transforms into a stone statue. You can see that every crew member is terrified at such display of magical power.\n         \n        \"Worry not, $!{Crew_Name}\" adds Mama \"Tomorrow she'll be back to normal\".\n         \n        \"Good job, Mama!\" you say \"Thank you very much for your help. You are a very powerful sorceress indeed!\"\n         \n        \"My pleasure, Captain\" she answers, flattered.\n        *goto endsmelly\n    #Sam, crush her under your gorilla fists!\n        *set Sam %+10\n        *set Charm %-10\n        *set Mojo -10\n        The elegant gorilla stomps forward to defend you from the pirate's attack.\n         \n        \"Running away, [i]beardless[/i]?\" the pirate lady mocks you \"I won't stop until I get my reven…\"\n         \n        [b]SMASH![/b]\n         \n        Before the pirate could finish her line, Sam punches her so hard in the chest that she flies away in the bushes. Every member of the $!{Crew_Name} cheers.\n         \n        \"Good job, Sam!\" you say \"Thank you very much for your help. You are not only very smart, but very strong too!\"\n         \n        Sam blushes, flattered.\n        *goto endsmelly\n    #Slash, eat her brains!\n        *set Slash %+10\n        *set Wit %-10\n        *set Mojo -10\n        The undead rocker lunges forward to defend you from the pirate's attack.\n         \n        \"Running away, [i]beardless[/i]?\" the pirate lady mocks you \"I won't stop until I get my revenge!\"\n         \n        \"Come on, baby!\" Slash sings, showing his rotten face \"I am [i]dying[/i] to have dinner with you!\"\n         \n        When the pirate lady realizes that Slash is a zombie, she cries out in terror and flees.\n         \n        \"Good job, Slash!\" you say \"Thank you very much for your help. A kind heart beats into this rotten body.\"\n         \n        \"Let's rock, Captain!\" he answers, making the sign of the horns.\n        *goto endsmelly\n    #Will, please explain to the lady that we are in a hurry and we cannot comply to her requests!\n        *set Will %+10\n        *set Charm %+10\n        *set Mojo -10\n        \"Let me handle this, Captain!\" Will steps forward to defend you from the pirate's attack.\n         \n        \"Running away, [i]beardless[/i]?\" the pirate lady mocks you \"I won't stop until I get my revenge!\"\n         \n        \"Dear lady…\" Will says, gesticulating as usual \"My Captain understands your request, but alas we cannot comply with it right now. Urgent matters require our presence elsewhere, that's why…\"\n         \n        Will's gesticulations increase in speed and you don't understand any more of his words. You only feel that what he says is right.\n         \n        \"So, we have an agreement.\" Will finishes \"As soon as our businesses will be over, we will contact you and arrange a suitable place and time for the duel. Farewell, milady!\"\n         \n        The pirate lady seems very happy. She shakes her hand with Will, smiles and goes away giggling.\n         \n        \"Good job, Will!\" you say \"Thank you very much for your help. Your words are deadlier than a sword!\"\n         \n        \"My pleasure, Captain\" he answers, flattered.\n        *goto endsmelly\n    #I will face her in a duel. This is a personal matter!\n        *set Aristocrat %-10\n        You step boldly forward and unsheathe your sword.\n         \n        \"I am not running away\" you say, hoping to sound dangerous \"Let's settle this!\"\n         \n        The pirate lady wastes no time: she lunges forward and attacks. You barely dodge her sharp sword two times.\n         \n        The third time, your swords clash, and the lady shouts: \"[i]I got this scar on my face during a mighty struggle![/i]\"\n         \n        She pauses, catching her breath and waiting for your reply.\n         \n        You remember your grandfather telling you something about [b]Insult Sword Fighting[/b]. You never believed his words, but now they could save your life! Try to remember his teachings!\n        *fake_choice\n           #I'm rubber you're glue, your words bounce off me and stick to you.\n            *set Mojo -5\n            \"You're so cheap!\" the pirate lady replies.\n           #I'm glad to hear you attended your family reunion!\n            *set Mojo -5\n            \"You're so cheap!\" the pirate lady replies.\n           #And I've got a little TIP for you, get the POINT?\n            *set Mojo -5\n            \"You're so cheap!\" the pirate lady replies.\n           #I hope now you've learned to stop picking your nose.\n            *set Wit %+10\n            *set Mojo %+5\n            *set flawless +1\n            \"Damn!\" the pirate lady replies \"Your grandfather taught you well!\"\n           #I wanted to make sure you'd feel comfortable with me.\n            *set Mojo -5\n            \"You're so cheap!\" the pirate lady replies.\n         \n        The sword fight goes on. Under the silent eyes of your crew members, you somehow manage to avoid two thrusts and make a clumsy attempt to strike her. She finally rises her sword over her head but you easily avoid her blow.\n         \n        You feel your heart racing in your chest. Your opponent stops and says: \"[i]You're no match for my skills, you poor fool[/i].\"\n         \n        Again, she's insulting you. You never thought remembering your grandfather's ramblings could ever come this handy!\n        *fake_choice\n           #Look behind you! A three-headed monkey!\n             *set Mojo -5\n             \"Not enough, landlubber!\" the pirate lady replies.\n           #Too bad no one's ever heard of you at all.\n             *set Mojo -5\n             \"Not enough, landlubber!\" the pirate lady replies.\n           #I'd be in real trouble if you ever used them.\n             *set Wit %+10\n             *set Mojo %+5\n             *set flawless +1\n             \"Sink me!\" the pirate lady replies \"You do know how to fight!\"\n           #Oh, that is so cliché.\n             *set Mojo -5\n             \"Not enough, landlubber!\" the pirate lady replies.\n           #You're a disgrace to your species, you're so undignified!\n             *set Mojo -5\n             \"Not enough, landlubber!\" the pirate lady replies.\n         \n        The battle rages on. Neither of you wants to surrender.\n         \n        After avoiding some enemy lunges, you deal a lucky blow that is easily parried by the lady.\n         \n        Pushing you backwards, the pirate says: \"[i]Tell me, Beardless, would you like to be buried or cremated?[/i]\"\n         \n        Your crew members stare at you holding their breath. Everyone waits for your comeback.\n        *fake_choice\n           #With you around, I'd prefer to be fumigated.\n            *set Wit %+10\n            *set Mojo %+5\n            *set flawless +1\n            The pirate lady remains silent, struck by your witty comeback.\n           #With your breath, I'm sure everyone suffocated.\n            *set Mojo -5\n            \"You need more than this, bilge sucker!\" the pirate lady replies.\n           #Too bad they're all fabricated.\n            *set Mojo -5\n            \"You need more than this, bilge sucker!\" the pirate lady replies.\n           #Nothing can stop me from blowing you away!\n            *set Mojo -5\n            \"You need more than this, bilge sucker!\" the pirate lady replies.\n           #This is the end for you, you gutter crawling cur!\n            *set Mojo -5\n            \"You need more than this, bilge sucker!\" the pirate lady replies.   \n         \n        You see rage in the pirate lady's eyes. \"This is the end for you!\" she cries, rushing towards you for a final, powerful strike.\n         \n        *if ((ACON) and (flawless >2))\n            *achieve flaw01\n        Suddenly, she stumbles and falls head first on a stone, fainting. So much for her revenge.\n         \n        \"Well, the fight is over.\" you say, catching your breath. \"Let's waste no more time: we've got a mission to fulfill\". That was your very first sword fight: not bad at all!\n        *goto endsmelly\n        \n*label endsmelly\n \nYou realize that the lady [i]accidentally dropped[/i] a small purse with 15 Pieces O'Eight. You pick it up: never leave money unattended!\n \n*set Pieces_of_Eight +15\nYou all resume your journey following Sam towards Scuffle Town while some questions still haunt your mind.\n \nWhy was that lady so mad at your grandfather?\n \nMore importantly, will there ever be an end to [i]that person's[/i] countless misdeeds?\n*page_break Only time will tell.\n*if Mojo \u003c1\n    *goto_scene gold\n\nSam leads you into Scuffle Town: nothing more than a bunch of houses built haphazardly. Now that you can take a closer look, the only truly discernible place is a big club with a huge sign that reads 'Scum Bar'.\n \n\"Well, here we are!\" sings Slash. \"Welcome to the jungle!\"\n \n\"After you, Captain\" Will steps away to let you pass.\n \nEveryone can hear cries, laughter, and noises of all kind coming from the inside. You inhale deeply and…\n*page_break You open the door.\n\nAs soon as you open the door, you’re assaulted by the chaotic, noisy atmosphere. Through a thick blanket of smoke, you see dozens of barely distinguishable tables.\n \nYou see pirates of the worst kind everywhere: they play dice, compete in arm wrestling, indulge in nefarious activities, drink, burp loudly and have fun in every other conceivable way.\n \nIn the chaotic and noisy multitude, the only figure that stands out for its seraphic impassivity is the bartender. From behind the counter, he continually cleans mugs with spit and, with the eye of someone who knows a lot, checks that everything is under his control.\n*page_break What a mess!\n\nThe place is so noisy you can hardly hear what your crew members say.\n \n\"This is Paradise City indeed!\" Slash giggles. \"Let's have some fun!\"\n \n\"I hate noisy places!\" Mama Zouzou complains, \"Please, Captain, let me use my Voodoo Powers to shut their filthy mouths!\"\n \nYou have to admit old Laura has a point.\n*temp lauranomagic\n*set lauranomagic true\n*temp noarmw\n*set noarmw true\n*label orders\n\"Well, Captain,\" asks Will, \"What are your orders?\"\n*choice\n    *selectable_if (lauranomagic) #I need silence. Laura, please, do your magic.\n        *set lauranomagic false\n        *set Mama %+10\n        *set Mojo -10\n        The old crone closes her eyes and mutters: \"[i]Par le pouvoir du Papa Legba, plus aucune voix entendue ne sera[/i].\"\n         \n        Little by little, the messy voices become quieter. Laura's magic actually worked, attuning your ears in such a way that other people's shouting does not bother you anymore.\n         \n        \"Thank you, Laura!\" you say.\n         \n        The old lady smiles a toothless grin.\n        *page_break Enjoy the silence!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto orders\n    *selectable_if (noarmw) #Let's try the arm wrestling challenge!\n        *comment *set Slash %+10\n        You decide to let the crew have some fun, and you approach the arm wrestling table. After all, the more successful you are, the more your Mojo increases!\n         \n        Rules are elementary. [b]You need to bet 10 Pieces o'Eight to compete[/b]: if you win, you collect 50 coins, but if you lose, you collect only shame. Only one try, no refunds.\n         \n        \"That's not a game for me,\" old Laura says. \"As long as I am in this cursed situation, of course!\"\n        *choice\n            *selectable_if (Pieces_of_Eight >9) #$!{Crew_Name}, let's show these pirates who we are!\n             A beefy pirate just broke his opponent's arm and collects 10 coins.\n              \n             \"Who's going to lose his arm next against [i]Beefy Bill[/i]?\" he cackles, staring at all of you.\n             *choice\n                #Will, show him who we are.\n                    *set Will %+10\n                    *set Pieces_of_Eight -10\n                    *set Mojo -10\n                    *set noarmw false\n                    \"Who? Me?\" Will asks, surprised. \"But Captain, I am a spokesman, not a wrestler!\"\n                     \n                    \"I trust you!\" you reply, \"Show this scallywag who we are!\"\n                     \n                    Alas, Will is no match for Beefy Bill, who effortlessly wins and collects your money.\n                     \n                    Will is frustrated, but you smile and cheer him up.\n                    *page_break Enough with arm wrestling!\n                    *if Mojo \u003c1\n                        *goto_scene gold\n                    *else\n                        *goto orders\n                #Slash, I am counting on you.\n                    *set Slash %+20\n                    *set Pieces_of_Eight -10\n                    *set Mojo -10\n                    *set noarmw false\n                    \"Let's go!\" Slash says, galvanized, \"I'll show him the power of rock!\"\n                     \n                    Beefy Bill laughs: \"You don't even have a [i]proper[/i] arm! Come here and be crushed, muscle-man!\"\n                     \n                    Alas, Slash is no match for Beefy Bill, who effortlessly scatters his bones on the floor and collects your money.\n                     \n                    Slash is frustrated, but you smile and cheer him up, helping him collecting his arm bones.\n                    *page_break Enough with arm wrestling!\n                    *if Mojo \u003c1\n                        *goto_scene gold\n                    *else\n                        *goto orders\n                #Sam, crush him!\n                    *set Sam %+10\n                    *set Pieces_of_Eight +50\n                    *set Mojo %+10\n                    *set noarmw false\n                    The huge gorilla nods, takes his monocle away, and sits in front of Beefy Bill.\n                     \n                    Everyone falls silent. \"A worthy opponent at last!\" Bill says, \"Come on, gimme all you got!\"\n                     \n                    A few seconds after, Beefy Bill is on the floor while Sam collects his money and puts back his monocle on.\n                     \n                    Every single member of the $!{Crew_Name} cheers and shouts aloud Sam's name!\n                    *page_break Congratulations, Sam!\n                    *goto orders\n                #Here I come, Beefy Bill!\n                    *set Pieces_of_Eight -10\n                    *set Mojo -10\n                    *set noarmw false\n                    \"Who? You?\" Beefy Bill laughs, \"Come on, skinny boy, this is not a joke.\"\n                     \n                    \"You heard me, Beefy jerk!\" you reply boldly. \"Either wrestle me or leave the money and begone!\"\n                     \n                    A few seconds after, you're crying on the floor, defeated, while Bill collects your money.\n                     \n                    Sad and frustrated, you leave the arm wrestling competition while the $!{Crew_Name} tries to cheer you up.\n                    *page_break Enough with arm wrestling!\n                    *if Mojo \u003c1\n                        *goto_scene gold\n                    *else\n                        *goto orders\n            \n            #Let's do something else.\n                *goto orders        \n\n    #Let's ask the bartender.\n       You pass among the pirate motley crew and lean on the counter.\n       *label bar\n       The bartender looks at you suspiciously and asks: \"What ye be wantin', [i]stranger[/i]?\"\n       *choice\n           *disable_reuse #What do you serve in here?\n               The bartender cannot believe his own ears.\n                \n               \"We proudly brew [b]grog[/b].\" he answers. \"What else would a self-respecting pirate drink?\"\n                \n               \"Sorry for the silly question…\" you reply, embarrassed. \"But what's this [i]grog thing[/i]? Where I come from, nobody drinks it.\"\n                \n               \"I pity you, [i]landlubber[/i].\" the bartender replies. \"Grog is THE drink of salty seafarers. It is a secret mixture that contains one or more of the following: kerosene, propylene glycol, artificial sweeteners, sulphuric acid, rum, acetone, scum, axle grease, battery acid and/or pepperoni.\"\n                \n               [i]This is crazy![/i] you think, smiling to the bartender.\n               *page_break Drinking grog means suicide!\n               *goto bar\n           #I'd like to ask you some questions about the Caribbean islands...\n               The bartender looks at you even more suspiciously.\n                \n               \"I don't like to speak with strangers,\" he answers, spitting in the mug he's cleaning, \"Especially strangers who don't drink.\"\n                \n               Your crew members look at you: you gotta drink to loosen the bartender's tongue.\n               *page_break Quite a challenge!\n               *goto bar\n           #My throat is dry. Give me something to drink!\n               *goto drink\n           #I changed my mind. Let's do something else.\n               *goto orders\n*label drink\n\"Of course, [i]stranger[/i]!\" the bartender replies with a smile. \"Today we have three specialties! The first one is Bloody Mary: red, rich and reveling! The second is Blue Whale: azure, appetizing and aphrodisiac. Last but not least, Golden Apple: yellow, yeasty and yummy! Only today: only 1 Piece of Eight a mug!\"\n*choice\n    #I'll have Bloody Mary! I'm willing to drink something rich!\n        *goto grog\n    #Aphrodisiac? A mug of Blue Whale, please!\n        *goto grog\n    #A Golden Apple for me. Yummy!\n        *goto grog\n    #I changed my mind. No drinks for me now.\n        *goto bar\n\n*label grog\n*set Pieces_of_Eight -1\nThe bartender collects your money and goes to a big barrel.\n \n\"Here you go, [i]stranger[/i]!\" he smiles, handing you a mug full of a smoking, awful-smelling drink.\n \nYou look inside: the drink is so corrosive that it's eating the mug's bottom! You immediately decide not to drink this awful mix, but the bartender's inquisitive stare makes you think twice.\n \n*label grog2\nYou are in a fix: you don't want to drink this terrible liquid but you don't want the bartender to be upset.\n*choice\n    #I smile and drink the whole mug in one gulp, not to let the bartender down.\n        *set Mojo -5\n        \"Finally, some good booze!\" you say, under the inquisitive gaze of the bartender.\n         \n        While everyone looks at you, you swallow the awful smelling liquid. It burns your lips, your throat and your belly as if you actually drank hot lava.\n         \n        You put the mug down. You pant heavily, sweating and coughing. Before you can say a word, you pass out.\n         \n        When you come to your senses, you see the bartender's expression changed.\n         \n        \"You can't stand booze, you lily livered scum!\" he mocks you \"But I guess I can trust you from now on\".\n        *page_break Hiccup!\n        *if Mojo \u003c1\n           *goto_scene gold\n        *else\n           *goto bartalk\n    *if (Aristocrat \u003c50) #I distract the bartender and sneakily empty the mug on the floor.\n        \"Finally, some good booze!\" you say, under the inquisitive gaze of the bartender.\n         \n        While everyone looks at you, you suddenly shout, pointing your fingers: \"There, behind you! A three-headed monkey!\"\n         \n        Scared, the bartender turns around. You take advantage of this swift moment to empty your mug on the floor and start pretending you're drinking the liquor in one go.\n         \n        \"What are you babbling about?\" the bartender says, turning again towards you \"You start seeing things even before you drink?\" \n         \n        Ignoring his mockery, you slam the empty mug on the bar. The bartender looks into the mug and his expression changes. \"I see you are a trustworthy fella.\" he says \"How about another mug?\"\n        *page_break No thank you.\n        *goto bartalk\n    *if (Charm \u003c50) #I start a brawl before drinking, so I can empty the mug in the ensuing confusion.\n        *set Charm %-10\n        \"Finally, some good booze!\" you say, under the inquisitive gaze of the bartender.\n         \n        You suddenly turn to your left where another pirate sits and shout: \"I heard you! Say that again if you dare, scurvy dog!\"\n         \n        Before he can reply, you punch him directly in his face. A dozen pirates immediately start brawling, attracting the bartender's attention, who exits the bar to stop them.\n         \n        You immediately empty your mug and pretend you are drinking it in one go. Your crew members help the bartender calming the brawlers. \n         \n        \"People these days\" you slam the empty mug on the bar \"They don't know their place anymore.\" The bartender looks into the mug and his expression changes. \"I see you are a trustworthy fella.\" he says \"How about another mug?\"\n        *page_break No thank you.\n        *goto bartalk\n    *if (Wit >50) #I buy a drink to a crew member and while the bartender looks away I exchange my mug with the empty one of the passed out drunk next to me.\n        *set Pieces_of_Eight -1\n        \"Finally, some good booze!\" you say, under the inquisitive gaze of the bartender. Then you turn to members and say: \"My hearties, who wants to drink with me?\"\n         \n        While everyone looks terrified at the idea, Slash rises his skeletal hand. \"Another mug for my skinny friend!\" you say \"You're on me, of course!\"\n         \n        As soon as the bartender turns to fill the mug, you swiftly swap yours with the empty one of the drunk pirate on your right.\n         \n        \"To our future adventuring!\" you toast, pretending to drink from your empty mug. You are very happy to see that Slash drinks the grog as if it was water. He's an undead, and alcohol does not affect him at all. \n         \n        You slam the empty mug on the bar. The bartender looks into it and his expression changes. \"I see you are a trustworthy fella.\" he says \"How about another mug?\"\n        *page_break No thank you.\n        *goto bartalk\n    *disable_reuse #I pretend to drink but in fact I only wet my lips.\n        *set Mojo -5\n        \"Cheers!\" you say, under the inquisitive gaze of the bartender.\n         \n        While everyone looks at you, you pretend you're drinking the awful smelling liquid. It burns your lips: you don't want to know what would happen if you actually drank it!\n         \n        You put the mug down. With your best smile, you ask: \"Tell me sir, do you perhaps know…\"\n         \n        \"Cut it, [i]stranger[/i]!\" replies the bartender harshly \"Who do you think you are fooling? I said I don't speak to strangers who do not drink!\"\n         \n        Your plan ended in shame: you have to think of something else.\n        *page_break Damn!\n        *if Mojo \u003c1\n           *goto_scene gold\n        *else\n           *goto grog2\n*label bartalk\nThe bartender now looks at you with a friendly expression. \"They call me [i]Clean Cliff[/i].\" he says, \"How can I be of help?\"\n \n\"I am Captain $!{name} and this is my crew: the $!{Crew_Name}.\" you reply, trying to sound as cool as possible. \"We are looking for an island… An island shaped like a bird of prey.\"\n \n\"Surrounded by green water and blue-green algae!\" adds Mama Zouzou.\n \n\"With a volcano in it,\" finishes Will with his nervous gesticulations. \"Or something like that. A mountain from where earth's blood bubbles out. You know… That sorta thing.\"\n \nThe bartender remains silent. He spits in his mug and polishes it,\n*page_break Deep in his thoughts.\n\n\"What did you take me for, a travel agency?\" says Cliff, making everyone laugh. \"Sorry mate, never heard of such a place.\"\n \n\"Who should we ask?\" you insist. \"We really need to go there\".\n \n\"Well…\" Cliff resumes spitting in the mug \"If there's someone who does know every hidden corner of the Caribbean, that's ol' Malcomb!\"\n \n\"Awesome!\" Will exclaims, \"Where can we find him?\"\n \n\"Down there\" the bartender points out a crowded table \"When he's out of his crow's nest, that old salt indulges in his favorite sport: the grog drinking challenge!\"\n \n\"Perfect!\" you exclaim \"Thank you very much, Cliff!\"\n*page_break Malcomb, here we come!\n\nYou approach a table in the center of the room, around which dozens of shady characters yelling, betting, and giggling are crowded. Elbowing a little, you finally see a table where two beefy men are draining a mug of grog. Dozens of empty cups are placed in bulk on the table, around it and beneath it.\n \nThe two pirates drain the respective tankards and stare in each other’s eyes.\n \nSilence falls.\n*page_break Suspense\n\nSuddenly, one of them falls to the ground unconscious, and from the crowd rise shouts of approval and contempt.\n \nThe man left standing laughs: \"Yo ho ho! Any more challengers for the good old Malcomb?\"\n \nThat's the man you're looking for! Too bad he's too busy with his grog drinking challenge. He probably won't pay any attention to you until the contest is over. Judging from his [i]grog blossom[/i], he could go on forever. You can't wait that long.\n*fake_choice\n    #I've had enough of grog. I wait for the next challenger to show up.\n        *set Aristocrat %+10\n        You don't want to enter the competition, so you wait in silence.\n         \n        Someone will show up, eventually.\n         \n        \"Nobody has the guts?\" Malcomb asks, grinning, \"Ok, hearties, I will pick someone randomly…\"\n         \n        He closes his eyes, stretches his arm, and spins around three times.\n         \n        When he stops, his finger points directly at you. Everyone cheers and pushes you towards the table. You cannot back off now.\n    #I ask him about the island we're looking for.\n        *set Mojo -5\n        You step forward to ask him about the island.\n         \n        \"Look!\" Malcomb exclaims, \"We have a contender!\"\n         \n        Before you can explain the misunderstanding, everyone around you shouts and cheers you as the new challenger! This is NOT what you wanted, but you cannot back off now.\n         \n        *if Mojo \u003c1\n            *goto_scene gold\n    #Avast ye, Malcomb! The $!{Crew_Name} will now challenge you!\n        *set Aristocrat %-10\n        \"That's the spirit,\" Malcomb says. \"Come here and face your defeat.\"\n         \n        Everyone cheers as you step boldly onwards.\n \n\"So, what's your name?\" Malcolm asks while the bartender fills two mugs. \"There's [i]something[/i] about your face… Have we met before? Did we work on the same ship?\"\n \n[i]Another acquaintance of my grandfather, I see…[/i] you think.\n \n\"I don't think so.\" you reply, \"You are probably mistaking me for someone else. I am Captain $!{name}, and this is my crew: the $!{Crew_Name}.\"\n \n\"I will take you on one by one!\" Malcomb laughs, \"I don't fear no man nor crews!\"\n*page_break The crowd cheers Malcomb.\n\n\"Let's do this!\" Malcomb shouts \"Who will be the first one to challenge me? I won't go down: I'll kick your sorry asses one by one!\"\n \nWhile the pirate mob cheers Malcomb up, you quickly consider your options. You're the captain: according to the pirates' habits you should be the one facing him, or you'd lose reputation. Too bad you're not a grog drinker: Malcomb would easily win against you. And after all, do you really care about pirates' respect?\n \nProbably, one of your crew member would fare better against such a mighty drinker, but who?\n \n*label drinker\nChoose wisely: you'd better stop this competition as soon as possible so you can finally question Malcomb.\n*choice\n    *disable_reuse #Batten down the hatches, Malcomb! I'm going to challenge you personally!\n        *set Aristocrat %-10\n        *set Mojo -5\n        You sit in front of Malcomb, while the crowd boos at you.\n         \n        \"I am honored you decided to face me, captain!\" Malcomb says.\n         \n        \"Let's get this over with.\" you reply coldly \"we've got urgent matters to attend\".\n         \n        Cliff slams two tankards full of Bloody Mary in the middle of the table. The crowd suddenly falls silent.\n         \n        You both empty your mugs in one gulp and then stare each other's eyes.\n         \n        Suddenly, the world starts spinning around. You fall unconscious on the floor.\n         \n        When you wake up you feel dizzy and hear Malcomb shouting : \"And you call it a challenge? I hardly broke a sweat. Your drink is on me if you swear never to challenge me again. So, who's gonna challenge me next?\"\n        *page_break Damn!\n        *if Mojo \u003c1\n           *goto_scene gold\n        *else\n           *goto drinker\n    *disable_reuse #Mama Zouzou, we're in your hands now. Show him who's boss!\n        *set Mama %+10\n        *set Mojo -10\n        Laura slowly sits in front of Malcomb, while the crowd boos at her.\n         \n        \"Hey, grandma!\" Malcomb says. \"Run away, this is no competition for you!\"\n         \n        \"I'll make a toast to your health\" she replies \"[i]Ce n'est pas un bateau, transforme ce grog en eau![/i]\".\n         \n        She is using her Voodoo Magic to win the competition! That's bad for your Mojo, but it's too late to stop her now!\n         \n        The crowd suddenly falls silent.\n         \n        Laura and Malcomb empty their mugs in one gulp and then stare each other's eyes.\n         \n        Suddenly, Malcomb falls unconscious on the floor.\n         \n        \"Well done, Mama!\" you say, while your crew cheers. \"Remember!\" you shout to the motley crew \"You cannot beat the $!{Crew_Name}!\".\n        *page_break Time to celebrate!\n        *if Mojo \u003c1\n           *goto_scene gold\n        *else\n           *goto enddrink\n    *disable_reuse #Professor Rottentooth, it's time to teach this bilge sucker a lesson!\n        *set Sam %+10\n        Sam loudly sits in front of Malcomb, while the crowd boos at him.\n         \n        \"Are you kidding me?\" Malcomb mocks you. \"Is there no [i]human[/i] in your crew willing to face me?\"\n         \n        \"Are you scared?\" you reply \"If that's the case, you can forfeit any time.\"\n         \n        Malcomb shrugs. \"No problem, this one will be remembered as the very first ape to lose against me.\"\n         \n        The crowd suddenly falls silent.\n         \n        Sam and Malcomb empty their mugs in one gulp and then stare each other's eyes.\n         \n        Suddenly, Malcomb falls unconscious on the floor.\n         \n        \"Well done, Sam!\" you say, while your crew cheers. \"Remember!\" you shout to the motley crew \"You cannot beat the $!{Crew_Name}!\".\n        *page_break Time to celebrate!\n        *if Mojo \u003c1\n           *goto_scene gold\n        *else\n           *goto enddrink\n    *disable_reuse #Slash, you're on. Take this scum to paradise city!\n        *set Slash %+10\n        *set Mojo %+10\n        Matthew a.k.a. Slash sits in front of Malcomb, yelling: \"I feel like a locomotive! You're going down, Malcomb!\"\n         \n        \"Are you kidding me?\" Malcomb mocks him. \"A skinny guy like you has no chance against me. I can even count your bones!\"\n         \n        The crowd suddenly falls silent.\n         \n        Slash and Malcomb grab their mugs and start drinking. You clearly see the corrosive grog spilling through Slash's rotten ribcage. You chose wisely: Matthew won't be affected at all by that terrible alcoholic drink!\n         \n        After emptying five mugs in one gulp, the two contenders stare in each other's eyes.\n         \n        Suddenly, Malcomb falls unconscious on the floor.\n         \n        \"Well done, Slash!\" you say, while your crew cheers. \"Remember!\" you shout to the motley crew \"You cannot beat the $!{Crew_Name}!\".\n        *page_break Time to celebrate!\n        *if Mojo \u003c1\n           *goto_scene gold\n        *else\n           *goto enddrink\n    *disable_reuse #Will, I trust you. Show Malcomb we're not all talk.\n        *set Will %+10\n        *set Mojo -5\n        Will politely sits in front of Malcomb, while the crowd boos at him.\n         \n        \"Hey, landlubber!\" Malcomb says. \"Run away, this is no competition for you!\"\n         \n        \"I cannot disagree…\" he replies \"Why don't we prove our worth in a completely different way? For example…\"\n         \n        \"Shut up!\" Malcomb is upset \"This is drink or die!\"\n         \n        The crowd suddenly falls silent.\n         \n        Will and Malcomb empty their mugs in one gulp and then stare each other's eyes.\n         \n        Suddenly, Will falls unconscious on the floor.\n         \n        You all help him coming to his senses while you hear Malcomb shouting :\"And you call it a challenge? I hardly broke a sweat. Your drink is on me if you swear never to challenge me again. So, who's gonna challenge me next?\"\n        *page_break Damn!\n        *if Mojo \u003c1\n           *goto_scene gold\n        *else\n           *goto drinker\n\n*label enddrink\nThe pirate motley crew disperses.\n \nYou approach the unconscious Malcomb and help him coming back to his senses throwing a bucket of filthy water on his face.\n \nMalcomb curses and opens his eyes. Staggering, he stands up, but then he immediately sits on a stool.\n \n\"Well, Malcomb…\" you speak slowly, so he can understand you \"I need to ask you a question. We need to go to a certain island…\"\n \n\"Aye…\" he hiccups. His gaze is nearly absent. Perhaps he drank too much. Is he actually understanding what you're saying?\n*page_break Let's hope so.\n\n\"This island is shaped like a bird of prey.\" Slash says, starting to play his guitar.\n \n\"Aye…\" Malcomb hiccups.\n \n\"Surrounded by green water and blue-green algae!\" adds Mama Zouzou.\n \n\"Aye…\" Malcomb hiccups.\n \n\"With a volcano in it.\" finishes Will with his nervous gesticulations. \"To be precise: [i]A mountain from where earth's blood bubbles out[/i].\"\n \nMalcomb remains silent. His gaze seems lost. Cold sweat droplets run down his face. His poker face makes you wonder: is he actually deep in his thoughts or is he completely clueless?\n*fake_choice\n    #\"Malcomb, you look thirsty. Maybe some grog would help your memory?\"\n        *set Charm %+5\n        *set Wit %+5\n        \"I never say no to grog!\" he answers, accepting your offer. After another good mug of Blue Whale, his expression becomes vigilant again.\n    #I slap his face and shout: \"Speak, scallywag, or I'll keelhaul you!\"\n        *set Charm %-5\n        *set Wit %-5\n        \"Stop!\" he begs you \"Please, stop!\"\n         \n        \"Answer me, you filthy scum!\" you threaten him \"Our time is running out!\"\n \nMalcomb recaps: \"So, you all want to go to an island shaped like a bird of prey, right?\"\n \n\"Aye!\" your crew answers in unison.\n \n\"Green water and blue-green algae surround it, right?\"\n \n\"Aye!\" you reply, \"And don't forget the volcano!\"\n \n\"Got it!\" Malcomb says, \"Now listen to me carefully: I've seen and heard of thousands of islands, but only one perfectly fits this description…\"\n \nMalcomb looks around suspiciously.\n \n\"Go ahead!\" you say, \"Tell us this island's name!\". All your crew members gather round.\n \n\"The island's name is…\" Malcomb inhales deeply: \"[b]Donkey Island[/b]!\"\n*page_break [i]That[/i] Donkey Island?\n\nThe words '[i]Donkey Island[/i]' echo again and again in the suddenly silent bar.\n \nThose words bring back terrible memories: your grandfather Guy bragged countless times about his alleged adventures on that cursed island! He was so bothersome and annoying that you swore to yourself you would forget every single word he said.\n \nIrony of fate, recalling every single detail of those irritating moments could be very useful to you now! You strive to remember his obnoxious boasts, but alas, not a single hint emerges from the deep abyss of your memory. The only thing you remember about Donkey Island is that nobody dared to go there.\n \n\"Captain?\" Slash's voice brings you back to reality, \"Are you ok? Or are you knocking on heaven's doors? Would you like to hear one of my songs?\"\n*fake_choice\n    #How dare you interrupt my speculations? Know your place, swabbie, or else I will scatter your rotten bones on the main deck!\n        *set Slash %-10\n        *set Wit %-10\n        Slash looks down on the floor, ashamed. He did not expect such a harsh reply.\n         \n    #Thank you for asking, Matthew. I feel better now.\n        *set Slash %+10\n        *set Charm %+10\n        \"You remember my name, Captain!\" he exclaims happily.\n         \n        \"Of course!\" you reply \"I am one of your biggest fans!\"\n         \n        You see the undead rocker's rotten grin becoming somewhat sweeter.\n         \n    #Never mind me. I am ok.\n        Slash nods.\n         \nWhile the dreadful island's name still echoes in the bar, you see dozens of pirates flee away in panic, as if a fire had broken out inside. In no time at all, the Scum Bar is left almost empty.\n \n\"Blimey, Malcomb!\" shouts Cliff from the bar, spitting in the mug. \"Why on earth did you bring that cursed name up? You know it's bad luck!\"\n \n\"Sorry, Cliff\" Malcomb replies slowly \"Guess I am [i]three sheets to the wind[/i].\"\n \nSuddenly, he falls on the floor and starts snoring.\n*page_break Wake up, Malcomb!\n\n\"Wake up, Malcomb!\" you say, slapping his face repeatedly to no avail. He's profoundly asleep, and nothing seems to wake him up.\n \n\"I could use my magic.\" Laura says.\n \n\"I could play my guitar.\" Slash exclaims.\n \n\"[i]Grunt![/i]\" utters Sam, showing his mighty gorilla biceps.\n \n\"I could tell him a thing or two!\" murmurs Will.\n \nYou desperately need more info! Who's going to wake Malcomb?\n*fake_choice\n    #Slash, play your favorite solo!\n        *set Slash %+10\n        *set Wit %+10\n        \"Back off bitch!\" Slash cries, playing his guitar with his bony fingers.\n    #Sam, he's all yours!\n        *set Sam %+10\n        *set Charm %-10\n        The elegant gorilla lifts Malcomb up and deals a couple of mighty slaps on the pirate's sorry face.\n    #Spook him, Will!\n        *set Will %+10\n        *set Wit %-10\n        \"Can you hear me?\" Will screams, gesticulating as always, \"You filthy landlubber, son of a lily-livered scum-sucker! Wake up!\"\n    #Alas, only magic will work. We're in your hands, Mama!\n        *set Mama %+10\n        The old lady goes near the snoring pirate, holds her amulets in her hands and starts chanting: \"[i]À gauche ou à droite, réveille ce pira…[/i]\"\n \n\"You're wasting your time!\" shouts Cliff from the bar. \"When Malcomb's asleep, nothing in the world can ever wake him up, not even Voodoo Magic!\"\n \n\"But we need more info!\" you reply, desperate.\n \n\"You know what?\" Cliff looks around suspiciously. \"I don't completely hate you, so I'm gonna tell you a couple of things about [i]that island[/i]. Come here, before I change my mind!\"\n \nYou leave Malcomb alone and gather around Cliff's bar.\n*page_break We're all ears!\n\n\"[i]That island[/i]…\" Cliff spits in his mug \"Is a dreadful legend of the Caribbean. They say it hides an incredible treasure, but nobody ever found it.\"\n \n\"How do we get there?\" asks wrinkly face Laura.\n \n\"Are you crazy?\" Cliff laughs \"Nobody ever wants to go there! That island is full of traps, monsters and curses! That's why, in the past years, many pirates chose it as their secret hideout…\"\n \n\"Could you take us there?\" asks Will, nervous as always.\n \n\"No way!\" he answers, spitting again in the mug \"And believe me, nobody would ever take you there. No amount of booty will ever persuade an old salt to take you to [i]that island[/i].\"\n \nThe $!{Crew_Name} look at you: what are you going to say?\n*fake_choice\n    #Don't worry, me hearties! We'll go there on our own!\n        *set Aristocrat %-10\n    #We'll find a navigator and force him to bring us there! Violence always wins where booty fails!\n        *set Wit %-10\n        *set Charm %-10\n    #Cliff please help us! We desperately need to get there!\n        *set Aristocrat %+10\n        *set Charm %-10\n        \n\"I see you are persistent in your suicidal mission.\" Cliff says\".\n \n\"We have no choice\" you answer.\n \nCliff nods in understanding. \"If I were you, I'd get a ship, a crew and a nautical map. That's probably the only way to get there: on your own.\"\n \n\"Sounds like a plan!\" you exclaim, while you see your crew members cheering up again \"Where can I find a map?\"\n \n\"Let me see…\" Cliff scratches his head \"If I'm not mistaken, the only one who could eventually draw you a nautical map to that island is [b]Oliver the Cartographer[/b]. He claims to have traveled all the world, and is now putting every place he'd seen on paper.\"\n*page_break \"He's our man!\"\n\nCliff adds: \"The cartographer used to have his office in the green house you'll see on the left, exiting the bar. I hope he's still in business.\"\n \n\"Why?\" you ask \"What happened to him?\"\n \nThe bartender replies with a dreadful voice: \"A terrible curse fell on him, and sooner or later we will all follow suit.\"\n \nEveryone looks scared. \"What curse it is?\" you ask.\n \n\"Old age.\" replies Cliff, spitting in his mug. \"I hope the old salt is still alive. Haven't seen him in months!\"\n*page_break We'd better hurry!\n\n\"Thank you, Cliff!\" you say \"Off we go!\"\n \n\"Let's drink together again.\" he answers, waving his hand.\n \nYou're about to exit the almost empty bar, when suddenly Will's voice startles you.\n \n\"Captain!\" he shouts, gesticulating as usual, \"Look what I've found!\"\n \nYou turn and see he's reading an advertising poster on the wall, where you can clearly read: 'Come to the Bucatini Brothers circus!'\n*fake_choice\n    #Are you crazy? Why did you bother me with such childish nonsense?\n        *set Will %-10\n        *set Charm %-10\n    #Yeah. So what?\n    #Nice! What's so interesting about it?\n        *set Will %+10\n        *set Charm %+10\n\"Actually…\" Will replies frenetically \"I hate circuses, but hear this out: '[i]10,000 pieces o' eight prize for the brave[/i]'!\"\n \n\"Booty!\" shouts Slash \"Let's go there and get it!\"\n \n\"I agree!\" nods Mama Zouzou \"Sounds like easy money  the best crew in the Caribbean!\"\n        *if Mojo \u003c1\n            *goto_scene gold\n    #Weren't you listening? You tell me now where the mapmaker is, or else...\n        *set Will %+5\n        *set Charm %-5\n        \"Of course, Captain!\" Will replies, \"I'm sure you remember that Cliff told us to go left. Do I remember correctly, captain?\"\n         \n        You nod. \"Well done, me hearties! You DO were listening! I knew I have the best crew in the Caribbean!\"\n    #The only option left is going left!\n        *set Mojo %+5\n        *set Charm %+5\n        *set Wit %+5\n        Everybody laughs at your joke.\n         \n        \nYou go left, following Cliff's directions. As usual, the big Sam goes first, and you follow him in a single line. This time, you decide to be the last one in line. It would be best if you had some time to fully understand the many things that occurred so far.\n*page_break Quite a lot happened!\n\nYou look at your crew members: four perfect strangers suddenly became very close to you.\n \nYou sigh: you didn't ask for this.\n \nNo use in complaining: you gotta face reality and do your best to get along with them. If you stick together, you will probably succeed, and you will eventually lift this nasty curse.\n \nThen again, it will be tough to create strong bonds with every single one of them. Admit it: you don't [i]want[/i] to be everybody's friend!\n \nLet's start socializing with the crew member you like best. Or the one you dislike the least. This one will be a hard choice: who will you choose?\n*choice\n    *selectable_if (Mama >25) #I'd like to talk with Laura. I'm intrigued by Voodoo Magic!\n        *set Mama %+20\n        *set friend1 \"Mama\"\n        \"Hey, Laura!\" you call, \"Can I talk with you for a minute?\"\n         \n        The old crone turns toward you with a puzzled expression.\n         \n        \"Don't worry,\" you smile, \"I'm not mad at you. I just want to ask you a couple of things about Voodoo.\"\n         \n        She nods, waiting for you to catch up with her while the others precede you.\n         \n        *goto mamafriend\n    *selectable_if (Sam >25) #I'd like to become Sam's friend. He's so strong and knowledgeable!\n        *set Sam %+20\n        *set friend1 \"Sam\"\n        \"Hey, Sam!\" you call, \"Can I talk with you for a minute?\"\n         \n        The huge gorilla turns toward you with a puzzled expression.\n         \n        \"Don't worry,\" you smile, \"I'm not mad at you. I just want to know more about your books.\"\n         \n        He nods, waiting for you to catch up with him while the others precede you.\n         \n        *goto samfriend\n    *selectable_if (Slash >25) #This is a great chance to become my favorite band guitarist's best friend!\n        *set Slash %+20\n        *set friend1 \"Slash\"\n        \"Hey, Matthew!\" you call, \"Can I talk with you for a minute?\"\n         \n        The undead rocker turns toward you with a puzzled expression.\n         \n        \"Don't worry,\" you smile, \"I'm not mad at you. I just want to know more about your musical career.\"\n         \n        He nods, waiting for you to catch up with him while the others precede you.\n         \n        *goto slashfriend\n    *selectable_if (Will >25) #I'd like to chitchat with Will. He's so funny and cute!\n        *set Will %+20\n        *set friend1 \"Will\"\n        \"Hey, Will!\" you call, \"Can I talk with you for a minute?\"\n         \n        The funny spokesman turns toward you with a puzzled expression.\n         \n        \"Don't worry,\" you smile. \"I'm not mad at you. I just want to ask your opinion about a personal matter.\"\n         \n        He nods nervously, waiting for you to catch up with him while the others precede you.\n         \n        *goto willfriend\n    #I don't trust them. I'd rather not socialize with anyone right now.\n        *set Charm %-5\n        You don't feel like talking to any one of them right now. You prefer to keep your distance and focus on the mission.\n         \n        *goto endfriend\n\n*label mamafriend\n\"What's the matter, captain?\" Mama Zouzou asks.\n \n\"Relax, Laura.\" you smile \"I just want to know you better. Since we met, I've felt a strong force binding us. I feel I can trust you and I'd like to know more about you.\"\n \nLaura shows you her decaying smile.\n \n\"I see you can feel its power, captain…\" Laura says.\n*page_break The power of Mojo!\n\n\"I know I probably shouldn't ask…\" you are a little shy \"But please tell me, Laura, how old are you?\"\n \n\"I feel like I'm two hundred years old now…\" she replies sadly \"But my actual age is twenty five.\"\n \nTwenty five! If you weren't cursed too, you would never believe her.\n \n\"I [i]was[/i] young, and beautiful…\" tears run down her wrinkly cheeks \"Before this terrible curse turned me into a crooked, filthy, ugly crone!\"\n \nYou instinctively hug her. She starts sobbing.\n \n\"I am doomed!\" she cries \"I'm old, ugly and slow. Help me, Captain! Don't leave me a worthless scum like me alone!\"\n \n\"I'd never do that!\" you answer, wiping her tears \"You are a vital part of our crew: our one and only Voodoo Mistress! See, you are very important for us, without you we'd be lost!\"\n \nLaura stops weeping and a wrinkled smile shines on her old face. \"[i]Merci, capitaine[/i]!\" she says \"I'm honored to be part of the $!{Crew_Name}.\"\n \n\"The honor's all mine!\" you reply \"By the way, Laura, I'd like to ask you a personal favor…\"\n \n\"My powers are at your disposal.\" She replies. \"What can I do for you?\"\n \n\"I am sure I can trust you…\" you say, suspiciously \"But I'm not sure if we can actually trust every single other member in our crew.\"\n*page_break What's your opinion?\n\nShe stops, wondering. \"Actually, they all look like good fellas to me.\" She answers. She then comes close to you and whispers in your ear: \"The only one I don't completely trust is the Gorilla. Why does he pretend he cannot speak? What if he suddenly smashes our brain in our sleep? Can you imagine what would happen if he decided to become the new captain? I don't feel safe when I'm near him.\"\n \nLaura's words strike you deeply. You never thought Sam could actually be a menace. But what if she's right? Can you actually trust Sam?\n*fake_choice\n    #I remain silent, wondering.\n    #You do have a point. Thank you for warning me, Laura. I will keep my guard up.\n        *set Sam %-20\n        *set suspect1 \"Sam\"\n    #No way! Sam is a good fella. I trust him.\n        *set Sam %+5\n\"Watch your back, captain!\" Laura says, starting walking again. \"It would break my heart if anything bad would happen to you.\" You remain silent, thinking about her words, then you rejoin the line.\n*goto endfriend\n\n*label samfriend\nThe giant gorilla approaches you with a concerned look. All other crew members continue looking for the cartographer's house.\n \n\"Relax, Sam.\" you smile, \"I just want to know you better. Since we met, I've felt a strong force binding us. I feel I can trust you, and I'd like to know more about you.\"\n \nThe gorilla smiles, adjusting his monocle. He then opens his notepad and starts writing.\n*page_break I'm so curious!\n\nYou ask Sam a lot of questions about his past and his curse. He writes on his notepad that ha can correctly understand what people say, but alas, he cannot speak any human language. He's fortunate that his big, clumsy gorilla fingers allow him to write, although in a fancy way. That's the only civilized way of communication that is left to him. He is very sorry because if he only could speak, he would be far more useful to the $!{Crew_Name}. He thinks of himself as a gentle and kind spirit, but his actual massive body scares everybody, and he cannot have a pleasant conversation anymore. A little tear goes down on his hairy cheek.\n \nYou instinctively hug him. He starts sobbing.\n \n\"I understand your situation,\" you say, patting him, \"But remember, even without your voice, you are very important for us. You are protecting us with your might, and you scare our enemies away. Remember: you can give any advice you want, just write it down, and I'll read it!\"\n \nSam stops weeping, and a smile shines on his hairy face.\n \n\"That's our Sam!\" you reply. \"By the way, I'd like to ask you a personal favor…\"\n \nThe gorilla nods: you see in his eyes that he agrees to lend his help.\n \n\"I am sure I can trust you…\" you say, suspiciously, \"But I'm not sure if we can actually trust every single other member in our crew.\"\n*page_break What's your opinion?\n\nSam scratches his head, then writes his thoughts on his notepad. You read that he believes most of the crew members are truly good fellas. The only one he doesn't completely trust is the [i]old witch[/i]. The Voodoo Lady told us she should not use her powers, but she's performing nasty rites nevertheless. Sam fears she's bad mojo, and she will attract misfortune on the crew. Finally, he admits he is afraid of sorcery, and he'd feel a lot safer if the witch left the group. What would happen if one of her unspeakable rites would fail?\n \nSam's considerations strike you deeply. You never thought Laura could actually be a menace. But what if he's right? Can you actually trust Laura and her hexes?\n*fake_choice\n    #I remain silent, wondering.\n    #You do have a point. Thank you for warning me, Sam. I will keep my guard up.\n        *set Mama %-20\n        *set suspect1 \"Mama\"\n    #No way! Laura is a good fella. I trust her.\n        *set Mama %+5\nSam writes a final note: [i]Watch your back, captain! It would break my heart if anything terrible happened to you.[/i] You remain silent, thinking about his words, then you rejoin the line.\n*goto endfriend\n\n*label slashfriend\n\"Wanna listen to my guitar, captain?\" Slash asks.\n \n\"Exactly!\" you smile. \"You know I am a big fan of yours. Since we met, I've felt a strong force binding us. I feel I can trust you, and I'd like to know more about you.\"\n \n\"Well, have a seat!\" Matthew says, playing the guitar with his bony fingers. \"The concert will start soon.\"\n*page_break It's showtime!\n\n\"I know I probably shouldn't ask…\" you are a little shy. \"But please tell me, Matthew, how does it feel to be… [i]immortal[/i]?\"\n \n\"You know…\" he replies sadly. \"At first, I thought it was a blast! I never got tired, I could jump from the roof and feel no pain, I could perform forever without stopping!\" An even bitterer tone kicks in. \"Alas, I realized too soon that immortality has a high price: [i]I can get no satisfaction[/i].\"\n \nYou suddenly realize missed a chance to keep your mouth shut.\n \n\"I cannot get a hangover…\" Slash stops playing. \"I cannot have sex, I feel an eternal hunger… I cannot even cry!\"\n \nYou instinctively hug his cold, bony body. You feel like hugging an ice statue.\n \n\"I had fame, money, and power…\" he continues. \"Wherever I went, everybody worshiped me. I could have started a revolution if I only wanted. Look at me now: I am nothing more than a useless scarecrow left to die indefinitely. Nobody listens to me anymore. If I only could, I would have committed suicide.\"\n*page_break Please, don't!\n\n\"Please, don't!\" you exclaim, looking straight into his empty eye sockets. \"You are a vital part of our crew: our one and only rockstar! Who cheered us up in dire straits? Who has crazy solutions for crazy problems? See, you are very important for us. Without you, we'd be lost!\"\n \nA spooky grin shines on Matthew's skull. \"Heaven can wait, captain!\" he says, \"I'm ready to go down the Highway to Hell together with the $!{Crew_Name}.\"\n \n\"That's what I wanted to hear!\" you reply. \"By the way, Slash, I'd like to ask you a personal favor…\"\n \n\"Name a song, and I'll sing it.\" He replies.\n \n\"Actually, it's not an [i]artistic[/i] favor…\" you say, suspiciously, \"I am sure I can trust you, but I'm not sure if we can actually trust every single other member in our crew.\"\n*page_break What's your opinion?\n\nSlash puts his guitar down. \"They all look like good fellas to me.\" he answers. He then comes close to you and whispers in your ear: \"The only one I don't completely trust is the spokesman. You know, living the rockstar way, I learned that all politicians are the same. They pretend they're your friends, but actually, they use you to achieve their own selfish, greedy goals. I would not trust him: I'm pretty sure he'll start a mutiny sooner or later to become the new leader of the $!{Crew_Name}.\"\n \nMatthew's words strike you deeply. You never thought Will could actually become a menace. But what if he's right? Can you actually trust Will?\n*fake_choice\n    #I remain silent, wondering.\n    #You do have a point. Thank you for warning me, Matthew. I will keep my guard up.\n        *set Will %-20\n        *set suspect1 \"Will\"\n    #No way! Will is a good fella. I trust him.\n        *set Will %+5\n\"Welcome to the jungle, captain!\" Slash says, starting walking again. \"Watch your back; it would break my heart if anything bad would happen to you.\" You remain silent, thinking about his words, then you rejoin the line.\n*goto endfriend\n\n*label willfriend\n\"How can I be of help, captain?\" Will asks.\n \n\"Come here, Will!\" you smile. \"Since we met, I loved your style. I feel a strong force binding us. You're a trustworthy man, and I'd like to know more about you.\"\n \n\"Wow, thank you so much, Captain!\" Matthew says, blushing. His gesticulations suddenly stop. \"I am so happy you appreciate my diplomatic skills.\"\n*page_break Of course I do!\n\n\"I know I probably shouldn't ask…\" you are a little shy. \"But please, Will, tell me more about your diplomatic career.\"\n \n\"Before this curse stroke me…\" he replies sadly. \"I was a very powerful and influential man. As Fluffy Island governor's attendant and bodyguard, my voice charmed the crowds, ttle, and in the darkness, you barely catch a glimpse of a young, red-haired girl wielding a dangerous-looking sword.\n \n\"State your business, fast!\" she threatens you. \"You'd better have a really good excuse to bother [i]Fiery Anna[/i], or I'll scatter your entrails on the floor.\"\n \n\"O, hello, Anna!\" you say, bowing. \"We did not expect to talk with such a refined lady. Are you Oliver the Cartographer by any chance?\"\n \n\"What are you, deaf?\" she replies, pointing your throat. \"I just told you my name is Anna: my granddad Oliver is sleeping now, so buzz off and come tomorrow at a decent time. And don't forget to bring money with you.\"\n*page_break What now?\n\n\"Who's there, Anna?\" you suddenly hear a different, low-pitched voice coming from behind her.\n \n\"Mr. Oliver the cartographer?\" you guess, \"We came all the way here to ask for your help.\"\n \n\"Shut up, scum!\" Anna shouts in your face, even more menacing. Then she turns back and says: \"Go back to bed, grandpa. These night stalkers will be back tomorrow. Loaded with money.\" She stares back at you and shouts: \"Did I make myself clear?\"\n \nYou rise up your hands and step back to avoid her piercing your throat.\n \n\"Cool down, Anna\" the voice is nearer now. \"There is something in these people that piqued my interest. A voice I've not heard for a long time…\"\n \nSuddenly, a little, white-haired old guy with a monocle emerges from the darkness behind Fiery Anna. \"Please, Anna, lower your sword.\" he gently asks \"Let me take a good look at this young fellow here.\"\n \nAt a very slow pace, he looks you up and down with his monocle. \"This old-school haircut…\" he mumbles \"The complete lack of beard… And this awful stench… Could it really be… Him?\"\n*page_break Please, not [i]him[/i] again!\n\n\"Blimey!\" the old man suddenly exclaims, \"I'll be damned if this man is not [b]Guy Brushwood[/b]! The worst braggart to ever sail the seven seas!\"\n \n\"What?\" Fiery Anna is puzzled. \"Yo
