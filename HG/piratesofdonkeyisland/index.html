ance.\n         \n        \"Go for it, Laura!\" you say, \"Let's hope the Loa won't be [i]too angered[/i].\"\n         \n        The Voodoo Witch pats her amulets and recites: \"[i]Une situation difficile vraiment, ramène-nous à ce moment![/i]\".\n         \n        The world starts spinning around all of you… When it stops, you find yourselves some minutes before, speaking with old Oliver.\n        *page_break Let's seize this chance!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto Olliemeeting\n*label talkollie\nFiery Anna unwillingly shows you the way into the office. After a few minutes, you all sit around a big wooden table, sipping good rum. You've never seen so many different maps in one single place! You see maps pinned on the walls, star maps painted on the ceiling and even nautical maps carved on the floor!\n \n\"Tell me, mate,\" Oliver addresses you \"How can I help you? If I'm not mistaken, you and your fancy crew did not come all the way here just to say hello to your old friend. Am I right?\"\n \n\"You're damn right!\" you reply \"We are desperately in need for your assistance. We need to go to…\"\n \nYou hesitate for a moment. You'd better be careful when pronouncing that name.\n \nYou lower your voice: \"…Donkey Island!\"\n*page_break Silence falls.\n\nOliver looks suddenly frightened: \"You want to go to Don… [i]that island[/i]? AGAIN? You're kidding me, aren't you?\"\n \n\"I am serious, Ollie.\" you reply sadly \"And I'm in a desperate hurry too. Please, draw me a map in memory of the good old times.\"\n \n\"That name brings back only bad memories!\" he starts to tremble \"That's a cursed place indeed. I'd never go back there, nobody will ever take you there and you'd better stay away from that troublesome land too.\"\n*fake_choice\n    #I wish I could avoid this cursed journey, but I cannot.\n        *set Wit %-10\n    #I got a score to settle. That's why I'm going back there!\n        *set Charm %-10\n hen they are all around you, you lower your voice and say: \"O.k., me hearties. We know the game is rigged, but we gotta win that ticket nevertheless. Let's play a couple of times to get some hints about how the trick works, and then we'll figure out a plan. Keep your eyes open, o.k..?\"\n \nSlash raises his skeletal hand; a doubt looms on his rotten skull. \"Captain, why don't we get the prizes the [i]old fashioned pirate way[/i]?\"\n \n\"He does have a point!\" Will whispers nervously, \"We are five fearsome pirates against a single wannabe dandy. Why waste our precious time? Let's seize the prizes by force and head straight back to Ollie's.\"\n \nLaura and Sam remain silent, wondering.\n \n\"Just say the word, Captain!\" Will's hand clasps the hilt of his sword.\n*fake_choice\n    #Let's do it the pirate way!\n        *set Aristocrat %-20\n        *set Charm %-10\n        *set Wit %-10\n        *set Mojo -5\n    #Let me think it over a little more.\n    #Let's play it fair for now.\n        *set Wit %+5\n        *set Mojo %+5\n        \"Drop anchor, me hearties,\" you say. \"The whole thing smells fishy. If pirates like Ollie never hurt the Penguin for fifteen years, I'm sure there must be a good reason.\"\n         \n\n\"Silly me!\" the Penguin laughs, shaking his head. \"I forgot to introduce our jury! Come on, guys, greet our daring contestants!\"\n \nThe barred windows encircling the shady alley suddenly open. More than twenty dangerous-looking musketeers immediately level their rifles towards you from the now open windows.\n \nYou immediately raise your hands up.\n \n\"Easy, me hearties,\" the Penguin smiles. He snaps his fingers, and all the windows close again. You all breathe a sigh of relief.\n \nThe Penguin continues: \"There is no reason to be afraid as long as you to play fair and behave. We deal with pirate scum every day. That's why we need a severe jury to ensure nobody cheats. But I'm sure we're among gentlemen here, aren't we?\"\n*page_break Of course we are!\n*if Mojo \u003c1\n    *goto_scene gold\n\n\"Well, let's get started!\" the satin Penguin shouts. \"Which number will you choose? Remember: only one bet, only one number! Choose the right one and win the prize of your dreams!\"\n \nThe shiny, wooden wheel is divided into one hundred different sections, each one representing a number. \"So, me hearties,\" you say, \"Which number should we choose?\"\n \n\"Let's bet on the 89.\" Laura says, \"It represents old age.\"\n \n\"I say 55!\" sings Slash. \"The number of music!\"\n \nSam writes on his notepad: [i]72-the wonder[/i]. After you read it, you notice he becomes shy and red-faced. Wait a minute… Is this a hidden way Sam devised to tell you he likes you?\n \n\"I think 17 represents us best,\" sighs Will. \"Bad mojo!\"\n \nHearing all these numbers, you suddenly remember the one you used to love: 63 - the bride. My, how distant seem those times to you now! But let's go back to reality: which number will you choose?\n*fake_choice\n    #I guess Will is right. Let's bet on the 17.\n        *set Will %+10\n    #I choose 89. Old is gold.\n        *set Mama %+10\n    #63. I just can't stop thinking about it.\n        *set Aristocrat %+10\n    #Let's follow the professor's advice: 72!\n        *set Sam %+10\n    #I say 55. Music is always the answer.\n        *set Slash %+10\n\n\"You made your choice!\" the Penguin shouts \"One piece of Eight, please.\n \nYou hand him a single coin.\n*set Pieces_of_Eight -1\n \n\"We're all set!\" he giggles \"Let's spin the Wheel!\"\n \nThe Penguin goes near the Wheel and lowers a lever. With a funny music, the Wheel starts spinning. Everyone looks at the spinning object with great attention, trying to figure out how the contraption works. Will crosses his fingers, Slash tunes his guitar to the wheel's song, Sam writes some notes on paper while Laura kisses her amulets.\n\nThe wheel finally stops.\n*temp wheel1\n*rand wheel1 19 51\n*page_break The winning number is...\n\n\"[b]${wheel1}[/b]!\" the Penguin shouts. \"This time you didn't win, but I'm sure you'll have better luck next time! Play again! Don't miss this unique chance!\"\n \nYou thank the Penguin. Together with your crew, you move away from the Wheel far enough not to let the Penguin hear you.\n \n\"O.k. mates,\" you say, \"You all saw how that infernal machine works. I didn't see anything strange, nor could I ever fathom how to predict the winning number. Any ideas?\"\n\n\"I have a plan.\" Slash raises both skeletal arms. \"While the Wheel was spinning, I let my guitar resonate with the contraption's complex mechanisms. Now my guitar is perfectly attuned to the Wheel's spinning melody.\"\n \n\"So what?\" Will asks, annoyed.\n \n\"I turned my guitar into a remote controller!\" Matthew triumphantly exclaims. \"From now on, I can force the Wheel stop on the number I want!\"\n*page_break Sounds great!\n\n\"Slash, that's great!\" you exclaim, happy. \"Is there something we could do to help you?\"\n \n\"Well, actually…\" as he scratches his rotten head, his hair falls. \"I could use a singer to empower my guitar's resonance. That would increase the odds.\"\n \n\"Alas, I am a terrible singer.\" you say \"$!{Crew_Name}, who's going to help Slash with his plan?\"\n \n\"Here I am!\" Mama Zouzou volunteers. \"I always wanted to sing in a real rock group.\"\n*fake_choice\n    #What are we waiting for? Let's try this plan on the wheel!\n        *set Charm %-5\n        *set Wit %-5\n    #Any other ideas?\n        *set Charm %+5\n        *set Wit %+5\nSam raises his hairy, muscular gorilla arm.\n \n\"Tell us, professor.\" you say, \"Do you have a plan too?\".\n \nThe gorilla nods, showing you all his notepad. You get close and read:\n \n[i][b]f(i)=n(i)/∑(j)n(j)[/b][/i]\n \n\"What the heck does this mean?\" Slash asks, puzzled.\n \nSam writes that, thanks to his [i]Master's Degree in Statistics[/i] and his [i]Ph.D. in Non-Euclidean geometry[/i], he can now predict with good approximation the next winning number. He just needs a helper to speed up the tremendous amount of required calculations.\n \n\"I will gladly help,\" Will volunteers. \"I am lighting fast with my hands and arms,\" he chuckles \"I am sure I could speed up the reckoning.\"\n \n\"We know, we know!\" complains wrinkly Laura. \"Won't you stop aimlessly waving your arms for a moment, please? You're getting on my nerves!\"\n*page_break You all laugh.\n\n\"Come on, don't give up your chance to win!\" the Penguin shouts from afar. \"The Wheel is ready for another round. Seize Lady Luck! Now's the best moment to play!\"\n \n\"You all heard the man,\" you say, winking, \"Let's play again!\"\n \nEveryone follows you, and in no time, you're in front of the Penguin. You cannot help but think about the hidden musketeers above you: better not try anything that would upset them.\n \n\"Welcome again, my friends!\" the Penguin smiles. \"Which will be your lucky number this time?\"\n*choice\n    #I believe in Slash and Laura's plan. Music will lead us to victory!\n        *set Slash %+10\n        *set Mama %+10\n        *set Pieces_of_Eight -1\n        You give one Piece o'Eight to the Penguin. \"O.k. Matthew, Laura, we're in your hands now.\" you say, stepping back.\n         \n        Slash and Mama step forward and prepare their concert. The Penguin looks at you, puzzled. You nod, gesturing him not to worry.\n         \n        \"Ladies and gentlemen, musketeers and rats!\" Slash grins, \"I am Slash from the Guns n' Posers!\"\n         \n        He expects a cheering, but it doesn't arrive. \"Today,\" he continues, \"Together with my mate Laura we'll sing a classic song. It's title is [i]Spin the Wheel[/i], of the [i]Tears, Sweat and Blood[/i]! It's me, Laura and my guitar, so please, Mr. Penguin, put our bet on number three!\"\n         \n        \"Perfect.\" the Penguin smiles, \"Number three is all yours. Let's spin the wheel!\" The satin man lowers the lever, and the spinning gadget starts rotating at the sound of a silly, catchy tune.\n         \n        At the same time, the concert begins.\n        *page_break Let's hope it works!\n        \n        Slash and Laura start singing an old classic song.\n        \n        [i]What goes up must come down[/i]\n         \n        [i]Spinnin' wheel, got to go round[/i]\n         \n        [i]Talkin' 'bout your troubles, it's a cryin' sin[/i]\n         \n        [i]Ride a painted pony, let the spinnin' wheel spin[/i]\n        \n        [i]We got no money, we got no home[/i]\n         \n        [i]Spinnin' wheel, we're all alone[/i]\n         \n        [i]Our curse stings like a poisonous bee[/i]\n         \n        [i]Come on wheel, stop on number three![/i]\n        \n        Their music resonates in the narrow alley. Its echo seems to actually affect the wheel. It's turning becomes more and more regular, until it perfectly syncs with the song!\n         \n        Now the wheel is about to stop…\n        *page_break Fingers crossed!\n        *goto secondspin\n    #I trust the professor and his assistant Will. Math never fails.\n        *set Sam %+10\n        *set Will %+10\n        *set Pieces_of_Eight -1\n        You give one Piece o'Eight to the Penguin. \"Prof. Rottentooth, you decide.\" you say, stepping back.\n         \n        Sam steps forward and starts writing complex formulas on his notepad. He hands down a couple to Will, who quickly starts solving them. The Penguin looks at you, puzzled. You nod, gesturing him not to worry.\n         \n        Grunting and panting, Sam writes down line after line of complex math calculations.\n         \n        Will moves his arms at an incredible speed, solving all formulas in really no time. \n         \n        The Penguin is fascinated by the incredible display of mathematical knowledge. You feel proud to have such egg heads in your crew. After writing about fifteen pages of complex formulas, the two mathematicians stop, panting.\n         \n        Sam shows you the final result. You all rush around his notepad and read:\n         \n        [i]F_x[cos(2pik_0x)f(x)](k)][/i]\n         \n        [i]= int_(-infty)^inftyf(x)cos(2pik_0x)e^(-2piikx)dx[/i]\n         \n        [i]= 1/2int_(-infty)^inftyf(x)e^(2piik_0x)e^(-2piikx)dx+1/2int_(-infty)^inftyf(x)e^(-2piik_0x)e^(-2piikx)dx[/i]\n         \n        [i]= 1/2int_(-infty)^inftyf(x)e^(-2pii(k-k_0)x)dx+1/2int_(-infty)^inftyf(x)e^(-2pii(k+k_0)x)dx\t[/i]\n         \n        [i]= 1/2[F(k-k_0)+F(k+k_0)][/i]\n         \n        = [b]8,5[/b]\n         \n        \n        \"Well…\" you say, puzzled \"I see the result is… eight, right?\"\n         \n        \"Not exactly\" replies Will \"It could be either eight or nine. I say nine, but professor Sam prefers eight\".\n        *page_break What a dilemma!\n        \n        \"So, did you make up your mind?\" the Penguin asks.\n         \n        Everyone looks at you while Will and Sam argue on the final result.\n        *fake_choice\n            #I trust the professor. Let's bet on number 8.\n            #I believe in Will. Let's bet on number 9.\n        \"Perfect.\" the Penguin smiles, \"Let's spin the wheel!\" The satin man lowers the lever, and the spinning gadget starts rotating at the sound of a silly, catchy tune.\n         \n        Sam and Will continue arguing while the wheel turns. Now the wheel is about to stop…\n        *page_break Fingers crossed!\n        *goto secondspin\n    #I don't want to upset the musketeers. I bet on a number without trying any suspicious plan.\n        *set Mojo -5\n        *set Aristocrat %+10\n        *set Pieces_of_Eight -1\n        \"We are among gentlemen, aren't we?\" you smile while a cold shiver goes down your spine. \"Here's my money. Which number would you recommend, Mr. Penguin?\"\n         \n        Your crew members look at you, disappointed. \"But captain…\" Will sighs, \"Weren't we supposed to…\"\n         \n        \"Avast, me hearties!\" you say. \"Let's play this fair and square. I trust this man, and he trusts us. That's the gentlemen way, am I right?\"\n         \n        *if Mojo \u003c1\n            *goto_scene gold\n        The Penguin accepts your coin and smiles. \"Well said, captain! I didn't catch your name…\"\n         \n        \"I am…\" you hesitate, \"Captain ${Name} Brushwood, and this is my crew: the ${Crew_Name}.\"\n         \n        \"Brushwood…\" the Penguin wonders, \"You do remind me of someone…\"\n         \n        You sigh. He's probably referring to your pirate grandpa. If you only listened to his bragging more carefully, you probably would know more about this wheel.\n         \n        \"But let's stick to business.\" the showman continues. \"If I were you, I'd bet on number 5: that's the magic number representing you all!\"\n         \n        Everyone looks at you expectantly: which number will you bet on?\n        *fake_choice\n            #I follow the Penguin's advice and bet on number 5!\n                *set Mojo -5    \n            #I bet on me: number 1!\n                *set Aristocrat %-10\n            #I bet on number 6: that includes the Penguin too!\n                *set Aristocrat %+10\n        \"We're all set!\" the Penguin smiles. \"Let's spin the Wheel!\"\n         \n        The satin man lowers the lever, and the spinning gadget starts rotating at the sound of a silly, catchy tune.\n        *page_break Fingers crossed!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto secondspin\n\n*label secondspin\nEveryone is still holding his breath when the wheel finally stops.\n*rand wheel1 40 100\n \n\"The winning number is [b]${wheel1}[/b]!\" the Penguin shouts. \"I'm sorry you missed Lady Luck this time, but I'm sure you'll catch her next time! Let's do another round!\"\n\nEveryone looks disappointed. You really believed you could decrypt the Wheel's twisted secrets, but the Penguin still holds the upper hand. The Wheel and its secrets remain a mystery to all of you.\n \n\"Come on, why the long faces?\" the Penguin cheers you up. \"You're only one Piece of Eight away from winning! I feel it; next bet will grant you one of our incredible prizes!\"\n \nEveryone looks at you. Will you persevere in trying to find a way to win the cruise, even if that means wasting more money? Or would you stop this pointless waste of money instead, even if that means renouncing to win the prize?\n*fake_choice\n    #I've had enough! Let's get outta here!\n        *set Mojo -5\n        *if Mojo \u003c1\n            *goto_scene gold\n    #The ${Crew_Name} never retreat! Let's come up with another plan!\n        \nSuddenly, you hear a kid's voice: \"Long time no see, Penguin! How are you doing?\"\n \nYou turn around and see a little, joyful girl entering the dark alley. She wears a cute, pink dress and has blond ponytails.\n \n\"Oh, hello Candy!\" the Penguin waves at her. \"I am so happy you came to visit me.\"\n \n[i]This is quite odd[/i], you wonder. [i]What's a little girl like her doing all by herself in a dark, dangerous alley like this one at this time of the night?[/i]\n \n\"I didn't come for a simple visit.\" the little girl says, ignoring you as she passes through your crew. She stops right in front of the satin man and says: \"I came here to win!\"\n*page_break What an attitude!\n\nThe Penguin laughs. \"You are very welcome to try, Candy!\" he giggles. \"Alas, as you can see, these people came here before you. You have to wait for your turn patiently.\" The Penguin looks at you and winks: \"Am I right, captain?\"\n \nThe little girl snorts, disappointed. Then, with a studied expression of sorrow, she turns toward you and prays: \"Won't you please let me play now? Please, [i]mister captain[/i], let me play now! I'm just a little, innocent girl, and I am already late. I cannot wait too long, or my parents will scold me when I get back home!\"\n \nWill approaches you and whispers in your ear: \"It's a great chance to see the Wheel in action without paying money! Let her play, captain!\" The rest of the crew agrees with Will's plan.\n \n\"Please?\" the girl insists. \"Pretty pretty please?\"\n*fake_choice\n    #No way. We came here first! Wait for your turn!\n        *set Mojo -5\n        *set Wit %-20\n        *set Charm %-10\n        The girl starts crying and runs to the Penguin, in tears.\n         \n        \"Please, help me, Penguin!\" the girl sobs. \"That meanie wishes me ill. He wants my parents to scold me! Please, don't let this happen!\"\n         \n        You turn to your crew: you get only disappointed looks.\n         \n        \"Please, captain…\" the Penguin says, \"Let this girl play first. Or she will go on forever, and this will seriously hurt my business.\"\n        \"O.k., o.k.,\" you say, forcing a smile. \"Go on, Candy, have fun!\"\n        *if Mojo \u003c1\n            *goto_scene gold\n    #Go on and play. We root for you!\n        *set Aristocrat %+10\n        *set Charm %+10\n    #What do I get if I let you play now?\n        *set Aristocrat %-10\n        \"A smooch!\" the girl promptly replies, kissing your cheek. The little girl's boldness petrifies you.\n        \n\"Thank you very much!\" Candy says, bowing. Then she turns to the Penguin: \"Well, here's my coin. I want to bet on number 47.\"\n \n\"Number 47 is all yours!\" the Penguin replies. \"Let's spin the Wheel!\"\n \nThe satin man lowers the lever, and the spinning gadget starts rotating at the sound of the usual, catchy tune.\n       \nYou and your crew look at the machine expectantly, trying your best to figure out how it works.\n \nYou observe the girl: oddly enough, she doesn't look anxious. She seems bored instead, like someone who doesn't want to wait so long to get something that's already hers.\n*page_break That's really suspicious.\n\nThe Wheel stops, and silence suddenly falls in the alley.\n\n\"The winning number is… [b]47[/b]!\" exclaims the Penguin. \"Ladies and gentlemen, we have a winner!\"\n \nThe jaw of every single member of your crew drops in surprise. You still can't believe it yourself.\n \n\"So, what do you have today, Penguin?\" asks Candy, bored.\n \nThe satin man replies: \"Today's prizes are: a rich candy package, a wonderful [i]Banana Picker[/i] and a fabulous, top class, all-inclusive luxury suite on the Royal Princess cruise ship!\"\n \n\"I just cannot make up my mind…\" Candy replies, wondering. Then she turns to you and asks: \"What do you say? Which prize should I pick?\"\n*fake_choice\n    #I'd pick the luxury cruise! That's the best prize you could win today!\n        *set Aristocrat %-10\n        [i]If she gets the tickets[/i], you think, [i]we can easily snag them from her childish hands![/i]\n         \n        \"True.\" Candy replies, \"Too bad that my parents would enjoy the cruise, leaving me home alone. No way, I'll choose the candy bag instead!\"\n    #I'd go for the Banana Picker. Everyone loves bananas!\n        [i]Better let her choose something useless[/i], you think, [i]What's a Banana Picker anyway?[/i]\n         \n        \"True.\" Candy replies, \"But why should I pick bananas myself from a tree when I can just ask for them and break no sweat? No way, I'll choose the candy bag instead!\"\n    #Your name is Candy, right? The candy package suits you perfectly!\n        *set Mojo %+5\n        \"Why not?\" the girl wonders, \"My parents would never take me on a cruise, and I am too lazy to pick bananas myself. There's only one choice left: candies!\"\n        \n\"Here you go!\" the Penguin shouts. \"Nice choice, Candy! Our five-pound assortment bag includes butterscotch disks, chocolate mints, butter toffee, cinnamon disks, peppermints, spearmints, and strawberry filled hard candies! Enjoy!\"\n \n\"Thank you very much!\" Candy rejoices, chewing some candies. \"Is this the last package you got, or can I win one more? I'd like to surprise my little bro Gabriel.\"\n \n\"Worry not, Candy!\" the satin man replies triumphantly. \"We do have another candy bag. Just win again, and it's all yours!\n \n\"Perfect!\" the little girl exults. \"Wait for me. I'll be right back to win again!\". She starts walking toward the alley exit when she suddenly stops and turns to you: \"Please, don't choose the candy bag if you win, okay?\"\n*page_break Okay!\n\n\"Did you see that?\" Will gesticulates more nervously than usual, \"That kid won! I bet my sword that she knows the trick we are looking for!\"\n \n\"I agree.\" Mama Zouzou adds, \"She also knows the Penguin personally. No coincidence at all, if you ask me.\"\n \n\"What are we waiting for?\" Slash encourages you, \"Let's ask her about the Wheel!\"\n \n\"She's a sly and cunning girl,\" you reply. \"I don't think she will answer five perfect strangers' questions. And she probably has very [i]influential[/i] and [i]powerful[/i] friends: better not mess with them. Let's follow her instead and see if we can uncover her secret [i]without her knowing it[/i].\"\n \nSam nods in approval.\n \n\"Whatever happens,\" you add, \"I don't want you to harm or frighten her in any way. She's just a kid, and she deserves a happy, carefree childhood. Understood?\"\n \nYou suddenly realize you never had a [i]carefree[/i] childhood. You had to continually behave, improve your manners and etiquette to (hopefully!) marry a prince one day. And that girl reminds you of yourself, not too many years ago before strict discipline wiped out your spontaneity.\n \n\"Aye, captain!\" everybody answer.\n*page_break Let's follow her.\n\n\"Let's go after her\" you say, exiting the alley \"In a silent, stealthy way. Please, Sam, give it your best shot.\"\n \nSam nods and starts reducing the noise of his gorilla stomping.\n\nYou spot the girl entering a nearby alley. It doesn't look like a safe place for a kid to go, especially at this time of the night. Then again, Candy showed bravery and guts far beyond her apparent age.\n \nStill, that looks like a really careless move: anything could happen in a dark alley like that one in a pirate ridden town like this one.\n \nIf you were her age, would you enter such a run-down, dark alley alone at this time of the night?\n*fake_choice\n    #No way, that would be utterly dangerous even for the bravest kid.\n        *set Aristocrat %+5\n    #Daredevil was my second name before strict discipline erased it from my memory!\n        *set Aristocrat %-5\nYou all cautiously enter the dark alley, following the little kid.\n \nA strong scent of rum permeates the narrow street, lined on both sides with big barrels and crates. Moving silently, you see Candy reaching the far end of the alley where a big iron door lies, sporting a clear \"Keep out!\" sign.\n \n\"This is way suspicious,\" whispers Laura while filthy rats scuttle between your feet.\n \n\"I agree,\" you reply, lowering your voice. \"Let's get closer: I'm sure we're about to solve the mystery of the Wheel.\"\n\nCandy loudly knocks on the iron door.\n \nHidden behind a big rum barrel, you see a little metal hatch opening on the big door. An ominous voice asks: \"Who are you?\"\n \n\"Lagrange family!\" Candy answers, yawning. \"Can't you see my blond hair? Gimme the next winning number.\"\n*page_break Interesting\n\n\"Greetings, Candy!\" the ominous voice continues \"I'm gonna ask you the usual password.\"\n \n\"Yeah, I know.\" the kid replies, annoyed \"Let's keep it short. I'm sleepy.\"\n\nYou see a forearm protruding from the opened hatch in the big iron door. Its hand clearly shows only three fingers.\n \n\"If this is five…\" the voice says.\n \nThe hand now shows only one finger. \"How much is this?\" the voice asks.\n\n\"Three!\" Candy answers, yawning again.\n*page_break What does this mean?\n\n\"Perfect,\" the voice says. \"Here's the next winning number.\"\n \nThe nameless arm gives Candy a small piece of paper with a number written on it. It's too dark and small for you to read it.\n\nCandy reads the piece of paper and yawns again.\n \n\"I changed my mind…\" she says, with a sleepy voice \"Let me in, let's call this a day.\"\n \n\"As you wish!\" the voice answers. From behind the door you hear movement and bars lifting.\n \nThe door suddenly opens with a robust and squeaky noise. Candy slowly staggers inside, and the door closes again with very strong clangs.\n \nThe alley is silent again.\n\nSlowly, your crew members gather around you.\n \n\"So, that's where the winning numbers come from!\" Will whispers.\n \n\"I knew the Wheel was rigged.\" Laura spits on the ground.\n \n\"What do we do now, captain?\" asks Slash.\n*fake_choice\n    #We storm the place and kick everyone's ass. Nobody cheats the ${Crew_Name} and survives!\n        *set Charm %-10\n        *set Wit %-10\n        Sam immediately writes on his notepad that he doesn't think storming the place would be a good idea. According to him, if twenty riflemen guarded the Wheel, this place will be an even tougher nut to crack.\n         \n        \"Sam, you're right.\" you sadly admit, \"Let's focus on obtaining a winning number. Any ideas?\"\n        \n    #We devise a cunning plan to obtain the next winning number.\n        *set Wit %+5\nLaura starts: \"If we want to go the Candy way, one of us should knock at the door and undergo the [i]recognition[/i] test first and the [i]password riddle[/i] next.\"\n \n\"Easier said than done,\" you say. \"She's one of them, but we aren't.\"\n \n\"Yes, but we have a clue.\" Slash intervenes. \"She said Lagrange family trademark is blond hair. And you, captain, are blond-haired! The only one in our crew!\"\n \nSlash's words bring you back to reality. Your long, brown hair is gone: you're a blond [i]Guy[/i] now. Better deal with it. It could even come in handy.\n\n\"Okay, let's pretend for a moment that we pass the recognition test,\" you say, \"How the hell are we supposed to solve the password riddle?\"\n*page_break Silence is the answer.\n\n\"Professor Rottentooth,\" you ask, \"You're the most skilled among us when it comes to numbers and math-related problems. Did you perhaps devise a way to solve the password riddle?\"\n \nSam sadly shakes his head. He writes on his notepad that he needs to see the riddle in action at least five or six more times to solve it. So far, he can only guess that the final solution is either related to the [i]number of fingers the hand displays first[/i] or to the [i]value the voice says first[/i].\n\n\"The Candy way is a tough one!\" you sigh. \"Any other ideas?\"\n \n\"I could use my Voodoo Magic to charm the guardian behind the door,\" Laura says. \"But, Alas, this would surely drain our Mojo.\"\n \n\"Too bad.\" you remark, \"That would really help.\" You turn towards Slash and ask: \"Matthew, can't your music help us?\"\n \n\"I'd really like to.\" Slash replies, \"I'm ready to use my band's fame to juice them a winning ticket. To maximize the results, I'd need a manager. You know, no self-respecting rockstar knocks on people's door.\"\n \n\"I see.\" you say, \"Will, would you please play Slash's manager role? I couldn't think of a better one.\"\n \nEveryone looks at the nervous spokesman, who's obviously embarrassed.\n \n\"Okay,\" he replies mumbling. \"If that will help us lifting the curse, I'll do it.\"\n \n\"Thank you, Will,\" you say, \"Now get ready, ${Crew_Name}…\n*page_break It's showtime!\n\n*label irondoor\nYou gather your crew and evaluate your options in the dim-lit alley.\n \nWhat are your orders, captain?\n*choice\n    #Laura, we're counting on you. Get that winning ticket using your magic!\n        *set Mama %+10\n        *set Mojo -15\n        Laura slowly walks towards the door. Hidden behind a big crate, you watch her knocking gently on the iron door.\n         \n        The metal hatch opens, and the ominous voice asks: \"Who are you?\"\n         \n        Holding her amulets high, Mama Zouzou chants: \"[i]Ce que je veux n'est pas un secret, donnez-moi le gagnant billet.[/i]\"\n        \n        \"Lady Lagrange!\" the ominous voice says, \"Sorry, I didn't recognize you sooner. I am at your service. How can I please you?\"\n         \n        \"Glad to hear it.\" Laura replies, \"I'd like to know the next winning number of the Wheel of Fortune.\"\n        *page_break Fingers crossed!\n        \n        \"Right away, Mistress!\" A forearm holding a piece of paper in hand protrudes from the hatch. \"Here's the next winning number. Is there something more I can do for you?\"\n         \n        Laura accepts the paper. \"Thank you very much. That's all for now. Goodnight!\"\n         \n        \"Goodnight, Madam!\" says the voice before shutting the hatch.\n        \n        \"Here you are, captain!\" Laura smiles, giving the piece of paper to you.\n        *page_break Great work, Laura!\n        *if Mojo \u003c1\n           *goto_scene gold\n        *else\n           *goto getticket\n    *disable_reuse #Slash, Will, it's showtime! Use charm and music to bring us a winning ticket!\n        *set Slash %+5\n        *set Will %+5\n        *temp slashtour\n        *rand slashtour 1 10\n        Will straightens his jacket, and Slash plays his guitar while they approach the big iron door. Hidden behind a big crate, you watch Will knocking firmly on the iron door while Slash poses like a rockstar behind him.\n         \n        The metal hatch opens, and the ominous voice asks: \"Who are you?\"\n         \n        \"Good evening, mate!\" Will smiles, gesticulating as always, \"I am Pete Grand, and I have wonderful news for you. Only for tonight, Slash, the most famous guitarist of the Caribbean, is on tour here on this island. You will have the unique chance to greet, meet him for a minimal price. What are you waiting for? Come here and greet your idol!\"\n        *page_break Fingers crossed!\n        *if (slashtour \u003c7)\n            *goto noconcert\n        *else\n            *goto concert\n        *label noconcert\n        *set Mojo -5\n        \"Not interested!\" the voice replies, \"This is private property. Go away now, or else I call the riflemen.\"\n         \n        \"But sir…\" Will insists, \"This is truly a unique chance. Did you recognize our superstar? We could…\"\n         \n        \"Get lost!\" the nameless voice shouts, then slams the hatch shut.\n        \n        Will and Slash sadly return to you, blaming each other.\n        *page_break That's no good.\n        *if Mojo \u003c1\n           *goto_scene gold\n        *else\n           *goto irondoor\n        *label concert\n        \"[i]That[/i] Slash?\" the voice exclaims, excited \"Guns n' Posers guitarist? Oh, God! This is my lucky day!\"\n         \n        \"You said it, mate!\" Will exclaims, \"This is your chance! Are you ready to meet and greet your idol?\"\n         \n        \"Alas, I am on duty.\" the voice answers, \"I cannot leave my position here. And I cannot talk to you too long. But I'd love to have my eyepatch signed by the awesome Slash! Is this possible?\"\n        \n        \"Well, it depends…\" Will answers, \"Slash would love to win at least once at the Wheel of Fortune. He tried many times, but he always failed. He would love to sign your eyepatch in exchange for the next winning number. What do you say? Do we have a deal?\"\n        *page_break Come on, accept it!\n        \n        \"Of course!\" a forearm protrudes from the hatch, holding a black eyepatch in its hand. \"Here's my one and only eyepatch.\"\n         \n        Will picks it up and hands it to Slash. \"Give us the winning number, and the incredible Slash will sign the eyepatch. No number, no sign!\"\n         \n        The hand goes back and forth, this time holding a piece of paper that Will promptly snatches. He reads it and says: \"Okay, Slash, we have a deal!\"\n         \n        Slash signs the eyepatch that is promptly returned to the unknown doorman. \"Wow!\" he exclaims from behind the door. \"I'll never wash it!\"\n         \n        \"Goodbye, mate!\" Will and Slash take their leave while the hatch slams shut. They immediately give the piece of paper to you.\n        *page_break Great work, guys!\n        *goto getticket\n    #I have no choice but to try the Candy way. Sam, I hope you guessed right!\n        Inspiring deeply, you approach the big iron door. You feel every single eye of your crew members spying on you from the dark alley.\n         \n        You knock on the heavy door. The little metal hatch opens, and an ominous voice asks: \"Who are you?\"\n         \n        Suddenly, your mind is empty. [i]Come on![/i] you think [i]What was that family name again?[/i]\n        *choice\n            *disable_reuse #Lagrande family!\n                *goto fail\n            *disable_reuse #Lagambe family!\n                *goto fail\n            #Lagrange family!\n                *set puzzle +1\n                *goto 1riddle\n            *disable_reuse #Legrange family!\n                *goto fail\n            *disable_reuse #Lagrenga family!\n                *goto fail\n        *label fail\n        *set puzzle -1\n        *set Mojo -5\n        *set doorfail +1\n        \"Don't waste my time, scoundrel!\" the voice says, slamming the hatch shut.\n         \n        \"Ehi, come on!\" you insist. \"Listen to me!\"\n         \n        \"I said, get lost!\" the voice booms. \"Or else I call the riflemen!\"\n        \n        Disappointed, you go back to your crew.\n        *page_break Too bad!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *elseif doorfail >2\n            *goto_scene riflemen\n        *else\n            *goto irondoor\n        \n        *label 1riddle\n        \"You do have blond hair,\" the voice says suspiciously. \"Alas, I've never seen you before. Sorry, but I have to follow the special procedure and ask you the password three times. Is that okay with you?\"\n         \n        \"No problem.\" you reply, cursing in your mind, \"I am ready!\"\n\n        You see a forearm protruding from the opened hatch in the big iron door. Its hand clearly shows only four fingers.\n         \n        \"If this is one…\" the voice says.\n         \n        The hand now shows only two fingers. \"How much is this?\" the voice asks.\n        \n        [i]What did Sam say?[/i] You try to remember. [i]The solution should be somehow related either to the number of fingers the hand shows first or to the number the voice said first. But how?[/i]\n        \n        Your answer is…\n        *choice\n            *disable_reuse #One!\n                *goto fail\n            *disable_reuse #Two!\n                *goto fail\n            *disable_reuse #Three!\n                *goto fail\n            #Four!\n                *set puzzle +1\n                *goto 2riddle\n            *disable_reuse #Five!\n                *goto fail\n        \n        *label 2riddle\n        \"Good!\" the voice says, \"Next test.\"\n         \n        The forearm now widely opens the hand, showing you five fingers.\n         \n        \"If this is three…\" the voice says.\n         \n        The hand now shows only four fingers. \"How much is this?\" the voice asks.\n        \n        [i]Keep calm.[/i] You say to yourself. [i]I got this.[/i]\n        \n        Your answer is…\n        *choice\n            *disable_reuse #One!\n                *goto fail\n            *disable_reuse #Two!\n                *goto fail\n            *disable_reuse #Three!\n                *goto fail\n            *disable_reuse #Four!\n                *goto fail\n            *disable_reuse #Five!\n                *set puzzle +1\n                *goto 3riddle\n            \n        *label 3riddle\n        \"Exactly!\" the voice says, \"The last test.\"\n         \n        The hand shows you two fingers.\n         \n        \"If this is five…\" the voice says.\n         \n        The hand now opens, showing five fingers. \"How much is this?\" the voice asks.\n        \n        [i]Keep calm.[/i] You say to yourself. [i]I got this.[/i]\n        \n        Your answer is…\n        *choice\n            *disable_reuse #One!\n                *goto fail\n            #Two!\n                *set puzzle +1\n                *goto solution\n            *disable_reuse #Three!\n                *goto fail\n            *disable_reuse #Four!\n                *goto fail\n            *disable_reuse #Five!\n                *goto fail\n            \n*label solution\n*set Sam %+10\n*set Mojo %+5\n*if ((ACON) and (puzzle >3))\n    *achieve puzzle01\n\"Perfect!\" the voice says. \"You passed all the tests. What can I do for you, Mr. Lagrange?\"\n\nYou need some seconds to realize you actually did it! \"Ahem…\" you clear your voice, \"I'd like to know the Wheel of Fortune's next winning number.\"\n \n\"Of course!\" the voice answers. A forearm protrudes from the hatch and hands you a piece of paper with a number written on it.\n \nYou snatch the paper: \"Thank you very much. Goodnight!\"\n \n\"Goodnight, Sir!\" says the voice before shutting the hatch.\n\nYou run back to your crew with your heart pounding for the excitement. You immediately hug Sam: \"You were right!\" you say, \"Thanks to your calculations, we succeeded!\"\n \nSam smiles and lifts up a thumb.\n*page_break Perfect!\n\n*label getticket\nYou can't wait to see what the next winning number is.\n \nYou unfold the paper and read: [b]69[/b]!\n\n\"Will this work?\" asks Slash, dubious. \"What if they cheated on us, and this is not a winning number?\"\n \n\"There is only one way to know…\" you reply, winking.\n \n\"What are we waiting for?\" Laura hurries you, \"Another tooth fell out of my mouth: this curse is killing me!\"\n \n\"You know, I am [i]already[/i] dead.\" Slash replies, grinning. \"But I'm not complaining.\"\n*page_break Everybody giggles.\n\nMama Zouzou hints a toothless grin.\n\n\"Come on, ${Crew_name}\" you say, \"Let's head back at the Wheel before someone else wastes our magic moment.\"\n\nYou hurry out of the crates-lined alley. Slash exits last, singing an old shanty: \"No, woman, no cry…\"\n\n\"Won't you please stop teasing me?\" Laura mutters, with a fake upset expression, \"If only you weren't already dead, I'd poison you!\"\n\nEveryone can't help but laughing and singing along.\n*page_break No, woman, no cry!\n\nAs soon as you step into his alley, the Penguin shouts: \"Welcome back, mates! I knew you couldn't stay away from me for long. I feel this is your lucky moment! Come here, play and win!\"\n\nYou approach him and put a Piece of Eight into his hand.\n*set Pieces_of_Eight -1\n \n\"Way to go!\" the Penguin exclaims \"Which will be your lucky number this time?\"\n\nThere's [i]something[/i] in Penguin's behavior that doesn't convince you. He acts like [i]he knows[/i] what you just did, but he's not afraid of losing. What if the number you have is not the winning one? What if that's only a hint you should use to figure out a different, true winning number?\n \nToo many questions and too little time: will you believe the ticket? Which number will you bet on?\n*temp wnumber 0\n*fake_choice\n    #I believe in what the ticket says: 69!\n        *set wnumber 69\n        \"We bet on number 69!\" you say.\n         \n        Everyone nods.\n    #I reverse the figures' order: 96!\n        *set wnumber 96\n        \"We bet on number 96!\" you say.\n         \n        \"What?\" everyone exclaims \"Captain, weren't we supposed to…\"\n         \n        \"Believe me!\" you reply \"I know what I'm doing. I finally figured out the true meaning of that ticket!\"\n         \n        Shrugging, your crew members unwillingly comply with your decision.\n    #I add up the two figures: 6 + 9 = 15!\n        *set wnumber 15\n        \"We bet on number 15!\" you say.\n         \n        \"What?\" everyone exclaims \"Captain, weren't we supposed to…\"\n         \n        \"Believe in me!\" you reply \"I know what I'm doing. I finally figured out the true meaning of that ticket!\"\n         \n        Shrugging, your crew members unwillingly comply with your decision.\n    #I reverse the figures' order and subtract them: 9 - 6 = 3!\n        *set wnumber 3\n        \"We bet on number 3!\" you say.\n         \n        \"What?\" everyone exclaims \"Captain, weren't we supposed to…\"\n         \n        \"Believe me!\" you reply \"I know what I'm doing. I finally figured out the true meaning of that ticket!\"\n         \n        Shrugging, your crew members unwillingly comply with your decision.\n        \n\"[i]Rien ne va plus[/i]!\" the Penguin exclaims with a very bad French accent. \"Let's spin the Wheel!\"\n \nThe satin man lowers the lever, and the spinning gadget starts rotating at the sound of the usual, catchy tune. Will crosses his fingers and prays, Slash plays [i]No Woman No Cry[/i], Sam reads his notepad while Laura kisses her amulets and chants.\n\nYou are is still holding your breath when the wheel finally stops.\n*page_break The winning number is...\n\n\"The winning number is…\" the Penguin exclaims, \"[b]${wnumber}[/b]! Congratulations, you won!\"\n\nEveryone exults! Mama starts a Voodoo ritual dance, Slash plays [i]We Are the Champions[/i], Will hugs you, and Sam lifts both of you over his big, hairy shoulders.\n \nYou still can't believe it: you actually made the right decision about the ticket's number!\n\nAfter celebrating, singing, and dancing for a couple of minutes, you all regain composure.\n \n\"Congratulations again!\" the Penguin shakes your hand.\n*label chooseprize\n\"Are you ready to collect your prize?\" the Penguin smiles.\n*choice\n    *disable_reuse #Of course! Give me the big, tasty candy bag!\n        *set Mojo -5\n        Everyone looks at you, disappointed. \"Are you kidding?\" Slash asks, angered, \"Why would you throw overboard all our efforts so far?\"\n        \n        \"Alas,\" the Penguin interrupts you, \"I have to inform you that we just run out of candy bags. Gabriel Lagrange won the last one minutes ago. Please, choose a different prize.\"\n         \n        Everyone breathes a sigh of relief.\n         \n        \"If this was a joke, we did not like it!\" Slash remarks, disappointed, \"Come on, captain, pick the right prize!\"\n        *page_break Sorry, mates!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto chooseprize\n    *disable_reuse #Yes! I choose the Banana Picker!\n        *set Mojo -5\n        \"What?\" Mama Zouzou shouts, \"Are you nuts? Why on earth should we need a Banana Picker? And what the hell IS a Banana Picker?\"\n        \n        \"Easy, mates!\" the Penguin interrupts you. \"I'm sorry to inform you that we don't have any more Banana Pickers. A group of strangely dressed natives just won the only one we had.\"\n         \n        Everyone breathes a sigh of relief.\n         \n        \"Stop joking!\" Will complains, more nervous than usual, \"Let's get the prize we are looking for, and let's get the hell out of here!\"\n        *page_break You're right!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto chooseprize\n    #You bet! I want the luxury suite on the Royal Princess cruise ship!\n        *goto winsuite\n\n*label winsuite\n*set Special_Items \"Cruise_Voucher\"\n\"Great choice!\" the Penguin smiles \"Here's the prize every person longs for: a two-people voucher for the cruise of your dreams! Two of you will spend one whole month in the exclusive, top-class, luxury suite of the most fabled cruise ship to ever sail the Caribbean: the Royal Princess!\"\n\nYou receive in your trembling hands the voucher. You examine it thoroughly. It's not a fake: it's the real thing!\n\n\"Well, let's call it a day!\" the Penguin says \"Thank you for playing with us. See you tomorrow! And always remember: here at the Wheel of Fortune your dreams are only one coin away!\"\n \nBefore your unbelieving eyes, the Penguin lowers the lever. The wall suddenly rotates, making the Penguin and the Wheel disappear behind it.\n \nYou remain alone in the empty, dark alley.\n*page_break Goodbye, Penguin!\n\nYou hastily make your way back to the cartographer's office.\n\nYou resolutely knock at the door.\n \n\"Go away!\" you hear Anna approaching. \"We are closed now!\"\n*fake_choice\n    #Anna, it's us, the ${Crew_Name}! We have great news for you!\n        *set Charm %+10\n    #Open this door now, or we'll crush it down!\n        *set Charm %-10\n    #Too bad. Ok, ${Crew_Name}, who's coming with me on the Royal Princess?.\n        *set Wit %+10\n    #The map should better be ready, or else you'll be dearly sorry!\n        *set Wit %-10\n\"Oh, it's you…\" Anna opens the door, sword in hand. An angry grunt masks her face. \"Show me the tickets!\"\n \n\"I always keep my word,\" you reply, waving the voucher before her unbelieving eyes. \"I hope the map is ready, or we'll have to use these tickets ourselves! You know how cruise ships are: they wait for nobody!\"\n\n\"Sink me!\" the grunt turns into a smile. \"Grandpa! The braggart is back with the tickets!\" she shouts, \"Come in! Come in!\"\n \n[i]Braggart? How dares she…[/i] You wonder, shaking your head. Your grandpa's reputation keeps taunting you.\n\n\"God blind me!\" Ollie exclaims. \"See, Anna? He really did it!\" Tears run on his old cheeks. \"I told you: Brushwood the Beardless is the man! He'll get us the tickets, and we'll be on vacation soon!\" He then turns to you and asks: \"Tell me, how on earth did you manage to win the Wheel of Fortune?\"\n*page_break Nice question.\n\n\"Ollie…\" you reply, \"I'd love to sit here and tell you about it, but alas, time is running short on us. Please, give us the map. We gotta reach Donkey Island as soon as possible!\"\n \n\"Okay, okay!\" he replies, \"Here it is: a brand new, fully detailed nautical map. Don't tell anyone I drew it! And please don't say [i]that name[/i] again, you know it's bad Mojo!\"\n\nOliver hands you a freshly-inked nautical map.\n*set Special_Items \"Nautical_Map\"\n \n\"This chart will get you to that cursed place.\" the old man says. Then he looks in your eyes with a sorry expression and adds: \"If I were you, I'd burn this down and forget about it.\"\n \nEveryone looks at the map. Sam nods: he writes on his notepad that it's exactly what you needed. Ollie and Anna look at you expectantly.\n*fake_choice\n    #You're right, Ollie. You can keep the map. I'll go on the cruise myself and forget about that cursed island.\n        *set Wit %+10\n        Anna aims her sword on your throat. \"Nice try, Beardless.\" she says, grumpy as always \"Now hand us the voucher.\"\n         \n        \"Easy, Anna.\" you reply, handing the tickets to Ollie \"That was only a joke.\"\n         \n        \"This is a serious matter.\" Oliver replies \"By the way, you have a ship, right? Otherwise, you'll never get there. Nobody would ever take you there nor rent you his ship for such a crazy mission\".\n        \n        \"Actually\" you reply \"We don't have a ship yet. Where can we get one?\"\n    #All we need now is a ship. Where can we buy a passage or rent one?\n        \"You're delusional, mate\" Oliver replies \"Nobody would ever take you to that island nor rent you his ship for such a crazy mission\".\n        \n        \"I see.\" you reply \"We gotta buy our own ship then. Where can we get one?\"\n    #Please, Ollie! Come with us! I promise you and Anna a share of the loot!\n        *set Mojo -5\n        Ollie laughs. \"You tricked me once, Beardless, making me wait twenty years for my share.\" he replies \"You won't trick me twice. No way. Me and Anna are going to board on the cruise ship and forget about our troubles.\"\n         \n        \"Well said!\" replies Anna, sheathing her sword \"Cruise, here we come!\"\n         \n        \"By the way,\" Oliver adds \"You have a ship, right? Otherwise, you'll never get there. Nobody would ever take you to that island nor rent you his ship for such a crazy mission\".\n        \n        \"Actually\" you reply \"We don't have a ship yet. Where can we get one?\"\n        *if Mojo \u003c1\n            *goto_scene gold\n \n\"If I were you, I'd go to Dan's.\" Ollie says, pouring some rum in his glass \"You remember him, don't you?\"\n\nYou try to remember…\n \nYes, your grandpa did say something about a guy named Dan… If you remember correctly, he should be…\n*page_break A ship dealer, right?\n\n\"Exactly!\" Ollie gulps down his rum and continues: \"[b]Dan's Previously Boarded Vessels[/b]! I'm sure you'll find a deal there, the same way we did years ago.\"\n\n\"Excuse me, Mr. Weed\" Will raises his hand \"But can we trust this guy? If his ships are [i]previously boarded[/i] indeed, will they actually resist the sea?\"\n \n\"Beggars can't be choosers!\" you say \"If one of his vessels brought me and Ollie to… [i]that island[/i] twenty years ago, it will work just fine this time too!\"\n \n\"That's the Guy I love!\" Ollie says \"Oh, you so remind me of the good ol'days!\"\n\n\"So, it's decided!\" you walk towards the door \"We're going to pay a visit to Dan. Where's his shop?\"\n \n\"Just go right, exit the town and follow the beach southwards.\" Fiery Anna replies, admiring the cruise vouchers \"You can't miss it!\"\n \nThis could be your last chance to recruit Anna and Ollie. Any help is welcome!\n*fake_choice\n    #Anna, come with us! We need a skilled sword maiden like you and a savvy cartographer. Nobody would ever stop us!\n        *set Charm %+10\n    #Anna, are you up for an arm-wrestling contest against Sam? The winner takes the voucher!\n        *set Charm %-10\n    #Cruises are boring. Merchantmen boarding is way more fun, am I right, Ollie?\n        *set Wit %+10\n    #Did you hear what happened to the Titanus cruise ship? All those passengers drowned! This is not a good season for cruising!\n        *set Wit %-10\n\"Nice try, [i]Beardless[/i]!\" Anna replies, pointing her sword at your throat. \"You have your map, now begone!\"\n \nOllie chuckles. \"Forgive her manners, Guy. Alas, I must admit I agree with her. My pirate days are over. Best of luck with your mission!\"\n\n\"Okay,\" you sigh, exiting \"Thank you for the map! I'll greet Dan on your behalf.\"\n\n\"One last piece of advice!\" Ollie shouts \"You DO remember that you should NOT sign anything dealing with Dan, don't you?\"\n*fake_choice\n    #Of course I do!\n    #Why is that?\n\"You know what they say\" Ollie adds \"If you don't pay the devil's due, he'll take your soul!\"\n\n\"Enough talk, grandpa!\" Anna pushes you all roughly out of the office and slams the door shut. \"Let's prepare our luggage!\" you her her say \"Cruise, here we come!\"\n\n\"Captain…\" Laura approaches you \"I don't like what the cartographer just said. Are you sure we should deal with this Dan [i]guy[/i]?\"\n \n\"Don't say [i]that[/i] word again!\" you scold her \"Alas, Dan seems to be our only option. Unless anyone of you knows a different dealer where we could get a ship.\"\n\nSilence is the only answer.\n\n\"Let's go.\" you say, determined, \"Let's waste no more time. The curse won't wait for us.\"\n*finish Dan, here we come!", "05_dan01": "*comment *finish\n*image 05_shipyard.png center Chapter five: the shipyard\nTogether with all the ${Crew_Name}, you stand outside the cartographer's office.\n \nEveryone is waiting for your orders.\n \n\"Where to, captain?\" asks Laura.\n*fake_choice\n    #Listen to my mouth: we must go south!\n        *set Mojo %+5\n        *set Charm %+5\n        *set Wit %+5\n        Everybody laughs at your joke.\n         \n    #Northwards! Let's go!\n        *set Mojo -5\n        *set Wit %-5\n        *set Sam %+5\n        Everybody looks at you, puzzled.\n         \n        Sam comes near you and shows you his notepad. You read: [i]Captain, Anna said the ship dealer is south[/i].\n         \n        You suddenly remember that Sam is right. You chose the wrong direction, but you appreciate his hint. \"Well done, me hearties! You do were listening! Le's go south!\"\n        *if Mojo \u003c1\n            *goto_scene gold\n    #Weren't you listening? You tell me now where Dan is, or else...\n        *set Mama %+5\n        *set Charm %-5\n        \"Of course, Captain!\" Laura replies, \"I'm sure you remember that Anna told us to follow the beach southwards. Am I right?\"\n         \n        You nod. \"Well done, me hearties! You DO were listening! Let's go!\"\n\nYou go south, following Anna's directions. As usual, the big Sam goes first, and you follow him in a single line.\n \nFollowing the shoreline, you soon leave Scuffle Town behind you. In the far distance, you see a glowing light. It's far more shining than a lighthouse. Could that be Dan's?\n*page_break Let's check it out.\n\nYou pass alongside an old fishing woman sitting on a small pier. \"God blind me!\" she shouts as soon as she notices you.\n \nShe drops her fishing pole and grabs a sword lying beside her. Despite her old age, she approaches you menacingly.\n \n\"You won't escape me this time, [i]Guy Brushwood[/i]!\" she threatens you. \"You will finally pay for what you did to me! I'll cleave you to the brisket and feed the fishes with your entrails!\"\n \nYou sigh. Will there ever be an end to your grandfather's misdeeds?\n \nThe ${Crew_Name} instinctively surround you, but you step forward boldly. \n*fake_choice\n    #I think we have a misunderstanding here. I am not the person you are looking for.\n        *set Aristocrat %+10\n        You see tears running down her face: \"You never learn, do you? Stop your pointless lying and face me! You'll regret leaving me alone at the altar!\"\n    #Lady, can't you see we are five against one? Go back to fishing, and we'll do you no harm!\n        *set Wit %-10\n        \"I know you are a coward!\" the lady replies, crying, \"But I am not backing away. I don't care how many of you I have to kill: today I'm going to make you pay for leaving me alone at the altar!\"\n    #Do I know you?\n        *set Wit %+10\n        \"How could you forget me?\" the lady sobs. \"How many innocent damsels did you leave alone at the altar? I will avenge all of them, you filthy treacherous scum!\"\n\n[i]Oh my God![/i] You are shocked. [i]That bastard promised to marry her and never did![/i]\n \n\"Sorry, lady.\" you reply, awkwardly, \"I really wish I could help you, but…\"\n \n\"[i]Lady[/i]?\" She goes mad. \"Can't you even recall my name?\" She turns to your crew and says: \"You are my witnesses! Today, I, Flora [i]Burning Flower[/i] Burns, will have my revenge on the filthy cheater standing here: Beardless Brushwood! I challenge you to a formal duel, son of a biscuit eater. Let's settle this here and now!\"\n*page_break A duel!\n\nYou are in a big fix. Deep inside you, you feel this woman is right, and you'd never want to harm her in any way. Then again, you have to solve this matter fast, or the curse will take over.\n\nNow that you think about it, solving this matter personally would probably cast some bad Mojo away from all of you. Your granddad started this, and you could eventually end this.\n\nBut how?\n\nEveryone looks at you, waiting for your decision.\n*choice\n    #Laura, use your magic to calm her!\n        *set Mama %+10\n        *set Charm %+10\n        *set Mojo -20\n        Mama Zouzou slowly steps forward and starts chanting.\n         \n        \"Running away, [i]beardless[/i]?\" the old lady mocks you. \"I won't stop until I get my revenge!\"\n         \n        Mama Zouzou closes her eyes and recites in French: \"[i]Bonne dame, arrêtez de souffrir, au lieu de cela, commencez à dormir[/i]\"\n         \n        Before everyone's eyes, the old lady starts yawning. She lies on the beach and starts snoring.\n         \n        \"Sweet dreams,\" adds Mama. \"When she wakes up, she'll forget everything.\"\n         \n        \"Good job, Mama!\" you say. \"Thank you very much for your help. You are a mighty sorceress, indeed!\"\n         \n        \"My pleasure, Captain,\" she answers, flattered.\n        *goto endburning\n    #Sam, knock her (gently!) out!\n        *set Sam %+10\n        *set Charm %-10\n        *set Mojo -10\n        The elegant gorilla stomps forward. He's unhappy with this task.\n         \n        \"Hiding behind a grunt, [i]beardless[/i]?\" the old lady mocks you. \"I won't stop until I get my reven…\"\n         \n        [b]SMASH![/b]\n         \n        Before the lady could finish her line, Sam punches her on the head. She drops face down on the beach, senseless.\n         \n        \"Good job, Sam!\" you say. \"Thank you very much for your help. I wish we could find a less violent solution, but alas, it's too late now.\"\n         \n        Sam sighs.\n        *goto endburning\n    #Slash, scare her away!\n        *set Slash %+10\n        *set Wit %-10\n        *set Mojo -10\n        The undead rocker lunges forward.\n         \n        \"Playing hide n seek, [i]beardless[/i]?\" the old lady mocks you. \"I won't stop until I get my revenge!\"\n         \n        \"Hello, beauty!\" Slash sings, showing his creepy skull, \"Why don't you kiss me?\"\n         \n        The old lad cries in terror. She drops face down on the beach, passed out.\n         \n        \"Good job, Slash!\" you say. \"Thank you very much for your help. I feel so sorry for this poor lady.\"\n         \n        \"Me too, Captain!\" he answers, playing his guitar.\n        *goto endburning\n    #Will, please make due arrangements for our marriage!\n        *set Will %+10\n        *set Charm %+10\n        *set Mojo -10\n        \"Congratulations, Captain!\" Will steps forward and bows in front of the lady.\n         \n        \"Is this really happening?\" the old lady cant' believe her ears. \"Oh, guy, it's so sweet of you!\"\n         \n        \"Dear lady…\" Will says, gesticulating as usual \"My Captain understands your request, but alas, we cannot comply with it right now. Urgent matters require our presence elsewhere, that's why…\"\n         \n        Will's gesticulations increase in speed, and you don't understand any more of his words. You only feel that what he says is right.\n         \n        \"So, we have an agreement.\" Will finishes, \"As soon as our businesses will be over, we will contact you and arrange a suitable place and time for the marriage. Farewell, milady!\"\n         \n        Flora smiles. He drops her sword and faints. She collapses on the sand, still smiling.\n         \n        \"Good job, Will!\" you say. \"Thank you very much for your help. At least, this lady will be happy for a few hours! Let's go away before she wakes up!\"\n         \n        \"My pleasure, Captain,\" he answers, flattered.\n        *goto endburning\n    #I will face her in a duel. I must solve my granddad's problems again!\n        *set Aristocrat %-10\n        You step boldly forward and unsheathe your sword.\n         \n        \"I am sorry we couldn't find a peaceful solution,\" you say, sighing, \"Let's settle this!\"\n         \n        The old lady wastes no time: she lunges forward and attacks. You barely dodge her sharp sword two times. Where does she find such strength?\n         \n        The third time, your swords clash, and the lady shouts: \"[i]You fight like a dairy farmer![/i]\"\n         \n        She pauses, catching her breath and waiting for your reply.\n         \n        You try to remember your grandfather's bragging: it could help you to provide the right comeback.\n        *fake_choice\n           #I wanted to make sure you'd feel comfortable with me.\n            *set Mojo -5\n            \"Pitiful!\" Flora replies.\n           #I'm rubber, you're glue, your words bounce off me and stick to you.\n            *set Mojo -5\n            \"Pitiful!\" Flora replies.\n           #Too bad no one's ever heard of you at all.\n            *set Mojo -5\n            \"Pitiful!\" Flora replies.\n           #He must have taught you everything you know.\n            *set Mojo -5\n            \"Pitiful!\" Flora replies.\n           #How appropriate. You fight like a cow!\n            *set Wit %+10\n            *set Mojo %+5\n            *set flawless +1\n            \"Damn!\" the old lady replies, \"You're a tough one!\"\n           \n        *if Mojo \u003c1\n            *goto_scene gold\n        The sword fight goes on. Under the silent eyes of your crew members, you somehow manage to avoid two thrusts and make a clumsy attempt to strike her. She finally raises her sword over her head, but you easily avoid her blow.\n         \n        You feel your heart racing in your chest. Flora catches her breath and says: \"[i]I once owned a dog that was smarter than you.[/i]\"\n         \n        Again, she's insulting you. You never thought remembering your grandfather's ramblings could ever come this handy!\n        *fake_choice\n           #I'm shaking! I'm shaking!\n             *set Mojo -5\n             \"And you call yourself a pirate?\" Burning Flower replies.\n           #So's your mother.\n             *set Mojo -5\n             \"And you call yourself a pirate?\" Burning Flower replies.\n           #He must have taught you everything you know.\n             *set Wit %+10\n             *set Mojo %+5\n             *set flawless +1\n             \"Sink me!\" the pirate lady replies. \"You do know how to talk to women!\"\n           #Why? Did you want to borrow one?\n             *set Mojo -5\n             \"And you call yourself a pirate?\" Burning Flower replies.\n           #At least mine can be identified.\n             *set Mojo -5\n             \"And you call yourself a pirate?\" Burning Flower replies.\n        \n        *if Mojo \u003c1\n            *goto_scene gold\n        The battle rages on. Neither of you wants to surrender.\n         \n        After avoiding some enemy lunges, you deal a lucky blow that is easily parried by the lady.\n         \n        Pushing you backward, Burning Flower says: \"[i]I pity you, Beardless. I have never seen such clumsy swordplay![/i]\"\n         \n        Your crew members stare at you, holding their breath. Everyone waits for your comeback.\n        *fake_choice\n           #Then be a good dog. Sit! Stay!\n            *set Mojo -5\n            \"Is this the best you can do?\" the old lady replies.\n           #I look THAT much like your fiancée?\n            *set Mojo -5\n            \"Is this the best you can do?\" the old lady replies.\n           #You would have, but you were always running away.\n            *set Wit %+10\n            *set Mojo %+5\n            *set flawless +1\n            The old lady curses, struck by your witty comeback.\n           #Nothing can stop me from blowing you away!\n            *set Mojo -5\n            \"Is this the best you can do?\" the old lady replies.\n           #I wanted to make sure you'd feel comfortable with me.\n            *set Mojo -5\n            \"Is this the best you can do?\" the old lady replies.   \n        \n        *if Mojo \u003c1\n            *goto_scene gold\n        You see the rage in the old lady's eyes. \"You will pay for your misdeeds!\" she cries, rushing towards you for a final, powerful strike.\n         \n        Suddenly, she stops. Breathing heavily, she presses a hand on her chest. She collapses on the sand, passed out.\n         \n        You all go around her. She's still breathing. She probably overexerted herself, and she passed away from exhaustion.\n        *goto endburning\n        \n*label endburning\n*if ((ACON) and (flawless >6))\n    *achieve flaw02\n\"Goodbye, Burning Flower,\" you say, catching your breath. \"If only [i]that person[/i] was not in Davy Jones Locker, I would personally avenge you.\"\n\nYou all resume your journey toward the shining light.\n\nLet's hope that's Dan's shipyard.\n*page_break Hurry up!\n*if Mojo \u003c1\n    *goto_scene gold\n\nYou finally arrive in the shimmering place you saw from afar. A dazing sign reads: [b]Dan's Previously Boarded Vessels[/b].\n \nIt's a giant harbor full of every type of imaginable sailing vessel: Barques, Brigs, Caravels, Corvettes, Frigates, Galleys, Galleons, Sloops and even a roman Trireme!\n\n\"Well\" Will says, admiring the vessel-dotted landscape \"Looks like we came to the right place!\"\n\n\"You can say it ALOUD!\" booms an unknown voice behind you.\n*page_break Who's there?\n\nYou turn around and see a tall, broad-shouldered man with an overbearing manner. He wears an oversized check jacket and a wide-brimmed hat.\n\"Howdy!\" he greets you, waving his arms about rapidly, \"I'm Dan of Dan's Previously Boarded Vessels. ...and I'd stand on my head to make you a deal!\"\n\n\"Where did you came from?\" asks Laura, shivering, \"You almost jumpscared me to death!\"\n \n\"Sorry, milady!\" Dan kisses Mama's hand \"I just couldn't wait to greet you all!\"\n \nHe then turns around and looks deep into your eyes: \"You're the captain an this is your crew, right? You have the demeanor of a leader!\"\n*fake_choice\n    #My name is ${Name} Brushwood and I'm here to get a ship for my crew!\n        \"Brushwood…\" Dan wonders \"Where did I hear that name? Did we already meet, captain? Something about you seems familiar…\"\n         \n        \"No, I don't think so\" you reply. Better not involving [i]that person[/i] in this matter for now.\n    #We are the ${Crew_Name} and we need a ship. Can you help us, Dan?\n \n*temp showvessel false\n\"What sort of craft are you looking for?\" asks Dan, showing you around his harbor \"Big? Little? Fast? Slow? You want it, I got it. And if I don't got it, I'll get it.\"\n \nHe speaks and moves his hand in a catchy, somehow [i]hypnotic[/i] way.\n \n\"I want to make you a deal that YOU'RE happy with.\" he continues \"Because if YOU'RE not happy, I'M not happy. But I KNOW you're going to leave here happy today. How do I know? Just look at all these ships! I've got something for everyone! Come take a look around!\"\n \nYou all follow him to the dock area.\n\n\"Captain…\" Laura whispers into your ear \"There's something about this man… Something odd… His voice has some sort of charming power. Be on guard, captain!\"\n \nYou nod. Ollie warned you about him too.\n\n*label showship01\nYou're now in the center of Dan's harbor. Dozens of different ships surround you.\n \n\"So tell me…\" Dan says, tapping his foot impatiently. \"What are you interested in looking at today?\"\n*choice\n    *disable_reuse #Let me see the best ship you've got.\n        *comment *set showvessel +1\n        \"Hey, it's nice to meet a man who appreciates quality.\" Dan says, tapping his foot, \"I've got JUST the boat for you! Walk this way.\"\n         \n        You all follow him to a big, red ship.\n        \n        \"Now this... This is a ship fit for a king!\" he exclaims. \"I mean, we're talking fifteen staterooms, a fireplace in every one. We're talking two pools, one indoor, one outdoor. We're talking rotating ballroom. We're talking heated crow's nest. We're talking two hundred feet of ocean-going decadence. And all for one low price. Speaking of price…\"\n        \n        You immediately interrupt Dan. It surely costs a lot of money, and you don't need such a big ship. \"On second thought,\" you say, shrugging, \"This may not be the ship for us.\"\n\n        \"Of course it isn't!\" Dan replies. \"You're looking for a much bigger boat, I can tell. So what else can I show you?\"\n        *page_break Let's see...\n        *goto showship01\n    *disable_reuse #Something not too expensive, but built to last.\n        *comment *set showvessel +1\n        \"Affordable quality?\" Dan asks, \"Hey, that's my motto! I've got JUST the boat for you! Walk this way.\"\n         \n        Dan walks you to a viking sort of boat.\n        \n        Proudly, he says: \"Now I can see you're a no-frills kind of guy. But I can also tell that quality means a lot to you. I mean, just look at the way you dress. Rugged. Like this baby.\"\n         \n        Everyone chuckles.\n        \n        Dan continues: \"She comes from a land far to the North… Where the sea is as unforgiving as the men are tough and… Hey, you wouldn't happen to be from there, would you? You just seem to have a sort of Nordic quality about you… Anyway, we're talking about a real value here…\"\n\n        Everyone looks at you. Nobody likes the idea of rowing all the way to Donkey Island on a viking drakkar.\n\n        \"You know, Dan…\" you reply, \"I am not sure this would be a good choice for my crew.\"\n\n        \"Okay,\" Dan replies, tapping his foot, \"But I got five other guys coming to look at this baby today. Don't count on it being here if you change your mind. So what else can I show you?\"\n        *page_break Let's see...\n        *goto showship01\n    *disable_reuse #That spiffy blue one by your office looks nice.\n        *comment *set showvessel +1\n        \"Of course it does.\" Dan proudly replies, \"It's mine. And it's not for sale. What ELSE can I show you?\"\n        *page_break Let's see...\n        *goto showship01\n\n    *disable_reuse #We really don't have that much to spend.\n        *set showvessel true\n\n        \"Have no fear!\" Dan smiles. \"Every ship I sell is a bargain! But if you're looking for a real steal… I've got JUST the boat for you! Walk this way!\"\n\n        You follow Dan to the furthest ship on the pier.\n        \n        \"This here is the famous '[i]Sea Donkey[/i]'.\" Dan lowers his voice, \"The only ship ever to make it to Donkey Island… and come back with everyone aboard alive.\"\n         \n        You see the fear in your crew's eyes.\n         \n        \"Or, should I say, anyTHING.\" Dan adds, \"You see, two previous owners of this ship were two adventurous pirates. They set off, like many before, to find the legendary Secret of Donkey Island. And, like many before, they disappeared forever. Their fate… a mystery! Almost as mysterious as how this ship returned to Scuffle Island without a single human aboard. Some claim it was sailed back by a crew of chimps.\"\n\n        \"Chimps?\" you can't believe it. \"There aren't any chimps in the Caribbean!\"\n\n        \"Oh, shut up.\" Dan replies, annoyed, \"It makes a good story. Anyway, this baby's mine now… That is, until someone makes me an offer.\"\n        \n        You look at your crew. If this ship made it to Donkey Island once, it could easily go there again. And there is something about this ship that piques your interest…\n        *page_break I kinda like it.\n        *goto showship01\n    *if (showvessel) #Let's talk about business.\n        *goto 01business\n*label 01business\n\"Ok, Dan,\" you say, \"I think we saw a ship we like. I am sure you can offer us a good deal.\"\n \n\"Of course I can!\" Dan smiles, hypnotically waving his hands, \"Did I tell you about our famous '[i][b]Why Buy?[/b][/i]' offer? I'm sure you'll love it! But first things first. How much is your budget?\"\n \n\"Actually,\" you smile, \"Our budget is ${Pieces_of_Eight} Pieces of Eight.\"\n\nStan stops waving his hands.\n\"I think we must be talking about completely different ships here.\"\n \nHe then regains his smile and adds: \"You've obviously been out of the ship market for quite some time. But don't worry, if your cash is not enough, Dan has the right solution for you! Let me tell you about the unique, Dan's only purchasing experience: the [i]Why Buy?[/i]\"\n*page_break I like the name.\n\n\"Of course you like the name: I created it!\" Dan smiles, then adds: \"Would you please follow me alone, captain? This is a serious matter I'd like to discuss face to face.\"\n \n\"Sure,\" you answer, gesturing your crew to stay put. \"Wait for me here, guys. I'll be back soon.\"\n \nYou immediately realize that Laura doesn't like this situation at all. Her worried eyes tell you to stay on guard.\n\nSmiling, Dan walks you into his private office nearby: a small cabin with a red roof.\n \n\"Have a seat, captain!\" he says, pouring some liquor into a glass \"Grog?\"\n*fake_choice\n    #Aye!\n        Dan hands you a mug. You thank him but you avoid to drink it.\n    #No time to drink. Let's talk business instead.\n        Dan smiles.\n\n\"Look at me…\" Dan waves his hands hypnotically \"We both know what matters most to a pirate captain: booty! Spending all your money to purchase a ship would be a great waste, wouldn't it?\"\n \nYou nod. There's something in Dan's eyes that make you feel comfortable… The guy surely has a point.\n\n\"Here at Dan's we know your needs and we are ready to make you a deal.\" The ship seller produces a parchment \"Here is our unique 'Why Buy?' offer: instead of giving me money, all you have to do is signing this formal agreement and the ship is yours!\"\n \n\"You don't fool me!\" you answer, shaking your head \"I'm sure this agreement binds me to give you an incredible amount of money in the future. What's the big deal?\"\n\n\"No way.\" Dan replies, smiling \"As I told you, no money is involved in this transaction. Go on, read it if you wish.\"\n*page_break I am on it.\n\nYou read the document under Dan's glowing eyes. It's a strange-looking parchment, written with a blood-red ink. You are no lawyer, but it seems a weird kind of contract, where a \"captain\" sells all souls on a ship to a person named…\n \n[i][b]DAVY JONES[/b][/i]\n\n\n\"See?\" he smiles \"I told you: no money is involved in this transaction! That's why we call it 'Why Buy?'\"\n\n\"There is only one [i]little[/i] problem…\" you say, looking Dan into his eyes \"If I sign this document, I will sell you my crew members' souls!\"\n \n\"Not exactly!\" Dan replies \"I have no need for souls. You are selling their souls to Davy Jones, so he can employ them as slaves on his Flying Dutchman for eternity. And in exchange for that, you would be the owner of a great ship. Think about it: do you really care to what happens to your soul after you're dead? By the way, do pirates actually have a soul? I should reconsider this: what if your crew members don't have souls? I could end up broke, you know?\"\n\n\"There is another little problem here…\" you say, pointing your finger on the parchment \"Here says: '[i]Davy Jones can claim the souls whenever he needs them[/i].' There is no guarantee this will happen only [i]after[/i] my crew members are actually dead. What if he claimed their souls tomorrow?\"\n\nDan smiles: \"Rest assured, captain. So far, nobody complained. You know, dead men…\"\n*page_break Tell no tales.\n\n\"This is the best deal I can make you\" Dan insists, tapping his foot. \"The moment you sign this parchment you become the owner of a great, previously boarded ship. And all this without spending a single, precious coin! Think about it: pirates would go to hell one way or the other. You should take advantage of this while you can! You want the ship and Mr. Jones wants new souls. It's a fair trade, isn't it?\"\n\nThis is a complicated situation. You have no money, but you need to buy a ship: if you don't, the curse will send you all straight to hell. If you signed this agreement, you would condemn your crew members to endless suffering, but you would immediately have a ship. This means you could set sails to Donkey Island today.\n \nBut can you actually trust Dan? Is signing this parchment really a good idea?\n*choice\n    *selectable_if (Aristocrat \u003c 30) #Dan is right: my crew members are doomed anyway. I sign the parchment.\n        *goto_scene 07_dan02 signcontract\n    #It's a very convenient bargain, but I'd rather not meddle with Davy Jones. What if that devil claims my soul too?\n        *set Pirate %+10\n        *set Wit %-10\n        \"Dan\" you say, dropping the pen \"I know you are a trustworthy businessman. Alas, Davy Jones is a devil. And I'd rather not sign a pact with a devil. I know too well they twist such agreements as they see fit.\"\n        *goto bringmoney\n    #I am pretty sure Dan is hornswoggling me. I'm not signing this agreement.\n        *set Wit %+10\n        The more you look at the parchment, the more this whole situation smells fishy.\n         \n        You read the contract again and you can see the scheme clearly now. If you signed this agreement, Davy Jones would claim all the souls on the ship (including yours) as soon as he needs them. It's not written in the contract, but you're pretty sure Jones would then pay a fee to Dan and give him the ship back so he can lure new preys. A perfect trap, but you are not going to fall in it.\n        \n        \"Thank you Dan\" you say, dropping the pen \"But I'll pass. This 'Why Buy?' method is too complicated: I prefer the [i]old ways[/i].\"\n        *goto bringmoney\n    *selectable_if (Aristocrat > 30) #I would never betray my crew! They are family to me now.\n        *set Aristocrat %+20\n        *set Mama %+20\n        *set Sam %+20\n        *set Slash %+20\n        *set Will %+20\n        Dan is shocked by your words.\n        \n        \"You really cherish your crew more than booty?\" he shakes his head \"And you call yourself a pirate captain? I'm surprised your crew didn't mutiny yet.\"\n        *goto bringmoney\n*label bringmoney\n\n\"As you wish.\" Dan drinks his mug of grog. \"If this is the case, there's no reason to waste more time on this transaction now. You are very far away from the amount of money you need to buy a ship.\"\n \n\"How much would that be?\" you ask, getting up.\n\n\"Well…\" Dan waves his hands as usual \"My customers usually bring [b]at least 7000 Pieces of Eight[/b] to start a transaction. Cash. Upfront. Come back when you have them.\"\n\n[i]7000 pieces of eight![/i] you think [i]Where can I find so much money in so little time?[/i]\n\n\"You know, quality has a price.\" Dan pats your shoulder. \"But never fear: if you change your mind, the 'Why Buy?' option is always there for you!\"\n*page_break Thank you, Dan.\n\nAs you exit Dan's office, your crew members gather around you.\n \n\"How did it go, captain?\" Will asks.\n \n\"I'll fill you in later,\" you repl
