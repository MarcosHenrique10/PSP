<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pirates of Donkey Island — ChoiceScript</title>
  <style>
:root {
  --bg: #f4f1ea;
  --fg: #222;
  --muted: #888;
  --accent: #7a5c3e;
  --card: #fbf9f3;            /* warm paper white (was pure #fff) */
  --border: #ddd;
  --topbar-h: 3rem;
  --choice: #2f5d78;          /* live options / questions — cool blue */
  --choice-bg: #eef4f8;
  --chosen: #3d6b3d;          /* recorded answers in the log — green */
  --chosen-bg: #eef5ec;

  /* ---- paper texture (customizable) ----------------------------------
     Thin horizontal "corrugated paper" lines. Tweak the three knobs below:
       --paper-line-color : ink color + opacity of each line
       --paper-line       : thickness of each line
       --paper-gap        : distance from one line to the next (the period)
     The lines are painted with background-attachment: scroll so they move
     WITH the page as you scroll — the text looks printed onto the paper,
     not floating over a fixed pattern. To disable, set --paper-texture:none. */
  --paper-line-color: rgba(34, 30, 25, .04);
  --paper-line: 1px;
  --paper-gap: 3px;
  --paper-texture: repeating-linear-gradient(
    0deg,
    var(--paper-line-color) 0,
    var(--paper-line-color) var(--paper-line),
    transparent var(--paper-line),
    transparent var(--paper-gap)
  );
}
* { box-sizing: border-box; }
html { scroll-padding-top: var(--topbar-h); }
body {
  margin: 0;
  background-color: var(--bg);
  /* Paper lines scroll with the page (not fixed), so the text reads as if
     printed onto the sheet rather than sliding over a static backdrop. */
  background-image: var(--paper-texture);
  background-attachment: scroll;
  color: var(--fg);
  font: 17px/1.6 Georgia, "Times New Roman", serif;
}
h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
.muted { color: var(--muted); }
.small { font-size: .8rem; }
.err, .error { color: #a33; }

/* buttons (shared) */
.btn {
  font: inherit; padding: .5rem .8rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--fg); cursor: pointer;
}
.btn:hover:not(:disabled) { border-color: var(--accent); }
.btn:disabled { color: var(--muted); cursor: not-allowed; }
.btn.small { font-size: .8rem; padding: .35rem .7rem; }
.btn.danger { color: #a33; border-color: #e0b4b4; }

/* ---- landing page (index.html) ---- */
.wrap { max-width: 40rem; margin: 0 auto; padding: 2rem 1.25rem 5rem; }
.games { list-style: none; padding: 0; margin: 1.5rem 0 0; }
.games li { padding: .6rem 0; border-bottom: 1px solid var(--border); }
.games a { color: var(--accent); text-decoration: none; font-size: 1.15rem; }
.games a:hover { text-decoration: underline; }

/* ---- sticky topbar ---- */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: .4rem;
  min-height: var(--topbar-h);
  padding: .45rem .9rem;
  background: color-mix(in srgb, var(--bg) 88%, #fff);
  backdrop-filter: saturate(1.1) blur(6px);
  border-bottom: 1px solid var(--border);
}
.topbar .title { font-weight: bold; font-size: .95rem; }
.topbar .spacer { flex: 1; }

/* ---- layout: story (+ optional stats panel) ---- */
.layout {
  max-width: 42rem; margin: 0 auto; padding: 1.5rem 1.25rem 5rem;
  transition: max-width .2s ease;
}
.main { min-width: 0; }

/* When stats are open on a wide screen, split into two panels. */
body.stats-open .layout {
  max-width: 76rem;
  display: flex; align-items: flex-start; gap: 1.5rem;
}
body.stats-open .main { flex: 1 1 auto; }

/* ---- progress segments ---- */
.segment {
  background-color: var(--card);
  /* Paper lines printed onto the reading surface itself, aligned to the
     page grid (fixed origin) so lines are continuous card-to-card. */
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin: 0 0 1rem;
  box-shadow: 0 1px 2px rgba(0,0,0,.03);
}
.segment:last-child { margin-bottom: 0; }

/* story text */
.story .para { margin: 0 0 1rem; white-space: pre-wrap; }
.story .para:last-child { margin-bottom: 0; }
.achievement { color: var(--accent); font-weight: bold; }

/* recorded answer in the history log — distinct from narration */
.story .chosen {
  margin: 0 0 1rem; padding: .4rem .7rem;
  background: var(--chosen-bg);
  border-left: 3px solid var(--chosen);
  border-radius: 0 5px 5px 0;
  color: var(--chosen); font-style: italic;
}
.story .chosen:last-child { margin-bottom: 0; }
.story .chosen .chosen-mark { font-weight: bold; }
.story .chosen .chosen-text { font-weight: bold; }

/* illustrations (*image / *text_image) */
.story-image { margin: .75rem 0; }
/* darken blend lets the paper lines beneath show through the image's light
   areas, so the illustration reads as printed onto the same sheet as the text
   rather than pasted on top. Whites drop out; darks stay. */
.story-image img {
  max-width: 100%; height: auto; border-radius: 6px; display: block;
  mix-blend-mode: darken;
}
.story-image.align-center { text-align: center; }
.story-image.align-center img { margin: 0 auto; }
.story-image.align-right img { margin-left: auto; }
.story-image.align-left img { margin-right: auto; }

/* stat chart */
.statchart { margin: .75rem 0; }
.stat-text { font-size: .95rem; margin: .25rem 0; }
.stat-bar { display: flex; align-items: center; gap: .5rem; margin: .35rem 0; font-size: .9rem; }
.stat-bar .stat-label { flex: 0 0 40%; }
.stat-bar .bar-track { flex: 1; height: .7rem; background: #eee; border-radius: 4px; overflow: hidden; }
.stat-bar .bar-fill { display: block; height: 100%; background: var(--accent); }
.stat-bar .stat-pct { flex: 0 0 2.75rem; text-align: right; color: var(--muted); }
/* magic-style meters: colored fill (color set inline per discipline) plus the
   raw score at the end rather than a percentage. */
.stat-bar.colored-bar .stat-label { flex: 0 0 30%; }
.stat-bar.colored-bar .bar-track { height: 1rem; }

/* ---- prompt / choices ---- */
/* The live decision area is tinted (cool blue) so it reads as "your turn",
   clearly distinct from the narration cards above it. */
#prompt { margin-top: 1rem; }
.choices { display: flex; flex-direction: column; gap: .5rem; margin: 0; }
.btn.choice {
  display: block; width: 100%; text-align: left; padding: .7rem .9rem;
  color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border));
  background: var(--choice-bg);
}
.btn.choice:hover:not(:disabled) {
  border-color: var(--choice);
  background: color-mix(in srgb, var(--choice-bg) 80%, #fff);
}
.btn.choice:disabled { color: var(--muted); background: var(--card); }
.btn.choice .locked { font-size: .8rem; color: var(--muted); }
.btn.next { margin-top: .5rem; color: var(--choice); border-color: color-mix(in srgb, var(--choice) 35%, var(--border)); }

form.inputform { display: flex; gap: .5rem; margin: .5rem 0; }
form.inputform .textinput { font: inherit; padding: .4rem .6rem; border: 1px solid color-mix(in srgb, var(--choice) 35%, var(--border)); border-radius: 6px; flex: 1; }

.ending { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 1rem 0; }

/* ---- stats panel ---- */
.stats-panel { display: none; }
.stats-panel .stats-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: .75rem;
}
.stats-panel .stats-head h2 { margin: 0; font-size: 1.15rem; }
.stats-body .para { white-space: pre-wrap; margin: 0 0 .75rem; }

body.stats-open .stats-panel {
  display: block;
  background-color: var(--card);
  background-image: var(--paper-texture);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
}

/* Wide screens: stats panel is a sticky right column. */
@media (min-width: 60rem) {
  body.stats-open .stats-panel {
    flex: 0 0 24rem;
    position: sticky;
    top: calc(var(--topbar-h) + 1rem);
    max-height: calc(100vh - var(--topbar-h) - 2rem);
    overflow: auto;
  }
}

/* Narrow screens: stats panel overlays the story. */
@media (max-width: 59.99rem) {
  body.stats-open .layout { display: block; max-width: 42rem; }
  body.stats-open .stats-panel {
    position: fixed; z-index: 90;
    top: var(--topbar-h); left: 0; right: 0; bottom: 0;
    border-radius: 0; overflow: auto;
  }
}

/* ---- save / load modal ---- */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.4);
  display: flex; align-items: center; justify-content: center; padding: 1rem;
}
.modal {
  background: var(--card); border-radius: 10px; padding: 1.25rem;
  max-width: 32rem; width: 100%; max-height: 80vh; overflow: auto;
}
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: .75rem; }
.modal-head h2 { margin: 0; font-size: 1.2rem; }
.savelist { display: flex; flex-direction: column; gap: .4rem; }
.saverow { display: flex; gap: .5rem; }
.saverow .btn:first-child { flex: 1; text-align: left; font-size: .9rem; }

/* ---- flash toast ---- */
.flash {
  position: fixed; left: 50%; bottom: 1.5rem; transform: translateX(-50%);
  z-index: 300; background: #333; color: #fff; padding: .5rem .9rem;
  border-radius: 6px; font-size: .85rem;
}

  </style>
</head>
<body>
  <div class="topbar">
    <button id="btn-menu" class="btn small">&larr; Games</button>
    <span id="game-title" class="title"></span>
    <span class="spacer"></span>
    <button id="btn-stats" class="btn small">Stats</button>
    <button id="btn-save" class="btn small">Save</button>
    <button id="btn-load" class="btn small">Load</button>
    <button id="btn-restart" class="btn small">Restart</button>
  </div>

  <div class="layout">
    <main class="main">
      <div id="story" class="story"></div>
      <div id="prompt"></div>
    </main>
    <aside id="stats-panel" class="stats-panel" aria-hidden="true">
      <div class="stats-head">
        <h2>Stats</h2>
        <button id="btn-stats-close" class="btn small">Close</button>
      </div>
      <div id="stats-body" class="stats-body"></div>
    </aside>
  </div>

<script>
window.__CS_OFFLINE__ = {"game": "piratesofdonkeyisland", "title": "Pirates of Donkey Island", "scenes": {"02_voodoo_lady": "*comment *finish\n*image 02_ritual.png center Chapter two: the ritual\nYou enter the room with awe, fearing to sink into an [i]endless nothingness[/i]. Its interior is unnaturally dark, and the only visible figure in a surreal distance is a black woman seated on a gloomy throne of bones. Her age is indeterminable and her junoesque presence inspires awe and reverence.\n \nAs your eyes adjust to the dim lighting, you realize the weirdos are floating in the darkness somewhere near you: their eyes are closed as if they are sleeping. They seem so distant, yet you feel very close to them.\n \nThe eerie silence is unnerving. You are wasting your precious time!\n*choice\n    #I remain silent and patiently wait for the Lady to summon me.\n        *set Aristocrat %+10\n        [i]Rushing Voodoo is dangerous![/i]\n         \n        The parrot's squawking echoes in your head. Better wait patiently for your turn.\n        *goto 20introduction\n    #I use flattery to attract her benevolence.\n        *set Charm %+10\n        \"Sink me! Wonderful Voodoo Lady, your are looking gorgeous indeed tonight. Your beauty exceeds any mortal expectation!\"\n        *goto 20introduction\n    #I make a funny remark and get straight to the point.\n        *set Wit %+10\n        No point in waiting. You put up your best smile and say: \"I am sure [i]Her Voodooness[/i] is very busy, so I'll get straight to the point. Just tell me how I can lift this nasty curse and I won't waste any more precious minute of your time.\"\n        *goto 20introduction\n    \n*label 20introduction\n \nThe Lady suddenly opens her eyes, startling you. Fear tightens a frosty grip around your heart: she's got completely white eyes, without pupils! She must be a devil of some sort!\n \n\"What do we have here?\" she smiles, showing an expensive smile full of golden teeth \"Shiver me timbers, [i]your highness[/i] has deigned to come into my humble abode! Your highness must really be in dire straits in order to resort to ask for my help, am I right?\"\n*fake_choice\n    #I beg her for help.\n        \"Yes, dire straits indeed.\" you reply \"You cannot imagine how pitiful it is [i]walking[/i] in this awkward body…\"\n    #I pretend everything's ok.\n        \"In [i]dire straits[/i]?\" you smile \"Me? Oh, no, that's not the case! You know, I came all the way here just to drink your Mojito. People say you are the best barman of the Cari…\"\n \nThe Lady stops you rising her right hand.\n \n\"There's no need to speak further.\" you hear sadness in her voice \"I can clearly see you are deep into the abyss of despair. But believe me, not all evil comes to harm: this is the BEST moment to look at reality from a very different perspective. Have no fear, $!{name} destiny is now blessing you with a [b]unique chance to [i]finally find your TRUE purpose in life[/i][/b]! Just like your grandfather Guy did.\"\n \n \n[i]WHAT THE HELL?[/i] you wonder, puzzled.\n \nYou already know very well what your one and only purpose in life is: [b]marrying Alfred and becoming a princess[/b]!\n \nAlas, an unwanted curse forced you into the body of a person you deeply hate and ruined your dreams. [i]How could that b**** ([i]sorry![/i]) …witch possibly call this situation \"a blessing\"?[/i]\n*page_break This is nonsense!\n\"Conversation's over!\" shouts the lady, clapping her hands.\n \nAll of a sudden, you find yourself standing on a wooden floor side by side with the strangers in front of the Lady's ominous throne.\n \n\"People call me the [b]Voodoo Lady[/b]\" she says, while a big, boiling cauldron emerges from the darkness on the floor \"My powers can help every single one of you: the [i]fast-aging lady[/i], the [i]undead rocker[/i], the [i]educated gorilla[/i], the [i]ridiculous spokesman[/i] and…\"\n \nYou can feel the Lady's white eyes piercing your soul. Everybody turns around staring at you, wondering what your curse is.\n*fake_choice\n    #The Pirate in Distress.\n    #The Pirate Bride.\n    #The body of evidence.\n    #Call me whatever you want, this will soon be over!\n        \nBefore you can utter a single word, Voodoo Lady says: \"…and the [i]wannabe princess in the wannabe pirate's body[/i].\"\n \nThe weirdos look at you: they are evidently confused.\n \n\"Thank you for the spoiler, [i]milady[/i]!\" you say, angered.\n \n\"Your five destinies are linked.\" she replies with a golden smile \"Lying to your hearties would be lying to your own soul.\" Everyone in the room nods.\n\n[i]Hearties?[/i] you wonder.\n \nNo way! You'd rather walk the plank than stick around with those four weirdos! As soon as this nasty curse is lifted, you are outta here for good and you'll never see those faces again!\n*page_break [i]Move it![/i]\n\nThe junoesque matron smiles over the boiling cauldron. \"Although you look very different from one another…\" she says, \"…your problem is the same: each one of you has been cursed! And the curse that rests on your heads is a very powerful one!\"\n \nHer golden grin becomes eviler and eviler: \"[b]Are you ready to sacrifice something precious[/b] to save yourself? You know, Voodoo works this way: the greater the problem is, the greater the sacrifice it requires. And since you all came here at the same time, [i]your destinies are obviously linked[/i]. [b]You’ll have to answer unanimously[/b]: either each one of you will be saved, or each one of you will remain damned forever!\"\n \nA shiver goes down your spine. What does she mean with [i]something precious[/i]? You see everyone around wavers, tormented by doubt.\n \nYou look at the Lady: she looks very grim and menacing: she probably intends to tear your precious souls away from you all and store them in one of those filthy jars lining up the walls, damning you all for eternity!\n*fake_choice\n    #Becoming a princess is well worth losing my soul. I accept the deal!\n        *set Aristocrat %-10\n        \"I am ready to do whatever it takes!\" you shout, extending your right hand in front of you. You look your cursed comrades in the eyes: \"You all better agree, cause I'm NOT letting you walk away from here before my curse is lifted!\"\n    #Never make pacts with the devil! I refuse and walk away.\n        *set Aristocrat %+10\n        \"My soul is NOT for sale!\" you shout, turn around and walk away from them all.\n         \n        Two big, hairy hands block you and drag you toward the cauldron. Mr Gorilla's gaze is self-explanatory: either you agree with the Lady's terms or he'll break your arm. All other weirdos support the beast and blame your cowardly choice.\n         \n        \"Ok, ok! I am sorry!\" you sigh \"Let's do this together, but let's do it quick!\"\n \nOne by one, the other four weirdos agree to [i]sacrifice something precious[/i].\n \n\"Well\" Voodoo Lady smiles grimly \"seems like you all made up your mind. Come closer to the cauldron: we will start the curse-lifting [b]ritual[/b] right away.\"\n*page_break No turning back now.\n\n*temp hard 0\nThe formless, greenish liquid in the cauldron begins to bubble.\n \nYou feel somehow relieved: no matter how high the price to pay will be, soon this curse will be over and you'll be back to your [i]normal[/i] self.\n \n\"Now!\" Voodoo Lady shouts, \"Each one of you: throw AT LEAST one hundred pieces of eight into the cauldron!\"\n \n\"Blimey!\" gasps the ridiculous spokesman, gesticulating nervously \"That's quite a high price to pay!\"\n \n\"Don't be stingy!\" the Lady laughs \"The spirits of the Loa love generous people. And believe me, you all need the Loa's help now.\"\n*fake_choice\n    #This is only a dirty trick to lighten my purse! 50 pieces of eight will do.\n        *set Aristocrat %-10\n        *set Mojo %-20\n        *set Pieces_of_Eight -50\n        *set hard +1\n        [i]I won't fall for such a cheap trick![/i] you think.\n         \n        You wait for the right moment and stealthily throw only 50 pieces of eight in the cauldron.\n         \n        When the Lady stirs it, the liquid becomes suddenly blood-red.\n         \n        \"This is BAD!\" she mutters \"The Loa are VERY ANGRY tonight! Lifting your curse will be tougher than expected!\"\n         \n        You feel guilty and hope everything will be alright in the end.\n    #I obey the Lady and throw exactly 100 pieces of eight in the cauldron.\n        *set Pieces_of_Eight -100\n        You wait for your turn and throw 100 pieces of eight into the cauldron.\n         \n        \"Very well…\" says the Lady stirring the greenish liquid.\n    #I want the Loa to be VERY happy, so I throw ALL my money in the cauldron.\n        *set Aristocrat %+10\n        *set Mojo %+10\n        *set Pieces_of_Eight 0\n        When your turn comes, you empty your purse into the cauldron. The other four cursed comrades make fun of you calling you [i]squanderer[/i].\n         \n        When the Lady stirs it, the liquid becomes suddenly sky-blue.\n         \n        \"This in GOOD!\" she smiles \"The Loa are pleased by your offerings. Don't let them down!\"\n \n\n\"Now!\" Voodoo Lady shouts \"Each one of you: throw [b]something from your HEAD[/b] into the cauldron!\"\n*page_break WHAT?\n\nEveryone is puzzled.\n \n\"Don't look at me like that!\" says the Lady to the clueless Gorilla, who's scratching his head \"This is all I can tell you. Choosing the [i]right[/i] ingredients is part of your ordeal. Come on, go for it!\"\n \nThe old Mama Zouzou throws one of her earrings in the cauldron while Slash provides a couple of hair. Will Sparrow pinches some beard with a squeaky shout while the Gorilla throws his monocle in the cauldron and immediately replaces it with a new one.\n \nEveryone is waiting for you: what will you sacrifice in the cauldron? The REAL problem is: will you choose something gross or something painful?\n*fake_choice\n    #I gather all my courage, pull out some hair and throw it into the cauldron.\n        Following the undead rocker's example, you pull some of [i]this hated body's[/i] hair out. Your painful screams echo in the silent darkness. When you recover your breath, you drop the hair it into the cauldron. \n         \n        \"Very well…\" says the Lady stirring the greenish liquid.\n    #I lean over the cauldron and sprinkle some dandruff in it.\n        *set Aristocrat %+10\n        *set Mojo %-20\n        *set hard +1\n        [i]Better gross than painful![/i] you think, sprinkling dandruff into the boiling cauldron. \n         \n        When the Lady stirs it, the liquid becomes suddenly pitch-black.\n         \n        \"This is BAD!\" she mutters \"The Loa are DISPLEASED! Something must have angered them!\"\n    #I use my sword to shave this [i]irritating[/i] beard.\n        *set Aristocrat %-10\n        *set Mojo %+10\n        You unsheathe your sword and for the first time in your life, you [b]shave[/b]. It's a long and somehow painful experience that leaves countless cuts and scratches on the [i]hated face[/i] of the [i]pitiful body you are in[/i]. But in the end, you feel relieved as if you had a sort of revenge against that [i]bilge-sucker[/i] this body represents. With a vengeful smile, you drop all your facial hair in the cauldron. \n         \n        When the Lady stirs it, the liquid becomes suddenly sky-blue.\n         \n        \"This in GOOD!\" she smiles \"The Loa are pleased by your offerings. Don't let them down!\"\n \n\n\"Now!\" Voodoo Lady shouts \"The Loa demand [b]something from your dress[/b]!\"\n*page_break How inappropriate!\n\n\"Well, if that is what the Loa REALLY want…\" mutters the venerable Mama Zouzou \"…I have no choice but to undress!\"\n \n\"NO! STOP! FREEZE!\" everyone shouts at once, blocking the old crone before she could start any undressing attempt.\n \nVoodoo Lady explodes in a burst of laughter. \"Sink me! This is the funniest joke I've heard in a very long time! You don't need to undress, you just have to pick something from your [i]outfit[/i] and throw it in the cauldron!\"\n\nWhile the others drop gloves, boots and garments into the cauldron, you wonder what a suitable sacrifice would be. Not to mention the fact that you [i]hate[/i] being stuck in this body and having to wear this stupid, filthy but most of all [i]out of fashion[/i] pirate dress.\n*fake_choice\n    #I throw the linen handkerchief with grandpa's initials embroidered on it. \n        *set Aristocrat %-10\n        *set Mojo %+10\n        This is the PERFECT moment to get rid of that useless piece of cloth! You search your pockets, pick the handkerchief embroidered with your grandfather's initials and throw it with a grin of satisfaction into the cauldron.\n         \n        \"So long [i]Guy[/i], ye scabby sea bass!\" you enjoy every single word \"I'm one step closer to my former, TRUE self!\"\n         \n        When the Lady stirs it, the liquid becomes suddenly sky-blue.\n         \n        \"This in GOOD!\" she smiles \"The Loa are PLEASED by your offerings. Don't let them down!\"\n    #I blatantly remove the itchy, [i]male underwear[/i] I'm wearing and dump it into the cauldron.\n        *set Aristocrat %-20\n        You can't stand it anymore! You throw your boots away, you lower your trousers and, without feeling any shame, you finally remove your grandfather's woolen underwear. At last, you got rid of that itchy and flea-ridden piece of stinking wool! You will better off without it.\n                       \n        \"Very well…\" says the Lady stirring the greenish liquid while you put your outfit on again.\n    #I reluctantly remove a loose button from my pirate coat and throw it into the cauldron.\n        *set Aristocrat %+10\n        *set Mojo %-20\n        *set hard +1\n        [i]A true princess would NEVER ruin her gown, no matter what![/i] you repeat to yourself. Normally you would never commit such a crime against fashion but alas, this tremendous ordeal demands a dire sacrifice. Closing your eyes, you remove a button from the out of fashion coat you are wearing and, with a heavy sense of guilt, you reluctantly throw it into the cauldron.\n         \n        You know too well you'll never forgive yourself for this.\n         \n        When the Lady stirs it, the liquid becomes suddenly pitch-black.\n         \n        \"This is BAD!\" she mutters \"The Loa are DISPLEASED! Something must have angered them!\"\n \n\n\"Now!\" Voodoo Lady shouts \"Papa Legbà himself demands [b]a fluid from your body[/b]!\"\n*page_break Ewwww! So gross!\n\n\"Piece of cake!\" grins the undead rocker squeezing his entrails over the cauldron. A greenish ooze squirts from his rotten entrails, followed by a stinking shower of creeping insects.\n \nThe show is so disgusting that everyone throws up into the cauldron.\n \n\"That's not what I would have expected as a body fluid sacrifice…\" the lady shakes her head pitifully \"…but I guess it works nevertheless.\"\n \nWatching this disgusting scene shakes your stomach too and you soon feel the urge to vomit.\n*fake_choice\n    #I can't help but retch in the cauldron like all the others.\n        *set Aristocrat %+20\n        *set Mojo %-10\n        *set hard +1\n        The stench is unbearable! You try your best to remain impassible, but the foul show of your cursed comrades retching in the cauldron gives the fatal blow to your [i]lily liver[/i]. You rush to the cauldron and throw up.\n         \n        \"Easy guys!\" the Lady teases you \"We just need SOME fluids, not ALL your fluids!\"\n         \n        After about ten minutes spent coughing and retching, the ritual can finally resume.\n         \n        The liquid in the cauldron becomes suddenly forest-green.\n         \n        \"This is BAD!\" says the Lady \"The Loa are DISPLEASED! Something must have angered them!\" \n    #I resist the urge to vomit and simply spit into the cauldron.\n        *set Aristocrat %-20\n        The tour. You surely remember his stage name: the [i]Hummingbird[/i], don't you?\"\n \n\"I do remember!\" a tear runs down the old crone's wrinkled face \"My grandma Cathy rented him her world-famous glass-bottomed boat for the tour. I still sorely miss her: my dearest grandma Cathy!\"\n \nSobbing, the elegant Gorilla writes down on his notebook: [i]My grandpa Herman is lost at sea too.[/i]\n \n[i]This is quite odd…[/i] you wonder. All the \"important\" grandparents are lost at sea. Could this just be…\n*page_break ...a mere coincidence?\n\n\"Coincidence?\" Voodoo Lady laughs, \"There is no such thing as [i]coincidence[/i]. As I told you before, your five destinies are linked, [i]intertwined[/i]. The only hope to lift the curse weighing each of you is performing the ritual together.\"\n \n\"Together we started it… and together we're stuck!\" sighs Mama Zouzou. \"There is no way anyone of us could ever hope to pick anything from that precise grandparent's body. I'm afraid we're all doomed.\"\n \nVoodoo Lady remains silent for a minute, increasing your anxiety. Then, she closes her eyes and mutters some phrases in an unknown language.\n*page_break What is going on?\n\nA long, green python creeps out of the cauldron and coils around the Lady. Its forked tongue hisses near the woman's closed eyes.\n \nYou feel an unstoppable urge to scream and run away, but you know too well running away won't help.\n \n\"Rejoice!\" Voodoo Lady shouts, opening her eyes, \"The almighty Loa Simbi just told me that [i]someone[/i] among you [b]does have[/b] what you need. Something that belongs to her or his grandparent's body. Drop that [i]something[/i] in the cauldron, and the mighty Simbi will tell us how to properly fulfill the ritual and lift the curse!\"\n \n*label culprit\n*set meeting true\nYou look at each other, puzzled. You can tell from their faces that everybody's completely clueless. Why does this have to be so complicated? Can't the Loa simply tell us what they want and from whom e hiding something belonging to your grandparent behind your crazy gesticulations. Please, don't waste our precious time and drop it into the cauldron.\"\n         \n        Will laughs. He gathers all your cursed comrades around him and they start to confabulate.\n         \n        \"What the hell?\" you approach them, but they keep you at bay.\n         \n        After a minute, they seem to agree on something.\n         \n        Will points his finger at you and says: \"We sincerely believe that you, $!{name} , are the one the ritual needs.\"\n        *page_break Me? How come?\n    #I question the old crone.\n        *set Mojo %-10\n        *set Mama %-10\n        *set hard +1\n        \"Mrs Zouzou…\" you say, walking around the old crone.\n         \n        \"Miss Zouzou, please!\" she hisses, upset.\n         \n        \"Sorry, miss Zouzou.\" you apologize. \"Anyway, I think you are hiding something belonging to your grandparent with your voodoo magic. Please, don't waste our precious time and drop it into the cauldron.\"\n         \n        Mama Zouzou sighs. She gathers all your cursed comrades around her and they start to confabulate.\n         \n        \"What the hell?\" you approach them, but they keep you at bay.\n         \n        After a minute, they seem to agree on something.\n         \n        The old crone points her finger at you and says: \"We sincerely believe that you, $!{name} , are the one the ritual needs.\"\n        *page_break Me? How come?\n    #I question the undead rocker.\n        *set Mojo %-10\n        *set Slash %-10\n        *set hard +1\n        \"Mr Humming…\" you say, walking around the undead rocker \"I think you are hiding something belonging to your grandparent somewhere in that undead body of yours. Please, don't waste our precious time and drop it into the cauldron.\"\n         \n        Slash laughs. He gathers all your cursed comrades around him and they start to confabulate.\n         \n        \"What the hell?\" you approach them, but they keep you at bay.\n         \n        After a minute, they seem to agree on something.\n         \n        The undead rocker points his bony finger at you and says: \"We sincerely believe that you, $!{name} , are the one the ritual needs.\"\n        *page_break Me? How come?\n    #What if... I am the one?\n        *set Mojo %+10\n        You suddenly realize that this disgusting body you're in could not simply be 'a male body that looks like the one your hated grandfather had in his prime'.\n         \n        This could actually be your grandfather's body!\n         \n        If that's the case, whoever cast this evil spell on you must deeply hate you. There is only one way to know…\n         \n        \"Oh mighty Lady\" you ask, trembling, \"Could it be that this body of mine is…\"\n        *page_break My missing grandfather's body?\n   \n\"You finally realized it.\" Voodoo Lady grins \"$!{name}, a mighty curse caged the refined lady you were into your grandfather Guy's pirate body. This means the body you're in counts as your grandfather's body for the ritual's sake.\"\n \nEveryone looks at you. You clearly realize your comrades are, at the same time, sorry for you but happy for the ritual.\n \nVoodoo Lady beckons you: \"So, $!{name}, step forward and drop in the cauldron something from [i]the body you're caged in[/i].\"\n \nThe Lady's words strike you deeply. Sadness and desperation make your legs tremble and bring tears to your eyes. You lean over the cauldron and shed some tears into the boiling greenish liquid.\n \nAre those [i]your[/i] tears or [i]your grandfather's[/i] tears? Are you sad or is he sad? Are these feelings yours or do they belong to your hated grandparent?\n*page_break I feel I'm going crazy!\n\nThe cauldron suddenly increases its boiling until a giant rattlesnake's head emerges from the formless liquid. Blocked by terror, you stand still while the huge snake rises before you, opening wide its jaws, dripping with green
