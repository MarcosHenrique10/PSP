d feel comfortable with me.\n    #And I've got a little TIP for you, get the POINT?\n    #Yeah, too bad no one's ever heard of YOU at all.\n    #So you got that job as jinxer, after all.\n\n\n*set Name \"Guybrush\"\n*set Salutation \"Captain, Sir\"\n*set Mojo 15\n*set Charm 73\n*set Wit 26\n*set Aristocrat 40\n*set Pieces_of_Eight 2\n*set Ships \"Flying Dutchman\"\n*set Mama 40\n*set Sam 70\n*set Slash 65\n*set Will 35\n*set Crew_Name \"Loavengers\"\n*set davyjones false\n*set gold true\n*comment interaction parameters\n*set meeting true\n*set grandparent \"Guy\"\n*script changeBackgroundColor(\"black\")\n\n*comment NOW IT BEGINS\n*set Special_Items \"Nautical Map\"\n\nYou're on the main deck admiring sunset. You can feel the magic in the air. This will be a moment you'll forever remember and you feel the unstoppable urge to spend it with a special person. Who will you spend this moment with?\n*fake_choice\n    #I wish to spend this special moment with old Laura. I miss her wrinkly skin and her toothless grin.\n    #I'd love to have Sam the gorilla by me now. I want to be hugged by his huge, hairy arms.\n    #I am looking forward to have a special moment with Matthew, the undead. We will rot forever together.\n    #All I want in this moment is Will. I love his ridiculous gesticulations!\n    #I would rather enjoy this magic moment alone.\n\n\n*set Name \"Andrea\"\n*set Salutation \"Captain, Madam\"\n*set Mojo 5\n*set Charm 15\n*set Wit 70\n*set Aristocrat 10\n*set Pieces_of_Eight 9754\n*set Ships \"None\"\n*set Mama 10\n*set Sam 30\n*set Slash 50\n*set Will 80\n*set Crew_Name \"Bilge Suckers\"\n*set davyjones false\n*set gold true\n*comment interaction parameters\n*set meeting true\n*set grandparent \"Guy\"\n*script changeBackgroundColor(\"sepia\")\n\n*comment NOW IT BEGINS\n*set Special_Items \"Nautical Map\"\n\n\"You could sail this puppy away TODAY...\" Dan smiles, \"...for just 10000 Pieces of Eight.\"\n\nYou remain silent, wondering.\n\"I know,\" Dan continues, \"It's a lot of money. Why don't you consider our [i]Why Buy[/i] offer? Sell your souls to Davy Jones and save your money! If you did, you could save all your money and use it wisely. One never knows what could happen during a daring expedition: if I were you, I'd save my money and use it to solve unexpected contingencies.\"\n\n*fake_choice\n    #We all are already cursed and doomed. I sign the parchment and accept the [i]Why Buy?[/i] offer.\n    *selectable_if (Pieces_of_Eight >= 10000) #I buy the ship with full-optionals. Let's stay safe.\n    #Let's talk about the ship's expensive extras. I probably don't need them.\n    #I am going to dig up a treasure and come back with more money.\n\n\n\n*set Name \"Alex\"\n*set Salutation \"Captain, Madam, Sir\"\n*set Mojo 65\n*set Charm 50\n*set Wit 40\n*set Aristocrat 70\n*set Pieces_of_Eight 846\n*set Ships \"Beautiful Siren\"\n*set Mama 30\n*set Sam 90\n*set Slash 5\n*set Will 60\n*set Crew_Name \"Odd Defiers\"\n*set davyjones false\n*set gold true\n*comment interaction parameters\n*set meeting true\n*set grandparent \"Guy\"\n\n*comment NOW IT BEGINS\n*set Special_Items \"Lost treasure Map\"\n\n[i]Oh my God![/i] You are shocked. [i]This poor lady mistook me for my grandfather who promised to marry her and never did![/i]\n*line_break\n\"Sorry, lady.\" you reply, awkwardly, \"I really wish I could help you, but…\"\n*line_break\n\"[i]Lady[/i]?\" She goes mad. \"Can't you even recall my name?\" She turns to your crew and says: \"You are my witnesses! Today, I, Flora [i]Burning Flower[/i] Burns, will have my revenge on the filthy cheater standing here: Beardless Brushwood! I challenge you to a formal duel, son of a biscuit eater. Let's settle this here and now!\"\n*page_break A duel!\n\nYou are in a big fix. Deep inside you, you feel this woman is right, and you'd never want to harm her in any way. Then again, you have to solve this matter fast, or the curse looming on you will take over.\n\nYour crew members look at you, waiting for your decision.\n*fake_choice\n    #Laura, use your Voodoo magic to calm her!\n    #Sam, knock her (gently!) out with your gorilla strength!\n    #Slash, show her you are a zombie and scare her away!\n    #This lady is right. Will, please, make due arrangements for our marriage!\n    #I will face her in a duel. I must solve my granddad's problems again!\n\n\n*set Name \"Morgan\"\n*set Salutation \"None\"\n*set Mojo 50\n*set Charm 50\n*set Wit 50\n*set Aristocrat 50\n*set Pieces_of_Eight 67\n*set Ships \"None\"\n*set Mama 5\n*set Sam 5\n*set Slash 5\n*set Will 5\n*set Crew_Name \"Pirates Wannabes\"\n*set davyjones false\n*set gold true\n*comment interaction parameters\n*set meeting true\n*set grandparent \"Guy\"\n\n*comment NOW IT BEGINS\n*set Special_Items \"Out of fashion pirate clothes\"\n\nThe Voodoo Lady exclaims: \"The best captain would probably be the one who's got the highest Mojo or the one who contributed most offerings to my cauldron. Each one of you will vote: the one who gets the highest number of preferences will be the captain. Choose wisely, or you will never fulfill this ritual, and I won't be able to collect your money from the cauldron.\"\n*line_break\nEveryone looks puzzled. Who should you vote as your captain?\n*fake_choice\n    #I vote for Slash, the undead rocker.\n    #I vote for Will Sparrow. He'll keep up the morale of the crew with his funny demeanor.\n    #I vote for Mama Zouzou, the Voodoo witch. We need her guidance.\n    #I vote for me! These landlubbers won't stand any chance by themselves.\n    #I vote for Sam, the Gorilla. We need a big and mean captain!\n", "startup": "*title Pirates of Donkey Island\n*author Gilbert Gallo\n*scene_list\n  startup\n  02_voodoo_lady\n  03_scum_bar\n  $ 04_cartographer\n  $ 05_dan01\n  $ 06_circus\n  $ 07_dan02\n  $ 08_island\n  $ 09_finale\n  ending\n\n*comment prova\n  \n*create Name \"Unknown\"\n*create Surname \"Brushwood\"\n*create Salutation \"Unknown\"\n*create Mojo 75\n*create Curse 25\n*create Charm 50\n*create Brawns 50\n*create Wit 50\n*create Dread 50\n*create Aristocrat 90\n*create Pirate 10\n*create Pieces_of_Eight 132\n*create Special_Items \"None\"\n*create Ships \"None\"\n*create Title \"\"\n*create Mama 10\n*create Sam 10\n*create Slash 10\n*create Will 10\n*create Crew_Name \"Average Joes\"\n*create davyjones false\n*comment interaction parameters\n*create meeting false\n*create friend1 \"Nobody\"\n*create suspect1 \"Nobody\"\n*create grandparent \"None\"\n*comment ship parameters\n*create safety 99\n*create gold false\n*comment Achievements\n*create ACON false\n*create deathmode false\n*create hardmode false\n*create flawless 0\n*create puzzle 0\n*comment ALL ACHIEVEMENTS START HERE!!!\n*achievement acon visible 1 Achievements ON\n    Turn on the Achievements feature\n    The Achievements Pop Up feature is on!\n*achievement hard01 visible 10 Hard mode ON\n    Start your adventure with a low Mojo score.\n    You started your adventure with a low Mojo score. You'll need all your wits to survive!\n*achievement hard02 visible 30 Death mode ON\n    Start your adventure with the lowest possible Mojo score.\n    Since you started the adventure with the lowest possible Mojo score, you won a coffin with your name engraved on it. \n*achievement flaw01 visible 5 My tongue is sharper than any sword!\n    Score three correct comebacks in a row in your first Insult Sword Fighting duel against Smelly Shelly.\n    Congratulations! You scored three correct comebacks in a row in your first Insult Sword Fighting duel.\n*achievement flaw02 visible 10 My name is feared in every corner of this island!\n    Score seven correct comebacks in a row in three different Insult Sword Fighting duels.\n    Congratulations! You scored seven correct comebacks in a row in three different Insult Sword Fighting duels.\n*achievement flaw03 visible 25 My enemies run away at the first sight of me!\n    Score ten correct comebacks in a row in four different Insult Sword Fighting duels.\n    Congratulations! You scored ten correct comebacks in a row in four different Insult Sword Fighting duels.\n*achievement flaw04 visible 50 My sword is famous all over the Caribbean!\n    Score fifteen correct comebacks in a row in five different Insult Sword Fighting duels.\n    Congratulations! You indeed are a flawless Insult Swordmaster!\n*achievement puzzle01 visible 5 Puzzle enthusiast\n    Break no sweat obtaining the Wheel of Fortune's winning number.\n    Congratulations! You flawlessly solved the Lagrange family puzzle!\n*achievement puzzle02 visible 10 Puzzle pro\n    Effortlessly solve two difficult conundrums in a row.\n    Congratulations! You flawlessly solved two challenging puzzles in a row! Way to go!\n*achievement puzzle03 visible 25 Memory Master\n    Remember every single and apparently useless detail about your crew members.\n    Congratulations! You perfectly solved three tricky puzzles in a row and nailed the Trial of Memory!\n*achievement puzzle04 visible 50 Puzzle overlord\n    Perfectly solve all major puzzles in this game.\n    Nothing compares to your peerless puzzle solving skills!\n*achievement sellall visible 30 Why buy?\n    Get a ship without spending money.\n    You sold your crew members' souls to get a ship, and you don't regret it!\n*achievement noextra visible 20 Better sorry than safe!\n    Remove all safety features from your ship.\n    You removed all safety features from your ship. What if a storm comes?\n*achievement redempt visible 20 Fiery redemption\n    Even the worst enemies could redeem themselves. Or not?\n    You made the ghost pirate LeChic cry fiery tears and ask for your forgiveness.\n*achievement ghostbusters visible 50 Ghostbusters\n    You can't win against a ghost. Better run for your life!\n    You finally put an end to the ghost pirate LeChic's cursed existence.\n\n*comment RO ACHIEVEMENTS\n*achievement samlove visible 50 Primate lifemate\n    Follow your heart, ignoring differences in species.\n    Congratulations! You and professor Sam, your gorilla soulmate, decided to spend your lives together in the cursed bodies that ignited your passion.\n*achievement lauralove visible 50 Ageless love\n    Follow your heart, ignoring age differences.\n    Congratulations! You and your senior soulmate Laura decided to spend your lives together in the cursed bodies that ignited your passion.\n*achievement mattlove visible 50 Eros and Thanatos\n    Follow your heart, defying death.\n    Congratulations! You and your undead soulmate Matthew decided to spend your lives together in the cursed bodies that ignited your passion.\n*achievement davylove visible 100 Eternally damned lust\n    Follow your heart down into damnation!\n    You and Davy Jones will consume your wicked lust for eternity on the Flying Dutchmen.\n*achievement willove visible 50 Ridiculously in love\n    Follow your heart, transcending stereotypes.\n    Congratulations! You and your funny soulmate Will decided to spend your lives together in the cursed bodies that ignited your passion.\n*achievement bridelove visible 50 The faithful bride\n    Stay true to your original purpose until the end!\n    Congratulations! You re-acquired your original body, and you re-conquered prince Alfred's heart!\n*achievement moneylove visible 50 Filthy rich carouser\n    Who needs a soulmate when you got tons of money?\n    After such an adventure, you decided to squander all your money enjoying life at its fullest: carousing night and day!\n*achievement grandpalove visible 50 Pirate legacy\n    Like grandfather, like grandchild.\n    After such an adventure, you sailed the seas again, side by side with your grandfather Guy.\n    \n*comment ENDING ACHIEVEMENTS\n*achievement again visible 5 Shall we start all over again?\n    Why would you watch end credits more than once?\n    You actually watched end credits at least twice. You have a lot of free time indeed!\n*achievement endgame hidden 1 Congratulations, you finished the game!\n    hidden\n    This achievement officially certifies you ended this game in a 'positive' way. Brag about it all you want!\n*achievement multiple visible 100 Game lover\n    Finish this game in a 'positive' way more than once.\n    You finished this whole game more than once in a positive way. We love you as much as you love this game!\n    \n\n*comment *sm_init backmonkey | 3\n\n*comment *finish\n\n*if choice_is_omnibus_app\n    *comment skip description\n\n    *goto purchased\n*check_purchase adfree\n*if choice_purchase_supported and not(choice_purchased_adfree)\n    A terrible curse ruined your royal wedding, placing your soul into your pirate grandfather's body. To lift it, you must lead a crazy crew through countless hilarious challenges in this adventure inspired by Monkey Island and Pirates of the Caribbean.\n\n    [i]Pirates of Donkey Island[/i] is a funny, 79,000 word interactive swashbuckling novel by Gilbert Gallo, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\n    A gorilla gentleman, an undead rocker, a fast-aging Voodoo crone, and a ridiculous spokesman. These will be your only companions in the most incredible journey of your life. Every member has a peculiar story, and their experiences/interactions will help you determine your final, authentic self.\n\n    After dozens of insult-sword fighting duels, grog contests, and rigged wheels of fortunes, you will eventually look at life from an entirely different perspective.\n    With your crew's help, you'll discover the truth about your hated pirate grandfather. Will you then embrace your cursed condition or fight against your doom?\n\n    • Decide your main character's body and orientation during the game. Will you end up being male, female, or non-binary? Gay, straight, or asexual? It's up to you to decide.[n/]\n    • Live the cursed swashbuckler's life! Will you look for a way to lift your curse or enjoy your damned existence until the afterlife?[n/]\n    • Find romance with a hairy, mighty gorilla or spend your life together with a zombie. Or will you prefer to date a venerable, wrinkly, and toothless lady?[n/]\n    • Lead a motley crew of cursed people and use their incredible powers to uncover the Cursed Caribbean's mysteries.[n/]\n    • Engage your opponents in hilarious insult-sword-fighting duels![n/]\n    • Will you cherish your crew members as a respected leader, or will you betray them for gold, selling their souls to Davy Jones? [n/]\n\n    Stop waving your sword like a feather duster and sail the Cursed Caribbeans to discover the ultimate treasure: your true self!\n\n    *if choice_prerelease and not(choice_is_ios_app)\n        [i]You can play the first three chapters of the game for free today. The rest of the game will be available on ${choice_release_date}.[/i]\n\n        *choice\n            #Sign up to be notified when the game is available.\n                *subscribe {\"now\": true}\n                *restart\n            #Play the first three chapters now for free.\n                *goto purchased\n\n    [i]You can play the first three chapters of the game for free. Purchase the rest of the game below.[/i]\n    *if choice_is_advertising_supported\n        [i]Purchasing the rest of the game will also turn off in-game advertisements.[/i]\n\n    *purchase_discount adfree 2021-07-29 $3.99 $2.99 purchased\n    *if choice_is_advertising_supported\n      *page_break_advertisement\n    *if not(choice_is_advertising_supported)\n      *page_break Play Now for Free\n\n\n*label purchased\n\n\n*label ACONOFF\n*image 00_welcome.png center Welcome to this crazy adventure!\nWelcome!\n\nYou are about to start an incredible adventure featuring [i]pirates[/i], crazy [b]puzzles[/b], [i]voodoo curses[/i], [b]insult sword fighting[/b], puny [i]pranks[/i] and countless [b]hilarious situations[/b].\n\nThis interactive adventure is a [b]heartfelt fan tribute[/b] to the following masterpieces/franchises/rock bands:\n\n*link https://en.wikipedia.org/wiki/Monkey_Island_(series) Monkey Island (series)\n\n*link https://en.wikipedia.org/wiki/Pirates_of_the_Caribbean_(film_series) Pirates of the Caribbean (film series)\n\n*link https://en.wikipedia.org/wiki/One_Piece One Piece (manga)\n\n*link https://en.wikipedia.org/wiki/Guns_N%27_Roses Guns N' Roses (hard rock band)\n\nIf you like this game, please consider buying/supporting the original masterpieces that inspired it! They will undoubtedly inspire you too!\n\nBefore we start, please let us know if you'd like to experience this interactive story with the [b]Achievements[/b] feature activated or without it.\n\n*choice\n    #Please explain to me what Achievements are.\n        Achievements are a fun way to reward you for noteworthy feats or accomplishments within the game. For example, solving puzzles or mysteries, overcoming or otherwise surviving especially tough challenges, uncovering 'hidden' elements or hard-to-discover routes, or perhaps merely for doing something funny or hilarious.\n        \n        Collecting as many achievements as you can and aiming for the highest score is the easiest way to enjoy every single detail of this multiple-choice adventure!\n        \n        If you turn the [b]Achievements Feature on[/b], a new window will [b]pop up[/b] every time you collect a new achievement during your adventure. Hardcore gamers love this feature!\n        \n        If you turn this feature [b]off[/b], you will experience a more immersive, focused experience [b]without Achievements windows popping up[/b]. This way, you can completely ignore achievements.\n        *page_break Okay, I got it.\n        *goto ACONOFF\n    #No, thank you. I'd instead enjoy the story without achievements windows popping up on the screen.\n        Perfect. \n        \n        Enjoy this game in a full-immersive way!\n        \n        *page_break Let's start!\n        *goto start\n    #Yes, please. I like Achievements, and I want to immediately know when I score one.\n        *set ACON true\n        As you wish. \n        \n        The Achievements Pop Up Feature is now turned on.\n        \n        *page_break Let's start!\n        *goto start\n\n*label start\n*if (ACON)\n    *achieve acon\n    \n*image 01_curse.png center Chapter one: the curse.\n\nThe [b]curse[/b] weighs like an unbearable burden on you.\n \nThis body you're [i]in[/i] confuses you: you don't recognize it as yours, and you can't stand the hateful name associated with it: [b]\"Guy\"[/b].\n \nYou want to know what happened to your former self, and you are ready to do whatever it takes.\n \nAfter a terrifying journey aboard a rickety coffin-shaped boat, you finally come to the heart of Scuffle Island’s rotten swamp: the skull-shaped dwelling where the (in)famous [b]Voodoo Lady[/b] lives. Now that you are closer, the shaft looks even more frightening. Shivers creep up your spine: are you definitely sure you want to enter it?\n*choice\n    *selectable_if (Mojo >97) #No way! I am turning heels and going home instead!\n        *goto enterhut\n    #Alas, running away would only extend my sufferings.\n        You truly wish you could turn your back to the skull shaped shaft. But reality hits hard on you. If you go away now, you will never be able to lift this curse. You have no choice but to enter.\n        *set Wit %-10\n        *page_break What will await you?\n        *goto enterhut\n    #I bet the inside looks better than the outside.\n        Cheering up, you unsheathe your best smile and open the door. You are a step closer to lifting your curse!\n        *set Wit %+10\n        *page_break Smile!\n        *goto enterhut\n        \n\n*label enterhut\nYou gather your courage and step inside, entering a large, vaguely circular room. The walls are covered with shelves full of disgusting flasks and lit black candles, giving the place an even more ominous look. You sit down on a bench, feeling dizzy and confused under the gaze of thousand weird creatures sealed in the voodoo jars lining the walls. Too many weird things happened too fast. You need to focus on reality or you'll drown deep into insanity. Let's start from the beginning: your name is…\n*choice\n    #Gaya.\n        Gaya, Gaya Brushwood. Repeating your name helps you stay focused.\n        *set Name \"Gaya\"\n        *page_break You feel better now.\n        *goto waitingroom\n    #No way, thats'not my name!\n        Don't worry and stay focused.\n        *label input_name\n        Try to remember your name\n        *input_text Name\n        Now you get it! Your name is $!{name}, right?\n        *choice\n           #Yes.\n               Perfect. Let's stay focused.\n               *set Name \"$!{name}\"\n               *page_break You feel better now.\n               *goto waitingroom\n           #No, not exactly.\n               *goto input_name\n       \n*label waitingroom\nThe room you are in looks like a [i]waiting room[/i] of some kind. A huge wooden door under an ominous \"Voodoo Lady\" sign lies opposite of your bench. Next to the door a [b]noisy parrot[/b] keeps repeating the same sentence:\n \n[i]Braaak! Voodoo Lady is busy! Braaak! Stay quiet! Braaak! Wait! Braaak! Rushing Voodoo is dangerous![/i]\n \nYou finally realize you are not alone: [b]four weird people[/b] sit on benches next to you. You are pretty sure you never saw them before, nevertheless you feel a [i]weird sense of affinity[/i] with each one of them.\n*page_break This is curiously odd.\n*temp conversations\n*set conversations 0\n*goto waitingroom2\n\n*label waitingroom2\nFour [i]weirdoes[/i] are waiting with you in the room: a [b]Gorilla[/b] reading a book, a gloomy [b]Gentleman[/b] sighing alone in a corner, an old [b]Crone[/b] muttering to herself and a [b]Zombie[/b]-looking rocker.\n \nTime passes… But nothing happens. Why is this taking so long?\n \nYou HATE waiting. That noisy parrot repeating [i]Stay quiet![/i] and [i]Wait![/i] is getting on your nerves. Perhaps talking with these [i]people[/i] will ease your anxiety.\n*choice\n    *disable_reuse #Talk with the [b]Gorilla[/b].\n        When you approach the guy, you suddenly realize he's NOT wearing a carnival dress: you are facing an [b]actual GORILLA[/b]! The huge beast stops reading and stares at you through its monocle.\n         \n        You smile the best way you can, hoping you didn't upset him. While you hope he will spare your life, you can't help but notice he's dressed like a distinguished gentleman.\n        *page_break Please, Mr. Gorilla, spare me!\n        *goto gorilla2\n\n    *disable_reuse #Talk with the [b]Gentleman[/b].\n        As you get near him, the man immediately stands up and smiles.\n         \n        \"You recognized me, didn't you?\" he winks \"Yes! I am THAT Will Sparrow you're looking for. How can I help you?\"\n         \n        The guy gesticulates in a silly way and his voice is very high-pitched. If you ever met someone like him, you would definitely remember him.\n        *page_break What's your name again?\n        *goto gentleman2\n\n    *disable_reuse #Talk with the [b]Crone[/b].\n        Approaching the old woman, you realize she's in the middle of a complex Voodoo ritual. A blood-red circle is drawn on the floor in front of her and she's performing some sort of divination spell using chicken bones. All of a sudden, she stops her chanting and she turns to face you.\n         \n        \"They call me [b]Mama Zouzou[/b].\" she says, looking deep into your eyes \"I see you have a very bad curse weighing on you. Let me see if I can be of help…\"\n        *page_break How could she tell?\n        *goto crone2\n    \n    *disable_reuse #Talk with the [b]Zombie[/b].\n        As you come close to him, the rocker starts playing his guitar and sings:\n         \n        [i]I'm an undying bungle[/i]\n         \n        [i]I had fun 'n games[/i]\n         \n        [i]I had everything you want[/i]\n         \n        [i]Honey you know the names[/i]\n         \n        Hey, wait a minute. This is one of your favorite songs! You don't believe your own eyes, this guy is… \n        *page_break Your favorite band's guitarist!\n        *goto rocker2\n        \n    *if (conversations =4) #All these weird conversations make me think about [b]my own curse[/b]...\n        *goto gaya2\n\n*label gorilla2\nWithout uttering a single word, the Gorilla searches his elegant vest and gives you a business card. It reads: [i]Prof. [b]Sam Rottentooth[/b], Biblos Island's Librarian[/i].\n \nWhat the… This beast has a human name? It can actually read and write? And someone actually hired it as a librarian? This is nonsense!\n \nThe Gorilla stares at you with very deep and intelligent eyes: obviously, he cannot speak. You smile, bow and run back to your seat before he decides to smash you under one of his huge fists. The Gorilla shrugs and continues reading his book: [i]Advanced Math Theories[/i].\n*set Charm %-10\n*set conversations +1\n*page_break Unbelievable!\n*goto waitingroom2\n\n*label gentleman2\nThe gentleman cannot believe his ears.\n \nHe's nervous, and his voice goes up a tone: \"You surely know me: [b]Will Sparrow[/b], spokesman on behalf of his highness the Governor of Fluffy Island!\". His gesticulations become faster and more intense.\n \nYou try your best to remain serious, but this guy's behavior is way too ridiculous. The way he speaks and the way he moves make you unwillingly explode in a burst of laughters.\n \n\"You filthy scum!\" Will is very upset \"You'll regret this! The day I'll get my job back you'll be hanged in central square!\" You feel very sorry inside, but you cannot stop laughing at his ridiculous moves.\n*set Charm %+10\n*set conversations +1\n*page_break You sit, chuckling.\n*goto waitingroom2\n\n*label crone2\nShe tosses her chicken bones on the floor…\n \n\"Unbelievable…\" she sighs, collecting her bones \"…never seen a curse like this before! Even [i]the one weighing on me[/i] seems a piece of cake if compared to yours.\"\n \nYou stagger. What the hell? A [i]cursed[/i] Voodoo witch?\n \n\"I'd LOVE to help you out, my dear…\" the old crone caresses your face \"But in this miserable condition I cannot lift such an evil curse. Every passing day I get older and weaker… It must me a side effect of the last love potion I brew…\"\n \nYou suddenly feel in great danger standing next to her: what if her [i]side effect[/i] is contagious? You politely take your leave.\n*set Mojo %+10\n*set conversations +1\n*page_break Better safe than sorry!\n*goto waitingroom2\n\n*label rocker2\nOh my God, he's [b]Slash[/b]! He plays the guitar in your favorite band: the [b]Guns 'n Posers[/b]. But why is he dressed like a zombie?\n \n\"Sorry to let you down, but this is no makeup…\" the man's eerie voice is unsettling \"My body is actually rotting!\"\n \nHe lifts his t-shirt up and shows you a greenish, rotting ribcage. A putrid stench comes out his entrails while his decayed smile gives you the shivers. You do your best to hold back the urge to vomit when he starts singing again:\n \n[i]Fun is over… Cause grog gives me NO hangover![/i]\n \n[i]Drugs don't work on me no more… Like seawater on a shore![/i]\n \n[i]I alway feel cold… And very very old.[/i]\n \n[i]Since I cannot make love, now I am pure like a dove.[/i]\n \n[i]I am a f**kin' undead: I crave the sweet brains in your head![/i]\n \nYou run away frightened before your zombie idol decides to actually crack your head open! You thought your condition was hard to beat, but now you definitely changed your mind.\n*set Wit %-10\n*set conversations +1\n*page_break Something weird is going on!\n*goto waitingroom2\n\n*label gaya2\nFacing those four [i]people[/i] and their absurd situations bring back memories of your recent past…\n \nYou sit on the bench head in your heads and while the parrot squawks, your memories resurface from the depths of your conscience.\n \nYour name is $!{name} and since you were twelve years old [i]you knew very well who you wanted to be: [b]a princess![/b][/i] You got the best possible education and you attended the most exclusive royal parties in order to pursue your greatest ambition: marrying Alfredo Serrano Domínguez Cuenca y Pérez de Vargas, 1st Duke of la Torre, Grandee of Spain, Count of San Antonio.\n \nFor you, he's simply [b]prince Alfred[/b], your betrothed.\n \nOne week ago, at the age of eighteen, the day when your desire was to be fulfilled finally came…\n*page_break The day of your royal wedding!\n*goto gaya3\n\n*label gaya3\nWhen you woke up on that fateful day, you sadly realized something very bad happened to you.\n \nYou were not in your [i]usual[/i] body, but in a MALE body of a guy that vaguely resembled you: blue eyes, fair hair tied in a small ponytail and a swashbuckler's smile.\nYou immediately summoned the only one person who's wise and dependable in your family: your grandmother [b]Helena[/b]. The moment she saw you, she told you that [i]you looked exactly like your missing grandfather [b]Guy[/b][/i] in his prime. Evidently, at least one of the countless envious spinster flirting with prince Alfred must have cast a [b]bad curse[/b] on you, on the very day of your wedding!\n \nYou cried, cursed and shouted until you finally realized you had to make a very important decision: would you cancel the wedding or not?\n*choice\n    #I would find a polite and suitable excuse to postpone the wedding.\n        *goto gayaexcuse\n    #I'd rather make something up and get married no matter what.\n        *goto gayafakemarriage\n\n*label gayaexcuse\n*set Aristocrat %+20\nYou could not stand the idea of your beloved Alfred seeing you in that [i]unusual[/i] condition. Asking your grandmother's advice, you finally decided to pretend a [b]terrible illness[/b] struck you.\n \nYour grandmother spread the terrible news the black plague struck you, and thus the marriage was canceled. Hopefully, this would buy you enough time to figure out a way to lift this terrible curse.\n \nYou spent the next three days trying all sort of medicines, doctors and voodoo practitioners you knew, but to no avail. Then, your grandmother remembered a name: [b]Voodoo Lady[/b], an old \"friend\" of your missing grandfather Guy. She's your last hope. You bought a passage to Scuffle Island, hoping to finally lift this curse and to fulfill your princess dream.\n \nIt's been seven days now since you canceled your marriage and you're still stuck into your hated grandpa's body. But a far worse problem torments you: will Alfred wait for you to recover from your \"illness\" or will he choose a different, healthy bride?\n*page_break Alfred wait for me!\n*goto itstime\n\n*label gayafakemarriage\n*set Aristocrat %-20\nYou have waited ALL YOUR LIFE for that moment. No matter what, you would marry Alfred! If you became his bride, he would surely help you to find a way to lift this curse.\n \nHelped by your grandmother, you put your wedding dress on, you wore the best possible makeup to pretend nothing happened, and you covered your face with the wedding veil. Everything was going fine until Lucy, a prankster bridesmaid, pulled your wedding veil away. At that very moment, everyone in the church believed prince Alfred was about to marry an (in)famous pirate!\n \nYou barely escaped the guards who immediately chased after you to put you in jail. Left alone on the altar, Alfred thought you made a prank to him because you didn't love him. Your families are now fighting to determine whose fault it is that the marriage didn't take place.\n \nThe situation was too hot: you had to flee away as soon as possible. Your grandmother remembered that she knew the name of the best Voodoo practitioner of the Caribbean: [b]Voodoo Lady[/b], an old \"friend\" of your missing grandfather Guy. She's your last hope. You bought a passage to Scuffle Island, hoping to finally lift this curse and to find a way fulfill your princess dream.\n \nIt's been seven days now since your marriage went down the drain and you're still stuck into your hated grandpa's body. But a far worse problem torments you: will Alfred still marry you when you'll be back or will he prefer a different bride?\n*page_break Alfred wait for me!\n*goto itstime\n\n*label itstime\n[i]BRAAAK![/i]\n \nThe parrot's squawking brings you back to reality.\n \n[i]Braaak! Get up, lazy asses! Braaak! Voodoo Lady is waiting! You may enter her room.[/i]\n \nYou stand up and see the other guys quarreling about who's supposed to go in first. You sadly realize you're supposed wait until the last one of them has been received by Voodoo Lady.\n*choice\n    #I sit down and patiently wait for my turn.\n        No point in trying something sneaky: you would only anger the parrot and the Lady. You sit down on your bench and watch the four strangers quarreling.\n         \n        *set Aristocrat %+20\n        *goto opendoor\n    #I sneak past them and get into the room first.\n        You take advantage of the four weirdos quarreling and silently sneak past them. The sooner this curse ends, the better.\n         \n        *set Aristocrat %-20\n        *goto opendoor\n    \n*label opendoor\n[i]BRAAAK! AVAST YE![/i]\n \nThe parrot's squawking freezes everybody in the room.\n \n[i]Braaak! Get ALL your lazy asses into the room. Do you get it? All of you at once! Braaak! Move it up![/i]\n \nAll at once? This would certainly be the swiftest way to solve your issues, but you don't like the idea of speaking about your [i]problems[/i] in front of strangers, especially if they are such dangerous-looking weirdos. Judging from their puzzled faces, you guess everyone around you thinks the same.\n*page_break This is awkward!\n*goto opendoor2\n\n*label opendoor2\n[i]Braaak! Filthy scum, you wanna face Voodoo Lady's wrath? Move it up, or she'll turn you all into toads![/i]\n \nThe big door slowly opens before you, revealing a room as dark as a deep abyss in the middle of the night. Slash, the zombie rocker, is the first one to go in, singing [i]Knocknin' on Heaven's Door[/i]. Mama Zouzou follows him one step at a time at a very slow pace.\n \n\"After you, my liege.\" Will Sparrow crazily gestures you to go first, but he's unwillingly lifted over the shoulders of the humongous Gorilla. Together with the screaming gentleman, the giant beast dives into the room's silent darkness.\n \nYour inner self screams and wants to run away from this eerie place. But you know too well you can't miss this chance, frightening as it might be. This is the only hope left for you to regain your former body and fulfill your dream. Embracing your courage, you cross the fearful threshold and disappear into the dark room.\n\n*finish Alfred, I'm doing this for you!", "treasure": "Suddenly, you have the ominous feeling that [b]something very bad is about to happen[/b].\n \nAll your coins, jewels and gems move on their own and fly back to the treasure mountain.\n\nYour movements become numb, and a golden color slowly engulfs your body. Terrified, you see that the same thing is happening to every single member of the $!{Crew_Name}!\n \nYou feel smaller and smaller.\n \nAn irresistible force pulls you all towards the treasure mountain.\n\nPowerless, you all succumb to transforming into small, golden statuettes perfectly lined up at the base of the treasure mountain.\n \nYour story ends here, forever trapped into a little golden statuette representing your hated grandfather.\n*goto_scene ending", "true_ending": "*check_achievements\n*if ((ACON) and not (choice_achieved_multiple))\n    *goto end01\n*else\n    *goto noachievements\n\n*label end01\n*check_achievements\n*if ((ACON) and (choice_achieved_endgame))\n    *achieve multiple\n    *goto noachievements\n*else\n    *achieve endgame\n    *goto noachievements\n\n*label noachievements\nCongratulations! You've made it to one of the possible endings of this text adventure: [i]Back to Donkey Island[/i]. We hope you enjoyed it and on behalf of our whole staff: \n\n[b]THANK YOU VERY MUCH for PLAYING WITH US![/b]\n\n*label again\nOkay, enough playing text adventures now! Do something useful instead!\n\nFor example, play squash.\n\nOr wash your car.\n\nOr make dinner.\n\nOr take part in a funky band.\n\nOr travel to a foreign country.\n\nOr become President of the Republic. \n\nOr talk to a member of the opposite sex.\n\nOr lube your car.\n\nOr cook a fried sausage.\n\nOr…\n\n*page_break Look for buried treasure. \n\nOr milk a cow. \n\nOr take part in a barking contest with your neighbor's dog.\n\nOr perform brain surgery.\n\nOr paint a yellow line in the middle of your private driveway.\n\nOr write your name in the snow.\n\nOr teach water basketball to clams.\n\nOr sing Al Bano songs at the bank.\n\nOr plant trees on public land.\n\nOr confuse the person next to you.\n\nOr…\n\n*page_break Build a triangular table.\n\nOr trot, prance, and jump.\n\nOr ride a train.\n\nOr organize your sock drawer in alphabetical order.\n\nOr go bowling with your mom.\n\nOr train bugs to play tricks.\n\nOr make a quilt.\n\nOr publish a magazine about pencil shavings.\n\nOr eat lemon jelly with pineapple.\n\nOr pave a highway.\n\n*page_break Or learn to draw.\n\nOr enroll in a photography class.\n\nOr learn to speak ancient Greek.\n\nOr photocopy money.\n\nOr go out to eat pasta.\n\nOr sew a dress.\n\nOr wash your iguana.\n\nOr go fishing.\n\nOr paint a stranger's house at night.\n\nOr sign up for windsurfing.\n\n*page_break Or change your hairstyle.\n\nOr sharpen your chalks.\n\nOr feed a toucan.\n\nOr enjoy the sunshine.\n\nOr do crosswords.\n\nOr buy pretty clothes.\n\nOr…\n\n*page_break Go to the beach.\n\nOr play cricket with your dad.\n\nOr water your plants.\n\nOr build a dollhouse.\n\nOr host a salmon and white wine dinner.\n\nShall we start all over again?\n*choice\n    #Yes, please!\n        *if (ACON)\n            *achieve again\n        *goto again\n    #No, thank you. I got the message.\n        *goto_scene ending\n\n"}};
</script>
<script>
/* ChoiceScript runtime — vanilla-JS port of the Python engine in cs/.
 *
 * Faithful reimplementation of parser + expr + interpolate + engine. The
 * engine is I/O-agnostic: it talks to an `io` object exposing text(), choose(),
 * page_break(), input_text(), input_number(), achievement(), stat_chart().
 *
 * Exposed as a global `CS` object (no modules, no build step).
 */
(function (root) {
  "use strict";

  // ---- errors ----------------------------------------------------------- //

  class CSError extends Error {
    constructor(message, scene, line) {
      super(formatLoc(scene, line) + message);
      this.raw_message = message;
      this.scene = scene === undefined ? null : scene;
      this.line = line === undefined ? null : line;
      this.name = "CSError";
    }
  }
  function formatLoc(scene, line) {
    if (scene == null && line == null) return "";
    return (scene == null ? "?" : scene) + " line " + (line == null ? "?" : line) + ": ";
  }
  class ExprError extends CSError { constructor(m, s, l) { super(m, s, l); this.name = "ExprError"; } }
  class GameOver extends Error { constructor(label) { super(label || ""); this.label = label || ""; this.name = "GameOver"; } }
  class QuitGame extends Error { constructor() { super("quit"); this.name = "QuitGame"; } }
  class LoadGame extends Error { constructor(state) { super("load game"); this.state = state; this.name = "LoadGame"; } }
  class RestartGame extends Error { constructor() { super("restart"); this.name = "RestartGame"; } }

  // ---- parser ----------------------------------------------------------- //

  const COMMAND_RE = /^\s*\*(\w+)\b[ \t]?([\s\S]*)$/;
  const INDENT_RE = /^([ \t]*)/;

  class Line {
    constructor(num, indent, command, arg, text) {
      this.num = num;
      this.indent = indent;
      this.command = command; // null for plain text
      this.arg = arg;
      this.text = text;
    }
    get is_blank() {
      return this.command == null && this.text.trim() === "";
    }
  }

  function getIndent(raw) {
    const m = INDENT_RE.exec(raw);
    const ws = m ? m[1] : "";
    if (ws.indexOf("\t") !== -1 && ws.indexOf(" ") !== -1) {
      throw new CSError("mixed tabs and spaces in indentation");
    }
    return ws.length;
  }

  function parseScene(text) {
    const lines = [];
    const rawLines = text.split("\n");
    for (let i = 0; i < rawLines.length; i++) {
      let raw = rawLines[i].replace(/\r$/, "");
      const num = i + 1;
      if (raw.trim() === "") {
        lines.push(new Line(num, 0, null, "", ""));
        continue;
      }
      const indent = getIndent(raw);
      const m = COMMAND_RE.exec(raw);
      if (m) {
        lines.push(new Line(num, indent, m[1], m[2], raw.trim()));
      } else {
        lines.push(new Line(num, indent, null, "", raw.trim()));
      }
    }
    return lines;
  }

  // ---- value coercion --------------------------------------------------- //

  function isNum(v) { return typeof v === "number"; }
  function isBool(v) { return typeof v === "boolean"; }
  function isStr(v) { return typeof v === "string"; }

  function toNum(value) {
    if (isBool(value)) throw new ExprError("Expected number, got boolean: " + value);
    if (isNum(value)) return value;
    const s = String(value).trim();
    if (/^-?\d+$/.test(s)) return parseInt(s, 10);
    // Match Python float(): the whole string must be a valid float literal.
    if (/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) {
      const f = Number(s);
      if (!isNaN(f)) return f;
    }
    throw new ExprError('Expected number, but got string: "' + value + '"');
  }

  function toBool(value) {
    if (isBool(value)) return value;
    if (isNum(value)) throw new ExprError("Expected boolean, got number: " + value);
    const s = String(value).trim().toLowerCase();
    if (s === "true") return true;
    if (s === "false") return false;
    throw new ExprError('Expected boolean, but got string: "' + value + '"');
  }

  function csStr(value) {
    if (isBool(value)) return value ? "true" : "false";
    if (isNum(value)) {
      // integers render without a decimal point
      if (Number.isInteger(value)) return String(value);
      return String(value);
    }
    return String(value);
  }

  // ---- expression tokenizer --------------------------------------------- //

  const TOKEN_SPECS = [
    ["OPEN_PARENTHESIS", /^\(/],
    ["CLOSE_PARENTHESIS", /^\)/],
    ["OPEN_CURLY", /^\{/],
    ["CLOSE_CURLY", /^\}/],
    ["OPEN_SQUARE", /^\[/],
    ["CLOSE_SQUARE", /^\]/],
    ["FUNCTION", /^(not|round|timestamp|log|length|auto)\s*\(/],
    ["NUMBER", /^\d+(\.\d+)?\b/],
    ["CURLY_QUOTE", /^[“”]/],
    ["WHITESPACE", /^\s+/],
    ["NAMED_OPERATOR", /^(and|or|modulo)\b/],
    ["VAR", /^\w+/],
    ["FAIRMATH", /^%[+\-]/],
    ["OPERATOR", /^[+\-*/&%^#]/],
    ["INEQUALITY", /^[!<>]=?/],
    ["EQUALITY", /^=/],
    ["COMMA", /^,/],
  ];
  const FUNC_NAME_RE = /^\w+/;

  class Token {
    constructor(name, value, pos, func) {
      this.name = name;
      this.value = value;
      this.pos = pos;
      this.func = func || null;
    }
  }

  function tokenize(expr) {
    let s = expr;
    let pos = 0;
    const tokens = [];
    while (s) {
      // String literal with backslash escapes.
      if (s[0] === '"') {
        let i = 1;
        let found = false;
        while (i < s.length) {
          const c = s[i];
          if (c === "\\") { i += 1; }
          else if (c === '"') { found = true; break; }
          i += 1;
        }
        if (!found) throw new ExprError("Invalid string, open quote with no close quote: " + s);
        const matched = s.slice(0, i + 1);
        pos += matched.length;
        tokens.push(new Token("STRING", matched, pos));
        s = s.slice(matched.length);
        continue;
      }
      let matched = null;
      for (const [name, rx] of TOKEN_SPECS) {
        const m = rx.exec(s);
        if (m && m[0]) { matched = [name, m[0]]; break; }
      }
      if (matched === null) throw new ExprError("Invalid expression, could not tokenize at: " + s);
      const [name, value] = matched;
      pos += value.length;
      s = s.slice(value.length);
      if (name === "CURLY_QUOTE") throw new ExprError("Invalid use of curly smart quote: " + value);
      if (name === "WHITESPACE") continue;
      let func = null;
      if (name === "FUNCTION") func = FUNC_NAME_RE.exec(value)[0];
      tokens.push(new Token(name, value, pos, func));
    }
    return tokens;
  }

  // ---- operators -------------------------------------------------------- //

  function fairAdd(v1, v2) {
    v1 = toNum(v1); v2 = toNum(v2);
    if (!(v1 >= 0 && v1 <= 100)) throw new ExprError("Can't fairAdd to non-percentile value: " + v1);
    if (v2 > 0) {
      const mult = (100 - v1) / 100.0;
      const value = Math.floor(v1 + v2 * mult);
      return value > 99 ? 99 : value;
    }
    const mult = v1 / 100.0;
    const value = Math.ceil(v1 - (-v2) * mult);
    return value < 1 ? 1 : value;
  }
  function fairSub(v1, v2) { return fairAdd(v1, -toNum(v2)); }

  function equals(v1, v2) {
    if (isBool(v1) || isBool(v2)) {
      return v1 === v2 || String(v1).toLowerCase() === String(v2).toLowerCase();
    }
    return v1 === v2 || String(v1) === String(v2);
  }
  function divide(a, b) {
    b = toNum(b);
    if (b === 0) throw new ExprError("can't divide by zero");
    return toNum(a) / b;
  }
  function concat(a, b) { return csStr(a) + csStr(b); }
  function numBin(fn) { return (a, b) => fn(toNum(a), toNum(b)); }
  // The `#` operator: 1-based character index into a string (e.g. name#1
  // returns the first character). Mirrors Scene.operators['#'] in scene.js.
  function charAt(v1, v2) {
    const s = csStr(v1);
    const i = toNum(v2);
    if (i !== Math.floor(i)) throw new ExprError("There is no character at position " + i + "; the position must be a whole number.");
    if (i < 1) throw new ExprError("There is no character at position " + i + "; the position must be greater than or equal to 1.");
    if (i > s.length) throw new ExprError('There is no character at position ' + i + '. "' + s + '" is only ' + s.length + " characters long.");
    return s.charAt(i - 1);
  }

  const OPERATORS = {
    "+": numBin((a, b) => a + b),
    "-": numBin((a, b) => a - b),
    "*": numBin((a, b) => a * b),
    "/": (a, b) => divide(a, b),
    "^": numBin((a, b) => Math.pow(a, b)),
    "modulo": numBin((a, b) => ((a % b) + b) % b),
    "&": (a, b) => concat(a, b),
    "#": charAt,
    "%+": fairAdd,
    "%-": fairSub,
    "=": equals,
    "!=": (a, b) => !equals(a, b),
    "<": numBin((a, b) => a < b),
    ">": numBin((a, b) => a > b),
    "<=": numBin((a, b) => a <= b),
    ">=": numBin((a, b) => a >= b),
    "and": (a, b) => toBool(a) && toBool(b),
    "or": (a, b) => toBool(a) || toBool(b),
  };

  // ---- evaluator -------------------------------------------------------- //

  class Evaluator {
    constructor(resolver) { this.resolver = resolver; }

    evalString(expr) { return this.evalTokens(tokenize(expr)); }
    evalTokens(tokens) { return this._evalExpr(tokens.slice(), null); }

    evalValueToken(stack) { return this._evalValueToken(stack.shift(), stack); }

    evaluateReference(stack, toLower) {
      if (toLower === undefined) toLower = true;
      const norm = (name) => toLower ? String(name).toLowerCase() : name;
      const findClosing = (kind, offset) => {
        let opens = 0;
        const openName = "OPEN_" + kind, closeName = "CLOSE_" + kind;
        for (let i = offset || 0; i < stack.length; i++) {
          if (stack[i].name === openName) opens += 1;
          else if (stack[i].name === closeName) {
            if (opens) opens -= 1; else return i;
          }
        }
        return -1;
      };
      if (!stack.length) throw new ExprError("Invalid expression, expected a name");
      const head = stack[0];
      if (head.name === "OPEN_CURLY") {
        stack.shift();
        const closing = findClosing("CURLY", 0);
        if (closing === -1) throw new ExprError("Invalid expression, no closing curly bracket");
        const name = this.evalTokens(stack.slice(0, closing));
        stack.splice(0, closing + 1);
        return norm(name);
      }
      if (head.name === "NUMBER") { stack.shift(); return head.value; }
      if (head.name !== "VAR") {
        throw new ExprError("Invalid expression; expected name, found " + head.name + " at char " + head.pos);
      }
      let name = String(head.value);
      stack.shift();
      while (stack.length && stack[0].name === "OPEN_SQUARE") {
        const closing = findClosing("SQUARE", 1);
        if (closing === -1) throw new ExprError("Invalid expression, no closing array bracket");
        const index = this.evalTokens(stack.slice(1, closing));
        name += "_" + csStr(index);
        stack.splice(0, closing + 1);
      }
      return norm(name);
    }

    _evalExpr(stack, parenthetical) {
      if (!stack.length) throw new ExprError("no expression specified");
      let value1 = this._evalValueToken(stack.shift(), stack);
      if (!stack.length) {
        if (parenthetical) throw new ExprError("Invalid expression, expected " + parenthetical);
        return value1;
      }
      let token = stack.shift();
      if (parenthetical && parenthetical === token.name) return value1;
      const op = OPERATORS[token.value];
      if (op === undefined) {
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected OPERATOR, was: " + token.name + " [" + token.value + "]");
      }
      if (!stack.length) throw new ExprError("Invalid expression, expected something after a " + token.value);
      const value2 = this._evalValueToken(stack.shift(), stack);
      const result = op(value1, value2);
      if (parenthetical) {
        if (stack.length) {
          token = stack.shift();
          if (parenthetical === token.name) return result;
          throw new ExprError("Invalid expression at char " + token.pos + ", expected " +
            parenthetical + ", was: " + token.name + " [" + token.value + "]");
        }
        throw new ExprError("Invalid expression, expected " + parenthetical);
      } else if (stack.length) {
        token = stack.shift();
        throw new ExprError("Invalid expression at char " + token.pos +
          ", expected no more tokens, was: " + token.name + " [" + token.value + "]");
      }
      return result;
    }

    _evalValueToken(token, stack) {
      const name = token.name;
      if (name === "OPEN_PARENTHESIS") return this._evalExpr(stack, "CLOSE_PARENTHESIS");
      if (name === "OPEN_CURLY") {
        const value = this._evalExpr(stack, "CLOSE_CURLY");
        return this.resolver.get_var(value);
      }
      if (name === "FUNCTION") {
        const value = this._evalExpr(stack, "CLOSE_PARENTHESIS");
        return this._callFunc(token.func, value);
      }
      if (name === "NUMBER") {
        return /^\d+$/.test(token.value) ? parseInt(token.value, 10) : parseFloat(token.value);
      }
      if (name === "STRING") {
        let inner = token.value.slice(1, -1);
        inner = inner.replace(/\\(.)/g, "$1");
        return this.resolver.replace_variables(inner);
      }
      if (name === "VAR") {
        let variable = String(token.value);
        while (stack.length && stack[0].name === "OPEN_SQUARE") {
          stack.shift();
          const idx = this._evalExpr(stack, "CLOSE_SQUARE");
          variable += "_" + csStr(idx);
        }
        return this.resolver.get_var(variable);
      }
      throw new ExprError("Invalid expression at char " + token.pos +
        ", expected NUMBER, STRING, VAR or PARENTHETICAL, was: " + name + " [" + token.value + "]");
    }

    _callFunc(func, value) {
      if (func === "not") return !toBool(value);
      if (func === "round") return Math.floor(toNum(value) + 0.5);
      if (func === "length") return csStr(value).length;
      if (func === "log") return Math.log10(toNum(value));
      if (func === "timestamp") return parseTimestamp(csStr(value));
      if (func === "auto") throw new ExprError("auto() must come after a < or > symbol");
      throw new ExprError("Unknown function " + func);
    }
  }

  function parseTimestamp(value) {
    const t = Date.parse(value.trim());
    if (isNaN(t)) throw new ExprError("timestamp() could not parse date: " + value);
    return Math.floor(t / 1000);
  }

  // ---- interpolation ---------------------------------------------------- //

  const REPLACER = /[$@](!?!?)\{/g;

  function replaceVariables(line, evaluator) {
    line = String(line);
    const output = [];
    let index = 0;
    while (true) {
      REPLACER.lastIndex = index;
      const m = REPLACER.exec(line);
      if (!m) { output.push(line.slice(index)); break; }
      output.push(line.slice(index, m.index));
      const sigil = line[m.index];
      const capitalize = m[1];
      const exprStart = m.index + m[0].length;
      let curlies = 0, closing = -1, i = exprStart;
      while (i < line.length) {
        const c = line[i];
        if (c === "{") curlies += 1;
        else if (c === "}") { if (curlies) curlies -= 1; else { closing = i; break; } }
        i += 1;
      }
      if (closing === -1) throw new CSError("invalid " + line.slice(m.index, exprStart) + " variable substitution");
      const body = line.slice(exprStart, closing);
      let value = sigil === "$" ? evaluator.evalString(body) : evalMultireplace(body, evaluator);
      value = csStr(value);
      if (capitalize === "!") value = value.slice(0, 1).toUpperCase() + value.slice(1);
      else if (capitalize === "!!") value = value.toUpperCase();
      output.push(value);
      index = closing + 1;
    }
    return output.join("");
  }

  function evalMultireplace(body, evaluator) {
    let expr, options;
    if (/^\s*\(/.test(body)) {
      let parens = 0, closingParen = -1;
      for (let i = 1; i < body.length; i++) {
        const c = body[i];
        if (c === "(") parens += 1;
        else if (c === ")") { if (parens) parens -= 1; else { closingParen = i; break; } }
      }
      if (closingParen === -1) throw new CSError("invalid @{} multireplace; missing closing parenthesis");
      if (closingParen + 1 >= body.length || body[closingParen + 1] !== " ")
        throw new CSError("invalid @{} multireplace; there should be a space after )");
      expr = body.slice(1, closingParen);
      options = body.slice(closingParen + 2).split("|");
    } else {
      if (!/^\S+ /.test(body))
        throw new CSError("invalid @{} multireplace; there should be a space after the first word");
      const spaceIndex = body.indexOf(" ");
      expr = body.slice(0, spaceIndex);
      options = body.slice(spaceIndex + 1).split("|");
    }
    if (options.length < 2) throw new CSError("invalid @{} multireplace; need at least one pipe |");
    let value = evaluator.evalString(expr);
    if (isBool(value) || (isStr(value) && (value.toLowerCase() === "true" || value.toLowerCase() === "false"))) {
      value = toBool(value) ? 1 : 2;
    }
    value = Math.trunc(toNum(value));
    if (value < 1) throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value + " is not positive");
    if (value > options.length)
      throw new CSError("invalid @{} multireplace; '" + expr + "' = " + value +
        " but there are only " + options.length + " options");
    return replaceVariables(options[value - 1], evaluator);
  }

  const MARKUP_RE = /\[\/?(i|b|lie|key|val|stat|suspiciously|optimistically)\]/g;
  // Mirror the game's replaceBbCode for the tags that carry layout meaning:
  // [n/] is a hard line break and [c/] is a "continue, no space" marker that
  // renders as nothing. The remaining styling tags are simply dropped. The
  // resulting "\n" survives paragraph joining (which only collapses spaces and
  // tabs) and shows as a line break wherever text is rendered pre-wrap.
  function stripMarkup(text) {
    return String(text)
      .replace(/\[n\/\]/g, "\n")
      .replace(/\[c\/\]/g, "")
      .replace(MARKUP_RE, "");
  }

  root.CS = { CSError, ExprError, GameOver, QuitGame, LoadGame, RestartGame,
    Line, parseScene, getIndent, toNum, toBool, csStr, Token, tokenize, OPERATORS,
    Evaluator, replaceVariables, stripMarkup };

  // ---- state serialization ---------------------------------------------- //
  // Mirrors the Python _to_jsonable/_from_jsonable. JS also has Map values
  // (_choice_ends/_choice_used with integer keys) which JSON can't hold, so a
  // Map is encoded as {__map__: [[k, v], ...]} and restored to a Map on load.

  function toJsonable(obj) {
    if (obj instanceof Map) {
      return { __map__: Array.from(obj.entries()).map(([k, v]) => [k, toJsonable(v)]) };
    }
    if (Array.isArray(obj)) return obj.map(toJsonable);
    if (obj && typeof obj === "object") {
      const out = {};
      for (const k of Object.keys(obj)) out[k] = toJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function fromJsonable(obj) {
    if (Array.isArray(obj)) return obj.map(fromJsonable);
    if (obj && typeof obj === "object") {
      const keys = Object.keys(obj);
      if (keys.length === 1 && keys[0] === "__map__") {
        const m = new Map();
        for (const [k, v] of obj.__map__) m.set(keyFrom(k), fromJsonable(v));
        return m;
      }
      const out = {};
      for (const k of keys) out[k] = fromJsonable(obj[k]);
      return out;
    }
    return obj;
  }

  function keyFrom(k) {
    if (typeof k === "string" && /^-?\d+$/.test(k)) return parseInt(k, 10);
    return k;
  }

  // Plain deep copy for already-jsonable data (checkpoints/state). Must NOT
  // use fromJsonable, which would turn serialized {__map__} into live Maps and
  // corrupt the jsonable form.
  function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

  // ---- engine ----------------------------------------------------------- //

  function truthy(value) { return toBool(value); }

  const INITIAL_COMMANDS = new Set([
    "create", "create_array", "scene_list", "title", "author", "comment",
    "achievement", "product", "ifid",
  ]);

  const NOOP_COMMANDS = new Set([
    "page_break_advertisement", "finish_advertisement", "advertisement",
    "check_purchase", "restore_purchases", "purchase", "looplimit",
    "purchase_discount", "print_discount", "check_registration", "login",
    "subscribe", "share_this_game", "more_games", "feedback",
    "check_achievements",
    "sound", "youtube", "link",
    "link_button", "track_event", "timer", "ifid", "product",
    "show_password", "author", "delay_break",
    "end_trial", "script", "achievement",
  ]);

  const ENV_VARS = {
    choice_subscribe_allowed: () => true,
    choice_register_allowed: () => false,
    choice_registered: () => false,
    choice_is_web: () => false,
    choice_is_steam: () => false,
    choice_is_steam_deck: () => false,
    choice_is_ios_app: () => false,
    choice_is_ipad_app: () => false,
    choice_is_android_app: () => false,
    choice_is_omnibus_app: () => false,
    choice_is_amazon_app: () => false,
    choice_is_advertising_supported: () => false,
    choice_is_trial: () => false,
    choice_prerelease: () => false,
    choice_kindle: () => false,
    choice_randomtest: () => false,
    choice_quicktest: () => false,
    choice_nightmode: () => false,
    choice_purchase_supported: () => false,
    choice_purchased_adfree: () => true,
    choice_purchased_everything: () => true,
    choice_restore_purchases_allowed: () => false,
    choice_save_allowed: () => true,
    choice_release_date: () => "release day",
  };

  class Scene {
    constructor(name, lines) {
      this.name = name;
      this.lines = lines;
      this.labels = {};
      this._indexLabels();
    }
    _indexLabels() {
      for (let i = 0; i < this.lines.length; i++) {
        const ln = this.lines[i];
        if (ln.command && ln.command.toLowerCase() === "label") {
          const label = ln.arg.trim().toLowerCase();
          if (/\s/.test(label)) {
            throw new CSError("label '" + label + "' is not allowed to contain spaces", this.name, ln.num);
          }
          if (label in this.labels) {
            throw new CSError("label '" + label + "' already defined on line " +
              this.lines[this.labels[label]].num, this.name, ln.num);
          }
          this.labels[label] = i;
        }
      }
    }
  }

  class Engine {
    constructor(io, sceneLoader) {
      // sceneLoader(name) -> array of Line (parsed). Replaces filesystem access.
      this.io = io;
      this._loader = sceneLoader;
      io.engine = this;
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.scene_cache = {};
      this.evaluator = new Evaluator(this);

      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.initial_commands = true;

      this._para = [];
      this.achievements = {};
      this.unlocked = new Set();
      this.checkpoints = {};
      this._resume = null;
      this._pending_scene = null;
      this._in_stats = false;
      this._rng = Math.random;  // overridable for deterministic tests
    }

    _freshTemps() {
      return {
        choice_reuse: "allow",
        param: [],
        _choice_ends: new Map(),
        _choice_used: new Map(),
        _choice_substack: [],
        _fake_choice_depth: 0,
      };
    }

    // ---- resolver interface ---- //

    get_var(variable) {
      variable = String(variable).toLowerCase();
      if (variable && /^-?\d+$/.test(variable)) return parseInt(variable, 10);
      if (variable === "true") return true;
      if (variable === "false") return false;
      const env = ENV_VARS[variable];
      if (env !== undefined) return env(this);
      if (variable === "choice_linenum") return this.line_num;
      if (variable === "choice_scene") return this.scene ? this.scene.name : "";
      if (variable.startsWith("choice_saved_checkpoint")) return !!this.stats[variable];
      if (variable.startsWith("choice_achieved_"))
        return this.unlocked.has(variable.slice("choice_achieved_".length));
      if (variable.startsWith("choice_purchased_")) return true;
      if (variable === "choice_user_restored" && !(variable in this.temps)) return false;
      if (variable === "choice_just_restored_checkpoint" && !(variable in this.temps)) return false;
      let value;
      if (variable in this.temps) value = this.temps[variable];
      else if (variable in this.stats) value = this.stats[variable];
      else {
        if (variable === "implicit_control_flow") return false;
        throw new CSError("Non-existent variable '" + variable + "'",
          this.scene ? this.scene.name : null, this._curNum());
      }
      if (value === null || value === undefined) {
        throw new CSError("Variable '" + variable + "' exists but has no value",
          this.scene ? this.scene.name : null, this._curNum());
      }
      return value;
    }

    replace_variables(text) { return replaceVariables(text, this.evaluator); }

    set_var(variable, value) {
      variable = String(variable).toLowerCase();
      if (variable in this.temps) this.temps[variable] = value;
      else if (variable in this.stats) this.stats[variable] = value;
      else throw new CSError("Non-existent variable '" + variable + "'",
        this.scene ? this.scene.name : null, this._curNum());
    }

    _validateVariable(variable) {
      if (!variable || !/^[a-zA-Z]/.test(variable))
        throw this._err("Invalid variable name, must start with a letter: " + variable);
      if (!/^\w+$/.test(variable))
        throw this._err("Invalid variable name: '" + variable + "'");
      if (/^(and|or|true|false|scene|scenename)$/i.test(variable))
        throw this._err("Invalid variable name, '" + variable + "' is a reserved word");
      if (variable.startsWith("choice_"))
        throw this._err("variables may not start with 'choice_'");
    }

    _curNum() {
      if (this.scene && this.line_num >= 0 && this.line_num < this.scene.lines.length)
        return this.scene.lines[this.line_num].num;
      return null;
    }
    _err(msg) { return new CSError(msg, this.scene ? this.scene.name : null, this._curNum()); }
    _safeGet(name) { try { return this.get_var(name); } catch (e) { if (e instanceof CSError) return null; throw e; } }

    // ---- scene loading + run ---- //

    load_scene(name) {
      name = name.toLowerCase();
      if (!(name in this.scene_cache)) {
        const lines = this._loader(name);
        this.scene_cache[name] = new Scene(name, lines);
      }
      return this.scene_cache[name];
    }

    run(startScene) {
      this._enterScene(this.load_scene(startScene || "startup"));
      this._runUntilEnd();
    }

    resumeFromState(state) {
      this._applyState(state);
      this._runUntilEnd();
    }

    // Run choicescript_stats against the *already-applied* engine state, as a
    // single scene. Unlike showStats() this does NOT snapshot/restore — it's
    // meant for a throwaway engine whose state was set via _applyState. Because
    // stats screens are often interactive (*choice menus of stat categories),
    // the io is free to throw StopReplay at a prompt; that propagates to the
    // caller, which records the answer and re-runs from the top. Mirrors the
    // single-scene model of engine.py show_stats (labels/goto within the scene
    // work; goto_scene out of stats is not followed, by ChoiceScript convention).
    runStatsScene() {
      this.scene = this.load_scene("choicescript_stats");
      this.line_num = 0;
      this.indent = 0;
      this.finished = false;
      this.temps = this._freshTemps();
      this._para = [];
      this._pending_scene = null;
      this._resume = null;
      this._in_stats = true;
      this._runStatsLoop();
      this._in_stats = false;
    }

    // Drive the stats overlay to completion. Unlike a single _printLoop() call,
    // this follows *gosub_scene transitions (e.g. magics' appearance text calls
    // out to utils) and the *return that comes back, so the whole stats scene
    // renders. Unlike _mainLoop it never advances into the next scene in the
    // scene list: when the stats scene finishes with no pending transition,
    // we're done.
    _runStatsLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          break;
        }
      } catch (e) {
        if (!(e instanceof GameOver)) throw e;
      }
      this._flushParagraph();
    }

    // Run choicescript_stats as a read-only overlay against current state, then
    // restore everything (the stats scene may *set globals as harmless
    // normalizations, so we snapshot stats too). Mirrors engine.py show_stats.
    // The caller must have made "choicescript_stats" loadable; if the loader
    // can't find it, the CSError propagates.
    showStats() {
      const saved = {
        scene: this.scene, line_num: this.line_num, indent: this.indent,
        finished: this.finished, temps: this.temps, _para: this._para,
        _pending_scene: this._pending_scene, _resume: this._resume,
        initial_commands: this.initial_commands, stats: Object.assign({}, this.stats),
      };
      try {
        this.scene = this.load_scene("choicescript_stats");
        this.line_num = 0;
        this.indent = 0;
        this.finished = false;
        this.temps = this._freshTemps();
        this._para = [];
        this._pending_scene = null;
        this._resume = null;
        this._in_stats = true;
        this._runStatsLoop();
      } finally {
        this._in_stats = false;
        this.scene = saved.scene;
        this.line_num = saved.line_num;
        this.indent = saved.indent;
        this.finished = saved.finished;
        this.temps = saved.temps;
        this._para = saved._para;
        this._pending_scene = saved._pending_scene;
        this._resume = saved._resume;
        this.initial_commands = saved.initial_commands;
        this.stats = saved.stats;
      }
    }

    _runUntilEnd() {
      while (true) {
        try {
          this._mainLoop();
          return;
        } catch (e) {
          if (e instanceof RestartGame) {
            this._resetAll();
            this._enterScene(this.load_scene("startup"));
            continue;
          }
          if (e instanceof LoadGame) { this._applyState(e.state); continue; }
          if (e instanceof QuitGame) {
            try { this.autosave(); } catch (_) { /* never mask quit */ }
            throw e;
          }
          throw e;
        }
      }
    }

    _mainLoop() {
      try {
        while (true) {
          this._printLoop();
          if (this._pending_scene !== null) {
            const nxt = this._pending_scene;
            this._pending_scene = null;
            this._enterScene(nxt);
            continue;
          }
          const nxt = this._nextSceneName(this.scene.name);
          if (!nxt) break;
          this.temps = this._freshTemps();
          this._enterScene(this.load_scene(nxt));
        }
      } catch (e) {
        if (e instanceof GameOver) { this._flushParagraph(); return; }
        throw e;
      }
    }

    _enterScene(scene) {
      this.scene = scene;
      this.finished = false;
      this._pending_scene = null;
      const resume = this._resume;
      if (resume !== null && resume[0] === scene.name) {
        const [, lineNum, indent] = resume;
        this.line_num = lineNum != null ? lineNum : 0;
        this.indent = indent != null ? indent : scene.lines[this.line_num].indent;
      } else {
        this.line_num = 0;
        this.indent = 0;
      }
      this._resume = null;
      if (scene.name !== "startup") this.initial_commands = false;
    }

    _nextSceneName(current) {
      const i = this.scene_list.indexOf(current);
      if (i === -1) return null;
      if (i + 1 < this.scene_list.length) return this.scene_list[i + 1];
      return null;
    }

    // ---- save / load state ---- //

    _baseState() {
      return {
        version: 1,
        scene: this.scene ? this.scene.name : null,
        line_num: this.line_num,
        indent: this.indent,
        initial_commands: this.initial_commands,
        scene_list: this.scene_list.slice(),
        stats: toJsonable(this.stats),
        temps: toJsonable(this.temps),
        unlocked: Array.from(this.unlocked).sort(),
      };
    }

    captureState() {
      const state = this._baseState();
      if (Object.keys(this.checkpoints).length) state.checkpoints = deepCopy(this.checkpoints);
      return state;
    }

    _applyState(state) {
      this.scene_list = (state.scene_list || []).slice();
      this.stats = fromJsonable(state.stats);
      this.temps = fromJsonable(state.temps);
      this.unlocked = new Set(state.unlocked || []);
      this.checkpoints = deepCopy(state.checkpoints || {});
      this.initial_commands = state.initial_commands === undefined ? false : state.initial_commands;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = state.scene ? this.load_scene(state.scene) : null;
      this.line_num = state.line_num || 0;
      this.indent = state.indent || 0;
    }

    _resetAll() {
      this.stats = {};
      this.temps = this._freshTemps();
      this.scene_list = [];
      this.unlocked = new Set();
      this.checkpoints = {};
      this.initial_commands = true;
      this._pending_scene = null;
      this._resume = null;
      this._para = [];
      this.finished = false;
      this.scene = null;
      this.line_num = 0;
      this.indent = 0;
    }

    autosave() {
      if (this.scene === null) return;
      if (this.io.on_autosave) this.io.on_autosave(this.captureState());
    }

    requestRestart() { throw new RestartGame(); }

    // ---- main interpreter loop (mirrors Scene.prototype.printLoop) ---- //

    _printLoop() {
      const lines = this.scene.lines;
      this.finished = false;
      while (!this.finished && this.line_num < lines.length) {
        const line = lines[this.line_num];
        if (line.is_blank) { this._flushParagraph(); this.line_num += 1; continue; }

        const indent = line.indent;
        if (indent > this.indent) {
          if (line.command && line.command.toLowerCase() === "comment") { this.line_num += 1; continue; }
          throw this._err("increasing indent not allowed, expected " + this.indent + " was " + indent);
        }

        const end = this.temps._choice_ends.get(this.line_num);
        if (end !== undefined &&
            (truthy(this._safeGet("implicit_control_flow")) || this.temps._fake_choice_depth > 0)) {
          this.line_num = end + 1;
          if (this.temps._fake_choice_depth > 0) this.temps._fake_choice_depth -= 1;
          continue;
        }

        this.indent = indent;

        if (line.command == null && line.text.startsWith("#")) {
          throw this._err("It is illegal to fall out of a *choice statement; " +
            "you must *goto or *finish before the end of the indented block.");
        }

        if (line.command == null) {
          this.initial_commands = false;
          this._printText(line.text);
        } else {
          this._runCommand(line);
        }
        this.line_num += 1;
      }
      this._flushParagraph();
      if (!this.finished) this.finished = true;
    }

    _runCommand(line) {
      const cmd = line.command.toLowerCase();
      const data = line.arg.trim();
      if (INITIAL_COMMANDS.has(cmd)) {
        if (this.scene.name !== "startup" || !this.initial_commands) {
          if (cmd !== "comment")
            throw this._err("Invalid " + cmd + " instruction, only allowed at top of startup.txt");
        }
      } else {
        this.initial_commands = false;
      }
      const handler = DISPATCH[cmd];
      if (handler === undefined) {
        if (NOOP_COMMANDS.has(cmd)) return;
        throw this._err("Non-existent command '" + cmd + "'");
      }
      handler.call(this, data, line);
    }

    _printText(text) { this._para.push(stripMarkup(this.replace_variables(text))); }

    _flushParagraph() {
      if (this._para.length) {
        let joined = this._para.filter((p) => p !== "").join(" ");
        joined = joined.replace(/[ \t]+/g, " ").replace(/ *\n */g, "\n").trim();
        if (joined) this.io.text(joined);
      }
      this._para = [];
    }
  }

  // ---- command handlers (mirror engine._cmd_*) ---- //
  const E = Engine.prototype;

  E._evalLiteral = function (expr, line) {
    if (expr === "") throw this._err("no value specified: " + line.text);
    return this.evaluator.evalString(expr);
  };

  E._cmd_create = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    this.stats[variable] = this._evalLiteral(m[2].trim(), line);
    return false;
  };

  E._cmd_temp = function (data, line) {
    const m = /^(\w*)([\s\S]*)$/.exec(data);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const rest = m[2].trim();
    this.temps[variable] = rest ? this._evalLiteral(rest, line) : null;
    return false;
  };

  E._cmd_create_array = function (data, line) { this._defineArray(data, line, false); return false; };
  E._cmd_temp_array = function (data, line) { this._defineArray(data, line, true); return false; };

  E._defineArray = function (data, line, temp) {
    const m = /^(\w+)([\s\S]*)$/.exec(data);
    if (!m) throw this._err("Invalid array instruction, no name specified: " + line.text);
    let variable = m[1];
    this._validateVariable(variable);
    variable = variable.toLowerCase();
    const stack = tokenize(m[2].trim());
    if (!stack.length) throw this._err("Invalid array instruction, missing length: " + line.text);
    let length = Math.trunc(toNum(this.evaluator.evalValueToken(stack)));
    if (length < 1) throw this._err("Invalid array instruction, length must be a whole number > 0");
    let values = [];
    while (stack.length) values.push(this.evaluator.evalValueToken(stack));
    if (!values.length) throw this._err("Invalid array instruction, no value specified: " + line.text);
    if (values.length === 1) { const v = values[0]; values = new Array(length).fill(v); }
    else if (values.length !== length)
      throw this._err("array expected 1 or " + length + " values, got " + values.length);
    const target = temp ? this.temps : this.stats;
    for (let i = 0; i < length; i++) target[variable + "_" + (i + 1)] = values[i];
    target[variable + "_count"] = length;
  };

  E._cmd_set = function (data, line) {
    const stack = tokenize(data);
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    if (!stack.length) throw this._err("Invalid set instruction, no expression: " + line.text);
    this._applySet(variable, stack);
    return false;
  };

  E._cmd_setref = function (data, line) {
    const stack = tokenize(data);
    const variable = String(this.evaluator.evalValueToken(stack)).toLowerCase();
    this._requireVar(variable);
    this._applySet(variable, stack);
    return false;
  };

  E._applySet = function (variable, stack) {
    // Leading operator => implicitly based on the variable's current value.
    if (stack.length && (stack[0].name === "OPERATOR" || stack[0].name === "FAIRMATH")) {
      stack.unshift(new Token("VAR", variable, "(implicit)"));
    }
    this.set_var(variable, this.evaluator.evalTokens(stack));
  };

  E._cmd_delete = function (data) {
    const variable = String(this.evaluator.evaluateReference(tokenize(data)));
    delete this.temps[variable];
    delete this.stats[variable];
    return false;
  };

  E._cmd_rand = function (data) {
    const stack = tokenize(data);
    if (!stack.length) throw this._err("Invalid rand statement, expected: varname min max");
    const variable = this.evaluator.evaluateReference(stack);
    this._requireVar(variable);
    const minimum = this.evaluator.evalValueToken(stack);
    const maximum = this.evaluator.evalValueToken(stack);
    if (stack.length) throw this._err("Invalid rand statement, expected three args");
    const lo = toNum(minimum), hi = toNum(maximum);
    const diff = hi - lo;
    if (diff < 0) throw this._err("rand min must be <= max: " + lo + " > " + hi);
    if (diff === 0) this.set_var(variable, lo);
    else if (Number.isInteger(lo) && Number.isInteger(hi))
      this.set_var(variable, lo + Math.floor(this._rng() * (diff + 1)));
    else this.set_var(variable, lo + this._rng() * diff);
    return false;
  };

  E._requireVar = function (variable) {
    if (!(variable in this.temps) && !(variable in this.stats))
      throw this._err("Non-existent variable '" + variable + "'");
  };

  // ---- control flow ---- //

  E._cmd_goto = function (data) { this._gotoLabel(this._resolveLabelName(data)); return true; };
  E._cmd_gotoref = function (data) {
    this._gotoLabel(String(this.evaluator.evalString(data)).toLowerCase()); return true;
  };
  E._resolveLabelName = function (data) {
    if (/[\[\{]/.test(data)) return String(this.evaluator.evaluateReference(tokenize(data)));
    return String(data).toLowerCase();
  };
  E._gotoLabel = function (label) {
    if (!(label in this.scene.labels)) throw this._err("bad label " + label);
    this.line_num = this.scene.labels[label];
    this.indent = this.scene.lines[this.line_num].indent;
  };
  E._cmd_label = function () { return false; };

  E._cmd_if = function (data) {
