*set Mojo %+5\n        *set puzzle +1\n        \"Fluffy Island!\" Will exclaims. \"Yes, that's it!\"\n        \n        The gorilla silently nods, adjusting its dreadlocks.\n        \n        Will is so exhausted he cannot even lift his armas to gesticulate. \"This is terribly unpleasant,\" he says. \"I need at least one night's sleep now.\"\n         \n        \"You did great, Will!\" you tell him, breathing deeply.\n        \n        \"I'm the only one left.\" you say, determined \"Let's end this.\"\n         \n        While you gather all your courage, you see four of the five gorillas slowly disappearing into the thick vegetation. Only the gorilla with the blue jacket who always kept his eyes shut remains.\n        \n        \"Hey, Sam,\" you ask, puzzled \"What's the meaning of this?\"\n         \n        Sam shrugs.\n         \n        \"Who cares!\" you add \"Better having to deal with only one guardian than five.\"\n        *page_break You approach the guardian.\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial05\n    *disable_reuse #...Velvety Island?\n        *set Mojo -5\n        *set puzzle -1\n        \"Velvety Island!\" says Will.\n        \n        The guardian gorilla shakes its head, adjusting its dreadlocks.\n        \n        \"Of course not!\" Will mutters, \"I just remembered Velvety Island was abandoned five years ago.\"\n        *page_break Try to remember!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial04will\n        \n*label trial05\nEscorted by Sam, you approach the only remaining guardian gorilla. The big ape menacingly puts his head on your head.\n\nYou suddenly feel the world spinning around you.\n \nYou suddenly realize the gorilla opened his eyelids and it's staring at you.\n\nThose eyes!\n\nThey send you shivers down your spine. You're sure you've seen that gaze before! It looks so familiar!\n\n\"${Name}!\"\n \nA voice booms in your head. Its sounds so familiar too…\n \n\"Your grandmother!\" says the voice while the world spins around you faster \"She's the [i]one[/i]…\"\n\nYou feel dizzy and you're about to reek. The world is spinning too fast!\n\n\"…[i]you[/i].\"the familiar gorilla voice continues \"Do you remember her name?\"\n\n\"What?\" you strive to focus while you struggle not to collapse in the ground \"What did you say?\"\n\n\"Tell me [b]your grandmother's name[/b]!\" the familiar voice asks.\n*page_break Grandma's name?\n\n[i]Of course I remember grandma's name![/i] you exult inside.\n \n[i]It's…[/i]\n\nNothing.\n\nYour memory is suddenly void.\n\nYou strive to look for your crew's help, but the world spins so fast around you that you cannot see the ${Crew_Name} anymore.\n\nYou're on your own.\n\n*label trial05name\nYou focus, looking deep inside your heart.\n \n[i]She's the one I cherish most…[/i] you say to yourself [i]Her name is…[/i]\n*choice\n    *disable_reuse #...Elaine.\n        *set Mojo -5\n        *set puzzle -1\n        \"Elaine!\" you say aloud.\n        \n        The guardian gorilla shakes its head.\n        \n        \"Damn!\" you say. \"I can't think properly with the world spinning around so fast!\"\n        *page_break Focus!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial05name\n    *disable_reuse #...Helena\n        *set Mojo %+5\n        *set puzzle +1\n        \"Helena!\" you exclaim. \"My dear grandma Helena!\"\n        \n        The gorilla silently nods, and the fast spinning world slows down. Everything around you is engulfed in a shining white light.\n        *page_break What's happening?\n        \n        As in a dream, you see yourself as a kid playing cheerfully with your grandfather Guy.\n         \n        You're very happy playing as the pirate lady who boards the rich merchantmen.\n        \n        Suddenly, in the middle of an insult sword fighting, your grandma Helena grabs you by your hand.\n         \n        \"Stop!\" you can clearly see she's mad \"This is the last time, Guy, that you try to pervert this little child! She should play with dolls!\"\n        *page_break Is this real?\n        \n        \"But Grandma!\" you cry \"I want to be a pirate, just like granddad!\"\n         \n        \"No way!\" Helena pulls you away from your granddad \"You'll receive a proper education and you'll marry a price one day! As befits your status and your gender!\"\n         \n        She then turns to your grandfather: \"This is the last time you see us, Guy! Begone! Never show your face again, or I'll call the militia!\"\n        \n        Your grandfather kisses you for the last time and goes away in the rain of tears that run down your childish cheeks.\n        \n        A terrible doubt taunts you: is this a dream, or did all this really occur?\n        *choice\n            *selectable_if (Aristocrat >39) #No kidding! Nothing of this ever occurred! Get me out of this terrible nightmare!\n                *set Aristocrat %+20\n                *set grandparent \"Helena\"\n                You refuse to believe in what you just saw. Helena was the sweetest grandma ever while Guy was nothing but a filthy pirate!\n                \n                *goto endtrial\n            *selectable_if (Aristocrat \u003c61) #Deep inside, I know this is true. Granddad, why did you leave me? You should have brought me with you!\n                *set Aristocrat %-20\n                *set grandparent \"Guy\"\n                You finally admit the truth. You never wanted to be a princess. You always wanted to be a pirate like your granddad. You finally realize that your hatred of him stems from the fact that he left you in the hands of your grandmother.\n                \n                [i]Oh, gramps… Why did you leave me?[/i]\n                \n                *goto endtrial\n            #This is so confusing... I no longer know what to believe in.\n                *goto endtrial\n    *disable_reuse #...Elena.\n        *set Mojo -5\n        *set puzzle -1\n        \"Elena!\" you say.\n        \n        The guardian gorilla shakes its head.\n        \n        \"Impossible!\" you say. \"How could I fail at such an easy task?\"\n        *page_break Focus!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial05name\n    *disable_reuse #...Elene.\n        *set Mojo -5\n        *set puzzle -1\n        \"Elene!\" says Will.\n        \n        The guardian gorilla shakes its head.\n        \n        \"Damn!\" you say \"That's my aunt's name!\"\n        *page_break Focus!\n        *if Mojo \u003c1\n            *goto_scene gold\n        *else\n            *goto trial05name\n        \n*label endtrial\n\"Captain!\"\n \n\"Can you hear me?\"\n \n\"Wake up, already!\"\n\nYou open your eyes and realize they are full of tears.\n\n\"Captain!\" you see Laura smile \"I'm so glad you're okay.\"\n \nEveryone else smiles above you. You realize you're lying on the ground.\n \n\"What…\" you whisper, getting up \"What happened?\" You take a look around \"Where's the guardian gorilla?\"\n\n\"Gone.\" Slash says, playing his guitar \"Soon after you fell asleep. About half an hour ago.\"\n*page_break I see.\n\n*if ((ACON) and (puzzle >12))\n    *achieve puzzle03\n\"Are you okay, captain?\" asks Will, worried.\n \n\"I'm okay, thank you,\" you reply, scratching your head. \"Sorry to make you all wait.\" You inhale deeply, stretch yourself, then add: \"So, me hearties, the guardians are gone. Does this mean we passed the Trial?\"\n\nEverybody looks at Sam.\n\nHe nods.\n\n\"Okay then,\" you start walking toward the cave entrance. \"Time to enter this cave. Who's going on ahead?\"\n \nSilence falls. Nobody wants to risk going first.\n\"Well, me hearties,\" you say, \"I'll choose for you. The one who will go first will be…\"\n*fake_choice\n    #Laura. Ladies should always go first.\n        *set Mama %-10\n        Laura doesn't look happy, but nevertheless, she prepares to go on ahead.\n         \n        \"Old women are expendable, aren't they?\" she says before entering the cave.\n    #Sam. I am sure your might will protect us all.\n        *set Sam %-10\n        Sam doesn't look happy, but nevertheless, he prepares to go on ahead.\n         \n        He adjusts his monocle, gives you a last, unforgiving glance then enters the cave.\n    #Me. I couldn't stand the idea of risking my precious crew's lives.\n        *set Wit %-10\n        \"Don't bother thanking me.\" you add, \"That's what captains are for.\"\n    #Matthew. You're already dead, so don't worry!\n        *set Slash %-10\n        Slash doesn't look happy, but nevertheless, he prepares to go on ahead.\n         \n        He plays the guitar, singing [i]Knocking on Heaven's Door[/i] while he enters the cave.\n    #Will. I'm sure you'll be okay.\n        *set Will %-10\n        Will doesn't look happy, but nevertheless, he prepares to go on ahead.\n         \n        Muttering to himself and gesticulating as always, he goes on ahead into the cave.\n\nAfter double-checking for dangers or traps, you all gather your courage and enter the cave. An uneven tunnel goes down, deep in the bowel of the earth.\n\nAs you follow it down, the air becomes warmer and warmer while a dim reddish light seems to indicate the end of the tunnel in the distance.\n\nYou finally reach a huge cave, in the center of which stands out an [b]enormous pyramid of gold coins[/b]! Jewels of every shape embellish it, making even more priceless the value of such a precious heap.\n \nAt the summit of this mountain of gold and diamonds, there is a large throne where a skeleton is seated with worn pirate clothes. His bones whitened by time contrast with the splendor of the numerous jewels.\n*page_break WOW!\n\nThe sight of such a treasure is breathtaking indeed.\n \nYou all stop for a moment to admire the incredible heap of treasure before you.\n\n\"Rich!\" Matthew throws his skull in the air \"We are rich beyond our wildest dreams!\"\n \n\"What's a skeleton doing up there?\" Will asks, trembling \"It freaks me the hell out!\"\n \n\"Who cares about the money?\" shouts Laura, looking at her wrinkly hands \"I guess we are now '[i]On the slopes of the mountain from which earth's red blood bubbles[/i]', aren't we? Let's look for a way to lift our curse before it's too late! No use in being rich when you're a goner!\"\n\n*comment *temp gold false\n*temp statues false\n*temp time false\n*comment *label cavern\nThe skeleton watches you silently from the top of the shining treasure mountain.\n \n\"Orders, captain?\" asks Will, trembling.\n*fake_choice\n    #What are we waiting for? Let's fill our pockets with gold!\n        \"Aye aye, captain!\" everyone answers, rushing to the treasure hoard.\n         \n        Only Will hesitates, standing next to you.\n        \n    #That skeleton up there bothers me. Let's check it out!\n        Nobody pays you attention. They all rush to the treasure hoard.\n         \n        Only Will hesitates, standing next to you.\n        \n    #Let's look around for a way to lift our curse.\n        Nobody pays you attention. They all rush to the treasure hoard.\n         \n        Only Will hesitates, standing next to you.\n        \n\"Hey!\" Slash curses, almost stumbling, \"What's this, here on the floor? Everybody, come here and take a look!\"\n\nYou all gather around Matthew.\n \nIn the dim red light, you see on the floor [b]five little golden statuettes[/b]. You cautiously bow to examine them.\n \nThey are about five inches tall, they seem made of solid gold and…\n\n\"Blimey!\" you exclaim, shocked \"This one looks exactly like my grandfather Guy!\"\n*page_break What does this mean?\n\nExamining the remaining statuettes, every single member of your crew recognizes his missing grandparent in one of them.\n\n\"Who would ever make a statue of my granddad?\" Slash asks \"And why leave it here? And look at the pose: they all look like they are [i]trying to sneak away with the booty[/i].\"\n \n\"I don't care!\" Will cries, frightened, \"I'm afraid those objects are cursed! Better not touch them, or our own curse will become even worse!\"\n\n\"What do you think, Laura?\" you ask.\n \n\"Bad Mojo!\" she says, examining her grandmother's statuette. \"Every single statuette emanates a vary bad Mojo aura. A very bad curse weighs on them!\"\n\n\"I knew I was right!\" Will trembles in fear \"Keep those cursed objects away from me!\"\n*page_break He has a point.\n\nSam rises his hand and shows you his notepad.\n \nYou read: [i]What if those statuettes actually were our grandparents?[/i]\n\n\"No way!\" Will objects \"They're way too small. Why are we still  wasting precious time on these cursed objects?\"\n \n\"Yes, they are small,\" Slash replies \"But then again, we came here looking for [i]something from our grandparents' body[/i]. What if these statuettes for whatever reason contained even a little piece of our gramps' bodies? We could throw them into Voodoo Lady's cauldron and end this curse for good!\"\n\n\"What do you say, Laura?\" you ask \"Are these statuettes the objects we've been looking for? Or should we follow Will's advice and leave them here?\"\n \n\"I'm sorry\" Laura cries \"My powers are fading away. The curse weighing on these statuettes is too powerful for me to see through it in these conditions.\"\n\nAll of a sudden, you realize that the treasure is not the crew's foremost concern now.\nEveryone waits for your decision. Better picking these weird statuettes up or leaving them where they are?\n*fake_choice\n    #These statuettes are bad Mojo. Let's leave them here.\n        \"I agree!\" Will says \"Let's stay away from those cursed objects!\n        \n    #Let's bring the statuettes with us.\n        *set statues true\n        *set Special_Items \"Golden Statuettes, Nautical Map\"\n        \"Keep those things away from me!\" Will cries, gesticulating as always.\n         \n        \"Let's hope these little ones will help us\" you say,  picking up the five golden statuettes and storing them away.\n\n*label cavern\nYou now stand in the center of the big, red-glowing cave. The spooky pirate skeleton looks at you from the tall treasure mountain.\n \nYou feel a sense of impending doom looming over you. In the unnerving silence everyone waits for your orders.\n*choice\n    *disable_reuse #What are we waiting for? Let's fill our pockets with gold!\n        *set gold true\n        *set time true\n        *set Pieces_of_Eight +1000000\n        \"Now we're talking!\" Slash exclaims, diving into the gold mountain.\n         \n        Laura approaches the mountain too and picks the most refined jewels. Sam prefers crowns and scepters. Will wins his doubts and starts lining his pockets with gold.\n        \n        You follow them, putting together about [b]one million Pieces of Eight[/b]!\n        \n        \"No need to overload ourselves!\" you say, \"Let's go back to the ${Ships}, drop whatever we've collected and then come back for more! We'll need to be back here at least ten times to completely haul all this treasure!\"\n        *page_break Let's do it!\n        *goto cavern\n    #That skeleton up there bothers me. Let's climb the treasure mountain and check it out!\n        Everybody's faces whiten.\n        \n        \"No way!\" Will cries, shaking \"I am not going near that creepy thing!\"\n         \n        \"I am too old for free climbing…\" Laura sighs \"And the whole treasure mountain would collapse if Sam tried to climb it.\"\n        \n        \"I see\" Matthew says, lying his guitar on the floor \"No problem, mates! I'll climb it. After all, me and that bone sack are almost colleagues. I don't think it would harm a zombie.\"\n        *page_break Well said, Matthew!\n        *goto ghost\n    *disable_reuse #Let's search this cave and look for hints about our curse.\n        *set time true\n        \"Okay, mates!\" you say \"Let's search this cave for clues. Sam and Laura will examine the treasure mountain while Will, Slash and I will search everywhere else.\"\n        \n        \"Aye aye, captain!\" everyone replies.\n        *page_break Keep your eyes open.\n        \n        After about half an hour search, you all gather under the big treasure mountain.\n        \n        \"Long story short,\" you say \"We found nothing useful. No further exits, no hints, no clues. Nothing we didn't already know. What about you?\"\n        \n        \"Alas…\" Laura says \"My powers almost completely faded away. I can feel an ominous presence, and imho it's somehow related to the [b]skeleton[/b] up there.\" She points her wrinkly finger at the pirate skeleton sitting upon the throne atop of the treasure mountain.\n        \"Sorry I cannot be of much help.\" she adds, \"Sam, on his part, appraised the treasure. Its value should be about forty seven billions pieces of Eight.\"\n         \n        Sam nods.\n        \n        \"Tell me, Laura, is the treasure safe?\" you ask \"Or is it cursed as the statuettes?\"\n         \n        Laura sighs. \"I can't say. I have confused omens about everything here. I feel so useless…\"\n        \n        You cheer Laura up and decide what to do next.\n        *page_break What now?\n        *goto cavern\n    *if (not(statues) and (time)) #I changed my mind. Let's pick up the golden statuettes.\n        *set statues true\n        *set Special_Items \"Golden Statuettes, Nautical Map\"\n        \"Keep those things away from me!\" Will cries, gesticulating as always.\n         \n        \"Let's hope these little ones will help us\" you say,  picking up the five golden statuettes and storing them away.\n        *page_break What now?\n        *goto cavern\n    *if ((gold) or (statues)) #We're done here for now. Let's go back to our ship!\n        You turn your back to the mountain of gold and head for the tunnel leading out.\n        *page_break ${Ships} here we come!\n        *if (gold)\n            *goto_scene treasure\n        *else\n            *goto ghost\n\n*label ghost\n[i]MWAHAHAHAHAHA![/i]\n\nA creepy laughter echoes through the cave.\n\nYou turn around and see an ethereal silhouette floating in mid-air.\n\nIt looks like a pirate with a fiery beard and eye sockets as dark as night.\n \n\"Welcome, [i]grand-niece[/i]…\" it says, sketching a smile in your direction.\n\n\"Grand-niece?\" you ask, puzzled. \"Who are you?\"\n \n\"Don't you recognize me?\" the ghastly silhouette asks. \"I am your [b]great-uncle Charles[/b],\" he says with a French accent. \"Charles Brushwood!\"\n*fake_choice\n    *selectable_if (Aristocrat >39) #Glad to make your acquaintance, Monsieur Charles!\n        *set Aristocrat %+10\n        \"[i]Monsieur Charles[/i]?\" the ghost chuckles. \"Nobody ever called me that way.\"\n    *selectable_if (Aristocrat \u003c61) #Sorry, I never heard of you before.\n        *set Aristocrat %-10\n \n\"I see.\" the pirate continues. \"My brother Guy never mentioned me, did he?\"\n\n\"Chuckie?\" you suddenly remember. \"Oh my God, is that you, great-uncle [i]Chuckie[/i]?\"\n \nThe ghost's eyes are set ablaze. \"Never…\" he says with an angry voice. \"Never use that pitiful nickname again. I hate it!\"\n \nThe specter rises up in the air and shouts: \"The world knows me as the fearsome pirate [b]LeChic[/b]!\"\n\nThe ghost's words echo in the red cave, chilling everybody's blood.\n*page_break No way! [i]That[/i] LeChic?\n        \nYou immediately remember the countless stories your grandpa told you about his arch-enemy: the fearsome pirate LeChic.\n \nAmong the thousands of misdeeds, LeChic vied with Guy for your grandmother's hand, tried to kill your grandfather countless times, and sent thousands of innocent lives into Davy Jones's locker. He thus acquired Voodoo powers beyond every man's imagination.\n \nHow could he be so wicked, being your grandfather's brother? And why didn't your grandfather ever tell you about their blood ties?\n\n\"The ghost pirate LeChic!\" Will cries in fear, \"We're doomed! Run for your lives!\"\n \nYou see Will running away toward the cave exit. Alas, a bitter surprise awaits him: the tunnel is nowhere in sight.\n*page_break There's no way out!\n\n\"Wanna leave so soon?\" the pirate laughs. \"That would be very impolite of you. I strived so much to have you all here!\"\n\nTrembling, Will crouches on the floor. \"We're all doomed!\" he mutters, covering his eyes in fear.\n \n\"Oh, yes, you are!\" LeChic giggles, floating in the air. \"Am I right, my worthless slaves?\"\n \n\"Yes, master!\" Laura and Matthew reply. They stand still, gazing into the void with pupilless eyes.\n\n\"Oh, no!\" you shake them vigorously, \"Matthew! Laura! Can you hear me? Don't surrender to its power!\"\n \nYour efforts are to no avail. Laura and Matthew keep standing still, motionless, gazing into the void.\n\n\"Fools!\" the pirate shouts. \"Within my phasing form courses more voodoo power than your pitiful mind can possibly imagine!\"\n*page_break Damn!\n\nSam suddenly steps forward.\n \nRoaring, he punches the ghost with all his brutal strength.\n\nAlas, his big, hairy arm phases through the laughing ghost.\n \n\"Pitiful,\" LeChic says, \"Don't you know you cannot harm a ghost with bare hands?\" He then materializes a banana into the gorilla's hands. \"Here you are, entertain yourself!\"\n \nHypnotized, Sam sits down and slowly munches the banana, gazing into the void.\n\n\"Now, dear ${Name}\" the ghost smiles. \"Why don't we have some fun the Guy way?\"\n*fake_choice\n    *selectable_if (Wit >39) #Why not? Sounds fun!\n        *set Wit %+10\n        [i]I have to buy time![/i] you think [i]The more he talks, the more time I have to find a way out of this mess.[/i]\n        \n        \"Good!\" the ghost giggles. \"Let's start right away!\"\n    *selectable_if (Wit \u003c61) #Please, spare us all. We never wronged you.\n        *set Wit %-10\n        \"Did Guy spare me when he could?\" LeChic asks, \"No, that's why I'm not physical now!\"\n        \n\"Your wicked grandfather,\" LeChic continues, \"Enjoyed bothering me with his silly questions, insults, and mockeries. Now it's my turn to have fun: you'll endure the same torture he inflicted on me!\"\n\n\"That's not fair!\" you reply, deliberately stalling for time. \"Why do you pick it on me? I'm not responsible for his actions.\"\n\n\"You know…\" the ghost replies, \"You look like him, you talk like him, you reek like him… How could I ignore this great revenge chance?\"\n \nYou have to admit he does have a point.\n\n\"Okay, let's get this started!\" LeChic foretastes his revenge. \"Tell me, ${Name}, how does it feel like, to be in a body that's not your own?\"\n*fake_choice\n    *selectable_if (Charm >39) #I see you've suffered much. Together we will find a way to ease your pain.\n        *set Charm %+20\n        \"Oh, it's so sweet of you!\" he replies.\n    *selectable_if (Charm \u003c61) #If only you weren't a ghost, I'd gladly let you experience my sword in your guts.\n        *set Charm %-20\n        \"Edgy!\" he replies.\n    *selectable_if (Wit >39) #I see you're curious. I'm ready to trade places anytime.\n        *set Wit %+20\n        \"As witty as your granddad!\" he replies.\n    *selectable_if (Wit \u003c61) #Your remorses and regrets will make you suffer ten times my sufferings.\n        *set Wit %-20\n        \"I'm shaking, I'm shaking!\" he replies.\n \n\"You know, ${Name},\" LeChic continues, \"I can perfectly understand how you feel. I've been forced to change many different bodies, one worse than the other. Zombie, ghost, devil, you name it! And it was all your grandfather's fault!\"\n\nYou strive to find a way to save everyone while LeChic talks, but alas, no solution comes to your mind.\n\n\"Now that I could exact my revenge…\" he continues, floating in the air, \"Do you think I held a grudge against him? No way! You saw what I did! I behaved like a gentleman, and [i]gave him a body of solid gold[/i]!\"\n \n\"This means…\" you finally realize it, \"Those statuettes actually are…\"\n*page_break Cursed people!\n\nLeChic words shock you.\n \nAll these years, you thought your grandfather was lost at sea, but he was cursed into a coffin of solid gold instead!\n\n\"What happens?\" the ghost asks, floating around you, \"You don't believe what I say? You'll see with your own eyes what happens now to your ridiculous friend!\"\n \nMaking arcane gestures, LeChic says: \"[i]Tu es venu ici pour voler mon trésor, tu resteras à jamais dans un corps d'or[/i]!\"\n\n\"Will!\" you scream \"No!\"\n \nBefore your unbelieving eyes, you see your friend becoming smaller and smaller until it turns into a little golden statuette.\n*page_break Will!\n\n\"Why?\" you cry, desperate \"Why are you doing this to us?\"\n \n\"Don't blame me!\" LeChic replies, \"It's all Guy's fault. He decided on his own to come here with a crew of losers and try to steal my treasure. But they all met their demise, as you can see. So I thought: why don't I use my brother's blood to come back to life again?\"\n\n\"Nice plan,\" you admit, wiping your tears. \"But why did you involve me in all of this?\"\n \n\"As I told you,\" the ghost whispers in your ear, \"You should blame it on your granddad! That braggart had not enough blood on him to properly fulfill the ritual! I bet he has more grog than blood in his veins! Whatever the reason, I had to lure here someone else who had Guy's blood in his veins. And guess who was the lucky one?\"\n\n\"…Me.\" You sigh. Everything is finally clear now.\n\n\"It's always Guy's fault.\" LeChic says, floating around you, \"Nothing personal, ${Name}. But enough talking about me! Tell me instead, my dear, how did you like your wedding?\"\n \nYour great-uncle's words strike you deeply. That's a low blow indeed!\n*fake_choice\n    *selectable_if (Charm >39) #Sorry, it was postponed. Save the new date; I'd be delighted to have you among my guests!\n        *set Charm %+20\n        \"Count on me!\" he replies. \"I'll be there!\"\n    *selectable_if (Charm \u003c61) #Tell me where your grave is, we'll be dancing there all night long.\n        *set Charm %-20\n        \"I like your attitude!\" he replies.\n    *selectable_if (Wit >39) #If I remember correctly, my wedding went better than yours.\n        *set Wit %+20\n        \"Touché!\" he replies.\n    *selectable_if (Wit \u003c61) #This pitiful behavior will only increase the pain and sufferings you'll endure.\n        *set Wit %-20\n        \"I'm shaking, I'm shaking!\" he laughs.\n \n\"You probably ignore, ${Name}\" LeChic continues, \"That I should have been the one marrying Helena. But alas, that pestering Guy ruined my plans and my life as well. Can you imagine how good it felt, after so many years, ruining the wedding of someone who looks exactly like that biscuit-eater?\"\n\nYou strive to calm your burning anger. You focus on trying to find a way out of this mess.\n\n\"No.\" LeChic makes his arcane gestures again, this time aiming at Sam. \"I guess you don't know how good exacting such a vengeance feels.\"\n\"Saaaam!\" you shout, running towards your friend. When you arrive, he's turned into a little golden statuette representing a gorilla munching a banana.\n\n\"Helena missed a great chance in her life,\" LeChic continues, ignoring your desperate cry \"Alas, who cares about the past? Soon, I'll be back in my prime, and I'll have all the wenches in the world!\"\n\nYou softly hug the little golden statuette.\n*page_break Sam!\n\n\"Time over!\" LeChic suddenly shouts, \"You know, Guy, I mean, ${Name} I'd go on mocking you forever, but alas, I have a rigorous schedule. It hurts me so much not indulging in looking at that suffering face of yours longer, but my desire to being alive again is much stronger. Let's proceed to the final act: where you turn into a golden statuette, and I come back to life again!\"\n\n\"Please!\" you cry, desperate. \"How can you think to do such a terrible thing to me? Am I not your favorite grand-niece?\"\n \nLeChic bursts into laughter.\n \nYou look around: no exit in sight. Matthew and Laura are still standing there, motionless, gazing into the void. Alas, they won't be of any help.\n\n\"You're so naive!\" the frightening ghost floats in front of you, looking into your eyes. \"I'll ask you one last thing: did Guy spare me because I was his brother?\"\n \nDeep inside, you know the answer.\n\n\"See?\" LeChic shrugs. \"It's always his fault. If he didn't backstab me as a coward, now I wouldn't need to take your life as well as his.\"\n*page_break No way!\n\n*set Special_Items \"Golden Statuettes, Jeweled Saber, Nautical Map\"\n\"But fear not, ${Name}!\" LeChic smiles, rummaging in the shimmering treasure mountain. \"I am not a bilge-sucking coward like my bro. For our blood ties' sake, I will not transform you into a golden statuette now. No, that would be too lame.\"\n\nThe ghost extracts from the pile of treasures a [b]jeweled saber[/b] and throws it at your feet.\n \n\"See, ${Name}?\" LeChic unsheathes a blade rusted by time while his beard becomes fierier and fierier. \"I will now behave like a pirate gentleman and challenge you to a fair duel. After all, aren't you my favorite grand-niece?\"\n\nYou slowly pick the saber up. You know too well you won't harm a ghost with it, yet you've got to stall as much as you can for time, waiting for a miracle to happen.\n*page_break I need a miracle!\n\nIn the glittering treasure cave, you and the ghost pirate face each other, sword in hand in front of seven golden statuettes and two mindless ghouls that once were your crew members.\n \nLeChic chuckles, anticipating his easy victory. \"I will drain your blood with this sword… One drop at a time… Slowly… Painfully… Until your suffering face will be forever chiseled in gold.\"\n\nWhile the ghost's frightful laughter echoes in the cave, you strive to remember the few fencing lessons that your grandfather Guy impart l!\"\n \n\"Not exactly,\" Laura adds, \"Only people with extreme Voodoo powers could perform such a nasty ritual.\"\n \n\"Very well.\" Slash says, \"Why don't we leave the skeleton alone and leave this place for good? Let's not push our luck!\"\n \nSam nods in agreement.\n\nYou wonder. Is this skeleton actually your great-uncle's? What does this parchment mean? Did someone already perform this ritual?\n \nAnd did the skeleton actually move its hand now, or is it just your imagination?\n*choice\n    #I don't want to waste more precious time. I climb down.\n        This is no good.\n         \n        [i]Better safe than sorry[/i], you think.\n\n        You immediately climb down the mountain of treasure and reassure everyone you are okay.\n        *page_break Let's get away!\n        *goto finalcave\n    #I stay here, trying to figure out the scroll's riddle.\n        *label throne\n        Setting your fears aside, you strive to calm down and to use all your smarts and intuition to figure out a way to solve this puzzle.\n         \n        You are quite sure you saw the skull move, but you keep telling yourself it's just your imagination.\n        *choice\n            #I don't want to waste more precious time. I climb down.\n                This is no good.\n                 \n                [i]Better safe than sorry[/i], you think.\n\n                You immediately climb down the mountain of treasure and reassure everyone you are okay.\n                *page_break Let's get away!\n                *goto finalcave\n            #I read the parchment again\n                You reread the parchment. Silently, just in case.\n\n                [i]After countless robberies and strife,[/i]\n                 \n                [i]From the shining sun from now I’ll be away.[/i]\n                 \n                [i]I sit on this throne and deny my own life,[/i]\n                 \n                [i]By my side all this gold forever will stay.[/i]\n\n                *page_break What does this mean?\n                *goto throne\n            #I sit on the throne.\n                *temp luck 0\n                *rand luck 1 100\n                \"I figured it out!\" you say. \"If I sit on this throne, I will break the curse. And we'll be free from LeChic forever!\"\n                 \n                \"We're already free! Will shouts, \"Please, captain, climb down! Let's go away!\"\n                 \n                \"No, captain, no!\" Laura cries, \"It's too dangerous!\"\n\n                You're determined to stop LeChic from coming back to taunt you, whatever it takes. After inhaling deeply, you sit on the throne, over the uncomfortable, bleached skeleton.\n                *page_break Rest in peace, great-uncle!\n                *if (luck > Mojo)\n                    *goto sitbad\n                *else\n                    *goto sitok\n            *disable_reuse #We need to bring only the skeleton outside.\n                *set Mojo -10\n                \"Now I get it!\" you say. \"If we take this skeleton outside, the sun will lift the curse. And we'll be free from LeChic forever!\"\n                 \n                \"We're already free!\" Will shouts, \"Please, captain, climb down! Let's go away!\"\n                 \n                Sam shakes his head, disapproving.\n                \n                Ignoring their pleas, you lift the skeleton from the throne and carry it on your shoulders.\n                 \n                An irresistible force pulls it back in place.\n                \n                No matter how hard you try, every time you want to bring the skeleton with you, it goes back in place.\n                *page_break We're going nowhere.\n                *if Mojo \u003c1\n                    *goto_scene gold\n                *else\n                    *goto throne\n            *disable_reuse #We need to bring only the throne outside.\n                *set Mojo -10\n                \"Now I get it!\" you say. \"If we expose the throne to direct sunlight, the sun will lift the curse. We just need to get the skeleton away now, and the curse will be lifted!\"\n                 \n                \"We don't need that!\" Will shouts, \"Please, captain, climb down! Let's go away!\"\n                 \n                \"Why risk?\" Slash says, \"Let's go away and save our hides instead.\"\n                \n                Ignoring their pleas, you scatter all bones away from the throne to leave it clean.\n                 \n                Before your unbelieving eyes, all bones go back to their previous place, as if nothing happened.\n                \n                No matter how hard you try, every time you want to clear the throne from the skeleton, every single bone goes back into place.\n                *page_break This is no good.\n                *if Mojo \u003c1\n                    *goto_scene gold\n                *else\n                    *goto throne\n            #Let's bring the skeleton and the throne outside the cave.\n                *set throne true\n                \"That's it!\" you say. \"We need to bring this throne and the skeleton outside in the sunlight. That's the only way to get rid of LeChic forever!\"\n                 \n                \"No, captain, no!\" Laura cries, \"It's too dangerous!\"\n\n                Paying no heed to their pleas, you push the throne with all your strength.\n                 \n                \"Watch out, it's about to fall down!\" you shout.\n                \n                Everybody runs away before the big throne hits the cavern's floor, scattering the skeleton's bones all over the place.\n                *page_break Is everyone okay?\n                \n                Before your unbelieving eyes, the skeleton's scattered bones fly back on the throne, recomposing the structure.\n                 \n                You immediately climb down the mountain of treasure and reassure everyone you are okay.\n                \n                \"Are you sure bringing these two outside is actually a good idea, captain?\" Slash asks.\n                 \n                \"What do you think, Laura?\" you ask.\n                 \n                Laura shrugs.\n                \n                \"Well,\" you say, \"there's only one way to find out.\"\n                *page_break Fingers crossed.\n                *goto finalcave\n             \n*label sitok\nYou feel an icy sensation spreading through your body. You hear unearthly screams and see hellish landscapes while your whole body shakes.\n\n\"Captain!\" everybody screams from below.\n\nYou try to get up, but an irresistible force binds you to the throne.\n\nEventually, the painful cold subsides. The skeleton below you turns into dust and dissolves into thin air.\n \nScreaming, you get up, panting.\n*page_break Thank God I'm alive!\n\n*set dust true\nStaggering, you climb down the mountain of treasure.\n\n\"Captain!\" everyone comes around you. \"Are you okay, captain?\"\n \n\"Yeah, sort of,\" you reply, fighting against a terrible headache.\n*page_break Hopefully, it's all over!\n*goto finalcave\n\n*label sitbad\nYou feel an icy sensation spreading through your body. You hear unearthly screams and see hellish landscapes while your whole body shakes.\n\n\"Captain!\" everybody screams from below.\n\nYou try to get up, but an irresistible force binds you to the throne.\n\nThe painful sensation becomes unbearable! You scream in pain before everything fades to black.\n*page_break ...\n\nYou open your eyes, filled with anger.\n\nYou look around: there are four weird people below your cherished treasure mountain. [i]How dare they[/i]?\n\nYour evanescent spirit soars up to the cave's ceiling. You are powerful beyond your wildest dream, and you won't let those filthy thieves lay a single finger on your precious treasure!\n\nEveryone beware of captain ${Name}: this treasure is yours, and you'll protect it for eternity!\n*goto_scene ending\n\n*label doubt\n\"Everyone, stop!\" Laura says.\n\nYou all stop before entering the tunnel that leads outside.\n \n\"What's up, Laura?\" you ask, concerned.\n\n\"Sorry, captain, but I think I realized something important,\" she replies. \"The parchment said: [i]By my side all this gold forever will stay.[/i] What if the treasure is cursed?\"\n\nEverybody freezes, wondering.\n\n\"I don't want to end up like our grandparents!\" Will cries, \"Let's leave all this cursed gold here!\"\n \n\"Are you absolutely sure, Laura?\" Slash asks, concerned. \"This treasure could change everybody's lives for good! I'd rather die trying than living with the remorse of leaving such a booty behind me.\"\n*page_break Let's think this over.\n\n\"Alas, I am not sure at all,\" Laura replies, crying. \"My Voodoo powers drained up, and I cannot sense magic or curses anymore. What I said is only personal speculation.\"\n\n\"This means,\" Slash adds, \"That you could be wrong and the treasure could be perfectly safe!\"\n \n\"I'd bet it's cursed instead!\" Will replies, \"I don't want that ghost's cursed money!\"\n\nThe crew starts arguing. Sam and Matthew believe the treasure is safe, while Laura and Will think it's cursed.\n*choice\n    #Better safe than sorry. Let's leave this probably cursed treasure behind for now.\n        *set gold false\n        *set Pieces_of_Eight -1000000\n        \"Better safe than sorry,\" you say. \"Let's leave all the treasure here and reach the exit first. We could always come back and pick it up later!\"\n         \n        Everyone sadly nods. You drop all the treasure you collected from the mountain of gold.\n        \n        You then enter the tunnel and start climbing back to the surface.\n        *if (throne)\n            Your crew follows you, staggering under the weight of the throne. The skeleton's eyes seem to shine in the dark.\n        *page_break Hurry up!\n        *goto surface\n    #This treasure is perfectly safe. Don't worry. We'll exit this place as wealthy adventurers!\n        \"We don't know if this treasure was cursed in the first place,\" you say. \"But I am sure that after defeating LeChic, whatever nasty curse he cast doesn't work anymore.\"\n         \n        Everyone happily nods.\n        \n        \"Follow me, ${Crew_Name}! We'll soon be rich beyond measure!\" You then enter the tunnel and start climbing back to the surface.\n        *if (throne)\n            Your crew follows you, staggering under the weight of the throne. The skeleton's eyes seem to shine in the dark.\n        *page_break Hurry up!\n        *if ((throne) or (dust))\n            *goto surface\n        *else\n            *goto_scene treasure\n        \n*label surface\nAfter a long, exhausting climb, you finally reemerge from the winding tunnel. Breathing fresh air and basking in the sun fills you with joy.\n \nThe same thing happens to your crew. As soon as they exit the tunnel, they drop all equipment and start to celebrate.\n\n*if (throne)\n    You suddenly notice smoke rising from the skeleton on the throne. Everyone steps aside from it, just an instant before it bursts into flame. \n    *if (ACON)\n        *achieve ghostbusters\n    *set puzzle +1\n    *if ((ACON) and (puzzle >13))\n        *achieve puzzle04\n    Under the shining sun, fiery blazes consume both bones and throne in the blink of an eye. Before you can realize it, the eerie sit and its frightful occupant are no more. Hopefully, [b]this is the end for LeChic[/b] and his dreaded legend.\n    \n*if not (gold)\n    A frightening boom behind you startles you all. You turn and see the tunnel collapsing. You exited the cavern just in time!\n    \nBreathing a sigh of relief, you start walking back to your ship.\n*if (gold)\n    You're all loaded with treasure that will slow you down, but you don't really mind.\n*page_break Let's avoid the cannibals.\n\nAfter about two hours of backtracking, you eventually reach the beach where your lifeboat awaits you.\n \nLuckily, no cannibals in sight. The lifeboat is there, the banana tree didn't move, and you can easily see the ${Ships} not too far away from the beach.\n\nYou rush to the lifeboat, you quickly board it and row away from Donkey Island towards your ship.\n*page_break So long, cannibals!\n*if (davyjones)\n    *goto davy\n*else\n    *goto ship\n\n*label davy\nSuddenly, the sky darkens. A strong wind blows, and the sea becomes stormy.\n \nBefore your unbelieving eyes, you see a frightening ship rising from the ocean depths. Its rigging draped in seaweed and its sails glowing like fire. Its very beams sigh with human voices, weighed down with a century of weary toil.\n\n\"The Flying Dutchman!\" Laura screams, making the sign of the cross, \"This is an evil omen!\"\n\nThe dreary ship speeds across the water towards you.\n \n\"Oh, no!\" Will screams, \"They're on a collision course with us!\"\n \n\"Row like there's no tomorrow!\" you shout.\n\nBefore you can even realize it, you see the frightening prow of the Flying Dutchman crashing your lifeboat at full speed. You hit your head on the ship's timbers, and all goes black.\n*page_break Is this the end?\n\n\"Wake up, landlubber!\"\n \nThe foreign voice splashes your face, and you suddenly wake up in chains. You immediately realize that the same fate befell all your crew members. You realize you're on the Flying Dutchman's main deck, surrounded by a terrifying mob of half men, half-fish crew members.\n\n\"You are captain ${Name} Brushwood, right?\" asks you a scary boatswain who has crab claws instead of arms. He reads from a parchment you saw in Dan's office: \"Signing this contract, you sold all crew members on the ${Ships} to our captain, Davy Jones. What we now need to know is…\"\n\n\"What?\" Will is shocked. \"This is not possible!\"\n \n\"There's a mistake!\" Laura adds.\n \n\"Our captain would NEVER sell us!\" Slash concludes.\n*page_break Everybody on deck laughs.\n\n*set Mama 0\n*set Slash 0\n*set Sam 0\n*set Will 0\n\"It happens all the time.\" the crab-armed boatswain says, laughing, \"Yet, it's always so hilarious!\"\n \nHe shows the parchment to every single one of your crew members. You turn your head aside, not to see their disappointed faces.\n\n\"How could you…\" you hear Will crying.\n \nSam has a burst of anger, but the weird mermen keep him at bay.\n \nLaura and Matthew are too shocked to speak.\n\n\"Now!\" the crab-like boatswain continues. \"Let's get down to business. As per this contract, you sold all crew members' souls on the ${Ships} to our captain. Is all the crew in front of me here, or did you leave someone ashore? Did you maroon anyone by any chance?\"\n*choice\n    #Please, sir boatswain, be merciful. Spare us all in the name of God!\n        The fish-men crew burst into laughter again.\n         \n        \"You asked for this!\" the crab boatswain says. \"Signing this contract, you choose your own doom! Not even God could save you now!\" He then turns to a lobster-man and tells him: \"All set. They are all yours now!\"\n        \n        Grinning, the lobster-man lashes your back with his antennae.\n         \n        Your story ends here, working as a slave for an eternity before the mast on the Flying Dutchman.\n        *goto_scene ending\n    #I don't know what you're talking about. I've never seen that parchment before\n        The fish-men crew burst into laughter again.\n         \n        \"Playing dumb, captain?\" the crab boatswain asks. \"There's Dan's signature on this, and Dan never lies to us!\" He then turns to a lobster-man and tells him: \"All set. They are all yours now!\"\n        \n        Grinning, the lobster-man lashes your back with his antennae.\n         \n        Your story ends here, working as a slave for an eternity before the mast on the Flying Dutchman.\n        *goto_scene ending\n    *selectable_if (gold) #We offer you a fair exchange: one million Pieces of Eight for our souls!\n        The fish-men crew burst into laughter again.\n         \n        \"Money?\" the crab boatswain says. \"We have no use for money here! Besides, your precious money is in Davy Jone's locker now!\" He then turns to a lobster-man and tells him: \"All set. They are all yours now!\"\n        \n        Grinning, the lobster-man lashes your back with his antennae.\n         \n        Your story ends here, working as a slave for an eternity before the mast on the Flying Dutchman.\n        *goto_scene ending\n    #That contract is void. Unchain us now, or face the wrath of the Loa.\n        The fish-men crew burst into laughter again.\n         \n        \"Preposterous!\" the crab boatswain laughs. \"Contracts like these brought us thousands of souls, approved by the Loa.\"\n        \n        \"I'm sure of that,\" you reply boldly. \"But I can assure you this time you're sorely mistaken. Unchain us now, and we will pretend nothing happened.\"\n         \n        The boatswain keeps laughing, followed by the menacing crew. \"Tell me, captain 'know-it-all',\" he adds. \"Why is this contract void?\"\n        *choice\n            #Because I didn't sign it with my blood.\n                \"So what?\" the crab boatswain laughs. \"I don't care what kind of ink you used. Your souls now belong to Davy Jones!\" He then turns to a lobster-man and tells him: \"All set. They are all yours now!\"\n\n                Grinning, the lobster-man lashes your back with his antennae.\n                 \n                Your story ends here, working as a slave for an eternity before the mast on the Flying Dutchman.\n                *goto_scene ending\n            #Because you didn't capture us on the ${Ships}.\n                *set sname true\n                Silence falls.\n                 \n                \"The contract says…\" you continue, standing up, \"That I sold the souls of all crew members ON the ${Ships}. But, as everyone here witnessed, you did NOT capture us on that ship. Thus, that contract is void.\"\n                \n                \"Don't try to fool me, biscuit-eater!\" the crab-man threatens you with his sharp claw. \"You're all doomed!\"\n                 \n                \"No, sir,\" you try to stay calm. \"According to maritime law, we are now castaways. Since you decided of your own will to take us aboard, now you're compelled to treat us as guests.\"\n                *page_break The boatswain whitens.\n                \n                \"Yessir!\" you shout, \"Thank you for rescuing us! Now we'll enjoy this wonderful cruise on the Flying Dutchman as guests: lying in the sun and sipping drinks. You'll give us food and lodgings, and you'll let us disembark in the nearest port. Too bad you cannot land very soon, am I right? I'm sure the captain will be delighted to know we'll be his guests for another ten years… I'm sure he'll thank you personally for this…\"\n                \n                The fish-men look at the boatswain expectantly.\n                 \n                \"Shiver me timbers!\" the crab man curses, ordering to the crew: \"Get those filthy scumbags on a boat and send them away!\"\n                *page_break Yes!\n                \n                *if (gold)\n                    *set gold false\n                    *set Pieces_of_Eight -1000000\n                Reluctantly, the dreary crew lowers a lifeboat and pushes you all on it.\n                 \n                \"You'll regret this, ${Name}!\" the crab-man shouts. \"I will give you no quarter! There is no place where you can hide from me! Your soul will be mine!\"\n                \n                Ignoring his threats, you all row away from the Flying Dutchman, which suddenly plunges into the dark abyss of the sea.\n                 \n                Everyone is happy to be alive, but you see you lost your crew's trust. Nothing will ever be the same.\n                *goto ship\n            #Because I was forced to sign it against my will.\n                \"Oh, poor little kid!\" the crab boatswain laughs. \"We'd better not tell your mama about your little pranks! It doesn't matter what you think; your souls belong now to Davy Jones!\" He then turns to a lobster-man and tells him: \"All set. They are all yours now!\"\n\n                Grinning, the lobster-man lashes your back with his antennae.\n                 \n                Your story ends here, working as a slave for an eternity before the mast on the Flying Dutchman.\n                *goto_scene ending\n            #Because we are all cursed. These bodies you see do not actually contain our true souls.\n                \"Lucky you!\" the crab boatswain grins. \"So you won't mind if we take them all, do you?\" He then turns to a lobster-man and tells him: \"All set. They are all yours now!\"\n\n                Grinning, the lobster-man lashes your back with his antennae.\n                 \n                Your story ends here, working as a slave for an eternity before the mast on the Flying Dutchman.\n                *goto_scene ending\n    #I can provide you five more 'golden' souls, but I need to talk with the captain about that.\n        *set Charm %-20\n        *set Wit %-20\n        The fish-men crew burst into laughter again.\n         \n        \"Five more souls?\" the crab boatswain says, \"What are you, a cat?\" He then turns to a lobster-man and tells him: \"All set. They are all yours now!\"\n        \n        \"Wait!\" you scream, shaking violently until one of the golden statuettes drops on the deck. \"This is one of them. I have five, each one holding a soul in it. Take me to the captain, and I will provide you five more souls.\"\n         \n        \"You scurvy dog!\" Will spits at you, \"Leave my grandpa alone!\"\n         \n        All your other former crew members curse you and offend you in many ways.\n        *page_break You ignore them.\n        \n        The crab-man picks Will's grandpa statuette with his claw.\n         \n        \"Well, well, well…\" he wonders. \"This exudes bad Mojo.\" He looks into your eyes and continues: \"Our captain will be happy to hear I've enrolled five souls more, and I will finally become second in command!\"\n        \n        He unchains you and then pushes you roughly towards the sterncastle. \"Don't even think about making rash moves,\" he threatens you with his sharp claws, \"Or you'll sorely regret it. For eternity!\"\n        *page_break You remain silent.\n        *goto captain\n    \n*label captain\nYou are escorted into the captain's room. Davy Jones has his back to you, admiring the storm raging outside.\n \n\"Captain!\" the crab-man says. \"I have a present for you. This harvested soul here will now produce you five more souls. This is a personal gift I offer you, captain. I hope you like it!\"\n\nDavy Jones turns to face you. His fearful appearance strikes you deeply. Red eyes blaze in his cephalopod-like head. Prehensile octopus-like appendages frame his stern face like a marine beard. A crustacean-style claw empowers his left arm, and his right leg ends with a crab-like pegleg.\n\n\"Captain ${Name}, is it?\" Davy Jones addresses you \"I've been waiting a long time for someone like you. Now tell me, why did you come aboard my ship?\"\n \nSuddenly, you feel a strong connection with this sea devil. It's like your souls are linked and intertwined.\n*choice\n    #I give him the five statuettes and ask him to spare my life.\n        \"I didn't want to come here in the first place,\" you reply. \"Let's make a deal: I offer you five souls in exchange for mine.\"\n         \n        You put the five little golden statuettes on the captain's wooden desk.\n        \n        \"Is that all?\" Davy Jones asks, disappointed. \"How lame. I saw some potential in you, but I guess I was wrong.\"\n         \n        \"Actually, I…\" you try to make up something, but the boatswain's crab claw stops you.\n        \n        \"Boatswain, teach our new guest the Flying Dutchman's customs…\" Turning his back on you to admire the storm, he adds: \"Welcome aboard, ${Name}. An eternity of torments awaits you.\"\n        \n        A lobster-man suddenly lashes your back with his antennae.\n         \n        Your story ends here, working as a slave for an eternity before the mast on the Flying Dutchman.\n        *goto_scene ending\n        \n    #I suddenly pierce him with my sword.\n        With a very swift move, you unsheathe your jeweled saber and lunge forward, aiming at Davy Jones's heart.\n        \n        The devil of the sea smiles and blocks your blade with his crab claw while his octopus-like appendages wrap your arms and legs, immobilizing you.\n         \n        \"I knew it!\" he rejoices, stopping with a gesture his concerned fish-men \"What a fierce, wicked spirit! What a greedy resolve! I love your attitude, captain ${Name}!\"\n        \n        You can feel your heart racing in your chest. You feel helpless as a potent force pulls you towards the dreary octopus-like devil.\n         \n        \"Why did you do this?\" his face is a few inches from yours now.\n         \n        Bolts of Lightning flash and thunder boom.\n         \n        \"Why do you want to kill me?\"\n        *choice\n            #I want to atone for my sins!\n                \"Atonement?\" Davy Jones says, disappointed. \"You and I are far too corrupted to achieve any atonement. Not even God would forgive us now.\"\n                \n                The slimy tentacles disarm you and throw you mercilessly on the floor. Illuminated by lightning, Davy Jones continues: \"How lame. I saw some interesting potential in you, but I guess I was wrong.\"\n                 \n                \"Actually, I…\" you try to make up something, but the boatswain's crab claw stops you.\n\n                \"Boatswain, teach our new guest the Flying Dutchman's customs…\" Turning his back on you to admire the storm, he adds: \"Welcome aboard, ${Name}. An eternity of torments awaits you.\"\n\n                A lobster-man suddenly lashes your back with his antennae.\n                 \n                Your story ends here, working as a slave for an eternity before the mast on the Flying Dutchman.\n                *goto_scene ending\n            #I want to be the biggest scourge of the seven seas!\"\n                *set Charm %-20\n                *set Wit %-20\n                *set Aristocrat %-20\n                \"Excellent!\" Davy Jones laughs, \"I couldn't expect less from LeChic's legacy!\"\n                \n                Before you can marvel at how he knows so much about your family, his tentacles pull you towards him, and you end up lips against lips.\n                 \n                You are disgusted and helpless: your body freezes. If you only could shift an inch, everything would break. Even thinking that word '[i]kiss[/i]' is like touching an ice wand to your chest. Your ribs seize, freezing solid and spiderwebbing with cracks. You feel your heart stopping, frozen into Davy Jones's locker.\n                \n                Suddenly, Davy Jones's slimy hands stretch around your back and unlock you. You feel your heart melting: he has released your wind-up key, and now you are kissing back hard! Your lips are everywhere, and your body is fluorescent orange…\n                 \n                No, royal purple…\n                 \n                No.\n                 \n                Your body is every color in the world, alight.\n                \n                You were almost drowning just minutes ago, and that was precisely how he tasted. Watery and salty.\n                *page_break Wicked good!\n                *goto davylove\n            \n*label davylove\n*if (ACON)\n    *achieve davylove\nThe morning after, you and Davy Jones admire the rising sun from the sterncastle of the Flying Dutchman.\n\n\"After hundreds of years…\" Davy Jones says, moved, \"I finally found you, my cursed soulmate!\"\n \nYou look at him and smile.\n \n\"I don't care what body you're in…\" he continues, staring at you, \"Or what you were before. You're the only dark, cursed soul I want to share my damned existence with.\"\n\n\"Oh, Davy!\" you reply, kissing his octopus face. \"I feel exactly the same. I spent all my life pointlessly pursuing my grandmother's hollow dreams. But thanks to you, I realized what I really wanted: scourging the seas forever in a cursed body with a cursed lover!\"\n\n\"What are we waiting for?\" Davy Jones grins. Unsheathing his sword, he adds: \"All men on deck! Let's weigh anchor!\"\n \nYou unsheathe your jeweled saber and shout: \"All hail captain Jones!\"\n \nYour soulmate replies: \"All hail captain Brushwood!\"\n\nThe crew shouts: \"All hail the [b]Flying Dutchmen[/b]!\"\n\n*page_break Wicked good!\n*goto_scene true_ending\n                 \n                \n*label ship\nPaddling fast, you eventually arrive on your ship. You are happy to realize everything is still in place.\n*if (sname)\n    \n    You suddenly realize that [b]if you went aboard this ship[/b], Davy Jones could legitimately claim all your souls according to the contract. The only possible way to avoid this tragic doom would (hopefully!) be renaming your ship.\n    \n    *label input_name\n    Choose a new name for your ship!\n    *input_text Ships\n    The ship's new name will be $!{Ships}, right?\n    *choice\n       #Yes.\n           You hastily improvise a new naming ceremony for your ship from the lifeboat. After performing it the best way you can, you finally go on board.\n           *set Ships \"$!{Ships}\"\n           *goto go\n       #No, I'd like to choose a new one.\n           *goto input_name\n       \n*label go\n*if (gold)\n    \n    You hastily unload in the hold all the treasure you brought with you. While Laura and Will prepare the ship to weigh anchor, you, Sam, and Matthew go back into the lifeboat. You then head back to the cave to collect the remaining part of the immense treasure.\n     \n    After about ten voyages back and forth, you finally store in your hold the last gold piece of the incredible amount of treasure.\n\nAfter about one hour of further preparations, the ${Ships} is finally ready to weigh anchor.\n*finish Back to Scuffle Island!", "09_finale": "*comment *finish\n*image 09_end.png center Chapter nine: the ritual is fulfilled\n\"You had quite an adventure!\" Voodoo Lady says.\n \nHer golden grin shines in the darkness of her room.\n\n\"I don't believe a single word of what you said.\" she continues, smiling, \"What matters most is that you managed to retrieve the missing ingredients. Did you?\"\n \nEveryone nods.\n \n\"Very well,\" she says, rekindling the green fire under her oozy cauldron. \"We will finally complete the ritual. Just wait until the liquid boils again.\"\n\nHer room is as dark and eerie as you remembered it. You feel uncomfortable and look forward to going away as soon as possible. Your crew members probably feel the same.\n\n\"So,\" she says, admiring the boiling cauldron, \"Where is the last ingredient?\"\n \nYou hand her the five golden statuettes. \"These should be our grandparents,\" you say. \"At least, what remains of them.\"\n\nThe Lady looks at the golden figurines inquisitively.\n*page_break Fingers crossed.\n\n\"I see…\" she says, grinning. \"Now, I finally understand what happened to you all.\"\n \nHer expression suddenly becomes serious: \"Get ready now! We're about to bring back your ancestors!\"\n\nReciting complex Voodoo rituals, the Lady drops the statuettes into the cauldron.\n \nBefore your unbelieving eyes, you see four grandparents emerge one by one from the boiling liquid. They are puzzled and confused, but they eventually understand the situation thanks to the respective grandchild's assistance.\n*page_break Awesome!\n\n*temp guylove 0\nFinally, you see your grandfather Guy emerge from the cauldron. Soaked wet, coughing, and cursing.\n \n\"What happened?\" he shouts, looking for his sword. \"Where is my treasure?\"\n\nHe sudde s a heart engraved with a special math formula: '[i]Sam + ${Name} = 4ever[/i]'\n\n\"I feel exactly the same,\" you whisper in his hairy ears.\n\nYou feel an irresistible urge to kiss him. You lean forward, but suddenly his powerful gorilla arm stops you.\n\nHe hastily writes something on his notepad. You read: \"Please, let me drink the potion first. I want this moment to be special!\"\n*choice\n   #Hurry up and drink that potion! I just can't wait!\n       Sam nods and drinks the greenish liquid.\n       \n       Before your eyes, his gorilla hair drops on the floor, his enormous forearms shorten, and his whole body shrinks.\n        \n       \"I can talk!\" Sam exults, adjusting the monocle \"I can finally introduce myself! Hello, ${Name}, I am Sam Rottentooth, and I'd like to apologize for not being able to talk this far. Alas, you know, things were pretty bad for me in that awful gorilla body. I'm so relieved I can talk now. There's so much I'd like to tell you! For example, did you know how many minutes we spent together? 2783! Isn't this wonderful? Of course it is, that's why now…\"\n       \n       \"Hush!\" you say, putting your finger on his lips. You immediately follow with a breathtaking kiss, so he stops talking in circles…\n       \n       Laura, Will, and Matthew cheer for you followed by all the grandparents.\n       *page_break Congratulations!\n       \n       *label endsam\n       \"I am so happy for you!\" Voodoo Lady smiles. \"I wish you all the best in your future endeavors.\"\n        \n       You hastily take your leave from all your former crew members. They all so look different without their curses! \n        \n       You want to start a new life with Sam, so you don't want to waste any more precious time in long goodbyes.\n\n       All that matters to you is leaving the past behind you and starting a new future together.\n       *page_break Oh, Sam!\n\n       After a honeymoon's week, you decide to settle on [b]Biblos Island[/b], where you \" Matthew says, adjusting his rotten skull, \"Please, don't say you love me. I know you're doing it just for the thrill of the forbidden taste.\"\n \n\"That's not true!\" you reply, getting close to him. Then you start singing:\n\n[i]If there were no words[/i]\n \n[i]No way to speak[/i]\n \n[i]I would still hear you[/i]\n \n[i]If there were no tears[/i]\n \n[i]No way to feel inside[/i]\n \n[i]I'd still feel for you[/i]\n\n\"You don't love me!\" Slash replies, grinning menacingly, \"You love the artist. You love fame! You just want to tell your friends we've been together!\"\n \n\"How can you say that?\" you reply, disappointed. \"I don't want Slash by my side. I love you, Matthew!\"\n\nYou feel an irresistible urge to kiss him. You lean forward, but suddenly his skeletal hand stops you.\n\n\"Let me drink this potion first!\" Matthew says, looking into your loving eyes, \"I want you to remember this kiss forever!\"\n*choice\n   #Hurry up and drink that potion! I just can't wait!\n       Matthew nods and drinks the greenish liquid.\n       \n       Before your eyes, his heart starts beating again, healthy flesh wraps his bony skeleton, and tattoed skin covers his whole body.\n        \n       \"I am back!\" Matthew exults, touching his chest, \"I can breathe! I feel alive! And I feel in love!\"\n       \n       Matthew hugs you before you can even realize it and kisses you in a studied, theatrical way.\n       \n       Laura, Will, and Sam cheer for you followed by all the grandparents.\n       *page_break Congratulations!\n       \n       *label endslash\n       \"I am so happy for you!\" Voodoo Lady smiles. \"I wish you all the best in your future endeavors.\"\n        \n       You hastily take your leave from all your former crew members. They all so look different without their curses! \n        \n       You want to start a new life with Matthew, so you don't want to waste any more precious time in long goodbyes.\n\n       All that matters to you is leaving the past behind you and starting a new future together.\n       *page_break Oh, Matthew!\n\n       After a honeymoon's week, you decide to join the [b]Guns 'n Posers[/b]. Matthew will take his guitarist role back, and you will be the new band's singer.\n       \n       *if (gold)\n           Thanks to all the treasure you collected, you wouldn't need to work, but Matthew can't live away from the stage, and you don't want to disappoint him.\n           \n       Now that the curse is no longer a problem, nobody will ever ruin your life again!\n\n       Unless your grandfather gets into more trouble, of course.\n\n       Wait a minute, where is he now? Why did you leave him unattended?\n       *page_break Oh no!\n       *goto_scene true_ending\n       \n   *selectable_if ((Slash >80) and (guybody)) #I love you just the way you are. Please, don't change.\n       *if (ACON)\n           *achieve mattlove\n       Matthew is shocked. \"Are you crazy?\" he asks. \"Don't you see I am a frickin undead? What kind of un-life could we live this way?\"\n       \n       You hug him firmly and reply: \"I don't care what your body looks like. I am in love with you, Matthew. I love your charm, I love your music, and I love this rotten body. We got rock, and we got each other: we don't need anything more, do we?\"\n       \n       Moved, he leans his skull forward and kisses you with his rotten lips. You close your eyes and enjoy this beautiful moment of joy.\n       *page_break I love you, Matthew!\n       \n       Everybody cheers you.\n       \n       \"I have never seen such a big display of true love,\" Voodoo Lady says. Then she turns to Matthew and asks: \"Tell me, do you want to stay this way for the rest of your life?\"\n       \n       \"Hell yeah!\" he replies, making the sign of the horns with his bony hand. \n        \n       \"Very well!\" Voodoo Lady replies, sprinkling the both of you with the greenish liquid, \"So be it!\"\n       \n       \"What's this?\" you ask, annoyed.\n       \n       The Voodoo Lady smiles and says: \"I just stopped the curse's bad side effects. Now you're free to live the lives you chose!\"\n       *page_break Thank you, Voodoo Lady!\n       *goto endslash\n       \n*label willove\n\"Oh, captain…\" Will blushes, waving his arms nervously, \"You really mean it? Please, quit playing games with my heart.\"\n \n\"No way!\" you reply, getting close to him. \"All of my life\nI have been waiting for all you give to me. You've opened my eyes\nand shown me how to love unselfishly. I've dreamed of this a thousand times before, but in my dreams, I couldn't love you more.\"\n \n\"Will…\" you add, looking into his eyes, \"I will give you my heart until the end of time.\"\n\nYou feel an irresistible urge to kiss him. You lean forward, but suddenly he backs off.\n\n\"Let me drink this potion first!\" Will says, looking into your loving eyes, \"I don't want to ruin this moment with this silly voice and uncontrolled arm waving!\"\n*choice\n   #Hurry up and drink that potion! I just can't wait!\n       Will nods and drinks the greenish liquid.\n       \n       You see a green aura surround his whole body.\n        \n       \"${Name}?\" Matthew says, clearing his voice. \"Listen!\" he says, excited, with a deep, sexy voice. \"This is my true voice! It's finally back! And I don't feel the urge to wave my arms anymore! Oh, thank goodness! This is wonderful, this is…\"\n       \n       You rush towards him and kiss him. He kisses you back,  hugging you in his comfortable lap.\n       \n       Laura, Matthew, and Sam cheer for you followed by all the grandparents.\n       *page_break Congratulations!\n       \n       *label endwill\n       \"I am so happy for you!\" Voodoo Lady smiles. \"I wish you all the best in your future endeavors.\"\n        \n       You hastily take your leave from all your former crew members. They all so look different without their curses! \n        \n       You want to start a new life with Will, so you don't want to waste any more precious time in long goodbyes.\n\n       All that matters to you is leaving the past behind you and starting a new future together.\n       *page_break Oh, Will!\n\n       After a honeymoon's week, you decide to settle on [b]Scuffle Island[/b]. The local governor needs a new spokesperson, and Will is eager to resume his political career. Impressed by your skills, the governor hires you as his personal \"Insult-Sword-Fighting Advisor.\"\n       \n       *if (gold)\n           Thanks to all the treasure you collected, you and will quickly become Scuffle Island's new governors. Money does make life easier!\n           \n       Now that the curse is no longer a problem, nobody will ever ruin your life again!\n\n       Unless your grandfather gets into more trouble, of course.\n\n       Wait a minute, where is he now? Why did you leave him unattended?\n       *page_break Oh no!\n       *goto_scene true_ending\n       \n   *selectable_if ((Will >80) and (guybody)) #I love you just the way you are. Please, don't change.\n       *if (ACON)\n           *achieve willove\n       Will is shocked. \"You kidding me?\" he asks, \"How can you stand this squeaky voice? Doesn't this arm-waving make you mad?\"\n       \n       You hug him firmly and reply: \"I don't care about what other people think. I am in love with you, Will. I love your funny voice, I love your waving arms, and I love your charm. This is the Will that conquered my heart. I won't give it to nobody else!\"\n       \n       Moved, he leans forward and kisses you. You can feel him keeping his excitement at bay, trying hard not to gesticulate. You close your eyes and enjoy this beautiful moment of joy.\n       *page_break I love you, Will!\n       \n       Everybody cheers you.\n       \n       \"I have never seen such a big display of true love,\" Voodoo Lady says. Then she turns to Will and asks: \"Tell me, do you want to stay this way for the rest of your life?\"\n       \n       \"Of course!\" he replies with his funny, squeaky voice, gesticulating as always.\n        \n       \"Very well!\" Voodoo Lady replies, sprinkling the both of you with the greenish liquid, \"So be it!\"\n       \n       \"What's this?\" you ask, annoyed.\n       \n       The Voodoo Lady smiles and says: \"I just stopped the curse's bad side effects. Now you're free to live the lives you chose!\"\n       *page_break Thank you, Voodoo Lady!\n       *goto endwill\n", "choicescript_description": "A terrible curse ruined your royal wedding, placing your soul into your pirate grandfather's body. To lift it, you must lead a crazy crew through countless hilarious challenges in this adventure inspired by Monkey Island and Pirates of the Caribbean.\n\n[i]Pirates of Donkey Island[/i] is a funny, 79,000 word interactive swashbuckling novel by Gilbert Gallo, where your choices control the story. It's entirely text-based—without graphics or sound effects—and fueled by the vast, unstoppable power of your imagination.\n\nA gorilla gentleman, an undead rocker, a fast-aging Voodoo crone, and a ridiculous spokesman. These will be your only companions in the most incredible journey of your life. Every member has a peculiar story, and their experiences/interactions will help you determine your final, authentic self.\n\nAfter dozens of insult-sword fighting duels, grog contests, and rigged wheels of fortunes, you will eventually look at life from an entirely different perspective.\nWith your crew's help, you'll discover the truth about your hated pirate grandfather. Will you then embrace your cursed condition or fight against your doom?\n\n• Decide your main character's body and orientation during the game. Will you end up being male, female, or non-binary? Gay, straight, or asexual? It's up to you to decide.[n/]\n• Live the cursed swashbuckler's life! Will you look for a way to lift your curse or enjoy your damned existence until the afterlife?[n/]\n• Find romance with a hairy, mighty gorilla or spend your life together with a zombie. Or will you prefer to date a venerable, wrinkly, and toothless lady?[n/]\n• Lead a motley crew of cursed people and use their incredible powers to uncover the Cursed Caribbean's mysteries.[n/]\n• Engage your opponents in hilarious insult-sword-fighting duels![n/]\n• Will you cherish your crew members as a respected leader, or will you betray them for gold, selling their souls to Davy Jones? [n/]\n\nStop waving your sword like a feather duster and sail the Cursed Caribbeans to discover the ultimate treasure: your true self!", "choicescript_stats": "[b]General Info[/b]\n*stat_chart\n  text Salutation\n  text Name\n  text Surname\n  opposed_pair Mojo\n      Curse\n  opposed_pair Aristocrat\n      Pirate\n  opposed_pair Charm\n      Brawns\n  opposed_pair Wit\n      Dread\n  text Pieces_of_Eight Pieces of Eight\n  text Special_Items Special Items\n  text Ships\n*line_break\n*if meeting\n  [b]Relationships[/b]\n  *stat_chart\n    text Crew_Name\n    opposed_pair Mama\n        Old Crone\n    opposed_pair Sam\n        Gorilla\n    opposed_pair Slash\n        Undead\n    opposed_pair Will\n        Spokesman\n\n*if (ACON)\n    Achievements Pop Up: [b]ON[/b]\n    \n*if (hardmode)\n    Hard Mode: [b]ON[/b]\n    \n*if (deathmode)\n    [i]Death Mode[/i]: [b]ON[/b]", "choicescript_upgrade": "*label start\n*check_purchase adfree\n\n*if choice_purchased_adfree = false\n  [b]Chapters 4 through 9[/b]\n  \n  Unlock chapters 4 through 9, including the thrilling conclusion!\n  \n  *purchase_discount adfree 2021-07-29 $3.99 $2.99 start\n\n*if choice_purchased_everything\n  You're completely upgraded!\n\n*if choice_purchased_adfree\n  [b]Chapters 4 through 9[/b]\n  \n  You've paid to unlock chapters 4 through 9.\n", "death": "*comment Copyright 2010 by Dan Fabulich.\n*comment \n*comment Dan Fabulich licenses this file to you under the\n*comment ChoiceScript License, Version 1.0 (the \"License\"); you may\n*comment not use this file except in compliance with the License. \n*comment You may obtain a copy of the License at\n*comment \n*comment  http://www.choiceofgames.com/LICENSE-1.0.txt\n*comment \n*comment See the License for the specific language governing\n*comment permissions and limitations under the License.\n*comment \n*comment Unless required by applicable law or agreed to in writing,\n*comment software distributed under the License is distributed on an\n*comment \"AS IS\" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND,\n*comment either express or implied.\n\nYou have died.\n\n*goto_scene ending", "drown": "Suddenly, a blinding lightning strikes the main deck.\n\nWith a terrifying noise, the ${Ships} cracks open. Mountains of foamy water crash on the broken deck, swiping you away from the rest of your crew.\n\nYou fall into the icy, foaming waters.\n\nYou strive to swim, but a tower-high wave sends you dozens of feet underwater, never to come out again.\n\nYour adventure tragically ends into Davy Jones's locker.\n*goto_scene ending", "ending": "*page_break End\nWe hope you've enjoyed playing [i]Pirates of Donkey Island.[/i]\n\n*feedback\n\nChoice of Games releases new games like this one on a regular basis.\n*subscribe\n*page_break\n\nThanks for playing!\n\n*ending\n", "gold": "Suddenly, you have the ominous feeling that [b]something is terribly wrong[/b].\n \nYour movements become numb, and a golden color slowly engulfs your body. Terrified, you see that the same thing is happening to every single member of the $!{Crew_Name}!\n \nYou feel smaller and smaller.\n \n\"The Loa are angry!\" Mama Zouzou shouts. \"We run out of Mojo, and the curse is taking over!\"\n \nPowerless, you all succumb to transforming into small, golden statuettes while a diabolical laughter echoes in your ears.\n \nYour story ends here, forever trapped into a little golden statuette representing your hated grandfather.\n*goto_scene ending", "lostduel": "Suddenly, you feel a frightful sensation of cold spreading all over your body.\n \n\"I collected enough blood!\" the ghost pirate exclaims, excited \"Nothing will forestall my return now!\"\n\nYour movements become numb, and a golden color slowly engulfs your body. You feel smaller and smaller.\n \n\"Get ready, world!\" you hear LeChic laughing \"The greatest pirate of all times is ready to sail again!\"\n \nPowerless, you succumb to transforming into a small, golden statuette while LeChic's diabolical laughter echoes in your ears.\n \nYour story ends here, forever trapped into a little golden statuette representing your grandfather.\n*goto_scene ending", "riflemen": "Suddenly, the barred windows encircling the shady alley suddenly open. More than twenty dangerous-looking musketeers immediately level their rifles towards you.\n\nYou immediately raise your hands up.\n\n\"You messed with the wrong guys!\" the ominous voice says from behind the door. \"Now you'll learn what happens to those who bother the Lagrange family!\"\n\nBefore you can reply, the riflemen shot at each one of you mercilessly.\n\nYour story ends here, in a dark, dirty and smelly alley.\n*goto_scene ending", "screenshots": "*set Name \"Gaya\"\n*set Salutation \"Captain\"\n*set Mojo 54\n*set Charm 50\n*set Wit 84\n*set Aristocrat 15\n*set Pieces_of_Eight 845\n*set Ships \"Sea Donkey\"\n*set Mama 90\n*set Sam 51\n*set Slash 36\n*set Will 84\n*set Crew_Name \"Average Joes\"\n*set davyjones false\n*set gold true\n*comment interaction parameters\n*set meeting true\n*set grandparent \"Guy\"\n\n*comment NOW IT BEGINS\n*set Special_Items \"Jeweled Saber, Nautical Map\"\n\nThe fiery ghost's frightful laughter echoes in the cave while you strive to remember the few insult-fencing lessons that your grandfather Guy imparted to you.\n\n*label insult01\n\"Now defend yourself!\" LeChic shouts, acquiring a fencing stance, \"[i][b]My cursed sword is famous all over the Caribbean[/b][/i]!\"\n*fake_choice\n    #I'd be in real trouble if you ever used it.\n    #I wanted to make sure you'
